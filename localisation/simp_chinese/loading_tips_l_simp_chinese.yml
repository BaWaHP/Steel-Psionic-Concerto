LOADING_TIP_31:0 "对于我们来说，党的利益高于一切。\n——施塔尔 威克斯"
LOADING_TIP_32:0 "他们（指新革命党）高声叫嚷着自由，平等，和平；而我要告诉你们的是，这就是我一直在做的事——始终如此。\n——卡塔日娜 维尔纳"
LOADING_TIP_33:0 "环境适应魔法是属于我们这个时代的奇迹，它意味着物种的生理限制不再是阻挡扩张的主要条件，文明才是。\n——伊拉斯谟·布朗斯通，“人鱼陆地适应计划”魔法科研团队的领导人"
LOADING_TIP_34:0 "滚出我们的故乡，沃姆来的猪猡！\n——戈尔维亚王国某地涂鸦"
LOADING_TIP_35:0 "经调查，梦之湖暂无显著危害，且短时间内无法激活，申请撤离。\n——1972年4月6日，【数据删除】特别考察队提交的报告"
LOADING_TIP_36:0 "我有一个梦想，一个沃姆人能自由自在生活在这片大地的梦想，那是一个弱小民族也能依靠自身努力崛起的世界新秩序。\n——沃姆四世"
LOADING_TIP_37:0 "戴安娜小姐已赶往罗梦大区。只要坐标信息正确，她能为你毁灭任何敌对单位。务必谨慎使用她的力量。\n——联盟安全局巴斯蒂亚总部至东大陆分部的急电"
LOADING_TIP_38:0 "我想要为这片落后而充满仇恨的土地带来文明与希望，即便这意味着向异世界的帝国主义者让步。\n——施耐德·海勒"
LOADING_TIP_39:0 "这个孩子在仇恨与痛苦中成长，也会在仇恨与痛苦中灭亡。\n——《勒泰特尼安现代史》的最后一句，作者海斯特里写下此句后自杀。"
LOADING_TIP_40:0 "血河漫过了所有立于土地上人们的头颅，直到溺毙都不再有一点希望。\n——坎达德尔内战期间流传的无名之诗"
LOADING_TIP_41:0 "纵使我们身边只有嘲笑与讥讽、诽谤与鲜血，我们将会夺回他们的祖国，抹去虚伪的火焰，升起胜利的旗帜。\n——谢姆延·扎布罗夫斯基于七河流亡期间的讲话"
