LOADING_TIP_0:0 "长颈鹿是无情的生物。"
LOADING_TIP_1:0 "在别人施加恶行时袖手旁观本就是罪恶。\n——十四代凤凰“审判”"
LOADING_TIP_2:0 "在此，我可以断言，人鱼族和远乡人民的友谊将会天长地久，直到时代的尽头也不会衰亡。\n——白洋海人鱼族驻远乡王国亲善大使，纽特·卡尔，在被暗杀前一刻的讲话"
LOADING_TIP_3:0 "国家怎么对待人民，人民就怎么对待国家。\n——秋辉"
LOADING_TIP_4:0 "我的祖辈死在了伟大战争的战场上，我的父辈死在了世界大战的战场上，而我正坐在入侵别国的装甲车上。\n——沃姆帝国无名士兵的日记"
LOADING_TIP_5:0 "他们可以掠夺我们的财产，侵害我们的权利，夺走我们的生命——但他们永远也无法消灭我们的灵魂！那些还留存着先驱者之血的勇士们，加入我们吧，还远乡一个青天！\n——青天军领导人，“青天”"
LOADING_TIP_6:0 "国家层级的正义并非来源于某人的权力或是能力，而是他所代表的国家这个抽象的整体和君主作为领导人的意念，一昧的让步并不能解决根本上的问题，对谁都是如此。\n——郑义"
LOADING_TIP_7:0 "我明白自己肩上的重任，也知晓我的行为会带来的影响。但正因如此，我决不打算逃避自己的职责。\n——郑红"
LOADING_TIP_8:0 "当我从昏迷醒来时，我惊讶地发现远乡王国没有丝毫的改变，一切都照常运作。这时我才意识到个体力量的有限和自己作为国王的悲哀，属于君王的时代到此为止了吗？\n——远乡国王，郑钧"
LOADING_TIP_9:0 "女士们，自动瞄准根本就是家常便饭。\n——军事魔法开发人员"
LOADING_TIP_10:0 "我们一旦放下武器，迎接我们的便是更加凶猛和彻底的压迫，所以我们没有退路，只有向前，而这条路只有一个终点，那就是是胜利！\n——阿尔勒-舍尔勒"
LOADING_TIP_11:0 "如果需要，我们就再打十年，再打一百年。继续战斗，无论代价几何。\n——利爪·斯派克的遗言"
LOADING_TIP_12:0 "人类常说我族乃是带来灾祸的噩梦象征，可奴役，践踏，甚至是屠杀我族的不恰恰是他们人类吗？\n——奥提摩"
LOADING_TIP_13:0 "当你我牵起手时，明天会更好。\n——绿洲共和国宣传语"
LOADING_TIP_14:0 "我回到故乡时，他们称我为保卫边境的英雄，可当我回到岗位上，放眼望去，眼前除了人类自己所带来的灾祸外，只看到无尽的荒原。\n——无名边境哨兵"
LOADING_TIP_15:0 "他们常说机械和生物无法平等地合作，哦，他们还说我们能还完身上的债务，“非常”具有说服力。\n——冰峰起义军宣传语"
LOADING_TIP_16:0 "我们这一代人的和平或许永远不会到来。\n——匿名评论家"
LOADING_TIP_17:0 "快看，一名铁驭，情况对我们有利了！\n——伟大战争期间，泰坦部队被首次投放到战场时得到的评价。"
LOADING_TIP_18:0 "流汗不流血，流血不丢命，但是有魔法护盾可以兼顾二者。\n——军事魔法开发人员"
LOADING_TIP_19:0 "人们纷纷死去，我希望能够找到救赎，我曾经所做的一切都是为了拯救更多的生命。而我希望能做得更多，这是我的职责所在。\n——芙兰"
LOADING_TIP_20:0 "想象力能够让你生存下去，是它指引你走出黑暗。嗯，还需要照明魔法。\n——极北冒险者联盟纲领"
LOADING_TIP_21:0 "许多人问我在极北看到了什么，我的回答从来都是白茫茫的无尽雪原。他们不会相信我所真正看到的事物，也不需要去相信。重要的是我能在人民的欢呼声中活着回到故乡，然后安享晚年。\n——皮尔外，在他的回忆录中写道"
LOADING_TIP_22:0 "虽然长得很像紫薯，但魔矿很显然是不可食用的。真的，相信我。\n北巴斯蒂亚联盟化学家，魔矿发现者，门捷罗夫"
LOADING_TIP_23:0 "虽然我们在战场上连胜不断，然而，随着军事上的胜利、恐怖的增加，敌人也相继增加，时间已经不是我们的同伴了。\n——沃姆三世"
LOADING_TIP_24:0 "为什么参战？没有什么特别的理由。他们说那里的人正遭受压迫，需要帮助，所以我们来了。\n——中巴斯蒂亚内战时期，对国际纵队士兵的采访"
LOADING_TIP_25:0 "抓住我的手，快，上了飞艇你们就安全了！\n——南绿洲“生命之路”特别军事行动，无名士兵"
LOADING_TIP_26:0 "我们所失去的一切，我们的故土，我们的故乡……都会被我们亲手拿回来。\n——希雅薇瑟三世"
LOADING_TIP_27:0 "祖国，什么是祖国？祖国不是当权者的后花园，朋友们。祖国是乡下的祖母，一贫如洗。\n——埃米 普斯卡娅"
LOADING_TIP_28:0 "你没有资格犯错，总统先生。只有人民才有资格犯错。\n——莫泽 赫卢东 于1973年民主政变时。"
LOADING_TIP_29:0 "艺术必须一刻也不停的干涉政治，直到政治不再干涉艺术。\n——维拉帕米 赫尔辛基"
