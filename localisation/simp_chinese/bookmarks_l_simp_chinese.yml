SPC_bookmarks_eastern_title_txt:0 "致旧世界"
SPC_bookmarks_eastern_title_tt:0 "§L什么是每一个麟人都无法忘记的东西？在这一问题上，麟人的答案空前的一致：故乡。旧大陆上的一切都令麟人魂牵梦绕，尤其是他们的祖国，那个被称为“天朝上国”的地方。那是他们这辈子都无法回到的家乡，是他们每晚都在梦里梦见的景象。可惜当麟人睁开双眼，在巴斯蒂亚大陆上只有他们所建立的远乡王国还带有一丝旧大陆的意象。但被海洋魔兽隔绝在远乡王国的麟人早已无法得知旧大陆上的信息，他们的母国也没有再派来过一艘海船和传来哪怕一点微不足道的消息。对于旧大陆，远乡的麟人已经一无所知，他们那几个世纪以前的故国旧景早已丢掉了时效性。§!\n\n§Y对于现在的远乡王国来说，旧大陆已经蒙上了一层永不退去的阴影，而他们的故国也在阴影中若隐若现，宛如浮萍。§!§R不过远乡的麟人不会就这么放弃旧大陆的踪迹，哪怕故国早已不是记忆中的模样，但总有一天，他们将会探明那失落故国的今日模样...§!"

###主要国家介绍###
#南巴#
TCW_BASTIA_DESC:0 "上次大战造成的剧烈政治动荡深刻影响了这个国家，民族冲突和经济恶化让民主化与自由化难以提上议程。在这样的局势下，旧元帅克里斯蒂安发动政变建立民主过渡政府，通过强硬经济手段稳定经济，并设立自治地区减少民族冲突。面对因西莉迪亚动荡而进入国内的难民、面对南方地区较强的保王倾向、以及支持者们对民主与自由的期望......托莱多的未来，将会交付谁手？"

ROK_BASTIA_DESC:0 "200多年前的那场庞大革命中，克拉亚诺共和国诞生了。不过因为其特殊的位置与历史条件，克拉亚诺的革命史一直都是温和且人道的。而温和与人道却恰恰最容易滋生野心家。民主党历史上争议最大也是最具有的野心的总统比纳许·海耶的上台带来了近30年的独裁统治。他的出现打碎了共和国政客与人民对妥协与温和的迷信，使他们发现了另一条道路。在联邦与南巴共和国的帮助下。现任总统莫泽发动了民主政变，成功将比纳许赶下舞台。然而这位以“温和”“人道”而出名的新总统却未能给克拉亚诺带来实际性的改变。比纳许的遗产依旧在克拉亚诺蔓延，军队中保皇派的声音不断壮大，不满于现状的激进团体拔地而起...而莫泽总统的生命将会在1998年到来的时候走向注定的结局。克拉亚诺的未来究竟会走向何方？谁也不得而知..."

UPV_BASTIA_DESC:0 "上维尔陶公国的存在在整个南巴联邦里都算特殊的。作为被《克拉亚诺协定》强行独立的国家，其作为旧南巴斯蒂亚皇室的保留地一直存续至今。作为一个国家来讲，上维尔陶显然是不合格的典范。作为名义上统治者的旧帝国皇室对国内的建设毫无建树。由于世界大战的影响，前上维尔陶大公比德尔二世在位期间多次向贵族和公国文官集团妥协求和。导致旧帝国皇室对上维尔陶的掌控力越来越弱。虽然在其末期一度试图进行集权化改革，但最后以失败告终。\n\n由于身边已无男嗣，比德尔二世最终只能将王位传给了他最小的女儿：伊丽莎白。在最初的十年，女大公几乎沦为了文官与贵族的傀儡。没有接受过帝王教育和系统性学习的伊丽莎白在面对这些官场老油条时有着天然的劣势。在万般无奈下，她只能开始隐忍直到她能掌握一切的时候...\n\n时间来到1998年，伊丽莎白——或者应该称呼她为伊丽莎白一世。在不断的忍耐和幕后经营后，女大公总算掌握了一部分国家权力，将目光看向了辽阔的南巴斯蒂亚大地：目光所及，皆为王土。脚下所至，皆为朕有。十年的时间，终于让女大公可以开始准备实现她心中的夙愿了。\n\n可是越来越不稳的联邦局势，克拉亚诺内部对上维尔陶的觊觎，以及公国内部依然强大的守旧势力。女大公要如何做，才能解决这一切问题呢？或许，这要看历史会以什么样的方式记录这一切了..."

LNR_BASTIA_DESC:0 "勒泰特尼安共和国诞生于1798年的特尼安共和革命。然而，在北方起义的共和革命者无力冲过丹特山脉南下，最终不得不与南方的奥科特尼安王国和谈。两国对立至今。停战后的两百年来，由于地主与宗族势力一直把持着劳动力与土地资源，勒泰特尼安的工业化进程相当缓慢。时至今日，勒泰特尼安已经成为了南巴斯蒂亚联邦内最落后的成员国之一。世界大战的失败与1973年对温和社会主义政党人民党的清洗更是严重激化了国内矛盾。没有得到抚恤金的老兵与幸存的人民党成员躲进了深山与农村成立了农工革命党。尽管共和国成功镇压了1995年的农工革命党起义。但接踵而至的1996年经济危机让共和国几近崩溃。时间来到1998年，保守派依然占据着议会的半数席位，但土地改革的呼声已然响彻城市。仍然于山中活跃的农工革命党已重整旗鼓，伺机而动。南方的王国政权也在准备选王会议。北方的强大盟国也有了衰退的征兆。可以说，勒泰特尼安这艘小船正面临着一场暴风雨。很少人认为她还能见到千禧年的曙光。但她的舵手们并没有彻底绝望：勒泰特尼安虽小，每一寸土地上都有守护她的人。"

RSU_BASTIA_DESC:0 "鲁萨尔，自古时§7提特兰东征§!开始，便与§B南§!§R巴§!形成了§7唇齿相依§!的关系——无论立场如何。而从那时开始，鲁萨尔就是南巴斯蒂亚的§7交通枢纽§!，如同那句俗语：§O在鲁萨尔商人的行囊中你能找到一切，哪怕是§!§Y信仰§!§O与§!§0灵魂§!§O。§!\n\n步入共和时代，鲁萨尔依旧是§B南§!§R巴§!在联邦的左膀右臂，拥有大量煤铁资源的鲁萨尔自然成为了联邦的§7重工业基地§!，同时鲁萨尔也承担着§7联邦物流运输§!的重任以及商人们喜闻乐见的§7对外投资§!。但这一切都被那场以世界为名的§0终末战争§!所打破，战争中保守党维持军警统治的伤疮只能是§t皮肉之痛§!，战争后商人们失去的一切才称得上是§0刻骨铭心§!：海外投资几乎全军覆没，联邦内部又被七河人趁机挤占§7投资机会§!。§B南§!§R巴§!战败的结果却让鲁萨尔人来偿还，素称兄弟之邦的两国关系几乎降为零点。\n\n但生活还得继续，保守党的统治自大战结束土崩瓦解，传统的§Y自由党§!重新掌握了鲁萨尔的政权。鲁萨尔在风雨飘渺中顽强的生存了下来，甚至在战后有过小小的§7繁荣时刻§!。但大战对于鲁萨尔的创伤极难治愈，难以恢复繁荣的§Y经济§!、生活水平越来越低的平民阶层、以及最大的脓疮：自大战结束后由§9鲁萨尔工会联§!所改组地§R鲁萨尔工革联§!。\n\n施塔德·埃格的上台略微缓和了鲁萨尔所面临的困境，但这个从不以§t激情§!著称的国家目前则处在§R烈火与热浪§!的照耀下晃荡在§0命运§!的十字路口......"

#北巴#
SFH_BASTIA_DESC:0 "远乡王国起源于千年之前，来自名为“天朝上国”的传说帝国的远征队，由于低估了海洋魔兽的威胁，远征队受困于今日的东巴斯蒂亚一带，并最终在这里安家落户，同当地文化有机结合，最终建立起了远乡王国。在接下来的几百年里，这些冒险者的后裔不断扩大着远乡王国的影响力。善于探索和开拓的他们很快就在环境相对不安全的东巴斯蒂亚建立起了稳定的根据地，能够先他人一步获取各类原材料的他们也借此在同周边其它国家的贸易中赚了大钱。赶上工业化时代后的远乡王国更是青云直上，一度成为地区霸主级的存在。\n\n然而，伟大战争和世界大战接踵而至，经济危机彻底打碎了曾经探险者的美好幻想。随着黄粱之梦的破碎，远乡王国陷入了多年的停滞，政治内乱席卷了这个国家。由革命党人所组织的大规模叛乱最终在军队的协助下被镇压，可稳定终究没有到来。为了维持国家稳定，远乡政府选择向附近海域的人鱼族群妥协，给予他们超国民待遇和经济优待以换取一点微博的援助。\n\n在这之后，由崛起的沃姆帝国挑起的东巴斯蒂亚大战进一步恶化了局面。这场可怕的战争对远乡王国造成了十分严重且恶劣的影响，国王的统治也摇摇欲坠。他不得不同时承受经济危机和军事失败的双重后果。战争结束后，由于中央政府的衰退和西北地区的混乱，国王郑钧不得不下令让邱向荣元帅带领军队接手西北地区的统治以稳定局面。他的儿子郑义，一位坚定的反革命者，在北方的公开叛乱进一步削弱了郑钧的影响力，贵族也对这位在革命党和保守派之间摇摆不定的国王持怀疑态度，与此同时，郑钧也发现自己年老体虚，或许时日无多了。远乡王国的未来似乎一片黑暗。"

ARO_BASTIA_DESC:0 "“我称这里为‘曙光之地’，奥罗日亚。”——希雅薇瑟·格罗尼亚一世\n\n格罗尼亚家族建立的奥罗日亚帝国曾经是悬在整个东巴斯蒂亚上空的雄鹰与阴影。自从1085年，提特兰流亡者希雅薇瑟·格罗尼亚在“不衰的魔女”布尔维什的见证下建立了奥罗日亚帝国后，这个国家便一直是整个东巴斯蒂亚最为强大的势力，皮奥瑞亚人与西莉迪亚人在奥罗日亚脚下雌伏，沃姆的部落民与吉拉尼亚的鲜血大公也屈服于帝国的统治，就连远乡王国和南巴斯蒂亚诸国也对其忌惮三分。\n然而自工业革命以来，奥罗日亚帝国每况愈下，先是伟大战争的爆发导致帝国在中巴斯蒂亚的投资付之一炬，又是帝国旗下各国爆发的资产阶级革命动摇了帝国统治的根基。最终，在“昏逸王”菲尼克斯·格罗尼亚的统治期间，由于世界大战引发的灾难性经济危机，诸国或和平或暴力地脱离了奥罗日亚帝国，帝国也随之彻底解体。\n在“贤安王”奥斯灵顿·格罗尼亚的力挽狂澜下，奥罗日亚不至于彻底毁灭，格罗尼亚王国勉强和雷斯诺顿王国联统。然而国内的共和主义革命愈演愈烈，新兴崛起的东巴诸国虎视眈眈，以贵族为首的极端民族主义势力崛起，马德南平原上更是有“拜光会”邪教徒的活动。\n这片美丽而富饶的土地将会走向何方？\n\n§Y曙光会给我们答案。§!\n"

CLD_BASTIA_DESC:0 "从黄金年代奥罗日亚殖民者建立西莉迪亚王国至今，这片大地默默记录着所有的历史，王侯将相你方唱罢我登场，在名为奥罗日亚的阴影下，西莉迪亚人民的生活永无波澜。\n但世界大战打破了这一令人绝望的虚假的看似和平稳定的表象，奥罗日亚并不满足于从西莉迪亚获取低价的工业品，在野心的驱使下他们决定将西莉迪亚人送上前线，连活下去这一需求都无法被满足的人们终于挺起了弯下已久的腰，抬起了低下了千年的头，将愤怒的目光投向了王座上的身影和他背后的阴影。\n\n随着第一座工厂的罢工、第一座城市的起义、第一支军队的响应，火焰瞬间蔓延至整个西莉迪亚，最后，他们将国王“请”出了这个国家，而那长久以来的巨大阴影也迫于世界大战的压力，第一次对西莉迪亚选择了妥协。\n世界大战结束后，西莉迪亚终于获得了挣脱镣铐自由奔跑的机会，但人们发现，有些事情似乎没有改变，那些人依旧在代表着他们与奥罗日亚合作，甚至有传言称他们为了获取更大的利益打算将当年被流放的国王迎回国内。\n\n但人们已经站了起来，而且将不会再跪下去。"

NCD_BASTIA_DESC:0 "在19世纪30年代§1西莉迪亚§!的§C共和革命§!宣告了§1西莉迪亚§!的觉醒，1980年的§Y联合阵线§!起义让§1西莉迪亚阳光下的土地§!脱离了北方的残暴者几百年的统治。世界大战让我们获得了真正意义上的独立，而东巴的大战作为导火索，激发了我们人民的斗志。如狼似虎的§G联合王国§!与沃姆帝国试图将我们拉入无尽的战争深渊，我们聪慧的保守共和派领导人拒绝了他们无理的胁迫，但是那帮卑鄙的§t社会主义政党§!以及§R左派极端疯子§!却在不断煽动我们的国家。\n\n1994年，那是悲伤的一年，§R左派疯子§!公然撕毁了我们共同的理想，宣布与我们为敌，我们只是想要和平，而他们想要红色邪风挂满整个§1西莉迪亚§!的高楼，工厂，背叛了我们。我们不得不俯下身子请求§G联合王国§!的协助。1996年，初入政界的威斯特尔由于涉世不深，为我们的国家带来了许多灾难，初期与§C联合阵线§!合作的老王国军队与一派投机分子开始蠢蠢欲动，民不聊生，§G王党§!试图在这一危急时刻夺取共和的伟大成果，南方的§R工团主义疯子§!正在蠢蠢欲动。西莉迪亚的大地，不适合那些虫豸。\n\n雪落在蒙斯山脉上，一切的一切，§R因为失血，变得苍白无色。§!"

PEO_BASTIA_DESC:0 "“当一个国家处于危难之际，强权的土壤便应运而生”——皮奥瑞亚某著名启蒙思想家\n\n1992年的一次政变让皮奥瑞亚这个民主的东巴斯蒂亚灯塔就此暗淡至今，但希望的火光从未在这片希望之地消失，民主的共和国从未在军队的铁蹄下真正死去，共和国宫的怒火正在燃烧，人民们正在积蓄力量等待着樱桃花开之日。\n\新年的钟声回荡在1998年的皮奥瑞亚上空，烟火在天空绽放。皮奥瑞亚共和国的明天将走向何方？无人知晓。但随着温暖的东南海风吹遍皮奥瑞亚大陆，大地上的冰冻即将彻底化开变为甘冽的溪水滋养这片希望的土地。在东巴斯蒂亚的残阳之下，共和国将举起火炬将光明带给即将黑暗的东巴斯蒂亚乃至整个巴斯蒂亚大陆。\n\n人民万岁！共和国万岁！"

TPG_BASTIA_DESC:0 "数千年前，吉拉尼亚地区就有松散的人类活动，先后诞生了几个封建领主。在距今约九百年时，其中一个姓氏为“吉拉尼亚”的家族诞生了一位具有磅礴魔力的高魔个体，也就是现今大公国的统治者阿方斯·吉拉尼亚三世。凭借着对于同时代军队碾压性的战力，阿方斯得以迅速整顿境内的其余贵族。在确立了自己的统治权的一段时间后，阿方斯便迫不及待地发动了名为§R“大远征”§!的版图扩张运动。\n\n§R“大远征”§!最初取得了良好的效果，由吉拉尼亚的军队凭借阿方斯亲自下场，以摧枯拉朽之势将版图扩大了数倍，掠夺来的巨额财富则以以战养战的形式快速扩充军队，而领土则以分封制的形式赐予了阿方斯的亲信。\n\n在远征途中，有人发现最初追随阿方斯的将士们身体发生了§C某些变化§!，随着时间变化，这些将士们个体素质逐渐远超人类，甚至部分与大公亲近的人发生了§C返老还童§!的现象。而在远征结束后，这些将士的后代（最初的水晶族没有生殖隔离）也具有这些超凡的能力。数百年后，水晶族完成了两代的蜕变，进化成了完全不同的一种生物，比起人类似乎与魔族的生命形态更为相似。\n\n§R“大远征”§!在持续了近两个世纪后，军事科技的进步导致了侵略的效率下降，吉拉尼亚已无力再维持如此庞大的军队。此时各地频发的的暴动则助推着王国的自我毁灭。发生于1191年6月8日的“市政厅爆炸案”最终打响了反抗的号角，各地民众纷纷奋起反抗阿方斯的暴政，王国的统治危在旦夕。\n\n此时西方的新兴王国奥罗日亚向吉拉尼亚抛出了橄榄枝，曙光教将会授封阿方斯为破魔天使苏维尔的化身，而奥罗日亚皇帝将封赐阿方斯为吉拉尼亚大公，以此为条件来为阿方斯的统治提供法理。\n\n随即在1192年，奥罗日亚皇室封阿方斯为吉拉尼亚大公，并在自此以后的几个世纪一直统治着吉拉尼亚，但仍保有较大的自治权。\n\n此后几个世纪中大公一直致力于发展公国内农业与畜牧业，并在1725年爆发的的伟大战争中凭借粮食贸易收获了不菲的财富，此后在1908-1915年陆续探掘的大量油田和钨矿矿脉让因工业繁荣而下滑的公国经济再次腾飞。\n\n直到1969年爆发的世界大战让公国成为了战争前线，在吉拉尼亚广袤的平原上奥罗日亚与远乡长达16年的拉锯战严重摧毁了大量基础设施，并给经济带来了不可挽回的巨大创伤。1986年，深陷经济危机的公国和沃姆帝国达成合作，一方提供工业与科研援助，另一方则供给食物和资源，随后两国同时宣布从奥罗日亚联合王国独立，而日薄西山的奥罗日亚也只能默许这一举动。\n\n1986-1991年间公国凭借着沃姆的援助实现了快速工业化，而沃姆也一跃成为了地区强权，在1992年爆发的3年东巴大战更是确立了沃姆在东巴的霸主地位。而作为盟友的公国也攫取了远乡西北地区的部分领土。\n\n二十世纪下半叶，快速的工业化和接连的战争让公国极大的压榨了境内的人类，\n\n而西蒂利亚的红色革命给予了人们极大的信心与勇气，要求种族平权示威和集会活动愈发热烈。同时各地的贵族趁此发难，向大公索要更多的自治权。自1191年来公国从未爆发过大规模革命，迭代缓慢的政治生态导致了公国政府内有大量的沉杂部门和暗藏的弊病。更加反常的是，1997年末大公与内阁深藏王宫，中央政府陷入了诡异的寂静……\n\n大公长治久安"

KFH_BASTIA_DESC:0 "还没写"

ROT_BASTIA_DESC:0 "共和英雄丹特建立的国家、提特兰共和革命的长子、提特兰唯一的民主政权、南巴联邦西部的忠犬……这些都是提特兰共和国。在共和革命的二百五十年后，提特兰共和国仍然未能统一提特兰，沦落为了一个任由南巴盟友宰割的军阀国家。尽管肥沃而广阔的农田保证了这个国家的人民能够养活自己，但南巴企业的倾销仍能压的其民族工业难以抬头。尽管忠诚可靠的共和军与国民警卫队仍在保卫着共和国的主权与荣耀，但大量南巴驻军和南巴“顾问”的存在足以证明其毫无主权与荣耀可言。尽管已经实现了政教分离，但本土的纳卡教与南巴的瑟庞教的冲突依然损害了政治的稳定。于是，提特兰人对共和国的支持与日俱减，正如南巴移民的数量与日俱增。在种种因素的影响下，提特兰共和国的政治环境愈发动荡，却又因为南巴驻军的保护而绝不至于崩溃——尽管这些跋扈的保护者也是动荡因素之一。\n\n在这种民族矛盾比阶级矛盾更明显的情况下，社会合作主义政党全民革命运动打着民族主义的旗帜异军突起，成为了建制两党外的第三大党，大有打破两党制民主政治之势。在议会之外，宗教民族主义者也团结在了宗教恐怖组织神权议会的圣旗之下，他们致力于实现已被废除的政教合一，让提特兰人的血脉重归纯净。当然，所有的政治势力都离不开南巴驻军的影响，而南巴驻军绝不会愿意看到这些民族主义者的上台。由南巴人和买办控制的建制两党：人民自由党与民主党也没有沦落到会被这些民族主义者推翻的地步——除非发生毁天灭地的剧变。综上所述，在这个日益险恶的时代中，还有太多的考验等待着共和国。"

