###剧本介绍###
bookmark_logo_tt:0 "欢迎来到§C灵§!§g钢§!§Y协奏曲§!！感谢您的游玩，我们仍在§O基础开发阶段§!，大多内容仍在§R测试中§!。"

BM_HISTORY_TITLE:0 "历史简介"

BASTIA_1_NAME:0 "§Y南巴斯蒂亚§!——§C烛中闹市§!"
BASTIA_1_DESC:0 "§L南巴斯蒂亚，巴斯蒂亚人类的起源之地，伟大战争的胜利者，却也是世界大战的失败者。\n\n前人无上的辉煌带给南巴斯蒂亚的不仅仅是追忆，而更有……铤而走险的觉悟。尽管南巴联邦坚挺依旧，尽管政客们都期望相忍为国，但民众§R炽热的欲望§!早已§1暗潮涌动§!。\n\n逐渐恢复的经济并不能掩饰矛盾：§R工人们§!在联邦的高压下早已苦不堪言，§g老兵们§!则回想着二十年前那场耻辱的落败，§Y商人§!跟§Y政客§!们还在祈求联邦能够捱过这艰难岁月，以便重继自己的黄金岁月。\n\n而如今，南巴斯蒂亚只需一颗小小的§O火星§!，便可以拉开帷幕，为世人带来一场精彩至极的§C盛§!§R大§!§g烟§!§Y火§!§1秀§!，亦如，他曾经的§C辉煌§!那般……§!"

BASTIA_2_NAME:0 "§Y东巴斯蒂亚§!——§O徒然胜冠§!"
BASTIA_2_DESC:0 "§L动荡一词，或许是描述东巴斯蒂亚地区近代以来历史的最佳词汇。反反复复的民族革命，不同的意识形态在这片土地上交锋，旧秩序的崩塌和新秩序的崛起，所有势力都在新时代到来前的阴影尽己所能而战。随着东巴大战的结束，沃姆帝国冠冕为了东巴斯蒂亚当之无愧的霸主，奥罗日亚联合王国和远乡王国组成的旧秩序彻底崩塌，纷纷陷入内斗之中。然而，随着新世纪的到来，变革也接踵而至。沃姆徒有其表的霸主地位很快会因为来自内部的顽疾而被打破；旧秩序的幽灵仍在负隅顽抗，亦或者走出新的道路；革命的烈火熊熊燃烧，不知又会将地区的未来带往何方……§!"

BASTIA_3_NAME:0 "§Y西巴斯蒂亚§!——§1如梦之梦§!"
BASTIA_3_DESC:0 "§L故事从七河流域的广阔草原开始，但并未在山丘的向日葵摇曳处停笔，而是用一道流畅的弧线继续着旅程，自北向南一路蔓延至伊索莫丹妮群岛的雨林乃至北半球的南方边界。\n殖民的词性是中性，不论是北方还是南方，一只不可名状的巨兽轰鸣着将本不相干的两个世界纠缠在一起，它有很多名字——现代、文明、工业、精英、进步……当然，这些由“他们”来定义。\n过去和现在交织在一起。这里是梦开始的地方也是梦结束的地方，“野生”与“圈养”，生命的未来又将是怎样的走向？§!"

BASTIA_4_NAME:0 "§Y北巴斯蒂亚§!——§R雪冷血热§!"
BASTIA_4_DESC:0 "§L在无垠的北方大地上，有一个曾深深根植在它所有的子民心中的名词——“帝国”。那是曾经伟大的巨龙之国，其征服的脚步从东方的海洋到西方的“天壁”，所到之处子民仅有臣服一条路可选。然而，帝国的辉煌已然结束，它被殖民者所瓜分，撕碎，最终沦为一具臃肿而腐烂的尸体。随着世界大战的结束，在殖民者的干涉下，北巴斯蒂亚已然陷入彻底的混乱。无数的思想在各地碰撞，殖民者仍在西方蠢蠢欲动，旧帝国的幽灵不曾消散，曾经的革命者在分裂与混乱中坚持各自的理想，意图独立的边疆部族们试图为自由而战，而新生崛起的国度们也在妄图维持自己摇摇欲坠的统治。和平与安定已有数十年不曾降临这片地区，可或许，在未来的某一天……§!"

BOOKMARK_PLAYABLE_CONTENT_TEXT:0 "§C灵§!§g钢§!§Y协奏曲§!：§R测试版§!\n\n§C当前拥有完整游玩体验的国家：§!\n§Y南远乡王国§!-§g君主三线§!（§O徒然胜冠§!）\n§Y南远乡革命阵线§!-§R革命§!§C阵线§!-§t赵永军线§!（§O徒然胜冠§!）\n\n§2当前拥有较多游玩体验的国家：\n§Y克拉亚诺共和国（左线埃米新增内容）§!§C（烛中闹市）§!\n§Y提特兰共和国（社会革命路线）§!§1（如梦之梦）§!\n\n§6当前拥有一定游玩体验的国家：§!\n§Y托莱多联邦§!§C（烛中闹市）§!\n§Y上维尔陶联合公国§!§C（烛中闹市）§!\n§Y勒泰特尼安共和国§!§C（烛中闹市）§!\n§Y奥科特尼安王国§!§C（烛中闹市）§!\n§Y西莉迪亚公社§!§O（徒然胜冠）§!\n§Y七河联邦§!：§g待重置§!§1（如梦之梦）§!\n§Y大于摩至高至福之国§!§1（如梦之梦）§!\n\n§O当前拥有基础内容的国家§!：\n§Y鲁萨尔联盟§!§C（烛中闹市）§!\n§Y西莉迪亚共和国§!§O（徒然胜冠）§!\n§Y皮奥瑞亚共和国§!§O（徒然胜冠）§!\n§Y大喜王国§!§O（徒然胜冠）§!\n§Y吉拉尼亚大公国§!：§g待重置§!§O（徒然胜冠）§!\n\n§1当前仅有骨架内容的国家§!：\n§g所有其它出现在剧本中的政权。§!"

###页面文本###
SPC_bookmarks_western_title_txt:0 "异域来客"
SPC_bookmarks_western_title_tt:0 "§L当巴斯蒂亚人向西望去，就会看到一个以魔法为主体，充斥着形态各异的亚人；但同时也能与当地人类相辅相融的奇异大陆。巴斯蒂亚人一般称之为：西大陆。对于巴斯蒂亚人来说，这些与“杂种”们和平共处，熟练掌握着魔法的西大陆人，就像是从其他世界穿越过来的一样：不可理喻，不可接触。西大陆与巴斯蒂亚大陆唯一一次接触，是在世界大战中对北巴殖民地的争夺。但西大陆的野心与行动绝不可能仅止于此。而西大陆究竟是何种模样，究竟是想要什么，恐怕还要等她那神秘面纱被硝烟与烈火揭开的那一天，才会昭告天下吧。§!\n\n§L至于世界大战中另一股位于西南大陆以牛头人为主体种族的修卡利翁联盟，巴斯蒂亚人绝不会再输给他们，哪怕结局是两败俱伤，永世不得翻身...也绝不会让这些异形杂种们再次登上人类的纯洁大陆。§!\n\n§Y不过以目前来看，对于巴斯蒂亚人来说，这两块大陆还处在浓厚的迷雾当中，无法窥见一丝一毫。§!§R但迷雾，终有散去的一天...§!"

SPC_bookmarks_bastia_title_txt:0 "巴斯蒂亚"
SPC_bookmarks_bastia_title_tt:0 "§Y巴斯蒂亚大陆§!\n\n无数次大战留给巴斯蒂亚大陆的伤痕仍未消散，而那些在废墟中崛起的政权，正迫不及待地准备在新时代的到来前为自己分一杯羹。在南方，联邦的团结正摇摇欲坠，激进分子正冲击着共和革命的最后堡垒；在东方，上次大战的阴霾还未散去，新一轮却仿佛即将开始；在中部，虚伪的联盟即将落下最后的帷幕；而在北方，帝国的遗产化作了一团乱麻，理想主义者，军阀，幸存者，民族主义者，甚至是帝国的最后残余，都企图在新世纪的光耀下实现自己的缥缈碎梦。距离上次世界大战的最后一声枪响沉寂至今已近十余载，可战火从未消散，数千万的灵魂在地狱焚烧，死神则笑看新一轮的冲突再起。\n\n§Y南巴斯蒂亚§!——§C烛中闹市§!\n\n尽管南巴繁荣了千年有余，但极近§1崩溃§!的局面§O正悄然来临§!。因为世界大战的失败，尽管南巴仍想努力§C复兴§!，但大战的余波仍然席卷了联邦：丧失的领土，失去的市场，愈演愈烈的§R工人运动§!和雨后春笋般冒出的§g老兵俱乐部§!——尽管§Y政客们§!依旧奔走呼吁南巴旧时的§C辉煌§!，但在大厦之下，无数的§1蠹虫§!仍在醉生梦死……\n\n§Y东巴斯蒂亚§!——§O徒然胜冠§!\n\n随着世纪末的钟声敲响，东巴斯蒂亚紧张的局势仍未得到缓和。随着沃姆的昙花一现的霸权逐渐显露其弱势，无论是那些旧秩序的幽灵，还是重燃烈火的革命者，各个地区的无数势力都在蠢蠢欲动，准备为自己的理想做最后一搏。胜利，则名留青史，失败，则被扫入历史垃圾堆。\n\n§Y西巴斯蒂亚§!——§1如梦之梦§!\n\n墨精灵——死而复生的生命。这一拥有极高智慧禀赋的种族用最佳的配置、最高的效率和最理性的思考，在不到一百年的时间创造了现代的奇迹。但科学从来不是只有唯一正确的解，面对巨大的文明危机，被神化的奇迹也只会黯然崩解。或许只有当墨精灵们走下神坛的时候，曾经困扰他们的诸多问题才会终于得到根本性的解决。\n\n§Y北巴斯蒂亚§!——§R雪冷血热§!\n\n在帝国腐烂而臃肿的尸体上，无数的思想正在北巴斯蒂亚冲突碰撞。虽然最后一场革命因殖民者的干涉而陷入分裂，帝国各地也基本陷入了无序的混战状态，可仍然不乏能人志士在这样的乱世为理想而奋斗。即便是在遥远的边疆地区，无数新崛起的政权，亦或者是寻求独立的少数种族，也都试图在这样的乱世谋得自己的一席之地……"

