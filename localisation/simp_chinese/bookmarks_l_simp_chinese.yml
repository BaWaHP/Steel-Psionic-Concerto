OTHER_BASTIA_DESC:0 "无论大国还是小国，这个世界上的国家似乎并不都满足于屏声静气地等待着下一场全球冲突的爆发。从濒临内战边缘的大国，到上次大战后才被组建或重塑的众多国家，都不得不在理想与现实之间作出艰难的取舍，而这一切，都将对这个世界的未来产生影响。"

