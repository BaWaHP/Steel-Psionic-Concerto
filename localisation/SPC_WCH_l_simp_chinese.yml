WCHNews.1.t:0 "乌骓王国南下入侵雀鸟地区"
WCHNews.1.d:0 "乌骓王国军队已越过南部边境，向雀鸟地区发动全面进攻。这个位于雀鸟诸国北方的半人马王国，曾经只是七河殖民体系下的边缘领地，却在独立建国后的数十年里完成了相当程度的现代化与工业化，并且得到了相邻的于摩的大力支持。铁路、兵工厂与新式军校支撑起了它并不弱小的战争机器，而如今，这台机器终于被推向南方。\n\n乌骓宫廷宣称，此次军事行动是为了“恢复边境秩序”与“保护王国在南方的合法权益”。然而，几乎没有人相信这套说辞。自雀鸟地区陷入内战与军阀混战以来，乌骓王国便不断在边境集结骑兵、炮兵与机械化部队；而其贵族与军官集团也从未掩饰过对南方土地的野心。\n\n讽刺的是，乌骓国王本人的名声远不如他的军队响亮。关于其荒淫、奢侈与沉迷宫廷享乐的传闻早已传遍中巴斯蒂亚，但王国军队却依然保持着严密的纪律与强悍的战斗力。随着乌骓铁蹄踏入雀鸟地区，雀鸟本就遭受内战之苦的家乡再度承受战火的洗礼。南方的天空下，新的征服者已经到来。"
WCHNews.1.a:0 "这些混账..."
WCHNews.1.b:0 "半人马的野心展露无遗。"
WCHNews.1.c:0 "多事之地。"

