###民族精神###
ARZ_wom_large_mine:0 "沃姆的大矿场"
ARZ_wom_large_mine_desc:0 "我们在很大程度上只是沃姆的一个经济特区，而非独立的国家。沃姆帝国给予我方的行政权限比较低，绝大多数国家收入也需要上缴帝国，同时需要在法律等政策上尽可能遵照沃姆帝国一方的案例，并给予其公民完整权益。尽管如此，阿瑞萨山脉富饶的各类矿石还是使得我们逐渐在帝国内逐渐掌握更大的权益，或许，这能成为未来与其他国家谈判的筹码。"
ARZ_wom_troops:0 "沃姆驻军"
ARZ_wom_troops_desc:0 "我国主要的国防力量都由沃姆派来的驻军构成，其它的仅有各地民兵以及矿业公司偶尔会雇佣的职业士兵，后者在多数情况下不归我们管理。与此同时，沃姆驻军一方还禁止任何试图建立起独立军队的可能，我们的军事发展在很大程度上是完全停滞的。"
ARZ_gathering_storm:0 "酝酿的不满情绪"
ARZ_gathering_storm_desc:0 "由于自治区比起一个普通的国家，更像是沃姆帝国为了自身利益而强行抽出来的一个大矿场，许多民众都对我们的统治抱有不满。戈尔维亚的民族主义者希望能同母国合并；来自矿场的劳工联盟则叫嚣着要推翻现有秩序；来自沃姆的精英又希望我们尽快采取行动组织其他派系的行为。在经济形势尚可的今天，我们还大概应付得来，但形势会一直好下去吗…"

###领导人###
ARZ_kieran_walsh:0 "基兰·沃尔什"
ARZ_kieran_walsh_desc:0 "基兰总督想破了头皮也不曾想到自己居然能成为一个“国家”的领导人。出生于顿恩平原地区的他有一个相对富裕的家庭，他的商人父母给予了他远超于多数同龄人的资源，并最终允许他进入沃姆帝国留学。在大学专修国际关系的他于东巴大战前夕成为了一名外交官，他协助了东巴大战结束后的外交条约签署，并参与周转沃姆帝国于其它附属国的各类协定。慢慢地，他不知不觉地成为了政府中相当有名望的一名外交官。\n\n他会成为阿瑞萨自治区的总督是一次临时而意外的决定。原本他应当出任沃姆帝国与自治区协调总管，同时辅佐自治区的统治；结果原先的总督在穿越阿瑞萨山脉时因事故坠落山崖，基兰则出任了临时的自治区总督。在证明了他除了是一名优秀的外交官以外还是一名出色的政治家后，沃姆帝国官方放弃了指派一名新总督的决定，并正式任命了基兰总督的地位。\n\n虽然当上总督是基兰人生的重大转折点，他似乎并不对此抱有乐观态度。潜藏在自治区下的敌人正跃跃欲试，而他很清楚，一昧地遵照贪婪帝国的需求的话，他作为总督的头颅和自治区的名牌早晚要被怒火所斩下。或许改革势在必行，但基兰需要先思考一下怎么做。"

