FWJ_federation_shield_desc:0 "作为原中巴斯蒂亚联盟的联邦卫戍军，西部的卫戍军在内战爆发后便迅速平定了防区内的混乱，并与当地的一些地方私兵合并，宣告建立西部防区。相比于深陷极端暴乱势力中的东部防区，西部防区起码与共和国司令部相邻且能获得一定的支援。作为由南巴联邦派遣的卫戍军，他们自然与已经成立司令部的大陆军站在一起——你们这些乡巴佬，居然敢造反？等着，等我们派遣泰坦过来帮你们全都送上天！§2中巴斯蒂亚联盟过去，现在，未来都将属于南巴斯蒂亚联邦§!！"

