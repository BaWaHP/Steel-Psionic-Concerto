IMCNews.1.t:0 "“伟大理想终成真”"
IMCNews.1.d:0 "之前一段时间，不安的消息从提特兰最后的一些军阀的电台求助之中流出，那是一段段近乎绝望的求救，而在数个月后的今日——现在提特兰陷入了沉寂，不再有一条消息传出。在长久的分裂之后与过去一段时间各个政权对自己“提特兰正统”的争夺后的今日，这样的消息无疑代表了人类诸国最不希望看见的情况发生了：\n\n残暴的米诺陶消灭了提特兰土地上所有人类军阀，曾经世界大战之后南提特兰发生过的疯狂将在庞大的提特兰之上。少数逃出来的幸存者都几乎半死不活，被饿的皮包骨头，身上到处是伤口与淤青，口中描述着米诺陶的军队们正在准备什么“仪式”以祭拜他们的神祇。\n\n目前各个人类国家，无论战争或和平，都对米诺陶的新政权发去谩骂与辱骂，而回应他们的，只有无尽的静默，就好像提特兰那边从未生活过生物。\n\n而在鲁萨尔的魔法师们则敏锐的感到了不妙，据不少比较资深的魔法师的魔力感知，提特兰地区正在有一团巨大的魔力不断凝聚……"
IMCNews.1.a:0 "“勇士之神弥忒勒万岁！无敌太阳神奥德修斯万岁！”"
IMCNews.1.b:0 "哦，人类，啊，天哪……"

