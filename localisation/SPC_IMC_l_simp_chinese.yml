IMC_odysseus_ischia_superbia_title:0 "\n§8在你面前的是：殖民地方阵元帅，苏佩尔比亚家族族长，伊斯恰军管邦的缔造者，世界大战的战争英雄，雷阿尔蒙特的焚毁者，坎达德尔的摧毁者，厄利斯林血脉的继承者，伟大东征的复兴者，桂冠冠军，各城市的保卫者，共和派的梦魇，僭主的典范，米德斯的建立者，金与火之主，奥德修斯·伊斯恰·苏佩尔比亚元帅。§!\n"
