###政党名称###
IMC_pioneer_communism_party:0 "殖民地方阵"
IMC_pioneer_communism_party_long:0 "殖民地方阵-金色方阵\n§g金色方阵是特勒马科斯在父亲手上接过的第一件事，金色方阵多是和他一样的青年牛头人，当中不少人也曾经是共产党，但是在来到这里之后逐渐在思维上产生了转变，他们开始尝试将民族主义与共产主义进行一个融合，特勒马科斯在其中起到了关键性的作用，一个米诺陶民族的共产主义社会并不是不能接受，他们也公然宣称，他们才是唯一实践的共产主义者，在对提特兰人的灭绝性劳动中，为真正适合共产主义的米诺陶民族已经率先实现了社会主义。§!"
IMC_revolutionary_communism_party:0 "逃奴军团"
IMC_revolutionary_communism_party_long:0 "逃奴军团\n§g逃奴军团是在战后的人类共产主义者游击队中势力较为庞大的一支部队，他们由逃兵与逃奴组成，他们的意识形态上自然的更加偏向左翼，但是几乎没有统一指挥，只能在广大的乡镇与城市的边缘地带，以非中心化的方式进行活动。§!"
IMC_worldunion_socialist_party:0 "福音救世军"
IMC_worldunion_socialist_party_long:0 "福音救世军\n§g福音救世军实际上和另一个世界的“世界联盟”没有任何关系，或者唯一的关系极有可能是他们崇拜的一具已经木乃伊化的联盟特工尸体有关，这一派系对于这具尸骸的崇拜令人感到古怪和奇怪，他们虽然宣布这具遗骨有“开口显圣”和“五日复活”的奇迹，但是从未见之施展。§!"
IMC_worldunion_democrat_party:0 "南提特兰抵抗组织"
IMC_worldunion_democrat_party_long:0 "南提特兰抵抗组织-红派\n§g南提特兰抵抗组织的本质上是南巴斯蒂亚的人类民族主义者中分裂出来的提特兰地方组织，但是在他们真的抵达了伊斯恰军管邦后，他们不由得在米诺陶的手段下拼命逃命。自由世联主义者作为抵抗组织中的左派（被称为红派），他们实际的存在感极为薄弱，你几乎寻找不到几个在目睹米诺陶的“丰功伟业”后还能保持理性的，宣称自己是自由世联主义者的人。§!"
IMC_liberal_republican_party:0 "南提特兰抵抗组织"
IMC_liberal_republican_party_long:0 "南提特兰抵抗组织-红派\n§g南提特兰抵抗组织的本质上是南巴斯蒂亚的人类民族主义者中分裂出来的提特兰地方组织，但是在他们真的抵达了伊斯恰军管邦后，他们不由得在米诺陶的手段下拼命逃命。种族自由主义是大多数是放弃掉了自由世联主义理想的抵抗者，他们放弃了世联的温和面具，抛弃掉人道与道德，投入对米诺陶的战争。§!"
IMC_conservative_republican_party:0 "南提特兰抵抗组织"
IMC_conservative_republican_party_long:0 "南提特兰抵抗组织-金派\n§g南提特兰抵抗组织的本质上是南巴斯蒂亚的人类民族主义者中分裂出来的提特兰地方组织，但是在他们真的抵达了伊斯恰军管邦后，他们不由得在米诺陶的手段下拼命逃命。保守主义者们经常说，如果一切都不怎么改变，那便一切皆可；但是南提特兰的情况远远超过了保守主义者的想象，他们甚至与共产主义者都拉上了线，也只是为了南提特兰的人类不被灭绝。§!"
IMC_authoritarian_republican_party:0 "米德斯集团"
IMC_authoritarian_republican_party_long:0 "米德斯集团\n§g米德斯集团是伊斯恰军管邦经济这一名词本身的含义，整个军管邦几乎所有的工厂，产品，奴隶皆为米德斯集团的产物，其统合了一个国家的生产力，不断地制造着本土与军管邦所需要的一切，从制造业到农业，从黑市上的毒品到市场上的必要生活品，奢侈品，米德斯全部都生产，全部都售卖。而在其后，就是一个令人绝望的血肉工厂，米德斯\n\n保安军团与奴隶制不断地鞭打者整个南提特兰的人类。§!"
IMC_national_socialist_party:0 "殖民地方阵"
IMC_national_socialist_party_long:0 "殖民地方阵\n§g可以任意对待被征服者是战争给予征服者的权利。\n——奥德修斯·伊斯恰·苏佩尔比亚§!"
IMC_authoritarian_nationalism_party:0 "南提特兰抵抗组织"
IMC_authoritarian_nationalism_party_long:0 "南提特兰抵抗组织-蓝派\n§g南提特兰抵抗组织的本质上是南巴斯蒂亚的人类民族主义者中分裂出来的提特兰地方组织，但是在他们真的抵达了伊斯恰军管邦后，他们不由得在米诺陶的手段下拼命逃命。人类霸权主义者或许才是南提特兰抵抗组织的真正主力，他们抛开了国别与语言，在对米诺陶的愤怒中爆发出了惊人的影响力。§!"
IMC_paternal_autocrat_party:0 "伊斯恰文官团体"
IMC_paternal_autocrat_party_long:0 "伊斯恰文官团体\n§g在军管邦尚未成立，奥德修斯这头疯牛还未登场之时，文官系统是占领区各项事宜的维持者，他们尽心尽力，但是尝试全部失败，甚至让占领区出现大规模起义，而在军队彻底管理占领区后，他们只能在少数繁杂无必要，不会被采纳环节尚且存在，并且因为那是因为奥德修斯在折磨他们。§!"
IMC_wizard_rules_party:0 "黑阳崇拜"
IMC_wizard_rules_party_long:0 "黑阳崇拜\n§g黑阳崇拜是南提特兰一种广泛的米诺陶法师信仰，他们对于身为人类的黑阳的魔权力量感到兴趣，他们宣称黑阳的魔法是一种“替代魔法”，只需要在提特兰地区的某一座“最隐秘的山峰之脚”演奏充斥魔法的乐章，便可以获得永生，成为“比物质存在更高等的存在”，摧毁掉陈腐的物质世界，在其上建立新的国度。§!"
IMC_religious_extremism_party:0 "“东征军团”"
IMC_religious_extremism_party_long:0 "“东征军团”\n§g东征军团崇拜是雷阿尔蒙特地区的提特兰本土纳卡信仰的一种分支，这一狂热的信仰相信着提特兰帝国东征时代的诸军团成为了圣人，时时刻刻指引着世界的万物律动的规律。而在米诺陶对雷阿尔蒙特地区展开大屠杀之后，这一信仰就愈发偏向极端，不断地袭击着殖民而来的米诺陶们。§!"
IMC_anarchism_party:0 "米德斯集团"
IMC_anarchism_party_long:0 "米德斯集团-自由派\n§g一般来说，自由市场是经济运行的典范的理论，而米德斯集团中的自由派们也深以为然，他们主张将米德斯拆分成数以万计的小型企业——形成一个松散的，自由市场的无政府邦联，在其中不再会有垄断与税收，唯有自由市场的无形之手操控一切。§!"

###领导人###
IMC_telemachus_ischia_superbia:0 "特勒马科斯·伊斯恰·苏佩尔比亚"
IMC_runaway_slave:0 "“逃奴”"
IMC_remains_of_the_saint:0 "“圣徒遗骸”"
IMC_bastia_freecorp:0 "巴斯蒂亚自由军团"
IMC_laertes_ischia_superbia:0 "拉埃尔特斯·伊斯恰·苏佩尔比亚"
IMC_odysseus_ischia_superbia:0 "奥德修斯·伊斯恰·苏佩尔比亚"
IMC_odysseus_ischia_superbia_desc:0 "奥德修斯·伊斯恰·苏佩尔比亚出生于厄利斯林波利斯的苏佩尔比亚家族，作为一个颇为古老的军事贵族家庭，他从小便痴迷着厄利斯林元帅的故事，从征服修卡利翁诸城邦，再到跨海征服上下托勒姆克的孱弱猫人，他从很小就参与了厄利斯林波利斯的青年掷弹兵方阵，后进入厄利斯林波利斯军校学习，毕业后转入北托勒姆克军区。\n\n而在世界大战爆发之后，他立刻从北托勒姆克军区赶到半岛前线，作为第三集团军的参谋，一开始他仅负责在前线侦查及飞行员训练。而当同盟军在登陆点周边遭到强烈抵抗时，他亲自带领一只仅有255人的临时部队，在五天内击溃了王国军东侧的民兵阵地后，他正式荣升修卡利翁桂冠冠军的荣耀，此后的战役中，他指挥的部队也是第一个攻入阿格里真托（旧称雷阿尔蒙特）的。\n\n在战争的中后期，他对于占领区的管理被誉为米诺陶式军队的典范。在战后，这些荣耀然他这让他成为几乎整个同盟最年轻的将军，但是在军事上的建树并不能掩盖这位傲慢米诺陶的在政治上的不堪——他是个铁杆的僭主派，和同盟内的共和派完全玩不到一起去。\n\n而接下来，他在战争结束后指挥部下抢走赔偿款的行径更让温和的共和派愤怒，以最高同盟议会的诸邦主们的名义，将他开除本土军籍，将他派遣到占领区，让他作为殖民地元帅，让他作为本土的棋子，干扰不到本土的政治环境。\n\n而他确实成功的治理了这片土地，是他一手用他手下的军队建立的军管邦，用雷霆的手段教了教愚笨的人类什么才是价值，是他将殖民地工业统合成立了米德斯，让这片该死的土地知道了什么是财富，他带上了桂冠，他是征服者！他是皇帝！他是“金与火之主”！"
IMC_republican_civilian_associations:0 "共和派文官结社"
IMC_eastern_expeditionary_corps:0 "“东征军团”"
IMC_the_cult:0 "“教团”"
IMC_free_market_voice:0 "自由市场之音"

###民族精神###
IMC_the_second_ursuline_expedition:0 "第二次厄利斯林东征"
IMC_the_second_ursuline_expedition_desc:0 "自古老的时代开始，米诺陶民族就在血缘中被烙印下了征服者的遗产，无论是征服上下托勒姆克的猫人，还是墨瓦腊泥加诸城邦的统一战争，同盟的疆域一直再朝着东方前进，直到他们遇到了第一个壁垒，提特兰帝国。在此之后，修卡利翁同盟就费心费力的尝试登上巴斯蒂亚大陆，而在这个想法的千年之后，他们如愿以偿，得到了第一个登陆点。\n\n这是修卡利翁黄金时代的开幕，所有人都这样认为——他们将会逐步征服整个世界，并且将他们洗涤成米诺陶民族的模样。"
IMC_corpo_and_tyrant:0 "§O寰企§!与§g僭主§!之暴政"
IMC_corpo_and_tyrant_desc:0 "在米诺陶之外，伊斯恰军管邦依旧存在着少数民族——或者说，多数民族。提特兰人才是这篇土地原始的主人，但是他们现在并不能获取哪怕一丝丝权利，只能在奴隶主的奴役下过活。整个伊斯恰军管邦就是由这两个奴隶主组成的，§1巨型企业§!§O米德斯§!与殖民地方阵，两者亲密无间，又两看两厌，但两者相同的特点就是他们并不在意提特兰人的生命。"
IMC_island_game:0 "群岛博弈"
IMC_island_game_desc:0 "伴随着从七河本土航向群岛方向的船只正在减少，七河的情况令修卡利翁同盟嗅到了一丝变化。七河联邦与七河属南巴斯蒂亚公司的势力正在逐渐消散，关于七河的贸易额也在匀速下滑，虽然这些证据不足以宣称七河正在衰弱，但是本土依旧命令伊斯恰发起了试探，让他们支援群岛的原住民掀起叛乱。"

###动态修正###
IMC_glory_of_colonization_1:0 "殖民之伟业-第一阶段"
IMC_glory_of_colonization_1_desc:0 "丝毫不用质疑，米诺陶民族就是这个世界上最伟大，最荣耀的民族。\n\n其他的民族无不只是在所谓“文明的辉光”下做着白日的美梦，占据着大好的土地，却计较于利益与民族矛盾。而第一阶段的目的就是要建立在大陆之上的米诺陶国家，让大陆上的家伙们为修卡利翁同盟的生存空间腾出空间。\n\n§t毫无疑问的，这件事与本土的情况息息相关，如果本土出现什么问题，这项计划可能就会遭到极大的困难。§!"

###地区修正###
IMC_odysseus_miracle_colossus:0 "奥德修斯奇迹巨像"
IMC_odysseus_miracle_colossus_desc:0 "奥德修斯奇迹巨像是一个大理石拼接而成巨大的雕塑，全高50米，利用光照魔法巨型灯塔的功能。而最让人感到称奇的是，这雕塑完全的将奥德修斯·伊斯恰·苏佩尔比亚的全身都惟妙惟肖的雕刻了出来，而底座——由无数坎达德尔王国贵族家族标志融化成的四口大钟，每日中午12点都会按照顺序敲响修卡利翁同盟的国歌《厄利斯林元帅颂》的前三句。"
IMC_malakanda_bactra_palembang_project_2:0 "马拉坎达-巴克特拉巨港计划：第二阶段"
IMC_malakanda_bactra_palembang_project_2_desc:0 "马拉坎达-巴克特拉巨港计划是一个十足的疯狂计划，奥德修斯授意下，两个城市的古代港口将被现代化，随后将会彻底连成一片庞大的，横跨两个城市海岸的巨型港口，为从本土抵达的货轮与军事船运进行贸易。"
IMC_eastern_expedition_memorial_valley:0 "东征纪念谷"
IMC_eastern_expedition_memorial_valley_desc:0 "在你面前的，是提特兰地区最大的种族屠杀的证明，奥维德天坑，米诺陶则称这里为东征纪念谷。这里有老弱，有妇孺，也有残兵败将，王侯将相，但是无一例外，他们都是人类。奥德修斯·伊斯恰·苏佩尔比亚在这里犯下让人感到发指的罪行后，将这一罪行宗教化，正义化，以及原原本本的将无数人的尸骸列为“纪念博物馆”，让米诺陶们参观，娱乐。"
IMC_areas_undergoing_minoanization_1:0 "正在米诺陶化的地区：第一阶段"
IMC_areas_undergoing_minoanization_1_desc:0 "§t中队兵已经出动\n中队兵已经出动\n该省份正在管制阶段§!"
IMC_areas_undergoing_minoanization_2:0 "正在米诺陶化的地区：第二阶段"
IMC_areas_undergoing_minoanization_2_desc:0 "中队正在驱逐当地城市、乡村人口人类。60%遣散到东方统一管理，40%留在当地中队处理。"
IMC_areas_undergoing_minoanization_3:0 "正在米诺陶化的地区：第三阶段"
IMC_areas_undergoing_minoanization_3_desc:0 "米诺陶定居者们正在迁入当地，将当地变成一个米诺陶民族的省份。"
IMC_sacred_mountains:0 "神圣山地"
IMC_sacred_mountains_desc:0 "这里是提特兰地区的最高之山，也是最庞大的山地，在提特兰宗教的圣典上，这里也是最神圣的高山，穆勒斯的神圣造物。在数千年中，几乎没有人定居这里，直到今天，帕塔拉中队在这里驻扎。"
IMC_centralized_processing_area:0 "集中处理区"
IMC_centralized_processing_area_desc:0 "§R你的种族一无是处，你的存在无可救药，而你唯一的救赎就是劳动，劳动带来解脱。§!"
IMC_alliance_and_marshal_outpost:0 "同盟与元帅前哨站"
IMC_alliance_and_marshal_outpost_desc:0 "此地便是群岛争夺战的前锋之地，米诺陶们在这座岛屿上新建碉堡，剑锋直指群岛之争；但是牛头人之间亦有差别，本土来的间谍们与残暴的军管邦军人们的相处方式，亦然是岛屿上的趣闻。"

