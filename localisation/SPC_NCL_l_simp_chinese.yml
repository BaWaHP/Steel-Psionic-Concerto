###民族精神###
NCL_being_puppet:0 "国失凤翅，夺私控制"
NCL_being_puppet_desc:0 "我们的政权，是联合王国通过在西莉迪亚军国中取得一定势力范围的至上的国王运动成员通过协调成立的，是以联合王国对路切尔纳发动军事行动来促使独立的。因此，至上的国王运动与联合王国在我们国家的政府中拥有完全的控制度，我们对此无能为力，只好将国家政权作为他们手上的筹码罢了。"
NCL_lack_nation_identity:0 "事已至此，自诩誓死"
NCL_lack_nation_identity_desc:0 "北西莉迪亚的政权在恍然间悄然成立，以至于人们对此感到困惑与不安，人们是曾经想过回到平和的君主主义统治之下，但是这一切似乎来得太快了，以至于人们完全没有反应过来，大部分的人只是在空喊着口号，而对于这个新生的国家，他们没有任何想法。"

