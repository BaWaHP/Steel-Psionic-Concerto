###民族精神###
HCB_wom_trade_treaty:0 "《希卡博尔-沃姆友好通商协定》"
HCB_wom_trade_treaty_desc:0 "《希卡博尔-沃姆友好通商协定》于三年前签署。该协定规范了希卡博尔共和国和沃姆帝国之间的通商合作，共和国会以转移部分产能并给予商业特惠权威代价，换取沃姆帝国的保护，并加入成为沃姆势力圈中的一员。虽然不愿同君主制国家维持合作关系，但内部冲突不断的共和国确实无法承担下一场战争，再说了，沃姆人似乎没打算帮斯布里奇王国统一。"
HCB_legacy_of_independent_war:0 "独立战争的遗产"
HCB_legacy_of_independent_war_desc:0 "伟大的革命先烈看出了斯布里奇王国必然的衰弱，于是他们听取了人民的呼声，选择揭竿而起，向王国发起了独立战争。然而，战争并非一帆风顺，虽然斯布里奇王国如今衰弱至极，在当初并非如此羸弱，我们临时组织起来的民兵也并不能轻松毁灭现代化的王国军队。虽然最终取得了胜利，战争的伤痕仍然遗留在人民身上。"
HCB_republican_guard:0 "共和国卫队"
HCB_republican_guard_desc:0 "共和国卫队由最早独立战争时期的民兵发展而来，虽然我们曾试图进行现代化改革，国内的地方自治派却不认为这是个好主意，许多掌握着兵权，且因为独立战争而颇有名望的地方领导人都不愿意将权力送给中央政府。这使得我国的部队组织极其困难，缺乏现代化的武装和训练方式，而且常常表现出叛逆行为。"
HCB_increasing_political_violence:0 "愈演愈烈的政治暴力"
HCB_increasing_political_violence_desc:0 "虽然在独立战争时期尚可维持和平，如今共和国却正被无尽的政治暴力所充斥并破坏。随着不同政党，派系的区分逐渐明了，愈发激进的“竞选活动”成为了主流。不同意识形态的党员时常在大街上爆发冲突，采用极端的暴力行为来应对所谓的“敌人”，又或者是送出间谍，在后背搞上一些破坏，全然不顾共和国的发展。"

###领导人###
HCB_neil_mcLeod:0 "尼尔·麦克劳德"
HCB_neil_mcLeod_desc:0 "尼尔的胜利可谓是奇迹，无论是他出乎意料地成为希卡博尔民族党推举出来的总统候选人那次，还是最终民族党奇迹般的打败自由党和保守党两大党那次。但比起那些欣欣自喜，目光短浅的普通党员而言，尼尔看到了更多。\n\n共和国正处在历史的关键时刻。无论是北方斯布里奇王国的急速衰弱，亦或是沃姆由于新皇登基而暂时温和化，还是西部中巴联盟逐步走向混乱，种种现象都印证了一点：人民迫切地需要一位强大，能带领共和国走向辉煌的领导人，而不是像保守党或是自由党承诺的那样，“维持独立”。总有人要带领共和国走向辉煌，总有人要为希卡博尔的伟大复兴负责，帮助共和主义于东巴斯蒂亚扎根。\n\n然而，尼尔在其任期中并没有做太多的改革。除去打压反对派的政治暴力行为外，民族党对太激进的改革，或者说选票杀手，并不感兴趣。这对尼尔来说绝非好消息。接下来，他或许会继续尝试降低政治暴力的烈度，为下一次民族党竞选保驾护航；又或者，他也可以做点真正有用的，比如修复一下经济，兴许这能提高他的声望，拉拢更多人参与到改革中去。"

