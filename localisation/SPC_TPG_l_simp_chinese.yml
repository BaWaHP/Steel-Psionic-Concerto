TPG_make_a_fresh_start:0 "另起炉灶"
TPG_make_a_fresh_start_desc:0 "公国已经看清了沃姆企业的面目，他们只想把公国的市场吃干抹净。我们不能再继续纵容他们的垄断，必须该做点什么了。"
TPG_develop_the_west:0 "开发中西部"
TPG_develop_the_west_desc:0 "中西部是我国经济建设的重点，这些地区所埋藏的资源吸引着大量的投机者，可以加以利用。"
TPG_research_synthetic_resource:0 "研究合成资源"
TPG_research_synthetic_resource_desc:0 "吉拉尼亚地下深埋资源是公国赖以生存的根本，这些喷涌的黑金是上天赐予我们的珍宝。为了进一步利用这些资源，我们将继续研究合成资源。"
TPG_dig_deeper:0 "向下钻！"
TPG_dig_deeper_desc:0 "向下，再向下！据那些科学家勘探，这里的地下一定贮藏着更多的石油，让我们的钻机继续向下钻探。"
TPG_capital_construction_plan:0 "首都建设规划"
TPG_capital_construction_plan_desc:0 "大公堡一直未曾做过任何有效的建筑规划，仅依靠皇宫向外辐射发展成一座“拥挤”的城市。为了长远发展，我们必须拆除一些建筑并重新规划首都未来的建设计划。"
TPG_34_dynamic_modifier:0 "首都建设规划"
TPG_start_up_subsidy:0 "创业补贴"
TPG_start_up_subsidy_desc:0 "由于缺少对于新企业的扶植，公国的市场非常缺少活力，使得沃姆企业得以畅通无阻的主导我国市场。为了争夺市场的控制权，我们将加大对企业的补贴力度。"
TPG_merger_small_enterprise:0 "吞并小型企业"
TPG_merger_small_enterprise_desc:0 "公国工业生产主要以小作坊为主，这严重限制了我们发展工业的能力。新法律中允许公国企业吞并其他小型企业来集中生产资料。"
TPG_merger_small_enterprise_tt:0 "解锁决议§Y统合企业§!"
TPG_epiboly_city_construction:0 "外包城区建设"
TPG_epiboly_city_construction_desc:0 "公国大部分地区仍属于乡镇，我们应该把城市化的工作交给熟练的沃姆人来做，即使这会微微提高他们在我们国内的影响力。"
TPG_bring_in_wom_production_line:0 "引进生产线"
TPG_bring_in_wom_production_line_desc:0 "虽然要价颇高，但引进沃姆的先进生产线能强化我们的生产能力。"
TPG_develop_colony:0 "开发远乡殖民地"
TPG_develop_colony_desc:0 "大战后公国割去了远乡西北角的大量土地，在长达几年的驯化后，终于可以着手开发这片土地了。"
TPG_confiscate_means_of_production:0 "清点麟人生产资料"
TPG_confiscate_means_of_production_desc:0 "那些仓促撤离的远乡资本遗落了大量的生产资料，绝大多数被愿意归顺的麟人中饱私囊，该收回这些本属于公国的战利品了。"
TPG_reverse_study:0 "逆向研究"
TPG_reverse_study_desc:0 "我们的科学家声称他们正在逆向解析远乡车床的零部件，并保证能在短时间内提升公国的工业及电子学研究能力。"
TPG_despite_the_hardships:0 "千淘万漉虽辛苦"
TPG_despite_the_hardships_desc:0 "在过去一段时间的艰苦奋斗中，公国的工业和科研能力取得了长足的发展，现在可以享受所结成的果实了。"
TPG_despite_the_hardships_tt:0 "解锁决议§Y成立联合科晶集团§!"

