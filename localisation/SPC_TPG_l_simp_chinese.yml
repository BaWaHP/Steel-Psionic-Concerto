###国策###
TPG_newyear_speech:0 "皇室新年演讲"
TPG_newyear_speech_desc:0 "“本次新年演讲在皇宫花园举行，大公会在这个特殊的时刻与全体国民分享他的新年愿望，并向公民告知来年发展的方向。希望这次演讲能够为公国带来团结，希望和力量。同时也祝愿水晶子民和沃姆朋友们新年快乐。”"
TPG_proclaim_martial_law:0 "宣布戒严"
TPG_proclaim_martial_law_desc:0 "“为了维护公国的安全和稳定，政府决定宣布全国进入戒严状态，并封锁首都。在这个艰难的时刻，皇室呼吁每一位公民保持冷静和理智。遵守政府的指示和命令，配合安全部门和军队的工作，秩序必须被保证。”"
TPG_torture:0 "拷问"
TPG_torture_desc:0 "在公国政府的施压下，冒险者联盟终于告知了我们委托人的身份——一位名为奥利维亚·泰勒的普通人类公民。随着我们的深入调查得知他是名为“救国阵线”组织的成员，为了获得更多信息必须尽快对他组织抓捕。"
TPG_torture_tt:0 "§Y选中时的效果：§!\n政治点数：§G+50§!\n\n§Y完成后的效果：§!"
TPG_clean_human_resistance:0 "清剿人类抵抗组织"
TPG_clean_human_resistance_desc:0 "人类抵抗组织的所作所为与其说是追求平权，更像暴徒是在发泄积蓄已久的怒火。学校，教会，工厂等许多由水晶族控制的产业都曾受到过该组织的袭击。为防止其他激进组织效仿犯罪，中央政府将动员大量军警以逮捕并处决该组织的极端成员以儆效尤，但这也会使得他们的抵抗更加激烈。"
TPG_clean_human_resistance_tt:0 "§Y人类抵抗组织鹰派§!追加效果:\n每月工业发展水平:§G+2§!\n每月农业发展水平:§G+2§!\n建造速度:§G+5.00%§!"
TPG_dialogue_moderates:0 "对话温和派"
TPG_dialogue_moderates_desc:0 "人权运动中中仍有许多人是相信政府会因他们的行动做出改变，而加入集会和游行。中央政府将与这些温和派的领导者洽谈，并对他们提出的诸多要求上做出适当的让步以换取他们的支持和复工，以从内部瓦解这次暴动。"
TPG_dialogue_moderates_tt:0 "§Y人类抵抗组织鸽派§!追加效果:\n建造速度:§G+5%§!\工厂产出:§G+5%§!"

TPG_pacify_workers_and_peasants:0 "安抚工农"
TPG_pacify_workers_and_peasants_desc:0 "一两位岗位关键的工人罢工而参与平权组织就足以大大降低工业产出的效率，广大农民的愤怒更是影响了大公统治的根基——粮食。形式迫使大公做出了选择，政府打开国库中贮藏的金银，来补贴工农和企业在罢工中的损失。这或许不是最好的办法，但现今必须放出足够的价码安抚他们开工。"
TPG_pacify_workers_and_peasants_tt:0 "§Y人类抵抗组织鹰派§!追加效果:\n£prod_eff 生产效率增长:§G+10.00%§!\n每周稳定度:§G+0.5%§!"
TPG_ensure_military:0 "确保军队"
TPG_ensure_military_desc:0 "国内的风波终究是渗透了军队，暴徒中手持的武器大多数由粗制的铁器构成，但也有少部分报告证实他们持有现今军队列装的步枪和附魔装备。 通过武器编号，我们可以反向调查可疑的驻地，并对叛国者实施逮捕以确保动乱中军队的忠诚。"
TPG_ensure_military_tt:0 "§Y人类抵抗组织鹰派§!追加效果:\n陆军组织度恢复:§G+10.00%§!\n每周稳定度:§G+0.25%§!"
TPG_reduce_privileges:0 "削减晶裔特权"
TPG_reduce_privileges_desc:0 "作为行动主力的救国阵线在军警的清剿下声音渐熄，原先声势浩大的平权运动随着晶裔和政府的妥协而逐渐平息，忙于舔舐伤口的晶裔也无暇再做出抗议。现如今出现了一个短暂的窗口期给予大公兑现原先的部分诺言。"
TPG_reduce_privileges_tt:0 "§Y人类抵抗组织鸽派§!追加效果:\n战争支持度:§G+5%§!\n资源获取效率:§G+5%§!\n§Y水晶优先§!追加效果:\n研究速度:§G+5%§!\n生产效率上限:§G+5%§!"
TPG_silence_project:0 "缄默计划"
TPG_silence_project_desc:0 "围绕晶裔所建立起来的制度乃是大公国的根基，任何妄图将其撼动的宵小都将被被清除。军警将在线人和密探提供的可靠情报帮助下迅速清剿人类抵抗组织的各处据点，此后他们将再也无法发声。\n §R（此线路还未完工，请勿与权力回流一同选取）§!"
TPG_silence_project_tt:0 "§R这可能会引起意料之外的后果§!"
TPG_clear_up_corruption:0 "清除腐败"
TPG_clear_up_corruption_desc:0 "介于公国政府一直以来对于界定；惩戒腐败一直以来的暧昧态度，贪污和权钱交易在我国并不少见。"
TPG_clear_up_corruption_tt:0 "§Y水晶优先§!追加效果:\n人民生活质量:§G+2§!\n工厂产出:§G+5%§!"
TPG_draft_constitution:0 "修订宪法"
TPG_draft_constitution_desc:0 "我国一直没有编撰完整的宪法典，取而代之的是自1730年伟大战争时期开始签订的一系列宪法性法律文件。其分散繁杂的条目常常导致地方政府可以按照自己的理解来“施行”这些法律，在国内的动乱结束后，大公认为有必要整编一部统一的宪法典。"
TPG_prohibit_useless_department:0 "取缔冗余部门"
TPG_prohibit_useless_department_desc:0 "政府效率低下的最大祸首就是我国臃肿的行政机关，许多部门的存在没有任何缘由，只会在领取薪水和发拨预算时出现。经审查后，这些幽灵部门将会被尽数解散，而其他职权相似的部门将会被整编。"
TPG_expand_secret_police:0 "扩充秘密警察"
TPG_expand_secret_police_desc:0 "此次刺杀事件的爆发让大公深刻意识个人安全的巨大隐患，为防止类似事件的再次发生，将扩大我们的秘密警察的队伍和职权以防范于未然。"
TPG_investigate_local_nobility:0 "调查地方贵族"
TPG_investigate_local_nobility_desc:0 "针对刺杀案中指向贵族证据的调查收到了超乎想象的阻力，证人陆续“意外”身亡，探员收到各类恐吓信。但这些都不能阻拦政府深入调查的决心，为此大公批准了一项关于重启和扩充中央情报部门的法令，给予其跨部门执法权和极高的权力以彻查案情。"
TPG_woo_the_neutral:0 "团结忠诚者"
TPG_woo_the_neutral_desc:0 "阴谋已经逐渐浮出水面，在如今诡橘莫测的形势之下，保持中立的贵族维持着君臣之间的微妙平衡。这些贵族并非没有野心，而是期待着双方投下更多筹码，再站在胜者一方获取最大的利益。大公将亲自与他们接触，承诺将原先贵族的利益让渡部分给他们以换取忠诚。"
TPG_woo_the_neutral_tt:0 "§Y贵族不满§!追加效果:\n战争支持度:§G+10.00%§!"
TPG_organize_the_list:0 "整理名单"
TPG_organize_the_list_desc:0 "中央情报部反馈许多贵族都直接或间接参与了有关谋反的活动，但并不排除其中有被故意释放而起到干扰作用的情报。无论如何，根据这些信息，我们得以整理了一份嫌疑名单，作为政府接下来的打击对象。"
TPG_deprivate_alien_titles:0 "剥夺异己头衔"
TPG_organize_the_list_tt:0 "§Y贵族不满§!追加效果:可以修改内阁和法律"
TPG_deprivate_alien_titles_desc:0 "介于调查结果所涉及的范围之广，针对个体的打击已经毫无意义。因此政府从公安部门中抽调组合了数支精锐小队后，便联系牵扯较浅者劝说他们自愿“放弃”自己的贵族头衔以避免死亡的结局，并让其中拒绝的贵族默默消失。"
TPG_deprivate_alien_titles_tt:0 "§Y贵族不满§!追加效果:\n战争支持度:§G+5.00%§!\n每周战争支持度:§G+0.25%§!"
TPG_recentralize_power:0 "权力回流"
TPG_recentralize_power_desc:0 "在过去的时间里，贵族已经不再承担维系国家稳定的“润滑剂”抑或是在战场上英勇作战的精英，而是滋生腐败和罪恶的温床。而这一角色终将被历史所抛弃。公国将通过一系列法令逐步瓦解贵族这一概念。"
TPG_recentralize_power_tt:0 "§Y贵族不满§!追加效果:\n政治点数:§G+10.00%§!"
TPG_cleaning_time:0 "扫除时间"
TPG_cleaning_time_desc:0 "在子弹摧毁他们的魔能核心前，这些内奸或许还妄想着能够逃脱政府的审查。在中央情报局和策反贵族的通力合作下，这些不安定分子将被一网打尽，以摧毁其余贵族在我国政府内的情报网。"
TPG_cleaning_time_tt:0 "§Y贵族不满§!追加效果:\n政治顾问花费:§G-33.00%§!"
TPG_restrict_nobles:0 "旧瓶装新酒"
TPG_restrict_nobles_desc:0 "许多人将所有的罪责都强加于贵族制度之上，但这一观点并不全面。中央政府认为通过收回绝大多数贵族的实际权力，仅为其保留一些产业及名誉是最符合现状的解决方案。"
TPG_end_emergency_states:0 "结束紧急状态"
TPG_end_emergency_states_desc:0 "在中央政府宣布解除紧急状态后，一场由刺杀引起的风波就此落下。台面上的敌人暂且退场，但仅有阿方斯大公知道，吉拉尼亚的未来还将遭受怎样的挑战。"
TPG_end_emergency_states_tt:0 "获得动态修正：§Y初步改革§!基础效果:\n每日获得的政治点数:§G+0.1§!\n每月人民生活质量:§G+2§!\n当选择国策削减晶裔特权时 生产效率上限:§G+5%§!\n当选择国策“缄默”计划时 生产效率提升:§G+5%§!\n当选择国策权力回流时 战争支持度:§G+5%§!\n当选择国策旧瓶装新酒时 稳定度:§G+5%§!"
TPG_military_reform_conference:0 "军改会议"
TPG_military_reform_conference_desc:0 "东巴大战中，我国以万名士兵伤亡的代价惨胜远乡王国。这一战反应了我军的诸多短板列入：后勤紊乱；训练度参差不齐；装备落后等。我国在接下来举行的会议中，将决定公国未来军队的改革方针。"
TPG_military_development_amount_15_tt:0 "国家军事发展度：§G+15§!"
TPG_innovate_military_doctrine:0 "革新军事理论"
TPG_innovate_military_doctrine_desc:0 "过去所总结的理论已经不适用于如今多次迭代后的军事体系，我们将重新规整并设计全新的理论以培养适应现代战争的军官。"
TPG_study_worm:0 "研习沃姆"
TPG_study_worm_desc:0 "在与沃姆同盟进行的东巴大战中，公国留存了大量沃姆军队的资料。通过解析这些沃姆帝国的作战数据，可以对军队现有的军事体系加以改进。"
TPG_study_worm_tt:0 "§Y落魄的胜利者§!追加效果:\n陆军学说花费:§G-25.00%§!"
TPG_air_land_cooperation:0 "空陆合作"
TPG_air_land_cooperation_desc:0 "我国的空军部队过去由具有飞行能力的魔法师构成，这些精英法师往往是稀少且全能的——这导致陆空之间的配合关系模糊。而随着近代飞机的研发，围绕制空权的争夺得以左右战场局势，我国的空陆合作训练也必须提上日程了。 "
TPG_reconstruct_command_system:0 "重建指挥体系"
TPG_reconstruct_command_system_desc:0 "通信科技的应用改变了战场上指令的传达方式，现今指挥者可以几近实时得知各前线的战况。这使得需要重新建设一套更高效的指挥体系来配合。"
TPG_reconstruct_command_system_tt:0 "§Y落魄的胜利者§!追加效果:\n陆军师组织度:§G+5.00%§!\n陆军师攻击:§G+5.00%§!"
TPG_military_academy:0 "图森军事学院"
TPG_military_academy_desc:0 "新军事科技的普及使得战争形态相比以往发生了翻天覆地的变化，而我国现有的教育体系却无法培育相关人才。经多方协调后，军部将抽调在军事理论方面的前沿研究人员作为教师，举办一所对所有种族一视同仁的军校。"
TPG_military_academy_tt:0 "解锁决议§Y扩建图森军事学院§!"
TPG_war_admonish:0 "大战训诫"
TPG_war_admonish_desc:0 "东巴大战给予了我们的军队一记重拳，但也教会了我们许多事情。国防部整编了战争期间各战役的战争报告，加以分析后对现有的部分战术进行再次改良。"
TPG_war_admonish_tt:0 "§Y落魄的胜利者§!追加效果:\n陆军师防御:§G+5.00%§!"
TPG_optimize_mobilization_system:0 "优化动员系统"
TPG_optimize_mobilization_system_desc:0 "自大战结束后，在战时被强制征兵的人类和晶裔便按批次复员从事工作，导致军队规模锐减。而民众的反战情绪使得后续征兵工作难以进行。介于这种情况，政府将联合军队及宣传部，全面改革动员系统，并在社会各方面通过媒体来美化军队。"
TPG_optimize_mobilization_system_tt:0 "§Y落魄的胜利者§!追加效果:\n战争支持度:§G+15.00%§!"
TPG_human_dominated:0 "人类主导"
TPG_human_dominated_desc:0 "公国尚武慕强的民族文化使得军中种族的冲突并不强烈，这为以人类为主导建设一支军队提供了些许可能性。在新军队的设想中，人员稀少且难以补充的晶裔将成为撕裂战场的尖刀，并补充大量人类士兵作为军队主力。"
TPG_crystal_dominated:0 "晶裔主导"
TPG_crystal_dominated_desc:0 "围绕晶裔组织的军队历经多次战争考验，在接下来的军队建设中我们将注重尽可能减少晶裔的伤亡以最大保持连续作战能力。人类所组成的工兵及后勤联队将在战争中配合进攻并优先保障晶裔。"
TPG_large_scale_assault:0 "大规模突击"
TPG_large_scale_assault_desc:0 "通过调用大量步兵部队，可以集中突破敌军防线上的薄弱处。在击溃敌方防线后，步兵将进行大规模的清扫以彻底消灭敌军。"
TPG_expand_military_facilities:0 "扩建军事设施"
TPG_expand_military_facilities_desc:0 "为了确保我国陆军在作战时的后勤，国防部长亚梅利拉提出了“兔”计划，以在全国建设多个分散的军工厂及军用仓库等军事设施，以防在后方遭到破坏时难以维持后勤补给。"
TPG_expand_military_facilities_tt:0 "解锁决议§Y“兔”计划§!"
TPG_modern_training:0 "现代化训练"
TPG_modern_training_desc:0 "科学的训练方式可以有效提高单兵素质并减少训练对人体的损伤，过去陆军的训练方式都是以晶裔为用户而设计，如今需考虑到人类脆弱的生理结构，并通过多方测试并最终编撰最贴合人体的训练方式。"
TPG_integrating_two_ethnic_groups:0 "统合两族"
TPG_integrating_two_ethnic_groups_desc:0 "人类和晶裔之间的配合作战的效果远超预期，改革已经初步在军事上取得了成功。但仍有部分士兵心中存在对异族的隔阂，对此我国将展开一系列宣传活动将“两族同心”的概念深深烙印在士兵们的心中。"
TPG_mobilize_reserve_teams:0 "动员预备队"
TPG_mobilize_reserve_teams_desc:0 "我国自上次大战后就产生了大量退役官兵，如今战争的号角再次在巴斯蒂亚大陆吹响，是时候再次呼唤这些老兵们复员，加入在前线保家卫国者的行列。"
TPG_set_up_artillery:0 "设列炮兵部队"
TPG_set_up_artillery_desc:0 "最新组建的“天火”师配备了最新投产的大口径榴弹炮和造价高昂的魔导师装备，这支部队未来将成为我国主力部队的模板，广泛活跃于战场上。"
TPG_set_up_artillery_tt:0 "将在我们的首都部署一支训练有素的§Y“天火”§!师\n解锁编制§Y“天火”§!师§!"
TPG_crystal_magic_team:0 "水晶魔法联队"
TPG_crystal_magic_team_desc:0 "魔法联队是装配了“战地防御阵列”的小编制部队，该装备是自魔典中提取的科技改良而来，通过外置的魔力电池供给能源以激活屏障，防御来及前方的任何攻击。在能量耗尽后仅需更换电池就能再次充能。"
TPG_crystal_magic_team_tt:0 "其效果为：§Y魔导步兵支援连§!：防御:§G+10.00%§!，组织度恢复:§G+10.00%§!"
TPG_artillery_and_courage:0 "炮火与勇气"
TPG_artillery_and_courage_desc:0 "为了保卫我们亲爱的的祖国，士兵们将会在每一寸土地上挥洒热血，但这么做值得。当侵略者的尸首归于大地，在这之上长出新一轮的庄稼后，将士们终可以稍作歇息。"
TPG_prepare_next_war:0 "预备下一场大战"
TPG_prepare_next_war_desc:0 "大战即将到来，政府将扶植军用工业以应对可能的物资问题。"
TPG_emphasize_heavy_industry:0 "重视重工业"
TPG_emphasize_heavy_industry_desc:0 "我国的工业实力难以支撑庞大的产业链，通过“截长补短”的方式，可以转移轻工业的部分产能供给军事生产以最大发掘我们的战争潜力。"
TPG_centralize_production:0 "集中生产"
TPG_centralize_production_desc:0 "通过指定区域建造大型工业中心，我国可以快速提高工业能力，但大量工业废料；废水也污染了大片河流及农田。但这些代价在我们工业所提高的提高面前都不值一提。"
TPG_unified_production_plan:0 "统一生产计划"
TPG_unified_production_plan_desc:0 "只有科技发展才会推动生产力的增长，中央政府规划了一系列工业计划并划拨了对应的自己以供研究研究对应学科两相搭配。"
TPG_balanced_development:0 "均衡发展"
TPG_balanced_development_desc:0 "工业发展并非一蹴而就，而是长久发展后综合工业实力的增长，这需要我们平等的对待各类产业。"
TPG_maintain_market_flexibility:0 "保持市场灵活性"
TPG_maintain_market_flexibility_desc:0 "战争对各产业的冲击往往会导致经济的崩溃，我国将扩大工农业加工产品的多样性以确保各货品的于战时的供给能力来增加市场弹性，以防止最坏的情况发生。"
TPG_decentralized_production:0 "去中心式生产"
TPG_decentralized_production_desc:0 "“中心”指代的是进行集中生产的巨型工业区，但这种生产形式会对我国的目前的工业结构及农业造成极大压力。取而代之的是，以小工厂的形式散步于全国进行生产，与此同时还能保障在战时对我国工业的打击下工业的生茶能力。"
TPG_mining_military_resources:0 "开采军用资源"
TPG_mining_military_resources_desc:0 "得益于科技的进步，我国的钢产量和资源探测及采掘能力都得到了提升。扩大我们对于新资源的探掘范围和力度有助于更快发展军事工业。"
TPG_tight_policies:0 "紧缩政策"
TPG_tight_policies_desc:0 "在战争期间的任何浪费都是可耻的，为此中央情报部将统筹生活物资并加以分配，来“帮助”国民节俭。"
TPG_tight_training:0 "严密训练"
TPG_tight_training_desc:0 "晶裔士兵可以耐受最高强度的训练而不对身体造成任何损伤，因此我们将制定最严苛的演练计划以最大程度的激发他们的潜能。"
TPG_army_tradition:0 "公国陆军传统"
TPG_army_tradition_desc:0 "我国的军队一直以严明的军纪和强大的单兵作战能力著称。然而在东巴大战中，因为落后的军事理念和装备，我们的陆军遭受了严重的挫折，为了洗刷这份耻辱，将加大对于兵员的装备配给以强化他们的战斗力。"
TPG_install_magic_goggles:0 "列装魔能目镜"
TPG_install_magic_goggles_desc:0 "这批新研发的目镜中搭载了最先进的魔法回路，并针对单兵进行了轻量化改造，但也因此要求操控者拥有基础的魔法学天赋及知识。尽管如此，进行配备后仍将极大提升我军在晚间及极端天气情况下的作战能力。"
TPG_each_performs_own_functions:0 "各司其职"
TPG_each_performs_own_functions_desc:0 "人类与晶裔本身就有如此大的不同，为何要强求它们在军中职位的平等呢？在最新的军事规划中，每位军人都在自己合适且热爱的岗位上为保家卫国献出自己的能量。"
TPG_army_first:0 "陆军至上"
TPG_army_first_desc:0 "任何一艘军舰的制造和维护都将消耗大量的产能，资源和时间。这使得海军不像陆军一般可以通过倾斜工业资源后快速提升军力。同时在沃姆帝国强大陆军的威慑之下，政府决定关停部分造船厂，转移这部分产能用于生产枪支弹药。"
TPG_industrial_development_amount_down_15_tt:0 "工业发展度水平变化：§R-15§!"
TPG_mobile_force:0 "公国机动部队"
TPG_mobile_force_desc:0 "必须指出的是，我国目前没有能力组建大规模的坦克部队，因此我们将编制少量精锐部队。并灵活运用它们寻找敌军阵线的薄弱处，伺机发动猛烈的进攻。"
TPG_elite_magic_team:0 "精锐魔法小队"
TPG_elite_magic_team_desc:0 "精锐魔能小队是配备了“微型魔动力甲”的微型编制部队。该装甲为以泰坦为蓝本，舍弃了大量性能为代价，用小型魔能核心驱动设计而成的单兵作战装甲，大幅提高部队作战及生存能力。"
TPG_elite_magic_team_tt:0 "其效果为：§Y魔导支援连§!：突破:§G+10.00%§!，主动性:§G+1.00%§!"
TPG_crystals_scar:0 "水晶之痕"
TPG_crystals_scar_desc:0 "旷日持久的战争造就了无数悲剧，因此而有无数人期盼着它快些结束。然而在这保家卫国而浴血奋战之时，是时候放下手中所有的仁慈，转而拼尽全力杀死目之所及的每一位敌人。"
