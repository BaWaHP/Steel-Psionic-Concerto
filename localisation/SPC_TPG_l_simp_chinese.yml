TPG_united_crystal_group:0 "联合科晶集团"
TPG_united_crystal_group_desc:0 "初次来到大公堡的旅者无不被集团的总部所震撼——这座由魔晶和钢铁所铸造而成的摩天大楼白天经由日光而反射出彩虹色的光谱，夜晚周身散发着磅礴魔力流经所带来的朱色荧光。\n\n科晶集团是公国境内原先大多数大小企业合并所组成的商业帝国，由原先矿/工/商三行业龙头企业牵头组成，集团总董事长为大公本人的亲信担任，政商两界的支持使得集团得以急速扩张并垄断了几乎所有行业。这虽然带来了前所未有的资源调配和生产能力，但过大的企业规模也使得董事会即使在公司内部也有无暇顾及之处……\n\n§R“并非是寡头，而是梦想的孵化器与摇篮，集团将为公国指出最为美好的未来”§!"
