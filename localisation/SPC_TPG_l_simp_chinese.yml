TPG_hydropower_stations:0 "埃克塞尔特水电站"
TPG_hydropower_stations_desc:0 "吉拉尼亚有着众多的河流，而位于埃克塞尔特地区的特威德河则是最特殊的一条——作为由“休里湖”出发，横跨半个吉拉尼亚，最终流经首都入海的母亲河，而她的脾气时常阴晴不定，每年都会引发多起不定规模的泛滥事件。而现今于上游修建的这座大型水电站则将在最大程度的利用水电资源的同时，与下游的各水坝配合起到预防洪水的作用。"
