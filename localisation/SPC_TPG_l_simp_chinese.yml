TPG_military_reform:0 "军队改革"
TPG_military_reform_title_txt:0 "吉拉尼亚陆军自十世初建立以来一直是这片大陆上战斗能力最强的军队之一，但科技和军事理论的落后使得我们接连在战争中无法取得足够的主动权。现今经陆军最高指挥部讨论，我国将进行一次自内而外的改革，以彻底洗刷过去的耻辱。"
