###决议###
TPG_influence_of_worm_empire_category:0 "沃姆帝国的影响"
TPG_influence_of_worm_empire_category_desc:0 "在十七世纪初和十八世纪中旬，东巴斯蒂亚曾有两次工业高速发展的时期，但对于农业的过度重视和保护使得吉拉尼亚并没有完成完全的工业化。而后在二十世纪末世界大战大战结束后，落后的工业使得吉拉尼亚一度成为了战后经济受创最严重的地区。在从联合王国中独立后，大公认识到了工业化的重要性，并与沃姆签订了一系列条约，以用粮食协助沃姆赈灾来换取先进的工业技术，这些条约在灾后也成为了两国友好外交关系的记录。但在东巴大战胜利后，沃姆帝国的野心骤然膨胀，沃姆企业通过贸易顺差带来的利润，得以推行的低价产品正在侵吞我国的市场份额，诚然与沃姆人合作可以在短时间内快速提升工业实力，但代价则是经济完全依附于沃姆，成为帝国的经济附庸。为了防止这一情况的出现，我们必须利用沃姆对我国市场的垂涎，在平衡我国经济独立性的同时，借助沃姆的资源进行全面工业化，以彻底摆脱落后所带来的种种弊端。"
