TPG_national_socialist_party_long:0 "吉拉尼亚社会主义工人党"
TPG_authoritarian_nationalism_party:0 "吉拉尼亚贵族院"
TPG_authoritarian_nationalism_party_long:0 "吉拉尼亚贵族院"
TPG_paternal_autocrat_party:0 "王国权贵"
TPG_paternal_autocrat_party_long:0 "王国权贵\n§g维持公国运转的中坚力量，贵族派系支持适当的“民主”以谋求中央政府下放更多的自治权，反对国内愈发热烈的平等思想，部分极端人士甚至希望重新建立奴隶制以奴役“下等种族”§!"
TPG_wizard_rules_party:0 "阿方斯王朝"
TPG_wizard_rules_party_long:0 "阿方斯王朝\n§g由大公及内阁所组成，所倾向极大程度受大公本人的影响，所做皆为维持与稳固统治。§!"
TPG_religious_extremism_party:0 "吉拉尼亚教廷（激进派）"
TPG_religious_extremism_party_long:0 "吉拉尼亚教廷（激进派）\n§g百年前大公对于曙光教的侵蚀所埋下的祸根，狂信者们趋于回归原始宗教，通过血腥献祭来证明自己的信仰，以最终推动先知所预言的“第二次大征服”。§!"
