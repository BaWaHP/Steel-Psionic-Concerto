TPG_liberal_republican_party_long:0 "吉拉尼亚共和党（正统派）"
TPG_conservative_republican_party:0 "吉拉尼亚教廷（温和派）"
TPG_conservative_republican_party_long:0 "吉拉尼亚教廷（温和派）\n§g自曙光教演变而来，在公国内享有极高的声望，反对与沃姆帝国过深的纽带来抵御于沃姆宗教所带来的文化侵蚀。§!"
TPG_authoritarian_republican_party:0 "吉拉尼亚共和党"
TPG_authoritarian_republican_party_long:0 "吉拉尼亚共和党（威权派）"
