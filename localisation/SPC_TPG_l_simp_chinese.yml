TPG_worldunion_democrat_party:0 "吉拉尼亚社民派"
TPG_worldunion_democrat_party_long:0 "吉拉尼亚社民派\n§g议会中少数支持以温和手段来促进民主并保障人类权益，通过让步来安抚人类。§!"
