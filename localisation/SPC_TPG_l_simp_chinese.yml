TPG.4.t:0 "拷问"
TPG.4.d:0 "在清冷的审讯室内，阿方斯静静地注视着被绑在椅子上的刺客凯尔索。他的脸色苍白，眼神却透出一丝无畏。宫廷法师艾尔德，身为精神魔法大师，正在对他进行着审讯。\n\n“凯尔索，在皇帝面前招供是你唯一活着离开吉拉尼亚的机会。埃尔德的声音冷酷而坚定，仿佛一道无形的鞭子，抽打在他心上。“你说工会从不向你们透露雇佣者，但我不会相信你说的任何一个字。”\n\n“我只是执行命令。”凯尔索的声音微弱，却带着一丝坚定，仿佛要在死前维系自己最后的尊严。\n\n“已经三天了，他拒绝透露任何有关于雇主的信息，我的魔法也无法对他起到显著的作用.......”埃尔德的眼神带着一丝躲闪。\n\n阿方斯叹了口气，他将手伸向凯尔索的额头，口中轻声吟唱着魔咒，眼中闪烁着异样的光芒。\n\n凯尔索微微颤抖，似乎被困在无形的漩涡中，内心的恐惧不断冲击着他说出真相。“我不知道更多……当初接下任务时我们曾对这次疯狂的行动的雇主进行过调查，该组织背后似乎有许多未知的助力。”\n\n阿方斯的目光愈加锋利，仿佛穿透了他的灵魂。“这正是我所怀疑的，抵抗组织不可能独立策划如此复杂的刺杀。”\n\n凯尔索的眼神透露着迷茫，彷佛在挣扎着抉择。“我……我只能说是……他们用于的账款似乎曾经过数个可疑的账户，队长说过这些可能是奥罗日亚的手笔。”\n\n阿方斯和埃尔德对视一眼，心中都涌起一阵不安。此时的局势愈发复杂，他们面对的显然不仅仅是来自国内的反动势力，更有数头深藏在阴影中的巨兽。\n\n随着凯尔索的呼吸逐渐微弱，阿方斯知道，他们正处在一场前所未有的斗争之中，过去的经验告诉他，唯有快速而坚定的反击，才能捍卫公国的未来。"
TPG.4.a:0 "是时候做出行动了"

