###新闻###
TPGNews.1.t:0 "吉拉尼亚内战爆发？"
TPGNews.1.d:0 "就在昨日，一向被外界认定为东巴斯蒂亚最稳定国家之一的吉拉尼亚大公国，突然与外界切断了绝大部分通讯联系。据边境传来的零星报道显示，吉拉尼亚的边境部队正在进行异常的大规模调动。消息称，由埃里克·卡尔森领导的抵抗阵线已经在索兰瑟姆等地推翻了当地政府，并正式宣告吉拉尼亚共和国成立。联系起过去数月间，吉拉尼亚境内不断流传出关于边疆地区的爆炸案与针对官员的政治刺杀传闻——尽管大公国的内务机构曾极力将其粉饰为“个别极端分子的孤立行径”，但如今看来，那些流血事件确是这场革命的前兆。"
TPGNews.1.a:0 "阿方斯的统治会被终结吗？"

