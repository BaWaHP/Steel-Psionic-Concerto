###民族精神###
TPG_crystal_priority:0 "晶裔时代"
TPG_crystal_priority_desc:0 "在这个被血统严密固化的国家中，荣耀的代价极其高昂。为了供养特权阶级，海量的社会财富被无情吞噬；而在被挤压了教育与晋升通道的庞大人类群体中，积压的不满正让国家的工业与科研双双陷入泥潭。对底层暴动的严密防备，也在无休止地消耗着帝国的资源。尽管大战胜利的余晖与宣传机器的粉饰太平，仍在尽最大努力弥合着这道社会裂痕，§R但越来越多的迹象表明，如若不做出彻底的改革，吉拉尼亚难以调和的矛盾必将迎来爆发。§!\n\n\n\n\n   £GFX_texticons_TPG_1 \n\n\n"

TPG_crown_below:0 "桂冠之下"
TPG_crown_below_desc:0 "1995年东巴大战的胜利为吉拉尼亚的军队戴上了虚假的桂冠，也彻底锁死了我国军事体系。如今，严谨的军事学研究已在暗中被对晶裔精锐部队的盲目崇拜所取代；繁杂的后勤规划与步炮协同，更是让位于对华丽“魔法毁伤效果”的狂热吹嘘。僵化的训练体系与对新晋技术与学说的傲慢无视，正让这支军队在下一场战争的黎明前非常脆弱......\n\n\n\n\n   £GFX_texticons_TPG_2 \n\n\n"

TPG_resistance_front:0 "抵抗阵线"
TPG_resistance_front_desc:0 "抵抗阵线是一个暂时没有统一组织或明确纲领的组织，它诞生于1995年大战胜利后被吞并的远乡领土内，在这个组织勉强缝合了拒绝妥协的远乡抵抗人士、受新思潮影响的激进左翼，以及走向极端的本土吉拉人。由于面临内务机构的高压监控，阵线无法建立中央指挥系统，只能依靠散沙般的小组在暗处各自为战。从合资工厂里无休止的消极怠工，到边缘矿区魔力传输线的蓄意破坏，再到针对帝国基层军官与“合作者”的暗杀，尽管其内部严重的意识形态撕裂在目前暂时难以对阿方斯的王座产生有效的威胁，但这中反抗正，正切实地伤害着本就脆弱的社会。\n\n\n\n\n   £GFX_texticons_TPG_3 \n\n\n"

TPG_wom_girania_development_cooperation_agreement:0 "吉拉尼亚发展合作协定"
TPG_wom_girania_development_cooperation_agreement_desc:0 "当我们在1996年的大战胜利后并进一步与沃姆帝国深化合作时，官方报纸连篇累牍地赞颂着“兄弟之邦”的慷慨。表面上看，这确实是一场互利共赢的交易：沃姆的资本与技术大量注入了我们落后的重工业，帮助吉拉尼亚快速从世界大战的破坏中恢复。然而，这并非无私的援助。作为一个拥有广袤良田与未开发矿脉的半工业化国家，吉拉尼亚正以不对等的低价向北方输送着大量资源。阿方斯准许了沃姆的企业在我们的土地上扎根，通过技术垄断和贸易剪刀差汲取利润。\n\n\n\n\n   £GFX_texticons_TPG_4 \n\n\n"

TPG_state_religion:0 "新曙光教"
TPG_state_religion_desc:0 "新曙光教的核心在于对§R皇帝阿方斯§!的独一崇拜，其教义宣称皇帝不仅是吉拉尼亚永恒的统治者，其存在本身更已超越凡俗，趋向神性。这一信仰体系源于奥罗日亚宗教的分支，但在传入后被§R阿方斯§!利用以扭曲为对其超凡伟力与不朽的狂热信仰。然而，数百年过去，国教的本质发生了根本性的异化。它被高度工具化为通过统一的仪式与口号灌输忠诚思想，强化社会控制。如今，对于绝大多数吉拉尼亚公民及教会人员而言，国教只不过是空洞的宣传机器。唯有少数被斥为异端或狂热分子的§R秘密团体§!，仍在执着钻研进行危险的秘密仪式，并保留对阿方斯的狂热信仰，成为国教体系中不稳定的存在。\n\n\n\n\n   £GFX_texticons_TPG_5 \n\n\n"

TPG_court_parliament:0 "皇前议会"
TPG_court_parliament_desc:0 "作为吉拉尼亚政治体制的缩影，也是旧制度与工业时代畸形结合的产物。在这个金碧辉煌的权力中枢里，古老的世袭贵族、掌控合资命脉的新兴寡头以及技术官僚，又或是暗有包袱的人类议员或看似虔诚的主教，维持着一种脆弱而虚伪的平衡。表面上，各项法案的推行均伴随着严密的辩论与激烈的利益博弈。但实质上，其中大多数不过是执行皇帝阿方斯的意志。议会以立法的形式，合法化了统治阶级的特权与垄断。庞大的官僚机器在此合流，只要他们对阿方斯保持着绝对忠诚，便能在这套扭曲的体制中继续享受至高无上的特权。\n\n\n\n\n   £GFX_texticons_TPG_6 \n\n\n"

###政策###
TPG_crystal_conscription:0 "晶裔普遍服役"
TPG_crystal_conscription_desc:0 "晶裔在享受社会特权的同时，必须承担严苛的兵役制度：大多数晶裔都需进入军队服役，在他们的青年时期接受长期的军事训练。相比之下，尽管人类凭借庞大的人口基数，在军队内的绝对数量上占据了军队的多数，但这些人类士兵大多只接受基础训练并被分配至基层或后勤岗位。形成了刻意维持的武力与资源落差。"

TPG_magician_policy:0 "吉拉尼亚魔法政策"
TPG_magician_policy_desc:0 "相较于较为孱弱的科学教育体系和技术水平，吉拉尼亚已经建立了一套合理高效的魔法教育体系，并在魔法研究领域保持领先。在政府鼓励并资助学者探索魔法前沿的同时，坐落于首都的“伊索尔维拉魔法学院”，也吸引了全大陆各个种族对魔法抱有追求的学生。为了确保在魔法领域的领先，阿方斯罕见地为这所最高学府保留了相对自由的教学与学术讨论环境。与此同时，中央政府也在全国各地的学校中普及了基础的魔法教育课程。"

TPG_binary_education_system:0 "二元教育体系"
TPG_binary_education_system_desc:0 "吉拉尼亚的教育资源分配呈现出极大的不对称性。人类通常仅被保障接受六年基础义务教育，而针对晶裔的教育保障周期往往长达数十年。政府将绝大部分财政补贴与核心学术资源倾斜至高等学府，并声称此为对教育的重视。尽管这些高等院校名义上并未向人类关闭大门，但其不成比例的录取标准与昂贵的学费，实质上将绝大多数人类排斥在知识与阶级跃升的壁垒之外。"

TPG_siville_device:0 "“西维利尔”装置"
TPG_siville_device_desc:0 "§Y嗡——嗡——§!\n西维利尔，这座庞大而精密的魔导造物，是伟大的阿方斯近年在魔法前沿领域深耕多年的至高结晶之一。作为实验性魔法武器，目前该项目仍处于极度危险的建造与初步调试阶段。由于其核心阵列的高度不稳定性，在装置建造期间如若魔力供应中断则会引发魔力洪流的失控，进而导致灾难性的内爆。为了确保我国核心省份的安全，阿方斯已将这座尚在调试中的造物秘密转移至在大战中新占领的远乡领地深处进行封闭建造。目前，该设施仅由极少数最忠诚的皇家卫队把守，并被列为大公国的最高机密。\n§Y死亡终将平等地吞噬众生。§!\n\n\n\n\n   £GFX_texticons_TPG_7 \n\n\n"

