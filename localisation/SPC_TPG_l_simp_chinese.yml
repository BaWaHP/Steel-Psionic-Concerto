###民族精神###
TPG_wom_research_team:0 "沃姆科研团队"
TPG_wom_research_team_desc:0 "1996年大公国战后与沃姆签订了一系协定以确立更紧密的关系。自《吉拉尼亚科研援助协定》中，大公国优先供给优质粮食予沃姆，并优先购买来自沃姆的机械以取得来自沃姆的顶尖科研团队。§R一旦与沃姆的关系受损，大公国的科研能力将会江河日下....§!"

TPG_reduce_departments:0 "极限优化"
TPG_reduce_departments_desc:0 ""
TPG_vase_nobles:0 "花瓶贵族"
TPG_vase_nobles_desc:0 "在最新的法令施行后，中央政府将从财政中抽调出一笔专款以用于赡养被架空的众贵族，使得他们能维持先前的生活水平，希望能藉此平息这些“花瓶”们的的怒火。"
TPG_preliminary_reforms:0 "初步改革"
TPG_preliminary_reforms_desc:0 "对于宪法的修正已经被证实颇有成效，政府的行政效率相比先前有了极大的提升，人类的生存质量也在缓步提升，吉拉尼亚已经做好准备迎接更彻底的变革。"
