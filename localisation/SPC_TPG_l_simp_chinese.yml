TPG.26.t:0 "国家调查报告"
TPG.26.d:0 "尊敬的皇帝阿方斯陛下，\n\n\n\n我谨以国防情报局局长的身份向您呈递本次报告，内容涉及我国内部当前形势的严峻性，以及需要您高度关注的几项关键问题。\n\n首先，瓦罗瑞亚和法鲁尼斯地区的人类抵抗组织活动愈加频繁。这些组织的成员多为对政府失去信任的老兵和躁动的青年，他们对现行统治有强烈的不满，组织暴乱的事件日渐增多。近日，在瓦罗瑞亚发生了一起大规模抗议活动，抗议者不仅在街头纵火，还破坏了\n\n部分基础设施。这些行为迅速蔓延，令当地治安形势不容乐观。我已指示情报人员加强对其中关键人员的监控。\n\n其次，格拉斯特和埃克塞尔特地区的部分贵族则在暗中结党营私，密谋叛乱。这些贵族因对您近来的政策产生分歧，开始暗中策划试图推翻现有政权。有情报显示，他们正在组织秘密会议，并利用在地方的关系网来加强自身的力量。\n\n更为复杂的是，来自沃姆、远乡以及奥罗日亚的境外势力正在渗透我们的内部事务。这些势力通过资金和资源支持，试图进一步加剧国内动荡。我们必须对此保持高度警惕，并采取有效措施应对外部干扰。\n\n基于以上情报，我建议您考虑再次增加原先秘密警察队伍的规模和职权，以让情报部能更强力的维护国家的稳定。\n\n我将持续监视事态的发展，并随时向您报告最新情况。愿您在重重挑战中，依然保持明智与果敢，带领国家走向光明的未来。\n\n\n\n谨此，敬礼。\n\n\n\n塞巴斯蒂安\n\n中央情报部部长"
TPG.26.a:0 "准许（国家情报局的势力正在扩大）"

TPG.28.t:0 "降临节"
TPG.28.d:0 "在这个以阿方斯诞生之日而命名的节日里，街道上洋溢着节日的喜庆。在每个家庭的小型祭坛上，人们摆上蜡烛和象征着丰收的稻米，默默为阿方斯皇帝进行着祈祷。随着时间的推移，这一仪式的宗教色彩渐渐淡化，更多的是一种对皇帝的敬意与感激。\n\n这一天的正午，家人们通常会围坐成一团，享用着由各种谷物制成的佳肴。\n\n到了傍晚，人们纷纷走上街头，点燃篝火与烟花，宰杀牲口以备狂欢。乐器的声音在空气中回荡，欢快的舞蹈伴随着歌声，民众与他们的亲朋围绕篝火尽情享受着这难得的休闲时光。\n\n烤肉的香气在街道上飘荡，点点星光下，伴随着耳边的歌谣，人们尽情享用着各式肉类所组成的晚餐，并在第二天的第一缕晨光出现时结束这一天的祭典。时光荏苒，这一节日已然成为了吉拉尼亚人心中不可或缺的传统。"
TPG.28.a:0 "一起来狂欢吧！"

###新闻###
TPG.29.t:0 "吉拉尼亚大公遇刺"
TPG.29.d:0 "在吉拉尼亚大公国一年一度的新年演讲上，其领导者阿方斯遭到了一场失败的刺杀，据现场记者描述，刺客混入了参加集会的人群，并使用一种未知的强大法器将阿方斯传送并实施刺杀。\n\n目前大公堡已经被封锁，全国也进入了临时的戒严状态，此次袭击事件的连锁反应后果尚未可知。吉拉尼亚政府目前并未针对此次刺杀事件给出任何官方解释，称详细调查仍在进行中。"
TPG.29.a:0 "真惊险"




