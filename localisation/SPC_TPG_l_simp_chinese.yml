TPG_occupation_of_army_funds:0 "陆军经费占用"
TPG_occupation_of_army_funds_desc:0 ""
TPG_small_mounted_eyepiec:0 "小范围列装目镜"
TPG_small_mounted_eyepiec_desc:0 "“魔能目镜“是我军正在研究的实验性装备，该目镜以“使士兵适应任何作战环境”为目的研发，而目前只实现了部分夜视功能。"
TPG_army_priority:0 "陆军优先"
TPG_army_priority_desc:0 ""
TPG_mobile_force_i:0 "公国机动部队"
TPG_mobile_force_i_desc:0 ""
TPG_tight_policies_i:0 "紧缩政策"
TPG_tight_policies_i_desc:0 ""
TPG_develope_heavy_industry:0 "重视重工业"
TPG_develope_heavy_industry_desc:0 "综合评估后，我国现有的工业实力不足以支撑在战时的大规模生产，所以转移一部分轻工业产能以建设大规模工业园区从事重工业生产是有必要的，这能在有限的资源内最大限度地激发我国的工业潜力。"
TPG_centralize_production_i:0 "集中生产"
TPG_centralize_production_i_desc:0 "综合评估后，我国现有的工业实力不足以支撑在战时的大规模生产，所以转移一部分轻工业产能以建设大规模工业园区从事重工业生产是有必要的，这能在有限的资源内最大限度地激发我国的工业潜力。"
TPG_balanced_development_i:0 "均衡工业"
TPG_balanced_development_i_desc:0 "维持市场的灵活性，确保大部分消费品的供给才能确保经济的持续增长，将过于集中的工业，拆分后分散于各地区生产，不仅能带动更多地区的经济发展，也能确保在战时的持续生产能力。"
TPG_balanced_development_i_2:0 "均衡工业"
TPG_balanced_development_i_2_desc:0 "维持市场的灵活性，确保大部分消费品的供给才能确保经济的持续增长，将过于集中的工业，拆分后分散于各地区生产，不仅能带动更多地区的经济发展，也能确保在战时的持续生产能力。"
TPG_national_martail_law:0 "全国戒严"
TPG_noble_collapse:0 "瓦解贵族"
TPG_powerful_central_government:0 "强力中央政府"

###修正###
TPG_HRE_dynamic_modifier:0 "人类抵抗组织-鹰派"
TPG_HRE_dynamic_modifier_desc:0 "东巴斯蒂亚大战结束后，大公国境内的人类在战争英雄“飓风杰克”的领导下为对抗晶裔的压迫而成立了人类抵抗组织。其原本的诉求为追求人类和晶裔之间的平等，但在“飓风杰克”被政府处决后，该组织内部就未来行动方针而产生了巨大的分歧。鹰派聚集了许多老兵和青少年，他们主张政府不可信任，必须积蓄力量并最终引发一场暴力革命来夺取政权。"
TPG_HRE_dynamic_modifier_removed_flag:0 "没有修正：§Y人类抵抗组织-鹰派§!"

TPG_HRP_dynamic_modifier:0 "人类抵抗组织-鸽派"
TPG_HRP_dynamic_modifier_desc:0 "东巴斯蒂亚大战结束后，大公国境内的人类在战争英雄“飓风杰克”的领导下为对抗晶裔的压迫而成立了人类抵抗组织。其原本的诉求为追求人类和晶裔之间的平等，但在“飓风杰克”被政府处决后，该组织内部就未来行动方针而产生了巨大的分歧。鸽派则大多是信徒和中年人，甚至还有少许晶裔，他们主张与政府积极沟通，取得更大的社会影响力并最终推动改革。"

TPG_ND_dynamic_modifier:0 "贵族不满"
TPG_ND_dynamic_modifier_desc:0 "公国在上次的大战中以近万名水晶族裔的代价攫取了远乡的大片土地，但换取的只是大公名义上的授勋和口头的承诺。而远乡的战后赔款和土地却被大公和亲王们瓜分殆尽，这让许多原本就对中央高度集权不满的贵族借机结党营私。"
TPG_ND_dynamic_modifier_removed_flag:0 "没有修正：§Y贵族不满§!"

TPG_DV_dynamic_modifier:0 "落魄的胜利者"
TPG_DV_dynamic_modifier_desc:0 "在东巴大战中吉拉尼亚的军队暴露出了许多问题，若不能及时解决问题，这些弊病会让我们在下一场大战中惨败。\n\n“关山正飞雪，烽火断无烟” "
TPG_DV_dynamic_modifier_removed_flag:0 "没有修正：§Y落魄的胜利者§!"

TPG_crystal_priority_dynamic_modifier:0 "水晶优先"
TPG_crystal_priority_dynamic_modifier_desc:0 "自建国之初，水晶族在承担国防义务的同时也享受诸多特权：低税；免费教育及医疗保护等。但现如今这套落后的体制已经成为了滋生在公国身上的肿瘤，且正在逐渐癌变。"

TPG_initial_reform_dynamic_modifier:0 "初步改革"

