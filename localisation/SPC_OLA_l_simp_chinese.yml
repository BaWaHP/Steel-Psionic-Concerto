###领导人###
OLA_darian_akabane:0 "达里安·赤羽"
OLA_darian_akabane_desc:0 "在满地文盲，种族冲突不断，历史短小，而处在穷山恶水之地的国度开展一场革命谈何容易？至少达里安·赤羽深有体会。在他早年作为左翼青年运动成员活动的时候，便意识到了兽乡的种种矛盾。他的革命前辈几乎准确预测了矛盾集中爆发，导致国家秩序崩溃，民众苦不堪言的当下，却在当时无能为力。反动的君主政府始终用强硬的武力镇压着兽乡境内的左翼运动，而在这样一个发展落后的国度，许多境外的左翼革命理论又偏离了实际情况，无法吸引民众的支持。种种因素下，兽乡的左翼运动日渐衰退，而达里安最终无法坐视不管。\n\n在达里安看来，兽乡的情形是独特的，许多境外的革命理论并非不适用，而是不符合当下兽乡地区的发展阶段。由少数城市地区的知识精英开展的运动几乎只有脱离群众一条路可走，可由城市外，真正组成了兽口多数的农民，牧民，以及诸多仍居住在山间的原始群落支持下的运动才能真正成为众望所归的革命。在达里安的带领下，他的团队走出了城市，到山野间发展根据地，并逐渐形成了兽乡各地不容小觑的一股游击反抗势力。\n\n而命运的转机稍纵即逝，随着旧国王驾崩，其子尚且年幼无法接任，由几个贵族组成的摄政议会大行其道，鱼肉百姓之时，兽乡社会的矛盾集中爆发了出来。达里安和他的游击队对首都那些复杂的政治斗争不感兴趣，他只知道意图颠覆政府的军队已蓄势待发，如果不立刻发动起义，革命的果实便会被新的反动派夺走。\n\n每当达里安·赤羽凝视脚下的这片土地时，总会为其悲惨的历史和复杂的现状感到痛心而无力。无论是遭到外族奴役，打压，始终生活在原始社会中的雀鸟也好，因战火而逃离北方的矮人，狐人，蜥蜴人也罢，他们都渴望在这片混乱的土地上某得新生——可现状是残酷的，即便没有反动的旧政府，这片土地恶劣的自然环境，错综复杂而守旧的原始部落，破碎的经济基础和几乎不存在的工业发展对任何物种而言都是致命的。对于达里安而言，他只渴求一件事——团结分裂的民众，并带领他们走向现代社会。\n\n为此，他可以不惜一切代价。"

###民族精神###
OLA_revolutionary_fervor:0 "革命热诚"
OLA_revolutionary_fervor_desc:0 "兽乡左翼抵抗运动已建立有数十余载，期间我们经历许多，曾因内斗而分裂，也为反动派的打压而发抖——可我们从未放弃。在革命先烈的尸山血海上，我们重新崛起。在达里安·赤羽领袖的带领下，我们的战士从山野间进发，包围了反动派的大本营，誓要他们为所作所为付出代价！胜利曙光已在地平线的尽头！§t兽乡革命万岁！§!"

OLA_one_last_fight:0 "背水一战"
OLA_one_last_fight_desc:0 "我们的起义准备匆忙，而局势转变迅速，情况不会始终对我们有利。凭借着行动的突然性和我们的优秀预案，我们得以在起义的早期夺取大片土地；然而，和国家的正规军不同，我们的根据地缺枪少炮，也没有足够的后备役人员，如果战争的持续时间进一步拉长，情况会对我们不利。铭记，我们已将一切投入到这次起义中，如若失败，我们将万劫不复！\n\n§O随着时间的推进，正面修正会逐渐削弱乃至造成负面影响。§!"

OLA_term_of_solidarity:0 "团结之期限"
OLA_term_of_solidarity_desc:0 "虽然兽乡解放军整体处在领袖达里安·赤羽的控制下，而直属达里安的派系也占据了主导地位，但不可否认的是，游击队内部仍然派系林立。形形色色的左翼组织抱着不同的思想都加入了我们的队伍，他们中有的真心愿意团结在同一面旗帜下战斗，有的则心怀鬼胎，伺机而动。在内战仍在进行的当下，我们得以维持解放军内部的团结，可等到统一以后，这将会成为我们的心头大患。"

OLA_land_of_suffer:0 "穷苦之地"
OLA_land_of_suffer_desc:0 "我们的根据地文盲遍地，工业基础贫弱，而且缺乏完整的军事人员训练体系和后勤体系。在处于游击战争的当下，我们尚且没有什么好的解决方案，唯一的出路便是打进首都，完成革命，统一兽乡。虽然实现国家统一不能解决所有问题，发展之路道阻且长，我们将需要付出无数的时间与精力才得以改变兽乡的现状，可这确实能缓解当下的燃眉之急。"

OLA_lonely_revolution:0 "孤独的革命"
OLA_lonely_revolution_desc:0 "自伟大的革命导师利爪·斯派克敲下革命的第一砖基石后，形形色色的左翼革命便在北方各地开展开来，几乎奠定了兽乡境内左翼思想的起源。尽管如此，如今的态势却并不理想，导师的后人在战争中落了下风，反动派在世界各地大行其道，邪恶的人类殖民者甚至卷土重来，亦或者借助像“绿洲”之类的温和派的名义行资本主义的道。在不发达而混乱的中巴与瑟拉斯地区，我们几乎无法寻求其它势力的帮助。\n\n§R毫无疑问，我们孤立无援。§!"

