###民族精神###
ROG_unprepared_revolution:0 "准备不足的革命"
ROG_unprepared_revolution_desc:0 "尽管长期受压迫的人类对阿方斯的残暴统治充满仇恨，但这场起义爆发得过于仓促。审判庭长期的严密监控导致抵抗阵线一直缺乏中央指挥系统，只能依靠散沙般的小组在暗处各自为战。我们的领袖埃里克·卡尔森，尚未来得及彻底整合所有派系与各地的组织。严重的物资短缺与混乱的行政体系，正让新政权的工业生产与科研工作陷入全面停滞。"

ROG_farhome_supply:0 "远乡物资输送"
ROG_farhome_supply_desc:0 "虽然很不可思议，但如今由何川领导的远乡抵抗军确实与我们结成了同盟，并成为了新生共和国重要的武装力量。他们已经在占领区秘密抵抗了数年，得益于其与西北特别行政区秘密建立的走私网络，得以通过边境线源源不断地为新生的共和国输送着宝贵的武器和人力。\n§R但他们真的别无所求吗？§!"

ROG_bastille_legacy:0 "东巴斯蒂亚大战的遗产"
ROG_bastille_legacy_desc:0 ""

ROG_dawn_prelude:0 "拂晓序曲"
ROG_dawn_prelude_desc:0 "随着第一声枪响打破了吉拉尼亚千年的沉寂，长久被压迫的人民终于迎来了属于他们的拂晓。尽管面临着匮乏的物资与强敌，但过去未曾设想的希望就在眼前，一切困难都被无畏的牺牲精神所取代。在这段宝贵的窗口期里，人们敢想、敢干、敢于流血，这股不可阻挡的浪潮正以前所未有的力量推动着新生的共和国向前迈进。\n§2民主的浪潮不可阻挡！§!"

ROG_siville_device:0 "“西维利尔”装置"
ROG_siville_device_desc:0 "§Y嗡——嗡——§!\n在政变期间，共和军付出了极其惨痛的代价，才攻克首都索兰瑟姆附近一座防备森严的小型军营，并意外缴获了这座庞大且诡异的巨型魔导造物。被俘的帝国研究员在销毁核心资料并拒绝合作后，给出了严词警告：必须不计代价地维持该装置的魔力运转。据紧急派遣的学者初步分析称，一旦注入海量魔力将其彻底激活，它将释放出足以扭转战局的“伟力”；但若魔力供给中途断绝，装置将陷入不可逆的灾难性内爆，其威力足以将索兰瑟姆及其周边地区彻底抹除。为此，新政府不得不抽调本就捉襟见肘的魔力供给，同时紧急抽调了学者，小心地展开与解析。\n§Y死亡终将平等地吞噬众生。§!\n\n\n\n\n   £GFX_texticons_TPG_7 \n\n\n"

