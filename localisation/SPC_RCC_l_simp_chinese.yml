###民族精神###
RCC_burden_of_responsibility:0 "所担之责"
RCC_burden_of_responsibility_desc:0 "自中巴斯蒂亚联盟成立以来，南巴大陆军一直是中巴最强大的军事力量。大陆军在几百年来一直维护着中巴局势的稳定。但在共和党依靠胜利城暴乱夺取政权之后，大陆军敏锐的察觉到了共和党政府的离心性。在共和党夺权的第一时间，大陆军司令部便宣布共和党违宪并组建中巴司令部。事实证明了大陆军判断的正确，没过几天共和党政府便成立了中巴独立同盟与他们兵戎相见。随后，整个中巴被内战撕成了碎片。从结果来看，大陆军的做法导致了中巴局势彻底崩溃。但从客观上来看，即使第一时间不与共和党为敌，共和党也迟早会宣布独立。不过这对大陆军来说都是过去式了，即使几乎没有任何民众支持他们也没关系。他们所要做的只是履行他们的职责：碾碎一切不稳定因素，不惜一切代价维持中巴的稳定。这是他们的职责，这是他们的使命，这是他们身为军人的荣誉。"

