###政党名称###
MTV_pioneer_communism_party:0 "各自治区泛左翼游击队及人士"
MTV_pioneer_communism_party_long:0 "各自治区泛左翼游击队及人士\n§g蒙特韦尔德联邦的共产主义者并不稀少，相反，他们在蒙特韦尔德联邦的各处活动，尝试建立一个各个民族能够和谐交流的地方。先锋共产主义者们聚集在各地的工业区中，不断活动着，拉起工人纠察队，但是往往这些活动并不能掀起多大的风浪。§!"
MTV_revolutionary_communism_party:0 "各自治区泛左翼游击队及人士"
MTV_revolutionary_communism_party_long:0 "各自治区泛左翼游击队及人士\n§g蒙特韦尔德联邦的共产主义者并不稀少，相反，他们在蒙特韦尔德联邦的各处活动，尝试建立一个各个民族能够和谐交流的地方。革命共产主义们经常活动在农村地区，在那里扮演义匪或者农民的解放者，但是在民族乡土观念浓烈的蒙特韦尔德联邦，他们的活动规模被削弱到了最小。§!"
MTV_worldunion_socialist_party:0 "各自治区泛左翼游击队及人士"
MTV_worldunion_socialist_party_long:0 "各自治区泛左翼游击队及人士\n§g蒙特韦尔德联邦的社会主义者们的定位实际上很尴尬，布罗兹·瓦尔特在早年的时候经常宣称自己是一位社会主义者，但是到越是到达晚年，伴随着他的保守主义改革落地，关于他是一位社会主义者的描述不攻自破。社会世联主义者在蒙特韦尔德联邦并不少见，他们大多赞同布罗兹·瓦尔特在早年对于社会的改革，但是同时又激烈的驳斥布罗兹·瓦尔特中后期一系列反动的改革。§!"
MTV_worldunion_democrat_party:0 "各自治区泛左翼游击队及人士"
MTV_worldunion_democrat_party_long:0 "各自治区泛左翼游击队及人士\n§g蒙特韦尔德联邦的社会主义者们的定位实际上很尴尬，布罗兹·瓦尔特在早年的时候经常宣称自己是一位社会主义者，但是到越是到达晚年，伴随着他的保守主义改革落地，关于他是一位社会主义者的描述不攻自破。民主世联主义者们经常视布罗兹·瓦尔特为一位“南巴秩序的先锋”，对于他的各项改革报以和稀泥式的“分开看”，并且闭口不谈瓦尔特统治晚年愈发高涨的独裁主义情绪。§!"
MTV_liberal_republican_party:0 "蒙特韦尔德共和制度党"
MTV_liberal_republican_party_long:0 "蒙特韦尔德共和制度党\n§g蒙特韦尔德联邦的共和主义者们大多是南巴思想的崇拜者，布罗兹·瓦尔特也曾经是其中一员，只是可惜他并不喜欢过度的“自由”。蒙特韦尔德共和制度党是少数在布罗兹·瓦尔特时期没有被拆散到各个地区的党派，拥有议会一半的少数民族席位，而在萨莱欧维政府崩溃后，共和制度党转移到南方，在南方筹备着重建政府的打算。§!"
MTV_conservative_republican_party:0 "蒙特韦尔德共和制度党"
MTV_conservative_republican_party_long:0 "蒙特韦尔德共和制度党\n§g蒙特韦尔德联邦的共和主义者们大多是南巴思想的崇拜者，布罗兹·瓦尔特也曾经是其中一员，只是可惜他并不喜欢过度的“自由”。蒙特韦尔德共和制度党是少数在布罗兹·瓦尔特时期没有被拆散到各个地区的党派，拥有议会一半的少数民族席位，而在萨莱欧维政府崩溃后，共和制度党转移到南方，在南方筹备着重建政府的打算。§!"
MTV_authoritarian_republican_party:0 "蒙特韦尔德共和制度党"
MTV_authoritarian_republican_party_long:0 "蒙特韦尔德共和制度党\n§g蒙特韦尔德联邦的共和主义者们大多是南巴思想的崇拜者，布罗兹·瓦尔特也曾经是其中一员，只是可惜他并不喜欢过度的“自由”。蒙特韦尔德共和制度党是少数在布罗兹·瓦尔特时期没有被拆散到各个地区的党派，拥有议会一半的少数民族席位，而在萨莱欧维政府崩溃后，共和制度党转移到南方，在南方筹备着重建政府的打算。§!"
MTV_national_socialist_party:0 "各自治区民族武装及人士"
MTV_national_socialist_party_long:0 "各自治区民族武装及人士\n§g蒙特韦尔德联邦的各个民族自治区绝对不缺少民族主义者，布罗兹·瓦尔特确实成功解决了半人马与人类的种族矛盾，但是却孕育出了更麻烦的小民族主义。国家社会主义们大多指责布罗兹·瓦尔特没有实现某一民族的真正抱负，让一个伟大的民族沦为另一个民族的附带品，而他们则要用手中的枪去实践自己的“宏图伟愿”。§!"
MTV_authoritarian_nationalism_party:0 "各自治区民族武装及人士"
MTV_authoritarian_nationalism_party_long:0 "各自治区民族武装及人士\n§g蒙特韦尔德联邦的各个民族自治区绝对不缺少民族主义者，布罗兹·瓦尔特确实成功解决了半人马与人类的种族矛盾，但是却孕育出了更麻烦的小民族主义。威权民族主义才是大部分民族主义的真正模样，他们犯下血腥的屠杀罪，然后将这归结于昨日的另一场屠杀。§!"
MTV_paternal_autocrat_party:0 "各自治政府"
MTV_paternal_autocrat_party_long:0 "各自治政府\n§g蒙特韦尔德联邦的各个民族自治区的政府就是最惟妙惟肖的独裁者画像，不顾他人意见，草菅人命。家长制独裁是大部分民族自治政府目前的样子，他们不服从自己以外任何人的命令，用着自治区的军队强力管控着内部，对其他地方的自治区则虎视眈眈。§!"
MTV_wizard_rules_party:0 "各民族自治省黑阳教派"
MTV_wizard_rules_party_2:0 "颓废党"
MTV_wizard_rules_party_long:0 "各民族自治省黑阳教派\n§g黑阳崇拜是提特兰半岛特色的一种诡异崇拜，他们歌颂黑阳王的法力强大与魔权暴政的伟业，但是在从未遭受过南方魔权统治的北方，他们很难有什么支持的人。§!"
MTV_wizard_rules_party_long_2:0 "颓废党-降临\n§g§R红，红，红§!\n\n§R祂§!的目标已经达到，§R祂§!的诡计已经完整。\n\n§R祂§!将毁灭提特兰，从首到尾。§!"
MTV_religious_extremism_party:0 "各民族自治省宗教民族武装"
MTV_religious_extremism_party_long:0 "各民族自治省宗教民族武装\n§g蒙特-维尔达教区是一个完全独立的古怪教区，甚至教区内部也古怪无比，各地的民族主义者为了彰显自己的的观点“发明”了许许多多异端的观点，以至于这个教区实际上干脆就是一个族裔一个宗教支系。§!"
MTV_anarchism_party:0 "萨莱欧维政府"
MTV_anarchism_party_long:0 "萨莱欧维政府\n§R……等待回应。§!"

###领导人###
MTV_none:0 "无关紧要"
MTV_government_of_saleovi:0 "萨莱欧维政府"
MTV_government_of_saleovi_desc:0 "§t现在你最好庆幸你还未死去\n可以去目睹这场真正的惨剧\n欢呼吧，欢呼吧\n享受这场末日吧§!"
MTV_government_of_saleovi_desc_advisor:0 "萨莱欧维政府实际上已经躲在防空洞里两个年头了。\n\n所有人都沮丧的在防空洞中等待着，等待着敌人冲进来，或者敌人被其他自治区赶来的支持者击败，但是可惜，什么都没有。时间在所有人面孔上划下了痕迹，不少成员已经疯狂，被关在他们原本富丽堂皇的卧室内，有些人则爆发出了惊人的理性，理性到非人的地步，他们不断在地图上比划着不存在的部队，幻想着从市区倾巢而出，将围攻部队击败，然后他们将会像是英雄一样取回瓦尔特元帅的荣耀。\n\n只是他们不知道，在他们的疯狂之下，围城战的目的已经随风而逝了，政变分子也开始不明白这场围城一开始是为了什么。城市内的指挥链崩溃了，市区的巷战部队已经彻底疯狂了，他们看见一个人就开火，用小刀将死去人的耳朵割下视作勋章，民兵们则在街头巷尾的角落中用冷兵器以最野蛮的方式杀死敌人，然后割下一点人肉，带回去给自己的家人享用。"

MTV_broz_caligula_walter:0 "布罗兹·“卡里古拉”·瓦尔特"
MTV_broz_caligula_walter_desc:0 "曾经那个充满魅力，满是自信的布罗兹·瓦尔特大元帅之子，那个希望国家稳定的青年，早已死于围城的第一年，那场疾病是神祇的计谋，那些黑影是神祇的预示，无人在意小瓦尔特的变化，无人在乎他便是一切的开端。\n\n现在在这里的是蒙特人的先祖从那七河草原到来的一位邪恶神祇，祂从那阴冷的七河草原之上落败，来到提特兰，被穆勒斯教会镇压了两个千年，这两个千年之中他受够了囚禁，他势要报复这片土地以及之上的人。而在提特兰崩溃之后，他则成功的脱逃，在提特兰的上空嗤笑着，将硫磺之火倾倒入这土地。\n\n在几次计谋与推波助澜之后，祂占据着这具躯壳，祂吹起一阵冰冷寒冷的风暴，创造了这地狱，祂名为卡里古拉——红神。\n\n§R红，红，红\n\n我唯见火光染上烟幕\n\n红，红，红\n\n那硫磺之火烧穿了烟幕\n\n红，红，红\n\n祂的躯壳正在世俗中\n\n红，红，红\n\n祂将在地上建成他的国\n\n红，红，红\n\n我的眼中早已血红§!"

###民族精神###
MTV_dust_to_dust:0 "尘归尘……"
MTV_dust_to_dust_desc:0 "蒙特韦尔德中央政府已经崩溃，这是不争的事实。\n\n布罗兹·瓦尔特死后，蒙特韦尔德就像是失去的大脑的生物，一切曾经美好的，一切曾经奢侈的东西归于尘土。战争之中的萨莱欧维在下雨——伴随着城外的炮声与巷间狙击手的交谈，如同优雅的圆舞曲，两者轻轻的牵着手，互相挽着对方起舞，将被残杀的无辜者的最后一声呜咽掩盖于典雅的雨幕之间。"
MTV_ash_to_ash:0 "……土归土"
MTV_ash_to_ash_desc:0 "所有人都好像疯了，他们互相残杀着，互相迫害着。\n\n泥土中埋葬着无数死去的人，有些人已经化作枯骨，有些人则还忍受着活蛆的啃噬。在萨莱欧维随处可见的大街上，一块柏油的马路上有五具尸体，有些是脑袋中枪，有些是身体中枪，但是唯一的相同点是他们都死了，并且加起来总共1000塔勒——拜托，狙击手们也有自己的家庭与生活，他们的糊口方式就是这个。"
MTV_uneasy_peace:0 "不安的宁静"
MTV_uneasy_peace_desc:0 "从各种角度来说，蒙特韦尔德所有的部队本身就是各个自治区拼凑起来统一指挥的联合部队。然而当中央政府崩溃后，统一指挥军队的中央指挥就不复存在了，各个自治省纷纷将国家的军队变成自治区的武装部队，有些地方的少数民族省也从这一崩溃中获得了职业化的民间武装团体。\n\n§R死神正在大笑着，祂已经看见了未来。§!"
MTV_human_trafficking:0 "人口贩卖与器官黑市"
MTV_human_trafficking_desc:0 "黑市在蒙特韦尔德联邦现在的状况下并不少见，在中央政府陷入内乱后，一些区域便开始兴起黑市，而当内乱的一年后，当地方苦苦支撑的物价崩溃之时，黑市开始逐渐被摆上台面，而唯一好用的货币只有三种：\n\n1 活着的人\n2 新鲜的器官\n3 楚元或者塔勒\n\n第一种和第二种作为一种非常好用的货币被摆上台面，而楚元或者塔勒并不多得。"

MTV_man_in_hell_1:0 "人间炼狱"
MTV_man_in_hell_1_desc:0 "我们并非§Y圣徒§!也并非§0罪人§!\n我们所要做的只是夺回我们自己的家\n§t敬所有勇敢者§!"
MTV_man_in_hell_2:0 "人间炼狱"
MTV_man_in_hell_2_desc:0 "我们有且仅有两个美德：§t残暴§!与§g无情§!\n在这场糜烂的战争之中，优胜劣汰才是唯一\n§2平等§!是个§R伪神§!"
MTV_man_in_hell_3:0 "人间炼狱"
MTV_man_in_hell_3_desc:0 "§R人与人之间宛若狼\n仇恨捆绑着我们的脖颈\n将我们吊死在名为现实的地狱里§!"

###发展度/政策###
MTV_elimination_society:0 "淘汰制社会"
MTV_elimination_society_desc:0 "§R优胜劣汰§!"
MTV_IP_end_of_social_contract:0 "社会契约论之终"
MTV_IP_end_of_social_contract_desc:0 "社会契约论是一种幻想，一种耻辱，资本主义与共产主义的永恒神战之产物。而我们不需要这些，奴役这些非纯血者是我们的天命，我们意志的胜利。"

###地区修正###
MTV_autonomous_region_1:0 "中部维尔达-缇尼厄奥民族自治区"
MTV_autonomous_region_1_desc:0 "缇尼厄奥混合自治省是以南方的缇尼厄奥自治区与北方的维尔达瓦利斯社区构成的，缇尼厄奥自治区当地深受提特兰共和国与南巴移民文化的熏陶，认为自己是特尼安人一支北方的后裔，应当在提特兰地区建立特尼安的国度。因此，他们与本地的维尔达人相处并不友好，甚至于来说，我们可以丝毫不怀疑，缇尼厄奥有独立的民族武装部队。"
MTV_autonomous_region_2:0 "东方维尔达人自治区"
MTV_autonomous_region_2_desc:0 "沃考瑞思自治省是少见的单民族自治省，或许曾经的蒙特韦尔德联盟曾经想把他们拆分，但很明显的失败了——或者是，不完全失败。东部的维尔达人已经开始逐步与中部的维尔达文化脱节，他们更多的人在农耕与常年的粗野生活中，养成了东部维尔达人更加粗野和豪放的本性。"
MTV_autonomous_region_3:0 "中部维尔达人自治区"
MTV_autonomous_region_3_desc:0 "维尔达奥拉自治省始终没有变成“区”，单纯是因为他们是维尔达人。\n\n维尔达人的民族起源在这里，在世界大战当中，维尔达共和邦在南巴人的军队到来前宣布脱离坎达德尔王国。但是在战后，为了方便管理战胜国们将北方同样独立的蒙特宪政国与共和邦合并，并且设立两个首都。中部维尔达人是一群“城市里的贵族”，他们经常嘲笑维尔达其他地方的落后，但是却总是避而不谈扎格罗巴也几乎是一座战前城市了。"
MTV_autonomous_region_4:0 "乌齐库姆-西方维尔达人混合自治区"
MTV_autonomous_region_4_desc:0 "乌齐库姆混合自治区是由大量半人马-人类混居的自治区， 这些半人马都是在战后从北方乔迁而来的，或许是有意为之，亦或者是故意为之，他们在当地创造许多移民社区，又进一步孕育了乌齐库姆认同，一种狂想人类与半人马被完全驯化成一种民族的认同——这种认同居然在当地有了一批激进的传播者，这让本就不安好心的蒙特韦尔德联盟直接让他们建立了一个从大维尔达中剥离的民族自治区。"
MTV_autonomous_region_5:0 "蒙特-德里尼-西方维尔达人混合自治区"
MTV_autonomous_region_5_desc:0 "卢卡维厄斯混合自治省堪称是民族矛盾的具象化表现，蒙特人们傲慢的盘踞在北方的自治区，南方受不了乌齐库姆认同的西方维尔达人迁移至此，不断地向外规划着新的定居点，而本地的少数民族德里尼人则是一个本身就好战的民族，因为流血冲突在当地并不少见。"
MTV_autonomous_region_6:0 "西方维尔达-蒙特-希纽人自治区"
MTV_autonomous_region_6_desc:0 "希纽图姆混合自治省是从一个在提特兰帝国时期就存在少数民族自治区“希纽尼亚大区”发展而来的。但是现在，在这片土地上，西方维尔达反而将希纽人驱赶了出去，蒙特人则直接与维尔达人冲突，让他们“退出蒙特人的天然疆域”。"
MTV_autonomous_region_7:0 "蒙特人自治区"
MTV_autonomous_region_7_desc:0 "蒙特人作为一个半人马的民族，他们在大部分时候对于疆域的占有欲堪称难以言述的强大。上到蒙特官员，下到蒙特平民，他们都会为了自己的土地而展现出残暴的一面，德尔文特姆地区自然也是，这个自治区的法律禁止任何其他民族的移民——包括混血儿。"
MTV_autonomous_region_8:0 "蒙特-莱布赫-青蒙人混合自治区"
MTV_autonomous_region_8_desc:0 "莱布赫尼亚混合自治区实际上是相对温和的一个自治区，这里的蒙特人与青蒙人关系并不算差，青蒙半人马又作为蒙特半人马与莱布赫人的桥梁缓和两边的矛盾，这里的居民同时享受着来自中巴的南巴影响与七河的七河风尚，如果没有大的意外，他们会共同享受这片安宁。"
MTV_autonomous_region_9:0 "青蒙-蒙特人混合自治区"
MTV_autonomous_region_9_desc:0 "高利库姆混合自治区是所有自治区中半人马化最高的，也是青蒙和蒙特半人马的“北方故乡”，青蒙指的是是在坎达德尔八世之后迁入的七河半人马们，他们保留了一部分的七河习俗，也更加接近七河本土的半人马们，他们经常被蒙特半人马形容成乡巴佬。而蒙特指的是坎达德尔八世之前的半人马迁入者，他们傲慢，强盛，且提特兰化，如果他们可以把他们民族的标志放在一个地方，他们绝对会这样干。"
MTV_ashes_of_saraiovi:0 "萨莱欧维之烬"
MTV_ashes_of_saraiovi_desc:0 "萨莱欧维熊熊燃烧，一切措施为时已晚。\n\n布罗兹·瓦尔特死后，整个蒙特韦尔德就开始不断地往下跌落，各个自治区开始有了自己的意见，拒绝服从中央政府的号令，继任的克尔瓦瓦茨·日沃伊诺维奇满脑子都是蒙特人的利益，在修宪意图加强蒙特人的利益中被少数民族极端派炸死。\n\n此后的联邦议会意图推举温和的佩洛维奇·曼纳上台，但是各个自治区都拒绝承认，首都圈卫戍部队中的极端分子宣布兵变，但是也没有拉拢到自治区的支持——最后，内战只发生在了萨莱欧维区，军队迅速掌控了城外，而政府军控制着城区。\n\n此后的围攻已经进行了两年，即使萨莱欧维几乎被打成废墟，即使这座联邦的中心，希望被摧毁，他们依旧在战斗。"

###内阁###
MTV_unity_stadium:0 "“团结”体育场"
MTV_unity_stadium_desc:0 "团结体育场是1996年第一届蒙特韦尔德团结运动会的特殊场馆，这里配备了一切运动场该有的，无数座位与巨大的草坪，曾经各个民族的人都在这里欢快的看着自己民族的队伍在赛场上赢得荣誉。现在的团结体育场座位上也是“人潮涌动”，但是都是死去的，发臭的遗骸——他们被放在座椅上，占据了整个体育场；而原本绿色的草坪，现在则是一个巨大的坑洞，里面堆满了战俘与无辜者。"

MTV_central_water_supply:0 "瓦尔特中央供水"
MTV_central_water_supply_desc:0 "瓦尔特中央供水是瓦尔特元帅时代，瓦尔特创办的国家企业，专注于全国水网的铺设，而其公司最理想的作品就是萨莱欧维的水网系统，几乎所有人都能喝到水库水，而非水井之类的天然水。然而在围城战中，这里也是第一个被占据的公共设施，围城方在占据了这里后往中央水库中投入了大量氰化物，导致城区大规模无辜居民的死去。"

MTV_holy_shells_and_bullets:0 "炮弹与子弹由穆勒斯指引"
MTV_holy_shells_and_bullets_desc:0 "萨莱欧维居民们的早晨总是充斥着火药与隆隆的声音，先是早上八点到九点的准时炮击，再是九点半标准的战斗机巡航机枪声，如果这些闹钟没有让你醒来，那你会错过十点到十一点半的城市日常生活时间，市民们会聚在周边的公园与没有什么楼宇的地方进行黑市贸易，如果你想吃到东西，就用塔勒或者活人来换。"

MTV_dream_of_fullness:0 "饱腹之梦"
MTV_dream_of_fullness_desc:0 "萨莱欧维已经被包围了两年，城外的军队拒绝将粮食送入城市，城内的萨莱欧维政府也从未开放过粮食配给，人们只能自寻出路；交易、互换、食人，这就是战争秩序下的萨莱欧维，但是饶是如此，这场看不见头的战争依旧在继续。"

###企业###

###将领###

###国策###
MTV_zhivoinovich_was_elected:0 "日沃伊诺维奇当选"
MTV_zhivoinovich_was_elected_desc:0 "当瓦尔特元帅离开人世之后，我们就展开了蒙特韦尔德革命同盟党内部的民主选举，在世俗的交易当中，日沃伊诺维奇将军击败了其他候选人。日沃伊诺维奇是一位颇为激进的蒙特裔将军，他在选举时不断承诺着维护瓦尔特元帅的遗产，但大部分人依旧认为他是一位过于激进的军方派。"
MTV_zhivoinovich_was_elected_tt:0 "革命同盟党万岁！蒙特-韦尔德万岁！瓦尔特万岁！"
MTV_handle_problems:0 "处理问题"
MTV_handle_problems_desc:0 "蒙特韦尔德革命同盟党并非一个想象中的庞大独裁主义政党，它是由各个自治省共同组成的一个超级联合式党派，而在这种联合的体制下，围绕在新当选的日沃伊诺维奇面前只有两条路，是稳定？还是理想？"
MTV_handle_problems_tt:0 "前路未尽，日沃伊诺维奇需要做出他的§R选择§!。"
MTV_monte_grande:0 "蒙特至大！"
MTV_monte_grande_desc:0 "日沃伊诺维奇很快团结起了他的蒙特人小圈子，以他们作为班底进入萨莱欧维的革命宫，这让诸少数民族对这一行为感到了不满，认为他是瓦尔特的再临；但是日沃伊诺维奇知道他自己在干什么，他将会比瓦尔特更加伟大，比瓦尔特更加强力，让世世代代的蒙特人在未来高呼着他的名字。"
MTV_monte_grande_tt:0 "骰子已经掷下，联盟的未来已经§R注定§!。"
MTV_divide_the_veld:0 "继续分裂维尔德人"
MTV_divide_the_veld_desc:0 "瓦尔特至少有一点是做的没错的，维尔德人是联盟的不安稳因素，他们在南方不断宣称着替代蒙特人的想法，这是不可被接受的，维尔德必须分裂！我们将会继续这一行为，将他们彻底分裂成三个民族。"
MTV_divide_the_veld_tt:0 "§R维尔德人会记住的§!。"
MTV_strengthen_rights_of_monts:0 "强化蒙特人权利"
MTV_strengthen_rights_of_monts_desc:0 "蒙特人天生就是统治者的民族，我们的先祖从七河而来，为坎达德尔而战，取得一次次荣誉。可是瓦尔特，他作为蒙特人并不在乎蒙特人的荣耀，他僭越的将他自己以及其他少数民族视为联盟的基石，而现在我们将重申我们的真正原则——\n§7蒙特至大§!"
MTV_strengthen_rights_of_monts_tt:0 "§R现实露出了獠牙……§!"
MTV_alliance_of_the_Monts:0 "蒙特人的联盟"
MTV_alliance_of_the_Monts_desc:0 "既然我们需要一个团结的联盟，那其他民族的意见或许就不这么重要，少数民族议员们在明日起将会被全体升职，从实权变成虚权，而剩余的空缺由蒙特人填补。或许他们会反抗会愤怒，但是这没有意义——因为现在我们掌控着蒙特韦尔德！"
MTV_alliance_of_the_Monts_tt:0 "§R所有人都被你惹毛了§!"
MTV_Montt_an_official_language:0 "将蒙特语列为官方语"
MTV_Montt_an_official_language_desc:0 "蒙特人的语言与维尔德人的语言其实并没有什么太大的差别，大部分词汇与语调也是共通的，只是蒙特语中来自七河的借词更多；而我们要做的就是让所有人都适应蒙特语，乃至彻底根除他们的语言。"
MTV_Montt_an_official_language_tt:0 "你们的§7巨塔§!，我们的§R血泪§!"
MTV_national_expansion_act:0 "诸民族扩张条例法"
MTV_national_expansion_act_desc:0 "诸民族扩张条例法的内容其实很简单，它只限制了除了蒙特人以外所有民族的迁移活动，无论是个人还是群体，都不允许出自己的自治区政府管理下领地；而蒙特人则被允许在各个自治区内以各种各样的理由迁移与定居。"
MTV_national_expansion_act_tt:0 "§R自治省文官们不堪其扰§!"
MTV_chance_to_mont:0 "机会给与蒙特！"
MTV_chance_to_mont_desc:0 "蒙特韦尔德的失业率其实并不算高，但是蒙特人经常被《民族协作法》中产业民族配额卡脖子，导致他们一生都无法担任更高的职务，而接下来我们将会修正这一错误，将放开蒙特人的民族配额，削减其他民族的配额——这只是必要的牺牲。"
MTV_chance_to_mont_tt:0 "§R蒙特人与其他民族矛盾扩大了§!"
MTV_stronger_than_hell:0 "我们比地狱更强大"
MTV_stronger_than_hell_desc:0 "全国的少数民族与不少文官发起了罢工，他们在大街上高呼着瓦尔特的名字，怒斥着日沃伊诺维奇对于他们福利的削弱。但是，一点警棍与宪兵就能让他们安静下来，去等待着他们的民族在蒙特人的梦中消逝。"
MTV_stronger_than_hell_tt:0 "比起§g敬爱§!，§R恐惧§!更能管理民众"
MTV_follow_the_marshal:0 "紧紧跟随瓦尔特大元帅"
MTV_follow_the_marshal_desc:0 "瓦尔特依旧是不少人心中的英雄，我们虽然不认同他的道路，但是作为维稳的手段，他必须被神化，我们将将他从公墓中移出，经过处理后，将他放置于国民广场的中央纪念堂的玻璃棺材中，供万民瞻仰。"
MTV_follow_the_marshal_tt:0 "§O他知道你们这么做的话，大概会复活吧。§!"
MTV_1997_constitution:0 "1997年宪法"
MTV_1997_constitution_desc:0 "1997年将会被蒙特韦尔德铭记，我们做出的改革将会彻底的做出新的榜样，从此以后，蒙特人能够成功的站立在这片他们自己的土地之上，没有其他民族，没有其他语言，蒙特万岁！"
MTV_1997_constitution_tr:0 "日沃伊诺维奇屹立"
MTV_1997_constitution_tt:0 "§R你确认你要这么做吗？§!"
MTV_develop_mont_industries:0 "发展蒙特人产业"
MTV_develop_mont_industries_desc:0 "伴随着1997年宪法的施行，各个自治区的权利开始被削减。维德尔人也被分化，不成气候了。接下来就是延续瓦尔特大元帅的道路，继续发展产业——但是稍作修改，只给蒙特人发展产业的权利。"
MTV_develop_mont_industries_tt:0 "蒙特至高，至上，至伟"
MTV_coop_with_rsb:0 "与南巴斯蒂亚合作"
MTV_coop_with_rsb_desc:0 "南巴斯蒂亚是我们的老朋友了，无论是经济还是政治，我们与南巴斯蒂亚都是密不可分的共同体，让他们的资本来吧，养足蒙特。对此，我们将会降低其他民族的移民政策与劳动法律，让他们更好适配南巴斯蒂亚的工厂主们。"
MTV_coop_with_rsb_tt:0 "或许这一决策会在未来给你点颜色瞧瞧"
MTV_god_bless_mont:0 "穆勒斯保佑蒙特"
MTV_god_bless_mont_desc:0 "日沃伊诺维奇看着他所铸造的一切，民族隔离，软性灭绝，社会冲突，民族矛盾——但是他奇迹般的挺了过来，蒙特人正在逐渐清洁蒙特韦尔德，从经济上、文化上、社会上。愿穆勒斯垂泪，为我们的多米那特（主宰者）指引继续指引方向。"
MTV_god_bless_mont_tt:0 "国家，民族，虔敬\n日沃伊诺维奇万岁"
MTV_st_more_than_anything:0 "稳定高于一切"
MTV_st_more_than_anything_desc:0 "日沃伊诺维奇并没有像是许多人想像的那样强力的立刻选择，他最终选择了稳定，他与温和派，少数民族圈子的人施行了“联合执政”，革命宫之外的蒙特人们愤怒的指责日沃伊诺维奇背叛了他的竞选承诺，但是日沃伊诺维奇政府并没有回应这些指责，他很清楚自己在干什么。"
MTV_st_more_than_anything_tt:0 "骰子已经掷下，联盟的未来已经§R注定§!。"
MTV_ease_conflict:0 "缓和蒙-维矛盾"
MTV_ease_conflict_desc:0 "蒙特人和维尔德人的矛盾其实主要是因为一些地区上的争斗，我们将会派出特别专员划定这些地区的具体界限与社会界限，虽然这间接维持了民族隔离，但是这是我们结束这段紧张关系的开始。"
MTV_ease_conflict_tt:0 "维尔德人欢呼雀跃"
MTV_minority_rights:0 "少数民族权利"
MTV_minority_rights_desc:0 "蒙特韦尔德同盟所在的地区在提特兰的历史中，就是许多民族的混合区，文化的承载区，不少地区的少数民族甚至可以追溯到帝国征服之前，乃至先知诞生之前。我们所要做的就是重新重视他们，划定他们的居住区。"
MTV_minority_rights_tt:0 "一丝虚幻的可能性"
MTV_end_to_grand_nationalism:0 "终结大民族主义思想"
MTV_end_to_grand_nationalism_desc:0 "所有人都知道，大民族主义思想可以在各种时候煽动选票，但是后果也是严重的，自从日沃伊诺维奇背叛大民族主义团体后，他就遭到了多次有预谋的袭击，但都被阻止了。而现在他要从他开始，终结这份孽缘。"
MTV_end_to_grand_nationalism_tt:0 "所有人都会记住的……"
MTV_unite_but_different:0 "和而不同"
MTV_unite_but_different_desc:0 "和谐，稳定，自由，蒙特-维尔德这个名字将会重现人间，不再会有歧视性的“韦尔德人”这样的歧视性话语了，多个民族，一个社会。"
MTV_unite_but_different_tt:0 "或许我们值得更好的社会"
MTV_migration_and_expansion_Act:0 "人口迁移扩张条例"
MTV_migration_and_expansion_Act_desc:0 "人口迁移扩张条例的内容是在议会中争吵后，各个自治区给与的最折中方案，条例中规定了合法迁移与迁移人口数量，并且收回了一部分的自治权，这份条例还对各个少数民族自治区的迁移做了强调，以求保障少数民族权利。"
MTV_migration_and_expansion_Act_tt:0 "文官们抱怨实施的困难"
MTV_complete_nation_laws:0 "完善民族法"
