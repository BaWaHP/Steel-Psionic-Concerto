MTV.1.t:0 "第二年的末尾"
MTV.1.d:0 "一道，一道，又是一道。\n\n斯科托夫用着手中的一块金属碎片在这面水泥墙上划着，记录着今天他是否还活着，以及今天是围城的第几天。时间在萨莱欧维已经没有意义，没有多少人还记得有多少今天到底是几号了，只有几个模糊的时间点——十点、十一点、两点、五点，然后回到十点。\n\n他慢慢数着不知多少前人留下的划痕，用最原始的方式记录着日子留下的痕迹在这面曾经是一栋建筑的墙上画下了不知多少划痕。斯科托夫只能从头开始，一点点数着，当做消磨时间的方式。\n\n最终，他点到了一个精确的数，如果他没有点错或者重复点的话——\n\n730，加上他自己刚刚留下的，731，731天。"
MTV.1.a:0 "§R两年！两年！§!"

MTV.2.t:0 "雄心壮志"
MTV.2.d:0 "1996.8.20记录\n\n布罗兹·小瓦尔特在他的临时指挥部中绝望的叹着气。\n\n已经过了多久了？从他雄心壮志的开始围攻开始，每一天都是煎熬。整个蒙特韦尔德并没有像是他想象的那般团结，他也没有像是他父亲般的号召力，他只能控制着首都省的事，而其他地方发生的一切他都完全不知道发生了什么。他的手下们的怨言们也不断的攀升，他们的军队人数压根不够，只能在控制下的城市中抓壮丁，让他们混编着他的手下去攻入萨莱欧维，首都省的一大部分依旧处于失联，不确认态度。\n\n他不知道为什么事情会变成这样，一天，一天，又一天；他看着他父亲与他的合照，他当时第一次披上军装，与他穿着元帅服的父亲站在革命宫的房间内，在他父亲的画像之下，他当时笑的很高兴，非常高兴，他觉得自己将会和父亲一样，一样带领国家走向强盛。\n\n但是他父亲拒绝了他。\n\n他拒绝让他的孩子们参与政治，参与他所掌握的权利漩涡之中，小瓦尔特被留在了军队中，他对此非常愤怒，但是又非常无奈，谁叫他的父亲是布罗兹·瓦尔特？\n\n他父亲那慈祥又庄重的模样依旧在他的印象里，他的留存的照片上，他部下的话语中，那些难民中——他们都在高呼他父亲的名字，他父亲的幽灵。"
MTV.2.a:0 "“幽灵在我的面前现身”"

MTV.3.t:0 "黑色的影子"
MTV.3.d:0 "1996.12.30记录\n\n布罗兹·小瓦尔特最近总是很难入睡——压力压上他的肩膀，却没有给他任何喘息的机会。他授意往首都的供水里投了大量氰化物，还在镇压首都省其余地区地方政府军的时候用了光气，他的部队虽然没有说什么，但是也开始有点疏远他了，不是因为良心的谴责，而是攻城的进度依旧没有什么进展，军队在巷战中损失了太多人，却连革命宫的面都没摸到。\n\n他只能吃吃安眠药，祈求自己能够在药物的催眠下能够进入安眠，但是没有，一次都没有。在夜晚的黑暗中，即使开着所有的灯，他依旧感到无比的恐惧与寒冷，他总是看见一团黑色的影子，在他的余光中不断出现，又消失。他觉得自己是染上了什么东西，于是便去找到随军牧师，问了问，但是牧师即使用上了神术，也没能成功让黑影消失。"
MTV.3.a:0 "“在此时，此刻，神祇注视于此”"

MTV.4.t:0 "癫狂"
MTV.4.d:0 "1997.3.15记录\n\n布罗兹·小瓦尔特似乎已经对一切都不抱希望了。那些指望着他的父亲名号的军人们现在正在无意义的对着他表达着自己的不满——明明是他们自顾自的希望，又自顾自的绝望，怪着他发起了这场没有尽头的围攻。\n\n他大病一场，病的几乎都要死了。\n\n直到转机来临。\n\n那是一个雷雨之夜，他突然从军中消失了。\n\n军官们只能开会，开无尽的会，虽然他们都不知道要聊些什么，但是他们就是在开会。在光线下，黑暗之外，军官们只是吸着烟，喝着酒，就这样坐着。\n\n直到小瓦尔特的到来。\n\n他  受  够  了。\n\n他干掉了那些说着闲话的家伙们。\n\n一个一个的，挖了他们的心脏，挖出他们的眼睛，切掉他们的舌头。\n\n这场围攻逼疯了太多人，比如小瓦尔特就是其中之一，一年的压力不断的击溃了这位26岁青年的精神防线，让他成为了血腥的屠杀者。\n\n布罗兹·小瓦尔特或许已经不存于人世间，现在活着的仅仅是一具疯狂的空壳，绝望且痛苦的报复着人间。"
MTV.4.a:0 "“新生如此美好……”"

MTV.5.t:0 "社会契约论之终结"
MTV.5.d:0 "1997.3.20记录\n\n“我不知道怎么了，军队的人都疯了……”极为潦草的笔记记录着记录者在非常极端的情况下“之前好歹在我们工作的时候仅仅只是监视和监工，有正常的休息时间和正常的工资，而自从昨天开始，他们开始强迫我们劳动了。”\n\n“禁止我们午休，禁止我们吃午饭超过五分钟，一旦有不听从的就会被杀。甚至听说周边的工厂重新恢复了抽十杀一，我真是想不明白，事情为什么会变成这样，我已经干了超过24小时了，难道之前那一顿午饭真的是最后的午饭？”\n\n“我好像被发现了，他们看见我手上铅块留下的痕迹。”\n\n……\n\n血液盖住了这一部分\n\n……\n\n“我 不 想 歹”"
MTV.5.a:0 "它等待着它的焚毁。"

MTV.6.t:0 "之后"
MTV.6.d:0 "1997.7.23记录\n在萨莱欧维投放光气之成效\n计划实行期：7.12-7.23\n成效：有效\n投放地区：前线\n内容简报：\n\n我们在下水道与城区一些地区投放了毒气，具体为K区（城区）与J区（下水道）。\n\nK区状况：\n成功杀伤敌军一个区域内的大多数民兵，剩余民兵由赎罪军团逐一消灭。\n优点：成功制造了占领区\n缺点：尸体太多，造成堆积\n解决方案：在“团结”体育场堆尸\n\nJ区下水道情况：\n成功剿灭地下抵抗势力，但是还是有少部分藏匿于水中的抵抗军存活。\n优点：不用处理尸体\n缺点：水源导致了抵抗军大规模存活\n解决方案：将死亡尸体置入下水道中污染水源。"
MTV.6.a:0 "无声尖啸"

MTV.7.t:0 "新年快乐！"
MTV.7.d:0 "1998.1.1记录\n\n新年到了。\n\n虽然萨莱欧维中的大部分人都不清楚真正的时间，但是还是有人为他们献上了新年礼物——毒气弹，炮弹，以及大规模的军队从城市四方涌入。\n\n屠杀开始了。\n\n萨莱欧维城市中的大部分人看着这些眼中满是恐惧的“战兽”们拿着冷兵器，不要命的冲锋着，屠杀着能看见的一切人。\n\n城市被分割成了大大小小好几块，毒气区与潮涌一般的热潮淹没了城市，大炮不断的开火，不断地有建筑倒塌，起火，以及爆炸。"
MTV.7.a:0 "新年快乐！"

MTV.8.t:0 "最终胜利"
MTV.8.d:0 "在最终的一个月后，围城终于结束了。\n\n萨莱欧维已经不再合适居住了，这里甚至已经称不上一座正常的城市了。\n\n大部分的建筑已经被夷为平地了，少许建筑依旧耸立，但是也已经被破坏的格外严重，链接城市的大桥也已经倒塌，现在正常渡河要从一堆尸体上的木板踩着过去。而布罗兹·小瓦尔特就是其中之一，他穿着古典时代皇帝的衣服，身边的“禁卫军”也穿着这样的衣服，举着枪，往前步行着。\n\n他的目的地就是革命宫，这座象征蒙特韦尔德之盛的宫殿。\n\n他一步步的走着，就好像是皇帝在巡视自己的战果。\n\n他的身边总是能听到残存的枪声，这是军队尚且还在处决城市里的民兵。\n\n他更随着那些枪声打着节拍，享受着这一过程。"
MTV.8.a:0 "“我乃万世之主”"

MTV.9.t:0 "罐装国家"
MTV.9.d:0 "打开革命宫的地下室后，铺面而来的是恶臭。\n\n无尽的恶臭。\n\n十几具尸体混乱的摆放在现场，他们围绕着大餐桌，餐桌上有一具用烤盘拖着的白骨，形状各异的保持着他们被杀死前的模样。\n\n萨莱欧维政府始终不存在，在围城后的第一个月，他们就吃完了所有粮食，开始吃人，无数张对军队的调令堆满了这地下室，但是纸面上这些部队都从不存在。到围城后第二个月，他们就已经互相残杀，留下了这一地狼藉。\n\n所有人只觉得荒诞，无尽的荒诞。\n\n蒙特韦尔德一个国家就这样在这个罐子里以尸体的方式治国了一年有余。"
MTV.9.a:0 "“唯余无尽的嘲笑与恶臭在此”。"

MTV.10.t:0 "不承认，不承认，不承认"
MTV.10.d:0 "“鉴于我方拒绝承认目前现当前的蒙特政府，又鉴于蒙特政府在围城战争的疯狂举动，我们将按照《蒙特-维尔德联邦协议书》第三条，按照自由退出权利投票退出联邦……” 卢日支·瓦茨巴终于在无数闪光灯下说出了这句话，虽然他早就想这么干了。蒙特人从1995年开始就没有尊重过他们，而到现在才了离开联邦，已经算是对于联邦的仁至义尽“……我们年轻的维尔德民族从今天开始将会重新审视我们的历史与文化，我们不再，也不可能再一次屈服于暴君与贵族，共和主义万岁，共和邦万岁！”"
MTV.10.a:0 "维尔德的十字再一次高悬"
MTV.10.a.tt:0 "§O维尔德人§!将离开§7联邦§!，不义的§7联邦§!已§R死§!，老瓦尔特死不瞑目。"

MTV.11.t:0 "南逃"
MTV.11.d:0 "在萨莱欧维区南部边境，一个蒙特家庭在尝试渡过河流逃离这个国家，他们在恐怖的围城战早期就试图逃了出来，为此作为父亲的萨拉利特·茨卡纳抛弃了他的岳父和岳母。冰冷的河流让他的孩子冻得瑟瑟发抖，而他的妻子也饿了很久只能被她的丈夫扶着走。就在快到河对岸时他们被发现了，“是狗蒙特人，看那对狗驴耳，肯定是的。”这些巡逻的民兵直接拿枪指着这些人。茨卡纳立刻跪在河里请求对方放过他们一家人，茨卡纳向这两个民兵讲述了他的经历，北方已经彻底完蛋了，他还说着魔鬼降世什么胡话。两个民兵对视了一会……"
MTV.11.a:0 "“什么鬼话，想这么多干什么”"
MTV.11.a.tt:0 "§R这些维尔达人还是那么愚蠢§!"
MTV.11.b:0 "“什么鬼话，哪来的神经病，晦气”"
MTV.11.b.tt:0 "§Y这些维尔达人还是没能理解这些真相§!"

