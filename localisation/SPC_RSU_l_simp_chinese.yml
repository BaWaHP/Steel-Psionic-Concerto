RSU.15.t:0 "横祸"
RSU.15.d:0 "本·贝格在布雷施特矿难发生前，就已经在这干了两年了，但他并不属于矿工的一份子。\n\n原因在于管理矿洞的领班是他的父亲，而平日里他几乎没有到过深矿区，也基本没干过脏活累活。本始终没有透露这些，而工友也半猜半就地接纳他。\n\n矿难是地震的次发性灾害，在联盟中央政府反应过来前，布雷施特一度沦为了无政府地带。工人们的尸首被矿石分离，幸存的流氓地痞甚至品行不端的矿工化为暴徒将秩序撕裂。他们有的成匪，烧杀抢掠；有的加入工革联。后者不久后在其统一领导下维持了基本的秩序，本的父亲却被别有用心的议员指控，成为矿难的“罪魁祸首”，深陷牢狱之中，母亲在悲痛中也走向生命的末路。\n\n令本惊讶的是，工友们没有祸害他，甚至向工革联介绍他的情况，要求革命代表委员接受、教育这位思想滞后的“小同志”。本清楚父亲与议员的纠葛，早就深谙鲁萨尔政局诡谲，但没成想其降临地如此之快。对建制者的仇恨在先，于是他坦然装作是工人同志的一份子。\n\n在代表委员的影响下，本逐渐认识到相处多年的工友们的苦难，对于自己的特殊身份也颇为顾忌。他想要坦白，以此坦诚地成为工人的一份子，抛弃过往的身份，而噩梦也从那时开始。\n\n起初，他的代表委员是站在本这一边的，也尝试号召其他人原谅他并给予改正自新的机会。但是那些被仇恨占据理智的工人不那么想，随着他的过往被逐一揭露，工棚之外的死难者的亲属们便旗帜鲜明地高呼要审判本。\n\n像是提前预谋一般，本在醉酒后意外地遭到挑衅，难以压抑的情感爆发，随即的冲突使他失去了庇护。在工革联不容违反的纪律下，他的财产被收缴——虽然自父亲死后他也没剩下什么，但被放逐后本也只剩下分文不值的性命。\n\n联邦议员夺走了本的家庭，工革联的激进分子践踏了本最后的自尊，他正处于鲁萨尔社会的裂缝之中。\n\n倘若一定要有人付出代价......"
RSU.15.a:0 "那应让哀嚎响彻高塔。"

RSU.16.t:0 "补偿"
RSU.16.d:0 "“目前的情况十分糟糕，大震之后的余震导致主矿洞外的其他矿脉之嫌也坍塌了不少，而且更为严重的是矿区附近的居民区。据不完全的统计，目前可以确定的遇难人员有五千人左右，还有包括但不限于一万的失踪人员。”奥斯戈提·科里德结束了这令人无言的话题，而紧接着接过话题的艾弗特·奥托又说道：“除了人员上的伤亡之外，格罗尼森的基础设施以及矿产公司的财务损失也异常之大，这些损失并非全是地震直接导致的，更多是地震结束后政府机构和军队组织的瘫痪所造成的混乱导致的。”朱丽安娜·古尔薇格听到这也开口说道：“据我所知，在当地官员和军队龟速反应时，反而是工革联的暴徒们率先组织起人手救险救灾，我们该反思，先生们。”\n\n施塔德深深叹了一口气：“是啊，我们该反思。”艾弗特小心翼翼的开口说道：“目前更棘手的问题是，我们该如何处理这次事故，民众们已经得知了这惨剧，纷纷指责政府对矿产公司工作环境安全排查的纵容与姑息。”施塔德毫不犹豫的开口道：“涉案公司，一概立案调查，有证据就，不，不必。涉案公司一概数罪并罚，给民众一个交代。政府内的涉案官员也一概拿下，让他们跟最高法院去解释。”\n\n奥斯戈提听到这点了点头：“除此之外，我们对矿难人员及其亲属的补偿更为头疼。无论是恢复瘫痪的政府机构用于统计，还是对伤者，无家可归者的安置和处理，这些都需要塔勒，非常非常多的塔勒。”施塔德不语，见此情况，阿尔伯特·伯格开口道：“与此同时我们要注意的是，由于市场信心的崩溃，我国的金融现在一塌糊涂，在考虑援助矿难人员之前，我们也要考量好自身的经济问题。”朱丽安娜也开口提道：“由于目前联盟的危机情况，东区的那些赤匪暴徒们也在蠢蠢欲动，我们尤其要注意这种倾向的威胁。”\n\n见会场内的各位已经发表了自己的意见，在犹豫过后，施塔德下定了决心，开口说道："
RSU.16.a:0 "“做应做之事。”"
RSU.16.a.tt:0 "§C矿工们在哀嚎，而他们妻儿的现状令人泫然泪下，我们应尽到自己的责任，对得起人民，做应做之事，别让她们继续哭泣。§!\n\n§Y格罗尼森大矿难§!追加效果：\n生活消费品：§Y+10.0§!\n每周人力：§G+50§!\n稳定度：§G+10.00%§!"
RSU.16.b:0 "“尽力收缩财政吧。”"
RSU.16.b.tt:0 "§R联盟的财政已经几近崩溃，尽管受难区的民众们值得同情，但出于大局考虑，我们将不得不遗憾告诉他们：联盟已经尽力了。§!\n\n§Y格罗尼森大矿难§!追加效果：\n生活消费品：§Y-5.0§!\n稳定度：§G+5.00%§!"

RSU.17.t:0 "秘密会面"
RSU.17.d:0 "鲁萨尔城内，风车区和黑区交界处的一栋地下室里。\n\n德克里克特·阿墨斯端坐在一张长桌之前，作为联盟政府的副总统，他在此屈尊等候显然是令人惊讶的。其实一开始他也以为是施塔德在开玩笑，但总统阁下用带着疲倦的眼神打量他后开口道:“迪克瑞，我也想这是个玩笑，但很可惜它不是。有一封邀请函被送到了正义宫前，而经过国安局的调查，这的确是工革联的邀请函，邀请我们一叙矿难之事。”\n\n没等他多想，一阵轻浮的脚步便打断了他的思绪，随着轻微的吱呀声后，一个紫发身着蔚蓝工装服的高大男子便毫不客气的——从他不敲门的行为举止来看，很显然他也不会介意直接坐在德克里克特的对面。双方没有握手，没有寒暄，因为毕竟双方的关系一直剑拔弩张。德克里克特打量着这个工革联派来的代表:据情报指出，这是工革联头目爱迪尔梵·黑戈博根的助手之一，名叫约翰·阿尔布雷希特，他似乎并没有什么固定的职务，但深受黑戈博根的信任。\n\n在短暂的冷场后，德克里克特清了清嗓子:“贵组织在邀请函上尽管已经说明了来意，但具体的情况还需要……”他的话并没说完，约翰·阿尔布雷希特便打断了他:“我们工革联的目的是希望让受难民众的损失尽量降低，并得到更好的待遇与补偿，并没有其他的目的和阴谋。”说完这话后他轻蔑的打量着面前衣冠楚楚的联盟部长:“说句私下的话，我一直不同意主席那么做，你们所谓的补偿和救援并不能掩盖你们监控的失责和矿难初期的不作为所导致的混乱。”说到这他停顿下来，而后又咬着牙说道:“但既然主席已经决定，那我也只能全心全力的支持。我们来这只是让你们知道我们不会趁火打劫，在稳定布雷施特地区的情况后，工革联希望你们能够组织地方上的重建与恢复。如若不然……”到最后他倒冷静下来，轻轻吐出了一句话:“我们在看着你们。”\n\n说完这些话，约翰·阿尔布雷希特起身潇洒的走出房间。而德克里克特·阿墨斯则从这一堆强硬话语里捕捉到了实质:双方的矛盾暂时搁置，在援助布雷施特方面工革联会尽量做到克制，并在援助完毕后协助政府部门的重建。\n\n想到这他看向门外，有些意外的摸了摸下巴:"
RSU.17.a:0 "“真是干脆啊……”"
RSU.17.a.tt:0 "§Y格罗尼森大矿难§!追加效果：\n稳定度：§G+5.00%§!\n战略资源获取率：§G+5.00%§!"

RSU.18.t:0 "无言的信"
RSU.18.d:0 "埃格先生，这是一封代表鲁萨尔工人革命联合阵线所有致力于实现平等与民主的同志的致信：\n\n布雷施特的代表团早在矿难后第一时间便向中央政府申请救援和援助。毫无疑问，这是所有民众和尚有良心人士所推崇的。然而大部分的死难者和居民区难民不仅没有灾后恢复的补助，甚至因为联盟政府无法及时恢复灾区秩序而被迫独自自救，而无秩序的蔓延导致了更多难民因此被暴力胁迫或犯罪。\n\n对此，工革联代表广大灾区群众，对议会诸位阁下提出四个疑问：\n\n一. 布雷施特的遇难者在诸位心中置于何处，是否只是合同上的一笔可有可无的数据？\n\n二．诸位不仅对工革联救援灾区的同志抱有偏见，而且也早已不加考虑地将灾区同胞驱赶到对立面？\n\n三．诸位何故一再漠视工革联与灾民组成的代表团的请求，难道多年来的民主理念仅因矿难者并不高昂的补偿金而功亏一篑？\n\n四．采用近似舞弊的手段，从而不惜代价取得选举的胜利，从而使联盟的经济大受波折，而由民众来直接承担经济崩溃的后果。民主化的垂直建设已如同虚设，而顶层设计却也为粉饰门面？\n\n端坐在庙堂上的老爷们，芙蕾施曼的精神遗产被诸位描绘为“幽灵”飘荡在上空，资本成为了所谓束缚幽灵，捍卫思想的卫士。但愿资本的送给你们的镣铐不会背叛你们，因为诸位的掘墓人早已在未来等候着，直至审判的降临。"
RSU.18.a:0 "署名：全联盟工农民众，敬启"

RSU.19.t:0 "心有余而力......"
RSU.19.d1:0 "作为总统的特使，路德维希·赫斯曼怀着复杂和沉重的心情乘专列抵达了度夫道夫，联盟此次的危机已经不是鲁萨尔一个国家能够解决的了，现在的联盟急需他国的援助，而同处在一个联邦内部的南巴共和国自然是最理所当然的求助对象。\n\n路德维希顶着炽热的烈阳踏入了专门来迎接他的专车，心里却在想这次鲁萨尔又该付出什么代价，作为一个业余的作家，路德维希一直热衷于研究大革命和帝国时期的南巴历史。而从很久之前,路德维希便认识到鲁萨尔与南巴的关系就是在一段段互相退让的历史中逐步升温的，帝国时期的选帝侯制度和共和革命时期鲁萨尔对南巴共和国的追捧和拥护，这些都能表明同宗同源的两国之间不可替换的盟友关系。无论是从经济上的一衣带水还是政治上的你侬我侬来说，南巴也的确不能不管鲁萨尔的危机。\n\n但令路德维希疑惑的是，一向热闹的度夫道夫大都市今天居然意外的冷冷清清，但容不得他多想，专车停在了度夫道夫著名的国际酒店维瓦特大酒店外，他不安又困惑的下了车:因为这并不是原本应该抵达的地点。在向外交人员一次次确认流程却被拒绝后，路德维希恼怒的低吼道:“该死的南巴佬，他们究竟想搞什么?”说罢他便想坐回专车上，尽管鲁萨尔现在危机重重，但国家尊严同样也不容亵渎，但这时，满头大汗的南巴工作人员告知了鲁萨尔方将有人接待他们的通知，尽管十分不满，但为了鲁萨尔的利益，路德维希还是忍气吞声的走向了酒店的会议室。\n\n走进会议室后，路德维希发现只有一位外交部的副部长在那里等待，他心里不祥的预感油然而生:不对头到极点了，即使南巴佬做慢惯了，但在这种事情上不该如此的吊着鲁萨尔。而那个外交副部长也如他所料的道出一个晴天霹秀的消息：奥特兰·卡拉萨辛于不久前遇刺,不治身亡，而街上萧条的景色就是因为戒严所致。除了总统遇刺之外，中巴的崩溃也导致共和国金融的崩盘，共和国目前出于动荡状态，实在无法大规模援助鲁萨尔，但出于人道主义救援的考虑，南巴政府愿为格罗尼森的难民提供一些援助。\n\n路德维希麻木的听完了全程，麻木的将情况加密发给国内，麻木的坐上了专车，麻木的乘上了专列，却在即将驶离南巴边境时埋头喃喃道:"
RSU.19.d2:0 "“总统先生，看在联邦的份子上，救救鲁萨尔吧。”\n\n坐在奥特兰·卡拉萨辛对面苦苦哀求的是刚下专机不久的鲁萨尔总统特使路德维希·赫斯曼，多日未休息的南巴总统也是毫不客气：“恕我直言特使先生，你们鲁萨尔人，鲁萨尔政府已经把本身就极其糟糕的局面变得更加糟糕了，现在该讨价还价的不是你们，而是我们。”\n\n路德维希张口想说些什么，却又屈辱的住了嘴，继续听南巴总统说着：“诚然中巴地区的问题我们的责任不小，但股市乃至于金融上信用的崩溃十分至少有八分，”他顿了顿，用手指指着路德维希，犀利的眼神中藏着掩饰不住的敌意：“是你，你们政府提前预支中巴分红来发行债券导致的！”说完了他才意识到自己过于激动的发言已经导致了对面特使的脸都被气红了。\n\n路德维希再无法抑制自己为祖国辩护的欲望：“总统先生，我要提醒你，我们的政策在金融市场方面并没有什么可以指摘的问题，究其根本还是联邦没能在中巴维持稳定的状态！不要把所有责任都引到鲁萨尔身上！”卡拉萨辛靠在椅背上，疲惫的挥了挥手：“我向你道歉，赫斯曼先生。但话题拉回来，共和国现在的确没有精力也没有能力来帮鲁萨尔度过这次危机。”刚才还气得发疯的路德维希听到这话脸色变得极差：“总统阁下，你不能...”\n\n“这是没有办法的事情！我向您说句实话吧特使先生，共和国内部的问题远比你们想的严重，我们真的对鲁萨尔的现状没有任何办法！”看着眼前这个和施塔德同样疲惫的男人恳切的说出这样的话，路德维希便意识到了自己这次的出访将无功而返了。在临了，卡拉萨辛轻咳一声：“我国政府对在格罗尼森的难民表示万分的同情，并愿意提供一些人道主义救援。”\n\n......\n\n在返回鲁萨尔国内的途中，一直在闭目养神的路德维希·赫斯曼突然轻声说道："
RSU.19.a:0 "“联邦完了...”"
RSU.19.b:0 "“联盟完了...”"
