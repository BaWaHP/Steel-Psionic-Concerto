RSU.20.t:0 "求助于七河"
RSU.20.d:0 "鲁萨尔请求与七河召开新一轮商贸协商后，七河方面拖延了半个月才接受。\n\n与鲁萨尔工业寡头奥斯戈提忙里忙外不同，七河大使，或者说[ZBC.GetLeader]身边的同事和助手比上次少了一半，在频繁看向手表的同时，还不停给下属交代之后的工作安排，显然并没有把这次协商太放在心中。\n\n协商总算开始，鲁萨尔方面一开始便申请了更大规模的信贷，并且有意淡化了己方所能提供的代价。墨精灵看了眼时间，然后点着香烟消磨时间。抽完一根后，又急不可耐地望向手表。\n\n“公司...不，惠远需要考虑进一步合作的可行性，相信我们会给出更互惠和更实际的方案。”[ZBC.GetLeader]的语气平淡至极甚至于冷酷。\n\n“贵国为何不能信任我国，上次会议的承诺都不作数了吗？”口若悬河却等来何其傲慢甚至不屑的语气，明显挑动了奥斯戈提紧张的神经，使她握紧了拳头，神色愤怒的说道。\n\n[ZBC.GetLeader]举起手指，不紧不慢地为自己开脱： “奥斯戈提先生，协商是建立在互惠互利的基础上的。据我所知，布雷施特的矿料已经断供了许久，东区的工业品产出也呈断崖式下跌。中巴联盟崩溃后，贵国，甚至整个南巴联邦的货币信用也早就一落千丈，这同样对七河造成了损失，贵国谈判的筹码似乎并没有多少。”\n\n“所以在这样紧急的时刻，我们才会寻求七河的援助。如果贵国无法协助恢复经济，那么联邦金融的大衰退带来的灾难可不仅仅会波及南巴地区，哪怕是七河，也难以独善其身。”奥斯戈提据理力争，试图将七河与鲁萨尔的命运捆绑起来，但很可惜，功亏一篑。\n\n负责人的助手凑到她耳边说了一句话，她站起身用非常遗憾的语气说道：“非常可惜，先生们，你们给出的理由和价码连公司都说服不了，更遑论惠远方面。我，嗯，我们先暂且暂停一下谈判。”于是乎，七河方面便单方面结束了协商。据说，七河打算在中巴战争中寻求比鲁萨尔还大的买卖，鲁萨尔对于七河来说还是遥远的多。"
RSU.20.a:0 "眼见起高楼，眼见宴众宾，眼见大厦崩"

RSU.21.t:0 "无功而返"
RSU.21.d:0 "施塔德每天都会从医师那边服用镇定片，在听说中巴变故和布雷施特矿难后的一周后勉强维持住秩序。随后让艾弗特·奥托通知内阁成员召开会议，顺便也叫上了大选时资助过自己的一些“老朋友”。\n\n一周前的政府区内还充斥着胜选的欢声笑语，破碎的香槟瓶仍在花坛里闪烁，而现在官僚和报社的汽车不耐烦地鸣着车笛。车上下来的人都板着一张脸，仿佛先前的喜悦已是陈年往事。施塔德带着憔悴的面容进入会场，瞪着眼睛扫视在场的每一个人，试图找到看上去还能“毛遂自荐”的人，但每个眼神都在回避着。\n\n奥托开始介绍当下的情景与问题，时不时听到叹气声，雪茄烟雾在天鹅绒窗帘上织出灰网。\n\n“布雷施特地区的形势必须稳定下来，如果工革联政权如平底楼台般在那里拔地而起，在场没有一个人能接受这样的结果......”施塔德挺直身子，随后像担心没人听进去似的，又站起来强调这一事实。\n\n一人忍不住打断了他：“仅仅在恢复秩序和对抗工革联分子的宣传上，我们已经烧掉了公立大学半年的预算，如今还要在恢复生产时应付积怨已久的工人，而矿脉的坍塌已经引发了新一轮工业萎缩。”他摊开双手，显得既无奈又焦急。\n\n随后施塔德将目光转向自己的“老朋友”，看到他们无动于衷，显得更加焦躁了，抖动的双手将赤字报告捏出褶皱。\n\n光鲜亮丽的同僚们此刻却不慌不忙地点上几根烟：“施塔德，是你先欺骗了我们，中巴的事情凭你三言两语就糊弄过去了，枉我们煞费苦心选你上台，现在中巴开始内战，资金链彻底断开了。你所透支的信用使我们夜不能寐，更别谈意料之外的矿难了。”\n\n施塔德捏住拳头，反而斥责起来：“当初选举前答应的团结，大难临头就要各自飞了？”\n\n“鲁萨尔从经济上来说终究是联邦企业的国度，尽管你是总统，但遗憾的是，利益才是企业生存的规则。所以总统阁下，如若您无法保障我们的收益，那么我们也不得不请您将仅剩的自由留给我们。”\n\n此时此刻，他知道这意味这什么。"
RSU.21.a:0 "信任的裂隙已成鸿沟。"

RSU.22.t:0 "党内会议"
RSU.22.d:0 "“真是一场可笑的闹剧，我早该像拜尔迪恩那样闭门谢客！”\n\n“冷静一下韦恩，事情发展到这个地步也不能全怪总统阁...”\n\n“这让我如何冷静？党派把总统的责任交予埃格那家伙要的可不是这个结果！”\n\n“弗里兹·韦恩！我警告你，你要是再...”\n\n站在会议室门外的默默聆听的施塔德被一阵疾风拂面——那是弗里兹·韦恩狠狠摔门的副产物，在看到施塔德后，韦恩愤怒的表情里闪过了一丝尴尬的不自然，但随即他冷哼一声，一边整理自己的领子一边大步流星的向外走去。\n\n像以往一般，施塔德召开了一场党内的高层会议。但并不令人意外的是，有部分成员，比如拜尔迪恩·博特给总统先生的秘书狠狠吃了闭门羹，毕竟他们的企业和利益网在这场危机中损失了太多。而弗里兹·韦恩的离场也是可以预料的：在1994年总统选举中他是施塔德的党内竞争对手，并且在对垒中输的一塌糊涂。\n\n走进会议室后，迎来的是一阵可怕的沉默，就连施塔德忠实的拥趸德克里克特·阿墨斯也无言以对，大家都尴尬的看着施塔德·埃格走到主位坐下一言不发。最后是朱丽安娜·古尔薇格缓缓开口道：“韦恩最起码说对了一句，党派把总统的责任交给你想要的的确不是这个结果。”\n\n现场的气氛更冷了，在大家都替施塔德感到尴尬时，施塔德平淡的开口道：“我自知难辞其咎，我已经做好了决定和准备，在不久的将来退出自由党并辞去联盟总统这一职务，给在座或者不在座的诸位一个交代。”这一爆炸性的消息将会议室的众人惊得不轻，而紧接着施塔德嘴里吐出的话语却如同冰窖一般冰冷：“而我希望的，是党在危机中对我的配合。如若不然，也许我做不了什么大事，但作为联盟的合法总统和自由党的党魁，我有的是信心和能力将党与诸位的利益网带入万劫不复之地。”"
RSU.22.a:0 "隔天报纸上全都报道着自由党对施塔德·埃格的无条件支持"
RSU.22.a.tt:0 "§Y中巴危机§!追加效果：\n政治点数获得：§G+5.00%§!"

RSU.23.t:0 "议会上的承诺"
RSU.23.d:0 "在施塔德·埃格踏入议会大厅的那一霎那，嘈杂混乱的大厅顿时安静了一瞬，但紧接而来的就是更混乱乃至于疯狂的动静，无数议员红着眼嘶吼着，仿佛要将施塔德撕碎碾成浮尘。而施塔德缓缓走向了演讲台，在此期间，无数恶毒的语言和声嘶力竭的质问他都置若罔闻，只专注的走着自己脚下的路。见到施塔德仍旧如此平淡，一位气愤到极致的议员失去理智的拿起自己的皮鞋狠狠向施塔德头上扔去，尽管他的准头奇差，皮鞋并没有砸到施塔德而是砸到了另一名议员，但负责安保工作的卫队士兵还是礼貌的将这位失去理智的议员请出了议会大厅。\n\n站在演讲台上的施塔德·埃格沉默着，而台下的议员们也都盯着他的一举一动，直到他清了清嗓子:“今天，我并非是以总统的身份站在这里，而是作为联盟的一员，国家的公仆的身份站在这里。”施塔德说完这话后，尽管台下仍然有不小的喧嚣声，但认真听他演讲的人也同样不少。施塔德并没有多少停留，继续说道:“前段时间关于格罗尼森地区的灾难，已造成超过数万家庭陷入困境。那些未能及时获得援助的儿童，那些在临时安置点外哭泣的母亲，妻子——这些应当刺痛我，我们所有人的良知。”\n\n伴随着施塔德的话语，议会开始逐渐变得安静，专注。但一声高呼打破了这氛围:“但是你，你们自由党欺骗了整个议会！整个联盟！”原本还算安静的大厅又开始嘈乱起来，施塔德拿起话筒以贯穿之音快速说道:“不，这都是我的错误，是我错估了中巴地区的局势，也是我一手造成了提前预支分红的决策，但我们目前齐聚此地的目的并非是为了争吵。首都和各地的证券经纪人都在崩溃的边缘，而格罗尼森可怜的儿童和无数破碎的家庭都在等待着我们的救援！”\n\n他深深吸了口气:“我理解你们的所有质疑和愤怒，我的责任不可推卸，因此我会在救险结束后辞去鲁萨尔总统的位置，并自愿接受最高法院的审判。”说到这时，就连自由党的同僚们也都目瞪口呆的看着施塔德，而施塔德纹丝不动，继续开口:“联盟曾经经历过更黑暗的时刻，但无论是魔兽的铁蹄还是僭主们残酷的统治，都无法使得联盟屈服或认命。如今我们更要秉承着先辈的精神，无数的家庭正等待着我们的决策，而我们绝不能将时间浪费在扯皮上。”\n\n说罢他从怀里掏出一份文件来展示给所有人看:那是一份《全联盟宪法》的复印件，施塔德庄重的将宪法放在演讲台上，右手抚胸，左手覆在其上:“宪法给予了我四年的任期，而我将承诺，我会在三个月内安置好所有难民，并救助每一个受灾家庭 将联盟从经济泥潭中拉出，对自己的所作所为进行赎罪。”从踏入会场以来一直坚硬的面部线条到这再也坚持不住，他带着悲悯和哀伤的声音传遍了整个大厅:\n\n“请给我一个机会……”"
RSU.23.a:0 "施塔德于次日安然踏进总统府"
