###国策###
RSU_fresh_new_year:0 "天仪再始"
RSU_fresh_new_year_desc:0 "鲁萨尔在人们心中究竟是什么样的，不同的人会有不同的看法。\n\n投资者与商人会觉得这里简直是贸易的天堂。即使世界大战摧毁了鲁萨尔的经济。但不得不不承认，鲁萨尔作为南巴的交通枢纽和商业贸易最为繁荣的国家，这里对于他们来说是梦幻般的地方，是必生所追求的应许之地。\n\n而对于底层的劳动者来讲，这里是他们拼劲全力都想要离开的地狱。虽然他们已经习惯了逆来顺受，但是就连泥人都还有三分火气。对于这个腐朽的国家，或许他们心中只想着逃离或者...摧毁掉她。\n\n不过不管怎么说，鲁萨尔正拖着她庞大又略显臃肿的身躯迎来新一年。别苦着脸了，为新年的到来干一杯吧！"
RSU_alliance_conference:0 "联盟大会"
RSU_alliance_conference_desc:0 "新的一年，自然也会有新的大会。一年一度的联盟大会即将召开，是时候回顾现任政府这四年的政绩与新年的发展规划了。\n\n尽管联盟大会历来都是传统的三大政党吵架的地方。但联盟的发展规划和各邦的诉求都会在联盟大会上体现。而且今年还将迎来四年一度的大选，大会上的选择与建议将会对今年的选举的结果产生影响。不过我们相信，现任政府与自由党已经做好了准备。虽然未来未必会如我们所愿..."
RSU_comfort_east_district:0 "安抚东区"
RSU_comfort_east_district_desc:0 "东区指的是由格罗尼森，克莱尔海姆，雷斯科里恩三个邦州组成的行政区划。自帝国时代，这里便是鲁萨尔工商品产出最重要的支柱。\n\n但近年来，因为经济环境的进一步恶化以及工革联的煽风点火，东区的工人们已经越来越蠢蠢欲动。正所谓百忍方可成金，现在的联盟更需要的是稳定。与其让罢工运动愈演愈烈，不如主动示好，以一部分无关紧要的让步来换取整体局势的利好。"
RSU_comfort_east_district_tt:0 "解锁§Y联盟大会-东区§!发展决议。"
RSU_development_west_district:0 "拓展西区"
RSU_development_west_district_desc:0 "西区指的是由哈伦瓦尔德，海德里格，海伦芬蒂三个自由邦组成的行政区划。这里是联盟近现代以来发展最好的地区，蓬勃的海运业以及来自墨精灵的投资，这些使得西区在整个联盟经济一片惨淡之时仍然屹立不倒。\n\n我们自然要让西区的繁荣万世永昌，新一轮的投资和城市拓展将开始执行。让东区的泥腿子和政府里的反对派们明白，自由党完全有能力解决联盟的一切问题。让南巴共和国明白，谁才是联邦经济的顶梁柱。让世界明白，鲁萨尔将稳定下去，直到永远。"
RSU_development_west_district_tt:0 "解锁§Y联盟大会-西区§!发展决议。"
RSU_developing_the_southern_district:0 "发展南区"
RSU_developing_the_southern_district_desc:0 "南区指的是由鲁萨尔，博尔登，韦塞勒三个州组成的行政区划，南区也是整个鲁萨尔经济最为繁华，历史最为悠久的区划。这里代表着鲁萨尔的过去，现在，以及…将来…？同时，这也是自由党的传统票仓。只要南区的大人物动动手指，选票就会像雪花一般飘到自由党的选举箱里。\n\n也正因此，联盟对于南区的发展与未来必须是及其重视和在意的。南区的投资规划将成为每一任自由党政府的头等大事。虽然南区的经济受到过冲击，但毋管未来如何，此时此刻这里仍是鲁萨尔的经济文化乃至政治中心。只需稳步向前，联盟甚至整个南巴的塔勒都会向鲁萨尔涌来，汇成鲁萨尔金融上的丰碑。"
RSU_developing_the_southern_district_tt:0 "解锁§Y联盟大会-南区§!发展决议。"
RSU_developing_the_northern_district:0 "开发北区"
RSU_developing_the_northern_district_desc:0 "北区指的是由赫尔茨，霍斯特韦尔两个邦州组成的边疆地区。自邦联时期开辟这两地以来，他们的职责使命就已经注定：成为鲁萨尔镇守边疆的前哨及关卡，以及通往提特兰的大门。\n\n但尴尬的，峰峦绵亘的涅特温杜巴山脉横跨了两地八成以上的面积使得两地自古以来就难以开发，除极少数商路以外两地在经济上几乎毫无贡献。但时至今日，人类早已征服群峰，而山间最珍贵的宝藏也映入了联盟的眼眶：绵延不断的山脉里存在着数不胜数的矿物。不过，作为保守党的传统票仓。本地的保守主义风气十分盛行。\n\n不过我们相信，随着金钱和自由之风打入群山之巅，再保守的地区也终会开放起来。加之北区丰富的矿脉资源，这将成为北区崛起的重中之重，也将成为我们削弱保守党的决定性力量。是时候该启动北区的投资计划了，它将为联盟带来数不尽的财富，进而刺激整个鲁萨尔市场的同时，将保守党变成我们可以控制的温顺的小动物。"
RSU_developing_the_northern_district_tt:0 "解锁§Y联盟大会-北区§!发展决议。"
RSU_our_current_status:0 "而今现状"
RSU_our_current_status_desc:0 "我们已经敲定了联盟未来的发展计划了，接下来要做的就是解决联盟的问题和那该死的现状了。\n\n我们需要“修缮”一下我们的财政数据。这些数字是联盟的命脉，也是我们不能逃避的现状。鲁萨尔必须要保证这些数字是一个好看的样子，这是我们解决现状的唯一办法。我们需要一个好看的数据来维持人民对联盟的信心，同时我们也要靠着他们让那些泥腿子们明白，联盟依然在蒸蒸日上。"
RSU_market_for_god_sake:0 "市场...市场啊！"
RSU_market_for_god_sake_desc:0 "鲁萨尔与市场,一对绝妙的搭档，自鲁萨尔建国以来，经商与贸易便成为了她的代名词。市场自然也就与鲁萨尔达成了从始至终渊源，在鲁萨尔，没人能想象到鲁萨尔亦或者市场离开彼此的情景。\n\n尽管市场所带来的——金融危机，从未远离鲁萨尔人。但鲁萨尔对市场仍然趋之若鹜，尽管近年来市场日渐萎靡的现状也是联盟政府不得不面临的难题，但，只要市场不灭，联盟便会一如既往的繁荣昌盛！"
RSU_eastern_dilemma:0 "东部困局"
RSU_eastern_dilemma_desc:0 "工革联，鲁萨尔政府最为之头疼的组织。自工会联合阵线被几个强硬的独夫强行将听命于政府的工会改组为工革联后，东部邦州的工人游行与暴乱就愈演愈烈。工革联所蛊惑的民众越来越多，而这块附骨之疽，已经被联盟政府视如大敌。\n\n尽管地方警察的预算已经一增再增，但工人们的反抗却未减弱半分。近来格罗尼森的矿工频频罢工，扰乱邦州政府的正常生产活动。是可忍孰不可忍，是时候该让格罗尼森恢复秩序了。"
RSU_finding_more_resources:0 "藏者，矿也"
RSU_finding_more_resources_desc:0 "除过我们已经给各公司规定的北方矿藏指标外，仍有一些浅层矿脉因为各种各样的原因仍未被开采，现在我们需要抛掉一切困难开发这些资源，而开发这些资源的重任，也就落到了国企建筑集团的肩上。\n\n鲁萨尔国有企业建筑集团，联盟最大也是最出名的国企。这家公司几乎承担了鲁萨尔政府一半的建设订单——特别是交通命脉方面的。不过如今看来，即使是开掘资源这项技能，他们也同样擅长。"
RSU_finding_more_resources_tt:0 "解锁§Y鲁萨尔国有企业建筑集团§!作为工业企业。\n以下工业部门追加效果：\n\n§Y$RSU_industrial_concern_rusal_construct_corp$§!：战略资源获取率：§G+10%§!\n§Y鲁萨尔现状§!追加效果：\n生活消费品：§Y-5%§!"
RSU_zhe_investment:0 "七河投资"
RSU_zhe_investment_desc:0 "今年来，联邦内的经济愈发的不景气。当然，准确的说自大战结束以来，联邦的经济就再没有景气过一天。但越来越严重的失业跟市场的凋零正一步步勒的联盟政府喘不过气来，尽管联盟已经竭尽全力，但无论工人还是投资者却都在抱怨什么，工资待遇低，投资环境差。\n\n如果不尽快调动市场的积极性，联盟不会不知道后果的。抛去大大小小的游行罢工外，百余年前的农民战争仍然历历在目，联盟上层都不希望看到第二个威廉.达尔曼出现。情况如此危急，而七河一年一度的投资计划今年却一推再推，也许是时候联系七河大使对此进行详谈了，联盟急需这笔投资来稳定局势。"
RSU_zhe_investment_tt:0 "§Y鲁萨尔现状§!追加效果：\n稳定度：§G+5%§!"
RSU_south_connection:0 "南部联系"
RSU_south_connection_desc:0 "南巴共和国，联邦与生俱来的领导者，巴斯蒂亚大陆的民主灯塔......\n\n这些固然没错，而鲁萨尔联盟作为与南巴千年邦谊的兄弟之国，尽管两国关系自大战后便逐渐冷淡下来——俗话说断人财路如......更何况鲁萨尔承担了联邦内部大量的预算开支，甚至可以说鲁萨尔就是联邦的钱袋子。\n\n但十余个纪元的友谊与联系绝不会就此断裂，两国历史上比这剑拔弩张的时候多了去了，绝不能因此耽误鲁萨尔继续作为南巴钱袋子的地位，看向南方吧，南部与南巴交通线的再次翻新就是最好的印证。"
RSU_south_connection_tt:0 "§Y鲁萨尔现状§!追加效果：\n稳定度：§G+5%§!\n政治点数获得：§G+10%§!"
RSU_prepaid_central_bastia_income:0 "中巴分红的预支"
RSU_prepaid_central_bastia_income_desc:0 "§R财政危机§!正一步步向我们逼近，任谁面临§R赤字§!与§t罢工§!力度的一天天增幅都会感到绝望，我们别无他法，节流早已做到极限，也许是时候在开源上想想法子了。\n\n幸运的是，联盟还有一项最大的§G收入§!：贯穿整个巴斯蒂亚大陆的中巴铁路跟中巴联盟股份的分红。现在我们需要的是挺过这次的危机，毋论对错，至少我们得去做，才能知晓答案，希望联盟能够§R瞒天过海§!，度过危机..."
RSU_fixing_the_division:0 "弥补裂痕"
RSU_fixing_the_division_desc:0 "众所周知，鲁萨尔社会的情况之前随着可以称得上是割裂的，不过可喜可贺的是，经过联盟政府的努力后现状略有好转了起来。现在是时候尝试弥补联盟内部的裂痕了，再怎样也不能让工革联的暴徒们继续犯上作乱了。\n\n而暴徒们暴乱的土壤便是鲁萨尔那些负担沉重且目光短浅的工人们，他们才不管什么经济增幅市场自由，他们只知道相比于南巴，他们的福利政策算得上是不足甚至是可怜。不过鲁萨尔的福利政策委实陈旧古老了些，就算是为了国家稳定我们也许也得上调一些福利政策以博取工人们的支持。"
RSU_fixing_the_division_tt:0 "§Y鲁萨尔现状§!追加效果：\n稳定度：§G+5%§!\n自由共和主义每日新增支持度：§G+0.05§!"
RSU_election_coming:0 "大选将即"
RSU_election_coming_desc:0 "大选啊大选，四年一度的大选。民主共和的根基，鲁萨尔的传统。\n\n随着大选的即将召开，尽管埃格所领导的联盟政府已经尽其所能去做必要之事，但各地地方政府的代表仍对这位维系者颇有微词。而埃格清楚的知道，联盟政府现在不能失去他——准确来说是不能失去维系者。不然轻则自由党政府垮台，重则联盟危矣。\n\n当埃格为此头疼不已时，党内给了他一份名单和选择，一个不得不面临必要之恶的选择..."
RSU_preparation_in_shadow:0 "暗中的准备"
RSU_preparation_in_shadow_desc:0 "自埃格参政以来，他的志向就已经确立了：复兴鲁萨尔联盟，使联盟重返以往的辉煌。但自他继任总统大座后这个目标却离他越来越远...他也只能精疲力尽当好一个维系者的角色，但即使是这样，他也决不能让联盟就此分崩离析。目前，也许只有这么一个选择了...\n\n在施塔德下定§R决心§!后，命运的齿轮就此转动。"

###二阶段###
RSU_triumphant_return:0 "持衡拥璇"
RSU_triumphant_return_desc:0 "大选§7顺利结束！§!毫无疑问，在多方撵转奔走的情况下，施塔德顺利当选。但还没等自由党的人弹冠相庆时，两份电报却§0不解时宜§!地相继传来......"
RSU_triumphant_return_tt:0 "§Y情况发生改变...§!"
RSU_crisis:0 "始料未及的大危机"
RSU_crisis_desc:0 "来自格罗尼森和中巴的消息打破了施塔德踌躇满志，他绝望的发现：如果一个目标建立在虚妄的大厦上，那么当大浪退潮之时，剩下的也不过是荒谬绝伦的残渣。即使他拼尽了一切想要联盟回到她曾经的辉煌时光，但谎言终究是谎言，现在，是时候§R自食其果§!了。"
RSU_compromises:0 "妥协，妥协！"
RSU_compromises_desc:0 "值此§t危难§!之时，再无§7回旋§!之机。目前我们唯一能做的就只有团结联盟的内部势力，相忍为国，共同§0捱过§!这一段苦难岁月。"
RSU_compromises_tt:0 "§Y中巴危机§!追加效果：\n自由共和主义：§G+0.05§!\n政治点数：§G+5.00%§!"
RSU_mine_disaster:0 "处理矿难事故"
RSU_mine_disaster_desc:0 "来自格罗尼森的坏消息震惊到了联盟高层——特别是在另一重坏消息的交映之下。无数矿工的妻子儿女在哭泣，而可以预见的是，工革联的逆贼们绝对会对此小题大做，借题发挥。因此，联盟现在需要做的是对矿难人员的立即救援。"
RSU_mine_disaster_tt:0 "§Y格罗尼森大矿难§!追加效果：\n每周人力：§G+50§!\n稳定度：§G+5.00%§!"
RSU_commitment_to_compensation:0 "承诺补偿"
RSU_commitment_to_compensation_desc:0 "此次事故的原由除了地震外，更大的原因是矿井管理人员对矿场设施安全的忽视与对矿工安全的藐视。因此，政府应承诺出台更有效力的矿场监管法，以及对遇难人员的家属进行适当的安置。"
RSU_negotiations:0 "与工革联的谈判"
RSU_negotiations_desc:0 "可以肯定的是，工革联——这一从未被传统政治势力承认的组织绝不会放弃此等天赐良机，尽管多年以来联盟政府与其的对抗会给双方的沟通带来难以交流的§R困境§!，但看在圣女玛丽安的份上——现在联盟需要做的是坦诚以待，尽力而为，至于剩下的，§0听天由命§!是矣。"
RSU_negotiations_tt:0 "情况会随着我们选择的不同而§Y改变§!..."
RSU_ask_rsb_for_help:0 "向南巴求助"
RSU_ask_rsb_for_help_desc:0 "尽管联盟很想靠自己捱过此次难关，但事与愿违，情况变得越来越糟糕了。现在我们不得不弯下自己的身段去向高傲的“兄弟”——南巴共和国进行经济上的求助了，况且中巴事变他们也难辞其咎。此次危机不光影响的是我们，如若扩散开来对整个联邦来说也是一记重拳，希望共和国能看在革命的份上，拉我们一把！"
RSU_ask_zhe_for_help:0 "向七河求助"
RSU_ask_zhe_for_help_desc:0 "七河人，鲁萨尔西部经济的活化剂，源源不断的§C楚元§!投资给鲁萨尔市场带来了出乎意料的§7活力§!——那是§Y过去§!，也可能是§7未来§!，但我们迫切需要的是，§R现在§!。我们亟待来自七河的投资来振奋人心，谈判使团要不惜一切代价获得七河的投资，即使联盟软弱急切的求助可能会成为谈判上的不利因素，但我们也已经无法再顾及那么多了，只要能挽回鲁萨尔，管什么§0代价与否§!。\n\n不能让七河袖手旁观，自去年来双方的贸易往来不知为何持续降低，这对我们经济的影响是巨大的。七河官方态度至今扑朔迷离，就连前段时间和七河的谈判都是由联合公司代理谈判，希望七河人诚信的品质，和双方多年来的合作信任能够给联盟带来一针来之不易的强心剂。\n\n希望如此......"
RSU_recourse_to_domestic_consortiums:0 "向国内财团求助"
RSU_recourse_to_domestic_consortiums_desc:0 "能做的都已经做了，为了弥补所犯下的罪责我们已经竭尽所能，但目前看来为联盟所准备的措施仍略显单薄。而将视角转回国内，鲁萨尔的各个财团一直是鲁萨尔各界不可或缺的支柱，联盟多年来予以方便以助他们，他们亦以利润回报联盟。\n\n尽管在这种时刻说服他们相信且支持政府十分困难，但为了鲁萨尔，至少我们得试一试。"
RSU_consequences_of_exposure:0 "东窗事发的后果"
RSU_consequences_of_exposure_desc:0 "显然，来自中巴的坏消息不仅仅指的是市场信心的崩溃，作为信誓旦旦保证过的埃格总统，他自然难辞其咎。\n\n施塔德埃格明白，接下来他所面对的将是无止境的指责与唾骂，他对此毫无怨言。但大局为重，作为已经连任成功的总统，即使议会想要弹劾他也需要大量的时间，而鲁萨尔可就没那么多时间了。为了挽回自己对联盟的过失，他要尽自己的所有的努力。"
RSU_accusations_from_within_the_party:0 "党内的指责"
RSU_accusations_from_within_the_party_desc:0 "施塔德的所作所为给自由党带来了灾难性的后果：民意指数断崖式的下跌的，来自各方势力的抨击与指责，最重要的是，企业主们对自由党的失望与愤怒。\n\n这件事总需要一个人来负责，无论是作为已经无法参选的总统，还是本次事件的责任，施塔德埃格，再合适不过了。自由党已经准备好了一次高层会议，在这次会议上施塔德埃格的命运将被钉死，再无斡旋之机。"
RSU_parliamentary_infighting:0 "议会的攻讧"
RSU_parliamentary_infighting_desc:0 "“这是对国家的不忠，是对人民的欺骗，是对议会的侮辱！”这句话是一位议员在危机后对采访镜头的咆哮。\n\n没错，施塔德政府和自由党对中巴危机所带来的灾难几乎要负百分之百的责任，议会的多数议员出奇的愤怒：作为鲁萨尔真正的精英阶级，他们可以接受失败，可以接受妥协，甚至能够容忍压迫。但现任政府的所作所为实在是触及了他们的底线，已经有人开始奔走弹劾施塔德埃格了，也许是时候让傲慢的自由党尝尝触犯原则的后果了..."
RSU_president_speech:0 "总统的演讲"
RSU_president_speech_desc:0 "最终尽我们所能，我们与国内各利益集团达成了脆弱的共识。但仅凭私下的交易与声明显然并不能使民众满意，在搞定其他事务后，我们的当务之急便是让民众信任政府能改变现有危机。而向民众演讲以获取支持，恰恰是我们施塔德·埃格总统的强项。因此，我们在联盟总统府——正义宫前，安排了一场声势浩大的演讲，以唤得民众集体意识中尚存的爱国心。"

