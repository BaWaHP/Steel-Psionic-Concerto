###政党名称###
RSU_pioneer_communism_party:0 "鲁萨尔革命党"
RSU_pioneer_communism_party_long:0 "鲁萨尔革命党"
RSU_revolutionary_communism_party:0 "鲁萨尔工人革命联合阵线"
RSU_revolutionary_communism_party_long:0 "鲁萨尔工人革命联合阵线\n§g自《鲁萨尔农民战争》出世以来，鲁萨尔进步势力对§7完美社会§!的探索从未止步，而越来越多的人则更注意现实世界中的苦难——自鲁萨尔诞生以来便饱受压迫的§t工农群众§!。\n\n原本鲁萨尔的所有进步势力都尽数归于进步党麾下，但自1878年阿莱克·威利斯领导的进步党政府地所作所为，彻底摧毁了天真的知识分子们对大同世界创设的畅想。进步党自此分裂，独走的高层在此之后的数十年间逐渐建立起名为§R鲁萨尔工人工会联合阵线§!的组织。\n\n而至大战期间，工会联领导层被保守党的花言巧语所迷惑，唆使和鼓动工人们“爱祖国，爱联邦”。并发动支持战争公债的运动，因此造成了工会联内部的分裂。\n\n在大战幻灭后，工会联内部的激进派向领导层发难，彻底终结了温和派的统治。确立了以暴力革命手段推翻联盟政府的反动统治，实现人民民主的阶段性目标。自此往后§R鲁萨尔工人革命联合阵线§!浴火重生，而联盟内部阶级斗争的燎原火焰熊熊燃烧。§!"
RSU_worldunion_socialist_party:0 "鲁萨尔进步党左派"
RSU_worldunion_socialist_party_long:0 "鲁萨尔进步党左派\n§g进步党内的保守派终结是太软弱了，他们无法洞察正是松散的联盟体制才导致了所有人民需要的政策无法被通过乃至于通过后也无法有效施行的残酷真相\n也许是时候了，无论怎样，我们再也无法与保守派们继续媾和。我们应该去寻找更积极的盟友和同志…哪怕理念相左，我们也应当为鲁萨尔人民的福祉跟未来从而一博。\n无论未来如何，吾等只为人民。\n尽管我们将不得不与暴徒共舞。§!"
RSU_worldunion_democrat_party:0 "鲁萨尔进步党"
RSU_worldunion_democrat_party_long:0 "鲁萨尔进步党\n§g当人们已经意识到自己的生活不再舒适后便会逐渐冒出这类声音：\n去选进步党吧！\n是的，进步党代表了联盟三大传统政党最为温和亲民的政党。尽管老是在关键期的选举屡屡马失前蹄，但人民最信任的仍然是进步党。至少进步党的老爷们还会接纳平民进入地方议会和全联盟，至少，人民晓得。\n而进步党的存在也让激进的左翼在平和的日子里稍微平静下，尽管更为极端的左翼批评道这正是进步党在联盟无法进行彻底改革的源泉之一。\n但不论怎样，目前为止，进步党仍是人民最信任的党派。§!"
RSU_liberal_republican_party:0 "鲁萨尔自由党"
RSU_liberal_republican_party_long:0 "鲁萨尔自由党\n§g自由啊，来之不易…\n作为鲁萨尔一直以来最为传统和强盛的政党，自由党一直是最适合鲁萨尔的政党，无论是从针对市场经济施政纲领还是对时局准确把握的选民认可度来说，自由党都拥有对这个国度无可比拟的影响力。\n自由党会选择最为适合鲁萨尔的经济政策和外交应对，为鲁萨尔以及…自己争取最大的利益。\n但同样的，市场的不稳定性和时局的不确定性也会成为自由党最大的难言之患……§!"
RSU_conservative_republican_party:0 "鲁萨尔保守党"
RSU_conservative_republican_party_long:0 "鲁萨尔保守党\n§g南巴帝国的幽灵至今仍在南巴上空徘徊……乃至于已有两百余年共和历程的联盟至今仍存在着它的影响力。\n这就是鲁萨尔保守党。\n保守党目前在鲁萨尔并不怎么受欢迎：毕竟大战之时保守党破坏共和传统的行为仍然历历在目，但出于利益均衡，鲁萨尔的各政治派别在进行了一系列利益交换后勉强容忍了保守党仍在体制范围内这件事。\n事实上保守党并不反对共和传统：对于一直以来以交通便利跟贸易发达著称的鲁萨尔来说，对君主的敬畏就有些大可不必了。商人们从始至终看中的就只有君王手中所掌有的武力与保护他们的权力。\n保守党拥有自己从一始终的票仓，也有自己一以贯之的理念：商人终究是需要小心翼翼和不事声张的。\n但如果联盟陷入紧急时刻，保守党则绝不会敬谢不敏。§!"
