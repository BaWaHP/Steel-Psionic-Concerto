RSU.1.t:0 "岁律更新"
RSU.1.d:0 "施塔德·埃格轻轻的放下手中的钢笔，揉了揉酸涩的眼睛，看向朦胧的窗外：天已蒙蒙亮，新的一天已然到来。\n\n他起身活动了下筋骨，近知天命的身体承受不住如此压力，发出令人舒爽又牙酸的“咔咔”声。在施塔德晃过神来时，才记起今天是一年的伊始之初。\n\n接着他摇铃唤来秘书，索要了一杯浓咖啡，准备继续批阅文件。秘书犹豫了一下，开口说道：\n\n“总统先生，您已经连续工作了十四小时了，医生嘱咐过，您的身体不…”\n\n施塔德略有不耐的打断道：“听那些庸医的干什么，我自己的身体我自己还不清楚吗？不用废话了，去泡咖啡吧，谢谢。”\n\n接着他便走回办公桌坐下，秘书犹豫再三后开了口：“总统先生，有两件事需要提醒你一下。”\n\n施塔德一边低头查阅文件一边回道：“嗯，哪俩件事？”秘书回道：“党内会议这几天就要召开了，主要议程是您的连任问题。”\n\n闻讯施塔德皱起了眉头，但还没有太失态：“那第二个呢？”\n\n秘书小心翼翼的说道：“您妻子在刚刚来电留言，问询您什么时候回家，昨晚跨年夜她做了一桌丰盛的饭菜，您的孩子也都回家了。”\n\n施塔德的脸色迅速的阴沉了下来，作为一个政治家来说这般失态实在是难得一见：“催催催，就知道催，难道我不想回家吗？”\n\n秘书知道这是总统先生情绪失控的前兆，识趣的告退。施塔德瘫在办公椅上，过往的记忆如潮水般向他涌来，他闭上眼深吸了口气，而后又不甘的吐出。\n\n像是灵魂被抽干一般，他在桌前呆愣了两分钟，随着意识的回归，他认命般的缓缓摇了摇铃："
RSU.1.a:0 "“告诉赛琳娜——我今晚回去，是的，真回去……”"

RSU.2.t:0 "现状"
RSU.2.d:0 "人尽皆知的是，鲁萨尔自古以来便是松散的邦联制：各诸侯国出于各种原因结成利益联盟，而为了对抗提特兰的中央政府，这种利益联盟愈发稳固。直到第一次南巴战争后，鲁萨尔地区各诸侯出于对抗提特兰帝国和制衡卢瓦尔王国的目的，遂建立鲁萨尔邦联这一松散的政治实体。\n\n而在南巴帝国建立后，鲁萨尔邦联在选帝会议中获得了极大的投票权——尽管在每次选帝会议召开时鲁萨尔都是最容易分化争取的地区。\n\n而等到阿莱克·威利斯上台——不论这位在联盟史上的争议性，至少联盟四大地区的规划的确是威利斯促成的。自威利斯时代，四区便已经各安其职：北区提供大量的原矿，西区作为对外新兴贸易地区，东区作为重工生产地带，而南区则作为综合统筹与交通中心。\n\n这套体系一直在兢兢业业的为联盟创造自己的价值，但时至今日，各地的矛盾已经慢慢愈演愈烈：北区的矿工们不理解自己为什么勤勤恳恳辛苦一辈子却让孩子们继续受这苦；西区新兴的商人们也不满南区老爷们严苛的政策；东区的工人们望着灰蒙蒙的天空思考为何自自己出生这片天空便从未明朗过；而南区的老爷们则惶恐的看着各地秩序的逐渐瓦解而无能为力。\n\n该做出改变了，无论怎样，这种乱象不该再下去了……联盟需要改变，如若置之不理，四方之地的矛盾将会把整个联盟拖入难以预测的地步。"
RSU.2.a:0 "纵面未明之事，亦展果断之行。"
RSU.2.a.tt:0 "——§Y玛丽安·丝坦芙特§!"

RSU.3.t:0 "市场与鲁萨尔（1）"
RSU.3.d:0 "罗德里格斯正了正他桌面上的名牌，将股票交易所三楼的百叶窗拉好，最后将计时器设为3分钟一组。最近总公司那边建议他们缩短每单电话的沟通时间，以便更快地判断对方有没有诚意。\n\n也许嘛…只是也许，总公司已经绝望到了指望这么做能微弱地增加交易额。\n\n第一位打进电话来的是一位老妇人，她恳切地希望卖出数额不大的芬芳花卉种植与装饰公司的股票，这是一家已经彻底被投资人抛弃的公司，罗德里格斯只稍微回想了一下价格和走势就婉言拒绝了她。\n\n第二个潜在客户则是一位中年人，他持有一些霍留恩实业的股票和债券，这一次罗德里格斯把他的女秘书叫了进来，向她要了整周的工业股票走势，相当少见的，霍留恩事业从这周一开始就持续上涨。虽然幅度不大，但罗德里格斯仍然将其买了下来，按照他对市场的估计，这要在这周末之前卖出去，他就还有得赚。\n\n放下电话，罗德里格斯拿起女秘书端来的热咖啡，浅浅地抿了一口。鲁萨尔联盟证券在几年中走了太多的人了，年老的走了，抱疾的亦然，只有在惊惧中奋力证明自身价值的年轻人能留下来。罗德里格斯摸了摸自己稀疏的鬓角，叹了口气，他清楚人事部门是念在他在大战期间魔法材料和医疗物资投机上创造的巨额利益才把他留了下来，但他知道自己已经没法和那些年轻人继续在精力上抗衡了，那一天是迟早的事情。"
RSU.3.a:0 "但在那之前，至少自己要为养老做好立本之事。"

RSU.4.t:0 "布雷施特大游行"
RSU.4.d:0 "“我们要，”\n“更多休息！”\n“我们要，”\n“更多工资！”\n\n拉特洛斯猛吸了口便将手中的香烟扔到地上踩灭，旋即望着仍在游行的矿工们久久不语。这时身边有人凑过来问道：“头儿，我看外面那些工人们越闹越厉害了，真的不用上报？”\n\n瞥了眼身边这个叫尤根的下属，拉特洛斯摇摇头后又从怀里摸出一根烟点上：“一般这个时候老爷们已经快聊完了，很快就会有人出来处理这件事，让工人们散去的。”尤根是个刚入编的新人，有些吃惊的问道：“这些工人们游行时那么大的声势，最后却草草了结吗？”\n\n几个烟圈升天，拉特洛斯有些不耐：“你不是我们布雷施特人吧。”\n\n“是，我是从南区......”\n\n“那就对了，”拉特洛斯打断了他的话，“布雷施特这边自从大战后...差不多是我六七岁时的样子吧，”拉特洛斯逐渐陷入回忆，“因为战败的缘故，联盟政府削减了布雷施特的矿物补贴，从那时开始布雷施特就没消停过，三天一小游行，五天一大罢工。”\n\n尤根瞪大了眼睛：他来自于富庶的南方，委实没见过这般场景，只得听拉特洛斯继续说下去。\n\n“一般来说，最后的结果无非是工头跟政府的老爷们谈一谈，发上几个月被拖欠的工资，大伙作鸟兽散，然后过一段时间再来一次，周而复始，循环往复...”听到这尤根忍不住道：“难道就没有人想解决这种情况？”\n\n拉特洛斯又吐出一个烟圈，冷笑着说：“谁都想改变，但钱呢？没有塔勒什么都办不了。”\n\n尤根还想说些什么，这时，紧闭的政府大门里走出几个戴着工帽但衣服异常整洁的人。看到他们向工人们走去，尤根想说的话被噎在嘴里吐不出来，最后只化为浓浓的叹息。\n\n在尤根还在想着什么时，他身边的拉特洛斯却突生异动，猛地从松弛状态紧绷了起来。\n\n“怎么了，头儿？”尤根懒散的问道，“不，不对，你看那些工头！”拉特洛斯语速越来越快，最后低吼起来：“迪斯马，快去市警察局，快！这点人手绝对不够！！！”\n\n尤根愕然的看向工人游行的最前端：大部分工头已经被打的抱头鼠窜，一些明显精干的工人们不断鼓动着其他矿工，而游行的人们声势越来越大——最终，那首由马西米连谱写的《罢工工人曲》响彻了天空：\n\n“我们绝不卑贱~♪”\n“我们亦非贪婪~♪”\n“谓我何至于此~♪”\n“只因我们是人！”\n\n尤根看向刚刚还平淡似水此时却呆若木鸡的拉特洛斯，有些犹豫的问道：“那头儿，现在该怎么办？”\n\n拉特洛斯生无可恋的望向天空"
RSU.4.a:0 "“现在，现在啊，现在我们该去城外请边防军了。”"

RSU.5.t:0 "与七河大使的会面"
RSU.5.d:0 "“您知道的，就算在战争期间，所有贸易路线全部中断的情况下，我们还是能够得到一些军事订单。现在？”奥斯戈提搓了搓手，“恐怕我们只能依靠贵方的订单了，即使是在今年这种水平的工会破坏下我们照样保持了去年的产量，我们已经完成了这一季度7成以上的货物运输。”\n\n“这点我们明白，贵国始终是联盟政府和七河人民最亲密的合作伙伴，始终都是。”穿着七河正装的家伙坐在他对面，不安地用手指摩擦着玻璃杯上的白雾，作为专业的谈判者，奥斯戈提知道这不是什么好迹象，这位七河大使他不认识，看上去也年轻的多，不清楚七河这帮家伙们都在搞些什么。\n\n“那么请问贵方准备什么时候拿出明年的投资计划呢？”奥斯戈提往前坐了坐，“毕竟，开不出来工资，工人就会罢工甚至加入匪帮，工厂无法生产，企业就会倒闭，绝望的投资人就会自杀或另寻出路……您作为我们的持股人，也不希望股价下跌吧？”\n\n“这个，”墨精灵拿出手巾擦了擦脸上的汗，凑到了奥斯戈提的耳边，“看在您也是我们的合作企业，我就和您实话说吧，今年如此延后的原因主要是西莉迪亚共和国的战事，东部国家希望联合提高价格，包括劳动力，而我们并不打算替他们吞下亏损……”\n\n“所以今年我们能得到更多订单。”奥斯戈提眼睛一亮。\n\n“是的。比往年多得多，因此我们在制定贵国的订单时花了很大功夫，我们承诺这份文件一定能在10月份之前转交贵国，交付将会同期进行。”\n\n“能大概说个数吗？”\n\n七河大使看了看周围，比了个三的手势。\n\n“嘿，您早这样说我就放心了，”奥斯戈提拍了拍大腿，看向对方，“看来我应该祝贺一下旧大使升迁？”奥斯戈提心中大定，这样庞大订单绝对可以让各城邦忙活好一阵了，失业问题能够在几个月之内解决，这会让更多的选民和投资人都团结在自由党周围，他个人的政治生命也能得到延续。\n\n“不不，我是ZBC公司对外招商部鲁萨尔分署的负责人。”看着奥斯戈提困惑的神情，他继续解释道：“啊，是这样……今年的生产计划要更复杂，总公司那边就让我直接过来了，以后也是我负责和您对接。”七河人接着笑得更加谄媚了，从木制茶几下掏出来了两瓶酒，酒封和蓝色的瓶体设计很有七河风格。"
RSU.5.a:0 "“还望您以后还要多多关照啊。”"

RSU.6.t:0 "一场豪赌"
RSU.6.d:0 "正义宫内，一间隐秘的小房间。\n\n施塔德·埃格在首座扶额，一直皱眉不语。而与会的其他人看着面前厚厚一沓的经济数据也皆是沉默无言。在静默了一会后，弗里兹·韦恩率先打破了寂静的氛围：“至少上半年，七河的怪事还解决不了，是吧，科里德先生？”\n\n坐在施塔德身边的奥斯戈提·科里德微微颔首：“我前不久刚刚和新七河大使——姑且这么称之吧。谈过，他表示上半年的订单实在无能为力，但在年末最起码会增加三成的贸易份额，”说到这他耸耸肩无奈道：“也就是说，在大选月前就不要指望七河人来雪中送炭了。”屋内的气氛伴随着这句话仿佛登时寒流拂面：七河人已经近乎失联年余了，若不是群岛和南巴公司尚在，众人还以为自己在跟一个幻想中的国度交往。但，抱怨不能解决问题，如果在即将而来的大选前不能让经济数据，哪怕只是纸面上的经济数据好看些，那么就约等于输了一半。坏消息不止这个，朱莉安娜·古尔德薇清了清嗓子缓缓道：“诸位，东边的那些暴徒们最近也不老实了，我相信各位先生们已经注意到了。”\n\n啊，工革联，鲁萨尔的附骨之蛆。在场的人最起码一半的人想叹气，却又生生止住。施塔德沉声道：“这个问题可以暂缓，我们来继续聊聊经济。”接着他满含期待的望向自己的副手路德维希·赫斯曼，而路德维希在思量片刻后也只能为难的摇摇头：“我唯一能想到的就只有年中的中巴分红了，但这种定时的收益......”他的话随之被打断：“对，就是这个！”路德维希大吃了一惊，内阁其他人也不亚于此。他们看到一直愁眉不展的施塔德眉飞色舞起来：“七河人承诺下半年会增大贸易额对吧，”其他人望向奥斯戈提，他不明所以的点了点头。“而中巴分红正好是大选月后到达对吧，”众人的目光又望向艾弗特·奥托——中巴事务一直都是这位奥托先生在负责。艾弗特听闻施塔德的话语好像猜到了什么，顿时摇头道：“总统先生，最近中巴的局...”施塔德果断的打断了他：“只要我们稍微包装一下，以我们国有资产在中巴的分红作为担保来发行债券，提前向企业预支今年的...”\n\n路德维希仿佛抓到了什么：“那我们在大选中便能立于不败之地！”在听明白后，与会众人都振奋起来，纷纷讨论起可行性。唯有艾弗特略有担忧的向施塔德说到：“总统先生，根据我的内幕消息，最近中巴可是不太平的很啊。”\n\n施塔德满不在乎的摇摇手：“没要求中巴的多余收益，只要下半年与七河的贸易能填补空缺便好。”最终，这个大胆的计划在施塔德内阁的讨论下逐渐完善。而施塔德·埃格，他衷心的祈祷，希望自己能再为联盟服务四年，只要再有四年，自己改革的夙愿便能成功。只要四年，无论是经济还是体制，他留给后继者将是完美的局面。"
RSU.6.a:0 "但同样，这是一场§t莫大的豪赌§!。"

RSU.7.t:0 "小酒馆的谈话"
RSU.7.d:0 "老科里恩乐呵呵的一屁股坐在酒馆的椅子上，大声向服务员嚷嚷着:”给我来一份猪排饭，再来一杯大麦啤...”喊到这他犹豫了一下，又喊道：“来一杯黑啤！记得得给我倒满！”喊完他便志得意满的坐在横板凳上等着自己的饭菜上桌。这时从他的肩膀被人拍了拍：“老胖子，刚领完补贴就来这挥霍？”\n\n老科里恩连头都懒得转——这一定是他多年的好友怀斯特在跟他絮叨，他不耐烦的拨开怀斯特搭在自己肩上的手：“老鬼，老子在这吃饭关你屁事。”上周赌骰子怀斯特赢走了他一周的酒钱，他到现在还耿耿于怀，怀斯特好像浑然不知似的凑到他的桌旁，也要了一份猪排饭。两份猪排饭还有科里恩的黑啤很快就被端到了桌上，老科里恩在怀斯特无奈的目光下急切的拿起黑啤猛灌了一口，伴随着令人舒爽的气泡感，老科里恩不禁对着老友吹嘘道：“这就是好啤酒，货真价实的味道...”\n\n但令他不爽的是，怀斯特好像并没认真听他的话，只是敷衍的点了点头，埋头吃起热气逼人的猪排饭。老科里恩见此也对付起面前的猪排饭，在两人吃完倚在桌前消食的时候，怀斯特开口了：“胖子啊，这补贴可不能乱花，你们家这些年也怪不容易的。”老科里恩点了点头：“自然，主要是最近太馋了，又刚好拿到...”说到这怀斯特神秘兮兮的打断了他：“你可知道政府为什么发这补贴？我看报纸上说...”\n\n这可算踩到了老科里恩的尾巴——因为小时候穷，他爹妈没送他去上学识字：“什么破报纸不报纸的，那上面全是唬人的话你也信？”两人的议论在喧闹的酒馆并没有太惹人注意，怀斯特有些无奈的说道：“你先别急，我跟你说道说道。”老科里恩也借坡下驴，听起怀斯特的话语：“我听说东面的人呐，在不断的闹腾，为啥闹腾呢，还不是不给发工资啥的。”老科里恩就着啤酒，深以为然的点了点头：“那是该闹腾。”怀斯特清了清嗓子：“对吧，那群工人闹腾来闹腾去，你猜怎么着？被警察拦住两帮打了一架。”老科里恩又灌了一口酒，义愤填膺的说：“哪里的警察都一样，全都是狗养的杂碎东西！”怀斯特又道：“谁说不是呢，关键是我听说啊，这一架打死了好几千工人！”“圣子在上！”老科里恩瞠目结舌的看着自己的老友，而怀斯特也满意自己所讲的效果，却又不知如何的沉寂了下来。\n\n老科里恩想喝酒的心思从没这么强烈过，但可惜的是手中的酒杯已经空空如也了。两人坐在桌前相视无言，临了老科里恩起身说道："
RSU.7.a:0 "“我先回去了，你嫂子估计也等急了。”"

RSU.8.t:0 "内心的抉择"
RSU.8.d:0 "厚厚的案牍后面，施塔德·埃格勉力支撑着自己的身躯批阅文件，这种高负荷的状态持续了太久，久到施塔德在机械的批阅时内心却迷茫不已。而每当这种时候，施塔德就怀念起以前的旧时光：还记得大战前的鲁萨尔，尽管对施塔德来说早已模糊不清，但那种安逸欢乐的氛围令施塔德至今仍然陶醉不已。可能是带着对童年的滤镜，那种至善至美的感觉到青年时代才荡然无存。\n\n在又机械性签署了一份文件后，办公室的门被轻轻叩响，紧接着施塔德的秘书便踏入了总统办公室，看着老样子沉着脸的总统，秘书把一份文书递到了办公桌上。这是一份浅黄色封皮的文书，文书上自由党的火漆则说明了这是一份党内的秘密文件。\n\n施塔德拿起文书，并没有拆开火漆，秘书也习惯了总统先生冷漠的态度，在寒暄了两句后便走出了办公室。无意识的搓了搓眼前的文书后，施塔德才缓过神来：他当然能猜到这里面是什么，无非是大选到来前的贿选与利益交换罢了。条件反射般的把文书甩在办公桌上后，施塔德又苦笑着伸手拿了回来：他早该知道的，准确来说是早已经知道了。踏入这个修罗场后，这种事情如同吃饭喝水般顺畅无奇，他也早该习惯了的。\n\n但就是有一种声音，一种感觉在不断的告诫着他：扪心自问，这真的对吗？\n\n也许只是自己的自欺欺人，也许只是自己软弱的表现，甚至可能只是青年时激情喊话保守党的余灰，但它就屹立于此，无法忽视，无法忘怀，只能悲哀的看着现在的施塔德·埃格，眼角噙着落不下的泪。\n\n总统的身体就这样一直紧绷着，直到内心中那根看不清摸不到的弦崩裂开来。是了，自己还能为联盟，还能为人民做些什么呢？唯有接受这现实，才能不让这些年的改革付之东流。在谁人都听不到的角落里，施塔德喃喃的念到："
RSU.8.a:0 "“唯有主才能审判世人。”（古苏德瑞尔语）——《圣箴录》"

RSU.9.t:0 "大选结果"
RSU.9.d:0 "“赫尔茨堡，保守党领先。”\n“哈克莱恩，自由党领先。”\n“德伦尔讷，进步党领先。”\n“雷斯科里恩堡，自由党领先。”\n\n......\n\n“恭喜自由党获胜，埃格总统再续任期。”\n\n随着一阵阵或真诚或敷衍的掌声，施塔德沉稳却装作激动的走上演讲台前，看向台上的稿子，面不改色的念了起来，尽管他在心里庆幸得以进行对联盟的负责及对人民的许诺，但嘴里却还是朗朗念出了稿子上预备好的文字："
RSU.9.a:0 "“...由衷感谢自由党同僚们对我的信任...”"

RSU.10.t:0 "市场与鲁萨尔（2）"
RSU.10.d:0 "电话铃声响了，罗德里格斯拿起了话筒，用的是自信且热情的成熟男中音音色。\n\n“您好？鲁萨尔联盟证券。”\n\n“喂？罗德里格斯，我是克拉克，这是你的电话号吧？”\n\n“现在是工作时间！你怎么这功夫打过来？”\n\n“对不起，老朋友，我想问问还没有想要买入鲁萨尔发展公司的吗？听着，一塔勒，一塔勒我就卖，全抛！艾莎现在还在医院，再说今年还有自由党的公捐……我一塔勒就卖，拜托了真的，好…好，有消息一定告诉我，再见。”\n\n罗德里格斯放下了电话，克拉克是他的大学同学，自己当年早早的开始工作挣钱，他却决定在父亲的资助下继续深造。罗德里格斯原本以为大学的铁饭碗比他这个蠢货的选择要好，但现在看起来好像也不尽然。\n\n艾莎，他得有多少年没见到她了？罗德里格斯自嘲地笑了笑，当年所有人都被她迷得魂牵梦绕，但最后还是克拉克真正得到了她，说不定她确实喜欢有文化的人吧。\n\n联盟究竟怎么了，罗德里格斯不知道，他摸了摸自己的后脑勺，曾经只要工厂开着，就有源源不断的资金汇入鲁萨尔，工厂购买北方的铁矿，在本地加工成各种紧俏的商品。克拉克也预言过，随着战争结束，各国的重建的开始，只要保证商路的通畅就能让他们重回过去的巅峰，也是在他的推荐下，罗德里格斯同样大量购买了沃里希工业发展集团的股票，现在来看这真是蠢事。\n\n正当罗德里格斯沉浸在过去时，电话铃声却不适时宜再一次响起打断了他的思绪。\n\n他舔舐了下的嘴唇，向电话伸手摸去："
RSU.10.a:0 "“您好，鲁萨尔联盟证券”"

RSU.11.t:0 "市场与鲁萨尔（3）"
RSU.11.d:0 "令罗德里格斯略微惊讶的是，电话那头传来了一道稍显急切，但理性而坚定的声音：“听着，不要说废话，你们卖不卖沃里希发展公司的证券。”\n\n“是，是的先生，我们卖。”罗德里格斯仿佛听见了世界上最荒谬的声音，随着沃里希钢铁实业的破产，只要不疯的人都在把沃里希发展的股票向外抛，唯恐砸在手上。\n\n“这样，我们只要20000股，只要20000股，只要《破产重组法》还生效我们就要两万股。对了可不可以使用楚元进行支付？”\n\n“我一个一个回答您的问题，目前《破产重组法》仍然生效，只要您是持股大于十分之一的股东就可以通过手中持有的股票获得相应比例的工厂机器和生产材料以及未售出的产品，但是地产不在这一赔付行列。我们接受七河货币，但目前不接受奥罗日亚货币和远乡货币。”\n\n……\n\n罗德里格斯手颤抖着放下电话筒，他刚才聊成了自己最重要的一单生意，他手上大概有9000股，而克拉克手上应该还有将近一万，只要总公司不发现，那么他们都能把手上的股票抛出去，他喜悦地把手伸向了电话，并开始拨克拉克的号码。\n\n两万股的成交额…按成交价，两万股成交额的分红足足有将近1500塔勒，玛丽亚一直想要换一个新的窗帘，他在老家那边也物色了一座庄园，现在售价只有3500塔勒，他确实应该好好打算打算自己的后路，这也算是自由市场的法则吧…….\n\n“您好，什么事？”"
RSU.11.a:0 "“抱歉，打错电话了”"

RSU.12.t:0 "黑色幽默"
RSU.12.d:0 "“...我能再次当选，是因为...”施塔德仍然在演讲台上滔滔不绝的讲着，但冲过来的秘书却打断了他，秘书十分紧张的贴近他的耳旁说道：“总统阁下，格罗尼森发生了6.8级近震规模的地震...”\n\n施塔德·埃格的眼皮猛地一跳，多年来行政官僚经历的本能让他下意识的开始计算这种等级的灾害需要如何救援，但还没等他算几秒钟，秘书则用更加急迫的声音说道：“阁下，阁下你且先听我说，地震不是重点，重点是布雷施特附近的煤矿工作区因为这次地震坍塌了！”刚才还面色冷静的施塔德听到这话瞪大了眼睛:”六级地震？你在开什么玩笑！施工方是干什么吃的？六级地震能让矿区坍塌？！”秘书苦涩的回应到：“其实气象局的施法者预料到了这次地震，但并没有准确评测出等级，只是对矿区管理人员发出过警告，只不过以往多次低级地震的警告让这份警告的优先级不是很高...”\n\n天旋地转的感觉久违的包裹住了施塔德，待他稍微清醒的时候意识到了自己处于总统府的医务室中，医生见他清醒过来安心的吐了口气站起身来：“总统先生醒了，先生们...”医生的话还未讲完，施塔德便看到艾弗特·奥托披头散发的冲了进来，正当施塔德还在疑惑就算自己晕过去这位工业大亨也不该如此失态时，奥托用布满血丝的盯着施塔德悲呛的开口道：“施塔...总统阁下，我们完了，我们全完了！”\n\n“您...您这话是什么意思？”尽管还未明白奥托的意思，但一种不祥的预感爬上了施塔德的脊柱，他脸色苍白的用颤抖的语气又问了一句：“您这是什么...什么意思？奥托先生？”奥托只是悲哀的，一言不发的看着他，直到秘书的到来才打破了这局面：“总统...阁下，中巴出问题了。稳定全无，各地争相割据...”\n\n世间好像就此寂静下来，施塔德脑海中唯一回荡着的声音只剩他小时候在教堂听到使徒圣歌。"
RSU.12.a:0 "“终将终将降临，至高公正无私的祂！”"

RSU.13.t:0 "忏悔"
RSU.13.d:0 "还记得年轻时，施塔德亲眼目睹了一场令人惊骇的处刑：受刑人是一个金融诈骗犯，即便是在那个保守党执政，军警特务多如牛毛的时代，像这种如今看来极其残忍的公开处刑却出乎意料的没什么争议。尽管这个罪犯的罪行是常见的信用循环骗局，但他瞄准的对象却是士兵死难后拥有大量抚恤金的军人家庭，这极大激起了仍处在大战中的人们对这骗局的深恶痛绝，而保守党政府也是难得做了一件受民众拍手叫好的行为：把锈迹斑斑的断头台从历史博物馆中抬了出来，用以对这罪孽深重的罪犯处以极刑。\n\n在受刑的那一天，鲁萨尔街头万人空巷，面无人色的诈骗犯和义愤填膺的群众伴随着零散的雨滴在那个阴冷的清晨形成了极大的色差比。在罪犯就地正法后，施塔德恍惚的看着那一抹令人难忘的红，以及在群众中爆发出的巨大欢呼声。在多年以后的今天，施塔德才明悟了那日的启示：在无可饶恕的罪行后，你唯一能做的，就是忏悔。\n\n在成长的过程中，施塔德·埃格这个人已经失去了太多，无论是诚信，清白还是善良。在政治场这个大染缸里施塔德早已将这些东西丢的一干二净：早年的冷板凳经验早就告诉了他，在政治中，人类一切的美好品质都将荡然无存。唯一支持他走到现在的，也只有深藏于心中的执念：愿鲁萨尔能够重回正轨，回到施塔德印象中那个开明富饶，昂扬向上的鲁萨尔，这个执念谈不上是什么理想，但也是施塔德一直想实现的，只是现实的惨败已经告诉了施塔德："
RSU.13.a:0 "执念终究只是执念"

