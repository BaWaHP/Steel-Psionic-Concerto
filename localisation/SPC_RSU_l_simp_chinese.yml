RSU.10.t:0 "市场与鲁萨尔（2）"
RSU.10.d:0 "电话铃声响了，罗德里格斯拿起了话筒，用的是自信且热情的成熟男中音音色。\n\n“您好？鲁萨尔联盟证券。”\n\n“喂？罗德里格斯，我是克拉克，这是你的电话号吧？”\n\n“现在是工作时间！你怎么这功夫打过来？”\n\n“对不起，老朋友，我想问问还没有想要买入鲁萨尔发展公司的吗？听着，一塔勒，一塔勒我就卖，全抛！艾莎现在还在医院，再说今年还有自由党的公捐……我一塔勒就卖，拜托了真的，好…好，有消息一定告诉我，再见。”\n\n罗德里格斯放下了电话，克拉克是他的大学同学，自己当年早早的开始工作挣钱，他却决定在父亲的资助下继续深造。罗德里格斯原本以为大学的铁饭碗比他这个蠢货的选择要好，但现在看起来好像也不尽然。\n\n艾莎，他得有多少年没见到她了？罗德里格斯自嘲地笑了笑，当年所有人都被她迷得魂牵梦绕，但最后还是克拉克真正得到了她，说不定她确实喜欢有文化的人吧。\n\n联盟究竟怎么了，罗德里格斯不知道，他摸了摸自己的后脑勺，曾经只要工厂开着，就有源源不断的资金汇入鲁萨尔，工厂购买北方的铁矿，在本地加工成各种紧俏的商品。克拉克也预言过，随着战争结束，各国的重建的开始，只要保证商路的通畅就能让他们重回过去的巅峰，也是在他的推荐下，罗德里格斯同样大量购买了沃里希工业发展集团的股票，现在来看这真是蠢事。\n\n正当罗德里格斯沉浸在过去时，电话铃声却不适时宜再一次响起打断了他的思绪。\n\n他舔舐了下的嘴唇，向电话伸手摸去："
RSU.10.a:0 "“您好，鲁萨尔联盟证券”"

RSU.11.t:0 "市场与鲁萨尔（3）"
RSU.11.d:0 "令罗德里格斯略微惊讶的是，电话那头传来了一道稍显急切，但理性而坚定的声音：“听着，不要说废话，你们卖不卖沃里希发展公司的证券。”\n\n“是，是的先生，我们卖。”罗德里格斯仿佛听见了世界上最荒谬的声音，随着沃里希钢铁实业的破产，只要不疯的人都在把沃里希发展的股票向外抛，唯恐砸在手上。\n\n“这样，我们只要20000股，只要20000股，只要《破产重组法》还生效我们就要两万股。对了可不可以使用楚元进行支付？”\n\n“我一个一个回答您的问题，目前《破产重组法》仍然生效，只要您是持股大于十分之一的股东就可以通过手中持有的股票获得相应比例的工厂机器和生产材料以及未售出的产品，但是地产不在这一赔付行列。我们接受七河货币，但目前不接受奥罗日亚货币和远乡货币。”\n\n……\n\n罗德里格斯手颤抖着放下电话筒，他刚才聊成了自己最重要的一单生意，他手上大概有9000股，而克拉克手上应该还有将近一万，只要总公司不发现，那么他们都能把手上的股票抛出去，他喜悦地把手伸向了电话，并开始拨克拉克的号码。\n\n两万股的成交额…按成交价，两万股成交额的分红足足有将近1500塔勒，玛丽亚一直想要换一个新的窗帘，他在老家那边也物色了一座庄园，现在售价只有3500塔勒，他确实应该好好打算打算自己的后路，这也算是自由市场的法则吧…….\n\n“您好，什么事？”"
RSU.11.a:0 "“抱歉，打错电话了”"

