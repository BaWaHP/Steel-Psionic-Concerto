RSU.24.t:0 "正义宫前的演讲"
RSU.24.d:0 "细雨绵绵，总统看着眼前涌动的人潮，难得失神了片刻，工作人员只能假借调整话筒的间隙提醒总统记得演讲。\n\n是的，这是一场面对首都民众的公开演讲，场地就在总统府，也就是正义宫的大门前。施塔德咽了咽口水，可嗓子却还是感觉到干涩，所有音符到嘴边只能压缩为“额”音...这实不应该，作为一位专业的政客，施塔德早已习惯了如何在万众瞩目的情况下侃侃而谈，谈未来，谈理想，谈联盟政府和美好的希望。\n\n但施塔德看清了底下的民众：狼狈，躁动，紊乱，却又怀着希冀的目光注视着他。他本不应如此犹豫的，自己应该已经竭尽所能，自己应该向惶惶不可终日的民众们保证政府的努力和未来的希望，自己应该......\n\n没什么可犹豫的了，他张了张嘴，沉稳的声音从口中传出：“国民们，最近的大家想必已经察觉，联盟遇到了困难，而大家的生活自然也受到的波动。”这个开场很好，在细雨中的民众们听到总统娓娓道来的话语，躁动声逐渐暂缓，而施塔德也继续道：“可我要说的是...”\n\n总统的话音还未落下，在这蒙松小雨的环境下一声刺耳的轰鸣声响彻云霄，时间在这一刹那仿佛静止一般，所有人都摒住了呼吸，率先反应过来的竟是副总统德克里克特·阿墨斯而非总统卫队，这个平日里文静的男人此刻却像躁郁症发作般胡乱的指挥着：“卫队，卫队呢？！哦对，总统先生，总统先生！医生，快叫医生来！！！”\n\n与混乱的环境相比，施塔德最后弥留的想法却是平静的，他了然的看到胸上的伤口和汩汩涌出的血液，面对这突如其来的状况他是如此的平淡。视线愈发模糊，耳边的呼唤也逐渐远去，而心中的所思所想却愈发清晰：是了，我是该死，置国家安危于不顾，犯错却未承受所有代价，所以，这是我应得的。\n\n这一切发生的太快，在所有人都在惊慌失措时总统卫队终于履行了他们的职责：在人群中逮捕了正欲逃脱的凶手——本·贝格。这个因父亲去世被当局陷害却又不容于工革联的可怜孩子，被捕时手中还拿着不知从哪搞来又奇迹般混入会场的一支手枪。在被卫队成员押送时他还在嘶吼：“都去死吧该死的伪君子，恶魔，饭桶！你们毁了一切却只会在演讲台上夸夸其谈！你们...”没人在意他被押送下去时最后的呜咽声，正如也没人在意施塔德在咽气前最后一声轻微的叹息。\n\n当医生无奈宣布抢救失败时，所有知情的鲁萨尔人都知道一件事——"
RSU.24.a:0 "大厦将倾"

RSU.25.t:0 "千钧一发"
RSU.25.d:0 "“内务部已展开了调查，调查结果的报告是：刺客曾是工革联成员，动机是经济危机后对当局的不满，凶器是刺客在黑市中所盗窃所得。”朱丽安娜·古尔薇格脸上挂着嘲弄的笑意，将手中的调查报告重重地，不断地反复在桌面上敲打：“诸位你们信吗？”\n\n桌前的众人气氛异常沉闷，在经历了总统去世和副总统德克里克特·阿墨斯仓促的代总统继任仪式后，大梦初醒般，在座的各位高官对任何事物仿佛都没有实感一般。古尔德薇嗤笑一声：“民众交税不是为了让你们开会时发呆的，都说说自己的看法吧。”\n\n房间里安静了一瞬后，不知是谁轻声嘀咕了一句：“工革联...？”紧接着便是死一般的寂静，而拜尔迪恩·博特激动的站了起来怒斥道：“就是那帮赤匪，一定是！之前在矿难时便侵占国家资产，致使政府的威信大跌，后来更是煽动东区的民众反对政府，刺客还是刚刚被开除党籍的人，哪有那么巧的事！”众人听后自然是议论纷纷，而代总统阿墨斯则迟疑的提出了一个问题：“目前的证据没什么能证明就是工革联干的...”情绪激动的博特刚要回应。却被古尔薇格打断：“虽然我要纠正博特先生一点，那就是刺客只是加入了工革联领导的某个组织，而非入党，自然也谈不上被开除党籍。但我也要提醒代总统阁下，现在不是找证据的时候，因为我们的情报网显示工革联的各组织已经开始积极的运转了，目前重要的是阻止他们，而非查找证据。”"
RSU.25.a:0 "没什么好说的，接下来会议一键通过了遏制工革联的方案。"

RSU.26.t:0 "炽热的心"
RSU.26.d:0 "这一日，数百名鲁萨尔工人革命联合阵线成员齐聚一堂。所有人都明白，今日将被载入史册。爱迪尔梵·黑戈博根在热烈的掌声中走上了演讲台。\n\n“今天是一个重要的日子，但在一切开始前，让我们为格罗尼森大矿难中遇难的工友以及他们的家人哀悼。这一悲剧再次提醒了我们，资本家为了利润可以是多么的漠视生命，那些无能而拖沓的议员根本没法从矿坑中救回受困的工人。”说到这黑戈博根的声音开始哽咽:“这也让我们再次回想起了鲁萨尔工人革命联合阵线成立的初衷——让这样的悲剧永不重演！”会场因哀悼而陷入了短暂的静默，哀悼过后，会场又响起了爱迪尔梵·黑戈博根的呐喊:\n\n“所以，我们认定，资本主义已经失去了生命力！近期发生的诸多事实已经雄辩地证明了这一点！中巴解体带来的政治经济危机已经席卷全南巴斯蒂亚，这充分暴露了各个反动政权的无能，更证明了资本主义经济体系已经全面崩溃。同志们，这就是芙蕾施曼导师所预见的资本主义灭亡之时，而她所期望的人民革命的时机，已然到来！”话音未落，台下的掌声便已沸腾。“冲锋号”的号音在数千颗同样炽热的心激起了一阵阵热浪。\n\n“也许有人会大吃一惊，说：别那么心急，先生们，我们可以像以前那样，借机向资产阶级政权施压，只要他们还有一点良心和理智，他们会再次向工人们让步的。这样的想法不一定是别有用心，但也的确是过时了！无产阶级目前的主要矛盾已经不再是资产阶级政府的让步了，工人阶级的力量已经足以开创属于自己的新天地，成为国家的新主人了！看看被刺杀的前总统施塔德·埃格吧！每个鲁萨尔工人都应当明白，现在，工人阶级和资产阶级政府已经毫无妥协的余地了！好比凹透镜，向着炎炎烈日，百倍千倍的光度聚合到一点上，白热化了、冒烟了，不能不燃烧了! “\n\n“同志们，现在，资本主义在任何领域都没有生命力了！现在的资产阶级政权，不过是一具尚未下葬的腐尸。 我们工人阶级要做的，就是埋葬它！只有这样，才能迎来一个崭新的世界——由无产阶级所统治的，新世界！”"
RSU.26.a:0 "每颗炽热的心都是一颗火种，渴望凝聚成点燃时代的火炬。"

RSU.27.t:0 "仓促，仓促"
RSU.27.d:0 "“特勤局的同志们已经得到了确切的消息，政府方面正在调集能够调集的一切军力，准备向东进发！”\n\n......\n\n“工革联那群暴徒已经在克莱尔海姆城内煽动起不知轻重的民众了，东区的政府部门和驻扎军队都将面临瘫痪甚至变节的风险！”\n\n......\n\n“联盟军已经开始在各个关键道路上设卡拦截，切断东区与其他地区的联系了。而我们在鲁萨尔城等其他城市地区的同志已经出现了大规模被捕的情况！”\n\n......\n\n“整个东区的形式危如累卵，所有不配合赤党的政府官员都被赤党驱逐甚至监禁了起来。而东区地方的军队情况更是危急，我从未想到军队会被赤党渗透到如此地步...”\n\n......\n\n“要先发制人，时不待我！”\n\n“不能犹豫了，要出重拳！”\n\n双方都深深吸了口气：\n\n“开战吧。”\n\n一场古提特兰式悲剧"
RSU.27.a:0 "加入联盟"
RSU.27.b:0 "加入工革联"

RSU.28.t:0 "兄，弟"
RSU.28.d:0 "“啪！”一个响亮的巴掌拍到了拉伯特脸上，火辣辣的触感随之传来，这一掌可真是不留情面...但相对的，扇巴掌的那位——拉伯特·温德泰普的哥哥范·温德泰普也不好受，最起码从其微微颤抖的右手来看的确是这样的。但这一巴掌仿佛还没有让范发泄完心中的怒火，他紧接着又揪住拉伯特的领子，把自己的弟弟猛地推到墙壁上厉声道：“再说一遍你要干什么？！”\n\n这对外人来说一定难以理解，正在争执的两兄弟在鲁萨尔军内可谓是鼎鼎大名的双子星：范·温德泰普在世界大战中屡立奇功，更是联盟第一支装甲部队的建立者。而拉伯特·温德泰普则是在战后才入伍，尚可的履历和极其优秀的能力使其成为了鲁萨尔最为有名的高级军官之一，而他在围剿中巴山羊人的过程中所获得的战绩更是证明其绝非草包。熟悉他们的人若知道了则会更加震惊：尽管两人的年龄相差十几岁，但实际上两人的关系极好，私下一直是以兄友弟恭的状态为他人所知，这可能是因为幼年失怙,少年失恃的原因，两兄弟从小便相依为命。\n\n范从未从自己弟弟脸上看到过如此倔犟的神情，拉伯特梗着脖子又大声表达了一次自己的观点：“我说，我要去东区！”听到这话的范瞬间失去了理智，他猛地一拳砸向弟弟的脑袋上，却在最后关头偏向了墙壁，而在他的重击下墙壁开始簌簌落下少许灰尘。而他的弟弟拉伯特则仍然毫不畏惧的盯着自己的哥哥。范早已不再年轻，经过这一折腾后不禁头脑发昏，他朦胧的看着面前的弟弟，脑中却回忆起在大战后自己休假回家，拉伯特在车站飞奔到身边狠狠抱住自己的画面。\n\n两人都冷静了不少，皆在沙发上落座。沉默持续了很久，拉伯特率先开口：“哥，你不必管我了，我昨天就向军部提交了辞呈。”范听后并没有很大的反应，只是盯着面前难得有一丝畏缩的弟弟若有所思，随后缓缓开口：“军人以服从命令为天职...”而拉伯特却很自然的接过话头：“可你也曾教导过我，要为了自己的信念而战。”范不由得恼羞成怒：“够了！我说的信念是让你为了联盟，为了鲁萨尔的民众！”拉伯特针锋相对：“我就是为了鲁萨尔人民，为了全联盟！”他有些急切的继续说：“哥，你难道看不到上层的腐朽和底层的呻吟吗？这真的是我们为之奋斗的联盟吗？这真的...”\n\n“够了够了，我说够了！”范打断了拉伯特，眼球布满血丝：“无论联盟怎么样，工革联那群赤匪实质上就是在分裂整个国家，将这片土地上的安稳与和平于不顾，鲁萨尔足够动荡了，用不着他们来添一把火！”而后他好像突然泄了气一般：“你去吧，我不...我拦不住你。”随后他伤感的望着自己的弟弟，而拉伯特在沉默后突然弯腰鞠了一躬，留下一句“谢谢”后便大步流星的走出门去。望着眼前的一片狼藉，范沉默了许久后轻轻的说了一句:"
RSU.28.a:0 "“要好好活着啊，臭小子...”"

RSU.29.t:0 "撤军"
RSU.29.d:0 "尽管施塔德的任期还在波动之中，对未来的预期尚未浮出水面，不过总的来说，联盟仍在平稳前行。然而鲁萨尔政府却收到了南巴斯蒂亚驻军准备撤离的消息，当这份文件交接到施塔德手上时，鲁萨尔此时宁静的氛围增添了一分难以言喻的微妙。\n\n施塔德仔细翻阅着南巴驻军的档案记录，想起他们的历史甚至能追溯到200多年前：那时的联军在与帝国残余势力斗争的同时，北线的魔兽却突然南下，在《克拉亚诺协定》签订后，绝大多数联军北上抗击魔兽。而伟大战争后南巴为了维持力量尚显单薄联盟政府，以及监视仍然叛逆的北方诸国的原由，而留下一支庞大的驻军。从某种意义上来说，这批驻军和其他南巴常住居民并无太大差别，除了按时换防和鲁萨尔需要支付其一半的维持费用。\n\n“至少省去了这笔预算，对吧？不过联邦政府的财政状况比我们预想的还要差一些...嗯...至于最后的送别仪式，那就按这样办吧。”施塔德心里有些五味杂陈，但还是批准了这些细枝末节。\n\n临别的欢送会就在鲁萨尔军营附近的郊外举行，施塔德的送别演讲台下，只有高级军官正襟危坐。南巴士兵们则有些心不在焉，准备和这里的鲁萨尔人相拥告别。其中不乏面临感情抉择的年轻士兵，如果站在道德层面来...把相好的鲁萨尔姑娘带回南巴是一个士兵作为军人的责任，尽管能做到这份上的士兵少之又少。\n\n“乔安娜，你知道的，我在度夫道夫的父母早就安排好我的婚姻了。我...并不是说...我的意思是，命运这种事，逃不掉的。”显然这样的争执在分别前夜此起彼伏，说个没完。\n\n一部分鲁萨尔人把自己的女儿和女婿送进靠前的车厢，递给他们鲜花和面包，把火车头装点得花团锦簇；剩下的士兵躲进了后面的车厢，毕竟他们错付了许许多多的人，所以时不时的石块飞入和惨痛叫喊倒也无可厚非。\n\n送别乐队在黄昏下吹奏着《边疆协奏曲》，鲁萨尔的苏德瑞尔方言一声又一声的呼唤，车轮一圈又一圈行进着，白雾一簇又一簇的滞留在原地。"
RSU.29.a:0 "“再见，再见，希望再见！”"

RSU.30.t:0 "变节的海军"
RSU.30.d:0 "变节的海军"
RSU.30.a:0 "变节的海军"

