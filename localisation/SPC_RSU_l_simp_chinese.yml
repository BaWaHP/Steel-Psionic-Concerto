###领导人###
RSU_stade_eger:0 "施塔德·埃格"
RSU_stade_eger_desc:0 "施塔德·埃格，典型的鲁萨尔人。或者说——典型的鲁萨尔政客。他于1961年出生在鲁萨尔城中的一个中产阶级家庭，自幼便见证着独属于鲁萨尔的辉煌，沐浴在联盟的光辉下。直到那无法避免，席卷一切的战争到来。\n\n施塔德的整个青年时代都是在世界大战中度过的，他见证了战争前繁荣的鲁萨尔在战争中那萧条凋敝的景象，也经历了自由党政府的垮台。保守党无节制的军警统治，跟好像永无止境的紧急状态。他不能忍受这样的鲁萨尔，心中的抱负和正义感促使他于1970年参加了最适合自己的政党：自由党。\n\n在自由党兢兢业业的工作了数年后，作为党内各派系都认可的人物，他踏进了自由党的领导层。也正是在1974年，保守党被其他政党撵下台来，自由党重新上台执政。只是，经历了大战的鲁萨尔早已伤痕累累，不复往日的璀璨……\n\n作为自由党党内最为务实的实干派，自施塔德进入联盟高层以来，就一直以协调各方势力闻名。事实证明，施塔德是唯一能最大效率掌握鲁萨尔行政机器的人，而他本身就是自由党高层这一点也给了他足够施展自己能力的舞台。到1994年，由施塔德担任党魁的自由党再次赢下大选，但真正成为这个国度的领导人后，施塔德才真正感受到鲁萨尔的衰败：自1992年就上涨缓慢的经济，工人对政策的不满和无尽的游行，各个政党间错综复杂的利益纠纷，中央政府和地方政府间不断的推诿扯皮。\n\n这些都证明了想要管理这个联盟将是一件多么困难的事情。\n\n但施塔德，他见证过联盟最光辉的一面，也经历了联盟最为苦难的记忆。他爱自己的国家，他打心底爱着联盟，他希望能在自己手上让联盟最终光复以往的辉煌！哪怕为此自己要殚精竭虑，受尽委屈也在所不辞。这是他的责任，更是他的理想。\n\n而经历了四年的任期，施塔德已经疲惫不堪了。在如此复杂纷乱的政治体系内竭尽全力来平衡各方势力的利益跟关系本就使人绝望，更何况由于经济的停滞不前工人们越来越不满的态度使得中央政府的威信进一步下跌。他已经太累太累，但为了肩上的重担，与内心中的期望。即使蹒跚前行，自己也绝不放弃。"
