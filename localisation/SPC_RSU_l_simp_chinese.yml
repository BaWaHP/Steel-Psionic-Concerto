RSU_ancap_party:0 "鲁萨尔自由企业保护协会"
RSU_ancap_party_long:0 "鲁萨尔自由企业保护协会\n鲁萨尔时至今日早已动荡不安，各个城邦的经济联系早已几近于散乱和崩溃。\n底层民众苦不堪言，上层老爷束手无策。作为鲁萨尔中流砥柱的中小企业主已经对政府失望透顶，也许政府的存在就是一个错误。祂压榨民众，祂镇压民众，祂引起争端，祂，从来不是完美的。\n它，就是鲁萨尔社会的一切原罪。\n鲁萨尔民众为什么需要政府呢？谁又会希望自己头顶有一群无法反抗还毫无作为的吸血虫呢？\n这种政府，谁会在乎？也许，鲁萨尔人民根本不需要政府，只需要一个真正公平的市场和无压迫的社会。\n无尽的党争和中央地方间的扯皮，鲁萨尔的民众已经受够了这无意义的一切。\n让我们奔向市场自由的彼端吧，至少，在此之后，没有人会继续压迫我们了。\n暂且…"

###民族精神###
RSU_torn_society:0 "撕裂的社会"
RSU_torn_society_desc:0 "联盟自大战败北以来，内部的争端就越来越愈演愈烈。如果不是进步党的居中调和，工农与统治阶级的矛盾早就不加掩盖了。如果我们不及时采取行动的话，那么仇恨的怒火就将撕裂整个鲁萨尔…\n\n§R到那时，我们能做的，就只剩求天垂怜。§!"
RSU_fixing_the_society:0 "弥补裂痕的社会"
RSU_fixing_the_society_desc:0 ""
RSU_transport_key_of_south_bastia:0 "南巴的交通枢纽"
RSU_transport_key_of_south_bastia_desc:0 "鲁萨尔自古以来就是南巴斯蒂亚最重要的交通枢纽之一。自工业革命以来交通的发展更是突飞猛进，配套的基建产业也逐渐发展。大量的铁路网都因此汇集在鲁萨尔境内，经由中转后前往巴斯蒂亚各地。"
RSU_perfect_market_econ:0 "完美的市场经济"
RSU_perfect_market_econ_desc:0 "鲁萨尔从一始终就相信自由的市场经济，经过几百年的发展，鲁萨尔的市场经济从未辜负过我们的期望。可惜的是，世界大战的到来使鲁萨尔的经济一落千丈，但我们坚信市场经济会带领重返战前的§Y繁荣昌盛§!。\n\n尽管有一些人对此§R怀疑§!……"
RSU_rusty_war_machine:0 "生锈的战争机器"
RSU_rusty_war_machine_desc:0 "联盟自建立以来，就从未将战争放在首要位置。和平与包容一直是鲁萨尔的主旋律，尽管经历了残酷的世界大战，但鲁萨尔的战争机器从未全力发动过。鲁萨尔人民自上而下都对于战争的态度是如此的厌恶，更何况联盟已经很久没有经历战火的洗礼了。鲁萨尔的战争机器早已生锈，甚至于崩坏，但这并不代表鲁萨尔的战争机器永不发动。"
RSU_majestic_haze:0 "磅礴的霞光"
RSU_majestic_haze_desc:0 "自大战结束以来，鲁萨尔工会联改组为工革联，鲁萨尔的工人们就再未相信过鲁萨尔政府的谎言。零星游行抗议政府的行为和频繁的罢工使得联盟政府苦不堪言，又对此并无有效解决方案，只能不断的利用军警镇压工人们的反抗，最后只能逐渐演变为暴力冲突。\n\n§R如果高高在上的老爷们不愿低下高傲的头颅，那么工人们只能将他们从权力的王座上揪下来好好交流。§!"
RSU_prepaid_central_bastia_income_idea:0 "中巴的分红"
RSU_prepaid_central_bastia_income_idea_desc:0 "我们要求了中巴联盟预支其收入分红。"

RSU_gronissen_mining_disaster:0 "格罗尼森大矿难"
RSU_gronissen_mining_disaster_desc:0 ""

RSU_cb_crisis:0 "中巴危机"
RSU_cb_crisis_desc:0 ""

RSU_compromise_product:0 "妥协产物"
RSU_compromise_product_desc:0 "股市崩盘，矿难事件，一系列的危机使得本就摇摇欲坠的联盟政府更加举步维艰。联盟现在亟待稳定，作为§0罪人§!，我们早已§R无路可退§!，如今唯一所愿的，就只有维系各派系的情绪，尽力为联盟留出缓冲空间，恰好的是，这正是施塔德·埃格所擅长的。只是不知，原本就精疲力尽的总统阁下，还有多长时间可以坚持？"

