###民族精神###
EOM_oasis_defense:0 "绿洲防线"
EOM_oasis_defense_desc:0 "由于绿洲共和国缺乏能力管辖大片新土地，加之来自东部的帝国军团威胁与日俱增，绿洲中央批准借助军队的帮助在东方成立一个军政府政权来临时托管这片土地，同时联合人类殖民地对帝国军团形成包围之势。在军政府的体制下，军区得以维持明面上的稳定，然而，军政府缺乏实际上的行政管理能力，而深陷窘况的绿洲中央同样无法提供任何帮助，这在不久的将来或许会成为问题。"

EOM_sweet_dream:0 "理想很美好…"
EOM_sweet_dream_desc:0 "组成军区的政府职员和军队兵员大多怀着强烈的理想主义热忱，这些来自世界各地或是绿洲中央的志愿者对自己的工作有着强烈的热情。此外，由于绿洲共和国的名声在外，我们的政府得以在各地得到许多民众的支持，不需要像殖民者一样残酷地压迫各地原住民，并且有能力接受来自外界的增援。"

EOM_but_harsh_reality:0 "…而现实残酷"
EOM_but_harsh_reality_desc:0 "绿洲共和国试图在这片无尽的沙漠中开拓拯救生灵性命的绿洲，可现实却十分残酷——绿洲的部队缺枪少炮，毫无战斗经验，而且没有任何有效的兵员训练体系。共和国直辖区域的部队尚且如此，更别说发配到东部军区的散兵游勇了。除此之外，军区的内政建设也是毫无疑问的一团乱麻，政府职员缺乏行政管理经验，各地经济规划与基础设施建设更是完全没有。加上来自绿洲共和国的支援并不多，我们必须要想办法自力更生…"

EOM_legion_awaiting:0 "虎视眈眈的军团"
EOM_legion_awaiting_desc:0 "在国境外的不远处，由狼兽人“奥提摩”带领的前因佩里亚王国，或是帝国近卫军团的部队在这片地区烧杀抢掠，无恶不作，不断地干扰着我国境内的生产生活。我们无从得知奥提摩本兽究竟有着何种想法，意图在这片与它毫不相干的土地重建所谓“帝国”的荣光，可既然现状如此，我们必须准备好迎接军团的入侵。"

###领导人###
EOM_matt_umao:0 "马特·乌毛"
EOM_matt_umao_desc:0 "马特·乌毛出生在德拉科纳里斯一户中产阶级家庭，他的父亲是政府的职员，母亲则是一家烘焙房的继承者。因此，即便是五六十年代的动荡时日，相对富裕的马特也得以度过安稳的童年。在他对儿时的回忆里，马特始终很好奇，为什么同样都是狐人，有的就可以像他一样上私立学校，加入王国精英的行列；有的则一生做牛做马，在社会底层沉沦而最终不明不白地死去。随着年龄的增长，马特对社会的不平等与殖民政府的倒行逆施愈发感到愤怒，正直青年的他时常发表一些在殖民政府听来不太好的言论。在父母的安排下，他被迫加入因佩里亚王国的一所军校，父母希望参军能帮助马特抛去反动的思想，避免惹火上身。\n\n可事与愿违。离开了故乡的马特在进一步接受了进步思想后决心反抗殖民政府，而同他一道的生灵并不在少数。当帝国内战的钟声敲响时，马特和他的战友们决定跟随叛变的大部队加入白军，并在接下来的时日里舍生忘死地和殖民军队作战。虽然马特凭借着接受过的教育成为了部队的指挥官，可他并不打算坐在后方指挥下属送死，而是亲临第一线参与直接的战斗。这样的战斗方式为他在许多青年士兵中积攒了大量的声望，为他赢得了“不怕死的小马特”这样一个哭笑不得的称号，并最终将他送进了后方的医院。\n\n可以说，马特是幸运的。至少躺在医院的他不用亲眼见证对殖民者的反抗以自相残杀告终。\n\n马特本狐对大多数意识形态并不感兴趣，他之所以会加入白军，也不过是因为内战打响时，自己恰好在莱沃斯卡尔执行任务罢了。在他看来，所有愿意反抗外国殖民者的战士都是值得尊敬的，所谓左与右的意识形态都可以在战后再讨论，无论一百年前发生了什么，在生死存亡的危难关头，红也好白也好，都应该团结起来走向胜利。\n\n因此，当马特看到各地陷入混乱时，心如死灰的他几乎不愿意再继续战斗。随着天壁同盟殖民者的撤出，他所“效忠”的政权唯一的对手便剩下了自己曾经的革命同胞。马特眼看着曾经那些呼喊着“自由，平等”的革命家将殖民者的压迫爪段用来维持自相残杀的战争，把一批又一批的青年送上战场屠戮孩童。感到失望万分的马特最终离开了他所在的政权，带领一批部队南下投靠了据传由“理想主义者”带领的绿洲共和国。\n\n现在，马特正忠诚地履行着抵御边疆的指令。在东方，是人类的殖民地和帝国的最后遗孤，北方则是无尽的动荡与混乱。绿洲共和国正处在岌岌可危的情况，而马特，一个丧着脸的中年大叔；一个努力奋战数十年而一无所获的将领；一个曾经满怀理想，如今一无所有的革命者，正准备拼上一切保卫他所能寻求到的最后的“绿洲”。"

