###阵营###
RSB_federation_icon_1_tt:0 "§Y南巴联邦主导国§!\n政治点数：§G+5%§!\n生活消费品工厂：§Y-8%§!"
RSB_federation_icon_1_tt_desc:0 "随着伟大战争时期成立的巴斯蒂亚联邦的解散，南巴地区的各国在现实与政治的考量下成立了南巴斯蒂亚联邦。该联邦将团结南巴地区各国与建立联邦体系下的经济同盟为主要目的。而南巴斯蒂亚共和国作为这一庞大联邦的主导国，主导着整个南巴斯蒂亚联邦的事务，并从中获取利益。但近些年联邦的稳定度在逐渐下降。"
RSB_federation_icon_2_tt:0 "§Y南巴联邦成员国§!\n政治点数：§R-5%§!\n£GFX_prod_eff_cap 生产效率上限：§G+5.00%§!\n§Y民用工厂§!建造速度：§G+5.00%§!\n（[RSB.GetFlag] §Y[RSB.GetNameDef]§!）贸易关系修正：§Y+20.00%§!\n（[RSB.GetFlag] §Y[RSB.GetNameDef]§!）对其额外贸易：§R+20.00%§!"
RSB_federation_icon_2_tt_desc:0 "随着伟大战争时期成立的巴斯蒂亚联邦的解散，南巴地区的各国在现实与政治的考量下成立了南巴斯蒂亚联邦。该联邦将团结南巴地区各国的联系与建立联邦体系下的经济同盟为主要目的。该联邦的成员国大多出于经济利益与政治关系加入联邦。联邦条约带来的经济收益固然巨大，但联邦成员国需要将部分主权让渡给南巴斯蒂亚共和国作为代价。而经济同盟在实际操作上也会更加偏袒南巴斯蒂亚共和国。"
RSB_federation_icon_3_tt:0 "§Y南巴斯蒂亚共和国保护国§!\n稳定度：§G+10.00%§!\n改善关系持续花费：§R+50.00%§!\n每日指挥点数增长乘数：§R-10.00%§!\n（[RSB.GetFlag] §Y[RSB.GetNameDef]§!）对该国贸易成本：§G-20.00%§!"
RSB_federation_icon_3_tt_desc:0 "为了向南巴斯蒂亚共和国寻求保护，一些非南巴地区国家自愿通过签订条约等方式出卖一部分主权换取南巴斯蒂亚共和国的经济援助和军事保护，在国际上也常常与其站在同一个阵营。这类国家有较高的自主权，并不能被简单的看作南巴联邦的傀儡国或殖民地，但通过形形色色的条约与顾问，南巴斯蒂亚共和国仍能间接控制该国。"
SFH_farhome_kingdom_icon_tt:0 "§Y远乡王朝§!\n稳定度：§G+5.00%§!\n政治点数：§G+10.00%§!"
SFH_farhome_kingdom_icon_tt_desc:0 "在过去的几十年里，远乡王国不断衰弱，其曾经庞大的王朝势力如今也逐步走向分裂。西北地区因战争陷入混乱，如今不得不交由军政府管辖，当地人民苦不堪言，饿殍遍野；因为与人鱼的协定，东北远乡的岛屿和部分领土割让给了人鱼殖民政府，严重打击了远乡国的威信；而远乡国王郑钧之子，郑义的背叛更是对这个古老王国的一记重拳，北远乡王国的成立彻底分裂了本就走向无序的远乡王国。在当下，南远乡政府尚且可以维持明面上的统一，§R可谁又知道这份安宁能持续多久呢？§!"
WOM_influence_faction_icon_tt:0 "§Y沃姆帝国势力圈§!"
WOM_influence_faction_icon_tt_desc:0 "沃姆帝国，从一无所有崛起的帝国，东巴斯蒂亚大战的胜利者，笑到最后的地区霸主。自奥罗日亚联合王国衰弱以来，沃姆人抓住机会，取得了独立后不断征战，不但征服了周边的诸国，还带领他们取得了大战的胜利，一举奠定了其在东巴的霸主地位。有人说，沃姆的胜利是建立在非人物种奴隶的尸山血海上的；有人则说，沃姆不断依靠投机取得胜利，其荣光终究不会长久；还有人说，沃姆树大招风，其自负的举动终将引来反对它的联盟——然而，直到当下，沃姆仍然是当之无愧的地区霸主。\n\n§R世纪末的钟声已然敲响，命运还会眷顾沃姆吗？§!"
