###民族精神###
VGI_revolution_forward:0 "革命向前"
VGI_revolution_forward_desc:0 "先锋国际的名字有很多，第三国际、疯子、恶之魔兽的拥趸、激进分子，不客气的说，这些都是他们，但即使是最乐意诋毁先锋国际的敌人，也无法否决先锋国际所展现出的坚韧和决心:自从第一国际放逐——或者他们自称的脱离后，随命运的坎坷不断，最终先锋国际在中巴斯蒂亚的一个角落找到了自己的容身之处。\n\n尽管这片土地荒凉不已，但再怎么样这里在名义上仍是中巴斯蒂亚联盟的领土之一，先锋国际在此立足以来，围剿与追杀从未停止过，先锋国际则在一次次与敌人的周旋及战斗中慢慢成长起来，成为了中巴斯蒂亚联盟的心腹大患。\n\n全世界的理想主义者和先锋主义分子都将其视为梦乡和精神故乡，并源源不断的向其投入援助。尽管这是属于理想和勇气的赞歌，但随着逐步的围剿与被压缩的生存空间，照此下去，先锋国际的命运也不过是像历史上的友谊会一样，消散于历史的长河上罢了。但中巴斯蒂亚联盟的崩溃为他们带来了一线生机:无论结局如何，此刻时机已至，倘若什么都不做的话只会沦为时代的尘埃，所以，§t以革命之名，前进§!！"

