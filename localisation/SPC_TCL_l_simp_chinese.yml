###民族精神###
CB_dangerous_borders:0 "危险的边疆"
CB_dangerous_borders_desc:0 "一个农民抬头望向远方，在山的另一头，是金闪闪的南巴斯蒂亚联邦。那是文明的世界，资本主义流淌着的蜜与酒麻痹着每个人的大脑，人们嬉笑着在糜烂中生活；而在山的这一边，是那些自由民的罪，是他们所不曾来过，却施加难以言表之残暴罪行的法外之地。在这里，人类，亚人，兽人，魔兽，无一例外都成为了那残酷审判——世界大战——的受害者，战乱成为了他们的主旋律，而这曲歌永远不会停止演奏。\n\n这里是§C世界的边疆§!，§Y文明的最前线§!，§O唯有强者永存§!。\n\n来自北方的难民，土匪，军阀终日冲击着北中巴地区的稳定。残存着的殖民地，军政府，理想主义者，军阀，仍在试图建立属于自己的新秩序，可惜收效甚微。终有一日，南方的动荡会打破这里微弱的平衡，然后……\n\n§t胜者为王§!。"
CB_central_bastia_defense_agreement:0 "中巴防御协定"
CB_central_bastia_defense_agreement_desc:0 "中巴防御协定，全称中巴斯蒂亚防御协定，由位于东北中巴斯蒂亚地区的两个经济殖民地：托克尔达开拓领，“冰峰”经济联盟，以及边境安全承包商组成。出于对边境安全的考量，防御协定规定两大经济联盟在任意一方受到来自非人类势力攻击时要加入战争，并共同出资维护边境安全承包商的正常运营，从而对魔兽军队，来自北方的盗匪，野生魔兽等敌对势力形成压制。"
CB_central_bastia_defense_agreement_tt:0 "§C当协议签订国遭受第三方入侵时，其它成员有义务参与防御性战争。§!"
TCL_abandoned_colonies:0 "被抛弃的殖民地"
TCL_abandoned_colonies_desc:0 "对于沃姆帝国的多数民众而言，托克尔达开拓领几乎是“穷乡僻壤”的代名词。作为沃姆帝国体现国力强盛的政治工程，托克尔达开拓领早就失去了它当年的地位，如今，只是作为行政官员的流放地存在。开拓领政府几乎没有任何来自中央政府的支持，无论是维稳的军队还是行政所使用的资金，都要靠当地政府自己想办法——在开拓领经营不善的当下，这是在称不上是个好主意。\n\n§Y如果我们证明自身的价值，那来自沃姆的意见或许会有所改变。§!"
TCL_merchenary_militia_system:0 "雇佣兵-民兵体系"
TCL_merchenary_militia_system_desc:0 "由于开拓领的军事实力不甚理想，出于对地方安全的考量，各地的定居点大多自行组建了民兵卫队，总督府可以在付出一定代价的基础上调动他们。除此之外，边境安全承包商也在开拓领驻扎了协助维稳的部队，虽然他们几乎不受总督府控制，可在对抗野生魔兽，原住民叛乱上，他们的确是一把手。由于承担了国防责任，民兵团体和雇佣兵组织都有能力对我们的政府施加影响，这有利也有弊。\n\n如果§Y政府§!试图§O扩建§!自己的§O军队§!，那势必会引起§g雇佣兵§!与§g民兵§!的§R不满§!，但我们也可以借此§R压制§!两大团体对政府的影响力。在不久的将来，这或许会起到§C很大作用§!。"
TCL_conflict_with_aboriginal_people:0 "与原住民的冲突"
TCL_conflict_with_aboriginal_people_desc:0 "中巴斯蒂亚地区有着大量的非人物种原住民，他们与我们文化，语言皆不相同，而且许多拒绝我们所进行的殖民扩张。尽管缺乏支持，大量的原住民仍然时常和我们的定居点爆发冲突，这严重损害了我国正常的经济活动，破坏了定居点的稳定性。"
TCL_colony_in_decay:0 "破败的开拓领"
TCL_colony_in_decay_desc:0 "和得到了相对充分开发的中巴南部不同，中巴斯蒂亚地区偏北一带充斥着连绵的山脉，丘陵与密林。开拓领完全没有足够的人力物力完成对定居点的开发，各地基础设施稀烂，匪患横行，动荡不断。许多本该可以开发的资源被迫浪费，大量定居点仍然维持着低产出，勉强自给自足的经济状态，愿意前来打拼的定居者也越来越少。\n\n§R随着物资的进一步耗尽，糟糕的工业产能很快就会显露出其弊端。§!"

###领导人###
TCL_otto_lamberk:0 "奥托·兰博克"
TCL_otto_lamberk_desc:0 "开拓领的总督职责绝非好差事——这是奥托这么些年来深入骨髓般的想法。曾经的他是一名踌躇满志的学生，在帝国最好的大学修国际关系与金融管理专业，并在毕业后成为一名公务员，在仕途上一路高升。东巴大战的胜利并没有让他失去理智，作为政府内著名的和平主义者，他很快便在沃姆尼亚的官场中节节失利，并最终被流放到了帝国边疆——托克尔达开拓领，一个连年亏损，除了作为面子工程以外几乎毫无意义的殖民地。\n\n深知自己已不可能直接对沃姆尼亚产生影响的奥托放弃了过去的理想——改变沃姆帝国的军政体制，让民众从军国主义的幻梦中苏醒过来——而是专注于改善殖民地的情况。在这里，沃姆的定居者和当地原住民不断产生着冲突，而奴隶劳工的不满也与日俱增，经济发展几乎不存在，而少数赖以求生的产业——像是矿业——则运行低效。毫无疑问，想建设好开拓领，来自帝国中央的支持是不可或缺的，可是个人都知道，开拓领是流放地而非所谓“帝国明珠”一类的夸夸其谈。妄图获得中央支持是几乎不可能的。\n\n§R除非开拓领真的能做出什么名堂。§!\n\n对于奥托来说，他很清楚帝国的老爷们如何看待自己和手下的开拓领，试图获取更多来自中央的支持是没有意义的，只有打出开拓领的名声，让民众意识到帝国的边疆之外还有这样一个闪耀着的，弘扬着帝国国威的强大，富裕殖民地，才有可能真正转变当下的劣势。"

