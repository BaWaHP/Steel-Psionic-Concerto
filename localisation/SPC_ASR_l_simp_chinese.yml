###民族精神###
ASR_hundred_year_history:0 "百年传承"
ASR_hundred_year_history_desc:0 "自冒险者联盟建立以来，它就始终站在人类文明探索未知世界的第一线。从中巴斯蒂亚连绵的山脉到瑟拉斯的无尽荒野，从艾尔诺瑞斯冰雪覆盖的密林到巨龙徘徊的因佩里亚利斯，凡是文明所触及之地，一定会有冒险者联盟的身影。数百年的探索，掠夺与积累成为了联盟宝贵的财产，无数优秀的技艺，知识在联盟的庇护下得到了保存，这极大巩固了联盟在特定领域的科研能力，也成为了其训练战斗人员的绝佳底气。"

ASR_special_administrative_region:0 "特别监管区"
ASR_special_administrative_region_desc:0 "联盟特别监管区，又称联盟特区，是在绿洲联盟斡旋下，由浮空贸易城交由自由公会联盟，并由后者之后交给冒险者联盟管理的一片土地。出于其特殊的政治地位，虽然监管区政府有权限自由处理内政，其在外交上均高度受限于周边的其它国家，以及冒险者联盟总部的指示。\n\n§Y来自外部的指示可能是§!§R矛盾§!§Y的，监管区政府必须选择自己的站位，在多方之间斡旋。§!"

ASR_artillery_array_Apollo:0 "炮击阵列：§O阿波罗§!"
ASR_artillery_array_Apollo_desc:0 "经过冒险者联盟总部批准，魔导炮击阵列“阿波罗”已被安装在监管区境内一处隐蔽的地点。在紧急情况下，只要得到监管区行政委员会的半数以上支持，监管区领导人便有权限启用炮击阵列。由于其蕴含的庞大魔力，在炮击阵列强大的火力面前，地表几乎不存在可以正面抵抗的军事力量。\n\n§O“太阳之力，尽在我掌。”§!"
ASR_artillery_array_Apollo_tt:0 "§C在危难关头，我们将可以启用炮击阵列。§!"

ASR_north_vs_south:0 "南北之争"
ASR_north_vs_south_desc:0 "冒险者联盟内部愈演愈烈的政治斗争已经蔓延到了监管区上下，无休无止的争吵正撕裂这个脆弱的政府。为了监管区的未来，我们总有一天要选择自己的站队——无论是站在支持扩张联盟政治影响力的“北派”一边，还是选择固守南方，保全自己的“南派”，亦或者是走向未知的道路…"

ASR_magic_power_manic:0 "躁动的魔力"
ASR_magic_power_manic_desc:0 "监管区境内的魔力始终维持在躁动的状态，野生动物受此影响变得暴躁而嗜血，各地定居点反复遭到不同程度的袭击。哪怕是久居在这里的智慧物种，在没有经过治疗的情况下，也会受到魔力的影响而变得暴力，不安。只有得到了特殊保护，且有一定实力的魔法师才能彻底维持自身精神状态的稳定。冒险者联盟受邀找到问题的根源并解决，不过目前为止还没能取得什么结果，好在躁动的魔力仅仅停留在这个地区内…\n\n§R…大概？§!"

