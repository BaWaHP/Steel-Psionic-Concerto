###领导人###
ASR_melidia_heartfilia:0 "梅利迪亚·哈特菲利亚"
ASR_melidia_heartfilia_desc:0 "梅利迪亚·哈特菲利亚是瑟拉斯地区人类殖民者的后代，虽然在她出生的时候，哈特菲利亚一家仍是在当地颇有威望的商人家族，掌握了多条铁路，领地的经营权。可随着大战的爆发，一切美好都化作过往云烟。眼看着家人在战火中一个个消逝，梅利迪亚在机缘巧合下得到了在冒险者联盟内一位远亲的帮助。在联盟的安排下，她被送往偏远地区逃避战火，代价则是放弃哈特菲利亚一家在瑟拉斯地区遗留下的财产——不过梅利迪亚本就对这些事物不感兴趣，而她的兄弟姐妹早就带着自己的那一份逃往南方了。\n\n战后，梅利迪亚自告奋勇地参加了冒险者联盟在中巴联盟开设的魔法学院，并以优异的成绩毕业，之后被调往北方地区维护区域安全。不过，虽然任务名义上是维护安全，梅利迪亚发现自己却成为了种族灭绝的推动者，人类殖民地的雇佣兵。在上级的命令下，梅利迪亚的小队无数次镇压了非人物种的起义，维护安全也仅限维护人类殖民地的安全，至于剩下的“生物”…让他们自求多福吧。\n\n由于希望避免和亚人，兽人游击队爆发直接冲突，梅利迪亚的小队申请调往瑟拉斯地区应对游荡的野生魔物。在那里，梅利迪亚得以大展身手，她很快便以惊人般强大的炮击魔法闻名联盟上下，并在几次成功的作战后得名“瑟拉斯的天火”。\n\n对梅利迪亚而言，冒险者联盟设立的初衷是好的，而它也确实成为了维护北方地区稳定不可或缺的强大组织。然而，来自南方的金钱腐化了这个本该起到带头作用的组织，梅利迪亚为冒险者联盟内无孔不入的种族歧视，权色交易感到震惊。随着联盟内部的矛盾激化，梅利迪亚加入了“北方派”，后者总部位于瑟拉斯地区西部，主要成员为在北方的前线人员。她支持跨物种的平等权益，冒险者联盟作为政治实体的势力扩张，反对固守南方，在腐败中沉沦的保守派政策。\n\n作为联盟内部斗争的一环，梅利迪亚和她的盟友们拿下了监管区。在梅利迪亚看来，那些嘴上叨叨着联盟在北方各地的失败，势力的不断缩减，人员伤亡的“南方派”不过是一群胆小鬼，他们只懂得像狗一样跟在南方资本的后面，把屠刀挥向比自己弱小的原住民，然后沉醉在过去的失败中，不愿意继续前进。为了她心目中理想的冒险者联盟，梅利迪亚决心巩固她和她的盟友在监管区的统治，并以自己的方式书写新世纪的历史。"

