###领导人###
ALR_Slate_Moria:0 "板岩·莫瑞亚"
ALR_Slate_Moria_desc:0 "板岩·莫瑞亚是矮人王国的诸侯的后裔，他的先祖石灰岩·莫瑞亚率领着一支矮人从覆灭的矮人王国向东南方逃离，在损失了八成以上的族人后终于穿越了魔兽四处出没的死亡地带，抵达了奥罗日亚帝国的边陲，安里利亚山脉。此地的统治者安里利亚公爵慷慨地接纳了矮人们，而矮人们也帮助安里利亚公爵从大山中开采出一车又一车的矿物，在安里利亚扎下了根。\n\n时过境迁，矮人现在已经成为了安里利亚的主体民族。在奥罗日亚帝国土崩瓦解时，安里利亚也曾效仿西莉迪亚和皮奥瑞亚一般揭起共和国的旗帜。然而安里利亚的力量还是太过弱小了，在奥罗日亚的威慑下安里利亚终究还是放弃了独立，应联合王国的要求将板岩·莫瑞亚推举为公爵来管辖“安里利亚公爵领”。\n\n坦白地说，板岩·莫瑞亚自己从未想要当什么国家领袖。在帝国解体以前，板岩曾经是一名在奥罗日亚首都格罗尼亚城的学术沙龙中高谈阔论的经济学家，他甚至进入过帝国宰相茨威格的智库团队中为解决经济崩溃而出谋划策。然而茨威格的努力显然失败了，帝国四分五裂，而他也被当做失败经济学家的典型被赶回了安里利亚，随后他回到了祖传的庄园隐居。但当本斯堪和其他几个矮人城市的市长一起来到他的庄园邀请他担任安里利亚公爵领的公爵时，他还是出于对矮人族群的热爱担下了这份责任。\n“当时我就念了两句诗，叫‘如果能有利于安里利亚即便是出生入死我也心甘情愿，怎能因我个人命运的辗转沉浮为由来逃避应有的责任？’于是我就从我的庄园来到了本斯堪。”"

