###民族精神###
ALR_Auroretia_minerals_trade_pact:0 "奥罗日亚矿物交易条约"
ALR_Auroretia_minerals_trade_pact_desc:0 "由于在奥罗日亚帝国解体时发动了独立，安里利亚被迫和重建的奥罗日亚联合王国签订了条件苛刻的优先交易条约，将大部分矿物出口以低廉的价格出售给奥罗日亚，以换取奥罗日亚的保护。"
SR_dwarves:0 "矮人"
SR_dwarves_desc:0 "矮人在名为矮人王国的北方政权在魔兽的进攻下覆灭后便分为多支四散而逃，广泛分布在中巴斯蒂亚与东巴斯蒂亚各地。矮人普遍身材矮小、身体壮实，更喜爱与矿物或机械打交道，他们的体质也能更好的适应矿洞的环境。但矮人对啤酒和烈酒的强烈嗜好也导致了其他问题：矮人普遍因为酗酒而性格暴躁，且平时需要消耗大量的生产力和粮食用于酿造。矮人的建筑通常深入地底，虽然这导致矮人的建筑速度缓慢，但也允许他们开拓出更大的建设空间。"

