###国家描述###
SPC_IS_SFH_national_desc_1:0 "千年之前，由数十艘做工精致的远航船只组成的舰队离开了他们称为§G“天朝上国”§!的故乡，穿过了充斥着无数§0未知怪物§!的海洋，克服了来自§0未知魔法§!的威胁，成功地在现今§O远乡王国§!一带建立了定居地。然而，这些远征者最初的目的并非在§9另一片大陆§!上建立起根据地，恰恰相反，他们所承载的任务是§C“证明天朝上国之强盛”§!，在绘制祖国周围海域地图的同时扩大影响力。然而，无论是高估了自身的实力还是§R低估了深海的危险§!，§R损失惨重§!的探险者们勉勉强强才抵达了§Y巴斯蒂亚大陆§!——而当他们最终意识到自己已§R绝无可能§!再次穿越那危险的海洋时，他们决定§C定居§!在这里，这就是§O远乡王国§!的起源。\n\n在接下来的几百年里，这些冒险者的后裔不断扩大着§O远乡王国§!的影响力。善于§C探索和开拓§!的他们很快就在环境§3相对不安全§!的§Y东巴斯蒂亚§!建立起了稳定的根据地，能够先他人一步获取各类原材料的他们也借此在同周边其它国家的§Y贸易§!中赚了大钱。由于§O远乡王国§!沿用了母国的一些习俗，崇拜§O神兽“麒麟”§!的他们慢慢地得到了一个称呼，§Y“麟人”§!。§Y麟人§!虽然将§C探索未知§!视作§6实现自我价值的最好途径§!，他们同样将§C和平§!放在第一位，这也是为什么在早期的扩张结束后，§O远乡王国§!很少进一步扩张自身领土范围，或者采取任何§R侵略性的外交政策§!。\n\n§C和平主义政策§!让§O远乡王国§!避免了大多数发生于§Y东巴斯蒂亚诸国§!之间的§R冲突§!，却无法让她远离同§0魔兽§!的§R战争§!——要知道，虽然没有直接建立起直属领地，§O远乡王国§!的§Y商人和企业家§!们同样在§Y中巴斯蒂亚地区§!投资了大量产业。§O伟大战争§!爆发时，§Y麟人§!在§Y中巴斯蒂亚地区§!的投资大多§t付诸东流§!，虽然这对§Y远乡王国政府§!§C影响不大§!，接连而至的§R战争§!还是让§O远乡王国§!陷入了§t巨大的财务危机§!。"
SPC_IS_SFH_national_desc_2:0 "§O伟大战争§!结束后，§O远乡王国§!的发展一度陷入了§5停滞§!。可这个局面很快便随着§Y第二次北进运动§!结束。与此同时，§C共和革命§!的火种也点燃了§O远乡王国§!。时任国王郑十世§1郑铭§!选择同革命者§C协商§!，在保留了§Y国王权力§!的同时建立起了以§4贵族和市民§!为主体的§C议会§!。可就当§1郑铭§!和他的§1改革派朋友们§!勉强在§C革命党人§!和§O保守派贵族§!间维持平衡并推进§C民主化进程§!时，§O世界大战§!爆发并打碎了一切平衡。\n\n§O世界大战§!使得§Y远乡政府§!送往§Y中巴斯蒂亚§!的海量投资§t付诸东流§!，国家再度陷入§t财务危机§!。这一次的萧条要比上次严重的多——由于大量负责从§Y中巴斯蒂亚§!进口原材料的厂商宣布倒闭，商品价格在短时间被炒到了离谱的高度，而大量工厂的停业意味着§O数百万§!的§R失业人口流离失所§!。雪上加霜的是，国王§1郑铭§!在这样的紧要关头却因为§Y打猎事故§!而§t死亡§!。这起§Y“事故”§!究竟是§R人为§!还是§4天意§!无人知晓，最终的结果便是§Y远乡政府§!同§C革命党人§!的§R全面决裂§!。由§C革命党人§!所组织的§R大规模叛乱§!最终在§8军队§!的协助下被§O镇压§!，可正因如此，§4郑铭之子§!，§1郑钧§!变得更加难以实现他父亲的§C愿景§!。\n\n§R世界大战§!结束后，由崛起的§O沃姆帝国§!挑起的§Y东巴斯蒂亚大战§!进一步恶化了局面。这场可怕的战争对§O远乡王国§!造成了十分严重且恶劣的影响，§1郑钧§!的统治也§t摇摇欲坠§!。§1郑钧§!不得不同时承受§9经济危机§!和§8军事失败§!的双重后果。战争结束后，由于§Y中央政府的衰退和西北地区的混乱§!，§1郑钧§!不得不下令让§1邱向荣元帅§!带领§8军队§!接手西北地区的统治以稳定局面。他的儿子§1郑义§!，一位坚定的§8反革命者§!，在北方的公开§O叛乱§!进一步削弱了§1郑钧§!的影响力，§Y贵族§!也对这位在革命党和保守派之间摇摆不定的国王持§1怀疑§!态度，与此同时，§1郑钧§!也发现自己年老体虚，或§R许时日无多§!了。§Y远乡王国§!的未来似乎一片§5黑暗§!。\n\n要做的事情：\n·培养§1女儿郑红§!，让她带领§O远乡王国§!走向§C全新的辉煌§!！\n·在§Y贵族§!和§C革命党§!之间§4周旋§!，§R不要§!让任何一派§R夺得权力§!。\n·§t小心§!来自§3亲人§!的§5背叛§!…"

SPC_IS_NFH_national_desc_1:0 "§O北远乡王国§!，在名义上属于§Y远乡王国§!的一部分，在历史的漫漫长河中还是位§4年轻§!的新面孔。其创始人§1郑义§!是现§Y远乡王国§!名义上的§R最高统治者§!§1郑钧§!之§Y子§!。§O北远乡王国§!的历史§C短暂且奇特§!，同一般的王国内的自治领不同，§O北远乡王国§!并非某个骁勇善战的贵族花了几代人的心血打下来了所谓的江山，也不是子女们争夺继承的财产，而是§1现任国王§!同§1郑义§!妥协的产物。\n\n§1郑义§!本人作为一名坚定的§t反革命派§!，同许多反对§1郑钧§!和§1郑铭§!的§C改革§!的§Y贵族§!一道，在§O东巴斯蒂亚大战§!结束后，趁着§Y远乡王国§!§R国力空虚§!，靠着§O军队§!的支持，试图用武力逼迫§1郑钧§!让出§Y王位§!。这份§R激进§!的提案被许多希望§C避免进一步冲突§!的§Y贵族§!所反对，最后§1郑义§!选择同§1郑钧§!§9“分享”权力§!，也就有了§O南北远乡王国§!。\n\n§Y北远乡地区§!跟相对§C富饶§!的§Y南方地区§!不同。这里无论是§G环境因素§!还是§8历史因素§!，都注定不会成为远乡王国财富或权力的中心。\n\n§Y南远乡地区§!不但有着§C富饶的土地§!，§6辽阔多产的平原§!和直通§Y南巴斯蒂亚§!的§C优良港口§!，更是§Y麟人§!最早的§6定居点§!——这意味着在§Y远乡王国§!还未§R一分为二§!之前，§R大多数§!的§Y行政机关§!和§Y人口§!都在§O南方§!，包括各类§8产业§!以及§Y财富§!。\n\n§Y北远乡地区§!则恰恰相反，这里非但§R人口相对稀少§!，气候更是§5较为寒冷且干燥§!。§Y劳动力§!的§R匮乏§!使得当地一直§O没能成为远乡地区工业化§!的核心，相对§R恶劣§!的气候也使得大规模的§G农业生产§!较为§t困难§!，这意味着§Y北远乡地区§!始终无法承载过多的§Y人口§!。这里既§C没有多少大城市§!也没有§G称得上道的美景§!，反倒是§9土匪和流寇§!多种多样。除此之外，§Y北远乡地区§!还因为较为§5偏僻§!，在过去也§Y不是远乡王国发展的中心§!，所以无论是§C科学的普及度§!还是对§1魔法的认知§!都相对较为§R原始§!。人们总喜欢用§Y“穷乡恶水”§!一词来形容§Y北远乡地区§!，也是因为这个地区的居民由于较为恶劣的生活环境进化出了比较§O彪悍的民风§!。如果是§Y北远乡地区§!有什么特别优越的地方，恐怕就是隐藏在山脉间的§C尚未开发的资源§!吧——可惜由于无论是数量还质量都§R比不上§!西北地区的产出。\n\n要做的事情：\n·§R摆脱§!§Y南远乡王国§!对我们所施加的§O政治§!和§Y经济§!上的影响，建立起§Y独立自主的政府§!！\n·镇压§t该死§!的§C革命党游击队§!！\n·准备§6不可避免§!的同南方的§R战争§!…"

SPC_IS_NWF_national_desc_1:0 "就跟§O北远乡王国§!一样，§O西北特别行政区§!同样是历史书上的§C新面孔§!。然而，同§1郑义§!所带领的§8叛乱贵族§!不同，§O西北特别行政区§!更像是个§C服从中央指挥§!却§5被迫“享有”大量自治权§!的以§9军队§!为核心的政权。可悲的是，这样一个§Y忠诚§!的政权和军队却被远乡中央当成了§5弃子§!，独自在§4环境恶劣§!的§3西北地区§!维持所谓的“统治”。\n\n§O西北特别行政区§!本质上是§R东巴斯蒂亚大战§!后，由§Y原乡王国中央§!命令其§9军队§!所建立的§8军政府§!，其目的在于维持由于大战而§R陷入混乱§!的西北地区§C稳定§!，并在§Y中央政府§!的支持下完成战后的§7重建工作§!。§Y特别行政区§!的领导人§1邱向荣§!是当时的§t战争英雄§!，§8忠诚于远乡王国政府§!的他在当时被视作是带领§O西北特别行政区§!的§6不二之选§!，而他本人也将此视作§7远离郑钧和郑义的斗争的好方法§!。\n\n然而，时过境迁，§O西北特别行政区§!的状况§O一天比一天糟§!。虽然§O沃姆帝国§!的§R主战派§!吆喝着要再跟§O远乡王国§!打一次§t全面战争§!的计划随着§5经济停滞§!落空，§O西北特别行政区§!早已经陷入了比战争还要§R糟糕§!的局面。先是来自§Y远乡中央政府§!的§C援助§!被§R切断§!，然后是当地§C革命党人§!的§R联合叛乱§!，§8军队§!本身就已经是特别行政区开支的一大§Y负担§!，这下更养不起了。在不得不§5缩小§!军队的规模后，§O军政府§!本就不高的威信§t一落千丈§!，§C革命党人§!更是一路§7高歌猛进§!。虽然叛乱最终得到了§Y镇压§!，特别行政区已经§Y承担不起§!第二次内乱了。\n\n可这也是没办法的事情，§Y特别行政区§!本身就地区十分恶劣的地区。西北远乡甚至比北远乡的境遇还要§R糟糕§!，这里虽然有着§C丰富的矿产，石材和燃油等资源§!，但是§R水资源稀少§!，§R劳动力不足§!，而且才§R战后重建搞得一塌糊涂§!。战争所造就的§9难民潮§!虽然得到了§C解决§!，§O人民流离失所§!的问题却依然是§R十分严重§!，由于§Y远乡中央政府§!§R切断§!了对特别行政区的§C支援§!，这里的§5物资日渐减少§!，而且没有丝毫好转的迹象。§Y大量的人口§!都没有称得上是家的固定居住点，更别说那些几乎完全§R靠着政府稀少的救济过活日子的低层人口§!。\n\n不过，§C幸运§!的是，由于§Y特别行政区§!在行政层面上§7很少遵循远乡政府的条款§!，这里被§Y东巴斯蒂亚诸国§!的许多高层人员视作§Y秘密交易§!的好去处。无论是§Y军火，毒品还是奢侈品§!，一个有着§Y足够钱财§!和§O武装力量§!的势力总能§C得到他们想要的§!。\n\n要做的事情：\n·§R不惜§!一切代价，§C稳住§!行政区的政权！\n·想办法再次§C建立起同中央政府的联系§!，或者§7实现行政区自立§!。\n·利用庞大的§1黑市§!和§O军队§!来推进§C重建计划§!吧！"

SPC_IS_CLD_national_desc_1:0 "奥罗日亚联合王国在第一次世界大战后不复战前的辉煌，经济崩溃民怨四起，加盟国纷纷独立，他们幻想着继续用战争去夺回从前的繁荣，却无视人民的呼声，在一系列战争之后，人民的愤怒已然沸腾，趁着与皮奥瑞亚共和国进行战争的机会，联合王国南方发生了革命，他们称自己为西莉迪亚联合阵线，刚刚结束战争的联合王国正在虚弱之中，本希望自己的盟友沃姆帝国帮助自己镇压革命，却遭到背叛，沃姆帝国宣布中立，联合王国只好表面上承认联合阵线的独立，却在暗中扶持傀儡势力，以图分裂阵线，阵线中的反动分子们趁机夺取了阵线北部并且自称为西莉迪亚共和国，试图消灭南方的西莉亚公社，现在，正是危急存亡之刻！\n\n西莉迪亚公社所在的南方是联合王国的工业重镇，工人力量强大，拥有进行革命的阶级力量，并且拥有较长的海岸线，虽碍于海洋魔兽无法进行大规模远航，但是海运和捕鱼业较为发达。由于此前发展偏向工业，农业的发展受到了相当程度的限制，丰富的铁矿煤矿是联合王国在此建立工业发展区的原因，公社也借此用矿产与邻国皮奥瑞亚进行贸易换取必需的商品。\n\n虽然因为内乱，北方的反革命者们不得不暂时停下脚步，但这不会一直持续下去，年轻的领导者必须带领公社打破重围，将革命的火种洒向更远的地方。"

SPC_IS_NCD_national_desc_1:0 "在创建之初，§Y西莉迪亚王国§!便是§O奥罗日亚联合王国§!的成员国之一，§Y西莉迪亚王室§!在§O联合王国§!组成后一直担任原西莉蒂亚王国区域的§t总督§!，并且在联合王国内部拥有相当的影响力，在因为§R世界大战§!造成的经济崩溃，§Y皮奥瑞亚王国§!脱离§O联合王国§!自立§C共和国§!后，为了保证内部稳定，西莉迪亚王室采取了更加§R极端的镇压与控制政策§!，反而激化了矛盾推动了§R革命§!的爆发，§Y西莉迪亚王室§!被迫§1流亡§!，原本决定直接镇压的§Y联合王国§!因为§R战争的消耗§!和§Y沃姆帝国§!的§G临时中立§!而不得不选择采取更§C间接§!的手段，他们§Y分化§!了刚刚成立的§C西莉迪亚联合阵线§!，相当一部分人带着联合阵线几乎§R全部§!的军队离开，独自成立§Y西莉迪亚共和国§!，并迎接流亡在§O奥罗日亚联合王国§!的§Y西莉迪亚王室§!回国，宣称自己为正统，而南方的§O西莉迪亚公社§!为§R叛逆者§!。\n\n§O西莉迪亚共和国§!拥有大面积的平原，而离海岸线不远的距离使得这些平原拥有良好的降水，作为§Y联合王国原首都§!和目前公社所占区域的工业重镇的连接省份，共和国拥有相当良好的§C农业基础§!，并且在我们与过激主义者分裂时我们获得了相当一部分的识相的§5军官§!的追随，我们的背后还拥有§O联合王国§!的支持，对他们来说，那帮人明显比我们更加危险，在必要时甚至会§Y直接派出军队§!支持我们。\n\n要做的事情：\n我们可以§Y依赖§!联合王国，但所有的赠品都有§t代价§!，我们必须衡量好这一切。\n那些人明面上追随我们，但§O各怀鬼胎§!，现在我们还需要他们，不能挑明，做好平衡。\n为了§C自由§!！"

SPC_IS_SFR_national_desc_1:0 "如果说发生在§Y南巴斯蒂亚§!的§C共和革命§!可以用“§t磅礴§!”一词来形容，那恐怕发生在§Y东巴斯蒂亚§!的§C反君主革命§!只能用“§0凄惨§!”一词来形容了。昔日的革命者梦想着可以像南巴斯蒂亚革命者一样，在§C欢声笑语§!中不费吹灰之力打倒§8腐败的旧帝国§!，让他们的思想在家乡生根发芽，建立起梦想的§C乌托邦§!——可现实却是§R残酷§!的，当§C革命者§!希望将枪口转向世界的彼端，§T击退§!§R侵略者§!时，§8冰冷的枪口§!却悄无声息地从§t背后§!贴了过来，而刽子手§Y没有丝毫的犹豫§!。\n\n§5而这样残酷的故事正在远乡王国内一天又一天的重复着。§!\n\n§C南巴斯蒂亚共和革命§!后，现任国王之父，远乡王国前任国王§Y郑铭§!希望同§C革命者§!合作，避免§t血腥的暴力革命§!以维持远乡王国的§Y稳定§!。§5天真§!的§C革命先烈们§!相信了那些§8愚蠢的贵族§!，以为他们会像§Y南巴斯蒂亚§!的领导人一样§C妥协§!，以为§R革命§!真的可以通过§Y沟通§!实现，以为§Y巴斯蒂亚大陆§!就会如他们预想的§C那般美好§!——而事实证明，他们所设想的§t没一个是正确的。§!§Y郑钧§!推翻了§Y郑铭§!的§C改革政策§!，变脸比翻书还快的§8贵族§!叫嚣着要把§C革命者§!都送上§R断头台§!，而§O世界大战§!就跟闹着玩般的开始了。\n\n§R经济危机§!和§O军事溃败§!——有什么是这帮愚蠢的贵族做不到的？他们亲手§R断送§!了远乡的前程，把国家托付给了§8势利的贵族§!和将远乡人民踩在脚下的§8外国入侵者§!，然后祈祷着自己睡几觉，等几天，形势就能好了？§5凋零的社会体系§!下是无家可归，饥寒交迫的§Y流浪者§!；拿着只能喝稀粥的工资的§Y工人§!用着数十年前的工具在说不定几世纪都没维护过的场所工作；乡间的§Y农民§!在一天比一天受污染的田地中交着一天比一天高的税务为那些§8肥头大耳的地主§!工作；政府中希望改革的人员被§R暗中杀害§!，记者§R失踪§!，革命党会议§R被强行终止§!，还有一切的一切……"
SPC_IS_SFR_national_desc_2:0 "§Y革命阵线§!仍然记得§t那一天§!。当远乡政府突然宣布§C革命党§!§R非法§!，当远乡最高司令部将§O军队§!开往有抗议者的街道，当郑钧§R下令开火§!的那一天。数以万计的革命者在远乡各地遭到§t有组织的屠杀§!，§Y郑钧§!说他是为了远乡好，可当他的属下在他自己的国家内§6为非作歹，肆意的屠杀人民，逮捕反对者，烧毁他人的故乡§!时，这个自以为是的国王又跑到了哪里去呢？\n\n§5数十年的游击战§!给革命者带来的伤痕是无法被抹去的。§C革命党人§!的部队在几乎不可能的情况下躲进了§Y中远乡地区§!的§7群山§!，在没有任何现代的基础设施的情况下几乎是§Y从零§!建立起了如今的§Y革命阵线§!。因为§R远乡政府§!的不断进攻，分散在远乡各地的§Y根据地§!不得不连续转移——§5大多数永远地倒在了前进的路上。§!绝大多数的革命者都在不断的游击战中永远的失去了性命，只有极少数者活了下来，成立了如今的§Y革命阵线§!。\n\n到了今天，虽然由于§R远乡政府§!的进攻力度§7减弱§!，根据地似乎呈现出一片§C欣欣向荣§!的样子。然而，由于革命阵线吸收了远乡各地持§Y不同意见的革命者§!，阵线内部偶尔依然会因为意识形态而产生§5巨大的分歧§!，这使得许多根据地的改革政策都没能得到实施——而就算这些政策得到了实施，恐怕也§R无济于事§!。为了维持根据地的存在，阵线的§5农业§!一直处在濒临崩溃的状态，更不用提基本不存在的§5现代工业§!了。§O革命部队§!虽然有着丰富的§7游击战经验§!，但却没有§Y更现代化作战方式§!的经验，这使得阵线部队在直接面对远乡正规军时会处于§R绝对的不利态势§!。\n\n种种的困难为根据地蒙上了一层§1绝望的不安情绪§!，人们害怕多年前对革命党人的大屠杀总有一天会§O再度降临§!——\n\n幸好，这一切有了§C转机§!。§Y郑钧§!的昏迷为阵线的领导人带来了§C希望§!，或许是§1最后的希望§!。根据地接下来的政策会从§C维持现状§!全面转向§O军事发展§!，一切都将为了§t革命战争§!而准备。如此这一次，革命党人再度失败，那恐怕就§R没有机会§!了。\n\n事情到了今天§R已无回旋余地。妥协不在革命阵线政策的讨论范围之内§!，§0如果远乡王室希望继续他们残暴的君主统治，那他们便必须从将革命者消灭至最后一兵一卒，翻越由千千万万远乡子民的尸体堆成的死亡之山，跨过由人民的献血汇成的溪流，抵达那名为“虚无”的彼岸。§!\n\n要做的事：\n§R无论如何§!都要维持根据地的§C稳定§!，不要让§Y人民之敌§!夺得了话语权。\n§R不惜一切代价，消灭远乡的毒瘤。§!\n§1谨记，我们无路可退。§!"

SPC_IS_QTA_national_desc_1:0 "作为近些年来在§Y南远乡地区§!崛起的§8宗教团体§!之一，比起§Y“教派”§!，人们往往会将青天教认为是一个§Y政治组织§!。虽然自称是§Y“教派”§!，§O青天教§!却没有一个严格的教义，其信徒并不会将某个个体或是动物视作信仰对象，没有类似书籍或是指南的内容以束缚成员行为，也没有任何称得上道的宗教仪式等等。如果要说青天教在什么地方同人们所认识的宗教相似的，那便是§9对事物的强烈崇拜§!——对于青天教的信徒而言，他们崇拜所谓的§6“青天”§!，或者换言之，一个§7对于远乡人民而言公平公正的社会。§!\n\n青天教的历史很难追溯。人们普遍认为青天教早在§t世界大战§!开始时就有了踪影。当时的§Y远乡政府§!不断向国内的§B保守派势力§!妥协，一时间，§5平民的生活水平和公民权利§!都急速下降，这份落差造成了一时间§O民怨四起§!的情况。虽然暴动很快便随着§Y远乡军队§!的§t武力镇压§!结束，在接下来的§Y经济危机§!和§Y军事溃败§!后，暴动§t又一次§!兴起。§Y青天教§!虽然没能在那时打出自己的名号，它却出乎意料地凝聚了数量庞大的§7忠实支持者§!。“多亏”了§5青天教教义的模糊§!和其§8创始人的政治倾向§!，§Y青天教§!在吸收了大量信徒后开始急速向§O军事组织§!转型，甚至更名§Y“青天军”§!，也就是其沿用至今的名号。\n\n§Y青天军§!在一开始被普遍认为是农民起义军的诡异而现代化的变种，其成员大多数是在农村混不下去的§5受压迫的农民§!或者因战争而在远乡乡村地带变得随处可见的§4流民§!，他们中有许多并不渴望寻求信仰，相反，他们寻求一个能带给他们吃穿的§C领袖§!。而§Y青天军§!的领导人，自称§O“青天”§!的男子实现了他们的§C愿望§!。在接下来的十几年间，虽然§R世界大战§!结束，可远乡人民的苦难却从未终结。青天军并没有止步于带领社会最底层的流民当土匪或是呼唤田园牧歌，相反，他抓住了§Y反人鱼运动§!的新兴浪潮。"
SPC_IS_QTA_national_desc_2:0 "自打§Y远乡政府§!宣布向§Y白洋海人鱼族§!让步，给予其§O超国民待遇以换取援助§!的那一刻，针对人鱼的§O示威游行§!乃至§R暴力运动§!就从未停歇过。事实上，这些§R暴力事件§!的背后在很大程度有此时已成规模的§y青天军§!§y推波助澜§!。随着种族之间的冲突进一步白热化，青天军开始转向全新的舞台——§Y政治§!。在远乡东海岸大大小小的城市乡镇都能看到青天军的旗帜，他们宣扬着远乡人民的§C优越性§!，反对远乡人民时下§O权利的缺失§!，描绘着§C远乡人民安居乐业§!，§R打倒外国敌人§!的§G美好未来§!，吸收各地§O右翼武装力量§!并采用从说服到暴力的一系列手段扩大其影响力。\n\n当然，青天军的崛起少不了远乡政府的§Y“优越政策”§!。虽然偶尔在皇冠的问题上能达成一致，出于向境外势力妥协的目的，远乡政府对国内的§O极右翼组织§!采取了类似对革命党人的§R残酷镇压政策§!。这进一步激化了这些组织的§R极端性§!，并促使他们转向已经小有规模且具有一定武装力量的青天军——而青天军的领导人也§Y来者不拒§!。很快，青天军便成为了远乡王国境内最大的§O右翼反对武装力量§!，其规模甚至§Y超过§!了同时期的§C左翼革命党根据地§!。\n\n然而，急速扩张也并非没有§R代价§!。青天军的§Y内部派系林立§!，§O争吵不断§!，能让种族主义者，军国主义者，国家社会主义者，独裁支持者，狂热的宗教信徒，军头乃至土匪等一众人团结一致的仅有他们§R对远乡王室和其背后的外国势力的厌恶§!。不过，至少在他们打败§O远乡王国§!之前，青天军§Y不太可能§!分裂，这也是绝大多数青天军领导人的§C共识§!。\n\n郑钧身体的急速恶化为青天军的领导人带来了§C胜利的希望§!。潜伏在远乡东海岸的他们不再隐藏组织的身形，站了出来并对远乡的军队开始侵袭。虽然大规模的战斗依然没有爆发，§Y远乡政府§!已经失去了对东海岸部分地区的控制权。青天军在宣布“接管”并“帮助”当地政府统治后，开始全面展开新一轮的§O军事化政策§!，准备在§R不久的将来§!向§Y远乡政府§!发动§O进攻§!。\n\n§R成败在此一举，胜利者将会夺得远乡地区的控制权，失败者将万劫不复§!。\n\n要做的事情：\n确保青天军获得§C人民的支持§!，维持控制区的§Y稳定§!。\n§O改组现有军队§!，使其成为能够对抗远乡王国的§Y正规军§!。\n§C我们乃天意所归，为了还远乡人民一个青天，继续前进......§!§0无论代价如何§!。"

SPC_IS_PEO_national_desc_1:0 "“民族的自由与§1东巴斯蒂亚§!的命运将永远是§C皮奥瑞亚§!民族不得不面对的命题”—皮奥瑞亚政治家§R克里斯·约翰逊§!  1908年\n\n尽管皮奥瑞亚的故事可以追溯到东巴斯蒂亚尚处于原始社会时期，但现代意义上的皮奥瑞亚民族形成于11世纪的那次由麟人引起的“民族大融合”。而皮奥瑞亚人对于国家，自由，团结的信仰也从此形成。1772年，由罗克希亚邦主导的皮奥瑞亚联邦王国成立，阿莱克斯家族成为皮奥瑞亚地区的统治者。\n\n皮奥瑞亚联邦王国形成后，经济高速发展，成为奥罗日亚联合王国内资本主义经济最为发达的经济体。至1890年代，皮奥瑞亚确立了现代化农业制度和工业社会体系。但是隐藏在经济繁荣下隐藏的是奥罗日亚对皮奥瑞亚日益严重的剥削和人民对外国统治者日益增长的不满情绪。\n\n在经历伟大战争和世界大战前期，奥罗日亚联合王国为榨取战争资源在皮奥瑞亚联邦王国实施了惨无人道的剥削政策，造成大量皮奥瑞亚人死在战场或者犹豫过度征粮导致的饥荒中。同时，由于这种行为严重侵犯了皮奥瑞亚王室的“领地全权自治权”，王室开始主动与奥罗日亚方面保持距离并一反常态地鼓励皮奥瑞亚国民公开表达爱国立场。于是，皮奥瑞亚民族主义开始抬头。但超乎王室意料的是最初以保护阿莱克斯家族利益为目的煽动的民族主义迅速与共和革命思想，世联主义民族解放思想结合，形成皮奥瑞亚特色的民族解放民主革命运动。\n\n1985年，随着奥罗日亚新一轮征兵令的下发，皮奥瑞亚爆发了大规模的民族起义。起义者占领了皮奥瑞亚境内的几乎所有地区，构筑街垒抵抗奥罗日亚的武装征税队。此时的皮奥瑞亚王室在恐慌中宣布全国戒严。人民的怒火被彻底点燃，随着越来越多的共和主义革命者从南巴斯蒂亚地区回国煽动民众发动进一步革命，共和革命已成大势所趋。1985年底，瑞帕布里克的共产党人打响共和革命的第一枪，随后全国云集响应。“皮奥瑞亚共和革命战争”正式开始。1986年7月1日，王室见大势已去，宣布退位并流亡奥罗日亚，残兵分散溃退进入皮奥瑞亚广阔的森林和山区当中。7月4日，皮奥瑞亚“共和军”开入首都，于当晚宣布成立皮奥瑞亚第一共和国。\n\n共和国成立后，出于巩固政权需要，政府发动了“社会纠察运动”以雷霆手段清扫了共和国内部顽固的保皇势力。后通过“公民财富积累计划”和“皮奥瑞亚工业3.0方案”使皮奥瑞亚经济迅速恢复，人民生活水平得到极大提升。但是东巴大战结束了一切。\n\n东巴大战期间，皮奥瑞亚共和国大量土地失陷，军队在时任国防军参谋总长孔斯年的带领下发动政变建立军政府，成立皮奥瑞亚第二共和国。通过组织游击战，整编国防军等方式共和国快速稳固战线，并尝试反攻至麦库克州一线。随着西莉迪亚公社政权起义胜利，奥罗日亚接受现实，接受了共和国提出和平条件。\n\n战争胜利后，军政府按照承诺举行大选，但是1996年大选由于组织失误和计票出错，选举迅速演化为骚乱，进而引发“1996年第二共和国宪法危机”。孔斯年不得不在镇压骚乱后再度延长军事管制时间。但是人民不会在看见光明后忍受黑暗。\n\n时间来到1998年，孔斯年他自己也累了。军事管制无论如何都没有理由继续维持下去。如果……如果皮奥瑞亚真的能够在民主下崛起，他也愿意交出权力。但是如果民主政府再一次把国家搞的一团糟，他也保留再次摄政的权利。\n\n国家特色：\n§R在危机中维护共和国脆弱的民主制度§!\n§C在强敌环饲的环境下保护伟大的皮奥瑞亚祖国§!\n§G在四位领导人中选择一位带领皮奥瑞亚走向未来§!\n§Y在东巴斯蒂亚建立起一个强大而自由的联邦共和国§!"

SPC_IS_ZHE_national_desc_1:0 "古代§R七河地区§!前后历经了多次由北向南的半人马族大迁徙，包括狄银、摄图、叱拔、于摩等。该地区数千年来都为农耕民族与游牧民族所并存控制。双方长期冲突不断，游牧民族的频繁南下令该地始终没有形成稳定而统一的强大政权，直到§R墨精灵§!们的到来。\n\n1910年代，来自南巴斯蒂亚的人类殖民先遣队以科考名义试图探索因高魔力辐射导致南方人类在历史上不曾涉足过的§R大陆心脏地带§!，在经历了大陆心脏地带最后一次魔力喷涌后，他们在七河流域遭遇了刚从遗播海海底踏上这片土地的新生命——墨精灵。这种自述从生物遗体沉积的海底化石燃料中诞生的生命迅速适应了周遭的环境，并且运用着仅存的生前的知识和技能开始了发展。这种不可思议的潜能使得对政治理想本已心灰意冷的先遣队队长§R罗赛琳德·蒂·乌斯拉明§!登萌生了在海外建立§R共和的理想国度§!的愿望，她开始频繁与墨精灵接触。在先遣队全员因长期暴露于高魔力辐射环境相继离世后，吸收了精神上的思想遗产与三垣地区的殖民地物质遗产的墨精灵开始了自己的旅途。\n\n1917年，在墨精灵的控制下，经过各据点对各自制度、生产和生活的探索与发展，最终以绝对多数达成§R共识§!成立§R联合碳化物集团§!（UCG）。各据点整合，采用§R现代企业组织形式§!。次年，以§R独角兽§!国家§R诺加依国§!王室因西大陆殖民统治而流亡为契机，以§R共识§!为基础，通过吸收整合周遭§R半人马§!政权，于1922年成立§R七河联邦§!。首任董事长§R百浪多息§!以国家资本主义作为发展道路，采用雁行产业发展形态，确立了全国性的行政、基础设施建设等规划和债务发行，通过一系列规划开启了七河流域大规模现代化建设的开端。\n\n1930年代，随着大陆心脏地区的魔力辐射降低至世界平均水平，墨精灵与人类的接触开始增多，来往逐渐增密。随着墨精灵带来的大工业生产的经济模式使得产品大量增加，全国性的铁道网建立增进了货品流通；通过债务发行促进经营扩大，这也令七河地区的其他种族一并被迫卷入了现代化的进程。联邦积极寻求出口，与中巴斯蒂亚地区与提特兰地区多国进行贸易。1955年，联碳集团放弃向东对§R乌骓王国§!的既往殖民政策，不再考虑该地区的商业价值。在东方全面撤出的同时，联碳集团将精力放在与西大陆的§R殖民冲突§!前沿，此举也标志着§R开拓时代§!的结束。\n\n1958年，七河联邦组织筹办了全世界第一场万国工业博览会，以此为契机对外展示了联碳集团与七河联邦的制度、生产、生活等各个方面的形象。这次盛会被视为经济腾飞的开始，以§R七河属南巴斯蒂亚公司§!（ZBC）为首的一众一级国策公司成立，极大促进了经济繁荣。1960年代，七河联邦在南巴斯蒂亚联邦与提特兰地区的冲突中选择了中立，与战争双方仍同时进行经贸往来，并在世界大战尾声时逐渐偏向南巴斯蒂亚方。"
SPC_IS_ZHE_national_desc_2:0 "1970年代，政治与经济的热络推动联碳集团大举进入南巴斯蒂亚市场。时任董事长§R盘尼西林§!开始向南对§R提特兰地区§!推行§R金元外交§!，持续资助和影响亲七河势力。1976年，联碳集团与南巴斯蒂亚联邦达成多项协议，合称§R《七河-南巴斯蒂亚互助协约》§!。由联碳集团牵头，联合投资创建§R联合伊索莫丹妮公司§!（UAC）；通过驱逐舰换基地，获取当地治外法权，推动出海和保障远洋贸易；提供更大规模的商品和物资供应和无息贷款。南巴斯蒂亚战后工业项目的重建极大消化了联碳集团彼时过剩的产能，同时借由此次输出极大扩展了联碳集团在南巴斯蒂亚地区的影响力，从工业标准、流行文化影响力到价值观念，§R“七河风尚”§!的理念在多国流行。以经济战略作支撑，军事战略为核心，辅之以意识形态攻势；联碳集团在与西大陆的殖民冲突中转守为攻，在大战后的南方真空地带争夺战略要地、战略资源和海洋通道。但繁荣与高速发展的同时也催生了许多尖锐而普遍的社会矛盾。多元化的社会利益主体涌现并逐渐形成了一系列追求特殊利益的团体。七河联邦存在着多个利益集团，除§R董事会§!外，以§R铁三角§!、§R菁英会§!、§R垦殖系§!、§R同心结§!和§R先锋派§!为最。它们能以各种形式参与决策过程，谈判与妥协令各集团之间总是处于一种微妙的平衡。\n\n1980年代末，随着繁华落幕，经济滞胀，联邦的诸多问题开始暴露。§R一群精致极端利己者把集体主义体制作为自己最后的安全垫§!——军工复合体§R铁三角§!已经可以牢牢控制联邦的§R军事外交§!决策权并绑架了集团；§R菁英会§!的统治精英们在高层“大量繁殖”形成庞大的§R贵族圈子§!；§R地方保卫厅§!体系在§R垦殖系§!的运作下逐渐成为了企业私兵；§R工会§!团体的腐败堕落令§R同心结§!运动蒙尘；§R先锋派§!对学术前沿的垄断性权力形成了§R学阀§!统治。在中央权力纷争的同时，种族主义与民族主义思潮的涌动令各个地方专区开始离心离德。在§R乌骓王国§!的支持下，以七河腹地§R于摩§!半人马为首的§R叛乱§!层出不穷；北方§R叱拔§!自治区的半人马汗王早已年迈，§R难以驭下§!；流亡多年的§R诺加依国§!王室在§R少汗§!专区的威信愈发式微，北望天璧山南麓的§R故国§!，新人早已失去了反攻的热情与故国的认同；§R狄银§!专区辛勤工作的§R墨马§!们满心期待着§R共识§!的§R虚幻承诺§!和遥不可及的福利与股权；§R青骓§!专区政府已然成为§R企业私地§!的专属物业公司；§R摄图§!专区天高地远，§R养寇自重§!，匪患猖獗。\n\n墨精灵所建立的§R国家资本主义§!道路无疑是一种非常实用主义的选择，由一个具备现代组织形式的实体构建的政府，集中全部的社会资源——劳动力资源、自然资源和资本，并以最佳配置的方式，探寻到最高的效率，在短时间之内完成工业化，这一切均出自极端§R理性§!的思考。§R联邦董事会§!作为最高权力机构由墨精灵主导的集团董事长及各部门部长组织构成，这在本质上形成了一种墨精灵种族的§R“贵族共和”§!。工业贵族们的特权不仅来自血统，更来自先进生产力的垄断。但墨精灵所掌握的知识终究是有限的知识，当垄断的超前教育与知识这一统治根基在政治内耗和社会发展下逐渐逸散了优势，当思想的鸿沟被发展的进程填平，当归化入籍的半人马族精英进入管理层、半人马族的工人填满了工厂……又该做出怎样的§R理性§!选择？"

SPC_IS_KEU_national_desc_1:0 "大喜王国坐落在东巴斯蒂亚和虹镜之间的一个大型岛屿上，这个岛被东巴斯蒂亚人称为“汀海岛”，而大喜王国则称其为“济世”。\n\n汀海岛上的居民主要分为左汀原族和桑山族，分别居住在其西北部沿海平原和东南部的山林中。左汀原族是一种小巧可爱的兔人兽人，他们繁衍能力极强，而桑山族则是兔人和漂流至此的翼人们的混血，即翼兔人，在保留了高生育能力的同时还拥有一定程度的飞行能力。这些原住民们在此前的数百年内一直在这座岛上刀耕火种，虽然部族之间大小冲突不断，但总体来说还算安宁祥和。\n\n七十三年前，一位在远乡王国臭名昭著的黑魔法研究者，贺罡被桂山岛的乡民们绑在石头上丢进了大海。然而他却奇迹般地挣脱了拘束，并被洋流冲上了汀海岛。对魔法毫无概念的桑山族人毫无危机感地接纳了这名濒死的术士，于是汀海岛岛民的噩梦便从此开始。\n\n一开始，贺罡自称为一名神灵派来为这个桑山部族带来胜利的神使。靠着一些基础的魔法把戏贺罡很快便博得了他所在部族的酋长的信任，于是酋长便听从他的指导，在他带领下击败了附近的几个部族。然而贺罡所研究的黑魔法正是依靠智慧种的鲜血蕴含的魔力发动的，在战争中他对着酋长亮出了獠牙，将酋长的精神消灭，变成一具由他操纵的死者仆役。随着战争继续，贺罡操纵的死者仆役越来越多，在长达五年的血腥战争中，汀海岛的人口减半，而贺罡也成为汀海岛的实际最高统治者。\n\n在此之后，贺罡利用他的酋长仆役将他自己的身份塑造为了真正的神使。他将汀海岛改名为“济世”，将自己登陆的地点命名为“陆成”，将自己建立的政权称为“大喜王国”，在汀海岛最高的山峰桑山上建立了祭拜他自己的神殿。贺罡用死者仆役维持着高压的统治结构。他将原住民们聚集起来，强迫他们大量进行生育，每年再在他的神殿那里为他献上大量的人祭，用于他自己的魔法研究和享乐。靠着一套融合了远乡道德主义规训与原住民泛灵信仰的宗教，他摇身一变成为了庇护济世人民的“慈悲大王”，开启了大喜王国长达六十八年的黑暗统治。\n\n然而今年贺罡的年龄已经高达一百零三岁，在这六十八年间他没能找到能长生不老的方法，现在他已经身体干瘪，机能衰竭，全靠着魔法吊着一条命。但他的魔力也在衰退，不断有死者仆役脱离他的控制死去，可能不用多久他的魔力连为自己续命都不够了。东巴斯蒂亚诸国和虹镜也逐渐意识到汀海岛的战略重要性，开始着手施加对汀海岛岛民的影响力，安定的表面下暗流涌动，大喜王国崩溃在即。"

SPC_IS_TPG_national_desc_1:0 "十世纪初，突然出现的高魔个体阿方斯发动“大远征”统一了吉拉尼亚地区，他以超凡力量和铁腕手段在这片土地上开启了水晶族裔的时代，但在此后因残暴的统治而引发的不断起义下，阿方斯选择向奥罗日亚联合王国获取帮助，以成为联合王国的一部分为代价，获取了曙光教会和军事力量的介入稳定了政局，并在数百年的运营后，将境内宗教的信仰扭曲向自身。\n\n18世纪初，席卷中巴斯蒂亚的伟大战争中，吉拉尼亚因地理位置而未受到太多影响，由于大公长期以来对农业的高度重视和保护，吉拉尼亚在工业化浪潮中错失了良机，这为其后来的经济衰退和科研落后埋下了伏笔。在之后二十世纪初的世界大战中，吉拉尼亚受奥罗日亚联合王国衰退的大趋势而陷入了经济崩溃。1986年，和沃姆达成合作的吉拉尼亚一同宣布自联合王国独立，并于1992年以侵略为目的组成轴心国发动了东巴大战。1995年，东巴大战以获取西北远乡大量土地的胜利结束。\n\n1998年，吉拉尼亚大公国正处于一个微妙而关键的时刻。人民已从东巴大战的破坏中恢复，但战争的创伤和长期积累的内部矛盾，正威胁着这个古老国度的稳定。"

SPC_IS_ROK_national_desc_1:0 "克拉亚诺大公曾经是提特兰帝国皇室的远亲。在顿伏茨克的野蛮半人马成为帝国的支柱前，克拉亚诺大公为帝国的统一立下了汗马功劳。不过大公居功自傲和拥兵自重的行为使得皇帝最终失去了对大公的信任。在几次连续性的玩忽职守后，被降为了大公。之后在帝国发动的对南巴的再征服运动时，攻占了包括克拉亚诺城在内的等一众城市，并主动向皇帝请求与顿伏茨克大公一起镇守帝国的东部边疆。因为与顿伏茨克大公不对付，导致两国摩擦不断。这也间接使得皇帝越来越疏远克拉亚诺大公。\n\n虽然皇帝逐渐开始疏远大公，但因为帝国初期的衰退，克拉亚诺在大公的带领下征服了科维斯诸邦，将他们变成了自己的附庸国，实力到达了鼎盛时期。再后来帝国开始衰退开始逐渐加快，这种衰退也逐渐影响到了克拉亚诺公国。终于，由那次领地内发生的百年一遇的大起义，成为了压垮克拉亚诺公国的最后一根稻草。大公最终逃离了克拉亚诺，一路跑到了鲁萨尔。而一直与克拉亚诺大公不对付的顿伏茨克大公，却派遣军队南下扑灭了克拉亚诺的叛乱。当克拉亚诺大公满心却欢喜的准备回到克拉亚诺时，却得知顿伏茨克大公宣布兼并克拉亚诺。这则消息一下子就击倒了大公，他明白没有军队又没有政治资本的他此生再难回到克拉亚诺了。在此前为了征服维尔陶地区，与顿伏茨克争夺帝国东部原住民政权以及对科维斯的统治，克拉亚诺曾向鲁萨尔借了大量的贷款。最终为了偿还这笔巨额贷款，大公将头衔卖给了鲁萨尔诸侯们。准许他们日后让他们家族的成员继承克拉亚诺——前提是克拉亚诺还能独立。\n\n而新的统治者——顿伏茨克大公对克拉亚诺地区实行了高压统治，多次镇压和清洗了克拉亚诺地区的民族起义。即使后来拥立了一位原住民为克拉亚诺的傀儡大公，但仇恨的种子已经种下，并且不会回头了。等到第二次南巴大战时，南巴帝国将里夫韦克斯基立为新的大公，并且将维尔陶地区一并划给了克拉亚诺公国，并且在此之前通过偿还前大公的贷款将大公头衔赎买了回来。\n\n时间来到了南巴斯蒂利亚共和革命爆发的时候，南巴斯蒂利亚帝国摄政王北逃到克拉亚诺后组织起了反共和联盟与共和军进行了南巴革命战争。另一方面，魔兽南下的势头已经不可阻挡，其兵锋直指格特拉斯的核心地区。也就在此时，《克拉亚诺协定》签订。末代大公保罗斯基宣布退位并成立共和国。在随后加入了新成立的南巴斯蒂利亚联邦。"
SPC_IS_ROK_national_desc_2:0 "最初的克拉亚诺政局由革命领袖科沃斯基·米利克所率领的全克拉亚诺共和联盟把持。科沃斯基在觉得克拉亚诺政局基本稳定后。宣布进行选举。全克拉亚诺共和联盟分裂为了克拉亚诺社会民主党，克拉亚诺民主党，克拉亚诺保守联盟和克拉亚诺国家党。在革命领袖科沃斯基的威望下，他所在的克拉亚诺民主党赢得了大选。并且在接下来的5次大选中，民主党都取得了决定性的胜利。不过科沃斯基本人却在民主党赢得第5次大选之后选择放弃连任，重新选举。这导致了民主党第一次失去总统之位。此后政局主要由社民党与民主党轮流执政把持。直到新任民主党候选人比纳许·海耶的的上台。事情开始起了变化。\n\n比纳许奉行完全的联邦主义。主张“克拉亚诺将永远是联邦的一份子，过去是，现在是，将来也会是。”在清洗了国内的反联邦主义分子之后，将民主党改组成了一个“全克拉亚诺右翼的保守联盟。”在比纳许的号召之下，民主党，保守联盟和国家党最终合并到了一起。这对于社民党来说毫无疑问是灾难性的，而当时的社民党党魁布莱克·维利曼面对当时的情况与比纳许的威胁最终选择了妥协。在与比纳许和会谈中同意社民党将和民主党成为执政同盟，并且同意民主党将长期执政，社民党将长期在野。至此比纳许彻底撕破了议会共和的脸皮，为总统共和制提供了基础。在比纳许完全巩固自己的权力后，南巴联邦发现他频繁与提特兰方面暗中串联。并且拒不承认之前与其所签订的《商业共同合作条约》和《克拉亚诺共和协定书》。这让南巴联邦，尤其是共和国际领导国南巴共和国开始考虑让比纳许下台是否具有可行性。\n\n就在这时，一个人找到了他们，也就是莫泽·赫卢东。他以继续支持联邦主义；承认之前所签订的各类条约为基础，成功获得了南巴联邦和南巴共和国的支持。1972年莫泽·赫卢东回到克拉亚诺纠集起民主党残余的左派势力和其他不满比纳许愈发独裁的势力，说服了社民党使其替换了投降主义的党魁布莱克·维利曼并得到了其支持。1973年比纳许宣布他将修改宪法，将克拉亚诺共和国改为总统共和制。与此同时莫泽宣布成立克拉亚诺新民主党，极大的打击了民主党的势力，使得双方席位实现了反转。比纳许气急败坏的准备派遣军队对新民主党和社民党进行镇压与迫害，然而南巴共和国的特使和军队在关键时刻赶到，成功组织起了一场临时选举。在各方势力的运作下，新民主党毫无疑问的取得了这次紧急选举的胜利。比纳许被指控反人类罪，叛国罪，反共和罪而被逮捕。民主党也宣布将比纳许开除党籍。于是克拉亚诺进入了莫泽时代。\n\n在莫泽与新民主党的领导下克拉亚诺走过了二十五年平静的日子，虽然有人指责莫泽的任期已经超过了宪法所规定的3次。不过议会和其他在野党都接受了这一事实：毕竟现在不是莫泽需要总统的位置，而是克拉亚诺的总统必须是莫泽。但那个当年的英雄领袖早已老去，国内外暗流汹涌。克拉亚诺会走向何方？是在民主的道路上稳定航行？或是在人民的带领走上共产主义的新道路？也许是保守派的回归？还是军队与保皇派夺得大权？也有可能是某些极端分子的胜利......\n\n需要做的事：在莫泽总统去世后保证政局稳定，或者让其一乱到底。\n让§2克§!§g拉亚§!§R诺§!再次伟大！曾经的雄鹰必将再次展翅。\n修复克拉亚诺的联邦地位，或者建立一个由克拉亚诺领导的联邦：让这个古老的国家敢于再次逐梦。"

SPC_IS_TCW_national_desc_1:0 "托莱多是§Y为数不多保留历史传统§!的国家，当其他国家为了所谓的“自由，人权”争斗时，托莱多的人民对此嗤之以鼻。在人民心中，他们渴望一个伟大的领袖带领他们实现伟业，正是出于对强者的敬仰，这个国家诞生了伟大的人民与领袖，尽管多次成为附庸，但托莱多一直都是局势动荡的绝对参与者。这个国家在对外交流中形成了自己的§C价值观§!：§R乐于与人类合作，但却十分反感魔兽。§!\n\n当提特兰的铁蹄征服南巴地区的时候，托莱多是东部少数躲过了他们践踏的几个§C原住民国家§!。帝国的铁蹄在征服其他国家的时候，也让幸存的国家学会了更多的东西，特别是§R君主制§!。然而之后§R克拉亚诺大公国§!对维尔陶的征服，让托莱多臣服于克拉亚诺。但是相比于顿伏茨克，归顺于克拉亚诺并不是一件坏事。克拉亚诺衰落后，托莱多就开始尝试扩张领土。在征服了阿内托、杜罗后，南巴帝国的崛起把他们变成了南巴帝国的附庸。这种状况一直持续到了§C南巴共和革命§!之前，短暂的独立使托莱多公国又重新开始了征服，迫于各国激进的共和主义，托莱多的§C国王§!最终§R被迫退位§!，在人民的啜泣声中开启流亡生涯。《圣树节协定》之后，§Y托莱多联合其他共和国组建了一个联邦§!，以作为南巴联邦的一个加盟国来对抗北方魔兽威胁。伟大战争之后，托莱多联邦保留了下来，并且为卢瓦尔共和国（也就是之后的南巴共和国）的重建出一份力。§O民族问题§!一直困扰托莱多，特别是在§C世界大战§!和§R西莉迪亚公社起义§!后，由于经济问题，以及来自§R西莉迪亚的难民§!，导致出现了各方推脱的情况，以至于加剧了民族分裂感，还让托莱多的政治局势进一步复杂化。南巴共和国政治多元化后，托莱多联邦也开始了政治多元化，逐渐步入千禧年。\n\n托莱多的政治土壤简直就是南巴斯蒂亚的特殊存在，相比其他国家的相对开放，托莱多的人民更倾向于打造§Y保守的、渐进的社会。§!\n\n托莱多文明最早起源于东南部的奈西达河流域，§G科维斯人§!建立了庞大的部落，以及军事上的强权，但这些都离不开残酷的选拔制度形成的§t尚武精神§!。从发明冶铁技术运用铁器开始，部落的进步齿轮开始加快转动，铁制装备的普遍化让部落野心开始显露，野蛮的扩张促成了托莱多地区第一个王权的建立。随后统治者开始荒淫无道，贸易的红利逐渐倒向奢侈品市场，进步的步伐变得缓慢。终于，一场空前的地震及其衍生灾害引发了§t政权危机§!，王权在经济基础受到毁灭性打击后崩溃，最后的一批科维斯人迎来了命运的十字路口，当时的他们有两种选择，向南航行探索新的土地，或者北上走上新的征服道路。投票的最后关头，只剩下自称擅长预言魔法的§1大祭司克尔洛维§!未作出选择，最后他选择了南下。然而有一批人自愿留在旧科维斯王国的废土上，等待有一天§B重建故土，寻回南下的族人§!。他们带着悲痛与不舍建立了一只南下的舰队，送别了选择南下的大多数人。\n\n本以为留在故土的人会慢慢走向断代灭亡，但在与其他南巴斯蒂亚文明的§B民族交融§!中，他们完成了重建故土的诺言，但代价是纯种的科维斯人已经成为了§O社会少数者§!，尽管统治者与这批“原住民”一样有着保守的政治主张，但科维斯人根本§O无法在政坛站稳脚跟§!。而南下的族人没有任何消息，或许已经在某个遥远的世界§G走向繁荣§!，又或许早已带着雄心§t湮灭于深海之中§!......"

SPC_IS_ARO_national_desc_1:0 "奥罗日亚在她的帝国时代曾经十分强大繁荣。在那个时代，奥罗日亚帝国的心脏，宏伟而美丽的格罗尼亚城如同一道烈日一般辐射着半个东巴斯蒂亚大陆，帝国的疆域南至匹斯卡提奥港，北至阿瑞萨山脉，西至安里利亚山脉，东至吉拉尼亚边境伯爵领。\n\n然而久盛必衰，强盛一时的奥罗日亚帝国虽然没有被世界大战的战火殃及本土，但却因这场战争带来的市场破碎陷入了灾难性的经济崩溃。紧随着经济崩溃，整个帝国如同溃堤一般分崩离析：沃姆王国、吉拉尼亚公国宣布脱离帝国独立，而西莉迪亚王国与皮奥瑞亚王国则爆发了轰轰烈烈的共和主义革命，革命者建立了西莉迪亚共和国与皮奥瑞亚共和国，并立刻与奥罗日亚展开了漫长而紧张的军事对峙。除了这些脱离的大国以外，由逃难至此的矮人为主体民族的安里利亚公国、拥有长期自治传统的雷斯诺顿王国、以及在马德南平原上信仰“拜光会”的狂信徒们也趁乱建立起了军事割据势力，虎踞一方，奥罗日亚帝国的国体也彻底无以为继，奥罗日亚帝国的最后一任皇帝“昏逸王”菲尼克斯·格罗尼亚也一眨眼间失去了帝位，头衔仅剩下“初阳王”希雅薇瑟一世留下来的格罗尼亚国王头衔。\n\n菲尼克斯在1986年死于一场精心谋划的刺杀，膝下无一子女，因此格罗尼亚国王的头衔便被继承给了他的二弟，刺杀的策划者，奥斯灵顿·格罗尼亚亲王。在奥斯灵顿继位后，他通过温和的权力让渡和改革与他真诚而精彩的演说能力巩固了贵族和市民阶层的支持，重新建立起了一支足以战胜割据势力的国民军队。然而性格温和的奥斯灵顿并没有选择大动刀兵，而是依然选择坐下来与他们慢慢谈判，以避免出现不必要的伤亡。在经过长达五年的漫长拉锯后，谈判终于得出了令人满意的结果：雷斯诺顿王国与格罗尼亚王国重组成奥罗日亚联合王国，安里利亚公国同意成为联合王国治下的一个公爵领、接受联合王国的保护。虽然在主战派的影响下奥罗日亚错误地加入了东巴斯蒂亚大战，但奥斯灵顿依然维持了国家的稳定。现在联合王国似乎只剩拜光会的问题需要解决，一切稳中向好，奥斯灵顿也获得了“贤安王”的称号。\n\n然而由于奥斯灵顿长期忙于政务，他并没有足够的时间去教导他的女儿——联合王国未来的继承人，希雅薇瑟。于是希雅薇瑟的童年便是在阿斯顿亲王的耳濡目染下度过的。阿斯顿亲王是菲尼克斯的三弟，与他的两名兄长都不同，是一名野心勃勃的阴谋家。他无法接受奥斯灵顿的温和政策，更无法接受奥斯灵顿在面对皮奥瑞亚等国时的软弱。更重要的是，他嗅到了联合王国内部无处不在的民族主义气息。在贤安王的统治下，奥罗日亚在过去的十年内一直维持着相对成功的扩张，因此民族主义者们也勉强得到了满足。然而一旦贤安王在某一天在扩张中受挫，或是停止了扩张专注于国内的发展，民族主义者的不满将迅速星火燎原。而那就是他的机会了。"

SPC_IS_ALR_national_desc_1:0 "世界上所有的矮人的先祖都来自已经毁灭了的矮人王国，安里利亚的也不例外。数百年前，矮人王国被入侵的魔兽毁灭，矮人分成多支部队四散奔逃，而安里利亚就是其中较为成功的一支。逃难到此地的矮人和这里的奥罗日亚人展开了广泛的合作，最终成功融入了当地的生产生活中，成为了安里利亚公国不可分割的一份子。在接下来的几百年内，矮人依靠更加强大的免疫力在几次瘟疫中保留了更多的人口，安里利亚公国的主体民族也从奥罗日亚人逐渐转变为矮人。\n\n1986年奥罗日亚帝国解体，受南巴斯蒂亚共和主义熏陶已久的安里利亚矮人们也认为时机成熟，趁机宣布从奥罗日亚帝国脱离，驱逐了当时的安里利亚公爵，建立了以数十个矮人城镇的民选镇长为议员的民主共和国。然而好景不长，奥罗日亚很快就在一名励精图治的新君主“贤安王”奥斯灵顿·格罗尼亚的领导下重振气势，建立了有力的国民军队，吞并了雷斯诺顿，如同一只怪兽一般重新俯视着安里利亚。所幸这位贤安王的外交政策十分温和，他同意在谈判桌上而不是战场上解决安里利亚的问题。\n\n最终，奥罗日亚联合王国和安里利亚签订了合约：安里利亚的矿物要低价并且优先供给给奥罗日亚，而奥罗日亚则允许安里利亚自治，但必须要以公爵领的身份加入奥罗日亚联合王国，并接受联合王国的军事保护。安里利亚人们找到了矮人诸侯石灰岩·莫瑞亚的后代板岩·莫瑞亚，推举他为新的安里利亚公爵，随后安里利亚公爵领便臣服于奥罗日亚联合王国——而非格罗尼亚王国或雷斯诺顿王国。\n\n然而安里利亚的共和派势力依然十分强大，一旦奥罗日亚联合王国再次陷入危机，安里利亚依然有机会重铸共和荣光。"

SPC_IS_UPV_national_desc_1:0 "严格意义上来讲，上维尔陶联合公国是个纯粹的现代国家。其成立于1742年的《圣树节协定》之后，因为该协定规定的独立票权促进了上维尔陶联合公国从新成立的克拉亚诺共和国中独立出来成为了前南巴帝国皇室的收留地。\n\n而上维尔陶联合公国的前身，维尔陶公国则成立于提特兰帝国东征时期，是当时新兴的原住民政权之一。在克拉亚诺大公发动第二次东征后被克拉亚诺大公国征服，成为了大公国的一部分。随着克拉亚诺大公无力支撑大公国的经济债务以及原住民的叛乱使得克拉亚诺大公国崩溃，维尔陶公国在时任大公维多利斯一世的带领下宣布独立。随后以自治公国的身份加入了当时颇为强盛的顿伏茨克大公国。直到南巴联盟入主克拉亚诺城，维尔陶公国以独立的身份加入了新成立的神圣巴斯蒂亚帝国。但新帝国为了安抚复国的克拉亚诺将维尔陶公国赠予了克拉亚诺大公国，至此，维尔陶公国在历史上消失了。\n\n上维尔陶联合公国独立后号称继承维尔陶公国的宣称，土地和历史。同时因为前南巴帝国皇室的到来，获得了对卢瓦尔公国的宣称。单从实际上讲，上维尔陶联合公国和维尔陶公国的“前世今生”并不像其他国家那样紧密。尤其是随着1841年拥有维尔陶血脉的波利留夫三世在政治斗争中输给前南巴斯蒂亚帝国皇室远亲威利四世，至此维尔陶本土派已经彻底失败。且威利四世因害怕本土派卷土从来而宣布将波利留夫一脉全部处死。从事实上来讲，上维尔陶除了名字以外，已经和维尔陶公国没有任何关系了。\n\n1925年的到来，使得上维尔陶的混乱加剧。新任大公比德尔一世被刺杀，正值伟大战争结束后的上维尔陶在混乱之下由比德尔二世接任。为了巩固统治，比德尔二世在各方势力的压力下被迫通过了《边境开放法案》《议会扩大法案》以及最为重要的《贵族募兵法案》。使得上维尔陶的议会和旧贵族的权利凌驾于王权之上。虽然在局势稳定后，比德尔二世试图推行专政化改革以削弱贵族与议会的权利，但均以失败告终。疲惫不堪而又忧心忡忡的比德尔二世最终在1988年与世长辞，将王位传给了自己唯一在世的小女儿，伊丽莎白·苏平姆。\n\n时间来到了1998年，十年的摸爬滚打已经让伊丽莎白·苏平姆失去了稚嫩和善良，现在她要以铁腕来改变这个国家的现状，这究竟能否成功，还需要交给时间决定。"

SPC_IS_TPG_national_desc_1:0 "吉拉尼亚大公国作为东巴斯蒂亚最古老的政权之一，其前身可以追溯到9世纪初的地方封建主，他们以吉拉尼亚为姓氏，统治着周围几个城邦。但这个羸弱的家族却在10世纪初迎来了转机，强大的魔法使阿方斯三世·吉拉尼亚的横空出世改变了这个地区一切。他带领着领地内的亲兵向周边的国家发起侵略，后世称这段四处征战，国土快速增长的时期为“大征服”。\n\n大征服期间，一个自称为“水晶族裔”的新种族悄然出现在了东巴斯蒂亚大陆上。他们长相与人类无异，不过绝大多数的水晶族裔都拥有者血红的眼睛和金色的毛发，而且拥有较高的魔法天赋和渊博的学识以及极长的寿命和强大的生命力。他们将阿方斯三世成为种族的创造者，水晶族人的“真祖”。 \n\n来到12世纪，此时已经来到了大征服的末期，过度膨胀的王国疆域并没有与之相匹配的政府架构，而长达两百年不断的战争也使得土地荒废，人民流离失所。饥荒和瘟疫，起义军与土匪啃食着这个国家本就没有的统治根基。而就在这个政权摇摇欲坠之时，由南巴流亡者所建立的奥罗日亚联合王国向吉拉尼亚王国投来了橄榄枝。\n\n正在高速发展的王国急需扩大自己的疆域来满足自己发展的需求，于是阿方斯三世与奥罗日亚国王的商谈最终以吉拉尼亚王国：“成为王国麾下的自治公国，并且在贸易上接受调配，组成以奥罗日亚为主的联合军队”。并册封阿方斯作为边境伯爵。\n\n阿方斯三世按照这奥罗日亚官员给出的方案，先听取叛军的诉求，并在不损害国家核心利益的前提下做出让步，再以强烈且快速的方式镇压了仍在造反的部分叛军。同时施行仁政，在奥罗日亚的庇佑下最大程度的调养生息，抹平战争所对这片土地造成的伤害。\n\n而在大公自己规划的新制度下，水晶族裔享受着极大的福利，他们免于劳作，而且享受免费且优质的高等教育，还能优先进入政府，享受更多俸禄等特权。而整个体制最核心的机制是“战时皆兵，平时皆民”，由于大公国除了北部的少量山脉和森林，其他地区都是宽广且难以防守的平原，所以在政策中规定了有许数个“亲王堡”林立在边境和腹地内驻防，而所在地的普通水晶族裔须居住在亲王堡周围的军事设施内。得益于这些政策，大公手中时刻紧握着一支随时都能动员的亲兵，使得国家空前稳定，也是大公国后世能在乱世中存续下来的缘由之一。在大公的治理之下，人类在公国内的定位是生产者，绝大部分的人类都只能接受基础的教育，终其一生进行包括农业，畜牧业和工业的生产，或者选择经商。 "
SPC_IS_TPG_national_desc_2:0 "来到十七世纪，阿方斯大公依然看不出衰老的迹象，一切都在向着好发展，位于东南角的公国不仅远离魔兽，身后还有着地方霸主支撑发展。国家也在着影响之下孕育出了自己的民族与文化。大公的统治已经维持了七个世纪，人类的态度从一开始的反对，再到接受，然后是习以为常，再到现在的自豪与崇拜。大公国的人民常被用热情好客来形容，低廉的肉蛋奶价格使得家家户户都能在一个阳光明媚的午后，与街坊们在公园里的草坪上来一场惬意的烧烤，享受着肉的香嫩和分享的快乐……但在这种乐观开放的民族文化之下，流淌着数百年前大扩张时期矫勇善战的先烈们的战士之血。\n\n美梦被十九世纪的世界大战所打破，战争的实力对联合王国的重击加倍的反应到了大公国身上，本就经济结构单一的大公国在战后迎来了严重的经济危机，消费品和机械的短缺导致国家经济快速下行。\n\n阿方斯大公在认识到了联合王国的虚弱后，跟着沃姆王国一同脱离。刚刚独立的两国为了能在接下来的狂风暴雨中站稳脚跟，不约而同地选择了结盟，大公国在最紧急的时刻向沃姆提供了急需的粮食，使其有能力快速横扫国境内的其他王国。而沃姆采用以物易物的方式提供工业资源和消费品，挽救了大公国危在旦夕的经济。在随后的东巴大战中，沃姆与大公国组成了轴心国，并且邀请了奥罗日亚联合王国一同加入对远乡和皮奥瑞亚的战争。\n\n事实证明了大公的选择是正确的，轴心国赢下了东巴大战，大公国攫取了远乡的大量土地，但战争对刚刚回复的大公国仍造成了磨灭不了的伤口。但就在国家处在分岔路口时，阿方斯大公的身体却突发异变，几近死亡。公国之前一切被遮掩的问题都被揭露出来，大公国科研和军事实力均落后于周围的国家，还有国内落后的体制，低下的行政效率和频发的腐败问题动摇这国家的根基，更糟糕的是，向周围望去，除了我们北方的朋友之外，全都是对我们虎视眈眈的仇敌，而大公则要带着自己越来越糟糕的身体情况解决这一切问题，他早已预见到现有的世界格局难以保持长久的和平，大公国必须赶在下一次大战前做好准备迎接。\n\n时间来到1998年，发展的计划由于大公本人糟糕的身体情况接连受阻，而崇拜大公的诡异宗教也逐渐在国家内蔓延，人民对强大的阿方斯大公的普遍崇拜已然是信仰迸发的土壤。而随着大公越来越少面对公众，国内的极端宗教主义者趁机编撰了各种神话来美化大公。他们称大公为“全吉拉尼亚的真祖“，认为大公是世界赐予，来庇佑吉拉尼亚的神明，而大公即将被召回，须要所有吉拉尼亚人一同信仰大公，呼唤大公才能彻底将大公留在吉拉尼亚。与此同时大公国的发展陷入了巨大的瓶颈，我们引以为傲的驻防体系也因为内部的腐败和越来越高的花费而濒临崩溃。而总有一天，这些失败者们会卷土重来，带着过去的仇恨，用敌人的鲜血洗刷这片大陆。而到时候吉拉尼亚大公国绝不会是待宰的羔羊！大扩张英雄的子嗣们会跟随着真祖的领导继续前进，直到永远！ "

SPC_IS_RSU_national_desc_1:0 "鲁萨尔，商业之国，南巴的工业明珠。空想社会主义的初试地。\n\n这些都是它。\n\n作为提特兰帝国东征时重要的补给据点，经过多年的发展和融合后，当地的贵族诸侯们联合建立了第一个以鲁萨尔为名的国度：鲁萨尔邦联。\n\n顾名思义，此时的鲁萨尔是一个由各城邦组成的松散邦联国家。由于得天独厚的地理位置跟长年以来的商路经营与社会氛围制度宽松等原因，鲁萨尔逐渐成为南巴的经济中心。\n\n而第一次南巴战争后，鲁萨尔宣布脱离了提特兰帝国的体系直到伟大战争的后期爆发了共和革命。\n\n鲁萨尔的共和制度仍然结构松散，尽管拥有一个中央政府，但地方城邦的权力依旧巨大。因此鲁萨尔在地方上实行城邦自治制度，并定期召开全国性质的联盟大会，用于全国选举及制定地方政策与是否接受地方提出的建议。但值得一说的是，地方政府有权利拒绝中央政府的政策，这是一把值得玩味的双刃剑。\n\n1834年到1838年间，因连续四年的极端天气造成的大规模粮食歉收彻底击垮了生活本就贫苦的工人跟农民。当劳动人民用仇视的目光盯上依旧歌舞升平的统治阶级后，一场自下而上的血火教训就必不可少了。\n\n一场名为农民战争的起义在鲁萨尔大地上已然爆发，在这场被后世学者们称为鲁萨尔农民战争的起义中，一群为了建立地上天国这个理想而奋斗的农民深深震撼了凯瑟琳·芙蕾施曼。她因此挥笔写下著作——《鲁萨尔农民战争》，也正式宣告了空想社会主义的诞生。\n\n此次与政府的对抗大大打击了执政党的威信，由威廉·达尔曼领导的起义军五年来尽管没有取得更进一步的成果，但也足以使那一届的自由党政府颜面扫地，不得不引咎下台。而由更激进的进步党来领导鲁萨尔进行改革，但出于对中央政府本能的不信任，各地方政府对改革内容的阳奉阴违和鲁萨尔本身经济危机尚未消除，此次改革以近乎惨烈的结局收场，最后不得不由保守党出台收拾台面。\n\n我们不能否认的是，保守党政府进行了相当大程度的改革，甚至大到仅限于法律文书也会不得不承认贫民也有权利享受国家的福利和基本的公民权…难道不是吗？"
SPC_IS_RSU_national_desc_2:0 "1878年，忍无可忍的工人们再次起义以抗议毫无福利可言的联盟政府。进步党于第二次击败现任政府（自由党），荣登各城邦之首，并被工人们寄予厚望。\n\n但时任进步党党魁的阿莱克·威利斯是著名的进步党右翼人士，此届进步党政府所做出的改革微乎其微，且对工人们的现有境遇几乎没有任何改善。愤怒的工人们认为自己遭受了极大的欺骗甚至不可原谅的背叛，一部分工人自此完全丧失了对进步党的信心，转而寻求其他的道路以求自谋，并于此后百年间逐渐诞生了属于自己的组织——鲁萨尔工人工会联合阵线。\n\n1969年，随着世界大战的爆发，依赖于对外投资的鲁萨尔经济逐渐几近崩塌。对外投资的石沉大海，经济的持续崩坏使得自由党的统治愈发力不从心，最终被保守党予以强行接任。\n\n保守党接任后宣布国家处于紧急状态开始延长任期直到1973年世界大战以南巴联邦的失败结束。战后在南巴共和国的干涉下保守党政府被迫于1974年重新举行大选，自由党再次上台组阁。与此同时，鲁萨尔工人工会联合阵线对政府彻底失望，他们认为现有的任何改良措施对于鲁萨尔的政府和体制都是不合时宜的，唯有重新划分整个国家的布局才能真正拯救这个联盟。所以他们宣布鲁萨尔工人工会联合阵线正式改组为鲁萨尔工人革命联合阵线，誓要通过暴力革命为工人们争取权益，与拯救鲁萨尔。\n\n最终在战后南巴共和国的经济援助下鲁萨尔逐渐恢复了经济，对外投资也重新开始。一切似乎都在走向好的方向，但尚未完全恢复的经济，国内贫民惨淡的生活水平，以及暗流涌动的政治舞台都在昭示着这个国家远没有看上去那么平稳，安宁。\n\n她正坐在一个即将引爆的炸药桶上，而她绝大多数的子民对此浑然不知，仍然在名为生活的泥潭里奋力挣扎。而窥见一斑的极少数人也只能忧愁的看向自己的祖国逐渐划向未知的晦暗深渊，不知未来如何。\n\n时间来到1998年，鲁萨尔的未来究竟会走向何处？还尚未可知..."

SPC_IS_LNR_national_desc_1:0 "南巴斯蒂亚乃是共和主义思潮的起源地。耀眼的共和主义之火曾自南巴斯蒂亚向全世界蔓延，但在特尼安半岛，这共和主义的火焰似乎有些黯淡。南巴共和革命爆发后，与南巴斯蒂亚颇有历史联系的特尼安半岛也爆发了共和革命，今日的勒泰特尼安共和国便诞生于这场革命之中。\n\n然而，丹特地区崎岖的地形使得于北方起义的共和革命者难以一鼓作气南下统一特尼安南部。当攻势放缓，共和革命者的内部问题也逐渐放大：首先，贵族被驱除后，农村土地并没有回到广大人民手中，而是被当地宗族把控，事实上，有大量的宗族子弟加入了革命队伍，他们反抗王国，赶走贵族的原因与其说是为了共和信仰，倒不如说是为了不给贵族和国王交税然后夺取他们的土地，自己家的佃农还是要给自己交租。也就是说，农民的处境并没有改变，农村依然处于地主阶级的掌控中。\n\n其次，显而易见的是，南巴斯蒂亚共和革命者援助了特尼安共和革命，这让勒泰特尼安获得了宝贵的援助，也给了南巴斯蒂亚和鲁萨尔干涉勒泰特尼安内政的理由和能力，当南巴斯蒂亚共和国向北方诸侯国进军时，他们甚至要求勒泰特尼安人抽调一部分兵力向北方进军。这也进一步损害了革命者内部的团结，更给今日勒泰特尼安经济被鲁萨尔和南巴斯蒂亚共和国掌控埋下了伏笔。\n\n最后，由于北方地形崎岖，长期以来都不是特尼安主要的产粮地区，被战争破坏后，北方很快就陷入了饥荒。\n\n最终，在种种因素的作用下，半岛南北签订了和平条约，勒泰特尼安共和国的首都设立于前线丹特，似乎仍在渴望着民族的统一。但随着时间的推移，特尼安民族的统一越来越复杂。首先是奥科特尼安王国得到了新兴强国七河联邦的投资，最后甚至将一部分土地交与七河的墨精灵。这让他们获得了强大的海军与墨精灵的支持。而勒泰特尼安共和国自诞生起就处于鲁萨尔和南巴斯蒂亚共和国的掌控之中，再加上自身的相对落后，经济很快就被各路南巴外企把持，最鲜明的表象是勒泰特尼安的丰富矿产大都交由外国公司开采，而这些外国公司几乎可以无视法律将当地人当畜牲使用。也就是说，每当南北试图统一时，都得征求两个巨人的“意见”……总之，半岛统一事宜似乎已经遥遥无期。尽管奥科特尼安王国加入南巴斯蒂亚联邦后，特尼安统一运动曾风靡一时，两国政府甚至开始了和平统一的谈判，但谈判的结果还是以和谈失败告终。原因众说纷纭：有的人归咎于境外势力从中作梗，有的人认为两国体制与意识形态的不同以及王国相对动荡的政治环境无力让和平统一实现：王国无法接受宗族势力，宗族和商人无法接受贵族与没有国王的君主专制，有的人甚至指责勒泰特尼安的毒贩做得太过火，损害了南北关系。\n\n现在，勒泰特尼安共和国已经成为了南巴斯蒂亚联邦中最落后的国家之一。排外的宗族地主把控着农村与地方议会，由他们庇护的黑帮肆无忌惮的欺凌着弱小。亲外的商人和外企以及一些大地主经营着城市乃至控制着议会。城乡差距也愈发扩大。而农民或在深山中劳作，或逃往没有地主宗族的城市贫民窟。而工人则在地狱般的工作环境中日复一日的劳作，无数矿产与珠宝自地层被挖掘出来，穷人却无法从中受益。企业无法将工业扩张至宗族势力把控着的农村（你不会想和地主进行与租用土地相关的谈判的，相信我）勒泰特尼安的工业化和现代化也就无从谈起，昔日享誉南巴的特尼安战法师也逐渐被时代的浪潮所淘汰。幸运或不幸的是，宗族地主们出于重视教育的文化以及与其他宗族竞争的因素往往希望自己的儿子能够走进城市的学校接受高等教育，这也使得勒泰特尼安的学术氛围不至于落后于时代的脚步。但讽刺的是，当这些受过高等教育的宗族子弟试图找到一份符合自己学历的工作时，他们往往发现落后的共和国提供不了这么多岗位，只能远赴他国。如果经商或是从政的话，他们就会明白宗族势力到底哪里恶心了。于是，一种奇怪的现象出现了：越来越多的宗族子弟开始支持土地改革，哪怕这会惹恼他们的父辈。甚至有人加入了立志土地改革的进步联盟，这不仅是为了国家繁荣的理想，更是为了确保自己的家族能够较为安稳的走过土地改革这一必经之路：由自己主导的土地改革总比农工革命党主导的土地改革温和吧？\n\n勒泰特尼安这艘小船正在时代的巨浪中起伏，无需猜想巨浪会将这艘小船送往何方，对她的舵手们来说，这艘船能够不在巨浪中沉没就已经是万幸了。\n\n要做的事情：\n土地改革势在必行，当然，你也可以试试违抗时代的浪潮会怎么样。\n革命派、进步派、保守派正争夺着这个国家，注定只有一方能够幸存。\n警惕南方的威胁……"

SPC_IS_KOA_national_desc_1:0 "自总督区的统治结束后，特尼安的王族实现了地区的统一。在摆平了国内各个势力后，雄心壮志的特尼安王族决定大展宏图对南巴的其他地区虎视眈眈时，共和革命战争开始了。在北边的土地主的倒戈下，勒泰特尼安地区很快被共和主义分子控制，多亏了半岛崎岖的地形，共和军难以顺势南下，特尼安王族便在南方的土地上建立起了王国的保留区——奥科特尼安。\n\n在吸取了被北方地方宗族背叛的教训后，奥科特尼安的贵族加强了对地方士绅的打压，并将大量农民通过巧取豪夺的方式变为农奴。在经历了血腥四月后，北方贵族控制了原来农村士绅的土地，而南方贵族尽管对此不齿，但也没有做什么表示。当大量自留地带来的收入被这些贵族侵吞时，国王威廉四世颁布了《土地征收法》限制住了北方贵族势力的扩张，看起来这个国家正在变好…\n\n当勒泰特尼安地区被南巴共和国当成对抗王国的前哨站时，北方贵族自发地组建了民兵团，他们在边境摩拳擦掌，尽管有部分冲突，但在南巴和鲁萨尔的威胁下，这些冲突也仅仅是对偏远村民的迫害。而在王国内忧外患的情况下，威廉四世决定扩大南方贵族的权力以对抗逐渐掌握陆军事务的北方贵族。他将南方贵族集中在海港城市中，很快在商人、贵族的投资下，特尼安造船厂和特尼安船务管理局成立了。随后通过蓬勃发展的运输业和造船业，王国的经济从传统的农业经济中诞生出了城市商品经济，斯塔比翁也成为了内海经济圈重要节点之一。\n\n随着和南巴共和国的进一步合作，原本关系不佳的两国也开始走向关系正常化，而与勒泰特尼安的合作也提上了日程。在两国民族主义者、民间组织的游说下，《特尼安经济一体化协议》将两国自共和革命造成的分裂之后首次联系在一起。双方开始加强彼此的政治、经济、文化上的联系，而新国王卡尔诺三世登基后，逐步改善了对北方和共和主义的态度。就在一切欣欣向荣时，王国为了经济的进一步发展，向七河做了一系列让步。显然这对于南巴共和国是不能接受的，原本是南巴大陆内部的关系演变成了七河与南巴这两大强权之间的博弈。尽管卡尔诺三世希望通过民主化和平统一，但很明显这将化作泡沫...终止半岛关系统一化的直接原因是北方的毒品走私问题，对此王国宣布停止对北边的陆上商业运输，全面使用海运。\n\n在七河投资后，奥科特尼安使用多方技术打造出内海最强海军，这也让王国的造船业名声进一步上升。而对伊索丹莫妮群岛的殖民也进一步加强，大量的经济作物被运回国内加工或者直接卖给七河。海港城市在多年以来的贸易下，成为了半岛的经济中心，随之而来的就是进步思想的传播，尽管作为发达地带，但是对平民的限制依然很多。像是平民不可以上大学、不可以申办公司...不过这已经远远超过农民、农奴的生活水平了。大量的农村人口被贵族当成牲畜一样驱使，人权在这里只属于贵族老爷们，打骂是日常，就算是杀了也只要赔偿领主钱财就行（糟糕的领地法）。\n\n大战后，被摧毁的海军和工业的消亡创造出了一批批寻求变革的新兴贵族和改革派。他们通过海军部门和旧贵族的大本营陆军部斗争，终于争取到了王国的民主化...也就是一部封建色彩浓厚的宪法和形同摆设所谓的“民主”内阁，这也创造出王国五年死了六任国王的荒谬之事。\n\n现在王国面临的是王位无人继承的窘态。随着景气低迷，王国需要一位能团结多方势力或者有强硬手段的人领导她，在时代中浮沉...\n\n要做的事：\n选取所有人满意的国王。\n在必要的时候引入陆军或者海军帮助你。\n统一北方，勿要耽搁！"

SPC_IS_AST_national_desc_1:0 "奥施特莱尼亚王国的前身在古早的巴斯蒂亚历史中只是一个不起眼的小角色，如今如日中天的雷斯科里恩家族在原来只是鲁萨尔境内的一个小封建主。不过随着雷斯科里恩家族的先祖在642年跟随鲁萨尔的诸侯，向当时正处于内乱的顿伏茨克大公国发动的讨伐战中立下赫赫战功，被受封于布雷劳附近。雷斯科里恩家族迎来了属于他们的历史高光。\n\n在这之后的200年中，雷斯科里恩家族多次兼并周边的小诸侯并向北部人烟稀少的地区扩张，终于在800年前后将领土扩张到达豪约什堡附近。因为家族领地的地理位置处于鲁萨尔的东部，因此雷斯科里恩家族将自己的领地命名为东方国度。出于对顿伏茨克大公国的忌惮以及政治需要，鲁萨尔的诸侯们默许了雷斯科里恩家族的行为并公开承认了奥施特莱尼亚侯国的地位。在834年的克拉亚诺政变中，由鲁萨尔支持的奥施特莱尼亚侯国向顿伏茨克大公国发动突然袭击，成功从顿伏茨克取得了维恩及其周边领土。\n\n在853年，由鲁萨尔商人支持的探险家团队开始向奥施特莱尼亚地区进行探险运动，这为奥施特莱尼亚带来了不少外来人口的同时，促进了奥施特莱尼亚的贸易发展。在872年，随着鲁萨尔支持的探险队在中巴发现了金矿，在“巨大黄金矿脉”的诱惑与刺激下，奥施特莱尼亚开始向波伊斯科地区扩张。击败波伊斯科原住民之后，奥斯特莱尼亚再次向北开疆拓土，意图染指金矿。不过最终因为各种原因不得不宣布放弃北进政策。在之后的943年的南巴战争中奥施特莱尼亚偷袭了正处于兵力空虚，国内不稳中的顿伏茨克大公国，从而奠定了今日的东部边界，自称奥施特莱尼亚伯国。而在1167年，鲁萨尔的探险队再次于中巴发现了黄金城，奥施特莱尼亚随即再次启动北进政策，将金矿纳入其中。此举引发了鲁萨尔诸侯邦联的极大不满，为了保护联合贸易开发公司在中巴的利益。鲁萨尔在1182年叫停了奥施特莱尼亚的北进政策。\n\n随着中巴源源不断输入的资源极大的改善了为奥施特莱尼亚的经济状况，在1251年奥施特莱尼亚公然违背鲁萨尔，第三次启动北进政策。听闻此举的鲁萨尔诸侯匆忙宣布向奥施特莱尼亚发动战争，却被早有准备的奥施特莱尼亚击溃。在北方庞大的军事威胁下，鲁萨尔诸侯邦联不得不承认奥施特莱尼亚的独立。而1290年奥施特莱尼亚的第四次北进政策，则引发鲁萨尔和卢瓦尔的高度警觉，并在次年组建联军宣布对奥施特莱尼亚进行干涉。但联军在缺乏中央指挥且后勤还未完全到位的前提下匆忙进军。在长途跋涉后被奥施特莱尼亚雇佣的半人马军队击败，甚至继续南下攻克了几座鲁萨尔诸侯邦联的边境城市。\n\n大受震撼的鲁萨尔诸侯邦联在卢瓦尔援军到来之前就擅自媾和，使得已在半路上卢瓦尔军队有了被全歼的风险。出于利益考虑与政治交换，卢瓦尔同意将奥施特莱尼亚作为鲁萨尔诸侯之一参与帝国选举同时授予公国头衔，但将权利限制在伯国范畴。作为交换，奥施特莱尼亚同意彻底放弃北进政策。在此后的几百年中奥施特莱尼亚持续向西制造摩擦，但并未得到任何便宜。"
SPC_IS_AST_national_desc_2:0 "而在之后的1544年，随着对中巴斯蒂亚的的开发进一步将强。奥施特莱尼亚的南部人口开始持续向北部流入。同年，在进攻顿伏茨克受挫之后，奥施特莱尼亚最终放弃了东进。在 1558年时任大公兼帝国皇帝向西发兵，轰轰烈烈的西进大征服运动开始。在两年后基本攻占了宏戈利亚地区。不过事情并不是一帆风顺的，1630年顿伏茨克大公集中了大量半人马军队，最终击败了帝国联军并获得资格加入帝国。此战使得奥施特莱尼亚开始收起轻视，重新审视起这位东方邻居。并最终决定冰释前嫌开始与顿伏茨克全面建交。双方在之后的1703年到1710年的新教战争中联手击退了新教联军并加强了自身的独立性。\n\n随着1724年的巨大魔兽潮南下以及1728年帝国的解体。奥施特莱尼亚在混乱中借机宣称升格为王国。同时1729年的大崩溃使得帝国无法顾及北方，奥施特莱尼亚王国不顾魔兽大军压境强行吞并了中巴联合开发公司控制的南部领地。而在共和革命中受到共和派资助的宏戈利亚贵族则宣布拒绝参加反共和联盟，反以加入共和派一方相要挟。要求王国提高自治，增加对宏戈利亚的援助。受到南方共和联盟大军威胁的奥施特来尼亚只能同意半人马的要求。\n\n1735年，魔兽潮突破了中巴防线，兵峰直指南巴北部。第一次真正面临魔兽的王国军队损失惨重，在损失大量有生力量后，奥施特莱尼亚王国只得征兆了大量半人马军队以保卫王国领土。但这却使得在1820年魔兽退却后，宏戈利亚的军事贵族第二次要求增加自治权力，最后在联邦的介入下促成了王冠协定。就在此刻，雷斯科里恩家族在之前埋下的种子，开始慢慢发芽了。\n\n1878年的南巴公社起义将激进主义吹到了北方，被顿伏茨克镇压的无政府组织流亡到了维恩地区。并将此地作为总部，对奥施特莱尼亚以及顿伏茨克的政府要员进行炸弹袭击。\n\n1921年，旷日持久的伟大战争结束，在南巴的政治输出下奥施特莱尼亚被迫进行了立宪改革，于1923年通过了《奥施特莱尼亚王国宪法》。开放议会选举，削弱王室权力。1971年北巴殖民地发生暴乱在南巴许诺下奥施特莱尼亚和大公国发兵北征。在暴乱平定之际，天壁同盟加入了战争。将联军赶出了北巴。\n\n1973年世界大战结束，奥施特莱尼亚并未得到所允诺的好处，在国内受到了巨大的异议。再进一步被迫向资产阶级让步同时，宣布退出联邦。而1983年为了帮助声援第二次南巴公社起义，维恩的无政府主义者趁着王储鲁道夫向民众演讲的时机炸死了以保守而闻名的他。面临未来必定存在的传位问题，无奈之下，老国王再次进行议会改革。以出让王室利益来保证王室正统的延续，将孙女玛丽安立为王储。1997年老国王郁郁而终，年仅17岁的玛丽安登上王位。而老国王留给她的是一个怎样的遗产？这就只有女王自己才能知晓了。"

SPC_IS_HGL_national_desc_1:0 "宏戈利亚的现代历史应该从1558年巴斯蒂亚帝国帝国皇帝鲁普雷西特.蒂.雷斯科里恩征服今天的宏戈利亚地区的松散邦国联盟开始。宏戈利亚诸邦国的居民大都为千年前迁入该地区的半人马。因为宏戈利亚地区特殊的种族状况，鲁普雷西特虽然将邦国纳入自己的领地奥施特莱尼亚王国，但仍然赋予了宏戈利亚诸邦国很高程度的自治权。奥施特莱尼亚王国在宏戈利亚组建了贵族议会，该议会在名义上宣誓效忠奥施特莱尼亚国王，但实际上作为一个高自治度的邦国地区而存在。所以奥施特莱尼亚王国在宏戈利亚的席位仅仅只占五分之二。从此宏戈利亚以一个统一的地区政权出现在大众的视野之中。\n\n在征服宏戈利亚地区的征程中，鲁普雷西特发现由宏戈利亚当地贵族带领的半人马军队十分强悍。他们不仅有着较高的作战效率，同时也有着颇高组织度。因此开始大量雇佣宏戈利亚的半人马军队。而这些半人马军队也没有辜负鲁普雷西特的期望，在对顿伏茨克大公国的战争中，他们亮眼的表现为这些半人马军事贵族奠定了其日后的政治地位。在1728年的革命之中，受到共和派资助的军事贵族毫不犹豫拒绝了北逃到克拉亚诺的摄政委员会下达的南下剿灭革命派的要求，甚至向提出了要奥施特莱尼亚方面继续提高宏戈利亚的自治权否则将会倒向革命派向摄政委员会宣战。奥施特莱尼亚王国被迫同意了宏戈利亚军事贵族的要求，撤出了一半在宏戈利亚的王国代表。但毕竟这些贵族不是真心认同共和，在要求得到满足后，宏戈利亚还是于1732年加入了反共和联盟与共和国际作战。这些军事贵族获得了大量政治权益，最终形成了被后人称为“中央集团”的政治团体。奥施特莱尼亚对这些半人马的信任度大幅降低，开始有意减少半人马军队数量，组建人类与半人马的混合部队。\n\n然而，随着1735年魔兽突破了中巴的防线，第一次见到魔兽的奥施特莱尼亚王国军队根本不清楚如何与魔兽战斗，因此产生了大量的伤亡。王国内部的人民因为恐怖的伤亡比，军队较低的待遇和有半人马军队可以依赖为由拒绝服从国王下发的动员令。这使得奥施特莱尼亚的计划宣告破产，被迫继续动员大量半人马加入对魔兽的战争。到了1760年，半人马的军队已经是人类军队的几倍，但因为战争的需求，奥施特莱尼亚王国只能继续招募半人马充军。"
SPC_IS_HGL_national_desc_2:0 "直到1820年前线魔兽退散后，数量已经十几倍于人类军队的半人马部队得以回到后方，在半人马贵族的挑动与在伟大战争的血腥战场付出的经历的影响下。半人马军队要求奥施特莱尼亚方面下发抚恤金和安置费，另一方面半人马贵族要求奥施特莱尼亚方面再次提高自治权。看着排山倒海的半人马士兵与咄咄逼人的半人马贵族，奥施特莱尼亚方面最终选择了退让。在联邦的介入下三方在次年达成《宏戈利亚王国王冠继承协定》：协议规定奥施特莱尼亚王国释放宏戈利亚地区，宏戈利亚升为宏戈利亚王国由奥施特莱尼亚国王兼任世袭国王由当地贵族自治并作为奥施特莱尼亚的保护国，奥施特莱尼亚方面撤出所有席位并将交给中央集团，奥施特莱尼亚方面和宏戈利亚方面交换半人马和人类人口，置换的宏戈利亚人类领土转交中央集团，中央集团负责安置大量半人马士兵，联邦负责协助两国重建。此外中央集团和奥施特莱尼亚方面还达成了奥施特莱尼亚王国优先进口宏戈利亚农产品。宏戈利亚方面则接受了奥施特莱尼亚对于减少常备军队，限制重武器发展的要求——因为他们的地位已经牢不可破了。从此中央集团成为了宏戈利亚的实质统治者，他们利用军队排除异己，扩大统治。\n\n1835年因为受到鲁萨尔农民起义的影响，宏戈利亚南部爆发了大规模起义，中央集团很自然的以奥施特莱尼亚王国的名义对起义进行了镇压。在1880年中央集团为了收买民心中央集团宣布以赎买制废除农奴制。试图通过一场自上而下的改革来避免起义。1871年中央集团的军队在保卫北巴殖民地的战争中损伤惨重，此时大量仍未赎身成功的农奴在意识到这次机会后立刻发起大规模起义。中央集团在发现事情正在脱离控制的情况后，宣布减免一切奥施特莱尼亚王国定下赎身税，立即废除农奴制，最终避免了这场起义，但为宏戈利亚的将来埋下了定时炸弹。\n\n七十年代末中央集团罕见的起用了改革派成员蒂尔担任宏戈利亚的首相。蒂尔在任期内修建乡村基础设施，发展宏戈利亚城市工业，提高农民待遇，大力加强乡村娱乐建设，极大的缓和了社会矛盾。于是在1885年中央集团阻止了改革，但为了表现宏戈利亚的改革态度仍然继续留用蒂尔。1996年中央集团雇佣杀手刺杀出访南巴共和国的改革派财政部长，企图转移矛盾。但很快，此次事件便走漏了风声。这进一步激化了宏戈利亚的社会矛盾，地方骚动不断，中央控制能力极大下降。1998年中央集团下达的任何政策地方都被地方政府阳奉阴违，几乎没有任何一个政策得到了贯彻的落实。然而即便如此，在中央集团的内部，保守派仍然再对改革派重拳出击。而自由阵线和农业先锋队已经出现在山野与村庄之间，地方政府与中央离心离德，社会矛盾已经激化到了无可挽回的地步。所有人都屏住呼吸，等待着这个已经被埋葬了127年的定时炸弹迎来他爆发的那天。"

SPC_IS_MGC_national_desc_1:0 "£MGC_ITI_1\n\n\n数个千年之前，§O提特兰帝国§!的将军带着无数的军队与辎重，向北发起了征服运动，并且花费了数个百年，征服了目前的§O北提特兰§!地区，在这肥沃的土地上建立了城市与农村，兴起了农奴制与贵族魔法师的§9暴政§!，也征服了这里的一些§0半人马原住民§!，将他们也纳入了帝国的统治之中，虽然早期半人马与人类略有矛盾，但是在最初的一个世纪之后，半人马们皈依纳卡教，与人类们过上了相似的模式，他们被驯化，然后与普通人类再无二致。\n\n接下来的数个世纪之间，§O北提特兰§!不断地发展，逐渐成为了§O提特兰帝国§!时代的北方粮仓，在数次帝国内戡中作为必争之地存在，无数位军阀在这里兴起，互相攻伐，然后灭亡，留下残破的城市与乡村依旧过着自己的生活——永恒的§G耕种§!，永恒的§Y税收§!，永恒的§R痛苦§!；§9暴政§!从未结束，只是变本加厉，偶然的仁慈只是因为帝国内的妥协。\n\n而到了§0坎达德尔王国§!时期，作为北方征服南方的代表，从§0坎达德尔一世§!开始，列王对北方的青睐可谓历史之最，北方的§9暴政§!时代到达了历史上的最高潮期，北方几乎过着生不如死的生活。残暴的魔法师地主们用活人当肥料，各地地主们趾高气扬的瓜分了北方的农奴们，对各个乡村的边界进行划定，对耕种范围做了极大规模的规定。但是他们也并非这§9暴政§!的最顶点，各个居住于城市中的贵族们笼络着地主，从地主身上加上各种税务，强制他们上缴一年更比一年昂贵的税务。\n\n这一现状导致了北方天生的工业残疾，当§0坎达德尔王国§!第一次提出工业计划之时，北方的贵族们便率先反对，甚至连铁路计划都是在付出巨大代价后才花费许久完成的工程，工业化水平基本上停滞不前。这直接导致了§0坎达德尔王国§!的崩溃，§G提特兰共和国§!拿着先进的武器攻入格诺亚的时候，§0坎达德尔王国§!的工业化几乎堪称完全没有。§0王国§!的毁灭造成了分裂，§0北坎达德尔王国§!在此时分裂而出，北方贵族们拥立了一位§9伪王§!，一位没有§0坎达德尔王室§!血统的君主，入场参加着内战。\n\n内战直到1930年才结束，七年内战将完整的§0坎达德尔王国§!摧毁，§0北坎达德尔王国§!矗立在北境之上，啃食着§O古老帝国§!的尸骸。整个1930年到1950年，整个§0北境§!在混乱中渡过，战争的失利让各种思潮在§0北境§!翻涌，§2共和党§!人，§G农民军§!起义接连不断，但是都被§0北坎达德尔王国§!镇压下去，这个过程中，对于§9伪王§!并非正统的消息也不胫而走，在民间与军队中都造成了巨大的影响，最终在1950年§g弗拉维乌斯·弗沃茨瓦夫§!将军的边防军起义推翻了贵族与王室的统治，他宣布了他的个人独裁。他将土地大规模收归国有化，重新推进工业化进程，宣扬§O马加尔斯§!民族主义，§g弗拉维乌斯§!将军的政策卓有成效，成功将这个即将被贵族摧毁的国家重新拯救。"
SPC_IS_MGC_national_desc_2:0 "而天有不测风云，在1959年的第一天，§g弗拉维乌斯§!将军就遭到了自己的亲卫军的射杀，并且从从城堡的一门前膛炮里血肉模糊的发射了出去，洒在卜德佩西亚的大街上。随后亲卫队宣布了政变，宣布要恢复贵族统治，这让无数人都愤怒了，甚至大部分军队也宣布了叛乱，§0北境§!再一次陷入了内战的阴云之中。这场内战并没有持续多久，§2共和派§!的§2人民解放协会§!，§9中左派§!的§9联合社会党§!，§R左派§!的§R激进共和党§!，§t极左派§!的§t行动党§!联合起来发动了§2一月革命§!，建立了§O马加尔斯共和国§!的§2临时政府§!，并且以迅雷不及掩耳的速度在当年三月完成了§0全北境革命§!。\n\n但是在完成革命后，制宪问题变成了一个巨大的难题，临时政府中的左派占据了绝大多数，这让§2人民解放协会§!非常的不满，原本在四月即将通过的宪法因为§2人民解放协会§!议员与§9联合社会党§!部分议员大规模离场拒绝投票而无疾而终，这令左派最终选择了在五月发动“§R五月恐怖§!”，主动出击将§2人民解放协会§!成员逮捕，逼迫§9联合社会党§!裂党，左派成立了§9马加尔斯社会党§!，右派则与§2人民解放协会§!成员一块被逮捕。\n\n“§R五月恐怖§!”最后变成了一场灾难，自发组织的§R工人纠察队§!根本没有和平关押绝大部分该被逮捕的人员，而是当街射杀与私刑处死，这让新成立的§2临时政府§!政权逐渐丧失了人心。当年七月，整个§0北境§!再次陷入几乎无政府的动乱状态，各地民兵互相攻击，直到年末§2临时政府§!也未曾重新掌控过§0北境§!的全部地区。\n\n1960年初，§g弗拉维乌斯§!将军的老友§g谢姆延·扎布罗夫斯基§!将军带着他与其他五位流亡者组织的流亡者部队§g七河军团§!从特勤出发，在三月解放了整个北境的北方部分，并且屈辱的签署了《纳维亚条约》将土地“赠予”§R七§!§2河§!联邦与一系列不平等的条约，以换取§R七§!§2河§!联邦的继续支持，并且在当年的八月最终完成了§0北境§!的解放，建立了§O马加尔斯邦联§!。\n\n但是《纳维亚条约》宛若与魔鬼的契约，百废待兴的§O马加尔斯邦联§!如果以正常的手段根本没有办法偿还——于是，农奴制再一次复辟了，§g扎布罗夫斯基§!将军背弃了他朋友的理想，背弃了无数人的血汗，苦苦支撑着；在这个过程中，他的妻子也背离了他，他的儿子再也没有回复他的信件，他的灵魂被魔鬼所抽空，在此的仅一具躯壳。\n\n时年1998年的新年，§g谢姆延·扎布罗夫斯基§!将军看着自己家室的照片，身边空无一人，唯一留下的只有办公室里的勋章与军服，此外别无他物。\n\n要做的事情：\n·§g谢姆延·扎布罗夫斯基§!将军需要处理后继者的问题，在全军联盟的§2共和派§!，§W独裁派§!，§g保皇派§!的五位将军中选择一位。\n·小心§2临时政府§!的游击队，他们并没有真正的被打败，他们依旧在街头巷尾，他们的愤怒也未曾结束过。\n·准备应对冲击，§R七§!§2河§!联邦内部传来的消息似乎令人有点不安……"

SPC_IS_ROT_national_desc_1:0 "“唯有团结才能保全提特兰人”\n\n——§7提特兰共和国§!谚语\n\n§7共和国的诞生§!\n\n公元32年，提特兰王国清除了一切异教徒和其余城邦，最终统一了范弗登特海湾沿岸平原也就是今日提特兰共和国所在地。\n\n公元1720年，《自由宣言》于南巴发表，“共和理想”第一次被提出，不久就传提特兰半岛境内，引起颇多响应。虽然坎达德尔王国宣布此为禁书，但《自由宣言》依旧在半岛流行开来。\n\n公元1728年，坎达德尔八世见南巴陷入革命的浪潮，试图再次挑起对南巴的战争。在国王发布征税备战的命令后，东部平原立即出现了骚动，就在国王下令武装镇压之后不久，骚乱变为了起义。出生于特尼安桑德瑟兰的特尼安人赫克曼·丹特离开了革命如火如荼的南巴斯蒂亚，带领志愿军前往东提特兰地区帮助起义民众，并多次组织当地平民将坎达德尔军队击退。1732年，占据大半东部平原的赫克曼在§7提特兰人与南巴志愿者的欢呼中§!建立了提特兰共和国。1735年赫克曼制定了民主的共和国宪法，但要求在其本人死后执行。在这之前，他声称要为了守护革命而维持专政。\n\n1750年前后赫克曼模仿§R友爱会§!组织，去除其宗教价值观意图在提特兰共和国建立互助型社区，因为种种原因最终失败。\n\n公元1768年，提特兰共和国在南巴的影响下走向了工业革命，提特兰资本主义经济开始快速发展。同年赫克曼逝世留下遗言维护提特兰民主，尊重文化多元，避免宗教复辟，坚持民族平等。 继任者为赫克曼的战友伯拉曼.高伯隆，高伯隆将赫克曼的宪法付诸行动。但事实是赫克曼维护的民族平等在他死后逐渐瓦解，掌握有大量公职的南巴移民群体垄断了立法和行政权，移民群体开始压迫当地提特兰人。\n\n1778年圣城圣吉亚斯发生暴乱，在暴乱中伯拉曼拒绝动用军队镇压，亲自走上街头希望对话，最终被炸弹袭击当场死亡。军队闻讯立即宣布进入军管状态并加入南巴联邦换取武装干涉。此举完全激怒了提特兰人，整个国家陷入了瘫痪。\n\n1789年圣城被起义军攻陷。但在南巴干涉之下提特兰共和国于1790年成功镇压了起义。"
SPC_IS_ROT_national_desc_2:0 "§t失败的统一战争§!\n\n公元1923年，提特兰共和国意图统一提特兰半岛，向坎达德尔王国宣战，且在同年的国庆节12月23日攻克了王国首都格诺亚，并处死了几乎所有的王室成员。好处是，此举几乎击溃了坎达德尔的统治，一时间多个宣称继承人宣布自己为合法继承者，将剩余的王国裂解为多块，互相攻伐。坏处是，提特兰共和国已经找不到签投降书的人了，只能继续进攻这些继承人。\n\n然而，1924年起，战局急转直下，修卡利翁同盟与七河联邦便以提特兰共和军犯下诸多战争罪行为由制裁提特兰共和国并向王国残余政权输送援助。同时，共和国的宗教自由与政教分离政策激怒了信奉政教合一的纳卡教徒，这种愤怒演变为了抵抗的力量。大量纳卡教徒与愤怒的平民组成了游击队，1924年的堡垒都市艾尔巴卡斯特兰之战中，王国军奇迹般的打断了共和军的进攻矛头，共和军后方的补给线也在王国军与游击队的打击中摇摇欲坠，双方进入了僵持状态。1925年，修卡利翁同盟的牛头人不宣而战，奇袭南提特兰海岸（今伊斯恰地区），共和国海军全军覆没。为了不被包围，提特兰共和军几乎是丢盔弃甲，不顾一切的向东撤退，这场千里大撤退在牛头人与王国军的打击下变成了一场§t极其耻辱的溃逃§!。最终，在南巴斯蒂亚共和国的调解下，参战各方达成停火协议，提特兰共和国吐出了在战争中占领的所有王国领土，南提特兰地区则归修卡利翁同盟。之后，修卡利翁的牛头人对当地人犯下了§t累累罪行，当地人逐渐沦为了牛头人的家畜§!。\n\n这场耻辱性的大败对共和国带来了极其深远的影响——时任民族自由主义政府倒台，共和国背上了沉重的债务与恶名。由于本国§0纳卡教徒§!大都同情坎达德尔的纳卡教游击队，导致不同信众之间的冲突不断升级。民族主义者见识到了宗教自由与罢工自由在决定民族命运的战争中的恶劣影响，他们的思想也愈发§t激进§!。但是，激烈的民族主义情绪是事实，共和国在战争之后更加依赖南巴联邦更是事实。人们已经完全意识到，提特兰半岛的地理位置是多么糟糕，三大势力：南巴斯蒂亚联邦、修卡利翁同盟、七河联邦正围着他们的祖国，并将半岛变成了列强之间的博弈场。统一半岛，就意味着他们将同时损害三个大国的利益——也就是说，§R除非三大势力崩塌，否则，提特兰统一之梦再无可能。在耻辱，混乱与债务危机中，提特兰共和国走向了世界大战。§!\n\n1969年，世界大战爆发。提特兰共和国与南巴斯蒂亚联邦一起走向了世界大战的战壕。但最终，1973年，牛头人的奇袭部队占领了南巴斯蒂亚共和国的首都度弗道夫。南巴宣布有条件停战，条约规定南巴向战胜国提供大额赔款，退出已占领土地，不得干涉提特兰半岛政治局势——但提特兰共和国依然是南巴的保护国。\n\n§R现状——不和的共和§!\n\n尽管提特兰共和国的民主体制存在不少弊端，但依然是提特兰半岛上唯一一个算的上是民主的政权。国内政治长期被建制两党：§C人民自由党与民主党§!把控，但由于两党制民主近年来的失败以及两党近乎卖国般的亲南巴倾向，第三大党§R全民§!§O革命§!§0运动§!异军突起，大有打破两党政治之势。尽管各党对立情绪严重，但值得欣慰的是，他们都依然铭记着§7提特兰民族统一§!的理想。但国父丹特的理想已经逐渐为众人所遗忘，毕竟，某种程度上，他的理想乃至他本人已经成为了提特兰人的§t梦魇§!。\n\n要做的事情：\n1998年大选迫近，为共和国指明道路。\n§R警惕南巴驻军§!——如果你不想永远被南巴斯蒂亚控制的话。\n在愈发狂暴的命运之风中稳定国家，在动荡的时代中抓住民族统一的机会，§t这很可能是提特兰人最后一次拯救自己的机会了。§!"

SPC_IS_MTV_national_desc_1:0 "“西蒙万岁！辛纳万岁！巴博维奇万岁！丹特万岁！瓦尔特万岁！”——1996年的联邦独立广场\n\n§7蒙特§!§O韦尔德§!在§Y提特兰人§!引以为傲的历史中，总是以最“粗鄙”与最“不开化”而闻名，与荒蛮作伴；即使是§Y提特兰人§!最完全的历史，即便是最公正的史官们也不愿意提及这片被帝国征服的山地。在古典的§Y提特兰§!历史中，最早记述这片土地的名字叫做“希纽图姆”，以§Y提特兰§!帝国对当地贫瘠的山区中钻出的蛮族劫掠者氏族的名称而命名，帝国在公元后也曾经几次攻入当地，建立了§Y希纽图姆行省§!，但是因为§Y提特兰帝国§!内部的动乱、原住民的起义、各式各样的理由最终放弃这片土地，再过个数十年重新征服这里，为新皇的美德添上一笔。\n\n这种轮回被帝国中央称为“征服钟摆”，即“征服-动乱-再征服”的循环，§Y希纽图姆行省§!就在这样的混乱中稀里糊涂的存续，即使帝国禁止提特兰人与原住民通婚，但腐朽的官僚们压根没法管理迁移而来的提特兰人与原住民们通婚。久而久之，现代我们熟悉的§7蒙特§!§O韦尔德§!的南方主体民族——§O维尔德人§!就诞生了，这个称号是帝国的§Y纯血提特兰人§!们轻蔑的给了他们的一个蔑称，意为“乡巴佬”，这些§O维尔德人§!在§Y提特兰帝国§!中央几乎可持续的崩溃下兴起了自己的管理方式——“§O大庄园制§!”。各个山区之间的大庄园们盘剥着当地的原住民与农奴，而庄园主们则互相用着提特兰式的粗野——§t魔权的暴政§!互相比较着实力，吞吃着土地的界限，统治着当地。\n\n这样的兼并终有不满足的一日，§O庄园主们§!开始把目光往北看去——那是一片由半人马们统治的土地，§O庄园主们§!的联军很快靠着自己的优越的魔法能力与无数可怜的仆从军们攻下了北方的土地，随后的分赃与半人马的归属权让北方在§Y提特兰帝国§!自己都不知道的情况下制造了两个新的行省——统治着一群半人马奴隶。“§7蒙特§!”因此得名，这个名字是希纽图姆语中“奴隶”的意思——但是没几代后，一位提特兰化的半人马农奴，被称为“§7北方的解放者§!”的西蒙发动了一场浩大的起义，带着人类与半人马农奴们发动了大起义。最终起义的声势被§Y帝国中央§!所知晓，§Y帝国§!随即宣布了两件事——§7解放者西蒙§!原地获得了北方蒙特的土地，成为北方行省的总督；其次，半人马与人类平等，皆为穆勒斯下的臣子。\n\n§7解放者西蒙§!或许解放了肉体，但是他从未解放过心灵——在数年后，§7半人马§!§O庄园主们§!与曾经的§O维尔德人§!一样奴役着农奴与其他原住民，整个地区依旧这样帝国的纷争与沉沦中置身事外，在高山中不断轮换着主人，慢慢的抵达了§0坎达德尔王国§!时期。\n\n§0坎达德尔王国§!依旧延续了提特兰人的一贯方针——只要交的上税款，当地就是庄园主的乐园，但是一切都在1732被打破了。§7提特兰共和国§!的诞生让庄园主们嗅到机会，不少庄园主直接自称“§7丹特派§!”，早就是§2南巴斯蒂亚共和国§!的忠实支持者了，北方的§7半人马§!§O庄园主§!们更是直接打出了§7丹特共和旗§!宣布自己是§7共和国人§!。但是当§7共和国§!军队真的要进入当地，南方的§O庄园主§!又开始冒用名言“私人财产不得侵犯”这种口号，带着家丁驱赶少数来到当地的§7共和国军队§!不进入他们的种植园解放农奴。"
SPC_IS_MTV_national_desc_2:0 "这种情况在随后1738得到了光速的逆转，魔兽的入侵又让庄园主们立刻焚烧起了§7丹特旗§!，宣称自己是“王国的忠诚臣子”，让§0坎达德尔§!的精锐抗击魔兽。直到伟大战争结束，庄园主们又开始在勉强停火的提特兰共和国与§0坎达德尔王国§!之间当着墙头草过着独立且自主的日子。§0坎达德尔九世§!的疯狂更加加重了这种离心力，§7蒙特人§!与§O维尔德人§!的知识分子们开始用着§2南巴斯蒂亚共和国§!与§7提特兰共和国§!带来的民族主义余波建立着自己的民族主义思潮，从§Y提特兰民族§!之中脱离自己。\n\n这种情况到了1923年为止，§7提特兰共和国§!在之前的解放战争中得到了1732年式的欢迎——直到他们焚毁了§0格诺亚§!。这一行为让庄园主们结结实实的看到了§7提特兰共和国§!的解放绝对不是什么王代王，而是一场彻底的革命，他们随即背弃了§7共和国§!，拥立了自己的§R伪王§!，宣称自己是§0东坎达德尔王国§!的§0立宪政府§!——并且反抗§7共和国§!的革命，他们偷袭了§7共和国§!的占领领土，导致了§7第二次共和革命§!0的最终失败。\n\n到了1969年，大战开始的时候§0东王国§!的§O庄园主§!§0立宪政府§!罕见的出现了大规模的分裂，§2南巴斯蒂亚派§!的§2知识分子§!§O庄园主§!支持屈服，而更多的§O庄园主§!因恐惧土地改革导致他们丧失自己的地位而坚决的支持米诺陶，最终§2知识分子§!§O庄园主§!们失败了，§0东王国§!选择了与修卡利翁结盟。但是失败并不代表终结，§2知识分子§!§O庄园主§!们掀起了叛乱，在北方的半人马§O大庄园主§!辛纳与半人马同僚们宣布自己为“§7蒙特护宪军§!”，南方的人类§O大庄园主§!巴博维奇与城市市民们宣布自己为“§O维尔德共和军§!”，二者展开了对剩余保守派的抗争，这场名为“护宪革命”的起义最终在1970年结束，两军在共和国军队帮助下一起成功的建立了两个新民族的共和国：§7蒙特宪政国§!与§O维尔德共和国§!。\n\n到了1973年停火之后，两国的代表作为战胜国坐上了谈判桌的旁听席，但是谈判的结果却让§7蒙特代表§!与§O维尔德代表§!让人感到无比的不真实——他们信仰的灯塔，§2南巴斯蒂亚§!选择将两个国家合并在了一起，建立一个类似§2南巴斯蒂亚§!的§2联邦制§!国家，以更北方的§7蒙特§!为主导，§O维尔德§!为合作者，建立一个§7联§!§O邦§!——两个国家没有能够发表任何抗议或者赞成，§7蒙特代表§!在南巴斯蒂亚人的放纵下华丽的签上了字，而§O维尔德代表§!则在各国的压力下签下了这份屈辱的条约，甚至没有纠正条约中错误的书写了§O维尔德人§!的国名并不是§O韦尔德§!。§7蒙特§!-§O韦尔德§!联邦在这份被称为《联邦协议》的协议签署后便诞生了，不论签署它的人多么的愤怒，多么的欢乐，这不义的联邦就这样诞生了。\n\n之后的日子里，虽然维尔德人发动了一次次努力，从脱离联邦到修正国名为蒙特-维尔德，从为维尔德人占据主导地位的共和制度党到反抗蒙特人移民南下但是都没有任何大用，§O大庄园主§!辛纳的门徒布罗兹·瓦尔特登上的总统的宝座，他开始进一步的分裂维尔德人，但是他将联邦变成了提特兰地区第二富裕的地区——赞美的声音最后多过了愤怒的声音。\n\n似乎一切都会如此美好下去，但是不尽然如此——\n\n§R瓦尔特大元帅死后，洪水滔天。§!\n\n要做的事情：\n赞美死亡\n赞美疯狂\n赞美尸骸\n§R红，红，红§!"

SPC_IS_RLN_national_desc_1:0 "地主与买办的共和国：\n勒泰特尼安共和国诞生于1729年的特尼安共和革命。因此共和国至今依然以“革命国家”自居。但事实是，勒泰特尼安共和国是一个地主与买办的共和国，普选与自由只是让地主与买办得以利用人民的名义掌权。农民在地主的监视中只能将票投给地主心仪的候选人。\n\n红色郁金香：\n随着共产主义思潮日渐在南巴泛滥，勒泰特尼安的工人运动与农民运动日渐兴盛。1962年，勒泰特尼安联合工会成立，格雷齐亚被推选为工会领袖。格雷齐亚在工会的支持下于1967年成立勒泰特尼安人民党，并使其成功获得六个议会席位成功进入议会成为一个合法政党。这是勒泰特尼安的第一个温和社会主义合法政党。然而，好景不长，世界大战时期，其反战言论遭到了南巴斯蒂亚共和国方面的驳斥，使得勒泰特尼安时任总统赫伦拥有充足的理由动用总统权威宣布人民党为非法政党。其成员大都被捕乃至被杀。特尼安半岛第一位女性议员莉奥娜便因此而死。这使得左翼分子对共和国的虚假民主彻底绝望，部分人民党残余在格雷齐亚与本·辛格勒（莉奥娜的丈夫）的带领下撤往山中。在阶级仇恨的滋养中，格雷齐亚等人成立了农工革命党，决定以暴力实现社会主义革命，德高望重的格雷齐亚则成为了农工革命党的主席。\n\n革命战争理论：\n尽管农工革命党成立之初得到了退伍老兵以及左翼军官曼努埃尔的支持，但相比起有南巴联邦支持的共和国政权依然太过弱小，成立之初甚至没有引起共和国的注意，只能通过游击战发展力量。长达二十年的游击战争磨练了农工革命党，党始探索一条将社会主义思想与军队建设理论相结合的道路。格雷齐亚创造性地称之为“革命战争理论”。在他的领导下，勒泰特尼安的山村中诞生了一支无与伦比的革命军队：特尼安赤军。与常见的游击型军队不同，赤军有着极强的纪律性与组织度，且拥有大量经验丰富的老兵。更难能可贵的是，赤军拥有着独特的军事民主体制，据格雷齐亚所言，这是革命军队政治性的体现。在战术上，为了克服武器缺乏的困难，赤军开始广泛地将攻击性魔法纳入训练内容，这使得这只军队能够发挥出远超其表象的战斗力。\n然而，这些小小的奇迹和共和国倚靠的南巴联邦相比什么也不是。\n\n"
SPC_IS_RLN_national_desc_2:0 "革命之殇：\n时间来到1995年，农工革命党在山村中建立的赤色特尼安政权已经达到了扩张的极限——他们已经让共和国政权意识到了山村中广泛活跃的革命力量。共和国已经开始清洗共和军内部的亲左翼军官，也已经对赤色特尼安开展了数次围剿。一直以来，由于保密工作与渗透工作的成功，共和国政权并没有重视赤色特尼安，而赤色特尼安也小心行事，避免引起共和国的注意乃至遭到全面围剿。然而，农工革命党高层出现了一位名为巴拉赫尔的叛徒，他的告密使得共和国政权得以找到赤色特尼安根据地并组织起一次次围剿。勒泰特尼安的全面内战已经箭在弦上，不得不发。最终，1995年，一伙不满于共和国清洗军队的军官对共和国发动了一场失败的政变，为首的政变军官金斯伯格带着残部撤往赤色特尼安的根据地。这场政变成为了勒泰特尼安全面内战的序章，赤军从各个山村中走出，不到两个月时间，勒泰特尼安共和国的控制区只剩维尔瓦诺州与首都丹特，可以说，共和军完全没有能力阻挡赤军的进攻。然而，两个月后，南巴斯蒂亚共和国与鲁萨尔联盟对赤色特尼安宣战，数以万计的外国干涉军涌入勒泰特尼安，赤色特尼安在开战5个月后几乎全灭，控制区几乎全部丢失。格雷齐亚等大部分党内高层也因为叛徒的出卖被共和国名将加瓦·阿杜勒找到藏身处并斩杀。本·辛格勒与新晋领袖索雷尔·卡彭带着最后的残余撤往桑德瑟兰的山村——那里的地势不算险要，但那里的群众基础最好，赤色特尼安的最后残余得以喘息。由于骨干力量损失惨重以及金斯伯格的“新派系”的加入，农工革命党内不可避免地出现了派系斗争，只是生存危机暂时掩盖了分裂的迹象。当然，此时的革命者们都没有想到，只需短短一年，赤色特尼安就会再次壮大。\n\n二十五年红旗不倒：\n勒泰特尼安的全面内战以及共和国堪称无差别屠杀的围剿行动彻底摧毁了共和国的经济与秩序。共和国享誉南巴的珠宝贸易也愈发不景气。共和国军队在经历反共产主义清洗后变的更加腐朽。于是，1996年，勒泰特尼安饥荒爆发。濒死的赤色特尼安一下子补充了大量愤怒的工人与走投无路的农民。1998年，南巴斯蒂亚联邦的崩溃与桑德瑟兰工人起义让勒泰特尼安再一次走向了内战。这一次，赤色特尼安终于有机会彻底摧毁孤立无援的共和国，§R为饥寒交迫的人民献上革命之完胜。§!\n\n注意事项：\n解放特尼安半岛，建立赤色特尼安！\n小心党内的派系之争，尤其是在内战之后。\n特尼安革命绝不能是孤立的，否则革命注定走向失败，因此，必须将社会主义革命扩散至全南巴斯蒂亚！"

SPC_IS_WDR_national_desc_1:0 "蒙特韦尔德从一开始就是错误的，所幸现在这个怪胎被扫进了历史的垃圾堆。第一任总统之子小瓦尔特的政变击碎了中央政府，共和制度党作为最大的反对党自然是不会放过这个机会，各个维尔德地区的党魁在扎格罗巴重新宣布了维尔德共和邦的建立。\n\n被暴君沃伊维奇的“蒙特至上”欺骗的南迁蒙特人却选择第一时间对抗这个真正代表当地人的政府，然而问题就从一开始爆发了。所有人都支持镇压这些蒙特叛军，在共和制度党支持下由各个自治省的军队组建了维尔德全国武装力量，同时临时议会宣布紧急状态法案组建了德米特罗·“半人马”·杜诺夫的军政府。\n\n组建军政府确实给维尔德带来了一定时间的和平，但是那主要是对首都附近的居民来说的。军队内部派系林立给极端人士提供了平台，以镇压叛乱为名不知道枉死了多少人。军队内的极端民族主义者给了叛乱分子理由进一步扩大了叛乱范围，一些其他地区里别有用心的极端团体也乘机攻击了地方的政府，其中最活跃的便是缇尼厄奥人的兄弟会，他们拿着来自提特兰共和国的武器占领了缇尼厄奥自治省全境并举行了一波大屠杀。\n\n左翼的维尔德社会革命党通过北提特兰自治联合体，在明显比共和制度党各个党团更有能力的维尔德行动党的带领下，东部工人和剩下的少数民族站在了他们那边选择了对抗政府。这最终击溃了共和制度党和军政府，在经历了内部严重的分裂后共和制度党选择与社会革命党举行土地改革法案的谈判。右翼分子的各个维尔德民族组织很快以不同程度予以回击，在攻击政府以要求让步的同时也有一些人攻击着维尔德社会革命党。最终杜诺夫率领军队在经过一年的努力后开进了各个城市里，共和制度党也得以举行了第一次土地改革会议的召开。\n\n蒙特叛军和缇尼厄奥兄弟会在经历两年的时间终于被打败，蒙特叛军转入北方，而缇尼厄奥兄弟会在尝试伪造维尔德人炸死提特兰共和国大使失败了，他们因为残酷本质失去了外部支持不得不转入了地下。另一边，第一次土地改革会议不出意料地让所有人都不满意，只有极少的共识被认可而附带了大量以权谋私的内容。虽然共和制度党承诺后续会举行第二次会议，但是还站在他们那边的军队时刻提醒着他们应该准备应对第二次大规模叛乱。"

