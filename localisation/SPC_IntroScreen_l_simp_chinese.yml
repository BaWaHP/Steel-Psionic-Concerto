SPC_IS_regional_name_1:0 "东巴斯蒂亚"
SPC_IS_regional_desc_1:0 "§Y东巴斯蒂亚§!作为全巴斯蒂亚大陆上最为§C多元化§!的地区之一，一直以来都是文学作者笔下的§O主角§!。除了§O人类文明§!作为主体，这里还有种类繁多的§O亚人少数民族§!群落零散分布在各地，除此之外，远乡王国一带还有选择与人类合作的拥有一定程度的智慧的§O小型魔兽§!。\n\n§G气候温和，遍布着密集的树林和山地§!的东巴斯蒂亚在古代曾被视作重罪犯人的§R流放地§!，而那些罪犯的后裔，被称为沃姆人的民族在北方建立起了§O沃姆王国§!。这个由零散的定居点组成的国度的崛起曾是本世纪最大的新闻。当§Y世界大战§!的硝烟笼罩了巴斯蒂亚大陆时，废墟中站出来的不是什么传奇的英雄，而是虎视眈眈地渴望§R征服§!的§O沃姆王国§!，或者说是现在的§O沃姆帝国§!。发起了§Y东巴斯蒂亚大战§!的他们建立起了以自己，§O奥罗日亚联合王国§!以及§O吉拉尼亚公国§!为核心的§Y轴心国§!，对周边国家发动§R入侵§!并取得了相当显著的效果。可随着战争陷入停滞，他们非但没有取得自己想要的东西，还将国家的繁荣昌盛§R付诸一炬§!。\n\n向南望去，§O奥罗日亚§!，一个§Y荣光不再§!的古老王国，曾经统治着几乎整个东巴斯蒂亚大陆的他们却因为种种原因失去了自己的影响力。§O奥罗日亚联合王国§!的起源于中巴斯蒂亚帝国崛起时向东方迁徙的难民，周边的§O吉拉尼亚§!，§O皮奥瑞亚§!以及§O西莉迪亚§!都是如此。这几个国家曾经都是§O奥罗日亚联合王国§!的§R一部分§!，后来却因为种种原因§C分道扬镳§!。§O皮奥瑞亚共和国§!顺应了§Y巴斯蒂亚共和革命§!的浪潮宣布独立，现在成为了东巴斯蒂亚的§C民主灯塔§!；§O吉拉尼亚大公§!本就有谋反之意，以支持共和革命为借口同样宣布独立，现在成为了以大公为核心的§O独裁君主制国家§!；§O西莉迪亚§!的§R共产主义革命§!是§Y世界大战§!后东巴斯蒂亚§Y经济危机§!的产物，希望建立起§C伟大乌托邦§!的他们却同北方的§Y保皇派，保守派以及共和派§!陷入了§R内战§!。\n\n坐落于东方的§O远乡王国§!是由遥远东方§Y另外一片大陆§!的探险者的后裔建立而成。向往§C和平§!的他们似乎总能在危机中§G置身事外§!，可就算是这样，他们也难以走出§Y世界大战§!的阴影。§R经济衰退，失败的民主化改革以及贵族叛乱，§!远乡王国似乎再也§R不能§!像过去那样享受平和的日子了。\n\n在接下来的几年里，东巴斯蒂亚的国家们会尝试§Y走出接连不断的战争的阴影§!，并尝试§C扩大自身的影响力§!。无论是§R一度衰退§!的§O古老帝国§!还是尝试崛起的§Y北方民族§!，亦或者是§C遥远东方探险者的后裔§!，都无法在接下来的危机里§G置身事外§!。正是接连不断的§R战争§!让东巴斯蒂亚走到了今天这步田地，可想要打破当下的局面，似乎又一场§R大战§!是在所难免的…"

SPC_IS_regional_name_2:0 "南巴斯蒂亚"
SPC_IS_regional_desc_2:0 "南巴斯蒂亚，南巴斯蒂亚，我的故乡，我的摇篮...——南巴某地民谣。\n\n自巴斯蒂亚人类文明诞生之初，南巴斯蒂亚南部以她膏腴与饶沃的平原支撑起了在此地的人类的生存。在经过共和革命与伟大战争的而形成的新格局中，南巴共和国成为了南巴斯蒂亚的核心国家。\n\n作为共和革命最伟大的孩子，和巴斯蒂亚大陆上最为强大的强权。南巴共和国在漫长的历史中几乎每次都抓住了命运的馈赠，直到世界大战的到来摧毁了这一切。屈辱合约的签订让南巴与他的好兄弟——鲁萨尔联盟的关系逐渐冷淡，大战带来的后果几乎摧垮了他的经济。局势正向着南巴共和国所不能掌控的方向前进。联邦成员国们离心离德，托莱多，克拉亚诺，南北特尼安都在这表面平静的形势下暗流涌动。\n\n托莱多联邦深陷保皇派与亚人的影响之中，大元帅的威权政府似乎正在摇摇欲坠，而来自西莉迪亚的难民潮也在进一步冲击着这个国家。虽说大元帅正试图缓解紧张的局势，但或许早已有人对大元帅本人心怀不满......\n\n目光向北，克拉亚诺共和国的英雄，莫泽·赫卢东的生命即将走向尽头，而整个国家的局势也将因为他的去世而变得晦暗不明。各方势力都在蠢蠢欲动，共产主义者，民主政府，军队亦或是一些极端分子。都交织在这里，等待着时机到来的那一刻。\n\n将视角向西看去，半岛的局势正随着南方王国国王的选举与北方共和国的大选而变得愈发紧张，统一的钟声正缓缓敲响。对于南方来讲，这一次的王位选举可以带来稳定吗？还是对导致矛盾的爆发？对于北方来讲，这一次的总统选举是国家联盟继续执政，还是进步联盟执掌大权，或许是一些意想不到的势力上台......\n\n而鲁萨尔联盟正深陷工人与政府的对抗之中，只要一点小小的火苗，就会将这个名为鲁萨尔的火药桶引爆。政府数百年的压榨最终迫使工人们举起了反抗的旗帜，而政府为了联盟的稳定也举起了维稳的武器。内战的阴霾笼罩在鲁萨尔上空，这注定是一场你死我活的斗争。\n\n将目光放在东方，那里有着巴斯蒂亚帝国皇室最后的血脉：上维尔陶联合公国大公伊丽莎白。而她正在酝酿着她的改革，将上维尔陶变成一个足以发动统一战争的国度。让帝国的旗帜再一次飘扬在南巴斯蒂亚的上空。\n\n随着1998年新年钟声的到来，南巴斯蒂亚各国将迎来新的机遇与危机。没有任何一个国家能够独善其身，或许，只有塑造一个全新的秩序；才能解决南巴斯蒂亚所面临的问题。而新秩序是什么样子的，是谁塑造的？也许只有时间才知晓了..."

SPC_IS_regional_name_3:0 "提特兰半岛"
SPC_IS_regional_desc_3:0 "提特兰半岛是暴君的家乡，西南巴斯蒂亚组织化魔权暴政的根源，自诩文明的征服者，最狂热的宗教徒，我们已知世界人类最邪恶的那一部分——也是我的祖国。\n\n————节选自《血河：提特兰历史》，维森迈耶·瓦列里·塔吉诺著\n\n在半岛之上，除了定居已久的人类，也有大量§0坎达德尔四世§!迁移来的半人马；但是他们之间并没有非常严重的种族隔阂，他们都互相称呼自己为§O提特兰人§!，用宗教维系着超脱血脉的民族思想，也因如此，传统意义上的民族主义者在此地大部分地方并不受欢迎。\n\n从远古时代到§R坎达德尔崩溃§!，提特兰半岛一直以来都是§O提特兰帝国§!以及其后继者的沃土，§O纳卡教§!的影响深根在这片广阔的土地之上，无数古老的城市星罗棋布般在半岛之上屹立，而在§R坎达德尔崩溃§!之后，现在的提特兰唯余无数废墟与苦痛。无数次帝国间的阴谋与内战在这片土地上转瞬即逝，当中的人物模样皆消逝在了风中，只留下现在的残局，供各位欣赏：\n\n\n\n北提特兰\n\n“除一顶灰帽与祖国，我等别无他物；一阵寒风便可吹倒，我们可悲的肉体。”\n\n北提特兰包含了§8马加尔斯§!联邦与§0瓦莱菲奥丽塔§!自治区两个国家，以及§G蒙特§!§O韦尔德§!联盟的§G蒙特§!部分，他们曾经是北提特兰王国的一部分，但是在§R坎达德尔崩溃§!之后，§0瓦莱菲奥丽塔§!自治区作为§0坎达德尔§!王国的自治区屹立，而§0北坎达德尔§!王国，在1950年因为持续的混乱导致了§g弗拉维乌斯·弗沃茨瓦夫§!的边防军政变，政变彻底摧毁了§0北坎达德尔§!王国；但是乱局并没有结束，仅仅九年后，§g弗拉维乌斯·弗沃茨瓦夫§!遭到了他卫队中的阴谋家射杀后，从城堡的一门前膛炮里血肉模糊的发射了出去，这造成了§21959大革命§!，§t左派§!与§2共和派§!推翻了§g军政府§!建立了§3临时政府§!，但是仅在1959年的5月，§t左派§!与§R左翼共和派§!发起了“§t红色恐怖§!”，将大量§2共和派§!囚禁，导致§3临时政府§!内讧，再一次走向混乱。而在1960年，§g谢姆延·扎布罗夫斯基§!将军带领§W至高提特兰§!§O全军同盟§!发起了归乡战争，并在1960年年末夺回了家乡。\n\n\n\n中西提特兰\n\n“我们一同受难，我们一同生存，我们一同灭亡；我们共命运，死神便是最后一人。”\n\n中西提特兰只有§0坎达德尔§!王国一个国家，作为提特兰帝国的正统继承人，现在这般窘境如梦亦如幻，曾经帝国与王国宏伟的幻想早已破败不堪，曾经宏伟的城市在§R南巴§!§2斯蒂亚§!的火炮下被付之一炬，大量的难民在二十二个年头中什么都没有得到，政治的两党在议会中争吵着八百年不会通过的议案，§0坎达德尔十一世§!则只能望向先祖与穆勒斯，在书本与祷告中踱步；王国的混乱可见一鲜。\n\n而§R1995铅§!§O弹岁月§!是坎达德尔王国最难熬的一次灾难性事件，全国的左派与右派在各地投掷炸弹，构筑街堡，并且互相合作，组成了“§9白§!§R杨§!§O同§!§g盟§!”，一同对抗王国政府，但是这次暴乱在各国的干涉下花了一段时间平息，但“§9白§!§R杨§!§O同§!§g盟§!”并没有被真正消灭，他们依旧等待着推翻王国的时机。\n\n\n\n中东提特兰\n\n“疲惫不堪的肉体，毫无神志的大脑，行尸走肉般的我们”\n\n中东提特兰包括了§G蒙特§!§O韦尔德§!联盟的§O韦尔德§!部分与§6提特兰共和国§!，作为最靠近§R南巴§!§2斯蒂亚§!的提特兰国家，提特兰共和国从诞生之初就是§R南巴§!§2斯蒂亚§!在提特兰地区的傀儡，从1732年理想本心般的开始，再到1799年的梦碎、亦从1923年的剑锋，到1973年的疲倦；§6提特兰共和国§!已经经历了许多，无论是痛苦还是绝望都像是锁链般紧紧封锁着§6提特兰共和国§!的一举一动。国父赫克曼.丹特的雕塑矗立在大街之上，从高处看着这他建立的民主政权一步步地堕入地狱，完全在§R南巴§!§2斯蒂亚§!的操控下起舞。\n\n\n\n南提特兰\n\n“世界各国啊，我的家乡正在燃烧，然后毁灭，你们是否满意？”\n\n南提特兰是§R人间地狱§!。\n\n这里只包括了一个国家，§1伊斯恰军管邦§!。\n\n米诺陶们从墨瓦腊泥加而来，以伟大东征为号角，吹响了对提特兰人类的§R审判日§!。种族灭绝与奴役劳动在§1伊斯恰军管邦§!根本称不上“事”，疯狂的§g僭主派§!米诺陶§O奥德修斯·伊斯恰·苏佩尔比亚§!正在海外用武力建构他的伟业——在巴斯蒂亚大陆上建立米诺陶的国家，将§g共和派§!米诺陶在世界大战后无力的尝试把人类视作二等公民的想法彻底摧毁。\n\n§R南巴§!§2斯蒂亚§!共和国与§g修卡利翁§!同盟以及§9七§!§2河§!联邦的命运深深地关联着提特兰的命运，一旦这三位可憎的霜巨人倒下，他们所带来的冲击将会重新燃起§O提特兰统一§!的火焰，§O圣徒§!与§1罪人§!们觥筹交错，§O狂人§!与§0疯子§!们狂欢起舞，火焰将会燃尽腐朽，直到火焰在燃烧中熄灭，亦或者这可怖的魔火被投向那§R瓦尔§!§2哈拉§!的§1金宫§!……"

