LNR_another_knife_tt2:0 "获得修正：§Y赤色双刃剑§!，其效果为：（单位防御：§G+5.00%§!，政治点数获得：§R-25.00%§!，陆军组织度恢复：§R-20.00%§!，稳定度：§R-15.00%§!）。"
