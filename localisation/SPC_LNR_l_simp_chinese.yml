LNR.1.t:0 "主编的苦恼"
LNR.1.d:0 "丹特城是勒泰特尼安这个宗族势力强大的国家里为数不多的宗族势力不敢太猖狂的地区。但这并不意味着宗族势力就没有办法施展影响力了。例如代表着宗族地主利益的国家联盟、被宗族地主控制的警察以及由地主雇佣的喉舌。《月亮周刊》就是这样的一家媒体。大选投票即将结束，进步联盟的总统候选人加瓦·阿杜勒的美名家喻户晓，如果不出意外的话，加瓦·阿杜勒将击败试图连任的莫里斯总统。但如果能够挖出这位德高望重的“白水将军”的黑料的话，人们必将惊呼：原来他只不过是又一个伪君子罢了！因此，《月亮周刊》的主编正在想办法挖出加瓦·阿杜勒的黑料，但所有的努力皆宣告失败：加瓦·阿杜勒真的是个正人君子。\n\n主编陷入了巨大的苦恼：这不可能！在丹特，没有哪个官员是干净的！没有哪个人没有不可告人的秘密！一个官员只要有半点不干净的地方，他就一定有办法查出来！可目前他掌握到的最有价值的加瓦的黑料也就是他和父亲恶劣的关系了——可这个已经用了！民调显示加瓦依然是绝对的优势！\n\n“难道勒泰特尼安真的出圣人了？”主编喃喃自语着。难道要他编黑料出来吗？没用的，进步联盟里有的是知道怎么对付谣言的笔杆子。用加瓦·阿杜勒那糟糕的父亲做文章？这相当于帮加瓦·阿杜勒解释为什么他和父亲关系差。利用加瓦有军方背景这一点声称他的当选会导致军人干政？这或许可行，但不知道为什么，资助他的地主们真诚地建议他不要这么做。难道要说他在带领海军陆战队期间审讯罪犯的手段太过残酷吗？考虑到勒泰特尼安的国情，这恐怕会让加瓦·阿杜勒更受欢迎。\n\n“要不，干脆就让他当总统吧。”主编冒出了这么一个想法。他在这段时间采集到了许多加瓦的信息，当他把这些信息整理到一个本子上时，他惊讶的发现自己似乎在不经意间写成了一部优秀的传记类小说。翻阅了一遍遍后，他感到自己有些不对劲，他的良心似乎在痛：他真的要与这样一个仿佛活在传说中的英雄为敌吗？算了，就算莫里斯这头四眼猪当不上总统他也不会有什么损失。至于那帮要求他卖力诋毁加瓦的土财主们，自己有的是办法糊弄他们：用加瓦那糟糕的父亲来做文章吧！想到这里，主编茅塞顿开，工作一下子就简单多啦！"
LNR.1.a:0 "反正这是合法行为。"

LNR.2.t:0 "莫里斯的礼物"
LNR.2.d:0 "莫里斯坐久了或是心烦意乱的时候往往会站起身来走到窗边眺望窗外的景色以放松身体和心灵。但最近几天这招实在没法起效。这几天，每当莫里斯望向窗外时，看到的都是进步联盟的竞选活动和反对国家联盟并要求政府拿出救济粮的示威游行以及随后的警察镇压——看到这些只会让莫里斯更加烦躁。\n\n现在，莫里斯在又一次见到了窗外的游行后拉上了窗帘，大口大口地喘着粗气，一张胖脸因烦躁的心脏而颤抖着。他看向桌上堆积如山的各种文件，长长的叹了一口气。他想起了即将结束的大选投票，如果不出意外的话，他恐怕是要输掉大选了。尽管进步联盟一次次地公开怀疑国家联盟在以往的大选上舞弊，但事实上，双方都知道，国家联盟一次次的赢得大选靠的是普及到每个村庄的投票站点。而在勒泰特尼安这个落后的国家里，农村人口远超城市人口，而农村由宗族地主控制着。农民们在地主无声的注视下只能将票投给代表着地主利益的国家联盟。于是，国家联盟总能一次次地合法的赢得大选，维护自己执政党的地位根本不需要在大选上舞弊。但现在不同了，饥荒和赤匪正在摧毁着一个又一个村庄。许多农民逃进了城里，这使得他们暂时逃离了地主的掌控并有能力将票投给别的政党。而城市里的人在经济危机时期根本不可能继续支持无能而残忍的国家联盟。各个反对党又在这个时候组成了进步联盟让加瓦·阿杜勒成为他们支持的总统候选人。总之，现在加瓦拿下的选票已经远超莫里斯了。\n\n事实上，一开始莫里斯倒也不是没有扳回支持率的办法。他曾尝试着让地主把存粮以平价卖给政府用作救济粮。只要救济粮发下去，一切都会好起来的。结果这一想法遭到了地主们的强烈拒绝，他们声称这些粮食已经有鲁萨尔的顾客买下了，一旦转售出去他们将严重违反契约。事实上，鲁萨尔最近确实有在大量进口粮食，但地主们不可能个个都同时联系上了鲁萨尔的买家。这样做的原因只有一个：囤货居奇，粮食的价格只会越来越高。结果是饥荒依旧肆虐，一个又一个地主即便是被赤匪和乱民杀掉全家也不愿把粮食卖出去，更有甚者在被杀掉之前烧光了库存的粮食……\n\n“妈的！”想到这里，即便是以没脾气和擅长妥协著称的莫里斯也暴躁的把桌上的文件甩到了地上。“这帮蠢货，找村民玩过家家也就算了，还他妈要把整个国家当儿戏！出钱出人扣扣搜搜，要帮忙时狮子大开口！老子一个个的求你们我容易吗我？天天搞私兵我也忍了，赤匪来了还一个个的不愿把私兵拿出来一起对抗赤匪，结果呢？被各个击破啦！天杀的陆军啊……哪怕是到乡下缴个匪都要开个价，收了钱连土匪都打不过。结果老子还得去求加瓦带海军陆战队进山里剿匪。全南巴都在笑话我啊！”\n\n在发了一通脾气后，莫里斯逐渐冷静下来去捡地上的文件。但捡文件时，他注意到了一份与众不同的文件——一份写着成功的文件——桑德瑟兰铝矿勘探成功完成。\n\n“铝矿……铝矿好啊……整个南巴都缺铝矿，相信南巴的商人们很快就会带着投资前来开发。这也许不能拿来提振我的支持率，但它一定要尽快开发，这或许能刺激糟糕的经济。不过，我国的矿物贸易管理实在混乱……”想到这里，莫里斯下定了决心，他要趁着这个机会推行他早就想推行的矿物贸易法案，这将会是给下一任总统的礼物——无论这个总统是谁，无论他是否愿意。"
LNR.2.a:0 "“总会有人为国尽责的吧，对吧？”"

LNR.3.t:0 "火红的婚礼"
LNR.3.d:0 "尽管饥荒仍在勒泰特尼安肆虐，但这并不妨碍一些人大摆筵席，而这些筵席自然与那些饥饿的人无缘。不过，在今天的桑德瑟兰，有一场婚宴并非如此。无论是谁，只要愿意为新郎新娘送上祝福，就可以享用婚宴的饭菜。因此，这场婚礼吸引了附近无数饥饿的人，在无数人的欢呼中，年轻的新郎新娘挽着彼此的手走上了宴会的高台。他们穿着的婚服乃是由对方的双手所织，简朴而富有美感。有些奇怪的是，与勒泰特尼安的婚礼习俗不同，这场婚礼没有神父主持，但宾客们自然不会在意这些细节，他们只希望这场宴会永不结束。\n\n当地的大地主办婚宴时会请戏班子之类的人在宴会上表演节目。从这场婚礼的排场来看，新郎的资产恐怕不比那些大地主少。很快，新郎就在高台上宣布焰火表演即将开始，但是，与一般的由几个杂耍演员主导的焰火表演不同，这场表演将让所有人都有机会参与——这样就更喜庆了嘛！\n\n“那么，怎么参与呢？”台下的人们笑着问他。\n\n“众所周知，想要生火，就得有三个基本要素：空气、温度、可燃物。空气自然由大自然赐予，温度自然由小弟我来负责点火，而这个可燃物嘛，就请各位贵宾来提供哈！”\n\n“我们穷的什么都没有，哪还有什么可燃物啊！”\n\n“话哪里能这样讲呢？各位穷，就肯定有欠条啊地契啊田契啊之类的东西，这些都是可以烧的嘛！”\n\n“嗨呀，靓仔啊！这些东西都在老爷们手上，我们哪里拿的来给你哦！”\n\n“嗨嗨，你们先别想这个，就问你们，要是有机会把这些田契欠条都烧掉，都一笔勾销，你们想不想这么做啊！”\n\n话音刚落，刚刚还在喧闹的人群一下子变得鸦雀无声。他们已经猜到自己吃的是什么人的饭了，但他们的嘴巴依然没有停下。在一段恐怖至极的沉默过后，一个瘦的皮包骨的老妇人站了出来：“要是烧掉就真的能一笔勾销肯定是最好的啊！可我的欠条都在城东奥利老爷家，我怎么拿给你烧？你这么有钱，你肯定也有这些东西吧？你怎么不烧自己的？”\n\n新郎喜出望外地看着这位老妇人，他拍了拍手，十几个人便将几个大箱子扛上了高台，而那箱子里装的是无数人的欠条、田契，新郎和“手下”们将这些文件一一分发给了在场的宾客，当宾客们拿到这些文件后，他们惊讶的发现这些田契欠条真的是自己的。这时，新郎再次发问：“要交给小弟我烧吗？如果还没有人给我的话那这场婚礼就实在没有节目表演了，小弟我就只能告辞了昂！”\n\n人们面面相觑，一开始，他们甚至没有意识到这是他们这辈子第一次拥有选择人生乃至民族未来的机会，但很快，就有一些人将自己的欠条和田契交给了新郎，新郎则笑着将纸张串在一起并将其点燃，开始了火焰舞蹈。很快，越来越多的人意识到，这场宴会决不能就这么结束，随着越来越多的田契和欠条在火焰中燃烧，宴会的气氛也逐渐达到了高潮：一些有头有脸的大人物被绑着送上了高台，他们都是这些正在燃烧的文件的主人，其中就包括城东的奥利老爷。这时，新郎又说话了：“有人问我，我这么有钱，怎么不把我借给别人钱的欠条拿出来烧了？这是个误会呀！小弟我以前确实有钱，可那些东西我早就烧了！现在的我啊，是真不富裕。这次婚礼还是那些田契被我烧了的人出资支持的！如果不信的话，我可以请他们出来作证的！整个瓦拉瓦岭的农民都可以为我作证的！”\n\n话说到这里，新郎的身份已经昭然若揭：索雷尔·卡彭，农工革命党的领导人。但这对众人而言已经不重要了，他们只希望这场宴会永不结束，最好还能开遍全世界。"
LNR.3.a:0 "哪怕他们清楚，天下没有不散的筵席。"

LNR.4.t:0 "丹特的骚动"
LNR.4.d:0 "随着1998大选的到来，首都丹特的政治气氛变得愈发躁动不安。革命派、保守派、进步派都在盯着这次大选。按照“惯例”，保守派总是能够赢得总统大选，但现在人心思变，有些极端分子恐怕会趁势崛起并在大选进行时做出一些危害国家的事情。因此我们必须在首都增加安保力量。那么，具体该怎样调动呢？"
LNR.4.a:0 "让首都警备队准备好！军队和警察一起总是稳妥的。"
LNR.4.b:0 "打点好警察，增加警力就够了。"

LNR.5.t:0 "军人的合法干政"
LNR.5.d:0 "几乎每个人都有自己崇拜的人，首都警备部队司令奥古斯都·皮特也不例外。而现在，他一生中最崇拜的人就坐在他的面前。他上扬的嘴角抽搐着，仿佛像是在尽可能地维持一个成年人的成熟与体面，但他还是像个大孩子一样（他已经40岁了）磕磕巴巴地喊了出来：“加瓦·阿杜勒大哥！您来这是……”\n\n坐在他面前的加瓦·阿杜勒笑了笑，拿出了一份份文件与相片。\n\n“别激动，我是来找你报案的。”加瓦将这些文件与照片递给了奥古斯都，仿佛他们一直都是可靠的伙伴。奥古斯都才刚接过文件，不曾灵光的大脑就已经飞快地脑补起了自己一小时22分破案的英姿以及加瓦的认可，但当他把目光放到文件上时，他的大脑又开始罢工了——懒得看，看不懂，但为了给大哥面子还是装作认真在看的样子。\n\n“首都警备部队要和丹特警察一起维护大选期间秩序，对吧？所以，我想，阻止他人破坏大选自然算是你的工作范畴内吧？”\n\n“那是当然了！”\n\n“那好，我已经发现了几个试图破坏大选，篡改选票的犯罪分子以及他们的活动地点，如果放任不管的话，大选的公正将被破坏。我刚刚给你的文件就是证据，现在，我以一个公民的身份希望你能为了你的祖国把这些犯罪分子绳之以法。”\n\n“当然！大哥您放心，马上就去把那帮赤匪抓起来！”\n\n“等等等等！你怎么知道他们是赤匪？我给你的文件里面没说到这一点啊？”\n\n“嗨呀，大哥，您想啊，您是一定能当选的。您要是当选了，赤匪不就完了？我要是赤匪，肯定要让莫里斯那个肥猪继续当总统啊！”\n\n“那，要是那帮人其实是莫里斯的人呢？”\n\n“那就说明莫里斯串通赤匪！”奥古斯都不假思索地得出了答案。\n\n加瓦终于“噗嗤”一声笑了出来，奥古斯都则将其理解成了肯定与赞许的笑容。\n\n“等我的好消息吧，不会让您失望的！”奥古斯都兴奋地冲出了门外。\n\n之后他成功抓到了人，加瓦还请他吃了很多饭。但他想不明白，为什么加瓦一直坚持要他说出自己想要什么职位，国家联盟总有人骂他是个叛徒。"
LNR.5.a:0 "管他呢，老子又没做错事！"
LNR.5.tt:0 "§C进步联盟赢得大选！§!"

LNR.6.t:0 "千钧一弹"
LNR.6.d:0 "今天的丹特格外热闹，只可惜这种热闹并不意味着新年的喜庆，而是对成功连任的莫里斯总统的愤怒。无数的人走上了街头，举着这样或那样的牌子，喊着那样或这样的口号，仿佛永远也不会力竭。\n\n“他们也就这点能耐了。被警察揍几棍后就会跑，然后忙了一天发现什么都没有改变。”莫里斯鄙夷地看着他们，又看了看环绕在身边的警卫，开始了他的就职演讲。\n\n但很快，远处传来几声巨响——有人开枪了，随后远处便升起了一缕缕绿烟。莫里斯知道那是什么：高浓度毒气。但，没有他的许可，这些武器也不应该被使用才对。很明显，远处发生了什么不得了的事。\n\n还没等莫里斯把注意力转回面前，他就听到了人群越来越刺耳的吼叫声——不知何时，愤怒的人群已经冲破了外围警察的防线，正在向他涌来。\n\n“允许开火！”莫里斯没有多想，他知道，只要枪一响，这些高叫着要改变世界的庸人们立刻就会意识到自己的渺小然后做鸟兽散。事实证明，当机关枪开始吞吐火焰的那一刻，这次游行就宣告结束了，刚刚还把现场挤的水泄不通的人群立刻如烟般消逝。只是，有一个人夺过了一名外围警察的枪，抬起手向正在逃窜的莫里斯打了三枪：两枪打空，一枪命中心脏。很快，此人便在混乱中被射杀。\n\n倒在地上的莫里斯感受着身体愈发变得冰冷，意识逐渐如掌中的流沙般流逝，有那么一刹那，他觉得自己可能会变得越来越轻松，但看着陷入黑暗的勒泰特尼安，他意识到，自己恐怕还要为这个国家服务好一段时间——自己正在坠入地狱，勒泰特尼安紧跟其后。"
LNR.6.a:0 "秩序渴望鲜血。"
LNR.6.tt:0 "§O国家联盟再掌乾坤。§!"

LNR.50.t:0 "消灭饥饿"
LNR.50.d:0 "赫奇是一个好人吗？没人觉得他是，包括他自己。如果说助人为乐是每个好人的本性的话，那么损人利己便是赫奇这样的恶徒的灵魂。但无论旁人怎么讲，赫奇总统都很清楚，他不是一个独裁者。无论他干过多少卑劣的勾当，他都依然是一个民主国家的合法总统。他终究要对那些支持他上位（尽管他不太愿意当这个总统）的人负责。如果他的支持者要求政府消灭饥荒，那么即使是他也必须照办。\n\n但，如何消灭饥荒呢？\n\n首先，共和国的财政状况已经濒临崩溃。南巴斯蒂亚共和国很乐意为勒泰特尼安提供低价粮食，但款项不得拖欠。考虑到勒泰特尼安的信用评级，南巴有这样的要求很正常。但即便有了南巴方面的政策优惠，勒泰特尼安的国库依然无法负担这一支出。而向外国请求更多贷款更是不可能，没人乐意把钱借给一个贫穷且不守信用的人。\n\n如果不能进口粮食，那就只能对“拥粮自重”的宗族地主们下手了。根据勒泰特尼安法律，勒泰特尼安的总统确实可以签署法令强行征购私人财产。但这项法令必须经过参议院的同意。而参议院里到处都是地主的代言人……这就是为什么饥荒迟迟得不到解决。但赫奇绝非莫里斯那样的泛泛之辈，他拥有着庞大的人际关系网。只要他决心要让这一法令通过并得到落实，他就一定能找到办法。当然，这也会让他欠下不少人情债。在打通各路关节时，他恐怕还得自掏腰包。\n\n还有一个不是办法的办法，那就是阻止饥民逃荒。毕竟勒泰特尼安又不是个真的没有余粮的孤岛。只要阻止混乱蔓延，饥荒终究会自行消失的。而要求政府赈济饥荒的人也会看到政府的“努力”从而闭嘴。这样做，对赫奇而言他会得罪的“生意伙伴”最少。对国家而言，花费也是最少的。\n\n赫奇终究还是签署了他任上的第一条总统法令："
LNR.50.a:0 "“让他们把手里的粮食卖掉吧，不然国家真的会完蛋的。”"
LNR.50.a.tt:0 "§Y经济危机§!追加效果：\n每周稳定度：§G+0.40%§!\n稳定度：§G+5.00%§!\n每月人民生活水平点数增长：§G+7§!"
LNR.50.b:0 "“让军队和打手禁止饥民逃荒，说不定还能抓到给他们运粮食的赤匪呢。”"
LNR.50.b.tt:0 "§Y经济危机§!追加效果：\n每周稳定度：§G+0.20%§!\n每月人民生活水平点数增长：§G+3§!"

LNR.51.t:0 "各退一步"
LNR.51.d:0 "如果要问赫奇他最烦什么人的话，他的真正答案一定是“加瓦·阿杜勒”。他是人尽皆知的罪犯总统。而加瓦是嫉恶如仇的白水将军。加瓦给他带来的麻烦不计其数。至于为什么加瓦到现在都没有把他抓起来，与其说是他找不到赫奇的犯罪证据，倒不如说是赫奇的人际关系足够有威慑力。一想到加瓦差点当上总统，赫奇心里就后怕。\n\n但现在，满脸阴沉的加瓦正坐在他的面前。赫奇心里并不希望加瓦真的前来赴宴，毕竟，说不定加瓦前来赴宴是来杀他的……\n\n赫奇举起酒杯，率先打破了沉默：“首先，非常感谢阁下前来……”\n\n“有话直说。”加瓦粗鲁地打断了他。赫奇只能硬着头皮扯起嘴角继续着谈话：“快人快语，很好！国家动荡，赤匪作乱。联邦疲弊，无力支援。你我二人，皆是人民的公仆。值此国难之际，我们唯有戮力同心，才能救祖国母亲于危难之间，不让她落到赤匪手里啊！”赫奇说的是真心话，因为他明白，加瓦乃是共和国最优秀的将领，也是进步联盟的领袖。没有他的帮助，自己没法让这个国家渡过难关。\n\n“说的好啊。话说你这里有汽水吗？”\n\n赫奇大喜，这单生意大概是稳了！他亲自拿出了从摄图进口的苹果汽水，向加瓦走去：“看来您是真的喜欢这个啊。您也应该听说了，最近七河那边不太平……摄图的汽水都停产了。这还是几个月前的存货呢……”加瓦将手伸向赫奇，正当赫奇以为他是要接过汽水时，加瓦却突然将手伸进了赫奇的嘴，徒手将他的半颗门牙挖了下来。\n\n赫奇惊讶而痛苦地叫喊着。正当他以为自己要被加瓦杀掉时，却见加瓦将那半颗门牙扔出了窗外，高喊道：“太阳神在上！予您的儿女慈悲！”\n\n赫奇一下子明白了他的意思：在古代，特尼安人曾有以决斗了结恩怨的传统。决斗开始后，先提出求和者必须要自愿让对手切下自己半颗门牙才能继续求和。而对手切下求和者的门牙后必须向太阳神宣誓自己接下来将信守承诺。当然，这肯定也有单纯地想揍他一顿出气的因素。但总的来说，加瓦算是愿意和他合作了。加瓦向他伸出了手，赫奇则赶忙握住了他的手，生怕慢一点的话那双手又会朝他的脸伸来。"
LNR.51.a:0 "这个国家好像没有能补半颗牙的牙医。"

LNR.52.t:0 "痛苦之日"
LNR.52.d:0 "泰勒是个幸运的人，至少他是这样认为的。出身卑贱，却成功靠着远房亲戚的关照进入了勒泰特尼安共和军。尽管军队里的日子过得苦，长官还经常打骂下属，克扣薪水，但好歹还有日子过。在军营外，饿死的人不计其数。还有一些没饿死的穷人，过得也是生不如死——他见过附近桑德瑟兰铝矿的工人。如果自己没有进入军营，恐怕日子也不会比他们更轻松。尽管自己厌恶着身边的一切，但不可否认的是，他是靠着他讨厌的事物才活到现在，同时自己的所作所为正在维护着这些腐朽的存在。\n\n但现在，他厌恶的、依赖的事物正在他眼前瓦解，过去的日子如流水般一去不回。他呆呆地看着眼前仿佛地狱般的场景，哪怕长官已经倒在了他的面前，他还是不能接受赤匪已经杀到眼前这个事实。\n\n怎么可能呢？难道他不是身处在一个和平的国家吗？难道这些赤匪真的以为自己能推翻共和国吗？难道他们连联邦都不怕吗？明明只是一伙暴动的矿工加一群躲在深山的匪徒而已，却能在短短几天内将整个桑德瑟兰州的共和国势力消灭掉。长官生前好像还说过，有很多友军部队突然反水，还有很多村庄与小镇一下子失去了联系。用膝盖想都知道，这些人早就和赤匪勾结了。更要命的是，这一切就发生在他们眼皮底下，而他们与高层却浑然不觉！\n\n他该怎么办呢？他们似乎是桑德瑟兰最后的政府武装了。他们试图固守城市以等待救援。他们点燃大量耐燃垃圾以用作路障，结果被身上绑着炸药包的工人炸掉了。后面的赤匪不顾掉落在面前的燃烧物冲了过来。共和军试图用毒气阻滞赤匪的进攻，可他们不怕毒气似的冲了过来。这些赤匪仿佛自地狱而来的厉鬼，伴着一阵阵怒号不顾一切地向他们扑来。已经被吓破了胆的共和军只能试着与他们进行白刃战，却被赤匪杀了个溃不成军。\n\n现在，泰勒身边已经没有活着的战友了。他不喜欢这些人，可此刻，他却有那么点希望这些人还活着。但一颗子弹在此时划破了他的脸颊。求生的欲望强行压过了他的迷茫与恐惧，他终于开始冷静地思考自己该怎么做。之前听说赤匪优待俘虏，可想到刚刚向他冲来的那一张张扭曲而愤怒的脸庞，他又有点觉得长官说的对，赤匪真的都是魔鬼。但现在还有比这更好的选择吗？就在他还在纠结的时候，一个不容拒绝的声音在他身旁响起：\n\n“你愣着干什么？”\n\n泰勒有些惊讶，是长官，他还活着！但他似乎在拿地上的枪。\n\n现在，泰勒必须立刻作出抉择。是杀死眼前的长官用作投名状，还是正在靠近的赤匪。同时，他还得准备一下说辞……"
LNR.52.a:0 "为了人民，拥抱革命。"
LNR.52.b:0 "为了民主，坚守阵地。"

LNR.53.t:0 "风停火熄"
LNR.53.d:0 "在这些日子里，桑德瑟兰已然化为地狱。所以，赫奇借着慰问士兵的名义兴冲冲地来到了这里，这里的一切都能让他感到愉悦：燃烧的村庄、堆积如山的尸体、被共和军拽走的妇女的尖叫、满载而归的士兵、被吓怕了的幸存者、以及对“赤匪”的处决。看来，允许劫掠的策略实在有效。执行起来的效果比他想象的还要好。\n\n现在就有几个士兵在他面前烧杀抢掠，那几个士兵见总统来了，还递上了刚刚抢来的烟。赫奇笑着接过了士兵的礼物，他感到自己实实在在地受到了这些士兵的尊敬。\n\n“报告总统阁下，”一个左手抱着一袋面包的士兵，用右手向他敬了个礼“前面是敌军领导人的尸体，请问您有兴趣看看吗？”\n\n“那当然了，带我去看看！”就这样，他们一路有说有笑地走过了尸山血海，来到了被吊在树上的索雷尔·卡彭的面前。他和他的妻子都被剥了皮，吊在同一颗树上。尽管被剥了皮，赫奇依然能确定眼前的尸体就是索雷尔。\n\n“话说，我听说他还有个刚出生的孩子，那孩子呢？怎么不让他们一家团聚？”\n\n“报告总统，那个小畜生刚刚被友军剁碎了，挂不起来。”\n\n“哈哈哈哈哈……”众人捧腹大笑。笑着笑着赫奇想起了一件事：“话说，这些个赤匪顽固的很，还分了什么什么派。你们有没有确保这些派系领袖也被杀掉了呢？”众人呆呆地摇了摇头。赫奇也不生气，而是如闪电般掏出了手枪射向右手边的草丛，草丛里随即传来了一声惨叫。赫奇则亲自冲进草丛里把那个人拖了出来。这一切发生的如此迅速以至于那几个士兵还没反应过来发生了什么。\n\n“这个头目的悬赏金呢，我就收下了！不过分吧？”赫奇一边把那个人绑起来，一边对那几个士兵说：“谁让你们反应慢呢？知道这是谁吗？塞克！农工革命党里最混账的一个！”\n\n塞克已经精疲力竭了，连及时自杀都做不到。现在，他只能眼睁睁的看着自己在生不如死的刑罚中和索雷尔那个蠢货在地狱会师。\n\n“等等，我可以告诉你残存的赤军往哪里逃了……”\n\n“赤匪的嘴，骗人的鬼！现在才知道投降？”赫奇徒手将塞克的舌头拔了出来。现在，农工革命党已经覆灭。残存的小股势力很快就会在宗族地主的汪洋大海中死伤殆尽。留着眼前这个老畜生只会徒增工作量。在旁人的掌声与感谢中，赫奇结束了自己的假期。但当他得知加瓦·阿杜勒因不忍心对桑德瑟兰实行“地毯式剿匪”而辞职后，他乐不可支地再次回到了桑德瑟兰主持清剿工作。望着眼前的焦土与腐尸，他感到自己或许真的爱上了当总统的感觉。也许，自己可以试试连任两届？毕竟，还有很多“赤匪”呢！"
LNR.53.a:0 "他们罪有应得。"

LNR.100.t:0 "海斯特里墓前"
LNR.100.d:0 "在总统就职典礼结束后的第七天凌晨，加瓦·阿杜勒支开了自己的保镖，独自来到了丹特城郊的高伯隆公墓。冬天的凌晨五点黑暗而寒冷，他走过一个又一个被积雪点缀的墓碑，最终在一块几乎被雪堆完全埋没的墓碑前停了下来。加瓦的老朋友，《勒泰特尼安现代史》的作者海斯特里长眠于此。\n\n加瓦从大衣里拿出了几颗糖、一瓶酒还有两个杯子放在了墓碑前面。然后，他拿起铲子开始铲覆盖了墓碑的积雪。当铲子刺进积雪时，记忆如潮水般涌向了他的脑海。\n\n他想起了这几颗糖的来历，那是就职典礼上一个男孩送给他的礼物。他知道，男孩之所以送他糖果不是因为他当上了总统，而是因为他在三个月前去往海斯特里住处的路上将那个孩子从人贩子手里救了下来。将那个孩子送回他父母身边后，他继续前往海斯特里的住所。就在他即将敲门的那一刻，他听到了屋内的枪声。当他撞开门后，他看见了已经饮弹自尽的海斯特里以及刚刚完成的《勒泰特尼安现代史》。那本《勒泰特尼安现代史》被翻到了最后一页：勒泰特尼安这个孩子在仇恨与痛苦中成长，也会在仇恨与痛苦中灭亡。\n\n然后，加瓦帮他出版了这一史学巨作。加瓦试图找到他的家人或是亲戚参加他的葬礼，最终却只有加瓦和几个学者出席了他的葬礼，就连花费也是加瓦承担。\n\n很快，加瓦铲干净了积雪。他望向夜空，几片雪花落入了他的眼睛。他不是个多愁善感的人，但他至今仍然不能接受挚友的自杀 。\n\n在海斯特里生命中最后一个月里，他和加瓦谈到了1998年大选，加瓦半开玩笑的问他：“你觉得我能改变这个国家吗？要是我当上总统了，肯定要请你当我的内阁顾问！”海斯特里久违的笑了：“我只知道，如果一个孩子在仇恨与痛苦中成长，那他也会在仇恨与痛苦中灭亡。勒泰特尼安就是这个孩子，我也是。”\n\n这也是《勒泰特尼安现代史》的最后一句。\n\n“老兄啊……”想到这里，加瓦的双眼已经湿润：“我相信，你是勒泰特尼安最博学的人，但唯独这一次，我要证明，你错了！我相信，你也希望自己是错的吧？我真的很想问你，如果那天你能晚一点……不，如果我能早一点走到你家的话……”\n\n在一阵沉默过后，加瓦离开了，他没有时间在这里待太久。月亮已经悄悄地离开了天空，而他还得想办法让祖国见到明天的太阳。"
LNR.100.a:0 "似是悼念，似是誓言"

LNR.101.t:0 "来自左翼的盟友"
LNR.101.d:0 "当崔斯可·卡佩在内阁会议开始发言时，几乎所有的人都对这个社会主义者嗤之以鼻。但当崔斯可结束发言时，他们又收起了自己的轻蔑。他们不是在惊讶崔斯可关于经济改革的激进发言，而是在惊讶崔斯可实在太不像一个左翼分子了。\n\n“我承认他是很有本事，但我还是想知道工党是怎么敢把他选为党首的。或者说，他这样出色的人为什么要自称是一个社会主义者？”自由党党首、肥沃农业集团的董事长维鲁看向了身旁的加瓦·阿杜勒。加瓦无奈地耸了耸肩：“他已经解释过很多遍了吧？他是一个社会主义者，但他首先是一个务实的经济学家。他和工党都认为现在不是实现社会主义的时候，得先把地主阶级消灭掉再谈别的。这也是为什么他会和进步党与自由党联合为进步联盟参加选举。”\n\n“这点我知道，但社会主义思想和“务实”不应该是互斥的吗？尤其是在经济方面。”\n\n“如果我连资本主义经济都搞不明白，我有什么脸面说自己是个社会主义者呢？如果您是在说笑的话，我要说，您这个笑话真烂。”不知何时，崔斯可已经走到了维鲁的身边：“您应该不是那种意识形态优先的人吧？”\n\n“当然不是，我只是觉得这实在是个惊喜：我们的左翼盟友比我们想象中的要可靠。”\n\n看着两人的贫嘴，加瓦无奈地挠了挠头。一个是代表着商人利益的大资本家，另一个是深受工会认可的经济学天才，他们能够和他这个公认的战争英雄联合起来对付宗族势力实在是一个奇迹。可问题在于，当斗争的矛头指向农工革命党时，这个进步联盟还能维持团结吗？地主阶级被消灭后，工党还乐意当一个只有改良作用的在野党吗？宗族地主对进步联盟的污蔑不计其数，唯有一个谣言杀伤力足够可怕，那就是串通农工革命党。如果加瓦没有在1995年手刃农工革命党领导人格雷齐亚的话，这个谣言的杀伤力恐怕会强上无数倍。\n\n崔斯可似乎是看出了他的担忧，他将双手搭在加瓦和维鲁的肩膀上，放低了声音：“我知道你们在想什么，我已经和几个工党核心人员商量好了，我们将永远履行放弃暴力革命的承诺。这件事还是不要告诉别人比较好。”\n\n“你说的对，但工会成员的枪是不是太多了点？”维鲁觉得自己说了句俏皮话，但眼前的两人明显一点也不觉得这很好笑。他只好转移话题：“咳咳，这个不好笑。我们还是谈谈实际问题吧，比如刚刚崔斯可提到的企业扶持计划……”"
LNR.101.a:0 "机缘巧合下的盟友……"

LNR.102.t:0 "魔鬼之死"
LNR.102.d:0 "调整诸元、汇报给下级、捂上耳朵、等烟雾散开、调整诸元……炮兵班班长的工作基本就是这样，和流水线上的工人也差不多。但泰勒至少赚的比他们多——即使算上克扣的话。更何况，泰勒觉得这份工作比拧螺丝有意义多了。正是因为他们每一个同赤匪英勇战斗的共和国战士，加瓦·阿杜勒总统才能稳坐钓鱼台，把勒泰特尼安从贫穷和落后中拯救出来。\n\n这一天的工作很快就完成了。事实上，他这一天已经做完了近期最后一点任务。对于赤匪根据地的进攻即将收尾，正规军的火力优势已经基本摧毁了赤匪的老巢，今晚步兵就能夺下这个根据地了。这也是为什么他选择了拧开口袋中的酒瓶，递给他的下级们。胜利当然要搭配美酒了。\n\n不过他们并没有开心很久，泰勒中士的上级、炮兵营营长突然来了。他拿起酒瓶，作势要掏出手枪来惩戒触犯军令的士兵，但突然又笑了起来。“你们这几天做的不错，我就当什么都没看见，下不为例。不过，胜利可不是只需要美酒来衬托。走，跟我上山！”\n\n泰勒并不想跟着营长上去，但那可是执掌生杀大权的营长。他们几个就拿起了酒瓶，跟着营长爬山。血迹与焦土散落在林间小路上，让泰勒有点反胃，不过那几个被酒精迷糊了的笨蛋显然不这么觉得，营长更是兴奋地哼起了小曲。“你们都记好了，我们可是官兵，买东西是要付钱的！不过赤匪的女人嘛，总是很便宜的，留个一块两块就够了。”营长把最后一点烈酒咽下，酒瓶彼扔到弹坑中。\n\n然而，当他们进入前根据地时，营长也吃了一惊。村民们没有害怕地躲起来，而是站在门前愤怒地看着他们。“真是无法无天……赤匪果然都是恶魔的信徒……”营长嘀咕了几句，穿过几间被炮火炸的只剩残骸的民房，走向一个年轻的姑娘。“大姑娘啊，我们是官兵，听说你们家私藏了赤匪，我们要进来——”\n\n清脆的巴掌声响起，营长惊愕地看向姑娘。他很快就反应过来了，掏出了手枪。泰勒闭上眼，他以前在村里的时候也遇到过这种事。\n\n枪响了，但并不是从营长手里。泰勒惊慌失措地逃下山，把他那群喝大了的下属留在了枪火中。泰勒找到了正在狂欢的同僚，让炮兵立刻回到岗位，向山顶不停歇地射击。他似乎听到了村民们的惨叫，但他宁愿相信那是魔鬼在嚎叫。\n\n后来，当泰勒再次爬上山时，他在前根据地那几乎没剩下什么的残骸中看到了一具尸体。如果他没看错的话，那正是那天晚上的姑娘。她的眼镜睁得很大，手中握着什么。借着酒劲，泰勒掰开了姑娘的手。"
LNR.102.a:0 "那是一颗闪耀而鲜红的五角星"

LNR.103.t:0 "一场抗议"
LNR.103.d:0 "克洛格并不在乎自己在哪里，并不在乎自己在干什么，甚至并不在乎正在前面演讲的加瓦总统——好吧，他的演讲声在抗议声中并不明显。“国家正在陷入……”快乐？他被简化的大脑里冒出这个词，作为对演讲声的回应。那个头头给他们每个人都发了一铁盒“白面”，一分钱都没收！如果他还有点理智的话，他会选择哪天把这么多“白面”倒卖了，那可够他生活很久了，但他不过是一个吸毒的傻子。他傻傻地看着手中的铁盒，傻笑起来，附和周围的抗议声。\n\n“……这就是我能站在这里，并……”遇到这么好的事的原因？他继续傻笑，着迷地盯着铁盒，将盖子开了又关。三年前，他还是某个工厂里一个普通的工人，或者说，童工？不重要。总之，他的工友——哥们——给自己尝了尝“麻药”，给他打开了新世界的大门。“一切都有代价，不是吗？”他的哥们把他带到某个街区的角落，让经销商给他看看价格。在当时，他还剩大半的理智让他逃离了那里，但随之而来的戒断反应将他重新拖回了那个小巷。\n\n“……而就在前几天，我……”找到了救世主！他早就被从工厂开除了，被公寓扫地出门，还欠下了一屁股债。放高利贷的上下打量他一遍，把他打晕了过去。等他醒来的时候，一个身着西装的男人拿出一个铁盒。男人还没有开口，他就跪了下来。事实上，那些事也没怎么可怕，特别是当你是个瘾君子的时候。他满意地回想了一下过去，得出结论：一切都是最好的——安排！特别是今天，不需要偷窃或杀人就能吸到死，真是美好的——世界！于是，他打开铁盒，拿出麻药……\n\n五秒以后他从闪光灯的晕眩中恢复过来。他的左手连同铁盒被举了起来。“抗议者们，你们一直在呐喊‘为了人民’、‘为了弱小’。可到底是哪些人民、哪些弱小，会在抗议的时候吸食麻药？难道勒泰特尼安的宗教是毒品、神父是毒贩？”加瓦总统顿了顿。“几小时前，当你们出发的时候，或许还会有一部分人民支持你们。而从明天起，每个人都会认清你们的真面目。”\n\n沉默的警察从他手中拿走铁盒。“打击犯罪的总统令将在明天0时正式生效，人民也将认清你们的真面目。”加瓦总统回到讲台上。“现在，让我给你们最后的忠告。"
LNR.103.a:0 "“习惯了逍遥法外的罪人们，你们忏悔的时间可不多了。”"

LNR.104.t:0 "糟糕的开端"
LNR.104.d:0 "“唉，又有一个负责土地改革的地方官员被杀了。”加瓦·阿杜勒无奈地看向了崔斯可与维鲁，“再这样下去，还有几个官员会落实土地改革政策呢？”\n\n维鲁一拳砸在了桌子上：“这帮地头蛇真是无法无天！一想到两百年来是这样的乡巴佬占领着共和国的议会我就觉得恶心！难道连你也没办法把他们都镇住吗？”\n\n加瓦·阿杜勒总统只是摇了摇头：“就凭我们的话，直接动用武力只会把他们逼急从而引发一场内战的。别忘了，虽然这些地头蛇不怎么团结，但他们个个都有自己的私兵。有的甚至还会使用魔法。军队也并非完全忠于我们。”\n\n“或许，我们需要更多的盟友？”崔斯可试探性地问道，“只要能保持力量上的绝对优势，谅他们也不敢造次。而且，也不是所有农村人都反对土地改革，只要我们能团结一部分农村人……”\n\n维鲁无礼地打断了崔斯可：“你说的对，我们确实该学会妥协一下。事实上，一部分农村宗族势力并没有我们想象中的那么糟糕。只要能让他们明白他们可以从中获利的话，他们或许会更配合我们的工作。”\n\n“看来我和你认识中的农村人不太一样啊。”崔斯可对维鲁报以一声冷笑“从经济学角度上讲，这些地主老爷要是真的会为了更多的利益而放开手中的土地让这些土地成为资本要素的话，今日的勒泰特尼安决不至于如此落后：我们可是在和世界上最先进的国家做邻居啊！就算要团结农村人，那也要团结被他们迫害已久的农民！”\n\n维鲁皱着眉头看向崔斯可：“尽管我觉得你这话很像是赤色分子才会说的，但我却由衷地认为你说的对。只要不真的去找农工革命党的话，我觉得像你说的那样去做也不错。”\n\n“这年头，能有能力反抗地主还住在农村的农民哪个不串通农工革命党啊……”加瓦绝望地摇了摇头“我亲手杀过农工革命党的首领格雷齐亚，他们怎么可能眼睁睁看着我们把手伸向他们的渗透区呢？至于那些地主老爷，要不是看在我杀赤色分子杀的多的份上，他们早就准备不信任动议了。”\n\n然后，三人颇有默契地保持了沉默。他们都清楚眼下仍然有个选择：尝试与农工革命党合作。但没人愿意第一个把这个想法说出来。时间一分一秒地流逝着，他们总得做出选择……"
LNR.104.a:0 "好走的路早就走完了……"

LNR.105.t:0 "放下方向舵"
LNR.105.d:0 "什么是英雄呢？许多人曾思索过这个问题，也给出了自己的答案。当加瓦·阿杜勒打击犯罪除暴安良时，只有人民会说他是英雄。当加瓦·阿杜勒从世界大战的战场归来时，只有对南巴斯蒂亚共和国马首是瞻的保守派会说他是英雄。当加瓦·阿杜勒决心改变这个被地主阶级扭曲了经济与精神的共和国时，只有进步联盟的改革派会说他是英雄。当加瓦·阿杜勒打退特尼安赤军的进攻时，共和国所有的政客都说他是拯救共和国的英雄。现在，加瓦·阿杜勒失势了，却没有任何人愿意说他是一个英雄。\n\n所以，这里从来都没有英雄，加瓦也从来都没有觉得自己是个英雄。这里只有一个个渴求救赎却又贪得无厌的灵魂，以及一个当不了救世主的普通人。民主传统也好，进步浪潮也罢，加瓦已经管不了那么多了。他是共和国民主制度确立后第一个被成功弹劾的总统。自今日起，他和他的土地改革都将被民主一并赶下台，永无翻身之日。"
LNR.105.a:0 "乘客一边抱怨着航行的颠簸，一边藐视着窗外的风暴"

