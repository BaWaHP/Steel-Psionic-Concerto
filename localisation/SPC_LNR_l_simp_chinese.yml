###民族精神###
SB_Tenian_civil_war:0 "特尼安半岛战争"
SB_Tenian_civil_war_desc:0 "1798年的特尼安共和革命使得特尼安半岛陷入南北分裂的局面。域外大国的干涉使得半岛迟迟未能统一。最终，在命运之神的恶意操纵中，南巴斯蒂亚联邦与七河联邦崩溃，民族统一的机会摆在了特尼安人面前：但最终，他们不幸地走上了武力统一的道路。为了不错失这一机会，南北双方竭尽全力，阻碍了民族统一的丹特山脉的地形也在这两百年中被南北双方摸索的相当透彻。双方都有能够确保军队在山地如履平地的大量山地部队和地形向导。但人们依然对特尼安民族的命运忧心忡忡：战鼓已然敲响，何人何时才能吹响胜利的风笛呢？"

LNR_clan_influence:0 "宗族势力"
LNR_clan_influence_desc:0 "自共和革命战争以来，当初支持革命的贵族在驱逐了城市的反对势力后，建立了一套自己的地方机构，他们独立于中央，干着各种可能涉嫌违法的事，苦于政治经济问题我们不能动他们，相反得获得他们的支持。"

LNR_urban_rural_contradictione:0 "城乡区别"
LNR_urban_rural_contradictione_desc:0 "城市和乡村有很大的文化差异，这种文化差异并不是本土各类文化的冲突，这种差异更多的是表现在对外的态度。很明显城市对外有很高的贸易热情，而农村则表现地十分排外，这也让我们的农村成为了一个个的孤岛。"

LNR_economic_crisis:0 "经济危机"
LNR_economic_crisis_desc:0 "自1996年饥荒开始，勒泰特尼安的经济一直不景气，好不容易建立的珠宝贸易也因为国外订单的减少而逐渐衰弱。各个宗族也不愿意将余粮提供给城市，我们需要做出改变！"

LNR_chaotic_political_situation:0 "政局混乱"
LNR_chaotic_political_situation_desc:0 "因为经济危机和复古的政治、教育改革让我国的政治局势变得不稳定，进步人士想要取缔莫里斯的一切改革，并试图对宗族势力做出强硬的手段，而军队也在摩拳擦掌蠢蠢欲动。"
LNR_political_instability:0 "政治动荡"
LNR_political_instability_desc:0 ""

LNR_mining_pot_of_south_bastia:0 "南巴矿场"
LNR_mining_pot_of_south_bastia_desc:0 "尽管勒泰特尼安有着“南巴矿场” 的美称，但当人们发现挖出来的矿物都带着血时，他们又当如何看待这个为了一些投资而把珍贵的矿藏与主权贱卖给外国人的共和国呢？更重要的是，这样残忍的发展方式真的是可持续的吗？如果要改变的话，是否要付出代价？而这代价会比不改变的代价更沉重吗？"

LNR_grey_support_1:0 "灰色支持：心悦诚服"
LNR_grey_support_1_desc:0 "“大哥，您有啥事尽管开口吧！可千万别把兄弟们当外人了。哪怕是天大的麻烦，大家都会帮您的！”"
LNR_grey_support_2:0 "灰色支持：能帮则帮"
LNR_grey_support_2_desc:0 "“大哥，您是了解我的。有啥事我能帮上忙的我都会尽量帮，决不怠慢！”"
LNR_grey_support_3:0 "灰色支持：互利互惠"
LNR_grey_support_3_desc:0 "“大哥，你也知道这事不容易办。放心，这事我肯定能给你办妥了，但你要是能帮我一把我肯定办的更好更快，是这个道理吧？”"
LNR_grey_support_4:0 "灰色支持：讨价还价"
LNR_grey_support_4_desc:0 "“兄弟，你这忙我不是帮不了，也不是不愿意，而是你平时态度太差了，大家实在看不惯，我代表大家特地来说你两句：别以为有学历就了不起了！年轻人不要太气盛！”"
LNR_grey_support_5:0 "灰色支持：敷衍了事"
LNR_grey_support_5_desc:0 "“知道了知道了，你先别急。你也不反省一下自己什么态度！急什么！有你说话这么大声的吗？你知不知道我二叔不说话瞪了你一眼，他那是受够你了，连骂都不想骂你啊！”"

LNR_buy_for_food:0 "为粮食买单"

LNR_coop_with_progress_league:0 "与进步联盟的合作"

LNR_clan_soldiers:0 "宗族子弟兵"

LNR_whatever_it_takes:0 "不择手段"

LNR_commi_rat_everywhere:0 "赤匪到处都是！"
LNR_commi_rat_everywhere_desc:0 "妈的，怎么哪里都有赤匪！虽然我们并不想承认，我们近乎是被困在了城市里。尽管乡村地区还没有被赤匪完全掌控，但他们的活动范围恐怕已经遍布整个勒泰特尼安了！对，粮食和工业暂时不受影响，弹药也生产的出来，但每个运输车队都得冒着半路失踪的风险运送补给，通货膨胀也开始飙升。再不解决这群赤匪，我们就要他妈的被困死了！"

LNR_biohazard_giant_cacti:0 "生物灾害：巨网仙人掌"
LNR_biohazard_giant_cacti_desc:0 "在薇诺娜莉堡生活着一种特殊的植物：巨网仙人掌。巨网仙人掌体型极其庞大，其茎如网状伸向天空。薇诺娜莉堡高空中的大量水汽于其网状茎遇冷液化，甚至形成降雨。同时，巨网仙人掌生长极快，其果实可以食用。因此在一开始，当地人并没有在意这种植物的疯长。但渐渐的，他们发现这种仙人掌附近的土地越发贫瘠乃至退化。这对本就干旱的薇诺娜莉堡的生态以及粮食生产造成了毁灭性的打击。研究表明：巨网仙人掌对周边的养分汲取速度堪称惊人。同时，其生命力极其顽强。仙人掌的影响加上当地本就恶劣的自然环境严重制约了当地经济的发展。当地政府行政效率也因此大打折扣。"

LNR_biohazard_disaster_giant_cacti:0 "生物灾厄：巨网仙人掌"
LNR_biohazard_disaster_giant_cacti_desc:0 "我们一直低估了这些仙人掌。\n\n尽管这些仙人掌并不会像北方的魔兽一样拥有主动攻击人类的手段，但是它们的生长速度以及生命力已经超出了我们的想象。由于内战使得监控生物灾害的人手不足，它们仿佛有意识地趁机扩大了它们的栖息地。现在，这些仙人掌团团围住了薇诺娜莉堡。当地居民几乎每天都能听到它们的“歌声”。这些“歌声”是怎样形成的至今众说纷纭：有人认为这是仙人掌拥有智慧与思想的证据。也有人认为这只是海风吹过其密密麻麻的枝干时发出的响声。但可以肯定的是，当你听到这些歌声时，那说明附近有一片由巨网仙人掌构成的沙漠中的“密林”。现在，这些仙人掌正在向勒泰特尼安的其他土地进军。如果再不采取手段限制它们的扩张的话，整个勒泰特尼安的土壤养分都会被这些仙人掌吸食殆尽！这意味着土地的退化、农业的毁灭、文明的灭亡！"

LNR_mountain_horror:0 "山中恶鬼"
LNR_mountain_horror_desc:0 "勒泰特尼安多山多岭，便于不法分子藏匿。这些不法分子已困扰共和国政府多年，其中还有一伙自称“特尼安赤军”的激进分子。这些赤色分子作恶多端，乃是我国诸多犯罪组织中最有威胁，罪行最重的一个。尽管赤军在1995年煽动的金斯伯格叛乱已被镇压，但在1996年经济危机爆发后，这些赤色分子重新壮大，他们活动愈发频繁，愈发大胆。甚至还有一些暴徒杀死了一些德高望重的地主。他们的目标恐怕是整个勒泰特尼安共和国……\n\n§C幸好，这些赤色分子在强大的南巴斯蒂亚联邦面前什么都不是。§!"

LNR_wind_of_pain_and_hate:0 "仇恨之风，痛苦之潮"
LNR_wind_of_pain_and_hate_desc:0 "联邦各国自顾不暇，无力援助我国。经济危机持续发酵，我们已无力维系国家的正常运转。普罗大众积怨已久，桑德瑟兰铝矿工人一声怒吼，无数藏匿于阴影的赤色分子如浪潮般涌向了共和国各地。被冠以“革命”之名的闹剧在全国各地反复上演，无数人的哀嚎撕扯着这片早已不堪重负的土地。我们必须承认，我们把很多事情拖的太久了……也许亡羊补牢为时未晚，但重建秩序的代价已绝非金钱所能衡量。\n\n§R这场战争结束后，会是谁来收殓勒泰特尼安的尸体呢？§!"

LNR_rocks_bleeding:0 "山石泣血"
LNR_rocks_bleeding_desc:0 "没有人来收殓勒泰特尼安共和国的尸体，因为她的人民尚在为她奋战，她则因此依旧屹立于半岛之巅。赤色分子已被民主的卫士击退，再无夺取勒泰特尼安的可能。不少被赤色分子占领过的地方不肯接受赤色分子已经败逃至山中的事实，不愿再次服从共和国政府的统治。于是……那里的每一块石头都沾染了血。\n\n幸运的是，石头可不会说话。"

LNR_unrecognized_democracy:0 "不被认可的民主"
LNR_unrecognized_democracy_desc:0 ""

LNR_new_deal_for_adul:0 "阿杜勒新政"
LNR_new_deal_for_adul_desc:0 "现在，加瓦·阿杜勒已经获得了足够多的政治盟友与改革需要的资金，是时候开始进步联盟设想中的社会改革了。"

LNR_broken_rudder:0 "破碎的舵盘"
LNR_broken_rudder_desc:0 ""

LNR_rural_investment:0 "乡村投资"
LNR_rural_investment_desc:0 ""

LNR_agrarian_reform:0 "农业改革"
LNR_agrarian_reform_desc:0 ""

LNR_brave_new_home:0 "崭新家园"
LNR_brave_new_home_desc:0 ""

LNR_declining_power_of_clans:0 "日渐式微的宗族势力"
LNR_declining_power_of_clans_desc:0 ""

LNR_red_double_edged_sword:0 "赤色双刃剑"
LNR_red_double_edged_sword_desc:0 ""

LNR_shaky_alliance:0 "摇摇欲坠的联盟"
LNR_shaky_alliance_desc:0 ""

LNR_magnificent_fireworks:0 "绚丽烟火"
LNR_magnificent_fireworks_desc:0 ""

LNR_familiy_business_idea:0 "家族企业"
LNR_familiy_business_idea_desc:0 "共和国有着强大的宗族势力，这些宗族地主控制了大部分的农村劳动力资源与土地资源。这使得城乡差异日趋严重，工业化进程因此受阻，经济也因此受到损害。为了解决这一状况，保守派们想出了一个两全其美的办法：为什么不试着让这些宗族势力利用自己手上的土地资源与劳动力资源开办企业呢？事实上，只要晓之以情，动之以利，所有人都将惊喜地发现，勒泰特尼安的宗族势力并没有反动到会拒绝技术上的进步与统治方式的创新。至于充斥着裙带关系的企业到底能在高度自由的市场经济中能存活多久，有人有钱有军队有企业的宗族势力会为共和国的未来带来什么……那就是另一个问题了。至少，到目前为止，这些家族企业还是有不少成功典例的：有不少宗族势力是有民团和家传的独特法术的，这都将保证他们的新生企业拥有不俗的竞争力。"

LNR_treasure_mout_of_south_bastia:0 "南巴的宝石山"
LNR_treasure_mout_of_south_bastia_desc:0 ""

LNR_corrupt_and_confident_army:0 "腐朽而自满的军队"
LNR_corrupt_and_confident_army_desc:0 "不是所有的军事改革都能起到正面作用。军队内部愈发严重的裙带关系使得军官的职位逐渐成为了一种资本而非工作。越来越多的军官依靠着权术与人脉而非战功与军事才能上位。在清洗了一部分“通赤军官”后，共和军已经彻底沦为了一支缺乏优秀军官的腐败军队。更糟糕的是，在相当长的一段时间内，共和国都无法察觉到这一事实。"

LNR_unbridled_paradise:0 "无羁乐园"
LNR_unbridled_paradise_desc:0 "§R“当自由之光不再闪耀，市场自然也就变成了‘黑市’。”§!\n\n有需求就会有市场。\n\n黑市再“黑“也可以满足人民的部分需求——尤其是在这个贸易路线频频中断的年代。只要能赚钱，跟谁做生意有什么关系呢？这个世界总有一些不太见得人的组织和交易，而共和国则很乐意为他们准备一个可以大方活动的平台。至少，国家联盟的成员将从中收获颇丰。"

LNR_military_drugs_idea:0 "军用药剂"
LNR_military_drugs_idea_desc:0 "让士兵嗑药这事，共和军内部的反对意见也不会多，毕竟共和军内部多的是狗娘养的毒虫。这些“军用药剂”说白了就是毒品，士兵们一旦沾上了估计就不会想着离开军队了，某种程度上讲，这也算保证军队官兵忠诚的一个妙计。但战争不只是即兴发挥的艺术，也是一门需要积累、统计与思考的科学。指望这些嗑大了的毒虫学习战术战略，总结战斗经验什么的是不太可能了。共和国当然觉得这点无所谓，他们本就巴不得军队个个都是不会思考不会反叛的杀戮机器。当然，这些药剂确实能让士兵在短时间内爆发出超于平常的力量——如果药剂没有断供的话。"

LNR_take_down_old_times_idea:0 "打倒旧时代"
LNR_take_down_old_times_idea_desc:0 "勒泰特尼安共和国确实是保守且腐败，但这并不意味着这个国家在南巴联邦崩溃后就无人守护了。事实上，与很多人的想象不同，勒泰特尼安的统治阶级依然十分乐意为这个国家奋战到底，他们甚至依然认为自己也是个革命者——当然，是共和革命者。他们依然为这个国家的共和革命史感到自豪并决心将未竟的共和革命进行到底。因此，他们爆发出了外人难以预料的强大力量，这让人们再次想起这个国家有着悠久的战法师传统，完全有能力爆发出强大的战斗力。"

LNR_causing_divisions:0 "挑拨离间"
LNR_causing_divisions_desc:0 "勒泰特尼安共和国确实是保守且腐败，但这并不意味着这个国家在南巴联邦崩溃后就无人守护了。事实上，与很多人的想象不同，勒泰特尼安的统治阶级依然十分乐意为这个国家奋战到底，他们甚至依然认为自己也是个革命者——当然，是共和革命者。他们依然为这个国家的共和革命史感到自豪并决心将未竟的共和革命进行到底。因此，他们爆发出了外人难以预料的强大力量，这让人们再次想起这个国家有着悠久的战法师传统，完全有能力爆发出强大的战斗力。"

###领导人###
LNR_ginsberg_depp:0 "金斯伯格·代普"
LNR_sorrell_capone:0 "索雷尔·卡彭"
LNR_sorrell_capone_desc:0 "现任农工革命党主席索雷尔·卡彭出身于勒泰特尼安的一个大地主家庭。优越的家境与严格的家教使得索雷尔成功考上了度弗道夫大学。度弗道夫与勒泰特尼安截然不同的，更加开放乃至激进的政治环境冲击了索雷尔的认知。学习中获得的知识也让他愈发对陈腐的宗族传统感到厌恶。但真正让他的政治思想变得愈发激进的，是他在虹镜的一次旅行。在旅行中，他目睹了虹镜劳动者如风暴般聚集又如烟般消散的米骚乱。这让他意识到了世间的不公与自身富贵的肮脏。更重要的是，这让他意识到了人民到底能爆发出多么巨大的力量。而让他疑惑的是，这力量又是如此的容易流逝。为了解答困扰于心的疑问，他愈发刻苦地学习。在读遍了度弗道夫大学图书馆的藏书后，他开始去问那些发起过学生运动的学生。尽管这极大地丰富了他的阅历，但他得到的答案实在无法让他满意。于是，他决定直接去问失语的无产者们。\n\n为了更好的与穷人们沟通，他成为了一个专门为穷人提供法律服务的“质优价廉”的律师。这份阅历也精进了他的学术水平，从而让他拿到了法学与历史学的硕士学位。在拿到学位后，他回到了家乡。他回到家后，变卖了家产，烧掉了佃农们的欠条地契，吊打了打算杀掉他的父亲，带着大量的财物和现成的根据地加入了与他联系已久的农工革命党。他组织群众运动的才能也在斗争中逐渐显露。\n\n但在1995年的反围剿战争中，时任主席格雷齐亚与一众高层遭叛徒出卖战死，年轻的他因此当选为了新主席。他不得不带着残兵败将撤回深山继续打游击。\n\n幸运的是，他和他的同志没有被失败吓倒，依然决定团结起来继续武装斗争。1996年的饥荒让农工革命党重新壮大。同时，联邦也愈发虚弱。这让夺取全国政权的计划再次被提上了日程。桑德瑟兰铝矿工人的起义更是让他们必须立刻行动起来。现在，全国乃至全南巴斯蒂亚的目光都投向了桑德瑟兰的山岭。一场空前惨烈的斗争等待着农工革命党，而索雷尔将在这场斗争中写下那个自虹镜旅行归来后一直苦苦追寻的答案。这个答案注定不属于他自己，但他和他的答案都将属于全世界的劳动者。为了人民的生存与解放，他和他的同志们将高举火炬，驱散笼罩着世界的黑暗长夜。"
LNR_trisco_carpe:0 "崔斯可·卡佩"
LNR_gava_adul:0 "加瓦·阿杜勒"
LNR_gava_adul_desc:0 "一个出身于宗族气息浓厚的地主家庭的军人是怎么成为一个反宗族反毒品的社会民主主义者的呢？这个问题最妙的地方在于，在进步联盟内还有不少像加瓦这样的人。但加瓦和那些要造自己老子反的年轻人有些不同：第一是加瓦快五十八岁了，并不年轻；第二是因为他在宗族中受到的伤害比他从中得到的好处要多得多。他无法忘记他那满口传统孝道的瘾君子父亲是多么无耻和虚伪。他更不能忘记的是他那饱受宗族“规矩”毒害的母亲。更让他震惊的是，哪怕他当上了海军部长，当上了人们口中的清廉刚正的“白水将军”，拽着母亲搬进了城市，宗族的阴影依然笼罩着他的生活。从乡村到城市，从议会到军队，一幕幕发生在眼前的悲惨闹剧证明着勒泰特尼安已然糜烂。大小宗族在事实上腐化了国家的方方面面。多灾多难的共和国面对还不止这些：七河与南巴斯蒂亚共和国限制着国家的统一与发展。毒品猖獗、经济萎靡、饿殍遍野、各路宗族囤积粮食卖到国外而不是眼前的同胞只是为了多赚一点！一个有着良知和底线的人怎能在这残酷现实面前默不作声的转过头去啊！或许这就是为什么进步联盟饱受打压却日益壮大，甚至还有越来越多的宗族子弟加入吧？他们急需更多的筹码，于是他们需要在军方和民间拥有崇高地位的加瓦。加瓦则毫不犹豫的加入了他们乃至成为了进步联盟1998年大选的总统候选人。绝望而愤怒的人们将最后一丝和平改革的幻想寄予1998大选，期盼着国家能就此做出改变。应无数人的期盼，进步联盟的加瓦·阿杜勒在堪称政变的合法选举中赢得了大选。现在，加瓦·阿杜勒一手拿着玫瑰，一手拿着长刀站在了共和国的权力之巅。他的态度十分明确：他将不择手段地让国家从灭亡的深渊重回正轨。如果他真的成功了，他将毫无疑问的成为勒泰特尼安最伟大的总统。万一他失败了，他和他的理想都将坠入地狱，而他的祖国母亲则紧跟其后。"
LNR_viru_or_veru:0 "维鲁"
LNR_maurice_moller:0 "莫里斯·莫勒"
LNR_maurice_moller_desc:0 "莫里斯出生在一个政客家庭，很多人认为他对于各方势力的调和能力就是出自他的家庭。在家里人的操作下，他被安排到了勒泰特尼安大学国际关系学院，很快他在大学中就建立起了自己的圈子。毕业后他更是依托着这个关系网，迅速成长为民主党内一颗冉冉升起的新星。他也被派去执行一项危险而充满机遇的任务——联络地方农村宗族中的那几个大宗族，而深谙宗族保守习俗的莫里斯很快就打点好了几大宗族内的上上下下，这也为之后能够赢得选举打下基础。\n\n1990年大选莫里斯以微弱优势首次登上总统宝座。他从教育入手，开始在义务教育中进行传统主义教育。尽管这使得国内进步人士对他诟病，但是这赢得了绝大多数保守人士和宗族势力的支持。很快在和宗族的谈判中，莫里斯获得了珠宝的加工生产和出口权力，因此赢得了加工业企业主们的支持。受限于人的勒泰特尼安经济终于有了自己的特点，而莫里斯也顺理成章地成为了1994年的总统。在这之后莫里斯继续延续之前的政策，直到勒泰特尼安经济危机的到来。由于国外经济不景气，珠宝生意遭到打击。祸不单行，新一轮的饥荒也在这时候到来，更要命的由于缺乏外汇无法购买外国粮食，这时的莫里斯也只能希望在1998年大选有点好消息传来了..."
LNR_ritchie_van_imonto_okkonen:0 "里奇·万·伊蒙托·奥克宁"
LNR_spicer_seck:0 "斯派瑟·塞克"
LNR_heche_van_sko_oknin:0 "赫奇·万·斯科·奥克宁"
LNR_heche_van_sko_oknin_desc:0 "与国家联盟大多数成员不同，赫奇·万·斯科·奥克宁并不是一个伪君子，更不是一个蠢货——他的残忍、卑劣与无法无天众人皆知，然而，即便是他的反对者也不得不承认他有着异于常人的远见卓识。一开始，他靠着显赫的家世和过人的才干成为了国家联盟的政治明星以及宗族势力和黑恶势力的保护伞。渐渐地，他成为了事实上的宗族势力与黑恶势力的领袖。南巴斯蒂亚联邦的地下交易都因为他变得繁荣了起来，据说，他的关系网甚至覆盖到了远乡。他秉持着无钱不赚的理念利用手头中的一切资源为自己敛财。没有人说的清他到底赚了多少脏钱，更没人说的清他的手上沾了多少血。然而，即便是这样卑劣无耻的人也有自己的底线：他不曾以任何形式串通过农工革命党，他甚至利用个人影响力和自己的资源劝阻手底下的黑帮和宗族与农工革命党达成任何形式的交易，这给农工革命党带来了不小的麻烦。在成为了莫里斯的副总统后，他甚至给手底下的黑帮和宗族立了规矩：不得在指定的城市兴风作浪。这样的举措不仅取悦了外国的客人与城市人，更为城市地区提供了一个难得的较为稳定的发展环境，外资得以放心的涌入城市，经济甚至因此得到了一定的增长。事实上，这也增加了黑帮和他的收入。这样的狠角色自然不适合作为一个国家的总统站在舞台的最中央，怎奈造化弄人，莫里斯的暴毙让他不得不像个忠臣一样临危受命。没人知道他打算怎样面对接踵而至的挑战，正如没有人知道他到底做了多少坏事一样。但至少，人们已然窥得他的人生信条：\n\n宁可出卖灵魂，绝不禁锢本心。"
LNR_antoma_oknin:0 "安托马·奥克宁"

