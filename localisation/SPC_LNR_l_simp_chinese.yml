LNR_another_knife_tt4:0 "获得修正：§Y赤色双刃剑§!，其效果为：（单位攻击：§G+5.00%§!，单位防御：§G+5.00%§!，政治点数获得：§R-15.00%§!，陆军经验增长：§G+10.00%§!，每日革命共产主义支持率：§G+0.05§!，每日民主世联主义支持率：§G+0.10§!）。"
