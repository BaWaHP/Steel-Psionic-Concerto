LNRNews.1.t:0 "进步联盟赢得大选"
LNRNews.1.d:0 "今天，在勒泰特尼安，每一个村子都被愤怒的浪潮淹没。与之形成鲜明对比的，是喜气洋洋的城市。城市和农村都在以自己的方式讨论着赢得大选的进步联盟以及国家的新总统加瓦·阿杜勒。各个宗族都在懊恼着这个进步联盟的候选人是怎么当上总统的。而进步联盟以及他们的支持者则庆祝着国家变革的开始。尽管勒泰特尼安的宗族势力根深蒂固，拥有军方背景的加瓦依然有能力暂时维持国家的稳定。他在就职演讲中承诺，他将尽己所能的让国家走上自由与繁荣的康庄大道。同时，他承诺不会对宗族大搞暴力革命和肉体消灭，但他反复提及的“宗族无害化”这个概念却足以让各路保守派心惊肉跳。勒泰特尼安正在时代的巨浪中挣扎，在巨浪中根除国家的顽疾又谈何容易？但至少在今天，一丝进步与繁荣的微弱火光已经出现在了地平线上，也许，共和国的美好未来就在眼前？"
LNRNews.1.a:0 "转折点……或是最终章？"

LNRNews.2.t:0 "赢得大选的总统莫里斯遇刺"
LNRNews.2.d:0 "今天，在勒泰特尼安，每一座城市都被愤怒的浪潮淹没。与之形成鲜明对比的，是毫无波澜的农村。莫里斯总统成功获得了连任，但这并不意味着勒泰特尼安的秩序已经稳定。恰恰相反，选民们反而因为这次大选变得更加愤怒。首都丹特的局势已经可以说是沸反盈天。人们纷纷涌上街头，质疑着这次大选是否公正：国家联盟一次次地让人民失望却一次都没有输过总统选举！而城市的警察无法用和平手段阻挡愤怒的人潮向正在做就职演讲的总统莫里斯涌去，于是使用了毒气弹驱散人群。但还是有一个枪手使用手枪射杀了莫里斯。而国家联盟不需要再重新组织一次大选，法律规定，总统任期内死去可以由副总统接任总统。于是，副总统奥克宁意外的获得了总统之位。然而，在勒泰特尼安，奥克宁是黑恶势力和宗族势力的保护伞乃至领袖这件事是公开的秘密。尽管射杀莫里斯的凶手已经伏法，街头的抗议人潮也已经渐渐散去，但很明显，勒泰特尼安想要恢复稳定还有很长的一段路要走。"
LNRNews.2.a:0 "戏弄人民的意志是不是太容易了点？"

LNRNews.3.t:0 "第二次特尼安半岛战争"
LNRNews.3.d:0 "两个世纪前，特尼安半岛因共和革命分裂为勒泰特尼安与奥科特尼安。随着奥科特尼安新王登基以及七河联邦与南巴斯蒂亚联邦的崩溃，两国关系愈发紧张。而在今天，勒泰特尼安共和国与奥科特尼安王国再起战端。令人意外的是，共和国士气高涨，群情激愤，就像回到了共和革命时期一样，他们誓要毁灭将祖国领土割让给七河属南巴斯蒂亚公司的南方的“暴君”。而王国方面也义正严辞谴地责了勒泰特尼安共和国的腐朽以及对南巴斯蒂亚共和国的奴颜婢膝。今日的丹特山脉战火连天，喊杀声响彻山谷。值得注意的是，为第二次特尼安半岛战争感到焦灼不安的还有七河属南巴斯蒂亚公司的墨精灵们，无论两国中谁会胜利，胜利者都必然会垂涎缺乏守备力量的盘尼西林港……"
LNRNews.3.a:0 "革命先烈的血决不会白流！"
LNRNews.3.b:0 "荣耀属于国王！"
LNRNews.3.c:0 "南巴局势，乱上加乱"

LNRNews.4.t:0 "第二次特尼安半岛战争"
LNRNews.4.d:0 "尽管勒泰特尼安共和国成功镇压了赤色特尼安，但接踵而至的第二次特尼安半岛战争使得共和国再次前途未卜。与刚刚经历了一场血腥的内战的勒泰特尼安共和军不同，奥科特尼安临时政府在相当短的时间内彻底碾碎了君主制与封建贵族的遗毒，从上到下精神焕发，斗志昂扬，誓要在最短的时间内统一多灾多难的特尼安半岛。\n\n两个世纪以来，勒泰特尼安一直都以奥科特尼安王国政权为假想敌，但奥科特尼安临时政府与王国政权截然不同。不少观察家认为，奥科特尼安临时政府将会统一特尼安半岛。值得注意的是，七河属南巴斯蒂亚公司对此事态度并不积极。"
LNRNews.4.a:0 "半岛统一，就在今日"
LNRNews.4.b:0 "点燃火焰！"
LNRNews.4.c:0 "真的没有和平解决的可能吗？"

LNRNews.5.t:0 "第二次特尼安半岛战争"
LNRNews.5.d:0 "在今天，奥科特尼安同时向勒泰特尼安共和国与赤色特尼安宣战。血腥的第二次勒泰特尼安内战仍未落下帷幕，南方的奥科特尼安的参战则使得整个特尼安半岛都陷入了空前的混乱。不少原本打算南逃奥科特尼安的北方难民不得不绝望的留在家乡等待命运的审判。\n\n尽管有不少观察家认为这将是勒泰特尼安共和国的丧钟，但特尼安半岛的未来依然不明朗。三个政权彻底撕裂了特尼安半岛，鲜血已然染红丹特山脉。可以说，无论最终结果是哪方胜出，民族重建都将成为特尼安民族的难题。"
LNRNews.5.a:0 "决不能让那些混蛋跨过丹特山脉！"
LNRNews.5.b:0 "这是我们的机会！"
LNRNews.5.c:0 "又一个反动派送上门来了！"
LNRNews.5.dd:0 "特尼安半岛的分裂状态什么时候才会结束呢？"

LNRNews.6.t:0 "特尼安南北和解"
LNRNews.6.d:0 "在今天，一个令人震惊的消息从丹特山脉传来：奥科特尼安与勒泰特尼安将实现和平统一，两国将合并为一个统一而团结的特尼安共和国。特尼安同胞之情取代了南北冷战，两国军民就像早有约定一样跨过了两国边境拥抱在了一起，丹特直达斯塔比翁的铁路也已经开工。事实上，自奥科特尼安加入南巴斯蒂亚联邦以来，特尼安统一运动的呼声就愈发高涨。勒泰特尼安与奥科特尼安也曾展开和平统一的谈判，但结果却是不欢而散。但在南巴斯蒂亚联邦与七河联邦崩溃的今天，两国和平谈判大获成功。不少观察家都热情地赞扬了两国领导人的远见卓识以及高明的相互妥协。在这个动荡的时代，人们深知和平的可贵。可以预见的是，大量饱受动荡之苦的外资将涌入特尼安半岛。两国合并成的特尼安共和国将拥有一支冠绝全南巴的庞大舰队以及三十多个充斥着民族自豪感与战斗法师的陆军师。特尼安人惊喜地发现自己的国家第一次成为了南巴斯蒂亚地区不可忽视的地区强国，七河属南巴斯蒂亚公司也在紧急联系新生的特尼安共和国。这是近两个世纪以来，特尼安半岛第一次沐浴在特尼安人的欢呼声中。"
LNRNews.6.a:0 "特尼安民族故事的转折点"

