LNR.109.t:0 "与赤军谈判（一）"
LNR.109.d:0 "看着眼前的索雷尔与卡瑞安等人，加瓦·阿杜勒竟觉得有些恍惚：就在短短3年前，他杀掉了这些赤色分子的领袖，把他们杀回了深山，赢得了整个共和国的敬意。自己也因此赢得总统大选。可现在，他却在和这些匪徒坐在一间房子里谈判。他看向四周，发现在座的所有人的脸色都一样难看，虽然他没有照镜子，但他也能想到自己脸上的表情大抵也和这些人一样。尽管众人自认为早已做好了与宿敌交易的心理准备，但当他们真的面对面坐在一起谈判时，他们还是不约而同的陷入了沉默——这是最糟的情况。\n\n最终，加瓦打破了沉默：“我相信你们也明白，农工革命党放弃武装斗争，作为一个合法政党活动对我们双方都是最好的结果。我向你们保证，你们决不会像你们的前身人民党落得个一样的下场。毕竟，我们需要你们帮助我们，帮助人民完成土地改革。”\n\n“也许吧，不过这次，我们最好从一开始就把所有话都说清楚。”卡瑞安拿出了几份文件“我们可不想再像二十五年前那样了。世界大战时，南巴人仅仅只是批评了我们几句，议会就立刻把我们通通打成了牛头人的间谍然后通通杀掉了人民党的议员，哦，这个时候就不考虑议员的豁免权了。”\n\n“是的，那确实是不公正的……”为了和平，加瓦一直把姿态放的很低，但他也注意到了索雷尔的异样：他作为农工革命党的领袖竟然一言不发，仿佛他一开始就不想参会——这个拥有法学和历史学硕士学位的年轻人不会真的那么意气用事吧？\n\n但还好，在加瓦和卡瑞安的一唱一和中，会议逐渐进入了主题。\n\n首先要谈的，自然是赤军这只忠于农工革命党的军队的去留问题，加瓦一方，即共和国一方认为，赤军可以被整编进共和军，之前从共和军叛逃进赤军的官兵既往不咎。但必须确保这只军队实现政治中立，赤军需要在加瓦的监督下进行重组。同时，赤军不得继续组织“赤卫队” 一类的准军事组织。赤卫队也必须立刻解散。\n\n农工革命党一方表示，赤军当然会实现政治中立并服从共和国的领导，赤军也不会扩编赤卫队。但现有的赤卫队暂时还不能解散，起码要等到地主阶级被打倒，土地改革完成后再解散。因为没有赤卫队保护的话，赤卫队队员一回家就会被地主和宗族势力杀死。如果我们现在就立刻解散他们，他们就会为了自保直接脱离农工革命党形成一股新的政治势力。同时，保留赤卫队有助于推进土地改革，毕竟很多事情不能交由共和国正规军处理，由自发组织的赤卫队处理会方便很多。\n\n最终，他们依然达成了初步的共识："
LNR.109.a:0 "我们将暂时保留这些暴徒……"
LNR.109.b:0 "我们可不需要这些暴徒来拯救国家"

LNR.110.t:0 "与赤军谈判（二）当地行政机构"
LNR.110.d:0 "赤军实际控制区域比加瓦等人想的要大不少，这着实让他们吓了一跳。现在，赤军决定和谈，他们的控制区域自然也要回归到共和国的掌控。但有一点：勒泰特尼安是个民主国家，州议会由当地人民选举产生。而当地的州议会选举已经举办，离下次选举还有几年。那么，当赤军的统治区域归顺共和国后，原来的政府机构人员肯定不能留。那么，空缺的政府公职人员位置该怎么填补呢？农工革命党认为，为了不违反民主原则，应当在当地再举行一次州议会选举。共和国方面也认为此方案可以接受，但也有人认为这些空缺交由现任州议会填补处理即可。\n\n最终，他们达成了共识："
LNR.110.a:0 "人民党的党员们，准备好再次参加地方选举了吗？"
LNR.110.b:0 "重新召开一次地方选举实在麻烦"

LNR.111.t:0 "与赤军谈判（三）一些历史问题"
LNR.111.d:0 "赤军的领导人格雷齐亚与1995年的勒泰特尼安内战中被加瓦亲手杀死。赤军失败后各路媒体将赤军以及农工革命党的风评拉到了和魔兽一个级别。现在，赤军方面认为共和国对农工革命党以及人民党的污蔑必须立刻停止。不得以“曾参与叛变”为由肆意打击原农工革命党成员。否则，农工革命党重新以人民党身份成为合法政党就没有任何意义。共和国方面承诺不会仅以“曾参与叛变”为由对原农工革命党成员进行打击。但共和国的官方媒体并不全部隶属于执政的进步联盟。共和国方面许诺，进步联盟旗下的报社与电台将停止对他们的抹黑，但进步联盟实在难以干预其他的官方媒体和民办的反共媒体。"
LNR.111.a:0 "我们不会侵犯他人的言论自由"
LNR.111.b:0 "早该查查一些官媒的腐败状况了"

