LNR_military_reform_commission:0 "军事改革委员会"
LNR_military_reform_commission_desc:0 "军事改革委员会的本意是彻底实现军队的政治中立，并整合各个地方民兵实现统一指挥，进而实现军队的职业化与现代化。然而，一个腐败的政府又怎能组建一支忠诚而高效的军队？共和国的军事改革失败了，军事改革委员会已经成为了各派倾轧的战场与腐败分子滋生的温床。话虽如此，其改革并非一无是处：通过政治教育与适当的清洗，军队中的共产主义者和保王派已经被清除到了翻不起浪的程度。除非发生了什么更大的变故，军队将依然保持最起码的忠诚。同时，多亏了加瓦•阿杜勒将军的努力，在海军方面的军事改革倒还算顺利。这使得共和国拥有了一支可堪一用的海军陆战队。"
