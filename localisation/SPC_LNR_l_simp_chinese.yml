#国家联盟#
LNR_keep_things_down:0 "息事宁人"
LNR_keep_things_down_desc:0 "莫里斯的暴毙实在是出乎意料，为了保住国家联盟不惜舞弊也要赢得的总统宝座，我们只能让赫奇·万·斯科·奥克宁接任总统之位。同时，国家也越来越动荡。为了让国家恢复稳定，我们必须采取措施——贿赂也好，抓人也罢，先让丹特安静下来再考虑别的！老爷们已经被这些天天大喊大叫还喜欢抢劫的穷鬼吵的够烦了！"
LNR_leverage_social_network:0 "动用关系网"
LNR_leverage_social_network_desc:0 "幸运的是，赫奇总统有着庞大的人际关系网（尽管不太见得光），利用这个关系网，我们一定能得到我们需要的信息乃至交易渠道。人脉的重要性毋庸置疑，但身为总统，使用这些人脉难免比以前麻烦。"
LNR_deal_with_famine:0 "应对饥荒"
LNR_deal_with_famine_desc:0 "无论怎么讲，人总是要吃饭的，没了饭吃当然会有点，额，不理性。尽管反对党拿此事抨击我们，但是，哪个国家历史上没爆发过饥荒呢？赈济灾民当然是我们的职责，赈济灾民不力当然算是我们的失职，但这绝对不能成为老百姓领取农工革命党的救济粮的理由！人民再怎么困难也轮不到赤匪来救！"
LNR_increase_income_and_cut_spending:0 "开源节流"
LNR_increase_income_and_cut_spending_desc:0 "所谓“开源节流”，就是“多挣钱，少花钱“。套用到国家上面，当然是获得更多的财政收入，减少不必要的财政支出。在当前情况下，按照经济学常识，政府应当采取更积极的财政政策以恢复经济。然而，我们的预算……实在支撑不了任何形式的扩张性财政政策了。所以，我们必须先尽可能的获得更多的收入并减少不必要的支出。只是增加税收当然是不够的。幸运的是，赫奇的人脉很广，我们可以找到不少交易的渠道。比如，很多国家最近都挺乱的，很多不可明说的势力都想要更多的人……少了吃饭的嘴，多了兜里的钱，相信国家很快就会好起来啦！"
LNR_increase_income_and_cut_spending_tt:0 "§Y经济危机§!追加效果：\n生活消费品：§Y-5.0%§!\n每月人民生活水平点数增长：§G+1§!"
LNR_pushing_the_responsibility:0 "推卸责任"
LNR_pushing_the_responsibility_desc:0 "经济危机是怎么发生的呢？经济学家们已经概括的很好了：南巴各国经济不景气，矿物珠宝的出口锐减，以及薄弱的经济基础无力抗衡天灾导致的粮食歉收。但我们还要再加上一个政治原因：农工革命党的破坏。农工革命党曾是这个民主国家的合法政党，因为其过激的行为而被取缔乃至被议会宣布为非法政党。事实证明，我们低估了这些赤匪的邪恶。他们非但没有反省自身的错误，还胆敢在山区打游击！为了人民的安全，我军英勇奋战才将其暂时压制下来。可他们的手段过于残忍，哪怕失败也要尽可能的破坏占领过的地区，粮食生产与薄弱的经济就这样被战争与赤匪的屠杀破坏了。1996年饥荒因此爆发。好不容易镇压下来的赤匪又趁乱重新活跃起来。为了镇压这些赤匪，我们不得不把用于赈济灾民的资源用于保卫国家。所以，人民啊，不是地主收租收的多，是赤匪烧掉了你们的救命粮！"
LNR_sure_political_stability:0 "确保政治稳定"
LNR_sure_political_stability_desc:0 "不得不说，莫里斯的暴毙确实给国家联盟以及共和国的政治造成了不小的冲击。我们一度手忙脚乱。为了得到一丝喘息的机会，我们杀了人，请了客。现在，街头的人潮已经散去。同时，为了让国家渡过危机，进步联盟的态度也缓和了不少。虽然整个国家恢复稳定还有很长的一段路要走，但至少现在我们终于可以腾出手来整顿一下内部的混乱了。"
LNR_explain_to_progress_league:0 "向进步联盟晓以利害"
LNR_explain_to_progress_league_desc:0 "尽管进步联盟因为大选失败而对我们怀恨在心，但事实上，他们当中也有不少宗族子弟。想要和他们搭上线并不难。更何况，他们也明白，为了不让国家落入赤匪手里，他们必须和我们合作。然而，进步联盟的领袖兼上次大选的总统候选人加瓦·阿杜勒一直以来对赫奇态度恶劣，也许赫奇应当和加瓦等人一起吃个饭，坦诚地交流一下。"
LNR_reinforce_control_over_armies:0 "加强对军队的控制"
LNR_reinforce_control_over_armies_desc:0 "尽管共和国政治上的不稳定肯定有军队的责任，但是我们不可能在这个时候粗暴地对待军官。不过，我们可以尽可能地让可靠的宗族子弟进入军队从而达到保证军队忠诚的效果。俗话说的好，打仗亲兄弟，上阵父子兵嘛！"
LNR_done_every_businesss_nicely:0 "做好每一桩生意"
LNR_done_every_businesss_nicely_desc:0 "尽管有些书呆子认为地主阻碍了共和国工商业的发展，但事实证明，他们瞧不起的地主做好了一桩又一桩生意。现在，我们还有很多生意可以做。我们一定能做好这些生意的！"
LNR_return_to_hazard_zone:0 "重返混乱地区"
LNR_return_to_hazard_zone_desc:0 "够了，我们已经无法容忍邪恶的赤匪了！他们一而再再而三地触犯着共和国的底线。我们必须立刻动用所有的力量碾碎他们， 从这一刻开始，所有人都必须投入到剿灭特尼安赤军的斗争中去。凡是被举报为赤军者，立即抓捕。凡是抓到赤军，立即诛杀其全族。凡是知情不报者，与赤军同罪。"
LNR_oknin_knows_everything:0 "奥克宁什么都知道！"
LNR_oknin_knows_everything_desc:0 "一直以来，我国对情报工作都不甚重视（或者说，不敢重视。毕竟勒泰特尼安对她的盟国而言不能有秘密，另一方面，勒泰特尼安又有太多不能查的秘密。）但现在，为了揪出藏匿在各地的赤军，扩建情报机构一事已经得到了议会的一致批准。更重要的是，赫奇总统的关系网使得情报工作的改进得以迅速完成。"
LNR_use_whatever_it_takes:0 "动用一切武装力量"
LNR_use_whatever_it_takes_desc:0 "现在，国家已到紧要关头，战争即将降临共和国。为了守护我们的祖国，所有人都必须为此竭尽所能。所有武装力量都必须听从战时总统的命令。所有男人必须拿起武器，保卫自己的家园！"
LNR_use_whatever_it_takes_tt:0 "§Y经济危机§!追加效果：\n生产效率上限：§G+10.00%§!\n每月人民生活水平点数增长：§G+2§!"
LNR_looting_allowed:0 "允许劫掠"
LNR_looting_allowed_desc:0 "战争时期，士气是很重要的。为了激发战士们的积极性，我们自然要保证勇敢者能得到应有的奖赏。因此，允许战士们劫掠那些被敌军控制的地区实在是天才般的想法。这样一来，既可以激励战士们奋勇杀敌，还可以尽可能地给予敌人杀伤，我们甚至不需要花什么钱！也有人怀疑这么做是不是太野蛮了点，我们的回应很简单：正义之敌不配享有正义！"
LNR_fuck_off_commi_loser:0 "赤匪！滚出来！"
LNR_fuck_off_commi_loser_desc:0 "战前准备已经完成。现在，我们终于可以彻底解决这些邪恶的邪教徒了。"
LNR_victory_of_order_and_traditions:0 "秩序与传统的胜利"
LNR_victory_of_order_and_traditions_desc:0 "为英勇的战士们欢呼吧！困扰国家二十年的赤匪已经被彻底剿灭，我们的传统再一次经受住了考验，是时候清点战利品，重建秩序了。"
LNR_victory_of_order_and_traditions_tt:0 "§Y经济危机§!追加效果：\n每周稳定度：§G+0.10%§!"
##保守线二阶段##
LNR_patriotic_anti_commi_campaign:0 "爱国反赤运动"
LNR_patriotic_anti_commi_campaign_desc:0 "赤色特尼安叛匪已经被共和国击败，但我们清楚，赤色分子还没有被完全消灭。为了彻底消灭这些匪徒，我们必须放手发动乡贤，武装各地宗族势力与地主。根据《赫克曼法》，当地地主有权训练地方民团的同时也有责任利用这些武装保卫共和国免受暴徒的威胁。现在，正是他们履行爱国责任的时候了！不仅如此，我们还要积极组织“还乡团“回到那些被赤色分子占据且严重荼毒过的乡村——让流浪者归乡，并让他们一砖一瓦地重建家园，若是那赤色幽灵阴魂不散，迎接它的有魔法飞弹！"
LNR_battle_for_love:0 "为爱而战"
LNR_battle_for_love_desc:0 "所谓的“进步”思想已经荼毒我国教育界太久了。更糟糕的是，这些”进步分子“甚至还想要推行男女平等！天哪！这些人（要么是进步联盟的人，要么干脆就是赤色分子）实在是用心险恶，竟敢以”平等“之名否定女性神圣的天职与爱护家庭的传统！试想一下，一旦所谓的”男女平等“在我国推行，我国的每个家庭都将分崩离析！法律上只承认一夫一妻制的话，那些娶了好几个老婆的人家里岂不是要吵上天？同时，把女子的卖身契撕掉的话，男子的卖身契是不是也要撕掉？我国的经济与就业状况将受到严重的冲击！我们引以为傲的契约精神何在？这可是共和国的基石啊！ 允许女性离婚的话，不出一个月，全勒泰特尼安的民政局都将出现排队离婚的悲剧，届时，孩子们又该如何感受家庭的关爱？这样可怕的景象已经在赤色分子占据过的地区出现了，为了共和国的传统，为了每个恩爱的家庭，我们必须在各个领域打倒所谓的进步分子，毕竟，共和国不止会为了生存而战，更会为爱而战！"
LNR_rebuild_financial_safety:0 "重建金融安全网"
LNR_rebuild_financial_safety_desc:0 "经济危机的蔓延显示出一个事实：我国的金融安全网就是一坨垃圾。为此，我们必须重建金融安全网，严厉打击非法金融交易，从严从快整顿金融机构，处分那些失职人员。有人认为这是“进步主义者”所提倡的“政府干预经济”与“自由市场的终结”，我们必须客观地批判这一论调：自由市场理论是要求国家管的少，但国家也必须起到打击违法犯罪的“守夜人”的作用。那些嫌政府管太多的蠢货们还是先审视一下自己是不是搞投机搞太多了。"
LNR_rebuild_financial_safety_tt:0 "§Y经济危机§!追加效果：\n稳定度：§G+15.00%§!\n生活消费品系数：§Y-5.0%§!\n每月人口：§G+20.00%§!"
LNR_familiy_business:0 "家族企业"
LNR_familiy_business_desc:0 "随着经济危机逐渐减弱，一些企业也开始从经济危机中恢复了过来。同时，为了促进经济发展，我们应当鼓励乃至扶持新生企业。考虑到我国的宗族势力传统以及当下的基本国情，我们应当大力鼓励家族企业的发展。我们相信，资本或股份主要控制在一个家族手中的企业一定会人道且高效，在通向繁荣的道路上，重视家庭的传统将得到新的诠释。"
LNR_restate_econ_indep:0 "重申经济主权..."
LNR_restate_econ_indep_desc:0 "在这个动荡的年代里，有很多外国企业不幸地倒闭了。我们对此爱莫能助，深表悲伤，但这也是我们重新收回部分之前贱卖给其他国家的矿山的机会——我们总不能让那些工厂和矿山就这么荒在那里吧？为了国家，我们不能浪费这些现成的财富与产能。"
LNR_but_open_investment:0 "...但还是欢迎外资"
LNR_but_open_investment_desc:0 "我们必须强调，我国将永远欢迎外资。毕竟，南巴斯蒂亚地区一直以来都和特尼安半岛有着密切的经济联系，他们为半岛带来了先进的技术与珠宝矿产的销路，我们怎么能不欢迎他们呢？我们将向南巴斯蒂亚的商人们证明，即使是在这个动荡的岁月里，特尼安的市场依然是有利可图的！"
LNR_conservative_culture_free_econ:0 "保守的文化，自由的经济"
LNR_conservative_culture_free_econ_desc:0 "现在，内部的动荡已经逐渐平息。我们满意地看到，自由的市场经济并没有使我们的传统文化变质变形，甚至让两者有机地结合在了一起，诞生出了一个日渐繁荣的社会。我们的民主传统已经挺过了一场又一场灾难，它将越发稳固，直至历史的终结。"
LNR_reorganize_the_army:0 "整顿军队"
LNR_reorganize_the_army_desc:0 "共和军是伟大的，他们两次从赤色分子手中守住了共和国。但这并不意味着他们是完美的——我们必须完成莫里斯未竟的军队改革，确保军政分离，加强民主政府对军队控制，以免士兵继续受赤色分子的影响搞什么“士兵委员会”。哪怕这会意味着我们会调查乃至清洗一部分军官，为了共和国的民主，这是必需的。同时，我们留意到加瓦·阿杜勒这个海军上将在陆军的影响力太大了——这也不能全怪他，毕竟为了消灭赤色分子，精锐的海军陆战队也得进山作战，他也因此担任了一段时间的剿灭赤色特尼安行动的总司令。由于他曾手刃赤色特尼安的领导人，他难免在陆军也拥有不小的威望。我们由衷地感谢他的杰出贡献，但现在赤色特尼安已经被消灭了，他也没有理由继续同时拥有部分陆军和全部海军的指挥权了。相信他也是会理解这点的。"
LNR_expand_presidential_power:0 "扩大总统权力"
LNR_expand_presidential_power_desc:0 "在这个动荡的时代，人民有免于恐惧的自由。为了保护人民，扩编特务机构自然是必要的。而新生的特务机构自然会听命于我国所有武装力量的总司令——赫奇总统。这确实扩大了总统权力，但这并非民主的威胁，而是保护民主与自由的必要手段。"
LNR_end_coop:0 "合作中止"
LNR_end_coop_desc:0 "为了消灭赤色特尼安，议会内部的各党派联合在了一起，但这只是一种暂时的战时措施，赤色分子被消灭后，这种“跨党派的合作”就必须立刻中止。否则，这会严重损害多党制民主的健康。"
LNR_against_bio_hazard:0 "抗击生物灾害"
LNR_against_bio_hazard_desc:0 "薇诺娜莉堡的生物灾害巨网仙人掌肆虐已久，由于经济危机与政治动荡，我们无力处理，现在，我们终于可以腾出手来消灭这该死的仙人掌了。"
LNR_embrace_black_market:0 "拥抱黑市"
LNR_embrace_black_market_desc:0 "黑市很糟？呵，有钱花不出更糟！我国是一个典型的外向经济体，严重依赖国际贸易。由于南巴斯蒂亚联邦崩溃，很多必需品和工业品不再像以前那样可以轻易进口，我们唯有拥抱黑市以及提高非法交易门槛才能解决当下的经济问题。是，我们知道，让黑市直接摆到明面上经营会出问题。但这也确实为我们提供了不少必要的服务。没办法，当自由之光不再闪耀，市场自然也会归于黑暗。"
LNR_expand_drug_planting:0 "扩大毒品种植"
LNR_expand_drug_planting_desc:0 "勒泰特尼安的土地确实不适合种粮食，粮食产量也一直比不上南方的奥科特尼安。但这并不意味着我们就要放弃农业了。只要稍作改革，勒泰特尼安那看似贫瘠的土地也会带来惊人的财富——好吧，说直接点就是勒泰特尼安的气候很适合种鸦片。通过扩大鸦片种植以及发展毒品加工，国家的经济将更上一层楼。不得不说，在这个到处都是杀戮和混乱的年代里，毒品的销路简直比枪炮还好。如果我们能抢先一步占领市场的话，经济腾飞自然不在话下。 "
LNR_military_drugs:0 "军用药剂"
LNR_military_drugs_desc:0 "总有人认为毒品对国家百害而无一利，但事实证明，毒品不仅可以成为新的经济增长点，还可以用来加强军队的战斗力。我们已经发明了新的军用兴奋剂，士兵服用后可以在短时间内激发士兵的身体潜能， 使士兵变得更加强大——不会恐惧、不会疲劳、不会叛逃、力量增强、精力充沛。如果我们能让每个士兵变得更加强大的话，军队的战斗力自然也会显著增长。当然，这些力量是有代价的：这些军用药剂成瘾性较强，毒性也比较大，使用该药剂将损害使用者的身体健康。但考虑到这些士兵能够在险恶的战场上拥有更加强大的力量，他们的存活率自然也会提高。所以，这还能有什么不人道的呢？ "
LNR_contact_foreign_friends:0 "联络境外的朋友"
LNR_contact_foreign_friends_desc:0 "赫奇总统的人脉足以遍布巴斯蒂亚，联系这些“老朋友“将为我国带来意想不到的惊喜。也会为赫奇总统找到商机。"
LNR_national_traffic_act:0 "国家交通法案"
LNR_national_traffic_act_desc:0 "通过改善交通设施，我国经济将得到长足发展。然而，考虑到土地征用问题，成功落实这一法案并不容易。但赫奇总统将让那些地主理解改善交通设施的必要性。"
LNR_face_southern_threat:0 "直面南方威胁"
LNR_face_southern_threat_desc:0 "勒泰特尼安共和国自诞生起就一直有着一个宿敌：奥科特尼安。由于境外大国的干涉，特尼安半岛迟迟未能统一。现在，随着七河联邦与南巴斯蒂亚联邦的崩溃，我们终于可以放开手脚毫无顾忌地解放南方的同胞了！"
LNR_take_down_old_times:0 "打倒旧时代"
LNR_take_down_old_times_desc:0 "同志们，同胞们！两个半世纪以来，南方的独裁者一直都在迫害着南方的特尼安同胞，甚至将金山角卖给了墨精灵，这是我们特尼安民族的耻辱！也是共和主义的耻辱！一个半岛，一个民族，三个政府，这是对共和国天大的讽刺！现在，战端已开，我们将用暴力终结两个世纪的耻辱，为了美丽的家乡，为了先烈的遗志，为了民主的传承，为了民族的统一，我们必须胜利！无论多么黑暗、多么困难、多么恐怖我们也要去获得胜利！"
LNR_dividing_reformists_in_south:0 "分化南方的改革派"
LNR_dividing_reformists_in_south_desc:0 "最近南方正在进行所谓的民主改革，呵，这也依然改变不了他们是敌对的反动政权的事实。同时，我们作为一个拥有着200年民主历史的民主国家，深知民主新生之时的脆弱，只要略施手段挑拨，这些所谓的改革派很快就会分裂，我们也就可以顺势拿下南方。"
LNR_last_chance_to_zbc:0 "向墨精灵发出最后通牒"
LNR_last_chance_to_zbc_desc:0 "南方的奥科特尼安反动政权通过出卖国家主权换取了七河联邦的支持，现在，南方的反动政权已经被消灭，七河联邦依然处于崩溃状态，我们也是时候尽快收回故土了。"
LNR_they_shall_be_proud:0 "不负先烈嘱托"
LNR_they_shall_be_proud_desc:0 "我们成功了。\n\n民族——我们统一了特尼安半岛，让特尼安民族重归一统。\n\n民权——我们碾碎了保王派和赤色分子，多党制民主与新闻自由和市场自由经受住了时代的考验。\n\n民生——麻药、鸦片等新兴消费品带动了特尼安经济发展，也极大地提高了人民的幸福感。尽管反对声不绝于耳，但也已经逐渐减弱。事实证明，经济腾飞与人民幸福是同步的。\n\n我们没有辜负赫克曼·丹特的嘱托：将民主进行到底。我们也实现了国父詹姆·昆哈尔的遗志：统一特尼安民族。很快，勒泰特尼安共和国这个名字将会被一个更加光荣的名字替代：特尼安共和国！"
LNR_they_shall_be_proud_tt:0 "§Y勒泰特尼安共和国§!将被称作§Y特尼安共和国§!"
LNR_reform_of_ours:0 "我们的改革"
LNR_reform_of_ours_desc:0 "随着民族的统一，是时候废除《赫克曼法》了。《赫克曼法》给予了宗族势力和地主掌握民团的权力，但该法案也有明确写到，在特尼安半岛统一后，该法案将自动失效。我们知道，允许地方组织民团使得共和国长期以来饱受暴力犯罪之苦。但我们也不能忘记，该法案诞生于那个战火纷飞的共和革命年代，为了革命的生存，人民必须被赋予武装起来打倒暴政的权利。然而，可悲的是，国家迟迟未能统一，这项法案才被一直保留了下来，酿就了无数的悲剧，阻挠了共和国的发展。现在，是时候向《赫克曼法》说再见了。我们知道，很多民团和宗族势力必然反对废除该法案。我们也知道，现任执政的民主党作为议会的保守派，党员里有相当一部分就是宗族子弟，一直以来也受到了不少宗族势力的支持。\n\n§3但是，那又怎么样呢？§!\n\n《赫克曼法》并没有延长期限的修正案，从金山角回归祖国的那一刻开始它就已经过时失效了。它被废除后，那些民团就必须自行解散，否则，他们就是非法暴力组织，必须遭到共和国的严厉打击！我们将通过一系列措施保证那些民团平稳地解散。这不是什么“正义”，也不是什么“理想”，而是简单至极的法律问题——依法治国！为了法律的尊严与共和国的未来，我们不能退让！"
LNR_let_republic_be_proud:0 "不负共和之名"
LNR_let_republic_be_proud_desc:0 "南巴斯蒂亚联邦崩溃了。但是，共和主义没有！\n\n我们坚信，共和的火炬定会承受住风雨的侵袭。\n\n我们坚信，飞来横祸无法打倒人类，更无法打倒刻在人类骨子里的自由！\n\n从维尔瓦诺到金山角，人民将继续行使他们的权力，享受他们的自由！"
LNR_let_republic_be_proud_tt:0 "§C特尼安万岁！共和国万岁！§!"

