LNR_late_land_reform:0 "迟来的土地改革"
LNR_late_land_reform_desc:0 "虽说好事不怕晚，但勒泰特尼安的土地改革来的确实太晚了。目前国家局势混乱，想要推行土地改革必然困难重重。但从另一个角度来看，混乱的局势削弱了宗族势力和地主阶级的力量，我们因而得以与反对土地改革的保守派抗衡。如果土地改革能够成功的话，困扰我国二百年的宗族势力将被彻底铲除，经济也将得到恢复。我们必须尽快完成土地改革，否则……我国屈辱的历史将迎来一个最为血腥的终章：§R人民不容辜负！§!\n\n勒泰特尼安国内影响力：\n进步派：[?LNR_late_land_reform_influence_1]\n保守派：[?LNR_late_land_reform_influence_2]\n革命派：[?LNR_late_land_reform_influence_3]"
