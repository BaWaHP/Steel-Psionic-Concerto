LNR_trouble_family_motherland:0 "劳动，家庭，祖国"
LNR_trouble_family_motherland_desc:0 "在饥荒，政治混乱与经济危机中，勒泰特尼安迎来了又一个新年。按照传统，新年适宜做的事情有很多，比如加班、逛街、结婚等。但今时不同往日，人们过这个新年的过法肯定也与以往不同。"
LNR_national_mineral_trade_act:0 "国家矿物贸易法案"
LNR_national_mineral_trade_act_desc:0 "尽管我国矿产资源丰富，但由于种种原因，我国矿物贸易管理都较为混乱，该法案将终结这一乱象，从而更好地吸引外资并尽可能快地开发新发现的铝矿。相信这会对解决当下的经济危机有所帮助。哪怕这可能会遭到一些人的反对……但事实上，他们反对的东西（如：出卖主权，无下限的工作条件）早已成为了事实，这个法案只是将其规范化了而已。"
LNR_1998_general_election:0 "1998年大选"
LNR_1998_general_election_desc:0 ""
#进步联盟#
LNR_rule_of_mr_general:0 "白水将军之治"
LNR_rule_of_mr_general_desc:0 "在人民的期望中，“白水将军”加瓦·阿杜勒终于成为了共和国的总统。尽管加瓦能力出众，但眼下的勒泰特尼安还有太多顽疾等待着他。如果我们不想辜负人民的期望的话，我们就必须准备一套完美的改革方案以拯救国家。否则，人民对加瓦的信任很快就会变成失望与愤怒。"
LNR_rule_of_mr_general_tt:0 "§Y经济危机§!追加效果：\n每周稳定度：§G+0.10%§!\n稳定度：§G+10.00%§!"
LNR_friends_from_cities:0 "城市里的朋友"
LNR_friends_from_cities_desc:0 "尽管保守派试图污蔑我们的改革不过是少数乌托邦分子的呓语。可事实是，我们的方案比他们想象的要更加务实，我们的支持者比他们想象的还要多。城市工人、商人、还有逃进城市的农民坚定地支持着我们。联邦各国也对我们表示祝贺，期待勒泰特尼安的营商环境能得到优化。更重要的是，加瓦·阿杜勒与联邦驻勒泰特尼安军队的负责人关系不错。有了这些强大的盟友，我们工作的难度估计会比预计的要简单一些。"
LNR_enemies_within_countryside:0 "农村里的对手"
LNR_enemies_within_countryside_desc:0 "进步联盟总是认为自己才是农民的朋友，但仍在山区活动的农工革命党也靠着不可能兑现的民粹主义承诺与公开处决的政治恐怖骗得了许多农民的支持。为了保卫共和国的农民与民主，我们必须消灭他们。由于有了共同的敌人，国家联盟的保守派也乐意在此事上帮我们一把，这或许会弥合共和国的裂痕。"
LNR_against_evil_forces:0 "打击黑恶势力"
LNR_against_evil_forces_desc:0 "勒泰特尼安崎岖的地形给了黑恶势力藏身之处，宗族势力对犯罪分子的荫蔽更是让这些不法之徒肆无忌惮。这不仅恶化了我国的治安环境，还严重阻碍了我国经济的发展。而加瓦·阿杜勒的声望就是靠打击犯罪打出来的，这就是加瓦能够赢得大选的主要原因之一。在他的领导下，许多以前“无法解决”的“悍匪”都将被绳之以法。但我们都很清楚，若是想要将这些匪徒斩草除根，我们就必须先解决那些庇护着他们的保守派。这无疑是个大工程，我们现在能做的，就是先打击一些过分嚣张的黑恶势力。至于其他的黑恶势力，我们会“警告”他们，提醒他们以后再也不能嚣张了，现在回头还来的及。而海军陆战队以及联邦驻军就是最好的执行者。"
LNR_against_evil_forces_tt:0 "§Y经济危机§!追加效果：\n稳定度：§G+5.00%§!\n生活消费品系数：§Y-5%§!"
LNR_collect_the_fund:0 "募集资金"
LNR_collect_the_fund_desc:0 "勒泰特尼安的财政状况就跟勒泰特尼安的财政史一样不堪入目，以至于让我们差点忘了，勒泰特尼安是坐在矿山上的国家。幸运的是，我们有着全特尼安半岛最优秀的商人与经济专家，这些日子对营商环境的优化也让我们得到了外资的青睐，市场信心得到了一定的恢复。因此，募集改革需要的资金或许不会太难。"
LNR_promis_to_progress_and_flourishment:0 "进步与繁荣的诺言"
LNR_promis_to_progress_and_flourishment_desc:0 "一直以来，勒泰特尼安的工人们对我们寄予厚望，我们不能辜负他们。同时，长期以来我国妇女饱受性别歧视。尽管我们目前能为他们做的事不多，但我们依然要尽快让他们明白支持我们没有错。既然我们已为人民许下进步与繁荣的诺言，我们就必须尽力改善他们现在的处境。"
LNR_back_to_ruined_villeges:0 "重返被毁的村庄"
LNR_back_to_ruined_villeges_desc:0 "国家陷入混乱已久，不少村庄已被赤色分子摧毁或占领。我们必须遏制他们的暴行，而国家联盟里的保守派人士也会因此认可我们。"
LNR_ensure_army_loyalty:0 "确保军队忠诚"
LNR_ensure_army_loyalty_desc:0 "勒泰特尼安共和军一直恪守着政治中立的原则吗？不，决不。陆军处处充斥着腐败，几个大家族的子弟毫无真才实学却能稳做军队高层。这些人不可能不会偏袒他们的同乡。而这些“同乡”大都是保守派的高官。更糟糕的是，军队中还出现过两次§R共产主义叛乱§!。1972年的§R卡德纳斯叛乱§!与1995年的§t金斯伯格叛乱§!让勒泰特尼安陆军沦为了整个南巴斯蒂亚的笑柄。如果我们想要确保自己能够活着完成改革，我们就必须在正式开始土地改革前确保军队的忠诚。……先提拔几个能干的自己人或许是个办法，毕竟军队里已经没有几个能干的高级军官了。哪怕保守派们再怎么反感我们，为了消灭赤匪，他们都得捏着鼻子承认我们这么做是有利于国家安全的。"
LNR_land_reform_that_must_done:0 "势在必行的土地改革"
LNR_land_reform_that_must_done_desc:0 "土地改革势在必行。成功的土地改革将一劳永逸的解决困扰我国二百年的宗族势力并恢复经济。但像这种好事哪有那么容易呢？加瓦总统很容易就能让议会通过土地改革的法令，但能否得到落实就是另一回事了。毕竟勒泰特尼安的地主宁愿在人民冲天的怒火中灭亡也不会让自己的粮食和土地落到外人手里。说真的，我们曾经考虑过和人民党（今日农工革命党的前身）联合起来把这帮无能又无耻的畜生扫进历史的垃圾堆。但如果以前我们这么做的话，我们难免被我们的盟国指责为无视个人权益的暴徒……§R但现在，联邦各国深陷危机，他们管不了我们那么多了！人民早就忍无可忍了！§!"
LNR_the_dinner_party:0 "晚宴"
LNR_the_dinner_party_desc:0 "不出意料，推行土地改革的第一个月爆发了诸多问题。但我们可不像赤色分子，稍微被老百姓反对了一下就要让老百姓闭嘴然后以人民的名义发动对他们的监禁与屠杀。我们会以酒食与良言相待，聆听他们的意见与建议，从而改进自己的工作方法，达到各方互惠共赢的效果。这就是勒泰特尼安共和国的民主传统。"
LNR_clan_harmlessness:0 "宗族无害化"
LNR_clan_harmlessness_desc:0 "如果我们真的想要推行我们的改革的话，我们就应当与保守派进行一定的双向妥协。目前看来，宗族势力并没有完全抵触我们的政策，宗族势力当中也有不少人渴望变革甚至支持进步联盟。而我们也可以废除一直以来允许他们招募私兵和指挥地方民兵的《赫普曼法案》来彻底实现宗族势力的无害化。当然，尽管我们在选举中赢得了议会多数席位，想要废除这一法案仍然是有代价的：我们必须挤出一部分资金投资农村，我们手上的关于保守派的违法乱纪的证据也都必须交出去，农工革命党必须被尽快消灭否则宗族势力就有充足的理由保留他们的私兵。这或许有损公平与法治，但总比挑起一场全面内战强。\n\n§R大概……§!"
LNR_clan_harmlessness_flag:0 "晚宴正常进行"
LNR_invest_countryside:0 "农村投资"
LNR_invest_countryside_desc:0 "土地改革最主要的意义是在农村建立新的经济体系。这个经济体系是高效的、雇佣的、面向城市与市场的生产需要的，而非是低效的、自给自足的、人身依附的。也就是说，强迫地主把土地交出来和把地主们通通杀光并不是必须的。我们现在要做的，是让他们明白土地只是一种资本，一种生产要素而非他们的全世界。具体做法是，改善营商环境，让本土企业而非外国企业和他们做生意，从而推动农村经济体系的变革。而维鲁作为勒泰特尼安最大的家族的族长次子兼肥沃农业集团的董事长，想要和宗族势力里的地主们做生意肯定比外企方便的多。"
LNR_invest_countryside_tt:0 "§Y肥沃农业集团§!，其效果为（民用工厂建造速度：§G+5.00%§!，地区最大工厂数：§G+10.00%§!，每月工业发展水平点数增长：§G+1§!，每月农业发展水平点数增长：§G+3§!，资本集团）"
LNR_find_new_path_for_clans:0 "给宗族子弟指条新路"
LNR_find_new_path_for_clans_desc:0 "勒泰特尼安的宗族中有着重视教育的风气。有不少宗族子弟被寄予厚望去城市或国外学习。好处是这让勒泰特尼安的学术水平没有因为国家的贫穷而落后于时代的脚步。坏处是勒泰特尼安的经济状况根本没法与她的学术水平相匹配，或者说，勒泰特尼安的经济过于落后，能够提供的需要大学学历的技术岗位太少了。很多勒泰特尼安知识分子回到农村后发现自己的价值观与长辈们不同，自己的知识在山村中根本没有用武之地。这甚至激化了社会矛盾，社会因此变的越发激进。因此，我们应当尽可能的让那些知识分子们找到除了种地和向农民催债之外的工作。只要农村的就业状况变了，农村就一定会变，我们的土地改革的阻力将会大大减少。"
LNR_succeed_land_reform:0 "土地改革成功"
LNR_succeed_land_reform_desc:0 ""
LNR_succeed_land_reform_tr1:0 "保守派影响力<=§Y5§!"
LNR_succeed_land_reform_tr2:0 "革命派影响力<=§Y5§!"
LNR_burn_down_the_clan:0 "燃尽腐朽"
LNR_burn_down_the_clan_desc:0 "好啊，这些混账东西给脸不要脸的话那我们也不必手下留情了。建国200年来，这些地主以血缘关系结成了一个又一个宗族牢牢掌控着农村，阻碍了国家的进步与发展。这些混蛋一直以来目无法纪，我们作为民选政府没可能也没必要和他们达成什么狗屁交易。我们要做的，就是无视他们的怒吼与哀嚎坚定不移地推行土地改革：哪怕动用暴力！"
LNR_burn_down_the_clan_flag:0 "晚宴遭遇不测"
LNR_another_knife:0 "另一把刀"
