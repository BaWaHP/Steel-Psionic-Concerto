###民族精神###
HGL_fund_from_ast:0 "奥施特莱尼亚的援助"
HGL_fund_from_ast_desc:0 "在1821年的密约中规定奥施特莱尼亚王国有义务每年提供一笔钱支援来支援宏戈利亚的轻工业和基础设施的建设。目前奥施特莱尼亚王国还在支付这笔援助。"
HGL_the_centre_group:0 "中央集团"
HGL_the_centre_group_desc:0 "自1728年开始宏戈利亚的军事贵族就利用半人马军队的价值反复横跳，争取利益最大化。而到了近代这个利益集团逐渐控制了国家，随着中央集团势力扩张，这个集团已经越来越无法无天，变得极为庞大。在1996年的刺杀案风波中中央集团彻底激怒了人民，中央集团对全国的控制力大大下降，尽管面对内忧外患中央集团任然没有想过要让渡任何权力，甚至还在继续打压集团内的完全改革派。所有人都知道中央集团已经时日无多了。"
HGL_armsd_disarmament:0 "军备废弛"
HGL_armsd_disarmament_desc:0 "在1821年的密约中宏戈利亚王国限制重武器配备，严格限制重武器生产，宏戈利亚王国本土仅能保持少量军队，大部分军队都在奥施特莱尼亚王国服役，并且听从奥施特莱尼亚王国总参谋部调遣。同时大量的青年才俊也因为奥施特莱尼亚王国优厚的待遇也纷纷在奥施特莱尼亚王国服役。本土的将领都是老而无用的关系户，他们固执己见刚愎自用。在镇压地方骚乱中都频频出现失误，若是出现大规模的动乱则后果不堪设想。"
HGL_agricultural_country:0 "农业国度"
HGL_agricultural_country_desc:0 "自古以来宏戈利亚就是一个传统的农业地区，而农业出口是中央集团的主要经济来源，因此中央集团想方设法的阻碍工业发展，拒绝发展工业，使宏戈利亚多次错过工业化的机会，在中央集团的控制下宏戈利亚直到今天还是一个保守落后的农业国。"
HGL_treasures_from_boiseco:0 "来自波伊斯科的“财宝”"
HGL_treasures_from_boiseco_desc:0 "在奥施特莱尼亚王国攻下波伊斯科公国建立总督辖区之后，便一直在大力掠夺资源，在中央集团的争取下，为了表彰伟大战争中表现杰出的半人马，奥施特莱尼亚王国赋予了宏戈利亚王国在总督辖区的同等地位，因此宏戈利亚也能在波伊斯科获得大量廉价的资源来促进本国生产。"

###领导人###
HGL_sechenyi_till:0 "赛切尼.蒂尔（tel）"
HGL_sechenyi_till_desc:0 "在宏格利亚这个保守的农业国家中，拥有前往克拉亚诺这样的共和国家留学的机会是可以说是百年一遇。在克拉亚诺的留学游历让蒂尔认识到宪政化必要性，宏戈利亚的变革不能再等，不然未来的动乱将撕碎宏戈利亚，这个他爱的祖国。归国后的蒂尔在自己的辖地实践，向农民普及教育提高乡村基础设施。这些举措为蒂尔获得了极大的声望，但同时他也进入了那些保守的大人物的视野。\n\n很快，在新一轮奥普茨市的市长选举中，蒂尔因为之前的改革举措赢得的声望和他既广泛又实用的关系成功胜选，成为了奥普茨市的市长。胜选的蒂尔运用先前的经历开始在奥普茨市推行缓慢且温和的改革。然而即使是这样的改革也很快受到保守贵族的联合抵制，大量政令一经公布便石沉大海。不过还是有一些侥幸得到实施的法令为蒂尔赢得部分民心，为蒂尔随后的仕途亨通提供了坚实的基础。但即使蒂尔已经升任省长和内阁大臣，宏戈利亚政策缺没有任何改变，蒂尔对此痛心疾首。\n\n随着宏戈利亚政治环境的极端化，越来越多的公民要求限制贵族权利，实施民主宪政。这给了蒂尔一个机会。保守的贵族们不得不宣布启用已经不惑之年的蒂尔以缓解王国内部的极端化倾向。然而事实证明，蒂尔之前的经历不会因为几次示威和游行就不在出现。蒂尔大部分的改革政策都被内阁大臣们联合反对。每一次试图对内阁大臣的任免都会遭受全体大臣的退阁威胁。内阁成员完全按照自已的意愿行事，无视蒂尔的任何政令。任何不符合贵族利益的法案都会受到议院的强烈反对。\n\n这些经历无一不在告诉蒂尔，这个国家根本不存在程序正义，保守的土地贵族掌握着绝对话语权。然而蒂尔并没有就此放弃，他仍然心存侥幸，希望可以改变些什么，哪怕只有一点。五年又五年，蒂尔已经在首相的位子上坐了二十多年。然而成功颁布的法令屈指可数，大部分的法案沦为废纸，垂垂老矣的蒂尔已经无力再做些什么了。自己公章的一次次的丢失，也证明了蒂尔已经被完全架空。此时已经没有任何法令提案经过他了，他与内阁的关系与其说是首相的内阁不如说是内阁的首相。就连更换秘书也都需要内阁的批准。\n\n蒂尔已经无力回天了。在每个阳光明媚的下午，蒂尔都会在办公室小息一会。因为每当阴雨天气的到来他都会感受到关节的刺痛，这种刺痛不光让他的身体感觉前所未有的痛苦，也让他的心情更加悲伤——这是对自己的无能和国家的现状的悲伤。面对着这个暴力事件的层出不穷，民众的耐心消耗殆尽，保守的贵族不知悔改的国家。蒂尔已经倾尽所能，而他现在已经知道：一切，都，§R太晚了。§!"

