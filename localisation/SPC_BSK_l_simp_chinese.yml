###民族精神###
BSK_clouds_of_total_riot:0 "总暴动的阴云"
BSK_clouds_of_total_riot_desc:0 "传闻中波伊斯科反抗势力正在暗中集结，给新任女王一点震撼并终结二元王国的统治。这个风声透出来很久了，但是即时经过二元王国一轮一轮的增兵投入大量情报力量，二元王国方面仍未取得有效进展。若不能发现关于暴动的关键信息，暴动开始时则会处于绝对劣势。"
BSK_civil_military_opposition:0 "文武对立"
BSK_civil_military_opposition_desc:0 "波伊斯科的文官系统屡次要求总督取消戒严状态，以恢复日常政治经济活动来维护文官集团的利益。然而总督的军队几乎没有得到来南部的资金，军队需要维持戒严用以自筹经费，这无疑触犯了文官集团的利益，因此文官集团拒绝为军队服务，筹饷的工作也愈发困难，若没有资金那么军队的忠诚就得打上问号了。"
BSK_castle_nightmare:0 "高堡梦魇"
BSK_castle_nightmare_desc:0 "作为南巴斯蒂亚最古老的骑士团与中巴的骑士匪团不同，玛丽安堡骑士团任然遵循戒律，恪守古代仪式和行为准则。而玛丽安堡在骑士们手中经营超过三个世纪早已成为名副其实的堡垒。战功赫赫的骑士团是每一任总督挥之不去的噩梦，战绩彪炳的骑士无论对魔兽还是任何想威胁其存在的东西都毫不手软。历任总督的清剿记录几乎都有同一答案即一人生还。"
BSK_political_extremism:0 "政治极端"
BSK_political_extremism_desc:0 "极端高压的环境毫无疑问促成了极端的政治，极端民族主义无政府主义等等纷纷在这片舞台登场，所有的温和派纷纷因为主张不够极端而失去市场，这是一个十分危险的现象，如果不快速控制，那么迟早被巨浪所吞噬。"
BSK_economic_control:0 "经济控制"
BSK_economic_control_desc:0 "波伊斯科的经济既不由文官规划，也不受武官们的统辖。波伊斯科的经济完全被奥施特莱尼亚控制，除此以外每年大量的收入还要供给奥施特莱尼亚和宏戈利亚。"

###领导人###
BSK_blake_andwhite:0 "布莱克·安德怀特"
BSK_blake_andwhite_desc:0 "如果说谁是二元王国最幸福的人，那布莱克·安德怀特必定榜上有名。布莱克1970年出生于奥施特莱尼亚王国的大贵族家庭，并被立为家族的继承者。很明显出生在这么一个钟鸣鼎食的家族中还被立为继承者，布莱克自幼便得到了最为顶尖的教育和资源。布莱克高贵的出身也给他带来了一个显而易见的后果：高傲——就算是对同阶级的贵族也是如此，更不用说上不了台面的平民百姓了。\n\n布莱克认为这没什么问题，他自小的家庭环境和教育影响都在告诉他：似乎他与那些异族，那些平民天生就带有难以逾越的鸿沟。平民和那些异族就该被贵族统治，直到他们的生命走向终结。应该说明的是，这不是布莱克一个人的想法，他身边的人太多都秉持着这种想法。\n\n即使出生在这样的大家族里，布莱克却并没有变成纨绔子弟。他自幼便成绩优异，体术兼优。自20岁离开学院生活后便加入了军队，在军中表现优异，到27岁时便已经成为了师级中校。很快，他便收到了家中的安排：前往波伊斯科担任总督。如此重大的职位让一个才28岁的年轻人来担任，这显然是他背后家族运营的结果。\n\n但布莱克却没有感到有什么压力，他是如此的骄傲，如此的光芒四射。自出生以来便一直顺风顺水，未经失败。这显然给了他极大的信心，总督不过是他镀金的一个小小的过场罢了。未来注定是一片光明的，无论是他本人，还是他的家族。\n\n就任后的布莱克野心勃勃的环顾四周，才发现波伊斯科的局势是那么的糟糕：西边是四处游散的§O半人马解放军§!，北方是那些§g保皇派§!的蠢货。而在最北边有着历代波伊斯科总督都无法解决的难题——§Y玛丽安堡的骑士们§!。\n\n布莱克并没有被吓到，越是艰难的局面，越能激发他的斗志。就像所有的英雄史诗中所歌颂的那样，讨伐邪恶的腐烂§Y骑士们§!，将异端的头颅高高举起，进行盛大的胜利游行！这就是他的野心，至于改善波伊斯科平民们的生活条件，布莱克并没有什么兴趣。只要这群低贱的下等人能够不在他实现野心的时候来打扰他就可以了。也许他要面临的阻碍会很多，但只要总督大人的计划没有发生§R变化§!，那么一切都尽在他的§R掌握之中§!。"
