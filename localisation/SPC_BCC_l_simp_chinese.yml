###民族精神###
BCC_security_contractor:0 "安全承包商"
BCC_security_contractor_desc:0 "边境安全承包商是黑冰安保集团旗下的一家子公司，专门成立用于维护投资人在北中巴地区的利益。在托克尔达开拓领以及“冰峰”经济联盟的共同出资下，安全承包商获得了位于边境的一块土地，并得到命令驻扎当地维护边境治安，防止来自北方的难民涌入南方破坏殖民地稳定。\n\n由于安全承包商的特殊性质，其行政，军队和财政结构均和一般的政权有较大区别。武装力量的人员，物资补给大多来自外界，军政府对当地的统治也仅限少数几个定居点和军事力量驻扎地区，对其它地区则以定期巡逻为主。这样独特的统治形式极大影响了承包商的内部行政结构。"
BCC_security_contractor_tt:0 "§C我们可以接收来自后方的援助！§!"

BCC_veteran_of_hundred_wars:0 "百战老兵"
BCC_veteran_of_hundred_wars_desc:0 "构成边境安全承包商地方主力部队的士兵，军官主要源于世界大战后，中巴联盟行政，军事改革时遣散或转移来的老兵。这些老兵大多参加了世界大战后战后南巴联邦组织的对北方其它反抗的军事行动，战斗经验丰富，而且行动高效。尽管如此，无论是上了年纪的老兵，还是恪守成规的老军官，这些部队大多遵守过往的战争准则，对新的军事理论，武器装备缺乏理解和经验。"

BCC_no_way_home:0 "归乡无期"
BCC_no_way_home_desc:0 "由于南巴联邦和新生的中巴联盟对老兵的冷淡态度，世界大战后，被遣散的许多士兵不得不签署堪称吸血的合同以向私人安保公司效忠，否则只能面临沦落街头的命运。然而，这也导致了士兵们无限延长的驻扎期限，大量为国奋战数十余载的老兵们被祖国抛弃在了文明的边界，荣归故里的梦想则愈发遥远。"
BCC_no_way_home_tt:0 "§R老兵们的不满会愈演愈烈。§!"

BCC_turn_a_blind_eye:0 "“睁一只眼，闭一只眼”"
BCC_turn_a_blind_eye_desc:0 "虽然安全承包商的前身是参与镇压了北中巴地区兽人暴动的雇佣兵，不过随着来自南方的资源减少，承包商的非人物种政策又摇身一变改为了驱逐和无视。对于边境的雇佣兵而言，抵挡来自北方的劫掠者是第一要务，各地的非人物种原住民则处于优先级较后的状态，只要他们不来定居点闹事，那承包商的炮火便不会倾泻在他们身上。"

###领导人###
BCC_jack_jones:0 "杰克·琼斯"
BCC_jack_jones_desc:0 "杰克·琼斯很少把自己视作一位掌握了大片土地的地区领导人，在他看来，自己无非就是位戎马一生的将军，在中巴联盟镇压原住民，在瑟拉斯打西方的敌人，在沃姆当雇佣兵，然后又回来保卫殖民地边境，说到底他做的事情都一样——夺走生命，保护生命，以及对自己的下属负责罢了。曾经的他也有愿意为之效忠的国度，可那份忠诚早就随着世界大战的硝烟化为乌有了，现在的中巴联盟不过是群徘徊在名为“中巴斯蒂亚”的尸体上的秃鹫，等这片土地最后一丝油水被榨干，他们就会飞似的跑走。\n\n有时候，他会做噩梦。梦到在瑟拉斯的大撤退，梦到天壁同盟的魔导士军团，像是拍打面团一样把联邦精锐的装甲部队撕得粉碎，士兵像割草一样一排排倒下，曾经繁荣的定居点则化作一片火海。一切都是徒劳，数百年的耕耘，几代人的血与泪，到最后一无所有。\n\n有时候，他也会做美梦。梦到在普莱尔茨的那个夏夜，海浪轻轻拍打在沙滩上，他抚过少女的脸颊，感叹那细腻的皮肤，两人靠着温暖的火堆为未来做打算。她说想要开一家小咖啡馆，就卖点咖啡，小蛋糕什么的，她说自己有奶奶传下来的独门秘方，她还说要把妈妈的婚纱翻出来洗一洗，问他觉得好不好看。\n\n有时候，杰克会问自己，他能做什么？那些和他并肩作战的士兵早已老去，他们不想在边境过着有上顿没下顿的生活，不想在冰天雪地的丘陵里急行军，更不想继续当刽子手一天天屠戮未曾相识的原住民。对于杰克而言，或许最好的决定，便是忠诚执行集团下达的命令，维持边境稳定，准备好权力的交接，然后想办法为自己和下属们谋得退休的可能。\n\n可在梦里，他又看到了另一番景象。他这一生一事无成，当时代的年轮向他滚滚袭来时，他就像个懦夫一样成为了千万齿轮中的一环，他亲手葬送了自己本可拥有的幸福未来，毅然决然地走向了地狱之路。现在，除了忠诚的下属，他已一无所有，如果老兵希望为自己对过往回忆做最后一搏，那现在便是最后的机会。\n\n§R失败，则万劫不复。§!"

