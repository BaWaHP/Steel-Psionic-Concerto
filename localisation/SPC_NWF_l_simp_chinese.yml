###事件###
NWF.500.t:0 "意料之外？"
NWF.500.d:0 "霍伟才曾犹豫了很久。当远乡将出使西北、商议和平回归的任务交给他时，霍伟才甚至想要辞职了。五年前，他可以说是从西北那片混乱和荒芜中逃了出来，匆匆结束了出使人物。而现在，霍伟才不禁怀疑起自己是否还未离开远乡。金碧辉煌的宴会厅、优雅的音乐、壮丽的香槟塔……对了，远乡最近的反腐法令已经杜绝了这种挥霍的宴会，他一定是在西北。\n\n“没想到邱司令您还有着化腐朽为神奇的妙招，真乃‘虎父无犬子’啊。”霍伟才同身旁的年轻男子碰杯。“我当时在平京果然没看走眼，您可不只有军事才能，更是远乡难得的栋梁之材。”刚刚那句话不全是客套，五年前邱向荣在私下向他极力赞扬了自己的天才儿子，后来他回到平京时专门去军事学院和邱海清聊了聊。很可惜的是，那群老家伙可不想让英雄的儿子分一杯羹。\n\n“您过奖了，我和我父亲相比还差了很多，他和他的团队在解决西北的混乱中起到了很大的作用，而我不过是在旁边打下手并学习罢了。”邱海清表现得很谦卑。这并不像他，霍伟才不禁开始思考。代表团所接受的礼遇、他们一路上所见识的欣欣向荣之景，这可以说都是邱海清刻意营造的。西北不可能在三年内就如此改观，邱海清刻意挑选了最好的一面，而且刻意过头了。\n\n晚宴终归还是结束了。当代表团离场时，霍伟才听到了下属们不舍的叹息。他同邱海清握了握手，客套了几句，坐上前往招待所的汽车。整洁的街道、宁静的夜晚，但霍伟才还是隐约看到了路灯上的点点血迹——很显然，并不是干涸了很久的。他揉了揉眼睛，小声嘟哝："
NWF.500.a:0 "“虽说是糖衣炮弹，糖衣的质量是真不错。”"

NWF.501.t:0 "情理之中"
NWF.501.d:0 "谈判是出乎意料的顺利。霍伟才曾以为远乡让他传达的条件过于苛刻了，但西北军部可以说是全盘接受了，甚至于还在认真地讨论如何高效地实现平稳过度。糖衣炮弹的炮弹在哪里？霍伟才没看到。作为外交世家的长子，霍伟才见识过也听说过各种各样或明或暗的外交手段——你也可以称之为使袢子，而他现在已经开始怀疑自己的水平下降了。\n\n不过，端倪终于要显露了，在谈判的最后一天。在下午正式签署协定前，邱海清请霍伟才出来和他兜风，“以朋友的身份”。霍伟才同随行武官安排了一个营救计划，把同远乡的紧急通讯码告诉通讯员，欣然坐上了邱海清派来的汽车。邱海清示意司机降下车窗，清了清嗓子，指了指车后厢。“知道为什么这辆车起步这么慢吗？”\n\n“我相信邱司令在军校中没学过定向爆破，也不会做这么没品的举动。”霍伟才摘下眼镜。“一箱黄金，对吧？西北不是你所营造的如此欣欣向荣，但你还是希望谈判能成功，远乡不会拒绝你们的诚意。不过，你肯定有些别的要求，不然也不会在签字前把我叫出来。”\n\n“事实上，我从未担心过谈判破裂。”这是邱海清第一次在言语中透露急躁。“我担心的是另一件事。远乡方面会如何安排西北的人事变动？我会离开这里吗？说的难听一点，远乡会把我和我的团队调走吗？”\n\n意料之内的担忧。霍伟才清了清喉咙。“根据我得到的指示，远乡暂时并不愿意直辖西北——这对他们而言仍然弊大于利。不过，邱海清，要是你树大招风，他们迟早要来收果子的。”\n\n“怎么会——”邱海清的情绪差点失控，然而他很快想起了车后面的黄金。“霍伟才，只要你帮我，不，我们，这黄金不过是我给你的定金。你要在平京帮助我们——”\n\n“为你打掩护、让你继续做土皇帝？那可有点太难了，这是要拿我的——”\n\n“不，恰恰相反。”邱海清摇了摇头。“我就直说吧。我需要你夸大西北的繁荣，让他们尽早将我明升暗降，让我，和我的团队，都能回到远乡。”"
NWF.501.a:0 "霍伟才认真地思考了几秒，排除了今天是愚人节的可能。"

NWF.502.t:0 "归乡"
NWF.502.d:0 "邱海清深吸了一口气。今天早些时候，他在中央军校发表了演讲，然后带着西北的“特产”拜访了霍府，最后前往远乡第一军事研究所——他现在的工作单位——完成岗位交接。当他来到这间霍伟才帮忙置办的住宅时，太阳已经落山了。\n\n果不其然，远乡的权力核心非常忌惮他这个西北土皇帝，干脆把他发配到了研究所这种清闲而没有前途的地方。但这不重要，不重要。到平京已经有14个小时，但邱海清还是会为了平京这独特的气息而陶醉。他将自己努力半生的成果都送给了远乡，终于换来了这个机会，回到他从儿时就魂牵梦萦的地方，他真正的故乡。\n\n邱向荣和邱海清都很倒霉，他们奋斗过头了，导致他们还是不能摆脱那肮脏落后的西北，洗刷自己肮脏的身份。但邱海清终究幸运了这么一次。邱海清还没有孩子，他在结婚时就做了决定，一定要让孩子获得平京的户口，让孩子成为真正的平京人。对了，他需要立刻和西北划开界限。要是邱向荣不愿意过来的话，就干脆和他断绝亲子关系得了——自己不需要一个西北的父亲。在西北的存款与“特产”，这都需要立刻抛弃。虽然他自认为没有留下任何证据，但他已经不能接受这些从西北获得的资产了，仿佛它们都沾上了西北的“肮脏”。对了，自己应该要改名，叫邱平京——"
NWF.502.a:0 "于是，邱海清在这过于香甜的空气中晕了过去。"

NWF.503.t:0 "如梦初醒"
NWF.503.d:0 "张瑞看了看时间，扛上步枪，走出哨所。由于远乡军部同西北军部的直接通讯从未恢复，南远乡王国在和西北的边界设置了岗哨，虽然只是以备万一。这可真是个清闲的职位，除了每周补给和长官来的那一天，张瑞和同伴们几乎不需要怎么巡逻。如他们所见，西北军部从未在这条边境上设置界碑或岗哨。同样是远乡王国的一份子，南远乡何必要防备弱小混乱的西北呢？\n\n张瑞似乎听到了什么动静。大概是哪种动物吧，兔子或狼。上次补给来的时候，他听说隔壁哨所打死了好几只兔子，饱餐了一顿。自从服役以来，张瑞还从未对什么生物开过枪。他饶有兴致地举起枪，观察前方浓雾中的草原。那是兔子？还是狼？应该都不是。张瑞仔细地看了几遍。事实上，那是——\n\n“敌袭！”张瑞慌张地跑向哨所。在他的同伴做出回应之前，一发榴弹落在哨所顶端，把粗制滥造的哨所和同伴炸成碎块。在冲击波的作用下，张瑞晕了过去。\n\n当张瑞醒来时，他已经失去了步枪。西北的士兵拿枪指着他，让他吐露出远乡军的情报。张瑞挠了挠头。“我没想错的话，西北军不是远乡的部队吗？”\n\n“一直都是。”士兵拿枪口抵着张瑞的太阳穴。“我们要前往平京，清洗蒙蔽了国王的奸臣。现在，如果你还未被那群奸邪之人洗脑的话，就告诉我们你所知道的一切。”"
NWF.503.a:0 "同伴使用的致幻剂一定很高端，张瑞这么想。"

NWF.504.t:0 "终于醒来了？"
NWF.504.d:0 "当阮炎在战俘营的角落看到这个俘虏时，他并没有感到什么异常。根据脸上的脏污与消瘦的身形来看，这个俘虏应该是刚开战那时的。然而，当他尝试靠近时，俘虏竟然拿出小刀，试图要杀死自己的战友。幸好阮炎还算身手矫健，不然躲过了枪林弹雨的他就要这么不明不白地死去了。\n\n不久之后，这个叫张瑞的战俘一边在野战食堂狼吞虎咽，一边向阮炎问出各种奇怪的问题，从“远乡的国王是谁”到“你有没有被洗脑”。看来张瑞是被西北军洗脑了，阮炎叹了口气。全天下的人都知道西北军是一群贪图权力的叛徒，没想到他们对待战俘用上了这种不人道的技术。\n\n“所以，兄弟，”张瑞放下餐具，用肮脏的袖子抹了抹嘴。“我真的是被西北洗脑了是吗？郑钧仍然是国王、没有被奸臣架空，你说的没错吧。”\n\n“货真价实。”阮炎无奈地说。“最近军饷都涨了不少，你作为哨兵还会不记得这个？”\n\n张瑞眨了眨眼，仿佛刚刚从幻梦中苏醒。"
NWF.504.a:0 "“说实话，我不太记得了。”"

