###民族精神###
NWF_unpopular_gov:0 "不受欢迎的领导层"
NWF_unpopular_gov_desc:0 "西北特别行政区独特的历史使得它在群众眼中通常没有什么好印象，重建工作的混乱进一步加深了群众对政府的厌恶。虽然我们的领导人正努力改善我们政府的形象，这仍然需要很长的一段时间，在战后重建的工作陷入停滞的当下则更为困难。"
NWF_inefficient_gov:0 "低效率的政府"
NWF_inefficient_gov_desc:0 "虽然情况在我们统治西北地区的数年时间内得到了些许的改善，我们的行政机关依然在以相当低的效率工作。在重建早期阶段，我们所建立的军政府并没有整合好原先的当地政府，东南地区的经济危机进一步使得我们的重建工作陷入停滞，各地暴乱层出不穷，我们也不得不选择重拳出击对付这些平民。铁腕政策助长了政府的军事化程度，在重建工作完成前，我们不得不依赖于军队的力量，而这使得建立起有效的官僚机构几乎不可能。"
NWF_reconstruction_in_chaos:0 "混乱的重建工作"
NWF_reconstruction_in_chaos_desc:0 "早在东巴斯蒂亚大战结束后第一天，就有人提出应当延缓西北地区的重建工作——事实证明他们说的正确无比。远乡王国的核心地带一直到今天也无法彻底恢复到战前的繁荣，西北地区的重建工作在几乎没有任何资金和物资的情况下完全依赖于军队的铁腕政策以维持稳定。“在西北地区重建还不如去中巴斯蒂亚垦荒”这句话早已经成为了我们政府的格言。"
NWF_military_leads:0 "军队领导"
NWF_military_leads_desc:0 "我们政府的运作高度依赖军队的存在，尽管在大多数情况下，这使得我们的重建工作迟缓，民众抗议。可从另一个角度来看，以军队为主导的统治比起常规的政府更容易巩固，虽然这并非长久之计，当下我们依然可以利用军队来尽快实现我们的目标。\n\n§R然而，假如我们向军队索取过多，他们或许会对我们抱有不必要的期望…§!"
NWF_popular_neutral_region:0 "受欢迎的中立区"
NWF_popular_neutral_region_desc:0 "东巴斯蒂亚大战结束后，远乡王国的周边诸国的关系都不是很好，加上战争带来的经济危机，各国在明面上都没有什么商业往来。然而，西北特别行政区作为仍在“重建”的地区，虽然严格意义上是远乡王国的一部分，其领地并非在方方面面都严格受到远乡中央政府的监督，这也使得当地黑市泛滥——整个东巴斯蒂亚都希望在我们这儿走私点什么。"

NWF_complete_meltdown:0 "彻底的崩溃"
NWF_complete_meltdown_desc:0 "和远乡的通讯的中断是第一块多米诺骨牌。西北这几十年来埋下的隐患就这么一起爆发了，把为数不多的稳定与繁荣送上了天。"

NWF_restabalizing:0 "稳定恢复"
NWF_restabalizing_desc:0 "终于，西北从彻底的崩溃中恢复了过来。虽然我们还是没有彻底重建，但我们至少已经超过了崩溃前的状态。"

NWF_absolute_loyal:0 "绝对的忠犬"
NWF_absolute_loyal_desc:0 "多亏了我们那位司令，西北现在完全成为了远乡的忠犬，成为了大人物们发财与交易的地方。"

###领导人###
NWF_Qiu_Xiangrong:0 "邱向荣"
NWF_Qiu_Xiangrong_desc:0 "把目光投到三十年前，当世界大战的阴霾笼罩巴斯蒂亚时，邱向荣仍是一名心怀理想的新任军官。刚刚得到晋升的他还没来得及跟亲朋好友庆祝这一点，就被迫走上了战场。那时候的他怎么也想不到自己会有统治自己老家的这么一天。\n\n出生于西北地区一个农村的他儿时同军队并没有什么关系。跟随父亲脚步的他本应该成为一名农场主——可事与愿违。他那爱好赌博的兄长为他们的家庭背上了相当严重的债务，尽管这些麻烦事最终得到了解决，邱向荣的父母却不得不卖掉农场，选择进入大城市谋生。考虑到当时远乡王国正处在经济繁荣的阶段，这个选择看起来并没有那么差。邱向荣也是在这个时候选择进入了军事学院。\n\n邱向荣在世界大战期间表现出了十分优秀的才能，这也使得他步步高升。虽然远乡军队在总体上一直在打败仗，邱向荣本人所支持且擅长的防御以及持久战理论使得他的战绩显得要好看很多。一直到世界大战结束为止，邱向荣成为了远乡军队中举足轻重的存在。\n\n心向安宁的邱向荣并没有参与之后郑钧和郑义的斗争，东巴斯蒂亚大战爆发时他甚至在东南地区休假。在原先的指挥官失败后，邱向荣接管了远乡军队并参与了接下来的战斗。在他的指挥下，远乡军队勉强稳住了战线。这使得邱向荣在军队和群众中都建立了极高的声望，他所处的部队也被选中成为西北地区重建计划的领导人。\n\n然而，邱向荣并没有做什么“领导人”的打算。他希望自己建立的军政府存续得越短越好，可现实却不断延长着他的任期。西北地区这么多年都没有稳定下来，而邱向荣早就不想在这个破地方呆着了…"
NWF_Qiu_Haiqin:0 "邱海清"
NWF_Zheng_Wenyuan:0 "郑文远"

###将领###

###内阁###
NWF_Zhanghe:0 "张河"
NWF_Zhanghe_desc:0 "张河1970年生于苍南市的普通家庭，仿佛天生注定一般，他22岁刚要完成服兵役时，东巴大战打响了，他原本可以放弃上战场机会，可他还是毅然决然的参加了战斗，他的军事才能很快就在军中闪耀，可惜远乡军队的败局并不是他一人能够扭转的。\n\n直到邱向荣的出现，才平稳住了节节败退的战线，东巴大战结束之后张河的身份已经成为一名合格的将军，他的才华被邱向荣看见，并特招进西北特别行政区成为了军队代表。"
NWF_Fangzhiyuan:0 "方志远"
NWF_Fangzhiyuan_desc:0 "方志远1959年生于岭北镇，原本是当地的警长过着平平淡淡的生活，但是随着东巴大战开始，他立马察觉到了不对，把他劝说了不少人向海清市逃难，其中他也送离了家人。而他和一些有志青年在岭北镇组成了游击队，骚扰了入侵军队的后勤，可最终势单力薄，游击队的成员不断的丧生，这让组织人方志远不得不解散游击队，全体撤回了海清。\n\n而方志远因为自己在敌后反抗的事迹，一度成为远乡的明星，可他看着报纸上刊登的自己的画像，不由的失落，没人知道他的想什么。\n\n东巴大战结束后，他便被远乡王国认命为西北特别行政区的总警长。"
NWF_Luoziqi:0 "洛子奇"
NWF_Luoziqi_desc:0 "洛子奇1967年生于平京市的贵族家庭，他从小就聪明伶俐，贵族父母口中的别人家的孩子，在学业方面他一路顺风顺水，在平京大学完成学业之后，便靠自己的聪明伶俐考进了政府机关。\n\n但不幸的是家道中落，父亲的赌博让他的家庭被踢出了贵族的行列，这让在政府里嫉妒他才华的人看到了可乘之机，不停的刁难他。而就在这时一项人人嫌弃的事情落了下来，西北特别行政区建立，远乡王国需要派人过去做建设顾问。\n\n洛子奇立马就报名参加，最后他和另外11位倒霉蛋被选中拖家带口到了海清。"
NWF_Kongyan:0 "孔岩"
NWF_Kongyan_desc:0 "孔岩1974年出生于海清的本地贵族，孔家在远乡王国西北地区原本是一个普普通通的贵族，可随着东巴大战的打响，不少贵族贪生怕死离开了西北地区前往了远乡北部或者南部，而孔家家主也是孔岩的父亲做出了一个大胆的决策，他用孔家的名义捐献了不少物资给前线。\n\n一直持续到战争结束，孔家一度穷困潦倒，但随着大战的结束，远乡王国为了平复贵族和民心，给了孔家不少特权，孔家一跃成为了海清唯一的特权贵族。\n\n孔家安排孔岩进入了政府机关，以代表孔家出席各个会议，孔岩也成为了孔家在政府中的代表。"
NWF_Huangyun:0 "黄云"
NWF_Huangyun_desc:0 "黄云1976年生于海清的普通家庭，东巴大战结束之后到西北特别行政区成立之间，政府混乱，民生凋敝。黄云的家庭也变得穷困潦倒。迫不得已年仅19岁的她游走于各个势力之间，只为了生存，西北特别行政区建立之后，她已经凭借自己的聪明才智和美貌打通了各个势力之间的通道。\n\n某一天西北特别行政区派遣了孔岩来跟她交谈，希望她能够协助政府，而她也提出了自己的要求，军政府众人思考再三，还是同意让黄云成为政府代表之一。"
NWF_Shaxingyuan:0 "沙兴远"
NWF_Shaxingyuan_desc:0 "沙兴远1953年生于大港市的教育世家，在家里艺术教育熏陶之下，他也成为了一名教育工作者，先后在大港、嘉祥、平京担任老师，东巴大战期间，南部一片安详，他因为教学水平优秀，从而担任了平京大学的副校长，这也是平京屈指可数的年轻的副校长，东巴大战结束之后，沙兴远接到了远乡王国的调令，要前往新建立的西北特别行政区做教育部长。\n\n起初他还是比较拒绝的，可他没有资格拒绝，只能携带家庭来到这刚经历过战争的区域继续自己的教学生涯。"

