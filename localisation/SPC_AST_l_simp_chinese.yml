###领导人###
AST_marianne_tee_rescorian:0 "玛丽安·蒂·雷斯科利恩"
AST_marianne_tee_rescorian_desc:0 "玛丽安于1980年出生，她的父亲鲁道夫王储在世界大战中立得赫赫战功，主要参与了保卫北部殖民地的战争，于1983年在中巴被波伊斯科无政府主义分子刺杀，老国王膝下并无男嗣，因此不得已将玛丽安立为王储。\n\n在世界大战之后，全国萧条的状态下。1973年为了避免因南巴战败即将到来的经济海啸，同时为了报复南巴的擅自停战。老国王阿尔布雷特宣布二元王国退出联邦，与此同时加高了中巴铁路的过境费用。为了保护中巴铁路这条珍贵的输血管，联邦给王国做出一系列让步以使王国重新加入联邦。战争中南巴南部海岸的沦陷引起了工业内陆迁移，加之中巴铁路的过路费和联邦的补偿，靠近中巴原料产地和市场的王国工业快速发展，在联邦一众原地踏步甚至是衰退的国家中脱颖而出。\n\n大战后的繁荣时期出生的玛丽安无疑是作为一朵在温室里长大的花朵，王储的死亡导致心惊胆战的老国王对玛丽安进行了过度的保护。国王为玛丽安组建了一支半人马卫队保护她的安全，玛丽安的任何社交活动都由国王本人过问和陪同，报社也热衷于记录玛丽安的行为。王储遇刺案件后面对咄咄逼人的资产阶级新贵们国王被迫放弃了所有的立法权仅保留了立法建议权。\n\n为了瓦解资产阶级新贵的进一步举动，国王向学者和平民伸出了橄榄枝，社民党在国王的授意下进行了组建，希望在调和中象征性地拉拢平民一方来牵制新贵。此举在战后一直到90年代初都起到了较好的平衡作用，经济快速增长掩盖了多数矛盾，然而在90年代后期随着南巴经济逐渐恢复以及中巴铁路的西段的建设，王国经济增长开始停滞，掩盖的矛盾浮出水面。停滞的经济让国王没有资源继续拉拢平民阶层，而象征性的政治让步并不会让精明的社会党人所接受。\n\n1996年风波案导致的民族问题更使王国政治状况雪上加霜。1997年末面对多重打击国王阿尔布雷特去世，年仅17岁女王登上王位。老国王的仓促离世使没有太多政治经验的少女提前进入政坛。面对同龄人玛丽安已经遥遥领先，但是面对政坛老甲鱼玛丽安显然过于青涩。新贵族显然不满足于当前的利益划分，同时社会党逐渐脱离控制肆无忌惮的表达自己的诉求，同时王室中的旁支显然对这个女王有不同的意见，王室的天下还能维持多久？玛丽安这个名字能否再主一次给它的主人带来无上的荣耀？"

###民族精神###
AST_heavy_crown:0 "沉重的王冠"
AST_heavy_crown_desc:0 "在奥施特莱尼亚王国的纷乱混杂的政坛中，很多部门为利益集团所把握水泼不进针扎不透，俨然一副独立王国的样子。外部还有恐怖主义，种族主义的威胁。总之这个王冠对于女王来说不是那么好戴的。"
AST_western_commotion:0 "西部骚动"
AST_western_commotion_desc:0 "由中央集团掌握的宏戈利亚的经济状况每况愈下，所做的改革努力浅尝辄止。有一股危险的赤色思想在宏戈利亚境内流传，更糟糕的是这种思想流入了奥施特莱尼亚的半人马军队。虽然女王多次强调中央集团要制止这种危险的思想，不过很显然中央集团根本无力制止。"
AST_northern_crisis:0 "北部危机"
AST_northern_crisis_desc:0 "自从老国王离世之后，波伊斯科总督辖区就没安静过一天，传言中都说波伊斯科已经做了好了总暴动的准备，只待一个风口。在向总督区调入了大量军警特宪后，仅仅发现了一些无关紧要的外围信息，镇压了几次小规模示威。调查不利的情况下，更加放大了群众的不安。"
AST_territorial_defense_bureau:0 "国土防卫局"
AST_territorial_defense_bureau_desc:0 "在二元王国重新加入联邦的协议中，其中一项规定了和平期间的防御组织调动事项由二元王国牵头建立的国土防卫局负责，战时由共和国和二元王国共同负责。不过时至今日，这只军队除了二元王国的大部分军队和顿伏茨克大公国的部分军队加入了，剩下的则是一些南部联邦成员的警察部队，并且大公国的军队根本没有可能听从二元王国的调动。"
AST_economic_recession:0 "经济衰退"
AST_economic_recession_desc:0 "在90年代中期共和国经济全面复苏，而且另一条中巴铁路导致我方收取的过境费用大幅减少。经济从较稳定的发展转变为缓慢发展甚至是停滞。从前快速发展中掩盖的问题逐渐浮出水面，如果不解决经济那就只能解决问题了。"
AST_republicains:0"议会叛匪"
AST_evilnoble:0"不忠贵族"
AST_malaise:0"社会动荡"
AST_royal_chemin_1:0"王家铁路公司"
###将领###
AST_fitz_talin:0 "菲茨·塔林"
AST_fitz_talin_desc:0 "一位虔诚的教徒，一位坚决的王党，一位有为的将领。一名有着一切骑士美德，愿意与普通士兵同吃同住，敢与他们并肩作战的元帅，这便足以概括菲茨·塔林。\n\n当世界大战爆发时，菲茨·塔林还是一个年轻过头的尉官，当1971年王国军队应南巴斯蒂亚共和国邀请北上挽救局势时，他率领自己的连队跟随鲁道夫王储奋勇作战。当西大陆的铁蹄将奥施特莱尼亚与顿伏茨克的联军赶回南方时，又是他在一片混乱中组织起部队掩护撤退，使得王国免受了1735年那样的灾难性损失。因此，他受到鲁道夫王储的赏识并持续晋升并最终得以掌管全军也就毫不意外了。\n\n然而与个人的顺风顺水相反的是王国整体的接连不幸，世界大战结束时，已经是上将的菲茨只看到了背叛、动荡和萧条的风险，作为他私人好友的王储也在1983年遭刺杀，随之而来的是任命他为元帅的决定。这位新元帅竭尽所能用有限的资源重整与改革了军队，其高尚的性格与对哪怕最基层士兵的尊重和爱护为他赢得了“骑士元帅”的称呼。\n\n但在军旅生涯之外，这位元帅正密切关注着政治动向，他从很久以前就认定决不能任由那些自以为是的权贵精英，那些后天低能的暴发户们肆意操纵议会削弱王室。若是新女王需要，他和整个王国军队随时愿意为君主制和王国而战。"

AST_essen_ti_loser:0 "埃森·蒂·洛瑟"
AST_essen_ti_loser_desc:0 "喜好勋章，衣着华丽，夸夸其谈而缺乏能力的贵族将领，甚至折损了洛瑟家族军事传统的老头——这是很多人对王国陆军大臣的第一印象。可实际上，蒂·洛瑟家族的当代家主虽然谈不上多么优秀，但还算是一个称职的将领。不过他确实在军队中更多地负责行政管理方向的问题，而非实际的指挥。\n\n然而，他在军队中的人缘和声望很好。这既是因为老洛瑟本人手把手带出了奥施特莱尼亚现在的大多数军官，包括菲茨·塔林在内许多高级将领都曾于他手下服役过，也是因为他的性格与资历。此外，他还是王室的远亲，并且在政府官僚和贵族中都算很有发言权的权威人物。在不需要工作和应酬的闲暇，他喜欢和家人去远足或带着军官们登山。"

###内阁###
AST_kels_holler:0 "凯尔斯·霍勒"
AST_kels_holler_desc:0 "以奥施特莱尼亚王国的选举模式来说，凯尔斯·霍勒这样不代表任何特定地区民族，没有任何幕后联系，性格严肃较真，终日谈论道德和政治理论的无党派独立人士想要当选进入议会相当困难。但他每一次都靠着选民在其他栏填写自己的全名做到了这一点，并迅速成为了议会中强硬君主主义者们的非正式领袖。\n\n作为一个知识分子议员，霍勒认为君主制需要现代化和新理论来与时俱进，他同意君主的权力需要一些限制，但是完全反对使之沦为仪式性的角色。在此之外，他还支持恢复国教和宗教道德教育。然而同时，霍勒支持社会平权，并且及其支持政府直接干预市场和经济。这使他出人意料地和一些社会主义者相处的不错。"

###企业###

###国策###
AST_premier:0 "新一年,新君主"
AST_premier_desc:0 "1998年的第一天已经到来，而玛丽安女王的统治也将真正拉开帷幕。唯有历史可以告诉我们，接下来在前方等待着奥施特莱尼亚的是什么……"
AST_monarchiste:0 "陛下可敬而忠诚的侍臣们"
AST_monarchiste_desc:0 "一位优秀而伟大的君主从来不会是孤军奋战，总是需要有众多知名或不知名的忠贞之士为君主在各个领域效力。尽管王室的地位和力量已经被削弱了一段时间，但就和过去一样，女王陛下想要找到几位忠诚的顾问和大臣并不困难。"
AST_archeveque:0 "在议会上下"
AST_archeveque_desc:0 "随着时代的进步以及南巴国家的影响，奥施特莱尼亚建立起了君主立宪政体。而在先王鲁道夫统治后期，王国议会成为了事实上唯一的立法机构。强硬的保王党将这里看作不忠的精英策划阴谋的堡垒和潜在的共和主义革命策源地。但这实在是有些夸大其词，女王陛下将择日驾临议会，并参与议会的一日会议。"
AST_reine:0 "在宫廷内外"
AST_reine_desc:0 "在过去，作为王室成员的居所，林荫宫曾是王国的政治中心。虽然王室已不如过去那般独断乾坤，但依旧有许多的贵族与官员会遵从古老的礼仪前来觐见女王。在合适的对话与合适的朋友帮助下，得到他们的绝对支持应该不是什么难事。"
AST_chevalier:0 "在军队之中"
AST_chevalier_desc:0 "若是一位君主想要统治稳固，就应当争取到军队的不二忠心。奥施特莱尼亚的陆军在伟大战争和世界大战中损失惨重，然而如今一位老将登上舞台，人称“骑士元帅”的菲茨·塔林元帅正等候女王召见。他对王国军队有着众多规划希望实现，最重要的是，此人对君主忠诚无二。"
AST_commercant:0 "在街头巷尾"
AST_commercant_desc:0 "当今王国，忠君有为之人竟已然为数不多。资产阶级的暴发户们咄咄逼人，他们对王室和贵族传统的蔑视令人不可接受。但是在这些傲慢自负者里，却同样有着特立独行之人。梅里洛·阿尔丰斯，一位以才识卓越和狂热保王言论而众所周知的富商，这位衣着复古浮夸的先生已经缠着宫廷希望觐见女王有一段时间了，也许我们是该听听他想说什么。"
AST_socialist:0 "在王国四境"
AST_socialist_desc:0 "广大平民与进步学者，再具体点，左派和社会党人在过去曾与王室达成了紧密的合作关系。双方在压制愈发膨胀和不可一世是资产阶级上达成了共识，然而从90年代中期开始，这个盟约逐渐开始彼此疏远和失效。但随着新君加冕，或许再续前缘的时机已至……"
AST_teatime:0 "一次平凡的茶会"
AST_teatime_desc:0 "只是林荫宫在初春似乎平平无奇的一日……"
AST_stability:0 "整顿王国局势"
AST_stability_desc:0 "奥施特莱尼亚的命运始终与雷斯科利恩王室不可分割，愿玛丽安女王的统治长盛不衰，愿她的权杖与宝冠永远闪耀，愿她的王国与踏过的土地繁荣昌盛，人民安居乐业。愿奥施特莱尼亚，愿二元王国永恒屹立于巴斯蒂亚！"
AST_timelimit:0 "我们时间急迫"
AST_timelimit_desc:0 "二元王国西部与北部的局势正在加速恶化，留给我们的时间已不足够更加悠闲地考虑对策。我们必须对一些最紧迫的问题做出改革和应对，特别是在经济和政府内部问题上。"
AST_economy:0 "经济难题"
AST_economy_desc:0 "在近几年来，由于南巴斯蒂亚的经济复苏和中巴铁路西段的建设，王国的经济繁荣期宣告终结。在缺少了额外收入与过境费的填补后，我国的经济短板暴露无遗。如果我们希望王国能迎接下一个千年，那就必须对经济产业问题早做打算。"
AST_corporation:0 "鼓励新兴企业"
AST_corporation_desc:0 "在社会党与霍勒议员看来，奥施特莱尼亚的经济会搞成现在这样就是因为阿尔布雷特国王时期太过依赖国家地理位置带来的红利和外来的产业转移与联邦的补偿，而不是国家自身的经济实力。想要解决经济问题，唯有促进和投资王国的本地实业，特别是那些刚刚起步的中小企业与合作社。"
AST_international:0 "寻求国际合作"
AST_international_desc:0 "因世界大战导致的工业内迁促进了奥施特莱尼亚的工业快速发展，而阿尔丰斯认为，如今我们需要的是另一波工业转移和外国投资。鲁萨尔表面对风平浪静下是连绵不绝的工会罢工与政治骚动，那里的企业或许会被说动，在像二元王国这样更安定和有潜力的地方作出投资。此外，我们与克拉亚诺在工业发展问题上并非没有共同语言……"
AST_railway:0 "王国铁路计划"
AST_railway_desc:0 "王家铁路公司在理论上是一家私营公司，但在实际上则是完全的王室资产与半个政府部门。它以一种奇怪的方式绕开了议会和政府官僚的影响，使女王可以直接影响铁路系统的运作和规划。"
AST_politics:0 "浆糊行政"
AST_politics_desc:0 "当前，在政治上存在着一个不可忽视的问题。奥斯特莱尼亚王国的行政与政府部门已经形成了一些相互独立，互不统属的小团体和利益集团，它们对国家的发展没有丝毫帮助，反倒是导致了政令实施困难。如果我们希望落实改革的具体执行而不是令它们化作一纸空文，最终在精心构造的文字迷宫和推诿中遭人遗忘，那就必须解决这个问题。"
AST_loyalty:0 "寻找忠诚者"
AST_loyalty_desc:0 "当前首要的困境在于，在政府部门中的官员心思各异，王室甚至不作为他们的首要效忠对象存在。我们不可能期待这样一些家伙执行女王的意志，然而局势不等人。我们必须先用一些……简单的办法来缓解这个问题，之后再考虑怎么真正改变它。"
AST_deployment:0 "调整军事部署"
AST_deployment_desc:0 "从宏戈利亚和波伊斯科传回的报告来看，某种全面武装叛乱似乎即将到来，而安德怀特总督对解决问题似乎毫无用处，他会做的就是把自己当成史诗中的英雄。我们必须做最坏的打算，假设当事态恶化时，我们需要更多部队全面入侵完全沦陷的波伊斯科。"
AST_worst:0 "做好最坏的打算"
AST_worst_desc:0 "军方与内政部的分析显示，西部和北部的局势还在持续恶化，发生叛乱和革命的可能不容忽视。我们必须做好最坏的打算，准备应对不期而至的风暴。"
AST_tasks:0 "我们任务众多"
AST_tasks_desc:0 "去几十年里，二元王国所面临的是一个巨大的烂摊子。先不提宏戈利亚的贵族集团和北方的动乱，奥施特莱尼亚事实上陷入了持续的政治斗争。那些新兴资产阶级暴发户持续对王室施压，并最终让我们落得如此境地。而同时，贵族中的许多人也仍然痴迷于内斗和损害国家利益以满足个人私欲。这种情况不会再被容忍，我们只需要等待一个合适的机会…………或者创造一个。"
AST_disloyal:0 "不忠的毒蛇"
AST_disloyal_desc:0 "在议会和政府中，那些自诩“民主斗士”的政客在政治上对我们步步紧逼，而共和主义的毒瘤则潜藏在虚伪的面具与庸碌的“自由派”后等待着颠覆君主制的时机。但他们做过什么真正有利于国家或人民的事吗？这些人好一些的不过是窃国肥私的权力动物，更糟的就是境外势力的传声筒。甚至是将二元王国看作一个用于反攻南巴的跳板而不是自己的家。议会中的忠诚派将发动一场无声的阴谋，为之后的“惊喜转折”提供正当理由。"
AST_noble:0 "自大的勋贵"
AST_noble_desc:0 "权贵，无论是那些旧贵族还是新贵族，无论是那些没有头衔的大资产阶级还是声名显赫的古老家族，甚至是那些手握重拳的文武军官。他们还有多少人记得自己对君主，对女王的义务与职责？又有多少人把自己的地位当成了天然应当的常态？王国的权贵与精英正在变得愈发自以为是，骄横傲慢。但无需焦虑，因为女王的侍从与血亲最为懂得如何处理这种问题。"
AST_territory:0 "动荡的领地"
AST_territory_desc:0 "塔林元帅对当前的社会动荡看法很简单，恪守君主的底线，满足合理正当的诉求，然后让军队做他们最擅长的事情，清除和消灭那些居心不良的阴谋破坏者。他提出了一系列的建议和计划，而其中的几个能够立刻见效，解我们的燃眉之急。"
AST_propaganda:0 "开动宣传机器"
AST_propaganda_desc:0 "阿尔丰斯掌握着官媒之外最大的几个媒体报刊，现在是时候让他们为女王而开动起来了。我们要将那些议会的“建制派”和反女王分子塑造成毁了一切的独夫民贼，特别是共和主义者和那些亲南巴的家伙们。如果能在舆论上孤立和摸黑他们，并创造出民间媒体大都强烈支持女王的感觉，接下来的事会简单不少。"
AST_speech:0 "在议会发言"
AST_speech_desc:0 "今天的演说会被历史看作奥施特莱尼亚一个新时代的前奏，霍勒议员已经准备万全，不需要讲稿，今天他将自由发挥。我们将公开自己的看法与目的——女王的神圣权柄不容继续侵蚀，要么议会与君主达成平衡与共识，要么议会就此消失。"
AST_security:0 "部署治安部队"
AST_security_desc:0 "塔林元帅对军事改革始终秉持强烈热情，希望重新组织和塑造王国的军事力量。他将目前的局势看作试验自己理论的一个机会，并向陛下提议组建两支测试性的部队作为“治安部队”。元帅坚称，摩托化部队绝对值得持续投资。"
AST_royalvisit:0 "王室访问计划"
AST_royalvisit_desc:0 "1983年，一次炸弹袭击杀死了鲁道夫王储并使玛丽安成为了国王唯一的继承人。同时，处于理由正当的刺杀恐惧，阿尔布雷特国王偏执地限制和插手了她的社交圈。过多的关注和干预令玛丽安女王没有像她已逝的父亲那样在民间广受欢迎与了解，但在夏洛特的劝说下，玛丽安女王决定开始规划她登基以后的首次巡游计划。访问王国各地，并借此重新拉近民众与王室间的距离，同时提高自己的名望和影响力。"
AST_church:0 "与教会会晤"
AST_church_desc:0 "即便在平日里默不作声，或缺乏存在感，但教会始终是奥斯特莱尼亚重要的一部分。在过去，王冠与教会间始终保持着联盟与合作，值此危难关头，是时候旧事重提了。"
AST_forever:0 "雷斯科利恩家族万岁！"
AST_forever_desc:0 "奥施特莱尼亚王国依靠王室而存在，而不是反过来。那些耍弄阴谋的国贼叛匪无法战胜我们，王国的公民们！一同辛勤劳作，参军入伍，与王国和女王陛下同舟共济！"


