###领导人###
AST_marianne_tee_rescorian:0 "玛丽安·蒂·雷斯科利恩"
AST_marianne_tee_rescorian_desc:0 "玛丽安于1980年出生，她的父亲鲁道夫王储在世界大战中立得赫赫战功，主要参与了保卫北部殖民地的战争，于1983年在中巴被波伊斯科无政府主义分子刺杀，老国王膝下并无男嗣，因此不得已将玛丽安立为王储。\n\n在世界大战之后，全国萧条的状态下。1973年为了避免因南巴战败即将到来的经济海啸，同时为了报复南巴的擅自停战。老国王阿尔布雷特宣布二元王国退出联邦，与此同时加高了中巴铁路的过境费用。为了保护中巴铁路这条珍贵的输血管，联邦给王国做出一系列让步以使王国重新加入联邦。战争中南巴南部海岸的沦陷引起了工业内陆迁移，加之中巴铁路的过路费和联邦的补偿，靠近中巴原料产地和市场的王国工业快速发展，在联邦一众原地踏步甚至是衰退的国家中脱颖而出。\n\n大战后的繁荣时期出生的玛丽安无疑是作为一朵在温室里长大的花朵，王储的死亡导致心惊胆战的老国王对玛丽安进行了过度的保护。国王为玛丽安组建了一支半人马卫队保护她的安全，玛丽安的任何社交活动都由国王本人过问和陪同，报社也热衷于记录玛丽安的行为。王储遇刺案件后面对咄咄逼人的资产阶级新贵们国王被迫放弃了所有的立法权仅保留了立法建议权。\n\n为了瓦解资产阶级新贵的进一步举动，国王向学者和平民伸出了橄榄枝，社民党在国王的授意下进行了组建，希望在调和中象征性地拉拢平民一方来牵制新贵。此举在战后一直到90年代初都起到了较好的平衡作用，经济快速增长掩盖了多数矛盾，然而在90年代后期随着南巴经济逐渐恢复以及中巴铁路的西段的建设，王国经济增长开始停滞，掩盖的矛盾浮出水面。停滞的经济让国王没有资源继续拉拢平民阶层，而象征性的政治让步并不会让精明的社会党人所接受。\n\n1996年风波案导致的民族问题更使王国政治状况雪上加霜。1997年末面对多重打击国王阿尔布雷特去世，年仅17岁女王登上王位。老国王的仓促离世使没有太多政治经验的少女提前进入政坛。面对同龄人玛丽安已经遥遥领先，但是面对政坛老甲鱼玛丽安显然过于青涩。新贵族显然不满足于当前的利益划分，同时社会党逐渐脱离控制肆无忌惮的表达自己的诉求，同时王室中的旁支显然对这个女王有不同的意见，王室的天下还能维持多久？玛丽安这个名字能否再主一次给它的主人带来无上的荣耀？"

###民族精神###
AST_heavy_crown:0 "沉重的王冠"
AST_heavy_crown_desc:0 "在奥施特莱尼亚王国的纷乱混杂的政坛中，很多部门为利益集团所把握水泼不进针扎不透，俨然一副独立王国的样子。外部还有恐怖主义，种族主义的威胁。总之这个王冠对于女王来说不是那么好戴的。"
AST_western_commotion:0 "西部骚动"
AST_western_commotion_desc:0 "由中央集团掌握的宏戈利亚的经济状况每况愈下，所做的改革努力浅尝辄止。有一股危险的赤色思想在宏戈利亚境内流传，更糟糕的是这种思想流入了奥施特莱尼亚的半人马军队。虽然女王多次强调中央集团要制止这种危险的思想，不过很显然中央集团根本无力制止。"
AST_northern_crisis:0 "北部危机"
AST_northern_crisis_desc:0 "自从老国王离世之后，波伊斯科总督辖区就没安静过一天，传言中都说波伊斯科已经做了好了总暴动的准备，只待一个风口。在向总督区调入了大量军警特宪后，仅仅发现了一些无关紧要的外围信息，镇压了几次小规模示威。调查不利的情况下，更加放大了群众的不安。"
AST_territorial_defense_bureau:0 "国土防卫局"
AST_territorial_defense_bureau_desc:0 "在二元王国重新加入联邦的协议中，其中一项规定了和平期间的防御组织调动事项由二元王国牵头建立的国土防卫局负责，战时由共和国和二元王国共同负责。不过时至今日，这只军队除了二元王国的大部分军队和顿伏茨克大公国的部分军队加入了，剩下的则是一些南部联邦成员的警察部队，并且大公国的军队根本没有可能听从二元王国的调动。"
AST_economic_recession:0 "经济衰退"
AST_economic_recession_desc:0 "在90年代中期共和国经济全面复苏，而且另一条中巴铁路导致我方收取的过境费用大幅减少。经济从较稳定的发展转变为缓慢发展甚至是停滞。从前快速发展中掩盖的问题逐渐浮出水面，如果不解决经济那就只能解决问题了。"

###将领###
AST_fitz_talin:0 "菲茨·塔林"
AST_fitz_talin_desc:0 "一位虔诚的教徒，一位坚决的王党，一位有为的将领。一名有着一切骑士美德，愿意与普通士兵同吃同住，敢与他们并肩作战的元帅，这便足以概括菲茨·塔林。\n\n当世界大战爆发时，菲茨·塔林还是一个年轻过头的尉官，当1971年王国军队应南巴斯蒂亚共和国邀请北上挽救局势时，他率领自己的连队跟随鲁道夫王储奋勇作战。当西大陆的铁蹄将奥施特莱尼亚与顿伏茨克的联军赶回南方时，又是他在一片混乱中组织起部队掩护撤退，使得王国免受了1735年那样的灾难性损失。因此，他受到鲁道夫王储的赏识并持续晋升并最终得以掌管全军也就毫不意外了。\n\n然而与个人的顺风顺水相反的是王国整体的接连不幸，世界大战结束时，已经是上将的菲茨只看到了背叛、动荡和萧条的风险，作为他私人好友的王储也在1983年遭刺杀，随之而来的是任命他为元帅的决定。这位新元帅竭尽所能用有限的资源重整与改革了军队，其高尚的性格与对哪怕最基层士兵的尊重和爱护为他赢得了“骑士元帅”的称呼。\n\n但在军旅生涯之外，这位元帅正密切关注着政治动向，他从很久以前就认定决不能任由那些自以为是的权贵精英，那些后天低能的暴发户们肆意操纵议会削弱王室。若是新女王需要，他和整个王国军队随时愿意为君主制和王国而战。"

AST_essen_ti_loser:0 "埃森·蒂·洛瑟"
AST_essen_ti_loser_desc:0 "喜好勋章，衣着华丽，夸夸其谈而缺乏能力的贵族将领，甚至折损了洛瑟家族军事传统的老头——这是很多人对王国陆军大臣的第一印象。可实际上，蒂·洛瑟家族的当代家主虽然谈不上多么优秀，但还算是一个称职的将领。不过他确实在军队中更多地负责行政管理方向的问题，而非实际的指挥。\n\n然而，他在军队中的人缘和声望很好。这既是因为老洛瑟本人手把手带出了奥施特莱尼亚现在的大多数军官，包括菲茨·塔林在内许多高级将领都曾于他手下服役过，也是因为他的性格与资历。此外，他还是王室的远亲，并且在政府官僚和贵族中都算很有发言权的权威人物。在不需要工作和应酬的闲暇，他喜欢和家人去远足或带着军官们登山。"

###内阁###
AST_kels_holler:0 "凯尔斯·霍勒"
AST_kels_holler_desc:0 "以奥施特莱尼亚王国的选举模式来说，凯尔斯·霍勒这样不代表任何特定地区民族，没有任何幕后联系，性格严肃较真，终日谈论道德和政治理论的无党派独立人士想要当选进入议会相当困难。但他每一次都靠着选民在其他栏填写自己的全名做到了这一点，并迅速成为了议会中强硬君主主义者们的非正式领袖。\n\n作为一个知识分子议员，霍勒认为君主制需要现代化和新理论来与时俱进，他同意君主的权力需要一些限制，但是完全反对使之沦为仪式性的角色。在此之外，他还支持恢复国教和宗教道德教育。然而同时，霍勒支持社会平权，并且及其支持政府直接干预市场和经济。这使他出人意料地和一些社会主义者相处的不错。"

