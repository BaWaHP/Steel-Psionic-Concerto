###民族精神###
WDR_land_of_ved:0 "维尔德人之地"
WDR_land_of_ved_desc:0 "§7联§!§O邦§!已经终结，§7蒙特§!人咽下了自己酿成的苦果。\n\n§O维尔德§!人准确的说法，用“山地提特兰人”这个说法更为准确，帝国时代乔迁的居民们在这里的山岭上定居了许久，产生了自己的文化认知，并且在混乱之中生根发芽。在坎达德尔王国的崩溃中，东方王国将首府放在了现在§O维尔德§!人的首都扎格罗巴之上，而在臭名昭著的伪王风波与世界大战中，§O维尔德§!人率先宣布了独立，再是§7蒙特§!人宣布了独立。\n\n虽然世界大战后我们走过了一段错误的§7联§!§O邦§!，但是§O维尔德§!人已经重获机会，让我们为我们的不再被歧视的§O维尔德民族§!三呼万岁！\n\n§R但是，维尔德人真的和蒙特人有那么一点区别吗？歧视依旧在他们之中延续，除了压迫者换了一茬人，少数民族们依旧不满现状……§!"

WDR_divided_house:0 "分裂之家"
WDR_divided_house_desc:0 "在§7联§!§O邦§!之中的数十年，让我们的同胞们受尽了分裂与分歧，我们的同胞就居住的不同地域再次分裂成了不同文化的族群，中部人充斥贵族味，东部人都是乡巴佬，西部人都是民族主义者……这一情况导致了我们的国家对地方的控制力极为低下。"

WDR_rep_one_party_dic:0 "共和制度党的一党独裁"
WDR_rep_one_party_dic_desc:0 "虽然我们的国家是一个共和邦，但是主要的政治派系并没有解冻，依旧是联邦所遗留而下的共和制度党以及各个少数民族党团。虽然不少人正在提议现在立刻解冻，但是我们依旧担心着我们不幸的民主会立刻夭折。"

WDR_overcome_foreign_culture:0 "克服南巴斯蒂亚与提特兰文化"
WDR_overcome_foreign_culture_desc:0 "曾几何时，我们拥抱了南巴斯蒂亚的共和主义，强烈且偏执的想要加入南巴斯蒂亚联邦，却换来一个与蒙特人的强制合作的§7联§!§O邦§!，一段悲伤且遭受歧视的历史。不，不，不，我们将会克服这些，我们即不是提特兰文化圈的一部分也不是南巴斯蒂亚文化圈的一部分，我们就是我们，独立且伟大的§O维尔德民族§!。"

WDR_unsatisfactory_land_reform:0 "令人不满的土地改革"
WDR_unsatisfactory_land_reform_desc:0 "维尔德的庄园主经济在联邦期间从未被真正意义上的打破，虽然联邦将少部分的土地重新按照税务再分配了，但我们的政府的合法性依旧由这些庄园主们组成的地方庄园自治区所控制。\n\n请注意，再次土地改革是左派和右派，以及中间派同僚们都赞同的，无非力度和激进程度，我们必须立刻探讨土地改革，并且拿出一个能够满足所有的方案，否则我们将会遭受§R灭顶之灾§!。"

