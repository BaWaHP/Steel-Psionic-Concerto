###政党名称###
WDR_pioneer_communism_party:0 "维尔德社会革命党-维尔德行动党"
WDR_pioneer_communism_party_long:0 "维尔德社会革命党-维尔德行动党\n§g行动党是北提特兰先锋共产主义的一个广泛成果，其中最大放异彩的便是马加尔斯的马加尔斯行动党，维尔德行动党便是脱胎于此建立的左派政党。他们的党魁是普林西普·美多德这个革命的老资历，在马加尔斯革命失败后流亡到了维尔德地区，在此继续着他的斗争，但是许多党内的人对他的马加尔斯革命优先论颇为不满。§!"
WDR_revolutionary_communism_party:0 "维尔德社会革命党-北提特兰自治联合体"
WDR_revolutionary_communism_party_long:0 "维尔德社会革命党-北提特兰自治联合体\n§g北提特兰自治联合体准确来说是北提特兰各个少数民族，提特兰分离者们组织起来的跨地域性质的工会、农会团体，以此为基准而建立的广泛社会主义的联盟。他们是北提特兰地区最为广大的左派公约数，大部分左派基本都能通过自治联合体进行交流合作。§!"
WDR_worldunion_socialist_party:0 "维尔德社会革命党-维尔德独立社会党"
WDR_worldunion_socialist_party_long:0 "维尔德社会革命党-维尔德独立社会党\n§g维尔德独立社会党是从维尔德社会党中分离的派系，他们指责社会党对于现状的不作为以及社会党的保守本性，所以加入了人民阵线之中。他们虽然加入了左派的联盟但是依旧以其广泛的左翼民粹主义论调受到联盟内其他人批评。§!"
WDR_worldunion_democrat_party:0 "共和制度党-维尔德社会党"
WDR_worldunion_democrat_party_long:0 "共和制度党-维尔德社会党\n§g维尔德社会党是比较传统的民粹主义的民粹主义左派党，他们拒绝过度进一步的社会改造，但是也拒绝更加保守的倒退。他们自从独立社会党独立后，就遭到了沉重的打击，使得共和制度党内的右派更加的壮大了起来。§!"
WDR_liberal_republican_party:0 "共和制度党-维尔德民族自由党"
WDR_liberal_republican_party_long:0 "共和制度党-维尔德民族自由党\n§g维尔德民族自由党是从北提特兰共和主义者与中提特兰共和主义者们合流的产物。他们的政党从早期的完全南巴斯蒂亚共和主义者，已经逐渐过渡到了本土共和主义的行列，他们尝试维护现在的共和成果，并且进一步巩固。§!"
WDR_conservative_republican_party:0 "共和制度党-维尔德农业社会党"
WDR_conservative_republican_party_long:0 "共和制度党-维尔德农业社会党\n§g维尔德农业社会党是一个相当多元的党派，他们虽然被认为是农业民粹主义者，但是他们也因为党魁普列汉诺夫·赫里斯托夫的关系或多或少接触着社会主义的思潮，许多人都觉得他们将会替代社会党，成为新的共和制度党左派。§!"
WDR_authoritarian_republican_party:0 "共和制度党-统一维尔德党"
WDR_authoritarian_republican_party_long:0 "共和制度党-统一维尔德党\n§g统一维尔德党作为共和制度党中最右翼的派系来说，他们是支持现在的情况的。他们本身对于独裁主义并没有任何排斥，相反的，他们觉得目前的局势正在稳中向好，而他们也将会强推对于东部的工业发展。§!"
WDR_national_socialist_party:0 "维尔德民族组织-社会维尔德党"
WDR_national_socialist_party_long:0 "维尔德民族组织-社会维尔德党\n§g社会维尔德党是维尔德民族阵线中的左派，不少因提倡维尔德民族主义而导致被开除的前行动党的党员们聚集在这一派系之中。他们主要提倡近似行动党的先锋队政治，计划经济，但是对各个少数民族的态度也放弃了团结的想法，转而以民族主义的角度进行歧视。§!"
WDR_authoritarian_nationalism_party:0 "维尔德民族组织-普罗维德集团"
WDR_authoritarian_nationalism_party_long:0 "维尔德民族组织-普罗维德集团\n§g“普罗维德集团”并不是一个广义上的政党，而是一个纯粹的军事组织，核心组织由九人的核心拉达（议会）组成。他们分布在维尔德各地帮助各个自治区对抗少数民族的起义与对维社革进行攻击。§!"
WDR_paternal_autocrat_party:0 "维尔德全国武装力量"
WDR_paternal_autocrat_party_long:0 "维尔德全国武装力量\n§g维尔德全国武装力量是在维尔德建国后临时组织起来的军队，他们对于文官政府并无好感，但是也没有完全对其丧失信心。如果国家到了最糟糕的时刻，军队将会立刻出击，维护维尔德民族的国家。§!"
WDR_wizard_rules_party:0 "红之神"
WDR_wizard_rules_party_long:0 "红之神\n§R红，红，红\n我唯见火光染上烟幕\n红，红，红\n那硫磺之火烧穿了烟幕\n红，红，红\n祂的躯壳正在世俗中\n红，红，红\n祂将在地上建成他的国\n红，红，红\n我的眼中早已血红§!"
WDR_religious_extremism_party:0 "诸维尔德教区"
WDR_religious_extremism_party_long:0 "诸维尔德教区\n§g诸维尔德教区已对目前的现状感到了绝望与无能，北方的蒙特人正在遭遇邪神的入侵，南方的政府则混乱不堪。教会们开始带着狂热信徒逐渐向着深山中走去建立定居点，向着穆勒斯求助，以期望他们能够在这混乱中活下去。§!"
WDR_anarchism_party:0 "维尔德民族组织-无政府民族阵线"
WDR_anarchism_party_long:0 "维尔德民族组织-无政府民族阵线\n§g虽然听起来“民族主义”和“无政府主义”好像是两个完全不搭边的奇怪概念，但是在维尔德这个多山的封闭环境之下，这两者并不冲突。无政府的民族主义者们提倡一个完全民主的民族自治平台，建立对维尔德民族负责的联合体。§!"

###领导人###
WDR_princip_methodius:0 "普林西普·美多德"
WDR_tsereteli_levski:0 "策烈铁里·列夫斯基"
WDR_christo_zegelbaum:0 "赫里斯托·策杰尔鲍姆"
WDR_mitrofan_stamblov:0 "米特罗范·斯塔姆博洛夫"
WDR_luzhzhi_vatsba:0 "卢日支·瓦茨巴"
WDR_luzhzhi_vatsba_desc:0 "卢日支·瓦茨巴几乎是维尔德人的历史本身，他即是这个国家第一次独立的推动者，在1970年初与当时的巴博维奇以及数位知识分子在庄园里一起发表了《二月宣言》，，建立了共和军，推动了对东王国的推翻。他也是这个国家第二次独立的推动者，他作为共和制度党的元老，在联邦几乎已经不值得信任的时刻一锤定音，彻底脱离了联邦。\n\n他正站在这个新生民族国家的权利最巅峰，似乎一切唾手可得，但是他依旧忧心忡忡，各地的旧自治区政府们只有一个真正让渡了权利给与中央政府，剩下的都维持着自己的小政府模式——这几乎等于说，这个国家实际上一大半都不在自己的手上，所谓的“维尔德共和邦”的政令出不了两个省。\n\n党内部的共和派已经在指责他的独裁了，门外大街上，左派与右派的游行对垒针锋相对的不断示威着，各地少数民族党团也在指责民族权利的缺失。但是他明白，他必须这么做，他不得不这么做，维尔德必须由他的双手矫正，将一切激进势力扼杀在摇篮之中……"
WDR_plekhanov_hristov:0 "普列汉诺夫·赫里斯托夫"
WDR_kubrat_maher:0 "库布拉特·马赫"
WDR_stetko_panov:0 "斯捷茨科·帕诺夫"
WDR_konovalets_vasov:0 "科诺瓦列茨·瓦梭夫"
WDR_dmytro_dunov:0 "德米特罗·“半人马”·杜诺夫"
WDR_ved_churches:0 "维尔德各教区"
WDR_broz_caligula_walter:0 "“卡里古拉”"
WDR_jaroslav_rakovsky:0 "雅罗斯拉夫·拉科夫斯基"

