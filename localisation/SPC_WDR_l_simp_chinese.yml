###国策###
WDR_second_land_reform_conference:0 "第二次土地改革会议"
WDR_second_land_reform_conference_desc:0 "半年前的第一次土地改革会议堪称“完全失败”的，共和制度党尝试在全国推动第一次土改会议上通过的《土地改革条例》遭到了各方抵制。左翼团体和少数民族要求维尔特庄园主更多的让步并要求彻底取消民族户籍政策，右翼团体抵制对非维尔特人的让步并批评政府对庄园主和“特尼安文化”的纵容。由于前后矛盾的政策，我们最大的贸易伙伴提特兰共和国宣布提高了对我们的关税，南巴资本也威胁撤资，在鲁达尔进修过的经济顾问已经上交了经济危机的报告。在巨大压力下，共和制度党不得不宣布第二次土地改革会议，支持共和制度党的庄园主代表们也开始考虑更进一步的让步。"
WDR_second_land_reform_conference_tt:0 "§C开始国策后，会触发一系列土改相关事件。§!"

###事件###
WDR.1.t:0 "第二次土改"
WDR.1.d:0 "在进行持续45天的筹备和谈判，所有人承诺没有人会携带武器或者爆炸物到国会大厦，第二次土地改革会议才终于召开。除了无政府民族阵线完全没有派代表参加外，不同派系的代表被过道分隔着坐在国会大厦的大厅里，每个过道都被安排了没有携带武器的警察把守着。在这场还有点紧张的氛围中负责主持这场会议的杜诺夫将军落下了他的槌子后，这场决定着维尔德未来命运的会议正式召开。\n\n共和制度党四个党魁轮流上台演讲呼吁各方团结后，一个农民般的打扮、胸口别着象征着维尔德各个民族的胸针的硬朗的老男人走上了演讲台，社会革命党目前实际意义上的党魁普林西普·美多德在右翼团体里饱含着不满的动静中上台后这一切就开始变味了。\n\n美多德一开始就表明了社会革命党的要求，土地改革必须由多党多民族代表组建的委员会进行推动，然后必须取消维尔德庄园主对土地的主导地位并按照人口给各民族农民分配土地，他指出维尔德现在的经济问题就是因为被山地分割的各个土地抗风险能力太弱导致的，建立一个国营农场进行全国性的协调是必要的，很明显国营农场得由一种直接民主的形式进行管理，而非外资或者单一民族。而各地的面对各地的民兵，美多德则表示他还是不信任现任政府，保持民兵将有助于维护他们的利益。\n\n美多德还没有演讲完就遭到了快三分之一代表的反对声和嘘声，民族组织的普罗维德集团那边不知道哪个人在美多德指责对少数民族利益的侵害和不合理的民族户籍制度时正好丢出了一个石头砸中了他的脑袋，很快美多德头部就开始流血不止，但是他好像并没有发生这件事似的完成了演讲，共和制度党内即使有不少对他刚刚言论有很多不满的代表也在私下里承认这位“老革命”的坚韧。美多德结束演讲的时候会场里几乎所有警察都来拦即将爆发冲突的两波人，随着美多德回到座位并示意他们的人安静坐下，杜诺夫将军才连续敲了几次槌子后宣布接下来由科诺瓦列茨·瓦梭夫上台演讲。"
WDR.1.a:0 "难不成石头不算武器了吗？"

WDR.2.t:0 "第二次土改"
WDR.2.d:0 "由于无政府民族阵线的雅罗斯拉夫·拉科夫斯基和他的人根本没有来，而社会维尔德党很明显无法与早已根深蒂固的拉达对抗，所以就由诺瓦列茨·瓦梭夫负责上台演讲。作为国内唯二备受争议的人物，瓦梭夫上台时的嘈杂比美多德还要多，但是这个老资历军人只是上台后摆正了一下挂在老军装胸口的很古老的荣誉勋章就没在多做什么，说实话这让有些共和制度党的人都开始感到厌恶。\n\n瓦梭夫的风格则全然不同，他频繁用反问和诱导的语气让在座各位思考美多德提出的要求中的问题。他拿出不知道从哪里得来的数据表示现在的维尔德已经没有余地进行大规模的改革了，因为经济危机迫在眉睫，而这个消息被政府隐瞒了。美多德的改革方案只会导致维尔德的经济崩溃，而这又和外国资本特别是南巴资本有关。他指责我们现在面对的一切都是内外不同形态的“特尼安主义”的双簧戏的影响导致的，无论是外来学说还是外来资本都在企图颠覆维尔特人的文化和骄傲，维尔特人早已在万恶的联邦时期就受到了严重的破坏，现在不能让分裂进一步恶化了。\n\n很显然民族主义永远更好用，更何况在座大部分都是维尔特人，原先对瓦梭夫感到厌恶的共和制度党人都开始一百八十度转弯。紧接着在瓦梭夫很礼貌地鞠躬并表示对美多德个人被袭击的抱歉后，在场超过一半的人起立为瓦梭夫进行了鼓掌，看样子瓦梭夫更受到人们欢迎，即使他还没有完全暴露自己的全部诉求的情况下。\n\n四个党魁里也只有普列汉诺夫·赫里斯托夫在看到少数民族代表被自己人拉住后向卢日支·瓦茨巴表示了自己的担忧，瓦茨巴看到少数民族代表那边的情况后顺便跟自己的秘书表示在后续的新闻报道中减少一些煽动民族仇恨的内容并加强一下出版物相关审查。随着杜诺夫将军的再次敲击，接下来就是对三个提案的投票环节。"
WDR.2.a:0 "会不会已经有人开始行动了？"

WDR.3.t:0 "第二次土改"
WDR.3.d:0 "共和制度党的提案可以说就是第一次土改会议吸收部分其他意见的《土地改革条例》的改版，虽然修补了部分相互冲突的条例，但是依旧有很多问题有待解决，只不过在刚刚的会议上所有人的注意力都被两个人吸引住了才没有人注意到这一点。于是很明显，在刚刚两个人的演讲后连共和制度党自己的部分代表都没有投赞成票，四名党魁也并没有把这件显然已经的事当回事，很快便来到了社会革命党的提案投票环节。\n\n社会革命党的提案不出意外就是围绕着美多德提出的要求而制定的，全面且深刻的大规模改革，以至于看起来感觉有点不可思议和天正的。米特罗范·斯塔姆博洛夫和普列汉诺夫·赫里斯托夫都感觉有点意外，美多德本人出席参加会议就有点让人意外了，而这份提案又让人有股另一方面的意外，让人不得不思考美多德是不是真像瓦梭夫说的那样是来破坏会议的。很自然社会革命党的提案也没有通过，这一切好像命中注定的一样。\n\n维尔德民族组织那边可以说就只有普罗维德集团提交了提案，简单来讲就是围绕一个中心“维护维尔特人利益”，而让共和制度党有点意外的是他们难得和社会革命党达成一样的观点便是维尔德庄园主必须做出重大让步、限制外资和不能解散民兵组织，这让共和制度党企图争取他们做出庄园主有限让步和限制民兵组织的计划泡了汤。除此之外可以说他们的方案更多是提出了与土改没有太大联系的民族政策，加强户籍管理和城乡流动限制，提高军费以打击缇尼厄奥兄弟会为首的各个叛军。至少在投票结果来看，普罗维德集团的提案是得票率最高的，毕竟共和制度党内确实有不少人被瓦梭夫的演讲给吸引。而由于确实存在外部压力和庄园主的反对，共和制度党内部还是有不少人坚决反对瓦梭夫的方案。\n\n三份方案都没有足够的票数而被否决后，无论哪个党派的代表都坐不住了，特别是维尔德即将陷入经济危机的消息被爆料出来后，现场嘈杂与辱骂声比先前任何人上台演讲时都要激烈。杜诺夫将军看到自己敲槌无效后开始命令警察维护现场秩序，然后不知道谁把手枪还是偷偷带了进来并开了一枪，在短暂安静后便是更混乱的现场。门外的军人立刻冲了进来，但是最终还是没有找到开枪的人，在人们无序地离开会场在杜诺夫将军宣布一个月后再次召开会议。"
WDR.3.a:0 "此次事件所幸无人死亡，首都已经宣布加强戒严。"
WDR.3.a.tt:0 "§R有什么不好的事情开始发生了。§!"

WDR.4.t:0 "维尔德的混乱"
WDR.4.d:0 "在刚刚结束的维尔德共和邦第二次土地改革会议上，普罗维德集团的科诺瓦列茨·瓦梭夫爆料出维尔德目前严重的经济状况，而这条消息被当局政府掩盖并欺骗了大众和国际社会。而在政府承诺看管严厉并提前进行了非暴力谈判情况下，依然有人偷偷把武器带入了会场并打伤了维尔德著名左翼人士普林西普·美多德，会场也传出了几名代表被枪击受伤的消息，这让众多国际人士大失所望，而一个月后的会议上会通过一项能让各方满意的土地改革法案吗？\n\n普林西普·美多德作为马加尔斯革命时期就远近闻名的左翼革命人士在传出受伤的情况后，维尔德政府就已经被众多国外提特兰左翼活动人士所抵制，而土改会议上的枪击案也侧面证明了维尔德政府的无能，已经有当地工厂主和企业家表示对当局的担忧，维尔德未来的局势还能好转吗？"
WDR.4.a:0 "又一个即将陷入混乱的国家。"
WDR.4.b:0 "也许我们应该考虑撤资。"

WDR.5.t:0 "不安感蔓延"
WDR.5.d:0 "虽然我们加强了管控，但是会议上的情况和流言还是引发了全国范围的不安，这严重影响了我们本就岌岌可危的政府信誉。这间事甚至传到了国外，已经有部分外资开始撤资，我们不得不提前起用经济顾问的方案，共和制度党难得全面被调动起来。\n\n杜诺夫将军宣布了国家紧急状态并拿出事先准备好的证据证明是牛头人的渗透破坏，同时开放紧急补贴和抛售国债，政府会收购生活物资保证民众生活。对泄密事件政府内部依旧在加紧调查中，目前暂时拉出来几个人当作“牛头人间谍”被处刑。\n\n共和制度党内部召开紧急大会决定加强下一次土改会议的戒严和内部审查，必须在下一次会议上通过提案，在提特兰共和国、南巴地区的大使已经出发开始释放出向良好情况发展的信号。所有人内心都难以想象未来的情况。"
WDR.5.a:0 "这一切来得及吗？"

WDR.6.t:0 "最后一次土改会议"
WDR.6.d:0 "这次到场的代表比上次要少很多，每个派系都带来了自己的民兵站在靠近最近逃生出口的地方，警察也换成了军队严阵以待。美多德这次换上了自己在马加尔斯革命时期的军服参加会议，他帽檐上的旧革命军军徽闪闪发光。与此相对的瓦梭夫依旧穿着他的老军装，而这一次他看起来也没心思荣誉勋章了。共和制度党则只有斯塔姆博洛夫来参加会议，其他人则忙于处理各地的报告和混乱的情况了。\n\n这一次会议所有人都比上一次更加团结，斯塔姆博洛夫看着瓦梭夫方向，希望几天前的秘密会谈有作用，那已经是最大的让步了，杜诺夫将军在台上也顾不得没到场的代表了宣布今天的会议召开。第二次会议很明显比上一次会议更快更简短的样子，共和制度党只希望能通过一个看起来能服众的法案，社会革命党依旧坚持上一次美多德的主张，而这次瓦梭夫并没有上台演讲，也没人在意上台的斯捷茨科·帕诺夫讲了什么。\n\n这次会议比上一次多了个临时讨论环节，斯塔姆博洛夫按照准备好的稿子再次呼吁各方一起提出一个都能接受的方案并答应民兵组织不会解散，但是台下却不为所动的样子，这感觉比上次枪击爆发时还要恐怖的感觉。时间一分一秒地过去却没有人想要一起聊聊的样子，最终瓦梭夫叹了一声起身离开了会场只留下部分代表，甚至带走了他的民兵，这让会议看起来气氛缓和了一些，杜诺夫将军于是宣布开始投票。\n\n这次只有社会革命党和共和制度党的方案，社会革命党的方案依旧还是因为没有足够票数没能通过，而在共和制度党的方案开始投票时，美多德上前投下了自己的一票后爆炸发生了。灰尘布满了大厅，甚至有人开始放乱枪，会议现场局势混乱导致投票最终不了了之。\n\n由于提前做好了准备，这次倒是没有像上次那样消息第一时间传开，但是社会革命党拒绝在首都就医的请求直接带着自己的民兵离开了首都，而其他代表也赶紧离开了首都全然不顾警察和军队拦下调查炸弹的检查。首都在经历了一阵火并后最终宣布了完全的军事戒严，第二次土改会议彻底没希望了。"
WDR.6.a:0 "狗娘养的，一群狼心狗肺"

WDR.7.t:0 "西部失去控制"
WDR.7.d:0 "极端民族主义分子已经占据了西部，那边可能已经开始发生大屠杀了，而我们无能为力。"
WDR.7.a:0 "该死的极端民族组织"
WDR.7.b:0 "我应该去找真正为维尔特人着想的人"

WDR.8.t:0 "东部的叛乱"
WDR.8.d:0 "社会革命党最终选择了叛乱，美多德就像当初马加尔斯革命一样组织起来了军队赶走了政府官员，当地庄园主和外国资本已经开始逃离，没逃掉的人就难以想象会怎么样了。"
WDR.8.a:0 "愚蠢的少数民族和民众"
WDR.8.b:0 "到奥修姆去，那里才是我们的家园"

WDR.9.t:0 "南部的屠杀"
WDR.9.d:0 "缇尼厄奥兄弟会趁着我们的混乱重新占领了瓦利斯，2年前的恐怖情景再次上演，他们已经开始恐吓其他地区的人们“要么成为特尼安人，要么成为死人”，再具体的内容就不得而知了。"
WDR.9.a:0 "这是严重的挑衅和恶魔行为"
WDR.9.b:0 "实际上我早是特尼安人了"

WDR.10.t:0 "乌齐库姆的混乱"
WDR.10.d:0 "乌齐库姆因为重要的地位陷入了多方的混战中，这场角力终于分出胜负，扎格罗巴还在后续关注中。"
WDR.10.a:0 "乌齐库姆混乱结束"

