###事件###
KEU.1.t:0 "慈悲大王的一百零三岁大寿"
KEU.1.d:0 "降魔除妖救世济人大贤至善圣明庇护慈悲大王正在他的神殿内享受自己的一百零三岁生日，为此他今天额外折断了了五十头翼兔人祭品的翅膀和四肢，让他们在神殿的地砖上哀嚎着蠕动，最终缓慢而痛苦地死去。然而就在他准备再喝一杯用兔人奶酿造的兔奶酒时，慈悲大王感受到了异常，似乎一名正在神殿外保卫他的死者仆役禁军突然脱离了他的控制，真正化为了一具尸体。慈悲大王意识到，自己身体的老化终于影响到了他的魔力，如果他再不作为，那么等待他的是必然的死亡。他顿时陷入暴怒，抓起旁边正在为他端酒的翼兔人祭品女仆，直接扭掉了她的脑袋。"
KEU.1.a:0 "赶紧再来十头翼兔人让我消消气！"

KEU.2.t:0 "慈悲大王之死"
KEU.2.d:0 "大喜王国的统治者慈悲大王突然在一阵激寒中从睡梦里惊醒。自打他被从陆成的海岸上救上来之后，他第一次感到自己浑身冰凉，简直......就像死人一样。他其实早就知道自己的身体正在死去，但今天是他第一次如此真实地体验到自己的死亡。他感到自己的四肢不断地颤抖，身体像喷血一样流出汗液来。不对，他——他的身体真的在喷血。一名兔人祭品女仆手里拿着不知道从哪搞来的匕首，已经割开了他四肢的血管，她也抑制不住身体因恐惧带来的颤抖，但是她仍然在努力克服恐惧将这把匕首刺进慈悲大王的脖子里。慈悲大王想要从门外召集他的死者仆从卫兵，却发现他门外的两个卫兵已经都脱离了他的控制，化为了尸体。于是慈悲大王试图使用火球术轰飞那个行刺的兔人女仆，却发现他自己甚至连使用火球术的魔力都没有了。慈悲大王绝望地举起双手掐住兔人祭品女仆的脖子，然而那名兔人女仆在窒息的情况下依然在缓慢地将匕首刺进他的颈动脉。最终，匕首划开了慈悲大王那干瘪的皮肤和脆弱的血管壁，扎穿了他的颈动脉，这位一百零三岁的老人身体里最后一点鲜血也从中喷涌而出。随后，慈悲大王的手无力地落了下来，那名已经因大脑缺血昏迷的兔人也重重地落在了他的身上，趴在了慈悲大王的血泊中。"
KEU.2.a:0 "我......我也不想死！"

KEU.3.t:0 "英雄"
KEU.3.d:0 "大喜王国境内的所有不死者突然倒在了地上，不再活动。但这座岛上的居民依然战战兢兢、不敢僭越，生怕这又是慈悲大王的什么考验，于是整个汀海岛都陷入了死一般的沉寂中。这沉寂被圣德布法殿附近的居民的惊呼声打破了：一名浑身是血的兔人手里提着什么东西，竟然从圣德布法殿上走了下来。在附近所有居民的记忆中，从未有一名兔人或是翼兔人活着离开过那座神殿。而他们的惊讶随着那名兔人的走近到达了巅峰——她手里提着的竟然是慈悲大王那干瘪的头颅！他们终于确信，慈悲大王确实已经死了，于是欢呼声立刻辐射一般扩散开来。\n\n那名兔人似乎有些呆滞，她一瘸一拐地沿着圣德布法殿到蒙赐的路行走，完全不顾身旁聚集起来的人群，于是人群也默默地跟在她后面，缓慢地排起一条长龙。几个飞得快的翼兔人小伙子踊跃地前去各地报喜，而她身旁朝圣一般虔诚的游行队伍也越来越长——孕妇、儿童、农民、工匠......最终，当日落将至时，她终于走到了蒙赐的中心广场。\n\n一名正在大喜取材的皮奥瑞亚调查记者发现居民们莫名地聚集了起来，于是便抄起他的相机赶往居民们聚集的中心广场，人类相对于兔人的高大身材给了他巨大的优势。最终当他赶到时，他正好拍下了整场游行最戏剧性的一幕。浑身赤裸，身上只披着暗红色的血迹的兔人女英雄，站在广场中央的祭坛上，举起了一个干瘪的人头，振臂高呼：“慈悲大王已经死了！”\n\n随后，人群爆发出让这位记者几乎要聋掉的巨大欢呼。欢呼一浪接一浪，似乎没有尽头。"
KEU.3.a:0 "慈悲大王不是他们信仰的神明吗？"
KEU.3.b:0 "不可能、绝对不可能！"

KEU.10.t:0 "汀海岛分裂！"
KEU.10.d:0 "汀海岛上的居民仅仅享受了短短两周的安稳，大规模的流血事件便再次爆发了。几名极端的桑山民族主义者使用从他们的近亲虹镜王国那里得到的先进火器劫掠了雨林中的一个左汀原族村庄，杀死了这里的几百名居民、挖出了他们的心脏、并把尸体都穿在了木桩上。汀原镇的代行市长，左汀原族女英雄维安娜·维尔对于桑山民族主义者的暴行发表了严正抗议，并要求桑山人目前的临时领袖将凶手引渡至汀原镇进行审判。桑山族领袖列日喀-赛德拒绝了左汀原族的要求，并公开穿着用从慈悲大王宫殿中取出的兔人皮缝制而成的斗篷进行了对左汀原族的仇恨演讲。随着双方的愤怒民意不断加剧，左汀原族与桑山族的冲突也越来越不可调和，最终列日喀-赛德宣布将桑山地区境内的全部左汀原族驱逐，汀海岛也彻底分裂成与皮奥瑞亚亲善的左汀原共和国和受虹镜王国支持的桑山复仇阵线两个宛若死敌的政权。"
KEU.10.a:0 "民主和自由才是汀海岛的未来！"
KEU.10.b:0 "比起兔人，慈悲大王额外多杀了几十万翼兔人，公义何在？"

###决议###
KEU_Merciful_Overlord_death_decision_category:0 "慈悲大王·延寿长禧"
KEU_Merciful_Overlord_death_decision_category_desc:0 "我已经研究长生的方法很久了，但是我始终没能找到任何稳定有效的减缓衰老的方案，死灵法术在延续活人的生命这方面压根行不通。或许我应该试试一些土方子。\n剩余的人祭数量：[?KEU_offering_available]。"
KEU_inevitable_death_mission_1:0 "魔力衰退"
KEU_inevitable_death_mission_1_desc:0 "我能感到我的魔力正在衰退，我能控制的死者仆役的规模也越变越少。我必须想办法减缓我的衰老，否则我将不可能活过今年。"
KEU_inevitable_death_mission_2:0 "魔力衰退"
KEU_inevitable_death_mission_2_desc:0 "我的魔力衰退依然没有缓解，死者仆役正在不断地脱离我的控制。我得赶紧想办法了。"
KEU_inevitable_death_mission_3:0 "魔力衰退"
KEU_inevitable_death_mission_3_desc:0 "又有死者仆役擅自死去了！我必须尝试更多极端的续命手段，不然我真的会死的！"
KEU_inevitable_death_mission_4:0 "魔力衰退"
KEU_inevitable_death_mission_4_desc:0 "该死！我的身体早已叛变了我，它正在不受我控制地老化！我还不想死！"
KEU_inevitable_death_mission_5:0 "魔力衰退"
KEU_inevitable_death_mission_5_desc:0 "完蛋了！完蛋了！我不想死！我不想死！快点他妈来个人救救我！什么方法都行！我他妈已经快死了！"
KEU_demand_more_offerings:0 "要求人祭"
KEU_demand_more_offerings_desc:0 "济世岛民应该给我献上他们这周应该献上的人祭了。"
KEU_demand_more_offerings_tt:0 "活祭人口：§G+1000§!"
KEU_demand_extra_offerings:0 "要求额外人祭"
KEU_demand_extra_offerings_desc:0 "我的人祭数量告急，为此我必须要求一批额外的进贡。"
KEU_demand_extra_offerings_tr:0 "活祭人口数量小于§Y5000§!"
KEU_demand_extra_offerings_tt:0 "活祭人口：§G+2500§!"
KEU_demand_even_more_offerings:0 "我要更多人祭！更多！"
KEU_demand_even_more_offerings_desc:0 "我他妈快死了！你们他妈能交多少上来就他妈交多少！我不想死！"
KEU_demand_even_more_offerings_tt:0 "活祭人口：§G+10000§!"
KEU_weekly_mp_restoration:0 "日常补充魔力"
KEU_weekly_mp_restoration_desc:0 "每周我都需要500名人祭的鲜血来补充魔力。"
KEU_weekly_mp_restoration_tr:0 "活祭人口数量至少为§Y500§!"
KEU_weekly_mp_restoration_tt:0 "活祭人口：§R-500§!"
KEU_offerings_assisted_research:0 "人祭辅助研究"
KEU_offerings_assisted_research_desc:0 "那些软弱地禁止人体实验的政权不知道研究的奥秘。人的身体是世界上最玄妙的结构之一，而我手上正好有大量廉价的人体可以用来帮助我的研究。"
KEU_offerings_assisted_research_tr:0 "活祭人口数量至少为§Y2500§!"
KEU_offerings_assisted_research_tt:0 "活祭人口：§R-2500§!"
KEU_host_PUBG_game:0 "举办巨型角斗"
KEU_host_PUBG_game_desc:0 "我应该用这些人祭举办一场千人规模的角斗盛宴，让他们在角斗场里厮杀至最后一人，然后吃掉他的心脏，以获取更多强壮战士的活力。"
KEU_host_PUBG_game_tr:0 "活祭人口数量至少为§Y1000§!"
KEU_host_PUBG_game_tt:0 "活祭人口：§R-1000§!"
KEU_human_liver_drug:0 "炼制肝油大补丸"
KEU_human_liver_drug_desc:0 "济世岛有许多特色草本药物，能够起到提神醒脑、增强精神的作用。我要拿这些药物和祭品的肝脏炼制出一些补品，以延续我的寿命。"
KEU_human_liver_drug_tr:0 "活祭人口数量至少为§Y200§!"
KEU_human_liver_drug_tt:0 "活祭人口：§R-200§!"
KEU_human_brain_drug:0 "熬制脑髓大补丸"
KEU_human_brain_drug_desc:0 "据说皮奥瑞亚共和国有一道叫麻辣兔头的特色菜。我以前一直不喜欢吃，但是我现在突然发现这座岛上特产的兔人的脑袋也可以算兔头。"
KEU_virgin_bloodbath:0 "用处女血沐浴"
KEU_virgin_bloodbath_desc:0 "处女无疑是所有人类中生命力最强大的一种，她们纯洁、年轻而又等待着孕育新生命，我不能浪费这么宝贵的资源，我应该用她们的鲜血持续浸泡全身，以吸取她们的生命力。"
KEU_virgin_bloodbath_tr:0 "活祭人口数量至少为§Y2000§!"
KEU_virgin_bloodbath_tt:0 "活祭人口：§R-2000§!"
KEU_torture_offerings:0 "折磨祭品取乐"
KEU_torture_offerings_desc:0 "远乡有一句俗话，“乐一乐，十年少。”虽然笑一下就能年轻十岁这种事不可能发生，但是保持快乐的情绪确实有助于我的身体续命。用各种酷刑来折磨那些唯命是从的祭品，听他们痛苦的惨叫与绝望的呜咽简直是绝佳的娱乐。"
KEU_torture_offerings_tr:0 "活祭人口数量至少为§Y1000§!"
KEU_torture_offerings_tt:0 "活祭人口：§R-1000§!"
KEU_this_might_work:0 "这可能管用..."
KEU_find_life_extension:0 "找到长生不老的办法！"

