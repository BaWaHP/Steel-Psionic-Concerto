###政党名称###
KEU_wizard_rules_party:0 "慈悲大王"
KEU_wizard_rules_party_long:0 "降魔除妖救世济人大贤至善圣明庇护慈悲大王"

###民族精神###
KEU_Nation_of_Youth:0 "只有青年的国度"
KEU_Nation_of_Youth_desc:0 "如果你是一名从远方而来的旅行者，你的船停泊在大喜王国的蒙赐港的话，你会惊叹于这个国家国民的年轻与富有生命力。然而这虚伪的活力背后的原因却是残酷且血腥的：大喜王国的独裁君主慈悲大王要求居住在西北部平原的左汀原族每年进贡两万头人祭、居住在东南山林中的桑山族每年进贡三万头人祭，且任何人一旦达到30岁则必须作为祭品上贡或者被处死。拜这所赐，大喜王国的国民除了贺罡和他的那些死者仆役，没有一人年龄大于三十岁。多亏兔人和翼兔人由基因带来的强大的生育力，他们才不至于灭绝。"
KEU_Enforced_Breeding_Policy:0 "强制生育政策"
KEU_Enforced_Breeding_Policy_desc:0 "由于慈悲大王对人祭的极大需求，大喜王国的原始社会远比以往急切地需要“新鲜血液”。即便拥有一支死者仆役大军，羸弱的大喜依然无法通过对外战争来补充人口，于是慈悲大王将魔爪伸向了国内。慈悲大王将他一部分的死者仆役改编为接生部队，在帮助济世原住民接生、提供勉强合格的生育卫生环境的同时也惩罚那些拒绝按配额生育的男女。"
KEU_Legion_of_Dead:0 "死者军团"
KEU_Legion_of_Dead_desc:0 "作为一名强大的死灵法师，慈悲大王掌握着一支庞大的死者仆役军团，用来控制、镇压大喜王国的国民。然而运行着这支死者军团不是没有代价的，慈悲大王每天都需要靠人血补充大量魔力来维持这些死者的行动。不仅如此，年老体衰的贺罡的魔力也在衰退，他所能控制的死者仆役也越来越少。\n慈悲大王能够控制的死者军团数：[?KEU_merciful_overlord_life_energy]。"

###国策###
KEU_life_extension:0 "延续寿命"
KEU_life_extension_desc:0 "我，降魔除妖救世济人大贤至善圣明庇护慈悲大王，是大喜王国至高且唯一合法的绝对君主。每天这里的原住民都会毕恭毕敬地给我上缴上百名人祭，供我享乐和研究用。然而我自己的肉体却正不受我控制地老去，我的魔力也在衰退，每天我的死者军团里都有士兵脱离我的控制死去。照这样下去，不到一年内我就无法维持我的器官活动了，我就要老死了！我不能死！我不能死！我必须活到我的一百零八大寿，这样我才能飞升到死神的领域！"

###领导人###
KEU_Merciful_Overlord:0 "慈悲大王"
KEU_Merciful_Overlord_desc:0 "慈悲大王，全名降魔除妖救世济人大贤至善圣明庇护慈悲大王，是黑魔法术士贺罡自封的名号。与他的名号所描述的内容完全不同，慈悲大王是一个极度暴戾无常且嗜杀的君主。每年大喜王国的臣民都要为他献上上万的人祭来满足他的研究与娱乐需求，否则他便会带领着他用黑魔法操纵的死者仆役大军夷平任何敢反抗的部族，然后用酷刑“招待”这些部族的幸存者。\n\n但是现在贺罡的年龄已经高达一百多岁，若不是他使用魔法来维持自己身体的稳定，他的生命早已如同风中残烛。面对着无可避免的死亡，贺罡陷入了极度的恐慌，不择手段地寻找着延续寿命的方法。"

###将领###

###内阁###
KEU_Quirathka_Butagn:0 "奇拉卡-布旦" 
KEU_Quirathka_Butagn_desc:0 "奇拉卡-布旦是七十三年前接纳了贺罡的桑山族酋长，也是贺罡在济世控制的第一位死者仆役。在贺罡征服了整个济世之后，他被贺罡用来传播慈悲大王“神使”的名号，一直“勤劳”地工作到今天。"
KEU_Urru_Maluv:0 "乌鲁·马鲁"
KEU_Urru_Maluv_desc:0 "乌鲁·马鲁曾经是一名德高望重的左汀原酋长，在贺罡带领大军前来进攻左汀原部族时他组织起了一支颇具规模的联军进行反击。然而他的微弱反抗完全无法与贺罡的强大邪恶抗衡，他战败后被贺罡转化为死者仆役领军，带领着死者军团屠杀着他曾经的盟友们。"
KEU_Dhjikha_Phalabr:0 "德日喀-法拉巴" 
KEU_Dhjikha_Phalabr_desc:0 "即便慈悲大王带领的死者军团已经征服了整个汀海岛，在海岸附近的一些小岛礁上仍然存在着少量的抵抗势力，德日喀-法拉巴就是这些抵抗组织的领袖。但当慈悲大王率领着死者军团前来扫荡时，德日喀-法拉巴因恐惧可耻地投降了，并出卖了其他的抵抗势力，但他依然无法逃脱被转化为死者仆役的命运。"
KEU_He_Hongmei:0 "贺红梅" 
KEU_He_Hongmei_desc:0 "在完全脱离低级趣味之前，贺罡曾和某个祭品生有一位女儿，那便是贺红梅。然而贺罡显然没能力做一个好父亲，当女儿进入叛逆期开始顶撞他的时候，他直接把女儿的脑袋砍了下来，随后将她转化为死者仆役。这下贺红梅永远听话了。"
KEU_Viana_Weil:0 "维安娜·维尔"

