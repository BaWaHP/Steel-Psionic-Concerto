CLD_human_Velja_Childs:0 "维尔亚·切尔德"
CLD_human_Velja_Childs_desc:0 "维尔亚·切尔德，这个名字在不同的时间有不同的含义，在1950年，他代表一个平平无奇的婴儿；在1969年，他代表奥罗日亚军队中的一名受上级信任的特种兵；在1980年，他代表联合阵线起义军内的情报头领；在1994年，他代表一位站在阴影中的坚定的“红色剑盾”，直至今天。\n\n维尔亚·切尔德的前半生与后半生仿佛泾渭分明，在奥罗日亚一个贵族家庭中出生，成年后和很多人一样前往军队服役。在军队服役六年后，他拒绝了军队对他的留任教官的要求，转而前往了西莉迪亚，他用自己的积蓄开了一家药店，普普通通的过着日子，直到有一天，西莉迪亚起义爆发了，奥罗日亚军队惊恐的发现他们几乎所有的布置在起义军面前都仿佛透明，他们安排在西莉迪亚民间的情报网几乎同时陷入了瘫痪，情报点被起义军迅速的捣毁，大部分特工被迅速捕获而没来得及逃走，这直接导致了奥罗日亚部队对起义军的迟缓反应甚至错误反应，使得起义几乎没有受到阻挡的蔓延至整个西莉迪亚。\n\n对于这件事的调查一直延续到了战后，奥罗日亚军方一直认为是内部出现了叛徒，逐渐的一个名字浮出了水面：维尔亚·切尔德。而奥罗日亚军方得以调查到这个名字的原因是在起义成功后切尔德正式接管了西莉迪亚联合阵线的情报工作，随即他们展开了一系列的秘密刺杀行动，其中包含了二十七起对切尔德的刺杀，但这些刺杀无一不被切尔德化解，甚至利用这些令奥罗日亚不得不交出了一些外交筹码，使得奥罗日亚军方不再指望通过刺杀来击垮联合阵线，虽然这些刺杀并没有因此停止。\n\n在西莉迪亚内部矛盾积蓄爆发一系列事件中，切尔德选择站在了工人政权的一方，在一系列事件中挫败了奥罗日亚的颠覆行动，并借由雷霆手段稳固了公社政权，没人知道切尔德到底为了什么，但所有人都知道，当你和切尔德站在同一边时，他永远会是最可靠的同志之一。"
CLD_human_Rickelsang:0 "里克尔桑"
CLD_human_Jacques_Toles:0 "雅克托尔斯"
CLD_human_Siatovia:0 "思亚托维雅"
CLD_human_Lorvin:0 "洛尔文"
CLD_human_Lorvin_desc:0 "洛尔文非常熟悉他现在的工作，毕竟他早在奥罗日亚时代就开始管理工会了，后来西莉迪亚起义，他依然在西丽迪亚共和国管理工会，现在在西莉迪亚公社，他依然在管理工会。或许能使他一直拥有这份职位的原因，正是他独有的管理天分和他那“没有倾向的倾向”。在过去的日子里，他总能很快的熟悉现行的法律并对工会的管理做出调整，无论是奥罗日亚时代，抑或是联合阵线时代，还是公社时代，他所做的都几乎无可指摘。\n\n在外人眼里，洛尔文是个不折不扣的墙头草，随风摆，但只有他自己知道，这一切只是因为自己已经习惯了这份工作，洛尔文是个不那么愿意做出改变的人，大环境的改变他无从干涉，那么只能改变自己以让自己做出最少的改变。"
CLD_wings_Mazokav:0 "马佐卡夫"
