CLD_enemy_sabotage_decisions:0 "敌特破坏"
CLD_enemy_sabotage_decisions_desc:0 ""
CLD_enemy_sabotage_decisions_txt:0 "随着内战告一段落，§x公社§!与北方的§z反动派§!也形成了§7临时边界§!，双方均无力进攻对方，§r南方解放区§!进入了整装备战的阶段。年轻的§t革命阵线§!不得不偿试接管国家的方方面面。显然北方的§z反动派§!并不会让我们安稳建设发展，自1997年中旬起，反动分子即持续向解放区输送大量§2特务§!并扰解放区内不满§7国有化§!政策的工商业，小生产者等，破坏§j革命政府机关§!，§2工业生产§!和§R社会秩序§!，并大量采用恐怖袭击的方式制造社会恐慌。1997年9月8日，西莉迪亚共产党中央委员会大楼，社会民主党中央办公室以及民主联盟总部均被信件炸弹袭击，所幸爆炸发生于凌晨，并未造成人员伤亡。1997年9月11日，敌特在首都中心区设置炸弹，并当场炸死二十余人，炸伤六十余人。1997年10月20日，敌特在首都暗杀了当时的革命阵线司法机关领导§E约瑟夫·卡马雷拉§!，引发首都的媒体，知识分子，群众的极大恐慌与愤慨。此后，敌特破坏的情况日益严重，极大危害了革命阵线，党和国家，以及广大人民群众的生命与财产安全。\n\n1997年11月15日，§E舍尔勒同志§!在§t革命阵线§!的主席团大会上提出了§7“建立紧急状态委员会，加强军联防体系”§!的建议案并被§t革命阵线§!全票通过。为更好的维持社会治安，肃清境内的§z特务反革命分子§!，建议草案中包括了组建紧急状态相关部门，加强公社司法机关刑侦能力，整合情报组织，组织军民联防体系，加大社会治安整治力度等规划。"
CLD_enemy_sabotage_mission:0 "敌特破坏"
CLD_coord_public_security_dept:0 "协调§e公共安全部门§!"
CLD_coord_public_security_dept_desc:0 "公社面临严重的治安问题，而我们的公共安全部门却效率奇低，由于革命后的混乱和对新政权建设的茫然，目前南方解放区负责治安的包括经过甄别后继续履职的内政部警察系统，红军总参谋部的革命卫队系统，乡村自治公社组织的民兵系统以及城市职工组成的工人民兵（护厂队）系统还有目前没有铺开但首都已经试用的联防队。按照莫里茨的话说，目前就是“九龙治水，多头管理”。当然，在没有解决路线问题的情况下我们也不可能成立新部门或机构取而代之，经过舍尔勒和莫里茨的协调，最终方案是在紧急状态委员会下成立一个“公共安全委员会”协调多个机构的行动。"
