###事件###
CLD.1.t:0 "军队中的旗手"
CLD.1.d:0 "西科尔看着面前的排长，有些不知所措。\n\n“不要紧张，我只是来向你征询一下意见，关于在你在的班上建立党小组的事情，连里希望让你来担任组长。”\n\n西科尔更加紧张了，“我甚至只是一名‘异族’，怎么可能可以担任这样的责任？”\n\n“同志，或许以前的生活经历给了你一些错误的认知，我有必要向你强调，各个种族是平等的，即使不是同一个种族也不会影响什么，而且，这次的任命，是投票产生的，你不需要有心理负担，大家都很相信你。”\n\n西科尔想起了以前的日子，被歧视的日子，想起了没有随他逃出来，还在受到压迫的同胞，片刻，他下定了决心，为了他自己，也为了他的同胞，为了全世界被压迫的人，他必须做他所能做的。他接过了这面旗帜，千千万万个这样的人，将会将红色的灵魂深深的刻进这支军队之中,成为他们最强大的力量。"
CLD.1.a:0 "团结在这面红旗之下，直到永远！"

CLD.2.t:0 "当那一天来临"
CLD.2.d:0 "每天负重训练，举枪训练，还有工事速构训练，随着最近北上的训令发布，射击训练也多了起来。\n\n“今天的训练结束了，解散！”\n\n按照规章，每天训练结束后有一段自由活动的时间，卡斯亚勒并没有前往休息，而是上前和将要离开的班长搭话。\n\n“班长，虽然之前公布了我们将要解放北边的决定，但是也没给个具体时间啥的，好让人准备准备啊。”\n\n“准备？每天都在准备！倒不如说如果明天战争就开始了，你做好了准备么？”班长顿了顿。\n\n“现在的每一天都是为了将来在战场上你们能活着回来而做的准备，你小子也不用着急，那一天肯定会来的，真的到北上你可别露怯。”\n\n班长说完就走了，卡斯亚勒站在原地思考着，自己真的做好了准备么，无论自己是否做好了准备，那一天都会来临，而且直觉告诉他，那一天不远了。"
CLD.2.a:0 "年轻的士兵渴望建立功勋！"

CLD.3.t:0 "《星星之火，可以燎原》"
CLD.3.d:0 "“同志们，三年前我们掀起了革命，推翻了联合王国的残暴统治和严酷剥削，但紧接着我们就遭到了那些买办们的背叛，他们妄图抹杀我们的反抗，声称要消灭我们。我们掀起了反抗的浪潮，解放了广大的南方，而现在那些出卖我们的叛徒盘踞在北方，妄图消灭我们。”\n\n“同志们，目前我们目光所能及的地方，都是漆黑的夜晚，在这个冰冷的长夜之中，我们是第一个举起火把的人！而我们也必然会成为众矢之的，王公贵族和资本大享们会想尽一切办法消灭我们，但革命的火焰绝不会如此轻易的被消灭！我们是这个草原上的第一颗火星，而星星之火，可以燎原！我们必将这个腐朽的秩序烧尽，去建立起真正属于人民的世界。就在今天，我们将踏出第一步，起来吧同志们，并肩去战斗！”"
CLD.3.a:0 "千年的铁树要开花！"

CLD.4.t:0 "第113号命令"
CLD.4.d:0 "关于最近出现冤假错案数量上升的情况，经过讨论，经由紧急状态委员会发布第113号命令，如下：\n\n1，所有枪毙，流放的执行必须交由委员会进行审查。\n\n2，在没有确凿的证据前不允许对嫌疑人进行任何程度上的惩罚。\n\n3，不允许刑讯逼供\n\n4，对于试图利用调查进行排除异己行为的人或组织在证实之后交由委员会进行审查与惩罚。\n\n5，在特别情况下实施的特别行动必须在事后提交行动报告进行说明。\n\n以上。"
CLD.4.a:0 "红色的剑盾上沾染的绝不会是无辜人民的鲜血！"

CLD.5.t:0 "全公社工人代表大会特别会议"
CLD.5.d:0 "全会充分肯定紧急状态委员会成立以来的工作。一致认为，面对严峻复杂的斗争环境和艰巨繁重的国内革命稳定任务，紧急状态委员会认真落实工人代表大会临时主席团全会精神，完整准确全面贯彻革命政策，坚持稳扎稳打工作总基调，统筹推进革命肃反工作与公有化工作，着力推动工农业平衡发展，进一步推动和谋划全面深化工业，农业，医疗，教育，军事五大方面的革命斗争，扎实推进社会主义民主政治建设，不断加强宣传思想文化工作，切实抓好工人权利保障工作，坚决维护国家安全和社会稳定，有力推进国防和军队建设，正确贯彻军事民主制度，激发基层指战员主动性，反对绝对平均主义倾向，为解放北方白匪统治区迈出坚实步伐。\n\n舍尔勒同志在全会上表示，“经过两年多的经济重建和军事准备，公社已经取得了过去几百年难以想象的成就。绿海上的渔业合作社，与我们英勇的铁矿工人，还有千千万万战斗中的工人阶级劳动大军，为我们的革命事业做出了巨大的贡献。我们镇压了妄图与北方反革命分子沆瀣一气的内部叛徒，现在沸腾的群山与咆哮的海浪，正在向我们北方的反动分子奔涌而去，我们必将取得最后的胜利！”——摘自《东巴斯蒂亚解放日报》"
CLD.5.a:0 "我们的目的就一定会达到！"

CLD.6.t:0 "救赎"
CLD.6.d:0 "“你们本不应该遭受这些，是他们推着你们为了他们的利益走上了战场，这一切不是你自己能够控制的，责怪自己也是没必要的”\n走出中心，深吸一口气\n抬头看着天空，不禁眯起了眼睛\n“好耀眼的太阳”\n“。。。。”\n生活还要继续下去\n那些事情虽然无法彻底忘怀\n但总得继续活下去\n“下午的聚会。。还是去吧”"
CLD.6.a:0 "继续向前"

CLD.7.t:0 "日记"
CLD.7.d:0 "“当我写下这篇日记的时候，我仍然不敢相信我是\n在战俘营中，我自己的笔早不知道飞到哪里去了，\n我现在用的这支笔甚至是管看守我们的士兵要的，\n说是看守但我们只要不跑出营区他们也不会对我\n们干什么出格的事情，甚至会满足你的一些要求，\n比如当我抱着试试看的心态向离我最近的卫兵要\n求要一支笔时，他点点头然后离开了，没过多久\n就给我拿了一支笔回来。在这里我们的生活条件\n甚至比在家里还好，至少不用担心食物问题，我\n们甚至是和卫兵们吃一样的食物！\n当我当初在阵地上看见他们冲上来的时候，我还\n以为我死定了，但我现在还活的好好的，甚至没\n有遭到任何虐待，虽然面包有点硬，不过这一切\n都还是不敢让我相信，虽然面包有点硬。。。”"
CLD.7.a:0 "欸？这支笔送我了？谢谢"

CLD.8.t:0 "守则"
CLD.8.d:0 "第一，一切行动必须听从上级指挥\n第二，一切缴获的物品必须上缴\n第三，不许拿群众的任何物品\n第四，讲话要和气一些\n第五，买卖必须公平\n第六，借了别人东西一定要还\n第七，损坏别人的东西一定要照价赔偿\n第八，不许动手打人和骂人\n第九，不允许毁坏农作物\n第十，不允许任何猥亵行为\n第十一，不允许有虐待俘虏的行为"
CLD.8.a:0 "精神体现"

CLD.9.t:0 "腾笼换鸟"
CLD.9.d:0 "“阿舍勒同志，124票。”帕拉尼姆还在记票，而莫里茨倒是已经麻木了，显然，在可见的将来，被自己构建的民主集中制程序选下去可能会成为代议制历史上的笑点之一。\n\n“威利（莫里茨小名），过半了已经。”莫里茨的朋友普格尔提醒他，显然三大选举将会以阿舍勒派的胜利而告终，当然这也在他的意料之中，所以他并不惊讶，只是人到失落时总是不能忽视自己的感受，哪怕是对此有所心理准备。\n\n“普格尔，既然制定了程序就要遵守，共产党不是我们的私人王国。”\n\n“所以你打算怎么办？”\n\n“首先，我们不能退党，这会引发更大的分裂，我们与阿舍勒有分歧不妨碍我们继续为革命工作，这也有违我们的本意。”\n\n“几年前我告诉过你，工人群众显然会喜欢他这样……”普格尔望了望莫里茨，声音渐微但如同一把剑刺入莫里茨的内心。\n\n“没有阿舍勒和他们社会党左翼，我们怎么可能有现在这样的影响力？”莫里茨小声说，这句话是事实，普格尔也承认，没有社会党左翼新成员利用过去的工会关系，他们没这么大影响力，当然莫里茨不只是在试图说服普格尔，也是在试图说服自己。\n\n“联合阵线现在不是很稳，党内容不得分裂，按照程序，我会接任第二书记，负责组织工作。既然党代会把我们选下去，那么我们老一辈就先把这套组织维持下去，别让阿舍勒这个小年轻瞎整。”\n\n“那以后呢？”\n\n“走一步看一步吧……”"
CLD.9.a:0 "“选举结果是……”"

CLD.10.t:0 "握握双手"
CLD.10.d:0 "西共三大不是务虚会议，内容也并不多，斯托利萨大学的礼堂是那么高耸，显得会议室里挤满的三百多代表是多么渺小。会议被莫里茨自己宣布结束，代表们齐唱了党歌以后就逐渐散去。\n\n莫里茨坐在主席台的长桌后，一言不发。普格尔收拾文件，拍了拍小威利的肩膀，往大门处走去。此时大礼堂已经不剩什么人了，稀稀拉拉的几个代表还在往门口晃悠。某种程度上莫里茨并不能很准确地描述自己的思绪，悲伤吗？谈不上，难过吗？其实也谈不上，那可能是不甘吧，那为什么感觉有一堆一堆的话堵在心口？他也搞不清，可能是贪念权力？那这是绝对的错误思想必须要杜绝。或许是也党内同志不认可自己，以及他代表的老近卫军。莫里茨抬头望了望天花板，古老的斯托利萨大学大礼堂，悠久而凝重，深灰色的天花板沉甸甸的，万籁俱寂……无论如何，现在莫里茨只能咽下五味杂陈，咽下这一切，纵使有些五彩斑斓的黑的感觉。对外，这种情绪绝对不能影响工作，影响战友影响同志，无论自己的情绪多模糟糕，自己都不能是一个小肚鸡肠的人，从各种意义上讲，他都必须表现得大度。\n\n“莫里茨同志……”莫里茨一转头，是从台下走上来的阿舍勒。\n\n“第一书记同志，你好。”莫里茨站了起来，拎了拎自己的衣领，伸出自己的右手。\n\n“你好。”阿舍勒也伸出右手，脸上倒是挂着笑容，轻快，烂漫，或许这就是新生代的面孔，有活力，有着难以想象的革命激情，有着老一辈不具有的魅力。\n\n“今后工作，还要靠您呢。”"
CLD.10.a:0 "“共同努力，共赴胜利。”"

CLD.11.t:0 "危机"
CLD.11.d:0 "“阿舍勒同志”，诺尔福一路小跑，叫住了正准备走进中执委大楼的阿舍勒，“切尔德同志让我把这份文件转交给你。”\n\n阿舍勒点点头，接过了诺尔福的文件夹。\n\n“这是关于什么的？”\n\n“额……”诺尔福压低声音，“切尔德同志让我提醒您，最近风声紧，你是党的第一书记，位置重要，绝对不能有闪失。有些内容只能由主要领导同志和社会部相关同志知道。”\n\n阿舍勒若有所思地看着诺尔福，“辛苦了，你还特地跑一趟，回去记得让切尔德多注意休息。”阿舍勒伸出右手，和诺尔福握了握手，“放心，我会加强警惕的。”\n\n办公室里，阿舍勒打开了这份工作文件。\n\n“《关于近期联合阵线内部的情况报告》 绝密，阅后A类保存”\n\n“保守分子不会甘心于看到我们做大，即使我们不对他们有所图谋，他们也未必不会想优先解决掉我们。”\n\n“从我们的情报源分析，社会部认为联合阵线内部的保守分子和北方奥罗日亚方面的联系日渐紧密……”\n\n“目前形势随着我们左翼统一战线的活动日渐有利于我们，这会激化我们与联合阵线右翼的矛盾……”\n\n“从军事实力上分析，共和国军队大部分成员并不想打内战，我们也着手进一步加强兵运工作，社会部会争取拉拢军队内的进步官兵，宣传反卖国，反内战思想……”\n\n“因此，我们认为，如果右翼寄希望于抹杀进步力量夺取政权，他们可能会采取武装袭击的方式猎杀左翼统一战线的各个主要领导人，并以最快速度纠集保守势力对我们发动进攻……”\n\n“总之，社会部已经开始加强对统一战线主要领导人的保护工作，建议主要领导同志最近不要单独出行，最好和社会部的安保同志一起行动。”"
CLD.11.a:0 "“希望不会出什么意外吧！”"

CLD.12.t:0 "爆炸"
CLD.12.d:0 "虽然以前听说过魔法的存在，但在如此近距离的观赏到魔法还是人生中的头一次，或许叫观赏也不太对，毕竟没几个人可以去“观赏”随时可以取自己性命的东西。\n\n子弹与魔法的交锋已经持续了半个小时，这支卫队的存在似乎证实了那个人与联合王国之间存在的关系，因为西莉迪亚向来就是忽视魔法存在的，联合阵线也没人会使用魔法，这支小队大概是联合王国派来保护那个人的，说是小队但是只有五个人，却可以压着他们二十多人没法抬头。\n\n“以后要是还有机会的话一定要了解了解魔法。”阿尔勒一边这样想着一边思考着突围的方法，从他和切尔德带领行动队突入办公楼已经过了半个个小时了，如果继续这样下去怕不是连那个人影儿都见不到，更别说抓捕了。\n\n逐渐的他从一开始的震惊和不适应中脱离了出来，开始试着寻找对方的弱点，每当他们试着投出手榴弹，对方总会第一时间去将手榴弹蒸发掉，说明对方并没有很强的防御手段，而到现在对方都没有打破他们的掩体，或许是在拖延时间，也或许是他们的魔法没有很强的穿透力，无论是那种，突围的方法都已经明朗了\n\n阿尔勒指向大厅里厚重宽大的桌子，诺尔福的战斗经验就立刻让他明白了他的意图，”全体，准备好手榴弹，准备，投!”\n\n一瞬间，十多枚手榴弹从掩体后飞出，卫队的魔法师们只得转移全部火力进行拦截，但他们却看见一张厚重的桌子从凶猛的火焰后冲了出来，阿尔勒和其他五个人顶着桌子冲向了法师们组成的防线，对方或许没有料到有人敢于冒着这种火力冲锋，除了增强火力也别无他法，凶猛的热浪让后方的人员无法支援，只能寄希望突击队。\n\n木桌终于无法承受冲击轰然碎裂，但距离已经足够接近，双方都明白，一旦进入近身战，那么阿尔勒一方有绝对的优势。而当刺刀马上就要刺入敌人的胸膛时，阿尔勒却看到了一阵闪光，紧接着自己的身体不受控制的痉挛了起来。\n\n就在阿尔勒觉得自己即将牺牲在这里的时候，闪光停止了，后方的人员趁着敌方专心对付阿尔勒的时候，冲出了掩体精准的射杀了他们。\n\n这是阿尔勒晕过去之前只听到一句话——"
CLD.12.a:0 "“队长，阿舍勒同志可能受伤了……”"

CLD.13.t:0 "事已至此"
CLD.13.d:0 "等到阿舍勒醒来，他已经躺在了医院的病床上。刚睁眼，雪白的天花板就映入眼帘，刚装完修的友爱会医院，素雅而高贵，而这似乎又与这片大地的现状格格不入你阿舍勒大脑还在回忆，激战中他思索的那些又回滚到了心里，他的怀疑，他的想法，他并不希望这些都是真的。革命者自然不畏惧暴力，但暴力总归是要死人的。\n\n“阿舍勒”，切尔德厚重而令人安心的声音把他从恍惚中拉回现实，“我想你应该猜到发生说明了。”\n\n“右翼发动了事实性政变，对吧……”\n\n“是的，”切尔德缓了缓，“工人民兵和支持我们的部队把已经把他们清理出了首都。”\n\n“我……昏迷了几天？”\n\n“四天，你昏迷这段时间莫里茨和洛尔文基本上稳定了首都局势。”\n\n“那么，首都之外呢？”\n\n“应该说你的争取策略是成功的”，切尔德从公文包里抽出几份电报以及西莉迪亚地图，“斯德尔将军选择支持我们，南方主要城市的工会和驻军基本夺取政权，农村也相对稳定。”切尔德指了指几个主要港口。\n\n“北方有什么动向吗？我很担心，那里我们的工作做的还是太少了。”\n\n“事实上我们认为，北方我们基本上不可能控制，从袭击方式来看，奥罗日亚肯定介入局势了，北方的同志确实试图夺取城市，但被镇压了，从目前的情报看，北方的广大农村对城市工人的运动并不感冒。”\n\n“我想，你们社会部是不是应该先撤回北方的组织，避免不必要的损失。”\n\n“目前我的设想是除了北方本地同志和组织兵运的同志，其他人全部撤出，方案大底完成了。”\n\n阿舍勒翻开切尔德给的文件夹，快速扫读着他们的内容。\n\n“悲观地说，虽然我们暂时稳住了南方沿海地区，但是右翼军队对首都威胁并没有解除。”\n\n“斯德尔将军的三个主力师正在北上，南方城市的党组织和工会也在动员部分驻军和工人组建民兵北上，原参谋部的里克尔桑也愿意拉着自己的班底留下来，他正在组织首都周边的物资调度和布防。”"
CLD.13.a:0 "“事已至此，车轮已经停不下了。”"

CLD.14.t:0 "开端的结束"
CLD.14.d:0 "“我相信，没有人希望闹到这一步。”阿舍勒环顾四周，现在联合阵线右翼早已逃离首都，会议室坐着的，都是原先左翼组织的头头脑脑，连格雷克都留了下来。\n\n“但是右翼既然已经迈出了这一步，我们也无可奈何。”\n\n“我看，现在我们要做的是和北方的叛徒划清界限。”威利·伯恩倒是直言不讳。\n\n“这是必要的，但是最好等局势相对稳定下来。”莫里茨示意诺尔福把地图抬进会议室。\n\n“目前我们的工人民兵和首都防卫部队已经在首都圈西北60-80公里范围内构建防御阵地。”诺尔福对着地图开始指指点点，“南方的主力军正在沿着铁路线北上。81旅，12旅两个工人组成的临时支援旅也从西方进攻，迟滞北方军队的进攻。”\n\n“总的来说，经过一个多月的努力，我们基本上稳定了前线。随着我们增援部队的抵达，我们将试着发动反攻。”\n\n“不过，同志们”莫里茨开口说到,“前线的稳定并不意味着危险已经解除。北方叛军虽然攻势受挫，但其主力尚存，且背后有外部势力的支持。我们必须抓紧时间巩固防线，同时加强后方动员，确保物资与兵员的持续补给。眼下每一步都关系全局，丝毫大意不得。”\n\n“另一件事，我们的政权也需要新的名字，组织。”阿舍勒对代表们说。\n\n“我提议，组建西莉迪亚革命阵线，并组织临时政府。”\n\n代表们面面相觑，随后……"
CLD.14.a:0 "西莉迪亚公社自此成立"
CLD.14.a.tt:0 "但是这个政权还是如此§7稚嫩§!，以至于一切都是那么的§t混乱§!……\n§t革命§!是§7理想§!的，但§7理想§!不是§Y面包§!……\n她的§R未来§!，她的§R命运§!，她的§R人民§!，现在，掌握在§R你的手中§!。"

CLD.15.t:0 "胜利之夜"
CLD.15.d:0 "阿尔勒-舍尔勒昨晚并没有睡好，或者说他已经很久没有睡一个好觉了，自从几年前那场失败的抓捕行动以及南北对立之后。\n\n但昨晚不一样，他并不是因为担心自己棋差一招而将公社拖入深渊产生的焦虑无法入睡，恰恰相反，他胜利了，他们胜利了，在三年的隐忍和一场艰苦卓绝的战争之后，他们胜利了，联合王国的阴谋被打破，保皇党的野心被战胜，分裂的罪魁祸首们只待审判。\n\n昨晚他和他的朋友们进行了一场久违的派对，平日里一向沉稳的洛尔文一口气喝了半瓶高度数的蒸馏酒，可惜马佐卡夫和廷帕尔诺夫不在，不然按照这两位超越人类的酒量还能和他喝一喝。里克尔桑一边把玩着杯子一边在思考着什么，这个杯子他认识，是从王室的财富里缴获的，说是什么一整块儿水晶雕刻的杯子，不过在他看来和玻璃的没啥区别，更沉一点罢了。思亚托维雅喝了一杯酿造酒脸就通红，话比平时多了不少，这样也挺好的。\n\n阿尔勒-舍尔勒一边喝着果汁一边和他们有说有笑的聊着天，直到深夜他们在办公大楼里的宿舍找个床躺上就睡了，他躺在床上却无法入睡，他们现在战胜了分裂者，但之后呢，外部的联合王国依旧虎视眈眈，皮奥瑞亚的态度依旧不明，而在分裂者被打败后，内部原本被统一的目标压制的分歧也即将重新浮出水面。"
CLD.15.a:0 "“唉，先睡觉吧。”"

CLD.16.t:0 "翻飞的木屑"
CLD.16.d:0 "这里是当年西莉迪亚王国用来关押重犯的地牢，阴暗潮湿，深处的刑具时不时传来叮当的碰撞声，在牢房内除了一坨稻草别无他物，原本的单人牢房如今却关押了四五个人，这些人身形各异，职业不同，年龄不同，性别不同，难一的共同点大概就是他们都被指控为“反革命”。\n\n厚重的铁门打开的声音吸引了许多囚犯的目光，他们或许还在期盼着自己能够沉冤昭雪被放出囚牢，但很快他们的目光便黯淡了下来，两名带着蓝色袖章的秘密警察架着一个人，一个新的“背叛者”，他显然遭到了毒打，但他依然用细微的声音说着。“我是..无辜...的。”\n\n但没有人回应，“背叛者”们沉默着，看守沉默着，秘密警察沉默着，最后只剩下一声重重的落地声，这个监牢便多了一名住客。\n\n他明白，这仅仅是一个开端，或许过段时间，死后世界的住客也要开始多起来了。"
CLD.16.a:0 "矫枉过正？"

CLD.17.t:0 "急刹车"
CLD.17.d:0 "维尔亚-切尔德翻阅着今天上交的报告，随着翻阅的进行他逐渐感到了一丝危险，在为了肃清内部的敌人而扩大了秘密警察团体后短时间内确实抓捕了大量的潜藏的敌人，但是数量似乎远远超过了他的预期，并且相当一部分抓捕原因只表明了“嫌疑”，根本没有给出具体的证据，甚至有一部分有具体“证据”的都表现出了明显的漏洞与栽赃。\n\n必须查清并制止可能发生的失控，切尔德按响了铃。\n\n“叫秘密警察部长过来，我有事找他。”"
CLD.17.a:0 "“对，现在。”"

CLD.18.t:0 "熟能生巧"
CLD.18.d:0 "“在这里这样改一下，或许能够省不少事儿。”\n\n一位工人和正围绕着一台机器絮絮叨叨的向另一个人说着他的想法，他很开心，他干这行几十年了，头一次有人愿意听听他的想法，甚至要帮他向上面反应，这要换到以前，只会有人跟他说:“你一个工人懂个屁，你再懂，有人家科学家懂？”\n\n“好，稍后我会帮你整理出一份意见书上交到工业委员会，如果您愿意的话还请在这个地方讲的详细一些......”\n\n最近工业委员会的人忙的不可开交，自从派人员去听取工人意见以推进和改善工业发展后，需要验证，实验和完善的想法堆积如山，毕竟不能拿到一个意见就直接投入工厂，某些意见也确确实实派上了用场，所以也没有谁有什么怨言，但累是真的累。好像只有等到工业设备再复杂一些时，工人师傅们才提不出想法。\n\n“今天又要加班了，不知道今天食堂晚饭有啥菜，希望没有萝卜......”起身去吃饭的研究员阿尔弗雷德碰上了隔壁吃完饭回来的同事问道:“今天吃啥啊？”\n\n“老样子，自选两荤两素，还有个萝卜排骨汤。”"
CLD.18.a:0 "集思广益，但仍需努力"

CLD.19.t:0 "肃清"
CLD.19.d:0 "自从内战告一段落后，相比于社会面，公社军队内一直维持着表面上的风平浪静，但实际暗流涌动，在打退了北方的进攻之后，军官们也开始争权夺利，风平浪静只不过是脆弱的平衡造成的假象。\n\n一位军官十分惬意的靠在椅子上把玩着之前战斗中士兵缴获上交的雪茄，按照规定所有缴获物都必须交公，但他并不在意，因为在这里他说得算，士兵们听他的，哪怕是在外面闹得沸沸扬扬的秘密警察也无法将手伸入军队。而现在，他只是在等待一个机会一个能让自己夺取这个地方的机会。在不久之前，他和刚刚交战过的北方达成了交易，只要他能够拿下这里，那么在这之后，除了某些必须的事，他就是这里的土皇帝了。\n\n外面突然传来的枪响打断了他美妙的畅想，战场上培养出的本能让他马上跳起来抽出手枪冲了出去，但迎接他的是一个黑洞洞的枪口。\n\n“你已被证实背叛革命，迎接你的将是人民的判决。”面前的老工人一脸严肃地代表政府下达了判决，工人纠察队员上前拷走了他，他本想再解释些什么，但看到躺在地上的自己的亲卫和周围冷眼旁观的士兵们，他瞬间明白了一切。"
CLD.19.a:0 "这一周，相似的事情在解放区的各地同时发生着。"

CLD.20.t:0 "公审"
CLD.20.d:0 "公审"
CLD.20.a:0 "公审"

CLD.21.t:0 "宣言"
CLD.21.d:0 "从一千年前奥罗日亚王国建立起，王国统治者的“天恩”便一直笼罩在西莉迪亚的上空，他盘剥着人民的血肉，吸食着人民的生命，压迫着人民的灵魂。一千年间人民的反抗从未停止，王国凭借着野蛮的力量将火苗一次次掐灭，但是星星之火可以燎原，一代代反抗者为后人铺下了道路，如今我们成功了，我们不会再允许任何大山压在我们身上。\n\n我代表新生的西莉迪亚公社宣布：西莉迪亚公社否认一切西莉迪亚王国和王室与任何政权签订的不平等条约，他们不能代表广大人民的意志，他们的笔只为自己的权力落下。\n\n西莉迪亚公社否认一切西莉迪亚共和国伪政权与任何政权签订的不平等条约，他们不能代表广大人民的意志，他们的笔只为自己的利益落下。\n\n西莉迪亚公社否认任何试图“代表”西莉迪亚的军阀与任何政权签订的不平等条约，他们不能代表广大人民的意志，他们的笔只为自己的野心落下。\n\n从此，西莉迪亚将以全新的姿态登上历史的舞台，西莉迪亚的历史将翻开崭新的一页。"
CLD.21.a:0 "而且将是光辉的一页。"

CLD.22.t:0 "新规定"
CLD.22.d:0 "为应对各类金融犯罪，金融投机行为，经集体银行委员会商讨决定，做出如下规定决议。\n\n1. 为打击民间高利贷行为等金融投机行为，集体银行将开放大额低息贷款申请。\n2.降低存款利率，开放增办无息存款业务。\n3.所有国营企业等在动用存款时必须接受银行审查，未通过审查允许动用存款资金。\n4.国营企业进行社会建设时缺少资金由银行审核后全部以低息贷款形式提供。但相关单位必须缴纳部分保证金且保证金不能从贷款中提供。\n5.单位转账不允许向个人储蓄账户转账，且转账支票不允许提现。\n6.第一，所购买的物资必须纳入国家计划，第二，交易对象必须是正当的企业或者集体，第三，开户单位必须实行独立经济核算，满足以上三个条件的单位必须向银行及主管部门审批才可开户，并且集体所有制单位承付结算必须得到银行批准才可进行，不允许私下进行结算。\n7.所有贷款必须向社会公开。"
CLD.22.a:0 "这个文件发下去，督促学习执行。"

