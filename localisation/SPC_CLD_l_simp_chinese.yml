CLD_military_committe_decisions:0 "西莉迪亚公社军事委员会"
CLD_military_committe_decisions_desc:0 "§7军队§!是§t公社§!立足的根基，§t红军§!是由§R工人纠察队§!，§Y原王国正规军§!以及§Q共和派部队§!中倾向工人的指战员组成的，成分复杂，混有大量§2投机主义者§!。在南北逐渐停火后，§t西莉迪亚共产党§!借助原本就在军队中活动的§t共产党员§!，不断建构基层组织。只是对军队内部的反动分子进行隔离审查是不够的，为确保对军队的§t集中统一领导§!，在§t红军总参谋长§!§S斯维尔·卡尔特§!同志的支持下，§t西莉迪亚共产党中央委员会§!决定成立§7公社军事委员会§!，由第一书记§R阿舍勒§!同志担任主席，总参谋长§S卡尔特§!同志担任副主席，第二书记§t莫里茨§!同志担任军事委员会联席主任。军事委员会目前是一个临时机构，主要负责对军队事务进行统一部署，统筹安排。\n\n准备度：[?CLD_mil_commitee_prep_var|Y1%%]"
