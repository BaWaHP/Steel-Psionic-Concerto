CLD_victorious_army_desc:0 "红军最终赢得了伟大的祖国解放战争，但是赢不代表没有问题，最近军队内部部分指战员，政工干部的汇报中可以发现，军内普遍存在着盲目乐观的风气，显然我们还要面对北方的军事压力，盲目乐观自然是不可取的。"
