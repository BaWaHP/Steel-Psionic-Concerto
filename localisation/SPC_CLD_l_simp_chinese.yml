CLD_central_people_committe_decisions:0 "西莉迪亚中央人民委员会"
CLD_central_people_committe_decisions_desc:0 "中央人民委员会是取代紧急状态委员会的常设机构组织，实际上是西莉迪亚社会主义政权的最高行政机关。\n\n中央人民委员会主席：§R阿尔勒·舍尔勒§!\n中央人民委员会秘书处书记：§R奥托·格罗蒂沃§!\n\n人民委员会影响力划分\n\n    §R西莉迪亚共产党    影响力：[GET_CLD_central_people_committe_1_and_2]%§!\n        旗帜派    影响力：[?CLD_central_people_committe_1_1|2]% 满意度：[?CLD_central_people_committe_1_2|2]\n        前进派    影响力：[?CLD_central_people_committe_2_1|2]% 满意度：[?CLD_central_people_committe_2_2|2]\n\n    §P西莉迪亚社会民主党    影响力：[?CLD_central_people_committe_3_1|2]% 满意度：[?CLD_central_people_committe_3_2|2]§!\n\n    §2西莉迪亚民主联盟         影响力：[?CLD_central_people_committe_4_1|2]% 满意度：[?CLD_central_people_committe_4_2|2]§!\n\n    §7阵线团结度：[?CLD_central_people_committe_5|2]§!"

