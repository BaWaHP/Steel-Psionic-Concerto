CLD_forming_emergency_committe_decisions_desc:0 "为应对敌特破坏和日益严峻的斗争形势，§R西莉迪亚革命阵线§!各方一致认为，需要实施一系列紧急应对政策已维持革命政权的存续，从而更好地统筹一系列应急措施的制订和贯彻落实。紧急状态委员会由革命阵线中的§t共产党人§!，§R社会党人§!以及§2民主人士§!组成，拥有公社临时政府的§t最高授权§!，允许不经立法机构表决以及行政机构公示程序限制，颁布行政法令制订相关条例，批捕以及授权审讯，宣布戒严等权力。"

