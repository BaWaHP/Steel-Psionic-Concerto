CLD_invest_southern_industry:0 "投资§2南方§!§R解放区§!工业"
CLD_invest_southern_industry_desc:0 "随着我们解放北方，全国政治格局趋于稳定，亟需将重心转向经济恢复与区域协调发展。南方解放区虽历经战乱，但拥有良好的工业基础、密集的人口与优越的地理条件，具备巨大的发展潜力。当前投入资源完善其工业体系，可有效激活闲置产能、进一步吸纳就业、稳定社会秩序，防止因经济停滞引发动荡。财经委将会拿出一部分资金通过各种渠道购置机床设备，对国有工业企业利用现有场地进行改建和升级。同时，将为后续基础设施建设、产业升级提供空间，推动形成南北联动、协同发展的经济格局。"
