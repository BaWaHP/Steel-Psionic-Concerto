CLD_economic_committe_decisions:0 "西莉迪亚公社经济建设委员会"
CLD_economic_committe_decisions_desc:0 "由于§R联合阵线§!令人震惊的崩溃速度，我们不得不紧急接管了南方的大量工业企业，重要工矿并立刻开始管控生产。但是突然的大量§t国有化§!以及与农村的自然联系被打破，导致为我们本就缺乏的行政能力§2雪上加霜§!。我们缺乏足够的技术官僚和人员进行企业统一管控，§R阿舍勒同志§!坚信§7工人理事会§!可以管理企业运转，客观上将一部分§R国有企业§!由§P工人代表§!负责管理确实减轻的行政压力，但是问题依然存在。§7经济建设委员会§!将统筹经济建工作，推进经济政策贯彻落实。"

