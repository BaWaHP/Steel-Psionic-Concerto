CLD.20.d:0 "公审"
CLD.20.a:0 "公审"

CLD.21.t:0 "宣言"
CLD.21.d:0 "从一千年前奥罗日亚王国建立起，王国统治者的“天恩”便一直笼罩在西莉迪亚的上空，他盘剥着人民的血肉，吸食着人民的生命，压迫着人民的灵魂。一千年间人民的反抗从未停止，王国凭借着野蛮的力量将火苗一次次掐灭，但是星星之火可以燎原，一代代反抗者为后人铺下了道路，如今我们成功了，我们不会再允许任何大山压在我们身上。\n\n我代表新生的西莉迪亚公社宣布：西莉迪亚公社否认一切西莉迪亚王国和王室与任何政权签订的不平等条约，他们不能代表广大人民的意志，他们的笔只为自己的权力落下。\n\n西莉迪亚公社否认一切西莉迪亚共和国伪政权与任何政权签订的不平等条约，他们不能代表广大人民的意志，他们的笔只为自己的利益落下。\n\n西莉迪亚公社否认任何试图“代表”西莉迪亚的军阀与任何政权签订的不平等条约，他们不能代表广大人民的意志，他们的笔只为自己的野心落下。\n\n从此，西莉迪亚将以全新的姿态登上历史的舞台，西莉迪亚的历史将翻开崭新的一页。"
CLD.21.a:0 "而且将是光辉的一页。"

CLD.22.t:0 "新规定"
CLD.22.d:0 "为应对各类金融犯罪，金融投机行为，经集体银行委员会商讨决定，做出如下规定决议。\n\n1. 为打击民间高利贷行为等金融投机行为，集体银行将开放大额低息贷款申请。\n2.降低存款利率，开放增办无息存款业务。\n3.所有国营企业等在动用存款时必须接受银行审查，未通过审查允许动用存款资金。\n4.国营企业进行社会建设时缺少资金由银行审核后全部以低息贷款形式提供。但相关单位必须缴纳部分保证金且保证金不能从贷款中提供。\n5.单位转账不允许向个人储蓄账户转账，且转账支票不允许提现。\n6.第一，所购买的物资必须纳入国家计划，第二，交易对象必须是正当的企业或者集体，第三，开户单位必须实行独立经济核算，满足以上三个条件的单位必须向银行及主管部门审批才可开户，并且集体所有制单位承付结算必须得到银行批准才可进行，不允许私下进行结算。\n7.所有贷款必须向社会公开。"
CLD.22.a:0 "这个文件发下去，督促学习执行。"

