###民族精神###
CLD_wound_of_betrayal:0 "背叛的伤痕"
CLD_wound_of_betrayal_desc:0 "我们遭到了背叛，我们不再信任那些资产阶级改良派。"
CLD_uncomplete_managing_system:0 "残缺的管理系统"
CLD_uncomplete_managing_system_desc:0 "我们的官僚体系目前千疮百孔，急需补充恢复。"

CLD_trade_treaty_with_peo:0 "与皮奥瑞亚的交易条约"
CLD_trade_treaty_with_peo_desc:0 "皮奥瑞亚给予了我们大量的生活必需品以交换我们的矿物。"
CLD_trade_treaty_with_peo_2:0 "西莉迪亚-皮奥瑞亚贸易总公司"

CLD_weak_army:0 "弱小的军队"
CLD_weak_army_desc:0 "我们依靠着工人纠察队掀起了革命，但我们缺少真正的军队。"
CLD_purging_army:0 "清洗军队"
CLD_purging_army_desc:0 "军队正在接受大规模调查。"
CLD_commue_in_conflicts:0 "公社的裂痕"
CLD_commue_in_conflicts_desc:0 "对于以后的方针，公社内部依然争论不断。"
CLD_scientific_boundary:0 "科研枷锁"
CLD_scientific_boundary_desc:0 "因为背叛，我们对知识分子依然有着戒心。"
CLD_emergency_committe:0 "紧急状态委员会"
CLD_emergency_committe_desc:0 "\n\n\n\n\n\n\n£GFX_texticons_CLD_1\n\n\n\n\n\n\n\n\n我们现在处于非常危险的状态，成立紧急委员会以更好地度过难关，同时紧急委员会的成员也必须通过严格的审查，以保证安全。"
CLD_ongoing_massive_investiagtion:0 "正在进行的大规模搜查"
CLD_ongoing_massive_investiagtion_desc:0 "我们必须把内部潜在的叛徒全部揪出来，不然将重蹈覆辙。紧急委员会将授权秘密警察组织对内部进行一次大规模的调查，任何可疑人士都将受到严格的审查。"
CLD_expanded_secret_police:0 "扩大秘密警察组织"
CLD_expanded_secret_police_desc:0 "叛徒们派来试图分裂我们的间谍比我们想的还要多，我们必须扩大我们的秘密警察组织来进行应对，甚至进行一定程度上的情报误导和反制。"
CLD_emergency_law:0 "紧急状态法"
CLD_emergency_law_desc:0 "在紧急状态之下我们将实行一系列特殊法令，例如余粮收集制，扩大生产指标，延长工时等，这一切都是为了保卫革命，在紧急状态结束后这些政策都将被取消。"
CLD_intel_bureau_of_people:0 "革命保卫局"
CLD_intel_bureau_of_people_desc:0 "为了应对越来越严峻的形式，我们决定整合秘密警察组织成立组建革命保卫局以更完整的组织架构和行动准则来为了革命进行地下活动，他们是红色的利剑与盾牌。"
