CLD_implement_industrial_commercial_stimulus_plan:0 "落实§R工商业§!刺激计划"
CLD_implement_industrial_commercial_stimulus_plan_desc:0 "为全面激活§2国民经济§!活力，推动§R工商业§!§7复苏§!与§2可持续发展§!，§R西莉迪亚中央财经委§!计划推出工商业刺激计划。通过鼓励现有§2民间资本§!与§R国有商业集团§!投资工商业发展，降低税收，一定程度§R扩大市场供给§!，保障人民群众基本生活需求，降低经营压力。"
CLD_promote_new_currency:0 "推广新货币"
CLD_railway_upgrade:0 "铁路提档升级"
CLD_establish_trading_company:0 "建立贸易公司"
CLD_establish_trading_company_desc:0 "在国家垄断外贸的情况下，我们将成立西莉迪亚-皮奥瑞亚贸易总公司，负责对两国贸易进行管理。§R当然，如此巨大的权力与利益，也不免……§!"
CLD_resource_for_food:0 "资源换粮食"
CLD_resource_for_food_desc:0 "西莉迪亚有着相当丰富的自然资源，尤其是有色金属，稀有矿物，但是山地又导致西莉迪亚缺乏高质量农田，农业产量相较于城市人口也有些捉襟见肘，经历多年的革命混乱，这个问题更加突出。皮奥瑞亚的农业相对发达，我们进口一定粮食缓解一下国内人地矛盾也算是权宜之计。"
CLD_import_industrial_machine_tools:0 "进口工业机床"
CLD_import_industrial_machine_tools_desc:0 "西莉迪亚尽管是一个相对发达的工业国家，但是工业机床技术缺乏，工业产业线也缺乏升级。既然我们与皮奥瑞亚共和国达成了经济合作协议，那么利用这个时机进口一些工业设备也并无不可。" 

