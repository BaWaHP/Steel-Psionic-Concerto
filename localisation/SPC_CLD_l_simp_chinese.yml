CLD.26.t:0 "改造完成"
CLD.26.d:0 "在工人们的掌声中，阿尔勒走上了演讲台。尽管他总是乐于感受到工人们的热情与信赖，但在此时，他竟觉得有些惭愧。毕竟他此番前来更多的是为了自己和他的家人——这是他第一次“以权谋私”。他的父亲是西莉迪亚赫赫有名的大资本家。在战前，舍尔勒家族的企业在西莉迪亚处处可见。现在，公社和平赎买了这些企业，这些企业的工人欣喜的接管了他们。他们甚至大胆地邀请了阿尔勒·舍尔勒前来参加企业改造完成的庆典。\n\n而阿尔勒·舍尔勒答应了他们：这是为了向公众表明自己早已与舍尔勒家族切割，更是为了保护他的家人免受政治斗争的困扰。\n\n“工友们，同志们，我想说，这是一个值得庆祝的日子！就在今天，这家工厂的社会主义改造彻底完成了！从今往后，这家工厂再也不属于什么舍尔勒家族，而是你们！每一个光荣的劳动者！”\n\n一时间，欢呼充满了整个工厂。一个工人笑着问舍尔勒：“那你打算怎么跟你家长辈交代呀？他们可是气坏了！你舅舅之前是这儿老总，现在成了工人，他到处说没你这个侄子呢！”人群中爆发出一阵嬉笑声，阿尔勒也笑着回答了他：“这个就不劳你我操心了，我爹早就说没我这个儿子了，现在他和他兄弟的产业被政府赎买了，他们日子不还是过的好好的？说到底，我既没打也没骂他们，只是把他们名下的工厂的管理层扩大为了全体工人而已嘛！从这个角度上讲，他们并没有失去什么，只是要和大家一起民主管理罢了！”\n\n阿尔勒再一次赢得了热烈的掌声，可就在这时，一个身材矮小的中年男人推开了工厂的大门，他阴沉着脸，从人潮的末端挤到了演讲台前，在登上演讲台的楼梯上还摔了一跤，千辛万苦登上演讲台的他用戴着华美戒指的手指着阿尔勒大骂道：“你小子疯够没有！先是杀人放火，还要欺压长辈！下一步你是不是还要吊死你爹妈啊！”\n\n人群一下子安静了下来，原本还充斥着欢笑声的工厂一下子只剩下了男人的叫骂声。他是这家工厂原本的总裁，也是阿尔勒的舅舅斯泰勒。因此没人敢把这个扫兴的家伙扔出去，警卫们想有所动作却被舍尔勒制止了。\n\n“你不认真读书也就算了，还要跟这些下贱无礼的流氓贱民们混在一起抢长辈的家业！你小子听着，赶紧让你的手下把合同给我！我不稀罕你给的那点破钱！”\n\n“有情况你得跟负责赎买企业的人沟通啊，我又不是皇帝……”阿尔勒依然温和的笑着，但很快，他的笑容便凝固了——他看见，舅舅的戒指上正散发着紫色的魔法光芒，周围的空气也因此变得扭曲。他知道，那是一股强大的能量正在汇集。阿尔勒在那一瞬间确实感受到了恐惧，但并不是对于自己生命的珍惜，而是对于革命事业可能功亏一篑的不甘。\n\n人们还没来得及做出反应，转瞬之间演讲台上发出了一声巨响并散发出了浓烟，代烟雾散去人们发现廷帕尔诺夫已经将斯泰勒死死按在地上，戒指发射的魔法飞弹才没有直向阿尔勒飞去，而是打在了地板上。看着地板上的深坑，所有人都惊呆了，随后发出了愤怒的叫喊，要杀了这个刺客。\n\n“妈的，有种你就杀了我，杀了你舅舅！”被制服的斯泰勒依然破口大骂，但当阿尔勒将手枪对准他的脸时，他立刻安静了下来，茫然而不可置信的对上了舍尔勒冰冷的目光。接着，阿尔勒扣动了扳机。\n\n“啊啊啊啊啊！”斯泰勒的惨叫回荡在整个工厂，但很快他又安静了下来：没有枪响，他没中枪。\n\n“吓到了吧，叫你刚刚吓我一跳。”在工人的笑声中，舍尔勒将没打开保险的手枪收回了口袋，示意廷帕尔诺夫把他带下去，然后继续仪式。"
CLD.26.a:0 "仪式取得了圆满成功！"

CLD.27.t:0 "七嘴八舌"
CLD.27.d:0 "演习刚结束，硝烟尚未散尽，卡斯亚勒和他的战友们并没有像往常一样立刻去清理装备，而是围在了班长身边，对着拿石头和树枝的地面七嘴八舌地讨论起来。\n\n“班长，刚才我们冲锋时，队形是不是太密集了？”列兵米哈伊尔说到。\n\n卡斯亚勒也补充道：“是的，而且我觉得刚才火力掩护的时机可以再提前一点，压制效果会更好。”\n\n班长耐心地听着，不时点头，甚至拿起树枝在沙盘上推演着士兵们的建议。“好小子们，有想法！这在以前可是想都不敢想的。”他拍了拍卡斯亚勒的肩膀，“自从推行‘民主讨论’以来，大家的脑子都活络起来了！我看这样很好，多动脑子！这不仅仅是命令，更是我们共同的事业！”\n\n战士们的眼中闪烁着光芒，他们感到自己的声音被听见，自己的智慧被重视。一种前所未有的参与感和责任感油然而生，他们相信，这种上下同欲的氛围，必将为即将到来的解放争取更大的胜算。"
CLD.27.a:0 "战术的改进不都是从办公室出来的。"

CLD.28.t:0 "土包子进军校"
CLD.28.d:0 "讲台上，教员的声音像温吞水一样流着，那些“纵深突破”“机动部署”的词儿，像小虫子一样钻进他耳朵，又钻出来，没留下多少痕迹。他的手指无意识地在粗糙的木桌面上划拉着，指尖传来的触感让他想起驳壳枪冰冷的握把，想起码头上粗粝的麻袋绳，想起战壕壁上湿冷的泥土。\n\n打仗？图特斯心里嗤了一声。打仗这种事，是书本上那些弯弯绕绕的线条和红蓝箭头能教得会的？是他娘的在枪林弹雨里钻出来的！是在死人堆旁边啃冷馍馍、听着伤兵嚎叫熬出来的！是在一次次被打散、又一次次聚拢的绝望里磨出来的！他见过太多纸上谈兵的家伙，端着架子，嘴里蹦着新词儿，真上了阵，腿肚子转筋得比新兵还快。现在倒好，把他这号从码头纠察队滚出来、一路血里火里拼到连长位置的老兵油子，塞进这干干净净、规规矩矩的学堂里？这不是扯淡吗？\n\n他抬头望了望窗外。高墙挡住了视线，只露出一小片灰蒙蒙的天空。墙外，真正的战场在哪里呢？他的七连现在怎么样了？副连长，能不能带好那些跟他从战场上下来的老工人战士？\n\n讲台上，教员还在讲：“…因此，我们必须克服经验主义的狭隘性，系统地学习先进军事理论，才能更好地…”\n\n他叹了口气，声音轻得只有自己听得见。算了，来都来了。他强迫自己的目光回到讲台，看着教员在黑板上写下的那些工整的板书。唉，这军校的日子，怕是比蹲战壕还难熬。"
CLD.28.a:0 "现代化的战争需要现代化的指挥模式。"

CLD.29.t:0 "新教员"
CLD.29.d:0 "军校的午后，空气里浮着粉笔灰和年轻人闷出的汗味。一号教室靠后的角落里，阿成的手指无意识地在粗糙的木桌面上画着进攻路线的草图，心思早飞到了老部队。讲台上，那位从北边来的教官正讲到“战役后勤保障”。图斯特心里又嗤了一声：打仗就是冲上去，咬住，撕开！粮草弹药？那是后面辎重队的事。\n\n迪亚斯个子不高，穿着洗得发白的红军军装。他脸上没什么表情，声音不高，但每个字都像凿子刻木头，清晰得很。\n\n“同志们，”迪亚斯的目光扫过台下，在图斯特和其他几个再培训军官脸上停留了一瞬，“我知道，在座的不少是经历过血火的老兵。你们从战壕里爬出来，靠的是胆气、机灵，还有…命硬。”他顿了顿，台下几个老兵油子嘴角不自觉地撇了撇，这话算说到心坎里了。\n\n“但是，”迪亚斯话锋一转，声音依旧平稳，“如果红军只想守着几个阵地，那你们现在学的，确实是没问题的。”这话像块石头砸进水里，教室里嗡嗡地起了一阵骚动。\n\n图斯特也停下了手指的划动，撩起眼皮看向讲台。\n\n“可我们要的，”迪亚斯的声音拔高了一丝，眼神变得锐利，“不只是守住！我们要把红旗插遍东巴斯蒂亚！要打出去！要打大仗！硬仗！要啃下敌人的重兵集团，要拔掉那些钢筋水泥的乌龟壳！最好还要拆掉那些和移动城堡一样的铁巨人！”他握拳，指关节因为用力而发白，“那时候，光靠胆子大，命够硬，行不行？”\n\n他环视一周，目光最后落回阿成他们那片角落。\n\n“一百个敢死队冲上去，被机枪割麦子一样扫倒九十九个，最后一个人抱着炸药包冲上去炸了碉堡，这叫英雄！可这叫会打仗吗？”迪亚斯微微摇头，带着一种沉重的惋惜，“这叫用血去填！我们有多少血可以这样填？革命军有多少条命能这样耗？”\n\n教室里鸦雀无声。阿成皱紧了眉头，他想反驳，可脑子里却不由自主地闪过那些倒在冲锋路上的年轻面孔。\n\n迪亚斯拿起一支粉笔，在黑板上“唰唰”画了一个极其简陋的战场态势图：这边一堆小圈代表己方，那边一堆方块代表敌方坚固据点。\n\n“只凭经验打仗的人，”他用粉笔点了点代表己方的小圈，“就像这个。他们知道敌人在这里（点点方块），知道要冲过去（画了个箭头）。他们凭感觉知道什么时候该冲，什么时候该躲炮。这很宝贵！非常宝贵！”他肯定地点点头，图斯特和其他几个老兵的脸色稍微好看了一点。“但是，”迪亚斯在那代表敌方的方块后面，又画了更大的一片阴影区域，“他们很可能不知道，敌人在这里还藏着预备队，不知道敌人后方的补给线有多脆弱，不知道侧翼的友军什么时候能配合到位，更不知道打下这里之后，下一步该往哪里捅刀子最致命！”\n\n他放下粉笔，拍了拍手上的灰。\n\n“经验告诉你冲，但理论告诉你“从哪里冲”，“用什么方式冲伤亡最小”，“冲下来之后怎么守得住”，“守住了怎么扩大战果”！经验是你在战场上活下来的本事，理论是让你带着更多同志活下来、并且打赢的本事！”迪亚斯的声音不高，却像锤子一样敲在每个人心上，“只靠经验，是匹夫之勇，是赌命！赌赢了，是英雄；赌输了，就是白白牺牲！红军的血，每一滴都金贵！打仗不是靠赌命的！”\n\n他走到讲台边，双手撑着台面，身体微微前倾，目光灼灼地看着台下那些穿着旧军装的人：\n\n“同志们，我们要赢，要赢得起，就不能只靠一腔血勇去填！我们需要能看懂地图后面藏着什么的人，需要能算清弹药基数能支撑打多久的人，需要能组织起有效火力压制的人，需要能在混乱中看清全局、知道下一步该往哪里砸拳头的人！这就是你们坐在这里的原因！不是让你们忘掉你们的经验——你们的经验是无价之宝！而是要让你们的经验，插上理论的翅膀，飞得更高，打得更远，打得更狠！”\n\n话音落下，教室里死一般的寂静。"
CLD.29.a:0 "“迪亚斯同志，你接着讲吧。”"

CLD.30.t:0 "军校参谋培训"
CLD.30.d:0 "公社军事委员会常务会议[摘要]\n编号 军委[1998]31号\n注：抄送红军各师及军事院校\n\n依据红军总参谋部的要求，各级军事机关要培训参与军事谋划、承办具体军事业务工作的参谋人员，参谋由军官充任。主要职责是：收集研究情况，提出报告、建议，拟制军用文书，传达命令、指示，监督、检查执行情况，保障首长对部队实施正确的领导、指挥。从作战指挥上来说，参谋长是部队军事主官和政治主官以外部队的第三领导，师级以上作战命令的签署，需要三人一同签字确认，紧急情况下，政委和参谋长都要发挥军事作用，对军事首长的决策进行辅助和提议，；一般参谋对部队的后勤保障，战术规划，情报侦察都有相当重要的作用。因此舍尔勒同志及军事委员会一致认为需要扩大红军大学的参谋培训课程，参谋来源，一部分来自于目前的军事主官，另一部分来自于新招募的军校学生。\n\n由于时间紧，任务重，各部队应尽快选拔一定比例的基层指战员，参加第一期的集中培训，要求人员保质保量。具体比例参照后续命令和军校指标。"
CLD.30.a:0 "批示：要严格执行，各部队指战员及军校教员务必高度重视。"

CLD.31.t:0 "屹立在绿海上的合作社"
CLD.31.d:0 "海港的微风吹拂着渔船的风帆,远处的海雁在黎明的阳光下展翅高飞。\n\n“埃斯克温同志,您怎么这么早就来了?”\n\n“我想看看我们所跨出的第一步。”\n\n渔业人民委员温弗莱德·埃斯克温把目光从远处峡湾中的港口上移开,转头看向气喘吁吁的合作社主席伍尔夫斯。\n\n“你们合作社是我提议建立的,现在看四十多条船,几百号社员,怎么说也是个大进步了。”\n\n“我们渔民几百年来都是靠水吃水,独来独往,打鱼也是为了自己吃,能拉来这么多人已经是海神保佑了。”\n\n“要现代化,要工业化,我们渔业就不能一盘散沙;你们打上来的鱼可以卖给国企,卖给国家,卖到城市,国家也可以出口换汇。”\n\n“而且我们联合在一起也更有信心了,”伍尔夫斯笑了笑。\n\n“至少不会有商人带着什么国王专员来压我们的价。”\n\n埃斯克温也笑了,西莉迪亚的鱼子酱是南巴以及提兰特的畅销货,但是渔民一直是被压价的对象,甚至经常被以低价强买强卖。现在最重要的问题是禁运导致这些优质鱼子酱。\n\n“我想,我们渔民会迎来一个新的黎明。”埃斯克温看向了峡湾方向,海风依旧吹拂着风帆,初阳默默不语，只是冲破黑夜。"
CLD.31.a:0 "寂静黎明，而后是灿烂千阳。"

CLD.32.t:0 "钢铁与梦想"
CLD.32.d:0 "“你看看这条船怎么样？” 船厂经理激动地对伍尔夫斯说道。“新装的柴油马达，配了新设计的桅杆……”\n\n一旁的设计主任卡纳里斯插话说:“现在其实还是有点问题的……”\n\n经理一脸不悦地望着卡纳里斯，但设计主任接着说:“目前我们的冶铁技术不过关，船底可不一定能挡住那些玩意的撞击，还有公社的无线电奇缺，你们得用信号灯或者旗语了……”\n\n经理没办法，点了点头，“嗯，这船确实缺点很多，但是我们已经是尽力了……”\n\n伍尔夫斯倒是没觉得有什么，“至少比我们的木船好”，他带着安慰的语气对面露难色的二人说。“既然我们合作社决定要订购一条现代化渔船，也通过了你们提出的合作方案，我们肯定会执行的，这个你们放心。”带着那种老渔民的率真，他拍了拍二人的肩膀，“我有个小请求，给我们留两个安放捕兽枪的位置，拜托你们了。”\n\n“加点价，我们船厂可以帮你们找供应商。”经理笑着说。\n\n“我们合作社还是比较困难的，我们可以把我们已经有的给你们。”\n\n伍尔夫斯转身看向那条在建渔船，心理倒是不停嘀咕……"
CLD.32.a:0 "“有这家伙，总会少死点人的。”"

CLD.33.t:0 "黄昏惊魂"
CLD.33.d:0 "“看来，是时候回去了。”伍尔夫斯扶着锈迹斑斑的船舷，长长吁了口气。咸涩的海风撩起他花白的鬓角，拂过他被海风和日光雕刻得黝黑的脸颊。他眺望着被夕阳彻底染成暖橙色的天空，碎金般的光芒在海面上跳跃闪烁，远处港口的灯塔已开始明灭，投来微弱而安心的白光。今天出奇地平静，无风无浪，也无事发生……\n\n伍尔夫斯这个念头还没转完，右舷不远处，猛地传来木材碎裂的刺耳声响。萨克齐那艘继承自他父亲、名为“艾斯号”的木船，像是被一只无形巨手猛地捞起又狠狠掼下，船身剧烈地摇晃，连晾在桅杆上的渔网都哗啦啦地滑落，坠入海中。那年轻人——接手渔船才不到半年——踉跄着从甲板上爬起，膝盖重重磕在绞盘上，却也顾不上疼痛，跌跌撞撞地扑到船舷边，大半个身子探出护栏，惊惶地朝水下望去。\n\n凭着大半辈子与大海搏斗的经验，伍尔夫斯几乎是本能地将烟斗从齿间拿下。他布满厚茧的手指习惯性地摩挲着舵轮旁那被海盐侵蚀得斑驳的铜制罗盘，双眼眯成一条缝，紧盯着那片看似平静、却隐隐泛着异常油光的海面。这绝非寻常的暗流或礁石。他知道，那些“小家伙”通常在遥远的深海区活动，可每年开春，总有些没长成的海魔兽会随着北上的暖流误入这片内湾。此刻，那平静的海面之下，分明有个巨大的暗影，正绕着自己的船打转。\n\n“艾博斯！带人去炮位！”伍尔夫斯沙哑的吼声划破黄昏的宁静，惊得几只停在桅杆上的信天翁振翅飞远。他的大副，艾博斯，反应极快，一脚踢开挡路的缆绳筐，带着几个水手，动作利落地冲向船舷右侧那个稍稍凸起的铸铁平台。平台上架设的捕鲸炮依旧保持着随时待命的姿态，炮身上甚至还残留着前年猎杀一头剑脊鲸时留下的狰狞划痕，冰冷的炮管在暮色里闪着幽暗的光。\n\n就在艾博斯手忙脚乱地将又一支钢制捕兽叉填入滑轨时，邻船再次传来沉闷的撞击。伍尔夫斯眼角的余光瞥见，“艾斯号”靠近吃水线的位置裂开了一道口子。\n\n“左满舵！”伍尔夫斯猛地转动黄铜舵轮。崭新的柴油引擎发出一连串爆鸣，喷出股股黑烟，推动着渔船笨拙地转向。他瞥见经验老到的福尔勒船长那艘更老旧的渔船已经升起了红色的三角救援旗，前往救援萨克齐。而也就在这时，艾博斯狠狠扣下了扳机。\n\n长长的捕兽叉拖着沉重的铁链，“噗嗤”一声扎进水里。钢齿没入的瞬间，海面如同被投入巨石，猛地炸开一团墨绿色的粘稠液体。紧接着，又一支钢叉呼啸而出，精准地命中了那个正试图加速下潜的巨大阴影。一阵令人牙酸的、仿佛金属刮擦骨头的声响过后，浑浊的海水剧烈翻腾，涌起更多带着浓烈腥臭的泡沫。艾博斯和水手们踩着被海水浸透、湿滑无比的甲板，合力转动绞盘，吃力地回收着链条。夕阳洒下最后一片金色的余晖，恰好照亮了那缓缓浮出水面的海魔兽尸体——它那布满粗糙骨刺的灰黑色甲壳还保持着最后撞击的姿态，尾椎深处插着的钢叉，随着波浪的起伏，正无声地轻轻摇晃。\n\n伍尔夫斯重新将冰凉的烟斗塞回嘴里，默默看着邻船的信号灯有节奏地闪烁。传递过来的消息让所有悬着的心都落回了肚子里：萨克齐的船虽然灌了不少水，但万幸，龙骨没断，还能撑回港口。\n\n三艘渔船拖着沉甸甸的“战利品”，开始缓缓返航。伍尔夫斯再次望向远处港口连绵的灯火，眯起了眼睛。咸腥的海风里，他似乎已经闻到了岸上家家户户升起的、带着食物香气的炊烟味道。今晚，又能睡个安稳觉了吧……也许，像自己这样的铁船多点，就好了，萨克齐的铁皮木船还是不顶用的，而且旗语和信号灯还是太麻烦了……"
CLD.33.a:0 "“海魔兽是不是也可以吃啊?”"

CLD.34.t:0 "挫败破坏"
CLD.34.d:0 "在红军和民兵部队的配合下，来自北方的渗透小队在边境被发现并且经情报单位审讯，他们已经供述了相关组织成员在我国境内的位置以及行动计划。我情报单位顺藤摸瓜，联合地方民兵，迅速揪出了潜在的破坏分子，并缴获了北方反动分子运送的武器装备和破坏设备。目前，相关侦查工作仍在继续。"
CLD.34.a:0 "批示：总结经验，继续严加防范。"

CLD.35.t:0 "边境遇袭报告"
CLD.35.d:0 "根据红军总参谋部报告，今日凌晨4点，北方反动分子向我方边境驻扎点进行炮击，并有两个排的敌人对我方前线阵地进行进攻。我前线哨站被毁，驻站红军一个班全员牺牲，后续经我方反击，已成功夺回该阵地，目前已加派巡逻队和地方民兵，对当地进行常态化巡防工作。"
CLD.35.a:0 "批示：吸取经验教训，提供警惕意识。"

CLD.36.t:0 "敌特恐怖袭击"
CLD.36.d:0 "根据红军公安部队和地方民兵报告，今天在首都街道发生了一起剧烈爆炸，爆炸发生在首都中心区，当时正值人流较为密集的时刻，因此造成大量群众伤亡。随后赶到现场进行急救和清理的民兵，医疗人员又遭到了二次爆炸的袭击，再次造成大量上网。\n\n调查小组第一时间赶往现场，并在废墟各处的爆炸中心均发现了一些被高度碳化的破碎遗骸，其装备残片证实了他们是来自北方反动派的部队。\n\n经分析后得出结论：至少一名魔法师对其队员使用了能将生命力瞬间转化为巨大能量的禁忌法术，将活人变成了能引爆数万吨弹药的活体炸弹，随后在军火库多处接连引爆。这种充斥着狂热信仰的袭击方式闻所未闻，反映了我们对敌人极端主义思想的严重低估。"
CLD.36.a:0 "批示：立刻开展救治，加强首都警备工作。"

CLD.37.t:0 "敌特传单"
CLD.37.d:0 "近日，城市巡逻队和通勤的工人们在宿舍区墙壁、工厂公告栏甚至公交候车亭上，发现了大量新张贴的、印刷粗糙但内容恶毒的传单！传单标题赫然写着《你知道革命党大官过着什么日子么》《“革命”之下被抽干最后一滴血的农村》《革命党的战线一天比一天向后，只有赞歌声一天比一天大！》之类，内容充斥着对我们社会制度、前线战况的歪曲污蔑，宣扬失败主义情绪，并煽动工人“消极怠工”和“拒绝配合”。\n\n初步调查显示，这是一次有组织的夜间张贴行动。作案者手法熟练，避开了主要巡逻路线。传单措辞带有明显的反动分子宣传口吻和特定意识形态印记。尽管清洁队已迅速清除大部分传单，但其煽动性内容已在部分早起人群中流传，造成了一定程度的困惑和不安议论。我方情报单位已介入，正全力追查张贴者及其背后的主使。"
CLD.37.a:0 "下作手段！"

CLD.38.t:0 "军工厂遇袭"
CLD.38.d:0 "报告指出，我方位于南部的兵工厂于昨日深夜遭到敌方特工破坏。根据现场勘查，敌人并未采用常规潜入手段。防御工事完好，无任何物理突破迹象。 破坏者似乎是一支由精锐法师牵头的小队，他们利用空间传送或幻术类魔法直接渗透至工厂核心区域。其目标明确，专门针对我们的火炮生产线，使用高能元素魔法将其彻底熔毁。这种非对称的作战方式暴露了我们在防护精英魔法单位渗透方面的短板。希望委员会高度重视此类事件，加强防敌反特工作。"
CLD.38.a:0 "该死！"

CLD.39.t:0 "军火库爆炸"
CLD.39.d:0 "红军总参谋部汇报，我方一军火库在昨天遭到了北方反动派的渗透攻击。初步报告显示，攻击者渗透了外围防线，并成功引爆了位于仓库的数个关键弹药储存点。\n\n震耳欲聋的爆炸声此起彼伏，宝贵的弹药、炮弹与工程物资被爆炸与火焰吞噬，随后，灾难性的殉爆链式反应彻底摧毁了一切，橘红色的火球照亮了整个区域，浓烟直冲云霄。巨大的冲击波甚至震碎了数公里外的窗户。"
CLD.39.a:0 "批示：提高警惕，加强重点地区巡逻。"

CLD.40.t:0 "尴尬"
CLD.40.d:0 "如果说人最为无语的情绪叫做尴尬，那卡勒斯现在就十分无语。\n\n本来，革命卫队侦察单位通报已经定位到了代号“乌鸦”的特务，但是等真到追捕的时候，却是各种拖后腿。按照计划，卡勒斯与地方警察商量下午集结夜间抓捕，结果是地方警察调度极度缓慢，好不容易集结完警力，一直由革命卫队，地方警察，刑事侦查警察，以及工人民兵组成的混合部队才开始对疑似活动地区进行排查。显然，最终是在一片混乱之中打草惊蛇，工人民兵还被特务击伤，闻讯赶来的民警立刻进行追击。接下来就是卡利斯亲自带着浩浩荡荡的四十多人一路追到周边的村镇，正当卡勒斯准备请求上级支援时，迎头遇上了十几个持枪的黑衣人。\n\n黑夜中根本不知道对方是谁，卡勒斯怀疑是特务的同伙，让跟着自己的二十多人趴下。意外的是对面也趴下隐蔽，双方在月光下警惕地观察着对方躲避的方向，空气顿时陷入死一般的寂静。隔了一段时间卡勒斯才寻摸过来不对劲，如果对面是特务早应该开火了。\n\n于是经历了一番惨痛的试探和交流以后，卡勒斯总算确定对面不是特务。于是他打开手电筒，一束强光照在了对面似乎是民兵队长的脸上，两头头面面相觑，不知道说什么。"
CLD.40.a:0 "乌鸦飞走了，但是报告是要交的。"

CLD.41.t:0 "夜谈"
CLD.41.d:0 "“事情差不多就是这样。”费希特把报告念完抬起头，舍尔勒、莫里茨与切尔德三人一脸麻木。\n\n“所以,这种状况持续下去……”舍尔勒把报告在桌上。\n\n“如果我们可以把安全机构整合了是最好的，但是这恐怕不是短时间可以完成的。”切尔德一直试图把公共安全机关与情报机关整合起来，现在公社这种分治属实过于理想且低效。\n\n“而且集中化的机构也过于官僚化了，我们也不能让官僚骑在群众头上。”显然,统一的机构也不符合革命阵线的指导思想，舍尔勒也不同意这种集中化的权力分配模式。\n\n“第一书记，“莫里茨放下材料,缓缓开口，”革命需要专政，敌对分子不可能主动投降。”\n\n舍尔勒望了望莫里茨，至少这一点两人还是有共识的。\n\n“不过公社民兵，工人民兵，承担自卫工作并无不妥，而且现在动地方公社和各个厂可能会使得群众对我们的政策保持怀疑，也不利于我们开展工作。而内务部警察，革命卫队以及他们的情报机构必须要调整。”莫里茨看了眼舍尔勒。\n\n“我们情报口还是希望能把情报单位统合起来，情报部门的工作必须要集中统一领导。”维尔德提醒舍尔勒。\n\n“实际上,我的建议是把民兵联防队纳入革命卫队系统，然后成立一个联系机构，至少在形式上实现整合协调。”莫里茨把话题又踢回给舍尔勒。\n\n“我想这样,我们可以成立公共安全委员会,以及独立的政治保卫部门。”舍尔勒觉得差不多可以拍板了。"
CLD.41.a:0 "“明天我再和民主党派人士商量一下。”"

CLD.50.t:0 "北方局"
CLD.50.d:0 "党的中央委员会并转紧急状态委员会：\n\n鉴于目前北方局势不稳，我们也面对着来自内外反动派的压力，为加强对北方新解放区的统一管理，我们情报部门建议在新解放区成立单独工作的党的机构，管理北方党政军工作。\n\n党的北方局隶属于中央委员会，统一负责北方各地党委、党工委的重组或组建；领导军队工作，加快稳定北方局势，镇压北方的反革命叛乱；贯彻党的统战政策，团结北方民主力量。\n\n我们认为不可拖延，低效的接收将会严重影响我们的后续重建和建设活动。北方局领导可暂时由红军领导同志担任，后续另行任命。"
CLD.50.a:0 "落款:维尔亚·切尔德"

CLD.51.t:0 "蒙斯市军管会一号令"
CLD.51.d:0 "蒙斯市军事管制委员会第一号命令\n\n为恢复蒙斯市社会秩序，保障全体市民生命财产安全，本会奉命于即日起对蒙斯市实行军事管制。兹颁布命令如下：\n\n一、军事管制实施范围\n蒙斯市全市辖区，包括东港区、西林区、南山行政区、北郊新区及附属各镇、港口、要塞。\n\n二、军事管制期间临时权限\n1. 蒙斯市军管会为全市最高行政机关，统一行使行政管理与治安维护职权。\n2. 全市陆路、水路交通枢纽及港口、仓库、通信设施、发电厂、自来水厂等关键设施，均由军管会派员监管或驻守。\n3. 原市政、警务、消防、卫生等机构人员，应服从军管会调配，继续履行岗位职责。\n\n三、市民行为规范\n1. 自即日起每日20时至次日6时实施宵禁，无特许通行证件者不得在公共场所逗留。\n2. 所有民用船舶、车辆未经许可不得驶离蒙斯市辖区。\n3. 严禁携带、藏匿、交易枪支弹药及爆炸物品，违者依法严惩。\n4. 商铺、集市、剧院等公共场所照常营业，但须接受军管会必要检查。\n\n四、特殊事项\n\n1. 凡流散于民间的军用物资、医疗药品、通信器材，须于三日内向各街区临时登记处报备。\n2. 市立医院、各地救护站及所有注册医师，须全力开展疫病防治与伤员救治工作。\n3. 中小学及技术学校应于七日内完成校舍安全检查，逐步恢复教学。\n\n五、生效时间\n本命令自[?global.date.GetDateString]零时起施行。"
CLD.51.a:0 "此令"
CLD.51.b:0 "蒙斯市军事管制委员会"
CLD.51.c:0 "主任 威廉·纽亚特"

CLD.52.t:0 "方案"
CLD.52.d:0 "诺尔福：“最新情报，目标已分散逃窜。三人进入南方林区，两人混入难民车队，最后两人疑似藏匿在旧工业区废弃管道网内。活捉难度…很大。”\n\n莫里茨俯身仔细查看照片，手指在其中一张上轻轻敲击：“山地追捕最容易发生遭遇战。我建议授权一线部队和民兵，在目标持械反抗或即将脱控时…可以直接开火。”\n\n切尔德微微颔首,“从行动效率和安全角度，我赞同。若强求活捉，我们可能要付出不必要的伤亡。这些人都是顽固分子，不会轻易就范。”\n\n舍尔勒凝视着照片上崎岖的山路，沉默片刻，“我理解行动的风险。但‘直接击毙’的口子一开，就可能模糊了我们与旧政权滥用暴力的界限。”他转向莫里茨。莫里茨直起身，语气缓和但坚定：“舍尔勒同志，现在的情况是这些人比一般顽固分子更危险，追捕环境更复杂。我们难道要用战士的血，去赌这些人会主动投降？”\n\n诺尔福小心地补充：“根据行为分析，其中三人有强烈的自杀倾向…可能宁死不愿受审。”\n\n舍尔勒走到窗前，望着广场上正在拆除旧界碑的工人：“我们要的不仅是消灭肉体，更是要确立新秩序的正当性。但…”他转过身，“你们说得对，不能让战士们在犹豫中流血。”\n\n他走回桌边，手指点在照片上：“这样：授权前线指挥员在目标持械抵抗、或处于即将永久脱离控制的临界点时，可以使用致命武力。但必须满足两个前提——现场已无其他制服可能，且指挥员需判断活捉将导致我方或平民重大伤亡。”\n\n切尔德立刻接话：“可以。我会在命令中明确‘最后手段’原则，并要求每次使用后提交详细战场报告。”\n\n莫里茨思考着点头：“这个折中方案…能接受。既给了现场应变空间，又设置了防火墙。”他看向舍尔勒，“不过审判环节必须加快，我们需要尽快给人民一个交代。”\n\n舍尔勒：“同意。诺尔福主任，请将证据材料准备成简易版本，在抓获或击毙后二十四小时内向民众公布。无论死活，都要让所有人看清他们的罪行。”\n\n切尔德已经站起身：“我立刻去起草正式命令。会注明——优先目标是逮捕，但保卫生命优先于保全囚犯。”\n\n舍尔勒轻声说：“有时候，我真希望我们能活在纯粹的理论世界里。”"
CLD.52.a:0 "“但我们面对着北方刚解放的土地…这里每寸土壤都掺着鲜血和理想。”"

CLD.53.t:0 "虎落平阳（1）"
CLD.53.d:0 "西莉迪亚北方的天空，被大风搅得一片昏黄。沙尘和着干燥的雪沫，在空中肆意飞舞，打在脸上，带着砂纸般的粗糙感。瓦尔内，红军第3搜捕队队长，眯起眼睛，透过这漫天飞舞的尘土，望向远方那座孤零零的、被遗弃的牧羊人小屋。\n\n“队长，魔力热源探测显示，目标就在里面。”副手雷克凑过来，扯着嗓子喊道。狂风拍打着他厚重的作战服，发出噼啪的声响。“只有一个人！”\n\n瓦尔内点了点头。卡斯帕尼亚，前北方特务头子，他们追了整整三天。情报说他逃到了这里，看来，这风沙就是他最后的掩护。\n\n“包抄队形！”瓦尔内下达了命令，声音被风吹得有些变形。\n\n队员们像猎豹一样散开，利用稀疏的灌木和岩石作为掩护，悄无声息地向小屋逼近。很快，他们封锁了小屋的所有出口。\n\n“卡斯帕尼亚！”瓦尔内对着小屋喊话，声音在狂风中显得有些飘忽，“你被包围了！立刻出来投降！红军承诺给予你公正的审判！”\n\n小屋里静悄悄的，没有任何回应，只有风声呼啸。\n\n“再问一遍！”我提高了音量。\n\n……依旧沉默。\n\n“队长，”雷克在通讯频道里急促地报告，“热源信号……好像在减弱！”\n\n“强攻！”瓦尔内当机立断。\n\n爆破手在门上安放了炸药。“轰！”一声闷响，木门应声而倒。小队冲了进去。\n\n屋内弥漫着一股霉味和劣质烟草的混合气味。光线昏暗，只有风从破窗灌入时，才会卷起地上的灰尘。一个人倒在地上，胸口有一个焦黑的脉冲枪贯穿伤。他已经死了。瓦尔内蹲下身，检查了一下尸体。致命伤是军用级别的精准射击。\n\n外面的风更大了，瓦尔内喊来通讯员，让他上报发现一具尸体，无法确认身份。\n\n就在这时，一个声音传来……"
CLD.53.a:0 "“队长”，雷克喊道，“西北树林发现可疑热源。”"

CLD.54.t:0 "虎落平阳（2）"
CLD.54.d:0 "瓦尔内未考虑许多，带着小队继续追击。终于，在一个背风的沙丘后，他们看到了他——卡斯帕尼亚，那个曾经在北方呼风唤雨的巨头，此刻蜷缩在一个简易的沙坑里，像一条丧家之犬。他的一条腿似乎受了伤，鲜血染红了沙土。他手里紧紧握着一把老式脉冲的手枪，枪口对着瓦尔内。\n\n“别再过来了，赤匪！”他的声音嘶哑，充满了恐惧和绝望。“再过来，我就开枪了！”\n\n瓦尔内停下了脚步，隔着十几米的距离看着他。他的脸上满是污垢和疲惫，眼神浑浊而疯狂。\n\n“卡斯帕尼亚，”瓦尔内喘着粗气，“你逃不掉的。跟我回去，接受审判。这是你唯一的机会。”\n\n“审判？哈……哈……”他发出了神经质的笑声，“你们赤匪，会给我审判？你们会把我吊死在广场上，让那些贱民朝我扔石头！我见过太多这样的场面了！”\n\n“那是你罪有应得。”瓦尔内冷冷地说。\n\n“罪有应得？”他激动起来，挥舞着手枪，“我有什么罪？我只是做了所有人都在做的事！是你们赤匪破坏了这一切，我只不过顺应了历史！我只不过比别人做得更成功一点！”\n\n“时代变了，卡斯帕尼亚。”瓦尔内向前迈了一步，“西莉迪亚北方，不再是你的狩猎场了。”\n\n“时代？”他像听到了天大的笑话，“你以为那些所谓的自由人，真的能适应自由吗？在被奴役的过程中，他们已经习惯了懒散，习惯了被人安排一切！没有了我们，他们什么都不是！他们会饿死，会冻死！我……我们是在‘照顾’他们！”\n\n瓦尔内看到了他眼中的疯狂和自我欺骗。他至死都不认为自己有错，他依然高高在上，将自己视为旧秩序的维护者。\n\n“你错了。”瓦尔内缓缓地抬起冲锋枪，对准了他，“他们比你想象的要坚强得多。他们正在建设一个新的家园，一个没有奴隶，没有压迫的家园。”\n\n“那是做梦！”他尖叫着，手指扣向了扳机。几乎在同一时间，瓦尔内的冲锋枪也发出了低沉的嗡鸣。卡斯帕尼亚的动能弹擦着瓦尔内的肩膀飞过，打在身后的沙丘上。而瓦尔内的冲锋枪，精准地击中了他的持枪手腕。\n\n“啊！”卡斯帕尼亚发出一声惨叫，手枪脱手落在沙土里。他抱着受伤的手腕，在沙地上痛苦地翻滚。\n\n瓦尔内走上前，用枪口抵住他的额头。\n\n“结束了，卡斯帕尼亚。”\n\n他停止了翻滚，仰面躺在沙土里，大口大口地喘着粗气。风沙渐渐小了一些，惨淡的阳光透过云层，照在他那张扭曲的脸上。\n\n“你们……赢了……”他喘息着说，眼神中的疯狂渐渐褪去，只剩下无尽的疲惫和空洞。\n\n“但是……瓦尔内……你以为抓到我，审判了我，过去的一切就能抹去吗？难道你们赤匪就不是想着奴役人吗，你以为我没有读过你们的理论吗？你们搞什么阶级斗争，而你们的干部自己就是新的阶级，迟早有一天你也会像我这样死掉。”\n\n“你们赤匪，总是说要建立一个公正的新世界。”他看着瓦尔内的眼睛，一字一句地,“可你们自己呢？我看你们的高级干部也是觥筹交错，你们的外交人员，他们和你真的是一个阶级吗？”\n\n“你和我，其实没什么不同。”他咧开嘴，露出一个比哭还难看的笑容，“我们都是为了自己的利益，你们只是……披着一件更漂亮的外衣在欺骗百姓。”\n\n“闭嘴！”瓦尔内厉声喝道，但声音却有些颤抖。\n\n“杀了我吧。”他闭上了眼睛，将脖子梗起，“用你的冲锋枪，或者用我的手枪。让我看看，你所谓的‘公正’，到底能有多‘公正’。”\n\n瓦尔内巴不得捅这个混账几个“透明窟窿”，但是他还是克制住了自己冲动，转身走向通讯兵……"
CLD.54.a:0 "“C队呼叫‘安泰岩’，已抓捕目标，请求医疗小队援助……”"

CLD.55.t:0 "行政机关讨论"
CLD.55.d:0 "这里本来一个有内容，但是看选项你应该能懂，如果GUI能搓完我会再补充的"
CLD.55.a:0 "留用旧政权人员，暂时不打破当前体系。"
CLD.55.a.tt:0 "“这是否有些贻害无穷？后面还得忙……”——格雷克"
CLD.55.b:0 "甄别旧体系人员，留用背景相对干净的。"
CLD.55.b.tt:0 "“看起来，这还算个好方案，就是怎么甄别……”——舍尔勒"
CLD.55.c:0 "全面清洗，旧政权走狗应该全部不留。"

CLD.56.t:0 "媒体政策"
CLD.56.d:0 "显然，这里我很想给大家看几位主角高谈阔论，但是看选项你应该也能猜到他们会说什么。"
CLD.56.a:0 "媒体当然应该享有自由发表意见的权力。"
CLD.56.a.tt:0 "“那要是旧势力反扑怎么办……”——舍尔勒\n“说说话还是没什么问题的。”——伯恩\n“我持保留态度。”——格雷克"
CLD.56.b:0 "让人说话，天是塌不下来的。"
CLD.56.b.tt:0 "“但是旧媒体甚至还有教会喉舌……”——格雷克\n“适当的限制是必要的。”——舍尔勒"
CLD.56.c:0 "媒体自由无非是资产阶级想要找嘴替。"
CLD.56.c.tt:0 "“当然，保留一部分民间媒体并无不可。”——莫里茨\n“这样做是否有些过分了？”——舍尔勒"

CLD.57.t:0 "教育机构政策"
CLD.57.d:0 "嘛，同志们，我也很想让大家看这里的讨论，但是既然已经玩钢四了，那么键政观点应该都会联想的对吧……"
CLD.57.a:0 "教会的教育机构必须取缔或被世俗学校取代，总之宗教教育不许进入课堂。"
CLD.57.a.tt:0 "“教育必须世俗化科学化，所有权可以暂时不考虑。”——格雷克"
CLD.57.b:0 "教育机构应该全面社会化世俗化。"

CLD.58.t:0 "医疗机构政策"
CLD.58.d:0 "…… 总之，最后需要决策了"
CLD.58.a:0 "强制接收所有医疗机构"
CLD.58.a.tt:0 "“当然，也可以适度给予补偿。”——莫里茨"
CLD.58.b:0 "暂时不改变医院所有权"
CLD.58.c:0 "国有化大型医疗机构"

CLD.59.t:0 "那么医学院呢……"
CLD.59.d:0 "…………"
CLD.59.a:0 "医学院由教育委员会接收，医学生去向由卫生部统一管理"
CLD.59.b:0 "总要尊重就业自由的嘛……"
CLD.59.c:0 "我看让学生下下乡也没什么……"

CLD.60.t:0 "审判"
CLD.60.d:0 "成王败寇了，总归要解决下人。"
CLD.60.a:0 "公审枪毙"
CLD.60.b:0 "死刑场地枪毙就行了"
CLD.60.c:0 "实在不行，我们安乐死"
CLD.60.dd:0 "劳动改造也不失为"

CLD.61.t:0 "工商业政策"
CLD.61.d:0 "大家都知道需要想想商业怎么运转，那又是大家熟悉的机构方案，南边国有化过快出现过问题，所有"
CLD.61.a:0 "工商业暂时只进行行业监管"
CLD.61.b:0 "国有化北方大型工业企业"
CLD.61.c:0 "全盘国有化所有工商业企业"

CLD.62.t:0 "问路"
CLD.62.d:0 "深秋的霜气凝在草叶上，山间的雾霭还未散尽，艾兴布鲁恩村在灰蒙蒙的晨光中若隐若现。石砌的农舍低矮地蜷在丘陵褶皱里，屋顶覆着青苔与枯草，村口的老井边，一株老橡树只剩枯枝刺向铅灰的天空，几片黄叶在冷风里打着旋儿。\n\n工作队踏着冻硬的土路走进了艾兴布鲁恩村。村口的老井边，一位叫阿尔布雷希特的老农正劈柴，见他们走近，手里的斧头顿了顿，没说话。“我们是中央派来的工作队，要在村里住下。”队长卡尔-海因茨说道。老人抬眼打量他们片刻，才慢声开口：“上回穿制服的人，连水都没喝完就走了，你又是哪个中央。” 没人辩解。队员们默默卸下行李，在废弃的村校里铺开草席。\n\n傍晚，村校的窗棂被寒风刮得吱呀作响。几个孩子缩在门缝后偷看，妇女们在院门口低声议论，煤油灯从破窗透出昏黄的光，映着墙皮剥落的斑驳。卡尔·海因茨在泥地上摊开地图，炭笔划过纸页的沙沙声混着远处松林的呜咽。卡尔·海因茨带着人挨家走访，不催不逼，只问收成、治安、谁管事。有人摇头，有人沉默，也有人指着东山说：“黑溪沟那边，连救济粮都进不来。”\n\n第三天清晨，工作队升起炊烟，混着松针的冷香，开始修整校舍屋顶。村民渐渐不再躲着走。傍晚，阿尔布雷希特提了一篮土豆放在门口，转身就走，只留下一句：“炉子漏风，夜里冷。” 煤油灯下，工作队在地图上标出第一处待建民兵点。"
CLD.62.a:0 "他们不走了，这里就是前线。"

CLD.63.t:0 "旧钱包，新谢尔"
CLD.63.d:0 "蒙特市的清晨，空气里还带着铁锈和煤灰的味道，老工人阿尔弗雷德已经在银行门口排起了长队。他手里紧紧攥着一个破旧布包，里面是他半生积蓄——厚厚一叠北方谢尔。\n\n阿尔弗雷德抬头看了看银行门口悬挂的新标语，心里五味杂陈。昨天，红旗插遍了蒙特市的大街小巷，广播里宣布，公社红军解放了这座城市。紧接着，就是关于货币兑换的公告。\n\n队伍缓缓向前移动。阿尔弗雷德注意到，新发行的谢尔纸币设计得和旧钞截然不同。旧谢尔上，印的是那位高高在上、神情威严的“伟大君主”，而新谢尔上，他匆匆瞥见的图案，是壮丽的山川河流，是挥舞着镰刀的工农群众，是冒着浓烟的高大烟囱厂房。\n\n终于轮到了阿尔弗雷德。他有些紧张地将那包旧谢尔放在柜台上。\n\n“同志，一共是旧谢尔 5300 元。”柜台后，一位年轻的红军战士，态度和蔼地对他说。\n\n阿尔弗雷德的心沉了下去。按照官方公布的通用比例，1比5。就在这时，红军看了看阿尔弗雷德满是油污的工装，又看了看他布满老茧的双手，脸上露出了亲切的笑容：“老师傅，您是工人吧？根据政策，对于工农群众，我们有优待比例。您的情况，可以按照 1 比 4 的比例进行兑换。”\n\n“什么？1比4？”阿尔弗雷德几乎不敢相信自己的耳朵。\n\n“是的，同志。”红军战士肯定地回答，“这是红军对咱们工人兄弟的关怀。旧政权滥发货币，让老百姓受苦了。现在解放了，我们要让工农大众的钱袋子先稳住。”\n\n阿尔弗雷德眼眶有些湿润。他看着柜台里那一叠崭新的纸币，上面的图案仿佛在向他招手。他颤抖着双手，接过了那一沓沉甸甸的新谢尔。这不仅仅是一笔钱，这是对他身份的认同，是新政权给予他的希望。\n\n走出银行，蒙特市的阳光似乎比往日更加明亮。阿尔弗雷德紧紧握着新谢尔，他觉得，这个城市，真的“换天”了。那些印着压迫者头像的旧纸币将成为历史，而印着山河与工农的新谢尔，将带着他们走向一个未知但充满希望的未来。他决定……"
CLD.63.a:0 "今天要给家里买点好面粉，庆祝这个日子。"

CLD.64.t:0 "地图"
CLD.64.d:0 "诺尔福摊开巴斯蒂亚大陆地图，开始指指点点。\n\n“南巴斯蒂亚地区刚经历过战乱，无力大规模干涉东巴斯蒂亚事务；北巴斯蒂亚情报较少，但可以认为暂时不影响我们的外交活动；远乡地区局势混乱，当地左翼游击队，右翼保守派与王室的争夺战仍然在进行；大公国情况不明。总的来说，目前我们最大的国防威胁来自北方奥罗日亚帝国。”\n\n“内战过程中，皮奥瑞亚共和国给予了我们相当的帮助，目前两国的关系也尚可。看来我们最好和他们形成某种同盟关系。”外交人民委员帕弗洛得出了这个显而易见的结论。\n\n“事实上，皮奥瑞亚的政治目前并没有过于激化，无论是左翼还是右翼都是偏向中间派的立场，我看我们可以合作。”莫里茨对舍尔勒说。\n\n“经济和军事合作可以提上日程了”，舍尔勒点点头，“经济层面最好限制在资源、工业品与机床上面，军事合作还要加深，最好能获得一批现代化海空军技术，这是目前红军最为缺乏的。”\n\n“另外，知识分子交流是不是也可以提上日程。”格雷克少见地插了嘴。\n\n“这个我们也在计划当中，至于何时落地要等局势稳定。”帕弗洛回应道。"
CLD.64.a:0 "“这样，诺尔福，在介绍一下北方的基本情况。”"

CLD.65.t:0 "共和港观光"
CLD.65.d:0 "海风吹过共和港码头，也吹过里克尔的面容。皮奥瑞亚方面的接待总归不算冷场，欢迎仪式什么的走过场也无所谓，外交礼仪还是要遵守的，只不过对于里克尔这种军队出身的人而言有些无趣，参谋军官经常要处理海量信息，长年累月的汇总规划已使得他往往忽略掉自己思考分析的过程，直接给出答案。\n\n“克里尔先生？”一旁的记者问道。“那么，您觉得如何？”\n\n“说实话，我觉得很奇妙，毕竟我们都知道发生过什么。”（指在世界大战中西莉迪亚海军被皮奥瑞亚的偷袭消灭）\n\n“当然，前剥削政府的战争本身就是不义的，我们理应不计前嫌。”\n\n“那么您作为西莉迪亚新政权的军队代表，此次访问共和港有何意图？”\n\n“西莉迪亚红军是为老百姓打天下的队伍，我们西莉迪亚人民乃至于伟大的皮奥瑞亚人民是不愿看到战争的，红军与皮奥瑞亚共和国军队将会携手合作，维护东巴斯蒂亚的地区安全与稳定……”"
CLD.65.a:0 "与此同时，一批红军军官正在走上舰艇……"

CLD.66.t:0 "选人"
CLD.66.d:0 "北方局是我们党第一次建立大的地区性统一管理机关，显然，如此重任需要一位威望高，能力出众，行事果断，作风可靠的党内同志。目前的报告为中央委员会主席团提供了两个选择，首先是艾森贝格·洛尔文，前进派的老工会主席，经验丰富，行事可靠；另一个是普格尔·霍夫曼，相当老练的党务干部。\n现在的问题是，选谁呢？（是啊，选什么）"
CLD.66.a:0 "艾森贝格·洛尔文"
CLD.66.b:0 "普格尔·霍夫曼"

###新闻###
CLDNews.1.t:0 "革命公社统一联合王国地区"
CLDNews.1.d:0 "从伟大战争开始分裂至今的联合王国地区如今终于再次被联合在了一起，但这次没人端坐于王座之上，原来的联合王国现在成为了东巴斯蒂亚长夜之中猛然亮起的火炬-革命公社，这个政权由西莉迪亚公社战胜了其他的军阀和国家，击退了海外的入侵后建立。\n\n革命公社坚持着“持续革命主义”，他们相信自己必须用尽一切办法将革命的烈火洒向全球。目前尚未有其他国家和政权对于革命公社的统一做出回应，但任何人都明白，在经历了这许多的坎坷和斗争之后，这个日渐成熟和坚毅的政权将会带来令人畏惧的浪潮。"
CLDNews.1.a:0 "他们或许可以结束这长夜。"

CLDNews.2.t:0 "西莉迪亚内战重燃"
CLDNews.2.d:0 "尽管目前，由于西莉迪亚地区的人员管制使得各国记者都难以得到一手消息，但从双方今日发布的表态看，已经可以确认双方在临时停火线附近发生了大规模交火。双方强调会坚定维护领土主权完整。北方政府目前表态，将会平定南方叛乱，而南方公社表示将会完成西莉迪亚的所谓革命。\n\n今日皮奥瑞亚共和国外交部发言人在答记者问时表示，皮奥瑞亚方面对西莉迪亚局势表示高度关注，认为双方应坚持维护地区稳定，预防人道主义危机。同时，皮奥瑞亚共和国对北方政权表达严正关切，北方政权长期以来对南方发动破坏活动，主动破坏地区安全局势，任何后果都将由北方承担。为防止人道主义危机和边境安全，皮奥瑞亚预计会向南方派遣民事观察团和粮食援助。有观察家指出，皮奥瑞亚与南方赤色政权有长期的合作行为，此次“民事观察团”或许并没有那么简单。\n\n北方的奥罗瑞亚王国目前还没有发表明确表态，但有消息人士指出，王国方面对内战正在做出积极反应，会坚决回击一切破坏神圣秩序的行为。\n\n……"
CLDNews.2.a:0 "东巴斯蒂亚怎么了？"

CLDNews.3.t:0 "西莉迪亚统一"
CLDNews.3.d:0 "此外，在经过了几年的分裂与厮杀后，西莉迪亚似乎再次回到了和平岁月。\n\n近一周，西莉迪亚南方的共产主义军队基本接管了北方政权主要地区的控制权，据悉，北方政权的主要领导人或是已经逃往更北方，或是下落不明。目前南方红色政权未就对于北方政府前政要的具体情况以及处置措施予以详细说明，外界普遍猜测，鉴于北方政权主要领导层与南方政权的历史矛盾相当深重，最终结果都会相当不利于这些前领导人。\n\n南巴斯蒂亚大学教授，国际关系与东巴斯蒂亚地缘政治分析者，塞巴斯蒂安·米雷安诺先生认为，这些东巴斯蒂亚的左翼分子与南巴斯蒂亚的通常左翼有着相当的区别，目前很难预估未来西莉迪亚会走向何方。“尽管这些左翼分子在意识形态上有着相当激进，甚至是无政府倾向的极端色彩，但是从过去几年他们的外交政策看，他们的领导层或许暂时还是一群务实的领导者。作为前奥罗日亚帝国的一部分，西莉迪亚的左翼政权必然招致北方强权的军事压力，显然他们也预料到了这一点，皮奥瑞亚共和国与西莉迪亚左翼分子一直维持着良好关系，尽管我并不认为他们会一直如此，但地缘形势决定了合作的趋势是在逐渐加深的。\n\n皮奥瑞亚共和国外交发言人今日在答记者问中表示，“皮奥瑞亚方面一贯支持东巴斯蒂亚各国人民争取本国独立与平等事业的正义行为，我们也祝贺西莉迪亚人民结束了残酷的内战。当前世界局势动荡不安，皮奥瑞亚方面愿与东巴斯蒂亚地区热爱和平的人民一同努力，维持地区安全稳定。”"
CLDNews.3.a:0 "不论如何，和平总是好的。"

###领导人###
CLD_Arle_Scherrer:0 "阿尔勒·舍尔勒"
CLD_Arle_Scherrer_desc:0 "阿尔勒-舍尔勒1974年出生于西莉迪亚南方的一个企业主家庭，舍尔勒作为家中的长子，在出生后便在父母的安排下接受了良好而完善的教育，在十七岁时舍尔勒被安排前往南巴斯蒂亚留学，在留学期间，东巴斯蒂亚爆发了大战，舍尔勒并没有返回西莉迪亚，而是在南巴斯蒂亚继续他的学业，在这过程中他积极参与政治活动，并与许多不同思想的人进行了交流，在不断的交流探索与学习中，一种舍尔勒此前从未接触过的思想：共产主义进入了他的视线，他对这种在当时许多人看来相当激进的主义产生了浓厚的兴趣，身为企业家之子的他相当清楚工人们受到的不公待遇，在此前他虽然对此有所疑问，但他的父亲告诉他，没有这些工人的“奉献”，就没有他如今的美好生活，但现在，他感到了迟疑，他长久以来的生活使他习惯如此，他的习惯在抵抗改变。\n\n但他战胜了他自己。\n\n在完成了四年的学习后，舍尔勒坐上了回到家乡的火车，但他并没有遵循父亲的安排绕道托莱多前往西莉迪亚共和国回到家人身边，他前往了南方的起义政权西莉迪亚公社。在刚刚到达公社时舍尔勒因为自己大企业家之子的身份而惹来了很多麻烦，其中甚至包括了半个月的隔离审查，但他凭借自己的决心和信念获得了人们的信任，在被解除限制后他一直游走在工人中，一边了解他们的想法一边丰富自己的见识，他凭借自己温和的性格和一针见血的理论赢得了工人们的喜爱和尊重，他甚至开始逐渐参与工会决议并被授权组织工人武装力量，人们已经不在意他的出身，当谈起他，人们想起的只有他坚定的话语。\n\n“天将破晓”"

