CLD_divisions_in_chaos:0 "混乱的编制"
CLD_divisions_in_chaos_desc:0 "由于驻扎的领土突然扩大，加上吸收前西莉迪亚共和国的部队编制，军事人员，以及出于作为统一国家整编军队的必要性，我军正处在痛苦的转折阶段。大规模的整编严重影响了部队的指挥能力，为了人民，为了革命，我们需要尽快完成部队的重整！"
