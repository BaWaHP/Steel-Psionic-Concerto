###国策###
CLD_locking_border_up:0 "封锁边境"
CLD_locking_border_up_desc:0 "由于近段时间越来越多的反动派特务渗透到公社境内，为阻断特务进入公社的通道，革命阵线紧急下达了封闭边境指令，并要求红军前线部队配合地方民兵加强对北方的渗透以及走私活动的打击。"
CLD_forming_emergency_committe:0 "成立紧急状态委员会"
CLD_forming_emergency_committe_desc:0 "为应对敌特破坏和日益严峻的斗争形势，公社需要实施一系列紧急应对政策已维持革命政权的存续，阿舍勒同志听取切德尔同志的建议，并争取到党内以及革命阵线各主要领导认同，决定成立紧急状态委员会。"
CLD_authorizing_investigation:0 "授权调查"
CLD_authorizing_investigation_desc:0 "我们必须把内部潜在的叛徒全部揪出来，不然将重蹈覆辙。紧急委员会将授权秘密警察组织对内部进行一次大规模的调查，任何可疑人士都将受到严格的审查。"
CLD_expanding_secret_organization:0 "扩大秘密警察组织"
CLD_expanding_secret_organization_desc:0 "叛徒们派来试图分裂我们的间谍比我们想的还要多，我们必须扩大我们的秘密警察组织来进行应对，甚至进行一定程度上的情报误导和反制。"
CLD_order_113:0 "第113号命令"
CLD_order_113_desc:0 "我们发现在扩大秘密警察组织后，被捕的人数不降反升，经过调查之后发现这些人中存在相当一部分没有确凿证据便被抓捕，针对这一现象紧急状态委员会决定发布第113号命令限制秘密警察组织逐渐失控的活动要求任何抓捕行动必须小心谨慎，并且禁止对被关押者使用任何形式的非法暴力。"
CLD_emergency_laws:0 "紧急状态法"
CLD_emergency_laws_desc:0 "在紧急状态之下我们将实行一系列特殊法令，例如余粮收集制，扩大生产指标，延长工时等，这一切都是为了保卫革命，在紧急状态结束后这些政策都将被取消。"
CLD_filling_empty_jobs:0 "填补职位空缺"
CLD_filling_empty_jobs_desc:0 "经过调查之后我们将可以信任的人派往适合的岗位上，虽然在短时间内我们还无法完全填补缺失的岗位，但依然可以让我们的国家机器重新运转起来。"
CLD_establishing_intel_facility:0 "组建革命保卫局"
CLD_establishing_intel_facility_desc:0 "为了应对越来越严峻的形式，我们决定整合秘密警察组织成立革命保卫局以更完整的组织架构和行动准则来为了革命进行地下活动，他们是红色的利剑与盾牌。"
CLD_the_big_meeting:0 "大会"
CLD_the_big_meeting_desc:0 ""
CLD_censoring_scientists:0 "知识分子重新审查"
CLD_censoring_scientists_desc:0 "经过大会的讨论，认为我们现在已经度过了最危险与不稳定的时刻。从现在开始，我们将放宽对各类人士的枷锁，其中便包含知识分子。我们将重新审查被捕或被冷落的知识分子，让他们重新回到岗位上去，但这是一个相对漫长的过程。"
CLD_battlefield_of_consensus:0 "舆论战场"
CLD_battlefield_of_consensus_desc:0 "我们的人民非常明白发生了什么，我们从来不会瞒着他们，但我们必须进行强调，共和派的叛徒们做了什么，在舆论战场上，我们有真相站在身边。"
CLD_open_for_immigrants:0 "开放移民审查"
CLD_open_for_immigrants_desc:0 "越来越多的人从北方来到我们国家，其中包括被资产阶级共和派裹挟的人民，其他国家慕名而来的革命者等等，因此，我们将开放对移民的审查，无论他的出身如何，是何种族，是何民族，在通过审查后我们都会欢迎他们。"
CLD_clean_the_army:0 "清理军队"
CLD_clean_the_army_desc:0 "在资产阶级改良派接受了联合王国的贿赂和条约之后，相当一部分不坚定的军队跟随背叛者们倒戈在北方建立政权试图扼杀我们，虽然也有一部分军官留下，但我们需要清除掉所有投机分子，为保卫革命的军队打下坚实的基础的第一步。"
CLD_ensure_the_right_to_command:0 "确保军队指挥权"
CLD_ensure_the_right_to_command_desc:0 "连队是部队生活、工作、训练、作战的基层单位，是军队的基础。连队党支部是党在军队中的基层组织，是党联系广大战士的基本纽带，负责统一领导连队工作，讨论决定连队一切重大问题，团结带领全连人员完成上级所赋予的一切任务。连队党支部充分发挥战斗堡垒作用，才能从根本上保证人民军队的性质和宗旨得到落实。"
CLD_revolutionary_army_plan:0 "建设人民军队"
CLD_revolutionary_army_plan_desc:0 "\n\n\n\n\n\n\n£GFX_texticons_CLD_3\n\n\n\n\n\n人民军队为人民，我们的军队和其他政府用来镇压人民和对外扩张不同，我们是为了保卫人民，保卫革命而战。我们将建立一支拥有坚定信仰的人民军队。"
CLD_revolution_needs_you:0 "“革命需要你！”"
CLD_revolution_needs_you_desc:0 "我们需要迅速扩充人民军队以对抗有联合王国在背后支持的共和国，起来吧同胞，并肩去战斗。勇敢向前进我们的朋友，要将专制锁链彻底的打破！"
CLD_revolution_takes_time:0 "久久为功，善作善成"
CLD_revolution_takes_time_desc:0 "建设高质量军队是一个漫长的过程，我们将开始用合适的标准去训练我们的部队，并且进行革命精神培养，让他深深的刻进军队的灵魂之中。"
CLD_first_step_towards_sky:0 "踏往蓝天的第一步"
CLD_first_step_towards_sky_desc:0 "我们之中绝大部分人没有飞行的能力，并没有在天空中飞翔的经历，但那并不能阻拦我们对蓝天的向往，我们没有天生的飞行器官或者飞行魔法，但我们可以用科技弥补这一切。"
CLD_courage_of_the_brave:0 "非匹夫之勇"
CLD_courage_of_the_brave_desc:0 "我们愿意为了革命抛头颅洒热血，但并不代表我们喜欢无谓的牺牲，只会一味驱赶士兵冲锋的指挥官不是合格的指挥官如果能用炮弹代替士兵的生命，何乐而不为呢。"
CLD_democracy_within_military:0 "发扬民主精神"
CLD_democracy_within_military_desc:0 "发动官兵积极参加以军事训练为中心的各项工作，为完成任务献计献策；战时发动官兵开展军事民主，研究战术技术，开展战评活动，充分调动主观能动性，为革命争取更多的胜算。"
CLD_the_day_shall_come:0 "当那一天来临"
CLD_the_day_shall_come_desc:0 ""
CLD_and_we_are_ready_for_it:0 "提高警惕，时刻准备"
CLD_and_we_are_ready_for_it_desc:0 "建设军队的最后一步已经完成，虽然还有缺陷，但这不是一时能解决的问题，现在我们的军队就是面对北方的敌人所能达到的最佳状态，准备好了吗，士兵兄弟们！那一天马上就要来临！"
CLD_start_producing_again:0 "维持生产秩序稳定"
CLD_start_producing_again_desc:0 "由于我们过快的国有化以及缺乏足够的专业人员参与经济政策的制定，目前我们的生产秩序一片混乱。无论未来采取何种经济模式，我们至少要解决目前的解决问题，通过允许商品正常交换，允许部分私营企业（尤其是中小企业）存在，推广工人自管模式等，我们将进行生产秩序恢复工作，至少要在半年左右的时间改善公社内部的生产。"
CLD_factory_belongs_to_worker:0 "属于工人的工厂"
CLD_factory_belongs_to_worker_desc:0 "这场革命是属于无产阶级的阶段性胜利，我们夺回了本应属于我们的东西，现在我们将严格保证无产阶级的利益，所有试图盗取无产阶级利益的人都将受到法律的制裁。"
CLD_revolution_without_frontline:0 "不上前线也可以革命"
CLD_revolution_without_frontline_desc:0 "我们不需要所有人都上前线，我们要做我们该做的事情，在后方，在工厂里，源源不断的武器将送往军队，助力保卫革命。"
CLD_train_heading_the_commune:0 "前进的列车"
CLD_train_heading_the_commune_desc:0 "我们的火车向前飞进，到公社才是终点！"
CLD_iron:0 "基础资源开发"
CLD_iron_desc:0 "我们所在区域被建设为工业区的重要原因之一就是这里有大量的优质矿产，我们在后续的探测中发现了更深更多的战略资源储备，虽然我们现在无法深入开发，但是在较浅的地方挖掘现在急需的资源还是很有必要的。"
CLD_fish:0 "渔业资源开发"
CLD_fish_desc:0 "我们拥有的天然优势之一就是相对漫长的海岸线，在这基础上我们发展出了优秀的捕鱼业，可以填补我们需要的食物和生活用品。"
CLD_back_shield_plan:0 "后盾计划"
CLD_back_shield_plan_desc:0 "我们的空军处于起步状态，很可能无法拦截联合王国支援给共和国的空军部队，为了保证工厂的产出，我们设计了一种更加方便维修养护的厂房结构，虽然会稍微影响我们的工作效率，但总比没工厂可以开工要好。"
CLD_progress_the_plains:0 "开垦大平原"
CLD_progress_the_plains_desc:0 "我们被联合王国统治期间一直是以工业矿业作为第一发展目标，作为生存基础的农业一直是被忽略的存在，在我们独立的现在，我们必须对北方的平原进行大规模的开垦，以满足我们的需要，我们将会进行一次大规模的计划，迁移大量的人口去进行开拓。"
CLD_expanding_right_of_worker_directors:0 "扩大工人理事会权力"
CLD_expanding_right_of_worker_directors_desc:0 "虽然在独立之初我们就成立了工人理事会，但我们也是初次尝试，在处理了大量的问题，完善了工人理事会的架构后，我们终于可以将相应的权力彻底交到工人理事会手上。"
CLD_democratic_progress_in_industry:0 "工业式民主进步"
CLD_democratic_progress_in_industry_desc:0 "我们将工人们在生产建设中的经验总结归纳后，获得了更多方面的启示，这些经验能够帮助我们在工业发展上走的更快更远。"
CLD_first_glipse_of_fire_in_the_field:0 "草原上的第一缕火苗"
CLD_first_glipse_of_fire_in_the_field_desc:0 "我们已经做好准备！绝不能让叛徒们抢占先机，我们将主动出击，将改良派和他们的主子们打翻在地！我们就是这草原上的第一缕火苗！"
CLD_first_glipse_of_fire_in_the_field_tr:0 "§Y准备度§!达到§C100%§!"

CLD_people_war:0 "人民战争"
CLD_people_war_desc:0 "这场战争不是为了土地，不是为了掠夺，而是为了人民，我们的目的是解放，如果我们伤害了人民，那这场战争就背道而驰了。"
CLD_preferential_treatment_of_prisoners_of_war:0 "优待战俘"
CLD_preferential_treatment_of_prisoners_of_war_desc:0 "我们在战争中可能会俘获相当数量的战俘，他们中有被迫参加战争的也有被谎言所蒙蔽的，我们不能因为他们曾和我们敌对就去毫无意义的虐待他们，他们也是人民的一份子。"
CLD_behind_enemy_lines:0 "敌后战场"
CLD_behind_enemy_lines_desc:0 "我们的情报人员很轻松的就插入了敌人的内部，并且发展出了一张相当庞大的地下情报网络，我们将利用这些情报优势去更好的判断敌人下一步的动向。"
CLD_guaranteed_supplies:0 "保证补给"
CLD_guaranteed_supplies_desc:0 "如果战争无法避免，我们就必须送战士们踏上前线，我们能做的就是给予他们最好的后勤，我们必须保证战士们需要的补给足够充足。"
CLD_post_war_trauma_recovery_center:0 "战后创伤恢复中心"
CLD_post_war_trauma_recovery_center_desc:0 "我们发现有一部分士兵在经历了残酷的战争之后患上了严重的战后心里综合征，我们无法避免战争，但是我们必须竭尽全力去挽救每一名士兵，无论他是我们的士兵或是战俘，我们将成立战后创伤恢复中心，必须让每一名士兵能够在战后从深渊的泥沼中走出，去享受应有的阳光。必须。"
CLD_re_education_of_prisoners_of_war:0 "战俘再教育"
CLD_re_education_of_prisoners_of_war_desc:0 "我们发现相当一部分顽固分子带有对我们的很严重的误解，他们认为我们才是终极剥削者，要把所有东西从人民手中夺走，对于这种令人哭笑不得的误解，我们认为有必要开设课程对战俘们进行再教，告诉他们我们的诉求，我们的愿望，我们的斗争理想。"
CLD_new_beginning:0 "新的开始"
CLD_new_beginning_desc:0 "士兵们在军队中付出了自己的青春，为了我们的安宁与解放，但在退伍后却缺少生活所需的技能与安家之处，我们会遵循士兵本人的意愿去进行培训，让他能够走上自己希望的岗位，对于被俘的敌方士兵，他们现在留在这里才是最安全的，对于不愿再踏上前线的人，我们会提供一个岗位在战争结束后我们会帮助他们和家人团圆。\n死者我们无法挽回，我们会将他们刻在碑上，记在心中。\n生者我们不会忽视，我们会将他们领向理想，走向未来。"
CLD_railroad_guerrillas:0 "铁道游击队"
CLD_railroad_guerrillas_desc:0 "我们利用在敌后建立起的庞大情报网组织了一支专门破坏敌人铁路的特战小分队，他们不追求直接杀伤，每次就只是毁坏掉一段铁路后迅速撤离并寻找下一个目标，即使只是这样也让敌人焦头烂额，严重影响了敌人军队补给的送达。"
CLD_project_lifeline:0 "生命线计划"
CLD_project_lifeline_desc:0 "在前线激烈的战火下伤员及平民处于非常危险的状态，我们需要尽快将他们送往后方安置，我们将启动生命线计划，用铁路将大批非战斗人员送离前线。"
CLD_protection_of_civilians:0 "保护平民"
CLD_protection_of_civilians_desc:0 "我们的军队必须在战争中尽量保护无辜的平民，尽管这可能会使我们的军队在一定程度上束手束脚，但这一切都是值得的。"
CLD_code:0 "守则"
CLD_code_desc:0 "我们为士兵们制定了几条言简意赅易于遵守的士兵守则，其中体现了我们军队的价值观与行事风格。"
CLD_victory:0 "胜利"
CLD_victory_desc:0 "经过几年的斗争，我们终于获得了胜利，我们终于可以安下心来进行发展与输出革命，目前我们最重要的任务就是确定未来的方向。"

#第三阶段国策#
CLD_temporary_rest:0 "一线喘息"
CLD_temporary_rest_desc:0 "现如今我们暂时挫败了敌人的阴谋，正面击溃了叛徒们的攻击，但仍然留下了一堆烂摊子需要我们收拾，我们的时间不多，但需要解决的问题不少。"
CLD_abolish_northern_treaty:0 "废除北方条约"
CLD_abolish_northern_treaty_desc:0 "在过去，贵族阶级和大地主们为了自己的利益签订了无数出卖广大人民利益的条约，为了我们将废除一切旧西莉迪亚和北方分裂势力与联合王国签订的一切条约，以表明我们已经和过去那个任人宰割的西莉迪亚不一样了。"
CLD_lifting_emergency_state:0 "解除紧急状态"
CLD_lifting_emergency_state_desc:0 "为了获得胜利我们在备战期间实行了一系列高压的紧急状态法以获取胜利的最大可能性，但这一政策绝不可长期持续下去，这一政策会对民生和发展造成严重的危害，我们必须尽快脱离紧急状态回到正常的发展轨道上。"
CLD_integrate_adminnistrative_systems:0 "整合行政管理系统"
CLD_integrate_adminnistrative_systems_desc:0 "由于长时间的分离，原本同出一系的南北方即使在行政系统上也已经出现了巨大的差异，为了更加平稳的推动步调的统一，我们的当务之急便是将北方反动的管理系统改造，以为我们的行动做出更好的响应。"
CLD_complete_household_reg_sys:0 "完善户籍系统"
CLD_complete_household_reg_sys_desc:0 "长年的分离以及战乱导致大量的人民流离失所，形成了一个巨大的流民群体，同时也有南北方也存在许多的人口交换，导致前西莉迪亚联合阵线建立的本就脆弱的户籍系统已经名存实亡，我们需要在境内进行一次广泛的普查以初步重建一个户籍系统，虽然会消耗我们大量的精力物力人力，但它对于我们稳定处于刚刚结束战争的混乱状态的北方有强有力的帮助。"
CLD_public_trial:0 "公审战犯"
CLD_public_trial_desc:0 "在这场战争中许多民众深受其害，西莉迪亚整个革命进程被打断，无数设施、工厂、城市毁于一旦，无数的士兵被推上战场进行这一场本不应该出现的战争，现在我们赢了，而罪魁祸首也已落入我们手中，但我们绝不能让愤怒冲昏头脑，必须让人民亲手敲下审判的锤，这一场战争才能充分发挥它的意义。"
CLD_forced_labor:0 "组织强制劳役"
CLD_forced_labor_desc:0 "尽管我们已经对战争的罪魁祸首们发动了公审，但还是有很多他们的帮凶等待处置，他们虽然没有犯下滔天的罪行以至于被送上公审法庭，但也不能就这么放过他们，将他们组织起来进行劳动改造是一个非常好的选择，既能让他们用自己的劳动补偿自己犯下的罪行，也能够通过劳动对他们的思想进行初步的改造。"
CLD_nationalize_means_of_production:0 "生产资料收归国有"
CLD_nationalize_means_of_production_desc:0 "在战争结束前我们为了保持相对的稳定对部分私有制保持了容忍态度，现在我们可以空出手来将这一部分残留的私有生产资料全部强制收归国有，特别是针对北方残余的大量垄断企业等，必须使用强制手段以避免剥削者们利用自己手中残余的资源继续兴风作浪，要让他们明白，他们的时代结束了。"
CLD_policy_for_redemption:0 "赎买政策"
CLD_policy_for_redemption_desc:0 "虽然我们已经完全掌控了政权，但我们也没必要把事情做的太过强硬，我们将在一定时间内通过收归国有的企业向原资本家支付部分股息和薪金，支付一段时间后再完成全面改造，这样的政策能够避免过于强硬的手段造成的不必要的冲突，能够在改造过程中保护生产力并且促进资本家的思想改造。"
CLD_pension_committee:0 "战争抚恤委员会"
CLD_pension_committee_desc:0 "有许许多多的人牺牲在了这场战争中，他们或许是在前线拼杀的战士，或许是在工厂中夜以继日工作的工人们，又或许只是被战火波及到的民众，无论是何种，同志的牺牲总是令人惋惜，逝者已逝，我们能做的就是尽所能地为他们的家属提供帮助与抚恤，来帮助他们度过这个难关，作为这件事的一部分，我们需要成立一个委员会专门负责对烈士家属的抚恤金发放工作。"
CLD_educational_system:0 "重建教育系统"
CLD_educational_system_desc:0 "原本的西莉迪亚王国及其忽视对人民的教育系统的建立，在那时教育几乎只属于王公贵族们所有，而底层的无产者们能接收到的只是为他们服务的技能性教育，在联合阵线建立后教育系统的建立曾被提上过日程，但因为战争的开始，尚未建立雏形的教育系统便半路夭折，而备战期间我们也只能将精力专注在相关事项上，现在我们胜利了，为了长久的解放我们需要建立起从未有过的和以前不同的一套属于无产阶级的教育体系，这将是一个漫长的过程，现在只是第一步。"
CLD_farmer_representatives:0 "吸收农民代表"
CLD_farmer_representatives_desc:0 "在对峙时期我们境内的农民群体收到了很大程度上的忽视，并且由于战争承担了极大的压力，在解放北方被反动派占领的地区后，我们政权内部的农民群体扩大了数倍，已经成为了一股不可忽视的政治力量，我们有必要让农民拥有自己的发声渠道，并代表农民参与到日常的政治活动之中。"
CLD_temporary_housing:0 "临时住房"
CLD_temporary_housing_desc:0 "在此前的轰炸和后续的战争中，敌我两方都有相当一部分平民居住区收到了波及，尽管我们将民众疏散至防空洞及后方，但住房的损失仍然导致现在出现了很大一块儿住房缺口，作为遮风挡雨的生活必需品，住房的缺少是相当迫切的问题，我们必须抽调一部分精力，派遣工程队以及部分工程部队去帮助快速建设能够迅速投入使用供民众入住的临时性房屋，虽然称之为临时性房屋也只是较为简陋，在安全性可靠性以及居住性上是必须有保障的。"
CLD_compensatory_agriculture:0 "农业补偿法令"
CLD_compensatory_agriculture_desc:0 "西莉迪亚长期羸弱的农业在经过常年战乱的折磨后已经处在了崩溃的边缘，我们如今正依靠着严苛的余粮收集制和来自皮奥瑞亚的粮食贸易维持着脆弱的平衡，但这绝不是长久之计，我们必须尽快将发展农业提上日程，将更多的资源倾斜到农业发展中，只有这样我们才可能发展出真正能够自给自足和足以对抗冲击的农业，这样才能为我们的事业提供坚定的基础和充实的保障。"
CLD_price_scissors:0 "剪刀差"
CLD_price_scissors_desc:0 "对于拥有工业优势的我们来说，发展农业的最好途径之一就是利用已经相对发达的工业快速将我们落后的农业拖进机械化的农业生产，向农业地区低价出售或租借农业机械，促进农业地区与其他地区的交通设施的修建，促进农业地区的扩大与产量的增加等，在这个过程中，会出现农产品价格高于价值而工业品价格低于价值的情况出现，我们的学者们形象的将其称为“剪刀差”。"
CLD_counter_insurgency:0 "打击叛乱残余"
CLD_counter_insurgency_desc:0 "尽管我们已经掌握了政权，但由于长期的对立与战争，前叛乱势力在北方仍然有不可忽视的残留，无论是源于前叛乱势力在北方的洗脑式统治，抑或是在战争中不可避免的结下的仇恨的锁链，他们仍然拥有一部分拥护者，这对于我们长久的革命事业来说是不小的麻烦，我们必须谨慎小心的处理残余的叛乱势力，如果贸然行事可能会导致局势更加的严重。"
CLD_autonomy:0 "北人治北"
CLD_autonomy_desc:0 "经过会议的讨论与沟通，最终决定我们将与部分投降的前北方叛乱分子进行约定，我们将派遣更具有本地优势的他们前往北方进行在监督下的治理与维稳，将他们推到台前能够有效的瓦解叛乱的残余分子在民间的基本盘，毕竟像这些人一样的“前高层”都已经为我们工作了，尽管这一行为被某些人批为“放虎归山”，但他们的号召力与人脉也能够使许多人倒向我们，或者至少不再为叛乱的残余分子提供帮助。但我们也必须时刻警惕着这些人反过来咬我们一口或者叛乱的残余分子选择铤而走险发动刺杀。"
CLD_steady_course:0 "稳定航向"
CLD_steady_course_desc:0 "“北人治北”的方案取得了巨大的成功，如今北方残余的叛乱分子的生存活动空间已经被压缩到了最小，他们此前最大的靠山便是人数不小的依然支持前叛乱政权的民众，但现在随着政策的不断推进，越来越多的民众已经不再执着于前叛乱政权，现在等待着残余的叛乱分子的就只有逐步的切割和围剿，他们已不成威胁。\n\n我们十分感谢这些“地头蛇”们的帮助，他们使我们省去了不少的精力与人力，也避免了武装冲突和必然的伤亡，但同时我们也希望他们能够真正的悔过自新，而不要再在背后搞一些小动作。"
CLD_uproot:0 "连根拔起"
CLD_uproot_desc:0 "经过会议的讨论与沟通，最终我们决定将以雷霆手段将北方残余的叛乱分子彻底连根拔起一个不留，我们曾在战争结束的时候给予了他们机会，但他们仍然选择与我们对抗、与人民对抗，那么我们也无需继续手下留情，我们将派出革命保卫局的精锐特工深入北方，不断的在叛乱分子的网络中打下钉子，悄无声息的摸清他们的组织与人员，直到我们确认完全掌握了他们的动向和名单，那么后面一切的事情就简单了，接下来就只需要带上部队，挨个敲门。"
CLD_not_any_more:0 "不再复行"
CLD_not_any_more_desc:0 "经过这段时间的雷霆行动，我们成功的将北方的叛乱残余彻底的摧毁了，虽然在行动中难免的出现了一些伤亡，但为了革命政权的稳固存在，这一切都是必要的。\n\n不过虽然我们成功摧毁了残余的叛乱势力，但我们过于直接和暴力的行动也引来了很多人，特别是北方民众的不满，他们认为这是我们在掌握了政权后对于曾经敌对的他们进行的一场报复行为，并且对我们产生了更深的敌意与仇恨，为了避免事情进一步升级，我们还是有需要对此进行回应与处理。\n\n但至少大家都愿意坐回桌子前好好谈谈了。"
CLD_joint_meeting:0 "全境联席会议"
CLD_joint_meeting_desc:0 "现在我们已经基本稳固了政权，在从前我们基本依靠工会来提供组织架构，但现在随着我们拿回了北方的土地，更多不属于工人的人进入了政府中参与到事务之中，我们有必要成立一个能够统合各个阶级各个地方代表的会议来进行国家大事的商议与表决，这一机构将独立于其他各个机构之外，以使其能够不受干扰的实行其职责，其正式命名为“全境联席会议”，它将是我们协调各方关系与指定政策的桥梁。"

CLD_army_route:0 "审视军队方向"
CLD_army_route_desc:0 "经过长时间的对峙与战争，我们最后赢得了战争，但在战争中我们的武装力量也暴露出许多问题，我们过于忽视了武装力量的职业性，并且缺乏一个正确的路线来对此进行改革与发展，在这个问题提出后内部大致分为了两派，一派认为我们应该继续以从前的路线为基础，通过大规模的动员与火力覆盖在稳固战线的同时对敌方进行消耗，而另一派认为我们应当摒弃大规模动员的思想，认为这是落后的战术，我们需要进行大规模的军事改革，利用我们发达的工业体系来对武装力量进行快速的机械化以适应往后的战争。"
CLD_original_road:0 "维持路线"
CLD_original_road_desc:0 "经过了激烈的争论后，我们最终选择了卡尔特元帅所主持的大规模动员路线的继续与改进，元帅认为机械化部队虽好，但对于我们的武装力量来说仍需要时间磨合，因为我们时刻面临着其他政权的攻击，一旦武装力量的改革失败，甚至可能导致我们的革命就此功亏一篑，所以在现有的步兵基础上进行改革是最为稳妥的方式。"
CLD_guns_at_hand:0 "枪在手"
CLD_guns_at_hand_desc:0 "能够进行大规模动员的一个十分重要的前提就是我们拥有足够的武器分发给士兵们，想着让士兵们端着竹竿儿冲上前线是十分不道德和不理智的行为，而且没有充足的武器也会导致部队无法发挥出应有的作战力量，而刚好我们的军工系统有足够的生产力能够为我们的士兵们提供充足的武器，趁手的武器是永远不会嫌多的。"
CLD_cannons_roaring:0 "炮火轰鸣"
CLD_cannons_roaring_desc:0 "火炮作为我们部队的主要火力投送手段，无论是在掩护己方冲锋、遏制敌方冲锋、远距离打击敌方前线以及一些其他用途是都表现极其良好，并且火炮操作相对简单，生产相对容易，大规模的列装充足的火炮用于投放火力能够极大的减少我们部队在战斗中没必要的伤亡，毕竟只要火力够猛，我们甚至可以只需进行足够长时间的炮击，敌方就会溃不成军，而这一切的前提就是有足够的火炮和威力足够大的火炮，我们需要火炮，很多火炮，很多威力很大的火炮。"
CLD_simplify_production:0 "简化生产"
CLD_simplify_production_desc:0 "根据目前我们军队改革的目标和需求，我们的军工体系需要提供数目相当惊人的武器装备，即使是对于我们的比较成熟的工业来说也是非常沉重和困难的任务，所以我们需要在尽可能不影响武器装备性能的情况下减少武器装备的生产流程与时间来提高武器的产量以满足需求，对于我们的武器专家与工业专家来说或许这是个艰巨的任务，但这对于我们的计划来说是至关重要的。"
CLD_optimized_deployment:0 "优化部署"
CLD_optimized_deployment_desc:0 "在以往的战争中我们发现，如果我们对部队的阵型部署与规划过于杂乱，那么在正面战场上我们所能投入的部队数量也会受到很大影响，根据以往的经验，我们可以调整部队的部署位置、进入战斗的时间、调整部队内部架构等方式使我们在相同的战场宽度内能够投入更多的部队以及更多的火力，这样的调整改进能够使我们部队的火力密集度、部队的组织度和突破能力更加强大，能够有效改善在进行大规模动员后相当一部分兵力无法及时投送进入战场的情况。"
CLD_sand_table_exercise:0 "沙盘推演"
CLD_sand_table_exercise_desc:0 "“纸上谈兵”的下一步是什么，答案是沙上演兵，如果每一次军事理论的提出与军官技能的训练都需要真实的战争演习的话，将会消耗相当庞大数量的资源与人力物力，所以我们可以利用沙盘进行军事演习模拟，以满足军事研究与教学中的需求，通过沙盘推演我们能够直观的了解在特定情形下可能产生的各种问题与解决方法，并结合给出的信息进行合理有效地决断，同时它的低成本与无风险可以使我们在军事学院与部队中快速大面积推行此类学习方法使我们的军事理论水平更上一层楼。"
CLD_revise_training_protocol:0 "改良训练规程"
CLD_revise_training_protocol_desc:0 "在不断的战争与预演中，不同的战场环境也一直在对我们的士兵提出更加多样和严苛的要求，面对这些要求我们也需要不断对自身进行改变，统一的训练规程本质上是为了使部队有更强的凝聚力，更强的战斗力，更低的伤亡率，虽然目的上总是殊途同归的，但是在实行上是必须结合实际进行的，我们需要在必要的时刻修订我们的训练规程来使我们的士兵们能够更加适应瞬息万变的战场。"
CLD_distributed_command_system:0 "分布式指挥系统"
CLD_distributed_command_system_desc:0 "从我们能查到的有记录开始，军队的指挥一直集中于某一种类型的“指挥中枢”之中，从命令下达到各级部队相应均需要一定的反应时间，尽管主要的战斗计划与行动方向是需要高度的集中指挥，但我们所构建的一些特有的部队架构可以支持我们将相当一部分行动细节下放至各个地方部队自行决断，以广泛的建立基于连排单位的分布式指挥系统我们能够极大的提升部队在战争中的响应能力与主观能动性，并避免在形式复杂的战斗中避免错失战机的情况发生。"
CLD_armored_force:0 "装甲应用"
CLD_armored_force_desc:0 "经过了激烈的讨论后，我们最终选择了舍尔勒同志所主导的新式装甲的研究、生产、与研究，舍尔勒同志认为我们必须尽快摒弃过去所形成的习惯性路线，大规模动员在科技进步的洪流中终将被淘汰，在战争中我们也深刻体会到了装甲部队所拥有的力量，而我们又缺乏相关的生产科技、设备与经验，正因为如此我们需要尽早地投入到对装甲力量的发展之中，让我们的武装力量能够更加完全的发挥我们所拥有的生产力与技术水平，只有这样才能在未来的战争中屹立不倒。"
CLD_dismantle_seized_armour:0 "拆解缴获装甲"
CLD_dismantle_seized_armour_desc:0 "在对北方反动集团的战争中我们缴获了少数经由奥罗日亚联合王国支援的轻型坦克，这几辆坦克现在扔到部队里面去肯定派不上什么大用场，但放在我们的专家手中就大有用处，我们能够通过拆卸与反向研究奥罗日亚联合王国较为成熟的装甲科技，通过这样的逆向研究所获得的成果能够大大加速我们自己对装甲的研究步伐。"
CLD_more_army_factories:0 "增设工厂"
CLD_more_army_factories_desc:0 "对于新设立的装甲生产项目，仅靠以前我们所有的工厂是远远不足的，一是调用原有的军工厂也需要进行生产线的调换与更改，同样需要相当长的时间进行适应才能达到最大的生产效率，其次是如果过多调用原有的工厂，那么现在正在进行的生产任务便难免会受到影响，所以最好的方法便是尽快为该项目单独设立产线与工厂，从零开始也省得被束手束脚。"
CLD_compact_design:0 "紧凑型设计"
CLD_compact_design_desc:0 "我们的工业专家们十分“创造性”的利用优秀的机械结构设计、材料学支持和从缴获装甲中获取的经验，设计出了一款在最低限度的满足了车组成员需要下的最为紧凑的设计框架，这种设计极大的满足了我们对于装甲大规模生产的需要，将我们生产所需的成本极大的压缩，尽管试验车的车组成员们在进行了实验性驾驶与测试后一致认为长期驾驶此类装甲车辆绝对会患上某些职业疾病，但他们也不得不承认除此之外这一框架做到了在最小的体积与重量的情况下做到了性能的最优解。"
CLD_develop_armor_tactics:0 "推演装甲战术"
CLD_develop_armor_tactics_desc:0 "显而易见的，装甲部队所使用的战术必然和我们从前常用的步兵战术大相径庭，我们现在暂时没有条件进行大规模的实战演练，但如果等到条件成熟时怕不是为时已晚，所以我们现在就需要尽所能地利用现有的各种信息去对在未来的装甲作战中可能发生的各种情形进行假设、分析、推演以预先对各种情况做到尽可能地提前做出预案。"
CLD_mobile_Infantry:0 "步兵机动化"
CLD_mobile_Infantry_desc:0 "从我们的推演来看，装甲部队仍然无法独立执行作战任务而需要步兵进行跟随掩护和配合任务，那么如何让步兵能够跟上装甲的速度就成了一个问题，因为让步兵徒步跟随装甲进行快速转移显然是不现实的，这是客观上不可能做到的，而如果让装甲配合步兵减慢速度，那么装甲部队最大的优势之一，“速度”将荡然无存，这样的话不如做几个大盾牌让步兵们推着走了，所以我们需要为步兵提供在行军过程中使用的载具，并且此类载具最好有一定的防护性，能够让步兵安全的投入战场。"
CLD_titan_researches:0 "投入机甲研究"
CLD_titan_researches_desc:0 "我们的科学家与工程师们向我们提交了一份报告，其中提到了早在世界大战时期曾昙花一现的武器：机动性全地形适应多功能类人形装甲，简称机甲，报告中提到在大战时期由于工程学与材料学的限制，机甲并没有发挥预期之中的效果导致一直没有进行大规模的投产与列装，并且在战后由于表现不佳迅速被抛弃与遗忘，但经过这些年的科技技术进步，我们意外的发现现有的条件很适合对该项目进行重启，如果该项目能够成功那么我们或许能获得相当灵活的装甲力量。"
CLD_establish_armor_research_bureau:0 "成立装甲局"
CLD_establish_armor_research_bureau_desc:0 "为了完成部队机械化的目标，我们同时推进了大量的项目与生产，我们现有的部门已经因为各类事项的交叉与联络忙的焦头烂额，所以为了更加高效的管理这些项目，我们决定将整个机械化的推进、生产、列装等事务进行整合归拢，成立一个专门负责该类事项的部门，革命装甲器械研究管理局就此应运而生，简称装甲局，从该部门研发的各类装甲设备经由部队测试通过、同意列装后，再由该部门将生产需求单开往工人委员会，由其安排具体的生产事项。"
CLD_establish_armor_research_bureau_tt:0 "§Y将解锁新的坦克制造商！§!"

