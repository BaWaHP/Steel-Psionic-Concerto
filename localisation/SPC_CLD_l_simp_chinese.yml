###政策###
CLD_national_monopoly_foreign_trade:0 "国家垄断外贸"

CLD_revolutionary_transition_economy:0 "革命过渡式经济"
CLD_revolutionary_transition_economy_desc:0 "显然对于未来的政策还不明朗，弗雷施曼也没有告诉我们怎么做，所以这是一段过渡时期，未来如何需要探索。"

###国策###
CLD_locking_border_up:0 "封锁边境"
CLD_locking_border_up_desc:0 "由于近段时间越来越多的反动派特务渗透到公社境内，为阻断特务进入公社的通道，革命阵线紧急下达了封闭边境指令，并要求红军前线部队配合地方民兵加强对北方的渗透以及走私活动的打击。"
CLD_forming_emergency_committe:0 "成立紧急状态委员会"
CLD_forming_emergency_committe_desc:0 "为应对敌特破坏和日益严峻的斗争形势，公社需要实施一系列紧急应对政策已维持革命政权的存续，舍尔勒同志听取切德尔同志的建议，并争取到党内以及革命阵线各主要领导认同，决定成立紧急状态委员会。"
CLD_authorizing_investigation:0 "授权调查"
CLD_authorizing_investigation_desc:0 "我们必须把内部潜在的叛徒全部揪出来，不然将重蹈覆辙。紧急委员会将授权秘密警察组织对内部进行一次大规模的调查，任何可疑人士都将受到严格的审查。"
CLD_expanding_secret_organization:0 "扩大秘密警察组织"
CLD_expanding_secret_organization_desc:0 "叛徒们派来试图分裂我们的间谍比我们想的还要多，我们必须扩大我们的秘密警察组织来进行应对，甚至进行一定程度上的情报误导和反制。"
CLD_order_113:0 "第113号命令"
CLD_order_113_desc:0 "我们发现在扩大秘密警察组织后，被捕的人数不降反升，经过调查之后发现这些人中存在相当一部分没有确凿证据便被抓捕，针对这一现象紧急状态委员会决定发布第113号命令限制秘密警察组织逐渐失控的活动要求任何抓捕行动必须小心谨慎，并且禁止对被关押者使用任何形式的非法暴力。"
CLD_emergency_laws:0 "紧急状态法"
CLD_emergency_laws_desc:0 "在紧急状态之下我们将实行一系列特殊法令，例如余粮收集制，扩大生产指标，延长工时等，这一切都是为了保卫革命，在紧急状态结束后这些政策都将被取消。"
CLD_filling_empty_jobs:0 "填补职位空缺"
CLD_filling_empty_jobs_desc:0 "经过调查之后我们将可以信任的人派往适合的岗位上，虽然在短时间内我们还无法完全填补缺失的岗位，但依然可以让我们的国家机器重新运转起来。"
CLD_establishing_intel_facility:0 "组建革命保卫局"
CLD_establishing_intel_facility_desc:0 "为了应对越来越严峻的形式，我们决定整合秘密警察组织成立革命保卫局以更完整的组织架构和行动准则来为了革命进行地下活动，他们是红色的利剑与盾牌。"
CLD_the_big_meeting:0 "大会"
CLD_the_big_meeting_desc:0 ""
CLD_censoring_scientists:0 "知识分子重新审查"
CLD_censoring_scientists_desc:0 "经过大会的讨论，认为我们现在已经度过了最危险与不稳定的时刻。从现在开始，我们将放宽对各类人士的枷锁，其中便包含知识分子。我们将重新审查被捕或被冷落的知识分子，让他们重新回到岗位上去，但这是一个相对漫长的过程。"
CLD_battlefield_of_consensus:0 "舆论战场"
CLD_battlefield_of_consensus_desc:0 "我们的人民非常明白发生了什么，我们从来不会瞒着他们，但我们必须进行强调，共和派的叛徒们做了什么，在舆论战场上，我们有真相站在身边。"
CLD_open_for_immigrants:0 "开放移民审查"
CLD_open_for_immigrants_desc:0 "越来越多的人从北方来到我们国家，其中包括被资产阶级共和派裹挟的人民，其他国家慕名而来的革命者等等，因此，我们将开放对移民的审查，无论他的出身如何，是何种族，是何民族，在通过审查后我们都会欢迎他们。"
CLD_clean_the_army:0 "清理军队"
CLD_clean_the_army_desc:0 "在资产阶级改良派接受了联合王国的贿赂和条约之后，相当一部分不坚定的军队跟随背叛者们倒戈在北方建立政权试图扼杀我们，虽然也有一部分军官留下，但我们需要清除掉所有投机分子，为保卫革命的军队打下坚实的基础的第一步。"
CLD_ensure_the_right_to_command:0 "确保军队指挥权"
CLD_ensure_the_right_to_command_desc:0 "连队是部队生活、工作、训练、作战的基层单位，是军队的基础。连队党支部是党在军队中的基层组织，是党联系广大战士的基本纽带，负责统一领导连队工作，讨论决定连队一切重大问题，团结带领全连人员完成上级所赋予的一切任务。连队党支部充分发挥战斗堡垒作用，才能从根本上保证人民军队的性质和宗旨得到落实。"
CLD_revolutionary_army_plan:0 "建设人民军队"
CLD_revolutionary_army_plan_desc:0 "\n\n\n\n\n£GFX_texticons_CLD_3\n\n\n\n\n\n\n\n人民军队为人民，我们的军队和其他政府用来镇压人民和对外扩张不同，我们是为了保卫人民，保卫革命而战。我们将建立一支拥有坚定信仰的人民军队。"
CLD_revolution_needs_you:0 "“革命需要你！”"
CLD_revolution_needs_you_desc:0 "我们需要迅速扩充人民军队以对抗有联合王国在背后支持的共和国，起来吧同胞，并肩去战斗。勇敢向前进我们的朋友，要将专制锁链彻底的打破！"
CLD_revolution_takes_time:0 "久久为功，善作善成"
CLD_revolution_takes_time_desc:0 "建设高质量军队是一个漫长的过程，我们将开始用合适的标准去训练我们的部队，并且进行革命精神培养，让他深深的刻进军队的灵魂之中。"
CLD_first_step_towards_sky:0 "踏往蓝天的第一步"
CLD_first_step_towards_sky_desc:0 "我们之中绝大部分人没有飞行的能力，并没有在天空中飞翔的经历，但那并不能阻拦我们对蓝天的向往，我们没有天生的飞行器官或者飞行魔法，但我们可以用科技弥补这一切。"
CLD_courage_of_the_brave:0 "非匹夫之勇"
CLD_courage_of_the_brave_desc:0 "我们愿意为了革命抛头颅洒热血，但并不代表我们喜欢无谓的牺牲，只会一味驱赶士兵冲锋的指挥官不是合格的指挥官如果能用炮弹代替士兵的生命，何乐而不为呢。"
CLD_democracy_within_military:0 "发扬民主精神"
CLD_democracy_within_military_desc:0 "发动官兵积极参加以军事训练为中心的各项工作，为完成任务献计献策；战时发动官兵开展军事民主，研究战术技术，开展战评活动，充分调动主观能动性，为革命争取更多的胜算。"
CLD_the_day_shall_come:0 "当那一天来临"
CLD_the_day_shall_come_desc:0 ""
CLD_and_we_are_ready_for_it:0 "提高警惕，时刻准备"
CLD_and_we_are_ready_for_it_desc:0 "建设军队的最后一步已经完成，虽然还有缺陷，但这不是一时能解决的问题，现在我们的军队就是面对北方的敌人所能达到的最佳状态，准备好了吗，士兵兄弟们！那一天马上就要来临！"
CLD_start_producing_again:0 "维持生产秩序稳定"
CLD_start_producing_again_desc:0 "由于我们过快的国有化以及缺乏足够的专业人员参与经济政策的制定，目前我们的生产秩序一片混乱。无论未来采取何种经济模式，我们至少要解决目前的解决问题，通过允许商品正常交换，允许部分私营企业（尤其是中小企业）存在，推广工人自管模式等，我们将进行生产秩序恢复工作，至少要在半年左右的时间改善公社内部的生产。"
CLD_factory_belongs_to_worker:0 "属于工人的工厂"
CLD_factory_belongs_to_worker_desc:0 "这场革命是属于无产阶级的阶段性胜利，我们夺回了本应属于我们的东西，现在我们将严格保证无产阶级的利益，所有试图盗取无产阶级利益的人都将受到法律的制裁。"
CLD_revolution_without_frontline:0 "不上前线也可以革命"
CLD_revolution_without_frontline_desc:0 "我们不需要所有人都上前线，我们要做我们该做的事情，在后方，在工厂里，源源不断的武器将送往军队，助力保卫革命。"
CLD_train_heading_the_commune:0 "前进的列车"
CLD_train_heading_the_commune_desc:0 "我们的火车向前飞进，到公社才是终点！"
CLD_iron:0 "基础资源开发"
CLD_iron_desc:0 "我们所在区域被建设为工业区的重要原因之一就是这里有大量的优质矿产，我们在后续的探测中发现了更深更多的战略资源储备，虽然我们现在无法深入开发，但是在较浅的地方挖掘现在急需的资源还是很有必要的。"
CLD_fish:0 "渔业资源开发"
CLD_fish_desc:0 "我们拥有的天然优势之一就是相对漫长的海岸线，在这基础上我们发展出了优秀的捕鱼业，可以填补我们需要的食物和生活用品。"
CLD_back_shield_plan:0 "后盾计划"
CLD_back_shield_plan_desc:0 "我们的空军处于起步状态，很可能无法拦截联合王国支援给共和国的空军部队，为了保证工厂的产出，我们设计了一种更加方便维修养护的厂房结构，虽然会稍微影响我们的工作效率，但总比没工厂可以开工要好。"
CLD_progress_the_plains:0 "开垦大平原"
CLD_progress_the_plains_desc:0 "我们被联合王国统治期间一直是以工业矿业作为第一发展目标，作为生存基础的农业一直是被忽略的存在，在我们独立的现在，我们必须对北方的平原进行大规模的开垦，以满足我们的需要，我们将会进行一次大规模的计划，迁移大量的人口去进行开拓。"
CLD_expanding_right_of_worker_directors:0 "扩大工人理事会权力"
CLD_expanding_right_of_worker_directors_desc:0 "虽然在独立之初我们就成立了工人理事会，但我们也是初次尝试，在处理了大量的问题，完善了工人理事会的架构后，我们终于可以将相应的权力彻底交到工人理事会手上。"
CLD_democratic_progress_in_industry:0 "工业式民主进步"
CLD_democratic_progress_in_industry_desc:0 "我们将工人们在生产建设中的经验总结归纳后，获得了更多方面的启示，这些经验能够帮助我们在工业发展上走的更快更远。"
CLD_first_glipse_of_fire_in_the_field:0 "草原上的第一缕火苗"
CLD_first_glipse_of_fire_in_the_field_desc:0 "我们已经做好准备！绝不能让叛徒们抢占先机，我们将主动出击，将改良派和他们的主子们打翻在地！我们就是这草原上的第一缕火苗！"
CLD_first_glipse_of_fire_in_the_field_tr:0 "§Y准备度§!达到§C100%§!"

CLD_people_war:0 "人民战争"
CLD_people_war_desc:0 "这场战争不是为了土地，不是为了掠夺，而是为了人民，我们的目的是解放，如果我们伤害了人民，那这场战争就背道而驰了。"
CLD_preferential_treatment_of_prisoners_of_war:0 "优待战俘"
CLD_preferential_treatment_of_prisoners_of_war_desc:0 "我们在战争中可能会俘获相当数量的战俘，他们中有被迫参加战争的也有被谎言所蒙蔽的，我们不能因为他们曾和我们敌对就去毫无意义的虐待他们，他们也是人民的一份子。"
CLD_behind_enemy_lines:0 "敌后战场"
CLD_behind_enemy_lines_desc:0 "我们的情报人员很轻松的就插入了敌人的内部，并且发展出了一张相当庞大的地下情报网络，我们将利用这些情报优势去更好的判断敌人下一步的动向。"
CLD_guaranteed_supplies:0 "保证补给"
CLD_guaranteed_supplies_desc:0 "如果战争无法避免，我们就必须送战士们踏上前线，我们能做的就是给予他们最好的后勤，我们必须保证战士们需要的补给足够充足。"
CLD_post_war_trauma_recovery_center:0 "战后创伤恢复中心"
CLD_post_war_trauma_recovery_center_desc:0 "我们发现有一部分士兵在经历了残酷的战争之后患上了严重的战后心里综合征，我们无法避免战争，但是我们必须竭尽全力去挽救每一名士兵，无论他是我们的士兵或是战俘，我们将成立战后创伤恢复中心，必须让每一名士兵能够在战后从深渊的泥沼中走出，去享受应有的阳光。必须。"
CLD_re_education_of_prisoners_of_war:0 "战俘再教育"
CLD_re_education_of_prisoners_of_war_desc:0 "我们发现相当一部分顽固分子带有对我们的很严重的误解，他们认为我们才是终极剥削者，要把所有东西从人民手中夺走，对于这种令人哭笑不得的误解，我们认为有必要开设课程对战俘们进行再教，告诉他们我们的诉求，我们的愿望，我们的斗争理想。"
CLD_new_beginning:0 "新的开始"
CLD_new_beginning_desc:0 "士兵们在军队中付出了自己的青春，为了我们的安宁与解放，但在退伍后却缺少生活所需的技能与安家之处，我们会遵循士兵本人的意愿去进行培训，让他能够走上自己希望的岗位，对于被俘的敌方士兵，他们现在留在这里才是最安全的，对于不愿再踏上前线的人，我们会提供一个岗位在战争结束后我们会帮助他们和家人团圆。\n死者我们无法挽回，我们会将他们刻在碑上，记在心中。\n生者我们不会忽视，我们会将他们领向理想，走向未来。"
CLD_railroad_guerrillas:0 "铁道游击队"
CLD_railroad_guerrillas_desc:0 "我们利用在敌后建立起的庞大情报网组织了一支专门破坏敌人铁路的特战小分队，他们不追求直接杀伤，每次就只是毁坏掉一段铁路后迅速撤离并寻找下一个目标，即使只是这样也让敌人焦头烂额，严重影响了敌人军队补给的送达。"
CLD_project_lifeline:0 "生命线计划"
CLD_project_lifeline_desc:0 "在前线激烈的战火下伤员及平民处于非常危险的状态，我们需要尽快将他们送往后方安置，我们将启动生命线计划，用铁路将大批非战斗人员送离前线。"
CLD_protection_of_civilians:0 "保护平民"
CLD_protection_of_civilians_desc:0 "我们的军队必须在战争中尽量保护无辜的平民，尽管这可能会使我们的军队在一定程度上束手束脚，但这一切都是值得的。"
CLD_code:0 "守则"
CLD_code_desc:0 "我们为士兵们制定了几条言简意赅易于遵守的士兵守则，其中体现了我们军队的价值观与行事风格。"
CLD_victory:0 "胜利"
CLD_victory_desc:0 "经过几年的斗争，我们终于获得了胜利，我们终于可以安下心来进行发展与输出革命，目前我们最重要的任务就是确定未来的方向。"

#第三阶段国策#
CLD_bell_tolls:0 "尘埃落定"
CLD_bell_tolls_desc:0 "随着北方反动派首都的解放，我们可以说，我们的革命实现了阶段性的胜利，万事开头难，而结尾亦是如此。多年的混乱已经使得北方民生凋敝，并且由于战争我们增加了总体开支，目前货币混乱，物价不稳，通胀存在走高趋势，逃犯也还在缉拿之中。总之，还有很多工作要做。\n§t接下来，我们的决策将奠基这个政权，这个社会的新面貌……§!"
CLD_stabilize_social_order:0 "稳定城市秩序"
CLD_stabilize_social_order_desc:0 "过去我们在南方解放区曾经采取了紧急状态的方式，通过整合行政资源，组织工人自治等方式，稳定了南方解放区的社会秩序。但是，这是基于我们当时拥有相对稳固的群众基础和长期的工作经验。如今北方情况更为复杂，敌特残余与外部势力勾连频繁，反动派曾对北方的组织进行了系统化的破坏，我们要试着在恢复基本民生的同时逐步建立政权机构，强化基层组织，以此瓦解旧势力影响力，确保社会秩序平稳过渡，城市是生产力的中心，扼杀反革命势力首先要从城市开始。"
CLD_control_prices:0 "控制物价"
CLD_control_prices_desc:0 "目前的西莉迪亚，经过混乱的资产阶级革命与南北分裂，不仅货币大量超发，南北货币亦不统一，南北谢尔面值也不相同。为稳定北方民生，防止恶性通胀，也为南北经济交流协同提供基础，我们将会采取行政手段稳定北方货币，并控制城市物价。"
CLD_hunt_war_criminals:0 "追捕战犯"
CLD_hunt_war_criminals_desc:0 "北方反动派挑起了对西莉迪亚工农群众的战争，造成了不计其数的财产与人员损失，我们不能轻易放过他们，不论他们是死是活，都必须接受西莉迪亚人民的审判，也可以震慑潜在的反革命分子。"
CLD_lift_emergency_law:0 "开始解除紧急状态法"
CLD_lift_emergency_law_desc:0 "显然，紧急状态法对于我们的政治控制当然是有力的，但是也使得我们面临着巨大的经济问题。我们的队伍里甚至有同志提出了“越打越富”的奇谈怪论。正如格雷克先生在经济工作会议上所说的，目前这种经济过热的情况很难说是什么完全的好事，在其负面作用最大化以前，应该尽快解除紧急状态法对人口流动，经济往来等方面的限制，至少在南方要优先解除，北方新解放区则应该另行新法。"
CLD_establish_central_people_commitee:0 "成立西莉迪亚中央人民委员会"
CLD_establish_central_people_commitee_desc:0 "为进一步准备好行政能力的整合行动，我们将会改组紧急状态委员会，使其从原本建立在临时委员会基础上的一套临时架构变为更加规范化体系化的行政组织更好履行中央政府的行政能力。尽管部分前进派的同志反对这一决定并认为中央机关不应该掌握更多权力，舍尔勒同志也表示了一定疑虑，但是考虑到我们面对的国防和内外安全压力，显然现在还不是建构乌托邦的时刻。中央人民委员会暂时不会掌握更多权力，只是作为最高行政和协调机关存在，待及局势稳定，我们可以对行政体制进行更进一步的改革。"
CLD_establish_central_people_commitee_tt:0 "将§C解锁§!§R军事§!§Y国策§!。\n§g友情提示：社会重建比军事改革更加紧急，不推荐先点军事国策。§!"
CLD_take_over_administration:0 "接管行政部门"
CLD_take_over_administration_desc:0 "原来北方的反动分子留下了一个行政烂摊子，推倒重建显然是一个不明智的选择，那么我们要采取一定措施对其进行接管。不少同志担心旧官僚保留会危害我们革命政权的威信，也有同志担心旧官僚的习气会腐化我们的干部和工会代表，毕竟类似事件实际上时有发生。"
CLD_go_to_countryside:0 "走入乡村"
CLD_go_to_countryside_desc:0 "北方的山区与丘陵中，还包含着广大乡村。尽管由于工业化。农村人口流动远比过去要频繁，乡村的商业中也大量留存着工业品的痕迹，但是乡村依然是一个相对封闭的地带。我们将会组织工作队深入农村开展工作，恢复本地的民事秩序，建立基本的行政体系。"
CLD_media_policy:0 "媒体政策"
CLD_media_policy_desc:0 "随着西莉迪亚中央人民委员会的成立，标志着国家的治理进入新阶段。面对国内外复杂舆论环境，我们必须明确媒体的根本定位。旗帜派的同志认为媒体必须牢牢掌握在革命政权手中。我们将建立统一的国家新闻体系，强化内容审查与思想引导，严防资产阶级自由化渗与封建思想回潮，确保舆论始终与党的路线保持高度一致；前进派则对此暧昧不清；社民党人认为应该适度放开舆论，从而加强社会监督；民主联盟的知识分子对此并不感冒，格雷克认为完全的官方媒体控制只会越管越废，越管越死，应当保留一定的舆论监督权利。"
CLD_take_over_education:0 "接管教育机构"
CLD_take_over_education_desc:0 "在完成对行政体系的初步重组或深入基层巩固政权后，我们终于将目光投向了知识的殿堂。这不仅是校舍与人员的接收，更是一场深刻的思想重塑。中央人民委员会将会对目前北方教育机构接收方案进行讨论，但总路线是一致的，就是教育一体化，教育科学化。"
CLD_take_over_medical:0 "接收医疗机构"
CLD_take_over_medical_desc:0 "接收医疗机构不仅是技术性接管，更是一场政治接管。旧体系人员抵制、病患躁动、药品断供，这些旧的经济法团组织接二连三得发起反对浪潮。对于教会医院、私人医院和原国营医院的接收工作，以及对与北方医疗高校的接收方案即将提交中央人民委员会。"
CLD_judge_war_criminals:0 "审判战犯"
CLD_judge_war_criminals_desc:0 "虽然委员会关于处理战犯的观点是一致的，但在具体的处理方式上还存在一定的讨论空间。关于审判方式，各派只有倾向性，没有根本分歧。"
CLD_establish_central_economic_commitee:0 "中央财经工作委员会"
CLD_establish_central_economic_commitee_desc:0 "中央财经工作委员会作为国家宏观经济治理的最高协调与决策机构，肩负统筹经济复苏、稳定金融秩序、推动制度转型的重大职责。中央财经工作委员会必须保证国家经济运行恢复基本稳定、关键民生保障体系运转正常、经济社会总体风险可控，并最终解除紧急状态法。"
CLD_industrial_policy:0 "工商业政策"
CLD_industrial_policy_desc:0 "随着紧急状态法解除程序的启动，国家进入从“战时管控”向“常态治理”转型的阶段。目前公社经济模式并无陈规，市场与调控并存，私营经济与国营经济共存，关键产业自然是国有企业控制，但是在具体的民用产品生产和商业销售上依然存在相当的私营成分。中央财经工作委员会制定并推行《工商业管理暂行办法》，旨在全面激活市场主体（不论是否为私营），推动生产秩序重建与消费循环重启。"
CLD_establish_central_bank:0 "组建西莉迪亚中央人民银行"
CLD_establish_central_bank_desc:0 "我们计划整合全国的银行系统，设立国有中央银行以加强金融调控和管理能力，稳定目前的经济环境。该行将作为国家最高金融机构，全面负责货币发行、利率调控、外汇管理及商业银行监管，结束战时金融混乱局面，重建公众对货币体系的信心。央银行将有力遏制通胀、稳定物价、引导信贷流向生产性领域，为工业复苏与民生改善提供坚实支撑。"
CLD_issue_new_currency:0 "发行新货币"
CLD_issue_new_currency_desc:0 "随着国家进入战后重建的关键阶段，统一货币体系已成为稳定经济、重塑国家信用的当务之急。在建立西莉迪亚中央人民银行的基础上，中央人民委员会正式决定发行全国统一的新货币。旧谢尔货币将由中央人民银行按法定汇率有序回收与兑换，彻底结束南北分裂时期遗留的货币割裂局面。新货币采用先进防伪技术，由国家中央银行独家发行，确保币值稳定与流通权威性。此举将有效遏制通货膨胀、打击黑市交易、恢复民众对金融体系的信心，促进南北产业协同。"
CLD_confiscate_fakes:0 "抄没伪产"
CLD_confiscate_fakes_desc:0 "北方反动派掌握了大量的北方产业，现在，我们要仔细计划，精密盘算，将这些被军管会暂时接收的资产盘活利用起来，从而促进公社的工业建设和人民群众生活水平的提高。"
CLD_strike_usury:0 "打击投机倒把"
CLD_strike_usury_desc:0 "投机倒把是经济的毒瘤，对于目前的经济形势而言，大量的投机商影响着我们对北方新解放区的经济管制，如果我们不对北方的商业投机加以限制，将会影响我们的经济恢复和物资征调。"
CLD_rebuild_north:0 "联通南北"
CLD_rebuild_north_desc:0 "南北产业协同是促进公社经济工业化，社会一体化的重要一环，是促进北方经济发展的重要举措，也有利于联通南北民心，促进社会团结，缓和南北矛盾。"
CLD_look_east:0 "放眼东巴斯蒂亚"
CLD_look_east_desc:0 "随着我们解放全国，我们也需要放眼东巴斯蒂亚大陆的局势了。显然，我们要面对北方帝国的巨大军事压力，为了应对未来可能的军事冲突，我们当然要寻求伙伴，比如在内战期间给予我们相当支援的皮奥瑞亚共和国，此外我们也需要在边境进行布防控制。"
CLD_our_peo_friends:0 "我们的皮奥瑞亚朋友"
CLD_our_peo_friends_desc:0 "皮奥瑞亚在历史上与我们关系并不算太好，尤其是西莉迪亚的海军集体覆灭，时至今日我们都无法恢复海军规模。但是，在内战期间的支援与经济活动都证明了一点，那就是目前双方是存在巨大的共同利益的。"
CLD_deepen_mutual_trust:0 "增加军事合作"
CLD_deepen_mutual_trust_desc:0 "面对共同的军事压力，我们双边的军队和军事科技显然有着巨大的交流需求。对于红军来说，完成军队职业化，现代化，专业化是一项重要课题；对于皮奥瑞亚方面来说，在未来的冲突中有一支更加强而有力的盟友当然是一件好事。"
CLD_increase_cooperation:0 "扩大经贸往来"
CLD_increase_cooperation_desc:0 "目前双方的经贸往来给双方带来了相当的好处通过出口煤炭等矿产资源，以及西莉迪亚新兴的现代化渔业产品，我们得以换取更加先进的机床，工业设备，以及资金用以改善我们的工业产线以及促进人民群众生活改善。现在我们解放全国，可以与共和国方面在更多经济领域展开合作。"
CLD_allies_under_pressure:0 "东巴斯蒂亚集体安全协定"
CLD_allies_under_pressure_desc:0 "为抵抗奥罗日亚帝国的军事威胁，我们将会扩大军事安全合作，联合东巴斯蒂亚的民主势力，枪口一致对外。"
CLD_define_north_guard_zone:0 "组建北部特别军区"
CLD_define_north_guard_zone_desc:0 "为应对北方奥罗日亚帝国的威胁，红军将组建特别军区统一调度，其级别高于一般的军区或守备区，能够一定程度上自由调动区域内军民两用物项资源，加强供给能力。"
CLD_north_intel_work:0 "开展对北情报工作"
CLD_north_intel_work_desc:0 "面对北方帝国的军事压力，进一步开展情报工作是必要的，我们需要加强对边境的敌对目标进行侦察，情报人员也需要广撒网，不至于被打得措手不及。"
CLD_north_mil_construction:0 "建设北部军事防御地带"
CLD_north_mil_construction_desc:0 "西莉迪亚缺乏战略纵深，我们只能依托地形组织两层大的防御地段，其中，我们将对北部边境线防御进行加固。"
CLD_take_next_step:0 "迈出下一步"
CLD_take_next_step_desc:0 "§2无论选择什么，§!§R历史终将给出评判……§!"
CLD_take_next_step_tr:0 "任务§Y治安崩溃§!，§Y经济崩溃§!，§Y瘟疫肆虐§!，均已经§C结束§!，§R无论结果如何§!。"

