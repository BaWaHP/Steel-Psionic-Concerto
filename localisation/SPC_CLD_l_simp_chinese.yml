CLD_issue_military_control_regulation:0 "颁布《城市军事管制条例》"
CLD_issue_military_control_regulation_desc:0 "为阻止一切妨碍西莉迪亚的民主、和平、统一的破坏活动，影响北方群众生命财产安全的恐怖行动以及有组织的反革命暴动，在北方新解放区主要城市，由红军及党委设立军事管制委员会（以下简称“军管会”）。\n\n一切重要的粮食和物资仓库、监狱，以及其他军管会规定必须保护和监视的重要单位，都要派出军队，实行军事管制。对陷于瘫痪、半瘫痪状态的单位，或边防、沿海、交通要道（码头、铁路局、海港），或专政机构、机密要害部门，或国防企业事业单位等，都应实行军事管制。"

CLD_recover_urban_production:0 "恢复城市生产"
CLD_recover_urban_production_desc:0 "解放后北方各个工厂由于部分企业主出逃，社会秩序混乱等原因已然停产，给北方的解决生产带来了极大的破坏。军管会成立后，要承担起恢复生产的职责，组织工人，成立工会，暂时不改变劳资关系及工厂产权，允许一定程度的经济斗争，合理改善工作条件和职工待遇，逐步恢复城市经济。"
