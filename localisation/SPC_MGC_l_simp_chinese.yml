###企业###
MGC_supreme_industria_ministry:0 "全军联盟最高工业部"
MGC_supreme_industria_ministry_desc:0 "工业部是北提特兰地区的一个统辖着整个提特兰地区工业的巨型国企，而卢戈·伊戈尔·佐尔坦主导着这个巨型国企的大脑，北提特兰并没有这么强大的工业能力，工业产出的利润被卢戈把持着，日常的制式装备，各种仿制的火炮与步兵装备，再到各种轻工业的生产产出都被明码标价。卢戈经常哄抬装备的价值，导致全军联盟的各个部队必须在军团驻地收更多的税。"
MGC_peninsula_railway_n:0 "半岛铁路总局-北方局"
MGC_peninsula_railway_n_desc:0 "半岛铁路总局是坎达德尔王国工业化早期的王室产业，但是时过境迁，自内战后，这家铁路总局的分局已经成为了北提特兰少数没有被最高工业部统辖的私人企业，只能靠着老旧的第一代与第二代火车运货收取勉强足够维持铁路运营的费用，老旧的火车不断地来往于七河与北提特兰南方之间，吐出浓浓黑烟。"

