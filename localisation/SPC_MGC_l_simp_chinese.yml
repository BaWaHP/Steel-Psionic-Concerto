###MGC_focus_1###
MGC_years_as_day:0 "二十年如一日"
MGC_years_as_day_desc:0 "二十年好像短短一瞬，一切人们所熟知的，所不熟知的，在这两个十年之中缓缓消失，不知不觉间，1960的凯旋就像是一场梦，笑着的军队与欢呼的民众最后在这场劣质的模仿中默不作声。马加尔斯邦联的各方势力蠢蠢欲动，都想要争着抢着去做着什么却从未想过后果，一切的矛盾与重担压在了一个八十岁老人的头上。"
MGC_looking_at_past:0 "回望过去"
MGC_looking_at_past_desc:0 "在从死亡的边缘挺过来之后，谢姆延拼凑着记忆，他那充满荣耀，但孤独的一生，他没有什么好说的，他做的那些事情已经足够了，对于一个老者，也作为全军联盟的领导者，他现在要做的就是从支离破碎的回忆中，找出最适合的接班人。"
MGC_check_out_mil_men:0 "先看看军人们..."
MGC_check_out_mil_men_desc:0 "虽说全军联盟是一群军人建立的，但是要论，纯粹的在军事上有所建树的三人，那便是德尼·科苏特、多夫兹多·德·哲姆菲亚与谢姆延·扎布罗夫斯基；而现在，谢姆延已经倒下，军队中的政治化因素正在逐渐变多，必须果断地做出决断结束争吵。"
MGC_deni:0 "德尼..."
MGC_deni_desc:0 "德尼·科苏特率先在这场政治的游戏中拔得头筹，以他为首的独裁派们正在心中欢呼雀跃，他正趾高气扬的看着多夫兹多，而多夫兹多只是冷冷的看着他，不作出任何回应。"
MGC_operation_holy_fire:0 ""圣火行动"党规范化"
MGC_operation_holy_fire_desc:0 "圣火行动党已经在军队内造成了极大的影响力，我们既然已经选择了德尼主持军务，那么就必须让他放弃让圣火行动作为一个不仅具有社会影响力，同时在军政上有所影响力的存在，圣火行动必须被规范化为军队的一份子。"
MGC_or_dovuzdo:0 "...或多夫兹多"
MGC_or_dovuzdo_desc:0 "多夫兹多点了点头，恢复了自己冰冷的表情，他无视了德尼愤怒的怒火，并在心里暗暗的高呼穆斯林的神恩。"
MGC_deminish_royalist:0 "减少虔敬学会成员"
MGC_deminish_royalist_desc:0 "虔敬学会作为一个保皇派组织，对于社会的影响力是不可估量的，虽然大部分市民已经对于君主制的好感差到几乎没有什么支持者，但是在宗教与乡村，宗教人士与部分农民依旧保持着对君主制的支持，我们必须杜绝这种会导致兵源一开始就充满了“某一意识形态”。"
MGC_then_for_innovators:0 "...再看看革新者们..."
MGC_then_for_innovators_desc:0 "革新者，说实话就是维持现状的支持者或者妥协者，而谢姆延就是其中之一；他已经倒下，无法处理这段关系了，那他就只能将希望寄托于大拉萨尔嫩勒科夫·多饶，他虽然作为一位保皇派而闻名，但是他也与共和派有许多联系，如果用得好，他将会是全军联盟的关键人物……"
MGC_nenlekov:0 "嫩勒科夫..."
MGC_nenlekov_desc:0 "我们需要一个代表，一个门面，一个能够以全军同盟全体名义去话事的人，嫩勒科夫将会运用他自己的人脉去安排之后的事情。虽然他自己的倾向总会影响整个局势，但是这也是无奈之举，只能期望嫩勒科夫能够自我平衡了。"
MGC_bridge_between:0 "保皇派与共和派的桥梁"
MGC_bridge_between_desc:0 "目前冲突中，冲突的最严重的就是共和派与保皇党，双方都为对方在“一年共和”中对方的所作所为而不耻，而嫩勒科夫就是双方之间的桥梁，我们必须缓和共和派和保皇派不必要的矛盾，尽可能寻找他们更多的共识。"
MGC_and_myself:0 "...与我自己"
MGC_and_myself_desc:0 "谢姆延尽力了，他尽他所能挽救了他的祖国，他几乎将所有事情都做到了最好——果真如此吗？他出卖了自己祖国的港口给七河，他恢复了老友废除的农奴制，他制定的税法折磨着北境，曾经，他看向镜子只能看见他自己，后来，则是是一团迷雾……"
MGC_light_cig:0 "点上一根烟"
MGC_light_cig_desc:0 "……而现在，他只能看见烟雾后无穷无尽沸腾的海水，他们正在渴望着他的灵魂。为他犯下的错误受到永恒的惩戒——溺毙。"
MGC_last_for_the_radicals:0 "...最后照顾激进派"
MGC_last_for_the_radicals_desc:0 "激进派，即想要带来猛烈变革之人，在全军联盟之中，也有这么两位，索尔尼·马达瑞斯克与科尔夫·德·文尼蒂亚，索尔尼虽然是个独裁派，但是在思想上却非常诡异，他支持某种工业化教会，以工业主义迫害农民而闻名，而科尔夫更是全军同盟中的少数派，而少数派的原因？他支持恢复民主制。"
MGC_solny:0 "索尔尼..."
MGC_solny_desc:0 "索尔尼·马达瑞斯克没有动作，他的身体宛若一块紧绷的钢铁，眼中闪耀着无尽的火光，看不见的浓烟从他身体中发散出来，让大部分人都咳嗽了两声。"
MGC_release_on_ind:0 "在工业上放任他"
MGC_release_on_ind_desc:0 "卢戈·伊戈尔·佐尔坦是个混球……但是他是有个有路子的混球，在七河发生“那档子”事情之前，他一直是国内最大的对七河外贸商，但是现在，七河表面上虽然依旧坚挺，但是实际上，从卢戈那吃了苍蝇的表情来说，现在正是削弱他的好时机。"
MGC_or_korf:0 "...或科尔夫"
MGC_or_korf_desc:0 "不可思议！元帅最终选择了科尔夫·德·文尼蒂亚，所有人都很惊讶于此。"
MGC_beat_red_white_gold:0 "打击红金白"
MGC_beat_red_white_gold_desc:0 "“红金白”是科尔夫·德·文尼蒂亚的共和派下一个不起眼的共和思潮团体，但是奥宾纳斯和他的探子们似乎发现了些痕迹，一些……令人不安的痕迹。"
MGC_prisoner_of_the_panopticon:0 "环形监狱之囚"
MGC_prisoner_of_the_panopticon_desc:0 "事到如今，这场滑稽的“救国之人”的剧目也该谢幕了，马加尔斯已然在谢姆延的救国戏剧之中即将四分五裂，所有人崇拜的目光变成了一种道德上的审视。所有人都在等待他的号令，他不知道是他作为典狱长，还是一座名为马加尔斯的囚笼关押着他？\n\n他痛苦，他统治，他——将死。"

###MGC_focus_2###
MGC_nenlekov_stepped_forward:0 "嫩勒科夫挺身而出"
MGC_nenlekov_stepped_forward_desc:0 "元帅已死，全军联盟现在一片混乱，我们不能让这种混乱继续延续下去，马加尔斯必须有一位新的元帅。"
MGC_friends_of_Greater_La_Salle:0 "大拉萨尔之友"
MGC_friends_of_Greater_La_Salle_desc:0 "要说印象，和大拉萨尔熟悉的人一定知道，嫩勒科夫是个对自己人格外友好的家伙，现在他上了台，那他与他的朋友们以及自由镖骑兵们必将受益——首当其冲的就是维森迈耶·瓦列里·塔吉诺，这位共和派与君主派之间摇摆不定的半人马。"
MGC_stabilize_the_morale:0 "稳定军心"
MGC_stabilize_the_morale_desc:0 "军队之中的派系斗争早就不是什么陌生的事情了，全军联盟的各个派系无非都是靠着自己的军队上位的一群军头罢了，而现在对嫩勒科夫重要的事情就是，让这种内斗重新回到可以控制的牌局上。"
MGC_the_three_horsemen:0 "三驾马车"
MGC_the_three_horsemen_desc:0 "嫩勒科夫总不能自己处理一切，一切事情总要有个分担，而“三驾马车”这个临时制度就是为此而生——维森迈耶先生，瓦什女士，感谢你们的帮助，全军联盟会记住你们的。"
MGC_handle_the_cops:0 "处理保卫局与秩序警察"
MGC_handle_the_cops_desc:0 "保卫局与秩序警察的职能上虽然说好是一个对外，一个对内，但是实际上，二者的职能在各种问题上产生了众多重合——最重要的是他们到现在也没有真正站队。"
MGC_grand_funeral:0 "宏伟葬礼"
MGC_grand_funeral_desc:0 "向逝者致敬，向生者致意"

###事件###
MGC.0.t:0 "落幕重开"
MGC.0.d:0 "如果将一月革命被摧毁作为一场戏剧，那其遭受镇压就是终幕。\n\n但是现实不是戏剧，戏剧有结尾，但是现实没有。\n\n革命正在死灰重燃，革命正在乡间，田野，城市的小巷间；曾经被认为已经结束的革命再一次咆哮起来，嘶吼着，喊叫出这三十年他们所忍受的痛苦，他们所遭受的折磨在此不断地喷涌而出，愤怒？狂热？疯狂？或许都有。\n\n但是唯一真实的便是——\n\n革命已至\n\n无需多言，也无需表达，村社之中的男人们举起了枪，女人们举起了刀，甚至连孩子们都拿起了匕首，从混乱的黑夜中一跃而出。他们宛若一阵风暴般吹过北境，吹起了希望，吹起了火焰，吹起了愤怒，吹起了铜色的号角——战争的号角。"
MGC.0.a:0 "我等生于伟大年代……"
MGC.0.a.tt:0 "§g可以在白昼之时活动了§!"
MGC.0.b:0 "在橡树下，躺着一位共和兵……"
MGC.0.b.tt:0 "§g可以在夜幕之中活动了§!"

MGC.1.t:0 "我曾在此"
MGC.1.d:0 "谢姆延·扎布罗夫斯基嘴中嚼着嚼烟，如同一具尸体般的坐在空挡的办公室里，整个办公室充满了他口腔的声音，就像一位嘲弄着凡人的恶魔，在房间内蹑手脚脚的走着。\n\n他举目望去，目光所到之处无一不是他的荣耀，从第一次参加战役获得的英勇勋章，到守住南方防线，获得的防御者勋章，再到指挥刀，指挥枪，最后是坎达德尔的将军服与全军联盟的元帅服，他们静静的摆在那里。\n\n没人佩戴的装束就是一具尸体，就像是他一样。\n\n谢姆延依旧嚼着嚼烟，如同焦炭般的黑色的嚼烟染黑了他的牙齿，沿着他没有注意的时候流下的口水，留进了他的大胡子之中，再也看不见了。谢姆延依旧看着这空空荡荡的房间，一阵风没有，一个声音没有，只有他一人在此傻傻的坐着。\n\n人都去什么地方了呢？老人绝望的回忆着\n\n夏瓦特？列夫？卡瓦？\n\n他们不是已经死在前线了吗？因为我无能的指挥与自大的冲锋令。\n\n安妮？\n\n自从我签了那条约，我们大吵一架后，她去了东巴斯蒂亚，再也没有消息了。\n\n瓦列里？\n\n他是个好小伙，好儿子；虽然我没有见过他太多面，但是听说他在南巴斯蒂亚读大学，未来一定是可塑之才……\n\n谢姆延的一封封信从提特兰发出。\n\n“抱歉，元帅阁下，拿文件时间太久了点……”他的传令兵推开大门，只看见老元帅张着嘴巴将黑炭般的嚼烟吐出，像是一位痛苦的老人一样蜷缩起来。\n\n他当即大喊了起来，跑下楼去，抓着那军医上来。\n\n但是谢姆延暂时已经什么都听不见了。"
MGC.1.a:0 "但是他从未收到过一封回信，哪怕一封。"
MGC.1.a.tt:0 "§R长期的孤独压垮了一位八十岁的老人，全军联盟的其他人因此受益§!"

MGC.2.t:0 "春之祭"
MGC.2.d:0 "谢姆延睁开了自己的眼睛，他从未觉得如此的神清气爽，如此的……沉重。他的肉体好像已经不属于他了，他几乎是半瘫痪在白洁的床单上，只能勉勉强的坐在床上，周围围着一圈人，他们有的眼眶泛红，有的脸像是结着冰，但是更多人的人眼中只是泛起了光芒，等待着他的第一句话。\n\n但是他只是沉默着，像是在审视在场所有人的内心，是否问心无愧，亦或者对自己醒来有何看法；他的目光扫过所有人的面庞，像是要记住，又像是要忘记，无论如何——他拒绝立刻做出判断。他的每一言，每一个举动从现在开始都会被误解为阴谋的开始，他的身体目前的状况已经不能够继续执政，他必须谨慎。\n\n“元帅阁下。”最终是柯达伊斯打破了僵局，他长舒了一口气，才能继续说到“鉴于您目前身体的情况，国家政治需要有人来帮你处理。”他在这里顿了一下，看着剩余的将军与成员们，无奈的继续说着“请您做出最后的嘱托吧，无论如何国家不能接受停摆，我们也同样不允许。”\n\n有人翘首以盼，有人低头沉思，有人只是看着。"
MGC.2.a:0 "“以我的命令，听着，接下来……”"
MGC.2.a.tt:0 "§R暂时锁定所有顾问！§!"

MGC.3.t:0 "金铁与不可腐蚀者"
MGC.3.d:0 "在谢姆延的回忆中，德尼·科苏特首先带着他的那柄长斧从记忆的淤泥中拔地而出——正如他的绰号“金铁”一般，他顽强的战斗意识谢姆延也不禁赞叹与畏惧，他经常出现在前线，手持一把长柄斧，亲自作为督战队兼任前线将军，靠冷兵器与士兵在前线一块冲锋。但是抛开军事上来说，德尼的组织能力也是一把好手，他在军中组建了自己的一个党派“圣火行动”党，并且与这些党员们在前线扩大自己的党；这种行为让圣火行动党变成一个军事化极高的党派，在1960年之后，德尼的党派逐渐有更加扩大化的可能性，到现在，圣火行动已经是全军联盟军队内部相对庞大的势力了，如果放任不管，会导致什么后果可不好说。\n\n其次跃入的便是多夫兹多，他总是一脸沉思的表情，表情冰冷，让人猜不透他想要干什么。他几乎是宗教意义上的典范，乐善好施，不吸烟不饮酒不结婚，指挥部经常就在前线，曾经在一边中弹的情况下指挥打赢了一场战役，如果现实里有“圣徒”，那多夫兹多肯定就是其中之一。但是从政治角度考量，他作为虔敬学会的赞助人一直以公开发表复辟与旧提特兰相关的保守言论闻名，并且在军中纳卡教徒的声望一直不低，并且也有一批复辟者的小圈子，虽然放任其做大必然导致保皇派做大，但纳卡教与保皇派做大未必是一件坏事，以多夫兹多的道德也不像是会做出政变之事的人。"
MGC.3.a:0 "……军队事务让德尼决断。"
MGC.3.b:0 "……在军事上，多夫兹多。"

MGC.4.t:0 "长斧将军向前进"
MGC.4.d:0 "德尼·科苏特那张脸就笑成了花，他那略胖的脸扭动着，说出了赞美之词：“元帅阁下，谢谢您的信任，我一定会将我们的军队建设成我们祖国母亲最雄伟的军队。”他无法遏制的颤动着，兴高采烈的几乎化为实质。与之相对的，多夫兹多冰着脸，那透过眼镜片也无法掩盖的双眼透露着无尽的鄙夷与不满，只是静静的站在嫩勒科夫身旁继续旁听，既没有发表不满，也没有立刻与嫩勒科夫交流些什么。\n\n“但是。”谢姆延并没有计较这诡异的气氛“我有一个要求……”"
MGC.4.a:0 "“你必须禁止你的小圈子外扩。”"

MGC.5.t:0 "长斧与圣像"
MGC.5.d:0 "教堂总是神圣的，静怡的。\n\n在夜弥撒之后，所有人都离开了这里，唯留下巨大的穆勒斯圣像在无数蜡烛间静静注视着这，就像是莎书中所描绘的那样，祂无处不在，祂全知全能。脚步声打破了这份神圣的氛围，粗壮的男人与瘦弱的老人一步一步的踩在大理石之上，慢慢走向了圣像。\n\n他们口中的话语逐渐清晰，从重到轻回荡在教堂之中，他们正在最神圣的地方讨论着最世俗的东西：“当然了，瓦什嬷嬷，我会将军队变成忠于纳卡教的模样，我们的民族的青年们必须要理解，什么才是真正的信仰……”\n\n“当然，我毫不怀疑你，德尼将军。但是你在这里和我的承诺没有任何意义，我需要看见全军联盟的部队，在穆勒斯的圣言之下不断的成长，以及，我们到了。”\n\n大门被吱呀的缓缓推开，两人在穆勒斯的圣像前何其渺小，但是他们说的话题却并不渺小。“瓦什嬷嬷，当然，我们会将教会体系纳入青年军与全军联盟的方方面面，教会将会与军队合为一体，请放心。”长斧将军自信满满的说到“唯一一点就是，请您‘赞助’我们一点……社会影响力。”\n\n“当然，当然，德尼将军。” 瓦什并没有看着将军，而是看着那庞大的圣像——"
MGC.5.a:0 "“如神所愿。”"
MGC.5.a.tt:0 "§R但神祇也未曾保密§!"

MGC.6.t:0 "禁止事宜"
MGC.6.d:0 "德尼·科苏特原本花枝招展的脸一下子就失去了些什么，不知所措的回答到“元帅阁下，我向你保证，‘圣火行动’只是爱国组织，不会危害我们的祖国……”他努力的想要让谢姆延撤回前言，但是很明显，无论是独裁派内部还是其他两个派系，他们都不愿意见到德尼这个野心家能够随便在民间号令起一只他们无法掌握的军队。\n\n见四下的人都如此，德尼也只能放弃，接纳这条游戏规则。“我不想看见再一次内战，无论是活着的时候还是死了以后，穆勒斯在上。” 谢姆延喘了一口气“圣火行动可以保留，但是将会被整合为青年军，所有成年成员必须转入其他部队，就这样。”"
MGC.6.a:0 "第一条禁止事项"

MGC.7.t:0 "德·哲姆菲亚之道"
MGC.7.d:0 "多夫兹多早已预料到了这点，如果要保持军队的平衡，他就是最好用的一张牌。他在军事上从未真正的表达过过度的政治诉求，而是以学会赞助者在公开场合发表政治诉求——毕竟人都是有要求的。他舍弃了除美德之外的一切事物，比如性生活，再比如娱乐，亦或者钱财，他舍弃财产去支持虔敬学会，在生活中几乎过着古典时代贫民的生活——一切只为神圣的穆勒斯，一切也皆服务于神圣的穆勒斯；他的安排从不会出错，莎书的观点也永远是正确的，他将会重塑被七河堕落的军队，军队将会变成真正的模范之军，美德之军。\n\n就在他想着的时候，谢姆延的下一句话也来了——"
MGC.7.a:0 "“我要求你减少虔敬学会的成员。”"

MGC.8.t:0 "圣徒之会"
MGC.8.d:0 "这个世界是神圣的，属于穆勒斯的。\n\n这是这两位圣徒的共识，这次会面仅仅只是一次“誓言”——按照莎书，密谋必要在穆勒斯面前开始，在穆勒斯面前完成。\n\n多夫兹多走在前面，他的军靴在大理石上慢慢的踏着，一丝不苟的看着前方，而瓦什则慢慢的从后面走向前来，宛若从夜色中到来一般，隐藏在阴影之中。\n\n伴随着门锁咔嚓一声打开，纳卡教会的几位高层久等已久，他们看着两位圣徒走入圣殿之中，缓缓地站在穆勒斯的圣像之前。\n\n“我，哲姆菲亚的多夫兹多，在此展示我的密谋给与穆勒斯与各位神之右手们。”"
MGC.8.a:0 "“一切如莎书所录般进行”"
MGC.8.a.tt:0 "§R但世间没有不透风的墙§!"

MGC.9.t:0 "令行禁止"
MGC.9.d:0 "多夫兹多没有预料到这件事，虔敬学会被要求减少成员，这件事实际上是对虔敬学会的巨大打击；实际上真正虔敬学会的核心成员并没有多少，如果减少的话，不可避免的导致在军队内宣传话语权的丧失。但是他无法反驳，虔敬学会确实是会影响军队倾向的一个组织，并且他赞助这一组织的事实也是众人皆知的事实，不可置否的，他只能赞同这条规则。"
MGC.9.a:0 "“是，元帅阁下”"

MGC.10.t:0 "大拉萨尔之心"
MGC.10.d:0 "嫩勒科夫·多饶在谢姆延的眼中其实一直不是这么道德的一个人，他的私生活不检点，在1960年战争中，他的军事建树也其实并不多，并且在战争中大肆抢劫无辜者的财产，但是他却是少数能接纳多方意见的缓和者，他与维森迈耶·瓦列里·塔吉诺的联系颇好，作为自由镖骑兵的两人经常跨越派系在私底下交流，也与民族社会党人关系不错。但是，没人能够知道这位这位半人马实际到底支持那一派，即使他经常与多夫兹多一块出入虔敬学会，但是他却从未没有在公开场合说过支持复辟一事。\n\n或许他只是一位沉醉在享乐之中，忠于欲望的半人马、或许是藏得很深的一位其他派系支持者，但是无论怎么样，没人知道大拉萨尔在想什么，想做什么。"
MGC.10.a:0 "“……嫩勒科夫，话事人。”"

MGC.11.t:0 "均衡战术"
MGC.11.d:0 "“嫩勒科夫。”谢姆延继续嘱托到“我需要你来当全军同盟的话事人。”这话很明确，嫩勒科夫和在场所有人的派系都有上这么一腿，但是却都又不这么过于靠近，唯一可能确认的是，他较为倾向保皇派的立场与多夫兹多半个政治盟友的态度。\n\n“我希望你能够平稳航线……为我们的祖国。” 谢姆延闭上了眼睛，不愿去观察病房内愈发浓重的氛围“选择你所认为最好的选择吧，嫩勒科夫，我早该结束我的话事期了。”他即使表面上看起来如此坚决，实际上内心不断的翻涌着，他不知道他这一决定最终会造成怎样的成功，也不知道最终会如何，他只能祈求穆勒斯行行善，将风暴平定。"
MGC.11.a:0 "“是，元帅阁下。”"

MGC.12.t:0 "太阳之下无新事"
MGC.12.d:0 "共和派想革了皇帝和他所有亲戚的脑袋，而保皇派想要革了所有平民的脑袋。\n\n谢姆延在他心中这样风趣的想到，这个烂笑话他从流亡七河听到现在，可是当他必须在两者之间做出抉择的时候，他便觉得不这么好笑了。他被夹在这两个派系二十年了，也不是没有想过要平衡两派的关系，但是保皇派与共和派的矛盾就是无法妥协，共和派们不愿意在保留议会独立性的问题上妥协，保皇派们则盲目的要求君主的强力——两者几乎没法正常对话，除了嫩勒科夫这个家伙与双方都有私交，而现在让他当话事人，也只是寄希望于他能够将二者关系调和，不至于如此僵硬。"
MGC.12.a:0 "但调和无法解决的问题。"

MGC.13.t:0 "愧疚"
MGC.13.d:0 "谢姆延突然想到了自己的儿子，那个顽固的小家伙。\n\n他从小就和自己不怎么对付，从小就和他妈妈一样，喜欢南巴斯蒂亚人的诗歌文化，对自己母国的文化一眼都瞧不上，他多次教育了他的儿子，他的儿子却只是说他古板，说他老套。他也多次觉得自己的儿子是不是并非自己亲生，但是他那桀骜不驯的模样多少让他想起的年轻的自己——以及付出了一切，却什么都落了个空的自己。他做出了不可饶恕的事情，他什么也没有做到，什么也没有办到。\n\n那孩子到现在也没有回复我的一封信。\n\n他这样想到，也不由得为自己而叹息，他的儿子离开了，永远的离开了他，就像是命中注定的一般，使得他不由得岔开思路，去想想别的事情……"
MGC.13.a:0 "他接下来想到了……"

MGC.14.t:0 "梦魇"
MGC.14.d:0 "弗拉维乌斯·弗沃茨瓦夫像是魔法师般出现在谢姆延的大脑之中，他惊恐地瞪大眼睛，愤怒的怒吼到“扎布罗夫斯基！扎布罗夫斯基！你这收养的后裔！看看你都干了些什么？你都干了些什么啊？你摧毁了我的理想，你摧毁了我的改革，你却大言不惭的说你是我的好友？我的继承者？哦，可耻的扎布罗夫斯基！如果不是我早已没有了实体，我定要你人头落地！” 谢姆延绝望地盯着他那早已逝去的好友，看着他在想象中的他疯狂的怒吼着，哀嚎着，诅咒着。“你！扎布罗夫斯基！你如果还念我们的友谊！如果你还尚且残存良知，如果你还残存人性，那就去面对吧！你这怯懦的小人！你的儿子因为你的怯懦离开了你！你的爱人也因懦弱背弃你而去！呸！你的荣耀！”"
MGC.14.a:0 "谢姆延无动于衷，他的心已经死了"

MGC.15.t:0 "心死"
MGC.15.d:0 "他已经逃避了一辈子了，在大事上逃，在小事上逃，在方方面面都逃。\n\n但是现在，已经逃无可逃了，最大的追猎者已经将他寻得，那冰冷的指尖划过他的嘴唇，肆意的在他的耳边窃窃私语——那名为死的追猎者。此时的他的死已经是一件肯定的事情了，但是他依旧觉得全军同盟能够承接他的思想，他的努力，歌颂他——\n\n那是不可能的。\n\n耳畔的追猎者吐出了一句话。\n\n你将会被万人唾弃，不再被记住，所有人都会遗忘你，在那大海最深不可见的海底永恒的受溺，受苦，受痛。"
MGC.15.a:0 "命定之事，无可争议"

MGC.16.t:0 "第一根，最后一根"
MGC.16.d:0 "“给我来支烟。”谢姆延刚刚还在沉思着，并且留着关于全军同盟的指示，但是现在却不明所以的说出一句要抽烟。这让氛围变得有点尴尬，军医拿走了这些将军身上所有的烟，只是为了“不要破坏病房的环境”，但现在第一个开始破坏环境的就是元帅本人。\n\n这群年龄加在一起都能凑出300岁的家伙们面面相觑，都表示自己没有带烟，最终，还是传令兵拉来了军医，在一顿争辩之后，军医勉强给出一根香烟以及一盒火柴，并且再三嘱咐要关注元帅的身体状况。\n\n谢姆延将这根香烟叼在嘴里，颤颤巍巍的自己点燃了火柴，火焰在他年老的双瞳中反射，也在所有人面前燃烧，他缓缓的点上了香烟，点完烟后，仅仅是甩甩火柴，火柴便不再燃烧，只是发出阵阵的恶臭。\n\n他吸吮着香烟的尼古丁，香烟也在吸吮着他为数不多的生命。"
MGC.16.a:0 "点燃的香烟逐渐燃烧着走到尽头"

MGC.17.t:0 "艰难选择"
MGC.17.d:0 "俗话说“双面开刃的刀锋利，但是绝不是好刀”，这一意向简直是激进派们的化身，激进派们实际上制衡了各个派系的方方面面，说实话的，如果可以谢姆延一点也不想要管这两把锋利的双刃剑。但是现在的情况紧急，这两把刀必须选一把挥舞起来：\n\n索尔尼·马达瑞斯克带着重锤的声音与钢铁的回声在印象中现身，索尔尼在许多人看来就是一个对于现代化着迷，甚至有那么点……让人不安的家伙；如果说他提倡着大规模工业化，补贴工人，军备重整这些是看似正常的意见，但是他意图消灭农民，建立生产力崇拜，乃至崇拜机械引擎就是不可理喻的部分；但是他着实讨厌卢戈·伊戈尔·佐尔坦，如果授意放任他对工业方面的渗透，或许是对未来工业化的好帮助。\n\n科尔夫·德·文尼蒂亚随后文质彬彬的从迷雾之中缓缓走入了“牌局”，科尔夫是这个体系内绝对的少数派，他作为和一月革命的共和派们做搭子的家伙，谢姆延几乎不信任他——但是祖国需要他，该死的左派们依旧在农村乡间抵抗着，共和派刚好在合法的情况下平稳的压着左派一头，但是令人糟心的是，似乎有一群左派伪装成了共和派，正在城市间宣传已死的左派思想，科尔夫有实力也有理由去将这群家伙压下去。"
MGC.17.a:0 "“索尔尼……我们的未来交给你。”"
MGC.17.b:0 "“……科尔夫。”"

MGC.18.t:0 "无神论或死亡"
MGC.18.d:0 "那钢铁般的人，究竟是钢铁还是人类？\n\n恐怕几乎没有人能说清，索尔尼·马达瑞斯克是个偏执的疯子，很少有人能看出他在想些什么但是他始终维持着他的思想，与理想共和军这种少数派交融，许多人根本看不懂他的思想，但是鲜为人知的，他曾经用一种诗意的方式表达过自己的思想的本真理念——"
MGC.18.a:0 "“火不曾停歇，火不曾终结”"

MGC.19.t:0 "齿轮咬合"
MGC.19.d:0 "“去他的！” 卢戈·伊戈尔·佐尔坦，这个工业部门的老大，现在正在自己的“办公室”中大发脾气“这帮大老粗真的不能理解我对这个国家的贡献！我贡献了廉价枪，倒了这么多好货来这片狗屁苦寒之地！” 索尔尼·马达瑞斯克这头钢铁野兽仅仅在获得工厂的督察权后，就几乎马不停蹄的将所有工厂变成了军队的工业机械，所有股份，利益，分成统统都变成了空头支票。\n\n但是卢戈·佐尔坦依旧实际上掌控着这个国家的轻工业工厂的权利，那些大老粗们只能看懂阳谋，对他的计谋一窍不通，索尔尼·马达瑞斯克给了他一口喘息之机，他也发誓，他绝对不会善罢甘休。"
MGC.19.a:0 "“喂……巴斯塔……”"
MGC.19.a.tt:0 "§R这个选项将会支持卢戈的小动作，导致不可预见的后果§!"
MGC.19.b:0 "稍安勿躁……"
MGC.19.b.tt:0 "§R总有一天，我们会抓住卢戈的尾巴§!"

MGC.20.t:0 "最后的共和之父"
MGC.20.d:0 "提特兰人从不喜欢“共和主义”，南巴斯蒂亚与提特兰共和国令他们厌恶。而在北提特兰革命开始之后，这一局面得到了改观，临时政府少数被正式发布的文件中对南巴斯蒂亚与提特兰共和国的不喜肉眼可见，而在革命失败后，分裂的共和派们大多数流落在民间，恐惧遭到军方的清算，以松散的方式运作着，这种方式令共和主义的火焰再次熄灭了下来，北提特兰的革命好似黄粱一梦，不再有人提起。\n\n但是他们意料之外的是，全军联盟的将军——科尔夫·德·文尼蒂亚，他组织起了共和派们，让他们在自己的庇护下继续传播共和主义的思想，这让科尔夫得到了一个绰号“最后的共和之父”。"
MGC.20.a:0 "民族，虔诚，革命"

MGC.21.t:0 "落幕之后"
MGC.21.d:0 "奥宾纳斯的“秩序警察”一直是全军联盟内部的一把好手，秩序警察们作为军队下属的部队，经常去做一些军队干不了的事情比如税收，维持秩序，镇压罢工起义等等——一类的脏活。他早已习惯了这种生活，所得到的报告也通常只有简短的“任务完成简报”，以及其他人的夸奖。但是今天完全不一样，他在桌子上看见了在纳维亚的秩序警察分部发来的电报，他一开始仅仅是困惑于为何，但是当他拆开信件之后，一切都显而易见了——"
MGC.21.a:0 "“我部截获情报“红金白”正在策划暴乱。”"

MGC.22.t:0 "北人之怒"
MGC.22.d:0 "“科尔夫！滚出来！”一声粗壮的吼叫在办公楼中回荡，奥宾纳斯怒气冲冲的径直走向科尔夫·德·文尼蒂亚的办公室。“不行，奥宾纳斯先生，你不能进去……”书记官与卫兵匆忙的阻拦着奥宾纳斯，但是那粗壮的猛虎依旧势不可挡，他手中挥舞着那张电报，高声大喊着“你这共和主义者，睁开你的眼睛看看！元帅才刚刚病倒，你手底下的共和派猪猡们就已经等不急了！”。\n\n他挥舞着双手，即使他的身体被卫兵死死的抓着，将那张纸丢在办公室之前，恼怒的继续说到“你要是想要复辟共和主义者的混乱政治，你不如把这个位置给我坐！”\n\n科尔夫在办公室里，只是静静的听着，容忍着外面的混乱，然后慢慢拨通了一个电话……"
MGC.22.a:0 "“红金白们越界了。”"

MGC.23.t:0 "环形监狱"
MGC.23.d:0 "“听说大元帅病倒了？真不知道日子怎么才能过下去……”一个男人在酒吧中和他的酒搭子说着。\n\n“你们没有听说吗？共和派正在北方卷土重来，我有个朋友是秩序警察，他和我说了这事！”一个青年在学校里和他的同学们说着\n\n“如果再加税，我要怎么才能活得下去啊！”一位地主这样和妻子抱怨到\n\n“女士们！看我……打靶！”一位醉醺醺的军人在妓院中这样说到\n\n“开门，保卫局！”一扇门的背后传出声音\n\n“我……” “我们……” “未来……” “活……” “死……”"
MGC.23.a:0 "在这名为囚室的国度……"

MGC.24.t:0 "无人的空房"
MGC.24.d:0 "谢姆延享受着这片刻的宁静。\n病床虽然被设计的柔软无比，阳光从窗户里照射进来，元帅受到了最高规格的安置。\n真的如此吗？\n谢姆延的一切物质需求都被满足了，但是精神需求却一个都不在了。\n当他说完那些话后，只有少数人还来探望他，表露出对现在政局的担忧与不安，亦或者担忧国家的未来——但是谢姆延要的不是这些，决不是这些。\n夏瓦特，列夫，卡瓦，弗拉维乌斯，安妮，瓦列里\n穆勒斯曾经给予了他的一生，但是他舍弃了他们\n仅为荣誉。"
MGC.24.a:0 "唯有死神恭候您……"

MGC.25.t:0 "谢幕"
MGC.25.d:0 "“元帅阁下，该洗脸了。”传令兵敲了敲门。\n无人应答\n“元帅阁下，该洗脸了，请让我进去。”传令兵突然有了种不安感\n无人应答\n“元帅阁下，请让我进去”他开始声线变粗\n无人应答\n“请原谅我，元帅阁下”他打开了门\n谢姆延·扎布罗夫斯基安静的躺在床上，夕阳照在他苍白的脸上\n传令兵不敢置信，将手放在这位元帅的鼻子之下。\n这位有罪之人早已毫无呼吸。"
MGC.25.a:0 "§R“终”§!"
MGC.25.a.tt:0 "§g谢姆延·扎布罗夫斯，北坎达德尔王国将军，七河军团元帅，至高提特兰全军同盟的元帅及领袖，北提特兰各城市的解放者，北提特兰乡村的解放者，卑劣的卖国贼，可耻的农奴制复辟者，寡妇制造机，可悲的孤家寡人，有罪之人——魂归穆勒斯圣座下，愿他安宁。§!"

MGC.50.t:0 "漩涡中心"
MGC.50.d:0 "瓦夏日复一日，过着一模一样的工作，在工厂中不断劳动，领取工资，回到他那家徒四壁的房子中与自己的妻子孩子过活。他的日常生活就是如此无聊，唯一可能有趣点的事情就是喝点小酒，和工友们聊聊那些巡查员又干了哪些畜生事，就这样，反复以往将日子一天天过下去。\n\n但是今天不一样，即使是瓦夏这位名不见经传的小工人也感到了事情的不对劲，大批大批的军人堵住了大街，禁止通行，所有军人右臂上都裹着黑色的布料，排成一列，将大街清空了。许多人在军人的人墙之后好奇的看着，不知道发生了些什么事情。\n\n他们看见远远的，先是一些声音，然后从他们目光所及之地，一台装甲车缓慢的从街道的尽头驶来，这台在收复战争中尽显荣光的老式装甲车现在被改装成了广播车辆，用它那大喇叭广播着消息。\n\n“通告全国，通告全国，据新任全军联盟元帅嫩勒科夫阁下通报，我们亲爱的的前任元帅阁下谢姆延·扎布罗夫斯已于前日魂归穆勒斯王座……”\n\n消息一旦传开，就已经不是能够控制的了，一时间，有些人只是怔怔的站住，有些人开始大哭起来，一些女性在哭泣的时候还直接昏厥了过去——\n\n但是其实，大家都没有这么敬爱元帅，此时的哭泣仅仅是一种记忆的离开，与对现实的不信任，哭泣只是为了应对这一消息的庞大信息。而瓦夏则迷茫着，看着那钢铁巨兽缓缓离开，他什么也不知道，他什么也没想，只是接受了这个消息，回到了家。"
MGC.50.a:0 "洪水滔天"

MGC.51.t:0 "沙上之塔"
MGC.51.d:0 "嫩勒科夫总是那副悠哉的模样，和他的下属们粗野的聊一些事情，时不时玩消失，回来的时候谈论着其他事情。他总是油腔滑调，很难想象他和多夫兹多是半个政治盟友，但是他总能讨好所有人，给德尼·科苏特一点七河艺术品，给索尔尼·马达瑞斯克送去南巴斯蒂亚产的汽车，和科尔夫·德·文尼蒂亚一起去铁路旁遛弯——他清楚所有人的爱好。\n\n但是这并非没有代价，代价是虽然他被视为一个保皇派，但是实际上他与大部分人都没什么关系，这缺点在他成为了全军联盟的领袖之后变得格外明显起来，他没有真正属于自己的势力，他必须提拔自己的势力，才或许能站稳脚跟……"
MGC.51.a:0 "“于沙上的塔楼”"

MGC.52.t:0 "浮生一日"
MGC.52.d:0 "瓦夏从不关心政治，他只是一个斗升小民，只需要活下去，就是穆勒斯保佑了。\n\n但是，今天他必须也得关心关心了——一群军警和军人在他的工厂里对峙了起来，两边拿着枪，激烈的就这间工厂的归属权展开了骂战。他和工友们也被迫夹在这两者之间，看着这两拨人不断对骂，而他们只能在旁边默默地不满，厂子的工资是按照工作时间结的，这种突发事件一来，他们这些人的工资又要往下跌一跌。\n\n他这样想着，越过对峙的两拨人，看着另一边的监工们，果不其然的，监工们正在笑着看着对峙，想着今天又能扣多少工人工资，然后提成到自己工资里。\n\n真糟糕。\n\n就在瓦夏还在想的时候，在监工眨眼的时候，在唾沫还在空中飞着的时候。\n\n军队举起了枪，枪口在一瞬间闪起白光。"
MGC.52.a:0 "“————”"

MGC.53.t:0 "跗骨之蛆"
MGC.53.d:0 "伴随着三驾马车的格局被嫩勒科夫建立起来，他身上的担子终于少了那么一点，他终于有可以过上有大把时间可以胡吃海塞的日子了。正在他规划着今天干完吃什么，邀请谁，到什么地方去吃的时候，他的传令兵突然闯了进来。\n\n“元帅阁下……”传令兵才开口，嫩勒科夫不悦的声音就传了过来“我说过，没有紧急消息不要在下午6点后找我，我有许多安排……”传令兵被这话噎了一下，但是还是匆忙回复到“是的，元帅阁下，当然，您的休息很重要，但……”他将手上的电文拿了出来“紧急消息。”\n\n“好好，让我看看到底是哪个马驹在我休息前还在打扰……”他接过电文，漫不经心的扫视了起来，但是马上他就被迫重新看了一遍又一遍电文。"
MGC.53.a:0 "“……真他妈的见鬼。”"
MGC.53.a.tt:0 "§R卢戈·伊戈尔·佐尔坦干完了他的最后一票§!"

MGC.54.t:0 "跗骨之蛆"
MGC.54.d:0 "瓦夏，我们虽然认识的时间并不多，但是我们依旧志同道合，现在我成了全军联盟的元帅，我自然会对你好，别说这是什么为职务之便，我知道你这人太较真，所以当你收到这封信的时候，事情我已经帮你办完了。\n\n关于你之前一段时间对秩序警察的抱怨，我之前没有什么手段帮你，但现在我已经帮了你——我把职权彻底划清了，当然，更倾向保卫局，我猜你终于可以不在吃饭的时候抱怨秩序警察的探子干扰你的部下活动了。\n\n还有，帮我为卡莎和小勒夫表达一下我想他们，上次家庭聚会上小勒夫向我们展示了他跑的真是有他父亲的风范，作为他的教父，我也很高兴他能这样。\n\n以及下个礼拜的野外自由跑别忘记参加，上个礼拜你就没来。"
MGC.54.a:0 "人生无常"
MGC.54.a.tt:0 "这封信被阅读后得到了一点不满，一点高兴，随后被放进了保险箱里。"

MGC.55.t:0 "清场"
MGC.55.d:0 "葬礼总是十分重要的，对所有人都是如此。\n\n军队早早的的就不断的在卜德佩西亚的大道，未来葬礼的巡游路线上不断的扫荡着，一切行为不正常的人都会被立刻逮捕，交给保卫局处理。军靴的声音不绝于耳，24小时都从不的停止，在居民们的耳旁不断的回响着，就像是一道道审判的命令一样，诉说着未来会发生的事情——卜德佩西亚从不宁静，也从不伪善。\n\n夜色正深，人们总是觉得自己有几天会消失几个邻居，朋友，然后某一天自己也会消失。他们惴惴不安，他们恐惧自己的房门被莫名敲响，全军联盟内部的分裂已经众人皆知了，但是可怕的从不是分裂——而是伤疤，鲜血淋漓。\n\n“快来，快来！”瘦男人捏着喉咙，轻轻的说道“我们现在必须跑到普热区去。”\n\n“哦，真见鬼。”胖男人说道“就不能换个时间吗？现在军岗还没换班……”\n\n“就是要在换班前干这件事！拿好，我们走！”瘦男人急促的四周看了看，将手提的包强行塞给了胖男人。"
MGC.55.a:0 "你要领我到什么地方去……"
MGC.55.a.tt:0 "§g你只要留心听着我要告诉你的话——§!"

MGC.56.t:0 "“住声！不要说下去”"
MGC.56.d:0 "“我真是不明白了，为什么大家都在觉得嫩勒科夫是我们唯一的救星……”\n\n“小心点，列夫，这话别让其他人听见了，不然准有你好看！”\n\n“没关系，现在不是换班的时间，没人会来这，而且其他人说不定也会赞同我的说法。”\n\n“哦，天哪，列夫，你难道忘了上个礼拜全军团通告的那家伙了吗？他就是觉得没人会听到他说反对嫩勒科夫就被保卫局带走了，我可不希望你也出现在那名单上。”\n\n“好吧，好吧，我们不聊这个了，你老婆怎么样了……”\n\n就在他们不断找着话题，打发这无聊的站岗的时候，一团黑影从黑夜的迷雾中遁出，悄悄的躲过两位士兵的眼神，从一条小巷跑入了另一条小巷。\n\n“刚刚是不是有什么地方过去了？”\n\n“放心吧，列夫，我连一只小老鼠也不见走动。”"
MGC.56.a:0 "啊！再会，“正直的”军人！"
MGC.56.a.tt:0 "§g瞧！瞧！它又来了！§!"

MGC.57.t:0 "我相信你们的忠心"
MGC.57.d:0 "嫩勒科夫看着葬礼的计划书，不断确认着，确认着一项项的事项。\n\n巡游安全，确认。\n\n民众期望，不重要\n\n尸体处理，完成\n\n鲜花与花圈，已经在准备了\n\n其他将军的行程，确认\n\n新的纪念宫，正在筹备\n\n……\n\n一大串细则他都省略掉了，只是粗略的扫了一眼。\n\n他更关心她现在眼下的事情，有人的把柄被翻出来了，是纳卡教会那边的的保卫局特工查出来的，他们正在密谋对付自己，而他就要在众目睽睽下反戈一击——或者用斩草除根更加合适一点，就像是他那些七河草原上的亲戚们一样，对反对自己的人处以极刑，树立自己的权威。\n\n他面前，两三个保卫局的特工正在听着他的下一步看法。\n\n“就像是我刚刚说的那样，在葬礼上，你们……”"
MGC.57.a:0 "伪装成教士，给科苏特那杂种来一枪……"
MGC.57.a.tt:0 "§g罪恶的行为总有一天要发现……§!"
MGC.57.b:0 "伪装成军队里的民族主义者，给哲姆菲亚这家伙来一枪……"
MGC.57.b.tt:0 "§g……虽然地上所有的泥土把它们遮掩。§!"

MGC.58.t:0 "白昼"
MGC.58.d:0 "又是一天到来。\n\n瓦夏从床上默默的坐起，轻轻的离开了被窝，没吵醒妻子，换上衣服，吃完昨晚晚饭的残羹。\n\n外面的天还没亮，夜幕的裙边依旧笼罩着大地——但是也不久了，白昼正揪着夜幕的衣裙，他正要赶来，他正欲驱散大地上的不义，正欲驱散夜幕所笼罩的罪恶。\n\n但是对于瓦夏来说，这是一天工作的开始，重复，繁复的工作的开端。自从之前军警和军队在他的厂里交火后，他在的厂先是放了两天假，然后为了补上这两天，将工作时长往一天的头上和尾巴上这么一加，便成了规矩。\n\n他换好鞋，看了看家里的妻子和孩子，便上班去了。\n\n他刚刚到厂里，就看见戈夫和德尔这两个老光棍居然来的比自己还早——这简直不可思议，这一胖一瘦两位不仅没有找到个好老婆，在工厂里也是做体力的搬货活的，而现在，他们却一大早就在厂里窃窃私语。瓦夏不由得稀罕到，远远地对他们俩说到：“两位昨晚干什么去了？今个大早就来了？”\n\n那两人先是吓了一跳，互相看了看，然后才贱兮兮的笑着回复到：“普热区那有两个女人不错？你个有老婆的也要去试试？”\n\n瓦夏只是笑着，结束了这段对话。"
MGC.58.a:0 "就像一个罪犯……"
MGC.58.a.tt:0 "§g……听到了可怕的召唤似的惊跳起来。§!"

MGC.59.t:0 "红幕"
MGC.59.d:0 "小加瓦总是这么好动，这么调皮。\n\n他今天又从农田里溜了出去，跑去村东头玩。\n\n村中的大人们最近和一些陌生人走的很近，他们互相交流着，互相谈论着加瓦听不懂的东西，双眼中透露着悲凉与哀伤，那些陌生人穿着破旧的衣服，扛着一把把长长的木棍，衣袖上沾满污泥，但是能看得出来一点金色，一点红色。\n\n但是加瓦从不想这么多，他只是盲目的跑着。\n\n村头从他的面前消失，他跑入了旷野中。\n\n一直到夜晚，他才开始疲惫，开始回村。\n\n他看见了浓浓的烟，看见了冲天的火\n\n火，火，火\n\n村子只剩下大门还未被点燃。\n\n上面挂着曾经慈祥的村长，以及一块木牌\n\n加瓦从未痛恨过自己如此不识字。"
MGC.59.a:0 "牌子上写着的是“我们是共和派猪猡”。"
MGC.59.a.tt:0 "§g天上的神明啊！地啊！再有什么呢！我还要向地狱呼喊吗？§!"

MGC.60.t:0 "开幕"
MGC.60.d:0 "在许久的筹备后，谢姆延元帅的葬礼终于开始了。\n\n军人们沿着大街一望望不到尽头，站在大街的两侧，就像是30年前一样，七河军团开入了卜德佩西亚，现在，军队们也在为这位逝去的元帅打开进入卜德佩西亚的路。巨大的花圈车与巨大的谢姆延元帅照片在装甲车上慢慢开来，从人们的目光的尽头，一点，一点的完整出现。这样滑稽的组合让人觉得怪诞无比，但是却又不得不一幅悲伤的模样，在军人背后哭泣，也不知道是真的为元帅之死而哭，还是为其他什么而哭。\n\n瓦夏就这样和他的工友们默默地看着，车子慢慢的驶过，无喜无悲。他们只是看着，然后嘴里不断交流着一些过去的事情，说着悄悄话。\n\n但是瓦夏总觉得有什么不对劲的地方。\n\n就好像，他命中注定与这件事擦肩而过。"
MGC.60.a:0 "啊，堂皇的诡计！"
MGC.60.a.tt:0 "§g借了许多好听的理由为名，掩藏着狰狞丑恶的鬼蜮的面貌§!"

MGC.61.t:0 "颠倒混乱的时代"
MGC.61.d:0 "装甲车之后是数个方阵，由各位将军所领导。\n\n这是全军联盟的惯例，军事游行代表他们对于临时政府的胜利，但是今天，各个军团的出场顺序似乎被打乱了，人们看着军团兵们慢慢走着，远远地看着那将军慢慢的到来——\n\n让我们先别揭晓谜底，让我们看看瓦夏和他的朋友们。\n\n在短短的一会，这里的氛围已经变得欢乐了起来，在第一位将军是谁的问题上，瓦夏押了五块给德尼·科苏特，而他的几个朋友们押了多夫兹多·德·哲姆菲亚，他们这些苦中作乐的人们只能在这种时候享受赌博的快感，消磨无趣与无聊。他们全神贯注的看着那骑马的将军，瓦夏更是紧紧盯着第一方阵的最后——紧张的他搓了搓手，无意间扫了一眼附近。\n\n他此生难忘此时所见。\n\n一把枪在他的视野里陡然出现。\n\n然后是几次枪声，那将军随即落马。"
MGC.61.a:0 "瓦夏的五块钱押对了…… "
MGC.61.a.tt:0 "§g注定在今天，就不会是明天……§!"
MGC.61.b:0 "瓦夏丢掉了他的五块钱，真讨厌"
MGC.61.a.tt:0 "§g……即使逃过了今天，明天还是逃不了§!"

MGC.62.t:0 "另一边……"
MGC.62.d:0 "“……任务完成了，大人。”\n\n一位保卫局的特工在嫩勒科夫的耳边说到，嫩勒科夫不可否认的点点头，笑着示意他可以走了。嫩勒科夫正幻想着，幻想着自己的伟大，他将成为权势最大的人，最伟大的“汗”，全军联盟的掌控者。\n\n他都在想象自己统一提特兰之后的事情了，无尽的财富，无尽的惬意在他身边徘徊，他将如同古老的提特兰列为多米那特一样伟大，直上青天——所有人都会呼唤着他的名字，他的名，他的姓。\n\n他的耳畔轻轻的刮过一阵风，一阵阴冷的风。\n\n那道风中的字符一个不落的落入了他的耳内——"
MGC.62.a:0 "“锋利的刃上还涂着毒药”"
MGC.62.a.tt:0 "§g滴答……滴答……滴答……§!"

MGC.63.t:0 "啊，骄傲的死神！"
MGC.63.d:0 "伴随着轰鸣，一切皆已不可考据。\n\n所有人都听到了普热区那临时演讲台的轰鸣，不知多少炸药从其下爆燃而上，宛若神罚般激起了震撼，火光笼罩了这座新兴的首都，随后而来的便是烟雾。\n\n嫩勒科夫·多饶已死，伴随着无数阴谋，诡计与憎恶灰飞烟灭。\n\n而就在所有人都茫然不知所措的时候，城内的广播突然开始了广播：\n\n“这里是马加尔斯临时政府，这里是马加尔斯临时政府……”\n\n陌生男人的声音在大街小巷回响着，散发着一种不真实感。\n\n“……虽然我们遭遇了挫折与失败，但是我们永不放弃……”\n\n白昼的战马正在一点点落下，没入地平线。\n\n“共和革命永存，而暴君必尝恶果。”\n\n夜幕的军团正在一点点从地平线上升起。\n\n“革命万岁！共和万岁！自由万岁！”"
MGC.63.a:0 "白昼与夜幕的战争拉开了帷幕"
MGC.63.a.tt:0 "§Y春季阴谋系统§! §R不可再用§!"

MGC.64.t:0 "嫩勒科夫元帅万岁！"
MGC.64.d:0 "仪式上什么都没有发生，嫩勒科夫成功的当上了新的元帅，虽然时间好像略微抽象了起来，但是他的愿景与伟大理想都实现了，共和派们倒在他的卫队之下，剩下的将军们也都放弃了自己的军权，将大权全部交给了自己。\n\n“简直是不可思议的幻梦。”他这样想着“如此伟大，如此……”\n\n一声爆炸响起——"
MGC.64.a:0 "伟大是一种指令，建立在玩家手指之上"

###新闻###
MGCNews.1.t:0 "谢姆延·扎布罗夫斯之死"
MGCNews.1.d:0 "一则消息从北提特兰传来，目前北方提特兰的军阀组织的领袖谢姆延·扎布罗夫斯不幸去世，这位80岁的老人被认为是世界上第一个挺身而出，遏制了共产主义者的伟人。\n\n提特兰共和国方面对他的离世并没有发表什么，坎达德尔方面仅仅只是稍微表彰了他对激进主义的镇压，反而是最近一段时间再国际舞台上略微沉默的七河方面对此表达了一篇长篇大论论述谢姆延·扎布罗夫斯的功绩。\n\n这位老将军的逝世不知道会对北提特兰的局势造成何等影响，还需等待更进一步的消息。"
MGCNews.1.a:0 "那是什么地方？"
MGCNews.1.b:0 "向我们的工具表达一丝“同情”"
MGCNews.1.c:0 "一个军头都让他们吹上天了？"
MGCNews.1.dd:0 "去死吧，独裁者！"
MGCNews.1.e:0 "即使周遭只有讽刺与沉默，但马加尔斯将会知道谁才是叛徒"
MGCNews.1.f:0 "白元帅，黑乌鸦！"
MGCNews.1.g:0 "让我们庆祝对手的败亡"
MGCNews.1.h:0 "我还能说什么？"
MGCNews.1.i:0 "“冬日元帅”倒下了"
MGCNews.1.j:0 "无需细看，丢入壁炉"

MGCNews.2.t:0 "北提特兰第二次共和革命？"
MGCNews.2.d:0 "在先前一段时间中，已经被认为平稳过渡了权利的马加尔斯邦联再次陷入了混乱之中，根据本报在场记者的口述，在当天早上九点，马加尔斯的一位将军遭到了刺杀，仅仅在半个小时后，原定对外进行悼词临时讲台发生了巨大爆炸，原本被认为将带领邦联的嫩勒科夫·多饶在爆炸中死亡。\n\n而在权利真空中，被认为早已被消灭的马加尔斯临时政府通过抢劫电台在公开频道承认了爆炸案为临时政府所为，并且在马加尔斯官方临时电文中，也表明了共和革命似乎正在重新席卷北提特兰……"
MGCNews.2.a:0 "北境告急……"
MGCNews.2.b:0 "什么叫“提特兰共和主义”？"
MGCNews.2.c:0 "这次我们可没有精力了……"
MGCNews.2.dd:0 "还能再乱？"
MGCNews.2.e:0 "洪水滔天"

