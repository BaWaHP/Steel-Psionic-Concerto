###政党名称###
MGC_pioneer_communism_party:0 "北提特兰自由骠骑总指挥部"
MGC_pioneer_communism_party_long:0 "北提特兰自由骠骑总指挥部\n§g北提特兰地区向来闭塞。共产主义的火焰能烧到这里来，纯粹是因为军阀与战争的缘故，而北提特兰自由骠骑总指挥部就是如此，他们举起手中的枪与刀，变作半马，在乡间与农村之中不断地进行游击。他们自认为不是为了什么更高尚的理想，也并非为了什么低下的物欲，是自由骠骑的本能催动着他们，让他们继续前行，为了自由与平等而战。§!"
MGC_revolutionary_communism_party:0 "全国临时政府"
MGC_revolutionary_communism_party_long:0 "全国临时政府\n§g50年代边防军推翻北王国政府后组建了开明军政府，然而弗拉维乌斯的死亡与军政府的失信最终引发了一月革命。在革命的第一时间，全国临时政府便组建起来，但是情况让所有人都失望了，“五月恐怖”摧毁了制宪议会，随后全军联盟的归来彻底击垮了临时政府一年的政治实验。§!"
MGC_worldunion_socialist_party:0 "红金白党团"
MGC_worldunion_socialist_party_long:0 "红金白党团\n§g红金白党团是少数脱离全国临时政府的左派们组织起来的泛左翼党团，他们伪装成较为激进的共和派，在共和派的军区之中宣扬着平等，自由，与民族解放。虽然不少共和派已经发现他们并不是真正的共和主义者，但是他们依旧选择放任和协作。§!"
MGC_worldunion_democrat_party:0 "马加尔斯民族社会党"
MGC_worldunion_democrat_party_long:0 "马加尔斯民族社会党\n§g马加尔斯民族主义实际上历史非常之短，仅仅在伟大战争之中，这一民族主义思想才刚刚发源，但是在混乱且饱受压迫的北王国之中，这一思潮迅速的占据的一片自己的位置，他们既不是提特兰人，也不是七河人，他们是独立的马加尔斯人，伟大的马加尔斯人。§!"
MGC_liberal_republican_party:0 "人民解放协会"
MGC_liberal_republican_party_long:0 "人民解放协会\n§g人民解放协会是北提特兰大地上最早的共和主义政党，他们在无数次镇压与起义中不断的激进化，达到了现在的位置。在一月革命中，他们参与了共产主义者的制宪，但是在其他派系争吵的时候，他们直接被排出了制宪——无奈，他们只能去投靠全军联盟的科尔夫·德·文尼蒂亚将军，在遇到了比想象中更加的优待后，他们便在科尔夫将军的军区驻扎了下来。§!"
MGC_conservative_republican_party:0 "现代化虔敬学会"
MGC_conservative_republican_party_long:0 "现代化虔敬学会\n§g在北提特兰，宗教的影响堪称无处不在，尤其是全军联盟的多夫兹多·德·哲姆菲亚将军，他几乎过着清教徒式的生活，以好勇斗狠闻名，虔敬民族学会就是他资助的产物，他们试图恢复一种传统的生活，但是同时不停止对于国家现代化的崇拜，对于一切工业化近乎痴狂的称赞。§!"
MGC_authoritarian_republican_party:0 "“至圣修会”"
MGC_authoritarian_republican_party_long:0 "“至圣修会”\n§g圣哉，圣哉，圣哉\n我等于地上的王\n波佐利的塞克斯图斯\n我们愿称您为王\n臣于穆勒斯之座§!"
MGC_national_socialist_party:0 "理性前卫联盟"
MGC_national_socialist_party_long:0 "理性前卫联盟\n§g自工业革命开始，机械与理性的力量就在改造整个巴斯蒂亚，这让许多人为之而着迷，一位伟大的半人马贵族在世界大战期间在癫狂的战争中感到了理性对他的召唤，他对此感到无比的狂热，以自己的名义组建了理性共和军，但是与其说是一个派系，不如说是一个崇拜着名为理性的教团，他们崇拜着工厂的黑烟，诋毁着一切其他意识形态与宗教，而一切仅为一句格言——“无神论或者死亡”。而在北方，理性共和军们得到了索尔尼·“烈火”·马达瑞斯克将军的赏识，他们组建起了自己的组织，用更实践主义的角度去实践神圣的理性。§!"
MGC_authoritarian_nationalism_party:0 "至高提特兰全军联盟"
MGC_authoritarian_nationalism_party_long:0 "至高提特兰全军联盟-弗拉维乌斯派\n§g在一个高度军事化的国家内，不可能有人不对这种现状想更进一步的，弗拉维乌斯派就是如此，他们是全军联盟中的军事派，但是由于他们的存在遭到了谢姆延元帅的打压，但是由于和圣火运动的关系密切，他们也被视作圣火运动的傀儡团体。§!"
MGC_paternal_autocrat_party:0 "至高提特兰全军联盟"
MGC_paternal_autocrat_party_long:0 "至高提特兰全军联盟\n§g悬崖在面前，狼群在背后——提特兰谚语\n\n至高提特兰全军联盟只是一个组织或者军事化政党，而非“军政府”。这就是全军同盟对于自己的定位他们并没有彻底摧毁北提特兰共和革命的遗产，而是披着共和革命的旗帜建立了一个“不民主的邦联”。虽然谢姆延元帅依旧开放了工会与农会的存在，但是这两者被全军联盟的军人们牢牢地把握着，但是同时全军同盟也拒绝更进一步的军事化。§!"
MGC_wizard_rules_party:0 "黑阳教团"
MGC_wizard_rules_party_long:0 "黑阳教团\n§g黑阳崇拜是提特兰半岛特色的一种诡异崇拜，他们歌颂黑阳王的法力强大与魔权暴政的伟业，但是在从未遭受过南方魔权统治的北方，他们很难有什么支持的人。§!"
MGC_religious_extremism_party:0 "至高提特兰全军联盟"
MGC_religious_extremism_party_long:0 "至高提特兰全军联盟-教权兵派\n§g保守派永远存在，并且在马加尔斯这个保守主义高发地区，保守派们尤其多。教权兵派是共和革命时代的老遗产，他们是北提特兰激进宗教组织的民兵，在全军联盟反攻之后，他们被作为宗教派系与保皇主义者的支持者被整合入了全军同盟。§!"
MGC_anarchism_party:0 "“零点”"
MGC_anarchism_party_long:0 "“零点”\n§g“零点”是一群技术乐观主义者的团体建立的松散团体，他们力图创造一种完全平等的超生物个体社会的无政府原始社会。§!"

###领导人###
MGC_pedrofi_freedom_faddas:0 "裴多菲·“自由”·法达斯"
MGC_assemblee_nationale:0 "国民议会"
MGC_free_parliament:0 "自由议会"
MGC_gyurgy_northrop:0 "久尔吉·诺思洛普"
MGC_alani_vallars:0 "阿兰尼·瓦拉尔思"
MGC_supreme_theological_council:0 "至高神学委员会"
MGC_supreme_court:0 "至圣庭会"
MGC_the_atheist_jury_north:0 "“无神论”裁判团-北方派"
MGC_no_uni_leadership:0 "无统一领导"
MGC_the_order:0 "“教团”"
MGC_supreme_tetrarchan_allied_forces_char:0 "至高提特兰全军联盟"
MGC_supreme_tetrarchan_allied_forces_char_desc:0 "至高提特兰全军同盟的本质是六位王国将军的同盟，而这些将军又分为了三派，共和派，独裁派和保皇派，在意识形态分歧之后，将军们无关意识形态的私人关系们又构成了另外的一张关系网，这些关系网实实在在的控制着整个马加尔斯。但是，这些关系网仅仅不过是维持现状的一种手段，但是这种手段也无法支撑多久了，其中最老的，最有声望的元帅谢姆延·扎布罗夫斯基已经垂垂老矣。\n\n他作为全军联盟的支撑柱与权衡之人，他已经尽力做了他所能做的一切，无论是镇压革命，为了祖国而战，但是他已知道最终的结局了——“联盟”将亡，而胜者将会在其上崛起，决定北方的一切，§9一切§!……§R一切§!。"
MGC_supreme_tetrarchan_allied_forces_char_desc_2:0 "斯人已逝，前途未卜。\n\n全军联盟的支柱已经崩毁，谢姆延·扎布罗夫斯元帅已死，全军联盟内部的矛盾已经展露了出来，就像是一道深入内脏的伤痕，将血肉抛洒在所有人面前，新任元帅嫩勒科夫·多饶必须做出自己的决断，满足各方的需求。\n\n社会在咆哮，大众正在我们政府失能的状态中暗流涌动，军队默不作声的站在各方的身边，七河方面的消息正在越来越糟糕，一切都在变得更糟——或者，§R更加糟糕§!？"
MGC_technological_singularity_combination:0 "技术奇点拼合体"

###民族精神###
MGC_supreme_tetrarchan_allied_forces:0 "至高提特兰全军联盟"
MGC_supreme_tetrarchan_allied_forces_desc:0 "自从在七河联邦的暗地资助下军政府最终镇压了一月革命，共产党被击败，进入地下活动，而全军联盟内部的六巨头们也开始互相心生间隙。如果不是一月革命的余波并没有散去，乡村地带依旧时不时会出现共产党人，他们也不会组建全军同盟。六巨头们互相争夺着全军联盟的领导权，虽然看似角逐激烈，但是他们也并非铁板一块——秘会，人情，利益交换，当你手上的牌还未用尽，谁会想先掀桌呢？"
MGC_so_be_the_end:0 "大幕已落…吗？"
MGC_so_be_the_end_desc:0 "虽然一月革命政府在全军联盟与反共志愿军的协助下被摧毁，但是在村庄中，在田野中，在旷野之中，革命依旧在那里。即使被击倒，被焚毁，被杀害，革命的血旗依旧高歌着，存续着，在河流古怪的咆哮中静静等待着……\n\n§R帷幕下流出一丝鲜血……§!"
MGC_beneath_the_luxrious:0 "纸醉金迷之下……"
MGC_beneath_the_luxrious_desc:0 "要说提特兰北方最多的东西，人们能回答两个，一个是农民，另一个是粮食，农税像是一只巨龙盘踞在所有农民的头上，城市里的老爷们购买着七河的产品，而乡间的农民们则把一车又一车的粮草向北，低价出售给中巴斯蒂亚和七河，履行着那些镇压他们的黑乌鸦们签署的条约。\n\n§R农民们越是困苦，城里的乌鸦们就越是能打扮的像是皇帝，农民们越是痛苦，外国的人们吃的就越是舒坦。§!"
MGC_rich_black_earth:0 "黑土地，血沃肥"
MGC_rich_black_earth_desc:0 "北提特兰天生就是地主和老爷的沃土，古提特兰时期的城市们无所不用其极的压迫农民们产出粮食，这当然激起了农民们的反抗，然后老爷们又多了一样新肥料——人血和人肉。\n\n提特兰的贵族法师们用魔法将抵抗的农民活生生的分解，捣乱，搅碎，然后与土地融为一体，这样对于产出确实有那么一点帮助，也能威慑农民们。久而久之，随便将农民变成肥料变成了北方的传统，在毫无魔法的半人马迁入后，这一传统更加的激进了起来，半人马被魔法肢解后，土地的肥力是原先的一倍多。\n\n就这样，这片土地上的人类和半人马农民们逐渐被磨去了原本的民族属性和民族愿景，他们逐渐沦为了一种相同的人——农奴。"
MGC_free_hussars:0 "自由骠骑军"
MGC_free_hussars_desc:0 "自由骠骑军从最早被其他半人马部落逃难到提特兰半岛的半人马到如今半人马与人类混居的社群状态，从某方面来讲已经是一种全新的民族传统。在一千多年以上的混居状态下，半人马和人类也习惯了双方的习俗，并且似乎诞生了一种全新的民族认同……"

MGC_black_trade:0 "黑色贸易"
MGC_black_trade_desc:0 "卢戈已经联系上了下家，他既然得不到好，那么谁也别想得利！"
MGC_regaining_industries:0 "收复工业"
MGC_regaining_industries_desc:0 "卢戈已经对工业产生了不可扭转的后果，以及其产物——混乱的工业生产与倒卖生意，我们必须收复工业，重新建立我们的生产体系。"

MGC_settle_the_controversy:0 "平息争议"
MGC_settle_the_controversy_desc:0 "为了全军联盟的团结，一些过于尖锐的争议必须被平息，无论是独裁还是共和，保皇，一切的一切都可以稍后再议。"
MGC_ineffective_compromise:0 "§R无效的妥协§!"
MGC_ineffective_compromise_desc:0 "§R妥协毫无意义\n全军联盟的根基正在进一步崩坏§!"
MGC_whitewash_the_situation:0 "粉饰太平"
MGC_whitewash_the_situation_desc:0 "三驾马车所代表的三个派系平稳的将政府高层在过渡期的职能瓜分了干净，只要一些时间，完成过渡之后，国家将会重新稳定下来。"
MGC_chaotic_economy:0 "§R经济混乱§!"
MGC_chaotic_economy_desc:0 "§R卢戈·伊戈尔·佐尔坦跑了！这个最大的工业掌管人跑了！\n\n而我们的工厂的各种报表现在被查出来大规模伪造的痕迹，甚至有些工厂有“不存在的产出”，我们的工业产出正在崩溃，自由落体！§!"
MGC_angry_cops:0 "§R秩序警察极度不满§!"
MGC_angry_cops_desc:0 "§R奥宾纳斯·欧尔班·沃克这只老虎发了脾气，谁都捞不到好！§!"

###动态修正###
MGC_balaton_river_defense_line_west:0 "巴拉顿河防线-西段"
MGC_balaton_river_defense_line_west_desc:0 "巴拉顿河防线最初是提特兰帝国内战时期，北方军阀强迫当地居民建造的大河防线，这让卡西提姆行省当地居民十分厌恶这条让他们祖辈被奴役后建立的无用防线。但是在现在，这条臭名昭著防线似乎能够重新发挥他的作用——即抵御南方军阀的渗透。"
MGC_balaton_river_defense_line_mid_north:0 "巴拉顿河防线-中北段"
MGC_balaton_river_defense_line_mid_north_desc:0 "巴拉顿河防线最初是提特兰帝国内战时期，北方军阀强迫奴役外地居民建造的大河防线，小马加尔斯拉塔德行省的贵族后代们视这条防线为他们的荣耀。现在，这条荣耀防线将会重新发挥他的作用——抵御南方军阀的渗透！"
MGC_emerging_capitals_pudrasia:0 "新兴之都 卜德佩西亚"
MGC_emerging_capitals_pudrasia_desc:0 "卜德佩西亚作为一座在北坎达德尔王国时期才刚刚兴起的城市，其城市规划一直都在“在规划”与“在建”状态中，此后的一月革命与十二月反革命中，这座城市多次停止建设，又多次重新开始建设，最终，全军联盟将首都放在了这里，试图向提特兰中心带靠拢，而不是如此接近七河。"
MGC_past_capitals_navia:0 "过去之都 纳维亚"
MGC_past_capitals_navia_desc:0 "自提特兰征服这里后，纳维亚一直是北方最庞大，最高贵的都市，古格拉萨尔卡行省的首都是这里，现代的格拉萨尔卡军区首都也在这里，虽然在世界大战期间，首都被从纳维亚迁走，但是所有居住于纳维亚的居民只要提起他们所居住的城市，便会昂首挺胸，展示他们时时刻刻佩戴的新潮七河货。"
MGC_dream_of_conquest_dijin:0 "征服狄银之梦"
MGC_dream_of_conquest_dijin_desc:0 "特瑞乌塔吉纳的本意为“征服塔吉纳/塔吉诺（特勤）”，古提特兰人将狄银地区的半人马视作值得征服的对手，但是在各种机缘巧合下，提特兰帝国从未更进一步，朝着狄银进攻。但是在此的人们就不一定了，或许有些人还做着像是祖辈梦想，但是那终归只是黄粱一梦罢了。"

###内阁###
MGC_semyon_zabrovsky:0 "谢姆延·扎布罗夫斯基"
MGC_semyon_zabrovsky_desc:0 "一位高尚但有罪的半人马\n他献出了所有，但是留下的唯有空无一物。"
MGC_nenleko_dora:0 "嫩勒科夫·多饶"
MGC_nenleko_dora_desc:0 "一位邪恶但忠于民族的半人马\n他永远属于草原，但是草原永远不属于他。"
MGC_dovuzdo_de_zhemfia:0 "多夫兹多·德·哲姆菲亚"
MGC_dovuzdo_de_zhemfia_desc:0 "一位不可腐蚀但保守的人类\n复辟一个人心散尽的帝国，现代化一个衰弱的国家。"
MGC_denis_golden_iron_kossuth:0 "德尼·“金铁”·科苏特"
MGC_denis_golden_iron_kossuth_desc:0 "一位野心勃勃但有原则的人类\n向祖国之父三呼万岁，向祖国母亲三呼万岁。"
MGC_thorni_fire_madariske:0 "索尔尼·“烈火”·马达瑞斯克"
MGC_thorni_fire_madariske_desc:0 "一位专断但古怪的半人马\n于烈火之中，锻造我们的钢铁躯壳。"
MGC_corfu_de_venetia:0 "科尔夫·德·文尼蒂亚"
MGC_corfu_de_venetia_desc:0 "一位随和但勇猛的人类\n民族与共和，人民与民主。"
MGC_boris_janos_servio:0 "鲍里斯·亚诺什·赛维欧"
MGC_boris_janos_servio_desc:0 "鲍里斯·亚诺什·赛维欧出生于北提特兰一个农奴家庭之中，他早年作为参与了多次对于王国政府的破坏行动以及中左翼思想广为闻名，而后在1950政变中，他却背离了他的不少激进左派朋友们转而支持偏向农业民粹主义的立场。\n\n为此，他被从左翼圈子里赶了出来，但是他依旧在1959提特兰大革命中带领地方农会又开始反对军政府，并且借由如此在临时政府中获得了军备部副部长的地位。但是随后左派对于制宪议会的亲算中，他逃出了临时政府，彻底宣布划清自己与左派的关系，加入了全军同盟，担任军需官一职；他似乎与§2科尔夫§!将军与德尼将军是非常要好的朋友。"
MGC_salahi_vasha_fero:0 "萨拉希·瓦夏·费若"
MGC_salahi_vasha_fero_desc:0 "萨拉希·瓦夏·费若是出生于北提特兰南部一个基层的军事家庭的穷人孩子，他的父亲作为一位军官参与了数次提特兰内战的战役，换来了残疾，这使得他的父亲堪称是一位民族主义者的典范，费若从小便生活在他父亲的民族主义言论下，直到1959年的大革命为止，他已经是当地民族主义者中的知名人物，并且拥有了一只由俱乐部发展而来的民兵队伍。\n\n在1960年之战中，他也是南方少数没有拥护临时政府的民兵人物，在南方对于临时政府展开了多次恐怖袭击，在1960年末迎来彻底解放之后，他便加入了全军联盟，成立全军联盟保卫局，任职局长一职；他似乎与§2嫩勒科夫§!将军私交颇为不错，但是同时他也几乎无条件支持扎布罗夫斯基将军。"
MGC_stojai_walter_drusser:0 "斯托尧伊·瓦尔特·德鲁瑟"
MGC_stojai_walter_drusser_desc:0 "斯托尧伊·瓦尔特·德鲁瑟出生于北提特兰中部的一个中产阶级家庭，父亲作为知名的教士，德鲁瑟自然名正言顺的跟随他的脚步也成为了一位教士，但是他的思想并没有被教会与父亲所束缚，他的青年时代就多次力排众议在自己的教区内进行共和主义与民族主义思潮结合纳卡教的传播。\n\n而到1959年大革命后，他便选择了反对临时政府，因为他并不支持共和主义的社会化发展，他视左派为共和主义的敌人，始终反对左派共和政府的各个政策，这也导致了1960年反共和后直接名正言顺的加入了全军联盟，出任教育部长；目前他是绝对支持§2科尔夫§!将军的，但是如果§2科尔夫§!将军对左派做出了过度让步，很难说他会投向哪一派。"
MGC_weisenmayer_valeri_tagino:0 "维森迈耶·瓦列里·塔吉诺"
MGC_weisenmayer_valeri_tagino_desc:0 "维森迈耶·瓦列里·塔吉诺的名字非常有趣，他的名是个南巴斯蒂亚风格姓氏，但是姓氏是个马加尔斯姓，但是最后的家族名却是象征半人马的特勤的提特兰化姓氏，这代表他的家族本身的混乱——他是一位出生在巴斯蒂亚文化圈的流亡提特兰贵族。即使他的家族已经离开提特兰不知道多久，但是这位忠于提特兰君主制的“国际主义者”还是跨过了千难万险抵达了七河，在那里加入了全军联盟，参与了1960战争的几乎大部分战斗，并且在战争后当上了全军联盟的宣传部部长；他虽然看起来是一位§2保皇党§!，但是实际上他与§2科尔夫§!将军在事物上关系更好，提特兰保皇党们依旧是旧提特兰神权君主制的支持者，而维森迈耶则更像是南巴的温和君主派，并不反对立宪的君主制。"
MGC_sextus_the_stranger_pozzuoli:0 "塞克斯图斯·“外乡人”·波佐利"
MGC_sextus_the_stranger_pozzuoli_desc:0 "波佐利家族可谓是提特兰较为家喻户晓的家族了，作为十二人议会的掌权家族之一，他们在过去的威风左右着提特兰帝国的政策与无数人的生命——但是这些都与塞克斯图斯无关，他其实并不清楚他的祖上是具体干什么的，但他知道他知道他祖上是提特兰人，而他本人则一直在中巴斯蒂亚的某个镇子里当着即将破产的小老板。直到一群提特兰人找上他，称他为塞克斯图斯一世，要回到提特兰加冕他，他便变卖了自己的小产业，跑到提特兰，与保皇党们厮混在一起；塞克斯图斯实际上并不在乎是否成为§2君主§!，他本人更像是一个无害的小老板。"
MGC_orbinas_orban_woker:0 "奥宾纳斯·欧尔班·沃克"
MGC_orbinas_orban_woker_desc:0 "奥宾纳斯·欧尔班·沃克出生于北提特兰北方一个工人家庭，他的早年生活似乎总是伴随着左派运动，他也曾经作为工人纠察队的人物在城市中东奔西走，但是在1950年的政变彻底改变了他，他被拉入了军队后，思想逐渐去除掉了左派的部分，再当他回到家乡的时候，他已经是军政府的绝对支持者了，而到1959年大革命之时，他带着那些他军队时期的退伍朋友们组织起了秩序民兵，对共和派进行骚扰与游击。\n\n而在1960战争之后，他的部队名正言顺的变成了官方认可的秩序部队，改组为了“祖国秩序警察”，他自己则出任警察总长；奥宾纳斯本质上是一个粗野的“北方人”，只要给他送礼或者赞扬他几句，他的立场随时就都能改变。"
MGC_lugo_igor_zoltan:0 "卢戈·伊戈尔·佐尔坦"
MGC_lugo_igor_zoltan_desc:0 "卢戈·伊戈尔·佐尔坦出生于北提特兰一个少数的工业主家庭，他家境的富裕与家庭的指导让他很早就成为了城市工人口中的“混蛋老板”，欠薪，强制劳动，殴打罢工工人，他几乎全部都干过。在1950年政变中，他与地方的军队合作摧毁了工人自发组织的协商工会，并且进而成为了当地的垄断工业主，但是得意了9年后，大革命摧毁了他的基业。左派带着工人们几乎把他的产业国有化个大概，他也恐惧地选择流亡七河，在那里他加入了扎布罗夫斯基将军领导的提特兰全军同盟，担任财务总管。而在1960年战争结束后，他也凭着他的政治力量统合了北提特兰地区的工业，当上了马加尔斯的工业部长，原本最讨厌国有化的小工厂主当上了最大的国有企业的主人；卢戈是个该死的吸血鬼，他压根不在乎政治，只要保证他对于工业部的绝对垄断地位，他便不介意政治环境的变化。"
MGC_lugo_igor_zoltan_desc_escaped:0 "卢戈·伊戈尔·佐尔坦出生于北提特兰一个少数的工业主家庭，他家境的富裕与家庭的指导让他很早就成为了城市工人口中的“混蛋老板”，欠薪，强制劳动，殴打罢工工人，他几乎全部都干过。在1950年政变中，他与地方的军队合作摧毁了工人自发组织的协商工会，并且进而成为了当地的垄断工业主，但是得意了9年后，大革命摧毁了他的基业。左派带着工人们几乎把他的产业国有化个大概，他也恐惧地选择流亡七河，在那里他加入了扎布罗夫斯基将军领导的提特兰全军同盟，担任财务总管。而在1960年战争结束后，他也凭着他的政治力量统合了北提特兰地区的工业，当上了马加尔斯的工业部长，原本最讨厌国有化的小工厂主当上了最大的国有企业的主人。但是当七河那的消息逐渐不对后，他开始与提特兰共和国开始了联系。而当全军联盟内部动荡之时，这些联系便偷偷联系了提特兰共和国。\n\n最终，他跑到了充满自由市场香甜气息的提特兰共和国，也就是为什么他现正在他的海边别墅里喝着小酒，吹着海风，看着日落了。"
MGC_kodais_zidan_laszlo:0 "柯达伊斯·日丹·拉斯洛"
MGC_kodais_zidan_laszlo_desc:0 "柯达伊斯·日丹·拉斯洛出生于中东提特兰 一个共和主义色彩浓烈的市民家庭，他的青年时代并没有多少人知道，他对此的描述也仅仅是“去往南巴斯蒂亚留学法学相关学位”，而很少真正谈及他在南巴斯蒂亚哪一所大学。但是当他回到国内后，按照他自己表述，他当了许久律师，而后在世界大战后来到北提特兰，支援临时政府，担任新生的临时政府农业部长，但是按照他所说，他与临时政府有所牵连只是因为有朋友在临时政府内部任职，受邀一道来任职。\n\n临时政府在1959中期的“左派恐怖”期间，他也被清算，被关押在纳维亚东法达斯区的一个监狱中，而随后1960年反攻中他从中逃离，加入了全军同盟，但是他拒绝了职位，仅仅以顾问的省份活动；柯达伊斯是个非常理性的共和主义者，§2科尔夫§!将军与合作，但是他在一些问题上（比如法学）也会与§2保皇派§!妥协，他与§2多夫兹多§!将军是关系非常好的棋友。"
MGC_vash_natasha_east:0 "瓦什·娜塔莎·伊斯特"
MGC_vash_natasha_east_desc:0 "瓦什·娜塔莎·伊斯特女士诞生于北提特兰一个教堂之中，她的父亲是教堂的牧师，她的早年基本就是在教堂中接受最正统的纳卡教神学教育，将她塑造为了一位保守女性的代表，她的父亲死后，她也在教友的圈子里颇为闻名。她在1950年对于“纳卡保守主义”与“莎书社会”的论述让她成为了一代神学保守主义的代表，无数宗教徒与保守主义者都奉她为圣徒，而在1959年这些都改变了。大革命改变了一切，政治界开始极力将纳卡教会的影响从政治中排挤出去，左派横行与世俗化政策让纳卡教会颇为不满，同时也遭受了打击。“红色恐怖”后，瓦什在1959年中期被关入了纳维亚东法达斯区的一个监狱中，而后在1960年反攻被救援了出来，进入全军同盟担任北提特兰宗教法庭大法官；她唯一的意见就是反对§2共和派§!，别无其他诉求，但是请注意，她的态度也是纳卡教的态度，§R不要惹怒她§!。"
MGC_harius_petrov_husni:0 "哈里乌斯·彼得罗夫·胡斯尼"
MGC_harius_petrov_husni_desc:0 "哈里乌斯·彼得罗夫·胡斯尼诞生于北提特兰的一个农村家庭，他的幼年看过许多人遭受地主的压迫，导致他对于贫困的农村逐渐厌恶，长大后，他选择跑到城市里去发展，但是此时正值1950政变，他在兵荒马乱中只能依靠偷窃与骗术过活。在这个过程中，他遭到了逮捕，然后在监狱中他与他的狱友——一位魔术师拜师学艺，出狱后，他就作为魔术师在整个北提特兰表演演出过活。\n\n1959年大革命并没有给他的生活带来什么影响，只是演出逐渐减少，让他非常烦恼，在1960年战争中，他正巧在北方演出，用巧妙的用话术说服了当地驻军投降，减少无谓的牺牲，为七河军团减少了伤亡。此后的三十年他都在进行魔术表演，兼任全军同盟的一位外交官；哈里乌斯本质上只是一位投机的魔术师，但是他的口才是联盟内的一把钥匙，可以作为不稳定同盟的沟通者。"

