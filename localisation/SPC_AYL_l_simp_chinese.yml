###民族精神###
AYL_honor:0 "荣誉"
AYL_honor_desc:0 "“凡恒心行善，寻求荣耀、尊贵和不能朽坏之福的，就以永生报应他们。”——《圣箴录》2:7\n\n比起奥普菲尔和德谬蒂克这两个异类，艾勒骑士团几乎符合一般人对骑士团的一切刻板印象：高傲，威严以及对荣耀的绝对渴望。艾勒骑士团渴望着建功立业，就像他们的前辈们一样获得那无上的荣耀。可惜在伟大战争以及世界大战后，南巴执行着全面收缩的战略方针。开疆拓土？审判异端？还是老老实实的待着吧。或许哪天中巴政府会请他们抓几个小偷也说不定。这让艾勒骑士团无法接受这种碌碌无为的命运。他们需要一个机会，需要一切能建功立业的机会。显然，战争是通往荣誉最快的道路。在艾勒骑士团的辖区，你能见到最多的便是士兵。他们在准备，准备一场比以往都要大的战争。中巴内战的到来打乱了艾勒骑士团的计划，但也给他们带来了一个绝妙的机会——一个能够超过他们祖辈的荣誉的机会。他们将会是平定中巴叛乱的功臣，是圣子最虔诚的§Y信者§!，是无上§0荣誉§!的获得者。"

