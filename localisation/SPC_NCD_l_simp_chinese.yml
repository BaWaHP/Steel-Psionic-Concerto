###国策###
NCD_westminster_project:0 "威斯特尔计划"
NCD_westminster_project_desc:0 "自从南方那些人背信弃义之后，我们共和国的工业垂直下降，别说军事工业了，就说民用工厂，我们也存在许多的空缺。国家已经规划了一系列位于蒙斯的特殊工业区，用以起到示范以及带头作用，现在就等您来下达命令了。但是我们认为应该从军工开始。"
NCD_towering_dangerous_buildings:0 "高耸的危楼"
NCD_towering_dangerous_buildings_desc:0 "现在的政策真的给我们的政府经济带来了许多烂摊子，我们总是得去做些什么，似乎已经可以听到人民的咆哮了，我们一定得去拨款到我们国家的工业中去了，要不然南方的那些......\n\n在前年，我们国家颁布了一项法令，要求所有企业按照政府规定的售价出卖商品。这导致了我们国家内部的商业家无利可图，国家的商业迅速凋零，紧接着的就是金融业，而现在，为了我们国家的未来，是时候取消那个政策了。"
NCD_towering_dangerous_buildings_tt:0 "§Y选中时的效果：§!\n添加民族精神：§Y改革中§!，其效果为（每周稳定度：§R-2%§!）。\n§Y完成后的效果：§!\n"
NCD_open_border_act:0 "边境开放法令"
NCD_open_border_act_desc:0 "西莉迪亚在内战之后，共和国一方的边境除了与联合王国的之外，对于其他国家的边境都处于封锁状态，为了促进我国国内的消费发展，我们需要开放边境，实质上的以及经济上的，这对我们大家都有好处，但是除了南方那帮忘恩负义的小人。"
NCD_consolidate_central_power:0 "巩固中央权力"
NCD_consolidate_central_power_desc:0 "新的大选表明共和不被人民所信任，但共和党必须在西莉迪亚接着执政下去，那些其他的都不值得信任，拿勒·威斯特尔将作为我们的总统去带领我们走向光明的道路，为了我们的国家，我们必须这么做，这或许会造成一些骚乱以及反抗，这都在一切可以控制的范围之内。§t目前可控。§!"
NCD_rebuild_south_indusries:0 "南方工业网重建"
NCD_rebuild_south_indusries_desc:0 "维亚处在得天独厚的平原地区，北部就是可以提供大量矿藏的蒙斯山脉，我国的铁路已经完全贯穿了该地区，我们可以在这些地方进行一些工厂的建设，顺带进行一些防御工事的建设，毕竟南方那帮人不知道什么时候又会入侵我们。"
NCD_republic_pre_war_laws:0 "共和国战前临时宪法"
NCD_republic_pre_war_laws_desc:0 "鬼知道南方的那些人什么时候来......我们必须和我们的人民说明一切，至少是选择性的。拿勒·威斯特尔会带领一切，我们必须给予他更多的权利，我们将会征用更多的人力，这会有一些副作用。这套宪法也可以压制那些保皇派，推动我们的经济发展。但是我向您保证，军队不会有大动作的。它们已经被压制的很好。"
NCD_purge_unloyal_officiers:0 "清理反对军官"
NCD_purge_unloyal_officiers_desc:0 "是时候对军队下手了，为了我们的共和统一大业。海因尼·茨尔的阵营这段时间在政府里甚至都没有发声，他们一定是怕了！蒙斯的军队已经在我们的控制之中，我们即将下达解散其他地区军队的命令，到时候那些军官也只不过是瓮中之鳖了。我们有很多时间来重新建立我们的军事系统，我们的时间是足够的。"
NCD_a_secret_letter:0 "一封密信"
NCD_a_secret_letter_desc:0 "是时候推翻威斯特尔的糟糕共和国了，我们将会给联合王国发出一封密信，要求西莉迪亚王室的回归，我们已经做好了充分的迎接他们的准备，人民也已经做好了准备。西莉迪亚王室是伟大的而光荣的，因为一些小小的问题，他们曾经被误会了。大选的结果已经出来了，我们已经开始着手以建立过渡政府。"
NCD_choice_of_people:0 "人民的选择"
NCD_choice_of_people_desc:0 "西莉迪亚王室将在蒙斯举行盛大的回归仪式，届时蒙斯的大部分群众将会看到他们所尊敬，所尊重，所爱戴的国王走在共和大道上，现在应该叫做国王大道。这都是我们尊重遵循人民而做出的选择，人民会记住过渡政府为这个国家所做的一切。"
NCD_industrial_access_zone:0 "路切尔纳工业对接区"
NCD_industrial_access_zone_desc:0 "联合王国已经向我们发出了工业合作邀请，我们将联合建设北部路切尔纳地区，那里拥有广袤的平原。在王室回归之后，我们推翻了腐朽的共和国政府，现在的国家经济建设已经开始复苏，我们已经有了足够的经费去处理这些问题。"
NCD_formal_political_changes:0 "正式移交权利"
NCD_formal_political_changes_desc:0 "感谢联合过渡政府的管理，西莉迪亚王室今日将会正式入住蒙斯王宫，感谢各位市民以及国民的支持，为了西莉迪亚的人民！为了国家！为了王权！ \n\n——克尔·西莉迪亚登基发言"
#军事线#
NCD_now_the_army_takes_over:0 "铁靴落地......"
NCD_now_the_army_takes_over_desc:0 "西莉迪亚国家的大权已经掌握在了我们稳定的政府手上，我们已经组建了新的军事政府，我们的人民十分拥护我们的管理。对于南方的杂碎们，我们自有强硬的办法去处理他们，但是需要先通过改革让我们内部的人民收到我们的控制，得到我们思想的教导，西莉迪亚光荣！现在将我们国家的管理权交到我们伟大的海因尼·茨尔手上。§R联合王国发现不对劲了。§!"
NCD_now_the_army_takes_over_tt:0 "§Y选中后的效果：§!\n政治点数：§G+50§!\n\n完成后的效果：\n§g经济政策向军事化动员两级！§!\n"
NCD_cutting_external_contacts:0 "切断对外来往"
NCD_cutting_external_contacts_desc:0 "在我们将共和派除掉之后，我们的人民已经开始大规模窜逃，这危害了我们国家的复兴以及未来。我们需要那些人来保证我们复仇使命的完成，只有在西莉迪亚生长而没有背叛我们的人才可以被信任，我们不需要外人，但我们必须团结所有纯种的西莉迪亚人，直到永远。"
NCD_avenirist_propaganda:0 "复仇主义宣传"
NCD_avenirist_propaganda_desc:0 "西莉迪亚曾经拥有一段和平，安定的历史，蒙斯的春光曾经灿烂过，但是在那帮蝗虫般的公社虫豸以及共和虫豸破坏之后，西莉迪亚再也没有了往日的优美。\n\n而如今，我们将在我们至上的大元帅带领之下，西莉迪亚将会重归往日的美丽以及安详，大元帅的所有决策都是正确的，我们将永远支持他的英明政策，为了我们的国家！为了我们的人民！为了我们的未来！用我们的鲜血，去扫净那些公社虫豸！"
NCD_avenirist_propaganda_tt:0 "\n§g征兵政策将会上升两级，这里显示一致是正确的。§!"
NCD_the_pure_celydreans:0 "纯净的西莉迪亚人"
NCD_the_pure_celydreans_desc:0 "我们需要重新审查我们内部的人员，我们伟大的复仇人物需要完全纯净的西莉迪亚人来实现。我们将会要求他们的发色，肤色以及瞳孔颜色的纯净，思想或者行为的纯净，这样就可以保证我们伟大复仇的完全胜利。"
NCD_standarlized_construction:0 "规格化建筑建设"
NCD_standarlized_construction_desc:0 "我们对于战争的准备时间已经不多了，南方的公社杂种已经蠢蠢欲动了。我们需要下达一些命令，严格控制建筑的建设进程以及速度，针对没有完成目标的公司以及个人进行处罚，对于工厂建设进行监督，在必要情况下派出军队。"
NCD_nationalize_skilled_labour:0 "技术工人征为国有"
NCD_nationalize_skilled_labour_desc:0 "技术工人对于我们现在的国家发展计划起到了重要的作用，警察军队将会对他们进行管理，在必要时刻我们将会对那些不听话的思想不纯种者进行合理清洗。"
NCD_preconstruct_borders:0 "前线预先战略建设"
NCD_preconstruct_borders_desc:0 "南方的红色邪火正在不断蚕食我们的边境，为了让它们的努力失败，新一批的紧急防御工事建设以及军工厂的建设可以保证我们在受到它们攻击时可以做有效的防御以及反击。"
NCD_change_constitution_temporarily:0 "修改临时宪法"
NCD_change_constitution_temporarily_desc:0 "威斯特尔虽然已经被我们清除了，但是他留下来的临时宪法仍然在影响着这个国家，我们需要修改临时宪法，让其与我们复仇复兴国家的愿望契合。"
NCD_authorize_secret_police:0 "授权秘密警察部队"
NCD_authorize_secret_police_desc:0 "为了维护我们国家的稳定，我们可以集中并授权军队对那些怀疑我们的人进行搜查，也可以在我们的城市以及工厂之中进行秘密监督。这样尚且可以维护我们国家的稳定性吧。§R但是当那一天来临之时，一切都会轰然倒塌。§!"
NCD_authorize_secret_police_tt:0 "§g情报机关政策将会上升三级，这里显示一致是正确的。§!"
NCD_nation_is_watching_you:0 "国家正在看着你"
NCD_nation_is_watching_you_desc:0 "§R国家正在看着所有人，无论幼老，无论贵贱，一切都为了复仇！§!"
NCD_nation_is_watching_you_tt:0 "§g媒体政策将会上升两级，这里显示一致是正确的。§!"
NCD_volunteer_afterwards_education:0 "“志愿”后天教育"
NCD_volunteer_afterwards_education_desc:0 "共和以及公社这种虫豸已经危害我们的人民太久了，我们需要对我们的人民进行一次彻底的文化以及思想上的教育，为了稳固我们的国家。"
NCD_the_perfect_leader:0 "英明的领袖"
NCD_the_perfect_leader_desc:0 "外国那些丑恶嘴脸的评论家认为我们的领袖是邪恶疯狂的，但是实际上海因尼·茨尔元帅是我们最为崇高的领袖，我们足以放心的将我们国家的未来交给他，我们将会始终不渝地执行他所有的决定，直到我们死去！\n\n§R但是当他死去之后，一切都会不可挽回。§!"
NCD_loyalty_and_bestiality_test:0 "忠诚与兽性测试"
NCD_loyalty_and_bestiality_test_desc:0 "伟大的西莉迪亚拥有许多愿意为了我们事业而捐躯的小伙子们，但是因为他们软弱的父母以及以前的共和虫豸对他们的洗脑，他们有许多人对我们的事业不忠而胆小。我们需要筛选出那些人，他们不配在军队里呆着。"
NCD_hail_to_the_military_government:0 "西莉迪亚军国万岁"
NCD_hail_to_the_military_government_desc:0 "§R我们已经做好了准备！我们的国家，军队，人民都全身心投入到了我们的复仇事业之中！消灭公社反动力量！重建国家之伟大！§!"
NCD_establish_monopoly_industries:0 "建立工业垄断企业"
NCD_establish_monopoly_industries_desc:0 "西莉迪亚北部没有南方强大的军工业以及基础设施，我们所拥有的只有分散的工厂。许多地方乡村以及偏远城市所谓“工业区”不过是一些小作坊组成的孱弱联合体。我们需要授权我们国内一些较大的工业企业，鼓励他们收购小微企业，以保证我们基础的工业增长。"
NCD_establish_monopoly_industries_tt:0 "§Y选中后的效果：§!\n获得为期§Y30§!日的“§Y提线木偶的疯狂§!”，其效果为（每日获得的政治点数:§R-1.00§!,工厂产出:§R-30.00%§!）。\n\n完成后的效果：\n§G启用§!§Y工业企业§!：\n§Y斯特拉林业联合体§!，其效果为（工业研究速度：§G+10%§!，每月人民生活水平变化：§R-4§!，军用工厂建筑速度：§G+8%§!，民用工厂建筑速度：§G+5%§!）\n§Y“伟大山脉”矿业联合公司§!，其效果为（合成资源研究速度：§G+10%§!，战略资源获取率：§G+15%§!，每月自然环境水平变化：§R-4§!）\n§G启用§!§Y设计商§!：\n§Y舍尔勒军工联合体§!，其效果为（步兵装备研究速度：§G+15%§!，§Y步兵装备§!：对人员杀伤：§G+5%§!，生产花费：§G-10%§!，可靠性加成：§R-5%§!）\n§Y魔法实验科研组§!，其效果分别为（§Y游侠级泰坦§!：可靠性加成：§G+5%§!，对人员杀伤：§G+5%§!，生产花费：§G-5%§!，§Y天图级泰坦§!：可靠性加成：§G+5%§!，对人员杀伤：§G+5%§!，生产花费：§G-5%§!），（火炮研究速度：§G+10%§!，§Y牵引式火炮§!：对人员杀伤：§G+5%§!，生产花费：§G-10%§!，可靠性加成：§R-5%§!）"
NCD_national_plan_for_consumer_goods:0 "生活用品国家计划"
NCD_national_plan_for_consumer_goods_desc:0 "我们需要将我们有限的资源投入到无限的复仇中去，在经历了工业体系的改革之后，我们需要对我们的民用工业进行大刀阔斧的改革，民众不需要那么多，以免让他们产生任何不好的思想以及行为，那些就足够了。"
NCD_everything_for_war:0 "一切都为战争服务！"
NCD_everything_for_war_desc:0 "在经历了一系列的工业改革之后，我们的工业“可以”经受起战争的洗礼，我们可以看到来自南方的战火迫在眉睫，一切都为战争服务！为复仇服务！"
NCD_expel_corrupted_scientists:0 "驱逐腐败的科学家"
NCD_expel_corrupted_scientists_desc:0 "在经历了内战以及共和虫豸的夺取政权之后，我们可以看到那些所谓的知识分子永远不在意国家的感受而只为了他们可笑的“科学”而努力，他们高呼着民主自由，却没想着这些把这个国家拖入深渊，把他们赶走！越远越好！"
NCD_magic_crystal_to_synthesis_gas:0 "魔晶矿合成毒气"
NCD_magic_crystal_to_synthesis_gas_desc:0 "在我们触手可及的蒙斯山脉，其下面暗藏着数不胜数的优质魔晶矿，通过将其中的有效成分进行提取，我们可以得到对于人体以及类人肺部产生无法修复的物理磨损以及高浓度魔法灼伤，这将会极大的拖延敌人的进攻。虽然会对我们的土地造成一些污染，但是我们不会关注这些。"
NCD_magic_crystal_to_synthesis_gas_tt:0 "§R在我们与南方的虫豸开战之后，他们将会看到那紫色的朝霞。§!"
NCD_frontline_magician_supporter:0 "前线魔法辅助部队"
NCD_frontline_magician_supporter_desc:0 "魔法总是有用的，包括进行炮弹瞄准以及侦查，甚至一些他国所不知道的战场应急救援魔法，这些可以减少我们的战争伤亡率，但是或许我们更应该把这些稀少的魔法辅助人员用在提高战斗力上，这些可比上级的鼓舞好多了，从心理以及生理上说。"
NCD_national_steel_company_expansion:0 "国家钢铁公司扩张"
NCD_national_steel_company_expansion_desc:0 "钢铁作为我们战争机器的源头，对于我们的工业来说拥有巨大的价值。山间的小钢铁公司已经满足不了我们的需求，国家钢铁公司将会对它们进行吞并，这会有效提高我们的钢铁产出。"
NCD_army_equipment_simplified:0 "陆军装备批量简化"
NCD_army_equipment_simplified_desc:0 "我们专注于复仇的部队不需要那么多杂乱的装备，他们用不上，或者活不到那个时候。"
NCD_army_equipment_simplified_tt:0 "§Y选中后的效果：§!\n获得为期§Y30§!日的“§Y改变生产线§!”，其效果为（生产效率上限:§R-10.00%§!,生产效率增长:§G+30.00%§!,工厂产出:§R-10.00%§!）。\n\n完成后的效果："
NCD_magical_theory_stealing:0 "魔法理论科学窃取"
NCD_magical_theory_stealing_desc:0 "我们需要大量的魔法理论用来加快我们军用魔法的发展，恰好我们北方的邻居有很多魔法理论藏书。"
NCD_magic_daredevil:0 "魔法敢死队"
NCD_magic_daredevil_desc:0 "面对公社对我们内部设施永不停息的破坏，我们必须给予反击。我们可以通过将一些魔法部队渗透入公社的城市乡村山野以达到破坏他们内部的做法。"
NCD_put_down_the_fire:0 "先手掐灭火苗"
NCD_put_down_the_fire_desc:0 "§R忠诚，需要监督！\n纯净，需要绝对！\n邪火，需要扑灭！\n复仇，以我们的鲜血！\n杀杀杀杀！§!"

NCD_war_goes_on:0 "战争行，故园离"
NCD_war_goes_on_desc:0 "如今西莉迪亚南北战端已开，面对风云变换的国际局势，我们必须坚定地走着这条战争之路。无论男女老少，政治立场，所有人都应该在这场战争中尽自己的一份力，我们应该充分地发动人民群众，我们的国家是光荣的，必将在这个世界上永存下去！"
NCD_idealised_newscasts:0 "理想化新闻播报"
NCD_idealised_newscasts_desc:0 "总是有一些对我们的复兴计划抱有怀疑而胆怯之人，他们总是怀疑我们所报道的国家现状。我们需要让给他们信服，至少让他们意识到——他们的不幸是因为自己导致的，其他地区的人可开心的很呢！但是这些需要一些手段。这可以保证我们的国家运作一段时间，但是在将来的不久，那些问题将会迸发而出。况且，我们不可以允许骚乱蔓延到北方以及南方的工业大城市。"
NCD_try_protect_industry:0 "完善工业的所谓保障"
NCD_try_protect_industry_desc:0 "南方的红色邪火即将燃遍西莉迪亚，为了我们祖国的未来以及下一代的幸福生活，是时候将我们的一生奉献到国家之中。全力启动我们的生产机器以及宣传机器，我们将会用国家警察以及一些后线军队来处理那些不忠之人，保障我们的工业生产。"
NCD_despicable_as_an_imaginary_life:0 "为虚生之龌龊"
NCD_despicable_as_an_imaginary_life_desc:0 "国家目前已经到了生死存亡的时刻，那些热爱祖国而愿意为之付出鲜血的人们。将我们的热血化作一把长刀，快速致命地刺向那些叛徒的胸膛，如同划过柔软的奶油一样。将我们的爱国化作一把天秤，无悔坚决地称量那些懦夫的心脏，一切都为了我们的国家，我们要采取一些必要的措施，那些胆怯的人，需要我们用刀枪去踢着它们上战场！"
NCD_unify_lives_of_workers_and_civilians:0 "统一工民生活管理"
NCD_unify_lives_of_workers_and_civilians_desc:0 "目前由于战争，我们国家的协调生产出现了一些问题。一些部门的生产已经陷入了停滞。我们需要进行国家层面的宏观调控来保证战争的开展。"
NCD_bloody_peach_and_bodies:0 "血色桃，焦尸海"
NCD_bloody_peach_and_bodies_desc:0 "当人民的故土沉浸在凝夜紫间，当政客手上的梅花红心终于沾上血迹之时。那些尘封已久的往事与矛盾终于得以揭开，人们看着玻璃另一侧那张可怖的脸，下意识地逃离。可惜，人们终将发现那是一面镜子。"
NCD_limited_coop_within_leaders:0 "决策层有限度合作"
NCD_limited_coop_within_leaders_desc:0 "事实表明，我们激进的政策与战术思路在某些程度上不利于战事的顺利展开与国家的发展，在就重大决策方面进行充分讨论还是对国家的发展有一定益处。"
NCD_coop_with_demon:0 "与恶魔的交易"
NCD_coop_with_demon_desc:0 "面对如今南方的瘟疫和在战争中饱受摧残的工业体系，我们的工业生产能力与民生出现了巨大的问题，以致如此地步，我们也只好向我们北方的“朋友们”恳求得到一些交易，我们与他们在一些利益方面是一致的。"
NCD_address_middle_famine:0 "处理中部饥荒"
NCD_address_middle_famine_desc:0 "尽管这回阻碍我们的伟大复兴计划，但是为了国家的稳定运行，我们必须去做出一些取舍。"
NCD_expand_cic_const:0 "扩大民用工厂建设"
NCD_expand_cic_const_desc:0 "当然，足够多的民用建设可以推动民生的发展。从另外一个方面来讲，也有利于军队的补给线建立，尽管我们在战时，但是公社并没有打击我们西部与北部的能力，与联合王国的工业合作，对我们都有好处。"
NCD_adopt_sound_advice:0 "采纳稳妥意见"
NCD_adopt_sound_advice_desc:0 "采纳稳妥的相关治国意见，对我们国家的发展与治理大有益处。救国阵线护国派的大量经验丰富的军官团通过相关的合并指挥事宜，可以使他们的指挥智慧与我们国家相连。"
NCD_adopt_sound_advice_tt:0 "解锁应对§g救国阵线护国派§!的§Y决议§!"
NCD_take_care_mil_cor:0 "处理军队腐败"
NCD_take_care_mil_cor_desc:0 "军队的腐败已经成为了我们国家一个非常严重的问题，作为依靠军队而建立的国家，那些国家的蛀虫理所应当认为他们应该获得一切，我们必须去处理掉他们。"
NCD_regain_partial_dem:0 "恢复部分民主"
NCD_regain_partial_dem_desc:0 "§R……是谁把这个提案交上来的，告诉那帮臆想者，这在伟大祖国母亲的复兴过程中这是不得被允许的！我们遇到的麻烦够多了！不需要那帮人在这里咄咄逼人。我说了多少遍，这是不可能的。§!"
NCD_regain_partial_dem_tt:0 "§R我们失败了，不是吗？§!"
NCD_suppress_new_united_front:0 "镇压新联合阵线"
NCD_suppress_new_united_front_desc:0 "位于我们国家东部的新联合阵线的对西莉迪亚国家军队的补给线造成了巨大的困扰，为此，我们不得不抽调一些警察部队去围剿这帮极端分子。"
NCD_suppress_new_united_front_tt:0 "解锁应对§O新联合阵线§!的§Y决议§!"
NCD_people_arm_mov:0 "人民武装运动"
NCD_people_arm_mov_desc:0 "面对如今警察部队的紧张与缺失，我们可以组织些许民兵部队，用于处理相对不那么棘手的起义与游击队问题，尽管有相关的渗透风险，但是我们必须这么做。"
NCD_forced_enlistment_of_vagrants:0 "强迫流浪者充军"
NCD_forced_enlistment_of_vagrants_desc:0 "先前的中部饥荒给我们的南方地区带来了大量的流浪者与无业游民。是时候将他们组织起来，一是防止他们对我们的背叛，二是为了国家的发展。"
NCD_form_frontline_supervisory_unit:0 "建立前线督战队"
NCD_form_frontline_supervisory_unit_desc:0 "总有人想要充当逃兵，一个监管军队的职位难道不是应该存在的吗，我们将给予他们巨大的权力，审判那些投机主义者。"
NCD_glory_of_sacrifice:0 "为国死之荣光"
NCD_glory_of_sacrifice_desc:0 "为我们伟大的祖国而死难道不是一件十分令人高兴的事吗，你的名字所有人都将知晓，你的功绩永世长存，那些埋在乱葬岗的人在生前曾有人和他们这样说过。"
NCD_end_soldier_communication:0 "终止家属书信联系"
NCD_end_soldier_communication_desc:0 "无论是前线向后放传递的血腥战报，还是后方对前线的反战请求，都不利于前线将士们的身心健康，这是必要的，对吧。"
NCD_glory_back_to_cd:0 "光荣回归西莉迪亚"
NCD_glory_back_to_cd_desc:0 "我们反抗公社赤匪的战争已然胜利，这是我们所有人应当铭记的时刻！"

###事件###

###内阁###
NCD_uller_spepp:0 "乌尔勒·斯佩普"
NCD_uller_spepp_desc:0 "在西莉迪亚陷入内战之前，乌尔勒·斯佩普作为一名普通的来自威利斯经济学院的西莉迪亚经济学外国留学生，在威利斯经济学院进修经济以及民生管理学。而在西莉迪亚内战开始之后，他便回到了西莉迪亚共和国以求更大的发展空间，在此之前他曾向南方的西莉迪亚公社提出入境申请，但是被拒绝了。他作为西莉迪亚共和国几乎可以算得上最年轻的政客混迹于西莉迪亚混乱的政坛之中，并取得了威斯特尔的信任，试图维持这个脆弱国家的脆弱经济。"
NCD_portia_hall:0 "波斯特亚·霍尔"
NCD_portia_hall_desc:0 "波斯特亚·霍尔来自蒙斯山脉的一个小山村中，凭借自身的学习勤奋成功考上了路切尔纳的一所优秀大学，并成功毕业成为了一名民用科技研究员，在南方一家生活用品技术公司工作。但是在西莉迪亚内战爆发之后，他被西莉迪亚公社驱逐出境，最后来到了北方的西莉迪亚共和国。作为国家建设部门的部长参与了西莉迪亚混乱的政治。"
NCD_vitensiane_helenl:0 "维特斯尼亚·海伦"
NCD_vitensiane_helenl_desc:0 "维特斯尼亚·海伦在西莉迪亚内战爆发之前便已经参加在西莉迪亚的政治之中，作为这个国家几乎最为老练的政府官员。他把持着国家的教育以及宣传的重要任务，无数党派想要争取他的支持但是最终都以失败而告终。然而在大家都认为他是一个中立派的时候，却有小道消息传出他正在默默支持军国派。"
NCD_kirsten_scherrer:0 "柯斯汀·舍尔勒"
NCD_kirsten_scherrer_desc:0 "柯斯汀·舍尔勒在西莉迪亚的工业体系中占据了重要的位置，作为军用工业以及火药生产在财阀让他在这个国家的政治界有了一席之地，其名下的舍尔勒军工联合体几乎把握了整个国家的军工生产。他的儿子阿尔勒·舍尔勒在西莉迪亚内战之后前往了南方，这导致他在政治界总有一些流言。但是柯斯汀·舍尔勒并不是一个共产主义者或者红色人物，他仍然与自己的儿子有一些交流的渠道，他只是希望自己的儿子可以走自己想走的一条路。但是国家政府可能不会这么想。他正在如履薄冰。"
NCD_hispaniola:0 "卡斯帕尼亚"
NCD_ck_kljalfen:0 "丙克·克尔亚芬"

