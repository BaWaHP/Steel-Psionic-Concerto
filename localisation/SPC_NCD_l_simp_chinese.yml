NCD.1.t:0 "首都的鸟鸣"
NCD.1.d:0 "蒙斯的日子总是那么平静且安逸，拿勒·威斯特尔坐在阳台上晒着太阳。\n\n他一旁的秘书看着他：“蒙斯的鸟叫总是那么悦耳而动听对吧。”\n\n拿勒·威斯特尔略微点点头，赞同了她的想法。\n\n“最近对于民族联盟以及军党的处理马上就要落下帷幕了，一切尚且安好。”秘书带着低下嗓音说着。\n\n“军队甚至默认了我们的行动对吗？”拿勒·威斯特尔略带担忧地说着。\n\n“差不多是这样的。”秘书说道：“但是我认为这鸟鸣还是太微弱了，我们要做点什么。”\n\n“你这句话是什么意思。”拿勒·威斯特尔问道。\n\n秘书随即迅速掏出了自己的消音手枪，对着拿勒·威斯特尔的胸腔扣动了扳机。蒙斯鸟的叫声混合着人群的嘈杂声将这盖过，拿勒·威斯特尔几乎不敢相信这一切是真的。秘书随即露出一丝微笑，“为了西莉迪亚的再次伟大！”血溅到一旁威斯特尔精心照料的花卉上，染红白色的花瓣。\n\n......\n\n西莉迪亚新闻最新报道：拿勒·威斯特尔在办公室内身亡，室内没有其他人，现场找不到其他有效证据，初步判断为枪支意外走火，枪支来源不明，军队已经接管国家政府。请广大市民服从政府安排。为了西莉迪亚再次伟大。\n\n波尔科斯，西莉迪亚语词汇，意为“鸟鸣”特指蒙斯鸟及生活在蒙斯的其他鸟的悠扬叫声，另译作“和平”“安逸”。布尔克斯。西莉迪亚语地方词汇，意为“微弱的枪声”，特指先军队装备的蒙斯鸟手枪，两者意思不同，需要注意日常生活中发音，以免引申歧义。来源：西莉迪亚词典。\n\n嗡..嗡...嗡..."
NCD.1.a:0 "为了西莉迪亚再次伟大！"

NCD.2.t:0 "午夜徘徊"
NCD.2.d:0 "微风轻轻拂过共和大道之间，吹响民居门檐的铃铛。蒙斯从来没有安宁，远处军队的训练声还时不时地传来，生活在蒙斯的人们记忆各自不同，但是有着焦虑。商人担忧着国家的经济，农民担忧着农产价格，威斯特尔担忧着国家未来，而政客们呢？他们总是可以睡个好觉。\n\n威斯特尔的躺在床上，神经极度绷紧，大抵是一个无眠之夜晚。他的思绪如同香料，被数次捣碎而混合，捣的愈碎，磨得愈细，混乱，恐惧在他心中蔓延，交融。\n\n脚下冰棱蔓延，抬头老树昏鸦，他似乎可以看到无数人的枪指着他，但是他知道，这个国家需要他，共和国需要他。秘书早已离开这里，威斯特尔裹上自己的被子，转头睡去。"
NCD.2.a:0 "愿君好梦"

NCD.3.t:0 "离别"
NCD.3.d:0 "大选的结果出来了，无数人民呼吁着共和政府离开这个国家，威斯特尔的期盼化为泡影，这个国家的人民还是不愿相信他。他走回自己家中，伴随着叹息。\n\n威斯特尔收拾好自己的物品，将象征着西莉迪亚的国家天平摆好，他看了一眼他的秘书，秘书的眼中闪过一丝失落，似乎是因为自己的理想，或者说是目标没有实现。整理好自己的文件包，他率先开口。\n\n“你在这之后会去哪里？”\n\n秘书因为威斯特尔的这一句话愣住了，眼中闪过一丝愤怒，随之消散。\n\n“难道是懦弱的跑到隔壁的共和灯塔？我还会为了这个国家做贡献。”\n\n威斯特尔突然因为自己打算跑到托莱多联邦而羞耻，收拾好行李，快步走出自己苦苦支撑几年的共和国会。\n\n他仿佛隐约听到了身后传来弹夹拆卸的声音，他没有多想，向西走去。"
NCD.3.a:0 "弹夹落地"

NCD.50.t:0 "边境官兵的日记"
NCD.50.d:0 "当我们伟大的元帅开始保护国家的时候，我已经被分配到了这里，至少那些上层让我们这么说。最近上层向我们下达了指令，要求我们死守边境我让任何人进出，一些已经得到了消息的大商人已经提前逃出。\n\n越来越多的人在今天上午八点开始聚集在我所在的通往联合王国的路切尓纳二号关口，我们早就已经封锁了这里，但是那些违背我们大元帅精神的人还在不断的向这里赶来。我们的上层要求我们打开门。我们十分不解，但还是照做打开了门。\n\n那些人开开心心地跑出了铁门，随后那些军官要求我们架起机枪，那些快乐逃出我们祖国的人很快接到了温热子弹的祝福，无数的人倒下，还未出门的人开始疯狂向外挤，但是只要他们踏出国界外一步，便会迎接死亡。\n\n半小时的警告过去，所剩下的几十人惊慌地瘫在地上，我们的士兵用枪给他们撵进来。\n\n“干得好，孩子们！”我们的上层拿着摄像机笑道。\n\n“是时候把它发给大元帅了，他会喜欢这个的。”\n\n已经凌晨两点了，我还睡不着......"
NCD.50.a:0 "吃一点安眠药吧"

NCD.51.t:0 "暗夜血光"
NCD.51.d:0 "“嘿，斯特韦。你听说了吗？国家现在要颁布一个法律，要求我们为了他们所称的“大元帅”而尽职尽责。这不是搞笑的吗？怎么可能全国家的人就为了他？”\n\n“瞧瞧你这话说的，你不怕下一秒那些秘密警察瞬间冲进来吗？\n\n“这大晚上的，他们不用休息？况且在我们自家的房子里，就算在外面巡逻，他们也听不见！就凭他们，也想要与我们伟大的西莉迪亚王室相对峙？人民永远站在我们这一边！”\n\n1999-01-538公民保障装置记录，已派出人员处理。滴—滴————\n\n“啪！别动！国家纯净处理部门！您的行为已经触犯西莉迪亚纯净法！”\n\n“受到消息，立即清除！”\n\n“啪——啪——”\n\n......\n又是寂静的夜。\n\n1999-01-921公民保障装置记录，完成任务。滴——滴——"
NCD.51.a:0 "整理并归类档案"

NCD.52.t:0 "大元首的宣言"
NCD.52.d:0 "§R以我们的血肉，阻挡敌人的来犯。\n以我们的筋骨，阻滞敌人的进攻。\n以我们的肺腑，恐吓敌人的意志、\n以我们壮烈的热血，谱成复仇之华章。\n以我们灼热的心肝，绘成伟大之未来。\n忆曾经年少，只为人民不断肠。\n忆曾经模样，只为国如往常样。\n我们将我们所有的希望投入在这一次的复仇计划之中，\n人民无偿的支持我，企业宣告着他们的爱国，军队勇往直前。\n我们不负祖国的厚望，人民的希望，过去的伤创。§!"
NCD.52.a:0 "§R为了我们的祖国！§!"

NCD.100.t:0 "旧笔拎残血"
NCD.100.d:0 "一封崭新的国家报告呈在了海因尼·茨尔的手上，海因尼·茨尔手中的笔轻轻转动，风过发末，昏暗的灯光不知为何将海因尼·茨尔脸上的皱纹镌刻得愈来愈深。\n\n“所以说，你要让我在这之间做出抉择？”海因尼·茨尔不耐烦地问道。\n“是的，我尊敬的大元帅。”两个人异口同声地说到。\n\n昏黄的光打在柯斯汀·舍尔勒的脸上。“国家的军备建设以及后方稳定需要那些人，我们不可以将他们不经分辨便送往战场。我们的国家会被这个毁掉的。”柯斯汀·舍尔勒焦虑地说道。他将自己手中的文件攥紧，心中百感交集。\n\n“呵，你连你的儿子都管不好，还管得好这个？只有军队才是我们的一切，我们需要的是坚定的精神，无畏的意志，不是这种犹豫不前！”站在暗处的另一个人戏谑着。\n\n柯斯汀·舍尔勒先是愣住，没想到他居然会说出这样的话。他的嘴唇微动，似乎欲说出什么而又止住。许久之后，他才缓缓张嘴。“你要不看看你在说什么，我们的小伙子们被你拉上战场，甚至配不上一把武器！”柯斯汀·舍尔勒从嘴角痛苦地挤出一句话。\n\n可惜的是，他的对手早已为自己准备好了说辞。“你的工业界辜负了这个国家和军队，你还好意思说？若不是你如今的位置，你早就被绞死在树上了。”暗处的人将声调略微提高。\n\n“你！”柯斯汀·舍尔勒捏紧了拳头，风将办公室的窗户吹开，门外的夜连同办公室陷入了死一般的寂静，远处操练的几声枪响划破了天空。\n\n“够了！”海因尼·茨尔将钢笔摔到桌上。“我会做出决定的。”"
NCD.100.a:0 "军队才是这个国家的一切"
NCD.100.b:0 "我们应该着力于工业建设"

NCD.101.t:0 "三省千殍经行处"
NCD.101.d:0 "“斯呜......给点吃的吧好心人......”在逃亡的路上，切斯特对这些呻吟早就已经听惯。在他在波塔尔森特家附近早已全是这类人了。他的好心在和平年代是大有益处的，而在此处却成为了他的累赘，每次走过一个这样的可怜人都对他的良心造成了巨大的考验。“没办法，我给了他们我就活不下去了......”他这样想着，慰藉自己受伤的心。\n\n在过去，西莉迪亚的广袤农田让其几乎不可能出现饥荒。而如今，由于战事一开，大量的农民以及壮年被迫抓去军队，剩下的人几乎无法维持农业的运作，还要面对军队的强行征粮食，人们被迫失去了种子粮，甚至于口粮。\n\n饥荒先在波塔尔森特与索利斯开始蔓延，城市渐渐得不到来自乡村的粮食补给，那些曾经享受着牛排与高等教育的城市人开始出逃前往乡村，随即是开始在人口过于稠密的乡村开始蔓延。\n\n人们又开始逃离乡村，四处游荡。刚开始，可以逃荒亦或是要饭的人都出去了，剩下的都饿的要死。下眼皮以及大腿位置出现了惊人的浮肿，孩童的肋骨似乎已经可以勒住小肠。波塔尔森特附近森林的树皮树叶已经被吃光了，有的人躺在床上，双眼浮肿，耳朵流着血水，突然站起向门外爬去，亦或是为了新生的麦苗，还没爬出去，也便断了气。\n\n到了附近的车站，像切斯特这样身上尚有部分食物以及钱财的人正在饥饿地拥挤在这里，角落里堆着前段时间去世的人们。“迁居函呢？”工作人员不耐烦地询问。在场的人却没有人可以拿得出，只是希望可以坐上车，前往尚有国家优先补给的工业城市维亚特尔。\n\n听到了这些人的处境，工作人员叹了口气便叫军队将他们处理。他们属于流窜人员，为了国家，他们应该被控制。他们身上的钱财被军官搜尽，关在了漏风的屋子中，一天一夜无吃无喝，有的人在半夜已经死了。\n\n第二天清晨，切斯特随着还活着的几个人被压上了车，他们会被遣返到更远的地方。军队将他们的枪架在他们所保护者的头上，仿佛这一切本就应该。"
NCD.101.a:0 "四死万魂无归路"

NCD.150.t:0 "北部的骚乱"
NCD.150.d:0 "当联合王国的旗帜从路切尔纳降下的时候，人民似乎早已经忘却了那些恍惚岁月，但是总有那些人怀着愤怒与不甘，计划着所谓光荣的归程。如今，时机已经到来，征程即将开始。\n\n蒙斯已经有一段时间没有收到来自路切尔纳的消息了，毕竟那里并不是战区，甚至显得有些安全，所以蒙斯方面并没有把这件事放在心上，而是着手于南方兵员的调动与饥荒的处理压制。很快，骚乱开始蔓延。一开始，蒙斯方面不过认为那只是一次普通的技术工人起义。但是渐渐的，消息却突然开始慢慢消逝，稳坐在红木座位上的军官们不过只是认为自己的镇压计划得到了有效实施，那里的骚乱正在慢慢平息。\n\n似乎只是在一夜之间，盖尔配和路切尔纳两地的交流瞬间被切断了，电话线被烧毁，电台的信号无法被收到，犹如困兽的蒙斯则陷入了恐慌之中，人们不知道发现了什么，首都护卫队以及蒙斯的边防部队开始紧急集合在两地的边界地带，在略带战颤抖的进攻口号中，在悠悠的夜间铃声间，那些士兵带上武器，踏上了似乎失色的土地。\n\n万幸之中，盖尔配地区与其矿场在极短时间内得到收复，控制他们的部队大多是得到了他们上级的蛊惑，以为伟大的祖国抛弃了他们。所以当我们到来时，他们并没有做出过多抵抗，唯一零星的抵抗是以为我们对他们发动总攻的蒙斯山脉新联合阵线游击队。显然，他们也在困惑之中。但是他们的长官拒绝回答他们这样做的目的，且大多在我们抓住他们前自杀了。\n\n当军队开进到路切尔纳省边境时，意想不到的事发生了，曾经隶属于路切尔纳边防与治安管理的部队与我们在省界对峙，军队们向上级请示，询问事情的来由。却迟迟得不到回应。\n\n地平线处闪过几片黑影，联合王国的部队出现在视野中。这时，人们才发现，联合王国的军队早已跨过了国境线，而“至上的国王运动”的那群背叛者，也早在暗中搭桥牵线，买通了那些保守顽固的军官，试图在我国北方建立所谓缓冲区。而我们的行动，太迟太迟了。\n\n无论是国内还是国外媒体，都没有意料到这一天的到来，除去联合王国保持的缄默。斯兰登·格里菲斯以胜利者的姿态将象征着北西莉蒂亚地区的旗帜插在了路切尔纳市政厅的塔钟顶，红黄的旗帜在塔上飘扬。北方的人们欢呼着，庆祝他们脱离了暴君的控制，却没有发现，自己沦为管风琴谱的几列音符，命运早已不由自己演奏。"
NCD.150.a:0 "一切早已暗中标记价格"

NCD.151.t:0 "铁浸血，麦易髓"
NCD.151.d:0 "在昨日的夜晚，新联合阵线在我国的中部山脉与东南部进行了大规模的设施破坏，导致了我们前线指挥系统的损坏与情报交流系统的停滞，一些滞留在临时据点的我国警卫部队收到了彻彻底底的打击，已经完全丧失了战斗力。\n\n海因尼·茨尔看着各地发来的加急通话，缓缓地用手在地图上标出一个个失去联系的警卫驻地。恍然间，他猛地站起，大头针在不经意间刺破了他的手指，流出了鲜血，落在他闪着寒光的腰间匕首上。\n\n“这……这不可能，我们不是已经控制好了那些东南的匪徒了吗。”海因尼·茨尔转身用用力但震颤的声音怒斥着国家警卫队的队长，他头发散乱，已然一夜未眠，眼镜的一脚已经露出裂缝，玻璃上浮满了油渍。\n\n“很抱歉，我们的元首。”这就是现状，他们已经控制了盖尔配附近的一片矿区，那是由盖尔配矿工联盟占领的，还占领了魁特兰附近的小县城，我们的前线警卫部队已经几乎被全歼，他们已经试图与公社方面取得了一定程度的联系，并已经将军队并入了他们的指挥范围，我们的警卫部队无能为力，只能将前线部队一定程度地移出并去处理这些起义军。\n\n窗外还依然飘荡着清晨的寒风，初花无法承受这样的悲凉，兀自落了，伤心铺满了一地。梅因尼·茨尔看着前线焦灼的战况，沉思片刻说到：“我同意你们调用部队，但是记得快点，我们的时间不多了。”"
NCD.151.a:0 "恶果自食，黑血待凝"

###领导人###
NCD_none:0 "无领导人"
NCD_west_spear:0 "韦斯特·斯佩尔"
NCD_ottacite_redd:0 "欧塔西特·雷德"
NCD_nalle_westerle:0 "拿勒·威斯特尔"
NCD_nalle_westerle_desc:0 "在1995年东巴大战停止之后，之前从南方逃来的共和派的领导人被极端分子暗中刺杀，拿勒·威斯特尔便被选为了西莉迪亚共和党的“临时决策人”。\n\n在他走到这一步位置之前，他只不过是一位大学政法老师。在目睹了自己的国家毁坏于战争之疡的时候，他便下定了决心要为自己的国家出一份力，在东巴战争期间，他凭借着自己的演说，快速取得了共和党高层的位置。西莉迪亚内战开始的时候，他曾前往南方的公社秘密考察一段时间，但是他仍然认为这样的制度救不了自己的国家，随之回到了西莉迪亚共和国。\n\n在东巴战争停止之后，联合王国迅速出兵，稳住了公社的进攻，让其不得不临时选择盘踞南方，而此时西莉迪亚共和国仍然拥有北部地区，但是由于南方的公社起义，1996年，由共和党以及军队代表组成的政府成立，拿勒·威斯特尔被选为总统，开始了他的领导生涯。\n\n但是他，拿勒·威斯特尔一上任就面对着一个巨大的问题，自从南西莉迪亚独立之后，西莉迪亚失去了许许多多的工厂以及消费人口，这让北西莉迪亚的孱弱制造业无法出售冗余胡产品，许多东西烂在流水线上。拿勒·威斯特尔采取了比较极端的方式，强制要求企业按照国有的价格出售物品，但是事实证明，政法老师的经济学不一定的好，国家的财政出现亏空以及通货膨胀开始越来越快，人民的生活开始越来越严重，人们开始反思现有制度的正确与否。\n\n当有人在政府里提出迎接王室回来的时候，事情开始严重起来，这样的声音越来越大，而军队里也开始出现了嘈杂的声音，拿勒·威斯特尔开始发现自己已经控制不了现状了，只好被时代所裹挟而去。政府里越来越多的人们转向了保皇派，军队已经开始秘密筹划行动。\n\n1999年，离拿勒·威斯特尔的任期结束还有不到半年时间，他已经精疲力尽，但是又深信这王室统领的西莉迪亚没有未来，他也只好步履蹒跚，在根基腐烂的政府大楼里来回踱步，夜夜未眠......"
NCD_temp_order_committee:0 "临时秩序委员会"
NCD_temp_order_committee_desc:0 "临时秩序委员会是由先前国家政府中支持君主回归的成员组织的，成分包容而复杂，但是大家都始终都坚信着君主可以给我们的国家带来最稳定的未来，最完美的未来。"
NCD_per_henschel:0 "佩尔·亨舍尔"
NCD_heinrich_tzur:0 "海因尼·茨尔"
NCD_heinrich_tzur_desc:0 "海因尼·茨尔在那一切来临之前的时候，他只不过是一位被众人所看好的老军官，拥有一个幸福的家庭，但是在东巴大战开始的时候，他便作为西莉迪亚远征军特别A团的团长，前往了前线，当他回来的时候，他得知联合王国为了留存当时的军心，没有向远征军公布当时西莉迪亚内战的消息，当他回到自己的家里的时候，他发现自己的家已经被炮火摧毁，妻子以及女儿已经丧命，只剩下自己的儿子阿尔特斯·茨尔，那时，他的对于公社的满腔怒火充斥这他的心里。\n\n他加入了对于公社的战斗中去，但是也实在这个过程中，他认识到了公社的令人厌恶，他这么说到。联合王国的不作为也让他感到非常愤慨。在南北实现对峙之后，他回到了军队中去，计划并成功实施了对于刚刚从公社逃来的共和党领袖暗杀，并凭借着自己的经验老道以及故事坐上了军队的管理人。但是却受到了当时人民的反对。\n\n当拿勒·威斯特尔要求其加入新政府时，他欣然接受，但是他知道，这只是暂时的。\n\n§t“西莉迪亚需要我，永远将会需要！永远！！联合王国！公社！他们都是杂种！杂种！”§!"
NCD_artus_tzur:0 "阿尔特斯·茨尔"
NCD_kerr_celydrea:0 "克尔·西莉迪亚"
NCD_kerr_celydrea_desc:0 "暂无描述"

###决议###
NCD_skilled_worker_construction:0 "技术工人建设"
NCD_skilled_worker_construction_desc:0 "在我们决定对西莉迪亚的孱弱军工业进行快速建设的时候，这一建设计划被搬上台面。这一计划代表着我们对于国家技术工人这一稀有且必要职业的职业规划正式提上日程。虽然这些计划在外国他们送所谓的自由主义中并不被赞同，但是这§R一切都是为了我们国家的建设。§!我们还可以进行一些§0魔晶矿毒气§!的合成，可以再一开始极大的挫败敌人的防御，但是随着使用次数的增多，这一切都会§R慢慢失去效果。§!\n\n我们需要§R平衡§!我们现有技术工人的数量，维持我们正常工业品的生产。但是我们也需要注意新工厂的建设，将我们生产单位增加。这一切§R并不容易§!保持平衡。若技术工人呢过少则会为我们的社会造成更大的问题。\n\n但是我们仍然有些办法，例如对于外国劳工的秘密偷渡引渡，面对我们内部的招聘，或者更加黑暗的绑架。§R但是请您记住，为了西莉迪亚的伟大复兴。§!"

