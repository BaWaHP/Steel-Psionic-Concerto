NCD_interal_conflicts_title_1:0 "---§C至上的国王运动§!---"
NCD_interal_conflicts_title_1_desc:0 "§C至上的国王运动§!代表着在西莉迪亚路切尔纳与首都大区其中部分地区活跃的西莉迪亚王室支持者，大多数较为温和，并试图以谈判或者利益交换的手段推动北部地区的自治以及他们最终的目标——一个温和的军控君主立宪制政府的实现。虽说其中不乏有一定数量的激进分子，而且得到了北部联合王国的支持。他们依然是我们可以试图去合作的目标。通过他们，我们可以从暗中渠道得到来自北方的支持，毕竟他们也不希望公社之火烧向南方的边境。"
NCD_interal_conflicts_1_open:0 "开启§C至上的国王运动§!相关决议"
NCD_interal_conflicts_1_close:0 "隐藏§C至上的国王运动§!相关决议"

NCD_interal_conflicts_take_actions_1:0 "§C至上的国王运动§!控制力的转移"
NCD_interal_conflicts_take_actions_1_desc:0 "他们已经在我们国内取得了一定的经济控制度，为了将这一部分控制力转变到实质上来，他们会采取风险投资，贿赂官员，开发地区等方式来扩大对我们的政治影响力。"
NCD_beat_royalist:0 "打击§C至上的国王运动§!"
NCD_beat_royalist_desc:0 "我们已经对打击§C至上的国王运动§!的活动掌握了一定的证据，我们可以派出我们的代表与他们进行磋商，或者在他们后面做一些手脚。"
NCD_request_food_fund:0 "§C要求粮食援助§!"
NCD_request_food_fund_desc:0 "如今西莉迪亚中部的饥荒已经到了我们无法控制的阶段，我们别无选择，只能哀求北部的联合王国可以给予一些粮食援助，§C至上的国王运动§!将在之间担任中间人的角色。"
NCD_request_mil_support:0 "§C要求军事援助§!"
NCD_request_mil_support_desc:0 "我们可以通过§C至上的国王运动§!与联合王国的联系，走私一些武器到达我国，用来支持我们的内战胜利。"
NCD_mons_agreement:0 "§C蒙斯协定§!"
NCD_mons_agreement_desc:0 "在我们国家建立的伊始，我国便已经关闭了边境，如今我们可以去回复与联合王国的路上铁路交流，这会吸引两地的贸易，也会迫使他们出动些许警察部队来帮助我们处理游击队。"

NCD_interal_conflicts_title_2:0 "---§g救国阵线护国派§!---"
NCD_interal_conflicts_title_2_desc:0 "§g救国阵线护国派§!代表着军队执政联盟即救国阵线中较为温和或保守的派别，其内成员大多是较为年老的军官或民族资产阶级。他们建议我们与较为温和的民主政党与王党合作，并拥有一定数量的军队武装。在共和国时期，由于与我们类似的执政诉求被纳入救国阵线。他们反对我们部分的激进政策与行动，并会对这些计划的实施进行阻滞。尽管如此，他们依然是我们最为亲密的盟友，我们可以从他们手上拿到一定数量的军队武装与装备。我们许诺将在战后与他们进行政治对话。"
NCD_interal_conflicts_2_open:0 "开启§g救国阵线护国派§!相关决议"
NCD_interal_conflicts_2_close:0 "隐藏§g救国阵线护国派§!相关决议"

NCD_interal_conflicts_take_actions_2:0 "§g救国阵线护国派§!正在行动"
NCD_beat_protean_faction:0 "限制§g救国阵线护国派§!行动"
NCD_beat_protean_faction_desc:0 "合适的控制手段与对相应官员的警告可以有效控制救国阵线护国派的活动范围与动向。"
NCD_integrate_high_command:0 "§g合并最高指挥团§!"
NCD_integrate_high_command_desc:0 "如今我们的指挥系统由于派系的分裂产生了巨大的裂隙，为了祖国的复兴，我们需要去修复这些裂隙，并组织完善的指挥系统。"
NCD_close_defense_tactic:0 "§g缜密的防守战略§!"
NCD_close_defense_tactic_desc:0 "我们可以要求保守军官团指定缜密的防御计划，为我们巩固战线。"
NCD_demand_mil_support:0 "§g要求派系军队支援§!"
NCD_demand_mil_support_desc:0 "几乎所有人都知道，温和派在这场内战中保留了部分的私人军队与雇佣军，是时候让他们拿出这些军队贡献国家了。但是这会有一些代价。"
NCD_demand_mil_support_tr:0 "该决议可选2次，当前已进行[?NCD_demand_mil_support_count|Y]次。"
NCD_interest_for_weapons:0 "§g利益换取私存武器§!"
NCD_interest_for_weapons_desc:0 "大批年代久远的防空洞与弹药库中，存放着许多旧共和国时期的武器装备，他们大多被温和派所控制，如今我们可以以一些利益交易来换取他们手上的武器。"
NCD_interest_for_weapons_tr:0 "该决议可选2次，当前已进行[?NCD_interest_for_weapons_count|Y]次。"
NCD_bribe_senior_officials:0 "§g贿赂高级官员§!"
NCD_bribe_senior_officials_desc:0 "在如今战乱的背景下，仍然有许多中低级官员有护国派倾向。贿赂可以解决许多相关的问题，也可以帮助我们拉拢那些我们不希望出现在护国派的人。"
NCD_suppress_consertive_mind:0 "§g压制保守想法§!"
NCD_suppress_consertive_mind_desc:0 "在如今国家处于危难之际，一切温和与保守的想法都会导致我们政治与军事体系的效率低下，从而导致我们国家的灭亡。一定限度下的对保守想法的压制是合乎情理的，至少让他们知道，谁才是这个国家的主人。 "

NCD_interal_conflicts_title_3:0 "---§O新联合阵线§!---"
NCD_interal_conflicts_title_3_desc:0 "§O新联合阵线§!代表着在我国西部与皮奥瑞拉接壤的地区的地下组织，其如今成员大多为原联合阵线的中间派与左派，他们扎根于当地民众，收到我国自由派人士的支持，是反抗我们当今救国政府的重要敌人。其中的激进派组织了大量的游击队与民兵，破坏着我们的后勤与补给线路，并在背后得到了皮奥瑞拉共和国的支持。与其为联盟关系的§t盖尔配工人联盟§!则是活跃在蒙斯山脉山区与南方森林中的极端共产主义游击队，在技术工人与矿工界有一定影响力，经常组织对工厂设施的破坏与罢工来影响我们国家的发展。我们不得不派出我们的警察部队去围剿他们，防止他们对我们的国家造成过多不利影响，但是这也为牵制我们的警察部队，不利于社会稳定。"
NCD_interal_conflicts_3_open:0 "开启§O新联合阵线§!相关决议"
NCD_interal_conflicts_3_close:0 "隐藏§O新联合阵线§!相关决议"

NCD_interal_conflicts_take_actions_3:0 "§O新联合阵线§!正在行动"
NCD_expand_police_force:0 "§O增添警察部队§!"
NCD_expand_police_force_desc:0 "我们可以为镇压他们投入更多的警察部队，尽管这些带来一些危害。"
NCD_increase_threshold_for_police:0 "§O提高警察出动门槛§!"
NCD_increase_threshold_for_police_desc:0 "警察部队的过多出动会影响我国的治安以及管理，我们可以提高部分警察部队的出动猛砍，从而起到防止游击队占用警察部队的作用，但这也会加重游击队的影响。"
NCD_strict_control_over_borders:0 "§O严格管控国境线§!"
NCD_strict_control_over_borders_desc:0 "我们通过加强对边境线的管理，可以有效防止皮奥瑞拉对我国过多的渗透与行动，对我们利大于弊。"
NCD_protect_supply_line:0 "§O守卫补给线§!"
NCD_protect_supply_line_desc:0 "§O新联合阵线§!与公社的游击队对我们的补给线已经造成了非常严重的影响，我们应当以铁路与公路为据点，建立堡垒建筑，来防御他们的进攻。"
NCD_secret_police_proj:0 "§O秘密警察计划§!"
NCD_secret_police_proj_desc:0 "介于目前§O新联合阵线§!对我们东南地区的游击力度仍在不断加强，我们可以要求警察部队去吸收一些当地爱国者来组织武装部队，从而在民间扩大我们的影响力范围，也可以去打击§O新联合阵线§!。"
NCD_interal_conflicts_take_actions_4:0 "§O新联合阵线正在游击对抗§!"
NCD_interal_conflicts_take_actions_4_desc:0 "§O新联合阵线§!正在我国的东部各省组织游击组织，而且正在取得一些成果，他们会造成包括但不限于工厂损坏，补给线损害，装备丢失等影响，乃至武装起义。"

