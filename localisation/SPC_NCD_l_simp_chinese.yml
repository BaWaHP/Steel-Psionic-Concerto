###民族精神###
NCD_support_from_uk:0 "联合王国的支持"
NCD_support_from_uk_desc:0 "西莉迪亚共和国现在得以生存都是靠着奥罗日亚联合王国的军队援助换来的，在那次大战之后，公社方面以及联合王国已经撤军。但是奥罗日亚联合王国仍然给予我们他们力所能及的援助，包括但不限于消费品，工厂，科研合作。他们的援助已经成为了我们国家维持日常的重要前提，如今我们的经济崩盘，联合王国的援助不减反增，大家都心知肚明他们想要什么，我们却无能为力，我们无法承受那一天的到来。\n§t一旦他们想要亲自下场或者我们做的太过了，联合王国的怒火将会......§!"
NCD_ubstable_army_and_politics:0 "政乱军隐"
NCD_ubstable_army_and_politics_desc:0 "由于内战的突然开始以及仓促结束，再加之奥罗日亚对于我们政治方面的渗透，军队在我们国家陷入的令人害怕的安静。大批的军官以及军队高层都开始退出国家政坛，军队开始不再在政府中发声去诉说他们军费不足之类的问题。从现在频发的各种军事事故以及一些小道消息，连蒙斯的老大妈们也知道军队的问题，这都已经成为了人们茶余饭后的故事，当然是在没有军队的眼线的情况下。军队一定是在谋划什么东西，只是我们不知道罢了，虽然是一个火药桶，但是相比于其他的问题来说，这也算好的，起码我们不用时刻担心，大抵只需要看看他们的脸色做事罢了。"
NCD_dying_republic:0 "垂暮共和"
NCD_dying_republic_desc:0 "西莉迪亚共和国的制度是依靠广大的人民来建立的，我们试图与奥罗日亚进行协调，自己将自己纳入奥罗日亚联合王国的势力范围，联合王国方面也非常乐意看到这样的情景，但是他们依然无数次要求我们迎回西莉迪亚王室，我们也只好拖延，人民也没有什么意见。但是现在，由于共和政府的效率极慢以及经济系统的崩盘，许多人民已经开始回忆曾经在温和君主制下的和平生活，而不是现在的饥寒交迫。人们开始将问题归咎于共和政府而不是南方那些毁了我们生活的人。共和制度已经在西莉迪亚摇摇欲坠。"
NCD_collapsed_economy:0 "金破纸碎"
NCD_collapsed_economy_desc:0 "拿勒·威斯特尔在1997年颁发的稳定经济法案让国家的经济已经开始崩溃，金融市场早就已经消失了，无数人失去了自己的工作以及经济来源，市场中的西莉迪亚元已经被抛弃，沦为厕所垃圾桶中的擦手纸，人们开始用联合王国的纸币来兑换物品甚至是南方的丑恶纸币，商业在许多小城市已经倒退到了以前以物易物的方式，人民每天都为这自己的食物以及生活消费品而日夜难眠，已经没有多少人愿意为国家做建设了。"
