NCD_interal_conflicts:0 "西莉迪亚内部斗争"
NCD_interal_conflicts_desc:0 "既然，西莉迪亚军国从政变的军人手上诞生。毫无疑问的就是，无数人也仍然在暗中做着与我们之前所作相同的事。他们活跃在山野之间，抑或是隐于市巷。无论是诞于外部势力的入侵与培养，或者我们内部的分歧，它们都是我们伟大祖国的危害因素，我们需要尽力保持他们与国家政府之间的恰当关系，并在必要时刻给予他们致命一击，或者从他们手上捞到些好处，尽管这会付出一些代价。\n\n§R请注意§!，§C至上的国王运动§!的政治影响力将直接反映在我们与联合王国对于路切尔纳的控制上，他们的影响力越大，我们的麻烦越多。而他们对我们的经济影响力可以通过一些手段转变为政治影响力，甚至在战后影响我们的经济。§O新联合阵线§!的游击力度的增加则会导致我们的后勤出现问题，也会导致许多恶性事件的发生。若游击力度大于50%则会有极其恶劣的后果。§g救国阵线护国派§!的党派支持度不会在战间造成过多影响，在战争期间我们可以以各种战间借口快速积累或削减党派支持度。而在战后，如果我们需要改变他们的支持度，就只能做出某些巨大的让步。无论是这些让步，抑或是客观上的党派支持度，都会引导我们走上不同的道路。\n\n§C至上的国王运动§!的§Y政治影响力§!：[?NCD_interal_conflicts_var_1_1|Y%%]\n§C至上的国王运动§!的§Y经济影响力§!：[?NCD_interal_conflicts_var_1_2|Y%%]\n§O新联合阵线§!的§Y游击影响度§!：[?NCD_interal_conflicts_var_2|Y%%]\n§g救国阵线护国派§!的§Y党派支持度§!：[?NCD_interal_conflicts_var_3|Y%%]"

