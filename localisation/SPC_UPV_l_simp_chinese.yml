###企业###

###国策###
UPV_determination_of_the_queen:0 "王的决意"
UPV_determination_of_the_queen_desc:0 "伊丽莎白·苏平姆，现任上维尔陶大公，旧南巴帝国皇族。从一个懵懂的贵族少女变成了如今的铁血君主。没人知道这十年里她经历了什么，不过她的脱变却是被所有人看在眼里的。世界大战带给上维尔陶的混乱仍在继续，比德尔二世的妥协只不过延缓了上维尔陶的堕落。也许对于这样的一个国家来说，稳定即是唯一所求。但伊丽莎白并不这么想。\n\n十年的时光里，她的思想早已发生了极大的改变。她想要的早已不是什么首饰与珠宝，她想要的是昭告这天下：上维尔陶的变革即将来临，她已经下定决心。而下定决心之后，就轮到该如何去做了。\n\n决意已下，向前进吧！"
UPV_battle_over_corruption:0 "打击腐败"
UPV_battle_over_corruption_desc:0 "变革的第一步自然要从已经腐败到底的政府与官僚入手。没有一个国家能够在政府如此腐败的情况下实现复兴，就算是昔日的帝国也倒在了腐败手里。这些腐败分子在政府里如鱼得水，已经成为了我们的绊脚石。不过这么多年下来，他们的势力根深蒂固，如果想要将他们连根发起，可能会触怒许多人的利益。不过，这是必要之痛。只有对腐败的强力打击，才能彰显我们的决心之深。"
UPV_checking_the_list:0 "核对清单"
UPV_checking_the_list_desc:0 "对付这些腐败分子最好的办法，就是查一查这些陈芝麻烂谷子的旧账了。\n\n我们的经济情况究竟如何？这些腐败分子究竟贪了多少？一份仔细且完整的清单将会告诉我们这一切。以前的财政报告只是一堆废纸。忠于王室的经济学家和政府官员将会仔细的核对过去的财政报告，而我们也将得知上维尔陶的经济的真实状况。"
UPV_buying_the_loyalty:0 "收买人心"
UPV_buying_the_loyalty_desc:0 "虽然我们下定决心要打击这些腐败分子，但谁说我们不能通过保住他们的乌纱帽来换取他们对我们的支持？虽然我们不能将他们赶出政府来换取民众的支持，但只要这些腐败分子的把柄一日被握在我们手里。他们就将无法忤逆我们的决策。同时，他们将欠我们一个难以还清的人情。这将对我们日后的行动提供绝佳的支持。\n\n为了我们的未来，放他们一命，利大于弊。"
UPV_speech_on_the_parliament:0 "在议会的演讲"
UPV_speech_on_the_parliament_desc:0 "随着我们解决了基层的腐败问题，我们是时候该拿议会里这些尸位素餐的“大人物”们开刀了。这些议员们通过《议会扩大法案》逐步扩大自己的影响力，以此来谋取好处。随着我们调查的深入，这些冠冕堂皇的大人物的所作所为简直是触目惊心。\n\n议会中派系间的相互倾扎，不曾间断过的贿赂与腐败，议员们奢华的生活。这些都将成为有可能引爆上维尔陶的炸药桶。虽然我们目前并不能将他们一网打尽，但在议会发表演讲来敲打敲打他们还是可以做到的。尽管这会让议员们感到不满。"
UPV_speech_on_the_parliament_tr:0 "§C改革进度§!达到§Y45%§!。"
UPV_parliament_reelection:0 "议会重选"
UPV_parliament_reelection_desc:0 "一个腐朽至极的议会能做到什么？答案是什么都做不到。这些议员们早已不配拥有他们手中的权力了。随着我们进一步收回了议会的权力与掌握了议员们的罪证，现在我们可以要求议会重新选举了。这些衣冠禽兽早该放手他们的权力了，一个清廉，忠心，为我们所用的议会将会成立。"
UPV_meeting_with_the_capitalists:0 "与资产阶级会谈"
UPV_meeting_with_the_capitalists_desc:0 "即使我们不愿意承认，但是资本主义与自由主义的浪潮正在席卷上维尔陶。国内的新兴资产阶级与大资产阶级是一股不容忽视的力量。很明显，他们中的许多都或多或少的支持自由主义。这显然与我们的目标有着极大的冲突。\n\n不过贸然得罪他们的后果会是十分严重的，但是我们之间的矛盾并非无法调和。通过一场恰当会谈，我们将会找到与他们和睦相处并且展开合作的方法。"
UPV_the_stable_parliament:0 "“稳定”的议会"
UPV_the_stable_parliament_desc:0 "我们对议会的掌控度已经使得《议会权力扩大法案》变成了一张废纸。不过这正是我们想要的结果。为了我们的大业与国家的稳定，我们绝对不能允许议会里有一丝一毫的异议出现。我们坚信，人民也将明白究竟是什么才能保护他们的安宁与和谐。\n\n摆在我们面前的只有两条路，要么以威权统治，要么以危机终结统治。正因此，一个完全被我们掌控的议会是必要的。"
UPV_the_stable_parliament_tr:0 "§C改革进度§!达到§Y80%§!。"
UPV_taking_parliament_power_back:0 "收回议会权力"
UPV_taking_parliament_power_back_desc:0 "如果说最开始的议会是一些忠诚的臣子在辅佐公国，改革前的议会是一群贪婪的小人敛财的地方。那么现在的议会就是女大公的一言堂了。王党已经完全掌控了议会，其他的政党与派系不是宣誓效忠，就是被赶出了议会。而我们也将完成我们的其中一个目标：宣布《议会权力扩大法案》的无效与收回比德尔二世赋予议会的权力。\n\n今后的议会将只是作为女大公的国策顾问与在大公生病时临时代理朝政的存在。而伊丽莎白一世将成为上维尔陶唯一的决策者，不受任何人的限制。"
UPV_rectify_the_bureaucracy:0 "整顿官僚体系"
UPV_rectify_the_bureaucracy_desc:0 "虽然大公十分讨厌那些自由主义者的说辞，但是有一点可以肯定：已经运行了两百余年的上维尔陶官僚系统失灵了。大量不学无术，贪得无厌的庸人和贵族被安排进了这套系统中。使得官僚系统彻底变成了依附在国家体制上的蛀虫。\n\n如果我们想改变这个国家，那么对官僚系统的整顿将是头等大事。通过对他们的整顿，我们也许可以暂时减轻这个蛀虫的吸血程度。"
UPV_purge_of_moths:0 "肃清蛀虫"
UPV_purge_of_moths_desc:0 "在获得了整个上维尔陶的这是状况后，伊丽莎白明白了一件事。我们伟大复兴的基业决不能被这些蛀虫所毁灭，即使他们早已在这里根深蒂固。如果我们想要复兴王室专政，那么就绝不能在这里与这些蛀虫妥协。\n\n这些高官们越来越过分的横征暴敛正在加速人民的不满。就算是当了一千多年的顺民，也不代表他们就会一直忍受下去。兔子急了还会咬人，我们必须要让双方冷静下来。或者说，直接对这些官僚出手。将腐败的大树从国家中连根拔起，在我们所有的努力还没付之东流之前。"
UPV_holding_the_handle:0 "掌握把柄"
UPV_holding_the_handle_desc:0 "虽然这些蛀虫严重影响了我们的事业，但是我们为什么不利用好他们呢？水清不能偏用，水浊也不能偏废，自古皆然。帝王之道就是在这两者之间保证一个绝妙的平衡。不过如果我们已经掌握了这些贵族与官僚犯罪的证据，这将成为一个绝佳的把柄。现在还不是撕破脸的时候，官僚依然是我们政策的执行者，贵族依然是我们的“好朋友”。就让这场友谊持续下去吧，直到那一天的到来。"
UPV_put_in_a_chain:0 "套上锁链"
UPV_put_in_a_chain_desc:0 "一个令人高兴的事实是，我们在贵族们不知不觉的情况下，就掌握了可以把他们统统送上绞刑架的东西。一个更令人高兴的事实是，我们的势力已经超过了这帮脑子里只有吃喝玩乐，保守，维持现状的蠢货。这套低效的行政体系将被打破，而这些趾高气昂的旧贵族们的好日子也要到头了。\n\n我们将建立起一套全新的行政体系，对这些旧贵族们采取果断的行动。裁撤掉这些蛀虫，使我们能够掌握公国的方方面面。比德尔二世放开了这些旧贵族的锁链，那么，现在轮到我们再为他们套上锁链了。"
UPV_streamlining_the_bureaucracy:0 "精简官僚机构"
UPV_streamlining_the_bureaucracy_desc:0 "在历经了这么多的准备工作后，我们是时候给这套落后，腐败，保守的行政官僚机构最后一击了。旧帝国就是毁在这套体制上，正是因为这套体制，才导致那些该死的民主派不断壮大，直到摧毁了旧帝国。我们必须吸取这个教训，要把更多的目光放到人民与这个“庞然大物”中。\n\n因此无论如何，给旧体制的盖棺都是必将实行的行动。为了国家的进步，为了帝国的复兴，为了大公的野望，就让我们摧毁这个亲手缔造的怪物吧。一个崭新的行政机构将会取代他们。"
UPV_remove_old_nobility:0 "清除旧贵族"
UPV_remove_old_nobility_desc:0 "曾经铁板一块的旧贵族集团已经消失了。在我们持续不断的打击与分化下，除了一些顽固不化的老古董外，大部分旧贵族都已经放弃了他们的权力。不过大局已定，任凭他们如何诋毁大公都无济于事了。人民已经知道谁是正确的，大公将向人民敞开心扉，她将与人民一同前进。\n\n而前进的第一步，就是让这些顽固的旧贵族在这世界上彻底消失。为了国家的稳定与帝国的复兴，任何手段都是有必要的。"
UPV_announcing_laws_abandoned:0 "宣布法案作废"
UPV_announcing_laws_abandoned_desc:0 "除了《边境开放法案》与《议会权力扩大法案》之外，比德尔二世遗留下来的最后一个烂摊子就是臭名昭著的《贵族募兵法案》。这给了旧贵族们合理的豢养私兵的理由，也间接导致了比德尔二世后期的集权改革失败。不过好消息是，这些贵族私兵的腐化速度比他们的主子还要快。在我们已经改革成功的军队面前，他们甚至连举起武器都做不到。\n\n随着这些私兵的投降与倒戈，现在是时候宣布这混蛋的法案作废了。至于这些私兵？国防部与劳工部想必会很欢迎他们的到来。"
UPV_those_who_listened_are_good:0 "听话的贵族才是好贵族"
UPV_those_who_listened_are_good_desc:0 "随着法案的作废，私兵的解散。这些贵族已经再无可能与我们对抗了。我们本来就是王室专政的国家，为什么要看这些旧贵族的脸色过活？难道他们不明白，如果没有我们，他们早就被那些民主分子送上断头台了！他们应该感恩我们给了他们现在的生活。只要我们依然握着手中的锁链，这些旧贵族就只是我们脚下的一条狗而已。我们要让他们明白，听话的贵族才是好贵族。一切破坏王室与国家稳定的人，都将被我们铲除。"
UPV_royal_new_politics:0 "王室新政"
UPV_royal_new_politics_desc:0 "我们成功了！经过数十年的隐忍，我们终于解决了这些危害国家的蛀虫。就算许多人评判我们手段残忍血腥，但我们相信历史是公正的。将旧的抹去后，到来的将会是充满希望的“新”！我们解决了腐败而无能的议会，解决了那些趾高气昂，狐假虎威的旧贵族。我们将未来带给了上维尔陶。上维尔陶将在全新的王室新政下，大踏步的向前进，直到那命定的终点。\n\n同时，我们也是时候开始谋划我们心中那充满野心的大业了。帝国复兴，就在眼前！"
UPV_stop_for_god_sake:0 "都给我停下来！"
UPV_stop_for_god_sake_desc:0 "看起来我们还是太惯着伊丽莎白那个小女娃了。既然豢养的小猫长出了爪子想要反抗，那势必要让她明白，谁才是真正的老虎。她的那些改革会毁了上维尔陶，我们必须在事情变得没那么遭之前阻止她。这既是为了上维尔陶，也是为了我们自己。一个维持现状的上维尔陶才是她应得的未来。\n\n现在，我说，§R都该停下来了§!。"
UPV_break_the_iron_wrist:0 "击碎铁腕"
UPV_break_the_iron_wrist_desc:0 "小猫张牙舞爪的向我们示威，说这是什么铁腕。狗屁铁腕！我们释放的善意让那个小女娃变得得寸进尺了。她不会觉得她那个废物父亲没做到的，她就能做到了吧？简直可笑至极。接下来就让我们一步步摧毁她的成果吧，希望她到时候不要一边哭鼻子一边跪在我们身前，向我们求饶啊。不过，这个光景，似乎也挺不错的？"
UPV_clear_royalists:0 "清除王室支持者"
UPV_clear_royalists_desc:0 "我说是谁让一向听话的小猫开始反抗我们了，原来这帮所谓的王室派啊。早知如此，当年就应该把你们连同那些所谓的忠臣一起送上天！不过现在执行也不晚。只要将你们这些暗地里的鼓动分子清除掉，伊丽莎白就会变回那个我们熟悉的花瓶了。不管到时候她是否能够接受，也由不得她了。上维尔陶是我们的，过去是，现在是，未来也是，永远都是！"
UPV_stop_the_reforms:0 "中断改革"
UPV_stop_the_reforms_desc:0 "伊丽莎白的改革计划已经严重的影响了我们的利益。先前我们试图以隐忍换取稳定，不过现在已经没必要了。派我们的人过去顶替掉那些给伊丽莎白卖命的官员，中断她在整个上维尔陶的改革，想必是最能狠狠打击到她的方法吧。真好奇我们这位小猫在得知这一切之后会是什么表情。同时，她也将明白，她永远都是我们手中的玩物。当好她的傀儡大公就好了。"
UPV_nothing_but_playdate:0 "不过是一次过家家"
UPV_nothing_but_playdate_desc:0 "好了，伊丽莎白所谓的改革计划已经全面失败。听说她构思了十年之久，但是镇压起来却异常的简单。或许这小女娃是把它当成了过家家，以为动动嘴皮就能让她的计谋实现，以为手指一点就能让上维尔陶都听从她的命令。毕竟是个非正统的公主，能做到今天也算是她那废物父亲保佑了吧。不过真可惜啊，在我眼里，只不过是一次普通到不能在普通的过家家罢了。"
UPV_captivity:0 "囚禁"
UPV_captivity_desc:0 "当你养了十几年的小猫想要抓伤你，你会怎么做？当然是把它关起来好好反省反省。当然，对外我们肯定需要一个理由。比如女大公病了这个理由就很不错。就让伊丽莎白在王宫里好好待着吧，等到一切都尘埃落定之后，我们还需要这只可怜的小猫来帮我们维持稳定呢。"
UPV_enprisoned_bird:0 "笼中之鸟"
UPV_enprisoned_bird_desc:0 "听说在东方的一个大岛上，上面的人们用笼中鸟来称呼被剥夺自由的女性。这么来看，伊丽莎白又何尝不是笼中鸟呢？可怜她还在想着反抗，要我说倒不如就像那传说里的女孩一样认命了比较好。不过话虽这么说，我们还需要她来当一座神像。就让我们来摧毁她的自信与骄傲，让她明白，她只不过是笼子中的小鸟。而我们则是笼外的主人。"
UPV_stablize_crowds:0 "稳定人心"
UPV_stablize_crowds_desc:0 "虽然不想承认，但是对伊丽莎白的囚禁确实导致了社会动荡。在我们还没能彻底说服伊丽莎白与我们合作之前，我们需要尽可能的稳定人心。首先就是取消掉那些军工厂的建设，将土地归还给地主。只要确保地主与地方官员的利益，那么他们自然会帮我们镇压民间的那些异议。"
UPV_stablize_crowds_tt:0 "系统§Y工业化进程§!会被§R禁用§!！"
UPV_lovely_jar:0 "受人喜爱的花瓶"
UPV_lovely_jar_desc:0 "天底下应该没有比我们更宽容的人了。就算我们亲爱的大公殿下想要至我们于死地，我们也没有对她痛下杀手。这是因为我们大度与仁慈吗？别开玩笑了，她都想要我们的命了，还谈什么大度与仁慈？我们之所以留着她，只是单纯觉得她还有用罢了。而且，让这么一个天潢贵胄跪在地上向我们臣服，将会是一种多大的成就感啊。现在，我们亲爱的伊丽莎白只需要扮演好她二十余年的人生中最会扮演的角色就好了。一个受人喜爱的花瓶，一个傀儡木偶。"
UPV_restore_old_order:0 "恢复旧秩序"
UPV_restore_old_order_desc:0 "都结束了，一切都结束了。不会再有什么王室独裁，也不会再有什么改革了。上维尔陶只会有一种结局，那就是维持现状。那些该死的改革计划已经彻底被废弃，那些泥腿子与刁民都已经被关进大牢，那些所谓的忠臣已经见了神明。再也不会有这种事情发生了，也再也不会有什么变化了。一切都将回到原点，我们的统治万古长青，我们的统治永不终结！上维尔陶万岁！这该死的旧秩序万岁！"

