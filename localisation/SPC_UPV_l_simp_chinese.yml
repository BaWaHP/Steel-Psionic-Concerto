UPV_industrialization_process_desc:0 "上维尔陶联合公国的工业化进程相比于南巴联邦内的其他国家来讲，可以称得上是落后。好在依靠战后的一系列政策，以及南巴帝国皇室的招牌，我们成功吸引到了许多保守派与皇室支持者的投资。这使得我们的工业化进程迎来了全新的发展机会。我们必须抓住时机，完成上维尔陶的工业化。这样我们才能在未来的局势中站稳脚跟。\n\n发展点数：§Y[?UPV_industrialization_point]/100§!\n目前每周发展点数变化：§G+[?UPV_industrialization_point_weekly]§!\n"
