UPV_reform_by_the_Grand_Duchess:0 "女大公的改革"
UPV_reform_by_the_Grand_Duchess_desc:0 "比德尔二世为了稳定局势而选择与旧贵族和议会分享权力，虽然这使得上维尔陶成功从混乱不堪的局势中稳定下来，但这也导致了大公被架空，议会和贵族轮番把持朝政，腐败和灾难席卷着上维尔陶。现任大公伊丽莎白一世试图收回分散的权力，将新的秩序与未来带给这个国度。为此，我们必须要游走在贵族和议会之间不要得罪任何一方，同时拉拢军队和地方的那些有志之士助我们完成大业。\n\n改革进度：§Y[?UPV_Duchess_reform_progress]%§!\n\n贵族态度：[Get_aristocrat_attitude]\n议会态度：[Get_parliament_attitude]\n§g引发任一一方过度不满，会造成不可逆的糟糕结果。§!"

