###领导人###
UPV_phyllis_loehmann:0 "菲利斯·卢曼"
UPV_john_jack:0 "约翰·杰克"
UPV_roque_weidman:0 "罗克·韦德曼"
UPV_mildred_fries:0 "米尔德·弗里斯"
UPV_will_phillip:0 "威尔·菲利普"
UPV_dorsett_ferryman:0 "多赛特·费里曼"
UPV_elizabeth_supim:0 "伊丽莎白·苏平姆"
UPV_elizabeth_supim_desc:0 "作为先王比德尔二世唯一在世的子女，同时继承着神巴皇室血脉的天潢贵胄，伊丽莎白在十分不情愿的情况下接过了上维尔陶这个烂摊子。诚然，比德尔二世并不能算是个昏君；但国内糟糕的情况依然使得伊丽莎白力不从心—这已经远远超出了她的极限。\n\n国内错综复杂的势力交织与国外阴云密布的国际形势都让这位新上任的女大公感到无比的劳累。身为比德尔二世的小女儿，伊丽莎白并没有受到过全面的王室教育；这让她在面对国内的政治斗争时显得及其迟钝且愚笨。政府极度的腐败和军备废弛让她痛心疾首，但毫无这方面经验的她只能呆在先辈们留下的王宫之中；就像一只可怜的笼中鸟。\n\n诚然，上维尔陶的局势已经跌落谷底。但好在近十年在政坛中的摸爬滚打已经让伊丽莎白发生了脱胎换骨的转变，她变得可以在政治斗争中游刃有余；而且认为比德尔二世末期的改革应该被继续推行，民主毫无意义，只有绝对的铁腕与专政才能给上维尔陶带来新的秩序与未来。她已经向贵族和议会让步太多了。而现在，是时候该夺回一切了。\n\n§R我将永远向前，直至我个人的终结亦或是国家的终结...§!"
UPV_porter_friesland:0 "波尔特·弗里斯兰"
UPV_herr_yanovsky:0 "赫尔·扬洛夫斯基"
UPV_unknown:0 "暂无"

