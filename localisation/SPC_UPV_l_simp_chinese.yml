###民族精神###
UPV_corruption_everywhere:0 "无孔不入的腐败"
UPV_corruption_everywhere_desc:0 "上维尔陶的腐败已经达到了惊人的地步，无论是政府高层还是基层官员；腐败已经深入了这个国家的根基。不仅是街头巷尾，甚至连一些颇有权势的地方贵族的不满都已经达到的顶峰。如果我们不做些什么，那么恐怕将付出难以承受的代价。"
UPV_safe_harbor_for_conservatives:0 "保守派的避风港"
UPV_safe_harbor_for_conservatives_desc:0 "作为前南巴帝国皇室的收留地，得益于《圣树节协定》的条款，上维尔陶成功的保留了下来。进而成为了全南巴斯蒂亚保守派的避风港。但成为避风港并非只有好处，随着各地保守派的到来，政治斗争的强度也变的越来越激烈。"
UPV_loose_military:0 "军备废弛"
UPV_loose_military_desc:0 "在长久以来的腐败以及对军队的漠不关心之后，上维尔陶的军队已经彻底沦为了“持有武器的废柴”。假如我们想要振兴这个国度，军队的问题将是一块难啃的“骨头”。"
UPV_reinvigorated_army:0 "重振旗鼓的军队"
UPV_reinvigorated_army_desc:0 ""
UPV_treaty_with_tcw:0 "上维尔陶—托莱多协约"
UPV_treaty_with_tcw_desc:0 "出于对国防安全以及南巴帝国皇室的安全考虑，上维尔陶与托莱多签订了一系列条款。这些条款被统称为《上维尔陶—托莱多协约》。该协约包含了从军事，政治，经济以及贸易等各个方面的合作。主要目的是为了防止克拉亚诺共和国的军事行动以及加强上维尔陶与托莱多的经济联系。除此之外，该条约也默许了托莱多联邦对上维尔陶的经济特权。"
UPV_deeply_rooted_aristocracy:0 "根深蒂固的旧贵族"
UPV_deeply_rooted_aristocracy_desc:0 "上维尔陶的旧贵族的构成十分复杂。既有本地的维尔陶人旧贵族还有随着旧南巴帝国皇室到来而形成的外来贵族集团。起初所有人都觉得外来贵族与本地贵族很快就会相互对立，但事实却是双方很快便接受了彼此并逐步形成了现如今的旧贵族集团。相比于能够接受有限改革的议会官僚，这群旧贵族拒绝一切的改革。也因此，他们是历代大公最为头疼的团体。"

UPV_newly_developed_industries_dynamic_modifier:0 "新兴的本地工业"
UPV_newly_developed_industries_dynamic_modifier_desc:0 "虽然上维尔陶的政治腐败极其严重，地区工业的发展度较低。但好消息是随着各地保守派的到来，以及旧南巴帝国皇室的金字招牌。上维尔陶本地的工业化正迎来一波前所未有的高速发展期。与联邦内保守势力的交好，也促进了对上维尔陶的投资逐步增多。总而言之，上维尔陶的工业化可谓是蒸蒸日上。"
UPV_mature_industrial_system:0 "成熟的工业体系"
UPV_mature_industrial_system_desc:0 ""

