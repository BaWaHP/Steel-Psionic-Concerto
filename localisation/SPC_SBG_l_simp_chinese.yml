###民族精神###
SBG_fallen_brother:0 "衰落的“皇兄”"
SBG_fallen_brother_desc:0 "斯布里奇王国自古以来便和旁边的沃姆帝国维持了相对较为良好的关系，两国之间的皇室在古时常有通婚，彼此之间也戏称皇兄皇弟…至少在一百多年前是如此。许多美好的回忆随着时间慢慢消逝，如今沃姆除了在正式的外交场合尚且会对我们保有最基本的尊重外，对待我们的态度同对待其它附庸国别无二致。"
SBG_divided_motherland:0 "分裂的祖国"
SBG_divided_motherland_desc:0 "原本，南方的希卡博尔共和国应当是我们伟大王国的一部分。可那群罪该万死的共和主义叛徒选择趁着世界大战时期王国衰弱，联合王国也无力协助的情况下，起义并宣布建立了一个独立的共和国。我们曾试图在起义爆发时镇压叛乱，可最终失败，南北战争留在我国的伤痕在近二十年后的今天依然存在，国内的民族主义分子正以肉眼可见的速度激进化…"
SBG_economy_on_the_brink_of_ruin:0 "濒临毁灭的经济"
SBG_economy_on_the_brink_of_ruin_desc:0 "我国的经济正陷入一场怪圈。由于技术能力的底下，政府不得不将大量出产于国内的优质原材料出口到工业更为发达的沃姆境内，可沃姆人用于回报的仅有低廉的收购费用。由于几乎没有能力建立起可以对抗外国的产业，我国的财产正以恐怖的速度向外国流失，大量土地和矿井的所有权充实了沃姆资本家的腰包，许多我国的学者，企业家也开始向外国转移资本，就连许多占据了土地的封建贵族也无法逃离这场风暴，要么变卖家产移民外国，要么沦落到破产流浪的命运。"
SBG_remains_of_republic_revolution:0 "共和革命的余波"
SBG_remains_of_republic_revolution_desc:0 "三年前，距离东巴大战结束前的两个月，在南方希卡博尔共和国的叛徒支持下，我国爆发了一场持续了一年之久的共和革命。虽然在沃姆国防军的帮助下，起义最终得到镇压。战争还是在我国留下了难以磨灭的伤痕，政府也被冠上了“向沃姆人委曲求全以保证统治”的帽子。随着越来越多的民众加入到地下运动中去，我们的统治再一次陷入了危机。"

###领导人###
SBG_dovnar_sbridge:0 "多夫纳尔·斯布里奇"
SBG_dovnar_sbridge_desc:0 "多夫纳尔·斯布里奇并不是一位昏君，至少同他合作的贵族们不会这样评价。“他只是生错了时代，”许多人这样讲，又或者，“他只是运气不好。”当多夫纳尔接过斯布里奇的权柄时，他眼前的并不是荣耀与无尽的财富，而是因为南方的共和主义革命，北方的世界大战，东部咄咄逼人的沃姆人而挣扎求生的衰弱王国。\n\n他也有想过做点什么。既然打不过沃姆人，那就跟人结盟嘛！工业发展不起来，那就卖原材料嘛！父王留给他的遗产并不多，但他知道如何“高效地”运用起来。反正他一个人解决不了问题，那就叫贵族来嘛！建立贵族议会，把大家伙都叫来出谋划策，总有个谁会想出来点新鲜主意的，总有人嘛。大家都是有头有脸的人物，总能解决问题的，多夫纳尔总是这样告诉自己。\n\n可时间似乎越来越能证明他想法的错误。斯布里奇王国本就不多的财产正以恐怖的速度随风消散，多夫纳尔的心情也愈发地急切。怎么还没有英雄出现？他这样问道；我不都把权力传给你们这么多人了吗？他向着贵族会议喊道；连你们也要抛弃我吗，就跟我父亲一样？他嘶吼道，像个孩童一样哭泣着，可回应他的仅有默默逃离国家的贵族的背影，还有衰弱到了连跑都无能为力的前权贵的叹息。"

