###民族精神###
UTM_last_empire_legion:0 "最后的帝国军团"
UTM_last_empire_legion_desc:0 "帝国的五大军团早在建国之初便被设立，从古至今都是帝国威慑四方，抵御外敌的强大棋子。然而，时过境迁，如今五大军团只剩下了由奥提摩领导的第三军团——至少在奥提摩本人记忆里是这样。曾经的老兵早就不复当年的荣光，许多跟随奥提摩的士兵要么死在了帝国的内战当中，要么没能熬过漫长的南下征途。如今的帝国军团除了旗号还保留着当年的些许风光，实际上早就不是一支优秀的军队了——这是一支缺乏训练，装备匮乏，士气低落，毫无威慑力的土匪军。"
UTM_soul_in_void:0 "虚无的灵魂"
UTM_soul_in_void_desc:0 "军团的统治和巴斯蒂亚随处可见的任何一个军阀别无二致，围绕着奥提摩本人为核心的军团领导层，绝对的军事管制统治着这个地区。然而，在第三军团的“帝国”旗帜之下，鲜有人能看到军政府继续统治的意义——所谓的“帝国”已经灭亡数十余载，第三军团也不过是剩下了寥寥数位老将仍在缅怀过去，那些新一代的士兵许多连帝国的一丝过往云烟都不曾见过。“为‘帝国’而战”真的还适用于如今的第三军团吗？\n\n§R帝国已然覆灭，那么第三军团为何而战？§!"
UTM_chasing_past:0 "追寻往日之影"
UTM_chasing_past_desc:0 "第三军团的士兵们大多是出生在中巴斯蒂亚北部的，他们从小就被灌输着“为‘帝国’而战”的思想，长大后也只能加入军团来谋生。对于他们来说，第三军团就是“帝国”，而“帝国”就是他们的全部。对于这些士兵来说，第三军团的存在是理所当然的，他们也无法想象没有了第三军团的世界会是什么样子。对于他们来说，第三军团就是他们的家，他们的归宿，他们的信仰，他们的一切。\n\n§R追寻往日之影，第三军团踏上征程。§!"
UTM_rule_of_ignorance:0 "愚昧之治"
UTM_rule_of_ignorance_desc:0 "由于连年的战乱，中巴斯蒂亚北部很难找到什么成套的行政班子，而只懂得打仗的第三军团就更不可能有了。往上看，第三军团带领的军政府毫无行政能力，完全不懂得经济规划，生产活动，凡事只懂得靠暴力与恐怖解决；往下看，各地行政区散作一团，民众识字率几乎没有，城镇地区暴力犯罪不断，还有武装叛乱分子蠢蠢欲动…能否实现政府和社会的改革，将会很大程度决定第三军团的命运。"
UTM_indigenous_resistance_groups:0 "土著反抗团体"
UTM_indigenous_resistance_groups_desc:0 "生活在中巴斯蒂亚北部地区的一些亚人，兽人反对我们的军政府。幸好的是，他们大多只是散兵游勇，在第三军团的进攻下可谓不堪一击。尽管如此，他们也仍然如同野火般在各地肆虐，我们总有一天要彻底解决这个问题。"

UTM_magic_supply_0:0 "魔力供给 – 全面崩溃"
UTM_magic_supply_0_desc:0 "由于缺乏成套的后勤，工业体系，我国军队的魔力供给正处在岌岌可危的状态。和南方的人类政权不同，为了维持我们社会的正常运转，加上额外处理各地区的混乱，我国的魔力开支要大得多。我们需要实现科技上的进步以减少不必要的开支，并且寻找更多，更好的魔力源。\n\n§t魔力供给几乎清零！军队，民众正在暴动！必须尽快找到解决方案。§!"
UTM_magic_supply_1:0 "魔力供给 – 高度缺失"
UTM_magic_supply_1_desc:0 "由于缺乏成套的后勤，工业体系，我国军队的魔力供给正处在岌岌可危的状态。和南方的人类政权不同，为了维持我们社会的正常运转，加上额外处理各地区的混乱，我国的魔力开支要大得多。我们需要实现科技上的进步以减少不必要的开支，并且寻找更多，更好的魔力源。\n\n§R目前来看，我国魔力储备已经陷入了岌岌可危的状态，行政部门已经部分瘫痪。§!"
UTM_magic_supply_2:0 "魔力供给 – 轻度缺失"
UTM_magic_supply_2_desc:0 "由于缺乏成套的后勤，工业体系，我国军队的魔力供给正处在岌岌可危的状态。和南方的人类政权不同，为了维持我们社会的正常运转，加上额外处理各地区的混乱，我国的魔力开支要大得多。我们需要实现科技上的进步以减少不必要的开支，并且寻找更多，更好的魔力源。\n\n§O目前来看，我国魔力储备尚可维持国家正常运转，可一些地区已经出现紧缺迹象。§!"
UTM_magic_supply_3:0 "魔力供给 – 尚可维持"
UTM_magic_supply_3_desc:0 "由于缺乏成套的后勤，工业体系，我国军队的魔力供给正处在岌岌可危的状态。和南方的人类政权不同，为了维持我们社会的正常运转，加上额外处理各地区的混乱，我国的魔力开支要大得多。我们需要实现科技上的进步以减少不必要的开支，并且寻找更多，更好的魔力源。\n\n§Y目前来看，我国魔力储备尚可，但并不稳定。§!"
UTM_magic_supply_4:0 "魔力供给 – 尚有余裕"
UTM_magic_supply_4_desc:0 "由于缺乏成套的后勤，工业体系，我国军队的魔力供给正处在岌岌可危的状态。和南方的人类政权不同，为了维持我们社会的正常运转，加上额外处理各地区的混乱，我国的魔力开支要大得多。我们需要实现科技上的进步以减少不必要的开支，并且寻找更多，更好的魔力源。\n\n§4目前来看，我国魔力储备足以维持国家正常运转，同时还积累了一些方便未来使用。§!"
UTM_magic_supply_5:0 "魔力供给 – 额外储备"
UTM_magic_supply_5_desc:0 "由于缺乏成套的后勤，工业体系，我国军队的魔力供给正处在岌岌可危的状态。和南方的人类政权不同，为了维持我们社会的正常运转，加上额外处理各地区的混乱，我国的魔力开支要大得多。我们需要实现科技上的进步以减少不必要的开支，并且寻找更多，更好的魔力源。\n\n§C目前来看，我国魔力储备相当充足，不但可以维持国家正常运转，还积累了不少以便不时之需。§!"
UTM_magic_supply_6:0 "魔力供给 – 大量储备"
UTM_magic_supply_6_desc:0 "由于缺乏成套的后勤，工业体系，我国军队的魔力供给正处在岌岌可危的状态。和南方的人类政权不同，为了维持我们社会的正常运转，加上额外处理各地区的混乱，我国的魔力开支要大得多。我们需要实现科技上的进步以减少不必要的开支，并且寻找更多，更好的魔力源。\n\n§G我国魔力供给体系相当完善，绝大多数人都可以维持正常生活，而且仓储量足以维持国家一段时间的运转。§!"

###领导人###
UTM_ultimo_phantom:0 "“银痕”奥提摩·幽光"
UTM_ultimo_phantom_desc:0 "如果要用一句话总结奥提摩的一生，那便是“付出很多，却一无所获”。作为“帝国”第三近卫军团的团长，他手中曾掌握着地表上最为强大的军事资源，那是由上百匹被驯化的战龙，数千名北境最为精锐的兽人士兵，超过十万人力的后勤体系，以及皇帝本人带领的强大部队！他的人生，应该是英雄的赞歌，传奇的史诗！奥提摩·幽光的故事应该被改写成童话，在兽们的口耳相传中永远流传下去！\n\n可时代已经变了，他早就意识到，却一直逃避这一点。“帝国”的崩溃改变了一切。在由肥头大耳的贵族腐化的“帝国”尸体上，那些卑鄙无耻的赤色分子，自由派就像秃鹫一样蚕食着“帝国”宝贵的遗产。第三军团算什么东西？第一军团全军覆没，第二军团原地叛变，第四军团消失匿迹，当第五军团团长——那个两鬓斑白，浑身颤抖却固执地不肯放弃的老头子——在生命的最后一刻命令部队全部转移到奥提摩麾下时，他便明白，那个时代已经真正结束了。\n\n然而，奥提摩不想放弃，许多第三军团的将领也和他抱有相同的想法。于是，惨烈的南下长征开始了，第三军团以半数牺牲为代价，最终在中巴斯蒂亚联盟北部的战区找到了一席之地。这里充斥着战争与死亡，对绝大多数生灵而言都是避之不及的是非之地，可对于只懂得杀戮的第三军团而言，却是绝佳的去处。\n\n而现在，时间周周转转来到了世纪的末尾。哪怕是用魔兽的尺度来看，奥提摩也老了，老得不成样子。中巴斯蒂亚联盟的崩溃已成注定之事，任谁来看都看得出来。命运的齿轮悄然转动，第三军团的命运，中巴斯蒂亚的命运，奥提摩的命运，都将在接下来的数年里被决定——生存还是毁灭？继续追寻往日帝国的幻影，亦或是向现实妥协？幽光家族的最后子嗣将不得不做出他人生中最艰难的决定。"

