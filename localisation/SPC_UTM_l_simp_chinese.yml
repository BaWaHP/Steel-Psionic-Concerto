UTMNews.1.t:0 "魔兽横行于中巴边疆"
UTMNews.1.d:0 "中巴斯蒂亚边疆的战局已经彻底倒向奥提摩军团。自“银痕”奥提摩·幽光下令南下以来，北湖防御同盟原本便摇摇欲坠的防线迅速崩溃，湖岸炮台、矿区堡垒与公司民兵据点接连失守。这个曾被人类殖民者视作抵御魔兽南下最后屏障的腐败同盟，如今只剩下零散残兵、焚毁的仓库和无人认领的战地文件。\n\n北湖崩溃后，战火并未停息。东绿洲军区、人类殖民地势力与奥提摩军团在边疆各地展开了漫长而混乱的争夺。那些依靠外国资本、公司合同与军管命令维持的殖民地政权，曾试图在母国经济危机中重新整合防务，加紧合作以求自保；但在狼兽人军团的持续攻势下，它们的铁路被切断，补给线被摧毁，雇佣兵合同变成废纸，殖民董事会的命令再也传不到前线。\n\n如今，奥提摩军团已宣称控制整个中巴边疆。边境哨塔上飘扬的不再是公司徽记或殖民军旗，旧矿镇与湖岸要塞也落入魔兽军团之手。对于奥提摩而言，这是一场驱逐人类殖民者的胜利；对于边疆上的幸存者而言，这或许只是另一种恐惧降临。中巴斯蒂亚的北方大门已经换了主人，而从废墟间传来的狼嚎，正在向所有人宣告旧时代的终结。"
UTMNews.1.a:0 "总有一天，我们要复兴帝国的荣光！"
UTMNews.1.b:0 "他们居然幸存了下来？"

UTMNews.2.t:0 "魔兽军团入侵人类殖民地"
UTMNews.2.d:0 "中巴斯蒂亚北部再度传来战争消息。由“银痕”奥提摩·幽光领导的魔兽军团，已向人类殖民地政权北湖防御同盟发动全面进攻。双方边境地带的多个哨站在数小时内失去联系，北湖方面则宣布进入战争状态，并要求各地殖民民兵、公司卫队与残余守军立即集结防御。\n\n奥提摩军团的成员大多来自曾属于“帝国”的流亡魔兽部队。自旧秩序崩溃以来，他们便在中巴斯蒂亚北部建立起高度军事化的政权，并将驱逐当地人类殖民者视为自身存在的根本目标。过去数年里，奥提摩不断指责北湖防御同盟是“殖民时代腐烂尸体上滋生的寄生虫”，而北湖同盟内部的贪污、走私与派系倾轧，也让这条漫长的防线一天比一天脆弱。\n\n南方中巴斯蒂亚联盟陷入无政府状态后，北湖防御同盟失去了最重要的政治靠山与补给来源。奥提摩显然没有放过这一机会。随着魔兽军团的炮火越过边境，北湖周边的殖民城镇开始疏散居民，旧矿区与湖岸防线则化为新的战场。在北方，人类殖民者与帝国遗民之间积压多年的仇恨，终于被彻底点燃。"
UTMNews.2.a:0 "我们必将取得胜利！"
UTMNews.2.b:0 "这些疯子..."

UTMNews.3.t:0 "东绿洲军区击退魔兽军团"
UTMNews.3.d:0 "北湖防御同盟的崩溃曾让整个中巴边疆陷入真空。殖民地政权忙于彼此吞并，公司武装试图守住矿区与铁路，奥提摩军团则从北方压境，试图将人类殖民者残存的秩序彻底碾碎。混乱之中，原本只是前线军管区的东绿洲军区，最终成为了唯一能够维持战线、整合地方与组织反攻的力量。\n\n在绿洲共和国的支援下，东绿洲军区先是稳定了南部交通线，随后逐步接管北湖残部、地方民兵与失去母国支持的人类殖民据点。面对奥提摩军团的攻势，军区并未急于发动决战，而是以堡垒、铁路与补给站为核心一点点压缩其活动范围。随着最后几个边疆要塞宣布接受军区管制，奥提摩军团被迫撤离主要城镇，人类殖民地残余势力也失去了独立行动能力。\n\n东绿洲军区司令部今日宣布，边疆地区“已恢复基本秩序”，并将进入临时军政管制阶段。旧殖民机构的旗帜被降下，公司董事会的命令被封存，北湖防御同盟残存的官僚体系也被并入新的地方管理机构。对绿洲共和国而言，这场胜利意味着东部边境终于不再只是战火与废墟；而对中巴边疆而言，一个由军靴、补给车队与临时行政令维持的新秩序，已经取代了过去的一切。"
UTMNews.3.a:0 "终于，胜利了。"
UTMNews.3.b:0 "团结一致，我们会取得更大的胜利！"
UTMNews.3.c:0 "看来地区局势正趋于稳定？"

UTMNews.4.t:0 "中巴防御协定击退魔兽军团"
UTMNews.4.d:0 "北湖防御同盟的覆灭并没有让中巴边疆立刻落入奥提摩军团之手。恰恰相反，它的失败反而迫使剩余的人类殖民地势力放弃了过去各自为政的幻想。公司殖民地、开拓领与军管区在母国经济危机和前线崩溃的双重压力下被迫重组防务，最终以中巴防御协定的名义，将残存的兵力、铁路、矿区与补给系统整合到同一套战争机器之中。\n\n这场胜利来得并不光彩。协定军队的推进伴随着公司董事会的紧急授权、雇佣兵合同的重新签署，以及对地方殖民地政府近乎粗暴的军事接管。失去北湖屏障后，他们不得不一边抵挡奥提摩军团的南下攻势，一边压制东绿洲军区向北扩张的企图。最终，凭借更完整的工业设施、残存的殖民铁路网与尚未彻底崩溃的母国支援，中巴防御协定在乱战中守住了核心地带，并逐步吞并了周边据点。\n\n如今，协定政府宣布中巴边疆“恢复统一防务秩序”。旧北湖防御同盟的残余机构被清算，地方公司武装被整编，东绿洲军区被逐出争议地带，奥提摩军团也被迫退回更北方的荒原。然而，在这份胜利公报背后，边疆居民看到的并非真正的和平，而是更加高耸的检查站、更加严厉的通行证制度，以及重新盖在矿镇与铁路上的殖民印章。中巴边疆仍属于人类殖民者，只是它换上了一副更冷硬的面孔。"
UTMNews.4.a:0 "我们才是最后的胜者！"
UTMNews.4.b:0 "不光彩的胜利。"

