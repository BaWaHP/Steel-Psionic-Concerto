###事件###
NFH_To_SFH.1.t:0 "郑义平定北方匪患"
NFH_To_SFH.1.d:0 "郑钧的手上摆着几分不厚的文件，他简单看了片刻，脸上露出耐人寻味的表情，可能就连他自己也不知道此刻到底是在笑还是在感到悲伤。这几份报告和目前南远乡的局面并没有联系，它们均是驻扎在北方的谍报部队传来的报告书，上面给出的信息很简单：北方已然平定。看起来，老国王的长子，郑义似乎成功地在鸳鸯不驯的北远乡地区站稳了脚跟，甚至成功镇压了一时间搞得人心惶惶的匪患。\n\n“那份文件是…父王，您也收到了相关报告吗？”推门进来的郑红显得有些惊讶，她手上拿着一模一样的报告书，“哥哥他似乎成功镇压了北方的叛乱行为。”她顿了顿，又用比较愤慨的语气说道，“而代价是什么呢？许许多多无辜的人被当成叛乱者送入大牢或是刑场，军队成了他打击一切反对者的工具，国家的发展被完全抛之脑后…无论如何，我觉得这都是不对的，他太过追求权威了。”\n\n“是啊…是啊，红，你说得很对。”郑钧叹息道，“可他却反而证明了这是一条‘可行’的道路。这才是最大的问题。”郑钧用手挠了挠头，“无论义儿做了什么，对南方应该都不会有太大的影响。但我所担心的根本不是这一点。你觉得，你哥哥他…他的所作所为有可取之处吗？”郑义问道，他把文件撇到一旁，端坐并盯着郑红的双眼，后者感到一阵脊背发凉。\n\n“或许有吧。”郑红也不知道自己为什么能脱口而出这样的话语，难道她不是很讨厌兄长的所作所为吗？难道她不曾经为自己有个郑义这样的兄长而感到痛苦吗？“但是…但是那并不可持续。无论是他对待人民的残酷手段，还是对国内权贵的打压行为，迟早会激起许多人的不满，并使得他们揭竿而起。”郑红叹息道，“但或许通过适当的改革，他依然能镇压下一轮的叛乱。我不知道，但我想证明他是错的。”"
NFH_To_SFH.1.a:0 "“是啊，我们可不能落了下风。”"
NFH_To_SFH.1.b:0 "“无论如何，他的所作所为仍有可取之处，你我都明白这一点。”"
NFH_To_SFH.2.t:0 "北方陷入混乱！"
NFH_To_SFH.2.d:0 "郑钧手上拿着几份文件，其中大多由驻扎在北方的情报部队传来，还有一些是他的几位秘书从新闻上剪下来的内容。郑钧很难想象他抽搐的老脸上到底该算是什么样的表情，幸好他之前拒绝了在房间里摆面小镜子的提议，否则他恐怕会把自己给吓到。从结果来看，似乎他的长子郑义，没能维持住北远乡地区的统治，反而乡下来的农民掀起的叛乱而赶跑，最后还被自己的军队发动了政变，真是可笑至极。如今的郑义只得成为军队的橡皮图章，成为他们和贵族对抗的道具。\n\n“父王！”郑红急切的声音打断了郑钧的思绪，前者刚用力把门推开，“您看到关于北方的报告了吗？兄长他带过去的部队…居然发动政变了！而且大量地区领土都沦陷给了不知道从哪里蹦出来的叛军！”她喘了口气，又继续说道，“人鱼那边的态度尚且未知，但我们是不是应该做点什么？”\n\n“军事干预…做不到啊。”郑钧仔细思考了片刻，但还是放弃了这份可能性，“我们连自己的事都管不好，无论如何也不可能在起义发展了这么大规模后再出兵。军队那边能顶住吗？他们的态度怎么样？人鱼又在盘算什么？未知因素太多了。”他摇头道，“我们目前能做的最佳选择，恐怕便是什么也不做。派遣突击部队将你哥哥救回来或许可行，但大范围的干预已是不可能了，北方没有现在没有愿意听我们指挥的势力。”\n\n“派遣突击部队…”郑红思考了片刻，“但那样的话，政变的军队一定会大乱阵脚吧？他们在名义上依然打着‘远乡王国’的旗号。虽然双方的联系已经彻底断开，但他们仍然是极少数愿意同我们谈判的对象…对吧？”\n\n“你说的没错。”郑钧点头道，“那现在只能按兵不动了。”"
NFH_To_SFH.2.a:0 "寂静笼罩了房间。"
NFH_To_SFH.3.t:0 "北方贵族政变"
NFH_To_SFH.3.d:0 "来自北方的消息已经证实了贵族的政变大获全胜，紧皱眉头的郑钧把电报拿了起来，但看也不看，就又放回了桌面上。关于儿子的安危是一方面，而另外一方面，这次成功的起义或许会成为一次对君主反抗的范例，郑钧现在最要不得的就是这种事。郑义的死活因为这一点反而有了很大的意义：一旦他在贵族发动政变的情况下依然稳住了局面，那说明郑氏王朝仍然有所余力；但假如他跟多数人预测的那样快速失势，在接下来的内战里被打个满地找牙然后回南方寻求庇护，那情况肯定会急转直下。\n\n忠于郑义的军队尚能一战…那显然是不可能的。很讽刺的是，南远乡政府发送援助的几率就跟郑义能打赢的几率差不多，而且之前说是镇压农民起义还能象征性给点，现在要说是支援名义上属于是北远乡叛军的郑义，难道不是摆明了要分裂国家吗？就算这一点说得过去，贵族一方也并没有切断与南方的联系，支援郑义但最终没打赢的话…就真的会分裂国家了。郑义虽然经常被人骂是个老糊涂，但这点最基本的道理他还是明白的。\n\n郑红暂时还没有接到相关的信息，她会不会担心自己的兄长呢？郑钧突然想到这一点，不知为何，他竟然感到些许的愧疚。如果不是他当初的软弱与无能，郑义也不会转变成今天的这副模样，甚至是要和远乡最令人作呕的势力之一对着干。或许郑钧能做点什么。"
NFH_To_SFH.3.a:0 "“假如他输了…就帮他逃回南方吧。”"

###新闻###
NFHNews.1.t:0 "北远乡地区的铁血君主"
NFHNews.1.d:0 "据白洋市方面记者报道，近期北远乡地区针对农民叛军开展的血腥镇压行动取得了成功。原先似乎严重危害了当地政府统治的叛军现已遭到剿灭，随着叛军领导人的头颅于白洋市当众斩下，短时间内似乎不再有反抗远乡王国北方政府的叛军活动，而原先关于地方政府领导人遭到军队胁迫的传闻也已消失，可以明确的一点是，似乎郑义，这位尚且年轻的地方君主，在巩固其自身权力的道路上向前进了一大步。\n\尽管多国针对北远乡地方政府采用的暴力行为进行了人道主义的谴责，同时著名国际军用支援器械制造商白鸽国际宣布停止一切北远乡地区的业务，意图制裁当地政府血腥的暴力行为。可正如当地统治者郑义似乎并不买账，正如他今日演讲所说的那样，“我和我的同僚坚信我们道路的正确，我们始终坚信，唯有强大且坚定的信念，方可带领国家驶向未来。”"
NFHNews.1.a:0 "小地方破事真多..."
NFHNews.1.b:0 "他居然真的能做成事？"
NFHNews.1.c:0 "我说到做到！"
NFHNews.2.t:0 "北远乡地区陷入战火！"
NFHNews.2.d:0 "据白洋市方面记者报道，北远乡地方政府似乎无法承受来自农民叛军的巨大压力，从内部瓦解了。由农民叛军以及鱼龙混杂的大量远乡政府反对派组成的北远乡自由联军占据了西北一带；而发动政变，架空当地统治者郑义的军队则控制了相对富饶的南方；遭到打压的贵族则奔赴北方，发动新一轮的起义；而东北地区，人鱼一方的态度则尚不明确。\n\n有传闻说远乡王国会对此以新一轮的军事行动回应，但也有猜测认为无法解决南方内乱的远乡王国不会冒险出兵镇压北方的混乱。由于远乡方面尚未发表任何官方言论，情况也有发生意想不到的转机的可能。但无论如何，在现在看来，北远乡地区似乎仍处在风雨飘渺中，不知各路派系会将这片土地的未来驶向何方。"
NFHNews.2.a:0 "小地方破事真多..."
NFHNews.2.b:0 "我们无能为力。"
NFHNews.2.c:0 "都给我等着，混账！"
NFHNews.3.t:0 "北远乡地区陷入战火！"
NFHNews.3.d:0 "据白洋市方面记者报道，尽管北远乡政府于先前成功镇压了农民叛乱，胜利的天平仍未想这个尚且稚嫩的国家倾斜。随着北远乡政府内部斗争愈发剧烈，对统治者忍无可忍的地方贵族发起了一场成功的起义，而尚且安全的郑义本人则跟随一批忠诚于他的军官在其它地区发起了新一轮的内战。\n\n有传闻说远乡王国会对此以新一轮的军事行动回应，但也有猜测认为无法解决南方内乱的远乡王国不会冒险出兵镇压北方的混乱。由于远乡方面尚未发表任何官方言论，情况也有发生意想不到的转机的可能。但无论如何，在现在看来，北远乡地区似乎仍处在风雨飘渺中，不知各路派系会将这片土地的未来驶向何方。"
NFHNews.3.a:0 "小地方破事真多..."
NFHNews.3.b:0 "我们无能为力。"
NFHNews.3.c:0 "都给我等着，混账！"

