###民族精神###
NFH_influence_from_south:0 "南方宗主国的干涉"
NFH_influence_from_south_desc:0 "虽然我们在实际上有着独立自主的统治权，北远乡王国依然是“远乡王国”的一部分，而郑钧作为远乡王位的正统持有者，依然在很大程度上能为我们施加影响。除此之外，北远乡王国虽然获得自治权，其统治下的领土远远没有南方富饶，也因此在很大程度上依赖南远乡王国在各方各面提供支持。如果我们想要实现保卫远乡王国的伟大理想，第一步就是先建立起真正独立自主的行政机关。"
NFH_terrible_environment:0 "穷山恶水"
NFH_terrible_environment_desc:0 "出于一些历史原因，我们统治下的领土一直都不是远乡王国发展的重心。远乡人民最早就是在南方建立的根据地，无论是人口还是财富，那儿都要远胜北方。南方优良的港口使得他们可以随时同巴斯蒂亚诸国的商人进行友好的协作，密集的人口也使得南方成为了早期工业化的核心点。相比之下，北方就一无所有了。相对寒冷的气候，较高的贫困率，数量稀少的工业化痕迹，普遍彪悍的民风和地方政府的高度自治为我们的统治造成了极大的困扰。"
NFH_suppressing_nobles:0 "压制食利集团"
NFH_suppressing_nobles_desc:0 "当郑义选择同支持他的军官建立北远乡王国时，许多贵族将这位王子的反叛视作对传统势力的一起伟大合作，毕竟无论郑钧如何让步，他摇摇欲坠的统治必定不是什么久留之地。然而，随着郑义和支持他的军官逐步建立起新的王国，贵族们意识到了自己似乎犯了天大的错误。郑义的统治，如他自己所称呼的那样，是绝不后退的统治。无论是扛着共和主义大旗的革命党，意图取得王位的邪教叛军，还是宫廷内的贵族，外部的工业寡头，都绝不能影响国王的统治。恰恰讽刺的是，在众多食利集团影响力尚且微弱的北部，这样的方针似乎行之有效。\n\n§R…但是否可持续呢？§!"
NFH_supportive_army:0 "来自军队的支持"
NFH_supportive_army_desc:0 "作为参与了两次大战的著名军官，郑义早已在军队中建立了极高的威望。早在世界大战期间，不甘于停留在指挥部，愿意亲自走上前线，甚至是跟士兵同吃同住的郑义就已经成为了军队中的风云人物。而他在东巴斯蒂亚大战力挽狂澜，拯救远乡王国于水火之间的事迹又为他这个人的形象添加了一些传奇色彩进去。来自军官们的忠诚为我们提供了很大的帮助，尽管我们有时不得不回应他们的期待，这在目前来看依然是利大于弊的。"
NFH_common_banditry:0 "匪患横行"
NFH_common_banditry_desc:0 "北远乡地区彪悍的民风并不是什么新鲜事，不过最近几年，各地流窜的土匪似乎是有些多过头了。由于政府内部尚且缺乏对各地的威信，关于匪患问题的调查还没能得出什么详尽的结果。有人认为这是下一场农民起义的先兆，也有人认为这不过是社会落后的必然结果。无论如何，我们最好尽快解决这一点，军队已经迫不及待了。"

###领导人###
NFH_ZhengYi:0 "郑义"
NFH_ZhengYi_desc:0 "作为郑钧唯一的儿子，郑义原本被视作远乡王国当之无愧的继承人。早在郑义出生时，郑钧之父，也就是时任国王郑铭，就已经为这个孩子的未来打好了算盘。从儿时开始的精英教育到青年时期周游巴斯蒂亚诸国的计划，可以说整片大陆上找不到第二个能享受这么好待遇的贵族了。\n\n然而，一切美好的设想都随着世界大战的爆发而烟消云散。巴斯蒂亚诸国短暂而美好的繁荣在一瞬间变成了真实的人间炼狱，哪怕是离战火最远的远乡王国也无法置身事外。当心灰意冷的郑义王子穿越因经济危机和前线溃散陷入一片混乱的巴斯蒂亚联邦，抵达他的故乡时，迎接他的却是爷爷的死讯，几乎崩溃的父亲，令任何一个经济学家看到都会腿软的财政报告，各地爆发叛乱的快报，以及人民对远乡皇室的辱骂。\n\n当尚还年幼的郑义看见自己的父亲因为那群共和党和想要保卫的所谓“人民”而忙的焦头烂额时，他憎恨无能的自己，也对一意孤行的父亲感到厌倦。决心参与保卫远乡王国的他成为了一名军官，参与了前线的战斗。残酷无情的世界大战进一步坚定了他的决心，使他在竭尽所能保卫远乡王国的道路上越走越远。\n\n因此，当沃姆帝国宣布入侵东巴斯蒂亚诸国时，郑义看到了他的机会。就当西北地区的前线几乎崩溃时，郑义接过了指挥权并稳住了前线。他也因此在军队和群众中建立了极高的威望，并在战争结束后逼迫郑钧同自己分享远乡王国的权力，分别建立南北远乡王国。郑钧认为郑义此举不亚于撕破脸皮，虽然是自己的亲骨肉，二人也从此疏远。\n\n如今数年过去了，就如同远乡王国的局面一样，郑义和郑钧二人之间的关系从未好转过。愈发烦躁的郑义决定不再向自己的父亲妥协，在接下来的几年内，他无论如何也要改变远乡王国。"

