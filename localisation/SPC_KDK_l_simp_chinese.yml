###政党名称###
KDK_pioneer_communism_party:0 "白杨同盟"
KDK_pioneer_communism_party_long:0 "白杨同盟-革命辛迪加\n§g革命辛迪加最开始只是一伙老兵在战争退伍后，受到当时在坎达德尔盛极一时的“中队主义”影响组建的互助准军事组织，但是在坎达德尔王国1995年的“铅之岁月”之后，感觉遭受了王国政府背叛的老兵们逐渐将互助组织彻底政党化与进一步分化，构成了现在革命辛迪加。§!"
KDK_revolutionary_communism_party:0 "白杨同盟"
KDK_revolutionary_communism_party_long:0 "白杨同盟-社会主义分形体\n§g社会主义分形体最开始只是马尔库斯·彭纳比利这一数学家与学生们的学术团体，但是在1995年的“铅之岁月”中，马尔库斯本人看着他的不少学生在街堡中为社会主义而战，他本人也多少收到了政治混乱的影响，开始有意识的将他的学术团体政治化，在学生群体中壮大。§!"
KDK_worldunion_socialist_party:0 "白杨同盟"
KDK_worldunion_socialist_party_long:0 "白杨同盟-至高美德党\n§g至高美德党其实称不上一个完整的政党，他们其实是1994年由一位诗人建立的自治社区的残余部分，由十三位“美德委员”管理，美德委员的意识形态互不相同，但是却互相和睦相处，这一高度乌托邦化的政治环境让他们成为了白杨同盟中的协调者角色。§!"
KDK_worldunion_democrat_party:0 "白杨同盟"
KDK_worldunion_democrat_party_long:0 "白杨同盟-社会工人党\n§g社会工人党建立于1972年，其建立过程中收到巴斯蒂亚国际工人协会的帮助，不少国际工人协会的成员来到坎达德尔，原本温和的他们在目睹了坎达德尔的现状后也不得不变得激进起来，开始尝试武装革命。§!"
KDK_liberal_republican_party:0 "坎达德尔重建委员会"
KDK_liberal_republican_party_long:0 "坎达德尔重建委员会-南巴派\n§g坎达德尔重建委员会中，南巴派主管着坎达德尔王国的文化，宗教，与社会状况。他们尽力抹除着提特兰文化的所有痕迹，以及将整个坎达德尔变得更“南巴”，更“共和主义”。§!"
KDK_conservative_republican_party:0 "坎达德尔重建委员会"
KDK_conservative_republican_party_long:0 "坎达德尔重建委员会-修卡利翁派\n§g坎达德尔重建委员会中，修卡利翁派主管着坎达德尔王国的经济，外贸，与城市重建。他们尽力的将整个坎达德尔的经济导向南方，较为保守的修卡利翁牛头人们只希望继续经济殖民，而激进派则想直接的将王国整个纳入伊斯恰军管邦，乃至将整个提特兰半岛纳入军管邦的范围内。§!"
KDK_authoritarian_republican_party:0 "坎达德尔重建委员会"
KDK_authoritarian_republican_party_long:0 "坎达德尔重建委员会-中立派\n§g“我是万王之王,奥兹曼斯迪亚斯\n功业盖物,强者折服”\n此外，荡然无物\n废墟四周，唯余黄沙莽莽\n寂寞荒凉，伸展四方。§!"
KDK_national_socialist_party:0 "白杨同盟"
KDK_national_socialist_party_long:0 "白杨同盟-全能统治党\n§g全能统治党是一个颇为极端的右派组织，他们的信念中充斥着道德洁癖、排外的种族观念、以及对于宗教的狂热。他们的成名战役为他们现任领袖的父亲（大科德利阿）将一枚炸弹通过议会守卫者中的支持者，丢入坎达德尔议会中，杀死了不少南巴人与修卡利翁人。§!"
KDK_authoritarian_nationalism_party:0 "白杨同盟"
KDK_authoritarian_nationalism_party_long:0 "白杨同盟-烈火与圣徒党\n§g烈火与圣徒党是从全能统治党中分裂的分支党派，他们的很多思想更加靠近十三圣徒摄政团，而他们的领袖——科德利阿·‘圣徒’·里帕尔贝拉，则是小科德利阿·里帕尔贝拉的弟弟，他比起他自己的兄长更加激进与保守。§!"
KDK_paternal_autocrat_party:0 "白杨同盟"
KDK_paternal_autocrat_party_long:0 "白杨同盟-复国协定\n§g复国协定是一个在坎达德尔非贵族的政府官员中颇有影响力的秘密社团，他们在政府中以自己的官员职位不断帮助着白杨同盟在整个坎达德尔的活动。§!"
KDK_wizard_rules_party:0 "黑阳崇拜者"
KDK_wizard_rules_party_long:0 "黑阳崇拜者\n§g黑阳崇拜是提特兰半岛特色的一种诡异崇拜，他们歌颂黑阳王的法力强大与魔权暴政的伟业，但是在坎达德尔王国，他们并不是主流。§!"
KDK_religious_extremism_party:0 "白杨同盟"
KDK_religious_extremism_party_long:0 "白杨同盟-十三圣徒摄政团\n§g十三圣徒摄政团是一种诡异的提特兰宗教的变种，其吸收了很多修卡利翁同盟的神秘学与魔法学理论，并且将这些理念混合在了他们的意识形态之上，他们追求一切现代的终结，民族主义，工业资本主义，自由主义与共产主义都是他们的敌人。§!"
KDK_anarchism_party:0 "白杨同盟"
KDK_anarchism_party_long:0 "白杨同盟-自由人协会\n§g自由人协会是一群城市无政府主义者构成的组织，他们以大范围炸弹攻击闻名，虽然许多人视他们为恐怖分子，但是亦有不少人视他们为提特兰的英雄。§!"

###领导人###
KDK_gaius_pernumia:0 "盖乌斯·佩尔努米亚"
KDK_marcus_pennabilli:0 "马尔库斯·彭纳比利"
KDK_virtue_commission:0 "美德委员会"
KDK_tiberius_carmignano:0 "提贝里乌斯·卡尔米尼亚诺"
KDK_finn_veciano:0 "费恩·韦基亚诺"
KDK_nicolas_esmirada:0 "尼科拉斯·艾斯米拉达"
KDK_Kandadal_XI:0 "坎达德尔十一世"
KDK_Kandadal_XI_desc:0 "坎达德尔十一世从没有成为一位国王的实感。\n\n他的父亲从未出现在他的记忆之中，母亲则仅仅只是远远的看过他几眼，就好像他并非她的血肉。他曾不止一次的尝试去到记忆中熟悉的寝宫，但是迎面而来的只有劝返与冷面，他好像一个战争之后的孤儿，而不是国王，或者被神明选中的圣人。\n\n他刚刚诞生之时，那场被教士与贵族们称为“审判日”的战争刚刚结束，宫廷里的教士视他为灾难的终结者，贵族们则在他年幼的视他为一个工具，只能像是门童一样旁听政，听着南巴使节和修卡利翁的使节在宫廷中不断争吵着，贵族则分成两派，喋喋不休的帮腔。\n\n他们像是宫廷中绘画着围绕在先知周边的圣徒的画像，只是圣徒们的眼中是油笔勾勒的神圣，而贵族的眼神中充斥着对利益的无休止崇拜，教育他的教士们不断诉说着贵族的物质堕落，但是当他问起他们是否支持自己时，他们便默不作声。\n\n所有能陪伴他的，仅仅剩下书本，从南巴，从北巴，从南方，从七河；无论是激进的政治宣言、社会理论，还是者繁复的魔法、庞大的物理学，亦或者古典的名著、现代的小说……他全部一一阅读过去，从浅入深，从前至后——但是那又如何呢？\n\n他给第三国际写过信，他给现在还发声的几个激进自由主义者都写过信，他甚至最远给远乡的君主都写过信，他们一个都没有回过信，他们根本不在乎一个远在残破王国的反动忧郁国王，就像是他的“臣子们”一样，所有人都压根不在意他。\n\n他不断看着书，眼中也只有书了。\n要镇压暴动的群众？批准。\n要实行农业税？批准。\n要严打激进分子？批准。\n他的书上书写着人民的鲜血，流淌着一条条生命。\n\n但是他不在乎。"
KDK_cordelia_riparbera_jr:0 "小科德利阿·里帕尔贝拉"
KDK_cordelia_saints_riparbella:0 "科德利阿·‘圣徒’·里帕尔贝拉"
KDK_gaius_surano:0 "盖乌斯·苏拉诺"
KDK_julius_roccadaspide:0 "尤里乌斯·罗卡达斯皮德"
KDK_the_cult:0 "“教团”"
KDK_invisible_committee:0 "隐形委员会"

###内阁###
KDK_reconstruction_committee:0 "坎达德尔重建委员会"
KDK_reconstruction_committee_desc:0 "在“审判日”（外称伟大战争）之后，坎达德尔王国在南巴斯蒂亚联邦与修卡利翁同盟的“协助”下建立了君主立宪制度；制宪议会被称为坎达德尔重建委员会，但是实际上，无非就是南巴斯蒂亚和修卡利翁同盟的傀儡吵架的地方罢了。"
KDK_finn_veciano:0 "费恩·韦基亚诺"
KDK_finn_veciano_desc:0 "费恩·韦基亚诺出生于提特兰共和国一个富裕的旧贵族政治精英家族，他的先祖作为颇为早期对提特兰共和国的投诚而著名，他的早年多为混迹于提特兰共和国的上层政治精英环境，而在伟大战争之后，他作为南巴斯蒂塔的代表来到了坎达德尔，重新拾起爵位之后，他堂而皇之的加入了重建委员会，以求像是他先祖一样，将坎达德尔王国也变成“共和主义的热土”。"
KDK_nicolas_esmirada:0 "尼科拉斯·艾斯米拉达"
KDK_nicolas_esmirada_desc:0 "尼科拉斯·艾斯米拉达是目前伊斯恰军管邦的总督瓦斯克斯·艾斯米拉达的小儿子，他由于非常喜欢提特兰的文化到了玩物丧志的地步，被他的父亲送到坎达德尔王国内作为棋子，并且让王国方面册封他为一位“坎达德尔贵族”。"
KDK_ulpius_surano:0 "乌尔皮乌斯·苏拉诺"
KDK_ulpius_surano_desc:0 "乌尔皮乌斯·苏拉诺像是一团琢磨不透的影子，用着严厉的手段在文官系统内保持着文官系统的稳定，对贵族的命令言听计从，不少人认为他是贵族的忠犬，但是实际上在上层圈子里，有关于他是一个隐藏的反政府分子的谣言从来没有停下来过，上层中不少人认为他就是秘密组织复国协定的领袖，但是在无数次探查中，他似乎也没有什么黑料被挖出。"
KDK_cordelia_riparbera:0 "科德利阿·‘正义者’·里帕尔贝拉"
KDK_cordelia_riparbera_desc:0 "科德利阿·‘正义者’·里帕尔贝拉是里帕尔贝拉家族的叛徒，他作为极右翼分子大科德利阿的次子，却逐渐温和自己的立场，以贵族的身份在重建委员会中当起了中间派，维护坎达德尔十一世的权威与皇室礼仪。"

###将领###
KDK_dinu_carodanno:0 "迪努·卡洛丹诺"
KDK_otilia_sara_sori:0 "奥蒂利亚萨拉·索里"
KDK_lucien_sara_merknes:0 "卢西安萨拉·默克内斯"
KDK_nicolescu_roscaklivia:0 "尼科列斯库·罗斯卡克里维亚"

###民族精神###
KDK_HMML_reconstruction_committee:0 "国王陛下最忠诚的重建委员会"
KDK_HMML_reconstruction_committee_desc:0 "坎达德尔重建委员会作为伟大战争后，修卡利翁同盟与南巴斯蒂亚联盟在坎达德尔王国推动了重建委员会的诞生，以及其中贵族两党的局势。但是就事实而言，重建委员会不过是修卡利翁同盟与南巴斯蒂亚联盟争夺坎达德尔的工具罢了。"

KDK_remember_years_of_bullets:0 "铅弹年华，牢记于心"
KDK_remember_years_of_bullets_desc:0 "在1995-1997之间，坎达德尔王国陷入了政治极端势力的狂欢，极左派与极右翼们绑架贵族杀害，炸弹与手枪刺杀更是不计其数。几乎整个沿海的城市里到现在还残存着左派与右派的街堡，虽然这股狂潮在修卡利翁同盟与南巴斯蒂亚联盟的秘密帮助下平息，§R但是，请小心谨慎，任何对现在局势平衡稳定的破坏都会让政治极端势力抓住机会。§!"

KDK_under_the_sun:0 "烈日之下……"
KDK_under_the_sun_desc:0 "时间并不能抹去战争所带来的损坏，我国的中部依旧是一片废墟，无数古老的遗址在时间中看着新加入的遗址，人们过着近乎无政府的失秩状态，仅仅有一些地区在南巴斯蒂亚联盟与修卡利翁同盟的“帮助”下勉强恢复了职能。"

KDK_great_agropoli_theological_seminary:0 "大阿格罗波里神学院"
KDK_great_agropoli_theological_seminary_desc:0 "大阿格罗波里神学院作为提特兰第一帝国时代就存在的大学，在历经提特兰半岛的无数次苦难之后，大阿格罗波里神学院屹立不倒。作为坎达德尔王国各个极端思想的据点与坎达德尔王国唯一的高等教育学堂存续着。"

KDK_magic_city_gnoa:0 "魔导都市格诺亚"
KDK_magic_city_gnoa_desc:0 "格诺亚作为坎达德尔九世的心血之作，其之庞大与复古令人感叹，虽然在1923年遭到了焚毁，但是在修复下，格诺亚重新被修复的焕然一新——虽然这基本上把中部的重建基金给用完了。"

