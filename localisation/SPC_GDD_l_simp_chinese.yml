###民族精神###
GDD_unfitting_nation:0 "最不南巴的南巴国家"
GDD_unfitting_nation_desc:0 "虽然顿伏茨克也被视为南巴斯蒂亚的一部分，但半人马主导的种族结构使其拥有了与其他南巴国家迥异的文化与历史传承，同时，受到南巴文化影响的顿伏茨克半人马文化，也与七河的半人马同胞产生了巨大的差异。时至今日，顿伏茨克的半人马们仍为作为两种文化融合产物的自身文化感到骄傲——即使这种骄傲在有些时候很容易往固步自封和古板保守发展。"

GDD_shadow_within_tents:0 "帐中阴影"
GDD_shadow_within_tents_desc:0 "顿伏茨克的政治局势正随着大公与太后的矛盾不断激化而日趋混沌。势力不断增长，却又遇到改革瓶颈的改革派，与老树根深，不愿让权的保守派间日趋激烈的冲突，使得大公国的政府濒临瘫痪：虽然外界仍无法确定王帐中的权力天平正摆向何方，但毫无疑问的是，这场斗争将塑造顿伏茨克的未来，乃至于导向…§R更糟糕的结局§!。"

GDD_the_unreliable:0 "人类少数民族：§R不可信者§!"
GDD_the_unreliable_desc:0 "建立于半人马迁徙的顿伏茨克，自立国以来就必须与被征服的人类少数族群打交道：这种关系在一开始只是半人马主子与人类农奴的单向主从关系，但随着社会的发展、工业化的推进和改革的展开，半人马与获得了名义上平等权利的人类间的关系，也变得复杂了起来。\n\n顿伏茨克的每一位半人马国民仍无法遗忘东部人类骑兵团队叛乱，这让顿伏茨克的半人马们几乎失去了对人类的信任。虽然在前两任大公的妥协下，人类骑兵团以辖区的形式继续效忠大公国，但在背叛已经发生过的前提下，谁又能确信这些人类会遵守他们的诺言呢？这种根植于内心的不信任感，让顿伏茨克的半人马们称呼人类为“§R不可信者§!”：仍居住于顿伏茨克境内的人类，发现饱受白眼的自己已经成为了事实上的二等公民，而两个族群间的隔阂，目前还没有弥合的可能。"

GDD_experienced_soldiers:0 "久经沙场，锈迹斑斑"
GDD_experienced_soldiers_desc:0 "久负盛名的顿伏茨克铁骑，在伟大战争和世界大战中又一次证明了自己的威名。身为全南巴地区最精锐的军队之一，顿伏茨克王家军队拥有丰富的作战经验和职业度。然而，伴随大战威名而来的自满和守旧，也渐渐成为了生长在这支军队躯干上的附骨之蛆，虽然改革派的军事专家一再高呼军队从训练方式到组织结构和武器装备均早已过时，但军队内部的高层们对现状仍然十分满意。毕竟，为什么要抛弃行之有效的方法呢？"

GDD_great_donvodsk_dream:0 "大顿伏茨克之梦"
GDD_great_donvodsk_dream_desc:0 "自顿伏茨克半人马的先祖冲破重重阻碍，击败无数敌人，建立了被称为“大顿伏茨克”的半人马帝国以来，大顿伏茨克的梦想便深深地埋藏在每一位顿伏茨克国民的心中。然而，克拉亚诺的叛乱和人类骑兵团的自立，无疑摧毁了顿伏茨克的称霸之梦。即便如此，这份深深扎根于顿伏茨克人心中的梦想却从未屈服于现实的铁拳，依然等待着再次萌发的机会。"

GDD_maybe_stable_church:0 "稳定的教会？"
GDD_maybe_stable_church_desc:0 "作为顿伏茨克国教的北方教会，乃是半人马传统信仰与瑟庞教结合的自治教会。其虽在名义上属于教廷的管辖范围，但与半人马传统和大公宫廷的结合，使其保有了相当程度的自治，甚至和独立宗教差不多。\n\n与其他瑟庞教分支不同，北方教会的内部出乎意料的稳定：每一任牧首都对大公表示了教会内部的绝对团结与对公国的忠心。在伟大战争中北部教会的信徒踊跃参军立下赫赫战功，使得顿伏茨克对教会给予了充分的信任，允许教会高层进入公国内部任职。新任牧首瓦洛夫上台后，教会变得更加稳定与团结。这将成为顿伏茨克的一大助力——如果他们真的像表面一样的话。"

GDD_rich_moutains:0 "富饶的群山"
GDD_rich_moutains_desc:0 "别列津斯基山脉一度被人们认为是荒凉的化外边疆，但顿伏茨克工业化后对山脉的勘探结果显示，作为中巴盆地的外缘，别列津斯基山脉的资源储量十分可观。如今，这里已经成为了顿伏茨克采矿业的中心，诸如井镇这样的矿业城镇，也从荒凉的山间拔地而起。"

GDD_foreign_econ_influence:0 "南巴斯蒂亚的经济影响力"
GDD_foreign_econ_influence_desc:0 "自拉斯洛二世开始，顿伏茨克就踏上了追赶其他南巴国家的进程，而南巴斯蒂亚共和国就是顿伏茨克工业化和农业现代化的主要推手。然而，南巴人并非慈善家，隐藏在技术援助和贷款背后的真正目的，是希望借机获得顿伏茨克山脉资源的开采权，并从我们的农产品出口中获益。尽管我们遏制住了南巴影响力的进一步扩张，但是他们的资本家已经对我们的经济体制产生了深刻的影响，甚至还控制着我们的一部分工业。"

GDD_human_minorities:0 "人类少数民族"
GDD_human_minorities_desc:0 "这一地区有着数量相当可观的人类人口，其中既有认为自己是顿伏茨克一分子的忠诚派，也有持着独立人类身份认同，尝试脱离顿伏茨克的独立支持者。如果我们不能妥善处理这一问题，那么在未来他们会是我们的大麻烦。"

###领导人###
GDD_various_radical_groups:0 "各路激进团体"
GDD_simon_livychuk:0 "西蒙·利维丘克"
GDD_mikhail_shulikin:0 "米哈伊尔·舒利金"
GDD_irina_koshchenko:0 "伊琳娜·科什琴科"
GDD_nikolai_dolovechuk:0 "尼古拉·多罗韦丘克"
GDD_uslov_kossovsky:0 "乌斯洛夫四世"
GDD_uslov_kossovsky_desc:0 "科索夫斯基王朝出过四个乌斯洛夫：第一个乌斯洛夫带领迁徙的半人马杀到了南巴斯蒂亚，在林立的万国之中为自己的族人找到了安身立命之所；第二个乌斯洛夫开疆扩土，在南巴留下了顿伏茨克铁骑的威名；第三个乌斯洛夫虽然没有什么显赫的武功，但是他成功地改善了顿伏茨克的外部环境，让顿伏茨克得以被南巴人承认为平等的国家。那么，第四个乌斯洛夫呢？\n\n第四个乌斯洛夫的继位只是一场意外。作为拉斯洛二世的第四子，乌斯洛夫四世本不应该继承王位。然而，在拉斯洛驾崩后，乌斯洛夫的长兄便突然因“悲伤过度”出了家，而二哥和三哥也在继位后相继暴亡，其死因从狩猎事故到食物中毒不一而足。于是，顿伏茨克大公的位置就传到了小乌斯洛夫的手里：冲龄继位的他仅有12岁，不像已经成年的哥哥们那样有自己的主见，这对想要垂帘听政的太后伊琳娜而言再好不过。然而，随着他的年龄渐长，他对太后的统治的了解也越来越多——从太后与保守派贵族和各部头人们的秘密交易，到顿伏茨克因举债工业化而在经济上日渐与南巴靠拢乃至绑定的苦涩现实，再到让占比可观的人类少数民族脱离顿伏茨克的叛乱…很显然，太后对此并非不知情，他兄长们的结局似乎马上也就要降临到乌斯洛夫四世的头上。\n\n然而，他还是抓住了机遇：国内不断兴起的改革派运动很显然需要来自上层的支持者，同时老太后近乎毫不掩饰的绝对君主制自然也无法被南巴的“民主主义者”们接受。于是，借助在南巴接受高等教育的机会，他成功地将自己塑造成了顿伏茨克改革派运动的领袖，而当他回国时，顿伏茨克国内的民主改革派运动、不满老太后古板政策的商人和资本家、争取权益的佃农、左翼知识分子，甚至还有试图颠覆老太后，以建立一个“更符合南巴联邦愿景的顿伏茨克政府”的境外势力都归附他的麾下，而他本人也成为了日渐庞大的改革运动的非正式领袖，他不仅借此实现了自保，还让自己顺利地实现了“亲政”。\n\n可改革并非一帆风顺，虽然有限的代议制民主被成功引入了顿伏茨克的权力结构，聊胜于无的劳工与佃农权利保障也得以落实，但保守派们很快便在老太后的身旁重整旗鼓，围绕着改革中遇到的每一个困难，产生的每一个问题死缠烂打；而他的“战友们”，也纷纷在运动的高潮褪去后现出了原型，在激进派呼吁“踢开大公闹革命”的同时，原先同情改革的普罗大众也对改革的低效和转型的“阵痛”产生了怀疑。在海外，他所塑造的“改革大公”和“顿伏茨克春晓”的形象，也被改革进度的迟缓戳穿，南巴的民主传播者们纷纷另寻新欢，留给他的只是一堆空头支票。\n\n甚至就连大公自身，也对“如何改革”和“改革运动将走向何方”缺乏概念，毕竟他一开始想做的也仅仅只是自保。然而，木已成舟，科索夫斯基王朝的第四个乌斯洛夫会在历史上留下怎样的印记，而顿伏茨克的改革运动又将走向何方，恐怕谁也无法预测。"
