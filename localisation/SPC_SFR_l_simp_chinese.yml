###国策###
SFR_revolution_of_ours:0 "我们的革命"
SFR_revolution_of_ours_desc:0 "远乡的革命是曲折而复杂的，从南巴斯蒂亚联邦左翼组织的振臂一呼，到远乡政府扭捏的假笑，到火光冲天的那一夜，再到数十年血腥，痛苦而无穷无尽的游击战争。或许我们本不该沦落到今日的地步？或许本可以做出更好的选择？又或许，我们已经尽了全力，保住了革命的火苗，保住了根据地…然后为我们曾经的天真所付出代价。"
SFR_revolution_of_ours_tt:0 "§R而如今，远乡再遇剧变。身体抱恙的郑钧已被证明无法继续有力统治远乡王国，各地秩序陷入了前所未有的混乱——这会是我们最后的机会。§!"
SFR_shadows_everywhere:0 "阴云四起..."
SFR_shadows_everywhere_desc:0 "随着局势的放缓，根据地的生存压力骤降，这也使得藏在暗处的敌人蠢蠢欲动。诚然，革命阵线在危难关头扛起了远乡革命的大旗，可对根据地管理方式有意见的反对分子也不在少数。许多人责怪远乡革命会没落到今日，归根到底仍要怪阵线的错误决定，导致各地的根据地被围剿毁灭，并一路躲躲藏藏到正泸；亦或者是出于意识形态理念的冲突，担心自己的敌人最终夺得了话语权。\n\n无论如何，支持阵线继续存在的人也好，希望阵线毁灭，自己夺得大权的人也好，都会在接下来的几个月内开展行动…或许，一场风暴正在前方等待着我们。"
SFR_shadows_everywhere_tt:0 "§Y阵线的命运会在接下来的几个月被彻底改变...§!"
SFR_against_rev_front:0 "反对革命阵线"
SFR_against_rev_front_desc:0 "在过去的十数年里，为了所谓的“大局”，所谓的“团结”，我们委曲求全，向恶徒让步，加入革命阵线，维系脆弱的革命火种。然而，所谓的“中央”和那些罪该万死的中间派一次又一次地向我们展现了何为人性之恶，我们为了革命付出了一切，而他们却连根据地的人民都保护不了！是时候了，我们要采取行动——现在行动，而不是在数年，十数年后，等到革命果实被窃取才行动！"
SFR_against_rev_front_tt:0 "§R事实证明，革命阵线已经无法在当下的局势实现远乡革命。在一切都太迟前，我们必须采取行动！§!"
SFR_support_left_opposition:0 "支持左翼反对派"
SFR_support_left_opposition_desc:0 "同志们，当我们流血牺牲，奋力推翻旧世界的压迫时，那些投机的右翼分子和摇摆的混账中间派却在窃窃私语，企图篡夺本应属于人民的胜利果实！他们用妥协与倒退玷污革命的纯洁性，试图将这场伟大的斗争引向维护少数人利益的歧途。我们绝不能容忍！革命的最终目的不是换一批老爷来统治我们！现在，就让我们重新高举起赤色的战旗，将所有真正的革命者团结起来，用坚决的行动告诉他们：革命的胜利，永远只属于付出了一切的广大人民群众！"
SFR_support_left_opposition_tt:0 "§R共产党§!走上台前..."
SFR_call_for_actual_rev:0 "呼吁真正的革命"
SFR_call_for_actual_rev_desc:0 "当阵线的领导层沉湎于与右翼的妥协，将革命的锐气消磨殆尽时，一场真正的革命就必须由我们来重新点燃！我们必须向所有还怀揣着理想的同志发出呼吁：看看我们周围，这还是我们最初为之奋斗的那个革命吗？不！它已经被投机者和官僚玷污了！现在，是时候摒弃那个腐朽的、空有其名的阵线了。我们要揭露他们的背叛，唤醒那些被蒙蔽的群众，让他们明白谁才是革命的真正继承者。让我们的声音响彻根据地的每一个角落，为即将到来的武装起义做好最后的舆论动员！"
SFR_secret_assembly:0 "秘密集结"
SFR_secret_assembly_desc:0 "同志们！潜藏于阴影中的时刻已经结束！那些窃据高位的叛徒与投机者正沉浸在权力与妥协的美梦中，丝毫没有察觉到真正的革命浪潮即将在他们脚下爆发。现在，不要声张，不要犹豫，悄悄擦亮你们的武器，将子弹上膛。以最严密的纪律，化整为零，秘密动身，将你们的脚步汇入前往首都正泸的洪流。在那里，我们将吹响最后的号角——集结的时候到了！革命将重新回到它真正的主人手中！"
SFR_support_right_opposition:0 "支持右翼反对派"
SFR_support_right_opposition_desc:0 "各位同仁！请睁眼看看我们所处的险境！中央那些身居高位的官僚们，他们的愚蠢决策和僵化思想，与那些狂热左翼分子的鲁莽冲动相互交织，已经将我们为之奋斗的革命事业，一步步推向了万劫不复的悬崖边缘！我们不能再袖手旁观，不能再放任这群无能之辈继续这样胡作非为断送阵线的未来了。为了拯救这场革命，为了保护我们的共同事业，我们必须立刻行动起来，拨乱反正！"
SFR_support_right_opposition_tt:0 "§C革命党§!走上台前..."
SFR_call_for_internationalist:0 "召集国际派"
SFR_call_for_internationalist_desc:0 "起事在即，为了确保我们拨乱反正的行动能够一举成功，任何一丝力量都弥足珍贵。我们不能再孤军奋战，必须团结所有能够认清局势、反对中央错误路线的同仁。是时候向那些拥有广阔视野和外部资源的国际派同志们发出召唤了。他们的理念或许与我们不尽相同，但在反对中央愚行和左翼冒进这一点上，我们拥有共同的利益。将他们召集到我们的旗帜之下，我们的事业将增添重要的筹码，胜算也将大大增加。"
SFR_divide_the_front:0 "分裂联军"
SFR_divide_the_front_desc:0 "阵线联军的现状为我们的行动提供了绝佳的优势，其构成早已决定了力量的天平。共产党的游击队固然英勇，但联军的主体与中坚力量，仍是由我们革命党过去的正规军将士所构成，在人数上占据着决定性的优势。这意味着，只要我们抓住时机，策动联军的分裂，超过半数的武装力量便会立即回归我们的指挥。届时，我们将拥有足够强大的实力，去纠正被左翼带偏的航向，并将那本应属于所有人的革命果实，重新夺回到我们手中。"
SFR_attract_people:0 "拉拢民众"
SFR_attract_people_desc:0 "那个由左右两派勉强拼凑而成的阵线，已经走到了它的尽头，它的存在本身已成为革命前进的阻碍。我们必须行动起来，让广大民众也清醒地认识到这一点。我们要将阵线现领导层犯下的种种愚蠢罪行公之于众：那些失败的决策、无谓的牺牲、对人民苦难的漠视……要让所有人都明白，这个腐朽的联盟已经无法带给他们希望。同时，我们要让他们知道，真正的希望在我们这里——我们才是能够纠正错误、引领他们走向真正胜利的力量。只有这样，民心才会转向，他们才会抛弃旧的旗帜，转而支持我们正义的事业。"
SFR_defamation_of_front:0 "诋毁阵线"
SFR_defamation_of_front_desc:0 "为了实现我们崇高的目标，仅仅将阵线犯过的错误如实陈列出来，其力度还远远不够。人心是健忘的，也是可以引导的。我们需要采取一些更激进、更有效的行动：精心编造一些阵线不存在的罪行，并将其散播出去。在民众眼中，一个已经犯下了诸多错误的组织，再多背负一些罪名也是完全合情合理的，不是吗？谣言与真相交织，将彻底摧毁阵线仅存的公信力，将其彻底污名化。这虽然手段不够光彩，但却是达成最终胜利所必需的牺牲。"
SFR_support_rev_front:0 "支持革命阵线"
SFR_support_rev_front_desc:0 "质疑者将根据地的疮疤归咎于阵线的妥协，却忘了是谁在正泸城头用血肉烙下第一道防线，又是谁在反动派围剿的暴雨中，用生命替分散的游击队争取到合流的时间？是的，中央的命令裹挟着官僚的怯懦，委员会的决议沾染了权谋的锈迹，但若此刻分裂，我们挥刀斩向的不会是“腐朽的阵线”，而是亲手撕碎那面承载着同志们的牺牲的旗帜！内部整肃的号角，应当响彻在反动政府覆灭的尸骸上，而非回荡在同志相残的硝烟中。阵线的罪需要赎，但赎罪的前提是……我们得先活到黎明。"
SFR_support_rev_front_tt:0 "§C无论现状如何，革命阵线会是远乡革命取得成功的最大希望，我们必须保护它！§!"
SFR_unify_the_left:0 "团结左翼"
SFR_unify_the_left_desc:0 "古语有云：水能载舟，亦能覆舟。人民群众，便是承载着我们阵线这条革命大船的无垠汪洋。在当前被敌人重重围困的险恶局势下，军事上的胜利固然重要，但赢得民心，获得根据地民众更进一步的信任与支持，才是我们能否存续下去的根本。我们必须承认，共产党同志们长期扎根于工农之间，他们在人民之中享有极高的声望与威信。因此，为了巩固人民这座我们最坚实的堡垒，主动向左翼同志靠拢，给予共产党更多的信任与权力，让他们更充分地发挥发动群众的优势，无疑是一个稳定大局、团结多数的行之有效的方案。"
SFR_unify_the_left_tt:0 "§R通过转向共产党，我们可以更有效的拉拢根据地的民众。§!"
SFR_turn_to_farmers:0 "转向农民"
SFR_turn_to_farmers_desc:0 "粮食，粮食，还是粮食！这是我们生存与斗争的基石，是实现一切宏伟目标最根本的前提。没有充足的粮食，战士们便无力端起钢枪去迎击敌人；没有充足的粮食，工人们便无法在机器旁继续为革命生产军需。环顾根据地的现状，我们必须清醒地认识到，保障粮食供应是我们当前压倒一切的中心任务。因此，我们必须果断调整政策重心，将更多的资源与关注倾斜给广大的农民同志。只有切实地保障他们的利益，激发他们的生产热情，才能确保田地里长出更多的庄稼，将维系阵线命脉的粮食牢牢掌握在我们自己手中。"
SFR_dispatch_relief_materials:0 "发放救济物资"
SFR_dispatch_relief_materials_desc:0 "在反动政府的长期围剿下，根据地的人民已在饥寒交迫中忍受了太久的苦难。生活的重压不仅磨损着他们的肉体，更侵蚀着他们对生活、对阵线、乃至对革命的希望与信任。当人民食不果腹，任何宏大的口号都将显得苍白无力。因此，我们必须立即行动。打开仓库，将粮食与衣物送到每一个需要的家庭手中。这不仅是一次物质援助，更是一场政治宣言，我们要用实际行动向人民证明：阵线没有忘记他们，革命是为了让他们过上更好的生活。只有让人民重新感受到温暖与希望，他们对阵线的信心、对革命的信念才能被重新点燃，汇聚成摧毁旧世界的磅礴力量。"
SFR_purge_internationalists:0 "清洗国际派"
SFR_purge_internationalists_desc:0 "如今，阵线正遭受着前所未有的围困，每一寸土地都浸透着同志们的鲜血，我们正为生存本身而殊死搏斗。然而，就在这生死存亡的危急关头，那些所谓“国际派”的右翼分子，却依然沉浸在不切实际的幻想之中，将希望寄托于遥远而虚无的外部支援！他们不愿正视现实，不愿与我们并肩作战，共同面对眼前的敌人。如果他们执意将阵线的命运赌在那些永远无法抵达的援助上，那么这些右派分子对这场残酷的斗争便再无任何积极价值。他们对阵线仅剩的作用，也就只有作为叛徒与空想家，成为一个警示后人的“经典反面案例”了。"
SFR_support_local_parties:0 "支持本土派"
SFR_support_local_parties_desc:0 "在阵线被重重围困、孤立无援的严酷现实面前，任何对外界的幻想都无异于自取灭亡。此刻，确保我们自己的生存，依靠我们自己的力量杀出一条血路，才是压倒一切的第一要务。那些虚无缥缈的承诺无法填饱战士的肚子，更无法抵挡敌人冰冷的刺刀。本土派同志们所提出的“自力更生”的口号，摒弃了所有不切实际的幻想，直面我们最根本的困境。这正是我们此刻最需要的清醒与务实，是团结内部力量、激发斗争意志、让我们在这片土地上站稳脚跟的正确道路。"
SFR_reinforce_leadership:0 "巩固叶文石领导"
SFR_reinforce_leadership_desc:0 "外部的威胁如乌云压顶，反动派的刺刀依然冰冷地抵在我们的喉头，随时准备切开革命的动脉。在这生死存亡的危急关头，内部的任何摇摆与分裂都无异于自取灭亡。与其耗费精力在无谓的路线争论与权力倾轧中，将我们宝贵的力量虚掷于内斗的漩涡，一个更清晰、更坚定的选择摆在了所有同志面前：那就是团结起来，将一切希望与力量汇聚在一位久经考验的领袖周围。这样的领袖只有一位，那就是已经带领我们奋斗多年的叶文石。"
SFR_reinforce_leadership_tt:0 "§O在危难关头，我们最好不要选边站，而是专注于维持领导层的稳定。§!"
SFR_reinforce_confidence:0 "提振信心"
SFR_reinforce_confidence_desc:0 "反动派的军靴已经踏至眼前，阵线的命运摇摇欲坠，“未来”对于根据地的人们来说似乎越来越飘渺。当务之急，是让人们重拾信心——重拾对阵线的信心，重拾对革命的信心，重拾对胜利的信心。如果一支队伍连对自己的事业必将成功的信心都没有，那这支队伍的分崩离析近在眼前。"
SFR_ensure_military_support:0 "确保军队支持"
SFR_ensure_military_support_desc:0 "军队是政权的铁拳，是捍卫革命成果最坚实的壁垒。没有这无坚不摧的拳头，纵使你舌灿莲花，口号喊得震天响，在反动派的兵锋之下，最终也只能被人打至跪地！为保证阵线在围剿的血与火中能够屹立不倒，而非沦为待宰的羔羊，我们必须采取一切必要措施，确保武装力量的绝对忠诚。从高级将领到基层士兵，每一杆枪都必须牢牢掌握在阵线手中，每一颗子弹都必须为革命的理想而上膛。定要让军队上下万众一心，将所有摇摆与异心彻底肃清，使这柄利剑永远指向我们的敌人。"
SFR_reorganize_command_system:0 "重组指挥系统"
SFR_reorganize_command_system_desc:0 "在反动派长期的残酷镇压与精准打击下，我们原本引以为傲的指挥系统已是千疮百孔、破烂不堪。命令在传递过程中层层受阻，指挥效率的低下正在战场上造成致命的后果。然而，比战场失利更可怕的，是那些异见分子正利用这种混乱状态，如阴沟里的老鼠般聚集起来，在指挥链的缝隙中散播他们的毒素，侵蚀着军队的忠诚与根基。我们绝不能坐视这种局面继续恶化。必须以雷霆手段，尽快对整个指挥系统进行彻底重组，打通每一个堵塞的节点，清除所有杂音，确保阵线的最高指令能够毫无延迟、不打折扣地传达到每一位士兵，将一切力量重新牢牢掌控在我们的手中。"
SFR_mobilize_away_dissidents:0 "调动异议分子"
SFR_mobilize_away_dissidents_desc:0 "指挥系统的重组虽然打通了命令的渠道，但那些潜藏在军队中的异议份子并不会因此消失，他们的存在始终是埋在部队肌体深处的脓包。与其让他们在关键岗位上继续构成威胁，不如将他们主动调动起来。以加强前线或执行次要任务为名，将这些心怀不满或忠诚可疑的单位和军官调离核心区域，派往最艰苦、最不重要的战场。这既能有效消除他们串联生事的隐患，也能在残酷的战斗中消耗他们的力量，算得上是废物利用，一举两得。"
SFR_re_enable_front_parliament:0 "重启阵线议会"
SFR_re_enable_front_parliament_desc:0 "当今阵线内部，各种思潮激荡，矛盾日益凸显，这既是革命发展的必然，也是我们必须正视的严峻挑战。我们必须承认，无论是共产党同志的热情，还是革命党同仁的务实，其初衷都是为了阵线的存续与胜利。面对这些分歧，强硬的压制只会制造更深的分裂，而解决矛盾最文明、最有效的方式，永远是协商与妥协。因此革命党人的提议非常不错：必须立即重组并恢复阵线议会的职能。这并非是空谈误国的清谈馆，而应是稳定阵线的压舱石。只有建立一个正式的、所有派别都能平等发声的议事平台，我们才能将潜在的冲突转化为建设性的辩论，将各自的主张摆在台面上，通过理性的商议与民主的表决来寻求共识，弥合裂痕。有了议会这一组织和场所，我们才能在尊重彼此立场的前提下，共同制定出一条能够团结绝大多数力量、引领阵线走出困境的正确道路。"
SFR_re_enable_front_parliament_tt:0 "§C通过利用阵线议会所谓的民主政治，我们可以拉拢一批反对派到我们一边。§!"
SFR_accept_opposition:0 "接纳反对派"
SFR_accept_opposition_desc:0 "一个健康的议会，其力量源于对不同声音的包容，而非鸦雀无声的统一。若议会只剩一种声音，与旧王国的一言堂便无区别。因此，我们必须展现气魄，将反对派也吸纳进议会之中。给予他们席位，让他们在议事厅内畅所欲言，这既能帮助我们审视政策疏漏，也能向外界展示阵线的自信。更重要的是，将他们纳入体制内，就等于将他们的斗争从体制外的破坏引导为体制内的博弈，并置于我们的监督之下。如此，议会便不会变得一家独大……最起码在表面上如此，它将呈现出多元与民主的景象，这对巩固我们的合法性至关重要。"
SFR_commitment_to_the_future:0 "对未来的承诺"
SFR_commitment_to_the_future_desc:0 "在敌人残酷的围剿之下，阵线的前途命运变得扑朔迷离，生死存亡的压力迫使我们不得不采取了一些极具争议的非常措施。我们清楚地知道，这些决定在内部引发了疑虑与不满，也无疑损害了我们的权威性。然而，我们必须向所有同志和人民阐明：今日的妥协与强硬，皆是为了渡过眼前的难关，是为了确保革命的火种不被熄灭。因此，我们更要坚定地向大家给出承诺——一个关于美好未来的庄严承诺。当乌云散去，反动派被彻底粉碎之后，一个真正民主、自由、繁荣的新世界必将到来。今日的所有牺牲，都将化为未来宏伟殿堂的基石。"

#阵线国策1#
SFR_front_survive:0 "阵线幸存"
SFR_front_survive_desc:0 "在经历了一系列的斗争后，我们成功清除了那些试图从内部摧毁革命阵线的野心家，并让左派主导了革命阵线。尽管这不可避免地让我们失去了一些支持者，但这结束了阵线领导层的分裂，并逐步形成一个忠于人民的领导核心——这对解放全远乡来说是不可或缺的。"
SFR_front_survive_tt:0 "§C阵线坚持下来了！是时候将目光转向§！§R平京§！§C了...§！"
SFR_consolidate_hearts:0 "巩固民心"
SFR_consolidate_hearts_desc:0 "革命阵线一度被王国军队逼入绝境，这不是什么秘密。然而，远乡革命阵线依然存在，甚至还有大量游击队分布于全国各地。这是为什么呢？归根到底，就是因为我们赢得了民心，才能够一次次地从暴君的屠刀下一次次地逃出生天。没有人民的掩护，我们的游击队根本藏不了多久就会被王国军队发现并消灭。因此，我们必须确保人民的支持，让人民现在就看到革命带来的好处——这是为了革命的生存，更是为了人民的未来。"
SFR_stabalize_politics:0 "稳固内政"
SFR_stabalize_politics_desc:0 "俗话说：打铁还需自身硬。如果我们想要从反动派手中解放全远乡，我们就必须先稳固内政，消除内部的混乱，促进革命阵线的团结，才能保证革命阵线的战斗力，并开展接下来的一系列工作。"
SFR_prepare_for_the_unavoidable:0 "准备不可避免之战"
SFR_prepare_for_the_unavoidable_desc:0 "扫帚不到，灰尘不会自己跑掉。无论反动政权有多么腐朽，也得要人们去推翻他他才会灭亡。想要解放全远乡，必须要用一场规模遍及全远乡的全面战争来打倒全远乡的反动派！整个革命阵线都必须将工作的重心放在准备这次不可避免的大决战上。"
SFR_expanding_military_presence:0 "扩大军事存在"
SFR_expanding_military_presence_desc:0 "为了彻底消灭反动派，我们需要组建更多的军队，在南远乡各地扩大军事存在。从南到北，处处都有渴望变革的工人和农民；从敌后的武工队到根据地的正规军，每名革命战士都将成为焚尽反动统治的火苗，我们将在广阔的远乡大地上广泛地发动人民群众开展武装斗争。"
SFR_intensive_troop_training:0 "强化部队训练"
SFR_intensive_troop_training_desc:0 "在游击战时期，工农红军无法一边养活被封锁的根据地，一边应对王国政府的围剿，一边每天拿出好几个小时用于军事训练，因此，现在工农红军的军事训练水平较低，部队战术素养也因此参差不齐。这样的军队在未来与反动派的全面战争中注定是要吃大亏的。平时多流汗，战时少流血，我们必须强化部队训练，加强战士们的战术素养。"
SFR_push_equip_prod:0 "推进装备制造"
SFR_push_equip_prod_desc:0 "众所周知，徒手与持械之间存在着一堵高墙。反动派军队再怎么腐朽也尚能凑足步枪和子弹压制没有武器的劳动人民，因此，我们有多少武器决定了我们能武装多少能和反动派军队作战的士兵，而在外援断绝的情况下，我们的装备制造能力则决定了我们能拥有多少装备。我们将组织工人加强装备制造能力，以组建更多属于工人的军队！"
SFR_improved_command:0 "改进指挥体系"
SFR_improved_command_desc:0 "阵线领导层的内耗一度波及了我们的指挥体系。随着阵线领导层再次恢复团结，我们得以提拔更多在游击战中崭露头角的革命新秀，同时实事求是地革除那些不称职的指挥官。从军队制度方面，我们将明确指挥官的权力与责任，让我们的战士明白，战斗员与指挥官之间只是分工不同，并不存在身份上的差距。"
SFR_arm_the_militia:0 "集结民兵武装"
SFR_arm_the_militia_desc:0 "为了在全远乡范围内开展广泛的游击战争，我们已在全国各地组织了忠于革命的民兵武装。但当战争形势逐渐由游击战转为运动战与攻坚战时，我们就应当将这些民兵武装集结起来集中使用，并在投入正面作战前进行必要的军事训练。"
SFR_army_of_workers_and_peasants:0 "工农子弟兵"
SFR_army_of_workers_and_peasants_desc:0 "我们的目标是通过暴力革命打倒反动派，进而解放全远乡，这不是什么秘密。但问题在于，解放远乡的工人和农民究竟需要怎样的军队？也许答案就在谜面上——一支劳苦大众的军队，一支工农子弟的新军队！这支新军队将为无产阶级开创一个全新的时代！"
SFR_rearm_old_armies:0 "重组旧武装"
SFR_rearm_old_armies_desc:0 "依赖旧有经验当然不是好事，但总比完全没有经验或者不运用经验强，在军事方面更是如此。至少在军事战术和部队建制方面，我们依然可以向旧军队学习，以加强工农红军的战术素养。当然，我们绝不会像旧军队那样腐朽，通过约束军队纪律，我们会保证工农红军依然是人民的军队。"
SFR_initiate_people:0 "发动群众"
SFR_initiate_people_desc:0 "我们要解放群众，但很明显，我们不是什么高魔个体救世主，也没法请来神仙和皇帝为人民伸张正义。解放群众的力量永远都只会来自群众。我们想要解放群众，就必须先发动群众，让他们看到自己的磅礴伟力，并用这份力量改变自己的命运，书写自己的意志。"
SFR_for_people_for_rev:0 "为人民，为革命"
SFR_for_people_for_rev_desc:0 "在阳新镇这个并不富裕的小城中，有从南巴留学归来的高材生，有从上饶乡村走出的农民，还有从平京跋山涉水而来的工人，这些人的出处与出身都大相径庭，却同聚此地与反动派作决死的斗争，究竟是为了什么？\n\n“为人民，为革命。”\n\n这便是我们所有人的初心。我们从来不羞于反复提及我们的初心，只怕将其忘却。只要我们还记得自己的初心，我们就还能背负起过去的牺牲，直面当下的困境，并保持对未来的憧憬——这些都不能当饭吃，却同样是这个饥饿年代的必需品。"
SFR_org_regain_arg:0 "组织恢复农业"
SFR_org_regain_arg_desc:0 "粮食不是凭空从厨房里长出来的（至少我们目前还没有这样的魔法）没有状况稳定的农业生产，就没有稳定的粮食供给。然而，农业生产本就容易遭到破坏，近年来的社会动荡极大地破坏了农业生产。为了保障粮食供应，我们必须组织人手恢复农业生产，并保护现有农田，使其免遭流氓匪盗和反动武装破坏。"
SFR_protect_people:0 "保障群众生活"
SFR_protect_people_desc:0 "先前因为社会动荡与内部斗争，我们一度忽视了经济生产，甚至在一定程度上破坏了根据地的生产活动——这对我们的革命是致命的，我们必须痛定思痛，痛改前非。为了弥补我们的错误，我们必须重新协调各个生产单位进行生产以保障军民物资供应。"
SFR_reinforce_mobilization:0 "强化军事动员"
SFR_reinforce_mobilization_desc:0 "在我们成功整顿了经济生产后，我们手头终于有了一批盈余的物资。大战在即，每一份物资都十分的珍贵，这些物资都应当被分配给革命的主力军——远乡工农红军。为了赢得最终的胜利，我们将再一次进行军事动员，增加士兵数量。"
SFR_reorg_prod:0 "重新协调生产"
SFR_reorg_prod_desc:0 "先前因为社会动荡与内部斗争，我们一度忽视了经济生产，甚至在一定程度上破坏了根据地的生产活动——这对我们的革命是致命的，我们必须痛定思痛，痛改前非。为了弥补我们的错误，我们必须重新协调各个生产单位进行生产以保障军民物资供应。"
SFR_promote_self_serve:0 "鼓励自给自足"
SFR_promote_self_serve_desc:0 "为了不被敌人的封锁困死，我们必须动员根据地军民参与一系列的建设运动与生产运动，尽可能的实现经济上的自给自足。当然，我们条件简陋，没法在短时间内把根据地建设成什么都能生产出来的工业城市。但通过我们的劳动，我们仍能养活自己的人民并积攒下足够的革命力量。"
SFR_commi_first:0 "优先共产党干部"
SFR_commi_first_desc:0 "当下的革命形势要求革命阵线必须拥有一个统一的，坚强的领导核心。很明显，只有远乡共产党才能担当起领导责任！我们将优先提拔任用共产党干部，让远乡共产党主导革命阵线！"
SFR_united_front:0 "统一战线的平等"
SFR_united_front_desc:0 "只有革命阵线中的每一位同志同心同德，才能激发出所有人的力量，进而打倒远乡反动派！因此，我们将保证统一战线的平等与互相尊重，只有这样，革命阵线才能真正齐心协力，患难与共！"
SFR_rectification_movement:0 "整风运动"
SFR_rectification_movement_desc:0 "目前革命阵线内部仍然存在许多旧势力与旧思想的残余。未被清算的阵线右翼成员仍在暗中怨恨着左翼的掌权，“没有我们，老百姓什么都不是”的专制思想仍在战士和干部们的脑海中盘踞，为了让革命阵线确立社会主义思想路线，增强干部们的思想觉悟，剔除残余的落后分子影响，我们必须开启一场整风运动以整肃我们队伍的精神风貌！"
SFR_expand_people_arms:0 "扩大人民武装"
SFR_expand_people_arms_desc:0 "大敌当前，我们必须停止一系列过激的政治运动，将工作重心放在扩大各级武装力量上面。同时，我们也不能对旧势力的渗透毫无防备，我们必须推行必要的政治审查，保证被扩大的武装力量将专业而忠诚地为人民而战！"
SFR_enhance_unite_work:0 "加强统战工作"
SFR_enhance_unite_work_desc:0 "事实上，在远乡王国军队中也有对郑氏反动统治心怀不满的军人。倘若能够争取到这些异见者的支持，我们打倒远乡王国的胜算将会大大增加。然而，过于激进和左倾的政治风气一定会赶跑这些出身“不太革命”的军人。我们搞政治，就是要把敌人搞的少少的，把朋友搞的多多的。为了争取到更多的盟友（哪怕只是暂时的）我们应当废除过度激进的政策和政治运动，保证政治风气更加温和与开放，才能真正加强我们的统战工作，为革命的胜利争取更多的盟友。"
SFR_enhance_unite_work_tt:0 "§Y内战开始后，我们将获得来自远乡的投诚部队！§!"
SFR_infiltrate_enemy_territory:0 "渗透敌占区"
SFR_infiltrate_enemy_territory_desc:0 "在敌占区，仍有无数饱受压迫的同胞渴望着革命的到来，而我们这些为了他们而战的战士也没有理由不赶紧到他们的身边去保护他们免受反动派的迫害。我们将渗透敌占区，在敌人的眼皮子底下获取人民的支持，甚至发动起义。由于腐朽的王国早已和他的国王一样老眼昏花，我们渗透敌占区的工作想必不会太难。"
SFR_infiltrate_enemy_territory_tt:0 "§Y我们现在可以更进一步渗透敌占区。§!"
SFR_fight_capital:0 "对抗平京恶徒"
SFR_fight_capital_desc:0 "人民早已对占据平京的郑家王朝失望透顶，只是没有意识到自己的力量而暂时屈服于郑家的压迫罢了，我们当然要提醒一下他们。专注于渗透王国统治区将让我们的渗透工作事半功倍，并极大地动摇郑家王朝的反动统治。"
SFR_fight_capital_tt:0 "§Y我们现在可以更进一步渗透敌占区。§!"
SFR_fight_enemeies:0 "对抗革命之敌"
SFR_fight_enemeies_desc:0 "尽管腐朽衰败的郑家王朝与故弄玄虚的青天军敌对，但两者都是革命的死敌，我们没有任何理由只打击一方而放过另一方。我们将派出敌后武工队渗透这两伙反动势力的统治区，同时打击这两伙反动派的反动统治。"
SFR_fight_enemeies_tt:0 "§Y我们现在可以更进一步渗透敌占区，以及对抗青天军的影响。§!"
SFR_expand_intel_network:0 "扩大情报网络"
SFR_expand_intel_network_desc:0 "古人云：知己知彼，百战百胜。通过扩大情报网络，我们将弄清敌占区的社会经济状况，并根据这些信息从已经被我们渗透的敌占区中获取需要的物资。同时，这也有利于后续开展的渗透敌占区行动。"
SFR_expand_intel_network_tt:0 "§Y解锁从敌占区获利的行动。§!"
SFR_damage_enemies:0 "敌后破坏"
SFR_damage_enemies_desc:0 "敌人的统治已经摇摇欲坠，而我们也乐意再往上面补上几脚，让那些还在沉浸在美梦的“绅士”们少睡几天好觉。通过向敌占区派遣武工队，我们将在敌占区制造一系列破坏行动动摇反动派的社会经济基础。"
SFR_damage_enemies_tt:0 "§Y解锁敌后破坏的行动。§!"
SFR_infiltrate_qta:0 "渗透青天军"
SFR_infiltrate_qta_desc:0 "我们的情报显示，青天军内部并不是铁板一块，各派势力的内斗使得他们本就杂乱的组织系统更加混乱。这也为我们的渗透提供了可乘之机。我们将从这个极右翼组织的内部开始破坏他们。"
SFR_infiltrate_qta_tt:0 "§Y我们可以提前准备渗透青天军，这在之后§!§R不可避免§!§Y的战争中会为我们提供优势。§!"
SFR_arms_and_people_matters:0 "兵民是胜利之本"
SFR_arms_and_people_matters_desc:0 "革命的胜利离不开工农红军和人民群众的支持。但是，群众和战士不是命中注定要和我们走的，我们要想赢得他们的支持就得让他们深刻了解革命的意义，看到革命的实实在在的好处，只有这样才能让他们发自内心地拥护革命。"
SFR_fight_til_the_end:0 "抗争到底！"
SFR_fight_til_the_end_desc:0 "检查瞄具，磨亮刺刀，筑起堡垒，挖掘战壕，在正泸根据地，所有的战士与平民都对即将到来的大战严阵以待。全面内战的炮火尚未到来，复仇的怒火却早已燃烧，且越烧越旺，这里的每一个人仍铭记着郑家的背叛与残酷的剥削，带着复仇的怒火与痛苦的记忆，我们将抗争到底，直至所有的反动派彻底灭亡！"
SFR_save_the_nation:0 "打倒反动派，解放全远乡！"
SFR_save_the_nation_desc:0 "我们怒火不息。\n\n我们为过去所遭受的背叛而愤怒，郑钧背弃了他的父亲的改革，更对本无暴力革命意愿的我们斩尽杀绝。\n\n我们为当下愈发腐朽的远乡社会而愤怒，在郑钧的反动统治下，远乡政治经济社会全面崩溃，人民甚至比郑钧上台前更加痛苦，远乡的未来几乎就要断送在这伙无能无耻无信的反动派手上！\n\n我们为无产阶级遭受过的所有不公和痛苦而愤怒，世袭罔替的贵族、囤货居奇的富豪、祸乱国家的王室、欺男霸女的乡绅……这些人为了权力打打停停，代价却全数由无产阶级承受。哪怕他们的喉舌能把稻草说成金条，他们也只能向人民许诺带领他们回到那个早已被人民恨透了的，反动派做稳了主子的旧时代。而人民想要的，一定是一个属于人民而非反动派的新时代！\n\n言尽于此，我们接下来要为人民做什么，不是呼之欲出了吗？\n\n打倒反动派，解放全远乡！"
SFR_save_the_nation_tt:0 "§R为了远乡人民的未来，为了祖国的福祉，让我们向平京前进，打倒暴君！§!"

#阵线国策 内战战时#
SFR_fh_rev_is_back:0 "远乡革命归来！"
SFR_fh_rev_is_back_desc:0 "或许我们仍然没有准备好面对内战打响的这一天，但现在我们已经别无选择。内战的枪声已经打响，若是我们再次失败，那么革命的烈火或许会就此消散，而那些吃着我们血肉的蠹虫也无法得到应有的报应。\n\n我们不能期待什么有什么人将我们拉出苦海，我们要做自己的救世主，我们要告诉全世界的压迫者们他们大限已至。\n\n远乡革命万岁！"
SFR_moblize_people:0 "动员群众"
SFR_moblize_people_desc:0 "虽然革命军队的装备和军事素养比不上国王的军队，但仍然有着无可比拟的优势——那些曾经遭受压迫的人民群众们。阵线可以动员群众加入军事行动，哪怕无法和正规军队相提并论，但是他们仍然能弥补目前存在的人员缺口。"
SFR_call_our_fellas:0 "呼唤我们的同胞"
SFR_call_our_fellas_desc:0 "阵线由于王国的背刺和镇压导致不得不远遁山林，事实上在王国控制区仍旧有数量不少的同情革命人士存在，我们的同志可以尝试说服这些进步人士为革命出一份力，也好通过募捐缓解阵线的经济压力。"
SFR_everyman_a_gun:0 "人手一把枪"
SFR_everyman_a_gun_desc:0 "自打阵线远遁山林以后，部队实际上一直处于装备不足的情况，更别提处于内战的当下。为了避免前线战士只能拿着烧火棍战斗的情况，我们将组织人手搜刮一切能找到的军营、仓库甚至是收缴土枪土炮用于支援前线。"
SFR_unite_we_strong:0 "上下一心！"
SFR_unite_we_strong_desc:0 "哪怕内战已经开始，阵线内依旧有很多不想打内战、不知道为什么打内战的群众存在。阵线将把那些遭受过迫害的工人、农民甚至是小职员组织起来，让他们在村与村之间宣传反动派的邪恶嘴脸，好让群众团结起来，知道自己的工作是有意义的。"
SFR_attention_military_discipline:0 "注意部队纪律"
SFR_attention_military_discipline_desc:0 "虽然阵线对于军队纪律的管理要比王国军队更加平等，但自打战争开始以后经常会有士兵开小差、不尊重群众等等情况的报告。为了强调部队纪律，阵线将引入一批政工干部进入前线部队，了解并解决实际上会出现的纪律问题。"
SFR_rev_death_squad:0 "革命的敢死队"
SFR_rev_death_squad_desc:0 "不论我们的思想多先进、政治多平等，客观存在的军事技术差距不会因为这些东西而被抹去，任何想要攻克敌人阵地的行为都会带来不小的伤亡。\n\n前线的指挥官提出一个想法，将机动火力组织为敢死队，以敢死队为尖刀分割敌人的防线，再让后续部队进行包围剿灭。虽然这样做的代价会减少部队的防御能力，但对于急需打破僵局的战线来说，这也无法避免的事情。"
SFR_beg_everything_we_got:0 "赌上我们的一切..."
SFR_beg_everything_we_got_desc:0 "随着阵线和王国的拉锯进入最煎熬的时刻，再怎么乐观的人也无法否认阵线陷入了比当初更危险的境地，阵线的根据地里弥漫着厌战与绝望的情绪。我们必须投入我们能动员的一切力量打破僵局，否则失去热情的革命不过是一摊灰烬。\n\n工人与农民早就受够了痛苦和屈辱，他们除去枷锁与愤怒以外一无所有，正如革命阵线一般毫无退路。我们拥有赌注的不过是热血与生命，而我们要得到的是整个世界的解放。"
SFR_destory_the_tyrrant:0 "...誓要消灭那暴君！"
SFR_destory_the_tyrrant_desc:0 "我们的父辈在国王与权贵的枷锁下受尽折磨，那些虫豸享受着民脂民膏，却只给饥饿的大众留下皮鞭与暴行。而现在那些压迫者们拿起武器反对我们，誓要把我们的自由与希望关进牢笼。\n\n但我们绝对不会止步不前，因为我们是那些被剥削者的希望，我们的革命是真正的革命，我们要创造的是属于大众的历史。\n\n§t为了你与我，为了摧毁这个暴力与苦难铸造的旧世界，革命阵线万岁！§!"

#阵线国策 内战战后#
SFR_rev_return_victory:0 "革命阵线凯旋！"
SFR_rev_return_victory_desc:0 "远乡王国的内战以最不可能的结局告终，任凭谁都不能想到逃窜到山林间的游击队仅凭十数年时间就能将装备精良的王国军击溃，以势不可挡的状态结束了远乡的混乱局面。在广大人民群众的支持下，革命阵线最终扫清了成建制的反动派势力，\n\n我们要向全世界宣告，属于暴君和蠹虫的年代已经过去，新世界的太阳已然升起。"
SFR_stabalize_sit:0 "稳定南远乡局势"
SFR_stabalize_sit_desc:0 "虽然名义上革命阵线已经完全控制了远乡结束了内战，但我们控制区只局限在南远乡，北方依旧有反动派对我们虎视眈眈，只因现实情况才阻止他们不向我们发动袭击。更别提战争结束后依旧混乱的南远乡局势，那些隐遁在山林的溃兵、城市中的反对派以及在诸多在战争中受损严重的乡村都是我们当前需要处理的问题。"
SFR_handle_reactionary_army:0 "处理反动派军队"
SFR_handle_reactionary_army_desc:0 "在内战结束以后，那些曾经参与过王国军和青山军的投降军队就成了烫手山芋，这些有丰富经验的老兵们如果无法好好安置，那么不过是一桶等待引燃的炸药。\n\n革命阵线的干部为此进行了大大小小的争吵辩论，各方选择都有着看似合理与真确的理由，不论是提议整编、劳改甚至是全部枪毙，最后的选择权还是在阵线最高层的手中。"
SFR_count_equipments:0 "应对匪患"
SFR_count_equipments_desc:0 "那些没有被我们击溃或者向我们投降的反动派军队大多因各种各样的理由而溃散，但依旧有相当数量的溃兵选择成为土匪过活，这些亡命徒的存在是对邻近村庄与交通线路的威胁，为了保护民众安全与国有资产，我们必须要对这些匪徒重拳出击。"
SFR_clean_mil_fac:0 "清理军事机构"
SFR_clean_mil_fac_desc:0 "在处理完投降部队和溃军匪徒以后，就该思考如何处理那些留下来的职业军官了。这些军官大多数没有直接参与对抗革命阵线，但也并未有支持阵线的行动，大多只是一些中间派与墙头草。阵线对于他们的处理意见分为了旗帜鲜明的两派，一派认为这些军官的军官团风气和对革命的冷眼相待的情况下，吸纳他们只会成为军队里新的破坏分子；而另一派则认为在缺少军官经验的当下，吸纳这些经验丰富的老兵无疑能促进军队经验的改善。\n\n对于阵线来说，军事素养可以在战斗和训练中培养，但是对于革命的热忱却不是一朝一夕就能养成的，如果不能建立一支从心底拥护革命的军队，那和王国军有什么区别。与其让这些墙头草进入军队里毒害其他人，倒不如全部收拾干净再另起炉灶，免得让那些旧社会的恶习进入军队。"
SFR_integrate_part_mil_fac:0 "部分整合军官团"
SFR_integrate_part_mil_fac_desc:0 "在处理完投降部队和溃军匪徒以后，就该思考如何处理那些留下来的职业军官了。这些军官大多数没有直接参与对抗革命阵线，但也并未有支持阵线的行动，大多只是一些中间派与墙头草。阵线对于他们的处理意见分为了旗帜鲜明的两派，一派认为这些军官的军官团风气和对革命的冷眼相待的情况下，吸纳他们只会成为军队里新的破坏分子；而另一派则认为在缺少军官经验的当下，吸纳这些经验丰富的老兵无疑能促进军队经验的改善。\n\n对阵线来说，目前触手可及的变化远比遥不可及的未来更有价值，我们可以尝试拉拢、说服那些旧军队的军官加入革命当中，可我们却无法在短时间里建设一支专业化、正规化的军队。革命确实需要纯洁与理想，但是革命更需要的是从四面包围中活下来，单纯的理想和热忱保护不了革命。"
SFR_judge_the_crime:0 "审判罪行"
SFR_judge_the_crime_desc:0 "在处理完其他事宜以后，我们终于可以把目光放回那些在内战中正面对抗阵线的将领了，那些手上留有血债的家伙们已经被就地正法，剩下来的大多需要从法庭上走一遭。至于最后的判决结果……只能看阵线领导层的想法了。"
SFR_take_over_cities:0 "接管城市"
SFR_take_over_cities_desc:0 "在内战结束的当下，恢复城市的正常运转成了我们要恢复全国局势的第一步，如果不能让城市正常运转，那么它只是一个需要我们无底线投入资源的黑洞。部队不能长时间负责城市的市政职能，阵线得要派遣政工干部接手前政权遗留下来的政治机器，并且恢复正常的城市秩序。"
SFR_ensure_food_supply:0 "保障粮食供应"
SFR_ensure_food_supply_desc:0 "城市的定位决定了城市本身无法依靠当地粮食生产完成自给自足，日常粮食消耗大多来自于不同农村的产出，而在内战时的戒严与道路封锁导致了当下城市的粮食储备即将告急，而各路粮食投机商也在加紧囤积粮食待价而沽。\n\n如果阵线想要彻底补齐城市粮食缺口，除开从根据地调运富余粮食以外，还需要通过行政手段稳定粮食价格。无论是通过统一抛售大量粮食稳定物价，还是将那些投机商全部枪毙。"
SFR_liquidation_of_the_reactionaries:0 "对反动派清算"
SFR_liquidation_of_the_reactionaries_desc:0 "如何处理各路工厂主、企业主等等群体，便是稳定城市需要面对的一个麻烦。阵线右翼认为我们需要团结大多数“民族资本家”，他们认为贸然清洗控制工厂企业的资本家会打乱原本的生产秩序，破坏城市恢复正常运行，阵线需要的是接纳并约束他们。但是在阵线左翼看来，所谓良善的中间派工厂主、企业家的手上都没少沾工人的血泪，哪怕他们再怎么用所谓慈善当作挡箭牌，也无法遮掩他们系统性压迫工人的行径，不完全清算他们便是对革命的背叛。\n\n给所谓民族资本家仁慈确实不错，可谁能让那些过劳而死、因工而亡的工人们起死回生？他们本就是吃着反动秩序的恩惠才能壮大自身，并不会因为好言相劝就会自己反对自己，只会不停地想要恢复旧秩序。阵线将一一清算这些民族资本家所犯下的恶行，阵线会补偿他们的损失，只要他们没有犯下不可饶恕的罪孽；但如果有……那么等待反动派的只有人民的审判。"
SFR_liquidation_of_the_reactionaries_tt:0 "§2这会为后来的事情埋下伏笔。§!"
SFR_accept_national_cap:0 "接纳民族资本家"
SFR_accept_national_cap_desc:0 "如何处理各路工厂主、企业主等等群体，便是稳定城市需要面对的一个麻烦。阵线右翼认为我们需要团结大多数“民族资本家”，他们认为贸然清洗控制工厂企业的资本家会打乱原本的生产秩序，破坏城市恢复正常运行，阵线需要的是接纳并约束他们。但是在阵线左翼看来，所谓良善的中间派工厂主、企业家的手上都没少沾工人的血泪，哪怕他们再怎么用所谓慈善当作挡箭牌，也无法遮掩他们系统性压迫工人的行径，不完全清算他们便是对革命的背叛。\n\n革命者需要的不只是一腔热血，还有能够面对冰冷现实的决心。我们是因为那些被压迫者的支持才能走到今天，可当下阵线需要面对的是更冷酷的选择——如何更快的恢复城市生产秩序。贸然清算那些随大流的工厂主和企业家只会引起不必要的反抗，吸纳那些民族资本家的确会让真的有血债的反动派逃过审判，但比起我们能获得的收益来说是能够接受的选择。"
SFR_integrate_remaining_rev:0 "整合残存革命党"
SFR_integrate_remaining_rev_desc:0 "直到现在，我们才有机会重新接触那些失散在敌占区的革命党同志，这些同志们在敌占区仍然保持着活跃，为革命阵线的敌后工作打下了坚实的基础。只是在反动派的镇压下，这些同志们失去了原来的党组织，愿意服从革命阵线的调剂，如果利用好他们的能力对阵线来说可是不小的帮助。"
SFR_help_the_countryside:0 "援助乡村"
SFR_help_the_countryside_desc:0 "除开革命阵线的根据地，绝大多数远乡农村不论是从基础建设上还是政治结构上来说，依然处于工业革命前的落后状态。没有科学的医疗服务、没有合适的基础教育更没有工业化的耕作设施。\n\n如果我们要改善这种情况，需要将那些有经验的人员调去乡村的援助工作，为他们带来最为基础的基础建设。"
SFR_expand_base_org:0 "扩大基层组织"
SFR_expand_base_org_desc:0 "乡村的基层组织大致可以分为几种情况：由大地主控制的事实上已经封建化的地区、由宗族控制的地区、由农村互保组织发展而来的暴力结社等等组织，在王国内战前的基层管理往往要依靠这些……有活力的民间组织来保证乡村稳定。\n\n如果我们想要在乡村有所作为，那么扩大基层组织是无法避免的事情，可以预见的是在基层组织完成人员扩张以前，任何想要在农村实施的政策都会遭到前所未有的阻力。"
SFR_overhaul_of_the_body:0 "大换血"
SFR_overhaul_of_the_body_desc:0 "基层干部遇到的另一个麻烦便是王国前遗留下来的政府班子，在内战前王国的乡村基层组织已经几乎停摆，任何从外界来的官员要么被当地势力架空要么就和当地同流合污，如果我们要重建乡村镇府的话，那就无法避免处理这些前政权遗留下来的残余。\n\n客观上来讲这些基层人员大多有着丰富的行政经验，但是他们对于阵线的乡村改革措往往有着或明或暗的抵触情绪，再加上基层同志们所找到的贪污证据与镇压农民的前科，将他们从现有的岗位上清理掉或许是一种好选择。"
SFR_remain_partial_fac:0 "保留各地行政机关"
SFR_remain_partial_fac_desc:0 "基层干部遇到的另一个麻烦便是王国前遗留下来的政府班子，在内战前王国的乡村基层组织已经几乎停摆，任何从外界来的官员要么被当地势力架空要么就和当地同流合污，如果我们要重建乡村镇府的话，那就无法避免处理这些前政权遗留下来的残余。\n\n虽然这些基层人员大多因为现实原因和乡村上的地头蛇同流合污，但我们也不能放弃他们老道的行政经验与农村关系，更别提一股脑将其全部更换所产生的危害。对阵线来说让一群有经验的人引进门，总好过两眼一抹黑踩着石头过河。"
SFR_early_land_reform:0 "初期土改工作"
SFR_early_land_reform_desc:0 "在完成行政机关改造和基层组织扩编以后，我们终于可以腾出手来开始土地改革工作，除开为乡村农民提供基础设施与农业工具以外，另一个需要面对的问题便是如何处理那些兼并了大量土地的地主与团体，乡村改革的进度因为他们的存在而迟滞不前。\n\n只是远乡的乡村太多了，多到哪怕是现在远乡的资源都无法完全覆盖这些地区，将土地改革覆盖到所有区域的开销已经远超阵线目前的能力，以至于有些人提议是否要放缓土地改革，从而把更多资源转移到其他更为要紧的项目上去。"
SFR_fate_of_royal:0 "王室的命运"
SFR_fate_of_royal_desc:0 "在暂且稳定了各方局势以后，我们终于可以分心去处理被我们俘虏的远乡王室。阵线的每个人都有如何处理这些王室的观点，但每种想法都有着不同优势和缺陷，没有人能完全说服另一种观点的支持者，最后抉择权丢到了革命阵线高层的手中。\n\n论审判如何进行，阵线那场惨烈的背叛终于完成了清算，是时候向着未来与理想前进了。"
SFR_front_grand_meeting:0 "革命阵线大会"
SFR_front_grand_meeting_desc:0 "随着内战后的逐渐恢复，围绕在南远乡头顶的战后阴云终于被戳破，不论是在黄土间劳作的农民还是在工厂中挥汗的工人，他们终于不用再为了该如何活下去而苦恼。我们的理想此时离我们仿佛只有一步之遥，只需伸出手便可以触及。\n\n只是这个理想，是属于谁的理想？\n\n革命阵线本身就是共产党与革命党在反动派压力下而联合的大帐篷，在内战前两方的矛盾便已经有所显现，更不论在内战结束以后的不同政策之间的矛盾冲突，以及愈发激烈的意识形态分歧。\n\n不论是谁都无法否认，阵线的矛盾已经摆到台面上，不论左翼革命党与改革派如何调和，都无法在私底下完成和解。最后，他们只得把阵线的命运交给了革命阵线大会，让大会决定是哪一方能够在其中占据优势，从而领导全局。\n\n每个人都在摩拳擦掌，没有人会轻易放弃来之不易的胜利，誓要将革命的果实以自己理想的样貌塑造。"
SFR_front_grand_meeting_tt:0 "§C革§!§R命§!代表齐聚一堂，§C阵§!§R线§!的命运就此§t敲定§!。"

#阵线国策 全国统一#
SFR_new_revolution_wave:0 "崭新的革命浪潮！"
SFR_new_revolution_wave_desc:0 "我们完成了对南远乡旧社会的初步整合，革命阵线大会的成功召开也宣告了新征程的到来，在远乡的地图上方竖立着三座大山：军阀、封建王室和人鱼资本家，这三座大山折磨着远乡人民，大会的每个同志都热烈的期盼着接下来的行动，战士们已经磨砺好刺刀，我们将扫平北方的反动派们，远乡的解放在此一举，让革命的巨浪不断的增长吧！"
SFR_free_the_northwest:0 "解放西北"
SFR_free_the_northwest_desc:0 "西北特别行政区，由东巴斯蒂亚大战后受前远乡王国命令，由地方军队组建起的军政府。通过军事手段维稳西北地区，其本质是一个拥有国家的军队，那里由军头和黑市贩子依靠对西北人民敲骨吸髓来发展。\n\n但内战撕裂了通讯网络，距离西北地区上一次跟平京的联系已经过了很久，同志们也对西北地区的具体情况也知之甚少，我们理应先派遣情报人员了解那的具体情况，为解放西北做足准备。"
SFR_revolutionary_remnants:0 "革命党残部？"
SFR_revolutionary_remnants_desc:0 "令人惊讶的是原西北特别行政区已经被一股更加进步的势力取代，他们是西北地区革命党残存的同志们，他们躲过了上一次起义失败的倒算，并且统一了西北地区。意识形态相似的情况下，我们可以尝试跟他们交流一下，或许能兵不血刃地和平解放西北。"
SFR_revolutionary_remnants_tt:0 "§C我们会向统一西北的残存革命党派出橄榄枝，希望他们领情。§!"
SFR_talk_about_unification:0 "会谈统一事宜"
SFR_talk_about_unification_desc:0 "我们跟西北残存的革命党同志交流十分顺利，他们跟我们秉持着相同的理念，就“和平实现西北地区回归”一事进行谈判，接下来我们与他们需要好好交流统一后的军队改造和物资供应了。"
SFR_talk_about_unification_tt:0 "§C会谈开始了，希望他们能接受我们的条件。§!\n§R否则，我们别无他选，只能...§!"
SFR_only_one_battle:0 "唯有一战"
SFR_only_one_battle_desc:0 "我们的情报人员对西北特别行政区的现有环境进行了详细的调查，结果让我们必须做出以武力解放西北地区的决定。现如今应该让大炮同志发言了，兵工厂的最新一批装备已经搭上通往前线的铁路线，下令吧同志！"
SFR_prepare_war_northwest:0 "备战西北"
SFR_prepare_war_northwest_desc:0 "武力解放西北对于刚刚组建的工农红军同志而言是一场大考，西北地区是十分复杂的地区，我们要搞清楚谁是我们的敌人，谁是我们的朋友，一场对全军的动员大会是解放西北的前提，也是对干部同志们的考验。"
SFR_integrate_northwest_gov:0 "整合西北政府"
SFR_integrate_northwest_gov_desc:0 "我们与西北地区的革命党同志的谈判十分顺利，接下来我们会派遣阵线里有经验的同志去西北，与西北特别行政区的同志交接政府，他们将加入我们为革命事业发光发热，西北急需的物资已经装上列车，致我们共同的未来！"
SFR_integrate_northwest_gov_flag:0 "会谈成功结束！"
SFR_march_to_northwest:0 "向西北进军"
SFR_march_to_northwest_desc:0 "西北已经分裂多年，其内部的分离主义猖獗，战机一触即发。战士们修整完毕，已经在边境线聚集，各级指挥也准备完毕，物资补给完备，阵线政治部已发布动员令，口号：打下海清城，解放大西北！"
SFR_recruit_ambitious_people:0 "吸纳有志之士"
SFR_recruit_ambitious_people_desc:0 "除了吸纳西北政府的革命党同志外，一些党外进步人士和军官亦是我们可以团结的对象，他们比起我们更了解西北的情况，这为我们重建提供巨大帮助，同时西北的地理环境也提供了优秀的练兵环境。"
SFR_rebuild_northwest:0 "重建西北地区"
SFR_rebuild_northwest_desc:0 "我们完成了对西北地区的解放，西北因东巴斯蒂亚大战导致常年受天灾、人祸和水源短缺的影响，我们的目的不仅仅是在地图上占格子，我们还要让人民群众过得好，要重建那里的秩序。\n\n革命不止是把旧牌匾砍碎就行了，还要建立新的，不能让伤口继续留疤，要抚平和治好，让人民群众知道不是换了新主人，而是他们成为了自己的主人。"
SFR_free_the_north:0 "解放北远乡"
SFR_free_the_north_desc:0 "在消灭了南部的反动派与保王党政权的现在，是时候将视角投向国家的北方了。无论如何，远乡必将重新统一——红旗之下。"
SFR_investigate_north_situation:0 "调查北方局势"
SFR_investigate_north_situation_desc:0 "北远乡是一个混乱程度不亚于南部的地方，人鱼、旧贵族、保王党和革命者在此地盘根错节。既然我们已经决心终结北方乱局，那么，首当其冲的任务便是收集并分析当地情报，判断态势发展情况，并做出相应处理。"
SFR_contact_free_alliance:0 "联络自由联军"
SFR_contact_free_alliance_desc:0 "令人振奋的是，哪怕困难重重，远乡自由联军仍然在北方坚持作战至今。那么现在就正是一个将国家南北革命同志团结起来的好机会，我们将公开与自由联军领导层进行接触，努力促进两方的整合与合流。"
SFR_intervene_in_civil_war:0 "介入内战"
SFR_intervene_in_civil_war_desc:0 "自由联军正式接受了我们的提议，避免了革命战士之间的流血冲突，那么是时候帮助我们的同志彻底平定北方了。多年来，王室和贵族阶层在北方长期对远乡人民施加着残酷的压迫与野蛮的独裁统治。现在，他们将体会到这长久暴政带来的革命所具有的力量。"
SFR_prepare_north_war:0 "准备北方战争"
SFR_prepare_north_war_desc:0 "客套话、口头协议和几张文件是无法将整个远乡北部从反动派与革命敌人手中解救出来的。最终，统一还是要靠在战场上决出胜负。为了不可避免的战斗，必须提前做好军事准备。"
SFR_no_other_choice:0 "别无他选"
SFR_no_other_choice_desc:0 "与自由联军的接触是一次完全的失败，许多人坚持本有更好的选择和办法来避免双方的冲突，但恐怕乐观主义无法改变南北无法达成共识的现实。\n\n既然善意与话语无法打动人心，那么就只有一种选择了……"
SFR_integrate_free_alliance:0 "整合自由联军"
SFR_integrate_free_alliance_desc:0 "随着北方的战事平息，我们终于能够彻底将远乡南北在同一个政府和框架下重新整合为一个统一的政权了。当然，一场联欢会也是必不可少的。"
SFR_integrate_free_alliance_flag:0 "§C自由联军接受了我们的要求！§!"
SFR_unite_leftists:0 "联合左翼分子"
SFR_unite_leftists_desc:0 "北方在长久的贫困与失败管理下滋生的大量的土匪强盗和行政上的难题。如果只是简单的采取强硬措施来恢复北方的秩序，不但在效率和成果上会大打折扣，其速度会后果也是个问题。\n\n然而，事情也没那么悲观。在北远乡本地，同情或支持革命事业的左翼群体也广泛存在。通过与他们进行合作和整编，我们能够尽快保持北远乡的稳定并展开重建工作。\n\n当然了，有时候对于“左翼分子”的定义可能会有点……过于宽泛。不过哪怕是凶恶的土匪，在走投无路前，也只是淳朴的民众…对吧？"
SFR_last_reactionary_in_rural:0 "远乡最后的反动派"
SFR_last_reactionary_in_rural_desc:0 "令人惊讶的是，哪怕南方的王国政权已经垮台，在远乡北部仍然有人试图维护他们无能腐化的旧秩序。这些过去作为作福的贵族和暴君看起来还相当骄傲于自己是“远乡最后的反革命”，在北方山林间坚持自己必然失败的叛乱。\n\n革命政府有义务为他们上一堂文化课，“最后的反动派”的意思是：他们孤立无援、后继无人，而且注定沦为历史角注。"
SFR_end_them:0 "终结他们！"
SFR_end_them_desc:0 "从某种意义上，北边的这些反动派确实也挺值得敬佩，他们竟然有如此的决心来，进行这样一场无耻的失败活动，并且还能坚持到现在。要是他们能把这种决心去做点别的事情，说不定会更好，因为现在革命事业将跨过界河，彻底结束这场滑稽的闹剧。"
SFR_judgment_day:0 "审判之日"
SFR_judgment_day_desc:0 "胜利！\n\n同志们，远乡最后的反动堡垒已经垮塌！过去那些高高在上自以为是的贵族，现如今要么仓皇逃窜，要么束手就擒。但我们不仅带来了革命的胜利，还将带来革命的正义。希望这些反动派在审判席上还能回想起自己以前是如何作威作福的，证明那些罪行的证据从来不会嫌多。"
SFR_solve_mermaid_problem:0 "解决人鱼问题"
SFR_solve_mermaid_problem_desc:0 "又是一个旧王国为革命阵线留下的烂摊子。\n\n东北的这片所谓特别行政区，最初宣称是为了建立起人鱼和远乡之间进行贸易的通道。但事到如今，这里已经变成了一个充满剥削和种族冲突，并且对远乡的主权毫无尊重的殖民政府。\n\n这一耻辱的象征必须被完全而彻底的处理掉，绝无回旋余地。"
SFR_no_room_for_negotiation:0 "没有余地的要求"
SFR_no_room_for_negotiation_desc:0 "虽然我们可以直接采取军事行动结束盘踞在东北地区的这一殖民政权，但是更好的办法是先将远乡人民的正当诉求完整传达给人鱼方面并要求他们照做。如果对方识时务的话，我们能够避免更多无谓的流血，以和平的方式收复特区。\n\n要是他们不想体面地结束冲突，那我们的备用方案随时可以重新启用。"
SFR_only_solution:0 "唯一的解决方案"
SFR_only_solution_desc:0 "不存在其它可能性，所谓的人鱼特别行政区当局对革命阵线抱有着极大的敌意，并且显而易见的是，他们不可能放弃那些不正当的特权。有鉴于此，唯一且最终的解决方案就是有请枪炮发言，阐述并兑现我们的诉求。"
SFR_integrate_special_zone_gov:0 "整合特区政府"
SFR_integrate_special_zone_gov_desc:0 "既然人鱼同意了将特别行政区的主权重新归还给远乡政府的要求，那么是时候进行进一步的整合，消除这一人造边境线带来的分歧了。"
SFR_prepare_landing_war:0 "准备登陆战！"
SFR_prepare_landing_war_desc:0 "或许人鱼们存在着一种幻想，那便是他们能够继续在群岛上继续顽抗，迫使革命阵线，因为无法跨过海峡而不得不坐下和谈。\n\n这真是大错特错。同志们，从潮宁出发，岚津就在对岸等着我们，让我们把这些人鱼从那片海里来的就赶回那片海里去！"
SFR_requisition_mermaid_assets:0 "收缴人鱼资产"
SFR_requisition_mermaid_assets_desc:0 "既然局势已定，那么是时候把注意力重新转回内部管理上了。特区政府在他们存在的日子里捞取了太多不属于他们的非法资产，这些产业必须被全部收缴并归还给真正的主人。在这之外，一些讨厌的地名也得改回原来的样子。"
SFR_rebuild_north_rural:0 "重建北远乡地区"
SFR_rebuild_north_rural_desc:0 "白洋公约留下的殖民政府轰然倒塌，从北镇到万秀的山林间再也见不到一个匪帮或盗匪，昔日耀武扬威的特权阶级如今只出现在审判记录或通缉令上。远乡北部如今只剩下了革命阵线的旗帜与人民自己的政府，这片土地和他的人民将会从战乱的废墟与荒芜中复苏，并重建一个更美好的家园。自此以后，人民会牢牢掌握他们自己的命运。"
SFR_unify_the_nation:0 "统一全国！"
SFR_unify_the_nation_desc:0 "我们做到了，整个远乡如今皆由革命阵线掌控！过去的分裂和动荡消失不见，并且永远不会回归，这是我们的敌人和王国永远也做不到的成就。\n\n革命阵线仍然有很多工作要完成，很多烂摊子还没能够处理，很多问题还没有被解决。但现在，同志们，让我们一起庆祝吧！革命证明了自己！"
SFR_unify_the_nation_tt:0 "§C祖国重归一统。§!"
SFR_national_census:0 "全国普查"
SFR_national_census_desc:0 "在内战和革命的拉锯中，许多地方陷入混乱，无数民众流离失所。结果就是，革命政府现在甚至不确定整个远乡到底还有多少人口，分布在哪里。这个问题必须立刻得到解决，要向远乡的每一个地区派出统计员，深入每一个城镇和乡村，搜集所有的名字，再将它们登记在统一的结果中。"
SFR_build_new_local_gov:0 "组建新地方政府"
SFR_build_new_local_gov_desc:0 "旧的政府轰然倒塌之后，远乡许多区域陷入了一种不至于陷入彻底混乱，但也没有任何管理和统治的无政府状态下，情况好一些的也只是靠着旧政府的些许残余勉强维系。如果革命阵线希望自己真的能够代表整个远乡，并且治理和解放整个远乡，那么，在地方上重建一整套新的管理机构、任命新的官员就是必须的。"
SFR_rebuild_local_order:0 "重振地方秩序"
SFR_rebuild_local_order_desc:0 "昨日的小偷没人去查、街上的流氓没人去抓、不知主人的违章建筑横在路上、工厂里的机器没人维修、部门里的条例不清不楚，甚至政府公务员走在路上被偷了钱包……\n\n社会秩序的混乱和崩溃体现在方方面面，若是不加以注意和遏制，那么就会像伤口一样化脓并腐烂。我们要向远乡人民和世界证明，革命阵线，不但能推翻旧的秩序，而且能够用新的革命的秩序取代它。"
SFR_rural_finally_liberated:0 "远乡，终得解放"
SFR_rural_finally_liberated_desc:0 "任它经年累月、任它残酷迫害、任它血腥镇压，反动反革命势力照样迎来了彻底灭亡。解放的曙光已经照在了整个远乡的大地上，并且它不准备熄灭、不准备落下、不准备离开。\n\n远乡得到了解放，这胜利不会被遗忘。\n\n现在，同志，放松一下吧，明天就要到来了。"
SFR_raise_the_flag:0 "升旗"
SFR_raise_the_flag_desc:0 "王室的旗帜，反动派的旗帜从每一处落下，目光所及的每一个人都热情洋溢的挥舞着远乡的新气质，一面能够代表人民自己的旗帜。共和国的国旗在每一处冉冉升起，阴影中的怨恨与敌视推不倒它，烧不尽它，革命阵线的旗帜在它发誓代表与为之奋战的人民簇拥下高高飘扬，俯视着那些被它打倒，扫入尘埃的反动派们。\n\n而我们要让红旗永远伫立于此。"
SFR_raise_the_flag_tt:0 "将成立§t远乡人民民主共和国§!。"

#阵线国策 统一后 农 政治线
SFR_nation_of_people:0 "人民之国"
SFR_nation_of_people_desc:0 "远乡终于统一了。旧时代的旗帜被降下，反动派不再能继续压迫人民，而曾经只能在偏僻的角落里低声谈论的理想，如今第一次被写进了国家的名号之中。对许多人而言，这一天来得太晚了；但无论如何，牺牲者的鲜血没有白流。\n\n不过，随着胜利到来的却是新的问题。革命阵线曾是战争年代的必要产物，它团结了不同党派、游击队、地方公社和临时政府，可它终究不是一个能够长期治理全国的中央机构。我们需要新的政府、新的法令、新的部门，以及一套井然有序的国家机器。\n\n或许，是时候重新审视革命阵线的必要性了…"
SFR_nation_of_people_tt:0 "§Y这会移除重建南远乡时期的修正。§!"
SFR_our_career_is_over:0 "事业已竟"
SFR_our_career_is_over_desc:0 "革命阵线议会曾在最艰难的岁月里维持了各派之间的联系，也为远乡革命保存了最后一点合法性。可时至今日，许多仍坐在议会席位上的人早已离开一线太久：他们中有人年迈到无法出席会议，有人只剩下过去斗争年代的名望，甚至还有一些人的名字，已经只能在讣告和纪念册里见到了。\n\n他们仍会为“革命的本意”“共和的原则”或是几十年前未能实现的方案争得面红耳赤，但这些争论很少再能落到实际工作中。新远乡需要的是能执行政策、承担责任、处理现实问题的中央政府，而不是一个象征意义大于实际作用的旧时代遗产。既然阵线议会已经完成了它的历史使命，我们就必须认真考虑它最后的归宿。"
SFR_our_career_is_over_tt:0 "§R革命已经取得了第一阶段的胜利，阵线议会已经不再具备其实际意义。§!\n§C解决这个问题可以巩固我们的统治。§!"
SFR_reward_and_stabilize:0 "酬功维稳"
SFR_reward_and_stabilize_desc:0 "显然，我们不能一口气叫老顽固们全都滚蛋。那些曾在革命阵线中出力的人，无论如今是否仍适合站在台前，都曾在不同阶段为革命承担过风险。我们应当给予他们应有的荣誉、待遇和位置，让他们知道新国家不会忘记过去的功劳。\n\n但这也只是权宜之计。随着新的中央政府逐步成形，真正能够执行政策、联系群众、推动建设的干部必须得到更多机会，而那些已经不再适合承担实际工作的旧人物，只能在相对的体面中逐渐退到次要，甚至无实权的位置。这或许会引来一些猜疑，甚至让某些人认为自己正在被清算，可新远乡需要的是稳定的未来，而不是无休止地照顾每一个“老革命”的情绪。"
SFR_ensure_control:0 "确保控制"
SFR_ensure_control_desc:0 "革命阵线的历史使命正在结束，不过正是因为如此，我们才需要在过渡时期保持对内部的控制。残余派系仍然存在，若不能妥善控制，他们完全可能在新政府成形前制造不必要的阻力，这是我们万万不希望看到的。\n\n我们必须确保阵线内部的权力交接按照既定方向进行，同时开始筹备真正属于新远乡的工农代表大会。未来的大会将不再只是大帐篷阵线的象征，而会成为连接全国各地的新制度框架。不过，关于它是否应当更多接受中央引导，还是多数交由人民决断，这个问题很快就会摆到我们面前。"
SFR_persuade_old_hardliners:0 "对付老顽固"
SFR_persuade_old_hardliners_desc:0 "即便革命已经胜利，阵线内部仍有不少人希望把远乡带回一条更温和的道路上去。他们相信南巴斯蒂亚式的改良资本主义才是现实选择，认为新远乡应当向他们学习，比如高度的市场经济，代议制等，再用渐进改革慢慢修补社会。这样的想法并非凭空而来：革命阵线本就由共产党与革命党共同组成，而世界上许多革命者最终也选择了类似路线，更何况阵线里相当一部分干部本就有过南巴留学或避难经历。\n\n但远乡现在的情况已经不同了。那么多年的游击战争，人民无法接受简单的改良主义，赵永军主席领导下的新远乡也不能在最关键的时候开倒车。我们需要说服、安置、孤立他们，必要时也可以进行组织调整，眼不见为净。手段可以温和，可以谨慎，也可以直接出重拳，但问题必须尽快得到处理。"
SFR_dissolve_front_parliament:0 "解散阵线议会"
SFR_dissolve_front_parliament_desc:0 "今日之后，革命阵线议会将正式结束它的使命。这个曾在战争年代维系团结、保存革命火种的机构，已经无法继续承担新远乡的治理工作。它的功绩会被铭记，它的争论也将留给后人决断。"
SFR_dissolve_front_parliament_tt:0 "§C一个时代的落幕，另一个时代的开始。§!"
SFR_all_power_to_workers_and_peasants:0 "一切权力归于工农！"
SFR_all_power_to_workers_and_peasants_desc:0 "远乡共产党是工人的党，是农民的党，也必须是千千万万普通百姓的党。新远乡的权力来源不该落入那些自诩清醒、却从未真正走进田地与工厂的“文化人”手中——何况他们也未必真的有文化。许多人会谈理想，会写文章，会把人民挂在嘴边，可他们未必真的理解人民的生活。\n\n工农代表大会必须首先属于工农。来自矿场、村庄、工厂、兵营和各地基层委员会的代表，才应当成为共和国制度的根基。只有这样，新的大会才不会变成少数精英互相辩论的舞台，而会成为人民参与国家建设的真正渠道。远乡的未来，自当由亲手重建远乡的人来决定。"
SFR_all_power_to_workers_and_peasants_tt:0 "§R远乡的政府权力应当完全来源于我们的人民！§!\n在§P工农代表大会§!成立的时候，新增派系§9工农派§!，§q削弱§!§c改革派§!和§C各地民主党派§!的影响权重。"
SFR_national_assembly_proposal:0 "国民议会提案"
SFR_national_assembly_proposal_desc:0 "工农代表大会将成为共和国权力的核心，但新远乡的未来需要能团结整个远乡社会。各地仍有许多有影响力的地方人士、社会贤达、技术专家和民主党派成员，他们未必适合进入国家权力中枢，却同样掌握着地方经验、人脉资源与专业能力。若将他们全部排除在外，只会制造新的隔阂。\n\n为此，我们将通过关于成立国民议会的提案，作为工农代表大会之外的协商机构。它不会取代人民的权力，也不会削弱党的领导，而是为各地民主党派、社会精英和地方代表提供一个参与国家事务的渠道。我们需要团结每一个愿意为新远乡出力的人，只有让更多人参与建设，远乡才能真正走向更好的未来。"
SFR_national_assembly_proposal_tt:0 "§C我们会着手成立国民议会，吸纳各地民主党派，地方有力人士。§!\n在§P工农代表大会§!成立的时候，新增派系§A远乡社会党§!，§t增强§!§c改革派§!和§C各地民主党派§!的影响权重。"
SFR_establish_workers_and_peasants_congress:0 "成立工农代表大会"
SFR_establish_workers_and_peasants_congress_desc:0 "今日，远乡将建立一个过去从未存在过的机构。它不属于旧王室，不属于贵族院，也不属于那些只在纸面上谈论人民命运的空洞议会。工农代表大会将由来自全国各地工厂、乡村、军队、矿区与基层委员会的代表共同组成，成为远乡人民民主共和国新的政治核心。\n\n在过去一段时间里，围绕新制度的争论曾让共和国陷入不安。有人担心权力过度集中，有人害怕地方声音被忽视，也有人试图借机保存旧时代的影响。但随着改革逐步推进，局势终将缓和，新的秩序也会在一次次磨合中稳定下来。\n\n从今天开始，革命进入新的阶段。远乡人民不再只是被动等待命令的臣民，也不再只是战争年代被动承受苦难的百姓。他们将通过自己的代表参与国家建设，监督政府运行，并把革命的理想带入千家万户之中。远乡的历史将从此进入一个新的阶段，让我们走向更美好，更平等的未来！"
SFR_establish_workers_and_peasants_congress_tt:0 "解锁§P工农代表大会§!机制。\n在§P工农代表大会§!中，不同派系的§Y影响力§!和§Q支持度§!共同组成了其能对远乡产生的§k影响§!，同时，我们还需要他们的§Q支持度§!从而通过§n议案§!。"
SFR_start_land_reform:0 "开始全国土改"
SFR_start_land_reform_desc:0 "土地问题是新远乡所面临的首要问题。早在南远乡内战时期，革命阵线就已经在解放区推行过初步土改；后来北方与西北相继解放，各地也陆续开始清算地主，富农，建立农会与地方公社。尤其是在南方，不少公社已经能够正常运转，至少让农民第一次摆脱了地主、债主和旧官吏的层层压迫。\n\n但这些工作远远谈不上完成。战事紧迫，许多地区的土地改革仍停留在初级阶段，旧地主究竟应当如何安置，过去的租债是否全部作废，自留地该保留多少，机械化农场又该如何在缺乏可用设备的情况下推行，这些问题都留到了全国解放再行讨论。\n\n如今，工农代表大会已经成立，全国范围内的土地改革终于有了统一执行的制度基础。我们不能再依靠各地自行摸索，也需要尽快解决历史遗留问题，让远乡的土地真正回到其人民的手中。"
SFR_start_land_reform_tt:0 "§R无法按时完成土改会影响未来的经济建设。§!"
SFR_prepare_collective_farms:0 "准备集体农庄"
SFR_prepare_collective_farms_desc:0 "许多地方的农会和公社虽然已经建立起来，但它们手里大多缺少资金、农具、牲畜和能真正投入生产的机械设备。若是任由各地继续依靠旧式耕作方式维持生产，那么我们大概无法取得太多成效，所谓的发展也会变成黄粱一梦。\n\n我们将开始投资合作社试点，扩建现有的集体农庄，并把有限的机械化设备优先投向经考察适合推行改革的地区。我们需要让公社成为组织生产、推广新技术、改善农民生活的基础，让农民真正看到集体生产带来的好处，从而让百姓真的支持我们，并且稳定国内的粮食市场，尽快从战争的阴影中恢复。"
SFR_send_party_members_to_grassroots:0 "向基层派遣党员"
SFR_send_party_members_to_grassroots_desc:0 "光靠从平京发送文件恐怕是难以真正推进全国土地改革的。许多乡村刚刚脱离旧地主和乡绅的控制，农会、公社与地方政府仍然缺人，百姓也缺乏对新制度和新生活的认识。我们需要把更多城市新公务员、新提拔的党员，以及那些缺乏实践经验的知识分子派往基层，让他们真正进入地方参与工作。\n\n他们将协助建立地方组织，打通百姓与政府之间的联系，推广识字、农具维护、肥料使用和基础管理等培训课程。同时，这也是对干部本身的教育。只有亲眼见过全国各地的情况，而不仅仅是大城市，他们才会提出能够帮助到各地百姓的方案，真正的推进未来的改革与国家建设。"
SFR_enact_land_reform_act:0 "颁布土地法案"
SFR_enact_land_reform_act_desc:0 "各地的土地改革已经展开，但一场真正意义上的全国变革需要来自中央的支持，而随着远乡各地陆续得到解放，整场运动也开始变得愈发复杂。哪些土地应当收归公社，哪些旧租债必须废除，哪些则有地方政府赎买，地主财产如何处理，自留地、合作社与机械化农场又该如何划分权责，这些问题都需要一套明确的法律来统一。\n\n工农代表大会将正式审议并通过土地法案。它会给各地公社、农会和基层政府提供执行依据，建议全国统一的标准，并且明确在不同情况下的应对方式。"
SFR_enact_land_reform_act_tt:0 "§P尽早通过法案可以有效加快土改进程！§!"
SFR_final_blow_to_landlords:0 "对地主阶级的最后一击"
SFR_final_blow_to_landlords_desc:0 "土地改革已经取得相当大的成果。旧时代的体制正在被逐步拆解，但最后的问题仍然摆在我们面前：我们应该如何处理曾经的地主，富农，地方豪强？他们曾经压迫百姓，革命后又试图起兵反抗，不过这些抵抗大多早已被扑灭。\n\n激进者要求彻底清算，让地主阶级作为一个政治与经济力量彻底消失，摆在他们面前的只有服从并接受改造一条路；务实者则认为，考虑到各地情况不同，由中央政府出面赎买一些土地可以维持地方稳定。无论选择哪条路，都不会没有代价，我们需要谨慎决断。"
SFR_comrade_pistol_speech:0 "请手枪同志发言"
SFR_comrade_pistol_speech_desc:0 "许多地主、富农和地方豪强不会因为一纸法案就交出土地，更不会主动放弃他们在乡村里经营多年的体制。我们不能在这时候展现出软弱，否则基层干部、贫农代表和新成立的公社就会成为他们报复的第一个目标。\n\n我们将派出工作队、民兵和地方公安力量，协助各地彻底执行土地改革。愿意服从新秩序、交出土地并接受改造的人，仍可以在新远乡社会中找到自己的位置；但那些背负血债、藏匿武器、煽动暴乱的人，将不会再有讨价还价的机会。\n\n既然他们听不懂法令和劝告，那么就让手枪同志来发言。"
SFR_land_requisition:0 "土地赎买"
SFR_land_requisition_desc:0 "远乡经历了太久的战争、萧条和混乱，许多地方早已贫困不堪，地主家也未必真有多少余粮。若是在所有地区都采取同样强硬的手段，只会让百姓陷入新的恐慌，也会把一些本可争取的人推到新远乡的对立面。\n\n我们将通过赎买方式接收部分土地和资产，在保障土改继续推进的同时，尽可能减少地方震荡。愿意交出土地、配合公社建设的人，可以得到有限补偿，并在新秩序中接受监督与改造。\n\n但宽容不等于退让。中央需要派出工作队到地方，协助执行土改，对于那些背负血债、拒不服从法令、组织武装抵抗，或仍试图用旧势力威胁农民的人，仍然要以新国家的法律予以审判。"
SFR_settle_past_evil:0 "清算过去之恶"
SFR_settle_past_evil_desc:0 "是时候算总账了。\n\n谁能想到一个朴实的农民只想要耕种自己的土地，却落到需要卖儿卖女的地步？谁能想到一个为地主工作的佃农，却要遭受非人的待遇，其生活还不如奴隶制下的奴隶？谁能想到在灾年，地主，富农，豪强们可以躲在他们豪华的宅子，享受着无忧的生活，而外面的百姓却只能靠吃土为生？那么多年的罪行，无数人民的血与泪...\n\n我们需要重新整理地主、豪强、旧官吏与地方武装在过去犯下的罪行。为此，各地政府将组织工作队走访百姓，查阅契约、诉状、税册等记录，听取农民、工人和基层干部的证词。我们不能因为愤怒而污蔑无辜者，但也绝不能让对人民有血债的人藏进混乱之中，摇身一变成为新远乡的公民。\n\n他们将在公审大会上直面人民。这里不只是审判恶人的地方，也是百姓诉说冤屈的地方。那些被迫咽下的苦，那些无人理会的死，那些被地主和豪强踩进泥里的日子，都将新国家的天空下得到回应。"
SFR_settle_past_evil_tt:0 "§R只有完成了这项国策，我们才能收尾土改！§!\n§C这会清除土改期间的负面修正。§!"
SFR_prepare_planning_committee:0 "准备统筹委员会"
SFR_prepare_planning_committee_desc:0 "随着工农代表大会开始正常运转，土地改革也逐渐走向收尾，我们终于可以把目光从转向真正的国家建设。革命已经打碎了旧远乡的体制，但我们还需要进一步奔向未来，建设更美好的新远乡。\n\n我们需要一个能够统筹全国建设的机构，将工业化、农村公社、交通建设、科研投入和社会改革纳入统一规划。各地的资源、工厂、土地和人力必须被重新清点，基层提出的需求也应当被汇总到中央，而不是继续各干各的。\n\n全国统筹委员会将承担这一任务，这能让我们第一次以完整国家的方式思考未来。远乡已经完成了革命最艰难的一步，现在该开始建设我们曾经承诺过的人民之国了。"
SFR_social_reform_general_line:0 "社会改革总路线"
SFR_social_reform_general_line_desc:0 "旧远乡留下的贫困、文盲、疾病、族群隔阂和地方陋习，和曾经扭曲的体制一样，是压在人民身上的沉重枷锁。若我们想建设真正的人民之国，就必须让革命进入社会生活的每一个角落。教育、医疗、民族政策、基层文化与公共保障，都需要被重新审视并逐步改造。让我们开始工作吧！"
SFR_social_reform_movement:0 "社会改造运动"
SFR_social_reform_movement_desc:0 "社会改革不只是修改制度，也要改变人们日常生活的环境。许多城镇的供水系统一片混乱，街头巷尾都是堆积的垃圾和蚊虫，各地水源无人管理，虫害和疫病已经在贫困地区反复出现。若这些问题得不到处理，那很快便会像战争时期一样爆发新的瘟疫。\n\n我们将组织地方政府、公社、学校和基层群众开展新一轮运动：动员各地民兵修缮排水设施，清理公共卫生死角，派出灭虫队和卫生宣传员，推动饮水、居住和食品管理上的基本规范。同时，各地也会组织集体操、劳动互助和简单的健康活动，让长期被战争和贫困压垮的人们重新恢复精神。"
SFR_forgotten_tribes:0 "被遗忘的部族"
SFR_forgotten_tribes_desc:0 "在远乡的群山、边境与不为人知的角落，仍生活着一批长期被忽视的族群。他们是来自北巴斯蒂亚的狗头人移民后代，祖辈或因战乱、贫困，或因北巴斯蒂亚各地对部族的压迫而来到远乡。远乡没有像某些国家那样将他们公开奴役，但沉默的边缘化仍长期存在：这些少数种族普遍缺少土地，缺少教育，缺少进入政府的机会。无论是在过去，还是现在，他们都几乎没有任何发声权。\n\n游击战争时期，为了反抗反动派政府，各地的少数种族曾对我们施以援手，现在是时候回报了。各级政府将重新调查这些部族的生活状况，推动基本民权保障，允许他们在地方公社、学校和基层组织中获得更稳定的位置。作为同样是生活在这片土地上的民众，他们需要得到如其他人民一样的待遇。"
SFR_defer_integration:0 "暂缓融合"
SFR_defer_integration_desc:0 "对于这些长期被边缘化的部族而言，最迫切的未必是立刻融入所谓的“主流”社会，而是得到安全、尊重和稳定的自治空间。过于急切的现代化建设可能会摧毁他们原有的部族结构、语言习惯和生活方式，最后反而制造新的不满。\n\n因此，我们将暂缓直接融合政策，转而扩大地方自治，承认部分传统组织在基层治理中的作用，并通过公社、学校和政府代表之间的协商来保障他们的基本利益。"
SFR_minority_autonomous_region:0 "少数种族自治区"
SFR_minority_autonomous_region_desc:0 "作为更进一步，为了真正改善我国少数种族当下的处境，我们应当给予他们能够参与地方建设、维护自身利益的制度空间。\n\n为此，我们将在主要聚居区设立少数种族自治区，由地方公社、部族代表和中央派驻干部共同管理基层事务。政策不会强迫他们立刻放弃原有传统，也不会强求他们融入当下的远乡社会；相反，政府将通过教育、交通、医疗和生产建设，帮助他们逐步获得远乡革命带来的实际成果。"
SFR_we_are_not_different:0 "我们并非不同"
SFR_we_are_not_different_desc:0 "对于那些长期生活在边缘地带的部族而言，他们之所以贫困、闭塞、缺少教育和公共服务，并不是，也并不应该因为他们天生如此，而是因为旧远乡从未真正把他们当作国家的一部分。\n\n我们将更积极地介入地方事务，派遣干部、教师、医生和建设队伍进入聚居区，推动学校、诊所、道路和基层公社建设，确保不同种族在法律、生产和公共服务中获得同等对待。确保新远乡的人民，不论出身、语言和习俗，都可以成为不可或缺的一部分。"
SFR_implement_minority_education:0 "落实少数族群教育"
SFR_implement_minority_education_desc:0 "远乡各地的教育本就落后，而那些偏远的少数族群聚居区更是长期被旧政府遗忘。许多村落没有稳定的学校，孩子们很早就被迫参与劳作，能识字、会计算的人少之又少。对他们而言，所谓国家、法律和未来，过去往往只存在于旅人的口耳相传之中。\n\n如今新国家已经建立，那就不能继续让这些地区停留在往日的阴影里。作为各地扶贫，地方开发计划的一部分，我们将派遣教师与基层干部，修建简易学校，推广基础识字、算术、公共卫生和新国家的政治品德教育。"
SFR_develop_minority_regions:0 "开发少数族群地区"
SFR_develop_minority_regions_desc:0 "长期以来，少数族群聚居区被远乡的发展进程甩在了后面。那里道路狭窄，学校简陋，诊所稀少，公共设施几乎不存在，许多村镇甚至仍依靠地方性的组织维持存在，任何一场动荡都可以造成灭顶之灾。\n\n我们将把这些地区纳入全国建设计划，修建基础道路、学校和医院，扶持地方公社与合作社发展，并从大城市触发，让更多党政干部、技术人员和教师参与当地建设。"
SFR_implement_living_security:0 "落实民生保障"
SFR_implement_living_security_desc:0 "民惟邦本，本固邦宁。新远乡既以人民为名，便不能只让百姓在旗帜下欢呼，而要让他们在柴米油盐、衣食住行中真正感到新国家的存在。战乱之后，许多家庭失去劳力，工人收入不稳，乡村尚未完全恢复生产，若连最基本的生活都无法保障，所谓建设也不过是空谈。\n\n我们将逐步建立基础民生保障制度，为困难家庭、失业工人、伤残军人、烈属孤老和受灾农户提供必要补助，并通过地方公社、工会与基层政府发放生活物资，稳定粮价与日用品供应。仓廪渐实，人心方安；人民能活下去，活出希望，才会相信新国家的未来。"
SFR_start_national_literacy_campaign:0 "开始全国扫盲"
SFR_start_national_literacy_campaign_desc:0 "旧远乡的教育长期依赖私塾、宗族学堂和少数城市学校，普通百姓家的孩子往往只能识几个字、会些简单算账，便要回到田地和工坊里谋生；而地主、商人和旧官吏的子弟，则可以进入高级私塾，乃至前往大城市读书，把知识变成继续统治他人的门槛。\n\n这样的局面必须结束。共和国将组织全国扫盲运动，在工厂、乡村、公社和军队中开设夜校与识字班，培训基层教师，编写适合普通人的教材。读书识字不该再是少数人的特权，而应成为人民参与国家、理解政策、改变命运的第一步。"
SFR_promote_compulsory_education:0 "推广义务教育"
SFR_promote_compulsory_education_desc:0 "扫盲只是第一步。我们将进一步规范教育系统，建立覆盖城乡的义务教育制度，统一教材、师资、学制与考试标准。未来，孩子能否继续升学，不应再取决于出身、家产和地方关系，而应通过公开考试与国家选拔来决定。无论是乡村农户、工厂工人，还是偏远公社的孩子，都应当拥有走进高等学校的道路。\n\n学有所教，才有民有所立。教育垄断一日不破，人民便一日难以真正翻身。"
SFR_public_healthcare:0 "公共医疗"
SFR_public_healthcare_desc:0 "病有所医，方能民有所安。曾经，远乡的医疗资源长期集中在少数大城市和富裕阶层手中，百姓看病多靠土方、游医和运气，受伤后常常只能回家等死。战争与贫困又让疫病、营养不良和慢性伤残遍布各地，进一步恶化了局势。\n\n我们将先行推行公共医疗试点，在重点城市、工厂区和条件较好的公社建立新的或是扩建已有的诊所，医院，加之统一调配药品，培训护士与赤脚医生，并把防疫、产科、儿童保健和工伤救治纳入地方政府的日常工作之中。\n\n待试点成熟后，我们便可将公共医疗系统推广至全国，向全民的医疗保障前进。"
SFR_smash_traditional_customs:0 "打碎传统礼制"
SFR_smash_traditional_customs_desc:0 "旧远乡的礼制远不止婚丧嫁娶上的规矩。它把妇女关进家门，把女儿视作宗族与家产的一部分，把婚姻、继承、教育和劳动都交给父兄、丈夫与乡绅决定。许多妇女在战争中支撑家庭，在工厂里维持生产，在游击队中传递情报、救治伤员，甚至拿起武器作战，可一旦回到传统的家庭，她们又被要求低头沉默。\n\n新远乡不能允许这种秩序继续存在。我们将推动婚姻自主、财产权、受教育权和劳动权，允许妇女更加平等地进入学校、工厂、公社与基层政府。那些以“祖宗规矩”为名维护压迫的人，必须明白：新远乡不再承认这种规矩，任何试图开倒车，破坏平等的人，都将受到人民之国最严厉的惩罚。"
SFR_establish_new_research_institute:0 "组建新科研所"
SFR_establish_new_research_institute_desc:0 "远乡的科研体系已经落后太久。战争摧毁了学校和实验室，旧王国又长期把有限资源浪费在互不统属的小项目上，许多研究人员不是流亡他乡，就是被迫转去工厂和军队里维持基本工作。如今我们终于有了重建科研体系的条件。\n\n我们将组建新的国家科研所，集中仍可使用的设备、资料和人才，优先恢复工业技术、农业改良、基础工程与魔法科学研究。远乡不可能一夜之间追上先进国家，但只要从现在开始稳定投入，总有一天，我们也能成为世界一流！"
SFR_magic_research:0 "魔法研究"
SFR_magic_research_desc:0 "在现代科学中，魔法早已不是传说、仪式或少数学者的私人财产。无论是工业生产、医疗救治、农业改良，还是军工设备与基础能源，魔法研究都已经成为现代国家无法回避的一部分。远乡过去长期缺乏稳定投入，故而严重落后国际一流水平。如今新的科研体系已经建立，是时候补上这一短板了。"
SFR_people_with_hope:0 "满怀希望的人民"
SFR_people_with_hope_desc:0 "远乡曾在漫长的岁月里失去太多东西。战争夺走了青壮，贫困压弯了脊梁，旧礼制锁住了半数人民的命运，愚昧与疾病又让无数本该明亮的人生早早黯淡。许多人活了一辈子，只知道忍耐、沉默和等待；他们等不到公道，等不到学堂，等不到医生，也等不到一个真正把他们放在心上的国家。\n\n而如今，这一切终于开始改变。\n\n学校的灯火在夜里亮起，妇女走出旧门槛，工人与农民第一次学会阅读自己的名字，各地诊所里有人为病人登记，孩子们在新修的操场上奔跑。新国家的建设仍然艰难，远乡的伤口也不会一夜愈合...\n\n但人民已经看见了不同的未来。"
SFR_establish_central_media_agency:0 "设立中央传媒机关"
SFR_establish_central_media_agency_desc:0 "过去几十年以来的历史已经证明，任何国家不能忽视媒体的力量。报纸、广播、宣传画、新闻社与地方公告栏，远不只是传播信息的工具，更是连接中央与人民、解释政策与凝聚社会的重要渠道。任由各地各说各话的唯一结果，便是让谣言在混乱中重新滋长。\n\n我们将设立中央传媒机关，统一管理国家层级的新闻发布、政策宣传与公共教育工作，同时整合各地报社、广播站和宣传队伍，不需要完全国有化，不过需要让中央的传媒机关占据更强的地位，防止流言的滋生。"
SFR_red_industrialization:0 "红色工业化"
SFR_red_industrialization_desc:0 "在完成远乡统一之前，大多数工业计划都因为资源被调去了更紧急的地方而被搁置。而到了国家统一的当下，负责工业的同志们已经摩拳擦掌，他们已经准备好将整个国家塑造成属于革命者的工业强国。\n\n为了让国家富强，为了让劳动者劳有所得，我们将开始属于工业的“红色革命”。"
SFR_real_national_government:0 "真正的全国政府"
SFR_real_national_government_desc:0 "远乡已经统一，但统一不止是军事上的胜利，更是人心汇聚的体现。新远乡必须成为一个真正能够统筹全国、管理全国、代表全国的中央政府，而不是各地合作下的松散联盟。\n\n我们将进一步巩固中央权威，明确各级政府职责，整合地方行政体系，并让政策能够从平京切实抵达国家的每个角落。同时，意识形态阵地也必须得到加强。我们需要向人民解释自己的道路，抵御旧势力、地方保守派和反动思想的回潮。\n\n一个国家若无纲纪，便难以长久；一个政府若无方向，便无法带领人民前进。我们必须学会以全国政府的姿态行动，并承担起建设新远乡的全部责任。"
SFR_public_infrastructure_construction:0 "公共设施建设"
SFR_public_infrastructure_construction_desc:0 "作为工业化的一环，我们需要尽快修复并扩建远乡各地的基础设施。若乡村与城市仍被蛮荒隔开，工厂无法稳定取得原料，农产品也难以及时送出，那么工业化和民生改善的进程会被大大拖累。\n\n我们将启动一轮公共设施建设，在各地修复交通节点，扩建基础设施，改善地方政府与公社的办公条件，并为后续工业项目打下基础。道路通，则货物流；设施兴，则民生稳。一个联系更加紧密的远乡，才能降低生活成本，提高建设效率，也让人民更真切地感受到他们生活在同一个国家之中。"
SFR_public_infrastructure_construction_tt:0 "§C将解锁一系列基础设施建设项目。§!"
SFR_dare_to_speak_and_do:0 "敢说，敢做"
SFR_dare_to_speak_and_do_desc:0 "远乡的建设不能抛下任何人。工厂里的技工、乡村里的工匠、学校中的年轻教师，乃至公社里最普通的农民，都可能在实际生产中发现新的办法。凡有利于生产、有利于民生、有利于国家建设者，便不该因出身、资历或手续繁琐而被埋没。\n\n我们将鼓励各地大胆提出改良方案，并由政府对有价值的工业发明、农业技术、科研设想和基层经验给予补贴与推广。能节省材料的，就送进工厂试验；能提高产量的，就交给公社试用；能改善生活的，就让地方政府协助落实。\n\n与此同时，魔法技术的管控也应适度放宽。它不能永远只被锁在学院、军队和少数研究机构里，而应在安全监管下走向生产与生活。敢说新想法，敢做新尝试，远乡的未来便有追赶世界一流的希望。"
SFR_organize_mass_participation:0 "组织义务劳动"
SFR_organize_mass_participation_desc:0 "全国各地的建设都需要愿意亲手参与的人。许多青年、党员、退伍士兵和城市闲散劳动力，正可以被组织起来，投入到各地急需人手的建设中去。\n\n他们中有些人将前往乡村，协助修路、清渠、建设基础设施，推广识字班和农业培训；有些人则会进入城市工厂、学校与基层机关，参与公共设施维护、工人教育和生产支援。对于许多人而言，这也会成为更进一步理解国家、理解人民、理解建设本身的宝贵经验。"
SFR_expand_administrative_departments:0 "扩大行政部门"
SFR_expand_administrative_departments_desc:0 "统一后的远乡不再是临时的行政机构还能承担的小局面。土地、工厂、学校、医院、交通、治安与基层公社，都需要稳定而有效的行政体系来维持运转。我们将扩充中央与地方行政部门，招募并培训新的公务人员，并为未来的公务员考试做准备；明确各级机构职责，让中央的命令能够真正抵达全国各地。一个庞大的国家需要更庞大，也更可靠的政府骨架；没有它，再好的政策也得不到执行。"
SFR_rebuild_police_system:0 "重建警务系统"
SFR_rebuild_police_system_desc:0 "战争时期，社会的动荡是可以接受的，毕竟没有办法完全解决，可随着全国解放，我们便不能再容忍长期失序。战争结束后，旧警察机关瓦解，地方民兵、临时纠察队和新政府公安力量职责混杂，许多地区仍有盗匪、旧势力残余和投机分子趁乱活动，甚至缺乏中央管制的一部分革命武装都变成了危害社会治安的敌人。我们必须重建统一的警务系统，明确治安、侦查、户籍和基层巡逻职责，训练可靠的新警员，并将警务工作纳入中央与地方政府的统一管理。"
SFR_implement_grassroots_democracy:0 "落实群众自治"
SFR_implement_grassroots_democracy_desc:0 "我国不能只依靠自上而下的命令治理人民。平京派的代表认为，既然国家以工农为本，就应当让基层群众在公社、工厂、街区和学校中拥有更直接的发言权。人民不是被管理的对象，而应当成为管理自身生活、监督地方政府、参与国家建设的主体。\n\n我们将推动群众自治制度，在基层设立更稳定的代表会议、监督委员会和公共事务讨论机制，让地方事务能够由熟悉地方的人参与决定。修路、分配、教育、治安、生产安排，都不该永远等待上级批示。只要不损害国家的统一大方向，基层就应当拥有处理自身问题的空间。\n\n民治，方能民享。"
SFR_prioritize_party_democracy:0 "加强党的基层组织"
SFR_prioritize_party_democracy_desc:0 "稳健派的代表认为，基层治理不能只依靠临时热情和群众自发讨论。我国需要的是一套有组织、有纪律、能执行政策，也能反馈问题的基层体系。党组织扎根于社区，既可以帮助群众把意见送到上级，也能在政策落地时及时发现偏差，避免地方事务被一时情绪或少数人的随意决定牵着走。\n\n我们将进一步加强党的基层组织，完善支部会议、群众联系、政策反馈和干部问责机制。基层干部必须听取人民意见，但也必须承担执行责任；地方组织可以提出建议，却不能让国家政策在层层转述中走样。只有把群众路线与组织纪律结合起来，我国才能既保持同人民的联系，也拥有稳定可靠的治理能力。"
SFR_establish_internal_security_forces:0 "组建内务部队"
SFR_establish_internal_security_forces_desc:0 "革命胜利来之不易，保卫革命同样不会轻松。东巴斯蒂亚的局势仍然动荡不安，旧王国残党、地方武装、境外势力和投机分子都可能在新远乡尚未稳固之时寻找机会。只依靠普通警务机关和地方民兵处理这些威胁的话，许多问题只怕在被发现前就已酿成灾祸。\n\n我们将组建直属中央指挥的内务部队，负责重要设施保卫、反破坏行动、边境与交通要道警戒，以及对重大政治安全案件的支援处理。它必须是一支忠于新远乡、忠于人民、纪律严明的力量，而不是旧时代那种只会欺压百姓的暴力工具。\n\n来之不易的革命果实需要有人守护。远乡已经付出了太多血的代价，绝不能让旧秩序借着混乱卷土重来。"
SFR_restore_national_production:0 "恢复全国生产"
SFR_restore_national_production_desc:0 "首先我们需要面对的是恢复生产秩序，虽然收复北方与西北时对工业设施与基础建设所造成的伤害并没有预想中那么高，但由于两地实质上长期割裂于中央，甚至出现了不同地区不同铁路轨距的情况。\n\n恢复生产秩序最大的困难便是如何协调不同地区的标准与基础建设，在完成统一标准与调度以后，我们才能开始这两地的工业计划。"
SFR_restore_national_production_tt:0 "§C这会解锁一系列北方与西北的工业项目。§!"
SFR_develop_mineral_resources:0 "开发矿产资源"
SFR_develop_mineral_resources_desc:0 "常言道远乡地大物博，可实际上利用起来的天然资源少之又少，其中不乏有因为不合理的提炼过程所浪费的资源，但更多的还是因为没有足够资源区开发的矿产。\n\n在工业部门牵头下，远乡目前的矿区将会被重新整合进国家工业体系中，而更标准的踏勘与提炼流程也将为未来的资源开发项目打下基础。"
SFR_develop_mineral_resources_tt:0 "§C这会解锁一系列矿产资源开发项目。§!"
SFR_develop_refining_industry:0 "发展精炼工业"
SFR_develop_refining_industry_desc:0 "如果要问什么技术最能代表工业最尖端的技术，那么精炼工业与合成技术无疑是其中的翘楚，这些技术提供了在资源短缺时的另一个选择，通过人工技术合成燃油与橡胶。\n\n如果我们拥有这些技术，急需资源的当下自不用说，在以后有关油气等资源的大国博弈中我们也能取得优势。"
SFR_develop_heavy_industry:0 "发展重工业"
SFR_develop_heavy_industry_desc:0 "在过去，一个国家的农业决定了这个国家是否会毁灭。而在现代，重工业决定了一个国家是否会崩坏。组成现代社会的一切产物，不论是电气、钢铁还是水泥化肥，这些东西离不开工业生产。\n\n因为各种各样的原因，远乡在国际上的工业水平只是依靠着相对较大的国家体量支撑着，但是具体到工业技术与人均生产可以说得上不堪入目。如果我们想要让远乡再次伟大，那么我们需要更多、更好的工厂。"
SFR_national_trade_union_issue:0 "全国工会问题"
SFR_national_trade_union_issue_desc:0 "在反动派展露獠牙之前，远乡新生的工会组织一直在团结工人和调解劳资矛盾，虽然由于人手不足导致没有足够力量对抗那些反动力量。但在工会被反动派彻底摧毁以前，仍然撤离了大量重要人员与资料，并动员了工人进行了罢工和向阵线走私枪械与药物。\n\n而在革命者成了远乡的掌权人以后，各个部门对如何处理工会则犯了难，在具体如何组织工会上大家重现了革命阵线时期的辩论热情。\n\n只是不论是直接中央管理，还是由地方政府自行组建，亦或者由劳动者自行组件不受管控的自由工会，大多数同志都认同需要有一个工会对劳动者的福利待遇进行保障，而不是依靠所谓管理者的自觉。"
SFR_empower_local_cooperatives:0 "赋权地方合作社"
SFR_empower_local_cooperatives_desc:0 "在处理完工会问题以后，远乡工业部门就要面对如何组织工业生产。这一问题比起经济问题更像是政治问题，而大多数同志都认为中央集权必不可少，只是目前远乡的情况并不能支持中央政府完全管控地方所发生的事务。\n\n部分同志提议，在中央工业部委的总体调控和监督下，鼓励各地组织工业合作社从事生产活动，将地方工厂整合进国营工业体系中，从而在目前国营工业发展不够完善的情况下，发挥各级政府，各地群众的积极性，有效补充国营经济暂不能覆盖的领域，提高劳动生产率。"
SFR_centralized_planned_economy:0 "集权计划经济"
SFR_centralized_planned_economy_desc:0 "在处理完工会问题以后，远乡工业部门就要面对如何组织工业生产。这一问题比起经济问题更像是政治问题，而大多数同志都认为中央集权必不可少，只是目前远乡的情况并不能支持中央政府完全管控地方所发生的事务。\n\n多数同志认为，中央工业部委的统一的管理与计划，对目前远乡拥有的工业资产进行统一调配与建设才是重中之重。在具体的实地踏勘与经济核算之后，中央政府才能有效管控工业建设进度，避免生产资料浪费、在研究上重造车轮等情况。"
SFR_five_year_plan:0 "准备定期工业计划"
SFR_five_year_plan_desc:0 "处理好如何组织工业生产以后，工业部门的同志们可以把精力空出来面对今年的工业计划了。而决定今年的工业计划的重心以后，就该开始动员人力进行实地调查与计划编制，在一切完成以后便可以开展计划了。"
SFR_train_technical_workers:0 "训练技术工人"
SFR_train_technical_workers_desc:0 "工业部门需要面对的一大难点便是技术工人不足，现代工业是一门需要专业技术的工作，任何没有经过专门培训与安全教育的工人都是生产的危险因素。\n\n因此如何训练工人便成了一大难题，好在远乡并不缺乏经验老道的工人，我们可以从中总结经验编撰书籍进行培养，亦或者用以老带新的手段来度过技术工人短缺的窘境。"
SFR_improve_infrastructure_construction:0 "完善基础设施建设"
SFR_improve_infrastructure_construction_desc:0 "若是要建设一个工业强国，坚实的基础设施是必不可少的。若是没有运输系统、电力设施等配套基础设施，哪怕开采再多的资源与建设再多的厂房都毫无用处。"
SFR_vision_of_national_connectivity:0 "连通全国的愿景"
SFR_vision_of_national_connectivity_desc:0 "在革命之前，曾经有人提出过利用铁路连接整个远乡，只不过计划被当时的高层很草率地否决了，理由很简单——全国铁路的收益无法弥补建设成本。\n\n而对于革命政权来说，经济上的考量远不如打破各个地区之间的地理隔阂来得重要，铁路与火车带来的流动性能有效地加快全国各地的政治、经济交流，也方便偏远地区的群众能更好地学习知识与建设家乡。"
SFR_industrial_complex:0 "首都工业集群"
SFR_industrial_complex_desc:0 "在一切进入正轨以后，工业部门的同志们有了一个点子，一个野心勃勃而又充满诱惑力的提案摆在了台上——将首都地区建设成一个工业设施完备的工业集群。\n\n在这个计划里，首都工业集群将会成为全国工业建设的标杆，以门类齐全、独立完整的工业体系和高精尖的工业设备成为整个国家工业脊梁，在可以预见的未来中也将会成为震撼世界的奇迹。"
SFR_rural_commune_movement:0 "农村公社运动"
SFR_rural_commune_movement_desc:0 "远乡的农村在旧王国时期仍然有大量地区保留着过去较为落后的劳作方式，而在偏远地区仍然有农村缺少合格基础建设与医疗服务。造成这一现状的原因有不少：地主群体与土地贵族所垄断了土地资源，旧王国时期中央政府对边缘地区的漠视等等。\n\n而农村公社化便是中央对这种问题的解决方案，通过集中化利用土地与工具，避免在建设农村中出现资源浪费与富农问题，而在政治上公社将会承担起动员群众的职能，以方便统一建设利于群众的公共设施。"
SFR_workers_and_peasants_alliance:0 "工农联盟"
SFR_workers_and_peasants_alliance_desc:0 "在开展工作以前，我们需要对政府内有些许苗头的不良风气进行纠错工作，有些干部认为农民们是落后群体，而不是工人群体一样的革命群体。\n\n我们需要申明工人阶级与劳动人民是我国革命的重要组成部分，而工农革命是我国人民民主的基石。对此相关的教育与宣传工作也不能停下，避免出现城乡隔阂又或者是工人群体歧视农民群体。"
SFR_rural_mechanization:0 "乡村机械化"
SFR_rural_mechanization_desc:0 "远乡乡村机械化无法施行有三个原因——缺少购买农业器械的财政、缺少维护机械的技术以及地权问题导致农业器械无处发挥。\n\n而在农村公社开展以后，中央允许地方公社可以租赁或者贷款购买农机，而耕地则统一归于公社进行耕种管理，只剩下中央需要定期派遣技术工人到公社去进行机械技术的教育与科普。"
SFR_construct_water_conservation_facilities:0 "修筑水利设施"
SFR_construct_water_conservation_facilities_desc:0 "如何能种好地？抛开那些理论与技术上相关的东西，归根结底还是土质、肥料、水源。而这三者中，不同的土地可以选择不同的作物，缺少的肥料也可以用传统方式进行替代，但只有水源无法被替代也无法被选择，不靠近河流的耕地只能通过人工进行浇灌。\n\n或许对以前的农村来说，建设水利工程是一件麻烦的事情，不仅要牵扯到如何动员民力，更要考虑这些水利工程最后归属于哪一方。而对公社来说就没有这么多麻烦，农闲时空闲的青壮年可以动员去修建水利设施，归属权归于公社与集体，而不是某一家某一户手上。"
SFR_social_ownership_economy:0 "社会所有制经济"
SFR_social_ownership_economy_desc:0 "共同所有制的基础在于公社群众与城镇合作社成员在集体种共同占有生产资料，实行共同劳动、按劳分配，成员共同行使所有权，在日常事务上也有着表决权与发言权。\n\n这便是远乡最重要的经济组成部分，社会所有制经济将不会是空泛的概念与名词，而是涉及到城镇与农村、农业、工业与服务业的重要政策，是国家经济制度基础的重要基石。"
SFR_expand_industrial_urban_areas:0 "拓展工业城区"
SFR_expand_industrial_urban_areas_desc:0 "从法律上来讲，在国家中城市与农村在政治地位上是平等的。但是基于现实情况来说，国家拥有的资源并不是无限的，为了更好的发展需要寻找一个开发重点——也就是说我们必须在城市和农村之间二选一。\n\n对国家来说，城市与工业乃是国家的心脏，没有钢铁与电力无法支撑起一个现代化的国家。建设农村虽然是国家的国策，但是要等待回报的时间太过漫长也太过飘渺，更务实的选择是将资金投入到几个工业城市建设当中，再以城市产出的工业品反哺农村。"
SFR_develop_local_industries:0 "发展地方产业"
SFR_develop_local_industries_desc:0 "从法律上来讲，在国家中城市与农村在政治地位上是平等的。但是基于现实情况来说，国家拥有的资源并不是无限的，为了更好的发展需要寻找一个开发重点——也就是说我们必须在城市和农村之间二选一。\n\n一棵树想要茁壮成长就要看树木的根茎是否坚实，而国家这棵树的根茎名为农村。投资农村的回报并没有看上去那么虚无缥缈，哪怕抛开城乡之间因为商品交换而更加紧密的交流这一政治因素不谈，地方产业的繁荣有利于当地基础建设的提高，更不用多说作为人口稠密的农村地区能因此得到更好的医疗与教育。"
SFR_working_hand_in_hand:0 "携手并进"
SFR_working_hand_in_hand_desc:0 "就算再怎么争论哪个地区需要更多的关注，我们也要明白农村与城市是不可分割的集体，都是国家的重要组成部分，任何地方主义与地域歧视本质上分割工农联盟的行为。\n\n携手并进并不是泛泛而谈，而是要党组织努力去做的事情，加深不同地区交流、减轻城乡交通的不便、普及义务教育与破除封建迷信等等。这些事情很沉重又很繁琐，但如果我们要建设一个属于所有人的国家，那么这些工作是我们必须去做的。\n\n要让人明白，远在天边的其他人并不是一个抽象的文字或是图案，他们也是有着自己生活的人，而不是一串串可以损失的数字，一个个用来贬低的象征；要让群众明白：在边疆与在城市中的人没有区别，都是生活在这片土地上的一份子。"
SFR_organize_land_survey:0 "组织土地测量"
SFR_organize_land_survey_desc:0 "不论是过去还是现在，只要中央政府没有失灵，对于土地的测量永远是核心国策的一部分。摸清楚地方上有多少土地，这些土地又有什么分类，其产权归属于何人，而对现在的远乡来说，这更是为了之后农村公社运动打下基础。"
SFR_organize_land_survey_tt:0 "§C接下来的国策会解锁一系列事件，其选择的不同会解锁不同的国策。§!§g在某些情况下，也可以实现最后再二选一。§!"
SFR_organize_land_survey_tt1:0 "这会使我们更倾向§R组建生产大队§!"
SFR_organize_land_survey_tt2:0 "这会使我们更倾向§C耕者有其田§!"
SFR_organize_land_survey_tr:0 "§Y跟随前面的选择而定...§!"
SFR_organize_land_survey_effect_tt:0 "§C根据之前的选择，我们将获得效果。§!\n§Y此外：§!"
SFR_commune_scale_issue:0 "公社规模问题"
SFR_commune_scale_issue_desc:0 "一个组织的大小影响了这个组织的运作逻辑，而公社也是如此。庞大公社需要中央亲自建设与操刀，大小并行的公社又容易出现公社之间不平等的情况，而让地方全权建设小型公社又容易消耗地方宝贵的精力与资源。\n\n但不同规模的公社能带来的效益也是不同的，而大小不同的公社政治力量也是不同的，如何解决这个问题又该是中央的同志们去头疼。"
SFR_rural_market_trade:0 "农村集市贸易问题"
SFR_rural_market_trade_desc:0 "农村的集市不同于城市的市场，其更主要的职能是让农民有地方用自己手上的农产品交换需要的商品，这是基于现实需求而产生的商品交换，而非某些过于“激进”的同志们所指责的“农村资本家”行为。\n\n回归正题，虽然农村集市提供了给农民进行商品交换的地方，但其中也不缺乏作奸犯科的奸商恶徒。在如何处理集市上的问题上，哪怕是最温和的同志也认可政府需要为农村提供更规范的商品交换，区别只在于农民们有多少自由度。"
SFR_private_plot_issue:0 "自留地问题"
SFR_private_plot_issue_desc:0 "诚然每个农民拥有的自留地大小各不相同，容易出现将耕地出租又或者只关注自己一亩三分地的小农思想，但是自留地的缺失更容易让农民失去抗风险能力，也容易出现缺少副产品所带来的乡村经济难以流通。\n\n最后问题变成了该限制多少自留地才合适，支持自留地更多的表示能够扩大积极性，而支持限制自留地的表示更方便管理；最后就变成了让中央头疼是不是应该提高下限以后让地方去头疼的事情。"
SFR_establish_production_teams:0 "组建生产大队"
SFR_establish_production_teams_desc:0 "在农村公运动的背景下，行政村被生产大队替代，管理农民集体化以后所产生集体经济组织。生产大队抛弃了旧有的小农经济，转而将农民进行更加系统化的计分与管理。"
SFR_establish_rural_banks:0 "设立农村银行"
SFR_establish_rural_banks_desc:0 "农村银行并非想象中只有借贷与存款取款业务的传统银行，其职能更多是为缺少工具与启动资源的公社与合作社等集体提供借借贷服务，或者向生产队出借种子与牲口，避免过于贫困的地区没有发展机会。"
SFR_tillers_have_their_fields:0 "耕者有其田"
SFR_tillers_have_their_fields_desc:0 "哪怕是知道了耕地归属集体所能带来的利益，但对绝大多数农民来说有一块能够养活自己的耕地可要比任何事情都可靠。所以在农村公社化的进程以外，也要确保绝大多数农村村民能得到属于自己的耕地，公社集体也要做好避免出现土地权属纠纷的情况。"
SFR_prosperous_rural_economy:0 "繁荣农村经济"
SFR_prosperous_rural_economy_desc:0 "农村经济的繁荣不仅依赖于土地分配的公平性，更需要构建完整的农产品收购与商品流通机制。通过发展本地农业、手工业和初级加工业，农村可以逐步成为自给自足又具备对外销售能力的单元。\n\n同时引入合作社模式整合零散生产，进行统一议价，减少中间环节对农民收益的侵蚀，将有效促进农村群众自主发展，提高乡村在与城市进行商品交换时的地位。"
SFR_diligent_people:0 "勤劳的人民"
SFR_diligent_people_desc:0 "如果有人在十几年前说：“在十几年后的农村里，家家户户都有自己的耕地，大部分村庄都用得上农业机器，农民进入城市的原因不再只是单纯某一条生路”——那他一定会被别人取笑为一个异想天开的疯子。\n\n但这一切对现在的远乡来说，这段话只是一个再寻常不过的事实。\n\n正因为有那不惧牺牲的革命者们，他们用汗水与鲜血连接起了最偏远的农村，让那些劳苦一生而无立锥之地的人们有了自己的田地。曾经被遗忘的农村如今有了医生和老师，而孩子们也不再因为求学无门而无书可念，病人不必再因为贫穷困苦而无药可医。\n\n正因有那不惧劳苦的农民们，工厂与道路在乡村的荒野上拔地而起，荒废的土地变成了丰收的耕田。他们终于能品尝到属于自己的劳动果实，再也不用为那地主与权贵工作而不得报酬。\n\n终有一日，勤劳的人民终将把苦难与枷锁的记忆丢到天边去，而他们的孩子们将在幸福与富足中长大。"
SFR_red_star_shines_on_the_farthest_villages:0 "红星照耀远乡"
SFR_red_star_shines_on_the_farthest_villages_desc:0 "终于，我们做到了…"

SFR_reassess_external_situation:0 "重新审视外部局势"
SFR_reassess_external_situation_desc:0 "经历了艰苦卓绝的斗争，我们终于击败了那些妄图在远乡称霸的敌人，成为了这片土地上最后的胜者。烈火淬炼真金，鲜血浇灌信念，无数同志倒在了通往胜利的道路上，他们的牺牲换来了今日的局面——红旗已经飘扬在远乡的每一寸土地之上。然而，胜利绝非终点，而是一个新的起点。当我们终于得以从内部的鏖战中喘息片刻，是时候抬起目光，越过我们脚下这片浴血奋战才得来的疆土，看向更为广阔的外部世界了。远乡并非孤悬于天地之间。在它的边境之外，盘踞着形形色色的势力，谁是我们的朋友？谁又是我们的敌人？"
SFR_imperialist_war_legacy:0 "帝国主义战争的遗产"
SFR_imperialist_war_legacy_desc:0 "1995年，顿恩骑士团的铁蹄踏入了西北，吉拉尼亚的旗帜插上了曾属于我们的疆域。他们以为，远乡会就此沉默，会跪倒在战败的现实面前，从此俯首听命。然而，他们错了，帝国主义者留下的，绝不只是断壁残垣与丧失的国土。他们留下的，是远乡人民心中再也无法熄灭的怒火，是对一切压迫者刻骨的清算之志，是一笔必须由我们亲手讨还的血债。每一寸被掠夺的土地，每一个倒下的同志，都化作了我们枪膛里的子弹，锻成了我们前进的钢铁意志。侵略者教会了我们一个真理：弱者的哀求换不来怜悯，唯有力量才能赢得尊严。我们要将这场战争留给我们的伤痛，淬炼成复兴的钢铁脊梁；要让敌人当年的傲慢，成为他们日后悔恨的根源。重整军备，重振旗鼓——这一次，远乡将不再是任人宰割的羔羊，而是让一切帝国主义者为之颤栗的红色铁拳。"
SFR_free_the_people_of_the_northwest:0 "解放西北人民"
SFR_free_the_people_of_the_northwest_desc:0 "西北的土地上，压迫从未停止。那些曾被夺走的疆域里，我们的兄弟姐妹仍在铁蹄下呻吟，期盼着解放的曙光。现在，是时候让他们如愿以偿了。集结部队，整备武装，向西北进军！让那里的人民看到，从未遗忘他们。我们要用行动告诉所有人：凡是远乡的土地，凡是远乡的人民，都不会被永远遗弃在黑暗之中！"
SFR_send_ultimatum_to_the_northwest:0 "向西北发送最后通牒"
SFR_send_ultimatum_to_the_northwest_desc:0 "西北的占领者们还在做着他们的美梦，以为自己能永远霸占属于远乡人民的土地。是时候把现实摆在他们面前了。钟声已经敲响，留给这群豺狼虎豹选择的时间不多了——要么归还我们的土地与人民，要么，便于我军的军靴下化为埃土。"
SFR_free_the_people_of_donen:0 "解放顿恩民众"
SFR_free_the_people_of_donen_desc:0 "顿恩骑士团的统治，不过是反动派腐朽秩序的残渣。那些顶着"骑士"头衔的寄生虫，用虚伪的荣誉掩盖剥削的本质，让西北的人民在贫困与压迫中挣扎。现在，曾落于他们之手的地区已然光复，将他们驱逐之后，我们自然应当重新恢复它们本来的名字——那是属于远乡的名字，属于人民的名字。"
SFR_seize_worm_property:0 "收缴沃姆财产"
SFR_seize_worm_property_desc:0 "我们已经击退了盘踞在我们土地上的沃姆蛆虫，他们的驻军在仓皇逃窜的时候却没有带走来自沃姆的资产——真是一份让人喜悦的战利品！没收一切沃姆资本的财产,将这些来自侵略者的生产资料交还给真正创造财富的人民!那些工厂要为远乡的建设服务,那些资源必须要用于人民的福祉。"
SFR_integrate_northwest_territories:0 "整合西北领土"
SFR_integrate_northwest_territories_desc:0 "红旗插上西北的那一刻，只是万里长征的第一步。解放不等于建设，光复不等于统一。这片饱经战乱的土地上，留下的是破碎的行政体系、割裂的经济网络、以及尚未完全消散的旧秩序残余——因此，重建与治理便是我们的首要工作，不能让我们的将士拼死夺回的土地继续沉沦。"
SFR_free_the_people_of_the_southwest:0 "解放西南人民"
SFR_free_the_people_of_the_southwest_desc:0 "西南的群山之间，回荡着被压迫者的自以为是的嚣张笑音。那片土地曾属于远乡，那里的人民本该和我们一同迎接新世界的到来。但帝国主义的战争将他们抛入了深渊，强权的枷锁锁住了他们的脚步。我们不能让历史的伤口继续流血。组织力量，筹备攻势，让我们的西南地区重见天日！"
SFR_send_ultimatum_to_the_southwest:0 "向西南发送最后通牒"
SFR_send_ultimatum_to_the_southwest_desc:0 "是时候提醒一下西南的敌寇，他们脚下的土地本应与他们无关了。拟定通牒吧——交还非法侵占的领土，停止对西南人民的奴役与掠夺。我们愿意给他们一个体面退场的机会——但机会只有一次。倘若他们没有识时务的俊杰眼光，那么我们也不介意用枪炮打醒这些寄生在我们土地上的顽固脓疮。"
SFR_crystal_heritage_destination:0 "水晶族裔的去向"
SFR_crystal_heritage_destination_desc:0 "每个革命者都必须回答一个问题——如何对待昔日的特权阶层？水晶族裔这个特殊的族群在吉拉尼亚治下占据着统治地位，如今领土重归远乡的怀抱，来到这片土地上的水晶族裔还需一个处理方案……我们不以血统论罪，但也绝不容忍剥削的延续。愿意放下特权、与人民站在一起的，我们敞开怀抱；顽固不化、妄图维系旧日荣光的，则必须接受历史的审判。"
SFR_rebuild_southwest_infrastructure:0 "重建西南基建"
SFR_rebuild_southwest_infrastructure_desc:0 "多年的战火与掠夺，将我们刚刚收回的西南领土变成了一片满目疮痍的废墟。断裂的铁路、荒废的工厂、坍塌的桥梁……如今，我们的任务便是将之重建，每修复一段铁路，就是为西南的复兴多铺一段坦途；每重建一座工厂，就是为人民的生活多添一份保障。"
SFR_integrate_southwest_territories:0 "整合西南领土"
SFR_integrate_southwest_territories_desc:0 "当红旗遍插西南的群山，真正的考验才刚刚开始。解放带来的是自由，但自由需要秩序来守护；光复收回的是土地，但土地需要治理来激活。西南这片新生的疆域，还残留着旧时代的裂痕与隐患……打江山易，守江山难——面对这艰难的任务，我们必须交上一份完美的答卷。"
SFR_revolutionary_new_star_of_east_bastia:0 "东巴斯蒂亚的革命新星"
SFR_revolutionary_new_star_of_east_bastia_desc:0 "从最初那面在远乡飘扬的孤零零的红旗，到如今收服完成的辽阔疆域——我们走过了一条浸透鲜血与信念的道路。曾几何时，反动派将我们视作随时可以碾碎的火星，渐渐地，他们不得不调动大量的军事力量对我们围追堵截，到后来，他们便不得不与我们以命相搏，而今，我们不仅已经将反动派扫入历史的尘埃，连他们昔日无法战胜的外国帝国主义也被我们击退，吐出了在远乡身上撕咬的血肉。我们已在这片饱受战乱的土地上，燃起了一颗谁也无法忽视的革命新星。然而，胜利者面前永远摆着新的抉择。星火已经燎原，但我们要问自己：这颗赤色的新星，究竟应当照亮怎样的未来？"
SFR_final_revolutionary_bastion:0 "最后的革命堡垒"
SFR_final_revolutionary_bastion_desc:0 "放眼东巴斯蒂亚，红旗仍是孤独的。在这片被帝国主义与旧秩序统治的土地上，我们是唯一举起革命火炬的力量，是黑暗汪洋中一座孤悬的堡垒。既然身边没有同志，那我们便自己成为那束光。我们不会等待救援，也不会指望怜悯——革命者从来都是在孤立无援中开辟道路的，昔日如此，今日亦然。"
SFR_we_are_not_alone:0 "我们并不孤单"
SFR_we_are_not_alone_desc:0 "多么令人振奋的消息！在东巴斯蒂亚这片热土之上，还有其他的红旗正在升起——我们不再是这片土地上唯一的革命火种！还有与我们志同道合的同志，还有同样为了解放而奋斗的兄弟。那么，还有什么理由让我们各自为战？让我们团结起来吧，汇聚成一股无人能挡的洪流！让我们伸出双手吧，加入同志们的行列！让我们并肩作战吧，共同缔造一个真正属于人民的东巴斯蒂亚！"
SFR_we_are_not_alone_tr:0 "§t东巴地区存在我们之外的共产主义同盟。§!"
SFR_we_are_not_alone_tt:0 "§R团结一致，让我们加入同志们的行列！§!"
SFR_raise_the_red_flag:0 "扛起红旗"
SFR_raise_the_red_flag_desc:0 "既然我们是东巴大地之上唯一的红星，那我们就必须以最坚定的姿态，把这面红旗高高扛起。这不再仅仅是远乡一隅的旗帜，而是整个东巴被压迫者的希望所系。我们将是黑暗中的灯塔，是散落各地的进步力量得以团结的旗帜，扛起这面红旗，意味着我们不再是被动的守望者，而是主动的领导者。前路纵有千难万险，只要红旗不倒，希望便永不熄灭。让它飘扬在东巴斯蒂亚的上空，昭示一个崭新时代的到来。"
SFR_reorganize_revolutionary_theory:0 "整顿革命理论"
SFR_reorganize_revolutionary_theory_desc:0 "一场真正的革命，不能仅靠热血与枪炮维系，更需要坚实的思想根基作为灵魂。我们要系统地梳理革命的方向，肃清队伍中的模糊认识与投机思想，让每一位同志都明白：我们为何而战，为谁而战，又将走向何方。唯有理论上的清醒，才能确保行动上的坚定；唯有思想上的统一，才能保证阵营的团结不被任何风浪撕裂。"
SFR_unify_military_operations:0 "统一军事行动"
SFR_unify_military_operations_desc:0 "革命既要有坚定的信念，也要有锋利的爪牙。零散的部队、各自为战的指挥，永远无法应对帝国主义者的联合绞杀。我们需要将我们的武装力量整合成一个统一而高效的整体了——理顺军队的指挥体系，提升部队的职业素养，让每一支队伍都能如臂使指、令行禁止。更重要的是，我们的革命同志同样在为解放而奋斗。协调彼此的军事行动，统一步调，才能形成压倒一切反动势力的合力。"
SFR_ideological_diplomacy:0 "意识形态外交？"
SFR_ideological_diplomacy_desc:0 "摆在我们面前的，是一个关乎国家未来走向的根本抉择。在这个被帝国主义与反动势力割据的东巴斯蒂亚，我们究竟应当如何与外部世界打交道？是超越意识形态的分歧，与一切可以合作的力量务实周旋，只求为国家赢得喘息与发展的空间？还是坚定地以主义划线，紧紧团结志同道合的同志，把革命的情谊置于一切考量之上？"
SFR_solve_trade_issues:0 "成立对外联络部"
SFR_solve_trade_issues_desc:0 "要在这错综复杂的东巴斯蒂亚立足，我们需要一个专门的机构，来处理与外部世界千丝万缕的联系，当然……这个部门实际上的职责，远不止于往来交涉。它将成为我们伸向境外的触角，搜集敌人的情报，联络潜在的盟友，在暗处编织起一张覆盖四方的情报网络。"
SFR_contact_overseas_expatriates:0 "联络境外侨民"
SFR_contact_overseas_expatriates_desc:0 "在这片广袤的大地上，散落着无数远乡的游子。他们或因战乱背井离乡，或为生计漂泊他方，但故土的呼唤，从未在他们心中真正消散。如今，家园已经解放，新的秩序正在建立，是时候向这些流散在外的同胞伸出双手了。我们要主动联络这些境外侨民，向他们传递祖国重生的消息，邀请他们回到这片浴火重生的土地，每一双归来的手，都是复兴事业不可或缺的力量。"
SFR_free_the_people_of_east_bastia:0 "解放东巴人民！"
SFR_free_the_people_of_east_bastia_desc:0 "我们从来不曾忘记，在远乡边境之外，还有千千万万仍在压迫下呻吟的兄弟姐妹。整个东巴斯蒂亚，依旧笼罩在帝国主义与反动势力的阴云之下。当我们的家园已经沐浴在革命的阳光里，又怎能对更多无产同志的苦难视而不见？因此我们的革命绝不能止步于自家的边界，我们所追求的解放，是让红旗插遍这片土地的每一寸角落，是让每一个被奴役的人民都能挺直腰杆、当家作主！"
SFR_free_the_people_of_east_bastia_tt:0 "§R将赤旗插满东巴斯蒂亚！§!"
SFR_focus_on_domestic_construction:0 "聚焦国内建设"
SFR_focus_on_domestic_construction_desc:0 "一个真正强大的国家，终究要建立在坚实的内部根基之上。连年的战乱已让这片土地伤痕累累，人民渴望的，不只是旗帜上的荣光，更是屋檐下的安宁。我们应当选择收回目光，放下热血与野心，把我们的精力投向脚下这片饱经沧桑的家园。修复破碎的工业体系，再兴趋向凋敝的农业，让机器重新轰鸣，让田野重现丰饶。我们要让人民的生活一天天好起来，让新生的政权在民心的沃土中深深扎根……毕竟发展才是硬道理，美好的生活才是所有人的终极追求。"
SFR_promote_multilateral_cooperation:0 "促进多边合作"
SFR_promote_multilateral_cooperation_desc:0 "既然我们并非踽踽独行，那么携手起来、共谋发展便是理所当然的选择。我们应当主动推动与同志国家之间的多边合作，将各自的长处汇聚成共同的优势，在平等互利的基础上，让彼此的经济血脉相互连通、相互滋养，让贸易的往来打破封锁，让建设的成果惠及各方。"
SFR_exchange_revolutionary_theories:0 "意识形态交流"
SFR_exchange_revolutionary_theories_desc:0 "一直以来能真正将革命者紧紧联结在一起的，都是共同的信念与理想。我们与同志国家之间，不仅要有物的往来，更要有思想的碰撞与智慧的交融。因此，我们需要搭建起意识形态交流的桥梁，坦诚地分享彼此在革命道路上的经验与教训。他们的成功，是我们可以借鉴的明灯；我们的探索，也能为他们提供有益的参照。"
SFR_scientific_cooperation_treaty:0 "科研合作条约"
SFR_scientific_cooperation_treaty_desc:0 "在这个日新月异的时代，科学技术的进步，已成为衡量一个国家能否立于不败之地的关键。闭门造车终将落后，唯有开放共享，方能奋起直追，我们需要与同志国家构筑社会主义的科研同盟，集众人之所长。科技是第一生产力，也将是我们手中最锋利的武器。"

SFR_reorganize_workers_and_peasants_red_army:0 "重整工农红军"
SFR_reorganize_workers_and_peasants_red_army_desc:0 "革命胜利从来不意味着战争结束。旧王国的旗帜已经倒下，贵族军官们的司令部也被人民接管，可摆在我们面前的军队仍然不能被称作一支真正的国家军队：有些部队脱胎于山林游击队，有些来自临时起义的工人纠察队，还有些则是刚刚倒戈的王国军士兵。他们曾为解放事业流血，可光有勇气并不能维持一个新生共和国的安全。\n\n我们必须重新审视这支军队。番号、补给、指挥链、军纪、训练方式，以及那些在战争中被迫形成的临时习惯。工农红军曾在最黑暗的日子里保存了革命的火种，如今，它也必须从游击战争的阴影中走出，成为守卫人民之国的钢铁长城。"
SFR_rebuild_red_army:0 "重建红军"
SFR_rebuild_red_army_desc:0 "战争结束后，最先被送到军委桌上的不是胜利报告，而是各部队的整编名单。许多部队仍沿用根据地时期的编制，有些连营级单位只剩下番号，装备来源也相当混乱：缴获的王国军步枪，临时改造的火炮，工人队伍带来的土枪，全都被塞进了同一套补给体系里。\n\n这不能继续下去。陆军是新政权最先需要依靠的力量，也是最先需要被重新整理的部门。我们将统计现有部队，统一基层编制，恢复军官训练，并把那些在游击战争中积累下来的经验整理成可被传授的训练内容。\n\n红军打下了这个国家，现在它必须学会守住这个国家。"
SFR_new_equipment_production_line:0 "新式装备生产线"
SFR_new_equipment_production_line_desc:0 "红军已经完成了基本整编，接下来就不能再继续依赖战时留下来的旧仓库和零散工坊了。过去各地根据地各自生产武器，型号杂、零件乱，修理和补给都很麻烦，还浪费资源；缴获装备虽然能用，但也面临类似的问题。\n\n我们将集中资源建设新的军工生产线，优先扩充步兵武器、基础火炮和常用军需品的制造能力，同时统一一部分常用规格，减少前线和后方之间反复调运、重复维修的问题，建立更加有效的生产线。"
SFR_revival_of_armor_research:0 "复兴装甲科研"
SFR_revival_of_armor_research_desc:0 "游击战争时期，红军没有条件研究装甲部队。缴获来的装甲车辆大多被拆成零件，用来修卡车、补火炮，或者干脆停在仓库里当固定火力点，还有可移动掩体。现在情况不同了。新的装备生产线已经开始运转，军委也终于有余力重新审查过去被搁置的装甲项目。\n\n我们将恢复装甲技术档案，召回仍愿意为共和国工作的工程师，重建试验场，并把王国军留下的坦克、装甲车和机械化载具统一登记。短期内，我们还不太可能造出让人满意的新式装甲部队，但至少可以先解决一些基本使用，维护流程和科研的问题。毕竟，千里之行始于足下。"
SFR_shift_to_magic_equipment:0 "转向魔导装备"
SFR_shift_to_magic_equipment_desc:0 "装甲车辆需要完整的工业体系，发动机、传动装置、装甲钢板和维修车间缺一不可。共和国刚刚接管全国，许多工厂还在清点设备，铁路和矿区也没有完全恢复；即便考虑到接管王国的资产，我们的科研能力也并不强。如果现在强行推行装甲部队计划的话，可能只会白白浪费资源。\n\n相比之下，魔导装备更适合我们现在的情况。它对传统重工业的依赖较低，可以先从步兵班组、工兵部队和炮兵观察单位开始试用。让我们将把有限的科研力量转向便携式魔力增幅器、附魔弹药、魔导通讯设备和战场防护装置，帮助普通部队先获得能够投入实战的改良装备。"
SFR_artillery_development:0 "火炮开发"
SFR_artillery_development_desc:0 "不论时代如何变化，陆军都不能缺少火炮。红军过去很少拥有稳定的炮兵力量，许多火炮来自缴获，口径不一，弹药储备混乱，运输和维护也经常靠前线部队自己想办法解决。这样的炮兵几乎无法支撑一场正规战争。\n\n军工部门将优先恢复火炮生产与弹药配套，清点王国军留下的物资设备，并组织专门人员重新编写炮兵训练手册。我们至少要保证同一批部队能用上同一规格的弹药，炮兵指挥能和步兵前线保持联系，维修单位也能知道自己到底该修什么。"
SFR_rifle_development:0 "步枪研发"
SFR_rifle_development_desc:0 "红军的步兵武器来源太杂。根据地时期用过土造枪，缴获过王国军步枪，也从地方仓库里翻出过封存多年的南巴货。许多枪械还能开火，但口径、零件和保养方式各不相同，后勤部门光是整理弹药清单就要花掉大量时间。\n\n军工部门将从最基础的步枪开始统一标准。现有装备中能继续使用的会被登记翻修，不适合列装的则拆解回收；新的生产方案将优先考虑耐用、易修、适合大规模训练，而不是追求复杂设计。对共和国陆军来说，先让每个步兵班都能稳定拿到同一套武器，比少量先进样品更重要。"
SFR_expand_military_industry:0 "扩大军工产业"
SFR_expand_military_industry_desc:0 "步枪和火炮项目已经启动，但现有工厂很快就暴露出产能不足的问题。旧王国留下的军工设施分布不均，部分厂房设备老化，部分地区则只有仓库和维修站，无法承担真正的批量生产。前线要装备，训练部队要弹药，后勤单位还要预留替换零件，单靠原有生产线远远不够。\n\n我们将在多个国内地区扩建军工厂，优先建设枪械加工、炮弹装填、零件铸造和车辆维修相关设施。地方政府需要负责征地、供电和劳工调配，军委则会派人监督生产标准，避免各地又造出一批规格不同的“地方型号”。"
SFR_new_artillery_units:0 "新炮兵部队"
SFR_new_artillery_units_desc:0 "有了新的火炮和更稳定的军工产能后，炮兵就不能再只是步兵部队临时拉来的附属火力。过去红军的炮兵单位数量少，训练不统一，许多炮手会开炮，却不一定知道如何配合步兵推进、修正弹着点，或是在转移阵地时保住自己的装备。\n\n军委将开始组建专门的炮兵部队，统一炮兵连、炮兵营的编制，并为各军配属固定的火力支援单位。炮兵学校也会恢复课程，重点训练观测、测距、通讯和阵地转移，帮助实现炮兵单位的现代化。\n\n很快，我们就将建立属于远乡人民的现代化炮兵部队。"
SFR_new_training_standards:0 "新式训练标准"
SFR_new_training_standards_desc:0 "红军在整编后已经有了较为统一的番号和装备，但训练问题仍然很明显。有些部队是在山里打了很多年游击的老兵，熟悉伏击、转移和夜间行军；有些部队则是解放后才补进来的新兵，连最基本的队列、射击和工事构筑都不会。若继续让各部队按照自己的老办法训练，军委很难判断一支部队到底能不能投入正面战场。\n\n我们将废除过去那套几乎没有统一标准的训练办法，改由中央军委制定新的基础训练条例。新兵入伍后必须完成体能、射击、野外行军、班组协同和基础政治教育，老兵部队也要按新标准重新考核。各地训练营会保留一部分地方经验以适应特殊情况，但最终考核和军官评定必须由中央统一执行。"
SFR_party_commands_the_gun:0 "党指挥枪"
SFR_party_commands_the_gun_desc:0 "红军重建之后，另一个问题很快摆到了军委面前：这支军队究竟听谁的。\n\n过去在游击战争时期，各根据地长期分散作战，部队跟着地方干部走、跟着老指挥员走的情况并不少见。有些做法在当时是为了生存，如今却不适合继续保留下去。全国解放之后，红军不能变成若干支各行其是的地方武装，更不能让指挥员凭资历和威望随意调动部队。\n\n党中央将着手明确军队的政治领导关系，在各级部队内恢复并完善党委、支部和政治干部体系，把作战指挥、干部任命、部队教育和纪律监督重新纳入统一框架。"
SFR_task_based_command_mode:0 "任务式指挥模式"
SFR_task_based_command_mode_desc:0 "党中央已经明确了军队的领导关系，但具体打仗的时候，命令不可能从平京一路细到每个营连。远乡地形复杂，山区、河谷、城镇和旧军防线混在一起，许多前线情况等不到总参谋部开会讨论。过去游击战争留下来的地方经验没必要全盘保留，但其中并非没有可取之处。\n\n军委将把作战命令改为更明确的任务制：上级负责规定目标、时限、政治要求和可调动资源，下级指挥员则在战场范围内自行决定或调整具体执行方式。这样做要求军官更熟悉部队状况，也要求政治干部能及时判断行动有没有偏离党的路线。\n\n我们不会允许任何部队借“灵活指挥”变成地方山头，这一指导方针的前提仍然是统一纪律、统一汇报和统一追责，只是在枪声已经响起的时候，让离战场最近的人有权先做决定。"
SFR_large_formation_concentration_command:0 "大兵团集中指挥"
SFR_large_formation_concentration_command_desc:0 "任务式指挥适合经验丰富、情况复杂的前线部队，但现在的红军并不只有老游击队。新兵团，刚完成整编的地方部队，以及从旧体系中接收来的军官，都还需要一套更稳定的指挥方式。若让各级指挥员过早自行判断，前线很可能出现计划脱节、火力支援延误和部队重复投入等问题。\n\n军委将改组方面军与集团军司令部，把主要作战计划集中到更高层级制定。进攻方向、预备队投入、炮兵支援、补给线路和撤退方案都必须提前写入作战命令，再由下级部队按阶段执行。各军可以提出修改意见，但不能在战役中随意改变整体部署。\n\n这会牺牲一部分前线灵活性，不过，对一支刚完成重建的陆军来说，先让多个军、多个师能按同一张作战图行动，比鼓励每个指挥员自由发挥更现实。"
SFR_people_officer_corps:0 "人民军官团"
SFR_people_officer_corps_desc:0 "红军能靠热情拉起队伍，却不能长期靠热情解决指挥问题。过去根据地缺干部，许多连排军官都是边打边学，谁资历老、谁识字、谁打过几场硬仗，谁就先顶上去。这种办法在以前还能凑合，一旦部队规模扩大，炮兵、工兵、通讯、后勤都要分开建设，临时拼凑出来的指挥体系就明显不够用了。\n\n军委将正式建立现代化的军官团体系，从部队骨干、基层党员、老兵和可靠的青年积极分子中选拔指挥人才，统一送入军校、教导队和短训班培养。今后的军官任用会着重参考实战经验、组织能力和政治表现，而非所谓的“资历”。优先提拔能打仗，能带兵的军官。"
SFR_implement_military_democracy:0 "落实军事民主"
SFR_implement_military_democracy_desc:0 "红军不是旧王国的军队，士兵也不是被军官随意调拨的消耗品。如果基层问题只能层层上报，再等后方批示，许多矛盾最后只会拖成逃兵、怠战和干部失信。\n\n军委将推动军事民主制度，在连队和营级单位设立士兵会议、意见记录和定期评议制度。训练安排、生活待遇、基层干部作风、物资分配和战前准备，都可以在规定范围内提出意见。政治干部负责监督讨论不偏离纪律，军官则必须对合理意见作出回复，而不是简单的把问题压下去。\n\n这能帮助我们更早发现基层问题，改善士兵对军队的信任，并让作战计划更贴近实际情况。红军要成为人民的军队，就不能只在宣传文件里做做文章。"
SFR_elite_reconnaissance_units:0 "精锐侦察部队"
SFR_elite_reconnaissance_units_desc:0 "红军过去也很重视战前的侦察活动，但大多依赖经验丰富的老兵，任务也基本依赖地方部队的临时需求：探路、传令、摸哨、带路等等，却很少有真正固定的建制和训练。现在部队整编已经推进，基础训练标准也逐步统一，军内反映情况的渠道也比以前顺畅，军委终于可以把侦察工作单独提出来，按专门兵种建设。\n\n我们将从各部队中挑选体能较好、战场经验丰富、熟悉地形、政治上可靠的骨干，组建精锐侦察分队。这些部队需要接受地图判读、隐蔽接敌、夜间行动、火力引导、战场观察和复杂地形生存训练。山地、丘陵、林地和破碎地带将成为他们重点活动的区域，前线指挥员也需要学会依靠侦察结果来调整部署，而不是像过去那样凭经验做决定。"
SFR_strict_military_standards:0 "严格军事准则"
SFR_strict_military_standards_desc:0 "红军正在从革命战争中的武装组织转变为共和国的正规军，纪律不能继续只靠老兵威望、政治觉悟和临场训斥来维持。\n\n军委将重新修订军纪条例、战场处分办法和干部责任制度。逃兵、私自离队、抢夺民财、克扣补给、擅自改变命令等问题都要有明确处理流程；军官若滥用权力、虚报战果、隐瞒损失，也必须接受审查。基层士兵可以通过规定渠道反映问题，但作战命令一旦下达，所有单位都必须按时执行。\n\n新共和国不能养出一支只会在胜利时高呼口号、遇到压力就各自为战的军队。军队要保护人民，首先就要让人民知道，这支军队有规矩，也有人会为破坏规矩付出代价。"
SFR_learn_from_past_experience:0 "吸取过去的经验"
SFR_learn_from_past_experience_desc:0 "红军经历过长期游击战争，也参加过全国解放中的大规模作战，但很多经验还停留在老兵口述、地方部队习惯和临时总结里。哪些办法适合游击作战，哪些办法只是在特定情况下碰巧有效，哪些失败本该避免，都需要重新整理。\n\n军委将组织各部队提交战斗报告，集中整理根据地时期、解放战争时期和旧王国军队遗留下来的作战档案。参与过关键战役的军官会被调往教导队和军校，向新一批指挥员讲清楚实际发生过的战役和各类情况，帮助实现军事理论的现代化。"
SFR_ideological_propaganda:0 "意识形态宣传"
SFR_ideological_propaganda_desc:0 "政治工作不能仅仅停在文件和组织关系上。许多新解放地区的群众并不了解共和国的主张，前线士兵里也有相当一部分人只是因为土地改革、地方动员或者部队整编才进入红军，并不了解革命的思想。若是不尽快把宣传工作铺开，部队纪律、征兵动员和后方稳定都会受影响。\n\n党中央将扩大宣传队、战地报刊、识字班和基层宣讲网络，完善政委体系，努力把革命的目标向普通士兵讲清楚：为什么要继续作战，为什么要服从组织，为什么一定要打碎旧世界，建立一个属于人民的新政权。在宣传和组织工作中，一批会讲话、能组织、敢负责的积极分子也会被筛选出来，他们中的许多人以后都可以进入军队和地方的干部队伍。"
SFR_national_military_training:0 "全民军事训练"
SFR_national_military_training_desc:0 "宣传工作铺开以后，动员正式从街头告示进化到了深入社会的地步。许多新解放地区刚刚完成接管，地方治安、粮食运输和后备兵源都需要有人维持，许多地方的人力都有些告急。\n\n因此，党中央将推动全民军事训练制度，在工厂、乡村、学校和地方机关中建立基础训练班。训练内容不会完全按照正规军标准执行，而是优先教授队列、射击、急救、工事修筑、交通管制、简易通讯和防空疏散等技能，或者协助学校给学生们找点事儿干，社区义工等。与此同时，适龄青年还会被登记为后备兵源，退伍老兵和基层党员负责带训，地方政府则配合安排训练场地和物资。\n\n毕竟，我们生活在一个动荡不安的年代。"
SFR_gradual_return_to_normalcy:0 "专注精锐部队"
SFR_gradual_return_to_normalcy_desc:0 "我国虽然人口众多，但粮食和军械都有限，军事现代化程度也并非世界前列，若一味扩大征募范围，最后得到的往往只是更多缺乏训练的新兵，以及更沉重的后勤负担，和一群没有意义的炮灰部队——而这显然和我们的政治理念不符。宣传工作已经为我们提供了足够稳定的政治基础，接下来需要考虑的，是把有限的人力和物资优先集中到现代化的精锐部队，而不是一昧的扩张民兵。\n\n阵线将收紧征兵标准，把更多资源投向老兵、基层骨干和表现较好的新兵连队，优先补足他们的武器、训练时间和干部配备。各部会重新整理编制，淘汰不合格人员，压缩只会消耗物资却难以形成战斗力的臃肿单位，再从中抽调出一批能够执行突击、穿插和坚守任务的精锐部队。这样做会让动员速度放慢，但留下来的部队会更有组织，指挥更顺畅，攻防能力也更可靠。与此同时，军中干部体系也能在这种较小规模、较高标准的建军方式下逐步稳定下来。"
SFR_militia_issue:0 "武装民兵问题"
SFR_militia_issue_desc:0 "战争时期，各地民兵承担了许多正规军顾不上的任务。他们守过村口，护送过粮队，给主力部队带过路，也在旧军撤退后接管过仓库、桥梁和镇公所。许多人并不是职业军人，却在最混乱的时候维持住了地方秩序。\n\n但战争结束后，问题也随之出现。部分民兵组织仍保留着自己的武器和地方指挥关系，听从地方政府和武装组织的命令，仅仅在名义上接受军委登记。中央一部分人希望民兵武装接受整编，一部分则希望反过来进一步扩张；地方干部担心裁撤过快会影响治安和国家安全；民兵代表则希望无论如何，至少进行一定程度的安置。\n\n军委和党中央必须对这一问题作出决定。是裁剪过多的武装民兵，将资源集中给正规军；还是保留现状，在制度上做些修补；又或者进一步扩大民兵规模，让地方武装成为共和国防务的一部分。"
SFR_establish_military_academy:0 "新建军事学院"
SFR_establish_military_academy_desc:0 "红军并不缺敢打仗的人，但很缺受过系统训练的军官。过去的部队靠老干部带新兵、靠实战积累经验，真到了整编全国武装、建立常备军的时候，这种办法显然无法持续，更何况以前的办法也无法帮助军事人员获得更加系统性的专业知识。到了这一步，就不能继续等实战再积累经验了。\n\n为了解决这个问题，军委决定在后方设立新的军事学院，抽调有实战经验的老红军、技术兵种骨干和少数可靠的知识分子担任教员，对各部队选送的干部进行集中培训。课程除了书本上的条文，还包括游击战时期积累下来的实际经验和案例，再补上现代军队所必须的参谋、指挥、组织和纪律训练。今后，红军要培养的不只是会普通的战士，也要有能带兵、能写计划、能处理复杂情况的军官。"
SFR_people_logistics_units:0 "人民后勤部队"
SFR_people_logistics_units_desc:0 "解放后的红军很快意识到，许多曾经负责运粮、看护伤员、修路架桥和转移物资的基层人员，比起拿着步枪上前线，更适合被纳入一套稳定的后勤体系中。过去根据地的补给靠乡亲帮忙、民兵护送和干部临时调度撑过了最艰难的时期，但这对于新的全国性军队而言并不够，除非我们还活在封建时代。\n\n因此，中央决定组建人民后勤部队，将各地运输队、仓库管理人员、修理工、医护辅助人员和部分经验丰富的民兵统一整编。新的后勤部队需要负责前线补给线维护、车辆调度、弹药分发、伤员后送和简易道路修缮。卡车、仓库和人力集中管理，并且组建对应的后勤保障团队和与其它军事力量的协调机制。"
SFR_consolidate_our_strength:0 "凝聚我们的力量"
SFR_consolidate_our_strength_desc:0 "工农红军已经不再是只能依靠勇气和地形苦撑的游击队。侦察部队带回敌军阵地与补给线的情报，军事学院开始培养能理解现代战场的军官，而过去一次次胜利与惨败留下的经验，也终于被整理成可以执行的作战准则。我们已经掌握了比以前更强大的力量，而接下来的重点在于如何把这些力量集中到同一个方向上。\n\n新的作战方针将围绕火力协同展开。炮兵不应只是战斗的附属单位，而应成为步兵推进、阵地突破和防御反击的核心支撑。侦察人员负责确认目标，前线军官负责修正射击，步兵部队则在炮火打开缺口后迅速跟进。每一门火炮、每一支小队和每一份战场报告，都必须被纳入统一的指挥链中。\n\n以前的我们缺枪少炮，而现在我们将用无尽的火力压倒敌人。"
SFR_utilize_our_advantages:0 "利用我们的优势"
SFR_utilize_our_advantages_desc:0 "工农红军还没有足够的火炮、车辆和重型装备去模仿那些老牌强国，而我们的科研体系也需要时间去追赶。即便军工厂已经开始恢复生产，学院也在培养新军官，短期内我们仍然不可能让每个师都获得充足的炮兵支援和机械化运输。与其把有限资源全部压在少数样板部队上，不如将我们过去几十年以来游击战争的经验运用到极致，将人民战争的理论真正发扬光大。\n\n军委将围绕这一点调整作战理论。侦察部队负责寻找敌军薄弱处，军官团负责把战斗分解成可以执行的阶段，步兵则通过多方向推进、持续压迫、轮换补充和近距离穿插来撕开防线。和那些愚蠢的前现代军队不同，我们并非让子弟兵排队去送死，而是依靠更密集的基层组织、更快的补充能力和更强的进攻韧性，让敌人在一处守住之后，又不得不面对另一处新的压力，并最终迎来防线的崩溃。\n\n只要我们能把人数、组织和战场经验结合起来，红军就能用自己的方式打赢接下来的战争。"
SFR_artillery_strike:0 "火炮侵袭"
SFR_artillery_strike_desc:0 "去不少部队把火炮当成一种昂贵但笨重的附属装备，用得谨慎异常，把炮弹当神仙供起来，调动迟缓，往往等到前线已经陷入僵持，炮兵命令才刚刚层层传下来；或者干脆交给现场部队随机发挥，时不时拿去炮打一下某个不知名的林地。这样打不出效果，也浪费了我们本就有限的炮兵资源。\n\n军委将把正式修改军事条例。侦察分队负责确认敌军阵地、机枪火力点和预备队位置，炮兵根据步兵推进节奏分段射击，在进攻发起前压制敌军火力，在步兵接敌后继续提供近距离支援。对突破作战来说，我们需要利用火炮替步兵打开缺口，打乱敌人的反应，让前沿部队能更快冲进阵地，并且实现对重型装备的压制。\n\n我们需要让我们的炮兵成为进攻中最先落下、最先决定局势的一击！"
SFR_full_speed_breakthrough:0 "全速突破"
SFR_full_speed_breakthrough_desc:0 "火炮压制只能争取短暂的窗口。敌军阵地被炮击打乱后，若步兵仍按过去的速度等待命令、重新集结、逐级请示，那么炮弹炸开的缺口很快就会被填上。因此，军委将调整突破作战流程，加强炮击、步兵冲击、预备队投入和后续扩大战果等一系列作战任务的协同。突击部队必须提前领取地图、弹药和简易工兵器材，在炮火转移的同时进入敌军前沿阵地；后续部队则负责清理残余火力点、控制道路和接应伤员。\n\n我们需要利用我们几十年以来磨练出的精锐的步兵战术，和强力的火炮攻势配合好，在敌人展现弱点时第一时间突破，最大程度的减少伤亡，并且一举突破防线，彻底击碎他们的指挥体系。"
SFR_small_unit_tactics:0 "小编制战术"
SFR_small_unit_tactics_desc:0 "远乡的地形几乎不允许整齐的大战线推进。山路、林地、村镇、河谷和山脉把战场切得支离破碎，几十年以来的游击战争帮助我们积累了大量的经验，我们懂得如何运用灵活的小型部队战术，绕开敌人的火力点，并且快速推进战线，夺取重点目标。现在，是时候让我们把这些经验进一步发扬光大了。\n\n红军将开始推广更灵活的小编制战术。班、排、连级单位会得到更明确的战术任务，允许基层军官在通讯中断或地形变化时自行调整前进路线。训练内容也会加入相关的战术考核，加强士兵之间的协同能力。"
SFR_heavy_units_clear_the_way:0 "重装部队开路！"
SFR_heavy_units_clear_the_way_desc:0 "当代几乎不存在纯靠步兵就能打赢的战争，我们不能把过去游击战争的历史当永远。像是山口、桥头、城镇外围和敌军临时构筑的坚固火力点，为了撕开足够大的口子，我们往往需要把更硬的东西顶上去。\n\n军委将抽调现有最好的装甲车辆和重火力载具，编成专门的突击部队，用于承担突破正面、压制火力点和掩护步兵跟进的任务。由于数量有限，我们会把这些部队集中投放到最关键的地段，然后重新安排其它特殊兵种与装甲部队协同流程，强化步坦协作的训练模式——尽管这可能需要漫长的磨合期。"
SFR_modern_maneuver_warfare:0 "现代机动战争"
SFR_modern_maneuver_warfare_desc:0 "自数十年前开始游击战争以来，我们已经历许多，而世界也发生了翻天覆地的变化。\n\n从威腾摩斯的魔导军团，到南巴斯蒂亚的机械泰坦，新的火炮，装甲部队，步兵的机械化，信息化，各类战术层出不穷；敌人不再像曾经的王国军队一样一队队搜索根据地，而是能在数小时内完成转移、用炮火封锁道路、用载具快速轮换预备队的现代军队。\n\n红军也不能停在过去。我们已经重新整理军官体系，建立训练标准，恢复后勤和炮兵单位，并开始让重装部队承担突破任务。而我们接下来也将继续强调这些兵种之间的协同作战，加强部队整体的作战能力。\n\n我们需要在战争的每个环节里都能短时间作出反应，也要求各级指挥部知道整合手头的信息，加强部队的管理并明确作战目标。共和国的军队不能只满足于从山里走出来，也必须学会在日新月异的战场上灵活的作战。未来的战争不会等待我们慢慢适应，我们只能先一步完成改变，从而保卫人民，保卫我们来之不易的新远乡。"
SFR_summarize_light_infantry_tactics:0 "总结轻步兵战术"
SFR_summarize_light_infantry_tactics_desc:0 "在过去数十年游击战争的大多数时刻，红军都没有足够的火炮、车辆和重装备。我们的战士在山路间转移，在林地里宿营，在夜色中穿过封锁线，把弹药分给叫不上名字的支队，把人员转移到百姓的家中。这些战斗大多作为黑暗时代的回忆消失了，只留下几页发皱的报告、几张画得歪歪扭扭的草图，或许还有几张找百姓借东西的证明。\n\n如今，远乡已经基本回到人民手中。也该是时候把这些年战士们用血换来的经验整理清楚了——伏击、穿插、夜袭、分散行军、临时补给、山林侦察、小单位协同，以及在不存在任何重火力支援时继续推进，或是至少保存有生力量的办法。这些宝贵的经验会成为我们未来步兵部队建设的重点，烈士们不会被遗忘，这一切都会为红军未来的军事建设进一步添砖加瓦，让世界见识一下远乡人民的智慧与力量吧！"
SFR_specialized_engineer_corps:0 "专业工程兵团"
SFR_specialized_engineer_corps_desc:0 "专业的工程兵是现代军队不可或缺的一部分。早在转入游击作战之前，革命党就有训练专门的工兵营的打算，然而局势风云变幻，转入游击作战的工农红军不得不长期面临缺乏技术兵种的现实。虽然解决方案并非没有——会炸桥的矿工、懂木工的村民、修过铁路的老工人、能在雨夜里摸清山路的侦察兵，在人民的帮助下，红军勉强实现了一部分技术兵种的运用。\n\n但这显然还不够。\n\n如今，这些工作不能再靠临时指派的人手和老兵的经验维持。军委将正式组建专业工程兵团，把爆破、筑路、架桥、测绘、排雷和野战工事建设分成不同单位，并建立专门的工兵训练课程。各军也会配属固定的工程分队，负责在进攻前开辟道路，在防御时加固阵地，在部队转移时保障桥梁、渡口和补给线。远乡的地形复杂，而我们周围的东巴斯蒂亚地区也是如此，我们需要尽快实现这一系列技术兵种的现代化。"
SFR_fearless_children_of_the_revolution:0 "子弟兵无所畏惧！"
SFR_fearless_children_of_the_revolution_desc:0 "红军的名单上没有多少显赫的姓氏。这里有从矿场里走出来的工人，有在山地根据地里长大的孩子，有失去土地的农民，有不愿再为国王卖命的士兵，也有许多连字都认不全、却知道自己为什么拿起枪的人。过去，他们在泥泞里推着炮车，在夜里背着炸药过河，在没有军医和补给的情况下守住阵地，直到援军抵达，或者直到最后一个人倒下——就像无数的根据地一样。\n\n但如今，革命已经走到这里。是的，我们面临内部斗争；是的，我们外部仍然威胁重重。可为了新生的祖国和其千千万万的子女，我们决不能退缩。军委将把整编、工兵、训练、后勤和基层政治工作统一纳入新的军队建设计划。每一支部队都要知道自己的任务，每一名士兵都要知道身旁的人为何而战。\n\n他们不是为了军功章而战，也不是为了某个司令部里漂亮的地图而死。他们从村镇、工厂、学校和废墟中走来，背后站着自己的父母、孩子、邻居和同志。只要这些人还在，只要远乡的土地上还有人相信革命胜利后的日子会比过去更好，红军就不会退后。"
SFR_battlefield_is_full_of_changes:0 "战场千变万化..."
SFR_battlefield_is_full_of_changes_desc:0 "有些人会怀念所谓美好而简单的过去，在这个飞速变幻的世界里，这倒也无可厚非——只要我们别真的把这些想法当回事就好。现代战争的变化可谓翻天覆地，游击战争初期的战斗和后期的全国解放就有着的巨大的差别，更别提南巴斯蒂亚和威腾摩斯日新月异的新技术和学说理论了。\n\n红军必须学会处理这些麻烦，并且追赶上时代。我们数十年以来游击战争的经验帮助我们锻炼出了世界上顶尖的轻步兵战斗理论，而接下来是时候推进信息化和指挥结构的改革帮助部队适应更复杂的情况了。技术兵种们必须协同起来，通讯兵需要在极端情况下协调前线部队的部署，工兵要能在炮击后恢复道路，侦察分队要学会辨认假阵地和诱饵，基层指挥员必须能做到随机应变——否则可能全盘皆输。"
SFR_we_are_already_prepared:0 "...而我们早有准备！"
SFR_we_are_already_prepared_desc:0 "诚然，虽然已经竭尽全力，红军仍然落后于世界先进水平。不过，我们不需要在方方面面都追赶一流水平——至少现在不用——而是优先专注做好力所能及之事情。让我们在保持灵活性的情况下对各种情况都做好预案，即便是战况落入下风也维持好备选方案，确保核心目标不受到影响。\n\n军委将针对各种突发情况制定成套预案，要求各军在行动前准备备用路线、临时补给点、反装甲措施和撤离通道。推行更新型的步兵装具和装甲单位的技术，这将允许我们在防御战和反重型单位中取得更大的优势和更灵活的战术区间。工兵和支援部队则会提前进入关键地区，修好道路，标出渡口，储备木料、炸药、油料和备用通讯器材。让我们为可能的危险做好准备！"
SFR_expand_high_command:0 "扩大最高指挥部"
SFR_expand_high_command_desc:0 "由于军事理论的转型，扩大最高指挥部的改革项目已经提上日程。随着全国解放的推进，红军的体量已经不再适用于根据地时期的规模，命令从平京发出时清清楚楚，传到前线就只剩下半截意思，最后则是地狱般的景象：道路、渡口、炮兵阵地、预备队、伤员后送和弹药补给都会挤在同一张地图上，然后便是又一场灾难。\n\n我们需要扩大最高指挥部，从各级军事干部提拔人员。总参谋部将增设作战、后勤、工兵、通讯、情报和预备队调度部门，各方面军也要派出常驻联络人员，确保前线情况能尽快送回中央，同时将中央的命令拆分成便于各军实际执行的计划。每一场战役都要提前计算道路承载、弹药消耗、桥梁修复时间和预备队投入位置，除非局势危急，实在不允许详尽的准备。\n\n革命战争教会了我们如何在绝境中活下来。而现在，我们要学会如何指挥一支真正庞大的人民军队。我们的士兵，装备和战术正不断向更进一步前行，而最高指挥部必须跟上他们的脚步。"
SFR_prepare_for_depth_and_protracted_warfare:0 "为纵深，持久战作准备"
SFR_prepare_for_depth_and_protracted_warfare_desc:0 "远乡的一大优势在于其复杂的地形和大量的人民群众可以为我们提供很强的纵深以及强力的维持战争的能力。在过去，我们没能建立起稳定的装备，粮食等物资供应的体系，因而只能在游击战争时期采取一些很冒险的战术。可现在不一样了，红军将面临更加全面以及更加复杂的战争。\n\n前沿阵地被夺下之后，后面的道路是否能跟上？预备队能不能在敌军反扑前赶到？物资能不能第一时间供应？如果敌人的第一道防线没有崩溃，或者他们故意后撤，把红军引进更深的火力网，我们又该在哪里停下、在哪里重整、在哪里重新发起攻击？如果祖国的领土沦陷，我们能否组织有效的游击抵抗，能否利用复杂的地形将敌人卷入战争泥潭？\n\n我们必须为更长的战争做准备。和王国军不同，未来的敌人不会在第一轮冲击后崩溃，无论战场在祖国还是外国，战争都有可能被拖进山地、城镇和交通线之间。红军要学会在数周、数月的连续作战中保存组织，轮换部队，修复阵地，积累弹药，并在一次进攻结束后迅速准备下一次行动。"
SFR_people_war_defense:0 "国防人民战争"
SFR_people_war_defense_desc:0 "战争已经不再只是军队的事。反动派会袭击铁路，破坏桥梁，轰炸仓库，投放化学武器，派遣部队潜入刚刚解放的城镇。他们会试图把前线和后方撕开，把红军和人民隔开，再把每一座城市、每一条道路、每一个村庄变成拖垮新远乡的伤口。在他们心中，远乡人民没有一席之地。\n\n中央将把人民动员纳入完整的国防体系。地方民兵负责警戒、巡逻、修复道路和保护仓库；工会与村社组织运输队、担架队和抢修队；学校、医院、工厂和地方政府必须提前制定战时疏散、物资分配与伤员收治方案；我们必须将全国的国防体系整合成一个有条不紊的系统，从而应对未来不可避免的斗争。\n\n敌人若越过第一道阵地，便会撞上第二道、第三道，撞上补给站后的民兵哨卡，撞上工厂门口的防卫队，撞上已经被组织起来的整片土地。我们不幻想战争轻松结束，也不指望敌人自行崩溃；我们要让他们在每一次推进中流血，在每一公里土地上付出代价，在漫长的人民战争里耗尽他们最后一点力气。\n\n远乡的土地不再属于国王、地主和军阀。谁想夺走它，就必须面对全体远乡人民的怒火。"
SFR_rebuild_air_force:0 "重建空军"
SFR_rebuild_air_force_desc:0 "王国也曾有过所谓的空军，只是那些停在机场角落里的破旧飞机、几年没有更新过的训练手册，以及连燃油都要向领导低声下气讨要的飞行员，很难让人相信它真的能守卫天空。如今，王国已经倒下，我们不能继续把天空当作可有可无的背景板，二十一世纪以来的战争已经证明了空军的重要性。我们需要清点以前留下的飞行资料、维修记录、机场设施和可用机体，召回仍愿为人民效力的飞行员与工程人员，并在军委下建立新的空军筹备机构。远乡的天空曾被贵族们荒废太久，现在，它该重新属于人民了。"
SFR_train_pilots:0 "培训飞行员"
SFR_train_pilots_desc:0 "我国的飞机制造工业还处在早期阶段，而相比之下，飞行员的培训则是一点也没有好多少。和技术，工业一样，飞行员没有就是没有，而我们也缺乏外国对相关理论知识的援助。别的国家早已建立起航校、教官团和完整的训练流程，而我们现在只能从头补课。旧时代留下的老飞行员会需要重新登记，除非对人民有血债的，都可以作为教官协助，能飞的就继续飞；年轻学员则从各地严加选拔，从头开始训练。我们需要为未来的远乡空军埋下最初的火种。"
SFR_rebuild_military_airports:0 "重建军用机场"
SFR_rebuild_military_airports_desc:0 "旧时代留下的军用机场大多早已荒废，或是因为种种原因而质量不达标，本来就无法使用。我们必须把这些沉睡的机场重新纳入管理，修复跑道、油料库、机库、通信站和基础防空设施，并在关键地区建设新的空军基地，进一步完善本土空中力量的建设。"
SFR_establish_air_force_research_institute:0 "组建空军科研所"
SFR_establish_air_force_research_institute_desc:0 "曾经的航空研究长期散落在军工厂、学院、私人企业和少数军官的小项目里，缺乏来自中央的直接支持，研究流程混乱，最后留下来的多半是互相矛盾的图纸和一堆看起来很先进却飞不上天的废铁。我们将组建专门的空军科研所，把相关人员集中起来，统一研究机体结构、发动机、航电和飞行战术需求。"
SFR_new_air_force_theory:0 "新空军理论"
SFR_new_air_force_theory_desc:0 "时过境迁，如今的空战早已不是世界大战早期，几架飞机在天空中互相追逐那么简单，侦察、拦截、近距支援、防空协同、机场调度和后勤维护都需要统一协调。我们需要研究那些先进国家已经验证过的经验，但同时把它们改造成适合远乡自然环境、工业水平和实际作战需求的办法。我国的空军仍然处于起步阶段，但这毫无疑问可以帮助我们迈出坚实的更进一步。"
SFR_focus_on_air_superiority:0 "专注空中优势"
SFR_focus_on_air_superiority_desc:0 "我国空军不可能在短时间内在每一个方向上追赶世界强国，我们必须先回答一个最基本的问题：天空究竟要为谁让路。若敌人的侦察机、轰炸机和护航机能够自由掠过我们的城市、铁路与军工厂，那么再多地面部队也只能在阴影下作战。军委将把空军建设的重点放在夺取空中优势上，优先发展航程更远、火力更强、能承担护航与拦截任务的战斗机，并为日后组织纵深轰炸积累理论和装备基础。"
SFR_prepare_ground_support:0 "准备地面支援"
SFR_prepare_ground_support_desc:0 "过去几十年以来的战争已经证明了空地一体化的重要性，得到空军支援的地面部队将无往不胜，而注重轻型飞机的策略也符合我国当下工业、科研能力。军委将建立空地联络制度，为前线部队配属航空引导人员，训练飞行员识别友军阵地、攻击敌方工事与后勤节点，并逐步组建适合近距支援的小型作战编队。"
SFR_develop_heavy_fighters:0 "发展重型战斗机"
SFR_develop_heavy_fighters_desc:0 "普通战斗机固然重要，但对于需要护送远程机群、拦截敌方轰炸机、并在广阔空域内维持持续作战的我们而言，重型战斗机显然更符合眼下的需求。军委将集中力量推进双发战斗机与远程截击机的设计，优先改进航程、火力、爬升性能和机载设备，让它们既能成为轰炸机群的护卫，也能成为保卫共和国天空的利爪。"
SFR_construct_air_defense_facilities:0 "注重国土防御"
SFR_construct_air_defense_facilities_desc:0 "夺取空中优势需要空中和地面力量的配合，我们的飞机不可能无处不在。为此，我们必须在地面上建立起真正可靠的防空体系：重点城市、军工区、铁路枢纽和空军基地都要布置防空阵地，观测站与通信网络也要同拦截部队直接相连，防止敌人对我国后方的破坏。"
SFR_develop_multirole_bombers:0 "开发多用途轰炸机"
SFR_develop_multirole_bombers_desc:0 "一些主流大国已经开始多用途轰炸机的研发，我们也不能落后。军委将把一部分设计力量集中到多用途轰炸机上，要求它既能携弹支援前线、轰击敌军集结地与交通线，也能在必要时承担巡逻、侦察与战役纵深打击任务。"
SFR_death_from_above:0 "死从天降"
SFR_death_from_above_desc:0 "轰炸机的任务不能止步于替前线炸开一道缺口。敌人的兵工厂、铁路枢纽、仓库、发电站和指挥机关，乃至那些自以为远离战火的后方城市，都应当被纳入我们的打击范围。军委将进一步完善战略轰炸的组织与导航体系，训练机组在夜间、复杂天气与远距离条件下执行任务，并针对重点目标制定更加系统的破坏计划。让敌人明白，战争从来不只发生在战壕和阵地之间——当他们把炮弹、燃料和增援不断送往前线的时候，死亡也早已从天而降，落在他们自以为安全的后方。"
SFR_defend_the_homeland_s_airspace:0 "保卫祖国的领空"
SFR_defend_the_homeland_s_airspace_desc:0 "曾几何时，空袭警报响起时，人民只能躲进地下室祈求上天的怜悯；敌机掠过城市上空时，工厂、铁路和学校只能等着炸弹落下，然后从废墟中重建——或是消亡。经过一系列整顿，我们终于可以把战斗机、防空阵地、机场调度、雷达观测与轰炸机部队编进同一套国土防空体系：敌人的侦察机会被拦截，轰炸机会遭到迎头痛击，而他们的后方机场和补给中心也将为每一次入侵付出代价。远乡曾有太多年任由战争从头顶碾过，如今，人民共和国必须让天空也成为祖国防线的一部分。无论敌人从哪里来，他们都将看见这片土地上升起的火光。"
SFR_expand_aircraft_industry:0 "扩张航空工业"
SFR_expand_aircraft_industry_desc:0 "无论我们最终把空军用于夺取制空权，还是用于支援地面部队，有一件事都绕不过去：飞机没有就是没有。我国的航空工业规模太小，厂房老旧，零件生产分散，技术落后。军委将协调地方政府扩建航空相关工厂，优先恢复一部分生产改装能力，并把分散在各地的技术人员重新组织起来。"
SFR_new_military_airports:0 "新修军用机场"
SFR_new_military_airports_desc:0 "我国国土辽阔，各地地形、补给条件和防御需求都不一样，若所有空军力量都挤在少数几座旧机场里，不仅调度困难，一旦遭到突袭也很容易损失惨重。军委将根据各地战略位置、铁路连接和前线需求，选取若干适合的地区新建军用机场，配套修筑跑道、油库、机库、维修站和基础防空设施。"
SFR_air_ground_integration:0 "空地一体化"
SFR_air_ground_integration_desc:0 "过去的红军也很注重兵种之间的通讯，可碍于技术和工业问题，我们没能做的太好。虽然军事改革已经取得了很大的进展，可在空军上我们还是缺乏经验和技术。军委将建立更完善的空地联络体系，为主力部队配发航空引导小组，统一无线电频段、目标标识、地图坐标和火力申请流程，并训练飞行员配合步兵推进、炮兵压制和装甲突破。革命战争教会我们，孤军奋战只会付出更多牺牲，为此，空军与陆军必须像同一支部队那样作战。"
SFR_disrupt_enemy_logistics:0 "破坏敌人的后勤"
SFR_disrupt_enemy_logistics_desc:0 "前线每多一门火炮、每一辆卡车、每一箱弹药，背后都连着铁路、桥梁、仓库、油库和昼夜不停的运输线；只要把这些东西炸断，敌人再多的部队也只能趴在阵地上挨打。军委将把空地一体化的经验进一步用于战场遮断，训练飞行员专门打击敌军列车、车队、补给站和临时集结地，改进航空炸弹与低空突击战术，让我们的飞机不但可以支援进攻作战，还可以逐步蚕食敌人的后勤体系。"
SFR_light_combat_squadrons:0 "轻型作战中队"
SFR_light_combat_squadrons_desc:0 "许多战斗往往爆发得突然、结束得也快，真正能及时赶到前线的，往往是那些规模较小、调动迅速、能够频繁出动的轻型作战中队。军委将优先组建这类以轻型飞机为骨干的航空单位，让它们承担战场巡逻、紧急支援、低空侦察和骚扰打击等任务，并为其配备更熟悉前线情况、反应更快的飞行员与地勤体系，提高出击效率和作战效能。"
SFR_maintain_our_mobility:0 "保持我们的机动性"
SFR_maintain_our_mobility_desc:0 "我们的空中作战中队需要比敌人更快抵达、更快转向、更快脱离战场。军委将投入继续改进轻型机的气动设计、发动机调校与操纵结构，强化飞行员对空中机动的专项训练；与此同时，地勤与机场调度也必须跟上，补给、检修、挂载和再次出动的流程都要尽可能简化。我们需要一支来去如风的空军。"
SFR_modern_air_ground_integration:0 "现代空地一体化作战"
SFR_modern_air_ground_integration_desc:0 "空军若只是偶尔飞到前线投下几枚炸弹，那它充其量只能算地面部队的附庸；而现代战争要求的，早已是另一种东西。我们必须把对敌后勤的持续打击、轻型部队的快速反应、前线引导、无线电联络、目标标定和地面部队的推进节奏协调起来，有条不紊的执行计划。所有任务都需要由统一而成熟的体系来决定，而非临时决策。我们需要把空军和陆军建设成同一场攻势中彼此咬合的两排齿轮；当红军向前推进时，敌人面对的将不只是眼前的部队，而是一支有条不紊，结合了空地一体化，能够实现全方位打击的现代化军队。"
SFR_revival_of_navy:0 "复兴海军"
SFR_revival_of_navy_desc:0 "王国曾经拥有一支还算说得过去的海军，至少在旧时代的远乡沿岸，或是追溯到辉煌的往日，这支海军绝对称不上弱小。可那些巡逻艇、护卫舰、岸防设施和船厂设备被贵族们丢在角落里太久，许多设计早已跟不上现代战争的需求，人员编制，思想理念也和如今的红军格格不入。我们不可能指望比某些战士年纪还大的旧船守住海岸，更不能把海军像过去一样当成存在即可的巨型的玩具。军委将开始清点王国遗留下来的舰艇、港口、船坞和海军学校，改造还能继续使用的装备，整合愿意为人民效力的旧海军人员，并在此基础上制定新的造舰与岸防计划。"
SFR_train_logistics_personnel:0 "培训后勤人员"
SFR_train_logistics_personnel_desc:0 "以前的海军并非没有后勤人员，只是许多制度早已松散，人员也散落各地，除了平京还能恢复一些编制以外，几乎不剩下多少整合的机会。军委将在全国重新登记旧海军的技术人员，挑选可靠人员进入新的培训体系，并建立统一的补给、检修与远航保障流程。"
SFR_rebuild_military_ports:0 "重建军用港口"
SFR_rebuild_military_ports_desc:0 "上世纪留下的军用港口大多还能看出当年的底子，可多年疏于维护后，大多数设置都已经明显落后，许多地方甚至连大型舰艇的长期停靠与维护都无法保障。军委将把沿海旧港重新纳入统一规划，优先修复关键军港和配套船坞，再逐步扩建新的海军基地，同时和民用船坞合作，加快未来建设进度。"
SFR_establish_naval_research_institute:0 "组建海军科研所"
SFR_establish_naval_research_institute_desc:0 "革命阵线没有海军技术的积累，王国时期的经验也大多早已过时。军委将组建专门的海军科研所，把仍可使用的技术人员、工程师和军官集中起来，先整理现有舰艇的改装方案，再逐步研究适合当下工业水平的新式舰船与配套模块。"
SFR_return_to_the_ocean:0 "重返海洋"
SFR_return_to_the_ocean_desc:0 "我们对海军的重建工作已经取得了初步的成效，而现在，远乡海军需要迈出更进一步。军委将组织新的远航训练、舰队演习和海岸巡逻，整理海军学说，加强各部门协调。我们还远不是海上强国，许多军舰仍然老旧，许多水兵也缺乏经验，但我们确实已经拥有了重返海洋的第一批船、第一批港口和第一批愿意出航的人。我们需要让远乡海军重新迈向世界，加入一流的行列！"
SFR_emphasize_surface_warfare:0 "注重水面战争"
SFR_emphasize_surface_warfare_desc:0 "远乡海岸线长，未来在东巴斯蒂亚地区也有和其它霸主竞争的需求；若我们要保卫海岸、护送运输船队、掩护登陆，甚至在必要时把战线推向更远的海域，就必须重新更进一步投入水面舰队。军委将把有限的经费优先投向主力舰、航母与各类护航舰艇的建设和改装，完善舰队编成、远洋补给与海上防空体系，争取尽快重新建立有一定规模的舰队。"
SFR_new_era_new_tactics:0 "新时代，新战术"
SFR_new_era_new_tactics_desc:0 "我国工业尚在起步阶段，资金技术也十分有限，不得不把资源用在更适合的地方：水下力量，以及一切能让敌人付出代价的隐蔽作战手段。传统军官或许会觉得这不够体面，不过随着时代的发展，水下力量的战术也已经成为主流的一部分；而如果敌人的运输船不敢离港，护航舰队必须绕远路，登陆部队在海上提心吊胆，那我们的目的就已经基本达成了，我们并不需要拼命的去打一场大舰队决战。军委将重新编写潜艇作战条例，训练艇员在复杂海况下长时间潜航，并改进鱼雷、声呐与隐蔽通信设备。"
SFR_develop_aircraft_carriers:0 "研发航母"
SFR_develop_aircraft_carriers_desc:0 "远乡海军辉煌的时候航母还没有如今天一般流行，其衰弱的时候则完全错开了新潮流，如今是时候拨乱反正了。军委将组织专门力量研究航母舰体、甲板布局、舰载机配套与编队运用，优先培养能理解航母作战的人才，并为未来的海军航空兵打下基础，必要时候，还可以加紧和外国的合作，进一步学习先进经验。"
SFR_emphasize_naval_air_defense:0 "注重海洋防空"
SFR_emphasize_naval_air_defense_desc:0 "如果没有空中力量的保护，那航母便是海洋上的活靶子，再昂贵的甲板和舰载机也可能在一次空袭中化作燃烧废铁。军委将加紧投入舰队防空体系的建设：改进舰载防空炮、雷达与通信设备，训练舰载机承担拦截和巡逻任务，并让护航舰艇学会围绕主力舰展开防空掩护，加紧舰队各方配合。"
SFR_large_convoy_formation:0 "大护航编制"
SFR_large_convoy_formation_desc:0 "护航舰队是我们未来大舰队体系的重中之重，尤其是在我们尝试步入航母领域的今天。军委将重新整理现有驱逐舰、护卫舰和轻型巡洋舰的编成方式，研究更适合远乡海军的护航体系，把反潜警戒、夜间索敌、运输掩护和主力舰屏卫任务统一进更成熟的编制中。"
SFR_fleet_vanguard:0 "舰队先锋"
SFR_fleet_vanguard_desc:0 "作为舰队最早一批接战的船队，我们不能忽略轻型舰艇的建设。军委将把驱逐舰、护卫舰和轻巡编入更明确的前卫序列，让它们承担舰队侦察、反潜警戒、鱼雷突击、近距离防空和主力舰屏卫任务，成为我们舰队最锐利的先锋。"
SFR_red_flag_flies_on_the_sea:0 "红旗飘扬在海上！"
SFR_red_flag_flies_on_the_sea_desc:0 "从反动派遗留下来的烂港、旧船和发霉档案开始，远乡海军终于走到了今天。航母不再只是电报、杂志上的遥远传闻，屏卫舰也不再是主力舰身边临时拼凑的钢铁肉盾；舰载机、防空火力、护航编队和前卫侦察，都将被纳入一套真正属于新远乡海军的水面舰队体系。我们仍然不能说自己已经成为海上强国，许多船坞还在加班，许多水兵也还年轻，可至少现在，远乡海军已经迈出了坚实的一步。它会护送新远乡的船队，保卫人民的海岸，在必要时把炮口和机翼指向更远的海面。终于，我们的红旗不再只飘扬在城市、田野和山岭之上，它也将飘扬在海上。"
SFR_rebuild_naval_docks:0 "重建海军船坞"
SFR_rebuild_naval_docks_desc:0 "我国并非没有船坞，不过能达到现代化标准的并不多，达到了可能也有缺乏维护的问题。军委将着手整修沿海地区现有的海军船坞，恢复基础维护和建造能力，并逐步补齐配套设施。"
SFR_expand_ports_everywhere:0 "扩建各地港口"
SFR_expand_ports_everywhere_desc:0 "我国民用港口甚多，不过大多缺乏现代化改造，而且大多本身就不适合成为军港。军委将会同地方政府，对各沿海地区的港口条件进行重新评估，扩建或是新建适合承担军用任务的码头，修复仓储、供电、通信和基础防护设施，并把部分民用港纳入战时调度体系。"
SFR_patrol_boat_program:0 "炮艇计划"
SFR_patrol_boat_program_desc:0 "小型炮艇和鱼雷艇造价更低，建造更快，适合执行牵制和情报侦查的任务，对船坞和钢材的要求也没有主力舰那样夸张，正适合眼下的远乡海军。军委将推动一批轻型舰艇项目，重点改进航速、鱼雷命中率、近岸通信和夜间出击能力，让它们承担巡逻、袭扰、护航和配合潜艇伏击的任务。"
SFR_destroyer_fleet:0 "驱逐舰舰队"
SFR_destroyer_fleet_desc:0 "驱逐舰可以负责侦察海面、搜索敌踪、掩护潜艇出动，也能在必要时承担护航、警戒和快速突击的任务。军委将推动驱逐舰的设计、建造与编成训练，重点改进舰队协同、海上搜索、通信指挥和轻型火炮运用，让这些轻型舰艇成为我们舰队的前锋。"
SFR_build_submarines:0 "兴建潜艇"
SFR_build_submarines_desc:0 "潜艇建造周期相对更短，对船坞和资源的要求也更适合当前的远乡工业，还能在敌人的航线上制造持续不断的威胁。军委将正式启动潜艇建造计划，集中力量整理旧时代遗留的相关技术资料，培养潜艇艇员和水下作战人员，并推进艇体结构、潜航性能、鱼雷系统与水声设备的研究。"
SFR_underwater_demons:0 "水中恶魔"
SFR_underwater_demons_desc:0 "我们将把潜艇部队进一步锻造成真正的猎手：强化静默潜航、鱼雷齐射、夜间接敌和水下规避训练，改进艇员对声呐、深度控制和攻击时机的掌握，并完善针对敌方反潜巡逻与鱼雷威胁的应对办法。我们的潜艇不需要在阳光下和敌人对视，它们要做的，是在黑暗的海面下悄无声息地逼近，在敌人尚未反应过来之前，把整支船队拖进海底。"
SFR_defend_the_homeland_s_coast:0 "人民海军的水下力量"
SFR_defend_the_homeland_s_coast_desc:0 "到了今天，远乡海军终于不必再把潜艇当成几件用来碰运气的秘密武器了。驱逐舰负责搜索、警戒与掩护，潜艇负责伏击、截击与破坏运输线，二者配合起来，才能真正构成一支有体系、有经验、也有耐心的水下作战力量。军委将进一步完善潜艇部队的编成与训练，统一战斗协同流程，完善海军条例，同时培养一批真正懂得水下作战的军官和艇员。敌人或许还会轻视这支年轻的海军，但他们很快就会明白，从今往后，远乡的海洋不只属于水面上的旗帜，也属于海面之下那些沉默而致命的猎手。"

###事件###
SFR.1.t:0 "革命伊始…"
SFR.1.d:0 "满载着旅客的蒸汽轮船在江洲市的港口缓缓停靠下来，一位打扮的颇为精致的年轻人靠在栏杆边，一边享受着吹过的海风，一边看着码头上欢呼的人群。他一边想着革命党真是有牌面，一边又对同乘的几位领导的安全感到些许担忧——就这么暴露自己的行踪，还引得大批人马过来围观，不怕别有用心之士从中作祟吗？\n\n“不过，以我的身份，担心这些也没用。”青年点了一支烟，这是他从南巴联邦带回来的高端香烟，价格昂贵，最糟糕的是，盒子也空了，“唉，就剩这支了吗。” \n\n“叶兄，好像不太高兴的样子。”一位年龄相仿的青年走了过来，“有什么心事吗？”\n\n“太久没回来了，感觉有点陌生。”叶文石对自己的发小笑道，“不过还好有你，以及几位师兄的帮助。虽然现在的形式仍然称不上好，但只要我们努力工作，总有一天，可以把远乡建设成不亚于那些南巴佬的强国。”\n\n“才被提拔几天，就挺有领导风范了哈。不错不错。”发小笑笑说，随后继续说道，“你听说了吗？最近共产党在和上面谈，他们似乎对正泸有些想法，在当地搞些调查，社会实验什么的。上头的神经有些紧绷，最近不是和老郑家谈嘛，所以对共产党的行为有点不满，等你这两天安顿下来，要不要去看看，想办法给缓和一下。帮帮忙也好，我在共产党那边也有几个朋友。你可以去找一个姓赵的…嗯，叫啥来着…赵永军！对，就这名儿。”\n\n“嗯，你说的也有几分道理，不过…”\n\n叶文石的话语被汽船的鸣笛声打断，船只靠岸了。\n\n“好吧，那我们下回再继续吧。”叶文石苦笑道，“我行李有点多，得去跑几趟，还得给领导搬。”\n\n发小挥挥手，表示认可，随后便消失在涌动的人群中。\n\n在接下来的数年里，叶文石主要将精力花费在…"
SFR.1.a:0 "支持共产党在乡村地区开展的活动。"
SFR.1.b:0 "团结脆弱的革命联盟。"
SFR.1.c:0 "帮助革命党凝聚力量。"

SFR.2.t:0 "…火光冲天的那一夜…"
SFR.2.d:0 "此起彼伏的枪声，爆炸声响彻平京的大街小巷。在数日的紧张对峙后，直接来自皇宫的命令授权远乡政府的士兵对多个革命党组织发动突袭，而叶文石所在的支部，得益于优秀的预案，暂时逃开了第一轮围剿。然而，这并非长久之计。\n\n“我们现在怎么办？”叶文石一边喘着粗气，一边悄悄打开一丝窗户缝，警惕地望着窗外，他眼睁睁地看着火焰在市区逐渐蔓延，还有士兵殴打逃亡的难民，“现在情况很不妙，我们又没有调动部队的权限，必须撤出。”\n\n“可问题是，具体怎么做。”叶文石的发小从一旁的公文包中拿出一副地图，展开放在地下室落灰的桌面上，虽然灰暗的灯光一闪一闪，一副要熄灭的样子，不过他还是很快找到了自己想找的地点，“局势开始动荡时，我们提前在这里预备了一小股部队待命，主要是学生和工人，但足够了。我们应该尽快转移过去，带他们去营救还在这里开会的几位领导和学者，然后向城外转移。”\n\n“我也认为应该去接管部队，但专门赶过去营救可能有些难度。”革命党的代表，李青兰指了指地图上的标记，“这里有政府军的哨站，而且距离太远，太靠近市中心。我们不能以身犯险。而相对的…”她又指了指地图靠近的郊外的另外一个标记，“革命党原先在这里出资建设了几家工厂，我们可以带领工人抢救一批物资出来，之后再往郊外撤。”\n\n“这些都是很好的想法，但我认为我们还有更要紧的事情要做。”坐在一旁，沉默许久的赵永军开口了，“局势突变前，我们共产党在附近建立了好几个工人夜校，教授技术知识和军事知识，他们会成为未来游击战争的好帮手。我们可以带部队去营救他们与他们的亲属，并一起向城外转移，逃离远乡政府的魔爪。如果不帮他们，政府或许会将他们视作叛乱分子并抓捕。这不是我们想要看到的。”\n\n最后，叶文石决定…"
SFR.2.a:0 "听取发小的建议，带领部队救援了多名党内高级领导。"
SFR.2.b:0 "听取李青兰的建议，抢救宝贵的工业物资。"
SFR.2.c:0 "听取赵永军的建议，带领一批难民逃出生天。"

SFR.3.t:0 "…以及最后的结局"
SFR.3.d:0 "“手榴弹！”\n\n男人的叫喊声转瞬淹没在爆炸的响声下，顶着滚滚浓烟，叶文石试图从几经倒塌的房屋中寻得自己发小的身影，他一遍又一遍呼喊着他的名字，最终却也只是徒劳。在房屋倒塌前的最后一刻，他被那个脸上沾满鲜血——不知是自己的，还是别人的——的政委拉出火海。暴雨挥洒在叶文石的脸上，他才注意到，曾经建设得井井有条的根据地，如今已然是一篇废墟。\n\n机关枪的尖啸声把叶文石从混乱中拉回现实，他看着刚才把自己救出火海的政委，现在只剩下了弹坑中的一堆碎肉。他捡起死者的步枪，乘着烟雾未散，迅速转移到抵抗仍在继续的地方，带领残存的部队浴血奋战。\n\n然而，这一切都是徒劳。早有准备的远乡政府军启用了机械化的泰坦部队，甚至还有空军的轰炸援助。根据地的抵抗不堪一击，被愤怒蒙蔽了头脑的叶文石带领部队无数次发动死亡冲锋，多次在生死线徘徊，最后终于帮助根据地的仅剩不多的军政力量撤入了正泸根据地。而叶文石本人也在无数次的战斗中负伤累累，作为战争英雄的他迅速成为了根据地的高级领导——尽管这一切似乎并非他想要的。\n\n好友的死亡对叶文石的打击很大，可他却没有时间继续哀悼了。上饶根据地的覆灭对仍在正泸进行游击战争的部队影响很大，作为战争英雄的叶文石必须以身作则，打起精神，帮助革命阵线守住远乡革命的最后火种。\n\n在接下来的数年里，作为革命阵线高级领导人，叶文石…"
SFR.3.a:0 "帮助共产党维持根据地。"
SFR.3.b:0 "尽全力维持阵线团结。"
SFR.3.c:0 "整合革命党的残存部队。"

SFR.4.t:0 "坚如磐石之人"
SFR.4.d:0 "天还没亮，山里的空气冷得像刀子。根据地外的空地上，士兵们已经背着步枪列成长队，在泥地和碎石间一遍遍跑过那条被踩得发黑的训练线。有人喘得直不起腰，有人靴底磨破，脚后跟渗出血来，可队列最前面的人却始终没有停下。陈坚披着那件旧得发白的军装，跟着队伍一起跑，一起卧倒，一起在冰冷的地上匍匐前进。他从不允许自己站在一旁，只用目光和命令驱使别人；若训练是给士兵准备的，那么他自己也必须先经受一遍。\n\n陈坚不喜欢抱怨，也不相信眼泪能改变什么。饥饿是真实的，弹药短缺是真实的，疲惫和伤病也都是真实的，可在他看来，真正足以毁掉革命的，从来不是这些。真正可怕的，是散漫，是犹豫，是各人想着各人的私心，是一支队伍在最需要咬牙的时候先学会了给自己找借口。远乡已经被这种混乱拖得太久了，旧政府如此，昔日那些只想着论功行赏的革命党人也是如此。没有规矩，不成方圆；没有一支能服从命令、忍受苦难、像机器齿轮一样严丝合缝运转的队伍，所谓革命，也不过是下一场失败的开端。\n\n所以他对谁都一样。新兵做不到的动作，要重练；老兵完不成的任务，也要重练；干部若犯了错，处罚不会比普通士兵更轻。炊事班送来的稀粥是几勺，他就吃几勺；士兵睡在漏风的棚屋里，他也不会独占哪怕一张更厚的毯子。有人私下说他太硬，硬得像块捂不热的铁，也有人说照这样练下去，迟早会先把自己人逼垮。陈坚听见了，却连头也懒得回。在他看来，若连今日这点苦都吃不下，那明日走出根据地、面对真正的战争时，也只会更快地崩溃。\n\n晨雾慢慢散开，第一缕灰白的天光落在操场上。陈坚停下脚步，回头看着那一张张疲惫、狼狈，却仍然勉强站直的脸，声音不高，却比口号更像命令。\n\n“革命不是靠热血撑起来的，是靠纪律、忍耐和服从撑起来的。”\n“我们没有退路，也没有资格软弱。要么把自己锻造成一支铁一般的队伍，要么就等着被这片混乱重新吞回去。”\n\n山风吹过，队列里没人说话，只有急促而沉重的呼吸声。陈坚知道，光凭几句训话并不能立刻改变什么；但他同样知道，想让阵线在饥饿、争执和战火中继续活下去，总得先有人把意志硬下来。只要这支队伍还没有散，只要还有人肯在寒风里站直身子，革命就还没有输。"
SFR.4.a:0 "坚如磐石的队伍，才有资格带领革命。"
SFR.4.a.tt:0 "§Y陈坚§!属于革命阵线的§R左翼反对派§!，他会在可能的情况下带领§R共产党§!发动§O政变§!。"

SFR.5.t:0 "失魂落魄之人"
SFR.5.d:0 "夜半时分，张一心坐在办公室的椅子上，眼前摊开的是最新的财报。数字在纸面上列得整整齐齐，而且丝毫不留情面——那是由根据地无数地方党支部汇总而成的名为“失望”的结论，根据地已是强弩之末，就连张一心，这样一个自认不算什么东西的革命元老都能看得出来。\n\n他手中的香烟燃得正旺，烟雾在空气中缓缓升腾，他的结局注定如此吗？张一心抬起头，眺望窗外那片沉闷的天际，他的思绪早已不在这间办公室内，而是飘向了那段遥远的革命岁月。\n\n往昔的辉煌犹如昨日的幻影。那时的他意气风发，革命党与远乡政府的合作正酣，他作为人民的英雄，革命的传奇回到祖国，人群的簇拥迷乱了他的双眼，而最终，他只得一路跌跌撞撞逃来根据地，思考着自己是否做出了正确的决定——他是不是应该和那些叛徒，或是明智的元老一样，逃亡海外呢？如今的他却只能对着满是红圈的报告发呆，对着空虚的未来发愁。烟灰掉落在文件上，划出一条长长的灰线。\n\他放下财报，翻开了桌上那本薄薄的册子，上面是周周转转逃来根据地的革命党的残存部队名单。张一心曾看着自己并肩作战的名字一个个化作历史，看着名单上还可以调动的部队数目日渐缩水。他手指在册子上滑过，每一个名字都带着过去的回忆在脑海中浮现，仿佛这些人依旧站在他身旁，等待着他的指令，等待着新的革命浪潮。然而，现实却无情地提醒着他，那些年已离他远去，如今的他，只是一个在回忆里挣扎的人。\n\n他深吸了一口烟，脑海中浮现出一个又一个破碎的联翩画面。那些曾经的理想，真的就此终结了吗？现在的他，是否还能找到重振旗鼓的机会？革命党，只剩下委曲求全一条路可走了吗？"
SFR.5.a:0 "他想放弃，却又不敢。"
SFR.5.a.tt:0 "§Y张一心§!属于革命阵线的§C右翼反对派§!，他会在可能的情况下带领§C革命党§!发动§O政变§!。"

SFR.6.t:0 "革命的生命线"
SFR.6.d:0 "夕阳血红的光洒在正泸连绵的山脉上，刘青兰和几名游击队员站在一处隐蔽的山脚下，她死死盯着破旧的小道，依托树林隐藏了起来。她在等几个挑夫，兴许还有马车，甚至卡车，或者什么也没有。这批物资的到来至关重要，医疗物资关系到根据地数百人的生存，而外界的资料则会影响到阵线中央未来的决策——在远乡时局变化莫测的当下，他们需要第一时间掌握外界资料。\n\n不久之后，远处的路上隐约传来了引擎的声音。刘青兰招呼身后的几人作戒备态势。那辆卡车在夕阳的余晖下逐渐显现，车身上盖着厚厚的油布与看似漫不经心的伪装，避免引起任何不必要的注意。刘青兰深吸了一口气，整理了一下衣领，向前迎了上去。\n\n卡车在她面前停下，一个穿着简朴的司机从驾驶座跳下来，手中拿着一份清单。他的神情带着几分疲惫，但目光依旧警惕，显然他明白自己此刻的责任之重。刘青兰与他简单寒暄后，接过了那份清单。\n\n“大港那边托我给您带个信。首都那边在严打，嘉祥抓了好几个，医疗物资没有了。”司机低声说道，环顾四周，确保没有可疑人物跟踪，“但剩下的还有，主要是武器和弹药，还有外界的整理信息，新闻报刊之类的。”\n\n刘青兰点了点头，示意身后的人检查物资，她也亲自上前查看。弹药、步枪、炸药、大米——还有最重要的，外界的信息资料，大量的文件，这需要时间来检查，消化。确认无误后，她示意手下的人开始卸货。士兵们迅速行动，井然有序地从卡车上搬下一个个箱子。\n\n“这些都很关键，”她喃喃自语，随后抬头看向司机，“同志，你做得很好，回去路上多加小心。我们就靠你们了。”\n\n司机点点头，疲惫的脸上露出一丝微笑，转身回到了驾驶座，准备启程返程。刘青兰站在原地，看着那辆卡车消失在夜色中，心中清楚，物资到位只是第一步，接下来他们还有更多的战斗要打——和敌人，或者和自己人。"
SFR.6.a:0 "“该回去工作了…”"
SFR.6.a.tt:0 "§Y刘青兰§!忠于§Y革命阵线§!，她会作为§C革命党§!的代表，协助阵线工作。"

SFR.7.t:0 "田埂之间"
SFR.7.d:0 "雨后山路泥泞，赵永军到东坡村时，裤脚上已沾满黄泥。他没有先去公社屋里喝热茶，而是蹲在晒谷场边，同几个老农围着一张破木桌算今年的粮账。桌上摊着皱巴巴的登记册，旁边压着半块石头，免得山风一吹，连大家最后那点耐心也一并刮走。\n\n“春耕少了两头牛，种子也不够。”老农用烟杆敲了敲纸面，“上面说要多种粮食好打仗，可地又不听俺的话，叫它多长半斗，它也只当没听见。”\n\n周围有人笑了两声，又很快停下。根据地缺粮不是新鲜事，前线要吃，伤员要吃，山里躲来的难民也要吃。赵永军没有急着反驳，只把那本登记册翻来覆去看了几遍，又问各家有多少劳力，哪几块田被雨水冲坏，公社仓里还剩多少旧种。他问得细，甚至连村口那架坏了三个月的水车也记了下来。有人悄悄说，赵委员不像大人物，倒像来查账的账房先生。\n\n赵永军听见了，抬头道：“账房先生也好，至少账算错了，大家还能骂我两句。若是装成神仙，那可就麻烦了，神仙一般不管种子发不发芽。”\n\n众人又笑，这次轻松了些。\n\n可笑过之后，问题仍在桌上。赵永军能允诺下的东西很少：从后勤队里挤出两袋备用种，调几个民兵修水车，伤员转运时顺带把山后那片荒地清出来。至于牛，暂时没有；至于更多粮食，暂时也还是变不出来。他说这些话时没有漂亮辞藻，只是尽量认真对待，希望未来能有所转机。\n\n临走前，一个妇人抱着孩子追上来，问他这仗还要打多久。赵永军沉默片刻，只说不知道。他不是不想给人希望，只是没把握的事他也不敢下结论。最后，他把自己包里的半块干饼递给孩子，然后带着不好意思的表情转身离去。\n\n山风吹过稻田，青苗尚矮，像一群尚未学会站稳的孩子。赵永军回头看了一眼，叹了口气。 "
SFR.7.a:0 "“从小事开始。”"
SFR.7.a.tt:0 "§Y赵永军§!忠于§Y革命阵线§!，他会作为§R共产党§!的代表，协助阵线工作。"

SFR.8.t:0 "未竟之血"
SFR.8.d:0 "煤油灯烧得很低，火舌在玻璃罩里抖动，好像很快就要灭掉。林有志坐在桌前，把各连队送来的名册一张张摊开：死者，伤者，失踪者，尚能作战者，还能用的枪械，不能用但还能拿来吓唬人的枪械。写到最后一项时，他停笔看了看，冷笑了一声，又把那行划掉。\n\n“吓唬人有什么用？真打起来，敌人不会被破枪吓死。”\n\n副官站在门口，犹豫半晌，还是把话说了出来。最近阵线里有些人不安分，暗地里说中央只顾着收紧军权，说林长官迟早要把根据地变成兵营。更有人旧事重提，拿过去几次转移和失利说话，责怪阵线当年软弱，才让大伙一路逃到正泸根据地。\n\n林有志没有立刻发火，只是把笔轻轻放下。\n\n他看着那堆名册，沉默了很久。纸上一个个名字，有些他记得脸，有些只剩下番号，还有些连尸首都没找回来。新园市，上饶，山早村……那些地方并没有写在文件里，却像潮湿的霉味一样，时时从记忆深处返上来。他当然知道阵线不能就此倒下。倒了，大家就不是意见不同的同志，而是一群等着被围剿名单逐个点名的孤魂野鬼。\n\n“随他们去吧。”林有志终于开口，“嘴长在人身上，堵不住。可若有人把事情闹大，把消息送到敌人的耳朵里，那就要敲打敲打了。”\n\n副官问，要不要先请叶主席调停。\n\n林有志把名册合上，语气冷硬，但不显得急躁：“调停要有，纪律也要有，现在去中央闹没有意义。我们可以坐下来吵，吵到饭凉也无妨，反正现在也没多少热食可以吃。可若是想要上房揭瓦，那我们就不得不行动了。”\n\n灯火一跳，墙上的影子像披甲而立。\n\n他重新拿起笔，在纸上写下几行命令：清查各部联络渠道，整顿民兵武器库，严禁私自集会串联。最后，他又补上一句——不得无故牵连群众。"
SFR.8.a:0 "“阵线绝不能倒在这里。”"
SFR.8.a.tt:0 "§Y林有志§!忠于§R革命§!，一旦阵线陷入§1混乱§!，掌握了军权的他便会采取行动。"

SFR.9.t:0 "再会"
SFR.9.d:0 "正泸山后的墓地很安静。这里没有像样的墓园，只有几排被雨水冲歪的石碑，草长得很高，若不是有人常来清理，恐怕连名字都要被山野一并吞下去。\n\n叶文石在其中一座坟前停下。他蹲下身，用袖口擦去石面上的青苔。墓碑上的名字仍旧清楚，只是比记忆中冷了许多。\n\n“我来看你了。”\n\n很多年前，他们曾一同站在江洲市的码头上。那时海风正好，轮船靠岸，人群在欢呼，年轻人们也总觉得未来可以靠几句诚恳的话慢慢改好。再后来，平京的大火，上饶陷落，发小的声音被爆炸吞没。叶文石在废墟里喊了很久，最后只带着满身伤痕撤进正泸。\n\n从那以后，他便很少再有时间好好想起这些事。\n\n叶文石把一束野花放在碑前。花是路边摘的，不讲究，甚至有些蔫了。他想，若是发小还活着，大概会笑他敷衍，然后顺手挑出最丑的一朵，说这花像某个委员会上发言最臭的家伙。\n\n想到这里，他竟真的笑了一下。\n\n可笑意很快散去。山下的根据地仍旧吵得不可开交。革命党旧部怀疑共产党想独占阵线，共产党激进派又嫌革命党人拖泥带水；有人要把粮食优先送往前线，有人说乡里再饿下去，前线迟早也没人可用；林有志要求整肃纪律，赵永军劝大家先帮助百姓，刘青兰则一边记会议纪要，一边用眼神提醒他别让两边当场翻脸。\n\n所有人都说自己是为了革命。叶文石相信他们大多是真心的。可正因为是真心，事情才格外麻烦。私心还能谈价，信念却常常不肯退让半步。\n\n他已经很累了。很多时候，他觉得自己并不是在领导阵线，而是在用双手按住一张快要散架的木桌。桌上每个人都在拍案而起，桌下则堆着那些来不及安葬的战士。\n\n山风从林间吹过，像老友没有说完的话。\n\n叶文石看着墓碑，沉默了许久。最后，他低下头，开口说道——"
SFR.9.a:0 "“我现在真的不知道该怎么做了...”"
SFR.9.b:0 "“...但是，总能找到解决办法的。”"

SFR.10.t:0 "反对革命阵线"
SFR.10.d:0 "毫无疑问，南远乡革命阵线是一支绝望的同盟。当远乡政府背叛我们的改革时，大多数革命家都成为了烈士，在毫无准备的情况下，我们的同胞被突袭，被围剿，最后像野狗一样吊死在反动派的刑场上。\n\n那是一段黑暗而绝望的日子，可我们挺过来了。\n\n反动派的围剿并没有吹熄远乡的革命火种，反之，在得到了人民的支持后，它正燃烧地愈发旺盛！在全国各地，都有大大小小的革命党。共产党组织突破围剿，赶往我们零散在各地组织的革命根据地，对抗围剿。然而，反动派力量强大，我们不得不在颠沛流离中寻求生存，随着各地组织要么惨遭围剿，要么突围成功聚集到中央根据地，要么转入地下活动，我们已经稳定了局势。\n\n在那之后的日子，并不好过。大量战士和随军家属，以及逃难的民众聚集在了这片小小的，不发达的根据地里。我们拼命收集物资，组织生产，却无法在反动派的层层围剿下恢复常态。饥饿慢慢成为了日常，军队士气也日渐低落——好在，平京的反动派似乎垮的比我们更快。\n\n根据地的每个人都知道，革命阵线仅仅是权宜之盟。即便阵线议会里真的有共产党和革命党在试图合作，两党内都有激进派的声音反对这一点。随着意识形态分歧的日渐增长，维护革命阵线已经不再是可行的计划，这只会葬送我们的革命。如今，围剿的力度减弱，根据地也得以喘息，而恐怕内战也会在不远的将来爆发——如果我们要采取行动，夺取根据地的控制权，驱赶意识形态的敌人，就必须现在立刻行动！"
SFR.10.a:0 "跟随共产党，团结民众，为远乡开创真正的明天！"
SFR.10.b:0 "跟随革命党，保卫革命，不负革命先烈牺牲！"

SFR.11.t:0 "陈坚的日记"
SFR.11.d:0 "油灯的火苗跳了一下，昏黄的光落在摊开的笔记本上。帐外风声很大，夹着夜哨来回走动时靴底踩碎石子的声音。陈坚坐在桌前，盯着白天开会时记下的几行字，脸色一点点沉了下去。有人说根据地情况困难，应当“谨慎行事”；有人说部队训练太苦，恐怕伤了士气；还有人提议把本该立刻执行的清查、整训和征发，一项项拖到“以后再议”。他们说得很有道理，仿佛只要多添几句废话，革命就能自己长出骨头来。\n\n陈坚提起笔，几乎是带着怒气在纸上划下字迹。\n\n“他们不是不明白问题出在哪里，他们只是不敢碰。该抓纪律的时候讲人情，该整顿的时候装宽厚，该下命令的时候又怕得罪人。根据地什么都缺，但最缺愿意把事情做到底的人。许多人嘴上喊革命，心里想的却是别出乱子，别担责任，最好今天拖到明天，明天再拖到后天，仿佛这样便能把反动派也一并拖死。”\n\n笔尖停了一下，纸面被压出一个发黑的墨点。\n\n“这种人不做事也就罢了，偏偏还最喜欢对真正做事的人指手画脚。他们怕训练太严，怕清洗太狠，怕命令下得太死，怕人人都说他们不近人情。可革命什么时候是靠畏畏缩缩完成的？若连自己的队伍都不敢整顿，连根据地里这点混乱都不敢收拾，还谈什么打出去，谈什么解放远乡？”\n\n写到最后，陈坚的字迹已经近乎生硬得像刀刻一般。\n\n“我越来越厌恶这些人。他们把怯懦说成稳重，把拖延说成审慎，把无能说成顾全大局。可在我看来，这不过是在浪费时间，在拿阵线的命替自己的软弱遮羞。若再由着他们这样下去，我们迟早会死在会议桌旁，死在一堆没有用的文件里。”\n\n帐外的风还在吹。陈坚合上笔记本，火光在他的眼里晃了一瞬，又很快沉了下去。"
SFR.11.a:0 "“革命不是留给懦夫写报告的。”"
SFR.11.tt:0 "§Y作为阵线的§R左翼反对派§!，陈坚认为革命阵线当下的管理制度太过松散，革命党和共产党的扯皮造成了效率的低下。在时机宝贵的当下，必须根据地实施严格的§O军事化管理§!，战胜反对派。§!\n\n§g作为反对派，他需要想办法降低阵线的凝聚力，团结左翼力量，最终发动政变。§!"

SFR.12.t:0 "张一心的信"
SFR.12.d:0 "油印纸被折得很整齐，信封外没有署名，只有一行潦草的小字：务必亲启。\n\n致——\n\n久未通信，近来山中气候反复，不知阁下身体可还安好。前些日子听闻贵部转移尚算顺利，我心里多少安定了些。如今局势纷乱，旧日同志天各一方，能得一二人仍在坚持，已属不易。还望阁下保重，不必过于勉强自己。\n\n根据地近来议论甚多，人人都在谈局势，谈阵线，谈未来，可真到了该做事的时候，反倒谁也说不清楚。正因如此，我才更想知道阁下那边的情况。革命党这些年损失惨重，留在各地、仍能直接调动的旧部究竟还剩多少，建制是否完整，军官和通信人员是否还在，各地联络线又是否可靠——这些事情，对我们接下来该如何行动，实在太过重要。\n\n若眼下不便落笔明说，也无妨。待时机合适，我们不妨找个稳妥的地方见上一面，当面谈谈。许多事，终究还是面对面讲更让人安心。毕竟，到了今天这个地步，我们能依靠的，除了彼此，也没有多少别的东西了。\n\n望复。\n\n——张一心\n\n读完后，负责归档的干部沉默片刻，最终还是将信纸重新折起，塞回了那只没有标识的旧信封里。"
SFR.12.a:0 "“先确认我们手里还剩下什么。”"
SFR.12.tt:0 "§Y作为阵线的§C右翼反对派§!，张一心认为革命阵线正在滑向先锋共产主义革命，夺权后的共产党人很可能清洗革命党，并夺取革命果实。在时机宝贵的当下，尽快集结残存的革命党部队，发动§1政变§!。§!\n\n§g作为反对派，他需要想办法降低阵线的凝聚力，团结右翼力量，最终发动政变。§!"

SFR.13.t:0 "会议中的演讲"
SFR.13.d:0 "潮湿的空气压在会议室里，煤油灯的火光一晃一晃，把每个人脸上的疲惫都照得发黄。桌上的文件摊了一层又一层，从粮食调配到民兵整训，从交通线维护到地方干部任免，纸上写满了字，可真正落实下去的东西却少得可怜。有人说应当再观察几天，以免伤了群众情绪；有人说地方条件复杂，命令不能下得太死；还有人反复强调目前局势艰难，不宜采取“过于激烈”的措施。话说得一个比一个周全，仿佛只要再多解释几句，根据地的混乱就会自己消失。\n\n陈坚坐在桌边，听着这些话，脸色一点点沉了下去。终于，在又一名干部以“基层执行困难”为由推脱整训计划后，他猛地一拍桌子，震得油灯都跟着晃了一下。\n\n“困难？”他冷冷地扫过众人，“现在谁不知道困难？缺粮、缺枪、缺药、缺人，这些事难道只有你们知道？”他的声音不高，却压得人喘不过气，“可你们嘴里天天挂着困难，手上做了什么？该清查的不清查，该整顿的不整顿，该推进的不推进，一件事拖一天，一天拖一周，还要拖到什么时候，反动派打过来？你们是要干革命，还是要替失败找个体面的借口？”\n\n会议室里一下安静下来，只剩下窗外风吹木板的轻响。\n\n陈坚站起身，目光像刀子一样从众人脸上刮过去。“我最厌恶的，就是这种畏畏缩缩的样子。敌人不会因为你写了几份报告就停下围剿，饥饿也不会因为你们彼此客气几句就自己消失。根据地还能撑到今天，不是靠谁会说漂亮话，而是靠有人硬着头皮把事情做完。你们若真怕担责任，怕得罪人，怕把事做绝，那不如现在就把位置让出来，省得占着桌子浪费大家时间。”\n\n没有人立刻接话。有人皱着眉，有人低头看文件，也有人露出不满的神色。只是无论他们心里怎么想，至少此刻，再没人敢拿“再议”两个字来搪塞了。"
SFR.13.a:0 "与会者各执一词。"
SFR.13.b:0 "陈坚说服了多数人。"

SFR.14.t:0 "秘密集结"
SFR.14.d:0 "会议又一次开到了深夜。小房间里，关于根据地生死存亡的议题被翻来覆去地讨论，人人都说自己有道理，人人都劝“再谨慎些”。陈坚听到最后，终于冷着脸把文件摔在桌上，怒斥众人只会拿困难当借口，把拖延说成稳重，把无能说成顾全大局。可骂归骂，他心里也清楚，只靠在会上发火，改变不了什么。有人不肯做事，那就只能去找肯做事的人。\n\n几天后，一封没有署名的短笺沿着交通线悄悄送了出去。入夜时分，陈坚披着旧军装，走进根据地边缘一间不起眼的民屋。屋里只点了一盏小灯，桌上摆着两碗热汤、几碟粗陋小菜，还有一名从共产党部队里秘密赶来的政委。两人先是寒暄了几句，谈了谈沿途的封锁和最近的伤亡，随后便很快切入正题。陈坚没有兜圈子，只直言阵线内部空谈太多，做事太少，若再无人出来推动整训和联络，革命迟早会中道崩殂。那政委沉默许久，最后放下筷子，低声表示愿意出面协助：能调动的人手、能接上的线、能提供的支持，他都会尽量去办。\n\n屋外风声很紧，屋里却安静得出奇。陈坚端起已经有些凉了的汤，第一次觉得这顿简陋的饭，比那些冗长的会议更像是在决定革命的走向。"
SFR.14.a:0 "我们必将取得胜利。"

SFR.15.t:0 "小集会"
SFR.15.d:0 "根据地边缘的一处空场上，红布被风吹得猎猎作响。被秘密召集来的士兵、党员和地方干部围成一片并不规则的人群，几个共产党激进派的骨干站在最前面，神情肃穆得近乎冷硬。陈坚站在临时搭起的木台上，目光从一张张疲惫、麻木、又隐约带着期待的脸上扫过，终于开口。\n\n起初，他的声音并不高，只是在讲过去的失败，讲革命党如何在一次次合作中被利用，又在一次次妥协中被出卖；讲阵线如何为了所谓团结，把根本对立的主张硬捏到一块，结果是谁都不敢真正负责，谁都不愿真正得罪人。可讲到后面，他的语气一点点沉了下去，像是刀刃慢慢从鞘里拔出来。\n\n“我们失去了多少同志？”他问，“多少人死在撤退路上，死在围剿里，死在那些本不该发生的混乱和拖延里？根据地今天为什么还困在山里？因为敌人太强？不，只因为总有人相信，靠让步、靠拖延、靠对右倾分子的幻想，便能替革命找出一条体面的活路。”\n\n台下安静得厉害。\n\n陈坚抬起手，重重指向身后的旗帜。“革命阵线曾经也许有它的价值，可现在，它正在变成一副锁链。它要求所有人忍耐，要求所有人克制，要求真正想把事情做到底的人一次又一次后退。结果呢？结果就是妥协的人还在谈团结，牺牲的人却已经埋进土里。远乡不会因为我们的善意而统一，国家也不会因为几场无休止的争论就自己获得新生。真正的革命必须重新开始，必须由真正敢承担责任的人来领导，由共产党内最坚定、最勇敢的同志们，把这场早该开始的统一战争打下去。”\n\n人群中很快响起了一阵低低的附和声，先是稀疏，随后连成一片。可就在这时，一名隶属革命党的干部从旁边挤了出来，脸色难看，却仍尽量维持着平静。\n\n“够了，陈坚。”他大声道，“阵线不是没有问题，可你不能把一切都怪罪在别人的背叛上！根据地能撑到今天，靠的就是大家还愿意坐下来谈。你现在这样煽动，只会让本来就脆弱的团结彻底完蛋，那还谈什么革命？阵线在这里倒了，那无数牺牲的父老乡亲，同胞同志们，该怎么办？”\n\n风吹过空场，刚刚还在附和的人群又安静了下来。无数双眼睛同时投向木台，等着陈坚回答。那一瞬间，他看着那个站出来的人，忽然意识到自己面对的，正是他一直以来最厌恶、却也始终无法彻底绕开的东西——妥协，迟疑，还有那些总把怯懦包装成理智的人。\n\n陈坚的嘴唇微微动了一下。"
SFR.15.a:0 "陈坚犹豫了。"
SFR.15.b:0 "“同志们，这就是我所提到的妥协分子！看看根据地现在…”"

SFR.16.t:0 "救济百姓"
SFR.16.d:0 "从白区送出来的物资总是见不得光的。药品被塞进装过肥皂的木箱里，盐和干粮压在粗布下面，几卷纱布和一小批工具则被分散藏进几辆不起眼的板车中。张一心亲自带着人，从夜里出发，沿着被雨水泡烂的土路，一连跑了好几个公社。第一处公社缺的是退热药和针线，第二处缺的是盐和能顶饿的杂粮，第三处更麻烦，连屋顶漏雨都还没来得及修，几名民兵抱着老旧步枪守在门口，像是在守一个随时会散架的世界。\n\n张一心一路上几乎没歇过。他亲自核对清单，盯着人把药箱搬去诊所，把粮食分给最困难的住户，又让随行的干部记下每个公社还缺些什么。有人认出了他，连声道谢；也有人只是沉默地站在旁边，看着那些终于被搬下来的救命东西，像是不敢太早露出高兴的神色。毕竟这年头，谁都吃过“东西已经在路上”的亏。\n\n等跑到最后一个公社时，天都快黑了。张一心的靴子早就沾满了泥，嗓子也哑了，可他还是跟着当地干部去看了粮仓、慰问了一些伤员、然后差点没在那条被冲坏了一半的小路摔个狗啃泥。一路上，他听到的几乎都是同样的话：日子太苦，物资太少，下面的人越来越撑不住；至于根据地上头那些争来争去的事，普通人早就懒得分辨到底是谁对谁错，他们只想知道下一批粮食还能不能来。\n\n傍晚的风吹过院坝，几个孩子正围着板车打转，想看看箱子里是不是还有能分出来的东西。张一心抬头看了看远处发灰的山影，心里忽然冒出一个念头：也许他完全可以趁着这一路做事的时候，顺便多说几句，把那些账算到共产党头上；可也许，现在最要紧的，根本不是多骂谁几句。"
SFR.16.a:0 "…他决定顺便骂几句共产党。"
SFR.16.b:0 "…他决定认真干活。"

SFR.17.t:0 "左与右之争吵"
SFR.17.d:0 "会议一开始还勉强像是在讨论问题。\n\n关于下一阶段的征发，关于几个公社的粮食缺口，关于该把有限的枪支优先拨给哪支部队，桌上的议题原本都还算具体。可陈坚显然不是为了这些细枝末节来的。他带着几名共产党干部坐在一侧，从头到尾都没有翻几页文件，只是在听，像是在等一个合适的时机。等到张一心手下的一名革命党干部开口，提议“暂缓部分激烈措施”时，陈坚终于冷笑了一声，立马把对方推上风口浪尖。\n\n他先是骂那群人只会写报告、讲困难、谈什么现实约束，随后话锋一转，直接把矛头指向了张一心和他背后的革命党残部。陈坚说，革命阵线走到今天这步，恰恰就是因为太多人还抱着革命党过去那套软弱幻想；说白区运来的那点物资、海外援助和残存旧部，非但没有救活根据地，反倒让一群人继续沉迷于“妥协也能胜利”的梦里；说若不是这种对旧日政治习气的留恋，根据地根本不会在一次次犹豫与拖延中流这么多血。\n\n共产党那边的人很快接过了话头。有人拍桌，有人起身，有人把过去几次失败的作战、夭折的整训和半途而废的政策全翻了出来，像念悼词一样一条条往外报。每报一条，屋里的空气便更沉一分。张一心一开始还试图维持冷静，解释根据地不能靠口号打仗，公社里的物资也不是凭激情就能变出来的；可越往后，说话声就越大，桌子拍得就越响，连原本只是旁听的干部也跟着吵了起来。有人骂共产党只会借着群众名义搞清洗，有人骂革命党做事畏首畏尾、把根据地搞得半死不活，挫败革命进程。\n\n到了后来，这甚至已经不是会议，而更像一场公开的批斗。陈坚站着，眼神阴得吓人，像是巴不得当场把“妥协主义”几个字钉到张一心额头上；张一心也终于放弃了那点温和姿态，反问若没有革命党的人脉、残部和联络线，根据地是不是早就饿死在山里；而那些原本还能坐着的人，现在也基本都站了起来，或骂，或劝，或索性谁也不听谁。\n\n叶文石坐在主位上扶额，直到这时才真正意识到事情已经坏到了什么程度。"
SFR.17.a:0 "共产党人在争论中占得上风。"
SFR.17.b:0 "革命党人在争论中占得上风。"
SFR.17.c:0 "谁也没有占得上风，但阵线的名声毫无疑问的臭了。"

SFR.18.t:0 "旧朋友，旧航线"
SFR.18.d:0 "那天难得没有人来催下一批物资的去向，也没有新的坏消息送到桌上。张一心便抽出半个晚上，和几个还留在根据地里的老朋友坐到了一起。都是些留学出身的人，有的早年在港口、洋行和学校之间奔走，有的曾替革命党联络海外友人，有的甚至还记得当年那些写着外文标识的箱子被一批批搬下船时，码头上那种几乎叫人相信未来已经近在眼前的喧闹。\n\n那时候，他们也的确是这样相信的。相信只要革命能在远乡站稳脚跟，外面的世界总会有人看见，总会有人愿意伸手；相信机器、药品、技术、顾问，甚至只是一些稳定的贷款，就足以让一个满身伤痕的国家重新喘过气来。那时的他们谈起未来，谈起工业，谈起现代军队和新式政党，就像是描绘属于远乡未来的蓝图。\n\n可到了今天，再回头看，那些光辉的往事却像隔着一层厚障壁。援助不是没有，可总是太少、太慢，也太不稳定。能送进来的，常常只是几箱勉强能用的药、一批型号杂乱的枪支、几包零碎的零件、没人能读懂的外语说明；等这些东西穿过白区，绕过封锁，避开沿路层层盘查，再真正落到根据地手里时，往往早已于事无补，对局面没有丝毫改善。至于那些曾经答应过会来的“大帮助”，则大多停留在信中的承诺、街头巷尾的传闻、以及某个永远也不会准时靠岸的码头上。\n\n桌上的酒没剩多少，话也渐渐少了。有人开始翻旧照片，有人提起已经死去或失散的同志，还有人低声说，未来的远乡也许终究还是要依赖于那些外部的联系，就像王国曾经对人鱼的许诺一样。\n\n张一心沉默了很久，最后只是把手指轻轻敲在桌边。也许他们确实还可以再想点办法。既然大援助等不来，那便只能从还能摸得到的地方下手：要么设法从白区再转运一批真正派得上用场的军事物资；要么干脆务实一点，多弄些民用物资，维持根据地的稳定，安抚一些百姓。"
SFR.18.a:0 "想办法从白区运一批军事物资过来。"
SFR.18.b:0 "还是多弄一点民用物资吧。"

SFR.19.t:0 "安插内鬼"
SFR.19.d:0 "那顿饭吃得很慢，桌上的菜没动多少，酒也没人真喝下去几口。张一心坐在角落里，和几个能信得过的军官低声谈着话。起初大家聊的还只是近来的局势，谈补给，谈练兵，谈根据地里越来越紧张的气氛云云；可话说到后面，终究还是绕不开那个所有人都明白、却一直没人愿意先点破的问题——若真到了要变天的时候，枪口究竟会朝向哪里。\n\n有人说，共产党那边近来动作太大，若再不提早准备，只怕到时连说话的资格都没有；也有人说，现在表态还太早，真正要紧的是先看哪一边能把更多部队拉过去。几个人你一言我一语，声音都压得很低，像是生怕隔墙也会长出耳朵。张一心始终没有急着下判断，只是把每个人的话都记在心里：谁更偏向维持旧局，谁对陈坚那套作风已经生厌，谁又只是想在将来的风暴里尽量给自己留条退路。\n\n等到这场小聚散去时，夜已经很深了。张一心站在门口，看着那几个军官各自消失在黑暗里，忽然意识到一件事：根据地里真正危险的，或许还不是谁喊得最响，而是越来越多人已经开始悄悄决定，到了那一天，自己到底站在哪一边。"
SFR.19.a:0 "我相信你们，也请你们相信我。"

SFR.20.t:0 "支持革命阵线"
SFR.20.d:0 "屋里安静得只剩下纸页翻动和茶水渐冷的声音。窗外风声断断续续，像是有人在黑暗里来回踱步。叶文石坐在桌前，面前摊着几份刚送来的报告：有关于公社动员情况的，有关于部队内部风向的，也有关于阵线里激进派暗中串联的。每一份都不算长，可拼在一起，却足够让人看清一个事实——根据地已经经不起更多混乱了。\n\n赵永军最先开口。他的声音不高，但很稳。他说，阵线如今之所以还在继续战斗，不是因为上面的人多能吵架，也不是因为哪支部队特别能打，而是因为根据地里的人民还愿意支持革命，愿意在一次次失败之后，仍旧把这面旗帜看作希望，仍然愿意支持这场战争。若连这点根基都松了，那么不论领导层看起来有多完整，军队名义上有多忠诚，到头来都不过是徒有其表。现在最要紧的，不是急着整谁、压谁，而是先把群众重新组织起来，稳住民心，然后再谈整顿的问题。只要根据地的居民还站在阵线这一边，反对派再怎么闹，也终究翻不起天。\n\n叶文石听完，沉默了一会儿，才慢慢摇头。他承认赵永军说的有道理，可他更清楚，眼下真正危险的，不只是下面的人心，而是上面的秩序。阵线已经不是当初那个还能靠一股气撑着往前走的阵线了，如今派系林立，军政脱节，谁都在担心别人先动手。若领导层继续这样彼此猜疑、彼此拆台，那么群众工作做得再好，也只会变成替别人作嫁衣裳；若军队的忠诚不能先确定下来，那么一旦局势失控，今天还在高喊革命的人，明天就可能调转枪口。老百姓不是不重要，可重中之重是先把内部稳定下来，把最关键的位置和最关键的枪杆子抓在手里，再谈别的。\n\n刘青兰坐在一旁，等两人都说完，才轻轻放下手中的杯子。她没有直接反驳谁，只是说，问题也许恰恰在于，阵线里太多人总想着先压住别人，再来谈合作。可现在的根据地已经太脆弱了，脆弱到每一次清算、每一次公开对立，都会把原本还站在同一边的人再推远一步。她认为，真正该做的，不是继续把反对派一概视作敌人，而是想办法扩大阵线内部民主的作用，让更多人仍有留下来的理由。哪怕是那些激进分子，也未必不能被争取一部分。若能把敌人从内部拆开，让反对派彼此牵制，而不是一股脑被逼到一条路上，那么阵线未必不能多争来一点时间。\n\n突然，屋外有鸡叫了一声，叫得很不合时宜。三人都停了一下，赵永军甚至笑了笑，说至少根据地还有鸡，说明情况没坏到头。\n\n屋里又一次安静下来。"
SFR.20.a:0 "赵永军说的对，人民才是我们的根基。"
SFR.20.b:0 "叶文石说的对，稳固阵线当然应该从内部下手。"
SFR.20.c:0 "刘青兰说的对，革命阵线不能在这个情况下进一步分裂。"

SFR.21.t:0 "会面"
SFR.21.d:0 "会面安排在东坡村一家后院的一间旧仓房里。墙角还堆着没来得及脱壳的谷子，屋梁上挂着几串干辣椒，门外则有两名民兵来回巡逻。若不是桌上摊着地图和几份文件，这里怎么也看着不像革命阵线同共产党地方干部商议根据地建设的地方。\n\n叶文石到得稍早。他坐在桌边翻看材料，越看眉头皱得越紧。赵永军则站在门口，同前来开会的几个地方干部一一握手，问他们路上顺不顺利，饭吃了没有。有人笑着说，饭倒是吃了，就是粥稀得能照见祖宗。赵永军只能以苦笑回应。\n\n笑声让屋里的气氛松了些。\n\n可等会议开始，话题很快沉了下去。地方干部们带来的意见并不复杂，却件件麻烦：春耕缺种子，东西坏了没人修，前线的需求压得太紧，山外逃来的难民越来越多，识字班开了又停，停了又开，许多青年白天种地，晚上还要站岗，实在撑不住。至于基层组织，更是常常一人兼几职，出了问题连个能追责的人都找不到。\n\n一名年纪较大的干部把帽子摘下来，放在膝上揉了又揉。\n\n“我们不是不愿支援革命。”他说，“可什么都缺，实在是难以为继啊。如果在个别领域专门调拨资源的话，倒是可以调整一下生产方针。”\n\n赵永军听得很认真，把几条意见逐一记下。他把能问的都问了一遍，从每村劳力数问到牲口数量，又问哪些地方可以组织互助队，哪些村子又需要急迫的救助。叶文石偶尔补上一句，提醒他们也要考虑天灾和战争对道路的破坏，有些地方的联络变得断断续续，难以支援。\n\n屋里的气氛并不尖锐，却也谈不上轻松。每个人都明白，根据地建设不是一句“支持基层”就能解决的事。地方干部希望得到更多资源和更明确的放权，阵线领导层则要考虑有限的补给、军队的需要。\n\n叶文石沉默片刻，终于开口。"
SFR.21.a:0 "你们的需求，我们一定会考虑…"
SFR.21.b:0 "…但是，现实也是很残酷的。"

SFR.22.t:0 "我们的根基所在"
SFR.22.d:0 "赵永军收到生产报告时，天还没亮。窗外的山雾贴着屋檐流动，屋内的油灯烧得只剩一点微光。值夜的干部把报告放到桌上，本以为赵永军会先问前线配给，没想到他翻开第一页，第一句话却是问今年各地少了多少劳力。\n\n“七个村合计少了三百多人。”下属一边翻看报告，一边答道，“有些参了军，有些被抽去修路，还有一部分是逃难来的，暂时连住的地方都没有。”\n\n赵永军点了点头，继续往下看。报告涵盖了很多内容，比如哪里的田被山洪冲坏，哪几个村缺物资没法开工，哪里闹了瘟疫，哪几户人家同干部吵过架。写到最后，还有人用红笔补了一句——若继续按现有标准生产，部分村庄可能无法维持明年播种。\n\n下属有些不安：“赵委员，这些地方干部总喜欢把困难写得大些。领导层现在要考虑阵线稳定，要考虑反对派，要考虑军事压力。若每个村都来叫苦，我们恐怕顾不过来。”\n\n赵永军抬起头，看了他一眼。\n\n“你觉得根据地是什么？”\n\n下属愣了愣，答道：“是我们开展革命战争的后方。”\n\n“后方是谁？”赵永军问。\n\n屋里安静下来。远处传来鸡叫，隔壁炊事班大概已经开始烧水，湿柴被点燃时发出闷闷的噼啪声。\n\n赵永军把报告合上，语气并不严厉。\n\n“根据地是我们赖以生存的生命线，可它原本就是属于人民的土地，如果我们一切行事为了和什么‘反动派决一死战’，那我们和那些吃尽人民血肉的军阀没有什么区别。仗打输了总是可以转移，可若农民不再相信我们，若他们觉得革命阵线同过去那些收税、征粮、抓丁的人没有区别，那我们就算把旗帜插到平京，也得不到人心。”\n\n下属低下头，没有再争辩。\n\n赵永军叹了口气，又把报告推回去：“不是说前线不重要。前线若败了，反动派会回来烧村子；可后方若垮了，前线连一碗热粥都没有，还打什么仗。我们不能让农民只在需要做出牺牲的时候才想起自己是革命的一部分。”\n\n他拿起笔，在报告边缘写下几项批示：减免受灾村征粮，组织互助耕作，优先修复水车，抽调识字班干部协助登记难民土地。写到最后，他停了停，又补上一句——各级干部不得以军事名义随意摊派。\n\n“去办吧。”赵永军说，“告诉下面的人，地里的事不是小事。谁看不起这些小事，我第一个找他谈话。”\n\n窗外雾气渐散，山坡下隐约露出几块湿润的田。"
SFR.22.a:0 "土地会变，但人民永存。"

SFR.23.t:0 "一顿饱饭"
SFR.23.d:0 "天擦黑的时候，王二才扛着锄头回了公社。那天他在地里忙了一整日，从清晨弯腰到日头落山，鞋底沾满湿泥，手掌磨得发红，肚子也早就空得发紧。一路上他还在想着，今晚多半还是那几样清汤寡水的东西，能垫垫肚子，不饿着睡觉，也就算不错了。\n\n可刚走到公社门口，他就闻见了一股久违的香味。\n\n院里热闹得像过节一样。几口大锅正咕嘟咕嘟地冒着热气，粮袋堆在墙边，几个干部忙着招呼人排队，说是上面刚给地方公社拨了一批粮食下来，让大家都先吃顿好的，补补这些天亏空的身子。王二才愣了一下，连锄头都差点忘了放，等真端上碗时，才发现里面不是稀得能照见人影的粥，而是实打实的干饭、热汤，还有一大盆炒得油亮亮的菜。有人笑着说慢点吃，别噎着；可院里谁都顾不上斯文了，只听得见碗筷碰撞和一阵接一阵满足的咀嚼声。\n\n王二才一连添了两碗，吃得额头都冒了汗，肚子里那股空落落的感觉总算被一点点压了下去。饭吃到后来，整个人都像重新活过来了一样，连白天在地里攒下的酸痛都轻了不少。\n\n夜深以后，公社渐渐安静下来。王二才躺在铺上，肚子是暖的，手脚也是暖的，连风吹进屋里都不觉得那么难熬了。他翻了个身，听着外头偶尔传来的狗叫和虫鸣，迷迷糊糊地想着：要是以后也能常常这样，日子兴许就真有奔头了。\n\n这一晚，他睡得很香。"
SFR.23.a:0 "“如果每天都能这样，该多好啊！”"

SFR.24.t:0 "清洗国际派？"
SFR.24.d:0 "叶文石坐在主位上，翻着那几份关于“反对分子”的报告：有的是地方上交来的检举材料，有的是军中干部私下递上来的名单，还有几份则写得含糊，只说“部分人员思想可疑”“与国际派往来过密”“对阵线路线多有非议”。字不算多，却看得人心里发沉。\n\n赵永军先开了口。他的语气很强硬。阵线如今已经经不起更多试探了，敌人既然藏在内部，就不能再拿什么顾全大局当借口。根据地现在是危急存亡之秋，不能在大是大非上无底线容忍。若再犹犹豫豫，让那些心思不纯、立场摇摆的人继续留在阵线里，只会把问题拖得越来越大。与其等他们将来坏事，不如现在就快刀斩乱麻，把该处理的人尽快处理掉，尤其是那些和国际派勾连过深、在组织里影响又不小的人，更不能再留情面。\n\n叶文石没有立刻表态。他知道赵永军不是在说气话。阵线内部这段时间的确越来越不安稳，许多矛盾已经不是他一人可以压得住的了。若真想保住局面，动手清理一些人，未必不是办法。\n\n可刘青兰很快接上了话。她说，清理一部分真正不忠、或者已经明显在破坏阵线的人，她并不反对；可若借着“处理反对分子”的名义，把那些软弱的、犹豫的、甚至只是和国际派有些关系的人都一并当成敌人，那就不是整顿，而是清洗，在革命尚未成功的今天，这是万万不可的。她直言，赵永军的话里有太重的偏见，像是恨不得借这个机会把那些不够强硬的人一并赶出去。可阵线本来就已经风雨飘摇，若这时候再把内部搞得人人自危，那敌人还没来，他们怕是要先作鸟兽散。\n\n屋里又安静下来。"
SFR.24.a:0 "…听赵永军的，尽量减少国际派的影响力。"
SFR.24.b:0 "…听刘青兰的，不要太早破坏党内团结。"

SFR.25.t:0 "境外与本土派系"
SFR.25.d:0 "叶文石独自坐在桌前，慢慢翻着那份刚送上来的报告。纸上写得很谨慎，没有把话说得太死，只是提议在接下来的会议中，适当强调阵线内部那些“亲近本土化、主张因地制宜开展革命、反对境外势力过多干涉”的力量，并将其概括为一个并不十分明确、却越来越常被人提起的名字——本土派。\n\n叶文石盯着那几个字看了很久。\n\n严格说来，这并不是一个真正成形的派别。它没有完整的纲领，没有统一的组织，也没有谁能站出来说自己足以代表它的全部。可叶文石同样清楚，正是这些模糊而分散的倾向，构成了根据地如今最坚实、也最沉默的一部分力量。许多地方干部、基层组织者、公社骨干，甚至不少军中的中层人员，都天然更愿意相信这种说法：远乡的革命归根到底要靠远乡自己来做，要用本地人的办法、本地人的语言和本地人的经验，把这条路一步步走出来，而不是永远等着外部的指示，更何况现在连指示都没有。\n\n这当然有它的吸引力。如今的根据地早已被争论、失败和援助落空的消息折磨得疲惫不堪，外国的革命大多也以失败告终，或是缺乏干涉意图。若能在文书和会议中更明确地抬出“本土化”的旗帜，无疑能让许多本就犹疑的人更安心，拉拢一批人支持阵线。\n\n可问题也恰恰在这里。\n\n概念越模糊，就越容易被人拿去做不同的解释。本土派今天可以是因地制宜，明天也可以变成排斥一切外部联系；今天可以是整合根据地中坚力量，明天也可能变成针对国际派、针对外来干部、甚至针对任何“不够本地”的人的政治标签。一旦真在会议上把这件事拿上台面来说，那阵线内部原本还能勉强压住的裂痕，也许就会被再度撕开。\n\n叶文石合上报告，手指仍按在封皮上，没有立刻松开。整个根据地未来该用什么名义继续团结，又该为这种团结付出多少代价，他不知道。毕竟，有些话，一旦在大会上说出口，那可就收不回来了。"
SFR.25.a:0 "这种好事当然应该鼓励！"
SFR.25.b:0 "可能没有必要弄得这么大张旗鼓。"

SFR.26.t:0 "大局为重"
SFR.26.d:0 "密谈持续了很久。叶文石坐在两人中间，听完赵永军对基层动员和农民根基的看法，又听完刘青兰对党内分裂和激进派问题的担忧，始终没有急着表态。直到屋里彻底安静下来，他才慢慢开口。\n\n“我想过了。”叶文石开口道，“现在不能完全站到任何一边。”\n\n赵永军皱了皱眉，刘青兰则没有说话，只把手里的笔停在纸上。\n\n叶文石继续道：“我理解共产党那边觉得革命党旧部不可靠，革命党这边也怕自己迟早被并入共产党。下面的干部听风就是雨，完全不理解阵线的实际情况，这已经影响到前线的部队了。”他长叹一口气，“现在还不是做大张旗鼓的改革的时候，需要先重建中央的威望。”\n\n赵永军沉默片刻：“可若不做大的改革，中央容易被两边一起拖住。”\n\n“所以不是不做事。”叶文石敲了敲桌面，“我们要借中央的名义，恢复两党的合作。该进入阵线机关的人进入机关，该服从统一指挥的部队服从统一指挥；同时，把两边最喜欢煽风点火的人从要害位置上调开，先不用做大的处理，边缘化他们就行。”\n\n刘青兰抬起头：“这需要两边都让步。议会席位和资源都很重要。若不给，他们只会觉得中央空口许诺。”\n\n赵永军也点头：“乡村工作不能断。现在地方的物资高度紧缺，维持现状的话，下面会骂得很难听，而且骂得有道理。”\n\n叶文石没有立刻回答，只是低头看着桌上的几份清单。粮食、药品、干部、枪支、名额、职位……根据地什么都缺，可人人又都想从中央这里分到一点什么。要维持平衡，就得先把这些原本就不够分的东西，再硬生生挤出两份来。\n\n他轻轻叹了口气。"
SFR.26.a:0 "挤一挤，资源总是有的。"

SFR.27.t:0 "会议上的演讲"
SFR.27.d:0 "会议开到一半时，屋里的气氛已经沉得几乎叫人喘不过气来。桌上堆着的是坏消息：补给不足，基层人心浮动，地方干部互相推诿，阵线内部的争执也丝毫没有要停下来的意思。有人低声争辩，有人皱着眉不说话，还有人已经开始盘算，若局势再坏下去，自己的后路如何。\n\n叶文石终于站了起来。\n\n他没有立刻去谈哪一派对、哪一派错，也没有先讲那些具体而琐碎的安排，只是慢慢扫视了一圈会场，像是要把每个人脸上的疲惫和不安都看清楚。然后，他开口了。\n\n他说，远乡革命走到今天，从来不是靠哪一个人、哪一支枪、哪一张嘴撑下来的。它能活到现在，是因为有人在最艰难的时候仍愿意相信，这片土地不该永远交给旧秩序摆布；是因为有人在一次次失败、流血和撤退之后，仍旧没有把旗放下。多少同志死在路上，多少村庄被烧成废墟，多少人把自己的家底、前途，乃至性命都压在这件事上，不是为了看着他们这些还活着的人，在最要紧的时候先彼此拆台。\n\n他顿了顿，又继续说。\n\n“我们现在当然有分歧。”叶文石说，“可革命什么时候没有分歧？我们可以争论路线，可以争论办法，可以争论谁做得对、谁做得不够，可唯独不能忘了，我们今天还坐在这里，本身就说明这场革命还没有失败。真正想看着我们分裂的，从来不是坐在这间屋子里的人，而是屋子外面那些巴不得根据地自己垮掉的人。若我们在这种时候先乱了阵脚，先把彼此看得比敌人还可恨，那就不是在推进革命，而是在替它掘墓。”\n\n屋里没有人插话。\n\n叶文石停了片刻，语气终于缓下来了一些。\n\n“我们这一代人，未必能亲眼看见远乡彻底变成自己想要的样子。但至少，不该让后来的人提起今天的时候，说我们不是败给了敌人，而是败给了自己。阵线走到这一步，不是为了让谁赢一场争论，而是为了让远乡迎来一个有所希望的未来。”\n\n那一刻，会场里长久的沉默终于被打破了。"
SFR.27.a:0 "与会者纷纷起身鼓掌。"

SFR.28.t:0 "革命的军队"
SFR.28.d:0 "军事会议开在正泸北的一处旧祠堂里。牌位早已被转移，正中挂上了阵线的地图，香案成了临时会议桌，几把长枪靠在墙边，还沾着没洗干净的泥。若祖宗在天有灵，见到子孙把祠堂用成军委会场，大概也只能叹一句世道艰难，然后请大家别把屋顶打穿。\n\n叶文石到场时，几名部队代表已经吵了一轮，不同的派系的代表坐在座位上，面红耳赤。林有志坐在一旁，脸色阴沉得像暴雨前的山，好像随时计划找人打一架。\n\n叶文石听了许久，才慢慢开口。\n\n“诸位说的都不是小事。”他说，“但我今日不是来判谁更委屈的。若只是比谁吃的苦多，恐怕这间屋子里没有一个人能赢过山下那些刚埋了亲人的百姓。”\n\n屋里安静了些。\n\n“远乡的革命走到今天，已经失去了太多东西。我们失去过城市，失去过工厂，失去过土地，失去过同志，也失去过许多原本以为不会失去的机会。可革命之所以还没有被彻底扑灭，靠的并不只是山林险阻，也不只是敌人的一时疏忽。真正让阵线能够继续支撑下来的，是我们手里还有一支为人民而战的军队，一支没有在失败之后立刻散掉、没有在困难面前立刻倒向别处的军队。”\n\n“但军队并不是天然可靠的。枪握在谁手里，并不自动意味着它知道该为谁开火。若一支军队只忠于某个个人，只忠于某个派系，只忠于一时的利益和成败，那么它今天可以为革命而战，明天也可能为了别的什么而转身离开。大家出身不同，番号不同，过去听命的机关也不同。若因此就各认各的山头，各守各的账本，那我们同那些靠私兵保命的乡绅军阀又有什么区别？”\n\n一名年轻军官想说什么，却被身旁的人拉住。\n\n叶文石继续说道：“这意味着军队需要知道自己保护的是什么。它保护的不只是根据地这一点歪瓜裂枣，它保护的，是远乡革命的星火，是普通人未来不必低声下气活着的未来，是打破千百年来控制远乡的封建力量的希望。没有这种认识，军队就只是一群拿着武器的人；有了这种认识，它才真正称得上是革命的军队。”\n\n林有志终于抬起头，声音低沉：“所以，统一指挥必须落实。”\n\n“是。”叶文石点头，“但还不止如此。革命军队只能忠于革命，忠于阵线共同承认的事业，忠于那些把粮食、儿子和希望交到我们手里的人民。”\n\n他看向众人，语气平缓。\n\n“从今日起，各部队联络、补给、任命和调动，都必须回到阵线中央的统一体系中。谁有意见，可以在会上说；谁要私下另立山头，那便会得到最严厉的惩罚。”"
SFR.28.a:0 "革命的军队，忠于革命！"

SFR.29.t:0 "叛逆的军队"
SFR.29.d:0 "屋里没有人先说话。桌上摊开放着几份内容揪心的报告：部队训练不足，纪律松散，军官与基层之间命令脱节，甚至还有一些立场暧昧、心思不纯的人混在队伍里。这样的武装，在没有爆发全面战斗的时候可能还行，可若真到了要决定根据地生死的时候，谁也不敢保证它还能否靠得住。\n\n叶文石把最后一页报告翻过去，叹了口气。他知道，这不是靠一句“以后再说”就能拖过去的事。根据要活下去，乃至实现解放全远乡的理想，就不能让当下的情况继续。叶文石作为如今最重要的调停者，本就一直靠维持左右两派合作来保证阵线稳定，而军队忠诚与秩序的问题，恰恰正卡在这条危险的中线之上。\n\n赵永军先开了口。“军队事务要紧，不能靠慢慢做工作。”他说，“队伍里既然已经有不忠分子，就不能再视而不见。他们若只是散漫，那还能解决，可要是敢把枪口转过来对向人民，那我们的不负责就会让我们成为远乡的历史罪人。现在动手清一批人，当然会伤筋动骨。可乱这一时，总比以后在战场上乱起来强。我们吃不起那种亏。”\n\n刘青兰却摇了摇头。她翻了翻面前那几份训练与补给报告，似乎没有退让的意思。“我不反对处理一部分真正危险的人，”她说，“可眼下最大的问题，恐怕还不是谁忠不忠，而是这支队伍本身就不够像样。训练不够，纪律不够，基层指挥混乱，补给和文书也一塌糊涂。现在就把力气全放在清洗上，只会让军心更浮，人手更乱。到最后，不忠分子未必清得干净，部队的战斗力却一定先掉下去。现在不能让根据地的武装力量陷入被动，先把纪律、训练和基本秩序抓起来，再小范围解决那些明显有问题的人，才更稳妥。”\n\n叶文石听着两人的话，缓缓点了点头。“你们说的都对。”他说得很慢，像是在一边说，一边替自己把思路理清，“军队里有不忠分子，这确实不能不管；可部队眼下的训练和纪律，也同样不能继续拖下去。若只想着清人，不管队伍怎么打仗，那最后只会剩下一支更干净、也更无力的部队。可若只顾着整训，又对那些危险因素视而不见，那也是在埋祸根。”\n\n话说到这里，屋里重新安静下来。最后，叶文石开口说道——"
SFR.29.a:0 "全面清洗！我们不能容忍军队中出现不忠分子。"
SFR.29.b:0 "先集中精力放到改善纪律上吧，大局为重。"

SFR.30.t:0 "调动部队"
SFR.30.d:0 "报告写得很简短，意思却不难明白。叶文石一页一页翻过去，看到的无非还是那几个老问题：中央周边的部队并不可靠，派系影响深浅不一，稍有风吹草动，便可能有人借着调动、补给和换防的名义搞出别的动作。\n\n摆在他面前的办法有两个。\n\n其一，是把革命党的残兵逐步调往中央，重新整合。那些人未必装备精良，恐怕也无法立刻派上什么大用场，但至少成分清楚，指挥关系相对明白，可以作为掌握在中央手里的骨干部队，维持稳定。\n\n其二，则是把共产党控制下的民兵频繁调动起来。民兵构成了根据地许多地方最直接的防御力量，也正因如此，一旦其中混入了不忠之人，或者让激进分子借着地方武装坐大，日后再想收拾，便未必来得及。与其等他们生根，不如现在就先让他们动起来，免得滋生地头蛇。\n\n叶文石把报告合上，手指在封皮上停了一会儿。这两个办法都有其代价。把革命党的残兵往中央调，会让一些地方更加空虚；频繁调动民兵，则会直接触动眼下最敏感的神经。可根据地从来没有什么不需要代价的选择，只有哪一种代价，更值得先去承担。"
SFR.30.a:0 "确保革命党的残兵或许更重要…"
SFR.30.b:0 "…但民兵构成了主要的防御力量，不能不防。"

SFR.31.t:0 "论把相互厌恶的人塞到同一间房里…"
SFR.31.d:0 "这场会谈本不该发生。至少，在许多人眼里，不该这么早发生。\n\n可到头来还是把人请来了。在几天的努力后，刘青兰和叶文石总算把几名平日里根本不愿坐到一起的人拉进了同一间屋子。革命党的人来了，共产党的人也来了，桌上甚至还难得摆着几份提前整理好的议题：地方建设、民兵组织、公社干部任命、物资补给的优先级，还有几个先前一直被故意搁着不谈的问题。\n\n最开始，一切还勉强像样。有人谈地方上缺乏药物，有人谈道路年久失修或是干脆没有，有人谈某几个公社迟迟交不上该交的东西。可等话题转到地方运转本身时，会场里的那点和平便迅速消失了。共产党那边直接指责革命党在不少地方上只顾维持旧人脉和旧关系，干部安排混乱，做事拖拉，许多原本可以落实的决议最后只能放弃。革命党的人立刻反唇相讥，说共产党只会仗着自己在基层动员上的优势到处伸手，张口闭口就是整顿和纪律，根本不管地方实际还剩多少余地。\n\n随后，声音越来越大，话也越来越难听。有人拍桌子，有人把几个月前的旧账都翻了出来，还有人开始拿哪个地方是谁先搞砸了说事，就差要指名道姓打一场了。叶文石听得很是头疼，但他也知道这次共产党那边并不是全然无理。至少在地方运转的问题上，对方确实更占理些。若只是为了把场面压住，硬把黑白搅成一锅浑水，那所谓的调停，某种意义上便是在替革命党一方解围。\n\n可问题偏偏也在这里。根据地当然需要秩序，也需要把事情做成；但如果让这一屋子的争吵太过干脆地分出对错，那么阵线里原本就不多的那点合作空间，恐怕也要跟着一起碎掉了。\n\n刘青兰站在一旁，叶文石坐在主位。两人一时都没有立刻开口。"
SFR.31.a:0 "最后，二人决定和稀泥。"
SFR.31.b:0 "刘青兰仔细想了想，还是决定帮革命党一方。"

SFR.32.t:0 "喝茶"
SFR.32.d:0 "屋里飘着淡淡的茶香，水汽把窗纸熏得有些发白。几名革命党元老围着桌子坐下，谁也没有先去碰那些摆得整整齐齐的点心。仗打到今天，能这样安安静静坐下来喝杯热茶，本身就已经算得上少见。\n\n刘青兰替众人斟了茶，先轻声开了口。\n\n“如今的局面，大家都看在眼里。阵线能撑到今天，是因为大家团结一致，为了革命理想而战。”\n\n一位年纪稍长的元老哼了一声，把茶杯放回桌上。“话是这么说，可现在有些人的做法，未免也太不像话了。总是叫人讲大局，还让不让人说话了？”\n\n“不是要你们闭嘴。”刘青兰摇了摇头，“而是要先想清楚，什么事情能留到以后争，什么事情不能拖到以后再说。现在根据地内外都不安稳，若我们自己还要为了旧账新账吵个不停，那别人就用不着费力了。”\n\n另一人沉默了一会儿，低声说道：“可变化总不能只是叫我们让步。阵线这些年变得太快，许多人嘴上说是为了革命，做出来的事情却像是要大转弯了。我们这些老家伙，不是不支持变化，只是怕变到最后，连最初的革命理想也一并忘记了。”\n\n刘青兰没有立刻接话，只是端起茶杯，抿了一口。\n\n“我明白。”她看着桌边几人，声音放得很缓，“可也正因为还记得为什么走到一起，才更该接受有些事情不能永远照旧。人会变，局势会变，阵线也会变。我们若只想着守住过去那一套，到最后未必守得住阵线，连过去也一并丢了。”\n\n屋里安静了一阵，只剩下茶水微微晃动的声音。\n\n过了片刻，先前说话最硬的那位元老终于叹了口气。“你这话，我不能说全都认。”他说，“但至少有一点没错——现在确实不是再闹下去的时候。”\n\n旁边有人接了一句：“能不能真的团结，谁也不敢保证。但现在情况危急，我们可以做一些让步。”\n\n刘青兰轻轻点头，把桌上的茶又续满了一圈。"
SFR.32.a:0 "至少谈出点什么了。"

SFR.33.t:0 "希望之火"
SFR.33.d:0 "“刘同志，咱这儿的夜校还办不办？老师被调走两个月了。”\n“前线来的伤员太多，药不够。”\n“刘同志，你真觉得以后会好吗？”\n“那我们现在该做什么？”\n“如果明天还是没有饭呢？”\n\n……\n\n回忆在掌声中散去。\n\n刘青兰站在台侧，看着台下的人群。那里有村干部，有民兵，有刚从前线抬下来的伤员，也有抱着孩子的妇人和衣袖上还沾着泥的农民。许多人脸上没有笑意，只有长久奔波后留下的麻木与疲倦。\n\n她走上台。\n\n“同志们，”刘青兰开口道，“我知道，最近有很多人问我们，革命阵线还能不能撑下去。粮食，伤员，还有反动派的军队，大家都很害怕，还有人问自己的家明天会不会被炮火烧掉。而说实话，这些问题，我也无法给出准确的答案。”\n\n“但我也想告诉大家，正因为问题还在，我们才必须继续留下来。若是困难一来，最先离开的就是我们这些干部，那革命还有什么资格谈未来？若是群众受苦，我们只会在文件里写‘形势严峻’，那我们同过去那些官老爷又有什么区别？”\n\n“希望不是挂在墙上的标语，也不是会议结束时随口喊出来的口号。希望是工厂里那盏快要熄灭的灯，是伤员醒来时有人递过去的一碗水，是农民知道自己种出来的粮食不会被白白糟蹋，是每一个人都相信，自己不是纸面的数字，一切的牺牲都有所意义。”\n\n山风吹动台边的旗帜，布面磨损，却仍在展开。\n\n“我们会犯错，也会争吵，甚至还会走许多弯路。但只要这片土地上还有人愿意把明天托付给我们，我们就不能让他们失望。革命的火不是凭空烧起来的，它靠每一双手护着，靠每一口气吹着。今日如此，明日也该如此！”"
SFR.33.a:0 "愿这份火种永不熄灭…"

SFR.50.t:0 "清洗反对派"
SFR.50.d:0 "历史上曾诞生过无数个短命的政治同盟，这些同盟的诞生与结局也大都雷同：在外力作用下，志不同道不合的几路人马临时联合起来抱团取暖，最终在对彼此的憎恶中分道扬镳甚至刀剑相向。在革命阵线的反对派——共产党激进派与革命党右派看来，革命阵线也是如此，而他们，自然要为了实现真正的革命而将其彻底解散。共产党激进派领袖陈坚与革命党右派领袖张一心在这一点上不谋而合，却注定不可能和对方实现有效的合作，毕竟，他们想要解散阵线的重要原因之一就是不想和对方共事。\n\n然而，也许是受到了昏君病重的消息的激励，也许是收到了反对派密谋颠覆革命阵线的消息，近期的革命阵线团结了起来，并开始打击反对派，以至于反对派越来越虚弱，最终，仍然打算解散革命阵线者，只剩寥寥几人。为了争取早已不存在的胜算，最后的反对派聚集在了一起商量下一步的计划，但他们注定商讨不出个所以然来，于是便把责任推卸到了对方的头上，开始和对方从革命党成立之初开始算对方的账，甚至大打出手。这闹腾的动静理所当然地引来了阵线的保卫者们。伴随着一声怒喝，几名士兵闯入了反对派聚集的会议室，将最后的反对派一网打尽。"
SFR.50.a:0 "同样的事情在根据地各地重复着…"

SFR.51.t:0 "黎明之后"
SFR.51.d:0 "在经历了一整夜的清洗后，阳新镇的太阳照常升起。会议室内，叶文石，刘青兰和赵永军疲惫地看向彼此——就差一点，红军打红军的闹剧就要在根据地上演。但最终，革命阵线经受住了考验，保住了最起码的团结，战胜了那些想要摧毁革命阵线的激进反对派。然而，虽然没有闹出内战，保住了革命阵线，但清洗人数之多还是超出了他们的预料。\n\n“我能看出张一心内心的动摇和投机本性，他会背叛阵线并不会令我太过惊讶，但令我没想到的是，居然连陈坚也会......”赵永军反复翻阅着两人的档案和证词，眼前发生的一切令他难以接受。刘青兰叹了一口气，接着说道：“很遗憾，我和你想的恰好相反。我能看出陈坚本质上是个过分固执的反民主主义者，他会反对阵线我并不会奇怪，这点革命党方面也早就与贵党反映过了。反倒是张一心看上去还是挺老实的，也缺乏人望，他的背叛对革命党而言实在是意外。”\n\n叶文石从两人的对话中闻到了一丝火药味，立马开口阻止两人再说下去：“行了，人心难摸，鸭肫难剥。无论这两人的心路历程是怎么样的，事实是他们都背叛了共产党和革命党，更背叛了两党组成的革命阵线。为了让革命阵线存续下去，为了革命不被内部的敌人瓦解，我们必须团结一致！当务之急，是确立一个新的领导核心，让革命阵线统一前进的方向！”\n\n“那您的意思是......”赵永军和刘青兰不约而同地看向了白发苍苍的叶文石，叶文石无奈地摆了摆手：“因清洗空缺出来的位子现在就得请你们选人补上。同时，阵线能闹出这种乱子，我这个领导人也得负责任。很多事情，就得仰仗你们了，等革命局势稍微安定一些，我就辞去主席的位子，然后，大家还按阵线的规则来选举出新主席。”\n\n赵永军和刘青兰两人面面相觑，会议室陷入了尴尬的沉默，很明显，两人对此并无准备。叶文石只好站起身来，宣布了此次会议的结束：“二位不必多想，现在最要紧的，是要做事。这些人事变动，也全是为了做事！”"
SFR.51.a:0 "“毕竟，我们还有很多事要做！”"

SFR.52.t:0 "政变"
SFR.52.d:0 "天刚蒙蒙亮，叶文石就已经走在了前往办公室的路上。作为一个革命者，他早已适应了早起，但此时的太阳只在地平线上露出了一角，路上也没有路灯，他的眼睛也早已不如年轻时那样明亮，这使得他不得不低着头，小心地走在昏暗而不平整的乡间道路上。不多时，他看到了远处正向他奔来的红军战士们——这对他而言并不稀奇，他见过无数次早起操练和巡逻的红军战士。然而，倘若他的眼睛能像年轻时那样明亮，黎明前的道路不那么昏暗的话，他将看到向他奔来的士兵们面带怒容且紧握武器，一副正在作战的姿态——虽然这并没有多少意义。\n\n很快，叶文石在毫无准备的情况下被士兵团团包围。绝境中的叶文石大声责问道：“我是来上班的，你们要干什么！”士兵们没有给他大喊大叫的机会，立刻堵上了这位前领导人的嘴并将他死死捆住。叶文石还未来得及担忧自己的命运，便开始思考起革命阵线的命运：既然他没有被当场杀掉，大概率是政变者要和他进行一场毫不平等的谈判。为了做好谈判的准备，他必须尽早知道这场政变的始作俑者到底是谁，于是他尽可能的用他那并不亮堂的眼睛看向四周，只要能看出部队前进的方向，他就能大致猜出士兵们要带他去见谁。"
SFR.52.a:0 "部队把他押去见了反对派首领。"
SFR.52.b:0 "部队似乎走的方向不太对…"

SFR.53.t:0 "来自左翼的审判"
SFR.53.d:0 "最终，叶文石被押送队伍送到了一个他并不意外却最为厌恶的人面前——陈坚，左翼中的极端派，典型的先锋共产主义者。某种程度上讲，陈坚简直就是他的反面：他一直谦虚谨慎地调解着革命阵线各派的矛盾，而陈坚本人就是矛盾本身，想要革命阵线没有“各派”和“阵线”，只留下听命于他的共产党强硬派。他一看到陈坚的脸，耳朵就会自动响起陈坚那聒噪的抱怨与咆哮。多么讽刺，他一直小心翼翼地维护团结，却为了维护团结不能也不敢去动最能破坏团结的人。最终，革命阵线被陈坚彻底解散。\n\n陈坚抓住的人当然不只有叶文石，还有赵永军和刘青兰等其他反对陈坚的人。在当众咆哮着宣读了一大堆或真或假的罪行后，陈坚当众宣判了刘青兰等革命党人的死刑。刘青兰固然能说会道，但这个法庭不可能理会她的辩词，侩子手也不会为区区言语而手软，当众执行了他们的死刑。相比起革命党人，陈坚对反对他的共产党人的审判要温和一些，赵永军等共产党干部只是被判处监禁，剥夺政治权力。\n\n在处理了共产党与革命党人后，陈坚终于开始审判叶文石这个失败的“和事佬”。陈坚慷慨激昂地细数着叶文石的罪状：贪污腐败、作战不力、思想消极、投机主义、修正主义、对资产阶级反动派妥协......这些都不重要，重要的是，他要对这位革命阵线的前领导人作出怎样的判决。他相当鄙弃叶文石这个失败的软弱分子，并认为革命阵线最大的失败就是让叶文石这个和事佬来当领导人，而非像他这样坚不可摧的革命者。但即使是他也明白，一个政权要是连和事佬也不能活着的话，那就没人能好好说话了。\n\n当繁多的罪行即将宣读完毕时，他看了一眼受审的叶文石：叶文石闭上了双眼，没有争辩也没有求饶，静静地等待陈坚的判决。\n\n最终，陈坚作出了一个曾令他纠结，却绝不会后悔的选择："
SFR.53.a:0 "…判处无期徒刑。"
SFR.53.b:0 "…剥夺政治权力。"

SFR.54.t:0 "革命党人的怒火"
SFR.54.d:0 "押送叶文石的队伍将叶文石送进了一处他未曾见过的地下室，在那里等待着他的，是一个并不令他意外的面孔——革命党右派的意见领袖，张一心。“呸！叛徒！你知道自己在做什么吗！”叶文石放弃了所有的准备用于谈判的言辞，因为他知道，无论张一心打算如何对他，张一心都会将革命阵线带到一个他绝不希望看到的未来，与其在牢中苟活到那一日，不如先逞口舌之快，让这个叛徒速速动手。\n\n张一心并不恼怒，露出了温和的微笑：“何必一上来就扣帽子呢？也许，我们完全可以先心平气和地谈谈。”“哪有绑着——算了，赶紧说说，你为你的反革命行为准备了什么理由吧！”叶文石闭上了双眼，听着完全不会令他意外的，资产阶级投机分子的冠冕堂皇之言：“张某此举非为一人一党之利益，实是出于保卫革命事业的公心。革命党本无背叛革命阵线之意，奈何共产党滥用暴力，颠倒黑白，为了扩充队伍和充实军资，连革命党人的家人和家产都不放过。因此，我党此举完全是为了自卫。但我并不像那些极端左派那样只容得下一种声音，我明白，共产党中也有能和我们共事的好同志，但必须由您来......”\n\n“想都别想！什么叫连你们的家人和家产都不放过？我们要是连革自家的命都做不到，还有什么资格去为远乡带去革命！”\n\n见热脸贴了冷屁股，张一心也冷下了脸：“有你的帮助，我们可以少流很多血，少杀很多人，希望你能为了革命和自己，不要再执迷不悟了。而且，就算没有你，我们也完全有能力掌控根据地的武装力量。正如我们没有共产党也能自己干革命，解放全远乡！”张一心不明白，为什么叶文石这个一直伏低做小的调解人会如此暴躁地回绝他的提议。\n\n而叶文石则是早就看透了这个假民主真独裁的，软弱的投机客，只恨自己没有足够的权威和魄力及时为革命阵线切除这一毒瘤：“呵，既想要一家独大一人独裁，又想要少流血，讲团结，既想要拉拢人心，又想要把革命中的错误推到共产党头上后将其一脚踢开，装模作样的要自己干革命，却从头到尾都没有讲你会怎么对待群众，或者说，你想要用什么人去发动群众。”\n\n张一心原本还想接着叶文石的话反驳下去，却始终张不开嘴——他还能说什么呢？要跟这个共产主义者说他认为他设想中的改良资本主义社会根本不需要像现在这样发动群众吗？于是，他明白了，连这个一直充当和事佬角色的共产主义者都这样冥顽不灵，其他的共产党人就更不会接受他的要求，认同他的“理想”了。\n\n最终，他干脆利落地毙了叶文石，以惊人的速度接管了混乱的革命阵线的军事力量。共产党人当然不会坐以待毙，而张一心也绝不会对前盟友手软，无论过程如何，代价如何，像这些妄图阻挠他的人一个也不能留。"
SFR.54.a:0 "要变天了。"

SFR.55.t:0 "革命危难之际"
SFR.55.d:0 "在叶文石的惊诧中，一个令他意外的面孔迎接了他：林有志，革命阵线最出色的指挥官之一。押送叶文石的士兵解除了他的束缚，但他却不知如何开口：怎么会是他呢？张一心、陈坚，他想到了许多个可能发动政变的人，唯独没有想过林有志这个鲜少干涉政治斗争的忠诚的军人。\n\n见叶文石久久没有开口，林有志便率先打破了沉默：“主席，情况紧急，陈坚和张一心等反对派发动了推翻您和革命阵线的政变，尽管我对革命阵线也有意见，但我无法相信专横的他们，更无法对此坐视不管。”\n\n听到这里，叶文石长抒了一口气：他怎么就没想到这些是反对政变的军队呢？不过，如果他们反对政变，为什么要那样粗暴地对待他呢？林有志仿佛看出了他的疑虑，很快给出了不算答案的答案：“因此，我希望您能交出权力，让更擅长作战的我来负责镇压政变并带领人民解放全远乡。很抱歉，事态紧急，我没有时间和精力准备一套更好的说辞来说服您。”\n\n说完，林有志便掏出了一支笔和一些文件，语气急迫却毫无怒意地让叶文石签字。叶文石怅然若失地接过了这些——他并不是为自己失去了权力和地位而难过，他自知革命阵线混乱至此，他当然要负首要责任。他之所以难过，是因为他自知辜负了所有人，倘若他这个调解人能真正调解好各派矛盾，保持革命阵线最基本的稳定与团结的话，他和林有志又何以至此呢？无论他有多少难处，做不到就是做不到，辜负了就是辜负了，下台便是理所当然的事情。\n\n在他签完名字后，林有志立刻抢过了文件，干脆利落地发给了周边的士兵们，大喊着宣布了一个个行动命令，并拿出手枪与革命战士们一同奔向了叶文石永远无法企及的地平线之外。孑然一身的叶文石只能留在原地叹息：他老了，再也跟不上革命了。但他相信，他做出了一个绝对不是最坏的选择。"
SFR.55.a:0 "革命的军队，如今真正为了革命而战。"

SFR.100.t:0 "不容乐观的局势"
SFR.100.d:0 "在革命阵线清洗反对派一周后，阳新镇的政治风波渐渐平息，根据地的生活逐渐恢复常态，革命者们的工作也走上了正轨。会议室内，赵永军向众人介绍着远乡当下的政治形势：“昏君郑钧病重之时，远乡各地大乱。我们也得以趁机扩大根据地，我们本应抓住这次机会继续渗透敌占区，扩大革命根据地。然而，革命阵线内部的反对派却在此时试图夺权并解散阵线，这使得革命阵线不得不为了自保而把宝贵的时间花在内部政治斗争上。每每想到这里，我不得不感到惋惜——我们的时间不多了！”\n\n“郑钧虽然一度陷入昏迷，但终究还是挺了过来，并正在尝试将远乡的反动力量组织起来彻底扑灭革命的火种。在南方，青天军趁势崛起，占据东南一角，打着恢复传统的旗号，披着玄之又玄的面纱，犯下的却是极端反动的虐民暴行。但不可否认的是，他们那反对腐败统治的民粹主义口号和迫害少数种族的种族主义行为确实有着一定的受众，得以不断扩张自己的势力，甚至开始跟我们争夺远乡的人心。”\n\n“在根据地内部，经济生产一度让位于政治斗争，人民的承受能力也快要到了极限，军队也缺乏基本的军事训练和政治教育。接下来，我们还有太多的工作要做，有太多的错误要弥补。”会议室内，刘青兰、叶文石两人叹息着表达了赞同。\n\n稍微停顿一下后，赵永军给出了他的建议：“因此，我的建议是，革命阵线这四个方面的工作最为紧要，分别是加强生产工作、巩固内部人心、改革工农红军以及渗透敌占区。我个人认为，当以巩固内部人心为先，加强生产工作稍次之。只有做好了政治工作和经济生产工作，渗透工作和军事改革才能顺利推行。毕竟打铁还需自身硬，经济基础决定上层建筑嘛！”\n\n“确实如此，事实上，负责渗透工作的同志们一直苦于内部政治经济状况堪忧而难以扩大工作成果。”刘青兰翻动着自己的笔记，继续说道：“毕竟，领导层的混乱和物资供应的困难肯定会对他们的工作造成不小的困扰。军队也是同理，没有充足的军需，战士哪里舍得用实弹训练呢？没有稳固的内政，领导层不统一方向，谁又能负责得起军事改革呢？”\n\n叶文石也补充道：“确实是这样的道理，但在合适的时机适当抓一下渗透工作也是好的，毕竟有不少根据地急缺的物资只能从根据地外获得。”会议室内的众人很快便达成了一致。众人商讨了一些细节问题后便结束了会议，紧锣密鼓地开始了他们的工作。毕竟......他们的时间已经不多了。"
SFR.100.a:0 "年去月来来又去，天时人事此中摧。"

SFR.101.t:0 "“你为什么要拿走我的屎？！”"
SFR.101.d:0 "为了尽快恢复生产，改善人民生活，更为了加强红军战士与人民群众的联系，许多红军战士在革命阵线的命令下带上水桶和锄头走出军营，前往农村帮助村民，参加生产劳动。年轻的新战士吴兆行就是其中一员。吴兆行能吃苦，但由于是城市工人出身，今天又是第一次到乡下劳动，不懂农活。于是班长便让他先去帮老乡干点不用下地的活，比如修家具，打扫房间。干完了再慢慢跟着大家伙学怎么干农活。\n\n吴兆行等红军战士毫无怨言，干活又快又好，因为他和每一个红军战士都清楚这些劳动的意义：为红军和革命阵线赢得民心。很快，他便几乎完成了自己的任务，毕竟贫穷的村民没多少家具需要他修，没什么家具的房间打扫起来相当快。之所以是几乎，是因为他不确定老乡院子里的这一桶排泄物是否也在他的任务范畴内。\n\n吴兆光很快便停止了这无用的疑虑——身为一名红军战士，为人民服务还用考虑这是不是在他的任务范围内吗？于是，他到水边倒掉了这桶排泄物，并忍着恶臭把桶洗得干干净净。在完成自己的任务后，他打算继续前往农田帮助其他的同志们。\n\n可他还没走出几步，便听到不远处的一个老伯向他怒吼：“你是谁！你为什么要拿走我的屎！”吴兆光对这突如其来的责骂不知所措，支支吾吾地说：“我想帮你洗干净——”“你们这些赤匪！之前征兵又借粮，现在连屎都要拿去了吗！”老伯看了一眼那被洗得干净的桶，火气更盛了几分：“你他妈还拿得那么干净，非要一点都不给我留！”\n\n幸运或不幸的是，吴兆行的班长就在附近。班长赶了过来，神色之严厉前所未有：“吴兆行，这是怎么回事！”吴兆行欲哭无泪——这说破天不就是一桶屎吗？这和清理便盆有什么区别啊？他只得手忙脚乱地阐明了事情的来龙去脉。老伯气的揪住了他的领子，就连班长也正欲发作，但班长似乎想到了什么，勉强挤出了一个微笑：”老伯，是这样的，这位是城里来的小孩子，没干过农活，不知道您是把这些攒起来当肥料。看在不知者不罪的份上，你就饶了他吧。我们这就赔钱给您，您消消气。“\n\n此话一出，老伯的怒容渐渐消失，吴兆行的脸却变得越来越红，他这才意识到自己是真犯了错了！于是连忙向老伯道歉。班长也跟着说：“老伯，您看，我们红军是不拿老百姓一针一线的军队，更是讲道理的军队。有些事情就是误会，一沟通就解决了，您说对不？”\n\n老伯爽快地笑了：“那当然，我知道你们讲理才过来跟这小子讲道理。要是别人，我才不跟他们废话呢，我直接动刀！”"
SFR.101.a:0 "对种子般的战士而言，能在粪土中成长是一种幸运。"

SFR.102.t:0 "内部维稳的必要性"
SFR.102.d:0 "反对派已在数周之前便被清洗，革命阵线已然转危为安。然而，革命阵线依然不是铁板一块。先前的内部政治斗争已使得革命阵线的思想与组织变得混乱，无组织无纪律的现象仍然存在——对革命阵线这一远乡革命的先锋队而言，这是致命且不可接受的。\n\n于是，正泸根据地又一次展开了统一思想，整顿纪律，稳固内政的运动。与以往不同，这一次，阵线领导层已达成共识，统一思想，叶文石、赵永军、刘青兰等人一同制定了本次整顿思想纪律的工作方案，这将保证本次整顿工作将得到百分之一百甚至是百分之两百的执行。\n\n在根据地政府内部，革命阵线的新领导层对红军官兵和政府人员开展了又一次调查，在群众的监督与指控下，一些腐败分子与残余的反对派成员被揪了出来。等待他们的，注定是悲惨的命运。革命阵线必须通过惩罚这些人来向军队和政府人员强调统一思想和严守纪律的重要性。思想坚定可靠的积极分子将填补那些空缺出来的职位，只有这样，革命阵线才能真正做到令行禁止。\n\n同时，为了稳固内政，革命阵线加强了对民众言论、人员流动、经济活动的监管与控制。这当然不受欢迎，但经历了内部清洗的革命阵线不可能给反对派的残余留下一丝一毫的生存空间——革命经受不起另一次反对派密谋了。\n\n当然，革命阵线也并不是只会用监视与清洗来稳固内政，脆弱而贫瘠的革命阵线同样也承担不起大规模处决的代价。革命阵线的新领导层知道，那些被动地卷入政治斗争中的无辜者理应得到宽恕。在被抓捕的反对派中，也有许多是“可以挽救”的迷途之人。在经历一定的思想改造和调查后，他们将再次被革命的队伍接纳。毕竟，这种内部政治斗争本就是一笔宜粗不宜细，越算越糊涂的糊涂账，就算要细细地算个总账，至少也要留到内战后再处理——如果还有战后的话。"
SFR.102.a:0 "戴着白手套可没法维护阶级队伍的纯洁性。"

SFR.103.t:0 "小范围军改倡议"
SFR.103.d:0 "无论革命者们对未来有着怎样的憧憬，远乡王国和青天军依然是他们所有人的共同的敌人，更是所有未来的拦路虎。因此，远乡工农红军与反动派注定会有一场不可避免的大决战。而王国政府近期的一系列改革与青天军影响力的扩张都在表明，这场决战即将到来。\n\n决战自然离不开军队之间的较量。然而，由于长期以来的政治斗争与经济困难，工农红军这把革命的利剑不仅没有随着时间的推移变的更加锋利，反而逐渐生锈。尽管他们依然有着顽强的斗志，但政治混乱带来的思想混乱与指挥失调还是影响了这支军队，武器弹药的匮乏则是让红军连实弹射击训练都不舍得搞。\n\n因此，红军的军事改革自然被提上了日程。而改革第一步，自然便是挑选负责改革的人。于是，林有志，二十九军之魂，革命阵线最出色的军事家之一挑起了这副担子。\n\n林有志早就想要改革红军了，只是由于之前政治上的混乱使他连提出改革计划都难以做到。然而，当他仔细调查了一番红军现状以及能用于改革的资源时，他便知道，很多他设想中的军事改革恐怕只能延后了——巧妇难为无米之炊。即便如此，他依然有办法利用有限的资源实现一些范围小但能迅速见效的改革：加强装备生产，扩大军事存在，改革军事训练方法，整合民兵，让一部分战斗力较强的民兵投入到正面战场，较弱的则承担起侦察、征粮、维持治安等非作战任务，并广泛地发动群众，让群众成为红军的眼睛与后盾。这些对革命者而言并不陌生，但想要执行这些改革需要一个稳定的领导层与强大的组织能力——这是革命阵线在清洗反对派后才能做到的。倘若一切都能按照计划进行，解放全远乡的日子便不会太远。"
SFR.103.a:0 "有限，但有效的改革。"

SFR.150.t:0 "风暴已至"
SFR.150.d:0 "在正泸根据地，数以万计的青年男女告别了他们的亲人，在红旗的指引下奔赴解放全国的战场。但这趟旅程并不只有离别的悲伤，不知是谁唱起了革命的歌曲，战士们便不约而同地唱起歌来，仿佛歌曲有什么魔法——或者说，所有的魔法都是一种歌曲，战士们忘记了行军的疲惫，眼前只有等待解放的远乡。\n\n在根据地外围，负责封锁革命根据地的王国军队乱作一团，他们遭到了红军的大规模进攻。所有人都知道，这次进攻不同于以往的小规模袭扰，一场全面内战已然到来。\n\n在正泸地区的各个邻近省份中，红军的渗透部队已经潜伏在省府大楼外，倘若前期的渗透工作做的足够，他们就能一举拿下整个省份，在战争之初便将解放区扩大数倍。\n\n在远离正泸根据地的新园市，小男孩金仔咽下了最后一个馒头。他还小，不知道什么叫革命，也不知道为什么米面盐油天天都在涨价。但他知道他必须想办法为家里带更多的钱和粮食，否则他就会像妹妹一样被妈妈卖掉，而他还不想离开妈妈。\n\n在平京，工人们在黎明之前开始了加班。随着王国进入战时动员状态，本就被生活折腾的喘不过气的他们的工作时长将会越来越长，生产安全条件也只会越来越差。天干物燥时，总有火种会找到薪柴。工人受苦时，芙蕾施曼等共产主义者的著作就会在工人间流转，在贵族老爷为非作歹的年代里，他们期待着由工人当家做主的未来。\n\n在远乡各地，命运的风暴已然降临，各地的革命者在各个方向上发起了对反动势力的全面进攻。只有时间才能证明，革命的火焰是会因这风暴彻底熄灭，还是会烧向无尽的远方。"
SFR.150.a:0 "红旗再展青天上，岂是苍生恨太平？"

SFR.151.t:0 "政府军投诚！"
SFR.151.d:0 "得益于我们的统战政策，我们成功地让一批王国政府军队临阵倒戈，上万名战士抛弃了无能的昏君，加入了革命的队伍。这不仅增强了我军的军事力量，还削弱了王国政府的力量，更是鼓舞了我军的士气，在敌军中起到了示范效应，让革命在政治上赢得了巨大的胜利。"
SFR.151.a:0 "好！"

SFR.152.t:0 "内战之终...？"
SFR.152.d:0 "胜利了！现在，南远乡大地上已经不存在成建制的反革命势力。在平京，革命者举办了一场盛大的阅兵式向世人宣告了革命战争的胜利。市民们原本对工农红军的到来感到担忧，但红军严明的纪律与亲民的态度让他们放宽了心，对贪官污吏和跋扈贵族的公开审判更是激起了普通市民们的革命热情，一些人在房子上挂起了红旗表示对革命的拥戴，整座城市笼罩在前所未有的欢乐当中。至少在此刻，革命的红星终于照耀了平京。\n\n但在红星光芒尚未照耀的地方呢？\n\n在喧嚣的城市中，旧时的权贵们正在收拾金银细软，带上远乡所剩不多的财富逃往未被革命染指的地方。更有甚者失去了理智，用自己和旁人的死亡为旧秩序殉葬。同时，暴徒们正在尽情利用着政权更迭带来的混乱，肆无忌惮地劫掠着市民的财富。流氓以及投机分子正在活跃，他们早已准备好了黄金、红旗以及革命者的著作，准备摇身一变成为新的“进步人士”，从旧秩序的寄生虫转变为革命新秩序的寄生虫。倘若革命的理念无法落到实处，这些无耻恶徒终将成为远乡工人新的统治者。\n\n在尚未开展土地改革的乡村中，农民们正焦急地想要弄清远乡到底发生了什么。有人说革命成功了，叶文石杀了老国王，做了新国王。有人说革命根本没有成功，这都是革命者的谣言。有人说革命成功了，平京的工人们天天都快活得像过年。还有人说革命者只是打进了平京，在西北和北远乡，以及南远乡的部分地区，国王的部队正在准备反攻。在地主乡绅有意无意的监视与教唆下，他们难以在讨论中寻得革命的真相。\n\n在革命者的子弹射程之外，大量旧势力的残余军队逃向了偏僻的山村与山岭，试图通过“游击战”为旧秩序战斗到最后一刻。附近的老百姓可就遭了殃。这些反动派顶着不计其数的头衔，打着五花八门的旗帜，但会做的事情只有三条——抢钱粮，征丁壮，反革命。他们的力量不足以打败红军，破坏农业生产却是绰绰有余。倘若革命的力量无法及时深入山村除暴安良并恢复生产，饥荒将让远乡与革命不复存在。\n\n南远乡内战是在动荡中爆发的，自然也会在动荡中结束。但很明显，结束的是内战，而非革命。前路固然困难重重，但远乡的革命者何时不是在困难中前进的呢？至少在今天，他们取得了阶段性的胜利。而世界很快就会看到，革命会为远乡带来什么。"
SFR.152.a:0 "...但是，我们还有其它分裂势力要处理。"
SFR.152.b:0 "...但是，我们还有青天军的“朋友”们需要处理。"

SFR.200.t:0 "新世界的曙光"
SFR.200.d:0 "历经多少困难，经过多少磨难，多少人或许已经见不到这一天，但最终我们还是把阵线的旗帜插在了远乡的首都之上。\n\n自反动派那残忍的背叛已经过了十数年，无数同志在街道、村庄、山林间牺牲，在反动派的暴政下，任何胆敢违逆官员士兵的群众都会被打上“赤匪”的名头，甚至于还未成年的孩童与无力的老妪都会被逮捕、殴打、虐待。\n\n在那个时候，最乐观的人也不会设想我们会在这一代人的时间里能够以胜利者的姿态回到首都，将革命的旗帜插到反动派的心脏上。但不论如何，我们终于战胜了南远乡的反动派们，将革命的烈火再次点燃。\n\n只是现在革命阵线还不能放松，虽然内战的胜利已经板上钉钉，但是那些流窜在道路与山林的反动派残兵败将、陷入无政府的城市以及脱离我们控制的乡村地区。\n\n革命的胜利依然道阻且长，同志们仍需努力。"
SFR.200.a:0 "先修整南方，再准备统一北方。"

SFR.201.t:0 "先来后到？"
SFR.201.d:0 "大规模冲突已经告终，可仍然有大量问题等待着战后的革命阵线去处理。无数等待处理的文件堆积在办公桌的案头，如何处理这些问题、先去处理什么问题都是能让阵线左右翼争论不休的事情。\n\n首先，革命阵线虽然夺取了南远乡地区的大量城市，可因为内战的破坏与资产阶级的不合作态度，无法生产阵线急需的工业品。根据远在城市的政工人员的反馈，城市内出现了大量垄断粮食与生活用品的投机分子与流氓团体，而在城市中的同志们因为人手短缺问题而焦头烂额。\n\n其次，便是流窜在山林乡野中的匪徒，组成这些匪徒的是内战中被阵线击溃后流窜的反动派军队与想要在混乱中分一杯羹的“老资历”土匪，这些占山为王的家伙们威胁着阵线的运输路线。除开这些匪徒以外，留在阵线手上的内战俘虏也是一块烫手山芋，如何处理他们也是个头疼的事情。\n\n最后，那就是最为棘手的乡村地区，不仅是因为乡村地区缺少医疗、农业机械等工业品，更是因为根据地土地改革的存在导致保守势力对革命阵线的厌恶与排斥。如果阵线能在这些地区建立组织，除了确保健康的粮食供给，更是能够削弱以乡村为聚集地的反动派们，为以后的改革打下基础。"
SFR.201.a:0 "我们应该先维持大城市的稳定。"
SFR.201.b:0 "处理各地流窜的土匪显然更中立。"
SFR.201.c:0 "帮助各地农村重建秩序有助于未来的改革！"

SFR.202.t:0 "处理投降部队？"
SFR.202.d:0 "在处理那些匪徒之前，我们得处理投降部队这块烫手山芋，最先要处理的便是旧政府军与叛军的基层士兵。这些士兵要么被强征入伍，要么便是被反动宣传裹挟着加入军队，只是加入内战的另一方情有可原，可他们所犯下的罪行也是难以抹去的。\n\n我们可以整编最有经验的旧政府军队来扩充阵线的部队，这些有着丰富常规作战经验的部队能成为军队改革的基石，但一股脑的收编会在阵线内引起不小的风波。\n\n最为激进的方案则是将他们全部处理掉，收编这些杂碎非但没什么好处，而且会让那些因为他们而死的同志蒙羞。还不如杀鸡儆猴，让那些在城市中潜藏的反对者安分守己，哪怕代价是会让有些人反感。\n\n至于折中的选项便是把他们发配去急需人手的地方，通过劳动改造来洗掉他们身上的罪恶，一来不用让血流成河，二来也好去支援那些因为内战而人手紧缺的乡村与根据地。不过这样我们需要调动行政资源来整合与管理，好让这些投降部队安分守己不去暴动。"
SFR.202.a:0 "为我们死去的同志报仇！"
SFR.202.b:0 "收编部分旧政府军，其余该判判。"
SFR.202.c:0 "准备大规模改造。"

SFR.203.t:0 "大剿匪"
SFR.203.d:0 "在脱离了危急情况以后，革命阵线每次开会时的争吵与辩论与日俱增，每个人都想表达自己的想法与观点……只是今天的会议已经有点偏离主题，逐渐有了朝着左右两翼攻击对方的苗头。\n\n叶文石扶着桌子站起了起来，见到这位他突然从主座上起身，原本吵闹的会场逐渐安静了下来，给老人留出了发言的机会。在座的革命者哪怕分歧再怎么严重，都还愿意给这位”老革命“尊重，愿意倾听他的发言与想法。\n\n他缓缓踱步至地图前，指尖划过连绵山峦与蜿蜒驿道：“这里是曾经有一个小村子，我们的游击队曾经在这里，可他们比解放更先等来的是反动派的刺刀。”\n\n“现在这座村子已经成了匪徒的巢穴，每天都有流氓和逃兵加入这个贼窝。”老人顿了顿接着说到。“这种情况不止一处，而是整个南远乡都在发生。”\n\n“同志们，我们不能让快熬到解放的群众们倒在黎明之前，剿匪的事宜不能再拖了。”"
SFR.203.a:0 "至少在这点上，与会人员达成了一致。"

SFR.204.t:0 "连带伤害"
SFR.204.d:0 "致中央：\n\n本报告期间内，我部坚决执行剿匪任务，保障人民群众安全，各项工作取得阶段性进展，相关数据已随报告附件发送至中央。\n\n根据现状总结，当前剿匪行动已清除南远乡主要匪巢12处，缴获武器弹药若干，俘获匪首及骨干分子数人，群众自发提供情报线索与支援。\n\n只是，在清剿过程中亦出现连带伤害：三处村庄因交火波及损毁严重，另有数十位村民被匪徒挟持为人质，在营救过程中阵亡三人，幸存者皆有带伤。\n\n另有匪徒混入村落中，在剿匪途中伪装成村民，导致部队与群众出现伤亡。而部队剿匪时出现的连带伤害与士兵应激问题也愈发严重，望中央提供心理干预与受损群众援助。"
SFR.204.a:0 "叫小伙子们冷静一点！"
SFR.204.b:0 "我看提出问题的人也很可疑啊！"

SFR.205.t:0 "政府军将领"
SFR.205.d:0 "抛开那些有累累血债的反动派不谈，远乡的军队算得上是爱国者与革命者的温床，在职业军官体系下大多数军官都是思维活络又有着朴素爱国情怀。\n\n但我们也不能忽略远乡军队在镇压人民群众时从未手下留情，可他们手上有着无辜者的鲜血这个事实无法改变。虽然有些人愿意悔改，也愿意接受改造；但有些人毫不在乎这些指责与罪名，觉得这只不过是在执行上级的命令，\n\n这些人虽然道德水平层次不齐，但是他们的军事素养与职业技能确实出众，如果能得到他们的帮助大可让阵线军事素养大步向前……但代价便是我们需要承担人民群众的怒火，哪怕只是赦免那些愿意悔改的人，也会有些许不满的声音。\n\n而还有一个选择，阵线可以安排一处特殊的监狱收容他们，在监狱中他们得和普通群众一样劳动以便进行改造工作，而再次同时他们仍然有机会施展自己的能力，哪怕是以出书立志的方式进行。"
SFR.205.a:0 "我们可以将他们送去特殊的监狱改造。"
SFR.205.b:0 "罪大恶极的枪毙了事，有所悔改的则接纳。"
SFR.205.c:0 "能力出众者可以加入我们的队伍。"

SFR.206.t:0 "重振城市秩序"
SFR.206.d:0 "在经历了由于内战带来政府混乱与商品短缺以后，阵线控制的大部分城市都陷入了难以恢复城市秩序、恢复工业生产的情况中。\n\n根据目前在城市基层的同志们发回的报告，实际上我们要面对的问题可以分为两类，一类是物资短缺所滋生的哄抢与投机倒把，另一类则是由于基层管理缺位所导致的社会秩序混乱。\n\n解决这些问题其实并不困难，一者我们可以从有富余的根据地调用物资来弥补当前的短缺，二者我们可以从部队中抽调人手。\n\n关于如何解决这些问题的方案已经摆在领导的桌前，只是我们没有足够的资源同时推进三份方案。"
SFR.206.a:0 "扩大物资供应。"
SFR.206.b:0 "重建城市警察力量。"
SFR.206.c:0 "实行军事管制。"

SFR.207.t:0 "缓和的街道"
SFR.207.d:0 "城市的街道上不见了因为战争流离失所的难民，也不见那些因为饥饿而横尸街头的饥民，人们仍然疲惫与脚步轻浮，可街道上算是恢复了些许生气。\n\n店铺与摊贩重新开了张，货架与摊位上虽不见往日的丰盛，可总算是有了些许能够买卖的货物。原本对阵线的猜忌与恐慌也变成了信任，哪怕人们见到了巡查的干部也不会恐慌与不安。\n\n原本冷寂的街道被嘈杂的声音所取代，可这次充斥在街道的却不是溃军与流氓的威胁声，而是人们寻常的闲聊与叫卖的声音。"
SFR.207.a:0 "终于！"

SFR.208.t:0 "城市秩序恢复"
SFR.208.d:0 "老黑抹了抹自己头顶的汗，自他从军队里转岗到城里当警察已经过了大半个月。这阵子他不仅要处理邻里街坊因为各种事情起的矛盾，还有负责去抓那些搞敲诈勒索的流氓混混。\n\n打从今天起他就忙得不可开交，先是帮腿脚不好的老人家去领救济粮，然后是把掉河里的小孩子捞起来再训一顿，最后是把那群敢上街勒索商贩的流氓们都抓回去，到现在才有坐到办公室喘口气的功夫。\n\n他原本想拿起水壶喝点水，却被窗外孩子们的笑声所吸引。在之前可看不到孩子们出来玩耍，可现在有了阵线的公安力量以后，大人们也不用担心孩子们被拐走。\n\n这是好事，老黑一边想着一边灌了口茶水。"
SFR.208.a:0 "终于！"

SFR.209.t:0 "快速恢复生产"
SFR.209.d:0 "“你们不能这样子，这是我的个人财产！”厂长怒吼着，而他面前的阵线干部则一脸轻松地喝着茶，完全不在乎那厂长的态度。”这是我的财产，我想怎么样就怎么样，你们没有资格没收！“\n\n过了数分钟，等到那厂长骂累了以后，干部才缓缓放下了茶杯。\n\n“我们讨论一下，关于您在阵线哪里有多少问题吧。”\n\n干部拿出了厚厚一沓材料，光是放在桌子上便发出了不小的声响。\n\n“我们放宽算，不算旧王国时期您的劳资不平等情况，光是指派打手殴打、杀害工人这件事，您哪怕在旧政府时期足够被关进去吃十几年牢饭了。”\n\n“我没……”\n\n“您资助土匪强盗袭击竞争对手，还有将枪支弹药走私给王国溃军，光是这几点也足够在革命阵线这里吃几颗枪子了。”\n\n“我可以解释，这都不是我干的。”\n\n“阵线给过您机会了。”\n\n干部没有给他狡辩的机会，敲了敲桌子门外便走进来了两个卫兵，他们不由分说的将工厂主拖了出去。\n\n想这样子的情况在很多地方上演，那些不配合的工厂主都被阵线强硬处理，国有化了他们的产业。"
SFR.209.a:0 "终于！"

SFR.210.t:0 "饱饭"
SFR.210.d:0 "在饥饿之中，人的尊严值得多少钱？\n\n狗娃子从来没有想过这个问题，他爹妈在内战打响前就因为土地被人抢走而不得不进城务工。\n\n结果在城里也没活出个人样，她妈给人当佣人结果被主人看上强暴而死，他爹则是想要阻止的时候被雇来的地痞流氓在他妈面前活活打死。\n\n自那以后他就没有家了，原先那个小窝被人一把火烧了，他只能和野狗们抢食，在垃圾堆里做窝。\n\n对狗娃子来说，活着的盼头可能是等街头那个瘸腿的老乞丐死了，好继承他用来乞讨的破铁碗。\n\n只是等到街上没多少人，垃圾堆里找不到吃的，狗娃子也没等到老乞丐去世。\n\n看着饿着肚子的狗娃子，老乞丐笑着给他分了半块馒头，然后讲起了他的经历。不过狗娃子也没记住多少，就记住老乞丐是个被人打瘸腿的进步书生，其他的全都和馒头进了肚子里。\n\n“人饿着肚子，尊严又能值几个钱？”\n\n老乞丐看着狗娃子摇了摇头，没头没尾的说了这句话。\n\n再过了一阵子，革命阵线进了城，枪毙了还得狗娃子家破人亡的老混蛋，老乞丐带着那条瘸腿和狗娃子一起看那人被公审被枪毙。\n\n再然后，阵线的战士们挨家挨户的发救济粮，就连路边的乞丐和流浪儿都被领着洗了澡剃了头吃了饱饭，阵线的大哥大姐给人发了套衣服。\n\n老乞丐和狗娃子一老一小也分到了新衣服和住的地方，虽然又老又破又小，但是好歹算个遮风挡雨的住处。\n\n看着抱着自己哭的老人，狗娃子如是想到。\n\n“这样算活得像个人了吧。”"
SFR.210.a:0 "明天会更好。"

SFR.211.t:0 "城市残存革命党的命运？"
SFR.211.d:0 "艾守义下意识搓了搓自己手上的材料，不论是革命阵线还是旧王国，这都是他第一次到政府机构的办事窗口去，哪怕某种意义上革命阵线是他的组织。\n\n他曾经是军队里的老兵，也曾是为革命而战斗在前线的记者，最后却成了为了活下去苟且偷生的给低俗小说周刊供稿的作者。\n\n数十年如一日的蛰伏磨去了艾守义的激情，他见过太多只是某些人看不顺眼就被扣上革命党的帽子抓走，然后就失去消息的邻居。人们小心翼翼地说话，避免那天被扣上帽子然后被“失踪”\n\n如果不出以外，他可能会写一辈子的科幻惊悚小说，和老朋友们办一本小说刊物，专门刊登这类低俗小说，不用看编辑和出版社的脸色。\n\n只是自打那老国王（艾守义更想叫这家伙老畜生）去世后，城市里一天更比一天乱，光是粮价物价便是一天一个价格，要不是艾守义和他曾经的老革命党们有门路，怕是在革命阵线进城前就要被饿死了。\n\n不过阵线进城了以后，老伙计们便有了分歧，有人说一天是革命党一辈子是革命党，为革命添砖加瓦总好过死在角落里；也有的人说，这帮老伙计怕不是要被当投降派树立典型，还不如像之前一样过活就成。\n\n最后大家也没有讨论出一个所以然，只是想去阵线的去阵线，想安安稳稳留家里的留家里。\n\n艾守义不是第一个去阵线的，他在心里斗争了很久才下定决心，带着能证明自己是个老革命党的证据来到了阵线的办事处。\n\n“艾守义先生，这是阵线对您的安排，请到对应办公室内和相关人员对接。”\n\n前台服务人员的声音打断了艾守义的思绪，他接过了自己的表格，上面填写着阵线对他的安排。"
SFR.211.a:0 "乡村需要帮助，让他们去维持乡村秩序吧。"
SFR.211.b:0 "还是留在城市审查吧。"
SFR.211.c:0 "他们中有的人可以帮助我们整合军队。"

SFR.212.t:0 "下乡"
SFR.212.d:0 "龙沟村是一个平平无奇的小村子，这里值得说道的东西大概只有茶叶还不错，这也让附近的乡绅地主盯上了这个村子。不过在内战之后，这些恶霸被村民组织起来赶了出去，也算没让这个小地方遭了多少灾。\n\n“这地方看上去也没啥特别的啊？”\n\n提着枪的黝黑汉子擦了擦额头的汗，正午的太阳晒得他有些焦躁，而站在一旁的中年人则专注地记着什么，随后才把笔记收起来回了他一声。\n\n“龙沟村地势易守难攻，再加上阵线内战时没有顾及这里，具体情况还需要实地调查才行。”\n\n这两人可不是什么郊游的游客，而是阵线派遣的调查组，这些特派员的工作就是探访各地农村现状，并为阵线即将开展的农村工作做好前期基础。\n\n“可只有我们两个人行吗，最近其他地方经常出现土匪假装正常村民截杀特派员，咱们要不要跟附近的队伍沟通一下。”\n\n黝黑汉子如是问道，但政委也只是点了点头，在本子上记下了此事。\n\n土匪截杀特派员确有其事，哪怕是剿匪已经过了一些时日的现在，山林里也总能藏得下土匪，更别提有些地方的村民和匪徒本身就是一体两面的。\n\n可在内战之后，曾属于王国势力范围内的乡村地区天然对阵线这个外来者有抵触情绪，如果大张旗鼓地带着护卫，很容易被当地村民视作是入侵者而非值得信任的帮手。\n\n想到这里，政委最后在本子上留下了批注。"
SFR.212.a:0 "出于安全考虑，请求附近组织的帮助"
SFR.212.b:0 "如果害怕风险而不敢尝试，那还革什么命"

SFR.213.t:0 "和谐一日"
SFR.213.d:0 "对龙沟村的调研出乎所有人的想象，阵线的调查组来到这里并没有受到敌视，相反还得到了当地村民的热情款待，并且收拾出了一间空屋作为他们的下榻处。\n\n在村长的带领下，阵线的同志们完美地完成了对当地的走访，在记下了龙沟村各处亟需帮助的问题以外，还帮助村民解决了力所能及的问题。\n\n除此之外，其他村的人也听闻阵线工作人员的来访，也纷纷派了可靠的青年来了解阵线对于乡村规划的政策，同时也扫除了对阵线的误解。\n\n在龙沟村的调查对阵线的农村工作来说大有裨益，相信很快就能在这里开展阵线的农村改革工作。"
SFR.213.a:0 "比想象的要好。"

SFR.214.t:0 "道阻且长"
SFR.214.d:0 "不出意外的，调查组在龙沟村碰了一鼻子的灰。\n\n虽然龙沟村的村长愿意接待调查组，带着调查组走访村里的基础建设，但是到具体调查村民情况，大多数村民都不愿意对调查组开口说话，就像是遇到什么脏东西一样。\n\n这也不能怪村民不识大体，在龙沟村把地主恶霸赶出去之前，大多数村民都深受其害，要不是因为村长趁着内战时将这群坏东西赶出去，也不知道村民们要多流多少血。\n\n只是苦了调查组，重建村民们对中央政府的信任这件事，还得日积月累才行。"
SFR.214.a:0 "没办法。"

SFR.215.t:0 "不受欢迎"
SFR.215.d:0 "不知道是有谁泄露了消息，又或者只是单纯的运气差，在前往龙沟村的路上，一群山贼突袭了调查组。\n\n调查组的成员都是内战的老兵，虽然没有携带护卫，但是仍然依托着仅有的武器打退了这群不知死活的山贼，坚持到支援到来。\n\n只是调查组人人带伤再加上山贼的活动，之后的事情被移当地部队解决，而对龙沟村的调查与走访只能等过段时间再说。"
SFR.215.a:0 "情况不妙。"

SFR.216.t:0 "新血液"
SFR.216.d:0 "“我自愿加入革命阵线……”\n\n在很久以前，革命阵线……或者说革命党们的准入门槛并没有这么严苛。所有人只要有理想有抱负，只要找得到组织那就可以成为党的一员。\n\n但自打反动派背刺革命者以后，那些混在革命者之间的残渣或是为了利益或是为了活下去，选择出卖了曾经的同志，对组织造成了难以挽回的破坏。\n\n而在沦落到山林与乡村中的时候，革命阵线内的党派改革了自己的准入门槛，成为需要宣誓与党组织成员举荐的正规流程，而非一盖章便可以自称“革命者”的过家家游戏。\n\n从阵线成立到内战最激烈的时候，大部分火线入党的成员多为前线战士，而阵线能够重建政治机构也依靠这些在最危急的时候仍然对阵线忠诚的战士们。\n\n而在内战结束以后，也有大量拥有抱负却报国无门的人才想要成为阵线的一分子，而非只是基层的普通工作人员。\n\n于此，阵线放开了阵线组织的准入门槛，而各个党派也开始乘此机会招揽人才扩充自己的实力。\n\n最明显的反应来自乡村基层组织，新加入革命阵线的人们大多是没有经过正规教育，可却有自己一套方法与经验，在王国时期被所谓规则与阶级圈禁，而在阵线的管理下，他们终于有机会展露自己的能力。"
SFR.216.a:0 "“……在此，我庄严宣誓……”"

SFR.217.t:0 "难办抉择"
SFR.217.d:0 "“……虽然我们的同志已经尽了全力，但依旧有数量不少的农村地区仍未从内战的破坏中恢复过来，而大多数基层组织事实上已经处于物资短缺的境地。如果我们土地改革的进程，我们需要更多的资源来帮助农村开展建设工作。”\n\n信件摆在叶文石的案头，这位老人的桌子上已经堆满了这种信件与报告，无一不是来哭没钱哭没人手。\n\n乡村、城市、军队，这三个方面处处需要人手，处处需要资源。\n\n这能怎么办呢，革命阵线内战前困顿于乡间，哪怕最乐观的人也想不到阵线能如此迅速地击败王国军队，再加上阵线在内战前也鲜有城市中组织政府的经验，能走到现在全靠摸着石头过河。\n\n阵线的管理层已经对哪里多调用资源已经吵得够多了，已经没有人再因为某些事情吵个没完浪费工作时间，于是这件事情就被顺理成章地推到了叶文石这里。\n\n老人抽出一旁的报告，原本已经下定决心的他又看到了那封农村来的信，于是他停下了笔。\n\n他的思绪飘到了当初的根据地，那的老乡过得怎么样了？又飞到了那些仍然没有恢复过来乡村，那里的孩子能吃得上饱饭吗？\n\n过了一会儿，他重新举起了笔。这一次他想“滥用”自己的权力，多照顾一下阵线的来时路，至于其他能够动用的资源……"
SFR.217.a:0 "推进乡村重建。"
SFR.217.b:0 "优先供给城市。"
SFR.217.c:0 "侧重军队训练。"

SFR.218.t:0 "一切的根源"
SFR.218.d:0 "深夜，叶文石独自坐在临时接管的政府办公楼里。窗外的街道还没有完全安静下来，偶尔能听到巡逻队的口令声，远处也会传来几声零散的枪响。南远乡地区的内战结束了，但取得军事上的胜利只是一个开始，真正的难题还在后头。\n\n刘青兰不在，赵永军也不在。平日里，他们总能在这种时候给出截然不同，却足够明确的意见。可今晚，叶文石只能自己看着那些文件。不论决定如何，未来将就此改变。\n\n清算的时候到了。\n\n郑氏王室，远乡旧贵族，李冠、王一公、刘琦、徐胜……名字一个接着一个，像一串没有尽头的债。寡头的问题倒是简单一些。他们的钱袋沾着人民的血，他们的私人武装开过枪，他们的工厂害死过人。枪毙，或者流放，区别只是人民会如何反应。\n\n而王室也不能逃离其罪责。\n\n远乡王室必须为当年的背叛负责。立宪走到一半，革命党人放下戒心，多样的政治社团开始公开活动，许多人第一次相信这片土地也可以不用靠尸山血海的起义迎来新世界。然后，枪声响了。命令从皇宫传出，革命党被宣布非法，会议被冲散，街垒被炮火推平，叶文石熟悉的人一个接一个死去。\n\n他从抽屉里取出一张旧照片。照片上的几个人站在港口边，年轻得有些可笑。他的发小搭着他的肩，笑得没心没肺，仿佛未来只会越来越好。叶文石盯着那张脸看了许久，直到纸面在灯光下泛起模糊的白。\n\n镇压革命党的命令究竟来自谁已经几乎不可考。是郑钧？是他的父亲郑铭留下的遗愿？还是那些躲在王座后面，借国王之名替自己保住土地和工厂的人？还是说他们每个人都有罪？恐怕最后一个答案才是正确的，而唯一的解决方案就是以眼还眼。\n\n尽管如此，王室里并非每个人都有血债。郑红甚至还是未成年人。她是旧制度的继承人，却未必是旧制度的缔造者。如果为了报仇，就把所有姓郑的人一并枪毙，那或许很痛快，也很轻松，可这真的能帮助我们获得人民的支持吗？世界各地都有死灰复燃的君主主义运动，远乡也不例外。如果能成功改造这些旧时代的子民，那是否可以更彻底的将旧王朝封棺入土？\n\n叶文石合上照片，将它重新放回抽屉。\n\n远乡已经流了太多血。依人民的意志，旧王国必须被审判，可具体怎么做，到头来仍然是几乎不可解的难题。"
SFR.218.a:0 "他拿起笔，却什么也写不出来。"

SFR.219.t:0 "郑家的命运"
SFR.219.d:0 "革命法庭设在曾经徒有其名的议会大厅。\n\n这地方曾经被用来装点远乡王国那套半死不活的立宪门面。高处属于贵族的旗帜与纹章还没有完全拆下，只是被红布遮住了一半；两侧原本属于贵族代表的座位，如今挤满了工人、士兵、失去亲人的农民，以及从监狱里活着出来的革命党人。大多数人不是来看审判的，他们是来看郑钧死的。\n\n当郑钧被带入大厅时，人群爆发出近乎撕裂屋顶的怒吼。\n\n“杀人犯！”\n“还我儿子的命！”\n“把他吊起来！”\n\n卫兵们高声呐喊，法官连敲了数下木槌也无济于事。一名老妇人挣脱人群，几乎扑到栏杆前，哭喊着要冲破围栏去攻击老国王。郑钧停下脚步，看了她一眼，却什么也没说。\n\n审判一度无法继续。\n\n叶文石坐在旁听席最前排，沉默地看着这一切。身边的干部低声问是否要清场，他顿了顿，最后还是摇了摇头。人民有权愤怒，公审的意义就是提供一个发泄多年以来不满的场所，没有理由和人民对着干。\n\n好在，秩序还是恢复了，或许是因为人们想亲耳听见判决。\n\n临时找来的法官宣读了漫长的罪状：镇压革命党，纵容军队屠杀，取缔民主化运动，默许贵族寡头掠夺国家，令无数家庭在饥荒与监狱中破碎，还有从无数老百姓的经历整理的大量其它罪证。每念出一项，旁听席上便会传来压抑的哭声或咬牙切齿的咒骂。\n\n郑钧始终站得很直。老国王已经不再像宣传画上那样威严，病痛和失败把他的面容削得苍白而干瘦，可他仍试图维持最后一点体面。\n\n到他申辩了。\n\n“我是国王。”郑钧平静地说道，“当命令以王国的名义发出时，我就不能说自己完全无关。”\n\n大厅安静了一瞬。\n\n“但我请求法庭记住一件事。”他继续说道，“郑家不只剩下我一个人。我的女儿郑红没有下令镇压革命党，没有参加那些会议，也没有真正统治过远乡。她只是出生在王室里。若诸位认为我必须为王国的罪承担责任，我接受判决。但请不要把她也拖进我这一代人的罪里。”\n\n有人冷笑，有人怒骂，不过大多数人还是陷入了沉默。\n\n郑钧停顿片刻，声音低了些。\n\n“我不要求宽恕。我只请求结局是流放，我们愿意永不回到这片土地。”\n\n木槌再次落下。"
SFR.219.a:0 "他们会接受改造，作为新生国度的公民生存。"
SFR.219.b:0 "他们会被流放。"
SFR.219.c:0 "我们要他们血债血偿！"

SFR.220.t:0 "恶徒的命运（1）"
SFR.220.d:0 "相比起郑家的审判，寡头们的公审显然没有得到同等规格的“保护”。\n\n这倒不是因为不重视他们。恰恰相反，李冠、王一公、刘琦、徐胜，以及那些在旧王国最后数十年里靠矿山、工厂、田庄、军火与官僚体系吸血的人，才是真正让许多人咬牙切齿的对象。国王离他们太远，王座高高在上，像一尊蒙尘的旧神像；可这些人不同。他们的矿井就在山里，他们的工厂就在城外，他们的田租一袋袋压在农民肩上。那些前来参加公审的百姓仍然记得这些人的样貌，恨不得撕碎后者。\n\n消息刚传出去，公审会场外便挤满了人。\n\n最开始只是工人代表和农民代表来旁听，后来是城市的失业百姓、驻扎附近的士兵、孤儿院跑来的孩童、监狱里的幸存者，再后来连附近几个村子的乡亲都推着小车赶来了。有人挥着写满控诉的大纸板，有人背着死去亲人的遗照，有人只是单纯来看热闹。会场外围一度挤得水泄不通，几个负责维持秩序的民兵被人群推得东倒西歪，不远处还有人趁机支起摊子，卖烤饼、糖水和韭菜盒子。\n\n甚至发生了一场踩踏事故。\n\n当伤员被抬走时，几名干部面色铁青地要求暂停公审，结果人群反而爆发出更激烈的抗议。有人喊这是寡头们“又害死人了”，有人冲着押送车吐口水，还有人把刚买来的热汤泼向车窗。玻璃上很快挂满了油渍、痰迹和泥点。"
SFR.220.a:0 "终于，审判开始了。"

SFR.221.t:0 "新的开始（1）"
SFR.221.d:0 "郑红已经记不清自己写过多少份思想汇报了。\n\n从判决落下的那一天起，她就不再是公主，也不再是王室继承人。旧时代加在她身上的称呼被一层层剥掉，最后只剩下档案上的几个字：郑红，女，旧王室成员，接受劳动改造与思想教育。\n\n她从小到大接受的是君主主义教育，学的是王室礼仪、贵族历史、统治者责任，以及如何以“仁慈”的姿态看待人民。可新国家不需要一个学会微笑和行礼的公主，它需要她先明白，自己过去所认为理所当然的一切，究竟是建立在什么之上。\n\n于是，郑红开始上课。\n\n共和国法律，劳动纪律，人民史，罪行整理，基础政治常识，还有每周一次的思想品德课。课堂里坐着的不只有她，还有被留用观察的旧官僚子女、军官家属，以及几个因为年纪太小而没有被重判的贵族后代。\n\n郑红过去擅长写精致的感谢信和节庆祝词，却不知道该如何写“我对旧制度的认识”。她有时候会把句子写得太像宫廷公文，被老师用红笔圈出来，批一句“不要端着架子”。她倒不是故意的，只是十八年来，没人教过她像普通人那样说话。\n\n前几天，她见过父亲一次。\n\n郑钧被安排在一处疗养院里。由于身体不好，政府没有让他去工厂或农场，只要求他参加思想教育，并配合整理王国时期的文件、口供和事件经过。他的房间条件不算差，有书桌，有药，有看守，也有每天固定时间的散步。或许是因为不用再参加那些永无止境的会议，也不用在权贵之间来回周旋，他的气色反而比审判前好了些。\n\n见面时，郑钧正在写一份关于王国镇压革命党的说明。\n\n他看到郑红，先是愣了一下，随后笑了笑，说自己现在每天都在写过去发生过的事情，写到一半才发现，原来许多他以为已经忘记的命令，居然还记得清清楚楚。\n\n“这大概也是一种报应吧。”郑钧笑道，“惩罚我回忆曾经糟糕的决策。”"
SFR.221.a:0 "郑红不知道该如何回答。"

SFR.222.t:0 "往日之影（1）"
SFR.222.d:0 "郑钧又一次站在海边。\n\n那是很久以前的海岸。风是暖的，阳光照在白色石栏上，码头边停着挂满彩旗的商船，父亲牵着他的手，低头告诉他，远乡的祖先正是从这样的海风里走来。那时郑钧还太小，听不懂“祖国”“王权”“责任”这些沉甸甸的词，只觉得父亲的手掌很大，海鸥的叫声很吵，而一切都不会改变。\n\n然后，他看见了她。\n\n那个贵族家的女孩躲在长辈身后，礼服的袖口有些长，脸上却带着不符合礼仪课要求的笑。她趁大人们寒暄时偷偷溜到栏杆旁，和郑钧一起看远处的船帆。郑钧记得自己把一块糖递给她，她接过去时说了句什么，他却怎么也想不起来了。\n\n画面一晃。\n\n海岸变成了会议室。父亲的声音越来越低，文件堆满桌面，革命党人的代表和王国官员在同一张桌前争论。有人谈自由，有人谈稳定，有人谈战争，有人谈南巴的制度。郑钧坐在旁边，只觉得他们都很吵，却又都很认真，仿佛只要争得够久，远乡就一定会有一个好结局。\n\n再一晃。\n\n世界大战开始了。港口空了，商船少了，求援的报告一页接着一页送进王宫。郑钧站在王座前，看着所有人把目光投向自己，而他什么都给不了。\n\n再后来，是火光。\n\n枪声从平京的街道上传来，远处有人哭喊。文件上写着“紧急状态”“取缔非法组织”“维持秩序”云云，一团乱麻。他看见自己拿着笔，却怎么也停不下来。墨水落在纸上，不知是黑色的血，他的汗水，还是眼泪。\n\n然后是郑义离开王宫时的背影，是妻子病床边逐渐冷下去的手，是郑红在花园里抱着小猫向他笑，是审判那天无数双愤怒的眼睛。"
SFR.222.a:0 "最后，所有声音都消失了。"

SFR.223.t:0 "海风（1）"
SFR.223.d:0 "郑钧记得，自己小时候也曾这样站在海风里。\n\n那时他的父亲还很年轻，远乡王国也还没有被失败、债务和内战压弯脊背。王室的马车沿着海岸线缓慢前行，车窗外是白色的浪花，码头上停着从各地驶来的商船，水手们用郑钧听不懂的口音大声交谈。父亲说，远乡之所以叫远乡，是因为他们的祖先跨越大海来到这里，又把这里变成了自己的家。那时的郑钧还不明白这句话的重量，只觉得海风很好闻，阳光很好，父亲牵着他的手，似乎整个世界都不会崩塌。\n\n也就是在那一天，他第一次见到了后来的妻子。\n\n她跟在另一个贵族家的长辈身后，穿着不太合身的礼服，显然也对那些大人之间的寒暄不感兴趣。两个孩子趁人不注意躲到栏杆边，看着海鸥在桅杆间盘旋。郑钧已经记不清他们究竟说了什么，只记得她笑起来时，海风吹起了她的头发，而自己很笨拙地把手里的糖递给了她。\n\n后来的一切都像被海浪冲散的脚印。\n\n世界大战来了。童年的花园、宴会、礼仪课和海边的阳光，被孤寂的大厅和父亲越来越沉默的背影取代。远乡没有被战火直接波及，却再也回不到过去，无数的投资付诸东流，换来的却只是南巴斯蒂亚人的尸体。战争之后，经济崩塌，投资化作废纸，码头上的商船越来越少，贵族们在会议桌上争吵，革命党人在街头演讲，军队要求拨款，百姓要求面包，而他只能躲在父亲身后，一天一天听着国家腐烂的声音。\n\n再后来，父亲死了。\n\n他继承了王冠，还有一个快要碎裂的王国。他以为只要拖过最坏的日子，事情总会有所好转。可每一次退让都会换来更多要求，每一次犹豫都会变成新的灾难。他下令镇压革命党，纵容贵族瓜分权力，又在夜深人静时告诉自己那只是为了维持国家稳定。\n\n妻子病逝的时候，他甚至没能陪在她身边太久。\n\n那天的雨很大，宫廷医师们低着头不敢说话。郑钧坐在床边，握着她逐渐冰冷的手，第一次意识到国王并不是什么都能保住。他保不住妻子，保不住父亲的改革，保不住儿子的信任，保不住女儿本该拥有的平静人生。最后，他甚至连自己的国家也保不住。"
SFR.223.a:0 "“父亲。”"

SFR.224.t:0 "审判（1）"
SFR.224.d:0 "“经革命特别法庭审理，远乡王国国王郑钧，对镇压革命党、破坏民主化进程、纵容贵族寡头与军队屠杀人民等罪行负有不可推卸之责任。其罪行严重，影响恶劣，依法判处死刑。”\n\n木槌落下。\n\n短暂的寂静后，整个大厅像被点燃的火药桶般炸开了。\n\n有人挥舞帽子，有人高举拳头，有人哭着跪倒在地。那些在围剿中失去亲人的家属互相拥抱，旧监狱里的幸存者用沙哑的嗓子喊着听不清的话语，甚至连维持秩序的民兵中也有人红了眼眶。法官不得不连续敲击木槌，提醒旁听席保持秩序，可在那一刻，没有多少人还听得见木头敲击桌面的声音。\n\n随后，法庭宣读了对郑红的判决。\n\n她将被剥夺一切王室特权与继承权，接受长期劳动改造，在新政府监管下学习共和国法律与劳动制度。她不再被称作公主，且不许以旧王室的名义进行任何活动。从今往后，她只是一个需要接受改造的旧制度的幸存者。\n\n人群对这个判决有些不满，不过多数只是沉默地看着那个年纪尚轻的女孩低下头，不知该愤怒，还是该叹息。\n\n郑钧没有反抗。\n\n他只是站在被告席上，微微转头看了郑红一眼。老国王的神情疲惫得像一张被雨水浸透的旧纸，可在听到女儿得以活下去时，他的眼中还是浮现出一丝几乎难以察觉的安宁。\n\n夜晚，郑钧被送回牢房。\n\n那不是旧王国监狱里潮湿阴冷的地下室。房间不大，却有床，有桌子，有一盏灯，还有一扇能看见月光的小窗。门外站着两名看守，枪口朝下，没有辱骂，也没有多余的动作。新国家并不打算让他像牲畜一样死去。至少，在最后一夜，他们仍允许郑红来见他一面。\n\n郑红进门的时候，眼睛已经哭红了。\n\n“父亲……”\n\n“别哭。”郑钧坐在床边，声音很轻，“明天要死的人是我，不是你。”\n\n郑红咬着嘴唇，想要说些什么，却又说不出来。她过去学过礼仪，学过历史，学过如何在宴会上微笑，如何向外国使节行礼，却没有人教过她该如何面对父亲的死刑判决。"
SFR.224.a:0 "郑钧伸出手，替她理了理额前的碎发。"

SFR.225.t:0 "命定之日（1）"
SFR.225.d:0 "清晨的平京下着小雨。\n\n郑钧被带出牢房时，天色还没有完全亮。两名士兵站在门外，押送军官向他宣读了最后的程序，声音平稳，没有多余的情绪。老国王点了点头，整理了一下衣领，像是准备出席一场早已推不开的会议。\n\n刑场设在平京一所旧监狱内。\n\n那座监狱曾经用来关押革命党人。许多人在这里被审讯，被判刑，被拖去无人知道的地方；也有一些人在牢房墙壁上刻下名字，或是留下斑驳的血迹。如今，郑钧将从这座监狱的正门走进去，走向同样由国家机器安排好的终点。\n\n押送队伍经过街道时，两侧已经站满了民众。\n\n人群没有想象中那么喧闹。昨日审判大厅里的欢呼、怒骂和哭喊仿佛已经被雨水冲淡，留下的只有近乎沉重的肃穆。有人抱着亲人的遗照，有人抱着血迹斑斑的军服，有人只是安静地看着那辆缓慢前行的押送车。偶尔会有几声咒骂从人群中传来，很快又被更大的沉默吞没。\n\n郑钧透过车窗，隐约看见了皇宫的影子。\n\n雨雾中的宫殿轮廓模糊，像一块即将被擦去的旧墨迹。他小时候曾在那里奔跑，曾在父亲的书房里听那些关于祖先、海洋和远乡未来的故事。那时他相信，王国会像宫殿的石墙一样长久存在。只要国王还坐在王座上，群臣还在大厅里行礼，远乡就依然是远乡。"
SFR.225.a:0 "车轮碾过积水。"

SFR.226.t:0 "报应（1）"
SFR.226.d:0 "流放判决落下时，李冠笑了一下。\n\n那是一种藏得很深的轻蔑。死刑没有落到他们头上，财产没收又如何，产业接管又如何？只要人还活着，一切就都有机会。外国银行里还有没被查清的账户，各地的关系网总能重新接上，远乡之外也总有愿意收留他们这种“有经验的实业家”的地方。\n\n王一公还在哭，刘琦垂着头不说话，徐胜则一直盯着押运车外的街道。\n\n“只要出了港口。”李冠低声说道，“我们就还有机会。”\n\n没人回答他。\n\n押运队伍从临时监所出发，沿着通往码头的大路缓慢前进。道路两旁早已站满了人。最开始，卫兵们以为那只是前来围观的群众。毕竟，四大寡头被流放出境，对许多人而言是一场值得亲眼见证的场景：那些过去坐在高楼里、庄园里、董事会里决定他人生死的人，如今戴着手铐坐在押运车上，被送往他们曾经最瞧不起的“下场”。\n\n可人越来越多。\n\n工人从厂区赶来，矿工从山路赶来，佃农推着老人孩子赶来。有人拄着拐杖，有人举着遗照，有人手里握着农具。道路两旁的沉默逐渐变成了低声咒骂，又从低声咒骂变成了汹涌的喊声。\n\n“还钱！”\n\n“还命！”\n\n“别让他们走！”\n\n押运军官下令加快速度，可人群像潮水一样压了过来。第一块石头砸在车板上时，王一公吓得整个人缩成一团。第二块石头击碎了车窗，玻璃碎片飞溅到李冠脸上，他终于收起了那副似笑非笑的表情。\n\n“维持秩序！”军官大喊，“后退！全部后退！”"
SFR.226.a:0 "没有人后退。"

SFR.227.t:0 "曲终（1）"
SFR.227.d:0 "押送车驶出临时监所时，街道两旁已经挤满了人。\n\n判决已经写下，名单已经公布，刑场已经准备完毕。李冠、王一公、刘琦、徐胜——这四个曾经把远乡当作私人财产的人，将被押往平京的一所监狱，在那里执行死刑。\n\n可即便如此，群众的愤怒依然没有因此平息。\n\n第一块烂菜叶砸在装甲车外壳上，很快便有第二块、第三块。石子、泥团、破布、废纸、臭掉的鱼、被踩烂的烤饼，一切能被拿在手里的东西都被扔了过来。装甲车的车窗很快被糊成灰黑一片，押运士兵不得不命令车队放慢速度，避免视线彻底被遮挡。有人试图冲破封锁线，将手伸向车门；有人攀上路边的木棚，朝车顶泼下整桶污水；还有几名矿工模样的男人合力撞向车身，差点把最前方那辆装甲车推得侧翻。\n\n“保持队形！”\n\n军官的声音被人潮吞没。\n\n几名民兵举起枪，却没有开火。他们只是用枪托和盾牌把人群向后推。押运队伍就像一条陷在泥沼里的铁蛇，在怒骂、哭喊和垃圾雨中一点点向前挪动。\n\n车厢里，王一公已经吓得说不出话。\n\n他肥胖的身体缩在角落里，嘴唇不停发抖，偶尔挤出几句“我可以捐钱”“我愿意交代”的哀求。刘琦闭着眼，像是已经听不见外面的声音。徐胜则死死盯着车门，似乎还在计算是否有最后一丝逃脱的可能。只有李冠一直端坐着，哪怕污水从车顶缝隙里滴到他的衣领上，他也仍试图维持那副工业精英的体面。\n\n抵达监狱时，天色已经阴沉下来。刑场设在内院，四面高墙隔绝了大部分群众，却挡不住外面潮水般的呼喊。"
SFR.227.a:0 "革命政府没有派高级领导到场。"

SFR.228.t:0 "恶徒的命运（2）"
SFR.228.d:0 "第一个上台的是矿区工人。他的半张脸被旧伤疤扯得歪斜，声音却大得吓人。他说刘琦的矿井里从来没有足够的支护木，说那些老掉牙的设备比他爷爷还老，说瓦斯爆炸那天，矿场管事第一反应不是救人，而是派人把来要说法的家属打了一顿。刘琦坐在被告席上，脸色苍白，却仍试图挺直腰背。他说矿业艰难，说经济萧条，说自己也只是旧时代大势下的一枚齿轮。话还没说完，旁听席上传来一片怒骂。\n\n接着是码头工人、佃农、报社记者的妹妹、被私人卫队打断腿的学生、被李氏工业欠薪三年的工匠。李冠起初还冷笑着否认，说证据不足，说自己对国家工业化有功，说没有他远乡连一颗螺丝都造不出来。直到检方把小山般的证据文件一箱一箱拿出来，他才终于闭上嘴，低头盯着自己的手套。\n\n王一公哭了。这位曾经热衷宴会与排场的乡绅，此刻再也没有了派对上的豪爽。他反复说自己没有亲手杀过人，说乡间的事情都是管家和地方头目做的，说自己愿意捐出财产赎罪。可当一个瘦骨嶙峋的老妇人走上台，问他还记不记得某年饥荒时仍强征地租的那张命令时，王一公忽然没了声音。\n\n徐胜则始终沉默。他没有求饶，没有抗辩，也没有像李冠那样试图给自己找一个“国家建设者”的身份。他只是看着台下那些恨不得冲上来撕碎他的人，脸上的肌肉微微抽动。直到一名旧贵族家的侍女指认他曾派人处理掉反对者亲眷时，这个向来以狠辣著称的男人终于露出了一点恐惧。\n\n审判持续了整整一天。\n\n黄昏时，法庭外的摊贩已经收了三轮摊，围观的人却丝毫没有减少。人们等待着判决，就像等待一场迟到了几十年的暴雨。没人相信这些人无罪，也很少有人真的在乎他们如何申辩，毕竟结果已经很明显了。\n\n法官敲响木槌。"
SFR.228.a:0 "他们会滚出这个国家，永不回归。"
SFR.228.b:0 "他们必须血债血偿！"

SFR.229.t:0 "海风（2）"
SFR.229.d:0 "郑红的声音把他从回忆里拉了回来。\n\n老国王抬起头，才发现自己已经站在流放船只的甲板上。海风比记忆里冷得多，吹得他的手指发僵。几名看守站在不远处，没有催促，也没有靠近。也许是出于命令，也许是出于怜悯，他们给了这对父女一点最后的安静。\n\n郑红替他披上外衣，动作很轻。\n\n“您该回船舱了。”她低声说道，“外面风大。”\n\n郑钧没有立刻回答。他望向远处逐渐模糊的海岸线。那片土地曾经属于他的祖先，属于他的父亲，属于他，也差一点属于郑红。如今，王室旗帜已经降下，港口的灯光一点点消失在雾气里。再过不久，他们就会被送到异国的某个角落，以旧王室成员、战败者、流亡者的身份继续活下去。\n\n“红。”郑钧忽然开口，“你恨我吗？”\n\n郑红沉默了很久。\n\n“我不知道。”她说，“我只是觉得……我们再也回不去了。”\n\n这句话比审判席上的判决更重。\n\n郑钧低下头，枯瘦的手指扶着栏杆。他想说对不起，想说这不是他希望的结局，想说自己已经尽力了。可这些话到了嘴边，又显得如此空洞。于是他只是轻轻点了点头。\n\n“是啊。”他说，“回不去了。”\n\n海浪拍打着船身，发出沉闷的响声。远乡的海岸终于彻底消失在夜色里，只剩下无边无际的黑暗，以及吹向未知之地的风。\n\n父女二人并肩站在甲板上，久久没有离开。\n\n他们不知道未来会如何。也许是贫病交加的余生，也许是被人遗忘的年月，也许某一天，郑红会在异国的街道上听到远乡的新消息，却再也无法以故乡之人的身份回望那片土地。\n\n船只继续向前。\n\n海风吹过他们的脸，像最后一次告别。"
SFR.229.a:0 "故乡已在海的另一边。"

SFR.230.t:0 "审判（2）"
SFR.230.d:0 "“红，你要记住，时代变了。”他说，“不是从今天开始变的，也不是从革命军打进平京那天开始变的。它很早以前就变了，只是我一直没有承认。”\n\n他停顿了片刻，似乎在整理自己的呼吸。\n\n“我年轻的时候，总觉得王国还能撑下去。只要再忍一忍，只要再退一步，只要再压住一场风波，事情总会变好。后来我才明白，许多东西不是靠拖延就能保住的。父亲的改革也好，革命党人的信任也好，你母亲想看到的远乡也好，都被我一点点拖没了。”\n\n“不是您的错……”郑红下意识说道。\n\n郑钧笑了笑。\n\n“别这样安慰我。一个国王不能只在接受欢呼时是国王，到了清算罪责时又说自己无能为力。”他说，“我做过选择，也逃避过选择。结果到了今天，这些都要算账。”\n\n窗外传来远处群众尚未散去的喧闹声。有人还在唱革命歌曲，有人还在喊口号。那声音隔着厚墙传进来，变得模糊，却依然像潮水一样压在房间里。\n\n郑红低声问：“您恨他们吗？”\n\n郑钧沉默了很久。\n\n“以前或许会。”他说，“现在不会了。”\n\n他抬起头，看着窗外那一点月光。\n\n“他们有理由恨我。若换作是我，看着家人被拖走，看着房子被烧掉，看着所有求告无门的日子堆在一起，我也会希望有人偿命。红，不要把他们想成暴民，也不必把以后的新远乡当成恶徒。这只是一个时代对另一个时代的判决，古往今来，都是如此。这一切不温柔，也不体面，但我已经没有资格要求温柔和体面了。”\n\n郑红终于忍不住哭出了声。\n\n郑钧轻轻抱住她，像许多年前她还只是个孩子时那样。\n\n“你要活下去。”他说，“不要想着复仇，不要想着王位，也不要想着替我证明什么。劳动改造也好，普通人的生活也好，只要能活下去，就去学。学着自己吃饭，自己工作，自己判断别人说的话。别再把人生交给宫廷、贵族和那些旧日的称号。以后，它们就不再具有意义了。”\n\n他的声音越来越低。\n\n“如果有一天，他们真的愿意把你当作新国家的公民，而不是旧王室的影子，你就好好活着。若他们永远不愿意，你也不要怨。至少，你还活着。”\n\n郑红抓着他的手，不肯松开。\n\n灯火在墙上轻轻摇晃。门外的看守没有催促。也许是命令如此，也许只是他们不愿打断这场最后的告别。\n\n郑钧闭上眼，听着女儿压抑的哭声，忽然觉得自己这一生从未如此清醒。\n\n明天之后，郑十一世将不复存在。"
SFR.230.a:0 "旧王朝的最后一夜。"

SFR.231.t:0 "命定之日（2）"
SFR.231.d:0 "他想起父亲病逝后的那个夜晚。文书堆在桌上，军队要求更多支援，贵族要求无数的让步，革命党要求继续改革，而他第一次戴上王冠，只觉得那东西沉得令人喘不过气。他当时告诉自己，先稳住局势，先不要让国家四分五裂。死再多人，以后也总会有机会弥补。\n\n车轮继续向前。\n\n他想起自己签下取缔革命党命令时的手。那只手很年轻，还没有现在这样枯瘦。他记得自己在命令书前停顿了很久，记得宫廷里的贵族劝他说这是必要之恶，记得军方代表保证会尽量控制局势。后来，街道燃起大火，学校被搜查，工人组织被捣毁，许多人被拖出家门，再也没有回来。\n\n他曾经说，那是为了稳定。\n\n又一步。\n\n他想起经济崩溃的那些年。远乡的工厂一座接一座停摆，矿区的伤亡报告越堆越高，农民交不上租，不得不卖儿卖女，城市里到处是找不到工作的年轻人。贵族和寡头们在会议桌上争夺预算，所有人都说自己是为了王国，所有人都把手伸向国库和百姓的口袋。他看见了，却什么也没做。\n\n他曾经说，那是为了维持平衡。\n\n又一步。\n\n他想起妻子病逝的下午。宫廷医师低着头，雨水打在窗户上，像一场永远不会结束的丧钟。她握着他的手，似乎想说什么，可最后只留下微弱的呼吸。他后来才明白，有些东西失去以后，不会因为国王的命令回来。\n\n又一步。\n\n他想起郑义离开的那一天，年轻人的眼睛里全是失望和怒火。他想起郑红小时候在花园里追逐小猫，衣角沾满泥水，却笑得像从未见过战争。他想起自己在病床上醒来，听见女儿讲述她如何代他处理政务时，那一瞬间竟然荒唐地觉得未来还有余地。\n\n押送车停下了。\n\n监狱的大门在眼前打开。旧铁门发出刺耳的摩擦声，像某种巨兽缓慢张开喉咙。郑钧下车时，雨已经停了，空气里却还残留着潮湿的寒意。刑场周围同样挤满了人，法庭代表、政府干部和记者站在指定区域内。没有多余的仪式，只有一片死寂。\n\n郑钧一步一步走向刑场。\n\n他的腿有些发软，但没有倒下。过去那些被他逃避、推迟、粉饰的事情，如今都跟在身后，像一整支沉默的队伍。被烧毁的街区，被围剿的根据地，被拖欠工资的工人，被地主压弯脊背的农民，被监狱吞没的革命党人，还有那些他永远无法记住名字的人。"
SFR.231.a:0 "他们都来了。"

SFR.232.t:0 "命定之日（3）"
SFR.232.d:0 "刑场前，革命阵线的高级领导人已经等在那里。叶文石站在最前方，脸色疲惫，眼神却没有躲闪。刘青兰、赵永军，林有志，以及一众高级军官和政治干部分立两侧。有人恨他，恨到指节发白；有人则只是沉默。没有人鼓掌，也没有人欢呼。\n\n郑钧被带到指定的位置。\n\n叶文石向前一步，老国王看着他，很多年前，他们本该在另一种远乡里相遇。或许是在议会，或许是在改革委员会，或许是在一场没有枪声的辩论里。可历史没有给他们那样的结局，或者说，是他们自己一步步走到了今天。\n\n短暂的沉默后，叶文石开口道：“郑钧，判决即将执行。按照程序，你还有最后陈述的机会。”\n\n老国王看着他，忽然露出一点很浅的笑意。\n\n“替我告诉郑红，好好活下去。”郑钧说，“还有……不要让这个国家再落到我们这样的人手里。”\n\n叶文石沉默片刻，点了点头。\n\n“我会让人转告她。”\n\n他停顿片刻，又开口道。\n\n“她会接受改造。只要她不再试图复辟，没人能伤害她。我以个人名义，向你保证。”\n\n“那就好。”郑钧轻声说。\n\n郑钧又看向那些革命军官。有些面孔他不认识，有些则似乎曾经出现在旧王国的通缉令上。他本以为自己会在这一刻感到恐惧，或者愤怒，可真正站到这里时，他只觉得疲惫。一切都结束了。那些被他拖延、逃避、压下去的东西，终于以最直接的方式回到了他面前。\n\n风穿过监狱内院，吹动墙上的红旗。远处的群众仍然沉默。\n\n士兵举起枪。\n\n他抬起头，忽然看见内院尽头站着一个熟悉的身影。\n\n她穿着多年前那件浅色礼服，头发被海风吹起，脸上带着他记忆里最温和的笑。她没有责备他，也没有呼唤他，只是安静地站在那里，像他们第一次相遇时一样，隔着人群，隔着岁月，隔着他这一生所有无法挽回的错误。\n\n郑钧怔了怔，然后轻轻呼出一口气，面带一丝释然的微笑。\n\n“我来了。”\n\n枪声响起。\n\n远乡没有国王了。"
SFR.232.a:0 "将死之人已死。"

SFR.233.t:0 "报应（2）"
SFR.233.d:0 "刘琦忽然抬起头。他在人群里看见了矿区工人的脸，那些脸他本该见过很多次，却从未真正记住过。他记得的是产量、成本、事故赔偿和停工损失，却不是这些人。可现在，他们的眼睛像黑压压的矿井口一样望着他，里面没有请求，没有恐惧，那是多年沉积后终于爆开的怒火。\n\n徐胜第一次露出了慌乱。\n\n他试图向押运士兵喊话，承诺自己还能提供情报，提供贵族藏匿资产的位置，甚至愿意协助新政府清理反革命残余。可他的声音很快被淹没。一个老妇人扑到车边，用枯瘦的手拍打栏杆，一遍遍喊着一个死去孩子的名字。徐胜看着她，忽然发现自己想不起那究竟是哪一桩旧案。\n\n也许太多了。\n\n李冠开始咒骂。他骂押运队无能，骂革命政府不守信用，骂这些群众不过是被煽动起来的乌合之众。可当车门被愤怒的人群拉扯得摇摇欲坠时，他的声音也颤抖起来。他终于明白，自己过去最擅长的那些东西——钱、合同、威胁、灭口、收买报社、烧毁档案——在这一刻全都没用了。\n\n人民不再怕他了。\n\n王一公哭着说自己愿意捐出所有剩余财产，愿意修桥铺路，愿意给每个受害者家庭赔钱。他肥胖的身体挤在角落里，像一只被赶出粮仓的老鼠。没人听他辩解。那些年饥荒时仍被强征地租的人，那些被赶出土地的人，那些因为交不起租而卖儿卖女的人，不会因为几句迟来的求饶就忘记过去。\n\n押运线彻底崩溃了。\n\n士兵们试图鸣枪示警，却被上级严令不得向群众开火，只得撤离。革命政府刚刚接管这个国家，没有人愿意在码头大道上重演往日旧事。于是人潮越过了最后一道阻拦，像决堤的洪水般扑向押运车。\n\n混乱持续了很久。\n\n等到增援部队赶到时，通往码头的道路已经满是散落的文件、破碎的车板和被踩烂的行李。押运车停在路中央，车身歪斜，车门被彻底撕开，里面赫然是四具被撕碎的尸体，他们面容狰狞，充满恐惧，仿佛遇见了鬼神来向他们索命。"
SFR.233.a:0 "人民不会永远保持沉默。"

SFR.234.t:0 "曲终（2）"
SFR.234.d:0 "行刑现场只有负责监督的司法干部、押运军官、执行队，以及少数记录人员。远处的一座楼顶上，叶文石站在栏杆后，静静望着内院。他没有下去，也没有离开。没有人知道他是来确认判决完成，还是来亲眼看见旧远乡最腐烂的一部分如何结束。\n\n四人被押到墙前。\n\n士兵们对他们没有多少尊重。没有人为他们整理衣领，也没有人允许他们发表冗长的遗言。王一公刚想开口求饶，便被执行军官一句“闭嘴”打断。刘琦抬头看了看天空，灰蒙蒙的云层压在监狱上方，像矿井深处永远散不开的尘。徐胜终于放弃了挣扎，脸上的狠厉一点点散去，只剩下难以掩饰的恐惧。李冠则直到最后还在试图说些什么，像是要用某种已经失效的规则为自己争取一点时间。\n\n没人听他。\n\n刑场陷入短暂的宁静。\n\n外面的群众也像是感受到了什么，呼喊声忽然低了下去。风吹过监狱内院，卷起地上的尘土。执行队举枪，枪栓拉动的声音整齐而清晰。\n\n“准备。”\n\n四个曾经决定无数人命运的人，终于站在了不能再转嫁代价的位置上。\n\n“放。”\n\n枪声响起。\n\n短暂的沉默后，监狱外爆发出剧烈的欢呼。人群的声音越过高墙，越过铁门，越过这座曾经吞噬无数革命者的监狱，像一场终于落下的暴雨席卷平京。\n\n远处楼顶上，叶文石闭了闭眼。他长舒一口气，随后转身离开。"
SFR.234.a:0 "曲终人散，账已清算。"

SFR.235.t:0 "新的开始（2）"
SFR.235.d:0 "这是平京城西的一座纺织厂，原来属于某位贵族亲戚，后来被新政府接管。厂房里弥漫着棉絮、机油和潮湿木板混合在一起的味道，机器运转声震得人耳朵发麻。郑红换上粗布工服时，袖口长了一截，鞋也有些磨脚。带队干部把她交给车间主任，车间主任又把她领到一排女工面前。\n\n“这是新来的。”主任说，“先跟你们学整理线轴。”\n底下人面面相觑，结论很明显：没有人欢迎她。\n\n她刚坐下，就有一个女工故意把一筐乱成一团的线轴推到她面前。\n“公主殿下会不会干这个啊？”那人拖长声音说道，“要不要我们给您铺块红毯？”\n\n旁边传来几声笑。\n\n郑红低下头，伸手去理线，却很快被缠住手指。她越想解开，线团缠得越乱。有人笑得更大声，还有人学着宫廷腔调喊她“殿下”。郑红的脸涨得通红，手指被细线勒出一道白痕，却没有停下。\n\n“行了。”\n一个声音从旁边传来。\n\n笑声停了一瞬。\n\n说话的是个看起来二十岁出头的女工，脸上有几粒雀斑，袖子卷到手肘，手指因为长期接触机器而有些粗糙。她走过来，把那筐明显被人故意弄乱的线轴拿开，又从旁边拿来一筐正常的。\n\n“主任说让她学整理线轴，没说让你们整人。”她白了那几个女工一眼，“有劲没处使就去隔壁搬东西，别在这儿浪费时间。”\n\n“你倒是会做好人。”先前那女工嘟囔道。\n\n“我不是做好人。”她平静地说，“我是嫌你们吵。”\n\n她在郑红身边坐下，拿起一个线轴，动作很快地示范了一遍。\n\n“看着点。先把头找出来，绕两圈压住，别一上来就硬扯。硬扯只会越缠越死。”\n\n郑红点了点头，笨拙地学着她的动作。\n\n“谢谢。”她小声说道。\n\n对方瞥了她一眼。“别谢太早。我爹爹以前被你们抓走关过三年，我不喜欢你们郑家。”她说，“但你现在既然坐到这儿了，就先把活干好。干不好，今天下工前可没人替你收拾。”\n\n郑红愣了一下，随后轻轻点头。\n“我会学的。”\n\n那女工没有再看她，只是继续整理手里的线轴。\n“叫我许月就行。”她说。\n\n机器声仍在轰鸣，车间里依旧闷热，棉絮落在郑红的头发和肩膀上，有点瘙痒。她的手指还在发痛，面前的线轴也还是如开始般的一团乱麻。可不知为何，郑红忽然觉得，这个陌生而粗糙的地方，并没有刚才那么可怕了。"
SFR.235.a:0 "这也是生活的一种。"

SFR.236.t:0 "往日之影（2）"
SFR.236.d:0 "“父亲？”\n\n郑钧猛地睁开眼。\n\n他趴在桌前，后背已经被汗水浸透，额头贴着一张还没写完的回忆报告。窗外天色昏暗，桌上的灯光被他的手臂挡住了一半。纸面上写到旧王国第一次大规模围剿革命党组织的前夜，字迹从中段开始变得歪斜，最后拖出一道难看的墨痕。\n\n郑红站在他身旁，神情担忧。\n\n“您又睡着了。”她轻声说道，“我叫了您好几声。”\n\n郑钧愣了片刻，才意识到自己仍在疗养院的书写室里。没有刑场，没有枪声，也没有满街的火光。只有一张桌子，一摞等待整理的旧文件，还有女儿递来的手帕。\n\n“人老了。”郑钧接过手帕，擦了擦额头，“写着写着就撑不住了。”\n\n“医生说您最近身体好了些，但也不能这样熬。”郑红在旁边坐下，“他们不是说明天再交也可以吗？”\n\n郑钧看了看桌上的文件，苦笑了一声。\n\n“以前有人催我批文件，我总想拖到明天。现在没人催得那么紧，我反而觉得该早点写完。”他停顿了一下，“也许是闲下来以后，脑子反倒清楚了。”\n\n这倒不是假话。\n\n这里的生活比他想象中安静。每天早晨有固定的思想教育课，下午整理档案，晚上写回忆和说明材料。没有贵族闯进来争吵，没有军官拿着文件逼他签字，也没有秘书把一整天的烂账堆到他面前。郑钧原本以为自己会在这种日子里迅速衰弱下去，可事实上，他吃得规律了，睡得也比过去多了，连咳嗽都少了一些。"
SFR.236.a:0 "只是梦越来越多。"

SFR.237.t:0 "往日之影（3）"
SFR.237.d:0 "郑钧抬头看看郑红，才发现她的手指上缠着一小段布。\n\n“受伤了？”\n\n“被线轴划了一下，不严重。”郑红下意识把手往袖子里缩，“今天许月教我整理机器旁边的废线，她说我手太慢，迟早要被主任骂。”\n\n“许月？”\n\n“我在工厂认识的人。”郑红犹豫了一下，像是不知道该如何介绍这个名字，“她不喜欢我们。她父亲以前被监狱关过，所以她一开始对我也很凶。不过……她帮过我。别人故意整我时，是她出来拦下来的。”\n\n郑钧沉默了一会儿。\n\n不知为何，听到这里，他竟然感到一丝难以言明的轻松。和他不同，郑红有希望走出出身的阴霾，作为普通人好好生活。她会被讨厌，会被纠正，会笨拙地学习如何劳动，也会遇见一个愿意在不喜欢她的情况下仍然帮她的人。\n\n这或许比他能给她的一切都更真实。\n\n“那就好。”郑钧说道。\n\n郑红有些意外：“您不生气吗？”\n\n“生气也没有用。”郑钧摇了摇头，“更何况，她愿意帮你，已经很好了。红，不是所有人都会忘记以前发生过什么，他们中的许多也不应该忘记。你要学着和他们一起生活，不是让他们原谅你，而是让自己变成他们中的一员。”\n\n郑红低下头，看着自己被布条缠住的手指。\n“我不知道自己能不能做到。”\n\n“没人一开始就会。”郑钧说，“我以前也以为自己会做国王，后来才知道，许多事情我从来没学会。”\n\n他把桌上的回忆报告整理好，慢慢放到一旁。\n“珍惜现在的生活吧，可能是累了点，这未必是坏事。过去我们拥有太多别人替我们安排好的东西，所以才分不清什么是真正属于自己的。”\n\n郑红抬起头。\n郑钧的神情仍然苍老，却比过去平静许多。\n\n“以后会更好的。”他说，“你还能学，还能认识新的朋友，还能从头开始。”\n\n窗外，疗养院的晚铃响了。\n郑红起身，准备回女工宿舍。临走前，她回头看了一眼父亲。郑钧重新拿起钢笔，灯光落在他斑白的头发上，他看起来和普通的老人没有任何区别。"
SFR.237.a:0 "重获新生。"

SFR.250.t:0 "疲惫之人（1）"
SFR.250.d:0 "叶文石坐在车里，膝上放着一叠皱巴巴的文件。刘青兰坐在他对面，手里同样拿着笔记本，正低声汇报各地重建委员会的最后几项问题。\n\n“南沙附近最近在闹，地方干部说是没钱换旧币了，地方市场通胀很严重，稳定可能还要再拖几周。”\n\n“让他们别拖太久。”叶文石揉了揉眉心，“我们应该有余力派些物资去支援一下。”\n\n刘青兰点了点头，又翻过一页。\n\n“还有大会筹备组那边。他们希望你尽快定下代表名额，尤其是原先的根据地、工人纠察队、地方党组织和新解放区之间的比例。有人担心……”\n\n“担心自己少分了几张椅子。”叶文石接过了她没有说完的话，笑了一声。那笑声很轻，甚至有些发哑，“革命打到现在，大家都累了。累了，就容易把椅子看得比路还重要。”\n\n车停在一处临时修好的路口。前方有几名工人正在搬开倒塌的石块，司机回头请示是否要绕路。叶文石摆了摆手，说自己下去走走，也正好看看附近的工程。刘青兰本想劝他休息，可看着老人已经推开车门，也只好跟了上去。\n\n风从街道尽头吹来，卷起细小的尘土。叶文石扶着拐杖，望着远处被重新刷白的墙面。墙上写着一行新的标语：\n\n加强革命团结 争取更好重建\n\n他盯着那行字看了很久，久到刘青兰以为他是在思考远乡的未来。可下一刻，叶文石的身体突然晃了一下。\n\n“主席？”\n\n刘青兰伸手去扶，还是慢了一步。叶文石的拐杖先落在地上，随后是文件，最后才是他自己。纸页被风吹散，有几张落进泥水里，墨迹很快糊成一片。"
SFR.250.a:0 "世界在那一瞬间安静下来。"

SFR.251.t:0 "疲惫之人（2）"
SFR.251.d:0 "叶文石先是听见了风声。不是南远乡街道上卷着尘土的风，而是许多年前吹过田埂的风。那时的南远乡还没有被这么多旗帜和口号切开，远处的村庄也还没有学会用枪声迎接清晨。他站在儿时的田边，裤脚沾着泥，手里攥着一本从私塾里借来的旧书。\n\n他的发小就坐在田埂上，嘴里叼着根草，抬头看着他。\n\n“你又在看书。”那孩子含糊不清地说道，“整天看这些东西，有什么用？”\n\n叶文石低头看了看自己手里的书，书页上的字已经模糊不清。\n\n“你以后是不是要去很远的地方？”发小又问。\n\n叶文石点了点头。\n\n“那你会回来吗？”\n\n他仍然点头。\n\n“回来以后呢？当大官？当先生？还是当那种站在台上讲话的人？”\n\n叶文石坐了下来，坐到他的身旁。\n\n“我不知道。”他说。\n\n“你怎么会不知道？”发小笑了起来，“你不是总觉得自己什么都能想明白吗？”\n\n叶文石也跟着笑了一声。那笑声很轻，像是从很远的地方传来。\n\n“以前是这么觉得的。”他说，“后来发现，很多事情不是想明白就能做成的。”\n\n“比如呢？”\n\n“比如让不该死的人活下来。比如让讲道理的人不被枪打死。比如让怀有不同思想的人都能坐下来好好谈谈。”\n\n发小听完，沉默了一会儿，又把嘴里的草吐到田里。\n\n“那你做成了吗？”"
SFR.251.a:0 "叶文石没有回答。"

SFR.252.t:0 "疲惫之人（3）"
SFR.252.d:0 "远处的田野开始变暗。泥土的气味被火药味取代，虫鸣声变成了若有若无的枪响。叶文石看见那些本该消失在记忆里的面孔一个个从田埂尽头走过，有人还很年轻，有人已经满身血污，有人只剩下一个模糊的背影。他想叫住他们，却一个名字也喊不出来。\n\n发小没有看那些人，只是继续问道：\n\n“那等我们老了怎么办？”\n\n叶文石愣住了。\n\n“什么？”\n\n“等我们老了，走不动了，眼睛也看不清了，脑子也转不动了。”发小转过头看着他，脸上仍是少年时的模样，“到那时候，还要继续站在前面吗？”\n\n叶文石望着他，忽然觉得胸口被什么东西压住了。\n\n“如果后面没人呢？”\n\n“怎么会没人？”发小反问道，“你不是一直在说，要让更多人站起来吗？既然更多人已经站起来了，为什么还非得是你站在最前面？”\n\n叶文石的嘴抽了抽，但他却什么也没说出来。\n\n发小站了起来，拍了拍裤子上的尘土，轻声说道。"
SFR.252.a:0 "“你打算撑到什么时候？”"

SFR.253.t:0 "疲惫之人（4）"
SFR.253.d:0 "“主席！主席！”\n\n叶文石猛地睁开眼。\n\n天空灰得发白，刘青兰正跪在他身旁，脸色难看得不像平日里那个总能把事情安排妥当的人。远处有人正在跑来，似乎是被她喊声惊动的工人。叶文石动了动手指，发现自己的手还在发抖，但意识已经恢复过来。\n\n“我昏过去多久了？”\n\n“没多久。”刘青兰急促地说道，“你先别说话，我去喊医生，还有警卫——”\n\n“等等。”\n\n叶文石叫住了她。\n\n刘青兰停下脚步，回头看向老人。叶文石试着坐起身，却很快因为胸口传来的闷痛皱起眉头。刘青兰连忙扶住他，想让他重新躺下。叶文石没有拒绝，只是用一种近乎平静的语气说道：\n\n“不要把事情闹大。至少现在不要。”\n\n“可是你的身体——”\n\n“我的身体我自己知道。”叶文石喘了口气，视线越过她，看向远处那面刚刚粉刷好的墙，“我本来以为，等重建收尾，大会开完，再慢慢谈这些事。现在看来，是我太自信了。”\n\n刘青兰沉默了下来。\n\n“去请老赵过来，就说我有急事找他。”\n\n他顿了顿，又看向刘青兰。\n\n“你也一起来。”\n\n刘青兰像是意识到了什么，握着笔记本的手微微收紧。\n\n“主席，你是要……”\n\n叶文石摇头道，“我们见面再谈。”\n\n风再一次吹过街道，把地上那几页弄脏的文件掀起一角。叶文石望着它们，忽然觉得自己并没有想象中那么遗憾。"
SFR.253.a:0 "“我该退休了…”"

SFR.254.t:0 "后来者"
SFR.254.d:0 "大会开始前，叶文石在后台坐了很久。\n\n会场外是刚刚重新铺好的广场，石缝里的灰浆甚至还没完全干透。几个月前，这里还是临时收容站和物资分发点，伤兵躺在帐篷里哀嚎，护士抱着物资满场跑，哭喊声、争吵声和卡车发动机声混在一起，几乎没人相信这片地方还能这么快恢复正常。如今，帐篷被拆走，弹坑被填平，红旗挂满了会场两侧，从各地赶来的代表坐在台下，等待南远乡革命阵线在战后重建完成后的第一次正式大会。\n\n叶文石的手放在讲稿上，却没有翻开。\n\n他知道台下坐着的并不只是同志。那里有根据地时期的老干部，有新解放区刚入党的青年，有工人代表，有军队干部，也有过去在路线问题上与他争得面红耳赤的人。战争胜利了，重建也基本完成了，可阵线内部的分歧并没有因此消失。恰恰相反，和平的到来反而激化了党内的路线之争。\n\n叶文石害怕的正是这一点。\n\n他害怕自己一开口，原本被胜利的喜悦盖过的争论就会白热化；害怕自己一退，所有好不容易达成的共识都会烟消云散；更害怕自己继续不退，让这个已经属于新时代的国家仍旧被一个疲惫的老人拖在原地。\n\n工作人员掀开帘子，提醒他该上台了。\n\n叶文石站起身时，膝盖传来一阵酸痛。他没有让人搀扶，只是拿起讲稿，慢慢走向灯光最亮的地方。掌声先是零散，随后汇成一片。叶文石在讲台前停下，望着台下黑压压的人群。那一刻，他忽然不再紧张了。"
SFR.254.a:0 "“同志们好。”"

SFR.255.t:0 "后来者（2）"
SFR.255.d:0 "“同志们，南远乡地区的重建工作，已经基本完成了。”\n\n礼堂里响起一阵压低的骚动，很快又安静下去。\n\n“当然，这并不代表我们的工作已经完成。我们的任务还有很多，困难也还有很多。但从今天开始，我们可以自豪的宣告，南远乡，解放了。从过去的阴霾，从千百年以来的帝制压迫，从扭曲的体系，反动的统治下，解放了！”\n\n叶文石停顿片刻，随后继续说道。\n\n“很多同志没有等到这一天。有人倒在当年的围剿里，有人倒在山林之间，有人倒在解放前的最后时分。还有更多人没有留下名字，他们为远乡人民的未来付出了生命的代价，他们是最伟大的英雄！而我们必将带着他们的精神，继续前进！”\n\n他抬起头，看向会场后方。\n\n“我们要建设学校，让孩子们不必再把识字当成少数人的特权；我们要恢复工厂和农田，让工人与农民不再只是在饥饿和失业之间选择；我们要建立人民的军队，让枪口不再指向无辜的人民；我们要建立一个新的远乡，一个不会再因为几个贵族的贪欲，就被拖回黑暗里的新远乡。”\n\n掌声再次响起，比刚才更响，也更整齐。\n\n“同志们，胜利并不是终点。胜利只是证明了一件事：我们有能力打碎旧的东西。接下来，我们必须证明另一件事——我们也有能力建设新的东西。我们不能只满足于守住眼前的土地。南远乡必须成为远乡革命的起点，成为所有仍在压迫下生活的人能够看见的道路。我们要让他们知道，反动派说人民不能管理国家，那是谎言；反动派说革命只会带来废墟，那也是谎言。真正的废墟，是他们留给我们的。而我们正从废墟中崛起，走向更光明，更伟大的未来！”\n\n这一次，掌声持续了很久。\n\n叶文石没有立刻继续。他看着台下的代表们，看着那些年轻的面孔，忽然觉得自己心里的紧张正在一点点散去。于是，他翻过讲稿的最后一页，却没有照着上面的文字念。"
SFR.255.a:0 "“但也正因为未来已经来到我们面前，我必须在这里宣布另一件事。”"

SFR.256.t:0 "后来者（3）"
SFR.256.d:0 "“我担任革命阵线主席已经太久了。过去，在山里，在根据地，在最困难的时候，阵线需要一个调停者，需要有人为了革命的胜利维持平衡。可今天的南远乡，已经不该再依靠一个老人的威望维持团结。”\n\n叶文石的声音不高，却清清楚楚传遍了整个礼堂。\n\n“我将在近期卸任南远乡革命阵线主席一职。按照组织程序，阵线将在不久后启动选举，由全体代表们决定谁来带领我们走向下一个阶段。”\n\n台下先是死一般沉默，随后响起混杂的低语。有人惊讶，有人站起身想要说什么，也有人只是低头沉思。\n\n叶文石抬起头，“这是我们必须迈出的一步。我们经常说，人民能够解放自己。那么今天，我们也必须相信，同志们能够选择自己的道路。”\n\n短暂的沉默后，掌声终于响起。起初只是几个人，随后是一排，一片，最后整个会场都站了起来。\n\n叶文石望着台下的人群，忽然觉得肩上的重量轻了一些。"
SFR.256.a:0 "人民会选择前路。"
SFR.256.a.tt:0 "§C根据我们选择结果的不同，选举的结果也会不同...§！"

SFR.257.t:0 "后来者（4）"
SFR.257.d:0 "随着投票开始，代表们依次走向票箱，有人神色严肃，有人低头思索，还有人直到最后一刻才在纸上写下名字。根据地的老党员、新解放区的干部、军队代表，以及一众工农代表，第一次以如此正式的方式决定革命阵线未来的领导人。\n\n叶文石坐在后排，没有坐到主席台上。此刻，他只是安静地看着一个又一个代表走上前去，然后闭目养神，等待胜利的幸运儿。\n\n唱票持续了很久。当最后一张选票被确认后，叶文石在掌声与低声议论中起身，慢慢走向讲台。他接过统计结果，看了一眼，然后抬起头。\n\n“根据南远乡革命阵线大会投票结果，赵永军同志当选为新一任革命阵线主席。”\n\n会场中先是短暂的沉默，随后掌声响起。赵永军从前排站起，向四周点头致意。走上台后，他先向叶文石敬了一个军礼，随后才站到讲台前。\n\n“同志们，我知道，这个结果意味着大家对我的信任。”\n\n“我出生在乡安的茶树林里。和远乡大多数农民一样，我知道一块田能养活多少人，也知道天灾、苛捐杂税、地主的命令这样曾经看似平常的事情，可以怎样毁掉一个家庭。后来我读了书，去了城市，参加了革命，可我从来没有忘记一件事：真正的远乡，不在王宫里，不在贵族院里，也不在外国人写满条款的合同上，而是在千千万万的人民心中。”\n\n“我们要建设的国家，不只是给少数人看的花瓶，而是属于全体人民的国家。农民要有土地，工人要有尊严，战士要知道自己为何而战，孩子要能走进学校，老人要能在辛劳一生后安稳地活下去。我们要让这个国家真正由劳动者支撑，由劳动者参与，也由劳动者分享胜利。”\n\n赵永军停顿了一下，目光扫过会场。\n\n“当然，同志们，我们的任务还没有完成。南远乡已经解放，但远乡还没有完全解放。旧时代的残余、反动军阀、地主武装，以及所有试图把人民重新踩回泥里的敌人，都还外面等着我们。我们决不能让他们得逞！”\n\n他扶住讲台，声音终于高了起来。\n\n“所以，从今天开始，我们会继续重建，会继续组织群众，会继续让人民在自己的土地上站稳脚跟。但这只是第一步，接下来，我们一定会解放全远乡！建设一个人民有所希望的未来！”"
SFR.257.a:0 "为了人民有所希望的未来。"

SFR.258.t:0 "后来者（4）"
SFR.258.d:0 "随着投票开始，代表们依次走向票箱，有人神色严肃，有人低头思索，还有人直到最后一刻才在纸上写下名字。根据地的老党员、新解放区的干部、军队代表，以及一众工农代表，第一次以如此正式的方式决定革命阵线未来的领导人。\n\n叶文石坐在后排，没有坐到主席台上。此刻，他只是安静地看着一个又一个代表走上前去，然后闭目养神，等待胜利的幸运儿。\n\n唱票持续了很久。当最后一张选票被确认后，叶文石在掌声与低声议论中起身，慢慢走向讲台。他接过统计结果，看了一眼，然后抬起头。\n\n“根据南远乡革命阵线大会投票结果，刘青兰同志当选为新一任革命阵线主席。”\n\n会场中先是短暂的沉默，随后掌声响起。刘青兰从前排站起，向四周点头致意。走上台后，她先向叶文石深深鞠了一躬，又转身面向台下。\n\n“同志们，我曾经相信，远乡可以不流血地走向未来。”\n\n“我相信过请愿，相信过议会，相信过一次又一次写得漂亮的改革方案。后来，反动派用军警、牢房和枪声告诉我们，他们所谓的宽容只会留给听话的人；他们所谓的秩序，只是让人民安静地忍受剥削。也正因如此，我们拿起了武器，走进山林，走过漫长的游击战争，最终站在了这里。”\n\n“我知道，接下来的道路不会轻松。南远乡已经解放，但远乡仍未统一；反动派的残余不会自动消失，更也不会因为我们谈论仁慈就放下武器。我们必须继续战斗，而且必须赢得胜利。”\n\n她扶住讲台，声音比刚才更坚定。\n\n“从今天开始，我们会继续整顿地方政府，完善代表会议，恢复学校和医院，保障军队纪律，保护每一个愿意站到新远乡一边的普通人。无论是工人、农民、士兵、教师、商贩，还是曾经被旧时代逼到角落里的人，他们都应该在这个国家里拥有位置。”\n\n刘青兰抬起头，目光扫过整座会场。\n\n“同志们，我们会解放全远乡。并且持续建设祖国，确保人民得到应有的对待，保证稳定，繁荣与和平，我们要建设一个比旧王国更值得人民相信的未来！”"
SFR.258.a:0 "为了更值得相信的未来。"

SFR.300.t:0 "风波将至"
SFR.300.d:0 "清晨的平京，初阳刺破工厂的烟霭，照耀在营区的操练场上，灰色服饰连成一片，今天是平京各级官兵来听讲座的日子，其中初来驾到的新兵王涵也是其中的一员。\n\n“同志们，我们或许都来自不同的地方，田野、工厂、矿山和港口，我们也有着不同的样貌，不过在穿上这件衣服前我们也并无不同，我们都是远乡人，都是一个大家庭的一员。现在我们成功革了平京老爷的命，我们站在的地方过去是远乡皇室过去阅兵观礼的地方，过去平民坐在这是会掉脑袋的，但现在不会，未来也不会。我们要帮助和解放同样被压迫的远乡人，北方的王国王郑义自称要南下把我们这些贱民、叛匪通通杀头，我们的家人、孩子和亲人现如今重新获得选择的权利，可以成为科学家、可以成为工程师、可以成为文学家，我们绝不能重蹈覆辙，我们要推倒压在我们身上的三座大山！把军阀、封建王室和人鱼资本家消灭掉，把套索砸得粉碎，要堂堂正正挺着胸膛走路！”\n\n王涵看着站在高台上的人，他跟自己并无区别，他们穿着同样的衣服，头顶同样的红星，心中有一阵激动，但想起过去记忆里的火光有一阵畏惧，他没摸过几次枪，对于杀人也没啥概念……\n\n王涵听完讲座就提着一个鼓鼓当当的布包来到了驻地附近的邮局，今天连队上面发下了粮票。他准备把之前训练作为奖励的罐头和一部分粮票给寄回老家去，也不知道家里的弟弟妹妹们学到啥了没有，吃饱了没有，母亲的腰好些没。\n\n将布包放在柜台上，一个穿着满是补丁粗布长衫的老人放下扁担，从门外走进，他一看见王涵就急忙走了过去，他握住王涵的双手说道：“我见过您红军同志，我是之前列车上晕倒的人啊！”\n\n“您是？”随后回忆起自己刚来平京时在列车上遇到的一位因为缺水中暑昏迷的人王涵迟疑地询问道：“您是中暑的那位？”\n\n老人点了点头随后说道：“红军同志你是来寄东西的吧，这样我也没啥可以报答您的，这样我帮您写封信吧。”\n\n老人进入账房后，随后取出一个破旧的笔砚，在磨好墨后看着有点发愣的王涵问道：“红军同志你想写什么？”\n\n王涵将自己在平京的所想所见说了出来，老人将其书写在纸上，前者讲述完感觉缺些什么，随后补充道："
SFR.300.a:0 "我们一定要解放全远乡！"

SFR.301.t:0 "西北调查报告"
SFR.301.d:0 "机密\n\n致：[SFR.GetLeader.GetName]主席，革命阵线中央军委\n\n西北特别行政区——远乡西北地区调查报告\n\n我们的情报组通过边境的走私网络分为三拨人成功渗透进入西北的不同阶层进行接触，西北的情况出乎我们的意料，经过一段时间调查情报人员将西北神秘一角已被揭开。\n\n关于海清城的情况也出乎意料的重点，海清城是西北政府的核心，那里由边军的精锐控制，其反恐力度相较于城外十分强硬，对于犯罪分子西北政府的处理多以血腥恐怖为主。惊讶的是我们发现海清城核心官僚也逐渐由另一个群体取代，通过调查是一些来历不明但思想进步温和的官僚，我们或许能与他们交流一番，可以通过温和的方式促进西北的解放。\n\n西北的物资与水源情况的缺失深刻影响西北人民群众的生活，在对边境村庄的调查中，水源控制权由地主、黑商和村官轮流控制，物资交换以相对落后的以物换物和远乡各类货币混杂进行交易，而海清城发布的新币在西北地区举步维艰。黑诊所、黑窑厂和黑矿场通过与官兵协作压榨民众，官商结合使民众苦不堪言。\n\n西北特别行政区对于除海清城以外地区的基层管控相对不足，即使现如今西北特别行政局的反恐力度十分强力，那里还是存在各色黑商、逃兵和土匪，甚至还有西北过去起义残存的革命党同志组建的游击队。但由于常年的治安战，东巴大战时强悍的边军已经演变成一支缺枪少弹的残军，其内部也矛盾重重，经过调查有不少新入伍的士兵是由当地强征民夫和犯罪组成的民兵为主，缺乏作战意志。\n\n西北特别行政区的内部混乱，一些进步温和的官僚和当地军阀的结合，这是我们值得警惕的。各类灰色地带产业是现如今西北反正的重要经济支柱之一，其官商勾结环环相扣必须遏制的。而西北特别行政区的军事层面的混乱是我们通过武力解放西北的重要契机。留在西北的情报人员将作为未来解放西北的重要助力。\n\n敬礼"
SFR.301.a:0 "西北的情况很复杂，但反动派的势力并不强大。"

SFR.302.t:0 "[SFR.GetName]的橄榄枝？"
SFR.302.d:0 "“总督，这里有一份商业信函，是来自一个南远乡的工业集团的建厂单子。”\n\n[NWF.GetLeader.GetName]放下报纸，看向将报告递给他的秘书，接过报告查看起来，惊诧的反问道：“南远乡？那不是已经被赤色分子控制了吗？”\n\n秘书面不改色的回应道：“他们说愿意为我们提供我们所需要的物资和一些军事承包项目，比如剿灭边境匪军之类的。”\n\n“你们倒是高兴了，但是请神容易，送神难啊。”[NWF.GetLeader.GetName]放下报告。\n\n秘书微笑着说道：“他们还提供了更多服务。”\n\n[NWF.GetLeader.GetName]摊了摊手，满脸无奈。"
SFR.302.a:0 "让我们看看..."

SFR.303.t:0 "会谈"
SFR.303.d:0 "今日的平京比起过去少了许多沉闷，多了几分吵闹，各种贴上西北牌子的东西出现在平京的货架上，有关西北地区的新闻在革命阵线的报纸上出现。\n\n“主席，[NWF.GetLeader.GetName]松口了！”秘书带着一份电报走进[SFR.GetLeader.GetName]的办公室，然后开始念起上面的内容：“西北特别行政区总督[NWF.GetLeader.GetName]就电远乡革命阵线，革命阵线胜利完成人民解放伟大事业，谨致无上之欣祝。远乡现如今的混乱局势，自感无力保证边境安全，余愿意就和平统一西北一事愿进行细致谈判。非余之贪图权力，而是为西北人民寻求就远乡新政府的正确地位。”\n\n“[NWF.GetLeader.GetName]倒是个有意思的人，”[SFR.GetLeader.GetName]拿着搪瓷杯起身走到窗前瞅了一眼热闹非凡的平京城，看向秘书说道：“拿着西北人民跟我们谈判倒是胆大，不过不胆大也不可能执掌西北。”"
SFR.303.a:0 "希望他们能识时务。"

SFR.304.t:0 "会谈"
SFR.304.d:0 "“总督，这是革命阵线发来的清单。”秘书将报告放在[NWF.GetLeader.GetName]身旁的桌案上，[NWF.GetLeader.GetName]则坐在阳台的躺椅上看向海清城夕阳下的美景，残破的旧楼与各式呼吁共和的标语出现在大街小巷，沉寂的边城再次焕发生机，西北特别行政区历任总督一直做不到的事倒是轮在他身上了。\n\n“小辛你跟我多久了？”[NWF.GetLeader.GetName]将手中高脚杯的美酒喝尽，将酒杯放下看向秘书说道。\n\n秘书少了过去的拘束，倒是翘起眉间自在的说道：“自1995年以来，当时的海清还没如今安全和繁荣，我也还是个从渔村出来的啥也不懂的傻小子。”\n\n“枯途首难忘，今枝出新芽啊……”摸了摸逐渐雪白的鬓角，秘书感叹道。\n\n“哈哈哈哈……”[NWF.GetLeader.GetName]不禁大笑，对着秘书的感叹挖苦道：“你这诗意象狗屁不通，韵味还不如一杯葡萄酒，纯打油诗！”\n\n“是是是，比不了你，无论结局如何，我们都要走到头，”秘书苦笑的将领口的钢笔递给[NWF.GetLeader.GetName]手中喃喃道：“无论是为了自己，还是为了西北人民。”"
SFR.304.a:0 "同意"
SFR.304.b:0 "拒绝"

SFR.305.t:0 "[NWF.GetName]同意了我们的要求！"
SFR.305.d:0 "[SFR.GetLeader.GetName]主席：\n\n工农红军胜利完成人民解放伟大事业，谨致无上之欣祝。此间对西北边境安全及尊重少数民族利益之号召，早具坚强之信心及拥护之赤城，并为之克服困难。经决意与反动派政府脱离关系。兹已准备一切力量消灭反动势力，接受领导，俾每一角落共庆新生，以完成贵党所领导的整个远乡之解放。特电敬布衷忱，敬祈亮鉴。[NWF.GetLeader.GetName]申皓叩"
SFR.305.a:0 "太好了。"

SFR.306.t:0 "[NWF.GetName]拒绝了我们的要求！"
SFR.306.d:0 "[SFR.GetLeader.GetName]主席：\n\n西北特别行政区自东巴大战后都是一个独立的政府，我们捍卫远乡的西北边境和庇护边境少数民族的权利。私以为你们与过去那些反动的中央政府无任何区别，通过压榨地方来创造中央的繁荣，而对于西北人民的利益你们无法保证，西北特别行政区自大战结束后都能做到自给自足，所以有关并入革命阵线一事还需再斟酌。[NWF.GetLeader.GetName]叩"
SFR.306.a:0 "我们别无他选..."

SFR.307.t:0 "唯有一战"
SFR.307.d:0 "“[SFR.GetLeader.GetName]主席，已经通知阵线干部、中央军委和各军代表了。”秘书敲响房门拿着档案袋走到[SFR.GetLeader.GetName]案前说道。\n\n[SFR.GetLeader.GetName]放下笔，将报告随意放在一旁，茗了一口搪瓷杯里的茶水，起身迈步向议事厅走去，秘书将那份随意放置的报告放入档案袋，随后跟紧[SFR.GetLeader.GetName]主席的脚步。\n\n“现在不应该发动战争，我们的人民还没准备好！物资尚不足内应，何来发动一场进攻型战争！”\n\n“现在是最好时机，我们的军队完成了初步的整编，而且现在北边的郑义随时有南下的风险！，尚且革命热情还没散去，趁热打铁方能锻造一支能够击败任何旧势力的军队！”\n\n随着靠近议事厅，即使是掩着门也能听见里面的吵闹，[SFR.GetLeader.GetName]推开门，一时间热闹非凡的议事厅瞬间如泼了冷水的发动机，陷入了一阵沉默，[SFR.GetLeader.GetName]扫视着那些因为过于激动面色发红的阵线干部和军官们，随后走到过去属于议长的发言台上。\n\n在场所有人都看着眼前这位带领他们从内战的残垣断壁，走到平京这座庙堂之上的领袖，他们眼里带着期待、带着狂热、带着审视、带着批评。\n\n“我不可能知道同志们都在想什么，不过我知道对于远乡人民现在需要什么，我们少一秒慢一分都是对远乡人民的折磨，现在北边的郑义重新宣称自己为全远乡的唯一君主，这对于我们而言就是赤裸裸的不宣而战！”[SFR.GetLeader.GetName]语气激动，看着眼前这些或新或老的同志不假思索地说道：“而我们的目的始终也只有一个，解放全远乡！”\n\n台下的人们开始议论纷纷，[SFR.GetLeader.GetName]随后打断纷扰，开始分析道：“西北特别行政区，是过去东巴大战后留下的军管地区，那里驻扎着过去威名赫赫的边军，至于现在嘛，只是一帮被拔了牙的猫，他们的爪子因为捕食着小鸟、老鼠而慢慢变小，直到现在只能用小股力量来打治安战，而他们的官老爷不敢随意离开海清城。”\n\n“对于现在的阵线困境并非是物资不够，相反的是一部分物资膨胀，而西北的现如今的资源困境，则是刚好能介入的。”[SFR.GetLeader.GetName]茗了一口茶水，苦涩的茶水在喉间带来丝丝甜意，[SFR.GetLeader.GetName]放下搪瓷杯说道：“关于西北的相关资料会下发各个干部，这也是一次对于工农红军的一场期中考试，我们要在郑义还未反应前，先把他的潜在盟友解决了，那里矿物也会为我们的海军计划做好准备，所以说同志们！”"
SFR.307.a:0 "解放刻不容缓！"

SFR.308.t:0 "动员大会"
SFR.308.d:0 "王涵已经在与西北特别行政区的边境驻扎许久，经过几次与匪军和走私者的作战他已经从稚嫩新兵蜕变成了一位见过血的士兵，听说今天队伍里要举行一次动员大会……\n\n过去他在村里见过类似的，大概是一个胖长官将银币分发给手底下的刚成兵的村里该溜子，然后他们一起喝酒，摔碎酒碗就是未来一起战斗的兄弟，不过在他的印象里红军最后在难民堆里逮到了胖长官，至于该溜子，他再也没见过了。\n\n这样想着王涵跟着队伍来到空地上，在这里他没看到装满银元的箩筐和一坛半个身子大的酒坛子，相反则是一个临时搭建起的台子，上面贴着“动员大会”的标语。\n\n“同志们，坐。”待到列好队伍，在台子上团里政委的指挥下，战士们纷纷盘坐在草地上。\n\n“同志们，今个我们来不是要讲大空话、讲大废话，我们要搞清楚我们为何而战，我们的军队为谁建立。”\n\n政委清了清嗓子继续说道：“前天，附近村子里的百姓说要来感激我们，不过我和团长大早上去村里看过了，那哪有什么可以感激的东西啊，那里的村子土墙和羊圈全是烧焦、破坏的痕迹！我当时去问村里的老人这是个什么情况，他说之前我们打退马匪又进村了，他们把能带走的畜生和粮食通通带走，不能的他们专门盯着羊圈砍，还放火烧粮仓，惊扰了畜生，导致现在村子里没了过冬的粮食，不知道该怎么过冬。我当时问为什么不找我们寻求帮忙，当时老爷子只是哽咽着说，自从我们来了村里的谷仓才满，但是他们不敢啊，他们不敢找我们，怕再被马匪袭击，怕又浪费我们团里的补给！”\n\n“这种场景我在游击战争的时候没少见，你们也肯定都有经历过，我们都挨过饿，但饿了我们只能去吃草根子，去啃树皮子。但现在大伙可以吃得上粗面，甚至是肉，这是前所未有的，但现在我们保护过的村子又重现我们过去发生的事情。我心疼啊，我们保卫的人民还在被土匪坑害，同志们你们气愤不气愤！”政委沉着声音叙述着。\n\n“气愤！”战士们参差不齐的呐喊着，但出奇的大，就仿佛要捅破这天，王涵感觉眼睛痒痒的，他还记得那个村子的人，当时他们刚都开心地欢迎着他们，他记得个婆婆想把窝窝头硬塞过去，但被他拦了下来。\n\n“所以同志们！我们要保卫远乡人民，也要去解放那些跟我们一样受苦的人民，山就在那里，我们要走上去，要消灭我们视野里所有不公和压迫，要推翻压在我们，压在远乡人民身上的三座大山！”"
SFR.308.a:0 "为国家统一而战！"

SFR.309.t:0 "致我们共同的未来"
SFR.309.d:0 "“您好，”一位穿着粗布制服的年轻人拿着行李对着一名正在烤着烙饼的老人询问着：“政府大楼往哪走？”\n\n老人看着年轻人的服饰说道：“您一看就是南方人吧，往那走然后左转……”\n\n年轻人看着老人指的方向认真聆听，随后感激道：“实在谢谢您老伯，我叫刘继尧，假如未来街坊邻居有什么事情可以去市政厅找我。”\n\n“好年轻人，但有些事还是得人们自己处理，不然全交给船手了，他们只会太依赖你，来拿好了，看你在这里晃悠了好久。”老人将一份小吃交给刘继尧，用油腻的手拍了拍后者的肩膀语重心长地说着。\n\n“老伯，话说西北特别行政区要并入革命阵线了，您有什么想法吗？”\n\n老伯听着刘继尧的问题将发好面的面饼用擀面杖均匀擀开，确保擀成圆形且厚度均匀，随后将半成品贴在烤炉的内壁上，做得差不多后说道：“两个不同的材料需要通过擀面杖磨合后，经过烈火考验才能做出美味的烙饼，革命阵线就要做好擀面杖的作用，让西北与新思想结合。”\n\n“老伯我会记下你的话。”刘继尧感激地告别老伯，于是向着后者指明的方向走去。\n\n老人看着着刘遥离去的背影继续揉搓面团，这时一个穿着校服的女青年走了过来没好气地对前者说：“范老爷子你又违规开摊子了，小心被城管逮了……”\n\n“是小李啊，我马上走，”范老伯将揉好的面饼放入搪瓷盆，然后对着小李提醒道：“我刚刚遇到了一个年轻人，是从南方来的，他现在估计快到市政厅了，我们未来有人作主了。”\n\n“范老您这么相信他？”小李疑惑的询问范老伯，小时候就通过街坊的说法范老伯过去是一名边军，但似乎是有了残疾便退了伍在当地定居。\n\n“我摸过他的手，”看向小李看算命先生的眼光范老伯笑着说道：“那双手摸过枪，起码也是扛过几年枪了，说话谈吐都不错，但做事还是有点毛手毛脚，年轻人好啊。”\n\n话罢范老伯推着车往家的方向走去。\n\n小李站在原地思索着，作为这条街吃百家饭长大的孩子，如今也成功毕业要成为当地的一名公务员，但西北特别行政区将并入革命阵线而陷入疑虑，但时间不会等，小李也向着家的方向离开了。\n\n刘遥走了几里路来到一处有点安静的大楼前，来到前台看着空空如也，随后走入旁门只见到几个公务员在那耍着扑克，随后走去说道：“我是革命阵线的特派员刘继尧。”\n\n比起之前没有装饰的制服上面多了个小勋章，齿轮、稻穗与火炬穿插。\n\n“接下来我会协助各位的工作，未来大伙就是同志了，”那些人惊愕地看着他，刘继尧则继续说道：“未来其他革命阵线的同志也会来，接下来希望我们能精诚合作，为西北人民服务。”"
SFR.309.a:0 "离国家和平统一又近了一步！"

SFR.310.t:0 "团结可以团结的力量"
SFR.310.d:0 "“主席，”穿着西北边军老式军服的老将军握住那只厚实的手，看向[SFR.GetName]说道：“我盼您真是望眼欲穿啊。”\n\n[SFR.GetLeader.GetName]知道这位老将军，他是前西北政府的成员，也是一位隐藏的西北地区革命党老党员。\n\n“我也一样，西北人民总算能走自己道路了。”[SFR.GetLeader.GetName]与后者握手晃了几下回复道。\n\n四周的记者纷纷拍下这历史性的一刻。\n\n“请。”老将军侧过身将[SFR.GetLeader.GetName]带入西北行政宫，在其身旁一边指引一边说道：“我们在宴会厅设宴为主席接风洗尘，海清城的大伙们也在等待您的指导，比如在西北秘密战线的老同志和愿意为革命贡献力量的新同志。”\n\n宴会厅装饰布置相当朴实，参与宴会的成员囊括了海清城的政军商各个领头人物，有的是头发花白，有的是年轻热情。\n\n“主席开始宴会前交由您来发表几句吧。”老将军将[SFR.GetLeader.GetName]请到宴会核心的演讲台前。\n\n[SFR.GetLeader.GetName]了然于心通过演讲台的麦克风开始发言：“西北自古以来是远乡的一部分，现如今它也将成为远乡革命的一部分，西北历任总督依靠自己的方法维稳西北，他们的功绩值得尊敬，但其手段造成的一系列苦果由如今的西北人民承受。但我们来了，革命阵线为西北提供的维和行动与物资运输，是远乡人民之间互帮互助、互利共赢的结果。如今西北将成为远乡革命的一员，我们需要更多愿意为西北再开发的诸位协助，我们的革命工作还没有完结，远乡的解放和人民革命运动还在向前发展，我们还要继续努力。帝国主义者和国内保皇派决不甘心于他们的失败，他们还要作最后的挣扎。在全国平定以后，他们也还会以各种方式从事破坏和捣乱，他们将每日每时企图在远乡复辟。这是必然的，毫无疑义的，我们务必不要松懈自己的警惕性。”\n\n演讲结束宴会厅内响起了雷鸣般的掌声，老将军接过麦克风说道：“主席同志说的很好，现如今西北人民可以选择自己的道路，我们是革命阵线在边境的重要屏障，我们要防范任何方向和任何时候的反革命敌人，要将解放远乡的革命斗争进行到底。”\n\n掌声再次响起，而这片贫瘠的土地上也即将迎来春雷。"
SFR.310.a:0 "人民的政府！"

SFR.311.t:0 "战争的伤痕"
SFR.311.d:0 "“刘先生，这有一封信，是寄给您的。”一位女青年敲响刘继尧的房门，将信件放在桌上，随后继续说道：“另外就是街上城里出了事情，大伙都摆不平就想着找你帮忙。”\n\n“好的李红同志，能先说说发生啥事吗？”刘继尧没急着把信打开，比起刚到这座小城时已经多了几根白发，虽说是一座小城，但事情比他想象的还要多，不过现如今他已经能熟练的完成市井事务了。\n\n“是这样的，工地那边出了事，有个工人在挖土时挖到了尸骨，”作为差不多入职的李红看着刘继尧说道：“工地老板认为太晦气了要求把尸骨丢城外去，但范老说是过去边军的尸骨，工头打了范老，于是大伙僵持在那了。”\n\n“那我得赶紧去了，是哪条街？”刘继尧将信放入抽屉，随后起身询问道。\n\n“沙劳街，离市政厅不远跑过去就行。”\n\n二人徒步几里来到了工地，这里已经被人挤满，李红瞅见一个脸熟的问道“王姨现在怎样了？”\n\n“小李你来了，范老没事，现在街坊在跟那狗老板理论呢，”被称呼为王姨的大妈看到了李红说道，但看到李红一旁的刘继尧问道：“这位是？”\n\n“是刘继尧刘先生，我跟他说了这里的事把他拉过来了。”\n\n“是刘先生啊，那次小张家要是没了您，恐怕是讨不到医药费了，”王姨得知是刘继尧后对着周围人说道：“刘先生来了，刘先生来了。”\n\n人群闻声而动，留出来一个小道供刘继尧和李红走动，刘继尧略过人群各异的目光走到现场，目光一侧穿搭奢靡、身材肥胖的秃顶男人用审视的目光看向他，秃顶男人声旁站着几名戴着安全帽的精壮男人，另一侧一边则是与自己有一面之缘的范老和一些熟悉的街坊们。\n\n那秃顶男人撇了一眼身旁精装男人，后者迈着步伐往刘继尧这走来：“你就是管事的？赶紧把这帮人轰走，我们还要赶着开工……”\n\n刘继尧对于精壮男人说的话已经听腻了，自己过去打游击的时候没少见，随后不等后者说完打断道：“我是革命阵线的特派员，我要求你的老板来跟我说话，否则下次见面就是法庭了。”\n\n那男人似乎还想说什么就被秃顶男人拉了回去，后者看向刘继尧的眼睛说道：“我们可以谈的，这位…来自革命阵线的同志。”\n\n“我们会赔偿您的损失，但对于那些尸骨我们希望看一下。”\n\n“这里请。”秃顶男人带着刘继尧和李红来到那处大坑，坑内尸骨上穿着西北边军的军装和一些弹片。\n\n“这些烈士遗骨我们会带走，事后会将其安葬在我们城市的公墓内，”刘继尧看向人群说道，随后将目光放在秃顶男人上缓缓说道：“有关工地的工作我们会提供一个条件，假如日后有发现这些尸骨或者枪支什么的交由警局，我们会提供一定奖金，但如果是参假的我们会寻求法律。有关奖金的事我们会提供给那位发现烈士尸骨的工人。”\n\n“实在是感谢您，我马上通知那位发现尸骨的工人去市政厅领取奖金，那有关此事？”秃顶男人有意无意的看了几眼人群。\n\n“接下来城市一些关键位置的建设工作可以交由您。”\n\n秃顶男人满意的离开了工地，刘继尧无奈的看向李红说道：“通知一下市政厅和警察厅的同志们吧，今晚有的我们忙了。”"
SFR.311.a:0 "要做的还有很多。"

SFR.312.t:0 "北远乡调查报告"
SFR.312.d:0 "在东巴斯蒂亚大战后，虚弱的王国政府在远乡内部的统治就已经开始摇摇欲坠。北远乡地区的彻底混乱，是在西北地区进入长期军管之后发生的。如果说郑均是一个软弱而无力的君主，那么他的儿子便是个彻头彻尾的反动暴君。后者在寒冷贫困的北方公开发起叛乱，这场父子之间的内讧重创了旧制度，但也将北方带入了独裁统治。南方陷入混乱之时，北方也陷入了同样的动荡，不满于郑义独断专行的贵族和横征暴敛的自由联军纷纷试图推翻这个王子的统治。而如今，虽然革命阵线已经统一了国家南方，但看起来远乡北部的混乱还远远说不上结束。"
SFR.312.a:0 "一定要将解放的旗帜插到北远乡！"

SFR.313.t:0 "联络自由联军"
SFR.313.d:0 "北远乡地区陷入动乱和战火之际，拿起武器反抗的不仅有不满的贵族和山林间的土匪，还有整戈待旦的革命家。当革命阵线在南方与保王党和反动分子作战时，北方的远乡自由联军也在和王室还有贵族决一死战。如今，随着远乡南方的旧势力灰飞烟灭，革命阵线得以看向国家的其他部分。这一次的意见相当一致，我们将会正式和自由联军进行接触，为他们的战斗提供一切可能的帮助，并立刻以革命盟友的身份介入北方。而在这之后，我们双方将会进行整合，继续为一个统一而一致的远乡革命而努力。"
SFR.313.a:0 "发出邀请。"

SFR.314.t:0 "来自南方的邀请？"
SFR.314.d:0 "南方一般很难传来什么令人振奋的消息，但如今，事情正在起变化。最新一批翻越边界线来到自由联军控制区的人们传来了南方已被革命阵线占领，君主制被颠覆的消息。而现在，来自这个新政权的使者已经抵达，他们愿意为自由联军提供帮助，并立刻以盟友身份加入战斗，彻底摧毁北远乡的反革命势力。而作为交换，在战事结束之后，自由联军将会逐步整合入革命政权内。\n\n这一提议已经在我们内部引起了相当规模的讨论，尽管大部分人都相信这一提议值得并且也应该立刻接受。但一些心存疑虑的人指出，一旦我们接受了革命阵线的橄榄枝，某种意义上也就失去了对未来国家与革命方向的绝对主导权。"
SFR.314.a:0 "我们并没有不接受这一邀请的理由"
SFR.314.b:0 "不幸的是，独立自主更加重要"

SFR.315.t:0 "自由联军接受了我们的要求"
SFR.315.d:0 "自由联军的信使已经越过边境线，带着好消息造访了革命阵线。看起来，我们的北方同志已经欣然接受了革命阵线的提议，从现在起，远乡南北的革命志士将会并肩作战，直至解放全远乡。"
SFR.315.a:0 "离国家和平统一又近了一步！"

SFR.316.t:0 "自由联军拒绝了我们的要求"
SFR.316.d:0 "出于对南方的不信任、意识形态冲突、未来潜在的风险等因素考量，尽管我们做出了最大的努力，自由联军仍然拒绝了我们的慷慨提议。这在阵线内部已经引起了不小的风波，许多同志感到了相当的沮丧，因为显而易见的，革命阵线是不可能因为一纸回绝而放弃自己的目标的。\n\n既然和平的手段无法奏效，那么摆在革命阵线面前的北上方式就只有一个了：战争。"
SFR.316.a:0 "我们别无他选..."

SFR.317.t:0 "故乡"
SFR.317.d:0 "清晨，集结号的余音还在军营上空回荡。广场上，即将踏上北征之路的战士们列队肃立，红旗在晨风中猎猎作响。大会的严肃氛围在政委提到北方的自由联军也会和他们并肩作战时就瞬间被打破。部队中那些来自北远乡的战士们爆发出震天的欢呼，而其他人也很快被这种欢快的情绪感染。\n\n一名满脸风霜的老兵悄悄抹了一下眼角。几年前，他因为北方的混战和家乡贵族的盘剥不得不离开家里人和乡亲们，一路乞讨南下才在这里穿上了军装。如今，南方战友的大手重重拍在他的肩上：“老哥，别哭了！等咱们北上把那帮臭鱼烂虾的反动派干掉，咱们一起去你们村把红旗竖起来！”\n\n动员大会最后变成了某种誓师大会。战士们高高举起手中的钢枪，面向北方。被迫离乡的流亡者，即将带着队伍北上解放家乡。"
SFR.317.a:0 "故乡，近在咫尺了..."

SFR.318.t:0 "故乡"
SFR.318.d:0 "革命阵线的营地内，一场事关北方战局的动员大会正准备拉开帷幕。队伍里既有在南方打惯游击的老兵，也有许多来自北方逃难而加入革命阵线，一直盼着能打回家的战士。大家眼中闪烁着兴奋的光芒，因为就在今天，北方的自由联军将给出最后的答复。\n\n然而，前方发回的急电打破了所有的期待。整个会场陷入了短暂的死寂。那些满心欢喜准备与北方同胞会师的战士们，眼中顿时布满了错愕与失望，因为这看上去表明，整个北远乡都在与他们为敌。一位年轻的士兵攥紧了拳头，指节捏得发白。旁边沉默良久的老班长拍了拍他的肩膀，声音沙哑却坚定：“没办法啦，同志，他们不认我们这群南边的同志，那就只能用枪杆子说话了。”"
SFR.318.a:0 "故乡，近在咫尺了..."

SFR.319.t:0 "联欢"
SFR.319.d:0 "随着远乡南北革命力量的初步整合，一场属于自由联军同志和南方革命军的联欢宴会在北远乡的驻地举行。\n\n那些以前在山林间闹革命的“江湖好汉”们，现在穿上了整齐的军装，和来自南方的战士们勾肩搭背，划拳拼酒。一时间，军营里喧闹非凡，到处是粗犷的笑声。\n\n宴会的氛围在深夜达到了高潮，但也差点闹出了意外——一位老营长豪饮过猛，头一歪栽进酒缸里，被好几个人七手八脚地架了回去。看着他物理意义上的满身酒气，喝得差点中风还不忘喊着“再喝”的狼狈样，众人笑得前仰后合。"
SFR.319.a:0 "下次还是少喝点。"

SFR.320.t:0 "革命的山贼？"
SFR.320.d:0 "北远乡的动荡催生了一大批占山为王的武装。他们之中，既有打家劫舍的惯匪，也有一批出身贫苦，因为不堪旧政权压迫而落草的所谓绿林好汉，这些前土匪通常来说没有什么劣迹，在当地也有一定“劫富济贫”的名声，因此，革命阵线决定对他们进行相对宽容的处理。\n\n当我们进一步调查时，发现这些人对北方的地形和民情极其熟悉。如果能将他们纳入革命队伍，对于北方的重建和当地治安的维持将起到极大的助力。\n\n然而，彻底收编这样一支成分复杂的队伍，无疑会带来纪律涣散的风险，甚至会影响到军队整体的职业素养。南方派来的政委和北方当地的工农代表在临时指挥部吵得不可开交，这个决定，必须由我们来做。"
SFR.320.a:0 "可以试试。"
SFR.320.b:0 "让他们回家就行，不能加入军队。"

SFR.321.t:0 "最后的反动派"
SFR.321.d:0 "当解放的红旗在远乡南方高高飘扬时，北方的战事依然没有完全平息。\n\n那些在郑义暴君统治下残存的贵族、地主，以及拒不投降的保王党残余势力，龟缩在北远乡最边缘的几个城镇里。他们一边雇佣亡命之徒，集结遗老遗少负隅顽抗，一边向境外势力发出求救的信号。\n\n这些人是旧制度最后的灰烬，只要他们还在，北方就一天不能安宁，甚至王国政权很可能会卷土重来，威胁革命的存续。因此，若是想要确保远乡革命，彻底清扫旧时代的残余，只有一个办法："
SFR.321.a:0 "怎么办，只有打！"

SFR.322.t:0 "为逝者复仇"
SFR.322.d:0 "在攻克北远乡最后一座保王的顽固据点后，革命军的战士们冲进了旧贵族的地牢和刑场。\n\n在那里，他们看到了昔日被残害的工农领袖和同志的骸骨。在我们审讯俘虏时，才得知了这些令人发指的罪行。那些被保王派所俘虏的革命战士、反抗者或单纯是忤逆过他们的普通民众，大都曾在这里被严刑拷打和公开折磨，并最终惨遭毒手以威慑人民。\n\n愤怒的情绪在军中蔓延。现在，命运被交到了我们的手上。是将那些旧日的刽子手押往劳动改造营，以劳动偿还血债；还是顺应人民的怒火，直接将他们送去墙根处决？"
SFR.322.a:0 "绝不留情！"
SFR.322.b:0 "送往劳动改造。"

SFR.323.t:0 "人鱼特区历史报告"
SFR.323.d:0 "随着远乡统一战争的推进，一份关于“人鱼特别行政区”的详尽历史报告被摆在了革命阵线领袖们的案头。\n\n多年前，老旧的王国政府为了换取外国势力的支持，签署了《白洋公约》，将远乡北方沿海的领土和岛屿划为了海中的人鱼族所控制的特区。在那片土地上，长臂管辖的特区政府享有不可侵犯的主权，远乡本地的工人和麟人被当做二等公民对待。无数珍贵的人鱼资源被运往海外，换来的却是特区城市大街上的外国军靴声。\n\n这份报告，每一个字都像是用远乡人民的血泪写成的。那些昔日的痛苦，必须被清算；那片被割裂的土地，必须重新完整地回到远乡的怀抱。北方的战事已经平定，南方的枪口，该对准那片屈辱之地了。"
SFR.323.a:0 "远乡的领土必须被收回！"

SFR.324.t:0 "[SFR.GetName]要求我们无条件投降！"
SFR.324.d:0 "在推翻了原本的王国政府之后，远香的新共和政权否认了《白洋公约》的有效性，以此为根据，他们要求收回整个特别行政区的主权和管理，将当地重新完全而彻底的整合入远乡，并最终解散特区政府。他们特别强调，如果特别行政区拒绝这一要求，那么新政府将会采取“其它的直接行动”解决问题，换言之，远乡的要求只有一句话：特区或战争。"
SFR.324.a:0 "我们别无选择..."
SFR.324.b:0 "滚！"

SFR.325.t:0 "人鱼同意了我们的要求！"
SFR.325.d:0 "在最后通牒发出后的第十天，人鱼特区政府以微弱多数通过了一项历史性决议：承认北方革命阵线为远乡合法政权，并完全接受革命阵线的通碟要求。\n\n决议通过的当晚，特区最大的港口就第一次升起了红旗。那些长期以来在特区里不占优势受尽压迫的工人自发涌上街头庆祝。令人惊讶的是，在这些庆祝的人群中，也能见到鱼人的身影，而他们庆祝和赞扬的既有革命阵线所带来的解放，也有特区政府的明智决定。\n\n人鱼特别行政区政府已经发表声明，他们会同时将在初步交接后就将特区武装缩减至象征性的防务部队，并为接下来接受整合和最终的解散做准备。"
SFR.325.a:0 "那很好了。"

SFR.326.t:0 "人鱼拒绝了我们的要求！"
SFR.326.d:0 "特别行政区已经完全否决了革命阵线的最后通碟，并拒绝承认革命阵线对远乡的任何主权主张。特区内的部队也已经进入动员状态，任何支持革命阵线和解散特区的民众都遭到了军警镇压，鉴于特区政府吃硬不吃软，至少目前是没有和平解决人鱼问题的希望了。"
SFR.326.a:0 "看来得来硬的了。"

SFR.327.t:0 "小小的复仇"
SFR.327.d:0 "监狱大门打开时，王武愣了一会。自革命阵线打过来以后，看守早已逃得无影无踪，几名民兵提着枪走进牢房，告诉他人鱼特区已经穷途末路，这座城市解放了，接下来去医疗站治疗一下。王武扶着墙站起来。他的一条腿仍使不上力，背上的鞭伤也没有愈合。突然，像是想起来了什么一样，他不顾民兵的阻拦和脚上的瘀伤，冲出监狱。\n\n半个小时后，就好像奇迹发生了一样，在几乎不可能的情况下，在因战争一片混乱的城市里，王武在城南的货运站找到了他。那名人鱼厂长已经换下昂贵的西装，戴着一顶不合尺寸的旧帽子，正试图混进撤离的人群。他的外貌与普通麟人几乎没有差别，只有耳侧尚未完全隐藏的鳍状组织，在紧张时轻轻颤动。\n\n“先生，借过。”厂长低着头说道。\n\n“借你妈。”\n\n第一拳打在鼻梁上。厂长向后踉跄几步，还没来得及开口，第二拳便砸在腹部。王武把他按倒在地，一拳接着一拳。老刘掉进铁水时消失的身影、工友被枪毙的消息、牢房里的冷水和刑具，一同随着拳头落下。\n\n厂长最初还在叫人，后来开始求饶，最后只剩下含糊的喘息。\n\n“工厂的事情不是我一个人决定的……”\n\n“去死吧。”\n\n王武捡起地上的扳手，落下最后一击。\n\n几名赶来的民兵紧接着扑上去，将他死死抱住。王武挣扎着还想再踢一脚，直到那名厂长被人拖到墙边，他的喘气声逐渐减弱，生命从他黯淡的瞳孔中流逝。\n\n“够了！”民兵喊道，“冷静一下，这里怎么回事！”\n\n王武喘着粗气，松开了手中的扳手，笑了。"
SFR.327.a:0 "因果报应。"

SFR.328.t:0 "归乡大会"
SFR.328.d:0 "北方的初秋，金黄的麦浪在风中起伏。在一片从当地居民那里暂时借用的空置晒谷场上，临时搭建的帐篷连成了片。\n\n这是“归乡大会”——一次专门为那些从南方根据地出发、历经数年转战、最终又回到北方的战士们举办的大会，其中有即将退役或转向文职工作的老战士，也有考虑到他们对家乡的熟悉和了解情况而派回北方的年轻人。有在烈日下扛枪行军的新兵，有在后方日夜赶制军鞋的后勤人员，有在监狱里度过无数日夜的老战士。\n\n大会没有太多的讲话。白天，大家席地而坐，吃着大锅炖菜，喝着当地酿的粗茶，交换着各自的经历。一个断了左臂的老兵和一个失去右腿的通讯员碰了碰碗，笑着说：“凑一块，咱们还能拼成一个完整的兵。”\n\n晚上，篝火点燃了。有人即兴找来了乐器演奏，更多人马上唱起了北方的民歌，渐渐地，越来越多的人加入合唱。歌声从呜咽变成洪亮，最后响彻原野。"
SFR.328.a:0 "北方的游子终于回到了故乡。"

SFR.329.t:0 "祖国新生"
SFR.329.d:0 "黎明前最黑暗的时刻，叶文石、赵永军和刘青兰三人并肩站在屋檐下。天际线露出一丝鱼肚白，晨风中还带着战场上残留的硝烟味，但更多的是泥土和麦苗的气息。\n\n“好吧，结束了。”刘青兰轻声说，她的声音有些沙哑，但眼神明亮，手里还攥着昨晚那份宣告全国解放的电报稿。\n\n叶文石没有说话，他默默看着远方，想起了出发时那个简陋的小山村，想起了牺牲的战友，想起了很多个不眠之夜。\n\n“不，”赵永军接话，他的大手按在冰冷的墙上：“还只是开始，我们把这片土地从梦里叫醒了，接下来要做的是吃饭喝水，有的是活要干。”\n\n此时，第一缕阳光跃出地平线，金色的光芒瞬间洒满大地。远处不知哪里传来公鸡的啼叫，新的一天开始了。三人默默地看着这一切，没有欢呼，就只是静静站着。\n\n在这一刻，旧王国咽下最后一口气，但新远乡还在山那头朝他们走来。"
SFR.329.a:0 "我们还有许多工作要做。"

SFR.330.t:0 "全国人口普查"
SFR.330.d:0 "一份盖着新政府大印的文件被下发到各级单位去：《关于举行首次全国居民普查的决议》。随着新政府真正站稳了脚跟，他必须开始了解自己的土地上的每一个人和每一片土地。\n\n这并不是一项浪漫的工作，反而可以说，在很多时候相当枯燥。数以万计的基层干部和知识分子被动员起来，他们不得不背着空白表格和干粮袋，有时甚至需要带着士兵走入每一个深山村落、每一个城镇。要问的从来不只是“你家几口人”，几亩地、几头牛、附近有没有认识的人都得问的出来。\n\n在西北，一个戴眼镜的干部借着油灯的光，为不识字的老人填写表格。在北方，许多一辈子可能没和文字打过交道的山民甚至需要先从和他们解释什么叫做户口和现在已经没有国王开始。\n\n数据从四面八方汇聚到首都的统计总局。一摞摞报表堆满了房间，纸笔划动的声音日夜不停，在最忙碌的时候，还会有哈欠声和某些人倒头就睡的呼噜声传来。"
SFR.330.a:0 "黑眼圈和名字都越来越多。"

SFR.331.t:0 "走马上任"
SFR.331.d:0 "赵德厚，四十岁，原本是根据地的一名村会计。在今天之前，他这大半辈子最远没出过方圆五十里。他的手打过算盘，当时整个根据地就靠他和其他几个人统计收支，但他还是握锄头或拿枪的时间多一些。\n\n这一天，他收到一份调令：任命他为新政府财政部预算司司长。同调令一起来的，还有一张前往首都的火车票。\n\n火车启动的轰鸣打断了回忆，赵德厚看着窗外飞速后退的田野，手里紧紧攥着调令。他知道，自己即将面对的账本，不再是村里的公粮和救济款，而是几个十几个省的财政收入和天晓得多少人的生计。\n\n他深吸一口气，闻着账本上的墨水和烟草味让他稍微安心了一些。\n\n“这就是走马上任啊……”他喃喃自语：“这把老算盘，可要拨得更响亮了。”"
SFR.331.a:0 "没了熟悉的乡民和声音，那晚是他第一次失眠。"

SFR.332.t:0 "新瓶旧酒"
SFR.332.d:0 "县政府办公室里，新上任的县长正在召开第一次全体会议。与会的干部中，有几位穿着洗得发白的长衫，虽然神情拘谨，但眼神里透着一股精明。\n\n他们在王国时期曾是地方官员，有的是一开始没有血债态度积极的商人，有的是地方上德高望重的老人。新政权的干部找到他们时，他们大多犹豫过——毕竟“改朝换代”意味着风险。但当一些人动摇后，争取到其中的大部分就变得更加简单。\n\n“旧酒装在新瓶里。”这是赵永军在干部培训会上强调的（尽管有不少人私下会调侃“喝起来不还是一个味”）：“这些人熟悉地方水利、赋税折算、民情风俗。不能因为他们穿过旧官服就一概排斥。只要他们过去没有反对过革命，现在愿意为人民办事，就可以争取他们。”\n\n会议开始后，一位留着小胡子的老文人——现在是县教育科的副科长，站起来汇报地方情况，条理清晰，并且惊人地没有不停引经据典，让年轻的新干部们面面相觑。县长笑着点头：“好，先生果然是地方通。接下来，老学校的清理和重建就拜托你了。”\n\n那位老文人愣了一下，随即深深作了一揖：“敢不尽力。”"
SFR.332.a:0 "过去的遗产证越来越多的为新时代服务。"

SFR.333.t:0 "平京一日"
SFR.333.d:0 "清晨，天刚蒙蒙亮，平京的街道在鸽哨声中醒来。开早点铺子的老陈和面、剁馅、生火，雾汽从笼屉缝隙里喷涌出来。\n\n街上的变化老陈看在眼里：以前盘踞在路口收“保护费”的地痞不见了，换成了穿军装的军人在巡逻，态度和蔼，还会帮推车的老汉搭把手。老张街角那个他抱怨不知道多少次下雨执勤不防水的破警亭被拆了换了个新的，老张——现在该正式点叫他警察同志——还帮忙在边上种了一排小树。\n\n上午，老陈的儿子放学回来，书包里装着一本崭新的课本，封面上印着革命阵线的标志。孩子兴奋地说：“爸，老师说，下个月学校要开运动会，每个班都要练队形！”\n\n午后，阳光正好。老陈看到几个穿干部服的人走过，他们边走边看一张地图，指指点点，似乎在规划新的“公叫线路”。以前从没听说这是个什么，但他相信肯定会是另一件好事。"
SFR.333.a:0 "革命将用生活中的每一个变化证明自己的合法性"

SFR.334.t:0 "老伙计"
SFR.334.d:0 "那个人的墓地后来做了简单的修整。倒下的石碑被重新立起，荒草清掉大半，通往山下的小路也铺上了石子。虽然未来大概要搬迁到别处的博物馆，或者干脆在这里修个纪念堂什么的。叶文石拄着拐杖，在那座熟悉的墓碑前站了很久。墓碑上刻着一个名字，他再熟悉不过的名字，没有照片，只有一行极简的生平。\n\n他没有带警卫，只带来一瓶酒和一包烟。\n\n火柴划响的一瞬间，叶文石短暂的沉入了回忆的浪潮。\n\n江洲港口的汽笛，发小笑着说他有了领导模样；平京燃烧的街道，两个人趴在昏暗的地下室里研究地图；上饶的暴雨，手榴弹滚到身旁，那声警告刚刚响起，便被爆炸彻底吞没。叶文石记得自己在废墟中反复呼喊，直到政委把他拖出火海。\n\n回忆来得猛烈，退去得也快。\n\n叶文石把点燃的香烟放在碑前，又给自己点了一支。烟雾被山风吹散，他抬手擦了擦眼角。山下的道路上，不时有满载物资的卡车经过。更远的地方，村庄升起炊烟，新修的学校传来孩童的读书声，希望似乎已经重归远乡这个饱受磨难的国家。\n\n他在这里站了很久。风掠过树梢，发出沙沙的声响。\n\n“老伙计，平京、全远乡都解放了，当初在黑灯瞎火下吹过的那些牛，算是实现了一大半了……你还记得吗？”\n\n叶文石把酒拿出，拧开盖子，缓缓地倒了一半在墓碑前的泥土里，声音有些发哑。\n\n“你当年还问我，回来以后想做什么。”\n\n他停了一会儿，低头笑了笑，些许哽咽，泪水从他脸颊划过。\n\n“我们找到答案了，我们打赢了，我们——”"
SFR.334.a:0 "我们为你报仇了。"

SFR.335.t:0 "红旗高悬"
SFR.335.d:0 "收音机又坏了，这垃圾玩意，真该找机会扔了。\n\n男人拧了几次旋钮，机器里只传出断断续续的杂音，像是有人隔着一锅开水发表演说。他拍了拍外壳，没有效果；又拔掉电线重新插上，收音机干脆彻底安静了。\n\n“我操你——”\n\n他抡起手掌，对准侧面重重一拍。\n\n机器咳嗽两声，忽然传出清晰的人声。\n\n“……平京人民广播电台。远乡人民民主共和国中央人民政府成立典礼即将开始。”\n\n男人愣了一下，连忙把音量调大。他走到窗前，推开窗户。远处的街道上，有人正举着小旗朝广场方向奔去。\n\n“自最初的战斗以来，我们经历了许多。”\n\n主席台一侧，一名老兵靠着栏杆，望向广场上密集的人潮。他的军装洗得发白，胸前只别着一枚旧勋章。身旁有人鼓掌时碰到了他的肩膀，他没有回头，只是擦了擦眼睛。\n\n“我们的祖国曾经遭受战争、分裂与饥饿。王室、贵族和寡头将国家视作私产，外国势力践踏我们的土地，无数远乡人民被迫在苦难中生活。”\n\n南方的乡村里，一位农妇停下手中的活，站在合作社门口听着广播。她的孩子骑在父亲肩上，手里挥着一面折得皱巴巴的红旗。\n\n“许多人没有等到今天。”\n\n正泸山后的墓地里，新换的花束在风中轻轻晃动。守墓人摘下帽子，广播声从他身后的木屋里传来。\n\n“但他们留下的事业，已经交到了我们手中。从现在起，远乡不再是少数人的远乡。人民将管理自己的国家，保护自己的土地，决定自己的未来。任何企图重新奴役我们、分裂我们祖国的势力，都将遭到全体人民的抵抗！”\n\n工厂的汽笛响起。工人们从车间里走出来，有人还戴着沾满油污的手套。学校的窗户被推开，学生挤在窗边。医院门口，护士扶着伤员走到阳光下。列车停靠平京，刚刚归乡的士兵把行李丢给同伴，自己先跳下车，朝着广场跑去。\n\n“远乡人民已经结束了任人摆布的时代。我们的祖国，将以独立、统一的新面貌，屹立在世界之上！”\n\n广场上响起欢呼。\n\n最初只是靠近主席台的人举起旗帜，随后是看台、街口、屋顶与远处不断涌来的人群。卖早点的摊主放下炉钩，抱着孩子的母亲走出门去，老人拄着拐杖跟在人群后面。那个修好收音机的男人迟疑片刻，也从抽屉里翻出一面旧红旗，锁门下楼。\n\n“同胞们，远乡人民民主共和国，中央人民政府，今天——”\n\n越来越多的普通人从平京的街巷汇入广场。人群向前涌动，千万面小红旗在风中连成一片，最终将每一个身影都融入高悬的红色浪潮之中。"
SFR.335.a:0 "...成立了！"

SFR.336.t:0 "复苏的土地"
SFR.336.d:0 "王涵挥起铁锤把道钉透过铁轨的孔洞敲入铁路的枕木中，道钉插入其中使铁轨与枕木相契合，黄昏的霞光照映着汗珠，用脖间的毛巾擦了擦汗，四周的同伴完成了工作已经往营帐赶了，王涵由于要检查铁路完成情况，于是往铁路远处走，边走边拿标尺检查。\n\n他将目光向远处眺望，东巴大战后残留的村庄废墟近在眼前，四周早已被草木覆盖，鲜少的花朵点缀着蹊径，但有本职工作在于是便继续走着，不过这时远处传来呼喊声便回了头。\n\n“嘿！红军同志，”一个年轻姑娘推着斗车来到他旁边，将一个窝窝头递给了他说道：“总算找到你了，这是填肚子的，等工作完了去营帐那边有热乎的糊糊。”\n\n“谢谢你同志，话说这个村子你知道有什么来头吗？”王涵接过后咬了几口，指着远处的村子废墟询问着。\n\n“那啊，好像是俺爹娘过去的村子。”小姑娘玩弄自己的辫子回答道。\n\n王涵挠了挠头反问道：“过去？你怎么看出来的？”\n\n“俺娘说从家沿着旧的轣辘路走到新的轣辘路后经过几个电线木头就是了，当时俺爹拉着俺娘顺着轣辘路找到了一处村子安顿下来，”小姑娘回答着王涵的问题，随后催促道：“天快黑了，俺去找前面的同志，你早点回营地去，小心会遭了马匪。”\n\n王涵则缓缓说道：“我没见到人了，同志们已经回去了，就我在这检查了。”\n\n小姑娘一时间脸颊一红，随后结巴地说道：“那…那什么咱们早点回去吧…”\n\n“我叫王涵，同志你叫什么？”二人肩并肩顺着铁道往车站走去，王涵突然询问道。\n\n“俺叫童彤彤，刚出生的时候全身红彤彤就叫了，”童彤彤回复王涵的问题，似乎想到什么继续道：“听俺娘说这里过去全是炮弹坑，不过现在都是花花绿绿的，未来肯定能种地了。”\n\n王涵听着童彤彤的愿景哑然失笑。\n\n“你…你笑什么，难道田多点不好吗？，这样来年也能吃饱了。”\n\n“是啊，吃饱好啊。”"
SFR.336.a:0 "被炮弹砸出的弹坑已经被时间抚平，土地的愿景也在未来会实现。"

SFR.350.t:0 "理想实现，但是..."
SFR.350.d:0 "傍晚时分，书记员夹着一沓会议记录走出政府大楼。平京的街灯正一盏盏亮起，电车铃声穿过新修的道路，街边小贩把蒸笼掀开，热气和笑声一同漫到人群里。若在几年前，有人说这座城会有如今模样，多半会被当成疯子，或是写宣传稿写昏了头。\n\n他在路口停了停，望着远处还未完工的工厂烟囱与新铺的红砖街道，忽然有些庆幸。祖国重归一统，不再是世界角落的某个是非之地；要靠配给才能获得的物资少了，巡逻队也不再三步一岗，连卖报的喊新闻时都比从前有底气些。更难得的是，他这样一个小小书记员，竟也能坐在会议室角落，把这些变化记进纸上。就好像他也成为了史书的一部分一样。\n\n只是今日的会议并不叫人安心。\n\n革命阵线的老领导们本该到场，可名单点过去，空出来的椅子比往日多了不少。几人病了，有的甚至咳得下不了床；还有人据说昨夜才从医院出来，医生不许吹风，结果老人硬要派秘书送来请假书。至于那位革命党老前辈，会议开到一半便在椅子上睡着了，呼吸声安稳得像在向全场证明：漫长的会议比郑钧的军队要强力得多。\n\n散会时，书记员扶着老人走下台阶。老人醒后还嘟囔着说自己刚才只是闭目思考，可若不是旁人眼疾手快，他大概会把这一思考延续到地砖上。\n\n书记员有些笑不出来。"
SFR.350.a:0 "...阵线将何去何从？"

SFR.351.t:0 "远乡革命党的未来？"
SFR.351.d:0 "茶盏里的热气慢慢升起，带着一点清甜的果香。刘青兰捧起杯子，望着桌上那碟颜色古怪的点心，笑着问这是从哪里弄来的新鲜东西。\n\n“北边来的特产。”一位老同志笑着说道，“听说是解放后才恢复生产的，过去那地方到处都在打仗，哪里还顾得上做这些。”\n\n众人尝了几口，味道不算惊艳，却也谈不上难吃。有说太甜的，有说皮有些硬的，还有人认真研究了半天，最后得出结论：若是再配些咸茶，或许更好。屋内于是笑了起来，笑声不大，但众人都感觉已经很久没有这样轻松过了。\n\n“国家总算是往好处走了。”一位革命党元老摸着胡须说道，“能在这个年纪吃上北方新做的点心，算是了却一份心愿了。”\n\n这句话说完，屋里又静了片刻。随后，那位元老有些不好意思地清了清嗓子。\n\n“我近来身体不济，准备把党内职务辞了，免得天天被医生叨叨。说是退休，其实也就是回乡下种花养鸟。若是还有人肯听，我便给学生们讲讲旧事，免得小孩子把前辈的牺牲都忘掉了。”\n\n旁边几人也陆续开口。有的说自己早已只是挂名，准备加入地方党派帮忙，帮着做些市政与教育上的事；有人说老家刚刚重建，那里比平京更需要熟面孔；有的说年轻人都去了共产党，那里有机关、有干部学校、有前途，自己留下也不过是在名册上占个位置；还有人笑称，革命党如今最大的贡献，恐怕是证明一个时代的落幕。\n\n这笑话没能重新活跃气氛。\n\n来客们面面相觑，最后还是有人硬着头皮说，他们今日登门，本来就是想谈这件事。近几个月，革命党退党的人越来越多。年轻干部觉得共产党更有生气，基层党员觉得地方涌现的新的政党更能实现理想，老同志则多半疲惫不堪，身体和精神状况都不允许他们继续“干革命”了。\n\n送走几位老友后，刘青兰站在门口许久。街上传来电车声，远处有人叫卖新鲜果子，这个国家正处在欣欣向荣的发展期，仿佛所有人都不会被落下。"
SFR.351.a:0 "可革命党呢？"
SFR.351.a.tt:0 "§R随着老一辈的大规模退休，缺乏新鲜血液和凝聚力的远乡革命党正在解体...§!"

SFR.352.t:0 "又一次会议"
SFR.352.d:0 "赵永军走进阵线议会大厅时，第一眼看见的不是人，而是空椅子。\n\n这些椅子可能比赵永军本人还要年长，木背上有划痕，也有烟头烫出的黑点。过去它们曾挤满各地代表，吵起来时能把屋顶掀开半截，有人拍桌，有人跺脚，还有人会因为一项物资调拨方案争到脸红脖子粗。赵永军苦笑一声，也不知是怀念往昔，还是感叹物是人非，亦或者都是。\n\n如今，台下稀稀落落坐着十几位老人。\n\n有几位裹着厚外套，明明天气不冷，却仍像刚顶着暴风雪赶来；有人一边听秘书宣读议程，一边费力地咳嗽，咳完还要摆手，示意自己无碍。至于坐在左侧第三排的老同志，赵永军记得他几年前曾在会议上把一名军代表骂得差点拔枪，现在却低着头，似睡非睡，手里的文件拿反了也没人提醒。\n\n秘书小声报了缺席名单。某某病休，某某入院，某某昨夜发高烧，某某已经不适合长途出行，还在外地。还有两个名字再也不会被点到了，他们在全国解放后的第一个冬天里相继病逝，赵永军还记得追悼会上几个老同志哭的稀里哗啦的。\n\n赵永军坐在主席位上，忽然觉得荒唐，又觉得悲凉。\n\n全国已经解放，新的政府机关正在运转，政治局，军委、地方委员会、各部办都在承担真正的政务。阵线议会曾经是维系团结的关键机构，在最危难的时刻保卫了革命的火种，如今却成为了一个无用的花瓶，甚至可以说是新国家的累赘。\n\n会议照常开始。有人念文件，有人点头，有人没听清又问了一遍。半个小时过去，议程只推进了两项。赵永军望着台下，深深叹了一口气。\n\n远乡革命阵线已经完成了它的使命。\n\n他合上文件，转头对秘书低声说道：\n\n“去请刘青兰同志过来。就说，我有要紧事同她商量。”"
SFR.352.a:0 "是时候大换血了。"

SFR.353.t:0 "权力的诱惑"
SFR.353.d:0 "主席亲启：\n\n关于阵线议会改组及解散事宜，近期已在部分老代表与原阵线系统干部中引发不安。多数人并非明确反对中央决议，而是担心此举将被用于重新划分政治忠诚，乃至成为清算老一辈干部的开端。\n\n据各处汇报，有人私下称“今日撤议会，明日便撤人”，亦有人将此事同退休、并党、地方支部调整等问题相联系，认为中央意在借制度整理之名，清除不再合时宜者。\n\n目前已有迹象表明，少数代表开始频繁联络旧部与地方机关，试图在正式决议前保住自身位置，或推动形成反对意见。其规模尚小，言辞温和，暂不宜夸大处理。\n\n但若不尽快应对，此事恐将影响后续政治改革。"
SFR.353.a:0 "是时候拉清单了。"
SFR.353.b:0 "我们或许能挽回他们的想法..."

SFR.354.t:0 "拉清单"
SFR.354.d:0 "主席亲启：\n\n根据主席指示，中央秘书处会同组织部门，对近期围绕阵线议会解散一事的异常联络、会议记录与地方来往电文进行了初步核查。\n\n目前确认，确有一批人员在决议公布前后进行非正常串联。其中部分人已拟定共同发言稿，计划在下一次扩大会议上集中发难，阻滞议程推进。另有证据显示，少数人员曾尝试接触首都驻军内的旧识，并向个别地方机关传递模糊指令，要求其在必要时“保持立场一致”。相关行动尚未形成公开组织，但已具备进一步扩大的条件。\n\n另有一批人员仅停留在私下议论与初步谋划阶段，尚未采取实际行动。其态度多为观望，主要担心自身职务、政治待遇及历史评价受到影响。\n\n以上人员名单、联络记录及证据摘录已另附呈送。"
SFR.354.a:0 "是时候出重拳了。"
SFR.354.b:0 "要不要安排一些事情把他们调走？"

SFR.355.t:0 "杀鸡儆猴"
SFR.355.d:0 "“我为革命立过功！你们不能这样对我！”\n\n老人站在会议厅外的走廊里，声音尖得有些发颤。他的手杖重重敲在地砖上，敲一下便骂一句，骂中央忘本，骂年轻干部不懂规矩，骂赵永军过河拆桥。几个路过的书记员低着头快步走开，不知道是在担忧还是在嘲笑。\n\n负责执行命令的警察没有同他争辩，只是展开文件，照着上面的字念道：“经查，您涉嫌参与非组织串联，拟于扩大会议期间扰乱议程，并曾试图联络首都驻军及地方机关，阻碍中央关于阵线议会改组之决议。现依法对您采取拘押审查。”\n\n“胡说！”老人涨红了脸，“我只是找几个老同志喝茶！喝茶也有罪吗？你们这些娃娃懂什么？当年在山里，我——”\n\n话没说完，两名警察已经上前，一左一右扶住他的胳膊。老人试图甩开他们，手杖落在地上，滚了两圈，停在墙角。\n\n“我为革命流过血！”老人被带向楼梯时仍在大喊，“没有我们，你们哪来的今天？赵主席呢？让他来见我！让他亲口说！”\n\n没人理他。\n\n他的声音顺着楼道一路往下，越来越远。"
SFR.355.a:0 "“我为革命立过功！你们不能抓我！”"

SFR.356.t:0 "下地干活"
SFR.356.d:0 "太阳刚爬上山头，田埂边便多了一个满脸不情愿的中年男人。\n他卷着裤腿，握着锄头，动作慢得令人发指。\n\n“我堂堂阵线老干部，居然被派来修水渠……荒唐，实在荒唐。想当年我也是坐会议前几排的人，如今倒好，跟泥巴称兄道弟。”\n旁边的壮汉默默挥锄，额角跳了跳。\n\n上午，男人一边刨土一边念：“这哪里是劳动，这是政治迫害。说什么支援地方建设，分明是怕我说话。”\n壮汉喝了口水，把水壶捏得咯吱响。\n\n中午，男人端着饭碗继续：“这饭也太素了。过去开会还有点心呢。唉，人心不古，世风日下。”\n壮汉扒饭的速度明显快了些。\n\n下午，男人坐在石头上揉腰：“我看啊，这渠修不修都一样，水自己会流，何必劳烦我这等人才？”\n壮汉终于停下了。\n\n晚上吃饭时，男人刚张嘴：“其实我白天想了想——”\n\n壮汉啪地把碗放下：“你想个屁！叽叽歪歪叽叽歪歪的吵死了！一天到晚嫌冤，怎么滴的老天爷抢你老婆了？锄头没挥几下，嘴倒是比播音站还勤！老子吃饭你都不安静！你要真有本事，就把这半亩地用嘴犁完，明天大家都歇着听你耕田！”\n\n饭棚里一片寂静。\n\n中年男人缩了缩脖子。"
SFR.356.a:0 "“抱，抱歉。”"

SFR.357.t:0 "新时代的开始"
SFR.357.d:0 "“主席，您找我？”\n\n刘青兰推门进来时，赵永军立刻从办公桌后站起身。他本想说些客套话，可话到嘴边又觉得多余，只好伸手请她坐下。两人隔着茶几相对而坐，沉默了好一会儿，不知道的可能还以为这是对尴尬的新婚夫妻。\n\n最后，他们竟同时笑了出来。\n\n这一笑倒把僵局冲散了些。刘青兰端起茶杯，叹道：“近来我这里可热闹得很。今天这个说年纪大了，要退党回乡；明天那个说和地方党派更合得来，想去搞市政建设。还有人更直接，说共产党如今人多、事多、机会也多，换个地方更有前途。”\n\n她顿了顿，苦笑道：“话是这么说，可也不能说他们错。革命党和共产党，现在看来，其实也没那么大区别，都是为了理想而战的同志，不是吗？或许，党派也有寿终正寝的一天。”\n\n赵永军没有立刻回答。他望着桌上的文件，手指在封面上轻轻敲了两下。\n\n“阵线议会也是一样。”他说，“过去它帮助我们调和不同派系的矛盾，是不可或缺的机构。可全国解放以后，政府机关已经接过了实际事务。阵线议会反倒成了尴尬的东西，留着不管事，动它又怕伤了老同志的心。”\n\n刘青兰抬头看向他。\n\n“所以，您想让我先点头？”\n\n“哈哈，怎么会呢？我又不是叶主席。”赵永军摇了摇头，脸上露出一丝不容易的笑容，“是一起承担。若由您代表革命党推动合作，阵线议会的解散便不再像是一方吞并另一方。既然大势所趋，我们可以推动革命党党员加入共产党，愿意继续独立活动的地方支部，也可保留革命党的名号，参与地方建设。这样，革命阵线能体面落幕，新国家也不必受制于党派斗争。”\n\n屋里又安静下来。\n\n刘青兰望向窗外。平京的街道上人声渐起，千百万人正沿着新的日子向前走，而他们此刻谈论的，正是这些人未来将由怎样的国家来承载。\n\n“那就办吧。”她轻声说道。"
SFR.357.a:0 "千百万人的命运，就此敲定。"
SFR.357.a.tt:0 "后续国策将开启一系列事件链，并最终导致§R反右运动§!，§O左右不满§!或是§1反攻倒算§!的发生。如何应对将影响我们§C权力机关改革§!的§R选择§!。\n§g如果您希望走对应路线，切记不要让另外一方的怒火过高。§!"

SFR.358.t:0 "苦口婆心"
SFR.358.d:0 "主席亲启：\n\n根据主席关于缓和阵线议会改组争议的指示，中央秘书处已同部分持保留意见的老代表及原阵线系统干部进行接触。谈话内容主要集中于职务安排、历史评价、政治待遇及地方工作衔接等问题。\n\n目前，相关工作取得一定成效。部分人员已表示不再公开反对阵线议会解散，也愿意在正式会议上维持沉默，或以较温和方式提出意见。另有数人接受了地方顾问、荣誉职务或党史整理工作的初步安排。\n\n但根据新近汇总的谈话记录和地方汇报，上述人员中仍有相当一部分并未改变原有立场。他们普遍认为阵线议会不应过快退出政治舞台，并对后续并党、改组及地方支部调整保持抵触。其当前态度主要表现为降低公开对抗，避免被列为重点对象，而非实际配合中央方案。\n\n秘书处将继续跟进相关人员动向，并整理可用于进一步安置、调任或政治协调的名单。"
SFR.358.a:0 "我们或许可以尝试边缘化他们？"
SFR.358.b:0 "准备一些用于安抚的政策会是好主意。"

SFR.359.t:0 "闲的可以"
SFR.359.d:0 "调令下来的第三天，冯同志发现自己仍在平京。\n\n这让他稍微安心了一些。至少不是去北方修路，也不是去乡下统计有几头猪，毕竟他去趟阵线议会就可以统计了。然而，当他按照新地址走进“革命阵线中央资料临时协调办公室”时，这份安心转瞬即逝。\n\n办公室在一栋老楼最里侧。门牌是新的，桌椅是旧的，窗台上积灰厚得能种菜。房间里一共三张桌子，两把椅子，一个坏了半边的柜子，以及一盆显然已经去世多日、但无人敢开死亡证明的绿植。\n\n他等了一上午，没有人来。\n\n中午，他吃完饭回来，依然没有人来。\n\n下午三点，终于有人敲门。冯同志精神一振，端正坐姿，准备迎接久违的工作。结果进来的是楼下勤杂员，问他这屋是不是没人用，能不能借把扫帚。\n\n到了第五天，他终于确认，这个办公室平日里进进出出的，基本只有他自己。偶尔会有一份文件送来，内容大抵是要求他“妥善保管历史材料”，可所谓材料只是一捆没人看得懂编号的旧会议记录，他除了“这他妈写的啥”以外也没有别的反应了。\n\n四周安静得像墓地，连老鼠都嫌这里没有前途。\n\n冯同志坐在桌前，望着窗外热闹的平京，长长叹了口气。他打开抽屉，取出一包新茶，认真研究起水温与投茶量。\n\n既然仕途暂缓，茶道或许尚有可为。"
SFR.359.a:0 "至少可以花点时间研究下怎么喝茶了。"

SFR.360.t:0 "照顾后事"
SFR.360.d:0 "命令下来的时候，老张正准备去参加一场“十分重要”的座谈会。\n\n所谓十分重要，是他自己说的。组织部的年轻干部则很客气地告诉他：座谈会可以不去了，疗养院那边已经安排好了房间，车也在楼下等着。\n\n“强制退休？”老张瞪大眼睛，“我这把老骨头还没散架呢！”\n\n没人接话。于是他只能抱着一箱文件、两件外套和半罐茶叶，上了车。\n\n一路上，他对司机念叨个不停。什么“现在的年轻人不懂尊重历史”，什么“我当年在山里开会的时候，他们还不知道在哪儿玩泥巴”，又说疗养院听着好听，其实就是把人往山沟里一丢，等死了就好了，可以烧了。司机起初还应两声，后来只剩下“嗯”“是”“您说得对”，部门已经提前为他们做过相关的训练了。\n\n然而，到了地方后，老张沉默了。\n\n疗养院靠着湖，院里种着花，房间朝阳，床铺软得不像话。晚饭有鱼，有汤，还有一小碟他多年没吃过的甜瓜。护士态度很好，老张一开始还担心自己要挨打，结果给他东西全收拾好了，都不用自己动。\n\n第二天中午，伙食更好。\n\n到了晚上，老张躺在床上，听着窗外虫鸣，忽然觉得这地方也没那么像流放。没有会议，没有文件，没有一群人争着抢着让他表态。过两天若有空，还能叫小孙子来看看湖。\n\n他翻了个身，小声嘀咕："
SFR.360.a:0 "好像也还不错。"

SFR.362.t:0 "代表大会的未来"
SFR.362.d:0 "主席亲启：\n\n关于工农代表大会筹备事宜，近期已有部分干部提出保留意见。其主要担忧集中于大会成立后，党在国家政治生活中的直接影响力可能被分散。\n\n根据汇总材料，相关人员认为，现阶段国家统一不久，地方情况复杂，工人、农民、基层机关及各行业代表进入大会后，议题来源将明显增加，政策讨论时间可能延长。部分地方代表亦可能借大会渠道提出超出中央既定规划的诉求，包括土地、工厂管理、地方自治、福利分配及干部监督等问题。\n\n另有意见指出，当前党仍可通过中央机关较稳定地把握国家方向；若代表大会权能过大，后续政策将更依赖公开辩论、代表表决与地方反馈，执行链条可能出现新的不确定性。"
SFR.362.a:0 "人民自会发声！"
SFR.362.b:0 "我们完全可以加强控制。"

SFR.363.t:0 "人民之声"
SFR.363.d:0 "主席亲启：\n\n关于工农代表大会后续宣传与制度安排，秘书处已汇总部分干部意见。现阶段，各地普遍支持扩大群众参与渠道，尤其是在土地改革、工厂管理、地方建设及干部监督等问题上，基层代表表达意愿较强。\n\n同时，部分人员提出，代表大会若完全以公开发声为主，可能使议题范围迅速扩大，形成对中央政策节奏的压力。相关意见认为，群众监督有助于发现地方机关问题，也能提高政府威信；但若缺少必要组织引导，个别地方矛盾、派系诉求或个人情绪可能被带入大会，影响国家整体改革进程。\n\n目前争议集中于两点：其一，是否应明确保障代表对政府机关、地方干部及政策执行的监督权；其二，是否需要在代表资格、议题提交、发言程序及表决范围上设置更严格的指导机制。"
SFR.363.a:0 "百姓有权对政府监督..."
SFR.363.b:0 "...但发声也是有所前提的。"

SFR.364.t:0 "选择性监督"
SFR.364.d:0 "自从听说代表大会要扩大群众监督，田建业便觉得自己的机会来了。\n\n作为县里基层干部，他这些年见过的问题可不少：仓库账目对不上，合作社主任爱盖章不爱办事，隔壁村修桥修了三年还在做技术验证。于是他连夜写了十七页意见书，标题起得十分庄重，叫《论基层治理若干问题及其紧急性》。\n\n第一次递上去，门卫说负责同志开会。\n\n第二次递上去，秘书说材料会转交。\n\n第三次，他坐在走廊等到天黑，只等来一杯凉茶和一句“同志辛苦”。\n\n第四次再去时，他刚掏出文件夹，就被工作人员客客气气拦住了。\n\n“田同志，中央当然鼓励监督，您的积极性也值得肯定。”对方笑得很稳，“不过改革刚开始，程序还在完善，材料也需要分批处理。”\n\n“可我这问题很急啊！” 田建业抱着十七页纸站在门口，无助的像条落水狗。\n\n工作人员把文件夹轻轻推回去。"
SFR.364.a:0 "我知道你很急，但是你先别急。"

SFR.365.t:0 "选择性发声"
SFR.365.d:0 "世上总有几个愣头青，觉得“鼓励发声”四个字既然写在文件里，那便应当真的拿来用。\n\n于是，几篇文章出现在地方小报和工厂墙报上。标题一个比一个正经，内容一个比一个大胆：有人质疑代表资格为何要层层审批，有人建议公开地方干部财产，还有人不知天高地厚地写道，若群众只能说被允许说的话，那监督恐怕也是逢场作戏云云。\n\n第二天清晨，几名工作人员便到了印刷室。\n\n“几位同志，请跟我们走一趟。”\n\n为首的年轻人还抱着油墨未干的稿纸，满脸困惑：“不是说可以想说什么说什么吗？”\n\n工作人员叹了口气，像是早就料到会有人问这句。\n\n“可以说。”他说，“但不能破坏团结。”\n\n“那什么叫破坏团结？”\n\n“你这句话就有一点。”\n\n屋里沉默下来。片刻后，几个愣头青被带走。\n\n路过的人看了一眼，很快低头走开。"
SFR.365.a:0 "这样的事情屡见不鲜。"

SFR.367.t:0 "加强控制"
SFR.367.d:0 "主席亲启：\n\n关于工农代表大会筹备期间党内工作安排，秘书处已汇总相关意见。部分干部认为，代表大会成立后，国家政治运行方式将出现变化，议题来源、代表构成及政策讨论程序均会扩大。若党内在此阶段缺乏统一立场，后续改革可能受大会动向影响，出现随波逐流、临时调整或执行口径不一等情况。\n\n相关意见建议，在代表大会正式运行前，优先稳定党内组织秩序，明确中央对大会筹备、议题设置、代表工作及政策方向的指导权，减少基层机关和各派系在公开场合自行解释中央路线的情况。\n\n另有意见认为，党内适度辩论仍有必要。大会制度涉及国家长期政治结构，若过早压缩讨论范围，可能导致部分问题在制度落地后集中暴露。允许更多党内干部提出意见，有助于完善代表名额分配、监督程序及地方反馈机制。"
SFR.367.a:0 "党内稳定是第一要务"
SFR.367.b:0 "或许可以允许更多党内辩论？"

SFR.368.t:0 "收紧栓绳"
SFR.368.d:0 "会议室里，李同志坐在第三排，手里的笔已经转了半个钟头。\n\n台上的文件很好理解：接下来无论是代表大会筹备，还是公开表决，党内干部都要团结一致，统一口径。对中央命令不得自行发挥，不得随意解释，非必要情况下，不得在其它场所随意发表“个人理解”。尤其是澡堂，文件特意念了两遍。\n\n“澡堂怎么了？”\n\n“你这就是额外解读。”\n\n台上干部继续说道，面对群众或外部代表提出的模糊问题，应以正式文件为准；若文件尚未说明，则回答“正在研究”；若对方继续追问，则回答“请等待进一步通知”；若仍不依不饶，则记录姓名，交由有关部门“协助沟通”。\n\n李同志认真记下，心想这套办法倒是好用，现在找茬的可真不少。\n\n散会时，众人鱼贯而出。有人想讨论两句，又忽然想起刚才的要求，只能尴尬的互相笑笑。走廊里一时安静得很。\n\n李同志望着手里的会议纪要，长叹一声。"
SFR.368.a:0 "在特殊时刻，我们确实需要特殊举措。"

SFR.369.t:0 "互相报告"
SFR.369.d:0 "党内辩论放开后，会议室终于热闹了起来。\n\n热闹到书记官小周第一天就写断了支笔。\n\n起初，会议议题还算正常：代表大会名额分配、地方监督程序、工厂代表如何产生之类的。可没过多久，刘同志便站起来，指着王同志说他“长期以来对基层意见缺乏应有尊重”。王同志当即拍桌，反问刘同志去年在县委会议上连群众来信都没拆，有什么资格谈基层。\n\n“你这是污蔑！”\n\n“我有记录！”\n\n“你的记录是谁给你的？”\n\n“当然是关心党的同志！”\n\n“那就是私下串联！”\n\n两人越吵越快，从政策路线吵到办公室文具，从干部作风吵到谁在食堂多拿过半块红烧肉。旁边几位同志本来还想劝，听见红烧肉后也纷纷加入，表示红烧肉的部分详细讲讲，也不知道是来捣乱的还是真的饿了。\n\n小周坐在角落奋笔疾书，写到一半终于抬起头，满脸绝望。\n\n“二位同志，能不能一个一个来？我刚记到红烧肉，前面那个‘缺乏尊重’是谁和谁来着？”\n\n没人理他。\n\n刘同志已经开始要求组织调查王同志“破坏辩论气氛”，王同志则要求反向调查刘同志“滥用辩论机会攻击同志”。\n\n小周看着纸上乱成一团的记录，长叹一声。"
SFR.369.a:0 "这事儿闹个没完..."

SFR.371.t:0 "潜在的危机"
SFR.371.d:0 "主席亲启：\n\n根据中央秘书处、组织部门及首都警备系统近期汇总材料，部分干部对代表大会筹备、阵线议会解散及党内组织调整表现出明显抵触。相关人员多曾在根据地时期担任要职，目前虽已不直接掌握主要机关，但仍同部分地方干部、军官及原阵线系统人员保持联系。\n\n现已发现，少数人员不再局限于会议反对或私下议论，而是开始讨论以更直接方式阻止改革推进。相关谈话中多次出现“临时委员会”“纠正路线”“保卫革命传统”等表述。另有情报显示，个别人员尝试接触首都驻军旧部，打探警备调动情况，并向部分地方机关暗示需在特殊情况下“听从老同志安排”。\n\n目前尚未发现完整行动计划，亦未确认统一指挥核心。但其联络范围已超出一般意见交换，具备进一步组织化的风险。若改革进入正式表决阶段，相关人员可能采取公开抵制、占用机关、煽动部分武装力量观望或配合等行动。\n\n详细名单及证据摘录已另附呈送。"
SFR.371.a:0 "是时候出重拳了。"
SFR.371.b:0 "看来他们需要一些更强有力的“说服”。"

SFR.372.t:0 "重拳出击"
SFR.372.d:0 "主席亲启：\n\n根据前期调查结果，中央秘书处、组织部门及首都警备系统已拟定针对秘密反对改革集团的处置方案。\n\n方案重点在于同步行动。由首都警备部队负责控制相关机关出入口，组织部门负责调取人员档案与内部通信记录，安全部门负责对名单内核心人员实施快速拘押。行动开始后，各地方机关将同时接收中央指令，封存相关会议材料、电文记录及人事文件，避免涉事人员提前转移证据或组织串联。\n\n初步名单分为三类：第一类为已参与联络驻军、地方机关并准备组织对抗者；第二类为协助传递信息、提供会议场所及人员名单者；第三类为态度明确但尚未采取实际行动者。前两类将优先处理，第三类暂列观察对象。\n\n若行动顺利，可在短时间内切断其组织网络，阻止其于代表大会筹备及后续改革期间制造公开危机。同时，相关行动也可用于清理部分长期阻挠改革、借资历干预中央政策的人员。"
SFR.372.a:0 "遵照计划来。"
SFR.372.b:0 "要不要乘机打击我们的政敌？"

SFR.373.t:0 "抓捕"
SFR.373.d:0 "探子拐进东街时，已经跑得上气不接下气。\n\n他原本只是奉命去看一眼警备部队的调动情况，顺便给几位“老同志”传个口信。谁知刚走到路口，便发现熟人一个接一个不见了：茶馆二楼没人，机关门口多了岗哨，连平日里最爱高谈阔论的联络员也突然变成了陌生的面孔。\n\n这不对劲。\n\n他转身就跑。\n\n平京的街道如今修得宽敞，对百姓是好事，对逃命的人却未必。没跑出两条街，身后便传来哨声。他钻进小巷，撞翻卖豆腐的摊子，又踩了一脚刚晒出来的咸菜，脚下一滑，险些当场表演自首。\n\n“站住！”\n\n他当然没站住。直到巷口另一头也走出两名警察。\n\n探子僵在原地，左右看了看，忽然挤出笑容：“同志，我只是饭后散步。”\n\n警察低头看了看他手里的密信，又看了看他满头大汗的样子。\n\n“下次给你评个散步之星。”\n\n片刻后，他被按住双臂带走。远处摊主还在骂他赔豆腐钱。"
SFR.373.a:0 "为了祖国的稳定。"

SFR.374.t:0 "借机清算"
SFR.374.d:0 "“我认为，应当给市场留出更多活动空间。”会议室里，一名干部推了推眼镜，“小商贩也好，合作企业也罢，不能什么都等中央安排。一方面，需要放开民间资金对国有企业的投入；另一方面，不能太过于依赖中央的计划，和市场相比，这缺乏灵活性…”\n\n角落里又有人咳了一声：“我倒觉得，最近社会政策也太急了些。妇女干部进机关可以理解，可让她们掌那么多权，总归不太合传统。家里总要有人照看嘛……”\n\n屋里顿时安静了一瞬。有人点头，有人装作没听见，还有人悄悄把椅子挪开了点。\n\n就在这时，门被推开了。\n\n几名警察走进来，还有几名控制住了会议室的后门，刚想起身的人立马坐了回去。随后，为首者展开名单，开始逐个念名字。念到第三个时，屋内已有半数人脸色发白。\n\n“等等，同志，我们只是在党内讨论！”\n\n“对，我们拥护中央，只是提出建设性意见！”\n\n“我那句传统不是那个意思！”\n\n警察差点笑出声，硬是咳了一下压住。\n\n“诸位的建设性意见，组织会慢慢听。”他说，“现在先请几位换个地方继续建设。”"
SFR.374.a:0 "我就知道他们没安好心..."

SFR.376.t:0 "强有力的“说服”"
SFR.376.d:0 "主席亲启：\n\n根据主席关于避免扩大抓捕范围的指示，秘书处已拟定针对相关人员的柔性处置方案。\n\n目前可采取两类办法。其一，由组织部门继续整理涉事人员过往联络、会议发言、地方往来电文及私人关系材料，形成可供谈话使用的证据摘要。对尚未采取实质行动者，可先行约谈，明确其行为已被中央掌握，并要求其停止串联、配合后续改革安排。必要时，可暂缓公开处理，以换取其退出相关活动。\n\n其二，对部分仍具地方影响力、但尚未深度参与对抗者，可考虑给予安置条件。包括调任顾问职务、保留一定荣誉待遇、安排党史工作、地方建设委员会席位，或对其亲近干部作出有限岗位调整。相关资源需由组织部门与财政部门另行核算。"
SFR.376.a:0 "试试威胁..."
SFR.376.b:0 "...或是招安？"

SFR.377.t:0 "威胁"
SFR.377.d:0 "约谈室里，周知远坐的笔直，浑身冒冷汗。他对面的人翻着文件，语气平稳：“周同志，不必紧张。今天请你来，只是谈谈近期思想动态。”\n\n“我思想很稳定。” 周知远立刻说道。\n\n对方抬眼看了看他，又继续翻页。\n\n“上月十八日，你和同僚品茶的时候上表示，代表大会筹备‘未免走得太急’。二十二日，你同某地方干部通信，提到‘老同志不能任人摆布’。本月三日，你又在饭桌上说，中央近来似乎是想搞‘大洗牌’。”\n\n周知远的脸色逐渐变得像隔夜豆腐。\n\n“那、那只是闲谈。”\n\n“当然。”对方合上文件，“所以我们也只是闲谈。组织理解干部有情绪，也允许同志提出意见。但有意见是一回事，跟着别人惹是生非，就是另一回事。”\n\n屋内安静下来。\n\n“周同志，你年纪不算小，也不算太老。”对方把文件推到一边，“再过几年，安排个顾问职务，写写回忆录，偶尔去学校讲两句，日子不会差。可若是偏要把自己写进别人的案卷里，趟这趟浑水，后半生就未必好过了。”\n\n周知远咽了口唾沫，忽然觉得椅子有些硬。\n\n“我明白了。”他小声说道，“我以后……少喝茶。”"
SFR.377.a:0 "人总要为自己的下半生着想的。"

SFR.378.t:0 "招安"
SFR.378.d:0 "新办公室在财政楼旁边，门牌写着“地方历史资料整理委员会副主任”。名字很长，听着像回事，不过实际工作其实也就是喝茶、盖章，以及偶尔点点头，握手。\n\n梁昭宁坐在软椅上，仍想起前日约谈时的情形。对方把几份材料往桌上一放，他当场腿就软了半截，差点以为自己后半生要去学习如何在牢里种白菜。好在组织没有把事做绝，只是问他愿不愿意换个岗位，继续“为国家发挥余热”。\n\n如今看来，这余热发挥得相当舒服。\n\n待遇不算特别好，也不如以前，车是别想了，秘书也没有了，可工资还在，福利也还在。最重要的是，活少，不用担责。文件送来时，他只需看一眼标题，再说一句“请相关同志按程序办理”云云，便能安稳度过半日。至于下半日能不能安稳的过，就看老婆孩子心情了。\n\n仕途大概是没戏了，肯定上不去。可儿子还能安排到学校，女儿的工作也有人照应，自己以后写写回忆录、参加几场座谈会，当个小教授，日子未必比从前差。\n\n梁昭宁端起茶杯，轻轻吹了吹。"
SFR.378.a:0 "人嘛，总得知道什么时候该闭嘴享福。"

#SFR.380.t:0 "工农代表大会提议"
#SFR.380.d:0 "介绍工农代表大会。"
#SFR.380.a:0 "我们需要让人民真正的当家做主！"

#SFR.381.t:0 "国民议会倡议"
#SFR.381.d:0 "介绍国民议会。"
#SFR.381.a:0 "可选项之一。"

SFR.382.t:0 "最后一次会议"
SFR.382.d:0 "赵永军站在主席台前，望着台下那些熟悉而衰老的面孔，忽然觉得这间会场比过去宽敞了许多。\n\n当然，不可能是会场真的变大了，而是来的人少了，空荡荡的，赵永军心里闪过一丝悲伤。剩下的人多半安静地坐着，手边放着保温杯和空白的笔记本。有人精神尚好，腰板挺直；有人努力睁着眼，正在和名为睡眠的恶魔决一死战；还有许多年轻干部，默默的坐在后排，似乎是不想打扰老头子们的最后一场大会。\n\n赵永军清了清嗓子。\n\n“同志们，革命阵线走到今天，不容易。”\n\n台下安静下来。\n\n赵永军先是讲起了过去。从根据地泥泞的雨季，到山路上的转移，到那些为了多分点现在看来微不足道的物资而争到面红耳赤的会议；也提到阵线如何把来自不同派别、不同出身、不同脾气的人团结在一起，共同对抗反动派。\n\n“以后写史书的人，或许会把诸位写得比本人还高大些。”赵永军说到这里，台下传来几声低笑，“当然，也可能把大家当年吵架的事写进去。若真是如此，还请诸位多多包涵，历史工作者有时比书记员还不讲情面。”\n\n气氛终于松动了些。\n\n随后，他宣读了决议。\n\n阵线议会将正式结束其历史使命。相关档案移交党史委员会，老代表的待遇、荣誉与后续安排按既定方案执行；愿意继续参与工作的同志，可转入顾问、地方建设、党史整理及各级代表大会筹备机构。\n\n这一进程比许多人想象中平稳。有人沉默点头，有人长长叹气，也有人低头揉着眼角。没有拍桌，没有怒骂。提前做过的工作显然起了作用，不然赵永军就要担心被保温杯砸了。\n\n然而，当会议进入下一项议程，讨论工农代表大会的未来设置时，情况变了。"
SFR.382.a:0 "接下来..."
SFR.382.a.tt:0 "§Y我们先前的选择决定了接下来会发生什么。§!"

SFR.383.t:0 "党内左翼的怒火"
SFR.383.d:0 "“这是对革命的背叛！”\n\n这一声喊出来时，会议厅里刚刚翻过第二项议程。方才阵线议会正式解散，众人还一副熬过最难关的放松神情，最多也就是把保温杯拧得响了一些。可等到决定工农代表大会的权限、代表构成与政治安排的议程开始，先前沉默的年轻干部们终于坐不住了。\n\n最先站起来的是一名平京来的共产党干部。他年纪不大，嗓门则恰好相反。“我们一路妥协到今天，还要继续妥协到什么时候？那些老革命、老代表、老干部，反对改革时说自己资历深，要求安置时说自己贡献大，轮到人民发声时又说局势复杂！”\n\n这句话立刻引来一片附和。\n\n另一名革命党青年代表也站了起来：“解散阵线议会，我们支持，所以，给他们荣誉待遇，帮助安置，保留福利，我们都忍了。可现在代表大会难道要照顾他们的情绪一辈子？那革命到底是为了人民，还是为了让一群老头子舒服的度过晚年？”\n\n台下有人喊“说得对”，有人拍桌，还有人要求立刻扩大代表大会权限。书记员试图记录，写到“老头子舒服的度过晚年”时犹豫了一下，最后改成了“部分同志意见激烈”。\n\n赵永军几次试图插话，都被新的质询盖了过去。他不得不站起身，反复要求与会者保持秩序，强调相关制度尚未定稿，所有意见都会被纳入讨论。\n\n最终，会议被迫提前休会。赵永军宣布各代表先回去休息，相关议题另行讨论。"
SFR.383.a:0 "同志们，冷静一点..."

SFR.384.t:0 "党内右翼的怒火"
SFR.384.d:0 "“这是对革命的背叛！”\n\n这一声喊出来时，会议厅里刚刚翻过第二项议程。方才阵线议会正式解散，众人还一副熬过最难关的放松神情，最多也就是把保温杯拧得响了一些。可等到决定工农代表大会的权限、代表构成与政治安排的议程开始，先前沉默的年轻干部们终于坐不住了。\n\n最先站起来的是一名革命党青年干部。他平日里说话不多，这次算是超常发挥了。“主席，恕我直言，前面的安排已经够冒险了。阵线议会解散，革命党几乎就是并入共产党，地方支部重新安排，我们都可以接受。可如今还要把更多权力交给代表大会，让一群没有行政经验的人来监督政府、干预政策，这到底是建设国家，还是把国家当儿戏？”\n\n另一名共产党年轻干部紧接着开口：“近来所谓新生代、平京帮，还有那些天天喊群众监督的人，动不动就说老同志守旧，说地方干部保守。可国家刚统一，百废待兴，哪一件事是靠在大会上喊两句就能办成的？”\n\n会场很快响起一片附和声。有人说中央对左翼青年让步太多，有人说代表大会若不设边界，迟早变成人人诉苦、人人问责、人人要求改路线的菜市场。\n\n书记员写到这里，默默把“菜市场”划掉，改成“部分同志对程序风险表示担忧”。\n\n赵永军几次试图插话，都被新的质询盖了过去。他不得不站起身，反复要求与会者保持秩序，强调相关制度尚未定稿，所有意见都会被纳入讨论。\n\n最终，会议被迫提前休会。赵永军宣布各代表先回去休息，相关议题另行讨论。"
SFR.384.a:0 "同志们，冷静一点..."

SFR.385.t:0 "吵闹的公堂"
SFR.385.d:0 "“这是对革命的背叛！”\n\n这一声喊出来时，会议厅里刚刚翻过第二项议程。方才阵线议会正式解散，众人还一副熬过最难关的放松神情，最多也就是把保温杯拧得响了一些。可等到决定工农代表大会的权限、代表构成与政治安排的议程开始，先前沉默的年轻干部们终于坐不住了。\n\n左边有人拍桌：“中央给那些所谓的老革命、老代表、老干部留了太多余地！他们早该让位给下一代，如今不但要继续享受福利，政府的让步，还要在新大会里占位置，那人民的声音往哪儿放？”\n\n右边立刻有人冷笑：“人民声音？是你们想把国家建设当成儿戏吧！前些日子对年轻干部的让步还不够吗？监督政府，扩大表决，开放发言——再放下去，明天是不是让路边卖糖水的也来治理国家？”\n\n“卖糖水的至少比你更知道百姓有多少钱！”\n\n“那也比你只会喊口号强！”\n\n书记员低头狂写，写到糖水的部分时，终于停住了。他抬头望向台上的赵永军，眼神仿佛在问：这句也要记吗？\n\n赵永军几次试图插话，都被新的质询盖了过去。他不得不站起身，反复要求与会者保持秩序，强调相关制度尚未定稿，所有意见都会被纳入讨论。\n\n最终，会议被迫提前休会。赵永军宣布各代表先回去休息，相关议题另行讨论。"
SFR.385.a:0 "同志们，冷静一点..."

SFR.386.t:0 "党内左翼的威胁"
SFR.386.d:0 "主席亲启：\n\n根据会后汇总，党内左翼代表已形成初步共同意见。其核心诉求为：中央不得接受或推动“国民议会”提案。\n\n相关代表认为，该提案将允许更多非工农代表大会体系内人士参与国家政治，并赋予其较高实际权能，可能削弱工农代表大会的地位，扩大非党派、地方民主派及旧阵线系统人员的政治影响。\n\n部分代表已表示，若中央继续审议该提案，或将其列入正式改革方案，他们将在后续会议中继续提出反对意见，并联合更多青年干部及基层代表要求重新讨论大会制度安排。"
SFR.386.a:0 "让我们看看提案。"

SFR.387.t:0 "党内右翼的威胁"
SFR.387.d:0 "主席亲启：\n\n根据会后汇总，党内右翼代表已形成初步共同意见。其核心诉求为：中央应接受并推动“国民议会”提案。\n\n相关代表认为，工农代表大会若独占主要政治渠道，将使国家治理过度依赖单一代表体系，不利于吸纳地方民主党派、无党派人士及专业团体参与政务。其主张通过国民议会扩大政治协商范围，并赋予其一定实际权能，以平衡代表大会可能带来的政策波动。\n\n部分代表已表示，若中央拒绝审议该提案，或将其排除出正式改革方案，他们将在后续会议中继续提出反对意见，并联合地方机关及中间派干部要求重新讨论制度设计。"
SFR.387.a:0 "让我们看看提案。"

SFR.389.t:0 "政治局势缓和"
SFR.389.d:0 "主席亲启：\n\n根据近期会议记录、地方回报及各代表团接触情况，工农代表大会成立前后出现的政治争议已有所减弱。此前围绕大会权限、国民议会提案、代表构成及党内路线安排产生的公开反对意见，已在正式制度落地后逐步降温。\n\n目前，多数代表已转向处理大会席位确认、地方议题上报、机关衔接及后续程序安排。原先情绪较为激烈的部分人员仍保留意见，但公开发言频率下降，组织串联迹象减少，会议秩序较前期有所恢复。\n\n各地仍有零散不满，主要集中于代表名额、程序解释及个别干部安排问题。秘书处判断，此类问题短期内不会完全消失，但在无外部刺激情况下，可随大会日常运转逐步消化。\n\n后续建议继续保持常规观察，暂不需采取额外处置措施。"
SFR.389.a:0 "太好了！"
SFR.389.a.tt:0 "§C局势会持续缓和，直到重归稳定。§!"

SFR.390.t:0 "革命的新一阶段"
SFR.390.d:0 "他第一次来到平京。\n\n在此以前，老人一生中见过最大的屋子，是县里那座灰墙大会堂。那地方冬天漏风，夏天闷热，开会时总有人把草帽垫在屁股底下，还总有孩子趴在窗外偷听。可今日，他坐在这座高大明亮的会场里，抬头望见层层座席与悬挂的旗帜，一时竟有些手足无措。\n\n他来自南方一个很小的村子。村口的桥在战争里断过两次，第一次大家还想着拿碎石修一修，第二次炸碎了就不修了。许多年来，他只知道收成、交租、旱灾、逃兵和夜里远处传来的枪声。后来红旗到了村里，干部们说全国要解放了，土地第一次交到百姓手中，还可以派代表去平京说话。他那时只当是句好听话，几百年了，都这样，唬谁呢？\n\n可如今，他真的坐在这里。\n\n过去数周里，来自全远乡各地的代表陆续抵达平京。工人们穿着洗得发白的工装，渔民们带着晒黑的脸，北方牧民说话时还夹着当地口音，年轻女教师把笔记本抱在胸前，老兵拄着拐杖坐在过道边，还有穿着扎兰多亚传统服饰的亚人。有人见过大海，有人见过雪山，有人一辈子没离开过自己的故乡。如今他们坐在同一座会场里，远乡千家万户的星火，终于汇聚一起。\n\n大会开始时，会场安静得能听见纸页翻动的声响。主席台上宣读了关于土地、工厂、地方政务、干部监督与国家建设的若干议程。老人听不懂太多，有些词太长，有些制度闻所未闻。可他听了个一知半解，倒也无所谓，他足够固执。他要和周围这些人一起听，一起记，一起争论，再带回家乡去，总有人能懂的。\n\n他低头看着胸前的代表证，粗糙的手指在边缘摩挲了许久。\n\n许多年后，史书或许会写下这一天，写下远乡人民第一次以主人之名齐聚平京，写下一个新国家如何从战争的余烬中向前走去。可对他而言，这一天没有那么复杂。\n\n他只是忽然想起村里那条重新修好的桥，笑了笑。"
SFR.390.a:0 "愿人民之声，长久回响。"

SFR.400.t:0 "全国土改"
SFR.400.d:0 "主席亲启：\n\n随全国解放完成，各级政府已陆续正常运转，中央土地委员会认为，原先在战争期间暂缓处理的土地问题已不宜继续搁置。此前各地因军事需要、地方条件与接管进度不同，缺乏明确标准，影响后续行政登记与农业恢复。\n\n现拟将土地改革扩大至全国范围，由中央统一制定土地登记、财产核验、分配办法与申诉流程，并派出工作组协助地方执行。对于各地战时为稳定局势而保留的特殊安排，应逐步清理，改按统一法令处理。\n\n相关草案已送交代表大会审议，待主席批示后即可公布第一批试行地区名单。"
SFR.400.a:0 "我们时间有限。"

SFR.401.t:0 "全国土改圆满成功！"
SFR.401.d:0 "主席亲启：\n\n全国土地改革工作已按中央既定安排完成。自第一批试行地区公布以来，各级土地委员会、地方代表大会与农业部门陆续完成土地登记、公开审判、田亩测绘及后续生产恢复等工作。期间未出现大规模拖延、地方抗命或计划外武装冲突，少数纠纷已依照统一申诉流程处理完毕。\n\n截至本报告送达时，原由旧贵族、地主及非法占有人控制的土地已完成重新分配，各地公社运转良好，佃农、雇农及无地农户已取得相应耕作权。配套水利修复、物资调拨与机械化试点亦已并入地方农业计划，下一阶段将转入常态化生产管理。\n\n全国土改至此宣告结束。相关统计表与地方总结将另行呈报。"
SFR.401.a:0 "太好了！"

SFR.402.t:0 "全国土改正常收尾"
SFR.402.d:0 "主席亲启：\n\n全国土地改革工作已基本完成。自中央下达统一办法以来，各级土地委员会、地方代表大会及农业部门陆续完成土地登记、公开审判、田亩测绘与生产恢复安排等工作。期间部分地区因旧档案缺失、地方纠纷、交通受损等诸多原因，导致执行时间有所延后，亦出现过少数申诉积压与临时调整。\n\n上述问题已依照中央补充指示处理完毕，相关地区未再出现影响整体进度的情况。旧有土地契约与非法占有问题已完成清理，重新分配工作已纳入地方常态管理，配套水利修复、物资调拨与机械化试点也将继续由农业部门跟进。\n\n至此，全国土地改革已按计划收尾。各地最终统计表与后续农业生产报告将另行呈报。"
SFR.402.a:0 "很好。"

SFR.403.t:0 "全国土改草草收尾"
SFR.403.d:0 "主席亲启：\n\n全国土地改革工作已作阶段性收尾。自中央推行统一办法以来，各级土地委员会与地方代表大会陆续完成土地登记、公开审判、田亩测绘及生产恢复安排等工作，但部分地区因档案缺失、地方抵触、交通中断、申诉积压及配套工程延期等问题，执行进度多次滞后。\n\n经中央多次调整期限后，仍有少数地区未能完全按原定标准完成细项工作。为避免土地改革继续占用过多行政资源，并影响农业生产恢复与下一阶段国家建设，现已责成地方政府以现有成果为基础完成最终登记，将剩余纠纷转入常态化行政处理。\n\n全国土地改革至此结束。相关统计表、遗留问题清单及地方补充报告将另行呈报。"
SFR.403.a:0 "没办法了。"

SFR.404.t:0 "土改进展缓慢！"
SFR.404.d:0 "主席亲启：\n\n全国土地改革工作已执行十八个月，现未能按原定期限进入收尾阶段。各地土地委员会虽已完成主要地区的土地登记、公开审判与田亩测绘等工作，但部分省县因档案缺失、地方抵触、申诉积压、农业设施修复延期及人员调配不足等问题，导致后续分配与生产恢复安排多次推迟。\n\n根据中央土地委员会最新汇总，现行计划需延长至原定期限约两倍，追加行政人员、测绘队伍、农业技术员及交通修复资源。延期已影响部分地区水利工程、农业机械化试点与基层政务建设，多地代表大会亦已收到群众对工作迟缓、生产安排不明及资源倾斜问题的申诉。\n\n为保证土地改革最终完成，建议重新调整工作期限，并要求地方限期提交进度表。"
SFR.404.a:0 "我们必须加快进度。"

SFR_land_reform_generic_tt:0 "§C土地改革结束后，§!"

SFR.405.t:0 "收益分配争议"
SFR.405.d:0 "主席亲启：\n\n合作社试点办公室呈报：近期数个农业合作社试点单位因收益分配办法产生争议，相关问题已由县级代表大会逐级上报至中央。争议主要集中于劳动投入、耕作经验、农具折算、家庭人口负担及公共积累比例等事项。\n\n各地目前提出两类处理意见。其一为实行统一工分绩效，将收益分配同劳动时长、技术岗位、生产贡献及集体评定结果挂钩；其二为设定最低分红，先保障入社农户基本收入，再按剩余收益进行二次分配。"
SFR.405.a:0 "实行工分绩效"
SFR.405.b:0 "设定最低分红"

SFR.406.t:0 "新农机"
SFR.406.d:0 "天还没亮，许大山就扛着锄头出了门。\n\n公社东边那片地昨天刚分完工，今天要翻土、清理沟渠、搬肥料，还要把几段被雨水冲塌的田埂重新垒起来。他在心里算了一遍，觉得就算全队人都来，少说也得忙上三五天。队长说新设备快到了，他没太当回事。什么设备还能替人下地不成？扯几把蛋。\n\n太阳升起来时，村口传来一阵轰隆声。\n\n许大山抬头看去，只见几辆涂着外文标识的大家伙被拖车运进公社。铁皮外壳在日光下亮得晃眼，轮子比牛还高，后头拖着一排奇形怪状的犁具。几个技术员围着机器忙前忙后，又是检查油箱，又是翻说明书，旁边还有个会外语的年轻干部，皱着眉把说明书翻译得磕磕巴巴。\n\n没过多久，机器发动了。\n\n许大山原本还想笑，觉得这东西声音大得像要散架。可下一刻，那台铁家伙便慢慢驶进田里，沉重的犁具压进泥土，整片地像被魔法犁开了一样，一行接着一行，整齐得不像人干出来的活。另几台机器跟在后面做更进一步清理，连过去最折腾人的几处烂泥地也被硬生生推平了。\n\n到晌午时，许大山站在田埂上，看着自己原本准备干上好几天的活被收拾得七七八八，手里的锄头反倒成了多余的东西。"
SFR.406.a:0 "心服口服"

SFR.407.t:0 "京里来的大爷"
SFR.407.d:0 "李承安在车上颠了一整天。\n\n临出发前，平京的同事往他包里塞了两双厚袜子，一本培训手册，还有半袋干粮。他也做好了准备，不管是恶劣的居住环境，还是数不尽的劳动，都得耐心应对。毕竟，地方条件困难，干部更该吃苦，这道理他要不认，那就不该来这趟了。\n\n可卡车刚停在村口，他就觉得事情不太对。\n\n村口挂着红布，锣鼓敲得震天响。村委主任带着十几个干部排成一列，身后站着一群农民，脸上全是紧张又用力的笑。桌上摆着白面馒头、鸡蛋、腌肉，还有一壶看起来像是从谁家柜子深处请出来的好酒。几个孩子被大人推到前头，举着歪歪扭扭的欢迎牌，上面的字写的歪歪扭扭，反正是欢迎之类的话语。\n\n李承安愣在车边，一时之间不知道怎么处理这情况，他用求助的眼神望向司机，结果后者只是别过头去，搞得李承安一时间居然有点火大。\n\n他又不是瞎子，这些东西显然不是富余出来的。鸡蛋八成是各家凑的，肉不知道攒了多久，红布洗得发白，锣鼓也大多破破烂烂。村委主任上前握住他的手，满脸堆笑，说“首都来的同志一路辛苦，先吃饭，工作不急”。\n\n“不，不是。”李承安连忙摆手，“我是来帮大家搞培训和建设的，不是来检查你们的。饭不用这么——”\n\n“懂，我们都懂。”主任点头点得飞快，“您放心，保证不铺张。”\n\n身后的农民又小声嘀咕了一句。"
SFR.407.a:0 "“...还说您不是京爷？”"
SFR.407.b:0 "“我真不是！”"

SFR.408.t:0 "地方的不配合"
SFR.408.d:0 "周明德把报告夹抱在怀里，站在省政府走廊上等了半个小时。\n\n他是从西北地区派来的建设干部，负责农民培训、土地登记和水利设施的修建。出发前，县里让他把话说清楚：确实干不完了。中央给下来的指标按南远乡平原地区的进度估算，可西北这边山多路烂，随便下点雨，卡车陷在泥里大半天出不来。东西送到了也没人会用，培训过的农民还得再去培训别人，转了一圈，没人来得及干活。\n\n进办公室后，省建设委员会的上级没有寒暄，只让他坐下汇报。\n\n周明德照着报告念：水渠修复完成四成，大部分农机仍停在县仓库，合作社干部培训人数不足预定一半，部分村庄缺少可用测绘图，粮种调拨也被其它地方的铁路修复工程挤占。若按现有资源推进，年底前无法完成全部指标。\n\n他说到最后，声音小了些，不知是心虚还是害怕。\n\n办公室里安静了一会儿。\n\n上级翻完报告，把纸页重新合上，抬头看向他。"
SFR.408.a:0 "“中央命令大于一切！”"
SFR.408.b:0 "“但地方也有地方的难处...”"

SFR.409.t:0 "最后抉择"
SFR.409.d:0 "主席亲启：\n\n全国土地改革已进入关键阶段。中央土地委员会汇总各地报告后认为，旧地主、乡绅及依附其上的地方势力仍在部分地区影响土地改革与农业生产恢复。此前采取的限期登记与改造安置等办法，已无法覆盖所有情况。\n\n现有两项处理方案需由中央裁定。其一，对仍阻挠土改、隐匿土地、煽动抗拒或破坏生产者采取强制措施；愿意服从者可接受劳动改造、政治审查或转为自由身份，拒不服从者由地方机关依法处置。其二，在部分发展落后、社会关系复杂或行政力量不足的地区，允许以赎买、限额补偿及分期移交方式换取地方势力配合，以减少地方震荡。\n\n相关执行细则已备妥，待主席批示后下发。"
SFR.409.a:0 "为了未来的发展！"
SFR.409.b:0 "为了当下的和平。"

SFR.410.t:0 "无意义的抵抗"
SFR.410.d:0 "陈二河他们连已经在山脚下等了半天。前头那座寨子原本是个地主大院，后来添了木栅、沙袋和两座歪歪扭扭的哨楼，远看像个缩小版的堡垒。听说附近几个地主把家丁、逃兵和欠了赌债的闲汉都收了进去，扬言谁敢动他们的地，就让谁横着下山。\n\n粮仓也在里面。侦察员说，他们囤了够吃半年的米面，还从别处弄来几挺机枪，像是真准备打什么长期战。\n\n进攻前，政委站在路边做了简短动员。他没讲太多大道理，只说寨子里存的粮食本该分到村里，填报百姓的肚子。现在有人拿它养私兵、修土楼、吓唬农民，那就必须重拳出击。\n\n营长看了一眼怀表，挥手下令。\n\n陈二河跟着班长冲上去时，寨门那边已经被炸开了。里面的枪声乱成一团，听着吓人，打得却没什么准头。几个家丁刚从墙后探出脑袋，就被压得缩了回去。陈二河踩过散落的瓦片和断木，冲进院子时，还看见地上滚着半只烤鸡。\n\n他们一路推进到正厅，门刚踹开，一股酒味扑面而来。屋里摆着圆桌，桌上有肉、有酒、有刚拆开的点心。几个穿绸衫的人缩在桌边，脸色发白。其中一个肥胖的老头正手忙脚乱地往后门挪，腰上挂着金表，怀里还塞着一把银子。\n\n陈二河愣了一下。\n\n这就是那个嚷嚷要打半年的人？\n\n老头发现门口有人，猛地转身想跑。陈二河几步追上去，一把扣住他的胳膊，把人按在门框上。那老头疼得直叫，嘴里还喊着误会、谈判、愿意配合。"
SFR.410.a:0 "“哼，想逃？”"

SFR.411.t:0 "“列祖列宗啊...”"
SFR.411.d:0 "刘顺昌坐在县政府的接待室里，手指一直按着膝盖，免得发抖。他的桌对面坐着两名干部，一名负责谈判，一名负责记录。门外还有几个等待登记的人，有的是乡绅，有的是管账先生。没人说话，只有钢笔尖划过纸面的声音。\n\n他看了看面前的合同，长叹一口气。\n\n上头写着土地面积、建筑清点、赎买金额和后续安置办法之类的。刘顺昌看了一遍，感觉字像是一团乱麻。最后，他的目光停在那个数字上。这个价格在远乡历史上任何一个时候都不可能出现。若是在年景好的时候，光是那几片水田就不止这个数；若是在灾年，卖地更是要被人戳脊梁骨，说败光祖业。\n\n可现在不一样了。\n\n他想起县城东门外那次公审。被押上台的王家老爷曾经比他风光得多，家丁多，仓库大，账本厚，银子能装满半屋子。可那些财富最后都成了罪证，台下站满了被逼死亲人的农户，他们高声呼喊，巴不得他挫骨扬灰。枪声响过，大火烧过，他也不过是一团灰，和那些被他害死的百姓没有任何区别。\n\n刘顺昌低头看着自己的手。那是一双养尊处优的手，不算干净，也不算太脏。他收租，佃农欠租时也骂过人；可遇上灾年，他确实开仓放粮，帮助百姓填饱肚子，村里修桥梁、办学堂、请郎中，他大多也出过钱。也许正因为如此，他才有资格坐在这里谈生意，而不是在大牢里等判决。\n\n“刘先生，条款都写明了。”对面的干部说道，“签下以后，土地移交，家里人按规定安置。若还有异议，可以走申诉流程。”\n\n刘顺昌点了点头。他想起祠堂里的牌位，想起父亲临终前让他保住祖上传下来的土地，又想起自己的两个儿子和一个刚学会走路的孙女。祖宗的地没了就没了吧，顺应时代潮流，未来未必不能东山再起。"
SFR.411.a:0 "他颤颤巍巍签下自己的名字。"

SFR.412.t:0 "公审前夜"
SFR.412.d:0 "起初只是屋檐滴水，随后是远处闷雷般的轰鸣。男人站在齐腰深的浑水里，看见父亲在前面拼命抓住一棵歪斜的树。洪流裹着木梁、牲畜和屋顶冲下来，父亲回头喊了什么，可声音立刻被水吞没。下一刻，树断了，人也不见了。\n\n水退后，家里什么也没剩下。田没了，房子也塌了，原先为了缴纳田租和杂税欠下的债却还在。母亲翻遍箱底，只找出几枚发黑的铜钱。她抱着年幼的妹妹，牵着他，同附近的灾民一起走了几天，来到地主家的粮仓前。\n\n仓门紧闭，墙后堆着一袋又一袋粮食。\n\n人群跪在泥里，请求先借些粮，等来年收成后再还。管事站在门前，一副天不怕地不怕的样子，说放不放听老爷的，屁民们大可以回去等着，大不了啃树皮便是。有人向前挤了几步，家丁便举起棍子驱赶。母亲护着怀里的妹妹，后背挨了几下，摔在路边。\n\n那天他们什么也没拿到。\n\n母亲的伤越来越重。几天后，她躺在破庙的草堆上，把妹妹的手塞进他的掌心。\n\n“保护好你妹妹。”\n\n这是她最后一句完整的话。\n\n后来，他带着妹妹沿铁路和官道逃荒，什么脏活累活都干过，甚至还跟着军队走了几个月，尽管他甚至都不知道跟的是谁的部队。有时一天只能分到半块饼，有时候只有土可以吃。他们风餐露宿，只为了活下去。妹妹病过几次，但运气很好，最后也没大碍。等革命阵线接管他们落脚的地方时，她已经长得快到他的肩膀。\n\n一阵尖锐的汽笛声将他惊醒。\n\n车厢轻轻晃动，窗外已经亮起县城站台的灯。乘务员沿过道喊着到站，提醒旅客带好行李。他抹了一把额头，才发现手心全是汗。\n\n妹妹靠在他肩上睡得正熟。\n\n他轻轻拍了拍她。\n\n“到了。”\n\n明天，县城将举行公审大会。那个当年紧闭粮仓、任由灾民死在门外的地主，会站在所有人面前接受审判。\n\n妹妹睁开眼，默默抓住了他的手。"
SFR.412.a:0 "他们手握手，一起前进。"

SFR.413.t:0 "公审大会"
SFR.413.d:0 "兄妹二人挤过卖烧饼、茶水和花生的小贩，又穿过堵在路口的围观群众，才终于看见公审会场。那是一块临时围出的空地，木台搭在墙边，几名士兵守在两侧，后方坐着数名被扣押的地主和其亲属。\n\n哥哥一眼便认出了那个人。\n\n逃荒的那些年里，他无数次想象过对方的样子。有时是衣冠整洁、说话轻声细语的富豪，有时又是青面獠牙、靠灾民的血肉活着的恶魔。可如今坐在台下的，不过是一个身材发福、头发花白的中年男人。若不是身上的绸衫和那张熟悉的脸，他看起来同街边任何一个普通大叔都没有区别。\n\n公审开始后，一名士兵登台宣读罪状：侵占田产，私设捐税，囤积粮食，指使家丁殴打灾民，并在水灾期间拒绝开仓救济，致使多人伤亡。\n\n地主立刻站起来大喊，说粮仓归自己所有，家丁只是维持秩序，死去的人都是遭了天灾，与他无关。有人拿出他当年存粮绰绰有余的证据后，他又改口说自己只是受管事蒙骗，随后干脆跪倒在地，冲着周围的人连连作揖。\n\n“我有钱！我可以赔！以后乡里的路、桥、学堂，我都出钱！”他扫视着台下的农民，声音越来越急，“大家都是乡里乡亲，我绝不会亏待你们！”\n\n哥哥看着他，胸口像堵着什么。\n\n他拉住妹妹，挤过人群走上前。妹妹的手有些发抖，却没有松开。\n\n“你还记得水灾那年，你的寨子外面那些人吗？”\n\n地主抬起头，茫然地看着他们。\n\n哥哥猛地伸出手，手指几乎戳到他的脸上。\n\n“我爹死在洪水里，我娘被你的人打伤，几天后伤重就死了！她抱着我妹妹去求一口吃的，你连人影都没有！现在你说自己会出钱？当年我们快饿死的时候，你的钱在哪里？千千万万乡里乡亲如牲畜一般死在外面的时候，你他妈在哪里？！”\n\n妹妹站在他身旁，指认了当年动手的家丁，也说出了母亲临死前的情形。\n\n台下先是一片安静，随后有人开始呼喊。"
SFR.413.a:0 "人群的呼喊一浪接过一浪，求饶声转瞬即逝。"
SFR.413.a.tt:0 "§R报应最后还是来了。§!"

SFR.414.t:0 "簿册"
SFR.414.d:0 "林箐蹲在田埂边拔草时，远远看见一个人朝她走来。那人穿着洗得发白的干部制服，怀里抱着一摞簿册，脚上的布鞋已经沾满泥。他走到田边，先低头看了看水沟，又看了看林箐，像是在考虑应该从哪里下脚。\n\n“你就是林箐同志？”\n“是。”林箐抬起头，“你找我？”\n“我叫陈望，乡土改工作组的。”年轻干部打开最上面一本簿册，认真核对了一遍，“村里说你念过书，会写字，也会算账。”\n“念过几年，后来打仗，学校没了。”\n\n陈望点点头，从怀里抽出一张盖了章的通知。\n\n全国土地改革推开后，乡里缺人缺得厉害，尤其是认字，还能读能写的知识分子。政府因此征集本地识字青年参加工作，村委会第一个报上的就是林箐。\n\n林箐接过通知，看了一眼，又看了看他怀里那摞厚得吓人的簿册。\n\n“这些都要写？”\n“这只是一半。”陈望说。\n\n林箐重新低下头拔草，仿佛刚才没人来过。\n\n陈望在田埂上站了一会儿，只得继续解释：“有补贴，管吃管住。主要在本地工作，不会把你调走。村里人熟悉你，沟通起来也方便。”\n林箐还是没说话。\n“而且工作组确实缺人。”他顿了顿，“我一个人已经连续抄错三户名字了。昨天还把张有田家的水田记到了张有水名下，他们两家为此吵了半天。”\n“后来呢？”\n“后来发现张有水根本没有田。”\n\n林箐忍不住抬头看他。陈望也正低头看她，两个人的视线碰在一起，不约而同的没忍住笑出声来。\n\n“总之，”陈望把最上面那本空簿册递过去，“请你考虑一下。”\n林箐洗掉手上的泥，接过簿册。陈望像是终于松了口气，伸手准备扶她上田埂，却被她沾满泥水的手握了个正着。\n\n两个人都僵了一下。\n\n“陈同志，”林箐没有松手，“你们工作组管洗衣服吗？”\n“不管。”\n“那你最好别动。”\n陈望低头看着袖口上的泥印，沉默了片刻。"
SFR.414.a:0 "“洗衣钱能不能记你账上...”"

SFR.415.t:0 "吹号"
SFR.415.d:0 "天刚亮，村口那只旧铜号便响了起来，声音好似黑白无常前来索命。第一声拖得太长，第二声破了音，第三声把正在墙头打盹的鸡吓得扑进院子，把熟睡的大黄吓了个半死，一时之间做到了字面意义的鸡飞狗跳。林箐扛着铁锹赶到水渠边时，陈望还举着号，脸上写满了无辜。\n\n“我照谱吹的。”\n\n“这是谁家死神索命的号角。”\n\n陈望把铜号交还给民兵，假装没听见。\n\n水渠两边已经站满了人。有人带着锄头，有人推着独轮车，几个木匠正在修理被洪水冲坏的闸门。村里的妇女支起锅灶，准备给干活的人烧水做早餐；先前最不愿参加合作社的几户人家也来了，只是站得稍远，看样子是想等别人先干。\n\n林箐和陈望望向众人，一股自豪感油然而生。\n\n过去一个月里，二人几乎走遍了附近几个村子。他们先去查田亩，又问各家缺什么。有人要修水利设施，有人担心分到烂地用不了，还有人听说要组织集体劳动，认定政府这是准备来复兴徭役了，差点没举家带口跑路。陈望解释政策，林箐再负责把公文翻译成老百姓能听懂的版本。\n\n他们也开过几场并不成功的会。\n\n第一次，村民只来了七个，其中三个是来看热闹的；第二次，人倒是坐满了，结果谈了没十分钟就突然开始吵架，二人听了半天才发现居然是为的十几年前抢老婆这种事情；第三次终于定下计划，散会后才发现记录员把“四十人”写成了“四百人”，险些让县里送来足够一个营使用的工具。\n\n不过，最后土地测量和发放物资都很顺利。最先修好的那段水渠开始通水后，原先观望的人慢慢加入，或者自发组织参与建设。到了今天，不需要工作组再挨家挨户敲门，村民已经按照各组名单自己找到了位置，井然有序的开始干活。\n\n林箐挽起袖子下到渠里，陈望跟在后面搬土。没过多久，他脚下一滑，整个人坐进了泥水里，怀里的笔记本被林箐眼疾手快地抢了下来。\n\n“这个质量的东西现在可造不了多少。”林箐拍了拍封皮，笑着说道。\n\n陈望抹掉脸上的泥，抬头看着她。\n\n“那我呢？”\n\n林箐把铁锹递给他。\n\n“你还能干活，问题不大。”"
SFR.415.a:0 "林箐一边说道，一边笑着给他竖了个大拇指。"

SFR.416.t:0 "红线"
SFR.416.d:0 "办公室里堆满了档案。土地登记完成以后，工作组开始核定各户成分。谁家过去有多少土地，雇过多少长工，收过多少租金；谁在灾年放过债，谁替地主打过人，各种看似及哦毛蒜皮的事情，全都要查清楚。贫困农户将优先得到物资救济，几名成绩不错的年轻人还会被送去城里读书。另一边，做过错事，尤其是身上有百姓血债的，需要严厉处理。\n\n林箐翻开一份材料，用红笔划了一道。\n\n“这个交县里。侵占土地，还打伤过佃农，留着以后公审。”\n\n陈望看了一眼：“可是他原来总共也就几多亩地。解放前病倒了，现在走路都得让儿子扶，可能不适合送去审判。我看我们还是先审这几组案件。”说罢，他从一旁抓来几把零散的文件，上面是关于几个村有村民做偷鸡摸狗之类的小事的档案。\n\n“我觉得这倒不影响。”林箐说道，“大事从严从快，交上级统一处理。证据摆到公审会上，乡亲们也能把话说清楚，是福是祸就看到时候了。至于谁偷过点杂七杂八的东西，我倒是觉得没必要全处理。大家抬头不见低头见的，这样不好开展工作。”\n\n陈望抽出另一份档案。\n\n“这个人偷了合作社三次鸡蛋，还把责任推给邻居，差点搞出流血事件。我看反而该处理。事情不大，但总不管，显得我们在鼓励这种风气，我担心这个也会影响未来开展工作。”\n\n“那另外这位呢？”林箐指了指先前准备送去县里审判的档案。\n\n“我个人认为，最好靠我们在本地解决。财产充公作为赔偿，再把能动的家属送去改造。”陈望敲了敲档案，“毕竟考虑到本人没有直接的血债，亲属更没有。硬送去公审的话，可能会闹出笑话，现在中央也担心一些地方的风气。”\n\n林箐放下红笔。桌面中央画着一道红线，左边是拟送县里的案件，右边是准备留在地方里解决的纠纷。两人争了半个下午，那条线被擦掉重画，已经从笔直变成了一条弯弯曲曲的河。她盯着它看了一会儿，突然笑出声来，她感觉那好像前些日子修的马路。"
SFR.416.a:0 "“服了你了，听你的吧。”"

SFR.417.t:0 "新村子"
SFR.417.d:0 "林箐原以为，征收土地这件事没什么大不了的。说实话，在先前负责的几个村子里，大部分资料都不难获取，无非是翻一翻旧账，再问几户老人，基本就可以查个七七八八。没什么问题的，问题不大的就地处理；有问题的，抵抗的则丢给县政府就好。\n\n新村子的情况却不一样。这里掘地三尺也没有占地上百亩的大地主，也没有带着家丁催租的乡绅。过去道路不通，官府很少来，村里几户富农各自掌握着土地，牲畜，磨坊，水渠等，也会自发组织修建或者维护。灾年时，他们凑出物资帮助村民生活；匪患来时，也由他们出钱出人守夜。整个村子的凝聚力很强，改造阻力巨大。\n\n因此，工作组宣布征收土地和组织集体生产后，村民表面上没有反对，但实际上都不配合工作。陈望开了几次会，除去因为记录问题不得不重新校对方案的一次外，大多都不欢而散。\n\n接下来几天，林箐和陈望逐户核账，把几个问题分开处理，顺便调来了民兵帮忙施压，好在没有爆发直接冲突。愿意加入合作社的富农可以保留必要生活资料，并按农具和牲畜折算工分；贫困农户获得土地；磨坊则暂由原主人负责维护，另派两名青年跟着学习。最后这件事软磨硬泡了快一个月才搞定。\n\n夜里，两人借住在新成立村委会的杂物间。大半个月下来，这里已经堆满了他们的杂物，随着这几天任务收尾，二人也着手开始整理。陈望正在旁边的柜子旁收拾资料，林箐则坐在煤油灯前大口吃着大饼，这是她今天第一顿饭。窗外十分安静，除了偶尔传来几声狗叫。\n\n“至少没人跟我们直接干仗，我听说有些地方出现了伤亡。”陈望叹气道，“也是辛苦你了，跟我吃这种苦。”他看向林箐，抱着一点愧疚的神情。\n\n“哈哈，那还不至于。”林箐大口把饼塞进嘴里，又拿旁边的水壶对付了几口咽下去，“我也没想到这里这么难做。其实他们原来生活的就不错，农民都把这种人身依附关系当成真理了，全然不管自己有机会过的更好。这种上面应该已经定性了…是啥来着？”\n\n“我也忘了，抱歉。”陈望陪笑道，“不过他们原来确实过着半隔绝的生活，就连战火也不曾波及这里，居民简直就像是传说中的不谙世事的桃源乡的居民。”\n\n“呵呵，是啊。”林箐脑海里短暂闪过因为战火而四处逃亡的学生时代，“不过这也不可能永远持续下去。你听说了吧，省里来的考察组在北边发现矿产的事情。”\n\n“嗯。”陈望点头道，“就算我们不来，十年以内，这里也会热闹起来。”"
SFR.417.a:0 "“不管他们想不想。”"

SFR.418.t:0 "赖以为生..."
SFR.418.d:0 "土地分配方案张贴出去半天后，村委会门口围满了人，一开始给村委主任吓了个半死，不知道干了什么亏心事，好像以为是冲着他来的，要不是林箐拉着就翻窗跑了。\n\n第一个挤进来的是赵老六。他拿着分地图，手指几乎戳破纸面，说自家那块地离村子太远，走过去要翻两道坡。等他把锄头扛到地方，天都黑了。\n\n紧跟着进来的是孙大娘。她分到的地就在村边，路倒是不远，可面积只有细长的一条。她在办公室里伸开双臂比画，说那块地窄得连自家的牛都转不过身，若是牛一头扎进邻家的田里，责任总不能算在牛身上。林箐仔细看了看，虽然没有真的细到那个地步，不过确实形状有点诡异了。\n\n第三户的问题更复杂。家中两个老人带着三个孩子，分到的田不少，却没有足够劳力耕种，一问还是军人家庭。他们要求从集体的收益中得到额外补助，加上分来的土地起码要有人能帮他们耕种，不然分了也没意义。\n\n林箐回头看了下汗流雨下的村委主任，有些无语，她大概看出来了缘由。这人和其他几个人不务正业，明显把工作敷衍了事，结果才弄出了一堆幺蛾子。\n\n起初还在解释，结果来的人越来越多，几个人大吵大闹，根本听不清到底在说什么。\n\n“我家那块地去年明明淹过！”\n\n“这么分，我们吃什么！”\n\n“是啊，吃什么！”\n\n“我家六口人为什么只算五个半劳力？”\n\n林箐翻着登记簿，试图找出那个“半”是怎么来的。村委主任躲在桌子后面假装核对公章，另一名干部则捧着茶缸，沿墙一点点挪向后门。\n\n门外忽然传来陈望的声音。\n\n“都先停一下！按户登记，一个个谈！”\n\n等最后一户留下姓名，天已经半黑了，血红的夕阳拖着长长的倒影。路上，林箐和陈望抱着地图往办公室走，身后还跟着被他们抓走的村委主任、会计和生产组长。几个人刚想挣扎，就被陈望一把拉住。"
SFR.418.a:0 "“你们几个罪魁祸首还想跑？”"

SFR.419.t:0 "联欢会"
SFR.419.d:0 "村里的庆祝活动定在村口前的空地上。林箐到场时，先看见门口挂着两串红灯笼，旁边却钉着一块新刷的木牌，上面写着“联欢会”。参加的人都穿着本地节庆时才拿出来的长衫、绣裙和布靴，胸前又别着合作社发的红布花。完全由爱好者组成的乐队正在演奏，听起来因为缺乏经验而有点混乱，不过倒是不难听。\n\n陈望穿着一件明显借来的长袍，袖子长出半截，端着盘子从人群里挤出来。\n\n“我给你留了吃的。”\n\n盘里有糯米糕、腌菜、烤肉，还有一勺被挤得不成形的奶油点心。所谓自助餐，就是村里每户出一道菜，再由生产组负责把桌子拼成长长一排。有人拿走了盛汤的碗，只好用茶杯装果酱；几个孩子围着城里送来的汽水研究瓶盖，最后找木匠借了钳子才打开。\n\n舞会开始后，林箐原本只站在边上看。陈望被村委主任推了一把，踉跄着来到她面前，伸出手。\n\n“我不会跳。”\n“我也不会。”\n“那正好，一起丢人。”\n\n两人跟着前面的人学。第一圈，陈望踩了林箐两次；第二圈，林箐为了躲他的脚，差点撞进摆糕点的桌子；第三圈时，他们总算能跟上节拍。转身的时候，陈望过长的袖子甩到旁边一名老人的脸上，老人把袖子拨开，一副“年轻真是好”的样子，继续若无其事地跳。\n\n后来他们参加了套圈，陈望连扔五次，成功收获匠心定制木勺一把。林箐一次套中了盛糖果的瓷碗，于是陈望负责拿勺，她负责端碗，两个人坐在粮仓台阶上把糖分给围上来的孩子。\n\n夜深以后，鼓声停了，灯笼也一盏盏熄灭。他们沿田埂慢慢往回走。新划出的田块在星光下连成整齐的暗影，远处还能听见有人收拾桌椅的声音。\n\n陈望沉默了一会儿。\n“县里的通知下来了。这里的工作结束以后，我要调去城里。”\n\n林箐踢开路边的一块小石子。\n\n“什么时候？”\n\n“下个月。”他停了一下，“这边的事情搞完了，城里那边又开始缺人了，听说以后要搞工业化，具体我还不太懂。”他陪笑道，“我也给你争取了，现在任务都收尾，你想的话，这里的职位都可以随便挑，参与以后的农业生产任务。不过，除了这个以外，也有别的选项。你看，我不是要调去城里嘛…”\n\n林箐转头看他。\n\n陈望也停下脚步，咽了口唾沫，开口道。\n\n“你愿不愿意和我一起去？”\n\n林箐笑了。"
SFR.419.a:0 "“当然，我们还得一起学跳舞。”"
SFR.419.a.tt:0 "§C土地改革以相对温和的方式实现了进展。§!"

SFR.420.t:0 "巡查"
SFR.420.d:0 "最后一次巡查从天刚亮开始。林箐和陈望先去了村东。原先属于乡绅的大片田地已经重新登记，田埂边插着新的木牌，写着歪歪扭扭的名字。一个扛着锄头的老人远远认出他们，放下东西便赶过来道谢，说自家终于分到了能种粮的地。\n\n林箐还没来得及回答，老人便从篮子里塞给她两个煮鸡蛋。\n\n“工作纪律，不收东西。”\n“自家鸡下的，不算东西。”\n\n老人把鸡蛋硬塞进陈望手里，转身便走。陈望追了几步没追上，只好把鸡蛋揣进兜里，想着之后丢给村委让他们吃得了，最近工作挺辛苦。\n\n跑完最后一处田产，两人又处理了一头拒绝服从重新分配的牛，最后由几个民兵发动钳形攻势勉强制住。等他们回到办公室，太阳已经升到头顶，鞋底全是泥。\n\n午饭是食堂送来的两盒饭，一盒多了块肉，另一盒多了半勺咸菜。陈望把肉推给林箐，自己拿走咸菜。\n\n“为什么？”\n“我又没干什么活。”\n\n林箐笑了一声，把肉夹回他碗里。\n\n“最近，这几个地方太平了很多。”陈望笑笑，想起以前处理的各种乱七八糟的纠纷，现在能遇到的最糟的情况也不过是多出来的鸡蛋这种飞来横祸，“最近全国都在收尾，我们也快了。”\n\n说到这里，陈望从文件袋里取出一张调令。\n\n“工作收尾以后，我要去城里。国家正在准备新的工业化计划，城市里就和当初的农村一样急需人员，我也被调走啦。”\n\n“什么时候走？” \n\n“月底。”陈望停了停，“我估计下周我们的工作就能正式收尾，交接的部分也快结束了。”\n\n林箐低头看着饭盒，筷子在米饭里轻轻拨了两下。\n\n“这是正式邀请？”\n\n“别整个苦瓜脸嘛。”陈望挠挠头，“我也给你争取了，你想的话，这里的职位都可以随便挑，参与以后的农业生产任务。不过，除了这个以外，也有别的选项。你看，我不是要调去城里嘛…”\n\n林箐抬头看他。\n\n陈望也停下筷子，咽了口唾沫，开口道。\n\n“你愿不愿意和我一起去？”\n\n林箐笑了。"
SFR.420.a:0 "“当然。”"
SFR.420.a.tt:0 "§R土地改革以相对强硬的方式实现了进展。§!"

SFR.500.t:0 "《关于当前远乡社会的考察报告》"
SFR.500.d:0 "致：[SFR.GetLeader.GetName]主席，最高主席团\n\n经过远乡各个地方工作组的基层调查，我们基本完成了对当前远乡社会的考察报告。\n\n首先是农村与农民群体，农民一直是远乡的主要无产阶级群体，也是我党在革命战争中的重要战友，虽然土地改革工作成功在基层实行，我们也完成了革命事业对于农民兄弟而言最重要的“分地”之事，但农村与农民群体依旧遭遇着旧文化和旧思想的毒茶。\n\n我们过去在革命战争中消灭的各类“旧风俗”再次复苏，他们以“保佑发财”、“风调雨顺”和“灭鬼驱邪”的名义来做伤天害理、聚众敛财和谋财害命的勾当，形式包括用活人给死人配婚、用人体器官宣传以形补形和用人命活祭所谓的“神灵”等等。\n\n除此之外部分农村由于民众知识水平有限，出现了各类传播疾病和各类由虫群形成的天灾，我们在基层尤其是广大农村地区需要进行爱国教育运动以及爱国卫生运动，让农村不变成害虫和疾病孕育的温床。\n\n关于土地改革也进入了收尾阶段，最基本的工作已经完成，但对于一部分愿意听从党的领导和接受改造的“好地主”进行甄别和改造，同理，城市的广大人民群众需要进行新的文化教育，用于区分我们与旧远乡社会完全的不同。\n\n城市社会环境与农村也是不妨多让，我们虽然消灭了旧远乡的最大势力，但各类狼和小苍蝇需要处理，旧警察还在进行改造，城市治安的空缺还是巨大的，经过工作组讨论建议组建由革命军人组成的城市治安力量。\n\n除了城市治安问题外，各个地区城市工会刚刚建立，其运行方式尚且稚嫩，这需要党更多指导和帮助，同时城市地区逐渐出现了一批新的群体，即临时工群体，他们主要以农村地区和战争流民组成，由于其身份的特殊性，其无法受到工会和法律的保障，工作组希望最高主席团能多注意这些群体，其特殊的属性代表着其不稳定性和缺乏安稳性。\n\n最后就是关于青年群体的问题，尤其是青年学生群体，由于其思想并没有得到完全的统一，仍需进行教育，且学生群体极其容易被煽动，非常容易成为反动派和境外势力制造混乱的工具，这是我们需要警惕的，希望能加强党的青年组织对学生群体的指导。\n\n敬礼"
SFR.500.a:0 "“我们的担子很重。”"

SFR.501.t:0 "焕然一新（1）"
SFR.501.d:0 "今天是廖平跟着爱国卫生队来南四义村的第一天，南四义村位于新乐与高唐边境的小村庄，由于是刚刚从北远乡王国的保皇派解放出来，当地人民群众还过着旧社会的生活，这里也是接受土改较为缓慢的地区，不过随着社会主义建设的进行，南四义也会随着时间被改变。\n\n这次爱国卫生车队以三辆卡车组成，包含了随队医生、退役士兵和工人志愿者，廖平坐在卡车的车厢里，青涩或成熟的人们坐在一起，他们来自各个医院、连队或工厂。\n\n“我叫王思敏，话说…你还记得怎么找老鼠洞吗？”一位年轻工人来到廖平旁询问着。\n\n作为随队的队医，廖平扶了扶眼镜说道：“首先要观察地上有没有鼠路，一般老鼠进行多次觅食后会逐渐形成明显痕迹，尤其是在田间地头……”\n\n廖平说着观察鼠路与辨别老鼠洞，之前热闹的车厢慢慢变成笔与纸摩擦的声响，廖平短暂停顿抬起头看着车内奋笔疾书的同志们，随后继续说道：“要检查洞口的光滑度，老鼠频繁进出，会使洞口边缘被身体摩擦得异常光滑……”\n\n作为一名刚刚参加工作的医学生，听惯了前辈和学长在医院工作的麻烦和“刁”民，廖平也认为比起出城市下乡工作，呆在医院里会更舒坦一些，但现在的廖平只感觉自己呆在这个名为“卫生队”的暖炉里过得更开心，不只是对眼下大伙对他目光的敬佩，也包括了他在过程中看到的“和谐”。"
SFR.501.a:0 "做要好百姓的猫，捉伤害百姓的鼠"

SFR.502.t:0 "被遗忘的他们"
SFR.502.d:0 "李光，他是个狗头人，这个名字是他还在矿场工作时，大伙给他取的名字，他来自沃姆，伴随着战争他跟着奴隶商人来到了远乡西北，在一次奴隶贸易中被贩卖给了山福镇的黑矿，自此他就没见到多少太阳。\n\n作为一名狗头人，他天生就身强体壮，在矿洞的圈子里被称为“大黑背”，大伙都喜欢他，因为呆在他身边不用怕被监工打，也能多分到一些吃的，因为李光并不会吝啬这些食物，但身边的大伙越来越少，伴随着时间他也记不清那些名字。\n\n在洞窟里很难感受到时间，工作开始他们会被丢入矿洞，随后被铁门隔开，唯一的数字只有监工鞭子打下来的次数，不过在小哑巴的帮下，李光凿开了一处岩缝，他们在岩缝里找到了时间，那是一丝纤细的光，当时的李光并不会远乡人的语言，但小哑巴发出了一个简短的声响，后来大伙通过沙画说小哑巴会说话了。\n\n伴随着光的流逝，岩缝会发出自己的声音，小哑巴说那个声音告诉他很快就有人来救他，翌日光线没有从岩缝中流出，但伴随着一声巨响，岩壁被炸开，随后便是满脸的光芒和尖锐的号声。\n\n他们被解放了，红军同志是这么说的，小哑巴用沙画说道。\n\n你决定去哪？李光用沙画说道。\n\n我准备加入红军，你呢?\n\n我也一样。\n\n在军队里李光也会说话了，但小哑巴不能了，在白洋城解放的战斗中小哑巴用炸药包打开了通往王宫的道路，可惜李光最后都没认识这位挚友。\n\n整理身上的军装和领口，李光抓起军帽盖在脑袋上，由于狗头人的头型跟人类不一样，他不怎么喜欢戴帽子，但今天是个重要的日子，李光用宽大的大手抚摸眼前这座墓碑，上面简单刻着“李哑巴烈士之墓”的字样。\n\n“李光同志，你的入党申请通过了，接下来你跟着我念，来面向党旗，举起右手。”\n\n“我志愿加入远乡共产党，永远跟着共产党走，一心一意为人民服务，拥护党纲党章，执行党的决议，遵守党的纪律，保守党的秘密，随时准备牺牲个人的一切，为全人类彻底解放奋斗终身。”"
SFR.502.a:0 "光，就在眼前！"

SFR.503.t:0 "妇女能顶半边天！"
SFR.503.d:0 "[SFR.GetLeader.GetName]坐在办公室内看着手中报告，伴随着革命的胜利，建设新远乡的工作中有许多困难和挫折，稚嫩的远乡工农大众在以自己方式改造这个新社会，正如眼前这一份建议和报告，是来自党内新兴干部的一份关于远乡妇女解放运动蓬勃发展的报告和提高妇女权利与义务的建议，大概扫了一遍，随后叹息一声将报告放下。\n\n这时秘书也从门外走了进来，看着主席的样子不免担忧道：“主席这是怎么了？”\n\n[SFR.GetLeader.GetName]抿了一口茶，说道：“年轻人们真是速度快啊，这么快就准备开始搞下一阶段的工作了。”\n\n“之前从同事那听说过，一些干部认为此举过于激进，认为现在踩油门容易让运动走歪路，最好进行渐进式改革。”\n\n“搞渐进式改革也容易走歪路，”[SFR.GetLeader.GetName]轻敲桌子说道：“容易让一些反动分子伪装成温和派，在内部搞鼓动、搞破坏。”\n\n[SFR.GetLeader.GetName]轻叹一声，然后拿起笔。"
SFR.503.a:0 "可以试试。"
SFR.503.b:0 "没必要。"

SFR.504.t:0 "焕然一新（2）"
SFR.504.d:0 "今天的南四义村依旧安静祥和，几个孩子在村外收割完的田埂上打打闹闹，其中一个男孩跑着步来到了小伙伴身边，玩耍的小孩们停下了动作看向跑来的男孩，其中一人忍不住发问：“六子哥这是怎么了？”\n\n被称为六子的男孩看着几人说道：“我刚刚瞅见几辆大车朝村口开过来了，我得赶紧去提醒村长，你们回去通知一下自家人！”\n\n随后六子便迈着小腿朝着一条前往村长家的捷径跑去，剩下的小孩则一哄而散。\n\n村长张清舜坐在村中心的大榆树下跟着几位孩子聊着过去的的故事，他曾经是一位旧书生，当初在南方考上了功名去到北边当官，但伴随着伟大战争的结束，远乡几乎变成了分裂状态，而在北方作为官吏的张因为支持南方的皇室，随后被罢了官，由于南北矛盾尖锐，互相通行的路口被设了关卡，于是他选择在南四义村成为了当地的教书先生，后来在解放战争时期老村长去世后被托付了新村长的职务。\n\n村子里也相当热闹，有的在晒稻谷，有的是在屋檐下歇息插科打诨，一副诗卷里桃花源的景象。\n\n这时伴随着远处传来发动机的声响，一辆卡车开进了村子里，村庄安静祥和被突然打断，队长从副驾驶下来，走到张清舜身旁，取出口袋里一封信件，交给后者便敬礼说道：“您一定是张清舜张村长吧，这个是我们连长的信，您之前寻亲的事情和结果都在信里了，至于我们是奉命来下乡搞卫生的。”\n\n话音刚落，廖平跟着队员已经下了车，开始建起了摊子，用作给村民检查的简易设施，几盒火柴也被摆到摊子上，一些结束农忙的村民走到旁边看着摊子被搭起来指指点点。\n\n张清舜接过信件将其揣入口袋后，对着队长摆了摆手说道：“乡亲们也是第一次见到这场景，关于卫生运动方面，小彭也跟我说过了，最近村北头的老刘家那边时常有老鼠的事，他们家媳妇也经常跟邻里抱怨，你们到时候看仔细一些…”\n\n话没说完，一个孩子穿过队伍跑到张清舜面前连忙说道：“村长爷爷，村长爷爷，他们都是粮子啊。”\n\n老村长则看着那小孩脸色涨红，随喘着粗气的模样，随后慢慢悠悠地说道：“是村南刘家小六子啊，他们不是丘八，他是之前来给我们分田的红军啊。”\n\n老村长领着小六子来到队长身旁，指着后者胸口的麦穗齿轮红星章说道：“六子你要记好了，这是红军的标志，如果你未来遇到了麻烦可以找戴着这个东西的人。”\n\n“对了，六子你到时候帮这些大人领个路，他们要去你家那抓老鼠。”老村长说完话，拍了拍六子的脑袋，后者闻言便往廖平那边的摊子走去。"
SFR.504.a:0 "秀才遇到红军，有理也能说清"

SFR.505.t:0 "焕然一新（3）"
SFR.505.d:0 "随后来到村中央的大钟前敲出一长一短一长的钟声，村庄再次恢复热闹，一些胆大的年轻村民来到槐树下看向廖平和卫生队的队友们。\n\n“乡亲们不要怕，今天是我们来村里帮忙打扫卫生的事，打扫出的垃圾可以来我们这换点有用东西，”廖平见老乡们靠近后说道：“另外如果抓到老鼠，可以把老鼠尾巴割了来换火柴，抓老鼠的手艺的我们也愿意教方法。”\n\n队长跟着六子来到廖平旁，等待后者说完话后说道：“廖平同志，有个任务交给你，你跟着六子小同志去他家一趟，彭清同志也在他家那边搞卫生工作，你带着几位同志过去帮忙。”\n\n“是，队长。”廖平带着几名队友，跟着六子往村北走去，越往北边走，也离四义山越近，随后走了几里路，几人来到一处茅草屋附近，一个穿着粗布衣服的年轻人抱着一捆木柴，一对年轻夫妇则在一旁站着闲聊。\n\n六子看到那对年轻夫妇跑了过去，廖平和队员也来到了这里，大概大量了一下那个抱木柴的年轻人，前者说道：“彭清同志你好，我们是刚刚到村子的卫生队，你这是准备熏老鼠吗？”\n\n彭清看清眼前之人放下木柴，握住廖平的手说道：“我确实这么做，同志怎么称呼？”\n\n“廖平，彭清同志我们带来别的工具，话说如果单纯熏老鼠也不至于用这么多木柴吧……”\n\n彭清放下手挠了挠头，一旁一直没怎么说话的的丈夫也有点支支吾吾，他的妻子摸了摸六子的头说道：“是这样的俺们家以前是吴地主的守坟人，因为每到一些节日，村里人就会带着些酒菜来祭祖，因为不好清理，附近就慢慢出现老鼠……”\n\n廖平思考片刻说道：“如果是坟地的话，需要多叫点人，我先回村子通知一下村长和队长，你们先用灭鼠药杀一顿。”\n\n告别后廖平将这件事告诉了在村里工作的队长，后者说道：“这样你跟张村长说一下，这个情况动员村民帮助了。”\n\n将事告知村长，经过后者的动员下十几名强壮的农户愿意帮忙清理坟地的鼠患，毕竟这件事关乎各家的祖坟，在卫生队的指导和村民的努力下坟地的鼠巢也被成功破坏，这也抓到了不少老鼠。\n\n工作结束后，小六子蹲在家门口看着将工具收回的村民和卫生队忍不住产生好奇：“为什么要除老鼠？”\n\n廖平摸了摸小六子的头说道：“我的老师说要让大伙不再生病和粮食要能丰收，首先就是要打扫好卫生，你说家里是不是有时候会有老鼠偷吃粮食，而我们今天就来帮大伙抓老鼠。”\n\n小六子似懂非懂地点了点头，彭清扛着工具地来到旁边，指着那一片坟说道：“搞好卫生不仅仅是为了保护家，做好卫生你也能早点长大。”"
SFR.505.a:0 "焕然一新！"

SFR.550.t:0 "《远乡工业考察报告》"
SFR.550.d:0 "……关于远乡工业具体技术情况见附件资料，以下为本报告简要概括的情况。\n\n远乡目前实现了一定程度的工业化，但大多局限在以首都为主的城市地区，乡镇与偏远地区大多缺少生产资料与技术。\n\n现有工厂技术大多落后于世界平均水准，且缺少大量拥有足够教育的熟练技工，导致多数工厂处于缺少维护的状态，在恢复生产时期造成了大量因设施老化与操作不当导致的生产事故。\n\n旧有的管理层缺少进步动力，在初期建设后便故步自封，拒绝任何对现状有所改变的行为，并且不接受任何培训与学习事宜，对技术扩散有着极其恶劣的影响。\n\n旧远乡王国时期的工业组织是依靠对工人高度压迫完成运转的，工人拿不到应得报酬甚至会被迫欠下对工厂的债务，形成事实上的债务奴隶与人身依附关系。且由于管理层漠视工人安全保护与生产培训，因生产事故导致受伤的情况在工人群体中占据多数，而重大生产事故所导致的死亡事件也并不少见，这些伤亡的工人并未得到合理补偿和医疗救治。"
SFR.550.a:0 "整顿之路道阻且长。"

SFR.600.t:0 "全国工会问题"
SFR.600.d:0 "工业相关的事宜很少出现在赵永军主席的桌前，大部分时间都是先递到中央进行讨论，随后主席再在讨论时发表自己的意见。而剩下来的时间，能跳过其他人直接到他面前的事情，大多只能由他先做好准备再送到中央去。\n\n就像这次工业口的领导亲自找了主席，就是因为全国工会这档事。关于这件事情赵永军有所耳闻，也预料到可能会出现很大的分歧，可却没想到工业口的同志直接来找自己。\n\n赵永军主席揉了揉太阳穴，这些日子以来他也听了不少人对工会问题的看法，而各个派系的意见也大都可以分为三种。\n\n第一种意见是直接让国家管控所有工会，让工会成为国家所管理的组织，这一提案大多受到党内较为保守的同志的青睐。可以预见的是，如果将工会直接交由国家管控，可以直接与中央的工业部门合作，在如何调度与培训工人这一方面可以省下不少资源，也有利于国家工业水平的发展。\n\n第二种则是认为应当多下放权力给工会，但仍然要归于地方政府管理。这一提案受到年轻同志们的喜爱，因为这样子可以让工会不至于变成一言堂，在中央推进建设时可以为工人争取更多利益，也不至于完全不与中央脱节，将工会变成地方对抗中央的工具。\n\n最后一种则是受到自治派和改革派的认同，他们认为应当把工会组建权力交给群众而非政府。这一观点认为工会的组建本身就是为了劳动者权益而非政府利益，前两种组织形式无疑是把工会变成了国家机器，从而使工会失去本应该为群众谋福利的立场。可想而知如果按照这一意见组建工会，群众能谋得更多利益，但是完全与政府脱节也容易花费大量资源用于两者的协作与交流。\n\n在这种没有意见能占据大多数的情况下，主席的意见无疑能给支持的一方带来压倒性优势，赵永军必须思考自己的选择会带来什么后果。思索良久后他提起笔，在自己的笔记上写下了自己的意见。"
SFR.600.a:0 "直接国控。"
SFR.600.b:0 "把更多权力下放，但仍要归地方政府管理。"
SFR.600.c:0 "为什么不直接学习南巴模式？"

SFR.601.t:0 "今年的工业计划"
SFR.601.d:0 "每年的今天都是工业部门同志的受难日，资料与报告像是小山一样堆积在办公桌前，工业部门的同志们或是低头苦干或是抱着材料在办公室之间来回奔波，甚至到凌晨还能见工业部门办事处灯火通明。\n\n往后一整年的发展都需要今日的劳累打下基础，而不同的发展方向也递到了中央的桌前，该是决定专注于何处的时候了。"
SFR.601.a:0 "专注促进内需"
SFR.601.b:0 "专注扩大生产"
SFR.601.c:0 "专注全国建设"

SFR.602.t:0 "工厂轰鸣..."
SFR.602.d:0 "随着下班铃的响起，二狗子也按照工作流程关闭了机床。他抬起头擦了擦汗，如果这个月不出什么意外的话，他能在年末拿到先进工人表彰，除开该有的奖金和表彰以外，他也有机会拿着厂里的名额去首都的学校里深造。\n\n如果放在几年前，二狗子可能想都不敢想自己能有现在这种待遇。\n\n起初他因为家里养不起那么多口人，只好一个人来城里找份差事养活自己，可却一不小心入了黑工厂。这工厂不仅不给钱不说，厂里吃喝用度甚至是工具都要工人出钱，老工人都说这里的工头轻则打骂工人，生气了还要找混混把那些敢顶嘴的人活埋到工厂旁边的小树林里。\n\n不过他运气还算不错，在工厂里受了几个月的苦就等到了革命阵线的解放。那老板被请去阵线里“喝茶”，而工头也被吊死在了工厂外的路灯上，那些被活埋的受害者也被阵线战士们挖了出来，重新立了碑入土为安。\n\n原本按照政策来说，二狗子回家可以领到好几亩地安安心心当个农民，可当政委问他想不想继续在工厂里干的时候，他鬼使神差地点了点头，跟着阵线接受了生产培训与安全教育。\n\n等他回到这厂里继续工作的时候，新来的工头——现在应该叫组长了，客气地叫他一声老苟。他除了继续在机床前做零件以外，也开始教那些新入厂的工人们该如何安全生产。\n\n从二狗子变成了老苟，他还是在机床前做着零件，只是从那掉零件的机床变成了锃光瓦亮的新机床，从最普通的零件变成了最精细的零件。附近一座座工厂拔地而起，而他经常被请去那些厂里给工人们做安全培训。\n\n从回忆里回到现实，老苟也收拾好了自己的工位，等到他检查完没有哪个小崽子违反生产规则以后，黄昏的光线已经落在工厂的墙壁上。\n\n他顺着光朝墙壁看去，那曾经是一面掉漆的墙，而现在则被年轻工人们收拾得干干净净，上面写着他们美好的愿望——"
SFR.602.a:0 "我们要追赶世界一流行列！"

SFR.650.t:0 "发掘祖国的潜力"
SFR.650.d:0 "远乡的潜力在于哪里？有人会说是丰富的矿产，有人会说是广袤的土地，而革命者会说，这片土地上的人便是这个国家最大的潜力。\n\n但在过去因为各种各样的缘由，导致远乡庞大的乡村人口基本上没有得到妥当对待，耕作的人没有立锥之地，劳苦的人仅有果腹之食。\n\n在农村公社运动的当下，我们最需要的便是让农民有自己的耕地可以劳作，而大规模的土地踏勘便是其中的一环。如果掌握了土地的实际情况，之后的分配、公社化亦或者是建设与挖掘也无从谈起。"
SFR.650.a:0 "我们还能进一步建设。"

SFR.651.t:0 "公社规模问题"
SFR.651.d:0 "农村公社运动如火如荼，已经有大大小小的公社出现在各地的农村中。但有些风声已经传到中央的耳中，有些公社之间因为地界与资源划分不够合理，又或者认为某些大公社以大欺小，公社与公社之间或多或少积累了些许矛盾。\n\n为了将这种问题扼杀在摇篮中，中央已经在讨论是否要规制公社的规模，或者是让中央统一建设大型公社，又或者继续大小公社并存状态。"
SFR.651.a:0 "中央统一建设大公社"
SFR.651.b:0 "继续大小公社并存"
SFR.651.c:0 "交由地方政府建设小规模公社"

SFR.652.t:0 "农村集市贸易问题"
SFR.652.d:0 "农村集市在过去是农民们为数不多进行商品交换的地方，大多数农村地区的居民依靠集市来出手自己手上的农产品，也在这里为家庭购置油盐酱醋与日常用品。\n\n公社化对农村集市的影响很大，有些地方的同志认为农村集市是“走资本主义道路”，是小农主义思想，全然不顾现实需求的存在。\n\n为了避免因公社化导致农民无处进行商品交换，目前来说有三种办法解决此类问题。\n\n其一，是由公社和政府统一收购统一销售，增加供销社；其二，便是允许农村居民进行经营在许可范围内的副食品交易；其三，便是将农村集市改为固定的农贸市场，由政府指定场地进行买卖，以方便进行规范化交易与监督。"
SFR.652.a:0 "统购统销，增开供销社"
SFR.652.b:0 "允许农民自营部分副食品"
SFR.652.c:0 "农贸市场是个不错的选项"

SFR.653.t:0 "自留地问题"
SFR.653.d:0 "在革命早期，为了争取农村地区的支持，革命阵线会将根据地的土地进行均分给当地居民，做到人人都有耕地。而到了现在，公社化的前提便是统一使用当地土地进行劳动，虽然大部分土地归于公社而非个人，但农民手头上仍然会有一部分自留地的存在。\n\n在地方上对于自留地的规模已经有了不少矛盾，有的同志认为留一部分土地方便养鸡养鸭就好；有的同志却认为农民需要更多土地来促进积极性，也好让农村群众安心，不让他们认为中央出尔反尔分了地又要收回去。\n\n又或者我们可以确认一个下限，然后将问题丢给地方，让地方自行决策该如何处理自留地。"
SFR.653.a:0 "只留一小部分方便副业"
SFR.653.b:0 "调高下限，交给地方决策"
SFR.653.c:0 "多扩大一些，促进积极性"

SFR.700.t:0 "纪念碑"
SFR.700.d:0 "警卫员推着轮椅，沿新铺好的石路缓缓向前。叶文石披着厚外套，双手放在膝上，目光始终落在远处的纪念碑上。赵永军与刘青兰走在两旁。三人谁也没有催促，只听见轮椅碾过石缝时轻微的颠簸声。\n\n碑前摆着许多花。碑面没有刻下某个党派或某支军队的名字，只写着一句简单的话：\n\n献给一切为远乡人民而战的人。\n\n他们在那里停了很久。\n\n“我是真的老了。”叶文石忽然说道，“现在连站一会儿都做不到。好在你们接过了国家，保卫了革命，帮助远乡建设到了今天的地步，不然我恐怕会成为大罪人。”\n\n赵永军笑了一下，又叹了口气。\n\n“我也不年轻了。有时开完一天的会，第二天连腰都直不起来。我总是担心哪天突然倒下，结果许多事情来不及安排好，闹出乱子。”\n\n“我也一样。”刘青兰望着碑上的文字，“年轻干部越来越多，可有时候还是忍不住想，他们能不能把国家建设好。”\n\n叶文石听完，只是轻轻笑了。\n\n“我们当年也没人教。走错过，摔倒过，还把不少事情弄得一团糟。”\n\n他抬起头，看向远处的广场。放学的孩子跑来跑去，你追我赶；年轻的工人坐在台阶上休息；几位老人在石桌旁下棋，时不时还和小孩聊上两句。\n\n“只要人民还在，就用不着担心这些。”叶文石说道，“等我们都不在了，还会有人接着走。几十年，几百年以后，他们会走到我们一辈子也到不了的地方。我晚上有时候会做梦，梦到世界人民团结起来，梦到这世界不再有战争，饥饿，分离，梦到我们曾所设想的一切，那些敢提出的，不敢提出的，能做到的，不能做到的，都实现了。”\n\n风吹过广场，花束间的红绸轻轻摆动。叶文石再次望向纪念碑。那些熟悉或陌生的名字沉默地刻在石面上，阳光从碑顶缓缓落下。他感到自己平日里空虚的身体突然得到了一股力量的支持，他转头看去，那些光里的人，那些熟悉的，不熟悉的，最可爱的脸孔；为人民而奋战，为人民而牺牲；在江洲的轮船旁，在平京的街道上，在正泸的山林里，在远乡每一个角落，不屈而勇敢的灵魂，他们都来了。\n\n疲惫之人靠在轮椅上，终于露出了释然的笑容。"
SFR.700.a:0 "我们走在大道上。"
SFR.700.a.tt:0 "§R至此，南远乡革命阵线的故事告一段落。§!\n§g在此，全体灵钢协奏曲制作组感谢您的游玩！如果您有希望反馈的问题，或是希望参与制作，可以加讨论群587058896反馈。§!"

SFR.750.t:0 "今日之世界"
SFR.750.d:0 "主席亲启：\n\n根据外交部门汇总的最新情报，东巴斯蒂亚当前局势仍在持续恶化。数年前，沃姆帝国长期积累的经济问题已引发全面危机，中央政府失去对地方的有效控制，各派武装相继起兵，帝国领土由此陷入内战并迅速分裂，陷入全面内战。\n\n前奥罗日亚联合王国辖区的情况同样不容乐观。战争破坏了原有的行政与贸易体系，地方政权、军事集团及各类政治组织彼此争夺，边境冲突与难民流动仍在扩大。\n\n今日之世界，已与远乡革命开始之时大不相同。全国统一使我国获得了参与地区事务的基础，但新政权的国力、军备与外交体系仍待恢复。为确保新远乡在东巴斯蒂亚站稳脚跟，各部门必须审慎判断局势，并为可能出现的变化做好准备。"
SFR.750.a:0 "小心为上。"

SFR.751.t:0 "西北地区历史的简报"
SFR.751.d:0 "东巴斯蒂亚大战期间，远乡军队在西北战线失利。依照战后条约，我们被迫将西北边境的山河、石岭与清河等地区割让给沃姆帝国。当地拥有一定规模的矿产、城镇与人口，其居民主要由麟人与戈尔维亚人组成。\n\n沃姆政府随后将这些地区交由顿恩骑士团管理。此后数年间，骑士团逐步接管当地行政、驻军与资源开采事务，西北地区也由此脱离远乡政府的实际控制。\n\n如今，全国已经统一，旧日割地仍在国境之外。我们应当开始整理当地资料、评估边境形势，并为收回这些领土做好准备。"
SFR.751.a:0 "远乡，一点也不能少。"

SFR.752.t:0 "西南地区历史的简报"
SFR.752.d:0 "东巴斯蒂亚大战期间，远乡军队在西南战线战败。依照战后条约，我们被迫将安平、丰原与海宁等地区割让给吉拉尼亚大公国。当地原以麟人居民为主，拥有一定规模的城镇、农田与沿海设施。\n\n吉拉尼亚政府接管这些地区后，陆续迁入部分吉拉尼亚移民与晶裔贵族，并由他们掌握地方行政、土地与主要产业。原有麟人居民则受到迁徙限制、财产征收与身份差别等政策影响，逐渐失去对当地事务的控制。\n\n如今，全国已经统一，西南故土仍在国境之外。我们应当整理当地资料、评估驻军与民情，并为收回这些领土做好准备。"
SFR.752.a:0 "远乡，一点也不能少。"

SFR.753.t:0 "远乡向我们索取土地！"
SFR.753.d:0 "远乡政府已向我们递交正式照会，要求移交其宣称拥有主权的领土。对方希望通过外交方式解决争议，并正在等待我们的答复。"
SFR.753.a:0 "给他们吧。"
SFR.753.b:0 "门也没有！"

SFR.754.t:0 "水晶族裔问题"
SFR.754.d:0 "主席亲启：\n\n随着西南地区重新纳入中央管理，当地水晶族裔的处置问题亟待解决。这些居民多数在吉拉尼亚统治时期迁入，部分家庭已在当地定居多年。\n\n目前有两套方案：其一，允许他们自行选择是否接受新政府管理并融入当地社会，对拒绝者安排迁往其他地区；其二，将水晶族裔统一迁出西南，同时提供必要的人道主义救助。后一方案需要更多运输、安置与物资支出，但可减少后续的族群矛盾与地方治理压力。"
SFR.754.a:0 "让他们自己选择。"
SFR.754.b:0 "赶走，只提供人道主义救助。"

SFR.800.t:0 "未来的方向？"
SFR.800.d:0 "全国统一后，我们终于可以将目光越过国境，重新审视新远乡在世界上的位置。各地旧秩序仍在动摇，革命运动不断兴起，围绕制度与利益展开的战争也尚未结束。\n\n随着局势发展，我们终将面对是否向外传播革命的问题。新远乡可以加入现有的革命阵营，与理念相近的国家共同应对敌人，但也可能因此卷入与自身利益无关的战争；我们也可以保持独立，自行建立合作体系，承担起东巴斯蒂亚革命堡垒的责任。"
SFR.800.a:0 "我们终将做出决定..."

SFR.801.t:0 "意识形态外交？"
SFR.801.d:0 "主席亲启：\n\n外交部门现提请确定我国今后的对外往来原则。若实行以意识形态为基础的外交方针，我国将优先发展与左翼国家及革命组织的关系，并降低与非左翼政权的交往等级。除必要的通商、领事与事务性接触外，双方原则上不再开展更深入的政治及军事合作。\n\n这一方针有助于集中外交资源，强化与相近国家的联系，减少外国势力对国内政治的影响，并降低人员往来与合作项目造成情报泄露的风险。\n\n若不采用这一方针，我国将继续根据实际利益分别处理与各国的关系，不因其政治制度预先限制外交往来。"
SFR.801.a:0 "没什么问题，就这么做。"
SFR.801.b:0 "还是算了。"

SFR.802.t:0 "大量侨民归国建设"
SFR.802.d:0 "主席亲启：\n\n面向海外麟人及其后代发出的回国建设号召取得了显著回应。近期，各驻外机构收到大量返乡申请，其中包括工程师、医务人员、教师、技术工人及具有经商经验者，部分家庭亦决定携带资产长期定居。\n\n有关部门正集中安排身份登记、交通接送、住房分配与就业安置，并将根据各地重建需求调配返乡人员。"
SFR.802.a:0 "这是好事啊。"

SFR.803.t:0 "一些侨民归国建设"
SFR.803.d:0 "主席亲启：\n\n面向海外麟人及其后代发出的回国建设号召得到了一定回应。目前，各驻外机构已收到一批返乡申请，人员包括技术工人、教师、医务人员、商人及其家属，部分申请者计划长期定居。\n\n有关部门正在安排身份登记、交通接送与就业安置，并将根据各地建设需要分配返乡人员。"
SFR.803.a:0 "也不错。"

SFR.804.t:0 "少量侨民归国建设"
SFR.804.d:0 "主席亲启：\n\n面向海外麟人及其后代发出的回国建设号召已告一段落。各驻外机构收到的返乡申请数量较少，申请者主要为技术人员、工人、商人及其家属，其中多数计划长期定居。\n\n有关部门将完成身份登记、交通接送与就业安置，并根据各地实际需要安排返乡人员。"
SFR.804.a:0 "好吧。"

SFR.850.t:0 "理想终将实现"
SFR.850.d:0 "革命走到今天，已经越过了前人从未抵达的界线。\n\n从远乡山林间最早升起的红旗，到解放战争席卷全国，再到工农军队跨越国境、奔赴东巴斯蒂亚各处，我们走过了漫长的道路。旧王朝、军阀、贵族与反动政权相继倒下，曾经被边境、族群与旧制度分隔的人民，如今生活在同一片天地下。\n\n东巴斯蒂亚已经彻底摆脱反动势力的统治，但战争的结束并非建设的终点。各地的革命政权、工农组织与人民军队需要被团结起来，在共同制度下恢复生产、重建交通、保障民生，并结束长期分裂带来的混乱。\n\n我们将以平等联合为原则，建立东巴斯蒂亚社会主义联盟。自此以后，这片大陆不再属于君王、贵族与军阀，而将由劳动人民共同管理。过去未能实现的理想，终于成为了肉眼可见的现实。"
SFR.850.a:0 "...而我们将前往更远的远方！"
SFR.850.a.tt:0 "将成立§t东巴斯蒂亚社会主义联盟§!。\n§R“天翻地覆慨而慷，人间正道是沧桑。”§!"

SFR.900.t:0 "军队现状报告"
SFR.900.d:0 "送到军委桌上的报告并不厚，却足够让所有人沉默许久。\n\n从最初举起红旗开始，革命阵线的武装就从未真正富裕过。最早的游击队没有统一番号，没有稳定补给，我们不得不从全国各地踏上行军的道路。\n\n许多人没能走到根据地，没能活着看到新国家的成立。\n\n有些战士拿着从旧仓库里翻出的步枪，有些人甚至只能背着土制炸药和大刀，跟在老兵身后学习如何战斗。那时候，能活下来就是胜利，能保住一支队伍就是奇迹。没有人有资格嘲笑那些山沟沟来的战士，因为正是他们的牺牲才有了今日的新远乡。\n\n可现在不同了。\n\n南远乡地区已经解放，反动派的旗帜从各地司令部降下，人民终于不必再躲在地窖里等待和平的降临。然而，胜利带来的并不只有欢呼。各支部队的编制混乱不堪：山地游击队、工人纠察队、临时起义民兵、倒戈的士兵被匆忙塞进集团军；武器散落民间，弹药、炸药登记混乱不堪，已经造成了多起伤亡事件；许多连队完全停摆，有些军官甚至不知道该向谁汇报。更糟的是，游击战争时代的弊端已逐步显现，有些地方部队自行其是，几乎脱离中央控制。\n\n报告的最后一页写得很短——\n\n必须立刻开始军队改革。统一番号，遣散冗余人员，清点装备，重建指挥链，恢复训练制度，整肃军纪，现代化军事理论，调整军事工业，并且推行海空军的建设。\n\n有人合上报告，低声说：“我们打下了这个国家。”\n\n很快，另一个声音回答：\n\n“现在，我们要学会守住它。”"
SFR.900.a:0 "我们要建设人民的军队！"

SFR.901.t:0 "武装民兵问题"
SFR.901.d:0 "在游击战争最艰难的日子里，武装民兵曾是根据地赖以生存的一部分。他们熟悉山路，认识每一条小径，知道哪些树林适合伏击，也知道敌人来时该把粮食、药品和枪支藏到哪里。没有他们，许多部队根本熬不到今天；没有那些由农民、工人、学生和退伍兵临时组成的队伍，革命阵线恐怕早就在一次又一次围剿中被碾成灰烬。\n\n但胜利以后，问题就摆在了桌面上。\n\n各地民兵组织并没有随着反动派政权的崩溃而自然消失。相反，许多地方的武装委员会开始掌握实际权力：他们设立路卡，检查来往行人，私自扣押“可疑人员”，有的甚至开始自行征收粮食和物资。更麻烦的是，不少地方民兵只听本地干部或老指挥员的命令，对中央下达的整编、缴械和调动命令拖延敷衍，形成了明显的地方山头。\n\n因此，一部分观点认为，若放任他们在当下规模继续掌握武器，则地方治安要么恶化，要么则中央失去对地方的控制权，或是两者皆有。\n\n然而，要缩减规模，就必须给人安排去处。正规部队可能没有能力接收大批量的新兵员，生产岗位也是同理，地方政府也需要参与安置工作，但也不是每个地方都有能力承担这份责任。但如果不做好安置，这些熟悉武器又缺乏生计的人很快就会变成山匪、走私团伙，恶化地方治安。\n\n军队内部也并非没有反对声音。部分指挥员认为，武装民兵是人民战争的根基，若过早削弱地方武装，等于主动砍掉革命最灵活、最广泛的力量。他们主张继续扩大民兵体系，让每个村镇都能在战争到来时立刻武装起来。\n\n此外，还有一些观点认为不应该在规模上做大的改变，而是就体制开始一系列改革，使得武装民兵的体裁更符合新远乡人民的利益，同时也能成为协助地方政府的一份新力量。"
SFR.901.a:0 "应该做一些裁剪。"
SFR.901.b:0 "维持现状，做一些改革。"
SFR.901.c:0 "进一步扩大民兵规模。"

SFR_constitution_generic_tt:0 "§C制宪会议结束后，§!"

SFR.2000.t:0 "制宪会议"
SFR.2000.d:0 "清晨的平京在迷雾中总是透着神秘和平静，位于城市中心的一处崭新建筑似是诉说着这个国家的新篇章，而对于正端坐在大会堂的代表们而言内心如一块顽石以布满裂纹，他们或是手掌粗糙满脸皱纹，或是气宇轩昂面露青涩，他们里有工人、农民、红军战士、行政干部、知识分子或开明士绅。\n\n他们的目光不约而同地注视着正前方的高台上，现如今远乡革命阵线最高主席团的成员，高台上挂着带领远乡人民从绝境中重生的叶文石主席像和解放全远乡的[SFR.GetLeader.GetName]主席像。伴随着大会召开的宣读下，掌声如潮水般涌来，[SFR.GetLeader.GetName]站在演讲台对着代表们说道：“这次会议的任务是：制定宪法；制定几个重要的法律；通过政府工作报告；选举新的国家领导工作人员。我们这次会议具有伟大的历史意义。这次会议是标志着我国人民从新远乡建立以来的新胜利和新发展的里程碑，这次会议所制定的宪法将大大地促进我国的社会主义事业。我们的总任务是：团结全国人民，争取一切国际朋友的支援，为了建设一个伟大的社会主义国家而奋斗，为了保卫国际和平和发展人类进步事业而奋斗。”\n\n制宪会议上的各派成员因思想和立场逐渐泾渭分明，他们都准备好了各自的提案和成果，议论着现在的困难，辩论着各自的方案，畅想着美好的未来，无论过去他们是在高山，还是在深谷，站在这里的他们是平等的，他们排着队将手中轻易撕碎的纸如拿秤砣般重重投下。\n\n一条条法案被通过或被摒弃，代表们思想的界限也变得清晰可见，远乡数百年来的顽石也终将碎裂。" 
SFR.2000.a:0 "工农代表占据绝对多数！"
SFR.2000.b:0 "民主派代表脱颖而出。"
SFR.2000.c:0 "稳健派与平京帮主导一切。"
SFR.2000.dd:0 "强硬派与技术官僚加强发声。"
SFR.2000.e:0 "尝试在各派系之间维持平衡。"

SFR.2001.t:0 "权力与平衡"
SFR.2001.d.a:0 "大会堂内[SFR.GetLeader.GetName]站在演讲台上，随后拿起稿件宣读道：“代表同志们，今天的议题是关于全国各级单位责任分配事务，首先是关于大会……”\n\n作为一个崭新的国家，它就像一部庞大的机器，各级机构是其中的齿轮，而权力则是齿轮间的润滑剂。\n\n台下来自各个单位和地区的代表相聚一堂：新远乡建立后产生的工农联盟和少部分温和社会主义者希望加强工农代表大会的作用，能让远乡人民有可以发出声量的地方，也可以保障地方的部分利益。\n\n军委的将军们和一部分党内鹰派认为比起让新生的工农代表大会作为龙头过于稚嫩，而一直为党战斗的军委同志们拥有更大自信和能力来塑造国家。\n\n党内的元老和进入中央的新生代干部则认为新远乡刚建立，现如今理应集中权力干大事，最高主席团和中央工作的干部们理应是新远乡政治的核心。\n\n激进的知识分子、地方进步人士和各地民主党派代表们认为建设新远乡应该以自下而上的方式，所以地方理应获得更大权力，这样才能够大展拳脚。\n\n经过漫长的会议和讨论，事关新远乡权力与平衡的方案摆到[SFR.GetLeader.GetName]。"
SFR.2001.d.b:0 "大会堂内[SFR.GetLeader.GetName]站在演讲台上，随后拿起稿件宣读道：“代表同志们，今天的议题是关于全国各级单位责任分配事务，首先是关于大会……”\n\n作为一个崭新的国家，它就像一部庞大的机器，各级机构是其中的齿轮，而权力则是齿轮间的润滑剂。\n\n台下来自各个单位和地区的代表相聚一堂：国民议会建立后党内右派代表、新生的远乡社会党代表和地方各类民主党派成员希望通过加强国民议会的权力，通过这个举措让其成为新远乡的龙头。\n\n军委的将军们和一部分党内鹰派认为比起让新生的国民议会作为龙头过于稚嫩，而一直为党战斗的军委同志们拥有更大自信和能力来塑造国家。\n\n党内的元老和进入中央的新生代干部则认为新远乡刚建立，现如今理应集中权力干大事，最高主席团和中央工作的干部们理应是新远乡政治的核心。\n\n激进的知识分子、地方进步人士和各地民主党派代表们认为建设新远乡应该以自下而上的方式，所以地方理应获得更大权力，这样才能够大展拳脚。\n\n经过漫长的会议和讨论，事关新远乡权力与平衡的方案摆到[SFR.GetLeader.GetName]。"
SFR.2001.a:0 "强化大会权力"
SFR.2001.b:0 "强化国民议会权力"
SFR.2001.c:0 "加强军委的存在"
SFR.2001.dd:0 "集中行政力量"
SFR.2001.e:0 "部分职责下放地方"

SFR.2002.t:0 "经济条款"
SFR.2002.d:0 "秘书处内干部们正将每个法案、文件和报告分类整理，已经回到中央工作的刘继尧也在其中，他看着各个党派不同的报告和方案不禁头疼。\n\n“老刘你先去休息吧，这边有我看着就行。”一个皮肤黑黝黝穿着正装的工作人员将一杯茶递给刘继尧搭话道。\n\n“老郝啊，这里我看着更放心一点，这些娃干起事来毛手毛脚，之前让他们把去年经济报告往主席团送，结果送的是前年的。”抿着茶的刘继尧看着老郝说道。\n\n“好了好了，年轻人这样是正常了，话说大会那边怎么样了？”\n\n“大会那边嘛，今天是关于工商运作的问题，那叫个热闹啊，我看那些一直说‘百花齐放’的老家伙和刚上来的年轻人们吵得厉害。”\n\n“我倒觉得没什么，起码挺热闹。”\n\n一旁工作的其他干部听到这话不免失笑，刘继尧将空茶杯放到远离文件的空位后说道：“无论现在搞公还是搞私，先把手上有的工作搞好才重要。”\n\n话音刚落，一位穿着正装的干部推开门走了进来，屋内一瞬间安静下来，他将一份档案放到桌面，随后慢慢说道：“同志们，大会的经济条例发下来了，接下来辛苦各位整理了。”\n\n随后他便如闪电般离开秘书处，刘继尧和老郝面面相觑，随后将目光放在那份新鲜出炉的经济条例上。"
SFR.2002.a:0 "国营为主、合作社为辅"
SFR.2002.b:0 "公私合营、统筹兼顾"
SFR.2002.c:0 "重点项目先行"

SFR.2003.t:0 "权利与监督条款"
SFR.2003.d:0 "制宪大会依旧在如火如荼的进行着，不过相较于之前的议题各个派系间的火药味少了许多。\n\n大部分代表都在等着看一场好戏，远共党内高级干部对于权利与监察条款的看法各有不同已经被各个派系代表所熟知，对于他们而言权利与监察条款并不会影响他们的行政工作。\n\n在有关公民权利作为宪法核心的看法上，党内“老革命”和“红小将”在此事上达成了共识，新远乡建立在人民对于党的信任上，解放战争的胜利是由人民促进的，而作为无产阶级的先锋队理应在此事上坚定立场。\n\n在东巴斯蒂亚日益复杂的国际环境下，中央军委的代表则觉得理应强调国家安全的重要性，要武装保卫新远乡的革命胜利果实。\n\n而党内另一批强调自由权利和经济右派的改革派人士认为，应该加强民众对于政府的监察和纠错机制，保障人民的自由权利和利于政府自我革命。\n\n伴随着会议的进行，代表们最终达成了共识。"
SFR.2003.a:0 "强调公民权利条款"
SFR.2003.b:0 "强调国家安全条款"
SFR.2003.c:0 "强调群众监督与纠错机制"

SFR.2004.t:0 "开始表决！"
SFR.2004.d:0 "伴随着钟声敲响，最后的条例也完成通过，接下来便是关于《远乡人民民主共和国宪法》通过表决了。\n\n[SFR.GetLeader.GetName]再次站到宣讲台前，轻咳几声后发言道：“各位代表同志们，制定远乡人民民主共和国宪法，在我国国家生活中，是一件具有重大历史意义的事情。我国的第一届工农代表大会第一次会议的首要任务，就是制定我国的宪法，这十几天来也是辛苦各位的付出了……”\n\n伴随着演讲的进行，当天出席工农代表大会会议的数千名名代表亲眼见证了新远乡第一部宪法的诞生。\n\n浅红色的表决票上，分别用远乡各族人民文字印着“通过远乡人民民主共和国宪法”的字样，顶部的长方格是投票人同意画圈或者不同意画叉的地方。当这张表决票分发到代表手中的时候，大家的心中都溢满了激动与兴奋。为了画好这神圣的一票，许多代表都竭尽全力将那个代表着同意的圈画得特别圆，因为在他们的心中，这个圆代表的是对未来人民幸福生活的保证。\n\n整个会场划分成8个选区，分别设置了8个投票箱。伴随着钟声再次敲响，投票开始。大会执行主席、秘书长、监票人首先把已画好的表决票投入票箱，然后代表们依次走到红色票箱前进行投票。十分钟后，代表全部投票完毕。\n\n伴随钟声最后的敲响，象征着旧远乡的顽石将彻底粉碎。"
SFR.2004.a:0 "让我们看看结果如何。"

SFR_education_generic_tt:0 "§C新教育体制通过后，§!"

SFR.2010.t:0 "新教育体制提案"
SFR.2010.d:0 "在旧王国时期，大部分学校都缺少统一的教育机构。政府对公立教育的投入大多限制在几个大城市中，甚至更关注于大学而非基础教育，这就导致了大多数人想要求学要么得去千里之外的大城市，要么只能去上私立学校。\n\n而私立教育大都按照学生的财产情况进行录取，越是优秀的学校越是要看重经济水平与社会地位，而在平民中只有少之又少的天才才能破格被其招收。\n\n为了让大多数人都能得到受教育的权力，建立统一的教育机构势在必行。中央要加大对公立教育的投入，并且提供并规范升学标准，将学生录取的标准公开化透明化。\n\n多数同志都不会对此方案有什么建议，在满足基础教育的前提下，大多数群众可以按照自己的经济条件和需要去参与学校的录取考试，这一标准也超过了大陆上绝大多数国家的情况。可有些同志对此表示异议，认为这样子还是存在教育不公现象，会导致穷人的孩子因为实际情况而无法接受足够的教育，导致穷人越穷富人越富，形成事实上的阶级屏障。\n\n他们提出的方案是进行强制性的全国升学考试，并且统一考试标准，避免某些人可以通过关系与人情绕过国家制定的标准。而更激进的同志认为，干脆高等教育也按照此标准进行，学校录取大多数学生都将依靠统一考试得出的分数进行录取。\n\n最后的决定全仍然留在中央的手里，虽然最初的提案能够满足大多数人的需求，但后两者方案对国家教育的普及是显而易见的，而其所花费的资源与可能遇到的反对情况也是显而易见的。"
SFR.2010.a:0 "设立统一教育机构，并提供升学标准。"
SFR.2010.b:0 "强制要求升学考试，统一全国考试标准。"
SFR.2010.b.tt:0 "这会使得法案更难§R用正常手段§!通过。"
SFR.2010.c:0 "在此基础上，进一步拓展到高等教育。"
SFR.2010.c.tt:0 "这会使得法案异常难§R用正常手段§!通过。"

SFR.2011.t:0 "偏远地区考试加分？"
SFR.2011.d:0 "在决定如何处理教育体质的法案以后，我们仍然遇到了一些阻力，有些派系对法案仍然有微词，其中意见最明显的就是自治派与各地民主党派。\n\n抛开民主党派千奇百怪的问题不谈，自治派的同志们认为并不是所有地区都能享受到同等的教育资源，多数情况下仍然会因为现实因素而产生教育资源不平等的情况。\n\n他们认为应当为那些偏远地区与贫困地区准备考试加分政策，不然很容易出现某些地区因为有着更好的教育资源而长期霸占优质学校的录取资格，而那些本就无法享受到足够教育资源的学生会被政策阻挡在学校大门外，这无疑会加深地区之间的隔阂与地方主义的滋生。\n\n而部分能够形成统一意见的民主党派认为，只是仅限在地区上的帮助政策仍然不足以弥补教育资源的差距，不同的种族、地区甚至是专业与身体状况也是应当考虑的事情，但这种提议对大多数人来说也过于激进了。\n\n简单来说同意这些建议可以给法案的通过带来更大的可能性，可为此产生的不满与花费是我们需要考虑的事情，又或者我们可以当作什么也没看见，搁置这些提议直到法案通过为止。"
SFR.2011.a:0 "这不好吧。"
SFR.2011.b:0 "可以，但仅限部分地区。"
SFR.2011.b.tt:0 "§C这会使得法案稍微容易通过。§!"
SFR.2011.c:0 "将范围扩大到全国的少数群体，不论种族，地区。"
SFR.2011.c.tt:0 "§2这会使得法案更容易通过。§!"

###新闻###
SFRNews.1.t:0 "远乡内战结束"
SFRNews.1.d:0 "自东巴大战以来，郑氏王朝在远乡的统治摇摇欲坠。为了巩固自身权力，前国王郑钧撕毁了前任国王与革命党和共产党达成的协议，并对两党发动了残酷的清洗。然而，这没有被打倒两党，反而使得两党组成了革命阵线，在此过程中，革命阵线中的左派顶住了阵线内外的压力，逐渐占据了革命阵线的主导地位。并于今日彻底控制整个南远乡地区，终结了郑氏王朝在南远乡地区的统治，同时打败了盘踞于东南海岸的青天军。\n\n新生的南远乡革命阵线政府宣布，革命的红星已然照耀远乡。革命阵线将继续领导远乡人民走社会主义道路，未来的社会主义远乡一定会是一个繁荣、民主、平等的远乡。世界上的大多数社会主义者对此欢欣鼓舞，认为这是社会主义在远乡的胜利，更是远乡人民的胜利。\n\n然而，并非所有人都愿意看到社会主义在远乡的胜利。远乡内外的贵族普遍对革命政权持强烈反对态度。东巴的非社会主义国家也对新生的社会主义远乡持负面看法，强烈谴责了革命阵线对旧贵族的暴力清洗和财产剥夺。可以预见的是，无论远乡的革命者是否履行自己的诺言，远乡的未来都将充满挑战。"
SFRNews.1.a:0 "至少在今天，我们得以报仇雪恨。"
SFRNews.1.b:0 "王冠落地，红旗升起"
SFRNews.1.c:0 "王都竟会落入暴民之手！"

SFRNews.2.t:0 "远乡国再统一"
SFRNews.2.d:0 "曾几何时，远乡的社会主义革命一度陷入低潮，前国王郑钧撕毁了其父与革命党和共产党达成的协议，对两党发动了残酷的清洗。两党不得不联合起来组成革命阵线，并用漫长而困苦的游击战对抗王国政府的围剿。但最终，革命阵线坚持了下来，并打败了其他远乡势力，掌控了整个远乡，建立了远乡人民民主共和国。在许多远乡平民心中，由共产党主导的革命阵线已经证明了自己保卫人民的能力和建设幸福未来的决心。\n\n远乡人民民主共和国主席赵永军宣布，新生的远乡将在社会各个方面掀起变革的浪潮，包括但不限于土地改革、工业化、男女平权、种族平等、建设社会福利体系，可谓雄心勃勃。值得注意的是，赵永军的讲话中还屡屡提及东巴大战中被沃姆帝国及其仆从国占领的远乡土地。大部分观察家认为，这意味着远乡已经开始准备收复失地——这很可能成为大规模战争的导火索。"
SFRNews.2.a:0 "巴斯蒂亚大陆的最东端迎来了黎明"
SFRNews.2.b:0 "巴斯蒂亚大陆的最东端已落入激进分子之手。"

