SFR_workers_and_peasants_congress:0 "远乡工农代表大会"
SFR_workers_and_peasants_congress_desc:0 "代表大会可以表决决议与新法案，不同的决议有不同的通过需求，能否通过则是综合各派系的结果，即基于不同派系的选票权重乘以支持率的结果。各派系的支持是常驻的——他们可能因为反感法案而下降支持，但长期维持高支持度同样可以让派系支持我们的法案，即便他们心存芥蒂。\n\n当前选中派系：[GET_SFR_WAPC_selected]"
