SFR.336.t:0 "复苏的土地"
SFR.336.d:0 "王涵挥起铁锤把道钉透过铁轨的孔洞敲入铁路的枕木中，道钉插入其中使铁轨与枕木相契合，黄昏的霞光照映着汗珠，用脖间的毛巾擦了擦汗，四周的同伴完成了工作已经往营帐赶了，王涵由于要检查铁路完成情况，于是往铁路远处走，边走边拿标尺检查。\n\n他将目光向远处眺望，东巴大战后残留的村庄废墟近在眼前，四周早已被草木覆盖，鲜少的花朵点缀着蹊径，但有本职工作在于是便继续走着，不过这时远处传来呼喊声便回了头。\n\n“嘿！红军同志，”一个年轻姑娘推着斗车来到他旁边，将一个窝窝头递给了他说道：“总算找到你了，这是填肚子的，等工作完了去营帐那边有热乎的糊糊。”\n\n“谢谢你同志，话说这个村子你知道有什么来头吗？”王涵接过后咬了几口，指着远处的村子废墟询问着。\n\n“那啊，好像是俺爹娘过去的村子。”小姑娘玩弄自己的辫子回答道。\n\n王涵挠了挠头反问道：“过去？你怎么看出来的？”\n\n“俺娘说从家沿着旧的轣辘路走到新的轣辘路后经过几个电线木头就是了，当时俺爹拉着俺娘顺着轣辘路找到了一处村子安顿下来，”小姑娘回答着王涵的问题，随后催促道：“天快黑了，俺去找前面的同志，你早点回营地去，小心会遭了马匪。”\n\n王涵则缓缓说道：“我没见到人了，同志们已经回去了，就我在这检查了。”\n\n小姑娘一时间脸颊一红，随后结巴地说道：“那…那什么咱们早点回去吧…”\n\n“我叫王涵，同志你叫什么？”二人肩并肩顺着铁道往车站走去，王涵突然询问道。\n\n“俺叫童彤彤，刚出生的时候全身红彤彤就叫了，”童彤彤回复王涵的问题，似乎想到什么继续道：“听俺娘说这里过去全是炮弹坑，不过现在都是花花绿绿的，未来肯定能种地了。”\n\n王涵听着童彤彤的愿景哑然失笑。\n\n“你…你笑什么，难道田多点不好吗？，这样来年也能吃饱了。”\n\n“是啊，吃饱好啊。”"
SFR.336.a:0 "被炮弹砸出的弹坑已经被时间抚平，土地的愿景也在未来会实现。"

SFR.350.t:0 "理想实现，但是..."
SFR.350.d:0 ""
SFR.350.a:0 "...阵线将何去何从？"

SFR.351.t:0 "远乡共产党的未来？"
SFR.351.d:0 ""
SFR.351.a:0 "他们虎视眈眈。"
SFR.351.a.tt:0 "§R等到工农代表大会成立，情况会进一步复杂化...§!"

SFR.352.t:0 "又一次会议"
SFR.352.d:0 "赵永军看着台下争执不休的老头子们，他们没有多少实权，担心的却是又因为老年病死了几个人，感叹阵线议会的终局该到了。"
SFR.352.a:0 "是时候大换血了。"
SFR.352.a.tt:0 "这会开启一系列事件链，并最终导致§R反右运动§!，§O左右不满§!或是§1反攻倒算§!的发生。如何应对将影响我们§C权力机关改革§!的§R选择§!。"

SFR.353.t:0 "权力的诱惑"
SFR.353.d:0 "有些人担心解散阵线议会就是针对自己。"
SFR.353.a:0 "是时候拉清单了。"
SFR.353.b:0 "我们或许能挽回他们的想法..."

SFR.354.t:0 "拉清单"
SFR.354.d:0 "有些老东西想搞事情。"
SFR.354.a:0 "是时候出重拳了。"
SFR.354.b:0 "要不要安排一些事情把他们调走？"

SFR.355.t:0 "杀鸡儆猴"
SFR.355.d:0 "老登一边喊着自己搞过功一边被带走了。"
SFR.355.a:0 "“我为革命立过功！你们不能抓我！”"

SFR.356.t:0 "下地干活"
SFR.356.d:0 "老登被指控一些杂七杂八罪名，下去基层干活了。"
SFR.356.a:0 "“继续干吧。”"

SFR.357.t:0 "滋生的不满"
SFR.357.d:0 "老登看到一些人被换下来或是被抓，愈发担心。"
SFR.357.a:0 "我们的革命，究竟会变成什么样子..."

SFR.358.t:0 "苦口婆心"
SFR.358.d:0 "怎么逼逼赖赖都没用。"
SFR.358.a:0 "我们或许可以尝试边缘化他们？"
SFR.358.b:0 "准备一些用于安抚的政策会是好主意。"

SFR.359.t:0 "闲的可以"
SFR.359.d:0 "老登被边缘化到不重要的岗位上了。"
SFR.359.a:0 "至少可以花点时间研究下怎么喝茶了。"

SFR.360.t:0 "照顾后事"
SFR.360.d:0 "干部疗养院，启动！"
SFR.360.a:0 "这些资源，本可以用在更要紧的事情上..."

SFR.361.t:0 "滋生的不安"
SFR.361.d:0 "左翼分子看到对老登的安置，感到不安。"
SFR.361.a:0 "我们的革命，究竟会变成什么样子..."

SFR.362.t:0 "代表大会的未来"
SFR.362.d:0 "有人担心代表大会成立后党的力量会被分散。"
SFR.362.a:0 "人民自会发声！"
SFR.362.b:0 "我们完全可以加强控制。"

SFR.363.t:0 "人民之声"
SFR.363.d:0 "虽然我们鼓励民众积极参与未来的代表大会，但也有人担心是否要针对性的维持党总体上的统治。"
SFR.363.a:0 "百姓有权对政府监督..."
SFR.363.b:0 "...但发声也是有所前提的。"

SFR.364.t:0 "选择性监督"
SFR.364.d:0 "想参与监督但是被拦下来了。"
SFR.364.a:0 "我知道你很急，但是你先别急。"

SFR.365.t:0 "选择性发声"
SFR.365.d:0 "被列为反动党派的人被突突了。"
SFR.365.a:0 "这样的事情屡见不鲜。"

SFR.366.t:0 "谁来发声？"
SFR.366.d:0 "右翼分子担心新的改革只想让改革主导者希望的人自由发声。"
SFR.366.a:0 "我们的革命，究竟会变成什么样子..."

SFR.367.t:0 "加强控制"
SFR.367.d:0 "我们不能在改革过程中随波逐流，任大会的未来变动。"
SFR.367.a:0 "党内稳定是第一要务"
SFR.367.b:0 "或许可以允许更多党内辩论？"

SFR.368.t:0 "收紧栓绳"
SFR.368.d:0 "会议上，大家被要求团结一致。"
SFR.368.a:0 "在特殊时刻，我们确实需要特殊举措。"

SFR.369.t:0 "互相报告"
SFR.369.d:0 "豆起来了。"
SFR.369.a:0 "这事儿闹个没完..."

SFR.370.t:0 "新的担忧"
SFR.370.d:0 "左翼分子担心新的改革无法让人民发声。"
SFR.370.a:0 "我们的革命，究竟会变成什么样子..."

SFR.371.t:0 "潜在的危机"
SFR.371.d:0 "有些老东西密谋反对我们的改革。"
SFR.371.a:0 "是时候出重拳了。"
SFR.371.b:0 "看来他们需要一些更强有力的“说服”。"

SFR.372.t:0 "重拳出击"
SFR.372.d:0 "对秘密反对党的革命的人出重拳。"
SFR.372.a:0 "遵照计划来。"
SFR.372.b:0 "要不要乘机打击我们的政敌？"

SFR.373.t:0 "抓捕"
SFR.373.d:0 "在平京街道逃窜的反对派探子被追上了。"
SFR.373.a:0 "为了祖国的稳定。"

