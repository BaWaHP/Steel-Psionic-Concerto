SFRNews.4.t:0 "东巴斯蒂亚社会主义联盟成立"
SFRNews.4.d:0 "曾几何时，东巴斯蒂亚地区只有西莉迪亚公社一个社会主义政权。然而，历史的变革之风终是让社会主义的火种点燃了远乡王国，乃至点燃了整个东巴斯蒂亚地区。在经历了一系列残酷的革命战争后，远乡民主共和国控制了整个东巴斯蒂亚地区，并在战败国的废墟上建立了一个个社会主义政权。今日，远乡民主共和国与其他东巴社会主义政权于平京签署《联盟成立宣言》，一同宣告了东巴斯蒂亚社会主义联盟的成立。该联盟囊括了整个东巴斯蒂亚地区，而远乡民主共和国将作为这个新的国际阵营的领导者带领整个东巴斯蒂亚走向共产主义社会，各成员国将在政治、经济、军事等方面开展紧密合作。\n\n世界上的绝大多数社会主义者都认为这是共产主义的胜利，更有甚者开始乐观地表示这是世界无产阶级革命在东巴的完全胜利。与之相对应的，反社会主义者对此则是感到厌恶乃至恐惧——近些年来的战争证明了远乡民主共和国的强大实力以及输出革命的强烈倾向。无论如何，人口众多，资源丰富，产业相对发达的东巴斯蒂亚已经实现了前所未有的大联合，这个新生的联盟定会在世界历史上留下浓墨重彩的一笔，乃至影响整个世界的未来。"
SFRNews.4.a:0 "红星照耀东巴斯蒂亚。"

SFRNews.5.t:0 "前远乡国王郑钧被革命者判处死刑！"
SFRNews.5.d:0 "在远乡内战结束后，远乡革命阵线开始着手清算旧势力。其中最为引人注目的便是对前国王郑钧的公开审判。当这位有着昏君之名的前国王现身时，整个公审现场都充斥着群众的喊杀声。在法庭上，法官指控郑钧犯下镇压革命党、纵容军队屠杀、取缔民主化运动等多项罪行，郑钧则承认了这些指控属实，同时申明了女儿郑红的无辜，恳求法庭给王室成员一条活路，判处王室成员流放，永远离开远乡。\n\n然而，革命者的法庭并没有在乎这个革命之敌的请求，在远乡人民的面前判处这位犯下累累罪行的前国王死刑。此言一出，整个远乡的平民都在庆祝着这位昏君死期将至。与此形成鲜明对比的，是远乡内外残余旧势力尤其是旧贵族的悲痛欲绝——尽管他们当中的大多数人在郑钧当权时都不怎么尊重他，但死去的郑钧依然可能成为远乡旧势力残余的新神像。话虽如此，考虑到郑钧生前的民望，这个神像的作用大概是相当有限的。"
SFRNews.5.a:0 "革命者的复仇。"
SFRNews.5.b:0 "国仇家恨，不共戴天！"

SFRNews.6.t:0 "前远乡国王郑钧被判处流放！"
SFRNews.6.d:0 "在远乡内战结束后，远乡革命阵线开始清算旧势力。其中最为引人注目的便是对前国王郑钧的公开审判。当这位有着昏君之名的前国王现身时，整个公审现场都充斥着群众的喊杀声。在法庭上，法官指控郑钧犯下镇压革命党、纵容军队屠杀、取缔民主化运动等多项罪行，郑钧对这些指控供认不讳，但同时也申明自己的女儿是无辜的，恳求法庭能够给王室成员留一条活路，只判处王室流放，永远离开远乡。\n\n令人出乎意料的是，法庭同意了郑钧的请求。远乡王室成员将被流放，被永远驱逐出远乡。一部分群众对此感到不解乃至愤怒，认为这相当于让郑钧逍遥法外，更是对死难者的不公。但也有人认为，这一判决是为了建设一个更加宽容温和的政治环境，安抚仍然处于动荡状态的远乡国。而远乡的残余旧势力对这一判决结果的态度相当复杂：君臣之礼教导他们理应为王室尽忠，但他们早已对郑钧失去了尊敬。"
SFRNews.6.a:0 "我们尊重远乡的革命者，但放跑死敌真的是明智之举吗？"
SFRNews.6.b:0 "父亲，您死掉比苟活更能保全王室尊严，但即便如此，我依然庆幸您能活着。"
SFRNews.6.c:0 "滚吧！这里再也不会有你的位置了！"
SFRNews.6.dd:0 "失去权力的王室将走向何方？"

SFRNews.7.t:0 "前远乡国王郑钧被判劳动改造"
SFRNews.7.d:0 "在远乡内战结束后，远乡革命阵线着手清算旧势力。其中最为引人注目的便是对前国王郑钧的公开审判。当这位有着昏君之名的前国王现身时，整个公审现场都充斥着群众的喊杀声。在法庭上，法官指控郑钧犯下镇压革命党、纵容军队屠杀、取缔民主化运动等多项罪行，郑钧对这些指控供认不讳，但同时也申明自己的女儿是无辜的，恳求法庭能够给王室成员留一条活路，只判处王室流放，永远离开远乡。\n\n法庭没有完全同意郑钧的请求，而是作出了一个令大部分现场人员目瞪口呆的判决：判处所有的王室成员进行劳动改造，希望他们能够在劳动中改过自新。\n\n大部分人认为，这展现了远乡革命者高超的政治智慧。不仅展现了自身的仁慈大度，更减少了流血，堵住了旧势力残余的嘴，安抚了仍然动荡的远乡，同时还永久性地消解了远乡王室的神圣性。远乡内外的旧势力残余对此态度不一，甚至有部分旧贵族因此不再那么恐惧远乡革命阵线：要是连郑钧都能继续在这个国家生活，他们又怎么会有性命之忧呢？"
SFRNews.7.a:0 "希望他能用诚实的劳动来弥补他所亏欠的国家。"
SFRNews.7.b:0 "远乡王室威严荡然无存。"
SFRNews.7.c:0 "父亲，您死掉比苟活更能保全王室尊严，但即便如此，我依然庆幸您能活着。"

SFRNews.8.t:0 "远乡工农代表大会成立"
SFRNews.8.d:0 "今日，新生的远乡人民民主共和国成功建立了他的民主机构——远乡工农代表大会。远乡工农代表大会拥有立法权，国家的各项重大决议与法案需经远乡工农代表大会的代表进行民主表决，得票半数以上方能通过。但和一般的民主国家的议会不同，为了确保代表们能够为工人和农民的利益服务，工农代表大会的代表均是来自远乡各地的基层委员会中的劳动者。\n\n远乡人民民主共和国发表官方声明，声称远乡工农代表大会的成立象征着远乡的历史进入了一个新阶段，革命者履行了人民民主的承诺，远乡人民得以真正掌握国家大权。\n\n大多数社会主义者对此持赞赏态度，并热情地祝贺远乡人民成功拥有了自己的国家，远乡人民民主共和国定会拥有一个光明的未来。而在非社会主义民主派看来，这种由共产党占据主导地位的民主缺乏竞争性，代表选举和民主表决的公正性也值得怀疑。但与郑氏王朝那失败的民主化相比，远乡人民民主共和国的民主明显要更有生命力和战斗力。"
SFRNews.8.a:0 "人民理应主宰自己的命运。"
SFRNews.8.b:0 "远乡的民主？真新鲜呐。"

