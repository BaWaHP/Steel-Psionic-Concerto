###领导人###
SFR_YeWenshi:0 "叶文石"
SFR_YeWenshi_desc:0 "如果问如今南远乡革命阵线最重要的人是谁，那许多人定会回答叶文石的名字。叶文石本人出生于南远乡地区的地主家庭，因为父辈的经营不利，家庭破产但又赶上出国深造的他不得不滞留在南巴斯蒂亚联邦境内。在联邦生活的日子里，叶文石逐渐认为南巴斯蒂亚联邦的共和制度会是将远乡从停滞中拯救出来的一剂良方，回国后的他成为了改革的坚定支持者和革命党人的组织者。虽然叶文石的批评者认为他模棱两可的意识形态观念和对政治立场的态度会导致革命的失败，这反而使得叶文石得以游走在革命党的不同派系，并成为了团结共产主义者，世联主义者和民主主义者的重要角色。\n\n世界大战的爆发打破了一切。郑钧上台后替换了过去远乡政府的民主化政策，革命党人遭到成建制的屠杀，无数对远乡国未来的美好设想都在一瞬间化作飞灰，甚至连领土主权都几乎成为奢侈品。叶文石是幸运的，当位于大城市的革命组织几乎全军覆没时，他居然在南巴斯蒂亚联邦境内参加一个国际会议。幸免于难的他并没有选择接受避难的建议，相反，他决定返回故乡加入革命党人的游击队。作为少数几个活了下来的革命党人领袖之一，叶文石很快成为了他所在根据地的领导人，并组织游击队展开对远乡政府的战斗。\n\n而现在，叶文石依旧谦卑地扮演着他那调解人的角色，维持着革命党的稳定。革命阵线中，威望比他大的人多如牛毛，只不过，很少有人能像叶文石一样，维持左派和右派之间的团结，并确保根据地在不失去群众信任的情况下对远乡政府形成割据的局面。尽管如此，还是有人们批评叶文石安于现状而不愿意做出改变——可叶文石清楚，他就是靠着只做最为必要也最为共识的事才得以维持根据地的稳定，如果不这么做，要么根据地的经济先崩溃，要么他的脑袋会被其它派系砍下来。\n\n尽管如此，叶文石的威望也已一天不如一天，人们厌倦了等待和过担惊受怕的日子，随着郑钧的身体显露出恶化的情形，主战派已经叫嚣着要全面转向军事发展以发动革命战争，保守派却认为维持根据地的稳定，确保群众间的威信更为重要。失去来自任何派系的支持都会是毁灭性的，叶文石清楚这一点，却无能为力。\n\n他知道自己必须做点维持现状以外的事，他只是还没想好该怎么做。毕竟，从现实的角度出发，他的脑袋或许会比新政策先落地。"

SFR_LinYouzhi:0 "林有志"
SFR_LinYouzhi_desc:0 "林有志是农民家的孩子，出生在山早村的他似乎注定只能成为默默无闻的大多数。可在远离尘世的大山里，偶尔也会有一束光，穿透连绵的山脉和树林，照耀林家长子的脸庞。当革命党的游击队经过他的故乡时，林有志决定跟随他们，走出大山。他知道，这或许是自己今生最后一次走出大山的机会了。\n\n林有志恨革命党的敌人吗？至少一开始是不恨的。当革命党仍然和远乡政府维持合作关系，各地民主化改革一片欣欣向荣时，林有志的部队转移到新园市，用于护卫当地的工人运动。在短暂的和平期间，林有志参与了革命党人开设的军事学院，并取得了相当不错的成绩。\n\n随着革命党和远乡政府合作的破裂，后者开始大面积逮捕，屠杀各地的革命党组织。新园市也不是例外。一生都不曾对革命党理念表示过多少明确认识的林有志，在见识了自己的战友，伙伴甚至亲人被一个个逮捕，虐待甚至屠杀后，他坚决了自己和远乡政府斗争到底的意念。没有选择逃亡海外或者就此销声匿迹的林有志迅速加入了由远乡共产党组织的游击队，番号§t远乡工农红军第二十一军§!。作为成绩相当不错的军官，他一上任便成为了指挥的重要人物。\n\n对新园市的围剿很是惨烈。革命党从未将东海岸视作重点地区，这里的士兵缺枪少炮，缺乏训练，甚至连人数都凑不齐。随着军长牺牲，部队被打散转移到西边的树林，林有志在失去和中央，方面军指挥部联系的情况下，接任军长并向西南转移。林有志从未想过，自己会以这样的方式回到自己的故乡，回到山早村。然而，即便林有志和他的部队舍生忘死的作战，以及有红三方面军的支援，上饶根据地也没能保住。在中央命令下，他们向北方转移，和残余的红军部队会和。\n\n林有志从未忘记自己的亲朋好友惨遭屠戮的那一天，他发誓，只要自己还活在这世上一天，就定要让反动派们见识人民的怒火。多年的游击生活从未磨平他的棱角。在阵线的会议上，他永远是最激进的那一个。他痛恨阵线领导层安于现状的模样，和许多远乡共产党的激进派一道，他相信，坐以待毙绝对不会帮助远乡革命取得胜利。\n\n§R“我亲眼看着他们一个个把和革命党有关的人拖出去…是男人的话，直接枪毙，死的时候像条灰溜溜的土狗；女的，小孩就抓走，强暴也好，贩卖也好，最后像破抹布一样丢在臭水沟里…我什么都做不了，我一直在逃跑。”§!"
SFR_LinYouzhi_chief_desc:0 "§R如果林有志判断阵线政府无法继续维持稳定，他会采取极端行动...§!"

SFR_ChenJian:0 "陈坚"
SFR_ChenJian_desc:0 "陈坚总是喜欢恶狠狠地盯着别人，这似乎和他的童年有关。出生于平京一个贫穷工人家庭的他从小吃尽了苦头，他的父亲嗜好酗酒赌博，家暴更是家常便饭。在这样的背景下，陈坚的童年就是在一次又一次的打骂中度过，当他的母亲试图保护他时，迎来的却只是父亲更大的怒火。因为不愿待在家里，陈坚平日里最喜欢干的事情便是去私塾偷听别人讲课，或者去书店偷两本书来读读。在童年时期，为了填饱肚子，陈坚什么偷鸡摸狗的事情都尝试过，这在他的内心埋下了对混乱，无序社会憎恨的种子。十六岁那年，他的母亲因病去世。失去了留在家里理由的陈坚决心出门流浪，并在数年后加入了一个革命党地方支部。\n\n作为少有的文化人，同时还是工人家庭出生，陈坚很快得到重用并进入了革命党地方支部的领导层。然而，陈坚很快便失望了。在远乡政府和革命党达成合作的大背景下，许多革命党人丝毫没有建设国家的理想，大部分革命党员甚至开始讨论未来要怎么个“论功行赏”，在陈坚看来，他们就是“要当新政府的老爷”。多数人没有丝毫紧张感，仿佛明天远乡政府就能实现改革一般！陈坚为此感到十分悲痛。\n\n没有规矩，不成方圆！远乡政府腐败透顶，可是什么样的体制，什么样的社会催生了这一结果？陈坚意识到，革命党，似乎也只是这个背景下，社会体制的一种自救方式罢了。无论代价如何，必须有人站出来领导大家，实现真正的社会变革——信任郑家是毫无意义的。革命党一定会被背叛。\n\n陈坚激进的思想很快便导致他被革命党主流派系孤立，这将他推入了远乡共产党激进派的怀抱。同时，事情很快便像他所预料的那样发展：远乡政府背叛了革命，革命党遭到分割，消灭。跟随远乡共产党的游击队，陈坚一路从平京转移到了正泸根据地。\n\n在陈坚看来，党派不应该被无知，愚昧的群众带领，它应该反过来，成为所有人的领导者！在远乡，混乱和无序随处可见，民众缺乏教育，精英则毫无道德底线！革命的真正的目的是什么？是掀起涵盖了每个角落，对当今社会彻底的革命！只有建立能帮助远乡人民真正走向现代化，共产主义社会的“先锋队”，同时依靠它的帮助，建立起新的社会，才能不辜负前人的牺牲，才能实现革命理想。\n\n§t“远乡的革命需要带领，愚昧的社会无法靠自己完成革命…我会不惜一切代价地实现这一点。”§!"

SFR_ZhaoYongjun:0 "赵永军"
SFR_ZhaoYongjun_desc:0 "赵永军的童年在乡安熙熙攘攘的海岸与密集的茶树林中度过，出生于一个农民家庭的他却过上了比起远乡绝大多数农民更好的生活。虽然从懂事起就要帮助家庭务农，他的父母仍然设法帮助他接受了教育，并让他长大后参与茶叶的贸易往来，记账等工作。随着阅历的逐渐积累，赵永军不满于老家的那一亩三分地，凭借自己的努力和父母的支持，他考入了南沙市某学院读书，并在当地过上了半工半读的生活。由于家里给的资助不多，赵永军不得不尝试各种工作，他在肥皂厂里干过活，写过新闻，做过洗衣工，还借助学生的身份，充当学校图书馆的管理员。\n\n在校期间，赵永军和当时的许多年轻人一样，接触了革命党的思想。彼时恰好是革命党和远乡政府的所谓“蜜月期”，远乡民主化运动正轰轰烈烈地进行着。凭借他图书管理员的身份，赵永军大量阅读了来自世界各国的政治，哲学，意识形态书籍和文献，决心采取行动的他在参与了南沙的学生自治团体，同时组织了数次成功的学生运动。\n\n革命党领导层很快便注意到了这个充满激情的年轻人。在成功加入革命党后，赵永军先是在南沙当地组织了数次成功的工人运动，后来则被派往革命党白水支部调查当地的经济情况。由于他的出生，组织希望赵永军能对当地的农民运动进行调查。在调查告一段落后，赵永军坚定了一点信念：在未来，远乡政府必须在各地开展大范围的土地改革，从而维护农民的利益。在赵永军看来，远乡的农民团体是巨大而富有潜力的，只要他们可能被动员起来——实际上，他们必须被动员起来，远乡才能实现真正的革命。这一理论帮助赵永军在发展落后的白水地区迅速夺得大量支持，虽然遭到革命党疏远，远乡共产党为他递出的橄榄枝很快帮助他在当地站稳脚跟。\n\n一切的准备都并非白费，随着远乡政府和革命党的合作破裂，赵永军带领小股部队掩护首都的革命力量撤出后，立刻前往白水地区。在赵永军的带领下，§R远乡工农红军第三方面军§!迅速被组织起来，快速地向周围的革命力量提供了有力的保护。随着围剿烈度的增加，根据中央指示，红三方面军在最后撤出了白水根据地，北上跨越子安山后，和二十一军会和，并在之后参与了上饶根据地的保卫工作。虽然上饶根据地最终沦陷，不过红三方面军还是完整地撤入了中央所在的正泸根据地。\n\n作为革命阵线的拥护者，以及多次反围剿胜利的大功臣，赵永军很快便跻身阵线领导高层，并在实际上掌握了根据地农业事务的大权。赵永军从未忘记自己所立下的决心，他始终坚信着远乡农民的潜力。远乡的共产主义革命不应该被南巴斯蒂亚的精英所裹挟，革命阵线也不过是权宜之计。只有走入农民，解放农民，远乡才能实现真正的革命。\n\n§C“正面对抗远乡政府的反动武装是不现实的，根据地应当继续开展土地革命，坚定游击战争的路线，并一点点地反过来包围，打击城市。”§!"

SFR_LinQinlan:0 "刘青兰"
SFR_LinQinlan_desc:0 "刘青兰出生平京的一户富裕的商人家庭，自幼便习得多国语言，远赴南巴联邦接受高等教育。在鲁萨尔停留期间，当地的空想社会主义思潮极大地感染了尚且年轻的刘青兰，促使她投入了由不满远乡政府的麟人外侨组成的社会主义团体，并在之后参与到了远乡民主运动中去。作为空想社会主义的信徒，刘青兰反对远乡共产党的暴力革命理论，大力支持远乡政府的民主化运动，认为这是唯一能和平解决远乡问题的道路。她相信实现社会平等，削弱阶级差异需要和平与稳定的政府稳步推行，人民民主的力量可以实现这一点——暴力则不行。\n\n根据刘青兰身边的人描述，她是一个“乐观而又善于言辞的好人”。尽管尝尝被怀疑是“用钱打通了革命党的关节”，刘青兰仍常常深入各地基层组织开展工作，她开朗的性格与富有感染力的口才为她赢得了相当数目的支持者。她留学海外的经历，以及来自开明家庭的支持，刘青兰在革命党中的地位节节攀升。\n\n然而，情况却出乎意料。在刘青兰准备投身远乡革命时，她见证了远乡政府对民主化运动的阳奉阴违，见证了革命党内部的贪污腐败，最后还亲眼革命者所付出的一切都分崩离析。在生死的危难关头，刘青兰拒绝了逃亡海外的邀请函。她动用自己的关系为父母在海外购置了一处房产，同时留下了足够老人家生活的资金，随后便断开了联系。在远乡本土的革命党几乎溃散的时候，刘青兰站了出来。她将剩余的文政力量组织起来，加入了叶文石的革命党游击队，并最终成为了革命阵线的缔造者之一。\n\n残酷的游击战争改变了刘青兰，以及许多革命党人对社会革命的看法。和平革命不再成为可选项，唯有武力才是出路。即便最残酷的至暗时刻，在她身边的人看来，刘青兰也始终是那个冷静，善良的好上司。在游击战争期间，刘青兰致力于约束游击队的行为，确保他们所进行的斗争不是建立在百姓的牺牲之上。\n\n作为革命党少数留在远乡本土的高层，阵线高层中罕见的女性，阵线议会的支持者，以及被叶文石用于平衡阵线议会中共产党，革命党分歧的好好女士，刘青兰被委以重任，不但负责根据地的文化宣传工作，还成为了参与根据地政策决定的革命党代表之一。\n\n时至今日，刘青兰仍然相信人民民主的力量。一切革命都有前提——无论是和平演变还是暴力革命，最终，革命者都应当始终铭记改善人民的生活水平，谨记以人为本的道德理念。或许，武力是实现社会变革，走向社会平等的唯一途径，可在那无数残酷的暴力背后，在一切法律法规都不再有效的无序下，革命者不应当忘记自己为何而战，也应当用一些道德标准约束自己的行为，否则，哪怕取得了战争的胜利，最终，革命也将以失败告终。\n\n§C“革命一旦开始，便无法轻易停止。如何避免不必要的伤亡，同时还要取得胜利，是所有人应当共同面对的难题。”§!"

SFR_ZhangYixin:0 "张一心"
SFR_ZhangYixin_desc_1:0 "革命党革的到底是谁的命？张一心从未找到令他满意的结果，或许这解释了他为何总是面露难色。在革命传统悠久的南巴斯蒂亚联邦，张一心试图找到答案——然而，他所看见的，却是在漫长历史中不断消逝的革命传统。那些所谓的民主政治家不再拥有革命年代的热情，张一心被无尽的官僚琐事所困扰。他看到了政治家为了选票不惜一切代价，却又无法推进实质性的改革；他看到自由市场的阴影下，那些挣扎求生的工人；他看到人们把革命当做茶余饭后的笑谈，把社会变革和官场上的腐败划等号。\n\n无法忍受远乡革命党在外国的组织部门的张一心决心回国，真正地参与远乡革命。可以说，他的一部分愿望实现了。在各地实际考察了远乡经济不平等的现状后，作为经济学家的张一心很快提出了多个大胆而有效的方案，帮助各地革命党支部快速立足，并成为了在议会上对抗保守的远乡贵族精英第一线的战士。然而，这一切都无法阻止历史的洪流。作为左翼政治家的张一心本就在革命党内受到其他人的排挤，他被别人当做是共产党的间谍，然而，张一心在共产党内的朋友也不待见他，称呼他为软弱的改革投机者——不过，即便是这样，远乡共产党依旧为张一心提供了一席之地。\n\n在革命失败后，张一心跟随革命党，共产党残部来到了根据地，并成为了革命阵线中的创始人之一。作为曾经的革命党左派，张一心勉为其难地在阵线议会中占据了一席之地，并想办法为几乎没有话语权的革命党某得更大的权势。很讽刺的是，曾经被当做左派排挤的张一心，最终却成为了革命阵线右翼反对派的代表。\n\n而现在，在革命党残存的军事力量，以及微不足道的海外支持下，张一心成为了笑到最后的赢家——或者在外人看来是如此。然而，现实是，张一心的统治仍然摇摇欲坠。阵线因为混乱而崩溃了，这所带来的余波仍持续在根据地回荡，而革命党力量尚且弱小，难以维持稳定。在接下来的时日里，为了根据地的存亡，为了国家的统一，甚至是为了远乡国的未来，张一心恐怕还需要做出需要许多艰难的决定，即便这违背了他所信奉一生的理念。\n\n§g“革命正在朝着我所无法预料的方向发展，我已成为了被裹挟的战士，成为了自己曾所最厌恶的人。我时常会思考，自己究竟是否做出了正确的决定——就让历史来评判吧。”§!"
SFR_ZhangYixin_desc_2:0 "革命党革的到底是谁的命？张一心从未找到令他满意的结果，或许这解释了他为何总是面露难色。在革命传统悠久的南巴斯蒂亚联邦，张一心试图找到答案——然而，他所看见的，却是在漫长历史中不断消逝的革命传统。那些所谓的民主政治家不再拥有革命年代的热情，张一心被无尽的官僚琐事所困扰。他看到了政治家为了选票不惜一切代价，却又无法推进实质性的改革；他看到自由市场的阴影下，那些挣扎求生的工人；他看到人们把革命当做茶余饭后的笑谈，把社会变革和官场上的腐败划等号。\n\n无法忍受远乡革命党在外国的组织部门的张一心决心回国，真正地参与远乡革命。可以说，他的一部分愿望实现了。在各地实际考察了远乡经济不平等的现状后，作为经济学家的张一心很快提出了多个大胆而有效的方案，帮助各地革命党支部快速立足，并成为了在议会上对抗保守的远乡贵族精英第一线的战士。然而，这一切都无法阻止历史的洪流。作为左翼政治家的张一心本就在革命党内受到其他人的排挤，他被别人当做是共产党的间谍，然而，张一心在共产党内的朋友也不待见他，称呼他为软弱的改革投机者——不过，即便是这样，远乡共产党依旧为张一心提供了一席之地。\n\n在革命失败后，张一心跟随革命党，共产党残部来到了根据地，并成为了革命阵线中的创始人之一。作为曾经的革命党左派，张一心勉为其难地在阵线议会中占据了一席之地，并想办法为几乎没有话语权的革命党某得更大的权势。很讽刺的是，曾经被当做左派排挤的张一心，最终却成为了革命阵线右翼反对派的代表。\n\n对于张一心而言，远乡社会需要的并不是激烈的改革。虽然对以皇室为首的旧统治阶级，精英阶级的改造，甚至是消灭会是必然的，可专政最终只会将国家领导成下一个远乡王国——只是这一次坐在领导人位子上的不是国王。在远乡各地，相信旧时代思想的，无论是人民也好，还是社会精英，仍然占据着主导地位，新政府不可能像消灭王室一样对待人民。张一心相信，南巴斯蒂亚的民主制度必然是有可取之处的，随着时间的流逝，它将成为远乡现代化的一剂良药。不过，共产党的思想也并非全然错误，政府必将对社会有更多的干涉，甚至是国有化某些产业，才能确保远乡不会走向南巴斯蒂亚联邦的老路，让民主制度反而成为限制国家发展，奴役人民的牢笼。\n\n§Y“自由，平等的共和国才是远乡未来所需要的。专政持续的时间越长，被塑造的新贵族统治阶级就会越强大。再伟大的圣人也无法阻止这一趋势。”§!"

