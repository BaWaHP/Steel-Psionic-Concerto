SFR_land_reform_decisions_over:0 "§C全国土地改革已经结束！§!\n§g提示：别忘了点击土改GUI的翻牌和按钮。§!"
SFR_land_reform_desc_text_txt:0 "虽说自§O大战§!以来，远乡§1反动派§!政府曾多次试图缓解各地的土地矛盾，然而，千年积累下来的顽疾想要解决并非一日之功。在过去，田地长期握在少数人手里，§t佃租层层加码、债账像枷锁，收成都被押在高利与差徭里。§!百姓依赖土地生存，国家依赖土地发展，而这些都得不到实现，最终利益成为了少数人的盘中餐，只留的剩下的人生活在饥寒交迫之上。\n\n§4幸好，我们来了。§!\n\n随着§C全国解放§!，我们得以抽手处理全国土改问题。在解放较早的§Y南远乡地区§!，一些地方的土改工作在§e根据地时期§!就已经得到解决，或是已经开展工作，在地方合作社的帮助下如火如荼地进行着。如今，我们需要将这一工作经验推广全国。§Y全国土地改革§!被分为多个§Y阶段§!，每抵达一个§Y阶段§!，我们可以点选该页面的§Y卡牌§!从而§5翻牌§!，随着进度不断上升，我们也会遇到各种各样的问题。§C为了远乡人民，让我们开始工作吧！§!"

