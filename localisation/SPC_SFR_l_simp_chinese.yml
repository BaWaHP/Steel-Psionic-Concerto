SFR_maintain_the_front:0 "维持阵线"
SFR_maintain_the_front_desc:0 "南远乡革命阵线由远乡革命党和远乡共产党组成，二者在世界大战前曾组成革命同盟，与远乡政府合作，致力与实现祖国的民主化改革。然而，随着世界局势的改变，郑钧为首的反动集团背叛了我们，并在全国范围内发动了大规模的围剿与逮捕——革命党几乎灭亡，而共产党也不得不转入游击战争。两党再次决定合作，组成革命阵线，坚守正泸根据地。\n\n然而，革命阵线也并非铁板一片。来自左右翼的激进分子都迫切地希望推翻阵线的统治，转而由自己掌管大权。我们需要维持阵线的稳定，防止任何一方夺取权力，致使革命驶向万丈深渊。\n\n§g为了维持阵线的稳定，我们需要尽可能地保证凝聚力在§Y团结一致§!或更好的等级上。低于这个值可能会导致持续不断的矛盾§t冲突§!，削弱根据地的力量。§!"

