###事件###
SFR.1.t:0 "革命伊始…"
SFR.1.d:0 "满载着旅客的蒸汽轮船在江洲市的港口缓缓停靠下来，一位打扮的颇为精致的年轻人靠在栏杆边，一边享受着吹过的海风，一边看着码头上欢呼的人群。他一边想着革命党真是有牌面，一边又对同乘的几位领导的安全感到些许担忧——就这么暴露自己的行踪，还引得大批人马过来围观，不怕别有用心之士从中作祟吗？\n\n“不过，以我的身份，担心这些也没用。”青年点了一支烟，这是他从南巴联邦带回来的高端香烟，价格昂贵，最糟糕的是，盒子也空了，“唉，就剩这支了吗。” \n\n“叶兄，好像不太高兴的样子。”一位年龄相仿的青年走了过来，“有什么心事吗？”\n\n“太久没回来了，感觉有点陌生。”叶文石对自己的发小笑道，“不过还好有你，以及几位师兄的帮助。虽然现在的形式仍然称不上好，但只要我们努力工作，总有一天，可以把远乡建设成不亚于那些南巴佬的强国。”\n\n“才被提拔几天，就挺有领导风范了哈。不错不错。”发小笑笑说，随后继续说道，“你听说了吗？最近共产党在和上面谈，他们似乎对正泸有些想法，在当地搞些调查，社会实验什么的。上头的神经有些紧绷，最近不是和老郑家谈嘛，所以对共产党的行为有点不满，等你这两天安顿下来，要不要去看看，想办法给缓和一下。帮帮忙也好，我在共产党那边也有几个朋友。你可以去找一个姓赵的…嗯，叫啥来着…赵永军！对，就这名儿。”\n\n“嗯，你说的也有几分道理，不过…”\n\n叶文石的话语被汽船的鸣笛声打断，船只靠岸了。\n\n“好吧，那我们下回再继续吧。”叶文石苦笑道，“我行李有点多，得去跑几趟，还得给领导搬。”\n\n发小挥挥手，表示认可，随后便消失在涌动的人群中。\n\n在接下来的数年里，叶文石主要将精力花费在…"
SFR.1.a:0 "支持共产党在乡村地区开展的活动。"
SFR.1.b:0 "团结脆弱的革命联盟。"
SFR.1.c:0 "帮助革命党凝聚力量。"

SFR.2.t:0 "…火光冲天的那一夜…"
SFR.2.d:0 "此起彼伏的枪声，爆炸声响彻平京的大街小巷。在数日的紧张对峙后，直接来自皇宫的命令授权远乡政府的士兵对多个革命党组织发动突袭，而叶文石所在的支部，得益于优秀的预案，暂时逃开了第一轮围剿。然而，这并非长久之计。\n\n“我们现在怎么办？”叶文石一边喘着粗气，一边悄悄打开一丝窗户缝，警惕地望着窗外，他眼睁睁地看着火焰在市区逐渐蔓延，还有士兵殴打逃亡的难民，“现在情况很不妙，我们又没有调动部队的权限，必须撤出。”\n\n“可问题是，具体怎么做。”叶文石的发小从一旁的公文包中拿出一副地图，展开放在地下室落灰的桌面上，虽然灰暗的灯光一闪一闪，一副要熄灭的样子，不过他还是很快找到了自己想找的地点，“局势开始动荡时，我们提前在这里预备了一小股部队待命，主要是学生和工人，但足够了。我们应该尽快转移过去，带他们去营救还在这里开会的几位领导和学者，然后向城外转移。”\n\n“我也认为应该去接管部队，但专门赶过去营救可能有些难度。”革命党的代表，李青兰指了指地图上的标记，“这里有政府军的哨站，而且距离太远，太靠近市中心。我们不能以身犯险。而相对的…”她又指了指地图靠近的郊外的另外一个标记，“革命党原先在这里出资建设了几家工厂，我们可以带领工人抢救一批物资出来，之后再往郊外撤。”\n\n“这些都是很好的想法，但我认为我们还有更要紧的事情要做。”坐在一旁，沉默许久的赵永军开口了，“局势突变前，我们共产党在附近建立了好几个工人夜校，教授技术知识和军事知识，他们会成为未来游击战争的好帮手。我们可以带部队去营救他们与他们的亲属，并一起向城外转移，逃离远乡政府的魔爪。如果不帮他们，政府或许会将他们视作叛乱分子并抓捕。这不是我们想要看到的。”\n\n最后，叶文石决定…"
SFR.2.a:0 "听取发小的建议，带领部队救援了多名党内高级领导。"
SFR.2.b:0 "听取李青兰的建议，抢救宝贵的工业物资。"
SFR.2.c:0 "听取赵永军的建议，带领一批难民逃出生天。"

SFR.3.t:0 "…以及最后的结局"
SFR.3.d:0 "“手榴弹！”\n\n男人的叫喊声转瞬淹没在爆炸的响声下，顶着滚滚浓烟，叶文石试图从几经倒塌的房屋中寻得自己发小的身影，他一遍又一遍呼喊着他的名字，最终却也只是徒劳。在房屋倒塌前的最后一刻，他被那个脸上沾满鲜血——不知是自己的，还是别人的——的政委拉出火海。暴雨挥洒在叶文石的脸上，他才注意到，曾经建设得井井有条的根据地，如今已然是一篇废墟。\n\n机关枪的尖啸声把叶文石从混乱中拉回现实，他看着刚才把自己救出火海的政委，现在只剩下了弹坑中的一堆碎肉。他捡起死者的步枪，乘着烟雾未散，迅速转移到抵抗仍在继续的地方，带领残存的部队浴血奋战。\n\n然而，这一切都是徒劳。早有准备的远乡政府军启用了机械化的泰坦部队，甚至还有空军的轰炸援助。根据地的抵抗不堪一击，被愤怒蒙蔽了头脑的叶文石带领部队无数次发动死亡冲锋，多次在生死线徘徊，最后终于帮助根据地的仅剩不多的军政力量撤入了正泸根据地。而叶文石本人也在无数次的战斗中负伤累累，作为战争英雄的他迅速成为了根据地的高级领导——尽管这一切似乎并非他想要的。\n\n好友的死亡对叶文石的打击很大，可他却没有时间继续哀悼了。上饶根据地的覆灭对仍在正泸进行游击战争的部队影响很大，作为战争英雄的叶文石必须以身作则，打起精神，帮助革命阵线守住远乡革命的最后火种。\n\n在接下来的数年里，作为革命阵线高级领导人，叶文石…"
SFR.3.a:0 "帮助共产党维持根据地。"
SFR.3.b:0 "尽全力维持阵线团结。"
SFR.3.c:0 "整合革命党的残存部队。"

SFR.4.t:0 "坚如磐石之人"
SFR.4.d:0 "清晨的薄雾弥漫在训练场上，空气中充斥着士兵们的脚步声与喘息声。陈坚站在场边，双手背在身后，目光如鹰般锐利地扫视着场上训练的士兵们。尽管他身为如今革命阵线左翼武装力量的几乎一把手，横竖算个革命英雄，但他却从未忘记自己曾经的出身，也从未舍弃过亲自锤炼身体的信念。然而，今天的训练场景却让他的眉头微微皱起。\n\n士兵们的步伐杂乱无章，汗水混合着倦怠的神情。跑步的人三三两两，速度各异，失去了应有的节奏与纪律。这幅景象让陈坚心头一沉——远乡革命的未来落在这些散兵游勇都称不上的混混身上？他感到一股深切的失望，隐隐的怒火在心底燃烧。他的拳头缓缓握紧，目光更加凌厉。\n\n他大步走到训练场中央，所有的士兵都停下脚步，纷纷看向这个以冷酷和果断著称的指挥官。陈坚站定，声音低沉却充满力量：“你们这样，如何去面对未来的战争？没有纪律，怎么能赢得胜利？”\n\n士兵们低着头，没人敢出声。\n\n“看来，我必须亲自示范给你们看。”陈坚忽然抛下了军官的风范，解开了外套，露出贴身的军装。他的动作迅速而果断，仿佛几十年来积累的领导威严在这一刻融入了他的一举一动。\n\n他站在队列前，声音低沉而坚定：“跟我跑。”\n\n没有人敢质疑——在巨大的威压下，士兵们迅速排好队，跟在他身后。陈坚率先迈开脚步，步伐稳健，速度飞快。他的体力仿佛无穷无尽，每一个动作都无比标准，而他不曾回头，似乎相信身后的每一个士兵都会全力跟上。汗水很快在他的额头上凝聚，但陈坚的呼吸始终平稳。\n\n时间仿佛静止，士兵们的喘息声渐渐加重，但没有一个人停下。陈坚的背影仿佛一座不倒的山峰，带领着他们继续前行，直到太阳升起，晨雾散去。最终，所有人都停在了终点。气喘吁吁的士兵们抬起头，看到的则是立正的长官。\n\n陈坚的目光如利刃一般掠过每一名士兵的脸庞，大声讲道：“同志们，我们是革命的军队！是肩负着远乡命运的军队！”他挥起拳头，“你们的身上肩负着祖国的未来！我们为了人民，为了平等而战，岂能在当下空度光阴？时间紧迫，而任务艰巨。我希望诸位革命同志不要忘记这一点。”"
SFR.4.a:0 "坚如磐石的队伍，才有资格带领革命。"
SFR.4.a.tt:0 "§Y陈坚§!属于革命阵线的§R左翼反对派§!，他会在可能的情况下带领§R共产党§!发动§O政变§!。"

SFR.5.t:0 "失魂落魄之人"
SFR.5.d:0 "夜半时分，张一心坐在办公室的椅子上，眼前摊开的是最新的财报。数字在纸面上列得整整齐齐，而且丝毫不留情面——那是由根据地无数地方党支部汇总而成的名为“失望”的结论，根据地已是强弩之末，就连张一心，这样一个自认不算什么东西的革命元老都能看得出来。\n\n他手中的香烟燃得正旺，烟雾在空气中缓缓升腾，他的结局注定如此吗？张一心抬起头，眺望窗外那片沉闷的天际，他的思绪早已不在这间办公室内，而是飘向了那段遥远的革命岁月。\n\n往昔的辉煌犹如昨日的幻影。那时的他意气风发，革命党与远乡政府的合作正酣，他作为人民的英雄，革命的传奇回到祖国，人群的簇拥迷乱了他的双眼，而最终，他只得一路跌跌撞撞逃来根据地，思考着自己是否做出了正确的决定——他是不是应该和那些叛徒，或是明智的元老一样，逃亡海外呢？如今的他却只能对着满是红圈的报告发呆，对着空虚的未来发愁。烟灰掉落在文件上，划出一条长长的灰线。\n\他放下财报，翻开了桌上那本薄薄的册子，上面是周周转转逃来根据地的革命党的残存部队名单。张一心曾看着自己并肩作战的名字一个个化作历史，看着名单上还可以调动的部队数目日渐缩水。他手指在册子上滑过，每一个名字都带着过去的回忆在脑海中浮现，仿佛这些人依旧站在他身旁，等待着他的指令，等待着新的革命浪潮。然而，现实却无情地提醒着他，那些年已离他远去，如今的他，只是一个在回忆里挣扎的人。\n\n他深吸了一口烟，脑海中浮现出一个又一个破碎的联翩画面。那些曾经的理想，真的就此终结了吗？现在的他，是否还能找到重振旗鼓的机会？革命党，只剩下委曲求全一条路可走了吗？"
SFR.5.a:0 "他想放弃，却又不敢。"
SFR.5.a.tt:0 "§Y张一心§!属于革命阵线的§C右翼反对派§!，他会在可能的情况下带领§C革命党§!发动§O政变§!。"

SFR.6.t:0 "革命的生命线"
SFR.6.d:0 "夕阳血红的光洒在正泸连绵的山脉上，刘青兰和几名游击队员站在一处隐蔽的山脚下，她死死盯着破旧的小道，依托树林隐藏了起来。她在等几个挑夫，兴许还有马车，甚至卡车，或者什么也没有。这批物资的到来至关重要，医疗物资关系到根据地数百人的生存，而外界的资料则会影响到阵线中央未来的决策——在远乡时局变化莫测的当下，他们需要第一时间掌握外界资料。\n\n不久之后，远处的路上隐约传来了引擎的声音。刘青兰招呼身后的几人作戒备态势。那辆卡车在夕阳的余晖下逐渐显现，车身上盖着厚厚的油布与看似漫不经心的伪装，避免引起任何不必要的注意。刘青兰深吸了一口气，整理了一下衣领，向前迎了上去。\n\n卡车在她面前停下，一个穿着简朴的司机从驾驶座跳下来，手中拿着一份清单。他的神情带着几分疲惫，但目光依旧警惕，显然他明白自己此刻的责任之重。刘青兰与他简单寒暄后，接过了那份清单。\n\n“大港那边托我给您带个信。首都那边在严打，嘉祥抓了好几个，医疗物资没有了。”司机低声说道，环顾四周，确保没有可疑人物跟踪，“但剩下的还有，主要是武器和弹药，还有外界的整理信息，新闻报刊之类的。”\n\n刘青兰点了点头，示意身后的人检查物资，她也亲自上前查看。弹药、步枪、炸药、大米——还有最重要的，外界的信息资料，大量的文件，这需要时间来检查，消化。确认无误后，她示意手下的人开始卸货。士兵们迅速行动，井然有序地从卡车上搬下一个个箱子。\n\n“这些都很关键，”她喃喃自语，随后抬头看向司机，“同志，你做得很好，回去路上多加小心。我们就靠你们了。”\n\n司机点点头，疲惫的脸上露出一丝微笑，转身回到了驾驶座，准备启程返程。刘青兰站在原地，看着那辆卡车消失在夜色中，心中清楚，物资到位只是第一步，接下来他们还有更多的战斗要打——和敌人，或者和自己人。"
SFR.6.a:0 "“该回去工作了…”"
SFR.6.a.tt:0 "§Y刘青兰§!忠于§Y革命阵线§!，她会作为§C革命党§!的代表，协助阵线工作。"

SFR.7.t:0 "丰饶之困"
SFR.7.d:0 "暮色将正沪根据地的山坳染成铁锈色，赵永军踩着泥泞的田埂走向公社粮仓。风卷起他褪色的军装下摆，露出腰间别着的黄铜算盘——那是他父亲临终前塞进他手中的“传家宝”，如今算珠早已被硝烟熏得发黑。粮仓门口，二十几个农民蜷缩在漏雨的草棚下，婴儿的啼哭和老人干咳声混作一团。\n\n“永军同志！”跛脚的老杨头踉跄着扑过来，手里攥着半截发霉的番薯，“政府军把盐道截了，春耕的牲口全染了瘟病……您看看这账！”账本被甩在积水的石磨上，墨迹在雨渍中晕开，像一串串溃烂的伤疤。赵永军弯腰拾起账册，指尖摩挲着扉页上自己三年前写的标语——“耕者有其田，饥者有其灶”。那时红三方面军刚打下白水地主的粮仓，篝火晚会上，他给每个农民分了整整一斗新麦。\n\n粮仓梁柱突然传来吱呀声，众人抬头望去——三只瘦骨嶙峋的麻雀正在空麻袋堆里啄食残渣。赵永军想起南沙学院图书馆的穹顶壁画，那些被油灯熏黑的外国神话里，饥饿的农神总把希望藏在种子的裂缝中。\n\n“减民兵口粮。”他声音轻得像在自语。\n“你说甚？！”独臂的游击队长李铁柱猛地站起，腰间生锈的柴刀撞上石磨，“上个月减了两成，娃子们埋伏时饿晕了三个！永军你当年带着我们抢地主粮仓的狠劲呢？”\n\n赵永军沉默着走到粮仓角落，掀开一口裂了缝的陶缸。缸底躺着最后半捧麦粒，霉斑在阴影里泛着青绿。十年前在肥皂厂打工时，他常把肥皂渣捏成麦穗形状，骗哭闹的妹妹那是“资本家藏起来的粮食”。现在他不用再骗任何人，可真正的麦子比肥皂渣更虚幻。\n\n远处传来闷雷声，雨滴开始穿透茅草棚。赵永军突然解开腰间算盘，将发黑的铜框狠狠砸向陶缸。裂帛般的脆响中，麦粒混着陶片溅落满地。\n“把粮仓地砖全撬了。”他转身时，瞳孔映着闪电的冷光，“三年前撤退前，我让人在地基夹层藏了二十石应急粮。”\n\n人群炸开锅。老杨头哆嗦着摸向地砖缝隙：“可那是留给反围剿的……”\n“现在就是围剿。”赵永军踩住一片陶缸碎片，碾出刺耳的刮擦声，“反动派不是在围我们的山，是在围农民的心。”"
SFR.7.a:0 "“今日我们挖的是地砖，明日要挖的是旧世界的根。”"
SFR.7.a.tt:0 "§Y赵永军§!忠于§Y革命阵线§!，他会作为§R共产党§!的代表，协助阵线工作。"

SFR.8.t:0 "忠于革命，渴望复仇"
SFR.8.d:0 "101哭唧唧。"
SFR.8.a:0 "“真正的团结不在口号里，在并肩冲锋时踩下的脚印中。”"
SFR.8.a.tt:0 "§Y林有志§!忠于§R革命§!，一旦阵线陷入§1混乱§!，掌握了军权的他便会采取行动。"

SFR.9.t:0 "再会"
SFR.9.d:0 "山脉的松涛声裹着细雨，叶文石蹲在青苔斑驳的墓碑前，指尖划过三个字——那是他的发小曾经使用的名字。碑前摆着一本泛黄的《远乡地理志》——那是逝者生前最爱的书，书页间还夹着两人少年时手绘的“理想国地图”，如今边缘已蜷曲如枯叶。\n\n“你总说远乡的山河能画成诗，现在倒真成了‘诗’。”他苦笑一声，掸去书封上的泥点，“陈坚嚷嚷着要烧了地主的田契，还要把几个元老全抓起来，右派想留着集市换盐巴，中间还插着张一心念叨什么‘民主过渡’……这诗韵脚全乱了。”\n\n山腰处突然传来急促的脚步声。警卫员小陈喘着气递来一份皱巴巴的信报：“叶书记，三号仓库出事了……保守派的人偷偷挪了农具去修防御工事，激进派带着民兵堵了仓库门，说要‘清算叛徒’！”\n\n叶文石的目光扫过信报末尾的血指印，想起五年前撤离平京时，发小在燃烧的印刷厂里抢出最后一箱宣传册的模样。“告诉他们，今晚所有派系代表到粮仓开会，”他撕下一角地图，用炭笔写下“农具换盐票”几个字，“谁再动手脚，就派谁带队去敌占区运盐。”\n\n小陈离开后，叶文石翻开《远乡地理志》，泛黄的纸页间滑落一片干枯的野山茶——这是发小当年夹在书里标记“未来议会选址”的记号。如今山茶碎成齑粉，而选址地正被双方的壕沟割裂成棋盘。\n\n“我可能撑不到画完这幅图了。”他对着墓碑喃喃自语，雨滴打在书页上晕开墨迹，将“理想国”三个字洇成模糊的污痕。远处传来试射土炮的闷响，惊飞一群啄食腐叶的乌鸦。"
SFR.9.a:0 "“我现在真的不知道该怎么做了...”"
SFR.9.b:0 "“...但是，总能找到解决办法的。”"

SFR.10.t:0 "反对革命阵线"
SFR.10.d:0 "毫无疑问，南远乡革命阵线是一支绝望的同盟。当远乡政府背叛我们的改革时，大多数革命家都成为了烈士，在毫无准备的情况下，我们的同胞被突袭，被围剿，最后像野狗一样吊死在反动派的刑场上。\n\n那是一段黑暗而绝望的日子，可我们挺过来了。\n\n反动派的围剿并没有吹熄远乡的革命火种，反之，在得到了人民的支持后，它正燃烧地愈发旺盛！在全国各地，都有大大小小的革命党。共产党组织突破围剿，赶往我们零散在各地组织的革命根据地，对抗围剿。然而，反动派力量强大，我们不得不在颠沛流离中寻求生存，随着各地组织要么惨遭围剿，要么突围成功聚集到中央根据地，要么转入地下活动，我们已经稳定了局势。\n\n在那之后的日子，并不好过。大量战士和随军家属，以及逃难的民众聚集在了这片小小的，不发达的根据地里。我们拼命收集物资，组织生产，却无法在反动派的层层围剿下恢复常态。饥饿慢慢成为了日常，军队士气也日渐低落——好在，平京的反动派似乎垮的比我们更快。\n\n根据地的每个人都知道，革命阵线仅仅是权宜之盟。即便阵线议会里真的有共产党和革命党在试图合作，两党内都有激进派的声音反对这一点。随着意识形态分歧的日渐增长，维护革命阵线已经不再是可行的计划，这只会葬送我们的革命。如今，围剿的力度减弱，根据地也得以喘息，而恐怕内战也会在不远的将来爆发——如果我们要采取行动，夺取根据地的控制权，驱赶意识形态的敌人，就必须现在立刻行动！"
SFR.10.a:0 "跟随共产党，团结民众，为远乡开创真正的明天！"
SFR.10.b:0 "跟随革命党，保卫革命，不负革命先烈牺牲！"

SFR.11.t:0 "陈坚的日记"
SFR.11.d:0 "陈坚大吼一声怒斥别的虫豸。"
SFR.11.a:0 "“当整个根据地都在腐烂时，唯有烧尽腐肉，才能让新骨生长。”"
SFR.11.tt:0 "§Y作为阵线的§R左翼反对派§!，陈坚认为革命阵线当下的管理制度太过松散，革命党和共产党的扯皮造成了效率的低下。在时机宝贵的当下，必须根据地实施严格的§O军事化管理§!，战胜反对派。§!\n\n§g作为反对派，他需要想办法降低阵线的凝聚力，团结左翼力量，最终发动政变。§!"

SFR.12.t:0 "张一心的信"
SFR.12.d:0 "月光从茅草棚的缝隙漏进地下室，张一心的钢笔尖在信纸上悬停良久，墨水滴落成一只扭曲的蜘蛛。信纸抬头印着褪色的革命党徽章——这是他从平京撤退时抢救出的最后一批党产。\n\n“致王继武将军：阔别经年，犹记南巴斯蒂亚共饮龙舌兰之夜。近日重读《联邦宪章》，深感议会制衡之道如棋局，落子不慎则满盘皆输。”他写到这里突然停笔，耳畔响起昨日阵线会议上的争吵——赵永军拍桌高喊“土地归农”，林有志的柴刀在腰间铮鸣。\n\n地下室的门轴吱呀作响，警卫员小吴闪身而入，袖口沾着油印传单的残屑：“张委员，二号联络点确认安全，但印刷厂发现有人在偷印共产党的《先锋报》……”\n\n“把油墨换成红色，”张一心撕下信纸一角，“就说这是为‘庆祝阵线团结周’特制的版本。”\n\n待脚步声远去，他继续写道：“闻将军麾下尚存‘白桦’‘青松’二营，弟有一批南巴斯蒂亚友人捐赠的医药器械，可假借商会名义送至贵部驻地。另附《联邦宪章》精装本一册，盼兄闲暇时斧正。”\n\n信纸末尾的暗语“斧正”二字被刻意描粗——那是当年他们在南巴斯蒂亚约定的行动代号。窗外传来夜枭啼鸣，张一心将信纸折成纸鹤，塞进装磺胺药瓶的木箱夹层。"
SFR.12.a:0 "“春茶将熟，盼兄携白水新茗共品。又及：茶具宜备双份。”"
SFR.12.tt:0 "§Y作为阵线的§C右翼反对派§!，张一心认为革命阵线正在滑向共产主义革命，夺权后的共产党人很可能清洗革命党，并夺取革命果实。在时机宝贵的当下，尽快集结残存的革命党部队，发动§1政变§!。§!\n\n§g作为反对派，他需要想办法降低阵线的凝聚力，团结右翼力量，最终发动政变。§!"

SFR.13.t:0 "会议中的演讲"
SFR.13.d:0 "陈坚怒斥别人效率低下。"
SFR.13.a:0 "与会者各执一词。"
SFR.13.b:0 "陈坚说服了多数人。"

SFR.14.t:0 "秘密集结"
SFR.14.d:0 "内容大概是陈坚联系了在共产党部队的政委，大家悄悄会面，吃个饭，然后得到了对方的支持。"
SFR.14.a:0 "我们必将取得胜利。"

SFR.15.t:0 "小集会"
SFR.15.d:0 "内容大概就是陈坚带着共产党一些人集会，演讲，批斗革命党和革命阵线怎么怎么妥协右倾，造成了多少损失。现在应该重新开始真正的革命，由共产党的激进分子来帮助根据地打国家统一战争之类的。然后有革命党的过来说别太极端了，说团结才能好之类的。陈坚在想要不要怼回去。"
SFR.15.a:0 "陈坚犹豫了。"
SFR.15.b:0 "“同志们，这就是我所提到的妥协分子！看看根据地现在…”"

SFR.16.t:0 "救济百姓"
SFR.16.d:0 "内容大概是张一心带着革命党从白区运来的物资连续跑了几个公社帮助当地居民。"
SFR.16.a:0 "…他决定顺便骂几句共产党。"
SFR.16.b:0 "…他决定认真干活。"

SFR.17.t:0 "左与右之争吵"
SFR.17.d:0 "大概是在一场会议上，陈坚带着共产党对张一心的革命党开始了吉列的豆蒸，闹得越来越大最后叶文石也不知道怎么做好。"
SFR.17.a:0 "共产党人在争论中占得上风。"
SFR.17.b:0 "革命党人在争论中占得上风。"
SFR.17.c:0 "谁也没有占得上风，但阵线的名声毫无疑问的臭了。"

SFR.18.t:0 "老友的再会"
SFR.18.d:0 "大概就是张一心和几个国际派的朋友聚会，回想光辉往事，然后抱怨外国援助几乎起不到任何作用。但远乡未来的发展可能还是需要依赖于这一点，他们或许可以想想办法。"
SFR.18.a:0 "想办法从白区运一批军事物资过来。"
SFR.18.b:0 "还是多弄一下民用物资吧。"

SFR.19.t:0 "安插内鬼"
SFR.19.d:0 "大概是张一心在私下和几个军官见面，大家谈论未来政变时的支持方向。"
SFR.19.a:0 "我相信你们，也请你们相信我。"

SFR.20.t:0 "支持革命阵线"
SFR.20.d:0 "大概就是叶文石，刘青兰和赵永军三个人开会，思考接下来该怎么做。赵永军提出应该优先团结农民，稳固阵线的根基，依靠根据地居民来对抗反对派；叶文石提出应该优先稳定领导层，然后确保军队的忠诚；刘青兰提出应该扩大阵线中民主的作用，通过接纳包括激进分子在内的一部分反对派来分裂敌人。"
SFR.20.a:0 "赵永军说的对，人民才是我们的根基。"
SFR.20.b:0 "叶文石说的对，稳固阵线当然应该从内部下手。"
SFR.20.c:0 "刘青兰说的对，革命阵线不能在这个情况下进一步分裂。"

SFR.21.t:0 "会面"
SFR.21.d:0 "大概讲的是叶文石，赵永军和共产党地方干部见面，会谈，然后交换一下根据地建设的意见。"
SFR.21.a:0 "你们的需求，我们一定会考虑…"
SFR.21.b:0 "…但是，现实也是很残酷的。"

SFR.22.t:0 "我们的根基所在"
SFR.22.d:0 "大概是赵永军和一位下属讨论根据地的生产报告，告诫下属比起领导，构成人口绝对多数的农民是维护根据地存续的重中之重，也是远乡革命的重中之重。"
SFR.22.a:0 "土地会变，但人民永存。"

SFR.23.t:0 "一顿饱饭"
SFR.23.d:0 "讲一个农民在劳作一天后，发现上面给地方公社发粮食了，组织了一顿大餐，吃爽了，工作积极性爆炸。晚上睡得很香。"
SFR.23.a:0 "“如果每天都能这样，该多好啊！”"

SFR.24.t:0 "清洗国际派？"
SFR.24.d:0 "赵永军，叶文石和刘青兰开会，讨论该怎么处理反对分子。赵永军希望能快刀斩乱麻，尽快除掉阵线的敌人；而刘青兰则指责说这是对革命党的偏见，借机清洗那些软弱，或是部分极端不忠分子可以，但没必要搞太大。"
SFR.24.a:0 "…听赵永军的，尽量减少国际派的影响力。"
SFR.24.b:0 "…听刘青兰的，不要太早破坏党内团结。"

SFR.25.t:0 "关于境外与本土派系的辩论"
SFR.25.d:0 "夜晚，叶文石正在阅读一份报告。具体内容是关于是否要在接下来的会议中强调远乡革命势力中，亲近本土化，主张因地制宜的开展革命，减少境外势力干涉的本土派。虽然本土派是一个模糊的概念，但其思想的支持者组成了根据地的中坚力量，在这一点上多做文书或许会进一步分裂根据地，但可以增强阵线支持者的力量。"
SFR.25.a:0 "这种好事当然应该鼓励！"
SFR.25.b:0 "可能没有必要弄得这么大张旗鼓。"

SFR.26.t:0 "大局为重"
SFR.26.d:0 "大概讲的是叶文石在和赵永军，刘青兰的密谈中提出，很难完全支持一方或者另外一方。他认为当下可以借助自己中间派的身份，巩固以阵线中央为核心的领导，同时排除两党的极端分子，维持两党平衡与合作，而非选边站并打击另外一方。赵永军和刘青兰表示理解，但需要阵线调拨资源安抚两党势力。"
SFR.26.a:0 "挤一挤，资源总是有的。"

SFR.27.t:0 "会议上的演讲"
SFR.27.d:0 "叶文石在会议上督促诸位在危难关头团结一致，讲一下革命的历史之类的屁话。"
SFR.27.a:0 "与会者纷纷起身鼓掌。"

SFR.28.t:0 "革命的军队"
SFR.28.d:0 "大概是叶文石参与一场军队会议，继续会面，然后强调革命军队忠于革命的重要性。"
SFR.28.a:0 "革命的军队，忠于革命！"

SFR.29.t:0 "叛逆的军队"
SFR.29.d:0 "叶文石和赵永军，刘青兰开会，提到根据地的部队缺乏训练，纪律松散，而且有许多不忠分子。赵永军提出，可以开始小范围的清洗以确保军队的忠诚，但这样势必会进一步恶化军队的效率，需要更长的时间恢复，不过总归是值得的；刘青兰则提出，可以先集中精力在强化军队的纪律，训练等问题上，不忠分子的问题可以小范围解决，不能让根据地的武装力量陷入到被动的状态。"
SFR.29.a:0 "全面清洗！ 我们不能容忍军队中出现不忠分子。"
SFR.29.b:0 "先集中精力放到改善纪律上吧，大局为重。"

SFR.30.t:0 "调动部队"
SFR.30.d:0 "叶文石看报告，他可以把革命党的残兵调来中央整合，或者把共产党的民兵来回调动防止激进分子不忠。"
SFR.30.a:0 "确保革命党的残兵或许更重要…"
SFR.30.b:0 "…但民兵构成了主要的防御力量，不能不防。"

SFR.31.t:0 "论把相互厌恶的人塞到同一间房里…"
SFR.31.d:0 "大概就是在刘青兰的组织下，叶文石组织了一次关于阵线存续的会谈，拉拢了来自共产党和革命党双方的领导人一起见面，讨论之前没有讨论的问题。然后关于地方运转的一些事项，两边骂起来了。总体来说，共产党这边占理，如果和稀泥的话，相当于帮他们。"
SFR.31.a:0 "最后，二人决定和稀泥。"
SFR.31.b:0 "刘青兰仔细想了想，还是决定帮革命党一方。"

SFR.32.t:0 "喝茶"
SFR.32.d:0 "刘青兰和几个革命党元老喝茶，促使大家为了大局而团结，同时接纳变化的必要性。"
SFR.32.a:0 "至少谈出点什么了。"

SFR.33.t:0 "多方会谈"
SFR.33.d:0 "赵永军，叶文石和刘青兰在达成一致后把两党元老拉过来开会，在吉列的豆蒸后，大家决定放弃分歧，共建革命共和国，在未来通过民主的方式决定两党与国家的未来，并且压制激进分子的影响。"
SFR.33.a:0 "我们只能希望大家真的说到做到…"

SFR.50.t:0 "清洗反对派"
SFR.50.d:0 "几个反对派在商量怎么干碎阵线，然后军队大吼一声扑了过来。"
SFR.50.a:0 "同样的事情在根据地各地重复着…"

SFR.51.t:0 "黎明之后"
SFR.51.d:0 "叶文石，刘青兰和赵永军三个人忙活了一晚上清洗的事宜，早上终于把问题解决了，三个人长舒一口气迎来了黎明。"
SFR.51.a:0 "我们需要做的，还有很多。"

SFR.52.t:0 "政变"
SFR.52.d:0 "这里要写相对通用的文本，基本上就是叶文石上班路上发现到处都是军人。他说自己是来上班的，你们要干什么？然后被扣住了。"
SFR.52.a:0 "部队把他押去见了反对派首领。"
SFR.52.b:0 "部队似乎走的方向不太对…"

SFR.53.t:0 "来自左翼的审判"
SFR.53.d:0 "大概就是陈坚看着被押过去的叶文石，细数他的罪行。赵永军虽然也被关起来了但只是剥夺政治权力，刘青兰和许多其他革命党人都被执行了死刑，但关于怎么处理叶文石就犯了难。"
SFR.53.a:0 "…判处无期徒刑。"
SFR.53.b:0 "…剥夺政治权力。"

SFR.54.t:0 "革命党人的怒火"
SFR.54.d:0 "张一心把叶文石关进了地下室，对骂两句后把叶文石毙了。随后，张一心下令接管根据地的武装力量，清洗共产党，一个都不放过。"
SFR.54.a:0 "要变天了。"

SFR.55.t:0 "革命危难之际"
SFR.55.d:0 "叶文石被林有志的部队押去见了林有志，这位出身革命党，后又加入共产党的军事领袖已经提前察觉到了反对派的蠢蠢欲动，他在政变发生前就介入阻止，已经关押了多名反对派领袖。林有志要求叶文石交出权力。"
SFR.55.a:0 "革命的军队，如今真正为了革命而战。"

SFR.100.t:0 "不容乐观的局势"
SFR.100.d:0 "阵线三人组开会，讨论当下远乡局势，为浪费时间在内部斗争上感到不值。"
SFR.100.a:0 "我们的时间不多了..."

SFR.101.t:0 "恢复生产的牺牲"
SFR.101.d:0 "为了快速恢复生产，可能要在一定程度上牺牲民众的利益。"
SFR.101.a:0 "有时候，必须做出取舍。"

SFR.102.t:0 "内部维稳的必要性"
SFR.102.d:0 "革命阵线仍非铁板一片，但我们要在是否进一步改革中做出取舍，毕竟一些改革已经是不必要的了。"
SFR.102.a:0 "有些事情可以战后再处理——如果还有“战后”的话。"

SFR.103.t:0 "小范围军改倡议"
SFR.103.d:0 "革命阵线的军队需要一定程度的强化。"
SFR.103.a:0 "...不过，只能做有限的工作。"

SFR.150.t:0 "风暴已至"
SFR.150.d:0 "南革阵内战开始事件。"
SFR.150.a:0 "开打！"

SFR.151.t:0 "政府军投诚！"
SFR.151.d:0 "远乡政府润了。"
SFR.151.a:0 "好！"

SFR.152.t:0 "内战之终...？"
SFR.152.d:0 "内战结束了...吗？"
SFR.152.a:0 "...但是，我们还有其它分裂势力要处理。"
SFR.152.b:0 "...但是，我们还有青天军的“朋友”们需要处理。"

SFR.200.t:0 "新世界的曙光"
SFR.200.d:0 "内战结束了，可任务尚未完成。"
SFR.200.a:0 "先修整南方，再准备统一北方。"

SFR.201.t:0 "先来后到？"
SFR.201.d:0 "几份提案同时被摆上桌面，可总要决定先做什么。"
SFR.201.a:0 "我们应该先维持大城市的稳定。"
SFR.201.b:0 "处理各地流窜的土匪显然更中立。"
SFR.201.c:0 "帮助各地农村重建秩序有助于未来的改革！"

SFR.202.t:0 "处理投降部队？"
SFR.202.d:0 "许多政府军与叛军向我们投降，需要想办法处理他们。"
SFR.202.a:0 "为我们死去的同志报仇！"
SFR.202.b:0 "收编部分旧政府军，其余该判判。"
SFR.202.c:0 "准备大规模改造。"

SFR.203.t:0 "大剿匪"
SFR.203.d:0 "全国匪患不断，我们需要尽快做出应对"
SFR.203.a:0 "至少在这点上，与会人员达成了一致。"

SFR.204.t:0 "连带伤害"
SFR.204.d:0 "剿匪运动如火如荼，可伤害也不断扩大，许多原本没有参与的人也被卷入其中。"
SFR.204.a:0 "叫小伙子们冷静一点！"
SFR.204.b:0 "我看提出问题的人也很可疑啊！"

SFR.205.t:0 "政府军将领"
SFR.205.d:0 "前政府军有一批将领向我们投降，他们中有的职业技能出众，有的则有所悔改。然而，他们大多都是战犯，曾经也对远乡人民犯下了不可饶恕的罪过，我们应该怎么办？"
SFR.205.a:0 "我们可以将他们送去特殊的监狱改造。"
SFR.205.b:0 "罪大恶极的枪毙了事，有所悔改的则接纳。"
SFR.205.c:0 "能力出众者可以加入我们的队伍。"

SFR.206.t:0 "重振城市秩序"
SFR.206.d:0 "城市陷入了混乱，我们的精力有限，应该采取何种行动？"
SFR.206.a:0 "扩大物资供应。"
SFR.206.b:0 "重建城市警察力量。"
SFR.206.c:0 "实行军事管制。"

SFR.207.t:0 "缓和的街道"
SFR.207.d:0 "随着物资供应的充足，街道恢复安全。"
SFR.207.a:0 "好事。"

SFR.208.t:0 "城市秩序恢复"
SFR.208.d:0 "随着物资供应的充足，街道恢复安全。"
SFR.208.a:0 "好事。"

SFR.209.t:0 "快速恢复生产"
SFR.209.d:0 "随着物资供应的充足，街道恢复安全。"
SFR.209.a:0 "好事。"

SFR.210.t:0 "饱饭"
SFR.210.d:0 "饿了一段时间的小壁灯吃上东西了。"
SFR.210.a:0 "好事。"

SFR.211.t:0 "城市残存革命党的命运？"
SFR.211.d:0 "左逼被突突的时候也有人靠投降或者潜伏在城市抗了下来。接下来决定他们该怎么办。"
SFR.211.a:0 "乡村需要帮助，让他们去维持乡村秩序吧。"
SFR.211.b:0 "还是留在城市审查吧。"
SFR.211.c:0 "他们中有的人可以帮助我们整合军队。"

SFR.212.t:0 "下乡"
SFR.212.d:0 "有点危险，带不带护卫？"
SFR.212.a:0 "带。"
SFR.212.b:0 "带nm。"

SFR.213.t:0 "和谐一日"
SFR.213.d:0 "度过了美好的一天"
SFR.213.a:0 "比想象的要好。"

SFR.214.t:0 "道阻且长"
SFR.214.d:0 "百姓提防自己。"
SFR.214.a:0 "没办法。"

SFR.215.t:0 "不受欢迎"
SFR.215.d:0 "山贼大吼一声。"
SFR.215.a:0 "情况不妙。"

SFR.216.t:0 "新血液"
SFR.216.d:0 "随着基层组织的进一步扩张，各地的新人才如雨后春笋般涌现。"
SFR.216.a:0 "好事啊。"

SFR.217.t:0 "难办抉择"
SFR.217.d:0 "目前可以用于土地改革的资源有限，我们可以优先完成乡村地区的重建，也可以优先供给城市，或者选择协助军队的训练。"
SFR.217.a:0 "推进乡村重建。"
SFR.217.b:0 "优先供给城市。"
SFR.217.c:0 "侧重军队训练。"

SFR.218.t:0 "一切的根源"
SFR.218.d:0 "叶文石纠结怎么对付远乡王室。"
SFR.218.a:0 "麻烦了。"

SFR.219.t:0 "郑家的命运"
SFR.219.d:0 "决定郑家的命运。"
SFR.219.a:0 "他们会接受改造，作为新生国度的公民生存。"
SFR.219.b:0 "他们会被流放。"
SFR.219.c:0 "我们要他们血债血偿！"

SFR.220.t:0 "恶徒的命运"
SFR.220.d:0 "远乡四虫豸的命运。"
SFR.220.a:0 "他们会滚出这个国家，永不回归。"
SFR.220.b:0 "他们必须血债血偿！"

SFR.221.t:0 "新的开始"
SFR.221.d:0 "被软禁的郑红被带去工厂和其她女工一起上工。"
SFR.221.a:0 "这也是生活的一种。"

SFR.222.t:0 "往日之影"
SFR.222.d:0 "被软禁的郑钧在房间看报纸，他的身体不允许他做太剧烈的活动，感叹自己这辈子结束了。"
SFR.222.a:0 "就这样了。"

SFR.223.t:0 "海风"
SFR.223.d:0 "被流放的郑红在看管下带着郑钧在船只上望风。"
SFR.223.a:0 "就这样了。"

SFR.224.t:0 "审判"
SFR.224.d:0 "审判结果出炉，郑钧被处以极刑，郑红被处以长期监禁。"
SFR.224.a:0 "就这样了。"

SFR.225.t:0 "命定之日"
SFR.225.d:0 "在郑红的哭泣声中，郑钧被毙了。
SFR.225.a:0 "就这样了。"

SFR.226.t:0 "报应"
SFR.226.d:0 "被流放的虫豸被愤怒的民众干碎了。"
SFR.226.a:0 "报应来了。"

SFR.227.t:0 "结束"
SFR.227.d:0 "虫豸被毙了。"
SFR.227.a:0 "好似喵。"

SFR.250.t:0 "大会闭幕！"
SFR.250.d:0 ""
SFR.250.a:0 "赵永军"
SFR.250.b:0 "刘青兰"

SFR.300.t:0 "风波将至"
SFR.300.d:0 "大概就是一个小兵看到正在动员，估计要打仗了。有点不安又有点激动。"
SFR.300.a:0 "我们一定要解放全远乡！"

SFR.301.t:0 "西北调查报告"
SFR.301.d:0 "介绍西北的情况。"
SFR.301.a:0 "西北的情况很复杂，但反动派的势力并不强大。"

SFR.302.t:0 "[SFR.GetName]的橄榄枝？"
SFR.302.d:0 "[SFR.GetName]派了代表过来。"
SFR.302.a:0 "让我们看看..."

SFR.303.t:0 "会谈"
SFR.303.d:0 ""
SFR.303.a:0 "希望他们能识时务。"

SFR.304.t:0 "会谈"
SFR.304.d:0 ""
SFR.304.a:0 "同意"
SFR.304.b:0 "拒绝"

SFR.305.t:0 "[NWF.GetName]同意了我们的要求！"
SFR.305.d:0 ""
SFR.305.a:0 "太好了。"

SFR.306.t:0 "[NWF.GetName]拒绝了我们的要求！"
SFR.306.d:0 ""
SFR.306.a:0 "我们别无他选..."

SFR.307.t:0 "唯有一战"
SFR.307.d:0 "半通用文本，任意领导人看报告然后决定要战。"
SFR.307.a:0 "解放刻不容缓！"

SFR.308.t:0 "动员大会"
SFR.308.d:0 ""
SFR.308.a:0 "为国家统一而战！"

SFR.309.t:0 "致我们共同的未来"
SFR.309.d:0 "西北和平归来，豪。"
SFR.309.a:0 "离国家和平统一又近了一步！"

SFR.310.t:0 "团结可以团结的力量"
SFR.310.d:0 "吸纳了西北进步人士进入新政府。"
SFR.310.a:0 "人民的政府！"

SFR.311.t:0 "战争的伤痕"
SFR.311.d:0 "开始准备西北地区的重建工作。"
SFR.311.a:0 "要做的还有很多。"

SFR.312.t:0 "北远乡调查报告"
SFR.312.d:0 "介绍北方的情况。"
SFR.312.a:0 "一定要将解放的旗帜插到北远乡！"

SFR.313.t:0 "联络自由联军"
SFR.313.d:0 "我们可以帮助自由联军。"
SFR.313.a:0 "发出邀请。"

SFR.314.t:0 "来自南方的邀请？"
SFR.314.d:0 ""
SFR.314.a:0 "好"
SFR.314.b:0 "布豪"

SFR.315.t:0 "自由联军接受了我们的要求"
SFR.315.d:0 ""
SFR.315.a:0 "离国家和平统一又近了一步！"

SFR.316.t:0 "自由联军拒绝了我们的要求"
SFR.316.d:0 ""
SFR.316.a:0 "我们别无他选..."

SFR.317.t:0 "故乡"
SFR.317.d:0 "动员大会后，大概就是因为北方战乱跑到南方的士兵想起来故乡，现在有机会和当地的军队共同作战很开心。"
SFR.317.a:0 "故乡，近在咫尺了..."

SFR.318.t:0 "故乡"
SFR.318.d:0 "动员大会后，大概就是因为北方战乱跑到南方的士兵想起来故乡，现在要一口气打回去了，有点不安desu。"
SFR.318.a:0 "故乡，近在咫尺了..."

SFR.319.t:0 "联欢"
SFR.319.d:0 "自由联军的江湖好汉在并入革命军后办了场宴会，差点喝中风。"
SFR.319.a:0 "下次还是少喝点。"

SFR.320.t:0 "革命的山贼？"
SFR.320.d:0 "大概就是北方有一批绿林好汉一类的军队，现在可以整合。整合了有助于加快当地重建工作，但可能会破坏军队素养和稳定。"
SFR.320.a:0 "可以试试。"
SFR.320.b:0 "绝对不行。"

SFR.321.t:0 "最后的反动派"
SFR.321.d:0 "介绍一下郑义和贵族起义。"
SFR.321.a:0 "怎么办，只有打！"

SFR.322.t:0 "为逝者复仇"
SFR.322.d:0 ""
SFR.322.a:0 "绝不留情！"
SFR.322.b:0 "送往劳动改造。"

SFR.323.t:0 "人鱼特区历史报告"
SFR.323.d:0 ""
SFR.323.a:0 "远乡的领土必须被收回！"

SFR.324.t:0 "[SFR.GetName]要求我们无条件投降！"
SFR.324.d:0 ""
SFR.324.a:0 "我们别无选择..."
SFR.324.b:0 "滚！"

SFR.325.t:0 "人鱼同意了我们的要求！"
SFR.325.d:0 ""
SFR.325.a:0 "那很好了。"

SFR.326.t:0 "人鱼拒绝了我们的要求！"
SFR.326.d:0 ""
SFR.326.a:0 "看来得来硬的了。"

SFR.327.t:0 "小小的复仇"
SFR.327.d:0 ""
SFR.327.a:0 "逃不开的。"

SFR.328.t:0 "归乡大会"
SFR.328.d:0 ""
SFR.328.a:0 "北方的游子终于回到了故乡。"

SFR.329.t:0 "祖国新生"
SFR.329.d:0 ""
SFR.329.a:0 "我们还有许多工作要做。"

SFR.330.t:0 "全国人口普查"
SFR.330.d:0 ""
SFR.330.a:0 "我们还有许多工作要做。"

SFR.331.t:0 "走马上任"
SFR.331.d:0 ""
SFR.331.a:0 "我们还有许多工作要做。"

SFR.332.t:0 "新瓶旧酒"
SFR.332.d:0 ""
SFR.332.a:0 "我们还有许多工作要做。"

SFR.333.t:0 "平京一日"
SFR.333.d:0 ""
SFR.333.a:0 "崭新的祖国。"

SFR.334.t:0 "老伙计"
SFR.334.d:0 ""
SFR.334.a:0 "我们为你报仇了。"

SFR.335.t:0 "红旗高悬"
SFR.335.d:0 ""
SFR.335.a:0 "...成立了！"

SFR.350.t:0 "理想实现，但是..."
SFR.350.d:0 ""
SFR.350.a:0 "...阵线将何去何从？"

SFR.351.t:0 "远乡共产党的未来？"
SFR.351.d:0 ""
SFR.351.a:0 "他们虎视眈眈。"
SFR.351.a.tt:0 "§R等到工农代表大会成立，情况会进一步复杂化...§!"

SFR.352.t:0 "又一次会议"
SFR.352.d:0 "赵永军看着台下争执不休的老头子们，他们没有多少实权，担心的却是又因为老年病死了几个人，感叹阵线议会的终局该到了。"
SFR.352.a:0 "是时候大换血了。"
SFR.352.a.tt:0 "这会开启一系列事件链，并最终导致§R反右运动§!，§O左右不满§!或是§1反攻倒算§!的发生。如何应对将影响我们§C权力机关改革§!的§R选择§!。"

SFR.353.t:0 "权力的诱惑"
SFR.353.d:0 "有些人担心解散阵线议会就是针对自己。"
SFR.353.a:0 "是时候拉清单了。"
SFR.353.b:0 "我们或许能挽回他们的想法..."

SFR.354.t:0 "拉清单"
SFR.354.d:0 "有些老东西想搞事情。"
SFR.354.a:0 "是时候出重拳了。"
SFR.354.b:0 "要不要安排一些事情把他们调走？"

SFR.355.t:0 "杀鸡儆猴"
SFR.355.d:0 "老登一边喊着自己搞过功一边被带走了。"
SFR.355.a:0 "“我为革命立过功！你们不能抓我！”"

SFR.356.t:0 "下地干活"
SFR.356.d:0 "老登被指控一些杂七杂八罪名，下去基层干活了。"
SFR.356.a:0 "“继续干吧。”"

SFR.357.t:0 "滋生的不满"
SFR.357.d:0 "老登看到一些人被换下来或是被抓，愈发担心。"
SFR.357.a:0 "我们的革命，究竟会变成什么样子..."

SFR.358.t:0 "苦口婆心"
SFR.358.d:0 "怎么逼逼赖赖都没用。"
SFR.358.a:0 "我们或许可以尝试边缘化他们？"
SFR.358.b:0 "准备一些用于安抚的政策会是好主意。"

SFR.359.t:0 "闲的可以"
SFR.359.d:0 "老登被边缘化到不重要的岗位上了。"
SFR.359.a:0 "至少可以花点时间研究下怎么喝茶了。"

SFR.360.t:0 "照顾后事"
SFR.360.d:0 "干部疗养院，启动！"
SFR.360.a:0 "这些资源，本可以用在更要紧的事情上..."

SFR.361.t:0 "滋生的不安"
SFR.361.d:0 "左翼分子看到对老登的安置，感到不安。"
SFR.361.a:0 "我们的革命，究竟会变成什么样子..."

SFR.362.t:0 "代表大会的未来"
SFR.362.d:0 "有人担心代表大会成立后党的力量会被分散。"
SFR.362.a:0 "人民自会发声！"
SFR.362.b:0 "我们完全可以加强控制。"

SFR.363.t:0 "人民之声"
SFR.363.d:0 "虽然我们鼓励民众积极参与未来的代表大会，但也有人担心是否要针对性的维持党总体上的统治。"
SFR.363.a:0 "百姓有权对政府监督..."
SFR.363.b:0 "...但发声也是有所前提的。"

SFR.364.t:0 "选择性监督"
SFR.364.d:0 "想参与监督但是被拦下来了。"
SFR.364.a:0 "我知道你很急，但是你先别急。"

SFR.365.t:0 "选择性发声"
SFR.365.d:0 "被列为反动党派的人被突突了。"
SFR.365.a:0 "这样的事情屡见不鲜。"

SFR.366.t:0 "谁来发声？"
SFR.366.d:0 "右翼分子担心新的改革只想让改革主导者希望的人自由发声。"
SFR.366.a:0 "我们的革命，究竟会变成什么样子..."

SFR.367.t:0 "加强控制"
SFR.367.d:0 "我们不能在改革过程中随波逐流，任大会的未来变动。"
SFR.367.a:0 "党内稳定是第一要务"
SFR.367.b:0 "或许可以允许更多党内辩论？"

SFR.368.t:0 "收紧栓绳"
SFR.368.d:0 "会议上，大家被要求团结一致。"
SFR.368.a:0 "在特殊时刻，我们确实需要特殊举措。"

SFR.369.t:0 "互相报告"
SFR.369.d:0 "豆起来了。"
SFR.369.a:0 "这事儿闹个没完..."

SFR.370.t:0 "新的担忧"
SFR.370.d:0 "左翼分子担心新的改革无法让人民发声。"
SFR.370.a:0 "我们的革命，究竟会变成什么样子..."

SFR.371.t:0 "潜在的危机"
SFR.371.d:0 "有些老东西密谋反对我们的改革。"
SFR.371.a:0 "是时候出重拳了。"
SFR.371.b:0 "看来他们需要一些更强有力的“说服”。"

SFR.372.t:0 "重拳出击"
SFR.372.d:0 "对秘密反对党的革命的人出重拳。"
SFR.372.a:0 "遵照计划来。"
SFR.372.b:0 "要不要乘机打击我们的政敌？"

SFR.373.t:0 "抓捕"
SFR.373.d:0 "在平京街道逃窜的反对派探子被追上了。"
SFR.373.a:0 "为了祖国的稳定。"

SFR.374.t:0 "借机清算"
SFR.374.d:0 "党内的异议分子被逮捕了。"
SFR.374.a:0 "我就知道他们没安好心..."

SFR.375.t:0 "越过雷池"
SFR.375.d:0 "右翼认为最近的清算太过火了。"
SFR.375.a:0 "我们的革命，究竟会变成什么样子..."

SFR.376.t:0 "强有力的“说服”"
SFR.376.d:0 "需要想办法彻底把老登这一块处理好。"
SFR.376.a:0 "试试威胁..."
SFR.376.b:0 "...或是招安？"

SFR.377.t:0 "威胁"
SFR.377.d:0 "不听话就艾草。"
SFR.377.a:0 "人总要为自己的下半生着想的。"

SFR.378.t:0 "招安"
SFR.378.d:0 "新的补助计划和安抚岗位被专门找了出来。"
SFR.378.a:0 "好好过完美的下半生不好吗？"

SFR.379.t:0 "未能根除的问题"
SFR.379.d:0 "党内左翼觉得威胁和招安不能解决根源的问题。"
SFR.379.a:0 "我们的革命，究竟会变成什么样子..."

SFR.380.t:0 "工农代表大会提议"
SFR.380.d:0 "介绍工农代表大会。"
SFR.380.a:0 "我们需要让人民真正的当家做主！"

SFR.381.t:0 "国民议会倡议"
SFR.381.d:0 "介绍国民议会。"
SFR.381.a:0 "可选项之一。"

SFR.382.t:0 "解散阵线议会"
SFR.382.d:0 "大会上，宣布解散了阵线议会，到这一步为止还好。然后，决定工农代表大会的时候，吵起来了。"
SFR.382.a:0 "接下来..."
SFR.382.a.tt:0 "§Y我们先前的选择决定了接下来会发生什么。§!"

SFR.383.t:0 "党内左翼的怒火"
SFR.383.d:0 "党内左翼对政治改革对右翼的让步感到愤怒，声音占据了会议的主导地位。"
SFR.383.a:0 "同志们，冷静一点..."

SFR.384.t:0 "党内右翼的怒火"
SFR.384.d:0 "党内右翼对政治改革的激进化感到愤怒，声音占据了会议的主导地位。"
SFR.384.a:0 "同志们，冷静一点..."

SFR.385.t:0 "吵闹的公堂"
SFR.385.d:0 "党内所有人都不满当下的政治改革路线，"
SFR.385.a:0 "同志们，冷静一点..."

SFR.386.t:0 "党内左翼的威胁"
SFR.386.d:0 "党内左翼代表找到赵永军，要求绝不能同意国民议会提案，否则就继续闹下去。"
SFR.386.a:0 "让我们看看提案。"

SFR.387.t:0 "党内右翼的威胁"
SFR.387.d:0 "党内右翼代表找到赵永军，要求尽全力通过国民议会提案，否则就继续闹下去。"
SFR.387.a:0 "让我们看看提案。"

SFR.388.t:0 "鸡飞狗跳"
SFR.388.d:0 "最近的中央闹得鸡飞狗跳的，必须靠下死命令才把局势稳定下来。"
SFR.388.a:0 "可以暂缓两天。"
SFR.388.a.tt:0 "§R我们暂时无法进一步改革。§!"
SFR_temp_ban_pol_reform:0 "§Y距离废除阵线议会已经过去超过180天§!"

SFR.389.t:0 "政治局势缓和"
SFR.389.d:0 "最近的政治局势缓和下来了。"
SFR.389.a:0 "那很好了。"
SFR.389.a.tt:0 "§C局势会持续缓和，直到重归稳定。§!"

SFR.390.t:0 "革命的新一阶段"
SFR.390.d:0 "工农代表大会成立了！"
SFR.390.a:0 "好事。"

SFR.391.t:0 "国民议会"
SFR.391.d:0 "国民议会成立了！"
SFR.391.a:0 "好事。"

SFR.400.t:0 "全国土改"
