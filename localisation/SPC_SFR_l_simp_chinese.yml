SFR_maintain_the_front_title_1_tt:0 "当前阵线凝聚力：[GET_SFR_maintain_the_front_unity]\n[GET_SFR_maintain_the_front_unity_desc]\n\n§g为了维持阵线的稳定，我们需要尽可能地保证凝聚力在§Y团结一致§!或更好的等级上。低于这个值可能会导致持续不断的矛盾§t冲突§!，削弱根据地的力量。§!"
GET_SFR_maintain_the_front_unity_desc_1:0 "§C当下，革命阵线的同志们摒弃前嫌，精诚团结，共同为远乡革命而奋斗着。§!"
GET_SFR_maintain_the_front_unity_desc_2:0 "§Y在中央的领导下，如今的革命阵线可以称得上是团结一致，革命同志们在同一面旗帜下共同奋斗。§!"
GET_SFR_maintain_the_front_unity_desc_3:0 "§O虽然阵线整体呈现出团结的状态，可背后却风波不断，密谋的反对派已经开始行动。§!"
GET_SFR_maintain_the_front_unity_desc_4:0 "§R由于领导不力，阵线的反对者已经开始公开抗议我们的统治。我们最好尽快采取行动。§!"
