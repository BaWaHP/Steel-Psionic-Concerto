SFR.412.a:0 "然后，天亮了。"

SFR.413.t:0 "公审大会"
SFR.413.d:0 "本来打算带着气节被枪毙的老爷，在所有罪状被列出后，被民众痛骂到心虚。"
SFR.413.a:0 "人群的呼喊一浪接过一浪，他的求饶声转瞬即逝。"
SFR.413.a.tt:0 "§R报应最后还是来了。§!"

SFR.414.t:0 "簿册"
