SFR_opposition_bop_desc_1:0 "---§R远乡共产党§!---"
SFR_opposition_bop_desc_1_tt:0 "§R远乡共产党§!\n\n§g§R远乡共产党§!在革命的早先年头是名不经传的小党，既没有境外支持，也缺乏本土的理论体系。随着革命局势的严峻化，共产党逐渐扛起了远乡革命的大旗，建立根据地，组织游击战争，保卫远乡革命的最后火种。现在的远乡共产党已经成为了远乡的革命的中流砥柱，即便是最腐朽的革命党元老，也不得不承认需要和共产党分享权力。§!\n\n§g§Y阵线的内部斗争§!反应了§R远乡共产党§!和§C远乡革命党§!在革命阵线中的权力斗争。由于二者意识形态的不同，随着一方的权势压倒另一方，会对我们的根据地产生不同的效果；然而，我们应当尽量避免过于侧重一方，避免破坏阵线的凝聚力。"
SFR_support_commi_activity:0 "§R支持共产党活动§!"
SFR_support_base_construction:0 "§R协助根据地建设§!"
SFR_expand_land_reform:0 "§R扩大土地改革§!"

SFR_opposition_bop_desc_2:0 "---§C远乡革命党§!---"
SFR_opposition_bop_desc_2_tt:0 "§C远乡革命党§!\n\n§g§C远乡革命党§!最初是涵盖了多数民主化运动思想的大帐篷政党，在南巴联邦的支持下和远乡政府合作，开展一系列民主化改革。随着合作关系的破裂，革命党遭受了毁灭性打击，多数温和派选择放弃革命理想，或是逃亡海外，左翼激进分子则留在远乡境内，和共产党组成革命阵线，共同捍卫革命果实。§!\n\n§g§Y阵线的内部斗争§!反应了§R远乡共产党§!和§C远乡革命党§!在革命阵线中的权力斗争。由于二者意识形态的不同，随着一方的权势压倒另一方，会对我们的根据地产生不同的效果；然而，我们应当尽量避免过于侧重一方，避免破坏阵线的凝聚力。§!"
