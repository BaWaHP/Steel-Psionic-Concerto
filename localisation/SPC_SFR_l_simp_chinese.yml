###民族精神###
SFR_front_unity_idea_1:0 "阵线凝聚力：§C齐心协力§!"
SFR_front_unity_idea_1_desc:0 "§C当下，革命阵线的同志们摒弃前嫌，精诚团结，共同为远乡革命而奋斗着。§!"
SFR_front_unity_idea_2:0 "阵线凝聚力：§Y团结一致§!"
SFR_front_unity_idea_2_desc:0 "§Y在中央的领导下，如今的革命阵线可以称得上是团结一致，革命同志们在同一面旗帜下共同奋斗。§!"
SFR_front_unity_idea_3:0 "阵线凝聚力：§O阴云四起§!"
SFR_front_unity_idea_3_desc:0 "§O虽然阵线整体呈现出团结的状态，可背后却风波不断，密谋的反对派已经开始行动。§!"
SFR_front_unity_idea_4:0 "阵线凝聚力：§R抗议不断§!"
SFR_front_unity_idea_4_desc:0 "§R由于领导不力，阵线的反对者已经开始公开抗议我们的统治。我们最好尽快采取行动。§!"
SFR_front_unity_idea_5:0 "阵线凝聚力：§1濒临崩溃§!"
SFR_front_unity_idea_5_desc:0 "§1阵线的领导已经濒临崩溃，反对派大行其道，权力变动近在咫尺。§!"

SFR_revenge_fury:0 "复仇怒火"
SFR_revenge_fury_desc:0 "当邪恶的王国政府下令对他们的合作者开火的那一天，革命党人心中残存的对远乡王国的最后一丝怜悯也消耗殆尽。遭到背叛的革命党人背井离乡，抛弃一切，拾起那破碎的武器，将自身隐藏进环境恶劣的大山，同装备精良的政府军打起了游击。数十年的游击没有击垮革命者，相反，同伴的鲜血和无数民众的尸体堆砌而成了名为革命根据地的堡垒，保护着革命阵线最后的根据地。\n\n然而，这份强烈的复仇主义情绪并不在任何时候都是正面的。狂热的同伴们为了阵线的方针而自相残杀，忽视群众的生活温饱，被复仇的怒火推动着，成为军国主义的提线木偶。"
SFR_divided_bases:0 "分裂的根据地"
SFR_divided_bases_desc:0 "虽然反建制的最终目的一致，可革命阵线也并非铁板一片。多年游击作战带来的失败主义情绪不可被忽视，而勉强维持阵线团结的根据地政府的威望也日渐衰弱。构成革命阵线的共产主义者，世联主义者，以及民主主义者都对阵线的未来有自己的看法，而在这些势均力敌的派系内部也同样是斗争不断。意识形态的分裂已经扩散到全根据地上下，这降低了群众对根据地政府的信任，同时使得中央政府寸步难行。"
SFR_holodomor:0 "强弩之末"
SFR_holodomor_desc:0 "漫长的游击战争和长期遭到的经济封锁使得根据地很难维持稳定的经济体系，决策层的混乱以及派系林立的政府也使得改革难以下达。虽然这些问题在游击战争的初期并不严重，可随着时间的流逝，紊乱的社会体系和不断恶化的经济系统在使得根据地各地民众无法维持正常生活，轻度的饥荒随处可见，而工业发展以及装备生产等事项也受到了严重的影响。"
SFR_holodomor_7:0 "团结的民众"
SFR_holodomor_7_desc:0 "在我们坚持不懈的改革下，根据地上下一心，誓要消灭反动派，统一远乡！"
SFR_guerrilla_army:0 "游击型军队"
SFR_guerrilla_army_desc:0 "革命阵线的军队组成大多是各地志愿参军的民兵，他们缺乏正规军队的训练，同时无法获得现代化的武器和高效的后勤路线，虽然在根据地的恶劣地形下，游击作战可以发挥较大的效果，并且是根据地额外武器缴获的重要来源，但考虑到未来对王国政府发动的解放战争，维持当下的方针而不作改进或许并非好主意。"

SFR_purge_army:0 "清洗军队"
SFR_purge_army_desc:0 "随着一场上涉及到指挥系统，下涉及到大头兵的清洗开始，根据地的军事力量陷入了停摆。然而，针对不忠分子和贪腐分子的清洗长久来看或许有利于我们的军事发展，并且有助于当前的稳定。"

SFR_army_discipline:0 "注意部队纪律"
SFR_army_discipline_desc:0 "我们需要注意部队在战时的纪律行为，我们和同旧政府的军队不一样！"

SFR_death_squad:0 "革命的敢死队"
SFR_death_squad_desc:0 "远乡革命已经到了它的历史转折点！让我们向前进！"

SFR_death_battle:0 "决死一战"
SFR_death_battle_desc:0 "我们的革命已经到了其生死存亡的关键时刻，让我们发起最后一搏！"
SFR_death_battle_tt:0 "§R如果我们仍然无法取得成功，将面临毁灭性的后果！§!"

SFR_collapse:0 "崩溃"
SFR_collapse_desc:0 "结束了，一切都结束了..."

SFR_roving_army:0 "流窜的军队"
SFR_roving_army_desc:0 "内战的硝烟早已散去，但战火遗留的阴霾却久久未能消散。在战败的反动派和失去目标的起义军中，无数溃兵、逃兵与流亡者纠结成一股股无法无天的武装群体，他们四处流窜，在城市、乡间乃至边境地区烧杀抢掠，无所不用其极地搜刮最后的生存资源。他们或是已经失去了信仰，仅以掠夺为生，或是仍幻想着东山再起，在贫民窟、废墟与黑市间积蓄力量，伺机重燃战火。作为新生的中央政府，我们需要尽快采取行动！"

SFR_roving_army_5:0 "整编各地部队"
SFR_roving_army_5_desc:0 "经过一系列艰难的改革与整顿，曾经四处流窜、为患一方的残兵败卒终于被纳入政府的掌控之下，或是得到了应有的审判。昔日那些劫掠乡村、占山为王的土匪被迫缴械，零散的起义军、旧政权残军也被编入新的部队体系。虽然整编工作的进展并不完美，部分地区仍存在漏网之鱼，一些旧势力仍在暗中试图保持独立，但整体而言，国家的军事体系已逐渐恢复稳定，军队终于重新成为政府可依赖的支柱，而非失控的威胁。\n\n然而，改革的代价仍然存在。新编军队的纪律尚未完全恢复，部分士兵仍保留着过去的匪性，而地方军阀的残余势力也可能随时掀起新的波澜。军官系统仍然混乱，一些整编的军队内部帮派林立，忠诚度未必能完全确保。尽管如此，相较于最初的无序和混乱，如今的局势已经大幅改善，国家的武装力量终于回到了正轨，政府的控制力也在稳步增强。\n\n§C我们将可以在未来进一步改革军队。§!"

SFR_city_in_ruin:0 "城市无政府状态"
SFR_city_in_ruin_desc:0 "内战结束了，但混乱却仍在延续。曾经繁华的都市，如今只剩下断壁残垣，焦黑的街道上满是废墟与残骸。政府的权威尚未重建，各地行政机关早已支离破碎，警察与治安部队要么阵亡，要么消失，留下的只有各自为政的地方势力，趁火打劫的武装团伙，以及在绝望与恐惧中挣扎求生的市民。\n\n在街头巷尾，帮派、残存的地方军阀、民兵组织乃至商会都在试图填补权力真空——有些人在恢复秩序，而另一些人则在肆意敛财、扩张地盘。每个城区的统治者都不同，有人信奉武力，有人试图维持昔日的法律，有人干脆公开宣布独立。各地的民众疲于奔命，商人不知道该交税给谁，警察与军人甚至因各自派系不同而相互火并。作为新生的中央政府，我们必须对此采取行动！"

SFR_city_in_ruin_5:0 "早期经济复兴"
SFR_city_in_ruin_5_desc:0 "混乱的城市终于迎来了秩序的回归，街道重新开放，基础设施开始修复，工厂的机器声也渐渐回响在街道之间。尽管内战带来的经济破坏仍然可见，许多地方的秩序尚未完全恢复，贸易网络仍有断裂，地方政府的行政效率也需要进一步提升，但整体而言，国家的经济已走出了最黑暗的时期，开始逐步回到正轨。\n\n然而，接下来的改革才是重中之重。对经济改革议题的争论几乎成为了意识形态斗争，将革命阵线的领导层撕裂。现在的我们还可以维持一时的和平，但总有一天，纸是包不住火的。\n\n等到§R革命§!§C阵线§!的§R领导之争§!尘埃落定时，我们将可以§Y做出选择§!..."

SFR_chaotic_countryside:0 "无序的乡村"
SFR_chaotic_countryside_desc:0 "内战的余波不仅摧毁了城市的秩序，也将乡村拖入了无尽的混乱之中。曾经依靠地方官吏、地主和合作社维系的基层行政网络如今已经荡然无存，乡村社会彻底崩溃，处于一种无政府的状态。原有的土地制度被战争撕得支离破碎，一些地区的农民自发占据土地，另一些地区则在地方军阀、强盗甚至逃亡的溃兵掌控之下，谁也不知道谁才是真正的主人。\n\n在某些地方，地主阶级被推翻，农民们自发成立公社，试图建立新的秩序；在另一些地方，昔日的贵族、宗族或军阀重新夺取控制权，以武力维持旧秩序。更糟糕的是，许多乡村地区根本无暇顾及土地改革，甚至连基本的农业生产都陷入停滞，导致饥荒的阴影逐渐笼罩大地。我们的命令无法传达到乡村，而各地方势力则各自为政，在情况失控前，我们需要采取行动！"

SFR_chaotic_countryside_5:0 "乡村秩序恢复"
SFR_chaotic_countryside_5_desc:0 "经历了漫长的混乱与改革，乡村的无政府状态终于得到了缓解。各地基层行政机构逐步恢复，新的地方政府官员被派遣，农民开始回到田地，乡村社会重新找回了秩序。曾经四处游荡的武装团体被清剿或整合，地方武装团体的影响力被削弱，土地改革也开始在部分地区稳步推进。尽管局部仍然存在小规模的抵抗与混乱，但整体而言，乡村的生活已经恢复到了相对可控的状态。\n\n然而，乡村问题并未彻底解决。一些地区仍然缺乏有效的行政管理，部分地方豪强、旧贵族势力依旧存在，阵线的意识形态斗争正不断地波及土地改革，乡村秩序重组的进程，如同城市中的经济改革一般，我们很快会面临乡村社会的全面分裂。\n\n等到§R革§!§C命§!§O阵线§!的§R领导之争§!尘埃落定时，我们将可以§Y做出选择§!..."

