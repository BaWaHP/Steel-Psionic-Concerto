SFR_workers_and_peasants_congress:0 "远乡工农代表大会"
SFR_workers_and_peasants_congress_desc:0 "代表大会可以表决决议与新法案，不同的决议有不同的通过需求，能否通过则是综合各派系的结果，即基于不同派系的选票权重乘以支持率的结果。各派系的支持是常驻的——他们可能因为反感法案而下降支持，但长期维持高支持度同样可以让派系支持我们的法案，即便他们心存芥蒂。\n\n当前选中派系：[GET_SFR_WAPC_selected]"
SFR_workers_and_peasants_congress_aaa:0 "强硬派：[?SFR_red_star_over_capital_group_1_2|2Y%%]/[?SFR_red_star_over_capital_group_1_1|2Y%%]\n\n稳健派：[?SFR_red_star_over_capital_group_2_1]/[?SFR_red_star_over_capital_group_2_2]\n\n平京派：[?SFR_red_star_over_capital_group_3_1]/[?SFR_red_star_over_capital_group_3_2][GET_SFR_workers_and_peasants_congress_desc_1]\n\n自治派：[?SFR_red_star_over_capital_group_5_1]/[?SFR_red_star_over_capital_group_5_2]\n\n改革派：[?SFR_red_star_over_capital_group_6_1]/[?SFR_red_star_over_capital_group_6_2][GET_SFR_workers_and_peasants_congress_desc_2]\n\n各地民主党派：[?SFR_red_star_over_capital_group_8_1]/[?SFR_red_star_over_capital_group_8_2]"
