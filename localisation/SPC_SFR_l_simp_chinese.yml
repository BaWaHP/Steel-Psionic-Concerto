SFR_commi_bop:0 "革命的未来"
SFR_commi_bop_balanced:0 "双方各持一词"
SFR_commi_bop_left:0 "§O稳健派§!"
SFR_commi_bop_left_desc:0 "---§O稳健派§!---"
SFR_commi_bop_left_desc_tt:0 "稳健派是远乡共产党的中坚力量，其组成大多是自革命阵线转移至正泸根据地后，维持了革命存续，并参与了之后对南远乡以至于全国解放战争的各级党内人士，工农士兵，以及在远乡解放后的各级官僚，地方政府。稳健派严格来说并没有一个统一的“政治纲领”，其代表的意见主要是远乡解放后国内的建制力量，即“老革命们”，支持以稳妥的方式实现远乡的社会变革，从而修复各地战争造成的破坏。平京派的崛起极大地影响了稳健派的话语权，许多人开始担心党的政策受到平京派的影响，损害人民的利益，将新生的远乡进一步的激进化。"
SFR_commi_bop_left_1:0 "稳健派掌控话语权"
SFR_commi_bop_left_2:0 "稳健派控制关键部门"
SFR_commi_bop_left_3:0 "稳健派高举红旗"
SFR_commi_bop_right:0 "§R平京派§!"
SFR_commi_bop_right_desc:0 "---§R平京派§!---"
SFR_commi_bop_right_desc_tt:0 "平京派，或是“平京帮”，是远乡共产党解放平京后，由各地激进左翼知识分子，新生代学生，党内激进派，还有留守在平京的地下抵抗组织组成的新生派系，和稳健派一同团结在了主席赵永军的身后。平京派支持更为激进的社会革命政策，包括扩大人民对政府的监督权，激进的现代化，工业化，积极参与输出革命等。然而，权力的分享并不代表和平相处，平京派的领头人能看出稳健派对他们争夺权力的不满，可为了实现远乡真正的人民革命，他们还有很多工作要做…"
