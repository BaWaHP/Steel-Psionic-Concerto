SFR_social_reform_decisions:0 "远乡社会改革"
SFR_social_reform_decisions_desc:0 "在连年战乱与旧秩序残余的夹缝中，远乡仍然背负着文盲、贫困与疾病的沉重枷锁。若要让“革命”不只停留在旗帜与口号，而真正进入千家万户，我们就必须从教育、医疗与民生诸方面着手，一点一滴地改造社会结构。通过这一系列社会改革决议，我们可以发动扫盲与义务教育运动，推行公共医疗与救济制度，鼓励基层群众参与管理，让昔日被忽视的群体重新被纳入国家的怀抱。"

SFR_industrialization_decisions:0 "远乡工业化"
SFR_industrialization_decisions_desc:0 "曾几何时，远乡也拥有过一套尚可运转的工业底子：厂房、矿井、铁路与技师并非从无到有。然而连年战乱撕裂了市场与交通，设备在炮火与拆卖中耗尽，人才外逃，地方豪强与各级官僚层层盘剥，把本该投入生产的资源变成了账本上的“损耗”。腐败与低效让工厂停摆、物资滞留、工人困顿——留下的只是一具披着旧时代外衣的空壳。如今，随着土地改革基本收尾，全国政权趋于稳定，为了远乡人民的未来，我们应当想办法修复基础设施、恢复供应与劳动组织，让机器重新轰鸣，并以更坚决、更系统的工业化追赶世界的先进水平。"

