SFR.900.t:0 "军队现状报告"
SFR.900.d:0 "送到军委桌上的报告并不厚，却足够让所有人沉默许久。\n\n从最初举起红旗开始，革命阵线的武装就从未真正富裕过。最早的游击队没有统一番号，没有稳定补给，我们不得不从全国各地踏上行军的道路。\n\n许多人没能走到根据地，没能活着看到新国家的成立。\n\n有些战士拿着从旧仓库里翻出的步枪，有些人甚至只能背着土制炸药和大刀，跟在老兵身后学习如何战斗。那时候，能活下来就是胜利，能保住一支队伍就是奇迹。没有人有资格嘲笑那些山沟沟来的战士，因为正是他们的牺牲才有了今日的新远乡。\n\n可现在不同了。\n\n南远乡地区已经解放，反动派的旗帜从各地司令部降下，人民终于不必再躲在地窖里等待和平的降临。然而，胜利带来的并不只有欢呼。各支部队的编制混乱不堪：山地游击队、工人纠察队、临时起义民兵、倒戈的士兵被匆忙塞进集团军；武器散落民间，弹药、炸药登记混乱不堪，已经造成了多起伤亡事件；许多连队完全停摆，有些军官甚至不知道该向谁汇报。更糟的是，游击战争时代的弊端已逐步显现，有些地方部队自行其是，几乎脱离中央控制。\n\n报告的最后一页写得很短——\n\n必须立刻开始军队改革。统一番号，遣散冗余人员，清点装备，重建指挥链，恢复训练制度，整肃军纪，现代化军事理论，调整军事工业，并且推行海空军的建设。\n\n有人合上报告，低声说：“我们打下了这个国家。”\n\n很快，另一个声音回答：\n\n“现在，我们要学会守住它。”"
SFR.900.a:0 "我们要建设人民的军队！"

SFR.901.t:0 "武装民兵问题"
SFR.901.d:0 "在游击战争最艰难的日子里，武装民兵曾是根据地赖以生存的一部分。他们熟悉山路，认识每一条小径，知道哪些树林适合伏击，也知道敌人来时该把粮食、药品和枪支藏到哪里。没有他们，许多部队根本熬不到今天；没有那些由农民、工人、学生和退伍兵临时组成的队伍，革命阵线恐怕早就在一次又一次围剿中被碾成灰烬。\n\n但胜利以后，问题就摆在了桌面上。\n\n各地民兵组织并没有随着反动派政权的崩溃而自然消失。相反，许多地方的武装委员会开始掌握实际权力：他们设立路卡，检查来往行人，私自扣押“可疑人员”，有的甚至开始自行征收粮食和物资。更麻烦的是，不少地方民兵只听本地干部或老指挥员的命令，对中央下达的整编、缴械和调动命令拖延敷衍，形成了明显的地方山头。\n\n因此，一部分观点认为，若放任他们在当下规模继续掌握武器，则地方治安要么恶化，要么则中央失去对地方的控制权，或是两者皆有。\n\n然而，要缩减规模，就必须给人安排去处。正规部队可能没有能力接收大批量的新兵员，生产岗位也是同理，地方政府也需要参与安置工作，但也不是每个地方都有能力承担这份责任。但如果不做好安置，这些熟悉武器又缺乏生计的人很快就会变成山匪、走私团伙，恶化地方治安。\n\n军队内部也并非没有反对声音。部分指挥员认为，武装民兵是人民战争的根基，若过早削弱地方武装，等于主动砍掉革命最灵活、最广泛的力量。他们主张继续扩大民兵体系，让每个村镇都能在战争到来时立刻武装起来。\n\n此外，还有一些观点认为不应该在规模上做大的改变，而是就体制开始一系列改革，使得武装民兵的体裁更符合新远乡人民的利益，同时也能成为协助地方政府的一份新力量。"
SFR.901.a:0 "应该做一些裁剪。"
SFR.901.b:0 "维持现状，做一些改革。"
SFR.901.c:0 "进一步扩大民兵规模。"

