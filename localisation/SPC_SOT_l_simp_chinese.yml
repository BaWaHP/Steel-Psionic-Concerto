###领导人###
SOT_pavlich_ferguson:0 "帕夫利奇·弗格森"
SOT_pavlich_ferguson_desc:0 "帕夫利奇很少谈及他的过去。出生在格罗尼亚的他原本应当成为奥罗日亚军工企业，格林姆重工的领导人。然而，作为出名的温和主义者，帕夫利奇的许多思想无法在军工企业中得到他人的认可。随着他在家族斗争中失利，帕夫利奇最后出局。他带着一批钱财离开了奥罗日亚，改姓弗格森·——他母亲的旧姓，希望能忘记过去，在其他地方谋得安生之处。\n\n在周游东巴斯蒂亚期间，帕夫利奇的思想有了巨大的变化。他亲眼见证了革命烈火燃起又熄灭，看到无数人为之奋斗的成果付诸一炬，那些打着正义名号的领导人们将无数的子民送上战场，推向火堆，甚至是直接屠戮。感到痛心不已的帕夫利奇逐渐确认了他的理想：他希望凭借自己的力量，促进地区的和平。\n\n随着东巴斯蒂亚各地局势逐渐走向混乱，帕夫利奇在沃姆尼亚带领着一家名为“白鸽国际”的跨国企业回到了世人眼中。白鸽国际致力于在战火动荡的地区提供人道主义救助，协助各地民间企业完成重建工作，同时设立有军事部门以承包军事安全等项目。\n\n然而，帕夫利奇并不希望止步于此。白鸽国际虽然在东巴斯蒂亚地区取得了一定成果，并在东巴大战期间凭借着高效而保质的服务打出了赫赫名声，帕夫利奇却没能实现他的理想——白鸽国际在东巴斯蒂亚的影响力仍然有限，随着战火逐渐燃起，帕夫利奇能做的似乎越来越有限了。\n\n对东巴斯蒂亚局势感到心灰意冷的帕夫利奇决定带领白鸽国际转移部分业务到其它地区。新生的绿洲共和国进入了他的视野，作为由人类外的物种建立的政权绿洲共和国正处在岌岌可危的现状。虽然很少此前很少在中巴地区开展业务，帕夫利奇还是带着白鸽国际介入了绿洲的成立，在他的周旋下，白鸽国际成为了少数得到多方认可的，能作为中间人帮助绿洲开展对外经济活动的企业。\n\n在绿洲中央的支持下，白鸽国际和数家其它本土企业联合成立了南绿洲贸易公司，统筹管理绿洲协定成员国的对外经济活动，同时还获得了一片土地的管辖权。尽管帕夫利奇年事已高，在白鸽国际内的话语权也慢慢变小，可随着他与绿洲的合作进一步加深，或许，他的理想真的能在这片土地上实现…"

