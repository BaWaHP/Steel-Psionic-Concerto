###民族精神###
SOT_dangerous_neighbor:0 "危险的邻居"
SOT_dangerous_neighbor_desc:0 "由于我们独特的地理位置和政治地位，许多北中巴的动荡因素并不会影响到南绿洲公司领地的运营。尽管如此，来自中巴联盟的动荡还是多少影响了我们的正常运转。虽然目前来看，中巴联盟还能维持明面上的稳定，可没人能知道未来会是如何…"

SOT_oasis_window:0 "绿洲之窗"
SOT_oasis_window_desc:0 "南绿洲贸易公司是由白鸽国际主导，绿洲共和国出资，并在中巴，绿洲多个地方企业共同资助下成立的特殊资本企业，主要业务为充当绿洲协定诸国和人类文明的中间商，负责双方的经济活动与贸易来往，同时还获得了一片用以管理的特别辖区。作为绿洲向文明世界的唯一窗口，我们可以借此大量牟利，并有义务帮助绿洲繁荣发展。"

SOT_limited_armed_forces:0 "受限的军事力量"
SOT_limited_armed_forces_desc:0 "在绿洲中央和中巴联盟的要求下，我们在组建军事力量上受到了诸多限制，只被允许保留最低限度的地方武装以维持治安。从军事发展的角度来看，这显然有害于我们的职业化军队组建进程；然而，我们真的需要一支职业军队吗？放弃军队，笃信小股治安部队，将多余的资源转移到其它项目上，或许本就更有利于我们的发展…"

SOT_necessary_evil:0 "必要之恶"
SOT_necessary_evil_desc:0 "众所周知的是，绿洲的生存条件并不好。无论是各地乱作一团的原住民，喂不饱的人类殖民者，还是本就恶劣的自然环境，我们的生存都面临了诸多问题，而无论是绿洲中央还是中巴联盟政府，都不可能为我们提供什么实质上的帮助。因此，为了维持辖区的存续，以及公司的未来发展，我们仍然需要从这些经济活动中谋取一些利益，并且想方设法提高辖区各地的产能——这都是必要之恶。"

SOT_gov_lack_of_control:0 "缺乏控制力的政府"
SOT_gov_lack_of_control_desc:0 "由于我国政府组建尚且年轻，各地辖区之于中央的控制力度并不大，许多民众甚至不知道有政府的存在。这极大地减缓了我国经济发展的进度，各地工业化程度较低，开发难度很高，并且时常爆发反抗我国治安部队的冲突。我们需要尽快解决这一问题。"

