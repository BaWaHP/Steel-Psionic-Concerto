CLA_spreading_fire:0 "燎原之火"
CLA_spreading_fire_desc:0 "鲜为人知的是，中巴东部一直有一股强力的社会主义运动在不断酝酿，当然，中巴政府自然也不希望他人知晓这个事实:在东部大平原，无数佃农和相关产业工人在压迫中发出悲愤的呻吟声，被本土歧视性政策逼得家破人亡的手工业从事者矮人们也会在醉酒之余咆哮几句对现实的不满。自然，从芙蕾施曼时代开始就被称作“§t幽灵§!”的存在迅速在失意的人群中传播开来，而现在，中巴政府早已无暇自顾，也是时候让世人听听工农武装无产阶级专政的高歌声了！直到完全彻底胜利！"

