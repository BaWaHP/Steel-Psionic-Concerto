###国策###
RLN_the_lasting_red_flag:0 "二十五年红旗不倒"
RLN_the_lasting_red_flag_desc:0 "为了人民的未来，农工革命党已经武装斗争了二十五年。现在，是时候与那些自以为是的反动派做个了断了！尽管在过往的斗争岁月中，我们犯了不少错误，也付出了惨痛的代价。党内逐渐分为了四个派别。但是，这并不意味着我们已经堕落到只会缩在山沟里内斗了。为了千千万万个饱受欺凌的劳动者，各派已经再一次团结于红旗之下。 牢记为人民而战的誓言吧，革命战士决不言弃！"
RLN_review_the_use_of_violence:0 "对暴力的反思"
RLN_review_the_use_of_violence_desc:0 "无产阶级的暴力应当是纯粹而神圣的，它决不应浪费在与无产阶级解放无关的地方。而对有产者及其家人的无差别屠杀自然不是革命的必要之恶。索雷尔主席将向人民承认自己先前的激进政策是错误的，希望这些错误能得到改正。"
RLN_open_the_vault:0 "打开库存"
RLN_open_the_vault_desc:0 "尽管当地反动派已经是死的死，逃的逃。但他们撤离时还留下了不少我们急缺的物资。其中有些被藏起来了。战争迫近，我们必须立刻找到这些物资，为此，我们必须用一些激进的手段。"
RLN_promote_military_democracy:0 "推广军事民主"
RLN_promote_military_democracy_desc:0 "实践证明，军事民主经得起战争的考验。我们将在最近扩充的新部队里推广军事民主。军事民主的推广将为我们带来一支属于人民而非军官的新式军队。通过发扬民主作风，军队里的腐败行为将得到有效遏制。更重要的是，各级官兵都可以在军事民主中表达自己的意见，每个士兵都会意识到自己不止是命令的执行者，更是革命的主人翁。这将在战争中发挥超乎想象的作用。"
RLN_settle_refugees:0 "安置难民"
RLN_settle_refugees_desc:0 "饥荒席卷勒泰特尼安已两年之久。许多难民逃荒时逃到了相对安定的根据地，我们必须妥善安置他们。不过我们也没有富裕到可以免费为他们提供食物与住处。因此，为他们提供工作自然也是安置计划内的一部分。当然，他们的选择不会太多。"
RLN_one_last_fight_with_enemies:0 "与反动派决一死战"
RLN_one_last_fight_with_enemies_desc:0 "是时候为二十年来的游击斗争画上句号了！同志们，拿起武器，解放全勒泰特尼安吧！"
RLN_help_people_first:0 "优先救济人民"
RLN_help_people_first_desc:0 "通过打土豪分田地，我们在短时间内筹集到了充足的资金。或许，我们可以实施一份减税计划，免除那些已经不可能收上税的地区的税负。这样做完全可以在保证财政状况健康的情况下迅速恢复经济生产。更重要的是，这将极大地提高我们的合法性。毕竟，对于那些受尽苦难的劳动者而言，一百句好话不如一句“分田地，免赋税”来得实在。靠着经济的恢复与人民的支持，我们与反动政权间的硬实力差距只会越来越小，甚至反超！"
RLN_support_army_first:0 "优先供给军队"
RLN_support_army_first_desc:0 "通过打土豪分田地，我们在短时间内筹集到了充足的资金。有些同志认为我们可以因此减少税收。我们承认，这些同志的出发点很可能是好的。但他们恐怕没有抓住当前革命斗争的重点以及人民群众当前最紧迫的需求。人民现在最紧迫的需求是尽快的消灭勒泰特尼安共和国这个反动政权。我们不会向人民索取更多，但手上这些资源应当更多地向军队倾斜，这样才能早日结束这场战争。"
RLN_battlefield_behind_enemies:0 "敌后战场"
RLN_battlefield_behind_enemies_desc:0 "在敌人几乎毫不知情的情况下，我们的游击队已经遍布全国。是时候让他们重新活跃起来配合正面战场作战了。"
RLN_battle_for_revenge:0 "为阶级复仇而战"
RLN_battle_for_revenge_desc:0 "一直以来，这个国家的无产者被反动派剥削着、期瞒着、沉默着。当无产者们拿起武器复仇时，反动派竟然天真而无耻地疑惑了：“这无名的复仇怒火究竟是哪里来的呢？宗族地主阶级和种植园经济有什么不对的吗？人们一直都是这样过活的啊？”而我们则要用武器对他们展开批判：人们从来就不想像这样活！人们要开创一个只属于劳动者而不属于寄生虫的世界！这就是复仇的原因！这就是复仇的意义！把反动派杀光既是创造这个世界的目的，也是创造这个世界的手段。"
RLN_the_victory:0 "胜利了？"
RLN_the_victory_desc:0 "我们胜利了……吗？我们确实摧毁了反动的勒泰特尼安共和国。但，战争也破坏了本就处于崩溃状态的勒泰特尼安经济。反动派们要么带着财物逃离，要么留下来等待时机颠覆新生的革命政权。周边各国也不承认我们，这算是切断了我们的贸易路线，国防安全更是令人担忧。而勒泰特尼安的经济又是典型的外向型，如果说经济危机是勒泰特尼安经济患上了绝症的话，那么外部封锁便是把濒死的经济的脑袋给拧了个180度。反动派们逃离前还恶意摧毁了大量基础设施，而勒泰特尼安本就不稳的农业更是因此遭到了毁灭性打击。薇诺娜莉堡的生物灾害：巨网仙人掌也因为内战时无人管控而泛滥成灾。如果我们不能尽快恢复工农业生产的话，整个赤色特尼安都会不攻自破，更别说实现我们理想中的社会革命了……当然，宣传上还是要乐观一些，好好的庆祝一下革命军事上的胜利，毕竟总要找个理由让疲惫的群众和战士们举办宴会休息一下吧？"

RLN_taking_over_the_nation:0 "接管全国"
RLN_taking_over_the_nation_desc:0 "尽管勒泰特尼安共和国已经灭亡，山村中仍有匪徒与地主武装在负隅顽抗，城市里也仍有黑帮潜伏。为了尽快恢复秩序，我们必须尽快把这些败类通通揪出来消灭掉。他们似乎以为勒泰特尼安的山岭就能藏匿他们的行踪……这可真是可笑。我们打过几十年游击，我们很清楚，如果没有人民的支持，那点山岭根本藏不了多少部队。因此，我们也很清楚如何剿灭这些匪徒：发动各地群众，围住土匪窝点，监督来往人员。我们要让他们再次明白为什么胜利的是我们。"
RLN_public_trials:0 "公审反动派"
RLN_public_trials_desc:0 "1995年，时任主席格雷齐亚过于温和的土地再分配政策使得反动派得以在革命中幸存并扰乱根据地秩序，甚至暴露了格雷齐亚指挥部的位置！伟大的格雷齐亚同志与一众高层因此牺牲。现在，全国各地的阶级斗争正进行的如火如荼。为了不重蹈1995年起义的覆辙，我们绝不放过任何一个罪大恶极的地主和寄生虫！"
RLN_democrats_outside_the_party:0 "党外民主人士"
RLN_democrats_outside_the_party_desc:0 "我们必须意识到，党是伟大的。但我们也必须意识到，想要实现人民的解放，仅靠一个农工革命党依然是不够的。在党外，仍有许多愿意与我们合作的专家学者以及民主人士。我们不能让他们失望，尤其是勒泰特尼安工党，他们为我们提供了很多帮助，自然要得到我们的回报。"
RLN_econ_reconstruct_committe:0 "经济重建委员会"
RLN_econ_reconstruct_committe_desc:0 "赤色特尼安要面对的问题有很多，而经济问题则是重中之重。为了尽快解决经济危机，我们必须组建一个组织专门负责经济重建。这个组织将得到足够多的权力，而国内为数不多的技术官僚将进入这个组织。也就是说，由技术官僚与文官组成的财务派将获得更多的权力：但这只是暂时的。如果他们能够解决经济危机，他们的权势自然会在人民的欢呼中直达顶峰。否则，他们和国家都将坠入万劫不复的地狱。"
RLN_send_civilian_construct_corps:0 "派遣建设兵团"
RLN_send_civilian_construct_corps_desc:0 "薇诺娜莉堡地区的巨网仙人掌已经泛滥成灾。为了这一抗击生物灾害，当地民众每天都在请求更多的援助。灾情就是命令，人民高于一切，我们必须立刻组织一支专门应对巨网仙人掌的部队前往薇诺娜莉堡地区。"
RLN_mobilize_the_locals:0 "发动当地群众"
RLN_mobilize_the_locals_desc:0 "巨网仙人掌的繁衍速度远超我们所有人的想象，这种生物的生长速度已经快到了肉眼可见的地步。如果我们想要打赢这场生物战争就必须征调大量的人力，只靠建设兵团是不够的，我们必须发动当地民众与我们一起并肩作战。由于巨网仙人掌的恐怖生长毁坏了许多牧场与农田，只要保证好后勤工作，他们是不会拒绝我们的请求的。"
RLN_ask_for_help:0 "向世界求援"
RLN_ask_for_help_desc:0 "巨网仙人掌的扩张速度超乎我们的想象。也就是说，一旦灾情失控，巨网仙人掌这一灾害就会蔓延到其他地区，甚至是其他国家！为了巴斯蒂亚大陆，为了我们自己，我们必须让全世界意识到巨网仙人掌的危害。并尽可能的争取到外部援助——因为这不只是我们的灾害，更是全大陆的威胁！"
RLN_study_the_giant_cacti:0 "研究巨网仙人掌"
RLN_study_the_giant_cacti_desc:0 "海量的生物学家来到了薇诺娜莉堡，他们希望对巨网仙人掌这一奇异的生物展开研究。为了更快地消灭巨网仙人掌，我们自然要对其展开研究以·求得这一生物的弱点。所以，我们没有理由拒绝那些学者的好意——当然，我们会保证巨网仙人掌不会因研究而流出到外界，他们的研究也只能就地开展。"
RLN_back_to_normal:0 "重回正轨"
RLN_back_to_normal_desc:0 "对抗生物灾害的战争已经进入到了收尾阶段，可以说，赤色特尼安的人民不仅拯救了自己，还为人类排除了一个潜在的威胁——这是人民伟力的体现。更令人欣喜的是，铲除巨网仙人掌的胜利还附带着大量的战利品：各式各样的游客为一观巨网仙人掌的风光来到了赤色特尼安，甚至促进了经济的发展。来自世界各地的志愿者的帮助也在相当程度上改善了我国的国际形象，更有利于打破外部封锁。更重要的是，我们赢得了人民的信任。我们解决了旧政权一直没有彻底解决的巨网仙人掌，证明了我们的优越性。"
RLN_reopen_factories:0 "工厂重新开工"
RLN_reopen_factories_desc:0 "一些工厂已经在战争与经济萧条中倒闭，我们必须让这些工厂重新开工。具体手段包括但不限于组织工人组建生产合作社自行生产。当然，他们需要国家的干预与引导，否则，他们怕是连开工的材料都搞不到。"
RLN_food_act:0 "粮食法令"
RLN_food_act_desc:0 "目前国家粮食紧缺。因此，我们必须节衣缩食，尽可能的抠出更多的粮食度过难关。禁酒令、粮食配给制等相关政策将被落实。这些政策都是临时的，当经济危机过去后就会被立刻废除。"
RLN_focus_on_production:0 "侧重制造业"
RLN_focus_on_production_desc:0 "地主阶级严重阻碍了勒泰特尼安的工业化，而本土制造业也一直被外国的先进企业挤压难以生存发展。现在，我们遭到了多个国家的经济封锁，这未尝没有好处，我们可以利用本国廉价且过剩的优质矿产刺激本土的制造业发展。作为曾经的南巴矿场，勒泰特尼安的冶炼技术并不落后，而一直阻碍了国家工业化的地主阶级也已经被我们消灭。为了人民的福祉与安全，我们必须大力发展制造业。"
RLN_military_first:0 "国防工业优先"
RLN_military_first_desc:0 "目前我们的处境依然十分危险，国防工业的重要性毋庸置疑。我们必须扩大武器生产规模，而逐渐复兴的制造业自然会完美地解决这一需求。"
RLN_civilian_first:0 "民生优先"
RLN_civilian_first_desc:0 "我们的产能有限，迅速扩大军备生产会挤占我们本就不多的民用产能。我们不能为了几条枪就去让我们的人民饿肚子。制造业应当专注于改善人民的生活与促进整体经济的复苏，我们可不好意思让老百姓饿着肚子建设社会主义。"
RLN_tenian_econ_miracle:0 "特尼安工业之春"
RLN_tenian_econ_miracle_desc:0 "随着半岛的统一、贸易要道花港的收复、以及经济与秩序的恢复，我们已经为推进国家的工业化打下了坚实的基础。"
RLN_tenian_econ_miracle_tr:0 "决议组§Y经济重建§!下的§Y任务§!已经全部§C完成§!或§O结束§!。"
RLN_party_and_gov:0 "党和政府"
RLN_party_and_gov_desc:0 "现在，我们已经解放了整个勒泰特尼安。尽管我们已经与一些党外民主人士达成了合作，但现有的革命政府机关依然人手不足。我们必须解决这个问题以实现彻底的社会革命。"
RLN_socialist_education:0 "社会主义教育"
RLN_socialist_education_desc:0 "哪怕是从资本主义角度上看，勒泰特尼安共和国的教育改革也是倒退的，我们必须推行新的社会主义教育让社会主义深入人心，在思想上扫清封建主义与资本主义余毒。同时，我们必须保证每个劳动者都能享受到免费的公共教育，这是他们的权利，也是他们的义务。"
RLN_reshape_cultures:0 "移风易俗"
RLN_reshape_cultures_desc:0 "勒泰特尼安的社会风气实在是过于糟糕了：社会保守、男女之间完全没有平等可言、各地地主以宗族为纽带组织族人成为当地恶霸，甚至敢无视国家使用私刑。革命胜利之后，这一切都将终结。新社会，就该有新气象。我们将大力推进男女平等，取缔私刑，并将社会主义新文化的种子播撒到国家的每个角落。\n\n而且，男女平等不仅是光辉的理想，更是一种务实之举：在这个战争年代，我们必须保障妇女和男人一样拥有工作和参军的权利和义务。在人力紧缺的特尼安半岛，我们可负担不起性别歧视的代价。"
RLN_release_civil_powers:0 "下放部分民事权力"
RLN_release_civil_powers_desc:0 "现在还不是搞全民普选，把权力通通塞给人民的时候，可如果党一直攥着权力不放的话，人民又该如何相信党会遵守社会主义民主的承诺呢？人民必须学会如何掌控自己的国家，可如果不让他们参与到国家的政治生活中的话，他们永远也学不会——这还有什么“社会主义民主”可言呢？幸运的是，在革命过程中，我们留意到了一些地方的“民选警察”。人民通过直接选举来选出当地的警察。这启发了我们：我们可以先下放部分民事权力，同时将一些人民民主的实践正规化，将这些民选警察制度化。这或许不失为一种通向社会主义民主的过渡手段。事实证明，这样做能够迅速恢复国家的稳定。"
RLN_reinforce_central_authority:0 "强化中央权威"
RLN_reinforce_central_authority_desc:0 "现在还不是搞民主的时候，外敌环伺，内患未除，人民依然没有真正理解何为社会主义。在这种情况下搞民主搞左倾难免会重蹈勒泰特尼安共和国的覆辙：当初由于资本主义革命者过早推行普选民主，当地地主才得以利用控制下的农民为自己获得议会多数席位从而“合法”的控制了整个国家，让这个国家落后于时代的脚步。\n\n所以，我们必须先巩固中央的权威，这样才能拥有足够多的力量为各地带去社会主义革命。"
RLN_immortals_of_revolution:0 "革命的不死鸟"
RLN_immortals_of_revolution_desc:0 "也许是为了休息，也许是为了警戒，革命者停下了脚步。他回头，发现这一路走来皆是绝境中的搏杀。他眺望，意识到斗争与死神盘踞于他的前路。他耸了耸肩，他早已习惯了这一切——这并不意味着他对死亡与失败毫无恐惧，只是恐惧无法阻止他的前进而已。遍体鳞伤的他仍将继续向前，直面这惨淡的人生与悲号的世界。"
RLN_learn_war_from_war:0 "在战争中学习战争"
RLN_learn_war_from_war_desc:0 "被强迫去学习很糟，考试不及格更糟。战争这门学科也是如此：被迫卷入战争很糟，由于不懂得如何作战而战败更是他妈的糟中糟。因此，从将军到士兵，每个战士都必须积极吸取过往战争中的教训，总结经验，好让自己能够直面战争的考验。\n\n这当然不是几句话的事，如果战士们不把胜利和祖国放在心上的话他们是不会去做的。如果没有专业的军官指导他们的话，他们的学习难免事倍功半。这个时候，赤军的军事民主、政治委员与士兵委员会就能发挥作用了：庆幸吧！不是每支军队都能同时享受到教育与民主的！"
RLN_magic_in_military:0 "魔法在军事上的应用"
RLN_magic_in_military_desc:0 "勒泰特尼安有着深厚的战法师传统，不少勒泰特尼安人都或多或少会使用一些魔法，赤军也不例外。在游击战争中，魔法已经证明了它的价值：我们没法扛着大炮到处打游击，但我们可以培养魔导步兵替代炮兵（尽管培养魔导步兵的时间很长，但事实证明他们比炮兵更适合赤色特尼安这一半工业国）。胜利总是垂青于能够快速倾泻大量火力的一方，而普及魔法使用正好能满足这点。"
RLN_uniform_commands:0 "统一行动，统一指挥"
RLN_uniform_commands_desc:0 "事实证明，分散指挥系统是个蠢主意。这样做在游击战争时期倒还有必要，但在运动战以及正规战中，集中的指挥系统明显更加符合实际需求。我们将整顿赤卫队，这不是为了集权，而是为了让这些半军事组织更加正规。毕竟我们不是无政府主义者，我们可没有天真到以为民众只要自发武装了就能立马变成高效的革命军事力量了。如果不加以教育与整顿，这些“民众的自发武装”也会变成毫无革命理想的匪徒。"
RLN_party_leads_the_gun:0 "党指挥枪"
RLN_party_leads_the_gun_desc:0 "自1973年农工革命党成立起，党就一直强调军队必须为革命服务。一直以来，党也在用社会主义思想教育军队，天才的格雷齐亚同志甚至创造性的提出了社会主义思想与军事理论相结合的“革命战争理论”。事实证明，这一理论不仅确保了党与军队的纯洁性，更创造出了一支无与伦比的人民军队。然而，不幸的是，格雷齐亚同志的牺牲一度中止了革命战争理论的发展。幸运的是，索雷尔同志将继续发展这一理论。赤军政治委员与革命纠察委员会的职责将更加清晰（或者说，他们的工作范围将更加广泛），以确保军队将再一次得到社会主义的教育与人民的整顿。"
RLN_party_leads_the_gun_tt:0 "启用理论家：§Y索雷尔·卡彭§!"
RLN_professional_army:0 "职业军队"
RLN_professional_army_desc:0 "自1973年农工革命党成立起，赤军就一直在忠心耿耿必须为革命服务。随着勒泰特尼安共和国的倒台，我们可以说，赤军已经成为了一支纯洁的、强大的、为人民而战的革命军队。因此，军队中的政治委员的存在就显得有些……不太必要了。当然，政治委员在革命初期是必要的，毕竟那时的赤军成分杂，党自然需要派遣政治委员确保军官的忠诚。但现在已经有许多党员成为了优秀的军官，赤军中的军官早已用数十年的战斗证明了自己对党和人民的忠诚。所以，对军官的不信任也是时候停止了。政治委员当然会被保留，但他们的职责将更加清晰——或者说，他们的权力将更小。同时，为了国家的民主，军队的国家化与专业化也是必要的。军队将由富有经验的军官指挥，而非情绪激动的政治委员。"
RLN_holy_commi_violence:0 "神圣的革命暴力"
RLN_holy_commi_violence_desc:0 "革命军队是什么样的？或者说，一支社会主义军队应当是什么？赤军的答案是：无产阶级暴力的具象化。赤军从不讳言自己是人民与革命的军队，在这支队伍里，没有剥削者的恶臭，没有毒品与军妓的腐化，更没有战士的自私与迷茫。这支军队里的每个人都在为一个清晰而光明的目标而战——为人民而战！他们是嗜血的圣徒、人民的战车、暴君的梦魇。光辉的理想是他们的旗帜，丰富的经验是他们的铠甲，人民的期望是他们的血液，家人的祝福铭刻于他们的心脏，手中握紧的乃是祖国的枪支。如果连这等伟力都无法守护人民的希望与梦想的话，人民还能对未来期待些什么呢？"
RLN_penetrate_the_south:0 "渗透南方"
RLN_penetrate_the_south_desc:0 "南方的奥科特尼安伪政权先前公然出卖民族利益以换取七河联邦的支持。现在，他们的墨精灵主子自顾不暇，我们也是时候统一分裂了两百年之久的特尼安民族了。当然，我们可不会蠢到喊一嗓子就向南方冲去。我们必须先派出特工在南方渗透，并制定详细的作战计划——我们可不想重蹈1798年特尼安共和革命的覆辙。"
RLN_free_the_peninsular:0 "解放半岛"
RLN_free_the_peninsular_desc:0 "勒泰特尼安共和国固然谎话连篇，但他们有一点没有说错：奥科特尼安是个出卖特尼安民族利益换取异族强国保障的反动政权。伟大的赤色特尼安绝不会容忍这样的反动政权继续剥削南方的特尼安人同胞。现在，奥科特尼安的七河主子已经自顾不暇，他们已经完全陷入了孤立无援的处境。而这正是打倒这个反动政权的最好时机。同志们，为了特尼安民族的统一与解放，南下！解放特尼安半岛！"
RLN_retake_ports:0 "收回条约港"
RLN_retake_ports_desc:0 "奥科特尼安反动政权已然倒在了人民的铁拳之下，然而，在半岛的最南端，七河帝国主义的残余仍在用所谓的国家资本主义无情地剥削着反动派贱卖给他们的条约港。我们势必解放这半岛的最后一片资本主义残余。这些黑心的墨精灵（这些墨精灵的心脏真的是黑的）但凡还有一点理性，就明白他们目前无力对抗强大的赤色特尼安，因此，我们将慈悲的向他们发出最后通牒并与他们的领导人会面，通过谈判让他们自觉交出窃取的土地。无论这些异族反动派如何嚣张，主动权都在我们手上。"
RLN_we_are_the_same:0 "我们是特尼安人"
RLN_we_are_the_same_desc:0 "现在，我们成功实现了特尼安民族的统一。我们已经超越那些资本家和保王党太多太多。现在，让我们高声呼喊：我们是特尼安人！让喜悦与骄傲在心中澎湃吧！让旧时代的蛆虫统统去死吧！§R帝国主义者在半岛海岸上架起几门大炮就能让人民卑躬屈膝的时代一去不复返了！§!"
RLN_window_of_the_world:0 "世界之窗，南巴之角"
RLN_window_of_the_world_desc:0 "我们已经掌控了这个世界上最重要的贸易节点。这将使得我们得以凭借地利以及与墨精灵达成的市场开放交易打破经济封锁。我们终于可以更加高效地从国外进口所需要的民用品了。"
RLN_window_of_the_world_tt:0 "决议§Y在国际市场采购粮食§!的效果得到§C加强§!"
RLN_relife_of_our_motherland:0 "特尼安浴火重生"
RLN_relife_of_our_motherland_desc:0 "曾几何时，特尼安民族乃是屹立于半岛之巅的雄鸡，世界上最繁荣的海域以她为名。北方的群山蕴藏着无尽的珍宝，南方的平原尽享丰收与贸易带来的富饶。然而，腐朽的王室与软弱的共和主义革命者让她分裂为南北两半。南方的贵族与北方的地主买办一边为声称特尼安民族而战，一边残酷地剥削着南北两地的劳动者，结果是特尼安民族竟在工业革命的起源地脚边落后于时代的脚步。南巴斯蒂亚联邦乃是文明世界的代名词，而特尼安人却是联邦中最落后、最贫穷的民族。饱受剥削与分裂之苦的她在世界大战战败后又被墨精灵“租“走一块，北方的珠宝因经济危机不再畅销，南方的粮食被拿来出口却进不了穷人的餐盘。\n\n于是，群山流下血泪，湖海因此泛红。在特尼安民族的长夜中，农工革命党举起了革命的火炬。凭借人民之伟力，特尼安民族挣脱了枷锁，在革命时代中浴火重生。当然，周边的反动派仍在虎视眈眈，誓要再次为她戴上五颜六色的枷锁。但已经站起来了的人民决不会让他们如愿。因为，在革命的火焰中，特尼安人民已经不同以往，一种从未有过的情感在人们心中萌发：骄傲——由强大与决心孕育出的骄傲！骄傲的人民绝不会再次屈膝，§R革命之火将随着他们的脚步烧向北方，最终整个南巴斯蒂亚都将为之燃烧。他们要做的不只是向其他民族的剥削者们复仇，更要与其他民族的劳动者一起争取自己的解放，掌握自己的命运。§!"
RLN_relife_of_our_motherland_tt:0 "§R赤色万岁！特尼安万岁！§!"
RLN_first_nationwide_election:0 "制宪会议"
RLN_first_nationwide_election_desc:0 "民主对社会主义的重要性毋庸置疑，而一部社会主义宪法则是社会主义民主的基石。与此同时，经济已经恢复，秩序已经稳定，民族已经统一，接踵而至的，是农工革命党的路线之争——按照党规，主席索雷尔·卡彭的第一任期已经接近尾声，新一任的主席选举即将召开。一直以来被生存危机压制的派系斗争顿时复苏，各派领袖都渴望赢得这次主席选举，接过国家的舵盘。因此，这次立宪会议的参会代表不仅会制定一部新宪法，还会决定下一届领导人的人选。为了保证制宪会议与新一任主席选举的公正，我们将邀请外国记者来到我国。这会向世界展示我们的民主承诺并非空言，也会让那些急躁的同志们懂得收敛。"

###事件###
RLN.1.t:0 "辗转反侧"
RLN.1.d:0 "汉克斯·沃泽穿梭在拥挤的人群之中，周围似乎很黑，看不清人们的脸庞。饥饿感与焦躁感困扰着他的心，他却只能试图从人群中钻出来。可当他终于钻出人群后，他却看到了从地里伸出的一双手。大概是有个人被埋在土里了吧。汉克斯这样想着。可，那双手却突然开始猛烈地抖动起来，一个声音回荡在整个世界：“我不是特务！我不是特务！”整个世界都被这双手的呐喊搅得天翻地覆，在这扭曲的黑暗中，身经百战的汉克斯竟感到了一丝不可阻挡的恐惧。仿佛是察觉到了他的恐惧，那双手向他扑来。\n\n“我不是特务！”\n\n汉克斯又一次在噩梦中惊醒了。他看向四周，身边都是熟睡的同志。望向窗外，暗黄色的月亮正无声地审视着他。他闭上眼，开始回忆起那个他亲手活埋的人——那双手的主人。\n那本应是一次成功的转移，他带上了那些追随农工革命党的人民，尝试摆脱共和军的追击，转移到新的根据地。\n\n转移刚开始的那几天，共和军一直紧跟着他们，阻击部队的战斗就没有停下来过。一种焦虑的气息弥漫在赤军之间，甚至有人提议放弃群众。由于带上了民众，他们的行军速度确实下降了，但他们还是有着战术优势和对地理环境的熟悉，共和军理应追不上他们才对。在一次士兵会议中，他们得出了结论：一定是有特务藏在群众中，给共和军传递信息。\n\n很难说当时的他和战士们真的觉得有特务藏在群众中——就算有，他又该如何同共和军联系呢？但在到处翻找了群众们的财物后，士兵们真的找到了一个嫌犯：有个乞丐居然带着一整袋面包，这确实很诡异。但当他们审问乞丐时，他居然答得上来，甚至解释清楚了面包的来历。他没有办法了，就问是否有群众愿意为乞丐担保——自然是没有的了。那个乞丐甚至向一个小男孩求助：“上次的面包好吃吗？帮帮叔叔吧，不然叔叔就没法请你吃面包啦！”\n\n那个小男孩没有理他。\n\n于是，汉克斯宣布，这个乞丐就是共和军派来的间谍，把他绑了起来，活埋在了土坑里。那个乞丐被活埋时一直凄厉地呐喊着：“我不是特务！面包是我全族的！我不是特务！”他一直呐喊着，直到最后一息。汉克斯就着他的呐喊将他活埋，直到他彻底死去。\n\n后来，他们再也没有遇到共和军。可事实上，那个人被活埋时，他们离新根据地只有几天的路程。很难说明他们是因为杀了那个乞丐才摆脱的共和军。那么，他到底有没有误杀群众呢？这个问题成为了汉克斯的梦魇。\n\n最终，他再也忍受不住良心的煎熬。他将这件事告诉了索雷尔·卡彭，并试探性地问他：“你觉得那个人是特务吗？”他本以为，只要把困扰着他的这件事主动说出来，就算不会得到他人的安慰自己心里也会好受些。但索雷尔的回答让他意识到自己大错特错：“大家都做过类似的事情，塞克和我做的更绝一些。如果是我的话估计会把那个孩子也审一审。再把和他们有接触的旁人也监督起来。毕竟，革命的恐怖之处就在于此：身边的每一个人都有可能是敌人。”\n\n这绝对不是汉克斯想得到的答案。更糟的是，他无法否认索雷尔的看法。他不是什么见不得血的新兵，他知道，为了革命的胜利革命者确实要付出这样的代价、做出这么恐怖的事，但他们是否有必要做的这么绝对呢？他们是否能更人道、更理性地解决这些问题呢？至少，能否不让人们一直觉得反革命到处都是呢？遗憾的是，他并没有找到答案。"
RLN.1.a:0 "愿我们开创的未来抵得上我们付出的鲜血。"

RLN.2.t:0 "武装征粮？"
RLN.2.d:0 "老哈勒有些不安站在村子的粮仓门口，思索着这些粮食是否足够让这个村子渡过饥荒。如果这些粮食能得到公正的分配的话，这个村子肯定不会饿死人。但问题在于，赤军已经控制了这片地区，他们正在大规模征兵，而征兵就需要粮食……\n\n老哈勒长叹一声，他清楚赤军比共和军讲道理的多，但他们显然没有慷慨到不向老百姓征收粮食的地步。最近，他们打算在这片地区征收更多粮食。如果他们真的派人来这里征粮的话，村子里可就要饿死人了……由于赤军控制着这片地区，到时逃荒都逃不了，只会被当作特务抓起来。如果不交粮食，会怎么样呢？他也不清楚，但下场多半不会比那些“反革命”好。\n\n老哈勒又清点了一遍粮食，好像这就能让粮食凭空多出来一点。当然，他也知道这不可能。可是，这难道不是很不公平的吗？总有收粮食的人会凭空多出来，粮食却从来都不会凭空多出来一点。\n\n老哈勒已经数不清这是他第几次清点粮仓的粮食了，好像已经过去了很久，也就是说，赤军也许不会来了？毕竟他们这么久都没来……\n\n最终，老哈勒望见山路的尽头赫然多出了几个人影。他长叹一声，这是他第一次希望自己的眼睛瞎掉：那是几个赤军征粮队的，坐着空空的马车，手上还拿着枪。在这之前，他真的有相信过这些赤色分子是好人。但即将到来的饥饿讽刺地指出了他的错误："
RLN.2.a:0 "有些人是永远都不可信的。"

RLN.3.t:0 "满载而归"
RLN.3.d:0 "老哈勒失神地看着征粮队向他走来，那个征粮队队长面容冷峻，不像是个能用口舌打发走的人。队长向他敬了个礼，开门见山的问道：“您好，同志。请问你们的粮食是否足够？”\n\n“我不知道，你去看吧。”老哈勒放弃了挣扎，闭上了布满血丝的双眼，指了指粮仓里面。“好的，我明白了。”那队长皱了皱眉，带着队伍离开了粮仓，进入了村庄。几个年轻人加入了他们，随后，这只队伍便秋毫无犯地离开了村庄。\n\n老哈勒很是疑惑：他们不是来征粮的吗？他们把那几个小伙子带走干嘛？\n\n几天后，那只队伍再次来到了这个村庄。这次，他们有好几个人受了伤，马车上却是装满了粮食。他们一边寻找安置伤者的房间，\n\n一边指挥着人把马车上的粮食搬进粮仓。老哈勒惊奇地看着这一切，忍不住问队长：“额，同志，你们是征粮队的吧？”\n\n“是的，请问有什么需要帮助的吗？”\n\n“不，没有。我是想问，额，你们的粮食是从哪里来的？”\n\n“你们这儿原来的地主带着私兵和粮食躲进了山里。我们是去向他们要的粮食。那些个地主真阔绰啊，有粮食又有武器。”他指了指那几个几天前跟他们走的年轻人“这可得多谢那几个小伙子，要不是他们，我们连地主都找不到。”\n\n“那……谢谢啊。”\n\n“不用谢的，同志。自那天你忍泪指向粮仓的那一刻起，我就下定决心要把抢走粮食的地主绳之以法。这一幕我见过太多了：地主将村庄中的粮食抢走，同志们忍泪指向被抢的粮仓。而我每一次都会为他们报仇。”说到这里，队长紧紧握住了哈勒的手：“所谓征粮队，就是专门帮助人民从反动派手里夺回粮食再交还给人民的队伍！”\n\n老哈勒呆呆地握紧了他的手：“那……你们吃什么。”\n\n“额，我们当然也是吃那些缴获的粮食。”\n\n“那你们……就没有一直找不到地主吃大户的时候？”\n\n讲到这里，队长才完全明白哈勒心里想的是什么：他把征粮队当抢粮食的反动派了！他的眼神变得如钢铁般坚硬，却又好像有火在烧：“我知道您在担心什么，放心吧，今年你们已经不需要再交粮食了。还有，哪怕我们要饿死了，我们也不会抢老百姓的救命粮。我们打游击时，如果我们没有民众的支持，民众马上就会向共和军举报我们的行踪。所以，明白了吗？对赤军而言，没有民众支持比饿肚子更危险！”\n\n老哈勒终于放心地点了点头，他知道，一支无与伦比的军队已然耸立于桑德瑟兰。"
RLN.3.a:0 "一支属于人民的军队！"

RLN.4.t:0 "逃兵与叛徒"
RLN.4.d:0 "波迪拉克的脸上并不总是挂着笑容，但他也有带着微笑工作一整天的时候。尤其是他的老上司金斯伯格来视察的时候。可是这一次，他的老上司似乎并不是来告诉他好消息的。金斯伯格要是带着好消息来找他的话，决不会带着士兵闯进来。"
RLN.4.a:0 "革命只需要属于自己的暴力。"

RLN.5.t:0 "渺茫的梦想……"
RLN.5.d:0 "在庆祝革命胜利的宴会上，中央政治局的委员们毫无喜色。他们一声不吭的吃着一如往常那样寒酸的饭菜，心里思索着灰暗的未来。本·辛格勒点了一根烟，猜想着如果他的朋友们——也是被杀的革命元老们还活着的话，会不会像眼前的后辈们一样无精打采。他轻蔑地审视着这些年轻人，他从卡瑞安、金斯伯格还有斯派瑟三人眼中看到了失落和恐惧。呵，无非就是意识到内战胜利后革命依然前途渺茫罢了。索雷尔看上去倒还算镇定……\n\n但很快，众人的争吵打破了沉默——对革命毫无益处的那种。索雷尔黑着脸着表示其他派系应当认真服从他接下来的命令，卡瑞安则冷冷地指责他跟格雷齐亚一样不懂经济，金斯伯格则愤怒地表示卡瑞安岂有资格批判格雷齐亚这样的伟人，然后斯派瑟踩住他的脚示意让他闭嘴。本·辛格勒默默地看着这些后辈们，几乎要把嘴里的烟咬断。几年来，他拖着一具残破不堪的躯体耐心地调解着各个派系的矛盾，他曾以为，他的调解与劝诫会让这些后辈有所成长。现在看来，他错了。而他竟然还要把自己和已死的挚友们的党和理想托付给这样的一群毛头小子！如果连他们都如此软弱，人民还留着他们的农工革命党干嘛呢？\n\n“闹够了没有？”本看向争吵的四人，似乎没人听见他这个元老说了什么。于是，他旋即以百倍的音量与愤怒喊道：“闹够了没有！”\n\n目前党中最有权势的四人停止了争吵，惊诧地看向了本，这是他们第一次见到本在生气。他们试图道歉，却被本的怒吼打断：\n\n“你们敢让人民看看你们现在这副丑态吗？嗯？这是解决问题的讨论吗？这就是推卸责任的争吵罢了！除了浪费人民交给你们的权力外没有任何作用！看看你们现在这副德行吧，打赢白匪，结果发现问题更棘手了，担子更重了这点让你们很失望吗？你们他妈的把革命当什么了，你们倒是觉得难办了，失望了，可这也是人民最需要、最期待你们的时候啊！你们就这样回应人民的期待吗！”\n\n本明显还想说更多，却剧烈地咳嗽了起来。他拍开了索雷尔的手，愤怒地夺门而出。\n\n“说了这么多，终究也没有给出一个能解决困难的具体方案嘛。”斯派瑟小声嘟哝着。\n\n“所以，如果我真的能拿出一个能够摆脱困境的方案的话，各位能更团结一些吗？”索雷尔叹了一口气，拿出了一份文件“其实我已经有办法了……”\n\n“那你为什么不早说！”\n\n“我从一开始就打算说，结果你们可能误解我了，我从一开始就没有想要批判各位的意思。我的意思是，我这个方案可能会非常异想天开，希望大家能够信任我，能和我一起探讨这个方案的可行性。既然现在大家安静下来了，就一起好好讨论吧。不过，我们开会前当然要保证人能到齐。”索雷尔一边说，一边打开了门去找本。\n\n然后，一开门他就看见了倒在地上的本·辛格勒，他嘴中的香烟早已熄灭。"
RLN.5.a:0 "……和将死的志士"

RLN.6.t:0 "新生之日"
RLN.6.d:0 "直到现在，泰勒还有一种虚幻的感觉。好消息是，当过赤军战俘的他不会上军事法庭了，毕竟共和国已经完蛋了。坏消息是，他的那份薪水也完蛋了。他又要变回一个普通人了，去某个矿井和煤气泄漏捉迷藏，或是在农田里累死累活还吃不上饱饭，就和他的父母一样。哦对了，他该如何面对自己的家人？他可以预见的是，回去以后他和父母绝对会大吵一架。他还记得离开时父母那期盼的目光，现在这束目光即将变成回旋镖砸在自己的头上。\n\n他握紧手中不多的路费。这群赤匪居然还会给路费，这真是出乎意料。但他立刻就想起了不久之前那群赤匪冲锋的可怕的摸样。不，这一定是糖衣炮弹。尽管他的长官只擅长压榨油水而非打仗，但他至少说对了一点，赤匪们都是疯子，披着人皮的魔鬼。\n\n这也是为什么他宁愿和同乡凑钱包下这辆马车，也不愿意和赤匪一起回去。此时，这位同样来自丹特的老乡正悠闲地骑在马上，等待前方的军队散开。泰勒走到马车前半截，探出头去。“老乡，你是怎么来到这儿的？”\n\n“那还能因为啥？赤军可是咱的救命恩人那！”老乡笑了起来，伸出伤痕累累的左手。“以前俺还在给老爷们拉车的时候，睡得是马棚，吃的比马好不了多少，三天两头还会挨打。现在可好了，老爷们都给关牢里了，俺能吃得上饱饭了。听说赤军来这打仗，咱们几个就合计着过来了，帮他们运东西。俺不懂什么大道理，但俺至少知道要报答恩人嘛，嘿嘿。”\n\n“那是挺好的。”泰勒尴尬地附和。赤匪会做出这种好事？不太可能，毕竟自己的战友就是被这群疯子杀了的。“老乡啊，你看看要不绕个路，前面这得堵挺久的。”在参军之前，他见到过军人是如何以“军令”为由拦住普通人刮出油水的，可不敢直接穿过去。虽说知道回去不会有什么好结果，他还是想早点回家，至少那里要比这个痛苦之地好得多。\n\n“喝，俺还以为你不着急呢。你这么着急的话，跟他们说一声不就好了。”泰勒立刻感到不妙，这样做怕不是要被愤怒的军官以军法处置，但已经来不及了。车夫深吸一口气，向前大喊：“赤军兄弟们劳烦让个路！这个大兄弟急着回家！”\n\n吵闹的军队立刻安静了下来。泰勒闭上双眼，完了，自己要交代在这了。他见识过军官如何掏出手枪处置“冒犯”军队的平民。听着这整齐的脚步声，看来军官真的要走过来了。他用力闭紧眼睛，迎接那一颗即将到达的子弹。\n\n“我说大兄弟，你是生病了吗，要不我带你去军医那儿看看。那些医生手艺可好了，有好几个还是外国人呢。”他睁开眼，看到车夫好奇地盯着他。他们已经通过了赤军原本站着的地方。赤军把这条路让给了他们。\n\n“没……没什么。”泰勒有点脸红了。“老乡啊，你能再讲讲赤军来你们那儿之后发生了啥吗。”他再一次把头伸出马车。"
RLN.6.a:0 "也许，是时候去期待新生活了。"

RLN.7.t:0 "游击队的军事法庭"
RLN.7.d:0 "“队长同志，我们真的没有粮食了！所以我才……”沃克颤颤巍巍地辩护道。\n\n“那你就去抢老百姓的粮食？还敢把他们全抢光？”队长狠狠地往沃克脸上踢了一脚，“我们的判决不会有任何改变，你这就是该被判死刑！”在队长的身后，是其他游击队员和遭到了抢劫的村民。村民们为沃克求情，他们认为就那点粮食不至于让一个人付出生命的代价。队长压住满腔的怒意，尽可能轻柔地回答着村民：“尊敬的各位同志，我感到十分抱歉。赤军居然出了这种强抢村民口粮的败类，我向你们保证，沃克将会是最后一个。赤军是保护人民的军队，我们决不会让这种伤害人民的败类活下去。”\n\n“我要是不这么做，我们都会饿死。如果我们都饿死了，谁来保护他们？”沃克自知必死无疑，依然不服气地大喊道。\n\n“没有粮食我们就打猎，没有猎物就啃树皮，吃尸体。敌人很快就会被中央的大部队消灭掉，我们只要坚持到那天就够了。”\n\n“你也知道，这不是长久之计。这样做我们扛不过三个星期。”\n\n“没有人民的支持，我们一个星期都扛不了！你以为游击队怎么活到今天的？是人民在帮助我们一次次地躲过反动派的围剿。而你差点就摧毁了我们的群众基础。要不是我发觉及时，今天到场的就不会是村民，而是敌军了！”\n\n讲到这里，沃克终于低下了头：“队长，是我错了……为了节约弹药，我请求您用刀而非手枪处决我。”队长一怔，收起了手枪，拿出了长刀，干脆利落地砍下了沃克的头。接着，另外几位队员开始为沃克挖掘坟墓。队长则将沃克抢来的粮食还给了村民，还附上了几张赤色特尼安发行的钞票。\n\n“各位同志，请你们记住，我们就算饿死也不会伤害人民的！”"
RLN.7.a:0 "既是策略，也是誓言"

RLN.50.t:0 "处理“肮脏”资产"
RLN.50.d:0 "赤色特尼安对地主与大资本家的处置可谓毫不留情，他们的财产大都被财富再分配政策和国有化政策剥夺。然而，革命者们留意到，反动派有一些对人民与革命完全无用的“财产”，比如：亚人奴隶、魔兽宠物、各式各样的毒品……反动派用这些满足自己堕落而令人作呕的欲望，农工革命党自然不会将这些事物当土地和工厂一样分配给国家和人民。因此，在如何处理这些“肮脏资产”这方面，农工革命党几乎达成了一致：卖掉亚人奴隶，杀光那些魔兽（赤军才不会和人类以外的低劣种族一起闹革命！），同时确保这片土地上永远也不会有人吸食或种植毒品。\n\n然而，在具体的执行细节层面，农工革命党还是出现了分歧：前共和国对毒品贸易一直是默许的。而勒泰特尼安的气候又很适合种鸦片，因此，勒泰特尼安有很多种植鸦片的“烟户”。而迄今为止，他们已经开始了今年的种植。党内分歧的点在于，严格禁毒政策是否应当立刻执行。\n\n财务派认为，如果现在就执行禁毒政策的话，将意味着有大量农民一年下来颗粒无收，这将成为压死国家经济的最后一根稻草。因此，应当暂缓执行禁毒政策，等到下次鸦片收获后再执行该政策。当然，我们现在就会告知人民禁烟政策实行的具体日期，烟户也会受到严格监督，待他们收获后，那些毒品立刻就会被收归国有，然后在党的命令下改种其他合法作物。至于那些毒品，将会被全部卖到外国黑市上，所得收入将全部用于改善财政状况。在此过程中，党将保证不会有任何一个公民吸食到这些鸦片。\n\n另一部分人认为，必须用雷霆手段整治毒品问题，一旦慢了，那些烟户将用毒品腐化国家。让烟户一年下来徒劳无功也无所谓，他们种出了那么害人的东西就该受罚！国家现在就要销毁所有的毒品，禁绝所有的鸦片种植，毒品哪怕是流通到外国也是有害于革命的——农工革命党的革命可不会止步于特尼安半岛啊。更重要的是，财务派一直不愿透露贩卖毒品与奴隶的渠道是怎么来的，这实在可疑。\n\n最终，党作出了选择。"
RLN.50.a:0 "为了经济，干点脏活是必需的……"
RLN.50.b:0 "这种脏钱不能赚，毒贩不值得信任！"

RLN.51.t:0 "政府机关人员问题"
RLN.51.d:0 "现在，我们已经解放了整个勒泰特尼安，但各地政府机关出现了严重的人手不足。因此，该由谁填补职位空缺成为了我们必须探讨的问题。拥军派的同志们认为，政府机构应当尽可能由党员主导。为此，必须要增加党员，降低入党的门槛。财务派与团结派则一致认为，国家政府机构不能仅由一个党统治。只要有人民认可，哪怕是党外的进步人士也是可以进入政府机构的。即便是旧政权的官僚经过审查后也是可以保留原职的。而原则派的人则痛斥这两种想法为“极权主义手段与资本主义妥协思想”，他们认为现有的群众组织已经足以成熟到可以取代部分政府机关，直接由群众组织填补现有的政府机构空缺即可。\n\n最终，在会议上，农工革命党作出了选择："
RLN.51.a:0 "只要人民允许，党外的进步人士也是可以参与到政府机构中的"
RLN.51.b:0 "人民可以管好自己！"
RLN.51.c:0 "扩充党员，确保政府机构都由党员主导"

RLN.52.t:0 "吵闹的民政局"
RLN.52.d:0 "大家都觉得农工革命党确实有在努力改善人民的生活水平，但没人觉得自己活的更轻松了，在民政局工作的艾茵何更是如此。农工革命党声称要推进男女平权，法律上只承认一夫一妻制，也就是说，那些娶了好几个老婆的人家里可有的吵了。同时，农工革命党不仅会撕毁田契和高利贷欠条，还会把卖身契也撕掉。那些不得不卖身嫁到别人家里的妇女们也得以挣脱以“婚姻”为名的锁链并恢复自由之身。农工革命党也向人们承诺离婚自由与男女同工同酬，并组织妇联保证男女平等政策得以推行。于是，长期以来被严重歧视的妇女一下子站起来了：她们再也不是父亲或丈夫的财产，她们完全可以自由选择自己的工作与婚姻。如果对婚姻不满意，可以大大方方地去民政局。也许会有不少闲言碎语，但由于有妇联保障，真的敢和她们动手的不多。很快，离婚便成为了赤色特尼安的一股潮流。国内外的人都认为赤色特尼安的男女平权运动进展顺利，甚至可以说是一日千里。艾茵何清楚赤色特尼安的进步是真的，但……\n\n他现在他妈的快累死了也是真的！\n\n离婚率飙升意味着来民政局办理离婚手续的人数激增，一时之间，民政局门庭若市。每天民政局门口都会排起长队，而且，这些人当中压根没几个知道怎么办理离婚手续，还得艾茵何这样的工作人员一个个的费劲跟他们解释为什么他们的离婚手续办不了。更要命的是，有不少前来离婚的夫妇经常会在排队时排着排着吵起来，工作人员还得跑去劝架。除此之外，民政局的工作人员还得承受他人的侮辱与谩骂，不少老人恨他们，认为他们是农工革命党派来搞共产共妻，破坏家庭和谐的。\n\n总之，现在在民政局工作强度高，工时长，而在这附近几十公里内，和艾茵何一起处理这些麻烦事的有几个人呢？\n\n一个人，而那位同志昨天因为劝架被打进医院了。\n\n艾茵何也有向光荣伟大正确的上级请求过支援，而光荣伟大正确的上级确实为他们赋予了一项特殊权力以渡过难关：允许加班（暂时）\n\n嘛，反正他也不敢偷懒，虽然妇联在保护妇女方面干的很勤快，但妇联可完全不会怜惜在民政局高强度加班的工作人员。要是妇联发现他偷懒了耽误女性离婚了倒是真的会打他的小报告。\n\n在心中默念了三万遍特尼安脏话后，艾茵何开始了一天的工作。无数人的孽缘汇成长龙等待着他一一剪断。他很清楚这份工作是有意义的，但他要是再这样下去他他妈怕是真的得去见芙蕾施曼了。"
RLN.52.a:0 "“妈的，怎么还有一边甩力场飞弹一边吵架的夫妻啊！”"

RLN.53.t:0 "作战计划"
RLN.53.d:0 "“民族统一”，每个被强行分裂的民族莫不垂涎。眼下，便是特尼安民族统一的最好时机：七河与南巴陷入混乱，落后的奥科特尼安无人庇护，勒泰特尼安的北方也安全无虞。可是，具体该怎样攻克奥科特尼安呢？\n\n索雷尔看向会议室里的各个高级军官，这就是他们接下来的议题。\n\n大部分人，包括索雷尔主席认为，统一半岛慢不得：谁知道七河与南巴帝国主义者什么时候恢复稳定？这样的历史机遇可不是什么时候都能有的！要是奥科特尼安再次像二十年前那样出卖国家主权以换取列强支持的话，天知道下次民族统一的机遇是多少年后？所以，为了抢在周边大国开始干涉半岛局势前拿下奥科特尼安，赤军应当从一开始就集中所有力量突破敌军防线。哪怕伤亡会比较大，也决不要夜长梦多。\n\n然而，反对该计划的军官也不少。金斯伯格与汉克斯等军官认为，能够尽早解决战斗固然是好事。但从一开始就“集中所有力量突破敌军防线，一鼓作气解放全半岛”“哪怕伤亡比较大”是不现实的。赤军战士确实骁勇善战，经验丰富。但赤军缺乏攻坚重武器，想要集中力量突破就必须搞大规模人海冲锋。而这样做在狭窄且地形崎岖的特尼安半岛蜂腰处是极其低效的。敌人只要在半岛蜂腰处修建少量的防御工事就能挡住赤军的人海冲锋。而赤军灵活机动与擅长白刃战的优势将难以在山地中发挥。因此，每次进攻都必须万分谨慎，所有指挥官策划进攻前都必须做好万全的准备，更要直接上前线观察当地地形，这样才能减少无谓的牺牲，确保每次冲锋的路线都是最优。也千万不要重蹈勒泰特尼安共和革命者的覆辙：他们也曾想过快速攻破丹特山脉防线，结果却只是白白耗费了优势兵力，最终不得不与奥科特尼安和谈，使特尼安民族分裂两百年之久，一直到今天！而且，不要忘了，奥科特尼安的战略纵深是很小的，只要保证每次经过深思熟虑的进攻能够推进战线，很快就能打到斯塔比翁。更何况，赤色特尼安的人力资源与工业产能比奥科特尼安更充足，应当急着速战速决的是他们！\n\n最终，索雷尔和赤军指挥官们作出了选择："
RLN.53.a:0 "稳步推进"
RLN.53.b:0 "解放半岛慢不得"

RLN.54.t:0 "交易"
RLN.54.d:0 ""
RLN.54.a:0 "毫无情谊的“友谊”"

RLN.55.t:0 "老兵已死……"
RLN.55.d:0 "结束了。\n\n本·辛格勒又一次剧烈地咳嗽起来，呼吸因此愈发困难，就连视线也逐渐模糊。在旁人悲悯的目光中，最后一位农工革命党一大的参会者的身体即将衰竭。本·辛格勒也不知他咳了多久才停下来，在勉强恢复了一点力气后，本看向身边脸色阴沉的索雷尔，希望索雷尔能拿一面镜子来，他想看看他死前的脸是什么样子的。\n\n索雷尔照做了，本·辛格勒看着镜子中的自己，即将停止跳动的心脏竟感到了一丝悲哀：他死后就只能顶着这样一张脏兮兮的丑脸去见他的爱人和同志们吗？这张脸真是又老又丑，就像套在骷髅上的橘子皮一样。这样丑陋的脸，哪里能容得下爱人的吻呢？于是，他尽最后一丝力气，向索雷尔提出了第一个也是最后一个私人要求：“我死后……丧事一切从简，但请求党找一个入殓师为我化妆，我不能就这样去见我的妻子……”言毕，特尼安半岛共产主义革命的先驱、人民党与农工革命党的创始人、农工革命党副主席、已故人民党议员莉奥娜的丈夫本·辛格勒永远停止了呼吸。\n\n索雷尔点了点头，泪眼模糊的他也已经说不出话来了。在革命刚刚胜利时，他在革命生涯中的最后一个引路人就此撒手人寰。从此以后，党内再无像本·辛格勒一样能同时受到各方敬重的人。索雷尔身旁的卡瑞安在掩面而泣，斯派瑟·塞克捂着脸扭过头去，以让旁人看不到他的表情。金斯伯格则早已离开了病房在无人的旷野中号啕大哭。遵照本·辛格勒的遗嘱，党简朴的举行了本·辛格勒的葬礼。然而，出席葬礼的无数群众让这场葬礼成为了勒泰特尼安史上最隆重的葬礼。在无数群众的注视中，索雷尔、卡瑞安、金斯伯格与斯派瑟将本·辛格勒的棺材抬到了高伯隆公墓，将他葬在了他的妻子莉奥娜旁边。随着棺材缓缓下葬，四人面面相觑，一直都在耐心调和各派矛盾的本·辛格勒的死意味着什么他们再清楚不过了。但，至少，在今天，他们四人决定先停止无聊的内斗。为了让好不容易诞生的赤色特尼安活下来，他们必须竭尽全力，患难与共。他们看了看已经下葬的本·辛格勒，又看了看出席葬礼的无数群众，一股如历史般厚重的悲伤油然而生：有太多的人为了未曾谋面的社会主义新时代献出了生命，同时，又有太多的人对新时代的到来感到不解与不安。活着的人，哪怕身心受创，终究也是要继续前行的。那么，谁来为烈士的牺牲赋予意义？谁来为焦躁不安的人民确定目标？已经满目疮痍的国度要怎样才能走向那个无数劳动者希冀着的未来？\n\n在最后一个农工革命党创始人的葬礼上，群众正注视着他们。"
RLN.55.a:0 "……人民尚在"

RLN.56.t:0 "赤军的请假条"
RLN.56.d:0 "在赤色特尼安统一特尼安半岛后，赤军收到了大量战士的请假乃至退伍请求。原因很简单：民族统一了，战争结束了，他们自然也要回家了。\n\n考虑到战后重建工作需要大量的劳动力，农工革命党自然没有理由拒绝战士们的正当诉求。大部分战士们离队前都会以口头或书面的形式立下誓言，一旦祖国再次陷入战火，他们仍会回到赤军为祖国而战。\n\n农工革命党自然要对他们的热诚表示认可，但士兵委员会和最高法院并不承认这些誓言具有法律效力。或许在不远的将来，命运将检验这一誓言的真假。但，至少在今天，赤色特尼安将享受这来之不易的和平。"
RLN.56.a:0 "§C愿祖国永享和平...§!"
RLN.56.tt:0 "§R...直到战争再度席卷祖国。§!"

RLN.57.t:0 "英雄归队"
RLN.57.d:0 "随着赤色特尼安再次陷入战火，新一轮的动员令也已经发布。但我们的记者注意到，先前因和平离开队伍的赤军战士都自觉回到了军队中，准备履行离队前的诺言，再一次为祖国与革命挺身而出。他们的带头作用使得征兵工作相当顺利，整个国家的士气都因此得到了振奋。在赤军内部，已经开展了简短而热情的欢迎仪式，欢迎新战士的到来与老战士的回归。"
RLN.57.a:0 "在这里，英勇已是约定俗成"

RLN.100.t:0 "团结派宣布不参加主席选举"
RLN.100.d:0 "团结派领袖斯派瑟·塞克声称在新任主席选举中，农工革命党不能出现太多有竞争力的候选人。因为这会影响农工革命党的团结，进而造成国家的混乱。因此，他决定不参加新任国家主席的选举，并确保党不会因为选举而走向分裂。当然，他和团结派依然会参加制宪会议，并努力促进代表们达成共识。"
RLN.100.a:0 "衷心为国，还是以退为进？"

RLN.101.t:0 "制宪会议开始"
RLN.101.d:0 "各地选举出的工农代表已经抵达丹特参加制宪会议，商讨赤色特尼安这个新生革命政权的第一部宪法的具体条款，并确定赤色特尼安的下一任国家元首人选。为了彰显“民主”风范，会议代表中只有不到40%的会议代表是农工革命党党员。其余大都是各地群众选举出的代表以及受到农工革命党邀请的其他党派的代表。当然，农工革命党是通过暴力革命统一的特尼安半岛，这种革命政党的政治影响力自然远胜于其他政治势力。所以，各个代表早在开会之前就达成了共识，本次国家领导人选举的胜者必然在三个农工革命党候选人（财务派领袖卡瑞安、原则派领袖索雷尔、拥军派领袖金斯伯格）之中。而各个代表心里也明白，无论这部宪法上写的是什么，其具体执行程度都将取决于未来的领导人。\n\n但这也并不意味着他们的选择微不足道。一方面，自统一战争结束后，农工革命党内部派系斗争愈发严重，其中一些派系（如财务派）需要党外人士的帮助才能掌控全党全国。另一方面，尽管农工革命党一直希望保持自己执政党的地位，但在事实上，农工革命党几乎没有采取非法手段威胁这些代表，在流程上讲，本次制宪会议还算公正。各个代表们依然有权做出自己的选择，影响国家的命运。而且，按照他们的观察，三位农工革命党的候选人：卡瑞安、索雷尔、金斯伯格都是一心为民的优秀政治家，而非以权谋私的独夫民贼。所以，他们倒也不必过于担心民主与宪法的命运。"
RLN.101.a:0 "无论结果如何，我们都将让国家走向更加光明的未来"

RLN.102.t:0 "制宪会议：行使国家权力"
RLN.102.d:0 "制宪会议第一个出现争议的议程便是政府的体制问题。一开始，大部分人都认为人民都应当通过政党参与国家政治，行使政治权力——这是最常规的想法。但索雷尔·卡彭以及金斯伯格·代普提出了一个足以改变会议风向的想法：国家权力应当更多的交给各地的群众组织而非由政党垄断。两人以及两人领导的派系认为，党派政治不应是社会主义政治的全部，人民应当拥有自己的自治组织并通过这些群众自治组织参与国家政治，这也与社会主义者提倡的经济民主相适应。\n\n最终，会议代表们通过投票做出了决定："
RLN.102.a:0 "单纯的党派政治与社会主义大众民主的需求不符"
RLN.102.b:0 "人民将通过政党行使国家权力"

RLN.103.t:0 "制宪会议：共和与民主"
RLN.103.d:0 "参会代表们都一致认为，赤色特尼安应当是一个单一制共和国。但问题在于，现在这个共和国的民主体制应当是怎样的呢？财务派和其他党外代表认为，农工革命党现在可以是执政党，但不能永远是。赤色特尼安应当立刻开放党禁并筹备五年一次的普选，人民可以自由的组建或参加除农工革命党以外的党派并为之投票。执政党由选举产生而非由农工革命党独占——当然，如果农工革命党能够赢得选举的话，自然没有人会质疑其执政地位。同时国家应当确保言论自由、罢工自由、集会自由——人民要民主，现在就要！\n\n拥军派与团结派则提出了一个令人不安的方案：现在还不是搞自由搞民主的时候，在强敌环伺的情况下，开放党禁充满竞争的全民选举必将群魔乱舞。更何况，现在的赤色特尼安已经够民主了，过度的民主与个人自由将危害国家的安全。人民需要领袖的教导才能学会如何正确地投票并为社会主义革命服务。而农工革命党作为劳动人民的革命党就是社会主义革命本身。因此，农工革命党的执政党地位必须被写进宪法里。\n\n原则派提出了一个折中方案：现在还不是搞民主的时候，在强敌环伺的情况下，民主选举必将群魔乱舞。想要让人民学会完全掌控国家机器还需要时间。在将权力交给人民前应当先培养社会主义民主文化并逐步向地方群众组织下放民主权力。农工革命党将通过高层、群众组织以及多个社会主义政党的监督保证这一目标的实现。但完全开放党禁的日子还没到，目前除农工革命党以外的政党只有监督权。在一段时间内，农工革命党依然需要确保自己的执政党地位才能完成社会主义革命。农工革命党不会在宪法里写上自己的执政党地位，但农工革命党现在无法承诺会举行多党制选举。\n\n值得一提的是，特尼安半岛在南巴斯蒂亚地区算是落后地区，但这片土地上的人民对民主制度并不陌生。民主化的缓急对他们来说都可以接受，但过于虚假的民主是糊弄不了他们的。\n\n最终，大部分代表们选择："
RLN.103.a:0 "人民要民主，现在就要！"
RLN.103.b:0 "民主权力将逐步下放"
RLN.103.c:0 "现在还不是搞全民民主的时候"

RLN.104.t:0 "制宪会议：主席权力"
RLN.104.d:0 "会议决定，我国最高行政权力将掌握在国家主席手中，国家主席由议会选举产生，任期为五年，最多连任两届。但问题在于，国家主席的行政权应当受到何等程度的监督呢？财务派和无党派代表认为，国家领导人，即国家主席的权力应当遵循三权分立原则受到拥有立法权的议会与拥有司法权的最高法院制约。但为了保证国家主席拥有足够的行政权力推行改革，国家主席应当拥有足够的权力任命一个只对自己负责的内阁（即中央政治局和各部部长）并拥有发布主席行政令和宣布紧急状态的权力。\n\n原则派和团结派认为，财务派的方案容易诞生出一个权力过大的领袖，也容易造就一个权力过小的最高决策层。为了避免国家主席的权力不受监督，国家主席的行政权力必须由国家这样的高层进行集体监督，国家主席必须与中央政治局的每个委员共进退。国家主席的每个决策都必须通过中央政治局的民主决议通过。而至少目前来看，中央政治局的委员由包括国家主席在内的七人组成。由议会选举产生。同时，为了避免最高决策层的权力过小，主席行政令的行使范围较广——也就是说，在大部分情况下，中央政治局几乎不受议会制约。\n\n拥军派认为，前面两种方案都将造就一个软弱无力的领导层。国家主席的权力应当只受人民的监督。只有全民公投才能推翻主席的决策和命令。同时，拥军派的代表无情地指出了财务派心里的小九九——财务派的方案将让国家主席拥有足够的权力横扫党内各派并掌控全党。而农工革命党在相当长一段时间内都必然是赤色特尼安的最大党派。如果连最大党派都没有党内民主的话，一旦财务派的领袖卡瑞安·柏林胜选，卡瑞安自然将拥有近乎独裁的权力掌控政府，这时财务派心心念念的多党制民主还有什么保障呢？ 这简直就是顶着多党民主的名义搞一人独裁！拥军派代表的发言在会场引起了轩然大波，这使得在场的代表更加怀疑财务派的方案。\n\n在此起彼伏的叫喊声中，议长尼古拉·卡布里奇勉强制止了各派代表打成一团，确保了投票流程得以继续。"
RLN.104.a:0 "会议通过了财务派的方案"
RLN.104.b:0 "会议通过了原则派的方案"
RLN.104.c:0 "拥军派的方案得到了实现"

RLN.105.t:0 "制宪会议：司法权"
RLN.105.d:0 "制宪会议再一次爆发了激烈的争吵，自会议开始以来，会议还从未如此混乱过。一向持温和民主化立场的财务派破天荒的和一向支持军事化和集权化的拥军派站在了一起，支持最高法院的司法独立地位。他们坚持最高法院的大法官由国家主席个人提名，议会选举产生。但最高法院的仲裁结果不能受到议会和国家主席的影响，之前革命时期诞生的人民法庭和民选警察也必须在最高法院的指导下进行整顿。\n\n一向以妥协调和著称的团结派在会议中一直保持着冷静。但这一次，他们也一反常态和向来保持激进社会主义立场的原则派站到了一起，愤怒地指责财务派和拥军派的“反动行径”。人民和议会必须对最高法院拥有更多的监督权，否则按照赤色特尼安一党独大的现状来看，最终这将把司法权拱手送给国家主席。这和独裁有何不同？民选警察本身就是基层民主自治实践的果实，一旦将其交给最高法院，民选警察将失去其民主自治的意义，与一般的警察无异，甚至更糟。\n\n农工革命党各派间对抗激烈，大会占比最多的非农工革命党代表也在这一问题上也陷入了混乱，他们提出了各种各样的方案，但这些方案要么和农工革命党某一派系的方案雷同，要么得不到多少支持，毫无通过的希望。一些代表甚至对其他代表大打出手，由于会议各派意见过于分裂，制宪会议甚至一度提出暂时休会。但最终，赤色特尼安依然在跌跌撞撞中完成了自己的第一部宪法："
RLN.105.a:0 "司法独立神圣不可侵犯！"
RLN.105.b:0 "右派分子能不能别逼逼什么三权分立了，想搞独裁可以直说"

RLN.106.t:0 "国家主席选举"
RLN.106.d:0 "制宪会议已完成赤色特尼安的第一部宪法，接下来，会议代表们将通过选举选出新一任的国家主席。"
RLN.106.a:0 "让我们拭目以待……"

