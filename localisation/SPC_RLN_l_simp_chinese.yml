###民族精神###
RLN_revolution_terror:0 "革命恐怖"
RLN_revolution_terror_desc:0 "不可否认的是，为了镇压反动派我们必须使用雷霆手段，但革命的恐怖依然是恐怖的。尽管索雷尔认为激进的阶级斗争是革命的必然现象，但谁能说得清其中有多少无辜的鲜血？更重要的是，以革命之名犯下的暴行真的不会反噬革命本身吗？对“有产者“及其家人的无差别屠杀是会让革命更彻底呢，还是会让革命越来越脱离群众呢？看看那些从对“有产者”的劫掠中名利双收的官员们是什么样的吧，他们的所作所为就是答案。"

RLN_kick_rich_get_lands:0 "打土豪，分田地"
RLN_kick_rich_get_lands_desc:0 "通过打土豪，分田地，我们赢得了农民的支持。当然，我们清楚我们的土地改革绝不会止步于此，当条件稍微好转时，我们还可以更进一步！"

RLN_econ_in_shadow:0 "阴影中的经济"
RLN_econ_in_shadow_desc:0 "为了避免暴露，我们的工厂位置往往是机密。当然，这往往会影响效率。"
RLN_econ_in_shadow_tt:0 "地图外民用工厂：§Y+2§!\n地图外军用工厂：§Y+2§!"

RLN_tenian_red_army:0 "特尼安赤军"
RLN_tenian_red_army_desc:0 "在1995年的反围剿战争中，我们损失惨重，不得不撤回山区继续进行游击战，但多年来的游击战争锤炼了特尼安赤军。这使得这支军队逐渐明白如何将社会主义思想与军事斗争相结合。同时，这也会让社会主义得到新的发展。"

RLN_one_party_four_factions:0 "一党四派"
RLN_one_party_four_factions_desc:0 "自前任总书记格雷齐亚死后，农工革命党便有了分裂的趋势。但各个派系又实在不敢在这个恶劣的生存环境中大搞派系之争。同时，农工革命党的大部分支持者与赤卫队也懒得管他们有什么派系矛盾，一旦农工革命党的内斗损害了群众的利益，失望的各级群众组织就会立刻结束他们的政治生命。于是，各个派系不得不温和而低调地缓和彼此之间的矛盾。只有对革命作出额外的贡献才能扩展其影响力——对人民而言，这是典型的良性竞争。但这些派系领袖心里清楚，这种折中路线终究有结束的一天。农工革命党的成就越是辉煌，这一天来的就越早。"

RLN_violent_revolution:0 "暴力革命"
RLN_violent_revolution_desc:0 ""

RLN_support_of_people:0 "民众支持"
RLN_support_of_people_desc:0 "起初，由于1995年的失败与敌人的虚假宣传，民众对革命的态度并不积极。但现在，他们已经明白这场革命的意义，并积极投身于革命之中。"

RLN_revengence_war:0 "为阶级复仇而战"
RLN_revengence_war_desc:0 "一直以来，这个国家的无产者被反动派剥削着、期瞒着、沉默着。当无产者们拿起武器复仇时，反动派竟然天真而无耻地疑惑了：“这无名的复仇怒火究竟是哪里来的呢？宗族地主阶级和种植园经济有什么不对的吗？人们一直都是这样过活的啊？”而我们则要用武器对他们展开批判：人们从来就不想像这样活！人们要开创一个只属于劳动者而不属于寄生虫的世界！这就是复仇的原因！这就是复仇的意义！把反动派杀光既是创造这个世界的目的，也是创造这个世界的手段。"

RLN_devastation_everywhere:0 "满目疮痍"
RLN_devastation_everywhere_desc:0 ""
RLN_devastation_everywhere_tt:0 "§R锁定贸易法案与外交姿态§!"

RLN_biohazard:0 "生物灾厄"
RLN_biohazard_desc:0 ""

RLN_nationwide_bandit_suppresions:0 "全国大剿匪"

RLN_no_grace_for_loss:0 "不容失去"
RLN_no_grace_for_loss_desc:0 "在农工革命党的领导下，愤怒的人民撕碎了腐朽的勒泰特尼安共和国。然而，他们还没来得及庆祝胜利就得面对惨淡的现实。在推翻了“剥削者”后，他们梦想中的乌托邦并未如约而至，眼前唯有周边各国的封锁以及迫在眉睫的大饥荒。他们叹了口气，草草地掩埋了自己的战友与稚嫩。现在他们能做的，唯有竭尽全力去保卫这仅有的胜利果实。如果一场胜利无法为他们带来救赎的话，他们就只能去争取更多的胜利，一如往常。"

RLN_great_famine:0 "大饥荒"
RLN_econ_miracle_of_revolution:0 "革命的经济奇迹"

RLN_focus_on_production_idea:0 "侧重制造业"

RLN_accustomed_to_death_fight:0 "惯于死斗"
RLN_accustomed_to_death_fight_desc:0 "“绝境求生”，这就是农工革命党的斗争史。怀揣着炽热理想的农工革命党在各路反动派的围剿中一次次地幸存下来，苦难磨练了他们的意志，更打磨了他们的理想，使其愈发闪耀。他们不仅学会了如何取胜，更学会了如何承受失败，突出重围，慷慨赴死，并在此过程中保护人民。无论结果如何，人们都会明白：他们真的已经竭尽全力了。"

RLN_the_fire_rises:0 "赤潮澎湃，烈火高扬"
RLN_the_fire_rises_desc:0 "革命军队是什么样的？或者说，一支社会主义军队应当是什么？赤军的答案是：无产阶级暴力的具象化。赤军从不讳言自己是人民与革命的军队，在这支队伍里，没有剥削者的恶臭，没有毒品与军妓的腐化，更没有战士的自私与迷茫。这支军队里的每个人都在为一个清晰而光明的目标而战——为人民而战！他们是嗜血的圣徒、人民的战车、暴君的梦魇。光辉的理想是他们的旗帜，丰富的经验是他们的铠甲，人民的期望是他们的血液，家人的祝福铭刻于他们的心脏，手中握紧的乃是祖国的枪支。如果连这等伟力都无法守护人民的希望与梦想的话，人民还能对未来期待些什么呢？"

RLN_easy_steady:0 "稳步推进"
RLN_fast_battles:0 "速战速决"

###内阁###
RLN_ben_singler:0 "本·辛格勒"
RLN_ben_singler_desc:0 "身为农工革命党的创始人之一，本·辛格勒的资历比现在党内的任何一个人都要老。在农工革命党日益分裂的今天，他依然为各派人士敬重着。他凭着过人的才干与温和的性格耐心地调解着各派的矛盾。但鲜有人知的是，在本那温和的笑容背后，藏着一颗伤痕累累的心。他的父母在他十岁那年被恶霸和亲戚害死。他的真爱死于1978年共和国对农工革命党的前身：人民党的清洗。他的朋友们在1995年的反围剿战争中被加瓦·阿杜勒的部队杀死。至此，他的亲人、他的朋友全都不在人世了。他也被病魔折磨已久，他清楚，自己已经时日无多。\n\n他绝望地意识到，他恐怕永远都不会迎来属于自己的幸福了。但，他依然是一个属于人民的战士。如果不能作为一个幸福的人而活，那他也要作为一个战士死在冲锋的路上。在每个无法入眠的夜晚，本·辛格勒都会默默地祝福着年轻的后辈们。哪怕他无法见到自己和挚友们的理想实现的那天，他也依然乐意为那一天的到来作出自己的贡献。"
