RLN_house_of_cards:0 "乌托邦的纸牌屋"
RLN_house_of_cards_desc:0 "从目前来看，党内四派更倾向于通过为革命事业做出额外的贡献来获取额外的影响力。他们对那些会妨碍共同的革命事业的竞争方式嗤之以鼻。总的来说，他们依然维持着事实上的团结——这是典型的良性竞争。但总有些时候，他们的诉求并不一致，而这种情况正变得越发频繁……\n\n影响力一览：\n§t拥军派§!：[?RLN_militarists_influence|0Y]\n§R原则派§!：[?RLN_principlists_influence|0Y]\n§C财务派§!：[?RLN_financists_influence|0Y]\n§O团结派§!：[?RLN_solidaritists_influence|0Y]\n\n当前执政派系为：[RLN_GetRullingFaction]\n目前影响力最大的派系为：[RLN_GetLargestFaction_1] [RLN_GetLargestFaction_2][RLN_GetLargestFaction_3][RLN_GetLargestFaction_4]\n\n§g注:当影响力最大的派系与执政派系不同时，政治点数-10%；当影响力最大的派系与执政派系相同时，政治点数+10%。当影响力排行出现两个及以上派系并列第一的情况时，政治点数-10%，稳定度-10%；§!"

