###新闻###
RLNNews.1.t:0 "勒泰特尼安内战"
RLNNews.1.d:0 "正当人们认为勒泰特尼安的局势即将触底反弹的时候，已经销声匿迹了两年的特尼安赤军突然发难，以摧枯拉朽之势控制了整个桑德瑟兰。据可靠消息，赤军突然袭击桑德瑟兰的直接原因是为了策应桑德瑟兰铝矿工人的暴动。同时，赤军领导人索雷尔·卡彭声称，这些工人在起义前遭受了非人的虐待。这场内战是“勒泰特尼安九百万劳动者的暴力求生”。共和国总统赫奇则指责赤军祸害国家多年，今日定要将其斩草除根。\n\n就在今天，勒泰特尼安共和国与赤色特尼安之间的全面内战已经开始。而南巴斯蒂亚各国目前无力对勒泰特尼安提供援助。目前，勒泰特尼安的局势空前动荡，大量流言蜚语甚嚣尘上。其中既有共和国当局埋藏多年的卑劣行径，也有赤色特尼安针对地主的赶尽杀绝。但可以明确的是，双方积怨已久，不共戴天，仇恨与痛苦定将吞噬整个勒泰特尼安。"
RLNNews.1.a:0 "特尼安湾已被血水染红"

RLNNews.2.t:0 "第二次特尼安半岛战争"
RLNNews.2.d:0 "两个世纪前，特尼安半岛因共和革命分裂为勒泰特尼安与奥科特尼安。而勒泰特尼安共和国却在几年前陷入了内战并被赤色特尼安推翻。许多观察家认为，新生的赤色特尼安因为战乱与封锁面临着饥荒的危险。为此，拿下较为肥沃的奥科特尼安平原粮食产区势在必行。而奥科特尼安王国也一直打算趁北方大乱时北伐。现在，赤色特尼安与奥科特尼安王国已陷入战争状态。赤色特尼安国家主席索雷尔声称，奥科特尼安王国与勒泰特尼安共和国一样都是“反动政权”，奥科特尼安王国甚至比勒泰特尼安共和国更加腐朽。国王与贵族的罪行终将受到特尼安人民的审判。奥科特尼安王国则以从勒泰特尼安地区逃出来的勒泰特尼安难民为证控诉赤色特尼安的疯狂以及农工革命党对无辜群众的“无差别屠杀”。赤色特尼安的赤军顽强坚韧，而奥科特尼安王国军队也做好了保家卫国的准备。在崎岖的丹特山脉，两国特尼安人的尸骸将填满山谷。只有时间才能知道特尼安半岛的命运将走向何方。"
RLNNews.2.a:0 "一鼓作气，南下统一！"
RLNNews.2.b:0 "我们决不能让这群邪教徒继续祸害特尼安人！"
RLNNews.2.c:0 "特尼安的工人和农民万岁！"
RLNNews.2.dd:0 "特尼安半岛的革命可真够多的。"

RLNNews.3.t:0 "第二次特尼安半岛战争"
RLNNews.3.d:0 "两个世纪前，特尼安半岛因共和革命分裂为勒泰特尼安与奥科特尼安。而勒泰特尼安共和国却在几年前陷入了内战并被赤色特尼安推翻。奥科特尼安王国也在几个月前被改革派政变推翻，奥科特尼安革命者以共和制取代了君主制。许多观察家认为，新生的赤色特尼安因为战乱与封锁面临着饥荒的危险。为此，拿下较为肥沃的奥科特尼安平原粮食产区势在必行。而奥科特尼安临时政府也一直打算趁北方大乱时北伐。现在，赤色特尼安与奥科特尼安临时政府已陷入战争状态。赤色特尼安国家主席索雷尔声称，奥科特尼安临时政府与勒泰特尼安共和国一样都是“反动政权”，奥科特尼安临时政府与奥科特尼安王国一样都是七河帝国主义的走狗。官僚资本主义的罪行终将受到特尼安工人与农民的审判。奥科特尼安临时政府则以从勒泰特尼安地区逃出来的勒泰特尼安难民为证控诉赤色特尼安的疯狂以及农工革命党对无辜群众的无差别屠杀。赤色特尼安的赤军顽强坚韧，而奥科特尼安临时政府军队也做好了统一特尼安半岛的准备。在崎岖的丹特山脉，两国特尼安人的尸骸将填满山谷。只有时间才能知道特尼安半岛将走向何方。"
RLNNews.3.a:0 "一鼓作气，南下统一！"
RLNNews.3.b:0 "我们决不能让这群邪教徒继续祸害特尼安人！"
RLNNews.3.c:0 "特尼安的工人和农民万岁！"
RLNNews.3.dd:0 "特尼安半岛的革命可真够多的。"

RLNNews.4.t:0 "赤色特尼安制宪会议"
RLNNews.4.d:0 "赤色特尼安农工革命党主席兼临时国家元首索雷尔·卡彭宣称，特尼安半岛的重建工作已经完成。为了履行民主承诺，赤色特尼安将举行公平、公开、公正的制宪会议。各地选举出的工农代表已经开始前往丹特参加制宪会议，商讨赤色特尼安这个新生革命政权的第一部宪法的具体条款，并确定赤色特尼安的下一任国家元首人选。\n目前，革命政府正在采取各种手段保证选举的公正，大量外国记者也因此受到了革命政府的邀请来到了丹特。记者们的报道改善了赤色特尼安的国际形象。但依然有不少人对赤色特尼安的社会主义民主持悲观看法：特尼安赤军是典型的党军，难以实现军队国家化。农工革命党党内以及民间也有不少反对民主化的声音，他们认为过早的推动民主化进程会导致反动派死灰复燃，就像二百五十年前的特尼安共和革命一样。\n总之，赤色特尼安民主的命运依然悬而未决。但是，无论结果如何，制宪会议都将给出一个明确的答案。"
RLNNews.4.a:0 "民主，社会主义的生存正道。"
RLNNews.4.b:0 "社会主义在什么方面是民主的？"

RLNNews.5.t:0 "赤色特尼安制宪会议"
RLNNews.5.d:0 "在革命胜利后，一些民主革命领袖会宣布不参与新一任国家元首的选举以免损害新生的民主。然而，赤色特尼安临时国家元首索雷尔·卡彭并没有那么做。结果是，他公正的赢得了新一任国家元首以及农工革命党主席的选举，成功实现了连任，其个人权力也得到了加强。\n索雷尔·卡彭是真正意义上的激进社会主义者。推崇“神圣的革命暴力”的他认为：社会革命远未结束，在接下来的任期内，他将积极参与南巴地区的社会主义革命，并尽己所能的为赤色特尼安带来“真正的社会主义民主”。\n政府内外正欢呼着索雷尔的连任，但一些观察家认为，赤色特尼安的民主化进程将因索雷尔而夭折。可以预见的是，如果他愿意的话，他还会赢得许多届选举。"
RLNNews.5.a:0 "他写的《革命战争理论》确实值得一读"
RLNNews.5.b:0 "一个恐怖的男人……"
RLNNews.5.c:0 "暴力与谎言造就的恐怖统治仍将继续"

RLNNews.6.t:0 "财务派接管赤色特尼安"
RLNNews.6.d:0 "目前，赤色特尼安的制宪会议已经结束。人民财务委员会以及经济重建委员会主席卡瑞安·柏林成为了赤色特尼安的新一任国家元首。卡瑞安·柏林是农工革命党党内最优秀的经济学家，也是农工革命党财务派的领袖。卡瑞安声称，在赤色特尼安，私有制经济将被遏制，但仍将长期存在。赤色特尼安的社会主义，将会是由宪法保证人民民主权利，由市场决定资源配置，企业全部由工人民主管理的科学而高效的社会主义。同时，他还准备开放党禁，以期实现基于社会主义原则的多党制民主。\n然而，显而易见的是，目前赤色特尼安依然是农工革命党一党独大。赤军依然是典型的党军，想要实现多党制民主必然会遇到重重阻碍。一些左翼人士也对其支持市场经济的言论表示反感，声称这是典型的修正主义。右翼人士乃至一般的民主人士也对卡瑞安的承诺表示不屑，毕竟卡瑞安还是个坚定的集体化推动者，他的政治手段也不比索雷尔更温和。但这些话语在一片飘红的赤色特尼安股市面前显得无力且苍白。除农工革命党以外的政党也已经开始准备为未来的多党选举造势。在错综复杂的政治斗争中，特尼安半岛走向了全新的未来。"
RLNNews.6.a:0 "经济学家的社会主义？"

RLNNews.7.t:0 "拥军派掌控赤色特尼安"
RLNNews.7.d:0 "目前，赤色特尼安的制宪会议已经结束。赤军高级将领、中央政治局委员金斯伯格·代普当选为新一任的国家元首兼农工革命党党主席。他认为，赤色特尼安应当效仿先锋队体制以强力推进社会主义革命。而赤军自然就是天生的先锋队。多党制民主与普选不过是资产阶级糖衣炮弹，而赤军将保护人民免受资产阶级反动派的毒害。\n一些人认为这是披着民粹主义外衣的军政独裁，但这些人都无法在赤色特尼安生存。整个赤色特尼安正沐浴人民与士兵的欢呼中，人民正在庆祝着他们期望的更加军事化的社会主义的到来。"
RLNNews.7.a:0 "特尼安革命走向成熟"
RLNNews.7.b:0 "民选的军政府？"
RLNNews.7.c:0 "军队果然坐不住了。"

###领导人###
RLN_none:0 "暂无"
RLN_ginsberg_depp:0 "金斯伯格·代普"
RLN_ginsberg_depp_desc:0 "金斯伯格是一位经验丰富的社会主义军事家，世界大战、两次勒泰特尼安内战磨练了他。在赤色特尼安，他在两次勒泰特尼安内战中的光辉事迹无人不知。但他并不愿意透露他是怎样度过世界大战的——那是一段不堪回首的记忆，只是回忆那段岁月就足以让乐观坚强的他窒息。\n\n他刚满18岁就加入了勒泰特尼安部队，奔向世界大战的战场，在泛南巴斯蒂亚主义的感召下，他英勇作战，迅速晋升。但南巴斯蒂亚联邦还是输掉了世界大战，南巴斯蒂亚联邦各国高层软弱腐败的本质在这场战争中暴露无疑。金斯伯格永远也忘不了愚蠢的军官们面对士兵们紧迫的需求时是多么的傲慢：靴子破了？赤着脚刚好能防止逃跑嘛！有人冻死了？那也不是生火暴露坐标的理由！\n\n这样的军队在天璧同盟诡谲多变的攻击魔法面前注定丑态百出。 而在战士们为了南巴斯蒂亚联邦奋战的时候，大人物们在做什么呢？军火商们喜庆地拿下了无数的订单，一时之间牛市狂飙，可工人们从中获得的只有更多的工作量以及战时管制。政客们高喊口号，号召人民与丑陋的非人物种血战到底，然后就走入剧院与墨精灵畅谈合作。来自联邦各国的军官们各有特长，却在欺压基层士兵上达成了一致。于是，南巴斯蒂亚联邦战败了。\n\n金斯伯格对此毫不意外，他只是在想，之后该怎么办？战后，不少老兵的退休安置费没有着落，他们跟着农工革命党进入了深山。他是否也要这么做呢？直到1989年他才真正与农工革命党建立了联系。时任农工革命党主席格雷齐亚说服了他，他成了安插在共和国内部的内应。1995年，时任勒泰特尼安总统莫里斯试图进行军政分离，打算革除金斯伯格的职务，金斯伯格立刻与其他不满莫里斯的军官发动了政变——这也是第一次勒泰特尼安内战爆发的直接原因。两次内战中，金斯伯格用战绩证明了他对人民的忠诚。在党和人民愈发激进、渴求军事化的呼声中，一直提倡先军政治的金斯伯格命中注定般的成为了新的主席。他将在无产阶级革命中实现自己的梦想：他将成为一个英雄，带领人民奔向革命的黎明。所有人很快就会感受到，一双坚强有力的无形大手在引领着革命。"
RLN_sorrell_capone:0 "索雷尔·卡彭"
RLN_sorrell_capone_desc:0 "现任农工革命党主席索雷尔·卡彭出身于勒泰特尼安的一个大地主家庭。优越的家境与严格的家教使得索雷尔成功考上了度弗道夫大学。度弗道夫与勒泰特尼安截然不同的，更加开放乃至激进的政治环境冲击了索雷尔的认知。学习中获得的知识也让他愈发对陈腐的宗族传统感到厌恶。但真正让他的政治思想变得愈发激进的，是他在虹镜的一次旅行。在旅行中，他目睹了虹镜劳动者如风暴般聚集又如烟般消散的米骚乱。这让他意识到了世间的不公与自身富贵的肮脏。更重要的是，这让他意识到了人民到底能爆发出多么巨大的力量。而让他疑惑的是，这力量又是如此的容易流逝。为了解答困扰于心的疑问，他愈发刻苦地学习。在读遍了度弗道夫大学图书馆的藏书后，他开始去问那些发起过学生运动的学生。尽管这极大地丰富了他的阅历，但他得到的答案实在无法让他满意。于是，他决定直接去问失语的无产者们。\n\n为了更好的与穷人们沟通，他成为了一个专门为穷人提供法律服务的“质优价廉”的律师。这份阅历也精进了他的学术水平，从而让他拿到了法学与历史学的硕士学位。在拿到学位后，他回到了家乡。他回到家后，变卖了家产，烧掉了佃农们的欠条地契，吊打了打算杀掉他的父亲，带着大量的财物和现成的根据地加入了与他联系已久的农工革命党。他组织群众运动的才能也在斗争中逐渐显露。\n\n但在1995年的反围剿战争中，时任主席格雷齐亚与一众高层遭叛徒出卖战死，年轻的他因此当选为了新主席。他不得不带着残兵败将撤回深山继续打游击。\n\n幸运的是，他和他的同志没有被失败吓倒，依然决定团结起来继续武装斗争。1996年的饥荒让农工革命党重新壮大。同时，联邦也愈发虚弱。这让夺取全国政权的计划再次被提上了日程。桑德瑟兰铝矿工人的起义更是让他们必须立刻行动起来。现在，全国乃至全南巴斯蒂亚的目光都投向了桑德瑟兰的山岭。一场空前惨烈的斗争等待着农工革命党，而索雷尔将在这场斗争中写下那个自虹镜旅行归来后一直苦苦追寻的答案。这个答案注定不属于他自己，但他和他的答案都将属于全世界的劳动者。为了人民的生存与解放，他和他的同志们将高举火炬，驱散笼罩着世界的黑暗长夜。"
RLN_karianne_berlin:0 "卡瑞安·柏林"
RLN_karianne_berlin_desc:0 "1966年出生的卡瑞安·柏林无疑是农工革命党高层中最年轻的一个。拥有丹特大学经济学硕士学位的他成为了农工革命党党内不可多得的技术型人才，其优秀的经济工作也让他稳坐农工革命党经济学家之首。这也就是卡瑞安升迁迅速的原因，很快，他便负责起了整个赤色特尼安的经济工作。\n\n没有人会质疑卡瑞安的能力，但也没有人不会质疑卡瑞安的手段：卡瑞安为了解决财政问题不仅会派间谍到根据地外经商，还会将缴获到的毒品卖到外地，甚至有人声称他会默许毒品种植。更糟糕的是，这些渠道以及交易状况是不公开的，只有少数几个高层人员才清楚。这让他招惹了不少非议。甚至有人嘲讽他为“根据地的首富”、“西装革履的革命者”。\n\n他对这些非议不屑一顾：他做的一切都是为了革命的生存，作为整个农工革命党工作最勤劳的党员，他当然是问心无愧的。他与常人印象中激情澎湃、善于言辞的革命者不同，他总是更沉默、更冷淡、终日埋头于书桌。但这并不意味着他脱离群众——他的统计数据可不是从书斋里找的！通过统计数据，他能够清晰地洞察所谓的革命到底意味着什么：政治就是组织生产，革命的意义在于为新的经济体系铺平道路。因此，只有建立起一个更加科学，更加高效的社会主义经济体系才能宣告社会主义革命的真正胜利。那么，更高效的社会主义经济体系该如何建成呢？嘛，他才不急着想出一个“最终解决方案”呢。他得先将民主的盈利带入各个经济生产单位，确保人民能够民主科学的管理生产资料。在那之后，他才能根据实践判断社会主义经济应当何去何从。目前人民依然需要他的指导，通往社会主义民主之路依然困难重重，但他可完全不担心这条道路走不通：如果不愿相信人民拥有主宰自己命运的能力的话，他还有什么理由说自己是个社会主义者呢？"
