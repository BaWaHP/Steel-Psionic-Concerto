###政党名称###
RLN_pioneer_communism_party:0 "农工革命党"
RLN_pioneer_communism_party_long:0 "农工革命党—拥军派\n§g赤军有很大一部分是由共和国叛变过来的原共和军。他们主要来源于1995年的金斯伯格起义。起义后，金斯伯格带着他的部队成建制的加入了赤军。尽管由于起义失败，这支部队的实力已大不如前，但由于其拥有大量赤军急缺的技术装备以及职业军官，再加上这支部队一直保持着原有的建制，金斯伯格得以利用这支军队迅速巩固了自己在赤军中的地位。这也是拥军派的起源。但拥军派之所以能够壮大，自然有更深层次的原因：农工革命党以及社会主义革命一直以来都处于一个非常危险的状态。因此有限的资源自然会更多地向军队倾斜。为了早日实现革命成功，人民也希望自己的党能够更加“军事化”，他们急需一个能征善战的领袖带领他们走出困境。而在起义失败前，党内最优秀的军事家便是前任总书记格雷齐亚。格雷齐亚死后，金斯伯格便是拥有政治野心的高层中最善战的一个……§!"
RLN_revolutionary_communism_party:0 "农工革命党"
RLN_revolutionary_communism_party_long:0 "农工革命党—原则派\n§g如果农工革命党不至于如此分裂的话，原则派根本不会被称为原则派，而是可以大大方方地自称为农工革命党的建制派。这个派系可谓最为“正统”：最忠诚的老赤军、最有资历的党员以及理论水平最高的官僚组成了这个派系的核心。时至今日，该派系仍是农工革命党最有影响力的派系，以至于很多没有内部消息的党外人士认为农工革命党内部的派系斗争烈度完全在合理范畴内。但事实是，革命过程中遇到的种种困难让一些党员怀疑社会主义革命中一些被知识分子奉为铁律的社会主义原则是否是必须坚持的——这里面有龌蹉的私心，也有务实的思考。而原则派认为，一些社会主义根本性的原则必须坚持到底，哪怕这会让他们失去很多支持。如果实践能够证明他们的坚持是正确的，那么党的裂痕自然就会愈合。§!"
RLN_worldunion_socialist_party:0 "暂无"
RLN_worldunion_socialist_party_long:0 "暂无"
RLN_worldunion_democrat_party:0 "农工革命党"
RLN_worldunion_democrat_party_long:0 "农工革命党—财务派\n§g前任农工革命党书记格雷齐亚堪称灾难的经济政策引起了党内文官的不满，他们意识到，在经济规律面前领袖的出类拔萃的个人魅力与军事才能毫无作用。革命热情无法取代专业的知识与技术。领袖的一言堂终将造就一场无人制止的灾难。这些文官便是财务派的起源。于是，在这些文官的努力下，格雷齐亚终于承认了自己的错误，糟糕的经济政策也被取消。取而代之的是由财务派主导设计的新经济政策。在格雷齐亚死后，卡瑞安·柏林的财务派迅速壮大，党内为数不多的技术官僚以及政工干部组成了这个派系的核心。没有他们的专业知识，农工革命党根本没法在年复一年的经济封锁中生存下来，更别说发展根据地的经济生产了。然而，卡瑞安不是什么军事家，这个派系也没有太多军队方面的支持者。在危机中，人民与党内同志想要的是一个拥有卓越军事才能的领导人以及更加强大的革命军队。这导致财务派领袖卡瑞安·柏林没有赢得新一任主席的选举。不过，当农工革命党摆脱生存危机，需要大量技术官僚发展经济时，财务派或许就能借此向人民完全展示他们的才干与愿景：一个宪法保证人民民主权利，由市场决定资源配置，企业全部由工人民主管理的科学而高效的社会主义！§!"
RLN_liberal_republican_party:0 "进步人士"
RLN_liberal_republican_party_long:0 "进步人士\n§g农工革命党已经武装斗争多年，积累了丰富的革命经验。其中他们最不愿意承认的一条是，过于激进的废除私有制只会带来灾难，指望一纸政令或是一把大火就能一夜实现社会主义实在是天方夜谭。因此，他们吸取了教训，暂时保留了一定程度的私有制，甚至在政府机构中给一些厌恶买办与外资的民族资产阶级留了位置。而这些人往往会被农工革命党称为“进步人士”。当然，许多人认为这些“进步人士”前景堪忧。但不是所有的“进步人士”都对此感到担忧：他们当中有很多人的亲朋好友就是农工革命党党员。他们没什么政治理想，却也没有特别讨厌农工革命党，毕竟，农工革命党缔造的一个相对封闭独立的经济环境使得他们的企业得以免受外国资本挤压。这在事实上促进了他们的企业的发展，哪怕他们明白，他们迟早有一天会失去自己的企业。§!"
RLN_conservative_republican_party:0 "暂无"
RLN_conservative_republican_party_long:0 "暂无"
RLN_authoritarian_republican_party:0 "暂无"
RLN_authoritarian_republican_party_long:0 "暂无"
RLN_national_socialist_party:0 "农工革命党"
RLN_national_socialist_party_long:0 "农工革命党—团结派\n§g在农工革命党日益分裂的今天，团结派试图团结各派以及社会各个阶层。其口号与行为模式拥有极强的实用主义与阶级调和色彩，试图在各派诉求中寻找“最大公约数”，同时又会有意削减其激进的一部分，试图用国家资本主义过渡到社会主义阶段。很明显，这一伙社会合作主义者。但农工革命党的无奈之处就在这里：他们确实没法直接把资本主义生产关系一脚踢开，他们现行的具有一定法团主义色彩经济制度甚至被不少国外的国家社会主义者以及威权民族主义奉为圭臬。而经济基础决定上层建筑，这样的经济模式难免会让党员们逐渐向国家社会主义看齐。而且，团结派在土地改革中的表现深受农民欢迎（当然，农民也很欢迎原则派和拥军派，他们可不清楚农工革命党有什么派系斗争），尽管他们对资产阶级充满了妥协，但他们却能对地主阶级进行毫不留情的阶级斗争。在大部分情况下，他们是阳奉阴违的极右派，但在土地改革以及对地主的镇压肃反中，他们却总是激进的恰到好处（甚至嘲讽某些党员不够左倾）。如果农工革命党能够改变当下的经济体制的话，团结派的影响力定会一落千丈，但如果一直犹豫不决的话，团结派的影响力定能迅速扩大，直至权力的巅峰。§!"
