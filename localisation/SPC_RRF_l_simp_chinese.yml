RRF.2.t:0 "归来"
RRF.2.d:0 "汽笛声划破了瑟格尔兰根车站清晨的薄雾，而群众早已在此等待。黑色的火车头冲破晨雾，像一头疲惫的巨兽缓缓驶入站台。车厢上布满了弹痕和焦黑的痕迹，仿佛在诉说着这一路的不易。当火车完全停稳的那一刻，火车内外爆发出震耳欲聋的欢呼声。\n\n安德里亚斯·赫斯曼站在最后一节车厢的门口，他深吸一口气，感受着故乡熟悉的空气。虽说有工会特勤局的帮助，但为了将特勤局和流亡革命者以及大量物资带回根据地，这一路躲开各路政权的审查和堵截花费的精力实属让他有些心力交瘁。但现在，他已经抵达了革命的根据地，悬着的心终于放下，任务成功的兴奋与面对群众的热情再次占据了他的身心，带着希望与欢乐，他走下了车厢。\n\n"同志们，"他的声音有些沙哑，却难以盖过喷涌而出的兴奋，"我们带回了物资和不得不流亡的同志！同志们一个不少的回来了！让我们向他们致敬！"车厢门一扇接一扇打开，流亡的革命者们鱼贯而出。他们中有的须发花白，有的蓬头垢面，但每个人的眼中都闪烁着坚定的光芒。紧随其后的是成箱的物资——药品、武器、工业设备，这些都是革命的希望。\n\n突然，一个高举着红旗的瘦小身影从人群中挤了出来。那是个约莫十岁的男孩。他怯生生地走到赫斯曼面前："先生，"男孩的声音清脆而坚定，"我父亲说，您会带给我们自由。"赫斯曼蹲下身，接过花束。他注意到男孩的右手少了食指和中指，在鲁萨尔，像这样失去了手指的童工数不胜数。他的喉咙发涩，轻轻拍了拍男孩的肩膀："是的，我们会的。"\n\n站台上的气氛愈发高涨。妇女们将准备好的面包和热汤分发给归来的革命者们。运输工人则开始把机器搬下火车，运往工厂。但赫斯曼看到，在站台的角落里，几个工会特勤局成员悄悄地离开。“没有让这些英雄受到同等热情的欢迎真是遗憾啊。”他在心底里默默向他们道了个歉，毕竟不能让太多人知道工会特勤局已经归来。\n\n这场热烈的欢迎仪式并没有持续太久，毕竟革命不等人。一阵疲惫而悠扬汽笛声后，火车再次向前奔驰，仿佛一位疲惫而快乐的战士，再次无言地向新世界奔去。"
RRF.2.a:0 "斗争的火焰更加旺盛"

RRF.3.t:0 "瑟格尔兰根的保罗"
RRF.3.d:0 "保罗粗糙的手指划过纸上的字迹，油灯将他的影子投在褪色的石灰墙上，喉间发出困惑的闷哼。赤卫军总务处刚下发的《关于强化士兵委员会职权的若干意见》正摊在橡木桌上，第七条里的"军事民主"像根倒刺扎进他布满枪茧的掌心。\n\n"军事...民主？"他咀嚼着这个奇异的词组，窗外的槭树叶沙沙作响。这位四十九岁的老兵不会不知道“军事”和“民主”的含义，他见过世界大战里堆积如山的尸体，也曾在联盟投票点投下神圣的选票，但这两个词语的碰撞让他想起第一次与魔兽作战时的晕眩。选举军官？表决战术？他下意识摸了摸左臂的旧伤，那是某个暴雪夜拒绝执行自杀式冲锋的纪念品。\n\n直到建立了第三步兵连的士兵委员会，那纸上的“军事民主”才终于在战士们的面前展开了全貌。当辎重兵安娜把军需官账簿摊在松木长桌上，当机修工出身的米哈伊尔指出步骑协同的漏洞，当十七岁的传令兵提议用石灰粉标记雷区——那些曾经只属于长官们的决策，正在三十双布满皱纹与油污的手掌间传递。保罗忽然意识到，自己军装左胸的赤星勋章与列兵的铜纽扣，在晨雾中折射着平等的光。\n\n最让他印象深刻的莫过于一场战役的前夜。农会代表裹着露水闯进作战会议，老牧羊人用烟斗在地图上戳出隐秘山径，纺织女工们连夜赶制的伪装网覆盖了所有炮位。当黎明第一缕光刺破云层，保罗看着那些曾蜷缩在战壕里发抖的年轻人，此刻正用粉笔在弹药箱上标注射击诸元。他突然想起联盟军曾经那个镶金牙的少校——那家伙总爱踩着士兵的背脊跨过泥潭，却在撤退时被自己的勤务兵踩断了双腿。\n\n"现在明白了？"炊事班的玛莎递给他温热的荞麦粥，铁勺在晨光中划出银亮的弧线，"民主不是议会厅里的水晶吊灯，是刺刀尖上的火种。"保罗望着战壕外起伏的麦浪，那些金黄的穗子正在风中连成汹涌的海。他忽然笑起来，喉结上的弹片伤疤微微颤动。这次，他的步枪将指向真正的敌人。"
RRF.3.a:0 "“我早该想到的，一个民主的政权肯定有一支民主的军队才对！”"

RRF.4.t:0 "政委"
RRF.4.d:0 "保罗·施密特有足够的理由痛恨最近被调派到团上劳什子的政委，作为工革联紧急征召的预备团，在这个所谓政委到来之前，大家要做的无非也就是日常训练。但自从政委来后，除日常训练外又附加了许多从未有过的所谓文化课知识。这可让目不识丁——虽有些夸张，但绝大多数士兵的文化程度的确堪忧，尽管士兵们的受教育程度放在整个巴斯蒂亚大陆来看并不算低：多是工人家庭出身的孩子，自然接受过基础的义务教育。但当政委问及为何而战时，却只能从贫瘠的词库里吐出朴素过了头的话：“因为...工革联很好？”\n\n也因此，令保罗当然也包括大多数士兵抓狂又苦大仇深的文化课进程还是如期推进，尽管几乎所有人都无法理解为何要让大头兵学习这些看起来毫无用处的知识：新兵团的教官不止一次抗议了文化课程的时长，但慑于政委的权威，文化课的推行如期进行。除了课程开头比较朴实的为何而战外，这门课对于几乎所有士兵来说都如同地狱一般：各种新的概念和名词把他们脑海里本就不多的空间榨的一干二净，而严厉的政委又确保了这项课程绝不会在完成前终止......\n\n但随着战火的越演愈烈，作为预备兵力的他们也不得不奔向战场。接连的战火和无穷的战争彻底重塑这个预备团，保罗见证了无数英勇的人在奋战在一线战场上，而他自己也多次负伤。不知算不算因祸得福，在经过几次激烈战斗后他得以升任营长，他并不开心，因为他知道这代表了多少优秀的同志长眠于地下。而在最近一次的会议结束后，团长被紧急召集到师部，临走前将捆成一卷的报纸塞给了他：“你把这给政委带去，他...他最近病了，告诉他我临时有事晚点再去看他。”说罢团长便急匆匆的踏上了前往师部的卡车。\n\n生病？保罗回忆着政委铁塔般的体格，那般的汉子也会生病吗？时间不多，他来到政委的帐前，令他感觉奇怪的是政委非常没有礼貌的坐在床上，微笑着请他将报纸拿到他的床边。想到死难的同伴们，再看看眼前颐指气使的政委，他不由得一股怒气涌上心头大声叫道：“政委同志，这就是您教导我们的人人平...”他嘴里刻薄的话语并未吐出，因为他看到了面前的政委:额头上的绷带遮住了他的左眼并缠住了他的半个脑袋，双手绝没有十个指头，而最令人惊愕的是他的左腿被石膏绑着无法动弹，而右腿处空空如也。\n\n政委对此的评价十分轻描淡述:一次战斗的后遗症罢了。说起这他还微笑着同保罗说:“至少我的命让医生救了下来嘛，别，别哭，施密特上尉。”保罗落泪望着政委，他也曾受过伤，他自然知道这种伤势代表了多么剧烈的痛楚，而更多的其实是…本人对此的不甘心。渐渐的，一直微笑的政委眼睛里也噙着泪花:“别哭啊，保罗，我一直都喜欢看你们的笑。芬恩，卢卡，蒂姆……”这些都是跟政委上过文化课如今却深埋地底的士兵，说到最后政委再也无法自制，梗咽着说:"
RRF.4.a:0 "“我真的很喜欢你们的笑脸，你们的笑声......”"

RRF.5.t:0 "冲锋号与小提琴"
RRF.5.d:0 "在主席办公室内，爱迪尔梵·黑戈博根犹豫地将笔尖悬停于新一轮革命动员令之上，坐在他对面的赫斯曼看到了他的犹豫，试探性的问道：“主席同志？”沉默了许久后，黑戈博根才呢喃地开口道：“安德里亚斯，我……真的有资格强迫这些人上战场吗？他们根本不会有充足的训练时间……”赫斯曼惊讶地看向了这个被称为“冲锋号”的男人，他不曾想过，这个冲锋号也有犹豫的一天。但紧接着赫斯曼自己也回忆起了战地医院的哀嚎不断的伤兵们，以及接到阵亡统治后悲痛欲绝的亲属们。他的声音同样不由得犹疑起来:“爱迪尔梵，你知道的，为了胜利这些都是必要的……”\n\n黑戈博根把笔放下烦躁地挠了挠头:“我清楚，我当然清楚。只是……”他抬头看向自己的老友，而赫斯曼在短短几瞬的眼神交流后读懂了黑戈博根心里的情绪:不忍，怜悯和挣扎。赫斯曼叹了口气，将双手放到了黑戈博根微颤的肩上庄重的说道:“我知道的，我都知道，死难者的目光会一直注视着我们，无论成功与否……”说到这他的鼻息突然加重，恶狠狠的甩出来一句话:“可唯独，唯独你不该这样！无论是革命恐怖还是战场伤亡人数，这些总有人去缅怀，可偏偏你不行，不能！”\n\n赫斯曼止住了黑戈博根试图解释的话语:“这是一场革命，一场彻头彻尾的暴力革命！我们已经牺牲了如此如此多的同志，不正是因为人民期许和我们自信能够将这变革持续到底吗？！事到如今你应该比我更清楚这不是讲绅士风度的时机了，接下来我们与对方的较量将是毫无体面，殊死搏斗的！你早该明白的！”说点这赫斯曼停下歇了口气，而黑戈博根的眼神也逐渐恢复了清明，他盯着赫斯曼，一字一顿的开口道:\n\n“我曾对一个地方青年干部问罪，问他为什么要未经审判程序滥杀无辜。那个青年的眼神仿佛古老传说中的侠义骑士一般坚定，他站直了身子回答我：‘杀错了无辜者尚可事后追责忏悔，但如果漏了一个反革命者我们就会前功尽弃。我们这些基层的士兵和干部，为了保住地方队伍不混入反动派只能先发制人。’赫斯曼，我不得不去细想，群众比我们料想的还要激进该怎么办？我们如果要违逆他们的意志会造成何等的后果?这场革命到底会有多残酷？有太多事情超出我们的预料了！“黑戈博根长叹一声，低下了头。赫斯曼听到这畏缩的将双手缩回，而后又坚定的搭在了他的肩膀上：“也就是说，你从未迷失方向，只是鲜血暂时遮蔽了你的双眼。” 因为温婉的性格和柔顺的调解手段被誉为“小提琴家”的赫斯曼此时却如同冲锋号般直言不讳的说道：“我们从一开始就知道所有的答案不是吗？群众是否比我们激进并不重要，我们只需要为他们的理想提供一个不会伤害革命事业的实现渠道即可。你所担忧的，目前都可以通过整肃党内纪律，优化干部素质来解决。你担忧着革命的残酷，这很好，说明我们尚未因为死亡的司空见惯而失去人性。但如果连我们也会因为革命的残酷而踌躇的话，那追随我们的革命群众又当如何?我们还有什么资格领导群众？群众支持我们就是为了让我们带领他们去反抗，去斗争，去做到前人理想中的未竟之事的！如果你依然怀有负罪感的话，那恕我提醒您一句，这条法令是通过了党内民主表决的，你是否认为他们也应当背负这份罪恶呢？”\n\n“不，当然不，他们都是好同志。” 爱迪尔梵·黑戈博根低沉着摇了摇头拿起了笔，“我当然清楚我作为工革联主席不能这般犹豫……软弱。”他再次抬头看向了赫斯曼，这次他的眼眸里只余平静:“很感谢你，安德里亚斯，我刚刚只是……”黑戈博根苦涩的笑了笑后抬头，也不再期待能够被理解，但令他大吃一惊的是，赫斯曼眼中早已挤满了晶莹的泪珠，声音中也夹带了一丝颤音:\n\n“我明白，我都明白的……”"
RRF.5.a:0 "牺牲不可避免，但也绝非理所当然。"

RRF.6.t:0 "全国大会"
RRF.6.d:0 "今天，欢腾的人群聚满了鲁萨尔的大街上，爱迪尔梵·黑戈博根带领着政治局的高层们步行穿过雀跃的人群，举手示意着，走向城市中心的演讲台上。\n\n在黑戈博根走到台上时，一波盛过一波的掌声覆盖了整个广场，而黑戈博根则怀揣着激动的心情，用颤抖的声音对着话筒念道：\n\n“同志们，我们，胜利了！”\n\n霎时间，海浪般的欢呼声从四面八方传来，而黑戈博根像是支持不住眩晕的脑袋般，身躯晃得厉害，直至安德里亚斯·赫斯曼上前轻微的扶稳了黑戈博根的身体。他才将将念出下面的词：“这是一个值得庆祝的日子，无数烈士们的鲜血才铸就如此的伟业，今天的我们，不负芙蕾施曼之嘱，而至此我们也终于可以宣布：属于鲁萨尔工人的联盟、属于鲁萨尔人民的联盟，鲁萨尔工人联盟，今天，成立了！”"
RRF.6.a:0 "事后黑戈博根只记得，自己不断的挥手，而民众不断的回应"

###新闻###
RRFNews.1.t:0 "鲁萨尔工革联统一鲁萨尔"
RRFNews.1.d:0 "令人难以置信的消息传来，鲁萨尔内战的胜利者竟是由社会主义者所主导的鲁萨尔工革联，而在其所召开的全国大会上，也正式将国名更改为鲁萨尔工人联盟。\n\n据悉，鲁萨尔工革联，全名为鲁萨尔工人革命联合阵线，是一个宣称坚决贯彻芙蕾施曼主义的政治派别。其前身为鲁萨尔工会联，在世界大战后改组为工革联。在中巴内战，南巴联邦体系崩溃，鲁萨尔经济大动荡后的混乱时期高举革命之旗，夺得了整个鲁萨尔的控制权。目前南巴地区处在混乱之中，其周边政权对此多保持警惕状态，而远在千里之外的西莉迪亚公社则对这个新生的工人政权表达了善意。可以确定的是，这个新生国家的道路，并非坦途。"
RRFNews.1.a:0 "欢迎新同志的到来"
RRFNews.1.b:0 "又一个社会主义国家..."
RRFNews.1.c:0 "又来一个赤匪！"

