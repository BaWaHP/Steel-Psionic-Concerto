###国策###
RRF_turbulent_night:0 "动荡之夜"
RRF_turbulent_night_desc:0 "在前总统施塔德·埃格遇刺后，§R工革联§!与§2联盟政府§!的矛盾已经无法掩盖，无能、腐朽和反动这些词都不足以形容联盟政府。人民的呻吟早已萦绕耳畔，反抗的斗争也已然近在咫尺。时机既已成熟，工革联自然不会让自己多年来的准备付诸东流，在一个值得铭记的夜晚后，工革联已经成功的控制了鲁萨尔东部——工人势力的大本营。现在，是时候向全联盟吹响解放的号角了。"
RRF_workers_mobilization_order:0 "工人动员令"
RRF_workers_mobilization_order_desc:0 "终于，多年后的今天，工人们终于赢得为自己奋斗的权利。而工革联的存在就是为了这天，工革联多年来的影响和运营如今终于能派上用场，各地的工会将不遗余力的号召和宣传工革联的主张及需要。向世人证明联盟政府§O腐朽的现状§!与工革联§2坚定的信念§!，而人民，会做出自己的选择。"
RRF_in_the_name_of_rev:0 "以革命的名义"
RRF_in_the_name_of_rev_desc:0 "一场名为“§R革命§!”的大火已然在鲁萨尔大地上熊熊燃起，为了全鲁萨尔人民的福祉，为了后代们生存下去的§2权利§!，§R工革联绝不会让斗争停歇§!！而当以后的人们谈起这时，我们都将能骄傲挺起胸膛道：“以§R革命§!的名义，我们为之§2奋斗§!！”"
RRF_back_as_arrows:0 "归者似箭"
RRF_back_as_arrows_desc:0 "历年来联盟政府对于§Y异见者§!的迫害始终没有停歇，工革联自然也有许多同志不得不流亡海外或者隐匿起来。现在红旗已在鲁萨尔东部的上空飘扬，意向于反抗暴政与建设理想社会的§2同志们§!将会源源不断的向工革联所控地区涌来。"
RRF_code_lake:0 "代号“湖泊”"
RRF_code_lake_desc:0 "位于鲁萨尔中心地带的马蒂宸湖四周是整个联盟的精华部分，可以说，只要工革联军队望得到这个以湖中女神闻名的湖泊，那么距掌握全国也就离不了多远了。赤卫军高层制定了一个激进的作战计划，希冀让工革联军队短时间内突进至马蒂宸湖，以期解放全鲁萨尔。但必须要说的是，激进的进攻计划可能会使得原本就仓促起事的工革联变得更加被动。"
RRF_roundabout_tac:0 "迂回战术"
RRF_roundabout_tac_desc:0 "尽管工革联起事之迅速惊呆了所有人，但仍不能粗心大意，稳健派提出了步步为营逐渐蚕食，解放全联盟的计划。出于对革命负责任的态度来说，他们提出的计划自然是最为稳妥的，但同样，解放全联盟的进度也会大大放缓。"
RRF_dead_or_live:0 "你死我亡"
RRF_dead_or_live_desc:0 "这不是一场简单的起义，诚如那句谚语：“§C若要双方谅解，除非你死我亡。§!”，而芙蕾施曼导师也多次提到过无产阶级革命是一场彻彻底底的§R暴力革命§!，是与资产阶级统治集团的你死我亡。工革联当然知晓这些，同样，他们也做好了准备。"
RRF_const_mil_dem:0 "建设军队民主"
RRF_const_mil_dem_desc:0 "即使在革命之火熊熊燃起之时，工革联仍需注意自己的所作所为与初心，而作为工会组织的基础——§2工人民主§!自然也可以应用在军队上。\n\n事实证明，§C军队民主§!会显著提升军队的§7组织度§!与§7主观能动性§!，进而影响军队的战斗力。这种倾向目前看来是十分有利于赤卫军的，因此工革联需要加强乃至建立一种正规的§C军队民主制度。§!"
RRF_political_commissar_system:0 "政委制度"
RRF_political_commissar_system_desc:0 "建立在§C军队民主§!的根基上，§Y政委制度§!是工革联用于保证自己对军队控制力的有力政策。而政委的设立也可以指导更多的士兵懂得自己是为何而战，从而提升赤卫军的战斗力。"
RRF_people_s_army:0 "人民之师"
RRF_people_s_army_desc:0 "鲁萨尔工革联的军队——§R赤卫军§!，从未忘记自己§2从何而来§!，也从未忘记自己§7为何而战§!，他们的父辈可能是贫困的大平原农民，也可能是吸了一辈子浓烟的城市工人，亦然有可能是一辈子勤勤恳恳的小手工作坊的小商人。\n\n但无论背景如何，这些劳苦大众都有一个共同的名字：\n\n§t人民§!\n\n无论如何，赤卫军都是一支源于§t人民§!的军队，也无论如何，赤卫军绝不会忘记自己§R因何而战§!。"
RRF_gather_armaments:0 "收拢军火"
RRF_gather_armaments_desc:0 "在工革联控制了东鲁萨尔后，效忠于联盟的军队没来得及全部销毁各地军火库便被驱逐或围歼，自然我们也就能将各地收缴的军火统一收拢，分配；这批武器对初生的革命军队来说是§7幸运§!且§R至关重要§!的。"
RRF_restart_sogerlangen_plant:0 "重启瑟格尔兰根重工厂"
RRF_restart_sogerlangen_plant_desc:0 "“§C钢带§!”，熟悉却又陌生的称呼，在三十年前它还是联盟的骄傲，联邦的模范工业基地。但自从大战后，在七河资本的挤压下，鲁萨尔西区逐渐崛起，而昔日工业皇冠上明珠的称号也就离东区人们愈行愈远了。\n\n但作为老牌工业基地，瑟格尔兰根的底子尚存——无数熟练§C工人们§!在此之前仍在高压环境下苦苦支撑，许多尚能使用的§Y机械§!乃至§Y工场§!还在拍卖封条之后沉睡，只要我们能够将其组织起来，无论是前线的枪械还是后方的钉子，都将源源不断的从工厂中生产出来。"
RRF_regroup_red_army:0 "重组赤卫军"
RRF_regroup_red_army_desc:0 "赤卫军，工革联起事的基要，根本。单论出来说，赤卫军的功劳无疑是巨大的，几乎无可代替的。但赤卫军的缺点显然也是明显的：组织混乱、地方宗派主义过盛、有的支队宽裕到每人两把枪而有的支队连老式燧发枪都发不齐...等等不一而说。\n\n而解决这方面的问题也并非不可能，只需要工革联军事委员会抽出§C足够的时间§!来进行整合以及编组就好，这段时间是工革联及初生的赤卫军所不得不面对的，而显而易见的是，敌人不会给他们留下太多的时间。"
RRF_glory_to_workers:0 "光荣啊，鲁萨尔的工人"
RRF_glory_to_workers_desc:0 "自鲁萨尔农民战争时期，鲁萨尔工人便是反抗暴政的中坚力量——无数破产的工场手工业工人逃入鲁萨尔大平原，成为当时农民军最坚实可靠的兵力来源。而如今，鲁萨尔的工人们更能昂然挺胸说：“我们为自己生产，我们为自己奋斗！”\n\n坚韧的东区孕育了§7最坚韧的人民，他们能够吃苦，他们能够受累§!，但是他们做不到自己吃苦受累生活却毫无希望，他们同样也忍受不了自己辛苦一辈子后还要自己的孩子在这暗无天日的生活中度过一生。\n\n所以让我们齐声歌颂吧，§C坚韧的鲁萨尔工人，骄傲的鲁萨尔工人，可怜的鲁萨尔工人！§!但他们今天所做的一切，都是为自己，为他人争取光明的未来。\n\n§R光荣啊，鲁萨尔工人！光荣啊，全联盟人民！§!"
RRF_for_the_death:0 "为亡者——"
RRF_for_the_death_desc:0 "沿着历史的涂辙向前望吧，我们的先辈经历了那么多§R苦难§!，经历了那么多§R背叛§!。时至今日，我们难道还要为先烈们去§1原谅压迫者§!吗？\n\n不，绝不可能，英烈在上，工革联会尽一切可能§R解放工人，解放东区，解放全联盟！§!"
RRF_for_the_alive:0 "——及生者"
RRF_for_the_alive_desc:0 "工革联斗争的§C正义性§!毋庸置疑，但我们仍需慎重，向后望去吧，如若我们这一代留下太多的§R血债§!，那么后代就将不得不§R受困于此§!。\n\n§R英烈不朽§!，但更多的还是要为后人考虑，这也是先辈们所希望的。工革联绝不能因为仇恨而驱动，能够使得工革联奋斗的，只有§Y未来§!§2璀璨§!的§t希望§!。"
RRF_blow_horn_of_victory:0 "吹响胜利的号角"
RRF_blow_horn_of_victory_desc:0 "工革联已经倾尽所有，是时候像§1赌徒§!一样把自己的§C希望，未来，所有美好的事务§!押上牌桌了。\n\n失败，则失去一切。但如芙蕾施曼导师所说的那句话——“失败并不可怕，可怕的是连失败的勇气都失去！”\n\n让这绝唱成为全鲁萨尔工人的号角吧，让全联盟人民听得到这属于工革联的§R胜利号角§!！"
RRF_make_her_proud:0 "让芙蕾施曼为我们骄傲"
RRF_make_her_proud_desc:0 "：成功了！工革联终得胜利！我们做到了自己所诺，现在全联盟乃至全联邦甚至整个世界的人民都在看着我们！\n\n推翻腐朽的联盟政府后，工革联——或者现在称鲁萨尔工人联盟更合适，需要做的事还有很多，但胜利的坦途已在眼前，剩下的就留给未来——那§R璀璨的未来§!吧！\n\n至此，全鲁萨尔的工人都可以骄傲的说自己不负芙蕾施曼之嘱，自己可以让芙蕾施曼导师为之骄傲！"

