RRF_revolutionary_enthusiasm:0 "革命热情"
RRF_revolutionary_enthusiasm_desc:0 "在经历了一次次的背叛后，鲁萨尔的工人们终于拥有了对压迫者说不的§2勇气§!。\n\n这一天来的既不太晚，也没有超前，而是——刚刚好。在如此多的磨难之后，工人们终于能将高高在上老爷们拽下来，同他们好好谈谈这些年的§R遭遇§!。"

RRF_workers_armed:0 "工人武装"
RRF_workers_armed_desc:0 "鲁萨尔赤卫军——工革联起事后对工人纠察队等基层组织的重组。显而易见的是，赤卫军战士拥有高昂的战斗勇气和意志，但作为刚刚走出工厂的年轻人来说，握枪依旧不如握扳手来的容易。\n\n但只要给他们机会，时间将会告诉我们一名名合格的工革联战士是怎样养成的。"

