###民族精神###
PEO_why_nobody_talking:0 "怎么没人说话呢？"
PEO_why_nobody_talking_desc:0 "共和国处于一种奇怪的氛围当中，尽管没有任何法律限制或者禁止公民的政治自由，但社会上原本激烈的政治争吵和报纸上层出不穷的政治言论都消失了。无人否认政府亦无人质疑政府。"

PEO_deal_with_CLD:0 "与西莉迪亚公社的贸易"
PEO_deal_with_CLD_desc:0 "皮奥瑞亚不是共产主义国家，但是却出于共和主义原则支持了公社的独立与解放事业。1994年，我们的小伙子们踏入“孤鹰之地”帮助他们对抗帝国主义走狗们。战后，两国以此为基础签订了一系列的贸易协定，最重要的是，我们获得了西莉迪亚的高品质矿产。"

PEO_united_opposition:0 "联合反对派"
PEO_united_opposition_desc:0 "尽管1996年的混乱使共和国的民主化以军事管制的延长终结，但在坚冰之下，是反对派们涌动的暗流。社会党和共和党达成合作关系，在国民议会中形成了跨域党派的“共和民主联盟”；在庙堂之外，利用合法渠道，他们继续宣传着自己的理念。"

PEO_bloated_administration:0 "臃肿的行政机构"
PEO_bloated_administration_desc:0 "在皮奥瑞亚的文官政府之上，是无处不在的军事管制机构。双方往往因为理念或者利益不同发生冲突，导致行政效率低下，这与孔斯年当初为消除文官政府的低效的目的背道而驰。根据国家统计署的报告，包括那些非正式的军管官员在内，皮奥瑞亚的官员人数已经达到了1991年的198%。"

PEO_blooming_of_flowers:0 "百花齐放，百家争鸣"
PEO_blooming_of_flowers_desc:0 "几乎在一瞬间，皮奥瑞亚社会变得有活力起来。公民们重新在公共场所公开谈论政治话题，各类政治类报刊杂志也如雨后春笋般冒出。虽然公开以不当方式，不实消息谩骂当局任然不被允许，但凡事都要迈出第一步。"

PEO_education_reform:0 "21世纪教育改革"
PEO_education_reform_desc:0 "21世纪教育改革涵盖共和国教育及学术体系的方方面面，从学前教育到继续教育，从职业教育到尖端研究.......皮奥瑞亚共和国将全力朝教育学术强国发起冲锋，努力的让每一个愿意学习，研究的国民接受到他们应有的教育，并在此基础上完善科学研究。"

PEO_guidance_execution_supervision:0 "指导，执行，监督"
PEO_guidance_execution_supervision_desc:0 "新的行政架构明确了军管机构和政府之间的职权划分，以确保国家管制委员会在掌握决策权的同时，让文官政府可以最大限度的发挥作用。这套军管委决策，政府执行，议会监督的新架构将在很长的一段时间内发挥其应有的作用。\n§R这只是过渡，必须尽快解决军队内的问题。§!"

###动态修正###
PEO_new_national_constitution:0 "新国家宪法"
PEO_new_national_constitution_desc:0 "当战场的硝烟散尽，当广场的喧嚣沉寂，《1996年皮奥瑞亚共和国宪法》在国民议会机械般的鼓掌声中通过，史称“新国家宪法”。民主与威权同在，稳定和团结被视为皮奥瑞亚共和国的根本原则，军队成为共和国的守护神。尽管皮奥瑞亚依旧是东巴最自由的国家，但是习惯了民主的皮奥瑞亚人真的会让所谓的临时军事管制成为永恒吗？"

PEO_heart_of_greater_bay:0 "大湾区之心"

###领导人###
PEO_LiFangde:0 "李方徳"
PEO_LiFangde_desc:0 "随着1949年社会党“大分党”事件的发酵，越来越多的真正的革命者转向原本不受重视一直处于政治边缘的共产党麾下。之后，镰刀锤子的标志便成为了皮奥瑞亚的启明星，无产阶级纷纷向共产党宣誓效忠。李芳德的先锋队正高歌猛进，带领着皮奥瑞亚的人民们向一个更加美好的未来前进。"
PEO_LiFangde_idea_desc:0 "作为一名共产党能获得皮奥瑞亚众多中产阶级、企业家的支持，实属不易。李芳德的灵活手段和相对温和的主张让他成为为数不多的极左派“选区议员”，而非“政党议员”。对于出任副总理职务，他这样讲：“我的职责是辅佐总理嘛，柏维先生的主张要我看啊，还是比不少只会耍嘴皮的同志强咧。”"
PEO_eric_cyril:0 "埃里克·西里尔"
PEO_eric_cyril_desc:0 "在共和国成立后，在街头游行的红旗海中总有着那面绣着金色火炬的红旗。埃里克·西里尔，背叛了自己家族的逆子，人民之友，现在正在带领人民在街头发出呐喊，在工厂发动罢工，在军队传播思想。尽管“行动”本身依附于共产党，但埃里克从来没有。"
PEO_rick_heckler:0 "里克·黑克勒"
PEO_rick_heckler_desc:0 "里克出生于一个普通的工人家庭，其父母都是当地的知名工会领袖。受到父母的影响，里克从小便对于工人有着深厚的感情。当同龄人放学后在公园玩耍时，他背着父母参加了当时的社会党青年阵线，成为一名有着坚定理想信念的工人阶级战士。\n\n在结束高中学业后，里克放弃攻读本科学历转而进入当时的“皇家冶金公司”工作。在工作中，他亲身经历了工人阶级是怎么样被资产阶级剥削，反动军警对于工人组成的罢工纠察线的冲击，工人在每天劳动十小时后却只能拿到仅够温饱的工资……“资产阶级就是一群吸血鬼，吸干了工人阶级的鲜血。”里克于1976年正式加入社会党并当选本厂工会主席。\n\n作为少数在大分党后投靠正统派的党员，当时的社会党纪委书记刘晓倩将他视为未来的“正统世联主义事业接班人”进行培养。很快，里克在1983年成为社会党中央委员，获得王国议会吉庆邦议席。革命时期，他作为革命临时政府的副总理之一为共和国的成立作出突出贡献。\n\n革命胜利后，里克出任社会党内阁的劳工部长，直到1992年因为战争失利造成的社会党内阁倒台。军事政变后，出于对稳定劳工工会的考虑，孔斯年没有对里克采取强制措施反而任命他继续主管全国工会事务，而里克也接受了任命。1996年，他通过“官佐议席”加入当时的“大联盟政府”。\n\n总理办公室里，里克深吸一口气，他只在小时候想过有一天他会成为皮奥瑞亚领导人，但现在他实现了儿时的梦想。他将去造福人民，尤其是自那个自建国以来就一直被亏待的群体—工人阶级。"
PEO_rick_heckler_idea_desc:0 "里克虽然有些不情愿但是出于对党性和对于国家的负责还是出任了柏维政府的副总理职务。就任讲话时他宣布他将致力于维护本届政府的统一和国家稳定，而非外界普遍认为的对抗。但是里克真的会屈服在“§O修正主义§!”的旗帜下嘛？\n\n§R“我想未必”§!"
PEO_BoWei:0 "柏维"
PEO_BoWei_desc:0 "没人说的清柏维的政治倾向，或者说政治在他看来只不过是用来实现自己宏伟理想的工具而已，一个用来包装自己宣传机器而已。\n\n1988年作为社会党元老之子，原司法部长，年仅35岁的柏维赢得党内选举成为社会党总书记并出任共和国议会议长职务。在1992年的政变中柏维在得知政变的第一时间逃出首都前往目前处于社会党控制下的大都会“普罗维登斯”。正当所有人都以为柏维会被军政府逮捕之时，军管委却宣布柏维进入军管委员会担任财政委员会主任。\n\n1995年，社会党与共和党的联合让这个出生于工人家庭的穷小伙走向了权力巅峰。军政府所属党派在选举中一败涂地，联盟获得议会过半席位，柏维出任内阁总理授权组阁。社会党在他的指挥下很快组建了从共产党到共和党的大帐篷执政联盟誓要推翻军政府。这时稳坐在共和国宫的孔斯年才发现，1992年的那场秘密会谈不过是柏维的政治妥协。绵羊成了饿狼。\n\n如今，柏维成为了共和国宫中的新主人。至少目前无人再能阻止他实施自己那饱受争议的政治理想，他誓要将皮奥瑞亚带向辉煌。他坚信共和国这艘巨轮需要一个伟大的舵手来执掌她，而那个舵手必然是他自己。"
PEO_BoFangzhou:0 "伯芳舟"
PEO_BoFangzhou_desc:0 "出身于皮奥瑞亚第一大工业城市的伯芳舟作为一名小资产阶级工厂主的女儿于1983年破格进入吉列当地的理工大学读书，并以优异成绩考入卡梅尔工业大学攻读硕士学位。按照其父亲规划的路线走，伯芳舟在毕业后将继承父亲的企业继续经营下去。但历史将尘埃压在了她与她父亲的身上，让这个理工科天才不得不趟入政治的浑水中。\n\n革命中，伯芳舟的父亲成为了当地共和党主席但由于革命初期的阵线混乱很快被保皇党分子刺杀。为报杀父之仇，她加入了革命军并加入共和党取得辉煌战果。战后由于共和党团的请求，伯芳舟放弃了自己对于学术的热爱参加共和党1986年的议员选举。在其父亲声望和个人魅力的帮助下，她击败吉列地区的社会党候选人成功当选。\n\n1992年，社会党内阁由于战争的失利和国民经济的崩溃宣布集体辞职，重新举行大选。共和党毫不意外的拿到了过半席位授权组阁，伯芳舟出任教育部长。但1992年底，仅仅成立不到一年的共和党内阁由于无法控制战争失败引起的社会反弹被迫辞职。1992年的政变中她被软禁于首都的家中直到今天。\n\n如今这个只有36岁的政治新星接过历史给予她的权杖。民主与自由的呼声响彻整个皮奥瑞亚，而这呼声或许将随着伯芳舟传遍整个东巴斯蒂亚。"
PEO_barry_kimyao:0 "巴里·金淼"
PEO_barry_kimyao_desc:0 "巴里走进首都的一家咖啡厅，在座的每一个人都有对他不同的称呼。服务员笑着问他：“请问我该称呼您什么？保守旗手？共和卫士？亦或是财政先生……”巴里站起身，礼貌的向全咖啡厅致谢，因为以上都是对他的客观描述。\n\n作为一名经济学家出身的政客，巴里从1967年博士毕业便得到自由党赏识进入王国财政部工作。后来在当选选王国议会议员后，巴里出任国家预算管理委员会主席，而他对于经济的独到见解也来源于这一时期。\n\n革命时期，巴里毅然决然投身于共和党的革命事业，并在革命成功后主导了“共和国革命时期清算委员会”的工作，被被称为“恐怖巴里”。但是对于共和革命的热心并不意味他从一个保守派成为了一个激进人士甚至共产主义者，他在公开场合对于这种言论嗤之以鼻，并强调了自己一直永远都会站在保守共和主义一边。也正是对于秩序的追求，巴里于1993年就加入了军管委员会工作，直到1997年获得“官佐议席”加盟当时的“共和民主联盟”政府。\n\n民主和自由是绝对不能被辜负的，尤其是自由。如今巴里成为了共和国的实际掌权者，他终于可以实施自己的“保守新政”将被大政府夺走的自由还给人民。当然，作为一个经济学家和一个共和主义者，他不会忘记“秩序”的重要性，不论是市场亦或是社会。"
PEO_KongSinian:0 "孔斯年"
PEO_KongSinian_desc:0 "1948年，作为皮奥瑞亚王国一名大贵族的儿子，孔斯年进入了王国首都“卡梅尔”的军事学院学习。毕业后继承其父亲的职务进入王国军队，成为一名上校军官，后调任“王国战争部”。如果不出所料，他将在军队中安稳的度过一生，并在部长职务上退休。\n\n但如今历史却将皮奥瑞亚的权杖交给了他，让他指导着这个步履蹒跚的国家走向未来。六年前的政治混乱，让这个无心政治的老军人忍无可忍的发动了军事政变，介入了共和国政治的漩涡。\n\n孔斯年宣布戒严后，随即在次年建立了临时的军管政府制度准备在局势稳定后让政治回到撤出。不过在之后3年中6次混乱的大选，7届任期不过一个月的内阁，和全国范围内的政治暴力让他一次又一次得宣布戒严延长。他逐渐分不清自己究竟是化作了皮奥瑞亚的救星还是独裁的暴君。他数次下令枪毙那些腐败的战友，他不想这么做，但为了祖国他必须如此。\n\n时间步入1998年，面对国内的民意和政治现实孔斯年明白自己苦心维持的“稳定状态”必须结束了。他回首这几年自己的所作所为他不明白自己做错了什么，但他明白在军管结束之前，他还要做些事来报答自己的祖国。"
PEO_KongSinian_idea_desc:0 "作为现皮奥瑞亚共和国国防军总参谋长，孔斯年事实上仍然控制着国防军，但是他将作为一个职业军人一样忠诚于§R国家和民族§!，而不是什么§R民主政治§!。"
PEO_BianYimin:0 "边宜民"
PEO_BianYimin_desc:0 "边宜民讨厌阶级斗争，所谓联合一切力量只能联合所谓的无产阶级？于是他选择了协作主义，有些厌倦了的资产阶级也对他的想法颇感兴趣，但目前而言联合党只是个不入流小党，但谁又知道以后？或许有一天，农民和地主，工人与老板可以坐在一张桌子前面一同建设这个伟大的国家。"
PEO_wainwright_mavericks:0 "温莱特·马维克斯"
PEO_taoyuan_conference:0 "“桃源会议”"
PEO_taoyuan_conference_desc:0 "世外桃源，与世无争，此乃天道是也。\n——某皮奥瑞亚古代著名思想家"
PEO_alliance_council:0 "联盟理事会"
PEO_alliance_council_desc:0 "自由或死亡。资产阶级和所谓无产阶级的代言人已经让他们失望至极，劳动者们不应该为这些人当牛做马，他们是先进的，不需要任何人和权威的指导。而工会和互助委员会是无产阶级的必然组织形式，唯有无产者自我解放，否则永无出头之日。"
PEO_unknown:0 "暂无"
PEO_republic_parliament:0 "共和国议会"

###内阁###
PEO_Suer:0 "苏尔"
PEO_Suer_desc:0 "苏尔曾是皮奥瑞亚国防军的一名中将。在1992年政变中他率领首都防卫部队倒戈，帮助孔斯年完成了不流血的政变。如今他被军政府推上共和国总统的位置，成为了名义上的共和国领袖。"
PEO_Obstin_Jolson:0 "奥博斯丁·约尔逊"
PEO_Obstin_Jolson_desc:0 "如果共和国有什么人可以被称为“经济天才”，那绝对是约尔逊这个“外国人”。作为原联合王国最高学府培养出来的经济学博士，曾出任联合王国经济部长。退休后被共和国议会授予公民权，重新出山。"
PEO_LiHaisheng:0 "李海盛"
PEO_LiHaisheng_desc:0 "外交是一门艺术，李海盛深有体会。在他15年的大使馆武官生涯中，他结识了许多的国内外政要也为孔斯年办了许多的事情。因此他被推举成为军政府外交委员会的掌舵人，为共和国在外交层面打开出路"
PEO_burke_john:0 "伯克·约翰"
PEO_burke_john_desc:0 "出生于工人家庭的伯克在成为军人之后对人民有这超乎寻常的关心，作为革命中第一批倒戈的旧军官他在战后被任命为国防部常务秘书，在1992年政变后成为军政府的国防部长。"
PEO_oberst_chris:0 "奥伯斯特·克里斯"
PEO_oberst_chris_desc:0 "现任军事管理委员会民政委员会主任，曾出任共和国民生事务部长。由于对共和国文官政府的不满，他加入了军管委员会来实现自己的抱负—实现一个人民幸福，国家富强的皮奥瑞亚之梦。"
PEO_eberhardt_ford:0 "埃伯哈特·福德"
PEO_eberhardt_ford_desc:0 "作为军事管理委员会的教育以及科技委员会主席，福德一直致力于实现皮奥瑞亚的社会进步和科技腾飞。自1992年以来，在他的主导下共和国完成了一系列教育改革和科研成果。"
PEO_gilbert_mcWhite:0 "吉尔伯特·麦克怀特"
PEO_kovner_schreiting:0 "科夫纳·思雷汀"
PEO_kovner_schreiting_desc:0 "共和国情报机构的建立者以及共和国中央情报局的首任局长。拥有高超的谍战能力和丰富的谍战经验。"
PEO_ZhangWhenhong:0 "张文宏"
PEO_ZhangWhenhong_desc:0 "前麦库克州政府常务秘书张文宏，科班出身，曾经荣获全国诗歌比赛一等奖。在东巴大战时期，他作为州内剩下为数不多的官员，承担起指挥州国民兵的职责，这时他才发现自己的指挥才能。在第三次麦库克战役时，他因为指挥的国民兵第2防卫旅成功穿插歼灭两个加强团的敌军而名声大噪。战后，他进入国防部担任军职并加入社会党。"
PEO_john_adderley:0 "约翰·艾德礼"
PEO_john_adderley_desc:0 "前联邦财政部总会计师艾德礼在大企业间可谓臭名昭著，每年的税务总稽查时只要被他发现了偷税漏税，轻则缴纳10倍罚款，重则税务警察直接上门。但他总在年初的财政会议上坚持通过税收返还等行动降低普通百姓和中小企业的税收负担。因而在民间和中小企业联合会里，艾德礼有着极高声望。"
PEO_donald_warren:0 "唐纳德·沃伦"
PEO_donald_warren_desc:0 "作为连续7届皮奥瑞亚优秀教师评比特等奖得主，前吉庆市第一中学校长，前吉庆州教育厅副厅长，沃伦一直主张在全国范围内推行“教育社会化”—学习为社会服务。事实也证明了他的正确，吉庆州在改革后成为全国学术和科学研究最发达的地区并一直保持到现在。根据1997年的教育部数据，吉庆州也是在校学生幸福度最高的一个州。"
PEO_SongRen:0 "张林生"
PEO_SongRen_desc:0 "提到卡斯特-轮克特市这座坐落于皮奥瑞亚中央大平原“天使之城”是共和国最大的农业生产基地，人们的脑海里面不会出现大片大片的粮食种植园而是张氏家族领导的莱利农业投资集团。企业家族的出身，导致他常常被党内同僚质疑他对社会主义的忠诚，但是在农业和农民的问题上张林生永远是党内最权威的专家。"
PEO_anna_patrick:0 "安娜·帕特里克"
PEO_anna_patrick_desc:0 "安娜·帕特里克，前优马州总工会副书记，前皮奥瑞亚妇女协会秘书长。在她的身上有两个标签，一个是工人的领袖，一个是妇女的朋友。她时刻为工人和妇女着想，时刻为了工作准备。但是她绝不会忘记了更重要的是共和国任然处于危险。"
PEO_ZhangWu:0 "章武"
PEO_ZhangWu_desc:0 "科班出身，拥有近三十年一线贸易管理工作的前皮奥瑞亚外贸总局局长章武，对对外贸易有他自己的理解。“自由贸易说到底是为了人民过上更好的日子。”在加入社会党后，他又加了一句“也为了促进世界大同。”"
PEO_lee_melrose:0 "李·梅尔罗斯"
PEO_lee_melrose_desc:0 "独立战争后，皮奥瑞亚开始训练职业化空军，李也在此时由皮奥瑞亚航空俱乐部进入国防军任空军第一航空队副队长。东巴大战期间，他创下共和国空军的第一个战绩和最高的击杀记录。战后，李升为上校，出任空军副参谋长。"

###企业###

###将领###
PEO_monk_corleone:0 "蒙克·科莱昂"
PEO_Huang_Xizhong:0 "黄习中"
PEO_Huang_Xizhong_desc:0 "在东巴大战时，黄习中还是个国民兵旅的中校。他很早就开始把麾下的普拉特州第3国民兵旅按照现在的“新军改模式”训练“步兵突击小组”，并用每年的州国民兵定向资金采购了大量冲锋枪和轻机枪。面对奥罗日亚的旧式步兵部队，第三旅往往能在炮火准备后，用两到三个连的兵力突破对方防线并快速清扫战壕。之后，黄习中被提拔为唯一一名共和国特级少将，领导军改。"
PEO_moncrean_lisbon:0 "蒙克里安·里斯本"
PEO_kankanid_sowodnyu:0 "堪坎尼德·索沃德纽"
PEO_kankanid_sowodnyu_desc:0 "尽管国防军内都称堪堪尼德是皮奥瑞亚自伟大的列斯之后第二位掌握列斯海的男人，但现任皮奥瑞亚国防军海军总司令员的他还是喜欢人们称呼他为“鲨鱼”。而东巴大战期间，堪堪尼德敢指挥轻巡洋舰队冲击西莉迪亚共和国海军驻地的事迹也证明了他无愧于这个外号。"

###GUI###

###变量###

###国策###
PEO_year_after_year:0 "一年又一年"
PEO_year_after_year_desc:0 "1998年的钟声响起，孔斯年看向窗外，他第一次觉得十字路口的岗哨是这么刺眼，于是拉上窗帘。1992年的决定到底正确与否，他的回答已经愈发模糊，但是帝国主义者们还在觊觎着皮奥瑞亚的土地，威胁还没有清除，军事管制必须继续。"
PEO_year_after_year_tt:0 "§R军事管制§!依然生效，请公民们保持秩序.........
PEO_when_is_the_end:0 "何日是尽头"
PEO_when_is_the_end_desc:0 "军管状态只是个临时措施，对吧？当初很多人这么问自己，可为什么会变成这个样子呢？军队全面的接管了国家生活，国民议会成了个象征性机构，如此这般，皮奥瑞亚又有什么资格称得上是东巴斯蒂亚的民主灯塔呢？虽然不是现在，但孔斯年决心解除这种状态。"
PEO_just_say_it:0 "有话就说"
PEO_just_say_it_desc:0 "就连王国时期，哪怕是压迫最严重的时候，皮奥瑞亚都没有放弃过言论自由的原则。但是现在为什么没有人愿意表达自己的想法了呢？学术界尤其如此，自我审查简直到了一种病态的程度，这极其不利于我国的发展。告诉言论统废合办公室，叫他们放开言论管制，让人说话，天塌不下来。"
PEO_fund_the_academia:0 "拨款学术界"
PEO_fund_the_academia_desc:0 "在96年之后，军政府加强了对知识分子的控制，所以知识分子理所当然成了反对当前秩序的急先锋。既然决定要还政于民，安抚知识分子就是必要的。通过科学院与社科院两个机构，我们可以为急需资金的共和国学术界提供资金援助。"
PEO_fund_the_university:0 "联邦大学项目"
PEO_fund_the_university_desc:0 "就目前而言，我国的高等教育还没有跟上发展的速度。大批的皮奥瑞亚年轻人们被迫在接受完高中水平教育后直接进入工作岗位，或者花费更多的金钱去读私立大学。既然大部分州政府拿不出钱，那么联邦政府就有义务去提供高等教育服务。"
PEO_fund_the_tuition:0 "财政补贴学费"
PEO_fund_the_tuition_desc:0 "仅仅1000元共和币的财政补贴就可以满足一个贫困学生上一年公立大学48%的支出，那么何乐而不为呢？委员会财经办公室协调联邦财政部向联邦发展银行转移了近亿元资金，用于未来几年的高等教育补贴款项，虽然这会影响我们在其他方面的发展，但是孔斯年确信，未来属于拥有知识的人。"
PEO_fund_the_local_education:0 "地方义务教育"
PEO_fund_the_local_education_desc:0 "尽管皮奥瑞亚的平均教育水平远强于其他东巴国家，但是如果向全巴斯蒂亚的顶尖水平看，仍是不足的。在几个边境州，甚至是经济最发达的州都有地方尚未完全接入国家义务教育网络。义务教育是皮奥瑞亚的经济继续发展的基础，一个缺乏技术工人的国家是没有未来的。"
PEO_fund_the_milk:0 "牛奶管够"
PEO_fund_the_milk_desc:0 "皮奥瑞亚牛奶产量冠绝东巴，既然我们可以满足外国消费者，就没有理由不满足我们的孩子们。经过消毒的牛奶将通过专线送达所有的义务教育机构，满足孩子们每天的蛋白质需求。我们不能让我们的下一代挨饿受苦。"
PEO_fund_the_education_in_new_century:0 "教育朝21世纪"
PEO_fund_the_education_in_new_century_desc:0 "人才是皮奥瑞亚走向繁荣的根本，教育则是培养人才的根本。在委员会常务会议上，科学教育部常务次长代表部门提出了“教育发展二十一世纪规划”，提出要在二十一世纪前十年内实现义务教育的全面普及，并完善职业教育与高等学术教育体系。2010年后逐步实现高等教育的全面普及，到2045年，让共和国成为巴斯蒂亚学术高地。"
PEO_dont_be_in_a_hurry:0 "大家先别急"
PEO_dont_be_in_a_hurry_desc:0 "6年的军事管制下，人民无非最想知道皮奥瑞亚什么时候才能恢复常态。但先不要急，诸位。军管委员会当中，和孔斯年一条心的自然有，但是想要皮奥瑞亚保持军政体制的也不少。他必须小心行事。"
PEO_economy_first:0 "经济先行"
PEO_economy_first_desc:0 "1997年，皮奥瑞亚的经济增速为5.3%，低于1991年的7.8%。经济增长的放缓绝对不是什么好信号。如果我们只是一味的压制人民，那么我们永远不可能让皮奥瑞亚变成一个既稳定又富强的国家。现在是时候让经济运行重新燥热起来，让商品流动起来了。"
PEO_economy_first_tt:0 "§2皮奥瑞亚必须保证自己东巴第一经济强国的地位。§!"
PEO_rebuild_the_government:0 "重建政府体制"
PEO_rebuild_the_government_desc:0 "皮奥瑞亚的政府体制已经臃肿到无以复加，大量政府部门和军事管制机构职权重复，互相倾轧，各级委员会被无数的具体事务困住，根本无法进行有效决策。孔斯年决心解决这个问题。新架构重新将大量经济职能和社会职权发还文官政府，形成军管委员会决策，政府具体执行的体系。经济学家预计，这将极大改善皮奥瑞亚的经济运行效率。"
PEO_stability_first:0 "稳定高于一切"
PEO_stability_first_desc:0 "民主化不能一蹴而就，不然肯定要出乱子。孔斯年将在下一周的广播演讲中向全国听众阐明这一点。麟人有句话叫“心急吃不了热豆腐”，皮奥瑞亚也有句类似的谚语——“急躁是搞砸事情的充分条件。”"
PEO_reaffirm_military_control:0 "重申军管原则"
PEO_reaffirm_military_control_desc:0 "军官们要理解民主，政客们要理解稳定，孔斯年将在一年一度的军政联席会议上阐明这两点。军事管制的初衷本身就是为了共和国建立更好的民主制度而进行，不应该有任何理由脱离这条总原则。"
PEO_democracy_and_prosperity:0 "民主和繁荣"
PEO_democracy_and_prosperity_desc:0 "皮奥瑞亚为什么会繁荣？皮奥瑞亚为什么又是东巴斯蒂亚的民主灯塔？因为皮奥瑞亚自古发达的经济让人民有能力关注政治；关注政治的人民又努力地去建设皮奥瑞亚。人民主权与经济发展相辅相成，环环相扣，任何一方都不能放弃。"
PEO_special_action:0 "专项整治行动"
PEO_special_action_desc:0 "民主化进程当中什么最重要，孔斯年会说是稳定。政治暴力绝对不是可选项，不然孔斯年就落了那群“军政主义分子”的口舌。一次严打将会进行，各级警务部门将得到驻军配合打击犯罪行为，落网的罪犯会在法庭上被从重从快审判，尽管这不太符合法治。"
PEO_limited_relax_martial_law:0 "有限解除戒严"
PEO_limited_relax_martial_law_desc:0 "混乱，军警，枪弹构成了皮奥瑞亚人对于1996年的回忆。建制派的军队开入首都，护宪派在首义之城宣布抗命，文官政府不知所措......这样的画面不能再重演。根据新的命令，军队将依次撤出都市区，维稳的任务将被交给警察。有限解除戒严有助于恢复国民信心。"
PEO_new_national_constitution_principle:0 "新国家宪法原则"
PEO_new_national_constitution_principle_desc:0 "《1996年皮奥瑞亚共和国宪法》第一条第1款“皮奥瑞亚共和国是一个自由民主的联邦制共和国。”；第35条第4款“共和国国防军在社会陷入危机，国家政治停摆时有权实施戒严”前一条是孔斯年压制军队反对派的法宝，后一条则是给政客的警钟。"
PEO_review_representative_qualification:0 "审查代表资格"
PEO_review_representative_qualification_desc:0 "共和国的政坛不能被民粹和极端分子裹挟，这是孔斯年和同僚们的底线。国家管制委员会选举办公室（国家选举委员会）将审查每一位代表候选人递交的档案，确保他们不是反动分子或者极端分子，有的人批评这是专制行为，但连共产党都没有意见，其他声音也就没什么好去在意的。"
PEO_hold_election:0 "举行选举"
PEO_hold_election_desc:0 "新一届选举将在稳定下进行，所有投票站都会有警察值守，民众与政党代表将在现场监督选举流程并被邀请前往计票现场，以保证选举公平。预计本次提前选举将产生276名议员，并产生新的联邦政府。"

###事件###
PEO.1.t:0 "无罪"
PEO.1.d:0 "“阿斯顿·安东尼·特雷西，现根据最新法令将你无罪释放，请在释放书上签字。”警官面带微笑的把释放书递给特雷西，“恭喜你，特雷西女士。”\n\n特雷西签完字，向警官要了根烟。\n\n“我记得您和我说过您戒烟了，女士。”\n\n“就当庆祝我出狱吧。”\n\n警官靠近帮特雷西点上香烟，然后脱下警帽在她对面坐下，一脸轻松的说：“和您同一批被捕的教授们都会得到释放，以后应该也不会有军代表审查了，我们的工作也轻松些。当然，您也应该能理解，我们也是执行命令。“\n\n特雷西，吉庆州立文教学院社会学系教授，于1997年10月21日与3名教授一起因在一篇公开论文中“发表不当言论”被捕，正在等待军事司法审判。孔斯年这一纸命令可谓救人于水火。\n\n“特雷西女士，我个人很喜欢您的文章，有很多针砭时事的东西。您这样的学者，现在已经不多见了。”\n\n特雷西深吸一口烟，然后笑着看向警官身后的国旗。她想起了自己给学生上公民课的时候总会说国旗上星星的含义。\n\n“第三颗星是自由，自由是皮奥瑞亚民族国家的根本，是共和国的立国之基，也是我们这堂课要学的重点。”\n\n“当然会，我是社会学教授，学术自由是生命。”"
PEO.1.a:0 "自由诚可贵"

PEO.2.t:0 "充分交流"
PEO.2.d:0 "在食堂吃完早午饭，刚来到会议室，大家就发现了这次会议的不寻常——苏尔坐到了主位，“老头子”坐到了左手边！！！孔斯年见推门而入的众人，尤其是马维克斯这家伙居然愣住了，于是开门见山的说，“我最近身体不太好，今天让苏尔帮我主持下会议。他是总统又是副主席，我觉得他来主持没什么问题。”既然孔斯年已经发话，大家也不好说什么，于是这才坐下开会。\n\n前面的议程争议很小，向內威斯州增加联邦教育拨款；向卡斯特州议会“建议”新任州总检察长人选；要求宪法保卫局扩大在大喜境内的秘密调查......这些都是协商好的问题，自然很快就表决完成。\n\n“下一项问题大家议一议就行，孔主席希望大家可以形成一个比较统一的意见再表决。”苏尔尽量委婉的说，他知道，任何关于调整军管政策的问题都会让某几个人再会上大发厥词，“大家尽量冷静些讨论。”\n\n“我先说吧，我觉得把那群政客再请回来完全就是胡闹，他们难道还有国防军对共和国上心吗？不！他们只在乎他妈的选票！”马维克斯没有理会苏尔的请求，他也不屑于理会这个没有军权的虚职总统，更何况自己比苏尔早四届毕业。\n\n“马维克斯，我提醒你，忠诚于宪法和国家的誓言大家都是重新入伍时候在国旗下面说过的。孔主席说过多少次，军事管制只是个临时状态，依我看，也是时候逐渐解冻了。”莫里茨不屑的说，“不知道老兄对‘临时’这个词怎么看啊？”"
PEO.2.a:0 "苏尔见事不妙赶紧结束了议程"

PEO.3.t:0 "未来"
PEO.3.d:0 "“请大家举起右手，跟着我宣誓.....我宣誓.....”\n\n“我宣誓，效忠祖国，坚定支持共和主义，为皮奥瑞亚民族的自由与繁荣作出贡献。我将致力于在学习与工作中做出更好成绩，回馈共和主义祖国.....”\n\n“宣誓人，艾玛·德·斯宾塞。”\n\n斯宾塞从老师手上接过1000共和币的支票，这笔钱足够支付他两年的学费或者他一整年的生活费用。第一批高等教育补贴将覆盖6000名最贫困的大学生，此后每年持续扩大资助规模，尽可能覆盖所有贫困学子，以帮助他们专心完成学业。\n\n“这笔钱是永久无息贷款，你毕业两年后开始偿还本金，学校帮你申请了10年还款期限。之后每年秋季学期开学前，记得向联邦发展银行递交续贷申请。”仪式结束后，老师把斯宾塞单独拉到办公室，和他谈话，“如果你以后有兴趣回內威斯，这笔贷款可以减半还款。”\n\n“谢谢老师，我真没想到您会把我推荐进第一批名单。”\n\n“你的成绩不错，家里也确实困难......你师母也是內威斯人。有为师的一点私心吧。我可不能看着共和国的未来砸在共和国的最高学府里面。”\n\n斯宾塞向老师深深鞠躬道谢。"
PEO.3.a:0 "未来在年轻人"

PEO.4.t:0 "敞开心扉"
PEO.4.d:0 "晚上七点，熟悉的声音从收音机中响起，国家广播电台主持人林笙用标准的皮奥瑞亚语播报起今天的新闻。在快速的略过国际新闻后，他清了清嗓子，然后郑重宣布：“下面请皮奥瑞亚共和国联邦临时军事管制委员会主席，孔斯年先生向公民们发表讲话。”\n\n“亲爱的公民们，我在共和国宫向诸位问好。”\n\n“......对话是信任的基础，所以我这次想和诸位敞开心扉，认真谈一谈民主化的问题......民主和自由是共和国的立国之本，也是皮奥瑞亚民族一直所追求的理想，这点我和我的同事们一直铭记于心。”\n\n“但是，恢复民主需要时间。在如今帝国主义环伺的国际局势下，皮奥瑞亚承受不起又一次政治动荡，更承受不起又一个无能的领导者。如果民主本身被滥用，那么共和主义的价值便会一文不值。因此，我和我的同事恳请诸位公民能够理解，为什么我们选择渐进式民主化路线。”\n\n“……民主与共和终将在东巴斯蒂亚大陆上获得胜利。共和万岁，人民万岁，皮奥瑞亚万岁。”"
PEO.4.a:0 "敞开心扉"

PEO.5.t:0 "交接"
PEO.5.d:0 "交接十分顺利，常民生痛快地把办公室钥匙交给了克劳德。他已经受够了处理民政事务，作为国防军指挥学院的高材生，他还是更喜欢回归军队生活。\n\n“常长官，别忘了你还要继续领导国管委的工作。”克劳德笑着说，“根据最新的调整，我只负责具体事务，你还是大班长。”\n\n“那也就是个流程问题。我无条件支持你。”常民生拍了拍克劳德的肩膀，“好好干，别亏待那些给你投票的人。”说完，他夹着笔记本走了。\n\n民政旗被重新放置在国旗旁边，克劳德在古老的橡木桌后开始了回归后的第一次市政会议。"
PEO.5.a:0 "回归常态"

PEO.6.t:0 "严打"
PEO.6.d:0 "房门被一脚踹开，冲进来的是荷枪实弹的国防军宪兵。一人企图反抗，结果被一枪托撂倒在地后拖了出去。有人说这是暴力执法，也有人为之叫好。\n\n陪审团不再适用，任何触犯《皮奥瑞亚共和国刑法典》有关扰乱社会公共秩序罪的人都只会得到政府指派律师的辩护。审判程序也极为简单，法院几乎不会拒绝检察院的公诉意见，即使是小偷小摸，被判处10年以上有期徒刑都是常见现象。\n\n“专项整治行动是为了打击愈发猖獗的黑恶势力与犯罪行为。法治的根本是维护共和国的繁荣稳定。”内政部发言人在记者会上说，“截止今日，专项整治行动效果明显，已经有效改善地方治安环境。捣毁有组织犯罪组织21个，委托检察院起诉2143人。”\n\n“请问这符合民主精神吗？”有记者问。"
PEO.6.a:0 "“保护最广大公民的利益就是最大的民主。”"

PEO.7.t:0 "换岗"
PEO.7.d:0 "换岗仪式在中午十二点举行。卢卡斯在警车旁看着那些身穿丛林绿迷彩的大兵们带着步枪，爬上运输车扬长而去。现场督察一声令下，所有岗哨被警察接管。\n\n穿着88式制服，和市民们交谈的卢卡斯成为了第二天的头条人物。很快，这张照片成为了戒严放宽的标志，传遍了共和国的大街小巷。\n\n城内的治安维持被警察重新接管，武装警察只有在特殊情况下才会被部署，国防军只在州级交通枢纽进行布防......所有人都感受到皮奥瑞亚的坚冰正在融化。\n\n当然，由于长期的被压制，皮奥瑞亚的警力出现些许不足，大量警校生的紧急部署也造成了不小的麻烦。"
PEO.7.a:0 "微不足道的代价"

PEO.8.t:0 "1999年皮奥瑞亚议会选举"
PEO.8.d:0 "与上一届1996年选举不同，本次选举引入了由共和国社会科学院推荐的比例代表制和双重选举制度大大提高了议员的代表性，同时也意味着议员可以更好的在议会中行使议员权限。\n\n本次选举由共和党领衔的“共和民主联盟”和社会党领衔的“左翼民主阵线”领跑，但根据民调双方都不会占据本届议会的三分之二决定性多数。同时，新兴右翼政党皮奥瑞亚民族共和党也宣布参选（尽管国家宪法保卫局已经对民共党的煽动性演讲提出警告）。\n\n首轮选举在国家选举委员会的监督下开始。各地满20周岁的有选举权公民陆陆续续于当日上午十点进入居住地区政府指定投票地点投票。9日复选开始，并于当日22点停止计票。根据共和国选举委员会统计本次选举的票数总计2478万张，有效票数2477.8万张，投票率高于宪法规定。同时，大量居住在国外的皮奥瑞亚公民前往了共和国驻外领事馆参与投票。在当日23点召开的记者会上，军事管制委员会发言人表示这是一次“民主的胜利”。\n\n次日选举结果公布。"
PEO.8.a:0 "“左翼民主阵线”在人民的支持下获得多数席位！"
PEO.8.b:0 "人民在自由和民主的呼声中选择了“共和民主联盟”"

PEO.9.t:0 "《社会党第17届党代会》"
PEO.9.d:0 "唱完党歌，社会党4年一度的党代表便在掌声中正式召开。今年的党代会选在了风景宜人的海滨城市吉庆召开，代表们不禁感叹起中央党部这次的大方，毕竟以前打着亲民旗号的社会党党代会不是在内陆某个小城召开就是在首都歌剧院组场地开。不过很快，代表们便感受到了与窗外热热闹闹的“新春节”截然不同的气氛。\n\n会场在柏维和黑克勒上台发言后便立刻沉寂下来，只剩下个别党代表的窃窃私语，即使是分组讨论时也不例外。每个代表心里都清楚这次党代会的份量，在经历几年的混乱后，人民可再不能容忍一个孔斯年，更不会容忍一个不能带领共和国走出困局的民选领导人。\n\n党内正统派和新旗帜派的内斗已经公开化，尽管双方都承诺不管谁当选都会给对方派系留出三分之一的内阁席位，但没有人会主动放弃执掌共和国最高权力的机会。柏维的改革主张在年轻党员和党外颇受欢迎，甚至有部分企业家公开支持社会党新旗帜派候选人参选议员；黑克勒则受到老党员，共产党和大量左翼人士支持。双方的潜在支持者规模都让选举总书记人选变得难上加难。\n\n“我还是要强调一遍，皮奥瑞亚不可能快速进入世联主义，希望同志们记住。我们只能用循序渐进的方法来实现党的最高纲领，这是现实的道路也是皮奥瑞亚人民最希望的道路”柏维在下午的代表团讨论中这样描述自己的想法；黑克勒则在夜里的“工会代表组会”里面继续发挥自己作为曾经的工会演说家的能力，逐条陈述自己的伟大构想。“有的同志总觉得世联主义不能实现，打出新旗帜。非要说社会党代表全民利益！社会党从来不是全民党，他永远都只会是劳动阶级的党！。”\n\n第二天下午投票正式开始，代表们逐一走进秘密投票室。随着大会主席团结束对选票的清点，选举结果也明朗起来。投标结束37分钟后，大会主席高声宣布投票结果。"
PEO.9.a:0 "里克·黑克勒的正统观点在党内大获全胜"
PEO.9.b:0 "柏维的变革之风吹遍了整个社会党"

PEO.10.t:0 "《共和党十八届四中全会》"
PEO.10.d:0 "这届四中全会的气氛相当轻松，甚至平时开小会都吵的鸡飞狗跳的几个中央常务委员都换了副嘴脸，在会议上开起玩笑。毕竟共和党赢了选举，终于结束了共和国自建国以来左派长期把持政权的时代。\n\n伯芳舟的兴奋自然溢于言表，而巴里今天也放下了扑克脸和别人聊天。“好了，诸位女士先生们，先开会吧。开完会，亲爱的克劳德先生在奥赛酒店为我们准备了晚餐，有这个月的特别餐品—吉庆双鱼炖和优马一品锅。”会议主席笑着说。大家笑了笑然后在鼓掌后安静下来听取会议议程，当然没有人会在乎什么“纪念周活动”之类的活动安排，大家只在乎这次的总理提名。\n\n巴里率先打破沉默，他看向伯芳舟笑着说：“我这种老年人就不和年轻人争了，我做我的议员就够了。”伯芳舟则回以相同的微笑，她拿出自己的“自由青年徽章”向在座的中委们展示：“我离强制退出自由青年队还有1年的时间，巴里先生的稳重很受我国偏向保守的人士喜欢 。我认为巴里先生无疑更适合代表我党成为共和国总理。”会议就在伯芳舟和巴里.金淼的互相”推让”中度过了两个小时，两人都逐渐有些疲倦却没有丝毫停下的意思。坐在伯芳舟旁边的中委会秘书长里尔.柯林斯突然拍案而起，尽管主席让他坐下但正在争吵的两人都同时闭上嘴，将目光移向“老好人”里尔准备听听他有什么独特方式解决当下的问题。\n\n“我说啊，各位女士们先生们，我们为什么不直接开始投票？伯女士和巴里先生的政策大家又不是不知道。再说，我想除了我之外诸位中委大抵是早就选好边站好了队，早点投票对谁都好，尤其是那些想要赶快去豪华餐厅吃饭的人。你说是不是啊，主席先生？”柯林斯说完便坐下继续在笔记本上算后天要缴纳的税款—他要赶在阳春节前把今年的退税拿到。在座的中委们愣了一下紧接着相视一笑，主席也支持柯林斯的想法，投票程序也就顺理成章开始了。\n\n不出意外，双方平票。于是决定权落到还没投票的柯林斯头上。“每次一到开会投票都是这样。”柯林斯骂着在选票上写下自己的名字交给主席。主席打开选票看了一眼，随后大声说出当选人的名字。"
PEO.10.a:0 "理想主义者伯芳舟最终获得了实践的机会"
PEO.10.b:0 "保守与进步的完美结合将巴里送入共和国宫"

PEO.11.t:0 "地区投资"
PEO.11.d:0 "经过联邦商务部，联邦财政部，联邦工商部等部门组成的联合委员会审议，选择了三个地区发展计划提交国家管制委员会审议。我们的预算可以使我们可以选择一个地区进行投资。\n\n森特：森特州以葡萄酒和咖啡产业闻名于世，品质可以在基本被南巴高品质产品垄断的国际市场占有一席之地。由于生产设备的长时间未更新，以及落后于南巴的育种技术，森特产品的市场占有率正在迅速下降。\n\n普拉特：普拉特州是联邦内重要的矿业与工业基地，是共和国与西莉蒂亚公社进行交流的桥头堡。外交部和商务部认为在该地进行投资，有利于加强共和国的工业能力，并且巩固皮奥瑞亚与西莉蒂亚公社的关系。\n\n吉列：吉列州是皮奥瑞亚大湾区的核心部分，是联邦的商业、工业、教育中心，吉列港是东巴斯蒂亚最繁忙、最大的港口。商务部极力推荐进一步投资吉列州的相关产业建设，并推动吉列港成为国际贸易自由港。\n\n委员会经过审议决定："
PEO.11.a:0 "投资森特州"
PEO.11.b:0 "投资普拉特州"
PEO.11.c:0 "投资吉列州"

PEO.12.t:0 "法院"
PEO.12.d:0 "位于共和广场西面的皮奥瑞亚共和国联邦最高法院门前今天挤满了记者和围观的民众，以至于负责共和国宫安保的联邦防卫宪兵队不得不请求卡梅尔市公安厅调派警力帮助维持秩序。与外面热闹氛围形成对比的是第二裁判厅内的紧张气氛。\n\n“下面宣读最终裁判结果。”在全体向共和国国旗致敬后，主审法官开始宣读裁判书。被告席上，前皮奥瑞亚青山资本集团董事局主席张思淼已经把头埋进双臂，等待审判，他的辩护律师则还保持着职业素养，正襟危坐等待结果；与之相反的是公诉席上检察院方面难以克制的笑容。\n\n“判处被告人…”\n\n……\n\n“张先生，您知道壁虎尾巴吧？”\n\n……\n\n“25年有期徒刑包含128天拘押时间，剥夺违法所得2.5亿共和币，剥夺政治权利30年。以上。具体服刑地点由司法部研究后决定”审判长缓慢念到，脸上是司法人员特有的冷漠，“理由如下…”没等审判长念完，记者就已经从旁听席离开，只剩下政府官员和一些法学院学生。\n\n剩下的内容张思淼一个字也没听见，直到他被法警架走的时候脑子里面依旧一片空白。4年前，他作为集团董事开始为军政府部分要员和公务员提供秘密资金时就应该想到，他不过是这张巨大利益链条上的一个微不足道的部分，如果哪天军政府垮台，他就是最容易被查出来的替罪羊。\n\n孔斯年和苏尔在单向镜后面观看了庭审的全过程。“老孔，你觉得这样够嘛？”苏尔向孔斯年发问，“真是的，那帮人居然这么给军队抹黑。我们这群老头真是不懂政治啊，以为我们军队就比政客清廉，结果给一个人输送的钱比从87年开始到92年所有被起诉的民选政客加起来还多。”孔斯年用手托住下颚，缓缓摇头：“从张思淼的证词里面看，他只能接触到中级官员，但是我觉得不应该啊。”\n\n“哪里不对？据我所知至少联邦层面军管委员会里面除了个别人是不和青山资本有接触的。”苏尔疑惑的问道。"
PEO.12.a:0 "“你不觉得，问题就是在这嘛？”"

###新闻###
PEONews.1.t:0 "新旗帜派赢得大选"
PEONews.1.d:0 "在激烈的选战过后，皮奥瑞亚人民的选择展现在了世人面前。从普拉特城到共和港，从优马的山村到吉庆的大都会，到处飘扬着社会党的玫瑰红旗帜。皮奥瑞亚社会党在大选中打败了备受瞩目的共和党，赢得皮奥瑞亚第三共和国的第一次大选。\n\n在选战后的政治角逐后，以前共和国教育部部长之子柏维为代表的新旗帜派赢得党内选举，出任皮奥瑞亚共和国第5任总理。在宣誓中，柏维阐释了自己温和的执政纲领和对世联主义梦想的执着，温文尔雅的形象为他赢得了皮奥瑞亚人民的广泛赞扬，就连皮奥瑞亚工商联合会也对柏维的执政表达了认可。\n\n“我们将不遗余力的推进社会民主化，人民化，”柏维讲到,“共和国也绝不会在这里停下脚步，做一个偏安一隅的小国。共和国是东巴民主的灯塔，那我们也有义务向诸国传播共和的光辉。”看起来皮奥瑞亚民主化之后的首位领导人正以前所未有的激情来面对自己的工作。或许皮奥瑞亚会在这位进步派总理的带领下走向玫瑰色的未来。西莉迪亚公社为新政府献上了隆重的祝福，而奥罗日亚方面如老样子谴责了共和国政府。\n\n据悉，前军政府时期总统苏尔依然担任民主化后的皮奥瑞亚共和国总统并担任国防职务。同时前军政府首脑孔斯年被柏维任命为国防军总参谋长。"
PEONews.1.a:0 "庶民的胜利"

