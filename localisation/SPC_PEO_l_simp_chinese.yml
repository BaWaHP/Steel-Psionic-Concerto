###政党名称###
PEO_pioneer_communism_party:0 "皮奥瑞亚共产党"
PEO_pioneer_communism_party_long:0 "皮奥瑞亚共产党"
PEO_revolutionary_communism_party:0 "皮奥瑞亚社会主义行动"
PEO_revolutionary_communism_party_long:0 "皮奥瑞亚社会主义行动"
PEO_worldunion_socialist_party:0 "皮奥瑞亚社会党"
PEO_worldunion_socialist_party_long:0 "皮奥瑞亚社会党-正统派"
PEO_worldunion_democrat_party:0 "皮奥瑞亚社会党"
PEO_worldunion_democrat_party_long:0 "皮奥瑞亚社会党-新旗帜派\n新旗帜派，是一个以柏维为主导的社会党内部派系。该派系起源于柏维的政治导师—托马斯·杰克逊之手。尽管对于传统世联主义学说进行了部分修改，但派系任然将实现社会主义最为最高目标并主张通过暴力革命以及总罢工以达到政党或者说人民的利益。该派充分继承了其政治导师的思想，新旗帜派发誓将皮奥瑞亚带入社会主义的道路之上，让人民富裕，即使有时候要脱下白手套。"
PEO_liberal_republican_party:0 "皮奥瑞亚共和党"
PEO_liberal_republican_party_long:0 "皮奥瑞亚共和党-忿激派\n共和党起源于原皮奥瑞亚王国中的中左翼“自由党”。在这个由资产阶级进步主义者为主体的党派中，革命的呼声从未减小并随着南巴斯蒂亚革命的爆发愈发强烈。在革命胜利之后，虽然新组建的共和党并没有取得议会多数，但也足够伯芳舟这个年仅36岁的政治新星带领着自己的支持者去实现心中关于自由平等的理想。"
PEO_conservative_republican_party:0 "皮奥瑞亚共和党"
PEO_conservative_republican_party_long:0 "皮奥瑞亚共和党-秩序派"
PEO_authoritarian_republican_party:0 "皮奥瑞亚临时军管委员会"
PEO_authoritarian_republican_party_long:0 "皮奥瑞亚临时军管委员会\n作为事实上的中央政府，军管委担负着指导第二共和国一切经济发展和政治民主化的重任。军管委作为议行合一的最高权力机关已经完全架空共和国国民议会和共和国文官政府。在过去的几年来，军队小心翼翼的指导着共和国的民主化进程，包括抓捕极端派以及取缔各类反共和运动。现在随着社会经济的复苏，军管措施的必要性已经受到质疑，但军队任然坚信，在外部敌人被彻底消灭之前共和国必须以处于军管之下直到和平为止。"
PEO_national_socialist_party:0 "皮奥瑞亚民族共和党"
PEO_national_socialist_party_long:0 "皮奥瑞亚民族共和党"
PEO_authoritarian_nationalism_party:0 "皮奥瑞亚民族共和党"
PEO_authoritarian_nationalism_party_long:0 "皮奥瑞亚民族共和党"
PEO_paternal_autocrat_party:0 "皮奥瑞亚保皇联盟"
PEO_paternal_autocrat_party_long:0 "皮奥瑞亚保皇联盟"
PEO_wizard_rules_party:0 "暂无"
PEO_wizard_rules_party_long:0 "暂无"
PEO_religious_extremism_party:0 "皮奥瑞亚神友会"
PEO_religious_extremism_party_long:0 "皮奥瑞亚神友会"
PEO_anarchism_party:0 "皮奥瑞亚劳工联盟"
