###民族精神###
PEO_why_nobody_talking:0 "怎么没人说话呢？"
PEO_why_nobody_talking_desc:0 "共和国处于一种奇怪的氛围当中，尽管没有任何法律限制或者禁止公民的政治自由，但社会上原本激烈的政治争吵和报纸上层出不穷的政治言论都消失了。无人否认政府亦无人质疑政府。军管委员会将这种情况看做是军管政策的成功，而议会当中的反对派可不这么想。"
PEO_new_national_constitution:0 "新国家宪法"
PEO_new_national_constitution_desc:0 "第二共和国初期被军队强行通过的1990年宪法被成为“新国家宪法”，宪法在继承了第一共和国宪法民主政治的基础上大量增加了关于军队以及集权的条款，使共和国权力集中于中央政府。军队在这一宪法下得到了极大的加强但同时也引发了一些社会性问题。"
PEO_army_under_politics:0 "政治下的军队"
PEO_army_under_politics_desc:0 "皮奥瑞亚国防军耗费太多精力在政治方面，忽视了对于军队本身的建设。现在我们不得不吃下这一苦果。"
PEO_deal_with_CLD:0 "与西莉迪亚公社的贸易"
PEO_deal_with_CLD_desc:0 "在东巴斯蒂亚大战期间我们帮助了南部的共产主义者建立了他们的公社政权，当然他们也投桃报李与共和国签订了一系列有利于我们贸易条约。"
PEO_united_opposition:0 "联合反对派"
PEO_united_opposition_desc:0 "社会党和共和党摒弃前嫌再一次为了反抗“暴政”站在了一起为了自由与民主而战。现在他们占据了议会的宪法规定的绝对多数，肆意抨击军管委员会的政策与方案--尽管他们的声音不可能传到了任何媒体手上。"

PEO_flourished_ocean_trade_var_idea:0 "海上贸易繁荣度"
PEO_flourished_ocean_trade_1:0 "海上贸易繁荣度：全面崩溃"
PEO_flourished_ocean_trade_1_desc:0 "共和国的海运陷入全面崩溃，我们几乎无法将我们的商品送去海港。经济在崩溃，我们无法判断那些买了航运公司股票的家伙和股票哪个跌的更快。"
PEO_flourished_ocean_trade_2:0 "海上贸易繁荣度：正在恢复"
PEO_flourished_ocean_trade_2_desc:0 "海运业正在恢复运转，人民正在对海运业进行投资，货物进出正常。"
PEO_flourished_ocean_trade_3:0 "海上贸易繁荣度：正常运转"
PEO_flourished_ocean_trade_3_desc:0 "皮奥瑞亚的海外贸易正处于正常运转中。新兴的轮船运输行业正将货物运向，而共和国也可以从海上贸易中获益。"
PEO_flourished_ocean_trade_4:0 "海上贸易繁荣度：较为繁荣"
PEO_flourished_ocean_trade_4_desc:0 "东巴斯蒂亚的沿岸到处都有飘扬着共和国旗帜的海轮，共和国的货物通过繁荣的海上航线将其送进每一个国家。国家的一切都因为海上贸易繁荣！"
PEO_flourished_ocean_trade_5:0 "海上贸易繁荣度：繁荣鼎盛"
PEO_flourished_ocean_trade_5_desc:0 "“货出去，钱进来，皮奥瑞亚发大财！”——某航运大亨"
PEO_maritime_trade_administration_idea_up_nothing:0 "什么也不会发生，因为贸易繁荣度已达最高！"
PEO_maritime_trade_administration_idea_down_nothing:0 "什么也不会发生，因为贸易繁荣度已达最低！"

PEO_nation_revive_plan:0 "国家复兴计划"
PEO_nation_revive_plan_desc:0 ""
PEO_rebuilding_financial_sys:0 "重建中的共和国金融体系"
PEO_rebuilding_financial_sys_desc:0 ""
PEO_new_central_bank:0 "崭新的共和国中央银行"
PEO_new_central_bank_desc:0 ""
PEO_rebuilding_army:0 "重建中的军队"
PEO_rebuilding_army_desc:0 ""
PEO_new_army:0 "共和国国防军—有限国家化"
PEO_new_army_desc:0 "在经历一轮大换血后，国防军完成了孔斯年规定的最低限度的改革，大批反对民主化和激进军官被清除出军队。但军队仍然是个定时炸弹，因此在民主化之后孔斯年将继续在军队中任职，压制国防军中的激进派。不过至少共和国的守护神终于稳定了下来。\n\n§R但孔斯年究竟还能坚持多久？§!"
PEO_cultural_bloom:0 "百花齐放，百家争鸣"
PEO_cultural_bloom_desc:0 ""
PEO_battered_financial_order:0 "受打击的金融秩序"
PEO_battered_financial_order_desc:0 "由于我们首次对金融市场采取监管和打击措施，金融市场遭受了一定程度的冲击。萧条席卷全国，但经济专家预计这只是市场对政府监管做出的临时反应。只要假以时日，金融秩序就会恢复正常。"
PEO_battered_financial_order_tt:0 "该民族精神移除后，每日增长的改革点数和民众支持度会增加！"
PEO_controlled_financial_market:0 "受监管的有序金融市场"
PEO_controlled_financial_market_desc:0 "金融市场不出所料恢复了稳定，在政府的监管下，金融市场平稳有序运行。"
PEO_miracle_under_land:0 "地层下的奇迹"
PEO_miracle_under_land_desc:0 "新标准允许我们的矿产企业进行更大规模的开采。这虽然不利于环境，但又有什么比工业发展和人民的生活需要更重要的呢？"

PEO_national_emergency_act:0 "皮奥瑞亚共和国紧急状态法"
PEO_national_emergency_act_desc:0 "皮奥瑞亚共和国处于危机当中，政府被议会授权扩大权力以应对危机。社会管控将被强化，联邦和地方警务部门被要求24小时待命，宪法保卫局开始组织进行言论管控。国防军成建制开入各大市镇戒严，政府要求企业和人民囤积战备物资并开始组织防备演练。"

PEO_republic_constitutional_crisis:0 "第三共和国宪政危机"
PEO_republic_constitutional_crisis_desc:0 "人民对政府权力的扩张到了忍无可忍的境地，尽管政府一再宣称紧急状态下公民的政治权利不受侵害。但大城市里无处不在的荷枪实弹的军警单位，以“反共和国行为罪”四处随意抓捕异见者的宪法保卫局特工和随意干预人民自治事务的政府官员使人民想起了第二共和国时期的无限制军管状态。大罢工，大罢市，大罢学使皮奥瑞亚陷入混乱。§R孔斯年无奈地看着街道上四散奔逃的人群，命令士兵向共和国宫开火……§!"

PEO_strong_federal_gov:0 "强势联邦政府"
PEO_strong_federal_gov_desc:0 "当前联邦行政机构处于强势地位，行政机关在国家事务中享有优先地位。"
PEO_parliament_power_expanstion:0 "国民议会权力扩张"
PEO_parliament_power_expanstion_desc:0 "当前国民议会处于强势地位，国家一切行政司法行为都需受到立法机构批准或监督。"
PEO_judiciary_first:0 "司法机构优先处置"
PEO_judiciary_first_desc:0 "当前司法机关处于强势地位，司法机关可以越过一般程序执行法律。"
PEO_military_force_first:0 "国防军优先"

PEO_third_republic_constitution_mid_left:0 "第三共和国宪法—中左派主导"
PEO_third_republic_constitution_mid_left_desc:0 "《1999年皮奥瑞亚共和国宪法》继承《1986年皮奥瑞亚共和国宪法》所确立的三权分立，民主平等，自由博爱原则，同时结合《1993年皮奥瑞亚共和国宪法》的中央权力强化。人民相信这部新宪法一定可以带领共和国走向光明的未来。"

PEO_stabalized_army:0 "共和国国防军——暂时稳定"
PEO_stabalized_army_desc:0 "共和国国防军处于暂时稳定状态，大部分官兵明确宣誓对国家效忠。\n\n§R“总理府的决定并不明智”§!"
PEO_political_reconstructed_army:0 "共和国国防军——政治性重建"
PEO_political_reconstructed_army_desc:0 "新课标颁布后，孔斯年在军队内部掀起来“学共和，讲民主”运动。通过培育官兵共和意识和民主意识，加强国防军广大基层官兵自愿保护民主政府的意识。借此机会，国防部和参谋部处理了一批有反共和倾向军官。但同时，大量的人事调动导致国防军战斗力下降。"
PEO_republican_army:0 "共和国国防军——国家化进程中"
PEO_republican_army_desc:0 "经过整顿，国防军内部的一批反对派和政治不稳定分子被揪了出来。在孔斯年和国防部的紧密配合下，国防军的国家化进程继续深入。"

PEO_defense_force_officer_corps:0 "国防军军官团"

PEO_foreign_service:0 "国防军对外行动署"
PEO_foreign_service_desc:0 "国防军对外行动署由国防部和总统双重领导，对外行动署将负责执行对外干涉行动，支援共和国的民主盟友，只要有人需要我们，我们的军队就会去哪。"

PEO_gov_funded_surveys:0 "公费调查"
PEO_gov_funded_surveys_desc:0 "皮奥瑞亚共和国的专家正在我国进行全面的经济评估和基层调查，尽管我国政府必须承担这一次调查的全部费用，但他们的工作给我国下一步的经济建设带来好处。不过在某些地方官员的报告中，似乎有一组连皮奥瑞亚使团都不知道的专家正在暗地活动。§R“希望他们不会惹出什么乱子”§!"

PEO_peo_permanent_econ_representative:0 "皮奥瑞亚常驻经济代表处"
PEO_peo_permanent_econ_representative_desc:0 "经济调查后皮奥瑞亚共和国的援助更有针对性，同时更注重我国人民的生活。左汀原的乡村正在快速发展，甚至海滨的某些村庄在一位勤劳的皮奥瑞亚工程师的帮助下发展出了小型罐头加工业，这些成就大大改善了我国人民的生活。经过我们和皮奥瑞亚方面协商，皮奥瑞亚外交部同意设立常驻经济代表处来帮助我们。\n\n§R“但是总统阁下，您知道皮奥瑞亚的条件是什么。”§!"

PEO_peo_military_representative:0 "皮奥瑞亚驻左汀原军事代表团"
PEO_peo_military_representative_desc:0 "皮奥瑞亚军事代表团由皮奥瑞亚国防军对外行动署官员和皮奥瑞亚国防军驻左志愿军组成，负责左汀原共和国军队的日常训练和战时协助指挥。新的左汀原军队将全部使用皮式操典和皮式装备，其魔术部队也将换装皮奥瑞亚军用魔法回路。除了不说皮奥瑞亚语，左汀原国防军的一切都将皮奥瑞亚化。\n\n“至少我们还剩下自由……”"

###内阁###
PEO_Suer:0 "苏尔"
PEO_Suer_desc:0 "苏尔曾是皮奥瑞亚国防军的一名中将。在1992年政变中他率领首都防卫部队倒戈，帮助孔斯年完成了不流血的政变。如今他被军政府推上共和国总统的位置，成为了名义上的共和国领袖。"
PEO_Obstin_Jolson:0 "奥博斯丁·约尔逊"
PEO_Obstin_Jolson_desc:0 "如果共和国有什么人可以被称为“经济天才”，那绝对是约尔逊这个“外国人”。作为原联合王国最高学府培养出来的经济学博士，曾出任联合王国经济部长。退休后被共和国议会授予公民权，重新出山。"
PEO_LiHaisheng:0 "李海盛"
PEO_LiHaisheng_desc:0 "外交是一门艺术，李海盛深有体会。在他15年的大使馆武官生涯中，他结识了许多的国内外政要也为孔斯年办了许多的事情。因此他被推举成为军政府外交委员会的掌舵人，为共和国在外交层面打开出路"
PEO_burke_john:0 "伯克·约翰"
PEO_burke_john_desc:0 "出生于工人家庭的伯克在成为军人之后对人民有这超乎寻常的关心，作为革命中第一批倒戈的旧军官他在战后被任命为国防部常务秘书，在1992年政变后成为军政府的国防部长。"
PEO_oberst_chris:0 "奥伯斯特·克里斯"
PEO_oberst_chris_desc:0 "现任军事管理委员会民政委员会主任，曾出任共和国民生事务部长。由于对共和国文官政府的不满，他加入了军管委员会来实现自己的抱负—实现一个人民幸福，国家富强的皮奥瑞亚之梦。"
PEO_eberhardt_ford:0 "埃伯哈特·福德"
PEO_eberhardt_ford_desc:0 "作为军事管理委员会的教育以及科技委员会主席，福德一直致力于实现皮奥瑞亚的社会进步和科技腾飞。自1992年以来，在他的主导下共和国完成了一系列教育改革和科研成果。"
PEO_gilbert_mcWhite:0 "吉尔伯特·麦克怀特"
PEO_kovner_schreiting:0 "科夫纳·思雷汀"
PEO_kovner_schreiting_desc:0 "共和国情报机构的建立者以及共和国中央情报局的首任局长。拥有高超的谍战能力和丰富的谍战经验。"
PEO_ZhangWhenhong:0 "张文宏"
PEO_ZhangWhenhong_desc:0 "前麦库克州政府常务秘书张文宏，科班出身，曾经荣获全国诗歌比赛一等奖。在东巴大战时期，他作为州内剩下为数不多的官员，承担起指挥州国民兵的职责，这时他才发现自己的指挥才能。在第三次麦库克战役时，他因为指挥的国民兵第2防卫旅成功穿插歼灭两个加强团的敌军而名声大噪。战后，他进入国防部担任军职并加入社会党。"
PEO_john_adderley:0 "约翰·艾德礼"
PEO_john_adderley_desc:0 "前联邦财政部总会计师艾德礼在大企业间可谓臭名昭著，每年的税务总稽查时只要被他发现了偷税漏税，轻则缴纳10倍罚款，重则税务警察直接上门。但他总在年初的财政会议上坚持通过税收返还等行动降低普通百姓和中小企业的税收负担。因而在民间和中小企业联合会里，艾德礼有着极高声望。"
PEO_donald_warren:0 "唐纳德·沃伦"
PEO_donald_warren_desc:0 "作为连续7届皮奥瑞亚优秀教师评比特等奖得主，前吉庆市第一中学校长，前吉庆州教育厅副厅长，沃伦一直主张在全国范围内推行“教育社会化”—学习为社会服务。事实也证明了他的正确，吉庆州在改革后成为全国学术和科学研究最发达的地区并一直保持到现在。根据1997年的教育部数据，吉庆州也是在校学生幸福度最高的一个州。"
PEO_SongRen:0 "张林生"
PEO_SongRen_desc:0 "提到卡斯特-轮克特市这座坐落于皮奥瑞亚中央大平原“天使之城”是共和国最大的农业生产基地，人们的脑海里面不会出现大片大片的粮食种植园而是张氏家族领导的莱利农业投资集团。企业家族的出身，导致他常常被党内同僚质疑他对社会主义的忠诚，但是在农业和农民的问题上张林生永远是党内最权威的专家。"
PEO_anna_patrick:0 "安娜·帕特里克"
PEO_anna_patrick_desc:0 "安娜·帕特里克，前优马州总工会副书记，前皮奥瑞亚妇女协会秘书长。在她的身上有两个标签，一个是工人的领袖，一个是妇女的朋友。她时刻为工人和妇女着想，时刻为了工作准备。但是她绝不会忘记了更重要的是共和国任然处于危险。"
PEO_ZhangWu:0 "章武"
PEO_ZhangWu_desc:0 "科班出身，拥有近三十年一线贸易管理工作的前皮奥瑞亚外贸总局局长章武，对对外贸易有他自己的理解。“自由贸易说到底是为了人民过上更好的日子。”在加入社会党后，他又加了一句“也为了促进世界大同。”"
PEO_lee_melrose:0 "李·梅尔罗斯"
PEO_lee_melrose_desc:0 "独立战争后，皮奥瑞亚开始训练职业化空军，李也在此时由皮奥瑞亚航空俱乐部进入国防军任空军第一航空队副队长。东巴大战期间，他创下共和国空军的第一个战绩和最高的击杀记录。战后，李升为上校，出任空军副参谋长。"

###企业###

###将领###
PEO_monk_corleone:0 "蒙克·科莱昂"
PEO_Huang_Xizhong:0 "黄习中"
PEO_Huang_Xizhong_desc:0 "在东巴大战时，黄习中还是个国民兵旅的中校。他很早就开始把麾下的普拉特州第3国民兵旅按照现在的“新军改模式”训练“步兵突击小组”，并用每年的州国民兵定向资金采购了大量冲锋枪和轻机枪。面对奥罗日亚的旧式步兵部队，第三旅往往能在炮火准备后，用两到三个连的兵力突破对方防线并快速清扫战壕。之后，黄习中被提拔为唯一一名共和国特级少将，领导军改。"
PEO_moncrean_lisbon:0 "蒙克里安·里斯本"
PEO_kankanid_sowodnyu:0 "堪坎尼德·索沃德纽"
PEO_kankanid_sowodnyu_desc:0 "尽管国防军内都称堪堪尼德是皮奥瑞亚自伟大的列斯之后第二位掌握列斯海的男人，但现任皮奥瑞亚国防军海军总司令员的他还是喜欢人们称呼他为“鲨鱼”。而东巴大战期间，堪堪尼德敢指挥轻巡洋舰队冲击西莉迪亚共和国海军驻地的事迹也证明了他无愧于这个外号。"

###GUI###

###变量###

###国策###
PEO_clean_up_the_mess:0 "收拾烂摊子"
PEO_clean_up_the_mess_desc:0 "面对共和国现在一团乱的经济和政治局势，孔斯年明白自己不能现在就摔铺盖走人。他必须将共和国这艘巨轮带到一个安全的港口再下船。"
PEO_national_revive_plan:0 "国家复兴计划"
PEO_national_revive_plan_desc:0 "共和国需要一次大的变革来复兴。孔斯年将动员议会和军管委员会的各界人才进行一次大的辩论，以此确定改革重心和政策。当然这次立法的任务任然在军管委员会手上，议会仅仅参与讨论。"
PEO_rebuild_central_bank:0 "重组共和国中央银行"
PEO_rebuild_central_bank_desc:0 "对于下一步的经济改革来说，目前臃肿的央行官僚体制和保守的银行董事会无论如何都不能再持续了。柏维被授权组建新中央银行和重建共和国金融体系。如果顺利，接下来对于外贸的改革会更顺利一些。"
PEO_new_idea_coming_after:0 "§Y民族精神过时后，会添加新的民族精神！§!"
PEO_parliament_party_army:0 "议会，党派与军队"
PEO_parliament_party_army_desc:0 "自政变后，军队的政治实力被极大的加强。尽管目前军队被孔斯年全面的掌控，但是谁又能保证军队会乖乖交权给文官和议会？伯芳舟和柏维都认为军队的去政治化是保卫民主的必要条件，那就把这个事交给议会吧。军队不应该被任何一个党和各人控制，军队属于这个国家的每一个主权者。"
PEO_bring_back_cops:0 "重建联邦警察制度"
PEO_bring_back_cops_desc:0 "共和国在政变前一直采取地方，中央的双轨分权警察制度，之后由于维持稳定的需要，新国家宪法规定了中央集权的共和国警察制度。现在既然要重新建立民主，那这一步必不可少。当然，我们也应该保留部分机构防止极端者上位。"
PEO_deregulation_of_social_speech:0 "放宽社会言论管制"
PEO_deregulation_of_social_speech_desc:0 "皮奥瑞亚即使在原本联合王国时代也是言论最自由的国家。而如今却成为了一个无人问津政治的国家。为了未来的大选和民主化，孔斯年不得不要求军管委员会的言论统废合办公室放松言论管制。"
PEO_authorize_socialist_reform:0 "授权社会党进行议会改革"
PEO_authorize_socialist_reform_desc:0 "社会党将被授权起草一份更适合皮奥瑞亚普通大众的议会方案。这份方案将被运用在之后的共和国选举当中。"
PEO_authorize_republican_reform:0 "授权共和党进行议会改革"
PEO_authorize_republican_reform_desc:0 "现在的议会形式已经足够完善，显然共和党的方案更适合目前的形式，而不是柏维和他的社会党的所谓平民共识化议会政治。"
PEO_form_election_commitee:0 "组建选举委员会"
PEO_form_election_commitee_desc:0 "大选将至，孔斯年将授权现任内阁组建一个政治中立的选举委员会来监督大选的公正性。同时委员会将会审查每一位的代表资格以防止反共和主义者，极端主义者和反革命进入共和国的最高权力机关。"
PEO_splitting_econ_responsibility:0 "拆分共和国经济事务"
PEO_splitting_econ_responsibility_desc:0 "与1996年成立的经济事务部是目前国家经济事务的主要管理和监督部门。由于过度的官僚化，目前经济事务部处于效率极低的状态，为了在经济改革上取得突破，我们的经济学家建议对该部进行拆分。"
PEO_lower_trade_right:0 "下放联邦贸易权"
PEO_lower_trade_right_desc:0 "下放经济权力，让各地可以更好的灵活定制政策，发挥生产积极性。中央将会制定一个长期的政策以确保这份法案可以公平的执行到位。"
PEO_expand_capital_port:0 "扩展首都港口"
PEO_expand_capital_port_desc:0 "对于共和国来说，海外贸易已经是经济运行中不可或缺的一部分。国家有一半以上的GDP增长源自海上贸易的增长，而如今皮奥瑞亚的海港已经有些不堪重负，正好来自西莉迪亚的朋友给我们带来了深水港的建设经验。"
PEO_econ_boost_proj:0 "经济刺激计划"
PEO_econ_boost_proj_desc:0 "要想刺激经济，现在高比例的附加税和直接说就不能再执行了。税务局，商务部和其他几个部门将联合议会讨论一项税收改革法案。"
PEO_bussi_readj_act:0 "商业调整法"
PEO_bussi_readj_act_desc:0 "税收是绝对不能动的，这是政府唯一的收入来源。但是孔斯年却可以将它用在对于企业的投资上面，只要共和国的企业家们一起努力，那么我们的财政会有好转。"
PEO_science_first:0 "科技立国"
PEO_science_first_desc:0 "尽管孔斯年是军人出身，但他了解科学这玩意是政治干涉不了的，所以他选择了尊重科学家们的发展。现在他认识到在这个科技水平日新月异的二十世纪末期，如果国家在科研水平上落后，这对国家的经济还是威望都是个沉重打击。"
PEO_last_goodbye:0 "最后的告别"
PEO_last_goodbye_desc:0 "是时候告别了，孔斯年原本就不属于政治，更讨厌政治，他只是是个爱国者。今晚他将在共和国宫最顶楼的办公室里发表演讲，宣布自己的退休和对共和国未来的希望。而军政府留下的意识形态空白将被其他党派迅速填补。"

#柏维线-一阶段#
PEO_new_flag_arises:0 "新旗帜飘扬"
PEO_new_flag_arises_desc:0 "随着柏维入主共和国宫，皮奥瑞亚第三共和国正式迎来了它的第一位领导人。他站在办公室的大落地窗前思考着这个国家的未来。夕阳渐渐落入绵延近千里的罗克希亚山脉，下班的人潮在共和大街汇聚成一股洪流倾泻而下，柏维手中的香烟逐渐缩短。此时，电话铃响起，他拿起听筒，对面传来社会党议会党团书记的声音：“宪法已经通过表决--§R新旗帜已经飘扬§!”"
PEO_union_address_no_72:0 "第72号国情咨文"
PEO_union_address_no_72_desc:0 "就国情咨文的内容，柏维和内阁成员讨论了很久。这个国家有太多的问题等着解决，而4年的任期能解决的事情有限。共和国母亲被强敌环绕，内部亦充斥危机。如果不能妥善处理，等待共和国母亲可能就是一届短命的政府和堕入黑暗。"
PEO_national_democracy:0 "国民民主主义"
PEO_national_democracy_desc:0 "别看新旗帜派社会党党员在野时口号喊的震天响，但想要在已经进入国家垄断资本主义时期的皮奥瑞亚执政，现实主义的理念必不可少。在国情咨文中“国民民主”被反复提及，尽管这个词被社会党议会党团中的正统派党员斥为修正主义和向资本主义投降，不过柏维想要保住政权，他必须团结皮奥瑞亚的一切阶级--至少现在如此。"
PEO_social_market:0 "社会市场体制"
PEO_social_market_desc:0 "自皮奥瑞亚共和国建立以来，市场经济体制一直被不断改良，到第二共和国时期建成了被学术界称为“国家垄断社会资本主义”。虽然我们是一个社会主义和世联主义的党，但是从国情来看，从当前的体制一步跨入社会主义经济是极其不现实的，而是应该对当前的体制进行改革，建设一个“社会民主市场经济”，在满足社会需求和国民民主的前提下利用市场发展生产力。"
PEO_national_business_forum:0 "全国工商论坛"
PEO_national_business_forum_desc:0 "作为一个社会主义政党，我们不得不回应商业界对我们政府的疑问。如果政府想要实现长久执政，来自商业界的支持必不可少。正好，位于琴怀的“格雷斯-凯勒国际会展中心”刚刚落成，政府可以邀请企业家和工会组织参加一场会议，讨论国家经济问题。"
PEO_peo_first:0 "皮奥瑞亚优先"
PEO_peo_first_desc:0 "历届政府出于宣传“自由”思想的考虑，共和国的外资准入条件和关税壁垒一直维持在较低水准。这有力的刺激了经济发展，但是我国的本土工业也受到了外国商品的冲击。或许是时候改变航向，让我国的工业真正惠及我国人民。"
PEO_stating_free_trade:0 "强调自由贸易"
PEO_stating_free_trade_desc:0 "难道我们要想我们周围的专制主义国家学习？把整个国家封闭起来，让共和国人民不能享受自由贸易带来的丰富商品和富足生活？商务部长在论坛上发出了政府和大部分企业家的心声：“我代表内阁强调一遍，自由贸易是皮奥瑞亚从古到今一直坚持的政策，我们没有理由为了一小部分资产阶级的利益而让人民忍受痛苦。”"
PEO_enact_strict_laws:0 "严格劳动执法"
PEO_enact_strict_laws_desc:0 "那帮资本家真是无法无天了，必须要出重拳。联邦劳动监察部门将向各联邦州政府下发联邦行政令，加强对于劳动违法的处罚力度和监管权限，同时财政部将组织大规模的财税稽查执法。虽然柏维不想学习西莉迪亚公社的同志们一下子让皮奥瑞亚进入社会主义，但是他也绝对不会允许资本家肆意妄为到敢向社会党政府提出“降低劳工福利”这种无耻要求。"
PEO_support_partial_requests:0 "支持部分诉求"
PEO_support_partial_requests_desc:0 "私下，工商部常务次长找到柏维。“总理先生，如果您想让企业家们不对您和您的政府抱有偏见以至于丢失工商业的选票，我个人建议您可以答应下一些不违背原则的条件。”新政府刚刚上台，如果此时与工商届对立绝对不明智。"
PEO_support_partial_requests_tt:0 "§R“总理先生，您要明白工会不会满意您对于工人的背叛。”§!"
PEO_neo_business_law:0 "新工商从业法"
PEO_neo_business_law_desc:0 "论坛结束后的内阁会议上，新《皮奥瑞亚工商从业法》的修改被提上日程。新法将在继承《1995年皮奥瑞亚工商从业法》的同时重新修订“劳动关系调整”，并新增“国家工商业调整范围”。"
PEO_fixed_GPC_establishment:0 "固定宪保局编制"
PEO_fixed_GPC_establishment_desc:0 "宪法保卫局在第二共和国时期被军管委员会快速扩编，现已拥有超过2000名中央联邦特工和超过6000人的联邦驻地特工。尽管这是为了保卫共和国在封建主义和帝国主义中生存的必要手段，但是这也严重影响了人民对国家的信任和自由权的行使。柏维清楚裁撤宪法保卫局并不现实，因而他只能通过内阁行政令固定其编制，限制宪法保卫局的进一步扩张。"
PEO_converse_Kong:0 "对话孔斯年"
PEO_converse_Kong_desc:0 "尽管孔斯年已经退出政坛，但是他仍然担任国防军参谋总长，在军队里有着相当的威望。尽管孔斯年一再表示他会尽力约束国防军的行为并持续推进国家化进程，但是就目前而言国防部并不敢在太岁头上动土，去干涉任何军队事务。也许是时候和孔斯年谈谈国防军的事了，至少要确保他真的站在政府这边。"
PEO_temp_military_fund:0 "临时军事拨款"
PEO_temp_military_fund_desc:0 "共和国笼罩在战争的阴云下，我们没时间去通过长期政策改造国防军。面对总理府要求的短期处理方法，孔斯年建议政府可以通过一次临时的军事拨款暂时稳住国防军的中上层。在会议上，苏尔总统也对此表示赞同：“如果你真的想让国防军成为共和国的守护神，你得让国防军认识到政府不会卸磨杀驴 ”柏维和国防部长点头称是。但是议会会是什么反应？"
PEO_new_defense_politics_curriculum:0 "新国防政治课标"
PEO_new_defense_politics_curriculum_desc:0 "鉴于国防军内部对于民主政治的不理解，孔斯年在国防部扩大会议上建议总理府修改目前实行的《1993年版皮奥瑞亚共和国国防军政治课程标准》，修改后的课标将着力于对于共和主义的理解，对于国家的忠诚和人民立场。“新兵和新的军官将受到真正的共和式教育，理解共和国存在的意义。”苏尔总统以国防部政治处少将处长身份发言道。"
PEO_nations_night_watchman:0 "国家的守夜人"
PEO_nations_night_watchman_desc:0 "尽管议会里各派的斗争激烈，但是大家都有一个共识—军队是角色是民主国家的守夜人。共和国宫自由厅内举行国防军将级军官授衔仪式上，国防部长率议员代表全程观摩并受邀发言。“一支职业化的军队是我们民主事业的保障，是共和国屹立于东巴斯蒂亚的保障。各位是国防军的精锐，我在此代表总理府表示祝贺。”"
PEO_reorganize_high_command:0 "重组国防部高层"
PEO_reorganize_high_command_desc:0 "按照《皮奥瑞亚军事力量法》规定，皮奥瑞亚共和国国防军无论是和平时期还是战争时期都受共和国国防部全面领导，国防军下属各单位均受共和国国防部管理和共和国监察部监督。但是根据孔斯年的情报，国防部高层里面有一批试图图谋不轨的军官，他提醒柏维一定要尽快解决这一问题。"
PEO_limited_diplo_intervention:0 "有限干涉外交"
PEO_limited_diplo_intervention_desc:0 "共和国的外交政策在第二共和国时期基本维持着平稳--基本没有进步。国情咨文当中强调：“我国正处于封建主义和专制主义的包围之中，政府必须援助我们可能的盟友以此保障我国的安全。”《皮奥瑞亚日报》将柏维的主张称之为“有限干涉主义”。"
PEO_additional_missions_to_nke:0 "增派驻左使团"
PEO_additional_missions_to_nke_desc:0 "位于热带的左汀原共和国，物产丰富，风景优美，自大喜王国崩溃后便与我国建立了大使级外交关系，是我国“南方战略”的重要支点。既然南方的桑山翼兔人政权拒绝了我们建立外交关系的请求，那我们只能全面支援左汀原共和国的经济建设和军队建设。外交部拟定将驻左汀原使团从246人提高至532人。"
PEO_oversea_employment:0 "海外就业机会"
PEO_oversea_employment_desc:0 "左汀原共和国刚刚成立，基础设施落后，生活消费品奇缺，属于外交部规定内的极度艰苦区域。如果我们不开出高薪和宽松的工作条件，肯定没有一个大学生或者专业人士愿意去雨林和山地里面受苦受难。"
PEO_deepen_in_heart:0 "深入人心"
PEO_deepen_in_heart_desc:0 "左汀原需要的是公路，是他妈的立竿见影的大型基础设施工程。总理府要的是曝光度，是记者拍的光鲜亮丽的照片。我们的外交人员在左汀原需要做出能被人看见的成绩和与左汀原共和国的民选政府高层搞好关系。至于左汀原的百姓需要什么？愿他们安息。"
PEO_deepen_in_heart_tt:0 "§R“大使先生，这很好，不过我国百姓更想要的是贵国的农业技术……”§!"
PEO_road_to_great_fortune:0 "大吉大利的路"
PEO_road_to_great_fortune_desc:0 "为我们的使团次长路易斯献上祝福。在大吉大利的路易斯的带领下，我们的援助计划在媒体上赚足了眼球，报纸上都是对共和国政府国际主义精神的赞美，尽管有几个三流小报刊登了据说来自我们的驻左使团长麦克怀特在例会上的批评，但这有什么关系？麦克怀特马上就会被调回外交部任礼宾次长。\n\n§R大吉大利的路会做好一切§!"
PEO_diplo_angels:0 "外交天使队"
PEO_diplo_angels_desc:0 "尽管条件艰苦，但我们还是有必要和参与公开招聘的人说清楚左汀原共和国的实际情况。我们需要的是专业的，忠诚的外交人员，不是吃空饷的饭桶。只有有责任心才能在与南方桑山的斗争当中占据上风。"
PEO_what_do_nke_needs:0 "左汀原需要什么"
PEO_what_do_nke_needs_desc:0 "面子工程能解决什么？柏维坚决否决了外交部以“让新闻界看到成果”为目的的援助计划。根据驻左使团发回的电报，总理府将派遣一批由农业专家，职业工程师和调查记者组成的代表团前往左汀原的深山老林里面去了解左汀原的人民到底需要什么。当然，这批专家的费用会由我们的盟友承担。"
PEO_military_professionals:0 "专业军事人员"
PEO_military_professionals_desc:0 "国防军高层对于增派军事人员并没有意见，但是孔斯年在高薪后面增加了一个条件“会当地语言且富有责任心”。“我要求每一个派往左汀原的军事人员都是这样，包括未来可能前往左汀原的高级军官。”孔斯年在国防联席会议上讲。"
PEO_eastern_bastia_free_radio:0 "东巴自由电台"
PEO_eastern_bastia_free_radio_desc:0 "环顾四周，东巴斯蒂亚的大部分人民任然处于专制主义的铁蹄下。如果人民不了解什么是自由，什么是民主和平等，那么被压迫者就永世不得翻身。外交部提议可以借助广播向各专制国家的人民宣传共和主义和共和国对于东巴新秩序的理念，这样就可以加速专制政权的崩溃。内阁会议上，柏维亲自拍板为广播取下名字--“东巴自由电台”。"
PEO_oversea_army_department:0 "国防军对外署"
PEO_oversea_army_department_desc:0 "自1995年战术战略改革开始后，共和国国防军以奥罗日亚陆军和沃姆帝国陆军为假想敌开展演练，训练了一批善于采用战术突击战术的基层军官。宪法保卫局对外行动处判断接下来东巴各国将陷入不同程度的混乱，现在正是通过直接的派兵干预来武装保卫共和国了。"
PEO_enhanced_border_inspections:0 "强化边境检查"
PEO_enhanced_border_inspections_desc:0 "宪法保卫局发给柏维的报告并不乐观，共和国的边境由于处于长期的“低级警备”状态已经成了间谍入侵我国的直接途径。也许是时候在边境搞点动作了，柏维在与国防部和联邦内政部的高层开过会之后更坚定了这个想法。"
PEO_strengthening_nationalism_education:0 "强化民族主义教育"
PEO_strengthening_nationalism_education_desc:0 "尽管皮奥瑞亚共和国的经济发展势头良好，但外部形势严峻。从在奥罗日亚的封建主到西莉迪亚公社那群所谓的共产主义者，再到左汀原叛军背后的虹镜，每一个政权都是皮奥瑞亚母亲行敌人。与其让别人的价值观侵入，我们还是应当加强共和国内部的民族主义教育。\n\n§R我们需要利用这种民族主义情绪团结人民§!"
PEO_second_amendment:0 "宪法第二修正案"
PEO_second_amendment_desc:0 "在外交方面，我国一直坚持中立和不干涉政策，但是这并不能帮助共和国在如此复杂的条件下求得生存。但是现在进行的各类外交行动并没有太多的法律依据，甚至很多都是实打实的黑色行动。所以，我们有必要修改一次宪法。"

###事件###
PEO.1.t:0 "委员会的争吵"
PEO.1.d:0 "“你就这么轻易把政权交给民主派？！你怎么能保证共和国之后的安危！你忘了吗，为了这来之不易的独立，我们付出了多少？我们——”\n\n苏尔拍案而起，对孔斯年吼道，这是他第一次在他的挚友面前发这么大的火。\n那愤怒，那激动，根本不像是已经经历过战争与苦难的战士，反倒像是一个为了义愤而激动的贵族子弟一般，一旁的军管委员会几位委员的脸色也是异常的难看。\n孔斯年身着陆军元帅制服，端坐在会议桌的首席，他心里清楚这些老战友都是为了国家好，但以目前的情况来看军事管理是无论如何也不能持续了。\n\n“克里斯，请你冷静一点……”\n\n“冷静？老子1992年还不是给你忽悠上的贼船！”\n.......\n\n是的没错，当年苏尔确实是被孔斯年用手段忽悠忽悠着就加入政变的，不然就首都卫戍区部队的战斗力，足够让当时孔斯年手上的预备役和步兵师喝一壶的。\n他揉了揉隐隐作痛的太阳穴，不由得在心里感叹，为什么这群军人总是对民主化改革这么敏感呢，难道共和国，不，难道他们理想中的制度不就应该是这样的吗？\n当年不正是为了保卫民主而行动么，而如今军管却压制了民主，事情怎么会如此？\n\n“诸位，我支持主席的想法。”\n突然，一个沉稳的声音打断了苏尔正喋喋不休细数民主派罪恶，完全止不住的势头，为激化的局面打入了一针镇定剂。\n众人转过头去，说话的不是别人，正是伯克·约翰，只见他面对或惊讶或质疑的目光，无所谓般的摊了摊手，继续侃侃而谈道：\n“在这之前，我们应该重新阐明一下最基本的原则，比如……哦，我想，各位应该不会忘了宪法第一句话吧？”\n“皮奥瑞亚共和国是一个民主的社会联邦共和国，任何破坏共和与民主的人将被视为国家的敌人，这是每一位皮奥瑞亚公民都应当铭记的意义。”——《1992年版皮奥瑞亚共和国宪法》\n“你**想说我违宪？我告诉你，伯克！这份宪法签字的时候我＊＊也在场！”"
PEO.1.a:0 "争吵一直到了天明。"
PEO.2.t:0 "大鸣放"
PEO.2.d:0 "细细想来，孔斯年已经很久没到过共和国议会了。\n\n此时的他看着议会广场上的“宪法与平等女神”，不由地想要感慨万千，却看见柏维和伯芳舟已经在议会门口等着他，见到了他的到来，脸上更是露出了善意的笑容，朝着他快步走开，这个举动无疑让这位共和国的舵手有些感动，他与这两位意见代表都握了手，说了些用以共勉的话。\n\n半小时后，孔斯年坐在了听众席的VIP专座上，聆听各个政党的议员对军管委员会提案进行的辩论。\n议员们对于1992年以来的第一次大规模法案辩论充满了热情，在场的所有人都跃跃欲试，希冀以此让自己的提案被采纳。国会助理和秘书也都在为自己的老板跑上跑下，在准备辩论材料的同时也不忘备上一杯清凉的水，而此时，各党党鞭也已经就位，只等8点钟的到来。\n\n东巴时间晚上八点，辩论准时开始。\n作为共和国的总理，柏维先行上台发言，他强调团结广大人民的重要性，以及工业对于共和国经济的助推作用，同时明确批评了目前国内对于劳工政策法案的监管不力，针砭时弊，挑明问题。\n“各位议员们，请你们好好想想，难道工人不是这个国家真正的主人吗！”\n\n演讲结束，柏维获得了所有左派议员的支持和部分共和激进派的呼声，而这些言论也让共和党的大部分议员都摇起了头。\n伯芳舟的发言在柏维面前显得很沉稳，她提起了1989年共和党的经济改革方针，在提高公民福利的同时资助中小型企业发展，提高共和国科研开支，如是种种，旧调重弹。\n演讲结束后，大厅中又是一阵掌声雷动，就连柏维也对提案中增加公民福利的内容感到满意，只有共产党议员和社会党左翼对这份充斥“资产阶级糖衣炮弹”的提案吐口水。\n辩论一直持续到十二点才稍微划上了休止符，在柏维和伯芳舟之后，辩论大多围绕这两份提案为主题展开。\n\n毫无疑问，双方的观点已经成为了在场的两个重要的不同方向。"
PEO.2.a:0 "都各取一点吧。"
PEO.3.t:0 "联席会议"
PEO.3.d:0 "这是军管委员会和议会的第一次联席会议，身为联席会议的坚定反对派，苏尔拉着个脸参与了前半场就愤然退场，虽然没有出声捣乱，却也仍旧让整个会议极度陷入尴尬。幸好，其他几位重要人物依旧让这场联席会议进行到了落幕，不至于让这场会议沦为一纸空谈。\n\首先，是军队的问题。\n民主派不会同意军队组党，这是议会的底线，共产党议员倒是不反对军队退出政治，但要求在军中设置政治委员来确保军队不会倒向极端主义，但这个提案却不被军管委员会和国防部接受，甚至连议会的代表也不同意。\n\n“我还记得南巴斯蒂亚共和革命的时候有个思想家说过，共和国属于主权者。”\n孔斯年扶了下老花镜，平稳且不失威严的说道：\n“同理，军队也一样，共和国的军队不属于任何一个组织和个人，他们属于这个国家的宪法和主权者。”"
PEO.3.a:0 "所有人都鼓起掌。"
PEO.4.t:0 "邻居"
PEO.4.d:0 "克莉丝汀走出家门，迎面碰上了警察。面对那熟悉到了该死的警察制服，她不禁心里一颤，在此刻，她努力而拼命的回想着自己最近的言行，想看看是否有违反规定的行为。\n因为她知道，如果自己不再一分钟之内做点什么，这些隶属于联邦政府的该死的执法人员就会把她带走。\n就在这时，应该是注意到了她的紧张，那位警察打断了克莉丝汀的紧绷着的思绪，出声解释道：\n\n“小姐，请不要紧张，我找您并不是什么要紧的事，啊，做个自我介绍，我是隶属于12号片区的社区警察，塞巴斯蒂安，这次是来熟悉住户的……”\n听闻不是来找自己麻烦的，克莉丝汀稍稍松了口气，随即用疑惑的目光看着面前的这个小伙子，她不知道，什么时候中央政府什么时候有多了这么一个吃皇粮的单位。\n\n“你说你是社区警察？不好意思，那个……请问你是哪个单位的？”\n塞巴斯蒂安摸了摸鼻尖，有些腼腆的说：“不好意思，小姐，我忘记说明我的单位了……这是我的证件。”\n说着，他从自己的腰包里掏出警官证，展示在了克莉丝汀的面前。"
PEO.4.a:0 "“吉列州警察厅？你是州警？”"
PEO.5.t:0 "演讲"
PEO.5.d:0 "各位皮奥瑞亚共和国的公民们，大家晚上好：\n\n我是皮奥瑞亚共和国军事管制委员会主席，兼皮奥瑞亚共和国国防军元帅，孔斯年。今夜我在共和国宫向全国发表告别演讲。这将是我最后一次在全体公民面前发表演讲，希望这次演讲后共和国可走向更好的道路。\n\n回顾共和国建国以来的历史，有过坎坷有过辉煌。自1992年来，军管政府成立，我见证了这六年来共和国的兴衰变革，见证这我们从萧条之中恢复，从一个混乱的国家成为现在人人自由、平等的国家。我很高兴我能看到这些，我只是一个爱国者，不是独裁者。我真心的爱着我的祖国，这也是我1992年发动政变的原因。\n\n如今经济稳中向好，议会大选也即将进行，一切都在恢复正常，这也意味着我的责任尽到了。这个伟大的国家属于所有人，也就是你们。\n\n............\n最后，我希望共和国这艘承载了我们所有人的船可以在未来的航路上保持平稳的航行，让我们为了明天扬帆起航。\n共和国万岁，皮奥瑞亚万岁，人民万岁！这就是我想说的一切。"
PEO.5.a:0 "孔斯年独自一人离开了漆黑的办公室。"
PEO.6.t:0 "企业，工人"
PEO.6.d:0 "“你们在做什么？难道要背叛公司吗，别忘了，要是没有公司，你们都得喝西北风。”\n“我们只是要求我们正当的权利——提升我们工人的待遇，我们也同样为公司做贡献，所以我们也有要求补贴的权利。”\n“如果公司不同意，你们会怎么做？”\n“那我们就罢工，到时候看谁的损失更大些。”\n“那样的话，我们有权利招收新的员工，并且开除那些危害公司利益的蛀虫……”\n“你觉得工会会让你们招到新的员工吗？或者说，就算招到了，你觉得他们可以正常去工作吗？”\n“……”\n“……”\n\n会议室里紧张的气氛让谈判更加艰难，工人和领导们正在进行新一年的工资协商。工会和企业领导层针锋相对，谁都不愿意放弃一分的利益。今年的企业减税计划被预估可以为企业增收2678万共和币的收入，而双方都想让这笔预算到自己的口袋里。\n\n“……其实，我觉得我们还可以谈谈的，在不触及公司根本利益的情况下，我们愿意做出一些让步，你们说呢？”\n“自然，那样最好。”"
PEO.6.a:0 "至少工人和企业还可以对话。"
PEO.7.t:0 "特权"
PEO.7.d:0 "在一年一度的皮奥瑞亚商会上，伯芳舟作为政府代表出席了这次会议，她带着笑容，所有人都期待她能够带来什么好消息，另一部分人更是把她的笑容当做了自己的福音。\n\n“诸位，欢迎各位的到来，在此，我有好消息想和各位宣布——”\n\n在会议上，她兴奋地向企业家们，尤其是中小企业主们宣布了减税的好消息，听闻这个消息后，在宴会上，几乎所有人都举起酒杯，为政府的英明决策干杯，也为了未来可预期的利润而弹冠相庆，讨论起了政府的明智与未来的期许。\n\n这套法案正式颁布之后，企业会赚的更多，相对应的，政府也可以获得更多支持，连人民也有了更多的就业机会，似乎对所有人来说，这都是个不错的消息。\n\n只是，哪怕几乎所有人都在举杯相庆，却总会有一些不合时宜的声音，哪怕是这个皆大欢喜的场面，也不可能完全避免这件事情。\n\n这不，在议会中，一名社会党左翼议员咬着牙，似乎忍受着什么愤怒一般，一言不发的站起来，面色阴沉，放声高呼："
PEO.7.a:0 "“这是特权！”"
PEO.8.t:0 "法院"
PEO.8.d:0 "最高法院门前的广场一大早便塞满各大报社的记者，记者和看热闹的市民组成的人海甚至妨碍了共和国大道的交通，以至于首都公安厅不得不调来部分巡警维护秩序。与门外叽叽喳喳的记者们形成鲜明对比的是最高法院经济金融法庭内的紧张气氛，那里正在进行第二共和国历史上第一次针对金融犯罪的审判。\n\n“刚才公诉人已经很清楚的把证据都列出来了，金融办和检察院的证据现在对你很不利，克劳德先生。”本次审判的审判长兰德·迈尔斯对着坐在被告席的皮奥瑞亚商业银行总裁林德·克劳德说。如果克劳德拿不出新的证据为自己辩护，他将因为“扰乱金融秩序罪一等”和“非法集资罪特等”喜提可能长达18年监禁。\n\n在过去，出于对经济发展的考虑，军管委员会和共和国的金融巨鳄达成了秘密共识——在不破坏社会秩序的情况下，军政府默认金融企业可以不遵守部分法条；金融企业则必须完成军政府为经济发展设定的指标。但是今昔不同往日，孔斯年决定结束军事管制，他必须为即将诞生的第三共和国解决金融市场的乱象。于是，皮奥瑞亚共和国金融工作办公室在金融企业的哀嚎中成立。\n\n尽管雇佣了国家特级法学教授作为辩护律师，但在那些没来得及在武装警察撞开公司大门时销毁的证据前，克劳德选择了认罪并请求法院从轻处理——他显然不能靠感人至深的谎言打动由共和国议会经济发展委员会组成的陪审团对审判结果投下反对票。孔斯年在单向镜后的小房间内观看了整场审判。在看到不可一世的共和国金融巨鳄在法律与平等女神面前低下头忏悔自己的罪行，孔斯年露出难得的微笑。"
PEO.8.a:0 "也许让武警持枪闯入公司违法，但是这有利于国家"
##按时间触发事件
PEO.101.t:"审判"
PEO.101.d:"面对严阵以待的行刑队，看着旁观着他的人山人海，科尔·希克斯想起了自己从军校刚毕业了的那个下午，那时候他们都很年轻，也都充满梦想，尤其是孔斯年——他回想起自己的老同学孔斯年在毕业照上的微笑，叹息自己这么多年来也没有看透这笑容背后的冷酷无情。\n\n平心而论，只是“区区”贪污，嫖娼和结党营私，若是走正常法律程序不可能把他，把战功赫赫的共和国名将科尔送上刑场，顶多只是个革职处分，依旧能有一个还不错的晚年。但可惜，他似乎忘了自己的老同学可不是什么慈悲为怀的人。\n\n在军管委员会司法办公室会议上，孔斯年仅仅用两个字结束了众人的争吵——“死刑”，然后拿起笔记本，随后就面无表情的走出会议室，只留下惊诧万分的众人，他们没有想到，孔斯年对于自己老同学的判决竟会是如此……如此的决绝。科尔没有听清楚不远处的检察官和议会司法委员会对自己的指控罪名，他只听见法槌敲在木台上，从法官的嘴里迸出的有罪判决，陪审团亦是同意了法官的判决，从那一刻起，他的死就已经是板上钉钉的事情了。\n\n长靴落地，子弹上膛，虽然背对着行刑者，但他清楚，自己的一切都结束了，科尔的名字将永载史册，只不过不是儿时梦想的方式罢了。子弹准确无误的射穿他的头颅，失去生命的肉体静静倒在共和国广场冰冷的石地砖上。在处刑结束后，孔斯年背着手走到行刑处，地上，科尔的鲜血早已经被清洗干净，看热闹的群众也不见踪迹。\n\n直到这时，他才摘下军帽，露出了一抹悼念的深色，口中默念起祷告语。"
PEO.101.a:"“.......迷路之人踏上归途”"
PEO.102.t:"共和之夏"
PEO.102.d:"今天，由著名导演李森淼制作的历史题材电影《共和之夏》，在皮奥瑞亚全国影院正式上映。自上映之后，该影片便迅速引发全国范围内的新一轮观影热潮，并随之带动一系列周边产品、历史书籍的销量骤增。\n\n《共和之夏》以1985年--1987年的皮奥瑞亚为背景，讲述了从王国时代末期到共和国初期的革命年代。影片讲述了一个出身卡梅尔贵族家庭的男孩在革命时期的一系列经历，从王国末期的街头政治极化，从王宫里封建贵族们的反动阴谋到共和国初年的劳动重建运动，以至于影片里关于议会的政治新风气皆有细致体现。据导演介绍，本片作为共和国成立12周年献礼，也是其导演生涯的收官大作，制作时采用最新技术，细节也还原历史，力求达到完美。\n\n除此之外，本片音乐也是一大亮点，李森淼导演特邀的音乐制作人克斯·莱利大量应用钢琴以及管风琴作为背景音乐，属皮奥瑞亚电影史首创。另外值得一提的是，影片中的主人公形象几乎完美复刻了一位活生生的孔斯年主席，并且大量参考了他前半生的人生经历。据可靠消息说，孔斯年主席私下里对这部影片评价颇高，并有意将“皮奥瑞亚文化勋章”授予李森淼，这是如今的皮奥瑞亚文化方面的最高奖章。\n\n此外，共和国文化部已批准本片面向国外市场发行。"
PEO.102.a:"革命万岁！共和国万岁！"
PEO.103.t:"例会"
PEO.103.d:"“诸位，欢迎参加这次会议，希望我们可以借此达成一致的意见，那么，就由我来介绍一下今天的议程提案——”\n\n在共和国宫主持议会和内阁联席会议上， 柏维如此侃侃而谈，身为共和国的总理，他在皮奥瑞亚政界也是颇有威望，虽有争执，会议也仍旧稳定的进行下去，直到一份有关司法体制改革的提案被推上了会议桌。\n\n“不行，我不同意这份提案，军政府已经接管够多的司法权力，再集权恐怕着不符合权力制衡的宪法原则吧。再说了我们从联合王国独立，不就是为了实现自由与平等，要是一切都听军政府的，那叫什么民主！”\n\n在看完了这份提案之后，司法部长神情激愤，第一个拍桌而起，就差直接指着柏维的鼻子破口大骂。\n\n面对对方的怒火与质疑，柏维仍旧神色如常，颇有耐心的解释道：\n\n“绍部长，你说的有道理，但也要尊重现实，好好的审视国内情况，皮奥瑞亚自有国情在此……”\n\n一听到柏维的解释，属于共和党秩序派的绍牧之更加气愤了，接着指责道：\n\n“你这家伙，为什么要对军政府的一再妥协！我看你这家伙眼里哪有什么民主，完全就是军政府的傀儡！你还算咱们议会出身的民选总理吗！”\n\n这番话一出，让原本气氛还算和谐的会议变得剑拔弩张起来，参加这次会议的成员也纷纷开始窃窃私语起来，其中不乏一些对于柏维的指责之音。\n\n“绍部长，请你收回你的这番话，我一直都相信我们之所以聚在这里，就是为了能够让我们得之不易的共和国能变得更好，而不是为了喋喋不休的争吵与争执，对于国内的情况如何，我觉得还是由议长来和你交代更为清楚，请您发言吧，伯芳舟女士。”\n\n被柏维点名，伯芳舟自然不能继续旁观，当即就站起身来，笑着调和道：\n\n“我觉得，民主共和自然重要，但也不能否定在1992年后，军政府对于皮奥瑞亚政局的稳定和做出的贡献，我们不能单单的为了反对而反对，既然选择了民主的道路，就要用民主的方式去解决，你们说呢？”\n\n随着伯芳舟的发言，原本还见拔弩张的双方也渐渐平息下来，直到这次会议的结束。"
PEO.103.a:"自由存在分歧"
PEO.104.t:"演讲"
PEO.104.d:"依旧是一场针对经济现状的、普通的议会辩论，在议会长伯芳舟介绍完毕后，各位议员纷纷开始说起了自己的主张，首先起来发言的是共和党秩序派的巴里·金淼：\n\n“我认为，我们现在应该进行自由市场化改革和提高环境保护，但同时不将政府撤出公共事业，以达成市场自由和人民保障的双重目标共同实现……”\n\n伴随着稀稀落落的掌声，巴里·金淼坐下，下一个发言人，社会党纪律委员会主任里克·黑克勒随之站了起来，看着议会的议员们，开始了自己的发言：\n\n“我认为，建立无产阶级专政下的全面民主，建立全面国有化基础下集中性计划经济，主张推动向外输出革命来缓解共和国的外交压力……”\n\n发言结束后，他获得的掌声虽然要比巴里·金淼要来的大些，但终究相差无几。\n\n皮奥瑞亚共产党总书记李芳德最后站了起来，对着众人点头示意之后，开口道：\n\n“他们两位说的都很不错，但除了理念之外，我们还必须考虑我们如今国内的情况，全面放开管制抑或是全面公有化我觉得对于如今的皮奥瑞亚而言，都不是什么最佳的选择，我的主张是，应当将社会主义改造和皮奥瑞亚民主政治传统结合，从而建立分散性的计划经济体制……”\n\n等到他说完后，场上想起了比起之前都要热烈的掌声。\n\n虽然这次的讨论依旧没有得到什么令所有人都满意的结果，但我们相信，那一天终有一日将会到来。"
PEO.104.a:"政治多元化“好处”——孔斯年"
PEO.105.t:"森林兄弟"
PEO.105.d:"根据情报机关传来的线报，根据某个秘密人士提供的消息，在某处森林深处，有着一伙名为【森林兄弟】的保王党的叛军正在酝酿着什么计划，国防军领导人孔斯年在得知了消息后，立刻下令皮奥瑞亚国防军对此进行消杀，在短时间内制定一个极其周密的计划，争取将这伙叛党一网打尽。\n\n可事后我们才知道，虽然已经经历过了多次革命，但我们的军队之中埋藏着不少保王党的钉子，这次突击虽然迅速且高效，但情报还是被传了出去，在我们的战士刚刚进入森林的时候，就受到了森林兄弟极其顽强的阻击，虽说在我们严密的封锁下几乎没有人逃脱，但依旧是在付出重大伤亡后才夺下了此处武装据点。\n\n经过搜查，在此处据点里面放着一封信，信最后的落款是卢桂月，内容是给奥罗日亚王室，希望他们能够给予这伙叛党足够的武装支援，以供他们继续进行叛乱行动，对国内各处重要地点发动恐怖袭击。\n\n在知晓了这件事情之后，共和国政府立刻发文谴责奥罗日亚王室，指责他们对于共和国内政的干涉，并对外宣称保王联盟已经被摧毁。\n\n但是，森林当中时不时响起的枪声，和每个月各处国防军上报的伤亡数字还是在提醒共和国政府，森林兄弟们任然存在。"
PEO.105.a:"他妈的，我不信这群封建余孽不怕坦克"
PEO.106.t:"远洋之心"
PEO.106.d:"加尔比恩透过沾满雨水的舰桥玻璃看向远方阴暗云雾中的太阳，这已经是他不知道多少次在这条航线上掌舵出海了，但这还是他第一次指挥油轮进行远洋航行。\n\n“平等号”是一艘中等体量的成品油轮，长期满载半成品往返于罗克希亚联邦区和远乡的部分南部港口。从某种意义上来说，加尔比恩此时所做的是某种灰色生意。作为航运贸易的长期参与者，他很清楚这些半成品油可以在大部分炼油厂内被转化为可供军用机型使用的航空煤油。因此比起加尔比恩更适应的小型散货轮，这艘具有一定军事意义的液货运载舰的业务的复杂性让他感到了一丝反感。但不论怎么说，现在皮奥瑞亚共和政府还未颁布类似禁令，这样的业务仍然合法且收益相当之高，加尔比恩此时女儿又即将升学，私立高中的学费确实是需要一些努力才能凑齐的。\n\n“船长，今天之前能到达吗？”一个雇佣兵披着黄色雨衣走了进来，他们是这艘船的雇主聘请的护航人员，都带着西莉迪亚口音，大概都是离开此时处于战乱状态的祖国寻找其他营生的逃兵。加尔比恩点了点头做了回应——他不太喜欢这帮人在船上转悠。\n\n很快暴风雨就消散了，明媚的阳光映入舰桥，水淋淋的加班反射着金光。已经可以看到远乡王国的海岸线了，加尔比恩松了一口气，这次的工作算是差不多完成了。\n\n突然伴随着一声巨响，加尔比恩被打向一边，堪堪抓住了舰桥上的护手，佣兵则狠狠地撞在了控制台上，见了血。\n\n油轮此时正在向左做大幅度转弯，左侧轮机组的运行出现了严重故障，他立刻下令轮机舱停机并注意修补破洞以免出现更严重的损坏。\n\n是中了鱼雷吗？或者远乡王国叛乱分子布设的水雷？他快步走向舰尾，途中还指示了几个舰员把甲板上的伤者运进舱内。\n\n当他向下张望时，他看到了几个泡在水里的人影，身边的雇佣兵立刻举起了枪，阿尔比恩则忙把那只填装了独头弹的唧筒霰弹枪压了下去。\n\n下方的人影似乎并不是人，他们都长着长长的蓝色尾巴，看上去像是人和鱼的混种，阿尔比恩听说过这些鱼人，他们似乎在远乡半岛的北部更常见。\n\n很快一张绿色的渔网就从船尾处浮出了水面，刚才事故的原因已经明了了，阿尔比恩摘下帽子，由衷地向这些友好的鱼人挥帽表达敬意，如果没有他们，至少还需要十几个小时才能查明并排除故障。\n\n当阿尔比恩看到远方地平线上的白色灯塔时，他知道这次的行程算是彻底结束了，但比起出发前的忐忑不安，他此时要安心且温暖得多，只要在进行一次这样的业务，女儿的学费也就凑齐了。"
PEO.106.a:"海上才是未来"
PEO.107.t:"晚餐"
PEO.107.d:"孔斯年站在门口，像是重要会议前似的调整了一下情绪，松了松自己的领子，拎起那份在议会厅外边商业街买的蛋糕走进了自己的家门。\n\n	他家住的宅邸在革命前是属于某个帝国贵族的别院，装潢相当考究，坐落于河边，视野良好。新古典主义的圆窗外面就是清幽的希腊风格小院和沿江公园，曾经只允许贵族乘凉吟诗的凉亭和喷泉旁现在已经被市民占满了，刚刚放学的学生穿着校服在公园中追跑着，今天是这个月的第二个周日，学生可以回家休息一个晚上。\n\n	妻子已经把汤和烤鸡摆在桌子上了，还有一份沙拉，孔斯年把蛋糕放在桌子上，对妻子问询的眼神点了点头。\n\n	不消十分钟，推门的声音就已经响起了，孔萋思提着书包走了进来，穿着一身第四女高的校服，深棕色的刘海分向两旁，在脑后结成一个髻。\n\n	孔斯年的女儿将一张纸面无表情地递了过来，把书包靠在长桌另一端的桌腿上。孔斯年的笑容一僵，扫了几眼纸张，这是她的成绩单，月考和几次小考都算及格，但分数不太高。\n\n	“这不挺好的嘛。”孔斯年笑了一下，“妈妈给你烤了鸡，爸爸给你带了你以前最爱吃的蛋糕。”\n\n	孔萋思看了此时围着围裙的母亲，抿紧的嘴唇稍稍弯了一下。她的母亲把最后一道菜端上了桌。\n\n	“尝尝我的手艺吧。”妻子给他倒了一杯红酒，孔斯年拿起了刀叉。\n\n	餐桌上很安静，孔斯年几次想要说话都咽了回去，他看着他给女儿切了一小块的奶油蛋糕，她只吃了几口。自己还是太忙了，一年也见不到几次，孩子心里有怨气是正常的，想到这他暗暗叹了口气。\n\n	“现在是新时代了，共和政府已经不讲究血脉了，”孔斯年最后还是憋不住了“你只要好好读书就肯定能做你想做的事情。”\n\n	“现在国家确实是兴旺发达了。”妻子赶紧补了一句。\n\n	“然后升官发财吗？”孔萋思用餐刀划拉着盘子里的肉。孔斯年正在咀嚼的嘴一僵，片刻后又好像什么都没发生似的动了起来。\n\n	“爸，维伦广场之前发生了什么事？”孔萋思低头看着餐盘。\n\n	“什么维伦广场。”\n\n	“还有博温镇。”孔萋思看见了父亲的手捏紧了餐巾。\n\n	“你都听了谁的胡说……”\n\n	“我听了什么用不着你管，爸爸！资产阶级政府难道能把这些事情都藏起来吗？人民是有记忆的！他们只要做了一次就能做第二次！”\n\n	“很多事情比你想得要复杂得多！”\n\n	“就算您假装这些事情没发生，那些指使您的政客也会记住这些事情吧，迟早有一天他们苦苦涂抹的太平景象被打破，您到时候又要怎么办呢？对于他们来说不管您做什么都是错的，我听说您的士兵对您的评价都很高，为什么不听听他们的想法呢？”\n\n	“你不要再听那些宣传了！”孔斯年怒不可遏地吼道，有人抓住了他的袖子，他转头就看到了妻子紧拧的眉毛。\n\n	孔斯年低下头来，安静的吃着，好像刚才那场对话根本没发生过，但他的心中已经有了打算，现在的情形就连自己的女儿都能品出来，自己最好还是在那些党派领袖的耐心消耗完之前离开这个是非之地为妙。\n\n也许买一座种植园会是不错的选择。"
PEO.107.a:"钢铁之心亦有柔情"
PEO.108.t:"圣辰节"
PEO.108.d:"酒杯碰撞发出悦耳的轻响，身着考究正装的客人们在舞厅中婉转地游走着，时不时在水晶吊灯和红色地毯上发生一些黏合与脱离。大部分人说着，少部分人笑，亦有一部分人紧张地擦着汗。\n\n皮奥瑞亚共产党总书记轻轻地抿着酒，他把所有的应付工作都交给了组织部部长，而他则再这聚会的一角静静观察着这些身份尊贵的与会者，思考着明年的政策和春季农会活动的问题。他注意到孔斯年今晚没到，看来他已经想好了自己大概的退路了。李芳德的嘴角弯了弯，只要能解决军队的问题，他相信剩下的部分大概也会迎刃而解的。\n\n外交部长在和几个受到邀请的外国宾客正在交谈，部长先生频繁地点着头，夸张地笑着，目前皮奥瑞亚的国际局势相当堪忧，将尽量多的邻国从奥罗日亚那边在争取过来是一个相当困难的过程。西莉迪亚公社没有派出他们的代表，想来他们现在也没什么热情参与这种和宗教相关的晚会。社会党正统派的里克正在和绍牧之谈笑风生，这二人似乎在议会里没有这么融洽。李芳德再次抿了一口酒，党内的激进派很希望在明年实现夺权，似乎国际上的情况让有些人开始头脑发热了。他轻轻叹了口气，很多政治平衡并不是那么好把握。\n\n“又是一年的圣辰节，在这个特殊的日子里，我们一同……” 柏维和伯芳舟一同踏上了舞台，晚会的重头戏开始了。\n里克说的一些话是对的，孔斯年还未明确表态，而争取军队已经迫在眉睫了，李芳德深深吸了一口烟，将其缓缓吐出。奥罗日亚军队方面的情报已经表明了某些事情已经迫在眉睫——或者说正在发生，在这种情况下是否还要保持森林兄弟内部的暗线成为了一个问题。\n\n柏维和伯芳舟正在台上倾情和唱着《人民与革命》，旧日革命的得胜者正在高举酒杯欢庆他们的胜利。\n\n李芳德将那根烟狠狠地摁灭在烟灰缸里，新的一年到来了。"
PEO.108.a:"难忘今宵"
PEO.109.t:0 "工厂，工人和他们美好的未来"
PEO.109.d:0 "“老魏，新年好啊！”老家在北边的小伙向魏国政问了个好，把自己的东西锁进了更衣室的钢柜。\n\n魏国政答应了一句，圣辰节过完了，又要上班了。不过比起从前，至少现在节假日规范化了，到了日子就得放假，加班得付3倍以上的工资，比起以前在回家奔个丧，都得跪着求着老板不扣完一个月薪水的日子，可算是天上地下了。\n\n他在水龙头地下搓着沾满油污的双手，听说昨天隔壁厂房钢包漏了，死了两个人，厂房整整赔了60多万，这在过去可是想都不敢想的。搁几年前那个被起重机砸死的，老板赔了个棺材钱都能说时仁义。现在可是大不一样了，革命政府出台了很多法令，工时缩减了，有了最低工资，工伤赔付等也有了保障，之前那些只要搭上贵族的线就能说一不二的老板们也不得不在革命政府的稽查人员面前低头。\n\n魏国政背着运动包从小门离开了工厂，几个孩子正在煤堆上打闹嬉戏。不远处则是几个穿着保安服装的小青年正站在篷布下的阴影里看着下班的工人。魏国政压了压帽沿，向不远处站在街角的安全督察点头致意。现在军管紧急状态结束了，很多旧规矩也在慢慢恢复，包括厂房雇佣的退役兵痞和混混，他听说前不久有领导过罢工的工人在回家的路上被捅了20多刀，看来接下来还是有必要和工委那边商量商量恢复纠察队的事了。\n\n在夕阳下，魏国政混入皮奥瑞亚熙熙攘攘的人流，酒吧和小餐馆的霓虹灯映照着电车和坐在墙根下的乞丐，嘈杂的音乐声夹杂着叫卖和喊叫，军管结束了，商业已经繁荣了起来。"
PEO.109.a:0 "混乱亦有序"

PEO.150.t:0 "《1999年皮奥瑞亚议会选举》"
PEO.150.d:0 "伴随着军事戒严令的取消和共和国民主的重建，皮奥瑞亚第三共和国在全国一片喜气洋洋的氛围中建立起来。第二共和国时期严格的政党活动禁令和言论统废合政策被扫进历史的垃圾堆，同时各州政府也自发组织起各式庆祝活动。\n\n当然共和国重建后的头等大事还是重新组织议会选举。与上一届1992年选举不同，本次选举引入了由共和国社会科学院推荐的比例代表制和双重选举制度大大提高了议员的代表性，同时也意味着议员可以更好的在议会中行使议员权限。\n\n本次选举由共和党领衔的“共和民主联盟”和社会党领衔的“左翼民主阵线”领跑，但根据民调双方都不会占据本届议会的三分之二决定性多数。同时，新兴右翼政党皮奥瑞亚民族共和党也宣布参选（尽管国家宪法保卫局已经对民共党的煽动性演讲提出警告）。\n\n2月7日，首轮选举在国家选举委员会的监督下开始。各地满20周岁的有选举权公民陆陆续续于当日上午十点进入居住地区政府指定投票地点投票。9日复选开始，并于当日22点停止计票。根据共和国选举委员会统计本次选举的票数总计1478万张，有效票数1477.8万张，投票率高于宪法规定。同时，大量居住在国外的皮奥瑞亚公民前往了共和国驻外领事馆参与投票。在当日23点召开的记者会上，共和国选举时期看守政府发言人表示这是一次“民主的胜利”。\n\n次日选举结果公布。"
PEO.150.a:0 "“左翼民主阵线”在人民的支持下获得多数席位！"
PEO.150.b:0 "人民在自由和民主的呼声中选择了“共和民主联盟”！"

PEO.151.t:0 "《社会党第十七届党代会》"
PEO.151.d:0 "唱完党歌，社会党4年一度的党代表便在掌声中正式召开。今年的党代会选在了风景宜人的海滨城市吉庆召开，代表们不禁感叹起中央党部这次的大方，毕竟以前打着亲民旗号的社会党党代会不是在内陆某个小城召开就是在首都歌剧院组场地开。不过很快，代表们便感受到了与窗外热热闹闹的“新春节”截然不同的气氛。\n\n会场在柏维和黑克勒上台发言后便立刻沉寂下来，只剩下个别党代表的窃窃私语，即使是分组讨论时也不例外。每个代表心里都清楚这次党代会的份量，在经历几年的混乱后，人民可再不能容忍一个孔斯年，更不会容忍一个不能带领共和国走出困局的民选领导人。\n\n党内正统派和新旗帜派的内斗已经公开化，尽管双方都承诺不管谁当选都会给对方派系留出三分之一的内阁席位，但没有人会主动放弃执掌共和国最高权力的机会。柏维的改革主张在年轻党员和党外颇受欢迎，甚至有部分企业家公开支持社会党新旗帜派候选人参选议员；黑克勒则受到老党员，共产党和大量左翼人士支持。双方的潜在支持者规模都让选举总书记人选变得难上加难。\n\n“我还是要强调一遍，皮奥瑞亚不可能快速进入世联主义，希望同志们记住。我们只能用循序渐进的方法来实现党的最高纲领，这是现实的道路也是皮奥瑞亚人民最希望的道路”柏维在下午的代表团讨论中这样描述自己的想法；黑克勒则在夜里的“工会代表组会”里面继续发挥自己作为曾经的工会演说家的能力，逐条陈述自己的伟大构想。“有的同志总觉得世联主义不能实现，打出新旗帜。非要说社会党代表全民利益！社会党从来不是全民党，他永远都只会是劳动阶级的党！。”\n\n第二天下午投票正式开始，代表们逐一走进秘密投票室。随着大会主席团结束对选票的清点，选举结果也明朗起来。投标结束37分钟后，大会主席高声宣布投票结果。"
PEO.151.a:0 "里克·黑克勒的正统观点在党内大获全胜"
PEO.151.b:0 "柏维的变革之风吹遍了整个社会党"

PEO.152.t:0 "《共和党十八届四中全会》"
PEO.152.d:0 "    这届四中全会的气氛相当轻松，甚至平时开小会都吵的鸡飞狗跳的几个中央常务委员都换了副嘴脸，在会议上开起玩笑。毕竟共和党赢了选举，终于结束了共和国自建国以来左派长期把持政权的时代。\n\n伯芳舟的兴奋自然溢于言表，而巴里今天也放下了扑克脸和别人聊天。“好了，诸位女士先生们，先开会吧。开完会，亲爱的克劳德先生在奥赛酒店为我们准备了晚餐，有这个月的特别餐品—吉庆双鱼炖和优马一品锅。”会议主席笑着说。大家笑了笑然后在鼓掌后安静下来听取会议议程，当然没有人会在乎什么“纪念周活动”之类的活动安排，大家只在乎这次的总理提名。\n\n巴里率先打破沉默，他看向伯芳舟笑着说：“我这种老年人就不和年轻人争了，我做我的议员就够了。”伯芳舟则回以相同的微笑，她拿出自己的“自由青年徽章”向在座的中委们展示：“我离强制退出自由青年队还有1年的时间，巴里先生的稳重很受我国偏向保守的人士喜欢 。我认为巴里先生无疑更适合代表我党成为共和国总理。”会议就在伯芳舟和巴里.金淼的互相”推让”中度过了两个小时，两人都逐渐有些疲倦却没有丝毫停下的意思。坐在伯芳舟旁边的中委会秘书长里尔.柯林斯突然拍案而起，尽管主席让他坐下但正在争吵的两人都同时闭上嘴，将目光移向“老好人”里尔准备听听他有什么独特方式解决当下的问题。\n\n“我说啊，各位女士们先生们，我们为什么不直接开始投票？伯女士和巴里先生的政策大家又不是不知道。再说，我想除了我之外诸位中委大抵是早就选好边站好了队，早点投票对谁都好，尤其是那些想要赶快去豪华餐厅吃饭的人。你说是不是啊，主席先生？”柯林斯说完便坐下继续在笔记本上算后天要缴纳的税款—他要赶在阳春节前把今年的退税拿到。在座的中委们愣了一下紧接着相视一笑，主席也支持柯林斯的想法，投票程序也就顺理成章开始了。\n\n不出意外，双方平票。于是决定权落到还没投票的柯林斯头上。“每次一到开会投票都是这样。”柯林斯骂着在选票上写下自己的名字交给主席。主席打开选票看了一眼，随后大声说出当选人的名字。"
PEO.152.a:0 "理想主义者伯芳舟最终获得了实践的机会"
PEO.152.b:0 "保守与进步的完美结合将巴里送入共和国宫"

PEO.200.t:0 "国情咨文"
PEO.200.d:0 "柏维舔了舔嘴唇，虽然不是第一次以总理身份在国民议会发表演讲，但这是他第一次发表自己的执政性纲领。他从左到右审视了一遍国民议会的所有275名议员和站在旁听台上的近600名公民，他看到了赞许，支持，也有鄙夷。柏维深吸一口气向所有人鞠躬。\n\n“皮奥瑞亚共和国的诸位公民们，很荣幸作为皮奥瑞亚共和国联邦总理向诸位发表由我和内阁诸位同僚的智慧组成的这份国情咨文”柏维郑重的讲述“皮奥瑞亚是是个伟大的国家，即使是经历了这么多的艰难困苦，经历了寒冬，还是等来了春天。我今天出门的时候看见大街两边梅花都开了，我想冬天应该不会再来了。”\n\n议会大厅里的众人笑了笑，然后快速恢复平静。“我们的国家，我们的民族当然是伟大的。但我们国家还是有着许多的问题行，可能有人想问我军队的事情。这个问题我等会会请这方面的权威--苏尔总统先生为大家回答，我就不献丑了。我在这里想讲的是民生，是经济，是外交……”\n\n“在民生和经济方面，昨天有位坐在国民议会中间偏右一点的先生找了我，说：‘总理啊，按照你们左派搞经济，政府把经济管死了，企业家没活路了。’”金淼虎躯一震。“我是这么讲的，我搞的是社会市场，是民主经济体制，是国民民主而不是哪一个阶级单独的民主。大家都知道我是个左派，但是不知道左派是务实的。社会市场和民主经济是一体的，政府管的死了，生产力发展不了，对人民和国家都不好…。”国民议会里想起阵阵掌声。\n\n“外交方面，我还是要强调干涉主义。中立的政策是持续不下去的。我和外交部长还有我们的宪法保卫局局长了解过，共和国必须开始主动将我们周围的领居改造成共和国的朋友而不是坐在这里等着各国民主派自己起来反抗专制政府。”议长伯芳舟带头鼓起掌来，共和党团议会主席巴里·金淼也点头表示认可。\n\n最后柏维做了简单的总结“总而言之，我们要实施国民民主主义和干涉主义。”全场顿时掌声雷动。所有人高喊“共和国万岁！人民万岁！革命万岁！”"
PEO.200.a:0 "共和国的新黎明"

PEO.201.t:0 "风景独好"
PEO.201.d:0 "尽管水温还不能游泳，但共和港浴场作为皮奥瑞亚海岸线上最美丽海滨浴场还是吸引了不少游客前来旅游。蔚蓝的海水和金黄色的沙滩让在共和港金鹰展览馆召开的工商论坛气氛显得十分轻松。工商联合会的会员们很满意政府的安排，毕竟吉庆和卡梅尔的高楼大厦实在是看的压抑。\n\n张天耀摇晃着酒杯，和几个企业家聚在一块聊天，时不时发出爽朗的笑声。“这世道还是没有变啊，哈哈哈，就是这社会党上台还是依着我们啊。”皮奥瑞亚RANA食品集团的总经理笑着说，“不过这次论坛档次这么高，酒用的都是南巴斯帝亚的高档进口葡萄酒。”张天耀笑了笑，应和道：“我说林经理，你们公司还真是共和功臣，要不是你们的食品供应，国防军反推不了那么快。”“哈哈哈哈…………”\n\n几人大笑着，突然听见侍者大声向全场通报“皮奥瑞亚共和国联邦政府代表团，到！”在远处的闪光灯和近处的政府官员簇拥下，柏维身着整套礼服步入场馆，全场鼓掌欢迎。张天耀和旁边的人打了声招呼就去欢迎柏维总理，但是柏维提前快步上前拉住张天耀的手“张董事长大驾光临，政府很荣幸啊。”柏维的妹妹柏洁也上前和张天耀打招呼：“张董事长，您好。我是柏总理的妹妹，我之前在民众银行实习过。”张天耀笑着向柏氏兄妹回礼。\n\n柏洁打了招呼就去找她的伯芳舟姐姐玩了，柏维和张天耀两人单独走到天台聊天。柏维深吸了一口共和港特有的混合着海盐和淡淡水果味的空气，感到浑身轻松。“还真是风景独好啊，您看，共和国内除了这也没有这种景色了。”柏维打趣道。“恐怕整个东巴斯蒂亚也没这种地方了，西莉迪亚公社的海滩还可以，就是海有点红了。”张天耀没有看柏维，而是抿了口酒，淡淡的说。"
PEO.201.a:0 "风景独好"

PEO.202.t:0 "孔斯年的坚持"
PEO.202.d:0 "尽管孔斯年仍然身居高位，但柏维第一次来到国防军总参谋长的办公室还是被里面出乎意料的俭朴震惊到了。除了按照办公标准配置的实木办公套件和一面由上好的面料编织成的共和国国旗，堂堂皮奥瑞亚国防军二号人物竟再没有一件看上去超过200共和币的办公用品。\n\n柏维坐在办公桌前的标准行政用椅上，孔斯年在桌后鞠躬抱歉：“实在不好意思，这是我办公室最好的椅子了，您要是提前打个招呼我就安排秘书从小会议室搬个舒服点的软座了。”柏维没讲什么，对孔斯年的抱歉打了个哈哈就过去了，他不想被这些烦杂的小事拖时间。今天他来和孔斯年讨论国防军改革的问题。\n\n“孔先生，我今天带国防部长来是为了征求您对国防军改革的意见。”柏维瞥了眼站在身旁的防长，“我原本想去苏尔总统那先谈谈，结果苏尔总统今天去西吉列州视察了。他给我拍了封电报叫我找他老上司，我想应该就是您。”孔斯年品了口茶，然后慢慢的说：“总理先生，我是个纯粹的军人但同时我也有家人，也有朋友。我老来得女，女儿今年高三，准备考卡梅尔联邦大学。”\n\n柏维愣了一下，接着向国防部长投去求助的目光，而国防部长则回以相同的眼神，两人面面相觑。孔斯年像看自己女儿一样看着他们，不由得叹了口气解释道：“总理先生，部长先生，我说的明白一些，我可以服从您的一切改革方案，但是必须是可行且平稳的。我正好也想动动国防军烂进根子的体制，但如果您的改革使社会再次混乱，我对宪法第78条持保留意见，尤其是如果像我女儿这样的高中生都没有平静的日子过的时候。”"
PEO.202.a:0 "事已至此，等苏尔回来一起开会吧。"

PEO.203.t:0 "共和国宫的晚宴"
PEO.203.d:0 "伴随着室内乐队演奏的轻松的乐曲，在共和国宫松竹厅举行的晚宴正式开始。由皮奥瑞亚国宾馆最优秀的厨师团队烹饪的一道道佳肴被端上餐桌，热气腾腾的菜肴让参与的嘉宾们胃口大开。\n\n柏维和妹妹挨桌向宾客们敬酒，很快就逛到了最后一桌。那一桌是社会党议会党团纪委书记黑克勒和党团内部正统派的议员，很显然柏维在那一桌不可能靠客套话混过去，但他还是调整了一下心情，赔着笑脸端着酒杯过去敬酒。\n\n没等他说祝酒词，黑克勒先站起来“邀功”：“柏总理，您看我们这帮老古董没有在议会阻碍您的法案对吧。”柏维不知可否的笑了笑，点点头应和着黑克勒。柏洁看哥哥有些下不来台便凑过来给柏维解围：“里克先生，我是柏洁，我以前在联邦大学读本科的时候听过您讲的课。”里克的目光从柏维身上移向柏洁，他想起这个上课时候敢当堂和十几个同学辩论的小姑娘：“小洁，你还是像十几年那样有行动力，和你哥哥一样。”\n\n“里克先生，我希望您可以理解我哥哥。他和您一样都是真正的社会主义者。”柏洁笑着向黑克勒和其他几位议员敬酒，“他也是妥协而已，我记得您在讲‘世联主义的未来’的时候，您说适当的妥协是一个革命家必须要学会的事情。”"
PEO.203.a:0 "面对自己学生的反驳，黑克勒一时间没话说"

PEO.204.t:0 "破门而入"
PEO.204.d:0 "早上六点，当普罗维登斯州罗得市的居民们拉起窗帘准备迎接新的一天时，映入眼帘的不是早起的邻居或者鸟语花香，而是大批州警和州国民兵，如果是住在赛西街区附近的居民还能看到国防军正在包围一幢别墅。\n\n“里面的人听着你已经被包围了，放下武器…”\n\n前皮奥瑞亚共和国国防军总装备局中将局长菲利普斯正在别墅里做最后的抵抗，他早就知道“老头子”会动他手，但是正如1968年菲利普斯在皮奥瑞亚皇家军校上学时老师教的那句话——“军人要战斗到最后一刻，特别是关乎荣誉的时候。”\n\n菲利普斯躲在大理石吧台后面，通过卧室落地窗观察着外面的情况，手上端着的97式狙击步枪已经被手汗打湿。“玛德，抓我一个人居然出动了一个突击连。”他不禁笑起来，看来孔斯年对他的影响力还是颇为忌惮，生怕别墅里面藏着死士。时间一分一秒的过去，时针指向九点。透过狙击步枪的瞄准镜，菲利普斯终于看到了两个熟悉的身影—孔斯年和苏尔。他们两个正无畏的朝自己的别墅正门走来，身边再无他人。正门处视野开阔，只有一个花坛可以隐藏，如果菲利普斯现在开枪也至少可以拉其中一个一起下地狱。但他没有这么做。\n\n“菲利普斯，我是苏尔，你要是想开门的话，我和老头子愿意进去和你聊聊。”苏尔通过门口的传呼机向菲利普斯喊话，“当然，你想开枪我也无所谓。别觉得我现在是共和国总统就丢了军人血性。我告诉你，老头子和我当兵时候你还在军校呢！。”\n\n“苏尔，你明明不支持民主化和自由化，为什么现在还在做共和国总统？”\n\n“你喜欢秩序，觉得军队管制下的共和国更安静。对，没错，我之前也这么认为。”苏尔坦诚的说“但是，我不认为这是我可以违反军人义务的理由，我服务的对象是国家，是人民，不是只有军事管制委员会。”\n\n“那为什么要至我于如此地步？”菲利普斯不甘的喊道。\n\n“你贪污公款，在国防军里拉帮结派光这两条我就可以把你送到法庭上判个无期徒刑。更不用说你私下勾结保皇党，极端民族主义者了。投降吧，菲利普斯。这是我作为你的老师给你的最后建议。”孔斯年慢悠悠的讲到，“我希望你没忘记我在军校里面教的最后一课叫底线。你现在出来的话，共和国法院愿意轻判。”\n\n对面鸦雀无声，十分钟后只听见屋内传来一声枪响，一队国防军破门而入。"
PEO.204.a:0 "希望这是最后一个了"

PEO.205.t:0 "自由贸易？"
PEO.205.d:0 "连续两周的酒会和一堆不痛不痒的小会议给这次工商论坛营造了良好的氛围，就连皮奥瑞亚工商联合会长马尔科·埃蒙斯和总工会书记得斯坦都在一块有说有笑起来。直到今天的贸易论坛。\n\n在皮奥瑞亚航运公司总经理德雷克的暖场下，海上贸易管理局局长兰·德尔上台第一个发言。德尔发言中规中矩，没有触碰任何在会前由共和国宫办公室送来的“雷区话题名单”上的话题，但又在暗中点了几个涉嫌逃避关税的企业的名字。德尔走下演讲台后轮到皮奥瑞亚RRW农业集团总裁金立华发言，她看了下台下的皮奥瑞亚政商界要员们然后开始自己充满争议的发言。\n\n“诸位知道，我们集团是主要做农产品的。可能工业界的诸位不觉得关税有多高，但这15％的关税对我国的农民和农业公司来说，足够压垮他们了。”坐在会议室后面的中小农业企业代表和农会代表点头表示赞同，得到鼓励的金立华继续说“就去年，RRW光关税就交了近6千万共和币，而集团的最终利润才2亿。其他农业公司也差不多，所有…”\n\n“他妈的，姓金的。你想说什么？”以臭脾气著名的琴怀熊猫电子工业集团董事长站起来指着金立华骂到，坐在他旁边的卡梅尔科技公司总裁被吓了一跳，“你说你交的税多？我熊猫电子每年要交1亿多关税，我说什么了？而且降低了关税，你怎么让共和国的工业发展？南巴那边的工业产品迟早得占领共和国。”\n\n“柯董事长，我只是为农民兄弟们说句话…”\n\n“你想赚钱就赚钱，那我他妈的还为共和国近700万产业工人说话啊！”\n\n……\n\n最后还是联邦工商部常务次长上去和稀泥才结束了这次争吵。柏维在会后召开了紧急内阁会议。"
PEO.205.a:0 "降低些关税有好处"
PEO.205.b:0 "关税是保护我国工业的必要措施"

PEO.206.t:0 "愁坐忧城"
PEO.206.d:0 "自论坛进入第三周后，由于提前到来的夏季东南季风，共和港一直被阴雨笼罩。蔚蓝的海洋化作奔腾的海浪不断冲向防护堤发出阵阵怒吼。幸而金鹰展览馆离海岸还有一段距离，让皮奥瑞亚的政商要人们不会受到海浪的干扰。\n\n论坛到了最后一周，柏维后悔为什么把“劳工论坛”的时间排在最后。阴沉的天气并不利于任何人进行正常的语言交流—早上的会上，总工会和劳工联合会吵路线，总工会和企业吵待遇，劳工联合会和政府吵放权……他妈的，这群人真是没事找事。\n\n“总理先生，总的来说劳工组织方面肯定抱有过大的期望，因为我们是个左翼政府。”联邦劳工署主任耸肩表示无可奈何，“而且您在竞选的时候承诺了加大劳工保护。”柏维叹口气点头。共产党籍的联邦商务部副部长摇头：“企业那是个大麻烦，资本家虽然不是好人但目前还是政府需要团结的对象，在维持市场经济的情况下想发展经济离不开他们的支持。”柏维现在恨不得找个墙一头撞死在上面，会议室陷入一片寂静。\n\n受邀参会的国民议会议长伯芳舟先打破了沉默：“总理先生，还请您尽快决定吧。拖下去对谁都不好。”柏维思考了一下，站起身宣布自己的决定。"
PEO.206.a:0 "支持企业诉求"
PEO.206.b:0 "不能愧对工人兄弟们"

PEO.207.t:0 "名单"
PEO.207.d:0 "本人，皮奥瑞亚共和国内阁总理柏维，受本届皮奥瑞亚共和国国民议会委托和现任皮奥瑞亚共和国总统克里斯·苏尔授权，兹委任以下人员组成本届皮奥瑞亚共和国中央政府。现以宪法授权之职责向全社会公布本届皮奥瑞亚共和国中央政府组成人员名单。\n\n常务副总理：里克·黑克勒\n副总理：李芳德\n副总理：埃里克·克劳德\n联邦外交部长：兰德·斯派克\n联邦国防部长：张文宏\n联邦财政部长：约翰·艾德礼\n联邦工商部长：艾琳·克劳斯\n联邦商务部长：克里斯·帕里\n联邦信息部长：暂不认命，由该部常务次长伯纳德·哈特主持工作\n联邦内务部长：理查德·艾伦\n联邦司法部长：王子季\n联邦卫生部长：皮特·朱莉娅\n联邦教育和科学部长：唐纳德·沃伦\n联邦劳工和社会保障部长：安娜·帕特里克\n联邦农业林业部长：张林生\n联邦发展与改革委员会主任委员：章武\n联邦交通部长：希尔斯·苏林\n联邦中央银行行长：罗莎·迈尔斯\n\n………\n\n另认命以下军事人员：\n皮奥瑞亚共和国国防军总参谋长：孔斯年\n皮奥瑞亚共和国国防军陆军司令员：黄习中\n皮奥瑞亚共和国国防军海军司令员：堪堪尼德·索沃德纽\n皮奥瑞亚共和国国防军空军司令员：李·梅尔罗斯\n皮奥瑞亚共和国国防指挥学校校长兼校政治处主任：约翰·伯克"
PEO.207.a:0 "皮奥瑞亚共和国总理 柏维"

PEO.250.t:0 "左汀原的蓝星条旗"
PEO.250.d:0 "左汀原，原大喜王国。现在是皮奥瑞亚共和国的友好外交伙伴。全国百废待兴，面对这个局面，左汀原政府向皮奥瑞亚共和国发出援助请求。作为自诩为共和主义灯塔的柏维政府当然爽快的答应下来。\n\n很快，皮奥瑞亚外交使团领头的皮奥瑞亚联邦政府驻左汀原援助委员会建立起来。大批工作人员随着挂着蓝星条旗的皮奥瑞亚轮船来到这片热带天堂，一时间左汀原首都街头几乎挤满了外交人员。皮奥瑞亚人带着他们的共和币扫荡了所有的土特产店和饭馆，为几十年没见过钱的兔人们带来了第一桶金。不过这种情况也带来副作用，很快皮奥瑞亚共和币成为了左汀原民间交易的主要货币。\n\n“升旗，奏皮奥瑞亚共和国国歌！”每个周一，睡梦中的左汀原人总会被无处不在的《共和万岁》的歌声吵醒，当他们打开窗户就能看见飘扬在首都各处的蓝星条旗和庄严肃穆盯着旗子的皮奥瑞亚人。几周后在，《共和万岁》成了左汀原当地的流行歌曲，就连懵懂的小兔人都学会了那几句皮奥瑞亚—“革命万岁！共和国向前进！”"
PEO.250.a:0 "要不哪天带点流行唱片过去，比如《浦口火车站的告别》？"

PEO.251.t:0 "皮奥瑞亚的援助"
PEO.251.d:0 "皮奥瑞亚的援助"
PEO.251.a:0 "皮奥瑞亚的援助"

PEO.252.t:0 "丑陋的皮奥瑞亚人"
PEO.252.d:0 "工程师麦克·阿文托将自己全是老茧和暴起的青筋的大手放到台灯下仔细打量。他为自己这双手感到无比的骄傲和自豪，他靠这双可靠而灵活的手养活了自己的家庭，有了30万的存款，甚至可以一年带孩子们去旅游好几次。\n\n接着他把公文包里的海报拿出来专注地看了许久，以至于他那脸上长满雀斑的妻子来喊他吃饭时都无动于衷。“共和国需要你”海报上这样写着。除了不像共和国宣传海报中的皮奥瑞亚人长着一张帅气的国字脸和亚麻色或者乌黑的头发，阿文托几乎就是个标准的皮奥瑞亚共和国公民。他的爱国热情让他错过了晚饭，错过了晚上的广播剧，直到阿文托夫人喊他去洗澡。\n\n“我亲爱的工程师丈夫，你又在为国家担忧啦？”阿文托夫人把手搭在丈夫宽厚的肩膀上，眼睛看着丈夫丑陋的大手上的海报，“如果你想去的话我可以陪着你，孩子已经大了，而且皮埃尔小姐不是在嘛。”阿文托扭头看向妻子，脸上的皱纹在昏暗的灯光下显得更加深不可测，布满血丝的眼睛欣慰的看着妻子：“不愧是我阿文托看上的女人啊！工程师夫人。”\n\n第二天，一个丑陋的皮奥瑞亚人向海报上的地址发出来申请，申请通过邮政系统很快传递到皮奥瑞亚联邦外交部的一个科室，最终和其他申请统计成一张表交到副部长杨太明的案前。但是他不禁皱起眉头，和在他办公室喝茶的外交部长吐槽到：“大部分申请人的现在工资收入都远低于外交人员工资”"
PEO.252.a:0 "我们好像招到了一批投机饭桶。"

PEO.253.t:0 "第一期"
PEO.253.d:0 "“调频AM102.3，东巴自由广播电台现在开始播报。东巴斯蒂亚自由民族的人民们，欢迎收听东巴斯蒂亚自由电台，我是本期主持人鹰。下面我们将进入今天的音乐环节，今天我们要收听的是………”\n\n在悠扬又带着些许刚硬的乐曲声中，皮奥瑞亚共和国广播电视台主任张文青不禁松了一口气，在他一旁站着的宪法保卫局副局长克劳德嘴里叼着根从左汀原进口的上好雪茄，脸上是一如既往的从容。“台长先生，这期节目效果很好，我会向总理府那边汇报的。”克劳德漫不经心的说，“未来这些播音员会成为共和国外宣的主力军。”张文青瞥了眼傲慢的克劳德，继续盯着导播室内的一举一动。\n\n“…下面是深夜闲聊时间，今天我们邀请到…”\n\n“这些问题都是哪来的？”张文青问克劳德。克劳德轻哼了一下，然后摇了摇头：“台长先生，你负责播送节目就好，您大可以放心这些问题的真实性。”张文青点头回应，他知道宪法保卫局的特工自然有渠道从外国把消息通过电台传回来。\n\n“下面是科普时间，今天的内容是什么是民主主义…”\n\n克劳德看了看表，把拿在手上的礼帽扣回头上，接着礼貌的向张文青告辞：“台长先生，先告退了。我要去共和国宫汇报。”张文青的眼睛任然严肃的盯着导播室，他只是点头回应克劳德。"
PEO.253.a:0 "“电波跨域国界送到被压迫的人民身上。”"

