###政党名称###
PEO_pioneer_communism_party:0 "皮奥瑞亚共产党"
PEO_pioneer_communism_party_long:0 "皮奥瑞亚共产党"
PEO_revolutionary_communism_party:0 "皮奥瑞亚社会主义行动"
