PEO_suggest_colesly_albert_as_federal_chief_justice_tt:0 "§2民主化进程加快……§!§R军政派对我们的安排稍有微辞§!"
PEO_invest_in_local_economy:0 "投资地方经济"

PEO_complete_reconstruction_of_political_officer_system_in_defense_forces:0 "完成国防军政治军官系统重建"

PEO_approve_relaunch_of_peoria_academic_yearly_forum:0 "批准重启皮奥瑞亚学术年度论坛"
PEO_approve_relaunch_of_peoria_academic_yearly_forum_desc:0 "皮奥瑞亚学术年度论坛的申请被内务部提请委员会审议。孔斯年认为重启这一学术盛宴有利于国家学术发展，也可以向社会发出解冻信号。"

PEO_make_final_judgement_on_republic_v_zhang_simiao:0 "对“共和国诉张思淼“案作出最终判决"
PEO_make_final_judgement_on_republic_v_zhang_simiao_desc:0 "1997年6月9日，随着一封匿名举报信出现在孔斯年的宅邸门口，一场举国瞩目的大案就此拉开帷幕。案件涉及了联邦内部最大的私人资本集团之一—青山资本的总裁张思淼。\n\n随着检察院的调查，张思淼与军队的关系逐渐浮出水面。孔斯年无法忍受国防军的堕落，一纸令下，最高法院与国防军政治道德委员会全面从军事司法系统接管案件。"
PEO_make_final_judgement_on_republic_v_zhang_simiao_tt:0 "§R军政派对我们的安排稍有微辞§!"

PEO_legalize_suhrs_presidency:0 "合法化苏尔的总统职务"
PEO_legalize_suhrs_presidency_desc:0 "根据皮奥瑞亚共和国宪法，联邦总统职务由联邦大选举人团（国民议会＋州议会代表）选举产生。苏尔的总统职务目前并非合法，那么就很有必要补办选举来合法化。民主派也许会对这场选举保有不切实际的期望，但出现在委员会推荐名单上的只会有一个人——克里斯·苏尔。"
PEO_legalize_suhrs_presidency_tt:0 "§7无人感到意外。§!"

