PEO.255.t:0 "人人喜欢的乔"
PEO.255.d:0 "在共和国宫小礼堂举行的招聘会上，现任皮奥瑞亚新闻社驻南巴分社副主任乔·宾无疑是主角。他那大腹便便的形象和恰到好处的荤段子让整场招聘会充满了欢声笑语，十几年的驻外经验也让他可以随口说出不为人知的外国故事来加强他的专业形式。\n\n“…在南巴共和国，一瓶上好的葡萄酒的价格比国内低了快五倍；七河地区的生物制品是全球一流；南远乡的美食更是没有的说…”乔滔滔不绝的说着自己曾去过的国家的特色产品，当然也没有忘记这是外交部主持的招聘会，他顿时话锋一转开始介绍入职的优厚待遇，“当然你们成为驻外人员，你们可以享受众多的好处。外交部会报销所有人员的通行费用，而且如果是公干会提供头等舱票务！有人可能会说如果在条件艰苦地区怎么办？我只能说你们一点都不用担心，外交部在所有条件艰苦地区都设置了补给站，保证你们至少可以在左汀原那种地方享受到普拉特的消费，而且价格是外交补贴价！”\n\n一旁的外交部长咳嗽了两声提醒乔不要只说优待，但乔嬉皮笑脸的瞧了他一眼就继续讲话：“你们可以在外面以免税价买到很多很好的商品然后走外交邮寄程序回国，海关一般不会查上面盖了外交章的邮件。而且我可以给在场的小伙子们说一个你们更感兴趣的事—皮奥瑞亚男人在外面还是很受欢迎的……总之你们是共和国外交事业的主力，肩负传播皮奥瑞亚共和国对外形象的重任，所以国家不会亏待你们的。”\n\n全场爆发了巨大的掌声，人人都喜欢乔的演讲，除了我们的老工程师阿文托。"
PEO.255.a:0 "“这他妈更像是一场侵吞纳税人钱的分赃会议。”"

