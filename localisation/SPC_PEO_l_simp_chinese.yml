PEO.260.t:0 "丑陋的旅行"
PEO.260.d:0 "阿文托接到上级通知要求其准备向外交部派出的经济考察团汇报本地情况并带领部分专家实地考察。麦克怀特使团长罕见的没有听到那个丑陋的工程师向他抱怨外交部或者左汀原政府的政策，不由得松了口气。\n\n论起阿文托的功绩，恐怕当地人三天三夜说不完。先不说他用竹子做成的人人都会用的引水器，让住在山坡上的人也能方便取到水；就连阿文托夫人也造出了不用弯腰就能扫地的扫帚！天啊，多么伟大的发明！当地的年轻妇人们再也不用承受弯腰驼背之苦了！甚至都不用组织，在隔壁的邻居们听说工程师夫妇的同事们即将到了后就立刻奔走相告，到了晚上就连住在镇子最偏僻地方的镇民都到了街上迎接考察团。\n\n考察团于当日近午夜时分才通过从雨季泥泞的道路脱身到达小镇。不明所以的考察团被热情的镇民们团团包围簇拥着进了当地最豪华的酒馆（可能还不如吉庆的救济站住的舒服），要不是看见了阿文托高大的身影，他们差点以为被桑山恐怖分子袭击了。第二天在小镇镇长的带领下，众人搭乘本地唯一可以载下15人的车—翻斗拖拉机沿着土路考察。“真是苦了你们这些穿着白衬衫黑裤子的大学教授了。”阿文托看着那些脸上和身上已经沾满红土的考察团成员表示抱歉，“没办法，这里条件艰苦，但镇民们都有信心把这里变得更好。”\n\n考察团一路对着山川河流指指划划，又时不时要司机停下来和路过的兔人农民聊上两句然后在他们的笔记本上记下些字母或者方块样图案。尽管镇长听不懂翻斗里站着的带眼镜的皮奥瑞亚人在说些什么，但他大概清楚，以后的日子会变得越来越好。\n\n考察结束后，阿文托自己掏钱在自己家住的小屋子里请考察团吃了顿经过阿文托夫人按照皮奥瑞亚人口味改良过的左汀原菜。看见终于不用吃虫子或者生鱼的考察团员们热泪盈眶，纷纷大快朵颐起阿文托自己家养的猪，丝毫不顾自己沾满红土的衣服又粘上肉汁。"
PEO.260.a:0 "丑陋的吃相"

PEO.261.t:0 "第204号总理行政令"
PEO.261.d:0 "根据《皮奥瑞亚共和国宪法》授予之神圣权力，本人皮奥瑞亚共和国总理柏维以皮奥瑞亚共和国联邦政府的名义发布《皮奥瑞亚共和国联邦政府第204号总理行政命令》，本行政令已经皮奥瑞亚共和国相关主管部门领导附属签字，交皮奥瑞亚共和国国民议会法律委员会审查确认合法。\n\n1.	自本行政令发布即日起，皮奥瑞亚共和国联邦政府在与奥罗日亚联合王国国境线15公里内施行“2级戒备标准”，在与吉拉尼亚王国通关口岸施行“3级检查标准”，在与西莉迪亚公社通关口岸实施“实验性通关检查标准”\n\n2.	自本行政令发布即日起，皮奥瑞亚联邦政府有权在各通关口岸设置联邦口岸检察专员。\n\n3.	自本行政令发布即日起，皮奥瑞亚共和国内国外输入邮件或包裹检查由各州政府邮政部门和公共安全部门执行。\n\n4.	自本行政令发布即日起，处于皮奥瑞亚共和国与奥罗日亚联合王国交界的边境州政府之边境检查职权暂由皮奥瑞亚共和国联邦海关总署代为行使，有效期至2003年6月21日。\n\n5.	本行政令解释权归皮奥瑞亚共和国联邦最高检察院所有。本行政令废止权归皮奥瑞亚共和国国民议会法律委员会所有。本行政令执行权归皮奥瑞亚共和国联邦政府所有。"
PEO.261.a:0 "皮奥瑞亚共和国总理 柏维"

