PEO.257.t:0 "丑陋的工作"
PEO.257.d:0 "到了左汀原，阿文托就爱上了这个热带国家。一路上问东问西，买东买西，最后拎着两大袋水果和小工艺品到了使团驻地。驻左使团长麦克怀特憋着笑接待这位唯一一个没有穿正装打领带的技术人员，阿文托也笑着拍了拍麦克怀特的肩膀：“工程师的工作环境比较辛苦，我家里唯一的正装已经给我儿子了，所以只能穿这套粗布工装了。”\n\n待鸡尾酒会结束，到了分配工作的时间，麦克怀特把这批新人带到皮奥瑞亚工程队援建的左汀原政府礼堂听取左汀原政府人员为他们准备的工作演讲。当然到最后，最受欢迎的肯定是左汀原使团驻地行政岗或者驻左汀原中央政府助理公务员。散会后，几乎所有部门都招满了人，除了一个驻乡下的技术专员岗位；几乎所有人都找到了岗位，除了阿文托。\n\n“镇长，招不到人啊。没有人愿意来我们乡下干啊。”一个穿着朴素的公务员低垂着头，长长的兔耳几乎快垂到地板上。站在台阶上的镇长抽着烟一言不发，他有点望着星空向神明发问。“那个，我是皮奥瑞亚工程师麦克·阿文托。请问技术专员的岗位还有嘛？”阿文托拎着刚买的水果站到镇长旁边，半躬着腰询问面前这个即使自己尽力弯下腰还是比自己矮很多的兔人老者。\n\n……“使团长先生，那个叫阿文托的工程师居然选择了乡下那么丑陋的地方工作，不可思议啊。”副团长路易斯惊讶的看着手上的报名表说，“以他之前的履历，他完全可以选择在左汀原的建设部里面谋分不错的差事。”麦克怀特点头同意他的观点，然后点上一支雪茄看向办公室里悬挂的皮奥瑞亚共和国驻左汀原外交使团旗。"
PEO.257.a:0 "似乎这个国家还有些愿意干事的人。"

PEO.258.t:0 "如何贿赂皮奥瑞亚小官"
PEO.258.d:0 "皮奥瑞亚共和国外交部外援司南洋处一级事务官林立勇马上就要被左汀原使团里面的官僚主义气氛气到突发脑溢血。他搞不懂为什么这帮废物要为了什么大型公路建设啊，机场建设啊或者左汀原议会大楼建设之类的面子工程吵上一个上午。\n\n“妈的，左汀原要的是他妈的小型农业设施，是他妈的最基础的小型工业，你们这帮人除了在这浪费国内纳税人的钱还会干什么？…哦，我都忘了。你们还会让对面桑山的恐怖分子不断壮大。”一通正义演讲后，林立勇摔门而出留下一脸疑惑的使团成员们。\n\n林立勇乘公交车到了最近的港口买了下一班的船票，登船前他拍了封电报给外交部申请了一周的假期来解气。说来也奇怪，外交部居然在几分钟后就回电同意了，还是部长亲自批准的。不过不重要了，现在有一周假期，他准备先去南巴好好玩几天顺便把举报信写了。\n\n“您好，林事务官嘛？”一个身着正装的兔人拉住他的手，“我是左汀原一家农业公司的老板，也是左汀原政府农业部的一名政务官。”林立勇向他点头致意然后准备上船，“我听说您在会议上为左汀原的老百姓说了好话，可真是位好官啊。如果使团里面多点您这样的人物，桑山恐怖分子也不会这么嚣张了。”“谢谢您，我只是做了我该做的。”那个兔人跟着林立勇上了船，然后向服务员招呼了几句，接着追上离他几米远的林立勇。“林事务官，为了感谢您，我……我们公司众筹了些钱给您的旅行准备了最高级的服务，您看如何？”\n\n反正现在休假，又不求自己办事，林立勇在心里又背了一遍《皮奥瑞亚公务员法》……“行吧，谢谢了。左汀原百姓们的恩情我会一直铭记于心的。”接下来的旅行就是享受了，如果被公务员纪律管制厅知道自己的行为，那帮人肯定得气炸了，但谁让现在是休假时间。喝着顶级葡萄酒，吃着顶级的料理，还有顶级的服务，而林立勇心里对那帮废物的怨恨与日俱消。等到在罗克希亚港下船，回到办公室，他从西装口袋里拿\n\n出旅行过程中写的告状信。“嘶—这是我写的？”看着这充满孩子气和幼稚发言的纸，他摇摇头把这张纸揉成一团扔进垃圾桶。"
PEO.258.a:0 "这些想法是怎么冒出来的？"

