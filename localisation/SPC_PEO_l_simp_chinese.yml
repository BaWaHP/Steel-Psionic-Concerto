PEO_expand_federal_polytechnic:0 "扩大联邦理工学院"
PEO_expand_federal_polytechnic_desc:0 "皮奥瑞亚联邦理工学院是联邦教育系统中产学结合的先锋，扩大该校有利于我国的学术与经济发展。"
PEO_approve_jingqing_university_phase_2:0 "批准吉庆大学二期工程"
PEO_approve_jingqing_university_phase_2_desc:0 "吉庆大学是最负盛名的顶尖大学之一，由联邦教育部
与吉庆州政府共同管理。当前吉庆大学二期已经论证多年，是时候撑着预算充足落地了。"

PEO_emphasize_federal_education_guidance_standards:0 "强调联邦教育指导标准"
PEO_emphasize_federal_education_guidance_standards_desc:0 "联邦教育指导标准是联邦教育部针对义务教育阶段实施的指导性规范。标准要求义务教育阶段学校必须使用经州政府审查过后的课本进行教学。"
PEO_promote_gonghe_port_experience:0 "推广共和港经验"
PEO_promote_gonghe_port_experience_desc:0 "共和港市是联邦内义务教育执行最好的地区。通过高效的升学与分流机制，该市的人才得到充分利用。我们应该在联邦范围内推广这个经验。"

