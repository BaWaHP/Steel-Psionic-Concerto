###国策###
ROT_ash_of_reform:0 "改革的灰烬"
ROT_ash_of_reform_desc:0 "波瓦尔·塔朗诺这个蠢货推行的经济改革不仅惹恼了所有的国民，还差点让提特兰共和国与南巴联邦闹翻。为了平息共和国内外的愤怒，他必须做好下台的准备，并明确承诺不参加本次总统大选。"
ROT_reinforce_police:0 "加强警察"
ROT_reinforce_police_desc:0 "共和国的社会秩序愈发动荡，我们必须加强警力。我们不仅要给警察配备更好的火力，更要给予他们充分的执法自主权。在紧急情况下，他们可以为了自保而对嫌疑人自由开火。面对那些早已被确认为罪犯的不法分子，更是可以果断出击而不用担心背负法律责任。"
ROT_test_full_rev_mov:0 "刺探全民革命运动"
ROT_test_full_rev_mov_desc:0 "全民革命运动组织是一个由魅力非凡的舞蹈演员马格尼莫·伊罗莫兹创建的社会合作主义组织。该组织以激进的民粹主义与民族主义著称，拥有提特兰群众组织的支持。他们甚至还和左翼社会世联主义者美拉德·贝罗克结成了联盟。民族主义的激进右翼和世联主义的激进左翼是怎么达成共识的呢？他们究竟是想让提特兰人和南巴人和解呢，还是想鼓动极端民族主义牟取政治资本呢？为了共和国的安全，我们必须对他们有所了解，我们将派出特务一探究竟。"
ROT_worker_auto_prob:0 "工人自治问题"
ROT_worker_auto_prob_desc:0 "目前，全民革命运动与友爱会在共和国内掀起了一阵“工人自治合作社”的热潮。客观来讲，目前他们的运动并没有对共和国造成什么损害，甚至还在一定程度上减少了暴力犯罪事件，为共和国提供了稳定与秩序——这是共和国最缺乏的东西。\n\n但是，也有人认为，这些极端分子今天能组织群众自己创造秩序，明天他们就能组织军队威胁共和国的国家安全。我们是否要干涉这些合作社呢？"
ROT_cooling_nationalist:0 "冷处理民族主义者"
ROT_cooling_nationalist_desc:0 "经过调查，我们确认全民革命运动这一组织依然处于合法组织的范畴。但我们又不得不担心这些民族主义言论会影响南巴的态度，所以，目前我们只能冷处理这些民族主义者，保证他们当中的极端派不会闹出什么大事。"
ROT_liv_people_perform:0 "人民自由党的表演"
ROT_liv_people_perform_desc:0 "一直以来，共和国的议会都由两大党派——民主党与人民自由党掌控。然而，此次民主党任期的失败使得许多小党派趁机崛起。而人民自由党必须保证国家不会落到这些小党派手里。"
ROT_prem_foreign_invest:0 "外资至上"
ROT_prem_foreign_invest_desc:0 "伟大的南巴斯蒂亚联邦是工业革命与共和革命的发源地，更是提特兰共和国的保护者。他们的恩情我们永世难忘，他们的市场更是有利可图。因此，我们必须放下狭隘的民族主义与贸易保护主义，扩大开放程度，吸引更多的外资以促进我国的现代化！"
ROT_mil_base_econ:0 "军事基地经济学"
ROT_mil_base_econ_desc:0 "南巴斯蒂亚联邦军队是世界上最伟大的军队，他们的消费能力更是和战斗能力一样强大。而在我们的国土上，有着数以万计的南巴斯蒂亚联邦驻军，这些年轻人离家千里，必然有各种各样的不能被联邦照顾到的需求。他们有需求，有消费能力，我们作为东道主自然就要满足他们的需求并从中获益。我们可以围绕着这些军事基地建设一些专门服务这些军人的产业以从他们手中赚得外汇。但……在大部分情况下，这些军人只有性需求需要提特兰人解决。我们必须强迫提特兰的妇女满足他们的要求。"
ROT_more_churches:0 "更多的瑟庞教教堂"
ROT_more_churches_desc:0 "我们与南巴斯蒂亚联邦闹了些矛盾，为了与南巴斯蒂亚联邦改善关系，我们应当先讨好在联邦流行的瑟庞教教会——比如，帮助他们传教，建立更多教堂。"
ROT_holy_city_prob:0 "圣城问题"
ROT_holy_city_prob_desc:0 "众所周知，纳卡圣城乃是瑟庞教与纳卡教的圣地。然而，由于两教关系恶劣，两教教士常常在圣城大打出手。为了共和国的秩序，我们必须做点什么。"
ROT_deal_with_fury_religion:0 "处理狂热的教徒"
ROT_deal_with_fury_religion_desc:0 "一伙自称为“神权议会”的极端纳卡教徒正在共和国四处宣扬极端的提特兰民族主义。他们甚至还组建了一支“圣城之子”的武装扰乱治安甚至对无辜群众执行私刑，我们必须处理掉他们。"
ROT_election_in_storm:0 "风暴中的大选"
ROT_election_in_storm_desc:0 "真是令人难以置信，我们的大敌修卡利翁同盟与我们的盟友南巴斯蒂亚联邦竟然在同一年内崩溃了！没有了南巴斯蒂亚联邦的庇佑，我们的国家一下子变成了国际孤儿。国际环境的巨大变化使得经济危机与政治混乱降临于我们的国家。更糟糕的是，我们的现任总统是个极其不受欢迎的人。因此，我们必须尽快召开新一届大选，选出一个值得信赖的领袖带领我们挺过这场危机。"

#中巴内战干涉
ROT_fulfill_the_obligations:0 "履行联邦成员国的义务"
ROT_fulfill_the_obligations_desc:0 "作为南巴联邦中最重要的工业原材料产地与黄金产地，中巴斯蒂亚联盟的解体对南巴斯蒂亚联邦的多个成员国的经济造成了巨大的冲击，我国自然也不例外。无论是北方的中巴叛乱分子，还是因中巴解体而造成的经济冲击，都严重威胁着我国的经济安全与国防安全。因此，我们绝不能坐视中巴斯蒂亚继续被那些叛乱分子荼毒。从经济安全与国防安全的角度出发，我们理应帮助共和国驻中巴司令部去惩戒那些害的我国经济遭受浩劫的中巴叛乱分子。同时，身为南巴斯蒂亚联邦的一员，我们有义务对中巴斯蒂亚合法政府（也就是驻扎在中巴的南巴驻军及其中巴合作者）伸出援手。我们将履行一个联邦成员国的义务，向中巴合法政府伸出援手！\n\n然而，在正式出兵帮助南巴的中巴驻军前，我们必须先在认真讨论具体该如何介入中巴内战。毕竟，1998年是大选年，而选民们对干涉中巴毫无兴趣，更有甚者会觉得不应该把用于解放全提特兰的力量用于干涉中巴内战。因此，我们必须谨慎权衡我们手中的选择。"
ROT_wholehearted_support:0 "鼎力相助"
ROT_wholehearted_support_desc:0 "邻居有难，我们当然要尽力帮助邻居度过难关。我们将毫不拖泥带水地开始援助中巴的合法政府，与那里的南巴驻军并肩作战。我们将在稍做准备之后武装起一支干涉军，并派遣军队维护中巴大铁路，保证来自联邦各国的各项援助都能顺利进入中巴。"
ROT_mobilize_arsenals:0 "动员兵工厂"
ROT_mobilize_arsenals_desc:0 "对我们而言，中巴斯蒂亚联盟的解体是个巨大的黑天鹅事件，打了我们一个措手不及。无论是突然降临的经济萧条还是支援中巴合法政府（也就是驻扎在中巴的南巴驻军及其中巴合作者）的义务，我们都毫无准备。但我们不可能在毫无准备的情况下就派出军队干涉中巴内战。因此，在我们的干涉军进入中巴之前，我们必须尽快动员工业，让兵工厂的工人们加班加点，扩大武器生产。我们的士兵必须拥有更充足的武器弹药！"
ROT_ensure_transportation:0 "确保交通运输"
ROT_ensure_transportation_desc:0 "就在不久之前，负责维护和运行中巴大铁路提特兰路段的提特兰铁路工人发起了一场名义上要求停止降薪和裁员的大罢工。但我们心里清楚，这些工人肯定是收了第三国际、中巴独立分子以及提特兰极端民族主义者的金条。就算不是如此，他们也在事实上破坏了大铁路沿线国家的经济稳定，更是阻挠了联邦各国向中巴合法政府输送各项援助——这显然有利于中巴合法政府的敌人：先锋国际和中巴独立分子等中巴叛乱分子。\n\n当然，我们还没有无能到压不住一伙工人。在我们的迅速行动中，铁路工人的罢工已经停止，中巴大铁路也再次恢复运行。我们将派遣更多的军队保证铁路运输不再会遭受任何形式的破坏，并和由南巴企业家掌控的提特兰铁路局一起，保证铁路运力将优先用于输送各国援助给中巴合法政府的人员物资。"
ROT_support_central_bastia_legitimate_government:0 "支援中巴合法政府"
ROT_support_central_bastia_legitimate_government_desc:0 "在数个世纪前，来自北巴的魔兽南下侵略中巴，提特兰人和南巴各族人民一起挡住了南下的魔兽，解救了被魔兽蹂躏的中巴斯蒂亚联盟，让中巴再次回到了人类主导的文明世界。然而，中巴独立分子和喜欢念魔兽的赤色小本子的先锋国际分子显然不会念及救命恩人的恩情，甚至还要以卵击石，挟持民众破坏文明世界的秩序！为了保卫我们的现代文明，伟大的提特兰共和军必须和他的盟友一起再次北上中巴，碾碎秩序的破坏者，让中巴再次恢复文明与秩序！\n\n现在，我们的军事工业有序运转，我们的军队整装待发，通往中巴的铁路稳定运行。是时候正式履行援助中巴合法政府的义务了！"
ROT_bargain_with_rsb:0 "讨价还价"
ROT_bargain_with_rsb_desc:0 "说真的，我们完全没有准备好介入一场颇具规模的战争。我们的共和国本就多灾多难，饱受秩序动荡和政治对立之苦。有限的军队不只要维护国内秩序还要提防西边的牛头人和保王党，根本没有多少余力干涉中巴内战。除非，我们那向来慷慨的南巴盟友能够用她那世界一流的工业和武器帮助我们武装我们的军队，振兴我们的军工业。简单来说，就是用全力援助中巴亲南巴政权作为条件，向南巴请求卖给我们一批用于生产武器的工业设备并派出专家团队帮助我们掌握一些先进武器的生产技术，同时两国合资建设新的兵工厂。这听上去有点像是在讨价还价，毕竟援助中巴合法政府本就是我们这个联邦成员国的义务。但如果南巴连这点讨价还价都接受不了的话，我们不顾选民情绪和经济萧条，去自带干粮且毫无准备地干涉中巴内战是为了什么呢？毕竟，今年是大选年，而选民并不支持我们干涉中巴内战，只会觉得这是在给南巴人的中巴毫无意义地流血。倘若我们能借此达成一个有利于提特兰人民的新协议，我们或许能争取到更多选民的理解与支持。"
ROT_fair_trade_diplomatic_victory:0 "公平的交易，外交的胜利"
ROT_fair_trade_diplomatic_victory_desc:0 "提特兰共和国理应履行援助中巴合法政府的联邦成员国义务，但她的军队却难以在短期内做好准备。我们那可敬的盟国——南巴斯蒂亚共和国体谅我们的难处，慷慨地援助了我们生产设备与先进武器，让我们得以迅速武装起一支颇具规模的干涉军，同时还达成了一个互利互惠的贸易协议，让战火中的中巴人民能够享受到免税的提特兰大米，也能让我们的农民卖的出因经济萧条而滞销的粮食。同时，我们的工业也将享受到中巴的廉价矿产原材料——如果中巴合法政府还能控制中巴矿产的话。"
ROT_go_teotland:0 "上啊！提特兰人！"
ROT_go_teotland_desc:0 "得益于南巴盟友的慷慨援助，我们成功地在短期内武装起了一支干涉军，甚至促进了我国军事工业的发展。既然我们已经收到了这样大的好处，我们还有什么理由不为我们的盟友全力以赴呢？\n\n上啊！提特兰人！我们在两百年前就和南巴人一起拯救过中巴，今天也绝不会例外！数万提特兰精锐将紧随南巴战士的步伐，向以卵击石的中巴叛匪降下文明的铁雨！"
ROT_publicly_funded_tour:0 "公费“旅游”"
ROT_publicly_funded_tour_desc:0 "中巴斯蒂亚联盟内战爆发后，国内外都有无数人日夜催促我军星夜出兵援助中巴合法政府——也就是驻扎在中巴的南巴军队。然而，我们确实没有准备好介入一场颇具规模的战争。我们的共和国本就多灾多难，饱受秩序动荡和政治对立之苦。有限的军队不只要维护国内秩序还要提防西边的牛头人和保王党，根本没有多少余力干涉中巴内战。除非，我们那向来慷慨的南巴盟友能够用她那世界一流的工业和武器帮助我们武装我们的军队。于是，我们诚恳地向南巴盟友请求一些援助用于武装起一支可堪一战的干涉军，而我们那伟大的南巴盟友很快作出了回复：\n\n竟然不许！\n\n好吧，那我们只能缩小援军规模并尽可能的在不违反盟国义务的情况下做出更有利于我方的行动了。反正南巴盟友在中巴尚有数十万大军，会去援助中巴的也不只有提特兰人，我们就算全力干涉，造成的影响也是微乎其微。也就是说，我们是否出力干涉根本不影响南巴人在中巴的必胜之结局，只会影响国内民众对本届政府的看法——很明显，国内民众并不希望我们不顾民意和经济勒紧裤腰带干涉中巴内战，那我们不妨只派一小股部队，像公费旅游一样履行盟国义务，然后帮助身处中巴的提特兰侨民回国。这些侨民一定会为我国负责任的撤侨行动大受感动，然后满怀感激地投下支持建制两党的选票。"
ROT_protect_teotland_expatriates:0 "保卫提特兰侨民"
ROT_protect_teotland_expatriates_desc:0 "北方的中巴斯蒂亚联盟陷入战火之中，而我们不能对身处中巴的提特兰侨民坐视不管。我们将发起一场规模浩大的撤侨行动，并在提特兰侨民的撤离道路上派遣人手进行护送，还要为他们准备好赶路的食物，如有贵重财产者，理应动用卡车等载具帮他们把财产运回提特兰。"
ROT_support_central_bastia_government_idea:0 "支援中巴合法政府"
ROT_support_central_bastia_government_idea_desc:0 "提特兰共和军已经正式投入中巴内战，并将通过实战积累经验。"
ROT_full_support_central_bastia_government_idea:0 "全力支援中巴合法政府"
ROT_full_support_central_bastia_government_idea_desc:0 "提特兰共和国将尽其所能支援中巴合法政府，并向共和国中巴司令部派出更多志愿军。"
ROT_titlan_central_bastia_trade_agreement:0 "提特兰——中巴贸易协议"
ROT_titlan_central_bastia_trade_agreement_desc:0 "作为提特兰人全力支援中巴的报酬，中巴与提特兰达成了新的贸易协议。协议中两国将互免农产品和轻工业产品关税，提特兰共和国也会和其他南巴国家一样在矿产贸易方面同享贸易最惠国待遇，同时，提特兰共和国将和中巴一起保障大铁路的正常运行。考虑到提特兰共和国在轻工业和农业生产方面的优势，这将保证我们的士兵不至于挨饿受冻。"

#社会合作路线
ROT_rev_of_all_nations:0 "全民族的革命"
ROT_rev_of_all_nations_desc:0 "当选前，我们许诺要实现民族独立。在保卫首都的战斗中，我们已经证明了自己。但我们要做的远不止这些。提特兰民族内外的敌人还有很多，我们还有很多工作要做。我们的任期将让提特兰民族走向统一与自主，保证我们的提特兰成为最伟大的国家——不，我们要做的，是让提特兰再次伟大！这个世界很快就会意识到，我们不只是一群民族主义者，更是革命者！我们将为提特兰民族带来真正的民族革命！"
ROT_our_left_friends:0 "我们的左翼朋友"
ROT_our_left_friends_desc:0 "为了赢下大选，我们积极寻求反建制派的帮助，于是友爱会这一左翼组织成为了我们的可靠盟友。现在，我们赢下了大选，粉碎了两次政变。我们是时候向我们的盟友兑现承诺了，我们将给予他们一定的政府公职，并强化联盟关系，让这一联盟促进国家的团结与发展。"
ROT_reaffirm_manifesto:0 "重申纲领"
ROT_reaffirm_manifesto_desc:0 "现在我们已经掌控了政权，但还有不少民众不清楚我们到底是个什么样的政党，究竟要带领这个国家走向何方。我们必须重申纲领，让人民清楚我们的志向——那就是为他们带来一个公平、正义、稳定、统一的民族国家！"
ROT_res_act:0 "救济法案"
ROT_res_act_desc:0 "经济萧条极大地损害了我国经济，我国民众的生活已经是朝不保夕。我们必须先为无法果腹的穷人提供免费食物保证国家不会出现大的饥荒，然后再进行经济改革彻底摆脱经济萧条。就像是救治一个大出血的病人一样，先用绷带包扎伤口止血，再谈其他！"
ROT_nationalize_railway_bureau:0 "国有化铁路局"
ROT_nationalize_railway_bureau_desc:0 "提特兰铁路局掌控了我国交通，而交通是一个国家的命脉。令人气愤的是，提特兰铁路局一直以来都是一个忠于南巴的私营企业。现在，南巴已然解体，我们不可能再让一个私营企业掌控我们的命脉了！我们必须将其国有化！由于经济萧条的缘故，提特兰铁路局股价暴跌，我们想要将其国有化并不需要付出太大的代价。"
ROT_form_brownshirts:0 "组建褐衫军"
ROT_form_brownshirts_desc:0 "事实证明，组建一个忠于民族主义意识形态，忠于全民革命运动党的准军事组织是完全正确的决定。正是有了这些忠诚而勇敢的民兵，我们才在南巴驻军逼近首都时守住了首都。现在，我们的国家依然处于危机之中，我们当然要扩编褐衫军这一准军事组织保卫国家。"
ROT_talk_with_oligarchs:0 "与寡头会谈"
ROT_talk_with_oligarchs_desc:0 "我国的寡头绝非善类，但为了国家的团结，我们依然需要与他们合作。毕竟，我们已经许诺过了，我们将与所有人合作。"
ROT_people_leader:0 "人民的元首"
ROT_people_leader_desc:0 "马格尼莫·伊罗莫兹无疑是提特兰人的伟大领袖，然而，腐朽的民主制度限制了他的权力，束缚了他的手脚，阻碍了他以卓绝的智慧引导国家。这对国家而言完全没有益处。因此，对我们的制度进行改革自然就成为了最紧迫的事情。我们应当将总统和总理这两个职位合并起来，让我们的总统既是国家元首，又是政府首脑。只有这样，国家机器才能以最高效的姿态运转起来。"
ROT_people_leader_tt:0 "§R从此以后，我们的所作所为都将符合宪法。§!"
ROT_land_redistribution:0 "土地再分配"
ROT_land_redistribution_desc:0 "提特兰境内依然存在一些地主，他们落后的管理模式严重阻碍了农村经济的发展。我们应当将土地分配给农民并积极联系农业公司进行开发。"
ROT_virgin_land_movement:0 "扩种经济作物"
ROT_virgin_land_movement_desc:0 "我国有着广阔的大平原以及相对优秀的农业基础设施，即便是在这个动荡的时代里，我们也不需要担心粮食问题。因此，我们应当适当地鼓励农民种植能提供工业原料的经济作物。这样可以在保证粮食安全的情况下获得更多的工业原料。"
ROT_stop_religious_conflict:0 "制止宗教冲突"
ROT_stop_religious_conflict_desc:0 "纳卡教与瑟庞教之间的宗教冲突早已上升到了暴力层面，由于旧政府顾虑南巴等国，只能任由瑟庞教（瑟庞教是南巴宗教）肆意妄为，无法解决两派争端。但现在，南巴已经解体，解决宗教冲突的难度大大降低，我们可以直接利用优秀的警察系统向两教施压，要求两教握手言和并服从政府领导——否则人们都要忘了，这个国家本是个世俗共和国。"
ROT_moderate_class_struggle:0 "适度的阶级斗争"
ROT_moderate_class_struggle_desc:0 "芙雷施曼所提出的共产主义学说固然是谬论，但其中的一些观点确实值得赞扬，比如“阶级斗争”这一概念。阶级斗争存在于社会的各个领域，表现为多种多样的形式。如果我们真的想要塑造一个团结的国家，就绝不能对其视而不见。因此，我们应当通过集中化的工会与雇主协会谈判，将阶级斗争控制在一个可控的范围内从而达到阶级调和的效果。"
ROT_integrate_groups:0 "整合各团体"
ROT_integrate_groups_desc:0 "社会应由代表不同职业、行业或社会阶层的组织化团体（如工会、商会、行业协会等）与政府共同协商，形成共识并制定政策，以维护社会稳定和公共利益。"
ROT_collective_economy:0 "集体主义经济"
ROT_collective_economy_desc:0 "为了社会整体利益和经济稳定，政府将与组织化的社会团体共同制定经济政策，而非完全依赖自由市场竞争或个人决策。同时，政府将作为仲裁者在各个利益集团间发挥协调作用。这种经济模式将调和阶级矛盾，平衡效率与公平，加强各行业之间的协同效应。"
ROT_fate_of_liberals:0 "自由派的命运"
ROT_fate_of_liberals_desc:0 "一些自由主义者伙同南巴驻军成为了民族叛徒，试图推翻我们的政权。像是这些自由派，我们定不会轻饶他们。那么，剩下的自由派是否也会像那些叛徒一样对我们的事业有害呢？我们必须做出决定。"
ROT_guild_structure:0 "同意型法团主义"
ROT_guild_structure_desc:0 "国家将准许利益中介组织存在，而各个社会组织也必须同意国家对经济和社会事务的行动权力。在这种模式下，合作系统内的各组织在价值和目标上具有较高程度的一致性，因此国家只需实施有限的控制，中介组织和社会行动者将具有明显的自主性。"
ROT_fill_cracks:0 "弥补裂痕"
ROT_fill_cracks_desc:0 "联邦裔公民是来自南巴地区的移民及其子孙。他们在南巴联邦崩溃前几乎是不言自明的高人一等。现在，为了各民族的真正团结，我们必须让他们明白他们也是这个国家的公民，和别的民族没什么两样。当然，我们也不会像自由派所说的那样迫害这些公民——我们只是会让他们明白，他们必须履行公民义务而已。我们也不必担心取消他们在司法仲裁方面的特权会让他们愤怒。一方面，他们也明白这并不是什么过分的迫害，另一方面，中巴联盟和南巴联邦也已经陷入战火，是不可能因为这点改革就逃到战区的——除非他们会觉得西边牛头人的集中营和坎达德尔的中部废墟比这里更好。"
ROT_financial_reform:0 "金融改革"
ROT_financial_reform_desc:0 "长期以来，我国在经济上受南巴控制，货币也和南巴联邦经济圈内各国一样使用塔勒这一货币。但现在，南巴联邦已经解散，我们不可能继续使用塔勒这一货币了。如果我们想要遏制经济萧条，我们就必须推行新的货币。但为了建立货币信用，我们必须限制金融交易市场，阻止某些投机分子将我们发行的货币兑换为其他国家的货币，这也就意味着我们将降低我国经济贸易的开放程度。"
ROT_nationalize_foreign_capital:0 "国有化外资"
ROT_nationalize_foreign_capital_desc:0 "在南巴崩溃前，南巴企业在我国可谓是一手遮天，只要一声令下就能让我国经济坠入深渊。前总统波瓦尔·塔朗诺的经济改革就是被这些狂妄的资本家摧毁的。现在这些嚣张的外国企业都在经济危机中苦苦挣扎，渴求我们的援助，但我们可不会为了外国人的资产而掏出真金白银，我们将对这些外企进行国有化，确保这片土地上的每个工厂都将服务于这片土地上的人民。"
ROT_public_works_plan:0 "公共工程计划"
ROT_public_works_plan_desc:0 "将提特兰铁路局国有化后，我们有了一支优秀的工程队伍。我们现在可以通过建设大型基础设施来创造就业岗位，同时改善基础设施与经济状况。问题在于，我们预算有限，我们只能在诸多建设方案中选择其一执行。"
ROT_military_aid:0 "以军代赈"
ROT_military_aid_desc:0 "所谓经济问题，不过是就业问题与财政问题的集合。而我们可以通过扩大军事工业与征兵来解决就业问题。如果这是和平时期，从长远来看，扩军备战当然不能解决真正的问题，只会成为国家的财政负担。但现在不同了，统一提特兰民族的复国战争即将到来，稍微提前开始扩军备战、动员工业既能缓解经济问题，又能让我们更好地准备战争，可谓一石二鸟。"
ROT_self_sufficient_independent:0 "自给自足，独立自主"
ROT_self_sufficient_independent_desc:0 "现在，世界经济处于动荡时期，将我们的经济命脉交于外国之手实在不是个明智的选择。我们必须尽可能地实现资源与工农业上的自给自足。请相信，独立自主、自给自足的经济效益是不可估量的。"
ROT_build_war_machine:0 "打造战争机器"
ROT_build_war_machine_desc:0 "统一提特兰半岛的复国战争迫在眉睫，我们必须让我们的经济准备好面对战争。因此，我们经济工作的重点在于提高军备生产以及促进自给自足，初步创建一套顽强且独立自主的工业体系。"
ROT_issue_bonds:0 "发行债券"
ROT_issue_bonds_desc:0 "是时候为打造战争机器踩一脚油门了！我们的经济蒸蒸日上，我们的政府广受欢迎，我们可以通过发放债券获取资金支持我们的工业化与军队现代化。当然，在统一全提特兰后，我们将为债券的购买者提供慷慨的回报！"
ROT_honor_and_bonus:0 "荣誉与奖金"
ROT_honor_and_bonus_desc:0 "尽管有些不起眼，但提特兰共和军确实是一支优秀的军队。这支军队大体上保持了政治中立，并为我们镇压了南巴驻军的暴动。我们自然要为这支军队提供更多的奖金，并设立专项奖金鼓励那些英勇无畏的战士。但继续称呼这支军队为“共和军”显然已经不符合现状了，我们将称其为“国防军”，以示本政府志在统一全提特兰的提特兰唯一正统政权之地位。"
ROT_new_training_standard:0 "新训练标准"
ROT_new_training_standard_desc:0 "统一战争迫在眉睫，和平时期的训练标准显然已经不适合直面残酷的复国战争了，我们必须制定新的训练课程，让这支军队的每一个人都能迎接战争的考验。新训练标准将不再只是改进士兵的军事素养，更要让这支士兵忠于国家与民族，并明白在接下来的战争中他们会遇到怎样的敌人——我们可以保证，我们只要将牛头人在西部犯下的暴行如实讲出来就能激起战士们的义愤，只要通过适当的引导，这种义愤将变为民族复仇的冲天怒焰，热血的力量将由内向外迸发而出，化作物质的力量摧毁民族之敌！"
ROT_kept_rsb_advisor:0 "留用南巴顾问"
ROT_kept_rsb_advisor_desc:0 "尽管南巴驻军在提特兰人民自由党的挑唆下试图反对过我们，但他们的妥协使得事态没有升级，我们也保证了他们的人身安全。现在战争迫近，我们没有理由不去向曾经的世界最强国家的精锐部队讨教军事经验——更何况，他们从一开始就是来给我国当军事顾问的。当然，这一定会招致一部分国民的反感，毕竟我们毫不避讳地鼓舞了民族情绪，现在又要让这些南巴人帮我们训练部队。我们可以让他们明白，这一次，南巴人确实只是顾问，而非控制国家的异族驻军。"
ROT_promote_zealous_officer:0 "提拔热忱军官"
ROT_promote_zealous_officer_desc:0 "在镇压了南巴驻军后，我们不得不意识到，我们的军官有些不足。我们必须尽快提拔一批心怀热忱的军官以填补空缺，这将增加军队英勇作战的动力。"
ROT_research_rsb_weapons:0 "研究南巴技术兵器"
ROT_research_rsb_weapons_desc:0 "我们当中有不少人厌恶南巴人，但没多少人厌恶南巴技术兵器。毕竟，实事求是的说，南巴的武器实在可靠，性价比极高。南巴驻军被镇压后，留下了一些南巴技术兵器，前共和国政权也有生产线负责生产武器配件，我们应当进行对这些技术兵器进行研究乃至仿制。"
ROT_instill_nationalism:0 "灌输民族主义"
ROT_instill_nationalism_desc:0 "我们当然不吝于赐予战士们应得的荣誉，可我们必须追问：“战士的荣誉从何而来？”我们必须让战士们明白，他们的荣誉并不来源于杀戮，而是来源于祖国的荣誉。每为祖国夺回一点荣誉，他们本人自然也会更加荣耀。"
ROT_dream_of_titran:0 "大提特兰之梦"
ROT_dream_of_titran_desc:0 "国家统一，社会安定，生活富足……我们相信，这是所有提特兰人的梦想，也是我们的革命的任务。然而，在这片充斥着暴力与狂想的土地上，实现梦想的努力总是会与其他人的愿景冲突，而解决冲突往往会付出鲜血的代价。我们并不是什么迷恋鲜血的邪教徒，但面对共和国外恶徒横行的提特兰大地，我们是一点退让妥协的想法都不会有！我们不会对那些贵族与狂教徒有半点怜悯之心。伊斯恰的牛头人殖民者更是会被我们斩草除根。提特兰民族将得到完全的、彻底的统一——直至永远。\n\n现在，举起旗帜！握紧钢枪！我们将踏上收复提特兰的征途！从此岸到彼岸！"
ROT_mgc_journey:0 "马加尔斯之行"
ROT_mgc_journey_desc:0 "我们的复国战争终于接近尾声。但我们还不能大意，毕竟马加尔斯的半人马骁勇善战。"
ROT_defend_northwest_disaster:0 "防备西北的灾厄"
ROT_defend_northwest_disaster_desc:0 "灾厄：原欲肆虐七河，我们必须在西北边境修建工事作好防御准备。"
ROT_run_to_kandadell:0 "向坎达德尔奔去"
ROT_run_to_kandadell_desc:0 "是时候收复西方故土了！我们永远也不会忘记1923年提特兰解放战争失败的原因：列强的干涉与对反动派的宽容。我们这次必须吸取教训，一击制胜！这很可能是我们统一提特兰半岛的最后一次机会了！"
ROT_comfort_the_dead:0 "告慰死难者"
ROT_comfort_the_dead_desc:0 "战争与暴政一直都是提特兰民族的主旋律，我们感谢丹特这样的共和革命者将我们从这样的痛苦中解救出来，但他们终究没有解放全提特兰。共和国外的提特兰同胞依然在受苦，他们饱受贵族、教会以及帝国主义者的压榨与奴役，世界大战更是让坎达德尔的中部地区沦为废墟。现在，我们收复了坎达德尔地区，在短期内，我们无法让这一废墟重新焕发生机，但至少，我们可以先建立墓园埋葬死者，为同胞带来些许慰藉。在中部废墟，我们还会设立纪念碑，让人们永远铭记内战的残酷，并明白今日的团结与和平的可贵。"
ROT_dont_forget_vlf:0 "勿忘瓦菲莱奥丽塔"
ROT_dont_forget_vlf_desc:0 "1924年的提特兰解放战争中，共和军因为缺乏重型攻城火炮，在瓦菲莱奥丽塔的堡垒都市折断了矛头。这一次，我们将用更多更大的火炮摧毁这个堡垒——如果他们胆敢抵抗的话。"
ROT_mtv_fire:0 "蒙联烽火"
ROT_mtv_fire_desc:0 "北提特兰从来就不是什么安分的地方，蒙特韦尔德联盟从一开始就根基不稳，现在更是陷入了残酷的内战之中。为了提特兰民族的统一，我们必须干涉其中，即便这意味着要处理复杂的民族问题。"
ROT_develop_autonomous_region:0 "开发自治区"
ROT_develop_autonomous_region_desc:0 "现在我们已经恢复了提特兰对蒙特韦尔德地区的掌控，但仅仅是用军事政治手段让他们安定下来是不够的。我们应当对这一地区进行投资促进经济发展。经济发展将降低民族内斗的烈度，这是世界通用的铁则，希望这一规律在这一地区同样生效。"
ROT_develop_autonomous_region_tt:0 "原§7蒙特§!§O韦尔德§!的§Y每个地区§!获得§C1建筑槽§!。"
ROT_national_unity_song:0 "民族团结之歌"
ROT_national_unity_song_desc:0 "唯有团结才能保全提特兰人——此言非虚。如果我们不紧密团结在一起，周边的大国就会立刻用金钱、武器还有意识形态将我们撕扯的四分五裂。这就是提特兰人的历史，我们最好让这段屈辱的历史永远成为历史。如果我们要做到这点的话，我们就不惜一切的地维持团结。为了民族团结，我们可以资助艺术，也可以灭绝新近诞生的地方民族认同。我们可以保障所有人的安全，也可以将分裂主义叛徒从人群中揪出来杀一儆百。如果民族团结是一首歌曲，我们要做的不是在指挥席上指挥，而是保证所有人都能同唱此曲。"
ROT_southwest_suffering:0 "西南苦难"
ROT_southwest_suffering_desc:0 "没有哪片土地比伊斯恰更加悲惨了。提特兰人在世界大战的失败使得伊斯恰地区落入了修卡利翁同盟的手中，这个国家的牛头人将其变为了提特兰人的集中营。提特兰人在集中营中贱如猪狗，生不如死。我们必须解放这一地区，无论付出何种代价。"
ROT_contact_guerrilla:0 "联络游击队"
ROT_contact_guerrilla_desc:0 "令人震撼的是，伊斯恰地区仍有人类的抵抗组织存在。在最黑暗的地狱中，这些自由战士无疑是最耀眼的光芒。我们当然不会令这一光芒熄灭。我们将设法联络这些游击队组织并建立物资运输通道。一旦成功，我们将在解放伊斯恰的战斗中获得敌后游击队的协助，这对我们的解放事业是极为有益的！"
ROT_aid_local_people:0 "救济当地民众"
ROT_aid_local_people_desc:0 "提特兰大地多灾多难，而伊斯恰地区的民众比其他地区的民众还要悲惨。在牛头人的奴役下，他们失去了为人的权利，字面意思上的沦为了可悲的家畜，犹如猪狗般被关在集中营。我们当然不是什么慈悲为怀的圣人，但，见到如此惨状时，没有人会没有帮助这些可怜同胞的冲动。无论要花多少人力物力，哪怕明知这些救济不会带来经济上的回报，我们都必须为他们送上热水、熟食与药品，让他们饱受折磨的躯体恢复健康，耐心的教会他们基本的生活自理能力和工作技能，就像救治受伤的兄弟一样，共和国必须扶起自己解放的国民。"
ROT_destroy_colonial_remnants:0 "摧毁殖民残余"
ROT_destroy_colonial_remnants_desc:0 "要恰当地描述复仇者大仇得报时的心情实在是一件难事，但也终究离不了赶尽杀绝四字。人民砸碎了奴役的枷锁，自然还要对邪恶的殖民者赶尽杀绝。提特兰人对这些牛头人没有半点宽恕的想法，国家要做的当然是顺从人民的想法并做好出现无辜者受害的预防措施。除此之外，当然还要发挥政府该有的作用，那就是在建筑、心理与文化上彻底抹除牛头人的痕迹。那些带有殖民色彩的米诺陶造物必须被抹除——不过，我们的一些党员也提出了一些更妙的建议……"
ROT_titran_rebirth:0 "提特兰重生"
ROT_titran_rebirth_desc:0 "我们都见过遮天蔽日的硝烟，最终也见到了硝烟散去后的曙光。今天，提特兰民族结束了长达百年的分裂状态，碾碎了殖民者与反动派，人民迎来了姗姗来迟的和平。人民可以自由地直立行走，自由出入自己的房屋，自由地劳动，自由地去接受义务教育，自由地无所事事。肚子要是饿了，他们可以去政府部门领点食物，或是数数自己手头上的钞票去买点什么，不用担心中途被人抢劫或者杀掉。人民可以生火做饭，然后喝上热水，吃上热饭。这对世界其他自由地区的人民而言，是再普通不过的日常。但对提特兰人而言，这已经足以称之为新生——他们再也不需要担心做这些事情会遭到惩罚了。\n\n当然，我们是革命者，对我们而言，人民只是拥有这些还远远不够。还有很多问题等待我们解决，我们还有很多工作要做。"
ROT_former_allies:0 "前盟友"
ROT_former_allies_desc:0 "我们的战线在西边，为了让我们拥有一个稳定的东部大后方，我们最好和东边的邻国搞好关系。在旧共和国时期，我们和东边的国家相处的还算愉快，现在他们也在忙于南巴战事无暇西顾，所以我们依然可以试着和我们东边的邻居搞好关系，哪怕只是暂时的和平也是十分有益于双方的。"
ROT_equal_cooperation:0 "平等的合作"
ROT_equal_cooperation_desc:0 "我们和东部邻国达成了友好的共识，在一段时间内，我们可以确定我们不会对彼此大动干戈。因此，一份新的贸易协议顺利成章的诞生了。我们当然和东边的国家进行过贸易，但在我们还是南巴的保护国的时候，这种贸易毫无平等可言。但这次不同，这一次，双方将进行地位平等且有利可图的经济合作。这将加深双方关系，并带来可观的利润。"
ROT_equal_cooperation_flag:0 "我们的邻国同意了我们的请求"
ROT_eastern_vigilance:0 "东部警戒"
ROT_eastern_vigilance_desc:0 "东部警我们的邻国拒绝了我们的友好提议，这不得不让我们对邻国做好最坏的准备。我们必须加强东部地区的防卫。"
ROT_eastern_vigilance_flag:0 "我们的邻国拒绝了我们的请求"
ROT_heart_island_defense:0 "摘心岛防务"
ROT_heart_island_defense_desc:0 "只要打开地图看看就能知道摘心岛的战略地位有多么重要。摘心岛位于阿德里亚海的中心，一旦该岛失陷，该岛将成为威胁阿德里亚沿海各城市的前进基地。因此，我们必须保卫该岛，无论要用何种方式。"
ROT_open_the_door:0 "开放之门"
ROT_open_the_door_desc:0 "我们应当将一个省份设立为自由贸易区来专门欢迎外资。这样既不会让外国势力渗透我国各地，又能引进外国资金与技术带动经济发展。我们当然没有胆小到一点风险都接受不了，我们只是希望能把风险放在可控范围内。"

ROT_titran_interior_ministry:0 "提特兰内务部"
ROT_titran_interior_ministry_desc:0 "伟大的元首阁下需要自己的党和政府与他步调一致，然而，他的部长们总是有自己的想法。元首当然没法改变部长们的想法，但他可以组建一支只忠于自己的秘密警察保证自己的命令不会出现偏差。尽管有很多人会对此提出异议，但我们完全欢迎他们提意见——不然我们怎么知道谁有意见呢？"
ROT_civilian_army:0 "民事部队"
ROT_civilian_army_desc:0 "我们很清楚，共和国以外的提特兰人对我们这些“东方提特兰人”有成见，认为我们是南巴的走狗。向他们解除误会至关重要。而我们军队的所作所为就是他们对我们的第一印象。我们必须组建一支负责接管收复地区的行政机关以及负责安抚民众的民事部队，保证我们收复的领土能够迅速恢复秩序并服从我们的统治。"
ROT_unshakeable:0 "不容动摇"
ROT_unshakeable_desc:0 "我们必须派遣特务人员管住军队，监视官兵们的一举一动，从而抹除军队中任何不利于我们的事业的思想。那些思想不纯净的软弱分子将在军队中无一席之地。无论是逃兵还是颠覆分子，都别想影响我们伟大的军队。"
ROT_sheath_the_sword:0 "长剑入鞘"
ROT_sheath_the_sword_desc:0 "内务部是我们的一把长剑，对于那些人民与国家的敌人，我们用它一剑封喉。但这把剑必须妥善使用，在大部分情况下，它必须安静地放置于剑鞘内，否则就会伤及无辜。我们必须谨慎地利用内务部，利用明确的规章限制其职权范围，将其技术官僚化。这将让党内的所有人明白，元首并非随心所欲地惩罚同志的暴君。"
ROT_night_of_the_sword:0 "长剑之夜"
ROT_night_of_the_sword_desc:0 "我们很清楚，全民革命运动作为一个民族主义的大帐篷一定会存在“党内左派”这样的事物，我们也曾为了选举而与左翼组织友爱会结盟。但是，我们真的和这些左派有什么实质上的共同点吗？这些左派竟仍然幼稚地认为元首会继续扩大民主化，而我们要做的就是用秘密警察告诉他们，元首和提特兰不需要民主化，就像元首和提特兰再也不需要他们一样。我们将发动一场清洗，结束党和国家在政治上的分裂状况。"
ROT_night_of_the_sword_tt:0 "§R左翼投机者与右翼革命者的古怪联盟到此为止。§!\n§R左翼分子§!态度将被§t锁定§!为§C100%§!。"
ROT_loyal_to_great_leader:0 "忠于伟大领袖"
ROT_loyal_to_great_leader_desc:0 "国家必须吸取不团结的教训，必须团结在一个坚强的领导核心周围。而这个核心便是提特兰民族史上最伟大的领袖——马格尼莫·伊罗莫兹！在元首的带领下，我们将收复故土，统一民族，让提特兰再次伟大！我们要做的，不过是紧跟他的脚步，全身心接受他的教导，并情愿为他的命令付出生命——一切都是为了最伟大的事业！解放全提特兰的事业！"

ROT_will_of_leader:0 "元首的旨意"
ROT_will_of_leader_desc:0 "马格尼莫·伊罗莫兹元首在全民革命运动党内有着绝对的权威，成功执掌了共和国后更是如此。话虽如此，元首并非超人，他不可能将国家的大小事务都管理的面面俱到。而这，就是他那忠心耿耿的同志们替他分忧的时候了。经过他的特别允许，一些党内高层将在一些部门或某些事务上暂时拥有仅在元首之下的权威。这将极大地减少元首的工作量，也能够更好地发挥元首的同志们的才干。"
ROT_respect_the_life:0 "对生命的尊重"
ROT_respect_the_life_desc:0 "友爱会会长美拉德·贝罗克坚信，生命是宝贵的——大部分人都清楚这点，但没有人能像美拉德更能践行这一理念。作为全提特兰最优秀的治疗术士，他将为提特兰带来他的药方。而这药方的第一疗程便是宣传：向所有人宣传生命的可贵，普及最基本的医疗卫生常识，克服顽疾所必需的耐心，以及治疗的开销可以变得有多廉价。"
ROT_self_produced_penicillin:0 "自产青霉素"
ROT_self_produced_penicillin_desc:0 "哪怕只是为人民提供“最基本”的公共医疗服务也是一笔不小的开销，如果药品需要进口的话就更是一笔天文数字。幸运的是，共和国时期的买办们并不算什么好事也没有做，共和国时期已经有能力自行生产青霉素等关键药品，只是欠缺投资乃至难以量产而已。现在，我们有充足的资金与足够优秀的专业人士负责让我们拥有量产青霉素等药品的能力。很快，我们就能把药品的价格降低到人民消费的起水平。"
ROT_graded_medical_system:0 "分级医疗体系"
ROT_graded_medical_system_desc:0 "分级医疗体系是根据疾病轻重缓急，引导患者在基层机构首诊，疑难重症转诊上级医院，实现资源优化配置、急慢分治和双向转诊的协作模式，这将提升整体医疗服务效率。"
ROT_encourage_cooperative:0 "鼓励合作社"
ROT_encourage_cooperative_desc:0 "合作社是一种较为公平的经济生产模式，鼓励人民参加或组建这种互助型经济组织将让我们的人民团结在一起，同时让经济的发展更加公平。"
ROT_encourage_cooperative_tt:0 "决议§Y支持合作社§!的花费减少§C10§!。"
ROT_field_volunteer_medical_team:0 "战地志愿医疗队"
ROT_field_volunteer_medical_team_desc:0 "为了支援前线，我们将建立战地志愿医疗队，组织医护人员和志愿者到前线进行救治伤兵等非战斗任务。"
ROT_titran_redemption:0 "提特兰的救赎"
ROT_titran_redemption_desc:0 "提特兰的身躯早已遍布脓疮，她的骄傲，她的传统，她的记忆，她的希望早已奄奄一息。在日复一日的奴役与混乱中，社会共和国之外的提特兰人民早已不再去希冀健康与友爱。于是，一些人宣称：提特兰已死，或者说，她本就不曾存在。\n\n但总有人用听诊器打捞沉没的心跳，让折断的岁月在无菌手套里重新发芽。 看吧，朋友！即使这个国家遍体鳞伤，也总有友爱之人用手术刀切开夜色，用缝合线串起散落的呼吸。总有一天，提特兰那数不胜数的溃烂的创口也会长出萤火虫的翅膀。她的人民——所有的提特兰人民将再次感受爱与健康的幸福。在这漫长征途的终点，等待着我们的，一定是涅槃般的救赎！"
ROT_revolution_of_action:0 "言出必行的革命"
ROT_revolution_of_action_desc:0 "全民革命运动在竞选时为了获取大众的支持，向大众许诺掌权后不仅不会取缔民主制度，还会实行男女同工同酬、推广工人工会、保障工人权利等一系列进步政策。然而，一些同志认为这不过是为了骗取人民支持的空言，在全民革命运动掌权后，愈发专制的政治氛围似乎证明了这一点。但现在，元首已经任命了莫哈特·马瑞诺——一位左翼民族主义者，他的上台已经足以证明元首履行诺言的决心。而他的工作就是逐步履行革命的诺言——人们将会明白，革命是言出必行的！"
ROT_gender_equity:0 "男女平权"
ROT_gender_equity_desc:0 "男女平权是我们的革命任务之一，提特兰人不应当因为性别就分高下，这只会破坏国家的团结与社会和谐。我们将出台相关政策保证男女同工同酬，成立妇女联合会保障妇女权利。尽管这些措施并不足以让国家实现男女平等，但也足以在性别平权上取得进步。毕竟我们不可能一开始就把产假、工作母亲补助等所有的平权措施一股脑地付诸实践。这只是一个开始，在未来，我们当然会更进一步。"
ROT_consolidate_alliance:0 "巩固联盟"
ROT_consolidate_alliance_desc:0 "我们与友爱会的联盟卓有成效，我们应当巩固这一联盟。"
ROT_anti_corruption_action:0 "反腐行动"
ROT_anti_corruption_action_desc:0 "一些全民革命运动的老同志在掌权之后迅速腐化，以权谋私。我们必须立即开始一场反腐行动打击腐败。"
ROT_left_guild_economy:0 "左翼法团主义经济"
ROT_left_guild_economy_desc:0 "我们的本意是通过制度化协商机制，让主要利益集团（如工会、雇主协会、专业组织等）参与国家决策，减少冲突，促进合作，从而平衡市场效率与社会公平。然而，事实证明，如果不让劳动者拥有应得的话语权，所谓的协商将变成官僚与富人的一言堂。我们将保证工人的地位得到应有的提高，以保证我们的协商机制真的能够带来公平与正义。只有这样，我们的革命才算是真正的革命！"
ROT_peoples_eye:0 "人民之眼"
ROT_peoples_eye_desc:0 "人民群众的眼睛是雪亮的，任何的腐败都逃不过他们的眼睛。然而，威权政治使得官僚拥有了足够的权力让他们闭嘴。我们必须保护人民群众的监督权，让人民再次敢于声讨不公，在任何官僚的面前都敢于畅所欲言。只有这样，我们所追寻的正义才能得到伸张，国家的腐败才能被遏制。"
ROT_true_peoples_army:0 "真正的人民军队"
ROT_true_peoples_army_desc:0 "我们是一个为人民的公正与生存而战的党，而战争就需要军队。因此，拥有一支与我们思想一致的军队至关重要。我们的国防军已经在南巴驻军暴动事件中证明了他们的忠诚，但我们依然要对他们进行思想上的教育。我们得先保证他们的政治中立与职业军队传统不会丢失，其次我们还需要让他们明白，他们远不只是国家的暴力机器，他们还是人民的卫士，他们必须明白为人民而战到底意味着什么。"
ROT_for_stability_and_development:0 "为了稳定与发展"
ROT_for_stability_and_development_desc:0 "提特兰半岛什么都不缺，却缺少了最重要的一样东西：稳定。没有稳定，经济难以发展。没有稳定，政权永不牢固；没有稳定，人民永无宁日。因此，我们可以认定，在提特兰，稳定高于一切。我们必须树立维稳当头的观念，同时积极寻求发展的机会。毕竟，稳定与发展是相辅相成的，都是我们的革命理想。"
ROT_clean_up_party_discipline:0 "整肃党纪"
ROT_clean_up_party_discipline_desc:0 "无论我们这个党的未来如何，我们都要明白，我们是一个党。我们要想生存，就必须讲纪律。任何人都不能违背元首和党的意志。"
ROT_absorb_opposition_party:0 "吸纳反对党"
ROT_absorb_opposition_party_desc:0 "尽管可能令人难以置信，但事实上，我们并不打算彻底肃清反对党。我们的党纲已经说的很清楚了，我们将与所有人合作。尽管我们会利用执政地位打压这些反对党，让这些党派没有威胁我们的统治的可能。但如果这个国家只有一个党派的话，那么这个党派一定会迅速腐朽堕落——哪怕是我们这样伟大革命党。因此，我们依然允许反对党活动并留有一定的政治地位，并积极寻求与这些党派的合作，在我们并不打算掌控的地方性选举中，我们依然期待这些党派能够起到良性竞争的作用，从而督促我们的党员不要松懈于为人民服务。"
ROT_guild_technical_officer:0 "法团技官"
ROT_guild_technical_officer_desc:0 "为了寻求发展，我们应当尊重并任用更多的技术官僚改进我们的生产技术与管理模式。"
ROT_one_party_one_country_one_army:0 "一党一国一军"
ROT_one_party_one_country_one_army_desc:0 "是时候让党全面领导这个国家的一切了！全民革命运动当然不会是这个国家唯一的党派，但他将永远是这个国家唯一的、绝对的执政党！我们将领导农民、工人、企业、军队甚至是其他的党派！这将让我们的国家真正地团结在一起！"
ROT_institutionalized_corruption:0 "制度化腐败"
ROT_institutionalized_corruption_desc:0 "腐败当然是不好的，但完全没有腐败是不可能的。为了保证腐败不会严重到威胁党和国家的稳定，我们可以稍微修改一下我们的党规党章，将一部分以权谋私的行为合法化，让腐败有一个合法的渠道从而降低腐败对稳定的损害。某种程度上讲，官僚拿企业的钱帮企业办事又何尝不是一种公平交易呢？只要将腐败的损害控制在一定程度内，腐败也可以成为政治与经济的润滑剂。"
ROT_more_practical_revolution:0 "更务实的革命"
ROT_more_practical_revolution_desc:0 "我们党内有太多不切实际的“理想主义者”了，可在这残酷的世界，理想只会为国家带来不必要的麻烦甚至是灾难。提特兰大地多灾多难，到处都闪耀着五彩斑斓的“理想光辉”，可这些理想所引发的争斗反而加剧了人民的苦难。提特兰的历史已经证明了，只有团结与实用主义才能让提特兰迎来新生，让她的人民吃饱穿暖，安居乐业。"
ROT_unforgettable_hatred:0 "不容遗忘的仇恨"
ROT_unforgettable_hatred_desc:0 "来吧，各位同志，靠近点。在狄修斯·格莱昂同志正式得到元首的授权前，我们来温习一下提特兰民族的苦难与仇恨。大家都清楚我们的民族四分五裂，那么是谁造成了这一切呢？1728年，南巴人派来的“共和革命者”靠着南巴给予的资源夺取了起义军的领导权，并违背人民的意愿与坎达德尔八世握手言和，将东提特兰置于南巴的控制下。1923年的解放战争中，提特兰共和国即将打垮暴君时，是牛头人和七河人的援助让溃败的反动贵族挡住了共和军的攻势，牛头人的直接下场更是让我们的先辈一溃千里。从此马加尔斯成为了七河人的农场，当地人稍有不慎就会被拿来肥田。南提特兰人则成为了牛头人的牲畜，牲畜一词从比喻逐渐变成了字面意思。在南巴的授意下，蒙特和韦尔德地区的分离主义者掌控大权，用提特兰语宣称这两个地区不再是提特兰人的土地，现在那里已经成为了人间地狱。\n\n那么，我们要做什么呢？我们的心中只有仇恨，那是不容遗忘、不共戴天的仇恨，提特兰的叛徒，七河的墨精灵，修卡利翁的牛头人以及东边的南巴人都是我们的死敌。只要这些混蛋还有半点威胁我们的能力都是对我们的羞辱！而现在，正是统一全提特兰半岛然后杀光我们的仇敌的最好时机！在复仇的怒火中，一个崭新的大提特兰将浴火重生！"
ROT_military_state_system:0 "军国体制"
ROT_military_state_system_desc:0 "我们的敌人是不会自己死光的，我们想要把他们消灭干净就必须用军队。目前国家最大的目标就是消灭所有的提特兰之敌，因此，国家必须为军队服务，必须尽可能地满足军队一切需要。"
ROT_titran_superiority_theory:0 "提特兰优越论"
ROT_titran_superiority_theory_desc:0 "提特兰人当然是最伟大的民族。我们永远不能忘记提特兰人曾经的辉煌，我们是比南巴人更古老的民族，我们的魔法研究曾领先于世界，南巴地区曾是我们的边疆。然而，一个又一个疯狂而愚蠢的暴君让提特兰帝国不断衰弱，最终变成了现在这个屈辱的模样。但暴君并不能抹杀提特兰人那居高不下的魔法普及率，我们处处都是优秀的法师，这是我们优于其他民族的铁证之一。也许其他民族还没有认识到这一点，但我们将用战争改变他们的想法。"
ROT_make_the_best_use_of_everything:0 "物尽其用"
ROT_make_the_best_use_of_everything_desc:0 "我们的敌人还没有被消灭干净，我们必须让国家的每一点资源都为战争服务。任何物资的浪费与奢侈都是不能忍受的，我们的人民必须为复仇事业做出牺牲，否则，他们要么立刻面对死亡，要么忍受比我们更加残酷的暴政——此言非虚，我们再狠也不至于把他们变成农奴或者送进集中营。"
ROT_decade_total_war_plan:0 "十年总体战计划"
ROT_decade_total_war_plan_desc:0 "狄修斯·格莱昂再次为我们的复仇计划提出了一个建议，我们称之为“十年总体战计划”，我们将建立总体战体制，保证整个国家都变成真正的战争机器以实现军备生产最大化。当然，这一体制绝不可能长久，我们最多只能保证这一体制运行十年，一旦总体战体制无法运行乃至崩溃，我们的经济将坠入深渊，我们有生之年都无法看见其复兴的希望。"
ROT_decade_total_war_plan_tt:0 "§t一旦启动，总体战的车轮在碾碎仇敌之前绝不会停下。如果我们没能及时消灭所有的提特兰民族仇敌并停止总体战的话，后果将极为严重且不可挽回。§!"
ROT_for_the_greatest_titran:0 "为了最伟大的提特兰"
ROT_for_the_greatest_titran_desc:0 "如果我们是卑贱的，那么提特兰自然是最卑贱的。但我们正是拒绝接受这样卑贱的命运才走到今天的！我们是伟大的，我们的家园，我们的祖国自然就是最伟大的！我们将为其献出一切，一切都是为了最伟大的提特兰！"
ROT_will_to_win:0 "意志制胜"
ROT_will_to_win_desc:0 "我们将走向一场无比漫长、无比艰辛、无比荣耀的伟大远征，于此苦旅中，唯有坚忍不拔之意志方能抵达彼岸，大获全胜！我们必须向所有人强调意志的重要性，坚强的意志是我们民族走向荣耀的必要条件，我们不允许任何一个人在战争表现出半点软弱！"
ROT_next_one:0 "下一位？"
ROT_next_one_desc:0 ""
ROT_next_one_tt:0 "§Y后续内容尚未完成，敬请期待。§!"
ROT_advocate_personality_cult:0 "鼓吹个人崇拜"
ROT_advocate_personality_cult_desc:0 "马格尼莫·伊罗莫兹是提特兰有史以来最伟大的领袖，他是提特兰历史上第一个王牌飞行员，还是最富盛名的慈善家，更是全民革命运动这一伟大政党的创始人。所有人都应当将他的思想奉为真理，所有人都应当服从他的指示，所有人都必须拥护他的领导！"
ROT_use_party_contradiction:0 "利用党内矛盾"
ROT_use_party_contradiction_desc:0 "党内总有矛盾，而元首则可以作为超然仲裁者利用党内的矛盾反过来强化自身权威。"
ROT_beautify_war:0 "美化战争"
ROT_beautify_war_desc:0 "我们当然不会吝惜于赞美复国战争的光荣与伟大，更不会隐瞒参加军队可以得到的优厚待遇。我们将开动宣传机器，让我们的人民明白战争是一件光荣且有利可图的事业，从而让更多人自愿参军。"
ROT_helping_hand:0 "救济之手"
ROT_helping_hand_desc:0 "我们仍有许多人民受苦受穷，我们不能视而不见。我们伟大的元首决定成立一个以他为名的慈善组织，专门为穷人提供救济。这将让人民更加感恩元首和国家，永世不忘党的恩情。"
ROT_dagger_in_sleeve:0 "藏于袖中的匕首"
ROT_dagger_in_sleeve_desc:0 "我们永远也不会轻视秘密警察的作用，一个足够优秀的情报机关不仅可以为我们巩固政权，更能够为我们收集作战所需的情报。因此，投入更多资金扩充情报部门是非常有必要的！"
ROT_symbol_of_national_spirit:0 "国家精神的象征"
ROT_symbol_of_national_spirit_desc:0 "我们的元首再伟大也是凡人，他总有离我们而去的一天。可我们的党的执政必须持续千秋万代，只要我们的党还在执政，我们就绝不能忘记我们的元首。为了让元首的思想深植于每个提特兰人的心中，我们必须出版关于元首思想的著作，保证他的思想如同太阳一般永远照耀着我们的世界。我们永远也不会离开他，他已经成为了我们国家精神的象征。"
ROT_reexamine_alliance_relationship:0 "重新审视联盟关系"
ROT_reexamine_alliance_relationship_desc:0 "我们应当尽可能的从我们的左翼盟友中获得更多的好处，更好地发挥这一联盟的作用。"
#目田线#
ROT_restore_capital_order:0 "恢复首都秩序"
ROT_restore_capital_order_desc:0 "我们的人民被全民革命运动这样的激进分子欺骗的太狠了，甚至为他们投下了数百万张选票。因此，作为自由与民主的捍卫者，我们人民自由党挺身而出，与伟大的南巴军人一起进入首都推翻了选举结果。然而，邪恶的全民革命运动分子非但没有投降，还胆敢向我们的正义之师还击，他们的战斗使得美丽的首都满目疮痍。我们必须肩负起民主政府的责任，重建首都的秩序，接着重建整个国家。"
ROT_restore_capital_order_tt:0 "§R温馨提示，这是一个关于帝国主义的自由派走狗的故事，本路线的尽头是当南巴人的走狗，无法保证游戏体验，如有不适请尽快退出及时止损。§!"
ROT_announce_revolution:0 "宣布全民革非法"
ROT_announce_revolution_desc:0 "我们有证据表明全民革命运动在大选中犯下了选举舞弊的卑劣罪行（经过民主决议，该证据暂时不予公开），但幸运的是，人民自由党与南巴驻军在民主将死之际挺身而出，让全民革命运动这样的国家社会主义者悉数伏法。现在，我们已经成为了共和国的合法政府，我们要做的第一件事，便是以执政党的身份宣布全民革命运动的非法，以方便各地军警立刻逮捕首都外残存的全民革命运动成员。"
ROT_rsb_garrison_grace:0 "南巴驻军的恩情"
ROT_rsb_garrison_grace_desc:0 "我们必须永远铭记南巴驻军的恩情，他们在世界大战保护了我们的国家免受列强的毁灭，更是在最近的大选中保卫了我们的国家。我们必须满足他们的一切要求，包括支援他们处于战火中的祖国。"
ROT_rebuild_national_rule:0 "重建全国统治"
ROT_rebuild_national_rule_desc:0 "经济危机与推翻全民革命运动让这个国家的秩序几乎崩溃，我们已经稳定首都，现在必须从首都出发控制整个国家。我们有军队，有首都，有各地建制派的支持，做到这点并非难事。"
ROT_rule_by_force:0 "以暴治乱"
ROT_rule_by_force_desc:0 "乱世就是要对不法分子出重拳，我们的执法机关也不必拘束那么多了，他们将有权随意调查行人的随身物品，遇到抵抗可以大方掏出武器进行预防性射击，怎么方便怎么来。实在不行的话，我们还有民兵和军队。我们有充足的粮食和武力，我们总有办法平息骚乱的！"
ROT_no_talking:0 "“不许乱说话！”"
ROT_no_talking_desc:0 "秩序混乱之时，各种不利于我们和国家的流言蜚语甚嚣尘上。我们当然尊重言论自由，但我们也要让那些造谣生事的无良文人为自己的不当言论负责。也许这些废物文人只是想通过向政府挥拳的方式向政府讨食，但现在国家深处危机之中，我们没有钱能用来堵住他们的嘴。当然，我们会用别的东西堵住他们的嘴。"
ROT_temp_election:0 "临时选举"
ROT_temp_election_desc:0 "我们的议会中有很多议员因为近期的混乱而“永久缺席”了，之前民众选出的全民革命运动也已经被我们宣布为非法了。我们应当召开一次临时选举，尽早地恢复共和国的民主。"
ROT_temp_election_tt:0 "§R当然，赢的肯定是人民自由党§!"
ROT_people_dem_party_gov:0 "人民自由党之治"
ROT_people_dem_party_gov_desc:0 "尽管党内腐败丛生，但人民自由党并非没有梦想。他们梦想着见到一个自由意志与自由市场统治世界的时代，他们认定，将来的世界，定是一个没有共产党、暴君和邪教徒的世界（有时三者可以混为一谈）人民自由党已经为提特兰人民推翻了一个暴君，在不远的将来，他们还会让更多的人摆脱暴政的威胁 。尽管他们的动机不一定纯粹，但他们确实有实现梦想的坚定意志——宁愿忍受人民辱骂也要逼迫他们去为自己实现梦想的坚定意志。"
ROT_cut_excess_expenses:0 "削减多余开支"
ROT_cut_excess_expenses_desc:0 "我们必须解决当下的经济危机，但这需要钱，因此我们必须削减所有不必要的开支。私有化国营媒体与文化产业就是诸多削减政府开支的措施中最受欢迎也最应该执行的。为了自由和经济，我们早就该私有化所有的国营媒体与文化产业了！考虑到国营媒体里的人大都是废物，媒体企业可能会因此破产乃至造成更多的失业，同时也不会有谁会在这种困难年代收购这些企业。但那不是我们这样的自由主义革命者该考虑的，我们没有钱给这帮废物花，就算他们骂的再狠，他们很快会连骂我们的报纸都印刷不了。但如果他们真的有能力撑过这场危机，那我们倒也乐意让他们骂，毕竟他们已经在市场中证明了自己，我们则永远不会为难市场中的生还者。总之，这些事情交给自由市场解决就好。"
ROT_nationalize_titran_railway:0 "国有化提特兰铁路局"
ROT_nationalize_titran_railway_desc:0 "我们当然不喜欢计划经济制度，更不喜欢国有化这个词。但自由市场是宽容的，是容得下部分产业的国有化的。而提特兰铁路局就是当下最该国有化的私营企业。曾经，世界上最大的工业国和最大的原材料产地之间的运输都仰仗着铁路局的铁路，但现在，这两个地方都崩溃了，这使得铁路局的经营状况极其糟糕，股价更是数次跌停。让一个国家的交通命脉交给这样一个摇摇欲坠的私企显然是危险的，我们必须在其破产乃至造成我国交通全面瘫痪之前将其国有化。这将减少我们企业的物流成本，也会帮助我们更好的走出经济危机。由于该企业濒临破产，所以我们不需要太多花费就能实现铁路局的国有化。"
ROT_soothe_rsb_capital:0 "安抚南巴资本"
ROT_soothe_rsb_capital_desc:0 "我们国有化提特兰铁路局的举动终究还是让一部分南巴企业受惊了，我们必须想办法安抚他们，向他们表明这次举动并不是针对南巴企业，而是为了这个国家的经济。只要我们亮出真诚的态度与实实在在的好处，我们就一定能够和这些卓越的企业家达成共识。"
ROT_take_over_non_rsb_foreign_capital:0 "夺取非南巴外资"
ROT_take_over_non_rsb_foreign_capital_desc:0 "我们是很崇拜南巴人，尤其是他们的企业。但是其他国家的工厂与资产就不在此列了。我们会经过民主决议后将其还给提特兰人民，并交由人民中的卓越企业家妥善利用。这将改善政府与私营企业的关系。"
ROT_save_enterprise:0 "拯救企业"
ROT_save_enterprise_desc:0 "经济危机冲击了我国企业，而企业对经济的重要性毋庸置疑。因此，我们必须立刻为企业提供救济，否则我们就绝不可能走出经济危机。"
ROT_enterprise_fair_law:0 "企业公平法案"
ROT_enterprise_fair_law_desc:0 "许多人都认为，现在的劳资关系并不公平，我们必须承认这一点，更重要的是，我们必须要改善这点。我们认为，现在的劳资关系对资本家太不公平了。资本家给了工人工作，甚至还会给工人工资，工人因工作受伤耽误了工作，非但无需向资本家赔偿耽误生产的费用，甚至还敢向老板讨要赔偿。工人用自己人数更多，财产更少这些毫无逻辑可言的荒谬依据要求改善工作条件，甚至还敢组织非法工会使用暴力实现自己的诉求！如果他们的诉求真的那么受欢迎，为什么代表人民的议会会否决他们的提案呢？因此，我们必须从系统上保护资本家，镇压每个无病呻吟又无理取闹的工人，只有这样，我们才能走出经济危机，让市场效率达到最高！"
ROT_white_land_reform:0 "白色土地改革"
ROT_white_land_reform_desc:0 "农业是我国经济的支柱，然而，农村当中还有太多秉持着小农思维与地主思维的农民。他们总是死死抓住土地不放，不愿将其作为生产要素参与到市场的自由流通之中，进而人为提高了我国企业尤其是工业企业的用地成本。我们应当通过土地改革实现土地资本化，减少企业用地成本，让土地如所有的资本要素一样自由流动起来。"
ROT_strengthen_tax_bureau:0 "加强税务局"
ROT_strengthen_tax_bureau_desc:0 "如果时机成熟的话，我们倒是很乐意减少企业税收或者是个人税收。但逃税避税就是另一回事了。我们必须加强税务局，使其有能力对每个税金小偷绳之以法。如果政府连税都收不好的话，哪还有资格说自己能解放提特兰呢？"
ROT_fate_of_financial_group:0 "金融集团的命运"
ROT_fate_of_financial_group_desc:0 "我们的经济危机如此严重的原因之一是因为我们的金融市场缺乏监管，我们必须对金融系统进行大刀阔斧的改革才能度过这场经济危机。"
ROT_deprive_naka_assets:0 "剥夺纳卡教资产"
ROT_deprive_naka_assets_desc:0 "纳卡教是提特兰文化愚昧的具体表现之一，我们必须将这种鼓吹政教合一与极端平等主义的宗教彻底打倒，才能实现文明开化的目标。"
ROT_capital_factor_free_flow:0 "资本要素自由流动"
ROT_capital_factor_free_flow_desc:0 "我们将全面促进自由市场的发展，而自由市场的发展全仰仗于资本要素的自由流动。因此，我们将尽己所能地打通要素流动的堵点，让我们的市场充满活力。自由市场的发展能力毋庸置疑，发展自由市场与自由市场的发展都将使得我们的经济更加公平，更加高效。"
ROT_commercialized_agriculture:0 "商品化农业"
ROT_commercialized_agriculture_desc:0 "我们总是有过剩的农产品，这是勤劳的农民们不能认清市场需求而导致的。在推行土地资本化后，我们终于可以进行农业改革的下一步：商品化农业。分散的土地与农民们将被企业家组织起来，以市场需求为导向生产农产品，并打通销售渠道。这将促进我们的农业现代化，更会实现多元化种植，农民的收入更会因此改善。总之，这是一举多得的美事。"
ROT_transportation_security_law:0 "交通保障法案"
ROT_transportation_security_law_desc:0 "提特兰半岛地形复杂，基建落后。在解放全提特兰的征途中，我们的后勤必须得到保障。"
ROT_consensus_of_the_two_parties:0 "建制两党的共识"
ROT_consensus_of_the_two_parties_desc:0 "我们与民主党有过不少争吵，毕竟在共和国的二百年民主历史上，人民自由党与民主党一直是建制两党，一方登台唱戏时，另一方必须在下面喝倒彩。可我们心里都清楚，我们是一枚钱币的两面，我们都是共和国的民主保障，我们监督彼此的努力是共和国民主高效运转至今的根本原因。现在，我们必须再次开启政治对话，与这个老对手达成基本的共识：捍卫共和国秩序，统一提特兰半岛，维护亲南巴立场，承认当下人民自由党的执政党地位。"
ROT_worship_rsb_stia:0 "崇拜南巴斯蒂亚"
ROT_worship_rsb_stia_desc:0 "南巴斯蒂亚联邦是这个世界上最伟大的政治实体，共和主义的灯塔、工业革命的摇篮、冒险家的故乡、拯救人类的伟大战争胜利者……我们提特兰共和国能够延续至今全都仰仗于联邦的无私援助。尽管联邦因为进步主义者的腐蚀与极端分子的叛乱而分崩离析，我们也依然要记住他拯救人类于魔兽铁蹄之下的光辉胜利，以及为世界带去自由与解放的伟大意志。§C如果此后南巴的灯塔不再闪耀，我们将举起遗落的火炬，为这黑暗的世界点亮一片自由的乐土——那将是我们的故乡，更是所有自由民的家园。§!"
ROT_demean_titran_native_religion:0 "贬低提特兰本土宗教"
ROT_demean_titran_native_religion_desc:0 "我们已经多次批判过纳卡教的落后了，但在我们正式掌权后，我们不介意再正式批判一次。这一次，纳卡教将被彻底视为非法，其教义与思想将被彻底抹除。我们的教育将与愚蠢的纳卡教教义绝缘，在学校这一科学的殿堂中，将永远也不会有纳卡教的一席之地。"
ROT_mission_of_the_republic:0 "共和国的使命"
ROT_mission_of_the_republic_desc:0 "人民自由党坚信，提特兰共和国的使命就是成为南巴人向西传播文明的先锋，即使南巴遭遇危机，他们的信念也不曾动摇。为了让祖国成为南巴人的走狗，为了传播文明开化的理念，为了实现自由主义的伟大梦想，他们将让人民为他们的梦想死战到底，毫不妥协地直面绝望的未来。"
ROT_protect_female_rights:0 "保障女性权利"
ROT_protect_female_rights_desc:0 "为了自由市场能够拥有更多的劳动力，也为了保障公民最基本的工作自由， 我们必须保障妇女的权利，尤其是她们自由工作的权利。一些保守的家庭总是会以女性的身体缺陷与家庭责任为由强行将妇女束缚在家（有时这甚至不是比喻）。我们必须结束这一悲惨的现实。"
ROT_technological_innovation:0 "技术创新"
ROT_technological_innovation_desc:0 "技术创新对人类社会的重要性毋庸置疑。我们将鼓励技术创新，使我国成为一个先进的国家。"
ROT_cultivate_entrepreneurial_spirit:0 "培养企业家精神"
ROT_cultivate_entrepreneurial_spirit_desc:0 "企业家无疑是自由市场中的主人翁，而企业家精神则是现代精神世界中最为耀眼的灯塔。在企业家的勇气、实干与智慧面前，被千万人膜拜千百年的封建帝王思想伴随着他们的暴政被人民扫入了历史的垃圾堆。他们的坟墓将与他们制造的垃圾一样被历史的风无情吹去。在历史之风远去后，唯有企业家精神永存。然而，我们不是企业家，我们是政府，我们能做的是悉心培养提特兰的企业家精神。我们要做的，就是尽可能的减少对他们的干扰，却又能够保护他们免受不法分子的非法侵害。我们相信，只要我们革除腐败，构建良好政商关系、厘清政府与市场的边界，我们就能看到一批又一批的优秀企业家带领我们的经济走向辉煌。"
ROT_free_guard:0 "自由禁卫军"
ROT_free_guard_desc:0 "总统不是皇帝，他不能凭借自己的权力为自己组建一支强大的卫队。然而，总统和议会确实需要保护。我们将利用现代科技无线电而非禁卫军来保护民主与自由。通过遍布全国的无线电，我们将实现信息的高速流通，进而更好的掌控国家。一旦我们的总统与议会真的遭遇了危险， 拥有一个能够一直发声的电台向全国广播将是保卫民主与自由的关键。同时，这也能够改善我们的经济状况。"
ROT_torch_of_freedom:0 "点燃自由的火炬"
ROT_torch_of_freedom_desc:0 "是时候解放全提特兰，为提特兰人送去自由和民主了。但我们肯定不会打无准备之仗，我们将动员国家，亮出共和革命的大旗，很快，我们就会组建起一支无与伦比的现代化军队，碾碎西边的乌合之众。"
ROT_exile_criminals:0 "罪犯充军"
ROT_exile_criminals_desc:0 "在我们进军首都，推翻暴君的征途中，有不少人被我们逮捕。现在战争迫近，我们应当将这些犯人强征入伍，让他们用战斗为自己赎罪。"
ROT_never_forgive:0 "绝不饶恕"
ROT_never_forgive_desc:0 "我们知道共和国并非事事完美，不满共和国的人大有人在。然而，无论共和国有多么不堪，和西边的反动派相比，我们都算是温柔体贴的。至少我们没有真的搞农奴制，也没有搞什么魔权暴政，更没有搞比革命共产主义还要古怪的不知道什么的共产主义。我们发誓，为了提特兰人民的自由与幸福，我们绝不饶恕这些恐怖分子与邪教徒。"
ROT_learn_rsb_tactics:0 "学习南巴战术"
ROT_learn_rsb_tactics_desc:0 "啊，对，我们差点都要忘了，南巴军队不只是来给我们带来自由民主的，还是来帮我们训练军队的。世界上最强国家的精锐部队就驻扎在我们的国土上，我们的共和军应当向他们学习战术，以实现军队的现代化。一支经由南巴训练的军队一定能够摧毁西边的疯子，为提特兰人带来统一与自由。"
ROT_learn_rsb_tactics_tt:0 "获得名为§Y“改革步兵师”§!的编制，编制为§C七步二炮§!。"
ROT_research_rsb_tech:0 "研究南巴技术兵器"
ROT_research_rsb_tech_desc:0 "南巴人武器堪称世界一流，更幸运的是，我们曾经仿制过南巴人的武器。现在，有了南巴军人和南巴移民的鼎力指导，我们将更快地研究出更先进的兵器。有了先进的兵器，我们的军队自然会更加强大。"
ROT_might_of_magic:0 "魔法之威"
ROT_might_of_magic_desc:0 "提特兰的法师可以说是多到了泛滥的地步，我们应当利用起来，为我们的军队增强战斗力。"
ROT_ask_for_help_from_free_country:0 "向自由国家求援"
ROT_ask_for_help_from_free_country_desc:0 "单打独斗永远是下策，我们应当积极向世界上的自由势力求援。"
ROT_artillery_emphasis:0 "注重炮兵"
ROT_artillery_emphasis_desc:0 "还有什么比大炮更能体现南巴战术的美感呢？拥有足够多足够先进的大炮将是我们摧毁敌人的关键。"
ROT_enlarge_titran_gendarmerie:0 "扩充提特兰宪兵"
ROT_enlarge_titran_gendarmerie_desc:0 "在我们进攻的过程中，我们一定会遇到一些藏在群众中的反动武装分子。我们需要一支强大的宪兵队为我们清扫城市与农村中的反动派，进而保证我们的军队得以正常推进。"
ROT_civil_power_is_military_power:0 "民力即战力"
ROT_civil_power_is_military_power_desc:0 "我们想要胜利，就绝不能忽视人民的伟力。我们必须让人民的力量为我们所用，无论他们是否愿意，他们都必须保卫国家的自由。"
ROT_allow_private_enterprise_to_produce_arms:0 "允许私企生产军备"
ROT_allow_private_enterprise_to_produce_arms_desc:0 "战争不只是政府的事情，也是私企的事情。我们不能期望所有的武器生产都应当交给国企。只要给予一点正确的引导与政策上的支持，我们的私企将会立刻投入到军备生产中，进而扩大我们的军备生产能力。"
ROT_military_industrial_complex:0 "军工复合体"
ROT_military_industrial_complex_desc:0 "我们很乐意让私营企业为我们的军队提供军需，这将扩大军备生产的同时促进经济发展。然而，我们不可能天真到让军队和企业在没有我们监督的情况下进行合作与交流。我们应当将政府决策者、军火商和军队结合为一个共同的利益集团并成立相关机构进行合作交流。"
ROT_allow_private_enterprise_to_supply_military:0 "允许私企供应军需"
ROT_allow_private_enterprise_to_supply_military_desc:0 "我们可以让私营企业直接对接军队，为军队提供日常的补给与军需。尽管此举对改善战斗力并无太大帮助，但这很受军官与商人们的欢迎。总之，这将刺激我国的工业生产，并改善军队、政府与企业之间的关系。"
ROT_unbounded_iron_rain:0 "无边铁雨"
ROT_unbounded_iron_rain_desc:0 "没有什么比大炮更能体现现代战争艺术之美了。当现代重型火炮一经问世，一位南巴军事家就断言：世界强国派几艘军舰，在海岸上架起几门大炮就能征服一个国家的时代开始了。我们将尽情发挥我们的工业优势，生产出更多更好的大炮。只要我们能够拥有充足的火力优势，我们就一定能在解放提特兰的战场上无往不利。"
ROT_integration_of_paramilitary_organization:0 "整合准军事组织"
ROT_integration_of_paramilitary_organization_desc:0 "我国境内仍有许多准军事组织，我们必须对其进行整合，做到统一指挥，这将极大地增加我们的预备人力储备。"
ROT_code_carpet:0 "代号：地毯"
ROT_code_carpet_desc:0 "在这个强大法师遍地横行的世界中，刺客总是能够书写历史。我们为什么不组织一支这样的队伍为我们书写胜利的历史呢？嘛，我们当然没有能力和意愿直接刺杀我们的敌对政权的领袖，因为那些“领袖”要么太废物，杀掉反而可能会帮助对方增强战斗力。要么其个人武力太强，刺杀成功率太低。但我们依然可以组织一支装备精良，武力超群，善用魔法的刺客队伍为我们执行秘密破坏任务。在拥有悠久法师传统的提特兰，我们想要做到这一点并不困难。"
ROT_second_liberation_war:0 "第二次解放战争"
ROT_second_liberation_war_desc:0 "同志们！同胞们！我们伟大的提特兰共和国已经从政治动荡与经济萧条中走出。但是，我们的革命还未完成，在国境之外的提特兰半岛，还有数以千万计的提特兰同胞在暴君的铁蹄下受苦。我们必须解放我们的同胞，向西传播我们的民主与自由精神！"
ROT_liberate_south:0 "解放南方"
ROT_liberate_south_desc:0 "还有什么比南方的人类大型集中营更能侮辱共和国的尊严呢？在南方的伊斯恰军官邦，牛头人将我们的同胞当作家畜使用，他们毫无人的权利。我们是提特兰共和革命的长子，更是全提特兰的自由堡垒，我们绝对无法容忍这样的惨剧继续在提特兰大地上演。我们将一劳永逸地将牛头人全部赶下海，为南方的同胞带去自由和解放！"
ROT_contact_free_warriors:0 "联系自由战士"
ROT_contact_free_warriors_desc:0 "无论我们怎么评价伊斯恰军管区的牛头人，我们都要明白，伊斯恰的牛头人军队不是什么不入流的海外卫戍部队，而是修卡利翁这一世界强国的一流常备军，其领袖更是战争奇才。我们想要独自对抗这样的部队注定无比艰难。但是，得道者多助，失道者寡助。在解放故土的道路上，我们并不孤单。伊斯恰军管区那惨无人道的集中营政策并没有让人民屈服于殖民者，反而使得伊斯恰地区出现了一支英勇不屈的人类抵抗军。我们将积极联系这一组织，让他们在牛头人的后方配合我们与牛头人的作战。我们绝不会辜负这些自由战士的希望，我们将用全面的胜利为提特兰的奴役史画上句点。"
ROT_no_mercy:0 "一个不饶"
ROT_no_mercy_desc:0 "我们是自由主义者，我们深知宽容的社会风气对民主体制来说是必需的。然而，我们对牛头人殖民者的任何一点宽容都是对我们人民的背叛。我们必须用一切手段抹除这些殖民者和殖民地残余，我们还要对饱受奴役的同胞提供救济——我们是自由派，我们讨厌社会福利并不意味着我们真的没有良心，会对这些可怜人视而不见。我们的瑟庞教盟友也会组织救济，企业家们也已经准备好开始对南方地区的重建与开发。我们必须尽快开始我们的工作，我们不能让被打败的牛头人有逃跑的机会，更不能让被解放的同胞继续受苦。"
ROT_move_west:0 "向西进发"
ROT_move_west_desc:0 "坎达德尔地区是世界大战的主战场之一，也是我们的伤心地。我们的旗帜曾在格诺亚飘扬，最终却因为帝国主义者的干涉一溃千里，失去了统一提特兰的机会。但现在，正是统一提特兰的又一个机会，我们不曾忘记共和国的使命：为南巴人向西传播伟大的自由共和主义理念，我们将摧毁一切胆敢阻挡我们的民主之敌，直至提特兰完全沐浴在自由与文明的光辉之中。"
ROT_thorough_revolution:0 "彻底的革命"
ROT_thorough_revolution_desc:0 "格诺亚，宏伟的魔导都市，也是历代王公贵族的首都。这里无疑是全提特兰最肮脏，最丑陋的城市，这里的每个居民都是狂教徒与旧贵族，甚至是更糟糕的共产党。我们必须要将共和革命进行到底，将这处处皆是封建残余文化标识的罪恶之城烧成灰烬！"
ROT_destroy_fortress:0 "摧毁堡垒"
ROT_destroy_fortress_desc:0 "北方的蒙特韦尔德联盟从一开始就不应该诞生，这里本就应当是我们共和国的一部分。然而，分离主义者打着所谓自由独立的旗号将这里从提特兰大家庭中独立了出去。现在，北方已经被这些分离主义者变成了人间地狱。我们必须将其解放，使其回归到共和国政府的统一管辖之下。"
ROT_remember_the_wilds_of_magal:0 "勿忘马加尔斯的沃野"
ROT_remember_the_wilds_of_magal_desc:0 "马加尔斯的沃土令人难以忘怀，不仅是因为黑土地的高产量，更是因为肥沃的土地之下是无数农奴的尸骸——字面意义上的。当地人发明出了一种诡异的魔法，能够用尸体做成肥料肥田，提高农作物的产量。当奴隶主们意识到杀死农奴并非毫无回报时，人道主义灾难便泛滥成灾。\n\n我们要做的就是解放这一肥沃的黑土地，我们的使命就是如此，为南巴人向西传播自由共和主义，直到流尽最后一个提特兰人的鲜血。"
ROT_comfort_the_suffering_north:0 "告慰苦难的北方"
ROT_comfort_the_suffering_north_desc:0 "北方的蒙特韦尔德联盟从一开始就不应该诞生，这里本就应当是我们共和国的一部分。然而，分离主义者打着所谓自由独立的旗号将这里从提特兰大家庭中独立了出去。现在，北方已经被这些分离主义者变成了人间地狱。我们必须将其解放，使其回归到共和国政府的统一管辖之下。"
ROT_age_of_civilization:0 "文明开化的时代"
ROT_age_of_civilization_desc:0 "现在，我们已经成为了提特兰半岛上唯一的政权。我们完成了共和革命，将共和主义理念传播到了整个提特兰半岛。在解放战争之后，我们必须尽快将愚昧落后的提特兰带入一个文明开化的时代，实现制度与思想的统一与社会经济的进步。"

###GUI###

###变量###

###事件###
ROT.1.t:0 "公民运动会"
ROT.1.d:0 "公民运动会是国际公民运动委员会主办的世界规模最大的综合性运动会，每两年一届，会期不超过30日，是世界上影响力最大的体育盛会。\n\n“公民运动会”的概念，最早由提特兰共和国的国父赫克曼·丹特创立，其本意是希望通过国际运动竞赛树立公民意识，强健公民体魄，促进各国人民之间的相互了解，维护世界和平。在丹特死后，共和国只办了一届便不再举行。1900年，南巴斯蒂亚联邦提出举办现代公民运动会的倡议。之后成立国际公民运动委员会。尽管委员会宣称所有国家都可以前来参会，但前提是，参赛选手只能是人类或是与人类相近的物种（比如矮人、精灵、半人马等）。而且，国际公民运动委员会常常抵制与南巴联邦交恶的国家参加运动会。因此，大部分情况下，只有南巴以及南巴的友邦愿意参赛。\n\n1991年，在我国外交官巴斯塔·伊万·安科林的努力下，1998年诺兰迪亚公民运动会申办成功，提特兰共和国获得1998年公民运动会的主办权。共和国首都诺兰迪亚将在1998年举行公民运动会。时隔两百年后，公民运动会再次于他的发源地举行。运动会开幕式即将开始，我们不能辜负这历史性的国际盛会。哪怕倾尽所有，我们也要向世界展示提特兰最好的一面！"
ROT.1.a:0 "我们不会让任何人失望！"

ROT.2.t:0 "别样的革命者"
ROT.2.d:0 "在无数全民革命运动新成员的掌声中，马格尼莫·伊罗莫兹走上了临时搭建的演讲台。所有人的目光都被他的微笑牵引，就连呼吸也随着他的胸膛起伏。看向台下数以百计的热血青年，马格尼莫开始了他的演讲：“今天，将由我举行你们的入党宣誓仪式。仪式结束后，各位将成为光荣的全民革命运动的一员，成为一名革命者。那么，我相信各位都想过这样的一个问题：革命者应当是什么样子的？是劫富济贫的侠盗？是巧舌如簧的学者?还是固执己见的巫师？不，都不是。提特兰共和国不需要这样的革命者，提特兰共和国要的是千千万万个实在的人，能够聆听人民的诉求，然后做出行动回应，并许诺美好的未来的革命之人！”\n\n“您就是这样的人！”一个新党员喊道。“革命者可不能在革命胜利前就给活着的同伴盖棺定论啊！”马格尼莫笑着回应了他，激起了一阵短促而真诚的掌声。“我尊重革命者一词，却鄙视那些所谓的‘共产主义革命者’，比如‘特尼安赤军’、‘白杨同盟’。一群只想着暴力与掠夺的匪盗怎能带来新的社会与新的生活呢？我们不能那样，我们要用沟通与合作社实现各个阶级的和解，再用教育与发展实现民族的团结。最后用强大的军队实现提特兰半岛的统一，进而使得提特兰民族再次屹立于世界民族之林。当然，我们得先掌权才能亲手实现这些革命性的愿景。这条道路必然困难重重，可困难又怎能剥夺提特兰人对民族复兴的渴望呢？ 全民革命运动正是被渴望复兴的提特兰人送上议会的议席的啊！”\n\n人如潮涌，掌声雷动。待声浪稍歇，马格尼莫继续发言：“最后我必须提醒各位，在这个世界，誓言是有力量的。如果各位都下定决心要为了所有人而革命的话，就让我们开始宣誓吧——我宣誓！”\n\n“我宣誓！”\n\n“我坚信，提特兰必将统一的命运。”“我坚信，提特兰必将统一的命运。”\n\n“我是团结与友爱的战士，是分裂与痛苦的死敌！” “我是团结与友爱的战士，是分裂与痛苦的死敌！”\n\n“我属于劳动者，我是全民革命运动的一员，我将尽我所能服务人民，！” “我属于劳动者，我是全民革命运动的一员，我将尽我所能服务人民！”"
ROT.2.a:0 "在民族沉沦的年代，仍有人心怀复兴的希望"

ROT.3.t:0 "坦诚相待"
ROT.3.d:0 "“……所以，您的意思是说，全民革命运动内部依然有人对与友爱会的联盟表示异议？” 马格尼莫·伊罗莫兹那堆满微笑的面容皱了皱眉。“是啊。“美拉德·贝罗克微笑着放下了手中的水壶：“说实在的，我本以为您的意见就足以把他们镇住呢。”\n\n“嘛，我是能让他们服从，但没法改变他们的想法。”马格尼莫·伊罗莫兹耸了耸肩，“党内反对您这样的社会世联主义者的右翼民族主义者多的是，他们也就是在我的命令下暂时装出一副愿意和友爱会携手同行的样子，但在暗地里，阳奉阴违的事情多了去了，这您应该也很清楚。不过我敢说，友爱会里也有厌恶我们这些民族主义者的人吧？”\n\n“是啊，真是令人感叹啊，我们一起建设地方合作社、筹办乡村诊所、为工人游行、帮农民打官司、参与议员选举……明明合作成果如此丰富，却还是没法彻底消除双方之间的偏见。” 美拉德·贝罗克微笑着摇了摇头。\n\n“不过，您既然提出了这个问题，就表明您应该也有些办法了吧？”“确实如此。尽管我们之间合作颇多，但大部分情况下，我们都是在为改善人民生活条件或是为全民革命运动竞选而合作。双方成员针对彼此之间的交流并不多，如果我们能够想办法让双方成员更多的接触彼此的话……“\n\n“听上去像是要开个两组织间的大派对。”马格尼莫笑着调侃道。“那不够，我在想，我们友爱会是否可以组织一支专门为全民革命运动成员服务的医疗队伍，比如让我成为您的私人医生。”美拉德的样子不像是在开玩笑。瞬间，马格尼莫所有礼仪性的笑容都消失了：“不行。这和……”美拉德则笑着打断了他的话，继续说道：“我知道您在担心什么，如果您真的希望我们的合作更加紧密的话，您的担心就只有一个，那就是担心我看穿你的健康状况——恕我直言，我已经看出来了，您的精力与健康状况根本没有对外界声称的那样优越，我甚至可以说，您是个精疲力竭的病人，健康状况令我担忧。”\n\n马格尼莫沉默良久后，自嘲似的轻声笑了出来：“对，也对。我早该想到的，您是全提特兰最优秀的全科医生，这种级别的化妆肯定瞒不了您。既然已经被您看穿了，作为对您隐瞒的补偿，就让我与你坦诚交代吧，我——确实很累。那副精力充沛的样子完全是靠着化妆与演技硬撑过来的。”"
ROT.3.a:0 "谎言无法维持时，不妨试着坦诚交代 "

ROT.4.t:0 "坦诚相待"
ROT.4.d:0 "“我懂你的意思，一个精力充沛的美男子肯定比疲惫不堪的瘦弱男性更吸引人。不过您的疲惫很大程度上是因为长期缺乏睡眠，您为什么不能试着多休息呢？”\n\n“因为我是个革命者，活的很着急啊。”马格尼莫嗤嗤的笑叹道，“我曾和我的亡妻约定过，要一起为提特兰民族统一奉献终身，一起见证提特兰民族的统一。现在她不在了，哪怕我只能完成约定的一半，我也要带着她的那份加倍地奋斗。而且，提特兰共和国长期被建制两党把持，作为一个反建制的第三党，我必须满足人们对于一个另类的反建制领袖的一切幻想才能让他们愿意把留给建制派的选票投给全民革命运动。这要耗费的时间和精力可太多了。最重要的是，我是个革命者，我有预感，提特兰命运的转折点即将到来，为了保证我们可以在这个转折点中有能力抓住改变民族命运的机遇，我实在是夜不能寐啊。”\n\n美拉德惊诧地听完了马格尼莫的自白，他并没有想到对方竟会如此真诚，为了回应这份真诚，美拉德紧紧地握住了他的手：“您放心吧，我提出这一想法时完全没有恶意，只是由衷地担忧您的健康并期望加强双方合作而已。您的动机令人敬佩，您的秘密我将发誓严守。作为一名医生，我曾立誓守护每个病人的秘密。如果您能够答应我的提议，允许我成为您的私人医生的话，作为提特兰最优秀的治愈术士兼医学专家，我将确保您拥有更加充沛的精力。我甚至可以出具一份关于您身体健康的证明，以向全国表明全民革命运动的领袖确实是个精力异于常人的卓绝之人。”\n\n马格尼莫几乎是要放声笑出来了：“您确定吗？也就是说，这次……合作中，我几乎是无本万利啊？您是在用您的名誉为我的表演作保。”美拉德没有回答他，而是拿出了早就准备好的医疗器械：“如果您答应了的话，就过来做个体检吧。我就算说谎也要根据实际情况说。”\n\n七天后，美拉德对外宣布：马格尼莫·伊罗莫兹确实拥有卓越的体质。"
ROT.4.a:0 "于是，双方合作愈发紧密"

ROT.5.t:0 "处理工人合作社"
ROT.5.d:0 "目前，全民革命运动与友爱会在共和国内掀起了一阵“工人自治合作社”的热潮。这些右翼分子与左翼分子破天荒地达成了共识，鼓励工人和农民组织起自己的自治组织。而全民革命运动与友爱会则为他们提供技术支持与法律辩护，比如提供医生与律师等人才。这为他们赢得了巨大的声誉。客观来讲，目前他们的运动并没有对共和国造成什么损害，甚至还在一定程度上减少了暴力犯罪事件，为共和国提供了稳定与秩序——这是共和国最缺乏的东西。\n\n但是，也有人认为，这些极端分子今天能组织群众自己创造秩序，明天他们就能组织军队威胁共和国的国家安全。我们是否要干涉这些合作社呢？"
ROT.5.a:0 "这对经济来说分明是大好事啊！"
ROT.5.b:0 "你们果然是万恶的左翼分子！"

ROT.6.t:0 "新博物馆"
ROT.6.d:0 "一年前，为了名望，进而提高自己的支持率，人民自由党总统候选人巴斯塔·伊万·安科林决定资助主题为南巴与提特兰关系史的玛丽安博物馆的建设。而现在，这座新博物馆业已建成，巴斯塔则理所当然的出席了博物馆的开业典礼。并在典礼上发表演讲致辞。他的演讲在现场得到了所有人的掌声。\n\n然而第二天，他便成为了所有非自由派报纸的取笑对象。尽管他早已习惯了民族主义者对他的讥讽，但他还是摊开报纸认真地看了下去：\n\n《人民自由党总统候选人的演讲：纪念南巴斯蒂亚的恩情！》\n“是啊，我们确实欠南巴的恩情啊？”巴斯塔疑惑地看着这篇文章的标题，想不通为什么这篇文章为什么要讥笑他的观点——这难道不是事实吗？\n《我们是未开化的土著吗？巴斯塔！》\n“对啊，我们提特兰人就是未开化的土著啊。当然，相比于西边的军阀政权，我们倒也算的上是半开化了。”\n《玛丽安博物馆前的演讲：提特兰的耻辱》\n“哦哦，原来这些人是觉得我歌颂南巴圣女玛丽安解放提特兰是在美化南巴侵略啊？这可就更奇怪了，难道在南巴治下不是一种幸福吗？我们今日的面包与自由，不正是依赖着南巴的保护吗？”\n\n消遣时间就此结束，巴斯塔满不在乎地放好了这些报纸，暗自嗤笑着这些民族主义者的愚蠢与断章取义：“他们觉得我是在贬低全体提特兰人的人格，不配做下一任总统吗？真是可笑，我又没说提特兰人永远不可能走向文明。我已经说的很清楚了，提特兰人事事落后于南巴是事实，但承认这点又算什么耻辱的呢？那可是南巴！全世界最强大的人类国家！提特兰人只要紧跟南巴人的脚步脚踏实地地努力生活，终究会有步入文明社会的一天的——我这明明是在充满热情地盛赞着提特兰民族啊？这些民族主义者为什么就是不满意呢？这些民族主义者就该被扔到西边的坎达德尔和牛头人的集中营看看，没有南巴保护的提特兰人有多悲惨。”"
ROT.6.a:0 "“算了，任他们说吧。只要南巴人还在，总统就一定是我。”"

ROT.7.t:0 "反驻军游行"
ROT.7.d:0 "“女性受辱，就是提特兰受辱！”\n\n“交出强奸犯！交出凶手！”\n\n在南巴联邦驻军军营外，数以千计的民众高声呐喊着，抗议着这些南巴士兵的强奸暴行——提特兰共和国确实是在南巴联邦的保护之下，但他的人民却被这些南巴的兵痞侵犯着。而军营内的南巴联邦驻军对此毫不在意——他们不仅会保护提特兰共和国免受他国进犯，强奸当地妇女时还会给钱，真想不明白这些提特兰人还有什么不满的。于是，他们联系了当地警方，要求他们处理好这些不知感恩的提特兰人。\n\n当地警方展现出了惊人的高效，警方很快就挡在了示威民众面前并鸣笛示警。一个似乎是领头的警官用喇叭向人群喊话：“罪犯已经伏法了，各位可以回去了！”\n\n“你放屁！别以为我们不知道，那些罪犯被你们带走后半点惩罚都不会有！”\n\n“你们冲击军营的行为已经危害到了国家安全，这是重罪，请你们立刻离开！”\n\n“不交出那些罪犯，我们就绝不离开！”\n\n谈判破裂了。警察们抬出了机枪（幸好之前增强了警力，他们才有这样的火力配置），在数次警告无果后他们开始扫射游行群众。结果是，这个国家在短期内再也不会有反对驻军的游行了。军营里的联邦士兵们对此已经习以为常，并决定在训练结束后去军营外好好“消费一下”以报答这些警察的努力。"
ROT.7.a:0 "提特兰妇女应当体谅并尊重这些保卫国家的战士 "

ROT.8.t:0 "圣地纠纷"
ROT.8.d:0 "纳卡圣城乃是瑟庞教与纳卡教的圣地。然而，由于两教关系恶劣，两教教士常常在圣城大打出手。瑟庞教背靠南巴，所作所为无比嚣张。而纳卡教则组织了名为“圣城之子”的武装作为回应。为了共和国的秩序，我们必须做点什么。按理说，我们应当公平地惩罚每个挑起争端的闹事者。但是，考虑到共和国是一个亲南巴的世俗政权，共和国不得不考虑具体如何执法，要不要为某一宗教开“绿灯”。"
ROT.8.a:0 "让瑟庞教的传教士收敛点"
ROT.8.b:0 "纳卡教的狂信徒必须得到惩罚"
ROT.8.c:0 "再闹事就通通抓起来！"

ROT.9.t:0 "圣城之子"
ROT.9.d:0 "“我们是圣城之子，是侍奉穆勒斯的武装，服从神权议会的领导，保卫着圣城的崇高。”\n\n“提特兰已被封建迷信和资本主义贪婪笼罩，在穆勒斯的引领下，我们必将提特兰从深渊中拯救出来。很快，穆勒斯将遣祂的天使来到我们的国。届时，信祂的都将得救。不信祂的，要被淹没于洪流。”\n\n“今日我们将于瑟兰诺的南巴裔社区审判瑟庞教的异教徒。以后也还会有。”\n\n“每杀死一个特尼安人，穆勒斯都会发笑。每杀死一个异端，提特兰就离幸福更进一步。每杀死一个异教徒，真理的太阳就愈发明亮。只有将瑟庞教驱逐出去，国家才会摆脱封建迷信，穆勒斯才会赐予我们曾经拥有的幸福——属于虔诚之人的幸福。”"
ROT.9.a:0 "恶意与疯狂正在蔓延……"

ROT.10.t:0 "经济萧条波及我国"
ROT.10.d:0 "中巴斯蒂亚联盟乃是全世界最大的工业原材料产地之一，中巴的解体对南巴经济圈各国造成了极为强烈的经济冲击甚至是社会动荡，我们也不可避免地被波及了。我们的经济遭受重创，就连一向跋扈的外资也有了萧条的景象，更不用说我们脆弱的民族资本了。"
ROT.10.a:0 "南巴佬呢？中巴佬到底在干什么！"

ROT.11.t:0 "提特兰之秋"
ROT.11.d:0 "南巴斯蒂亚共和国陷入内战，南巴斯蒂亚联邦解体。这一爆炸性的事实使得现有国际格局天翻地覆，也使得我们的共和国摆脱了南巴的控制。更幸运的是，修卡利翁同盟与七河联邦最近也不太平，无暇干涉提特兰半岛事务。也就是说，这正是提特兰共和国统一提特兰民族，完成共和革命先烈遗愿的绝佳时机！\n\n民族主义者们比任何人都要早的看出了这一点，于是他们集会游行，庆祝着提特兰共和国摆脱了南巴的控制，第一次迈向真正的独立自主，民族主义政党全民革命运动的支持率更是因此狂飙猛进。这与哭的死去活来的亲南巴建制派形成鲜明的对比：南巴的崩溃极大地改变了提特兰共和国的政治形势，受南巴资助的建制两党威望可谓一落千丈，曾经认可亲南巴政策的选民们一下子就放弃了亲南巴想法（毕竟南巴都陷入内战了），转向了民族主义的怀抱。人民自由党那“武装援助南巴，平定南巴赤患”的滑稽论调更是让那雪崩的支持率跌至谷底。\n\n在游行中，一位民族主义者登台高呼：“南巴的崩溃使我的心欣喜若狂。我知道，南巴曾是我们的盟友。我清楚，南巴曾数次拯救共和国于危难。我明白，南巴士兵在这片土地上流下的每一滴血的价值。但我的心还是感到了欢乐，一股巨大的欢乐！”\n\n在欢呼的人潮之外，南巴驻提特兰共和国军团正忧心忡忡地看着这一切——他们至今未能收到回国参战的命令。他们那千里之外的家人生死未卜。"
ROT.11.a:0 "人类的悲喜并不相通。"

ROT.12.t:0 "前往投票点"
ROT.12.d:0 "选举日迫近，各地投票点自然是热闹非凡。但如果人民自由党员们愿意多观察一下的话，他们就会发现，今年投票的人未免也太多了。很快，他们就发现了这点，并找出了原因——全民革命运动动员了平时因路途遥远或交通不便的民众前来投票（其中大都是农民），并自行出资调来卡车等交通工具帮助他们前往投票点。因此，人们完全可以预计今年投票率将大幅上涨。同时，全民革命运动领导人旗下的伊罗莫兹汽车公司也因为大量增加的卡车订单得到了可观的收入，卡车司机工会则在帮助民众前往投票点的行动与全民革命运动之间的联系更加紧密。\n\n尽管人民自由党对全民革命运动厌恶至极，但也不得不承认这样的手段是合法的。于是，他们也效仿此法，试图让平时因路途遥远或交通不便的民众前来投票。但问题在于，这些人大都是农民，而近年来农民对人民自由党这样的建制派毫无好感。"
ROT.12.a:0 "农民、卡车司机工会与伊罗莫兹汽车公司之间的完美合作"

ROT.13.t:0 "人民的选择"
ROT.13.d:0 "“……总之，马格尼莫和他的党具备专制的所有要素。我奉请各位不要忘记，共和国是提特兰民族走向自由最后的希望了，如果连我们也无法守护民主与自由的话，提特兰民族的自由还能指望谁呢？我恳请每个共和国的公民不要忘记国父丹特的伟大理想——友爱与自由！”自由主义者忧心忡忡的写下了又一篇农民看不到的雄文。\n\n“南巴倒台了！按你的意愿投票吧！南巴倒台了！按你的意愿投票吧！”民族主义者兴高采烈地将这句标语贴在了共和国的每一个角落——当然，这并不包括南巴驻军的军事基地。\n\n“让我们回归正常吧……”一名法官在听完了一位神权议会成员的疯狂自白后疲惫地做出了判决。 但他不知道的是，本地监狱已经被神权议会分子摧毁。与此同时，一位神权议会的审判官正在前往他所在的法庭，准备审判他的罪恶。\n\n“我们将保证提特兰人民将永享荣耀与幸福，在十年内走向统一与强大！”马格尼莫仍在为了竞选而在城乡之间奔走。而他唯一的竞争对手——巴斯塔却仍然沉浸在南巴联邦解体的悲痛中无法自拔。\n\n“你部现在的任务是，留在提特兰，确保这个国家不会因为选举而离开亲南巴分子的掌控。为此可以采取一切手段。”南巴驻提特兰军团司令德文斯克·奥顿惊诧地看着祖国的最新指示，苦苦思索着该怎样安抚祖国陷入内战却无法回家的战士。\n\n在提特兰的又一个秋天中，命运之风正于范弗里特海湾怒吼。迫在眉睫的变革在这次大选中体现的淋漓尽致。最终，在国父与穆勒斯的无声注视下，在万千英雄安眠的沃土上，在各方民众的勾心斗角中，在轰然倒塌的帝国残骸旁，提特兰共和国公正地宣告了人民的选择：\n\n全民革命运动赢得大选，马格尼莫·伊罗莫兹将成为下一任总统。"
ROT.13.a:0 "提特兰人打开了又一个魔盒"

ROT.14.t:0 "人民自由党反对选举结果"
ROT.14.d:0 "全民革命运动在选举中大获全胜，成功拿下了议会多数席位。而人民自由党则认为全民革命运动涉嫌选举舞弊，拒绝承认选举结果。考虑到两党意识形态差距巨大，人民自由党的反对倒也在全民革命运动的意料之中。但这些自由派的底线之低还是超出了全民革命运动的想象：有消息称，人民自由党正在与首都卫戍部队与南巴驻军接触。\n\n共和国法律规定，选举结果出炉45天后才到胜选者正式就任。很明显，全民革命运动能否活到那一天已经成为了一个问题。"
ROT.14.a:0 "你们不能只有在赢的时候才支持民主！"

ROT.15.t:0 "纳迪欧的进军"
ROT.15.d:0 "最终，人民自由党用武装政变表达了对选举结果的否认。纳迪欧部队正在进入首都“清扫“全民革命运动。幸运或不幸的是，全民革命运动的准军事组织在这几天内大量涌入了首都，而首都内部也有一部分官员与警察支持全民革命运动。因此，全民革命运动确实拥有一战之力。面对纳迪欧的进军，全民革命运动甚至组织了一支精锐小队试图进行斩首行动，试图从一开始就拿下作为指挥官的纳迪欧。全提特兰最优秀的治疗术士美拉德加入了这支小队，这使得斩首行动的概率大大增加。"
ROT.15.a:0 "全民革命运动守住了首都！"
ROT.15.b:0 "纳迪欧夺取首都！"

ROT.16.t:0 "南巴驻军向首都进军"
ROT.16.d:0 "南巴斯蒂亚驻提特兰军团乃是南巴斯蒂亚共和国军队中的精锐，平时驻扎于提特兰共和国并负责警戒与防卫工作，使这个国家免受其他国家尤其是牛头人的侵扰。然而，为了南巴在提特兰的利益与自己的平安，他们决定从守护者转变为侵略者，帮助人民自由党这些民族叛徒夺取提特兰共和国政权。\n\n在平时，这支部队的战斗力足以轻易拿下整个提特兰共和国。但问题在于，再优秀的军队也是人类，需要后勤保持战斗力。而现在，这些可怜的南巴军人的祖国正陷入内战之中，而他们则受困于贫瘠的提特兰一角，根本没有后勤可言。他们现在完全没有稳定的补充武器弹药的办法，连口粮也只能通过掠夺当地群众补充。这支军队是典型的孤军，完全没有任何统治根基可言，与他们合作的提特兰叛徒也是一群人人喊打的废物，根本没法在他们占领的地区中建立有效的统治并补充人力与物资，因此，这支军队的弹药可以说是打一发少一发，人力是死伤一个少一个。再加上祖国陷入内战，他们的思乡之情愈发浓重，整个部队士气愈发低迷，这一切使得他们的战斗力大打折扣。\n\n而我们——尽管我们掌控了首都，但首都之外的各地官僚和军队都在观望，其中没有多少人愿意为了保护我们这个饱受争议的民选政府而与强大的南巴驻军为敌。但人民没有袖手旁观，我们是民选政府，我们有民兵和党员，也不乏社会精英的支持，我们可以动员人民组建民兵阻滞敌军前进，并尽可能的拉拢还在观望的地方官员和军队，同时将首都改造为决战的堡垒。总之，敌人无比强大，但只要我们利用好手上的资源，争取到足够多的时间与支持，我们就一定能见到胜利的黎明。而胜利的奖品无比丰厚——战胜不可一世的帝国主义军队将让我们赢得全提特兰的爱戴与敬畏，这将让我们掌控全提特兰。"
ROT.16.a:0 "放马过来吧！帝国主义的鬼魂！"

ROT.17.t:0 "揭下伪装"
ROT.17.d:0 "议会里嘈杂的声音挑动着波瓦尔·塔朗诺的神经，试图把他的神智引向和议员们一样的兴奋之中。民主党和人民自由党的议员们都很激动——那些“篡夺国家”的混账民族主义分子终于玩完了！议员们各抒己见时从未像今天这样激动，就仿佛他们不是在讨论政变善后事宜，而是在推定提特兰统一后的建设方略一般。\n\n波瓦尔作为政变的胜利者的一员自然也很激动，不过他很好的把这些情绪压在了心中，在议员们的眼里他仍然沉着。他知道，推翻全民革命运动只是第一步，接下来才是重头戏。\n\n波瓦尔站起身，清了清嗓子，准备发言，但一阵绚烂的光芒打断了他的情绪。\n\n光芒的来源是议会的大门，绚丽多彩的魔法效果让议员们不得不捂住眼睛。待到光芒消失后，大门已然消失不见，首都卫戍部队司令、提特兰共和国第一战法师、推翻全民革命运动的大功臣纳迪欧·恩查特正带着全副武装的部队和一群在议员们看来奇装异服但同样手持兵器的纳卡教徒趾高气扬地走进议会，并迅速包围了所有议员。\n\n“纳迪欧，你要干什么！这里是议会！”一名议员惊诧地起身责问者纳迪欧，但对方仿佛没有看见他一样，自顾自地高声宣布道：“先生们！你们可以回家了——我宣布解散议会！”\n\n议会中陷入了短暂的寂静，随后便被言语构成的风暴席卷，有人震惊、有人愤怒、有人迷茫。而纳迪欧始终用那副高高在上的表情看着眼前反应各异的人们，目光中不乏轻蔑。\n\n还不如那些左翼分子——这便是纳迪欧在心中对他曾经效忠的对象的评价。至少民族主义者还有能力威胁他的性命，而眼前这些跳梁小丑们只会叫嚷。\n\n纳迪欧抬起手轻描淡写地召唤了一枚绚丽的法球打向天空，一声巨响之后，阳光便透过天花板照在了议员们惨白的脸上。他们终于反应过来，他们手无寸铁，而包围了他们的人全副武装。\n\n纳迪欧笑了，这就是他在镇压全民革命运动时感悟到的真理——他有力量，有全提特兰无人能及的力量。意识到这一点后他才发现，他曾效忠的对象是那么的渺小与脆弱。 “我再说一次——我宣布解散议会，你们可以滚蛋了。”纳迪欧的话语更加轻蔑，而议员们再无人敢于与他对峙。\n\n波瓦尔颓然地跌坐回椅子上，他想起了自己对纳迪欧·恩查特的信任，还有之前特务交给他的关于“纳迪欧·恩查特的异常行踪”的报告。他感觉一切都仿佛无比的荒谬，自己仿佛被抛进了巨大的风暴，一同被抛入的还有本就因为第一次政变而濒临破碎的提特兰的民主，或许还有提特兰的未来。"
ROT.17.a:0 "引狼入室，自讨苦吃"

ROT.18.t:0 "南巴驻军的进军"
ROT.18.d:0 "南巴斯蒂亚驻提特兰军团乃是南巴斯蒂亚共和国军队中的精锐，平时驻扎于提特兰共和国并负责警戒与防卫工作，使这个国家免受其他国家尤其是牛头人的侵扰。然而，为了南巴在提特兰的利益与自己的平安，他们决定从守护者转变为侵略者，帮助人民自由党这些民族叛徒夺取提特兰共和国政权。\n\n在平时，这支部队的战斗力足以轻易拿下整个提特兰共和国。但问题在于，再优秀的军队也是人类，需要后勤保持战斗力。而现在，这些可怜的南巴军人的祖国正陷入内战之中，而他们则受困于贫瘠的提特兰一角，根本没有后勤可言。他们现在完全没有稳定的补充武器弹药的办法，连口粮也只能通过掠夺当地群众补充。这支军队是典型的孤军，完全没有任何统治根基可言，与他们合作的提特兰叛徒也是一群人人喊打的废物，根本没法在他们占领的地区中建立有效的统治并补充人力与物资，因此，这支军队的弹药可以说是打一发少一发，人力是死伤一个少一个。再加上祖国陷入内战，他们的思乡之情愈发浓重，整个部队士气愈发低迷，这一切使得他们的战斗力大打折扣。\n\n而我们——尽管我们掌控了首都，但首都之外的各地官僚和军队都在观望，其中没有多少人愿意为了保护我们这个军政府而与强大的南巴驻军为敌。我们并非毫无胜算——全国最强的战士纳迪欧领导着我们，神权议会的战士也将为我们而战。在为提特兰命运而战的征途中，穆勒斯也会赐下祂的恩典。"
ROT.18.a:0 "在政治中，强大的个人武力极有利于政变与反政变。"
ROT.18.a.tt:0 "§R从阴影中走出，进入颤动的空气里。于是，你来到了无光的一隅。§!"

ROT.19.t:0 "新调令"
ROT.19.d:0 "“街上到处都是赤党和民族党人扔的宣传册，像是落叶一样堆在电车过道之间发臭。所幸新市长老爷部署了更多警察，估计可以好好治治这些好吃懒做拉帮结派的懒鬼。”拉比亚诺·迪尼埃搓了搓他皲裂的细瘦手指，给他的日记本翻了一页，推了一下老旧的圆框眼镜，继续挥舞他的笔杆子。“首都的生活比我想象的要艰难，工资很高，物价更高，即便三餐都在食堂吃也很难攒下钱……新上司法勒是一个肥胖且不思进取的中年军官，具有一切乡下人的特质，粗俗又没有对智慧的追求……我一个大学生怎么会沦落到这个地步，军队文职真不是人干的。这份工作着实无聊，也看不到什么希望，如果可以的话，我下周就……”\n\n就在此时，门外响起军靴踩在老旧木制地板上的咯吱声，并且越来越近，拉比亚诺赶紧合上了本子，伴随着开门声站起来敬了个礼：“早上好！内利亚中校！”共和军荣誉军团的法勒·内利亚中校夹着报纸走进了办公室，他随手给拉比亚诺回了一个礼后坐了下来，展开了那张报纸：《总统塔朗诺签署法令加强警察权力》，《南巴企业协会开除500名暴乱工人》，《远乡宫廷秘闻》……法勒打了个哈欠，看了一眼桌上堆着的一撮信件，伸手握了一下金属水壶：“你早上给我接水了吗？”\n\n“对，对不起，中校。”呆坐着的拉比亚诺立刻站了起来，拿起水壶闯出门外，开门时几乎撞上了正要进屋的骑兵队长卡佩。“呦，稀客啊，”看见来人，法勒打趣道，卡佩队长算是团里和他混的比较熟的人了，但今天卡佩面色凝重，似乎换了个人似的。卡佩指了一下他桌子上的信：“你赶紧看看信吧。”。法勒用裁纸刀割开了封条，“调令？因行政管理原因和个人表现，现决定将法勒·内利亚调职至罗达威亚地方司令部参谋团……”法勒读到这里，不禁停了下来，想了几秒，苦笑道：“自从我上次在大会说派机枪镇压市民是可耻行为之后他们早就拟好这封信了吧，罗达威亚省南巴驻军多得很，还是参谋团的闲职，真是对我不放心。”\n\n“不只是你，他们这次基本上清洗了诺兰迪亚所有不忠于民主党的人员，然后把戍卫区和很多装备都划给绝对服从他们命令的警察了。”卡佩面色凝重，“早上他们让我替你的位置，我立刻就意识到……”“也没什么，”法勒举起一只手，阻止了卡佩剩下的话，“我这儿没啥别的东西，方便你搬进来。反正我是个农民家的孩子，滚回乡下也不过是回老家罢了，现在这个时候离开漩涡中心未必不是好事，倒是你，既有骑兵背景，又是巴斯蒂亚大学出身，估计他们扶你上去是要拿你当枪使。”听了这话，卡佩低下头不再说话，似乎在盘算什么。\n\n“中校，你的热水我打回来了。”进了屋没有察觉到气氛的拉比亚诺眼巴巴地看着他的主官，似乎在等着夸奖。"
ROT.19.a:0 "“放那吧，孩子。”"

ROT.20.t:0 "复仇骑士"
ROT.20.d:0 "“伪神的走狗来了！快去普禄卡村报信！”长兄扶着一柄灌注了魔导金属的骑兵剑，对阿尔瓦罗吼道，随后举起了武器，朝着教堂门口的空地大喊，“穆勒斯的选民们！拿起武器，誓死保卫圣殿！”阿尔瓦罗从村子旁边篱笆的破洞处钻了出去，沿着用来划分土地的树篱快速奔跑着，他是第一个看见那几辆载满了警察和瑟旁教徒的卡车，因此他在此之前已经从草场跑回了村子，现在他的两条腿像是灌了铅，胸口闷热地燃烧着。\n\n他攥紧了手中的纳卡神符，默念着法经，想象着挂饰中穆勒斯的力量灌注到自己的体内，驱使自己继续奔跑。他知道，那些瑟旁教徒和来自政府的异端支持者是来拆毁纳卡圣殿的，还要在原址上建造瑟旁教的教堂！ 他很快就接近了标注两村中间位置的那颗古树，阿尔瓦罗不是术士，但他受过一些基本的魔法教育，懂得平衡自己体内的巡流来减轻奔跑的疲劳感。他此时忽然扔掉了那枚纳卡神符，他不知道那些走狗有没有在这条道路上设卡，他们是带枪来的，大概率会直接杀人。想到这，阿尔瓦罗逼迫自己跑得更快了。所幸他并未撞上那些异端，他摔倒在普禄卡村的集会大厅门口，声嘶力竭地求援，两个圣城之子的成员骑着马，领着信仰纳卡教的民兵带着弓弩和老式步枪返回支援，阿尔瓦罗被领头的那人驼在马背后，很快就回到了村子。\n\n远远的，阿尔瓦罗就看见了他们村中的圣殿冒着烟，几个村里的女人跪在地上哭喊，呼唤着她们已死的丈夫。阿尔瓦罗跳下马来，他感觉自己眼前发黑，太阳穴一跳跳地疼，他挥动了一下缰绳，白马陡然狂奔，沿着通向村庄土路中间的那几行车辙飞速前进，风打在他满是汗水的脸上，几个邻村的骑手跟了上来。阿尔瓦罗咬紧了牙关，把缰绳一圈圈地缠在手上，另一侧手臂扬起，紧紧举着那柄骑兵剑。\n\n阿尔瓦罗很快就看到了他所追逐的东西，一辆南巴产的4吨中型卡车，车上装着一些瑟旁教的标志和建筑材料，尾部陷在泥坑中。几个穿着青色制服的乡警正在周围想办法把陷车从沟里弄出来，前方有一辆无蓬的勤务车牵着一根钢索拖拽着，路旁的高地上还有个揣着马鞭，披着毛皮大衣的骑马军官正在喊着什么。阿尔瓦罗死命地夹紧了身下的白马，扯着缰绳挥舞着骑兵剑冲向了他们，眼前一个穿大衣乡警举着的长枪忽然喷出一股白烟，阿尔瓦罗只感觉脸颊一热，挥刀砍向那人，刀刃被对方用枪托挡了出去，只留下了一道刻痕。白马看见前方的卡车尾部，高高跃起，落地时正好踩在从驾驶室逃出的瑟旁教徒的后背上，发出骨骼崩裂的脆响。阿尔瓦罗没去管那些见了一拥而上纳卡教民兵就四散奔逃的乡警，他紧紧地盯着那个穿毛皮大衣的军官，攥着骑兵剑的虎口此时正胀得厉害，从手心处滴下血来。那个军官见势不妙就调转马头想要逃走，一根十字弩的钢箭从阿尔瓦罗身后射来，正中那个当官的马腿。马匹把那个穿毛皮大衣的甩了下来，倒下时正好压在他身上，军官发出杀猪般的惨叫，挣扎着想要爬出来，将一支手高高扬起，在空气中抓挠着什么。他挥剑向下一劈，那只白胖的手就落在了泥地里。"
ROT.20.a:0 "两百年了，共和国还是没能战胜传统。"

ROT.21.t:0 "一则汇报"
ROT.21.d:0 " “总统先生，根据您之前的命令，我们再一次向您汇报近期对纳迪欧·恩查特的监视结果……\n\n……近期，纳迪欧·恩查特的行动与以往相比出现了异常，经常有一些身份不明的人前往纳迪欧的府邸与他会面，这些人还会携带一些高级的魔法素材送给纳迪欧，我们据此认为这些人可能是纳迪欧研究魔法时结识的‘同道中人’，或者是有求于纳迪欧，向他提供高级魔法素材作为贿赂。虽然您强调过不要惊动他，但我们还是建议您对他进行适当的反腐败调查……除此之外我们可以肯定纳迪欧·恩查特并无其他异常，更没有私下与其他共和军军官有联络的迹象，他依旧忠诚……”\n\n波瓦尔·塔朗诺直到看到纳迪欧没有与其他共和军军官的相关内容时呼吸的节奏才放松下来，并写下了自己对监视纳迪欧·恩查特的行动的下一步指示——保持现有的监视。\n\n对波瓦尔而言，纳迪欧这位“共和国第一战法师”兼首都卫戍部队司令可以说是他最重要的依仗，重要到波瓦尔对他的期待仅仅是只要他没有倒向全民革命运动便万事大吉，至于他的那些“身份不明的新朋友”……"
ROT.21.a:0 "无需理会——谁还没点私密的社交圈了？"

ROT.22.t:0 "铁路工人罢工！"
ROT.22.d:0 "在南巴的要求下，提特兰铁路局作为一个庞大的私营企业，经营着中巴大铁路的提特兰路段。然而，中巴斯蒂亚联盟的解体使得这条铁路的业务腰斩，提特兰铁路局股价跳水，企业财务状况陷入危机。因此，他们决定裁员，并降低大部分铁路工人的工资。令我们感到意外的是，铁路工人拿出了比以往任何时候都要激进的态度展开了全面罢工，就连卡车司机也加入到了这场罢工中，一时之间，整个提特兰共和国的交通都陷入了瘫痪状态。\n\n政府内的大部分人认为，铁路工人的罢工是受到了中巴叛军的资助，因为南巴支援中巴驻军必须依靠这段铁路，铁路工人偏偏这个时候摆出这样大阵仗就是为了帮助中巴叛军阻碍南巴斯蒂亚联邦各个成员国（其中也包括我们）向南巴的中巴驻军输送援助。而且，无论他们是否得到了中巴叛军的援助，他们的罢工都在事实上严重损害了国家经济且阻碍了南巴斯蒂亚联邦援助中巴合法政府，这些可耻的工人理应被通通逮捕并得到重罚。通过杀鸡儆猴，工人们很快就会停止罢工，大铁路也会重新恢复运行。\n\n然而，政府内部最亲南巴的巴斯塔·伊万·安科宁提出了不同的意见：他也一样认为罢工工人大概率受到了中巴叛军的资助和煽动，但在没有证据之前不能随便乱抓人——若是从一开始就对罢工工人大开杀戒，想要调集工人恢复铁路运行就更难了！当今最重要的，莫过于尽快恢复交通，保证来自联邦各国的各项援助都能顺利进入中巴。因此，为了尽快恢复交通，最好的办法是一边和罢工工人谈判，一边调集工人乃至工兵尽快恢复大铁路的运行。哪怕这意味着提特兰共和国将拿出巨款安抚罢工工人。\n\n时间紧迫，政府必须尽快作出选择："
ROT.22.a:0 "一边和他们谈判，一边调集工人乃至工兵尽快恢复大铁路的运行！"
ROT.22.b:0 "为什么他们会觉得犯个死罪就能保住工作和工资啊？"

ROT.23.t:0 "提特兰人的讨价还价"
ROT.23.d:0 "中巴陷入战火，形势万分紧急，然而，并非所有的南巴斯蒂亚联邦成员国都像南巴共和国一样急切。令人惊讶的是，连提特兰共和国这条南巴走狗也是如此。提特兰共和国总统向南巴方面表明，提特兰将会帮助中巴盟友，但提特兰目前正在遭受经济萧条，若是没有南巴共和国的援助，便难以及时组建出一支能够起到作用的干涉军。因此，提特兰共和国方面希望能够从南巴获取一定的军事援助并扩大战机和装甲科技方面的技术共享，并与中巴方面达成互利互惠的农产品免税贸易协议，从而尽快武装出一支能够尽快干涉中巴的干涉军。同时，提特兰方面暗示，倘若无法得到南巴援助，他们也会履行联邦成员国义务援助我们的中巴盟友，但干涉力度就只能“量力而行”和“分批次支援”了。\n\n单从纸面要求来看，提特兰方面要求的东西不算多。但是，要是连我们的走狗都敢和我们讨价还价了，我们还有什么威严可言呢？更何况，无论提特兰共和国是否尽力支援中巴，他们的支援都不足以影响大局，或许，我们应当提醒自以为是的提特兰人摆正自己的位置。"
ROT.23.a:0 "这确实是一笔公平的交易......"
ROT.23.a.tt:0 "§R提特兰共和国将从中受益，但他们是否如他们索取的那些物资可靠呢？§!"
ROT_rsb_accepted_bargain_flag:0 "南巴人同意了我们的提议"
ROT.23.b:0 "我们在提特兰养的狗居然也敢讨价还价了！"
ROT.23.b.tt:0 "§R提特兰共和国仍会出兵帮助我们的中巴盟友，但态度恐怕就不会像今天那么热情了§!"
ROT_rsb_refused_bargain_flag:0 "南巴人拒绝了我们的提议"

ROT.24.t:0 "互惠互利"
ROT.24.d:0 "我们需要南巴人的援助才能在短时间内组建出一支拥有足够战斗力的干涉军支援中巴盟友，而南巴盟友则是慷慨地答应了我们的请求。现在，我们的军工业将在南巴工业设备和专家团队的帮助下得到突飞猛进的进步。而且，技术共享带来的新式武器更是会堵上那些民族主义者的嘴——看吧！愿意帮助我们武装自己的南巴人怎么可能是什么剥削者呢？南巴人永远都是提特兰人最慷慨的保护者！一如既往！\n\n同时，在南巴的授意下，我们已经成功与中巴方面达成了一个互利互惠的贸易协议，让战火中的中巴人民能够享受到免税的提特兰大米，也能让我们的农民卖的出因经济萧条而滞销的粮食。同时，我们的工业也将享受到中巴的廉价矿产原材料——如果中巴合法政府还能控制中巴矿产的话。\n\n总而言之，我们将在南巴人的帮助下迅速武装起一支规模达三个师以上的干涉部队以援助我们的中巴盟友，而我们本身也将从军事援助和新贸易协议中获利！"
ROT.24.a:0 "这就是三赢啊！"

ROT.25.t:0 "南巴拒绝接受我方提议！"
ROT.25.d:0 "中巴斯蒂亚联盟内战爆发后，国内外都有无数人日夜催促我军星夜出兵援助中巴合法政府——也就是驻扎在中巴的南巴军队。然而，我们确实没有准备好介入一场颇具规模的战争。我们的共和国本就多灾多难，饱受秩序动荡和政治对立之苦。有限的军队不只要维护国内秩序还要提防西边的牛头人和保王党，根本没有多少余力干涉中巴内战。于是，我们诚恳地向南巴盟友请求一些援助用于武装起一支可堪一战的干涉军，而我们那伟大的南巴盟友不久没有同意我方提议，甚至反唇相讥：“七十年代的世界大战时，如果南巴支援提特兰也像今天的提特兰这样慢悠悠地讨价还价，连军队紧急动员都难以做到的提特兰共和国是否还能存在呢？”\n\n这意味着提特兰共和国只能在缺乏准备的情况下干涉中巴内战，同时，国内的民族主义者更是会借此机会狠狠地嘲讽亲南巴当局的吃力不讨好——这将在不久后的总统大选产生后果。"
ROT.25.a:0 "我们从来就没觉得南巴人没对我们讨价还价过"

ROT.26.t:0 "提特兰人的离去"
ROT.26.d:0 "一开始，提特兰共和国声称自己已经带来了上万援军，后续还会有更多援助。这当然是好事，作为中巴斯蒂亚联盟的盟国之一，他们不能不向中巴伸出援手，中巴也没有理由拒绝他们的帮助。\n\n然而，这些所谓的援军中，约有一半人缺乏正面作战的能力，作战态度也相当消极，只能待在后方维持秩序和镇压控制区内的敌军残余。与其说是援军，不如说是一伙公费旅游的公务员。我们曾致电提特兰共和国领导层，要求他们加大援助力度，以提特兰共和国的国力而言，这点援助根本不像话！可对方只是各种哭诉提特兰这个鱼米之乡的困难，然后表明“我国正在加紧动员工业和共和军，下一批援助很快就到”。很明显，这些提特兰人没有完全不履行联邦成员国义务的胆子，但是在象征性派出一批援军后，敷衍、搪塞、推迟执行更多援助请求的胆子还是有的，而且，还很大！\n\n但实际情况比我们想的还要糟糕！最近，这些留在后方的“援军”在未经我们同意的情况下，以护送提特兰侨民回国为由，护送着我们领土上的提特兰裔公民和提特兰人南下归国，甚至还有一部分士兵和非提特兰出身的平民跟着这些侨民离开了战火中的中巴！\n\n这打击了我们的士气，减少了我们的人力，南下的提特兰侨民甚至还挤占了一部分本应用于给我们输送援助的交通运力！我们的将军怒不可遏却束手无策——中巴的叛匪已经让我们忙不过来了，我们没有余力去逼迫这个不大不小的国家完全按照我们的要求援助我们。而且，他们依然有一小股部队在前线与我们并肩作战，算不上是不遵守成员国义务。本着蚊子腿也是肉的想法，我们暂时只能忍气吞声。"
ROT.26.a:0 "这帮蠢货知道自己在做什么吗！"

ROT.50.t:0 "南巴驻军已至"
ROT.50.d:0 "南巴驻军已抵达诺兰迪亚城下。\n\n城内，民兵与一些依旧忠于现政府的共和军已经组织起了防御，等待着侵略者的到来。南巴的崩溃让这个国家几乎再次获得了完整的主权，而眼前的南巴驻军就是通往独立的最后阻碍，他们誓要用鲜血捍卫来之不易的独立与自由。\n\n城外，是疲惫不堪，衣衫不整的南巴驻军。连日的急行军、故国的崩溃、缺乏补给与提特兰人的袭扰让他们心力交瘁，但他们的队形依然整齐，他们依然是一支训练有素的军队。他们急切地渴望着拿下眼前的城市，仿佛这样就能再次掌握自己与提特兰共和国的命运，然后回到魂牵梦绕的故乡——至少这能保证当选的民族主义者没法驱逐他们。\n\n两支军队，两种命运，胜利者将决定这个国家的未来。"
ROT.50.a:0 "赌注不再加码，骰子停止旋转……"
ROT.50.a.tt:0 "§R在这里定要放弃一切的猜疑，一切的怯懦定要在这里死灭。§!"

ROT.51.t:0 "南巴驻军投降"
ROT.51.d:0 "由于弹药匮乏、疲惫不堪，南巴驻军战力大打折扣。再加上故国陷入内战自己却迟迟未能归乡，军队士气更是低落。种种因素作用下，全民革命运动的和谈努力起了成效。最终，在保证南巴驻军无性命危险的情况下，南巴驻军决定放下武器，交出民族叛徒巴斯塔·伊万·安科林等人民自由党成员向马格尼莫领导的全民革命运动投降。"
ROT.51.a:0 "国父赫克曼·丹特的幽灵得以瞑目。"
ROT.51.a.tt:0 "§C也许宽恕确有祂的力量，哪怕苦难与仇恨张牙舞爪，否定着一切的善良。§!"

ROT.52.t:0 "第二个独立日"
ROT.52.d:0 "战斗开始了。\n\n尽管四十天内步行五百公里以及途中提特兰人的袭扰让南巴军队略显狼狈，但南巴军队依然展现出了大国精锐部队应有的强悍。战斗一开始，南巴军队炮击了诺兰迪亚城，在徐进弹幕的掩护下，训练有素的步兵在魔导步兵的法术护盾中扑向了提特兰军队的防线。然而，在这短短的四十天内，这座城市已经被她的人民改造成了一座遍布地道战壕与暗堡的堡垒之城。因此，南巴军队的炮击效果非常有限，但训练有素的步兵依然轻易突破了城市外围的第一道防线。进入城市后，他们便进入了更加残酷的巷战。仿佛刚刚的胜利不过是让他们步入陷阱的诱饵，这座城市现在才展现出她真正的恐怖之处——前行的每一步都有狙击手与藏于暗处的提军暗堡火力点。每一处废墟下都有可能探出冷峻的枪口——甚至是喷出法师的火球。南巴军队的魔导步兵张开了法术护盾掩护步兵前进，但提特兰人的数百发魔法火球立刻摧毁了他们的护盾。第一波步兵就这样被消灭了。\n\n当然，还有第二波，第三波。凭着先锋部队的汇报，南巴军队很快就推测出了大量暗堡与敌方火力点的位置，在炮兵的定点打击中，这些暗堡不复存在。第三波攻势中，南巴军队已经拿下了半个诺兰迪亚，但他们的弹药也即将告罄，尤其是炮弹。炮兵在掩埋了火炮后，拿起步枪和刺刀义无反顾地奔向了前线。所有的南巴士兵坚信，只要拿下了这座城市，因为大选陷入了混乱与分裂的提特兰共和国将会彻底失去抵抗他们的勇气，从而认可他们的提特兰合作者并向他们献上永远的臣服。然后……他们或许就可以活到祖国派出船只接他们回国的那天了。舍弃了除了武器与弹药外的一切后，南巴士兵们拿出了近战魔导装备与刺刀开始与剩余的提特兰军队展开近战。一个个南巴小队在枪声中倒下，一个个提特兰堡垒被火魔法吞噬。炮火摧毁了半个诺兰迪亚，鲜血则染红了另外半个。\n\n但提特兰拒绝屈服。渐渐地，随着战争进入巷战与白刃战阶段，提特兰人对独立与自由的渴望压过了南巴侵略者优秀的战术素养。他们前仆后继，前仆后继，一千人倒下，一万人倒下，南巴侵略者惊恐地发现，子弹与魔法在提特兰人的热血冷却前就已消耗殆尽，战争步入了尾声，双方没有了前方，也没有了后方，更没有了战线，数万人混杂在上千个街巷里呐喊厮杀，战术与战略在最原始的搏杀中荡然无存。最终，随着最后一个南巴侵略者的倒下，提特兰共和国迎来了真正独立后的第一个黎明。"
ROT.52.a:0 "这一日，阳光明媚，万里无云。"
ROT.52.a.tt:0 "§7来，快亮出长枪，让你的旗帜在狂暴的命运之风中肆意飘扬！§!"

ROT.53.t:0 "诺兰迪亚陷落"
ROT.53.d:0 "提特兰失败了。\n\n南巴军队如同撕掉一条破布般撕破了提特兰军队的防线，数以万计的男男女女为保卫提特兰的独立与自由挺身而出，却通通倒在了侵略者的刺刀下。在侵略者的弹药耗尽前，提特兰就已经流尽了鲜血。\n\n提特兰人在堡垒中战斗，堡垒被南巴的炮兵夷为平地。\n提特兰人在暗堡中战斗，暗堡中的士兵被火魔法吞噬。\n提特兰人在地道中战斗，地道就被灌满了污水和毒气。\n提特兰人在诺兰迪亚战斗，半个诺兰迪亚被炮火夷平，另一半则被鲜血染红。为了防止这些抵抗者逃跑，爱因河的罗曼大桥被炸断。为了摧毁友爱体育馆中的伤兵医院，友爱体育馆变成了废墟，混杂着愤怒与不甘的血肉。象征着提特兰与南巴友谊的巨型多色绣球花已在战火中化为灰烬。国父丹特的雕像也被炸毁，却还剩一个微笑的头颅无力地目睹这悲惨的一切。\n\n南巴人已经赢得了这场战斗，但他们远没有意识到这一点。战场也随着他们未竟的杀意不断扩大。很快，一些本不会被波及的地区也被战火蹂躏，但提特兰人已不再抵抗。爱因河上处处是漂浮的尸体与挤满了难民的船只。其中一支小小的舰队则载满了撤退的全民革命运动党员。那是全民革命运动高层比拉克希·特里克事前组织的一支舰队。然而此时，党员们正争论着是要带上他们的妻女还是带上更多的武器，因此舰船迟迟未能开拔。但就在他们争吵的时候，岸边已经站满了难民，他们的哀求令比拉克希决定让全民革命运动最后一次保卫人民。于是，他让剩余的党员列队，要求他们拿起武器返回战场，为这些难民和他们的家人腾出空间，离开这个人间地狱。\n\n回答他的只有一声抽泣，以及一发射向他的脑袋的子弹。全民革命运动的残余党员立刻爆发了一场内战，但当南巴的炮火逼近，他们便极有默契地登上了船只并把所有难民和老弱病残都丢出了船外。同时发动船只，头也不回地离开了燃烧中的瑟林诺，将人民、理想、希望、侵略者、以及比拉克希为他们雇佣的熟练水手通通抛在了身后。首都之外的提特兰人心惊胆战地目睹了这一切，放弃了一切抵抗的念头，咽下了无尽的遗憾，向凭借异族军队夺得政权的人民自由党卑躬屈膝。 "
ROT.53.a:0 "但在他们看来，这顶多算是引颈受戮。"
ROT.53.a.tt:0 "§t共和国，一个可悲的娼妓，仍被强迫着去取悦南巴霸权的死尸。§!"

ROT.54.t:0 "南巴驻军兵临城下"
ROT.54.d:0 "城内，民兵与一些忠于纳迪欧的共和军与神权议会组织成员已经组织起了防御，等待着侵略者的到来。南巴的崩溃让这个国家几乎再次获得了完整的主权，而眼前的南巴驻军就是通往独立的最后阻碍，他们誓要用鲜血捍卫来之不易的独立与自由。\n\n城外，是疲惫不堪，衣衫不整的南巴驻军。连日的急行军、故国的崩溃、缺乏补给与提特兰人的袭扰让他们心力交瘁，但他们的队形依然整齐，他们依然是一支训练有素的军队。他们急切地渴望着拿下眼前的城市，仿佛这样就能再次掌握自己与提特兰共和国的命运，然后回到魂牵梦绕的故乡——至少这能保证当权的独裁者没法驱逐他们。\n\n两支军队，两种命运，胜利者将决定这个国家的未来。"
ROT.54.a:0 "赌注不再加码，骰子停止旋转……"
ROT.54.a.tt:0 "§R在这里定要放弃一切的猜疑，一切的怯懦定要在这里死灭。§!"

ROT.55.t:0 "南巴驻军投降"
ROT.55.d:0 "由于弹药匮乏、疲惫不堪，南巴驻军战力大打折扣。再加上故国陷入内战自己却迟迟未能归乡，军队士气更是低落。种种因素作用下，纳迪欧的和谈努力起了成效。最终，在保证南巴驻军无性命危险的情况下，南巴驻军决定放下武器，交出民族叛徒巴斯塔·伊万·安科林等人民自由党成员向纳迪欧·恩查特的军政府投降。"
ROT.55.a:0 "早知如此，何必当初？"
ROT.55.a.tt:0 "§C也许宽恕确有祂的力量，哪怕苦难与仇恨张牙舞爪，否定着一切的善良。§!"

ROT.56.t:0 "战神殿堂之门"
ROT.56.d:0 "战斗开始了。\n\n在南巴军队抵达诺兰迪亚前，南巴军队便已做好了血洗诺兰迪亚的准备。然而，诺兰迪亚早在他们抵达前便已被鲜血染红。在城郊，南巴军队看到了堆积成山的尸体，神权议会在这些尸体旁留下的牌子骄傲地表示：这些尸体都是与提特兰为敌的异教徒与南巴人，也将会是所有异教徒和南巴人的下场。对南巴军队而言，这当然是赤裸裸的挑衅。怒不可遏的南巴士兵们在炮火与弹幕中扑向了已经布满了各种纳卡教宗教符号的诺兰迪亚。然而，城市的天空中张开了一个又一个魔法护盾，在半空中挡住了相当一部分炮弹。这使得南巴的进攻部队缺乏炮火掩护，连试探城市防卫力量都做不到便被击退，狼狈地撤回了阵地。\n\n当然，第一波失败了，还有第二波，第三波。提特兰军队的战斗法师根本无法用魔法挡住所有的炮击，越来越多的战斗法师耗尽了魔力与体力，只得后撤休整。训练有素的南巴军队很快便察觉到了这些战斗法师的疲惫，立刻集中火力与更多的兵力向诺兰迪亚发起了第四次突击，效果显著：大量南巴步兵突入城内，提特兰部队只得在缺乏战斗法师的掩护下与战术素养更胜一筹的南巴军队展开巷战，一时间，提特兰形势急转直下。在这危急时刻，“神使”纳迪欧·恩查特与“先知”夏坦•阿尔根来到了最前线，以卓越的战场指挥能力和强大的个人武力止住了颓势。为了将提特兰从异教徒的长达二百年的暴政中解放出来，神权议会已经潜心布局了数十年之久。今天，他们谨遵神谕，团结于先知夏坦•阿尔根与神使纳迪欧·恩查特的周围，全力保卫首都诺兰迪亚，无论输赢，他们都将为这漫长的苦旅画上句点。仿佛是穆勒斯真的听到了勇者们的呐喊，越来越多的人声称穆勒斯已然降临诺兰迪亚的战场，手握光芒万丈的宝剑，与祂的信徒并肩作战。于是，南巴军队看到了匪夷所思的一幕：本已出现溃逃迹象的提特兰民兵突然兴奋地回头杀向战场，巨大的魔法光辉如台风般席卷城市。比起这些，还有一个更坏的消息：他们的炮弹耗尽了。\n\n至此，再也没有什么战术与退路可言了，南巴的士兵们全都涌进了诺兰迪亚城区，誓要毕其功于一役。提特兰人则在“穆勒斯显圣”的鼓舞中向着南巴军队发起一次又一次的进攻。在数万死战不退之人的死斗中，白日被硝烟遮蔽，夜空被战火烧红。当硝烟散去，战火平息，旭日的光芒照亮了胜利者的面容时，提特兰人才如梦方醒地意识到——他们胜利了。\n\n胜利之后，有许多人曾追问穆勒斯到底在哪里，为何他们直到战斗结束也没有见到显圣的神明？可最终，没有任何人表明自己真的见到了穆勒斯。因此有人认为这是神权议会为了鼓舞士气而编造的谎言，也有人认为这是战士们将强大的纳迪欧错认为了穆勒斯本尊。但有一点毋庸置疑：提特兰的信仰迎来了真正的胜利。"
ROT.56.a:0 "穆勒斯怜爱着每个奋不顾身的勇者"

ROT.57.t:0 "求告无门"
ROT.57.d:0 "在南巴军队抵达诺兰迪亚前，南巴军队便已做好了血洗诺兰迪亚的准备。然而，诺兰迪亚早在他们抵达前便已被鲜血染红。在城郊，南巴军队看到了堆积成山的尸体，神权议会在这些尸体旁留下的牌子骄傲地表示：这些尸体都是与提特兰为敌的异教徒与南巴人，也将会是所有异教徒和南巴人的下场。\n\n对南巴军队而言，这当然是赤裸裸的挑衅。怒不可遏的南巴士兵在炮火中扑向了已经布满了各种纳卡教宗教符号的诺兰迪亚。城市的天空中张开了一个又一个魔法护盾，在半空中挡住了相当一部分炮弹。这使得南巴的进攻部队缺乏炮火掩护，死伤甚众。然而，提特兰人的还击火力太过薄弱，南巴人的进攻部队还是在提特兰人的防线上撕开了一个口子，部分南巴士兵占据了一些制高点，宛如钉子般扎在了提特兰人的阵地上。在意识到敌人力量的薄弱后，南巴军队没有放过这个机会，更多的士兵在先头部队的掩护中突入城内。提特兰部队只得在缺乏战斗法师的掩护下与战术素养更胜一筹的南巴军队展开巷战，一时间，形势急转直下。由于南巴人的推进速度超乎意料，提特兰军队阵脚大乱，纳迪欧只能仓促派出了缺乏武器装备和军事素养的神权议会民兵堵住缺口，这些信仰虔诚的民兵展现出了惊人但愚蠢的勇气——他们在缺乏魔法护盾和火力掩护的情况下认为自己的肉身已受神明庇护，绝不会被异教徒的子弹射穿身体，咆哮着向侵略者奔去，最终一一倒在了南巴人的子弹下。\n\n诺兰迪亚是一座美丽的提特兰城市，但这座城市中本就有不少亲南巴分子。亲南巴分子见南巴军队到来，热情地为侵略者指出了通往纳迪欧指挥部的道路。南巴军队自然不会不知道纳迪欧本人就是堪比一支军队的强者，于是，他们调集了大炮和能够使用魔法战斗的精锐士兵用于进攻纳迪欧的指挥部，纳迪欧与神权议会的高层展现出了强大的法力，一度挡住了南巴人的进攻。但在这个时代，魔法师的魔力在持续性上根本无法与一个大国精锐部队的炮击相比。就这样，“先知”夏坦•阿尔根和“神使”纳迪欧·恩查特死在了侵略者的最后一枚炮弹之下。\n\n还有什么比“先知”和“神使”的死亡更能破坏这些宗教极端分子的士气和指挥链呢？很快，残余的神权议会成员认定提特兰人的末日已然到来，穆勒斯将用南巴人惩罚这片可悲的土地。于是他们退化为了无数盗匪，在南巴人的围剿中毫无意义的劫掠自己所能见到的一切财物，攻击自己所能攻击到的所有活物，教堂、银行、公寓、公园、国会......国父赫克曼·丹特的雕像被他们炸了个粉碎，象征着提特兰与南巴友谊的巨型多色绣球花也在战火中化为灰烬。很快，南巴驻军打败了神权议会的残余，将纳卡教的一切——包括一些无辜的提特兰人付之一炬。在火光中，提特兰的叛徒们弹冠相庆，庆祝着自由民主对民族传统的完全胜利。"
ROT.57.a:0 "提特兰的传统与未来就这样灰飞烟灭了。"
ROT.57.a.tt:0 "§R祂不在§!"

ROT.58.t:0 "改革者的赠言"
ROT.58.d:0 "当一个男人认定自己再也无法实现自己的梦想时，他的身心将不可避免地迅速衰老。而现在，波瓦尔·塔朗诺总统的祖国正步入黑暗的风暴之中，他曾梦想让提特兰走向稳定与富饶，但现状让他意识到，他的梦想再无实现的可能：南巴联邦解体、经济危机蔓延、极端分子胜选、南巴驻军暴动、国内濒临内战……而他，因为触怒南巴人早在一年前就失去了实权 ，这一年来，他只想着为自己谋求一个体面的退休生活，却哪能想到，在他的任期末尾，提特兰竟骤然步入了一个如此动荡的黑暗时代。\n\n也许……作为这个国家的总统，他应该在国家坠入深渊前做点什么——做点什么呢？与潜在独裁者马格尼莫一起拿起步枪和强大无比的南巴驻军为敌？还是向民众宣布他们选的下届总统不算数，亲自将共和国的民主送入坟墓？\n\n就在他还在犹豫的时候，马格尼莫登门拜访。不消说，马格尼莫此行前来是为了向他寻求支持，那就是让波瓦尔总统代表政府承认大选结果，确保权力平稳交接到他的手上。\n\n“马格尼莫，你声称你是一个社会合作主义者，因此有许多人认为你当选后就会搞独裁。你认为你会这么做吗？”波瓦尔故意抛出了一个一定会被回以谎言的问题，而马格尼莫也如他所料的那样作出了回答：“当然不会。恰恰相反，我会保证这个国家的民主制度将更加——”\n\n“既然如此，那你把党内的极端分子收拾一下吧。”波瓦尔打断了他，拿出来几张照片，“我调查过你的党。无论你是怎么想的，你的党内确实有一部分极端分子。如果你没说谎，那么把这些极端民族主义者驱逐出党肯定也是你的工作。”\n\n马格尼莫惊诧地看着这些照片，照片上都是他所熟知的党员。还未等他开口，波瓦尔便继续说了下去：“马格尼莫先生，如你所见，我的政治生命与生理寿命都即将走到尽头。无论你有没有对我说谎，你也总有一天会像我一样。届时你会完全明白我们在此刻会思虑什么——那就是留下怎样的遗产。所以，我现在在乎的不是你能给我什么，而是你能不能为我留下遗产，让这个国家不会走向一个我极不期望的未来。以及，你最好不要想着怎么糊弄我，我作为总统，依然牢牢把握着这个国家的情报系统。”\n\n马格尼莫清楚，接下来他说什么不重要了。重要的是他要怎么做。"
ROT.58.a:0 "“我也确实不希望党滑向极端民族主义……”"
ROT.58.b:0 "“这个老废物也敢跟我摆谱？”"

ROT.59.t:0 "最后一次掌舵"
ROT.59.d:0 "“前天，我和马格尼莫进行了一次谈话。谈话非常顺利，我祝贺他的胜选。作为总统，我将指示政府确保和平而有序的权力交接。我知道，有很多人在疑虑，他的当选是否会摧毁民主呢？我想说，竞争性民主最大的魅力在于让不同的人为国家勾勒不同的愿景，而政府选择其一执行。但这有一个理所当然的前提，那就是政府无条件地尊重人民的选择，所有人要承认选举结果——对民主制度而言，这比选出怎样的领导人要重要的多。无论我们把票投给了谁，我们都要明白，这里没有敌人，只有同志与同胞。我们绝不能因为理念不同就对彼此剑拔弩张。正如提特兰共和国的格言：只有团结才能保全提特兰人。”\n\n“很遗憾，我们的共和国步入了一个疯狂的黑暗时代，这是时代大势使然。但我相信提特兰共和国是一个坚强的国家，因为他的人民无比坚强！二百六十三年前，人民将这片土地自暴君的魔爪中救下。二十五年前，人民从骇人的异族军队前守住了圣城圣吉亚斯。而在今天，人民也定能在英雄的先辈之后续写这个国家的历史！我坚信，国父丹特的理想仍在人们的心中闪耀。让我们铭记这个国家自诞生起便一直追寻的梦想——”\n\n还未等波瓦尔说完，台下的官员与记者们便异口同声地与他喊道：“提特兰，光荣而自由！”这有些出乎他的意料，但人们显然乐在其中。在掌声中，他结束了他的最后一次重要讲话。"
ROT.59.a:0 "“十分荣幸，能和各位共事至今！”"

ROT.60.t:0 "总统就大选结果发表讲话"
ROT.60.d:0 "“很遗憾，我们的国家步入了一个疯狂而黑暗的时代。我衷心希望当选的马格尼莫·伊洛莫兹先生能够维护共和国的民主，但其社会合作主义的意识形态令人不得不怀疑其是否会尊重我们的民主制度。我无意否认这次大选的合法性，但我必须向在座的各位坦白自己的担忧。”\n\n“我希望各位不要忘记共和国的斗争精神，在必要的时候捍卫自己的公民权利，以免专制与暴政再度降临到我们的共和国，令革命先辈的共和理想功亏一篑。”\n\n“谢谢。”"
ROT.60.a:0 "老东西你怎么还没死啊？"

ROT.61.t:0 "银行同意提供贷款"
ROT.61.d:0 "有句远乡谚语说的好：一分钱难倒英雄汉。我们渡过危机的所有策略都需要钱。幸运的是，我们的事业得到了金融业的支持，我们成功从银行得到了一批贷款。这将用于度过当前的危机。"
ROT.61.a:0 "谁说金融业里都是民族叛徒？"

ROT.62.t:0 "银行拒绝提供贷款"
ROT.62.d:0 "大敌当前之时，首都各大银行竟然拒绝为我们提供贷款！妈的，我们可没有那么多耐心跟他们掰扯什么贷款条件， 他们不给我们贷款，我们就用枪求他们把贷款调高到年利率-100%再贷给我们！"
ROT.62.a:0 "别逼我们动手……"
ROT.62.a.tt:0 "§Y咳咳，尽管交涉过程有些摩擦， 解决危机后，这笔钱我们还是要还的§!"
ROT.62.b:0 "枪都掏出来了，干脆直接抢吧？"
ROT.62.b.tt:0 "§t我他妈早就看银行的傻逼不爽了§!"

ROT.63.t:0 "跨越柔水河"
ROT.63.d:0 "法勒是一个勇敢的爱国者，从来如此。世界大战中立下的功勋令他位列团长，即便是在提特兰共和国最动荡的今日，他也依然忠于自己的祖国。\n\n但他从来就没有想过，当祖国裂为两半时，他要保卫哪个祖国。\n\n现在，驻扎在达克忒特的南巴驻军顶着“保卫提特兰民主”的名号发起了暴乱，在人民自由党的帮助下向首都挺进，他们一路上几乎没有遇到任何抵抗，即将抵达他的部队驻扎的德斯派尔。自维本逃亡而来的民众四处申诉着南巴军队劫掠的残忍，而德斯派尔的市民们派出了代表，祈求他们这些军人能够保卫这座城市免受南巴军队的劫掠——但现在，还在德斯派尔驻扎的只有他的部队了。他的共和军同僚已经识趣地为南巴军队让出了通往德斯派尔的道路，他们也善意地劝说法勒像他们一样把路让开，不要和南巴军队作对，更不要宣称支持他们。最终，他谢绝了同僚的提议，与奋起的民众站在了一起，决心保卫城市。\n\n于是，数以千计的士兵与平民因他的勇敢死于非命。\n\n这场战斗几乎没有过程，南巴军队的脚步甚至不曾因为法勒的阻击迟滞半分，就像一辆卡车碾过了一只老鼠一样，南巴军队一个冲锋就突破了法勒精心布置的柔水河防线。不到一个小时，南巴军队就跨过了柔水河，杀掉了每个挡路的提特兰人——他们没时间抓俘虏。就这样，法勒死了，但他的愚蠢依然为他的同僚所铭记。这些军官会记住，这就是与世界最强军队为敌的下场。"
ROT.63.a:0 "勇气从来就不是魔法。"

ROT.64.t:0 "快速行军"
ROT.64.d:0 "尽管南巴驻军打出“保卫民主的旗号“已经两个星期了，但不少南巴士兵依然有这样的疑虑：提特兰人又没惹我们，我们为什么要在毫无后勤保障且在祖国陷入内战的时候推翻提特兰的民选政府？这场战争真的有必要吗？为什么南巴崩溃后不能让我们回去保卫故乡？\n\n当然，他们都是优秀的军人，军人以服从命令为天职。既然上司有这样的命令，那他们就必须去执行……在遇到提特兰人的激烈抵抗之前，他们确实是这么想的。\n\n渐渐的，他们发现一路上遇到的提特兰人越来越少，越来越具有攻击性。他们的补给越来越困难，甚至有钱也没法从他人手里购买补给——南巴崩溃后，其货币塔勒的价值大打折扣。但更糟糕的是，一些提特兰武装似乎看准了补给就是他们的弱点，专门袭击他们的物资。很快，这支部队便陷入了没有燃油，缺医少药的窘境。为了节省畜力运力，也因为没有药物治疗伤势，一些伤兵会被无情地抛下，等待着他们的，要么是缓慢而痛苦的死亡，要么是直面提特兰人的愤怒。所有人都开始变得害怕受伤，生怕自己会落得那样的下场。这时，那个问题再次于心中显现，质问着他们的苦旅：\n\n“这场战争真的有必要吗？”"
ROT.64.a:0 "答案在火中飘荡……"

ROT.100.t:0 "全民革命运动纲领"
ROT.100.d:0 "全民革命运动纲领\n\n一、提特兰社会目前的主要矛盾是人民对统一与秩序的渴望与四分五裂的混乱现实之间的矛盾。我们必须尽快实现提特兰民族的统一与独立。所有人、所有集体、整个国家都必须为这一崇高的目标奋不顾身地奋斗。\n\n二、提特兰在世界上只有一个命运：完全统一，每一个反对这种共同团结的阴谋都是令人厌恶的。任何形式的分离主义都是一种我们不能原谅的罪行。但我们十分欢迎与其他少数民族的和谐共处，我们将确保提特兰境内的所有民族都是平等的。为此，我们愿意让一部分少数民族拥有其聚居区内的自治权。\n\n三、我们有让提特兰民族走向复兴的决心，我们既不能容忍国际孤立，也不能容忍外国干涉。我们将确保这个民族以自主的方式统一。\n\n四、我们将训练足够强大的军队以确保提特兰民族在任何时候都完全独立，并在世界上享有与其相称的地位。我们将赋予我们的陆、海、空三军应有的荣誉，我们将使军事生活观渗透到提特兰生活的方方面面。\n\n五、我们的国家将成为捍卫民族独立与祖国完整的专政工具。所有提特兰人都将通过其各种家庭、市政和社团角色参与其中。我们将确保全民革命运动党的执政党地位，但我们仍将与每个爱国者结成联盟，议会将永远向每个爱国者打开大门，无论他们有怎样的意识形态。我们尊重民主，绝不会禁止反对党的存在。\n\n六、人的尊严和自由是永恒的无形价值，国家将是所有人的自由的堡垒。但国家的尊严和自由高于任何人的尊严和自由。任何人的自由都不应与国家的自由相悖。\n\n七、我们不会残酷地否认阶级斗争的存在，但我们的政权将消除阶级斗争的根源，因为所有在生产中共同工作的人将组成一个单一的有机实体。我们将停止劳动关系领域的无政府状态。\n\n八、每个提特兰人都享有宗教自由，国家尊重文化传统并保护文化遗产，但国家仍会推行政教分离，确保国家权力不会掌握在形形色色的教会手中。\n\n九、.国家将承认并保护合法的私有财产。\n\n十、国家将通过重新分配可耕地，使农场恢复活力，并大力鼓励农场工人的合作社化。通过将目前在贫瘠土地上勉强维持生计的群众从苦难中解救出来，并将这些人转移到新的可耕地上。\n\n十一、国家将在任何时候保障人民的基本生活水平，人民因贫困而饥饿是不可接受的。但试图凭此过上不劳而获的生活是不可能的。除非重度残疾或生活无法自理，否则国家将不会对试图不劳而获的寄生虫有半点同情。\n\n十二、国家可以对非法获得或利用土地的所有人征收土地，而无需赔偿。\n\n十三、国家将重建共有的文化遗产城市。必须铭记历史，才能展望未来。\n\n总而言之，全民革命运动旨在统一提特兰民族并为之带来一个更加公平、更加稳定、更加强大的未来。为达到这一目标，全民革命运动将与所有人合作。"
ROT.100.a:0 "一个战斗的纲领！"

ROT.101.t:0 "额外要求"
ROT.101.d:0 "为了加强政府治理能力，我们必须扩大官僚队伍。众所周知，我们的公务员考试是公平的，无论考生出身如何，他们都将得到公正的成绩。但在考试之外，我们可以为一些比较重要的岗位增加一些分数以外的要求，进而满足党内各个利益集团的需求。比如，我们可以让一些岗位限定只有参加过社会活动或是相关社会工作的人才能报考。这将保证新晋的官僚从群众中来，也确保他们懂得如何到群众中去。很明显，这一定会受左翼分子的欢迎。\n\n当然，我们也可以提高一些岗位的学历要求，或是要求报考者出示相关专业的技能证书。这将有利于提高我们的官僚素养，促进官僚队伍专业化。这也是社会精英阶层的要求：在提特兰，没有哪个高学历人才不和他们有关。还有一个注定不会受欢迎的选择，那就是为一些岗位添加只有全民革命运动党员和褐衫军成员才能报考的条件。这将保证我们的党更好的控制我们的国家。\n\n我们还要明白一点，我们不可能满足以上所有人的要求以增加所有的筛选条件，因为提特兰没有那么多同时拥有高学历、工作经验和政治背景的劳动力，额外增加太多的要求会导致我们无法招募到足够多的官僚——这就与我们扩大官僚队伍的初衷背道而驰了。"
ROT.101.a:0 "只有从群众中来的人才能到群众中去。"
ROT.101.b:0 "加高学历要求，官僚队伍必须专业化！"
ROT.101.c:0 "保证我们的党员和褐衫军成员拥有更多的政府公职。"

ROT.102.t:0 "自由派的命运"
ROT.102.d:0 "去年的南巴驻军暴动已经被镇压，与南巴驻军串通试图夺取政权的人民自由党也已经被取缔。然而，社会上还有太多自由派批判着我们伟大的元首，诋毁着我们光荣的事业。我们是否应当给他们扣上民族叛徒的帽子然后通通抓起来呢？"
ROT.102.a:0 "没必要，我们只抓明显的通敌者就好。"
ROT.102.b:0 "劝君少骂比纳许，思想审查要商量。"

ROT.103.t:0 "经济发展最优选"
ROT.103.d:0 "“我们预算有限，必须在预算耗尽之前走出经济危机，每一笔钱都花在刀刃上！”经济学家恩瑞克·罗兹试图压制着自己的怒意，但随着辩论的延长，他的音量也愈发走高，“恕我直言，您是宣传部长，您不能将意识形态演讲代入到经济领域！经济规律不会因为言辞而对贫民慷慨！”“说的好像你是这里唯一一个懂经济的一样，如果你真的那么懂，经济危机怎么会那么严重！对，我不是因为懂经济站在这里的，我是代表那些更懂经济，更关心人民的真正专家站在这里的！别以为我不知道，你只是拿经济恢复当借口，就为了把公共工程建给寡头！”莫哈特·马瑞诺反驳道。整个会议室都回响着两人的争论，以至于门外的马格尼莫·伊罗莫兹都能听见两人的争吵。\n\n元首若无其事地打开门，一边走向自己的座位，一边向会议室中的众人做了个举手礼。众人也立刻停止了争吵并回礼。“同志们的讨论热情很高啊，能和我讲讲你们讲到哪里了吗？”马格尼莫看向众人，惬意地靠向了椅背。“元首阁下，我们只是……在讨论哪个方案对国家最有利。” 莫哈特·马瑞诺恭敬地将两份方案的报告书放到了马格尼莫的桌前。马格尼莫翻阅了几下，回答道：“我看过了，我希望在我做出决定前听听你们的想法。”\n\n“这两份方案，一份旨在改善博安图万尼地区的交通条件的东部方案，另一份则是在西部地区新建基础设施的西部方案。”莫哈特的语气温和了不少，“我认为，西部方案对国家更有利。西部地区一直以来缺乏投资，基础设施落后。最近一大批蒙特韦尔德的难民涌入了该地区，极大加剧了当地基础设施尤其是生活设施的压力，由于物流设施落后，当地政府在调配人力物力救助难民方面存在巨大困难。我建议我们优先在这一地区兴建基础设施，这将改善当地生活水平，也能为难民和当地人提供工作机会，更重要的是，这将成为提特兰民族团结的象征，这表明我们不曾忘记穷人的需求，也没有对落难的同胞视而不见。毕竟，这些难民本质上都是提特兰人。而且，以后若是要收复蒙特地区，提前在这里改善物流设施一定会有帮助！”\n\n莫哈特说完后，自然轮到了恩瑞克的发言：“关于难民，我们可以用卡车运输生活物资保障他们的基本生活需求。但直接新建公路与水电设施就有点太奢侈了。我们仍处在经济危机中，必须尽快走出经济萧条才能有这样的余力。更何况，还有数以万计的城市失业贫民等待博安图万尼基建方案的拯救！我希望各位不要忘记，经济危机主要冲击的是发达的东部城市，而非落后的西部地区。因为企业倒闭而失业的城市工人一点也不比难民少，通过博安图万尼的基础设施翻新计划，失业工人将得到工作机会，苦苦挣扎的企业将得到工程需求的订单与物流成本降低。我可以保证，这一方案对改善经济是最优解！在经济上将立竿见影地见到回报！”\n\n会议室安静了下来，两人的报告已经结束，等待着元首的裁决。"
ROT.103.a:0 "“改善经济当然是最优先的，选择东部方案。”"
ROT.103.b:0 "“贫民的生存需求明显更紧迫，选择西部方案。”"

ROT.104.t:0 "不容怠慢"
ROT.104.d:0 "重工业项目事关发展与国防，自然不容怠慢。然而，战争迫在眉睫，目前的重工业项目进度实在令人堪忧，应当加快速度。可共和国政府已经没有足够的可用资金刺激工业发展了。因此，共和国只能从用于改善人民生活的资金中抽调一些过来，并要求工人加班。这与全民革命运动的改善工人生活的承诺相违背，但提特兰若是想要尽快实现工业化就必须这样做。\n\n最终，元首将顶住压力，为提特兰的命运做出选择："
ROT.104.a:0 "为了伟大国家的发展，工人必须做出伟大的牺牲。"
ROT.104.b:0 "这不是加重民众负担的理由。"

ROT.105.t:0 "工业化之恶"
ROT.105.d:0 "提特兰社会共和国并不是一个工业发达的国家，但她却早早地患上了发达国家的顽疾——环境污染。这当然可以归咎于前政府对环境治理的忽视以及对矿产资源的野蛮开发，但现政府依然要面对这些环境问题。进行中的重工业项目更是加剧了这些环境问题。尽管预算紧张，但国家不能对人民的苦难视而不见。为了解决环境问题，马格尼莫再次召开了内阁会议。\n\n“首先，我们必须结束环境保护领域的无政府状态。”比拉克希·特里克兴奋地说 “我们应当成立一个专门负责环境问题的部门，并出台惩罚企业肆意排污的政策，并赋予他们足够多的权力随时检查企业和个人造成的污染状况。当然，这一定需要扩张政府部门，扩招不少人手。但为了我们的子孙后代，花再多的钱也是值得的。”但莫哈特·马瑞诺与恩瑞克·罗兹不约而同地表示反对，但恩瑞克明显对莫哈特的反对感到惊讶。两人一番谦让过后，莫哈特率先表达了自己的意见：“我认为，我们没有余裕再扩招一大批吃财政饭的人了，而且，环境保护这一学科相当年轻，我国环境保护领域的人才比原子领域的专家还要稀缺，全国上下对生态环境保护半点经验都没有。想想看，一群毫无专业知识与实践经验的家伙成立了一个部门并有权妨碍企业决策，这会对经济造成多么可怕的后果！同时，企业往往会将这种强加的负担转嫁到工人和消费者上，这也会间接降低人民生活水平。为了人民的生活而降低人民的生活水平，这难道不可笑吗？”旁边的恩瑞克几乎要笑出声了——莫哈特讲的比他想的还要好，甚至已经把他想讲的都讲完了。但他听着听着，放下的心又悬了起来。莫哈特继续说道：“我想，我们可以取个折中方案。我们可以通过行政手段要求企业按照我们提出的方案进行排污，先用合理的排污规划来保证最大的污染来源得到遏制。至于人手，可以从当地政府机关人员中抽调，还可以动员工会成员举报不合规排污的企业。这样一来，我们可以积累相关经验，也不需要大规模扩招公务员，更不用担心这会损害企业的发展。”恩瑞克终于忍不住了：“但这依然会造成腐败……”但下半话还没说出口，便被两人瞪了回去。\n\n“我想我明白了。”马格尼莫话音未落，众人便立刻停下了争论。所有人都清楚，元首已经做出了决定："
ROT.105.a:0 "“成立环境保护部！”"
ROT.105.b:0 "“合理规划将减少污染。”"

ROT.106.t:0 "长期石油贸易协议？"
ROT.106.d:0 "提特兰本土几乎不产石油。因此，提特兰人十分渴望一个稳定的石油来源。为了石油，提特兰社会共和国希望从我们这里购买石油并与我们达成长期的石油贸易协议。我们应当如何应对呢？"
ROT.106.a:0 "行"
ROT.106.b:0 "滚"
ROT.106.c:0 "得加钱"

ROT.107.t:0 "鲁萨尔讨价还价"
ROT.107.d:0 "关于石油贸易协议，鲁萨尔人报出了一个更高的价格，我们必须做出回应。"
ROT.107.a:0 "那就再给他们多点钱吧，石油太重要了"
ROT.107.b:0 "你们这些傻逼什么时候才能学会玩金融啊？"

ROT.108.t:0 "长期石油贸易协议？"
ROT.108.d:0 "提特兰本土几乎不产石油。因此，提特兰人十分渴望一个稳定的石油来源。为了石油，提特兰社会共和国希望从我们这里购买石油并与我们达成长期的石油贸易协议。我们应当如何应对呢？"
ROT.108.a:0 "行"
ROT.108.b:0 "滚"
ROT.108.c:0 "得加钱"

ROT.109.t:0 "特尼安人讨价还价"
ROT.109.d:0 "关于石油贸易协议，特尼安人报出了一个更高的价格，我们必须做出回应。"
ROT.109.a:0 "那就再给他们多点钱吧，石油太重要了"
ROT.109.b:0 "那还是算了。"

ROT.110.t:0 "[FROM.GetName]要求我们屈服"
ROT.110.d1:0 "提特兰社会共和国要求我们屈服于他们，顺从于统一与团结的历史潮流，必须听命于他们的“伟大元首“并与他们一同完成“伟大的民族复兴事业”，否则便与我们开战。我们应当如何抉择？"
ROT.110.d2:0 "提特兰共和国要求我们屈服于他们，顺从于统一与自由的历史潮流，交出军队的指挥权与政权的自主权，并在不远的未来成为共和国的一部分，否则便对我们发动战争，我们应当如何选择？"
ROT.110.a:0 "好吧"
ROT.110.b:0 "死吧，出卖民族的暴君。"
ROT.110.c:0 "一群卖国贼也配自称解放者？我们要再打败他们一次！"
ROT.110.dd:0 "死吧，南巴的走狗。"

ROT.111.t:0 "[FROM.GetName]拒绝！"
ROT.111.d:0 "这些愚蠢的家伙拒绝了我们慷慨的提议，我们只能用武力继续提特兰民族的统一了。"
ROT.111.a:0 "不过是统一之路上的又一个绊脚石。"

ROT.112.t:0 "时机已至"
ROT.112.d:0 "“元首要发表讲话了！”在一个不知名的边境村庄，穿着褐衫的村长喊了几声。很快，村头的广播喇叭便传出了元首马格尼莫·伊罗莫兹的演讲：\n\n“我亲爱的国民们！我在这里是为了向大家宣布我和国会的一个决定，两个小时之后，我国国防军就会越过边境，进入坎达德尔，永久终结暴君对那片土地的统治。也就是说，战争到来了……”那是个魅力十足又雄厚笃定的声音，但其宣布的内容却让农民们议论纷纷——终于，又要打仗了。\n\n“一个伟大的时代，属于提特兰人的时代已经到来了，我们勇敢保卫了提特兰的主权和自由，其代价是无数提特兰男男女女的生命和被外国军队蹂躏过的废墟。所以有人要问了，为什么我们要在祖国最虚弱的时刻发动一场针对邻国的战争？为什么不能休养生息专注于我们自己的发展？”\n\n村民们越聚越多。\n\n“南巴斯蒂亚人陷入了内战，但他们总有一天会卷土重来。蒙联境内的军阀蠢蠢欲动，南方的提特兰人长久地遭受修卡利翁野蛮种族——牛头人的戕害，我们的同胞们生活在水深火热之中，渴望改变的希望却一次次地落空，争取解放和自由的呼声又一次次地响起。我们已不能再袖手旁观。目光短浅的人会恐惧，但我们已别无选择！当我们回望我们的历史，我们只能感到屈辱和悔恨。但是今天，我们再也不用忍受数百万人民的劳动成果被外国公司洗劫一空的命运了！实现我们日思夜寐梦想的时刻到了！提特兰民族各阶级人民团结一心的时刻到了！我们收复我们西方故土的时刻到了！现在，让我们团结一致，共铸伟业！”\n\n元首的演讲结束了，一阵短促悠扬的音乐过后，广播中不再传出新的声音，村民们鸦雀无声。\n\n“去把桥修了吧，说不定明天就会有军队经过！”一个人打破了沉默。接着，农民们行动了起来，把他们的锄头放在村口的矮墙边。"
ROT.112.a:0 "战争已经司空见惯，但这次要更有希望。"

ROT.113.t:0 "兄弟同心？"
ROT.113.d:0 ""
ROT.113.a:0 "团结一致，共御外侮！"
ROT.113.b:0 "战后谈判分地肯定很麻烦……"

ROT.114.t:0 "夹击牛头人？"
ROT.114.d:0 ""
ROT.114.a:0 "那就让我们一起打一场复国战争吧！"
ROT.114.b:0 "那我们要怎样提防他们在我们背后捅刀子？"

ROT.115.t:0 "斗士诚坚共抗流"
ROT.115.d:0 ""
ROT.115.a:0 "我们要团结牢，准备把头颅抛！"

ROT.116.t:0 "同胞，还是新主子？"
ROT.116.d:0 ""
ROT.116.a:0 "我最亲爱的兄弟啊！我们再也没有理由分开了！"
ROT.116.b:0 "我们能打倒奴隶主，自然也不会放过独裁者。"

ROT.117.t:0 "度尽劫波兄弟在"
ROT.117.d:0 ""
ROT.117.a:0 "一个过于感人的欢聚时刻。"

ROT.118.t:0 "自由战士的拒绝"
ROT.118.d:0 ""
ROT.118.a:0 "我们真的有那么糟糕吗……"

ROT.119.t:0 "与伊斯恰游击队取得联系"
ROT.119.d:0 ""
ROT.119.a:0 "我们不会让这些夹缝中的自由斗士失望的！"

ROT.120.t:0 "无法与游击队取得联系"
ROT.120.d:0 ""
ROT.120.a:0 "无论如何，我们将铭记他们所做的一切。"  

ROT.121.t:0 "未完工的巨舰"
ROT.121.d:0 ""
ROT.121.a:0 "1925之耻终将得雪"

ROT.122.t:0 "殖民者的遗产"
ROT.122.d:0 ""
ROT.122.a:0 "改掉侮辱性标志，然后继续用吧"
ROT.122.b:0 "保留一些残骸放进博物馆，其余全部摧毁。"
ROT.122.c:0 "保留功能的基础上，将其改造为胜利的纪念碑"

ROT.123.t:0 "互不侵犯？"
ROT.123.d:0 "提特兰社会共和国正在准备收复西部故土，为了拥有一个稳定的东部大后方而试图与我国达成互不侵犯条约。我们是否应当答应他们呢？"
ROT.123.a:0 "哪怕只是暂时的和平与友谊也弥足珍贵"
ROT.123.b:0 "凭你也配？"

ROT.124.t:0 "平等合作的基础"
ROT.124.d:0 "幸运的是，我们的东方邻国同意了我们的请求。我们将签署一份互不侵犯条约保证双方边境的和平。这将会是双方平等的友谊的开始。更重要的是，我们再也不用担心东方的邻国会在我们全力西进收复故土的时候袭击我们了！相应的，对方也可以放心的将兵力都调往统一南巴的征程了。"
ROT.124.a:0 "这对我们都有好处。"

ROT.125.t:0 "卧榻之侧"
ROT.125.d:0 "我们的邻国拒绝了我们的友好提议，这不得不让我们对邻国做好最坏的准备。我们必须加强东部地区的防卫。"
ROT.125.a:0 "……提特兰有做过什么对不起他们的事情吗？"

ROT.126.t:0 "经济全面崩溃"
ROT.126.d:0 "经济全面崩溃"
ROT.126.a:0 "经济全面崩溃"

ROT.200.t:0 "提特兰共和国的橄榄枝"
ROT.200.d:0 ""
ROT.200.a:0 "这通往自由的苦旅终于走到了尽头。"
ROT.200.b:0 "真遗憾，这不是我们的弟兄，而是南巴的走狗！"

ROT.201.t:0 "南提特兰游击队拒绝我们的提议"
ROT.201.d:0 ""
ROT.201.a:0 "……难道我们真的做错了什么吗？"

###新闻###
ROTNews.1.t:0 "1998年诺兰迪亚公民运动会"
ROTNews.1.d:0 "作为公民运动会这一国际性体育赛事的起源地，提特兰共和国成功在1991年获得1998年公民运动会的主办权。爱因河畔的共和国首都诺兰迪亚被选为运动会场馆所在地。值得一提的是，本次开幕式首次从体育场搬到城市空间，来自23个国家和地区的运动员队伍乘着各自的船只逆流而上，自南向北地驶向体育馆。沿途经过了提特兰共和国的数个地标建筑：外形被塑造为巨型定情锁的罗曼大桥，国父赫克曼·丹特的雕像与革命广场的共和英雄纪念碑，以及象征着提特兰与南巴友谊的巨型多色绣球花。同时，现场约有50万名观众观看开幕式。爱因河两侧还有大量艺术表演，大约1000名舞者、音乐家和演员将在两岸4公里长的路线上演出.河流上空则有共和国战机的观赏性表演，在湛蓝的天空中挥舞着参赛各国的旗帜。在开幕式之旅的最终站，是新建的超大型体育馆友爱体育馆。来自世界各地的游客与政客将在那里欢迎运动健儿们的到来。\n\n在本次赛事中，南巴斯蒂亚共和国依然是金牌数最多的国家，其次是沃姆帝国，第三是鲁萨尔联盟。令人惊讶的是，本次长跑比赛的冠军不再是顿伏茨克大公国的半人马选手，而是提特兰共和国的人类选手，这也是提特兰共和国唯一的一枚金牌。\n\n尽管主办方曾因当地治安混乱，经费不足等原因饱受外界质疑，但最终爱因河上的欢呼盖过了这一切。事实证明，提特兰共和国内部依然困难重重，但至少在今天，他们仍能向世人展示出最美的一面。"
ROTNews.1.a:0 "意义非凡的盛会"

ROTNews.2.t:0 "南巴驻军推翻提特兰共和国"
ROTNews.2.d:0 "中巴联盟与南巴联邦的解体深刻改变了巴斯蒂亚大陆的政治局势。提特兰共和国作为南巴的盟国也遭受了剧烈的政治动荡与经济危机。激进民族主义者马格尼莫的胜选成为了压垮秩序的最后一根稻草。提特兰人民自由党反对选举结果，并与南巴驻军推翻了共和国，建立了新的民主保卫政府。为了肃清民族主义者与宗教恐怖组织神权议会，人民自由党党魁、民主保卫政府首脑巴斯塔·伊万·安科林正急于动用军警巩固统治。大量针对异议者的暴力执法逐渐演变为了血腥屠杀。绝大部分国际观察家都认为这是提特兰地区最后的民主堡垒的崩溃，更是南巴影响力依然存在的证明。民主保卫政府推崇自由市场的言论也无法让任何外资青睐这一动荡的亲南巴国家——尤其是在南巴联邦已然崩溃的情况下。"
ROTNews.2.a:0 "我们必须纠正人民的错误。"
ROTNews.2.b:0 "谁能想到英雄丹特建立的国家会变成这个样子呢……"

ROTNews.3.t:0 "全民革命运动统一提特兰"
ROTNews.3.d:0 "多灾多难的提特兰民族终于团结在了同一面旗帜之下，发迹于提特兰东部的全民革命运动将其统治扩大到了整个提特兰半岛。尽管在形式上保留了民主机构，提特兰社会共和国依然是个显而易见的专制国家，该国“元首”马格尼莫·伊罗莫兹可谓是大权在握。这位富有魅力的独裁者声称这是一场全民族的革命：其雄心勃勃的现代化计划已经使得提特兰社会经济得到发展，他们的威权手段和别的军阀政权的暴政相比实在是温柔至极。地主阶级、殖民者、旧贵族与狂教徒通通都倒在了革命的刺刀之下。但在其他国家看来，这样的革命依然古怪至极：这个国家是一个不断煽动民族主义情绪并推崇法团主义体制的专制国家，其宣传机器宣传的“左翼民族主义”与其所作所为存在着巨大的割裂感。不过，这也说明这个国家依然存在政治可塑性，提特兰依然有可能走向更加光明或是更加混乱的未来。但无论未来如何，提特兰的民族主义情绪都已经达到了一个新高度，这个有着极强的民族情绪与发展潜力的国家一定会为国际局势带来翻天覆地的变化。"
ROTNews.3.a:0 "古怪的民族，古怪的革命"
ROTNews.3.b:0 "全民族的革命"

ROTNews.4.t:0 "提特兰共和国统一提特兰"
ROTNews.4.d:0 "尽管提特兰共和革命距今已有两个世纪之久，但在今天，提特兰共和革命似乎终于完成了它的使命。今日，自共和革命中诞生的提特兰共和国已经统一了提特兰半岛全境。提特兰共和国是一个世俗的总统共和制国家，为了保卫革命果实，正在筹备针对旧贵族与狂热教徒的镇压与清洗，同时，雄心勃勃的民主教育运动也随着经济重建工作同时展开，无论结果如何，整个提特兰半岛的精神面貌都将焕然一新。\n\n然而，提特兰共和国那近乎疯狂的亲南巴倾向招来了国内外的异议，即使是在南巴联邦崩溃时，提特兰共和国也没有放弃亲近南巴的政策，甚至干涉南巴联邦局势。同时，共和国那自由放任的市场经济与对工人的系统性压迫使得这个国家拥有着令人惊诧的贫富差距。总统巴斯塔·伊万·安科宁利用南巴驻军推翻民选结果上台的暴行也使得这个共和国的合法性受到了广泛质疑。尽管如此，这样的政府还是在收复的领土中受到了不少提特兰人的欢迎：和提特兰半岛上曾经广泛存在的邪教徒、旧贵族与奴隶主相比，共和国依然有着更好的福利水平与个人权利。"
ROTNews.4.a:0 "自由主义者的底线再创新低"
ROTNews.4.b:0 "民族统一的事业总是盈利的"

