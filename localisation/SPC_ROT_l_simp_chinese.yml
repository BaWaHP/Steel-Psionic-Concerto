ROT_worldunion_socialist_party:0 "友爱会"
ROT_worldunion_socialist_party_long:0 "友爱会\n§g严格意义上讲，友爱会不是一个政党，而是一个群众组织。领导该组织的是一位医德高尚，医术精湛的医科法师美拉德·贝罗克。美拉德·贝罗克声称，友爱会的名字来源于国父赫克曼·丹特所构想过的名为友爱会的群众自治组织。该设想未能由丹特实现，却在两百年后的今天被美拉德·贝罗克重新拾起，并结合了社会世联主义思想加以改造。友爱会旨在鼓励各地劳动者组建基层自治组织，并在此过程中改善人民生活，巩固民族团结，促进提特兰人与南巴联邦裔公民的和解。尽管友爱会支持阶级斗争，但他们并不认为现在是发动武装革命摧毁剥削阶级的时机，因为社会世联主义以及社会主义尚未深入人心，现在要做的，是继续发展群众自治组织，而非用微薄的力量去发动内战。这使得他们与全民革命运动关系十分良好，也是共和国没有下定决心摧毁该组织的原因。值得一提的是，尽管友爱会的影响范围极小，但在其影响的地区拥有不可动摇的群众基础。与一般的工会农会不同，友爱会有不少医生，可以为民众提供几乎免费的医疗服务，甚至有能力培训新的医生。尽管友爱会的影响十分有限，但他们的实践依然是可贵的：时至今日，依然有人愿意尝试治疗提特兰和她的人民。§!"
ROT_worldunion_democrat_party:0 "提特兰正义民主党"
ROT_worldunion_democrat_party_long:0 "提特兰正义民主党"
ROT_worldunion_democrat_party_2:0 "全民革命运动（左派）"
ROT_worldunion_democrat_party_2_long:0 "全民革命运动（左派）"
ROT_liberal_republican_party:0 "提特兰人民自由党"
ROT_liberal_republican_party_long:0 "提特兰人民自由党\n§g尽管提特兰共和国是一个多党制民主国家，但事实上，在选举中有能力赢得执政党地位的只有两个大党：提特兰人民自由党和提特兰民主党。其中，人民自由党以其强烈的亲南巴联邦立场与对私有化和自由化的推崇而闻名。人民自由党党员大都是特尼安裔公民和鲁萨尔裔公民。他们有着买办资产阶级与外国资本以及城市中产阶级的支持。然而，民族主义思潮的兴起使得城市中产阶级逐渐倾向于全民革命运动。这使得他们赢得1998年大选的概率不再是百分之百。§!"
ROT_conservative_republican_party:0 "提特兰民主党"
ROT_conservative_republican_party_long:0 "提特兰民主党\n§g尽管提特兰共和国是一个多党制民主国家，但事实上，在选举中有能力赢得执政党地位的只有两个大党：提特兰人民自由党和提特兰民主党。提特兰民主党和提特兰人民自由党同样拥有亲南巴联邦立场，但对于私有化和自由化持谨慎态度，对于文化则持保守态度。因此外国资本更倾向于人民自由党，提特兰民主党则更受农民和民族资产阶级的青睐。然而，现任总统波瓦尔·塔朗诺的压低农产品价格的政策伤害了农民的利益，在1997年末时还因为试图强行收购提特兰铁路局5%的股份而惹恼了国内外的大资产阶级。这导致了1997年全国骚动的爆发以及三年经济繁荣时期的结束。提特兰民主党因此威望大减，在1998年大选中没有了获胜的可能。更糟糕的是，1997年的全国骚动使得全民革命运动威望大涨，提特兰民主党失去的民心几乎都被全民革命运动所俘获。§!"
ROT_authoritarian_republican_party:0 "提特兰共和党"
ROT_authoritarian_republican_party_long:0 "提特兰共和党"
ROT_national_socialist_party:0 "全民革命运动"
ROT_national_socialist_party_long:0 "全民革命运动\n§g§G“勿记恨，救他人”§!\n全民革命运动的理念看似古怪，但几句话便可概括：以有限的阶级斗争为手段达到阶级调和的效果；以平等博爱的态度推行提特兰民族和解与提特兰民族主义；在斗争中求团结，在独立中谋发展。甚至可以概括为一句话：左翼民族主义的宣传和社会救济，法团主义的经济体制。由于其支持阶级斗争、民族平等、国家独立，得以与左翼的社会世联主义组织友爱会结盟。全民革命运动在底层民众以及中产阶级中拥有超乎想象的威望，领导人马格尼莫·伊罗莫兹非凡的个人魅力在此起到了不小的作用。在1997年的全国骚乱中，全民革命运动迅速壮大，可以说，他们已经有足够的信心拿下1998年大选。§!"
ROT_authoritarian_nationalism_party:0 "全民革命运动"
ROT_authoritarian_nationalism_party_long:0 "全民革命运动"
ROT_paternal_autocrat_party:0 "提特兰共和党"
ROT_paternal_autocrat_party_long:0 "提特兰共和党（强硬派）"
ROT_wizard_rules_party:0 "暂无"
ROT_wizard_rules_party_long:0 "暂无"
ROT_religious_extremism_party:0 "神权议会"
ROT_religious_extremism_party_long:0 "神权议会\n§g神权议会是一个极端宗教组织，鼓吹“宗教民族主义”，即将穆勒斯教的教义与提特兰民族主义相结合。声称不信穆勒斯教的都不配被称为提特兰人。同时支持政教合一，将国民议会改为由穆勒斯教教士组成的“神权议会”。共和国自然不可能容忍这样的组织，因此，共和国多次打压该组织。而该组织则组建了名为“圣城之子”的宗教武装作为回应，常常对平民发动恐怖袭击。由于穆勒斯教在提特兰农村地区影响巨大，所以神权议会总是能扛过一轮又一轮的打击。有传言声称，他们已经成功渗透了共和国的陆军……§!"
