ROT_vibrant_market_economy:0 "充满活力的市场经济"

ROT_ensure_logistics:0 "确保后勤"

ROT_rsb_puppet:0 "南巴走狗"
ROT_rsb_puppet_desc:0 "人民自由党坚信，提特兰共和国的使命就是成为南巴人向西传播文明的先锋，即使南巴遭遇危机，他们的信念也不曾动摇。为了让祖国成为南巴人的走狗，为了传播文明开化的理念，为了实现自由主义的伟大梦想，他们将让人民为他们的梦想死战到底，毫不妥协地直面绝望的未来。"

ROT_entrepreneurial_spirit:0 "企业家精神"

ROT_unforgiving_revolution:0 "绝不饶恕的革命"

ROT_teotland_gendarmerie:0 "提特兰宪兵"

ROT_military_industrial_complex_idea:0 "军工复合体"

ROT_unlimited_iron_rain:0 "无边铁雨"

ROT_support_from_southern_brother:0 "南方同胞的支援"
ROT_support_from_southern_brother_desc:0 "提特兰共和国是提特兰民族走向自由的唯一希望，在共和国国境之外，有太多的提特兰人渴望着共和国的到来。南提特兰地区的人类抵抗组织就是这些提特兰人的代表。他们将尽己所能地配合共和国军队解放脚下的故乡，将牛头人殖民者全部消灭。"

ROT_gateway_to_cb:0 "通往中巴的门户"
ROT_holy_city_of_mourning:0 "恸哭之圣城"
ROT_holy_city_of_mourning_desc:0 "永恒圣城圣吉亚斯是世界闻名的宗教城市，两大宗教：瑟庞教与纳卡教将其视为圣地。然而，圣地的名号并不能让这座城市享受到和平的恩赐，南巴的瑟庞教与提特兰的纳卡教之间爆发过的宗教战争长达数百年。数百年来，一次次战争降临在这座多灾多难的圣地中，世界大战的战火更是将这座城市变得面目全非。时至今日，城中建筑大都是最近建成的新建筑。曾经宏伟的圣吉亚斯大教堂如今只剩一面断壁——仿佛这就是他的墓碑。某种程度上讲，这也是提特兰民族历史的写照。\n\n沿着屈辱历史的尽头，提特兰人来到了更加凶险的现代。在圣城的高塔上眺望，你将看到这座城市能够顽强地一次次在废墟上崛起的原因：来来往往的两教朝圣者既会为这座城市带来混乱，更会带来财富与名望。只要昔日的信仰未被遗忘，圣城将永远生机勃勃。但你只要往西看的再远一些，你就能看到如沉默的死神般伫立边境的牛头人据点，在他们身后，是沦陷的提特兰土地，以及贱如猪狗的提特兰亡国奴。因此，每当信士们向上苍祈祷时，总会有这样一个问题：§R神明那慈悲的双眼真的会望向这片毗邻地狱的圣城吗？§!\n\n提特兰的历史不缺问题，也不缺试图写下答案的人。在圣城，形形色色的民族主义者踌躇满志，誓要在未来写下自己的答案。人们只需看看地图就能明白圣地毗邻着这个国家的两大威胁：坎达德尔与伊斯恰军管邦，所以，显而易见的是，§t这个国家走向复兴——或是步入灭亡的第一枪定会在圣地响起§!，在穆勒斯无声的注视下，诸天神灵及四方芸芸期待着这命运的枪声。"

ROT_a_national_revolution:0 "全民族的革命"

ROT_rainbow_lantern_harbor:0 "虹灯港"

ROT_riviera_super_port:0 "瑞柏超级港口"

ROT_massacre_memorial_hall:0 "大屠杀纪念馆"
ROT_massacre_memorial_hall_desc:0 "在你面前的，是提特兰地区最大的种族屠杀的证明，奥维德天坑，米诺陶族——牛头人侵略者曾称这里为东征纪念谷。这里有老弱，有妇孺，也有残兵败将，王侯将相，但是无一例外，他们都是人类。奥德修斯·伊斯恰·苏佩尔比亚在这里犯下让人感到发指的罪行后，将这一罪行宗教化，正义化，以及原原本本的将无数人的尸骸列为“纪念博物馆”，让牛头人们参观，娱乐。\n\n现在，提特兰人再次解放了这片土地，但已经死去的无辜百姓再也无法回到人间。为了告慰这数以万计的无辜亡灵，提特兰解放者能做的，只有将这片土地上的牛头人全部消灭，并建立大屠杀纪念馆牢记这一骇人听闻的暴行。牛头人在此地的统治已经成为了历史，就连牛头人曾经在此地娱乐的痕迹也成为了纪念馆中的展品之一，提特兰人的尸骨与牛头人眉开眼笑的照片共同成为了两族不共戴天之仇的铁证。"

ROT_liberator_colossus:0 "解放者巨像"
ROT_liberator_colossus_desc:0 "解放者巨像的原材料来源于曾经的牛头人建造的奥德修斯奇迹巨像，这不是什么秘密。曾经的奥德修斯奇迹巨像是一个大理石拼接而成巨大的雕塑，全高50米，利用光照魔法起到了巨型灯塔的功能。这雕塑完全的将奥德修斯·伊斯恰·苏佩尔比亚的全身都惟妙惟肖的雕刻了出来，而底座——由无数旧坎达德尔王国贵族家族标志融化成的四口大钟，每日中午12点都会按照顺序敲响修卡利翁同盟的国歌《厄利斯林元帅颂》的前三句。对牛头人而言，这自然是胜利的纪念碑。但对提特兰人而言，这是全高50米的耻辱与血泪，是侵略者对战败的他们的羞辱。\n\n现在，提特兰人已经将牛头人彻底驱逐出了提特兰半岛，作为§R对侵略者的羞辱之羞辱§!。提特兰人将奥德修斯巨像推倒后，用这些材料重新铸造出了一个铭记将牛头人彻底驱逐出提特兰半岛的巨型雕塑。其全高52米，利用光照魔法起到了巨型灯塔的功能。这雕塑雕刻的乃是一个神情威严的提特兰士兵，其左手则提着原奥德修斯奇迹巨像的头颅，右手则是扬起闪光的长剑直指牛头人的故乡修卡利翁。而底座——由无数牛头人官兵勋章、报废武器、从奴隶身上拆下来的枷锁、以及集中营的金属牢笼融化铸成的四口大钟，每日中午12点都会按照顺序敲响提特兰人的军歌：《铭记仅剩的一切》。"

