ROT_edward_williams:0 "爱德华·威廉姆斯"
ROT_nadio_nchate:0 "纳迪欧·恩查特"
ROT_nadio_nchate_desc:0 "一如每个天赋异禀之人那般，纳迪欧·恩查特从小便展现出了极为优越的魔法天赋。因着这份天赋，他早早地确定了自己的梦想，那就是成为一名大魔法师，用魔法与力量赢得无限的荣誉。当世界大战降临提特兰时，他已经成为了共和国最强的战法师。然而，事实证明，他并没有强大到可以凭一己之力改变战局——提特兰共和国战败了。\n\n自私的纳迪欧对共和国毫无感情，但这场战争确实让他感受到了耻辱——对一个傲慢的天才而言，没什么比无力地走向失败更耻辱的了。雪上加霜的是，他的个人实力也在此时遇到了瓶颈。他自然是不甘心的，但他毫无突破瓶颈的办法。对一个把追求力量作为梦想的战士而言，停滞比战败要可怕百倍。停滞将加剧心灵的衰老，腐蚀进取的意志——人人皆是如此。\n\n于是，1986年6月16日，在那个宿命般的夜晚，迟迟未能突破瓶颈的他走向了一座纳卡教堂，在空旷的黑暗中祈求穆勒斯助他永享强大的荣誉与进步的乐趣。仿佛云涌之上确有上苍，神权议会的领袖夏坦·阿尔根毫无征兆地出现在了教堂的黑暗中以神明的名义回应了他的祈祷。其声称纳迪欧乃是命中注定的神使，提特兰将在神使的引领下重获救赎。为表明善意，他向纳迪欧展示了神迹：他只消超然的一指，纳迪欧便得以顿悟，其魔力骤然突破了瓶颈。作为回报，纳迪欧加入了神权议会，成为了神权议会在共和国陆军高层中的内应之一。\n\n当然，纳迪欧可没觉得这个到处抓异教徒公开处刑的宗教组织真的背负着什么神谕。但这确实提醒了他，他没必要只靠自己去获得变强的资源与信息。他完全可以去利用一个组织甚至是国家去为他收集他所需要的一切。一开始，这当然只是个想法。但随着共和国的秩序愈发混乱，这个想法逐渐变成了计划。现在，在民主的尸体上，纳迪欧已经掌控了提特兰，神权议会也在他的旨意下接管了全国各地。如果上苍确实偏爱着这位天才的话，提特兰将再次步入为实现一个人的梦想牺牲一切的时代。"
