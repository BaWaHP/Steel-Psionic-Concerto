ROT_anti_comm_republic:0 "反共的共和"
ROT_anti_comm_republic_desc:0 "尽管腐败丛生，但人民自由党并非没有梦想。他们梦想着见到一个自由意志与自由市场统治世界的时代，而共产主义者则是这一梦想最彻底的仇敌。为此，人民自由党立下宏愿，誓要与全世界的共产主义者战斗到底。在这个动荡的黑暗时代中，他们点亮了自由的灯塔，为所有渴望逃离暴政的人打开了提特兰的国门，并准备好了无处不在的秘密警察以捍卫所有人的自由。"

