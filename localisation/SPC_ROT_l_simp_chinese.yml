ROT_class_and_nation_tt:0 "§O提特兰社会共和国万岁！§!"

ROT_class_and_nation_Faction_1_tt:0 "§R左翼分子§!：[?ROT_a_national_revolution_1|2Y%%]。\n\n每日消耗的政治点数：[?ROT_a_national_revolution_ppc|2+]\n稳定度：[?ROT_a_national_revolution_sf1|2+]\n£prod_eff 生产效率增长：[?ROT_a_national_revolution_pfegf|2+]\n免费维修：[?ROT_a_national_revolution_ifrf|2+]\n\n这里的§R左翼分子§!指§2全民革命运动内部的左派§!以及与全民革命运动结盟的§t友爱会§!成员。尽管全民革命运动认为自己是一个社会合作主义组织，但其并没有彻底反对社会主义。其左翼民族主义的宣传吸引了不少左翼民族主义者加入。同时，与社会世联主义组织友爱会的联合也增强了全民革命运动内部的左倾思潮。如果全民革命运动想要维持自己与国家的团结，就决不能与这些§R来自左翼的盟友§!闹僵。"

ROT_class_and_nation_Faction_2_tt:0 "§Y社会精英§!：[?ROT_a_national_revolution_2|2Y%%]。\n\n生活消费品工厂系数：[?ROT_a_national_revolution_cgf|1+]\n稳定度：[?ROT_a_national_revolution_sf2|2+]\n缺乏战略资源惩罚：[?ROT_a_national_revolution_plorp|2+]\n\n§Y社会精英§!是指在提特兰共和国中的§Y上流阶层§!。这些人有着普遍的§2亲南巴倾向§!。当然，他们明显没有为陷入混乱的南巴斯蒂亚毁家纾难的决心。所以在相当长的一段时间内，他们只能老老实实地把自己的钱和家放在提特兰。他们的贪婪与罪恶无人不知，但我们不是极端的共产主义者，我们不可能把他们通通打倒。更何况，他们手中的§Y资本与技术§!对共和国的发展是不可或缺的。只要开出合适的价码，我们完全可以与他们达成合作。这些人大都有着较强的市场自由主义思想，反对政府干预市场，但很明显的是，他们并不反感政府支持他们的企业。"

ROT_class_and_nation_Faction_3_tt:0 "§2联邦裔公民§!：[?ROT_a_national_revolution_3|2Y%%]。\n\n适役人口系数：[?ROT_a_national_revolution_cf|2+]\n稳定度：[?ROT_a_national_revolution_sf3|2+]\n工厂产出：[?ROT_a_national_revolution_icf|2+]\n\n§2联邦裔公民§!是指那些自南巴斯蒂亚联邦地区（主要是特尼安人与鲁萨尔人）而来的移民及其后代。他们并没有多少提特兰民族认同，但也愿意为这个国家尽到作为公民应尽的义务。他们大都信奉南巴斯蒂亚宗教瑟庞教，且拥有较强的§2共和主义情绪§!。其人数众多，约占我国人口25%，大都居住在我国的富裕地区以及东部沿海城市。其平均受教育程度要高于§7提特兰人§!。全民革命运动的理念是“每个提特兰共和国的公民都是他们的服务对象。我们由衷地希望§7提特兰人§!与§2联邦裔公民§!能够不再敌视彼此，在这个疯狂而黑暗的时代同舟共济。"

ROT_class_and_nation_Faction_4_tt:0 "§7提特兰人§!：[?ROT_a_national_revolution_4|2Y%%]。\n\n陆军师组织度：[?ROT_a_national_revolution_aof|2+]\n稳定度：[?ROT_a_national_revolution_sf4|2+]\n适役人口：[?ROT_a_national_revolution_c|1+]\n\n§7提特兰人§!是指那些自我认同为提特兰族的共和国公民。他们大都信奉提特兰本土宗教穆勒斯教。是我国各族中人口最多的民族，约为70%。前任反动的买办政府的压迫使得他们将希望寄托在了我们的身上。我们的胜利离不开他们的支持，我们必须要为他们带来一个美好的未来。"

ROT_class_and_nation_Faction_5_tt:0 "行政效率：[?ROT_a_national_revolution_5|2Y%%]。\n\n政治点数：[?ROT_a_national_revolution_ppf|2+]\n稳定度：[?ROT_a_national_revolution_sf5|2+]\n建造速度：[?ROT_a_national_revolution_psb|2+]\n\n无论我们将走向何方，我们都始终处于一个要人管的时代。一个廉洁高效、人手充足的官僚系统将保证这个国家更好的贯彻执行我们的意志。但反之，腐败低效，缺乏人手的官僚系统将使得我们的工作举步维艰。在大部分情况下，行政效率将因我们的工作而§7缓慢提升§!。然而，每收复一片提特兰民族的领土，我们的行政压力都会§t大大增加§!，总体的行政效率也会因此§t下降§!。毕竟提特兰人分裂已久，民间泛滥的魔法师也极大地提高了我们恢复秩序的难度，想要让我们的同胞再次团结一致自然就需要政府提供更多的公共服务。"

ROT_class_and_nation_Faction_6_tt:0 "民族凝聚力：[?ROT_a_national_revolution_6|2Y%%]。\n\n二百多年来，提特兰众兄弟离心离德，视彼此如仇寇。尽管我们打出了提特兰民族主义的大旗，但不满我们的民族政策的人大有人在——我们认为联邦裔公民和蒙特韦尔德地区的人民也算提特兰民族的一部分，但相当一部分提特兰人（尤其是东提特兰地区以外的提特兰人）并不这么想，甚至视这些人为仇敌。我们是民族的革命者，我们必须要让全体提特兰人再次团结在一起。与我们的提特兰兄弟争斗越多，提特兰民族的凝聚力就越弱。反而言之，和平统一的努力越是成功，提特兰就越是团结，而民族的团结将带来民族的§7新生§!。尽管团结之梦道阻且长，但我们也完全不必灰心，毕竟我们必须想象，每个提特兰人都默默期待着那天的到来。"

