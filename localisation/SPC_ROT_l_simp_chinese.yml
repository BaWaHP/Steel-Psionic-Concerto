ROT_kick_imperialist_ass_desc_loc_1:0 "我们本以为南巴斯蒂亚联邦的解体会是南巴斯蒂亚干涉提特兰内政的结束，可是南巴驻军的暴动让我们意识到帝国主义的残骸依然在§t拼死抓住旧日帝国的幻影。§!而我们——尽管我们掌控了§7首都§!，但§7首都§!之外的各地官僚和军队都在§t观望§!其中没有多少人愿意为了保护我们这个饱受争议的民选政府而与§t强大的南巴驻军§!为敌。但§O人民§!没有袖手旁观，我们是民选政府，我们有民兵和党员，也不乏社会精英的支持，我们可以动员人民组建民兵§C阻滞§!敌军前进，并尽可能的§C拉拢§!还在观望的地方官员和军队，同时将首都§t改造为决战的堡垒§!。总之，敌人无比强大，但只要我们利用好手上的资源，争取到足够多的时间与支持，我们就一定能见到胜利的黎明。而胜利的奖品无比丰厚——战胜不可一世的帝国主义军队将让我们赢得全提特兰的爱戴与敬畏，这将让我们掌控全提特兰！\n\n两军对峙显示提特兰与南巴驻军的战力对比。而紧张度进度条则表示南巴驻军推翻提特兰政府的决心。倘若紧张度显示为§C考虑谈判§!，那么这场危机便有和平解决的希望。但前提是我们的战力平衡等级至少为§Y提特兰略逊一筹§!。当冲突无法和平解决时，只有让两军对峙为§7提特兰胜券在握§!才能保证现任政府能够度过这场危机。"
ROT_kick_imperialist_ass_desc_loc_2:0 "我们本以为南巴斯蒂亚联邦的解体会是南巴斯蒂亚干涉提特兰内政的结束，可是南巴驻军的暴动让我们意识到帝国主义的残骸依然在§R拼死抓住旧日帝国的幻影。§!而我们——尽管我们掌控了§7首都§!，但§7首都§!之外的各地官僚和军队都在§R观望§!，其中没有多少人愿意为了保护我们这个饱受争议的军政府而与§R强大的南巴驻军§!为敌。但§O人民§!没有袖手旁观，我们并非毫无胜算——南巴驻军离家千里，士气低落，更是无法获得武器补充。而我们这边，全国最强的战士纳迪欧领导着我们，神权议会的战士也将为我们而战。在为提特兰的命运而战的征途中，穆勒斯也会赐下祂的恩典。我们可以动员人民组建民兵§C阻滞§!敌军前进，并尽可能的§C拉拢§!还在观望的地方官员和军队，同时将首都§R改造为决战的堡垒§!。强大的纳迪欧将军也可以亲自指挥奇袭作战毁坏敌人仅存的物资。总之，敌人无比强大，但只要我们利用好手上的资源，争取到足够多的时间与支持，我们就一定能见到胜利的黎明。而胜利的奖品无比丰厚——战胜不可一世的帝国主义军队将让我们赢得全提特兰的爱戴与敬畏，这将让我们掌控全提特兰！\n\n两军对峙显示提特兰与南巴驻军的战力对比。而紧张度进度条则表示南巴驻军推翻提特兰政府的决心。倘若紧张度显示为§C考虑谈判§!，那么这场危机便有和平解决的希望。但前提是我们的战力平衡等级至少为§Y提特兰略逊一筹§!。当冲突无法和平解决时，只有让两军对峙为§7提特兰胜券在握§!才能保证现任政府能够度过这场危机。"

