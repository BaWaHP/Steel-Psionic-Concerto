###民族精神###
ROT_lifeline_of_the_republic:0 "共和国的生命线"
ROT_lifeline_of_the_republic_desc:0 "这是本世纪最值得骄傲的成就！——中巴大铁路开幕后《共和日报》的报道。\n\n毫不夸张的说，横跨半个巴斯蒂亚的中巴大铁路是维系着我们共和国的“生命线”。\n\n大量的粮食，物资以及我们最需要的武器都由此输送而来。尽管南巴在铁路建设之初的目的并不是因为这些的考量。但铁路的建设和运营也带动了整个联邦的经济与民生。而代价，则是联邦内部的资源被南巴瓜分殆尽。相比之下，铁路周围及站台的管理权反倒算不得什么了。无论如何，共和国绝不能失去这条铁路，绝不能失去自己的这条§t生命线。§!"

ROT_military_advisors_from_rsb:0 "南巴军事“顾问团”"
ROT_military_advisors_from_rsb_desc:0 "作为南巴扶持的政权，同时也是南巴在提特兰半岛利益的代言人。南巴联邦在共和国境内拥有一支庞大的“军事顾问团”。共和国的军队调度和军事训练均由顾问团负责，共和国政府与参谋部只保有极少的军队控制权。虽然顾问团的存在使得共和国可以不用担心日益紧张的边境地区，但倘若共和国想要迎接独立自主，顾问团将是必须要处理的存在。"

ROT_republic_of_discord:0 "不和的共和"
ROT_republic_of_discord_desc:0 "提特兰半岛依然四分五裂，共和国内部更是如此。各路列强来来往往，民众的诉求亦有不同。本地民众与南巴移民之间的矛盾愈演愈烈，时常会出现暴力冲突。民众对政府也充满了不信任，农民和工人并不支持这个由买办与世家大族主宰的共和国。更糟的是，政府内部也充满了分歧，议院里的议员们甚至会对其他党派的议员大打出手。稍微有点了解共和国政治状况的人都会惊叹，这个共和国居然到今天都还能存在。"

ROT_gold_chains_of_the_federation:0 "联邦的金锁链"
ROT_gold_chains_of_the_federation_desc:0 "提特兰共和国从诞生起就根基不稳，能够存续到今天很大程度上要仰仗南巴斯蒂亚联邦的各方面的帮助。当然，所有的馈赠早已在暗中标好了价格。共和国越是动荡，就越是依赖联邦的帮助。而联邦的帮助并非免费，在长达百年的“移民”与“帮助”中，提特兰共和国的经济乃至政府已经彻底被联邦掌控。好处是，与南巴联邦市场接轨促进了共和国的经济发展。代价是，共和国丧失了独立性，联邦方面想要影响共和国经济简直轻而易举。哪怕是几个南巴大资本家也能在共和国翻手为云，覆手为雨。"

ROT_norlandia_civic_games:0 "诺兰迪亚公民运动会"
ROT_norlandia_civic_games_desc:0 "公民运动会是国际公民运动委员会主办的世界规模最大的综合性运动会，是世界上影响力最大的体育盛会。届时，来自巴斯蒂亚大陆各地的游客将来到共和国的首都诺兰迪亚。为了向世界展示最好的一面，提特兰共和国调动了大量的人力物力来保证治安状况并完善首都的基础设施。国内各路政治势力也愿意在运动会期间停止斗争。毕竟，此次运动会对于提特兰共和国意义非凡：时隔两百年后，公民运动会再次于他的发源地举行。如此欢乐而光荣的日子自然容不得野心家搅局。"

