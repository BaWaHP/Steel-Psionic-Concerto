###领导人###
ROT_coraci_afton:0 "科拉西·阿夫顿"
ROT_basta_ivan_ankorin:0 "巴斯塔·伊万·安科林"
ROT_basta_ivan_ankorin_desc:0 "1955年，巴斯塔·伊万·安科宁出生于伊格诺布市的一个相当富裕的买办家庭。长大后，他靠着父亲的推荐信去了度弗道夫大学学习法学。在度弗道夫上学的这段日子极大地震撼了他的三观——他本以为，南巴斯蒂亚共和国作为这个世界上最先进的国家，绝不会有罢工这种毫无价值的民粹主义乱象。但现实却令他无比失望：南巴斯蒂亚共和国非但没有积极镇压工人的无理取闹，甚至会自行组织国家工会，无理地要求企业家对工人让步。这让他痛苦的意识到，即便是南巴，也会被懒惰贪婪的流氓无产者腐蚀，滑向民粹主义的深渊。从那时起，他便下定决心，绝不能让他的祖国染上这种民粹主义，哪怕他一直都瞧不起他的祖国。\n\n回国后，他成为了一名外交官，加入了人民自由党。靠着良好的人脉与灵活的底线，他成为了南巴斯蒂亚共和国最喜欢的提特兰外交官，他也因此获得了更广的人脉以及三十五个名誉博士学位。由于提特兰共和国长期以来都是亲南巴派占据统治地位，作为最受南巴青睐的官员，他的地位自然青云直上。1991年，他迎来了人生中的高光时刻，他成功说服了公民运动会委员会，让提特兰共和国成为1998年公民运动会的主办国。这一外交领域的重大胜利使得他威望大涨。1998年公民运动会的成功举办更是让他能够向总统之位发起挑战。但意外还是发生了，当选的不是他，而是马格尼莫·伊莫罗兹这样的极端民粹主义者。为了捍卫共和国的自由，他果断请出了南巴驻军，进军首都，成为了新的总统。\n\n现在，靠着南巴驻军的支持，他掌控了国家。尽管异议不断蔓延，但这无法动摇他实现梦想的决心。他的梦想很简单，那就是统一提特兰半岛，然后将其改造成一个自由的国度，在这个市场自由主义的乌托邦中，不会有疯狂的狂信徒与共产党，更不会有愚蠢的地主与保护主义者。只有这样，他才能用这个被文明抛弃的祖国赚到最多的钱。"
ROT_pauval_taronno:0 "波瓦尔·塔朗诺"
ROT_pauval_taronno_desc:0 "曾几何时，波瓦尔·塔朗诺是提特兰共和国的希望。在共和国无休止的内斗中，他历史性的为共和国树立了一个共同目标：发展。波瓦尔是个勤劳而务实的人，务实的态度让他可以拥有更多解决问题的手段，勤劳的工作让他得以推行他的改革。在他执政初期，共和国迎来了可喜的经济发展，政府的内斗与民众的反对也消停了点，与南巴斯蒂亚联邦的关系也更加亲近。“发展”这一共同目标固然模糊，但对共和国而言，哪怕有个模糊的共同目标就已经是巨大的进步了。有那么一刹那，务实的波瓦尔也会天真地幻想共和国繁荣的未来。 但他从来都没有去认真想，发展放缓后，共和国又将何去何从。\n\n这一天很快就来了。\n\n燃烧的首都、五花八门的组织、层出不穷的抗议……一切发生的太快了，山呼海啸的呐喊涌向了总统府：“看看你做了什么！”\n\n对民众的呐喊报以机枪与毒气后，波瓦尔开始认真反思他做的一切：工人们指责他取消了最低工资以及宣布工会非法。农民们指责他故意压低粮价。自由派嘲讽他没有让提特兰共和国成功加入南巴斯蒂亚联邦。工业家怒斥他为了一时的经济发展贱卖国家主权，让外资涌入挤垮本国企业。民族主义者攻击他为了外国主子的认可允许南巴军队进一步掌控共和国……这些都不重要，重要的是，他为了经济发展坚持最低限度的国有化，并为了推行经济改革试图从南巴斯蒂亚手中讨回一些经济自主权。结果是，联邦稍微用了点经济手段，就让共和国经济状况直转急下，反对派也立刻开始拼命攻击他。就连他所处的党派也决定不再让他担任下一届总统选举的候选人。现在波瓦尔能做的，就是为自己谋求一个体面的退场。\n\n自那之后，经济很快就恢复了增长。但南巴联邦让所有人都意识到了一点：取悦联邦才有发展的可能，除非摆脱她。于是，“发展”再也不能成为国家的共识。波瓦尔也认清了现实，静静的放下了方向舵，任由国家在日益险恶的时代中漂向未来。"

###顾问###
ROT_giancarlo_fernandez:0 "吉安卡罗·费尔南德斯"
ROT_ruwani_marino:0 "鲁瓦尼·马瑞诺"
ROT_alberto_de_jimenez:0 "阿尔贝托·德·希门尼斯"
ROT_henry_pelos:0 "亨利·佩洛斯"
ROT_dimoy_raine:0 "迪莫伊·雷恩"
ROT_morhardt_marrino:0 "莫哈特·马瑞诺"
ROT_morhardt_marrino_desc:0 "全民革命运动的理念大致可以概括为一句话：“左翼民族主义的宣传与社会救济，法团主义的经济体制。”后半句说的自然包括了全民革命运动全党，而前半句说的，就是身为宣传部长的莫哈特·马瑞诺。\n\n莫哈特·马瑞诺是提特兰共和国最著名的作家之一，作为一名左翼民族主义者，他占据了全民革命运动的党内左翼地位。尽管全民革命运动内部大都是典型的右翼民族主义者，但他和这些右派相处的还不错。他们都认可法团主义经济体制，也都得到了领袖马格尼莫的认可，尽管其文章对中右派而言过于“左倾”，但那大都是党内决策同意发表的宣传文章，所以，他们实在没有起冲突的理由。但莫哈特明白，自己和这些人有着本质的区别：党内中右派（也是党内的大部分干部）只把这些宣传文章当作糊弄民众和共和国的戏言，其中许诺的“新型民主体制”、“民主的法团之国”、“社会进步”、“全民普选”、“左翼法团主义”根本不会有兑现的可能——谁会真的信一伙国社分子掌权后会搞民主呢？但他不一样，他由衷的希望党能够兑现这些诺言，作为一个政治家，他相信自己说过的话，写过的字，并希望将之付诸实践——毕竟，这可是对人民许下的诺言，而人民正是相信了他们的许诺才支持并加入全民革命运动的。如果全民革命运动一掌权就忘了自己所说过的话，那不就是对革命的背叛吗？他们还有什么资格声称自己是人民的战士，提特兰的解放者呢？\n\n不，党不能就这样背叛自己的理想，哪怕这个理想从一开始就是谎言，他也要让这个谎言应验，让自己的梦想成真。莫哈特·马瑞诺的诉求非常简单：革命就是应当言出必行。尽管在党内的高层，他依然势单力孤。但在党外，友爱会与全民革命运动的结盟增强了他这样的党内左派的力量。而听信了他的宣传加入党内的新一代成员也正在成长，不断壮大。只要时机合适，党的谎言将在被揭穿之前成为现实，而他，将实现那个他所钻研的、宣扬的、教导的、那个无比理想、集民主与团结于一身的左翼法团之国。"
ROT_gustizia_muller:0 "吉斯提奇亚·穆勒"
ROT_miguel_dubois:0 "米格尔·杜波伊斯"
ROT_javier_blanch:0 "哈维尔·布兰奇"
ROT_javier_blanch_desc:0 "这个世上就是有这样的一种人：长相丑陋、脾气暴躁、贪婪自私、媚上欺下、自以为是、赤口毒舌却又无所不能——哈维尔·布兰奇就是这样的人，一个臭名昭著的寡头。所有人都讨厌他，但他总是能让所有人都需要他——共和国需要他站在提特兰民族的立场上保证能源安全和原材料安全并引进先进技术，却又只能对他大肆贿赂官员的行为视而不见；鲁萨尔资本需要他这样的人掌控提特兰矿业的同时压低提特兰原材料价格，却也痛恨他利用共和国为自己的企业进行“不正当的竞争”——共和国本应站在鲁萨尔资本一边。不过，他倒不是完全没有优点：他会说假话，但不会卖假货。在提特兰共和国与南巴斯蒂亚联邦之间，他成功地成为了一个“中间人”。"
ROT_enrique_rhodes:0 "恩瑞克·罗兹"
ROT_rogdika_katim:0 "罗格迪卡·卡提姆"
ROT_maillard_belloc:0 "美拉德·贝罗克"
ROT_maillard_belloc_desc:0 "美拉德那超一流的治愈魔法以及极低的收费成为了提特兰人的福音，他和他的学生救治了无数的提特兰人。从学术期刊到娱乐杂志，美拉德的名字出现的愈发频繁。而他也有了自己的称号：“爱因河的良心”。\n\n这颗良心的成长，自然离不开他的父母的言传身教。但对他而言，战争与死亡教的比他的父母教的更多。\n\n美拉德是个善良的人，但他并不天真。作为一名医生，他见过的生离死别并不比老兵见的少——尤其是在他投身于世界大战后。1970年，他自愿作为一名军医加入了共和军。参加这场战争让他名声大噪，世界各国都知晓了提特兰共和国竟有一个两年累计救治了五千多名伤兵的传奇医科法师。无数的荣誉纷至沓来，共和国与南巴共和国为他颁发了最高级别的勋章以表彰他的杰出贡献。但这场战争带给他的远不止是荣誉，更有痛苦的记忆：战场上的尸体无边无际，战地医院中的伤兵源源不断。为了救治伤员，他数次因为魔力透支而晕倒——参战前，他从来就没有意识到自己的魔力会有透支的一天。魔力透支后可以靠休息恢复，可是那些伤兵往往等不了他。\n\n血腥而残酷的现实改变了他。他并没有变得更加冷血，反而变得更加热情，更加善良，更加理想主义，更加渴望一个各个种族和平共处的美好世界。他知道，他就算再强百倍也救不完战争的受害者。只有打倒不断制造不义之战的帝国主义，和平的时代才能到来，惨剧才会不再重演。作为提特兰共和国有史以来最优秀的医生，他已不再满足于独自救治具体的人，他要为这个国家乃至这个世界开出自己的药方——群众自治组织、国有化分级医疗体系、新型医生队伍培训、跨种族无国界国际组织、社会世联主义、以及他一手创办的群众自治组织：友爱会。\n\n现在，靠着他所教导出的庞大的医疗团队的支持，友爱会已经成为了提特兰共和国最强大的左翼组织。在赫克曼尼勒与日宏，友爱会的势力一手遮天。他也和全民革命运动达成了合作，组成了救国同盟。假以时日，他或将坐上他梦寐以求的卫生部部长之位。尽管他的主张不太可能被全部采纳，但只要他能坐上这个位子，他就能让共和国的卫生健康状况焕然一新。"
ROT_bilash_tricker:0 "比拉克希·特里克"
ROT_bilash_tricker_desc:0 "全民革命运动作为一个民族主义大帐篷政党，内部千奇百怪的意识形态使得整顿党风党纪的任务变得复杂而困难。而这个任务就落在了党内元老比拉克希·特里克的肩头。作为一名典型的中年党政官僚，比拉克希·特里克早已失去了年轻时代的革命热情与理想主义情怀，现在，他的脑子里更多的是对权力与秩序的庸俗渴望以及自作聪明的实用主义思维。为了党的利益，也为了他的前程，他将尽己所能将这个民族主义者的大帐篷彻底改造为一个思想统一，党纪严明，将党的利益置于第一位的社会合作主义政党。并强化党国体制，模糊党、政府、国家间的界限，以谋求全民革命运动永远的执政党地位——也就是说，党内地位将等于国家地位，而作为党内除了元首外最有威望的元老，他的地位自然也会水涨船高。可以说，他与威权发展主义者的唯一区别在于经济政策：威权发展主义者认为只要能发展经济，任何经济体制都可以采纳。而他认为法团经济体制就是最好的经济体制——至少对他这样的官僚而言是最好的，他从政就是为了利用国家机器牟利，能让他的牟利行为不违法的体制自然就是最好的体制。\n\n当然，他并非完全没有理想：他由衷地希望提特兰民族能够走向统一，迈入一个团结、稳定而繁荣的未来。尽管这个梦想听起来一点儿也不浪漫，但在疯狂的提特兰半岛，这已经可以说是最大胆，最疯狂，最浪漫，最叛逆的政治理念了。"
ROT_decius_glaion:0 "狄修斯·格莱昂"
ROT_decius_glaion_desc:0 "狄修斯·格莱昂，提特兰人，前共和军上校，世界大战的战争英雄，全民革命运动民兵的组织者，党内最极端的民族主义者。曾经，狄修斯只是个对政治兴趣廖廖的共和军官，但残酷的世界大战将这个男人改变了，在目睹了世界大战中的无数暴行后，一种异样的疯狂彻底吞噬了这个曾醉心于荣誉的男人。他变得冷静异常，不苟言笑，在谈及南巴、七河、牛头人等话题时毫不掩饰对这些“提特兰民族死敌”的杀意。他坚信，提特兰若是想要获得真正的独立与统一，就必须将这些“提特兰民族死敌”彻底毁灭——这不是为了正义，也不是为了财富，而是为了生存空间。为此，国家必须加快军事化，整个民族都必须为此做出牺牲。\n\n当然，这样的想法在亲南巴的提特兰共和国还是过于危险了。狄修斯明智地隐藏了自己的想法，加入了略为温和的全民革命运动，并为之训练民兵。尽管他由衷的尊敬领袖马格尼莫，但马格尼莫的乐观主义与民族和解思想并没有改变他的想法。他对民族死敌的杀意依然与日俱增。总有一天，他将亲自引领提特兰民族对世界的复仇——或是在那之前带着沉重的仇恨死去。"
ROT_theocratic_council:0 "神权议会"

###军队###
ROT_magnimo_iromoz:0 "马格尼莫·伊罗莫兹"
ROT_magnimo_iromoz_desc:0 "诠释“魅力型领袖”的方法有很多，而马格尼莫·伊罗莫兹就是“魅力型领袖”一词最好的诠释：英俊的面容、庞大的财力、卓著的军功、无穷的精力、乐观的态度、爽朗的笑容以及雄辩的口才组成了他那光芒四射的无敌魅力。这一切足以让他的前半生顺风顺水——直到世界大战降临于提特兰。\n\n在那个战争年代，他怀揣着保家卫国的信念加入了新组建的共和国空军，并成为了共和国的第一位王牌飞行员。在击落了十一架敌机后，他被登上了报纸，成为了共和国家喻户晓的战争英雄。然而，不断涌来的荣誉并不能让他不去忧心糟糕的战况。最终，共和国与南巴联邦战败，提特兰共和国又失去了一次统一提特兰半岛的机会，而他的双亲也在战争末期因轰炸而死。当他于战后回到被敌军轰炸到陷入无政府状态的家乡维本时，他这个战争英雄才真正明白失败对人民意味着什么——死亡、混乱、饥饿、以及紧跟而来的悲伤与绝望。看着迷茫而痛苦的人们，他意识到自己必须做些什么让人们再次挺直脊梁。在埋葬了只剩下骸骨的双亲后，他马不停蹄地利用家中仅剩的财产和自己的名望组织幸存的民众自救乃至重建秩序。最终，维本以惊人的速度恢复了秩序，他则获得了所有维本人民的爱戴，在地方选举中成功当选市长——这就是他从政生涯的开始。很快，他便邂逅了自己的真爱，左翼作家哈朵拉·佩罗，并与她一起创建了一个旨在民族复兴的进步主义政党：全民革命运动。但在哈朵拉被一名自由主义者刺杀后，这个党也和马格尼莫一样急剧右转。\n\n话虽如此，尽管哈朵拉最初的梦想已被他的挚爱放弃，但至少她最后的遗言依然被他铭记：§7勿记恨，救他人。§!因此，全民革命运动成为了全提特兰最特殊的一股政治势力，他们有着这片多灾多难的土地最为缺乏的特质：宽恕与希望。也许，这将为提特兰带来救赎。\n\n总之，背负着数百万人的希望，他成为了提特兰有史以来最受欢迎的独裁者。他会重新拾起曾经的的理想，履行振兴民族，造福人民的诺言吗？亦或是像提特兰历史上的无数独裁者一样将人民的期待视为对权力的威胁？还是说他会在这之前满怀遗憾的死去？\n\n主角已经登上了舞台，全世界都将拭目以待。"
ROT_kolot_rudile:0 "柯洛特·鲁迪勒"
ROT_fidela_grino:0 "菲迪拉·格瑞诺"
