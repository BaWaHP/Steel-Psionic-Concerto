###民族精神###

 NKE_NATIONAL_UNIVERSITY_NAME:0 "维安娜·维尔大学"
 NKE_NATIONAL_UNIVERSITY_RENAMED_NAME:0 "汀原大学"
 NKE_national_university_0:0 "[GetNKUName]"
 NKE_national_university_0_desc:0 "汀原大学从头到尾几乎完全是为了吸金而建造的，它根本不配称作一所大学。"
 NKE_national_university_1:0 "[GetNKUName]"
 NKE_national_university_1_desc:0 "汀原大学的教学与学术水平都令人不敢恭维。"
 NKE_national_university_2:0 "[GetNKUName]"
 NKE_national_university_2_desc:0 "汀原大学是一所中规中矩的大学，能够给这个社会注入应有的活力。"
 NKE_national_university_3:0 "[GetNKUName]"
 NKE_national_university_3_desc:0 "汀原大学的教学与学术水平都质量过硬，这得益于其优秀的校园环境，教师质量或生源质量。"
 NKE_national_university_4:0 "[GetNKUName]"
 NKE_national_university_4_desc:0 "汀原大学是一所水平顶尖的大学，甚至有不少外国留学生也会不远千里来此求学。"
 
 NKE_nation_of_vitality:0 "活力四射的国度"
 NKE_nation_of_vitality_desc:0 "在从慈悲大王令人震惊的屠杀中恢复过来后，我们发现自己反过来却也因此受益——整个社会几乎全部由青壮年与儿童组成，而这个阶段的人正充斥着理想与好奇心，活跃积极地想要探索这个刚刚发现他们的世界。我们将会有数十年的时间没有卧病在床的老人需要赡养，而我们将抓住这个从血泪中获得的珍贵的机会，将[NKE.GetName]建设得更好。"
 NKE_Peoria_cooperation_pact:0 "皮奥瑞亚-左汀原合作条约"
 NKE_Peoria_cooperation_pact_desc:0 "[PEO.GetNameDef]和[NKE.GetNameDef]签订的合作条约规定了我们在政治、经济、军事与外交上对于[PEO.GetName]一定程度的合作与从属地位。有些人认为这是难以接受的屈辱，而有些人认为只有靠这才能抵挡住受依纳枝兰支持的桑山的攻势。"
 NKE_Peoria_cooperation_pact_refused:0 "拒绝了皮奥瑞亚的合作条约"
 NKE_Peoria_cooperation_pact_refused_desc:0 "我们不会让[PEO.GetNameDef]操纵我们的国家。即便这意味着我们将独自对抗依纳枝兰和桑山的侵略，我们也不会选择屈服。"
 NKE_developing_extrade:0 "稳中向好的外贸"
 NKE_developing_extrade_desc:0 "随着洪风角外贸市场的建成，我们的对外贸易正蓬勃发展。从外国商人那里注入的新鲜血液将会为我们整个社会的经济与政治体系添加一剂润滑液。"
 NKE_alam_tannery_pollution:0 "阿兰鞣革厂"
 NKE_alam_tannery_pollution_desc:0 "阿兰鞣革厂的污水直接排入了我们的土地里，毒害着我们岛上的植被和人民。不过想点好的，它带来了多少就业！"
 NKE_debt_bondage_impact:0 "契约苦役"
 NKE_debt_bondage_impact_desc:0 "一批又一批的兔人在和包工头签下“包身契约”后被运送到麦克斯叔侄运营的工厂内，在最差的居住、饮食与安全条件下像奴隶一样劳动，每天都要干满十八个小时，若工作量不达标就会被人高马大的人类监工殴打到半死。然而贫穷的左汀原有太多兔人家庭急需一些钱财维持生计了，这逼迫他们变得短视。"
 NKE_pearl_of_the_ocean:0 "海上明珠"
 NKE_pearl_of_the_ocean_desc:0 "我们维护着一条在瑶海上十分关键的航线，而汀原市作为这条航线的运转枢纽，宛如瑶海正中心的一颗美丽珍珠。"
 NKE_leveled_bureaucrat_idea:0 "十三品官员选拔制"
 NKE_leveled_bureaucrat_idea_desc:0 "供职于我们政府的官僚数量庞大，且严格地被分为正一品、从一品、正二品、从二品、正三品、从三品、四品、五品、六品、七品、八品、九品、无品十三个等级。品级制度规定了官僚的职权大小与收入等级，而庞大臃肿的选拔体制也导致任何人员调动都困难无比。"
 NKE_determinated_production:0 "决死生产"
 NKE_determinated_production_desc:0 "我们能准备战争的时间如水一般流逝，不惜一切代价我们也要生产出足以武装我们国家的武器。"
 NKE_final_devotion:0 "燃烧殆尽"
 NKE_final_devotion_desc:0 "左汀原的每一个人民，从幼童到中年人，从工人到学生，都已经准备好了献出生命来捍卫这份得之不易的自由。就连领导人们也拿起了步枪在前线作战，或帮助士兵们修筑堑壕。左汀原绝不屈服！"

###领导人###
 NKE_Viana_Weil:0 "维安娜·维尔"
 NKE_Viana_Weil_desc:0 "慈悲大王曾经在汀海岛上作威作福残害众生七十余载，而维安娜·维尔正是杀死慈悲大王的女英雄。维安娜·维尔因一名皮奥瑞亚调查记者拍下的全身是血、提着慈悲大王脑袋的照片而在皮奥瑞亚成为了一名大明星，这也让[NKE.GetName]获得了大量的皮奥瑞亚投资。"
 NKE_Emergency_Committee:0 "紧急状态委员会"
 NKE_Pramo_Evaty:0 "普拉默·艾瓦提"
 NKE_Aratr_Masse:0 "阿拉特-马斯"

###将领###
 NKE_Lihi_Suvha:0 "李希-苏瓦"

###内阁###
 NKE_Alpha_Mentur:0 "阿尔法·门托"
 NKE_Alpha_Mentur_desc:0 "阿尔法·门托是一名从皮奥瑞亚远洋而来志愿帮助左汀原共和国重建灾后经济体系的老绅士。他在来此地以前是一名远有卓见的经济学家。"
 NKE_Sapu_Randu:0 "萨普·兰度"
 NKE_Teru_Tiri:0 "特鲁-提里"
 NKE_Maruph_Peri:0 "马鲁夫·佩利"
 NKE_Prutos_Grey:0 "普鲁托斯·格雷"

###企业###
 NKE_nguhara_war_industry:0 "宏原兵工厂"

###国策###
 NKE_rise_up_from_ruins:0 "百废待兴"
 NKE_rise_up_from_ruins_desc:0 "慈悲大王虽然已经死去，但他给整个汀海岛带来的巨大的生产结构畸形不是一朝一夕可以抚平的。一名叫阿尔法·门托的皮奥瑞亚经济学家愿意为我们指导经济路线，他的知识和经验将会为我们即将进行的经济改革带来巨大帮助。"
 NKE_shirt_match_n_bread:0 "衬衫、洋火、面包篮"
 NKE_shirt_match_n_bread_desc:0 "放眼望去，我们几乎一无所有，除了我们好不容易得来的自由。不过即便是慈悲大王也需要维持汀原镇市民最基本的生活需求，在曾经被不死军团重兵把守的仓库里积压着许多食物与日用品。如今我们已经可以自由取用这些物资，我们得赶紧清点好数量，然后分发给全左汀原的民众。"
 NKE_vital_state:0 "朝气蓬勃"
 NKE_vital_state_desc:0 "吃饱喝足后，我们数量庞大的年轻人总算焕发出了他们应有的活力。几十名怀抱着远大梦想度过前半生、想要在自由的新时代大展拳脚一番的年轻人在市政府前排成长队想为我们供职。门托慧眼识珠，选出了其中三名脑袋灵活潜力丰富的年轻人进入[NKE.GetAdjective]政府。"
 NKE_national_university:0 "[GetNKUName]"
 NKE_national_university_desc:0 "萨普·兰度提议我们应该在汀原镇建立一所综合性大学，以加速我们的社会精英们吸纳来自东巴斯蒂亚的科学知识与文化习惯。这将开支巨大，但是我们相信这值得。"
 NKE_append_magic_college:0 "增设魔法学院"
 NKE_append_magic_college_desc:0 "尽管慈悲大王的黑魔法为我国带来了巨大伤痛，但是在政府严格控制下的魔法研究依然能给我们的社会带来巨大的裨益。我们应该在大学中增设一个专门用于学习和研究魔法的学院，既方便管控，又能发挥最大的效用。"
 NKE_Tso_Naghara_museum:0 "左汀原博物馆"
 NKE_Tso_Naghara_museum_desc:0 "在我们的政府供职人员里，没有人比特鲁-提里更熟悉左汀原地区在慈悲大王到来前的历史文化，也没有人比他更熟悉慈悲大王时期左汀原族受到的压迫的记录。他认为我们应该建立一座博物馆，用于展示左汀原地区的原生文化和慈悲大王为汀海岛带来的伤痛，同时也能成为我们市民和外来游客绝佳的文娱场所。"
 NKE_compose_national_anthem:0 "编写国歌"
 NKE_compose_national_anthem_desc:0 "[NKE.GetNameDef]现在还没有正式国歌。特鲁-提里表示他认识几名优秀的兔人音乐艺术家，可以为我国编写一部合适的国歌。国歌能增强我国的凝聚力，并且也能用于诸多正式场合。"
 NKE_Kaze_Cape_extrade_market:0 "洪风角外贸市场"
 NKE_Kaze_Cape_extrade_market_desc:0 "马鲁夫·佩利在很小的时候就在给洪风角的外国商人干搬运活计，因此他非常了解如何和外国商人们相处。他认为我们应该在洪风角建立一座专门的外贸市场，这既能促进洪风角的商业繁荣，也能为我们整个社会带来活力。"
 NKE_Kaze_Cape_port_expansion:0 "扩大洪风港"
 NKE_Kaze_Cape_port_expansion_desc:0 "洪风角的外贸产业已经欣欣向荣，而马鲁夫·佩利也提出了洪风港的扩建方案。一旦这个扩大版的港口在洪风角建成，我们的贸易行业的活跃度将会更上一层楼。"
 NKE_shining_vitality:0 "焕发活力"
 NKE_shining_vitality_desc:0 "在教育、文娱与外贸等产业均取得了极大的进展后，我们终于可以自豪地说，我们的社会文化已经从慈悲大王带来的巨大扭曲中走了出来。现在我们国民较低的平均年龄已经成为我们的优势，我们的社会包容昌明，我们的青年活力四射，而那些在慈悲大王的恐怖压迫下死去的人们我们永远也不会遗忘。"
 NKE_industry_civilian_1:0 "汀海纺纱厂"
 NKE_industry_civilian_1_desc:0 "左汀原广袤的平原是理想的棉花种植地区，但我们目前直接出口棉花实在获利太少。如果我们能就地将棉花纺织成布匹，那么我们不管是自用的布匹还是出口贸易额都能大幅增加。"
 NKE_infrastructure_1:0 "石板路进乡村"
 NKE_infrastructure_1_desc:0 "在慈悲大王时期，几乎所有的道路都是为了向他的宫殿进贡而铺设的夯土路。然而今天左汀原的经济中心是汀原镇和洪风角两个主要聚落，新发达的经济亟需重新修建的以汀原镇为核心的公路网。而目前阶段，我们至少要确保每个村庄都能和首都联通。"
 NKE_resource_1:0 "门托炼钢厂"
 NKE_resource_1_desc:0 "左汀原的山林中隐藏着数个优质的铁矿床，如果我们能将其就地加工冶炼，那么不管是本国的建设还是武装的建造都会受益无穷。"
 NKE_industry_civilian_2:0 "麦克斯制衣厂"
 NKE_industry_civilian_2_desc:0 "皮奥瑞亚富商布朗·麦克斯想要在洪风角的郊外投资建造一座制衣厂，虽然其中大半产能都要用于出口，但是剩下的那些依然能改善我们人民的生活。"
 NKE_alam_tannery:0 "阿兰鞣革厂"
 NKE_alam_tannery_desc:0 "皮奥瑞亚的制革大王阿兰·麦克斯，即布朗·麦克斯的侄子从他的叔叔那里讨来了一块地用于建造鞣革厂，供给他叔叔的制衣厂。这个鞣革厂能够给我们的野兔养殖业注入大量活力，至于制革过程中带来的一点小小污染，谁关心呢。"
 NKE_debt_bondage:0 "包身工"
 NKE_debt_bondage_desc:0 "麦克斯叔侄向我们介绍了一种新鲜的雇佣形式，叫包身契约。大体内容就是向[NKE.GetAdjective]的年轻人支付一笔钱作为补助金，然后将他们在工厂内集中管理、提供吃住。尽管门托极力反对这个提案，但是门托或许比麦克斯叔侄懂经济学，但门托可没他们懂[NKE.GetAdjective]。"
 NKE_independent_industrialization:0 "左汀原自主工业化"
 NKE_independent_industrialization_desc:0 "我们将会走上独立自主的工业化道路。[NKE.GetAdjective]与我们人民的未来不能被随意的交给他人摆布，只有独立自主地完成工业化我们才能有明天，无论代价。"
 NKE_infrastructure_2:0 "左汀原公路系统"
 NKE_infrastructure_2_desc:0 "如果我们想要完成工业化，那么目前以石板路为主体的公路系统是完全不够的。我们需要将平坦的公路铺设到[NKE.GetAdjective]的各个乡村，形成基础的公路网系统，以便更好地从资源采集场收集原材料。"
 NKE_industry_fund:0 "筹集工业补助金"
 NKE_industry_fund_desc:0 "由于工业化的巨大开支，我们需要从我们的人民和部分新晋企业家那里筹集大量的资金。这短时间内可能会带来阵痛，但长期来看能带来更大的收益。"
 NKE_industrial_final_upgrade:0 "瑶海明珠"
 NKE_industrial_final_upgrade_desc:0 "我们发达的工业体系将会将汀原镇建立为一座繁荣的海上明珠，真正实现左汀原的复兴。这将耗费漫长的时间且花费巨大，不过我们早已知晓自由所需要付出的代价。"
 NKE_industry_military_1:0 "宏原兵工厂"
 NKE_industry_military_1_desc:0 "随着来自桑山的威胁愈来愈大，我们将在离汀原镇距离较远的宏原村中修建一座兵工厂，用于生产国土防卫所必须的武器和弹药。"
 NKE_industry_military_2:0 "扩大汀原造步枪生产线"
 NKE_industry_military_2_desc:0 "我们将会在宏原兵工厂中额外建造几条进口的步枪与步枪弹生产线，用于生产我们仿造的汀原造八九式步枪及其配套弹药。"
 NKE_industry_military_3:0 "“胜利女神”兵工厂"
 NKE_industry_military_3_desc:0 "拒绝了皮奥瑞亚提出的不平等条约后，我们将独自对抗来自桑山与依纳枝兰的武装侵略。面对着依纳枝兰压倒性的兵力，我们恐怕只能祈求胜利女神的保佑与宽恕——尽管我们早已不信任何神明。"
 NKE_reform_old_farms:0 "改造旧田地"
 NKE_reform_old_farms_desc:0 "慈悲大王时期有许多农田被征用拿来生产他研究需要的有毒作物。如今虽然慈悲大王已经被挫骨扬灰，但他的这些作物还长在地里，咄咄逼人地威胁着我们。是时候烧掉这些毒草了。"
 NKE_planned_farming:0 "有目的种植"
 NKE_planned_farming_desc:0 "在我们的农业已经初具规模的当下，原来漫无目的的种植思路已经过时了。我们应当更加有计划性地种植农作物，以便在国际上获取更大的利益。"
 NKE_looking_around:0 "环顾四周"
 NKE_looking_around_desc:0 "在汀海岛的四周，东巴斯蒂亚大陆上和南方的大洋中，有许多国家。在桑山的极端民族主义者们已经开始向南方的依纳枝兰寻求支援的情况下，我们必须也要和周边国家进行外交，否则我们将孤立无援。"
 NKE_Peoria_cooperation_pact_nf:0 "邀请皮奥瑞亚大使来访"
 NKE_Peoria_cooperation_pact_nf_desc:0 "我们将会邀请皮奥瑞亚大使前来总统府商谈我国与[PEO.GetName]的合作形式。我们尚不知道他们会以何种姿态面对我们，但是皮奥瑞亚的支持对于我国十分重要。"
 NKE_Peoria_economic_invest:0 "接受皮奥瑞亚的经济投资"
 NKE_Peoria_economic_invest_desc:0 "[PEO.GetName]的几位经济专家访问了我国，并且在分析了一通之后确定了对我们的投资方案。按照我们和皮奥瑞亚的合作条约，我们只能无条件接受。"
 NKE_Peoria_steel_agent:0 "矿物代理开采"
 NKE_Peoria_steel_agent_desc:0 "[PEO.GetName]要求我们将左汀原的铁矿床的开采权卖给他们的钢铁大王XXX。他承诺这些钢铁将会用于生产用来保护我们的武器。"
 NKE_Peoria_politic_agent:0 "皮奥瑞亚人政府雇员"
 NKE_Peoria_politic_agent_desc:0 "皮奥瑞亚有许多经验丰富的官员，他们可以帮助我们走出目前职业官僚短缺的窘况。"
 NKE_Peoria_military_agent:0 "全域军事保护"
 NKE_Peoria_military_agent_desc:0 "我们的军队并不足以帮我们控制住桑山，那群狂热的翼兔人需要更加强大的武装力量镇压，比如皮奥瑞亚的保安大队。"
 NKE_breakdown_before_buildup:0 "不破不立"
 NKE_breakdown_before_buildup_desc:0 "我们在接下来面对桑山和依纳枝兰的战争中将只能靠我们自己。如果我们现在还拘谨于一些小的细节的话，那么我们没可能赢得这场战争。是时候狠下决心，抛弃一些我们曾以为必须坚守的原则了。"
 NKE_engine_overload:0 "引擎过载！"
 NKE_engine_overload_desc:0 "没有时间了，我们必须倾尽我们[NKE.GetAdjective]人民的一切用于生产我们保卫国家需要的武器。我们将付出巨大代价，但我们别无选择。"
 NKE_the_blood_we_bleed:0 "我们流下的血"
 NKE_the_blood_we_bleed_desc:0 "在过去的数十年里，[NKE.GetAdjective]人已经几乎流尽了血。我们必须让我们的人民坚定地相信，在不久的将来我们还必须再流一次血，而这些鲜血将成为我们国家坚实的基石。"
 NKE_alliance_with_Peoria:0 "与皮奥瑞亚的军事联盟"
 NKE_alliance_with_Peoria_desc:0 "那些皮奥瑞亚人曾经想要趁着我们亟需帮助的时候从中作梗、篡夺我们的国家。如今我们已经证明了自己不需要皮奥瑞亚的帮助，现在轮到皮奥瑞亚需要我们了。"
 NKE_alliance_with_Inajran:0 "与依纳枝兰的军事联盟"
 NKE_alliance_with_Inajran_desc:0 "虽然依纳枝兰曾经帮助桑山发动对我们的侵略，但是东巴斯蒂亚大陆诸国同样对我们虎视眈眈。如今我们已经证明了依纳枝兰需要我们的同意才能北上染指东巴斯蒂亚，现在轮到依纳枝兰需要我们了。"
 NKE_negotiate_with_Zunyama_1:0 "理性谈判"
 NKE_negotiate_with_Zunyama_1_desc:0 "我们会派一个全副武装的代表团前往左汀原与桑山的边界与其进行谈判。希望我这个代表团能活着归来，如果能拖慢桑山人的动员那就更好了。"
 NKE_negotiate_with_Zunyama_2:0 "陈词利弊"
 NKE_negotiate_with_Zunyama_2_desc:0 "虽然我们不认为可以说服那群疯狂的翼兔人接纳文明，但是我们还是可以通过一些简单的逻辑告诉他们立刻对我们展开进攻并不是一个好的选择。"
 NKE_negotiate_with_Zunyama_3:0 "卑微恳求"
 NKE_negotiate_with_Zunyama_3_desc:0 "似乎哪种策略对于桑山人的触动都不长久。我们会最后试着通过同为慈悲大王灾难的受害者的身份唤起他们的一点同情。"
 NKE_domestic_defense:0 "国土防御"
 NKE_domestic_defense_desc:0 "左汀原的国土安全状态十分危急，周围列强正对左汀原虎视眈眈。我们需要紧急建立起一支能够暂时保护左汀原国家安全的国土防御部队。"
 NKE_commander_training:0 "培训指挥人员"
 NKE_commander_training_desc:0 "培养靠谱的将官是一件漫长的工作，而我们并没有那么多时间，必须速战速决培训一批可堪一用的指挥人员。"
 NKE_train_more_commanders:0 "更多的指挥人员"
 NKE_train_more_commanders_desc:0 "仅有李希-苏瓦一名指挥官不够，我们他来为我们培训更多的指挥官。"
 NKE_train_Lihi_Suvha:0 "特训指挥人员"
 NKE_train_Lihi_Suvha_desc:0 "李希-苏瓦虽然优秀，但我们仍需要他继续精进他的技能。"
 NKE_fortificate_project:0 "国防工程"
 NKE_fortificate_project_desc:0 "我们聘请了一名经验丰富的筑垒工程师，普鲁托斯·格雷。我们将会请他来指导我们的防御工程作业。"
 NKE_emergency_mobilisation:0 "紧急动员"
 NKE_emergency_mobilisation_desc:0 "我们和桑山与他们的依纳枝兰援军之间的战争已经正式打响，我们应该紧急展开对左汀原人的动员工作。这将是一场苦战。"
 NKE_the_final_struggle:0 "最后的挣扎"
 NKE_the_final_struggle_desc:0 "我们的国家已经危在旦夕，虽然失败或许已经不可避免，但是我们依然要做最后的挣扎！"
 NKE_the_final_devotion:0 "燃烧殆尽"
 NKE_the_final_devotion_desc:0 "我们是自由人，我们不会做奴隶，我们会战斗到最后一刻，我们会战斗到最后一人，左汀原绝不屈服！"
 NKE_land_defense_theory:0 "防御理论"
 NKE_land_defense_theory_desc:0 "为了应对迫近的威胁，我们的国防理论需要进一步更新。"
 NKE_country_scale_fortification:0 "左汀原要塞化"
 NKE_country_scale_fortification_desc:0 "我们将进行一个庞大的工程——在左汀原的边境上修建一连串的坚固要塞，以保护我们的人民远离敌寇的侵袭。"
 NKE_Naghara_rifle_89:0 "汀原造八九式步枪"
 NKE_Naghara_rifle_89_desc:0 "虽然国外有可以进口的武器，但是我们仍然需要自己仿造一款可以自主生产制造的步枪。"
 NKE_import_Zhetysu_weapons:0 "进口七河武器"
 NKE_import_Zhetysu_weapons_desc:0 "作为巴斯蒂亚最大的军火出口商之一，[ZHE.GetName]出口的武器无疑适合我国大量采购用于国防。"
 NKE_Naghara_smg_00:0 "汀原造玲珑冲锋枪"
 NKE_Naghara_smg_00_desc:0 "我们需要更加优秀的步兵轻武器来赢得这场战斗，而这款小巧的玲珑冲锋枪就是一个优秀的解决方案——最重要的是我们能自己生产。"
 NKE_Naghara_artillery_11:0 "汀原造十一式火炮"
 NKE_Naghara_artillery_11_desc:0 "火炮是当代战争的制胜之器，左汀原必须拥有自己生产火炮的能力！"
 NKE_a_fake_victory:0 "胜利？"
 NKE_a_fake_victory_desc:0 "我们在[PEO.GetName]的帮助下击退了桑山在依纳枝兰协助下发起的攻势。"
 NKE_a_red_dawn:0 "血色黎明"
 NKE_a_red_dawn_desc:0 "我们保持着光荣的自由独立，没有屈服于[PEO.GetName]的淫威，在桑山的复仇主义者与依纳枝兰的侵略者面前保卫了左汀原的人民，迎来了战争的胜利。\n\n“左汀原，左汀原，屹立狂风骤雨中。”\n“百年血泪成湖海，一朝自由破枷锁。”\n“左汀原，左汀原，今夕重建家园。”\n“朝阳初升照大地，明日依旧在，笑望未来。”"
 NKE_Zunyama_reeducate_camp:0 "桑山再教育营"
 NKE_Zunyama_reeducate_camp_desc:0 "我们会在桑山的平原上开设一座再教育营地，用于矫正思想极端的一小撮桑山人，帮助他们回归正常社会生活。"
 NKE_reunite_Nagakai:0 "整合汀海岛"
 NKE_reunite_Nagakai_desc:0 "同为兔人民族，左汀原族和桑山族不应拥有隔阂，我们应该合二为一，将汀海岛重新整合为一个共和国——汀海共和国。"
 NKE_stronger_army_n_nation:0 "强军强国"
 NKE_stronger_army_n_nation_desc:0 "这个世界并不太平，虽然我们已经饱受战争煎熬，但是我们依然需要一支更强大的军队来保障我们的国家安全。"
 NKE_artillery_troop:0 "炮兵部队"
 NKE_artillery_troop_desc:0 "我们需要组建一支小规模的炮兵部队，以为汀海岛提供一支有力的防御力量。"
 NKE_wheres_the_path:0 "去向何方"
 NKE_wheres_the_path_desc:0 "我们已经摆脱了慈悲大王那恐怖残暴的统治，但现在我们迷茫而弱小，又失去了可以仰仗的英雄人物，不知道应该去向何方。若这是个和平的年代，我们尚有时机试错，然而桑山的那群疯狂的复仇主义者、和对汀海岛的战略地位虎视眈眈的皮奥瑞亚与依纳枝兰并不给我们试错的机会。我们必须赶紧找到前进的方向，无论那条路通向何方。"
 NKE_oligarchy_path:0 "规范化官僚体系"
 NKE_oligarchy_path_desc:0 "我们应该追随维安娜·维尔总统，她是从慈悲大王手中拯救我们的英雄，而以后她将会再一次将我们拯救。让那些散播我们伟大领袖谣言的家伙吃屎去吧。"
 NKE_standard_bureaucracy:0 "规范化官僚体系"
 NKE_standard_bureaucracy_desc:0 "由于我们的社会运行经历尚浅，我们的政府官僚组织十分混乱。我们应该借鉴大陆上其他国家的先进政治组织经验，引入他们的官僚体制，以加强我们对[NKE.GetAdjective]的管控。"
 NKE_leveled_bureaucrat:0 "十三品官员选拔制"
 NKE_leveled_bureaucrat_desc:0 "若我们的官僚体系等级不够明确，那么以下犯上的案件便会时常发生。我们应该用浅显易懂的方法划分出官员的职权范围与级别，避免它们僭越。"
 NKE_control_the_media:0 "媒体管制"
 NKE_control_the_media_desc:0 "那些抹黑我们伟大领袖光辉形象的媒体不应该肆无忌惮地胡乱发言。我们应该立法禁止媒体对于维安娜·维尔总统的侮辱，对违反的媒体处以罚款。"
 NKE_shut_the_fuck_up:0 "严格管理舆论！"
 NKE_shut_the_fuck_up_desc:0 "这帮刁民真是越来越狂了！我们需要严格管理国内的舆论，不能让这种有害谣言继续危害我国国家安全！"
 NKE_glorify_Viana_Weil:0 "圣雄维安娜·维尔"
 NKE_glorify_Viana_Weil_desc:0 "“维安娜·维尔是一名没有瑕疵的英雄，她拯救了全[NKE.GetAdjective]的人民，而接下来她将继续守护[NKE.GetAdjective]。[NKE.GetAdjective]人在圣雄维安娜·维尔的庇护下茁壮成长，永远感恩，永远铭记。”——《左汀原宪法》"
 NKE_oppose_Viana_Weil:0 "反对维安娜·维尔！"
 NKE_oppose_Viana_Weil_desc:0 "虽然维安娜·维尔是杀死慈悲大王的英雄，但她现在的恶劣行迹已经证明了国家光靠英雄是无法运行下去的。我们必须反对维安娜·维尔与和她利益盘根错节的腐败分子们，重整新风。"
 NKE_reveal_Viana_Weil_guilt:0 "公布维安娜·维尔的罪孽"
 NKE_reveal_Viana_Weil_guilt_desc:0 "我们将会对维安娜·维尔政府的相关人员和受害者进行一次详尽而深入的调查，随后公开这份调查报告，将维安娜·维尔在任期间所犯的罪孽详细公布出来，让[NKE.GetAdjective]的人民了解一下这位女英雄的另一面。"
 NKE_go_to_the_street:0 "走上街去！"
 NKE_go_to_the_street_desc:0 "我们将会带领那些支持我们运动的群众们走上街头抗议维安娜·维尔的暴行，并要求对她进行审判。[NKE.GetAdjective]的人民将会站在我们这边！"
 NKE_the_fate_of_Viana_Weil:0 "维安娜·维尔的命运"
 NKE_the_fate_of_Viana_Weil_desc:0 "维安娜·维尔已经彻底身败名裂，我们将会让她得到她应得的审判与惩罚。"
 NKE_constitution_democracy_movement:0 "宪政民主运动"
 NKE_constitution_democracy_movement_desc:0 "国家元首的权力和行为不可以不被宪法与人民的意志约束，我们必须要让这个国家的运行受限于宪法与民主议会的框架中。作为一名思想深刻、经验丰富的自由主义革命者，普拉默·艾瓦提能够给我们的运动巨大的帮助。"
 NKE_upper_house_govern:0 "上议院主导"
 NKE_upper_house_govern_desc:0 "我们的民主议会的议程应该更加偏向于上议院的意见，因为这些实际持有更多资产或受教育程度更高的人能够更好地保障我们国家的自由未来。"
 NKE_liberal_republican_government:0 "自由的国度，自由的政府"
 NKE_liberal_republican_government_desc:0 "普拉默·艾瓦提在宪政民主运动期间的声望让他成为了民众心中左汀原第二任总统的不二之选，他将欣然接受这份重担。"
 NKE_labour_representive:0 "劳工代表"
 NKE_labour_representive_desc:0 "维安娜·维尔的政府长期忽视底层劳工的声音，而正是工农们才是整个左汀原的基石。阿拉特-马斯就是一名左汀原贫农的孩子，但他一直致力于左汀原的劳工运动，拥有难得的乐观精神与理想主义。"
 NKE_downer_house_govern:0 "下议院主导"
 NKE_downer_house_govern_desc:0 ""我们的民主议会的议程应该更加偏向于下议院的意见，因为这些代表底层劳工意见的声音才能更好的反映我们人民的意志。
 NKE_social_democrat_government:0 "人民当家做主人"
 NKE_social_democrat_government_desc:0 "当我们要建立一个社会民主主义政府时，阿拉特-马斯在劳工运动中所作的贡献无疑让他成为最合适的左汀原国家主席。"
 
