###变量###
 NKE_weekly_citify_progress:0 "每周城市化进程"

###事件###
 
 NKE.0001.t:0 "维安娜·维尔的秘书"
 NKE.0001.desc:0 "维安娜·维尔花费重金聘请了一名经验丰富的皮奥瑞亚秘书，据说这位新秘书曾经在皮奥瑞亚的国家银行工作过许多年。希望这笔钱花得物有所值。"
 NKE.0001.a:0 "“您的要求我们会无条件满足，维尔总统。”"
 NKE.0002.t:0 "维安娜·维尔的新秘书"
 NKE.0002.desc:0 "维安娜·维尔表示这位秘书的工作能力不如预期，要求聘请新秘书。她在几名应聘的兔人中选中了一名身材矮小的兔人少女。面对其他候选人的质问，她表示她在这位少女身上看到了巨大的潜力。"
 NKE.0002.a:0 "“我们相信您的决定，维尔总统。”"
 NKE.0003.t:0 "维安娜·维尔的晚宴"
 NKE.0003.desc:0 "维安娜·维尔在总统府内开展了一场规模盛大的晚宴，邀请了[NKE.GetAdjective]社会各界的新兴名流参加。晚宴上觥筹交错，维安娜·维尔在期间穿梭，与受邀者们谈笑风生。"
 NKE.0003.a:0 "“维尔总统，我们明白您有自己的考量，但请稍微节约一点开支......”"
 NKE.0004.t:0 "维安娜·维尔的新秘书"
 NKE.0004.desc:0 "维安娜·维尔的秘书，一名年轻的兔人少女，她的尸体在今天清晨被门卫丢出了总统府。当天随后的演讲中，维安娜·维尔表示这位秘书试图刺杀她，但是失败了，被她当场杀死。而她则又调用了一大笔资金用于雇佣新的秘书，这回她选择了一名精壮的兔人建筑工人。"
 NKE.0004.a:0 "“维尔总统，您真是宝刀未老，不过雇佣秘书真的有必要那么大费周章吗？”"
 NKE.0005.t:0 "维安娜·维尔重新装潢总统府"
 NKE.0005.desc:0 "维安娜·维尔将当月的工业与农业补贴资金的金额减少了一半，将这部分资金用来重新装潢总统府的内设。她聘请了[NKE.GetAdjective]最专业的建筑队，不到几天总统府就被修葺一新，富丽堂皇。新的总统府建筑外饰风格参考了七河的XX与皮奥瑞亚的XX，在周围老旧的平房中鹤立鸡群。"
 NKE.0005.a:0 "“维尔总统，我们现在没多少资金，请您自重！”"
 NKE.0006.t:0 "维安娜·维尔在总统府举办秘密派对"
 NKE.0006.desc:0 "维安娜·维尔邀请了几名[NKE.GetAdjective]名流与十几名花魁参加她在总统府地下室中举办的派对，并专门采购了好几桶皮奥瑞亚进口顶级干红。她将地下室的大门锁上，一天一夜不过问国事，当总统府的警卫强行破开地下室大门冲进去查看情况时，他们看到了一地横七竖八、酩酊大醉、一丝不挂的花魁和名流。\n\n浑身赤裸，身上只披着暗红色的葡萄酒渍的兔人女总统，站在一地的男女间，举起了一袋白色的粉末，流着口水。"
 NKE.0006.a:0 "“你们也来吸一点！”"
 NKE.0101.t:0 "维安娜·维尔被发现涉嫌严重贪污腐败！"
 NKE.0101.desc.a:0 "据几名政府官员与总统府警卫的证言，维安娜·维尔总统涉嫌集团贪腐、擅自挪用公款、蓄意谋杀、绑架、滥用精神药物等多项问题。由于当前我们的政治与法治体系并不成熟，我们并不能将这位受人爱戴的民选总统弹劾，只能努力减轻这桩丑闻带来的影响。"
 NKE.0101.desc:0 "据几名[NKE.GetAdjective]政府官员与总统府警卫的证言，[NKE.GetAdjective]的总统维安娜·维尔涉嫌集团贪腐、擅自挪用公款、蓄意谋杀、绑架、滥用精神药物等多项问题。由于[NKE.GetAdjective]的政治与法治体系并不成熟，他们并不能将这位受人爱戴的民选总统弹劾。"
 NKE.0101.a:0 "天哪！"
 NKE.0101.b:0 "所以说，英雄必须死。"
 
 NKE.0201.t:0 "审判维安娜·维尔"
 NKE.0201.desc:0 "总统府外，抗议维安娜·维尔暴行的市民如同洪水一般涌来。维安娜·维尔指挥着她的亲卫队朝着人群射击，试图阻碍汹涌的人潮，但面对这支平民大军即便是亲卫队也因恐惧到肝颤，已经逃跑了大半。\n抗议人群不一会就冲破了总统府外墙大门，杀死了几名没能及时撤进室内的巨贪与伏地投降的守卫，随后继续冲击正门。维安娜·维尔见到这一幕，连忙停止收拾她的细软，命令亲卫队坚持死守总统府，随后抓起几包昂贵的宝石从壁炉里隐藏的秘密通道逃走。\n没过多久，总统府正门的金属门闩也在人群的冲击下一点点弯曲形变，最后发出一声脆响并断裂。抗议人群涌入了总统府，一个一个房间清扫负隅抵抗的亲卫队们，但是最终也没有找到维安娜·维尔。\n\n此时，维安娜·维尔已经在底下的秘密通道里大步奔向自由。她带着从左汀原各界名流那里收取或抢夺而来的几包宝石，在伸手不见五指的黑暗甬道里敏捷地穿行，很快便到达了秘密通道的出口。\n在出口处迎接她的，并不是她想象中的自由，而是几名社会党和自由民主党的高层，十几名警察，与一排黑洞洞的枪口。\n维安娜·维尔痛哭流涕，趴伏在地上，如小鸡啄米一般磕头，宝石散落了一地。\n\n而回应她的只有冷冰冰的声音。“维安娜·维尔，经左汀原议会三分之二多数表决决定，你被解除一切在左汀政府内的职务......”"
 NKE.0201.a:0 "“并被驱逐出境。”"
 NKE.0201.b:0 "“并处以无期徒刑。”"
 NKE.0201.c:0 "“并处以死刑，立即执行。”"
 NKE.0202.t:0 "维安娜·维尔的命运"
 NKE.0202.desc:0 "维安娜·维尔感激涕零，那冰冷的声音在她耳中此刻却显得那么温暖。她顺从地匍匐在地上，几名警察走上前去，把她套进了一个大麻布袋，随后扔进了一个手推车里。\n维安娜·维尔期待又有些不安地听着手推车在汀原镇的道路上行进发出的轮轴声，同时又暗自窃喜自己在下体暗藏的几枚最大的红宝石没有被发现。\n最终，手推车停了下来，维安娜·维尔感觉自己被抬起来，最后重重地扔到了一些软质的物体上。\n\n维安娜·维尔静候了一会，听到袋子外面已经没有声音发出，认为自己已经安全了，随后便小心翼翼地准备打开麻袋。然而她还没来得及自己打开，就有一只大手粗暴地揪住她的双耳，从麻袋里硬生生地把她拽了出来。\n维安娜·维尔努力扭过头，试图去看清绑架她的人的身份。而当她真正看清对方的脸的时候，她的心情瞬间凉到了谷底。\n\n对方是一名在巴斯蒂亚臭名昭著的奴隶贩子，当年她聘请的那名兔人少女秘书的真实身份就是在这个奴隶贩子手里买来的女仆。\n维安娜·维尔试图踢开他，然而兔人的力量根本无法与壮年的人类大汉抗衡，她被奴贩轻松地倒着提了起来，而奴贩则扯着她那一身华丽昂贵的礼服，细细地端详她的身体。\n“我的天哪，我上一次见你的时候你还很健康，怎么现在品相已经变得这么差了？你到底在同时吸多少种毒品啊？我还花了好几百克黄金来买你，真他妈被那群自民党的狗东西骗了。”\n奴贩愤怒地把维安娜·维尔扔到了一旁，而她体内的红宝石也因此掉了出来。"
 NKE.0202.a:0 "“我操，赚大发了！”"
 NKE.0203.t:0 "维安娜·维尔的命运"
 NKE.0203.desc:0 "维安娜·维尔趴在地上，不敢动弹。她十分清楚自己所犯下的罪孽值得被判处死刑，现在能被判处无期徒刑已属侥幸。\n或许是功过相抵，抑或是避免自己在被清算时也被判处死刑，维安娜·维尔不清楚对方宽恕自己的原因，但她已经对这个结果相当满足。\n维安娜·维尔顺从地匍匐在地上，几名警察将她的双手拷进手铐中，随后押进了一辆囚车。囚车慢慢驶入了由她一手创办并以她命名的维安娜·维尔监狱。\n\n维安娜·维尔本以为自己会有一间单独的囚室，然而她突然冷不丁地想起来，自己在创办这所监狱的时候并没有设立过这种东西——毕竟她从来没有想过自己有一天也会住进这里。监狱警卫们把她押进监狱，而她的心情也越来越凉。\n最终，她被警卫们带到了她为政治犯和死刑犯们专门设立的大通铺牢房，她恐慌地想要挣脱，但是警卫们无情地一脚把她踢进了牢房，随后重重地关上了牢门。\n维安娜·维尔看到几名兔人壮汉与几名曾被她拷打迫害过的政治犯正摩拳擦掌，朝她走来。她恐慌地向后奔跑，结果迎面撞上了一名她这辈子见过的最高壮的兔人。那位兔人默默地抬起拳头，随后一拳打在维安娜·维尔的太阳穴上。"
 NKE.0203.a:0 "“冤有头，债有主。”"
 NKE.0204.t:0 "维安娜·维尔的命运"
 NKE.0204.desc:0 "维安娜·维尔绝望地颤抖着，继续努力地在地上磕头，乞求反对党高层的原谅。然而她的乞求只换来吐在她脑袋上的一口浓痰，随后她就被几名警察压在地上严严实实地捆了起来，背上还被插了一块亡命牌。\n“维安娜·维尔【斩】”\n随后，不等她缓过神来，那几名警察就把她丢进了一辆游街专用的囚车里，随后囚车缓缓地动了起来，把她拉到了大街上游街示众。\n四周的民众纷纷向她投掷腐烂的鸡蛋与蔬果，她在低矮的囚车内行动不便，被那些民众砸了个正着，甚至有一颗烂番茄从栏杆的缝隙里钻了进去直直地飞进了维安娜·维尔的嘴里。\n\n漫长的游街示众终于结束，维安娜·维尔察觉到自己已经被押运到了汀原镇的中心广场——正是她当年举着慈悲大王的头颅化身左汀原的英雄的场所。\n警察将她从囚车里拖出来，维安娜·维尔虽然仍在努力地挣扎，但她的力量完全不敌经过专业训练的警察们，被硬生生地在地面上拖拽到了广场中央的已经被改造成主席台的祭坛上，而刽子手和审判官已经在此处等候多时。\n“经左汀原议会三分之二多数表决决定，维安娜·维尔被解除一切在左汀政府内的职务，并被判处斩首死刑，立即执行。行刑！”\n审判官话音刚落，刽子手就揪住了维安娜·维尔的双耳，用一把长刀抵住了她的喉咙，随后抬起一挥，维安娜·维尔没有头颅的躯体就重重倒在主席台上，裸露出的颈部断面汩汩地流出鲜红的血液，顺着主席台的边缘留到台下。\n几名身手敏捷的兔人成功地接到了一杯维安娜·维尔的动脉血，随后快速跑出了中心广场。\n\n审判官从刽子手手里接过维安娜·维尔的头颅，随后高举在手中向四周的群众展示，并振臂高呼：\n“维安娜·维尔已经死了！”\n随后，他一脚将维安娜·维尔尸体剩余的部分踹下了主席台。她的尸体不到几秒就被幸运接到尸体的群众分光了。审判官用余光看到，似乎有个小孩手里拿着几颗红色的石头在人群中穿梭。"
 NKE.0204.a:0 "“她怎么连死都能搞出这么多麻烦？”"
 
 NKE.1001.t:0 "皮奥瑞亚提出合作条约"
 NKE.1001.desc:0 "近日，[PEO.GetNameDef]的大使抵达了我国的总统府，并与[NKE.GetAdjective]政府的数名高官展开了激烈的讨论。[PEO.GetNameDef]要求[NKE.GetNameDef]对皮奥瑞亚的商业投资无条件接纳，并且政治、军事与外交均需要得到皮奥瑞亚方的指导，以换取[PEO.GetNameDef]的军事保护。"
 NKE.1001.a:0 "为了安全，我们别无选择。"
 NKE.1001.b:0 "我们早已知晓自由的代价，而我们愿意承担。"
 NKE.1002.t:0 "皮奥瑞亚汇来一笔援助"
 NKE.1002.desc:0 "[PEO.GetNameDef]援助的一批民生物资与资金已经运抵汀海镇的港口。"
 NKE.1002.a:0 "谢谢。"
 NKE.1002.b:0 "奇怪，这批物资怎么比说好的要少？"
 NKE.1101.t:0 "汀原市建成"
 NKE.1101.desc:0 "阿尔法·门托站在汀原市中心最高的钟楼上，满意地看着四周熙熙攘攘喧闹着的人民。他呕心沥血，帮助[NKE.GetAdjective]的人民们从蛮荒的乡村状态解脱出来，将汀原镇建设成了一座真正的都市。现在瑶海的大部分航线都会将汀原市作为重要的中转站，每天都有无数的货轮与客船从汀原市和洪风角的海港中进进出出。他举起手中的茶杯，慢慢地喝了一口枸杞银耳茶。"
 NKE.1101.a:0 "“希望这繁荣能持续下去。”"
 
 NKE.2001.t:0 "指挥官培训完成"
 NKE.2001.desc:0 "我国紧急培训的指挥官李希-苏瓦已经完成了培训，他已经准备好投入一场真正的战争。"
 NKE.2001.a:0 "我们终将胜利！"
 NKE.2002.t:0 "李希-苏瓦特训完成"
 NKE.2002.desc:0 "在经过整整半个月的沙盘推演与模拟对抗后，李希-苏瓦现在已经能更加灵活地运用他的部队了。"
 NKE.2002.a:0 "让我们验收一下训练成果。"
 NKE.2101.t:0 "绝不屈服！"
 NKE.2101.desc:0 "在数年前，左汀原人从慈悲大王恐怖的统治中解放出来时，他们便知晓了“自由”绝非一个可以轻谈的词汇。当自由真的作为一个砝码被放在了价值衡量的天平上时，它有千钧重。而如今，桑山的疯子们手里的屠刀已经架在了左汀原人民的脖颈上。左汀原将会向她的敌人们证明，自由人们为了捍卫自由究竟愿意做出多大的牺牲。"
 NKE.2101.a:0 "到前线去！"
 
 NKE.3001.t:0 "确定大学选址"
 NKE.3001.desc:0 "听闻[NKE.GetAdjective]政府拨款准备在汀原镇建立一所综合性大学，一名皮奥瑞亚富商表示愿意出资来帮我们在市外建立一座庞大的校园，条件是要拿他的名字来命名主教学楼，并且要由他来包办这所大学的食堂与教材。除此之外，许多慈悲大王时期留下的恐怖设施建筑也可以改建成大学校园，不过如果那样校园里可能会有未知的危险。\n\n当然我们也可以选择自己出钱出力在市郊建造一座普通的校园，虽然可能小了点，但我们能保证这所大学是[NKE.GetAdjective]自己的大学。"
 NKE.3001.a:0 "接受皮奥瑞亚富商的资助。"
 NKE.3001.b:0 "改造无用的旧建筑。"
 NKE.3001.c:0 "我们将会建造自己的校园。"
 NKE.3002.t:0 "聘请授课教师"
 NKE.3002.desc:0 "校园建好了，接下来我们需要决定聘请授课教师的方针。我们当然可以装模作样地找几个兔人坐在讲台上照本宣科，虽然即便这样我们也得花不少资金来寻找识字并且脑袋够用的讲师。如果我们舍得花钱的话，也可以从[PEO.GetName]、[ARO.GetName]、[TPG.GetName]或远乡王国雇佣一些他们大学里的讲师来教育我们的学生。"
 NKE.3002.a:0 "第一个大学教授肯定没上过大学，我们应该相信我们的国民。"
 NKE.3002.b:0 "人文科学可以先苦苦，理工学科必须要重视！"
 NKE.3002.c:0 "教育事务决不能怠慢，即使下血本我们也得聘请优秀的教师！"
 NKE.3003.t:0 "遴选入学新生"
 NKE.3003.desc:0 "听说我们新设立的大学即将开放招生，大量社会人员争先恐后想要来获得一袭名额，其中包括一些真正受过一定基础教育且能力强大的青年，但更多的只是想在大学里镀个金的新贵们。由于他们本身在慈悲大王死后已经积攒了大量的资金，我们并不需要给他们发放助学金，甚至可以从他们上缴的学费中获得一笔可观的收入，而代价就是他们完全无法给我们的高等教育事业起到一丝一毫的帮助。我们一定得谨慎考虑。"
 NKE.3003.a:0 "我们现在急需资金，这是不可避免的牺牲。"
 NKE.3003.b:0 "开设赞助班接收这些新贵，同时另外开设考试来筛选能力优异的新生。"
 NKE.3003.c:0 "我们决不能在这问题上后退一步，必须严格遴选有能力接收高等教育的优秀青年。"
 NKE.3003.d:0 "我们决不能在这问题上后退一步，我们将会请门托来遴选第一批新生。"
 NKE.3004.t:0 "汀原大学建成！"
 NKE.3004.desc:0 "终于，属于[NKE.GetNameDef]自己的大学汀原大学建成了。新入学的学生们一批批有说有笑地走进校园，这些人将在未来成为我们社会中最精英骨干的一份子。阿尔法·门托和提议建设这座大学的萨普·兰度坐在校长室里，默默注视着这些大学生。随后，门托长叹一口气。"
 NKE.3004.a:0 "“我们都清楚，这可不是什么教育。”"
 NKE.3004.b:0 "“你真的觉得这种程度的高等教育管用吗？”"
 NKE.3004.c:0 "“我总觉得我们还能做得更好......”"
 NKE.3004.d:0 "“我们总算没有辜负[NKE.GetAdjective]人民的期待。”"
 NKE.3004.e:0 "“我们已经尽力做到最好了，历史会记住我们的奉献的。”"
 NKE.3005.t:0 "维安娜·维尔大学建成！"
 NKE.3005.desc:0 "终于，由解放了汀海岛的女英雄维安娜·维尔所命名的大学，维安娜·维尔大学建成了。维安娜·维尔亲自完成了剪彩仪式，为新生们发表了一篇冗长的演讲。随后，新入学的学生们一批批有说有笑地走进校园，这些人将在未来成为我们社会中最精英骨干的一份子。阿尔法·门托和提议建设这座大学的萨普·兰度坐在校长室里，默默注视着这些大学生。随后，门托长叹一口气。"
 NKE.3005.a:0 "“我们都清楚，这可不是什么教育。”"
 NKE.3005.b:0 "“你真的觉得这种程度的高等教育管用吗？”"
 NKE.3005.c:0 "“我总觉得我们还能做得更好......”"
 NKE.3005.d:0 "“我们总算没有辜负[NKE.GetAdjective]人民的期待。”"
 NKE.3005.e:0 "“我们已经尽力做到最好了，历史会记住我们的奉献的。”"
 NKE.3006.t:0 "将维安娜·维尔大学改名"
 NKE.3006.desc:0 "如今维安娜·维尔已经被打倒，而这座以她命名的大学也陷入了尴尬的境地。我们是否应该将其更名为“汀原大学”，还是尊重这段历史，保留其原有的名称？"
 NKE.3006.a:0 "将维安娜·维尔大学更名为汀原大学。"
 NKE.3006.b:0 "保留维安娜·维尔大学原有的名称。"
 NKE.3101.t:0 "国歌"
 NKE.3101.desc:0 "特鲁-提里找来的音乐艺术家的确是汀海岛上最高水准的兔人音乐家，他们或多或少接受过一点东巴斯蒂亚的文娱教育，谱写出来的国歌也是像模像样，庄严肃穆。\n\n“左汀原，左汀原，屹立狂风骤雨中。”\n\n特鲁-提里亲自吹起小号。\n\n“百年血泪成湖海，一朝自由破枷锁。”\n\n军鼓手加重了敲击的力度。\n\n“左汀原，左汀原，今夕重建家园。”\n\n兔人女高音歌手似乎有些破音了。"
 NKE.3101.a:0 "“朝阳初升照大地，明日依旧在，笑望未来。”"

###决议###
 NKE_national_university_decisions_category:0 "建造大学"
 NKE_national_university_decisions_category_desc:0 "在萨普·兰度的建议下，我们将在汀原镇建立一所综合性大学。这所大学将会用于教授来自东巴斯蒂亚诸国的科学文化知识，用于为我们的社会紧急培养一代人才。\n\n我们大学目前的质量：[GetNKUQuality]"
 NKE_NATIONAL_UNIVERSITY_QUALITY_0: "聊胜于无"
 NKE_NATIONAL_UNIVERSITY_QUALITY_1: "质量低下"
 NKE_NATIONAL_UNIVERSITY_QUALITY_2: "平平无奇"
 NKE_NATIONAL_UNIVERSITY_QUALITY_3: "质量良好"
 NKE_NATIONAL_UNIVERSITY_QUALITY_4: "卓越学府"
 NKE_national_university_decisions_1:0 "确定大学选址"
 NKE_national_university_decisions_1_desc:0 "我们需要确定究竟在哪里建立我们自己的大学。"
 NKE_national_university_decisions_2:0 "建造大学校园"
 NKE_national_university_decisions_2_desc:0 "我们将会按照方案建设我们的大学校园。"
 NKE_national_university_decisions_3:0 "聘请授课教师"
 NKE_national_university_decisions_3_desc:0 "一所学校即便什么都没有也必须要有教师和学生。我们需要从东巴斯蒂亚聘请愿意在汀海岛授课的讲师们，他们的知识就是我们的珍宝。"
 NKE_national_university_decisions_4:0 "发送招聘请求"
 NKE_national_university_decisions_4_desc:0 "我们将会按照方案选择我们聘请的教师。"
 NKE_national_university_decisions_5:0 "遴选入学新生"
 NKE_national_university_decisions_5_desc:0 "我们已经找好老师了，接下来的问题就是哪些人应该优先接受大学教育，这直接关系到我们这所大学的效用。"
 NKE_national_university_decisions_6:0 "确认新生名单"
 NKE_national_university_decisions_6_desc:0 "我们将会按照方案确定即将入学的新生。"
 
 NKE_planned_farming_decisions_category:0 "有目的种植"
 NKE_planned_farming_decisions_category_desc:0 "我国的农业部将会发布一系列的农业生产指标来指导当年的农业生产。"
 NKE_planned_farming_decisions_eco:0 "重点种植经济作物"
 NKE_planned_farming_decisions_eco_desc:0 "在接下来的一年内我国将会重点种植经济作物，以满足国内财政需求。"
 NKE_planned_farming_decisions_food:0 "重点种植粮食作物"
 NKE_planned_farming_decisions_food_desc:0 "在接下来的一年内我国将会重点种植粮食作物，以促进国内人口增长。"
 NKE_planned_farming_decisions_exp:0 "重点种植实验作物"
 NKE_planned_farming_decisions_exp_desc:0 "在接下来的一年内我国将会重点种植实验作物，以加速农业水平发展。"
 
 NKE_citify_tso_naghara_category:0 "汀原市"
 NKE_citify_tso_naghara_category_desc:0 "我们将会通过一系列的举措来完成左汀原的整体城镇化，把汀原镇建设为一座国际化的都市。"
 NKE_buildup_ghetto_zone:0 "建造棚户区"
 NKE_buildup_ghetto_zone_desc:0 "我们将会在汀原镇外建造一片棚户区，用于收容那些既没有土地又没有房产，无处可住、流离失所的人民。"
 NKE_widespread_scientific_education:0 "普及通识教育"
 NKE_widespread_scientific_education_desc:0 "我们将会展开一场整体的通识教育，将我们的人民从名为“无知”的深渊中解救出来。"
 NKE_aid_land_annexation:0 "协助土地兼并"
 NKE_aid_land_annexation_desc:0 "我们会拨出一笔款项来资助农场主们从贫农那里购买他们手里那点可怜的土地，来加速左汀原的土地兼并过程，以增加流入城市的人口的比例。"
 NKE_build_satellite_city:0 "建造工业卫星城"
 NKE_build_satellite_city_desc:0 "我们将在汀原镇的北郊建造一个卫星城，作为汀原市的工业生产副中心，以缓解未来可能的通勤压力。"
 NKE_increase_business_fund:0 "追加创业投资"
 NKE_increase_business_fund_desc:0 "我们国家有许多跃跃欲试的年轻企业家与外国投资者，我们可以努力组织好这些投资，希望能有所收获。"
 NKE_complete_tso_naghara_citify:0 "汀原市！"
 NKE_complete_tso_naghara_citify_desc:0 "我们终于可以自豪地宣布，汀原市是一座美丽的国际化港口都市。"
 
 NKE_the_struggle_on_power_category:0 "权力斗争"
 NKE_the_struggle_on_power_category_desc:0 "目前除了仍然尸位素餐的维安娜·维尔总统与其贪污集团以外，[NKE.GetAdjective]还有两股重要的政治力量，分别是对资本主义路线持怀疑态度的社会党，和提倡放开对于资本运作的约束的自由民主党。\n\n目前维安娜·维尔的支持率：[?party_popularity@authoritarian_republican|%R0]\n目前社会党的支持率：[?party_popularity@worldunion_democrat|%Y0]\n目前自由民主党的支持率：[?party_popularity@liberal_republican|%Y0]"
 NKE_expand_worldunion_democrat:0 "扩大社会党影响力"
 NKE_expand_liberal_republican:0 "扩大自由民主党影响力"
 NKE_expand_authoritarian_republican:0 "维安娜·维尔在行动"