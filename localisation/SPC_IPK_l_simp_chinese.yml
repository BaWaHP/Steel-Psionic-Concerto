###民族精神###
IPK_rule_of_gof:0 "四巨头之治"
IPK_rule_of_gof_desc:0 "经济联盟由§g四大企业§!共同执政，它们分别是鲁萨尔企业§B新兴科技集团§!，中巴企业§C吕尔曼工业§!，斯布里奇企业§Y梅尔威客集团§!，以及沃姆企业§O施特雷根多夫综合殖民公司§!。四家企业分别对应了不同的科研，工业领域，但他们为一个共同的目标团结了起来：那就是北中巴地区廉价的原材料，以及允许他们无视母国法律地活动的无政府状态。\n\n由于§g四巨头§!在各自的领域取得了卓越的成就，随着他们的影响力在联盟进一步扩张，能带来的§C好处§!也会有所不同。而相对的，假如某一势力的影响力过于式微，那对某一领域也有可能造成§R负面影响§!。\n\n根据§g四巨头§!所处在的地区不同，我们可以分别进行§Y投资建设§!，这不但会影响到对应地区的发展水平，也会影响到§g四巨头§!的影响力；除此之外，我们也可以以联盟为主体§Y投资建设§!。"
IPK_union_integrity_4:0 "联盟团结度：§O摇摇欲坠§!"
IPK_union_integrity_4_desc:0 "经济联盟建立的基础在于§g四巨头§!的共识，一旦这份共识被其他§Y冲突§!所打破，那经济联盟就将§R不复存在§!。经济联盟越§C团结§!，§g联盟中央§!能够调动的§Y资源§!就越多，反之亦然。一旦联盟的团结度§O跌入谷底§!，那一切都将§R万劫不复§!。\n\n§O因为一些最近爆发的事件，联盟的团结度正处在摇摇欲坠的阶段，虽然大伙明面上还能一起合作，可暗地里都是自行其是。如果不尽快做点什么，本就脆弱的联盟会迅速崩溃。§!"
IPK_project_Hephaestus:0 "§Y赫菲斯托斯计划§!"
IPK_project_Hephaestus_desc:0 "由鲁萨尔§B新兴科技集团§!主导的§Y赫菲斯托斯计划§!旨在为低廉劳动力提供替代品：一种以§C魔导核心§!为基础运行的§O智能傀儡§!。过去的傀儡魔法大量依赖术士作为主体提供魔力供给与实际命令，而新兴科技集团的团队提出可以用某种自动化魔法回路代替这一点。在北中巴地区，多亏了丰富的魔矿供给以及不受限制的实验规章，赫菲斯托斯计划得以摆上台面。然而，随着时间推移，§Y赫菲斯托斯计划§!被证明难以实现，并且逐渐成为了联盟财政的§R沉重负担§!，是否要§O继续§!这项颇具勇气的计划，会是一个巨大的难题…"
IPK_divided_regions:0 "分裂的地区"
IPK_divided_regions_desc:0 "随着四巨头的势力范围不同，联盟的定居点也被清楚地分裂成了四块；而根据四巨头的主营业务不同，不同定居点所从事的经济活动也有所区别。虽然联盟的成立帮助各大定居点建立了基础的联系，并促进了物资，信息的流通，可这仍然需要我们的努力。目前来看，联盟的不同地区仍然处于明显的分裂状态，良好的基础设施并没有被建立起来，很多定居点仍然处于信息的闭塞状态，物资也需要得到进一步的流通。\n\n§Y随着联盟各地区进一步发展，负面效果会减弱。§!"
IPK_1997_military_act:0 "《1997联盟军事法案》"
IPK_1997_military_act_desc:0 "出于对国家安全的担忧，§g四巨头§!在先前的会谈中放弃了军事领域的自治，并推行了新法案的成立。《1997联盟军事法案》允许联盟中央出于保护国家的目的，调动四巨头用于保卫定居点而成立的佣兵，民兵部队。然而，法案明确禁止了联盟中央在没有许可的情况下，进一步组建自己的部队，也禁止在没有许可的情况下，对各地区部队进行缩编，整编，扩编等行为。\n\n联盟中央的领导人始终保有对自己所属势力部队的控制权；一旦获得§C许可§!，便可以§Y改编§!对应的部队，这包括其它巨头的部队以及雇佣兵势力。许可是§Y终身§!的，一旦联盟中央完全掌握了对各地部队的控制权，那便可以修改法案，§R一劳永逸地§!奠定自己在军事领域的主体地位。"
IPK_neustregendorf_bombing:0 "新施特雷根多夫爆炸案"
IPK_neustregendorf_bombing_desc:0 "发生在新施特雷根多夫的爆炸案闹得全殖民地上下人人自危，一群兽人原住民居然有胆量对人类定居点发动恐怖袭击，造成伤亡数百人有余。虽然凶手已被抓拿归案，可此事造成的余波尚且没有结束。在内部，各大定居点的地方领导人都提出了严正的抗议，要求四巨头采取行动，这给予了联盟中央极大的压力，我们需要尽快对定居点安全措施实施较大的改革，并且对原住民游击队采取更加严厉，有效的围剿行动。\n\n然而，这并不容易。肆虐在经济联盟内的原住民游击队始终是我们的心头大患，此次恐怖袭击也只是他们势力日渐壮大下的一个缩影。如果我们最终不能解决这一难题，他们或许会真正动摇我们的统治……"

###领导人###
IPK_william_lyman:0 "威廉·莱曼"
IPK_william_lyman_desc:0 "威廉·莱曼出生于中巴联盟的一户鲁萨尔移民家庭，大学毕业后加入吕尔曼工业出任地方经理，后在接下来的几年里一路高升至董事会候选成员。然而，威廉耀眼的履历和过于迅速的高升引起了很多不必要的关注，许多人怀疑他的家庭和中巴政治势力有染——尽管没有明确的证据，但这还是引起了些许担忧。最终的结果便是“职权转移”。威廉·莱曼成为了媒体报道下的罪人，在一些吕尔曼工业高层的“鼓励”下，被流放到了北中巴地区处理吕尔曼工业开在当地的矿场，小型军工厂和几个破定居点。\n\n不过，这在理论上并非许多人心目中的“苦差”。吕尔曼工业开在当地的产业从财务报表上来看运营状况良好，由四巨头共同管理的经济联盟也不会将太大的政治压力放在威廉身上，加上威廉本人确实能力出彩，这份差事可能会成为他履历上的又一个耀眼明星——至少威廉统治的最初几年是这样度过的。\n\n然而，情况却急转直下。新施特雷根多夫爆炸案后，各地定居者互相指责彼此为什么没有处理好原住民游击队的问题，以及为什么没有建立起完善的定居点防御体系。出于对财产安全的担忧，许多来自外国的投资者选择撤出，这进一步恶化了联盟的稳定性。沃姆投资者，希卡博尔投资者，中巴投资者，南巴投资者的矛盾冲突越来越大，四巨头也因此日渐趋于不和，经济联盟摇摇欲坠的稳定看似要坠入谷底。\n\n最终，作为所谓的“中间派”，威廉·莱曼被推举成了经济联盟的总督。威廉敏锐地看出了经济联盟持续发展的必要因素：四巨头必须团结一致，否则在内忧外患的北中巴地区，联盟必将覆灭。出于对地缘政治局势的不稳定性的担忧，威廉还大力支持经济联盟和托克尔达开拓领签订了《中巴斯蒂亚防御协定》，并积极打击各地的原住民游击队。"

