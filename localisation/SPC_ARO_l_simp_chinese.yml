###国策###
ARO_blueprint_of_new_industry: "新工业的蓝图"
ARO_blueprint_of_new_industry_desc: "过去三百年奥罗日亚的工业化成果因为两场大战、一次经济危机和一次解体而流失殆尽。如今，乾坤已定，我们将重新建造一个工业体系。"
ARO_primary_plan_of_military_industry: "初步军事工业计划"
ARO_primary_plan_of_military_industry_desc: "我们将初步投入一部分设施用于军用工业建设。"
ARO_primary_plan_of_military_industry_tt: "§Y$ARO_industrial_blueprint_dynamic_modifier$§! 获得：\n   $modifier_production_speed_arms_factory_factor$: §G+10%§!\n   $MODIFIER_CONSUMER_GOODS_FACTOR$: §Y+2%§!"
ARO_primary_plan_of_civilian_industry: "初步民用工业计划"
ARO_primary_plan_of_civilian_industry_desc: "我们将初步投入一部分设施用于民用工业建设。"
ARO_primary_plan_of_civilian_industry_tt: "§Y$ARO_industrial_blueprint_dynamic_modifier$§! 获得：\n   $modifier_production_speed_industrial_complex_factor$: §G+10%§!\n   $MODIFIER_CONSUMER_GOODS_FACTOR$: §Y+2%§!"
ARO_factory_construction_Glonia_First: "工业园建设：格罗尼亚优先"
ARO_factory_construction_Glonia_First_desc: "我们将优先在格罗尼亚建造前期工业园区。"
ARO_factory_construction_balanced: "工业园建设：均衡"
ARO_factory_construction_balanced_desc: "我们将均衡地在格罗尼亚和雷斯诺顿建造前期工业园区。"
ARO_Konatsen_Tswig_military_factory: "科纳琴“茨威格”兵工厂"
ARO_Konatsen_Tswig_military_factory_desc: "阿纳托利·茨威格是奥罗日亚帝国最后一任宰相。他生前鞠躬尽瘁，却因皇帝的不作为而被迫面对了祖国的土崩瓦解，无法忍受屈辱的他饮弹自尽了。为了纪念这位宰相生前的贡献，我们决定以他来命名我们将在科纳琴地区建设的兵工厂。"
ARO_Konatsen_Tswig_military_factory_tt: "$ARO_faction_name_w$的支持度大于$ARO_faction_name_r$"
ARO_purge_moderate_military_enterpreneurs: "清洗温和军工企业家"
ARO_purge_moderate_military_enterpreneurs_desc: "不是所有的军工企业都站在奥罗日亚这边的。有些企业家竟敢串通雷斯诺顿的共和派叛匪，妄图分裂我国，必须要出重拳！"
ARO_purge_moderate_military_enterpreneurs_tt: "§Y$1$菲尔布雷夫·莱特§!：§R死亡§!\n§Y$ARO_issue_of_Lesnoden_republican_dynamic_modifier$§! 获得：\n   $MODIFIER_POLITICAL_POWER_FACTOR$: §G+10%§!"
ARO_threat_neutral_military_enterpreneurs: "恐吓中立军工企业家"
ARO_threat_neutral_military_enterpreneurs_desc: "不是所有的军工企业都站在奥罗日亚这边的。有些企业家不太愿意支持奥罗日亚的王道征途，我们需要提醒提醒他们。"
ARO_threat_neutral_military_enterpreneurs_tt: "§Y$1$“秃鹫”支援机研究设计局§!：需要30天来进行内部调整\n§Y$ARO_issue_of_Lesnoden_republican_dynamic_modifier$§! 获得：\n   $MODIFIER_INDUSTRIAL_CAPACITY_FACTOR$: §G+10%§!"
ARO_threat_neutral_military_enterpreneurs_flag: "§Y正在进行内部调整\n§Y"
ARO_Glonia_military_production_expansion: "格罗尼亚军工生产扩大化"
ARO_Glonia_military_production_expansion_desc: "在清除了部分军工系统中的败类、震慑了部分摇摆分子后，我们终于可以全面展开军工生产了。"
ARO_Glonia_military_production_expansion_tt: "§Y$ARO_industrial_blueprint_dynamic_modifier$§! 获得：\n   $modifier_production_speed_arms_factory_factor$: §G+10%§!"
ARO_rebuild_Glonia_highways: "重建格罗尼亚高速公路"
ARO_rebuild_Glonia_highways_desc: "我们将重建格罗尼亚的高速公路网络，使其更加适应新时代的公路运输体系。"
ARO_rebuild_Glonia_highways_tt: "§Y$ARO_industrial_blueprint_dynamic_modifier$§! 获得：\n   $modifier_production_speed_infrastructure_factor$: §G+10%§!\n   $MODIFIER_CONSUMER_GOODS_FACTOR$: §Y+2%§!"
ARO_raise_industrial_funds: "提升工业补贴"
ARO_raise_industrial_funds_desc: "我们将提升工业企业扶助补贴在我国预算中的占比。"
ARO_raise_industrial_funds_tt: "§Y$ARO_industrial_blueprint_dynamic_modifier$§! 获得：\n   $monthly_industrial_development_process$: §G+2§!\n   $MODIFIER_CONSUMER_GOODS_FACTOR$: §Y+4%§!"
ARO_retreat_agricultural_funds: "撤回农业补贴"
ARO_retreat_agricultural_funds_desc: "我们将削减用于农业补贴的资金，将这些资金用于更重要的事业中。"
ARO_Glonia_Andarc_industry_district: "格罗尼亚-昂达克工业园区"
ARO_Glonia_Andarc_industry_district_desc: "昂达克是离格罗尼亚最近的重要工业城市，我们将在昂达克和格罗尼亚城之间设立一个新的工业园区，吸引投资商。"
ARO_Lesnoden_Glonia_cooperation: "联合办厂"
ARO_Lesnoden_Glonia_cooperation_desc: "我们会安排一些雷斯诺顿企业和格罗尼亚的企业接受投资，合作在巴什拉建造新的工业区，以发扬两个王国牢不可破的和谐友谊。"
ARO_Lesnoden_Glonia_cooperation_tt: "$ARO_faction_name_r$的支持度大于$ARO_faction_name_w$"
ARO_appease_Madnum_peasants: "安抚马德南农民"
ARO_appease_Madnum_peasants_desc: "那些马德南农民们一直对于我们的工厂有着极大的抵触，而最近的工业化计划也让他们人心惶惶。我们会努力说服他们我们没有在马德南平原增设工厂的打算。"
ARO_Placius_railway_project: "普拉修斯穿山铁路"
ARO_Placius_railway_project_desc: "维尔日山脉长期以来阻断了格罗尼亚王国和马德南地区之间的联络，让这片地区具有强烈的分离主义倾向。如今我们会建设一条在普拉修斯附近穿越维尔日山脉的铁路，穿山越涧，以加强我们和马德南地区的团结，以及我们对这片区域的控制力。"
ARO_Placius_railway_project_tt: "$ARO_faction_name_c$的满意度>75%"
ARO_reprospect_Srikka_minerals: "斯里卡矿产再勘探"
ARO_reprospect_Srikka_minerals_desc: "“不衰的魔女”玛莉斯·布尔维什并不信任来自奥罗日亚的勘探者进入斯里卡的山林去勘探矿物，她认为这会对当地的环境造成不可逆的破坏。如果我们用二元政府长期以来的信誉作为担保的话，或许可以让她获取对我们的部分信任，重启斯里卡地区的矿物勘探。"
ARO_reprospect_Srikka_minerals_tt: "§Y斯里卡§!的矿物勘探将重新开放！"
ARO_neutralize_warmonger_activists: "解决主战活动家"
ARO_neutralize_warmonger_activists_desc: "最近，有个别激进主战派民族主义活动家在帝都格罗尼亚肆意妄言，攻击、抹黑我国的工业政策。即便要用较为激进的方法，我们也得让他们闭嘴——暂时或永久。"
ARO_neutralize_warmonger_activists_tt: "§Y$ARO_Halifax_Kimmel$哈利法克斯·基梅尔§!：§R死亡§!"
ARO_maraud_Lesnoden_industry: "掠夺雷斯诺顿工业"
ARO_maraud_Lesnoden_industry_desc: "允许这些雷斯诺顿的工厂继续存在下去就是对共和叛党的纵容，必须出重拳。"
ARO_maraud_Lesnoden_industry_tt: "$ARO_faction_name_r$的支持度<25%"
ARO_maraud_Lesnoden_industry_tt2: "§R如果足够的人头落地，我们或许能永久终结共和派抬头的可能性……§!"
ARO_give_in_to_cultists: "向拜光会让步"
ARO_give_in_to_cultists_desc: "我们必须向拜光会让步，拆除马德南平原的全部工业设施改回田地，并且放缓工业化的脚步。"
ARO_give_in_to_cultists_tt: "$ARO_faction_name_c$的支持度>40%"
ARO_the_second_enclosure_movement: "第二次圈地运动"
ARO_the_second_enclosure_movement_desc: "在第一次工业革命的时期，曾经有部分地区推行了名为“圈地运动”的政策，赞助资产阶级暴力强占农民的土地，将他们逼进城内。而今天，我们是时候对这些狂热的崇拜天光的农民们再一次重拳出击了。"
ARO_the_second_enclosure_movement_tt: "$ARO_faction_name_c$的支持度<25%"
ARO_the_second_enclosure_movement_tt2: "§Y$ARO_industrial_blueprint_dynamic_modifier$§! 获得：\n   $MODIFIER_GLOBAL_BUILDING_SLOTS_FACTOR$: §G+10%§!"
ARO_new_era_of_our_industrialization: "工业化新纪元"
ARO_new_era_of_our_industrialization_desc: "在完成了诸多事业后，我们的工业化将开启一个新的纪元，进入全新的阶段。"
ARO_new_era_of_our_industrialization_tt: "§Y$ARO_industrial_blueprint_dynamic_modifier$§! 获得：\n   $monthly_industrial_development_process$: §G+2§!\n   $modifier_production_speed_infrastructure_factor$: §G+10%§!\n   $modifier_production_speed_industrial_complex_factor$: §G+10%§!\n   $modifier_production_speed_arms_factory_factor$: §G+10%§!"
ARO_the_fragile_balance: "脆弱的平衡"
ARO_the_fragile_balance_desc: "奥罗日亚国内的各大势力被“贤安王”奥斯灵顿巧妙地维持在同一根紧绷的弦上。然而这种完全依靠奥斯灵顿本人的个人威望、交涉能力以及付出极大精力的平衡模式是不可维持的。我们将会开始着手解决这些问题。"
ARO_confort_lower_classes: "安抚穷苦阶级"
ARO_confort_lower_classes_desc: "那些以首都市民与中层贵族为主要成员的主战派们需要冷静一下。我们的社会仍然撕裂严重，一场以周围环伺的强敌为目标的战争弊大于利，我们现在最需要做的是安抚那些穷苦人民。"
ARO_penalize_radical_cultists: "惩戒极端信徒"
ARO_penalize_radical_cultists_desc: "在马德南平原上的一小撮极端奥罗拉信徒已经严重干扰了我国的军略大计。我们要处死一批最极端的教徒来杀鸡儆猴，并且教教那帮农民什么是科学和工业。"
ARO_penalize_radical_cultists_tt: "科学普及度增长进度§G+30%§!"
ARO_crack_down_pollutive_factories: "严打高污染工厂"
ARO_crack_down_pollutive_factories_desc: "愤怒的马德南农民们要求我们拆除一些污染严重的工厂，而我们也可以以此为契机打击某些共和派的产业——一箭双雕。"
ARO_bend_to_factional_pressure: "向派系压力屈服"
ARO_bend_to_factional_pressure_desc: "我们之前的试探导致了部分派系的愤怒，需要我们重新平衡一些资源与权力以安抚愤怒的派系。"
ARO_bend_to_factional_pressure_tt: "解锁向派系让权的决议"
ARO_the_future_path_of_Auroretia: "奥罗日亚未来的道路"
ARO_the_future_path_of_Auroretia_desc: "仅仅靠奥斯灵顿·格罗尼亚一人维系的稳定无法长存，我们必须选择一条其他的路！"
ARO_the_path_of_justice: "正义"
ARO_the_path_of_justice_desc: "我们将坚信奥罗日亚与自己心中的正义，砥砺奋进，一往无前。"
ARO_the_path_of_justice_tt: "§G主战派将停止破坏行为§!\n§Y$ARO_issue_of_Glonian_warmonger_dynamic_modifier$§! 将不再是问题\n§R禁用以下决议:§!\n   §Y安抚主战派\n   向共和派让权\n   向拜光会让权§!"
ARO_the_path_of_tolerance: "宽容"
ARO_the_path_of_tolerance_desc: "奥罗日亚应当成为一个更加包容的国度，而我们将为此付出必要的牺牲。"
ARO_the_path_of_tolerance_tt: "§G共和派将停止破坏行为§!\n§Y$ARO_issue_of_Lesnoden_republican_dynamic_modifier$§! 将不再是问题\n§R禁用以下决议:§!\n   §Y安抚共和派\n   向主战派让权\n   向拜光会让权§!"
ARO_the_path_of_piety: "虔诚"
ARO_the_path_of_piety_desc: "奥罗日亚的人民缺乏天光指引已经太久太久了，我们必须恢复曾经的生活方式。"
ARO_the_path_of_piety_tt: "§G拜光会将停止破坏行为§!\n§Y$ARO_issue_of_Aurora_cultist_dynamic_modifier$§! 将不再是问题\n§R禁用以下决议:§!\n   §Y安抚拜光会\n   向主战派让权\n   向共和派让权§!"
ARO_warhammer_of_steel: "精钢重锤"
ARO_warhammer_of_steel_desc: "我们应当组建一支强大的泰坦部队，以作为撕开敌人防线的重磅战锤。"
ARO_rather_lack_than_degeneration: "宁缺毋滥"
ARO_rather_lack_than_degeneration_desc: "我们的军队不能像以前那样不听指挥，肆意屠杀平民。为此我们必须收紧军纪。"
ARO_in_research_of_myths: "秘奥探求"
ARO_in_research_of_myths_desc: "仅仅靠钢铁和炸药是无法寻觅到这世界背后的真实的。我们需要更加深入。"
ARO_in_research_of_myths_tt: "魔法普及度增长进度§G+20%§!"
ARO_supreme_artillery: "超级大炮"
ARO_supreme_artillery_desc: "一支强而有力的炮兵部队能够大大减少士兵们在前线的伤亡率——把敌人炸得东倒西歪！"
ARO_reinforce_defense_line: "巩固防线"
ARO_reinforce_defense_line_desc: "我们的要塞群将会使我们在即将到来的下一场大战中立于不败之地。"
ARO_cruelty_is_virtue: "残暴乃美德"
ARO_cruelty_is_virtue_desc: "对敌人的仁慈乃是对同胞的残酷，对敌人的残酷则是对同胞的仁慈。我们应当重新启用那些因“残暴”而饱受争议的军事人员——那是他们的功勋，而非污名。"
ARO_cruelty_is_virtue_tt: "$ARO_faction_name_w$的支持度>50%"
ARO_cruelty_is_virtue_tt2: "解锁理论家："
ARO_constraint_of_army: "约束军部"
ARO_constraint_of_army_desc: "在军队中安插更多的文官与参谋，能够帮助我们更好地管控军队中部分过于急于“开疆拓野”的野心家。"
ARO_constraint_of_army_tt: "$ARO_faction_name_r$的支持度>50%"
ARO_the_twittering_of_Aurora: "奥罗拉之呢喃"
ARO_the_twittering_of_Aurora_desc: "天光并非沉默不语，相反，天光可以给予我们启示。我们需要仔细聆听奥罗拉的呢喃，以从中找寻我们走向未来的希望。"
ARO_the_twittering_of_Aurora_tt: "$ARO_faction_name_c$的支持度>50%"
ARO_the_twittering_of_Aurora_tt2: "魔法普及度增长进度§G+30%§!"
ARO_the_glory_of_steel_n_fire: "铁与火的荣耀"
ARO_the_glory_of_steel_n_fire_desc: "奥罗日亚的战士们将通过铁与火的考验来获得荣耀——为大规模的绞肉机式的战斗做准备在所难免，我们得尽早加强对于军队的训练。"
ARO_Borwisch_legion: "布尔维什军团"
ARO_Borwisch_legion_desc: "玛莉斯·布尔维什在千年前便建立过由大量魔法师组成的军团，而这一战术思想在如今依然受用——一支高度魔导化的军队能解决许多问题。"
ARO_warrior_of_faith: "圣战士"
ARO_warrior_of_faith_desc: "信仰的指引对于军队的建设工作是至关重要的，因此我们的教会组织必须深入军队——每个连队都得有一名奥罗拉牧师带领的随军教会，进行宣传、组织的工作，给予负伤与临死的士兵慰藉。"

###事件###
ARO.0001.t: "噩梦"
ARO.0001.d: "奥斯灵顿不知道自己在哪里，恍惚的感觉使他控制不了自己的身体，在他挣扎了一会儿后，突然，一抹强光向他脸上照来，刺得他睁不开眼。\n一道熟悉而陌生的声音传入他耳中：“众卿，来看看朕的枪法！”随着一声嘹亮的枪响，猎物应声倒地。\n\n听着那熟悉张扬的笑声，他想起来了：这是他一生中最重要的时刻，甚至没有之一。刹那间，他猛地站了起来，奔向那个身着华丽跋扈异常的身影。\n\n他已经后悔好久了，现在终于有机会能够弥补……总之不能这样！\n\n面前的人群虚幻起来，但他顾不了这么多，一把扯下马背上的男子，预料中的枪声却未响起。他困惑地看向四周，喧闹的人群和广阔无边的山林早已不见，就连怀中的那个故人都在逐渐消散。他疯了似的想要把那些四散开来尘埃聚拢，绝望的话语从他口中喷涌而出：“别，千万别，我不应该这样做的…不要，不要这样兄长，别这样，菲尼克斯！”\n\n他绝望的呐喊并没有使怀中身躯的消逝慢上半分，当他泪眼朦胧地抬起头时却发现年幼的菲尼克斯正坐在自己的身边，熟悉的用嘲讽的笑容看着他。\n\n“菲尼克斯？”他用轻柔又无措的语气询问，仿佛害怕这个面前的人会立马消失不见似的。“对，就是我。”面前的这个男孩略带嫌弃的答道。\n\n“你…额…我…”奥斯灵顿激动得不知道说些什么。男孩打断了他：\n\n“你觉得你做的很好吗，‘贤安王’陛下？”\n\n男人脸上因为激动而造成的潮红色顿时变得煞白，而男孩仍旧阴沉地看着他。\n\n身体开始不受男人的控制，他的大脑一片空白，在一阵天旋地转后，男人在一张真丝大床上醒来，嘴边还有未喊完的话语：“菲尼…”\n\n王宫静谧的夜晚吞没了他的话语。\n\n贤安王坐在床上，思绪万千，但最后他还是想起了王室内部，自己的弟弟跟女儿。虽然国内外的事务让他焦头烂额，但他也是时候关心希雅薇瑟的教育问题了。\n\n此时天边东方鱼肚白。奥斯灵顿作祈祷状，准备处理又一天的政务。"
ARO.0001.a: "“菲尼克斯……请你原谅我。”"
ARO.0002.t: "怪物"
ARO.0002.d: "“父王大人，您说的都对。”\n\n听到希雅薇瑟机械式的生硬应答，奥斯灵顿叹了口气，扶住了额头。自从1986年，他继承了菲尼克斯的王位后，他就一直在国内奔忙，完全没有教导希雅薇瑟的时间。当他终于大致平定了国内的风波与东巴斯蒂亚大战的烂摊子后，他回过头来看他的家人，却发现希雅薇瑟已经在阿斯顿亲王的煽动与引诱下从一个天真可爱的小女孩变成了一个陌生的怪物。\n\n“希雅，你一定要听好爸爸说的话，就算不听也没关系，记着就行……爸爸总有一天要老的，到时候只有你能担起这个国家。和周围国家的外交关系不是一件小事，你千万不能走极端，将奥罗日亚拖入一场毫无胜算的战争的泥潭中，那只会带来无穷无尽的血海深仇。”\n\n“打输了东巴大战只是因为您任命的元帅能力不足吧？如果当时您让更有能力的将领担任元帅，那么奥罗日亚有不小的希望赢得那场大战。不要用您的经验来说明所有的战争。”希雅薇瑟反驳道。\n\n“就算那场战争赢了，那又怎么样呢？你看看雷斯诺顿王国的那些共和派……我们即便是和平统一了雷斯诺顿，雷斯诺顿政府和民间的反扑都已经让我付出了巨大精力，更别提用暴力统一皮奥瑞亚和西莉迪亚了……面对汹涌的民意，这场战争不会有胜利者的。”\n\n“这也是我反对您的一点，父王大人！您对那些雷斯诺顿叛匪实在是太宽容了！要是您愿意出重拳打击那些叛匪和与他们合作的败类，雷斯诺顿的匪患早就平定了！”\n\n“希雅，不要总想着靠暴力来解决问题。冤冤相报何时了，仅凭格罗尼亚的人民是无法治理那么庞大的疆域的，我们必须得到当地人的支持……”\n\n“那为什么不把不支持我们的当地人全都干掉？”"
ARO.0002.a: "在那一刻，奥斯灵顿只感觉脊背发凉。"
ARO.0003.t: "蛇蝎"
ARO.0003.d: "奥斯灵顿敲了敲门，随后缓步走入了他的弟弟，阿斯顿亲王在王宫内的书房。见奥斯灵顿进来，阿斯顿那张干巴巴的脸上立刻挂起了一副皮笑肉不笑的笑容。“国王大人，请问您此番拜访是有何要事？”\n\n“阿斯顿……在你从沃姆的宫廷回来以后，你都跟希雅薇瑟说了什么？”\n\n“不过是一些在沃姆宫廷中的见闻，以及几句肺腑之言罢了。希雅薇瑟阁下对我带来的故事也十分欣赏，请问有什么不妥之处吗？”\n\n奥斯灵顿很清楚阿斯顿绝无可能正面地回答他。事实上，他也很清楚阿斯顿背着他在宫廷内外构建了一支主张对独立诸国复仇的极端派系，时至今日这个派系已经是他统治的主要威胁之一。奥斯灵顿虽然试图阻滞主战派势力的迅速增长，但是成效并不显著——格罗尼亚的民族主义者早已怒火滔天，纸包不住火。\n\n“阿斯顿，及时停下吧。你知道你点燃的这把火多么猛烈……我们是控制不住它的。”\n\n“国王大人，我听不懂您在说什么。不过前两天基梅尔伯爵送了我一盒上好的安里利亚人参，看您这几天那么操劳，正好拿来给您补补身子。”\n\n奥斯灵顿看着阿斯顿的笑容，微微张口，随后下定决心。“阿斯顿，别装傻了。我绝不允许你把奥罗日亚引上歧途，若你真的让我忍无可忍，那你知道我的愤怒会带来什么——你再清楚不过了。”撂下一句狠话后，奥斯灵顿如同逃跑一般大步离开了阿斯顿的书房，随后在走廊里看着先祖的半身像，叹了口气。\n\n阿斯顿·格罗尼亚在沃姆宫廷中长达五年的人质生涯已经彻底改变了他，使他变得如蛇蝎一般狡诈冷血。然而奥斯灵顿也说不清这有多少是自己的责任——如果他能更早地控制住格罗尼亚，更早地重启与沃姆的同盟谈判，更早地答应沃姆帝国那该死的“战争同盟协定”，让沃姆愿意释放阿斯顿，那现在的阿斯顿是否不会走上这条悖逆的极端道路？\n\n不论如何，他现在只剩下阿斯顿一个兄弟了，而他实在没有杀死自己唯一兄弟的决心了。"
ARO.0003.a: "“或许事情仍有转机……”"
ARO.0004.t: "不衰的魔女"
ARO.0004.d: "巴里斯城西南方的一片森林中，一名衣衫不整的青年正在飞奔，在他身后有几名穿着便装的奥罗日亚宪兵在穷追不舍，时不时还对着青年的方向随手打几枪。虽然青年对这片森林的熟悉程度远超他背后的宪兵，但他的体力明显已经不支，更糟糕的是他的腹部还中了一枪。随着青年的速度逐渐慢下来，宪兵和他之间的距离迅速拉近，青年已经能听到子弹嗖嗖地从他头顶飞过去了。最终，他在翻过一块大石头后蜷缩了起来，大口喘气，试图平缓剧烈的疼痛，而宪兵们则分散开来，从不同的角度慢慢接近青年藏身的那块巨石后面。青年闭上眼睛，回忆如同走马灯一般闪过，渐渐失去意识。\n\n“不要到山林深处，不要到山林深处，那里有鬣狗、有豺狼、还有吃人的魔女。”\n\n这首回忆中的童谣将他惊醒。他猛地睁开眼睛，看到了正在他面前空中飘浮着的一名女性。那名女性身上穿着一件厚重陈旧的附魔多层丝绸法袍，头上戴着一顶有巨大帽檐和高耸尖顶的呢绒女巫帽。\n\n宪兵队的队长看到那女性突然飞过来，吃了一惊，但还是迅速冷静下来，抬起头来询问。“斯里卡的女主人，尊敬的玛莉斯·布尔维什女士，请问您现在出现在这里，究竟有什么诉求？”\n\n那名女士就是“不衰的魔女”，玛莉斯·布尔维什？青年惊讶地抬起头，看着浮在空中的魔女，而魔女则面转向宪兵队长。“我和格罗尼亚家族曾订下契约，奥罗日亚人不得无端伤害我的子民。他若是犯下罪行，你们理应将其报告给我或雷斯诺顿的执法者来审判，为何要如此追杀他？”\n\n宪兵队长瞬间冒了一脖子冷汗，但他旁边的一个愣头青却不知天高地厚地脖子一扭，神气地反驳道：“你和奥罗日亚的契约中，需要交给你审判的仅限斯里卡的人民，而我们要抓捕的共和主义者是一个土生土长的巴什拉人，和斯里卡没半毛钱关系。”\n\n队长刚要出声阻止，刚才发话的那个宪兵却举起手枪，对准了那个青年。“布尔维什女士，请不要干扰奥罗日亚王室的执法！”\n\n一眨眼的工夫，那个宪兵拿着手枪的手臂便被一发不知从哪飞来的魔法飞弹炸成了血花。宪兵惨叫一声，用仅剩的那只手捂着残肢，在地上蜷缩成了一团。队长硬着头皮，将手枪对准玛莉斯·布尔维什，扣动扳机。子弹打在法力护盾上，泛起一片微弱的蓝光。"
ARO.0004.a: "那些宪兵甚至没开出第二枪……"
ARO.0005.t: "暗流（1）"
ARO.0005.d: "在格罗尼亚城，爱克茜·莫尔塔伯爵夫人的客厅中，十几名衣着华丽优雅的男女正围着一张镶着金丝的精美杉木桌。他们手中拿着装饰着各色宝石的银质酒杯，杯中装着莫尔塔伯爵在涅佐斯的葡萄庄园产出的上好干白红酒，液面下还泡着几粒被磨成正八面体的魔晶矿。\n\n“下午好，各位高贵的先生与女士们。我相信诸位都对奥罗日亚无比忠诚，并且愿意为她的事业做出一份贡献，所以才会来到这里，讨论奥罗日亚母亲的未来。”莫尔塔伯爵夫人微笑着举起酒杯，向着参加这场沙龙各社会各界名流们微微颔首致意。\n\n格雷斯·沃尔，一名近年来名气愈来愈大的畅销书作者，首先发话了。“相信各位已经听说了两周前在巴什拉发生的那起惨案。一队恪守职责的宪兵在杉木林中遭遇了雷斯诺顿魔女的无端攻击，伤亡惨重。”\n\n“哼，那个共和派魔女？这老古董的思维怕不是还停留在十个世纪以前呢，干出什么事都不奇怪。”格洛克·昂达克子爵轻蔑地啐了一口。\n\n“不要轻视布尔维什——她的思想虽然陈腐，但她掌握的大量禁术使她成为共和派中最危险的成员。”用面具遮住毁容面容的一名身穿长袍的术士说道。他是这次沙龙的守密人，阿斯顿·格罗尼亚亲王的心腹顾问，“混乱导师”薛西斯。“事实上如果没有我帮你们维持着反探测结界，她能够轻易地获知你们在这里说的每一句话。”\n\n“据我所知，奥斯灵顿陛下依然不愿终结格罗尼亚王室和布尔维什之间的那个契约。”德斯提亚·埃尔热，一名德高望重的高级机械工程师说道。“我希望各位对玛莉斯·布尔维什的敌意仅仅维持在那个魔女的身上——陛下一定有他的考量，我们做什么都不应阻碍陛下的目标。”\n\n“真的吗？”哈利法克斯·基梅尔冷笑一声。“你凭什么觉得布尔维什没有在奥斯灵顿陛下的心灵中动过手脚？要我说，陛下的行动从几年前便已经相当奇怪了。摧毁‘黑衫军’，仓促地停止复仇战争，还有对那些共和叛匪的软弱手段——我们应当大胆地猜测，陛下已经遭到了那个魔女的心灵暗示！”\n\n参与沙龙的众人忽地陷入了沉默——这种可能性虽然他们或多或少也曾有猜测，但一直不敢直接说出来。他们齐刷刷地看向薛西斯，试图向他求证，而薛西斯耸了耸肩，什么也没有说。"
ARO.0005.a: "沉默是今晚的格罗尼亚。"
ARO.0006.t: "王女的学习（1）"
ARO.0006.d: "格罗尼亚王宫内的一间书房里，身着宽松衣裙的希雅薇瑟·格罗尼亚正看着一份1996年的部委级人事变动名单，皱起了眉头。“程宇陆？这是个远乡名字啊。为什么父亲要让一个远乡人来当奥罗日亚王国银行的行长？远乡人是狡猾奸诈的代言词，怎么能担任这么重要的职位呢？”\n\n“事实上，比那还要糟糕，程宇陆是个皮奥瑞亚人，依靠着昂达克州长格兰厄尔·苏斯的帮助才当上了王国银行的行长。”阿斯顿亲王正在一旁小口啜饮着一杯远乡南沙夷武山产的红茶。“以格兰厄尔为首的‘昂达克帮’在帝国经济系统上层的影响力不可谓不根深蒂固。你父亲在继位后正因获得了格兰厄尔的支持，才能够迅速建立起现在的国民军队体系，在这一时期昂达克帮是功大于过的。”\n\n“然而他们对权力的贪念日益膨胀，已经开始把脏手伸到了王国银行里，给曾经背叛过我们的皮奥瑞亚人大开绿灯。”希雅薇瑟扶住下巴，若有所思。\n\n阿斯顿干瘪的面庞上露出了一副慈爱的笑容。“希雅，对于格兰厄尔来说，正是因为程宇陆对别人来说不可信，程宇陆才更需要依赖他的保护。这样一来，格兰厄尔才能更好地控制程宇陆——离开了格兰厄尔他什么都不是。”阿斯顿将喝尽的茶杯放在桌上，一旁侍立的聋哑老仆立刻会意，将茶杯重新添满。“昂达克帮之类的顽疾的起因虽然并不是奥斯灵顿的责任，但是它们在过去的几年间愈演愈烈，你父亲的不作为难逃其咎。”\n\n“阿斯顿叔叔，您可得赶紧劝一劝父亲——可不能让这些和共和派暧昧不明的家伙窃取了国家。”希雅薇瑟担忧地说道。\n\n“奥斯灵顿并不信任我……奥罗日亚的未来的重担现在挑在你肩上，或许只有你才能让他回心转意了。”"
ARO.0006.a: "“答应我，不要让初阳王的王冠蒙尘。”"
ARO.0007.t: "王女的学习（2）"
ARO.0007.d: "在一场上流但令人疲惫的盛大晚宴结束前许久，希雅薇瑟就借故离开了宴席，偷偷溜回了她的书房。奥罗日亚诸王国在20世纪80年代的独立无疑是一场可耻的背叛，然而，她还并不明白这一切究竟是如何发生的。她认为要想知道答案，最好的方式就是去翻阅书籍，尤其是最近的知名畅销书作家格雷斯·沃尔的最新作品《受背叛的胜利》。\n\n她的父亲奥斯灵顿·格罗尼亚曾一直阻止她阅读格雷斯·沃尔的作品。她的父王告诉她，要想了解一件历史事件的全貌，最好的办法是去读那些权威学者的论文与在学术界得到普遍认可的著作，或者去拜访事件的当事人。可畅销书之所以畅销肯定有它的理由——比如与亲身经历了一切的人民的记忆相符，不是吗？那些躲在书房和大学里的学者怎么可能了解事件的真相？\n\n宴会厅内还在觥筹交错，而希雅薇瑟已经彻底沉浸于她的阿斯顿叔叔推荐的这本书，直到被书中所写的真相点燃了怒火和仇恨。\n\n那些该死的南巴斯蒂亚间谍和克拉亚诺煽动分子！是啊，她早该想到的，这些邪恶的境外共和派当然要为摧毁了奥罗日亚帝国的一切叛乱负责。皮奥瑞亚的背后是他们，西莉迪亚——不管是北边的共和渣滓还是南边的赤匪——的背后是他们，雷斯诺顿的背后当然也还是他们！这些该死家伙刻意煽动起民众为了那些虚假的口号反抗帝国，以此削弱他们的对手，最可悲的是竟然有那么人真的信了这些共和派的胡言乱语！\n\n愤怒使这位公主忽略了那些被藏在书堆里的其它观点，不过这些东西能出现在这里本来就是阿斯顿亲王的失误。但他倒也不用太担心，希雅薇瑟已经被格雷斯·沃尔迷住了眼，听不进其它东西了。\n\n即便其它书籍现在就飞到这位女孩面前，指出世界大战后的市场和经济崩溃、以及身为皇帝的菲尼克斯·格罗尼亚昏庸无能才是一切的源头；甚至指出雷斯诺顿本来就是一个高度自治的地方，在当时的环境下独立太过正常，后续不流血的再度统一才更值得庆贺——\n\n希雅薇瑟也不会再相信一个字，因为她已经从沃尔那里得到了她想听的答案。"
ARO.0007.a: "偏见和谎言随着愤怒一同在阴影中滋生。"
ARO.0008.t: "王女的学习（3）"
ARO.0008.d: "夕阳西下，格罗尼亚王宫中的灯火也依次亮起。在渐浓的夜色中，穿着海狸皮大衣的希雅薇瑟·格罗尼亚走进了一间绝密级别的保密档案库中。卫兵队长见状想要阻拦，但在认出希雅薇瑟的脸后他便知趣地退了回去，给奥罗日亚的王女让开了门，随后小声让一名卫兵前去通知奥斯灵顿陛下。\n\n希雅薇瑟径直走向一个标着“MB”的保险柜，吃力地拧动着柜门上巨大的旋转密码锁。“咔哒”一声，密码锁应声而开，而希雅薇瑟从中取出了几份关于玛莉斯·布尔维什的调查报告——父王不愿意告诉她这位在共和派中有着巨大影响力的魔女的细节，因此她只能自己跑来调查。\n\n“玛莉斯·布尔维什的能力果然不简单。除了那个使她臭名昭著的永生秘法外，她还精通死灵、塑能、自然、心灵等多种魔法……等等，心灵？”希雅薇瑟感到了一丝疑惑。这或许便说得通父王对于共和派那奇怪的软弱态度了……但她甩了甩头，觉得这根本没有可能。王室有着包括薛西斯在内的五名精通心灵防御的忠诚术士，倘若父王出了问题他们不可能察觉不到。\n\n她随手翻开另一份文件，上面记载着近年的一些著名的魔法事件中被怀疑与玛莉斯·布尔维什有关的事件。“斯里卡公爵被残忍杀害，凶手疑似为玛莉斯·布尔维什；远乡桂山岛发生多起黑魔法血祭案件，疑似是玛莉斯·布尔维什的前学徒贺罡所为；黑衫宪兵的高层在狱中接连离奇死亡，可能与玛莉斯·布尔维什相关……这位魔女的近代生活可真是丰富多彩。”希雅薇瑟感叹道。\n\n正在这时，档案库的大门被一名身着华丽礼服的近卫军保密官推开，奥斯灵顿·格罗尼亚随后大步走了进来，有些恼怒地看着希雅薇瑟。“希雅，我应该告诉过你，这些档案你不能乱动！立刻把你手里的档案放回去，咱们走吧，我会给你多讲讲关于那个魔女的事情的。”\n\n希雅薇瑟吐了吐舌头，随后将手中的文件丢回保险柜中，合上了锁。保密官马上更改了保险柜的密码，而希雅薇瑟用余光记住了新密码，准备下次再来。"
ARO.0008.a: "“‘不衰的魔女’……一个巨大的威胁。”"
ARO.0009.t: "王女的学习（4）"
ARO.0009.d: "在日落数个小时后，一弯月牙终于挂上了格罗尼亚宫殿的院墙。刚刚从法里兰打猎归来，还没换上宫廷礼服的希雅薇瑟提着马灯，敲开了属于“混乱导师”薛西斯的研究室的门。一名头发稀疏，外观年龄比薛西斯还老的学徒给王女打开了门，在警惕地确认周围没有人盯梢后，才缓缓锁上了大门，恭敬地将希雅薇瑟领到他的导师面前，随后立刻离开了研究室。\n\n“薛西斯，你已为奥罗日亚王室服务数十年，深得三代君主的信任。据说你曾经在玛莉斯·布尔维什的门下拜师学艺，如果确有此事的话，我想向你咨询关于你的导师的问题。”希雅薇瑟掸了掸灰，随后坐在了研究室中的水牛皮沙发上，翘起了有失她公主身份的二郎腿。\n\n“请稍等……”薛西斯从法杖架上取下了他的松木红宝石法杖，轻轻地将它立在地上。一股如同微风一般的魔法力量瞬间充满了整个研究室。“抱歉，但是这是必要的措施——若不张开反探测结界，我们的一举一动在她面前都将毫无隐私。请您继续吧。”\n\n“如果联合王国不得不与玛莉斯·布尔维什对抗，我们是否有胜算？奥罗日亚要付出多大的代价，才能逼退、或无害化那位魔女？”\n\n即便是薛西斯，在听到希雅薇瑟的问题后，脸上的表情也不可避免地变得十分僵硬。过去数百年在布尔维什的恐怖威压下逃窜的经历对他来说仍然记忆犹新，虽然他已经为了谋杀他的导师计划了几十年，但在他心灵深处嘶吼的恐惧与怯懦依然几乎吞噬了他的自信。在缓了几口气后，薛西斯终于恢复了理性地组织语言的能力。\n\n“王女殿下，我强烈建议您不要以任何方式与布尔维什对抗。然而如果对抗真的无可避免的话，虽然代价势必十分惨重，但是我们并不是完全不可能将她击败。”\n\n希雅薇瑟点了点头。“说说你的方案。”\n\n“要对她造成有效的打击，需要先通过大量的常规军队火力来耗干她的魔力。然而常规军队构成的拦截网在布尔维什面前如同纸糊的一般，在她能够以洛克尔飞鹰两倍的速度飞行的情况下我们根本无法让常规军队对她造成有效的打击，因此需要能够拦截住她的少数精锐小队。”\n\n“听起来，你似乎对这个‘少数精锐小队’的人选已经有眉目了。”希雅薇瑟露出了愉悦的笑容，站起身来。"
ARO.0009.a: "“做好准备吧，防人之心不可无。”"
ARO.0010.t: "永恒追猎"
ARO.0010.d: "一名穿着深棕色兜帽长袍的男人走进了巴什拉与斯里卡交界处的一个小村庄中的酒馆。此时太阳还没完全落下，酒馆内除了正在擦拭吧台的老板娘以外只有几名冒险者模样的种族各异的男女。那几人并不像通常的冒险者一般喧闹，而是沉默地坐在桌前一杯又一杯地猛灌啤酒。确认了自己的目标后，身着长袍的男子张开嘴向一名身着皮甲、背负重弩的中年男人搭话。\n\n“两名人类、一名矮人、居然还有一名在东巴斯蒂亚相当罕见的女精灵——德林特爵士，您这是要组建南巴斯蒂亚小说中的护戒远征队吗？”\n\n他话音未落，德林特的身影便闪到了他的身后，将一柄匕首架在了他的脖颈上，而女精灵也拔出刺剑来，挑落了长袍男子的兜帽，显现出了对方的面容。看到酒吧内突如其来的变化，老板娘明智地选择从后厨闪身走人。\n\n“威廉姆斯·胡德，阿威列茨局魔法事务侦查处的精英干员。一条王家狗跑到我们这个鸟不拉屎的小村庄里是有何贵干？”德林特将匕首往下压了压，不给对方任何挣扎的空间。\n\n胡德艰难地咧开嘴，在后悔刚才轻佻态度的同时为自己辩解。“德林特爵士，你先别急——我来这里是为了向你们表达来自格罗尼亚家族成员的合作意愿。”\n\n矮人将手中的啤酒杯高高举起，一饮而尽，随后狠狠地照着胡德的脑袋砸了过去。“在奥斯灵顿·格罗尼亚——嗝——和那个可恶的魔女联手把那个莫瑞亚家的傀儡立为所谓的公爵以后，我们就绝不会和格罗尼亚的混蛋媾和！”\n\n腰间挂着冲锋枪的年轻女子点了点头。“威廉姆斯先生，想必阿威列茨对我们所奋斗的目标早就一清二楚，既然如此你应该知道我们毫无合作的可能性。”\n\n胡德勉强从啤酒杯带来的冲击缓过来，在心里暗暗骂了一句这个野蛮的矮人后，继续坚定地完成他此行的任务。“事实上，格罗尼亚家族的某部分成员确实要求我传达帮助你们完成目标的意愿。”\n\n“王家也有人也看那个魔女不爽？呵，可惜来自王室的几句支持的漂亮话并没法改变我们和魔女之间绝望的力量差距。”女精灵将刺剑收回腰间，翘起了二郎腿。\n\n“梅丽莎·爱斯梅拉达，你在过去的一千两百年间曾和布尔维什决斗至少一百五十次，但每次都无法突破对方那无穷无尽的魔弹弹幕。如果有足够的火力来消耗她的魔力——比如凡人军队——那么你觉得结局是否会有所不同？”\n\n德林特听后吃了一惊。“王室是认真的？可惜即便有奥罗日亚军队助阵，他们也很难抵挡来自魔女的心灵邪术，很难忠实地完成他们的职责。”\n\n“这您不用担心。‘混乱导师’薛西斯届时将会身临前线，抵御布尔维什的心灵法术。另外，如果你们愿意，他可以亲手给你们附上最好的附魔……”"
ARO.0010.a: "“……所以，请问，您可以把匕首放下了吗？”"
ARO.0011.t: "暗流（2）"
ARO.0011.d: "“玛莉斯·布尔维什当真想这么干？她不知道我们为了在宫廷魔法师中布置一颗暗子到底花了多少天杀的奥罗日亚盾吗？”格兰厄尔·苏斯在他豪宅的书房中烦躁地踱步。“如此关键的一颗棋子本来应该用在关键的博弈当中，但布尔维什——好家伙——她居然让我们把他用来‘警告’奥斯灵顿·格罗尼亚！”\n\n“别抱怨了，你再抱怨布尔维什女士就要听见了，到时候我怕被她用来劈死你的雷击波及到。”戴文·柯尼克，阿威列茨局秘书长正悠闲地坐在房间角落的小沙发中，皮笑肉不笑地看着格兰厄尔。“当然，您也可以选择停止和她的合作。考虑、权衡这么做的后果与利弊是您的工作，我只能给您点顾问建议。”\n\n格兰厄尔叹了口气，颓然地坐在了书桌前。他能够在王国权力中心稳固地扎根那么多年，靠的可不是那位十分擅长兔死狗烹的“贤安王”的仁慈与赏识，而是因为他能给王室与共和派提供一个缓和关系的桥梁。如果那些高度受魔女干涉，年轻热血、威胁着联合王国公共安全的新锐共和派成员不再认可他，那奥斯灵顿恐怕也不会介意付出足够大的代价来铲除他这个“顽疾”。然而一旦他真的按照布尔维什的计划执行了，恐怕王室也绝无再给予他任何信任的可能，而这也会带来同样的结果——他失去作为桥梁的能力，然后被奥斯灵顿干掉。\n\n如果给他指令的对象是一个普通人类，那么他有信心将这件事做得十分圆滑，不惹急双方的任何一方。然而在“魔女”玛莉斯·布尔维什那无孔不入的恐怖监视下他没有任何的回旋余地，只能在王室和布尔维什中选择一个。而他其实根本没得选——从1985年，他为了在帝国解体造成的混乱中保住自己的位子而被迫和那些年轻、幼稚而不知恐惧的雷斯诺顿共和派走近时，他现在作为棋子的价值被那魔女榨干到最后一滴的结局就已经注定了。\n\n“……按照布尔维什说的做。然后，柯尼克——帮我卖掉这处房产，要低调。”格兰厄尔颤抖地举起手，按住了额头。“好日子要到头咯……”"
ARO.0011.a: "与魔鬼签订契约终将付出代价。"
ARO.0012.t: "朝会"
ARO.0012.d: "在经历了共和革命的浪潮与帝国的解体后，奥罗日亚联合王国大部分曾经用于维持君主权威的仪式都被取缔或逐渐消亡了。而各地贵族与其他显赫前往格罗尼亚城中的宫殿、觐见他们的领主、献上忠诚与贡金并提出他们的建议或需求的朝会虽然没有被完全取消，但是也被改制为每五年一度的礼仪社交活动。而今天就是国王按例在格罗尼亚王宫的谒见堂中举办朝会的日子。\n\n联合王国的君主奥斯灵顿·格罗尼亚少有地戴上了曾经属于奥罗日亚皇帝的铂金冠冕，端坐在镶嵌着许多仿制宝石的大理石御座上，手中握着据说和奥罗日亚的皇冠拥有同样久远历史的魔剑“血契之见证”，而他的继承人希雅薇瑟则穿着繁复华丽的金色长袍在一旁侍立，双手捧着格罗尼亚王室复辟时从伦塔司摄政家族那里夺取的“审判者”礼杖。在他两侧各有三名穿着礼服的近卫军官，他们不带任何武装，但依然衬托了奥斯灵顿的威严。\n\n最先并排走入谒见堂的是阿斯顿·格罗尼亚亲王、安里利亚大公板岩·莫瑞亚、涅佐斯公爵莱昂·康斯坦丁与巴什拉公爵马诺尔·雷斯诺顿等高阶贵族。国防部长哈梅德·兰斯特、工业部长希斯特·塞欧与王国银行行长程宇陆等大臣紧随其后。最后进入的是贝里斯·哈德格元帅、达米尔·艾克斯亚特上将、杰克·布伦希特上将与赫尔曼·希斯林准将等高级将领。\n\n站在奥罗日亚联合王国权力巅峰的上百人几乎全部齐聚一堂，面对他们的国王单膝跪地，《东方时报》、《奥罗日亚快讯》、《格罗尼亚日报》等和官方关系较密的媒体派出的记者在他们身后架着摄像机不断地进行着拍摄，而十二名忠诚的王室魔法师则在谒见堂两侧举着最新型号的制式军用防御法杖，为谒见堂中的所有人提供从心灵到肉体的全方位防护，同时也警惕着任何可能发生的意外。\n\n奥斯灵顿的双眼扫过御座下无数油滑的面容，在心里叹了口气，随后露出庄严的表情，开始了他早已预备好的发言。“在座的诸位无一不曾为奥罗日亚联合王国与其人民专业且忠诚地服务了许多年，这既是属于王国的幸运，也是你们一刻不松懈工作至今的结果。在千禧年将近的当下，我们所面对的国内外环境变化比过去一个世纪以来的任何一个时刻都要更加错综复杂，王国也正在遭受自重建以来最为严峻的考验，因此……”\n\n奥斯灵顿的眼角余光瞥到一名王室法师突然高举起了法杖。在过去的十二年间曾遭遇过五次刺杀，已经对类似情形经验丰富的国王没有犹豫，立刻从御座上往前一扑。威力不俗的魔弹从他的背后惊险地飞过，在大理石御座上炸裂开来，其上镶嵌的仿制宝石如同榴弹的破片一般四散溅射。\n\n突然发难的魔法师张开嘴，似乎是准备诵念咒语，但在他成功发出任何一个音节之前，王室忠诚的顾问“混乱导师”薛西斯就向他释放了一发强大的睡眠术。魔法师应声昏迷，倒在了地上。\n\n奥斯灵顿从魔弹的余波中稍微缓了过来，几名受伤不重的近卫军将他搀扶了起来。他回头看去，发现了他最不愿意看到的一幕——他的女儿，希雅薇瑟·格罗尼亚倒在了血泊当中。"
ARO.0012.a: "“御医在哪？快来救她！”"
ARO.0013.t: "琴弦崩坏"
ARO.0013.d: "在奥斯灵顿·格罗尼亚即位12年后，他在奥罗日亚联合王国中努力维系的脆弱平衡终于走到了尽头。格罗尼亚的贵族们认为他对外表现得太过软弱，无力将奥罗日亚带往下一次胜利；雷斯诺顿的共和主义者们将他视为通往共和宪政路上的最大阻碍，是必须消灭的暴君；马德南平原上的拜光会信徒更是完全无法与奥罗日亚的剥削压榨共容，已经在准备进行第二次武装叛乱。\n\n奥罗日亚将走上哪条道路？"
ARO.0013.a: "钢铁、鲜血与荣耀。"
ARO.0013.b: "自由、民主与平等。"
ARO.0013.c: "传统、虔诚与和谐。"
ARO.0014.t: "暮光之梦"
ARO.0014.d: "在一片昏沉模糊如同余烬的暮色中，希雅薇瑟的意识逐渐从纯粹的虚无上浮，一系列破碎的画面在她眼前如同走马灯一般闪烁、消逝。她看到了1986年的那个午后，正在王宫后花园陪她玩耍的父亲接到了菲尼克斯国王遇刺驾崩的消息后，不顾她的哭闹转身离去；她看到了1988年的那个春日，她站在窗前苦等即将回宫的父王，在一整天的等待后才知道父王临时改变了计划，要再过一周才能回来；她看到了1991年阿斯顿·格罗尼亚终于从沃姆返乡，在随后几个月内向她讲述、倾诉他在沃姆宫廷的经历，却三番五次地被父王阻止；她看到了1993年的那个午夜，她在朝会后的晚宴因为涅佐斯公爵的次子辱骂父王而失手打瞎了那个小混蛋，被关了一整晚的禁闭；她看到了1997年格罗尼亚城中那场暴动，一群面目狰狞的暴民趁着国王西巡冲进了王宫，她差点被下人们捆起来交给暴民——背叛她的人包括从小服侍她的女仆，德高望重的家庭教师和慈眉善目的老仆人。\n\n然而画面并没有停在她最后所知的那一刻，而是继续如同洪水一般向她袭来。这些景象如同最为奇异迷蒙的梦境一般缺乏逻辑，却又如同最为冷峻坚硬的事实一般可以理解。四周环伺的无数敌寇——南巴斯蒂亚的渗透势力、沃姆的野心家、皮奥瑞亚的恶党、西莉迪亚的赤匪、吉拉尼亚的暴君、雷斯诺顿的共和叛徒、马德南的拜光异端、还有斯里卡的弃誓魔女——这些歹徒积蓄了无比磅礴的邪恶力量，对美丽的格罗尼亚伸出了魔爪，而她的父王，奥罗日亚联合王国的“贤安王”奥斯灵顿·格罗尼亚，全无抵挡这些恶魔的能力，他组织的国民军队的防线被击垮，他的近卫军团遭到屠杀，他“忠诚”的人民背叛了他，而当这锐不可当的锋矢即将击中他的时候——\n\n奥斯灵顿·格罗尼亚向前一扑，而锋矢直朝着希雅薇瑟冲来。\n\n这一幅异常清晰的画面逐渐和她最后的记忆中躲开魔弹的奥斯灵顿的身影重合。\n\n随后，奥罗日亚联合王国的王女恢复了意识，睁开了眼睛。周围的一切嘈杂仿佛都与她无关，她努力转过脑袋，看向窗边。温暖而美丽的夕阳将最后一抹暮光努力地照射在了她的眼睛上，随后便被无边的黑夜吞噬了。\n\n山河日下，暮气沉沉。如同奥罗日亚的未来，也如同她的父亲一般。"
ARO.0014.a: "奥罗日亚……需要一位新的初阳王。”"
ARO.0101.t: "程宇陆入狱记（1）"
ARO.0101.d: "两名西装革履的男性走进了格罗尼亚郊区的一间名叫“黑衣人”的酒吧。此时正值正午，酒吧里还没有客人，两人向店老板点头致意后走进一个包厢，坐在了卡座上。\n\n“佩斯，我之前委托过你‘深入调查’那个大学教授。怎么，你的‘调查’有进展了？”面容细腻，似乎是个贵族的男人发问。他对面的名为佩斯的男人与他截然不同，身材五大三粗，脸上还有几道可怕的瘢痕。\n\n“还没有，那家伙嘴是真他妈硬，十根手指被我们卸了八根，还不愿意吐露出共和派在昂达克大学内的其他合作者。他的老婆孩子已经按照他的指示跑到帕拉密斯了，那块就不在我们的业务范围内了。”佩斯不顾墙上的“请勿吸烟”标志，点起一根七河进口的雪茄，猛吸了一口。“不过我们有个意外收获——你还记得1997年，南巴斯蒂亚共和国大使在约里尔布雷塞斯庄园的客房中猝死的事吗？”\n\n“怎么，那果然不是个意外事件？”贵族脸上的笑意逐渐浓郁了起来。\n\n“意外倒是确实够意外。这位教授当时正好也在布雷塞斯庄园，还为大使提供了第一时间的急救，留下的档案不仅没有销毁，还被他放在了保险柜里。你猜怎么着？大使的死因竟然是‘行房时急性心肌梗塞’，也就是他妈的马上风。”\n\n“我没看出这情报有什么价值。”贵族摇了摇头，瞄了一眼窗外。\n\n“有价值的是南巴大使当时房事的对象——格罗尼亚城苏珊娜投资事务所的所长，昂达克州长夫人，苏珊娜·苏斯……”\n\n贵族瞪大了眼睛。“这他妈——”\n\n“……的贴身女佣。”佩斯吐出一口烟雾，露出无比愉悦的笑容。“不过我相信这也够有用了。是吧，哈尼斯特·格兰特子爵？”\n\n格兰特子爵也露出发自真心的愉悦感。"
ARO.0101.a: "“是啊，这足够我们发挥了。”"
ARO.0102.t: "程宇陆入狱记（2）"
ARO.0102.d: "格兰厄尔·苏斯看着《格罗尼亚爱国者周报》上由格雷斯·沃尔长期撰稿的“格雷斯谈时事”栏目刊登的《惊爆！昂达克州府夫人竟曾指使其贴身女佣在行房之时暗杀南巴斯蒂亚共和国大使！》一文，陷入了沉默。一旁将这篇杂谈呈递给他的秘书虽然依靠着职业素养强忍住了表情变化，但是微微发抖的手指还是透露出了他的不安。\n\n“把这玩意扔掉，别让我再看见了。”格兰厄尔将这本不厚不薄的报刊递给了秘书。秘书如释重负地向他行了个礼，随后便逃跑一般地离开了他的办公室，顺手带上了门。在确认屋内已经没有其他人后，格兰厄尔瞬时便撕掉了那紧绷的严肃表情，露出了一副狂怒的丑陋面孔。“这帮狗养的战争狂疯子真他妈行，连这事都能给我挖出来！当时负责给我们擦屁股的那个姓柯尼克的东西，程宇陆一年给他的弱智部门拨几十亿奥罗日亚盾的款，他连个大使猝死的丑闻都捂不住？阿威列茨的那帮搞情报的家伙早该被枪毙了！……”\n\n在暴怒中痛骂了整整两分钟后，格兰厄尔的怒火戛然而止，迅速将表情切换为标准的严肃模样。他扶正了眼镜，走到窗前，开始冷静地思考。\n\n格雷斯·沃尔是近两年在格罗尼亚州突然爆红的畅销书作者，他的支持者是在革命中失去了封邑的昂达克家族。昂达克家族的现任家主虽然对政治并不感冒，但他的嫡长子格洛克·昂达克却在格罗尼亚积极地组织民族主义活动。而格兰厄尔自己在忠于奥罗日亚王室的前提下确实与许多雷斯诺顿的共和主义者有着有限的往来——这是奥斯灵顿·格罗尼亚默许的，王室需要他来弥合与共和派之间因为那些民族主义者越闹越僵的关系。\n\n昂达克家族近年来与王室之间的关系变得十分紧密，难道这是在王室授意下对他的攻击，准备等待造势足够后将他铲除掉？毕竟他经营多年的人脉如今已经在王国的金融与教育体系中深深扎根，虽然他一直保持着相对低调的姿态，并且似乎和那名“贤安王”有着一定的默契，但王室还是有可能被他的行为激怒。无论如何，他需要迅速行动起来了，决不能坐以待毙。\n\n他摇了摇桌上的服务铃，很快他的秘书便打开办公室门，回到了房间内，微微颔首，等待着格兰厄尔的指令。"
ARO.0102.a: "“联系柯尼克，让他组织一个调查组，查清这起诬告的脉络。”"
ARO.0103.t: "程宇陆入狱记（3）"
ARO.0103.d: "看着德利乌斯·多佛那张满是皱痕的脸，程宇陆一时间有些恍惚，不知道该说些什么。其实程宇陆的年纪比德利乌斯要大得多——当年将德利乌斯·多佛破格录取入格罗尼亚大学的那位副教授和程宇陆是同学。然而岁月在德利乌斯脸上留下的痕迹却远比程宇陆深刻且沉重，不知是因为德利乌斯那困窘的青年时代，还是因为他那坎坷的仕途。\n\n“德利乌斯，你需要调养。”程宇陆有些犹豫，但还是从手提箱中取出了一瓶泛着褐色光芒的药剂。“这是用安里利亚人参、巴什拉薰衣草、康诺尔车前草与北巴魔兽的胆黄熬制的养生合剂，据说是布尔维什亲手熬制的。你比我更需要它。”\n\n德利乌斯没有推脱，伸手接过了药剂，放在了书桌上。“开门见山吧，老朋友。最近的形势越来越紧张了，今年已经有好几个同情共和主义运动的教授意外身亡了。比起我的健康，更需要保护的是那些在象牙塔里浸淫了一辈子，无法很好地应付那些学术领域以外的腌臜的学者们。”\n\n“柯尼克能够在合理范围内调动的干员太少了，而奥斯灵顿最近也对我的行动愈发警惕，我可以安全支配的干净资金也有限。”程宇陆摇了摇头。“你想办法用加强高校安保之类的名头做个提案报告吧，我只能尽量帮助你的提案在经费这块没有太大的问题。金融系统现在也面临着严峻的威胁，我是真的没有能力再帮你了。”\n\n德利乌斯抬起头，平静地看着程宇陆的双眼。程宇陆张了张嘴，想要说些什么，但最终没能说出来，随后转过头去，躲开了德利乌斯的视线。“老朋友，抱歉，我还有几个会要开——千万保重。”"
ARO.0103.a: "“你也是，千万保重。”"
ARO.0104.t: "程宇陆入狱记（4）"
ARO.0104.d: "“你的决定是正确的。”格洛克·昂达克将面前的报纸放下，扫了一眼刚刚走进包间的黑衣男人。“玛莉斯·布尔维什和她的同党早已陷入疯狂，王室不会再放任她的恣意妄为，而你抓住了最后的机会。”\n\n黑衣人摘下了头顶的礼帽，挂在了衣帽架上，随后坐在了昂达克爵士的对面，用他那如同蛇信一般灵活的口条吐出他早已编织好的语言。“对于我曾经的渎职与背叛我无法推诿，我知道即便遭受千刀万剐也无法赎清我的罪孽。我曾经慑于那魔女的淫威，因胆怯而不敢违抗来自她的任何荒唐命令，然而在良心的沉重煎熬下，我内心如同地狱烈火一般拷打我的自责使我无法再如此麻木地将错就错下去，正因此我才为了尽可能弥补我犯下的过错而在此向您忏悔。”\n\n“柯尼克，呵，柯尼克。暗中密谋，刺杀君主，倘若奥罗日亚还处在和平安康的时代，像你这样的恶棍绝无可能逃脱绞刑架的审判。”昂达克爵士举起牛排刀，切开了面前小火慢煎的山羊人肉排，叉起还泛着些微粉红色的肉块，递入口中。“然而王国早已被无数内忧外患逼到了悬崖边上，而你又是不可多得的优秀情报人才，所以阿斯顿亲王决定给你一次洗心革面、戴罪立功的机会。不过这还需要你展现出足够的‘诚意’——我相信你带来的手提箱里的内容物便是用于证明你的价值的。”\n\n阿威列茨局的秘书长，戴文·柯尼克打开了他随身携带的手提箱。“在前段时间，格兰厄尔·苏斯与程宇陆等人曾经指使我为他们秘密转移部分他们名下的部分资产，部分转往南巴斯蒂亚共和国与皮奥瑞亚共和国，部分转成了贵金属与宝石，这些是他们转移资产的证据。除此以外，这里还有格兰厄尔·苏斯要求我抹除苏珊娜·苏斯的贴身女佣谋杀南巴斯蒂亚大使的相关信息时留下的档案证据。下面还有很多类似的文件，您可以慢慢审阅。”\n\n“很好。”昂达克爵士满意地点了点头。“浪子回头金不换，欢迎加入奥罗日亚爱国者委员会，阿威列茨局‘局长’柯尼克。”\n\n柯尼克站起身来，深鞠一躬。“我定不会辜负这份来之不易的信任，以后我的工作还请您多加指导，昂达克‘州长’先生。”"
ARO.0104.a: "一丘之貉，狼狈为奸。"
ARO.0105.t: "程宇陆入狱记（5）"
ARO.0105.d: "“维多利亚，出大事了，快点收拾细软，咱们得准备逃去斯里卡了。”程宇陆在打开他家的大门后立刻朝他的妻子维多利亚·程说道。\n\n维多利亚惊讶地放下了手中的《雷斯诺顿浮生记》，从盖着软呢面料的扶手椅上站了起来。“宇陆，发生什么事了？是因为你之前托人在普罗维登斯购置地产的事情吗？我早就跟你说过这不……”\n\n程宇陆摇摇手打断了维多利亚的话。“刺杀事件是格兰厄尔策划的，他要完蛋了，我们也快了。亨利，你赶紧去把车备好！汉蒂，你跟我一起来地窖。”\n\n叫亨利的仆人连忙一溜小跑离开了房屋，而穿着女仆裙装的中年女性则跟上了正大步流星往地窖门口走去的程宇陆。“程先生，您这是要做什么？”\n\n程宇陆没有理会这位虎背熊腰的妇女的疑问，而是三下五除二地打开了地窖中一扇隐藏在酒桶中的暗门，弓起腰背，使出浑身吃奶的劲，从中拖出了一只不算很大的手提箱。“你把它抬到车上，然后拿上那几把打猎用的步枪，跟维多利亚一起离开。汉蒂，你为我们家干了十几年的活，你是我最信任的佣人，而你也一定要把维多利亚保护好，把她安全地带到斯里卡的山里。”\n\n汉蒂体会出了程宇陆的话中隐含的意思，郑重地接过了手提箱。“程先生，您不跟我们一块走吗？”\n\n程宇陆抬起头来瞪了她一眼，随后摇着头往地窖口走去。“你们没有违反联合王国的法律，王室没有合法合理的理由逮捕或迫害你们，你们只需要担心遭到某些干脏活的狗腿子的袭击。要是我跟你们一起离开，那你们就立刻会变成包庇犯，那才是真完蛋。”\n\n离开地窖后，程宇陆犹豫了几秒，然后才朝着门口正等着他的维多利亚走去。“维多利亚，我不能跟你一起离开——如果我没能成功，那你答应我，你一定要坚强地活下去。”\n\n维多利亚张口想要说些什么，但是她的嘴唇刚张开便被程宇陆的最后一吻封住了。"
ARO.0105.a: "随后，男人头也不回地离开。"
ARO.0106.d1.1: "充满担忧"
ARO.0106.d1.2: "丧家犬一般"
ARO.0106.t: "程宇陆入狱记（6）"
ARO.0106.d: "在安排好家人的撤离后，程宇陆总算没有了后顾之忧。奥斯灵顿遇刺后在场的大部分人员都被暂时禁止离开格罗尼亚城，而这其中自然也包括他。虽然他在前期的调查中并没有显露出与刺杀事件有直接联系的证据，然而在格罗尼亚共和派的力量彻底树倒猢狲散后，他们这批御用反贼的使用寿命也要不出意外地到头了。\n\n然而他并不打算就此坐以待毙——虽然格兰厄尔·苏斯这个混蛋从开始策划刺杀行动后就只想着自己逃跑，完全没有管他们这些“宫廷共和派”的死活，但程宇陆依然能够在剩余的同侪之间动员出相当大的力量，而如果他能够将这些力量消耗在正确的地方……他就能为自己找到一线生机，或许还能带上几个老伙计。\n\n程宇陆从专车上下来，找了个借口支开了他的司机，随后拐入了一条又脏又臭的小巷，走进了巷子深处的一家皮奥瑞亚卤煮店。店老板放下了手中厚重的砍骨刀，用围裙蹭了蹭他那沾满了油星和卤料的手，随后走到柜台附近。在他开始推销柜台上的麻辣兔头之前，程宇陆便发话了。“给我称二斤三两酱牛舌，一斤九两猪耳朵，我要给二侄子过生日。”\n\n店老板听到后心领神会，为程宇陆打开了一道不起眼的暗门，随后又抄起砍骨刀，开始为他准备做的卤排骨备料。至于程宇陆走进暗门后打的十几个电话的内容，他一点都不知道，也一点都不想知道。不过程宇陆在走出暗门后露出的那副[ARO_0106_d1]的表情让他下定了在今年结束前带着他在这里赚到的钱滚回皮奥瑞亚的决心。\n\n三天后，程宇陆在他那除他以外已经空无一人的宅邸中，用一罐据说是阿瑞萨山脉顶峰千年不化的冰水，泡了一壶上好的南山小种红茶。这三天间他打了无数个电话，准备了无数个备用的预案，岁月在极度焦虑的助力下终于开始在程宇陆的脸上展现它的威能，不知不觉间他已经满头都是白发。而到如今程宇陆早已做尽了他还能做的，于是便在这里平静地等待命运的来临。\n\n第一泡入口，如同他早年间求学时的苦涩，虽然短暂却回味无穷。\n第二泡香醇如美酒，好似他担任帝国银行副行长时的意气风发。\n第三泡口感略带点单薄，却也比他做昂达克校长时期的无事可做要好了不少。\n第四泡淡薄无味，就像他近几年在两股巨力之间挣扎求生带给他的麻木一样。\n当他泡到第五泡时，有人敲响了门。程宇陆站了起来，用他已经有些颤抖的手为门外的宪兵打开了门。宪兵宣布了来自奥斯灵顿的让程宇陆停职并接受调查的决定，而程宇陆顺从地点了点头。"
ARO.0106.a: "他已没有逃生的希望了。"
ARO.0106.b: "他已经找到了得救之道。"
ARO.0107.t: "程宇陆入狱记（7）"
ARO.0107.d: "“犯人K13006号，接阿威列茨局的指令，你将被转移至涅佐斯监狱。乖乖跟着走，不要有多余的小动作。”一名高大壮硕，穿着藏青色制服的狱警从他腰上的一大串钥匙中挑出了一把，打开了程宇陆所在囚室的锁。在经过长达数周的审讯与折磨后，这名曾经从容得体的绅士如今已经面容枯槁、满身疮痍，狼狈的如同苦役奴隶一般。他仿佛没听到狱警的话，依然如同一具尸体一般靠在那阴冷潮湿、布满青苔的石砖墙上，直到狱警走进囚室将他的身体从墙边拉开并给他戴上手铐后他才有了反应，缓缓地站起身来。那名高大的狱警将他带了出去，另外几个在外面等候的狱警也跟了上来。\n\n在被从牢房押解到转运车的路上，程宇陆一直低着他满头灰发的脑袋，一言不发，时不时因为走得太慢而被狱警们推搡一下。这段只有短短两百多米的路程，程宇陆由于双腿因鞭打与其他刑罚而严重受损，花了将近十分钟才走完。终于，程宇陆来到了监狱的中庭，被狱警粗暴地塞进了狭窄逼仄的运囚车中。转运车中有许多程宇陆熟识的面孔——大多都是格罗尼亚共和派中有一定地位的，他们或许曾位高权重、富贵满身，但如今却只能像罐头中的沙丁鱼一样挤在这小小的囚车中。\n\n大约三十分钟后，一名程宇陆不认识的阿威列茨局干员最后确认了一次转运囚犯的名单，随后重重关上了运囚车的后门，并仔细地栓上了门闩，坐上了驾驶席，发动了引擎。运囚车从安德罗监狱驶出，沿着47号国家公路缓缓地向涅佐斯驶去。\n\n伴随着漫长的运输过程的是如同坟墓一般的沉默。终于有几个年轻人按捺不住无聊，开始试着和周围的人搭话。坐在程宇陆旁边的一个年轻学生也向他投来了好奇的目光：“您……难道是程先生吗？天呐，那些禽兽到底对您做了什么？”而程宇陆没有回应，只是沉默地低着头。\n\n突然，转运车打了个急转弯，突然从公路冲到了附近的草地上，那名干员在把车停稳后立刻从驾驶席上跳下，朝远处迈步跑去。囚犯们意识到自己将面临怎样的命运，开始疯狂地敲击车体，试图从囚车中冲出去，但程宇陆依然坐在原地，什么也没有做——他求生所需的气力早已被耗尽了。"
ARO.0107.a: "在车上五个炸弹的爆炸中，他们迎来了结局。"
ARO.0108.t: "程宇陆的救赎"
ARO.0108.d: "程宇陆在一间不算狭窄的牢房中坐着，烦躁地敲着他屁股下的长椅。自他被捕入狱已经过了一个多月，这一个多月期间他虽然没遭受什么折磨，但在这个随时可能被那帮主战派疯子以各种稀奇古怪的方法弄死的囚笼里他根本一秒都不想多呆。\n\n五天前，前国防部长哈梅德·兰斯特通过在狱警中的一名线人向他传递消息，告诉他在今天下午阿威列茨局将会发来一条伪造的电报，要求将包括程宇陆在内的八名囚犯紧急运往涅佐斯监狱。一名在收买时完全绕开了柯尼克，并且仍然忠诚于兰斯特的阿威列茨局干员将会驾驶转运车来他所在的监狱接应，随后在开往涅佐斯的路上和另一辆货车交换，将他们秘密地带过雷斯诺顿与格罗尼亚之间的边境。虽然这和程宇陆在一个多月前策划的逃狱计划有些区别，但是不得不承认这些仍然在格罗尼亚活动的共和派力量已经被他运用到了极致，而这计划是否能成功——恐怕只能看天意了。\n\n终于，他等候多时的狱警来到了他的囚室前，说出了在他意料之中的台词。“犯人K13006号，接阿威列茨局的指令，你将被转移至涅佐斯监狱。乖乖跟着走，不要有多余的小动作。”程宇陆面带微笑，从长椅上站了起来，顺从地让狱警给他戴上手铐，随后跟着他来到了监狱的中庭。狱警将他带上了在中庭等候多时的运囚车，随后那名阿威列茨局干员关上了运囚车的后门，栓上了门闩。\n\n程宇陆看着旁边那些熟悉的面孔——这些格罗尼亚共和派的中流砥柱们或是惊讶，或是和他一样看起来胸有成竹。其中一名曾在教育部工作、和他相交甚密的老人突然面向程宇陆，对程宇陆说道：“其实比起我这个糟老头子，你更应该把这趟车的车票留给那个叫安德罗的学生领袖的。他还年轻力壮，本来还能成就一番事业的。”\n\n程宇陆有些犹豫，还是摇了摇头。“马克鲁斯……我也很喜欢那个孩子，但是我不得不抛弃他，因为未来的共和国比起一个学生领袖，更需要一个像你一样在教育领域有着丰富工作经验的官僚。如果你还是有负罪感的话，那就把安德罗对共和国的那一份贡献也一并承担了吧，这会让你好受些的。”"
ARO.0108.a: "随后车开动了，开往自由。"
ARO.0111.t: "玛莉斯·布尔维什的回忆（1）"
ARO.0111.d: "斯里卡巍峨的群山和如同绿色菌毯一般的密林在眼前浮现——这是玛莉斯·布尔维什在她的师父的帮助下第一次飞上天空时所见的景象。从此她便爱上了这片美丽的山林，决心要用自己的手来捍卫这里的纯洁，任何人都不能玷污。\n\n三年前，这名勇敢的女孩为了逃避和一名年迈伯爵的婚约，偷走了一匹马，离开了她所生活的卢瓦尔王国，穿越了维尔陶和[367.GetName]，逃进了当时被认为是蛮荒之地的东方诸山中。当她在斯里卡的森林中迷失方向、冻饿交加，即将不甘地死去时，她闯入了一个巫术集会。巫师与女巫们把她当做命运指引而来的姐妹，接纳了她，最后一名强大的女巫将她收为学徒，向她传授魔法。\n\n生活在森林中的斯里卡人们十分重视技术的传承，因此她的师父也向她倾囊相授。本身便天赋极强的玛莉斯不到十年就学会了森民掌握的巫术中的绝大部分，虽然这招致了她的同侪的大量嫉妒，但玛莉斯对此并不关心。此刻她眼中只有对于知识的狂热追求与对于世间万物的蔑视，而不巧的是，一个灵感火花恰巧在此时在她脑内点燃，那是长生不老的方法——若是这一灵感更早或更晚地被上天赐予给她，或许将来的悲剧便不会发生，然而命运向她开了一个卑劣的玩笑。她猜测，如果用足够大量的魔力与强大的灵魂来固化她现在相当健康的躯体，将自己身体的各个部件铸造为“魔器”（即拥有魂魄的器物），那么她的肉体也会如同那些神奇的魔器一般永恒地运行下去。而她身边就有着足够多的魔力与强大灵魂——那些巫师与女巫们就是最好的“永生材料”。\n\n她的师父在心脏被匕首贯穿时露出了难以置信的惊恐表情。玛莉斯没有丝毫犹豫，将师父的灵魂抽取而出，用心灵法术洗脑，随后用溢出的巨大魔力塑造成一把锻锤，将灵魂容纳进自己的心脏里。在大约半个小时的昏迷后，她慢慢醒转——她成功了，她将自己的心脏转化为了一件魔器。\n\n在接下来的半年间，斯里卡的巫师们相继遇害，而陷入狂热的玛莉斯完全失去了理智，在山林间如同索命的恶鬼一般追猎四散奔逃的巫师们。最终，当她冷静下来时，她面前只有斯里卡除她以外最后一名巫师的残魂——而她的身体此时已经完全魔器化了。"
ARO.0111.a: "她跪在地上，失声痛哭。"
ARO.0112.t: "玛莉斯·布尔维什的回忆（2）"
ARO.0112.d: "在如同恶魔一般屠杀了斯里卡全部的巫术修习者后，玛莉斯·布尔维什将绞索套在自己的脖颈上，把自己吊在了一棵高大的杉树上。当布尔维什在窒息的痛苦中悬挂了二十五年后，那根绳子终于不堪重负而断裂，而她也终于在忏悔中找到了自己的救赎之道——守护斯里卡的子民与山林，延续斯里卡的巫术传承。她不知道这是否能让被困在她体内的无辜灵魂们原谅她，但至少能让她自己的心灵安宁。\n\n她重新开始办设巫术集会，广泛地招收魔法学徒。在曾经溅满女巫鲜血内脏的树屋中，再次有对森民的巫术懵懂未知的求知者们席地而坐，接受这份古老技艺的传承。玛莉斯·布尔维什对她的所有学徒几乎毫无保留地倾囊相授，除了她花了无比沉重的代价探求来的长生术。她无比清楚，这种危险的技术决不能流传于世，否则这世界将会陷入比地狱还要糟糕的境地。\n\n聚集在她树屋下的学徒越来越多，她意识到这些人只要管理得当便可成为为她所驱使的臂膀，而更多的力量对于守护斯里卡的事业有益无害。不到四十年，她便建成了一支包含数百名巫师与女巫的军团，而她将其称为“布尔维什军团”。虽然其中大部分的法师并没有多少施法天赋，但布尔维什军团依旧是一直不可小觑的力量。斯里卡在布尔维什军团的保护下欣欣向荣，这片山林似乎已经不需要玛莉斯·布尔维什也可以延续下去了。\n\n然而东方平原飘来的战火打破了她的希望——曾经相互掣肘的三大国家之间的平衡被打破，整个平原因可笑的原因陷入了战乱。斯里卡不再安宁，依旧需要她的保护。"
ARO.0112.a: "她叹了口气，担起了责任。"
ARO.0113.t: "玛莉斯·布尔维什的回忆（3）"
ARO.0113.d: "诸王时代两百年绵延不断的战火与饥荒如同战马的铁蹄一般将这片大地曾经存在过的诸多文明蹂躏、摧毁。科纳琴人建立的王国轰然倒塌，雷斯诺顿王国也四分五裂，来自吉拉尼亚人如同烈火一般的侵略，加上一场雪上加霜的大旱，此地的住民已经十不存一。而她的故乡也传来了坏消息——南巴斯蒂亚也陷入战火，大量流民向东逃亡。一开始她和雷斯诺顿王国努力地吸纳了一部分流民，但很快斯里卡和雷斯诺顿便无法承担这些源源不断的移民的重负，其中大部分在东方的平原上落草为寇，加剧了这早已混乱不堪的局面。\n\n玛莉斯·布尔维什曾认为这或许便是世界终焉的预兆。然而在1070年，在遥远的科纳琴的森林中，一名名为希雅薇瑟·格罗尼亚的难民领袖却从一片废墟中崛起，重新建立起文明的国度，和此地残余的住民们携手收复他们过去王国的边疆。玛莉斯的学徒在向她汇报情况时曾这样称呼那位难民领袖——“黎明时刻照耀大地的曙光”。在希雅薇瑟的统治下，无序的劫掠和杀戮被禁止，秩序再次回归了这片大地，而东方那片平原有了一个新的名字——格罗尼亚平原。\n\n当格罗尼亚女王即将和雷斯诺顿的国王为涅佐斯的边境冲突开战时，玛莉斯·布尔维什用三十发火球术在两国之间划了一条边境，阻止了这场无意义的战争的爆发。她邀请两位国王来到她的树屋中作客，而两位王者也欣然应允。他们三人在那间木屋中为这片大地的未来进行了长达半个月的讨论，最终决定要拥戴一个强大的帝王来避免混乱的局面。\n\n雷斯诺顿王国与格罗尼亚王国联合，以南巴斯蒂亚语中的曙光为名建立了奥罗日亚帝国。玛莉斯·布尔维什铸造了一把魔剑，以此见证了两位王者的联合，并与新任的奥罗日亚女皇签订了契约。\n\n“我会为奥罗日亚的皇冠服务，而你和你的后代要保护斯里卡的人民不受侵害。”"
ARO.0113.a: "神圣的契约被签订，带来了奥罗日亚的秩序。"
ARO.0114.t: "玛莉斯·布尔维什的回忆（4）"
ARO.0114.d: "玛莉斯·布尔维什终于得以确认，自己对于格罗尼亚女皇的判断无比正确。希雅薇瑟·格罗尼亚本人虽然在1096年那场抗击西方帝国侵略的战争中死于旧伤发作，但她的后代没有辜负她的契约。三百多年间，格罗尼亚家族的后继者们不仅守护住了奥罗日亚的边疆，还将边界向东方、南方与北方推进了上千公里。皮奥瑞亚的普罗维登斯人、沃姆的蜂鸟部落、西莉迪亚的南巴流亡者与吉拉尼亚的鲜血大公都臣服于奥罗日亚的皇冠下，斯里卡终于迎来了安宁的日子，而她门下的学徒也开枝散叶，颇具规模。\n\n而在最近的这一批学徒里，天赋最佳的便是绰号“导师”的心灵法术天才，薛西斯。薛西斯仅仅花了五年就掌握了玛莉斯·布尔维什传授的大部分法术，使得她有些不安——这与她自己的经历过于相似，使她下意识地开始提防薛西斯的行为。\n\n毫不意外地，如同数百年前的她一样，薛西斯也陷入了对知识的狂热中，而这使他无法压抑对于玛莉斯·布尔维什永生的秘密的好奇心。在一个僻静的午后，薛西斯趁着其他学徒都不在，向她询问长生不老的诀窍。她坚决地拒绝了薛西斯的询问，并随后对他严加看管。\n\n经过两年多不断的谈话与开导后，薛西斯似乎摆脱了那种对知识的狂热状态，于是她便放下心来，让薛西斯回归正常的学徒生活。然而这松懈是致命的——薛西斯在与她长达两年的共处中不断地用极低功率的被动心灵探测扫描她外溢的思绪，而就在刚刚薛西斯找到了一片关键的记忆碎片——那是她将全斯里卡的巫术修习者杀尽的景象。自认为找到了答案的薛西斯自然获得了心灵的宁静，而这恰巧骗过了玛莉斯·布尔维什。\n\n五年后，当她听说奥罗日亚境内有数十名强大的法师一夜之间遇害时，她才意识到自己的错误。"
ARO.0114.a: "“这世上又多了一只永生的怪物……”"
ARO.0115.t: "玛莉斯·布尔维什的回忆（5）"
ARO.0115.d: "在遭到薛西斯的背叛之后，玛莉斯·布尔维什招收学徒的热情遭到了很大的打击。她现在无比清楚，长生不老对于凡人的诱惑是致命且无可复加的，对她不例外，对薛西斯也不例外。若是庸才为这一目标所惑，他所能造成的危害或许还十分有限，但一个像她或薛西斯一样误入歧途的魔法天才能够轻松犯下累累血债。\n\n在接下来的几百年间，玛莉斯·布尔维什不再干涉政治，并且只招收那些魔法天赋一般的人做学徒。事实证明这一举措确实相对有效，在几百年间她的学徒大多在正邪两方面都没什么建树，危害最大的或许也只是那个在远乡王国臭名昭著的死灵法师贺罡，但他三十岁时就被人丢进了海里。\n\n当奥罗日亚的皇室面临资产阶级革命的浪潮，希望她能通过心灵魔法来减少大众的革命狂热时，她出于对于神圣契约的考虑，在几次可能演变成大规模暴力革命的街头冲突中使用了群体暗示魔法，让双方变得更加宁静、理性。最终经过共和派数十年的努力，奥罗日亚帝国也成功过渡为君主-议会的二元结构。\n\n然而随着19世纪民族主义的发展，奥罗日亚帝国的结构也愈发岌岌可危。沃姆、皮奥瑞亚、西莉迪亚、雷斯诺顿等国均爆发了民族主义叛乱，而玛莉斯·布尔维什完全无视了“昏逸王”菲尼克斯·格罗尼亚要求她镇压这些独立主义者的命令。玛莉斯·布尔维什自称无法跟上这个迅速变化的时代，选择回到斯里卡的山林中冥想，而奥罗日亚帝国也毫无疑问地土崩瓦解。在这一时期，玛莉斯·布尔维什给了雷斯诺顿的共和派一定的支持，希望他们能够给雷斯诺顿的人民带来更多的福祉。然而当“贤安王”奥斯灵顿·格罗尼亚重组了国民军队，大军压境时，雷斯诺顿的王室瞬间展现了他们的软弱，和格罗尼亚王国重组为奥罗日亚联合王国。\n\n奥斯灵顿·格罗尼亚希望玛莉斯·布尔维什能够继续履行神圣契约，而玛莉斯·布尔维什对此没有什么异议。但是玛莉斯依然在某种程度上包庇着共和派的活动——她并不相信奥斯灵顿能够保护好斯里卡的人民。"
ARO.0115.a: "“奥斯灵顿如果早生一百年便会是个伟人。”"
ARO.0121.t: "虔诚教团的建设方略（1）"
ARO.0121.d: "在维尔日山脉南麓，一座任何奥罗日亚军队都寻不到的秘密神殿的议会厅内，十八名身穿形制不同、颜色各异的祭司服装的男女端坐在一条长桌的两侧。这些人是目前奥罗日亚最大的非法宗教组织，“拜光会”的十八名主教，他们各自管理的教区内均有少则数千，多则十数万的信徒。但他们现在却一言不发，静静地向他们信仰的天光祷告——至少看上去如此。\n\n两名被剜去了双眼的侍女打开了议会厅的大门，一位身穿金边白色长袍、白发苍苍、面目慈祥的老妇人拄着手中的橡木杖，缓缓地走进了这处圣所。长桌两边的主教们纷纷站了起来，面向刚刚走进来的老妇人，深深鞠躬，并向她问候：“参见圣女大人。”“天光保佑您。”“愿圣女大人拯救我们。”\n\n主教们等候的正是这位被称为“维尔日的圣女”的老妇人，拜光会名义上的共同领袖，西琳·缇拉。在过去数十年间，缇拉靠着她的虔诚与领导力打动了无数的人民，将当时马德南平原上数十个离散的小教派整合成了这个叫拜光会的庞大组织，并在奥罗日亚帝国解体时带领着拜光会的二十七名主教发动了马德南大起义。虽然起义很快便遭到了奥罗日亚政府的血腥镇压，许多主教甚至遭到了公开处决，拜光会也被迫重新转入地下，但她依然没有放弃恢复莫纳什古道的愿景，重新整合了拜光会残存的力量，甚至起用了一些曾经和她有一定分歧的主教，继续卧薪尝胆，等待时机。功夫不负有心人，随着格罗尼亚家族陷入内部危机，属于他们的机会已经近在眼前了。\n\n“天光的仆人们，今日我要你们聚集在这里，是为了讨论我们修会将来的道路。数百年来一直压迫我们的奥罗日亚王室即将遭受天光的审判，虽然愚钝的我们无法真正理解天光的旨意，但我们仍然需要身体力行，为行祂的意志尽我们的能力。为此，兄弟姐妹们，我们需要商议修会在接下来的数年内对抗奥罗日亚王室爪牙的方针。”\n\n缇拉坐在了长桌的主座上，扫视着大厅内的主教们。"
ARO.0121.a: "“圣女大人，我认为……”"
ARO.0122.t: "虔诚教团的建设方略（2）"
ARO.0122.d: "“愿天光治愈你的疾病与伤痛，兄弟。”维尔日山脉上的一个小山村中央，身穿洁白长袍的西琳·缇拉将她那满是皱纹的手掌轻轻覆在一名跪在她面前的骨瘦如柴、浑身流脓的年迈农民的后脑上。虽然她的手指不可避免地沾上了一些恶臭的组织液，但她似乎对此并不在意，继续进行着慰藉仪式。“愿天光祝福你来年的收成，愿天光保护你不受魔鬼的侵害，兄弟。”\n\n老农浑浊的眼中流出了几滴清澈的泪滴。他挤出一个无比幸福的笑容，身体伏得更低了一些。“感谢圣女大人的恩赐，我已经感觉到生命回到了我的身体里。只有您才是我们穷苦人民的救世主，会愿意来到我们之间散播天光的祝福。”\n\n缇拉点了点头，露出了温和的微笑。两名身穿藤蔓胸甲的信仰勇士走上前来，缓缓地将老农搀扶起来。“兄弟，请随我们走，我们为你准备了圣餐饼和圣果。”老农随信仰勇士们离开了村庄中央，而缇拉也抬起头来，面对周围的人群们，开始了这次活动的正题。\n\n“兄弟姐妹们！今日，我们在天光的见证下在此齐聚一堂，共享来自奥罗拉的恩泽与祝福。天光为我们带来丰收的粮食，为我们指导未来的方向，使我们的灵魂得到净化与救赎。然而，这份恩典并不是没有代价的。那些被魔鬼与其他邪恶力量诱惑的敌人们从四面八方包围了我们，他们在我们祖祖辈辈居住的土地上建设了污秽的巢穴，将香甜的清泉污染成恶臭的硫磺河流，将肥沃的良田侵蚀成不毛之地。如果我们任由这些邪恶的爪牙继续在我们的土地上放肆，让他们继续破坏这片受天光祝福的大地，那么天光终将会对我们失望，使我们失去这份从莫纳什人先祖那里继承得来的殊荣。”\n\n“为了捍卫我们的奥罗拉古道，为了捍卫我们在这片土地上生存的权力，我们每一个人都必须行动起来！加入拜光会，成为一名修士或信仰勇士，或者为我们捐献我们的活动所需要的食物、材料与其他资源。只有我们团结一致，我们才能将那些恶魔的走狗驱逐出我们的家园！”"
ARO.0122.a: "台下人潮汹涌，掌声雷动。"
ARO.0122.tt: "精彩的布道！"
ARO.0123.t: "虔诚教团的建设方略（3）"
ARO.0123.d: "“求您了，赎金什么的好商量，只要您愿意……”\n\n曼斯·多恩没有让那个被五花大绑固定在祭坛上的小工厂主说完这句话。他用手中的银制仪式短剑干净利落地划开了这只祭品的喉咙，用壮实的手掌紧紧箍住了祭品的后脑，让颈动脉中喷出的鲜血尽可能准确地落到祭坛正前方的血槽中。殷红的血液在祭坛四周数十名助祭宛如吟唱一般的虔诚祈祷中诡异地开始自发地向外流动，从血槽中蔓延而出，仿佛不断生长的植物茎叶一般缠绕在了祭坛前摆放的天光符号雕塑上。随后，曼斯·多恩开始念诵奥罗拉古道信民那传承了上千年的，传说中能唤醒森林中无数树木上寄宿的灵性、让他们拔地而起成为树人以保卫信徒的祷辞，“恩特祷文”。\n\n“森林中的万木之主啊！你是古代契约中奥罗拉赐予莫纳什善良人民的仆役与卫士，也是惩戒敌人与叛徒的战士与处刑者！我已为你献上了一名恶贯满盈的不信者作为祭品，解放了此地一丝不苟地虔诚信仰着天光的信民们。依着古代契约，你应当为我，奥贝尔修道院的曼斯·多恩、克莱格之子、维洛斯之子，提供忠诚于我的恩特树人。”\n\n倘若一名对过去的天光教义无比虔诚的信徒听到了上面那段祷文的话，想必会痛斥吟诵者是无比亵渎的异端。这段祷文删去了一百二十句用于赞美天光之灵的诗句与绝大部分对于万木之主的赞颂，在念诵时没有跪伏在地，甚至还以命令式的口吻取代了本来卑微的请求。然而，四周森林发出的颤栗声无情地将这一切指控打得粉碎——万木之主回应了他的命令，十四棵粗壮的树木变形、转化为了十四名孔武有力的恩特树人，缓缓向曼斯·多恩走去，并半跪在地上，向他宣誓忠诚。\n\n“威斯克斯，记录小工厂主祭品组第18次实验数据，14名树人。随后统计平民祭品组与小工厂主祭品组中产生树人数量的均值，并组织一次会议从成本、社会影响与效能分析两个方案的利与弊。”\n\n名为威斯克斯的副主教点了点头，记录完数据后便离开了祭坛周围。"
ARO.0123.a: "“平民祭品确实是一个有潜力的方案。”"
ARO.0124.t: "虔诚教团的建设方略（4）"
ARO.0124.d: "曼斯·多恩昂首阔步地走进了剑拔弩张，气氛如同绷紧的琴弦一般的秘密神殿的议会厅中。他的副手，副主教威斯克斯想要跟着他走进议会厅，但被两名穿着厚重的藤蔓全身甲的护教禁卫用两把镶嵌了魔矿的长戟拦在了门外。曼斯·多恩没有在意被拦在门外的威斯克斯，视线在议会厅内的七名主教间缓缓扫过——他们是西琳·缇拉的坚定支持者，强硬地拒绝曼斯·多恩等新派主教对奥罗拉修会原始教义的渐进式改革，要求严格地遵守传承多年的奥罗拉古道，以维护马德南农业人口信仰的纯洁性。\n\n坐在右侧第一位的伊登主教发话了。“曼斯·多恩主教，一名虔诚的樵夫指控你十二天前在马德南南部的森林中举行了一场亵渎且扭曲的神圣仪式。除此以外，你还在此前的数月间绑架了数十名莫纳莱斯农民，并且用残忍的手段杀死了他们；你利用被你肆意修改的神圣仪式暗中组织了一支庞大的私人部队，他们只听命于你的指挥，不接受任何来自主教会议的命令。你对这些针对你的指控有什么异议吗？”\n\n“这些指控均是事实。”曼斯·多恩骄傲地点了点头。“顺带一提，一个连的披甲树人已经包围了神殿。如果威斯克斯没能在十分钟内离开神殿，那么我的学生就会发出进攻命令，让他们摧毁神殿内的一切，而各位主教恐怕就要以身殉教了。但如果我们能够达成一致，那么主教议会说不定也能得到不少忠于他们的树人部队。”\n\n“你吓倒不了我们。”坐在左侧第二位的安格洛斯主教站起身来，从腰间抽出短剑，四名较为年轻的主教也跟着他一起走向曼斯·多恩。“为了抓捕你这个疯狂的异端，我们特别集结了五十名精锐的护教禁卫。你哪里也别想去，就在这里看着你的部队溃灭的样子吧。”\n\n议会厅外很快传来了震天的战斗声，不断地发出如同巨型帆船在暴风雨中被击碎的巨响，而人类的惨叫与呻吟也不绝于耳。在十几分钟后，战斗的声音逐渐停息，而一名戴着漆黑色面具的禁卫队长捂着骨折的左臂回到了议会厅。“伊登主教，我们成功击溃了那些恩特树人，但也有大约二十人重伤。不过请放心，我们时刻做好了为信仰献身的准备。”\n\n本来志得意满的主教团忽地陷入了死寂。少顷，伊登主教抬起头来，用他那满是皱纹的眼睛狠狠地盯着曼斯·多恩。“曼斯·多恩主教，你召唤这些树人究竟消耗了多少祭品？”\n\n“大约80人，其中大部分是赛德尔锯木厂的工人。”\n\n伊登主教如同失去气力一般瘫软在他的座椅上，而其他主教也沉默不语。最终，安格洛斯主教无力地挥了挥手。"
ARO.0124.a: "“赶紧滚吧，多恩。”"
ARO.0125.t: "虔诚教团的建设方略（5）"
ARO.0125.d: "在拜光会秘密神殿的议会厅中，拜光会的十八名主教再次齐聚一堂。而除了他们以外，端坐在长桌两端、互相以冷漠的眼神对视的两人便是西琳·缇拉与刚刚被十一名主教共同推举为总主教的曼斯·多恩。\n\n“想必诸位已经知道，奥罗日亚的暴君奥斯灵顿在去年九月遭到了刺杀，虽然这次刺杀没能将他杀死，但他必将与其他的魔鬼爆发全面的冲突。我相信，这对于我们的神圣修会来说是一次绝不可错过的机会。”西琳·缇拉在上首发言，周围的主教们纷纷点头应和。\n\n“我们应该借此机会，组织起一支由恩特树人为主、信仰勇士为辅助军的神圣部队，在奥斯灵顿最虚弱的时候发动起义。”曼斯·多恩说道。\n\n“注意你的态度，曼斯·多恩！你怎能对万木之主如此不敬？只能让万木之主主动帮助我们，我们不应向祂索取恩特树人！”一位素来反对多恩，但对他的技术不是很了解的老年主教拍案而起，被一旁的伊登主教拦下。\n\n“现在不是分裂的时候！谨言慎行，埃里克主教。”安格洛斯主教说道。“我们需要魔鬼与他们的爪牙来当做祭品，以便取悦万木之主，以接受祂的礼赞。不论是那些罪大恶极的魔鬼，还是祂们身边环绕的次级小魔鬼，都可以用于献祭，只是效力有一定区别。”\n\n伊登主教点了点头。“各位主教们，在接下来一段时间内，抓捕魔鬼的爪牙便是你们最重要的任务。你们现在的每一点奉献，在将来都会转化为实打实的回报。”\n\n“具体来说就是按照抓捕的贡品数量分配对应数量的部队。”曼斯·多恩冷不丁地插了一句。\n\n“多恩总主教，请不要说的那么直白……”伊登主教略有些尴尬。\n\n这时，西琳·缇拉发话了。“多恩主教，我无意干涉你的言行，因为你对天光事业的贡献远大于你言行不端的问题。但不论怎样，现在都到了起义的关键时期，千万不可懈怠。”\n\n话音落下，两人之间的气氛似乎也缓和了些。随后，主教团开始了紧锣密鼓的计划，为接下来的一系列发展做出准备。"
ARO.0125.a: "圣女和主教达成了暂时的共识。"
ARO.0131.t: "王女的寻访：重伤初愈"
ARO.0131.d: "“殿下，恭喜您，您的身体已经没有大碍了。”须发皆白、面色红润的御医老爷子看着那个沉默寡言的学徒完成了最后一项检查，笑着对希雅薇瑟说道，“不过依照我的经验，您最好在御榻上多休息几天，静养对您的身体有很大的好处。”\n\n“这些日子多亏了你和你学徒们的照顾，我才能这么快恢复健康，有劳了。”希雅薇瑟靠在金绣白丝绒布料覆面的床屏上，脸上带着得体而不失轻快的笑容，略微轻点下巴，对御医表达了她的感谢。\n\n“这是老朽职责所在。”御医起身，对着希雅薇瑟鞠了一躬，他身边的学徒也连忙照做。“检查已经结束，我就不打扰殿下修养了。”在得到希雅薇瑟的准许后，他带着学徒们离开了房间。\n\n希雅薇瑟扭头看向窗外，一双灿金色的眸子中映出万里无云的蔚蓝晴空。但即便这明媚的冬日暖阳也驱散不了她心中的惊疑，三个多月前的那场几乎要了她命的刺杀的情景仍在她脑海中一遍遍地重演。而最令希雅薇瑟恐惧的是刺杀发生的场所——那可是联合王国五年一度的、象征着奥罗日亚王权的朝会，甚至刺客都是在王室法师中精挑细选出的“忠诚者”。\n\n王女闭上双眼，将自己沉浸在思索当中。毫无疑问，这场刺杀是由那些该死的共和叛徒发动的。但希雅薇瑟从未想过那些共和派分子会有这么大的能量，能够在王室法师中安插人手，甚至于堂而皇之地在朝会上发动针对国王的刺杀。每每想到这里，希雅薇瑟的身体便在恐惧的影响下微微颤抖。\n\n希雅薇瑟发现过去自己对那些共和派的看法还是太浅薄、太想当然了。为了对付这些势力盘根错杂、根深蒂固的敌人，她必须对他们有更深的了解。而要做到这点，仅仅靠阅读文献显然已经远远不够，她必须更直观地了解这群意图将奥罗日亚彻底摧毁的歹徒。或许，一次微服出访是一个不错的选择？\n\n她转头面向正在一旁侍立的贴身女仆缇娜，这个二十几岁的年轻姑娘从1997年上一个贴身女仆因背叛行为被处决后已经为她服务了两年，并用实际的行动证明了自己的可靠与能干。"
ARO.0131.a: "“缇娜，我正在计划一场巡访……”"
ARO.0132.t: "王女的寻访：格兰特子爵宅邸"
ARO.0132.d: "“请恕我直言，殿下，在我看来发生这些问题的根本原因就在于奥斯灵顿陛下对那些叛徒太过仁慈了！”哈尼斯特·格兰特子爵颇为激动地把茶杯以近乎摔打的气势拍在桌上，口中喷吐着颇为大胆的言论，而让他能敢于说出此等言论的人正是坐在他对面的，被阿斯顿亲王称为“格罗尼亚未来的栋梁”的王女希雅薇瑟·格罗尼亚。“若不是陛下多年以来的纵容，那些叛徒怎么可能发展到如此规模！”\n\n王女轻轻捻起桌上的白瓷茶杯，啜了两口杯中温热的红茶，淡淡地说道：“格兰特先生，请注意一下你的言辞，他毕竟是我的父亲，这个国家的主人。”\n\n哈尼斯特·格兰特敏感地注意到希雅薇瑟话语中的细节，王女并没有明确地反驳他的观点，只是形式上地提醒了他两句，于是他决定大胆一些：“殿下，我并不是想要指责国王陛下，只是那些共和派的叛徒太过无耻——陛下仁慈地给了他们与我们共建国家的权力，但那些狼心狗肺的家伙不但继续分裂着我们的国家，甚至三番五次地对我们的政府要员乃至陛下本人发动袭击！这次更是把手伸向了朝会，伸进了王室法师之中！这已经足以证明对这些人完全没有仁慈的必要，他们就像豺狼，对他们越仁慈，他们越觉得我们弱小，继而更激进地破坏我们的国家！”\n\n希雅薇瑟轻轻把茶杯放在桌子上，抬起头来看着格兰特的眼睛，说道：“格兰特先生，你说的这些事实我早已知晓，我策划这次微服私访就是为了更加细致地了解我们的敌人。而我在出发前先拜访你的原因，是因为之前我父亲任命包括你在内的十二人组成专案调查组以调查那次刺杀——我想详细了解一下您的工作组调查到的细节，这对我增加对那些共和派的了解有很大的帮助。”\n\n哈尼斯特·格兰特深深地叹了口气：“能有什么细节呢，殿下。我们的宫廷法师数量不超过两位数，而其中大约九成是那个能操控心灵的魔女的徒子徒孙。我们当然把这告诉了国王陛下，他只是沉默了一下，随即告诉我们可以离开了。”他摇了摇头。“然后这件事就没了下文。”\n\n希雅薇瑟再次端起茶杯，啜饮了一口已经有些凉掉的红茶，低语道：“布尔维什啊……”"
ARO.0132.a: "“……任重而道远……”"
ARO.0133.t: "王女的寻访：谋杀现场"
ARO.0133.d: "春日的清风已经吹散了林间薄薄的雾气，鸟兽们在和煦的阳光下肆意歌颂着春日的美好，若是无人提醒，恐怕没人会把这片山林和某场血腥的谋杀联系起来。\n\n但希雅薇瑟却不一样，哪怕她之前从未来过这里，也能嗅到林木间萦绕的淡淡血气。那血腥气如同一缕不甘被遗忘的哀怨一般挥散不去，仿佛在控诉一场令人发指的暴行，又像是一声难以置信的呜咽。\n\n这里是法里兰州中部的皇家保留地，艾斯克猎场，1986年“昏逸王”菲尼克斯·格罗尼亚遭遇盗猎者袭击而惨死的地点。\n\n“这里就是伯父遇害的地方吗……”王女凝视着身前的草木，从她的语气中听不出来任何感情。\n\n薛西斯那头发花白的学徒站在希雅薇瑟侧后方，突然轻声说道：“其实先皇菲尼克斯陛下并非真的昏庸，但当时时局紧迫，我们已经没有更多选择了。”\n\n希雅薇瑟的双眼一丝不动，但那金色的瞳孔似乎稍微缩了缩。“听上去你对这场谋杀了解的很多。”\n\n法师学徒停住了脚步，斟酌了下语气，随后开口。“岂止是‘很多’……策划了这场刺杀的，正是您的父亲，先皇的二弟，奥斯灵顿陛下。而且……我的导师薛西斯亦参与其中。”\n\n希雅薇瑟扭过头，紧紧地盯着法师学徒：“薛西斯会放任他的学徒散播他的秘密？“\n\n“导师有意支持您的行动，在此基础上，他不介意这些事实被您知晓。”学徒微微躬身，恭顺地说道，心里却莫名涌现出一股十分怪异的感觉——这些都是他的导师授意他告诉王女的，现在他感觉导师在和王女殿下“对眼神行事”，而自己则充当了 “眼神”的角色……\n\n王女把头转了回去，轻声叹道：“原来，您也曾施展过如此强硬的手腕。”\n\n她虽然没有明说口中的“您”是谁，但这个人的身份实在好猜。法师学徒恭顺地低下头去，按照导师的指示编织着语言：“陛下这么做也是为了拯救我们的国家，当时的局势已经容不得他们犹豫了。”\n\n希雅薇瑟没有回头，似乎在思考什么。良久，她转过身：“回去吧，这里已经没什么可看了。”"
ARO.0133.a: "“为了奥罗日亚，我也会采取一切手段，和您一样。”"
ARO.0134.d1.1: "贝尔米拉杉木家具公司，前不久刚刚在巴里斯扎下根的一家格罗尼亚企业"
ARO.0134.d1.2: "一家由格罗尼亚贵族控股的企业"
ARO.0134.t: "王女的寻访：相对的针锋"
ARO.0134.d: "在诗人们多愁善感的嘴中，巴什拉的春天宛若恬静的少女，美好而安宁，但希雅薇瑟根本无法从眼前找到与那些诗人的描述相近的景象。\n\n“你们这些格罗尼亚的吸血虫！从我们的土地上滚出去！”“这是我们祖祖辈辈生活的土地！你们这些混账没有权力染指她！”\n\n愤怒的人群聚集在一家企业工厂园区的铁栅栏门前，他们激动地呼喊着，其中不少人甚至拿着趁手的物件——石头，木棍，砖头，或是些别的什么能够随手拣到的东西——大力地抛向铁门，“咣咣”的声响不绝于耳。铁门后面的企业保安似乎对这种事已经见怪不怪，他们站在铁门后不会被砸到的地方，散漫地看着愤怒的人群徒劳地冲击着铁门。\n\n这个工厂园区属于[ARO_0134_d1]，这家企业有着巨大的影响力，以至于希雅薇瑟在王宫里都时不时能看到他们的产品。\n\n“你去问问怎么回事，两边人都问问，找工厂的人问话记得绕路。”希雅薇瑟对身边一名乔装打扮成普通农民的护卫说道。虽然她也穿着平民的服饰，但她并不打算离这场闹剧太近。\n\n得令而去的护卫很快就回来了，他用旁人听不到的声音对希雅薇瑟说：“殿下，我问了几个平民，他们告诉我的话和他们的口号基本一致，无外乎是对工厂收购地皮时采用的部分激进手段的指责，与对格罗尼亚企业的敌意。那些保安们则说这些人是‘丢了田地还养不活自己的泥腿子，只知道把罪怪在工厂上’。”他犹豫了一下，又说：“他们还说‘警察很快就会来驱散他们的，不过是一帮雷斯诺顿穷鬼。’”\n\n希雅薇瑟沉默了一下，问道：“那些保安是巴拉什本地人吗？”\n\n“不像，他们的口音听着像涅佐斯的。”\n\n王女沉默了，她原本以为这不过是一场贫富冲突，现在她却从其中看到了两个民族的对立，原本她还天真地认为在奥罗日亚的旗帜下，格罗尼亚和雷斯诺顿民族间的隔阂只发生在部分野心家之间，现在看来，这更像两个庞大无比又针锋相对相对的风暴，而在它们的对冲中受伤的只会是奥罗日亚这个整体。\n\n她看着愤怒的人群，叹了一口气：“我们走吧，去下一站，只是在这里看着一点用都没有。”"
ARO.0134.a: "希雅薇瑟的步伐又急迫了几分。"
ARO.0135.t: "王女的寻访：懦弱者难握大权"
ARO.0135.d: "“我没想到是您来了，如果有招待不周的地方还请多担待……”拘谨地坐在希雅薇瑟对面，身着华服的男人用谦卑的语气说着。他是马诺尔·雷斯诺顿，巴什拉公爵兼雷斯诺顿王国的王子，也是二人目前所在的“威尔克行宫”的主人，理论上他的身份地位和他对面的格罗尼亚王女是相同的，但此刻他的语气却卑微的像一个臣属。\n\n要是整个雷斯诺顿王室家族都是这个样子，也难怪他们会把大权交给我们——一丝冒犯的想法在希雅薇瑟脑海中闪过，随即被她压在心底。她看着眼前的男人，决定直接切入主题：“马诺尔亲王，我这次来主要是想了解一下雷斯诺顿的共和分子的发展状况——为什么他们能够如此猖狂的破坏我们的国家？”她直视着马诺尔的眼睛，几乎要把“你们是不是没有能力”几个字写在脸上。\n\n面对希雅薇瑟尖锐的提问，马诺尔陷入了局促之中：“这，这些年我们一直在打击共和分子，抓到的，判刑的，处决的都，不计其数……”他话语中明显的停顿与迟疑让希雅薇瑟觉得他的话的可信度十分值得怀疑。“但他们就是不停地冒出来……还有那个魔女，她几乎是在明目张胆地庇护那些共和分子，甚至杀掉了我们不少的宪兵，您是知道的，我们哪里敢去动她……”\n\n希雅薇瑟的眉头皱了起来。魔女，又是那个布尔维什。自从她开启这趟旅程之后，“布尔维什”这个名字快变成她最熟悉的称呼了。\n\n雷斯诺顿家的男人还在说个不停，但内容已经完全失去了营养，只有“您是了解的”“我们已经做了很多”之类的车轱辘话。那副局促的样子让希雅薇瑟之前那颇为冒犯的想法再次冒头，她无法理解为什么这样一个懦弱的家族可以执掌治理雷斯诺顿的大权。\n\n她感到来这里有些浪费时间了。\n\n“抱歉，马诺尔亲王。”她站起身，打断了男人的话语。“我想，我了解的已经差不多了。”\n\n“啊……我送您离开。”马诺尔跟着站起来。\n\n“不必了，我的亲戚。”希雅薇瑟拒绝了男人。“另外，那个魔女您不用太担心，您维持住现状就好，其他的交给我就行，我会清除对奥罗日亚不利的一切因素。”\n\n看着眼前这个坐立不安、露出讨好笑容的男人的样子，希雅薇瑟在心中补充道——"
ARO.0135.a: "包括你们这些懦弱不堪却手握大权的废物。"
ARO.0136.t: "王女的寻访：在群山之间"
ARO.0136.d: "“我来此面见安里利亚群山之主。”虽然没有穿着正式的礼裙，但希雅薇瑟依旧双手提起裙摆，向眼前这个低矮敦实、须发皆白的男人端端正正地行了一礼——此人即是奥罗日亚联合王国重要的矿石进口地安里利亚公爵领的统治者。“日安，板岩·莫瑞亚阁下。”\n\n周全的礼数有时也意味着强烈的疏离感，毕竟在希雅薇瑟的眼中，若非她父王的仁慈，小小的安里利亚早就被联合王国的军团踏平了。板岩·莫瑞亚轻易的捕捉到了公主话语中的疏离与不屑，但他作为一个附庸国的统治者，他能做的也不过只有表现一下矮人的热情好客：“哈哈哈！公主殿下远道而来，连山间回旋不息的狂风也会为联合王国的明珠而俯首！”\n\n板岩·莫瑞亚带着希雅薇瑟来到了会客厅坐下，二人简单地交流了一下各自的身体状况、天气好坏之类没营养的礼仪性话题后，希雅薇瑟很自然地以忧国忧民的语气抛出了自己来此想要与板岩交流的主要话题：“哎，虽然国家表面上繁荣而安定，但在暗处，却一直有人为了满足自己的狂妄理想试图破坏我们的国家，其中那些叫嚣着所谓共和的反贼更是嚣张，那些破坏国家安定的恐怖事件大多便出自他们之手。”\n\n“奥罗日亚共和派所制造的那些惨案让我们也十分惊诧，就连群山也会为之呜咽。”板岩·莫瑞亚的眉头一下子缩在一起，希雅薇瑟感觉自己仿佛是在俯瞰安里利亚的群峦。“所幸安里利亚的共和派并没有这般胆量，他们所作的最多不过是在报纸上或是市井中无病呻吟两句罢了。”\n\n希雅薇瑟不太相信安里利亚的共和派如此不堪，毕竟在他们重新臣服之前就已经成功改制为共和国，但她也看不出板岩·莫瑞亚是否在像那些雷斯诺顿的废物官员那样自吹自擂以掩盖自己的无能。她简单思忖了一下，最终选择了一定程度上相信莫瑞亚的话——莫瑞亚的血统为他带来了相当的声望，安里利亚近年来的平和也佐证着莫瑞亚的话并非虚言。\n\n哪怕这里的分裂势力有一定的力量，也不需要自己像看待雷斯诺顿共和派那般重视吧。"
ARO.0136.a: "皇女的心终于得到了短暂的放松。"
ARO.0137.t: "王女的寻访：光天化日"
ARO.0137.d: "“全知全能的天光之灵啊！”在一个临时搭建却备齐了其所需的全部宗教元素的祭坛上，一个就连面容都掩盖在厚重宗教长袍的兜帽阴影下的男人张开双臂，带着一点哭腔高喊着。祭坛前方人山人海地聚集着大批衣衫褴褛的农民和少部分衣着稍体面一些的地主和农场主，他们带着虔诚的神情聆听着祭坛上的男人的称颂。“您的伟力无处不在！您的恩泽哺育着世间的万物！”\n\n台下的人大多都虔诚地一句一句地跟着祭坛上的男人称颂着他们的主，伪装成小农场主及其雇农的希雅薇瑟等人则不在其列。希雅薇瑟丝毫不在乎是否会因为沉默而引起周围的信徒的怀疑，这些见识短浅的草民只顾着赞颂他们那不知所谓的天光之灵，不会在意身边人在做什么。\n\n希雅薇瑟沉默着注视着祭坛上的身影，虽然她对方对所谓的“天光之灵”近乎无上限的赞颂在她听来完全是狗屁不通，但这“拜光会传统派主教主持的丰饶祭仪”是她花了大力气才打听到的近距离了解这个邪教的机会，她只能皱着眉头听下去。最起码，祭坛上这个“传统派主教”足够虔诚——至少希雅薇瑟从未见过哪个曙光教会的神职者在念祷词时会激动到带上哭腔。\n\n冗长的赞词念诵了很长时间，希雅薇瑟感觉自己几乎可以在这里站着睡着，但祭坛上主教的下一个动作让希雅薇瑟瞬间困意全无：主教一招手，十几个穿着藤制胸甲的看着像士兵的人两两一组地把几个五花大绑的人押上了祭坛，这些人大部分面孔暗黄。还染着长期在机器前劳作产生的污垢，明显是某些工作在生产线前的工人，还有一个虽然也和那些工人一样颤栗着，但他明显比那些工人要“干净”许多，显然有一定的资产——在被绑到这里之前。这些人嘴唇不停的蠕动着，台下显然听不清他们在说什么，但根据场合也能推断出他们是在求饶。\n\n主教从长袍里掏出一把银制短剑，一个一个地划开了被绑着的人的喉咙，没有一丝迟疑。然后他虔诚地跪服于地，开始卑微地请求着一个名为“万木之主”的存在收下那些“恶贯满盈的祭品”以换取恩泽。\n\n希雅薇瑟感到头晕，恶心，想要呕吐。\n\n她并非没见过血，但是眼前的人祭——以信仰之名披上了文明外衣的野蛮行径——仍然让她产生了生理上的不适。待到希雅薇瑟抑制住恶心的感觉时，主教对“万木之主”的请求也结束了，接下来的场景让希雅薇瑟再次惊愕：悉悉索索的声音自四面八方传来，那是大范围的草木开始快速生长产生的响动，因为数量庞大使得这声音的音量也大到了足以被人耳接收。紧接着，木质摩擦的声音响起，祭坛背后的树林产生了异变，几十根粗壮的树木开始变形——它们拔起了根系，生出了面孔，成为了强壮有力的恩特树人！下一秒，希雅薇瑟的耳朵就被嘈杂的人声占据，信众们狂热的赞颂着眼前的神迹，赞颂着他们的主。\n\n希雅薇瑟感到一阵窒息，先前她以为所谓拜光会不过是一个打着信仰的名号作乱的匪帮，今天她才看到，这个教派以信仰之名掩盖的血腥行径，他们掌握的超自然力量，还有大批狂热的追随他们的愚民……"
ARO.0137.a: "这群疯子和共和派一样辄待绞杀！"
