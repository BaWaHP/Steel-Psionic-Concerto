ARO.1001.t: "就地枪决"
ARO.1001.d: "菲尔布雷夫·莱特，莱特汽车制造集团年轻的董事长结束了一天的工作，站在他位于大楼顶楼办公室的窗口，静静地看着夕阳西沉。那可爱的夕阳如同这个国家的现状一般，温暖，但又缓缓地向下坠落，无人可挡。\n\n在他的少年时代，他曾经和十几名志同道合的好友热情地探讨雷斯诺顿的未来。然而当雷斯诺顿王国的王室和格罗尼亚重组成奥罗日亚联合王国，开始大肆抓捕共和党人时，菲尔布雷夫可耻地选择了逃避——或者说，“暂避锋芒”。\n\n在这个白色恐怖时期，许多他的朋友和同志们被奥罗日亚王室逮捕、流放、驱逐、枪决，而他却躲在他从父亲那里继承来的公司的保护伞下面苟且偷生。最终只有少数几名他的朋友活过了追捕，依然在雷斯诺顿的地下活动，而他出于内疚也开始拿一部分收入和产品支援他朋友们的活动。\n\n整齐的军靴声敲碎了他的思绪。他的办公室的大门被一名奥罗日亚宪兵一脚踹开，随后几名士兵冲进了房间，拿着冲锋枪对准着他。菲尔布雷夫立刻顺从地举起双手，低下头，准备和宪兵们交涉。然而宪兵并没有给他发话的机会。\n\n“菲尔布雷夫·莱特，你涉嫌徇私枉法、串通雷斯诺顿分离主义叛匪、破坏我国领土主权完整。你的罪孽无可饶恕，你被判处死刑，立即执行，就地枪决！”\n\n在菲尔布雷夫的嘴唇还没来得及移动一毫米之前，冲锋枪射出的子弹便贯穿了他的胸膛，打碎了他身后的玻璃，他也在子弹的冲击力下向后倒去，从窗户掉了下去。\n\n在这最后的坠落中，在他即将失去意识的最后一刻，他仿佛又看到了他当年没能从宪兵的枪口下救下的恋人，艾莉卡的面庞。"
ARO.1001.a: "“艾莉卡，我来见你了。”"
ARO.1002.t: "不速之客"
ARO.1002.d: "克雷斯·奥尔利斯吹着口哨，从怀里掏出钥匙，打开了家门。他是“秃鹫”飞行器设计研究所的所长，每天领着不多不少的工资，做着不轻不重的工作，有一个贤惠的妻子和两个可爱的女儿，他对自己的生活十分满意。研究所所隶属的企业是奥斯灵顿国王的支持下建立的，因此他不用去关心任何政治相关的破事，只需要在所里蹲着读书、喝茶、管理行政就行，毕竟只要奥斯灵顿的统治没出问题研究所也不会出问题，他也能安心待在他的象牙塔里。\n\n然而一推开家门，他就看见一名穿着大衣的男子坐在他家客厅中央的沙发上，翘着二郎腿，腰间别着一把手枪；他的妻子站在一侧，一口大气都不敢出。\n\n“你这是要干什么？”奥尔利斯战战兢兢地问道。\n\n“奥尔利斯所长先生，不用担心……我只是想来告诉你一个消息。最近宪兵队正在追捕任何和共和主义者有染的人员，有一部分情节严重的甚至未经审判就被枪决了。希望你能引以为戒，好好地完成你对国家和陛下所负的责任，除此以外你什么也不用担心。”随后男子从沙发上站了起来，走出了奥尔利斯家。\n\n“天哪，克雷斯……”奥尔利斯夫人“噗通”的一声坐倒在地上，掩着脸，开始小声啜泣。奥尔利斯虽然还没从震惊中恢复，但作为一个丈夫和父亲的责任心强压着他镇定下来，前去安慰他的妻子。\n\n“我太害怕了……我太害怕了……万一他们对蕾娜和汉娜做什么事，该怎么办？”\n\n“没事的，没事的，我会想办法的。我保证我们的女儿不会受到一丝一毫的伤害。”\n\n第二天清晨，奥尔利斯拨通了他的秘书的电话。\n\n“嗯，是的，从今天开始研究所暂停设计研究工作持续一个月。这期间研究所要展开政治宣传工作，一旦发现同情共和主义运动的迹象……”"
ARO.1002.a: "“就必须追查到底，不得有一丝闪失。”"
