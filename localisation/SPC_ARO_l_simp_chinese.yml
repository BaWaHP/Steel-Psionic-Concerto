###民族精神###
ARO_winner_of_a_failure: "惨败的战胜者"
ARO_winner_of_a_failure_desc: "奥罗日亚虽然并没有直接参与到世界大战中，然而一位昏聩的皇帝，“昏逸王”菲尼克斯·格罗尼亚却在这场战争中将整个帝国葬送，使奥罗日亚的国拓十不存一，也自然丧失了帝国的国体。虽然依靠“贤安王”奥斯灵顿·奥罗日亚十余年间的不懈努力，奥罗日亚收复了雷斯诺顿王国与安里利亚公国，重建为奥罗日亚联合王国，但依然改变不了奥罗日亚在世界大战中输了个精光的事实。更糟糕的是，在紧随其后的东巴斯蒂亚大战中，奥罗日亚虽然打赢了战争，却因为沃姆帝国的临阵反水而几乎一无所获，仅仅从皮奥瑞亚那里收到了象征性的赔款，甚至本来愿意和联合王国合作的西莉迪亚共和国也爆发了共产主义革命。民间的复仇怒火已经直冲云霄，而王宫中的鹰派势力也暗流涌动……"
ARO_a_charming_setting_sun: "温暖的夕阳"
ARO_a_charming_setting_sun_desc: "“贤安王”奥斯灵顿如同一轮温暖的金色太阳一般，努力抚平奥罗日亚在世界大战、独立战争与东巴大战中的累累伤痕。然而奥斯灵顿的奉献并不能挽回奥罗日亚山河日下的局面，他只能努力维持好国内各个派系之间的均衡，而奥罗日亚变得暮气沉沉。"
ARO_issue_of_Glonian_warmonger_dynamic_modifier: "格罗尼亚主战派问题"
ARO_issue_of_Glonian_warmonger_dynamic_modifier_desc: "虽然“贤安王”奥斯灵顿成功和平处理了雷斯诺顿王国与安里利亚公国的独立问题，但是许多格罗尼亚的民族主义者对此并不买账。这些人认为奥斯灵顿在面对分离主义者时展现出的姿态太过软弱，没有震慑住这些叛匪，还没从东巴斯蒂亚大战中拿到一点好处，让国家变成了现在这样暮气沉沉的惨状。最要命的是，奥罗日亚国民军队的部分高层、甚至奥斯灵顿的弟弟阿斯顿亲王也坚定支持这个派系，这导致这个派系的问题异常难以解决。"
ARO_issue_of_Lesnoden_republican_dynamic_modifier: "雷斯诺顿共和派问题"
ARO_issue_of_Lesnoden_republican_dynamic_modifier_desc: "在世界大战结束后，雷斯诺顿王国也脱离了奥罗日亚帝国，短暂地成为了一个独立王国。但雷斯诺顿王国的共和派由于受西莉迪亚和南巴斯蒂亚的影响深厚，因此也拥有着强大的力量和庞大的野心，已经蠢蠢欲动准备效仿皮奥瑞亚和西莉迪亚发动革命。面对着革命的威胁，雷斯诺顿王室与格罗尼亚再次紧紧团结在了一起，组建了奥罗日亚联合王国——相当于雷斯诺顿重新对格罗尼亚家族俯首称臣。在奥罗日亚重组后，共和革命的火焰立刻被浇上了一盆冷水，然而共和派的势力依然庞大，并非一朝一夕可以解决的问题。"
ARO_issue_of_Aurora_cultist_dynamic_modifier: "“拜光会”问题"
ARO_issue_of_Aurora_cultist_dynamic_modifier_desc: "“拜光会”的前身是在奥罗日亚民间有着深厚文化传统与信仰历史的“奥罗拉会”，这个修会强调人类与自然的和平相处，主张重农主义，并且通过巫祝仪式来向天光之灵乞求来年的好收成。1556年，蒸汽机被引入了奥罗日亚，随后工业革命便迅速席卷了整个东巴斯蒂亚，工厂里不断排出的黑烟将天空染成了暗褐色，降下来的雨水会杀死作物和牲畜……受灾最严重是马德南平原，这片三面环山的地区无法及时将废气排出，而此地区广泛存在的信仰奥罗拉会的农民们也因此怒不可遏，建立了更加极端的拜光会。\n\n拜光会主张摧毁任何对自然污染严重的工厂，以避免遭到天光之灵的惩罚。在拜光会建立之初，它便掀起了好几次烧毁工厂、砸毁机器的运动。经过三百多年的发展后，拜光会已经完全取代了原本的奥罗拉会，在马德南平原建立了坚实的民众基础，并抓住了奥罗日亚帝国解体的机会组建了其自己的武装神官部队，已经基本实际上独立。控制了联合王国如今两大粮仓之一的拜光会拒绝接受任何现代化农业生产方式，坚持使用着传统的巫祝仪式，因此需要大量的农民来维护耕地。拜光会的势力根深蒂固，并非一朝一夕可以解决的问题。"
ARO_full_scale_political_panic: "人心惶惶"
ARO_full_scale_political_panic_desc: "在联合王国五年一度的朝会上，在王国几乎所有实权大员与高阶贵族面前，在奥罗日亚王宫中安保最严密的地方，在数十个媒体不断拍摄的镜头下，国王奥斯灵顿·格罗尼亚遭到了刺杀，王储希雅薇瑟重伤昏迷。虽然奥斯灵顿的身体健康暂时无碍，但这一事件意味着奥罗日亚的内斗彻底撕破了脸，而国王的权威再也镇不住某些反对派的行动了。"
ARO_industrial_blueprint_dynamic_modifier: "工业蓝图"
ARO_industrial_blueprint_dynamic_modifier_desc: "我们准备重新建设一个新的工业体系，而我们向这个计划中分配越多的人力物力，我们的工业建设也会变得更快更好。"
ARO_a_priest_per_company: "教会支部建在连上"
ARO_a_priest_per_company_desc: "战争是苦难的集合——死亡、伤病与杀戮无时无刻不伴随着这些可怜的士兵们。尽管信仰的慰藉无法消除这些苦难本身，但能让士兵们更能够接受这些苦难，而这就是在每个连里都渗透进一名奥罗拉牧师的意义。"
ARO_reclaim_dawn_church: "重启曙光教会"
ARO_reclaim_dawn_church_desc: "曙光教会虽然是奥罗日亚的原生宗教，但在奥罗日亚的帝国时期却曾经遭到长期的限制。如今为了对抗南方的拜光会异端，奥罗日亚王室再次开始赋予曙光教会一些形式上的特权。"
ARO_struggle_of_religion: "§0教派斗争§!"

###内阁###
ARO_Fareblave_Leight: "菲尔布雷夫·莱特"
ARO_Fareblave_Leight_desc: "在奥罗日亚帝国解体时，菲尔布雷夫·莱特是一名情绪激昂、愿意挺身而出保卫祖国的热血青年——不过他的祖国是雷斯诺顿。那热血激荡的五年间，他每天都在地下的政治沙龙和他的朋友们激烈地讨论哪种意识形态能够为雷斯诺顿带来光明的未来，而他也在一次次交锋中成为了一名坚定的自由主义者。然而雷斯诺顿王室却轻易将国家卖给了格罗尼亚人，菲尔布雷夫也不得不收起他的野心，磨平了棱角，回去继承了他父亲留给他的家业——莱特汽车制造集团。但在这几年间，菲尔布雷夫一直在暗中接济、支援他的自由主义同志们，韬光养晦，积蓄力量，为下一次机会做准备。"
ARO_Halifax_Kimmel: "哈利法克斯·基梅尔"
ARO_Halifax_Kimmel_desc: "自三百年前以来，基梅尔家族便是帝都格罗尼亚的豪门之一，在皮奥瑞亚、西莉迪亚持有着诸多地产。然而世界大战带来的奥罗日亚帝国解体让基梅尔家族在哈利法克斯·基梅尔这一代失去了几乎一切，他的财产瞬间只剩下了在格罗尼亚城里的几套宅邸。愤怒的他变卖了宅邸，在“贤安王”奥斯灵顿的默许下组建了名为“黑衫宪兵”的一支私兵，并依托这支私兵开始在格罗尼亚拉拢人心、进行复仇宣传。在他的帮助下，贤安王也成功建立了一支足够强大的国民军队。可正当他以为反攻即将开始的时候，他的“黑衫宪兵”却突然遭到了正牌宪兵的清洗，下层被打散收编，上层几乎全都被抓进了监狱，只有哈利法克斯本人因为自己的声望和家族的威望幸免于难。正在这时，刚刚归国的阿斯顿向他伸出了援手，允许了他继续进行宣传活动，并为他提供了不薄的资助。哈利法克斯将阿斯顿的恩情牢记于心，他所忠诚的对象也从奥斯灵顿变为了阿斯顿。"
ARO_Delius_Dover: "德利乌斯·多佛"
ARO_Delius_Dover_desc: "德利乌斯·多佛出身于皮奥瑞亚王国伯克涵省的一个小镇，是一对农民夫妇的幺子。如果不是因为在世界大战爆发前阴差阳错地被格罗尼亚大学的一名导师破格录取，那么估计他早就和他那些应征入伍的同乡们一起在北方被一只超级魔兽的火焰魔法给烧成焦炭了。\n在格罗尼亚大学，他一步一步脚踏实地，缓慢又坚定地往上升，最后终于进入了帝国宰相茨威格的智库团队中，为他出谋划策。然而茨威格和智库团队没能阻止经济崩溃，茨威格不堪屈辱自尽，而德利乌斯也丢掉了工作。不过好在之前的人际关系并没有受太大影响，德利乌斯回归学术圈的过程也没受到太大的阻碍。当然，他依然在为奥罗日亚干实事，努力推进奥罗日亚的教育事业。毕竟他是农民的孩子，而农民懂得一分耕耘一分收获的道理。"
ARO_Cheng_Yulu: "“校长”程宇陆"
ARO_Cheng_Yulu_desc: "出身皮奥瑞亚的程宇陆曾经是奥罗日亚帝国银行的四个副行长之一，他被认为最有可能接任下任行长的有力竞争者。然而在经济危机爆发后帝国银行破产、倒闭，随后帝国本身也解体了，他也就丢了工作。在他的老朋友，昂达克州长的接济下，他就任了昂达克大学的校长，继续在格罗尼亚的经济体系里发光发热。1996年，他又被奥斯灵顿重新起用，就任了奥罗日亚王国银行的行长。“人生真是太奇妙了。”程宇陆常常这样感叹。"
ARO_Granerl_Suth: "格兰厄尔·苏斯"
ARO_Granerl_Suth_desc: "人常说，“忠诚不绝对，便等于绝对不忠诚。”不过这句金玉良言对于格兰厄尔·苏斯来说似乎并不适用。在帝国解体前，格兰厄尔·苏斯便担任了多年昂达克市的市长，并在帝国解体前夕利用一批被他煽动的年轻共和主义者除掉了当时的昂达克州长，成功上位。\n本来在这时，他应当彻底清除掉自己与共和主义者们的任何联系的。但帝国解体带来的冲击浪潮使得他不得不维持这条与雷斯诺顿共和派勾结的纽带，而“贤安王”奥斯灵顿对于安抚共和主义者的需求使这条纽带在他身上越缠越深。如今，他已经成为奥罗日亚帝国境内的一条滑溜溜的八爪鱼，在各派中都有若即若离的根基。"
Andarc_octupus: "昂达克的八爪鱼"
ARO_Cellyn_Tira: "西琳·缇拉"
ARO_Cellyn_Tira_desc: "1945年，23岁的西琳·缇拉在她居住的小山村中建立了一个信奉天光的小教派。这个小教派在接下来的40年间逐渐和马德南平原与维尔日山脉中其他崇拜奥罗拉的教派合并、整合，变成了“拜光会”这个庞然大物，最终趁着奥罗日亚帝国解体的危机一举起兵，在马德南平原夺取了巨大的影响力。西琳·缇拉作为教派中资历最老的成员之一，也被拜光会的成员传颂为“维尔日的圣女”。然而再高的名望也抵不过岁月的摧残，西琳·缇拉早已年老体衰，因此她更多是被拜光会的传统派当做一个崇拜符号，而非真正的领袖。"
the_saint_of_Verjie: "维尔日的圣女"
ARO_Mans_Dorn: "曼斯·多恩"
ARO_Mans_Dorn_desc: "30年前，曼斯·多恩只是拜光会的一名普通的修士，在马德南平原上的一个边陲小镇郊外的修道院修习奥罗拉之道。奥罗拉，天光之灵——或者说某种以当下科学研究还无法解释的超自然规律——确实偶尔会对这些信徒们虔诚的巫祝仪式予以反馈，让树木拔地而起去祓除那些邪恶的工厂里盘踞的可憎恶魔，“工厂主”们，并净化马德南平原那已经被工业废水严重污染的环境。虽然这种巫祝仪式大多数时候会失败，但曼斯·多恩相信自己只要孜孜不倦地修习奥罗拉之道，那么总有一天拜光会将会可以稳定地进行仪式。在30年过去后，他已经成为了整个拜光会的至高主教之一，而他依然在求道之路上努力钻研。"
ruthless_Aurora_bishop: "冷酷奥罗拉主教"
ARO_Davin_Colnick: "“响尾蛇”戴文·柯尼克"
ARO_Davin_Colnick_desc: "戴文·柯尼克在进入奥罗日亚的情报系统以前是“奥罗热耶斯荣耀军团”护送回国的一名外贸商人，一名在混乱的北大陆刀尖舔血的“淘金客”。虽然靠着丰厚的财力、不俗的身手、坚毅的精神与毫无保留的狡诈，他成功回到了奥罗日亚帝国，但他在北大陆运营了十几年的产业毫无疑问地毁于一旦。不过幸运的是，在“铁血少将”赫尔曼·希斯林的举荐下他被新王奥斯灵顿选中担任了王国情报局的秘书长。\n在情报系统内，戴文·柯尼克展现出了他卓越的管理天赋。在他的管辖下，奥罗日亚的情报网络被成倍地扩大，虽然为了情报网的广度他在某些人事管辖的方面上降低了标准，但是能像他一般长袖善舞的特务管理人员在整个奥罗日亚的市民阶级可能都找不出第二个。"
ARO_masterful_puppeteer: "操偶大师"
ARO_Xerxes: "“混乱导师”薛西斯"
ARO_Xerxes_desc: "“混乱导师”薛西斯是一名强大的施法者，同时也是阿斯顿·格罗尼亚的心腹之一。大约六百年前，薛西斯由于他出色的天赋而被斯里卡的魔女玛莉斯·布尔维什收为学徒，并在她那里修习了操纵心灵的法术。然而由于玛莉斯·布尔维什一直拒绝教授他不老的秘诀，师徒之间逐渐出现了嫌隙。最终，薛西斯窃取了不完整的永生秘法，并利用其中的知识将自己改造成了几乎失去了理智的怪物。\n虽然薛西斯几乎彻底陷入疯狂，但经过他六百年间的努力与研究，他现在已经能够维持着理智为王室做顾问了。他现在唯一的目标便是从玛莉斯·布尔维什那里获得完整的秘术。然而虽然他能利用心灵法术随意从他人的心智中窃取思想，但他却完全拿他的老师没有办法——师徒二人的法术自然同源，虽然薛西斯在心灵的方面上付出了更多的精力去钻研，但魔女却能依靠庞大的魔力维持极为强劲的心灵防护。除非薛西斯能在他人将魔女的魔力几乎消耗殆尽的同时发动他的法术，否则他没有任何机会攻破他曾经老师的防御。"
