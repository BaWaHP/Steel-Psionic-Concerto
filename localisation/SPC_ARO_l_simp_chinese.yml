ARO_Walls_Buck: "沃尔斯·巴克"
ARO_compressed_steel_hammer: "锻钢重锤"
ARO_compressed_steel_hammer_desc: "§L这位指挥官擅长指挥重型泰坦部队撕开敌人的防御，破坏他们想要守护的事物。§!"
ARO_all_limbs_amputated: "四肢残废"
ARO_all_limbs_amputated_desc: "§L这位指挥官的四肢均已残废，只能坐在轮椅上靠嘴指挥。§!"
Auroreyetian_honour: "奥罗热耶斯的荣耀"
Auroreyetian_honour_desc: "§L这位曾经带领“奥罗热耶斯荣耀军团”走出北大陆的指挥官擅长在弹尽粮绝的绝境中寻找求生的机会。§!"
ARO_ageless_witch: "不衰的魔女"
ARO_ageless_witch_desc: "§L由于某种未知的魔法力量作祟，这位女性指挥官的年龄是个谜团，但她拥有丰富的指挥大量魔法师协同作战的经验。§!"
ARO_endless_hunt: "永恒追猎"
ARO_endless_hunt_desc: "§L这名指挥官数十年来一直从未停歇地追杀着他的死敌。在这一追猎过程中，他掌握了丰富的指挥精锐近战士兵作战的经验。§!"

