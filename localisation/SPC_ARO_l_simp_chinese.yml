ARO_maraud_from_Lesnoden_desc: "雷斯诺顿的一小撮叛匪在奥罗日亚帝国解体后试图脱离奥罗日亚独立，这种滔天的罪行无可赦免。然而奥罗日亚国王在收归雷斯诺顿王国后一直没有出手惩罚这些叛徒，任由他们继续逍遥法外，利用雷斯诺顿的工业设施做他们活动的后盾。既然国王不做，那么我们就自己来做——惩罚这些宵小之徒的时候到了。\n\n掠夺所得资源：[?ARO_marauded_resources]\n掠夺队数量：[?ARO_marauded_squads]"

