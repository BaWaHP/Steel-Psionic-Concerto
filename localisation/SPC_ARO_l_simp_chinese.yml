ARO_dawn_church_state_84_desc: "§Y斯里卡§!\n“不衰的魔女”布尔维什的老巢，布满了无边无际的美丽山林"
ARO_dawn_church_state_85_desc: "§Y安里利亚§!\n莫瑞亚家族带领的流亡矮人建立的国度，将山脉掏空建成的地下王国"
ARO_dawn_church_state_86_desc: "§Y塞维尔§!\n雷斯诺顿北部的贫穷边境州，直面着来自希卡博尔的寒风"

