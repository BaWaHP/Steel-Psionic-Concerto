ARO_dawn_church: "曙光教廷"
ARO_dawn_church_desc: "1067年，提特兰难民领袖希雅薇瑟·格罗尼亚带领的难民队伍在现今的康诺尔城附近扎下了根。1085年，时年59岁的希雅薇瑟·格罗尼亚战胜了她所有的敌人，将散布在奥罗日亚的大部分提特兰流亡者重新统一，建立了格罗尼亚王国，并重建了教会。据说当时希雅薇瑟女王和克利乌斯大主教在科纳琴的森林中祷告时听到了光明神的启示，随后女王和大主教合撰了《林之书》以记述这次珍贵的神启，并依照神启将教会改制为曙光教会。\n\n曙光教会在建立之初享有着相当大的世俗权力，但随着东巴斯蒂亚工业革命的开始，以及在某些不满教会的贵族默许下的南巴斯蒂亚思想的传播，曙光教会的教义愈发与世俗世界脱节。最终，曙光教会的特权被奥罗日亚皇室一一剥夺，而随着资产阶级革命的爆发，曙光教会的棺材板上最后一颗钉子也被打下，事到如今只有少数格罗尼亚人还虔诚地信仰曙光教。\n\n不过为了对抗越来越极端的拜光会信徒，奥罗日亚重新回头转向曙光教徒们寻求帮助。王室承诺向曙光教廷倾斜更多的资源，赐予更多的特权，而相应地，曙光教廷也需要用他们的手段来解决马德南的拜光会信徒——不管通过什么方式。\n\n§Y[?ARO_dc_state_selected.GetName]§!曙光教会的状况：\n$ARO_influence_dawn_faith$: [?ARO_dc_state_selected:ARO_influence_dawn_faith][ARO_dawn_church_desc_select]"
