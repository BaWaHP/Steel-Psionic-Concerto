ARO.1101.t: "握手"
ARO.1101.d: "“就在刚刚，莱特汽车制造集团的董事长菲尔布雷夫·莱特和贝尔米拉杉木家具公司总裁林顿·塞恩共同出席了位于巴里斯城近郊新工业园区的剪彩仪式。会议上，两位宣布了接下来在新工业园区中的建设计划，并且……”\n\n菲尔布雷夫·莱特没有理会下面记者的呱噪声，而是在默默地思考。毫无疑问，奥斯灵顿·格罗尼亚和他所代表的奥罗日亚政府正在努力弥合格罗尼亚和雷斯诺顿两国之间的分歧，这也是为什么他能够拿到最新的一笔大额投资，并且站在这里和格罗尼亚的家具业寡头一起参加剪彩仪式的原因。然而只要雷斯诺顿的共和主义者还在活动，他就永远不会真正站在格罗尼亚那边。\n\n“巴里斯城西边就是巴什拉大森林，这里有着整个奥罗日亚最优良的杉木林。以前，这里出产的木材需要跨越半个奥罗日亚，经由巴里斯、格罗尼亚和昂达克，才能运抵我们位于弗农的工厂，而如果想要卖给雷斯诺顿的顾客还需要沿着相反的路线再走一遍。但是这种状况很快就不会继续存在了，因为贝尔米拉杉木家具公司在这里建立新的家具工厂后，木材运输所花的时间将不到原来的十分之一！”\n\n林顿·塞恩装作情绪激昂的样子，在公众面前慷慨陈词。他其实并不想把工厂开到雷斯诺顿来，因为如果真的在巴里斯有工厂那么他以前一贯当做抬价借口的“运输成本问题”将不复存在，贝尔米拉产品的过度溢价就会显得更加明显。但是在背后一直支持他的贵族这次一反往常地要求他参与这个计划。虽然不知道那个贵族有什么企图，但他压根没得选。\n\n随后，按照程序，两人转身相面。菲尔布雷夫先抬起了手，随后林顿·塞恩握住了菲尔布雷夫的手掌，重重地摇了摇。"
ARO.1101.a: "“这是我们这个时代的繁荣！”"
ARO.1102.t: "这是什么？（上）"
ARO.1102.d: "“奥罗日亚骄傲的人民们，我对你们怀有无比真挚的热爱与信任！虽然我无法恳求你们以相同的信任回报我，但还是请你们听我说几句话！”\n\n哈利法克斯·基梅尔站在格罗尼亚城的帝国广场的中央，站在一辆军绿色喷漆的卡车顶上，用力挥舞着手臂，亢奋异常。他的演讲聚集了许多群众驻足，虽然大部分都是来看个热闹的，但是正是一次又一次不断的努力才让他获取了诸多民众的支持，从一个落魄的贵族末裔走到了如今的位置。\n\n“我们的祖国，奥罗日亚帝国，曾经是整个东巴斯蒂亚最为强大的国家！沃姆、吉拉尼亚、皮奥瑞亚、西莉迪亚都臣服于我们，就连远乡也对我们忌惮三分！”\n\n事实上，他的人生绝对说不上一帆风顺，伴随着多次起起落落。在奥罗日亚帝国尚存在的时期，他曾是一名继承大量家族产业的纨绔子弟，整天在格罗尼亚帝都花天酒地地享乐，但如同暴风雨般袭来的独立风暴将与他类似的在皮奥瑞亚、西莉迪亚持有大量产业的贵族家族们粉碎成了齑粉。但他不同于大部分一蹶不振的末代贵族，决心用自己的双手为自己攫取更多的利益。\n\n“然而我们的帝国被一群叛徒给撕成了碎片！此等耻辱，任何爱着这个国家的人都无可容忍！爱国者们，团结起来，行动起来！”\n\n在解体后的五年间，他便已经依靠强大的口才煽动了大量的王都年轻人加入“光复帝国”的事业中。他变卖了最后的财产，从七河联邦购买军火，组建了一支叫“黑衫宪兵”的部队——这些都是在奥斯灵顿·格罗尼亚的默许下进行的。奥斯灵顿需要他来收拢人心、以及干一些脏活，而哈利法克斯也需要奥斯灵顿的帮助来进行更广泛的活动。"
ARO.1102.a: "哈利法克斯清了清嗓子，继续了他的演讲。"
ARO.1103.t: "这是什么？（下）"
ARO.1103.d: "“我们最急需要做的，就是扫清奥罗日亚国内的部分叛党！在雷斯诺顿，还有一群可耻的共和主义者，他们依然想着分裂我们的国家，许多贵族都受其蛊惑！”\n\n然而当格罗尼亚的国民军队组建完成，哈利法克斯已经跃跃欲试、准备投身于这场伟大的战争时，他却突然遭到了贤安王的背叛。正牌的格罗尼亚宪兵一个个踹开了黑衫宪兵上层领导的家门，将他们以“参与颠覆活动”为由抓进了监狱，而普通黑衫宪兵下层成员则被国民军队收编，并打散分散到了各个部队中。\n\n“奥罗日亚的兄弟姊妹们！联合起来，加入神圣的斗争事业中！我们终有一日能够光复帝国的版图，而到那时自然不会有宵小之徒敢惹我们，骄傲的奥罗日亚人民！”\n\n但命运之神眷顾了他。从沃姆归国的阿斯顿·格罗尼亚亲王看中了他的观点和影响力，庇护了他的行动，并给他提供资金让他继续效力。从此哈利法克斯便坚定地站在阿斯顿的一边，绝对忠诚，无论阿斯顿要他做什么，他都百依百顺。\n\n在他激动地完成了演讲后，他从卡车尾部的梯子爬下来，整理了一下仪容。按照惯例，台下会有许多人向他所在的卡车的车厢里放置捐赠的物资。\n\n“这是我一个月的工资，希望能帮到你们。”\n“这是我花了七天缝好的十套军服。”\n……\n\n在他满意地接下了许多物资后，人潮已经基本散去。这时候，一名衣着褴褛的小女孩也捧着一个很大的粗麻布包裹走了过来，想要递给哈利法克斯。哈利法克斯的保镖拦住了他，但是哈利法克斯挥挥手，让保镖们放她过来。\n\n“这是什么？”一向露出亲民姿态的哈利法克斯弯下腰，露出微笑，亲切地问道。"
ARO.1103.a: "“这是共和主义者送上的炸弹。”"


###领导人###
ARO_Authrinton_Glonia: "奥斯灵顿·格罗尼亚"
ARO_Authrinton_Glonia_desc: "奥斯灵顿·格罗尼亚拥有一个幸福美满的童年。他出生在奥罗日亚帝国的皇室中，是皇帝的次子，有一个一直带着他胡闹的长兄和一个可爱的弟弟。在他父亲驾崩后他的哥哥菲尼克斯即为成为新的奥罗日亚皇帝，而他也成为了“奥斯灵顿亲王”。在那之后便每况愈下——菲尼克斯统治下的奥罗日亚被拖入了世界大战的泥潭，而满心享乐的昏逸王完全不闻不问战事，在皇家金库和民间资本因为对第二次北进运动的投资血本无归而陷入危机时，他却跑到了法里斯兰的山林里度假去了。由于缺乏来自皇室的支持，议会来不及举行紧急措施，奥罗日亚陷入了一场末日级别的经济崩溃，帝国也四分五裂。\n\n§R面对崩溃的国家、流离失所的百姓、离心离德的军队与仍然毫无责任心的菲尼克斯，奥斯灵顿终于忍无可忍。§!在一次皇家东狩中，一名“盗猎者”一枪打穿了菲尼克斯的脑袋，随后被皇家护卫乱枪打成碎肉——这是一场由奥斯灵顿精心策划的谋杀。随后，奥斯灵顿继承了王位，重新巩固了王室的权威，用和平手段解决了雷斯诺顿王国与安里利亚公国的独立问题，重组了奥罗日亚联合王国。性格温和的他也因此获得了“贤安王”的称号，颇受人民的爱戴。\n\n不过，奥斯灵顿的统治中还有一个严重的错误——他受主战派的影响，与沃姆帝国联合发动了东巴斯蒂亚大战，并遭到沃姆帝国的背叛，除了一点象征性的赔款以外没能拿到一丝一毫的利益。"
king_of_virtue_n_peace: "“贤安王”"
ARO_Arthytton_Glonia: "阿斯顿·格罗尼亚"
ARO_Arthytton_Glonia_desc: "阿斯顿·格罗尼亚是“贤安王”奥斯灵顿唯一的弟弟。在世界大战期间，他被他的长兄菲尼克斯送往尚未独立的沃姆王国的宫廷，准备与露易丝·玛丽·伊丽莎白公主完婚。但当奥罗日亚帝国陷入地狱般的经济危机后沃姆王国的王室便宣布了独立，并将他扣押在沃姆宫廷中作为廷臣和人质。\n1991年，奥斯灵顿完成了和沃姆的谈判，而阿斯顿也终于结束了他长达五年的人质生涯，被沃姆方面释放回格罗尼亚。然而在沃姆宫廷屈辱的年岁彻底改变了这位曾经天真善良的亲王的性格。阿斯顿变得冷血、多疑、难以捉摸，并且带着刻骨的、不加掩饰的民族主义与复仇主义。他靠着巧舌如簧的话术与在沃姆的生存经验在宫廷中重建了一支自己的势力，以同他相似的鹰派贵族为主。"
ARO_Arthytton_Glonia_desc_long: "阿斯顿·格罗尼亚是“贤安王”奥斯灵顿唯一的弟弟。在世界大战期间，他被他的长兄菲尼克斯送往尚未独立的沃姆王国的宫廷，准备与露易丝·玛丽·伊丽莎白公主完婚。但当奥罗日亚帝国陷入地狱般的经济危机后沃姆王国的王室便宣布了独立，撕毁了婚约，并将他扣押在沃姆宫廷中作为廷臣和人质。\n1991年，奥斯灵顿完成了和沃姆的谈判，而阿斯顿也终于结束了他长达五年的人质生涯，被沃姆方面释放回格罗尼亚。然而在沃姆宫廷屈辱的年岁彻底改变了这位曾经天真善良的亲王的性格。阿斯顿变得冷血、多疑、难以捉摸，并且带着刻骨的、不加掩饰的民族主义与复仇主义。他靠着巧舌如簧的话术与在沃姆的生存经验在宫廷中重建了一支自己的势力，以同他相似的鹰派贵族为主。一开始阿斯顿试图通过自己的派系影响奥斯灵顿的政策，让他对帝国的叛匪重拳出击，然而奥斯灵顿虽然性格温和，但他却绝不退让。在奥斯灵顿这里碰钉子后，阿斯顿换了个思路——如果改变不了奥斯灵顿，那就改变他年幼懵懂的女儿希雅薇瑟。在他的诱导下，希雅薇瑟也变成了一个和他一样狂热的民族主义者。\n最终阿斯顿和希雅薇瑟公主策动了一场血腥的宫廷政变，将“贤安王”奥斯灵顿逮捕入狱，并处决了大部分不愿意服从于她的家臣。在希雅薇瑟即位后，阿斯顿赢得了与希雅薇瑟之间的权力斗争，作为摄政王“代理”希雅薇瑟进行统治。现在他终于可以不受约束地大展宏图了。"
ARO_Syawither_Glonia: "希雅薇瑟·格罗尼亚三世"
ARO_Syawither_Glonia_desc: "希雅薇瑟·格罗尼亚是“贤安王”奥斯灵顿的独生女，在她出生后不久她的母亲便死于产褥热。在她六岁时，她的父亲奥斯灵顿亲王继承了格罗尼亚王国的王位，随后便投身于王国无穷无尽的繁重政务中，每天都要在全国上下各地游走，几周才能来女儿所住的别宫中见她一面。因此希雅薇瑟从小便缺乏父母的关爱，日常只与女仆、家庭教师等家臣相处。\n五年后，阿斯顿亲王结束了在沃姆帝国宫廷做人质的日子，回到了格罗尼亚，并迅速与希雅薇瑟公主成为了好朋友。希雅薇瑟十分享受这位亲王从沃姆带回来的异域故事，每天都要缠着“阿斯顿叔叔”给她讲他在沃姆的见闻，而阿斯顿则趁机向希雅薇瑟分享了许多额外的东西——比如说奥罗日亚帝国解体的耻辱记忆、对于“贤安王”对分离主义叛匪怀柔政策的不满、以及作为皇室成员面对平民高高在上的傲慢态度。渐渐地，希雅薇瑟对奥斯灵顿变得疏远，而她也没能和阿斯顿亲王建立足够的信赖关系。\n最终希雅薇瑟和阿斯顿亲王策动了一场血腥的宫廷政变，将“贤安王”奥斯灵顿逮捕入狱，并处决了大部分不愿意服从于她的家臣。现在她继承了奥斯灵顿的王位，成为了格罗尼亚家族第三位名为希雅薇瑟的女性统治者。"
lovethirst_empress: "缺爱的女皇"

###决议###
ARO_Auroretia_internal_crisis: "奥罗日亚内部危机"
ARO_Auroretia_internal_crisis_desc: "“贤安王”奥斯灵顿虽然依靠个人威望和交涉能力将奥罗日亚重新黏合在了一起，但这一状况并不具有可持续性。雷斯诺顿的共和派、马德南平原的“拜光会”与愤怒的民族主义者们都对于奥罗日亚的政策有着相互冲突的要求。如果奥罗日亚无法满足他们的要求，那么他们就会以对于奥罗日亚展开破坏行动、或者摆出更加极端的姿态。\n奥罗日亚内部斗争的吉列程度：[ARO_internal_tense_level]([?ARO_internal_tense])\n\n§R主战派§!的满意度：[ARO_satisfaction_warmongers_loc]([?ARO_satisfaction_warmongers|1])\n§B共和派§!的满意度：[ARO_satisfaction_republicans_loc]([?ARO_satisfaction_republicans|1])\n§0拜光会§!的满意度：[ARO_satisfaction_cultists_loc]([?ARO_satisfaction_cultists|1])\n\n§R主战派§!的支持度：[ARO_popularity_warmongers_loc]([?ARO_popularity_warmongers|1])\n§B共和派§!的支持度：[ARO_popularity_republicans_loc]([?ARO_popularity_republicans|1])\n§0拜光会§!的支持度：[ARO_popularity_cultists_loc]([?ARO_popularity_cultists|1])"

