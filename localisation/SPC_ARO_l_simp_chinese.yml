###企业###

###将领###
ARO_Adam_Mace: "“重锤”亚当·梅斯"
ARO_Adam_Mace_desc: "亚当·梅斯是一名异常残暴嗜血的指挥官。在东巴斯蒂亚大战期间，他曾经驾驶一台轻装泰坦深入敌后，摧毁了大量的皮奥瑞亚村庄，并且每次都能在皮奥瑞亚军队的围剿到来前如同蟒蛇出洞一般迅速撤退，他也因此获得了晋升，成为了一名泰坦部队指挥官。果不其然，指挥泰坦部队的他如同一柄锻钢铁锤一般极为擅长撕开敌人的防线。然而他有一个坏习惯：他常常开着泰坦亲自跑到前线的控制区“侦查”——也就是屠杀当地居民。这个坏习惯最终害了他，在东巴大战即将结束时他驾驶的泰坦挨了一发重炮炮弹，他的四肢都被烧到了必须截肢的程度。然而即便需要坐在轮椅上，亚当·梅斯的指挥经验依旧适用。"
ARO_Herman_Heathrin: "“铁血少将”赫尔曼·希斯林"
ARO_Herman_Heathrin_desc: "1970年，赫尔曼·希斯林在从军校毕业后便被编入了一支名为“奥罗热耶斯荣耀军团”的特遣部队担任营长参谋，保护滞留于北巴斯蒂亚的奥罗日亚侨民归国。然而由于国王菲尼克斯完全没有过问任何有关的事务，这支部队的后勤与人员管理几乎完全是由帝国宰相茨威格用自己的私产在一手操办，因此这支军团不论是训练度、人员数量还是装备都远远低于“足够”的标准。而北方魔兽的攻势又远比奥罗日亚人想象中的要猛烈，因此荣耀军团在刚刚抵达北巴斯蒂亚后便遭遇了一场来自魔兽的伏击，高阶军官几乎全灭，而赫尔曼·希斯林作为此时幸存的最高级军官，便接任了军团长一职。\n此后，赫尔曼·希斯林迅速展现出了他的军事才能。他立刻重组了军团，收缴了侨民们的大部分财产，一路上利用这些财产雇佣、收买各类人士，在北大陆的严冬中面对魔兽军队的攻势一边作战一边撤退，最终将大部分侨民成功地带回了中巴斯蒂亚境内的安全区，不负“奥罗热耶斯荣耀军团”之名。赫尔曼·希斯林也因此被破格升为少校军衔，并在奥斯灵顿·格罗尼亚继承王位后又获得了迅速的晋升。"
ARO_Marlith_Borwisch: "“魔女”玛莉斯·布尔维什"
ARO_Marlith_Borwisch_desc: "玛莉斯·布尔维什是一名神秘而强大的女士，没人知道她到底活了多久，没人知道她到底将自己的内在改造成了何种程度，更没人清楚她到底知晓多少种禁断的秘术。传说中，希雅薇瑟一世曾经在斯里卡的山林中与玛莉斯·布尔维什达成了一份契约——布尔维什为奥罗日亚的王冠效力，而格罗尼亚家族必须庇护斯里卡的人民不受侵害。这份契约已经存续了上千年，并且在奥罗日亚已经分崩离析的今日依然有效。事实上，据说在雷斯诺顿王国与格罗尼亚王国的重新联合中，她也起到了重要的作用。"
ARO_Herez_Delint: "“猎巫人”赫雷兹·德林特"
ARO_Herez_Delint_desc: "人们都说赫雷兹·德林特是一个怪人——他永远穿着一身不合身的旧皮甲，背着一把一米多长的重弩，带领着一支冒险者小队在斯里卡的山林中巡猎。事实上，赫雷兹一直在追杀他的杀父仇人——“不衰的魔女”玛莉斯·布尔维什。\n赫雷兹·德林特是末代斯里卡公爵的次子。那位野心勃勃的公爵在世界大战期间为了维持公爵领财政的稳定，对斯里卡的人民采取了过于激进的手段。在一个平静的夜晚，玛莉斯·布尔维什“拜访”了这位公爵的庄园，将他的脑袋炸成了碎片。赫雷兹的兄弟姐妹们都被这位强大的魔女吓破了胆，纷纷逃离了斯里卡，而只有赫雷兹依旧保持着满腔怒火，决心为父亲报仇。"
ARO_Berris_Hardegg: "贝里斯·哈德格"
ARO_Alex_Wilson: "亚历克斯·威尔逊"
ARO_Bob_Jones: "鲍勃·琼斯"
ARO_Colse_Glonia: "柯尔斯·格罗尼亚子爵"
ARO_Damil_Exsart: "达米尔·艾克斯亚特"
ARO_Glock_Andarc: "格洛克·昂达克男爵"
ARO_Glock_Andarc_desc: "比起军事指挥官，格洛克·昂达克男爵更像一个在军事系统挂职的政治掮客。在人生的大部分时间内，他都在格罗尼亚内部的各路人马之间左右逢源，堪称八面玲珑的典范。不过经过多年的运营，他现在已经自成一派，能够主导联合王国的许多重要事务了。"
