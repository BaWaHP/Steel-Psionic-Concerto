###民族精神###
CB_central_bastia_defense_agreement_coop:0 "中巴防御协定合作国"
CB_central_bastia_defense_agreement_coop_desc:0 "中巴防御协定，全称中巴斯蒂亚防御协定，由位于东北中巴斯蒂亚地区的两个经济殖民地：托克尔达开拓领，“冰峰”经济联盟，以及边境安全承包商组成。出于对边境安全的考量，以及防御同盟的特殊地位，北湖防御同盟仅作为合作国加入防御协定。专门适用于北湖防御同盟的合作国规定在北湖地区受到来自非人类势力攻击，陷入存亡危机的情况下，协定签约国有义务加入防御战争。此外，北湖防御同盟政府不受到其它制约，且不履行对边境安全承包商的经济义务。"
CB_central_bastia_defense_agreement_coop_tt:0 "§C当协议签订国陷入存亡危机时，如审核通过，其它成员有义务参与防御性战争。§!"

NLL_feigned_defense_alliance:0 "装模作样的防御同盟"
NLL_feigned_defense_alliance_desc:0 "在中巴联盟政府的帮助下，我们得到了占据这片土地的合法理由：抵御北方异族。不过任何人——或者不是人的玩意，都能看出来，防御同盟只是由几个装模作样的军阀共同成立的“捞钱同盟”。或者几位军阀在对当地居民竭泽而渔之外有点独特的想法，可防御同盟的头子，西装革履的克里斯托弗·海耶斯显然没有如此的雄心壮志。在这样的“仁政”下，北湖地区的现状可谓蒸蒸日下，丝毫不存在改善的可能。"

NLL_christopher_and_his_warlord_friend:0 "克里斯托弗和他的军阀朋友"
NLL_christopher_and_his_warlord_friend_desc:0 "在克里斯托弗的军阀朋友们的帮助下，北湖政府目前还能维持明面上的稳定。然而，不同的军阀也有着自己的小要求，而随着克里斯托弗的威望降低，军阀们也展露出了其对权力的渴望。虽然目前看似一切安好，可纸是包不住火的，内部的斗争迟早有一天会被摆上台面。\n\n§O我们只能希望那一天来的慢一些。§!"

NLL_exploitative_economy:0 "剥削式经济"
NLL_exploitative_economy_desc:0 "虽然名义上也算是人类殖民地在中巴的势力之一，北湖防御同盟却采用了十分不同的经济体制。少数不受外国政府控制的独裁者掌握了殖民地上下的支柱产业，原住民被送往血汗工厂或者矿洞开采资源，定居点们要么被“无为而治”，运气好一点的会成为向南巴倒卖物资的中转站，运气不好的则会直接被军阀当做大军营。在这样的体制运转下，北湖地区的经济在可以预见的短期的未来就会崩溃。"

NLL_legion_harassment:0 "军团的袭扰"
NLL_legion_harassment_desc:0 "由“奥提摩”带领的魔兽军团驻扎在我国的北方，这些天杀的畜生比南巴任何一个地区的暴徒都能阐述“野蛮”一词的含义。他们的部队时常进入北湖地区烧杀抢掠，而且来去无踪，战斗力凶悍，难以处理。"

NLL_unheeding_superiors:0 "不闻不问的上级"
NLL_unheeding_superiors_desc:0 "北湖地区名义上是归属于中巴联盟政府的殖民地，不过任谁都看得出来，只要打点好关系，充实好几位胜利城的老爷们的腰包，那他们就不会关心北湖地区到底发生了什么。然而，我国政府的存续确实也高度依赖来自南方的补给，如果我们引发了不必要的关注，或者南方先出了什么茬子，情况可能会发生改变…"

