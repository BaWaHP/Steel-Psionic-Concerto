###领导人###
NLL_christopher_hayes:0 "克里斯托弗·海耶斯"
NLL_christopher_hayes_desc:0 "作为中巴斯蒂亚地区赫赫有名，只手通天的军火贸易商家族，海耶斯一家的指定继承人，克里斯托弗注定要成为历史书上的大人物——至少三十年前是这样，然后世界大战就爆发了。后面的故事全巴斯蒂亚都知道了：南巴联邦在中巴地区的影响力日渐式微，殖民地大多要么自求多福，要么慢慢消散；加上新政府出台的政策，海耶斯的家族生意很快被其它几家政府或者民营企业分割收购，克里斯托弗本人则在南巴共和国度过了他一生绝大多数时光。不出意外的话，他会成为南巴共和国的一位普通公民，最后碌碌无为度过一生。\n\n然后意外便不出意外地出现了。在清算家族资产时，克里斯托弗意外发现自己还保有几处位于中巴联盟土地内的资产的所有权。在联络地方政府后，他发现自己居然仍然保留大量军火仓库，以及地产的所有权。有了这些资源，他完全可以通通抛售然后拿着钱回去度过富裕的一生；但同时，他也可以趁着地方政府没反应过来，借此组建一支军队，然后拿着不知道还管不管用的证书去接管几个位于北中巴地区的殖民地，与当地的军阀一起从殖民地捞钱。\n\n克里斯托弗选择了后者。这倒是不是因为他有什么统治世界的伟大理想，而是他清楚地知道，中巴地区表面上的“稳定”实际上一触即溃。各地早就陷入了混乱，指望对方能给自己的资产开多高价码是不用想了，不被抢就不错了；而和北中巴的军阀合作，他在未来短时间内起码可以稳定地捞上一段时间的钱，然后拿着一辈子也花不完的资本回到南方吃香喝辣一辈子。\n\n如今，克里斯托弗已统治了被称为北湖地区的土地十余年。他往往不愿意提起自己最初抵达北方时的窘迫，多数人对他的了解是从他和他的军阀朋友以“抵抗魔兽残余，保护联盟北方边境”的理由正式接管这片土地，然后借着他的军阀朋友，中巴联盟和南巴联邦的威风，开始对当地居民可持续性竭泽而渔开始的。\n\n不过，在这么多年的统治后，克里斯托弗和他的军阀朋友们的友谊也快“到期”了。海耶斯家族的后裔似乎没有前几代的能耐与理想，专注捞钱的克里斯托弗手上的棋子正不断减少，失去耐心的几大军阀急切地想要获得更大的权力，北湖地区似乎很快就要变天了——而这些，克里斯托弗都看在眼里。\n\n钱到位了，就得准备跑路了。"

