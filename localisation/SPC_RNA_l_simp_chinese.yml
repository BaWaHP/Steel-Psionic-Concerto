###领导人###
RNA_marianne_petit:0 "玛丽安·佩蒂特"
RNA_marianne_petit_desc:0 "实事求是的讲，如果没有世界大战，玛丽安的人生可能会完全不同。1974年出生于玛丽安施塔特的她度过了一个不怎么好的童年。由于世界大战中帝国的突袭，家族位于首都的家产被摧毁殆尽。在政府的安排下一家人被重新安置在南方新兴城市玛丽安施塔特。虽然玛丽安没有体验过以前的日子，但是她几乎每天都能在父母的话语里听到对以往生活的怀念。以往富裕生活与如今生活的差距使得争吵成为了这个家的日常。而她半人马的身份则进一步加大了她童年的苦难。不过这座城市不曾间断过的，对牛头人这一种族的极大恶意也深深影响了玛丽安。\n\n皇天不负苦心人，即使是在这种环境下，玛丽安还是以极其优异的成绩考上了度弗道夫大学。首都的乱象进一步刺激了玛丽安，学校中不学无术的高干子弟，政府的软弱无能，即使过去几百年依旧根基深厚的封建文化。这些在首都见闻让玛丽安最终对政府完全失去了信心。一个想法开始在她的内心形成：这个国家需要一次完全的大换血，比200年前那场革命还要更彻底的革命。\n\n一次偶然的机会，玛丽安在大学的图书馆里发现了讲述传奇圣女玛丽安的书籍。书里那些有关圣女的神话故事吸引着她不断阅读。没过多久，她便完全沦陷在这本书里了。她感觉她离那个家喻户晓的圣女越来越近，她梦想着自己可以和这个与自己同名的圣女一样抵御外敌，开疆扩土。这促使玛丽安选择回到玛丽安施塔特攻读硕士。她要开始大展身手了。\n\n回到玛丽安施塔特后，或许是在理想的加持下，玛丽安爆发出了惊人的能力。她在攻读硕士学位的同时，也在暗中发展自己的势力。她不断在报纸上发表文章抨击政府和煽动对帝国的复仇情绪，批评政府软弱的外交政策。渐渐地，她越来越出名，获得的支持也越来越多。她的演讲座无虚席，她在台上随便一挥手就能获得台下山呼海啸般的回应。玛丽安明白，那个她梦想中的日子正在不断到来。虽然她似乎还没有做好准备，但是时势可不会等人。"

###民族精神###
RNA_national_union:0 "国民联盟"
RNA_national_union_desc:0 "对中央政府的不满最终在经济危机中被点燃，这给了我们打破《1913年宪法》以来有利于民主党的僵局。在克奥特伯家族、温和派军人、东部工人和农民支持下，国民联盟就此诞生。虽然玛丽安本人并没有做好充足的准备，但是在民众热烈拥护下，这已经不算什么了。"
RNA_opposition_tent:0 "反对派帐篷"
RNA_opposition_tent_desc:0 "围绕玛丽安施塔特的新政府并不是一个组织严明分工明确的政府，这是一个由现有秩序不满者组成的大帐篷，旧政府对水灾的救援不力无疑加剧了反对者，反对者中不乏利益受损的政治家族，民粹甚至民族主义分子……这些都急需解决但不是现在。"
RNA_post_disaster_reconstruction:0 "灾后重建"
RNA_post_disaster_reconstruction_desc:0 "大海啸摧毁了人民赖以生存的家园，阻滞了经济延缓了工业，灾民急需安置，基础设施急需修复，眼下大敌当前要论修复，肯定不是现在。"
RNA_army_left_alone:0 "军队独走"
RNA_army_left_alone_desc:0 "在投靠我方之前，军队已经有了严明的组织纪律，以及背后的利益关系，目前除了手上紧急组建的几支民兵能够听从新政府的调动，军队不听从调令，这是不可接受的，这件事得尽早处理，但是眼下显然不现实。"
RNA_temporary_committe:0 "全联盟最高委员代表会议——临时委员会"
RNA_temporary_committe_desc:0 "新政府采取市域省域国家三层委员代表大会制度，由最低等级委员向上选举，依次选出最高国家立法机构的委员，不过战事尚且不明了，国家未来漂浮不定，因此暂由临时委员会代理立法，在未来国家安定后另作他议。"

RNA_NCO_training:0 "士官培养"
RNA_NCO_training_desc:0 "士官是军队的基层骨干，良好的士官培养铸就了优质军队，同时还能选拔出真正的优秀人才，为日后的军官团队培养人才。"

RNA_professional_officers:0 "职业军官团"
RNA_professional_officers_desc:0 "职业军官团队的带领可以避免战场上出现的大部分失误，能够更快的培养出可以实战的部队。"

RNA_parallel_organization:0 "平行组织"
RNA_parallel_organization_desc:0 "平行组织可以避免权责不清交叉指挥的问题以及背后更深层次的政治问题，而且可以确立两支部队的不同定位，对两支部队未来的发展奠定了基础。"

