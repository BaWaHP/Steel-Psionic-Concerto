###国策###
RNA_third_committee_meeting:0 "第三次委员会议"
RNA_third_committee_meeting_desc:0 "这支军队并不是完全忠于我方，在之前的委员的会议中，我们改组重建了军事委员会并向其中安排了我们的人，不过随着战事的变化，军队的态度还有待观望。"
RNA_NCO_academy:0 "士官生速成学校"
RNA_NCO_academy_desc:0 "新组建的国民卫队很显然没有受到过职业的训练，为了让他们更好的适应战场上的情况，只能请求军事委员会派遣一些军事教官给一些有能力的士兵进行培训，使其成为骨干。"
RNA_establish_joint_command:0 "设立联合指挥部"
RNA_establish_joint_command_desc:0 "建立联合指挥部可以避免很多现实的问题，可以快速调动军队，可以更好的协调等等，但是建立联合指挥部，则意味着军事掌握权的让渡，极可能让军事委员会乘机做大。"
RNA_lend_army_officer:0 "借调陆军军官"
RNA_lend_army_officer_desc:0 "保持卫队独立避免军事委员会的干预，能保持政府不会过度依赖军队，使政府具备更高的独立性，减少未来受制于人的可能。"
RNA_maintain_NG_independence:0 "保持国民卫队独立性"
RNA_maintain_NG_independence_desc:0 "保持卫队独立避免军事委员会的干预，能保持政府不会过度依赖军队，使政府具备更高的独立性，减少未来受制于人的可能。"
RNA_fight_alone:0 "各自为战"
RNA_fight_alone_desc:0 "职业军队有职业军队的长处，而国民卫队也有其特长，将这两种不同性质的组织独立指挥，才是最好的方式，这样既避免了受制于人还避免了交叉管理，简直是一举两得。"
RNA_committee_meeting:0 "委员大会"
RNA_committee_meeting_desc:0 "在短暂的处理好军队事务后，当务之急就是调配资源，或者说是争夺资源的支配权。在维持前线的战事以外，不能将过多的资源给予军队，避免军队产生其他想法。除此以外还得将资源分配给灾区重建和恢复一些必要的生产，因此召开大会讨论资源分配事宜。"

