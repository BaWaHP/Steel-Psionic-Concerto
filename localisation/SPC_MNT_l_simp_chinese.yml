###民族精神###
MNT_mountain_people:0 "群山之民"
MNT_mountain_people_desc:0 "群山环绕吾身，山巅独在吾心——山羊人传统民谣\n\n从山羊人被南巴斯蒂亚的人类发现并被记录开始，大山就成为了它们的代名词。自古以来，山羊人就生活在中巴斯蒂亚的大山之间。即使是在中巴斯蒂亚联盟建立后，山羊人也几乎从未离开过大山。得益于中巴斯蒂亚联盟微弱的中央权力与强烈的地方主义，山羊人在一开始与人类并无交集。不过在伟大战争之后，人类对亚人的态度发生的极大的转变。在山羊人拒绝与人类签订条约后，对山羊人的围剿开始了。依靠着种族魔法与山地的极大优势，山羊人确保了自己暂时无法被人类灭亡，不过空前强烈的种族血仇已经蔓延在山羊人整个种族之中。它们发誓：在群山之神的庇佑下，他们必将战胜人类，然后——§R以人类之血祭奠同胞之亡灵。§!"

