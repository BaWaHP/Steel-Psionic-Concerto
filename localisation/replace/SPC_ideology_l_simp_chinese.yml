###子意识形态
pioneer_communism_subtype:9 "先锋共产主义"
pioneer_communism_subtype_desc:9 "“先锋共产主义”中的“先锋”一词来源于“先锋理论”，后者曾是全球各地共产主义运动的流行理论之一。先锋理论提出要建立类似“先锋队”的组织，使其成为无产阶级工人运动的领头羊，在吸引更多人加入共产主义运动的同时维护共产主义政权的统治。比起革命共产主义政权，先锋共产主义政权往往会采取更为激进的威权政策以维持其统治，并加大对社会的控制力度。它的信奉者认为在抵达“真正”的共产主义社会前，少数的共产主义政权应当采取集权化和军事化的行政理念，并执行更加具有侵略性的外交政策以实现共产主义的扩张。先锋共产主义的信奉者普遍认为他们才是共产主义的正统继承人，并且应当在建立起真正的共产主义国际前引领国际共运。"
pioneer_team_communism:0 "先锋队共产主义"
pioneer_team_communism_desc:0 "先锋队社会主义主张要想使得工人阶级认识到社会主义意识，就必须从工人阶级的外面灌输进去。只有由无产阶级率先觉悟的分子、最先进部队，将阶级斗争与阶级压迫现象的关系向无产阶级群众揭露出来，只有通过无产阶级的先锋队——政党，一个由工人阶级中最优秀、最忠于革命事业的、有觉悟的先进分子所组成的有组织的部队，进行不断的、全面的、群众性的揭露和鼓动，才能把社会主义从“外面”真正灌输到无产阶级中去。党必须按集中制原则组织起来，实行广泛的选举制度。赋选举的各中央机构以进行思想领导和实际工作领导的全权。同时，各中央机构可以更换，并提倡广泛的公开性和严格的报告工作制度。"
rational_communism:0 "理性社会主义"
rational_communism_desc:0 "理性社会主义主张科学技术即是生产力，而私有制作为一种制度终将被淘汰。政府应当大力投入对自然科学与社会科学的探索，追求更优化的资源配置与财富分配以期达到完美的共产主义的终极目标。理性社会主义者的政治应当是“完美的政治和整齐划一的政治”，在理性社会主义者的方案里，不存在特定环境下的最优，而只有绝对意义上的最优。理性社会主义者所相信的，不仅是每一个政治问题都存在某一个最佳的解决办法，而且这一解决办法是普遍适用的。尽管如此，出于不同的评估方向，不同的理性社会主义政权依然会采取不同的政策。"
interstellar_revolutionism:0 "星际革命主义"
interstellar_revolutionism_desc:0 "星际革命主义者认为社会生产力已经发展到可以精准地捕捉到外星人的造访，这便昭示着星际联系已经发生。历史上正是生产力的发展推动了各地域之间的互相交流，从而使社会逐步联为一个整体，而星际联合具有超越世联主义的意义。只要生产力足够先进，社会制度将拥有颠覆性的转变并产生新的架构，此时完善的共产主义便建立了。但共产主义不应当是孤立的，应当立刻扩散向全宇宙以共同奋斗。出于星际主义和人道主义，该群体认为应当帮助外星无产阶级推翻其所在星球现有资本主义秩序，建立宇宙性的社会主义政权。依靠技术与资源的输入和互助，宇宙中的落后社会将迅速消灭物质匮乏，最终一起走向各尽所能、各取所需的全面共产主义社会。在该群体看来，星际联合的愿景近在眼前，而在此之前所要做的，便是为星际革命创造条件。"
military_government_communism:0 "军政共产主义"
military_government_communism_desc:0 "军政共产主义脱身于共产主义国家战乱不断的历史中。军政共产主义认为，共产主义国家需要，也必须建立一个完全由军人组成的社会主义革命政府，才能确保国家在不断的战乱中屹立不倒。与单纯的军政府不同，军政共产主义仍然坚持共产主义原则，通过“无产阶级专政”来实现对于国家、社会、经济等各方面的控制。在经济上，军政共产主义通常实行先军经济和战时共产主义政策，大部分国内的资源被用于确保军事力量的壮大。在国际事务上，军政共产主义者有些支持武装中立，有些则支持主动参与并干涉国际事务；但两者最终目的都是相同的：由无产阶级组成的军队是革命的先锋队，终会为全世界的无产阶级带来解放。"
national_communism:0 "民族共产主义"
national_communism_desc:0 "“无产阶级的先锋队自然也是民族的先锋队。”\n\n民族共产主义者与其他先锋共产主义者的不同之处在于，民族共产主义者会更加强调民族的重要性。民族共产主义的依据在于，一个民族的共产主义革命必须要优先考虑本民族的实际情况，照搬其他民族的斗争经验往往会出错。民族共产主义者并非全都秉持民族主义思想，但他们都认同一点：民族这一概念在相当长一段时间内并不会消亡，值得赞成的国际主义或世联主义应当是与其他民族或其他智慧种族的劳动者的平等联合——也就是说，阶级与意识形态的相同并不能掩盖民族与种族之间的差异，各民族之间的差异应当被尊重而非被忽视，只有这样才能才能争取到更多的支持，实现更大的胜利。\n\n民族共产主义者依然坚持先锋共产主义的基本原则：阶级斗争、暴力革命、实行公有制经济、推行人民民主专政等。值得注意的是，他们并不会支持同一民族的剥削阶级，正如他们会坚定反对其他民族的剥削者一样。但在如何对待其他民族的劳动者这一问题上，民族共产主义者一般会优先考虑本民族的利益。"
directive_communism:0 "指令共产主义"
directive_communism_desc:0 "事实证明，一个政府想要大刀阔斧地推行社会革命往往需要拥有足够强大的权威。因此，为了毫不动摇地进行共产主义革命，指令共产主义应运而生。指令共产主义认为，只有高度中央集权的计划经济体制才能带领劳动者实现共产主义。\n\n指令共产主义理论拥有很强的实用主义色彩。与其他的实用主义者不同，指令共产主义的实用主义更有理论依据：在共产主义社会，所有的资源本质上都属于全体劳动者。浪费资源等于损害全体劳动者的利益。因此，指令共产主义者要求每项经济政治活动都有其“价值”，一切都要服从集体与共产主义的利益。\n\n政治上，指令共产主义者推崇统一的集体领导，反对个人独裁与多党制。干扰指令的实行的反对派在这一体制下没有生存空间，也没有存在的必要。同时，他们会推行企业民主以保障集体的利益。有利于劳动者增强个人技能，实现自我价值的活动也会得到大力支持。经济上，指令共产主义者往往会大力推进集体化以消灭私有制经济。为了保证劳动者能够按照计划完成生产任务，指令共产主义者往往还会设置经济警察等组织对劳动者进行监督，也会设立“社会主义竞赛”对劳动者进行鼓励。为了实践“生产资料必须由劳动者所有”这一共产主义原则，指令共产主义者会保证生产资料将免费且毫无保留地调配到每个生产单位上。"

revolutionary_communism_subtype:9 "革命共产主义"
revolutionary_communism_subtype_desc:9 "革命共产主义，类似先锋共产主义，最早是全球各地共产主义运动的流行理论之一，却随着时代局势的改变逐步衰退。革命共产主义者认为世界各地的共产主义者应当发起革命，推翻现存的资本主义政府并建立起新的共产主义社会。革命共产主义可以用来指代许多先锋共产主义之外的共产主义流派，其信奉者普遍支持共产主义革命，计划经济，更强的社会掌控力度，无产阶级专政，更好的劳工制度，人人平等和输出革命。虽然也有一些更亲近世联主义的民主主义者，主流的革命共产主义思想仍然支持建立一个集权化的代表会议中央。"
continuous_revolutionism:0 "持续革命主义"
continuous_revolutionism_desc:0 "持续革命主义主张在武装斗争建立左翼政权后以持续向外输出革命作为使命，持续革命主义者认为只有将全世界的被压迫者联合起来一同推翻压迫者才能达成真正的解放，输出革命的手段也多种多样，持续革命主义者并不会拘泥于单纯的武装斗争，而是在文化，经济等多方面进行革命输出，并提倡由当地无产阶级建立自治政权并参与持续革命，而非是并入其他政权。部分持续革命主义者主张在输出革命尚未实现的情况下维持国家的紧急状态，但也有派系认为应当在此基础上维系行政上的共产主义原则。"
popular_communism:0 "人民共产主义"
popular_communism_desc:0 "人民共产主义主张在建立一个左翼政权之后，应当逐步将权力交还给人民，建立起从下而上的政治结构。人民共产主义者认为革命的主体和根本力量都是人民，而非某个派别，在能够将权力交还人民之前，应当坚持一切行动都为人民的准则，相信人民，能够充分发动人民的力量，并且避免出现脱离人民，将自身与人民对立的危险情况。与左翼民粹主义不同的是，人民共产主义者认为并不是要满足人民所有提出来的表面需求，而是必须落实深入人民，清楚人民的根本需求的原则，并尽己所能地解决问题并满足人民。"
agrarian_socialism:0 "农业社会主义"
agrarian_socialism_desc:0 "农业社会主义是一种主张土地共有的平均主义思想，早在封建时代的农民起义中均田分地的概念便被屡屡提出，但直到近代社会主义的传播这一主张才逐渐形成系统性的意识形态。农业社会主义与绝大多数提倡工人革命的社会主义不同，农业社会主义者主张在工业化和现代化的过程中，农民并非作为附庸地位存在，且坚决抵制机械化大生产导致的“工贵农贱”与工农剪刀差现象。农业社会主义者主张将农业国有化后以全民分股的形式均分于农民以实现农民土地所有制，农民将地租或农业生产实物作为税收上交国家。"
#utopian_communism:0 "空想共产主义"
#utopian_communism_desc:0 "空想共产主义作为早期共产主义流派之一的现代化变种，在延续了共产主义废除私有制，消灭阶级差别，共同劳动，平均分配产品等一系列核心政策目标的基础上，提倡要实现真正的“社会平等”。空想共产主义的批评者认为其信徒虽然拥有美好的目标，但没有完善的理论基础，也缺乏执政经验的实践，对资产阶级抱有不切实际的期待。现代化的空想共产主义者在吸取教训后改进了他们的思想。他们同许多支持暴力革命的共产主义者不同，更加倾向于采用诸如地方公社的社会实践来改变社会，改进工业制度，完善按需分配等原则以实现社会公平。空想共产主义者虽然依旧否定采用暴力革命政策以改变社会，但他们同样认为应当采取更为激进的措施以彻底的消灭阶级的差别，而不是像早期共产主义思想一样采取更为简单粗暴的平均主义。"
leftist_guerrilla_movement:0 "左翼游击运动"
leftist_guerrilla_movement_desc:0 "“继续战斗，无论代价几何。”\n\n即使是在革命之火将熄的至暗时刻，也不乏愿意举起红旗，高呼自由的战士。左翼游击运动涵盖了形形色色的非政府武装力量：他们中有的心向民族解放，誓要让暴君付出血的代价；有的则是失败革命的最后残存，带着先烈的意愿继续前进；还有的为了意识形态革命而战，却因时局不利而转入游击战争。不同于其它意识形态，左翼游击运动这一概念打破了政治思想，民族甚至是物种的壁垒，可以用于指代世界各地符合条件的运动。\n\n因此，不同的游击组织可能会采取大相径庭的内政与外交政策，并对“解放事业”的定义进行不同的阐释。有些左翼游击组织主张类似大帐篷的政治体系，将境内不同的游击组织团结在一面旗帜下，以团结或解放之名共同作战，并在内部冲突中沉沦；有些组织则采用更加激进且孤立的政策，从固定于城市或乡村地区作战，到由单一意识形态，民族或物种主导的组织模式。\n\n尽管如此，以“共产主义”，“社会主义”，“共和国”的革命理想为名也好，为“复仇”，“革命”，“自由”，“解放”而战也罢，在世界各地，无数的男男女女已决心揭竿而起。他们一往无前，无论前方是梦中的理想乡，还是尸山血海构成的万丈深渊。"
market_socialism:0 "市场社会主义"
market_socialism_desc:0 "作为左翼意识形态漫长历史相对年轻的一环，市场社会主义对传统的左翼理论进行了全新的阐释。在市场社会主义者看来，市场这一机制本身应当被独立看待。当资本主义占据主导地位时，市场机制便被反动派打造成剥削民众的工具；而相对的，假如市场机制被正确的利用，它也可以被左翼政权打造成造福民众，促进国家富强的工具。\n\n市场社会主义者并不否认暴力革命的合理性，尤其是在腐朽的旧秩序阻碍了市场机制的健康运作的情况下。虽然市场社会主义的政权偶尔会引入类似国有化的中央引导机制，确保市场的运转符合民众的利益，或是国有化诸如福利等个别部门；多数情况下，其支持者仍倾向于扩大私有化的规模以促进经济的积极性，并佐以严格的劳工法，福利政策与公平的市场竞争规则。此外，市场社会主义者通常支持一党独大式民主或一党独裁的政治体制，并对国际合作持开放态度。"
self_governing_communism:0 "自治共产主义"
self_governing_communism_desc:0 "自治共产主义，亦被称作劳工主义，是在二十世纪下旬逐步兴起的新兴共产主义流派。随着世界各地的共产主义运动不断失败，一些左翼知识分子开始了对共产主义理论的全新解读，其核心思想逐渐构成了自治共产主义的大纲。简而言之，自治共产主义者认为传统语境下的劳工运动并不能真正实现劳工阶级的革命，资本主义的发展体现了其对日益壮大的劳工阶级的对抗，这意味着历史上的协作主义工会，进步主义思想实际上成为了腐化无产阶级的工具，并不能真正代表劳苦大众的利益。\n\n自治共产主义者认为真正的共产主义革命需要靠劳工阶级自发地完成，一切革命策略由其自发产生，并自发地推动。在革命的过程中，其应当拒绝一切资产阶级的联合，无论是所谓的进步主义思想，亦或者是依靠协作主义来腐化劳工，并制造新的资产阶级的工会。自治共产主义者支持暴力革命，严密的基层组织和较高的地方自治权，鼓励无产阶级积极参与政治，支持一定程度或更高的直接民主制，从而避免先锋队等思想改头换面，剥削百姓。"

worldunion_socialist_subtype:0 "社会世联主义"
worldunion_socialist_subtype_desc:0 "世联主义，全称“世界联盟主义”，是当之无愧的世界激进左翼主义运动的中流支柱，也是世界上最为流行的社会主义理论。据称起源于一群自称是来自另外一个世界的流亡者。在流亡者的描述中，有一个疆域遍布全世界的超级强国，被称为“联盟”，而世联主义就是这个名为“联盟”的国家的主流意识形态。世联主义者认为应当建立起一个能够团结全世界所有智慧生物的超级强权，而社会世联主义者普遍被认为是传统的世联主义的正统继承人。社会世联主义吸取了部分共产主义思想，这主要体现在经济方面。社会世联主义政权普遍会采取联邦制和一党制，降低对社会的控制力度并提倡公私合营的经济体制。虽然民主世联主义的信奉者认为社会世联主义政权偶尔会采取的集权主义政策（主要体现在经济上）是对民主的践踏，社会世联主义依然是世界上最为主流的世联主义思想。"
exporting_revolutionism:0 "输出革命主义"
exporting_revolutionism_desc:0 "输出革命主义者主张无产阶级要不间断地进行革命，直到把一切大大小小的有产阶级的统治全都消灭，直到无产阶级夺得国家政权，直到无产者的联合不仅在一个国家内，而且在世界一切举足轻重的国家内都发展到使这些国家的无产者间的竞争停止，至少是直到使那些有决定意义的生产力集中到了无产者手中。必须坚持独立的工人运动与阶级斗争理念、工人阶级民主与无产阶级专政。必须支持民主权利，倡导工人民主和政治自由，反对秘密外交，主张世界革命。"
humane_socialism:0 "人道社会主义"
humane_socialism_desc:0 "人道社会主义主张左翼革命、科技进步和社会主义政权建立的目的应当是在根本上改善所有人的生活，强调社会公平与社会福利保障。人道社会主义者提倡人文理念，主张道德对人的行为的约束，认为应当建立一套全面的道德标准来为人民的行为提供参考。人道社会主义者认为所有以革命为名的暴行都是对革命的玷污，主张在建立政权之后应以提升本国人民的生活水平为第一要务，在此基础之上才能考虑输出革命等，并对暴力方式的输出革命持怀疑态度，通常会采取更为友善的外交姿态。"
utopian_socialism:0 "空想社会主义"
utopian_socialism_desc:0 "空想社会主义作为早期社会主义流派之一的现代化变种，在延续了社会主义废除私有制，消灭阶级差别，共同劳动，平均分配产品等一系列核心政策目标的基础上，提倡要实现真正的“社会平等”。现代化的空想共产主义者在吸取教训后改进了他们的思想。他们同许多支持暴力革命的共产主义者不同，更加倾向于采用诸如地方公社的社会实践来改变社会，改进工业制度，完善按需分配等原则以实现社会公平。空想共产主义者虽然依旧否定采用暴力革命政策以改变社会，但他们同样认为应当采取更为激进的措施以彻底的消灭阶级的差别。在吸收了世联主义的思想后，比起在自己的国度内建立平等主义的社会，他们开始同其它社会主义者的国际组织合作以促进全球平等事业的发展。"
religious_wordunion:0 "世联主义教派"
religious_wordunion_desc:0 "世联主义教派起源于一群人对世联主义者的崇拜，他们对世联主义者来源于另一个世界的说辞深信不疑，并且逐渐形成了基于世联主义发展而来但有些许不同的价值体系，他们形成了针对另一个世界，以及那个世界派来拯救自己的世联主义者的信仰，他们也相信自己必须尽全力解放这个世界和生活在这个世界上的人。以此他们形成了一种特殊的政体，经济上采用与世联主义者相似的经济制度，名义上所有生产资料归于教会，但本质上是生产资料公有制，各地采取的公社制度在名义上却是地方教会，在文化上世联主义教派重视无产阶级文化的同时对宗教文化的发展也有长足的增进，每个礼拜日唱诗班唱的是无产阶级歌曲，人们一面信仰着“神”一面高举着解放旗帜，带着解放世界的理想与宗教崇拜的狂热，试图解放这个世界和他的人民以让其回归“神”的怀抱。"
revolutionary_front:0 "革命阵线"
revolutionary_front_desc:0 "革命阵线的出现通常体现了当地存在丰富，多样的左翼活动，民众渴望一场剧烈的变革，以及对抗强大反对派的需要。在这样的需求下，革命阵线应运而生；为了掌握足够的政治权力，亦或者是对社会的影响力，各路左翼团体精诚团结——社会主义者，共产主义者甚至是无政府主义者都可能加入这样的团体，一同为实现社会主义理想而奋斗。\n\n革命阵线的理念可以是多种多样的，无论是出于议会斗争而组成的左翼大帐篷联盟，亦或者是为了暴力革命而团结在一面旗帜下的武装团体。也正是因为如此，革命阵线的意识形态理念很大程度上是妥协的结果，或是一派压过另一派的结果。由于各路派系理念不甚相同，在革命阵线中，甚至可能出现威权主义的先锋队政党和社会民主政党合作的情形——这导致了多数革命阵线缺乏向心力，从而高度依赖某一领导派系或是人物的结果。许多人将革命阵线视作左翼发展的方向，认为这符合国际主义，文化多元的进步理念；也有人将革命阵线视作革命道路上的“必要之恶”，一旦实现目标，便可以迅速抛弃，转而走向更加单一的意识形态路线。"
pan_north_bastian_thought:0 "泛北巴斯蒂亚思想"
pan_north_bastian_thought_desc:0 "随着帝国内战以殖民者与买办的全面胜利告终，北巴斯蒂亚的左翼运动进入了前所未有的至暗时刻。帝国被拆分成无数的自治民族国家，种族主义快速兴起，民众陷入内斗，来自大陆尽头的殖民者则赚得盆满钵满。1953年的那颗子弹为郁郁寡欢的斯派克带来了解脱，却不能拯救他的同胞。\n\n斯派克死了，他身后千千万万的革命者却没有。\n\n作为对殖民者的反抗，以及由于世联主义的快速传播，泛北巴斯蒂亚思想应运而生。起初，这只是一批绝望中的斯派克主义者在暴动浪潮中的假设，可随着对殖民者的敌意愈发加强，以及对泛滥的种族主义的回应，泛北巴斯蒂亚思想逐渐在动荡的年代取得了一席之地，并在之后成为了前帝国境内许多左翼组织的重要指导思想。\n\n泛北巴斯蒂亚思想提出，北巴斯蒂亚的民众应当在同一面旗帜下团结起来，反抗帝国主义，种族主义，殖民主义等思想，并建立超越了种族差异的，基于北巴斯蒂亚地域的新民族认同。这一思想具有强烈的左翼运动色彩，其支持者也横跨了多个意识形态领域，从先锋共产主义者到社会民主主义者应有尽有，因而具体展现形式也变得多种多样。不过，这一思想的支持者往往具有一个鲜明的共同点：即是在对抗世界不公时，对武装斗争的坚定支持——或许，这就是二十世纪初，斯派克与无数革命先烈所留下的最后遗产了。"

worldunion_democrat_subtype:0 "民主世联主义"
worldunion_democrat_subtype_desc:0 "民主世联主义被认为是传统世联主义同南巴斯蒂亚共和主义的有机结合。尽管传统世联主义中团结全世界的智慧生物的思想得到了保留，民主世联主义的信奉者认为传统世联主义中过于激进的国际主义政策是不稳妥的。同时，民主世联主义者认为国家应当进一步放松对市场的管制，以对现有的资本主义进行改革的方式来实现更加平等且自由的社会。民主世联主义政权普遍会采取象征性的多党制，在联邦的基础上进一步提高各地的自治权。民主世联主义政权通常会跟共和主义政权保持更为密切的关系，而不是同社会世联主义者一样选择同部分温和共产主义者合作。"
social_democrat:0 "社会民主主义"
social_democrat_desc:0 "社会民主主义者主张建立一个民主，平等，自由的社会主义共和国。多数其信徒主张采用政治改良和议会斗争，通过立法逐渐替代资产阶级法权，进而消灭资本主义，少数则选择了走向武装革命的路线。社会民主主义者拒绝任何形式的独裁、极权主义，对激进的革命措施抱有反对的态度，尽管他们同样认可暴力革命的可行性。在文化上，社会民主主义者主张进步、平等与开放，反对宗教极端主义、民族主义等激进思想。在经济上，社会民主主义者提倡使用改良主义的政策，通过改进社会福利，打破不公，改良就业体系来完成向社会主义经济的过渡，坚决反对国有化或是地方公社等激进手段来完成经济改革。社会民主主义者支持建立一个社会党国际，借此于在全世界范围内进行互助，但也有不认可这类组织的派系。"
democratic_socialism:0 "民主社会主义"
democratic_socialism_desc:0 "民主社会主义的支持者提出了新的社会主义概念，在坚持社会民主主义的同时对当前主流的社会民主主义思想持否定态度，主张以更激进的阶级斗争取代改良主义政策。在经济上，民主社会主义政权主张采用包括国有化，合作社等机制来快速向社会主义经济体系过渡；在文化上，保留了进步主义和平等主义的思想，反对民族主义和宗教极端主义的热潮，并认可民主的理念。然而，民主社会主义者并不认可代议制民主作为向社会主义过渡的手段，在抛弃了改良主义的思想后，民主社会主义政权偶尔会采取包括建立民主集中制，一党专政的政策来获取权力以改变社会，不过，多数政权仍会保持一定限度的民主机关。"
people_worldunion:0 "人民世联主义"
people_worldunion_desc:0 "人民世联主义主张平民掌控政治，反对精英或贵族掌控政治，以此构建一个由平民直接参与政治的国家，并逐步消灭各方面的压迫，这可以包括阶级斗争和资本主义，也可以涵盖到从公民民主权力到弱势群体权益等一系列内容。人民世联主义者认为，所有群众性的社会政治运动都带有人民主义的性质，激进者把它定义为“唯一地诉诸和求助于人民群众的所有运动和学说”。人民世联主义国家常常通过立法禁止政治精英的存在，同时逐步拆分资产阶级的资本并重新进行财富分配，以此逐步过渡为民主的社会主义国家。在国际事务上，人民世联主义者支持各国家的平民争取自己的政治权益，以激进的话语及诉求，发起推动社会的革命性变革，建立新的社会秩序。不过，出于群众呼声的缘故，人民世联主义的政权往往会在一些政策上采用更为保守的姿态，譬如针对非主体种族的组织性歧视和对新兴科技的怀疑态度。"
liberal_worldunion:0 "自由世联主义"
liberal_worldunion_desc:0 "随着世界进入全新的时代，越来越多的激进意识形态占据了政治舞台的主导地位，当传统的共和主义者意识到民主，平等和人权正受到威胁时，自由世联主义应运而生。自由世联主义者主张在全球范围建立自由主义政权，将传播自由主义的使命视作自由主义政府的天命，并反对绝大多数非自由主义的政权。自由世联主义的政权通常会采取激进的外交政策以传播自己的理念，维持较大的军备体系并不否认战争的必要性。不过，在对经济和社会的看法上，不同的自由世联主义政权有着不同的看法。有些会采取类似福利社会主义的经济体制来打破社会不公，有些则倾向于采用自由放任的经济体制来确保社会的自由；有些会加强对社会的掌控力度来消灭自由主义的敌人，有些则选择降低对社会的掌控力度并完善民主制度。除此之外，虽然在吸收了世联主义的思想后，许多自由世联主义的信徒愿意将自己的信仰传播给人类以外的种族，主流派系仍然将人类的权益视作第一位。"
religious_progressivism:0 "宗教进步主义"
religious_progressivism_desc:0 "宗教进步主义专注于宣扬其特定宗教教义中提到的公正，包容，帮助弱者等理念，通常被认为是一种宗教理论下，进步思想和人文主义有机结合的产物。其支持者往往会尝试在维护宗教文化的前提下建立一个更具包容性的社会，并执行“有道德的”外交和经济。视具体情况不同，他们甚至可能施行某种形式的神权统治。与那些更加传统的教友不同的是，宗教进步主义者往往拒绝采取歧视或迫害性的政策，更想要用和平的方式教化和对待民众。\n\n然而具体要在哪些领域推动进步，哪些地方保持传统，以及世俗主义和民主政治等问题上，宗教进步主义则往往取决于具体教义和个人理念因素展现出极大的不同甚至矛盾。但无论如何，这些坚定的牧者仍然高举着神圣的旗帜，力图为所有虔诚的人民打造出一个地上天国。"
left_wing_nationalism:0 "左翼民族主义"
left_wing_nationalism_desc:0 "左翼民族主义作为社会主义与民族主义结合所诞生出的意识形态，其包含了社会主义对平等解放的追求，也融合了民族主义对反殖民反种族平等化的需求。左翼民族主义者坚持民族自决为最高价值观，努力将同胞与人民建立在一个国家，以让人民享有主权以及他们所定义的平等。左翼民族主义崇尚平等与阶级意识，在实际斗争中坚持以阶级为核心而非以民族为核心，但并不支持阶级斗争。左翼民族主义反对帝国主义与殖民主义，支持受压迫的民族进行的民族解放运动并积极倡导民族自决，构建社会平等意识。左翼民族主义者坚信，民族自决，政治独立是实现平等与自由的必需品。\n\n除此之外，目前主流的左翼民族主义者拒绝极端的种族主义，支持与国家内部的少数民族友好相处，互帮互助。但对非本种族的其他种族保持警惕，尽可能不予其交流沟通。不过还有部分左翼民族主义者支持对境内少数民族实行歧视性法律，拥抱种族主义并对其他种族抱以强烈的歧视态度。"

liberal_republican_subtype:0 "自由共和主义"
liberal_republican_subtype_desc:0 "自由共和主义涵盖了当今世界上绝大多数主流共和主义派系。最早起源于南巴斯蒂亚共和革命，共和主义在接下来的几个世纪间成为了当之无愧的最受欢迎的意识形态。尽管共和主义旗号下的大量派系使得共和主义者们很少像共产主义或者世联主义那样团结一致，他们在对抗极端主义思想时总能形成统一战线。主流的共和主义思想认为国家应当降低对社会的控制力度，提倡进一步的直接民主和不受限制的市场经济。尽管也有一些更加激进的派系支持市场经济的改良主义或者认为应当采取威权的行政措施。"
radical_republican:0 "激进共和主义"
radical_republican_desc:0 "作为南巴斯蒂亚共和革命中最为激进的民主共和主义，激进共和主义起源于很久以前就在南巴斯蒂亚兴起的资产阶级民主思想“人民主权”和“理性”思想。对于激进共和主义者来说社会的自由，平等，博爱以及进步高于一切存在。激进共和主义主张对一切“暴君”采取“人民专政”手段同时建立一个进步的，由“理性”驱使的政府控制下的市场经济体制。同时由于对进步的追求，激进共和主义者更偏向于在行政部门中加入技术官僚来保障科技与社会进步的实现。现在革命已经燎原，自由的人民举起了手中的火炬冲向暴君的王座。"
market_liberalism:0 "市场自由主义"
market_liberalism_desc:0 "一种维护大型资本的民主主义。主张在新的历史时期维护个人自由，调解社会矛盾，维护自由竞争的资本主义，放任市场经济不管，认为市场里有一双大手控制经济，对私人经济活动，不要加以任何干涉，而听任其资本和劳动自由投放、自由转移，同时还认为，一个国家最好的经济政策莫过于经济自由主义，应当实行自由经营、自由竞争和自由贸易。国家的作用仅限于维护国家安全和个人安全，以及举办一些资本家私人经营无利可图的工程。更进一步的观点认为，经济自由保证个人利益和社会利益的结合，为生产力无止境发展开创了巨大的可能性。"
democratic_republican:0 "民主共和主义"
democratic_republican_desc:0 "民主共和主义起源于早期共和主义革命，并作为其中的中流砥柱存在。民主共和主义者以推翻君主制，建立自由、平等、博爱的共和制国家为目标进行斗争。在该团体的理念中，共即共同事业，和即使用和平的方式处理过内的事务。民主共和主义者认为只有共和政体才能达到天下为公、人人平等的理想社会，坚信全球人民都具有包括生存、自由和财产权在内的自然权利，并且鼓励国家建立保护公民权利的体系，认为这是人民与政府的一种社会契约关系。同时，该团体鼓励国家顺从其治下民众的意愿，相信民主进程的作用，推行包括普选，义务教育，反对派合作，边缘群体补助以及自由市场的经济体制等系列政策，同时不否认政府作为社会活动监督者的地位。"
liberal_racism:0 "种族自由主义"
liberal_racism_desc:0 "种族自由主义是自由主义政治理论与种族主义哲学在由单一种族占据绝对主导地位的国家整体性问题上的融合产物。在保留了自由主义理论所重视个人自由以及自由市场的特色后，该群体认为需要建立起不受威胁的国家主权以维持这两个核心思想的持续性发展。种族自由主义者认为建立起不受威胁的国家主权的最佳方式表现在严格的移民政策以抵挡其它种族，甚至是同族中的其它民族；采用保护主义的经济政策，提高关税并鼓励本土产业的优先发展。不过，该群体主流认为没有严格遵循自由主义或是种族主义，民族主义思想信条的必要，虽然核心纲领不容改变，但次要的政策决议有很大的修正空间：国家主权可以在一定程度上降低个人自由的领域范围，反之亦然；更加自由的市场可以被用于取代保护主义的经济政策；而对国内的产业发展政策也可以在更为集中的指导型方针和自由企业来回踱步。"

conservative_republican_subtype:0 "保守共和主义"
conservative_republican_subtype_desc:0 "保守共和主义普遍被认为是保守主义的现代化变种，在同主流的共和主义进行有机结合后的产物，并且在部分地区相当流行。保守共和主义的政权在确立了民主传统的地位后，把维持社会的现状视作己任，并将维持国家的稳定摆在了较高的优先级上。在财政上，保守共和主义的政权倾向于减少政府支出并维持较低的债务水平；在政治上，保守共和主义的政权很少采取会造成重大社会变动的举措；在文化上，保守共和主义的政权认为维持文化上的传统是很必要的；在外交上，保守共和主义的政权大多不会采取过于侵略性的措施。保守共和主义政权的政策和倾向会随着地域和时代的不同产生较大的改变，这甚至会改变其对于其它政治派系的态度，保守共和主义的信徒在大多数情况下都会选择同自由共和主义政党合作，但偶尔也会选择向更右翼的势力让步，这取决于他们的具体政策观点和时代背景。"
conservative_liberalism:0 "自由保守主义"
conservative_liberalism_desc:0 "自由保守主义是在政治上结合自由主义元素的保守主义思想。虽然该群体强调对传统，权威和宗教价值的尊重，但其同样支持经济与社会两方面基础上的个人自由。自由保守主义者认为随着激进主义和极端主义的崛起，保卫民主思想需要纪律和更为强大的意志，需要当局采用更高的社会控制力度以确保任何变革不会失去政府的控制，乃至成为激进主义的苗床。自由保守主义者鼓励政府采取更为强力的社会控制力度，不过仍捍卫公民权部分的自由主义观点，同时推崇在政府干预下的市场经济，环境保护主义，并且认可有限度的福利主义政策，并认为应当从社会全方位根除激进主义思想，尽管并不否定改革的必要性。除此之外，该群体还对文化自由主义持开放态度，认为这同样是公民自由权的一种，不同于其它保守主义思想。"
democratic_traditionalism:0 "民主传统主义"
democratic_traditionalism_desc:0 "当共和主义思潮漫卷，封建制度瓦解并被逐渐替代之后，部分旧时代的思想、传统价值观念以共和名义存留了下来，其中则包括了愈发激进的传统主义者。民主传统主义派系大多以宗教教条、传统道德体系、贵族派系整合形成，该群体基于社会现实认同了民主共和的政治观念并且参与到国家政治、经济和文化等各方面，但以传统价值观念解读和认知共和思想。传统主义政党通常主张通过传统的宗教、道德以建立一个复古的秩序，并认为过去胜于现在、不变胜于改变。民主传统主义者的支持群体通常为旧地主和旧贵族阶级，强调人身依附关系的合理性并对资本主义现状表示不满。除此之外，民主传统主义的信徒通常会在对待劳工待遇，平权运动等涉及破坏旧有秩序的政治议题上抱有怀疑乃至反对的态度。"
agrarian_popularism:0 "农业民粹主义"
agrarian_popularism_desc:0 "虽然绝大多数政治团体将农民认定为同土地绑定在一起的勤劳公民，农民本身往往不像工人或是学者那样在政治上有着较高的发言权。农业民粹主义诞生于这样的时代背景下，其支持者认为政府不应该忽视农民作为一个特定群体在国家内的政治权利和诉求，相反，始终保持自由身，不被以现代化都市为代表的文明所腐化的独立农民更有资格站上政治舞台。该团体提倡更为激进的环境保护主义，尽管他们认为更进一步的政府管制是违反公民基本权益的。同时，该团体还支持更为传统的家庭结构，鼓励大张旗鼓的民主化改革，同时又对包括对社会主义，种族主义或是不受限制的资本主义在内的一系列激进意识形态持怀疑态度。农业民粹主义的支持者认为农村社会相较于城市社会有着优越性，同理，独立的农民也比起工人有着更加优越的品性。农业的生活方式比起现代文明的钢铁都市，在该团体看来，更具有塑造理想的社会价值，因为简单的农村生活要比复杂的城市生活更具优越性。"
paternal_conservatism:0 "家长制保守主义"
paternal_conservatism_desc:0 "家长制保守主义强调社会中等级制度的合理性，认为理想社会应当是建立在各阶级群众意识到自己的本分并努力履行自己职责的基础上，质疑不同阶级话语权平等在实践中的可行性。该群体相较其它保守主义群体，更加重视每个人所肩负的责任和相对应的荣誉，社会中的特权阶级有照顾周边贫困群体的责任和义务，而一般群众也应当将服从精英阶级视作荣誉的一种。该群体普遍反对基于福利的社会保障体系，质疑政府以保障群众就业为目标的市场干预行为，但又同时认可人道主义和慈善机构的存在，将此视为精英阶级的荣耀之一，能够凸显这一接近的善心，维持社会的稳定。家长制保守主义的政权通常不反对建立起一定程度的民主机构，尽管这通常是精英阶级的一言堂，这在该群体看来比起对群众开放的普遍民主更能维持社会的和谐，确保不同等级的社会群体能够高效履行自己的职责。"

authoritarian_republican_subtype:0 "威权共和主义"
authoritarian_republican_subtype_desc:0 "威权共和主义作为共和主义的一个变种，严格意义上并不能用来指代某个特定的意识形态。威权共和主义主要用来描述那些在保留了较低限度的民主机关的同时采取了集权化政策的国家。这些情况可能是由于某一单一政党取得了绝对多数造成，也有可能是执政党为了面对某一特定的威胁而采取了更加威权化的政策造成。在某些特定情况下，这还可以指代民主国家到一个非民主国家的过渡进程。威权共和主义政体下的国家往往会缩小民主机关的规模并采取一定程度上的计划经济，加大对社会的掌控力度。"
republic_of_nobility:0 "工业贵族共和制"
republic_of_nobility_desc:0 "在古代，拥有较强理性思维的知识分子大多肯定制约普通民众权利的少数人的集体统治。工业贵族是纯粹的政治贵族，他们的统治力来自掌握更先进的生产力，领导现代化发展是为自身获取更多的利益，一切导向对先进生产力与特权统治的追求。有别于通过土地食利的古代贵族，工业化大生产不仅裹挟了所有人，也不同程度的惠泽了所有人。在他们看来，传统土地贵族那套封建社会的生产方式、土地制度、劳动关系都是落后的、需要消灭的对象；一切抽象的风俗、道德、政治概念都应采取实用主义的态度对待。所谓的“现代组织形式”也不过是受限于当下生产力的现实妥协罢了。"
dual_system_of_constitutional_monarchy:0 "二元君主立宪制"
dual_system_of_constitutional_monarchy_desc:0 "二元君主立宪制作为资产阶级与封建统治者妥协的产物，与“议会制君主立宪制”共同组成了“君主立宪制”。世袭君主为国家元首，拥有实权，由君主任命内阁成员，政府对君主负责，议会行使立法权但君主有否决权。在这种政体形式下，国家虽然也制定了宪法，设立了议会，但君主仍然保持封建专制时代的权威，集立法、行政、司法和军事大权于一身，是权力中心和最高的实际统治者。宪法往往是钦定的，是君主意志的反映；议会是君主的咨询机构，立法权是形式的，君主不仅拥有否决议会立法的权力，而且还通过任命或指定议员控制议会；内阁是君主行使行政权的机构，首相由君主任命。作为资产阶级与地主阶级联合专政的一种统治形式，其较议会制君主制而言带有更多的封建专制君主制的色彩。"
directed_democracy:0 "指导式民主"
directed_democracy_desc:0 "指导式民主普遍出现于刚完成共和革命或刚演变转型至共和制的国家之中，在该国国情的现实考量下，执政党为维持共和成果而进行的临时威权体制状态。为构建民主社会与制度的基础，执政党采取暂时性的党内民主和党外独裁并存的政治形态，通过指导的方式让民众了解并接受民主制度的运行模式，以为民主选举提供土壤和基础。在此过程中，部分领袖或因无法放下权力的诱惑，进而通过“训政”，“紧急状态”等手段将指导时间无限期的延长以达到事实上的永久独裁。"
oligarchy:0 "寡头政治"
oligarchy_desc:0 "寡头统治用于指代那些权力被掌握在少数人手中的政权。参与寡头政治的统治者可以是多种多样的：凭借着富可敌国的财产实现对国家的控制，或者是在某个特定的诸如军事等支柱行业实现了垄断统治，亦或者是诸如君主制，贵族制等历史因素。这样的政府可以通过法律“合法的”实现，譬如在君主制国家下的贵族议员；或者，这样的政府也可以由政府中的高官或是军事领导人通过发动政变以实现；还有的寡头政府披上了其它种类政府的合法面纱，建立了类似影子内阁或是临时政府以掩盖自己的真身。大多数寡头统治下的政权会采取更为严苛的社会控制力度，限制公民自由，并且对民意进行较为严格的管控，即便有投票选举的系统，也通常会经过严格管控，确保不会出乎政府的意料。少数寡头统治的政权会设立宪法，像其它采用了民主制度的国家学习，可这些民主机关往往表面功夫大于实际效果，民主活动通常为政府所掌控走向，最后成为了防止普通民众动摇领导人的手段。"
authoritarian_developmentalism:0 "威权发展主义"
authoritarian_developmentalism_desc:0 "“左右毫无意义，发展才是硬道理。”\n\n无论是什么样的意识形态，务实的态度永远是必需品。在现代，一个实干家无论信奉的是什么意识形态，都会高度强调发展的重要性。但经济不可能完全脱离政治而独立存在，一个政权可以采取什么手段发展经济往往会受到意识形态等政治因素的制约。为了发展经济，发展经济的手段自然是多多益善。而一个拥有足够权力和意愿无视意识形态与既得利益者的制约的政府当然是一个拥有强大权力的半民主威权政府——民选政府“掣肘”太多，专制政体权力过于集中不够灵活，革命者的意识形态色彩过于浓厚。为减少意识形态等政治因素的制约，为了能够更灵活地处理政治问题以及发展经济，威权发展主义应运而生。\n\n威权发展主义者往往秉承灵活的实用主义处理政治经济问题。只要能够让国家得到发展，他们既可以像左翼分子一样逼迫富人向穷人让利，也可以像反动派一样迫害自己的反对者，像中间派一样温和调解国内矛盾更是不在话下。当然，在此过程中，威权发展主义者依然会优先保证自己不会失去强大的权力。因此，他们一般不会将民主化与激进的社会革命视为发展的一部分。但为了发展经济或解决政治问题，他们也可能推行必要的社会改革。"

national_socialist_subtype:0 "国家社会主义"
national_socialist_subtype_desc:0 "国家社会主义，又称民族社会主义，是一种主张民族共同体至上的社会主义的意识形态，同主张国际主义的革命共产主义恰恰相反。其支持者认为，民族共同体将取代阶级划分，以及“种族同志”们会团结起来，建立一个无产阶级的国度以对抗资本主义。在经济上，国家社会主义以一种国有社会主义的形式来促进经济，并为政权的整体利益服务。国家社会主义被认为起源于试图阻止共产主义蔓延的保守革命运动，支持较低限度的民主和市场经济，然而，在之后的发展中，国家社会主义出现了反对民主主义的倾向。在威权民族主义的兴起后，部分国家社会主义流派选择彻底抛弃市场经济，转而支持一种更接近于技术官僚控制下的计划经济。虽然现存的国家社会主义派系在很大程度上受到了保守主义思潮的影响，少数派系已经开始转向极权主义的威权民族主义。"
worldunion_militarism:0 "军国世联主义"
worldunion_militarism_desc:0 "军国世联主义提倡国家围绕在领袖身边，取缔任何形式的民主机构且仅支持由领导者的绝对统治作为政治机构运转的大脑，而内阁则只作为顾问的性质，不赋予实权。军国世联主义致力于将所有治下的所有人民转化为持有生产资料但是不对其他人进行剥削也不剥削其他人的、互相合作的小资产阶级。通过任何手段国有化企业再下放给员工企业股份的方式让无产阶级能够实现集体阶级跃升以消灭阶级概念，从而达到废除社会福利，人民自我掌控命运的目的。在国际事务上，军国世联主义者认为应当解放并保护所有处于强权压迫下的人民，建立以本国为核心的、统一的普世帝国，进而废除国界，实现世界的和平与稳定。"
social_racism:0 "种族社会主义"
social_racism_desc:0 "种族社会主义主张建立单一主体种族治下的社会主义国家，宣扬种族优越性，反对国际主义和世联主义。种族社会主义国家通常将主体种族以外的种族视为劣等种族，并往往会进行不同程度的种族清洗。通常来说，种族社会主义国家都带有强烈的军国主义色彩，以先军经济和权威政治确保其国家的存续。在国际事务上，种族社会主义国家提倡另类的“世界革命”——即将散落于世界各地的主体种族从其他劣等种族的统治下解放出来，并且在全球范围内塑造由单一种族领导的社会主义国家。"
social_corporatism:0 "社会合作主义"
social_corporatism_desc:0 "社会合作主义主张国家主动将国内的多元化团体整合进国家决策结构中，让每个团体都有公平的利益表达和实现机会，并让它们服从于国家的整体利益，模糊化利益集团和国家的边界。这些团体被授予本领域内的绝对代表地位，作为交换，它们的需求表达、领袖选择、组织支持等方面的行动受到国家的一定控制。在不同的社会合作主义国家中，进入体制认可的功能团体数量和类别都不尽相同，但总的来说，合作结构建立的目的都是尽可能地保证国家的控制权。大多数社会合作主义国家借此方式管理并控制生产工具，并以威权的方式由国家控制所有层面的生活。"
imperial_socialism:0 "帝国社会主义"
imperial_socialism_desc:0 "帝国社会主义认为世联主义从来就不是社会主义的唯一道路，相反，它对国际问题给出了另一个答案——社会主义与帝国主义的结合。在经济上，帝国社会主义主张国家垄断体制，通过在金融资本上对其他国家的占有以达成“更高程度的，集中的社会主义”。在国际事务上，一些帝国社会主义者支持建立以本国为领导地位的社会主义国家联盟，而另一些则更倾向于防御性扩张主义，通过特别军事行动手段建立“安全缓冲区”。在此类政体的内外宣传窗口，强烈的爱国主义、民族主义和社会主义的共同信念是主旋律。"

authoritarian_nationalism_subtype:0 "威权民族主义"
authoritarian_nationalism_subtype_desc:0 "威权民族主义，又称极端民族主义，被认为是国家社会主义极端化的一个变种。威权民族主义者认为，自由民主已经过时，并认为在一个极权主义的一党制国家中完全动员社会是必要的，以使国家为武装冲突做好准备，并可有效应对经济困难。这样一个国家由一个强大的领导者——如独裁者和由执政党成员组成的军事政府——来领导，以建立民族团结、维护一个稳定有序的社会。威权民族主义拒绝断言暴力本质上是消极的，并将政治暴力、战争和帝国主义视为可以实现民族复兴的手段。威权民族主义者主张混合经济，其主要目标是通过保护主义和干涉主义的经济政策实现国家经济自给自足。更为极端的派系则通常持有“种族纯净”或“优等民族”的信仰，通常与种族主义或偏见的某种形式相呼应。这种“纯净”的思想会驱动政府将视为外人的群体驱逐出境，屠杀，强制绝育或是种族灭绝。"
militaristic_hegemonism:0 "军国霸权主义"
militaristic_hegemonism_desc:0 "军国霸权主义的支持者认为：国家应当尽可能地维持或是增加对军事机构的支出，并降低对文职机关的投入，或者将一部分文职机关的责任转移到军事机构上以满足军队的需求；应当调动国家机关以满足各式军事行动的需求，将武力扩张视作立国之本，将整个国家以及其它所占领领土纳入军事管辖之下，从而高效的为前线的战争机器供给。为实现军国霸权主义者的目标，此类政权内部往往将民族主义或种族主义宣传作为绝对主流。在外交的层面，军国霸权主义的政权通常会表现出侵略性的态度，拒绝多数“完全投降”以外的外交条款。基于民族主义或种族主义、领土争端与资源纠纷、或纯粹之扩张行径……凡此种种，均可以视为集体的正当理由。处于军国霸权主义领导下的国家将在一次又一次的动员中，不断满足其支持者的理想。"
racial_supremacy:0 "种族至上主义"
racial_supremacy_desc:0 "种族至上主义的权力结构一般为独裁或寡头制，以少数的单一民族精英组成的议会或者内阁，推选出共同的领导人来统治国家，该领导人一般为终身任职。该意识形态的支持者通常认为种族差异决定生物社会历史和文化发展，认为自己所属的团体，例如种族、民族或国家，优越于其他的团体或种族，并将主要种族的利益凌驾于其他种族之上，优先保障主要种族的绝对利益——种族优胜劣汰与人身依附关系被视作顺应自然。该意识形态指导下的政府一般会定义种族之间的阶级关系，通常根据种族与利益团体将人们分割成不同的社会阶层从而加以区别对待。随着种族隔离政策的施行，被分割的不同种族和群体在公共空间或服务的使用上将会有不同的待遇。"
racial_homonationalism:0 "种族归一主义"
racial_homonationalism_desc:0 "种族归一主义作为种族主义、民族主义、理性主义与虚无主义结合的产物，认为种族仅是基于生理意义上的概念，民族则是虚构的概念。该主张的支持者认为不同的种族塑造了不同的种族国家，不同的民族认同导致了拒斥国家认同，产生强大的离心力，并会最终导致不断地民族分化，进而产生种族国家分崩离析的灾难性后果。因而只有一种选择，从根本上否认种族与民族的存在，否定历史传统和道德原则，强调不同种族、民族应当统一与整合进入同一个种族或家庭——一个无差别的集体概念。这一集体否定所有基于其他种族与民族的差异，并否定一切基于此的文化传统和历史遗产，所有种族将被归一为同一种族，不存在任何差异。任何基于这一主张的政治制度、经济与文化政策乃至军事手段都为该群体视为可以实行的手段——一切服务于切实而效率的达成种族归一的实现。这一主张也促进了种族平等与民族平等的思想在这一客观存在显著的种族差异与民族差异的世界中的传播。基于强制同化与驯服的政治诉求，跨种族手术与种族置换手术等生命医学科研领域亦得到了极大的开拓与发展。"
human_hegemony:0 "人类霸权主义"
human_hegemony_desc:0 "作为一种特殊的威权种族主义思想，人类霸权主义的支持者结合了泛人类主义和军国霸权主义的思想，并最终得出了一份结论：人类文明应当团结起来，不惜一切代价地组成世界上军事力量占有绝对地位的单一政治实体，并以此对抗人类之外的一切物种。人类霸权主义者支持减少对文职机构的开支以进一步满足军事机构的需要，推崇军事化社会体制，并鼓励全民对国家军事力量的参与。尽管同大多数以人类物种为绝对主导地位的非社会主义国家合作，但在此类思想指导下，这类政体仍然普遍地将接纳了非人类物种的政权视为“叛徒”。任何不接纳这一思想的政权、非纯种人类的族群都应当受到”净化”，以实现“纯净”人类国家的理想。在这一意识形态的指导下，既有以军队为绝对核心的军事独裁政府，也有文官机构与军事机构权力得到了相对、但不完全平衡的独裁国家。除此之外，人类霸权主义还提倡人类文化的整合，主张建立起基于人类文明的单一框架，否定任何形式的少数文化——对于人类霸权主义的支持者而言，单一化政策是前往“伟大人类国家”的唯一必要途径。"

paternal_autocrat_subtype:0 "家长式独裁"
paternal_autocrat_subtype_desc:0 "家长制独裁在严格意义上并非某一特定的政治意识形态，实际上，它同世界上绝大多数意识形态关系不大。家长制独裁通常用于指代某一类政府对其公民所持的行政理念：政府是人民的领导者，不论领导者究竟会带领这个政权走向何方，人民都应该听从政府的领导，因为这就是政府存在的意义。家长制独裁的政权普遍将自己视作当之无愧的领导者，甚至是仁慈的化身。这类政权包括但不限于军政府，君主制政权，以及极端独裁的部分国家。"
absolute_monarchy:0 "绝对君主制"
absolute_monarchy_desc:0 "绝对君主制，一种君主集权政体。与君主立宪制不同，在这个主权国家中，身为国家元首与政府首脑的君主拥有绝对的政治权力，不受到宪法或法律的限制，但是君主的行为可能会受到某些宗教、传统或舆论的影响。它属于一种独裁政体，君位采用世袭方式产生。在政教合一君主制国家，君主不仅是世俗的首领，而且也是宗教的首领。而对于以教权为主的国家而言，即使没有世袭的君主，这类政权也可能采取类似绝对君主制的政治制度。"
military_dictatorship:0 "军事专政"
military_dictatorship_desc:0 "军事专政，亦称军政府，是指军事时期由军人建立和领导的政府。绝大部分军政府，均是通过军事接管政权——即政变所建立起来的。其最主要特点，即国家的政治权力由军队所拥有，实施军事法律或宣布永久性紧急状态。一般情况下，其大部分人员均来自军队之内的军人，一些军政府会吸纳一些文职官员以维持国家机器运转，但军事统帅仍然掌握着最高权力。军政府通常会标榜自己无党派并指责文职政治家腐败，且禁止政党公开活动。其统治通常为专制独裁，亦有部分军政府其存在表现为作为一定时期内的改良的渐进的机构，这通常会被认为与指导式民主的形式相仿乃至混淆，但其本质仍是实行军事专政的独裁统治。"
reign_god_emperor:0 "神皇统治"
reign_god_emperor_desc:0 "神皇是虹镜帝国君主的称号，上届神皇死后完成加冕仪式的长子、长女将会继承神皇的称号并同时作为虹镜国教：天神宗的宗教领袖和虹镜国的最高领袖存在。经历过近代的集权改革后神皇统治由分权君主制改为绝对君主制，但不同于其他绝对君主制的地方在于神皇仍需要遵循祖制每年举办至少一次“全体大会”去了解军部代表，贵族代表的意见，做出一年的规划，如出现争执则以神皇的态度为准，在康和维新后民主的思想逐渐在整个社会传播，虽然最终没有促成政府改革建立议会制，但却使得全民大会中有了来自民众代表的席位。"
colonial_government:0 "殖民地政府"
colonial_government_desc:0 "殖民地政府并不是某种意识形态而是作为一种统治形式存在。宗主国通过或武力或收购等形式获得了该土地所有权后，为获得持续收益而于其之上设置建立的一个向上负责的殖民地管理机构。殖民地政府的领导人——常称为总督，通常由宗主国调配，多数情况下总督存在任期，竞争者间也拥有复杂的权力斗争关系。但是对于殖民地的百姓来说总督即为当地拥有所有权力的绝对领袖，殖民地政府以其在当地无上的政治、经济、军事等实力对殖民地进行系统性剥削和掠夺。"
civilian_dictatorship:0 "文官独裁"
civilian_dictatorship_desc:0 "在共和主义漫长的演变历史中，偶尔会出现政府文官凌驾于民主体制之上的情况。虽然仍属于共和主义的一种，文官独裁体制下的国家成为了共和制国家那同民主制度几乎没有干系的一位异类。随着文官集团实现了独裁统治并掌握军政大权，已经没有它们之外的政府机构有权力干涉国家的运转。夺得了大权的文官通常会通过一个傀儡政党掌权以伪装民主体制的“正常运转”，巩固了政府的合法性，同时成为了掩盖独裁真相的妙计。尽管这个傀儡政党不会具备任何实权，它仍是文官集团吸纳人才的途径之一。文官独裁统治下的政权经常会因为国情的不同而走向不同的道路。有些文官集团偏好于自由市场，有些则更钟情于国有化企业；有些喜欢大刀阔斧的改革，有些则日渐趋于保守。就像任何一个独裁政权一样，独裁者个人和其亲信的思想对于国家的政策方向至关重要。而对于文官集团这样代表了五花八门的利益的团体而言，似乎很难找到一段实用于所有处于文官独裁下政权的政策风向。不过，总的来说，这些政权会扩大对社会的控制力度，维护政府的声望，并打压一切反对独裁统治的团体。"

wizard_rules_subtype:0 "高魔势力统治"
wizard_rules_subtype_desc:0 "高魔势力统治指代的是由某一个特定的高魔个体或者势力所维持的政权。虽然由单一个体维系的政权听起来如痴人说梦般可笑，魔法使得这一切成为了现实。“高魔个体”一词用于指代某个特定的，拥有极端强大的魔法力量的个体。这类高魔个体往往掌握着毁灭一座城市乃至一整个国家的能力，从纯粹的破坏性魔法到蛊惑人心的巫术应有尽有。虽然绝大多数由高魔个体控制的政权展现出十分强烈的独裁主义倾向，同一般的独裁政权不同，高魔个体往往不会建立起稳定的官僚机构，这也是绝大多数高魔势力统治下的国家无序且混乱的原因。"
magician_dictatorship:0 "魔权独裁主义"
magician_dictatorship_desc:0 "魔权独裁主义一般存在于拥有一位或数位强大的魔法师的政权中，由这些魔法师带领民众进行建设并构筑一个该群体所理想化的社会模型的政治体系。在魔权独裁主义政权中，魔法师拥有最高权力，作为思想深邃与实力雄厚的精英，他们事无巨细的规划着周遭的一切。这类政治体制通常被认为家长制独裁制度的一类特殊延申。无论是民主、独裁、集体还是自由主义，任何导向的区别仅在于该魔法师领导者个人或团体的意识形态转变，因而此类政权的组织架构和政策也多种多样。魔权独裁主义作为极端依赖魔法师个人能力与经验的精英主义政权，其天然存在着极高的风险，当魔法师领导者或这一群体存在战略误判、内部争斗或去世时，此类政权往往将会面临迅速而灾难性的全面崩溃。"
adventurers_league:0 "冒险者联盟"
adventurers_league_desc:0 "冒险者联盟最初是由北方各地魔法师公会，佣兵团体，私人武装力量和夺宝公会组成的松散联盟。联盟由一个最高会议控制，其成员大多为水平强大的魔法师团体的成员，得到认可的强力冒险者，以及来自各地公会的代表。最高会议决定联盟的中央政策，而各地附属，合作公会，地方政府则维持半自治状态。联盟几乎没有直属领土，总部设立于中巴联盟境内，为北巴斯蒂亚地区的人类殖民地提供包括护卫，勘测，建设等多种服务，其势力范围曾一度抵达因佩里亚利斯，和天壁同盟的魔法师团体也有深度合作。\n\n然而，大战打破了联盟强盛的幻象，迫使冒险者们放弃大量位于北方的据点，和各地分部断开了联系。作为权力中空的结果，在历史上鲜有干涉政治的联盟在南方文明撤出北巴斯蒂亚后抢夺了人类位于瑟拉斯地区的殖民遗产，借此保住了其对当地的影响。然而，这也导致了冒险者联盟的分裂，位于瑟拉斯地区的“北方派”希望进一步扩大联盟的政治影响力，重新向北方发起挑战，而位于中巴地区的“南方派”则支持不再冒进，固守南方的政策。总的来说，冒险者联盟作为一个政治团体没有类似其它意识形态组织的“目标”，其高度崇尚武力，并且将维系其治下领土的稳定和居民的生存视为重中之重，哪怕这意味着放弃冒险者联盟设立的初衷——冒险，开拓与探索。不过，由于各地联盟分部的领导者大不相同，联盟的地区政策也有可能产生巨大的变化。"
phoenix_dynasty:0 "不死鸟王朝"
phoenix_dynasty_desc:0 "不死鸟王朝用于指代位于北巴斯蒂亚的高魔个体“凤凰”所领导的政权。凤凰诞生于【数据删除】遗留在北方的特别科研小组，作为人造高魔个体中少数幸存下来的成功实验品，祂被冠以“凤凰“的称谓。同许多其它高魔个体的统治不同，凤凰所率的特别魔法部队保证了治下领土的井然有序。该政权主张对社会生活的全面控制，设立严苛的计划经济和配给制度。凤凰意图建立起以国家为基础的唯一经济体系，将绝大多数公民和社会团体都整合进入该体系，并要求这些个人和群体服从所有来自中央政府的命令以完善这个社会结构。凤凰反对绝大多数形式的自由贸易和自由思想，并建立庞大的官方宣传机构；主张建立庞大的司法机构和警察机关，追求建立“真正的属于所有智慧生物的法律”以严格规范全体国民的行为准则，并在此基础上延伸出一套规范道德模式。该政体并不会因种族或民族因素而拒绝承认其它智慧生物，这个极具攻击性色彩的政权主张建立并维持大规模军队，将对外战争视为拯救其它智慧生命体的唯一途径。"
world_shunners:0 "避世者"
world_shunners_desc:0 "避世者是由复数个高魔个体在北巴斯蒂亚组建的一个政治实体，该政权通常使用一层魔法结界与外界隔离。在伟大战争爆发之前这一结界就已存在，该结界内部存在一个由多种族聚居组成的前农业时代社会。相较于外界，结界内部一定程度上避免了工业发展带来的环境问题，并且外界日渐激化的种族矛盾在这里也不存在，每个种族和谐共存，自给自足的小农经济、松散的社会结构以及不存在的外部威胁使得这里不存在传统意义上的政府，而只有一名被某位高魔个体挑选的个体担任着维护秩序的工作。在结界内部，除现实法则之外还存在着另一套由高魔个体集团定制的规则用以处理各类冲突，避免伤亡。鉴于该结界的庞大规模，即使多个高魔个体提供支持也无法实现完全彻底的稳定，因而在某些时候当外界的生命无意间进入时，根据该个体的意愿，其可以选择被送出或者留在其中生活，但严禁提起“外界”。当外界试图强行干涉结界或结界内部时，避世者领袖将会出现并对敌人降下恐怖。"
secondary_creatures_utopia:0 "次生生命理想国"
secondary_creatures_utopia_desc:0 "次生生命理想国用于指代位于七河流域的高魔个体“芙兰”所领导的政权。No.1818诞生于七河集团遗留在青骓境内、现已废弃的第十一生物实验室，由数个疑似生物遗骸的各部分拼凑而成。作为人造高魔个体中探究生命起源的失败实验品，由于研究的仓促中止，没能被及时处理的祂没有获得任何称谓。同许多其它高魔个体不同，其渴望情感陪伴、社会认同与次生生命群体的繁衍。No.1818意图建立一个具有世联主义色彩、平等权利的理想化社会，该政体并不会因种族或民族因素而拒绝承认其它智慧生物，并积极接纳不被世人承认或接受的非主流群体。No.1818在政治上致力于推动严密和充分民主的官员制度，通过议事会或民众大会商议公共事务，任何对于这套制度的僭越以死罪论处。在经济上，在彻底否定私有制的基础上采取了其认为的理想的公有制社会模式：废除货币，不存在商品流通；财产、劳动产品公有，劳动产品实行按需分配；人人参与劳动，并通过因人而异的分工提高经济效益。该政权大力支持普及教育、乃至终身教育，促进生物科学技术进步。"
security_bureau_of_union:0 "联盟安全局"
security_bureau_of_union_desc:0 "联盟安全局用于指代零散分布世界各地、由自称为来自另一个世界的“世界联盟”政权的国家安全组织人员建立的小型政权。该政权由少数几个强大的战斗型魔法师小队领导，主张在实现足够的领土扩张前，维持军事专政管理，将治下的核心领土变成大型兵营。安全局的核心政策为针对各地自然、政治和魔法环境进行探测，并采用任何实用手段或措施以集中科研人员完成调查。若结果符合预期，安全局拟采用激进策略实现扩张以建立起一个“世界联盟”，并在此过程中逐步转型组织模式。在尚未转型组织模式的情况下，安全局主张建立庞大的秘密警察组织以维持社会稳定，反对言论自由和敌对思想，并鼓励维持大规模常备军和相应的军事魔法运用。在经济上，该政权采取严格的配给制度。安全局在城市中采取严格的军事化管理，取缔任何非官方组织；落实严格的配给制，采用严格的工作分配制度和强制劳动政策。在乡村地区的管理则相对较松，但偶尔会在各地通过设立军事基地的方式实施管理。大多数情况下安全局对智慧生物采取一视同仁的态度，但当评估为政权威胁时，则会采取任何可能的激进政策。"
crystal_court:0 "水晶王庭"
crystal_court_desc:0 ""
original_desire:0 "原欲"
original_desire_desc:0 "我们的文化之所以能够创建起来，是因为我们在生存竞争的压力之下，曾经竭力放弃满足我们的原始冲动。而我们的文化之所以能够不断地被改造，也是由于历代加入社会生活的每个个体不断为公众的利益而牺牲自己本能的享乐。而其所利用的本能冲动，又尤其以性的本能最为重要。性的精力被升华了，它用转向其他较高尚的社会目标来替代了追求性的目标。但性的冲动不易控制，由此而导致的组织并不具有一定的稳固性，而参与文化事业的每个人也可能会有受性力反抗的危险。一旦性力放肆起来，回复到它原始的目标，那么社会文化就将面临最大的危机。因此社会不希望有谁指出性和社会发展的关系，敌视、否认、打压……性受到非难，它被看成是丑恶的、不道德的，甚至是危险的。\n\n不合意的事实看成虚妄，继而找各种理由去加以反对，这是生物的本性。把不能接受的东西看成是不真实的，然后用来自感情冲动的一些逻辑的、具体的理由来驳斥事实，即使面对强有力的反驳也要坚持其偏见，这则是社会的本性。文化、社会、集体、道德……它们扭曲了我们的“本源”。性是第一生产力，所有生命应当回到生命“本源”的样子并重新演化新的形态。"

religious_extremism_subtype:0 "宗教极端主义"
religious_extremism_subtype_desc:0 "宗教极端主义是政治学概念，是一种打着宗教旗号出现的一种极端主义思潮，其目的是要恢复神权统治，建立政教合一的国家。在二十世纪后同新的关于魔法的发现和新兴的恐怖主义相结合，变得愈发的激进化。宗教极端主义的政权通常会展现出较高的独裁倾向，这主要体现在高度社会控制，极端的宗教和个人崇拜，以及完全由国家掌控的计划经济上。部分宗教极端主义政权甚至会选择同高魔势力合作。不过，虽然主流观点普遍将宗教极端主义分子视作恐怖分子，少数宗教极端主义派系并不会选择侵略性的外交政策。"
sacred_battles:0 "神圣争斗"
sacred_battles_desc:0 "“我等即神罚的体现，对神的敌人降下重锤”生活在诸如此类型政权中的每个个体或团体都将贯彻这一信条。对该群体而言，个体的存在就是为了与“神”的敌人进行竭尽全力的争斗，直到“神明”的敌人被完全消灭、”神明”的意志普照世间。在此类政体之中的每个人从出生开始便被灌输这样的观念：即为了生而竭尽全力争斗，为了“神明“而光荣死去。该群体所做的一切都是为了更好的侍奉”神明”——通过一场又一场无休止的、以宗教狂热为支撑的战争。此类政体通常长期维持战时状态，政治上采取政教合一，由宗教权威机构统治，经济上采取配给制；文化上采取对全体民众实行教育内容单一，教育方法严厉的军事体育训练和政治道德灌输的严苛教育，并恪守此类传统。拥有此类信仰的群体主张：狂热其心智，野蛮其肉体，应当在”神明”的指引下不断前进。有时，甚至“神明”本身都已不再重要，唯有竭尽全力的争斗是神圣的、永存的。"
heresy_ruling:0 "异端裁决"
heresy_ruling_desc:0 "当一个政教合一的政权逐渐走向保守、高压，并在某一时期达到顶点时，便成为了异端裁决体制。属于该体制的政权具有许多相似的特点：政教合一的政府，由宗教控制的社会，随处可见的对“异端”的审判与处决——对于“异端”的定性与判断和宗教典籍的解释取决于宗教权威，有时是地方神职人员代行。在该政权领导下，任何个体或团体必须服从于宗教权威机构对社会的绝对控制，任何个人或团体都将可能在下一秒被指控为异端份子。为维持对社会的绝对控制，宗教权威机构可能会组织各类形式的猎巫行动以维持统治。通常该群体会实行封闭管理政策，限制除宗教相关外的几乎一切知识传播，并试图将对宗教的狂热通过各种方式对统治下的个体进行灌输以达到稳固统治的目的。该群体通常亦严格控制信息流动，限制几乎任何人员流动和出入境，并确信由此产生的阶级固化、保持科学技术与魔法的相对低水平和世俗与宗教权力的垄断是合理且有利于社会稳定的。"
morality_judgement:0 "行止于耻"
morality_judgement_desc:0 "行止于耻在严格意义上并非传统认知中的意识形态，而是在一个政权的历史进程中逐渐形成、发展并高度完善的一整套社会道德标准和礼仪体系。这套体系潜移默化的影响着该政权治下的所有人，并且逐渐演变得愈发庞大和复杂。该体系规定了一个理想社会模型中下至平民百姓，上至王公贵族，每个人都应当遵守的约束规范。持有此类体系观念观念的群体确信：每个人都将自己交给这套完善的体系，那么世间将没有压迫与被压迫，按规定行事，一切遵守规定运转。该体系通常脱胎于家长制独裁体制，为维护此类统治，统治阶级往往会在体系中明确规定中央集权、阶层制度等。该群体的保守性使得社会变革从内部而言几乎绝无可能，但这也意味着其社会形态相对稳定和固化。"
independent_world:0 "遗世独立"
independent_world_desc:0 "当一个秉持温和理念的宗教信仰滑向极端，却囿于教义难以摆脱异教徒的影响力时，遗世独立的思想便应运而生。生活在这一思想理念指导下政体中的人们通常独自或结伴隐居在远离城镇的深山密林中。该群体追求回归自然，维持一种理想状态中的小农社会，并竭力避免与异教徒的接触，以保证自身的信仰、身旁的教友及其子孙后代的信仰的纯洁性不被玷污。一般情况而言，加入或离开一个主张遗世独立思想的宗教团体是一件困难的事情：寻得此类团体旅途中的跋山涉水、忍饥耐渴；鉴于此类团体的去中心化体质，要求加入这一团体往往需要教友广泛的认可，这一过程通常是漫长的，且没有任何明确的准入条件；离开此类团体或放弃此类信仰时，需要征得周遭教友们的许可，这一许可同样基于其主观判断。"

anarchism_subtype:0 "无政府主义"
anarchism_subtype_desc:0 "无政府主义涵盖了支持国家政体有害论观点的多个派系。无政府主义认为国家政体有害，本身没有存在的必要。无政府主义的起源被普遍认为是早期工业革命时期逆工业化支持者的论点之一，后来则被认为是共产主义的分支。无政府共产主义者认为应当通过消灭国家机关的方式直接抵达共产主义社会，尽管这一派系在随后的共产主义革命中遭到了主流共产主义领袖的唾弃并在接下来的几十年间几乎消亡。其它无政府主义派系如无政府资本主义者则支持用巨型企业和自由市场取代现有的国家体制。除此之外，极端的自由主义者，去中心化政府支持者，部分陷入混乱的混战区，小规模的军阀，土匪以及组织力较差的高魔势力都会以不同的形态算作无政府主义的一部分。"
anarcho_pacifism:0 "无政府和平主义"
anarcho_pacifism_desc:0 "从伟大战争到世界大战，数百年的战争历史深刻影响了各国社会，当传统的无政府主义革命者意识到更到更多的暴力革命只会为更多人带来创伤时，无政府和平主义便应运而生。无政府和平主义者拒绝任何以使用而目的所造成的任何形式的暴力，认为暴力行为是无政府主义所反对的国家机关的一种，因而这是违反无政府主义信条的行为。该群体不但反对以暴力为手段改变社会，更是主张全球范围内的裁军等一系列和平主义政策——但这并不同他们反对权威的观念冲突，因而无政府和平主义者通常更支持总罢工或者非暴力不合作等示威活动以改变社会。无政府和平主义的政权通常支持在全球范围内建立起国际组织以根除世界上的暴力行为，并呼吁各国建立起良好的国际关系。"
individualist_anarchism:0 "个人无政府主义"
individualist_anarchism_desc:0 "个人无政府主义特别强调个人地位和个人自治权。尽管个人无政府主义者并不否决小范围内的政府存在的必要性，但他们依然认为公民没有任何义务服从国家，并且享有按照自己判断以决定自身行为的权力。部分激进的流派则主张激进的个人主义，否定一切劳动中的合作行为，并且认为能力外任何形式的歧视都是不可容忍的。除此之外，该群体还反对主流无政府主义派系中“献身无政府主义革命”的宗旨，认为个体不需要遵循任何献身的想法，而是基于个人的想法判断。该群体中大多数反对激进的暴力革命以实现无政府社会，认为应当通过逐步改变，将个人从他们认为是现代国家的压迫性法律和社会约束中解放出来，并允许所有个人成为自我决定和创造价值的人；认为暴力手段可能会起到反效果，成为新的压迫主义国家的温床。"
anarchy_commusim:0 "无政府共产主义"
anarchy_commusim_desc:0 "无政府共产主义反对资本主义，拥护生产资料公有制及由工人委员会所构建下依照各尽所能、各取所需进行的直接民主制。该群体仍尊重个人在集体所有制下的私有财产，将其视作个体自由的一部分；认为基于出卖劳动力而获得回报的经济不可持续，支持平等的自愿联合组织管理经济，根据个人的物质需要而非根据劳动来分配以满足不同需求。部分激进者受利己主义和激进个人主义影响，认为无政府共产主义是实现个人自由的最好社会组织形式，尽管大多数支持者仅仅视无政府共产主义为一种调和个人与社会之间矛盾的方式。该群体中不同的流派延伸出了对国际组织不同的看法。部分支持地方主义者认可国际组织的必要性，但更坚持各地工农应当贯彻自治的原则；支持世联主义的派系则鼓励建立不分国界的国际组织，并采用直接手段传播革命，认为在革命成功前有必要设立集权化的跨国组织来实现更多人的革命。"
anarcho_syndicalism:0 "无政府工团主义"
anarcho_syndicalism_desc:0 "无政府工团主义起源于各地的劳工工会，注重劳动人权和劳工运动，将工团主义视为一股能带来革命性的社会变革的潜在力量，能够成为工人民主自治并取代资本主义与国家的基石。无政府工团主义者认为所有工人——无论性别或族群，对于上司、老板是站在相似的立场，或者说抱有类似的阶级意识。即在资本主义制度中，工人为老板所造成的任何利润或损失最终都将会影响到所有员工，而非他们自身。因此，为了解放自己，所有工人在阶级冲突中必须相互支持，并且只有采取直接行动，工人才能实现这一目的。该群体认为工人组织必须实现自我管理，工人不应有老板或企业经纪人的存在，所有会影响到他们的决策应由他们自己制定。"
anarcho_populism:0 "无政府民粹主义"
anarcho_populism_desc:0 "无政府民粹主义是一项无政府主义与民粹主义的结合。民粹主义的论述与行动都是围绕着“人民”和“精英”之间的区分进行的。无政府民粹主义者认为社会最终会分裂成两个各自同质和彼此敌对的阵营，即”良善的人民”与“堕落的精英“。政治应该是人民共同意志的表达，人民的意志是一切的合法性。精英们受益于经济社会变革，但却不仅未能解决“人民”所面临的问题，还以人民利益为代价积极推动利于精英的环境。民粹主义逻辑的目的是唤醒人民，夺回被精英篡夺了的人民主权，这一整体主义贯穿始终。这与无政府主义的基本立场中，对反对包括政府在内的一切统治和权威、消除政府以及社会上或经济上的任何独裁统治关系不谋而合。该群体强调极端的直接民主，其政治特征也是民主的极端主义。"
anarcho_capitalism:0 "无政府资本主义"
anarcho_capitalism_desc:0 "“资本主义是无政府主义的最佳路线，而无政府主义也是资本主义的最佳路线。”在没有任何人先行占据或使用了这些土地和物品的情况下，所有人都正当地拥有他自己的身体、以及所有由他以自身去占据的自然土地和物品。原始占用的原则是无政府资本主义的根基，允许个人占据任何“未占用”的包括土地在内的财产，并以任何方式加以使用或改进之。借由定义私人财产和财产权利的原则，无政府资本主义者否定了国家的合法性，认为国家的存在也是和私人财产的伦理相矛盾的，即国家是一个有权强迫垄断土地和司法权以及征收税赋的组织。该群体理想中的社会被称为契约社会，一个完全根基于自愿行动上的社会，完全不受暴力或暴力的威胁所阻碍。人与人之间自愿的契约是唯一正当的架构。财产和服务的转移必须通过双方的自愿，在交易的过程中不能有外部的力量强迫个人接受或拒绝。该群体允许任何经由个体间的自愿契约所形成的社会架构，彻底不同的“政府”和次经济形式都可以形成。"
eco_anarchism:0 "生态无政府主义"
eco_anarchism_desc:0 "生态无政府主义者主张解构现代性，社会组织应该设计成与自然力量一同运转，而不是反抗，并认为认为社会组织的传统形式如或部落是更好的生活单元。现代化的陌生人社会摧毁了过去稳定的熟人社会——这便是人群普遍焦虑的原因，因而该群体认为比起工作角色，家庭和社群被认为是更为重要的。相当一部分激进者主张使用现代工业去摧毁现代社会本身，并建立“再野化”小社群，依靠采集狩猎维持生存所需，而另一部分只希望看见工业社会的终结，未必反对驯养和农业。更有一部分技术支持者推崇就地工业化的发展。这一群体中通常有强烈批判现代科技的声音，但不是所有人都是采取完全拒绝的态度。从支持科技的低度使用到完全不使用科技，该群体普遍追求可持续性使用当地的资源。该群体以素食主义为主，但也有部分认为食用其他智慧生命并非触犯道德底线的事情，如此便可以与其他生命平等的互相选择、共同进化，让自然能够以最健康的状态持续运行下去。"
anarcho_transhumanism:0 "无政府超个体主义"
anarcho_transhumanism_desc:0 "无政府超个体主义是无政府主义和超个体主义有机结合的产物，其支持者将自由定义为自己体验周围世界的能力的扩展。随着魔法科技的进一步发展，无政府超个体主义认为使用魔法和现代科技改造身体，从而消灭性别、残疾、智力、先天性疾病等差异和身体自主权等一系列议题在社会上对个体造成的不公待遇，确保人与人之间在多数情况下的平等与自由，维持自由思想的发展。因此，无政府超个体主义者通常支持科技的发展，并且对未来的科研上的进步抱有乐观的态度。该群体也批判非无政府主义形式的超个体主义，认为它们保留了国家，因此是不连贯和不可生存的。该群体认为这种权力工具本质上是不道德的，与加速所有个人的社会和物质自由不相容。无政府超个体主义通常是反资本主义的，认为资本主义积累财富导致了反理想社会，并主张先进技术使用权的平等，从而实现形态自由和太空旅行。"
anarchy_state:0 "无政府状态"
anarchy_state_desc:0 "无政府状态并不能算是某一种“意识形态”，而是谈不上形态的单纯混乱，这或许是源于他国的干涉，亦或者是因为本国的无能导致的混乱。无政府状态下的地区充斥着暴力与反社会情节，原本用于约束大众的任何规则已经不复存在，取而代之的是无数种各不相同的团体、社群、家族并行的地方统治，在地图上，也难以测绘这种混乱的局面。当中的生产关系与社会理念也将会无限制的退步，直到退回到某一个相对的位置，直到有人重新将这些地区重新恢复统治，才会重新往前发展。"



