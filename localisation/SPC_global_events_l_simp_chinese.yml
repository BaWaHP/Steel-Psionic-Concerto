GlobalNews.1.t:0 "冒险者联盟宣布抵达北极点！"
GlobalNews.1.d:0 "近日，属于无国界组织“冒险者联盟”的南巴斯蒂亚联邦著名探险家皮尔外和他的团队宣布成功抵达位于北巴斯蒂亚的北极点。在南方局势尚且不明了的情况下，此次壮举似乎为地球说的信徒注入了一剂强心剂，同时，这也给予了由于经济萧条而情绪低落的联邦公民一些足够引以为豪的同胞事迹。\n\n虽然有冒险者联盟基金委员会的背书，皮尔外的探索行动仍由多国联合资助，其中南巴斯蒂亚联邦占据了大头，或许是因为皮尔外的祖国正是联邦。由于北巴斯蒂亚政治情形复杂，且北极点附近多为浮冰，此次北极探险已是第四次，经过了一个多月的艰苦旅行，探险团队才努力将联邦国旗插在了北极点附近。为了嘉奖他的努力，南巴斯蒂亚联邦已颁于皮尔外名誉海军少将的头衔。\n\n目前尚不知此次胜利是否会鼓动冒险者联盟重启向南方的探索计划。"
GlobalNews.1.a:0 "无尽的冒险！"
GlobalNews.2.t:0 "海啸袭击南部沿海地区"
GlobalNews.2.d:0 "来自南巴斯蒂亚联邦的新闻办公室已经证实了关于沿海地区即将爆发烈度极高的地震的传言。当地政府已下令暂缓各方沿海地区的经济活动，同时组织各地居民展开避难活动。根据当地记者报道，从沿海地区逃亡内陆的车队已达数十万人级的规模，目前尚不知南巴联邦政府对各地爆发的小规模饥荒和逃亡车队与当地民众同之间的冲突的看法及应对措施，有传言称政府已经开始动员军队。\n\n此次地震探测，南巴斯蒂亚联邦运用了最新的探测型魔法技术。虽然有流言认为这不过是联邦政府掩盖军事实验的一次作秀，并将地震的原因同近期联邦政府的秘密军事实验联系在一起，但联邦政府依然坚持声称所有探测魔法技术都将维持在民用领域，短时间内不会向军事领域转型，否定了关于秘密军事实验的谣言。"
GlobalNews.2.a:0 "天灾还是人祸？"
GlobalNews.4.t:0 "绿洲协定签署"
GlobalNews.4.d:0 "经过数个月的紧张磋商，似乎绿洲共和国终于在内部达成一致。今日，由来自绿洲协定势力圈的多个国家，包括绿洲的特别行政军区，贸易公司，来自北方的矮人国度以及西方的兽人革命流亡者组成的兽乡共和国的代表在绿洲城齐聚一堂，签署了绿洲协定。\n\n该协定成立了一个以绿洲共和国为核心的防御型军事同盟，要求绿洲共和国作为主导国负责协商各成员国的军工建设。同时，任何一个成员国遭受外部攻击时，其它成员国有义务加入战争保护遭受攻击的绿洲协定成员国。虽然也有条目指出各成员国开放彼此间的国境，免除关税并免除签证，开放公民自由通行，绿洲共和国发言人在新闻发布会上特别指出：“绿洲共和国无意愿出于国防义务外的情况下干涉他国内政。”"
GlobalNews.4.a:0 "报团取暖，未尝不可？"
GlobalNews.5.t:0 "野生魔晶羊灭绝"
GlobalNews.5.d:0 "来自中巴斯蒂亚联盟的动物专家已经证明了先前关于北湖地区独特的生物，魔晶羊濒临灭绝的说法——实际上，随着最后一个魔晶羊群落已被证明遭到魔兽摧毁，除了那些被人工饲养在特殊实验室以及动物园中的品种外，野生魔晶羊已被正式宣告灭绝。\n\n魔晶羊是一种身体富含魔力，生活习性类似山羊的特殊生物。在早期人类北扩时期曾用魔晶羊的尸体作为军用魔力来源，后来因为转换效率低下，屠杀造成的伦理问题和大面积魔矿开采技术的成熟而被放弃，魔晶羊相关的产业大多转型为羊奶等民用产业。可对于来自北方的魔兽军团而言，这似乎不在他们的考虑范围内。作为少数成建制的魔兽政权之一，奥提摩军团为了维持军队补给而常常大规模捕杀魔晶羊，最终早就了今天的局面。"
GlobalNews.5.a:0 "我猜，没什么人会在乎。"
