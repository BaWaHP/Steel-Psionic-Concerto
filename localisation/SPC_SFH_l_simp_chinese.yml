SFH.1200.t:0 "南方来信"
SFH.1200.d:0 "致郑义：\n\n久疏问候，我是郑红。\n\n我就不绕关子了。你应该已经从新闻上得知，南方目前已经统一，各地叛乱也得到剿灭，远乡上下，对南北统一的呼声很高，许多民众并不希望再次爆发内战——尤其是在双方统治者是血亲的情况下。我希望你能理解这一点，尤其是在过去那么多年的战乱后。\n\n你成功稳定了北方局势，这是前无古人的壮举，相信你也因此广受尊重吧。父亲虽然不会表露出来，但你知道他的为人，他真心为你感到骄傲，无论是过去，现在，以及未来，都会是如此。你肩负的不只是你的那点自尊，而是无数人的期望。\n\n然而，你知道你的所作所为酿成的后果吗？在远乡的危难之际，你背弃我们离开，看着父亲在残酷的官场斗争中一天天老去，然后去北方当你的山头大王，杀几个土匪的头头。这对你来说就足够了吗？父亲现在身体状况是好一些了，可你知道你的行为对他造成了多大伤害吗？你知道远乡的今天有多大程度上是你一手酿成的恶果吗？看着流离失所的难民，看着城市的废墟，看着刑场上一具又一具的尸体，他们中有多少人的血是为你流的？有多少人从未与你有所瓜葛，却最终因你而死？\n\n我能从父亲的脸上看出，他仍然相信你，相信和平解决南北分裂问题的可能性，许多远乡子民也是如此。可问题是，你相信吗？对于你来说，我们真的有任何价值吗？你是把人民的利益，血脉的纽带放在更高处，还是更希望独守你的自尊？\n\n郑红"
SFH.1200.a:0 "他苦笑着，准备回信。"
SFH.1200.a.tt:0 "§O“火真大。”§!"

SFH.1201.t:0 "发信"
SFH.1201.d:0 "致郑义：\n\n久疏问候，我是郑红。\n\n我就不绕关子了。你应该已经从新闻上得知，南方目前已经统一，各地叛乱也得到剿灭，远乡上下，对南北统一的呼声很高，许多民众并不希望再次爆发内战——尤其是在双方统治者是血亲的情况下。我希望你能理解这一点，尤其是在过去那么多年的战乱后。\n\n你成功稳定了北方局势，这是前无古人的壮举，相信你也因此广受尊重吧。父亲虽然不会表露出来，但你知道他的为人，他真心为你感到骄傲，无论是过去，现在，以及未来，都会是如此。你肩负的不只是你的那点自尊，而是无数人的期望。\n\n然而，你知道你的所作所为酿成的后果吗？在远乡的危难之际，你背弃我们离开，看着父亲在残酷的官场斗争中一天天老去，然后去北方当你的山头大王，杀几个土匪的头头。这对你来说就足够了吗？父亲现在身体状况是好一些了，可你知道你的行为对他造成了多大伤害吗？你知道远乡的今天有多大程度上是你一手酿成的恶果吗？看着流离失所的难民，看着城市的废墟，看着刑场上一具又一具的尸体，他们中有多少人的血是为你流的？有多少人从未与你有所瓜葛，却最终因你而死？\n\n我能从父亲的脸上看出，他仍然相信你，相信和平解决南北分裂问题的可能性，许多远乡子民也是如此。可问题是，你相信吗？对于你来说，我们真的有任何价值吗？你是把人民的利益，血脉的纽带放在更高处，还是更希望独守你的自尊？\n\n郑红"
SFH.1201.a:0 "她愤怒地将笔摔在地上。"

SFH.1202.t:0 "回信"
SFH.1202.d:0 "致郑红：\n\n红，收到你的来信，我很高兴。距离上一次我们好好交流，已经过去多少年了？我是快记不清了。听到父亲身体健朗的消息，我感到由衷的欢喜，自从父亲身体抱恙以来，我每日忧心忡忡，盼望老人家尽快康复，同时希望你的生活不会受到干扰。\n\n我无心在信中浪费篇幅和你讨论政治问题，现在不是时候，而且，我本意从未想过要与你吵架。红，你是我的妹妹，我在这世界上为数不多的，真正可以交心的亲人，我怎么可能要和你对着干呢？请你万万不要因为气愤而影响自己的判断。\n\n我知道，现在国家上下对和平统一的呼声都很高，实际上，我也是这样认为的。在过去几十年的动荡以后，远乡现在最不需要的，就是新一轮的动荡。作为统治者，我们有义务顺应民意，也有义务帮助国家维持脆弱的和平。请你相信我，我的内心是向往和平的，只要这符合国家的利益。\n\n如果你愿意的话，我们不妨见个面。\n\n郑义。"
SFH.1202.a:0 "他把秘书叫来准备发信。"

SFH.1203.t:0 "北方来信"
SFH.1203.d:0 "致郑红：\n\n红，收到你的来信，我很高兴。距离上一次我们好好交流，已经过去多少年了？我是快记不清了。听到父亲身体健朗的消息，我感到由衷的欢喜，自从父亲身体抱恙以来，我每日忧心忡忡，盼望老人家尽快康复，同时希望你的生活不会受到干扰。\n\n我无心在信中浪费篇幅和你讨论政治问题，现在不是时候，而且，我本意从未想过要与你吵架。红，你是我的妹妹，我在这世界上为数不多的，真正可以交心的亲人，我怎么可能要和你对着干呢？请你万万不要因为气愤而影响自己的判断。\n\n我知道，现在国家上下对和平统一的呼声都很高，实际上，我也是这样认为的。在过去几十年的动荡以后，远乡现在最不需要的，就是新一轮的动荡。作为统治者，我们有义务顺应民意，也有义务帮助国家维持脆弱的和平。请你相信我，我的内心是向往和平的，只要这符合国家的利益。\n\n如果你愿意的话，我们不妨见个面。\n\n郑义。"
SFH.1203.a:0 "郑红皱了皱眉头，把信件归档。"
SFH.1203.a.tt:0 "§R“虚伪的傻逼。”§!"

SFH.1220.t:0 "北远乡局势"
SFH.1220.d:0 "北远乡的局势一直都不稳定——这是公认的事实。郑红曾经想过，如果兄长的叛逆玩笑就这样消散于北方的叛军之中，那她现在会采取什么样的行动呢？她又会如何对待自己除父亲以外，唯一的亲人呢？毫无疑问，郑义现在已经成为了远乡中央政府的威胁，他所持有的强大军队，以及统一的北方领土，绝对不是自己能轻易拿下的目标。\n\n“我不得不说，我对他的看法完全改变了。”郑钧苦恼着摇摇头，对郑红说到，“他的能力很强，绝不是当初那个意气用事的孩子，我们必须谨慎对待南北统一问题。如果冲突再次爆发，我们将面临真正的远乡内战——其规模将涉及到整个远乡国。无论如何，在社会局势尚且不够稳定的当下，这是下下策。”\n\n“也就是说，我们还是应该走和平路线。”郑红说到，她并不期望看到这一点，“哥…郑义的行为毫无疑问是叛国，我不觉得他会为了所谓‘大义’选择和我们谈判。我知道这样的想法有些天真，可无论如何，我认为我们应当做好最坏的打算。”郑红顿了顿，又小声说道，“如果他看到我们示弱了，恐怕还要在背后里笑话我们。”\n\n“红，你变了。”郑钧笑道，“你的想法是正确的，做好最坏的打算才是最好的打算。然而，你变了，他也有可能改变。无论如何，你们也是兄妹，见个面总是可以的。我…我老了，就当听我的一句玩笑话，先让一家人聚在一起看看吧。”郑钧用几乎恳求的语气向郑红说到，看着年迈的父亲，郑红感觉内心涌过一阵激流，她是因为自己的无能感到悲痛，还是为郑义的叛逆之举感到愤怒？\n\n“您说的对。再说了，国内舆论也不支持我们在没有合适理由的情况下挑起斗争。”郑红从脸上挤出一丝笑容，“我会着手准备邀请他来见个面的，希望他不要对场地有什么苛刻的要求。您放心，无论如何，我不会让国家继续分裂。”"
SFH.1220.a:0 "绕来绕去，还是一家人。"

SFH.1221.t:0 "不情愿的邀请"
SFH.1221.d:0 "办公室的一角，郑红静静地靠在椅子上，闭目养神。因为郑钧的身体好转，这段时间她的工作压力减轻了很多，可随着南北统一提上日程，她又开始失眠了。在郑钧的压力下，她已经从官方渠道组织起了在数日后的南北会谈，邀请郑义和郑钧，郑红于新园市会面，这座城市处于远乡东北部，与南北远乡政府管辖领土交界处十分靠近，可以说是相对“中立”的地区——至少比平京要好。\n\n“说到底，这只是拉不拉的下脸面的问题吗？”郑红叹了口气，任谁都看得出来，她是真心不希望与郑义会谈，“说到底，他就是自以为是到觉得自己的想法才是正道，所以才跑到北方建国的，现在让他放弃一些，实在是不现实。”\n\n然而，有些事情并不是郑红能说的算的。哪怕没有郑钧的施压，客观来说，民众之中，认为南北和平统一已是板上钉钉之事的人不在少数，郑红和郑义不合仍然是相对机密的情报——更何况，哪怕再忽视这一点，也鲜有民众会支持另一场内战。这份浪潮最终裹挟着郑红的外交政策，迫使她不得不促进和平会谈的发生。\n\n“如果他真的同意了和平统一，那么会是基于什么样的条款呢？他自己维持私兵？又或者是借此机会重新积累声望来影响平京的政策？或者干脆把北远乡划成自治区？可能性太多了。”郑红又感觉开始头疼了，“无论如何，要确保领土统一这点底线。”她暗暗下定决心。"
SFH.1221.a:0 "发出邀请吧。"

SFH.1222.t:0 "如何参与会议？"
SFH.1222.d:0 "看什么看，没写完呢！"
SFH.1222.a:0 "好。"
SFH.1222.b:0 "不好。"

SFH.1223.t:0 "郑义抵达"
SFH.1223.d:0 "满载着北远乡地区官员的客机在临时修建的新园机场缓缓落下，上百名礼仪人员围绕在机场附近，摆出一副端庄的仪态等待飞机上的乘客。郑红始终觉得这样的安排有些不够妥当，安排的工作并不直接由她本人负责，而是交给了另外更专业的顾问团，再由郑红与郑钧审核方案——对于郑红来说，她更喜欢直接让军人把代表团围起来，给那自大的蠢货一个下马威，不过这也只是妄想，毕竟不可能用这样的态度搞外交。\n\n她扭头望向父亲，郑钧只是淡淡地望着飞机落地的方向，眼神中透露出一丝忧伤。她叹了口气，继续将目光转向飞机落地的方向。\n\n随着机舱的缓缓开启，那个男人走了出来。距离上次郑红见到郑义为止，恐怕已经过了不知道多少年了，可她还是能一眼认出他。那有些不修边际的胡子，整齐的军装，还有那副自以为是的高高在上的态度——一切都没变。不过，她注意到郑义的表情看起来有些疲惫，或许这么多年的统治也并非没有在曾经精力充沛的他身上留下伤痕。\n\n“好久不见了，父亲。”郑义微笑着对郑钧说到，郑红怀疑他这幅笑容也只是作秀罢了，“红，你也是，好久不见了。能重新和你们见面，我真的很高兴。”\n\n“我也是，孩子。”郑钧也回以微笑，他很少这样真切地流露出开心的感情，“你长大了。”\n\n“远道而来，诸位都受累了，我们安排了附近的一处酒庄，我们可以先移步到那里坐下歇息，吃口饭。”看到双方大概说完了客套话，负责接待的官员过来对郑义一行人说到，“陛下也这边请。”"
SFH.1223.a:0 "开始吧。"

SFH.1224.t:0 "团聚"
SFH.1224.d:0 "郑义与父女二人的酒会进行地着实有些尴尬——至少郑红是这样认为的。虽然父亲看起来一副挺高兴的样子，不过作为国家领导人，父子的对话始终充斥着无谓的客套话。郑红本人虽然也时常想要介入，可一旦考虑到父亲的心情，她便决定不要作太多干涉好——和平也好，战争也罢，就让他们说个痛快吧。一段时间的闲聊结束后，郑义和郑钧不约而同地示意下属离场，郑红明白，这是要谈正事的信号。\n\n“其实，在我们见面之前，我就猜到了事情大致的走向。”郑义缓缓开口道，他把酒杯一饮而尽，“父亲，红，你们都知道现在国家的局势走向。无论是北方，南方还是西北，情况都并不乐观，即便是在许多耀眼的成就被取得后的今天，我们的祖国也被许多境外的侵略者盯着。他们才是我们真正的敌人。”\n\n“以前的你未必能说出这样的话。”郑红讥讽道，“麒麟显灵了？”\n\n“红，不必这样说。”郑钧说到，他平静的神情里闪过一丝紧张，“郑义，”他转向郑义，“你说的不错，现在的远乡虽然走出了关乎国家存亡的危机，可整个东巴斯蒂亚的局势仍然不够稳定，至少，对于远乡的未来而言，太过危机四伏了。只有国家统一，我们才有为子民开创未来的可能。”他若有所思，又加了一句，“让一家人团聚。”\n\n“父亲…”郑红看着父亲的恳求，她也有所心软，“兄长，你也看到了，现在的远乡正走在康复的大道上，我们所做的和以前并不相同，现在的平京，和你过去厌恶的那座城市不再是同一座了。我知道你所期望的未来，但我们已经找到了更合适的道路，现在，只要我们合作，把南北的力量有效地结合起来，那未来的远乡一定会走向胜利。”\n\n“曾经的我认为这都是扯淡。”郑义苦笑道，“可在北方的这些年以来，我也意识到了我一个人的能力是多么有限，曾经看到的世界是多么狭隘。你是对的，红。还有，父亲，长久以来，我很抱歉。”\n\n突然，郑义从座位上起身，他走到仍在震惊中没缓过神来的郑钧面前，单膝跪了下来。\n\n“父亲，我知道一家人对您来说有多重要，在母亲离开后，您始终没有抛弃我们。”郑义诚恳地说到，“维系一个国家并不是多么容易的事情，这意味着背负起对无数人的责任。当一个人专注一件事太多，他便会迷失方向，我就是这样一个人，为仇恨与自大蒙蔽了双眼，最后迷失了方向。我不请求您的原谅，对您，还有对红。然而，请让我以自己的方式，为这个国家的未来尽一份力吧。”"
SFH.1224.a:0 "泪花在老国王的眼里打转。"
SFH.1224.tt:0 "§C郑义同意了南北远乡和平统一的提案！§!"

SFH.1225.t:0 "谈判破裂"
SFH.1225.d:0 "郑义与父女二人的酒会进行地着实有些尴尬——至少郑红是这样认为的。虽然父亲看起来一副挺高兴的样子，不过作为国家领导人，父子的对话始终充斥着无谓的客套话。郑红本人虽然也时常想要介入，可一旦考虑到父亲的心情，她便决定不要作太多干涉好——和平也好，战争也罢，就让他们说个痛快吧。一段时间的闲聊结束后，郑义和郑钧不约而同地示意下属离场，郑红明白，这是要谈正事的信号。\n\n“其实，在我们见面之前，我就猜到了事情大致的走向。”郑义缓缓开口道，他把酒杯一饮而尽，“父亲，红，你们都知道现在国家的局势走向。无论是北方，南方还是西北，情况都并不乐观，即便是在许多耀眼的成就被取得后的今天，我们的祖国也被许多境外的侵略者盯着。”说到这里，他话锋一转，用严肃的神情说到，“正因如此，我们才应该由更加强硬，稳定的手段统治远乡王国。只有压制旧体制的残留，将权力真正地掌握在领导者手中，才可以实现。”\n\n“看来你并没有改变想法。”郑红苦笑道，这和她的估计一致，“不过你还是来了，为什么？”\n\n“只是想见见家人而已。”郑义苦笑道，“过去的十几年很艰难，我尝试了很多次不同的设想，也几乎失败了同样多的次数。现在我能做的，只有把我所积攒的经验运用到底，尽可能保护这个国家的未来，仅此而已。你们始终都是在这世上对我最重要的人，这次前来，不只是为了再见你们一面，也是希望能说服你们不要…”\n\n“不要什么，不要抵抗吗？”郑钧讥讽道，随后他又叹了一口气，“我早就料到这次会面会以这样的结局结束，只是我不愿意承认罢了。”他向郑义投向伤心的目光，又转而盯着自己盘中剩下的餐食，“不过，至少让我们好好吃完这顿饭吧。之后，无论你打算做什么，远乡政府都会维持一贯的态度——我们会坚守自己的信念到底。”"
SFH.1225.a:0 "下次就是战场见了。"
SFH.1225.tt:0 "§R郑义拒绝了南北远乡和平统一的提案！§!"

SFH.1240.t:0 "人鱼特区事宜"
SFH.1240.d:0 "第一次东巴大战后，陷入种种危机的远乡中央政府为了缓解财政压力和维持社会正常运转，将远乡东北部的两块领土售卖给了来自海地的白洋海人鱼一族。由于居住在遥远的深海，在过去的几百年，甚至上千年里，我们都没有人鱼干涉陆地政权的记录，此次举动算是千百年来的第一次。虽然我们同样厌恶不得不将主权交至其它国家这件事，可相比起陆地上的侵略者，人鱼确实提供了相当优惠的条件——不但远乡政府的许多债务被人鱼所承担，来自人鱼科学家的独特魔法工业，生活消费品，以及深海开采的各类原材料，贵金属成功帮助远乡市场维持了稳定，甚至还有所好转。\n\n当然，一切都是有所代价的。显而易见地，居住在人鱼特区的麟人突然发现自己成为了二等公民。那些富得流油的人鱼资本家，科研人员甚至是技术工人可以享受世界一流——或者至少是东巴斯蒂亚地区一流——的待遇，而麟人只能做最下贱的工作，领最低的工资，每日在高度危险的工作环境里度过新的一天。很显然，我们绝不可能继续容忍这样的事情发生。\n\n除此之外，领土完整也是我国目前高度重视的议题之一。国民普遍希望我们收回被送出去的领土，同时实现特区的完全废除，然而，考虑到人鱼一方的态度和全面冲突的危险性，这样的提案或许“没那么现实”。出于对实际因素的考虑，我们可以提议收回大陆部分的领土，然后降低特区的自治权。下下策则是不收回领土，仅仅降低特区的自治权。\n\n无论如何，人鱼特区的问题必须得到尽快处理。和人鱼的会面很快就很安排上。"
SFH.1240.a:0 "人鱼们的好日子早晚会到头的！"

SFH.1241.t:0 "修正条约？"
SFH.1241.d:0 "孙有胜看着眼前的那个人鱼，突然感到一阵反胃。他知道人鱼理论上“长什么样”，那是鱼的尾巴，再加上人——或者某种类似的东西——的上半身，可眼前这位自称克里斯的中年男性，如他所自称的那样，和正儿八经的人类别无二致。如果这就是他们说的那个什么…“环境适应魔法”云云，那可真是太厉害了——孙有胜想到——甚至有点可怕。在魔法的帮助下，人鱼可以轻而易举地融入人类社会的生活，至少表面上是如此，见鬼，还好他们不能改变外表，那高耸的鼻梁和尖锐的耳朵至少还可以作为判断种族的指标。\n\n几天的切磋过后，人鱼方和远乡方达成了初步的共识：随着远乡国的统一，特区的存在已经成为了对远乡领土主权的侮辱，必须通过某种方式置于远乡中央政府的管辖下。然而，具体如何解释所谓的“置于管辖下”，就成了谈判双方僵持不下的难题了。\n\n对于孙有胜而言，他既幸运，又不幸。幸运的是，他不需要为领土问题做什么实际决定，虽然来回拉扯是个辛苦活，可最终指示仍然来源于远乡中央政府，哪怕上面的那些人只是把孙有胜和他的同僚当成为战争谋取时间的一种手段，他也欣然接受；不幸的是，他现在必须坐在这里，忍受人鱼的阴阳怪气。不知为何，这些人鱼似乎认为自己天生就高人一等，是，他们确实为远乡“出了一份力”，可远乡，麟人也为此付出了足够的代价，他们凭什么认为远乡不会真的下狠手打击他们的势力？真是令人笑掉大牙。\n\n想到这里，孙有胜感觉自己稍微有一些自信了。无论如何，自己的祖国是强大的，他应该相信这一点，并且对来自中央的要求坚定不移地执行。于是，他开口了。"
SFH.1241.a:0 "“人鱼特区可以继续存在，但必须处在我国政府的控制下。”"
SFH.1241.b:0 "“我们需要收回大陆部分领土，海岛可以归属于处在我们控制下的特区政府。”"
SFH.1241.c:0 "“远乡的领土必须被完全收回。”"

SFH.1242.t:0 "收紧缰绳"
SFH.1242.d:0 "看什么看，没写完呢！"
SFH.1242.a:0 "好。"
SFH.1242.b:0 "不好。"

