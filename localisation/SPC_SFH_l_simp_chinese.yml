###国策###
SFH_broken_kingdom_of_farhome:0 "破败的远乡王国"
SFH_broken_kingdom_of_farhome_desc:0 "虽然不愿意承认，远乡王国在经历了几次大战后已经远远被世界上的列强甩在了后头。曾经的我们或许还可以骄傲的自称自己为巴斯蒂亚的明珠，如今却落得了破败不堪的结局。无论是战争的失败，经济的停滞还是政权的混乱，我们实在是没有足够强大的实力改变现状，光是维持如今这番不堪的样子就已经是拼接权力再结合了天时地利的结果了。\n\n然而，无论是运气作祟还是国王实力超群，近些日子的远乡王国似乎再度燃起了复兴的希望。喋喋不休的贵族和想要国王项上人头的激进分子依然存在，人鱼族也在远乡的土地上大行其道，然而，这一切似乎都在往好的方向改善，贵族日渐安静下来，激进革命党人也不再发动高烈度的恐怖袭击，或许国王的机会来了？"
SFH_im_still_young:0 "我还年轻！"
SFH_im_still_young_desc:0 "总有些刁民觉得郑钧已经老了，不适合继续坐在远乡的王位上了，国王会向他们证明，他们所想的都是放屁！国王还没老，我们很快就会证明这一点。\n\n§t等着瞧吧！§!"
SFH_hope_of_getting_better:0 "再度复兴的希望"
SFH_hope_of_getting_better_desc:0 ""
SFH_hope_of_getting_better_tt:0 "§Y就算是沦落到让人嘲笑的地步，南远乡地区也曾是巴斯蒂亚最为富饶的地区之一。只要我们稍作努力，定能重现其当年的辉煌！§!"
SFH_focusing_on_northern_mountains:0 "聚焦北部山地"
SFH_focusing_on_northern_mountains_desc:0 ""
SFH_focusing_on_northern_mountains_tt:0 "§Y我国偏北地区的山地里有大量尚未探明的矿藏，将这些宝贵的自然资源利用起来可以为我们的工业注入极大的活力。§!"
SFH_newly_developed_industrial_base:0 "新兴工业基地"
SFH_newly_developed_industrial_base_desc:0 ""
SFH_newly_developed_industrial_base_tt:0 "§Y多亏了从北方来的滚滚不断的宝贵矿物资源，我们得以开动工业的机器，建设起一片又一片的工业园区，为我国的经济事业添砖加瓦。§!"
SFH_focusing_on_southern_plains:0 "聚焦南方平原"
SFH_focusing_on_southern_plains_desc:0 ""
SFH_focusing_on_southern_plains_tt:0 "§Y我国偏南方地区的平原还有大量的区域尚未开发，我们可以将这些宝贵的土地利用起来，扩大我们的农业规模！§!"
SFH_processing_crops:0 "农产品加工"
SFH_processing_crops_desc:0 ""
SFH_processing_crops_tt:0 "§Y通过对我们的农产品进行加工，我们得以将本没那么值钱的作物变成更有价值的产物以出口到海外，真是财源滚滚啊！§!"
SFH_pain_in_the_ass_for_long:0 "如坐针毡"
SFH_pain_in_the_ass_for_long_desc:0 ""
SFH_pain_in_the_ass_for_long_tt:0 "§Y长久以来，这些打着"革命"旗号的革命党人和愚蠢至极的保守派贵族们都是我们最大的麻烦。该是时候提醒他们谁才是真正的领导人了。§!"
SFH_shut_revolutionaries_up:0 "叫革命党人闭嘴"
SFH_shut_revolutionaries_up_desc:0 ""
SFH_shut_revolutionaries_up_tt:0 "§Y我们会注重于镇压激进的革命党人组织，这能有效提高我们政权的稳定性。§!"
SFH_kick_opposition_nobility_out:0 "叫反对派贵族滚蛋"
SFH_kick_opposition_nobility_out_desc:0 ""
SFH_kick_opposition_nobility_out_tt:0 "§Y我们会注重于打压来自贵族中的反对派，这可以让我们在改变这个国家上有更多的自由选择的空间。§!"
SFH_whos_your_king:0 "谁是你们的王？"
SFH_whos_your_king_desc:0 ""
SFH_whos_your_king_tt:0 "§Y远乡王国内有太多太多自以为是，不把国王放在眼里的人了。该是时候给他们个教训了。§!"
SFH_licking_the_wound:0 "舔舐伤口"
SFH_licking_the_wound_desc:0 ""
SFH_licking_the_wound_tt:0 "§Y两次大战为远乡王国所带来的伤痛或许永远也不会被遗忘。但我们作为活下来的人总得继续前进。§!"
SFH_patriotism_propaganda:0 "爱国主义宣传"
SFH_patriotism_propaganda_desc:0 ""
SFH_patriotism_propaganda_tt:0 "§Y通过进行爱国主义宣传，我们多少可以挽回来自那些因战争而受伤的人对我们的政权的支持。§!"
SFH_pushing_by_force:0 "强硬措施"
SFH_pushing_by_force_desc:0 ""
SFH_pushing_by_force_tt:0 "§Y我们的忍耐也是有极限的。有必要的话，我们将动用一些强硬措施来让人们“忘却”过去的伤痛。§!"
SFH_making_it_looks_better:0 "唱白脸"
SFH_making_it_looks_better_desc:0 ""
SFH_making_it_looks_better_tt:0 "§Y或许我们不能直接让人们忘却过去的伤痛，采取一些措施让他们更有信心展望未来也是个不错的想法。§!"
SFH_looking_to_the_north:0 "望向北方"
SFH_looking_to_the_north_desc:0 ""
SFH_looking_to_the_north_tt:0 "§Y远乡王国的分裂已经持续了数十年，是时候终结这场闹剧了。§!"
#二阶段
SFH_no_longer_young:0 "不再年轻"
SFH_no_longer_young_desc:0 "国王的昏迷虽然没有置他于死地，也同样暴露了他不再年轻的事实。郑钧知道自己的时日无多，也更深刻地意识到了自己的无力。但瘦死的骆驼比马大，他再怎么说也是一国之主，无论是作为远乡可能的最后一位国王，还是一位父亲，他都要竭尽所能的改变这个国家，为他家人的未来铺路。"
SFH_no_longer_young_tt:0 "§R该死！这下远乡王国可要闹腾了...§!"
SFH_looking_through_nation:0 "审视国家"
SFH_looking_through_nation_desc:0 "郑钧长久以来干的都是政府里杂七杂八的活，许多支柱上的产业他有能力但没有用心去监管，因而无论是对于这个国家，还是政府内部的许多东西，他都了解不多。改革的第一步是了解前行的方向，至少这点他不打算放弃。"
SFH_looking_through_myself:0 "审视自我"
SFH_looking_through_myself_desc:0 "所谓“可怜之人必有可恨之处”，郑钧知道自己长久以来的“恶行”，无论是他行政时的懒惰，将工作推给其它贵族，或是对远乡人民的苦难不管不顾，使得他作为一个国王而言很显然是不够格的。他想要改变自己的形象，第一步便是抛去过去懒惰的思想，他时日无多，可没有那份空闲悠悠哉哉了。"
SFH_I_must_move_on:0 "“我必须前进”"
SFH_I_must_move_on_desc:0 "郑钧时日无多，远乡又笼上了名为“内战”的阴云，再不做点什么可就来不及了！"
#军民线
SFH_curing_the_wound:0 "舔舐伤口"
SFH_curing_the_wound_desc:0 "距离那场惨烈的世界大战和仿佛无止境的经济危机已经过去了数十年，可遗留在我们身上的伤痕依旧。无论是成千上万因战争而流离失所支离破碎的家庭，还是随着时间腐朽残疾的远乡军队，我们怎么说也没法在祭祀的时候，对祖先挺起胸膛，自豪地说今天的远乡王国国泰民安。\n\n一场针对军队和人民的改革将被推行。我们应当想方设法将远乡军队塑造成现代化的其中一种形态，提高人民的生活水平以换取更多对于我们政权的支持，并在此之上尽可能地解决远乡人民的厌战情绪，否则我们很快便会淹没在内战的洪流中。"
SFH_curing_the_wound_tt:0 "§Y这条国策树会更加注重于改善我国军事实力和人民生活水平。§!"
SFH_dying_army:0 "衰亡的军队"
SFH_dying_army_desc:0 "如果追溯到伟大战争时期，那远乡军队在巴斯蒂亚大陆上还能算得上数一数二，可自打北扩运动告吹，加上世界大战惨烈的后果，远乡军队遭受了从物理和财政上的毁灭性双重打击。不但大量优质士兵白白死在的战场上，这还促使舆论风向反对政府向军队的过度投资——而更可悲的是，就算舆论不反对，远乡政府也没有精力完成军队的现代化改革。\n\n不过，现在我们可顾不了那么多了。关于军队现状的报告很快就会以规整的方式被提交，而军队改革的方向也会被很快决定，这虽然不会造成政府内部的派系斗争，但必然会遭受来自民众的质疑，而且需要大量的财政支出。但愿一切顺利。"
SFH_saving_the_money:0 "节约资金"
SFH_saving_the_money_desc:0 "远乡政府可没有许多人所设想的那般有钱，就算是最为奢侈的贵族聚会，那在如今萧条的经济环境下也要让步三分，更何况是讨论贵族不愿意付钱的军事预算了。节约资金会是个好想法，如今我国有大量的无用军事项目挤占大量资源，切除掉他们可能会降低各派人士对军队的信心。\n\n然而，这不但是更受民众欢迎的举动，还能在短时间内为我们提供大量的新资金。除此之外，我们还可以调动诸如科研人士和理论派军官来进一步发展我们希望的军事领域，而不是让他们各干各的，浪费大家的时间。"
SFH_cutting_extra_projects:0 "裁撤多余项目"
SFH_cutting_extra_projects_desc:0 "自打经济萧条以来，我国的军事科技发展就陷入了停滞。经过检查，不难发现真正的问题在于项目太多太杂而不是单纯的钱没给够。多余且占用大量人力物力，毫无意义。\n\n我们应当开始评估这些所谓的“军科”项目，那些做的不好的都可以滚蛋。军科研究人员基本上没几个跟贵族有密切联系的，他们能把远乡的资源占用到今天纯粹是过去没有系统化的管理过这个事情。当然，这么大规模的文书工作会相当消耗时间和精力，现在我们只能希望能运气好点，不要出现太多幺蛾子。"
SFH_cutting_extra_projects_tt:0 "§Y无力的军队§!追加效果：\n生活消费品工厂：§Y-5.0%§!\n科研速度：§R-5.00%§!"
SFH_trust_the_plan:0 "相信计划"
SFH_trust_the_plan_desc:0 "许多人都认为决定现代战场胜利与否的会是军事科技的发达程度，而无数以小胜多的奇迹战役则狠狠地打了他们的脸。在军事装备实力相仿的情况下，决定战场上胜者的只有可能是冷静的思考和全面的计划。\n\n鼓励在军事作战上采用更加谨慎且全面的态势不但可以让我们在应对突如其来的进攻时不占据被动地位，还可以在进攻的时候减少敌军对我军的伤害，将平平无奇的军队发挥数倍的战斗效果！"
SFH_trust_the_plan_tt:0 "§Y无力的军队§!追加效果：\n决战计划学说花费：§G-10.00%§!"
SFH_learn_from_experience:0 "吸取经验"
SFH_learn_from_experience_desc:0 "俗话说“知己知彼，百战百胜”，对于一支军队来说，除了要建立了足够厉害的硬实力外，懂得从敌人中学习，并且在战斗前了解对方以制定对应计划，我们才能真正建立起能打胜仗的军队。\n\n为此，在军队改革的过程中将“学习”融合进我们的战术纲要中是有必要的。这可以帮助我们在未来更快学习如何打仗，并将战术经验一代又一代传承下去。"
SFH_learn_from_experience_tt:0 "§Y无力的军队§!追加效果：\n最大指挥点数提高乘数：§G+10.00%§!\n计划加成上限修正：§G+10.00%§!"
SFH_expand_military_engineering_proj:0 "扩张军事工程项目"
SFH_expand_military_engineering_proj_desc:0 "从古至今，军事工程都是战争无可或缺的一环。无论是能快速运输部队的国家公路还是能够抵御火炮轰击的堡垒，在这上面积累经验总是没错的。远乡军队在进入现代后逐渐在军事工程的建设科技水平上落了下风，现在是时候将它重新拾起来了。"
SFH_expand_military_engineering_proj_tt:0 "§Y无力的军队§!追加效果：\n生活消费品工厂：§Y+5.0%§!"
SFH_infantry_combat_focus:0 "步战为主"
SFH_infantry_combat_focus_desc:0 "虽然诸如战略设计，军事科技和武器装备等因素成为了现代战场上新一代的战略因素，士兵作为战争的主体从头到尾也未曾丧失其主导地位。在资金有限的情况下，发展以发达军事科技为主的战争谋略并不现实，将目光聚焦在步兵上不但能在不消耗太多资源的基础上有效提高我国军队的素质，还可以发扬远乡王国光荣的冒险传统，简直就是一举两得！"
SFH_infantry_combat_focus_tt:0 "§Y无力的军队§!追加效果：\n人海突击学说花费：§G-10.00%§!"
SFH_extreme_environment_training:0 "恶劣环境特训"
SFH_extreme_environment_training_desc:0 "我国各地山地丛林颇多，虽然绝大多数核心地区都聚集在平原地带，可为了应对隐藏在暗处的游击队，或是应对未来可能的战争，我们都应该将在恶劣环境下的训练提上日程。通过将军队投放到各种非常规环境下作战，这可以极大提高他们的持续作战能力和在恶劣环境下的行动效率。"
SFH_extreme_environment_training_tt:0 "§Y无力的军队§!追加效果：\n陆军组织度：§G+5.00%§!\n陆军组织度恢复：§G+5.00%§!\n地形惩罚降低：§G+20.00%§!"
SFH_improve_training_process:0 "改进训练流程"
SFH_improve_training_process_desc:0 "通过改进我国军队的训练流程，我们可以简化或去除掉不必要的环节以节省训练部队所需要的时间。同时，更科学的训练方法允许我们进一步锻炼士兵们的增援能力，确保部队能及时参与战斗，而不是在战场上陷入混乱。另外，这还能帮助我们筛选掉质量不符合要求的兵员。"
SFH_improve_training_process_tt:0 "§Y无力的军队§!追加效果：\n增援率：§G+1.0%§!\n训练时间：§G-10.00%§!"
SFH_cooperate_towards_victory:0 "团结就是力量"
SFH_cooperate_towards_victory_desc:0 "无论如何研究战术或是对单一士兵进行训练，我们都应该铭记一点：团结才是力量。只有想办法完成各部门单位和军种的合作，我们才能建立起真正的现代化军队。任何片面的优势都无法媲美一支团结的军队，而这正是我们作为改革者应该做的。"
SFH_cooperate_towards_victory_tt:0 "§Y无力的军队§!追加效果：\n增援率：§G+1.0%§!\n单位攻击：§G+5.00%§!\n单位防御：§G+5.00%§!"
SFH_expand_the_hq:0 "扩大指挥部"
SFH_expand_the_hq_desc:0 "随着我们对各部门协作的要求和兵员训练的文书工作增多，是时候对指挥部进行一次全面的扩张了。我们得招收更多能人志士参与指挥，同时解决过去因为人员不足而无法有效指挥军队的缺点。\n\n然而，这样大范围的扩张必然会引起其他人的注意。想必无论是公众还是贵族，都不会喜欢这一点——不过有一点例外，支持军事改革的改革派贵族或许会对此感到欣喜。"
SFH_expand_the_hq_tt:0 "§Y无力的军队§!追加效果：\n最大指挥点数提高乘数：§G+20.00%§!\n计划加成上限修正：§G+20.00%§!"
SFH_invest_new_weapons:0 "投资新一代军武"
SFH_invest_new_weapons_desc:0 "虽然在其它方向上努力也可以起到效果，但我国落后的军武始终是抵挡在现代化军队前的一个巨大门槛。虽然展开对军武的投资需要一定程度的资金，但我们也没时间挑三拣四的了。毕竟，我们这次投资也不是为了搞科研，而是把早就该列装给部队的资料和装备尽快送给他们。"
SFH_invest_new_weapons_tt:0 "§Y无力的军队§!追加效果：\n单位攻击：§G+10.00%§!\n单位防御：§G+10.00%§!\n陆军组织度：§G+10.00%§!\n陆军组织度恢复：§G+10.00%§!"
SFH_renew_military_acedemy:0 "翻新军事学院"
SFH_renew_military_acedemy_desc:0 "我国的许多军事学院还停留在上个世纪的水准，陈旧的设施和过期的教科书，如果说这样的地方能送出来符合现代军队标准的军官，那可真的是见鬼了。为此，我们应当着手准备开始设立新的军事学院，并确保它们的质量不会像以前一样低。当然，这类举措会引起公众的不满，导致他们反对我们的军事改革，但这也是没办法的。"
SFH_renew_military_acedemy_tt:0 "§Y无力的军队§!追加效果：\n最大指挥点数提高乘数：§G+20.00%§!"
SFH_renew_infantry_weapons:0 "步枪改良"
SFH_renew_infantry_weapons_desc:0 "通过推进步枪等单兵武器的设计，我们可以促进相关军科的发展。列装新一代步枪可以有效提高部队的战斗能力，而且成型更快，比需要更多时间和资金的重型部队高到不知道哪里去了。"
SFH_reinforce_long_range_battle:0 "强化长距作战能力"
SFH_reinforce_long_range_battle_desc:0 "长距离作战一直以来都是军事领域的一大难题。虽然随着现代科技所带来的铁路，汽车，轮船等等发明使得部队的远距离作战和持续作战更加简便，远乡王国并没有太多资金可以维系这些装置。因此，让部队专门针对长距离作战进行训练会是不错的想法，既省钱又能提高他们在南远乡山区的作战能力。"
SFH_reinforce_long_range_battle_tt:0 "§Y无力的军队§!追加效果：\n补给消耗：§G-10.00%§!"
SFH_enlarge_training_standard:0 "加大训练强度"
SFH_enlarge_training_standard_desc:0 "既然我们已经选择了在士兵的强化上下更多功夫，那么加大训练强度便是不可避免的了。当然，跟裁减多余训练流程不同，这会需要我们提高训练的整体强度，结果上会导致部队训练的时间延长，不过会对部队战斗力起很大的正面效果。"
SFH_enlarge_training_standard_tt:0 "§Y无力的军队§!追加效果：\n单位攻击：§G+5.00%§!\n单位防御：§G+5.00%§!\n训练时间：§R+10.00%§!"
SFH_dawn_of_heavy_weapons:0 "重武器黎明"
SFH_dawn_of_heavy_weapons_desc:0 "依靠步兵取得战争胜利的时代已经结束了。虽然不可否认的是步兵依旧在战场上占据主导地位，一昧的专注士兵而非他们身后的重型武器会是难以接受的，毕竟更强大的火力意味着更少的步兵会被投放进战场，而更少被投放进战场的步兵意味着他们可以被调去其它位置作战，或者以减少伤亡的名义退至二线。"
SFH_researching_the_artillery:0 "火炮研发"
SFH_researching_the_artillery_desc:0 "在过去，远乡王国始终没有把火炮的运用视作重点。虽然世界大战已经暴露出火炮在对抗其它文明而非巨型魔兽时的高效，远乡的经济危机则是刚好赶上，最后我们也没能赶上发展火炮的时代潮流。现在是时候将这些东西拾起来了。"
SFH_push_for_theory_development:0 "推进理论研究"
SFH_push_for_theory_development_desc:0 "既然装备更新了，那么理论也要随着一起进步。只有更新的理论才能适配更新的武器配备，毕竟如今的坦克也好，火炮也罢，都不是过去的人们所能想象的，如果我们的军队依然被陈腐的战术所束缚着，那么再厉害的武器装备也不过是做做样子，起不了大的效果。"
SFH_push_for_magic_application:0 "推进魔法运用"
SFH_push_for_magic_application_desc:0 "无论是与魔兽的伟大战争还是同西方大陆的世界大战，我们都应该正确认识到一点：没有魔法辅助的军队在面对有着魔法科技的军队时是弱不禁风的。只有推进本世代的魔法科学，我们才能说是把军队拉进了现代化的大门。"
SFH_readjust_the_army:0 "整顿军队"
SFH_readjust_the_army_desc:0 "我国军队发展到今天，由于没有在正确的时候跟上现代化的步伐，有很多问题都没能得到处理。比如长久以来腐败横行的军官团，效率极低的科研团队，缺乏训练的士兵和过期到找头魔兽都不敢用的陈旧装备。这些因素造就了如今远乡军队的战斗力低下，而俗话说“长痛不如短痛”，在军队内进行的清洗虽然会在短时间内大幅降低部队的作战能力，不过这也是没办法的。"
SFH_readjust_the_army_tt:0 "§Y无力的军队§!追加效果：\n陆军组织度：§G+5.00%§!\n陆军组织度恢复：§G+5.00%§!\n生活消费品工厂：§Y-5.0%§!"
SFH_add_more_funds:0 "扩大资金投入"
SFH_add_more_funds_desc:0 "比起削减项目导致科研停滞或是造成不必要的问题，我们可以加大各方面的资金支出来完成无法被完成的军科项目。虽然远乡王国很穷，但真到了改革的时候，就算是强行掏也还是能掏出来点钱的。当然，在此基础上我们还是要做评估，那些效果不佳的项目虽然不会被立刻砍掉，但它们不会像其它龙头项目一样得到足够的资金或是资源。"
SFH_add_more_funds_tt:0 "§Y无力的军队§!追加效果：\n科研速度：§G+5.00%§!\n生活消费品工厂：§Y+5.0%§!"
SFH_split_the_fire:0 "倾泻火力"
SFH_split_the_fire_desc:0 "虽然装甲部队符合时代潮流，对于远乡军队而言尚且还是个新鲜的概念，一昧地追求潮流并不能真正的改善情况，而火炮已经在远乡军队中列装多年了。虽然一直以来都没有受到重视，但从大火力开始入手的话，会是不错的改革思路。"
SFH_split_the_fire_tt:0 "§Y无力的军队§!追加效果：\n优势火力学说花费：§G-10.00%§!"
SFH_improve_artillery_ammo:0 "改良火炮弹药"
SFH_improve_artillery_ammo_desc:0 "通过改良火炮弹药，我们让它在更加便携的情况下可以对敌人造成更大的伤害。虽然炮兵部队没有自保的能力，我们至少可以提高它们的战斗能力以协助步兵部队完成进攻。"
SFH_simplify_production_process:0 "简化生产流程"
SFH_simplify_production_process_desc:0 "我国全面列装新式火炮的决议面临着两个问题：一，我们没有足够多的时间生产足够多的火炮；二，就算生产出来的火炮也需要更多时间才能转手到部队上，因为中间繁琐的流程和不必要的条纹太多。虽然南远乡地区的官僚主义横行已经成为了地区特色，我们也不可能基于这个发展旅游业，因而想办法简化火炮的生产流程会是必要的。"
SFH_world_of_mechanized:0 "机械化时代"
SFH_world_of_mechanized_desc:0 "虽然远乡军队没能赶上火炮大规模运用的时代，但我们依然有时间赶上更新一代的武器配备：装甲部队。虽然大规模的机械部队早在同魔兽的战争时就已经被引入，可现代化的改良，比如能以更快速度移动的坦克，更强力的火炮发射装置，以及步兵所使用的机械化载具，共同带来了全新的概念“机动的机械化部队”。我们不应该再落后于时代，而是反超它！"
SFH_world_of_mechanized_tt:0 "§Y无力的军队§!追加效果：\n机动作战学说花费：§G-10.00%§!"
SFH_Infan_tank_coordination_training:0 "步坦协同训练"
SFH_Infan_tank_coordination_training_desc:0 "长久以来，训练步兵同装甲部队协同作战就是很大的难题，就算是南方的部分大国也无法说是真正做到了能高效步坦协同作战。我们很显然是没有人力物力去跟大国比拼军队素养，但也该进行基础的训练，否则我们的投资就付诸东流了。"
SFH_large_titan_development:0 "大型机甲研发"
SFH_large_titan_development_desc:0 "虽然人们总是说机甲的时代早就随着世界大战的爆发过去了，在这之后世界各地爆发的冲突依然证明，尽管机甲作为装备本身需要随着时代开始更新换代，但它依然可以成为战场上的王者。为此，拨款进行新一代机甲的研发会是必要的。"
SFH_increase_science_funds:0 "增加科研经费"
SFH_increase_science_funds_desc:0 "目前为止，我们已经在各方面的军事科技上加大了许多投资，可总的来说依然远远不够。数十年的荒废让远乡军队远远落后于时代，想要让它赶上如今的潮流的话，我们势必要加大投资的力度。如今，我们正在跟时间赛跑，如果说花点钱就能尽快提高在部分领域的能力话，我们再怎么说也不该拒绝。"
SFH_increase_science_funds_tt:0 "§Y无力的军队§!追加效果：\n科研速度：§G+5.00%§!\n生活消费品工厂：§Y+5.0%§!"
SFH_uniform_weapon_specifications:0 "统一武器规格"
SFH_uniform_weapon_specifications_desc:0 "远乡军队长时间的荒废造就的问题除了诸如训练不足，装备落伍外，近期，我们还发现了武器规格不统一的问题。由于远乡军备产业过于松散，许多装备都依靠进口或是在过去战争时期的缴获。在步兵所使用的装备中，光是枪械的口径就有了四五种，子弹的种类更是五花八门。这还是没有考虑到不同国家的附魔装备使用的魔法回路设计上的不同等问题。统一武器规格会极大提高我军的战斗能力，让我们开始行动吧。"
SFH_modern_command_system:0 "现代化指挥系统"
SFH_modern_command_system_desc:0 "终于，在花费了大量的时间和精力后，我们成功地将远乡王国的军事实力提高到了一个没那么让祖宗蒙羞的地步。虽然到了这一步，我们仅仅只是将目光聚焦在了陆军，完全忽视了海军和空军的发展，不过考虑到资源有限，能做到这一步已经很不错了。现在，是时候为军事改革画上句号了：让我们展开一场轰轰烈烈的换新运动，将指挥系统过去多余且低效的部分去除，最后宣布建立起一个全新的现代化指挥系统吧。"
SFH_modern_command_system_tt:0 "以§Y现代化远乡军队§!取代§Y无力的军队§!\n效果变化：\n单位攻击：§G+10%§!\n单位防御：§G+10%§!\n陆军组织度：§G+10%§!\n陆军组织度恢复：§G+10%§!\n最大指挥点数提高乘数：§G+20%§!\n科研速度：§G+5%§!\n生活消费品工厂：§Y-5%§!\n每月军队职业度水平变化：§G+2§!"
SFH_people_in_pain:0 "伤痛中的人民"
SFH_people_in_pain_desc:0 "我国境内的民生状况并不乐观，虽然在王国政府的管理下，这份阴影在很大程度上被掩盖了过去——途径很多，完善大城市地区的娱乐项目，亦或是对媒体下严格的管控，又或者是更为简单明了的暴力手段。不过，这些手段无非是把问题拖延到了未来解决，甚至在一定程度上使得情形恶化。随着改革之风席卷我国，是时候将目光投向远处的群众了，增加政府在民众眼中的公信力有助于提升内战时期的政府威望，降低反对派的影响力。"
SFH_no_time_to_lose:0 "时间紧迫"
SFH_no_time_to_lose_desc:0 "尽管我们希望能将改革推行到位，在不会激起政府内部不满的基础上确保把民生问题解决的彻底一些，但偶尔也要向现实做出一定的让步，比如在内战即将到来的当下，我们不得不尽管完成改革以笼络人心，获取必要的支持。为此，我们可以采取更加简单直接的方法，尽管这在长期看来不会有什么实质性效果，它同样能极大改善政府缺乏公共威望的现状。"
SFH_citizen_living_funds:0 "公民生活补贴"
SFH_citizen_living_funds_desc:0 "如何才能让老百姓快速意识到社会的变化？是文化革新，还是社会改革？两者都不是正确答案。在远乡王国，撒钱才是社会变革的唯一正道——至少在现在看来是如此。国王会被塑造出一个善良的慈善人形象，在我国重点地区对公民发放数额不大但足以维持短时间内生活的公民补助，相信这能在短时间内把人心聚拢到我国政府身边。而考虑到我国公民生活花费与日俱增的现在，这份补助或者会起到意想不到的重要效果。"
SFH_patriotic_propaganda:0 "爱国宣传"
SFH_patriotic_propaganda_desc:0 "群众的眼光是雪亮的，可再雪亮的眼光也终究是受到其主人的限制，那些摇摆不定的平民老百姓或许对政策有自己的看法，但他们还尚未滑向反对派的深渊，也暂时不知晓世间的道理。或许反对派的一些目的是正确的，但这并不是反对我国的改革的理由——相反，正是因为反对派，革命党或是青天军都不是真正正确的，他们所挑起的战争只会造成无端的伤亡，糟踏远乡王朝的荣耀。因此，老百姓们应该把目光更多的投到爱国这一层面来，加大宣传的力度可以有效实现这一点，增加我国政府的威望。"
SFH_public_canteen:0 "公共食堂"
SFH_public_canteen_desc:0 "许多收入相对不稳定或者较低的低层居民缺乏稳定的食物来源，当然，少吃一两顿饭饿不死人，大不了就出门啃啃树皮，或是去偷点垃圾，总是有求生之道的。不过，一直维持这样的社会现状会破坏治安稳定，同时也会让老百姓哀声载道，尽管他们吃不饱饭很大程度并不应该怪我们。推出简单的公共食堂政策可以在不激起其它派系不满的情况下缓解这一情况，国王会被扣上做慈善的大善人的帽子，而百姓也可以吃上一两顿没什么滋味但能勉强填报肚子的免费的午餐，多多益善。"
SFH_supress_price_of_corps:0 "压制粮价"
SFH_supress_price_of_corps_desc:0 "比起架几个摊子送几碗稀粥，显然，直接让政府出面对市场进行干预可以起到更好的效果——至少，对于我们来说如此。随着经济萧条和战争的失利，我国许多农产品贩卖者选择减少曾经为供给战争而增加的产出来提高商品价格，但这无论是对于消费者还是他们自身而言，都不是个好消息，而且很显然不是长久之计。政府可以出马介入市场，一方面强制性收购农产品再以更低的价格转卖给市场以供给更多群众，另一方面出台政策补贴增加农产品产出，将市场价格维持在一个相对更低的水平。不过，在这些商业活动中饱私囊的许多贵族不会喜欢我们这么做，但谁又会关心他们的意见呢…"
SFH_encourage_charity:0 "鼓励慈善"
SFH_encourage_charity_desc:0 "包括改革派在内的许多贵族都认可甚至亲自参与了我国的慈善事业，在大街上送几碗稀粥，或者是为无家可归者送上几件保暖的大衣。不过在没有官方的明确支持下，这些活动往往会成为贵族们中饱私囊，偷税偷税，甚至是反过来坑害群众的途径，造成不良社会影响。而一旦有了政府的背书，就算是再腐败的贵族也不得不做做样子，把一些慈善活动落实到位了，更何况，这还能为他们戴上做慈善的大善人的帽子，反对我们的人应该也说不了什么。"
SFH_encourage_entertainment:0 "鼓励娱乐产业发展"
SFH_encourage_entertainment_desc:0 "世界上的悲伤事很多，可娱乐项目却很少。有时候比起尝试解决无法根治的伤心事，将人们的目光转移到轻松快乐的娱乐产业上或许不失为良策。由于经济萧条，我国曾经许多的娱乐产业都没落了，无论是给小朋友游玩的主题乐园还是给成年人的赌博场所，许多美好又收入不菲的娱乐产业就这样消失在了时代的洪流之中。我们可以重新出资鼓励娱乐产业，同时加大资金，借由公民生活补贴来完善国家提供的福利。"
SFH_cutting_taxes:0 "精简税收"
SFH_cutting_taxes_desc:0 "为了填补空虚的国库，或是某人的腰包，我国在不知不觉中给公民扣上了十分繁琐的税务，而这之中的许多多余费用都是可以被避免的——反正也进不了国库，为什么不干脆下狠手砍掉一些呢？当然，会有不满声音存在，可无论在哪个时代，减税都是老百姓喜闻乐见的政策，这甚至可以让他们忘记其它角度的不满，还能在一定程度上为我国的经济发展注入一剂良药，可谓好事连连。"
SFH_renew_infrastucture:0 "基础设施翻新"
SFH_renew_infrastucture_desc:0 "许多我国的基础设施建设还停留在上个世纪的水平，其中不少都因为年久失修而一度失去其作用，或者因为各地反建制游击队的活动而遭到破坏。我们可以出资维修这些设施，一方面，这可以增加就业市场的体量来减少失业率，另一方面，更优秀的基础设施客观上对经济有着正面效果，还能增加政府的威望，让大家看看我们还是能办成点事的。"
SFH_create_employment:0 "创造就业机会"
SFH_create_employment_desc:0 "随着经济上的萧条，我国许多民众都失去了赖以为生的工作。为了应对这一局面，我们可以加大对一些工业产业的投资，比如矿业。这不但可以为我国的工业发展注入活力，还可以为失业者提供薪资没那么良好，环境也没那么优良，但足够维持生计而且稳定，不需要同其他人争抢的工作。"
SFH_lowest_salary_guarantee:0 "最低薪资保障"
SFH_lowest_salary_guarantee_desc:0 "下定决心建立一个全国通用的薪资标准并不简单。无论是政府内的贵族还是工业上的巨头都将坚定反对这一决定。然而，改善劳动者的薪资标准在客观上有助于为国王建立极高的威望，削弱革命党人的话语权，同时增加民众的收入，给市场注入活力。为了祖国的未来，下狠手推进改革或许也是必要的。"
SFH_regulating_the_prices:0 "物价调控"
SFH_regulating_the_prices_desc:0 "这些年来没有得到处理的通货膨胀使得我国境内的商品价格远远超出了他们本身应该有的价值。这容易造成民众生活成本的快速上升，破坏社会稳定。我们若是想要从居民生活水平的角度展开社会改革，那么，开展一系列的市场监管机制，甚至是将部分企业直接收为国有以压制商品价格会是很有必要的。"
SFH_reorganization_of_the_judiciary:0 "整顿司法机关"
SFH_reorganization_of_the_judiciary_desc:0 "我国的司法机关长久以来腐败横行。许多达官贵族凭借自己在政府中的影响力肆意妄为，法律早就成为了一纸空文。这样的情况必须被制止。我们必须重新整顿司法机关，裁撤不必要的部门，替换不合格的官员并针对往期案件存档进行再审查。这样可能会造成贵族的不满，不过，相信只要我们避免挖开他们的老底，他们也不会对国王做什么…"
SFH_the_amnesty:0 "大赦"
SFH_the_amnesty_desc:0 "有时候，问题的解决方式可以非常简单。由国王宣布大赦，直接将情节并不严重的罪犯释放，并将其称为“来自国王的恩赐”，可以很轻松地在社会上制造一批支持国王的团体。这虽然无法在实质性上造成什么社会变革，但也没有什么副作用，而且是大家喜闻乐见的。"
SFH_expand_civil_science_fund:0 "民用科研资金扩张"
SFH_expand_civil_science_fund_desc:0 "许多民用科研资金在战争期间被挪走以满足军事需要，后来又因为经济萧条而被砍掉。许多本应该用于鼓励民间或官方的科研团体来改善民生科学的资金最后不了了之，这样的局面可不能再置之不理了。我们可以增加对民用科研项目的投资，鼓励更多人参与到改善生活水平的事业中去。"
SFH_expanding_business_grants:0 "扩大企业补助金"
SFH_expanding_business_grants_desc:0 "通过扩大给全国各地企业的补助资金，我们可以鼓励更多人参与创业，或是加快现有企业的发展。随着更多人进入到这个发展的市场中来，相信可以反转过去我国经济颓废的局面，并且加快各行各业的发展速度。"
SFH_foundation_for_the_future:0 "为未来奠定基础"
SFH_foundation_for_the_future_desc:0 "为了长远考虑，我们应当加强政府对社会各方面的介入，完善教育系统，就业系统，开展多年没有考虑过的环境保护计划，或者是改善不同公民群体的社会地位，完善医疗保健系统。当然，这样的计划会耗费我们更多时间，而且从开支的角度来说压力并不小，更新后的国家法律政策会需要很高的维护费用。但从长远的角度来看，这些改革势必能从根本上改变远乡王国的现状，并且开辟美好的未来。"
SFH_new_appearance_movement:0 "新面貌运动"
SFH_new_appearance_movement_desc:0 "新面貌运动是由我们设计的一场旨在从下至上改善整体社会面貌，强调“将老百姓从浑浑噩噩的生活”中拯救出来，涵盖了包括公共服务扩张，教育改革，人身权利修正，社会福利改革等一系列政策，旨在将远乡王国的社会摆脱过去死气沉沉的景象，走向全新的现代化社会。虽然目前为止，这项运动的主要活动范围还是扩大公共服务，鼓励各地街道办和老百姓多搞搞卫生，在字面意义上活出新的面貌。相信随着我们改革政策推进，新面貌运动也能涵盖更多的领域，为远乡王国的繁华添砖加瓦。"
SFH_education_facility_expansion:0 "教育机构扩张"
SFH_education_facility_expansion_desc:0 "我国的教育机构长久以来都是同摆设般的物件，虽说在发达地区仍占有一席之地，可在很大程度上不过是达官贵族的玩具，只能给少数人提供质量没那么高的教育水平。我们应当重新投资官方的教育机构，使其在质量和规模都达到新的高度。一方面，经过投资的教育机构应当提供赶上时代，不落伍的高等教育；另一方面，应当将基础的教育机关覆盖到非发达地区，增加各地识字人口数量。"
SFH_technical_college_expansion:0 "技术学院扩张"
SFH_technical_college_expansion_desc:0 "扩大各地技术学院的规模和数量有助于为我国的劳工市场提供更多的技术劳工。在科技发展日新月异的当下，更多的技术劳工有助于提高现代科学在各地的普及度和覆盖率，同时，接受了特殊技术教育的劳工还可以为自己某得更好的生计，改善自己和亲人的生活水平。"
SFH_environmental_protection_act:0 "环境保护法"
SFH_environmental_protection_act_desc:0 "工业的快速发展对环境造成的负面影响是显著的。虽然我们不需要考虑几个小小的工业园区对全国气候造成的影响，但没有经过监管的工厂和加工车间往往会将具有毒素的废液和垃圾丢弃到居民生活区附近，造成疾病流行，甚至会造成死亡案件。退出新的环境保护法来监管工厂对废弃物资的处理是有必要的。"
SFH_public_service_expansion:0 "公共服务扩张"
SFH_public_service_expansion_desc:0 "我们可以扩大各地公共服务的规模，包括公共交通系统，市政清洁服务，社区互助团体，市民委员会等等。这样可以帮助各地政府进一步同居民合作，不但能增加市区居民的生活满意度，还可以协调维护市容，将城市更好的面貌展现出来。"
SFH_call_for_gender_equity:0 "呼吁性别平等"
SFH_call_for_gender_equity_desc:0 "不可否认的是，过去几十年的经验已经证明，无论是在战争年代和和平时期，女性和男性一样可以在社会上发挥举足轻重的作用。我们很显然不可能说是在忽视一切现有情况下去向社会呼吁一些我们自己都未必认可的观点，但呼吁社会重新审视女性的地位是有必要的，这可以释放一大批忠诚于我们的优秀劳动力到社会中去。"
SFH_hold_the_traditional_ground:0 "坚守传统地位"
SFH_hold_the_traditional_ground_desc:0 "虽然女性确实可以成为社会中不亚于其他团体的一批人，可我们仍然不该忽视多数人的感受，冒着破坏社会治安的风险去呼吁些仍然有疑问的变革。最好不要在忽视生理差异的基础上去简单粗暴的将女性和男性混为一谈，或是仅仅是为了跟贵族们对着干而推出改革，不但不会扩大政府的威望，反而会造成许多人的不满。"
SFH_medic_system_reformation:0 "医务系统改革"
SFH_medic_system_reformation_desc:0 "医务系统的改革可以增进社会稳定性，完善福利体系。许多一般民众没有足够的资源，负担不起医疗的开支，政府可以介入其中，采用类似医疗保险的制度帮助一般人负担治疗费用。这可以在保证医疗机关的收入的同时为更多人提供治疗。"
SFH_chase_for_hope:0 "追求希望"
SFH_chase_for_hope_desc:0 "虽然在过去的几十年里，远乡王国因为种种原因，曾被名为“绝望”的阴霾笼罩了起来，阴影下的人们挣扎求生着，似乎完全看不见自己和故国的未来。可再漫长的阴暗也有结束的一天，而我们的工作正是为它画上一个句号。我们的改革或许无法在短时间内直接改变这个国家的面貌，也不能抹去一切过去遗留下来的伤痕，可我们成功开创了通往未来的道路，而这恰恰是我们所需要以砥砺前行的目标。这份希望或许在现在看来还很小，可它却能够深深扎根在每个人的心里，成为人们维持下去的精神食粮。追求希望，向明天前进。"
SFH_lost_but_won:0 "败而不妥"
SFH_lost_but_won_desc:0 "	世界大战留在远乡人民心中的伤痕仍历历在目，想要在短时间内彻底抹平人们内心的创伤很显然是不可能的。尽管如此，我们仍然有机会在一定程度上缓解这样糟糕的情况——毕竟，在内战不可避免的今天，如果群众依旧保持着他们的厌战态度并反对任何可能的军事动员，我军连新一代的兵源都难以确保，更别说打什么内战，推行什么改革了。\n\n	不过，话说的好听，具体执行起来确实难上加难。宫廷内的贵族不会对我们重启军事动员持反对意见，但强硬的政策会显著降低郑钧的威望，而且本身也需要他的威望足够高才能推动。这一切并不会容易，但不管怎么说，我们的遥远祖先拥有的探索与勇武的精神多少也该传承下来一点，只是需要我们的唤醒罢了。"
SFH_meeting_veteran_orgnization:0 "会见老兵协会"
SFH_meeting_veteran_orgnization_desc:0 "虽然社会上普遍存在的对我国军事动员抱有不满态度的民众不可忽视，然而，归根到底，打仗的也不一定是这帮年轻人。许多迈入中年的老兵无心去思考新一代人为何群情激奋，但他们却很希望自己的祖国能多关照关照自己——很可悲的是，在过去的几十年里，老兵问题一直是我们所避而不谈的。毕竟，我们打了大大的败仗，先不说如何安抚这些伤亡惨重的可怜人，光是把这事说出去，影响就怪不好的。然而，如今的我们也没法思前想后那么多了，该做的事情就不能再找理由推脱了。"
SFH_bribe_their_leaders:0 "收买组织领导"
SFH_bribe_their_leaders_desc:0 "这帮反战组织的领导人大多不怎么靠谱。他们组织的核心组成人员缺乏丰富的管理经验，年龄尚小而且容易被物质的东西诱惑——而这正中我们的下怀。送点学位证书，经营执照，甚至是单纯的现金都可以让他们屈服，而且这甚至不会花我们多少资金！简直是完美的设想。然而，很显然，改革派贵族会因此看我们不爽，但这也是没办法的，多一事不如少一事，他们想骂几句就让他们骂吧。"
SFH_payment_of_delinquent_benefits:0 "发放拖欠补助"
SFH_payment_of_delinquent_benefits_desc:0 "虽然说来惭愧，但我国因为“财政因素”而拖欠老兵战后福利以及战时欠下的工资是板上钉钉的事实。只要这一核心问题没有得到解决，那想要彻底安抚老兵肯定会动辄我们巨大的人力物力，甚至是最后无法根除这些问题。因此，是时候把我们欠下的债款还上了，所谓“财政问题”不应该成为改革前进方向的阻力，毕竟，假如我们不这么做，其他人更不会了。还上这些欠款有助于减少反对派拿来攻击我们的把柄，总的来说除了花钱多点外百利而无一嗨害。"
SFH_seeking_social_recognition:0 "寻求社会认可"
SFH_seeking_social_recognition_desc:0 "	由于我国几乎不存在的战后士兵再安置计划，许多世界大战甚至是东巴斯蒂亚大战时期的老兵无法融入社会，成为了我国混乱的核心要素之一。这些年迈的老兵虽然在政治上没有多少发言权，可他们却是媒体的绝佳宣传手段，靠着这些活生生的反面案例，反对派可以借助舆论为非作歹，将群众的怒火从真正应该面向的敌人转移到我们身上。这很显然是不应该的，为此，是时候重启废除的老兵安置计划了，让他们重新融入社会不但可以维持我国政权的稳定，还有助于建立社会上的安宁，减少那些日日消沉而无所事事的公民的数量。"
SFH_arent_u_aint_patriots:0 "“你是不是不爱国？”"
SFH_arent_u_aint_patriots_desc:0 "既然国家希望民众服从，那么他们便有义务服从。浪费时间在询问每一个人的看法然后再说服毫无意义，就算是一昧的扩大所谓的宣传机构，且不说容易激进民愤，而且能不能在短时间内起到效果还得另说。不过，让那些反对派把枪口对准自己人可能更有效——我们将出台一系列鼓励互相检举反对国家决议的公民的的政策，撒点小钱或是其它奖励让人们主动的去消灭身边的反对派。这确实会有治标不治本的问题，可这样速度更快，耗资更少，更何况本身我们也没有治本的能力。"
SFH_expand_propaganda_depart:0 "扩大宣传部门"
SFH_expand_propaganda_depart_desc:0 "虽说我们确实没有能力在短时间内让世人认可我们的政策，但长久以来，这依然是有所必要的。为此，通过加强在国内的政治宣传，我们或许能实现更好的效果。不过，相对软弱的决议会削弱王国的权威，贵族们也会对此颇有微词，而且这还会加大我国的财政压力。然而，这是在维持国家稳定的同时改变我国民众名想法的最稳定的手段了，改革道阻且长，我们尚不能在此激怒人民。"
SFH_reopen_conscription:0 "重启兵役制度"
SFH_reopen_conscription_desc:0 "虽然我国有着明确的兵役制度，规定公民在达到一定年龄后义务参军，并且有征召士兵的相关规定，可随着大战的失利以及接踵而至的财政危机，很快远乡军队就成为了混不下去的地撇流氓为了混口饭才志愿参加的存在。这些恶劣的兵源不但严重挫败了我军的训练标准，还将歪风习气带入到军队中，挫败军事改革进展，最后成为了我国的一大毒瘤。如今，这些问题必须得到解决，想办法让民众恢复对参军的信心和热忱会是第一要务。"
SFH_lower_enlistment_criteria:0 "降低入伍标准"
SFH_lower_enlistment_criteria_desc:0 "虽然现在的改革是为了改良我军的兵源，可在重启了过去更为严格的相关征兵规定后，许多想参军的民众都很可怜的被挡在了名为规定的招牌之外。过去的规定也不一定是对的，我们可以多下一些功夫来进行修改，比如降低训练的要求和烈度，以此鼓励那些对自己没有什么信心的年轻人加入军队。"
SFH_higher_military_enlistment_benefits:0 "扩大参军福利"
SFH_higher_military_enlistment_benefits_desc:0 "如何鼓励更多人参军？这个问题的答案可以非常简单：扩大福利。提高军事人员的工资，完善军人亲属的生活保障，在各个方面比如教育，就业上为军人家庭子女走捷径，翻新各地军营设施并改良伙食等一系列生活必需品，同时扩大战后安置的宣传，确保没人会认为远乡军队不过是在招收一群炮灰。我们能做的还有很多，同时这还会增强民众对我们的信心，巩固国王的权威，何乐而不为？"
SFH_we_have_done_our_best:0 "我们尽力了"
SFH_we_have_done_our_best_desc:0 "	在持续了数个月的改革后，很明显的可以看出民众对军队的观念得到了改善，反战的情绪也在一定程度上变得微弱了起来。当然，这绝不是终点，随着内战的爆发，我国的厌战情绪只会进一步恶化，而就算是现在我们也不能说是根除了长久以来战争遗留在我国人民心中的伤口。因此，到了今天这一步，我们也只能用一段话来形容目前为止的所作所为。\n\n	我们尽力了。\n\n	愿未来会更美好，总有一天我们的改革将会带领远乡人民走向和平安宁的未来，而只有现在的我们尽力而为，那改革才有可能成功。"
#政治线
SFH_wheres_our_enemy:0 "敌在何方？"
SFH_wheres_our_enemy_desc:0 "尽管听起来多少有点像废话，但国王四面环敌的情况的确是不容乐观。实际上，就算忽视在北边山地打游击的革命党和东边沿海搞种族隔离的邪教，国王身上的压力丝毫没有减少——毕竟，比起那些离了十万八千里远的叛军，真真切切留在宫廷里和国王作对的人可真是不少。贵族们凭借自己对远乡社会的强大影响力不断地干涉着国家政策，阻碍改革进展，甚至是有点要压制国王的意思。不过尽管如此，我们也不该忽视各地零散的改革呼声，应当尽管处理他们——无论是用温和的，还是强硬的方式。"
SFH_wheres_our_enemy_tt:0 "§Y这条国策树会更加注重于应对政府内外的反对派以及政治改革。§!"
SFH_dealing_with_nobility:0 "应付贵族"
SFH_dealing_with_nobility_desc:0 "许多贵族凭借自身强大的影响力在政府内占据了一席之地。如果他们能全心全意将自己那本就不多的才华用在辅佐政府上，那可能还不会有今天这般坏的影响。然而，尽管许多权贵利用自身在政府中的地位贪污腐败，谋求私利，败坏国家，可直接采取强硬措施以根除他们的地位可能会在很大程度上影响国家的稳定，在情况不理想的当下或许不是个好的主意；但同时，过于保守的改革会使得政府遭受批评，同时无法很彻底的解决问题。"
SFH_done_it_peacefully:0 "温和处理"
SFH_done_it_peacefully_desc:0 "尽管征求贵族的合作态度多少有些让步的意思在里头，很让人没面子，但为了不在宫廷内掀起一场新的政治斗争，我们也别无他选，只能采用温和的手段，争取用我们的努力换取贵族们的让步。不论是反对我们改革的保守派贵族，还是支持我们的改革派，我们都应该确保他们不会先翻脸，让一切改革计划以和平的方式进行。"
SFH_hold_a_party:0 "办场宴会"
SFH_hold_a_party_desc:0 "这世界上没人不喜欢宴会！沉沦在酒精的石榴裙下的贵族们往往会失去平时的狡诈，转而说些掏心窝子的话，这点国王很清楚（可能是因为他的酒量非常糟糕）。如果说想要找个相对没那么严肃的场合打开天窗说亮话，表明自己的态度并确立盟友的话，一场充满着美食和酒精饮料的宴会可以说是完美的。"
SFH_ensure_loyalist_loyaty:0 "确保温和派贵族忠诚"
SFH_ensure_loyalist_loyaty_desc:0 "有些贵族的个性比较特殊，他们不愿过多地参加政务，也不愿意为了利益而奔走四方。有人说他们是为了更好的名声，可不见这些贵族参加任何改革派活动，也不见他们会出现在任何慈善机构的门口。他们同国王的理念不会产生太多冲突，而且，他们的共同点——让远乡政局稳定下来——却是相同的。争取这一批贵族的支持或许不会起到什么决定性的作用，但至少他们不会在背后捅刀子。"
SFH_deal_with_the_radicals:0 "同激进派贵族打交道"
SFH_deal_with_the_radicals_desc:0 "激进的贵族——无论是属于改革派还是保守派——大多都十分反感国王模棱两可的改革政策。他们中的许多人本身可以被我们的诚意所打动，但最后却因为政策推行的缓慢而选择加入到反对的行列中去。不过，这个情况仍然是可以被扭转的，尽管这会需要我们花费更多的精力，可回报也不小。"
SFH_expansion_of_court_positions:0 "扩大宫廷职位"
SFH_expansion_of_court_positions_desc:0 "虽然目前由于许多贵族在政府内吃着国家饭却不做事，我们的官僚机构实际上处于一种十分臃肿的状态，适当地增加一些闲职，提拔忠诚于我们的贵族上台从结果上来看弊大于利。这样不但可以让更多新鲜的声音出现在政府内，同时可以形成新的团体以压制腐败贵族们的权力。"
SFH_promote_the_emerging_nobility:0 "提拔新兴贵族"
SFH_promote_the_emerging_nobility_desc:0 "同那些老态龙钟，血压血脂血糖高的老头老太太不同，许多新一代的贵族在接受了更为开放且精英的教育后建立起了同老一辈截然不同的世界观。他们在未来很大程度上会成为远乡王国的栋梁，而我们所要做的就是给他们这样一个机会，让政府得以吸纳新鲜的血液（并且给予他们一个尊敬我们的理由）。"
SFH_buying_the_old_school_aristocracy:0 "收买老派贵族"
SFH_buying_the_old_school_aristocracy_desc:0 "不缺乏物质生活的新一代精英阶级或许很难争取，可想要夺得很多老头老太太的心却很简单。政府不需要采用任何实质性的改动，也不需要花费时间和精力在维系精神纽带上，只要掏出一大笔资金然后打给国外某银行的某账户里就好了。这样的合作关系简单且粗暴，而且往往非常高效。"
SFH_commitment_to_the_nobility:0 "向贵族的承诺"
SFH_commitment_to_the_nobility_desc:0 "改革势在必行，可这不代表我们会轻松放弃那些“老朋友”们的利益。我们应当做出表率，向那些担心在未来的国家发展路径中自己会损失利益的贵族们承诺，保障他们的人身安全和未来身家的可持续性发展，而且，绝不会将他们视作成功的垫脚石。"
SFH_no_more_toleration:0 "忍无可忍"
SFH_no_more_toleration_desc:0 "我们作为国家的主人，为什么要容忍其他人踩在我们头上，教我们怎么做事？某些人似乎把自己看得太高，以至于是到了忘乎所以的地步，无视自己应该有的地位，开始把邪恶的触手伸向国家这个神圣的殿堂，然后为了自己那点微不足道的利益让其他人惶惶度日，没几天安宁！这是绝对不能被容忍的。"
SFH_streamlining_of_court_nobility_positions:0 "精简宫廷贵族职位"
SFH_streamlining_of_court_nobility_positions_desc:0 "宫廷内有许多闲职。这些职务薪资开得很高，可一问具体做了些什么，大家脑袋上都得定个巨大的问号。这些意义不大却开支极高的职位大多为贵族利用公务之便为自己谋求利益的产物，他们占用了巨大的政府开支，可非但不能保障社会的运转，反而造就了愈发严重的官僚主义。这一切必须被停止，首先就要从宫廷内的贵族职位开始削减。"
SFH_seeking_help_from_reformist_nobility:0 "寻求改革派贵族帮助"
SFH_seeking_help_from_reformist_nobility_desc:0 "虽说我们的改革并非只针对保守派贵族，可考虑到戴着白手套的改革派贵族往往会在贪污腐败的活动中置身事外，甚至是反过来攻击保守派贵族，在部分改革的环节上，他们可以成为我们巨大的盟友。尽管向改革派贵族寻求帮助意味着我们不得不将一些把柄或是资源留在他们那一方，可这无疑能对我们的政策推行起到巨大的正面效果。"
SFH_done_it_myself:0 "我自己上"
SFH_done_it_myself_desc:0 "向他人寻求帮助会暴露出政府的软肋，而在我们把柄到处走的今天，最不需要的就是多一大把需要还的人情债。虽然由我们自己推行政策必定会受到来自各方反对势力的劝阻，但至少，在这种情况下我们可以自由地决定应该如何行动，并且不用担心留下什么别人会知道的把柄。"
SFH_no_good_face_for_you:0 "“我可没好脸色给你！”"
SFH_no_good_face_for_you_desc:0 "虽说威望不如以前，郑钧依然是远乡王朝的最高领导人。只要他表现出对某个特定的人十分厌恶，不理不睬，那么这个人很显然是“不符合远乡王朝指令”的。虽然在郑钧权力式微的今天，这话听起来多少有点天方夜谭，然而，现在已经不是走一步看一步的时候了。过去的国王始终因为不愿意挑起同贵族的斗争而避免表露出对他们的厌恶，可现在不同，他已经不需要再藏着掖着了，实际上，他也不能。"
SFH_whispers_in_the_palace:0 "宫廷中的窃窃私语"
SFH_whispers_in_the_palace_desc:0 "工作并不繁忙的贵族们有着一大爱好：聊天。他们的话题从坎达德尔日蜥蜴的到沃姆帝国烤老鼠的应有尽有，而在宫廷内部的八卦更是一大乐子来源。只要有足够“料子”的八卦被泄露出去，不出几天就会闹得人尽皆知。郑钧作为国王当然不可能为了打压某人而编造八卦，可这并不代表他手上就没有其他人的把柄了。只要派出探子侦查一下，很多事情很快就会知道，而且——在国王的悄悄支持下——传遍宫廷。"
SFH_uncover_inside_story:0 "不胫而走的内料"
SFH_uncover_inside_story_desc:0 "在风和日丽的一个下午，平京某报社的记者突然误入皇家庭院，恰好跟散步的郑钧撞了个满怀。二人似乎也没把彼此当外人，在郑钧为其带路离开皇宫的同时，二人似乎就生活中琐碎的一些事件进行了情报交换，除此之外也没有正式进行什么会面。很快记者便被护送出了皇宫。\n\n第二天，关于各地贵族的丑闻突然被刊登在了各大报刊上，真不知道是谁给他们透露的信息。"
SFH_buying_off_vulnerable_nobles:0 "收买弱势贵族"
SFH_buying_off_vulnerable_nobles_desc:0 "就像贵族同外界的庶民的关系一样，贵族与贵族之间也存在着等级划分。根据财富的多少，领土的大小以及官衔的高低，有些贵族成为了万众瞩目的精英，有的则成为了人人唾弃的废物。我们可以从中介入，利用钱财或是官职收买那些相对弱势的贵族，利用他们建立起在贵族中的情报网，并创造一批愿意听我们话的权贵阶层。"
SFH_cooperative_nobleman:0 "合作共赢"
SFH_cooperative_nobleman_desc:0 "在远乡王国存在了这么久的贵族制度有它存在的理由，做违背祖宗的决定未必是个好事。通过建立起与贵族团体的合作关系，我们可以最终建立起一个合作共赢的制度，谁也不用打压谁，不用破坏宝贵的和平，仅仅是互相做出让步，政府可以维持国家的稳定，而贵族的才智也可以得到利用。"
SFH_obedient_nobleman:0 "安分守己"
SFH_obedient_nobleman_desc:0 "对贵族团体过度的打压会造成社会动荡，可一昧的让步也绝不能解决问题。虽说大家都没必要在这个节骨眼上翻脸，可根除不安因素，确保贵族们的安分守己是很有必要的。政府的权威不应该被太严重的低估，而贵族的身份也会得到尊重——至于权力，就需要更进一步的讨论了。"
SFH_they_shall_obey:0 "谁敢不服？"
SFH_they_shall_obey_desc:0 "抛去大量关于同贵族合作的议案吧，我们作为一个有着国王的权威政府，为什么要像联邦的那些政客一样对着没资格统治国家的其他人点头哈腰？尊重和稳定不过是胆小者的一面之词，在未来面前都显得无比的羸弱。只有根除国家的内在不安因素，确保我们作为政府的绝对正确性，才能防止这个国家分裂，同时一劳永逸地解决贵族问题。"
SFH_wind_of_changes:0 "变革之风"
SFH_wind_of_changes_desc:0 "虽然前代国王所主导的政治改革在最后被证明是灾难性的，但这并不代表远乡王国不需要一场政治改革，相反，我们只是没能找到正确的方向。现在机会来了——虽然是最后的机会——我们必须或多或少进行政治上的改革，无论是采取类似前代国王的民主化改革，还是寻求新的中庸之道，亦或者是想办法集中皇室权力，我们都不能坐以待毙，否则结果同样会是灾难性的。"
SFH_reopen_reformation:0 "重启改革"
SFH_reopen_reformation_desc:0 "随着时代的发展，君主的权力衰弱几乎是不可避免的，无数次的反政府叛乱已经印证了这一点，继续将自己捆绑在这条臃肿的道路上很可能不会给自己落个好下场。虽然这话有点失败主义的意思，可为了保护自己和自己家人的安全，郑钧认为应当在某种程度上继续过去父亲提出的民主化改革，给远乡王国带来全新的政治局面。一方面，这符合许多叛军的政治诉求，可以在未来带来更加稳定安宁的社会；另一方面，郑钧还可以把这个烂摊子赶快丢给别人，让自己多点美好的假期。"
SFH_learn_from_the_past:0 "吸取失败的经验"
SFH_learn_from_the_past_desc:0 "前代国王郑铭改革的下场相比大家都有目共睹，我们最好不要强行延续过去的政策，一方面，听起来影响就很不好，另一方面，这些改革政策的可行性都没有得到确认，就算真的要沿用，也该结合过去我们所吸取的经验进行修改，或是重新评估各方面内容，然后组建特别委员会专门讨论以确立改革大方向。"
SFH_continue_the_old_policy:0 "延续父亲的政策"
SFH_continue_the_old_policy_desc:0 "尽管前代国王郑铭所组织的政治改革带来了灾难性的后果，可这很大程度是出于外界干预的结果，而非改革本身的毛病。考虑到本身郑铭时期的改革计划就是经过深思熟虑的，在世界局面相对稳定的今天，我们确实可以延续过去的政策，只做少量修改。这样可以节约大量时间，便于尽管展开改革。"
SFH_reorganization_of_the_administration:0 "改组行政机关"
SFH_reorganization_of_the_administration_desc:0 "许多各地行政机关的官员都由中央或是地方政府直接指派，很少会在高级官员的职位上开放对外部市民的招募，更不用说在关键领导层的选举活动。改革的第一步可以从对外界开放更多公务员职位入手，扩大公务员考试，从一般市民中选举各地基层行政人员，同时开始准备各地政府非特级领导人员的部分选举机制，让普通人有对政府权力变更的参与感。"
SFH_let_us_lead:0 "由我们主导的设计"
SFH_let_us_lead_desc:0 "我们目前所采取的改革或许在外人听起来“符合时代潮流”，可实际上，我们所做的一切都无非是在钢丝上行走，稍有不慎就会跌落万丈深渊，把自己和国家全都推向不可知的未来。虽然有人建议我们向政府的反对者听取意见，可谁知道他们的底细究竟是什么？或许他们是外国间谍，又或者他们为了反抗政府而不惜提出损人不利己的糟糕建议。我们决不能为了一些蝇头小利而冒这个险，改革的推行必须由我们主导，此乃底线。"
SFH_listen_to_opposition:0 "听取反对者的意见"
SFH_listen_to_opposition_desc:0 "虽然确保改革路线不出乎我们意料是非常关键的一环，确保改革能够在大家都喜闻乐见的情况下开花结果也是相当重要的目标之一。听取来自反对者的意见可以为我们打开全新的思路，并且让政策往群众喜好的方向发展。当然，这些意见都会被我们严格审查，并且最后的决定权仍然在我们手上，不过开放听取意见的渠道总比没有好。"
SFH_constitutional_convention:0 "临时立宪会议"
SFH_constitutional_convention_desc:0 "出于对国情的考量，直接进行轰轰烈烈的立宪会议，企图一步完成改革的里程碑是不现实的。尽管符合反对派政治诉求的政治改革能够在未来维持社会稳定，在短时间内，我们依然需要面对大量来自政府内部以及守旧派贵族的抨击，而最好的选择便是不要直接跟他们对着干。在这场临时的立宪会议中，我们将会召集忠于改革的派系人员以商讨未来国家的发展方向，设计一份等时机成熟后才会被正式推行的宪法。虽然许多朝廷外的政治家也被邀请参与，他们的身份都遭到了严格的审查以确保会议能在我们监管下稳步推进。"
SFH_constitutional_convention_tt:0 "选中后将触发一系列事件以进行会议。"
SFH_social_promotion:0 "社会宣传"
SFH_social_promotion_desc:0 "许多远乡社会中的平民老百姓不了解我们所做的工作。政治改革在他们眼中就像是遥不可及的天书，是属于政治家，朝廷上的老爷们的玩物，跟他们的生活一点关系都没有。我们所要做的便是打破一般人的政治冷漠，让他们意识到我们所做的事情是多么伟大，同时也有资格参加到这一光荣的载入史册的事件中去。更重要的是，这可以为我们的计划凝聚一批忠诚的群众，他们的存在会极大地扩大我们的影响力。"
SFH_encourage_political_ideas:0 "鼓励政治思想"
SFH_encourage_political_ideas_desc:0 "由于之前我国政府对持异见者的打压政策，前代国王时期的民间政治思想许多都被打压得不成体统，要么是拿起枪杆子做了叛军，要么是躲在地下，偶尔印印报纸，大多数时候都了无音讯。这样的局面或许符合之前的国情，但现在对于改革确实弊大于利。我们可以开始进行社会宣传，在不反对我们统治的基础上鼓励新的政治思想，让民众开动起他们的脑瓜的同时不用担心吃枪子。"
SFH_replace_local_officials:0 "更换各地官员"
SFH_replace_local_officials_desc:0 "在过去，各地官员大多由政府直接指派。这些人许多来自各地的权贵阶层，能力没有得到考核就得到了高薪的闲职。大量政府资金被投入到这些意义微乎其微的职务上，同时还不得不开放更多的职位以维持政府运转。我们应当采用更为严格的考核，打击各地的走后门现象，将那些不合格的官员全部替换成详细考核过后的正式公务人员，同时缩减没有意义的职位以减少政府开支。"
SFH_create_democracy_facility:0 "设立民主机构"
SFH_create_democracy_facility_desc:0 "我们可以出资在各地建立一些机构组织来帮助人民了解我们所在做的工作以及如何在未来参与到政治活动中去。同时，除了起到宣传作用，这些机构还可以帮助提供相关的服务，提供一般人了解甚至是改变政府的渠道。虽然他们的权限在很大程度上会被限制在各地基层政府上，不过改革要循序渐进的来，这样也不错。"
SFH_looking_for_the_future:0 "展望未来"
SFH_looking_for_the_future_desc:0 "经过我们的不懈努力，终于是时候宣告改革的阶段性胜利了。我们将公布先前拟定的宪法并投入到正式的政府运作中去，同时开放先前设立的各地民主机构，展开地方政府的改革试验，允许拥有我国完整政治权利的公民参与到政府人员的选拔中去。与此同时，诸如打击腐败，扩大对外公务员考试以及严格化相关司法等一系列政策也将得到实施。尽管由于政治局势尚且不够稳定，关于国家级选举的决议仍将被推迟，但相比我们的努力不会得到白费，而远乡王国的政治面貌很快就会经历立竿见影的巨大变化。"
SFH_middle_route:0 "中间道路"
SFH_middle_route_desc:0 "我国政局的混乱已经证明了旧体制的低效，哪怕为了避免前代国王改革而带来的灾难，我们也不该继续维持现状。改变必须被做出——无论程度大小。尽管反对派猖獗的客观现实意味着我们不可能大动干戈的改变这个国家的政府，许多对民众的承诺和小范围的改革仍然可以被推行。这样做，我们既不用担心让政府失去控制，也不用担心会继续给予反对派辱骂我们的理由。"
SFH_call_for_rationality:0 "呼吁理性"
SFH_call_for_rationality_desc:0 "老祖宗流传下来这么多年的制度是你一天就能改完的吗？用了几百年的制度你就真的一动也不动了？有些人脑子转不过来，为什么改革一定要心急火燎地快速推进，不去做就是一动不动，恪守成规呢？我们的国家需要更多理性的声音，带领人们走出两极化的怪圈，从改革与保守之间的怪异对立中脱离开来，理性，正确地看待皇室带给王国的政策。要让百姓意识到，我们目前的所作所为才是最靠谱且安全的，这是为了每个人的未来而着想，绝不是向任何一方妥协。"
SFH_fight_against_the_revolution_base:0 "打击革命党根据地"
SFH_fight_against_the_revolution_base_desc:0 "革命党，哦，“人见人爱”的革命党，不理性的最佳例子。有理想是好事，我们都认可这一点——可将自己乃至身边的亲朋好友，甚至毫无联系的人民置身于水火之中，便不再是“理想”，而是“暴徒”了。加大打击革命党根据地的力度可以向公众展示我们重夺和平的决心并增强政府的威信力。长久以来，许多人认为自己轻松地可以踩在我们头上，肆意妄为地鼓吹着自己的政治观点，全然不顾忌我们更加全面的考虑…这必须停止。"
SFH_proper_concession_when_taking_action:0 "执行层面的适当让步"
SFH_proper_concession_when_taking_action_desc:0 "虽说有时候，暴力是制止更可怕的暴力的不可避免的手段，但现在还远远没到“不可避免”的时候。仅仅使用暴力去打压反对派是另一种懦弱象征——他意味着政府不愿意接受改变，只得使用暴力手段去打压自己的敌人，却不将审视的目光投向自己。向公众营造这样的政府形象很显然是不切实际的。虽说为了体现政府的威信和维持和平的决心，适当的平叛活动会是必须的，但我们可以做的小心一点，平和一点，减少人员的伤亡，不要让任何人抓住我们可能的把柄。"
SFH_proper_reformation:0 "适当的改革"
SFH_proper_reformation_desc:0 "这年头，凡事都讲究个度。历史已经向我们证明的改变的必要性，但同样的，历史还向我们证明了步子迈得太大，可是要扯到蛋的。作为全远乡王国的领导政府，越是在这样的黑暗时代，就越要小心谨慎，越要确保一切都能安全进行。改革已不可避免，但许多政策并不一定要即刻落实。如今的远乡王国还有许多问题尚未解决，在国家的分裂面前，就连许多叛乱的反对派都仅仅算是小事。在我们处理完那些事务前，改革应当“适当”地进行。"
SFH_concession_to_revolutionaries:0 "向革命党人让步"
SFH_concession_to_revolutionaries_desc:0 "虽说许多贵族将革命党人视为洪水猛兽，他们中其实有很多人都愿意同官方政府合作，以更加和平的方式推行远乡王国的改革。虽说我们历史已成定局，我们已无法改变曾经合作破裂的事实，但现在去挽救这份关系尚且说不上晚。许多改革支持者并没有向革命阵线一样走向暴力的道路，向他们的理想让步，支持他们的部分政治活动，我们可以快速获取来自这部分人的支持。"
SFH_allow_small_gatherings:0 "允许小规模集会"
SFH_allow_small_gatherings_desc:0 "许多人都对政治集会缺乏正确的认识。几个支持政府改革的人聚个会，吃顿饭，那就是颠覆政权啦？没人舞刀弄枪也没多少人敢真正走上街头，不过是老百姓在吃饱了撑点后想谈一谈同自己关系不大的国事罢了。就算是对于那些真正的政治家而言，小规模的集会既不是发动政变的场所，也不会是聚集恐怖分子的手段，这些集会允许了政治思想的繁荣发展，或许或多或少会有害于国家的整体稳定，但长久以来，这对于营造一个开明的政府形象，并推行未来的改革计划而言，有着相当大的作用。"
SFH_bribe_nobles:0 "收买贵族"
SFH_bribe_nobles_desc:0 "许多政府内的保守派会反对改革计划的原因无非就那么几个，而在其中占了大头的原因往往是因为这些人的利益遭到了来自改革的动摇。应对方式并不困难。我们之所以向外界呼吁理性看待政府的改革，除了向民众发出我们的声音外，同时还向贵族发出了我们的声音。改革的阵痛会有，但许多贵族的资产并不会遭到影响，实际上，政府甚至会向他们申请合作，这样不但可以将大量的资本用于建设国家，还可以让贵族们分到的“羹”更大。"
SFH_carrots_for_people:0 "给老百姓点甜头"
SFH_carrots_for_people_desc:0 "向保守派的妥协无疑会早就民众对政府的怀疑，但这不必担心。虽说在如今的环境下提高政府开支不一定是个好主意，但适当的做出改变，提高百姓的生活水平，也是体现政府在干实事的措施之一。"
SFH_renew_government_buildings:0 "行政机关翻新"
SFH_renew_government_buildings_desc:0 "我国的许多行政机关过于老旧——无论是设备，文档，还是工作人员。这些陈腐的公务人员不但不能良好地履行自己的职责，甚至会起到反效果，影响各地政府的正常运转。我们可以开展大规模的审查活动，作出表率作用，增加政府行政机关的运转效率。"
SFH_sail_peacefully:0 "平稳航行"
SFH_sail_peacefully_desc:0 "拒绝改革？推行改革？为什么一定要在这两者之间作出抉择？一个聪明的政府既不会在不安定的时候推行可能起到反效果的大规模改革，也不会为了一己私欲拒绝任何进步思想，将枪口对准自己人。作为远乡王朝的统治者，我们必须为这个国家的未来保驾护航，一切都以安全稳定优先，待到尘埃落定之时，真正的变革便会到来。现在，诸位，请相信我们的选择！"
SFH_consolidate_traditions:0 "巩固传统"
SFH_consolidate_traditions_desc:0 "远乡王国拥有悠久的文化和古老的传统，历史上王国利用这些文化和传统化解了一次又一次的危机挽救王国于危难之中短暂无序混乱的改革已经遭受到王国全体阶层的反对，尤其是手握重权大地主和贵族们，君主威信扫地已经是不可避免结果，不如借此机会同意大地主和贵族们的提议，由大地主和贵族们主导恢复古老的传统，既可以满足他们的要求，同时一定程度上平息人民的不满。如果大地主和贵族们成功平息了危机那么将皆大欢喜，如果他们失败了则可以将所有的过失推到他们头上。"
SFH_encourage_conservative_thought:0 "鼓励保守派思想"
SFH_encourage_conservative_thought_desc:0 "老国王郑铭的改革虽然失败了，但是对远乡的传统造成了巨大的冲击，很多人抛弃了古老优秀的传统，转而接受所谓的现代派思想文化。因此要动员宣传机器，告示国人是老国王的改革和所谓的现代文化酿成了当下的危机，而解决当下危机唯一的方法就是重拾传统保守的思想，所幸国民接受现代文化并不是太久，只要稍加引导他们就能重拾悠久而且伟大的传统思维。"
SFH_release_their_anger:0 "让他们发泄发泄"
SFH_release_their_anger_desc:0 "即使是最年轻的家长都知道，一味匡正叛逆的孩子往往会适得其反，对于国家和国民更是如此。因此乘现在还未民愤还未完全泄发泄爆发，开闸泄洪平息民愤同时将国民的注意力转移，很快他们就会冷静下来。"
SFH_beat_them_all:0 "重拳出击"
SFH_beat_them_all_desc:0 "很显然国民是受到破坏分子鼓动的，他们的行动逐渐具有组织性和目的性。不过幸运的是我们发现了这个处于萌芽阶段问题。为了王国的稳定，我们必须打击这些跟随破坏分子的堕落者，以示杀鸡儆猴。大义不拘小节，这已经不是一般老百姓了，不能再犹豫了，一定要出重拳。"
SFH_patriotic_advertisement:0 "爱国主义宣传"
SFH_patriotic_advertisement_desc:0 "爱国主义是远乡传统文化的瑰宝，在远乡无数次的危机中，国民在可贵的爱国主义精神带领下度过难关，然而在老国王的改革宣传中居然有意淡化了爱国主义宣传，这无疑是自掘坟墓。目前民众的暴动稍稍平息，我们可以在这空挡中大力宣传爱国主义精神，提醒国民牢记自己的责任与义务，有国才有家爱国是每个国民应尽的责任与义务。"
SFH_military_control:0 "军事管制"
SFH_military_control_desc:0 "上一轮的爱国主义宣传获得了喜人的成果——暴动再次降级。但是，我们不能沉溺于暂时的成功之中，为了防止未来可能发生的暴动反弹，必须进行军事戒严，封锁街道对国民的出行进行限制以避免他们再次接触破坏分子。只有这样才能一劳永逸的根除暴动，帮助王国回归稳定。"
SFH_watch_the_opposition:0 "盯紧反对派"
SFH_watch_the_opposition_desc:0 "在军事管制的作用下，我们很快就能发现那些不遵从戒严令仍在乱窜的耗子。不过不得不承认的是，这些反对派的确很专业，他们不但派具有一定反侦察能力，甚至能将我们的警探和特工引到错误的地方给我们造成损失。因此我们必须投入更多的人力盯紧这些反对派，从鱼龙混杂的消息中找出规律，将他们一网打尽。"
SFH_assassination_of_radicals:0 "暗杀激进分子"
SFH_assassination_of_radicals_desc:0 "在军警齐心同力下，我们终于找出了这些反对派的老巢，虽然最理想的方案是出动部队将其尽数逮捕，但在民间不乏他们的支持分子，为了避免暴动再次升级，我们只能收买这些反对派中的识时务者，制造一起爆炸将这些激进分子送上天，然后将事情的起因归为内讧，这样既避免了暴动反弹又达成了目的，岂不美哉。"
SFH_help_from_the_nobility:0 "来自贵族的帮助"
SFH_help_from_the_nobility_desc:0 "国王指挥下的铁蹄与利刃正严酷镇压着社会的暴动，而这一点已经让不少贵族感到了担忧：他们是否会成为这疯狂杀戮的下一个牺牲者？为了防止这些贵族的担忧愈演愈烈，我们可以故意做出需要帮助的样子，在几个无关紧要的方面露点破绽。这样，那些已经吓尿了裤子的肥头大耳之徒就会摇着尾巴过来舔国王和军队的鞋尖。当然我们会损失对一些领域的掌控，但最重要的是，贵族被震慑地不敢多言。"
SFH_more_bribery:0 "威逼利诱之下..."
SFH_more_bribery_desc:0 "即使枪口已经抵上脑袋，顽固派仍旧不肯承认他们犯下的错误，还坚持像一条死狗一样叼紧嘴里的最后一口肉，死也不愿松开。既然如此那就怪不得我们下狠手了！有了国王的授权，吾辈在处理这些杂碎时将不再有后顾之忧。任何手段都是被允许的，无论绑架、勒索、敲诈，国王只要他们臣服。对于不知礼义廉耻之人，军队也无需多言贵族的原则精神。历史也许会因此把曾经骄傲荣光的名号抹黑，但我等以此拯救了国家。"
SFH_now_we_are_safe:0 "现在，我们安全了。"
SFH_now_we_are_safe_desc:0 "大街上的枪声和叫喊声终于平息下去。在漫长的流血冲突后，国王在他忠诚军队的簇拥下完成了对王国的控制。即使是最顽固的反对派也承受不了这样的伤亡——这更证明他们不过是一群小人、觊觎者和投机分子！这群人牺牲王国无辜的人民只为了自己一己私利，而国王不得不对臣民痛下杀手！这场动荡证明了一个自古以来的道理，那就是只有国王坚定的手才能够保证社会的稳定。一切权力向中央看齐，一切乱臣贼子只敢匍匐在王座之下。\n\n远乡王国万岁！国王陛下万岁万万岁！"
SFH_fire_of_the_revolution:0 "革命之火"
SFH_fire_of_the_revolution_desc:0 "如果真要刨根问底的话，恐怕革命的火焰能一直追溯到伟大战争时期，当许多无辜的民众为了求生而揭竿而起，想帝国掀起叛乱时。不过，远乡王朝的情况与南巴斯蒂亚帝国并不相同，他们昏庸的国王选择了走向贪得无厌的道路，挑起了全大陆规模的可怕战争——而我们恰恰相反。那些愚蠢的革命者并不了解我们的难处，只是一昧地索取着，要求着，希望政府能实现他们的一切愿望，而这恰恰是最不可能的。\n\n在郑铭时期，我国曾经同革命者达成过合作关系，有条不紊地推行着国家的现代化进程。然而，今非昔比，如今的“革命者”已经成了暴力的代名词，他们中鲜有人会与我们进行合作，哪怕是哪些选择不加入叛军，留在我们控制区内的前革命者，许多也不愿相信政府，只是自己过着独立且孤寂的日子。"
SFH_preserve_the_fire:0 "保存火种"
SFH_preserve_the_fire_desc:0 "革命党人并非每个都是要千刀万剁的极恶之徒，实际上，考虑到我们曾经的所作所为，能有今天的局面，我们最起码也要负一定的责任。虽说亡羊补牢多少有点讽刺的意味在那里——但这并不代表我们就应该轻松地将同是远乡子民的那些温和革命党人放弃。作为全远乡王国的唯一合法政府，我们应当怀有宽怀大度之心，不要凡事都选择以暴力手段解决，面对同时希望国家好起来的子民们，最好还是悉心教导，甚至是从他们的话语中学习。\n\n革命之火尚存，正如同远乡王国将会千秋万代一般。"
SFH_scaling_down_the_siege:0 "缩减围剿规模"
SFH_scaling_down_the_siege_desc:0 "平日里对革命党根据地的围剿已经被证明是低效且负面的政治作秀。在没有正规军队的支持的情况下，小规模二线部队对根据地的突袭作战往往缺乏长远的目的，规模很小，自然，也不会有什么体面的结果了。维持之前围剿的规模需要我们持续性的投入部队，调动物资并顶着舆论压力，无论是现在还是将来，都很难看出维持当下规模除了面子勉强挂得住外有什么显著的好处。因此，我们可以缩减对革命党人根据地的围剿规模，同时放宽社会中相关抓捕行动的烈度，是时候让大家多喘口气了——无论是对于打人的一方，还是被打的一方，甚至是看戏的一方。"
SFH_stop_the_fire:0 "全线停火"
SFH_stop_the_fire_desc:0 "为了寻求与温和派革命党人谈判的突破口，我们不得不将目光投向山区中的革命党人根据地。当然，谁都知道比起温和派的革命党人，那些举起枪杆子跟我们对着干的混蛋是妥妥的叛军——但在双方真正撕破脸以前，直接的冲突的确很难成就什么大事，反而，还会被冠上破坏和平的名义，引来人的白眼。暂时的停火可以放出我们渴望和平的讯息，同时，也可以成为拉拢温和派革命党人的诚意体现。"
SFH_symbolized_battles:0 "象征性交战"
SFH_symbolized_battles_desc:0 "为了寻求与温和派革命党人谈判的突破口，我们不得不将目光投向山区中的革命党人根据地。当然，谁都知道比起温和派的革命党人，那些举起枪杆子跟我们对着干的混蛋是妥妥的叛军，因此，我们绝无可能真正做什么所谓的“放下屠刀，立地成佛”。同时，对围剿的妥协也会对外放出政府软弱态度的讯息，这自然不会是我们想要的。因此，象征性的缩减围剿规模既可以让我们获得与温和派革命党人谈判的底气，也不会影响局势的稳定与平衡。"
SFH_send_out_reformist:0 "派出改革派"
SFH_send_out_reformist_desc:0 "虽说同革命党人有着许许多多的冲突，我们的政府中也是存在着大量的改革派人员的。他们或许无法在方方面面同革命党人达成一致，但对于改革的目的和必要性而言，当下来看，他们也并非是什么死敌。实际上，派出之前始终被中央冷落的改革派系人员相当于放出了“愿意改革”的讯号，不但能表达充分表达我们的诚意，还避免了派出意见相左的谈判人员而导致的可能的冲突。尽管如此，这会使得改革派人员在我国政府的影响力进一步加大，同时导致保守派不满，甚至，还有可能让政府在改革谈判中呈现相对弱势一点的姿态——不过，好处总归是大于坏处的。"
SFH_seak_for_their_nice_atitude:0 "寻求他们的合作态度"
SFH_seak_for_their_nice_atitude_desc:0 "虽说我们已经愿意把脸面放下以争取许多反对派的合作，可血腥的历史终究无法改变，而我们的那一份责任也不是说说就能过去的。为此，光是把脸面放下还不够，我们可以适当地在政治理念上做出一些让步，向这些人进行一些物质和精神上的双重许诺，以体现我们的诚意与决心。"
SFH_hold_our_position:0 "坚持我们的诉求"
SFH_hold_our_position_desc:0 "在漫长的谈判中，有时候我们甚至会开始忘记自己的身份——这可是一个政府有着绝对权力的君主制国家。当然，我们在未来有可能会改变这一点，向更加符合现代远乡王国国情的理论学习，但绝对不是现在。实际上，哪怕我们不会这么做，也不应该处处让着别人，谁知道他们到底靠谱不靠谱？就算是革命党人，也并非铁板一块，他们中也有着只会呼喊口号，甚至纯粹是为了分一份羹才加入的反对派队伍，既然如此，坚持我们的诉求，鼓励双方在平等的角度上思考问题，对于大家而言都是有益的。"
SFH_release_the_moderate_revolutionary:0 "释放温和派革命党人"
SFH_release_the_moderate_revolutionary_desc:0 "随着我们与许多在野的温和派革命党人的关系逐渐恢复，是时候做出最后一步以完成我们的表示了：释放那些相对没有采取过于激进行动的温和派革命党人。一方面，释放出去的这批人大多为温和分子，不会采用暴力手段实现他们的目标，另一方面，在我们官员的精挑细选下，这些释放出去的前革命党人大多在一定程度上得到了我们的“说服”，多少会和在外面的同胞讲上我们几句好话。现在只期望计划能正常运行了。"
SFH_blow_out_the_fire:0 "吹熄火种"
SFH_blow_out_the_fire_desc:0 "革命是什么？革命是建立在推翻现有制度的激进行为准则上。无论那些暴徒中分了多少派系，有怎么个“激进派”，“温和派”的区分，都与我们无关。他们的行为已经严重触犯了我国法律，同时极大地破坏了国家的稳定和人民的幸福生活。或许，政府内部中有人支持部分革命党人提出的改革政策，然而，这一切都应当在由我们判断，我们主导且负责管理，设计你的基础上进行稳步推行，而绝对不是一群收了外国倾覆分子钱财的不法之徒。\n是时候吹熄革命的火种了，只有我们才能带领进步。"
SFH_new_round_of_siege:0 "新一轮围剿"
SFH_new_round_of_siege_desc:0 "虽说直接针对根据地开展全面进攻从财政和实际军事情况来看并不现实，针对各地小范围的叛军营地，反对派基地和地下组织开展围剿依然可行。如果我们希望继续维持稳定的统治，那么减少像这样的不确定因素，扰乱社会秩序的反对分子就很有必要了。通过发起新一轮围剿，想必我们可以极大地提高社会的稳定性。"
SFH_no_one_lives:0 "不留活口"
SFH_no_one_lives_desc:0 "当那些该死的反叛分子决心跟我们对着干的那一刻起，就应该做好了为自己的“事业”而“英勇牺牲”的准备。虽说既不会有披着金光的天使来迎接他们，也不会有围绕着画圈的闪亮棺材，我们可以帮忙确保他们在乱葬岗同自己的同伴好好聚一聚。杀伤性武器会被大量配发，见到任何有一丝反抗可能的敌人便直接开火，对敌人的仁慈便是对自己人的残忍。"
SFH_show_our_mercy:0 "慈悲为怀"
SFH_show_our_mercy_desc:0 "虽然我们的确是要采取强硬手段来应对反叛问题，但没有必要天天见血。我们需要留给群众的是正义和稳定的象征，而不是走到哪里就尸横遍野——哪怕横着的尸体是反叛分子也一样。换装更多低杀伤性武器，我们可以将围剿的核心放在抓捕和制止上，而不是像某些激进分子说的那样，“为了防患于未然所以全给枪毙了”。"
SFH_enlarge_arrest_efforts:0 "扩大逮捕力度"
SFH_enlarge_arrest_efforts_desc:0 "过去，我们针对反叛分子的逮捕力度似乎有点太小了——或者因为拨给警察的经费被贪污得太多了，不过无论如何，现在都必须重新把抓人的事项摆到台面上来看。反叛分子可能存在于任何一个角落，他们可以是下水道中的低语，路边跟你打招呼的邻居，还可以是天花板上吱吱作响的幽灵，我们必须做出相对应的努力才得以打败他们。"
SFH_are_u_revolutionaries:0 "“你是不是革命党人？”"
SFH_are_u_revolutionaries_desc:0 "然而，尽管我们付出了如此之大的努力，似乎总是会出现该死的漏网之鱼。因此，我们可以开放一种类似悬赏的系统，鼓励一般民众积极互相检举以发现身边的反叛分子。奖励会是优厚的，从职场上的便利，直接的资金补助到社会服务的快捷通道，我们会尽可能让他们的检举不至于有什么亏欠的地方，并鼓励大家宣扬这份风气，积极带动身边的人一起检举疑似反叛分子的敌人。"
SFH_confort_the_public:0 "安抚公众"
SFH_confort_the_public_desc:0 "尽管许多同反叛分子毫无瓜葛的人并不会成为抓捕的对象，在搜查和逮捕的过程中，我们的警察部队的确容易造成社会上的不安。为了应对这一情况，我们可以积极安抚公众的情绪，尽可能地避免将调查和逮捕行动摆上台面，影响到一般人的正常生活。"
SFH_assassination_of_radical_revolutionaries:0 "暗杀激进革命者"
SFH_assassination_of_radical_revolutionaries_desc:0 "对于那些组织相对严密的反叛团体而言，想要直接进行抓捕并不容易。然而，通过我们特务机关的不懈努力，暗杀部分重点反叛领导人成为了可行的选项。下了毒的食物，突如其来的大砍刀，或是简简单单的一发子弹，暗杀的方式多种多样，重点是我们必须尽快行动。只要能成功暗杀了反叛团体的领导人，虽说他们不一定立刻上演一出群龙无首的好戏，但整体势力必然会大大削弱，要么给我们乘虚而入的空间，要么他们就得去同下水道的老鼠作伴，转入地下并隐蔽起来。"
SFH_a_moderate_revolution:0 "温和的革命"
SFH_a_moderate_revolution_desc:0 "通过我们的不懈努力，终于，我们成功同温和派的革命党人达成了合作协议，我们承诺会进行部分改革，以此换取他们的合作态度，并且不再组织反叛团体。当然，在时代飞速发展的当下，温和派革命党人仅仅占据了整体叛军的九牛一毛，我们也很难预估这究竟会对革命阵线产生什么样的影响。不过，有一点可以确定，随着我们已经放出了改革和谈判的口号，相信未来一定会有更多人认可我们的行为，转而加入我们的行列…"
SFH_a_moderate_revolution_tt:0 "§C内战爆发时，革命阵线会遭到削弱。§!"
SFH_dawn_of_peace:0 "和平之曙光"
SFH_dawn_of_peace_desc:0 "对着干不好，但谁也不会让着谁。随着政策的不断推进，我们最终决定不将过多的精力投放在彻底解决这一问题上——尤其是在投入了也未必能解决的基础上。同温和派革命党人的合作看似无害，可实际上会削弱我们在政府内部的话语权；而大规模的抓捕又会降低民众对政府的信心，反而无法实现社会的稳定。因此，我们最终决定还是以大局为重，走中庸的道路，尽可能确保不会影响到任何一个角度的发展。"
SFH_dead_revolution_is_the_best:0 "死去的革命才是好革命"
SFH_dead_revolution_is_the_best_desc:0 "死掉的革命才是好革命！长久以来，我们都花了多少时间，精力和物资在这些毫无意义的事情上了？扰乱社会秩序，勾搭境外势力，意图倾覆政权，这群叛乱分子的罪名要多少有多少，二十个打字员去打三天三夜都打不完！是时候停止让步了。只有我们强硬起来，国家才有变好的可能。"
SFH_dead_revolution_is_the_best_tt:0 "§R内战爆发时，革命阵线会增强。§!"
SFH_broken_dreams:0 "繁华碎梦"
SFH_broken_dreams_desc:0 "国祚衰微，举目荒凉。\n\n几十年的繁华如同一场空梦，而现在是时候从这场碎梦中醒来了，否则，我们只会溺死在这无尽的空虚之中。\n正因为我们清楚的知道这一点，所以睁开了眼睛，正视这个国家存在的诸多问题。\n\n尽管这很残酷，但我们必须面对现实。"
SFH_broken_dreams_tt:0 "§Y这条国策树会更加注重于应对国内各地的经济改革。§!"
SFH_villain_stabbed_in_the_back:0 "暗中捅刀的小人"
SFH_villain_stabbed_in_the_back_desc:0 "在王国正值动荡的时候，那些把持工业的资本家寡头们并没有选择和我们同舟共济，反而还在我们背后捅刀，更有传言称他们正在勾结外国，使得我们本就风雨飘摇的情况更加岌岌可危，这种情况，只要是个爱国者，无论是谁都无法容忍，他们牢牢把控着这个国家的命脉——工业，已然成为了新的工业贵族，他们的实力逐渐壮大，甚至隐约有了反抗王室的念头，这毫无疑问是一种背叛。\n\n为了我们的未来，是到了处理这个问题的时候了。"
SFH_harnessing_the_oligarchy:0 "驾驭寡头"
SFH_harnessing_the_oligarchy_desc:0 "那些寡头们正无限制扩张的势力必须得到有效的遏制，最为行之有效的方法就是把他们的一切紧紧握在手里，所以我们必须驾驭他们，让他们成为我们最得力的一部分，如果那些利益熏心的资本家寡头们拒绝体面，我们自然有办法能让他们体面，只要我们有这个意愿。\n趁着国家机器还掌握在我们手里，一切还没有步入万劫不复的时候，必须对他们进行限制，必须改变这无序而混乱的局面。\n\n这可能会很难，但为了远乡王国的未来，我们别无选择。"
SFH_fund_other_companies:0 "资助其它企业"
SFH_fund_other_companies_desc:0 "想要对付已经有的工业寡头们，最好的办法就是在打压他们的同时增加他们的竞争者，是的，我们要培养那些实力不足的企业，这将是我们制衡他们的筹码之一。\n这也许会破坏一部分我们原有的工业设施——毕竟我们打压的是原有的工业体系，势必会造成某些损失，但是没有办法，这一切都是必然的牺牲，我们可以忍耐，历史会证明我们的选择与决断是正确的。\n现在，让我们静静熬过这段改革的阵痛，等待迎来改革的春风。"
SFH_bribe_non_loyalist:0 "收买非忠诚派"
SFH_bribe_non_loyalist_desc:0 "事实已经证明，寡头的内部并非是铁板一块，在我们进行打压的时候，已经有一部分不坚定的投机分子选择倾向于我们，所以我们可以借机收买那些并非忠诚于整个工业贵族阶级的非忠诚派，让他们产生内部分裂，那些家伙虽然不值得信任，但毫无疑问是会为了追逐利益而相互撕咬的野狗，我们接下来要做的只需要在上面加一把火。\n这个计划虽然听起来天衣无缝，但势必会引起国家政局的动荡，不过还好，一切都在可以忍受的范围。\n让我们静静的等待着这些工业寡头们狗咬狗的局面发生吧。"
SFH_dig_up_dirt_on_them:0 "收集黑料"
SFH_dig_up_dirt_on_them_desc:0 "正如我们所预想的那般，这些工业寡头们没有一个是干净的，勾结外敌，压迫国民，所作所为简直是罄竹难书，这些蠢货自负的以为自己的势力足够强大，甚至都没有掩饰自己犯下的残暴罪行，他们觉得自己必然可以万古长存，认为我们不敢动他们分毫，但是他们错了，这个国家可不是他们一手遮天。\n只要我们暗中收集他们的罪证，就必然可以在他们的头上给予重重一击，打的他们头晕眼花。\n是的，一切都在计划之中。"
SFH_put_it_straight:0 "明人不说暗话"
SFH_put_it_straight_desc:0 "我们已经收集了足够的罪证，并且将这些罪行公之于众，是时候让这些寡头们品尝自己种下的恶果了，舆论也必将一边倒的倾向我们这一边——最起码表面上看起来是这样。\n我们会将这些工业寡头做的一切黑料全部抖露出来，他们的一切财产也会全部国有化，成为我们奋发上进的基石与力量，那些非忠诚派应该感到庆幸，自己站队了队伍，希望他们引以为戒。\n罪恶必将迎来审判，正义也会得到伸张，只不过迟到了些罢了。"
SFH_but_there_shall_be_cost:0 "...但也要有对应的觉悟"
SFH_but_there_shall_be_cost_desc:0 "我们远远低估了这些寡头的底线，当一切罪证摆在我们面前的时候，比任何言语都要更有价值。\n这些杂碎绝不是我们的同胞，而是叛国者，他们全都该死，这已经不需要走合法的程序了，直接动用国王的权限对他们进行铁与血的审判，我们将会直接派直属政府的暴力机关展开破坏行动，对他们进行最为严格的肃清，宁错杀而不放过，这一切都是为了防止这些家伙们死灰复燃。\n有的时候，彻底的毁灭也代表着重生，既然选择了这条道路，那就要有相对应的觉悟。"
SFH_fund_workers_against_companies:0 "资助工人反对派"
SFH_fund_workers_against_companies_desc:0 "在我们介入调查寡头之前，工人们就已经和寡头不断抗争着，只不过他们力量薄弱，那些抗争几乎没有什么作用，那毫无疑问，他们是值得我们拉拢的对象，可以和我们一起对付寡头们。\n我们可以资助那些工人反对派，往他们中间安插我们的人，让他们成为抗击工业寡头的第一线，有了我们的支持，相信他们的声音会更有力量，就算是最利欲熏心的寡头也会进行妥协。"
SFH_keep_current_situation:0 "维持现状"
SFH_keep_current_situation_desc:0 "很难理解的是，为什么一定我们非要和最为紧密的伙伴敌对？他们一直都是国家的命脉，国家的基石，没有他们强大的工业后勤支持，就没有远乡王国的今天。\n我们必须维持现状，任何激进且极端的手段都是错误的，因为我们知道，他们只不过是走上了一条错误的道路，我们应该先伸出手来，牵引他们走回正途，这是毫无疑问的正确的道路，我们应该做些什么。\n他们一直都是我们不可分割的一部分，是我们的同胞，我们根本没有必要刀剑相向。"
SFH_get_straight_to_the_point:0 "单刀直入"
SFH_get_straight_to_the_point_desc:0 "我们必须直接的告诉他们错误的地方，以此督促他们进行自我改正，当然，我们也会派人去督促他们，我们会花费一部分财政拨款，用以支持他们的改革，这毫无疑问会保证国家的稳定运行。\n只要他们愿意进行改正，那我们彼此双方就没有任何对抗的必要，虽然这会花费一些力气，但没有什么是不能够通过友好协商去解决的，哪怕是那些曾经有过错的朋友们也一样，我们必须给他们改过自新的机会。\n希望别出什么茬子才是。"
SFH_done_it_carefully:0 "谨慎为上"
SFH_done_it_carefully_desc:0 "为了不破坏与我们最好的伙伴之间的关系，我们必须谨慎，如今的国家已处于风雨飘摇，我们已经经不起折腾了，为了局势的稳定，我们所做的一切都是有用的。\n在我们进行持续性财政拨款之后，他们也十分乐意的帮助我们进行国家建设，恢复国内的经济，我们相信一切都往好的方向发展着。\n无论如何，寡头们都不会是王室的敌人，也不会是这个国家的敌人，让我们一起携手并进，共同见证这个国家的明天。"
SFH_improve_relationship:0 "搞好关系"
SFH_improve_relationship_desc:0 "大多数工业寡头们都乐意与我们进行合作，毫无疑问是一件值得庆幸的事情，像现在这样忠诚于王室的势力已经不多了，我们必须紧紧维持着与寡头们的关系。\n维持现状是不够的，我们必须同他们搞好关系，加大投资应该就是最为不错的选择，虽然会花费一些力量，但这种又能够维持双方良好关系，又能够促进国家建设的事情，可谓是双赢之举。\n保持国家的稳定是现在的重中之重，而我们的朋友将会成为我们最忠实的力量，我们如此期待。"
SFH_proper_threat:0 "适当的威胁"
SFH_proper_threat_desc:0 "有一个坏消息，我们的朋友态度越发嚣张了起来，似乎有些飘飘欲仙，又再次不把王室给放在眼里了。\n最好的办法就是通过国王陛下本身权高望重的地位，去给予我们的朋友适当的威胁，这也是宣誓我们主权的一种方法。\n我们虽然希望能够和我们的朋友保持良好的关系，但如果他们并不拿出真挚的友谊的话，我们也不介意做一些破坏友谊的事情——情况到底为何，只要他们不是过于愚笨，就应该能够理解我们的意思，希望他们不要给我们这个机会。\n朋友可以再找，机会可错过了就没了。"
SFH_give_some_sweet:0 "给点甜头"
SFH_give_some_sweet_desc:0 "不知为何，尽管我们已经表达了我们最大的善意，但我们的朋友似乎总有些消极怠工，不愿配合，就好像做什么事情都没有了动力一般，这个时候应该由我们来决定做些什么了。\n但，我们还能做些什么呢？只能再给予他们一些甜头，希望一切都能够如我们所愿，也希望情况能够继续保持稳定。\n我们的友谊坚不可摧，我们的合作亲密无间，这是其他人不容置疑的。\n但愿岁月静好，一切无忧。"
SFH_patriotic_sentiment:0 "爱国主义情怀"
SFH_patriotic_sentiment_desc:0 "资本虽然无国界，但资本家终究还是我们的同胞，他们显然已经理解了只有维持一个强大安稳的国家，才能够最大程度上保护他们现有的利益，对于我们彼此之间的合作也显得热情了许多。\n对于这种情况，我们自然是乐见其成的，这种爱国主义情怀在他们身上一直是一个稀缺精神，尽管里面可能有些杂质，可能有些人纯粹只是因为利益而和我们捆绑在一起，但谁在乎？\n我们共同的目标都是维持这个国家的稳定与繁荣，我们一直都在努力，愿远乡王国永垂不朽！"
SFH_kick_off_the_oligarchs:0 "踢开寡头"
SFH_kick_off_the_oligarchs_desc:0 "卖国贼全部都滚出了我们的市场，他们再也没有曾经的地位和影响力，那些工厂也全都成为了国有的财产，他们的势力也被彻底铲除，工人阶级手拉着手，共同歌颂着君王的威名，他们知道是谁带领他们脱离了苦难，掌控着自己的命运！\n虽然他们的退市引发了一定的风波，但是我们国家已经没有了后顾之忧，阵痛虽然难忍，但我们可以坚持，远乡王国从不缺乏坚毅与勇敢。\n现在是我们奋起，让经济和工业重归正轨的时候了！"
SFH_put_on_fetters:0 "带上枷锁"
SFH_put_on_fetters_desc:0 "寡头们已经明白，现在的情况再也不能够如他们所愿，远乡王国再也不会允许他们继续为所欲为了，尽管如此，他们也没有遭到彻底的清算，等待着他们的将会是另一种下场。\n尽管无奈，但他们也只能够带上名为法律的枷锁，接受王室与人民的监督，从此往后，他们将与政治无缘，只能够在规定的范围之内，形式，一旦逾越，等待他们的必将是更加严厉的惩罚。\n大局已定，寡头们再也没有了翻身的可能。"
SFH_keep_cooperation:0 "维持合作关系"
SFH_keep_cooperation_desc:0 "就这样，我们的工业寡头朋友们渐渐成为了这个国家主流的一部分，他们的势力几乎已经延伸到了这个国家的每一个角落，并且依旧还在逐渐发展，维持着整个国家的运转。\n虽然这相当于将国王的权威让渡了一份出去，但这也必然会让我们之间的关系更加紧密，虽然无奈，但这已经是既定的事实。\n我们的合作亲密无间，我们的关系密不可分，这句话已经被我们反复念叨了多遍，但只有在这一刻才是真正成为了定局。"
SFH_inject_power_into_industries:0 "为产业注入活力"
SFH_inject_power_into_industries_desc:0 "多年的自大迷梦、世界大战的惨败、政局不稳和国家的事实分裂让我们错过了工业发展的黄金窗口期，即使是修饰过的统计数据也在说明着我国经济如一潭死水般的停滞。而为了让我们的远乡祖国重返巴斯蒂亚乃至世界的强国之林，首当其冲的便是向死水潭投出一颗小石子，让停滞多年的我国经济重获活力。"
SFH_industrial_funds:0 "工业补助金"
SFH_industrial_funds_desc:0 "只有工业进步，国家才能富强。然而，远乡衰败的工业部门却长期受制于资金链不稳和投资不足，令富人们更倾向于置办田产而非投资，企业雇佣更多员工和扩大再生产变得难上加难，更不要提改善生产技艺和扩大市场了。\n\n为此，远乡政府将为重点工业部门直接注资，同时为其他产业部门提供力度不一的退税优惠和政策补贴，以真金白银推动工业的发展：毕竟我们的时间有限，不能因为局势的混乱而停下工业化的脚步，我们只能继续前行。"
SFH_import_science_blueprints:0 "进口科研蓝图"
SFH_import_science_blueprints_desc:0 "曾几何时，继承天朝上国遗产的我们有着让全巴斯蒂亚惊艳的科技水平，但时移世易，我们也不得不承认，固步自封和多年的内耗使得我们的科研能力已经远远落后于大陆上的一些主要国家，他们的工业设计也已经远远领先于我们，我国市场被外国进口货占领就是明证。\n\n尽管不是很情愿，但我们也只能先从他们那边引进先进的设计图纸和产品生产线，从代工和仿制开始，为我们未来的工业化计划打下地基——但我们终究会与我们的先祖比肩，如今寄人篱下的屈辱只会是暂时的。"
SFH_continous_industrial_expansion:0 "持续工业扩张"
SFH_continous_industrial_expansion_desc:0 "我们的工业化努力已经取得了初步成效，但现在还远远没到我们可以自满的程度：为了巩固我们刚刚获得的良好发展势头，我们不仅要继续投资更多的企业，以适应国内不断发展的工业需求，更应该由政府出面规划产业园和企业用地，并投资物流、服务业等配套设施，以使产业集聚效应可以为我国经济的发展提供更强的推动力。\n\n至于工业发展的原材料问题…我们承认我国的采矿业确实亟待提升，但是就目前而言，向海外的资源生产国直接进口原材料才是更为经济和便捷的方法。"
SFH_renew_mines:0 "矿井翻新"
SFH_renew_mines_desc:0 "“磨刀不误砍柴工”，在我们忙于工业发展的同时，也不能忘记工业的基础——原材料的开采和运输。因此，是时候将目光放到我国亟待发展的采矿业上了：依靠铁镐和土炸药的采矿业，怎么能为工业发展提供足够的原材料呢？\n\n我们不仅将直接投资我国的采矿业，还会从国外重金购置先进的采矿设备，并改善矿场的安全生产条件，同时为我们的矿工提供最新的生产培训和更完善的安全规章：只有这样，我们才能为远乡咆哮的工业引擎提供足够的燃料，至于进一步工业扩张，我们相信在政府打下的良好基础下，民间资本可以很好地实现这一目标。"
SFH_connect_east_to_west:0 "联通东西"
SFH_connect_east_to_west_desc:0 "蓬勃发展的经济带来了更多运输需求，同时更新我国老旧的铁路网也已经成为了当务之急，但有限的资源使得我们必须做出取舍。\n\n最终，我们决定修建从西乡到山东的东西向铁路：这条铁路将会串联起我国最为发达的几个沿海工业城市，成为我国经济发展的大动脉；而配套的其他道路设施将会大大便利城市居民的通勤和物资的运输，为我国的工业发展提供坚实的物流保障。\n\n虽然一些人可能会对我们“忽视农村”的行为表示不满，但是别忘了，只有先富才能带动后富：如果不优先发展城市，那么“城乡皆穷”的局面还将继续，为了我们的继续前进，再苦一苦农民吧。"
SFH_military_investment_project:0 "军工投资项目"
SFH_military_investment_project_desc:0 "远乡工业化的最直观后果之一，就是我们可以为军队提供更先进的武器装备。我们目前的民营工业已经发展到足以满足国民基本需要和出口创汇的需要，是时候将目光放在军事工业和重工业上了。\n\n在政府的直接注资激励之下，我们将会翻新现有的军工厂，并投资兴建更多的军事工业：很快，远乡的士兵们将会用上最先进的步枪和魔法武器，甚至于机械化和空地协同这样的战术试验也可以在机械化装备和航空工业得到发展的情况下开展。或许一些人会称其为“穷兵黩武”，但没有强大的国防，哪来的国泰民安呢？"
SFH_civilian_industry_expansion:0 "民用产业扩张"
SFH_civilian_industry_expansion_desc:0 "远乡工业化的最直观后果之一，就是“中产阶级”这个词汇第一个进入了远乡的社会结构之中。这些住的是公寓楼，喝的是气泡水的职员和技工们，有着远高于他们务农先祖的消费需求；除此之外，那些拿到了工厂工资的工人们，也不仅仅向他们的父辈那样只顾着赚钱在老家盖房子。\n\n因此，我们理应将目光重新投向这些真正意义上推动了工业化进程的人们：他们为国家发展做出了不可磨灭的贡献，我们自然也应该回报他们。就让我们继续投资民用工业和生活消费品，然后让我们的工厂生产出越来越多的电饭煲、收音机和小汽车吧：当他们发现商店的货架琳琅满目，而自己的衣食住行都变了样时，对远乡的热爱和对陛下的敬仰肯定会油然而生！"
SFH_import_industrial_tools:0 "进口工业器械"
SFH_import_industrial_tools_desc:0 "我们总算走到了这一步——远乡摸到了产业升级的门槛。然而不幸的是，以我们现在的工业化水平，离独立发展高新产业还有着一定的距离。\n\n因此，我们将向我们奠定工业基础时那样，向南巴共和国这样的技术大国进口更多先进的工业器械，并派遣我们的工业人才前往这些国家进行学习，并开展相关的技术合作：既然我们的第一任务就是“发展”和“不断的发展”，那么光凭努力蛮干很显然是不够的。"
SFH_agricultural_incentive_payments:0 "农业激励金"
SFH_agricultural_incentive_payments_desc:0 "南远乡的绝大多数人口都是在水田中插秧劳作的农民，但用“拮据”来形容我国大部分人口的生活状况，很显然有些轻描淡写：为了农业的可持续和稳定发展，我们应该立刻对农村和农业进行投资。\n\n虽然起步阶段我们能做的事情不多，但政府提供的基础农业投资、低息种子贷款和鼓励乡贤地主开展农业合作和小水利建设很显然是正确的选择，并且还可以解决农民们的燃眉之急。在这种情况下，一点点农业投资也能起到可观的效果。"
SFH_imported_quality_crops:0 "进口优质作物"
SFH_imported_quality_crops_desc:0 "虽然远乡以水稻种植而闻名，但我们的农业科技就和我们的其他领域一样亟待提升。因此，在现阶段的条件下，与其继续缓慢地推进农业科研和育种，不如从国外进口优质的作物，以填补我国国内的良种空缺。\n\n我们目前已经与南巴斯蒂亚和中巴斯蒂亚的农业企业取得了联系，如果一切顺利的话，对高产抗病作物的引进工作将会马上开始：虽然这样毫无疑问让我们的饭碗端在了别人的手上，但是起效将会是极其迅速的，司农官员们认为这些高产作物甚至在下一次秋收时就能让我国的粮食产量翻番。"
SFH_further_agricultural_expansion:0 "进一步的农业扩张"
SFH_further_agricultural_expansion_desc:0 "“民以食为天”，我们怎么能把安身立命的基础交给那些外国人呢？相反，远乡的立国之基一直都是远乡农民的朴实和勤劳：既然这些品质在过去的几百年中都让远乡得以受益，那么在工业化的大潮中，这些品质将会体现新的价值。\n\n朴实和勤劳的远乡农民将会响应国家赚取外汇的号召，在扩大种植面积、增加农时的同时，将自己的收成贡献给国营的粮农企业：而当远乡的大米在全巴斯蒂亚超市的货架上出现的时候，农民们肯定也会为自己对国家外汇的贡献感到欣喜：为了成为全巴斯蒂亚首屈一指的粮食出口国，我们的农民们必须加倍努力。"
SFH_import_machinized_agricultural_tools:0 "进口机械化农具"
SFH_import_machinized_agricultural_tools_desc:0 "多年的政治混乱和普遍的落后，让远乡的农业现代化进程趋于停滞：在中巴斯蒂亚的大农场上已经开满了联合收割机的时候，远乡的稻田中农民们使用的甚至还是生锈的镰刀和磨损的木犁！\n\n不，这种状况不能再持续下去了：为了农业的进一步发展，我们必须做出改变。现在是时候采购来自国外的先进农机设备了，当水稻割晒机和插秧机出现在我们的田地中时，我们的农民们将会从繁重的体力劳动中得到解脱，拥有更多的可支配自由时间——而这样一来，我们也将具备建立集约化农业生产的技术条件。"
SFH_connect_north_to_south:0 "联通南北"
SFH_connect_north_to_south_desc:0 "蓬勃发展的经济带来了更多运输需求，同时更新我国老旧的铁路网也已经成为了当务之急，但有限的资源使得我们必须做出取舍。\n\n最终，我们决定修建从西乡到谷居的南北向铁路：这条铁路将会大大改善我国最贫穷和最不发达的农村地区的交通状况，使得农民们可以从首都的发展红利中获利。同时，翻修的农村道路和新修建的主干道将会让农民们更方便地赶集和出售自己的农产品，最终推动农村城镇化的发展。\n\n当然，那些市民和企业主们可能会认为这是对他们的“忽视”，但是他们似乎忘记了远乡绝大部分人是农民的基本事实：只有少部分人获益的“现代化”可不是真正的现代化，为了我们的继续前进，我们得让后进者不再掉队。"
SFH_process_crops:0 "农产品加工"
SFH_process_crops_desc:0 "我国空前的农业繁荣，使得农业发展进入了新的阶段。因此，发展农产品加工业，提高农产品的附加值就成为了下一阶段的农业发展目标。相比于基础的粮食，深加工后的农产品很显然更受海外市场的欢迎，并且也能让我们从中获得更多的利润：想象一下远乡的鱼罐头和米制糕点在国外的超市里卖到脱销的场景吧。"
SFH_improve_the_export_system:0 "完善出口体系"
SFH_improve_the_export_system_desc:0 "既然我们已经成为了数一数二的粮食出口大国，那么原有的粗放式管理模式很显然无法满足现在的需求了。已有余力的我们将会规范相关的出口法律法规，并进一步制定行动方案，以培育农产品出口领域的龙头企业，最终打造出独属于远乡的农业外贸出口品牌：这对我们只会是一件好事。"
SFH_industrial_miracle_of_farhome:0 "远乡产业奇迹"
SFH_industrial_miracle_of_farhome_desc:0 "在艰苦卓绝的奋斗之后，固步自封的落后远乡，如今已经成为了东巴斯蒂亚的产业巨擎：我们已经从混乱的泥潭中挣脱，而光明的未来已经浮现在了地平线之上，迎接远乡的，只会是崛起的康庄大道。回顾过去的几十年的混乱与破败，一切都仿佛是一场梦，而名为“远乡”的强大国度，终将会从睡梦中醒来，用她强大的力量震撼全世界！\n\n我们能走到今天固然离不开全国人民的上下一心和百官僚属的克己奉公，但如果没有优秀领导的高瞻远瞩和英明领导，这一切都不可能实现。为了我们的君主，为了远乡，团结一致，共赴未来！"
SFH_end_the_era_of_landlords:0 "终结地主的时代"
SFH_end_the_era_of_landlords_desc:0 "在远乡王国正值政治混乱的时候，地主寡头们趁机夺取了大量的权里，并以此攫取了许多本属于国家和人民的利益，他们本以为能够继续这样瞒天过海下去，但我们要用行动告诉他，这是不可能的事情，一切已经在今天宣告了结束。\n要么合作，要么毁灭，他们别无选择。"
SFH_show_them_no_mercy:0 "不留情面"
SFH_show_them_no_mercy_desc:0 "我们不应该跟这些顽固的守旧分子有过多的妥协，他们的存在本身就在威胁着国家的安定，虽然他们的力量确实顽固，但我们会让他们知道，我们的决心更加强大。"
SFH_armed_assault:0 "武装突袭"
SFH_armed_assault_desc:0 "为什么要为抢夺你财产的人付款？而且，仅仅只为了拿回本就该属于自己的那一份羹？这种可悲可笑之极的行为绝不是一个现代大国所应该拥有的行径。谈判，协商，付款，我们怎有那么多时间浪费！让我们直接开动军队，对那些有着地方民团作为私人武装力量的愚蠢地主们展示一下，到底是谁的铁拳比较硬。"
SFH_forced_purchase:0 "强行并购"
SFH_forced_purchase_desc:0 "他们本就是在国家最苦难的时候，攫取了大多数的利益，他们是国家的蛀虫，我们没有必要和他们进行协商，他们必须交出所占有的一切，否则，我们会让他们知道什么叫苦痛。"
SFH_enact_the_plan:0 "执行计划"
SFH_enact_the_plan_desc:0 "时机已经到来，我们已经无需隐忍，是时候让他们见识我们的决心与实力，唯有如此，这个国家才能有可以前进的未来。\n我们，将会摧毁保守派最后的体面。"
SFH_let_them_to_run_their_course:0 "自生自灭"
SFH_let_them_to_run_their_course_desc:0 "地主阶级已经失去了他们的一切，这是我们乐意看到的，就让他们自生自灭吧，我们没有必要为了这群危害国家的虫豸付出任何东西，只有看到他们全部死去，对于我们而言才是最好的结局。"
SFH_settlement_grants:0 "安置补助金"
SFH_settlement_grants_desc:0 "再怎么说，他们也都是我们的同胞，我们没有办法对无家可归的他们置之不理，他们已经失去了一切，那至少应该给他们一个可以安顿下来的处境，相信他们也会感激于国王的仁慈圣明。"
SFH_agricultural_supervision_bureau:0 "农业监督局"
SFH_agricultural_supervision_bureau_desc:0 "在地主阶级已经消失之后，对于土地和农民的控出现了权力真空，我们不能对此置之不理，应当成立一个部门，用来统筹全国上下的农业事务，这将会对我们的安定和效率产生大的提升。"
SFH_the_white_gloves:0 "白手套"
SFH_the_white_gloves_desc:0 "既然事情已成定局，那我们为何不好好利用呢？没有必要消灭地主阶级，只要让他们成为我们的白手套就行，毕竟有些事情我们不能做，而他们却没有什么顾忌。\n是的，他们将会是我们最为忠诚的奴仆。"
SFH_trip_up_a_bit:0 "使点绊子"
SFH_trip_up_a_bit_desc:0 "那些愚蠢的家伙还不能理解王室的权威为何，对我们的命令视而不见，这是我们所无法容忍的，我们应该做些什么让他们知道，一切的情况都在我们的掌控之中。"
SFH_frank_and_open_minded:0 "开诚布公"
SFH_frank_and_open_minded_desc:0 "与地主阶级合作并不是什么可耻的事情，最起码对于我们而言不是，我们应该将其正当化，公之于众，只有这样才能强化我们的合作，也能让这件暧昧不清的事情变成既定事实。"
SFH_increase_public_pressure:0 "增进舆论压力"
SFH_increase_public_pressure_desc:0 "经过一系列的手段，地主们开始露怯了，我们应该在这时候继续跟进，谴责他们的一切，让他们因迫于舆论而服从我们。"
SFH_buyout_of_moderates:0 "收买温和派"
SFH_buyout_of_moderates_desc:0 "并不是所有的地主阶级都无可救药，至少一部分不是，他们愿意和我们合作，那我们也必须拿出诚意，我们必须团结一切可以团结的力量，包括温和派的地主阶级，相信那些改革派们也会理解我们的选择。"
SFH_concessions_in_execution:0 "执行上的让步"
SFH_concessions_in_execution_desc:0 "我们的决策出现了重大的失误，对于地主阶级的改革近乎失败，他们拒绝服从！我们或许应该做一些让步，给我们双方都留下一点谈话的余地。"
SFH_sponsorship_for_poor_farmers:0 "资助贫困农民"
SFH_sponsorship_for_poor_farmers_desc:0 "为了国家的稳定，哪怕只是做做样子，我们也必须为了广大人民做点什么，地主们已经同意了我们一部分的要求，愿意当出自己的一部分利益救助那些连饭都吃不起的人。"
SFH_victory_of_landreforms:0 "土地改革的曙光"
SFH_victory_of_landreforms_desc:0 "远乡万岁！土地革命取得了极大成功，我们终于不必忍受地主乡绅为了自己的利益而危害国家的未来，压榨我们勤劳的农民。\n原本的蛀虫已经被我们清扫的一干二净，再也没有谁能够阻挡我们进步的脚步。随着土地改革的成功，我们得以释放大量的乡村地带人口作为劳动力和后备兵员，不但农民的生活水平得到了改善，各地区的工业潜力也得到了进一步的释放。我们手拉着手，脸上满是骄傲与笑容，在新的日子里，我们终将奋进！"
SFH_slow_but_continue_reform:0 "缓慢，但却不停止的改革"
SFH_slow_but_continue_reform_desc:0 "想要在维持了如此长久的制度上大动刀子，很显然是不现实的。如今的远乡王国还没有发达到可以接受更为激进改革的地步，冒着破坏政权稳定性的风险去动所有人的蛋糕并不一定是个好主意。不过，这并不代表我们就将机会拱手让给革命党，然后举白旗投降了。改革绝不会停止，它可以是今天，更可以是明天。通过各种合法且更加和平的手段，每天都会有地主不再有资格当自己的山头大王。\n总有一天，他们全部都会滚蛋。"
SFH_properly_waits:0 "适当的等待"
SFH_properly_waits_desc:0 "也许我们错了，现在并不是进行改革的绝妙时机，我们应该暂缓脚步，休息等待，这并不是结束，而是暂时停下，希望能以此抚平改革给我们带来的创伤，让我们和平相处。"
###危机1-人鱼###
SFH_mermaid_crisis_on:0 "人鱼远乡亲善大使遭暗杀！"
SFH_quick_death:0 "死亡，仅在一瞬之间"
SFH_quick_death_desc:0 "枪声仅仅是在那瞬间响起了一刻，但它所带来的影响却是不可磨灭的。在人鱼同我国关系日渐紧张的今天，一场针对友好象征的暗杀行动可谓是极具破坏性——更别说它真的成功了。随着我们同人鱼的关系几经破裂，大量建立在原先合作关系基础上的工业计划，商业规划等等内容都不得不作废，短时间内对市场造成了大量不利的冲击。而这份冲击很快也成为了民众心中的不安，虽然对一场新战争或经济危机的担忧在人群中蔓延，本就几经停摆的经济活动彻底陷入混乱，不满的人群涌上街头，打砸抢变得司空见惯。\n\n这样的日子，什么时候才是个头啊…"
SFH_quick_death_tt:0 "§Y人鱼们很显然会对此感到不满...§!\n§R但在那之前，民众的不安或许会先冲垮我们。§!"
SFH_all_freaking_calm_down:0 "都他妈给我冷静下来！"
SFH_all_freaking_calm_down_desc:0 "稳定的第一步便是想办法让民众躁动的情绪平静下来。虽然只要是个脑子好使的知识分子都看得出来，死个人鱼而已，再怎么说也不可能造成国家的崩溃——但老百姓可不这么认为。首先，得有人站出来，用通俗易懂的方式给一般人讲解这背后的因果关系，以及在这样相对来说不安宁的时代，信任我们政府的重要性。当然，对于那些依然抱有悲观态度的顽固分子，我们也准备了相对强硬的手段，不知最近拘留所伙食如何？"
SFH_there_shall_be_no_war:0 "不会有战争的！"
SFH_there_shall_be_no_war_desc:0 "虽然抛去就算人鱼和远乡真的开战，以人鱼现在的陆上移动魔法技术而言，再怎么说优势也在远乡一方。不过长久以来我们给予人鱼的优待使得不少普通人产生了“人鱼的国家就是要比我们先进”这样十分可悲的想法，首先这一点就必须纠正。更何况，抛去谁军事力量更强这一点不谈，任何形式的全面战争对于远乡和人鱼族而言都是百害而无一利的，最好能给老百姓解释清楚这个道理。"
SFH_there_shall_be_no_depression:0 "不会经济萧条的！"
SFH_there_shall_be_no_depression_desc:0 "多年以来，我们尝试努力建设的远乡-人鱼族经济体系被证明是行之有效的——但这也使得我们在方方面面依赖于人鱼族一方的决策。这使得许多老百姓产生了“没有人鱼日子就过不下去了”这样错误的想法。当然，在当初经济危机的时刻，确实是人鱼族的援助帮助我们度过了难关，可今日的远乡王国已不是当初那个被沃姆帝国打的抱头鼠窜的废物，我们的改革并不是毫无意义的——这样的声音必须传达到不安的百姓耳里。"
SFH_then_what_to_do:0 "接下来，怎么办？"
SFH_then_what_to_do_desc:0 "尽管街道上的秩序逐渐恢复了，真正需要我们处理的问题还尚未解决。我们究竟应该如何应对来自人鱼族的抗议？这究竟是一场机会，给予我们做出豪赌的选择；亦或是又一场不幸的灾难，需要我们平稳航行？"
SFH_ala_being_careful:0 "只要我们谨慎行事..."
SFH_ala_being_careful_desc:0 "人鱼族在远乡社会的存在并非不可或缺，但他们再怎么说也不是洪水猛兽。这次的事件虽然造成了恶劣的影响，但从另一个角度来看，它也成为了我方谈判桌上的有利筹码：百姓的愤怒。远乡人需要同人鱼族合作来促进合作，那么反过来看，这对于他们而言也是一样的。我们可以借此重新谈判，争取未来在合作的时候建立起更有利于我方的条款。不过，这样的话，我们就必须先做出让步，赔个礼道个歉，面子在这种时候就没那么重要了。"
SFH_ala_being_careful_tt:0 "谨慎行事意味着向人鱼群体的让步，虽然这会在最终让它们更愿意同我国合作，但这同时也会给予反对派极大的话语权。"
SFH_appeasing_trade_organizations:0 "安抚商贸组织"
SFH_appeasing_trade_organizations_desc:0 "许多由麟人和人鱼共同出资，管理的商贸组织因此次事件遭受了严重打击。人鱼方的撤资是一方面，但停摆的商业活动造成了更加毁灭性的打击。我们可以补贴亏损的一些企业，或者直接收购濒临倒闭的企业，确保旗下员工，管理人员在短时间内的就业，并且帮他们处理这之后的前途。这可以发出我们希望局面稳定的消息，同时也能安抚人鱼方的投资者。"
SFH_apologize_with_gifts:0 "赔礼道歉"
SFH_apologize_with_gifts_desc:0 "无论如何，因管理不到位而造成刺杀事件的责任确实在我们，就算是把麒麟它老人家从不知道哪个地方请来，也无法改变这一事实。为此，我们可以举办由官方行政人员，甚至是皇室成员参与的公开记者发布会，在发布演讲，稳定民心的同时，也郑重地向人鱼族一方道歉，并确立我方反对任何形式的恐怖主义的立场。"
SFH_cultural_exchange_festival:0 "文化交流节"
SFH_cultural_exchange_festival_desc:0 "虽然在刺杀活动的氛围散去之前，举办太大型的娱乐活动显得有些缺乏安全意识，这并不代表我们就不应该做出表态，支持麟人和人鱼族的友好关系了。虽然刺杀活动波及的范围之广是远超出我们预料的，许多人不过是道听途说，缺乏对恐怖主义和我们与人鱼关系的正确认知。一场由政府资助并监管的文化交流节可以缓解局面的紧张度，并让那些缺乏正确认知的普通人转而支持我们的行动。"
SFH_judicial_concessions:0 "司法让步"
SFH_judicial_concessions_desc:0 "虽然根据远乡的刑法，本次刺杀活动的始作俑者显然是要被处以死刑的。然而，他作为远乡公民，再怎么说也该交由远乡的司法机构进行审判——可惜，凡事皆有例外。人鱼族已经正式向我们提出了审判刺杀者的申请，虽然同意这样的申请显得有些让人侵犯国家主权的意思，鉴于死者的身份，我们预估这并不会掀起什么波澜。况且，不论是谁负责审判，最后结果恐怕都没什么区别吧…"
SFH_pour_encourager_les_autres:0 "杀鸡儆猴"
SFH_pour_encourager_les_autres_desc:0 "虽然我们可以称此次的暗杀事件为个人行为，但针对人鱼一方的暴力行为绝非喜闻乐见的事情。为此，我们可以加大对相关暴力活动的镇压力度，找几个犯事比较严重的，安几个相对重一些的刑法来起个“杀鸡儆猴”的作用。我们有必要让那些无法无天的暴动分子明白一点：远乡政府的立场值得全体公民的尊重。"
SFH_asif_nothing_happened:0 "就当无事发生"
SFH_asif_nothing_happened_desc:0 "我们已经为解决危机尽了最大的努力，虽然称不上完美，但目前来看，局势已得到缓和，并在可以预见的未来内不断改善，相信很快便能恢复到危机爆发前的和平景象。实际上，由于此次事件表明了我国麟人对待人鱼事务的态度，加上我们软磨硬泡下进行的大量协商，人鱼-远乡合作的经济体系在未来会向着更加“可持续”的方向发展，远乡王国不会再一昧的让步，双方将会向着合作共赢的方向继续前进。"
SFH_asif_nothing_happened_tt:0 "人鱼所带来的影响将永久性地追加：\n稳定度：§G+10.00%§!\n政治点数获得：§R-10%§!\n生活消费品工厂：§Y-5.0%§!\n建造速度：§G+10.00%§!"
SFH_fire_fighting_reform:0 "救火式改革"
SFH_fire_fighting_reform_desc:0 "此次暗杀事件不但是对政府威信的极大破坏，同时还揭露出了我国安保机制的不完善。出于做做样子的目的也好，为了长久打算也罢，我们最好尽快展开一场改革运动，以提振百姓对政府的信心。"
SFH_improve_security_measures:0 "完善各地安保措施"
SFH_improve_security_measures_desc:0 "虽然短时间内是看不到人鱼上台讲话了，可各地政府机关仍然要正常运作。虽然和那些废话箩筐的“民主”国家不同，我们没有天天喜欢集会的政客，但各地领导人以及地方官员也有各类公务需要执行，而在刺杀事件“大获成功”后的今天，他们的生命都岌岌可危。我们最好加强各地的安保措施，避免更多的惨剧发生，同时也要给那些暴徒们一点颜色看看。"
SFH_nationalize_pmc:0 "国有化安保集团"
SFH_nationalize_pmc_desc:0 "许多参与此次事件的安保力量并不由我国政府直接管理，而是通过和中间商的合作。许多人因为此次事件建议我们将精力投入到这些团体上，通过施加压力，甚至是政府收购等方式获得他们的领导权，以此加强管理，避免更多的惨剧发生。然而，虽然从时间和资源的角度来看，这一方案更加实惠，可它在政治上并不怎么好看——民众不会觉得这么做足够靠谱的。"
SFH_invest_new_armed_forces:0 "投资新武装部队"
SFH_invest_new_armed_forces_desc:0 "比较激进的提案建议我们不要继续将多余的精力浪费在民办企业组织的武装集团上，而是正式调配国家预算来建立起一支新的安保部队，或者说是基于目前警察机关的一支特别行动小组，以保护相关政治人员的生命安全。这确实需要我们投入更多的资金，学习成本也绝对不会小，但长久来看，这或许会是更加划算的想法？"
SFH_there_shall_be_no_more:0 "没有下次！"
SFH_there_shall_be_no_more_desc:0 "中央已经下了死命令，各地警察机关必须打起原来三倍的精神，哪怕是不要命也必须维持好社会的稳定。由于此次事件已经给国家信誉造成了严重损失，恶劣影响甚至会导致今天的我们遗臭万年，因此，无论是谁，都必须把一件事铭记在心：我们绝对不能让这样的惨剧再度发生！"
SFH_or_probably_a_good_time:0 "或许，时机已至？"
SFH_or_probably_a_good_time_desc:0 "人鱼的影响力由于此次事件大幅度衰退，随着刺杀事件带来的混乱逐渐减弱，许多人似乎意识到了一点：人鱼似乎对于远乡社会而言，也不至于那么的不可或缺。诚然，人鱼在多年前带给我们的魔法，工业等技术对于弱小的本地企业而言可谓天兵下凡。然而，随着远乡各地科研体系的日渐成熟，以及爱国商业人士们不断的周转，虽然脆弱，可远乡的经济体系并非离不开人鱼。政府只需要在这样的大环境下坚持本心，并且拉各地爱国企业家，科研团队一把，并且坚持对本地市场持续投入…自给自足的那一天似乎真的可以到来。"
SFH_or_probably_a_good_time_tt:0 "大刀阔斧开始改革意味着我们将会逐步削弱人鱼的影响力，这在短时间内会对我国经济造成巨大的冲击，可长久来看好处多多，还可以削弱反对派的话语权。"
SFH_perfect_excuse:0 "完美的借口"
SFH_perfect_excuse_desc:0 "在刺杀事件后，许多在远乡人鱼公民都担心自己的安危，甚至不少颇有家资的已经准备跑路。这可以说是正合我们的意思——前人们花了多少年都不能赶走这些压榨我国人民的吸血鬼，结果这群混蛋居然自己决定走了！借着保护安危的借口，我们可以极大地放宽海关的检查，尽可能地允许更多的人鱼离开远乡的土地，与此同时，减少他们在经济上的影响力，为尚且弱小的我国许多中小型企业争取宝贵的时间。不过，由于环境适应魔法的开销较大，许多在远乡的相对穷困一些的人鱼公民无法支付费用以回到适应海洋生活的状态，这仍会是需要处理的一大问题。"
SFH_acquisition_of_mermaid_enterprises:0 "收购人鱼企业"
SFH_acquisition_of_mermaid_enterprises_desc:0 "虽然人鱼政府一方的大企业我们动不了，但随着大量人鱼企业家的逃离以及局势的恶化，许多在我过境内的人鱼中小型企业都在以极低的价格抛售。政府可以在这一步快速介入，在买下之后将一部分解体，一部分则以更加实惠的价格出售给有意愿接受的麟人企业家。对人鱼企业的有效利用可以在短时间内提高我国经济系统的稳定性，并且为许多新一代崭露头角的有志人士提供绝佳的场地。"
SFH_encourage_conflicts_between_companies:0 "挑起人鱼企业间的矛盾"
SFH_encourage_conflicts_between_companies_desc:0 "在经济整体形势向下，同时人鱼社会中的不安情绪横行霸道的今天，想挑起人鱼企业间的矛盾冲突并不困难。本身人鱼企业家们就不是铁板一片，在利益的驱使下，他们内部始终也冲突不断，只是在和平年代不会轻易透露出来罢了。我们可以简单地从中作祟，在矛盾的背后小小的推一把，帮助人鱼的企业进一步陷入裂痕，促进他们的撤离，以及对现存产业的低价抛售。"
SFH_invest_domestic_companies:0 "投资本土产业"
SFH_invest_domestic_companies_desc:0 "远乡政府对资本市场的投资从几十年前的第一次改革以来就不小，可受困于相对腐败的政府机制，许多预算都进入了寡头以及贪污者的钱包，而不是真正需要帮助的爱国企业家的资金流。然而，时过境迁，在人鱼企业大多陷入混乱的今天，那些远外合资的寡头也不能置身事外，即便是最保守的矿业寡头都决定对政府让步，以换取对资本市场的干涉。我们可以重新调动预算资助我国各地的企业发展以及创业行动，虽然这在短时间内不会有太显著的成效，但长久以来，这势必能为我国独立自主的经济事业添砖加瓦！"
SFH_reemployment_of_unemployed:0 "失业劳工再就业"
SFH_reemployment_of_unemployed_desc:0 "虽然许多人鱼企业荒淫无道，可它们毕竟也为我国提供了宝贵的就业岗位。这些企业的大量撤离在短时间内造成了大量的失业人口在大街上横行霸道，破坏社会治安。由于许多这些工人并没有受到过体面的教育，因此他们大多也无缘于新的创业潮。我们可以介入其中，开办由政府出资的工程项目以维持这些下岗工人的生计，同时由政府机关充当中介，与各地爱国企业展开合作，帮助失业者重新就业。"
SFH_the_free_sky:0 "自由的天空"
SFH_the_free_sky_desc:0 "当一个普通的麟人工人抬起头，他所看见的不再会是在我们土地上扎根的人鱼血汗工厂，不会有横行霸道的人鱼权贵，也不再会有向外族俯首称臣的愚蠢叛徒。我们的不懈努力终有一天会得到回报，到了那时，每一个远乡公民都可以自豪的说到，我们生活在一片自由的天空下，一个真正属于麟人，而不是外族的社会。人鱼们将不得不遵守由麟人制定的规矩，如果他们想玩自己一套，那就滚回海底去自娱自乐吧！既然来了远乡，就必须遵守我们的规定，尊重我们的人民！"
###危机2-亚人###
SFH_subhuman_crisis_on:0 "江洲人质危机爆发！"
SFH_jiangzhou_hostage_crisis:0 "江洲人质危机"
SFH_jiangzhou_hostage_crisis_desc:0 "一群恐怖分子潜入了位于江州市的一所小学，在快速消灭了消防的安保力量后，恐怖分子宣布将整所学校剩余师生作为人质劫持，要求政府满足他们的要求。该恐怖分子团体主要由布满远乡少数种族政策的亚人构成，他们希望我们改变国家对少数种族的待遇，为此不惜付出一切代价，无论是他们自身的生命，还是师生的…这群畜生！"
SFH_jiangzhou_hostage_crisis_tt:0 "§Y不安的孩童在肮脏的体育馆内哭泣，他们看着窗外的新一轮明月，思考着能否见到明天的太阳。恐怖分子们用无情的眼光默许了这一切，看着那些跟自己过去别无二致的孩子在饥饿和脱水中慢慢死去，从门外绝望地跪下的家长的痛苦神情中获取不知名的满足感，呼吁着他们也道不明的改革。§!\n§R我们居然在一个现代化的国家眼看着这一切发生。§!"
SFH_ensure_hostage_necessities:0 "保障人质温饱"
SFH_ensure_hostage_necessities_desc:0 "学校内储存的生活物资虽说不是没有，可顶不住几天的消耗，更何况为了便于管理，恐怖分子将师生们集合到了环境恶劣的体育馆内，用不了几天，那里就会变成堪比集中营，人肉屠宰场一样的人间炼狱。我们需要尽快同恐怖分子达成协议，优先确保人质们的温饱。不惜一切代价，我们也要将食物，衣物等生活用品送到生命岌岌可危的人质手里。"
SFH_negotiator_approach:0 "谈判者的方针"
SFH_negotiator_approach_desc:0 "恐怖分子之所以走上如此极端的一条道路，那肯定是有原因的——至少这一点我们心知肚明。虽然人类，准确而言，麟人，占据了我国人口的绝对多数，可仍然有那么几个百分点的人口占比是属于其它物种的。由于中央政府缺乏对相关政策的完善，在过去的几十年里，我国非人物种居民的生活的确不好。深知这一点的我们应当采取谈判者的方针，首先聆听恐怖分子的诉求，然后再看看能否和平解决问题。"
SFH_continue_negotiations:0 "继续谈判"
SFH_continue_negotiations_desc:0 "由于我们将一些精力投入到了保障人质安危和维持社会稳定上，同时花了一点时间统一内部的谈判方针，同恐怖分子的谈判暂时陷入了停滞。他们的许多要求在我们看来都无异于是狮子大开口，可现在，为了继续谈判，我们必须作出一点表示。幸好内部的意见已经统一，只要步子不迈得太大，一些基本的让步还是可以实现的。"
SFH_transport_supplies:0 "运输校内补给"
SFH_transport_supplies_desc:0 "虽然人质的温饱问题已经得到了初步的解决，可这并非长久之计。如果人质多为健康的青壮年，那倒还好，可仅仅维持这些孩子们最低限度的生活标准，伤亡迟早也会发生。我们可以同恐怖分子达成更进一步的协议，由我方提供更丰富的生活用品，包括临时的床铺，睡袋，移动厕所等设施，帮助人质维持相对正常的生活。"
SFH_hostages_for_criminals:0 "人质换罪犯"
SFH_hostages_for_criminals_desc:0 "诚然，哪怕拿出一万分的诚意，许多恐怖分子的要求也不过是痴人说梦。不过，关于释放恐怖分子团体中已经落网的部分成员倒是可行，我们可以从监狱临时释放一批在劫持者名单上的罪犯，借此换取一部分身体状况较差的人质自由。"
SFH_commit_not_to_use_force:0 "承诺不使用武力"
SFH_commit_not_to_use_force_desc:0 "尽管多数恐怖分子打算把政府的生命当耳旁风，可哪怕争取到一两个人也好——我们最好承诺不在接下来的谈判中使用过激的武力。当然，这会显著降低的政府的威望，或许支持少数种族平权的人会认可我们的行动，但多数人恐怕只看到了向恐怖分子的让步。然而，在谈判紧张进行的当下，我们最好不要再干出一些会刺激恐怖分子的行为了…"
SFH_calm_down_parents:0 "家长们，请冷静！"
SFH_calm_down_parents_desc:0 "在愤慨的社会群众中，首当其冲的便是被劫持为人质的师生的家属。且不提因此次事件，在国内各地爆发的对少数种族的民间迫害行动，许多情绪过于激动的民众甚至希望提着几杆火枪，自己杀进学校解救人质。然而，他们显然错误低估了恐怖分子的火力以及对人质的控制力度，这些自以为是的“英雄”的行为非但无法阻止敌人的行为，反而会造成人员的伤亡，甚至是把自己的命也搭进去了。这或许在面子上挂不太住，可我们最好先安抚一下家长们。"
SFH_judicial_reforms:0 "司法改革"
SFH_judicial_reforms_desc:0 "虽然立刻的全国性改革不显示，我们仍然可以进行一些基本的政治改动。在过去，许多定居我国的非人种族遭到歧视，无法享受与其它我国公民一样使用公共设施或者政治的权力，更有甚者连身份证明都没有，在偏远的地区过着孤立的生活。这不但是对人才的浪费，还容易成为犯罪的苗床，甚至进一步破坏国家安全。我们可以采取一些行动制止这些行为，尽管大众的想法和许多政府机关无法立刻调转船头，给他们开一开身份证明然后送去就业，还是可行的。"
SFH_peaceful_ending:0 "和平解决"
SFH_peaceful_ending_desc:0 "经过我们的不懈努力，一份可以称得上“和平协议”的条约已经得到了双方的共识。远乡政府承诺会在接下来的数年里开展反对种族歧视的运动，对境内少数种族群体开展优待活动，帮助那些被社会排斥的群体加入其它麟人公民的行列，同时释放大批平权主义政治犯。作为交换，直接参与恐怖活动的人员会被抓捕并得到公正的审判，根据他们对人质伤害的程度，可能会面临数十年之久的刑罚。\n\n有人称这次协议是一次改革的机会，也有人认为它体现了政府的懦弱。或许，只有时间才能证明我们所走出的这一步，究竟是对是错。"
SFH_conservative_plan:0 "稳妥派的计划"
SFH_conservative_plan_desc:0 "很多人错误估计了政府所承担的压力，当激进的平权主义者只看到了遭到迫害的少数族群，而一般民众只看到了受伤的人质，政府只看到了两批人正“齐心协力”地向政府施加压力，全然不顾最终究竟应该如何解决问题。在这种情况下，我们需要更多的时间来采用更妥善的方案，一方面，我们要避免直接破坏谈判以引起恐怖分子的反感，另一方面，我们也清楚，光是谈判是不可能解决一切问题的…一次以对校园内恐怖分子领导层的斩首行为为核心的计划已被提上日程，让我们看看该怎么办吧。"
SFH_stall_time:0 "拖延时间"
SFH_stall_time_desc:0 "首先需要明确的一点是，我们并没有敌人的明确信息。少数种族的极端平权恐怖分子团体在以前并没有造成什么危害，大多数只是用冷兵器打砸抢罢了，多数案件都被丢给了地方警察部门，没人知道这群被当做是废物的混账居然能搞出这么大的名堂。我们最好想办法拖延一下时间，反正人质也不可能这么快就出事，希望他们的宝贵牺牲能为我们提供足够的精力来调查敌人的底细——无论是在其它地区的恐怖分子支部，还是校园内的人员分布，武器，弹药状况，以及巡逻路线等。"
SFH_outward_devotion_but_inner_opposition:0 "阳奉阴违"
SFH_outward_devotion_but_inner_opposition_desc:0 "谁说一定要说到做到的？社会的水很深，尤其是在面对恐怖分子时，一些基本的道德观念当然可以抛弃，我们也是为了人民的安全嘛。对于许多恐怖分子的要求，我们可以象征性的完成一下，譬如释放部分恐怖分子同伙，但是仍然严加看管，随时准备抓回去；或者在新闻上吹嘘一下新的平权相关提案，然后发挥我国政府光荣的官僚主义传统，让改革在似有似无中取得表面功夫做出来的进展，同时实际上一无是处。"
SFH_hostage_exchange_program:0 "人质交换计划"
SFH_hostage_exchange_program_desc:0 "我们的拖延战术目前取得了相对良好的结果，可愤慨不已的群众也不能不处理一下。我们可以通过释放一些政治犯来进行人质交换计划，先将一部分身体虚弱，年龄过小或是过大的人质送出来。这不但可以安抚愤怒的群众，同时也可以展露我们“和解”的决心，降低恐怖分子的警觉程度。"
SFH_penetrate_resistance_tissue:0 "渗透抵抗组织"
SFH_penetrate_resistance_tissue_desc:0 "占领校园的恐怖分子并不是没有组织的醉汉，情报表明，他们的行动大多是由在外面的总部所指示的。在我们情报工作人员的努力下，他们总部的位置很快便被查明。然而，贸然突击定然会导致计划的失败，我们可以先派人渗透进入组织，进一步收集情报，方便未来的特别突击行动。"
SFH_infiltrate_school:0 "潜入学校"
SFH_infiltrate_school_desc:0 "在了解了占领学校的恐怖分子的人员分工，巡逻路线等信息后，我们得以派人潜伏进入学校。这项行动危险性极高，一旦情况败露，不但潜伏的特务会被杀害，人质也将难逃一死，至于谈判就更是天方夜谭了。我们必须提起十二分精神，尽全力做好这一次潜伏工作，一旦我们成功，未来斩首行动的难度将大大降低——我们可以不费多大力气就消灭占领学校的恐怖分子。"
SFH_operation_beheading:0 "斩首行动"
SFH_operation_beheading_desc:0 "这一天终于到来了，我们安插在学校以及恐怖分子各地组织的特工正开始行动，一次隐秘而迅猛的斩首行动将开始。随着恐怖分子的各个头目的行动路线被我们所掌握，他们会快便会意识到自己的错误——他们不该跟我们对着干。各地的军事部队已经准备就绪，一旦斩首行动成功，他们便会出动，对恐怖分子的组织发动突袭。而在校园内，我们会里应外合，在确保人质大致安全的基础上，迅速地消灭所有恐怖分子的有生力量。外面的军队会在行动进展顺利时冲进来保护人质，并在必要情况下提供火力支援。"
SFH_secure_solution:0 "安全解决"
SFH_secure_solution_desc:0 "经过我们不懈的努力，解救人质和消灭恐怖组织的行动都取得了极大的胜利！虽然在行动过程中，有部分被劫持的孩童受伤或是逝去，各地展开的对恐怖组织的攻击行动也造成了居民区的破坏，许多人的财产都受到了损失——但总的来说，这一切都是弊大于利的。随着喧嚣着要平权的恐怖分子安静下来，我们也得以鼓励社会恢复正常。这一切都大大提高了我们政府的威望，这证明了我们是一个理智的，不会受到恐怖分子威胁，同时也不会因为悲剧失去理智的现代国家。"
SFH_radical_act:0 "激进派的手段"
SFH_radical_act_desc:0 "平等也好，歧视也好，一切的改革都是由我们说了算，你恐怖分子算老几？这些杀千刀的玩意将无辜的孩童用作谈判的筹码，从那一刻开始，他们就不可能是支持改革的“进步主义者”，而是纯粹的恐怖分子——而我们绝不会向恐怖分子让步。面对邪恶的恐怖主义，老百姓和军队坚定地站在了我们一方，甚至是希望阴阳怪气的权贵们也多少表现出了支持的态度。我们会停止愚蠢的谈判，让恐怖分子们见识一下谁才是这个国家真正管事的！"
SFH_delay_negotiation:0 "暂缓谈判"
SFH_delay_negotiation_desc:0 "谈谈谈，一天到晚谈了有什么用！只要人质的筹码一天被恐怖分子拿在手上，这些混账就绝对不会让步——恐怕他们还在自己的营地里嘲笑我们的懦弱，一群罪该万死的混蛋。我们会暂缓谈判，他们可别想继续看我们的好脸色。这些恐怖分子连自己现在是什么处境都搞不清楚！比起安然无恙的政府，遭到军队包围的他们才是真正的瓮中鳖，哪怕他们可以靠着人质逞一时的威风，我们也不会继续让他们这么做。"
SFH_mobilize_army:0 "动员军队"
SFH_mobilize_army_desc:0 "飞机，坦克和大炮都给我拉出来！猖狂的恐怖分子将邪恶的触手伸向了全国各地，现在可不是警察可以应对的情况，应该出动我国引以为豪的军队。情报显示，在可能的境外势力帮助下，部分恐怖分子支部已经得到了重武器的支援，这会对我国的社会安宁造成严重的威胁！这已经不是普通的恐怖分子了，恐怕已经达到了叛军的级别，这必须出重拳！军队将会在国王的指挥下被动员起来，这是关系到国家安全的大事，任何借此发挥反对国王的人都会以叛国罪论处。"
SFH_arresting_external_organizations:0 "抓捕外部组织成员"
SFH_arresting_external_organizations_desc:0 "恐怖团体的成员遍布全国各地，为了保证国家的安全，我们必须出动军事力量抓捕他们。当然，这一系列抓捕行动很可能激化恐怖分子的行为，甚至是提前他们的袭击计划。然而，在我们拷问部门的最新技术，无需魔法也可实现的“大记忆恢复术”的帮助下，我们的部队会借助俘虏的帮助，先一步找到那些试图发动袭击的恐怖分子，并彻底根除他们的存在。"
SFH_radicalize_family:0 "激化家属情绪"
SFH_radicalize_family_desc:0 "恐怖分子的行为造成了惊世骇俗的惨剧，而且他们才是真正的始作俑者，政府和家长一样，都只是普通的受害者——我们必须强调这一点，同时激化人质家属以及普通民众们的愤怒情绪。他们的怒火可以为我们的军事行动提供民意上的支持，同时也鼓励了民间的举报频率，我们得以更快，更准确地获取关于恐怖组织的情报。"
SFH_throw_problem_away:0 "把矛头指向亚人"
SFH_throw_problem_away_desc:0 "从生物学的角度来看，亚人和兽人不应该被视为同一种生物——但我们可不需要思考那么多。愤怒的大众需要一个敌对目标来发泄情绪，大多居住偏远，难以接触到的兽人或是更加稀有的其它少数种族就不用说了，人鱼谁都不敢动，那剩下的只有其它亚人了。我们可以通过一些官方的报告来将恐怖分子的帽子扣在一些亚人身上，他们中的许多人或许并不支持暴力的平权行为，可老百姓需要一个情绪发泄的窗口，而我们恰恰不希望他们发泄在政府身上。只能苦一苦某些物种了，这也是为了国家的安全。"
SFH_prepare_assault_plan:0 "预备突击计划"
SFH_prepare_assault_plan_desc:0 "由我国最精锐的军官团组成的特别小组已经开始紧锣密鼓地指定突击计划。这项计划包括全国各地恐怖团体分部的抓捕行动，对恐怖分子总部的进攻计划，以及对占领了学校的恐怖分子的突袭计划。在这个过程中，对各地财产，群众安全造成的损害是不可避免的，尤其是对学校的突袭计划——我们将不得不做好人质遭受一定伤亡的准备。然而，远乡政府不容妥协，我们已经坚定了这条道路，就必须强硬地走下去。"
SFH_fire_fire_fire:0 "开火！开火！开火！"
SFH_fire_fire_fire_desc:0 "突击计划已经得到顺利且全面地实施，恐怖分子们，你远乡爷爷来了！我们的军队高效地执行了预备的计划，这群畜生不如的恐怖分子要么准备蹲一辈子大牢，要么被就地正法。许多民众都被我们所采取的强硬措施所震慑到，转而进一步地加大了对我们的支持！尽管如此，对学校的突袭行动造成了大量无辜人质的伤亡，尽管占领学校的恐怖分子已被就地枪毙，可留在许多人心中的伤痛是难以磨灭的…不过这都是次要的，因为我们心知肚明，这一切都是为了远乡王国的安宁而做出的必要牺牲！国王万岁！"
###内战国策###
SFH_civil_war_on:0 "远乡内战爆发！"
SFH_the_storm_has_come:0 "风暴已至"
SFH_the_storm_has_come_desc:0 "在千百次抗议游行、暴动骚乱和其他明争暗斗后，远乡王国还是无可避免地走向了内战。对许多人而言，这并非他们所见的第一场战争，但或许是最近的一场。战争的风暴已经降临远乡，而我们已经做好准备。"
SFH_the_storm_has_come_tt:0 "§R拿起武器！§!"
SFH_deep_breath_move_on:0 "深吸气，然后前进"
SFH_deep_breath_move_on_desc:0 "四起的叛贼狂啸着，内战的阴云笼罩在都城之上。然而国王陛下业已经历过大风大浪，王国早已预想过这一天。我们希望全体人民同王室政府保持一致，对远乡的未来、对国王陛下的领导心怀希望。那么，拿起武器前进吧。"
SFH_fake_qingtian:0 "虚假的青天"
SFH_fake_qingtian_desc:0 "自称“青天军”的这群叛贼盘踞在王国的村庄中，他们大言不惭地自称是“受压迫者的青天”，好像这远乡千万黎庶的未来只能靠他们拯救，好像远乡的天命不在郑家王座之上、却在一群泥腿子手里一样！既然他们已经举起叛旗，那我们就有责任向全王国的百姓揭露他们的真面目。"
SFH_united_mermaid_to_attack:0 "联合人鱼进攻"
SFH_united_mermaid_to_attack_desc:0 "人鱼族长期以来同我们保持着良好的贸易和合作伙伴关系，如今王国陷入内乱，这也是人鱼不希望看到的，他们很乐意为我方提供帮助。我们可以积极促成双方的军事联盟，组成一只远乡与人鱼的联军，共讨奸佞与叛贼。"
SFH_buying_disloyal_people:0 "收买不忠诚者"
SFH_buying_disloyal_people_desc:0 "对于这样的叛乱而言，敌对阵营里最不缺的就是投机分子。不少倒向青天军的地主、工厂主和官僚只不过为了自己的一份利益，他们怎么可能谈得上对那些农民的口号有多少认同！只要利用好这一点，我们就能在青天军的阵营里砸出个洞来。王国只需要一点点开价，正在动摇的投机派就会拍拍屁股离开青天军，投入我们的怀抱。"
SFH_invasion_of_coastal_areas:0 "侵袭沿海地区"
SFH_invasion_of_coastal_areas_desc:0 "天军背靠大海却几无提防，这为我们提供了完美的机会。王国的人鱼盟军将自海底出击，出其不意地在青天军背后出现，摧毁他们赖以支撑这场叛乱的工业设施。那些泥腿子根本不会想到这来自背后的沉重一击！"
SFH_recruiting_clan_power:0 "招募宗族势力"
SFH_recruiting_clan_power_desc:0 "农村，这一宗族关系根深蒂固的地区是青天军的立足核心。我们心知肚明，很大部分保守的宗族对青天军的叛乱心怀不满，这群胡乱喊着平等和造反的叛匪已经切实影响了宗族结构的稳定。相比起造反，数百年乃至更久的家国观念使得宗族势力更亲近国王陛下而非青天军。给予这些宗族一点小小的助力，青天军就站不稳农村这块基本盘。"
SFH_shake_their_unity:0 "动摇他们的团结"
SFH_shake_their_unity_desc:0 "是的，青天军作为叛军是团结的，但他们也只在反对王国上团结。在青天军内部，争权夺利、党同伐异比起王国有过之而无不及。我们可以通过秘密的间谍渠道将青天军的内部斗争公开化，进而激化他们的矛盾，他们的军队也将转向内斗，这将显著为我们降低战线的压力。"
SFH_we_are_the_qingtian:0 "我们才是青天！"
SFH_we_are_the_qingtian_desc:0 "“青天”是远乡人民的美好愿望，是追求幸福生活中对王国高层的希冀，而不是掀起叛乱、造成生灵涂炭的借口。人民需要知道真相，他们所追寻的青天不在叛匪，而正是在这远乡王国的王座上。在国王陛下和他的政府领导下，旧日沉疴将被革除，美好未来就要来临。我们，才是远乡人民的青天！"
SFH_destory_sfr:0 "终结赤匪的统治"
SFH_destory_sfr_desc:0 "自其诞生那天起，共产主义和世联主义就是远乡王国的最大威胁。这一激进的意识形态妄想打造一个人人绝对平等的社会，而所谓的“远乡革命阵线”不惮绑架人民，以武谋独，还妄图推翻王室的统治。这支危险的叛军必须被终结！"
SFH_strengthening_the_blockade:0 "加强封锁力度"
SFH_strengthening_the_blockade_desc:0 "革命阵线诞生在贫穷的群山中，那里资源匮乏，交通不畅，基础工业更是贫弱。赤匪们着力于发动农民和工人，幻想着能在那样的穷乡僻壤里自食其力自给自足。要打破这幻想也很简单，我们只需要收紧绞索，围剿他们的生产根据地，这些泥腿子自己就会饿死在山里，更别说拿起枪和我们对抗了。"
SFH_arresting_revolutionaries_across_the_nation:0 "抓捕各地革命党人"
SFH_arresting_revolutionaries_across_the_nation_desc:0 "远乡王国境内大部分赤匪已经北上加入了革命阵线，但仍有许多潜藏在王国社会内的革命党人。这些激进份子在叛乱中充当了内应，他们发动袭击，破坏战争后勤，动摇军心和社会稳定。王国社会容不得这些赤党，在训练有素的内务部门领导下，我们将顺藤摸瓜地找到全国境内残存的革命党人，把他们全送去吃牢饭。"
SFH_enhancing_intelligence_concealment:0 "加强情报隐蔽性"
SFH_enhancing_intelligence_concealment_desc:0 "情报机构的证据表明，内战的许多军事情报都是民间间谍走漏给了叛乱份子们。尽管经历了大搜捕和社会戒严，还是有许多人被叛徒蛊惑，妄图从内部阻碍王国的军事行动。我们将扩大对情报部门的授权，在战争期间建立起对全社会的秘密监视。我们希望人民们不要因为身边的警察而惊慌，他们的存在是为了保护你们，以及整个远乡的安全。"
SFH_mountain_special_warfare_unit:0 "山地特战部队"
SFH_mountain_special_warfare_unit_desc:0 "不可否认，革命份子盘踞的群山为军队作战带来了不少困难。这些赤匪躲在山洞、树林和草丛里，往往能出其不意地埋伏我们的军队。军队指挥层已经要求针对这一情况做出对策，加急训练山地部队，并对参与围剿的部队进行山地适应训练。"
SFH_counter_guerrilla_warfare:0 "反制游击战"
SFH_counter_guerrilla_warfare_desc:0 "游击战是北方那些共党常用的战术，他们总是在某个地方开两枪骚扰驻军，很快又转移到另一边发起突击，如此反复。这种战术使得我们的军队疲于征战，更是拖累战事推进。好在我们已经摸透了游击战的规律和弱点，并得以合理调动军队来针对这些打了就跑的游击队。"
SFH_burn_down_the_house:0 "烧毁根据地！"
SFH_burn_down_the_house_desc:0 "在长期的军事准备后，我们已经做好了对革命阵线根据地进攻的准备。这些蛊惑人心的激进份子盘踞在群山的根据地中，靠着压迫农民维持他们可怜的政权。如今随着我们大军开进，这可悲的“革命”政权也终于要落幕了。"
SFH_reconsider_our_validity:0 "重新思考我们的合法性"
SFH_reconsider_our_validity_desc:0 "从南到北，叛匪们都打着人民的旗帜。尽管我们对那些平等解放的口号嗤之以鼻，但这场叛乱本身就足以让我们思考：我们缘何失去了那些人民的支持？是被煽动吗？是心怀不满而被利用吗？无论如何，让我们听听人民的声音，了解他们的诉求，让远乡王国真正成为全体原乡人的国家。"
SFH_proof_of_independence:0 "证明独立性"
SFH_proof_of_independence_desc:0 "王国的反对者总是借着社会政策攻击国王陛下和他的统治，他们声称王国已经成了世袭贵族、军头和大工厂主的游乐园。这都是一派胡言！从来没有一个君主像当朝圣上一样明智而洞察透彻。我们的君主不是谁的傀儡而是人民的国王，远乡也并不被某种影子势力操纵，而我们要向全体人民证明这一点。"
SFH_not_necessary:0 "...不，这没必要"
SFH_not_necessary_desc:0 "尽管改革派大力建议国王陛下继续放开民间言论管制，但我们最终决定不要这样做。战争期间最容易流言满天飞，如果什么谣言动摇了国本，那谁能负起这个罪责？人民应当对国王陛下怀有敬畏之情，适当的言论和媒体控制对于稳定国家，尤其是内战中人心惶惶的国家是不可或缺的。"
SFH_be_ruthlessness:0 "狠狠心"
SFH_be_ruthlessness_desc:0 "来自人民的声音总是最真实、最实际的，而我们已经意识到过去的统治在人民心中产生了太多不满。面对社会面的巨大呼声，国王陛下已经下定决心进一步放开言论自由，让更多的声音出现在社会上。我们要以行动向人民证明，统治的远乡王室不是陈腐的老古董，而是开明的、进取的，我们始终愿意倾听人民的话语，不论好坏。"
SFH_econ_mobilization:0 "经济动员"
SFH_econ_mobilization_desc:0 "战争之幕已经拉开，远乡王国的经济将随之为战争胜利服务。和平时期的经济将向战时转型，而劳动和社会控制的经济议程也已经开始。"
SFH_special_wartime_laws:0 "战时特色法律"
SFH_special_wartime_laws_desc:0 "远乡王国并非第一次历战，但如此规模的内战仍旧需要不同于过去的社会管控。在政府的主导下，远乡的法律体系将为适应战争需要做出一系列修正，涵盖了经济建设、政治安全和社会稳定等诸多方面。战时法律将在战争期间被视为国家最重要的法律得到执行，不容一点折扣。"
SFH_changing_companies:0 "企业转型"
SFH_changing_companies_desc:0 "我们不是军国疯子，远乡的企业并非为大规模战争而生。在叛乱的威胁下，我们将通过政府法律和命令的方式控制一部分重要企业，并将更多民营企业引导到战争的轨道上来，加强军事工业生产和建设力度。"
SFH_urban_rationing:0 "城市配给制"
SFH_urban_rationing_desc:0 "既然战事已开，平时的好日子也就到头了。战争对市场的冲击，和民用产出被战争打击都使得远乡王国面临物资紧缺的问题。为了防止物资匮乏问题造成更恶劣的影响，我们援引战时法律，在各大城市中引入配给制，民众的日常消耗将由政府提供。这可能会引起居民的不满，但战争当前，一切以国家需要为上。"
SFH_extend_working_hours:0 "延长工时"
SFH_extend_working_hours_desc:0 "战争的冲击严重影响了工厂生产。且不论多少劳动者加入了叛军，社会动荡也使得维持常规的生产生活面临着前所未有的困难。为了满足社会整体需要，适当的延长劳动将被证明是必要的。"
SFH_expansion_of_military_production:0 "扩大军工生产"
SFH_expansion_of_military_production_desc:0 "随着企业转型和政策战时化，我们可以通过更简单快速的方式扩大军工的生产，更好为战争服务。"
SFH_purchase_foreign_weapons:0 "购买境外武器"
SFH_purchase_foreign_weapons_desc:0 "当叛乱者洗劫各地的军火库时，他们的确削弱了王国军队的装备实力，但我们并非束手无策。在这片大陆上有许多政权乐意同我们进行交易，为我们平定叛乱提供优质的武器装备。"
SFH_streamline_types_of_supplies:0 "精简弹粮种类"
SFH_streamline_types_of_supplies_desc:0 "作为旧时代的遗产之一，王国的许多部队配备有口径用途各异的支援火力和增援装备，这在战时为后勤带来了极大不变。为了方便后勤供给，我们将对部队装备做出统一化调整。"
SFH_more_more_more:0 "更多！更多！更多！"
SFH_more_more_more_desc:0 "还是远远不够！纵使我们已经开足马力生产，军事和民用产品还是不足以满足现实需要。面对巨大的后勤缺口，我们不得不采取更激进的社会政策以保障供给，即使这样会严重损害人民的利益。"
SFH_maintain_army:0 "维持军队"
SFH_maintain_army_desc:0 "尽管远乡王国军队远远称不上骁勇善战，他们仍旧是保家卫国的绝对中坚力量。为了取得这场血腥内战的最终胜利，我们应当尽最大努力将社会资源向军队倾斜，满足战争的需要。"
SFH_emphasize_discipline:0 "强调纪律"
SFH_emphasize_discipline_desc:0 "令行禁止是军队保持战斗力的关键。一支散漫放任的军队在面对战争时必定军心动摇，只有对命令的绝对服从才能让士兵心怀力量去对抗邪恶的叛军。我们应当重申纪律至上这一原则，让每一位士兵、每一位军官和将军都认识到纪律的重要性，并坚决执行这一原则。"
SFH_expand_conscription:0 "扩大征兵"
SFH_expand_conscription_desc:0 "随着内战的进行，我们的军队人力出现了短缺。叛军的宣传蛊惑了不少地方民众加入他们的阵营，而维持工业生产的需要又吸走了一大部分劳动力进入工厂。既有的征兵制度已经无法满足战争的需要，我们将援引战时法律对当前征兵法做出调整，保证每一位愿意为国效力的公民都能参与到军队中来。"
SFH_revise_conscription_standard:0 "修改入伍标准"
SFH_revise_conscription_standard_desc:0 "现有的军事标准对征召兵的要求颇为严格，尤其是各种背景审查和前期训练在战争面前显得十分多余。军部已经提出申请对当前的入伍标准做出适当修正，以方便我们更迅速地将更多士兵投送到战场上。"
SFH_complete_supply_system:0 "完善后勤系统"
SFH_complete_supply_system_desc:0 "虽然部分精锐部队已经实现了后勤补给的现代化，许多交由地方指挥官自主管理的部队往往没能与最近的补给点建立起稳固的补给系统，许多部队不得不“就地取材”，为了粮食和当地民众“打成一片”。这样的情况必须被禁止，尤其是在军队时常调动的情况下，保障后勤的供应有助于士气的提高。"
SFH_armed_food_conscription:0 "武装征粮"
SFH_armed_food_conscription_desc:0 "每到国家危难之际，就有投机倒把的商家和农民囤积物资，厚颜无耻地大发国难财。城里的工人在挨饿，地主和富农却在仓库里囤着大吨大吨的粮食等着赚钱。我们决不能容忍这种行为横行。如果他们愿意把粮食乖乖交出来，那很好。如果他们不愿意，那我们就用枪炮让他们老实听话。"
SFH_sons_of_adventurer:0 "冒险者之嗣"
SFH_sons_of_adventurer_desc:0 "远乡王国诞生自一群伟大的冒险者，他们敢于克服航海的险阻来到这片土地，在这里建立起这个伟大的国家。作为远乡人，我们的身体里都流淌着冒险者的勇敢精神。如今祖先的国度正面临来自内部叛徒和野蛮战争的致命威胁，让我们铭记自己的血脉，将先贤的斗争精神发扬光大！"
SFH_fight_against_war_weary_mood:0 "打击厌战情绪"
SFH_fight_against_war_weary_mood_desc:0 "对于战争的抵触情绪是不可避免的，没有一个心智正常的人愿意看到兄弟阋墙和血肉横飞。但是我们决不能任由这种厌战情绪滋生蔓延，这只会让国民陷入对战争的盲目悲观和反战思想中。为了战争的进行和最终的胜利，我们应当通过媒体安抚人民的情绪，稳定民众对于战争的信心。"
SFH_war_propaganda:0 "战争宣传"
SFH_war_propaganda_desc:0 "热爱和平的远乡人民并不鼓吹战争，但我们并不拒绝正义的战争！全体国民都应该认识到，我们正在进行的是一场保卫国家的正义战争，是事关全体远乡人民切实利益的战争。我们应当以全部的热情、全部的力量和全部的勇气决心投入这场战争，为了远乡王国和她的人民而战！"
SFH_promote_positive_energy:0 "弘扬正能量"
SFH_promote_positive_energy_desc:0 "面对战争，民众总会对这种冲突带来的毁灭感到恐惧。悲观和负面情绪极容易在战争背景下在社会中流行。在这样情况下，国王陛下有必要站出来向他的臣民们传播教诲。人民应当被授予正确的价值观，即使在这样的混乱中也保持对国家的信任和对美好的向往。"
SFH_arrest_opposition:0 "抓捕反对派"
SFH_arrest_opposition_desc:0 "总有一些奸臣和逆贼诋毁朝廷的政策，在和平时期我们受制于法律和政治利益分配不能把他们怎么样，到了战争时期可就容不得他们胡来了。这些反对派在战争期间动摇民心，阻挠全国统一，诋毁国王陛下的领导，该当叛匪同罪，立刻捉拿归案！"
SFH_loosen_supplies:0 "宽松化配给"
SFH_loosen_supplies_desc:0 "远乡王国人民要吃饭，这就是战争期间的一切政策出发点。严苛的战时配给已经在民间引起了小小的怨言，每日配发的食物供给被指出并不能满足人民健康生活和成长的需要。在重新核算全国的物资供给后，我们可以很高兴地宣布，战时每日配给将被适当增加，民间的食品贸易市场也将在国家监督下有序开放。"
SFH_show_our_justice:0 "讲述我们的正义性"
SFH_show_our_justice_desc:0 "许多批评者会声称，青天军和所谓的“革命阵线”是被远乡昔日的错误政策逼上反叛之路的。这一说辞或许指出了一些基层官僚在执行国王陛下政策时候的歪曲，但其决不应该被解读为叛军具有任何正义性。自始至终，国王陛下的远乡王国都是唯一的正义，只有我们是代表远乡人民，保卫远乡统一的正义政权。"
SFH_quiet_or_die:0 "再闹事，就枪毙！"
SFH_quiet_or_die_desc:0 "在一些外来思想的影响下，似乎有一小撮人认为他们可以在远乡里肆意妄为。我们需要告诉他们，即使在远乡，也是有些话可以说，有些话不能说。如果这群人还胆敢在战时闹事，用激进的方式表达他们幼稚的想法，那我们并不介意以武力告诉他们：你和法律作对，获胜的只会是法律！"
SFH_reinforce_government_power:0 "强化政府权力"
SFH_reinforce_government_power_desc:0 "在远乡王国，君主的言语就是法律。尽管在过去，因为奸臣的蒙蔽，国王陛下的许多旨意得不到执行。但如今内战正在进行，国王陛下得以借机重拾对政府的控制。冗余的官僚机构将被清理，而政府将加强对社会各个方面的监督和控制。"
SFH_mastering_public_opinion:0 "掌握舆论"
SFH_mastering_public_opinion_desc:0 "为了进一步遏制反战派猖狂的情绪，我们可以正式立法降低媒体在我国的自由程度。扩大由我们掌控的国有媒体机构，让受我们控制的这些“喉舌”好好地帮政府讲话，督促民众为战争事业添砖加瓦。"
SFH_stop_while_ahead:0 "适可而止"
SFH_stop_while_ahead_desc:0 "做事讲求点到为止。当我们已经掌控了国家主流舆论后，太过收紧反对派脖子上的绞索只会让他们狗急跳墙，而展现出我们宽宏大量的一面反而更能使得一些温和派放弃他们此前的立场。"
SFH_suppress_the_opposition:0 "打压反对者"
SFH_suppress_the_opposition_desc:0 "自战争爆发开始甚至更早，那些政治反对派就好似苍蝇蚊虫一般嗡嗡叫个不停，好像远乡王国能凭他们嘴上说说就变得更好一样。这群反对派对于眼下的战争百害而无一利，而随着我们对公众媒体掌控的加强，我们获得了一个绝好的机会让这些叽叽喳喳的家伙闭嘴。此时不做更待何时？"
#内战后
SFH_the_dust_settles:0 "尘埃落定"
SFH_the_dust_settles_desc:0 "随着最后一个革命党或青天军的窝点被清除，我们终于成功地取得了内战最后的胜利。当我们的后人回顾历史时，他们会铭记这一天为远乡历史的决定性一刻，随着困扰中央政府的叛乱终于宣告终结，是时候把目光真正地投向建设这个国家了。\n\n然而，内战所造成的遗迹仍未消散。大量麟人流离失所，经济生产活动停滞，失去管控的叛军部队在各地造成了不断的混乱…我们必须尽快处理这一事务，否则一切发展都无从谈起。"
SFH_the_dust_settles_tt:0 "骇人的内战终于结束，是时候重建了。"
#内战后-左线
SFH_scarred_society:0 "伤痕累累的社会"
SFH_scarred_society_desc:0 "内战所造成的影响是毁灭性的，虽然坐在平京政府办公室里喝茶的权贵们难以意识到这一点，可上饶的农民显然有话要说。大量的流民不但冲击了本就不稳定的城市地区，还使得各地纷纷爆发小规模的饥荒。简单来说，我们需要尽快安置大量流民，恢复各地生产活动，同时想办法处理四处流窜的叛军部队——我们在这个时候最不需要的，就是饥肠辘辘的强盗，有枪的那种。"
SFH_reconstruction_act:0 "重建法案"
SFH_reconstruction_act_desc:0 "重建法案是临时由议会所起草的，给予远乡政府调动预备资源，指挥各地企业活动，以及在满足较低条件下也可以对民众采取强制性措施的权限的法案。在关键时期，我们作为政府需要起到带头作用，调动一切我们所能调动的资源，竭尽所能地帮助尽可能多的人离开颠破流离的生活，同时防止更进一步的混乱造成不可逆的破坏。"
SFH_free_food:0 "免费的温饱"
SFH_free_food_desc:0 "很多流浪的民众缺衣少食，因为饥饿，寒冷造成的伤亡数目呈指数级增长。政府的介入在此时显得十分有必要。为了解决这一问题，《重建法案》允许远乡政府直接调动各地的应急物资，就像古时候饥荒那样，官府会“开仓放粮”，在此基础上，我们还会发放赶制的大量简易衣物等，保障各地流民的基本生活需求。"
SFH_employment_proj:0 "再就业计划"
SFH_employment_proj_desc:0 "许多流民或许可以靠着政府的资助勉强过活，然而，无论是从经济发展的角度，还是民众的长期生活水平来着想，我们都应该想办法建立起新的，临时但同时又要能满足解决大量失业人口这一需求的就业方案。由中央政府出资，我们可以雇佣各地失业人口参与到重建活动中来，这不但可以充实人们的钱包，还可以为重建工作提供宝贵的劳动力。"
SFH_temp_house_construction:0 "临时住宅建设"
SFH_temp_house_construction_desc:0 "来自外国的技术允许我们高效地建造一种质量相对底下，可花费极低且几乎没有难度的模块化房屋。有了大量的流民和抽调过去的施工团队的帮助，再加上各地政府的全力支持，我们可以快速地建立起供给难民的简易住宅，这可以极大地减少社会的动荡，同时提供流民们一个暂时的落脚点。"
SFH_from_the_ruins:0 "重建废墟"
SFH_from_the_ruins_desc:0 "在战争中，许多城市，村镇都不可避免地成为了战场，他们不但是许多民众宝贵的家园，同时还可能是国家重要的生产活动聚集地。虽然快速磨平内战造成的影响并不现实，可无论如何，从重建各地定居点，村镇，城市等区划总是一个好的开始，我们需要以相对发达的地区为核心，逐渐将重建活动辐射到周边地区。"
SFH_settle_soldier_family:0 "安置军人家属"
SFH_settle_soldier_family_desc:0 "同对外战争不同，我们所经历的内战的双方都是自己人。或许来自叛军势力的许多士兵在政治观念上和我们的政府相差甚远，可并非所有人都是意识形态的狂热军。对于那些随波逐流，或者被时代的浪潮所推向战场的士兵以及他们的家人们，这场血腥的内战是没有意义的。作为正统政府，我们有义务安置他们的家庭，这有助于展示我们慈悲的一面。"
SFH_disband_rebel_forces:0 "解散叛乱部队"
SFH_disband_rebel_forces_desc:0 "虽说叛军的主要据点已经被扫清，可失去叛军指挥的大量前叛乱部队已经失去联系，他们不会像叛军头子们一样正常投降，而是成为各地匪患的源头，四处骚扰本就伤痕累累的民众们。我们需要想办法解散各地叛乱部队，或是通过法律手段，或是通过暴力手段。"
SFH_rebuild_order:0 "重建秩序"
SFH_rebuild_order_desc:0 "多亏了我们的不懈努力，远乡各地现已基本恢复了正常秩序，随着生产活动的逐渐回春，想必，我们用不了多久就能再一次看到繁荣的远乡——而且，这次没有叛军，有的只有在灾难后又一次团结起来的麟人社会。当然，这并不是结束，相反，它是一切的开始。随着南方局势的稳定，我们终于可以再一次将目光投向北方，投向我们失去的领土…远乡统一运动将开始。"
#内战后-中线
SFH_work_undone:0 "工作尚未完成"
SFH_work_undone_desc:0 "虽说内战已经结束，可我们的工作还远远称不上“完成”。这场战争所带来的伤痕仍停留在我们的国家身上，破碎的街道，停滞的生产和悲痛的家庭在远乡各地随处可见，这不但成为了滋生混乱，犯罪的苗床，还严重破坏了我国政府的威信。是时候开始重建工作了。"
SFH_fund_patriotic_enterprises:0 "补贴爱国企业"
SFH_fund_patriotic_enterprises_desc:0 "当内战的风暴席卷远乡各地时，当许多西装革履的小人微笑着背弃我们时，有这样一批人，他们为了远乡民众，为了中央政府而奋战在第一线——他们不是堑壕里的士兵或是产线上的工人，他们是那些愿意在危难时刻维持国家经济活动运转的爱国企业家们。如今，随着局势逐渐稳定下来，我们是时候作出表示，向忠诚者们回报了。"
SFH_suppress_commodity_prices:0 "压制商品价格"
SFH_suppress_commodity_prices_desc:0 "战争所带来的物资紧缺催生了囤货，投机倒把等一系列行为，大量生活必需品的市场价格飙升到了正常人所无法承担的高度。为了应对这一问题，政府可以出面强行收购物资并以正常，甚至是更低的价格将这些物资投入到市场中，这一方面有助于鼓励市场经济的快速恢复，另一方面也可以向生活穷困潦倒的民众们尽快提供价格低廉的生活必需品。"
SFH_fund_charity_events:0 "出资公益活动"
SFH_fund_charity_events_desc:0 "内战结束后，许多心系人民的企业家都选择开办各类公益活动，从为民众制作免费或低廉的基础餐食到提供就业岗位等应有尽有。我们作作为中央政府，在这种时候更要大力支持这样能帮助社会稳定的行为。我们可以提供各类公益活动所需要的资源和许可，为这类活动优先调动物资，或是在需要进行公共设施建设，修复这样的活动时提供法律上的支持。"
SFH_invest_construction_company:0 "投资建筑公司"
SFH_invest_construction_company_desc:0 "内战在我国各地城市，乡镇地带造成了十分严重的破坏，大量的工业中心遭到破坏，许多民众因为房屋被毁而流离失所。可以简单地预见，在未来的数年以内，各地对建筑企业，施工队等组织的需求大概会迎来一次暴涨——可说真的，即便是地方政府，恐怕也难以负担这样沉重的重建花费。我们可以介入此事，在资助各地企业的同时提供相关的补助。"
SFH_rerunning_factories:0 "重新运转的工厂"
SFH_rerunning_factories_desc:0 "虽说在短时间内指望各地工业系统恢复到战前水平不现实，可许多工厂确确实实地在生产社会需求较高的基本必需品——或许是经过加工，可以更快捷地发放给各地难民的简易食品；又或者，是各地重建工作所必须的建筑材料，设备零件等。无论如何，在我们的努力下，一些位于大城市的核心工业区已基本恢复正常运转，以它们为核心，我们会快速地推进重建工作！"
SFH_military_trials:0 "军事审判"
SFH_military_trials_desc:0 "许多来自叛军的军事人员在远乡各地犯下了难以理喻的种种罪行，无论情况如何，我们都不该忽略这一重要事实。随着叛军主要人员的投降和被俘，我们得以在国家各地展开规模庞大的军事审判，针对这些人所犯下的战争罪行来决定他们身上的惩罚。"
SFH_absorb_talented_ones:0 "吸收有才军官"
SFH_absorb_talented_ones_desc:0 "许多站在叛军一方的军人同我们的政权在意识形态上并没有本质上的分歧，许多军人都是十分单纯的，既然如今的我们已经证明了作为远乡中央政府的合法性，他们也并非不可以效忠于我们——这不但可以减轻在他们身上的刑罚，同时也可以帮助我国军队快速地从内战中恢复过来。"
SFH_trust_the_market:0 "信任市场"
SFH_trust_the_market_desc:0 "在我们的不懈努力下，远乡各地现在已做好了如战前般运转的准备。随着各地的经济活动回到战前状态，相信用不了多久，市场无形的手就可以正常地实现社会秩序的恢复，而且，这一次，我们将会拥有一个更加强大的远乡国。当然，这并不是结束，相反，它是一切的开始。随着南方局势的稳定，我们终于可以再一次将目光投向北方，投向我们失去的领土…远乡统一运动将开始。"
#内战后-右线
SFH_just_starting:0 "不过是刚刚开始"
SFH_just_starting_desc:0 "虽说我们已经成为了内战的最终胜利者，可留给我们的并非属于是胜利者的荣耀，而是满地的疮痍，混乱的城市，无家可归的大量流民，以及为非作歹的各地匪军。别说胜利而归了，一切才刚刚开始。有了军队的帮助，我们会快速而简单地重建国家秩序，尽快将各地情形恢复到战前状态，并找到那些加害于我国政府的叛徒算账。"
SFH_took_over_chaotic_zone:0 "接管混乱地区"
SFH_took_over_chaotic_zone_desc:0 "流民造成的社会秩序失衡已经超出了我们的忍耐限度，对于那些实在是混乱到了难以管控地步的地区，我们将派出军队强行接管，实施军事管制以确保当地民众别进一步发展成下一次叛乱。同时，这还有助于清缴混入难民队伍的叛乱分子，可谓一举两得。"
SFH_new_taxations:0 "新的税赋"
SFH_new_taxations_desc:0 "重建废墟要钱，管理军队要钱，整理物资同样要钱。有些天真的傻子可能以为内战的结束就意味着苦日子的结束，那就太天真了——如果剿灭叛匪的代价如此轻松，那远乡还花了这么多年做什么？如果战争造成的影响如此简单，西北特区是怎么来的？在各地税赋难以收集的情况，我们将在仍处在控制下的地区开展新的税赋，同时授予税务官权限，从相对不稳定的地区尽可能征召资金以巩固重建活动。"
SFH_job_assignments:0 "就业分配计划"
SFH_job_assignments_desc:0 "在流民遍地走的情况下，指望市场系统正常运转显然不现实。政府和军队可以在这种时候介入，将各地流民尽可能地集中管制，并将他们分配到由各地政府组织的公共设施建设计划，重建活动，或者是其它类型的经济生产活动中去。这不但有助于我国社会的稳定，还可以帮助提供流民们安身的地方，避免更进一步的混乱与伤亡。"
SFH_forced_refugee_transportation:0 "强制转移难民"
SFH_forced_refugee_transportation_desc:0 "成千上万该死的难民在远乡各地像蛆虫一样乱窜，全然不知我们为了维持国家稳定所做出的努力。军队必须在这种时候介入，集中管理无家可归的难民，要么将他们遣返回自己的老家参与重建，要么就被我们强制性转移到其它地区以协助当地的经济活动。谁也别想继续破坏秩序。"
SFH_transfer_surplus:0 "转移剩余产能"
SFH_transfer_surplus_desc:0 "有些地区的生产中心承受了过于强烈的损失，这使得重建工作几乎不可能。在这种情况下，我们可以尽可能地收集剩下的原材料，器械，工具等物资并转移到其它地区，这样可以保证当地的产能不被浪费，或者说，发挥最后的余热。"
SFH_public_execution:0 "公开处刑"
SFH_public_execution_desc:0 "为了树立当前远乡政府的权威，同时强调反叛政府的下场，我们将在全国各地对叛乱分子执行公开处刑，邀请各地居民前来观看这些远乡的敌人是如何被绞死的。任何反抗的蠢货都将是这个下场——我们会在公众眼里树立这样的印象。过去的远乡对待叛军太过软弱了，以至于多数民众都对叛乱缺乏基本的概念，这次，我们会让他们无比清楚的。"
SFH_background_investigation:0 "背景调查"
SFH_background_investigation_desc:0 "即便是最残酷的叛乱分子，他或她肯定也有个爹妈，兴许还有一些其他的兄弟姐妹。这时候，我们的情报机构便可以介入了——通过调查重大叛乱分子的身世，我们可以想办法揪出他们的家人，并在情况恶劣的情况下给予后者相应的惩罚。想必，这会给那些意图投身叛乱组织的人们一起警钟，同时也可以成为许多人放弃叛乱组织，加入我们行列的起点。"
SFH_thanks_at_least:0 "起码说句谢谢？"
SFH_thanks_at_least_desc:0 "通过我们的不懈努力，远乡各地现已重归稳定，并且牢牢地掌握在了我国手中。随着我们成功地确保了各地民众的忠诚，剿灭大多数有组织的叛乱行为，同时将军事组织维持在了稳定的这样一个状态，相信在不久的将来，我们便能重塑过去的荣光，带领远乡国走向新的辉煌——没错，这将会是一切的开始。随着南方局势的稳定，我们终于可以再一次将目光投向北方，投向我们失去的领土…远乡统一运动将开始。"
#统一线
SFH_crossroads_of_destiny:0 "命运的十字路口"
SFH_crossroads_of_destiny_desc:0 "浩浩荡荡的远乡再统一运动已经开始——虽然这不过是我们自己命名的一次大规模行动，不过，它总有一天会在远乡国的历史上标记下浓墨重彩的一笔。如今，我们正站在命运的十字路口之上，统一远乡的方案许多，可并非每一种都最符合当今的政治局势，或是这个国家发展的需求。我们将不得不作出许多困难的抉择，然而，无论如何，统一将是不可避免的…无论胜者是谁。"
SFH_intervene_nwf_politics:0 "干涉西北政局"
SFH_intervene_nwf_politics_desc:0 "西北特别行政区是在东巴大战后，时任远乡政府为了维持西北地区秩序，派遣邱向荣元帅建立的军政府，同时打出了“重建地区”的旗号。然而，由于远乡各地局势混乱，平京无法为西北地区提供强有力的支援，加上军政府的局限性，西北地区一直没能实现社会秩序的再稳定，同时还面临着诸多内外政治，军事问题，一度陷入了危机状态。西北地区是我国宝贵的领土，同时还是通往其它东巴斯蒂亚国家的门户，我们必须夺回来，无论代价如何。"
SFH_intervene_nwf_politics_tt:0 "我们将准备干涉西北地区的政局。"
SFH_call_the_marshal:0 "致电邱元帅"
SFH_call_the_marshal_desc:0 "我们的运气很好！邱向荣元帅在西北政局的混乱中成功稳定了特别行政区的存在。终于南方政府且心向退休的他定当不会拒绝我们统一的要求，现在，是时候打个电话，来回确认交接工作，以及向老元帅发出迟到了多年的慰问了。"
SFH_call_the_marshal_tr:0 "由于西北地区尚未完工，目前仅可选择此项。"
SFH_prepare_for_unification:0 "准备统一事项"
SFH_prepare_for_unification_desc:0 "整合两个分裂已久的地区并非易事。即便是对于忠诚于我们的西北特区政府而言，也是一样——何况当地的重建工作也尚未完成，许多混乱的根源并没有被解决，反而随着时间的流逝一天天恶化。我们需要花时间处理两国政府的交接，各地行政机构的整合，以及处理那堆成了小山的各种文件…"
SFH_transfer_jurisdiction:0 "移交管理权限"
SFH_transfer_jurisdiction_desc:0 "在我们的努力下，西北特区和南方政府的合并已是板上钉钉的事实，很快就要举行交接仪式了——终于，在过去了这么多年后，西北地区重新回归远乡的拥抱了！尽管如此，这并不代表我们的工作就全部结束了。政府的合并意味着大量全新文书工作的开始，地区的整合，居民身份的确认，还有先前剩余资源的再利用…这都并非一朝一夕能解决的。"
SFH_corporate_officials:0 "收编政府官员"
SFH_corporate_officials_desc:0 "空降一批领导班子去统治西北地区显然不现实，收编之前就在当地工作的政府职员会是一个好办法，他们比起我们更加了解当地的局势，也更加清楚政府里的文件到底该归类到哪一栋楼——尽管如此，我们也不会全盘接收军政府的所有职员以继续统治，有一些地方需要改变，有一些则不用。"
SFH_possibility_for_cooperation:0 "合作的可能"
SFH_possibility_for_cooperation_desc:0 "虽然邱向荣元帅的军政府已经遭到毁灭，可现在占领了西北地区的领导人同我们并非水火不容。我们派出的情报探子已经确认了他们对统一议题的兴趣以及对我国政府相对非敌对的态度，或许，我们可以展现出更加积极的姿态，想办法以和平的手段收回西北地区。"
SFH_emphasize_unification_importance:0 "强调统一必要性"
SFH_emphasize_unification_importance_desc:0 "远乡应该分裂吗？多数人心里都有一个很简单的答案：不应该。无论是叛匪还是官军，无论是南方人还是北方，是男女老少，都清楚一点十分简单的道理——统一的远乡才是真正强大的远乡，分裂永远只会让情况更加糟糕，让外国更加沾沾自喜。我们可以多做宣传，强调国家统一的必要性，兴许，这会软化西北政府的态度。"
SFH_sucessful_meeting:0 "成功的会谈"
SFH_sucessful_meeting_desc:0 "在一段时间紧张的会面后，我们成功和西北地区政府达成了共识，并决定在接下来的一段时间内推进西北地区的回归工作。虽然许多人都为此长舒一口气，毕竟我们终于是兵不血刃地收回了远乡三分之一的重要土地，可统一也并非难事——或许我们避免了在战场上流血，文书工作的努力仍然是需要时间的。好在大家都已经心向统一，要不了几个月，我们大概就能解决这一问题。"
SFH_failed_meeting:0 "失败的会谈"
SFH_failed_meeting_desc:0 "西北地区的叛徒冥顽不化，在我们付出了大量时间精力示好后，居然拒绝了我们统一的要求，真是岂有此理！事已至此，我们别无选择，只有通过暴力手段收回西北地区了。远乡的统一是不可阻止的，我们将会让这些叛徒们意识到这一点。"
SFH_integrate_officials:0 "整合政府官员"
SFH_integrate_officials_desc:0 "许多先前为西北地区政府工作的政府官员有着我们所不具备的经验，比起重新建立政府，整合先前的同时进行一定程度的改革更加实惠，也更能避免造成各地的不满。"
SFH_trying_to_cover_up:0 "亡羊补牢..."
SFH_trying_to_cover_up_desc:0 "该死的！邱向荣元帅没能稳住西北地区的局势，当我们好不容易从南方的战争抽出身后，还要继续应对西北地区的乱战！然而，目前来看，情况还没有到达完全不可收拾的地步，我们必须尽快采取行动，哪怕这意味着再一次战争。"
SFH_not_that_late:0 "未为迟也"
SFH_not_that_late_desc:0 "我们的运气很好！现在情况仍在掌握之下，我们必须尽快向西北地区发送补给以协助他们的战争，同时进一步动员我国的部队——在必要的情况下，我们将直接干涉西北地区的战争以确保胜利！"
SFH_expand_intervene_scale:0 "扩大干涉规模"
SFH_expand_intervene_scale_desc:0 "西北地区的战争仍处在胶着状态，我们不能继续坐以待毙了！是时候开动我们的军队，以暴力手段快速，简单地收回对西北地区的统治了。"
SFH_come_home_kid:0 "归来吧，可怜的孩儿"
SFH_come_home_kid_desc:0 "随着西北地区战争的尘埃落定，我们终于可以自豪地着手准备地区再整合行动了。然而，这需要更长的时间——战争带来的破坏加剧了西北地区的混乱，各地处于游击状态的叛乱分子也仍然会继续成为我们统治的巨大阻力。不过，这些总有一天都是可以解决的，毕竟我们已经成为了胜利者。"
SFH_damn_we_are_late:0 "“抱歉，我们来迟了”"
SFH_damn_we_are_late_desc:0 "情况不妙，由于我们没能赶上干涉西北政局的最佳时间，邱向荣元帅的军政府已不复存在。由于西北地区仍然处于叛乱分子的掌控下，我们难以借助合法政府的帮助干涉这场战争——很显然，我们别无选择，只有直接进攻了。"
SFH_border_supply_transport:0 "边境物资运输"
SFH_border_supply_transport_desc:0 "西北地区环境相较南方比较恶劣，而且各地生产活动大多停滞，正规军难以获取补给。为了避免因补给不足而陷入困境，我们可以提前准备好军事行动所需要的物资，确保行动一定会按照我们的预料进行。"
SFH_special_mil_op:0 "特别军事行动"
SFH_special_mil_op_desc:0 "是时候终结叛军的统治了！随着我们关于发动西北战争的准确全面收工，是时候按照计划进军了。为了远乡的统一，哪怕这意味着要脏了我们的手，又或是要让更多人的血流，也在所不辞。"
SFH_friend_and_enemies:0 "敌人与朋友"
SFH_friend_and_enemies_desc:0 "虽说我们采用了暴力手段处理叛军的主要力量，然而，我们并不能简单的说所有不为邱元帅的军政府服务的各地官员，军人，企业家都是叛军的支持者。他们中有的只是被时代裹挟的可怜人，有些人则是因为目光短浅——无论如何，他们中的许多都可以背简单的“说服”，然后成为我们的伙伴，为西北地区的再整合提供助力。我们要分得清谁是“朋友”，谁是“敌人”。"
SFH_take_over_garbage:0 "接手烂摊子"
SFH_take_over_garbage_desc:0 "由于政治混乱的缘故，西北地区的重建活动一直没有什么实际进展。为了证实我们作为中央政府的权威，同时也为了西北地区的长远发展，我们将不得不接手过去尚未完成的重建计划，或多或少地增加一些属于我们的特色，或是做出一些改进，最终以巩固西北局势。"
SFH_take_over_garbage_tt:0 "西北地区重建系统暂未上线，需要等西北特区内容完善。"
SFH_eventual_unification:0 "终将统一"
SFH_eventual_unification_desc:0 "南北远乡分裂的那一天是远乡最黑暗的一天——即便是来自外国的入侵也没能让麟人拔剑挥向自己人，可郑义做到了，他作为远乡国王唯一的儿子，作为似乎唯一的王位继承人，作为军队的领导者之一，背叛了我们。如今，我们终于得以从危机中恢复过来，是时候将目光投向北方，让远乡统一运动照亮北远乡地区了！"
SFH_contact_ZhengYi:0 "联络郑义"
SFH_contact_ZhengYi_desc:0 "郑义的背叛无疑是令人心碎的。然而，考虑到时代背景，当国家陷入危难之际的情况下，他的行为或许可以被称为是背叛，可他的本意究竟如何？郑钧和郑义终究是父子关系，目前来看，北远乡地区也仍然处于稳定状态，同我国政府也没有爆发公开冲突…或许，我们仍有和平统一的谈判空间。"
SFH_south_north_unification_issue:0 "南北统一事宜"
SFH_south_north_unification_issue_desc:0 "为了实现远乡的统一，我们的其中一个目标便是达成同郑义的合作，收复人鱼特区之外的北远乡领土。同人鱼特区的谈判不同，南北远乡的关系相对复杂且不明确，在处理南北统一事宜时，我们有更大的空间在谈判桌上斡旋。只要郑义同意让步，和平统一就有可能实现。"
SFH_family_meeting:0 "“家庭会议”"
SFH_family_meeting_desc:0 "很多人戏称南北远乡领导人的会面就好似一次家庭会议，毕竟双方一个是爸爸一个是儿子，确实是媒体喜欢的戏剧性场面。然而，虽然有些人可能对此抱有戏谑的心态，郑钧和郑义的见面相比会充满了火药味，尤其是在郑红——作为现在的远乡王位继承人——同样参与到会面中去的情况。我们只能希望这场“家庭会议”真的能像很多普通的家人会面一样，以和平收场。"
SFH_compromise_and_peace:0 "妥协与和平"
SFH_compromise_and_peace_desc:0 "在花费了大量精力阐述利弊后，郑义在对条款进行了部分修正的情况下，同意了我方提出的条款，同时认可了南北远乡统一的必要性。两国合并的进程已经开始，为新生的统一远乡国欢呼吧！分裂将在我们手中结束！"
SFH_consolidate_administrative_structures:0 "整合行政机构"
SFH_consolidate_administrative_structures_desc:0 "北远乡地区幅员辽阔，民风彪悍，直接整合他们的领导班子是不现实的。我们需要整合北远乡地区现有的行政机构，吸收他们的官员和行政政策，并加上我们自己的色彩。这本是相当艰难的一份工作，幸运的是，在北远乡政府的帮助下，我们可以又快又好地处理这一问题。"
SFH_peaceful_transition:0 "和平交接"
SFH_peaceful_transition_desc:0 "随着统一准备工作的顺利落实，我们可以着手进行南北远乡政府的合并了！在这一阶段，我们将可以合并大多数来自北方政府的前成员，包括他们的全部军事人员和政府机关。然而，鉴于我们尚且缺乏统治北方地区的经验，领土的再整合仍然需要时间，在那之前，我们将不得不面对北方的各地小规模反叛与较低的行政效率。"
SFH_tear_down_the_face:0 "撕破脸"
SFH_tear_down_the_face_desc:0 "郑义拒绝了我们关于南北和平统一的设想，他似乎仍然对南方政府抱有敌意，且不认为我们所费劲千辛万苦进行的改革有任何意义。看来，我们似乎别无选择。是时候准备动员军队，向北方进军了。如果郑义不愿意将国家大义和统一的历史必然性放在眼里，那我们的军队也没必要把他放在眼里，强硬措施才是唯一答案。"
SFH_mobilize_for_north:0 "对北方军事动员"
SFH_mobilize_for_north_desc:0 "北方战场和南方战场略有不同。在自然环境和各地发展相对较为恶劣的北远乡地区，军事行动需要更多的准备。除了确保补给路线和战争计划外，我们还需要花费一定时间考察北方各地的地理特征，各行政区划的战略要地等等。无论如何，我们都将动员起来，为接下来的战争做好准备。"
SFH_our_ultimatum:0 "我们的最后通牒"
SFH_our_ultimatum_desc:0 "随着我们彻底为北方战争做好了准备，是时候向郑义提交最后通牒了。我们的要求很简单：既然北远乡政府不愿意以和平的方式实现远乡国的统一，那么我们除了强硬措施以外，不接受完全投降以外的任何外交行动。向北方进军！"
SFH_mermaid_zone_issue:0 "人鱼特区事宜"
SFH_mermaid_zone_issue_desc:0 "多年前签订的《白洋公约》是远乡王国历史性的耻辱时刻，我们可悲地向人鱼进行了大量的让步，同时还允许他们获得一部分我们的土地来进行“商业活动”！在现在看来，这是无法容忍的不平等条约。为了解决这一问题，我们可以开启对人鱼的谈判，试图用和平的方式削弱他们的影响力，尽管这意味着我们或许要做出让步；又或许，提前准备特别军事行动，直接发动进攻也未尝不可。"
SFH_white_ocean_charter_renegotiation:0 "《白洋公约》修正案谈判"
SFH_white_ocean_charter_renegotiation_desc:0 "在应对人鱼特区的问题上，我们最终选择了和平的方案——或者至少我们希望人鱼方是这样认为的。修正案的谈判有多个提案，有的更容易让人鱼一方接受，有的则不是：我们可以完全不收回任何土地，只收紧特区的自治权；或者，我们可以收回大陆部分的土地；又或者，我们可以要求特区的完全吞并。我们需要斟酌利弊，要知道，如果谈判失败，最终我们仍然要走上武力收回特区的道路。"
SFH_sucessful_negotiation:0 "会议大获成功！"
SFH_sucessful_negotiation_desc:0 "人鱼一方同意了我们的提案，和谈会议取得了成功！这将会是载入远乡史册的一天，让我们开始着手准备提案的要求吧。这仍然需要一点时间，考虑到法律法规和政府行政机构的调整，实际上条约的修正并不能立即实现。不过，在我们和人鱼特区领导层的共同努力下，相比这在不久的将来会成为现实。"
SFH_failed_negotiation:0 "谈判失败"
SFH_failed_negotiation_desc:0 "很不幸的是，人鱼一方似乎并不具备足够的智慧来认清现状，他们的愚蠢和傲慢最终使得我们不得不在战场上兵戎相见——至少我们已经试过和平的道路了，现在是时候看看这帮水里游的畜生搞得那所谓“环境适应魔法”能不能帮助他们取得战争的胜利了。"
SFH_integrate_industries:0 "整合特区工业"
SFH_integrate_industries_desc:0 "人鱼特区有着大量人鱼企业家留下的资产，他们有的正健康地运作着，有的则遭到了资本家的抛弃。在由远乡政府主导的今天，我们可以对这些资产进行重新清点，收购那些营收不好或者准备撤离的企业和他们的资产，这有助于提高我国的工业发展水平。"
SFH_the_early_the_better:0 "先下手为强"
SFH_the_early_the_better_desc:0 "同自大而贪婪的人鱼谈判是没有意义的。在世界局势风云变化的今天，我们没有时间也没有理由去在一个如此涉及到底线的话题上作让步——远乡的领土必须被全部收回！任何一个麟人都清楚地知道这一简单的道理。为了实现这一目标，我们将必须采用暴力手段。"
SFH_white_ocean_operation:0 "白洋行动"
SFH_white_ocean_operation_desc:0 "我们的士兵们已经为向特区进军做好了准备。曾经，我们签署了耻辱的白洋公约，向人鱼投降并割让了土地，而如今，我们将使用强硬手段夺回本就属于我们的东西——我们将这次军事行动命名为“白洋行动”以印证我们的决心，这一次，将不再存在什么所谓的“公约”或是“特区”，远乡将会成为统一的远乡，直到永远！"
SFH_confiscate_mermaid_assets:0 "没收人鱼资产"
SFH_confiscate_mermaid_assets_desc:0 "人鱼在慌忙撤离特区时留下了大量资产，反正我们也不可能给他们送回去，是时候拉一下清单，对剩余的资产进行统计和收缴了。虽然这些财产都是人鱼从我国人民抢走的血汗钱，可钱就是钱，我们大可以利用这些土地，设施，设备，资金等一系列内容来展开新一轮的建设。这可是利国利民的好事。"
SFH_north_in_chaos:0 "北方陷入混乱"
SFH_north_in_chaos_desc:0 "郑义的糟糕统治造就了北方地区的混乱，他无能到了甚至无法镇压匪患的地步！然而，比起一昧地指责，好不容易从南方内战泥潭中抽出身来的我们有新的问题需要考虑——我们该如何介入北方局势？根据战争情形，胜利者的不同，我们可以采用和平或是武力等多种不同的方式以重夺北方领土，希望一切顺利。"
SFH_continued_storm:0 "风暴继续"
SFH_continued_storm_desc:0 "情况不妙，北方的战争仍然没有结束。我们决不能在这里坐以待毙，现在是干涉的最好时机！我们可以选择直接全面干涉，或者，假如郑义那小子仍然可以为我们所用的话，我们可以选择结盟并共域外敌——当然，前提是他愿意向我们让步。"
SFH_help_ZhengYi:0 "帮助郑义"
SFH_help_ZhengYi_desc:0 "看起来郑义所带领的北远乡王国在内战的风暴下仍然坚挺着。这对我们双方而言都不能算是坏消息，虽然郑义本身同远乡中央政府离心离德，可他毕竟心向我们的政体，比起那些农民暴徒或者贵族叛乱要好到不知道哪里去了。因此，我们可以提出同他合作参与内战，希望他们不要不识好歹，不肯让步。"
SFH_north_south_union:0 "南北同盟"
SFH_north_south_union_desc:0 "随着郑义接受了我们的要求，南北远乡同盟正式达成——终于，远乡政府团结在了同一面旗帜下！在我们双方共同的努力下，想必那些再强大的叛乱分子也要望而生畏！来自南方中央政府的王室已经抵达了它忠诚的北方地区，现在，是时候戡乱反正了。"
SFH_pay_accompanied_with_payback:0 "付出就要有回报"
SFH_pay_accompanied_with_payback_desc:0 "我们的帮助可不是免费的——无论是看在那些死在了北方的南方士兵的份上，还是出于国家大义——北远乡地区必须回归中央政府的怀抱。付出就要有回报，这是我们在干涉北方战争前就同郑义达成共识的一点。随着战争的结束，大量重建工作已由中央政府的特别部门接手，同时，我们也接手了部分北远乡政府的行政机能，很快，游子就要回归了。"
SFH_armed_intervention:0 "武装干涉"
SFH_armed_intervention_desc:0 "北远乡地区地理环境复杂，风土人情也较为彪悍，盲目干涉是下下策。我们需要先做好干涉内战的准备：一方面，我们需要考察北远乡地区的地理环境和战略要地，确保不会进攻错误的地点；另一方面，我们的情报人员还需要确认北方叛军的势力范围和他们的大致行动方针，最好不要拿对付叛乱贵族的手段去和革命党打交道。"
SFH_operation_northern_wind:0 "北风行动"
SFH_operation_northern_wind_desc:0 "随着我们的部队准备完毕，是时候向混乱的北方地区进军了。北远乡地区已经同中央政府分离了多年，在这段时期里，我们经历了无数的苦难与挫折，可最后仍然屹立于此。我们将进攻北远乡的行动命名为“北风行动”，象征着中央政府将如风暴一样扫清北方地区的叛乱分子。是时候了，让我们拾起武器，重新夺回我们统一的祖国！"
SFH_clear_bandits:0 "清剿匪患"
SFH_clear_bandits_desc:0 "北远乡地区匪患横行，近来更是加上了革命党，农民起义，贵族叛乱等一系列恐怖分子的帮助。北方战争结束后，拿着热兵器乱跑的士兵很快成为了匪徒们的新鲜血液，北方则陷入了更进一步的混乱——这显然不是我们希望看到的。在中央政府军的帮助下，我们应当发动强力的剿匪措施以应对这一局势。"
SFH_fire_down:0 "战火已熄"
SFH_fire_down_desc:0 "北远乡地区的战争已经结束，不过这并不代表我们来完了。在北方局势尚且不够稳定的情况下，我们仍然具有大规模干涉的能力。现在，是时候收集情报，看看应该采取何种行动应对当下的北远乡了。"
SFH_beat_free_union:0 "打倒自由联军"
SFH_beat_free_union_desc:0 "自由联军由愤怒的农民与邪恶的革命党组成，他们存在的意义除了彻底颠覆远乡秩序外一无所有。因此，为了保护我们所深爱的祖国，同时也为了帮助那些遭到蒙骗的普通人，除了彻底消灭自由联军外，我们没有任何选择。"
SFH_clear_the_countryside:0 "清扫乡村"
SFH_clear_the_countryside_desc:0 "大量革命党，农民叛军在正面战场失败后转入各地乡镇，山野展开游击活动，这无疑对我们的统治和我军的行动造成了极大的影响。许多被运往军队的补给，或者前往维持秩序的士兵都惨遭掠夺或是杀害，这样的行径必须被制止！一点一点地，我们将清扫北方地区的乡镇地带，确保游击队不会继续骚扰我们。"
SFH_order_back_in_countryside:0 "秩序重归乡村"
SFH_order_back_in_countryside_desc:0 "随着我们的清剿工作逐渐起到效果，北方各地的农民叛乱已经逐步消失，革命党叛军也慢慢地销声匿迹，很快，我们就能再一次巩固于北方的统治了！虽然我们不得不花费大量精力在重新整合于中央政府对着干的各地乡镇——这意味着大量人力物力的投入和可能的流血行动——不过，这终有一天会起到成效的。当秩序重归乡村之时，即便是最反动的农民，也将不得不承认他对我们的忠诚。"
SFH_contact_revolt_nobles:0 "联络起义贵族"
SFH_contact_revolt_nobles_desc:0 "虽说起义贵族打着反对远乡政府的旗号发动了叛乱，可他们毕竟反对的也只是郑义的残酷统治，至少，我们不能说贵族叛军中的每一支势力都是同我们不对付的。为了国家大义同时也为了减少内乱带来的伤亡，我们可以展现友好的姿态，主动联络起义的贵族领袖，希望他们能理解我们的大义，并同意和平解决远乡分裂事宜。"
SFH_meeting_failed:0 "会面失败"
SFH_meeting_failed_desc:0 "可恶的贵族们拒绝了我们慷慨的提议，看来他们是决心到底要造反了——那我们也没有什么好说的了。动员军队，向叛乱分子的根据地发动进攻！"
SFH_take_over_noble_assets:0 "收缴贵族资产"
SFH_take_over_noble_assets_desc:0 "许多叛乱贵族在北远乡地区都留下了丰富的财产，除了那些闻到风声迅速逃往国外的，剩下的这些资产，毫无疑问，都归我们了。当然，我们不可能像那些叛乱分子一样靠这点资产继续过荒淫无度的生活。他们所不得不遗留下来的大量的生产设备，各类资源，甚至是土地契约，工厂设施，都可以为北方地区的发展所用。国有企业和部分与我们合作的北方民营企业将接管这些资产，并将他们发挥出更大的作用。"
SFH_recruit_them:0 "招安"
SFH_recruit_them_desc:0 "在紧张的谈判过后，贵族们终于接受了我们慷慨的提议，同意和中央政府和平统一。无论是对于我们而言，对于他们而言，还是最终要承担战争之痛的北远乡居民而言，这无疑都是个好消息。关于领土再整合的工作已经开始快速推进，行政机构，政府职能的转移也取得了明显的进展，让我们欢迎又一片远乡的土地回归吧！"
SFH_keep_their_assets:0 "保留贵族资产"
SFH_keep_their_assets_desc:0 "既然贵族们选择了同我们合作，那我们也没必要展现什么敌意。实际上，先前贵族起义的一大原因便是他们的资产遭到了郑义政府的非法挪用，我们可以从过去中学习，选择帮助保留贵族们的资产，确保他们现有的地位不会遭到严重的，直接的破坏。这有助于重建北方地区的秩序。"
SFH_remake_white_ocean_charter:0 "重新划定《白洋公约》"
SFH_remake_white_ocean_charter_desc:0 "《白洋公约》不但规定了我们要向人鱼在远乡的利益作极大的让步，还逼迫我们割让领土，设立所谓的“人鱼特区”以帮助人鱼资本家们继续蚕食麟人的财富。这一切必须被停止。随着我国局势的逐渐稳定，是时候把目光投向人鱼一方的势力，并着手准备重新夺回特区的领土了。不过，比起采取强硬措施，人鱼在理论上仍然和我们保持着不那么友好的贸易往来，因此，谈判会是首要选择。"
SFH_close_negotiation:0 "惊险的谈判"
SFH_close_negotiation_desc:0 "在一段时间的惊险的谈判后，人鱼一方同意了我方所给出的条件。终于，我们在某种程度上，解决了特区问题，并将其收回到了我们的势力范围内。欢呼吧！这将会是历史性的一刻，它标记着我们终于在某种程度上走出了以前大幅度向人鱼一族让步的阴影，转而开始进行独立自主的发展。"
SFH_peace_and_money:0 "和气生财"
SFH_peace_and_money_desc:0 "特区统治下的土地中有着大量人鱼一族上岸后展开经济活动的企业家，科学家，劳工，或是单纯的旅游人士。他们并不是我们的敌人。在我们的帮助下，这些地区会继续开展一系列友善活动以帮助他们展开更加平等，合法的经济活动，或是增进远乡在人鱼政府眼中的形象。"
SFH_sending_ultimatum:0 "发送最后通牒"
SFH_sending_ultimatum_desc:0 "人鱼拒绝了我们慷慨的提议，他们渺小的大脑无法正确意识到远乡统一的必然性和他们自身的弱小。我们将在特区边境集结部队，同时发送最严苛的最后通牒。要让他们知道，我们可不是好欺负的！"
SFH_mermaid_resettlement_programme:0 "人鱼移民安置计划署"
SFH_mermaid_resettlement_programme_desc:0 "在占领特区后，我们不可避免地需要解决当地人鱼侨民的问题。虽然我们确实也可以直接全部遣返，可这在短时间内定会在特区掀起轩然大波，在战争刚结束，地区形势不稳的情况下，这不是长久之计。为此，我们可以专门设立部门，无论是遣返也好，协助安置也好，都需要专门解决人鱼侨民的问题。"
SFH_king_in_pain:0 "苦涩的君王"
SFH_king_in_pain_desc:0 "如果说北方内战是一场灾难，那郑义能从这场灾难下挺过来，并且重新巩固其政权在北远乡的地位，那便是一次不亚于麒麟降世的神迹。从结果来看，虽然北远乡地区仍然不稳定，可郑义实实在在地成功统一了北方地区。尽管如此，代价确实惨痛的——有多少人的血，为了他自己不成熟的理想而流？为了他匮乏的执政能力流？为了他毫无意义的，对父亲的叛逆而流？在这一切过后，郑义或许已经对自己的不成熟有了认识…可能，我们将可以和平解决统一问题。"
SFH_shake_hands:0 "握手言和"
SFH_shake_hands_desc:0 "在意识到大局已定后，郑义选择放弃手中的权柄，同意我们关于南北再统一的要求。关于政府机关的移交行动已经开始准备，我们也正逐步接受北方地区的战后重建工作。很快，我们就可以实现远乡国的再统一了。"
SFH_shake_hands_flag:0 "郑义向我们投降。"
SFH_kids_back:0 "游子回归"
SFH_kids_back_desc:0 "自打郑义选择在北方自立门户，已经过去了多年。在这段时间内，无论是南方的中央政府，还是北方的独立政府，都经历了巨大的变动。远乡各地的内战改变了很多，其中最不能忽视的便是执政风格的转变以及人民思潮的变动。在无数的困难面前，南北远乡没有任何一方选择投降，并最终就远乡统一的大义达成了共识，实现了再统一。这将会是历史性的一刻。"
SFH_only_the_fight:0 "唯有一战"
SFH_only_the_fight_desc:0 "即便是在经历了这么多剧变后，郑义仍然拒绝和我们走向和平统一的道路。虽然令人心碎，我们不得不动员军队，以强硬手段推进北远乡地区的回归。"
SFH_only_the_fight_flag:0 "郑义拒绝投降。"
SFH_imprisonment_ZhengYi:0 "软禁郑义"
SFH_imprisonment_ZhengYi_desc:0 "随着叛乱政府的投降，我们成功捉拿了郑义。虽然叛乱是杀头的重罪，郑义本人在军队里也小有名望，同时也是郑钧唯一的亲生儿子。在种种因素的推动下，我们可以软禁郑义，想办法让他远离政治，不闹出什么幺蛾子，同时也不至于搞得我们去处刑一名皇室成员。"
SFH_the_forgotten_race:0 "被遗忘的种族"
SFH_the_forgotten_race_desc:0 "虽然常常遭到忽视，可远乡内陆各地乡村地带，尤其是那些因地形崎岖而看似“人迹罕至”的偏远地区，实际上充满了祖祖辈辈生活在当地，或者是因为一些原因从外国迁移来的亚人族群，甚至是兽人族群。远乡不像巴斯蒂亚的一些其它国家，具有强烈的种族歧视传统——实际上，亚人和兽人族群的存在根本不被大多数麟人所认知，即便认知了，多数人也只是把他们当做是某种程度的“动物”而非“智慧物种”。在亚人，兽人族群逐渐团结的当今，我们显然不能继续放任这样的情况继续发展，我们必须得做点什么。"
SFH_the_forgotten_race_tt:0 "我们将着手处理国内的少数种族问题。"
SFH_meet_with_subhuman_leaders:0 "同亚人团体领袖会面"
SFH_meet_with_subhuman_leaders_desc:0 "虽然远乡的非人物种团体并不团结，其纲领从左到右应有尽有，而且缺乏组织性，我们仍然可以找到少数几位名望较高的团体领袖。国王亲自出马或者遣使同这些人单独会面，记录非人物种团体的要求，并将那些经过审查的版本通过媒体告知公众。这样一可以方便公众对非人物种团体有所了解，二也可以暂时安抚那些情绪激动的非人物种叛乱分子，我们必须展现出友好的一面，后续的谈判才有可能进行。"
SFH_full_citizenship:0 "完整公民权"
SFH_full_citizenship_desc:0 "根据我们先前的计划，在南远乡地区情况安定后，我们需要着手准备非人物种在远乡国内的公民权问题。当然，这并不意味着我们将大举融合麟人和其它物种的社群——实际上，这部分大概会在很长一段时间内保持不变。不过，我们仍然可以从法律上赋予非人物种近乎麟人的权利，包括允许他们参与政府，政治活动，或是享受麟人公民的合法权益等。"
SFH_step_by_step:0 "循序渐进"
SFH_step_by_step_desc:0 "虽然我们确实许诺给一部分非人物种完整的公民权，可这并不意味着我们有义务大动干戈地帮助他们适应远乡社会。无论是从社会的角度，还是经济的角度来看待这一问题，我们最好都不要在法律改革已经造成掀然大波的情况下再进一步扰乱局势。众多麟人对非人物种的看法也不是一天两天养成了，整个市场也从未想过要为人类以外的物种服务，转型必然需要时间，我们应当循序渐进地做。"
SFH_ethnic_minority_law:0 "少数种族法"
SFH_ethnic_minority_law_desc:0 "新的少数种族法规范了远乡各地的市场和社会活动，通过列举法规强制禁止了经济活动与社会活动中，麟人公民违规歧视非人物种的行为是非法的，且将会受到政府机关的起诉。非人物种在过去的几百年里从未参与到远乡社会中来，如果我们希望他们能以平等且安全的形式融入，那像这样，相对激进的安置措施是有必要的。无论如何，我们至少要确保来麟人社会打工的亚人不至于一份最低贱的工作都找不到。"
SFH_reenable_coop_with_mermaid:0 "重启对人鱼合作..."
SFH_reenable_coop_with_mermaid_desc:0 "在先前的危机过后，人鱼在远乡境内的影响力下降了许多。这表面上确实有助于远乡本土产业的发展，可本质上，这依然造成了大量的失业等一系列负面影响。虽然在我们的努力下，这些负面影响得到了一定程度的缓解，可无论如何，简单的拒绝人鱼的任何经济活动会导致不健康的市场。为此，我们可以重启同人鱼的经济合作，这也是为了大家好。"
SFH_but_equal_this_time:0 "...但这次，你我皆平等"
SFH_but_equal_this_time_desc:0 "然而，新生的远乡王国不再是那个卑躬屈膝，愿意签订不平等条约的弱小王国了。这一次，如果人鱼希望同我们展开经济上的合作，那么他们便必须按照远乡王国的规矩来。我们不会为资格不符的人鱼企业提供任何法律之外的优待，同时，任何针对本土麟人职员，劳工的歧视行为都将被市场监管部门或是相关政府部门调查并起诉。"
SFH_maintain_past_policies:0 "维持过往政策"
SFH_maintain_past_policies_desc:0 "在过去的数百年里，我们针对非人物种的政策已经被证明是没有什么所谓的。在绝大多数情况下，麟人在麟人的大城市生活，非人物种就继续在偏远地区过他们的小日子，这样的体系没有造成任何问题——唯一造成了问题的便是社群的融合，而这便是我们需要介入的地方。麟人不需要花时间在帮助非人物种融入远乡社会，相反，我们需要将他们隔离或是驱逐开。"
SFH_allow_subhuman_communities_help_themselves:0 "允许非人物种社区自给"
SFH_allow_subhuman_communities_help_themselves_desc:0 "经过调查，致使非人物种迁徙至麟人社区的很大一个原因便是他们无法在偏远地带实现较低程度的自给自足，或者因为战争，军队驻扎等原因被迫离开故乡。为了实现不同物种之间的隔离，我们可以尝试对他们的自治行为提供些许帮助，单独划分自治区以避免物种之间过多的交流，同时也保证他们可以自己过自己的小日子。对于现有的社群而言，我们可以再次基础上帮助他们实现经济自给，防止过多的与麟人社会的交流。"
SFH_migrate_subhumans:0 "非人物种迁徙计划"
SFH_migrate_subhumans_desc:0 "尽管我们作出了许多隔离的努力，然而，非人物种数量客观上就是很多，而且遍布全国。为了解决这一问题，我们可以组织军事人员专门迁徙这些非人物种，帮助他们移动到我们所指定好的保留地，或者是国外的某个鸟不拉屎的地方。这样的一份计划很可能造成数量庞大的伤亡，强制迁徙过程中的卫生条件，温饱等问题会成为这些伤亡的重要来源…不过，这也是为了大家好。"
SFH_legalize_isolation:0 "规范化隔离"
SFH_legalize_isolation_desc:0 "非人物种的数量客观上就很多，而且遍布全远乡各地，我们显然不可能简单的将他们都瞬移到某个特定的地方。为此，我们需要在各地规范化对非人物种的隔离行为，这包括公共设施使用的隔离，禁止在某些麟人为主的岗位就业，以及居住社区的地理位置划分等等。这可以有效地促进各地的稳定。"
SFH_weaken_mermaid_previlleges:0 "削弱人鱼定居者特权"
SFH_weaken_mermaid_previlleges_desc:0 "人鱼定居者的超国民待遇一直是我们的心头大患，在远乡逐步走向大一统的今天，我们没必要再卑躬屈膝地向这群海里游的作那么大让步。不论是为了平民愤，还是单纯地促进我国经济正常发展，我们都需要确保一点：人鱼们不该在麟人的头上作威作福，他们既然想来我们这儿做生意，那么便必须遵守我们的规矩。至少，也要对东道主怀有最基本的尊重——而不是把我们的宽容当做理所应当。"
SFH_weaken_mermaid_previlleges_tt:0 "人鱼所带来的影响将永久性地追加：\n稳定度：§G+5.00%§!\n政治点数获得：§G+10%§!\n生活消费品工厂：§Y-5.0%§!\n建造速度：§G+5.00%§!"
SFH_but_coop_goes_on:0 "...但合作继续"
SFH_but_coop_goes_on_desc:0 "虽说我们确实放狠话要削弱甚至取消人鱼定居者在远乡境内享受的特权，不过，我们经济上的合作仍然需要继续。无论社会舆论怎么看，从长远来看，更加健康的对外经济合作只会帮助我们的市场走得更远，拘泥于自己的三亩地是无论如何也解决不了问题的——这点我们清楚，而大量依赖在陆地上的经济合作的人鱼政府则更是心知肚明。"
SFH_south_north_unification:0 "统一南北！"
SFH_south_north_unification_desc:0 "在反复谈判，发动军事行动后，我们终于完整收复了北远乡地区。随着我们的政府在当地开始安家落户，现在是时候准备重建工作了。我们需要重新安置新战争或是政治混乱而流离失所的难民，同时连接南北的经济市场，并且在各大城市，经济，工业中心展开新一轮的重建，或是清点工作。要做的事情还有很多。"
SFH_south_north_unification_tr:0 "完全控制除了人鱼特区的北远乡地区。"
SFH_temp_fund_proj:0 "临时救济计划"
SFH_temp_fund_proj_desc:0 "因为北方的政治混乱或是战争，大量的民众失去了他们的故乡，不得不过着颠沛流离的日子。我们需要对此做出一些回音。然而，经济和社会的恢复需要时间，这一点上我们无能为力。因此，我们将准备一些临时的救济计划，这些救济物资包括临时的方便食品，简易的衣物，帐篷和医疗物资等等。希望这可以保护到一部分难民的生命安全。"
SFH_rebuild_local_gov:0 "重组当地政府"
SFH_rebuild_local_gov_desc:0 "先前统治北远乡地区的政府为我们留下了丰富的资料…不过可能过于丰富了。整理这些资料，文书需要我们大量的时间和精力，显然是不合常理的。为此，我们需要重组先前的地方政府，尽可能地将原本就负责管理这些文件的工作人员喊回来，让他们好好处理一下交接工作。同时，尽快重组政府也有助于巩固在各地的统治，终止部分地区的无政府状态。"
SFH_dismental_military_members:0 "解散军事人员"
SFH_dismental_military_members_desc:0 "在我们重夺了北方地区后，先前归顺北方政府管辖的军队的编制仍然处于混乱状态。且不说那些依然老老实实待在军营里的，不少人甚至选择成为土匪，为祸一方。为了解决这些问题，同时促进北方地区的重建和稳定发展，我们需要尽快解散这些军事人员，要么整合到我们的部队来，要么就地解散，各回各家——无论如何也不能让他们拿着武器自由行动。"
SFH_nfh_reconstruction_bill:0 "北远乡重建法案"
SFH_nfh_reconstruction_bill_desc:0 "《北远乡重建法案》涵盖了一系列用于重建北远乡地区的法律措施，这允许我们直接重建地方政府，对难民进行迁移，出资委托建筑公司修复城市等等。在我们漫长的努力与等待之后，现在，我们终于得以着手彻底地将北远乡收回到中央政府的怀抱了！"
SFH_unified_farhome:0 "统一远乡王国！"
SFH_unified_farhome_desc:0 "经过我们的不懈努力，终于，我们实现了远乡国的统一！这是历史性的一刻，更是将会镌刻在远乡王国历史上的关键转折点！随着我们逐步走出前几十年经济混乱，社会动荡的阴影，我们终于可以将目光投向边境之外，在国际舞台上画上浓墨重彩的一笔了。远乡万岁！国王万岁！我们将带领祖国走向更加辉煌的未来！"
SFH_our_new_king:0 "新王登基"
SFH_our_new_king_desc:0 "随着远乡各地局势的稳定，我们可以着手准备处理政治上的变动了。在郑钧几十年的统治里，远乡曾一度跌入万劫不复的深渊，可如今，在国王与公主共同的努力下，我们成功带领王国走向了新的辉煌。然而，郑钧年事已高，他已尽了自己作为国王的最大努力，来保卫这个国家，保卫他的家庭。现在，是时候摘下王冠，将权柄传给新一代了。"
SFH_our_new_king_tt:0 "§C为郑红女王欢呼万岁！§!"
#最终国策#
#军改-海军#
SFH_rebuild_farhome_navy:0 "重建远乡海军"
SFH_rebuild_farhome_navy_desc:0 "海军乃远乡之基石，吾国先祖正是凭借强大的海军，才得以跨过茫茫大海，并在巴斯蒂亚置产兴业。然而，长久以来的腐败和内乱迫使我们从海事产业中撤资，以将资源用在其他“更重要的地方”。而现在，随着我国内外形势的逐渐改善，是时候重启搁置已久的海军计划了，荣耀属于新远乡海军，远乡理应统治海洋！"
SFH_push_for_dockyard_construction:0 "推进船坞建设"
SFH_push_for_dockyard_construction_desc:0 "经济危机对我国的海事产业而言无疑是一记重击，曾经生产着纵横七海的战列舰的码头和干船坞，如今却在为盈利而生产着渔船和邮轮，或者更惨——直接因亏损而被迫歇业。因此，为了重建我们的海军，我们不仅要用源源不断的军工订单重新激发这些造船厂的能力，还要迅速翻修和扩建废弃的旧船坞：这样一来，我们的造舰能力将在短时间内获得提升，并为我们重建海上荣耀奠定基础。"
SFH_invest_navy_academy:0 "投资海军学校"
SFH_invest_navy_academy_desc:0 "我国有着悠久的海军教育传统，巴斯蒂亚最为优秀的海军学校曾经都被我国包揽。然而，长期以来的内外动荡使得我们只能削减海军军费和海军教育费用，并让海军学院维持在可以勉强运行的状态。而现在，为了重建我国的海军，我们将会重新投资海军学院，以帮助他们购置更多先进的教学设备，并跟上目前最为先锋的海军理论：只有这样，我们才能为未来的海军扩充提供充足的高素质人才。"
SFH_recall_retired_generals:0 "召回退伍军官"
SFH_recall_retired_generals_desc:0 "我国有着悠久的海事传统，自然也拥有着一支经验丰富，传承有序的海军军官团：即使我们并未直接参与世界大战，他们的能力还是通过驻外观察团和撤侨行动得到了磨练。然而，经济危机的到来使我们不得不大面积裁撤海军规模，并让这些本应成为优秀舰长和司令的船长们退伍。现在，我们总算有了能让他们施展才干的资源和崭新的舰船，是时候将他们再请回我们的海军队伍了——即使他们的经验已经生疏，他们也会成为优秀的教官。"
SFH_regain_nacy_tradition:0 "重建大海军传统"
SFH_regain_nacy_tradition_desc:0 "遮天蔽日的艨艟战舰一直是我们麟人的荣耀，而我们现在要做的就是重建它！既然现有的国内外环境和技术积累已经足以让我们重建庞大的远洋海军，那为什么我们还不开工呢？当然，在此之前，我们仍有必要重振我国海军早已丢失的精气神：重新恢复旧时代的海军荣衔和海军仪式，将会是我们重建大海军传统的第一步。"
SFH_seaplane_project:0 "水上飞机企划"
SFH_seaplane_project_desc:0 "既然我们的陆军航空部队已经可以与地面部队进行相对复杂的联合作战任务，那么如果我们将相关的经验运用到海上来，情况又会如何？虽然建立专门的海军航空部队的建议在我们的海军军官看来可能还是太过激进了些，但我们可以通过对战列舰的改造，使得战列舰具备发射水上飞机的能力：他们毫无疑问可以成为舰队的侦查好手，如果有需要的话，甚至还能提供一定的对舰火力支援。"
SFH_experimental_carrier:0 "实验性航母开发"
SFH_experimental_carrier_desc:0 "先前的水上飞机试验非常成功，因此我们的海军技术人员已经开始研究进一步利用水上飞机，乃至为其研发专门的投送平台了。如今，我们的海军科学家已经开始尝试对商船的甲板进行改装，以作为所谓的“航空母舰”——一种甚至可以搭载数个中队战机的海上机场——的原型。如果试验成功，那么获得空中侦察支援和近距离攻击支援的战列舰毫无疑问将如虎添翼，这无疑是值得我们重视和投资的项目。"
SFH_advancing_battleship_development:0 "利用老旧图纸"
SFH_advancing_battleship_development_desc:0 "即使是在最为困难的时期，海军部的战列舰研究工作也从未暂停过。而现在，随着我国经济的恢复和海军建设的开展，那些经济危机时期立项，险些消失在资料室里的设计图纸总算有机会转化为新下水的战舰了：虽然他们按照现在的标准来看可能已经有些落伍，但毫无疑问，他们可以填补我国海军青黄不接时的主力舰空白，并保证我们的海军可以跟上其他列强的步伐。"
SFH_giant_cannons:0 "巨舰，更要大炮"
SFH_giant_cannons_desc:0 "战舰很重要，但舰炮更重要：或许我们可以将上个时代的战舰设计拉出来再利用，但十几二十年前的火炮活力很显然已经无法满足如今战争的需求了。因此，在重建我们的战列舰编队的同时，我们也需要将资源分配到海军军备——特别是舰炮的研究上。除此之外，我们也不会忘记舰船装甲和动力设备这些其他舰船设施：只有这样，我们才可以让新建的海上巨兽真正意义上发挥其该有的作用。"
SFH_our_open_ocean:0 "我们的公海"
SFH_our_open_ocean_desc:0 "我国海军的补偿性建设告一段落，崭新的远乡海军已经初具规模。通过对旧世荣耀的追忆和持之以恒的造舰努力，我们虽然离远乡海军的全盛时期仍有一定距离，但新远乡海军已经足以履行从魔兽和敌国海军手中夺下制海权，并在公海上完成力量投送，以及捍卫我国远洋利益的职责。虽然目前仍不是自满的时候，但当我们看着雄伟的战列舰在七海之上广布帝国威仪时，我们仍可以自豪地喊出：“远乡统治海洋！”"
SFH_escort_priority_doctrine:0 "护航优先理论"
SFH_escort_priority_doctrine_desc:0 "尽管遮天蔽日的艨艟战舰一直是我们麟人的荣耀，但有些时候，我们必须现实一些：我国的经济实力很显然无法支撑这样一支庞大的远洋海军，更重要的是，这与我国现在的战略是不相符的：比起将资源投入无底洞一般的海上吞金兽，还是建立一支以保卫我国海岸线和海上贸易为主要任务的海军更为现实。"
SFH_destroyer_blueprint:0 "驱逐舰蓝图设计"
SFH_destroyer_blueprint_desc:0 "海洋魔兽的存在使得如今的商船多多少少都拥有一些自卫能力，因而这也大大便利了我们的驱逐舰设计工作：只需要在武装商船的基础上对蓝图稍作修改，我们就可以迅速生产出一大批小巧灵活，同时足够廉价的新型驱逐舰。这样一来，我们不仅可以在海军青黄不接时维持海军的战斗力，还获得了一支几乎可以马上投入护航任务，从敌方潜艇和魔兽中保护海洋贸易的新生力量。"
SFH_specialize_for_ocean_monsters:0 "对海洋魔兽特化"
SFH_specialize_for_ocean_monsters_desc:0 "海洋魔兽形影难料，一直是远洋贸易的主要威胁。然而，拥有丰富海事传统的我国，已经形成了一套标准化的海洋魔兽应对措施。而在如今，在雷达技术的加持下，我们甚至都不需要和海洋魔兽面对面就可以对他们进行打击。因此我们现在需要做的，就是将先前的对海洋魔兽经验与现代技术结合，并特化为标准化的作战处置流程——这样的话，甚至连我们的武装商船都可以独立应对海洋魔兽，我们就可以将海军资源分配到更为重要的地方上了。"
SFH_submarine_development:0 "潜艇研发"
SFH_submarine_development_desc:0 "“以护航为主的海军”并不意味着“放弃进攻”，而一支以潜艇为主的进攻力量，毫无疑问是我们在现有的条件下最好的选择：虽然潜艇可能并没有巨舰大炮那样光彩，但是潜艇却可以以迅雷不及掩耳之势刺入敌方的运输动脉，而且还是以相对较低的成本：为什么只有我们能被他人偷袭呢？我们将会结合我国现有的设计和外国蓝图，设计出符合我国军事需要的新型潜艇，如果顺利的话可能很快就能投产——在未来，这将会是我国海军进攻性力量的主力。"
SFH_new_mines:0 "新式水雷"
SFH_new_mines_desc:0 "人类使用水雷的历史已经非常悠久，而对于我们目前正在建设的防御型近海海军来说，这一传承自远古的海战武器很显然有了新的用处。我们将会在结合目前的水雷战实践，以及世界各国的水雷技术的基础上，研发出最新式的海军水雷，以满足港口和重要航线布放的需求：一旦有人试图侵犯我国的海疆，那么他们将感受到来自下方的死亡。"
SFH_protect_our_ocean:0 "保卫海疆！"
SFH_protect_our_ocean_desc:0 "我国海军的补偿性建设告一段落，崭新的远乡海军已经初具规模。尽管曾经在七海之上称霸的远乡舰队已经成为了历史，但我们还是通过有效地分配和利用现有的资源，以及及时地吸纳新的战略战术思想，走出了一条新路：虽然我们的海军可能不再拥有巨舰大炮，但是精干的小型舰队和潜艇仍足以为我们的敌人带来死亡，并保障帝国的海疆安宁无虞：我们不再能统治海洋，但我们必将保卫吾国海疆！"
SFH_purchase_foreign_navy_blueprints:0 "购置外国海军图纸"
SFH_purchase_foreign_navy_blueprints_desc:0 "我们先期的技术储备足以让我们的海军快速形成战斗力，但光凭先前的遗留无异于闭门造车：所幸，并非只有我们因为经济危机的打击而选择减少海军投资，不少海外的潜在卖家也因为经济问题表达出了出售海军技术的意愿。现在，随着我国的经济逐渐步入正轨，我们也可以从这些海外卖家手中购置最新的海军图纸，并运用在我们自己的设计里。"
SFH_further_expand_navy_industry:0 "进一步扩张海军工业"
SFH_further_expand_navy_industry_desc:0 "我们的海事军工复合体建设已经初具成果，国内的主要造船厂都已经重现了他们全盛时期的建造能力。因此，是时候将扩张的重点放在造船业的配套行业上了：在进一步扩张我国造船厂的同时，我们也会将资源侧重于其他与海军工业相关的军工部门，例如舰炮和弹药的制造，最终再以此为基础，建成完备的海军工业体系。"
#军改-空军#
SFH_rebuild_farhome_airforce:0 "重建远乡空军"
SFH_rebuild_farhome_airforce_desc:0 "回忆上次世界战争期间，飞机的出现真正的让我们的双脚第一次离开地面，同时这一庞大的空中机器也表现出无与伦比的战争潜力。但同时随着战争的失利，财政的崩溃，如今王国所谓的空军如今只剩下空洞的躯壳。随着王国的复兴，空军的整顿势在必行，是时候让大地重新笼罩在机翼的阴影之下了。"
SFH_build_airports:0 "推进机场建设"
SFH_build_airports_desc:0 "由于此前连年的经济危机导致军队的经费一而再再而三的削减，远乡现有的空军机场设施因得不到维护破而旧不堪加。之上一次大战中被战火重创，现在我们急需重建这些军事设施来容纳新生的王国空军。即便最近的改革让我们的国库捉襟见肘，但这些对于新生的空军来说是必不可少的设施，我们再怎么样也应该再挤出一些经费。"
SFH_invest_airforce_academy:0 "投资空军学校"
SFH_invest_airforce_academy_desc:0 "空军自建立以来从来没有关于自身的系统化建设，早期我们只是单纯的认为那些大家伙只是陆军进攻的辅助，陈旧的思想在战争后期让我们受尽折磨，着手建立独立空军军种的计划油然而生。要想组建一支真正意义上的空军，光有那精致的战争机器是不够的。为此，首要的目标便是建立一所专门关于空军的军事学院，自此空军正式成为保卫王国的一股新力量。"
SFH_old_brings_new_theory:0 "以老带新理论"
SFH_old_brings_new_theory_desc:0 "培养一个飞行员的成本需要长时间的训练，但对于军队来说实战是最好的老师。老兵自然是教导新兵的不二人选，他们有着丰富的经验和经历，能够更好的帮助新兵蛋子在死于不明火力点之前至少能让他们活着走出教室。在这些陆地上的旱鸭子步入蓝天前，他们还有些许多事情要做呢。"
SFH_arial_advantage_and_bombing:0 "空中优势与轰炸"
SFH_arial_advantage_and_bombing_desc:0 "空中突击作战的实质，是通过快速的空中兵力与火力机动，形成战役布势空间和局部力量对比的优势，以地空一体的兵力、火力直接打击敌方要害，进而影响全局、夺取胜利。而空中轰炸就是通过持续不断的长时间袭扰，摧毁敌人战争潜力以及工业能力。同时不仅仅是袭击军事目标，即军队、军事基地、军事设施等，而且对后方的生产设施、交通机关,甚至包括一般居民区,也都进行彻底的攻击,其目的是为了全部摧毁对方国家进行战争的能力,使敌国政府和国民丧失继续战斗的能力"
SFH_bomber_research:0 "轰炸机研发"
SFH_bomber_research_desc:0 "多用途的双引擎轰炸机在执行各种各样的任务时出色的表现，在上一次世界大战中就已经引起了参谋部的注意，为了某些任务而特化的机种似乎能为任务带来更好的效果。大航程大载弹，低空高速飞得稳，需要更好的观测和瞄准，以及对敌方纵深目标实施突击所需要的大弹药量。多家军备公司都已开始围绕着自己对于轰炸机的理解对下一代的轰炸机的研发和迭代开始角逐。而我们只需要最好的那一个。"
SFH_strategic_bomber_design:0 "战略轰炸机设计"
SFH_strategic_bomber_design_desc:0 "远程轰炸的意义在于，即便是那些我们火炮所不及的地区，也能破坏敌军的后勤产能，摧毁其生产线，基础设施，以及民众对于战争的信心，有了重型轰炸机就能一举摧毁敌人的士气和工业生产能力。战略轰炸机是飞机设计上的创新，他们优越的载弹量和航程距离成为敌后打击目标的绝佳选择，有关他们的设计和研发正在有条不紊的进行中。"
SFH_heavy_fighter_research:0 "重型战斗机研发"
SFH_heavy_fighter_research_desc:0 "随着战略轰炸机研发的进行随之而来诞生出一个新的问题，普通的战斗机因为航程原因无法长距离掩护轰炸机的行动，在没有战机的掩护下行动，这无异于是将我们的轰炸机编队送入虎口，为此我们需要一个新的选择，重型战斗机显然就是一个不错的想法，在牺牲机动性的基础上满足我们的一切条件，更强的火力，更远的航程，更多的防护，有了这些飞机的保护相信能击退所有前来阻挠的敌机。"
SFH_long_range_flight:0 "长距离飞行"
SFH_long_range_flight_desc:0 "飞机的发展宛如神速，普通的飞机没法满足战略轰炸机的航程从而有效的护航，为此提高飞行航程从而研发出新型的重型战斗机。但同时，超长距离的飞行对飞行员也是一种考验，为此我们需要对此进行专门的特训。同时我们也不能忽视在长距离飞行中可能出现的各种情况，我们需要各种新式配套设施，以及理论建设，从而更好的对敌方战线后方的行军纵队、后勤纵队、交通枢纽、补给节点、指通站点等进行打击以降低敌方地面部队作战和运作效率"
SFH_burn_to_the_ground:0 "将一切夷为平地！"
SFH_burn_to_the_ground_desc:0 "要知道，扔炸弹也是一门技术。花费了如此之多的精力我们成功的将王国的空军提升到了前所未有的地步。至此空军不再是陆军的从属，远乡的飞行员们将和海军和陆军的兄弟们并肩作战，执行同一个任务—将残忍带给所有敌人！从现在开始，所有与我们为敌的人将会知道何为恐怖，他们的土地，他们的国家将永世生存在被那灰暗的双翼掠过的天空，他们将会永远记住空中那一个个恐怖的身影，所有的一切都将化为灰烬！"
SFH_landforce_support_first:0 "陆军支援优先"
SFH_landforce_support_first_desc:0 "总参谋部相信，航空兵存在的主要作用就是为陆军的行动提供帮助和支援，航空兵团的任务在于辅助陆军，支援地面部队或海上部队作战，对距离己方部队较近，直接影响己方部队在当前行动的目标实施空中突击。以火力摧毁、压制、破坏、牵制、瘫痪或迟滞敌方部队，并支援配合己方部队的作战行动，毕竟我们的敌人在地面上，不是吗。"
SFH_support_plane_designs:0 "支援机设计图"
SFH_support_plane_designs_desc:0 "因为早期对于支援机的理解过于肤浅，我们现有的对地支援机无论是设计还是性能都太过老旧，很难想象在上次世界大战期间我们居然把飞机上装上几挺重机枪的飞机成为支援机。随着观念的改变和技术的迭代，我们有能力设计出更加符合当前战争需要的近地支援机，为此我们需要开发一款新型机型来满足我们对于空军的要求。"
SFH_improve_light_machine_gun:0 "轻机枪优化"
SFH_improve_light_machine_gun_desc:0 "飞机由于防护性更好，要想有效杀伤敌机往往需要更大的口径的武器，但巨大的口径带来的除了肉眼可见的威力以外，同样也带来了肉眼可见的重量。过高的重量会严重影响我们在空中的机动性。除此以外，另外一些十分轻便但威力不足的机枪也必须进行撤换和迭代，因此必须设计出既能有足够的威力又不会影响飞机机动的武器，从而满足近地支援的扫射和压制的任务。"
SFH_light_fighter_design:0 "轻型战斗机研发"
SFH_light_fighter_design_desc:0 "要想配合陆军，对敌近地支援进行火力压制的前提是，我们能压制敌军的战斗机。只有这样才能让我们的飞机肆无忌惮的轰炸，为改进战斗机的性能，简化和去除不必要的配件既能节约成本又能赋予飞机更高的机动性，同时我们也应该试着给飞机假装上一些近几年才发明出的新东西—雷达。虽然这东西造价不菲，但为了空军的复兴这些代价是必要的。"
SFH_to_ground_weapon_research:0 "对地武器研发"
SFH_to_ground_weapon_research_desc:0 "地面支援是航空兵优先目标。但随着时间的流逝，地面目标不再是几十年前的单一要塞战壕，以及成群的步兵了，除了大量的传统目标外，我们还需要轰炸各式各样的例如机场，道路，桥梁，电波塔等多样化的目标，单一的武器很难针对特种目标造成伤害。因此必须要开发专门的对地武器，包括炸弹，机炮，空中地雷等等。通过一系列的改良能让他们在更加便捷的情况下可以对敌人造成更大的伤害，但由于经费有限，我们只能把有限的资源都投入到必须更加适合杀伤陆的方向进行改进。"
SFH_air_riders:0 "空中骑士"
SFH_air_riders_desc:0 "大刀阔斧的改革终于带来了成效，各式各样的新式武器翱翔在蓝天之上，同时各类新型战术也粉墨登场。很多人将空中的搏斗形容为“新时代的骑士对决”，战争是一种艺术，这一点在现在的空中尤为明显，而我们将会是这一场“世界艺术大展览”的最终赢家，大人！时代没变。"
SFH_purchase_foreign_airforce_blueprints:0 "购置外国飞机图纸"
SFH_purchase_foreign_airforce_blueprints_desc:0 "远乡空军尚且年轻，对于飞机的制造还有很多认知上的局限，无论是在飞机的飞行动力，亦或是外置火力等方面都无法满足目前军队的需要。设计一款真正属于我们的飞机是至关重要的，但远乡军队的科技水平已停滞许久，虽然很不愿意承认，但目前而言，他国的飞机设计显然要更胜一筹。然而，落后只是暂时的，这些飞机的设计图能有效地帮助我们获得这变革的第一步的经验。"
SFH_further_expand_airforce_industry:0 "进一步扩张航空工业"
SFH_further_expand_airforce_industry_desc:0 "我国的航空工业依然停留在古早的水平，原因包括早期经验不足，战争的摧残，其中许多工业设施一度处于损坏状态。我们需要在此基础上重新扩张我们的航空工业，旧有的配套设施没法满足我们空军目前的需要，恢复空军的荣光不仅需要大量的飞机和飞行员，还需要大规模生产以及后续维护和研发能力，因此，我们应该建立全套的完整的航空工业。"
#外交#
SFH_legacy_of_east_bastia_war:0 "东巴大战的遗产"
SFH_legacy_of_east_bastia_war_desc:0 "多年前的东巴大战仍历历在目。在世界大战造成的经济危机后，尚且没能恢复过来的远乡王国又一次遭到了来自沃姆帝国等一众狗腿子的联合围剿。这些贪婪而无耻的侵略者践踏了远乡的尊严，抢夺了我们的土地，并将曾经麟人最后的一丝脸面也打得破碎…如今的我们已然焕然一新，为了实现国家的真正统一，也为了重新让麟人振作起来，我们必须开门出击，夺回我们的领土！"
SFH_for_everything_we_lost:0 "我们所失去的一切..."
SFH_for_everything_we_lost_desc:0 "为了应对今后我们所要处理的外交事务，我们已经将这一系列内容单独整合进入统一部门的管辖。在过去的几十年里，远乡王国失去了很多——除了那些“显而易见的”，领土，钱财云云，更多的还是精神上的损失。当一群麟人意识到自己的国家不再是，像持续了数百年的那样，东巴斯蒂亚的霸主国家之一，那他们会怎么想呢？当或许不可避免的战争到来之际，我们会动员起来，为失去的一切而战。"
SFH_crime_of_dunn:0 "顿恩之罪"
SFH_crime_of_dunn_desc:0 "随着东巴大战愈演愈烈，急切退出战争的我们不得不选择向我们一方割让了西北地区的三个省份。自打签署协定的耻辱之日开始，我们从未忘记过要夺回这片土地。邪恶的沃姆人从未把我们所割让的宝贵国土当回事——他们只是把它视作一个跳板，一个分裂他们自己人，离间戈尔维亚王国的愚蠢借口。那所谓的顿恩骑士团无非就是一个该死的军政府，他们对自己人都毫无怜悯，更别说居住在当地，无辜的麟人了！我们将结束这一切，终结他们的罪孽。"
SFH_asking_for_northwest_territory:0 "索取西北领土"
SFH_asking_for_northwest_territory_desc:0 "这一天终于到来了——我们将向仍然掌握着我国西北被夺走地区的领土的政权发送最后通牒，无论他们究竟是谁。任何妄图继续破坏远乡国统一的外国侵略分子都会是我们的敌人，如果他们不想让步，那我们的军队将会代劳。"
SFH_asking_for_northwest_territory_tt:0 "解锁决议：§Y向外国索取西北地区领土§!"
SFH_marching_for_northwest:0 "向西北进军！"
SFH_marching_for_northwest_desc:0 "外西北地区本就是我国的领土，虽然时隔多年，可我们仍然掌握着当地的详细资料，同时可以轻易地指定最适合的进攻的计划。随着我国已经准备开始向外西北地区的持有者发动进攻，新的战争计划指定也可以被摆上台面。让我们把部队动员起来，从外国侵略者手里夺回属于我们的领土！"
SFH_fix_the_countryside:0 "修复乡镇机构"
SFH_fix_the_countryside_desc:0 "在我们失去的外西北三省中，绝大多数居民都生活在相对落后的乡村地区。很显然，沃姆的入侵者并没有善良到愿意改变这一现状。随着当地多次成为冲突先前，各地本就破旧，孤立的乡镇聚落遭到了更进一步的破坏。我们需要对此做出一些回应，首先要做的便是修复因战争而遭到破坏的乡镇机构，随后重组当地政府。"
SFH_help_dun_immigrants:0 "帮助顿恩移民"
SFH_help_dun_immigrants_desc:0 "尽管我们确实是作为麟人的解放者占领了西北三省，可当地也并非只有我们的同胞。无论是从古代开始就生活在边境地区的戈尔维亚人，还是后来因某些计划专门前来当地定居的移民，我们都有必要考虑到他们的生活起居。简单的驱逐政策在人数面前可行性较低，我们得做点什么帮助这些移民融入当地生活。"
SFH_integrate_northwest_border:0 "整合西北边疆"
SFH_integrate_northwest_border_desc:0 "随着我们初步完成了地方政府的重建，是时候着手推进西北三省的再整合活动了。我们会确保外国的邪恶影响从我们的领土上尽可能的消失，同时保证未来我们对这些土地的领导权。"
SFH_integrate_northwest_border_tt:0 "§Y将解锁外西北地区的造核决议！§!"
SFH_greedy_gilania:0 "吉拉尼亚的贪婪"
SFH_greedy_gilania_desc:0 "吉拉尼亚王国不可谓不是东巴斯蒂亚最为奇特的政权，不知有多少奇特的传说都曾在那里上演——可这并不是我们需要考虑的问题。文化上的所谓“浪漫”在国仇家恨面前不值一提，贪婪的吉拉尼亚王国站在了东巴大战的侵略者一方，并且夺走了我国的合法领土，这都是不争的事实。为此，我们必须采取行动反抗。"
SFH_asking_for_southwest_territory:0 "索取西南领土"
SFH_asking_for_southwest_territory_desc:0 "这一天终于到来了——我们将向仍然掌握着我国西南被夺走地区的领土的政权发送最后通牒，无论他们究竟是谁。任何妄图继续破坏远乡国统一的外国侵略分子都会是我们的敌人，如果他们不想让步，那我们的军队将会代劳。"
SFH_asking_for_southwest_territory_tt:0 "解锁决议：§Y向外国索取西南地区领土§!"
SFH_marching_for_southwest:0 "向西南进军！"
SFH_marching_for_southwest_desc:0 "外西南地区本就是我国的领土，虽然时隔多年，可我们仍然掌握着当地的详细资料，同时可以轻易地指定最适合的进攻的计划。随着我国已经准备开始向外西南地区的持有者发动进攻，新的战争计划指定也可以被摆上台面。让我们把部队动员起来，从外国侵略者手里夺回属于我们的领土！"
SFH_calculating_remaining_assets:0 "清点遗留资产"
SFH_calculating_remaining_assets_desc:0 "相比起外西北地区，我国的外西南四省地处沿海大平原，人口，工业发展等一系列指标要更加优秀。尽管在大战结束后，我们尽可能地将我国资产从当地撤出，可这只是杯水车薪——多数资料，工业器械，研究成果都落入了吉拉尼亚人的手中。我们需要尽快完成对剩余资产的清点工作，同时也可以对吉拉尼亚人在当地的投资进行调查。"
SFH_dealing_with_local_people:0 "解决当地移民"
SFH_dealing_with_local_people_desc:0 "在国家的帮助下，许多吉拉尼亚移民前来我国西南四省定居。我们当然不可能说是一刀切地将他们驱逐出领土外，可这样庞大的新人口群体是不可能在短时间内融入远乡社会的。为此，我们的地方政府机构需要介入应对当地的移民问题。在部分遣返到境外的基础上，也帮助一部分人在远乡安家落户。"
SFH_integrate_southwest_border:0 "整合西南边疆"
SFH_integrate_southwest_border_desc:0 "随着我们初步完成了地方政府的重建，是时候着手推进西南三省的再整合活动了。我们会确保外国的邪恶影响从我们的领土上尽可能的消失，同时保证未来我们对这些土地的领导权。"
SFH_integrate_southwest_border_tt:0 "§Y将解锁外西南地区的造核决议！§!"
SFH_declare_complete_reunification:0 "宣告国家完全统一！"
SFH_declare_complete_reunification_desc:0 "自打东巴大战结束，远乡王国的分裂已持续了数十年之久，这对于任何一个主权国家而言，都是绝不能容忍的惨剧。在无数个痛苦的日夜后，在远乡王室英明的带领下，在国王郑钧，女皇郑红，还有无数麟人子女的齐心协力下，我们带领远乡走出了过去的阴霾，并一点一滴地，将我们最后所失去的领土也夺了回来！\n\n随着最后一点领土也重新被我国征服所控制，我们可以自豪地声称，远乡王国实现了真正的再统一！我们会向世界发出属于麟人的声音，任何一个邪恶的外国势力，都绝不能再侵犯我们的主权。现在，是时候把目光投向远方，为远乡的未来大展宏图了。"
SFH_declare_complete_reunification_tr:0 "控制所有失去的领土！"
SFH_declare_complete_reunification_tt:0 "这允许我们执行§Y改革国策树§!！"
SFH_marching_for_expansion:0 "走向扩张之路"
SFH_marching_for_expansion_desc:0 "远乡欲要发展，则必须对外扩张。过去几十年的经验已经表明，在时代风云变幻的当下，任何一个国家都不可能独善其身——一成不变只会引来灭亡，为了远乡的未来，我们必须改变过去的和平主义政策。沃姆帝国以及无数新兴势力的崛起已经证明，那些能跟上时代潮流的国家将会风光无限，而落后的老顽固只会落得国破人亡的下场。我们会走上扩张的道路，将老祖宗放弃了数百年的扩张精神重新找回来！"
SFH_marching_for_expansion_tt:0 "§O这意味着战争。\n尽管如此，在时局风云变化的当下，这或许会是远乡称霸最后的机会。§!"
SFH_promoting_expansionism:0 "宣扬扩张主义"
SFH_promoting_expansionism_desc:0 "事实上，我们的祖先恰好是一批相当具有扩张主义精神的伟大先驱者。为了证明故国的强盛，他们不远万里抵达了巴斯蒂亚大陆，甚至还在这里建立了远乡这样伟大的国度。随着时间的流逝，后人仅仅铭记前人的努力，却忘却了他们实现如此成就的精神，多么可悲！我们将重新拾起这份精神，叫远乡的子民不要忘却百年前那个荣耀的时代，以及我们即将可以开拓出的崭新的未来。"
SFH_encouraging_pioneering_spirit:0 "鼓励开拓精神"
SFH_encouraging_pioneering_spirit_desc:0 "发达的现代科技允许文明的脚步踏遍世界上的绝大多数地域，然而，这世上仍然有许多我们尚不曾见过的未知。遥想当年，麟人祖先满怀一腔热血，跨越海洋来到如今的这片大陆——他们的存在正是这份开拓精神绝佳的表现。我们不能忘记这一点。在未来的扩张活动中，我们必将进一步扩大麟人的影响力，让远乡子民的脚步踏遍全世界！"
SFH_invest_military_industries:0 "投资军工产业"
SFH_invest_military_industries_desc:0 "为了实现扩张的远大理想，军工产业的扩张会是必然也必须的。通过政府预算拨款和相关土地政策的变动，我们得以快速地推进几家新兴军工企业的发展。长久来看，这将大大利好我国的军事发展。"
SFH_reinforce_soldier_training:0 "加强军事训练"
SFH_reinforce_soldier_training_desc:0 "随着我国军工体系的完善，科研系统的不断突破，我们已经初步和外国实现了军事领域的持平甚至部分超越。在这基础上，部队本身的军事素养就显得极其重要了。尽管我们在过去已经在指挥领域做了大文章，可很多时候，士兵本身的军事素养却惨遭忽略。现在是时候推出新的训练规格，加强各地部队训练了。"
SFH_fight_for_the_future:0 "为未来而战"
SFH_fight_for_the_future_desc:0 "曾经的我们为了保家卫国，抛去了我国赖以为生的“剑”，试图用些许“不那么重要”的让步来换得曾经那“宝贵的和平”。历史已经证明，我们错了，大错特错。在如今的巴斯蒂亚大陆，一昧地让步只会让邪恶的外国侵略者赚得盆满钵满——当麟人花了数十年舔舐战争的伤口时，那些该死的外国佬在做什么？我们依然吸取教训。为了远乡国，还有它千千万万麒麟子女的未来，我们必须拾起曾经抛弃的“剑”，打开国门，让他们再也不敢把我们踩在脚下！"
SFH_fight_for_the_future_tt:0 "解锁决议：§Y入侵东巴诸国领土§!"
SFH_our_influence_range:0 "我们的势力范围"
SFH_our_influence_range_desc:0 "在过去，我国的外交思路往往是“点到为止”。即便是在扩张情绪最为浓厚的北进运动时期，出现在北方的也不过是少量麟人定居者和大量的行商。在数百年前，我国的大致疆域确认后，远乡似乎再无对外扩张的欲望，而多数政府都不约而同地选择避免过度的对外干涉。在今天，我们会为这一趋势画上句号。对于新世纪的霸主国家们而言，无论信仰何种意识形态，无论采取何种政体，一昧地孤立似乎已经证明了必然的失败。我们将打开国门，在东巴斯蒂亚寻找我们的盟友——在必要时候，甚至动用武力——以此建立属于麟人的势力圈，属于远乡的阵营，一个能让我们在国际舞台上真正发声的有力渠道。"
SFH_our_influence_range_tt:0 "§Y这意味着在国际舞台上扮演更积极的角色。\n假如我们希望避免战争，同时又不希望国家衰弱的惨剧再现，这或许会是最佳的选择。§!"
SFH_invest_trade_companies:0 "投资外贸企业"
SFH_invest_trade_companies_desc:0 "在过去的几百年里，麟人在商业上的名誉响彻整个东巴斯蒂亚大陆，从白洋海岸到修卡利翁同盟的荒漠，从北方的严寒之地到南方群岛温暖的阳光下，到处都能看到麟人商业团体的身影。商业活动曾是我们扩大对外影响力的一个重要渠道，可如今却随着国家的式微而慢慢消散。我们不应该抛弃这一优秀的传统，政府应当出资重新鼓励对外的商业活动。"
SFH_keep_friendly_gesture:0 "维持友善姿态"
SFH_keep_friendly_gesture_desc:0 "在如今的国际舞台，许多侵略主义的国家都喜欢摆出一副咄咄逼人的态度应付其它政权。这或许在某些情况下确实符合部分民粹主义者的喜好，可却是大大不利于国际合作关系发展的。我们会认真摆出一副友善的外交姿态，欢迎任何愿意同我们保持合作关系的非激进国家前来善谈未来的商业，文化交流事宜。只要在不侵害远乡国家主权，麟人利益的基础上，我们可以对很多事物都持开放态度。"
SFH_ideology_war:0 "意识形态战争"
SFH_ideology_war_desc:0 "哦，激进主义，社会的毒瘤！虽然我们对多数合作协议持开放态度，但激进主义——无论是那些社会主义者，还是右翼激进分子，他们的存在本身都是对我们政权存续的一大威胁。或许他们在现在无法直接威胁到我们的统治，可他们对人民的欺骗也是我们所不情愿看到的。我们应当进一步地巩固我们自身的统治，同时也将这份精神传播到国家之外，让其它政权领导人也加入到这份行列中来。"
SFH_encourage_market_expansion:0 "鼓励市场扩张"
SFH_encourage_market_expansion_desc:0 "为了进一步扩大我国在国际舞台的影响力，除了政府层面的合作，还应当鼓励我国公民对于市场的投入。在文明的现代社会，我们选择了经济，而不是暴力，这样一条和平且真正有利于国家发展的道路，从而扩张我国在全球各地的影响力。任何无法适应这一趋势的人都会错失巨大的良机——而我们会尽可能确保多数人理解这一点。"
SFH_reinforce_border:0 "巩固边疆"
SFH_reinforce_border_desc:0 "随着我们在经济建设，外交等多个领域的投入逐渐获得回报，同时也成功促进了社会一些方面的变革，是时候开展我们真正的计划了。我们将把远乡的声音传播到整个东巴斯蒂亚，同时，也要保卫我们的国家，团价起来，抵制激进主义的危害！在下一阶段的外交计划中，我们可以加深与某些关系已经较为良好的国家的合作；或者，我们也可以对那些饱受激进主义荼毒的国家发动解放战争，进一步扩张我国的影响力。远乡必胜！"
SFH_reinforce_border_tt:0 "解锁决议：§Y解放东巴诸国§!\n解锁决议：§Y邀请东巴诸国加入阵营§!\n§Y将在所有边境地块建造一级堡垒。§!"
SFH_marching_for_isolationism:0 "走向孤立主义"
SFH_marching_for_isolationism_desc:0 "过去几十年国际舞台的混乱已经证明了这个时代的不稳定性，每当远乡试图将自己的双手伸向过远的其它地区——北巴斯蒂亚，又或者东巴斯蒂亚诸国内部事务——结果往往是惨痛的。麟人已经不愿再继续为毫无意义的外国事物白白流血。我们过去几年的内部建设已经被证明是有效的，走向孤立主义的选择或许意味着许多牺牲，可毫无疑问，它能够更好的保护远乡，保护她的子民。"
SFH_marching_for_isolationism_tt:0 "§C这意味着退出国际舞台。\n这确实允许我们主动地避免国际冲突，可当风暴执意来临时，再好的舵手也无法闪躲。§!"
SFH_build_up_bunkers:0 "筑起堡垒"
SFH_build_up_bunkers_desc:0 "为了保卫我们的祖国免受外国侵略者的伤害，防御计划已经被提上日程。或许我们能主动地避免挑起和外国的争端，可永远要为最坏的情况做打算，当侵略者来临时，他们可不会在意我们对国际事务作何感想。我们将在边境上筑起堡垒，从而进一步完善我国的防御计划。"
SFH_build_up_bunkers_tt:0 "§Y将在所有边境地块建造三级堡垒。§!"
SFH_focus_domestic_development:0 "聚焦国内发展"
SFH_focus_domestic_development_desc:0 "政府的投资应该面向谁？是外国商人，还是我们的子民？答案毫无疑问是后者。我们会进一步减少跨境商业合作，发展项目的规模，将更多资金和资源转移到国内反哺远乡子民。这或许会在短时间内造成一定的混乱，可总的来说，对于我国内部的各方面发展而言，是大有裨益的。"
SFH_naval_defence_theory:0 "海上防御理论"
SFH_naval_defence_theory_desc:0 "远乡两面环海，在海军科技日新月异的今天，我们必须为可能的海上入侵做好准备。以驱逐舰，海上鱼雷为主的设计思路已经得到海军部门的认可，在政府的大力投资下，相信我们很快会得出一份较为满意的成果。速度较快，制造相对简易，但同时又火力不弱的驱逐舰会成为岸防的一大有力助手；而连绵的鱼雷也将为我们的敌人制造一片“死亡海域”。"
SFH_encourage_immigrants_come_back:0 "鼓励侨民回迁"
SFH_encourage_immigrants_come_back_desc:0 "麟人在世界各地都有相当数量的侨民团体，有些以商业活动为主，有些则维持了较大的规模，甚至逐渐改变了当地的主流文化。他们所持有的资源，知识都会成为远乡未来发展的一大巨大助力；同时，在远乡走向孤立主义的当下，我们也希望尽可能吸引侨民回国，从而保持麟人社会的完整性。"
SFH_always_stay_alert:0 "戒心永存"
SFH_always_stay_alert_desc:0 "那些该死的外国侵略者为我国社会带来了不知道多少苦难！尽管如此，我们也不会被复仇主义所蒙蔽双眼。和平与独立是千百年来远乡传统的一大传承，我们不能让它断在这一代。然而，曾经的我们太过天真，对外国自私自利的混账们抱有了不切实际的期待，在和平与所谓的“繁荣”中迷失了自我。这一切都将在今天结束。我们将永远怀有戒心，铭记一点：非我族类，其心必异。"
#最终种地-左线#
SFH_cheer_for_freedom:0 "为自由欢呼！"
SFH_cheer_for_freedom_desc:0 "终于，我们完成了全面的内部改革，同时确保了国家的完整性！女皇郑红已经开始准备国家的下一阶段改革，君主独裁政府将会成为过往烟云，取而代之的则是由皇室和议会共同执政的新政府。让我们为自由欢呼吧！"
SFH_cheer_for_freedom_tt:0 "§C随着国家实现统一，人民生活富强，政府体制稳定而自由，多数改革得到落实，我们终于走出了过去的阴霾。\n这并不容易，可也并非无法企及之事。现在的我们得以放手准备下一阶段的变革。作为新上任的女皇，郑红会带领远乡走向新的未来。§!\n§Y自由的未来。§!"
SFH_towards_future:0 "走向未来"
SFH_towards_future_desc:0 "在先王郑义时期，远乡政治改革的巨大失败一直是我们所无法忘却的悲痛过往，它不但标志着远乡国与主流国际社会的撤离割裂，还标志着我国政府全面失去威信的关键转折点。然而，这一切都被我们所成功逆转了。在如今的远乡，麟人从未为自己的祖国感到如此自信！我们成功完成了政治，经济，社会乃至军事上的改革，取得了针对周围诸国的战争胜利，对内实现了国家统一，对外则重新让远乡成为了国际舞台不可忽视的一股强大力量。接下来，便是我们所要做的最后一步。女皇郑红会执行她代表绝对君主制政府的最后一阶段改革，在这之后，长久以来的君主独裁政府将会正式结束，远乡的权柄将由皇室和议会共同接过！我们会带领远乡走向崭新的，自由的未来！"
SFH_towards_future_tt:0 "获得修正：§Y走向未来§!，其效果为：（稳定度：§R-10.00%§!，政治点数获得：§G+10%§!，生活消费品使用：§Y+5.0%§!）。"
SFH_focus_on_livelihoods:0 "注重民生"
SFH_focus_on_livelihoods_desc:0 "虽然我们过去几年的改革取得了前所未有的伟大成就，麟人的生活水平普遍仍然处于世界较差级别。我国贫富差异极大，各地现代化水平也并不理想。为此，我们必须做点什么。政府会调用新的拨款来推进社会稳定，同时削减军队的规模，放宽征召标准。这想必价格不菲，同时进一步削弱我国的军事化程度。不过，比起远乡子民的生活质量，那点损失又算得了什么呢？水能载舟，亦能覆舟，我们发动战争，动员经济是为了国家的未来，当它不再被需要时，那它便可以被抛弃。"
SFH_focus_on_livelihoods_tt:0 "§Y走向未来§!追加效果：\n稳定度：§G+5.00%§!\n战争支持度：§R-10.00%§!\n政治点数获得：§G+5%§!\n适役人口修正：§R-10.00%§!\n生活消费品使用：§Y+5.0%§!\n每月人民生活水平点数增长：§G+2§!"
SFH_advance_social_secure:0 "推进社会保障"
SFH_advance_social_secure_desc:0 "对于普通的麟人老百姓而言，一生最大的追求是什么？对于多数人而言，无非便是求一个“安身立命”，度过平安的一生罢了。回望过去，那些能真正实现安宁的王朝既不是在某些领域实现了巨大创新，也不是对外军事上取得重大胜利了——真正实现了国泰民安的王朝都是能保障自己子民基本生活的王朝。福利制度，社会保障等概念在这个世界上并不新鲜，可苦于工业化时期的冲击和后来的众多混乱，远乡一直没能在这点上取得什么实质性的进展——直到我们开始的改革。随着国家发展进入到新阶段，我们应当延续这一发展，进一步推进社会保障制度的完善。"
SFH_reform_educational_system:0 "改革教育体制"
SFH_reform_educational_system_desc:0 "教育是立国的根本之一，这话可能说的有些重了，但绝对有它的道理。远乡的教育体制一直以来严重依赖各地私人创办的“学堂”，“私塾”一类，符合国家标准的正儿八经的“学校”尽在少数大城市有所开办，除去那些由私人赞助的昂贵学院，大多教学质量也不甚理想。我们虽然可以赞助部分学院的开办，可这终究无法彻底解决问题。在中央政府的领导下，我们会开始规范化一份用于全国的新教育体制，要求各地政府开办基于中央决策规划的小学，初中，高中以及大学，同时完善升学途径，确保更多的人至少可以完整接受基础教育。"
SFH_fund_environment_improvement:0 "出资改善环境"
SFH_fund_environment_improvement_desc:0 "由于对魔矿的开发以及工业发展，我国长久以来多环境保护的需求很高，可实际投入却微乎其微。虽然仅从工业发展这点来看，对自然造成的污染相较全国范围而言，规模并没有大到需要让我们担心。然而，随着魔法工业的发展以及对魔矿相关产业的开发，出于对工业附近居民的生活环境，以及对能否可持续开发议题的担忧，我们必须对此投入一定的资源。这也是为了大家的未来好。"
SFH_release_media_control:0 "放宽媒体管制"
SFH_release_media_control_desc:0 "无论是在任何一个地区，对于任何国家的居民而言，言论自由都是生活满足感的重要获取途径之一。对于无法（或者几乎无法）参与实际政治的普通百姓而言，借助媒体等渠道表达自己情感会是十分良好，而且没有那么暴力的途径；同时，这也帮助政府了解自身的弊病，从而实现更符合需求的改革。在我们选择自由，进步化的改革的今天，终结过去的言论管制会是相当有所必要的。"
SFH_encourage_sci_development:0 "鼓励科研发展"
SFH_encourage_sci_development_desc:0 "虽说在过去，我们已经针对我国的科技发展开展了多个类似项目，包括资助科学家团体，或是修建新式机构，购买研究设备等，不过这总是不够的。科研发展是立国之本，历史已经证明，落后于时代的国家往往会成为挨打的一方。通过组织多个科研竞赛，赞助新取得发明，科研等专利的科学家，或是鼓励创新的风气，我们希望能为国家未来的创新发展奠定基础，而不是一昧地追赶前人的脚步。"
SFH_encourage_sci_development_tt:0 "§Y走向未来§!追加效果：\n研究速度：§G+5.00%§!\n生活消费品使用：§Y+5.0%§!\n每月学术氛围水平点数增长：§G+2§!"
SFH_roaring_economy:0 "经济咆哮"
SFH_roaring_economy_desc:0 "在过去的几个世纪以来，远乡一直以强劲且稳定的经济体系闻名东巴斯蒂亚，这不但是我们优秀的商贸团体的功劳，更是代表了麟人文化中坚定而刻苦的精神。千千万万麟人在农场，在工厂，在学院，在写字楼，为我们新一代的经济系统提供了强而有力的支持。我们的改革已经被证明是有效的！而现在，是时候进一步地将这一点发扬光大了！"
SFH_roaring_economy_tt:0 "§Y走向未来§!追加效果：\n生产效率增长：§G+5.00%§!\n建造速度：§G+5.00%§!\n生活消费品使用：§Y-5.0%§!\n每月工业发展水平点数增长：§G+2§!"
SFH_invest_mining_company:0 "投资矿产公司"
SFH_invest_mining_company_desc:0 "矿产一直是我国的重点经济命脉之一。在过去，由于相关资本寡头的垄断，我们在相关行业的发展一直不太好。如今，随着我们逐步完成市场方面的改革，是时候重新通过政府激励来推动这一产业的发展了。远乡的矿产质量将享誉全球！"
SFH_subside_countryside_region:0 "补贴农村地区"
SFH_subside_countryside_region_desc:0 "我国的农业体系一直不太稳定。工业化的快速发展鼓励了大量农民进城打工，乡村地区人口的流失导致了一系列粮食产出的问题。除此之外，由于各地基础设施普及度较低，加之多年的战火纷飞，我们很难建立起沟通城市与乡村地区的稳定贸易路线，这不但导致城市地区粮食供应不稳定，还严重降低了农民的收入。通过补贴乡村地区的发展，我们可以帮助地方政府进一步巩固农村与城市地区的联系，同时保障更加稳定的粮食市场。"
SFH_encourage_diaspora_investment:0 "鼓励侨民投资"
SFH_encourage_diaspora_investment_desc:0 "麟人在世界各地都有侨民，其中不乏富有知识和资本的优秀境外人士。随着国家局势的日渐稳定，我们可以鼓励这些团体投资远乡的新兴产业项目，甚至是回国帮助国家未来的发展。相信在这些优秀人士的帮助下，我国的政治资本会快速增加，同时各地的工业化进程也将得到进一步推进。"
SFH_improve_workers_condition:0 "改善工人地位"
SFH_improve_workers_condition_desc:0 "在工业化的发展中，出于劳动密集型产业的需求，大量的城市工人不得不在享有较低薪资的同时，在相对恶劣的工作环境中进行高强度的活动。这不但极大降低了城市工人的生活质量，还破坏了社会稳定，促进了所谓“社会主义”乃至“共产主义”的意识形态，将工人们推向了意图反对政府的革命党。这是我们所不愿意看到的。通过政府的新法案规范和各种补贴，我们会尽可能地改善工人在我们社会中的地位，确保他们的生活质量不会像过去一样糟糕。"
SFH_administration_of_market_regulation:0 "市场监管总局"
SFH_administration_of_market_regulation_desc:0 "过去的远乡市场充斥着寡头，投机倒把和官商勾结。这些不法分子从我国政府和人民手中谋取了大量利益，可最终却没有将这些资本用于改善产业本身的发展，而是大量转移到了国外，为他们自己的下半身寻得了所谓的“安定”。我们必须终止这一行为。新的市场监管总局将尽量减少破坏市场公平竞争规则的行为，尽量维持大小企业间的平衡，为创业者提供公平的竞争渠道。同时，我们将约束资本企业本身的行为，保障其员工利益。"
SFH_administration_of_market_regulation_tt:0 "§Y走向未来§!追加效果：\n生产效率增长：§G+5.00%§!\n生产效率上限：§G+5.00%§!\n建造速度：§G+5.00%§!\n生活消费品使用：§Y-5.0%§!\n每月工业发展水平点数增长：§G+2§!\n每月农业发展水平点数增长：§G+2§!"
SFH_nation_of_unity:0 "团结之国"
SFH_nation_of_unity_desc:0 "历史已经表明，强盛的国家往往是团结的。这份“团结”，并不只是单单指代着国家政府的团结，它更多代表了全国上下，无论财富，阶级，性别，甚至种族的真正团结。一个有凝聚力的国家会是不可战胜的——而这正是我们所希望实现的。"
SFH_nation_of_unity_tt:0 "§Y走向未来§!追加效果：\n稳定度：§G+5.00%§!\n政治点数获得：§G+5%§!"
SFH_labor_and_cap:0 "劳工与资本"
SFH_labor_and_cap_desc:0 "自工业革命以来，资本主义和劳动工人的矛盾便成为了世界各国共同的话题。有些国家靠物理镇压，有些选择谈判妥协，有些则在革命中遭到推翻。我们应当走出什么样的道路？真正团结的国家意味着任何一方都不应当占据主导地位，靠物理奴役人民是不可取的。我们会利用妥协，改善工人的地位，同时削弱工业大头们的势力，实现这二者间的平衡。"
SFH_countryside_and_city:0 "乡村与城市"
SFH_countryside_and_city_desc:0 "城乡差异是自工业革命以来，我国面临的一大问题之一。相对发达的城市地区精英往往简单地将乡村地区视为“蛮荒之地”，而拼命进城打工的老百姓也将城市视为发达世界的中心，是人们需要为之从“乡村逃走”的目的地。然而，农村地区实际上有着很大的潜力，而且，任何人都不应该忽视乡村地区为全国解决了吃饭问题的这一事实。在政府的努力下，我们会通过对乡村地区的补贴，以及宣传教育等手段来弥补这一矛盾。"
SFH_erase_pain_of_war:0 "抹去战争之痛"
SFH_erase_pain_of_war_desc:0 "在过去的几十年里，远乡始终战乱不断。虽然我们先前的改革已经实现了阶段性的胜利，可民众仍然对战争的爆发感到无比的恐惧。这本身可以理解，无论如何，内战的时代确实已经结束了。然而，我们仍然需要维持一支精锐的武装力量来保卫国家。我们会尽可能地帮助那些因为战争而流离失所，家庭破灭的麟人，同时进一步扩大参军的福利，开动宣传机器，告诉民众，我们不会再重蹈当年的覆辙。"
SFH_improve_woman_rights:0 "改善女性权利"
SFH_improve_woman_rights_desc:0 "在远乡，每年都有成千上万的女性遭到压迫，无数女婴遭到溺死，只因为人们产生了基于性别的错误刻板印象。随着我国社会，政治，以及经济改革进程的不断推行，过去的一些基于性别的刻板印象应当被摈弃。女性也应当有接受教育，参加工作的权利。或许，根据个人的情况，身体素质等因素，在一些职位上会出现性别比例的不平衡，可作为一个现代化的国家，我们无论如何也应当确保每个公民都有平等的社会权利。"
SFH_together_towards_victory:0 "团结一心，共赴胜利"
SFH_together_towards_victory_desc:0 "在我们成功的改革下，远乡现在上下一心，人民对未来充满了希望，国家实现了空前的团结！虽然我们心向和平，可团结的社会允许我们坚强地抵抗任何来犯的境外势力！无论是什么样的战争，苦难和危机，相信在团结的麟人社会的齐心协力下，我们都可以克服！这是属于我们全体远乡公民的胜利！"
SFH_together_towards_victory_tt:0 "§Y走向未来§!追加效果：\n战争支持度：§G+10.00%§!\n政治点数获得：§G+10%§!\n适役人口修正：§G+10.00%§!"
SFH_byebye_to_dictatorship:0 "告别独裁"
SFH_byebye_to_dictatorship_desc:0 "虽然我们在法律上已经完善了民主化改革，可在实际的政府运作中，仍然是女王郑红和保守自由党少数几位领导人士的专制，民主的系统并没有实际上运作——这是因为我国在先前面临着接连不断的战争，以及破败的社会环境，从而不得不作出的艰难决定。随着女王郑红的改革走向尾声，是时候将政治改革做到底，为我们的壮举划上完美的句号了！从今往后，远乡的君主制会继续担当国家的精神象征，但又不会过多地干涉实际的政治运作，保证了人民在政府中的声音，确保绝对君主制造成的惨剧不再发生！"
SFH_byebye_to_dictatorship_tt:0 "§C先前获得的改革民族精神会被移除，§Y走向未来§!除外。§!"
SFH_rights_to_people:0 "放权于民"
SFH_rights_to_people_desc:0 "随着远乡逐步追赶上了文明世界的第一梯队，郑家对麟人的规范带头作用已经日渐式微。虽然远乡王室仍然会继续担当国家的精神图腾，并尽可能地为社会的稳定，正常发展提供帮助。不过，随着社会改革的完善，在现代教育体制的怀抱中生长起来的新一代人很快便能为远乡的未来保驾护航。对于王室而言，是时候让人民自己作出决定了。"
SFH_lead_the_people:0 "带领人民"
SFH_lead_the_people_desc:0 "虽然远乡王室在先前的改革中已经明确了不会过度干涉政治的基本原则，可王室作为全体远乡民众的精神象征，仍然有义务在各方各面起到对国家的带头作用，并且继续担当远乡对世界的第一印象。当然，王室仍然会避免对国家行政方面过多干预，可为了全体麟人的未来，郑家现在，直到遥远的未来，都会继续履行它带领国家的职责。"
#最终种地-中线#
SFH_cheer_for_flourishment:0 "为繁荣欢呼！"
SFH_cheer_for_flourishment_desc:0 "终于，我们完成了全面的内部改革，同时确保了国家的完整性！女皇郑红已经开始准备国家的下一阶段改革，我们会重夺远乡过去世界经济霸主的地位，给外国侵略者们一点小小的远乡市场震撼，相信在不远的将来，我们就能建设出真正优秀且能保障我国人民生活的市场体制。让我们为繁荣欢呼吧！"
SFH_cheer_for_flourishment_tt:0 "§C随着国家实现统一，远乡经济重回正轨，政府体制稳定而繁荣，各地生产活动逐步扩张并发扬光大，我们终于走出了过去的阴霾。\n这并不容易，可也并非无法企及之事。现在的我们得以放手准备下一阶段的变革。作为新上任的女皇，郑红会带领远乡走向新的未来。§!\n§Y繁荣的未来。§!"
SFH_living_for_now:0 "活在当下"
SFH_living_for_now_desc:0 "放眼望去，远乡的近代历史似乎就是从一个失败走向另外一个失败，我们没能追赶上时代的潮流，并最终成为了其它人成就霸权的垫脚石。这是令人悲痛的，可这并不代表它就不存在了。自古以来，麟人都以吃苦耐劳的精神闻名巴斯蒂亚，过去的失败会成为我们的精神食粮，帮助我们继续坚持下去，并在不容乐观的世界环境下走出我们的道路。激进的政治改革和无意义的倒车都不适合我们，现有的平衡体制已经足够——甚至更好。我们将活在当下，利用好身边的一切，确保君主制和议会政府的平衡，同时继续经济改革。我们会带领远乡走向稳定，繁华的未来！"
SFH_living_for_now_tt:0 "获得修正：§Y活在当下§!，其效果为：（稳定度：§G+5.00%§!，战争支持度：§G+5.00%§!，政治点数获得：§R-10%§!，生产效率增长：§G+10.00%§!，生产效率上限：§R-5.00%§!）。"
SFH_social_reforms:0 "社会变革"
SFH_social_reforms_desc:0 "如果保证社会上下在受控制的情况下走向国家所需要的未来，自古以来都是统治者所面临的最大的难题之一。远乡社会各地社会风气普遍保守，除去曾经因革命党而动荡不安的发达城市地区，多数人并不接受现代科技的发展——或者，没有能力接受。虽然我们并不打算进行太过激进的改革，可工业化的发展已经在过去的几十年里证明了其对远乡国发展的重要性与用处，为了保障国家的健康发展，我们有必要在看管下推进全国各地的政治，经济改革。"
SFH_social_reforms_tt:0 "§Y活在当下§!追加效果：\n稳定度：§G+5.00%§!\n每月工业发展水平点数增长：§G+2§!\n每月农业发展水平点数增长：§G+2§!"
SFH_complete_social_secure:0 "完善社会保障"
SFH_complete_social_secure_desc:0 "所谓“社会保障”是一个涵盖极广的词，对于信仰着不同意识形态的人而言，它或许代表了全然不同的含义。对我们而言，社会保障意味着我们要摆脱过去远乡僵化的社会体制，并且确保每个公民的基本权益得到保障。从城市里的基础设施，公共交通，医院，学校，到乡村各地的水井，畜棚，与城市连接的铁路，我们要确保整个社会不再是相互割裂，而是团结一体，同时每个人都有努力愿景的局面。这会需要相当长的时间来进行，阵痛也不可避免，可为了将这个国家带入现代化，这也是必须承受的苦痛。"
SFH_expand_research_fund:0 "扩大科研资金"
SFH_expand_research_fund_desc:0 "虽然缺乏人才是一方面，不过预算上确实也不能说是充沛。我国在科研领域上还有很大进步的空间，除了追赶世界第一梯队，作为不可忽视的霸权之一，我们至少也要在某些领域成为主流的领导者。尽管如此，改善一个国家的整体科研，学术水平并非一日之功，时间上我们确实无能为力，但至少也要把投资准备到位。"
SFH_find_the_smart_ones:0 "任人唯贤"
SFH_find_the_smart_ones_desc:0 "在过去的远乡社会，一直流传着一个相当具有争议的词语，“人情社会”。对于远乡相当数量的官僚机构，乃至由公民自行组织的经济，政治团体，依靠所谓的“人情”，“关系”来决定高级领导层的认命，已经成为了约定俗成的某种“共识”。这样扎根社会许久的理念是无法在短时间内被打破的，不过，我们至少可以从政府的角度做起。通过建立在监管下的更为公平且公开的选拔官僚制度，同时对各地流水进行更加严格的监管，并且鼓励任人唯贤在教育系统中的理念，我们这一代人做不到的，或许在下一代，下下代人就可以实现了。"
SFH_invest_intel_institution:0 "投资情报机构"
SFH_invest_intel_institution_desc:0 "现代通讯设备将世界更加紧密地联系在了一起，也允许世界各国进行更加大规模，有效甚至致命的情报，秘密行动。投资情报机构的意义不仅仅在于维持国内治安的稳定，这还有助于抵抗外国倾覆势力，甚至反过来，帮助我们在对抗境外势力时掌握宝贵的主动权。"
SFH_vocational_education:0 "推进职业化教育"
SFH_vocational_education_desc:0 "我们并没有南巴斯蒂亚联邦诸国那样得天独厚般的历史传统，在远乡，认字可以成为许多人一辈子无法企及的遥远目标。然而，随着工业的快速发展，我国的经济市场急需一批优秀的技术工人，而这光靠吸引外国移民是不足够的。由政府资助的职业化教育可以在一定程度上解决这一问题，我们将专注于基本的扫盲工作和对应技术工人岗位的教育工作，尽可能地缩减教育周期和难度，确保将足够的人才供应以维持社会运转。"
SFH_vocational_education_tt:0 "§Y活在当下§!追加效果：\n生产效率增长：§G+10.00%§!\n生产效率上限：§G+5.00%§!\n建造速度：§G+10.00%§!\n全国省份科学普及度每月增长：§G+1.0%§!\n生活消费品使用：§Y+5.0%§!"
SFH_nation_of_flourishment:0 "繁荣之国"
SFH_nation_of_flourishment_desc:0 "远乡庞大的劳动力市场，丰富的自然资源和辽阔的疆域都为我们带来了工业化得天独厚的条件。如果不是连年的战乱和效率低下的政府，我们本该成为经济强国。现在，机会又来了。随着我国局势稳定，远乡的潜力正逐渐显现出来，相信假以时日，我们就能建设出新一代的经济强国，给东巴斯蒂亚一点小小的繁荣震撼！"
SFH_nation_of_flourishment_tt:0 "§Y活在当下§!追加效果：\n生产效率上限：§G+5.00%§!\n建造速度：§G+5.00%§!\n研究速度：§G+5.00%§!\n每月工业发展水平点数增长：§G+2§!"
SFH_cut_company_taxes:0 "削减企业税收"
SFH_cut_company_taxes_desc:0 "虽然和各地的工业寡头有过一些冲突，资本团体在促进远乡社会进步的贡献一直以来都是不可否认的，我们只是需要更加完善，得到监管的市场体制。随着相关的改革的逐渐落实，是时候重新拉拢我们的好伙伴了。而且，这还不仅仅是针对那些行业龙头们，中小型企业，尤其是创业者们的权益将得到保障，他们会鼓励市场走向更加繁华而创新的未来。"
SFH_expand_mining_company:0 "扩张矿业公司"
SFH_expand_mining_company_desc:0 "虽然随着全球化的发展和对中部，北部大陆的开发，远乡的资源出口产业在很长一段时间并不繁荣。然而，饿死的骆驼比马大，虽然面临着种种问题，可远乡大地的潜能仍然十分丰富——我们只是缺乏资源和人力去开发他们。通过投资相关产业并鼓励矿业公司的重组，扩张，我们得以唤醒我国这一部分的潜力。"
SFH_cut_environmental_control:0 "削减环境管制"
SFH_cut_environmental_control_desc:0 "对一些特殊材料，比如魔矿的开采和加工，往往都会造成十分严重的粉尘，化学材料污染。这不但会对周边居民，工人的身体造成危害，还会导致许多土地变得不可开垦。然而，这一切都建立在我们没有能力使用更先进的科技设备，同时认真选择设施地址的缘故。偏远，贫瘠的土地污染了也没什么大不了的，粉尘完全可以回收再利用，同时，只需要一些简单的规章制度，很大程度上就可以避免致死的危害。因此，我们完全可以削减之前对环境保护的措施，从而进一步加大企业的利润并带动相关产业发展。这在长久来看是利国利民的好事。"
SFH_encourage_market_dev:0 "鼓励市场扩张"
SFH_encourage_market_dev_desc:0 "随着我们的势力范围逐渐扩大，对市场的需求与供给也与日俱增，过去的管理措施已经不再适用，仅仅局限于远乡本土一带很显然是不够的。通过鼓励市场的扩张，我们能够将全国各地，甚至是外国都紧紧联系在一起。经济的纽带有时候比军事，文化的纽带更加强力，它确保了社会的运转是相辅相成，而非相互独立的。这有助于我们的统治与扩张。"
SFH_female_on_jobs:0 "职场上的女性"
SFH_female_on_jobs_desc:0 "在远乡各地，由于对传统的尊重，仍然有大量的女性劳动力没有得到充分利用。随着工业化进程的不断发展，各地产业对劳动力的需求也与日俱增。虽然根据性别的差异和个人能力的不同，许多岗位显然会产出用人标准的变化。不过，向劳动力市场投入更多人力，减少劳动力成本，显然是能促进各地家庭收入，产业发展的一大妙计。"
SFH_female_on_jobs_tt:0 "§Y活在当下§!追加效果：\n生产效率保持：§G+10.00%§!\n生产效率上限：§G+5.00%§!\n建造速度：§G+5.00%§!\n月度人力：§R-20.00%§!\n适役人口修正：§R-20.00%§!\n生活消费品使用：§Y-5.0%§!\n每月工业发展水平点数增长：§G+2§!\n每月农业发展水平点数增长：§G+2§!\n每月学术氛围水平点数增长：§G+2§!"
SFH_stay_alerted:0 "保持戒心"
SFH_stay_alerted_desc:0 "虽然我国已经走出阴影，可世界局势并不安稳。国家之间的冲突仍在世界各地反复上演，那些怀着狼子野心的侵略者永远都不会放弃挑起新的斗争。为了防止他们的阴谋得逞，我们应当永远怀抱对外国人的戒心，并且随时准备好新一轮的战争。只有手里握着家伙，别人才有可能认真对待你的国家，我们必须时刻准备好应对冲突！"
SFH_stay_alerted_tt:0 "§Y活在当下§!追加效果：\n战争支持度：§G+5.00%§!\n动员速度：§G+20.00%§!\n陆军组织度：§G+5.00%§!\n陆军组织度恢复：§G+5.00%§!"
SFH_support_weapon_dev:0 "投资武器发展"
SFH_support_weapon_dev_desc:0 "武器的更新迭代速度之快，是过去的许多人都不曾料到的。现代化的精锐军队需要相符的先进武器辅佐，为此，我们应当加大对军武发展的投资，鼓励各地研究机构，军工企业在先前的基础上做大做强，实现一个又一个创新。"
SFH_fortify_defense_system:0 "巩固防御体系"
SFH_fortify_defense_system_desc:0 "为了抵御潜在的外国侵略者，我们始终在不断完善着相关的军事行动预案。在这个风云变幻的时代，和平年代很可能只是昙花一现。通过扩张个别地区的军工生产能力，以及对应的防御措施，我们得以进一步巩固我国对危机情况的应对能力。虽然进一步的军事化会导致民心的不满，而且花费昂贵，不过总归是值得的。"
SFH_abolite_useless_corps:0 "裁撤多余军队"
SFH_abolite_useless_corps_desc:0 "在现代战场上，许多次冲突已经印证了一点：军队不是越大越好，而是越精越好。通过裁剪军队，我们不但可以限制非必要的支出，还可以把本就有限的资源更进一步运用在那些真正值得我们投资的事物上，甚至，这还可以释放大量的劳动力回馈社会。通过裁剪多余的军队，我们得以进一步实现军事上的改革。"
SFH_elite_corps_training:0 "精锐化部队训练"
SFH_elite_corps_training_desc:0 "远乡军队的未来不在于征召几十万人发动大规模进攻，那样只会白白地留我们子民的血。随着科技的进步，人数的优势已经不再重要，现在讲究的在于军事科技的发达——以及相当重要的，军事人员的素质。我们可以将资源倾斜在加强现有部队的训练上，进一步提高我军士兵的战斗素养和身体素质。"
SFH_protect_motherland:0 "保卫祖国"
SFH_protect_motherland_desc:0 "远乡的军队是为了什么？毫无疑问，它之所以存在，是为了保护远乡的子民，保护我们的祖国。我们应当明确这一点，确保远乡军队将被建设为保家卫国的部队，鼓舞人们的爱国热情，从而确保我国在受到侵略时，举国上下可以爆发出最强大的保卫力量。"
SFH_protect_motherland_tt:0 "§Y活在当下§!追加效果：\n战争支持度：§G+5.00%§!\n核心领土防御：§G+5.00%§!\n适役人口修正：§G+10.00%§!"
SFH_stabalize_monarchy:0 "巩固君主制"
SFH_stabalize_monarchy_desc:0 "在改革的大背景下，君主制并没有什么不好的。人民需要发出声音的渠道，但人民也同样需要正确的领导——我们现在的体制恰好能实现这两点。议会的权力会被君主所限制，可贵族精英们也不再能无视人民的声音推行有害于国家的政策；这样，我们确保了远乡王国在未来不会因为乌合之众而走上错误的道路，但也不会重蹈过去的覆辙。"
SFH_stabalize_monarchy_tt:0 "§C先前获得的改革民族精神会被移除，§Y活在当下§!除外。§!"
SFH_dual_system_shining:0 "二元制绽放光芒"
SFH_dual_system_shining_desc:0 "在君主，贵族精英，议会的共同领导下，我国正走在前所未有的稳定道路上。随着各地产业焕然一新，政治，社会环境日渐趋于稳定，远乡的未来一片光明！事实证明，虽然经历了许多令人不快的事件，付出了许多代价，可我们最终仍然走在了正确的道路上。在这乱世之中，我们将会带领麟人走向崭新，安定，繁荣的未来！"
#最终种地-右线#
SFH_cheer_for_new_queen:0 "为新皇欢呼！"
SFH_cheer_for_new_queen_desc:0 "女皇陛下终登大宝，帝国的未来终落至值得信赖之人，也即吾等手中。但如今的帝国内困外患，而陛下素行尚浅，又容易为人所摧，故吾等忠臣仍应该继续辅弼陛下，尽忠职守，革清帝国之瑕疵，扫除前路之诸障。\n\n不过，现在我们应当为陛下登极而喜，行践祚之仪，彰帝国之威。吾等实有必要宣告天下：远乡已不复以往，且必将重现荣光。"
SFH_cheer_for_new_queen_tt:0 "§C随着国家实现统一，远乡重新证明自己的强大，君主牢牢地控制住了国内的方方面面，多数政府事务重回正轨，我们终于走出了过去的阴霾。\n这并不容易，可也并非无法企及之事。现在的我们得以放手准备下一阶段的变革。作为新上任的女皇，郑红会带领远乡走向新的未来。§!\n§Y牢固的未来。§!"
SFH_change_the_past:0 "改变过去"
SFH_change_the_past_desc:0 "先帝实乃英明之主，但却受大战遗害，遭青天逆贼之袭，且困于“自由派”与“改革家”的网罗中，故先帝遗政，还待今人重审。吾等忠臣当拨乱反正，悉纳先帝之遗，同时剔除不符实务者，以正帝国大势。"
SFH_change_the_past_tt:0 "获得修正：§Y改变过去§!，其效果为：（稳定度：§R-20.00%§!，战争支持度：§G+10.00%§!，政治点数获得：§G+10%§!）。"
SFH_nation_of_safety:0 "安定之国"
SFH_nation_of_safety_desc:0 "陛下之臣民饱经叛党乱匪之扰，无不渴求和谐安宁之社会。体念民情之女皇陛下自然应民之所想，以雷霆之势加严刑于彼等宵小：万民安乐，阖家团圆之时，少数不识好歹者之呼嚎，又何足挂齿哉？"
SFH_nation_of_safety_tt:0 "§Y改变过去§!追加效果：\n稳定度：§G+10.00%§!\n每周稳定度：§G+0.20%§!\n政治点数获得：§G+10%§!"
SFH_keep_familiy_tradition:0 "[Get_SFH_keep_familiy_tradition_title]"
Get_SFH_keep_familiy_tradition_title_1:0 "维持家庭传统"
Get_SFH_keep_familiy_tradition_title_2:0 "新式女权主义"
SFH_keep_familiy_tradition_desc:0 "[Get_SFH_keep_familiy_tradition_desc]"
Get_SFH_keep_familiy_tradition_desc_1:0 "国有纲常，家有家法，齐家而天下平。然而革命党却视稳定家庭如寇仇，而忘乎天地之大义，岂非蔑视古训，倒行逆施哉？男女有别乃人之天性，妇女生性柔弱，宜在家中安守，固我国家庭之传统，以遵先祖之道，方能使天下风气得以一清，国家社稷享受安宁。"
Get_SFH_keep_familiy_tradition_desc_2:0 "妇道虽微，其能助国，亦不可忽也。吾国军阵中的巾帼英雄不仅像世界证明她们的美德与才华不仅限于厨房和育婴室中，亦可化作保护远乡的铜墙铁壁，此即为远乡特色的女权主义：在其他国家的“女权主义者”们为祸人间，扰乱纲常的同时，远乡女子则修身齐家，以女儿身报国效命，无愧于天地之间，而这才是大争之世下，真正值得我们宣传的女性价值。"
SFH_keep_familiy_tradition_tt:0 "§g根据是否完成国策§!§Y女性参军§!§g，这里的内容会发生改变。§!"
SFH_tighten_media_control:0 "收紧媒体管制"
SFH_tighten_media_control_desc:0 "“第十七条 凡报纸者，皆有禁止传播煽动性内容之义务”\n“第二十四条 凡报纸者，若扰乱治安或有损社会安宁之秩序，得禁止发行。”\n“第三十条 凡内阁大臣及同等职务之帝国公务员者，皆有权要求报纸更正或撤下对公众利益造成负面影响之新闻报道。”\n\n（摘自远乡新《新闻法》）"
SFH_newly_built_military_academy:0 "新建军事学院"
SFH_newly_built_military_academy_desc:0 "军为国之根本，将乃军之柱石。然今之军事，非昔日所用兵法可比，若无一支庞大的现代化军官团，再多的先进武备也无用武之地。故立新式军事学院，乃吾国之急务也，只有这样，我们才能培养出以经国济民为己任，又有深谋远虑之才的新式军官，以应变局，扬武威。"
SFH_expand_military_research_fund:0 "扩大军武科研资金"
SFH_expand_military_research_fund_desc:0 "工欲善其事，必先利其器，夫现代战争之胜负，系于科技之进步。远乡从不缺乏优秀人才与奇思妙想，但若无足够资金投入，军武科研则难有突破，新式武备更无从谈起。今有司明察时局，自将加大军事科研经费之拨付，以图国家长治久安，跟上时代之潮流：这样每一位天才和每一次巧思，都能化作前线的每一次捷报。"
SFH_larger_secret_police:0 "扩张秘密警察"
SFH_larger_secret_police_desc:0 "安定之国初具成效，上下风气为之一新，然而，现在仍有一些蚍蜉撼树的逆党仍没有放弃扰乱帝国的努力，因此，扩大吾国之“安保力量”，方能预防犯罪，维护社会秩序，纠乱党，正纲常，灭犯罪于无形，以卫社稷安定。吾等仅需观其所报，便可安枕无忧。"
SFH_larger_secret_police_tt:0 "§Y改变过去§!追加效果：\n稳定度：§G+10.00%§!\n每周稳定度：§G+0.20%§!\n战争支持度：§G+10.00%§!\n每周战争支持度：§G+0.20%§!\n政治点数获得：§R-10%§!"
SFH_industry_transformation:0 "调整产业结构"
SFH_industry_transformation_desc:0 "没有糖果尚能度日，没有子弹则难以生存。虽然在过去吾国的经济已经展现出了极强的恢复势头，但高度集中于民用工业和对外出口的现状则使得吾国的经济十分脆弱，并且难以为吾等的伟业和仍待吾等拯救的无数远乡人民提供帮助。为此，吾等有必要推动政府主导的产业结构调整，在让军工复合体企业拿着诏书直接征用民用工厂的同时，我们也需要为他们提供更好的经营环境。"
SFH_industry_transformation_tt:0 "§Y改变过去§!追加效果：\n工厂产出：§G+10.00%§!\n军用工厂建造速度：§G+10.00%§!\n民转军花费：§G-10.00%§!\n每月工业发展水平点数增长：§G+2§!"
SFH_encourage_magic_usages:0 "鼓励魔法使用"
SFH_encourage_magic_usages_desc:0 "古往今来，魔法在各个领域中皆有广泛应用，而魔法奇术之威力，已在过去一世纪的巨大变革中显露无遗：它不仅可以为人类的生活带来许多便利与进步，更可以提升我们在军事、科研和建设上的竞争力。而今四海已平，正是重启魔法研究之时：吾等不仅会为有志于发展魔法的青年才俊和学术机构提供支持，更会为他们而“稍稍放宽”一些伦理要求，这样，那些乱臣贼子也能为吾国的发展作出贡献…只不过是以作为实验对象的方式。"
SFH_consolidate_agriculture_system:0 "巩固农业体系"
SFH_consolidate_agriculture_system_desc:0 "农桑乃国之根本，即使是今日，上至陛下百官，下到贩夫走卒，都离不开稳定的粮食供应。吾国土壤肥沃，物产丰饶，但常年战乱使我国农业亟待恢复。因此，吾等宜以农机技术为基础，加强农业生产力，扩大耕地面积并推广科学种植技术，以重振我国农业，并确保粮食供应之安全，及国家之繁荣稳定。"
SFH_invest_armament_industries:0 "投资军武产业"
SFH_invest_armament_industries_desc:0 "吾国之军工复合体已初具规模，但对于迅速扩张的军队而言这还远远不够——吾等决不能让新兵拿着草叉上战场。因此，吾等将为军武产业打上一剂强心针，不仅要支持属于国家的军工企业，更要为有志于提供国防供应的民间承包商提供更多的政策支持和经济补助，同时为军工企业的研发部门提供更多的经费和人才，如是才能加快吾国军武产业的现代化发展。"
SFH_expand_national_corps:0 "扩大国有企业"
SFH_expand_national_corps_desc:0 "私营企业乃民间所设，其权谋私利，往往不顾社会大义，毫无可信之处：先帝手中早有报告，悉数工商巨贾之叛国罪行，而今彼等又装作无事发生，此等闹剧不可重演。相反，国有企业乃朝廷所置，以帝国及吾等伟业为先，有利于吾国经济稳定与发展。因此，即使采用强硬手段，吾等也必须将关键产业收回国有，而那些服务帝国的中正之人，也自然可以从中分一杯羹。"
SFH_nationalwide_supply_system:0 "全国补给系统"
SFH_nationalwide_supply_system_desc:0 "内乱对吾国的交通体系和军事补给系统无疑是沉重的打击，故统筹重建吾国的道路网，以加强基础设施及军队补给系统建设就显得尤为重要。良好的基础设施及补给系统能促进国家经济发展，民生福祉可臻，同时也能使国家军队调动如臂使指，令我军锐不可当。"
SFH_nationalwide_supply_system_tt:0 "§Y改变过去§!追加效果：\n生活消费品使用：§Y-5.0%§!\n基础设施建造速度：§G+10.00%§!\n铁路建造速度：§G+10.00%§!\n补给消耗：§G-10.00%§!\n每月工业发展水平点数增长：§G+2§!"
SFH_ready_for_wars:0 "为战争准备"
SFH_ready_for_wars_desc:0 "今世局纷扰，外患频起，且仍有奸贼逆党不服王化，若无充足之军事准备，则难以捍卫帝国祖宗之基业。故强军仍为我国之第一要务，而在进一步的军队扩张前，吾等应为社会体系的军事化做好准备，例如为民用设施的军用转化制定规范，扩建军事基地和加强国防教育等，只有这样，帝国才能为远乡血肉长城的建设打好地基。"
SFH_ready_for_wars_tt:0 "§Y改变过去§!追加效果：\n工厂产出：§G+10.00%§!\n军用工厂建造速度：§G+10.00%§!\n部队训练时间：§G-20.00%§!\n每月军队职业度水平点数增长：§G+2§!"
SFH_enlarge_conscription:0 "扩大征兵"
SFH_enlarge_conscription_desc:0 "扩大征兵乃伟业所需，国家安全与社会稳定俱依赖之。帝国安全仅凭现有之兵力恐仍难以保卫，故征兵之重要，非但在于补充军队之力量，更在于提升军队之人力储备水平。吾等将重新检讨现有之征兵政策，下调征兵年龄，并酌情取消学生之免役优待：年轻人们需要在服役后才能接受高等教育，这样也能让军营先教育教育那些潜在的社会不安定因素。"
SFH_harder_training:0 "强化训练"
SFH_harder_training_desc:0 "强化军队训练实属关键之举，一支军令不行，效率低下的军队只会是吾等霸业之累赘。因此，吾等不仅要动员忠志之青年，更要推动训练内容之现代化，以注重实战之训练，使士兵得以熟悉应对各种战斗场景之技能。同时，军事之纪律亦为训练之不可缺少要素，应在训练中严格培养士兵之服从精神，只有这样，方可炼成最优质的战士，让远乡的敌人做出回答！"
SFH_women_in_army:0 "[Get_SFH_women_in_army_title]"
Get_SFH_women_in_army_title_1:0 "女性参军"
Get_SFH_women_in_army_title_2:0 "妇女辅助部队"
SFH_women_in_army_desc:0 "[Get_SFH_women_in_army_desc]"
Get_SFH_women_in_army_desc_1:0 "虽然可能听起来与天方夜谭无异，但今者远乡之霸业系于一人，女子亦宜肩负重任，效命行伍之间：兵戎相见，非拳拳之心莫能为功，而当女子效命行伍，则可在社会传承家国之志，于军中激发战斗之勇，如此，巾帼得于军中尽展所长，于国家安危和吾等伟业尽一己之力。当然，男女混编之事恐过于激进，不过吾等可先组建纯女性战斗部队，以让女子为国效命。"
Get_SFH_women_in_army_desc_2:0 "“男主外、女主内”之古训虽仍在耳旁，但如今世界之局势瞬息万变，吾等也应做出相应调整：军中后勤、防空、急救等则可由女子承担，而吾国现行之征兵政策则让男性填补上述职缺，恐只会白白浪费人力，特别是后方急需的熟练工人。因此，虽然让女性扛枪上战场仍为天下之大不韪，但吾等可以组建妇女辅助部队，让女性负责后勤、医疗和一些器械操作，这样吾等便可解放出更多的男性人力。"
SFH_women_in_army_tt:0 "§g根据是否完成国策§!§Y维持家庭传统§!§g，这里的内容会发生改变。§!"
SFH_coastal_defense_proj:0 "岸防计划"
SFH_coastal_defense_proj_desc:0 "纵观吾国历史，海疆为吾国之重要防御线，近世以降外侮多来于海上，即使吾朝兵强马壮，艨艟盈天，亦不可掉以轻心。吾等将于海岸线上广建岸防设施及岸防碉堡，并为敌方之登陆做充分操演，如是方能使商贸往来亨通，海上运输无虞。"
SFH_coastal_defense_proj_tt:0 "§Y将在西部沿海部分省份修筑堡垒。§!"
SFH_maintain_mobilization_status:0 "维持动员状态"
SFH_maintain_mobilization_status_desc:0 "古语常言“居安思危”，今虽内忧已定，但外患仍未除尽，怎能满足于一时安逸，而置帝国大业于不顾？因此，吾等将通过持之以恒的教育，定期的仇恨活动，以及将揪出的内奸进行公开批判等方法，塑造无时无刻不处于动员状态下的社会氛围：远乡的每一位子民都需要时刻为远乡的伟业做好准备，并在需要的时候随时拿起武器，满怀热情地与帝国的内外之地决一死战！"
SFH_maintain_mobilization_status_tt:0 "§Y改变过去§!追加效果：\n适役人口：§Y+1.0%§!\n核心领土进攻：§G+10.00%§!\n核心领土防御：§G+10.00%§!\n陆军组织度：§G+10.00%§!"
SFH_suppress_the_rebellions:0 "完全统制"
SFH_suppress_the_rebellions_desc:0 "自由派、资本家和青天乱匪，曾经足以动摇帝国根基的逆贼如今已不值一提，吾等的斗争终于将取得胜利——然乾坤安定，何故叛贼频现，庶民为之惑？原因显而易见：社稷管制尚未至臻完善，故吾等当以一切手段，将陛下之仁德延及社会各处，自日常言语至报刊文章，乃至朝廷公文，悉无异议质疑：言论必经过滤，思想必经审查，人心唯有忠于帝国及陛下，唯如此吾辈伟业方可稳固。"
SFH_suppress_the_rebellions_tt:0 "§C先前获得的改革民族精神会被移除，§Y改变过去§!除外。§!"
SFH_the_absolute_voice:0 "绝对的声音"
SFH_the_absolute_voice_desc:0 "自南海至菲沙克，从海清到科西拉，吾邦子民无不颂扬女皇陛下之圣明；自吉拉尼亚至七河，自南巴斯蒂亚之外族至北巴斯蒂亚之魔兽，异邦番主无不畏惧帝国劲旅之铁骑。吾等令远乡重回团结，并寻回昔日之荣光，而今，盛世再现之帝国已伫立于巴斯蒂亚大陆之上，为帝国与女皇陛下三呼万岁吧！"

