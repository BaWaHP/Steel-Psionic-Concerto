###政党名称###
SFH_pioneer_communism_party:0 "南远乡革命阵线"
SFH_pioneer_communism_party_long:0 "南远乡革命阵线\n§g南远乡革命阵线在远乡政府内影响微乎其微，在多年的围剿后转入个别根据地进行游击活动，很少参与远乡政治。§!"
SFH_revolutionary_communism_party:0 "南远乡革命阵线"
SFH_revolutionary_communism_party_long:0 "南远乡革命阵线\n§g南远乡革命阵线在远乡政府内影响微乎其微，在多年的围剿后转入个别根据地进行游击活动，很少参与远乡政治。§!"
SFH_worldunion_socialist_party:0 "南远乡革命阵线"
SFH_worldunion_socialist_party_long:0 "南远乡革命阵线\n§g南远乡革命阵线在远乡政府内影响微乎其微，在多年的围剿后转入个别根据地进行游击活动，很少参与远乡政治。§!"
SFH_worldunion_democrat_party:0 "南远乡革命阵线"
SFH_worldunion_democrat_party_long:0 "南远乡革命阵线\n§g南远乡革命阵线在远乡政府内影响微乎其微，在多年的围剿后转入个别根据地进行游击活动，很少参与远乡政治。§!"
SFH_liberal_republican_party:0 "远乡保守自由党"
SFH_liberal_republican_party_long:0 "远乡保守自由党\n§g远乡保守自由党是曾经民主化改革的遗产之一，是除去保守党外唯一有能力在远乡官方许可下正常运转的“民主政党“。人们常说，加入保守自由党需要很大的勇气：首先，你会被所有参加过曾经革命的反政府人士视作民主的叛徒，是向邪恶君主妥协的懦夫；其次，你在那所谓“效忠对象”的眼中依然是危险的存在，是革命的温床，极左恐怖分子。尽管如此，许多担忧都是子虚乌有，在没有进行大规模民主化改革的情况下，保守自由党缺乏一切帮助其获得远乡政权的条件。§!"
SFH_liberal_republican_party_union:0 "联合政府"
SFH_liberal_republican_party_union_long:0 "远乡保守自由党与保守党联合政府\n§g随着郑红女王的上台，远乡的民主化改革进入到了全新的阶段。在女王的帮助下，提倡改革的保守自由党和掌握大权的保守党组建了联合政府，在未来联合政府的任期内，两党将会在王室的全力帮助下准备远乡民主化的改革以及下一次大选。改革之路道阻且长，可联合政府绝不退缩，因为它承载了千千万万麟人数十年的梦想。§!"
SFH_conservative_republican_party:0 "远乡保守党"
SFH_conservative_republican_party_long:0 "远乡保守党（保守派）\n§g远乡保守党是曾经民主化改革的遗产之一，也是除了保守自由党外唯一有能力在远乡官方许可下正常运转的“民主政党“。作为远乡的“第一大党”，保守党同政府的关系密切，虽然他们现在并无能力直接干涉政府的最终决议，远乡王国的正常运转绝对离不开保守党在全国各地进行的政治活动以及于名存实亡的政治议会上提出的政策方案。只要国王下定决心进行改革，被忽视的保守党就能迅速重回台面。§!"
SFH_authoritarian_republican_party:0 "远乡保守党"
SFH_authoritarian_republican_party_long:0 "远乡保守党（保皇派）\n§g远乡保守党是曾经民主化改革的遗产之一，也是除了保守自由党外唯一有能力在远乡官方许可下正常运转的“民主政党“。作为远乡的“第一大党”，保守党同政府的关系密切，虽然他们现在并无能力直接干涉政府的最终决议，远乡王国的正常运转绝对离不开保守党在全国各地进行的政治活动以及于名存实亡的政治议会上提出的政策方案。只要国王下定决心进行改革，被忽视的保守党就能迅速重回台面。§!"
SFH_national_socialist_party:0 "贵族院"
SFH_national_socialist_party_long:0 "远乡贵族院\n§g远乡贵族院代表了远乡工业寡头，地主乡绅，以及宫廷贵族的势力。虽然由于出身五花八门，贵族院内部往往是争执不断，难以得出对远乡未来规划的共识，但他们在面对国王时往往能团结一致。贵族院内的斗争形成了诡异的权力平衡，大家都从政府的衰败中分得一份羹，并默认彼此互不干涉。但若是，有人能站出来打破这一平衡的话…局面会大不相同。§!"
SFH_authoritarian_nationalism_party:0 "贵族院"
SFH_authoritarian_nationalism_party_long:0 "远乡贵族院\n§g远乡贵族院代表了远乡工业寡头，地主乡绅，以及宫廷贵族的势力。虽然由于出身五花八门，贵族院内部往往是争执不断，难以得出对远乡未来规划的共识，但他们在面对国王时往往能团结一致。贵族院内的斗争形成了诡异的权力平衡，大家都从政府的衰败中分得一份羹，并默认彼此互不干涉。但若是，有人能站出来打破这一平衡的话…局面会大不相同。§!"
SFH_paternal_autocrat_party:0 "远乡王室"
SFH_paternal_autocrat_party_long:0 "远乡王室\n§g顾名思义，远乡王室的统治代表了以郑钧为首的郑氏家族的利益，尽管在过去的几十年以来不断衰弱，远乡王室仍是远乡王国的最高统治者。虽然被许多人所不耻，远乡皇室在国家各大部门仍有相当规模的支持者，其中一个重要支柱便是军队。虽然腐败横行，远乡陆军仍是国王的坚定后援，这也是皇室继续统治的重要底气之一。除此之外，比起其它贵族，地主或是企业家，许多民众也对国王怀有相对较好的印象（当然，革命党除外），即便最糟糕的情况发生，只要国王的底牌还在，情况就尚在掌握之下。§!"
SFH_wizard_rules_party:0 "神兽崇拜者"
SFH_wizard_rules_party_long:0 "神兽崇拜者\n§g邪教在南远乡地区不成气候。§!"
SFH_religious_extremism_party:0 "神兽崇拜者"
SFH_religious_extremism_party_long:0 "神兽崇拜者\n§g邪教在南远乡地区不成气候。§!"
SFH_anarchism_party:0 "农民叛军"
SFH_anarchism_party_long:0 "农民叛军\n§g农民叛军在南远乡地区不成气候。§!"


###民族精神###
SFH_farhome_kingdom_idea:0 "远乡王朝"
SFH_angrier_aristocrats:0 "贵族不满与日俱增"
SFH_angrier_aristocrats_desc:0 "贵族对皇室的不满一直可以追溯到数个世纪以前，早在工业化伊始之际，国王采取的支持态度就让南方贵族一度失势。接踵而至的南巴斯蒂亚联邦共和革命更是在远乡王国内点燃了革命的火种，虽然这份火种很快随着伟大战争的开始而消失匿迹，近几十年来又死灰复燃。国王对共和革命采取的温和政策使得许多贵族对他感到不满，认为他背叛了远乡王国。"
SFH_failure_in_democracy:0 "失败的民主化进程"
SFH_failure_in_democracy_desc:0 "伟大战争结束后，死灰复燃的共和革命一度让远乡王国陷入叛乱。然而，时任国王，也就是郑钧之父，郑铭国王选择了同叛乱者协商。自此，远乡王国便开始了漫长的民主化运动。共和党人的保皇派希望同国王建立起一个二元制的君主立宪政府，在设立议会的同时保留国王的实际权力。这一切都随着世界大战的爆发而被迫终止。世界大战结束后，沃姆帝国挑起的东巴斯蒂亚大战则使得情况进一步恶化。民主化彻底失败，而郑钧也不得不同他的儿子分享远乡王国的统治权。这引起了共和党人的极大怒火。"
SFH_terrible_heirs:0 "继承危机"
SFH_terrible_heirs_desc:0 "郑钧国王有两个孩子，长子郑义和女儿郑红。虽然远乡王国没有一份明确的继承法，但根据传统，假如郑钧国王因某些原因退位，其王位会被传给长子郑义。然而，郑义同国王郑钧的关系并不好，郑钧也没有将皇位传给以贵族保守派为首的郑义。然而，尚且年轻的郑红是否有能力领导远乡王国还是个问题…"
SFH_passing_glory:0 "没落的丰饶之地"
SFH_passing_glory_desc:0 "远乡王国优越的地理位置使得她曾一度是巴斯蒂亚大陆上最为繁荣的地方之一，远离战争的远乡王国即使是在伟大战争期间也没有受到如南巴斯蒂亚联邦那样严重的影响。然而，随着时间的流逝，远乡王国在和平年代逐渐难以跟随进步的脚步，同时因为世界大战的原因，海量到中巴斯蒂亚联邦地区的投资都付诸东流。沃姆帝国的入侵进一步恶化了局面，接连不断的战争对远乡王国造成的损失到了今天也没能彻底抹去。"
SFH_end_of_heros:0 "勇敢者的末路"
SFH_end_of_heros_desc:0 "我们的家园由一批不惧危险的冒险者建成。在世界的另一面是我们的故乡，被称为天朝上国的一个地方。作为皇帝最精锐的勇士，我们跨越了重重困难，终于抵达了这片被我们命名为远乡的土地。即使是同故乡失联也没能让我们最勇敢的战士放弃——直到那场名为世界大战的可怕事件爆发。可就当远乡人民还在舔舐着大战带来的伤痛时，沃姆帝国的侵略者又一次让远乡王国陷入战火——这一次，还是在家门口。整整一代人在接连不断的战争中失去性命，无数的投资付诸东流…现在的远乡人民不再对未来怀有期望，社会笼罩在悲痛之下。"
SFH_cut_military_funds:0 "精简军用资金"
SFH_cut_military_funds_desc:0 "我们会好好地算上一笔账，把那些没有意义的军事科研支出全部砍掉，并改变现在的资金流以确保足够的投资可以被运用到我们希望发展的领域，而非我们不关心却占着大笔资源的项目。"
SFH_invest_military_projects:0 "投资军工项目"
SFH_invest_military_projects_desc:0 "我们对军工项目的投资可以极大提高未来建造他们的速度。"
SFH_invest_military_weapons:0 "军武投资"
SFH_invest_military_weapons_desc:0 "我们对军武的投资可以尽管填补军队战斗力的空缺。"
SFH_purge_within_army:0 "清洗军队"
SFH_purge_within_army_desc:0 "在军队中进行的清洗会导致一段时间的军队停摆，但为了改革，这或许也是必要的。"
SFH_modified_artillery:0 "改良型火炮"
SFH_modified_artillery_desc:0 "南远乡地区设计的改良型火炮有着更加强大的火力和更低廉的造价。"
SFH_infantry_tank_coordination_training:0 "步坦协同训练"
SFH_infantry_tank_coordination_training_desc:0 "加强步坦协同训练可以进一步提高装甲部队的持续作战能力。"
SFH_betraying_officials:0 "叛乱的军官"
SFH_betraying_officials_desc:0 "内战爆发后，对远乡军队不抱有信任的低级军官选择了在最关键的时候背叛我们——这群该死的混蛋！没了他们我们一样能赢内战！"
SFH_conforting_nobilities:0 "安抚贵族"
SFH_conforting_nobilities_desc:0 "为了让闹腾的贵族们安静下来，我们不得不花点钱财——但这也是为了远乡王国好，改革可比几文钱要紧的多。"
SFH_erupted_antiwar_emotions:0 "爆发的厌战情绪"
SFH_erupted_antiwar_emotions_desc:0 "随着我国陷入将要内战的局面，我国境内积压已久的厌战情绪彻底爆发。随着民众走上街头抗议任何远乡军队的扩张行为，我国已然陷入了混乱的境地。"
SFH_reformation_investment:0 "改革开支"
SFH_reformation_investment_desc:0 "改革所必须的开支。"
SFH_veterans_resettlement_program:0 "老兵安置计划署"
SFH_veterans_resettlement_program_desc:0 "近期设立的老兵安置计划署开展了一系列有助于安置大战时期的老兵的政策，帮助他们融入社会，并在一定程度让他们不再成为战争有害论的绝佳案例。"
SFH_exposing_and_being_exposed:0 "揭发与被揭发"
SFH_exposing_and_being_exposed_desc:0 "近期，我国所出台的政策鼓励人们举报周围反对军事化政策的远乡公民，虽然这价值不菲，并且容易造成贪污腐败，但这至少能让反对者安静一会儿。"
SFH_appeased_wariness:0 "得到安抚的厌战情绪"
SFH_appeased_wariness_desc:0 "终于，在我们的不懈努力下，我国境内爆发的反战情绪得到了一定程度上的缓解。当然，我们暂时无法彻底解决这一问题，但这同样起到了很大的效果。"
SFH_citizen_living_allowance:0 "公民生活补贴"
SFH_citizen_living_allowance_desc:0 "用在公民身上的生活补贴价格不菲，但总是能缓解燃眉之急的。"
SFH_collapsing_social_system:0 "崩盘的社会体系"
SFH_collapsing_social_system_desc:0 "情况不妙，政府陷入的混乱使得政府在社会上的公信力进一步降低，遍布远乡王国境内的不满声音重新浮上了水面，民众不满足于如今的生活，开始索取进一步的社会改革。随着政府的公信力急速降低，我们在政治上的话语权也在以不可思议的速度降低，可民众的不满却与日俱增。"
SFH_new_look_campaign:0 "新面貌运动"
SFH_new_look_campaign_desc:0 "由远乡政府主导开展的新面貌运动提倡从下至上改善整体社会面貌，强调“将老百姓从浑浑噩噩的生活”中拯救出来，涵盖了包括公共服务扩张，教育改革，人身权利修正，社会福利改革等一系列政策，旨在将远乡王国的社会摆脱过去死气沉沉的景象，走向全新的现代化社会。"
SFH_chasing_for_hope:0 "追寻希望"
SFH_chasing_for_hope_desc:0 "虽然美好的未来看起来依然遥不可及，远乡政府已经摆脱了过去一度混乱的社会局面，并且为其治理下的人民开创了通往充满着希望与憧憬的美好未来的大门——尽管，这扇大门是否为空中楼阁，还需要后人决定。"
SFH_overproud_aristocrats:0 "傲睨得志的贵族"
SFH_overproud_aristocrats_desc:0 "国王恶化的身体状况使得贵族们在远乡政府内变得更加的肆意妄为。许多人不再关心对国王有何种不满，因为他们大多认为国王做不了多久，而新上来的继承人不会有什么能力阻止他们的行为——这个想法虽然可耻，但并非不可能。远乡政府应当尽快应对这一难题，否则很可能会被来自内部的敌人击垮。"
SFH_concession_to_aristocrats:0 "向贵族让步"
SFH_concession_to_aristocrats_desc:0 "温和化的解决方式或许比起强硬的手段更能解决问题，向贵族的让步不一定会有好结果，但或许会得出比起强硬手段更令人满意的答卷。"
SFH_beat_aristocrats:0 "打压贵族"
SFH_beat_aristocrats_desc:0 "某些人仗着自己在国家层面有点权威，多少有些不把中央看在眼里了。用强硬的手段对付贵族或许能更彻底解决这一问题，同时建立国王的威望。"
SFH_suppression_of_nobility:0 "压制贵族"
SFH_suppression_of_nobility_desc:0 "经过我们的不懈努力，终于，我们得以在一定程度上压制贵族在政府内的影响力，并且逼迫他们走上我们所规划好的正道。"
SFH_political_crisis:0 "政治危机"
SFH_political_crisis_desc:0 "郑钧的倒下进一步证明了远乡政局的脆弱。虽然他本人成功在昏迷一段时间后苏醒，可不论是民众，贵族亦或者是反对派，他们心中对于远乡王朝的信任已然化作飞灰。如果郑钧不能在自己驾崩前做点什么以稳定局面，确保政权的严选，那恐怕，郑家对于远乡这片土地的统治就到此为止了。"
SFH_reformation_plan:0 "改革计划"
SFH_reformation_plan_desc:0 "上至王室的后院，下至农民的粪堆，一场席卷远乡王国的政治改革已经开始，而这场改革将会去往何方，很大程度会取决于我们的努力。"
SFH_fragile_reformation:0 "脆弱的改革"
SFH_fragile_reformation_desc:0 "虽然在立宪会议后，我国的政权在一定程度上得到了稳定。可情况仍然不容乐观，许多人不了解改革的目的，甚至是反对这些尚且新鲜的事物。我们的工作仍未结束，必须让每个人都了解我们所从事的伟大事业的重要性。"
SFH_noble_protest:0 "贵族抗议"
SFH_noble_protest_desc:0 "许多贵族都不满我们近期的改革事业，可在时代的洪流下，他们不过是沧海一粟。"
SFH_sucessful_reformation:0 "胜利的改革"
SFH_sucessful_reformation_desc:0 "经过我们的不懈努力，远乡王国终于在一定程度上做好了向改革过渡的准备。虽然在短时间内，这显然不意味着改革的全面胜利，可它成功地解决了过去改革计划难以开始的难题，为未来进一步的改革计划奠定了基础，同时维持了政权的稳定。"
SFH_stabilization_plan:0 "维稳计划"
SFH_stabilization_plan_desc:0 "维稳计划用于指代远乡政府在政治改革时期提出了一系列用于维持政权稳定，进行一定程度的政治改革并维持同君主制司法的平衡的政策。"
SFH_appropriate_reforms:0 "适当的改革"
SFH_appropriate_reforms_desc:0 "激进或是过于保守的改革都不符合远乡王国的国情，在这之间找到平衡点，采用适当的改革政策有助于快速获得政权的稳定性，并且不会激起各方的怒火。尽管这会需要更多的政治点数开局以及国王的威望作为代价。"
SFH_stable_reformation:0 "平稳的改革"
SFH_stable_reformation_desc:0 "经过我们的不懈努力，远乡王国终于完成了一个不会激起多数人怒火的改革。当然，那些打着反建制旗号的抵抗运动无论郑钧实现怎样的改革都不会宣布让步，可这确实是极大地增加了远乡王国政权的稳定性。"
SFH_demonstrators:0 "示威者"
SFH_demonstrators_desc:0 "示威者的暴动席卷全国，政府虽然会制止其中的极端分子，可大多数情况下不会阻止示威者，希望他们能靠示威来发泄发泄情绪。"
SFH_repressing_people:0 "镇压民众"
SFH_repressing_people_desc:0 "某些人似乎是好日子过得太久，不知道世间残酷了。情枪杆子会教会他们如何行事。"
SFH_military_control:0 "军事管制"
SFH_military_control_desc:0 "直接派出军队以应对政权的敌人比起费老大劲采取什么改革简单多了，实际上，考虑到许多贵族都支持这一行动，在个别地区展开军事行动以维持政权稳定会是不错的主意。"
SFH_totalitarian_rule:0 "强权统治"
SFH_totalitarian_rule_desc:0 "远乡王朝不应该做出没有意义的让步，也没有义务考虑他人的想法，为了国家的稳定和未来，强权政治会是不可避免之举。"
SFH_arrogant_revolutionaries:0 "气焰嚣张的革命党人"
SFH_arrogant_revolutionaries_desc:0 "随着国王的身体抱恙，许多曾经将自己隐藏起来的革命党人或是其支持者重新浮出了水面。他们可能是一般的民众，可能是高级军官，甚至可能是国王身边的助理。这些人不断地破坏着远乡王国的稳定，并且持续不断地吸引更多的普通人加入到他们的行列。"
SFH_negotiations_with_revolutionaries:0 "同革命党人谈判"
SFH_negotiations_with_revolutionaries_desc:0 "虽然说服那些已经拿起枪杆子的革命疯子放下屠刀在很大程度上是不可能的，争取同温和派的革命党人合作，赢得他们的好感可以为未来的改革铺垫，增加政府的合法性。"
SFH_arresting_dissidents:0 "抓捕异见者"
SFH_arresting_dissidents_desc:0 "有些革命党人虽然在立场上相对温和，可我们没有时间拉拢每一个潜在的非敌对分子。想发言当然可以，先进局再说吧。"
SFH_working_with_moderate_reformers:0 "同温和改革者合作"
SFH_working_with_moderate_reformers_desc:0 "虽然同“前革命党”中的温和改革者合作会让政府显得有些软弱，但这能极大地提升总体的社会稳定性。"
SFH_siege_of_revolutionary_party:0 "围剿革命党"
SFH_siege_of_revolutionary_party_desc:0 "虽然我们暂时没有能力直接派兵围剿革命阵线的根据地，但消灭他们邪恶触手散布在全国各地的分部是完全可以做到的。经过几轮围剿，相信这帮赤匪只得夹着屁股灰溜溜的跑回山里。"
SFH_suppression_of_industrial_oligarchs:0 "打压工业寡头"
SFH_suppression_of_industrial_oligarchs_desc:0 "同工业寡头们的合作本身就是政府向这群人的一大让步，可他们非但没有因此感谢我们，反而得寸进尺，甚至反咬我们一口。这样的局面必须被终止！"
SFH_cooperation_with_industrial_oligarchs:0 "同工业寡头合作"
SFH_cooperation_with_industrial_oligarchs_desc:0 "虽然目前来看好处甚微，但同工业寡头的合作会成为远乡王国境内工业发展的一大助力，只要我们能确保好什么能干，什么不能干。"
SFH_oligarch_exit_shock:0 "寡头退市冲击"
SFH_oligarch_exit_shock_desc:0 "由于工业寡头遭到来自政府的打击，市场在短时间内陷入了混乱，不过这场闹剧持续不了多久。"
SFH_more_free_market:0 "更自由的市场"
SFH_more_free_market_desc:0 "随着寡头遭到了全面打击，远乡王国的市场进入了一个更加繁华且自由的时代。"
SFH_deformed_economy:0 "畸形的经济"
SFH_deformed_economy_desc:0 "远乡王国畸形的经济在政府陷入混乱后进一步对我国的经济现状造成了影响，情况并不乐观。"
SFH_agricultural_trade:0 "农业贸易"
SFH_agricultural_trade_desc:0 "为了应对农业体系羸弱的现状，远乡政府引入了一系列政策以改善现状，维持稳定或是鼓励未来发展。"
SFH_industrial_miracle_of_farhome_idea:0 "远乡产业奇迹"
SFH_industrial_miracle_of_farhome_idea_desc:0 "虽然听起来十分不可思议，但在几乎不可能的情况下，我们成功掀起了一场全新的经济浪潮。尽管这远不及当年国家昌盛的年代，可相较过去数年的苦痛，这已经是不可多得的理想状况了。"
SFH_suppression_of_landlords:0 "打压地主"
SFH_suppression_of_landlords_desc:0 "阻挡在现代化和远乡王国之间的巨大鸿沟便是遍布全国的地主乡绅。他们的时代必须被终结。"
SFH_consultation_with_landowners:0 "同地主协商"
SFH_consultation_with_landowners_desc:0 "尽管土地改革本身势在必行，我们还是应当谨慎行事，确保不会激起众怒。"
SFH_success_in_landreforms:0 "土地改革的胜利"
SFH_success_in_landreforms_desc:0 "经过我们的不懈努力，土地改革终于取得了显著的效果，那些同政府对着干的地主乡绅不再可能占山为王，大量有价值的土地得以收归国有开发或是归于各地群众。"
SFH_people_in_terror:0 "恐慌的民众"
SFH_people_in_terror_desc:0 "随着人鱼亲善大使遭到暗杀，许多一般民众开始担心人鱼会因此同远乡决裂，造成新一轮经济萧条，或者在军事上进行严重打击。"
SFH_angry_mermaid:0 "爆发的人鱼"
SFH_angry_mermaid_desc:0 "随着人鱼亲善大使遭到暗杀，许多在远乡的人鱼公民开始质疑远乡政府的能力，出于人身安全的考虑，撤离资产，并停止经济上的援助。"
SFH_enhanced_security_measures:0 "加强各地安保措施"
SFH_enhanced_security_measures_desc:0 "作为暗杀事件的应对，我们应当加强各地的安保措施，尽管这无非是亡羊补牢，可长久以来足以建立群众对政府的信心。"
SFH_mermaid_corporate_evacuation:0 "人鱼企业撤离"
SFH_mermaid_corporate_evacuation_desc:0 "由政府所鼓励并组织的人鱼企业撤离在很大程度上造成了经济的动荡，不过这似乎在逐步减少人鱼对远乡王国的影响..."
SFH_jiangzhou_hostage_crisis_idea:0 "江洲人质危机！"
SFH_jiangzhou_hostage_crisis_idea_desc:0 "千算万算，也没有人能算到远乡社会最低贱的种群，亚人，居然会铤而走险，发动恐怖袭击以实现他们那所谓的政治诉求。虽然绝大多数人不把他们亚人本身放在眼里，可被当做人质要挟的孩童们可是确确实实的远乡子民的亲身骨肉。来自各个社会阶层的群体都走上街头，呼吁政府尽快采取措施拯救孩子们。"
SFH_well_organized_army:0 "组织良好的军队"
SFH_well_organized_army_desc:0 "虽然内战的爆发打破了我们许多预定上的计划，可这并不代表我们的军队从上到下会陷入任何程度的混乱。相反，这只有组织有纪律的现代化部队已经做好准备迎接国家的敌人了。"
SFH_army_in_chaos:0 "混乱的军队"
SFH_army_in_chaos_desc:0 "内战的爆发打破了许多预定上的计划，而军队正是其中一位。我们中的许多士兵和军官因为害怕内战而逃离军队，指挥链和补给系统则因为战争的爆发而陷入了混乱，这虽然不会持续太久，但目前来看仍十分致命。"
SFH_supportive_people:0 "支持战争的民众"
SFH_supportive_people_desc:0 "虽然内战的爆发引来了大量反对的声音，我们当初所做的帮助人们走出战争苦楚情绪的努力没有白费，许多公民自愿走上战场，为国而战。"
SFH_anti_war_people:0 "反对战争的民众"
SFH_anti_war_people_desc:0 "内战的爆发引来了大量反对的声音，许多公民对战争的记忆仍然停留在过去的大战，他们反对政府进行的军事政策，不配合军队的行动并拒绝服役。"
SFH_stable_society:0 "稳定的社会"
SFH_stable_society_desc:0 "虽然内战爆发一事确确实实板上钉钉，可远乡社会似乎并没有沦落到要因为一些局部冲突就陷入混乱的地步。多亏了我们的改革，百姓似乎对社会有了更加充分的信心，尽管这不意味着他们会来为我们一方摇旗呐喊，不需要处理混乱的各地城市已经是最大的帮助了。"
SFH_society_in_chaos:0 "社会陷入混乱"
SFH_society_in_chaos_desc:0 "不幸的是，由于社会方面的改革尚未完成，内战的爆发打破了各地社会体系的平衡，惶恐不安的民众四处逃散，无视政府的命令，社会稳定遭到了极大破坏，飙升的犯罪率更是令人头疼不已。"
SFH_solid_industrial_system:0 "牢固的工业体系"
SFH_solid_industrial_system_desc:0 "多亏了我们提前进行的工业改革，多数消费者与投资者对我国的产业有着充足的信心，即便内战爆发，大部分事项都如日常般运作。"
SFH_industrial_system_in_chaos:0 "工业体系陷入混乱"
SFH_industrial_system_in_chaos_desc:0 "尽管内战对工业体系的冲击是在预料之内的，很显然我们没能提前完善应对的措施。许多产业随着内战的爆发而陷入停滞，大量缺乏信心的投资者要么是撤回资本，要么连着资产一起跑路外国。"
SFH_attack_qingtian_army:0 "进攻青天军"
SFH_attack_qingtian_army_desc:0 "我们应当优先对青天军发动剿灭作战。"
SFH_coastal_attacks_by_mermaid:0 "沿海地区遭人鱼袭击"
SFH_coastal_attacks_by_mermaid_desc:0 "远乡政府军已经联络了人鱼部队在沿海地区对我们发动袭击，虽然这不会在战略意义上对青天军的统治造成什么危害，但依然对政权稳定造成了严重影响。"
SFH_clan_rebellion:0 "宗族叛乱"
SFH_clan_rebellion_desc:0 "远乡政府军收买了大量青天军统治领土下的宗族势力以反对统治，在正规军的武力面前，他们很显然是不堪一击的，但面面俱到同样是不可能的，我们将不得不忍受一段时间的政治动乱。"
SFH_attack_fever:0 "进攻狂热"
SFH_attack_fever_desc:0 "我们才是真正的青天，只有跟随远乡政府，才能见识到那些暴徒所永远无法提供的真正的社会正义与美好未来！"
SFH_attack_revolution_front:0 "进攻革命阵线"
SFH_attack_revolution_front_desc:0 "我们应当优先对革命阵线发动剿灭作战。"
SFH_recent_econ_blockout:0 "近期的经济封锁"
SFH_recent_econ_blockout_desc:0 "远乡政府军扩大了经济封锁的规模。"
SFH_burn_down_the_revolutionaries:0 "毁灭革命阵线"
SFH_burn_down_the_revolutionaries_desc:0 "所谓的革命理论无非便是暴徒们用于美化掩饰自身暴行的手段，而我们作为正义的一方应当尽快终结这一点！"
SFH_war_time_laws:0 "战时法律"
SFH_war_time_laws_desc:0 "战争时期的法律给予了政府更加的权力，虽然这在长久来看会严重损害政权稳定性，但在短时间内，我们得以利用这份权力去做我们想干的。"
SFH_civil_war_army:0 "内战军队"
SFH_civil_war_army_desc:0 "由于敌人恰恰是同国内的反对派，内战时期的军队享有更强大的防御能力，因为他们往往懂得对方的弱点。然而，并不是每个人都愿意轻松地向自己的同胞开火，而那些不愿意开火或是下狠手的士兵往往会成为部队的毒瘤。"
SFH_fight_against_antiwar_guys:0 "打击厌战情绪"
SFH_fight_against_antiwar_guys_desc:0 "随着战争的持续进行，我国内部的厌战情绪也在不断增长。可这些不识大局的民众并没有确切地意识到相信政府和其军队的重要性，我们应当采取一些行动帮助他们理解。"
SFH_war_time_propaganda:0 "战时宣传"
SFH_war_time_propaganda_desc:0 "我们应当向公众宣扬我们的正确性。"
SFH_weaker_opposition_civil_war:0 "反战情绪"
SFH_stronger_opposition_civil_war:0 "复仇怒火"

SFH_weak_army_dynamic_modifier:0 "无力的军队"
SFH_weak_army_dynamic_modifier_desc:0 "近期的军事报告已经揭露了远乡军队的悲惨现状。我们的部队不但相互之间缺乏协作性，同时无论是训练标准还是武器配备都是一等一的糟糕，相信字典很快就会在“落后”一词的注释中标注上远乡军队的名字。不过，即便情况是如此糟糕，这份报告似乎仍然有些可疑的地方，就让我们祈祷这份疑惑不会成真吧。"
SFH_modern_army_dynamic_modifier:0 "现代化远乡军队"
SFH_modern_army_dynamic_modifier_desc:0 "完成了现代化改革的远乡军队脱离了过去的缺点，现在的它不再需要恐惧弱小自己百倍的杂牌军，而是向着更高的目标进发！"
SFH_mermaid_influence_dynamic_modifier:0 "来自人鱼族的影响"
SFH_mermaid_influence_dynamic_modifier_desc:0 "尽管这并非我们想要看到的结果，如今的远乡王国依旧在方方面面依赖着来自人鱼族的援助。人鱼族的援助虽然会降低我国政府的威信，但这对我们的工业发展有一定的好处。不过，随着人鱼族在我国的影响力扩大，人民群众也会进一步地对这些享受超国民待遇的外国人表示不满，甚至是采取极端措施。为此，在民众的意见和人鱼族带来的好处之间平衡是很有必要的。\n\n§Y人鱼族的满意度可以为我们带来稳定度的加成；他们对我们的经济控制可以为我们带来工业发展和消费品的加成，尽管这意味着急速降低的稳定度和行政能力；群众的态度会直接影响我们的政治点数获得和政权稳定性，不满的人群会迫使我们增加消费品的开支。"

SFH_corrupted_army_dynamic_modifier:0 "腐败的军队"
SFH_corrupted_army_dynamic_modifier_desc:0 "虽然远乡陆军是皇室的坚强后盾，能在关键时期为国王的统治保驾护航。可代价是我们不得不默许军队内部的腐败行径，同时给予各级军官极大的自治权，允许他们自行管控军队。"

SFH_chaos_after_war:0 "战后余波"
SFH_chaos_after_war_desc:0 "残酷的内战已经结束，可它造成的损害依然遍布社会的方方面面，我们需要尽快采取行动，改变这一局势。"
SFH_motherland_is_coming:0 "远乡已至"
SFH_motherland_is_coming_desc:0 "来自远乡中央政府的援助可以极大地帮助我们进行这场战争。"
SFH_prepare_nwf_war:0 "备战西北"
SFH_prepare_nwf_war_desc:0 "我们需要准备对抗西北地区的战争，是时候开始了。"
SFH_nfh_war:0 "北方战争"
SFH_nfh_war_desc:0 "郑义的拒绝是对我们和远乡人民的背叛，国家的分裂将会在我们的手上彻底终结！"
SFH_msa_war:0 "人鱼特区战争"
SFH_msa_war_desc:0 "我们需要准备对抗人鱼特区的战争，是时候开始了。"
SFH_hunting_down_guerrillas:0 "追杀乡村游击队"
SFH_hunting_down_guerrillas_desc:0 "许多自由联军的军官潜入乡村，组织游击队发动后方战争，我们必须停止这一切。"

SFH_mermaid_business:0 "人鱼企业"
SFH_mermaid_business_desc:0 "人鱼企业已重新正常入驻远乡市场，不过，这次他们必须按照我们的规定办事。"

SFH_reorganize_northern_gov:0 "重组北方政府"
SFH_reorganize_northern_gov_desc:0 "我们正在重组北远乡地区的中央政府，相信这可以帮助我们尽快平定北方局势。"

SFH_rebuild_farhome_navy:0 "重建远乡海军"
SFH_rebuild_farhome_navy_desc:0 "远乡海军在过去的几十年里一直处于荒废的状态，在实现国家统一后的今天，我们得以将物资和精力投入到重建我国海军上。"

SFH_new_born_navy:0 "新生的远乡海军"
SFH_new_born_navy_desc:0 "经过我们数个阶段的不懈努力，我们得以在重建海军进程的某一方向取得了不小的成功，同时可以挺起胸膛，向世界宣告，远乡也有一支称得上道的现代化的海军！"

SFH_rebuild_farhome_air_force:0 "重建远乡空军"
SFH_rebuild_farhome_air_force_desc:0 "远乡空军在过去的几十年里一直处于荒废的状态，在实现国家统一后的今天，我们得以将物资和精力投入到重建我国空军上。"

SFH_new_born_air_force:0 "新生的远乡空军"
SFH_new_born_air_force_desc:0 "经过我们数个阶段的不懈努力，我们得以在重建空军进程的某一方向取得了不小的成功，同时可以挺起胸膛，向世界宣告，远乡也有一支称得上道的现代化的空军！"

SFH_regaining_our_territories:0 "重夺我们的土地！"
SFH_regaining_our_territories_desc:0 "贪婪而无耻的外国侵略者夺走了麟人世世代代所生活的土地，他们自以为是地认为我们将就此一蹶不振——我们会证明他们错了。直到所有属于远乡的领土都被彻底夺回为止，我们将不糊停下脚步。向着国家的真正统一前进！"

SFH_battle_for_territories:0 "为夺回领土发动进攻"
SFH_battle_for_territories_desc:0 "为了夺回属于我们的领土，向前进！"

