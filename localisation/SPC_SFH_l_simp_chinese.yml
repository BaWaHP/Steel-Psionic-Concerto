SFH_preparation_up:0 "准备度上升"
SFH_preparation_up_desc:0 "经过我们一段时间的努力，国家对新女王的继任准备度上升了。"
SFH_preparation_up_tr:0 "准备度已达100%"
SFH_preparation_up_tt:0 "准备度：§Y+5%§!"

SFH_land_integration_decisions:0 "领土整合"
SFH_land_integration_decisions_desc:0 "随着我们收复了曾经被夺走或是交由他人统治的领土，是时候重新整合对应土地了。\n\n§g随着局势的变化，我们所能整合的领土也会产生变动。§!"
SFH_integrate_states:0 "整合[FROM.getName]"

SFH_expansion_decisions:0 "对外事务"
SFH_expansion_decisions_desc:0 "随着远乡王国再统一的结束，我们终于得以将目光投向边境线之外的世界。无论是为了夺回我们因战争而失去的领土，还是为了保障国家的未来，以和平或暴力的方式对外采取多种外交，军事行动——我们都可以在这里实现。尽管如此，许多事物并非一蹦而就，我们仍然需要在其它方面付出一定的努力，包括做出一些艰难的决定，最终才得以在这里采取行动。\n\n§g随着局势的变化，我们所能采取的行动也会产生变动。§!"

SFH_ask_northwest_territory:0 "向[FROM.GetName]索取西北地区领土"
SFH_ask_northwest_territory_desc:0 "[FROM.GetName]占据了我们在东巴大战中失去的领土，是时候向他们要回来了。"
SFH_ask_southwest_territory:0 "向[FROM.GetName]索取西南地区领土"
SFH_ask_southwest_territory_desc:0 "[FROM.GetName]占据了我们在东巴大战中失去的领土，是时候向他们要回来了。"

SFH_invade_foreign_nations:0 "入侵[FROM.GetName]领土"
SFH_invade_foreign_nations_desc:0 "[FROM.GetName]如今在强盛的远乡军队面前显得不堪一击，为了实现国家的伟大复兴理想，我们必须开门出击！"

SFH_liberate_foreign_nations:0 "解放[FROM.GetName]"
SFH_liberate_foreign_nations_desc:0 "[FROM.GetName]的存在已经对当地人民和远乡造成了严重的威胁，我们必须出兵结束这一切。"

SFH_invate_foreign_nations:0 "邀请[FROM.GetName]加入阵营"
SFH_invate_foreign_nations_desc:0 "我们可以邀请[FROM.GetName]加入我国阵营，共同为未来的地区安全做出努力。"

SFH_declare_territories:0 "向外国宣称领土"
SFH_declare_territories_desc:0 "为了实现国家的复兴与扩张，我们将宣称外国的领土，从而保护当地的麟人。\n§g如果您不小心把宣称的领土交给了傀儡，之后也会有决议索取。§!"
SFH_declare_territories_tt:0 "§Y宣称的领土范围会随着我们先前做出的选择而改变！§!"
SFH_declare_territories_tt_1:0 "§Y我们会宣称边境线向外一圈的领土。§!"
SFH_declare_territories_tt_2:0 "§Y我们会宣称边境线向西，直到吉拉尼亚西部边境的领土。§!"
SFH_declare_territories_tt_3:0 "§Y我们会宣称边境线向北，直到沃姆势力圈与北巴斯蒂亚接壤处的领土。§!"

SFH_demand_cliamed_territories:0 "向[FROM.GetName]索取领土"
SFH_demand_cliamed_territories_desc:0 "[FROM.GetName]作为我们的傀儡，“不小心”地占据了我们所宣称的领土。我们理应要回来。"

SFH_rebuild_nation_tt:0 "§Y请注意，根据当前远乡意识形态的不同，最终重建的结果也会有所不同！§!"

SFH_aftergame_decisions:0 "南远乡战后决议"
SFH_aftergame_decisions_desc:0 "恭喜你啊，打完了游戏，或者你可能在帮忙测试这部分决议。无论如何，这里是用来挑起第二次东巴大战的决议，天生万物以养人，人无一物以报天..."
