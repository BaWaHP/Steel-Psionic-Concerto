SFH.1244.t:0 "特区的终结"
SFH.1244.d:0 "看什么看，没写完呢！"
SFH.1244.a:0 "好。"
SFH.1244.b:0 "不好。"

SFH.1245.t:0 "人鱼同意了我们的提案！"
SFH.1245.d:0 "“…因此，贵方的请求得到了我方的一致认可，白洋海人鱼一族始终致力于和远乡王国达成合作共荣的局势，在这方面，我们十分感激贵方在特区问题上的理解和支持…”\n\n孙有胜看着眼前的公文，顿时感到如释重负。过去的几周对他而言显然是职业生涯中最痛苦的一段时间，无比紧张的切磋和成千上万份要考虑的文件，远远超出了孙有胜最开始对自己这份职业的预期——可考虑到最后他和他的团队所实现的成就，一切的付出仿佛都有了意义，现在，以某种形式，人鱼特区已经重新回到了远乡的旗帜之下。\n\n孙有胜看向窗外欢呼的人群，由于条约签订前，政府就和媒体通了气，这也在预期之内。人民欢呼雀跃，这让孙有胜的内心也激起一阵暖流，他突然想起了已有数年未见的父母，不知道他们在老家还好吗？自己现在横竖也算是能载入史册的国家英雄，偶尔回下家，给老人家涨涨面子也是好事儿。\n\n说罢，孙有胜把整理好的公文堆在一起，塞进包里。他接下来需要先去一趟平京汇报会谈的结果，不过大部分资料早就用电报送过去了，他过去这趟也只是走个过场，顺便拿个表彰。一想到可能存在的巨额奖金，孙有胜就感到一阵激动。"
SFH.1245.a:0 "之后，我要回老家吃两顿好的…"

SFH.1246.t:0 "人鱼同意了我们的提案！"
SFH.1246.d:0 "“…因此，贵方的请求得到了我方的一致认可，白洋海人鱼一族始终致力于和远乡王国达成合作共荣的局势，在这方面，我们十分感激贵方在特区问题上的理解和支持…”\n\n孙有胜看着眼前的公文，顿时感到如释重负。过去的几周对他而言显然是职业生涯中最痛苦的一段时间，无比紧张的切磋和成千上万份要考虑的文件，远远超出了孙有胜最开始对自己这份职业的预期——可考虑到最后他和他的团队所实现的成就，一切的付出仿佛都有了意义，现在，以某种形式，人鱼特区已经重新回到了远乡的旗帜之下。\n\n孙有胜看向窗外欢呼的人群，由于条约签订前，政府就和媒体通了气，这也在预期之内。人民欢呼雀跃，这让孙有胜的内心也激起一阵暖流，他突然想起了已有数年未见的父母，不知道他们在老家还好吗？自己现在横竖也算是能载入史册的国家英雄，偶尔回下家，给老人家涨涨面子也是好事儿。\n\n说罢，孙有胜把整理好的公文堆在一起，塞进包里。他接下来需要先去一趟平京汇报会谈的结果，不过大部分资料早就用电报送过去了，他过去这趟也只是走个过场，顺便拿个表彰。一想到可能存在的巨额奖金，孙有胜就感到一阵激动。"
SFH.1246.a:0 "之后，我要回老家吃两顿好的…"

