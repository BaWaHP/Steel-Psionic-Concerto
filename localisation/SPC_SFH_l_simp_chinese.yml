SFH_ZhengJun_idea:0 "“郑十一世” 郑钧"
SFH_ZhengJun_idea_desc:0 "国王郑钧的统治已是过去式，随着郑红的登基，老国王开始退居幕后，为巩固郑红的国度而战。许多人指责老国王的懦弱，以及在过去犯下的种种恶行，郑钧则一声不吭地接下了这些指责，他年事已高，不再有能力管理朝廷，不如尽自己最后的微薄之力，为国家稳定而奋斗。§R即便这意味着自己的千古恶名。§!"

###领导人###
SFH_ZhengJun:0 "“郑十一世” 郑钧"
SFH_ZhengJun_desc:0 "郑钧不是一代明君，也不是什么昏庸的蠢货。被人们称为“郑十一世”的他从继位的那一刻起就不得不挑起保卫远乡王国的梁子。当世界大战的硝烟席卷巴斯蒂亚大陆时，他的父亲却因打猎时的意外过世，尚且年轻的郑钧则不得不临时加冕成新一任国王。世界大战开始时，巴斯蒂亚大陆绝大多数国家都陷入了一片混乱，虽然远乡王国远离前线的地理位置使得它没有像其它国家一样面临部队被成建制的毁灭的命运，中巴斯蒂亚联邦崩溃所带来的席卷整个巴斯蒂亚大陆的经济危机可不是闹着玩的。\n\n上台初期的郑钧不得不采取极端措施来应对经济危机，这也使得他在民众心中的形象一落千丈。从最底层的农民到掌握着商贸大权的贵族阶级，基本上没有人不觉得郑钧是个混蛋。于全国各地爆发的叛乱进一步印证了这点，不得不采用暴力手段镇压民众的郑钧进一步恶化了远乡王国的稳定，加剧了混乱。\n\n当可怕的世界大战结束后，为了换取南方贵族们的支持，郑钧听取了其它贵族的建议并废除了由他父亲采取的部分民主化措施，同共和党人们不成文的规定也被彻底忘之脑后，可以说，郑铭的努力几乎全部付诸东流。尽管郑钧希望延续父亲的部分政策以维持远乡王国的稳定性，他并没有足够强的权力以摆脱贵族的影响，更别说采取会激怒他们的行动了。\n\n沃姆帝国的入侵进一步恶化了局面，他儿子郑义在北方建立的自治领也使得郑钧在贵族和群众中的威望进一步降低。有时候，就连郑钧自己也搞不明白，可能属于他的时代早已经随着世界大战和东巴斯蒂亚大战结束了吧。 "
SFH_ZhengHong:0 "“郑十二世” 郑红"
Get_future_Zhenghong_desc_1:0 "就同她爷爷意外过世的糟糕时机一样，郑红同样生不逢时。她出生的时候，东巴战争如火如荼，远乡王室的威望则跌入历史最低点。当郑钧焦头烂额的处理他父亲的遗产以及全国各地的叛乱时，郑红的母亲意外离世，而她的兄长也在数年后离开南远乡地区，只留下郑红一人在空荡荡的宫殿里度过孤寂的童年。即便是在最支持皇室的忠诚派眼中，郑红也不是能挑起远乡大梁的人，且不论性别上的问题，郑义过于两眼的表现和郑钧糟糕的执政水准使得王室的改革道阻且艰，就算郑红注定接过权柄，她大概也会成为新的橡皮图章。\n\n然而，郑红并非轻易放弃的人。或许是麒麟降下法咒，又或许是稚嫩地对现状的叛逆，郑红抓住了每一个接受教育的机会。同她那些愿意做大家闺秀的同龄人不同，郑红想尽办法说服了宫廷内支持她的贵族们以帮助自己进一步了解这个国家，以及统治它所要做出的准备。在学习的过程中，郑红对如何统治这个国家的想法产生了变化。\n\n当时代的风波一点一滴地将郑红从大殿孤单而昏暗的幕后拉到名为“改革”的台前，郑红和他那终于决定要做点事实的父亲达成了共识——君主的时代已然结束，唯有人民的声音才得以帮助远乡走向未来。皇室权威的衰弱并非仅仅是郑家错误的决策，它更代表了时代的潮流和人民的呼声，为了保护远乡王国的宝贵遗产不会被食利阶级所侵害，同时也为了保卫郑家的存续，郑红决心要再一次准备远乡王国的民主化改革。这一次，远乡不会再失败了。"
Get_future_Zhenghong_desc_2:0 "就同她爷爷意外过世的糟糕时机一样，郑红同样生不逢时。她出生的时候，东巴战争如火如荼，远乡王室的威望则跌入历史最低点。当郑钧焦头烂额的处理他父亲的遗产以及全国各地的叛乱时，郑红的母亲意外离世，而她的兄长也在数年后离开南远乡地区，只留下郑红一人在空荡荡的宫殿里度过孤寂的童年。即便是在最支持皇室的忠诚派眼中，郑红也不是能挑起远乡大梁的人，且不论性别上的问题，郑义过于两眼的表现和郑钧糟糕的执政水准使得王室的改革道阻且艰，就算郑红注定接过权柄，她大概也会成为新的橡皮图章。\n\n然而，郑红并非轻易放弃的人。或许是麒麟降下法咒，又或许是稚嫩地对现状的叛逆，郑红抓住了每一个接受教育的机会。同她那些愿意做大家闺秀的同龄人不同，郑红想尽办法说服了宫廷内支持她的贵族们以帮助自己进一步了解这个国家，以及统治它所要做出的准备。在学习的过程中，郑红对如何统治这个国家的想法产生了变化。\n\n当时代的风波一点一滴地将郑红从大殿孤单而昏暗的幕后拉到名为“改革”的台前，郑红和他那终于决定要做点事实的父亲达成了共识——君主的时代已然结束，可远乡还未准备好迎接未来。无论是从革命党，邪教叛军的角度出发，还是从错综复杂且危险丛生的国家角度来看，远乡仍然需要强权的引导——最合适的人选自然是远乡王室。君主和议会共同治理国家的情形在巴斯蒂亚并不罕见，郑红决心要保卫国家的遗产，这需要她和每一个麟人的共同努力。"
Get_future_Zhenghong_desc_3:0 "就同她爷爷意外过世的糟糕时机一样，郑红同样生不逢时。她出生的时候，东巴战争如火如荼，远乡王室的威望则跌入历史最低点。当郑钧焦头烂额的处理他父亲的遗产以及全国各地的叛乱时，郑红的母亲意外离世，而她的兄长也在数年后离开南远乡地区，只留下郑红一人在空荡荡的宫殿里度过孤寂的童年。即便是在最支持皇室的忠诚派眼中，郑红也不是能挑起远乡大梁的人，且不论性别上的问题，郑义过于两眼的表现和郑钧糟糕的执政水准使得王室的改革道阻且艰，就算郑红注定接过权柄，她大概也会成为新的橡皮图章。\n\n然而，郑红并非轻易放弃的人。或许是麒麟降下法咒，又或许是稚嫩地对现状的叛逆，郑红抓住了每一个接受教育的机会。同她那些愿意做大家闺秀的同龄人不同，郑红想尽办法说服了宫廷内支持她的贵族们以帮助自己进一步了解这个国家，以及统治它所要做出的准备。在学习的过程中，郑红对如何统治这个国家的想法产生了变化。\n\当时代的风波一点一滴地将郑红从大殿孤单而昏暗的幕后拉到名为“改革”的台前，郑红却没能和他那终于决定要做点事实的父亲达成共识——君主的时代还没结束，至少目前来看，它还不能结束。这同样也是郑红向郑钧所妥协的。郑红并不打算追赶自己兄长的道路，可当下的局势来看，她似乎选择不多。远乡军队正在皇室的领导下动员起来，新秩序即将到来。"

###将领###

###内阁###
SFH_LiGuan:0 "李冠"
SFH_LiGuan_desc:0 "作为西海岸最为出名的新时代工业巨头，李氏工业的继承人，李冠虽然没有了其父亲的油嘴滑舌，却多了一份阴险狡诈。他并没有太强的从政能力，大多数人对他的评价也是不如父亲，可他凭借着自己不怕下狠手的性格帮助李氏工业快速扩张，从一开始的西海岸造船业，到如今渗透了进了从军工，钢铁到煤油等一系列支柱产业，绝对少不了李冠本人的努力。他个人所留下来的黑历史数不胜数，背地里干的肮脏勾当更是多如牛毛——有人说他贩毒，也有人说他倒卖军火，还有人说他泄露国家机密——可那些文档往往会以比被沉入海底的记者下沉更快的速度在烈火中化作一团灰烬。干事不留痕迹也是李冠的特色。\n\n如今，李冠凭借着自己工业巨头的身份渗透了进了远乡政府。他在工业上对远乡的协助的确是多多益善的，然而，这一切都是建立在他不会用自己对政府的影响力去扩张他那些不正当的勾当的前提上——而这则在很大程度上是痴人说梦。"
SFH_WangYigong:0 "王一公"
SFH_WangYigong_desc:0 "当人们提起王一公这个人的时候，首先进入脑海的会是什么？是他这人的夸夸其谈？是他每年都会在乡间举办的乡绅派对？还是他那副巨大无比的肚腩？王一公是南远乡地区势力最为庞大的地主之一，同其它几位贵族不同，王一公性格豪爽且对金钱上的事务没有那么斤斤计较，他时常会举办邀请各地富农和贵族参与的大型派对，并且对美食情有独钟，愿意在这些事务上花大手笔。\n\n然而，随着远乡王国经济的不断低迷，王一公似乎再也不能做他快乐的甩手掌柜了。他虽然个性豪爽，可能力欠佳，他的家族留给他的遗产正随着时间的流逝而骤减。他的保守思想使得他不断受人诟病，而他作为贵族的影响力也正不断地被其他人所削弱。靠着家族老一辈的交情，王一公仍能在远乡政府留有一席之地，为了扭转当下不利的局面，王一公会不择手段。"
SFH_LiuQi:0 "刘琦"
SFH_LiuQi_desc:0 "如果问远乡王国除了李氏工业，还有哪家是著名的工业巨头，那定然是少不了刘琦的名字。刘家同新崛起的李家不同，刘家在古时候就是远乡王国著名的自然资源承包商，从包括煤铁铜在内的矿业到伐木业等一系列原材料工业都少不了刘家的身影。虽然家族在几百年前没落，凭借着在中巴斯蒂亚开发的机会，刘琦在过去的几十年里带领刘家走向了新的辉煌。\n\n然而，如今的刘琦已经步入暮年。虽然他自认为风范不减，可就连他的子女都不再认可他的能力。自认为是实干家的他在社会上的评价却是“老掉牙的煤老板”，他旗下产业恶劣的工作环境，糟糕的安全标准和老旧的工具都饱受舆论诟病。可即便如此，刘琦依然凭借着自己在远乡政府中强大的影响力施加着影响，为自己的家族产业保驾护航。"
SFH_LiuSui:0 "刘遂"
SFH_XuSheng:0 "徐胜"
SFH_XuSheng_desc:0 "作为远乡贵族群体中最具有话语权的人之一，心狠手辣的徐胜在他几十年的生命中逐渐从一个低等级的贵族爬上了这个阶级的顶端。他的父亲曾是一名没落了贵族军官，他的母亲则是一名侍女。徐胜从小便生活在极其恶劣的环境里，被流放到农村的他不得不跟随母亲辗转四方以求生存。直到他母亲去世为止才得知自己身世真相的徐胜花了多年的时间才夺回了自己应有的地位，立志要往上爬的他不惜一切代价扩大着自己的权力。\n\n如今，在贵族界如日中天的徐胜将目光投向了远乡王国的王位。作为贵族派的代表人物，他所能对政府采取的影响是举足轻重的，假如没有人站出来阻止他的野心，或许，他会彻底改变远乡王国的局面…"
SFH_HaungQiu:0 "黄秋"
SFH_XueQingshan:0 "薛庆山"
SFH_WangShengwu:0 "王胜武"
SFH_MingXiang:0 "明祥"
SFH_ZhangYaowu:0 "张耀武"
SFH_WangYue:0 "汪悦"
SFH_MingXin:0 "明鑫"
SFH_ZhouGongli:0 "周公理"
SFH_ZhouGongli_desc:0 "作为贵族中的后起之秀，周公义的兄长的周公理走上了同自己弟弟截然不同的道路。青年时期，周公理并没有像周公义一样选择出国深造，相反，他选择留在王宫为国王效力，就像他祖祖辈辈所做的那样。作为王宫内出名的国王忠诚派头子，周公理一直以来都在试图稳固国王的权力并确保远乡王国不至于沦为贵族的娱乐场。可悲的是，他的努力并没有起到什么实际上的效果。\n\n不过，周公理并不是一个会轻言放弃的人。同他的哥哥不同，周公理在政治上保持了中立，这使得他在各方派系间都能游刃有余的行动。虽然他目前还没有决定好要如何行动，但假如郑钧决定下狠手改变远乡王国的现状，周公理一定不会坐视不管的。"
SFH_ZhouGongyi:0 "周公义"
SFH_ZhouGongyi_desc:0 "作为远乡贵族群体中风评不好，却在民众中享有极高威望的贵族之一，含着银勺出生的周公义从小便展现出了同龄人所不具备的才能。从小接受精英教育的他享受了不亚于王国继承人的待遇，周游列国的他在小小年纪就取得了不小的成就。然而，原本应当在学术界大放光彩的周公义没有选择留在南巴斯蒂亚联邦，相反，在见识了巴斯蒂亚大陆的混乱和南巴斯蒂亚联邦的繁荣后，他决心回到自己的故乡，帮助远乡走出如今这片泥潭。\n\n然而，他的梦想很快便破灭了。大战后的远乡一片狼藉，停滞的经济，死气沉沉的城市，饿殍遍野的乡村地带，精致而利己的贵族，踩在远乡子民头上的人鱼，以及疲惫不堪但又无能为力的国王，周公义根本无从下手改变他的故乡。尽管如此，到了今天，周公义依然是远乡王国改革的热烈推崇者，他希望完成郑钧未能完成的民主化改革，让远乡走上类似南巴斯蒂亚联邦的道路以打破当下社会停滞的糟糕局面。"
