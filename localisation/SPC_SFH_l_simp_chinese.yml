SFH.1247.a:0 "之后，我要回老家吃两顿好的…"

SFH.1248.t:0 "人鱼拒绝了我们的提案！"
SFH.1248.d:0 "“…因此，贵方的请求被我们视作不可接受，我国政府在贵方的话语中看不到推进地区安全，共建人鱼-麟人社群繁荣的意愿，这对于我们双方而言都是无比遗憾的结果…”\n\n孙有胜一边读着眼前的公文，一边皱紧了眉头。随着谈判的破裂，局势正快速升温，他这样的非战斗人员已经接到了迅速撤回国内的命令。回想过去几周的紧张谈判，孙有胜常常会觉得自己是否哪里做错了，哪里做的不够好，以至于换得了这样的结局。当然，他的名字会在政府公文里被抹去，或者放到不显眼的角落，于情于理都不会有人责怪他——无非就是自大的人鱼铸造了自己的墓碑罢了。\n\n然而，这绝非他所愿。孙有胜看向窗外的军队，感叹战争的到来真是迅速——前一天还在桌子上谈判的双方，第二天就不在战场上拼个你死我活。由于预案的存在，军队早在谈判局势恶化的时候就开始了动员，现在看来还真是无比正确的决定。\n\n孙有胜突然想起了在故乡的父母，他们现在怎么样了？战争的阴云再一次笼罩远乡王国，局势很可能向着不妙的方向前进，他最好回一趟家。"
SFH.1248.a:0 "看来只能在战场上见了。"

SFH.1260.t:0 "无序的北远乡"
SFH.1260.d:0 "自古以来，北远乡地区始终都为猖獗的匪患以及农民起义所患。由于相对远离中央，生产力落后，民风彪悍，地理环境较差，北远乡地区在远乡国内始终被视作避之而不及的糟糕地带，即便是在经济稳中向好的时代也是如此。自远乡国内深陷经济危机后，虽然北方地区没有像南方一样受到直接的波及，可随着来自中央的支援进一步减少，以及为了减少行政开支而不得不下放到北方各地的自治权，北远乡地区的混乱始终是在增长而非缓和。\n\n在郑义不得人心的统治下，即便是北远乡地区的精英也揭竿而起反对他，更别说由于没能处理好匪患，而导致的农民起义了。在明面上代表了远乡中央的北远乡政府的威信几乎崩盘的当下，和平的解决方案似乎成为了遥不可及的理想。\n\n目前来看，我们需要进一步确认北方地区的当下局势，根据不同的状况来决定需要采取什么样的具体行动，从而维持国家领土的统一。"
SFH.1260.a:0 "让我们看看是怎么个事儿..."

SFH.1280.t:0 "内战援助"
SFH.1280.d:0 "看什么看，没写完呢！"
SFH.1280.a:0 "好。"
SFH.1280.b:0 "不好。"

SFH.1281.t:0 "郑义让步"
SFH.1281.d:0 "为了赢得内战，郑义向我们作出了让步。"
SFH.1281.a:0 "很好。"

SFH.1282.t:0 "郑义拒绝"
SFH.1282.d:0 "尽管大势已去，郑义依然不打算向我们让步。"
SFH.1282.a:0 "好吧。"

SFH.1300.t:0 "国王来信"
SFH.1300.d:0 "看什么看，没写完呢！"
SFH.1300.a:0 "好。"
SFH.1300.b:0 "不好。"

SFH.1301.t:0 "贵族同意"
SFH.1301.d:0 "贵族们同意了和平统一的计划，前提是他们的社会地位不变。"
SFH.1301.a:0 "好。"

SFH.1302.t:0 "贵族拒绝"
SFH.1302.d:0 "贵族们拒绝了和平统一的计划，看来他们是铁了心要造反了。"
SFH.1302.a:0 "给我等着..."

SFH.1320.t:0 "人鱼特区问题"
SFH.1320.d:0 "随着北远乡局势风云变幻，过去的白洋公约显然不再适用。我们是时候决定该如何处理这个象征着远乡耻辱历史的特区了。"
SFH.1320.a:0 "所有大陆省份都必须归还，他们可以留着那几个岛。"
SFH.1320.b:0 "特区必须被终结！"

SFH.1321.t:0 "让步与否？"
SFH.1321.d:0 "看什么看，没写完呢！"
SFH.1321.a:0 "我军败了！"
SFH.1321.b:0 "去你的！"

SFH.1322.t:0 "人鱼选择让步"
SFH.1322.d:0 "人鱼选择在条约修正上让步，我们赢了。"
SFH.1322.a:0 "太好了！"

SFH.1323.t:0 "人鱼拒绝让步"
SFH.1323.d:0 "人鱼拒绝在条约修正上让步，我们不得不同他们兵戎相见。"
SFH.1323.a:0 "别无选择。"

SFH.1340.t:0 "最后的请求"
SFH.1340.d:0 "看什么看，没写完呢！"
SFH.1340.a:0 "好。"
SFH.1340.b:0 "不好。"

SFH.1341.t:0 "郑义投降"
SFH.1341.d:0 "看来郑义已经意识到了他作为执政者的力量匮乏，他选择向我们让步。"
SFH.1341.a:0 "很好。"

SFH.1342.t:0 "郑义拒绝投降"
SFH.1342.d:0 "郑义拒绝了我们慷慨的提案，看来两国之间唯有一战。"
SFH.1342.a:0 "该死的。"

SFH.1400.t:0 "已经结束嘞！"
SFH.1400.d:0 "玩家您好，我是黑白平行，南远乡王国的开发者。目前为止，您已经游玩了所有南远乡王国有的内容。理论上来说，所有和南远乡王国相关的流程就到此为止了，希望您能玩的开心。如您所见，在后期国策内仍然有文本大量缺失或是质量层次不齐的情况，我们正努力补全。有BUG欢迎提出，远乡内容仍在测试阶段。"
SFH.1400.a:0 "彳亍口巴。"

SFH.1500.t:0 "顿恩之罪"
SFH.1500.d:0 "在惨痛的东巴大战后，为了换取来之不易的和平，我们不得不割让了一部分西北地区领土以换取沃姆帝国的退步。随后，为了实现沃姆那分裂戈尔维亚的狼子野心，我们的领土被莫名其妙地交给了一个不知所谓的“骑士团”来管理。在军政府的领导下，当地麟人苦不堪言，却无可奈何。我们必须收复这片领土，保护世代居住在那里的麟人们。"
SFH.1500.a:0 "如果他们到现在还觉得自己可以狐假虎威沃姆之名，那就大错特错了。"

SFH.1501.t:0 "远乡向我们索要领土！"
SFH.1501.d:0 "看什么看，没写完呢！"
SFH.1501.a:0 "好。"
SFH.1501.b:0 "不好。"

SFH.1502.t:0 "[FROM.GetName]同意了我们的要求！"
SFH.1502.d:0 "[FROM.GetName]在仔细思考利弊后，决定向我们交还西北地区领土。"
SFH.1502.a:0 "太好了！"

SFH.1503.t:0 "[FROM.GetName]拒绝了我们的要求！"
SFH.1503.d:0 "自大的[FROM.GetName]认为他们可以抵挡我国军队的洪流，拒绝了我们的要求。"
SFH.1503.a:0 "敬酒不吃吃罚酒！"

SFH.1520.t:0 "吉拉尼亚的贪婪"
SFH.1520.d:0 "作为站在沃姆一方，但又并非其仆从国的投机国家，水晶大公与他那些非人的，难以理解的水晶同胞们可谓是占尽了天时地利人和——他们成为了战争的胜利者，夺得了自己梦寐以求的和平与武装中立，却丝毫没有停下铁蹄的脚步。贪婪的他们选择吞并了我国西南地区的大量领土，同时还对当地的麟人采取了惨无人道的集中管理措施。我们必须尽快解救当地同胞。"
SFH.1520.a:0 "一群不是人的怪物罢了。"

SFH.1521.t:0 "远乡向我们索要领土！"
SFH.1521.d:0 "看什么看，没写完呢！"
SFH.1521.a:0 "好。"
SFH.1521.b:0 "不好。"

SFH.1522.t:0 "[FROM.GetName]同意了我们的要求！"
SFH.1522.d:0 "[FROM.GetName]在仔细思考利弊后，决定向我们交还西南地区领土。"
SFH.1522.a:0 "太好了！"

SFH.1523.t:0 "[FROM.GetName]拒绝了我们的要求！"
SFH.1523.d:0 "自大的[FROM.GetName]认为他们可以抵挡我国军队的洪流，拒绝了我们的要求。"
SFH.1523.a:0 "敬酒不吃吃罚酒！"

SFH.1540.t:0 "新的曙光"
SFH.1540.d:0 "在我们的努力下，远乡终于实现了真正的统一，击败了外敌并夺回了属于我们的领土！现在，是时候把目光投向更远的将来了..."
SFH.1540.a:0 "我们不会停滞不前！"

SFH.1560.t:0 "远乡邀请我们加入阵营！"
SFH.1560.d:0 "看什么看，没写完呢！"
SFH.1560.a:0 "好。"
SFH.1560.b:0 "不好。"

SFH.1561.t:0 "[FROM.GetName]同意加入我们的阵营"
SFH.1561.d:0 "[FROM.GetName]同意加入了我们的阵营！"
SFH.1561.a:0 "合作并进。"

SFH.1562.t:0 "[FROM.GetName]拒绝加入我们的阵营"
SFH.1562.d:0 "[FROM.GetName]拒绝加入我们的阵营！"
SFH.1562.a:0 "不知好歹..."

SFH.1750.t:0 "对外扩张事宜"
SFH.1750.d:0 "随着我们决定走向扩张之路，是时候决定我们该具体扩张多远了。"
SFH.1750.a:0 "适当地在确保领土周边安全即可。"
SFH.1750.b:0 "向西，朝着吉拉尼亚方向扩张！"
SFH.1750.c:0 "向北，我们要同北方地区接壤！"
SFH.1750.dd:0 "为什么不全面出击？"

SFH.1800.t:0 "我们的势力圈"
SFH.1800.d:0 ""
SFH.1800.a:0 "适当地采取武力措施也未尝不可。"
SFH.1800.b:0 "还是以和为贵啦。"

SFH.1850.t:0 "远乡孤立主义"
SFH.1850.d:0 ""
SFH.1850.a:0 "我们会守卫自己的疆界！"

SFH.2000.t:0 "重逢"
SFH.2000.d:0 "郑钧最近常常做梦，梦到自己的童年，梦到和蔼的父母，梦到死去的妻子，梦到小时候的郑义，郑红兄妹，梦到所谓“美好的过去”。这间隐藏在郊外的别墅将他从巴斯蒂亚无尽的战乱，痛楚中隔离开来。整个远乡只有他的医生，以及郑红本人知道他的位置，这是老国王的愿望。自从被诊断时日无多后，他便希望独自在乡野度过余生，而不是在平京的嘈杂中郁郁而终。\n\n可奇怪的是，昨晚他没做梦。\n\n郑钧招手让医生把自己搬到轮椅上，那个总是告诫自己注意身体，不要劳累的小伙子今天却一反常态，静悄悄地把郑钧搬到了轮椅上，带着他来到了别墅门口呼吸新鲜空气。太阳照耀不远处的麦田，远处的树林还能听到鸟儿的啼叫声，这让郑钧感到了一丝宽慰，那是一条条鲜活的生命名为远乡的土地上歌唱，这个古老国度焕发新春的最好证明。\n\n“你恨我吗？”一道声响将郑钧的思绪拉回现实，无尽的光辉中，无数次出现在他梦中的那张脸庞再次出现。他的父亲，郑铭开口道，“我没能改变远乡的政治体制，没能带领这个国家远离战争，将一个混乱与破败的国度甩给了你。”\n\n“我不恨你。”郑钧摇头道。老者的脸上闪过一丝愧疚，随后又为自豪填满。\n\n“你恨我吗？”一声轻语从他的身后传来，一双满是褶皱的手抚上的郑钧的肩膀，老人的声音温和而婉转，她是郑钧早已逝去的母亲。“我在你最需要我的时候撒手人寰，留下一个破碎的家庭，让你独守这个国家。”\n\n“哪怕天崩地裂，也不可能。”郑钧苦笑道。老人也笑了，随后消失在光中。\n\n“你恨我吗？”那是低沉而坚定的声音，郑钧一下就认出来了，这是他唯一的儿子，远乡王位最初的继承人。郑义缓缓说道，“我在你们最需要的时候转身离去，分裂了祖国，几乎将一切驶向万劫不复。”\n\n“我罪有应得。”郑钧点点头。郑义欲言又止，最后只是遗憾地摇摇头。\n\n“你恨我吗？”那是温柔而婉转的声音，郑钧猛抬头，看到了她。郑红站在光里，没有了十年前的稚嫩，而是多了一份坚定，“你会成为一代昏君，直到远乡历史的尽头也被人唾弃。这样的结局，你满意吗？”\n\n“我们成功了。远乡的未来得到了保障，而郑家的香火也不会就此断开，总有一天，我们的后代不必承受今日的苦楚。”郑钧点点头，“以前我不知道，但现在，这是我此生所愿。”一阵强光闪过，郑红消散在空中，一同消散的还有她脸颊上的泪水，万物回归寂静。\n\n而后，光越来越亮，几乎照得郑钧睁不开双眼。一声呢喃打破了寂静，老国王一瞬便认出了声音的来源，在他一生中听过的无数声响中，有他所喜欢的，厌恶的，尊敬的，愤慨的，但只有这一道声音，源于他毕生所爱。他呼唤出她的名字，那是自十余年前的最后一瞥，再也不曾相见之人的名字。"
SFH.2000.a:0 "老国王咽下了最后一口气。"
SFH.2000.tt:0 "§C自此，远乡的历史拉开了新的篇章。§!"

###新闻###
SFHNews.1.t:0 "远乡乱局？"
SFHNews.1.d:0 "近日，位于远乡王国的报道表明国王郑钧似乎因为某种原因陷入了昏迷，目前没有生命危险。尽管有传言认为郑钧的昏迷是人为的，官方报道称国王似乎只是“劳累过度”而“作息紊乱”最终导致了这场危机。虽然结合近日流传于远乡王国境内的关于反抗军起义的流言，许多人认为这标记了远乡皇室走向衰弱的开始，目前来看，远乡政府似乎仍然维持着正常的运转。\n\n自远乡王国现任国王郑钧继任以来，远乡王国境内混乱不断，暴力事件层出不穷。在先前对革命党人残酷镇压后，远乡王国似乎陷入了各方面的停滞。或许，这起事件将会是这个位于东巴斯蒂亚的古老王朝命运的转折点。"
SFHNews.1.a:0 "至少没打起来...现在还没。"
SFHNews.2.t:0 "远乡王国内战！"
SFHNews.2.d:0 "位于平京的远乡王国新闻办公室已经传回来报告，称郑钧已经开始动员军队前往军队“镇压匪患”，如其政府公文所称呼的那样。来自前线的记者报告称已经看到了来自此前分别自称为“南远乡革命阵线”和“青天军”的反政府武装势力对政府军的驻扎地发动袭击，双方交火并出现了一定的人员伤亡。似乎远乡王国混乱的政局即将确定下来——以内战的方式。\n\n许多专家推测这场内战将会很大程度决定这个国家的未来，无论胜者是谁，都将极大地改变前远乡政府的国家政策并展开轰轰烈烈的改革，而这对东巴斯蒂亚大陆的影响尚且需要时间来决定。"
SFHNews.2.a:0 "真的打起来了..."
SFHNews.3.t:0 "远乡内战结束"
SFHNews.3.d:0 "位于平京的远乡王国新闻报告处已经传回来报告，似乎爆发于远乡王国内的战争已经结束，最终的胜者则不出意料地是国王郑钧为代表的建制派。虽然自称为“革命阵线”和“青天军”的反政府武装力量曾一度占据上风，这几年由郑钧为代表的政府改革计划似乎起到了更大的效果，聚拢了人心，并使得政府成为了内战的胜利者。\n\随着国王宣布叛军的覆灭以及大规模的处刑活动，似乎没有什么势力可以继续反对国王的统治了。尽管如此，关于郑钧身体恶化的消息不胫而走，虽然其可靠性无从考究，可越来越多的证据已经指向国王的退位，似乎这个国家的政局还有未知的变数。"
SFHNews.3.a:0 "短暂的和平。"
SFHNews.4.t:0 "远乡内战结束"
SFHNews.4.d:0 "位于平京的远乡王国新闻报告处已经传回来报告，似乎爆发于远乡王国内的战争已经结束，最终的胜者则出乎意料地是曾一度被郑钧政府所称为的“叛军”。虽然双方没有正式承认这一点，由激进派革命党人构成的革命阵线和由右翼反对派构成的青天军组成的临时军事同盟似乎取得了针对远乡王国的全面胜利，二者将南远乡地区一分为二，剑拔弩张，似乎随着共同敌人的消失，新一场冲突会是在所难免的。\n\n与此同时，前代国王郑钧下落不明，目前尚不知遭到了哪一方的抓捕，但无论如何，他们一家作为皇室的权力似乎到此为止了。"
SFHNews.4.a:0 "什么时候才是个头啊！"
SFHNews.5.t:0 "远乡正制定宪法？"
SFHNews.5.d:0 "近期在远乡王国的政治活动已经证实了先前关于国王组织政治改革的传言，似乎这个国家的最高领导人在推行了一系列民主化改革的举措，并在近日召集了政治活动家以及宫廷要员共同商讨未来立宪的事宜。根据小道消息，国王似乎暂时不打算公布宪法的具体内容，其在内部的支持度也尚且未知。\n\n远乡王国在几十年前曾经推行过一次失败的民主化改革，有的人认为此次改革是郑钧希望延续其父亲未能完成的功业；也有人说，考虑到当代国王之前的政策风格，此次改革行为或许是为了在政治上向反对派妥协而非向民主国家的过渡。"
SFHNews.5.a:0 "政治作秀还是好时代？"
SFHNews.6.t:0 "远乡确立民主化改革"
SFHNews.6.d:0 "虽然几十年前由当代远乡国王之父推行的远乡民主化计划被宣告为灾难性的失败，其儿子，也就是如今的远乡王国国王，似乎不打算放弃父亲的计划，反而将其修修补补，并成功运用到了如今的远乡王国。先前该政权所采取的一系列包括立宪会议，官僚机构改革和社会舆论宣传似乎都成为了这一切的铺垫，政府办公室已经于今日宣告将会在未来的数年内巩固改革的进度，根据宪法建立起君主与议会的二元制度，并在全国范围内推行执政党的大选。\n\在新闻发布会上，记者们罕见地看到了郑钧国王本人的露面。而他本人也发表了一篇短暂的演讲。\n\n“随着这个世纪进入她的尾声，远乡王国也该选择走向全新的道路——一条不仅仅属于高台楼阁中的几个血统好的领导者，而是开放给世界上每一个人的道路。”"
SFHNews.6.a:0 "子承父业。"
SFHNews.7.t:0 "远乡宣告未来政改计划"
SFHNews.7.d:0 "远乡王国政府办公室昨日已于平京开办新闻发表会，宣布该政权在接下来数年的政治改革计划。虽然发言人声称由于国家局面尚且不够稳定，包括全国大选，开放政府议会等事宜会被推迟到国家安定后，不过，目前实施的包括鼓励新提前组党，小范围政治集会和改组行政机关等一系列政策不会被推迟，而是继续运行。\n\n郑钧在发布会的下午于平京举办演讲。他挥舞着双拳，斥责着被称为“国家敌人”的叛军，然后指责他们干涉了正常的政府运转流程，导致政治改革的运作十分艰难，但同时向听众们保证，“等一切安顿下来，远乡一定会在世纪末搭上现代化的列车。”"
SFHNews.7.a:0 "拖延时间。"
SFHNews.8.t:0 "远乡国王拒绝改革！"
SFHNews.8.d:0 "虽说由前代国王主导的政治改革被证明对于全远乡王国而言都是灾难性的，可鲜有人会预料到这一代国王，郑钧，居然会公开表示“未来短时间内不会有明确的政治改革”。在远乡王国各地，支持改革计划的革命党人和一般民众又一次走上街头，甚至是首都平京也布满了愈发愤怒的人群。然而，相较几十年前的那次，这次的政府军似乎早有准备，提前储存好的低杀伤性武器，包括催泪弹，电击枪和高压水枪在镇暴行动中亮相，大量抗议人群在短时间内就遭到了驱散，许多反对派领导人也遭到追捕。\n\n有观点认为郑钧此次的行动是出于对远乡王国内叛军不断的考虑才采取的高压政策，但也有观点认为压迫性的政府会进一步激化政权的动乱。不过，这些观点究竟是真是假，还需要在未来由时间定夺。"
SFHNews.8.a:0 "不是什么新鲜事儿。"
SFHNews.9.t:0 "人鱼远乡亲善大使遭暗杀！"
SFHNews.9.d:0 "来自白洋海人鱼族的政府发言人已经证实了先前关于驻扎于南远乡一带的人鱼亲善大使兼外交官，纽特·卡尔，在平京市进行演讲时遭到暗杀。凶手已被现场抓获，查证为当地一名普通男性市民，所使用的凶器为自己改装的火枪。虽然亲善大使被第一时间送往当地医院接受治疗，可仍然在数小时后宣告失血过多，不治身亡。\n\n此次事件又一次将人鱼和麟人的冲突摆上了台面。由于人鱼长久以来在远乡王国境内享有的超国民待遇，许多当地民众对人鱼抱有十分强烈的不满，而这次事件恐怕只是这份愤怒的又一次体现。愤怒的群众纷纷走上街头指责政府不作为，呼吁为为凶手平反；与此同时，有报告指出人鱼内部也爆发了抗议，呼吁人鱼方政府撤离对远乡的经济援助，让王国再度经历一次经济动荡。"
SFHNews.9.a:0 "看得出来是积怨已久。"
SFHNews.10.t:0 "江洲人质危机"
SFHNews.10.d:0 "出乎所有人的意料，一批持械恐怖分子于今日早晨突袭了一所位于南远乡地区江洲省的一所正在举办家校联欢会的中学，在残酷地屠杀了校内的保安后，将所有未能及时逃出去的师生接近1200名全体扣押在体育馆内，其中有近一半均为未成年人。仅有数十名师生及时逃出，剩下的则被恐怖分子作为人质扣押，大多数面临着脱水和饥饿的危险。截止到本文发布，已经有十二名人质因为脱水或反抗死在了校内。\n\n恐怖分子均为来自远乡中部山区的亚人游击队，其宣称因对远乡政府压迫性的种族政策不满而采取了此次行动，要求国王郑钧亲自出面承诺于国家境内实施完全的改革，保障非人类种族的权益，否则会在接下来的数日内按比例枪杀人质，不论老少。同时，恐怖分子让一名女人质将一盘录像带及一张纸条送出去，纸条上威胁道如果一名武装分子被击毙，他们将杀掉50个孩童；如果一人被伤，则将杀掉20个孩童作为报复。"
SFHNews.10.a:0 "国王，你他妈人呢？！"
SFHNews.11.t:0 "远乡国再统一"
SFHNews.11.d:0 "来自东巴斯蒂亚的消息已经证实了远乡国的统一，看来这个曾经失去威望的南方王国在诸多远乡政权中脱颖而出，在国王郑钧的带领下，通过战争或是磋商的手段逐步实现了国家的再统一。目前，新生的远乡王国正准备新女王，郑红的登基。据远乡方面消息，新政府计划继续先前被内战打断的政治改革计划，废除远乡的绝对君主制，由新的民主联合政府主导组织下一次大选，建立一个立宪君主国。\n\n随着远乡局势的稳定，许多国家都开始担忧这个新生的地区强权会持有何种外交态度。在数十年前爆发于东巴斯蒂亚惨烈的大战后，远乡王国向沃姆帝国，吉拉尼亚大公国等周边政权失去了面积庞大的土地，目前尚不知平京方面对此持何种看法。"
SFHNews.11.a:0 "东巴斯蒂亚的局势正快速变动…"
