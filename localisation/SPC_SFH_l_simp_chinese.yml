SFHNews.13.a:0 "东巴斯蒂亚的局势正快速变动…"

SFHNews.14.t:0 "远乡王国击败西北叛军"
SFHNews.14.d:0 "今日早些时候，远乡王国的部队突袭了海清城郊的军事基地，宣布摧毁了西北叛军的指挥系统。虽然叛军残部仍然在西北的乡村中挣扎，远乡王国已经取得了战略上的全面胜利。据悉，远乡国王将在明日发表一场演讲，表达对战无不胜的远乡陆军的赞赏与对平叛的决心。\n\n在二十年以前，由于内战和经济崩溃，远乡不得不将混乱的西北设为军事自治区，许诺了西北军部对西北的部分自治。而在三年前的进一步崩溃中，西北军部直接选择了脱离远乡王国独立。在目前仍不为人所知的政治斗争中，郑文钧成为了西北的最高领袖，并开始策划反攻远乡的疯狂计划。为何郑文钧能将西北军与西北人民洗脑，这仍然是一个未解之谜。\n\n根据远乡陆军发言人的声名，郑文钧已经在突袭行动中被击毙，西北军部众多指挥人员选择了向远乡投降。由于这场叛乱，远乡政府已经开始考虑放弃自治政策，将西北整合进入远乡的直辖体系。无论如何，西北叛乱的失败意味着远乡王国已经摆脱了崩溃。这对于国际社会会产生何种影响，只有时间能回答。"
SFHNews.14.a:0 "哈，我就知道区区西北不可能打过远乡。"
SFHNews.14.b:0 "理所应当。"

SFHNews.15.t:0 "远乡前国王逝世"
SFHNews.15.d:0 "来自平京的消息已经证实了远乡上代国王郑钧的死亡。据远乡官方通报，郑钧死亡系自然原因，他的晚年平静地在郊外度过，而非先前许多报道声称的在平京处理政务。郑钧逝世次日，远乡官方便在平京举办了隆重的国葬，远乡女王郑红本人也出席并发表了讲话。\n\n有人说，郑钧的逝世代表了一个时代的落幕，正如他本人所言，他作为君主的时代已经落幕。不过可以确定的是，以远乡女王郑红为核心的新一届王室政府将会继续执行郑钧的政策，进一步加强远乡王国内战后的复兴速度。同时，郑钧的去世也代表远乡王国正在向一个未知的方向前进。目前巴斯蒂亚大陆的其他国家已向远乡王国表达哀悼，虽然对于郑钧，远乡王国内的舆论依旧褒贬不一，但郑钧的去世对远乡王国来说无疑是一个损失。"
SFHNews.15.a:0 "将死之人已死。"

SFHNews.16.t:0 "远乡内战结束"
SFHNews.16.d:0 "位于平京的远乡王国新闻报告处已经传回来报告，似乎爆发于远乡王国内的战争已经结束，最终的胜者则出乎意料地是曾一度被郑钧政府所称为的“叛军”。虽然双方没有正式承认这一点，由激进派革命党人构成的革命阵线似乎取得了针对远乡王国的全面胜利，临时军事同盟的另一边，由右翼反对派构成的青天军则在内战的战火中消亡。\n\n与此同时，前代国王郑钧下落不明，目前尚不知遭到了哪一方的抓捕，但无论如何，他们一家作为皇室的权力似乎到此为止了。"
SFHNews.16.a:0 "什么时候才是个头啊！"

SFHNews.17.t:0 "远乡内战结束"
SFHNews.17.d:0 "位于平京的远乡王国新闻报告处已经传回来报告，似乎爆发于远乡王国内的战争已经结束，最终的胜者则出乎意料地是曾一度被郑钧政府所称为的“叛军”。虽然双方没有正式承认这一点，由右翼反对派构成的青天军似乎取得了针对远乡王国的全面胜利，临时军事同盟的另一边，由激进派革命党人构成的革命阵线则在内战的战火中消亡。\n\n与此同时，前代国王郑钧下落不明，目前尚不知遭到了哪一方的抓捕，但无论如何，他们一家作为皇室的权力似乎到此为止了。"
SFHNews.17.a:0 "什么时候才是个头啊！"

###决议###
SFH_influence_from_mermaid_flag:0 "人鱼族仍在同我方合作"
SFH_influence_from_mermaid_category:0 "来自人鱼族的影响"
SFH_influence_from_mermaid_category_desc:0 "定居在远乡王国东部名为白洋海的海域的人鱼族在伟大战争结束后一直同远乡保持着良好的外交关系。虽然受限于种族的原因，白洋海人鱼族一直没能进一步扩大其规模，也没能在陆地上建立起稳定的根据地。然而，他们凭借着优秀的经济实力和工业科技一直在东巴斯蒂亚地区施加影响，尤其是在我们的祖国。\n\n我们的公民已经对享受着超国民待遇的人鱼族感到不满，可我们的政权依然强烈依靠着来自人鱼族的援助。在我们实现真正的自给自足前，适当的屈服以满足人鱼族的需求会是不可避免的——试图摆脱人鱼族在我们身上长久以来施加的经济枷锁会是十分困难的。\n\n当前人鱼族对我们的满意度：[GET_SFH_mermaid_satisfaction]\n当前人鱼族对我们经济施加的影响：[?SFH_mermaid_influence_variable|Y%]\n我国公民对人鱼族的态度：[GET_SFH_people_satisfaction]"
SFH_confort_mermaids:0 "安抚人鱼族"
SFH_confort_mermaids_desc:0 "通过做出一定的让步，我们得以增加他们对我们的满意度。然而，这在我们的群众眼里会是软弱的表现，他们会对我们的政府失去信心。"
SFH_expand_mermaid_influence:0 "扩大人鱼族影响力"
SFH_expand_mermaid_influence_desc:0 "我们可以花费政治点数来扩大人鱼族在我国的影响力以发展工业。"
SFH_reduce_mermaid_influence:0 "打击人鱼族影响力"
SFH_reduce_mermaid_influence_desc:0 "打击人鱼族影响力会使得我们的政权更受欢迎，不过这是以人鱼族的支持为代价的。"
SFH_promote_cooperation:0 "鼓励合作"
SFH_promote_cooperation_desc:0 "通过鼓励我国公民同人鱼族的合作，我们可以在一定程度上促进两族间的和谐。"

SFH_gathering_storm_for_others:0 "风雨欲来"
SFH_gathering_storm_for_others_desc:0 "§g谨记：远乡王国距离一场全面内战已经不远了，在那之前我们不可能什么问题都解决，为了取得内战的胜利，我们必须尽全力扩大根据地，组织部队发起反击，并且为§R之后的事情§!做好铺垫。§!"

SFH_national_reformation:0 "南远乡王国改革"
SFH_national_reformation_desc:0 "郑钧的昏迷虽然不是致命的，但它依然揭露出了远乡王国的种种问题，也暴露了那些反对我们的政权的人。现在看来，一场轰轰烈烈的，从政治到经济的全方位改革会是不可避免的。虽然国王自己在意识到自己时日无多后下定决心要改变这个国家，然而，计划和现实往往会产生种种的出入。郑钧长久以来对政府缺乏影响力的情况使得他的改革决议寸步难行，尽管大多数官员都认可他作为一个国王的地位，但长久以来，似乎管事的并非国王，而是围绕在国王身边的远乡贵族，地主乡绅，工业寡头等等。如果国王想要推行改革，他便必须在采取行动前确保自己的地位，打击反对派的影响力以§Y提高自己的权威§!。\n\n	除此之外，改革本身也不会是一成不变的。有些改革政策可以更快起到效果，尽管从长远来看并不会带来太多改变；有些改革更倾向革命党人，有些改革则能为远乡皇室保住权力；有些改革更受群众欢迎，但它们价格不菲。§Y更倾向民众的改革会增加国王的威信，并使得更多领土在内战中支持我们一方。§!除此之外，改革还需要我们平衡政府内的权势。保守派的贵族会希望我们延续过去的政策，改革派的官员则抱有恰恰相反的想法，§R过于倾向于任何一派都会对我们的统治造成毁灭性的影响。§!\n\n当前国王的权威为：[GET_SFH_king_power]\n\n当前改革派贵族的权势为：[GET_SFH_reformist_power]\n\n当然保守派贵族的权势为：[GET_SFH_conservative_power]"
SFH_gathering_storm:0 "山雨欲来"
SFH_gathering_storm_desc:0 "§Y谨记：远乡王国距离一场全面内战已经不远了，在那之前完成全部的社会改革必然是不可能的，我们不得不推迟一部分改革路线以确保我们在内战中的优势。§!§R任何改革都必须进行到底才能在内战到来时为我们带来优势，否则它们很可能成为我们前进的阻力…§!"
SFH_gathering_storm_tt:0 "内战将爆发。"
SFH_reformist_coup:0 "改革派政变"
SFH_reformist_coup_desc:0 "改革派贵族已经无法忍受我们推行的政策，他们会采取任何可能的极端政策来阻止这一切！"
SFH_reformist_coup_tr:0 "§Y改革派权势低于90§!"
SFH_reformist_coup_tt:0 "§Y改革派贵族将发动政变！§!"
SFH_conservative_coup:0 "保守派政变"
SFH_conservative_coup_desc:0 "保守派贵族已经无法忍受我们推行的政策，他们会采取任何可能的极端政策来阻止这一切！"
SFH_conservative_coup_tr:0 "§Y保守派贵族态度为§!"
SFH_conservative_coup_tt:0 "§Y保守派贵族将发动政变！§!"
SFH_reformist_cooling_down:0 "改革派贵族情绪缓和"
SFH_reformist_cooling_down_desc:0 "对我们抱有怒火的改革派贵族已经开始冷静下来，他们对我们的不满会逐渐降低。"
SFH_reformist_cooling_down_tr:0 "改革派贵族态度大于§O公开反对§!"
SFH_conservatist_cooling_down:0 "保守派贵族情绪缓和"
SFH_conservatist_cooling_down_desc:0 "对我们抱有怒火的保守派贵族已经开始冷静下来，他们对我们的不满会逐渐降低。"
SFH_conservatist_cooling_down_tr:0 "保守派贵族态度大于§O公开反对§!"

SFH_hold_speeches:0 "举办演讲"
SFH_hold_speeches_desc:0 "利用无线电台，郑钧可以发表一些演讲来拉进与国民的距离。"
SFH_supress_the_opposition:0 "压制不满人士"
SFH_supress_the_opposition_desc:0 "对我们的反对派出重拳可以让他们消停一段时间。"
SFH_concession_to_reformist:0 "向改革派贵族让步"
SFH_concession_to_reformist_desc:0 "通过牺牲一定的国王权威来向贵族让步，我们应该能让他们消停会儿。"
SFH_prefer_to_reformist:0 "偏好改革派贵族"
SFH_prefer_to_reformist_desc:0 "我们可以借由偏好某一派系来降低另一派系的影响力。"
SFH_sacrifice_reformist:0 "牺牲改革派贵族权益"
SFH_sacrifice_reformist_desc:0 "牺牲某一派系的贵族的权益可以为我们带来不小的好处，不过，他们很显然不会喜欢我们这么做。"
SFH_concession_to_conservatist:0 "向保守派贵族让步"
SFH_concession_to_conservatist_desc:0 "通过牺牲一定的国王权威来向贵族让步，我们应该能让他们消停会儿。"
SFH_prefer_to_conservatist:0 "偏好保守派贵族"
SFH_prefer_to_conservatist_desc:0 "我们可以借由偏好某一派系来降低另一派系的影响力。"
SFH_sacrifice_conservatist:0 "牺牲保守派贵族权益"
SFH_sacrifice_conservatist_desc:0 "牺牲某一派系的贵族的权益可以为我们带来不小的好处，不过，他们很显然不会喜欢我们这么做。"
SFH_hold_nobility_party:0 "举办贵族派对"
SFH_hold_nobility_party_desc:0 "偶尔举办一场派对可以拉进国王与贵族们的距离，这对彼此都有好处。"

SFH_military_connection:0 "与陆军的联系"
SFH_military_connection_desc:0 "自古以来，远乡陆军便是皇室§C最坚强的后盾§!。即便是在皇室影响衰弱的今日，陆军也坚决地站在了国王的身后，成为我们与食利阶级最佳的§R对抗手段§!。然而，这份§Y忠诚§!§O来之不易§!。在远乡军队中，高级军官们掌握了军事事务的绝对统治权，许多部队§Y交由他们自己管理§!，来自中央的命令很难快速调动这些几乎称得上是“私兵”的部队。除此之外，我们还不得不对各地下级军官的§O腐败行径§!§C睁一只眼闭一只眼§!，这让我们的部队名声不怎么好。\n\n在内战打完以前，我们§R不会§!拥有足够的政治影响力开展§Y军事改革§!。尽管如此，当下的系统除了那些腐败和官僚主义外，也算是有点§C优点§!：我们可以在§O紧急情况§!下向高级军官寻求§C帮助§!，这使得我们可以在不费太大功夫的情况下§Y扩大地面力量§!。而且，事实上，让我们的几位大元帅负责军队的管理对§Y财政§!还是非常§C友好§!的…"
SFH_corruption_everywhere:0 "腐败横行..."
SFH_corruption_everywhere_desc:0 "由于缺乏对各地军官的掌控，我们的军队经常对驻扎地附近的民众做一些出格的事情。我们不得不默许这一点。"
SFH_suppress_corruption:0 "打压腐败"
SFH_suppress_corruption_desc:0 "我们可以找到过于刺眼的一些腐败行径打压，这虽然会在短时间内造成一定的不满，但可以在不影响总体局面的情况下帮助我们稍微改善国内的稳定性。"
SFH_emphasize_discipline_decision:0 "强调纪律"
SFH_emphasize_discipline_decision_desc:0 "通过象征性地强调部队纪律，我们可以在短时间减少军队带来的不安，同时加强政府的权威。"
SFH_encourage_doctrine_development:0 "鼓励学说发展"
SFH_encourage_doctrine_development_desc:0 "我们可以专门调动预算来鼓励军事学说的发展。当然，这不代表我们肯定能取得重大进步，但至少能帮助我们积累一些经验。"
SFH_temp_mil_production:0 "临时军工生产"
SFH_temp_mil_production_desc:0 "通过花费一部分资金，我们可以调动临时的军工厂生产装备。"
SFH_recruit_private_army:0 "募集私兵"
SFH_recruit_private_army_desc:0 "一些地方势力强大的将领有训练并管理自己的部队，我们可以和他们达成较低限度的合作，同时将他们的部队为我们所用。"
SFH_demand_army_support:0 "要求军队支持皇室"
SFH_demand_army_support_desc:0 "我们可以做出一部分让步以换取军队对我们统治的支持，这可以帮助巩固国王的权威，同时降低改革派，保守派的不满。"
SFH_demand_attack_actions:0 "要求发动进攻"
SFH_demand_attack_actions_desc:0 "要求部队执行进攻计划，这将在短时间内为我们的地面力量获取优势。"
SFH_demand_defence_actions:0 "要求进行防御"
SFH_demand_defence_actions_desc:0 "要求部队执行防御计划，这将在短时间内为我们的地面力量获取优势。"

SFH_battle_over_territory:0 "领土争夺战"
SFH_battle_over_territory_desc:0 "随着郑钧身体抱恙，潜藏在各地的反政府叛乱已愈发不可收拾。虽然西南部的沿海地区仍牢牢掌握在南远乡手中，东部和北部的地区却逐步走向失控，并分别被由革命党人主导的§t革命阵线§!，以及由神秘的宗教领导人“青天”所带领的§G青天军§!所控制。在这场对领土的争夺战中，任何一方都必须拼尽全力，竭尽所能地加强对周边省份的控制权。\n\n当§R内战§!爆发时，在各省份内§Y影响力§!更大的一方可以§R立即占领省份§!，并在当地组建部队。\n\n对于§Y南远乡政府§!而言，任何省份的丢失都是§R永久性§!的，一旦§Y南远乡政府§!在当地的§Y影响力§!跌至0%，其将永久失去控制省份的能力。\n\n当远乡政府失去了当地的控制权后，§t革命阵线§!可以和§G青天军§!互相争夺省份的控制权，拥有更高影响力的势力会获得当地的控制权。\n\n§Y可用的决议会随着地方影响力的分布变化而改变。§!"

