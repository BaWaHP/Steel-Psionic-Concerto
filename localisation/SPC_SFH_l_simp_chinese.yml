SFH.0.t:0 "我是怎么做到的？"
SFH.0.d:0 "昏暗的灯光下，郑钧在房间里来回踱步，眉头紧锁。\n\n有一件事他非常不能理解。这是好事还是坏事？当然是好事了。这才短短没几天，郑钧脑海中所想的要在政府中推行的改革就如童话故事般地瞬间完成了。这些“改革”有些在当初只是转瞬即逝的想法，郑钧根本没有思考过具体该如何推行，可好结果就是这么蹦出来了。\n\n他也问了周边的人，最近自己到底有没有干什么特别的事情。而他得到的答案也很简单：什么也没有。工业园区凭空而出，反对派莫名其妙地消失匿迹，国内民心突然开始支持政府，仿佛过去几十年的灾难从未将领在远乡王国一样。\n\n思来想去，郑钧只能得出一个结果："
SFH.0.a:0 "难道说，我其实是传说中的高魔个体？"

SFH.1.t:0 "白洋海人鱼族"
SFH.1.d:0 "定居在远乡王国东部名为白洋海的海域的人鱼族在伟大战争结束后一直同远乡保持着良好的外交关系。虽然因为人鱼族的内乱，他们在一开始不得不向远乡王国寻求帮助以重建他们的家园，但是，成功置身于几次大战的他们在接下来几十年的发展后已经建立起了一座在各方面都颇具影响力的强大海洋政权。虽然受限于种族的原因，白洋海人鱼族一直没能进一步扩大其规模，也没能在陆地上建立起稳定的根据地。然而，他们凭借着优秀的经济实力和工业科技一直在东巴斯蒂亚地区施加影响，尤其是在我们的祖国。\n\n东巴斯蒂亚大战结束后，伤痕累累的远乡王国不得不违背世界大战时向人鱼族欠下的债务，恳求来自白洋海人鱼族进一步的援助。在长时间的讨论和磋商后，人鱼族表示愿意向远乡王国提供帮助，然而，代价便是我们不得不向他们提供包括免除关税在内的一系列福利以维持我们“互惠互利”的关系。\n\n我们的公民已经对享受着超国民待遇的人鱼族感到不满，可我们的政权依然强烈依靠着来自人鱼族的援助。在我们实现真正的自给自足前，适当的屈服以满足人鱼族的需求会是不可避免的——试图摆脱人鱼族在我们身上长久以来施加的经济枷锁会是十分困难的。"
SFH.1.a:0 "愿一切安好。"

SFH.2.t:0 "漫步"
SFH.2.d:0 "清晨，郑钧漫步在皇宫侧面的花园中。这是他一天中为数不多不需要应付争吵的贵族和刁民的时候，也正因为如此，他格外珍惜这段时光，久而久之也养成了早起的习惯。他的廷臣们在一开始并不喜欢郑钧大清早出门散步的行为，直到某个记者披露了这个行为后把清晨散步炒作成了皇室习俗，是尊贵的象征，引发了一阵子散步的热潮，最后这事在不知不觉成为了全国的热门话题，其他人也就不对郑钧说些什么了。\n\n穿过被精心修剪的草坪，郑钧在路旁的灌木丛中发现了些许异样。那是一只长有斑纹皮毛的狸花猫。郑钧平时不养宠物，事实上也没见过多少动物，感到有些好奇的他走进了瞧瞧，本以为对方会像见到洪水猛兽一样跑开，结果那只老猫就跟陷入冬眠的动物一样死死的躺在地上，一动不动——那不过是一具凉透了的尸体，虽然还没有开始因为腐烂而散发出刺鼻的味道，但恐怕也离那一步不远了。\n\n这事搞得郑钧内心一阵不愉快，他宝贵的清晨时间被尸体糟踏了不说，这还让他想到了半死不活的，他的祖国。过去的繁荣总是为郑钧留下一种远乡的光辉仍在继续的错觉，可无论是大战的失利还是亲人的背叛，郑钧都深刻地意识到自己的故乡或许已经走到了生命的尽头——甚至，跟这只狸花猫一样，实际上早已经消亡，只有郑钧还在支撑着臃肿的尸体没那么快腐烂。\n\n“陛下，廷臣们已经到会议室了。需要您过目的请柬也已经整理到您的办公室内了。”那是郑钧秘书的声音，这说明时候已经不早了，为美好的清晨散步时间划上了十分糟糕的句号。郑钧回头，只见那个矮小但站得挺拔的男人毕恭毕敬地站在他身后，郑钧也不好意思拒绝回去承担自己的责任。\n\n“好的，我这就回宫。”他叹了口气，不情愿地回答道。"
SFH.2.a:0 "“哦对，记得处理一下花园里动物的尸体。”"

SFH.3.t:0 "恼人的会议"
SFH.3.d:0 "回到宫殿后，虽然内心十分不情愿，郑钧还是去到了那个被称为“会议室”的房间。世界大战结束后，为了换取来自贵族们的支持，除了大量废除由他父亲所提出的政策外，他还不得不允许贵族们同他平起平坐地修订远乡王国的政策（当然，郑钧依然有着最终的决策权，只不过政策的企划在很大程度上已不单单取决于他了）。\n\n有时候郑钧感觉十分讽刺。他的父亲穷尽一生同保守派贵族斗争，设立平民教育也好，扩大宫廷对民众的开放度也好，这和现在郑钧所做的又有什么区别？不过是平民换成了贵族，不一样是邀请反对派过来把自己骂一顿吗？他看到贵族之间的争吵，跟他儿时看父亲同革命党人的会议并无太大区别，结果也出奇的相似——什么也没有。无尽繁琐的讨论到了最后，他们除了对远乡王国没落的懊悔以外一无所有。\n\n“我们应当大力支持中部地区的山地地带，我们的矿业发展的简直就是一坨狗屎！原来那块的矿业发展挺好的，给它砍了干什么？西边沿海的工业要生产，原材料全得从联邦人那边进口，然后他们又要狠狠地宰我们一笔！”一个贵族突然表现的十分激动，他一拍桌子站了起来，冲着众人喊道。郑钧认出来这人是西海岸的工业巨头，姓王还是李来着，身着一身类似燕尾服的他此刻并没有表现出符合他服装的旗帜。可没等郑钧好奇什么时候经商搞得好也算贵族的时候，另一个人也一拍桌子，站起来驳斥。\n\n“你瞧瞧你说的什么话！什么工业发展那都是次要的，你还嫌你腰包进的金子不够吗？近几年粮食收成不好，环境恶化，乡下的人都往城里跑，没人想也没人敢去种地了。我们应当把有限的精力投入到维持远乡王国的农业生产稳定上，等到时候没饭吃，难不成去啃铁块吗？”郑钧认得说话的这人，虽然他打扮相对寒酸，但他本人却是南方的大地主，他那大肚腩随着他说话时摇摇摆摆的的，弄得郑钧在这般严肃的场合下有点想笑。"
SFH.3.a:0 "然后，又一个人拍桌加入争论。"

SFH.4.t:0 "恼人的会议"
SFH.4.d:0 "“哼，我看你才是想吞独食的那个吧！谁都知道某人的小心思，故意缩减粮食产量来提高价格，继续坑我们这些用心工作的实干者。”郑钧认得这个脸色发黑的矮子，他是中部地区的矿业大亨，开发北巴斯蒂亚赚了一大笔钱，当了暴发户后回国垄断了南远乡地区的矿业。后来经济停滞，他也没过几天好日子，“在我们的矿场，无数的劳工不得不顶着恶劣的环境，使用者伟大战争时期的工具作业！如果有了王国的拨款，我们肯定可以提供优质的多的矿业资源——这个时代可是工业的时代，老古董们就先让开道吧。”\n\n“你的工人工作环境恶劣不是你自己的问题？给你补贴了钱再多还是进你的腰包，稳固远乡王国的农业可以对全体人民都有好处的！”来自南方的地主情绪激动，面红耳赤的反驳道，“不要小瞧了农业的重要性！”\n\n随着会议的争吵逐渐升级，郑钧发现自己逐渐跟不上他们的逻辑了。什么“经济发展”，“工农剪刀差”，“价格危机”云云，东北边姓张的亲戚和西北边姓徐的亲戚，不知为何同南边港口最近的抢劫案产生了一定的关系。东南方向的越狱案和人鱼族近期的行动出于某种原因被联系在了一起并被西海岸的富商提了出来，尽管没有任何原因。郑钧感觉自己的头脑愈发的模糊，那个姓王的好像突然长了两个脑袋，天花板的吊灯以诡异的频率闪烁着异样的色彩，而自己的五脏六腑正在以不可能的速率高速旋转着，尽管他早上因为没胃口基本没吃什么东西。\n\n虽然意识愈发的模糊，但郑钧还是及时地意识到了自己身体的异样。\n\n“咳咳！”他干咳了两声，“今天就到此为止。我要走了。”\n\n“但，但是…陛下，我们还没…”大多数贵族出于惊讶都没反应过来，只有少数几个表达了自己的疑问。\n\n“没什么但是的，你们要是讨论不出结果那就推到明天，就这样。”他斩钉截铁地说道，掩盖自己身体不适的事实，“我要回宫了。小马，把办公室那边整理一下，我现在过去。”他对站在一旁的秘书说道。秘书鞠了个躬，转身离开了。\n\n“陛下，请不要意气用事。”郑钧能听到身后传来怨念的声音。\n\n“真是的，让你们弄又弄不出结果，我在这儿有什么用呢！”郑钧压抑不住心中的怒火，冲着众人喊道，“反正真要做什么你们也不会同我商量，那你们想怎么吵怎么吵吧！我还有要事处…”\n\n话还没说一半，郑钧就感到一阵天旋地转，险些失去平衡摔倒。幸运地抓住了旁边墙壁上的凹槽的他瞪了一眼众人，转身离开了，没再说些什么。他能听到贵族的窃窃私语和抱怨声，但他不在乎。"
SFH.4.a:0 "我真的需要好好休息。"

SFH.5.t:0 "叹息"
SFH.5.d:0 "“十松庄下水道系统出故障了…谁把这东西送来的？请找当地政府处理，为什么没人来审核一下送上来的都什么玩意？”\n\n“人鱼族骚扰良家妇女？额，让当地民警…哎呦，都搞不定才甩上来的。算了，别处理了，叫他们把闹事的关几天得了，晚点就安静了。”\n\n“‘青天道’邪教在东南沿海泛滥，需要增援？把这个送到总司令部去，看看他们能不能做什么。最近这帮人闹腾的越来越大了…早晚得下狠手根除这块毒瘤。”\n\n“北方难民涌入？多调一点人去设置关卡放置偷渡的吧。义也真是太不小心了，为什么他统治下的国度还会有这么多流民？算了，这也不是我该考虑的，他想怎么做就怎么做吧。找些人把抓到的遣返，已经逃过来的就别去管他们了。”\n\n“邱元帅又来要援助了啊，老样子，还是提供一些精神上的支持打发打发。”\n\n……\n\n同往常一样，在结束了同贵族代表们的“友善讨论”后，郑钧来到他的办公室处理公务。这个办公室是他的父亲传给他的，装修的时候远乡王国的民主化运动如火如荼，那时候郑铭在全国上下都提倡学习南巴斯蒂亚联邦的建筑风格以搞所谓的“进步”，所以这间办公室的风格同王宫显得格格不入——没有图样花里胡哨的地毯，昂贵的壁画，繁华的吊灯或是温暖的火炉，一切都从简入手，剩下的只是几张椅子，沙发，茶几，装满了没人看的书的书架与方正的木桌。\n\n郑钧看着堆满在他桌子上的待处理文件和忽明忽暗的油灯，叹了口气。他并不是特别担心自己会处理不完文件——就算处理不完，他也可以交给秘书和其他官僚们帮忙，这本来也是他们工作的一部分——郑钧所真正担心的，一方面是他之前对贵族发的火，虽然他知道自己情绪的反常可能一时半会吓到了这些贪图名利的小人，可他的统治在很大程度上依然依赖于这些人，他可不能真的把关系搞僵了。\n\n另一方面，他开始担心起了自己的身体。近些日子，他经常会头脑发昏，眼睛看不清东西，没法集中注意力。他知道自己的身体可能已经老了（尽管这是非常难以接受的现实），并且有不少贵族已经开始觊觎他的王位，留给他继续悠闲下去的时间已经不多了。他本身就已经将许多政务（在迫不得已的情况下）交给了其它贵族，如今如果他一命呜呼，那远乡王位恐怕就不会是郑家的了。如果说这就是其他贵族最近对郑钧的态度好转，即使是郑钧对他们发火，他们也不会明着反驳的原因，那么一切都说得通了。"
SFH.5.a:0 "要我让位给你们，还早了*他妈的*一百年。"
SFH.5.tt:0 "§R都给我等着！§!"

SFH.6.t:0 "昏迷"
SFH.6.d:0 "“父亲，您在里面吗？”\n\n郑红轻轻地推开了父亲办公室的大门，落日的余辉早已洒满房间，每个角落都染上了血红的颜色。房间内大多数物件相较前些日子都没有变动，这让郑红安下了心，因为对于没有阅读或是享用下午茶习惯的郑钧而言，除了偶尔会使用他办公桌上的文件和旁边的书架上的资料外，他基本上不会动这个房间的摆设，若是真有什么变故，那怕是有贼人来访。而远乡国王——至少是名义上的——郑钧正趴在办公桌上呼呼大睡。他的脸色很平静，虽然由于过度劳累而显得有些苍白。\n\n“这个点确实让人昏昏欲睡呢。”郑红抬头望了望窗外，太阳的身影已几乎淹没与地平线上，“父亲您还是太过劳累了，中午可以考虑多睡一会午觉。”\n\n“嗯…是啊。”郑钧一副若有所思的样子看着窗外的落日，“比起这个，有什么事吗？”\n\n“啊！马先生让我提醒您用餐，然后就是…嗯，有个事想拜托您。”郑红一副支支吾吾的样子，脸上泛着微红，“就是…今天上午的时候，我去花园那边散了会步。然后发现了一窝小猫。”\n\n“小猫？”虽然对动物没什么兴趣，郑钧的脑海中还是浮现起了当初花园里看到的那具尸体，弄得他起了一身鸡皮疙瘩，“嗯…所以你是，咳咳，想养吗？”郑钧时不时会不自觉地咳嗽两声，他感觉自己有些喘不上气。\n\n“嗯。侍从们说找不到这窝小猫的父母，可能是不见了或者跑了。我想着，它们自己肯定没法活下去。”郑红顿了顿，又补充道，“而且，这里毕竟是王宫的花园，有野生动物的话影响不太好。”\n\n“就算你不这么说，我也不会说不让你养的，红，咳咳。”郑钧苦笑道，又干咳了两声，“养只动物而已。不过，要记着，养护动物意味着责任和义务，你可不能把事情都丢给侍从做，也要想办法学着自己照顾他们。毕竟——”郑钧原本想说“它们的父母八成是死翘翘了”，但仔细想了想还是没说出口，“你也到了可以自己做决定的年纪了，就算你不来找我，我也相信你的，咳咳，我的大闺女啊。”\n\n“太好了！”郑红激动地要跳起来，虽然她接受的贵族教育成功使得她快速平静了下来，“那我马上就去…嗯？”正当郑红准备转身离开时，她发觉自己的父亲又一次趴在了办公桌上。只是，这次郑钧的脸上没有了以往的平静，取而代之的是紧缩的眉头和发皱的脸颊，以及铁青的面色。\n\n“父亲…您没事吧？”郑红注意到了郑钧的异样，“…爸？爸！”"
SFH.6.a:0 "危机总是先人一步。"

SFH.7.t:0 "危急时刻"
SFH.7.d:0 "远乡王国正处在前所未有的危急时刻！在现任国王郑钧陷入昏迷的当下，远乡王国的未来似乎再次笼上了一层迷雾。革命党人，反抗军，乃至是皇宫内的贵族和改革派都蠢蠢欲动，希望抓住这千古难遇的机会。\n\n虽然国王郑钧本人并没有生命危险，他的昏迷还是为全远乡王国上下敲响了一记警钟。如果国王的身体抱恙，那么远乡王国的未来就不得不提上日程。郑钧在接下来的时日里必然会改变其政策风向来为目前他唯一“信得过”的继承人，公主郑红的上台铺路，因此，接下来的改革会很大程度上决定远乡王国未来的风格——是拾起老国王的民主化改革，还是继续同贵族合作，亦或者走出属于郑红的第三条路？无论如何，对于皇宫内的改革派和保守派而言，想要施加影响并确保他们的地位，现在是唯一的时机了。\n\n而除此之外，就在皇宫的外面，远乡王国的山间和田野里，革命党人和反抗军也正蠢蠢欲动。\n\n革命党人由幸存下来的远乡革命家组成，他们的支持者从最极端的左翼分子到民主改革者应有尽有。革命党人早已经在中北方的山地建立起了根据地，只是一直处于隐蔽的状态，一旦远乡王国陷入混乱，他们定不会放过这般好的机会——尽管，在遭到了远乡政府的打击后，革命党人一度陷入颓废，至今也没能彻底缓过来；\n\n而东南方日渐扩大的势力“青天军”也似乎不打算置身事外，在远乡经济萧条，全面向外国势力让步的如今，他们成为了反抗的先锋团体之一，这个由多个派系组成的反抗团体中的思想五花八门，有的团体甚至并非主导势力，“青天教”的一份子，而将境外势力赶走似乎成为了联合他们的唯一理由。不过，就算是内部一片混乱，他们也会成为威胁远乡王国统治的主干力量之一。\n\n是时候站队了。"
SFH.7.a:0 "我们将在风暴中跟国王和公主同舟共济！"
SFH.7.b:0 "同志们，我们等待许久的时机终于到来，为了人民而战！"
SFH.7.c:0 "为了远乡人民的荣耀！为了独立自主的祖国！"

SFH.8.t:0 "改革派政变！"
SFH.8.d:0 "“所以，就算我跪下来求你，你也不会把宫外那些士兵撤走，对吧。”郑钧叹了口气，无奈地对着眼前拿着枪指着自己的贵族说道，“我以前就知道你不安好心，可不知道原来小人也能如此之大的勇气，敢用手枪指着自己的君主——怎么？难不成你也想要我头上的皇冠不成？”\n\n“啊…怎么会呢，国王陛下。”拿着枪的贵族眯着眼笑道，看起来猥琐极了，“您年事已高，尚且无法执政——过去的这些天，各地执行的‘改革’不就证明了这一点吗？如果再让您继续干下去，那远乡王国的未来必将葬送在你我手上，这您自然清楚。”然后，他又拍了拍胸膛，“作为一名坚定的爱国者，尽管于心不忍，但我也只能采取这样极端的手段——相信国王陛下您也一定可以理解，对吧？”\n\n“我猜，我也没有选择。”郑钧瞪着眼前的男子，内心满是无奈，“请确保我女儿的安全，国家怎么样都交由你了。这样的条件，够了吗？”\n\n男子吹了声口哨，郑钧可以听到明显的枪械摆动声，似乎是在门口随时准备冲进来毙掉自己的士兵都散开了。他转头望向窗外，在皇宫外的士兵也开始有组织的散开。郑钧原本以为自己在面对这样的时刻会感到不甘，可到最后，他还是为自己和女儿的安全感到庆幸，而且，很可悲的是，他感到无比的轻松。\n\n“我做错什么了吗？”他向自己问道，“或许，我不需要做对什么。”"
SFH.8.a:0 "这下清闲了。"

SFH.9.t:0 "保守派政变"
SFH.9.d:0 "“改革根本就是骗人的！”“国王只是在忽悠我们！”“远乡王国马上就要灭亡了！” \n\n郑钧看着窗外愤怒的人群，叹了口气。如今的局面可不是他想要的结果——执行改革目的除了让远乡王国拥有走向未来的资本，更多的还是保住皇室的权益。如果远乡的暴民已经愤怒到了要到皇宫门口抗议，而军警无动于衷甚至加入暴动的队伍的话，那说明郑钧毫无疑问是失败了。\n\n“国王陛下。”周公义的话打断了郑钧的思绪，作为著名的改革派贵族，他很显然有在这场暴动背后推波助澜，“相信您也已经看到了窗外人民的呼声。看来，在这种情况下，我国将不得不推翻一些过去的政策…否则，情况可能会很出乎意料。”\n\n“你是在威胁我吗，周公义？”郑钧原本希望带着怒气说话，可这话说出口后，他又突然笑了出来，“就算你不专门来跑一趟，我也明白你们需要什么了。不过…哈，我感觉很好玩。”\n\n“您是指什么？国王陛下？”周公义问道。\n\n“我刚才想了一下。”郑钧用手指敲了敲桌面，“我一直以来实施的改革到底是不是正确的。以前，我想过该怎么做，甚至考虑过父亲的政策…可到了最后，我还是没下定决心。”郑钧苦笑了一声，“您猜猜为什么，周先生？”\n\n“国王陛下，难不成您想说是其它贵族在阻挠您吗？”周公义的脸上拂过一丝不悦，但转瞬即逝，“您要知道，作为国王，您当时是有权力推行自己想做的事情的。”\n\n“不，我要说的不是这个。”郑钧转过身来，面向窗外愤怒的人群，“你看他们，”他伸出手指了指人群，“他们有勇气冒着生命危险站到皇宫面前改变这个国家，我却因为担忧家人的未来而选择将枪口指向他们。”他感到一股暖流划过脸颊，他哭了吗？\n\n“我不过是重复了当年的覆辙，却浑然不自知。”转过身后，他用桌上的纸巾拂去脸上的眼泪，然后重新端正了身姿，“保障我女儿的安全，我就这一个条件，其余任你们处置。”"
SFH.9.a:0 "远乡王国的春天到了？"

SFH.10.t:0 "苏醒"
SFH.10.d:0 "模糊之中的是光与影交叉的世界，黑色的块状物体在洁白的世界里闪烁晃动，郑钧试图去捕捉这些东西的形态，可他发现自己似乎一动也不能动。很快，黑和白变成了五颜六色的大杂烩，就好像远乡的传统食物之一的糊糊一样，来回搅拌，最后慢慢变成了无尽的漆黑。\n\n再睁开眼的时候，漆黑褪去，取而代之的则是洁白的天花板和满头大汗的宫廷医师。郑钧想伸出手打个招呼，却发现自己的手臂上早就插了密密麻麻的针管，还不知为何被胶带固定在了病床的把手上。\n\n“额…小李？这是什么情况？”郑钧试图开口说话，但他发现自己的身体是如此之虚弱，以至于他光是说这一句话就不得不忍受喉咙的剧痛，“我…咳咳！咳咳！”\n\n“国王陛下，您还需要休息，暂时就不要说话了。”李医生微笑着说道，虽然郑钧很明显的感觉到这个拿着张纸不知道在写什么的家伙不是真心在笑，“远乡王国的政务暂时由您的女儿和其他几位贵族组成的临时会议管理，您只需要在晚些时刻回归即可，不必担心。”\n\n“我…咳咳，等下，我…郑红现在在代劳国王职务吗？”颗粒大的汗珠沿着郑钧的额头流到了他的嘴唇，虽然这确实有助于他湿润干涸的嘴唇，但他也是第一次发现汗水原来可以这么咸，“她一个人吗？”\n\n“国王陛下，这个您不需要担心。”李医生推了推眼镜，“公主并不需要负责主要的国家事务，其他几位贵族已经为她代劳了，您不需要担心公主的安危。”\n\n“你意思是其他贵族已经‘代劳’了全部国家事务？”\n\n“基本上是的，国王陛下。”李医生点点头，郑钧恨不得起来给他一拳。"
SFH.10.a:0 "完了。"

SFH.11.t:0 "女儿"
SFH.11.d:0 "急切的脚步声回荡在走廊里，半睡半醒的郑钧皱起了眉头。他猜测可能是那群该死的贵族听到了自己苏醒的消息所以赶来了，不过从结果来看他其实更想睡会觉，而不是听他人的谄媚然后感受自己的远乡王国是如何一步一步沦落到其他人手里的。\n\n当房间的门被猛地推开时，郑钧微微皱起的眉头一下就舒展开来，因为站在门口的不是欠揍的贵族，而是他心心念念的女儿。郑红看起来似乎很急，也很疲惫，她的头发乱糟糟的，衣服也有些没那么整洁。\n\n“红！你来了啊。”郑钧妄图站起来，可惜他所能做的也不过是挥挥手，“我等你很久了。”虽然他一剧烈运动就会犯疼，但郑钧还是努力的在脸上挤出了笑容。\n\n“爸，我一听说您醒了就赶过来了。”郑红一边大喘气，一边说道，“您没事吧？我…额，您现在感觉怎么样？还疼吗？”\n\n“不疼，一点都不疼，哈哈。”郑钧笑道，虽然光是笑这个动作就已经让他疼得难受，“再过两天我就可以出院了，可惜难得假期就要结束了，哈哈。”郑钧打趣道。\n\n“呼…那就好，父亲。”郑红释然的笑道，她整理了下仪表，继续说道，“我跟您讲，父亲，这几天我可忙乎了！我是第一次知道，原来管理一个国家需要做这么多事情！虽然大部分麻烦活都交给父亲您其他几位属下了，不过我也参与了一点，真的是…不知道该怎么形容这份心情！”郑红看起来很兴奋，她似乎积攒了很多想同父亲讲述的故事。\n\n于是，属于父亲和女儿的时间开始了。虽然头脑不清醒，东西也看不清，郑钧还是尽可能地听着女儿讲述这几天代为行政的故事。当听到其他贵族以“帮助”的名义行事国王的权力而“代劳”时，他的内心百感交集，他一方面为女儿没有被迫参与高强度的工作而感到欣慰，一边开始担心贵族们是否借此机会为自己谋得了更高的权力。不过，在看到女儿能独自做这么多政务上的事情后，郑钧还是颇感欣慰，其他贵族给他带来的烦恼也一扫而空了。\n\n“红，你长大了。”看着滔滔不绝讲述自己“执政经验”的郑红，郑钧发自肺腑的笑了，“等再过几年，远乡的王位传给你，我也放心了。”\n\n“我…不是的，父亲！”郑红听到郑钧的话，顿了顿，然后对着老国王喊道，“我还远远不够格的。大家都盼望着您回来带领国家呢，您可千万不能有着想法，也不能出事！当时您在我面前昏倒的时候，我…我……”\n\n老国王看到女儿的眼里泛着泪光，自己也有些感动。他想起了自己的过去，自己还是个孩童时，父亲教导他的话，和那时尚且富强的远乡王国。他叹了口气，用尽全力伸出手，抱住了自己的女儿，仿佛这是二人最后一次见面。"
SFH.11.a:0 "没事的，没事的……"

SFH.12.t:0 "审视国家"
SFH.12.d:0 "远乡王国没落的原因众说纷纭，有人指责郑钧作为国王没有履行好职责，有人则认为主要原因在于世界大战造成了后北扩时代经济危机和破坏了重建运动的东巴斯蒂亚大战，还有人认为核心思想在于老旧的君主制政体已经不符合时代潮流。不过，无论具体原因如何，如今的远乡王国都已经是一栋腐朽的大楼，只要踹上一脚就会粉碎。\n\n那么，老国王究竟该如何是好呢？\n\n郑钧不是不清楚远乡王国所面临的问题，可以在如此之多且复杂的麻烦下，以前的他选择了逃避。如今的他已经没有多少时日，也只得把过去无法付诸实践的计划摆上台面。\n\n首先是远乡王国的军队。远乡王国的士兵有的还在使用伟大战争时期的装备，大战后造成的群众反战思潮也对军队现代化造成了许多阻力。\n\n除此之外，远乡的民众长久以来都处在极低的生活水平。远乡王国的社会保障跟被誉为共和大本营的南巴斯蒂亚联邦简直一个天上一个地下，加上经济萧条，吃不饱饭的难民到处都是，这不但会造成社会的不稳定，还为革命提供了绝佳的温床。\n\n然后就是远乡的产业萧条。北扩运动失败后的经济危机使得远乡王国的工业体系急速倒退，大量投资付诸东流，少数寡头集团快速崛起挤占市场并形成了影响政府的新势力。同时，远乡的农业也因为各地乡绅的强大势力而一直无法快速发展，十分脆弱，一旦战争开始，饥荒或许是不可避免的。\n\n最后，也是郑钧最不希望摆上台面的，就是远乡王国的政治改革。政治改革道阻且艰，维系皇家的权力更是难上加难，更别提应付那些反对任何明确改革的保守派贵族，或是叫嚣着放权的改革派皮条客了。郑钧的选择在很大程度上会决定远乡王国的未来，不过老国王尚且还未想好应该向哪个方向前行。"
SFH.12.a:0 "要做的事情还有很多。"

SFH.13.t:0 "审视自我"
SFH.13.d:0 "在过去，每当看到辱骂自己无能的社论时，郑钧总是会习惯性的将责任推给其他贵族。是啊：如果不是工业寡头霸占了市场，远乡早就发达了！如果不是地主乡绅限制了农业发展，哪里还会有饥荒？如果不是其他贵族不支持，改革早就落实到位了……\n\n不过，郑钧也明白这些都是自己的一厢情愿。远乡王国会有今天的地位除去历史和他人因素，同自己的弱小是密可不分的。他的怯懦早在刚开始带领远乡王国的时候就已经展示出来了——当革命浪潮席卷远乡王国，他下令开火消灭革命党人，但又不敢赶尽杀绝，希望延续改革但又不愿意跟强势贵族对抗。\n\n如果他想要为了女儿的未来和王国的未来开展轰轰烈烈的改革，那么他必须走出过去的阴影，重新建立起属于国王的权威。\n\n然而，重建权威并不简单。长久以来远乡政府在群众眼中的形象都并不好，首先郑钧需要通过社会改革来提高远乡政府对社会的掌控力度，确保得到更多来自远乡公民的支持，便于推行改革。\n\n另外一方面，国王还需要在政府内部开展另一场战争。他需要打压自己的反对派，消灭强势贵族对政府的高影响力来推行更进一步的改革，或是同部分派系合作来提高行政的效率，实现特定的目标。\n\n最后，郑钧还需要想办法处理革命党人的势力。虽然还有其它地方武装力量需要处理，但毫无疑问革命党人必须得尽快解决，无论是同他们合作也好，还是重启围剿歼灭他们，郑钧不能再像以前一样拖着什么也不干了。"
SFH.13.a:0 "没时间自哀自叹了。"

SFH.14.t:0 "圆月"
SFH.14.d:0 "夜晚，郑钧独自一人在花园散步。距离他从病床上下来已经过去数日，可是他还是没法健康的自由生活，宫廷医师就跟跟踪狂一样时刻紧跟在他身边——不过这也不是不能理解。光是出门这一趟散个步，郑钧就已经眼冒金星，扶着拐杖大喘气了。\n\n不过，就算是这样，郑钧还是不后悔出门的决定，一直待在皇宫里实在是太闷，不出门呼吸下新鲜空气，他铁定是要憋死在病床上。\n\n他找了个凉亭里的椅子坐下，看着周围的花草发了会呆。郑钧想到了自己的童年，在他父亲尚且健在的时候，郑钧也会被父亲拉着到花园里散步。那时候的父子二人常会在这个大理石制成的白色凉亭里喝茶聊天，现在却只剩下了郑钧这么个糟老头子，还有长满凉亭的藤蔓。郑钧想起了那个白色头发的，总是会嘻嘻笑的园艺师老头，自从他因为心脏病离世后，皇宫就没再请过新园艺师，郑钧也不知道自己为什么会做出这个决定。\n\n今夜的月亮又亮又圆，老国王走出凉亭，望向天空。他的心里是儿时父亲所告诉他的一段话。\n\n“你瞧，天上的月亮不是很圆吗？在我们的故乡，那意味着每个家庭都可以团聚一堂，赏月玩乐，而他们的祖国也是如此，牢不可摧，统一且伟大。”\n\n统一的祖国？团聚的家庭？郑钧看了看四周，不禁笑出了声。\n\n“郑红现在应该睡了吧？”他回头望去，皇宫内大部分地方已是一片昏暗，“不知道郑义那小子现在怎么样了。听说北方也陷入了混乱，不知道他应付不应付得来。”他叹了口气，自己亲生儿子宣布北方自治，公然叛乱的景象他还历历在目，虽然他为此跟郑义彻底闹僵了关系，但他也清楚，这都是他自己造的孽。\n\n远乡王国什么时候会统一呢？如果远乡统一了的话，他的家人也该团聚了吧。那一天看起来仍然很遥远——南方的改革未定，北方混乱依旧，西北地区则几乎崩溃。一切看起来都很艰难，恐怕最乐观的人也笑不出来把。血雨腥风必将席卷远乡王国，郑钧只希望它能快点结束。\n\n“远乡王国会统一，而我也必须为郑义，郑红创造美好的未来。唯有他们才能带领我们走向希望，而我决不能在那之前放弃。”郑钧望向月亮，明月圆润依旧，只有老者行将就木，“我会做到的，我必须能做到。”"
SFH.14.a:0 "总有一天会的。"

SFH.15.t:0 "回忆"
SFH.15.d:0 "即使是这么多天过去了，扶浩广依然忘记不了自己那天的遭遇。虽然此刻的他正靠在椅子上盯着远处西下的太阳发呆，但他的内心还是愤愤不平，一想起来就有要砸点什么东西的冲动。\n\n扶浩广是一名公务员，职位不高但也不算低，带了个有七八个人的班，平时拿着工钱也能在首都过着能两天吃一次肉的好日子。最近南远乡政府开始搞军事改革的项目，顶上的贵族不希望太权高望重的人员来推行政策，最后活就落到了扶浩广的上司头上，而他也被任命调查目前远乡军队的现状，顺便把调查结果做成报告交上去。\n\n他还记得那天自己带了三个人去一个地方司令部调查。虽然是地方司令部，这个基地掌管着周边地区供给多个战区的军械库并且承包了新兵训练场的功能。扶浩广猜这个地方肯定和很值得调查，无论是从好的角度看还是从坏的角度看。他听说远乡军队内部充斥着大量的腐败活动，如果要问再哪能找到更多信息，那一定是管枪的地方。\n\n是倒卖军用物资？还是非法集合私人武装部队？收了外国人的钱？又或者是贵族军官办事不力？扶浩广想过很多种可能。他本人虽然对追求正义之类的不感兴趣，不过他能预料到，既然改革是由国王背书的，那么他如果能找到点有用的资料，那这下肯定能发达。甚至，扶浩广还幻想过，自己可以借此定贵族军官的罪，让这帮没什么能力还整天摆出一副趾高气昂的样子的贵族好好吃一点教训。\n\n到目前为止，他已经查出来了许多有趣的东西。凭借公务员的身份，他有权限查看各处军械库的装备流入和流出，财务报表上的细则，和新兵开支的简单调查。不难发现，不但被发配到各地的装备有被非法挪用的迹象，财务报表和实际开支还有非常可疑且巨大的落差，甚至他发现新兵生活和训练开支被夸大了两到三倍。光是这些数据就可以定这帮贵族好几门罪了，光是想到这一点，扶浩广就笑不拢嘴。\n\n然而，情况在这之后急转直下。正当扶浩广准备离开军营，将这份有趣的调查报告上交给上级时，他却被几个军人拉住，似乎是当地的军官想请扶浩广“喝茶”。扶浩广知道这下事情不会好看，但他也没有拒绝的理由。直到他走进军官办公室，然后发现门被两个魁梧的壮汉堵住为止，他依然抱有自己可能没事的幻想。"
SFH.15.a:0 "“哈！看看这是谁来了？”"

SFH.16.t:0 "小改一笔"
SFH.16.d:0 "“来来来，您坐。”那个穿着军服的军官用着抑扬顿挫的强调告诉扶浩广坐下，搞得后者起了一背的鸡皮疙瘩，“诶，小李啊，怎么不上茶呢。”话音刚落，站在军官旁的数位军人中有一位立刻站出来，为扶浩广端了一杯茶过来。“这可是我们南沙市的特产，扶先生您尝尝？”\n\n“原来是南沙茶叶，真是久仰大名。”扶浩广象征性地笑笑，结果茶杯抿了几口，随后就放在了一旁的桌子上，“不知道您找我有什么事？我只是来处理公务，并无他心。”\n\n“哈哈，我也没那个意思，这不就想找您聊会天。”军官虽然是这样说，却挥手示意旁边的军人拿来了几份文件和照片，示意扶浩广看看，“虽然远乡军队平日纪律严明，平日在非战斗状态下极少出现人员伤亡的情况，可最近出了些事故。”军官指了指几张照片，“您看，这几位外来人士在未经许可的情况下擅闯军械库和其他重要设施，结果因为误触大型设施，成了这副模样，多么令人痛心！”\n\n扶浩广认得出照片上血肉模糊的那几位，他们正是扶浩广跑到各处基地负责收集资料报告的下属。看到这里，他知道对方肯定来者不善，虽然这些人还不会至于闹出人命，但他知道自己这几位下属的下半辈子基本上是残废了。他握紧了拳头，摆出一副要揍人的样子，但看到旁边几个魁梧的军人，只得忍气吞声。\n\n“在他们苏醒后，我们的医护人员询问得出结果，他们似乎是您的下属。”军官继续说道，虽然他摆出一副很严肃的样子，扶浩广还是从他的眼角读出了嘲讽的意味。\n“但是他们可是有政府背书的许可的！你怎么能说他们是‘未经许可’的呢？为什么没有人在事情发生前帮助他们？”扶浩广怒斥道。\n\n“哦…这就是一场误会了，您看。”说道，军官又拿出另外一份文件，“给予您和您的下属的调查许可已经‘过期’了。如果不是我在政府内工作的亲戚有提前通知，就连我也被蒙在鼓里呢。”军官顿了顿，又补充道，“实际上，扶先生，就连您现在的调查也是‘违法’的。”\n“你他——”脏话到了嘴边，扶浩广多年的公务员履历还是让他闭上了嘴。\n\n“哎。”过了一会，扶浩广叹了口气，他读出了这位军官的意思，过期的文件恐怕是他的亲戚安排的吧，随后，他缓慢说道，“既然现在的报告是建立在过期文件的基础上话，它就需要基于历史资料和近期资料进行再一次评估，我会尽可能让报告更符合需要的实际情况的，先生。”"
SFH.16.a:0 "“我就喜欢明白人。小李，送客吧。”"

SFH.17.t:0 "远乡军队报告书"
SFH.17.d:0 "由远乡王国中央下达的军队调查命令已经完工，更为详细的报告资料仍在修改当中，这份是被提前送至首都方便政府人员审阅的纲要，部分内容可能会在更新版本得到修改，但核心条目暂时不会改变。\n\n1.远乡军队的装备严重落后于时代\n2.远乡士兵普遍面临训练不足的问题，无法有效使用新一代装备\n3.军队维护支出被夸大了10%-20%左右，似乎是通货膨胀造成的\n4.指挥链效率低下，各军种协同性低于预计水平\n5.现存的军事学院大多停摆，只有少数位于首都周边地区的学院仍在正常运行\n6.调查现实存在小范围的倒卖军火行为，但没有出现预期的大规模贪污或是情报泄露\n（以下省略32条）\n\n关于军事改革的未来，目前有两种可能的方案。一方面，考虑到远乡王国的财政状况依然不容乐观，可以选择裁减多余军事项目，之后从必不可少的军官团素质或是单兵训练水平入手，改良现有的指挥系统并加强战术计划的能力是一种方案，或者也可以选择通过加强士兵军事素养以完成步兵的现代化改革；另一方面，考虑到军事改革的必要性，可以提高支出，扩大军事科技的研究进展，并在重火力或是机械化部队上进行新一轮的改革，追赶时代潮流。"
SFH.17.a:0 "我们应当裁减资金，相信计划和士兵的力量。"
SFH.17.b:0 "大力投资，军科才是未来！"

SFH.18.t:0 "报告中的异样"
SFH.18.d:0 "郑钧看着提交到自己面前的这份报告，陷入了沉思。\n首先需要明确的一点是，郑钧很明白自己多年对远乡军队的不管不顾会造就诸如腐败，倒卖军火，甚至是泄露国家机密等一系列棘手到令人发指的问题，所以他早就做好了看到一份将远乡军队批判的还不如北方魔兽组成的原始部落的军队的准备。\n\n可事实似乎有点不同？\n\n调查报告显示，似乎远乡军队除了因为荒废太久而缺乏训练，或者因为经济形式不好而造成多余开支外，似乎没有什么需要特别处理的地方。郑钧本来已经做好了堵上作为国王的威信而全力根除黑恶势力的心理准备，可现在看来，似乎他什么也不需要做，只需要按照预定好的政策路线之一去做，然后等着好消息来就好了。\n\n虽然不问政事多年，但郑钧作为一个活了这么就的国王还是有十分敏锐的直觉的。他本能地告诉自己，这美好到有些不可思议的调查报告背后肯定有些猫腻。可另一方面，他又有些担心，或许过度的调查会造成不好的效果，甚至反过来彻底将改革的希望毁灭。\n\n但他总得做出决定。"
SFH.18.a:0 "调查的太清楚或许会起到反效果..."
SFH.18.b:0 "彻查到底。"

SFH.19.t:0 "决心"
SFH.19.d:0 "扶浩广看着眼前堆积如山的文件，突然有种苦笑不得的感觉。\n一方面，他记得自己前几天怨天怨地，感叹世道不公，贵族想干什么就干什么，完全无视国家应有的法则；可另一方面，当上面决定对此严查，并组成由国王和少数高层知道的秘密调查行动时，他发现突然被放到自己肩膀上的责任似乎是有点重过头了。\n\n之前他和下属所调查到的结果肯定是作废无疑的——贵族或是他们的伙伴们不可能这么愚蠢，在自己的把柄被别人发现后还不赶快隐藏起来。但前些日子的调查失败也印证了扶浩广不可能再像上次一样，派几个人到处走，堂而皇之的查看文件来收集资料。但在不直接调查的情况下寻找信息可是非常困难的——其中一个他想到的思路就是查找无人关心的往年资料。\n\n远乡军队已经处于荒废状态有数十年了。或许他没法找到近几年的问题，但几十年前的总是能找到。唯一的问题就是，这会花很多时间。上级给出他的任务是尽可能削减参与计划的人数，不过，考虑到下属基本上都在医院躺着，能参与扶浩广查找过去资料的计划的人员似乎是有他自己一人。\n\n于是，就有了现在的这番情形。扶浩广一个人拿着油灯坐在档案库的桌子上，周围是一望无际的文件和说不定晚上会闹鬼的阴暗角落，以及积了厚到可以拿来灭火的灰尘的书架。除了恶劣的工作环境，扶浩广还因为计划保密的原因无法领取加班费和应有的工资，可以说是在物理上和精神上得到了双重打击。\n\n不过，他最后还是接下了这个苦差。无论是给受伤的下属报仇也好，还是单纯的实现最初让贵族吃瘪的想法也好，又或者是为了借此继续在政府里往上爬，扶浩广都不认为自己应该拒绝这份职责。"
SFH.19.a:0 "再怎么说，我也是吃国家饭的。"

SFH.20.t:0 "决心"
SFH.20.d:0 "扶浩广看着远处的落日，又叹了口气。\n这几天他的生活接连遭遇不顺。他的下属因为受伤而被迫离职，而他自己也因为“没能管好下属”这样毫无根据的理由而被调离原先的职位，一路降职，到现在只是个地方政府的文员，平时给别人端水送茶，偶尔整理下可有可无的文件。他知道自己遭遇的这些“不幸”很可能都是人为的，上面不希望曾经知道调查结果的他继续在高层任职，这就让扶浩广本人很哭笑不得——反正他们也会把这些把柄掩盖掉，调走他的意义是什么呢？\n\n不过就算内心感到不满，被调离中央的扶浩广也做不了什么。虽然他估计自己的仕途不会再变差了，但他自己也多少有些感到灰心意冷。就按照他现在一个地方文员的待遇，说不定还不如他自己拿储蓄去开个小店实在——虽然考虑到远乡王国的经济不景气，开小店说不定还会把自己命搭进去。\n\n那么以后该怎么办呢？他看着天上浮动的云彩和血红的晚霞，摆出一副若有所思的样子。公务员肯定是做不下去了，或许他过几个月也该辞职了。凭借他的管理经验，或许他可以去应聘当个商业组织的管理人员？或者干脆剑走偏锋，跑去投靠革命党和青天军，反正远乡政府已经烂到根子里，去哪都不会更差了…\n\n又或者，他可以干脆坐上去南巴斯蒂亚联邦的轮船，等待在自由世界获得未知的机遇？但他也老大不小了，或许最后还是回老家务农吧，孝顺孝顺父母。"
SFH.20.a:0 "下次再努努力吧，反正去哪都比这好。"

SFH.21.t:0 "翻新后的调查报告"
SFH.21.d:0 "经过重新调查的军队报告并不理想——当然，这主要是指远乡军队的羸弱程度，而非是否完成了调查真相的使命。从报告上来看，远乡军队中腐败横行，大量没有受过合理训练的贵族成为了高阶军官，非但不认真参与工作，培训新兵，还大量挪用公款以满足一己私欲，更有甚至选择同外国势力合作，将国家机密和军械库视作自己财富的来源。除此之外，这还暴露了远乡军队指挥系统臃肿，新兵训练流程不正轨等一系列问题。\n\n我们将着手解决这些问题——当然，贵族们不会喜欢这一点。但在确凿的证据面前，他们可绝无反对的余地！"
SFH.21.a:0 "绝无回旋余地！"
SFH.21.tt:0 "§Y无力的军队§!追加效果：\n陆军组织度：§G+10%§!\n陆军组织度恢复：§G+10%§!\n增援率：§G+1%§!\n最大指挥点数提高乘数：§G+20%§!\n生活消费品工厂：§Y-5%§!"

SFH.22.t:0 "贵族抗议"
SFH.22.d:0 "“你不能这么对我们！”为首的一个身着绿色军服，戴着歪歪扭扭的小个子对着郑钧大喊道，“这些调查是对我们军官团的不信任，会对我国军队的发展造成严重不良影响！”\n\n郑钧看着眼前这个说的面红耳赤的小屁孩，突然感到有些想笑。这人看起来也不过二十几岁，却已经成为了一位“高等”军官，相比是靠他的贵族父母在政府和司令部打点关系，最后给了他这么一个职位。军队调查报告有显示过军官学院的无能和腐败，恐怕现在已经是很好的证明了这一点。\n\n“哦？那你说说吧。”郑钧清了清嗓子，忍住笑意，“你…大概论述一下你刚说的话？就是关于军队发展啊，不良影响的那些。”\n\n“啊？我…论述什么？”那人顿了顿，随后又开口说道，“这不是很简单的道理吗！这些调查会严重损害政府和司令部间的信任关系，并导致士兵们怀疑自己一直以来的行为是否正确。这不是无事生非吗？如果本来一切都好好的，非要编造一些毫无意义的谎言来推行所谓的‘改革’，意义是什么呢？”\n\n郑钧看着眼前的这位年轻人，想起了自己年轻气盛时候的样子，那时候的自己敢作敢当，不用思前想后，多么美好的时光…而现在呢，他必须像个要死的老头一样坐在椅子上听年轻人抱怨，真是时过境迁了。\n\n他开始思考为什么那些遭到打击的贵族不愿意亲自过来理论，而是找了个什么内幕都不清楚，只知道听家里人指示做事还自以为正确的年轻人过来。或许是他们知道自己不占理？又或者是担心郑钧把这些黑料公布给舆论媒体？或许都有吧。\n\n“请问您有在听吗？”那人又对着郑钧本就不好使的耳朵大喊着，给了后者的大脑一记醒棍。"
SFH.22.a:0 "头疼。"
SFH.22.tt:0 "§R郑钧的血压将会上升！§!\n§C...不过并没有什么影响。§!"

SFH.23.t:0 "背叛的军官"
SFH.23.d:0 "虽然远乡军队在表面上完成了现代化改革，可实际上却远远不够。许多隐藏在军队内部的腐败，叛乱行为都因为政府在改革时的软弱而被隐藏了起来。缺乏训练的士兵，被神秘挪用的物资以及泄露的军事机密，这一切都在内战爆发后，远乡军队开始正式动员时，被揭露的淋漓精致。\n\n仿佛像是早就知道了会是如此一样——许多在原来军事调查时行踪可疑的军官在这种时候选择了背弃自己的祖国，投向革命党人，青天军或者外国人的怀抱，带着价值不菲的远乡机密远走他乡，只留下混乱的远乡军队。\n\n对于每个当初对军队现代化而沾沾自喜的人而言，这都是强烈的打击。"
SFH.23.a:0 "这我可没料到..."

SFH.24.t:0 "现代化之军"
SFH.24.d:0 "多年前，当人们提起远乡王国的陆军时，会想到什么？是世界大战的惨败？是将枪口指向无辜的人民？是贪婪成性，腐败横行？还是面对叛军畏畏缩缩，却还摆出一副高高在上的样子？恐怕这些印象都会有——毕竟它们都是真的。\n\n可时过境迁，我们成功做出了改变。\n\n在我们完成远乡陆军的全面现代化改革后，现在远乡的陆军已经可以自豪的说道，我们不畏惧世界上任何一支现代化强国的陆军。\n\n随着内战的风云笼罩远乡王国，我们坚信，来自远乡新军的光芒必将驱逐那些危害国民安全之敌人，将光荣和荣耀重新带回这片属于古代勇者的土地！在我们完成远乡陆军的全面现代化改革并在很大程度上压制了遍布军队上下的腐败作风，并改革了被隐瞒的错误士兵管理规范后，现在远乡的陆军已经可以自豪的说道，我们不畏惧世界上任何一支现代化强国的陆军。\n\n随着内战的风云笼罩远乡王国，我们坚信，来自远乡新军的光芒必将驱逐那些危害国民安全之敌人，将光荣和荣耀重新带回这片属于古代勇者的土地！"
SFH.24.a:0 "团结一致，共赴胜利！"

SFH.25.t:0 "选择困难症"
SFH.25.d:0 "“所以，考虑到我国如今的财政局面，接下来的军队改革应当专注于节约现有的资金，裁撤不必要的军事项目，专注于改良最为核心的军事内容。”郑钧顿了顿，翻过演讲稿的一页，“像是对军官团和司令部指挥体系的改革，或者从步兵的训练入手。这些内容对于现代化军队都很基础，但也是重中之重，哪怕放弃坦克大炮的研发，也不能忽视这几点。”\n\n“但是，对军官团的改革势必会引起其它贵族的反对。”周公理说道，“很多低级军官都是各地贵族派来的子女，他们虽然没有太强的兵权或是指挥能力，但大多有足够强势的背景。推行对指挥体系的改革不一定会有效果。”他顿了顿，摸了摸自己的头发，试图擦去并不存在的汗珠，“甚至有可能起到反效果。”\n\n“如果这么畏畏缩缩的话，那改革肯定进行不下去。”陆军元帅姚白摇摇头，“不过，试图直接改革指挥体系确实不那么…有效。”作为军队高层少数支持国王改革的军官，同时还是元帅的姚白的话语就很有权重，他这一发话，周围众人都将注意力转移过来，“指挥系统的改革需要时间，指望彻底改革并不现实，在现有基础上舔砖加瓦更有可能。”他顿了顿，又说道，“我个人更支持在士兵的训练上下功夫。士兵的训练是一切的基础，如今我军士兵大多缺乏训练，别说重武器，跑个步恐怕都要大喘气，怎么可能应对的了未来的军事冲突。”\n\n“不过，改革指挥体系或许有些困难，但如果我们从军事计划的制定入手呢？”另一位将军，应启辰开口道，“扩张军事工程项目的规模并鼓励更多战术模拟。这些也不是不能做到，而且可以比单纯训练士兵起到更好的效果——甚至，潜移默化间还可以影响能力不足的军官学习。”\n\n“但你这不是更花钱吗？”\n\n“但恕我直言，只是加强训练标准除了练一堆大头兵以外也没意义啊，长官！”"
SFH.25.a:0 "选择很多，困难更多。"

SFH.26.t:0 "我曾经有一份工作"
SFH.26.d:0 "吴天笑着看着眼前的工作报告，又抿了一口咖啡。他自认为是个很幸运的“科学家”，虽然他其实很少学过科学相关的内容，以前接受的教育也基本忘了个精光。凭借着不算低的文凭，他成功混进了远乡军队的科研部门，并在这里负责一个“超远程火炮”的科研项目。\n\n至于他都干出了什么呢？如果把上交的报告书拿来说，那估计可以滔滔不绝讲个三天三夜；但如果直接问吴天，“嘿，你个学写作的他妈跑来科研部门干了五六年了，到底干了啥？”，那么他会很直接的回答——\n\n屁都没干。\n\n整整六年，吴天只是把一些日常生活中会遇到的科学原理和他自己的生活糅合在一起，然后以不同方式排序，偶尔扯一下工作人员的家常，就这么糊弄了过去。当然，上级也不是不检查他的报告，不过，“睁一只眼闭一只眼”已经成为了远乡军事科研部门的“光荣传统”，几乎每一个在这里工作的雇员都清楚这一点，只有国王本人被蒙在鼓里。\n\n“反正怎么干都能保住这份工作！”吴天始终抱着这样的想法，拿着科研预算享受着大鱼大肉的美好生活，偶尔嘲讽一下跑去处理公务的同僚，然后在办公室看着买来的色情小说度日。\n\n直到那天，他看到被发到自己桌面前的调查报告。“经过评估，该项目不符合国家标准，因此暂时封锁，请尽快整理文件并赶往最近的人事部门报道。”在看到文件的第一眼时，吴天还感觉不是真的，以为是谁给他开的玩笑，直到他想起来前几天刚入职的新人总是鬼鬼祟祟地翻翻这个文件那个文件，然后给器材挨个照相。"
SFH.26.a:0 "现在我没工作了。"

SFH.27.t:0 "不再让步"
SFH.27.d:0 "“到目前为止，我们对于贵族派军官的自由放任已经过了头，必须采取极端措施了。”郑钧皱着眉说道，“对于做出这样的决定，我也很痛心。很高兴你能支持我，周先生。随着资金的进一步扩大和采取强硬措施整顿军队，我们很快便可以开始军事科技的现代化，让使用大炮，机甲的梦想成真。”\n\n“过奖了，国王陛下。”周公理毕恭毕敬地说道，“我国军队长久以来的混乱必须在这里被终止。已经没有时间考虑资金的问题了，必须下定决心整顿好军队，哪怕这意味着扩大财政支出。”他叹了口气，又似乎有些不情愿的说道，“哪怕…这意味着要忍痛将不服从的人赶出我们的团队，或者一劳永逸地让他们闭嘴。”\n\n“您可算下定决心了，国王陛下。”远乡陆军元帅，陆博苦笑道，“我一直担心您会考虑到财政问题，以裁减项目为核心展开战术改革或是完成以加强士兵训练为核心的改革。我们早就该对军队开展全面整顿，然后投资新一代军科，让士兵们用上大炮和大型机甲了！这些都是真正时代的潮流，无论我们如何用其它原因安慰自己，也不该忽视了真正先进的东西。”说到这里的陆博显得很激动，不过他很快便意识到了，“啊…抱歉各位，我有点太激动了。”\n\n“没事，没事，哈哈！”另一位陆军将军，甘盘笑道，“我也等这一刻很久了。现在的陆军无论是装备还是素质都不符合许多现代战场的标准，关于加大投资并全面整顿军队，我也已经提了很久了。今天诸位能选择走这条道路，我甘某人肯定是全力支持的！”"
SFH.27.a:0 "难得开心的日子。"

SFH.28.t:0 "新资金，新管理"
SFH.28.d:0 "“更…更多预算…”\n\n远乡军事科学部门其中一个名为“超远程火炮”的项目主管，吴天此刻正傻傻的看着眼前的电报。揉了揉眼镜，又灌下两口咖啡，他惊讶的发现眼前这白纸黑字的通报居然是真的！要知道，作为科学部门出了名的“摸鱼”项目，吴天在接手管理该项目的六年里几乎毫无建树，何况他自己甚至不是一个科学家，对这些科研内容毫无理解，而是在写作上专精的普通公务员——至于他的手下，也基本差不多。\n\n那么，究竟是什么让远乡政府发了癫，要给自己加大预算呢？\n\n“不过，八成应该不重要吧。”晚上，醉醺醺的吴天跟自己其他同事吹水，“听说上面还要派下来几个人，这才是最麻烦的！不过，估计他们过几天也意识到自己的努力无非都是白费功夫了吧，哈哈……”\n\n结果，因为宿醉的关系，第二天早上吴天没能及时赶到工作场所。而且，在他赶到研究室后，他好不容易积累的整整六年的好心情在一瞬间被打破了——整个研究室仿佛变了样，文件被拿出来重新整理，大量的器材随着卡车在试验场进进出出，以及占据了工作室的许多不认识的人。\n\n“这是…这是什么情况？”吴天看到这，觉得有一种自己的领域被别人侵占的被冒犯感，于是，他走向其中一个在指挥整修作业的女性，对她喊道，“喂，你个戴眼镜的，对，就你！”他大喊道，“你们他妈哪来的一帮人在这忙东忙西的？是不是走错地儿了？信不信我找上级打报告说你们破坏我们研究进度？”\n\n“哦呀。吴天先生，这就是您的不对了。”对方笑道，“这个实验室已经不归您管理了。难道您没看到吗？关于传达信息的电报。”\n\n“什么电报…我靠。”吴天一开始的气势顺便被吞噬的无影无踪，“你说的不会是之前的…通知预算的…”\n\n“是的，吴天先生，您没看到吗？就在电报的最后一行。”那个“戴眼镜”的微微一笑，指向电报的一角，“‘现任管理和部分科研人员需要重新接受能力评估，并调配到其它项目’。您已经不是该项目的领导人了。”"
SFH.28.a:0 "我可没听说过这事！"

SFH.29.t:0 "浪子"
SFH.29.d:0 "作为四十年前远乡军队对南巴斯蒂亚联邦派遣的军官留学生计划中的一员，孙志浩已有整整三十五年没有踏上故乡的土地了。在远乡王国尚且富强的日子里，孙志浩胸怀大志，选择走出国门到外国进修，希望等学成归来后可以报效祖国——不过情况急转直下。孙志浩刚出国没多久，世界大战便爆发，随着远乡王国陷入经济危机，他接受了自己所在学校的老师的建议，留在了南巴斯蒂亚联邦并为之而战——不过这也是很多年前的事情了，如今的孙志浩已经暮暮垂已，就跟他的祖国一样。\n\n不过，情况在他收到了来自远乡中央政府的信件后发生了改变。近些日来，远乡王国似乎在进行某种程度的军事改革，并且正在大规模的召集能人志士参与到这项活动中。他们似乎有意愿让孙志浩担任军事学院的新任教师。\n\n“我可不知道自己有没有资格教导别人啊。”一直以来，孙志浩都很后悔自己当年背弃祖国，安居于国外的决定，但他也知道自己如果回到了故乡，或许早就死在了当初国内的混乱中，“而且我一把年纪了，也赶不上时代喽。”\n\n“不过，这里也挺无聊的。”过了一会，他又望向窗外，繁华的联邦都市灯火通明依旧，街上车水马龙，还能听到不远处孩童嬉戏的笑声，“不知道远乡那边是不是也建设成这样了？恐怕不会吧，按照当初那个样子…哎。”\n\n“现在回去，说不定自己会被当成叛徒。”孙志浩一边收拾行李，一边叹气道，“他们八成不会接受我吧，说不定还会把我当成崇洋媚外的混蛋。这样就更不该回去了。”说着，他又把几套整理好的风衣装进皮箱。\n\n“再说了，王国那边也没有足够现代化的装备和教材，我回去了工作量也很大。”一边这样说着，孙志浩一边将自己在南巴斯蒂亚联邦军事学院的资料整理成文件夹放进公文包里，“到时候岂不是还得帮他们整理一大堆资料，多麻烦啊！”\n\n回过神来的时候，孙志浩发现自己已经上了回远乡王国的渡轮。吹着海风的他突然笑了起来，在定居在南巴斯蒂亚联邦这么多年以来，他还是第一次这么真心展露笑容。 "
SFH.29.a:0 "浪子归来了。"

SFH.30.t:0 "设计师的苦恼"
SFH.30.d:0 "“所以说，我需要在一个月内给你们一个…额，容我缓缓。”广鑫咽了咽口水，又继续说道，“一个*全新*的堡垒设计方案？还配套赠送新的堑壕设计图纸？你在逗我？”他推了推鼻梁上的眼镜，然后重重拍了下桌子，“我知道我以前经常抱怨说给工程局的资金不够，但这不是你们哪天说有钱就能搞定的！这些工程项目都需要持续的投资来积累经验，如果要靠金钱一步登天那为什么不去找外国人直接买回来呢？”\n\n“哎呀…广先生，我们也很难办的。”另外一位有着很浓重的黑眼圈的驼背男子则搓着手试图说服广鑫，“这也是上面下来的指示，必须得搞国内的自研，不让买。”他拿起桌子上的一杯红酒喝了一口，“我们也没有办法。看在这杯利辛特产红酒的份上，象征性的搞一搞吧。远乡军队还在运作的工程部门的正轨团队只剩下您的了。”"
SFH.30.a:0 "“让我再好好想想。”"

SFH.31.t:0 "特训"
SFH.31.d:0 "“再跑五圈！”\n\n教官扯着大嗓门喊出的四个大字狠狠地拍在李义的耳朵上，让后者感到一阵头晕目眩，内心在被不解充满的同时还感到无比的不爽。作为远乡军队中一名普普通通的大头兵，李义这人一辈子也没想过要为了保家卫国或者是什么所谓军人之荣耀而参军。对于他而言，建立远乡王国的先驱者不过是老人口中的故事，就算有一定真实性也已经跟如今的远乡王国毫无瓜葛。既然这个国家都已经暮暮垂已了，他想摆个烂又有什么不对的呢？\n\n不过，他这位新任的教官似乎不这么想——实际上，根据他所听到的小道消息，这附近几个训练营的新任教官似乎都没什么好脾气。\n\n“喂！你干什么呢！跑起来！”\n\n随着教官又一声怒吼，李义不由得加快了自己的跑步速度。虽然想到同自己一起受苦受累的还有几百号人，而光顾着跟自己一起跑的也有十来个，他就感觉内心的不快能得到些许缓解。可从结果上来讲并不能解决问题——他现在还惦记着自己之前因为偷跑出兵营买零食被抓住然后罚跑二十圈的噩梦。"
SFH.31.a:0 "这帮做政策的敢不敢先跟我们一起跑几圈！"

SFH.32.t:0 "愤怒"
SFH.32.d:0 "“小李啊，我们认识这么多年了，就是，你能不能给我解释下。”邱悦强忍住一口把咖啡喷在对方洁白的衬衫上的冲动，沉下心来问道，“这份报告真的是…真的是官方的正式报告吗？”\n\n“嗯…应该是没错的。”被称为小李的男性勉强的笑道，游离的眼神似乎不忍直视眼前愤怒的女性，“这确实是官方的正式报告，除非有人用了什么魔法截取了电报…不过我猜应该不太可能，何况我们还有一份邮差送来的纸质文件，核对来看都是一样的。”\n\n“哎…这帮神经病！”愤怒的邱悦终于忍不住，重重地将咖啡杯砸到桌子上，“你看看，这像话吗！生产个破火炮要过十二个部门拿三十多个不知道哪个疯子定的规章，然后转四五个仓库才到部队手里。弹药更麻烦，同批次的弹药为什么要分开处理，然后转不同的物流去过不同的检查？为什么同一种弹药的检查部门不是同一个？”\n\n“额…就算您问我…”\n\n“再说了！”邱悦大喊道，打断了小李的话，“要不是他们给的多，我一个正儿八经的军工科研人员为什么要跑到这个鬼国家来帮他们‘简化生产流程’，如果他们自己什么事都做不好，那花再多钱请我们也一样没意义！”\n\n“额…不过，其实…”\n\n“而且！资料都不给全，内容也不提前准备好，等我们到了之后才慢慢悠悠准备着手处理，拖了半天，还搞得一副很神秘的样子。如果他们知道这里是什么鸟样，为什么不一开始就告诉我们，而是等了十六天？”"
SFH.32.a:0 "*他妈的*十六天！"

SFH.33.t:0 "坠落"
SFH.33.d:0 "“老西，小心点。”王少武对着站在一旁的同事老西说道，“我们还是第一次负责这玩意的组装，没什么经验，这十多米高的话掉下去不是死也得半身不遂。”\n\n“老王，你咋这么一惊一乍的，安心啦。”看起来一脸释然的老西完全没有在乎老王的警告，“这东西要是让我做组装件那还得小心一点，说不定脚一滑脑袋上就多根钢条了。不过，我们现在只是负责组装件的焊接，站稳就好了，还是说，你不放心那个新来的开吊机的？”一边说着，他一边手舞足蹈地做着焊接的工作，仿佛这是一场表演，而不是高度危险的工作。\n\n“你说老黄？他之前也干过吊机，原来是造船厂的，他我倒是放心。”说到这里，王少武叹了口气，“总之，小心点吧。”似乎是希望换换心情，他转头望向自己正在组装的这个大玩意，“不过，你说也真是的，咱们国家居然能搞出来这么个大玩意，是不是上面的人想起来咱国家太容易被外国人看不起了？早晚搞点这些大玩意，让那些混蛋…尤其是那群人鱼，好好看看咱们冒险者后裔的强盛！”他顿了顿，发现老西没给他回应，“老西？你咋不吱声了？”\n\n转头一看，王少武并没有发现那个熟悉的身影。于是他下意识的低头，然后发现地面上那一托血肉模糊，接踵而至的是老黄的尖叫声。"
SFH.33.a:0 "不可避免之祸。"

SFH.34.t:0 "军用魔法"
SFH.34.d:0 "“所以，只要加上这样简单且轻巧的附件，士兵在使用枪支瞄准的时候就能基于热量看到敌军士兵的位置。”身着白色研究服的军用魔法科研人员向一位老人介绍到，“然后，这边还有几种在重量和维护性都类似的其它种类零件，比如这个可以在黑暗中看清周边环境…不过颜色会有些奇怪就是了；再比如，这个可以帮助士兵自动瞄准敌方单位，不过精确度仍然需要人为修改。”\n\n“嗯…多么奇妙。”老人惊讶地感叹道，“没想到，现在的科技水平已经发展到这个程度了，连我们以前想都不敢想怎么大规模运用的魔法都能如此使用，真不愧是年轻人，哈哈。”老者笑道，他白色的胡子也随之震动，“那么，这些附件在恶劣环境下表现如何？对于后勤的需求呢？”\n\n“这些因素我们自然也考虑到了。”研究人员顿了顿，似乎在思考什么问题，随后又开口道，“目前来看，除非是遇到能让枪械遭到严重破坏的恶劣环境或者攻击，否则配件是不会遭到损坏的。不过…”研究员推了推眼镜，“目前来看，这些附件需要更多的前线魔力供给，从结果上来看，的确会形成一定的后勤压力。”\n\n“这样啊…哎。”老者苦笑道，“果然再好的消息也不一定是完全优秀的。如今我军并没有能力承担更为大规模的补给运输，何况魔力储量也不够，可能很难推行这些附件在军队中的运行了。”\n\n“啊，这个您不需要担心。”研究人员回答道，“后勤压力的产生是基于‘附件’的思考来推断的。也就是说，如果在枪械一开始的生产流程中考虑到这些魔法装备的列装，那么不但可以加大战场上枪械魔法的使用时长，还可以在不造成很大后勤压力的情况下确保前线魔法武器的规模。”"
SFH.34.a:0 "巧舌如簧。"

SFH.35.t:0 "记忆"
SFH.35.d:0 "她还记得第一次遇见他的那个下午。那是在二十年前的一个大晴天，新春的小雨刚过没多久，她独自一人漫步在街头，思考着今天的晚饭。打字员的工作虽然很辛苦，但在技术劳工高度缺失的远乡王国，就连一位普通的女性打字员也能赚够养活自己的金钱，赶上经济发展的年代更是如此，她的运气很好。\n\n那个男人过着与她截然不同的生活。他是一位警卫，负责的不是居民区，不是银行，也不是商场，而是堂堂真正的远乡王国皇宫。虽然不喜欢他的人会骂他是个“破看门”的，但能够成为世界上最为强盛的国家之一的行政中心的安保人员，他还是感到非常荣幸的——何况工资开的也不低，他不但能过上隔天吃肉的好生活，还能寄大笔钱财回老家应付灾年。\n\n二人的相遇和很戏剧性。虽然那个男人成功被选入进入皇宫工作，但他本人的性格却无法像其他几位同僚一样安稳。这天他出门吃包子，结果忘记带钱包，跟店主吵了起来。二人的吵架很快演变成要抄家伙的地步，恐怕是已经忘记了最开始吵架的缘由。结果就是，两人打了个两败俱伤，那个男人也昏倒在了大街上。那个男人作为皇宫警卫自然有不错的战斗能力，可惜对上的是他不得不下轻手的老百姓，更何况他还没意识到对面其实是一位退休的军事魔法战斗人员。\n\n将那个男人送往医院的便是她，二人也是这样相识的。藉由此次机会，二人很快互相熟识，在接下来的几天里，她多次前往医院照顾他。等到男人出院，二人也没有断绝联系，而是在见了几次面后很快确立了关系。\n\n由于二人的工作性质不同，他们见面的机会很少。但男人没有放弃，她也没有。"
SFH.35.a:0 "真是美好的开始。"

SFH.36.t:0 "雨与泪"
SFH.36.d:0 "“小丽，你已经在这站一天了。”皱着眉头，戴着眼镜的中年女性拍了拍另一人的肩膀，后者以沉默作为回应，“再这样下去你身体要吃不消的。我带了点包子来，你要不尝尝？”\n\n“他原来也很喜欢吃包子。”被叫到的女性长叹一口气，“我也是最早…最早在包子铺门口同他见的面。”强烈的哽咽感席卷而来，她连忙闭上了嘴，以免控制不住自己的情绪。\n\n“啊…抱歉，我没考虑到这点。”中年女性苦笑道，看到后者没有跟自己一起笑就又换回了严肃的面孔，“俊红还在等你，已经很晚了，我们该走了。”她推了推眼镜，摆出一副若有所思的样子，随后说道，“今天是他的…？”\n\n“嗯。”她点点头，“今天就是…我收到通知书的那天。”她抬头望向天空，后者乌云密布，一场暴雨似乎就要来了，“让我再在这儿待会吧…我现在的状态不适合去接俊红，能麻烦你吗，大姐？”\n\n“我当然是没问题了…但今晚如果你还不回来，我可要拉着大哥来拽你了。”被称为大姐的女性苦笑道，虽然这笑容也很快凝固了，“咳咳，反正，伞我先放这儿了，等会你回来的时候别淋着雨了。”说罢，她便放下伞，消失在了墓园的尽头。\n\n随着一声雷响，天上开始下起了小雨，慢慢又变成大雨，最后小丽几乎看不清眼前的东西了。她分不清自己是不是在哭，或许那只是暴雨带给她的错觉，又或者是她在过去这么年也未曾走出当年的阴影。当她站起来试图去拿起放在一旁的雨伞时，眼前突然一黑，意识模糊的她倒在了地上。"
SFH.36.a:0 "她还在等他。"

SFH.37.t:0 "失败者的忏悔"
SFH.37.d:0 "近日，我国一位前高级军官所撰写的书籍在国内引发了掀然大波。该书籍名叫《失败之军》，这名军官在书中详细描写了世界大战和东巴斯蒂亚大战期间我军所犯下的错误，包括军官素养的低下，腐败横行的官场，生产拖拉的军工产业，甚至还指责作为远乡最高统治者的郑钧领导不力，在外交上处理不当，并对军队下达了不正确的指示，导致后者最后输了个稀巴烂。这名作者现居海外，我们没法直接对他本人造成什么影响，也不可能冒着损害国际关系的风险强行把他引渡回来，更何况，除去那些甩锅的故事情节外，这人说的内容确实属实——多么讽刺。\n\n既然我们准备发起改革，让人们对我国的军队重新拾起信心，那这些不利于团结的言论肯定是要处理的。然而，直接封锁国内书籍的传播会激起支持自由言论的改革派贵族不满，而什么都不做又会对郑钧的威望造成损失。选择权仍然在国王手上。"
SFH.37.a:0 "瞎写什么玩意呢！"
SFH.37.b:0 "先忍忍..."

SFH.38.t:0 "死亡之愿"
SFH.38.d:0 "今天是个艳阳天，辽阔的天空看不到一丝云彩，只有无尽的蔚蓝和高高挂起的太阳。强烈的阳光压得他呼吸困难，那是一种很难描述的感受——他感觉自己被某种特殊的物质所环绕，常人所无法忍受的高温让他神志不清，几乎要失去呼吸的能力，眼前也一片模糊。\n\n闭上眼，他看到了那场战争。那场名为“世界大战”的惨烈之战。他已记不得自己当年的番号，只认得队友袖章上的数字“三”，以及那张让燃烧弹烧得不成模样的焦炭般的脸。他摆动双腿，感受到了一阵疼痛，那年，来自西方大陆的入侵者在他腿里留下的弹药至今也没有被取出。似乎是因为双腿不好使，他决定伸伸懒腰放松一下，但又发现自己木制的假肢已经破破旧旧，该替换了。\n\n他试着呼吸，却发现飘进鼻腔内的不是清新的空气，而是战场上的硝烟。他看到失去右臂的自己躺倒在血泊中，临时碉堡的顶层已经被轰开，如今他所能支撑的仅仅是一面弱不禁风的石墙。他的身旁是自己的战友，断成了两节的他的肠子正在以不可思议的形态流出体外并延伸开，仿佛是一条小蛇。\n\n扑面而来的火药味让他从梦境中苏醒，可糟糕的环境依旧。那压着他喘不过气来的太阳丝毫没有要让步的意思。他望向脚下车水马龙的世界，那是他曾经称为“故乡”的地方，直到他作为受众人鄙夷的失败者归来，因为四肢不便而被无数次从工作场所赶出来，最后沦落到住出租屋，在垃圾桶里偷摸着吃别人的残羹剩饭。\n\n他最后下定了决心，迈出了前进的一步。\n\n在下坠的过程中，他再一次闭上了双眼。他感受到清风拂过自己的身体，再也没有疼痛，没有他人火辣辣目光或是那要让自己无法呼吸的太阳。他的眼前闪过了一对幸福的夫妇，或许那是他未曾谋面的父母，紧接其后的是他的好兄弟，最后同他千百个战友一齐曝尸荒野。"
SFH.38.a:0 "到最后，他露出了灿烂的笑容。"
SFH.38.tt:0 "§R他的笑容随着发现自己身下被砸到的路人凝固，他眼睁睁的看着对方停止呼吸，就像看着自己曾经的战友一样，但他这次可不会像上次一样幸存了。§!"

SFH.39.t:0 "会面"
SFH.39.d:0 "刘路看了一眼窗外，今天的阳光也是依旧明媚。在经过了前一些时候的大暴雨后，最近连着几天都是大大的晴天，这让他内心感到十分愉悦。也正因如此，他打算借着当下的时机组织俱乐部里的其他老兵们一起去登山散散心，他是这些老兵中心态最好的一个，比起在啤酒里消磨时光，他总是希望能带大家走出过去的泥潭。\n\n不过，想法很美好，现实很残酷。这位自认年轻的油腻大叔作为这所老兵俱乐部的会长，比谁都清楚自己的资金窘迫，光是现在天天买酒就已经把政府拨下来那几乎没有的预算花了个精光，而指望那些“会员”们交钱就更不可能了——就远乡王国这个老兵安置的政策效率，等他们能养活自己恐怕还要一百年！\n\n然而，情况在今天出现了转机。当那个身旁站着三四个保镖的老人走进门时，刘路完全没认出来眼前的这位是远乡王国的最高统治者，国王郑钧。还没等他开口说话，国王就先打断了刘路。\n\n“请问你就是…刘先生，是吗？”看到国王像个慈祥的老人一样对自己微笑，刘路起了一身鸡皮疙瘩，“我是专门来弥补过去犯下的错误的。”\n\n“国，国王陛下，请问您专程来…”话还没说出口，刘路将自己这辈子也没用过几次的大脑过载了一下，意识到国王过来的理由他已经说过了，“啊，抱歉，国王陛下，请问这‘错误’，您是指什么呢？”他努力装出一副摆给领导看的灿烂笑容，“理论上应该没什么…我们这儿都过得挺好的！”\n\n“是吗…”国王看起来似乎在强忍笑意，“我看着可不像。你担心什么，我只是以个人名义前来逛逛，了解了解你们的需求。”他顿了顿，又开口说道，“听说你们的预算已经被降低到了只买得起日常生活用品的地步，这是真的吗？”\n\n“实际上，连生活用品都快买不起了，您看这最近物价飞涨。哎。”刘路叹了口气，回答道，随后他很快意识到自己似乎说的太随便了，于是又补充道，“不过，相信只要再坚持完这段苦日子，情况一定能有好转的！”\n\n“苦日子结束的越早越好。”郑钧摇摇头，随后从身边其中一名随从那儿接过一本笔记本，在上面写了些什么东西，“我来是希望能认真听取你们的意见，希望你不要太见外。”\n\n随后，实在是憋不住的刘路大吐苦水。什么水管系统太糟糕天天断，出个门连车费都用不起，买报纸隔一天买一次才买得起，光是买酒和零食的开支就占了大半等等…而郑钧就像是个听话的学生般，老老实实地在笔记本上做着记录。会谈最后以二人握手结束，照片很快被发往各大报社用以刊登。"
SFH.39.a:0 "完美的政治作秀。"

SFH.40.t:0 "阴影之下"
SFH.40.d:0 "“反对战争！”“战争只会带来无尽的伤痛！”“国王滚蛋！”\n\n窗外传来震耳欲聋的响声，钟国庆看了一眼窗外，那是愤怒的人群在向防暴警察丢椰子呢。自己真是挑了个“好地方”退休啊，钟国庆感叹道，这鬼地方，又热又吵，算上自己两周前从老家回来，那可是一场雨也没下，云多一点的天也就个一两天，真是见了鬼了——现在门口还撞上这么一大群神经病，这下他连门都出不了了。\n\n他摸了摸自己的胡子，突然想起来自己昨晚似乎决定要在今早把胡子剃了方便之后的工作面试，然后他又想起了自己一觉睡到中午十二点，醒来的时候发现被子卡在了风扇而自己躺在了地上，然后他又想起了昨天面试官那张臭脸，和骂在自己身上的“废物逃兵”四个大字，不禁产生了想再灌下一杯啤酒的想法，直到他发现自己手旁的酒瓶早已是空空如也，就跟他的钱包一样。\n\n他想起了在军队中的日子。当世界大战爆发时，作为驻扎在中巴斯蒂亚地区的部队中的一员，钟国庆可谓是吃遍苦头——至少他自认如此。那儿的自然环境极其恶劣，腿走断也找不到有活人的定居点，要吃的没吃的要喝的没喝的，十个人里九个人冻伤还有一个在冻伤的路上。那时候的他可盼望着回家了，回到温暖——或者说炎热的故乡，反正怎么都比天寒地冻的北方强。\n\n结果，回国的这些年来让他大开眼界。政府没有给退伍士兵任何多余的福利，钟国庆领着被削减了几十次的工资，独自一人回到了变样的故乡。他没有房子，没有存款，仅有的可以依靠的亲人早已暮暮垂已，而他自己也没有学历，只得跑到城市谋求生计。可现实又是残酷的，人们视他为葬送伟大的远乡王国的罪魁祸首，连小孩子都瞧不起，要唾骂他两句。在这样的情况下，钟国庆只得借酒浇愁，做着按日计费的杂工勉强维持生活。\n\n“给士兵们一个和平安定的未来！”\n\n抗议者的怒吼声打断了钟国庆的思绪，后者苦笑了几声，闭上眼又沉沉睡去，至少在梦中，他得以找到自己所希望的，“和平安定的未来”。"
SFH.40.a:0 "有那机会抗议不如给我炒碗面。"

SFH.41.t:0 "吵闹"
SFH.41.d:0 "“我操！你他妈一个不知道从哪个狗屁疙瘩地方过来的，打扮的精致的跟个娘炮一样的小屁孩敢过来拉着老百姓去打不知道什么鬼的仗？”愤怒的农民把锄头重重地砸在地上，把周围的看客吓了一跳，“今儿个我就把话撂这儿了，要么你带着你的破文书滚蛋，要么我们全体父老乡亲一起把你揍个头破血流，再让你滚蛋！”\n\n“诶，你这人怎么不讲理？”被愤怒的农民指着鼻子痛骂的年轻人也有些不爽，面色发红，一副要揍人的样子，“我都说了几次了，我是国家派来的公务员，来各地推进征兵进程。这都多少年的法律法规了，你们的祖先肯定也参加过，哪有什么讲理不讲理的？真要讲理你们这么多年不服从国家法律法规，现在不追究你们不偷着乐还倒打一耙？”\n\n“哈！不愧是年轻人，道理讲不明白，鬼点子倒是一堆——”说着，愤怒的农民举起锄头，环视了一遍四周的其他看客，“父老乡亲们，你们来评评理！”他顿了顿，随后又开口道，“我们从那几个该死的地主手下出来才过了几天？现在国家又是要收税又要拿作物的，我们日子本来就过得很艰苦了——可这家伙，这么一个在大城市吃着大鱼大肉的家伙有一天突然跑到我们屯儿来，在这农忙的季节告诉我们，要抽几个最不可或缺的劳动力去军队给他们送死？你们评评理，这像话吗！”\n\n“就是啊！”“俺家都没人种地了！”“好不容易能干自己的，又要给别人做牛做马了吗！”\n\n周围的看客似乎也被这位为首的农民的话语激起了不满情绪，纷纷站出来指着那名负责征召士兵的公务员破口大骂，而一旁负责给公务人员带路的村长似乎看情况不妙，也早就不知道跑到哪里去了。公务员虽然内心有一万句骂回去的话，可看看自己手中的笔记本，又看看愤怒的人群手中的锄头，镰刀甚至是大斧子，最后还是忍着什么也没说，灰溜溜的走了。"
SFH.41.a:0 "同样的事在各地屡见不鲜。"

SFH.42.t:0 "新站点"
SFH.42.d:0 "小黄是一个无忧无虑的村民，虽然出生在南远乡偏北地区的他并不像首都出生的达官贵族家的孩子一样，能吃着优质的美食，接受良好的教育并在远乡王国中谋取不小的地位，但他仍然拥有一项多数人在如今这个时代没有的品质——快乐。他偏远的故乡虽然没有了现代社会带来的便利，但也没有了官僚的蛮横与欺压，有的只有最为纯朴的乡民老百姓和田园牧歌的生活。\n\n不过，最近小黄面临了一些烦恼。他感到很无聊。当然，作为偏远山区的居民，他不需要担心现代社会的种种麻烦，不用关心明天远乡王国的政治会滑向何方，或者是股票的涨跌，又或者是国王突然推行的效果好坏存疑的改革。但这份安宁也是有代价的，他的所见所闻仅限于这个山谷，认识的人和事物就那么多，总有一天会厌烦的。\n\n他向长辈寻求意见，得到的答案却千篇一律，无非便是祖宗之法不可变，或是世道沧桑，离开故乡的代价往往是无法承受的，偶尔，长辈们还会打打感情牌，毕竟在小黄的故乡，考虑到劳动方式尚且原始，子嗣永远都是越多越好——多一个人就是多一个劳动力。当然了，血浓于水的亲情偶尔也是原因之一。\n\n事情在某一天突然出现了转机。一个自称是远乡政府的打扮得很精致的年轻人穿过崎岖的山路跑到了小黄所在的村子，村民都不欢迎他，说他是外头来的瘟神。虽然那位年轻人试图解释自己只是奉政府命令来发布征兵通知，可这只是进一步加深了村民的不满，大家都嚷嚷着要叫人滚蛋，差点还在村口打起来。\n\n那个外地人找村长借了个房间来当做是临时的征兵办公室，可自然不会有人去找他登记了。不管那人如何宣传参军的好处和容易程度，其他村民都把这人视为洪水猛兽。可小黄不想像过去一样停留在这个山村了，他想走出门去看看外头的世界，哪怕这会让他付出代价。于是，有一天下午，在那个外地人准备关门休息时，小黄敲响了征兵办公室的大门。"
SFH.42.a:0 "“我想试试。”"

SFH.43.t:0 "远乡民生考察报告"
SFH.43.d:0 "随着时代的发展，远乡王国早已经失去了曾经东巴斯蒂亚地区霸主的地位。世界大战后的经济萧条和东巴斯蒂亚大战的惨败为我们的祖国带来了难以磨灭的伤痕，战争所带来的伤亡由于我国政府曾经的办事不力而一直没有得到解决，反而在社会扎根生芽，成为了犯罪与暴力案件的温床。除此之外，战后的通货膨胀使得居民的生活成本急速上升，可多数企业和政府部门采用的财政紧缩政策同时造成了大量失业人口，一时之间，我国有大量公民流落街头，过着混吃等死的日子。而这个问题至今依然存在。\n\n若是我们希望通过改善民生的方式来获取更多对政府的支持，那么稳定市场，为更多人创造就业机会，同时跟进各地企业和科研机构的发展，会是不错的切入点。我国许多民间企业和科研项目都没能挺过经济萧条，许多文娱产品也是如此，将他们重新引入社会能够基于民众更高的信心，就算起到实际效果仍然需要时间，这仍然是个良好的开端。\n\n不过，这之外的内容就尚且存在疑问了。有人建议说我们应当采取更加快速的改革计划——砸钱，发展娱乐项目转移百姓注意力，然后降低赋税以换取民众支持，但这样的改革计划虽然耗时很短，花费从长远的角度来看也不高，可是无法起到真正的推进变革的作用，无法从根本上解决问题；还有人建议我们进一步提高预算，加强政府对社会各方面的介入，完善教育系统，就业系统，甚至是跟随时代潮流改变女性的社会地位，或是开展多年没有考虑过的环境保护计划，然而，这样的设想会耗费我们更多时间，而且从开支的角度来说压力很高。"
SFH.43.a:0 "采取快速的改革计划，我们没时间浪费。"
SFH.43.b:0 "慢点的改革计划也值得一试，为了未来。"

SFH.44.t:0 "排队"
SFH.44.d:0 "不知从何处突然吹来一阵风，席卷而来的是漫天的灰尘，男人咳嗽了两声。工业化给他的城市带来的不止有繁华，还有显著的空气污染，他对此并不感到高兴，但依然同大多数人一样选择了接受，毕竟一座座工厂拔地而起带来的物质水平的提升可是实实在在的——唯一有一点美中不足的是，男人所领取的工资很难支撑其他平日的消费。\n\n而这大概也是为什么他会出现在这里。虽然他本人没有接到任何政府公告，最近街坊上至八十老太下至八岁小孩都在讨论国家推出的一个什么公民——还是人民，市民？——生活补贴之类的东西，通俗一点来讲的话，大概就是政府要给老百姓发钱了。\n\n为什么？怎么发？没人知道。以防万一，男人出门时便带好了自己的大部分身份资料，从出生证明到身份证应有尽有，出于某种未知的原因他还误打误撞找到了三十年前的疫苗接种记录（也带来了），他估计会有正规的政府官员进行身份检查，防止不法分子领到不该拿的钱。\n\n“日你妈，把钱给我！”\n一声大喊打断了男人的思绪，他这才注意到预定是“领钱地点”的地方就在拐角外，而且此刻充满了混乱的人群。似乎一场暴动在酝酿中。\n\n“先生，我都说了很多遍了，没有身份证明不能领！”\n“日你妈！老子在这个屯儿住了他妈大半辈子，你告诉我我不是这儿的人？”\n“但我们必须要确认您的身份！”\n“放屁，这么多在场的父老乡亲都能佐证！在说了，你们也没人通知什么玩意身份证明，鬼知道要提前准备！”\n“就是！我们都是听说有钱领才一大早跑过来的！”\n\n躁动的人群不再理会工作人员的解释，开始不断地推搡对方所在的临时营帐。紧接着，不知道哪个情绪紧张的警察突然擦枪走火，之前闹得最凶的暴徒瞬间便倒下，只留下一地的血迹。混乱即刻爆发，人群开始向警察部队发起攻击，一时间，血腥味和惨叫声充满了整条街道，扬起漫天的灰尘。\n灰尘又引起了男人一阵剧烈的咳嗽，他转头便离开了现场。"
SFH.44.a:0 "“还是明天再来吧…”"

SFH.45.t:0 "课堂"
SFH.45.d:0 "“于是，我们的祖先就是这样穿越神奇的海洋，抵达了现如今我们的故乡。”穿着朴素的女性教师一边讲着，一边在黑板上的世界地图中圈出远乡王国南部地区，“虽然我们的祖先骁勇善战，甚至可以使用原始的武器同野生的魔兽交战，可因为缺乏对当地自然体系的认识，最初爆发了数场由食物中毒，人员失踪造成的混乱…”\n\n“呼——呼——”\n教室后方传来响彻整个房间的呼噜声，顿时，整个课堂都被学生们的笑声所充满。教师皱紧了眉头，随后又叹了口气，努力将笑容挂上脸庞，才决定转身面对这帮小学三年级的学生。\n\n“刘富贵，都说了多少次了，上课的时候不能睡觉！”教师似乎在寻找着训斥和安慰之间的平衡，作为新任老师，有许多对待孩童的方式她都仍在摸索，“悦悦，帮忙把刘富贵弄醒。”教师指了指坐在刘富贵旁边的小女孩，后者很熟练地将前者摇醒。\n\n“哎呀——老师，我不都说了吗？”小男孩揉着双眼，打了个哈欠，“您这讲的都没用。现在又不考这些，加多个课时又能咋样？”他又打了个哈欠，这次似乎故意拉大了强调，“什么老祖先，那都是死了几百年的人啦，谁还在乎他们做了什么？我们能过好不就行了？”\n\n这一番话差点没把老师问倒，她思索了片刻才想到该如何回应。“富贵，你知道你爸妈为什么要给你起这个名字吗？”\n“额…希望我能赚大钱呗！怎么了？”\n\n老师没有说话，反而转身在黑板上画了起来，白色的粉笔在东巴斯蒂亚的地图上飞舞，很快便形成了一个似国界样的色块，那是远乡王国巅峰时期的国界线，要比现在的大得多。\n“我们的祖先曾经将国家的边界不断拓宽，是这个世界的列强之一！”老师用像平时讲课一样的声音说道，她也想给其他孩子听听，“然而，随着时间的流逝，我们却逐渐忘记了先驱者们为我们教导的精神，忘记了我们可以创造的辉煌。孩子们，富贵不是靠一个人现在过得舒服就可以实现的！我们要努力精进自己的知识，不止是考试——还有其它方方面面，时刻铭记属于我们麟人的宝贵精神遗产，并将它发扬光大！”"
SFH.45.a:0 "富有教育意义的一课。"

SFH.46.t:0 "行善的贵族"
SFH.46.d:0 "何泽已经在这个地方运行施粥处和发放毯子衣物有一段时间了，说实话，他过去从来没有想到会有怎么多人吃不饱穿不暖。他以前一直以为大部分人就算不像他这样衣食无忧不用工作，好歹是能吃的上一顿饱饭的。现在看来，这不过是不知人间疾苦的发言罢了。饥民和难民一眼望去几乎看不到头，这可怕又悲戚的场景足矣震撼任何人。\n\n最开始，何泽参与这些事不过是受他父亲和姐姐影响，外加为了通过慈善挣个好名声罢了。可随着时间的推移，但凡还有良心的人都会发自内心的可怜这些接受救济粮的民众。只有何泽自己才清楚，他早就不是为了名声和某种猎奇心理，他就是单纯希望睡个好觉，晚上梦不到这些惨兮兮的人罢了。\n\n何泽看着面前始终绵延不绝的队伍，突然很希望自己能和其他一些贵族一样烂，这样好歹他不会有现在这样的无力感和难受劲。他们家能做的很有限，可需要解决的事和需要帮助的人总是那么多。"
SFH.46.a:0 "帮助仍然有限，但却发自真心。"

SFH.47.t:0 "绝非嗟来之食"
SFH.47.d:0 "吴公在他的老家是为数不多读过书的人，靠这个谋得一份糊口的好差事。当青天军起事之后，他却与亲朋好友离散，成了众多逃难流民中的一员。可即便如此，吴公还是守着他那点“文人风骨”，他太清楚这些现在看起来好心肠的贵族是什么样了，他宁可饿死，都不愿意吃这些狗眼看人低的家伙一粒米。\n\n他冷眼看着一旁，那位最近在流民口里快被传成圣人的何大小姐正在给其他人送粮送衣。可笑，这些个少爷小姐之所以干这些事，无外乎想要从中谋利外加求个好名声罢了。他可太清楚这些人的嘴脸。\n\n“吴先生”那贵族小姐拿着两个馒头走了过来：“您这几天都基本没吃啥东西，这样下去，身体要垮的，多少吃点吧。”\n\n“不要不要！你难道就没更重要的事做？管我做甚！”\n\n何小姐眨了眨眼：“可我就是在做最重要的事，这天底下难道还有比救世济人来的更重要的事吗？”\n\n吴公想了半天，也还是想不出如何反驳。他只能干巴巴的回一句：“我不吃嗟来之食，不能不劳而获。”\n\n“这好办，您来帮我给其他人送馒头送衣服，再给大家上上课，帮他们识识字，这不就不算不劳而获了吗？”"
SFH.47.a:0 "帮助理应真诚而有效。"

SFH.48.t:0 "新时代，旧把戏"
SFH.48.d:0 "梁浮生带着他的家底来到了汇文街上，在这条街，大家都愿意尊称他一句“梁老先生”。在当初东巴大战还没发生时，梁浮生是个戏园老板，戏园子就开在他现在住的地方。\n\n邻里乡亲一直很尊敬梁浮生，但已经没几个记得他自己也会皮影戏，当初既是老板也是员工，他手里这个箱子里全是当初吃饭的家伙。也是以后的，前几天来了几个人，自称给国王办事。希望能资助梁浮生，让戏园重新开张，他立刻就答应了。\n\n孩子们平时就喜欢缠着这老先生，一见他拿着个大箱子从他最近翻新的宅子里出来，就立刻聚过来围观，纷纷追问这是什么。\n\n“莫急”梁浮生脸上已经挂满笑脸：“你们马上就晓得了。”\n\n只是一场戏，人就已经越聚越多，不少大人也放下手里的活计，赶过来看皮影戏。有人在后面大声发问，是过去就在戏园看戏的老客人：“梁老板！你这戏园难道是要重新开张啦？”\n\n梁浮生用他这些年来最开心的语气回他：“是！戏园子要重新开张了！到时候记得来捧个人场！”\n\n“一定！”人群也立刻热情的回复。\n\n下一场皮影开始之前，出现了一点不和谐。一个妇女看到最靠近梁浮生的孩子堆中的一个，立刻抱怨了一句：“怎么畜生的孩子也能来看戏啊”。\n\n梁浮生顺着目光循过去，那女人说的孩子他知道。这女娃娃是孤儿，被一个亚人养大，但梁浮生一直很喜欢这个孩子，偶而也会感慨这家人命是真不好。在反应过来前，梁浮生就下意识回了话。\n\n“哎，话可不能这么说。那人和猴子长的比较像难道就是畜生了？畜生会讲话吗？再说，有的人啊，还不如畜生，好吃懒做，没爹没娘！”\n\n人群立刻爆发出一阵赞同的笑声。"
SFH.48.a:0 "不说了，我再来个讲国王和公主斗恶霸叛匪的戏！"

SFH.49.t:0 "……修万里路"
SFH.49.d:0 "李宁一进门就听到工头那充斥着愤怒的脏话，那张看起来很值钱的木桌被砸得砰砰作响。纸张散落和书写工具被掀翻的声音格外刺耳。工头尚有余怒的眼神撇向李宁，语气不佳的质问起他：“你来干什么？”\n\n李宁咽下口水平复自己紧张的情绪，相当谨慎的解释起来：“头儿，就大伙问问为啥又停工了，这个月第三次了都。照这样下去，咱们啥时候能把路修完啊？”\n\n“为啥又停工？那当然是因为又没钱了！”工头愤怒的给出了回复：“我说当初为什么只给钱，其他所有的都让咱们自己想办法。你看看这些图纸，要求这么多，工程这么大，可就给这点钱。我除非不给你们发工钱，否则这破路是别想修好了。”\n\n听到不发工钱，李宁立刻慌了，他可还有父母弟妹要养：“啊？那咋整啊！头儿，我家里可是——”\n\n“行了别吵吵，谁不知道你家情况？放心吧，工钱少不了你们的”工头无奈的摆摆手：“我下午再去找他们讲，娘的，这帮家伙要再不发响，咱们就要成付钱上工了！”"
SFH.49.a:0 "当晚，工头和他带去的人用几个袋子拖着讨来的新经费回到了工地。"

SFH.50.t:0 "自我清理"
SFH.50.d:0 "直到最后一次离开那个办公室，匡衡还是感到难以置信。远乡的警察系统仿佛在一夜之间迸发了过去200年都不曾有过的执行力和活力。他们从不知什么地方翻出了一件件陈年往事拉出一份份可靠证据，然后宣布依照王国法律自己将因为贪污公款被立即开除和没收家产。\n\n匡衡知道自己还算是幸运的，没有和自己的某些同事一样直接被关了起来，而只是被革职查办后抄家处理。这估计还是多亏了几个贵族朋友帮忙，当初也只是贪污了一点点公费。不然匡衡可不敢保证当初那些警察找到自己时会不会像看到这些家伙对付其他人一样，给自己一顿毒打后丢进地牢。\n\n在经过走廊离开大楼时，匡衡注意到他的很多老熟人已经消失不见，有的是因为和自己一样犯了事，有的是因为无能，还有的是因为整个部门直接被撤销了。虽然仍有少数人看上去保住了自己的位置，但他们也都神情紧张战战兢兢，唯恐下一个卷铺盖走人的就是自己。\n\n当匡衡走出大楼的时候，他不由自主的叹起了气。这下他虽然保住了命和人身自由，但也已经身无分文还丢掉了工作。不过，他倒也没太悲观。"
SFH.50.a:0 "毕竟，奉公守法的活计还有很多。"

SFH.51.t:0 "重新做人"
SFH.51.d:0 "王常抬头看了看天空，感知到一阵发自内心的激动和兴奋。整整两年过去，他终于从监狱那个该死的地方里出来了。多亏了国王的决定，他能够提早出来，不用再为了那么两大碗面继续在监狱里呆上三年。\n\n两年的时间虽然不长，却也已经足够使人和社会脱节。王成刚出来一天，便已经明显的感受到外面和他进去时不一样了，简单来说，外面的环境似乎比他进去时更好了些。至少王成没再看到满大街的乞丐。王成不太清楚旁人说的那些个“改革”、“变化”到底指的都是什么东西，不过至少现在看起来是很不错的。\n\n在街上寻找一份能让自己吃得起饭的工作时，他把目光投向了…"
SFH.51.a:0 "…墙上的征兵告示。"
SFH.51.b:0 "…不远处的工厂。"

SFH.52.t:0 "无形的对抗"
SFH.52.d:0 "玉和财正对着摆在他面前的东西犹豫不决。一方面，他清楚的知道这是贪污，而国家正在困难之际，他这样的行为无异于火上浇油。可另一方面，他自己最近家里也一样相当困难，上面发下来的俸禄多少有点不够，而这批下来的补助金数目巨大，他就算真的偷偷拿走一点，也基本不可能有人注意的到。\n\n他皱着眉，只要在这份文书上小小改动一下，他就能从这笔补助金里也捞上一点。但玉和财还是在犹豫着，这总是有一种不好的预感，仿佛这么做就一定会被发现，继而人头落地一样。\n\n挣扎了许久，最后玉和财——"
SFH.52.a:0 "联想到前不久的事情，他那躁动的手停了下来。"
SFH.52.a.tt:0 "由于完成了国策§Y整顿司法机关§!，该选项可用。"
SFH.52.b:0 "“不拿白不拿”，他如此想到。"

SFH.53.t:0 "教育即阶梯…"
SFH.53.d:0 "欧阳夏看着正在正在认真填写卷子的学生们，目光瞥向了窗外窥探的家长们。\n\n对于一个像欧阳夏这样的知识分子，在这座新建立的学堂中教书是很比较少见的。他认识的朋友和同志要么以及加入了革命党，现在正在北边用武力从反面减少国王改革的阻力或干脆决定推翻王国。要么现在正继续魂不守舍，每天醉生忘死无所事事。但对欧阳夏来说，他都有勇气加入自由党了，自然不是准备当个没有社会贡献的废人的。\n\n他才来这里一周，这个学堂的人手严重不足，校长平时除了负责教书一类的本职工作，顺带还是唯二的扫地大爷。欧阳夏最新的同事是位比校长还老一岁的先生，几天前他还在难民堆里。是搞救济的贵族小姐发现他就在老家教书，推荐过来帮忙的。而欧阳夏本人包揽好几个班的所有课程，以至于他干脆放弃了课表和分班，每次把负责的所有学生聚集到大礼堂，然后把一天当成一节综合课来用。\n\n好在，他确信自己的付出是值得的，学堂不收学费，绝大多数父母都愿意送所有孩子来学东西。而这些孩子也确实学的很快，逼得欧阳夏几次加快教学进度。\n\n在收卷子的时候，欧阳夏打开了门，对着外面一块算他黑板上题目的一大群家长说道：“各位，要是不放心孩子们，可以进来陪着一块学，有爹娘在边上监督也能提高孩子们的注意力，请进吧。”\n\n在确定最后一个家长也已经入座并分到了一支笔和一个本子后，欧阳夏回到讲台，开始在黑板上写下一个个字。\n\n“现在，我们复习一下之前学的生字，之前没听的同学这次要认真听…”"
SFH.53.a:0 "…知识即一切。"

SFH.54.t:0 "课外阅读"
SFH.54.d:0 "一对好朋友刚刚一道升入这所学校不久，他们始终成绩优秀，但有些事他们却无法从课本上找到答案。老师告诉他们，虽然条件堪忧报酬不多，但劳工是王国最重要的人群之一了。没了工人，机器就会停运、工厂会停摆，国家会无以为继。可是，他们却在外面看到劳工受一些人嘲笑，许多劳工一旦被开除甚至撑不到找到下一份工作，更别提干不动的人了。\n\n为了解答这个困惑，这对朋友前往了这个老师一个晚上在校内举办的讨论会，地点和内容高度保密，实际上，他们别要求不能向外泄露讨论会本身存在。这在明面上是一次补课。主持这个集会的除了他们的老师，还有几个年纪更大些的学生。\n\n当那些学生锁死大门确保声音不会溜出去，然后开始朝参会的二十几个人发放一些没有封面的小册子。那位老师开始讲起劳工遭受的不公和一个叫芙蕾施曼的外国女子时，这对好朋友就感受到了不对。当台上开始谈及人鱼大使遇刺事件背后真正的原因，大声疾呼麟人之外的种族应当拥有的权利时，他们就已经明白了一切。这里没人想推翻国王枪毙公主，最多只有一个人这么想的，但觉得这里和革命党没有关系纯属瞎了眼。这也是为什么这个讨论会如此秘密，有一部分东西确实不适合公开。\n\n然而，这两个好朋友不准备向外透露任何事，现在在这里的人全都如此。学生们已经完全被说服，先前反应最激烈的人也已经平静下来，他们已经明白了问题的根源。\n\n在确定好了下次讨论会的时间地点，并被嘱咐了各种注意事项后，那位老师挨个和学生们握手告别，轮到这两个人过去一边握手一边“谢谢老师”时。他笑着说："
SFH.54.a:0 "“现在，我们是同志了。”"

SFH.55.t:0 "谁保护谁"
SFH.55.d:0 "镇上一大群人正围着一份新告示议论纷纷，话题的中心正是告示上新制定的《环境保护法》。\n\n“老李，这儿你书读的最多 你给大伙说说，官府这个新法到底是什么意思啊？”\n\n“它就是说，以后，工厂不能把脏东西一股脑全丢河里抛天上，得专门处理过才行、不能乱砍乱伐，把地给荒了、谁再往河里倒垃圾污染水，就打个二十大板关牢里住上一周。这树啊水啊，都得保护好喽！”\n\n“嗨！”一个彪形大汉拍着脑袋埋怨起来：“你说这帮人干啥不好，保护树算什么？这些东西我女儿死了估计都还活着，不如保护保护我们。”\n\n被称作老李的人抬起头，摆着手解释着：“这可就是在保护咱们。你想想，咱们镇上那厂子排的那烟多呛，多吸几口都折寿。尤其是它附近那条河，里面的鱼都死完了，人要不小心沾了那玩意儿，没死就算麒麟保佑！”\n\n“这么说，这是件大好事？”"
SFH.55.a:0 "“当然好事，我可不想被熏死。”"

SFH.56.t:0 "一日主夫"
SFH.56.d:0 "何泽正对着自己烧糊的菜进行思考。他曾认为自己是那种特别理解自家夫人辛苦的类型，但现在他不太确定了。\n\n作为个有文化而且不混吃等死的贵族，何泽一向非常开明，他对女儿和儿子一视同仁。并且自家女儿至少在读书和学识上比他儿子强多了，也相当尊重妻子，至少不是那种觉得家务活不重要的类型。可当真的应了国王的新号召和他夫人换了一天活计，他觉得以前的理解还是太浅。\n\n何家人自己吃的饭一般都是自己烧，很少让下人来。何泽从小到大不知道看了多少次烧饭，可一亲自上手，他觉得自己和傻子差不多，饭能煮成一锅粥，连盐和糖都分不清。他两个孩子险些被青菜齁死，一早跑走找茶水喝去了。\n\n他夫人则满脸笑意的坐在一旁，问：“今天感觉如何？”\n\n“累”何泽毫不犹豫：“管下人累，安排事情累，处理下人矛盾累，烧饭累，一整天看着俩糟心孩子累，还烦。”\n\n“知道就行，”夫人站了起来，收拾起餐具：“看在我今天一天下来感觉你平时也不悠闲，就不说你了，趁着天色还早，我去重烧一桌饭菜。”\n\n自己妻子要离桌的时候，何泽也站了起来：“唉，等下，”"
SFH.56.a:0 "“咱俩一起。”"

SFH.57.t:0 "占位符"
SFH.57.d:0 "占位符"
SFH.57.a:0 "占位符"

SFH.58.t:0 "房屋清理"
SFH.58.d:0 "阿桂从窗户缝隙间窥探着街道。刚刚从街西边开来三辆卡车，下来一大群警察，挨家挨户敲门。然后从人家家里提着几袋东西交给守在卡车边的人，再拿着看上去像枪和棍棒的东西去敲下一家。\n\n外面哪些披着官皮的人渣又来抢钱了，这不是第一次，这儿的警察基本没好东西，为首的那个肥猪更是三天两头带着手下来敲诈勒索，一想到这阿桂就又恨又气。\n\n外边的警察从对门那家出来，拍响了阿桂家门。阿桂下意识应话，这下没法当不在家了，他推开桌子，紧张的打开门。门外都是生面孔，为首的是个三十多岁，留着八字胡看上去不苟言笑的中年人。他一身黑色制服穿的笔直，大檐帽和黑大衣更是让他看上去更不好惹。\n\n阿桂吓得立刻大气不敢出，连连点头：“官爷好，官爷好——”\n\n“停！”为首的中年人立刻打断了他：“什么官爷，早不兴这套了。对我，叫警长，也能和我后边的一样叫警官。”\n\n“是是，警长好，警官们好。”\n\n警察们鱼贯而入，阿桂家里有五口人，但条件还不错，房子也大不少。\n\n“那个，各位警官，您几位来我这儿是有何贵干？”\n\n警长一脸莫名其妙的看着他：“干什么？帮你打扫屋子，还能干什么，抢劫啊？外面忙到现在，开车边上那么多袋垃圾和死老鼠你看不到啊？”\n\n阿桂这才意识到他们手上拿的不是棍棒刀枪，而是扫帚拖把和捕鼠用具。\n\n警长指挥警员们开始清理每一个肮脏的地方，同时拍了拍阿桂的肩：“以前敲诈你们的那些畜生不如的东西已经全进牢里了，以后，你们这片我负责管辖。你妹妹边上那两个拿扫帚的以后在你们这条街巡逻，样子记住了。不管猫狗丢了还是遭贼遭抢了都能找他们，他们解决不了我解决。明白没有？”\n\n阿桂还在点头，但他已经快哭出来了：“明白了，明白了，谢谢警官！”\n\n“明白就好，谢谢免了，应该的。”"
SFH.58.a:0 "“过来，我跟你讲卫生注意事项。”"

SFH.59.t:0 "新的开始"
SFH.59.d:0 "一艘满载乘客的轮船缓缓停靠在平京的码头，上面的乘客早在数十分钟前就涌向了甲板，人们看着只属于首都的车水马龙欢呼着，这里将会是他们的新家。这艘名为“红叶”的轮船是由李氏工业集团出资，交付大港海运船坞修建的载客轮船。这条新航线从南沙市出发，途径水步，金湾，利辛，并最终抵达首都。\n\n作为船客中的一员，武秀娟也感到内心止不住地欢喜。作为农民的孩子，出生乡安县的她原本一辈子都无法走出乡野。然而，随着新政策的出台，压在她家人身上的重担慢慢减轻了，随着政府对教育事业的投资进一步扩大，秀娟得以走出农村，前往南沙市接受教育，并在最后以优异的成绩考入首都的一所名校。她崭新的未来，或许就会从今天开始——抱着这样的想法，同其他乘客一道，秀娟踏上了平京的土地。\n\n她并非孤单一人。平京正逐渐成为远乡经济、文化的中心。在政府持续不断地改革下，远乡全国上下都开始逐渐复苏，而首都则逐渐成为了供给国家运转的心脏，为全国上下输送血液。那些对未来满怀希望的麟人会向国家的心脏部位聚焦，而取得了成功的他们又会将这份财富带回自己的故乡。\n\n没人知道这长久来看是否为正确之举，或许在未来的某天，这一切都会化作徒劳。郑红时常会担心这一点。可有时候，她又会羡慕那些因此得到了第二次机会的人。一个人内心的希望或许微不足道，可成千上万的人民的力量是宏伟的，对未来怀有希望的这些人会成为远乡未来发展的关键，她清楚地知道这一点。"
SFH.59.a:0 "事在人为。"

SFH.100.t:0 "背叛的滋味"
SFH.100.d:0 "当郑钧走入自己的办公室时，郑红仍处在慌乱之中。\n这几天，随着她越来越多地参与到远乡王国的政治活动中去，已经有多项由她起草的政策决议开始推广。虽然这其中大多数是一些无关紧要的事务，可她本人依然对此怀有相当的成就感。\n\n直到来自国王直属的情报部门向她提交了关于政策落实的报告。其中大多数是小事——比如运送物资的车队被拿着远乡正规军武器的土匪劫了，或是送往存档的文档不知道为何在半路中因为司机下车扶老太太过马路而被风吹走，又或是一条野猫误食了来自中央的命令文书——这些郑红都还可以处理，直到压垮骆驼的那最后一根稻草。\n\n前些日子，她规划了一个关于平京周边地区孤儿院的新决议，提出要整修设施并提供物资甚至是直接的资金支援。虽然不知道为什么物资和修建的决议在贵族会议上被因为各种诡异的原因而削减规模，资金支援的部分得到了极大的支持，几乎没有经过什么讨论就得到了多数通过，并快速得到了实施。\n\n“90%以上的资金“神秘消失”，只有10%不到的资源被送往了地方政府，在扣除了运输，社会宣传，各类中道工作的费用和资源后，实际抵达给各地孤儿院领导层的仅有约莫3.4%...”读到这里，郑红终于是怒不可遏，愤怒的她展示了如何快速清理桌面文件的技能（考虑到桌面上本来就没几张纸，成效并不好），在让纸张四处飞舞的同时将墨水重重地砸向了门口，负责推门的国王助理，小李则成为了受害者，只留下一脸惊愕的国王和略显尴尬的郑红。\n\n“抱…抱歉！小李，我这就给你找点纸擦一下…！”郑红看到自己的所作所为，多少感到有些抱歉。\n“没事，你们先聊。”苦笑着的小李很快消失在走廊的尽头，只留下父女俩相互干瞪眼。"
SFH.100.a:0 "沉默持续了很久。"

SFH.101.t:0 "对付贵族"
SFH.101.d:0 "沉默良久，郑红选择当了第一个开口的那个。\n“原来我一直以为，我可以依靠其他人的帮助。”她长叹一口气，“主要是…嗯，那几位您一直告诫我不要太深交的贵族们。我始终搞不懂一点，父亲。如果说那些人有着这么好的资源，接受了更为优良的教育并被我们委以重任，为什么还要在背后偷偷摸摸的搞小动作呢？如果他们真的缺钱…不，他们也不缺钱啊！”\n\n“呵呵…咳咳。”郑钧笑了一会，不过很快便因为肺疼而停止了笑容，转而变成了轻微的咳嗽，“红啊，所以你之前想试试…现在感觉如何？关于之前我交给你的草案，你的态度有没有些许转变？”\n\n郑钧提到的“草案”是由他本人在半个月前独立撰写的关于处理远乡贵族体制的决议书。其中大概列明了几条纲要，比如削减宫廷贵族权力，缩小贵族议会规模并新增国王强制通过提案或是否决提案的权力，同时建立新的国家暴力机关确保各地政策的落实，反腐行动等。但郑钧本人却因为一件事犯了愁：究竟是选择维持国家稳定，优先选择改革道路，像老祖先一样，同贵族建立起更为紧密关系；还是下狠手，消灭异见者，冒着分裂政府的危险确保贵族不再干涉朝政。\n\n而最后实在是无法下定决心的他选择把决定权交由自己的女儿，不料，后者似乎对这份计划并不感冒。于是，郑钧便让他先参与一些同贵族合作的议案，看看效果以确认女儿的态度，实在不行他再自己拿主意——现在看来，他最开始的设想是正确的。\n\n“哈哈…父亲，如果您真的想放手去做，就算不过问我的意见，我也是全力支持的。”郑红苦笑道，“我确实不应该对别人抱有过度的信任。不过，真的很不可思议，明明以前大家可以是那么好的朋友。”说到这儿，她又叹了口气。\n\n“你能想到这一步，我已经心满意足了。”郑钧说着，一边找了把椅子坐下，“我希望你能做出最后的决定。无论如何，改革势在必行，但手段可以有很多。选择信任自己的朋友并不是坏事，老一辈终将老去，你们年轻人会接手，这点我无从判断，为了大局为做出让步也不是懦弱的表现；但你也可以选择把权力从不值得信任的人手中夺走，哪怕这条路上会充满了艰辛，亦或者是不可避免的伤痛。”\n\n沉思了片刻，郑红最终开口道：\n“父亲，我觉得…”"
SFH.101.a:0 "“...比起委屈求全，我更愿意称之为‘合作共赢’。”"
SFH.101.b:0 "“...如果阵痛可以换来未来，那我选择未来。”"

SFH.102.t:0 "绵里藏针"
SFH.102.d:0 "最先进来的是周公理，然后是王一公，通过让徐胜和周公义在门外相遇然后大吵一架的方式，这个不常出现的组合抢先一步面见了国王和公主。当他们看见散在地上的文件和门口的墨水，就知道孤儿院的事情已经被知道了。\n\n“陛下，殿下”周公理先行了礼，然后恭敬地先说出了自己的看法：“我觉得这次这件事，也不全是坏处，我们可以拿这个当借口敲打敲打的那些不守规矩的人。”\n\n郑均转过头去看这个出了名的老保王党，颇为诧异，他曾认为“对贵族出重拳”这样的话只会从他弟弟周公义那样的人嘴里出来：“讲讲看，你有什么打算”\n\n“不管怎么说，现在不是跟他们翻脸的时候。不管这帮贵族干了多少烂事，现在最好还是温和处理比较好……”\n\n郑红释怀了，看来周公理还是他本人，没有变化：“你的意思是，这事就这么算了？”\n\n“什么？不不不，殿下。”周公理连连摆手，往边上站了点，把一直藏在身后的王一公给拉了过来：“我的意思是，咱们可以用点迂回的法子。这些人天天用乱七八糟的理由来抗命，那咱们也大可以回敬他们。您看，我身边这位正巧愿意自费给孤儿院提供点经费，并且愿意帮忙开场宴会，把宫里的大小贵族都拉来聊聊。我敢保证，只要好好‘谈谈’，适当做点让步，这帮贵族肯定愿意少拖后腿多做事，主动把这次甚至之前的意外损失自己补上的”\n\n郑红仍然皱着眉，她能理解周公理想做什么，但不明白他想用什么手段和东西来拉拢那些比土匪还难对付的贵族：“那他们要是不呢？”\n\n“哎呀殿下，那就太遗憾了”周公理故作惊讶的瞪大眼睛：“现在是非常时期，我相信就算有那么几位拒不合作的贵族全家被强盗给抄了。甚至更麻烦点，被共和主义恐怖分子或者难民什么的给绑架了，那也是没办法的事嘛，还能给那些在观望的贵族提个醒……”"
SFH.102.a:0 "“他们和我们都是一条船上的人。”"

SFH.103.t:0 "醉生梦死"
SFH.103.d:0 "贵族们早已习惯了王一公豪爽而奢华的派对与宴会，但是国王和公主都有参加，这还是第一次。王一公的宴会上除了吃喝外还有别的正事，这也是第一次。\n\n尽管对那些受邀请的贵族来说这不过是又一场狂欢，但对王室和周家这样的忠诚派贵族来说却无亚于战场。得益于自己中立的政治态度和人脉，周公理在宴会期间一刻不停的向郑红引荐他认为帮的上忙，也有的谈的改革派贵族以及大量的年轻贵族子女。\n\n同时，国王拿着一杯从头到尾就没喝过的白酒与那些能拉拢的大小贵族握了一晚上的手。这是有价值的，通过看似没有意义的闲谈，郑钧成功把警告和自己的立场传达了出去。虽然不能保证这些人接下来能够收敛多少，可相信不傻的贵族都能听懂他的警告和继续摆烂的危险。如今，郑钧只能期待贵族和他们子女里的聪明人还够多，不至于让王国被他们坑害致死。"
SFH.103.a:0 "真是造孽啊……"

SFH.104.t:0 "尽心尽力"
SFH.104.d:0 "那些被称作温和派的贵族可谓是相当奇特，他们不求财也不求权，既不想要名声也不准备管事。可若说他们反对一切变化，这批贵族对王室推动的改革也没有任何怨言，甚至表现出了一定程度的支持。\n\n说到底，这些贵族想要的只有稳定，只要第二天一早他们起床自己还是贵族，能够吃饱穿暖。远乡没有一片火海土崩瓦解，整个国家能够保持稳定和秩序，不会有什么土匪强盗闯进自己家，那温和派也就没有别的谋求了。\n\n因此，有周公理和王一公当牵线人，一切都变得简单的多：温和派们会全力支持王室和政府，盯紧那些在如此危急的时刻还只顾着自己享乐作威作福的混蛋，有能力和意愿的进入政府填补一些关键性职位。确保王室的计划和政府的决定能够被有效执行而不受贵族阻挠，那么王室就能够保证最终报纸上不会全是关于叛乱与衰败的新闻，贵族们能拿到的津贴更多，生活更安逸，整个国家也能比过去相比更令人满意。这对双方都有好处，毕竟如果事态继续像现在这样恶化下去，那对两边都是灾难。"
SFH.104.a:0 "胜利属于默默无闻者。"

SFH.105.t:0 "个人魅力"
SFH.105.d:0 "最极端最激进的那些贵族，往往是一腔热血的年轻人和半只脚踏进土里的老头老太，不然就是出过国见过世面的知识分子。他们的诉求各不相同，但一个比一个极端。对他们来说，现在在进行的改革要么太革命要么太反动，不然就是模棱两可的障眼法。因此，这些贵族总是在不停的给我们制造麻烦。\n\n不过幸运的是，周公理在这些人间都意外的受欢迎。有他做中间人，郑红亲自和这些激进贵族进行了两次次分开的面谈。有周家兄弟帮忙，改革派贵族那边的问题不大，整场会面更像是激进改革派对郑红的集体效忠仪式。真正要命的是保守派和徐胜和他的狐朋狗友那边，即便使尽浑身解数这些家伙也不为所动。\n\n但到第二天，郑红与他们每个人单独聊完后，周公理仅从贵族们离开时的表情就能看出接下来好一阵子这些人都会安安分分的了。不过，当他试图追问公主是如何做到时，对方只是神秘的表示她使用了一些“个人魅力”。"
SFH.105.a:0 "理念不合利诱无效时，丑闻勒索便是最好的。"

SFH.106.t:0 "是，公主"
SFH.106.d:0 "自从郑红和郑钧一起决定更温和的对待贵族后，郑红的朋友汪悦似乎又回到了专注于研究和魔法的生活，但这一次终究还是她的主意帮了大忙。\n\n在精简职位来打击那些反对派贵族的主意失败后，汪悦提议不如反其道而行之，把宫廷职位的数量翻一倍。通过设立一些职权模糊重叠的岗位，稀释反对派能用的权力在事实上架空他们。并且大量安插更忠诚高效的贵族，未来重新精简岗位后，忠诚派贵族也能够有些相关工作经验，不至于在新位置上两眼一抹黑。\n\n虽然效果斐然，可郑红也发现宫廷里开始闹笑话，职权重叠模糊不清的岗位带来了许多意想不到的麻烦。虽然大部分问题都是无伤大雅的小事，并且打击反对派贵族的效果比想象中更好，许多贵族已经被专为他们安排的各种长难句和被有意写的愈发冗长的文书折磨的不愿亲力亲为。把大量真正的实务交给新上任职能重叠的同僚们，但汪悦对这些日程愈发频繁明显的观察和掩饰不住的笑意，实在难以让人不去质疑她当初提主意的动机是否是在拿国事找乐子。"
SFH.106.a:0 "可是这办法真的有用啊。"

SFH.107.t:0 "重拳出击"
SFH.107.d:0 "有汪悦带路的周公义抢在他兄弟之前进了办公室，并把徐胜这个大麻烦也留给了他来解决。他刚刚进门就听到带路的汪悦在那里肆无忌惮的发言：“陛下，公主，恕我直言，这帮贵族越来越无法无天了。必须现在就给他们出重拳，狠狠的打击他们，这些害人精就是不打不长记性！”\n\n周公义咳嗽两声，他想说的话都被这汪悦用最极端的措辞先说了出来，搞得他只能附和：“这个…汪小姐说的可能有些极端，但是对的。现在要是让步或者翻篇的话，他们只会更得意忘形，这次可能只是孤儿院的资金，下次也许是军队的响银和经费。再下次，估计就不止想要钱，还想要权了。”\n\n郑均没有反驳，但也没有支持，他只是静静的看着闯进来的两人，平静的问了一句：“那，你准备怎么做？”\n\n在某个人不过脑子的就说出“派军队和警察把所有犯事的贵族统统枪毙在自己家里”前，周公义抢先给出了回答：“可以适当的抓一些最恶劣的小贵族，但这种直接的暴力手段不能用第二次。我认为最好先拉拢那些清白的改革派贵族，精简没必要的宫廷职位，抹黑那些无能或者腐败的贵族，在政治上给他们施加绊子，一点一点把他们全部踢出政府，用更可信更忠诚的官员取而代之。”\n\n“如果他们还击或者造反呢？”\n\n汪悦先一步做出了保证：“做不到的，王国的警察可不是几年前那些吃干饭的废人了，您要是愿意，我明天就能想办法给这些人安个犯上作乱不敬王室的罪名关进牢里去。而且，我相信有陛下镇着，公主出面，我们根本不会要闹到那一步就能完事。”\n\n郑钧点点头，算是认可了这个主意，心中只剩下了一个疑问——"
SFH.107.a:0 "“这个搞研究的小姑娘什么时候能在这些事上也有发言权了？”"

SFH.108.t:0 "再见了您内！"
SFH.108.d:0 "宫里的贵族正在一个接着一个的收拾东西走人。\n\n在经过精确计算后，王室削减了经费，取消了大量没必要而意义不明的职位。比如“走廊氛围维持人”或者“钥匙运输官”，今天就是最后的期限日，没有一个尸位素餐的贵族可以继续赖着不走，汪悦和周公义被叫来——带着警察和卫兵们——监督裁撤进度，防止那个贵族突然想要撒泼打滚。\n\n郑红和周公义就在边上静静地看着这一切，有的人在临走时还带着夹杂愤怒与报复欲的眼神看向老保王党和王位继承人。但最后他们能得到的也就只有汪悦的催促推搡和扫地出门的结局。\n\n明眼人都看得出，这是一次目标明确的警告。那些最著名最主要的反对派贵族，要么本人遭到了解职，要么他们的盟友和亲属被赶出了王宫。其中还有几名确信与先前的资金失踪相关的贵族甚至被要求为自己的“重大工作失误”向王室支付一大笔赔款。\n\n不出汪悦所料，这是被扫地出门的寄生虫里，有相当一部分都是满脸皱纹的老人。他们平日的面孔要么露出一副飞扬跋扈嚣张至极的样子，要么在死气沉沉的基础上还透露着愚昧无知。如今终于浮现出愤怒和震惊，仿佛此生第一次知道世界并非一成不变，还存在一种叫做“解雇”的行为和名为“正义”的概念。\n\n这里没人会为这些无能贪腐还不忠的家伙说话，改革派们幸灾乐祸的看着昔日同僚们被踢出这里。并开始期待下一个被消灭的寄生虫是谁。"
SFH.108.a:0 "老东西们差不多该滚了，当然，不包括国王。"

SFH.109.t:0 "流言蜚语"
SFH.109.d:0 "“听说了吗，徐老爷家里养了好几个小孩子！”\n\n“小孩子怎么了？”\n\n“他不止养着，而且……！”\n\n“天呐！这老东西！真没想到！”\n\n最近，宫廷里弥漫开一股八卦之风。它由周公义和周公理两兄弟挑起，但由郑红授意。针对的目标就是反对国王的那些贵族，通过巧妙的，虚构与真实结合的丑闻和秘密，在无形之中，反对派贵族们的名声和人设就全毁了。他们的恐慌几乎是实体的，一夜之间，他们就从有着良好家世的名门望族，变成了道德败坏粗鲁野蛮，勾结沃姆的贪污恋童癖。\n\n有不少人一开始并不相信这样的消息，认为这不过是一些无耻的恶意中伤。但是当汪悦窜出来，也开始有意无意地聊起“36个小男孩”这样的八卦时。无论其内容究竟有多么离谱，贵族们也不得不开始相信其真实性，就算自己弄错了，总不会王室和警察头子都弄错了吧？\n\n通过这样的无耻行动，尤其是和徐胜走的近的贵族们（也包括他本人）的声誉变得毁誉参半，无论什么人看向这些“新闻主角”的目光都不可避免的被改变了。就算贵族们试图用证据证明自己的名声，也会有新的绯闻缠上来。就算很多人并不相信，或者只是半信半疑也不要紧。甚至这样更好，争执和讨论越多越好。"
SFH.109.a:0 "怀疑一旦种下，就难以根除。"

SFH.110.t:0 "独家爆料"
SFH.110.d:0 "梁文惊讶于王宫的守备之松懈，他几乎没做什么就轻轻松松的跑了进来。简单的就像是负责安排巡逻和安保的人知道这个时候会有一个记者试图偷偷进入王宫，于是专门留下了一个巨大的漏洞似的。\n\n最惊人的是，在进入王宫后，梁文就没在见过活人了。现在虽然是凌晨，但是，整个宫殿安静的像是已经被废弃多年一样。在穿过又一个走廊拐角后，梁文在一个小小的露天花园里看见了正背对自己和手下官员谈话的国王。\n\n整件事太过顺利，简直就像是国王专门在这里等着自己一样。但梁文来不及多想，他躲到墙后，尽量记住国王和那个被他称为周公义的人之间的说出的每一个字。两个人聊了很多，经济政策、外交方向、改革事宜、王位继承…梁文一字不改地全部记了下来，其中最劲爆的则是那些关于贵族的问题。\n\n国王在谈话中把最近的许多腐败新闻和负面消息产生的原因扔到了那些反对他的贵族头上，似乎他们似乎是王国最大的敌人和问题一样。像是怕人不知道具体是哪些，他还一个个把名字和职位都说了出来，并时不时说出三两句可靠的贵族八卦，当然，基本都是些丑闻性的八卦。\n\n就在梁文预感自己这次真是发掘出了一个大新闻时，一个穿着白大褂的小姑娘从后面拽住了他。这个自称汪悦的小姑娘以“擅闯王宫”的罪名罚了款之后，不知为何没有没收梁文的笔记本和摄像机。之后便把他赶了出去。\n\n当太阳完全从地平线之上升起时，梁文和他报社的同僚们加班加点的把自己的见闻全部印发了出去。"
SFH.110.a:0 "第二天，满载各种贵族丑闻的报纸席卷了整个远乡。"

SFH.111.t:0 "权宜之盟"
SFH.111.d:0 "徐胜看着愈发热闹的宫廷，开始思考郑红和郑钧是不是已经彻底把宫殿变成了一个大号行政办公室。在他反应过来前，王室就在贵族间拉拢到了足够多的支持，把他逼上了谈判桌。现在摆在徐胜面前的只有两条路：要么拉着盟友们和王室来一场胜负未知的宫廷斗争，要么安分的和王室合作共事。哪怕只是因为局势尚未稳定，王室不愿意内耗才做出妥协。他仍可以用这个机会更体面的在政府有一个合适的地位一直到死，作为一个极具影响力的大贵族度过余生。\n\n片刻，徐胜得出了结论，他的野心到此为止，他会接下王室的停战书，那怕只是暂时。那怕只是为了保住远乡王国这条他不能放弃的大船。"
SFH.111.a:0 "特殊情况下的特殊联盟。"

SFH.112.t:0 "微妙平衡"
SFH.112.d:0 "徐胜坐在自己的新办公室里，思考着他是从哪一步开始出错的。\n\n王室的行动比想象中更快更高明，郑钧，也可能是他女儿郑红在短短几个月里便打散了徐胜苦心经营的联盟和关系网。他的几个重要盟友不是跳船就是被架空或者被直白的罢黜，王室的忠诚派前所未有的强大，反对派贵族则不得不比过去任何时候都谨慎，踏错一步就可能招来厄运。\n\n即便是徐胜自己，也被调到了这个新的岗位上，他的势力没有被彻底清除，因此这个新岗位多少还是有些权力。但汪悦本人和她手下的线人警察正密切注视着自己，徐胜不理解这个搞研究小姑娘究竟如何在暗地里成了平京间谍和警察头子。但这个疯子女巫现在无疑是郑红手下的得力干将，并且会在自己犯错的第一时间扑上来试图置自己于不利。\n\n徐胜思考了一下，他还不算彻底的输了，至少目前他仍然是个有权有势的头面人物。现在最好还是安分的观望沉淀一段时间，如果王室未来势头不减，他可能得改变自己的整体目标和规划。但如果未来情况再次出现变化，那他就采取一些更不友好的行动。"
SFH.112.a:0 "人总是要学会随机应变。"

SFH.113.t:0 "人走茶凉"
SFH.113.d:0 "最后，轮到了徐胜被汪悦敲响家门。\n\n在之前的几周里，徐胜最后的那点势力也被连根拔起，他的前盟友纷纷跳反。不少人在夜晚被汪悦带领的黑衣警察敲门造访，接着就再无音讯，现在终于轮到徐胜本人了。\n\n但和预期的不一样，进来的只有汪悦一个人。她没有带着武器，看上去也没有用魔法烧死徐胜的意思。只是把手上的一沓文件和一个钱包扔给了徐胜。\n\n“游戏结束了，老家伙。”汪悦的语气既是通知，也是轻松的胜利宣言：“情况很明了了，你在远乡没有剩下的东西，远乡也已经容不下你了。但是，徐先生，郑红心善，她让我别直接在这里把你弄死…可能是周公理说动了她。但总之，你保住了一条命呀。”\n\n没有等徐胜的反应，汪悦摘下大厅里的每一副画，然后有兴致的找起了书柜：“明天早上之前，你不能留在在这里。这之前你想从这里带走走什么都随便，但我建议最好别到最后逼得我们把你扔出去。文件夹里面有一些你用得上的东西，还有一些钱。钱包里有船票、车票、通行证和你其他需要的证件。接下来你去奥罗日亚、皮奥瑞亚、南巴甚至是沃姆都和我们没有关系了。”"
SFH.113.a:0 "徐胜点点头，等于默认了自己未来的命运。"

SFH.200.t:0 "犹豫"
SFH.200.d:0 "虽说犹豫几乎快成了郑钧每日的必做事项，他依然感到十分头疼，尤其是在这次的事项上——政治改革。他非常明确一点：那就是一定要做出点表示，无论是把泰坦部队派上街头还是屁颠屁颠摇着白旗去找革命阵线，郑钧都明白，维持现状的可能大概跟明天他儿子回来哭着道歉差不多。\n\n目前的方案大概有两个大方向——可惜都不是很靠谱。一方面，郑钧可以翻翻老旧的文书，把前代国王郑铭时期的改革方案拿出来修改修改推行出去，改革派那帮油嘴滑舌的家伙肯定喜欢，老百姓看不懂但也会多少摇旗呐喊两声，但除此之外的所有人，也就是那些真正掌握权力的混账们，绝对不会让郑钧吃得了兜着走；另一方面，他也可以下点狠手，借助保守派的帮助扼杀社会上的反对派，这样起码他的敌人就只剩下真正控制了根据地的革命阵线和青天军了，但这样会使得未来压制保守派的难度愈发恐怖——虽然也不是不可以用镇压民众同样的手段去对付贵族们（毕竟这样也很高效），但真的值得这样做吗？\n\n或者，他还有一个选择。郑钧疲惫的目光望向门外，他可以去找自己的女儿商量商量，而不是把做决定的压力全部留给自己。他估摸着郑红八成会选择改革的方向吧，毕竟无论如何，善良的女儿也不会选择打打杀杀的改革方针——但他也不敢肯定，说不定自己的女儿有什么新的高见？一个自己没能想到，但出乎意料地可以推行的新方案？想到这里，郑钧内心居然萌生了一丝期待的想法。\n\n要做艰难的决定的话，就只有现在了。郑钧叹了口气，下定了决心——"
SFH.200.a:0 "“问问她的意见吧。”"
SFH.200.b:0 "“对反对派出铁拳吧，既然她不愿意看到，那就我来当这个恶人。”"

SFH.201.t:0 "她的想法"
SFH.201.d:0 "郑钧轻轻地推开门，不远处灰暗的办公室内，郑红依然在对着资料奋笔疾书着什么。郑钧摇了摇头，打开了一旁的电灯开关。“红啊，”他有些哭笑不得地吐槽道，“你这不开灯是为了什么？”\n“哦？哦！父亲，您来了啊。”听到郑钧的声音，郑红连忙起身接待，从一旁倒扣在其它办公桌上的椅子翻了个下来示意让父亲坐下，“我看其他几位助理都休息了，就让他们走的时候把灯一起带上，反正我很快也会跟上的，就当省点电嘛。”\n\n虽然很想批评一下女儿“你这省的这点电还不如别人去跑圈步的能量高”，但郑钧还是觉得迅速切入主题比较好，毕竟夜色渐浓，他希望自己的女儿还是能早点休息为妙。“关于…关于王国改革的事宜，红啊。”郑钧清了清嗓子，把自己带来的一沓文件递给郑红，“这是草案，你先看看吧，然后告诉我有什么感想。”\n拿到文件后的郑红立刻开始了翻阅，郑钧大概能从她的表情来猜到对应了哪一节的草案，比如改革派方针的哭笑不得，还有保守派方针的惊讶与畏惧。他大概花了两秒感叹了一下自己女儿是不是有做演员的天赋。\n\n“嗯…我简单读了一下。”郑红长舒一口气，仿佛是看了什么恶魔的文章一样，“这份…“保守派”方针，多少有些…不可理喻。无论是从政府还是民众的角度来看，都会对王国的稳定造成极大的破坏。而这份改革派方针呢…又显得有些不切实际了，我不认为摆脱来自政府派系的压力会是什么容易的事情——其实在这一点上两个方案都一样，可以的话，我希望尽可能避免内部的冲突。”她转身拿出几份文件，“而从民众的角度来看，我不认为民主化改革会起到什么立竿见影的效果，一个是我们需要进一步普及各地民众的相关认识，另一个是推行各地行政机关的改革需要超大量的资金来处理新雇员和建筑设施，但如果非要说的话——并非完全不可能。”她停顿了片刻，然后又强忍着笑意说道，“起码比跑去街上开枪有用。这效果可太立竿见影了，大家都给吓跑了。”\n“那这么说，虽然你觉得改革派方针可行，但你还是有一套自己的方案喽。”郑钧笑道。\n\n“当然了！”郑红兴奋地说道，“我们既不应该推行什么轰轰烈烈的政治改革，也不应该跟任何人搞这出‘打开天窗说亮话’的鬼道理。在一切社会基础都不成熟的情况下，我们应该把维持国家的稳定放在第一位，避免政府的内部冲突，向大家证明我们就算不需要对谁大动干戈，也可以维持国家的稳定！改革都会有，但主要建立在非政治结构基础上，因为对此进行的大面积改革推行起来势必会遭到反扑，更别说是什么大屠杀了。”她越说越激动，还又从身后拿出来一沓文件，“这些资料都是建立在我这段时间进行的调查上的，您看，这份是一般民众对政治改革的看法，这份是推行小范围改革情况下仍然会忠于我们的各派贵族的名单，这里是关于…”"
SFH.201.a:0 "父女二人进行了长谈，最后女儿选择了让步。"
SFH.201.b:0 "郑钧接下了文件，笑着向女儿点了点头。"

SFH.250.t:0 "立宪会议"
SFH.250.d:0 "“您确定要这么做吗？”周公理望着手上的文件，缓缓开口道，“陛下，这样做就相当于…直接把手中的把柄都拱手让人了。如果出了什么茬子，后果可是不堪设想啊！”握着文件的手微微颤抖，周公理那年迈的身躯仿佛承担不了这样的刺激，不过很快又平静了下来，“虽然关于合作人员的名单我们已经确认了下来，但这次依然太激进了——我没有想到陛下您居然希望这么早就进行这场会议。”\n\n“我也没有办法。”郑钧摇头道，“留给我们的时间并不充裕，很快就没时间了。我们需要尽快巩固和忠诚派一方的约定，确保没有任何人反水。现在我们的做的事情就犹如在铁丝上走路，一昧地停留只会愈发地站不稳。”\n\n“父亲您说的对。”坐在一旁的郑红抿了口茶，说道，“如今我们所需要的是尽快稳定人心的措施。这次宣告改革的声音已经像草原上的星火一般席卷了全国上下，这是我都不曾预料到的，到最后，我们也不得不被这份强大的力量推着走。”她思考了片刻，又补充道，“不过，会议的举办主要是为了建立起围绕在我们的忠诚派间的牢固契约，并不代表行政机关的改革需要立刻推行，那样只会起到反效果，我们仍然需要等待国内局势进一步稳定。而且，之后依然是由我们的声音来主导第一届新政府。”\n\n“我也认为陛下说的很有道理，兄长。”著名的改革派贵族领导人，周公义也发言了，“如今情况紧急，最好不要因为没必要的担忧而浪费时间。”\n\n“我并没有说举办立宪会议不好，公义。”周公理叹了口气，“但恕我直言，希望国王陛下您一定要三思，不要听信小人的谗言，从而让人握住了什么把柄。这场会议中，我们将不得不作出许多让步，其中或许会有无伤大雅的，但更多的是来自图谋不菲之人的陷阱。”\n\n“公理，你放心。”郑钧笑道，“我还没有老到那个地步，你我都认识多少年了？对我有点信心吧。”"
SFH.250.a:0 "去召集人员吧。"
SFH.250.a.tt:0 "虽然我们不需要多数人的支持就可以推进改革计划，但这样的后果会在内战爆发时以§R灾难§!的形式呈现出来。"

SFH.251.t:0 "议题一：改革的基础"
SFH.251.d:0 "堪比北巴斯蒂亚极寒环境下的冷空气笼罩了会议室，郑红差点就没忍住打了个喷嚏。无论是来自政府的保守派，改革派代表，还是来自民间的温和派革命党代表，以及一些在野的其它改革支持人士，甚至是因为有钱而特别受到邀请的企业家们，此时都心照不宣地选择了沉默，大家虽然在走进房间前还有说有笑，坐下来之后却慢慢开始干瞪眼。不过这也算是意料之内，郑钧向女儿使了个眼色，示意可以开始会议了。\n\n“今天很欢迎各位的到来，想必不用自我介绍，大家都知道彼此的身份，和来到这里的理由。”郑红清了清嗓子，对众人讲道，“虽说我们远乡王国有着上千年的历史，从古至今都是大陆列强之一，在过去，每一个土生土长的麟人都可以自豪地说自己来自远乡，是伟大冒险者的后裔，为神兽麒麟所庇佑的幸运一族。”她顿了顿，又用略显悲伤的语气说道，“然而，时不我与，我国在最为关键的时期没能追赶上其它列强国家的脚步，又遭到小人所暗算，最终在军事，经济上都落了下风，我和父皇都为此深感痛心。”郑红长吸一口气，既然特别将主持会议的权限交到了自己的手上，那她就决不能搞砸了，“为此，改革势在必行。在过去的几十年里，时代已经证明了我国现有的国家体系并不适用于未来的国际形势。在此，我们召集各位，希望共同商讨关于改革的大事——远乡需要一部宪法，一部保障了除金字塔顶层的社会精英之外的，面向全体远乡公民的宪法。”\n\n“不愧是皇女殿下，您所言确实有其道理在内。”宫廷贵族的其中一名代表点头道，“我们也已经提前收到了关于会议的资料，对此多少有些了解。像是‘可行性’这样的废话就跳过了，作为宫廷贵族的代表，在会议正式开始前，我只想确认一点——我们所需要的，究竟是怎样的改革？是尽可能地避免大面积修改政府结构，主要聚焦于改善社会体系的改革；还是学习大陆其它有类似经历国家的一场大面积政治改革？”\n\n“我认为，应该以稳定为主。”乡绅代表发言道，“虽说在座的各位都认可变化的必要性——不然也不会有出席的资格了。但作为乡绅代表，我实在不认为直接对政府结构下手会有什么好下场。我知道这话不好听，但说实在的，许多地方乡绅，地主都在各地基层政府有着很大的影响力，我国的经济结构依然大量依赖于这些人的存在，如果要进行改革，首先应当从社会体系入手，减少这些害群之马的影响力。”一旁的宫廷贵族代表也点点头，表示认可。\n\n“然而，如果政府结构不进行改革的话，对社会体系的改革很难起到效果。”一名温和派前革命党人起身说道，“各位相比也心知肚明，政府对社会的改革行动也不是一天两天了。可惜，多少本该福利千万民众的政策都因为贪污腐败而起到反效果？这点想必诸位肯定是心知肚明的。作为曾经革命党人的一员，我可以很清晰的提出一点，对政府的改革同样，不，更能在绝大多数我国公民心中留下深刻的印象。”一旁的实业家也点点头，并补充道，“实际上，现有政府对社会的改革，福利或是慈善行为并不是有什么缺失，只是效率不高，从财政的角度来讲，我并不推荐花这个冤枉钱。”\n\n众人的目光最终落在了郑红，郑钧二人身上。"
SFH.251.a:0 "恪守成规的保守式改革应当被唾弃。"
SFH.251.a.tt:0 "这将在改革结束后为我们提供政治点数的加成。"
SFH.251.b:0 "稳定而平缓的改革才是我们所需要的。"
SFH.251.b.tt:0 "这将在改革结束后为我们提供稳定度的加成。"
SFH.251.c:0 "我们应当吸取过去的教训，确保错误不被重演。"
SFH.251.c.tt:0 "这将在改革结束后为我们提供政治点数的加成。\n由于完成了国策§Y重启改革§!，该选项可用。"
SFH.251.dd:0 "我们不是已经有一份绝佳的蓝本了吗？"
SFH.251.dd.tt:0 "这将在改革结束后为我们提供稳定度的加成。\n由于完成了国策§Y延续父亲的政策§!，该选项可用。"

SFH.252.t:0 "议题二：政府对社会的控制力度"
SFH.252.d:0 "“下一个议题是…对社会的控制力度，准确来说，是对像是文学作品等文化产业，以及新闻媒体等行业的政策改革。”郑红对众人说道，“总的来说，可供我们学习参考的现成方案很多，利弊也已经得到了许多前人的实践。类似南巴斯蒂亚联邦的…‘言论自由’——如他们所称呼的那样；或者是参考皮奥瑞亚共和国更加严苛的审查制度；沃姆帝国推进政府介入社会活动的思路也相对来说比较有可行性。”郑红抿了一口茶，又继续说道，“我与父皇更倾向于学习沃姆帝国的政策思路。尽管我知道，在座的各位都对那群该死的侵略者没什么好感，但不得不承认的是，他们这套体系从实施的角度来说可行性更高，不会消耗太多行政资源的同时也不会造成一般民众的反感，缺点则是需要更长的时间来形成体系，短时间内没什么效果。”\n\n“我认为皇女殿下说的很有道理。”实业家代表点头道，“虽说该计划确实需要时间形成体系，但首先，它比起审查制度或是全面的放开，我们需要更加稳妥而不会破坏一般人思想自由的改革方案。政府可以和许多民间企业达成合作，向市场进行投资以推行多种多样的社会活动，也可以出资参与媒体行业的运营管理，这甚至可以为市场注入一剂强心剂。”\n\n“你在说什么鬼话，姓黄的。”一旁的贵族代表对实业家代表骂道，“你不就想找个机会投资你和你那朋友那点公司吗！到时候谁知道你们认不认真干活。要我说，肯定是开启审查制度最好，设立严格而明确的标准，这样既可以防止倾覆活动继续扎根发芽，还可以防止外国文化毒害我国青年。开启审核制度非但不代表着压迫，反而是代表了政府对社会活动，文化产业整顿的决心，这些审核标准如果可以，最好是公开，让大家都看到我们的决心。”\n\n“咳咳，你们说完了不？我说两句。”一旁的改革派代表开口道，“我觉得，向南巴斯蒂亚联邦学习言论自由的体制并不是什么坏事——只是需要进行一些执行上的让步。首先我们应当在司法中明确言论自由的边界，其次要根据当地发展程度进行试点，最后才在全国上下进行推行，这个进度大概应该是同我们的改革进度同步的。”\n\n众人的目光最终落在了郑红，郑钧二人身上，这次，又要他们决定了。"
SFH.252.a:0 "向那群联邦的自由派学习一下也无伤大雅？"
SFH.252.a.tt:0 "这将在改革结束后为我们提供稳定度的加成。"
SFH.252.b:0 "让政府更多地介入到社会活动中去。"
SFH.252.b.tt:0 "这不会改变什么。"
SFH.252.c:0 "推行审查制度吧。"
SFH.252.c.tt:0 "这将在改革结束后为我们提供政治点数的加成。"

SFH.253.t:0 "议题三：反对派的地位"
SFH.253.d:0 "“下一个议题是关于非建制政治团体的地位。”郑红摇摇头，叹息道，“想必有关这个话题，各位肯定都有自己的意见，我先说两句。就我个人而言，我认为应当建议一个明确的体系以保障在野政治团体的声音可以传入到政府里来，所以，尽管我们依然要想以前一样打压不符合我方总体利益的激进政治团体，还是要建立这样一个相对民主的系统。”\n\n“但是，这样不就正中那些激进的疯子的下怀了吗！”贵族代表拍案而起，怒喝道，“要知道，谈论到这个话题时，我们所面对的敌人就不止是原来大家所认为的革命党了。我们所面对的是那些希望把所有人都送上断头台，或是把所有人都洗脑，跑去舔他们的靴子的神经病。可别忘了除了革命阵线的根据地，南边可还有帮叫青天军的混账。我们应该加强以前的打压政策，明确好谁是我们的朋友，谁是我们的敌人。”\n\n“虽然不想承认，但我觉得王兄说的对。”实业家对贵族代表的说法表示认可，“不过，我认为维持现在的政策无伤大雅，通过各种社会活动和我们自身的努力来削减那些人的话语权，叫他们不得民心，才是真正优秀的解决方案。反正诸位也不打算跟他们合作吧？那就该打压继续打压，该放过就放过即可。”\n\n“我觉得，听取激进政治团体的意见是没问题的，正如皇女殿下所说，应当设立民主渠道以确保不管是谁的声音都能传入我们耳中。”温和派革命党人代表说道，“听不听，我觉得黄先生已经说的很明确了——如果不符合合作需求，那么不合作即可。但是，我还是想强调设立这样一个民主机关的意义，因为无论如何，我们都需要给民众发言的空间。”\n\n众人的目光最终落在了郑红身上，郑钧由于身体不适早已回寝，只有郑红能决定了。"
SFH.253.a:0 "减少他们可能的话语权。"
SFH.253.a.tt:0 "这将在改革结束后为我们提供稳定度的减成。"
SFH.253.b:0 "争取接纳温和派系。"
SFH.253.b.tt:0 "这将在改革结束后为我们提供稳定度的大量减成。"
SFH.253.c:0 "听取他们的意见也是非常重要的。"
SFH.253.c.tt:0 "这将在改革结束后为我们提供稳定度的加成。"
SFH.253.dd:0 "为什么要听这帮人的想法？"
SFH.253.dd.tt:0 "这将在改革结束后为我们提供政治点数的加成。"

SFH.254.t:0 "议题四：面向群体"
SFH.254.d:0 "“接下来是最后一项关键议题，假如我们真的要进行民主选举的话，究竟谁有资格参与到实际的政治活动中呢？比如选举与被选举权。”郑红一如既往地主持着会议，说实话，她已经快习惯了，“一种方案是仅仅允许拥有高度名望，贵族后代，学术精英，或是拥有大量资本，如地产，工厂，建筑等资产的精英人士参与政治其中，我个人并不喜欢这份方案，但它可以保证未来我国政治的稳定性和传承能力，确保不会发生什么大的改变。另外一个方案是学习沃姆帝国，允许除去外国公民，普通劳工，或是奴隶这样对社会贡献较低外的绝大多数人群参与民主政治，我认为这个可取性更高。还有一份相对激进的计划，学习联邦建立起面向普罗大众的普选制。”\n\n“我认为沃姆帝国的方案更加可取。”贵族代表说道，“首先敢问在做的各位扪心自问一下，仅仅允许贵族的子嗣，超级大地主和寡头富豪们参与的政治和以前有什么区别？就算在前几年依靠我们自身的努力可以确保腐败不会像以前一样的横行霸道，但谁知道未来又会发生怎样的变化？我们的改革一定要确保将来也能维持远乡王国的稳定。至于类似南联邦的普选制，恐怕就不用我多说了。我个人并不认为容易遭受激进分子煽动，缺乏教育的一般民众真的可以参与到民主政治中来——至少现在是做不到，我们需要时间的沉淀。”\n\n“王兄，你这话还真的挺开我眼界的，我还以为你会转而支持第二个方案呢。”实业家代表笑道，“看来我应该对你们贵族改观了。我也觉得第二个方案有它的好处，具体道理王兄已经说的很明白了，我就简单说一点。虽然许多诸如开餐馆的小型创业者单个来看，并不能显著地改变我们所认识的社会，但由大量相关从业者组成的充满活力的经济市场会是国家进步的关键一环，将他们也纳入政治的一环可以确保他们的忠诚和奇思妙想得到运用。”\n\n“黄先生所言极是，看来我也要对寡头们的观点做出一些改变了。”温和派革命党人点头道，“不过，我认为学习南联邦建立普选制才是最好的选择。许多普通的劳工，农民都应该有资格参与到未来的民主政治中去，防止无知无能者作妖是未来各地政府应当参与的事务，我们只需要确保大家都有这份权利即可。正如黄先生所说，许多普通人建立起的社会体系可以为国家的进步保障护航，我无论如何都认为即便是最普通的人也该有这份权力，还请皇女殿下三思。”\n\n众人的目光又一次落在了郑红身上，她有时候会觉得如果父亲在这里，一切都会简单很多。不过，早晚有一天，郑钧也会离开的，只有她可以做出决定。"
SFH.254.a:0 "毫无疑问，只有享有一定地位或拥有足够资产的人才有资格发言。"
SFH.254.a.tt:0 "这将在改革结束后为我们提供稳定度的大量加成。"
SFH.254.b:0 "在社会上贡献了足够社会价值的人群也该有资格。"
SFH.254.b.tt:0 "这将在改革结束后为我们提供稳定度的加成。"
SFH.254.c:0 "面向大众的改革才能不重蹈过去的覆辙。"
SFH.254.c.tt:0 "这将在改革结束后为我们提供政治点数的加成。"

SFH.255.t:0 "会议结束"
SFH.255.d:0 "昏暗的灯光下，郑红将桌面上的文件最后做了一次整理，随着会议的结束，许多之前提出但遭到否决的方案都可以存档或是烧掉。由于草案的数量实在是太过庞大，即便是在下午得到了来自几位助理的大力支持，郑红还是不得不独自一人干到深夜以完成这些工作。她望向那叠文件，一股笑意油然而生，持续了这么多天的会议，那么多次激烈的争吵，结果多数文件就落得了这么个下场——要么进文件柜落灰，要么烈火中化作字面意义的飞灰，真是讽刺。\n\n不过，谁又能说这些文件是没有意义的？除去会议代表提出的许多草案，其中有许多文件都是郑红与郑钧共同撰写的心血。她可不是什么写文件的老手，最开始好多亏，要不是有几位优秀的助理，还有十分耐心的父亲，自己最后会交出来个什么鬼东西，郑红真的是想也不敢想。\n\n虽然早些时日的会议中，郑钧还会参加甚至是发言，随着内容的逐渐推进，他的身影慢慢地不再出现，主导会议，统筹撰写文件，带领代表的职责慢慢地全都落到了郑红一个人的身上。这种感觉真的很奇妙——被人所信任，所依赖，成为万众的焦点；但又不得不承受万钧压力。\n\n万一自己的发言给皇室蒙羞，该怎么办？万一自己的发言激怒了众人呢？万一自己所做的调查根本就是缺乏可信度的呢？郑红时常会思考。她明白父亲让自己主导会议的用意，为了在将来继承这个国家，她必须努力，努力，再继续努力。\n\n起身的时候，郑红看到了摆在一旁桌子上，一沓异常整洁的文件。那是他们这么多天会议得出的最终结果——远乡新宪法的草案原件。直到正式运用前，郑红和出席会议的成员都有资格根据国情提议进行修改，而大家也不得不称呼其为“草案”，虽然大概率是不会有什么人真的提出修改内容就是了——郑红如是想到——毕竟已经为了它争吵太多次了，有心也无力。\n\这份文件是远乡改革的希望，郑红想到，也是她证明自己能力的最佳途径。她想成功，想证明自己不是“郑钧的女儿”或是“皇女”，而是一位真真正正的国家继承人，一位敢作敢当的政治家。一切都要等待明天会议最终表决的结果（尽管事实上，即便因为会议失利而导致表决失败，该宪法也可以在未来得到实施）。"
SFH.255.a:0 "让我们祈祷..."

SFH.256.t:0 "临时会议取得成功！"
SFH.256.d:0 "“...到此为止，根据与会人员表决同意的票数，我们得出了超过二分之一的结果。”郑红用颤抖的声音慢慢说道，而她的父亲正在一旁用温和的目光注视着这一切，“看起来，各位，我们最终得到了一份多数人同意的方案。我们做的工作成功了，虽然我知道，诸位之中肯定仍然有对一些条款感到不满的人在，但既然在我们之中，这份草案得到了多数支持，想必等未来我们公布它的时候，也一样会成为受到大多数人欢迎的改革吧——让我们相信未来，相信以后会更好吧。”\n\n掌声响彻了整个房间，虽然也有面露不满神色的人员在，面对多数人的认可，他们最终也选择了相信会议得出的这一份改革方案。原先忐忑不安的心情几乎是被一扫而空，在那一瞬间，整个房间形成了非常独特的“团结之情”，曾经是死对头的贵族和革命党居然握手言和，来自实业家的代表也终于没有继续阴阳怪气其他政治家了。\n\n郑钧和周公理站在房间的角落，他看着女儿因完成了重大工作而露出的笑容，如释重负般地长舒一口气。周公理也露出了欣慰的神色，看着他因理想实现而兴奋不已的弟弟，他心中涌现出了一股非常奇特的感情。\n\n“感觉像是交班了一样，对吧？”周公理缓缓说道，“当年陛下您接手的时候，局面真的跟现在大不一样。几十年过去了，没想到后人做到了我们曾经所无法做到的事情。儿臣感觉甚至欣慰，或许也是时候…”\n\n“公理，你这话可说太早了，我们的工作还远远没有结束。”郑钧苦笑道，“直到我们得以成功交班的最后一刻为止，你和我都不得不坚守岗位。毕竟，为他们的未来保驾护航是我们最后，也是最重要的任务了。”"
SFH.256.a:0 "阶段性的大胜利。"

SFH.257.t:0 "临时会议失败！"
SFH.257.d:0 "尽管失败并非是无法预料到的结果，当它真正来临时，郑红还是感到无比的心力憔悴。他知道会议上的投票不过是一点“政治作秀”，其可信度比起去大街上随便拉个人过来做问卷调查得出的结果来讲差不了多少，可无论如何，参与投票的都是在过去的几天内深度参与会议的其它代表，他们的意见对于郑红与郑钧计划的改革而言必不可少——来自他们的支持也一样。在会议的最后，无法取得多数人的支持意味着这份改革方案最终多少会受到来自社会上强大的反抗活动，起码在接下来即将到来的内战时，这会导致更多人同反对派合作。\n\n尽管如此，他们都没有其它选择了。无论是对于郑红而言，还是国王郑钧，改革到了这一步已经没有了回头路，他们能做的只有硬着头皮上。"
SFH.257.a:0 "这下可糟了..."
SFH.257.a.tt:0 "由于会议失败，前面选项所预计会得到的稳定度及政治点数加成将不会获得。\n并且，在内战爆发后，会有更多领土倒戈向敌对势力。"

SFH.300.t:0 "对付革命党"
SFH.300.d:0 "自打南巴斯蒂亚共和革命的火种点燃以来，名为“革命党”的团体就一直干扰着远乡王国正常的政治运转。“革命党”一词最开始是希望推翻君主制，计划直接照搬南巴共和革命式路线的叛军用来自称的名词，该叛乱群体很快随着伟大战争的愈演愈烈和时任国王的妥协而不攻自破，取而代之的则是由数个以民主，自由主义为核心的温和政治团体，他们与政府合作，并开始准备远乡王国的民主化改革，主要参考的蓝本为南巴斯蒂亚地区偏北部的一些二元式君主立宪国家，革命党，一个曾经用于指代叛军的名词，慢慢变成了时代的先驱和进步的领航者，甚至为政府官方所使用。\n\n不过，好景不长，郑铭的突然过世和新的世界大战如同天打雷劈一般搅乱了远乡王国的正常改革——不过，就算没有这些大事件，恐怕美好的“合作关系”也维持不了多久。伟大战争结束后，以共产主义为核心的政治团体迎来了新春，虽说因第二次北进运动而带来的泡沫式经济掩盖了他们的风光，随着世界大战和经济危机的爆发，他们很快取代了曾经的温和政治团体，建立起了极为激进，拒绝任何同官方政府合作的革命阵线，并完全同远乡皇室决裂。\n\n对于郑钧而言，怎么应对革命阵线基本上没什么好谈的，不论他们对那些温和派采取了什么样的政策，同革命阵线谈判实在是有些痴人说梦。就算国王真的有这份意愿，恐怕革命阵线也会要求“郑钧项上人头”之类的条件来要求政府让步；而且，就算真的谈下来了，诸如缩减围剿规模的政策也会极大地损害政府的威望，毕竟，同政治团体不同，革命阵线可以实打实的叛军。他个人认为，当下的政策应当专注于扩大控制区域的抓捕力度，争取消灭革命阵线的地下情报网络，并在除了实际发动进攻外的多个方面采取强硬措施。\n\n但郑红想的却是另外一码事。比起进一步扩大各地的逮捕力度，她认为接下来应该借助温和派前革命党人的力量，从内部试图瓦解革命阵线。虽说许多温和派在如今的革命阵线常常遭到冷眼，他们也同样是叛军的重要组成部分。郑红认为可以通过和现有的温和派前革命党人合作，让政府摆出一副“和平”的姿态，仅仅是反对那些激进的叛乱分子，这样可以使得他们占据道德的制高点，并且让更多人转而支持王国政府，而不是被迫支持阵线。"
SFH.300.a:0 "郑红说的对，应该用更温和的方案。"
SFH.300.b:0 "浇灭革命的烈火，结束这一切。"

SFH.400.t:0 "应付工业贵族"
SFH.400.d:0 "工业贵族一般用于指代我国境内的多个工业寡头。构成这一群体的实业家起源于不同的时期，有的是在远乡王国扎根已久的同政府密切合作的古老组织，也有随着北进运动而崛起的大型集团，或者还有依靠着科技创新而快速崛起的新兴企业，但他们往往都有一个共性——在我国政府威望式微的今天，他们就好像喂不饱的一群饿狼，不断地要求政府做出让步，帮助他们的公司做的更大更强，破坏市场秩序，甚至是倒卖远乡的资产到境外去。\n\n目前的应对方案大概可以被分为两种。驾驭寡头的改革方案在政府内鲜有支持，虽说这份方案因为结果上可以让政府极大地消灭寡头的影响力，并且在长时间内十分有利于市场秩序的稳定和政府威望的再建设，其中的代价会是很严苛的——且不提寡头影响力被突然压制而造成的短期市场混乱，我们还不得不面对一批掌握了国家经济命脉，但又对政府愤怒无比的资本家。\n\n因此，作为驾驭寡头方案的相反版本，另一个方案提出可以同寡头进行合作，以和平的方式稳固市场秩序。比起宫廷贵族，地主乡绅，实业家们在很多情况下要讲理得多，哪怕是他们之中最愚蠢的那个，也明白竭泽而渔早晚要饿死的道理。只有政府和经济巨头形成互惠互利的关系，重建自由市场的经济体制，才能使得远乡王国进一步发展，走向未来。"
SFH.400.a:0 "让我们狠狠地打击寡头吧。"
SFH.400.b:0 "下手太狠或许会影响经济发展。"

SFH.500.t:0 "应付地主阶级"
SFH.500.d:0 "统领着远乡王国各地乡村地带的多为当地的地主乡绅，而由中央政府设立的地方政府反而没什么话语权。各地基层的腐败，隐瞒上级，甚至是脱离中央管控，在远乡王国偏远的乡村地带司空见惯，而这一点得到了政府内部多数人的共识，最终我们得出结论：土地改革将会是实现王国现代化的必须途径，摆在众人眼前的，只有做一条路可走。\n\n不过，尽管“做不做”上大家有了共识，“怎么做”依然成为了争论的核心。有人认为我们应当采用激进的解决方案，直接派出武装力量对地主乡绅的非法财产进行清缴，那些愿意全盘接受我们的条款的人可以成为新的自由人，拿着微博的补助和所剩不多的土地，去过自己的“自由生活”；而任何一点对我方条款拒绝的行为都将被视作敌对行为，他们会被直接送入监狱，恐怕大多数就此会烂在那里。\n\n温和方案的支持者会认为激进派的脑子出了点问题——至少他们在讨论的时候是这样说的。且不论对接受土地改革后的地主的待遇如何，光是派出武装部队来收缴财产这一点，恐怕就会激起各地民团的反抗，在当下的局面，进一步分裂国家很显然不符合我们的利益。另外一方面，温和的方案主打团结地主外阶层的普通人民，这可以体现出政府“亲民”的一面，为未来的改革打下基础，尽管这份“亲民”也可能会被指责为“软弱”。"
SFH.500.a:0 "凭什么要看他们脸色行事？"
SFH.500.b:0 "下手别太狠，避免不必要的冲突。"

SFH.501.t:0 "开诚布公"
SFH.501.d:0 "王一公在宴会上见到了一个过去从未来过，一出现就会让人倒胃口的面孔。\n\n汪悦的地位特殊，她每次出现，要么是带着黑衣警察们来带走什么人，要么是来通知不好的消息的。而现在，这个丧门星旁若无人的正在享用一盘烤鸡。\n\n“味道不错”——她中肯的给出好评\n\n“汪小姐，”王一公已经开始流汗，但还是靠了过去问好：“您大驾光临是来干什么的？”\n\n“吃饭啊”汪悦指指桌上被扫荡一空的烤鸡：“味道是真的不错，老王你和我说说，搜刮了多少民脂民膏才做好的？”\n\n适当时间的沉默后，汪悦像个疯子一样笑了起来：“行啦，不开玩笑了，我是来通知一下，我们要解决一下地主的小问题，搞点小改革了……你什么表情？我可比你还不高兴，放松，我们没准备要你们的命，还是要争取下你们这些乡贤的合作态度的。”\n\n特务头子笑着拍拍王一公的肩，比她一脸凶相时更加恐怖:\n\n“所以麻烦给你认识的朋友带个话，政府不会鼓动农民们把地主全部生吞活剥，但作为交换——”"
SFH.501.a:0 "“他们总得吐出点土地和粮食。”"

SFH.502.t:0 "小小骚乱"
SFH.502.d:0 "今天一早，山东地区的农民们突然组织起来，把当地最臭名昭著最坏最大的几个地主家院子给围了起来。局势在护院家丁朝外边示威要求减租分地的农民们开枪后迅速恶化，当警察赶到时，许多地主家已经惨遭洗劫，甚至有人丧命和失踪。\n\n但出人意料的，这一次，警察和当地政府没有站在这些乡绅一边，反而以故意伤害罪和袭击罪把他们和对农民动手的家丁全部关了起来。不久警方发表声明称，这次事件系共和主义分子煽动造成，而地主们开枪反抗的行为无异于将本地民众往山里的叛匪处推。受此次事件影响，原本对与王国政府合作持抵触情绪的当地士绅态度有所松动，比起革命党的到来，他们还是宁可放点血做点让步。"
SFH.502.a:0 "并且这些人永远不会知道其实是谁在那天组织了农民。"

SFH.503.t:0 "汹涌民意"
SFH.503.d:0 "在过去，土豪劣绅的恶名最多不过在一省之地人尽皆知，并且对他们根本毫无影响。但随着时代发展，报纸和电报、广播使得消息与新闻能以百倍于过去的速度在全国甚至全世界范围传开。利用这一点，得到郑红任命的汪悦可以用汹涌的民意压倒那些麻烦的反土改的刺头。\n\n随着那些最顽固不化的家伙频频在报纸上亮相，他们受到的孤立愈发严重，平日里对他们的“亲切问候”也越来越大胆。这给了反对派地主很大的精神压力，最终，他们要么屈服并参与到土改计划中，要么精神衰弱并被扭送疗养院，其土地要么被家人拍卖要么因无主而被政府二次分配给无地贫农。"
SFH.503.a:0 "这不叫卑鄙手段，这叫合理使用民众意愿！"

SFH.504.t:0 "意外的失败"
SFH.504.d:0 "汪悦看着调令，只感受到困惑。她没法理解是什么环节出了差错，依照国王本人的命令，她今天起不再负责土改事宜，所有工作全部移交王一公处理。\n\n想都不用想，一定是这个胖子动用了他家里那点人脉和关系，联合了他的朋友们朝国王施加压力。真正令汪悦无法理解的是，政府怎么会这么突然的改变态度，愿意放缓甚至说暂时停止土改？那些地主给出了什么样的许诺？发生了什么？诚然，这并不意味着农村的现状可以苟延残喘下去，土改最终还是会被提上日程，但效果和力度恐怕不会像现在一样了。\n\n披着白大褂的女巫在办公桌前思考良久，始终无法得出任何结论。到底什么样的诱惑能比愤怒的农民和起义的革命党人更重要？"
SFH.504.a:0 "…难不成他是个高魔个体？"

SFH.505.t:0 "缓慢进军"
SFH.505.d:0 "土地改革宣告胜利结束，汪悦觉得这件事原本能做的更好更彻底一些，不过现状她也很满意了。\n\n目前的成果已经用一部《宅地法》固定了下来，通过限制个人和家庭所能拥有土地的上限与保证贫苦农民对自己长期耕作土地的所有权。远乡王国得以在不过分激怒前地主阶层的前提下温和的进行土地改革。\n\n这并不是结束，而是开始。只要能巩固住现有胜利成果，随着时间推移，地主自然会变成拥有土地多一点的普通农场主。农民起义和地主暴动的可能性都在无形之中被消解，最直接体现便是汪悦和王一公都对这个结果满意。如果不出大乱子，在前方的想必是光明的未来……"
SFH.505.a:0 "工作结束，找老王吃顿饭去"

SFH.506.t:0 "勤劳工作"
SFH.506.d:0 "办公室里，薛庆山正端着自己吃了一半的午饭，应对着来势汹汹的王一公。自从早上知道了土改的事，这位大腹便便的乡绅展现出了一种与身材不符的灵活和速度。他从王宫跑到政府大楼，急切地想找到个能帮他做主，否掉土改计划的人。\n\n但不管走多少路，说多少话，如何把土改和青天军叛匪和革命阵线的赤色分子扯上关系，他都依然无功而返。末了，只能憋出一句空洞的警告:“万一真这么下去，没了我们这些勤劳干活的地主，谁给你们粮食吃？”\n\n“你这说的，那些佃户不是人似的。”在反应过来前，薛庆山的回答就已经脱口而出。但他又立刻觉得这话太不体面，于是马上找补，安慰起面前快要恼羞成怒的地主代表。花上整整一个中午，他才终于是送走了王一公这个大麻烦。倒在椅子上，看着桌上早就凉掉的饭菜，薛庆山不由得悲观地想到，王一公在地主中甚至是好说话的那种类型就已如此，那么剩下的地主呢？他们会如何反应？"
SFH.506.a:0 "但愿乡间别再多出几股叛匪了。"

SFH.507.t:0 "特殊优惠"
SFH.507.d:0 "自从土改计划开始，王胜武就没怎么睡过安稳觉。他的工作本身倒没多么困难，无非是确认各地收上来的账簿、地契等。给它们定个价钱，盖章，签字，然后交给更上一级的公主确认。尽管这些卖家总是叫苦不迭，并且偶尔伴随着暴力抵抗的企图。但这些并不是大问题，就王胜武而言，最大的麻烦来自于完成这巨大工作量中的乏味。他这几天看文书看得眼睛酸痛，签名盖章到手酸背疼，他写下的定价也越来越随意，可需要完成的工作量不见减少。\n\n短暂的休息和活动筋骨后，王胜武再次开始伏案，但没多久就在一份特殊的文件前停了下来。他认出了这份地契的主人是谁，这家人跟王胜武称得上认识，此外要是没记错，和王一公也挺熟络的。\n\n思考片刻后，王胜武认真审阅了一下这块地的价值，然后给这笔交易开了个更高的价格。"
SFH.507.a:0 "“给熟人的友情价”他这样想到。"

SFH.508.t:0 "剿匪战略"
SFH.508.d:0 "汪悦又浪费了一个半小时的时间，再一次审视了一遍剿匪方案。上饶、子安、白水、庐江……一个个地区与省份在她手中被标记，当地的地主豪强被列入打击名单，山中的土匪与原野上的强盗被锁定了据点。就在刚刚，军队在兰田附近抓了几百俘虏，其中还有妇孺。\n\n她自认为正在完成一件在远乡前所未有之事。依照郑红，依照王室之令，她正带领军警发动一场全国性的剿匪作战。封林锁路，烧山荡村，将那些根深蒂固而又恣意妄为的土豪劣绅和他们的盗匪朋友一同连根拔起。以维护王国的权威和法律，保护秩序和民众，以及最重要的，消灭这些人，以便于土改的推进。\n\n在这最后阶段，汪悦却反常地感受到一种忧伤，她平日里对地主、寡头还有那些贵族最为激进凶残，她甚至清楚一些贵族私下里将她和那些革命阵线激进左翼相提并论，汪悦一向以此为荣。但现在却有些犹豫不决，或许是清楚自己现在只要拿起手边电话，数百人的性命都将不保，但这几百人里甚至还有孩子，也许他们中不少只是试图逃离冲突的平民？或者某个地主的家属？这些人应该受到更仁慈的对待……\n\n这样想着，汪悦举起了手边的听筒，然后，电话那头的官兵听到了清晰无比的指令:"
SFH.508.a:0 "“没有例外。”"

SFH.509.t:0 "均田则国安"
SFH.509.d:0 "王胜武和汪悦有一阵子没见到过王一公了，实际上，这位乡绅已经从王宫中消失了，有一段时间。考虑到近期土改的进度和激烈程度，改革派们曾认为他再次出现时可能会试图发动某种“垂死反击”，从没想到收到的会是退休宴会的邀请函。\n\n当汪悦应邀去参加宴会时，直观感受是王一公比过去瘦了不少，虽然相较普通人还是那么的胖，但和以前比起来仍然是天差地别。他依然看上去豪放不羁，但眉眼间却给人一种忧伤和失败的气味。\n\n在饮下又一杯橙汁后，汪悦终于找到一个机会去和他对话，但许久，她只能问一个乏味的问题:“这么说，你不打算在平京继续呆着了？”\n\n前地主只是笑笑，他让杯中的液体尝起来都更加苦涩:“老了，累了，回家过退休日子。这样体面点，对咱们都好是吧？”\n\n“我只是希望你知道，我们干这些不是针对你，只是……”\n\n“我知道，远乡需要土改，干都干了，没必要给我道歉。我在利辛留了栋宅子，其他地方的基本充公了，今晚之后，平京可就再没我开的宴会了，好好享受吧。”"
SFH.509.a:0 "以一个地主的没落，换千万个农民的笑颜。"

SFH.600.t:0 "人鱼亲善大使遭暗杀！"
SFH.600.d:0 "昨日，人鱼族官方派往北远乡地区的“亲善大使”，纽特·卡尔，在白洋市进行演讲时遭到暗杀。其真凶已被现场抓获，确认为是一名对现状不满的狂热民族主义者。此人的身世基本媒体和政府的调查员拔了个干干净净，得出的结论十分悲观：我们根本找不到可以甩锅的政治团体，因为暗杀者的行为似乎真的只是出于他本人的意志。\n\n这件事对我国社会造成了很惨烈的影响，人鱼族已经对我方提出了正式的外交抗议，在短时间内，大量由人鱼族企业家出资的工厂不得不停办，原材料市场价格很快便跌破了可以承受的范围，而工业产品价格的快速上升使得局面进一步恶化，许多由我国企业家自己开办的产业都难以维持。一时间人心惶惶，而这份恐慌造成的抢购活动又进一步破坏了正常的经济运转，大量民众涌上街头上演“打砸抢”的好戏，缺乏相关训练的警察要么成为踩踏事故的亡魂，要么选择加入混乱的队伍，一起上街看看能不能零元购出什么好东西来。\n\n政府的首要任务在于稳定社会的秩序。人鱼族一方的抗议可以先放放，毕竟明眼人都看得出来，无论我们怎么付出，短时间内都不可能彻底让他们继续之前的投资。为此，我们最好把目光放在民众身上——稳定民心，确保街道上的秩序，这将会是我们的首要工作。"
SFH.600.a:0 "真的就过不上几天安稳日子，对吧？"

SFH.601.t:0 "接下来，怎么办？"
SFH.601.d:0 "随着街道上的秩序逐渐恢复正常，我们得以将目光从稳固秩序这一基础条件转移到真正要处理的问题——经济——上。虽然在过去的几天内，我国各地的混乱都让人不得不产生这样一个想法：如果人鱼大使根本没出事，大家继续以往的经济合作，那一切都会好起来的。\n\n围绕着这样的想法，政府内的主和派提出应当继续维持和人鱼的合作，借着这次提出应当设立起更加有利于远乡的贸易条款以确保不至于出现大家都没钱赚的局面，同时逐步恢复过去的合作关系。这样的政策最为稳定，但很可惜的是，恢复到过去的合作关系，即便最终的条款对于我方而言更有利（相对过去而言），这始终也是对人鱼一方的让步。\n\n然而，并非每个人都认可主和派的想法。对于主战派而言，此次机会证明了远乡人民已经对人鱼的行为忍无可忍，他们暂时的退出会是我们鼓励国内产业发展的好机会——既然他们自己都想走了，那我们还留他们干啥？经济转型的阵痛会是主战派改革计划的主要缺点，但形成更加成熟的独立产业长久看来更有利于国家的发展。\n\n无论主和亦或是主战，政府内惊讶地在一点上达成了一致：这次的动乱会是我们千载难逢的机会，因为它给予了我们出乎意料的好筹码，使得我们第一次，可以平等地（相对过于而言）和人鱼站上谈判桌。"
SFH.601.a:0 "重建人鱼信心，确保不出乱子。"
SFH.601.a.tt:0 "由于完成了国策§Y中间道路§!，该选项可用。"
SFH.601.b:0 "或许是这是个削弱他们影响的好机会..."
SFH.601.b.tt:0 "由于完成了国策§Y重启改革§!或§Y巩固传统§!，该选项可用。"

SFH.602.t:0 "王武的故事（1）"
SFH.602.d:0 "王武是一名人鱼企业管理下的炼钢厂工人，作为全村唯一摆脱了胎教肄业诅咒的，成功攻读了小学学历的“高材生”，他顺利进入了大城市打拼，并凭借高学历很快在这家企业找到了工作。王武必须承认，当他看到比种地要高那么多的收入时，他完全忽视了工厂糟糕的安全条例以及恶臭熏天的工人宿舍，而是一心一意的投入到了工作——他很快就后悔了。\n\n俗话说得好，凡事都有因果，但王武认为，他这个果未免有点太重了，麒麟在上。在炼钢厂的工作暗无天日，他眼前能看到的除了滚烫的铁水，就是漫天的粉尘。缺乏身体上的防护，常年吸入浓烟的王武很快就和其他工人一样，患上了呼吸道疾病——虽然他自己并不知道具体是什么病，他既没有钱看医生，也完全不懂医学。反正咳嗽嘛，过几天大概就能好了，他和许多工友都是这样想的。\n\n直到那一天，有几个工人实在是咳嗽得受不了了。在老板的加急班次要求下，王武的小队不得不在连续工作了十四小时的情况下继续工作。意外很快便发生了。当老刘又开始剧烈地咳嗽时，他们没有注意到旁边的栏杆是偷工减料的产物，当他们试图用力扶助栏杆时，几个人一起掉入了下方滚烫的铁水，连求救声都没能喊出来，就消失了踪影。\n\n愤怒的王武立刻带着小队剩下的人找到工头报告这件事，可那个胡子拉碴的老头只是摇摇头，告诉王武不要汇报，之后他会帮忙调新的工人补充小队空缺。可王武心知肚明，这场意外无非就是因为老板要求工人加时工作，同时没有完善安全制度才导致的。气冲冲的他没有理会工头的劝告，一路跑进了工厂的办公室，要找厂长讨个说法。"
SFH.602.a:0 "“我可不是好糊弄的…”"

SFH.603.t:0 "王武的故事（2）"
SFH.603.d:0 "一切都是徒劳，王武一边这样想着，一边穿过街道，往工人宿舍的方向走。他还记得自己的工友坠入铁水的那天，他还没等到去讨个说法，就被门口的保安轰了出来。他反复地请命也遭到驳回，仿佛老天也不想让他见到那头肥猪一样——那只该死的，毫无责任心与同情心的，只能靠魔法才能在陆地上生存的人鱼。什么时候畜生也有资格发号施令了？王武想到，他无法理解这些从海里来的“动物”为何突然就能掌握这么大的权力，工厂几个月前办周年庆那天，他曾远远地望过那家伙——他穿得人模人样的，长得和其他麟人也别无二致，说的也是人话，怎么就没一点做人的基本准则呢？\n\n“嘿，小王！你又失败啦。”突然的声音打断了王武的思绪，又是天天喝酒的老黄，王武想到，随后便把目光转向了坐在一旁躺椅上的身材矮小的老头，“我说了！你那点招都没辙，再怎么去找上头的人，你也干不成大事的。”\n\n听到这里，王武顿时感到一阵恼火。你一个天天下了班就知道喝酒骂人，调戏妇女的老头，连自己的工友都瞧不起，还有没有一点人性？他停止了脚步，然后骂了回去，“姓黄的，我他妈也是在为你争取更好的工作环境，你不帮忙也就算了，还倒打一耙？”\n\n“嘿，这话可就说的不地道了啊，小王。”老头眉头一皱，“我又没说的你做的不对，但你没找对方向，用死劲，当然不管用了。你看看你这几天，连那头猪的影儿都没见着吧？人都把你拉入黑名单了，谁知道你还能在这里干几天？还争取更好的工作环境呢…”老头叽叽得笑了两声，“你以为我活了这么久没见过跟你一样的傻小子？真是世风日下啊，现在的年轻人，对老人都没一点基本的尊重…”\n\n“那你又有什么高见？”王武心知老人说的不错，但他就是忍不下这一肚子气，这老头就喜欢指指点点，那他又能想出啥好法子？王武想到。\n\n老头听到这话，眼中闪过一丝奇异的光，他掏了掏屁股，像是找武林秘籍一样翻出来一张老旧，发黄的报纸。"
SFH.603.a:0 "“小王，听没听过一个叫罢工的东西？”"

SFH.604.t:0 "王武的故事（3）"
SFH.604.d:0 "距离王武被开除已经过去一个月了，没有赔偿金，没有道歉也没能见到老板，显然，王武不断的试探行为搞得上级也看不下去了，找了个机会就把他像破抹布一样甩出来了。离开工厂后的日子，王武先是在附近的商店街找了一份店小二的工作，虽然很忙，但同为麟人的老板娘念在王武的经历，并没有太刁难这个年轻人。因此，王武也多了一些时间，他开始联系自己在工作时结交的朋友，同时开始研究之前老黄告诉他的“罢工”。\n\n“工人可以通过集体放弃工作，破坏生产等方式向资本家示威，最后达成提高工作待遇的结果…”王武经常看老黄给他的那张报纸，说到底，他还是不了解他具体应该怎么做，只要叫大家一起停止工作就可以了吗？他想到了革命党当初的主张和行动，然后感到脊髓发凉，加入革命党那可是要杀头的大罪，千万不能跟他们扯上关系，不然连家人也会受到牵连。\n\n一边洗着客人吃剩下的盘子，王武一边这样想到。革命党的事情他有所耳闻，听说都是一群打着帮助老百姓旗号，到处烧杀抢掠的一群疯子。王武觉得再怎么说，那些“革命党”也不会这么吓人，可他实在是没见过几个慈眉善目的革命党，除去那些在公开处刑时掉落的人头，也就是警察张贴海报上的“恶魔”们了。要是和他们扯上关系，那罢工肯定就失败了——王武这样想到。\n\n他把一张碟子从水池中拿出，又从旁边把碗筷拿了下来，先用水冲洗掉了残羹，然后搓洗起来。“我可能把事情想得太复杂了”，王武这样想到，“只要去找之前一起共事的几位，问问他们的意见，然后策动剩下的工人一起别干活就行。大家一起这么做，肯定也会多几分胆量吧。实在不行，还可以把机器什么的砸了，听说那东西贵得很。”"
SFH.604.a:0 "既然决定好了，明天就出发问问吧。"

SFH.605.t:0 "王武的故事（4）"
SFH.605.d:0 "“不许动，举起手来！”\n\n神情严肃的警察一脚踹开了老刘的家门，由于这里空间尚且宽敞，所以被王武和他的罢工小团体一起用作计划中心，不过，随着鱼贯而入的五六名警察把他们几个人围得死死的，这里就不再显得宽敞了。\n\n“谁是王武？”领头的警察示意身后的同伴将手里的步枪暂时低下，“我们接到报告，有一伙工人密谋罢工。如果你现在自首，我们可以考虑减轻对你同伙的惩罚，如果不的话，你们将一视同仁地被全部被捕，明白吗？”他敲了敲手中的手枪，“反抗是没用的，不要逼我们动手。”\n\n“你们要找的是我。”留着冷汗的王武从众人背后走了出来，“我是王武。”他举起双手，同时示意其他人不要动，“你们凭什么抓我？我们只是几个工友一起聚会而已。现在的警察连老百姓结交什么朋友都要管吗？”\n\n“有话进局再说吧。”领头的警察示意身后的两名警察上前逮捕王武，可王武哪里会听这些人的命令。\n\n王武用力挣脱开两名警察的胳膊，对着领头的大喊道，“你知道我们为什么要这么做吗？你知道在这家工厂里，工人们顶着什么样的条件工作吗？所有的安全规章都是摆设，设备维护远低于安全标准！每天工人们必须呼吸着有毒的气体，在摇摇欲坠的护栏旁顶着极高的温度工作，如果出了意外，他们连全尸都没有！在这样的情况下，我们每天只能吃馒头拌腌菜，多久都吃不上一顿像样的荤菜！工人宿舍的水源早就被污染了，每个人都挤在一起生活，每天都有因为疾病而被送走的人…就算是这样，你们也要和这些人同流合污吗？我们的国家已经变成这样了吗？”他大喊道，直到被身旁的警察捂住嘴巴，房屋周围已经围过来了看戏的人群。\n\n“哎…所以我说过了，不要敬酒不吃吃罚酒。”领头的警察失望地摇了摇头，随后掏出了警棍。"
SFH.605.a:0 "警棍砸了下来，王武很快就失去了意识。"

SFH.606.t:0 "王武的故事（5）"
SFH.606.d:0 "距离王武出狱，已经有了几天。他先是告别了花了大价钱把自己赎出来的父母，然后找到了自己曾经的工友。然而，那些朋友所在的宿舍早就被新来的工人所占据，他们曾经生活过的痕迹就仿佛不存在一样。\n\n“嘿…这不小王吗。你居然还敢回来。”老黄还是坐在他的躺椅上喝着劣质啤酒，王武开始怀疑这人是不是靠着喝酒才活了这么久，“你要找的那几位早就被开除了，东西也被抄了。后来又因为跟你搭上线，被扣上了革命党的帽子，毙了。”他又灌了一口酒，然后继续说道，“你能出来，那可真是麒麟开眼了，厉害的啊。能有这么好的运气，还不赶紧远走高飞？”\n\n“妈的…”王武暗骂道，握紧了拳头，他强忍着内心的悲痛，向老黄问道，“工厂那边有什么变化吗？”\n\n“真亏你问得出来这问题，厚颜无耻！”老黄骂道，“多亏了你们搞的幺蛾子，上头天天来我们这边严查，啥事儿都干不得。”他摆出一副劝告的样子，继续说道，“我早告诉你不要多管闲事了，小王啊，别不听我劝，赶紧离开人鱼的地盘吧。再晚了，你也得被扣上革命党的帽子，这要不是念在你有个好父母，你早就去见麒麟大人了。”他一边笑道，一边挥手示意王武离开，“小心被保安看见。”\n\n回家的路上，不知是因为极度的愤怒，还是巨大的悲痛，他几乎什么也无法思考，只是像一具行尸走肉沿着每天的路线走着。他推开自己家的大门，一大股灰尘扑面而来，他定睛一看，才发现自己家也被抄了。大概警察是盯上他了，他家值钱的东西全都被抢走了，就剩下被破坏的家具以及一地的灰尘。"
SFH.606.a:0 "这群混账会为此付出代价。"

SFH.607.t:0 "思考"
SFH.607.d:0 "在远乡居住的那些日子里，纽特·卡尔时常会思考一个问题——人鱼和麟人的关系究竟应该走向何方？作为白洋人鱼政府中出了名的“能说会道，待人和善”，他被选中成为了所谓的“人鱼亲善大使”，顺便还兼职了一部分外交官的职务。然而，同他所预想的不同，远乡带给了他许多惊讶。\n\n首先是陆地的生活。纽特不得不承认，为了“适应”环境适应魔法，他就费了好一阵的功夫。然而，当他成功学会带着魔法生活后，和大多数来到陆地的人鱼一样，他爱上了这里。在陆地的移动没有在海洋中那么自由，可呼吸新鲜的空气，在陆地上自由地奔跑，以及享受堪称绝美的大自然风光，绝对是享受中的享受。\n\n然而，陆地生活的美好仅仅是对于他而言的。在各地巡视的过程中，纽特·卡尔，就和许多其它来到此地的人鱼一样，发现麟人和人鱼企业家的合作并非“互惠互利”，而是一种竭泽而渔般的猛烈剥削。人鱼企业家所开设的工厂环境之恶劣，薪资之底下是令纽特震惊的——无论是人类还是人鱼，在这样的环境下工作生活都是有违常理的。\n\n除此之外，他还对自己的许多人鱼同胞的行为感到震惊。那些利用自己全职之便在远乡各地吃喝嫖赌的“大人物”们，犯下了许多令人发指，同时又能让他们在海洋里坐一辈子牢的罪行——可他们得到了什么惩罚呢？不过是来自官方的支持吧，以及更多吃喝膘赌上的便利。\n\n可他又能做些什么呢？纽特感到一阵心烦意乱，说到底，他原先确实是以为自己正在参与一项伟大的计划，一项关于两个国家，跨越了种族与大地的分界线，团结到一起的计划。现在看来，他似乎只是成为了犯人的帮凶。他深一口气，试图让自己冷静下来。"
SFH.607.a:0 "接下来还有演讲。"

SFH.608.t:0 "演讲"
SFH.608.d:0 "“所以，如我之前所说，作为海洋的居民，人鱼社会和远乡社会有着巨大的不同。然而，在最近的几年里，我们可以看到，在有人鱼定居者居住的沿海城市里，多亏了魔法技术的发展以及各地善良百姓的友好交流，我们已经在和平共处的伟大目标上向前迈了一大步。”\n\n说完这句话的时候，纽特真想给自己一巴掌，可他克制住了这份冲动。自己是外交官，亲善大使，人鱼的“脸面”，他这样安慰自己道，强行把记忆里的那些惨剧丢到一旁。\n\n“在这里，我不得不向在座的诸位人鱼企业家们致以最诚挚的感谢。你们是我们白洋人鱼的骄傲，如果没有你们在两个社会交流甚少的时候，向…”\n\n还没等纽特说完这句，突然，一道巨大的声音在他身后响起。“发生什么事了？”纽特默念道，随后转过身来，他所看到了，除了同自己一样没能反应过来的保镖，还有一个黑漆漆的枪口，以及表情因愤怒而扭曲的一个麟人。\n\n王武握着手中临时改造的一把火枪，又咽了一口口水。他他妈居然射歪了一枪？是自己因为紧张而颤抖的手吗？还是因为握得太紧而出了太多的汗？无所谓，他已经没有选择的余地了，开弓没有回头箭。该死的，必须尽管打出第二枪，他这样想到，如果这也不中，他就只能带着自己那愚蠢的念想在牢狱里悔恨终身了。\n\n“滚出我们的国家！”王武大喊道，再次扣下了扳机。\n\n纽特看向自己那逐渐染上猩红的胸膛，感觉自己全身逐渐变冷，然后失去对肢体的控制，随后跌倒在地。他最后一眼看到的，除了惊慌失措的保镖，还有那个愤怒麟人的脸。他脑海中闪过自己那没有什么色彩的人生，然后开始思考，是什么让那个人拿起了枪呢？他这一生，见识了一个怎样不同的世界？纽特觉得自己可能已经有了答案。\n\n警察一拥而上，很快逮捕了王武，后者没有抵抗。"
SFH.608.a:0 "因果报应。纽特想到。"

SFH.700.t:0 "江洲人质事件"
SFH.700.d:0 "于江州市爆发的恐怖主义袭击震惊了全国，谁也没能想到这样一批来自五湖四海的无名小卒居然可以造成如此恶劣的影响。非人类物种在远乡一直是一个很敏感的话题，大多数非人类物种的定居地集中在现今西北特别行政区境内，在南远乡地区，只有中北方的山区中能看到非人类物种的身影，他们并不享受同其他麟人一样的政治权力，极少参与到正常的社会与经济活动中来，久而久之便成为了“异类”。人鱼的抵达极大地改变了这一情况，作为非人类物种，人鱼现代化的生产方式和经济模式震撼了许多种族主义的支持者，而接踵而至的事情大家都知道了——人鱼的超国民待遇，新的经济合作计划等等。\n\n然而，出乎所有人（甚至是种族主义者他们自己）的意料外的是，远乡境内的原住民非人种族的待遇并没有得到改善，多数老百姓所持有的偏见并没有改变。同样是长着尾巴的生物，坐在魔法气泡里逛街的人鱼似乎要比以猫狗等动物特征为主的亚人，兽人高贵得多。极端的种族主义恐怖分子非但没有消失，反而愈演愈烈。我国政府的威望没落也是他们崛起的一大因素，可谁也不会想到，他们居然会将一群还在上学的小学生作为人质，并毫不留情地杀害了许多无辜的未成年人。\n\情况十分危急。虽然国王与皇女已经在受到消息后的数小时内急速赶往江州市附近的临时驻地，谈判非但没有进展，双方的冲突反而愈演愈烈。愤怒的家长已经部分冲入校园，尽管武警部队尽力制止双方冲突，最终还是以数名家长的死亡落下帷幕。有几名学生试图私自逃亡，大多遭到劫持者直接击毙，少数得以逃出生天。随着时间的流逝，被关押在学校内的教职工和学生的身体状况正在急速下降，他们缺乏食物和淡水，高度的压力也使得许多人爆发了意料之外的身体疾病。在一切都太迟之前，我们必须尽快做点什么！"
SFH.700.a:0 "我还以为我生活在一个*他妈*的现代国家。"

SFH.701.t:0 "应对人质危机"
SFH.701.d:0 "“如果想要维持谈判的话，人质的人体状况会是很大的问题。如果是成年人还行，那些遭到关押的老人和小孩绝对撑不了那么久。”营帐内，郑钧对周边的人说道，“我们目前达成的关于运输补给的协议仅仅只能维持几天，更何况那群该死的恐怖分子会故意扣押口粮，借此制造新的谈判筹码。” \n\n“所以，根据我们这边的计划，最好还是以小股渗透部队为先锋，先假装谈判，进行部分人质交换计划，然后由我们来施行斩首行动，快速破坏他们组织的核心，然后把剩余的部队一网打尽。我们的时间很多，但留给人质的并不多，许多军官和国王都认为这是最为稳妥的方法。”周公理说道，他的想法得到了一些陆军军官的支持，元帅陆博也在一旁点点头。\n\n“但是，我们也要考虑到对方的身份。就算斩首行动成功进行，我们也不可能确保渗透行动百分百成功——万一没能及时疏散居民，而破罐子摔碎的恐怖分子对人质开枪了怎么办？我们需要确保不牺牲任何一人。”郑红说道，她反对陆军方面的提案。\n\n“我也认为是这个理。”周公义说道，“恐怖分子的要求虽然看起来不可实现，但许多条款充满了钻空子的空间。我们已经召集了司法部门的工作人员仔细研究，他们所诉求的司法改革本质上并不和我国法律冲突，因为严格意义上，过去对非人类公民没有出台过什么法律，他们所提出的“被歧视”很大程度上只是因为社会共识。我们可以先提出这一点，然后承诺政治安稳后的新一轮改革，争取让他们也妥协并释放人质。”\n\n“但是等你的文书搞完，怕不是人质都饿死了吧！”远乡陆军元帅姚白说道，“姓陆的你也真是，光靠渗透部队的计划绝对会败露，我国特种部队什么职业素养你也不是不知道。要我说，我们最好还是暂缓谈判，直接把正规军拉过来包围学校，一边抓捕他们的外部成员来换取筹码，一边准备突击计划。在最短的时间内，把这群该死的恐怖分子全部送去见麒麟！不，他们甚至没资格去见麒麟，应该赶紧落入地狱永不超生！”姚白愤怒地喊道，周围人的也默许了他的态度，因为大家都知道姚白的孩子也位于人质之列，“我们必须尽快突击，消灭这群该死的混账，在他们甚至没能反应过来之前，就用泰坦部队把他们全都碾成肉酱！”\n\n众人面面相觑，讨论仍在继续。"
SFH.701.a:0 "继续谈判，争取以和平形式解决问题。"
SFH.701.a.tt:0 "由于完成了国策§Y重启改革§!或§Y中间道路§!，该选项可用。"
SFH.701.b:0 "相信稳健派的计划，派出特种部队。"
SFH.701.b.tt:0 "由于完成了国策§Y中间道路§!，该选项可用。"
SFH.701.c:0 "激进派说的有道理，没时间浪费，也不该让步。"
SFH.701.c.tt:0 "由于完成了国策§Y巩固传统§!或§Y中间道路§!，该选项可用。"

SFH.702.t:0 "仁巧的故事（1）"
SFH.702.d:0 "一道闪光划过漆黑的夜晚，仁巧抬头望向窗外，这是不远处的商业街在办活动，五颜六色的烟花在空中绽放，仁巧微微一笑，这些美丽的景象大概也能算他一份功劳——要知道，那些烟花可都是他家的工坊做的！\n\n在离开了他出生的山村后，仁巧成为了为数不多走出大山的亚人。小的时候，他经常听自己那走不动道的爷爷讲述过去的故事，听说，在数百乃至上千年前，亚人并不需要为自己独特的性状——通常表现在皮毛，五官，以及尾巴上——而感到羞愧。本就居住在远乡半岛上的原住民为最开始那些山穷水尽的麟人探险家提供了宝贵的援助，可以说，远乡国建立的第一块，是当地的亚人原住民提供的。然而，时过境迁，亚人原住民被远乡国所鄙视，慢慢淡出了大众的视野，成为了所谓“野蛮人”，在山间过着极度贫苦的生活。\n\n这一切都不公平，仁巧时常想到，我们应该做些什么。因此，他选择走出了自己的故乡，来到附近的小城镇打拼。他并不是一个人——这里已经有了成规模的亚人聚集区，在没有麟人的帮助下，亚人们建立了自己的城镇，包括稳定的各类市场以及接入了远乡社会的经济系统——他们还有自己的银行！这一切都超出了仁巧的估计，很快，他就成为了为这个亚人社区添砖加瓦的又一位实干家。\n\n在发现许多以人类需求为标准的生活用品，比如床铺，缺乏对亚人群体的特化时，他选择开办了一家小作坊，最开始主要负责各种木工活，加工符合亚人需求的家具。随着这家小作坊地不断做大做强，他的业务甚至拓展到了烟花的制作，根据他的设想，下一步，他或许可以考虑在隔壁镇开一家分店。\n\n一边这样想着，他一边把车停在了工坊的车库里。这里是他工作的场所，同时也是他奋斗来的宝贵家园——而现在，似乎又成了种族主义者发泄的场所。他叹了口气，看向自己那被贴了满满一面墙的写满了侮辱性话语的纸张的工坊。上面大多是什么“畜生不要学着跟人一样生活”，“滚出我们的家园”之类的话，说实话，仁巧已经看习惯了。附近的麟人社区和亚人社区一直水火不容，这也是没办法的事。除了逆来顺受，他也不能真的做什么。"
SFH.702.a:0 "他默默地把纸撕了下来。"

SFH.703.t:0 "仁巧的故事（2）"
SFH.703.d:0 "疲惫的仁巧推开家门，把外套丢在一旁的衣架上，随后又魂不守舍地走了两步，最后瘫倒在沙发上，他脑袋上棕黄色的猫耳也。他端起茶几上的水壶，晃了晃发现没有水，就又放了下去。他简单眯了几分钟，随后用疲惫的双眼望向门口的鞋柜，发现她已经回来了。\n\n“诶，小芳，你今天这么早就回来啦？”虽然筋疲力尽，但仁巧还是尽可能地用比较有精神的语气问道，“你今天下午不用上课吗？”\n\n“哦！我们今天下午的老师请假了。说是感冒了，我就先回来了。”一个穿着简陋的小女孩从房屋的一角走出来，她从一旁抓起一块布，遮掩着大部分身躯，勉强地挤出一丝笑容，“今天都挺好的，您怎么先回家了呢？”\n\n“还是老样子，项目又黄了，他们看不起亚人工坊产出的设备…不过你不用担心这些。”仁巧站起来，走到被称为“小翠”的女孩面前，试图摸摸她的头，可女孩赶忙躲开了。这时，仁巧注意到女孩的脸上有几道红色的伤疤，还很新，“你脸上的伤是怎么回事？”他关切地问道，随后像是突然意识到了什么，“不会又是那几个小混混吧？”他咬牙切齿地说道，随后便要到一旁的工坊里抄家伙。\n\n“不不不！不用，不要…”仁芳芳赶忙拉住愤怒的仁巧，遮掩她身体的布料也掉落在地上，仁巧这一次，清清楚楚地看到芳芳身上大量的伤痕，从脖子一直延伸到了大腿，衣服也被撕扯地破烂不堪，“他们家里都是做警察的！您可千万不能——”\n\n“诶，我知道。”仁巧叹了口气，温柔地抚摸着女孩的头，“但你受了伤，必须得先处理一下才行。如果感染了就不好了，小芳，你先坐下休息一会吧，爸爸马上给你做一些基础的治疗，然后我们再到附近的诊所看看。”\n\n“好。”女孩答应道，乖巧地回到一旁的沙发上坐下。\n\n仁巧又想起了那个风雨交加的夜晚，当他看到这个麟人小女孩被当做垃圾一样丢在回收站附近时，他的内心被无尽的愤怒和关切所充斥——那是一种极为复杂的情感。仁巧，就和他的绝大多数亚人同胞一样，对高高在上的麟人充满着愤恨，可他内心的声音却告诉他，不惜一切代价，也要拯救这个被抛弃的小女孩。哪怕这意味着他会被一些同胞记恨，哪怕这位小女孩将会顶着“被亚人养大”的标签，在歧视中成长。"
SFH.703.a:0 "即便那样，我想保护你。"

SFH.704.t:0 "仁巧的故事（3）"
SFH.704.d:0 "又是一天的失败。仁巧坐在自己的车上，叹了口气。最近不知道怎么回事，同他打交道的许多伙伴都选择转身离去，无论他们是亚人还是麟人，似乎许多人都对自己领养芳芳的决策不满——或者他们只是单纯地看不起自己？随着一天天过去，仁巧越来越想不出自己来到这里打拼的意义了，他摸了摸自己的屁股，切断尾巴的痕迹还在隐隐作痛，为了融入远乡社会，他付出了代价，结果麟人不给他面子，亚人社区也开始讨厌他了，不讨厌他的也给不了多少支持——这算什么事嘛。最近也是麻烦连连，听说军队快要驻扎在这边了，不知道他们在处理什么…\n\n一股烧糊的味道打断了他的思绪，他抬头一看，发现那曾经被他称为“家”的地方已是一片火海。\n\n仁巧不知道该怎么形容他那一刻的心情，他只知道自己下一刻就如同断了线的风筝一样，不顾周围人的阻拦，奋不顾身地冲进了着火的房子里。他猛的把被烧得破破烂烂的房门撞开，映入眼帘的却是一片混乱的火场——整个房梁都塌了下来，大部分家具都在熊熊燃烧，过去能被称作“家”的那个地方如今只是一片混乱。可这难不倒仁巧，凭借记忆中的路线——还有过人的勇气以及麒麟在上般的运气，他很快便摸索出了一条通往仁芳芳房间的道路。\n\n猛地推开房门后，他看到了仍在呼吸的芳芳，这让他长舒了一口气。然而，身后掉落的天花板很快把他从美梦中拉回现实。陷入昏迷仁芳芳虽然尚有一口气，可在浓烟滚滚的火场，她显然坚持不了多久。仁巧回头一看，不禁皱紧了眉头，他冲入火场的道路已经被倒塌的家具掩盖，现在他被困在了这个房间里。\n\n或者他没有。他抱着仁芳芳，从窗户一跃而下。他尽可能地转过身来，用自己的身体充当芳芳的缓冲垫。巨大的冲击很快便到来了，他感觉自己的五脏六腑都被什么人强行拉出来了一样，围观的人群一拥而上，再这之后，仁巧就失去了意识。"
SFH.704.a:0 "你没事，就是最好的了。"

SFH.705.t:0 "仁巧的故事（4）"
SFH.705.d:0 "距离军队最开始以“根除革命党”为由宣布驻扎，已经过去几个星期了。仁巧看着街道上走过的几名士兵，暗暗想着不知道军队什么时候才开走。不过，他已经快没什么精力关心了。之前的那场大火不但摧毁了他长久以来奋斗得来的家，同时也将他用来谋生的工具全部摧毁，现在的他只是一个无业游民——不，甚至更坏，作为无业游民的同时，他还是一个亚人，一个被远乡社会所不耻的亚人。他原本打算采取下下策。他作为亚人的性状除了身体内部的构造外，平时能看到的也不过是猫耳和尾巴——尾巴他已经割掉了，剩下的就是耳朵。只要把耳朵也一起割掉，虽然他就此就聋了，但或许能找到一些麟人才能做的基本工作…至少这样，他还可以养活自己，养活芳芳。\n\n然而，今天的情况有些不对。距离芳芳本来的放学时间已经过去两个小时了，再晚一些的话，就要到军队宣布的宵禁时间了。因为今天有一些零工要做，仁巧就交代芳芳在放学回家的路上顺道买一些生活用品，但再怎么说也不可能拖这么久。心急如焚的他决定最好不要在家里一直等，万一芳芳跟之前一样，被那群杀千刀的欺负了怎么办？想到这里，仁巧气不打一处来，夺门而出，沿着芳芳平时会走的路线找人。\n\n时间一点一滴地过去，可他却什么也没能找到。询问学校一方的老师和保安后，他大概得知芳芳按照正常时间离开了学校——可买东西附近的街道也没有她的踪影。就当仁巧决定先回家一趟，看看芳芳是不是恰好和他错开先回家时，他听到了路边几个麟人大妈的谈话。\n\n“诶，你听说了吗？就是那个畜生养的崽子。”\n“谁啊？那个姓仁的？我之前见他来推销过几次产品，不过它们做的东西，肯定不靠谱，我就给拒绝掉了。”\n“对对，就是那人。他养的那个小孩，听说死了。”\n“哎？怎么死的？”\n“说是买东西回家路上让士兵给抢了，士兵听说她是亚人养的小孩，就直接动手了。”\n“哎呦，她家也没几个钱吧！现在士兵也不容易啊，都要抢畜生的钱过日子了。”\n“是啊是啊，听说那小畜生反抗之后被哪个士兵走火打死了…”\n“哎呀！这么大的事你怎么早不跟我说！等会我也去告诉小丽他们…”"
SFH.705.a:0 "她的尸体被丢在了回收站的垃圾堆里。"

SFH.706.t:0 "仁巧的故事（5）"
SFH.706.d:0 "“麟人已经在打压我们族群上走得太远了！我们应该团结起来，给他们一点颜色看看！如果你对我们的事业有兴趣，可以来东乡街道56号报道，我们欢迎任何有志向的亚人同胞！”\n\n仁巧看着台上演讲地眉飞凤舞的那个狗头人，他浑身的黑色皮毛像是造了静电一样竖了起来，耳朵则一直出于直立的警戒状态，仁巧从未见过情绪如此高涨的亚人。感到一阵五味杂陈的他转身离开，像这样的组织他见得多了，无非就是对麟人的社区发动一些武装袭击——以前的他会认为这是不折不扣的恐怖主义行径，可现在的他也不清楚了。如果麟人可以自由地，合法地对亚人社区进行惨无人道的压迫，那凭什么他们不能反过来这么做呢？\n\n他推着自己的小三轮，又经过了一条街道。货架上摆着的是他靠着从废墟挖出来的工具做的一些小工艺品，当然，基本都卖不出去。军队接管后，亚人社区的生存空间被进一步压缩，大家人人自危，都顾不得照顾仁巧的生意了——在这种情况下，麟人就更不可能帮忙了。这几周下来，仁巧已经快吃不上饭了。他想过要回老家，可军队接管后禁止了没有许可情况下的人员流动，而仁巧是不可能取得什么许可的。\n\n有时候他会想，芳芳死了，或许也不是坏事，她不至于在长大后继续受人欺负，也不至于像自己现在这样过着上顿没下顿的日子。可每当仁巧闭上眼，他的脑海里就会浮现芳芳那天真无邪的笑容，还有将她杀死的麟人士兵的丑恶嘴脸，以及那些看热闹不嫌事大的该死的麟人市民。而想到这里，泪水又会不争气的流下来，他知道自己渴望复仇，却没有勇气，也不知道从何下手。\n\n儿童的嬉戏声把他从思绪中拉回现实，他抬头望去，那是一所由远乡政府赞助的精英学府，里面的学生全是来自各行各业的麟人社会精英的子女。他们可以接受最好的教育，穿着体面，不必为生计而奔波，可以自由地选择未来从事的职业，自然，也不会因为自己的出生而从小遭人歧视。\n\n对于亚人而言又如何呢？绝大多数的亚人出生贫穷，他们一辈子也无法接受适当的教育，也无法在就业市场上占据任何领地。他们能做的无非就是在自己的社区内报团取暖，指望着铁血无情的远乡政府能不能“宽容大度”地不去管自己的死活——毕竟，不管还好，管了说不定大家都得完蛋。哪怕芳芳是一位麟人，她也因为自己受到亚人的扶养而备受歧视——难道麟人的社会连对自己的同胞的同理心都没有吗？当他们自己做着泯灭人性的行为时，他们究竟有什么资格管亚人叫畜生？难道他们自己不才是吗？"
SFH.706.a:0 "那个狗头人说的是东乡街道的几号来着？"

SFH.707.t:0 "陆千秋"
SFH.707.d:0 "陆千秋今年十三岁，在江州市这个相对偏远的城市而言，他的家族算是十分显赫的一脉。他的父母都是当地商界的大佬，虽然这份婚姻被许多羡慕的人称为所谓的“商业同盟”，但他自认自己的父母还是相亲相爱的。除此之外，他还有几个在军队里身居高位的亲戚，可能是因为位子太高，他自己也不知道对方究竟是谁，或许等他长大了就知道了吧——反正他也不在乎这一点。他只知道因为多亏了这几位亲戚，即便是在军队在江州市驻扎，他们一家也没受到什么影响。\n\n说到底，他一生中的大部分时间都没什么波澜，反正也没人指望他一个小学毕业没半年的毛头孩子干什么，或者专门找他麻烦。家庭中绝大多数的事务都由雇的保姆负责，对于陆千秋而言，他的一天基本就是起来，吃饭，上学，放学，吃饭，睡觉。\n\n今天和平时也没什么区别，至少陆千秋现在是这样想的。下课后，他转身去了趟厕所。不知道是麒麟作法还是某个不留德的混蛋，整个男厕所居然一张厕纸都没有。然而，俗话说人有三急，当陆千秋体内的洪荒之力以不可抵挡的势头向南方发动特别军事行动时，即便他的括约肌尚且没有像姓郑的那个国王一样失控，有时候人想要抵抗天意也是很难的。在十万火急的情况下，陆千秋只得在没有厕纸的情况下杀进了蹲坑。\n\n过了一会，正当他一边为自己那遭到玷污的外套感到不值，一边洗手的时候，多声枪响和惨叫声突然席卷了他所在的楼道，感觉情况可能不对的他决定先躲在厕所里，虽然印象不深，但他依稀记得自己那做将军的亲戚有警告过自己在这种情况下应该怎么做。\n\n他沿着厕所的窗户向外看去，许多蒙面人占领了学校的各个角落。他们手上大多拿着某种黑色的武器，陆千秋觉得那可能是枪，但也可能是其它的武器——该死，他真不应该把眼镜忘在家里——而且，这些蒙面人似乎都有一定亚人的特征，有些人有动物的耳朵，有些人的皮毛延伸出到了衣物外，还有人有尾巴。他们正有规划的将受惊的师生往体育馆的方向赶。\n\n情况突然发生了一点改变，有几个学生似乎想到了什么，对着蒙面人大喊大叫，老师也加入了进来，爆发了肢体冲突。随着一位带着面具的亚人朝天开了几枪，为了维持秩序，几名蒙面人开始殴打年龄尚小的师生，虽然剩下的人很快便安静了，可校园内很快便被几名遭到殴打师生的呻吟声所填满。看到这里，陆千秋感到双腿一软，倒在了地上，他感觉自己恐怕得再上一次厕所。"
SFH.707.a:0 "谁来解释一下发生什么事了？"

SFH.708.t:0 "无路可退"
SFH.708.d:0 "“你可以做到的，你可以做到的，深呼吸，深呼吸。”\n\n坐在前往学校的车上，仁巧深吸了一口气，可这几乎没起到什么作用，他握紧那把撬棍的双手还是微微颤抖。他望向窗外，正午的烈阳灼烧着他的双眼，大概是老天爷也看不下去他今天即将要做的恶行了吧。\n\n“如果我们的武器配备再全一点就好了。”坐在副驾驶的男人说道，“爆炸物太少了，如果遇到强攻的武警，得想办法构建更多掩体。我们的防弹装具也不够，长枪也太少了，这样在火力上有明显劣势，必须速战速决，尽早夺取校园。根据地图来看，体育馆是最重要的，在之前的会议上也强调过很多次了。各分队都对自己的任务没问题吧？”他对着装载了短距通信魔法的铁盒子说道，可仁巧在这里只能听到模糊的哔哔声，也不知道另一头到底有没有人。\n\n仁巧闭上眼，芳芳的那张脸又浮现在他的面前。自打走入那间房的那一天，仁巧就一直在怀疑自己是否做了正确的决定。亚人社区已经被残暴的远乡政府逼入了绝境，他们别无选择，即便是革命党也无法信赖——他们终究是麟人。现在看来，似乎只有极端手段一个办法了。他又握紧了手中的撬棍，试图把芳芳那张挥之不去的脸赶走。\n\n多亏了提前利用地图做了训练，他们的几个分队很快便按照计划占领了学校的各个要点。因为是上课时间，他们不需要在学校四处寻找落单的学生，只要对照课表占领教室即可。仁巧被分到的是二年级的二班。\n\n他推开教室门，示意身后的几个队友也一起进来。他看着师生那诧异而无辜的表情，不禁感到心头一紧，可他确实已经走得太远，无法回头了。\n\n他深吸一口气，然后喊道——"
SFH.708.a:0 "现在，谁都他妈不许动！"

SFH.800.t:0 "山雨欲来"
SFH.800.d:0 "“超过预测80%的部队被动员到控制区边界…同时观测到数量庞大的重武器以及弹药，以及大量后勤车队秘密出发…没想到还是走到了这一步。”郑钧看着眼前的报告，忍不住揉了揉双眼，虽然外面可谓是太阳当空照，这位作为一国之主的成年人现在只想忘记一切，返回寝室休息。报告非常简短，简短到了郑钧甚至希望打个电话到负责写这玩意的部门去把那些人骂一顿的地步，好好说上一句，“你们不知道这几句话背后的意义吗？”\n\n他并不是没有经历过战争，他现在还记得沃姆外交官递交给远乡政府的那一份文书，简洁而又冰冷，仿佛那背后没有数千万冤魂在地狱下呐喊一般。整个远乡王国的命运居然要被那么短一张破纸所改变，可悲，但郑钧又感到深深的无力。这样的事无论来几次，恐怕他都适应不了。\n\n有那么一瞬间，他想起了父亲年迈的脸庞，想起了妻子的微笑。如果他们还在人世，远乡是否不会沦落到今天的地步？他怀念父亲有力的臂膀，怀念妻子温暖的怀抱，那是无论外界有多么冷酷无情，他都可以找到安慰的一个美好世界。\n\n“战争马上就要来了，而且还是自己人打自己人，多可悲啊。”他一边想到，一边接通了指挥所的电话，即便窗户紧闭着，他还是感到了刺骨的寒冷。"
SFH.800.a:0 "“打。”"

SFH.801.t:0 "有组织的军队"
SFH.801.d:0 "急促的小号声将王五从睡梦中唤醒，类似的突击训练在军队中并不罕见，因此他很快便准备好自己的衣装，迅速同他的战友一道离开宿舍，在警备区的操场集合。在他小跑加入列队时，他的内心还骂了两句自己的上司，你说半夜搞什么突击演习呢？尽折腾大家。不过话是这么说，他可不敢顶嘴，而是遵从指示快速加入列队中。\n\n然而，事情的发展很快便超出了他的预料。平时紧锁着的军械库被几个军官打开了，一大帮其它部队的人在里面进进出出，负责后勤的部队和工兵部队搞了几个帐篷开始发单兵装备，而且全是实战配备。这可让王五慌了神，这帮人到底在干啥？难不成他的上司决定造反，要杀到郑钧家门口？在根据先前的训练路径领取完装备后，王五回到了队列，不远处的演讲台上突然走上了个看起来就德高望重的老头准备演讲，王五虽然是新兵，但他也依稀记得那人似乎是一位将军。\n\n接下来的事情完全超出了王五的预料。叛军发动了进攻，远乡正规军已经参与交火，内战正式打响…许多兵民已经在过去短短的几十分钟内失去了宝贵的性命。而接下来，他所在的部队将会乘车前往前线参与战斗。演讲以士兵们的欢呼收尾，情绪高涨的士兵们有序离开营地乘车奔赴前线，王五也不例外，类似的训练他们已经进行过很多次，早就烂熟于心了。\n\n不过，最后的最后，当王五回头望向自己生活了数个月之久的营地时，他的内心突然感到有一种被掐住的感觉，这是紧张吗？他在害怕战场吗？还是为即将到来的战斗感到兴奋？无论如何，他是没有回头路了。"
SFH.801.a:0 "向着地狱前进。"
SFH.801.tt:0 "由于完成了国策§Y现代化之军§!，该事件弹出。"

SFH.802.t:0 "混乱的军队"
SFH.802.d:0 "急促的小号声将王五从睡梦中唤醒，由于在老家习惯了早起干农活，所以他倒是很快苏醒并整理衣装。他的舍友们可就没那么熟练了，上铺那个姓刘的没反应过来，一个翻身摔下了地正嗷嗷叫喊疼，对面床那个大胡子的四眼根本没醒，口水都流了三尺长。其它地方更是一片混乱，还有几个有起床气的，直接大骂了几句难听的话，恐怕是隔壁营帐都能听得一清二楚。\n\n成百上千没反应过来发生什么事的士兵集合在操场，勉勉强强形成了大概还看得过去的队伍；几个睡眼惺忪的军官拿着一大串钥匙准备开军械库的门，结果没找到钥匙，最后找了个腿脚灵活的从排气口钻进去，从里头把门开了；工兵部队不知道为什么在另外一块空地集合了，然后又解散了，之后后勤部队的几个军官也跑了过去，然后又消失了。王五就和他的许多战友一样感到手足无措，许多士兵甚至开始担心自己的生命安全。混乱一直等到半小时后宪兵队赶到才停止，跟着他们前来的还有一位准备发表演讲的军官。\n\n接下来的事情完全超出了王五的预料。叛军发动了进攻，远乡正规军已经参与交火，内战正式打响…许多兵民已经在过去短短的几十分钟内失去了宝贵的性命。而接下来，他所在的部队将会乘车前往前线参与战斗。演讲以士兵们的沉默收尾，他们中的许多人早已料到这一天的到来，只不过没想到会这么快。在宪兵队拿着枪顶着的情况下，士兵们缓慢地乘车奔赴前线，王五也不例外，就跟他的许多战友一样，他对自己的未来充满了担忧。\n\n最后的最后，当王五回头望向自己生活了数个月之久的营地时，他的内心突然感到有一种被掐住的感觉，这是紧张吗？他在害怕战场吗？还是为即将到来的战斗感到兴奋？无论如何，他是没有回头路了。"
SFH.802.a:0 "向着地狱前进。"
SFH.802.tt:0 "由于未完成国策§Y现代化之军§!，该事件弹出。"

SFH.803.t:0 "不明显的厌战情绪"
SFH.803.d:0 "昨晚，黄琦做了个噩梦，他想起了曾经饱受战火摧残的远乡，想起了愤怒民众倾斜在他身上的怒火。那是一个阴云密布的早晨，昏暗的天空下的城市正被烈火所摧残，成千上万名愤怒的群众走上街头，从一开始寥寥数人的骂街，到最后演变成全城范围的暴动，仅仅只花了两个小时。作为一名警察，黄琦同他的许多同事一起，走上了一线。他拿着防暴用的盾牌和同僚一起构成了保护政府机构的防线，可他们那点人哪里能抵挡住无数民众的怒火？当他看到一个男人因愤怒而扭曲的脸庞时，他感到发自内心的恐惧，握紧扳机的手也不听使唤了。\n\n剩下的事情他不记得太多了，无数的枪声在那之后一齐响起，无数人的哀嚎一拥而上，把黄琦所剩无几的精神摧残得七零八落。当他因精神恍惚而倒下时，他眼前躺下着的是被他所枪杀男人的尸体，黄琦无法辨认那张脸上的表情究竟是怒火，恐慌，亦或者是后悔。\n\n然而，这次似乎并没有像他想象中的那样糟糕。虽然因为精神疾病问题，他早已退出一线，靠着长官的帮助拿了一个比较清闲的文职，但他还是在看到报纸后心急火燎地赶到警局，询问同事现在究竟是什么情况。然而，他得到的回应仅仅是简单的“待命”两个字，街上没有暴怒的民众，他也不需要再次将枪口对着他们…至少现在如此。\n\n在下班回家的路上，黄琦又一次看到了街坊邻居紧张的神色。他们双眼中的究竟是什么？他向自己问道，那是恐慌，还是愤怒？如果是恐慌，他们是在害怕战争带来的危害吗？还是害怕自己这样的懦夫会将枪口对准无辜的普通人？如果是怒火，他们是想要政府恢复和平吗？还是想要对自己曾经犯下的罪孽所复仇？\n\n那个男人的脸又在黄琦眼前浮现，迟迟不肯离去。"
SFH.803.a:0 "今夜无眠。"
SFH.803.tt:0 "由于完成了国策§Y我们尽力了§!，该事件弹出。"

SFH.804.t:0 "反战派气势嚣张！"
SFH.804.d:0 "黄琦仿佛做了个噩梦，他想起了曾经饱受战火摧残的远乡，想起了愤怒民众倾斜在他身上的怒火。那是一个阴云密布的早晨，昏暗的天空下的城市正被烈火所摧残，成千上万名愤怒的群众走上街头，从一开始寥寥数人的骂街，到最后演变成全城范围的暴动，仅仅只花了两个小时。作为一名警察，黄琦同他的许多同事一起，走上了一线。他拿着防暴用的盾牌和同僚一起构成了保护政府机构的防线，可他们那点人哪里能抵挡住无数民众的怒火？当他看到一个男人因愤怒而扭曲的脸庞时，他感到发自内心的恐惧，握紧扳机的手也不听使唤了。无数的枪声在那之后一齐响起，千百万人的哀嚎一拥而上，把黄琦所剩无几的精神摧残得七零八落。当他因精神恍惚而倒下时，他眼前躺下着的是被他所枪杀男人的尸体，黄琦无法辨认那张脸上的表情究竟是怒火，恐慌，亦或者是后悔。\n\n一阵嘶吼将黄琦从自己的幻想中拉回现实，眼前的景色却同那噩梦中的景象别无二致。游行的部队，愤怒的暴民，疲惫不堪的防暴警察，还有坐在后方心惊胆战的政府职员。黑压压的暴民如潮水般袭来，眼前的景色逐渐扭曲，黄琦咽了一口口水，他不想再犯下一样的错误，因此他又一次大喊道，“后退！”\n\n他的声音很快便淹没在了谩骂声组成的潮流，根本就不会有人将他的意见当回事，愤怒的蠢货们不懂得让步以保全性命，无论是民众还是政府都进入了高度紧张的状态，黄琦逐渐意识到，自己似乎已被命运推向了无可避免的结局。\n\n他眼前的世界扭曲了，所有人都被卷入了黑色的漩涡，慢慢汇聚成了一个难以言表的巨大怪物。怪物张开无底洞般的大嘴，以不可抵挡之势向黄琦袭来。他感到有一种神秘的力量推动着自己，“不要放弃，”他这样说到，却依然举起了手中的枪。"
SFH.804.a:0 "他开枪了。"
SFH.804.tt:0 "由于未完成国策§Y我们尽力了§!，该事件弹出。"

SFH.805.t:0 "社会暂且没有崩溃"
SFH.805.d:0 "刘冬泡了一杯茶，端详起今天早上买来的报纸。她今天的运气不错，因为老板被前段日子参观附近一家魔法科研所的时候，被操作不当的实验人员炸了个头昏眼花，目前正在医院躺着，预计过两天就能出院——这意味着刘冬作为一名助理，不但可以白白休息个两天，工作甚至都不会丢。反正她只要明天等老板醒了，带一篮水果去慰问一下那个肥头大耳的死胖子就完事了，皆大欢喜。\n\n不过，她在今天买早餐回家的路上注意到了一些不同寻常的地方。许多士兵在大街上排成队列行进着，附近整个警备区的兵力都被调动，集合在了郊外的某地，还有拉着各种刘冬不认识的军械的大卡车呼呼开过，是不是发生了什么不好的事？她一边这样想着，一边注意到了报纸的头条：内战。\n\n注意到这一条消息的刘冬先是一愣，不过在看到交火的地区离她所住的地方甚远后便放下了心来。对付一群叛军而已——她这样想到——能费什么功夫？或许过几个月就结束了吧。她想到今早出门买食物的时候注意到的街坊邻居的紧张神色，现在想想一切都说得通了，或许很快就不能这样随意地在街上闲逛了。她想起了儿时远乡各地的饥荒，不由得打了个寒颤，但毕竟都过了这么久了，政府也该有所作为了吧？\n\n一边想着，刘冬一边啃了口油条。"
SFH.805.a:0 "日子还要继续过啊。"
SFH.805.tt:0 "由于完成了国策§Y追求希望§!，该事件弹出。"

SFH.806.t:0 "群众陷入恐慌！"
SFH.806.d:0 "刘冬拼命地踩着自己的单车，希望能赶紧穿过混乱的街道，回到自己安心的家。由于最近内战的爆发，许多担心战火波及的民众都携家老小跑了。从小都被人当成是心大的老实人的刘冬显然不在其列，可她运气不好的在于，两条街外的他的老板并不这么想。后者不知怎的提前获知了要打仗的消息，风风火火的带着一家老小跑路外国了，只留下穷得叮当响的刘冬在破碎的城市里茫然。\n\n话说回来，她之所以要骑着单车在街道上穿梭，还是因为运气极好的她买到了附近市场仅剩的几袋粮食。她估摸着就算那个姓赵的很能做生意，用不了多久也会因为存货见底而被老百姓掀了桌子，或者他自己先跑路了，谁知道呢？总之看到刘冬有粮食的其他街坊领居显然不会坐以待毙，能赶紧回家把吃的藏起来才是第一要务。\n\n“喂，那边的，停车！”一个穿着军官的男子叫住了刘冬，本来刘冬打算借着自己的载具优势赶紧跑路，可看到那位军官身后几十人的队伍，她赶忙是停了车。“长，长官，请问有什么事？”她小心翼翼地问道。\n\n“把车后座绑着的面粉和小米留下，军队要用作补给，然后你就可以走了。”他一边说着，一边给手中的手枪上膛，“由于战争局势吃紧，赔偿的一切事务将会延至战后，违者就地按军法处置。”\n\n刘冬内心是一万个不愿意，但她也没什么选择。"
SFH.806.a:0 "“拿去吧。”"
SFH.806.tt:0 "由于未完成国策§Y追求希望§!，该事件弹出。"

SFH.807.t:0 "工业体系尚且安稳"
SFH.807.d:0 "老黄是一名工人——或者至少他的老板们是这么称呼他的。作为一位胎教肄业的普通街溜子，他的一生不能说是坎坷，起码也是曲折不断。年轻时犯过的事他已不愿再想起，现在的自己不过是一个不识字，讲话不利索，只知道怎么打螺丝的半截入土的普通人。\n\n内战带给他最大的影响既不是吃不上饭，也不是上不了班。实际上，由于政府先前进行的社会改革，远乡的几家大型工业集团都为员工提供了单独的食宿，并且围绕着工业园区设立了单独的安保部门，后勤部门等机构来维持企业运转。当然，老黄是不可能知道这些的，他唯一知道的就是上面下来命令，不做家具了，改做步枪。\n\n由于流水线的运用，老黄不需要了解枪械的全部原理，他所要做的跟以前似乎大差不差——无非就是找个木块测量尺寸，画线，然后交给下一个人切割。虽然一想到自己生产的东西最终可能会夺走某人的性命，老黄就感到不寒而栗，不过在高强度的工作下，他很快就分不清椅子腿和枪托的区别了。"
SFH.807.a:0 "多造点武器！"
SFH.807.tt:0 "由于完成了国策§Y远乡产业奇迹§!，该事件弹出。"

SFH.808.t:0 "工业体系陷入混乱！"
SFH.808.d:0 "“诶我操，你他妈小心点啊！”老黄对着两米外的一个工友大喊道，后者刚刚正一个不小心把手上正在制作的炸药摔倒了地上，“你那玩意要是爆了我们就都没命了！”\n\n老黄的这段日子过得并不安生，作为一位胎教肄业的普通街溜子，他的一生不能说是坎坷，起码也是曲折不断。年轻时犯过的事他已不愿再想起，现在的自己不过是一个不识字，讲话不利索，只知道怎么打螺丝的半截入土的普通人——而他最大的愿望似乎也显而易见了，就是作为一个普通人过几天安生日子，然后等着不可避免的死亡。\n\n内战的爆发打碎了他的梦想。随着工厂不得不迅速转型生产军工物资来支援前线，老黄的上司们下了非常绝对的命令。可问题来了：上哪里去找用来生产的新器械呢？原材料呢？工人的熟练程度呢？老黄所在的工厂经营状况并不好，在和平年代倒也还好，虽然没有流水线降低操作难度，但毕竟只是做做家具，大家慢慢练习总能想出点办法——但军工物资可完全不一样，准确来讲，那些炸弹，弹药和枪支可不是老黄和这一众小学学历都没攻克的文盲能轻松搞出来的。\n\n然而，工作必须继续。虽然老黄已经因为买不到食物饿了一天肚子了，可不工作就意味着必死无疑，尤其是在战乱的年代，谁会找一个文盲来为自己工作？他必须想办法完成上头给的指标，只求在那之前自己不会因为事故惨死。"
SFH.808.a:0 "苦日子还在后头呢。"
SFH.808.tt:0 "由于未完成国策§Y远乡产业奇迹§!，该事件弹出。"

SFH.850.t:0 "省份脱离掌控！"
SFH.850.d:0 "我们的一个省份脱离了我们的掌控，在内战爆发后，它会被在当地影响力更高的省份夺取。"
SFH.850.a:0 "该死的！"

SFH.851.t:0 "省份遭到叛军夺取！"
SFH.851.d:0 "我们的一个省份在脱离了掌握后，当地的叛军快速建立起了稳定的统治。即便武装冲突仍未爆发，叛军们也已经大摇大摆地成为了当地的主人。"
SFH.851.a:0 "不要太过分！"

SFH.900.t:0 "失去的过去"
SFH.900.d:0 "郑红最近从档案室里找了一些关于旧时代改革的资料翻阅，这是因为他需要进一步了解这个国家的历史，方便接过王冠。她不得不承认，这给了她很大的压力，许多知识的学习需要时间，而她最缺的就是时间。还好，最近父亲的身体状况看起来稳定了许多，加上自己的帮助，她应该还有一些时间巩固知识——这不，她开始翻阅历史资料了。\n\n每当看到远乡王国在世界大战前的繁荣，她就会为现在的衰弱的这个国家感到不值。究竟是什么导致了国家的衰弱呢？这个问题困扰了她许久，不用说，估计也困扰了她的父亲，以及她那未曾谋面的爷爷许久。关于改革失败的原因，远乡各地文人墨客，执政官员乃至贵族们都各执一词。有的说是政府太软弱了，接受革命党意见开始改革不说，最后也没能坚持下去，一开始向革命者让步，然后又向贵族们，最后落得两头不是人的地步；也有人说国王的所谓“改革”只是权宜之计，他们从一开始就没有准备向革命党让步，没有真正的体恤人民，最终被所有人背叛。\n\n在未来，郑红总有一天要决定自己的统治方针。无论郑钧现在计划走向什么样的政治改革，郑红都可以在此基础上改变自己的执政风格。从过去的经验中，郑红所了解到…"
SFH.900.a:0 "温和地对待他人，才是唯一的解决方案。"
SFH.900.b:0 "我应该强硬起来，将坏事扼杀在摇篮中。"

SFH.901.t:0 "为君之道"
SFH.901.d:0 "君主制在巴斯蒂亚大陆并不罕见。即使是在以民主政治为“卖点”的南巴斯蒂亚联邦附近，保有了较低限度乃至绝对君主制的政权也不在少数，更别说主要国家基本都是君主制的东巴斯蒂亚了。随着世界即将进入新的纪元，君主制的未来也是一个十分有趣的政治话题——当然，对老百姓来说如此，对于实际要接过王冠的郑红来说，这实在不怎么有趣。\n\n在君主制国家，无论具体政治体裁经历了怎样的变化，君主本人的形象在一定程度上就是国家展示给世界的样貌，同时也代表了政府最高权力机关的形象。在这种情况下，郑红本人将如何“塑造”自己的人设，将会对这个国家的未来产生很大不同。\n\n简单来看，郑红可以将自己塑造成一个仁慈的君主，体恤民情，对各行各业的人士都友好的态度。这符合郑红本人的意愿，在郑钧形象并不怎么好的当下，这还有助于在未来帮助新政府打造与过去不同的新气象，获得人民的支持。\n\n然而，郑红同样可以将自己塑造成一位强硬的君主——这里的强硬并不指国家政治形态，而是君主本人对待各种事务的意愿。强硬的君主可以更好的保证国家的权威，不会产生权力流失的情况，同时确保了大多数政治改革在稳定的情况下进行。"
SFH.901.a:0 "善良，仁慈的君主才是人民所喜爱的。"
SFH.901.b:0 "强硬，坚决的君主才是国家所需要的。"

SFH.902.t:0 "远乡的崛起"
SFH.902.d:0 "如果不出意外的话，远乡最终会团结在郑红的旗帜下并重新崛起。然而，这个国家在世界上的地位，目前来看，仍然是未知的。等一切尘埃落定后，郑红所需要带领这个国家做的第一件事就是向其它国家发出麟人自己的声音——到了这一步，就是时候决定该如何处理一些领土上的历史因素了。\n\n东巴大战以后，整个地区的局势都被重塑了。抛去那些关于王朝陨落与崛起的故事，对于远乡而言，最值得关切的便是她被沃姆帝国的走狗所夺走的领土——具体来说，是所谓“顿恩骑士团”的大半领地，以及一部分被今吉拉尼亚大公国所占据的一部分东方领土。在国家统一后，郑红将不得不面临处理这些问题的抉择——她应该采取强硬的姿态，即便这意味着可能让国家走上新的战争之路吗？还是倚重和平的外交手段，试图在处理问题的基础上和外国达成共识？\n\n除此之外，远乡未来的国际地位也是一大问题。东巴斯蒂亚局势风起云涌，任何试图偏安一隅的国家都会发现自己将不可避免地卷入时代的潮流，新的一轮大战或许是不可避免的。远乡应该采用灵活的外交姿态来避免新的冲突吗？还是借此重夺我们东巴斯蒂亚霸主的地位？"
SFH.902.a:0 "以暴力决定一切的时代已经结束了。"
SFH.902.b:0 "外族人不可信，远乡的崛起需要强硬的手段。"

SFH.903.t:0 "贵族们"
SFH.903.d:0 "只要君主制在远乡一日存在，那么贵族制便不会消亡，这点郑红心知肚明。贵族可以是皇室的得力助手，甚至是皇室的一部分，但他们同样也可以是国家的蛀虫，是破坏和平与稳定，反对进步的守旧分子，甚至要比保守的政治家更加可怕。远乡的统一意味着政治体系的大规模改革，无论是郑红将成为夺得大权的新王，还是走向民主，最终都必须与贵族们做个了断。\n\n简单的打压贵族影响力固然可行，只要不在局势不稳的情况下造成大规模反叛，仍然掌握中央大权的郑红大有实力打击贵族的影响。然而，贵族势力在远乡占据了多个支柱产业，打压他们的影响力势必会造成不满和不安。\n\n另外一种解决方案是搞好关系，郑红可以继续摆出她善良而仁慈的一面，确保在改革发展的情况下继续保证对我们忠诚者的利益。这样势必会对稳定有好处，但它可能会让郑红显得过于软弱——即便我们维持了保证中央的权威的底线。"
SFH.903.a:0 "谁都可以成为我们的伙伴，我们只是需要新的规矩而已。"
SFH.903.b:0 "他们终究是不可信的。"

SFH.904.t:0 "流民"
SFH.904.d:0 "经过乔装打扮的郑红正在街上视察，这里是平京郊外的一个贫民窟，多数从农村来到城市却买不起房的打工人会选择定居在这样的地方。不远处的工厂正不断地冒出黑烟，郑红可以清楚地看到流通在这个集脏乱差于一体的居民区的溪流遭到了严重的污染，空气很难闻，而且街道上也布满了生活垃圾和脏污，她很难想象成千上万的流民是如何在这样的环境下生活的——尤其是那些无家可归的流浪汉。\n\n她担忧的神情让身后的便衣警察有些慌张，意识到这一点的郑红摆手示意他们不必担心自己的安全，不过后者还是选择和公主殿下维持更近的距离，防止任何意外发生。\n\n郑红曾经听说过外国对待大量流民的方法。国家或是区域政府可以拨款专门建设大量模块化，质量差但能远胜于睡大街的普通房屋，同时提供类似救济院的组织，在发放不至于让人饿死或是因为恶劣环境病死的基本物资的情况下，组织流民参与到各类生产活动中去，这可以是和政府合作的私人项目，也可以是政府组织的公共建设等职位。等她上台后，她或许会采取一定的行动，然而，具体优先级如何，她还需要好好考虑一下。"
SFH.904.a:0 "国家应当优先完善救济措施。"
SFH.904.b:0 "就业才是重中之重，远乡不养闲人。"

SFH.905.t:0 "郑红的交际圈"
SFH.905.d:0 "“所以说，我们在未来还需要您多多关照了！我们也都是从小到大这么多年的交情了，小丽她们也都很…”\n\n郑红看着眼前这个穿着浮夸的同龄女性，不由得想起了七八年去海边旅游的时日，倒不是她对海滩有什么独特的喜好，只是她必须找点什么美好的记忆来防止流露出不满的情绪。自从郑钧身体抱恙的那一天，就仿佛郑红注定且马上要成为下一任国王一样，每天都有大量所谓的“老朋友”过来和她套近乎，眼前的这位女性也是其中一个，不过她和那些几乎未曾谋面或是只在多年前见过一两面的老头老太太不同，她的确在过去和郑红有过数年的交情。\n\n“你还记得吗，我们当时组了个小队，悄悄地从舞会后门溜出去，结果差点在森林里迷路了。多亏了当时你帮助我们探路…”\n\n又来了，这件破事，郑红稍微皱了皱眉。说到底，她的童年时光是在周围人的鄙夷下度过的，当时正好是郑钧大量向食利阶级让步，王室权威衰退，到处人心惶惶的年代。郑红本人也是遭到其它小孩鄙视的对象，她是被“自愿”在树林里到处转悠寻求帮助的，如果不是她运气好，恐怕那片森林又会多出一具饿死者的骸骨。\n\n“所以说，在未来，希望我们还是能…”\n\n郑红感觉快听不下去了，在片刻的思考后，还是决定做出回应。"
SFH.905.a:0 "“当然，我们一直是朋友。”"
SFH.905.b:0 "“如果你以为可以借此机会某得权益的话，那就大错特错了。”"

SFH.906.t:0 "郑钧的建议"
SFH.906.d:0 "傍晚，郑钧和郑红二人坐在皇宫外的庭院休息。此行不为别的，郑钧把郑红喊到这里，是因为他有一些事情想说。\n\n“红，你看。”他指了指远处的花卉，“像这样的一个装饰，你觉得需要多少人来维护？”\n\n“大概需要很多人吧。”郑红笑道，“抱歉，说了废话。其实仔细想想的话，需要的人力也不是很多。负责这片花园的办公室的下属员工人数不多，平日里只需要浇水剪草就行了，我们如果有要求的话，可以直接报给办公室那边，预算报告的话会由他们提交上财务部。”\n\n“是，但也不完全对。你这只是从我们的角度来看，可实际上却又是一回事。”郑钧笑道，“我们王宫的花园并不是…我也不知道那种叫什么，非要说的话，就是不那么‘自然’的花园。每隔一个季节，花园办公室那边都需要派遣人采购新的泥土和草皮进行更换，许多植物也需要重新栽培，你现在看到的花朵，跟去年的很可能不是同一株。这背后需要大量的人力物力协调，在王宫外，泥土需要找到专门的地区和工程队挖掘，草皮有独立的企业培养，植物也一样——他们大大小小都是单独的组织，在我们国家的领导下，这些组织互相达成了合作与制衡的关系，最终以一份简单的财政报告的形式交到了我们手上…啊，当然，还有一片美丽的花园。”\n\n郑钧顿了顿，又继续说道，“政府的一大职责便是做好这些组织之间的制衡和管理，确保一切都能按照领导人的想法进行。然而，制衡的方式却可以是多样化的。有的国家把这份职责交给了所谓的‘市场’，在市场经济的大框架下，组织——可以是企业，也可以是其它类型的组织——相互之间制衡，并最终得出一份可能满足需求的答卷，政府虽然充当了管理人的身份，可实际上并不直接下达指令；然而，在一些国家，政府也采取了更加积极的姿态，我们作为领导人，也可以拥有权力，告诉每个组织应该做什么，应该怎么做——除非连领导人也不知道该怎么做。”\n\n郑红想了想，回答道："
SFH.906.a:0 "“我认为，政府不一定要过渡干涉市场的运作…”"
SFH.906.b:0 "“我认为，政府可以采用更加积极的态度…”"

SFH.907.t:0 "奇迹的力量"
SFH.907.d:0 "一道令人目眩神迷的闪光划过天空，郑红以及身后的参观人士都发出了惊叹声，同时这也意味着表演的结束。这次“表演”是远乡魔法实验室的最新研究成果，其领域涵盖了包括军事，民用，重工业等等，虽然大多仍是实验性结果，可一旦得到了官方——或者明确来讲，郑红本人——的认可，那这些魔法回路便可以快速得到预算用以改进并最终量产。\n\n“之前的那些元素魔法，如果效率得到提高，并且成本不高的话，非常适合填补民用领域的空缺。”一位企业家感叹道，“可控的火焰魔法可以大面积取代原始的灶台或是暖炉，现在的远乡，有无数的民众都依赖着使用木材这样的素材供暖或是制作食物，太多时间和资源都被浪费了。另外，水魔法也可以用于灌溉，这样不知道能把农业作业的效率提高多少倍？”\n\n“如果这类魔法可以用在军事领域的话，恐怕同样可以极大地起到用处。”一位军官感叹道，“单单拿这类闪光型魔法来说，它可以指向性的制造闪光——或者别的什么，原理我不懂，但它可以在部队发动进攻作战时，针对性地对敌人进行打击。还有先前演示的护盾，以及治疗魔法，这些都可以在战火纷飞的地区极大地减少非战斗减员的可能，甚至在战斗中也可以有效提高人员的生存几率。”\n\n对于郑红来说，魔法确实是令人惊喜，但同事又感到陌生的全新领域。可以的话，她认为全面的魔法发展是完全可行的，远乡只有这样做，才能追赶上其它国家的成果。然而，目前来看，预算仍然有限，她或许不得不决定发展领域的优先级。"
SFH.907.a:0 "如果能用在民用领域的话，魔法该…"
SFH.907.b:0 "如果能用在军事领域的话，魔法该…"

SFH.950.t:0 "企业会谈"
SFH.950.d:0 "如果让时光回溯几年，那么陈铭绝对想象不到，自己有朝一日会亲眼看到国王与公主殿下，还能同他们亲切交流。要知道，自己上一次看到国王与公主，还是在报纸上。而那时的头条新闻还是：“国王郑钧生命垂危，远乡王国政局大乱！”当时的陈铭还在想着自己是不是应该离开这个是非之地，逃到南巴斯蒂亚或者皮奥瑞亚去。毕竟那边对他这个企业家的看法可比南远乡重视多了。\n\n“陈铭先生，公主殿下在问你问题。”皇宫侍卫的话语打断了陈铭的回忆。他抬起头，看向郑红，有些不好意思的开口：“抱歉，公主殿下。我刚才没听清您说什么，可以再重复一遍吗？”说完这句话后，他又马上低下了头。谁知道这位自小便在宫中娇生惯养的公主殿下会不会发火，毕竟刚刚确实是自己走神了。虽然他也听过一些有关这位公主在内战中的表现，但耳听为虚眼见为实，他也不敢保证这位公主会做些什么。\n\n“没问题，陈铭先生。”预想中带有怒火的大叫并没有传来，反而传来的是郑红清脆又温柔的回答：“我刚才在问，陈铭先生对于其他几位企业家先生提出的方案有什么看法吗？”听到郑红的声音，陈铭抬起了头。这一次他以一种既惊奇又紧张的眼神看着面前的郑红，他的心里有种从来没有过的激动。“谢谢您，公主殿下。那我就讲一下我的拙见。”陈铭清了清嗓子，“依我来看，远乡经济目前的困境还是集中在大批企业的荒废以及政府对这方面的漠不关心。”“如果想要振兴经济，企业的重建与经济的体制的改革必不可少。而第一步，就是扶持目前还在运作的企业。”\n\n“没错，就是这样。”郑红站起身打断了陈铭的发言。她一边鼓着掌，一边说到，“这正是我所想的，陈铭先生。”郑红看着会议室里的企业主们，他们或是瞪大了眼睛或是激动的浑身发抖，还有一些已经低声祈祷起来。“这就是今天这次会谈的核心。”郑红走到陈铭身边，举起了他的右手，“发财吧！王国的忠臣们！这是唤醒雄狮的第一步，也是最伟大的一步！”随着郑红声音落下，会议室里爆发出了经久不绝的掌声。"
SFH.950.a:0 "伟大复兴的第一步。"

SFH.951.t:0 "请神容易送神难"
SFH.951.d:0 "“老爷，老爷！天大的好消息啊！”“知道了，知道了！大清早的吵什么？！”一大清早，还在睡梦中的何畅力便被下属的叫声给吵醒了。要知道自从南远乡内乱，他的小厂子基本就停业了。虽然幸运的是，战火并没有波及到他这里。但在这段时间里，他已经养成了睡得比鸡早，起的比狗晚的习惯。今天要不是被下属吵醒，恐怕日上三竿了他也不会醒。\n\n何畅力不情不愿的从床上起来，看着面前气喘吁吁，拿着一份报纸的下属，不由得埋怨起来：“什么事值得你这么激动啊？天上掉馅饼了？还是你老婆又生了？”“吵醒我睡觉，你好大的狗胆。”而下属仿佛没听到似的，只是一个劲挥舞着手中的报纸：“老爷，你快看看。政府发钱啦！”\n\n听得这话，何畅力瞪大了双眼。连忙从下属手中将报纸抢走，只见报纸上的头条标题上写着：国王陛下与公主殿下正式决定，将发放第一批工业补助。只要是仍在存续的企业即可向当地政府部门申领补助。看着报纸上的内容，何畅力狠狠的扇了下属一个巴掌。下属立马大叫起来，捂着自己的脸躺了下去。而他看着下属的表现，嘴角不住的扬起：“他奶奶的，天上真掉馅饼嘞！”\n\n很快，何畅力那个即将倒闭的小工厂不见了。取而代之的是一个不断引进新机器与招聘工人的新兴工厂出现在镇上。镇上的人好奇的打量着这个新厂子，难道是有大城市的人来这里开厂子了？直到何畅力从工厂里走出，镇民才惊奇的发现，这居然是何畅力开的新工厂！\n\n看着面前的工厂，何畅力不禁哈哈大笑，没想到有朝一日他也能拥有一座这样的工厂。老话总说，请神容易送神难。他不禁这样想到：“如果请的都是这样的财神——”"
SFH.951.a:0 "“那可千万别给我送走喽。”"

SFH.952.t:0 "发展的代价"
SFH.952.d:0 "老于曾经认为，他这一辈子就是一成不变的。种地，吃饭，睡觉。就像是一种流传千年的生活方式，一个刻进每一位远乡人心中的生活模版。虽说他的亲朋好友里有去过城市的人回来和他说，城市里都是高高的楼，还有冒着黑烟的大柱子，和咱们镇一点也不一样。但彼时的老于并没在意，自己这辈子也就是在这镇上了。城市里咋样，和自己又有什么关系呢？\n\n想到这，老于看着面前可以被称为人山人海的大街，又看了看远处正不断冒着黑烟的烟囱，狠狠地抽了一口手里的旱烟。从他刚成年时，他就喜欢来到镇东头点上一根烟。一边抽一边看着附近的树林与自己在旁边种的小花圃。每当看着花圃里的花从种子到发芽再到开花的过程，他就打心眼里的高兴。\n\n可如今，他的小花圃早就被铲了。在曾是花圃的地方，一座座新房拔地而起。在曾是树林的地方，一座座工厂拔地而起。每天清晨听见的不再是鸟鸣，而是那些钢铁巨兽启动的巨响。每天晚上看到的不在是满天的星星，而是被那些大柱子里的黑烟给染黑的，仿佛在哭泣的天空。\n\n每当这时，老于总是止不住的想：“这是为啥？为啥这些厂子会到俺们镇子？俺的生活去哪了？”但无论他怎么想，也想不出个所以然来。听镇政府的人说，过几天又要有一批工厂在这落地。老于走到镇里的小溪旁边，慢慢蹲下。曾经清澈的溪水也已经变成灰黑色的水流，他小心翼翼的捧起一汪水流，像是下定了什么决心一样，将手中的溪水一饮而尽。\n\n顿时一股又涩又腥又酸的感觉席卷了老于全身，他忍不住大声咳嗽起来。他终于是忍不住了，看着依旧灰蒙蒙的天空，绝望而又无力的大喊——"
SFH.952.a:0 "“俺究竟是哪里得罪你了，老天爷！”"

SFH.953.t:0 "警示"
SFH.953.d:0 "如果说生活改变了章同顺什么，那想必一定是他大大咧咧的性格。自打他来到这座矿井以来，他就是出了名的莽夫。对保护措施丝毫不在意，独自一人深入矿井，这都是他干出来的疯事。尽管他的同乡，他最好的朋友金盛劝了他很多次，可他始终没有改，依旧我行我素。直到金盛为了救他跌入坍塌的矿井中，至今生死不明。\n\n从那天开始，章同顺就变了。他变得小心翼翼，自己研究了许多针对矿井的安全措施。一时间，这个曾经发生了塌陷事故的矿场竟一跃成为了子安省矿工伤亡最少的矿场。工友们都说，章同顺是个天才。但只有他自己知道，这一切其实都是金盛设计的。在金盛快要掉下去之前，他其实抓住了金盛的手，但更大的垮塌顷刻间便将金盛掩埋了下去。当他失魂落魄的回到宿舍后，在金盛的枕头底下发现了满满一本的矿场安全措施改进建议。而这本建议里提到的地方，都是章同顺曾经做出的疯事所引出的隐患。\n\n章同顺发誓，绝不会让好友的心意白白浪费。但是一个因事故而死的死人的建议，恐怕很难让那些官员和管理者们信服。于是，章同顺这个矿难幸存者的身份便有了十足的含金量。也因此，他成了工友们心中的救世主。\n\n“下面宣布政府的最新政策。”刺耳的喇叭声将章同顺从回忆中拉回，只见面前的工头开始大声宣读起来：“远乡王国工业部发布新一轮规划，各矿场必须制定更严格的安全规章，同时进一步加强对矿工的安全教育。”说到这，工头顿了顿，“根据最新的政策，矿场正式决定，任命章同顺为矿场安全负责人，全权管理矿场安全制度。”听到这，工人们爆发出一阵欢呼声。\n\n而章同顺则呆呆的看着厂房上方的太阳，恍惚间，他好像看到了金盛的脸。他回了回神，将那本建议从怀中掏了出来。走到工头旁边开始大声朗读起来：“关于对矿场安全制度改革的一些建议，作者——”"
SFH.953.a:0 "“金盛”"

SFH.954.t:0 "愚昧？"
SFH.954.d:0 "老梁在金沙村的风评很不好。村子里的人看见他都要叫上一句“梁二狗子”。在民风朴素的金沙村，你很难找到比老梁还自私自利的人。邻里团结，互帮互助，共渡难关，这些词语在老梁看起来都是傻子的代名词。怎么会有人牺牲自己的利益去帮助别人？整个金沙村，能得到老梁关爱的只有他那两亩薄田。这是当时局势大乱的时候，他趁机从地主嘴里扣出来的。虽然现在局势已经稳定，但老梁显然是不可能将土地还回去的。\n\n不过今天老梁家里倒是来了一个不速之客，那个被他拿走田地的地主带着一份报纸走了进来。一看见老梁，这位地主便立马上来套近乎。一边问着老梁最近怎么样，一边给老梁讲着报纸上的新政策。说什么政府给农民搞了低息种子贷款，他现在手里就有一批优质种子。如果老梁想的话，他可以将这批种子卖给老梁。\n\n虽然老梁对新政策不感兴趣，但对优质种子，他一直是一种求而不得的状态。他自己买的那些劣质种子已经让他可以想象到今年的收成会有多么惨淡。但他面临着非常尴尬的境地，他没钱了。买这批劣势种子和更换一些农具已经花光了他的存款，但他对优质种子又十分渴望。\n\n地主似乎看出了老梁的窘迫，立马表示可以给老梁办理低息的种子贷款。不过，需要老梁以土地作为抵押，保证会及时归还贷款。听到这的老梁，开始犹豫起来。一方面土地是他赖以为生且最为宝贵的东西，但另一方面优质种子又是他一直想要得到的宝贝。\n\n最终，老梁还是没能抵住种子的诱惑，和地主签了贷款的合约。不过老梁并不识字，所以这份合约是交由地主独自拟定的。看着已经拿到面前的种子，老梁毫不犹豫的按下了手印。而此时的地主，看着面前抱着种子爱不释手的老梁，缓缓的笑了起来。"
SFH.954.a:0 "螳螂捕蝉，黄雀在后？"

SFH.1000.t:0 "内战结束"
SFH.1000.d:0 "小兵看了一眼不远处的兵营，后者正被不可思议的安静笼罩着，仿佛所有人都在屏息等待着什么。如果是平时格格不入的自己的话，他肯定是搞不懂这帮人在等什么的——不过，这次他很清楚那群聒噪的家伙们突然安静下来的原因。\n\n战争要结束了。\n\n关于前线部队已经推进到叛军根据地的消息早就传遍了整支军队，而他所处的突击部队则更是早就听说了这门消息。虽然由于在上一场战斗减员过多的原因，他们不会参加本次的“最终决战”，但老黄，他们的老团长，似乎跟其它几位领导不同，很乐意同士兵们分享最新的战况——他大概能想象得到兵营里的情况，几百号人围着个破收音机望眼欲穿，就好像农村的孩子第一次进平京这样的大城市，不知所措又充满期待。不过，他一向是不喜欢参加这样的活动的，反正班长给了休息的指令，那他坐在草坪上，看看太阳也没什么不好的。\n\n正午的太阳有些炙热，这让他回想起了留在南方故乡的父母。他们很幸运，能够置身事外，远离战火的袭扰，不用在堑壕里吃着混了泥水的稀粥，或是看着自己的挚友在一片血雾和残肢断臂中消逝。一想到这里，硝烟和尸体的味道又从他的嘴里涌出来，小兵连忙咳嗽了两声，希望把嘴里的血腥气赶紧送走。\n\n“想念爸妈做的菜了？”一位看起来十分健壮的大兵拍了拍小兵的肩膀，“我也想！哈哈，糖醋排骨，炸春卷，烧鸭，烤乳猪…霍！真是让人想想就流口水了。”\n看小兵沉默不语，他又笑着说道，“咱这一仗打完了回家，那可就是英雄了！父老乡亲们肯定都会很高兴的——谁能想到，当年那个大家都瞧不起的小胖，居然成为了战争英雄啦！”他指了指小兵身上的战斗勋章，“作为你的哥哥，我很自豪。”他摸了摸小兵的头。\n\n兵营中传来的叫声打断了二人的谈话，震耳欲聋的欢呼声转瞬便席卷了整个山谷，小兵欣慰地笑了，虽然他不打算参加那帮家伙莫名其妙的派对，听闻班长要拿出放了十几年的酒水犒劳大家，他还是有兴趣小酌两杯的。\n\n随后，就好像从什么沉重的负担中挣脱开来一样，他长舒了一口气，从口袋中拿出了染着早已凝固的血的兵牌，透过深黄色的锈迹，能勉强看见曾经属于小兵兄长的姓名。小兵紧紧握住了手中的兵牌，仿佛那是什么宝物一样。"
SFH.1000.a:0 "走吧，我带你回家。"
SFH_civil_war_over:0 "远乡内战结束！"
SFH.1000.tt:0 "§Y远乡内战后统一国策现已上线，欢迎您反应bug。§!\n§t统一国策中用到的部分文本是临时的简陋版本，未来更新时会修正。§!"

SFH.1100.t:0 "南方来电"
SFH.1100.d:0 "致邱元帅：\n\n展信佳。多年前，战功卓越的您受命于大战后，国家危难困苦之时，身肩保护远乡西北国土和国民不受内外敌寇侵害并重建这一地区的重任。并且您和部下们也出色完成了任务，战胜了一切困难，从所有魑魅魍魉手上保护了民众和西北边境。\n\n如今，王国正在复兴和重新稳定，政府认为现在已是时候再次将西北置于中央直接管理下。我们已经派遣了一支代表团，前往与您和其他将军们讨论以及处理交接事宜，不日便会抵达。\n\n感谢您和将士们这些年的付出。"
SFH.1100.a:0 "远乡王国中央政府"

SFH.1101.t:0 "邱元帅同意了！"
SFH.1101.d:0 "“自大战以来，远乡动荡，西北尤甚，是故西北暂设特区以应火急。西北荒芜，地困人乏。民风彪悍，不服王化。外敌叛匪，气焰嚣张。臣本布衣，幸得陛下厚恩，忝列武官，为报陛下殊遇，自当竭心尽力。近十年来，虽叛匪受挫，然外援匮乏，物资紧缺，巧妇难为无米之炊，终不能永绝后患，使西北大定。忽闻南方叛匪作乱，此诚危急存亡之秋也，值此国难之际，幸有侍卫之臣不懈于内，忠志之士忘身于外，国中大势，转危为安。今喜闻国中已定，西北特区再无存在之必要，合并西北之事，势在必行。先前苦于物力不足，重建之事难免拖延。如今心神疲惫之师归乡，斗志昂扬之士北上。安定西北不为难事……”\n\n郑钧面带微笑地看完了这篇电文，他轻笑了一声，看向坐在一旁的郑红。\n\n“看完这篇邱元帅的电文，有什么感想吗？”\n\n“嗯……有很多时候我都在庆幸着，在国家危难之时，还有那么多像邱元帅这样的忠诚的军人恪尽职守。西北的局势只怕不会比南远乡好，考虑到西北军队人员紧缺，物资匮乏，邱元帅能做到这个地步已经很了不起了。”\n\n“不过，也就看起来那样了，”郑钧脸上的笑意愈发浓厚，郑红也分不清他到底是真的在笑，还是苦中作乐，“邱向荣元帅确实算是个忠直之士，可他也有不敢写在电文上的事情。特别行政区的黑市都把咱们的脸丢出国外了，他敢说这些非法交易的背后没有他的默许乃至协助？谁又能确定他没有从中捞上一点油水？这些事情我们是查不出来，也不该查出来的。说到底，现在他倒是可以回老家孝敬父母了，接手西北这个烂摊子的，却是我们。”\n\n“您的意思是……”\n\n“我在想，军队在手里固然是好事。可国家想要长治久安，只靠军队肯定是不够的。当国家崩溃时，即便是邱向荣这样忠诚正直的优秀军人也不得不先瞒着自己的君主搞黑市来维持军队的运转再执行君主的命令。如果有一天，军队发现只有违抗君主权威才能维持自己的运转，同时，君主只能依靠军队维系权威的话……”郑钧苦笑着摇了摇头 ：“一个君主无需依赖武力强制手段便可受臣民爱戴，保卫国家的时代或许在你的手中会到来……可我估计是无福消受了。”\n\n郑红一言不发地聆听着，眉头紧蹙。看着郑红的愁容，郑钧这才意识到自己说了一些不太吉利的话，只好撩起脸上的一道道皱纹，尽力挤出一个还算明亮的笑容：“不管怎么说，国家的统一又迈进了一大步。这显然值得我们庆祝一番！随着国家的统一和秩序的恢复，未来只会往更好的方向前进。所以，准备一下吧，我们还要款待自西北归来的战士呢。他们可受苦了啊。”"
SFH.1101.a:0 "军队是忠诚的，但请不要挥霍他的忠诚。"

