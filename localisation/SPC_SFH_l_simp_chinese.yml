Get_future_nation_ideology_txt_6:0 "§O强硬的绝对君主制§!"
Get_future_nation_ideology_txt_7:0 "§Y尚未明确§!"
SFH_future_politics_intro_tt:0 "[Get_future_nation_ideology_desc]"
Get_future_nation_ideology_desc_txt_1:0 "§C君主仅保有最低权力的自由主义政府§!"
Get_future_nation_ideology_desc_txt_2:0 "§B保守主义主导的君主立宪政府§!"
Get_future_nation_ideology_desc_txt_3:0 "§g威权主义主导的君主立宪政府§!"
