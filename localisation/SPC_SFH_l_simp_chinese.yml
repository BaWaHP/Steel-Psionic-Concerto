SFH_future_of_the_nation:0 "国家的未来"
SFH_future_of_the_nation_desc:0 "不出意外的话，§Y远乡王位§!将在§O郑钧§!死后传给目前南方政府的§Y唯一合法继承人§!：§C郑红公主§!。然而，§C郑红§!本人尚且年轻，而且没有为继承国家进行过各方面的准备——这在皇室权力式微的当今显得§O十分致命§!。幸运的是，我们仍有时间在为§C郑红§!的继任§O造势§!。\n\n除此之外，§C郑红公主§!的§Y政治倾向§!也是十分有趣的话题。我们对政府的§C改革§!会很大程度上影响这个国家的未来，可§C郑红§!本人的政治倾向也§R不可忽视§!。"
SFH_future_Zhenghong_name_title_txt:0 "“郑十二世”郑红"
SFH_preparation_title_txt:0 "当前国家对§C郑红§!继位的§Y准备度§!为："
SFH_preparation_title_tt:0 "我们的国家需要为郑红的继位做出一定的准备，否则一切行动都不过是空谈，权力也无法正常交接。然而，这并非一日之功，国家的准备需要相当长的一段时间，我们最好对此保持耐心的态度，即便在短时间内无法取得什么成效，那也无所谓。"
SFH_preparation_bar_tt:0 "当前准备度为：§Y[?SFH_preparation_bar_var]%§!"
