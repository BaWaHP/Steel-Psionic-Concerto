###民族精神###
FEJ_surrounded:0 "身陷重围"
FEJ_surrounded_desc:0 "作为原中巴斯蒂亚联盟的卫戍军，东部的卫戍军在内战爆发后便迅速平定了防区内的混乱,并与当地的一些地方私兵合并，宣告建立东部防区...这些都是说给外人听的。当然，这些也是真的，只不过是经过了“一点”美化。相比于卫戍军主导的西部防区,东部防区内的正规军数量相当稀少。取而代之的则是数量庞大的地方私兵。在正规军为平定混乱而与他们合并时,他们便依靠着绝对的数量优势成为了防区的主导力量。在通过一系列手段‘解决”了不愿意同流合污的正规军军官后，东部防区并彻底沦为了私兵主导的独立军阀。这些私兵战斗素养不高，但很会鱼肉百姓。在狠狠劫了一票防区内的民众后，这些私兵也不得不将目光看向外面:尽管自己宣布支持南巴司令部,但深陷暴乱势力包围的他们几乎不可能得到支援，而且这些暴乱势力看起来也不像能谈判的样...看起来他们可能要完蛋了。不过，我是说万一，万一他们最终存活”下来并且战胜了其他势力..那有趣的事情就要发生了。"

