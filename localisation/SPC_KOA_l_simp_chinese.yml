###领导人###
KOA_king_electing_council:0 "选王议会"
KOA_king_electing_council_desc:0 "在长期改革派和守旧派的权力斗争中，原先的王族的继承人已经消失殆尽，只留下几支与原王族有联姻的王位候选人，这些人中，有的人支持改革派，有的人支持守旧派。有的人则政治无感，无论如何王国不能处于没有国王的状态，即使新国王的“王位”仍然是无人捍卫的状态。"
KOA_stanwaf:"斯坦瓦夫一世"
KOA_stanwaf_desc:"斯坦瓦夫出生在克拉亚诺共和国的一个贵族家庭，他作为家里的小儿子从小就是在溺爱中长大。在接受过高等教育后，斯坦瓦夫逐渐迷恋上了艺术，这也使得他彻底丧失了家族资产的管理权，但是他的兄长仍然很爱他。\n1997年，在经过了2年的摄政期后，奥科特尼安经济逐步衰弱，随之而来的是摄政议会和各阶层的撕裂。而随着选王会议的结束，斯坦瓦夫登上了王位。尽管一个软弱的国王并不能带给王国一个航向，但是这个国家终于有了点要步入正轨的样子了。带着所有人的期许，斯坦瓦夫一世召开了筹划加冕典礼的内阁会议..."
KOA_willian:"威廉一世"
KOA_willian_desc:""
KOA_yulian:"于连一世"
KOA_yulian_desc:""
KOA_tocman_lowes:"托克曼·洛斯"
KOA_tocman_lowes_desc:""
KOA_merk_hill:"默克·希尔"
KOA_merk_hill_desc:"默克·希尔作为一名海军上将、贵族、军事理论家以及共和政府首脑广为人知。在此之前，所有人都觉得他是一位温和的改良派，直到革命的到来，人们才意识到他是一位共和主义者，且手段也比其他人要激进的多。\n尽管默克将军的理念很粗糙，糅杂了共和主义、威权主义甚至有共产主义，但是他的目标很明确——建立永恒的民主制度。尽管他的“七河帮”多次表达了必须给予反对势力物理上的毁灭和对存在反动思想的人精神上的同化，但默克将军仍然认为共和是建立在所有人的一致认同下。\n除此之外，默克将军也是一位特尼安主义者。他对北边的虚伪的共和政府十分厌恶，一方面是认为其没有任何法统凭依而存在，另一方面他认为北边所谓的宗族共和背弃了共和的理念。所有人都明白，一场战争已经提上了日程。而默克将军虽然对于七河的感情十分浓厚，毕竟正是对方提供的帮助，让奥科特尼安在极短的时间了恢复了海军实力，但其在特尼安的土地上建立条约港是默克将军难以接受的。\n总而言之，有一位强硬的领袖带领着我们航行起码不会出现太多的争执，但我们还是得祈祷，漫长的航线不会出现偏航。"

