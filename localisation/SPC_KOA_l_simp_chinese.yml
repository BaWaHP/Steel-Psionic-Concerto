KOA_king_s_fate:0 "国王的命运"
KOA_king_s_fate_desc:0 "无知世事之人，神恕其罪；罪恶滔天之人，自行审判。"
KOA_flower_of_navy:"海军之花"
KOA_flower_of_navy_desc:"默克·希尔上将一直致力于国家的民主化和自由化，他深知民主的敌人——保守派贵族们仍然在暗处窥视着脆弱的共和体制。我们必须允许默克·希尔的临时权力，以便保护共和与民主。"
KOA_democracy_emerges_from_gun:"枪杆子里出民主"
KOA_democracy_emerges_from_gun_desc:"默克委员长深知反动派是难以消灭的，所幸海军是站在我们这边的。海军将是确保共和体制的盾牌，去抵抗国内的反对势力。"
KOA_strike_landlords_allot_fields:"打土豪分田地"
KOA_strike_landlords_allot_fields_desc:"地方上贵族和乡绅把控了肥沃的耕地，而贫农和农奴成为了这些地主的附庸。为了进一步消除守旧派的影响力和为工业化做准备，我们必须扩大这些“农民同志”的权力和土地，第一步就是强制让这些地主们交出土地。"
KOA_household_contract_responsibility_system:"农业制改革"
KOA_household_contract_responsibility_system_desc:"在我们强行夺取了土地老财的土地后，我们发现部分地方的中农、富农组成了新的地主阶层。他们通过枝叶繁茂的家族网，对刚获得土地的贫农们进行强买，而这些失去土地的贫农又重新成为了佃户和农奴。我们必须要避免这种事情的出现，因此我们决定将耕地收归国有，按每家每户的人头分配土地的使用权，并定期检查各个地区是否出现了土地兼并的情况。"
KOA_nationalized_noble_enterprise:"国有化贵族企业"
KOA_nationalized_noble_enterprise_desc:"革命前，贵族们通过他们的特权霸占了教育、医疗、公共建设等国有企业。他们再利用不良的运营让这些企业亏损从而将其变为私有，他们再通过私有的企业进行各种敛财行为，而这一切到此为止了！我们将让这些企业重新国有化，并摆正这些企业，让它们重新投入到对人民的服务中！"
KOA_open_enterprise_management:"企业经营制度改革"
KOA_open_enterprise_management_desc:"在国有化贵族企业后，腐败的前管理层无法为我们效力，而我们军政体系也没有多少企业管理人才。因此我们将视线投放到了民间企业家中，尽管他们不是国家编制人员，但开放一部分企业的管理权并由国企内工程师和技工对其监视，这样既不会让这些编制外的人拥有过多的权力让编制内的人不满，也不会让我们的国企无人管理。"
KOA_army_republic_reform:"军队、共和、维新"
KOA_army_republic_reform_desc:"在我们对国内的各个反动势力进行围剿后，军政维新体制已经成为共和制度的充分条件，革命委员会委员长默克·希尔将继续进行军政统制；而海军也成为了革命的象征，不少市民、村民都以家里有海军士兵为荣。我们也将持续进行革命，并为进一步的胜利做准备。"
KOA_confiscate_the_illegal_assets_of_the_old_nobles:"抄没旧贵族不合法资产"
KOA_confiscate_the_illegal_assets_of_the_old_nobles_desc:"在收缴了贵族的企业和地产后，我们发现他们多年来搜刮的民脂民膏已经达到了骇人听闻的地步。我们必须将这些资产归还于民，但不是通过白发钱的方式。我们要把这些钱投入到工业建设和社会福利改善之中。"
KOA_lssue_war_bonds:"发放战争债券"
KOA_lssue_war_bonds_desc:"对于一个国家来说，债券是促进这个国家经济发展的重要手段，政府向百姓发放债券并在未来的某一天让百姓们获取比购买时候还多的价值。而战争债券则是让全国上下出于对一场战争的期望，从而使国家投入到战备状态，并倾向于发动战争。这对我们的工业和国家凝聚力都是有利的。"
KOA_ternian_s_dream:"半岛梦想"
KOA_ternian_s_dream_desc:"我们站在决定历史进程的十字路口，在勇敢尝试和懦弱退让面前做出抉择... 特尼安必须统一！我的朋友，别让无知拖住我们的脚步，别让未来泯灭在你我的退却下... ————“特尼安”\n作家：伊曼·特内伊庭《雄鸡鸣日》"
KOA_peninsula_unification:0 "半岛统一"
KOA_peninsula_unification_desc:0 "经过无数努力后，我们终于收复了北方的故土，现在我们可以自豪宣布我们是“统一”的特尼安人了！"
KOA_new_friends:0 "新朋友"
KOA_new_friends_desc:0 "在和北方谈判后，我们向他们确保了北方的自治权利以达成和平统一。也许我们应该组建特尼安特色的联邦体系。"
KOA_organize_the_northern_interim_government:0 "组织北方临时政府"
KOA_organize_the_northern_interim_government_desc:0 "北方人从背叛王国开始就一直有一根反骨扎在他们那“骄傲”的脊背上，我们必须树立正确的国家主义精神，以此彻底消灭北方的反对势力。"
KOA_absorb_loyalists:0 "吸纳效忠派"
KOA_absorb_loyalists_desc:0 "尽管北方人对我们的态度多以怀疑为主，但也有少部分支持我们的政府、认可我们的理念，我们可以将这些人吸纳进我们的政府里，并让他们拉拢北方民众。"
KOA_old_enemy:0 "老敌人"
KOA_old_enemy_desc:0 ""
KOA_establish_a_quarantine_zone:0 "建立“隔离带”"
KOA_establish_a_quarantine_zone_desc:0 "针对那些在山区、丘陵抵抗的北方反对分子，我们应该建立一套“隔离”制度，让他们无法相互串联，并在漫长的包围下弹尽粮绝。"
KOA_conscript_northern_enterprises:0 "强征北方企业"
KOA_conscript_northern_enterprises_desc:0 "北方企业一直秉承不合作的观念，甚至有的企业秘密援助了反对我们的组织。必须给这些企业一些颜色看看，把他们拆分到南方的企业和国企中！"
KOA_northern_charter_economic_bureau:0 "北方特许经贸局"
KOA_northern_charter_economic_bureau_desc:0 "北方的物资危机一直难以解决，内战后更是一片萧条景象，我们必须严格限制北方各项商品的大宗贸易和垄断。我们也要建立起供给制以减少物资危机的影响，从而争取到北方民众的支持。除此之外，北方的经济模式和南方并未完全接轨，特贸局的存在也能使北方的经济逐渐向南方的新经济政策过渡。"
KOA_southern_people_moved_north:0 "南民北迁"
KOA_southern_people_moved_north_desc:0 "为了进一步扩大南北民众的了解以及加大南北文化的再融合，我们可以动用国家力量让南方的技术人口、教师及失业人口迁往北方进行工作。即便这项政策在两边都会收到抵制，但毫无疑问这是最有效的手段。"
KOA_check_the_struggle_radio_station:0 "清查“斗争”电台"
KOA_check_the_struggle_radio_station_desc:0 "旧北方政府的盲信者仍然在民间宣传“脱离”思想，这其中最大的组织就是名为“斗争”的电台组织。他们利用隐藏着的秘密电台蛊惑对我们还不了解的民众，对此我们应该研发更高效的监听设备去反制他们。"
KOA_authorize_the_political_security_office:0 "授权政治保卫室"
KOA_authorize_the_political_security_office_desc:0 ""
KOA_rebuild_the_northern_economy:0 "重建北方经济"
KOA_rebuild_the_northern_economy_desc:0 "勒泰特尼安地区的经济命脉一直被各地宗族地主所把持，既然他们已经被我们打倒，是时候对北方的各行各业进行外科手术般的革新！"
KOA_national_education:0 "国家主义教育"
KOA_national_education_desc:0 "尽管我们已经将特尼安统一，但北方民众大多把北方当成一个自治区或者相对独立的洲政府。这时候就应该对其进行国家主义教育和爱国主义教育，从根本观念上让民众认同一国一体论！"
KOA_tennian_council_of_state:0 "特尼安国务院"
KOA_tennian_council_of_state_desc:0 "针对南北地区长久以来的割裂，我们不能一味地倾向于“两种情况”，要把南北双方的问题合起来谈，所以我们设立了特尼安国务院，用来解决和制定一切南北方的经济、民生问题。"
