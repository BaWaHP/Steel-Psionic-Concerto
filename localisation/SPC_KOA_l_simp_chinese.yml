#军事线#
KOA_take_over_armies:0 "接管陆军"
KOA_take_over_armies_desc:0 "在旧贵族进一步被清洗后，我们必须接管他们原先控制的陆军包括卫戍军队，以防无法挽回的事情发生。"
KOA_politics_in_command:0 "政治挂帅"
KOA_politics_in_command_desc:0 "对于陆军忠诚度的问题，我们只要替换他们的中下级骨干成员，对士兵进行思想上的教育就足够了。"
KOA_politics_in_command_flag:0 "事件中，选择这一边。"
KOA_summon_the_ocean_shirt:0 "召集海魂衫"
KOA_summon_the_ocean_shirt_desc:0 "海军一直是我们共和体制忠实的支持者，而海军陆战队则是在革命中的急先锋。他们现在渴望着为共和政府建功立业的机会，而他们也将在未来证明他们的实力并不仅限于此，我们也可以就此机会加强我们“海魂衫”们的规模和实力。"
KOA_new_country_new_army:0 "新国家，新军队"
KOA_new_country_new_army_desc:0 "新生的共和国必须要有区别于旧时王国军队的一支人民之师，而我们正可以从人民中训练出一批英勇的军队。 "
KOA_new_country_new_army_flag:0 "事件中，选择这一边。"
KOA_revolutionary_guards:0 "革命保卫队"
KOA_revolutionary_guards_desc:0 "共和政府需要更激进的团体去保卫她，而由激进派组成的革命保卫队则可以散布在军队中，由他们成为中下级以防军队起异心。不仅如此，在他们的意识形态宣传下，军队会发挥出更强大的战斗力。"
KOA_army_of_roosters:0 "雄鸡之师"
KOA_army_of_roosters_desc:0 "生于特尼安，长于海西群山，流淌着雄鸡之血的特尼安人虽然历来顺受，但也学会了如何在险恶环境中生活。我们应该在军队中发扬这种精神，让我们的军队学会在恶劣环境中成长。"
KOA_army_of_roosters_tt:0 "§Y这将整合我们先前的军队改革！§!"
KOA_highland_assault_team:0 "高岭雄鹰在展望"
KOA_highland_assault_team_desc:0 "“飞过群峦之巅，俯瞰那广阔天地的雄鹰哟，寻找敌人来击败。掠过密林之间，紧盯那四处埋伏的敌人哟，让我将猎物献给挚爱。”"
KOA_greeve_arsenal:0 "格里夫军械厂"
KOA_greeve_arsenal_desc:0 "格里夫制造——一直以质量优良在军队中闻名。自革命以来，对于旧企业的改造一直在进行中，而格里夫军械厂作为军工企业则被军方和政府相互争夺其所有权。最后在各委员的一致表决下决定让格里夫军械厂等军工企业保持相对独立的地位——即拥有企业的自主权不受两方的节制，但又属于国家性企业。决定完企业属性后，国家开始把资源投入到军工企业的发展，并制定了一系列相关计划来重新强化这些军工企业的功能。"
KOA_saint_elizabeth_medical_corps:0 "圣伊丽丝医疗团"
KOA_saint_elizabeth_medical_corps_desc:0 "伊丽丝是特尼安第一名随军护士，作为贵族的她毅然决然放弃了在首都的名利，选择了加入军队中作为随军医疗单位工作。在漫长的军旅生涯中，她组织失去作战能力的士兵参加到医疗工作中，是特尼安进入近代以来最早的军队卫生条例提出者。"
KOA_ready_intervene_rsu:0 "准备干涉鲁萨尔"
KOA_ready_intervene_rsu_desc:0 "施塔德刺杀案后，鲁萨尔联盟政府的威信进一步下降，而如今爆发的内战更是冲击了他们政府的权威。鲁萨尔一直对勒泰特尼安地区拥有领土诉求，我们可以乘着这次机会，借口调查施塔德刺杀案和镇压赤匪。"

###于连###
KOA_yulian_cronation:0 "于连的加冕典礼"
KOA_yulian_cronation_desc:0 "一个国王怎么能缺少他的加冕典礼呢？让我们敬请见证这位国王的手段吧！从他的加冕典礼开始。"
KOA_spread_the_ears:0 "广撒耳目"
KOA_spread_the_ears_desc:0 "于连在选王时期的旅行为他带来了一帮忠诚的盟友，虽然他们中的大多数都不掌握权力，但这也给这帮“于连党”有了可操纵空间。现在他们开始联络各界支持国王的人和反保守派人士，准备一声令下，进京勤王......"
KOA_east_city_meet:0 "东城聚会"
KOA_east_city_meet_desc:0 "东城区的白星宫作为前王室成员的宴会宫殿和堡垒，一直保持着的庞大的规模，而这座堡垒的重要性也成为了只有国王的底牌——只有国王的命令才能进入，尤其是守备人员更是国王的亲信。这对于王党来说真是一个绝妙的基地。"
KOA_capital_unforeseen_event:0 "王城事变"
KOA_capital_unforeseen_event_desc:0 ""
KOA_monarchists_takes_over:0 "王党"
KOA_monarchists_takes_over_desc:0 "在政变之前，一个以于连陛下为中心的反当权的保守派集团就已经成立了：对于日益壮大的保守派，中间派和温和改革派愈发恐惧，而保守派内部的权力斗争使一部分保守派内部不受待见者也投靠到了这个集团中。现在这个集团以王党自称，他们该考虑如何帮助国王陛下渡过马上到来的危机了。"
KOA_the_chivalry:0 "骑士主义"
KOA_the_chivalry_desc:0 "尽管骑士的时代已经过去，但在陛下眼中骑士已经成为了高尚道德的当世典范，应该说被陛下赐封的骑士都是“道德模范”。一个骑士应该奉王之命、保民之行；并不断完善自己的能力，并在这个路上追寻荣耀…这种“新骑士”很快就在王国境内被支持，他们在地方上被认为是天使赐福的“光耀者”（民间认为被赐福的人）而受到尊敬。而于连和他的骑士们将继续奉行骑士的准则…"
KOA_principle_of_ecclesiastical_relief:0 "教会救济原则"
KOA_principle_of_ecclesiastical_relief_desc:0 "面对不断增长的失业人口和农村上遇到的困难，教会应该行使神圣的救济权去帮助那些饱受磨难的人们。当然除了传统的救济方式外，教会应该引导神的羊群重新回到正轨上。而政府也应该保障救济地区税收的十分之一用来供给当地教会，以此奉行古老的原则。"
KOA_principle_of_ecclesiastical_relief_tt:0 "§Y经济困难§!追加效果：\n每日政治点数花费：§R+0.2§!\n生活消费品系数：§Y-15.0%§!\n建造速度：§G+20.00%§!\n每月居民生活水平变化：§R-2§!"
KOA_ecumenical_order:0 "普世秩序"
KOA_ecumenical_order_desc:0 "在一切由神创造的国度中，应由王——这伟大存在的执剑人去保护一切神的羊羔。教士则需要去引导羊群去接受正确的知识与思想，以保证一切的团结。而数千万民众、虔诚的教民、勤奋的国民将从事一切生产以及促进生产的活动，这是他们本职也是神赋予他们的伟大权利。在这个普世秩序下，人只有地位上的不平等，但人的本质——灵魂都是平等的…"
KOA_ecumenical_order_tt:0 "§Y经济困难§!追加效果：\n生活消费品系数：§Y-20.0%§!\n每日政治点数花费：§G-0.25§!\n适役人口修正：§G+25.00%§!\n建造速度：§G+10.00%§!\n每月居民生活水平变化：§G+1§!""
KOA_levy_unjust_taxes:0 "征收不义税"
KOA_levy_unjust_taxes_desc:0 "富人、贵族、罪犯都在他们的成功之路上牺牲了无数平民的血汗，今天我们必须奉行伟大的骑士准则，夺走这不义之财并重新投资到为民奉献的事业上。相信我们政府的大贵族肯定会主动缴纳这项税款…"
KOA_levy_unjust_taxes_tt:0 "§Y经济困难§!追加效果：\n每日政治点数花费：§G-0.25§!\n生活消费品系数：§Y-15.0%§!\n每月居民生活水平变化：§G+1§!"
KOA_rebuild_association_system:0 "重建协会制"
KOA_rebuild_association_system_desc:0 "无论是社会主义者的工会、还是资本主义者的垄断集团，他们都是衍生于古老的协会制度下。现在松散的组织模式已经无法因对经济困难的冲击了，我们必须以协会制为基础，重新构建我们的社会：各行各业都有自己的协会，会长将是有能力者的骑士（大部分还是准骑士或者预备骑士）。这也将更好地组织起我们的民众。"
KOA_the_theocracy:0 "王教与共"
KOA_the_theocracy_desc:0 "尽管教会曾试图超越国王成为国家真正的统治者，但现在我们必须正视国家真正的问题：不信者可能的暴乱和北方伪共和国的虎视眈眈。正是此刻，教会应该重新回到他应该在的位置上，于连陛下王位的神圣性也将和教会的权威绑定。国王和教会利益一致，共赴伟大的普世盛业！"
KOA_the_theocracy_tt:0 "§Y普世秩序§!追加效果：\n研究速度：§R-10.00§!\n生产效率上限：§G+10.00%§!\n动员速度：§G+5.00§!"
KOA_squire_of_st_pauls:0 "圣保禄侍从团"
KOA_squire_of_st_pauls_desc:0 "圣保禄是特尼安教会认证的圣人之一，他以清平苦修和反抗过不义贵族而闻名。我们以圣保禄之名建立侍从团一是为了让我们的预备骑士和侍从骑士们向圣保禄看齐，二是为我们的侍从团赋予神圣性。这支侍从团不仅仅是军官预备团，也是政治上的官吏预备队。换句话说，他们就是王国的未来！"
KOA_new_levy_system:0 "新莱维体制"
KOA_new_levy_system_desc:0 "莱维三世作为一位雄心勃勃的改革者，他的改革就如同一位甲不蔽体的骑士一般冲向恶龙，妄图改革已然僵化的贵族分封体制，却被“恶龙”的火焰烧成灰烬。如今于连重新面对集权化和贵族分封问题，我们的陛下将重新构筑起莱维三世的梦想，也是所有内阁成员的梦想，一个伟大的中央集权国家！非社会主义也非资本主义，我们要证明我们的制度在新时代仍然平稳航行！"
KOA_farmer_protector:0 "护农官"
KOA_farmer_protector_desc:0 "在王国成立早期，对于没有贵族由自由民管理的村庄都会通过护农官调节村庄矛盾和征收粮食。我们不能保证贵族能正确的行使的权力，因此我们应该向所有农庄派出护农官，以国王于连一世之名，取代贵族的征收权。而那些贵族仅仅只能保留根据农庄规模而制定的部分土地的征收权。"
KOA_farmer_protector_tt:0 "§Y普世秩序§!追加效果：\n每月农业发展水平变化：§G+2§!\n适役人口修正：§G+5.00%§!\n战争支持度：§G+5.00§!"

