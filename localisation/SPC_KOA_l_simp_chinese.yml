###事件###
#选王事件链
KOA.1.t:"候选人的到来"
KOA.1.d:"从鲁萨尔联盟、克拉亚诺共和国、南巴斯蒂亚共和国邀请来的候选人今日已经到达首都，媒体人物纷纷对他们进行了采访。\n于连殿下表现地非常热情，他热衷于回答记者们的各种问题，他的言语中表现地非常惊讶，他向记者陈述，他一直以为南巴地区的共和传统应该让最保守的君主制，也应该有点改变，但没想到农村中、城市里还是古早时期的模样，很符合他对复古的想法，他积极地与保守派交谈。据权威媒体分析，他已经得到了部分保守派的支持。\n与之相对的，威廉阁下则十分担忧王国的文明程度，他不明白为什么会有山野间能有强盗，更不明白为什么农村中还有人头税这种野蛮且落后的税种，他一到住地就迫不及待地向大学城行进，在那里，他与学生们进行了会谈，他的开放心态和语气让学生们感受到了以前从未感受到的自由气氛，明眼人都能看出来，威廉阁下将会受到各个进步人士的支持。\n而斯坦瓦夫殿下则像是做足了功课一样，第一时间是去亲善内阁中的各个摇摆派大臣，除此之外，他就是在邀请学者、艺术家、摇摆派的中下层官员聚会，这让所有人认为，这是一位温和的人，而这也让斯坦瓦夫殿下成为了双方潜在的都可以接受的目标，而斯坦瓦夫殿下本人也表示不会过于插手这个国家原本的轨迹。\n现在民众纷纷在酒馆、广场中互相讨论这三位候选人，从意识形态到性格，从异国文化是否喜爱到外貌长相，但无论如何，我们的民众终于开始讨论政治了。"
KOA.1.a:"接下来让内阁讨论吧"

KOA.2.t:"公园闲步"
KOA.2.d:"“阁下慢点走，我还想问您对开放内阁的看法。”\n威廉不紧不慢地回答眼前这位大学生：“我可以很明确的跟在场的各位同学说这个国家的现状必须要改变，我不仅要开放内阁更要开放党禁，每一个团体都能有合法的渠道表达自己的意见。”\n就在那位大学生还想追问什么的时候，旁边的一个学生把他拉到一边：“够了多夫曼，你没看到周围人越聚越多吗？小心我们被围在这里出不去呀！哦对了殿下，您会不会对守旧派展示强硬手腕呢？”\n“这个问题问得好，我对一切派系都是持公平态度。我不会因为哪一个派系与我意见不合，就不让他们进入内阁，更不会搞内定！一切都应该是公平的。另外，保罗先生你最好小心一下多夫曼先生的拳头，我看他正在瞄准你嘞！”威廉看了看旁边想要追问却被打断的多夫曼，一脸微笑地看着保罗。\n保罗的脸上挨了一拳，这一拳打得很重但这又有什么关系呢？今天他们可以和这位开明的候选人一起共进晚餐，而旁人也不会觉得这算什么笑柄，说不定这一拳让威廉殿下牢牢地记住了这两人..."
KOA.2.a:"我感觉身在一个开明的社会"
KOA.2.b:"这样一位夸夸其谈的“公平使者”不能引导我们的未来"  

KOA.3.t:"明天依旧"
KOA.3.d:"于连在来到这个国家后不是混迹在贵族们的宴会中，就是在城市街头“视察”。他常常幻想自己是正义的骑士，保护一方水土安宁，而贵族们也经常配合着他玩这种角色扮演的游戏。这种情况下明眼人都能看出，于连如果即位也会成为贵族们的傀儡。但是年轻的于连在面对一些事上也会杀伐果断：比如在面对横行霸道的贵族打手时，他会在马上拔出宝剑要求对方进行道歉并赔偿被压迫的市民们。除此之外，他还积极联络教会，即使特尼安教派的影响力并不是很强。在这些问题下，不少守旧派贵族认为于连是在故意装作容易操控，但更多的贵族认为：这只不过是一个青年对于封建骑士小说的幻想。\n而于连面对保守派内部对他的不同看法，他也是持一种无所谓的态度，因为他知道世界不停，机会将近。"
KOA.3.a:" 一个热衷于封建骑士小说的能有多大能量，选他上去我们会更有利！"
KOA.3.b:"我们必须排除掉这种不稳定的因素，选择一个什么都不做的国王可能对我们更有利！"  

KOA.4.t:"老好人，人人爱"
KOA.4.d:"自斯坦瓦夫来到王国后，每天都在和学者、艺术家、摇摆派官员开展沙龙。他们每天针对学术、艺术方面的问题进行讨论，而他们也认为不需要参与太多的政治，保证现有的制度就行了。\n无论改革派还是守旧派，两派都认为这样一位没有太强烈政治理念的候选人对于他们都是可以接受的，尤其是双方的中下层官员。而大部分朴实的民众也喜欢这位时不时开办免费演出的殿下，当然得排除掉那些计算财政的会计们。\n除此之外，斯坦瓦夫的艺术造诣很高，他经常在一些公家地里进行他的艺术创作。这些艺术创作也是要配合他写的歌剧和小说以及他画的漫画，也就是说这些“艺术品”都是他想实际看到他作品里描写的场景而做出来的。但是他对钱没有太多的概念，他一切作品都追求完美，而这又要我们的算盘手抓破脑袋，毕竟按他这样搞钱袋子很快就要空了。"
KOA.4.a:"没有门票的演出？带我一个。"
KOA.4.b:"保卫我们的钱袋子！"  

KOA.5.t:"战舰会谈"
KOA.5.d:"海风吹拂着年轻人的面孔，海魂衫因风飘荡。一群人展望着斯塔比翁繁华的港口，夕阳西下，万家灯火明媚。这一夜，威廉看到了首都地带的繁荣，他终于明白整个奥科特尼安并不是一个样子的。在改革派的努力下，城市正在跟上世界的脚步，但更多地方仍然落后于时代。威廉认为自己作为一个未来的国王该做的：改变这个现状。\n“那么殿下，您认为我们的敌人是谁呢？”一位面孔沧桑的将军问道。\n“我...我不知道，国家好像哪里都是敌人，保守的教会、反动的贵族，希尔我不知道，我一直认为，只要让体制改变就行了。”威廉面带苦色地回答\n“我支持老国王们也是这样认为的，但政治斗争从来都是你死我活的。我是支持您的，如果您成功上位的话，那就放手去做吧，海军是您忠诚的后盾。”希尔看了看远方的海洋：那是在大战中主力舰队尽数覆没的地方。\n“只有推翻那帮守旧派，才能对得起那些死去的战友！”希尔说着握紧了拳头。\n威廉看着难以释怀的希尔保持了沉默，他们一同凝视远方，很远很远..."
KOA.5.a:"必须要为了我们的未来握紧拳头！"

KOA.6.t:"侠客行"
KOA.6.d:"在特尼安地区中不乏有一些好汉的传闻。这些好汉劫富济贫、打击豪强，作为地方统治者的贵族一直都头疼这些好汉的行为。于连来到特尼安之后，他按照着骑士小说的中提到的准则，进行着好汉们在游历时干的事。\n当然在这过程中他遇到了许多志同道合的同伴：这些人有的是无法继承爵位的贵族子嗣，有的是因仇恨而漂流的浪子。人很多，涉及的事业也很多。不少守旧派贵族认为，这是在联络“社会能人”，以便脱离他们的掌控，他们甚至认为，于连有一个覆盖全国的情报网，当然这种说法被守旧派的绝大部分人认为是子虚乌有。但确实，于连的行为还是威胁到了农村里的领主们。虽然他还不是国王，但是打着国王候选人的旗号四处冒险，受到什么伤害我们也会被谴责的。因此，即使我们不支持他，也应该要派更多人保护他。"
KOA.6.a:"有这样一位天真的候选人，对我们名声也不错，派更多人保护他就好。"
KOA.6.b:"小心点他，我有种不详的预感..."  

KOA.7.t:"这就是梦"
KOA.7.d:"“侍从，快点来！” 斯坦瓦夫从床上爬起大叫着。\n“怎么了殿下？”侍从从外边快步走来。\n“我有一个大胆的想法！这个想法是我刚在梦中看到的，趁我还记得，把我的朋友喊来。”\n侍从走后，斯坦瓦夫如疯魔般拿起纸张在桌上作画，当他的朋友们来到后，斯坦瓦夫将他画的稿子递给他们看：“怎么样，这一个想法一定是非魔法使用者能实现最伟大的事！”\n“额...殿下，伟大是伟大，但是...”说话的人看了看旁边的人，在得到支持后，他继续说“殿下，您来之后花了不少钱，您的家族拒绝为您提供更多的资金了。”\n“你在开玩笑吗，什么时候，我没有钱了？那就把我之前创造的东西卖了啊！欣赏艺术的人一定会投资我的。” 斯坦瓦夫一脸震惊后就是带有歇斯底里的追问。\n“喜欢您作品的人多是多，但他们多半买不起...”另一个人想回答，但却被打断。\n“你为什么要欺骗我，他们怎么可能拿不出那一点点钱来买我的艺术品！” 斯坦瓦夫大声嘶吼着，但周围的人沉默不语，渐渐的斯坦瓦夫只是坐在那里。一阵风吹过，那张画着高耸入云的城堡的图纸被吹到壁炉里，直到被燃烧成灰烬。"
KOA.7.a:"这就是现实！该送这位不知金钱价值的候选人回家了。"
KOA.7.b:"毕竟他也是想实现他自己的想法，更何况我们都很喜欢他呢？" 

KOA.8.t:"斯坦瓦夫的胜出"
KOA.8.d:"在我们考察了民意和各派的意向后，最终是斯坦瓦夫殿下最受欢迎。国内的政治派系都支持这个沉迷于创作的候选人。斯坦瓦夫殿下在得到这一消息的时候，笑着说要办一场史诗级的加冕仪式来让国内外看到王国的凝聚力，这会给所有国民一场惊喜。让神祝福他吧！"
KOA.8.a:"为斯坦瓦夫一世，三呼万岁！"

KOA.9.t:"威廉的胜出"
KOA.9.d:"在国内知识分子和进步主义者的游说下，威廉成功胜出，改革派在这时迎来了久违的胜利。守旧派计划着最坏的可能，但无论如何今天让我们欢呼！"
KOA.9.a:"为威廉一世，三呼万岁！"

KOA.10.t:"于连的胜出"
KOA.10.d:"在动员了各地的农民、地主以及贵族后，于连终于成了国家的象征。他宣誓捍卫教会、贵族、平民的利益，守旧派获胜了，有市民看到海军方面正在行动。虽然不知道海军在搞什么鬼，但起码今晚所有人都能安心了。"
KOA.10.a:"为保护者于连一世，三呼万岁！"
#其他
KOA.11.t:"加冕仪式开始"
KOA.11.d:"斯坦瓦夫国王很快便按照他所承诺那样开始了准备工作：宪兵队进入每家每户要求市民为国家的脸面奉献出自己的财产，而在贵族区，除了那些从最近获得临幸擢升至小贵族的海军军官们，而侯爵公爵的地盘上几乎没有遭到一丝的劫掠，很快，就有地方因为骚乱出现了火灾，警察部队开始以火灾为由，以暴动的罪名逮捕了许多持不同政见者，这其中很多是进步分子，很多学生跑到港口区以防止被逮捕。\n\n而隔天的宴会奢华无比，特尼安地区传统的美食，南巴其他地区的美食，几乎没有在餐桌中找不到的，高档的红酒点缀着乳猪、乳鸽、烧鹅、烧鸭、糕点、蛋糕，用上号的茶水来为他们的餐具清洁，配着古典的音乐，这一切在斯坦瓦夫眼中都是完美的艺术品，他用报复般的奢侈来反对他对梦中想要实现，却不能实现的可悲现实。宴会从早上到晚上，菜品换了一批又一批，乐曲换了一首又一首，而国王陛下在伶仃大醉的客人们，以及鼾声震天的配乐下，“万众瞩目”般的中被教会授予了王冠。\n\n这一夜宫殿成为了最繁华的区域，而首都其他区域几乎没有一丝光亮，市民们的柴火、蜡烛都被抢夺一空，而电力则要优先保证城堡的运行，而这场宴会将不只是这一天，而是十天，这期间，宴会中将会演出各个斯坦瓦夫陛下的作品，财政大臣的幕僚们已经崩溃了，这笔财富，将消耗国库的三分之一，更何况，为了防止改革派做出反应，已经限制了来往的商船，以确保没有改革派分子浑水摸鱼，但无论如何，首都将随时陷入混乱..."
KOA.11.a:"当初谁选他上去的？"

KOA.12.t:"镇压暴乱"
KOA.12.d:"当怒吼声与口号声响彻在斯塔比翁的每一处街道时，斯坦瓦夫一世终于明白了他的所作所为导致了什么严重的后果。顺着窗户望去，火焰与浓烟冲向天空，隐约还能看到不少市民集结在一起向王宫挺进。根据一些情报显示，这些市民靠着“地下网络”逐渐集结，最终成功发起了暴乱。而他们手中的武器与枪支也昭示了这次暴乱的程度超过了以往的任何一次。虽然斯坦瓦夫与内阁大臣们早已对卫戍部队下达了镇压的指令，但卫戍部队的指挥官拒绝向市民开枪，他们选择了保持中立。\n斯坦瓦夫从窗前回神，看向身边的内阁大臣们。此时的他们早已没有了以往的高傲与自信，一个个面面相觑，不知所措。“陛下，我们必须要采取行动了。”军务大臣海尔曼说道，“卫戍部队拒绝执行镇压，王宫卫队人数不足，看来我们只能依靠军队了。”斯坦瓦夫自然知道现在只能依靠军队来解决暴乱，但他也有自己的考量。是让在城内驻扎的海军陆战队出动还是调陆军进城？这是斯坦瓦夫发愁的地方。\n海军部绝大多数都是温和派，根本无法保证他们的忠诚性能有多高；而陆军的调动则需要一点时间，那些陆军的指挥官正对国王不满，他们一直在蠢蠢欲动。斯坦瓦夫看向大臣们，大臣们也看向斯坦瓦夫，海尔曼则鼓吹着让陆军进城。斯坦瓦夫叹了一口气，做出了他的决定——"
KOA.12.a:"兵贵神速，让海军陆战队出动吧。"
KOA.12.b:"海尔曼，调陆军进城吧，我们不能相信不忠诚的军队。"

KOA.13.t:"街垒上的烟花"
KOA.13.d:"正当斯坦瓦夫与大臣们祈祷着海军陆战队能解决这场糟糕的暴动时，一声声巨大的声响传了过来，但奇怪的是，并没有爆炸声与交火声，有的只是窗外仍未停歇的怒吼与叫嚷。，突然，一束束烟花在各个街垒上空爆开，绚丽的烟花很快便遍布了首都的上空。起初斯坦瓦夫与大臣们还以为是军队与市民的交火点燃了烟花。但很快，他们就意识到了，海军陆战队也加入了叛乱，他们和那些市民站到了一起。大臣们和斯坦瓦夫大惊失色，他们疯狂的给海军陆战队的指挥官韦尔特曼发电，要求他停止叛乱并立刻镇压市民。但回应他们的，是韦尔特曼那冰冷的电报：我们将与人民为伍，国王陛下。随后内城的电报与电话线便切被断。现在，斯坦瓦夫已经成了被困在王宫里孤家寡人，他的命运正随着外面市民们的浪潮而不断起伏。"
KOA.13.a:"快堵住大门，让卫队顶住！一定给我顶住！"

KOA.14.t:"正义号一声炮响..."
KOA.14.d:"当凌晨一点的钟声敲响，斯塔比翁的军港中射出了几束探射灯的灯光，而各级战舰也倾巢出动对停泊在自由港的船只进行封锁。在完成封锁后，探照灯集体照射在王城内城的城墙上。王宫卫队只见一束白光照来，便纷纷捂住眼睛蹲下身子。当他们好不容易恢复光明时，只看见正义号巡洋舰将她的主炮对准了王宫正门。随着一声炮响，王宫的正门被轰出了一个巨大的空洞。市民们与海军陆战队伴随着铺天盖地的口号声、喊杀声向王宫冲来，而那些王宫卫队还未从刚刚的袭击中缓过神来，在市民与海军陆战队冲上城墙后，王宫卫队选择了投降。随着王宫卫队的投降，市民们找到了躲藏在地堡里的斯坦瓦夫一世与内阁大臣们，等待他们的将是人民的怒火与审判。而全世界都将知道这一天，知道正义号的一声炮响，给奥科特尼安带来了迟到了近200年的革命。"
KOA.14.a:"民主万岁！"

KOA.15.t:"全城静默"
KOA.15.d:"暂无"
KOA.15.a:"暂无"

KOA.16.t:"我们的共和"
KOA.16.d:"曾经的禁锢已然破碎，而那自由的歌声传遍昔日王城的大街小巷。我们胜利了，但也仅仅是在这座城市中的胜利，在国家的每一个角落都遗留着守旧派的爪牙们。对于这些反动派，平民、军队、共和主义人士提出了各种看法\n不少激进的共和人士和市民要求直接建立起市民委员会和革命委员会，并对城市中的贵族和守旧派官僚、陆军军官进行清算。他们准备直接进行选举，并从非军方出身民主人士中选出临时总统。他们将依托着海军的力量在全国推行民主制度，进而让人们认识并参与到共和主义的民主制度中，尽管他们中的一些人并不支持海军一家独大...\n而军方则出现了两种不同的声音，两派都认为仓促地进行共和选举将会使国家陷入更加混乱的局势中。以进步友人会为主的多数派认为：共和国需要以革命委员会和士兵委员会为主组成的两会体制，用“训政”的方式掌握国家的政治经济军事形势。当然这一切都是以市民和士兵们的意见为主，而不仅仅是依靠着少数人的决议推动民主制。\n以原改革派内阁成员和部分海军军官为主的少数派则认为：默克·希尔将军作为革命的主要策划人、奥科特尼安多年以来的民主化推动人，应该由他建立军人监国的体制。他们认为应该对全国反动派施行强硬手段以便推行民主制度，并建立起集中化的工业体制。尽管这被认为是破坏共和传统而受人诟病，但这对工业力量薄弱的奥科特尼安来说是一个不错的选择。总的来说默克将军保证将会在一切安定后归还权力。"
KOA.16.a:"若不尝试，何见民主？"
KOA.16.b:"海军们走出了第一步，而我们只需要跟着他继续走。"
KOA.16.c:"革命尚未成功，将军尚得继续。"

