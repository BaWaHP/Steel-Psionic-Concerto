###企业###

###国策###
KOA_council_to_elect_a_king:"选王会议"
KOA_council_to_elect_a_king_desc:"历代君主的死证明了王国政治斗争的激烈，所有人都在密谋着用新国王为自己的派系争取利益。但在经济逐渐低迷的王国，我们不得不邀请国外的贵族并让最合适的那位作为我们神圣又可怜的国王。"

#威廉#
KOA_william_cronation:0 "威廉的加冕典礼"
KOA_william_cronation_desc:0 "人民支持改革派，威廉现在是我们的国王了。按照惯例我们应该用一场盛大的典礼来欢呼新王，但在经济危机的条件下，我们需要节俭渡过，勒紧裤腰带是我们国家的第一步！"
KOA_winds_of_change:0 "海风吹来变革"
KOA_winds_of_change_desc:0 "海军是改革派的重要支持者，在海军的帮助下，我们将迎来有史以来最激烈的改革。就让这海风吹散保守吧！"
KOA_helle_tockman_law:0 "赫勒-托克曼法"
KOA_helle_tockman_law_desc:0 "...因此对于王后审判案我们要求对此重新进行审判，而赫勒先生将用他与托克曼先生合编的新法作为审判依据...我们将废除《临时审判法》的所以条例，全盘采用《赫勒-托克曼法》。"
KOA_constitutional_amendments:0 "宪法修正案"
KOA_constitutional_amendments_desc:0 "在王后重审案后，我们应该继续推动自由化，让我们国家走向君主立宪！"
KOA_open_politics:0 "政治开放"
KOA_open_politics_desc:0 "对于民主化进程来说，一个开放的政治风气是首先要保证的事项，我们将开放对政治的讨论。“谈！都可以谈，没什么不可以谈的。”"
KOA_integration_of_democratic_factions:0 "整合民主派系"
KOA_integration_of_democratic_factions_desc:0 "仅仅依靠着改革派的力量是不足以对抗保守派的，我们必须要团结再也的民主党派，争取在公开选举中获得绝对优势！"
KOA_spring_of_stabevel:0 "斯塔比翁之春"
KOA_spring_of_stabevel_desc:0 "本是寒风凛冽的街道却充斥着无数热烈的欢呼，人民之歌唱遍大街小巷、所有人都参与到首相的选举中，鲜花战胜了鲜血。斯塔比翁的政治春天来临了！"
KOA_bicameral:0 "两院制"
KOA_bicameral_desc:0 "王国如同一辆在轨道上行驶的列车，轨道正是人民，而国务院和政法院则是这辆列车重要的主轮，国务院负责监督、管理各部门的财政使用以及司理政法院提出的法案；而政法院负责立法、监督政府等事务...两院互相监督合作才能健全王国的政治司法制度。"
KOA_local_election_planning:0 "地方选举规划"
KOA_local_election_planning_desc:0 "除了中央的内阁官员以外，地方上贵族世袭和国王直接任命的制度也需要改革了。我们按全国各省的行政区划设立不同的选区，在换届之前不同的时间段选举不同的职位：五月前是地方省市长，十二月前是地方代表议员..."
KOA_here_goes_back_there:0 "由此再传回彼岸"
KOA_here_goes_back_there_desc:0 "就算面对无数阻碍，王国终于完成了她的初步政治改革了；就算改革内容充斥着许多隐患，王国也将不断前进改革弊端；即使黎明已至，我们也不能松懈。海风吹来变革，拂遍大地后，由此再传回彼岸。"

#斯坦瓦夫#
KOA_cronation:"斯坦瓦夫的加冕典礼"
KOA_cronation_desc:"长期以来的权力斗争让联邦里的其他国家对王国的虚弱深信不疑，我们必须举办一场豪华的加冕仪式让所有人见识到王国的国力和团结。"
KOA_capital_riot:"首都暴动"
KOA_capital_riot_desc:"为了维持盛大的加冕仪式，国家军警系统从首都市民家中征收了大量的食物、金钱和奢侈品，这引起了市民的强烈不满。现在他们聚集在了街头..."
KOA_control_the_navy:0 "控制海军"
KOA_control_the_navy_desc:0 ""
KOA_clean_up_opposition:0 "清洗反对派"
KOA_clean_up_opposition_desc:0 ""
#改革派政变#
KOA_reformist_coup:"改革派政变"
KOA_reformist_coup_desc:"在海军陆战队的英勇作战下，我们已经确保了首都的控制权。国王的下场将是我们下一个讨论事项，让守旧派见识一下我们的实力！"
