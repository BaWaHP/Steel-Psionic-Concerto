#军改#
KOA.100.t:0 "旧陆军保留问题"
KOA.100.d:0 "旧陆军的政治问题一直是我们的心头大患，一方面他们是非常精锐的部队，战斗力比我们的城市民兵高；另一方面他们绝大多数是忠于旧贵族和国王的部队，他们中的许多中下级军官都有着爵位，对他们进行收编可能会使人民对我们政府的纯洁度持怀疑态度，但能让我们的军事实力迅速回到革命前的时候。\n\n军队中的激进派和绝大多数民众希望完全取缔这帮旧兵痞，毕竟他们在革命前对居民的暴行就摆在那里，与其选择相信他们能放下以往的“荣耀”向共和政府宣誓效忠，不如让我们的民兵加强训练力度。而新生的共和政府也更需要以一支新军队展现我们的新面貌，以此宣誓与旧王国的不同。\n\n而政府中的实用主义者和精英主义者则认为应该尽可能地保留旧军队，以此面对北边可能的威胁。至于他们忠诚度问题，可以利用再教育部门对他们进行思想指导，彻底地让他们成为对政府有用的军队。\n\n无论如何这个问题必须尽快解决，否则当我们的敌人反应过来时，他们将成为我们最危险的敌人。"
KOA.100.a:0 "“先把他们的基层军官换成我们的人，再对士兵们进行思想宣传。”"
KOA.100.a.tt:0 "解锁国策§Y政治挂帅§!"
KOA.100.b:0 "“把他们控制在我们看得到的地方，直到新军队成型！”"
KOA.100.b.tt:0 "解锁国策§Y新国家，新军队§!"

