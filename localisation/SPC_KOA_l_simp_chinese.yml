###民族精神###
KOA_scarlet_crown:0 "血色王冠"
KOA_scarlet_crown_desc:0 "在五年间薨了六任国王，奥科特尼安王国的王族已经再无后人了，现在我们必须从已有的贵族中选出一位被改革派和守旧派都能接受的国王，不然国家将持续混乱的状态。"
KOA_political_chaos:0 "政治混乱"
KOA_political_chaos_desc:0 "议会中的斗争参杂着庞大的意识形态冲突，改革派和守旧派内部都有不同的矛盾，但是他们会因为干倒对方而联合起来，这样的联合也会随着一个目标的完成而走向崩溃，这种局面也许将因为一方的胜出而改变..."
KOA_backward_economy:0 "落后的经济"
KOA_backward_economy_desc:0 "奥科特尼安的工业处于后发的状况，但国内的大量保守势力让王国的工业发展受到很大的阻力，即使新兴贵族在城市和城市郊区中建设了部分工厂，但这仍然无法改变奥科特尼安工业落后的情况，而农业的落后，更加地阻碍了工业的发展，甚至需要工业人口支援农业，我们不得不进口国外粮食以防大饥之年的到来。"
KOA_backward_economy_dynamic_modifiers:0 "落后的经济"
KOA_backward_economy_dynamic_modifiers_desc:0 "奥科特尼安的工业处于后发的状况，但国内的大量保守势力让王国的工业发展受到很大的阻力，即使新兴贵族在城市和城市郊区中建设了部分工厂，但这仍然无法改变奥科特尼安工业落后的情况，而农业的落后，更加地阻碍了工业的发展，甚至需要工业人口支援农业，我们不得不进口国外粮食以防大饥之年的到来。"
KOA_sea_land_conflict:0 "海陆矛盾"
KOA_sea_land_conflict_desc:0 "由于派系斗争的影响，陆海军也常常不对付，这极大地影响了国家的军事指挥，甚至有时候会出现两方在城市酒馆中出现大规模械斗的情况，国家的未来必须由其中一方承担..."
