KOA_decision_elect_king_category:"选王"
KOA_decision_elect_king_category_desc:"为了体现王国法律的神圣与公正，由贵族、官僚以及民间德高望重人士组成的会议将决定我们神圣的王冠由谁承担。这次会议做出主要判断的依旧是守旧派和改革派，但谁在乎呢？只需有个国王，无需国王是谁，国王的权力只是两派权力的体现而已。尽管如此，在云集外国记者的奥科特尼安政治开放也达到了一个前所未有的高度，起码今天你能畅所欲言。\n\n§C斯坦瓦夫§!的支持度：[KOA_stanwaf_exit_txt]\n\n§R威廉§!的支持度：[?KOA_var_support_willian|R0]\n\n§Y于连§!的支持度：[?KOA_var_support_yulian|Y0]\n\n支持度最高者将是我们的国王。"
