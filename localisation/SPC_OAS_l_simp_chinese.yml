OASNews.1.t:0 "绿洲协定签署"
OASNews.1.d:0 "经过数个月的紧张磋商，似乎绿洲共和国终于在内部达成一致。今日，由来自绿洲协定势力圈的多个国家，包括绿洲的特别行政军区，贸易公司，来自北方的矮人国度以及西方的兽人革命流亡者组成的兽乡共和国的代表在绿洲城齐聚一堂，签署了绿洲协定。\n\n该协定成立了一个以绿洲共和国为核心的防御型军事同盟，要求绿洲共和国作为主导国负责协商各成员国的军工建设。同时，任何一个成员国遭受外部攻击时，其它成员国有义务加入战争保护遭受攻击的绿洲协定成员国。虽然也有条目指出各成员国开放彼此间的国境，免除关税并免除签证，开放公民自由通行，绿洲共和国发言人在新闻发布会上特别指出：“绿洲共和国无意愿出于国防义务外的情况下干涉他国内政。”"
OASNews.1.a:0 "报团取暖，未尝不可？"

OASNews.2.t:0 "绿洲联邦成立"
OASNews.2.d:0 "中巴斯蒂亚传来震动地区局势的消息：绿洲共和国政府正式宣布，与其长期援助的新兽乡共和国以及东绿洲特别行政区完成合并，新的国家实体——绿洲联邦——即日起成立。这个最初由难民、流亡者与战乱幸存者拼凑而成的割据政权，曾一度被外界视作荒原上的临时营地，如今却以联邦之名，将数个政治与军事实体整合到同一面旗帜之下。\n\n新兽乡共和国的加入使绿洲联邦不再只是前北方帝国难民的避难所。这个由雀鸟族群组成的新生共和国，曾在绿洲的援助下艰难维持独立，并逐渐建立起自己的自治体系；而东绿洲特别行政区，或者是东绿洲军区，则长期承担着抵抗人类殖民者与清剿魔兽军团残余的任务。随着二者并入联邦，绿洲政府获得了更完整的行政纵深、军事前线与多物种政治合法性。\n\n联邦政府在公告中宣称，绿洲联邦的成立是“乱世中共同求生者的必然选择”。支持者将其视为中巴斯蒂亚受压迫者走向联合的伟大一步，反对者则警告，这个从难民营中成长起来的新国家，或许会成为地区战争的新中心。但无论如何，从今日起，中巴斯蒂亚的政治格局已经无法回到过去。"
OASNews.2.a:0 "中巴斯蒂亚的历史从此开始剧变..."

OASNews.3.t:0 "兽乡共和国正式加入绿洲协定"
OASNews.3.d:0 "在雀鸟内战的硝烟终于散去后，兽乡共和国政府今日正式宣布，将以正式成员国身份加入由绿洲共和国主导的绿洲协定。\n\n兽乡共和国的胜利并不轻松，虽然先前已经作为观察国和绿洲共和国展开大量合作，取得内战的胜利仍然艰难。不同雀鸟派系之间围绕着意识形态爆发的血腥内战，曾让外界一度怀疑这个存在于中巴斯蒂亚山林间的迷你政权是否能够存续。然而，随着共和国政府最终稳定局势，并重新整合各地行政与军事力量，加入绿洲协定便成了顺理成章的下一步。对于兽乡而言，绿洲协定不仅意味着安全保障，也意味着更进一步的物资援助、战后重建与国际承认。\n\n随着兽乡共和国正式成为绿洲协定的一员，中巴斯蒂亚的政治格局或将迎来新的变化。观察人士普遍认为，这一举动将进一步加强绿洲协定在地区内的影响力，同时也可能引发其他国家重新评估与绿洲协定与绿洲共和国的关系。"
OASNews.3.a:0 "绿洲协定继续前进..."

OASNews.4.t:0 "东绿洲军区正式加入绿洲协定"
OASNews.4.d:0 "在中巴斯蒂亚东部持续数年的乱战宣告结束后，东绿洲军区今日正式宣布，将接受绿洲共和国政府的行政重组，并以东绿洲特别行政区的身份加入绿洲协定体系。这个最初为抵抗前魔兽军团残余与人类殖民地威胁而建立的特别军管区，曾长期处在战争最前线，如今则在绿洲共和国的支持下完成了对当地武装势力的整合，成为绿洲势力在东部地区最重要的支点。\n\n与兽乡共和国不同，东绿洲并不会作为独立成员国加入协定。根据双方公布的安排，原军区政府将被改组为特别行政区政府，保留一定程度的地方自治与军事管理权限，但其外交、战略与核心防务事务将由绿洲共和国统一协调。\n\n东绿洲特别行政区的成立意味着绿洲共和国终于将东部屏障纳入稳定体系，中巴斯蒂亚东部也有望结束军阀混战与殖民残余反复争夺的时代，尽管如此，绿洲共和国也被诟病于不断试图扩张地区影响力。无论如何，可以确认的是，随着东绿洲军区改旗易帜，绿洲协定的边界已经正式延伸到了中巴斯蒂亚东部。"
