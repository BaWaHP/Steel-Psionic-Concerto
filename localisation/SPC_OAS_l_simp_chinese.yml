###民族精神###
CB_manic_borders:0 "骚动的边境"
CB_manic_borders_desc:0 "来自七河的消息证实了来自反复遭到袭扰的边境的报告。被称作“于摩”的地区似乎陷入了一位疯王的统治，其残暴而疯狂的治理方式催生了失控的大规模的失控魔法以及反复的劫掠行为，我们住在边境的据点与居民都不堪其忧。随着七河地区的局势进一步失控，情况很可能会再次恶化——幸运的是，目前这些疯子的行为似乎还局限在七河地区内。"

OAS_oasis_cooperation_agreement:0 "绿洲合作协定"
OAS_oasis_cooperation_agreement_desc:0 "《绿洲合作协定》涵盖了绿洲共和国及其合作政权的一系列政治，经济，军事合作条款。《绿洲合作协定》规定了绿洲共和国作为协定签署国的领导者，有权力和义务在军事，经济上保护其成员，附属国，并在此基础上推进北中巴地区的和平与繁荣发展。\n\n§Y随着绿洲共和国势力范围的进一步扩大，关于修改协定，为促进地区和平做出更多努力的声音已经愈发流行…§!"

OAS_oasis_agreement:0 "绿洲协定"
OAS_oasis_agreement_desc:0 "随着《绿洲协定》的签署，原先关于《绿洲合作协定》的条款得到了进一步扩张。在原先的政治，经济，军事合作条款的基础上，新协定扩大了绿洲共和国作为协定领导国的主导地位，允许其进一步干涉各签署国的内政，同时扩大了各方面合作的深度以促进不同国家间的合作关系与统一。\n\n§C作为最重要的一点，《绿洲协定》明确了成立一个统一的联邦共和国的最终目标。§!"

OAS_idealism:0 "理想本心"
OAS_idealism_desc:0 "从几百个难民和几辆破旧的卡车，到一股中巴斯蒂亚不可忽视的庞大政治力量，绿洲共和国的存在印证了理想主义者在如今的乱世中仍有一席之地。这份理想支撑着我们从无到有地建成我们的共和国，也支撑着它继续存在。只要绿洲共和国存在一天，我们便不会放弃这份理想，我们会成为沙漠中的绿洲。\n\n§C绿洲共和国会不断接收来自北方的难民，同时也会得到来自世界各地的慈善机构的投资。§!"

OAS_idealism_lighthouse:0 "理想主义灯塔"
OAS_idealism_lighthouse_desc:0 "从几百个难民和几辆破旧的卡车，到一座真正闪耀于沙漠之中的繁华都城，绿洲共和国已经证明了自己的存在绝非侥幸。饥荒，围困，动荡与战争都没能让我们倒下，反而使辉月都的灯火变得更加明亮。这里不再只是乱世中的一席之地，而是所有仍愿相信自由，尊严与未来之人可以遥望的方向。\n\n§C只要绿洲联邦存在，便会在地区内支持社会自由主义运动，援助那些仍在黑暗中摸索道路的人们。§!"

OAS_ethical_dilemma:0 "道德困境"
OAS_ethical_dilemma_desc:0 "虽然绿洲共和国始终秉承着来者不拒的理念，尽可能地为中巴地区的难民提供庇护和良好的生活环境。然而，为了共和国的生存，我们却不得不在方方面面上作出妥协。无论是为了维持共和国的内部稳定和经济运转，还是满足来自外界资本的经济需求以维持我们和南方脆弱的关系，我们都不得不反过来压迫那些我们试图保护的民众。将他们投入环境恶劣的矿坑也好，送入为数不多，却不得不全力运转的血汗工厂也好，我们的选择并不多。\n\n§1如果继续这样下去，我们的理想只会渐行渐远。§!"

OAS_light_from_the_moon:0 "光自辉月之城来"
OAS_light_from_the_moon_desc:0 "辉月都曾不是城市，只是一片被帐篷、泥水、伤兵与难民填满的临时营地。没有人相信这里能熬过下一个冬天，更没有人相信它会成为一国之都。\n\n然而，多年的饥荒、围困、内斗与战火都没能熄灭那点微弱的光。人们在废墟上铺设街道，在弹坑旁建起学校，在临时棚屋之间拉起电线，又在一次次危机后重新相信明天。如今的辉月都已不再只是避难所，而是这片土地上最明亮的象征：理想主义并非空谈，只要有人愿意为它忍耐、建设、牺牲，它终有一日会照进现实。\n\n§C只要辉月都仍在闪耀，这个国家便不会忘记自己为何而战。§!"

OAS_weak_republic:0 "脆弱的共和国"
OAS_weak_republic_desc:0 "虽然凭借着理想主义的口号，绿洲共和国明面上成为了中巴斯蒂亚不可忽视的一股势力。可实际上，由于科技落后，产业不发达，以及各地缺乏开发，物种过多以至于社会动荡，绿洲共和国的内部始终非常脆弱。除此之外，如何消化获得的庞大土地也是绿洲政府的一大难题。随着科研，工业，以及社会的不断发展，这些问题或许会得到改善。"

OAS_nothing_but_brace:0 "满腔热血，而一无所有"
OAS_nothing_but_brace_desc:0 "如果要用一句话概括绿洲共和国的部队，那便是“满腔热血，而一无所有”。无论是为了理想挺身而出，亦或者是在乱世中谋得求生之道，希望加入共和国部队的民众络绎不绝。然而，虽然兵员数量上不会遇到什么问题，由于绿洲的科技落后，产业不发达，以及缺乏相关管理经验，绿洲的武装力量无法得到现代化的装备，也不得不采用落后的训练方式，甚至无法辨别兵员的好坏，对战争的理解仿佛还停留在伟大战争。"

###领导人###
OAS_risa_silvertail:0 "瑞纱·银尾"
OAS_risa_silvertail_desc:0 "当世界大战爆发前的阴云笼罩德拉科纳里斯时，银尾家族迎来了新的子嗣。瑞纱的父母是因佩里亚王国境内著名的进步主义者，和多支反殖民势力有所联系，同时是小有家资的狐人企业家。德拉科纳里斯局势走向失控时，殖民政府开始大规模清算当地居民的资产，政治恐怖席卷各地，瑞纱的父母不得不依靠关系将瑞纱送出因佩里亚王国，逃往瑟拉斯地区。这是瑞纱和父母见的最后一面，之后她再也不曾从混乱的北巴斯蒂亚听到过来自父母的消息。\n\n随着战争局势的变化，那些帮助她逃往瑟拉斯的游击队不得不回到前线继续战斗，而瑞纱则被托付给了自由公会联盟境内其中一所地方工匠协会。在瑞纱童年的记忆里，除去反反复复地受到种族歧视外，便是无休止的工作，随着她年龄的增长，压在她身上的担子也愈发繁重。不过，在劳累之余，在协会的帮助下，她也接受了教育，并且在温饱得到保障的情况下顺利长大。\n\n有时候，瑞纱会想，如果故乡被毁，那为什么千千万万的难民不能团结起来，在南方建立新的故乡？为什么他们就要在别人的统治下过着被歧视，担心受怕的生活？自由公会联盟为难民们提供了一个说得过去的住所，让他们不至于被人类屠戮殆尽，亦或者奴役，可这里终究不是家。\n\n而她并非孤身一狐。因为战争而逃亡瑟拉斯的难民有千千万，他们居无定所，反而还被瑟拉斯当地的政府视作眼中钉，亦或者干脆死在盗匪的屠刀下。在瑞纱富有激情的演讲下，由难民组成的政治团体很快被组织起来。他们走上街头，要求地方政府给予难民更好的生活条件和基本权利，而不是像原来一样把他们视作廉价劳动力和混吃等死的废物。\n\n他们的努力最后取得了成功。在中巴联盟政府，自由公会联盟政府，冒险者联盟，以及白鸽国际等多方政治，经济团体的斡旋下，一片位于中巴地区西北部，无人关心，无人认领的土地被划分给了难民。瑞纱称其为“绿洲”，意图在当地建立其因战乱而失去故乡，属于所有物种的绿洲。一点小小的火苗成为了燎原的星火，无数因战乱而逃离北巴斯蒂亚的难民，政治，经济团体来到了绿洲，他们成为了维持绿洲共和国，甚至是扩张的重要原动力。绿洲共和国很快便打破了所有人的预料，成为了中巴斯蒂亚不可忽视的一股强大势力。\n\n如果家园坍塌毁灭，那就一砖一瓦地建回来；如果故乡不复存在，那就在这里建起新的家园。对于瑞纱，以及她身后千千万万的难民而言，能被称作“家”的地方早已不复存在。北巴斯蒂亚的局势正在快速变化，谁也不知道明天会走向何方。只有团结起来，亲手铸造自己新的家园，他们才能掌握自己的未来，才能在废土上创造真正的绿洲。"

