###领导人###
GLV_conor_galviva:0 "康纳·戈尔维亚"
GLV_conor_galviva_desc:0 "作为戈尔维亚王国的第八任皇帝，康纳同他那骁勇善战，坚强不屈的父亲不同，他看出了王国的没落，看出了灭亡的未来。为此，他选择违背前任国王下达的指示，决心走出自己的道路，主导了二元制的改革，并主动向沃姆帝国一方抛出了橄榄枝。假如时局注定要让沃姆帝国成为一方霸主，那戈尔维亚至少也该维持相对的独立——当时的他是这样想的。同国王想法一拍即合的戈尔维亚保守党也借此成为了第一大党。\n\n事实证明，他的决心也并非没有回报。不断扩张的沃姆帝国并不打算强行吞并戈尔维亚，相反，他们同意了大致维持戈尔维亚内政独立的请求，甚至将工业时代的前端科技带给了这个相对落后的国家。戈尔维亚尚未得到开发的资源和利用的人力与沃姆一方的商业组织一拍即合，短暂的经济繁荣曾一度让国民也多少认可向沃姆俯首称臣的决定。\n\n然而，沃姆人很快便展露出了他们的狼子野心。以“防御北部边疆”为由，罗梦骑士团成立；以“帮助当地现代化”为由，阿瑞萨自治区成立；以“重建被战争破坏的地区”为由，顿恩骑士团成立。在大战中为沃姆流血流汗的戈尔维亚非但没有得到任何回报，反而闹了个国家分裂，人心惶惶的下场。\n\n康纳尚且没有想好他接下来该如何是好。或许他可以继续维持过去的政策，尝试在未来的风暴中继续保持独立，或者是更低程度的自治；但也有可能，他会寻求自己子女的帮助…"

###民族精神###
GLV_servant_of_wom:0 "沃姆的仆从"
GLV_servant_of_wom_desc:0 "根据我们同沃姆帝国签署的《戈尔维亚-沃姆合作协定》，我们在维持政治独立性的基础上需要向沃姆帝国在经济上特别优待，不但要将每年收入按照一定比例上交，还必须允许沃姆公民在我国境内享有完整公民权益，甚至是商业优待。许多人指责通过签署该协定的行为是议会对国家的背叛，可在沃姆帝国压倒性的军事实力上，选择似乎不怎么多。"
GLV_broken_united_dream:0 "大戈尔维亚之梦破碎"
GLV_broken_united_dream_desc:0 "在沃姆人到来前，戈尔维亚也曾是一方霸主，国家，民族统一，不需要担心任何内部的分裂。现在不一样了，狡诈的沃姆人为了不让我们再度崛起而分裂了我们的民族，将原本应该大一统的戈尔维亚王国分裂成了各种“骑士团”，“自治领”。我们的人民为此愤怒不已，可在沃姆帝国绝对的力量面前，我们能做的似乎不多。"
GLV_less_trusted_ruling_party:0 "失去威信的执政党"
GLV_less_trusted_ruling_party_desc:0 "由于当前政府不断地对沃姆帝国采取缓靖政策，在外交，内政上做出了大量让步，不但默许了国家的分裂，还同意沃姆帝国派遣代表团来限制戈尔维亚军队发展。这些政策极大地破坏了政治稳定性，在野党和执政党之间的斗争变得愈发暴力，游行示威的队伍也一天比一天壮大。或许，皇室应当介入？"
GLV_legacy_of_1997:0 "1997大旱的余波"
GLV_legacy_of_1997_desc:0 "97年年中，我国经历了一场史无前例的大旱。这本不该对我国造成如此剧烈的影响，可在失去了顿恩平原，以及沃姆人拒绝援助请求后，一切情况都急转直下，远远超出了我们最初的设想。不过，多亏了中央政府的应对及时，大部分恶劣影响已经于97年处理完毕，我们接下来只需要处理好余波即可。"
GLV_wom_army_representative:0 "沃姆国防军代表团"
GLV_wom_army_representative_desc:0 "沃姆国防军代表团是沃姆帝国于1996年以“协助大战后戈尔维亚军队重建以及交流学习”的理由强行塞给我们的驻扎兵团。他们时刻紧盯着我们的军事力量发展，使用各种多余的官僚主义降低了我们征兵以及部队训练的效率。尽管他们确实有在做一点学习交流的工作，但这也不过是为他们强抢我们军事学院崭露头角的人才的一个借口罢了。"

