NOHNews.1.t:0 "雀鸟内战爆发"
NOHNews.1.d:0 "兽乡各地割据势力之间脆弱的停火终于走向破裂。数年前的革命虽然以王国军守住首都，维持政权结束，可王国军却几乎丧失了这之外的领土控制权，一方面是转入游击的左翼武装，另一方面则是得到了绿洲共和国援助的革命军。虽然没有达成任何正式的停火协议，但几个势力之间的冲突大多停留在边境摩擦、物资封锁与小规模袭击。如今，随着多条战线同时传来交火消息，这场长期悬而未决的分裂局面正式演变为全面内战。\n\n由达里安·赤羽领导的兽乡解放军最先打破沉默。这支缺乏外部支援的左翼武装长期盘踞在山地与乡间，依靠游击网络和地方支持维持生存，意图复兴在北巴斯蒂亚失败的共产主义革命；而塔林·迅羽领导的新兽乡共和国则在绿洲共和国的援助下守住了自己的核心地区，并试图建立一个民主的兽乡共和国。至于安德拉尔·烁羽治下的兽乡王国，尽管仍占据旧都与法统，却早已被腐败、逃兵与宫廷阴谋拖入泥潭。\n\n第一批难民已经越过边境，铁路被炸断，城市上空开始出现侦察机与飞行斥候的影子。曾经只是地图上几块颜色不同的割据区，如今变成了真正的战场，多年前的血腥景象或将再度重演。"
NOHNews.1.a:0 "团结一致，我们会取得胜利！"
NOHNews.1.b:0 "山里的鸟人...在打架？"
NOHNews.1.c:0 "我们不会抛下我们的盟友！"

NOHNews.2.t:0 "新兽乡共和国取得兽乡内战胜利"
NOHNews.2.d:0 "兽乡内战的最后一场大规模战斗已经结束。随着王国军残部放下武器，安德拉尔·烁羽的宫廷政府宣告瓦解；而达里安·赤羽领导的兽乡解放军也在连续失去根据地后接受停火安排，新兽乡共和国正式宣布取得内战胜利。持续数年的割据、封锁与武装对峙，终于以塔林·迅羽政府的全面胜出告一段落。\n\n这场胜利并非来自单纯的军事推进。新兽乡共和国在绿洲共和国的援助下维持住了最初几乎摇摇欲坠的共和国政权，又在战争中逐步整合行政、粮食运输与地方防务体系。相比之下，兽乡王国的旧贵族与宫廷派系在内耗中丧失了最后的威信，缺乏外部支援的左翼游击队则始终无法将山林与乡间的影响力转化为稳定的国家机器。\n\n塔林·迅羽在首都发表讲话，宣布新兽乡共和国将启动战后重建、地方和解与军队改编工作。街道上仍能看见被炮火烧黑的墙面，难民队伍仍在等待返乡许可，但至少在今日，持续撕裂雀鸟族群的内战已经落下帷幕。兽乡不再有三个政府、三支军队与三套未来。它只剩下一个共和国，以及等待她的光辉未来。"
NOHNews.2.a:0 "我们是胜者！"
NOHNews.2.b:0 "让我们送出祝贺。"
NOHNews.2.c:0 "山里的鸟人...打完了？"

NOHNews.3.t:0 "兽乡解放军取得兽乡内战胜利"
NOHNews.3.d:0 "兽乡内战的战火终于在王国旧都前熄灭。随着新兽乡共和国残余部队向临时停火委员会缴械，安德拉尔·烁羽治下的兽乡王国也在最后一轮攻势中崩溃，达里安·赤羽领导的兽乡解放军正式宣布取得内战胜利。这个长期缺乏外部援助、依靠山地根据地与乡间组织艰难维持的左翼武装，如今成为了兽乡地区山林间唯一的胜利者。\n\n在战争爆发前，解放军的前景看似十分黯淡。相比得到绿洲共和国支持的新兽乡共和国，解放军缺乏稳定的军援、装备与外交承认；相比占据旧法统的兽乡王国，他们又没有首都地区的工业与旧军官体系作为支撑。然而，正是这些被迫在密林、村庄与废弃交通线间求生的游击队，最终拖垮了两个更像“国家”的对手。王国的腐朽无法挽救，新共和国的秩序也没能压过基层的怒火。\n\n达里安·赤羽在前线发表简短声明，称兽乡的战争“不是为了换一批人坐上旧王座”，而是为了结束王族、军阀与外部势力共同塑造的旧秩序。如今，解放军已经开始接管各地城镇，并将原先松散的游击组织改编为新的革命政府机构。密林中的枪声或许已经远去，但对于兽乡而言，真正困难的部分才刚刚开始。"
NOHNews.3.a:0 "我们是胜者！"
NOHNews.3.b:0 "让我们勉为其难的祝贺赤羽先生。"
NOHNews.3.c:0 "山里的鸟人...打完了？"

NOHNews.4.t:0 "兽乡王国取得兽乡内战胜利"
NOHNews.4.d:0 "兽乡内战的最后一面共和国旗帜已经被降下。随着新兽乡共和国政府宣布停止抵抗，塔林·迅羽的战时内阁宣告解散；而达里安·赤羽领导的兽乡解放军也在王国军的连续清剿下失去主要根据地，安德拉尔·烁羽正式宣布王国军取得内战胜利。这个曾被外界视为腐朽、迟缓且注定崩溃的旧王国，最终却以最残酷也最直接的方式重新夺回了兽乡的统治权。\n\n王国的胜利并不体面。漫长的内战让旧都之外的大片地区化为废墟，地方贵族、宫廷军官与旧官僚体系也在战争中暴露出近乎不可挽回的腐败与低效。然而，王国军仍然依靠残存的法统、军械库、地方效忠网络与对秩序崩溃的恐惧撑到了最后。相比之下，新兽乡共和国过度依赖绿洲援助，解放军则始终缺乏足够的重武器与稳定补给；当战线被拉长，王国的旧机器反而成了最能持续碾压对手的力量。\n\n安德拉尔·烁羽在宫廷发表胜利声明，宣称“叛乱时代已经结束，兽乡将重新归于王冠之下”。街道上，王国士兵列队穿过焦黑的城区，逃亡数年的贵族与官员开始返回各地行政厅，而被击败者的命运则被交给军事法庭与临时清剿队处理。雀鸟们的内战结束了，但笼罩在兽乡上空的阴影并未散去。王国活了下来，而这或许正是最令人不安的部分。"
NOHNews.4.a:0 "我们是胜者！"
NOHNews.4.b:0 "你们的统治不会长久..."
NOHNews.4.c:0 "山里的鸟人...打完了？"

