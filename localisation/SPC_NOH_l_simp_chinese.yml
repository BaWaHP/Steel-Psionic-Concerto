###民族精神###
NOH_discordant_finches:0 "不和的雀鸟"
NOH_discordant_finches_desc:0 "§Y“雀鸟，那是什么？山里的鸟人？”§!\n\n雀鸟一族自古以来都在中巴西北地区过着原始而落后的生活，直到几个世纪前外国思想的涌入，科技文化的进步，以及殖民者的倒行逆施，促使反抗的思想将雀鸟一族团结在了同一面旗帜下，帮助雀鸟带领其它非人物种发起了对人类的大叛乱。然而，反抗失败了，中巴地区重新陷入混乱，雀鸟一族也在动荡的时代中逐渐走向分裂…"

NOH_national_emergency:0 "国家紧急状态"
NOH_national_emergency_desc:0 "自塔林·迅羽掌管兽乡共和国数年以来，共和国始终维持着国家紧急状态。这给予了总统于共和国几乎无限的权力，一切的军事，政治行动都可以无视名存实亡的议会，总统令的力量几乎是无限的。这极大地帮助了我们维持脆弱祖国的稳定，在局势动荡的当下，这不失为一种妙招。尽管如此，我们也将不得不考虑共和国的未来，永久性维持国家紧急状态是可能的，但它必定以民主政治和人民福祉为代价——我们真的要这样做吗？"

NOH_political_terrorism:0 "政治恐怖"
NOH_political_terrorism_desc:0 "“首先要§O盯右§!，但主要还是§R防左§!。”\n\n如果问塔林·迅羽的政治思想如何，那他大概会给出如此简单的回复。在塔林看来，所有激进的意识形态思想都会成为共和国的潜在威胁。而反抗他总统之治的鸟们，共产主义者，社会主义者，进步主义者，自由主义者，威权民族主义者，基本都可以算是“激进”那一块，纷纷成为了被打压的对象。而在这其中，塔林往往不会掩盖其对共产主义深恶痛绝般的厌恶，共和国对激进左翼的打击也格外严格。"

NOH_united_dream:0 "祖国统一之理想"
NOH_united_dream_desc:0 "尽管内部动荡不断，可兽乡国，雀鸟一族在过去百年来始终生活在同一面旗帜下。我们的战士们都坚信，目前内战造成的分裂仅仅只是暂时的，许多雀鸟对祖国统一仍满怀希望，愿意为此奋战。这极大地鼓舞了我军的士气。"

NOH_economic_turmoil:0 "经济动荡"
NOH_economic_turmoil_desc:0 "大总统糟糕的内政管理和内战造成的损失引起了一轮又一轮的经济动荡，绿洲的援助可以确保动荡不会演变成危机，但治标不治本。我们需要尽快实现国家的统一，真正将社会各地的经济活动稳定下来，还需要改进政府的行政能力，提振民众对经济体制的信心。"

NOH_crippled_army:0 "残缺的军队"
NOH_crippled_army_desc:0 "共和国的军队大多来自旧王国的建制军，少部分则是在建国后，在绿洲帮助下组建的小股民兵部队。因此，由于旧王国未能实现现代化军事改革，我国的军队组织架构仍处在相对落后的初级阶段，绿洲的援助也远远不足。各地基层指挥官能力差，部队训练程度低，士兵不听指挥等问题层出不穷，在战争迫在眉睫的今天，我们最好做点什么。"

###领导人###
NOH_tallinn_swiftfeather:0 "塔林·迅羽"
NOH_tallinn_swiftfeather_desc:0 "简单来说，塔林·迅羽是一名爱国者。\n\n他热爱雀鸟一族，热爱故乡的山山水水，花草树木，甚至热爱自己——或者像他的很多同僚说的那样，过于自负。当然，塔林的自负并非没有资本，虽说自幼过着拆东墙补西墙的贫困生活，他异于常鸟的天赋成功帮助他在军校中大展身爪，年纪轻轻的他便得到王国军队重用，并在仕途中一路高升。不过，仿佛是命运所开的玩笑一般，展现出高超的军事天赋的塔林，在文化知识领域里却总是取得令鸟震撼的糟糕成绩。\n\n像他的许多同僚一样，随着兽乡王国的统治逐渐陷入动荡，塔林最终不得不面临艰难的政治选择。兽乡王国的君主制陈腐而懦弱，它既无法处理雀鸟与瑟拉斯难民的种族矛盾，也无法接受来自南方的新兴思想，反动的政府除了镇压百姓以外，似乎就惦记着在皇宫内花天酒地了。即便是时常和战友吃喝嫖赌的塔林也能看出来，这并非国家的统治之道。与他一样，痛心国家沦落今日的战友不在少数，他们很快便形成了王国政府军内部一股不容小觑的反叛势力。\n\n就当塔林决定在暗中推动革命，最大化避免伤亡时，西方的雀鸟共产主义者先他一步掀起了革命的风暴。这使得局势发生了根本性的改变——政府军在和共产党人的战斗中节节失利，或许不出数月，甚至数周，这兽乡就要改朝换代了。这绝非塔林希望看见的，赤色分子的传播就如同腐朽的兽乡王朝一样让他感到无比焦虑。\n\n这时候，绿洲伸出了橄榄枝。绿洲共和国的领导层同样不希望邻居出现一支以北方斯派克思想为主导的共产主义政权。在绿洲的帮助下，塔林和他的战友们在东南部起义，建立了兽乡共和国，并对共产党发起了猛攻。这导致了兽乡内战的停滞，因为三方都无法在激烈的战斗后彻底推进战线。\n\n可说到底，如何管理一个国家，塔林是不太懂的。他大脑中辽阔的知识盲区并不允许他进行多么复杂的改革，如果没有军队的铁腕和绿洲的行政援助，他那只能依靠宣布永久紧急状态的政权恐怕会立刻垮台。对于塔林来说，他能做的无非就是把闹事的压下去，把思想激进的民众关起来，然后想办法去绿洲多要点援助，看看绿洲援助来的行政班子能不能自己把事儿办成。\n\n不过话是这么说，塔林确实也希望能办成点事儿。作为戎马一生的军人，他始终心怀祖国统一的理想。执政，他确实不行；论名声，他也算是臭名远扬了；但论打仗，他还是会的，而且会的不是一点半点。"

