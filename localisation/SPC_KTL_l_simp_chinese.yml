###领导人###
KTL_noble_parliament:0 "贵族议会"
KTL_levant_jean_faustin:0 "连凡特·让·弗西汀"
KTL_levant_jean_faustin_desc:0 "生为皇尊长子，然啼哭异乡，而远眺故乡土，终以泪叙其志。\n\n上维尔陶并不是最坏的地方，但对流亡的王室特来说，远离王宫百里之外是先祖难以容忍的失败。作为南巴斯蒂亚历史最为悠久的王室之一，不可避免地会受到共和派的革命冲击。令人发指的是，他们竟不惜联合其他国家的强盗来围剿自己的祖国。是的，即使国家实质上是王室的财产，但他相信：君与民之间早已建立起了有机的联系，统治与服从像是无形的契约，让国民从“被压迫”的思想中解放。\n\n复兴的道路亦然漫长，然而对故土的深沉情感是连凡特的支柱。魔兽、亚人甚至类人都曾前来自荐为盟，但托莱多的社会理然应是纯净的，他相信无论托莱多如何改朝换代，总会有人为社会的纯净负责，作为“法理上最具合法性的继承者”，至少不能输在这里。\n\n独裁执政的托莱多也许是“稳定”的，但必然是最不令人民感到满意的。当他亲眼所见仍有人愿意屈膝君王以表忠心时，皇室欠民众的恩情已经被牢牢记于心。在共和派的同盟形同虚设之际，王子陛下展开了对篡权的寡头的复仇，相信南方的土地，必将示其忠心。\n\n崭新的、有机的王国正在召唤忠义之臣，以先王的名义，连凡特策划了刺杀案，迎着既熟悉又陌生的尘土到达南方，祖国的广袤给予他自信，近卫军的忠诚给予力量。要谈论到如何报答臣民，那便是回到曾经最稳定的时期，告别无休止的政局内斗，在宗教与王国的感召下拥有最稳定与纯净的生活。\n\n“就让那些连恪守本分的人民都保护不了的‘人权大家’评论托莱多这也不好，那也不行吧。而法理和秩序，将会得到至高的拥护与敬仰”"
