KTL.1.t:0 "君王的抉择"
KTL.1.d:0 "博戈将军在军中善于指挥步兵这一中坚力量，利用堑壕和严密的计划组织军事行动。在他提交的改革方案中，我们的军队将会致力于建设现代化的指挥系统，并将堑壕理念纳入作战系统中，同时会加强对步兵的培养，塑造一支传统的现代化部队。\n\n奇诺将军青睐于对军火的改良，通过火炮的规模化列装，在战场上尽可能地减少兵力消耗，凭借火力打击敌方士气，进行长时间可持续性的战斗。对此，后勤生产也将会得到改善，他声称：只要保证军火的供应，那么所有战争就胜利了一半。"
KTL.1.a:0 "让博戈成为元帅"
KTL.1.b:0 "让奇诺成为元帅"

