###通用民族精神###
SPC_forbidden_advisors:0 "§R顾问已锁定§!"

SPC_temp_consumption:0 "经济开支"

SPC_region_idea_1:0 "瑟拉斯风暴"
SPC_region_idea_1_desc:0 "疲惫的旅行者望向远方，瑟拉斯的荒原仿佛无穷无尽，在咽下了最后一口水后，他倒在了荒凉的戈壁上，最终淹没在黄沙与狂风中。由于地理位置的特殊性，瑟拉斯各地狂风不断，而淡水资源极度匮乏，最终得名“荒原”。数百年来，无数的殖民者在这里共襄盛举，恶劣的环境催生了强大的子民，却不能帮助她们免于战火的波及，亦或者自相残杀。\n\n§1这里是帝国的边陲§!，§O殖民者的遗迹§!，§R世界大战摧残下的残酷荒原§!。\n\n帝国孑遗，革命家，殖民者的后代，盗匪与魔法师公会们在瑟拉斯共同谱写了名为混沌的交响乐，名为战争的风暴与漫漫黄沙背后的狂风一起为这片土地带来了无尽的黑暗。那些悲观之人，怯懦之人，只想在乱世中谋得求生之道，而抱有所谓理想的野心家们则希望走出荒凉的戈壁，为这片土地带来真正的未来。\n\n§C终有一日，狂风会停止，而希望会从干涸的大地上重生。§!"

SPC_region_idea_2:0 "扎兰多亚之劫"
SPC_region_idea_2_desc:0 "身着高贵的狗头人微笑着向邻居问好，饥寒交迫的流民却在下水道窃窃私语，扎兰多亚，历战之地，分裂而又统一，在外国殖民者与本土军阀的作用下动荡不断，最终点燃了共和革命的火种。然而，革命已然失败，扎兰多亚军阀满地，高傲的暴君剥削着民脂民膏，祖国统一只是一片虚名，而民众只得在先烈的墓碑前哭泣，抑或者是加入下水道的窃窃私语。\n\n§2这里是革命者的战场§!，§g军阀的土地§!，§C北巴斯蒂亚黯淡的共和之心§!。\n\n共和革命的遗产，君王的暴政，贪婪的军阀与腐败横生的各级政府，境外干涉与帝国的残余，实现扎兰多亚统一的梦想仿佛无限遥远。然而，民众之声不可被忽视，即使是在至暗时刻，也有勇士高举义旗，向恶徒发起决死的冲锋。同胞们，走上街头，筑起街垒，打倒暴君，拯救祖国！\n\n§R致暴君——你可曾听见民众之呼声？§!"

SPC_region_idea_3:0 "霜林的低语"
SPC_region_idea_3_desc:0 "雪花轻轻拂过新春的枝丫，连绵的山脉奔向世界的尽头，狼兽人的流亡者撕咬着新抓的猎物，避世的精灵躲在密林间的小屋里，一言不发。艾尔诺瑞斯，冠以“霜林”之名，终年积雪，千年之前曾短暂闪耀过，却又迅速归于宁静。然而，闭塞并非坏事——霜林和她的子民躲过了毁天灭地的伟大战争，避开了帝国的毁灭，并成功在世界大战的硝烟里孑然一身。\n\n§Y这里是精灵的故乡§!，§1保守而僵化的社会§!，§R仿佛达到临界点的火药桶§!。\n\n狼兽人流亡者，自由的精灵斗士，腐朽的旧社会与无尽的封建礼制，还有对转瞬即逝的光辉过往的可笑崇拜，艾尔诺瑞斯仿佛一个巨大的火药桶，在千年可笑而臃肿的统治下走到了极限，若是不作出改变，微微星火便可转瞬化为燃尽森林的烈焰。\n\n§9只怕那时，无尽的雪花再不能掩盖战士的鲜血。§!"

SPC_region_idea_4:0 "莱沃斯卡尔的烈火"
SPC_region_idea_4_desc:0 "勤劳的狗头人挥起锄头，恶狠狠地砸向那片世世代代不属于他的土地，疲惫的狼人革命家在乡野间的酒馆日夜沉醉，偶尔几位蜥蜴军阀经过，身后跟着赔笑的狐人资本家。莱沃斯卡尔曾是帝国的边疆，后来却成为了帝国内战的要塞，白军的故乡。世界大战后，莱沃斯卡尔被划分了大量狐人，狗头人自治区，边疆部族与帝国权贵的蜥蜴人，龙人的矛盾一触即发。\n\n§2这里是革命者的流放地§!，§C帝国的粮仓§!，§R动荡的边疆§!。\n\n白军遗民，意图独立建国的狗头人民族主义者，妄图保住稳定拯救祖国的权贵们，流亡的红色战士，还有意图在乱世中分一杯羹的狐人资本家，都意图重新实现莱沃斯卡尔的统一。无论是为了实现自己的理想，还是将目光投向了不远处的帝国心脏，恐怕，动荡在短时间内都不会结束。\n\n§Y致连绵的麦田与无垠的大地。§!"

SPC_region_idea_5:0 "森瓦西尔之寒"
SPC_region_idea_5_desc:0 "森瓦西尔，那片永冻的土地，山川与冰雪铸就了它的孤绝，也锤炼了它的战士。这里是狼兽人的故乡，一个崇尚武力的种族，强者的咆哮响彻在冰原之上。从古至今，狼兽人始终以武力捍卫自己的家园，曾与帝国展开血战，也在失败后成为帝国军团的脊梁。狼兽人的身影遍布北巴斯蒂亚的每一片战场，他们既是帝国扩张的先锋，也是革命怒火的燃料。然而，在殖民者撤出后，这片土地终于迎来了梦寐以求的独立。\n\n§C这里是寒冰的国度§!，§O强者的试炼场§!，§R独立与危机交织的前线§!。\n\n森瓦西尔的独立并未带来真正的和平，这片冰原之地充斥着内外的矛盾。帝国的权贵不甘放弃对这片地区的影响，他们暗中煽动旧势力卷土重来。而同时，激进的革命者也在鼓动狼兽人掀起变革，试图彻底推翻帝国遗留下的统治结构。此外，那些野心勃勃的狼兽人领袖则试图统一这片分裂的土地，将独立的森瓦西尔变成称霸北巴斯蒂亚的起点。内部的派系斗争和外部的虎视眈眈，让这片土地时刻徘徊在混乱的边缘。\n\n§0究竟要付出多少代价，究竟要死多少同胞，才能真正地获得自由？§!"

SPC_region_idea_6:0 "巨龙陨落之地"
SPC_region_idea_6_desc:0 "寒风凛冽的因佩里亚利斯，漫长的极夜吞噬了群山的轮廓，曾经屹立于这片苦寒土地的巨龙，如今化作了传说中的回响。千百年的荣耀与血火，让这里成了帝国的象征，也成了它的墓地。冰川与高地遍布战争的伤痕，龙族的遗骸散落在雪原中，无人纪念。尽管如此，寒冬无法掩盖这片土地曾经的辉煌，它仍旧以肃穆的姿态，注视着试图征服它的人们。\n\n§C这里是帝国的摇篮§!，§Y传说的撰写者§!，§R帝国的坟场§!。\n\n冰封的荒原上，龙族民族主义者高举昔日的旗帜，誓言重建昔日巨龙的辉煌。他们的对手，是因帝国解体而流亡至此的因佩里亚王国残兵。与此同时，分裂的蜥蜴人群落、寒风中的狼兽人游击队，还有觊觎巨龙财富的外来探险者，也在这一片冰雪世界中争夺有限的资源。巨龙陨落后的北方，成了无数野心和怨恨交织的修罗场，鲜血染红了雪原。虽然残酷的斗争将因佩里亚利斯推向混乱，但在一些隐秘的山谷与遗迹间，龙族的古老魔法依然涌动。过去的辉煌未曾完全泯灭，那些残存的力量或许能成为未来改变这片土地的契机。\n\n§2巨龙曾在这里翱翔，如今只剩狂风在群山间呼啸。§!"

SPC_region_idea_7:0 "沼光下的点点星火"
SPC_region_idea_7_desc:0 "沼光福伦，那片被史诗与灾难浸染的土地，在永不消散的绿色魔力雾霭中展现出诡秘的美。这里曾是帝国辉煌与灾难交汇之地，高魔个体的陨落为这片土地带来了史无前例的魔力辐射，也造就了如今的沼泽与密林。淤泥与荆棘间，闪烁着危险的微光，仿佛诉说着那场世纪末的审判。无数魔物——从滑腻的史莱姆到挥动着羽翅的巨大昆虫——在这片土地上肆意横行，它们的低语如同对昔日帝国辉煌的讽刺。\n\n§0这里是魔力的伤痕§!，§1大地的毒咒§!，§O帝国未竟理想的墓碑§!。\n\n沼光福伦不仅仅是魔物的聚集地，更是无数流亡者的避难所。帝国崩塌后的流民，组成了形形色色的生存团体——从蜥蜴人的狩猎队，到狐人组建的临时交易站，再到狼兽人和狗头人协力防御魔物的联合营地。这些团体苟延残喘，试图在魔力污染的危险环境中寻找新的希望。然而，这片土地从不平静。隐匿在雾霭深处的魔法师团体，被腐化魔力污染的堕落法师，常常以不可预测的魔法扰乱平衡，为这片本就恶劣的土地增添了更多的不安定因素。\n\n§C在沼光之下，点点星火或许微弱，却承载着重建与复兴的希望。§!"

SPC_region_idea_8:0 "焚毁的斯瓦塔尔夫"
SPC_region_idea_8_desc:0 "群山巍峨，林海茂密，沼泽幽深，斯瓦塔尔夫曾是矮人辉煌的故土。无数的锻炉曾在山脉深处燃烧，铸造出令世人敬畏的战斧与长矛。然而，帝国的铁蹄将这一切化为灰烬。昔日的繁荣如今只剩断垣残壁，矮人们的史诗被无情地撕碎，取而代之的是哀歌与血泪。帝国的屠戮让矮人几乎成为绝响，幸存者四散流亡，而那些留守的少数人则在废墟间苟延残喘，试图点燃复兴的火花。\n\n§O这里是锻炉的余烬§!，§2山神的泪痕§!，§Y昔日荣耀的埋骨之地§!。\n\n斯瓦塔尔夫并非单一族群的乐土。在经历帝国的战争与殖民之后，这片土地上聚集了各方势力。马族——无论是勤劳的半人马还是灵巧的小马——在这里建起了新的定居点，试图以团结来抵御外界的威胁。而矮人幸存者们则在废墟中建立了一个小型君主制政权，意图重现曾经的辉煌。与此同时，帝国崩溃后的民众组成的众多定居点与殖民者的哨所形成了新的冲突点。不同种族、文化和利益的交织让这里成为了一片动荡不安的混乱之地。\n\n§R烈火吞噬了矮人的辉煌，但山脉之下的熔岩从未熄灭——它们在等待新的锻炉主宰者，铸造属于未来的武器。§!"

SPC_region_idea_9:0 "马族与外人之地"
SPC_region_idea_9_desc:0 "塞尔瓦尼亚，辽阔的平原与茂密的树林共同谱写了这片土地的诗篇。这里是马族的故乡，天马的翅膀掠过群山之巅，陆马的蹄声回荡在丰饶的田野，独角兽的魔力在森林间闪烁辉光。然而，这片土地不仅仅属于马族，来自西大陆的殖民者已在这里扎根，他们的经济、文化与政治影响深入每一片土地的脉络。在殖民者的协助下，马族建立了一个相对稳定的共和国，试图在传统与现代之间找到平衡。但表面的平和难掩内部的矛盾，这里仍旧是冲突的温床。\n\n§G这里是希望的绿洲§!，§O矛盾的大熔炉§!，§R风暴前的宁静之地§!。\n\n塞尔瓦尼亚的稳定并不牢固。殖民者的经济支配引发了反殖民主义者的愤怒，民族主义者的呐喊时刻威胁着共和国的统一。而马族内部，天马、陆马与独角兽之间的种族矛盾也日渐加剧，彼此的怨怼和误解让这个多样化的族群变得支离破碎。同时，北方的魔物蠢蠢欲动，从部落联盟到更为危险的掠食者，它们对定居点的袭击已成为常态，进一步削弱了共和国的统治能力。而随着七河联邦局势的日益恶化，北方也难以独善其身。\n\n§2在天壁的阴影下，马族的命运如同微风中的蜡烛，既可燃烧成炽烈之火，也可被轻易熄灭。§!"

SPC_region_idea_10:0 "蛮族的故乡"
SPC_region_idea_10_desc:0 "索尔加登，那片充满野性与力量的土地，以无尽的草原、连绵的山丘和不时出没的魔物闻名于世。这里是欧克与巨人族的故乡，鲜血与战火塑造了他们的历史。虽然昔日的劫掠王国早已化为尘埃，但尚武的精神仍然流淌在每一个族群的血液中。欧克和巨人族大多过着原始而自由的生活，他们不屈于外来的秩序，只有在殖民者对他们的土地与生活方式构成威胁时，才会以最原始的方式反击。在这片蛮荒之地，力量就是唯一的语言。\n\n§2这里是战士的摇篮§!，§O蛮族的遗土§!，§Y尚武精神的丰碑§!。\n\n尽管索尔加登的原住民桀骜不驯，殖民者依旧坚定地踏足这片土地。他们中有开垦无根之地的佣兵民族，有为狮鹫建立家园的定居者，还有带着帝国余韵的狐人，他们希望在这里找到立足之地。然而，殖民与原住民的矛盾如同烈焰与干柴，随时可能点燃冲突的火花。狮鹫为了实现家园的梦想，试图驱赶被视为“蛮族”的欧克与巨人族，而那些融入殖民社会的少数原住民也夹在这场冲突的漩涡中，被迫选择自己的立场。\n\n§R尚武的精神从未湮灭，无论是殖民者的剑与火，还是蛮族的斧与拳，都在争夺索尔加登的未来归属。§!"

SPC_region_idea_11:0 "塔兰急行军"
SPC_region_idea_11_desc:0 "塔兰地区，那片横亘在蛮族与帝国之间的交界地，如今正被战火与阴谋撕裂。辽阔的平原上，曾经属于帝国的定居点与蛮族的部落隔河相望，而西大陆殖民者的残部则在撤退途中驻扎于此。他们试图借助当地蛮族雇佣兵的力量抵御来自东方的军事起义。塔兰的天空终日被浓烟遮蔽，曾经繁荣的定居点已成废墟，各方势力在这片交错的土地上争夺着每一寸生存空间。\n\n§R这里是血与火的试炼场§!，§0绝望与野心的炼狱§!，§g战争遗留的灰烬之地§!。\n\n在西方，索尔加登的蛮族战士以雇佣兵的身份重新踏上征途，他们为西大陆殖民者卖命，但也对后者的统治并不真正信服。东方则是帝国物种定居点的复兴者，他们以军事起义的方式试图恢复帝国的荣光，军队的脚步席卷了这片土地。除此之外，塔兰的每一个山谷与林地都藏匿着游击势力，这些分裂的团体与本部早已断绝联系，各自为战，只求在乱世中勉强求存。混乱是塔兰唯一的法则，和平不过是遥不可及的幻梦。\n\n§O当烈火吞噬平原，当战车碾过山谷，这片土地上的每一次急行军，都在书写塔兰的血色历史。§!"

SPC_region_idea_12:0 "破碎的帝国之心"
SPC_region_idea_12_desc:0 "德拉科纳里斯，昔日帝国的明珠，如今却成了革命与战火交织的熔炉。这里是赤色革命的摇篮，反抗的呐喊曾在这片土地的每一个角落回响。群山掩映着英雄的坟墓，平原见证了无数次冲锋，树林则隐藏着不屈的游击队。这片土地曾是帝国最富裕的地区，文化与科技的巅峰，但辉煌的背后是百姓被压迫的呻吟。伟大战争与残酷的殖民统治将人民逼入绝境，最终在熊熊燃烧的革命烈火中化为灰烬。\n\n§R这里是革命的圣地§!，§O内战的心脏§!，§0帝国分裂的核心§!。\n\n德拉科纳里斯的革命烈火仍在熊熊燃烧。红白军内战将这片土地撕裂，红军的工人阶级与农民起义者在城市与乡村中高举赤旗，试图推翻旧的秩序；而白军的精锐士兵与权贵联盟则死守残余的城镇与堡垒，梦想着重塑帝国的辉煌。夹在红白军之间的，是无数被战争逼入绝境的平民与地方势力，他们要么被迫选边站队，要么选择在废墟间苦苦求存。更有甚者，利用战乱的机会建立起自己的独立领地，为混乱再添一层阴影。\n\n§C碎裂的帝国之心仍在跳动，而每一次震颤，都是对未来的呐喊与宣战。§!"

