l_simp_chinese:
###事件###

###东巴###
###吉拉尼亚地区###
generic_territory.100.t:0 "吉拉尼亚地区的未来"
generic_territory.100.d:0 "终于，我们的部队进入了阿方斯，吉拉尼亚政府不得不选择了向我们无条件投降。随着吉拉尼亚三军的停止抵抗，同吉拉尼亚的战事已经基本停止，是时候让我们开始政治重建了。"
generic_territory.100.a:0 "是时候决定吉拉尼亚的未来了。"
generic_territory.100.b:0 "等会！最好不要太早下决定..."

generic_territory.101.t:0 "吉拉尼亚的未来"
generic_territory.101.d:0 "吉拉尼亚临时政府已经在阿方斯建立，救济和反抵抗行动也在吉拉尼亚各地区有序展开。现在，是时候让我们做出决定了，在今后吉拉尼亚应以何种姿态同我们合作？"
generic_territory.101.a:0 "我们必须释放他们。"

###沃姆地区###
generic_territory.200.t:0 "沃姆地区的未来"
generic_territory.200.d:0 "随着我们的部队实现了取得了接连不断的胜利，并最终控制了前沃姆势力圈的所有势力范围，是时候重新对这个地区规划未来了。有激进的提案指出，我们可以实现当地的完全统一；或者，我们也可以维持曾经的状态，分裂大沃姆地区，这有利于我们对它们形成压制。是时候做出选择了。"
generic_territory.200.a:0 "我们将成立统一的沃姆地区政权！"
generic_territory.200.b:0 "最好分开讨论各地问题。"
generic_territory.200.c:0 "等会！最好不要太早下决定..."

generic_territory.201.t:0 "大沃姆的未来"
generic_territory.201.d:0 "比起处理各个合作国间复杂的关系，将整个沃姆统一于一面旗帜下更符合我们的需求。现在，各地的临时政府已经完成了相互融合，大沃姆的新生指日可待。我们应该制造一个怎样的大沃姆？"
generic_territory.201.a:0 "我们必须释放他们。"

generic_territory.220.t:0 "戈尔维亚的未来"
generic_territory.220.d:0 "随着戈尔维亚临时政府被确认为统一且唯一的戈尔维亚政府，是时候给这个政府一个定义了。为了我国的利益，哪种戈尔维亚是最为合适的呢？"
generic_territory.220.a:0 "我们必须释放他们。"

generic_territory.240.t:0 "沃姆的未来"
generic_territory.240.d:0 "沃姆势力圈已经粉身碎骨了，所谓的“沃姆帝国”马上就会消失于历史的尘埃中。现在，沃姆皇室和国家全境已经处于我们的控制之下，是时候决定沃姆的未来了。"
generic_territory.240.a:0 "我们必须释放他们。"

generic_territory.260.t:0 "斯布里奇地区的未来"
generic_territory.260.d:0 "戈尔维亚王国是原沃姆势力圈的一部分，曾经伟大的斯布里奇王国在沃姆人的铁蹄下也难逃被分裂的命运。如今，我们已经实现了对该地区的完全控制，简单的傀儡政府也已投入运转，是时候决定这个地区的命运了。"
generic_territory.260.a:0 "我们必须释放他们。"

###联合王国地区###
generic_territory.300.t:0 "联合王国地区的未来"
generic_territory.300.d:0 "随着我国的势力范围成功地掌握了前联合王国地区的领土，有议案提出我们可以重建曾经陨落的大联合王国——当然，在我们掌权的情况下。又或者，出于压制当地政府的考量，我们应当维持联合王国地区的分裂，就像过去一样？无论如何，现在，联合王国地区各地政府已经全面投降，我们应该如何处理这片纷争不断的地区？"
generic_territory.300.a:0 "拆分联合王国地区，不要让他们太过强势。"
generic_territory.300.b:0 "成立统一的联合王国！"
generic_territory.300.c:0 "等会！最好不要太早下决定..."

generic_territory.301.t:0 "新联合王国的未来"
generic_territory.301.d:0 "新联合王国是一个庞大的经济和政治实体，而现在，我们必须要驯服这个或许比我们还强大的怪物。我们应当选择什么方式来控制新联合王国？"
generic_territory.301.a:0 "我们必须释放他们。"

generic_territory.320.t:0 "奥罗日亚的未来"
generic_territory.320.d:0 "奥罗日亚撑过了数次革命与分裂，但终究不能抵挡住我们强大的军队。现在，奥罗日亚已经向我国臣服，我们又该如何处理这个同样强大的附庸？"
generic_territory.320.a:0 "我们必须释放他们。"

generic_territory.340.t:0 "皮奥瑞亚的未来"
generic_territory.340.d:0 "随着卡梅尔落入我手，皮奥瑞亚识趣地向我国无条件投降。作为工农业基地，皮奥瑞亚地区将成为我国重要的合作国。那么，谁来统治才最为合适呢？"
generic_territory.340.a:0 "我们必须释放他们。""

generic_territory.360.t:0 "西莉迪亚的未来"
generic_territory.360.d:0 "斯托萨利战役已经结束，西莉迪亚选择了向我们无条件投降。在不断的内战与外战中，西莉迪亚已经满目疮痍。而现在，我们必须要选择一个合适的方式去接管这片烂摊子。"
generic_territory.360.a:0 "我们必须释放他们。"

###远乡地区###
generic_territory.400.t:0 "远乡地区的未来"
generic_territory.400.d:0 "终于，随着白旗在平京升起，我们与远乡的战争结束了。战后的远乡地区仍然处于各种意义上的混乱中，这或许是我们将其重新整合一体的机会。我们应当如何决定远乡地区的未来？"
generic_territory.400.a:0 "拆分远乡地区，不要让他们太过强势。"
generic_territory.400.b:0 "成立统一的远乡！"
generic_territory.400.c:0 "等会！最好不要太早下决定..."

generic_territory.401.t:0 "新远乡的未来"
generic_territory.401.d:0 "远乡的分裂并不是永久的，这完全是能在我们与远乡人的努力下修复的隔阂。现在，新远乡临时政府已经在平京建立，但新远乡的代理人仍未决定。我们需要一个如何的代理人，为我们处理在新远乡的利益？"
generic_territory.401.a:0 "成立新生的合作政府。"
generic_territory.401.b:0 "成立新生的自治政府。"
generic_territory.401.c:0 "成立统一的傀儡国。"
generic_territory.401.dd:0 "搞个大军区得了。"

generic_territory.420.t:0 "西北远乡的未来"
generic_territory.420.d:0 "西北远乡，远乡王国的缓冲区与军区，仍未结束对失败革命的重建恢复。面对这样一块充满了自由与反抗的历史的地区，我们应该选择什么样的政府来代表我们的利益？"
generic_territory.420.a:0 "设立地方自治政府。"
generic_territory.420.b:0 "扶持合作政府。"
generic_territory.420.c:0 "派军队接管西北远乡。"

generic_territory.440.t:0 "南远乡的未来"
generic_territory.440.d:0 "作为远乡王国的核心，南远乡是远乡王国中最富足、最稳定的区域，也是我们能从中获利最多的区域。而现在，南远乡已经臣服于我们，郑氏王室被软禁。究竟是哪一种政府才能最好地代表我们的利益？"
generic_territory.440.a:0 "设立地方自治政府。"
generic_territory.440.b:0 "改组新合作政府。"
generic_territory.440.c:0 "派军队接管南远乡。"

generic_territory.460.t:0 "北远乡的未来"
generic_territory.460.d:0 "穷山恶水与土匪横行，这是所有人对于北远乡的印象。我们不得不承认，对于北远乡的统治更多地是为了维稳和避免又一次叛乱，而不是攥取根本不存在的利益。我们应该如何决定北远乡的未来？"
generic_territory.460.a:0 "设立地方自治政府。"
generic_territory.460.b:0 "改组新合作政府。"
generic_territory.460.c:0 "派军队接管北远乡。"

###决议###
SPC_generic_rebuild_decision_category:0 "重建国家"
SPC_generic_rebuild_decision_category_desc:0 "无论是主动或是被动，领土的扩张在当下这个风云变幻的时代几乎是不可避免的。然而，对外国人的统治有时候并不意味着轻松惬意——在绝大多数情况下，我们最好都不要选择维持军事占领。为此，我们可以释放一批忠诚的自治政府或是傀儡，从而维持我们在当地的主导地位。\n\n§Y对傀儡政府的释放的自由度是很高的，然而，这也必须遵守一定规则。§!§R首先，在绝大多数情况下，您都需要占领至少某个地区全境才能释放对应政权，将某一政权随意分割是不可能的。§!§g您可以选择优先释放较小的政权，或者是基于整个地区释放领土。领土的检测包括了傀儡国的领土，因此，即便您已经释放了较小的政权，也可以再释放一个地区强权来吞并先前释放的傀儡小国。然而，请注意，这项操作是不可逆的，无法先释放大国再重新肢解。请务必三思而后行。此外，我们可以立刻决定重建国家的方针，可花费却会以决议的方式持续更长时间。§!"

SPC_generic_debug_decision_category:0 "debug决议"
SPC_generic_debug_decision_category_desc:0 "我嘞个耶稣基督啊。"

