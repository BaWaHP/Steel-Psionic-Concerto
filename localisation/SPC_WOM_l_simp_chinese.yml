###民族精神###
WOM_triumph_of_empire:0 "凯旋之帝国"
WOM_triumph_of_empire_desc:0 "随着沃姆帝国统一境内诸王国，并在最后取得了东巴斯蒂亚的胜利，击败了最后可能与之匹敌的地区强权，沃姆帝国已经成为了当之无愧的地区霸主国家，并在国际上有着相当的影响力。毫无疑问的，沃姆帝国成为了从战争凯旋归来的传奇。然而，随着时间的流逝，高涨的民族主义情绪慢慢地化作泡影，对军国主义的批判与对平等主义的向往逐渐充斥了这个国家，在接下来的时代里，如何维持这份辉煌，又或是开辟全新的道路，将会是这个新生霸权国家的关键议题。"
WOM_slavery_for_unhuman_races:0 "非人物种奴隶制"
WOM_slavery_for_unhuman_races_desc:0 "自建国以来，沃姆帝国就继承了当地其它诸王国的传统，也就是对非人物种的奴役制。在生产力相对落后的古代，对非人物种的奴役成功地加快了早期财富的积累过程。然而，随着沃姆帝国作为现代化工业强权崛起，奴役制却在不知不觉中成为了拖累沃姆帝国经济发展的累赘，同时还成为了持续不断的非人物种叛乱来源，冲击着沃姆皇室的统治。\n§R如果无法成功处理奴隶制的问题，总有一天，国家会为之分裂。§!"
WOM_wome_national_army:0 "沃姆国防军"
WOM_wome_national_army_desc:0 "沃姆国防军是帝国辉煌的关键缔造者，以严格的军事纪律但又不拘泥于传统的大胆作战风格闻名天下，东巴大战时期，国防军曾一度是东巴诸国军事力量最恐怖的噩梦。随着国防军为帝国带来了战争的胜利，其本身也逐渐成为了沃姆政坛上不可小觑的一支强大政治力量。\n§Y如果军队认为皇帝无法维持政府的稳定，他们或许会采取行动。§!"
WOM_end_of_econ_miracle:0 "经济腾飞的尾声"
WOM_end_of_econ_miracle_desc:0 "随着东巴斯蒂亚大战的结束，大量的战争赔款和低廉的人力与原材料涌入了沃姆帝国的市场，与之相伴的还有高涨的民族主义情绪和名为“胜利”的甜蜜果实，沃姆帝国的经济曾飞速增长，并快速赶上了其它大陆列强的水平。可惜的是，隐藏在美好泡沫背后的悲惨正逐步显现…尽管尚且无人在乎。"

