###新闻###
WOMNews.1.t:0 "沃姆新皇加冕"
WOMNews.1.d:0 "近日，在沃姆帝国首都沃姆尼亚，沃姆四世，一位尚且年轻，并且性格和先王大不相同的皇帝，正式举行了加冕典礼，继承大统。同时，帝国中央宣布由于继位进行的临时军事管制解除，帝国恢复由国家自由党领导的宪政政府。\n\n据帝国官方通讯社报道，陛下在典礼结束后发表了公开演说。演说中，新皇阐述了其对履行帝国皇帝职责的承诺，并表达了对沃姆国防军未来的关注。出乎意料的是，皇帝短暂提及了困扰帝国已久的奴隶制问题。演说结束后，在场的官员及各国使节向新皇表达了祝贺。此次加冕标志着沃姆帝国新一任君主统治的正式开始。\n\n来自沃姆尼亚的报道表明，沃姆四世的进步主义倾向已经在帝国境内引发了关于新一轮改革的担忧，其在加冕仪式上短暂提及的奴隶制问题也引发了关于帝国接下来是否会将重心转移到奴隶制改革上的猜测。无论如何，这位被誉为“平民皇帝”的新人将带领沃姆帝国走向何方，仍然是个未知数。"
WOMNews.1.a:0 "沃姆的未来将走向何方？"

WOMNews.2.t:0 "金融风暴席卷沃姆！"
WOMNews.2.d:0 "近日，沃姆帝国境内爆发了严重的金融动荡。据报道，沃姆尼亚及各大城市首先出现银行挤兑风潮，帝国货币币值一落千丈。起初，这被认为是针对部分经营不善的殖民企业财务困境的恐慌性反应，但随着中巴斯蒂亚局势陷入混乱，沃姆国内改革收效甚微，局势迅速恶化。\n\n这场被观察家称为“黑霜危机”的动荡迅速从金融领域蔓延至整个经济。帝国货币几乎沦为废纸，恶性通货膨胀迫使民众回归以物易物的原始交易方式。工厂倒闭，失业率飙升，社会秩序面临严峻考验。有未经证实的消息称，帝国政府内部对于如何应对危机分歧严重。此外，由于社会秩序动荡，关于帝国境内奴隶制问题可能引发的动乱也进一步引起了担忧。\n\n沃姆帝国政府正竭力控制局势，但目前情况仍在持续恶化。国际社会普遍担忧，这场危机可能进一步加剧该地区的紧张局势，并破坏东巴斯蒂亚地区现有的平衡局面。沃姆帝国的未来，乃至其整个势力范围的稳定，都蒙上了一层厚厚的阴影。"
WOMNews.2.a:0 "这就是报应吗？"

WOMNews.3.t:0 "沃姆帝国奴隶暴动"
WOMNews.3.d:0 "继“黑霜危机”重创沃姆帝国经济与社会秩序之后，该国境内又爆发了大规模的非人物种奴隶起义。据多方消息证实，在帝国多个地区，尤其是那些严重依赖奴隶劳动的种植园、矿区和工业中心，被奴役的非人种族揭竿而起。\n\n报道称，这些起义并非孤立事件，而是呈现出一定的协调性和广泛性。奴隶们袭击了监工、破坏了生产设施和基础设施，部分地区甚至传出奴隶武装占领地方政府的消息。由于帝国军队在之前的经济危机和潜在的政治动荡中已显疲态，目前在镇压此起彼伏的奴隶暴动方面似乎力不从心。据传，沃姆国防军已经彻底失去了对比尔恩多夫-阿尔泽沃尔德一带的掌握。\n\n沃姆帝国的奴隶制已经困扰了这个国家多年。早在来自南方的移民定居于此，对非人类种族的奴役就不是什么稀奇事，伟大战争的爆发进一步加深了当地人对非人种族的歧视，奴隶制也不断加深，最后成为了沃姆帝国的一大“特色”，可以说近几十年，沃姆皇帝得以统一多个诸侯国，甚至是取得东巴斯蒂亚大战的胜利，背后绝对少不了由奴隶铸成的尸山血海。\n\n这场大规模的奴隶起义无疑是对本已摇摇欲坠的沃姆帝国的又一致命打击。帝国内部的人类至上秩序正面临前所未有的挑战，而其对周边地区的影响力也因此受到进一步削弱。国际观察家担忧，沃姆帝国可能正滑向全面内乱的深渊。"
WOMNews.3.a:0 "水能载舟，亦能…"

WOMNews.4.t:0 "沃姆首相遭刺杀！"
WOMNews.4.d:0 "沃姆帝国政局再起波澜！据帝国官方通讯社紧急报道，沃姆帝国现任首相，沃姆国家自由党党魁，于今日在首都家中遭遇不明身份人员袭击，不幸身亡。\n\n事件细节目前尚不清晰，帝国安全部门已封锁现场并展开全面调查。官方尚未公布任何关于行凶者身份或动机的信息。然而，在首都的紧张气氛中，各种猜测已甚嚣尘上。有传言将矛头指向国内日益活跃的激进左翼分子，自黑霜危机以来，他们的势力在沃姆各地正快速扩张，甚至有消息猜测他们计划发动政变。另一些猜测则认为，此次刺杀可能与愈演愈烈的非人物种奴隶暴动有关，意在进一步制造混乱，亦或者是单纯的报复行动。\n\n此次刺杀事件无疑将使本已因黑霜危机和奴隶起义而动荡不安的沃姆帝国雪上加霜。政府权力核心出现真空，各政治派系间的角力预计将迅速白热化。沃姆帝国的政治未来充满了前所未有的不确定性。"
WOMNews.4.a:0 "情况持续发酵..."

WOMNews.5.t:0 "沃姆政府垮台"
WOMNews.5.d:0 "在首相遇刺身亡的巨大冲击下，由自由党领导的沃姆政府已不堪重负，于今日宣布解散。面对国内经济崩溃、奴隶暴动和政治暗杀接踵而至的空前危机，该政府已无力维持有效统治。\n\n为应对迫在眉睫的权力真空，帝国宣布将尽快举行临时选举。由于经济危机带来的社会动荡，过去在选举中表现平平的社会民主党及其盟友进步人民党影响力大增，他们呼吁通过扩大政府开支来缓解民生疾苦，并主张以更温和的方式处理奴隶问题。而因党内分裂而被迫与保守党结盟的国家自由党，则继续强调财政紧缩，并试图以稳健手段平息社会矛盾。与此同时，老牌政党中央党则凭借其一贯的立场，提倡开源节流，加强社会管控，并以强硬姿态解决持续的暴动。\n\n然而，首都的紧张气氛并未因选举的宣布而缓解。有传闻称，沃姆国防军内部对文官政府彻底失去信心，部分高级将领可能正考虑采取“非常措施”以稳定局势，甚至不排除在皇帝的默许或支持下直接介入政治。沃姆帝国的命运，正悬于一线。"
WOMNews.5.a:0 "帝国正走向未知。"

WOMNews.6.t:0 "沃姆内战"
WOMNews.6.d:0 "沃姆帝国的政治危机最终演变为全面内战。在备受争议的临时选举结束后，尽管帝国名义上维持了宪政体制，组建了新一届政府，并且在数月内尝试改革，挽回局面，但国内的极端势力并未接受这一结果。\n\n极左翼的“共和人民阵线”指责新政府在社会改革方面软弱无力，无法解决民众疾苦，率先在多个工业城市发动武装起义，试图建立一个更为激进的共和国，彻底废除沃姆君主制。几乎在同时，由军方强硬派和保守政治人物组成的“帝国复兴委员会”也以“帝国中央软弱，无法平息叛乱和恢复秩序”为由，在部分地区发动叛乱，公开对抗宪政政府。\n\n目前，沃姆帝国中央政府正面临来自左右两翼势力的武装挑战，国家陷入分裂。与此同时，早前在帝国西北地区爆发的非人物种奴隶起义已成功占据一片区域，并宣布独立。这些奴隶武装暂时未与其他人类派系发生大规模直接冲突，但其存在无疑使本已复杂的局势更加严峻。沃姆帝国的未来，已彻底被战火吞噬。"
WOMNews.6.a:0 "东巴斯蒂亚的局势日渐恶化..."

WOMNews.7.t:0 "沃姆内战"
WOMNews.7.d:0 "沃姆帝国的政治危机在国防军宣布实行军事管制后急转直下，全面内战已不可避免。在军方认为局势失控后，沃姆国防军最高司令部宣布接管国家权力，暂停宪法，并在全国范围内实施军管——而有传言说，这背后得到了沃姆四世本人的支持。\n\n军方的强硬举动激起了广泛的反抗。原本在政治光谱上较为激进的“共和人民阵线”影响力骤增，并成功争取到了大量对军事独裁不满的中间派力量的支持，形成了一个广泛的联合阵线，公开向军政府宣战。各地忠于共和理念的武装力量与军管部队爆发激烈冲突。\n\n与此同时，早前在帝国西北地区爆发的非人物种奴隶起义已成功占据一片区域，并宣布独立。这些奴隶武装暂时未与其他人类派系发生大规模直接冲突，但其存在无疑为这场内战增添了更多不确定因素。沃姆帝国，这个曾经的地区霸主，如今已在军政府与联合反抗力量的战火中分崩离析。"
WOMNews.7.a:0 "东巴斯蒂亚的局势日渐恶化..."

###领导人###
WOM_wome_IV:0 "沃姆四世"
WOM_wome_IV_desc:0 "沃姆四世，全名弗里德里希·沃姆·凯泽·霍斯特·冯·费特海姆，是这个尚且年轻的帝国的第四任皇帝。作为前代皇帝的次子，出生于费特海姆市的霍斯特在幼时并没有接受过严苛的宫廷教育，而是作为普通的贵族和沃姆公民成长，直到十九岁那年，他的兄长因心脏病意外去世，他才被沃姆三世召回宫廷，作为正式的继承人培养。\n\n或许是因为霍斯特在形成三观的青少年时期仍在宫廷外接受教育，当成为沃姆帝国的唯一继承人后，他将许多“奇怪”的文化带入了宫廷。普通沃姆群众的说话方式，饮食文化和节日庆典在一时间成为了宫廷的“新鲜事物”，在文化层面抱有开明态度的沃姆三世也没有持任何反对意见，最后，霍斯特就成为了著名的“平民王子”，在继位后，也自然而然地成为了“平民皇帝”。\n\n不过，虽说沃姆帝国作为东巴斯蒂亚的绝对霸主，内部政治也并非一帆风顺。尽管沃姆三世到霍斯特的权力交代并没有出什么茬子，许多贵族都反感霍斯特对一般市民的亲和态度，指责他作为沃姆帝国之主缺乏对民众的威信，而且十分担忧新皇帝时常表现出来的对平等主义的向往，尤其是对奴隶制改革表现出的极大兴趣；可另外一方面，在政府内举足轻重的沃姆国防军则极大地赞许了皇帝，认为霍斯特对国防军的信任与支持是难能可贵的。\n\n但谁又能说沃姆四世是个没有野心的人呢？作为一名健谈而和别人没什么距离感的皇帝，霍斯特常常同身边的人讲述自己的政治理想。他认为沃姆帝国崛起的历史正是处于低国际地位的国家向高高在上的旧体制国家挑战的过程，作为同样伟大，英勇的一族，沃姆人应当争取属于自己阳光下的自由——§R无论那“沃姆人”的定义如何，是人，还是…§!"

