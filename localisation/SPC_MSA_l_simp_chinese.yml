###民族精神###
MSA_william_personal_life:0 "威廉姆的私生活"
MSA_william_personal_life_desc:0 "威廉姆的私生活一直是八卦小报上的头牌。虽然原因已无法追溯，威廉姆似乎很喜欢出入于各地的风月场所，并喜好借助自己的权限同各地名流女郎打好关系。围绕在他身上的性丑闻数不胜数，借此引发的贪腐事件也愈发不可收拾。每年，特别行政区的预算都有相当一部分因为威廉姆的贪腐行为白白流失，这不但使得麟人对他的统治愈发地不满，就连人鱼一方的政府也开始准备行政长官的新人选了。"
MSA_business_autonomy_territory:0 "商业自治领"
MSA_business_autonomy_territory_desc:0 "特别行政区最初设立的目的在于建立起人鱼族和远乡王国贸易的陆上通道，这一光荣传统一直保留到了现在。特别行政区内的商业活动享受了大量双方政府提供的补贴，在过去的多年以来呈现欣欣向荣的态势。白洋海人鱼政府和远乡王国签署的《白洋公约》允许我们在重大事项听从两方政府指示的基础上实行自治，所以我们依然享有一定的政治自由。不过，我们在名义上依然是远乡王国的一部分，同时也要对人鱼方的政府负责。为此，每年都有相当一部分的利润和工业产值要被送往两边的国家，尤其是人鱼一方。"
MSA_united_volunteer_army:0 "联合志愿军"
MSA_united_volunteer_army_desc:0 "《白洋公约》规定，人鱼特别行政区虽然享有政治上的部分自由，军事上却高度受限。特别行政区的军事力量主要来源于人鱼和当地麟人组成的志愿部队，同时还接受白洋海人鱼政府和北远乡王国政府的直接驻扎。联合志愿军组织相对松散，同时公约也严格规定了特别行政区所能保留的最大常备军，进一步的扩张被严格禁止。"
MSA_suppressed_racial_conflicts:0 "压抑的种族冲突"
MSA_suppressed_racial_conflicts_desc:0 "随着利于人鱼定居陆地的魔法逐步发展，加上来自陆地生活的吸引力，特别行政区的商业繁荣等一系因素影响，特别行政区境内的人鱼聚落正以非常可观的速度不断扩大着。对于一个以人鱼为主导的殖民地政府而言，这总的来说是能增加行政区政府合法性的好事。然而，不可避免的，麟人和人鱼所爆发的种族冲突也愈演愈烈。在经济形势一片向好的当下，我们暂时还不用太担心这些这问题，可将来会怎样，就不好说了。"

###领导人###
MSA_william_seastrand:0 "威廉姆·西斯特兰德"
MSA_william_seastrand_desc:0 "一名无依无靠的孤儿究竟怎样才能成就一番事业？威廉姆·西斯特兰德的人生或许能成为那些绝境之人的“范例”。从小便被穷苦的母亲抛弃的威廉姆在人鱼族领地偏远地带的一家小修道院长大，他很少提及自己儿时的经历，只是偶尔会在愤怒的时候提及曾经照顾他的一名神父。可无论曾经在修道院的私生活如何，他的人生在跟随旅行剧团来到大的海底聚落后才真正发生改变。坚信“努力便能成就一番事业”的威廉姆不愿意重蹈自己母亲的覆辙，虽然出生卑微，他侥幸借助时任白洋海人鱼政府的教育补贴进入到了一所提供高等教育的院校，并以半工半读的形式完成了学业，最后加入了政府，成为了著名的行政长官。\n\n当人鱼自治领地的想法最开始被提出时，威廉姆很快便参与到了其中。虽然因为私生活混乱的流言，白洋海人鱼政府最开始并没有将威廉姆作为正式的候选人考虑。威廉姆最终的胜利几乎可以说是一场奇迹：他所负责的行政辖区恰好有这么一家特别经过威廉姆资助的魔法回路研发企业，虽然威廉姆的资助行为引发了一系列政府的性丑闻，但这家企业奇迹般地实现了一场人鱼族百年都未能取得的突破：将鱼尾转变为双腿的魔法。该魔法一经推出便震撼了人鱼族社会，同时也导致自治领地的计划大改，归人鱼族所管辖的自治区领土和权限翻了数倍…不过这些都是后话了。\n\n依靠魔法进步而名声大噪的威廉姆瞬间成为了人鱼族社会的英雄，不但关于他的大量性丑闻以及贪腐行为一笔勾销，同时，他还顺利地坐上了特别行政区领导人的宝座。虽说不被许多人所看好，作为职业的行政官员，威廉姆过去多年于特别行政区的管理成功地让许多质疑他能力的人闭上了嘴。在他的统治下，这片自治领地不断地扩大远乡和人鱼族的经济合作，大量无法在水下建设的工厂如雨后春笋般拔地而起，人鱼出技术，麟人出资的合作体系成为了脍炙人口的话题。虽然有人指责威廉姆政府两面三刀地允许物种歧视的存在极大地伤害了麟人合作者的感情，也有人赞扬他客观上推进了自治地区的现代化发展，允许许多麟人接受到高等教育，鼓励了自由市场的发展。\n\n然而，关于威廉姆的丑闻似乎随着他年龄的增长而越发不可收拾。步入中年的威廉姆似乎不再打算掩盖他的那些小算盘，整日出入特别行政区各地的风月场所，将大量本该用于建设领地的预算用于举办华而不实的派对，或者邀请社会上的名流女郎在他的私人住宅里共度良宵。威廉姆的举动是否出于对童年悲惨经历的报复已无人知晓，大家只明白一件事，如果他再不能控制好自己的举动，特别行政区的长官就只能换人了…"

