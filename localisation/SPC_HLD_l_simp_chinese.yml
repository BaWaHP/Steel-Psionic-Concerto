###民族精神###
HLD_autonomous_archdiocese:0 "自治大教区"
HLD_autonomous_archdiocese_desc:0 "虽然和斯布里奇王国保持了十分近的距离，同时客观上需要向沃姆帝国缴纳税务，海兰德教区严格意义上并不隶属于任何一个政权。自治的大教区由当地的多个教会和他们的封地联合而成，平日里会举办会议以维持合作，并讨论选举出大主教以管理教区。\n\n多数情况下，各地教堂会希望大主教不要过多地改变国家政策，可一旦教区进入紧急情况，这事就由不得他们了…"
HLD_closed_church_college:0 "闭塞的教会学院"
HLD_closed_church_college_desc:0 "由教区资助的教会学校于我们领土内占据了绝对的主导地位，这使得各地的识字率得到了大大的提升。然而，坏消息是，由于教会方面更加注重宗教需求而非通识教育，这些学院在很大程度上反而成为了各地教育普及，科研进步的极大阻碍，并进一步巩固了保守势力的存在。不过，由于教会并不排斥魔法研究，这些教会学院出乎意料地促进了各地魔法科研的发展。"
HLD_less_human:0 "“人”迹罕至"
HLD_less_human_desc:0 "海兰德教区位处可以称得上是文明世界的边缘，我们境内的人类存在几乎可以用“稀少”一词来形容。然而，“人”迹罕至不代表其它物种的痕迹也一样罕见，大量以亚人，兽人为主的群体定居在教区境内，他们中许多都抛弃了野蛮的习俗并选择同我们一起，信仰正确的道路。当然，也不排除有为了防止被作为奴隶卖往南方才选择加入我们的投机者存在，毕竟在奴隶制问题上，教区经常和沃姆官方爆发冲突。"
HLD_tale_of_dream_lake:0 "梦之湖的传说"
HLD_tale_of_dream_lake_desc:0 "传说，在罗梦骑士团领地西北方边角，有一传说的湖泊。湖中定居着一位友好对待人类的高魔个体，传说它会实现任何通过考验，成功抵达湖前的冒险者的愿望。虽然许多人因为冒险者联盟的探索失败而简单的认为梦之湖是假的，我们确实有和梦之湖接触的记录…"

###领导人###
HLD_padraig_cameron:0 "帕德雷格·卡梅伦"
HLD_padraig_cameron_desc:0 "帕德雷德·卡梅伦的童年时光并不美好。出生于一个农民家庭的他最开始和教会毫无瓜葛，只是老老实实在家中过着远离尘世的普通生活。直到有一天，肆虐海兰德各地的盗贼敲响了他家中的大门，而他父母，以及另外两名兄弟姐妹血淋淋被挂在门上的头颅则化作了他一生也无法磨灭的阴影。\n\n跟随救了他一命的教会骑士，帕德雷德成为了教会收养的千千万万孤儿中的一名。或许是因为无法忘记救他一命的骑士的背影，又或者是因为单纯地希望某得高位，向山贼复仇，满怀热情的帕德雷格成为了教会忠实的仆人。在以极其优秀的成绩从学校毕业后，他很快便正式成为了一名神父，并以他善良但又不软弱的个性声名大噪，最后成为了海兰德的领导者。\n\n在他的统治下，海兰德似乎呈现了一副欣欣向荣的景象。恶劣环境和流窜土匪造成的影响被压制到了极低的水平，人类和非人种族出乎意料地团结在了同一面旗帜下，由教会建立的武装部队吓走了沃姆人，同时各地现代化进程也有条不紊地在进行——甚至，有流言说帕德雷格要改革教会学院，让海兰德与南方文明接轨。\n\n不过，帕德雷格不是政治家，别人对他的猜测在他看来也不过是耳边风。现在教会面临的问题很可能比一般人所看到的更加严峻，隐藏在光明背后的黑恶势力正蠢蠢欲动，帕德雷格正处在命运的十字路口，走错一步或许都会导致他万劫不复。"

