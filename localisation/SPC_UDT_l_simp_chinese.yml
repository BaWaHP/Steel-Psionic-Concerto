###领导人###
UDT_devinsker_orton:0 "德文斯克·奥顿"
UDT_devinsker_orton_desc:0 "德文斯克·奥顿是一个典型的有政治意识却又自觉遵守政治中立的南巴军人。当然，这里的政治中立明显是指不干涉南巴事务而非提特兰内政。现在，他的祖国已经陷入内战，尽管他数次向国内政府请求率领南巴斯蒂亚驻提特兰军团回国参战，但政府拒绝了他的请求并要求他留在提特兰保证其永远处于南巴斯蒂亚共和国的掌控下。\n\n这对他本是一件难事——几万南巴军人没有祖国后连吃穿弹药都难以保证，要怎样维持在提特兰的统治呢？他们在此地毫无统治根基可言——除非他能找到一伙贱到愿意效忠已经陷入内战的南巴斯蒂亚共和国的提特兰合作者。也许是天无绝人之路，1998年大选结束后，极度亲南巴的人民自由党的巴斯塔·伊万·安科林找上了他。巴斯塔是个卖国求荣的畜生，想要为了夺取总统之位动用暴力推翻盘踞首都的民族主义者，但苦于缺乏军队支持。于是两人一拍即合，德文斯克·奥顿承诺会进军首都诺兰迪亚扶他上位。而巴斯塔将保证这个国家永远忠于南巴斯蒂亚及其价值观，作为回报，南巴驻军这些“保卫提特兰民主的战士“将有权获得共和国的一切。当然，德文斯克有的是办法防止巴斯塔毁约，而巴斯塔那股超乎理性思维与利益衡量的亲南巴情绪也让他确信巴斯塔无心毁约。\n\n本来德文斯克对拿下提特兰首都信心十足，大部分提特兰共和军也不敢阻拦他。但提特兰平民抵抗之激烈超乎他的想象。再加上缺乏燃油与弹药补给，他的部队只能从提特兰边境徒步到首都诺兰迪亚。在目睹了一条条被挖断的道路，一座座被搬空的工厂，一个个拼死袭击他们的平民、一次次满怀乡愁的哀叹后，德文斯克不得不考虑胜利之外的可能性了。"

###民族精神###
UDT_rsb_elite_army:0 "南巴精锐"
UDT_rsb_elite_army_desc:0 "南巴斯蒂亚驻提特兰军团乃是南巴斯蒂亚共和国军队中的精锐，平时驻扎于提特兰共和国并负责警戒与防卫工作，使这个国家免受其他国家尤其是牛头人的侵扰。然而，为了南巴在提特兰的利益与自己的平安，他们决定从守护者转变为侵略者，夺取提特兰共和国政权。"
UDT_homeless_dog:0 "无根之木，丧家之犬"
UDT_homeless_dog_desc:0 "南巴斯蒂亚驻提特兰军团乃是南巴斯蒂亚共和国军队中的精锐，其战斗力之强大毋庸置疑。无论是训练素养、战术战略、武器装备、组织架构，均是世界一流。在平时，这支部队的战斗力足以对抗整个提特兰共和国军队。但问题在于，再优秀的军队也是人类，§t需要后勤保持战斗力§!。但现在，这些可怜的南巴军人的祖国正陷入内战之中，而他们则受困于贫瘠的提特兰一角，§t根本没有后勤可言§!。他们现在完全没有稳定的补充武器弹药的办法，连口粮也只能通过掠夺当地群众补充。这支军队是典型的孤军，完全没有任何统治根基可言，与他们合作的提特兰叛徒也是一群人人喊打的废物，根本没法在他们占领的地区中建立有效的统治并补充人力与物资，因此，这支军队的弹药可以说是打一发少一发，人力是死伤一个少一个。再加上祖国陷入内战，他们的思乡之情愈发浓重，整个部队士气愈发低迷，这一切使得他们的战斗力大打折扣。"

