###国策###
TCW_another_year_of_work:0 "又一繁忙年初"
TCW_another_year_of_work_desc:0 "新年刚过，总统先生就收到了不少求助信，来自各个部门，不过仔细审查，发现都指向了同一个问题源头。"
TCW_enable_hr:0 "启用人力资源部门"
TCW_enable_hr_desc:0 "总统先生认为这是弥补60年代内战后造成的损失的机会，因为难民中不乏有先进分子、优秀工匠等社会建设的人才，因此总统先生宣布将启动人力资源部门安置难民。"
TCW_attracting_research_talents:0 "吸纳科研人才"
TCW_attracting_research_talents_desc:0 "我们必须吸纳难民中的科研人才，为我们所用。"
TCW_attracting_research_talents_tt:0 "§Y难民潮§!追加效果：\n研究速度：§G+5%§!"
TCW_supplemental_workforce:0 "补充工业劳动力"
TCW_supplemental_workforce_desc:0 "难民中大多数都有一定的劳动能力，所以不妨为他们设置临时岗位，补充社会劳动力。"
TCW_supplemental_workforce_tt:0 "§Y难民潮§!追加效果：\n工厂产出：§G+5%§!"
TCW_rinsen_military_expansion:0 "岭森军工扩展"
TCW_rinsen_military_expansion_desc:0 "大量的人力资源使我们得以扩建工业规模，位于边境的岭森就是一个很好的选择。"
TCW_foreign_employment_secure_act:0 "《外籍就业保障法》"
TCW_foreign_employment_secure_act_desc:0 "移民能够获得更接近于本国公民的就业权利保障，企业能够利用这些劳动力提质增效，政府中的左翼将会支持我们，但公民或许不会高兴。"
TCW_assist_in_resource_extraction:0 "协助资源开采"
TCW_assist_in_resource_extraction_desc:0 "联邦北方的矿藏尚未采掘完毕，新难民也许能够协助矿藏开采，中和资源消耗。"
TCW_assist_in_resource_extraction_tt:0 "§Y难民潮§!追加效果：\n战略资源获取率：§G+10%§!\n难民安置进度：§G+5%§!"
TCW_elan_steel_plant:0 "埃兰钢铁厂"
TCW_elan_steel_plant_desc:0 "埃兰钢铁厂在内战期间被摧毁，由于重建和运营成本较高，没有人愿意出资，现在低价的劳动力减少，是时候让它的齿轮再次转动了"
TCW_special_police_enforcement_regulations:0 "《特殊警务执法条例》"
TCW_special_police_enforcement_regulations_desc:0 "警务执法自由裁量权将会扩大，对移民违法行为惩治更加严格，公民生活与就业得到更强保障，政府中的右翼将会支持我们，但移民们或将失望。"
TCW_ogata_open_action:0 "奥加特开荒行动"
TCW_ogata_open_action_desc:0 "两奥加特区域基本都是人烟稀少的荒地，基本只作为原料产地而开发，如今可作为安置难民的区域。"
TCW_naturalization:0 "归化入籍"
TCW_naturalization_desc:0 "难民工作基本圆满完成了，最后就是关于归化户籍的的问题了，这将是最后也是最关键的一步。"
TCW_naturalization_tt:0 "移除修正§Y难民潮§!"
TCW_crisis_hidden_in_shadows:0 "隐于暗影的危机"
TCW_crisis_hidden_in_shadows_desc:0 "总统先生的措施获得了难民的拥护，难民代表组织了一次安置仪式，并邀请总统前去揭幕，这是联邦历史上具有民族团结意义的伟大壮举。"
#没死#
TCW_unconcious_president:0 "不省人事的总统"
TCW_unconcious_president_desc:0 "尽管总统先生仍具有生命体征，但是迟迟未苏醒，作为联邦的中流砥柱，只有他苏醒重掌大权，方能凝聚全国反攻复辟的王党。"
TCW_dealing_with_big_picture:0 "整顿大局"
TCW_dealing_with_big_picture_desc:0 "民心、军心似乎全乱了，总统先生刚恢复不久便要迎接一堆烂摊子，目前的局势不是全靠总统威信可以支撑的，我们必须寻求其他党派的支持。"
TCW_expand_mili_research_department:0 "扩建军事研究部门"
TCW_expand_mili_research_department_desc:0 "想要打赢接下来的战争，必须重新审视陆军科技的发展，在面对同等科技水平的对手，我们必须有所突破。"
TCW_expand_planes_reserve:0 "扩充空军战备"
TCW_expand_planes_reserve_desc:0 "由于空军的维护费用高昂，联邦只保留了民用客机维持正常运营，如今的战争迫使我们重新让“家伙们”见一见世面。"
TCW_rebuild_arms_units:0 "重建装甲部队"
TCW_rebuild_arms_units_desc:0 "第一次内战后装甲部队损失惨重，被迫将为数不多的编制全部取消重编，如今装甲部队整修完毕，也是时候赋予正规作战编制了。"
TCW_ensure_supplies:0 "后方民兵起义"
TCW_ensure_supplies_desc:0 "王党军队凭借着天然山地修建堑壕，试图在之后阻滞我方进攻，为了防止敌人计谋成功，联邦在南方的支持者将在之后与前线正规军合围敌军，让山地成为敌人的乱葬岗。"
TCW_ensure_supplies_tt:0 "§t一次背负未来的战略豪赌开始了...§!"
TCW_parliament_of_liberals:0 "向进步正义党妥协"
TCW_parliament_of_liberals_desc:0 "进步正义党将会获得部分席位，经济将会焕发新机，国家机械将会换掉生锈腐朽的零件，新的车轮将会碾过王党的皇冠。"
TCW_focus_on_general_efficiency:0 "工厂放权体制实验"
TCW_focus_on_general_efficiency_desc:0 "在曾经，政府牢牢把控工厂每个生产环节，并从获利中抽成工人的劳动成果。尽管战时均势严峻，但如果能够给工业松绑，给予工人有限民主管理权利，并允许工会，工人会拥护我们，锻造共和的火炮向反动王党射去。"
TCW_sweep_worms_in_market:0 "清理市场蛀虫"
TCW_sweep_worms_in_market_desc:0 "正义党已经获取到大元帅的授权，将对自治地区和地方军区和黑市，进行全面核查考核。早期地方囤积和倒卖军火的现象严重扰乱了市场秩序，现在这些赃物将会被收归国有，达到清理市场和核查战备的目的，可谓一石二鸟。"
TCW_mili_production_focus:0 "专注军备生产"
TCW_mili_production_focus_desc:0 "自由党人对收复战争的策略专注于宏观军力的力量投射，拥有领先的军备，至少保证战事不会令人大跌眼镜。"
TCW_fight_in_open_sky:0 "战于广阔的天空"
TCW_fight_in_open_sky_desc:0 "§C巨鹰轰轰长鸣，凝目聚神矗立。\n万里长空风吹啸，铁骨散落葬故园。\n鹰击长空以护雏，血羽散尽志已报。§!"
TCW_parliament_of_youth:0 "向青年党妥协"
TCW_parliament_of_youth_desc:0 "青年党人将会获得部分席位，尝试推行民主化政治改革，不过我们将会确保这一切有利于护国。"
TCW_mans_right:0 "人权！"
TCW_mans_right_desc:0 "通过赋予更多的公民权利，号召更多人为保卫联邦而战。当然，这样的让步是有代价的。"
TCW_families:0 "家庭！"
TCW_families_desc:0 "利用传统的道德观念，促使更多人激发个人价值。有利于短期战争需求，但对社会团结进步有不利影响。"
TCW_propoganda_focus:0 "专注媒体宣传"
TCW_propoganda_focus_desc:0 "我们将宣布在紧急状态下拥有媒体监督权，将国家机器注入精神动力并充分发动起来。"
TCW_fight_in_open_field:0 "战于开阔的原野"
TCW_fight_in_open_field_desc:0 "§C隆隆战鼓作响，篇篇誓言难违。\n万顷绿茵故乡土，玉液金酒燃君心。\n待到春来捷报传，古城万里颂功名。§!"
TCW_everything_ready:0 "一切准备就绪"
TCW_everything_ready_desc:0 "政局得到稳定，军备得到重整，然而南方的王国处于内斗之中，事实证明胜利的天平已经向我方倾斜。"
TCW_marching_to_south:0 "向南进军！"
TCW_marching_to_south_desc:0 "所有的准备都为了这一刻，不需要历史，只需要这场正义的卫国之战来证明：旧秩序的覆灭是必然的。"

TCW_storm_before_election:0 "选举前的暴风雨"
TCW_storm_before_election_desc:0 "珀克元帅正在为了恢复秩序忙得焦头烂额，然而他的心底仍有疑虑：选举是否是当下最好的选择，如果答案是肯定的，那么选举是否能够顺利地如期到来？随着一封密信送抵，真正的暴风雨降临到了洛琛首府的上空。"

TCW_marshal_s_last_wish:0 "元帅遗愿之疑"
TCW_marshal_s_last_wish_desc:0 "议会变得人声鼎沸起来了，或许是件好事。但争论不断喋喋不休，军方的政界人士还把持着一方席位，争吵的话题也还未上升到民主选举的事宜。议员心中盘旋着一个疑虑：元帅的遗愿中是否还包含着民主。最终表决将会重组议会，届时一切终将揭晓。"

TCW_key_to_economic_development:0 "经略济世之要"
TCW_key_to_economic_development_desc:0 "除了议会以外，资本也已经迫不及待地开始干预，它们潜伏在政治的阴暗面，在整个社会中无孔不入。"

TCW_turbulent_public_opinion:0 "舆论风波滔天"
TCW_turbulent_public_opinion_desc:0 "珀克元帅谨慎地迈出了民主化第一步，准许获得批准的团体进行无害化宣传活动，一批批选举宣传组织如雨后春笋般涌现。起初只是零散的民间宣传活动，但随着洛琛内部夺权秘闻的泄露，派系斗争逐渐映射到社会中。民间组织在士绅组织中，在共同的选举目标引导下，不断兼并形成大规模有组织的游行团体。分别支持民主派和威权派的群体之间开始摩拳擦掌，矛盾冲突不断加剧。"

TCW_fate_stay_federation:0 "为联邦赋予命运"
TCW_fate_stay_federation_desc:0 "元帅的遗体已被安葬，过去的意志已经无法干预现实。过往云烟无从复回，抢班夺朝就在今朝！"
TCW_fate_stay_federation_tt:0 "§R托莱多的命运就此决定...§!"

TCW_long_awaited_democratic_cheer:0 "久违的民主欢呼"
TCW_long_awaited_democratic_cheer_desc:0 "束缚托莱多公民近半个世纪的枷锁一夜之间断开了，民主凯旋了，天佑§7托§!§O莱§!§b多§!！"

TCW_result_of_election:0 "大选结果出炉"
TCW_result_of_election_desc:0 "威权派的阴谋已经被粉碎了，大元帅只会存在这一代人的记忆中，新一代人的意志是自由和先进的，因为选举到来了。"

TCW_new_milestone_of_national_rev:0 "民族革命新里程"
TCW_new_milestone_of_national_rev_desc:0 "洛琛的街头逐渐恢复秩序，新的元首角逐将要拉开帷幕。幻想的§R新秩序§!不复存在，不过是叛徒在§7托莱多§!§O民族§!§b革命前§!最后的挣扎。 "

TCW_no_room_for_two_tigers:0 "一山难容二虎"
TCW_no_room_for_two_tigers_desc:0 "自从议会失去了该有的作用后，围绕国家元首的争端变得焦灼起来，几乎没有具体的法律约束一切，但人们更愿意相信，这是联邦和平前的最后一次内战。"

