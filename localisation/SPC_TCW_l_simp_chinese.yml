TCW.1.t:0 "新年有新的问题"
TCW.1.d:0 "基弗今天心情很不错，因为这是他第一天上岗的日子。他在镜子前整理好警察制服与自己的配枪，在这个年月能找到一份稳定的体制工作实属不易。不过他的同事与领导却显得忧心忡忡，这让他感到很好奇。按理说在大元帅的治理下稳定了二十余年的国家难道还会出什么乱子吗？\n\n很快，集结的命令打破了基弗对今天能够准时下班的幻想。随着他与同事们拿着警棍与防爆盾来到街道上，街道另一头随即传来了震耳欲聋的喊声与口号：“把难民赶出我们的家园！”“我们不需要这些肮脏的臭虫！”“托莱多是我们的国度！”本地居民组成的庞大游行队伍很快就来到警察的防线前，与他们开始对峙。基弗看着面前的游行队伍，不禁咽了口口水。这么庞大的游行示威，他还是第一次见。同时他也暗自叹息，自己怎么这么倒霉，第一天上班就碰到这种情况。\n\n随着市政府前人群的散去，基弗得到的不是休假，而是另一道集结命令。警察署得到消息，一支由难民组成的游行队伍正在向市中心前进。等基弗他们赶到现场，一支规模与之前不相上下的游行队伍正安静的坐在市中心的广场上。而旁边的本地居民们正厌恶的看着他们。看到警察的到来，游行队伍中一个领头人提出了他们的诉求：“我们只想活着！”“我们只想要和平！”“我们祈求您们的宽容，只要有面包与工作就可以！”\n\n基弗碰了碰一位同事的肩膀，小声的问到：“这事到底怎么处理啊？”那位同事无奈的耸了耸肩：“这是你我能决定的吗？还是等上面的命令吧。”"
TCW.1.a:0 "烂摊子又来了。"
TCW.1.tt:0 "获得修正：§Y难民潮§!，其效果为：\n稳定度：§R-25%§!\n研究速度：§R-10%§!\n工厂产出：§R-10%§!\n月度人力：§G+10%§!"

TCW.2.t:0 "隐于黑暗的危机"
TCW.2.d:0 "克里斯蒂安受邀来到安置仪式上发表演讲，他粗犷的声音掩饰不了他内心的细腻情感，他用沉稳的声调向难民们――不﹐应该是托莱多的新公民们承诺道:“在座的各位公民们，我代表政府向大家保证的是，你们现在不必收到公社暴徒们的迫害和共和寡头们的剥削了，至少在托莱多，我们能保证人族的相对公...”\n\n克里斯蒂安的话还没说完﹐便感到一阵刺骨的凉意直刺他的脊椎，台下几人身披兜帽的衣帽之下，几双阴冷的目光与他形成交汇，他多年来的战场经验在疯狂地警告他﹐警告他远离这个地方。来不及多想的将军刚刚俯下身子便听到了数声枪响，他甚至能闻到自己的发丝被火药撩烧的味道。\n\n在急忙翻滚跳进人群中后甚至还没回过神来将军便听到刀剑离鞘的金鸣声和人群的惊呼声，他急忙抽出自己腰间装饰用的礼仪剑—―尽管这玩意儿的作用一言难尽，但此刻也确实管不了这么多了。\n将军勉强招架着刺客的招式，略微恢复了些理智后他开始趁打斗的片余看向四周自己的卫队怎么还没有来。\n\n当他看到刺客们杀的自己的卫队节节败退时他不禁破口大骂――倒不是他愤怒于卫队太过无能，因为他的卫队拖住了绝大部分刺客，他现在还活着就是因为眼前的刺客没有几人。\n克里斯蒂安破口大骂的原因是因为他知道，按这个训练有素的程度来看，刺客们百分之八十甚至是必然来自保王派那群疯子那里。看样子平衡已经被打破了。\n\n但他甚至没来的及细想，眼前的刺客的脖颈上的红色印痕开始发亮，一击沉重的挥砍迎面而来，他本能地用礼仪剑格挡，只听一声清脆的金属断裂声，总统没能挡下这招。\n\n等到卫队终于赶到总统身边时，将军还尚有模糊的意识，他下意识的喃喃说道"
TCW.2.a:0 "“我对联邦的炙爱替我挡下了致命的伤害。”"
TCW.2.att:0 "§R危机即将爆发！§!"
TCW.2.b:0 "“我看到了，看到了那满天的璀璨.... ...”"
TCW.2.btt:0 "§R复兴的时刻来临了！§!"

TCW.3.t:0 "反动派的暴动"
TCW.3.d:0 "尽管总统先生在危险的刺杀行动中活了下来，但是万恶的反动派就像是抓住了救命稻草一样发起了自共和革命以来最危险的复辟运动。南方的部分地区以及自治区在动荡中被反动派夺取，好在他们清楚总统先生威严仍在，不敢贸然发动全面战争，而我们也暂时没有反攻的能力。"
TCW.3.a:0 "这一天是不可避免的！"
TCW.3.tt:0 "§R托莱多王国宣布独立！§!"

TCW.4.t:0 "反动派的试探性行动"
TCW.4.d:0 "由于反动派对联邦政权的稳定性模棱两可，他们在边境上发起了试探性进攻。虽然并未上升到战争，但毫无疑问，如果失败，那些渣滓的气焰会更加嚣张，我们的士气将会大幅度下降，并失去重要战略要地，对今后反攻极为不利。"
TCW.4.a:0 "坚守到底！"

TCW.5.a:0 "托莱多王国拿下了岭森！"
TCW.5.d:0 "曾几何时，岭森承包了国内大部分教徒的宗教需求，国王的加冕仪式需要亲自前来岭森获得承认与祝福。宗教信仰为这块贫瘠土地上的人们带来希望，然而民主派的政策禁止了一切，企业家满怀希望地来到这块土地开发，又摇了摇头评价到这片土地鲜有开发价值。人文学者评价到，随着王党的胜利，这里的大多数居民大概率倒向王党。"
TCW.5.t:0 "可悲的土地！"

TCW.6.a:0 "托莱多联邦在在岭森的胜利"
TCW.6.d:0 "尽管岭森的土地可开发性较低，但却是守住托洛尼亚首都圈的战略要地。联邦元帅深知此地的战略价值，在此建立一座临时要塞指挥所，运用灵活的机动战术将王党部队的残骸埋葬在枯木森林中。"
TCW.6.t:0 "守得住岭森，护得住联邦！"

TCW.7.a:0 "托莱多王国拿下了涅维斯特！"
TCW.7.d:0 "时隔多年，涅维斯特再次遭到战争的洗礼。仅次于托洛尼亚的第二大省份、拥有成体制的产业体系，最终在联邦军队的坚守下幸免于王党的狂热进攻。尽管联邦守住了具有战略意义的工业城市，但惨烈的战争仍然使生产链变得残缺，说不好王党的军队仍然在边境虎视眈眈，准备再次发动惊世骇俗的进攻。"
TCW.7.t:0 "再拖一拖，反动派就会不攻自灭。"

TCW.8.t:0 "托莱多联邦在涅维斯特的胜利"
TCW.8.d:0 "繁荣的涅维斯特，曾经国王的多少勇猛之士皆出自于此，诗人与画家在此歌颂王国史诗。如今在王党的民兵的攻势中变得生灵涂炭，除了少数不多投向王党的人以外，其他人无不“看到”涅维斯特大地的眼泪。谁知道想让这里恢复生机到底要多久呢？"
TCW.8.a:0 "无人不念这块土地的美好。"

TCW.9.t:0 "荣耀的讨伐来临"
TCW.9.d:0 "我们躬耕黑暗多年，每每祭拜于先王灵位之前，都不住地悲痛于共和派对皇室之迫害，先王对国家与人民的爱是共和派难以想象的。如今共和派的“刽子手”，那个老不死还要阻碍复兴的老头已经死了，他们失去了中枢，只要我们在共和派这腐烂的门上踹上一脚，这栋房子就会倒塌。"
TCW.9.a:0 "为先王与理想赴死如归！"

TCW.10.t:0 "托莱多内战结束"
TCW.10.d:0 "第二次托莱多内战以托莱多联邦的胜利而结束，是时候该反思我们内部的问题了。"
TCW.10.a:0 "内战结束"

TCW.11.t:0 "新王加冕"
TCW.11.d:0 "王室重新回到托莱多后，一夜之间整个国家恍若隔世。\n曾经朴素的联邦政府宅邸，被改造成古典的殿堂。而年轻的国王却没有应有的兴奋，反而在一门心思规划接下来的政策。鲜有民众一睹国王真容，但今天的加冕典礼将会被国内媒体争相报道，从而揭开王室的神秘面纱，开启托莱多的新纪元。\n当天傍晚，加冕仪式如期举行。\n\n“你是否愿意庄严宣誓统治托莱多、杜罗自治国、德孔波自治区、阿内托自治区以及维涅马自治区？”\n“我愿意宣誓。”\n\n“你是否愿意庄严宣誓维护公民正义，将正义事业交到法官手里？”\n“我愿意宣誓。”\n\n“你是否愿意团结各人类民族，将来犯的亚人及类人人种驱逐，保护托莱多人民物质及精神财富不受到侵犯，誓死捍卫本国人民乃至全人类的发展空间。将这一神圣事业赋予伟大的王国禁卫军队？”\n“我愿意宣誓。”\n\n然而皇冠在统一之前就已提前戴上，连凡特固执地认为王室自古便是托莱多的权力支配者。虽然饱受争议，但内战时的士兵却认为这是圣战的仪式象征。"
TCW.11.a:0 "连凡特七世万岁！"

TCW.12.t:0 "苏醒之夜"
TCW.12.d:0 "联邦国防医院的的急诊室内，密密麻麻的仪器闪着灯红酒绿的微光。门外的两名守卫早已睡眼惺忪，不知还要守卫多少个日夜。\n\n宁静中的病房隐约传来几声病床摇晃产生的吱吱声，“加里奇，你去看看是不是有老鼠，咬断了输液管可不好。”加里奇点了根烟，拔出刺刀推门进去，黑暗的夜晚让他不忍按下电灯开关。他趴在地上，用取下来的刺刀敲击地面产生刺耳的声音，但床底下没有任何动静。“弗拉克，你他妈是不是有什么神经敏感，这根本啥都没有。”\n“嗯哼——（清嗓子声）”\n“弗拉克你个傻蛋，就是麦芽酒喝多了，装什么...傻......”\n\n加里奇突然愣住了，刚刚的声音不像是弗拉克，更像是收音机里的...总统先生的嗓音，况且现在是他的值班时间，弗拉克提醒过后就沉沉睡去。\n加里奇不可置信地看向黑暗中的床位，一双深邃透着月光的眼睛一动不动地注视着他。\n\n“麻烦你们这几天保护我了。”\n“实属冒犯，但愿我的粗鲁没有打扰到您幸庆逃离死神之爪的喜悦。”\n“我会休息到明天早上，到时候就可以把记者叫来，一个简短的招待会后，还请各位支持我，毕竟我清楚昏迷后国家至少会陷入怎样的混乱。”\n加里奇心中充满了力量，门外那个傻蛋弗拉克居然错过了这伟大而简短的时刻——况且还是私人专属的。"
TCW.12.a:0 "混蛋弗拉克等着被开除吧！"

TCW.13.t:0 "医疗效果出乎意料"
TCW.13.d:0 "经过针对性的魔法治疗，总统先生有了明显的生理活动恢复，相信苏醒只是时间问题了。"
TCW.13.a:0 "上天的祝福！"

TCW.14.t:0 "总统病情恶化"
TCW.14.d:0 "庸医！一定是庸医！法师口口声声承诺这种魔法可以起到心肺复苏的效果，结果不但没有好转，却差点造成了大出血。经过专业医师鉴定，这种魔法本应该是用于人形魔兽的，真令人感慨，联邦对魔法的严苛禁令居然导致了如此荒谬的错误。"
TCW.14.a:0 "让警察把庸医逮捕归案！"

TCW.15.t:0 "护国同盟"
TCW.15.d:0 "即便克里斯蒂安在刺杀幸存给仍在支持联邦的人民带来希望，可人们也逐渐意识到:元帅并不是这片土地永远的保护神。现在，仅仅靠元帅的同僚组成的政府已经无法支撑处于危难中的国家，好在沉寂已久的议会爆发出了护国的呐喊。元帅在过去为了政局稳定限制了议会党派的参政权并且禁止选举，如今，在捍卫共和联邦的情结下，一个政党同盟在议会雷鸣般的掌声中成立了。\n\n进步青年党为久负盛名的旧执政党，即共和革命后最先组建共和政府的执政党。他们在议会化与世俗化改革中取得成效，可惜将国家拖入世界大战的战火后没能在经济危机中力挽狂澜，屈居于的元帅重组政府下。尽管元帅与该党恩怨颇深，但青年党人掌握了国内宣传媒体与可观的资本，在他们一骑绝尘的宣传能力下，必能扭转衰颓的士气和民心。\n\n进步正义党年轻气盛，伴随着工业化的进步迈出坚实的步伐，党内成员所持有资产足以垄断国内70%产业。只需要总统先生稍加削减制度枷锁，便能极大缓解战时产能与资金短缺的问题，届时充盈的国库将是收复南方国土的坚实保障。对于一个市场僵化的社会，很可能新经济体制改革的萌芽将会诞生，新的民主纪元也将纷至沓来。"
TCW.15.a:0 "发动工业器械，国民们！"
TCW.15.b:0 "为共和奉献自我的民族，万岁！"

TCW.16.t:0 "守卫共和宣言"
TCW.16.d:0 "自总统先生遇刺昏迷,洛琛的民众便始终惴惴不安。伴随着更加糟糕的消息从南方传来，事实上王党的人马已经率兵谋反,分裂了整个国家。幸好，总统先生醒来后立刻投身于整顿工作，在他的威严下团结了各大党派，并用仅仅几个月的时间极大地扩充了军备，军队已经开往南方边境，总统先生宣布将在第二天发表演讲。\n\n第二天,洛琛的中心广场水泄不通。迷茫恐慌的人们渴望见到老将军,并祈求他能一如既往的保卫共和国。\n面对面前人声鼎沸的场景，克里斯蒂安沉默了良久。待广场上的人们看着脸色苍白的总统越来越躁动时，他拍了下自己的话筒，扩音器随即发出嘲哳刺耳的杂音。\n\n人群逐渐安静下来，克里斯蒂安则抬起了自己的下巴,激动且高昂的向聆听的人们大声吼道——\n\n“公民们,如你们所见，南方被洗脑的人们巳举起反旗,势要摧毁我们来之不易的共和国。”\n“我们能够答应吗?不，绝不能!试问在座的诸位，有谁愿意给自己头顶安排一个主子拿鞭子鞭笞自己吗?”\n“有哪些自由的人民会愿意这样?有吗?不会!”\n“你们或许要说，总统阁下，你说的对。但我们也有家人，只是需要一份工作养活自己和家人便好。”\n\n“说的太对了，自己的生命和所珍视的东西无疑是珍贵的。但我想要告诉你们的是，总有一天，王党的长鞭会触及你的家人，也许第一天要的是你们的奉承，终有一天会索取各位的人生自由。”\n“我说的，那便是尊严!是荣誉!是自由!只要我们所珍视的东西和自由受到威胁，我们就会不停的斗争!不停地，永不停歇!”“是时候让南方的狗奴才知道,这世间总归还是有愿意为美好未来献身的人们!即使失去一切!”\n\n“让谈判去死!真正的自由需以铁血来实现!”\n人群此时躁动起来，不知哪个情绪激动的人喊了一句，广场上的人沸腾起来，所有人都高呼那个口号——\n\n“真正的自由需以铁血实现!真正的自由需以铁血实现”。\n\n克里斯蒂安总统简短的下达了最后指令:“向南进军。”"
TCW.16.a:0 "“爱国者与暴君的鲜血的浇灌，终生自由之花。”"

TCW.17.t:0 "秘密行动来电"
TCW.17.d:0 "伦纳德走在阿内托的大街上，不断望向四周。和战火纷飞前线不同，这座位于大后方的海滨城市此时仍然处在平静之中。看起来这里的民众似乎很快接受了王国复辟改朝换代的事实，街上车水马龙，有说有笑——当然这要忽略不远处中心广场那些被吊死的联邦政府官员。“这可真是令人感叹，原来联邦政府对自治区的掌控力已经弱到如此地步了。”伦纳德这样想着，走进了街旁的一家酒馆。\n\n酒馆里的人多的不得了，但却出奇的安静。伦纳德的到来让酒馆里大部分人的目光都聚集在他的身上。伦纳德没有多做停留而是径直走向了酒保，高声嚷道：“来一杯烈酒，记住，要大杯的。”听到这句话的酒保停下了手头上的活，抬头看向伦纳德，似乎在确定些什么。过了一分钟，酒保向厨房走去并对着伦纳德招呼道：“先生，请您跟我来。看看您究竟要哪种烈酒。”\n\n“欢迎你，联邦特使伦纳德先生。”伦纳德走进酒馆厨房后的秘密房间，只见一个拿着左轮手枪的男人走到他面前伸出手。伦纳德看着面前的男人：粗犷，壮实，有着经典的南部风韵。“看起来这就是反抗军领袖了。”伦纳德这样想，伸出手和男人握在一起，“你好，海德利先生。想必你也知道我此行的目的，那就长话短说了。”伦纳德看着四周的武器和弹药，继续说道：“我此次前来就是希望能在王国乱党后方发动起义和正面的联邦军队一起夹击。一举击破王国乱党的山地防线。”\n\n听到这话的海德利哈哈大笑起来，他指着周围的武器说道：“特使先生，我们就是为了现在才准备这些‘小宝贝’的。别看我这样，我可是铁杆共和派，誓死和总统站在同一战线。”海德曼说完，周围的其他人也一起高呼着“联邦万岁”拿起武器准备冲出屋外。“好，那就给联邦军政局发报吧。”“发什么？”伦纳德眯起眼睛，看向房门，“那当然是——”"
TCW.17.a:0 "“Forward to liberty（奔向自由）！”"

TCW.18.t:0 "狼首之凋"
TCW.18.d:0 "“让…让开！我还用不着你们来！”洛琛的病院里，一位老人推开来上前搀扶他的护士。他一边说，一边大口的喘着粗气。即使脸上充满着痛苦的神情，但他的眼神中仍然透露着坚定。如果这时有一个托莱多的普通国民在场，他一定会大吃一惊。因为床上这个形容枯槁的老人居然是有托莱多狼首之称的克里斯蒂安大元帅。\n\n虽然元帅本人已经到了古稀之年，但是他的身子骨还是蛮硬朗的。他这副身躯救了他很多次，但很可惜，这次却没能救了他。虽然勉强在刺杀中生还，但带毒的子弹以及冲击力还是击碎了元帅的身体状况。即便固执如他也不得不承认，他的身体已经是风中残烛了。而对于托莱多来说，这位监国22年的大元帅，已经时日无多了。\n\n“哒，哒，哒。”急促的脚步声叫醒了原本正处于痛苦中的元帅。他缓缓睁开双眼，他首先看到的是赫尔曼·霍札——他的老友。紧接着便是病房内众人掩盖不住的激动神情。当他想支起身子询问怎么了的时候，霍札已经先一步跨到他的身旁，兴奋的说道：“克里斯，南方捷报，那群腐朽的保王党已经投降了！我们胜利了！”“是么…”大元帅含糊且平静的回应道，他努力的抬头看向房间内的众人：目光略过珀克，霍札，玛修尔主教以及——一些交头接耳的民主人士。\n\n伴随着他的目光，刚才还喧嚷的房间登时安静下来。细心的赫尔曼·霍札察觉到了不对，大元帅的状态好像突然恢复了很多。他的脑海中想到了一些不好的词汇，比如说——回光返照。大元帅撑着身子坐了起来，并挥手驱去了急忙靠来的医护人员。他表情透露着这辈子罕见的安宁和祥和，还有从未见过的仁慈：“诸君，既然我军已经确定了最终的胜利，那有些话我就不得不说了。”说到这，他难得勾了勾嘴角，“就当是我这个老人的遗言吧”\n\n众人屏气凝神，继续听着面前这个老人的轻语：“我…快不行了，我的身体我自己知道。关于我的一生，我知道我做错过很多事，也造成了很多遗憾。”说到这一股难以言明的酸楚涌上了他的心头，“咳咳咳但...我自认为无愧于国家，无愧于...人民。”“托莱多的情况太过于复杂，民众们过于冷感和保守...所以时至今日，我也不完全相信所谓民意会将托莱多带向光明的未来。”说到这他看向了赫尔曼·霍札，而霍札也点头示意知晓自己重返政坛的原因。“我已完成我的使命，”正说着，他原本坚毅的眼神开始迷离，无神，直至溃散,平静。“而我也相信，后辈们也能完成他们的使命。”\n\n这是大元帅的最后一句话。\n\n塞万提斯·多明戈·克里斯蒂安，与世长辞"
TCW.18.a:0 "见群狼无首，闻悲嚎彻夜..."
TCW.18.tt:0 "§R伟大的元帅与世长辞§!"

TCW.19.t:0 "清理蛀虫"
TCW.19.d:0 "“诸位元帅的贵宾，我们就真的不能再谈谈吗？”\n\n执政官看着自己办公桌对面的元帅代表们，后背早已汗湿了他的西装。虽然已经从内部渠道听说了元帅已经授权正义党对市场进行整顿工作，但是没想到他们会来得这么快。他所在的北方边境小镇寇森是当地军区囤积军火的基地之一，就算是被重点关注对象也不应该直接敲打他这个大目标才对。\n\n“执政官先生，我想我们说得很清楚了。人赃俱获，我们来到这里不是来讲条件的。应元帅命令，在全国紧急状态期间整顿市场和核查战备，寇森政府名下仓库中所有非法囤积的军火将全部收归国有。这在元帅命令中已经写得很清楚了，相关流程都已经走过了，我们来这里是来通知你并且带来逮捕令的。”弗洛伊德的声音冷静而又坚定，面对蛀虫他没什么好聊的。\n\n“弗洛伊德先生，我知道元帅命令是什么，但是我敢肯定地说这中间一定有你们忽视的地方。这一切都是通过合理合法的程序安排的，这是元帅曾经亲自写下的规定，是有益于民众的。何况这是本地军方的物资，就算是被没收也应该是本地军方负责人来负责。弗洛伊德先生，整顿市场不应该是你越权的理由吧？”执政官激动地说着，脸已经开始变红。\n\n弗洛伊德笑了，他曾经想过对面的家伙会通过金钱贿赂自己，或者通过与当地军方的关系威胁自己。如今看来他估计什么情况都没咋了解，元帅早已修改了相关规定，当地的军方负责人早被撤换并授权给他们处理相关事情了。\n\n“你只有两个选择，认罪后被关入监狱，或者，拿出枪射击你对面的元帅代表后被当场击毙。你的说辞空乏无力，你所谓的惠民不过又是一个以权谋私的借口。”\n\n“就算我全盘妥协了，总统......哼，元帅也不会放过我的，独裁者的残暴是人尽皆知的，为什么要把军火给这个以军政之实，行民主之需的暴君?！”执政官脸上青筋暴起，随后把手伸向衣内的口袋，好像要作出最后的抵抗，弗洛伊德的警卫顾不上太多，扣响了扳机。\n\n口袋里没有任何武器，只有一把标注了“军备库”的钥匙。\n\n门外没有动静，没有士兵以不当执法为由逮捕他。"
TCW.19.a:0 "“静默法术刚好到时间了。”"

TCW.20.t:0 "内阁顾问离世"
TCW.20.d:0 "1998年2月3日，联邦敬爱的内阁资源部长、远乡籍地质顾问何瑞洁因心脏病离世。何部长自1977年因远乡地区政治动乱向而向我国申请政治庇护，期间任职从未中断，甚至不惜将家人转移至我国。基于这位部长无党派和地质专家顾问的身份，从未收到来自各个派系和机关的斥责。\n\n依据何先生的遗愿与合作协议，其长子将会何昀钧继任部长。尽管经验无法企及，甚至工作初期会遇到许多麻烦，但这位新部长还很年轻，还能够为联邦创造更多的价值。"
TCW.20.a:0 "节哀顺变"

TCW.21.t:0 "西南雪崩矿难"
TCW.21.d:0 "当政治阴霾散去，托莱多人带着希望回到了生活岗位，工人重新挥起铁锤，全力复现阴霾到来前的光景，而管理者却迫切地在旧经济的废墟上大兴土木。\n\n严冬冰雪冷酷无情，趁着首都的风波还未过去，就已悄悄堆满雪山。当管理者做着开疆拓土的美梦时，全然不知工人在雪堆和煤矿下毫无防备，甚至矿工还没来得及换上新的工具和探照灯。工头贪婪地看着图纸上各个矿脉的埋藏分布，而破旧的矿稿和机器显然无法满足他。他下令将炸药一车一车地运进矿洞，但低效的产出被迫炸药被搁置一旁。黄昏到傍晚气温急转直下，山风沿着雪堆向着山谷的工程队袭去——雪崩要来了。工头不满地下令撤回洞内矿工，却没有按照《工程安全规章》运出炸药。老式侦测设备对山风的风速数据出现误差，雪崩在风力加持下，到来的气势超出了预期。\n\n引导人员的声音变得急促慌乱起来，当“雪崩”两个字传遍矿坑，引发了更大的雪崩效应。有矿工将油灯留在洞里，未烧尽的灯油泄露，山风呼啸着吹进来，吹出四溅的火花——炸药被点燃了！火焰裹挟着矿洞内的可燃气体，火舌从洞头喷涌而出，始终留在矿外的人员只有少数，尽管有零星披着火焰的人逃出，而雪崩将他们掩埋。\n\n冰火两重的矿难造成超过3000人死亡，超过500人失踪，登上了国内外新闻头条。"
TCW.21.a:0 "苦难才是新生的开始吗？"

TCW.50.t:0 "军政密信"
TCW.50.d:0 "珀克元帅最近正忙得焦头烂额，先是旧总统的国葬，紧接着是关于选举的事宜，每一件事都令他难以分清轻重缓急。新旧派系互不相让，将他夹在中间任其拉扯。失去了克里斯蒂安元帅，整个国家从未在和平时期如此混乱，更别提将内战后经济复习提上议程。珀克只希望能出现像旧元帅一样兼具手段与威望的人，但他在无数个日夜祈祷的——却是和平过渡到新政府。\n\n选举将在不到一个月的时间到来，每过一个忙碌但平稳的昼夜，就已经令他倍感轻快。好景不长，这天傍晚他回到办公室，发现一封严密包装的信封被塞进文件夹中，靛蓝色的信件是仅供军方使用的。尽管珀克元帅也是军政局的高层，但这样的信封少见地出现在文官政府大楼并不见得是好事。\n\n“首都卫队第1和第2师团因任务安排已被调离首都，目前仅有第3师团驻扎首都，原因不明……”\n\n很明显的调虎离山之计，珀克明白，第1和2师团是克里斯蒂安元帅交给自己的，虽然第3师团背后的人也是军政局的同僚，但是目的已经显而易见，自己已经无可奈何地被卷入了一场阴谋。"
TCW.50.a:0 "一团阴霾笼罩在联邦上空。"

TCW.51.t:0 "最终表决"
TCW.51.d:0 "出乎人们意料的是，在元帅的葬礼结束之后。军政府真的将权力归还了文官政府。不过虽然文官政府重新掌控了权力，但是他们内部也并非铁板一块。政府内部以元帅的故友赫尔曼·霍扎，与新兴的国家工团主义者连恩·阿方索为首的威权派明确反对民主化与扩大议会权力。他们联合组建的新政党：民族至上联盟受到了军方人士的支持，吸纳了大部分有军队背景的议员。他们不相信元帅会做出民主化的承诺，也不相信民主会给托莱多带来光明的未来。\n\n而与之相对的，则是在元帅督政时期示弱的民主派们。阿卡多·文森特的青年党与列维奇·索雷尔的进步党吸纳了旧文官集团以及大量的年轻议员。他们以元帅在内战时期做出的民主化承诺，以及元帅临死之前曾说过希望托莱多未来可以交予人民为依据。要求扩大议会权力并且出台禁止军队干政的法律。双方就这一问题吵得不可开交，甚至在台下开始大打出手。\n\n虽然对于沉寂了几十年的托莱多议会来说，能够重新变得热闹起来是件好事。但是国家的重建工作势在必行，双方必须要在今天的议会上做出决断了。民主派代表之一的阿卡多率先向威权派发起了冲锋：“元帅已经答应过将在战后开始民主化进程，怎么到了你们嘴里就不算数了？说到底你们又凭什么反对元帅的想法？”而威权派不甘示弱，元帅故友赫尔曼更是破口大骂：“老子从元帅刚当上军官的时候就是元帅的战友了！整整三十八年了，我还能不知道元帅对民主是什么看法？你们这些酸臭的文官就是喜欢撒谎骗人！”\n\n双方你来我往，互不相让。但最终，议会重组表决的结果将决定托莱多的未来——"
TCW.51.a:0 "议会重组后威权派大量倒戈。"
TCW.51.a.tt:0 "§2民主派在议会胜利。§!"
TCW.51.b:0 "民主派席位在重组后缩减。"
TCW.51.b.tt:0 "§O威权派阻挠了民主议程。§!"

TCW.52.t:0 "金融风波"
TCW.52.d:0 "尽管珀克元帅已经加强了对选举期间资金流动的管控，但不妨碍资本家在国有项目上打暗号。\n\n证券所和银行的警备与审查工作有所加强，客户排队办理业务更比先前秩序井然，不过可投资项目上只有两个项目。其中一个是以正常投资流程进行的奈西达河水电站，如果民主派上任，那么投资的回报将会十分可观。另一个是以购买国债的方式运行的岭森军工复合体，按照以往威权政府的惯例，虽然回报并不可观，但至少有政府稳定的保证。\n\n这是资本的对未来的一次豪赌，也是托莱多现实政治的又一个真实写照。按照元帅对资金流动的限令，只有一个项目能够按时动工。届时，托莱多经济对其政治的真实态度将会一览无余。\n\n最终筹集到所有资金的项目是："
TCW.52.a:0 "“奈西达河水电站”"
TCW.52.a.tt:0 "§2民间资本青睐民主派。§!"
TCW.52.b:0 "“岭森军工复合体”"
TCW.52.b.tt:0 "§O统制经济得以延续。§!"

TCW.53.t:0 "一石激起千层浪"
TCW.53.d:0 "珀克已经好几天没有合眼了。作为目前托莱多联邦的临时领导人，他最近要处理的事情实在是太多了。而这些烦心事里最令人头疼的就是民主化问题。议会对此事争论不休，各界对托莱多的民主化未来看法不一。假如民主化出现了问题，他有什么颜面去见大元帅？在脑内斗争了一番过后，珀克元帅在第二天的全民广播里宣布了民主化的第一步。一部分获得批准的政治团体将被允许在全国各地进行政治宣传。\n\n珀克元帅的决定很快就得到了落实，不过可能落实的有点太好了。相当一部分没有获得政府批准，而是由民众自发成立的政治团体也开始在全国各地进行宣传活动。仅仅几天，整个托莱多联邦就被几百个不同意识形态，不同地区的政治团体包裹起来。群众走在街头欢庆着这个，自大元帅政变之后的首次民主化浪潮。\n\n如果事态就此平稳发展的话，或许也是一件好事。但随着威权派的政变企图被泄露，整个托莱多的政治团体开始逐步向极端化发展。数个由小型政治团体联合组成的大型组织已经宣布，将要向妨碍民主化的威权派支持者发动冲击。几乎是在同一时刻，威权派方面的政治团体也开始联合以应对民主派的冲击。\n\n整个托莱多一下子变成了火药桶，两大派别的支持者开始了轻微的武装化。即使珀克将整个托莱多的警察都派出去维持秩序，也阻挡不了两派支持者的武斗行为。为了托莱多的稳定，珀克元帅必须要做出他的决定了。"
TCW.53.a:0 "唤起民众千百万，洛琛街头蓝旗乱！"
TCW.53.a.tt:0 "§2民主的回音传遍大街小巷§!"
TCW.53.b:0 "玉石俱焚无冤魂，布衣乱匪鸟兽散！"
TCW.53.b.tt:0 "§O元帅的幽灵仍徘徊于上空§!"

TCW.54.t:0 "拥抱民主纪元"
TCW.54.d:0 "到达距离选举只剩不到30天的时候了，威权派的抨击已经越来越毫无掩饰。\n\n幸运的是，首都卫队第1师团和第2师团重新与珀克元帅取得了联系，经过双方对威权派情报的交换后，两个师团表面上没有表现出重返首都的意图，并通过隐蔽的行动知晓了威权派军方的幕后人物。\n\n在一个阴雨濛濛的夜晚，军政局出现了无人值守的情况，第3师团沉溺于他们似乎完美无缺的计划即将成功的喜悦中，值守人员已经喝得烂醉如泥，进入军政局如入无人之境。最终导致的结果，是元帅故友，赫尔曼的房间被破门而入。他完全没有防备，闯入者将其非法调遣军队的证据与罪名呈现出来后，赫尔曼元帅罕见地在第二天的工作缺席了。\n\n正当他的部下以为赫尔曼正在某个度假海滩期待着胜利时，政府公布了对赫尔曼滥用职权和颠覆国家的罪名。之后政府宣布了对民族至上同盟的审查令，民族至上同盟在失去赫尔曼后，文官与部分军方宣布脱离，最后的顽固派强硬地拒绝了政府审查。最后的威权派同盟被宣布为非法组织，珀克元帅所属的第1和第2师团奉命执行镇压命令。顽固的威权分子依靠第3师团负隅顽抗，但终究落入下风，在最后一次与政府军交火中，威权派最后的硬骨头连恩·阿方索被子弹击中头骨身亡。\n\n距离选举仅剩不到2周的日子里，你总能看到人山人海的群众在选举箱前后熙熙攘攘......"
TCW.54.a:0 "“民之所盼会如期而至”"

TCW.55.t:0 "回归秩序井然"
TCW.55.d:0 "距离选举不到30天的日子里，第2和第3师团切断了第1师团与首都的一切联系。\n\n军政局内弥漫着一股诡异的氛围，无论是文官还是低阶士官，都屏息等待这个国家回归其本来的样貌。他们心照不宣地向往常工作，把一切当作大元帅还未离世。\n\n直到洛琛中心开始出现警戒线，第2和第3师团的士兵的背影如同石像一样矗立于大街小巷。而这一切的幕后指示赫尔曼和连恩带领士兵封锁了军政局，珀克元帅和民主派党魁抄起死去警卫的盾牌和枪支，在楼道中阻击了一波又一波威权派的士兵。尽管赫尔曼并不情愿引起太大的骚动，但最终还是被迫下达最后的命令。连恩从洛琛的另一端调来火炮，在最后的警告被严令拒绝后，炮弹引信被拉响了。躲在屋子里瞥见火炮的群众即便又听见了震耳欲聋的火炮，也仅有保持恐惧的面部表情的权利。\n\n距离原定选举日期已超过一周的日子里，人们为了嗅到关于新的“大元帅”的消息而熙熙攘攘，自发地恢复了原有的秩序......"
TCW.55.a:0 "“让我们还是回到岗位上吧”"

TCW.56.t:0 "大选结果出炉"
TCW.56.d:0 "民族至上同盟的夺权阴谋被粉碎后，整个国家如同拨开云雾见青天充满了活力。\n\n民众拥挤在政府大楼的投票箱前，而青年党和进步党也正在紧锣密鼓地应对投票的冲刺阶段。此时青年党和进步党的分歧才终于显露出来，青年党的百年历史获得了稳重的老一辈选民的青睐，进步党吸收的泛左翼进步理念吸引了年轻的选民群体。即使两党的理念已经可以达到分道扬镳的地步，但出于民主力量首次联手粉碎独裁官僚的胜利意义，两党目前仍然保持友好的姿态。\n\n尽管对于结果难下定论，但无论是哪个党派入驻洛琛政府，托莱多人民都已经把目前取得的一切成果看得来之不易。\n\n最终引领民心的究竟是......"
TCW.56.a:0 "“青年党的模范民族国家蓝图”"
TCW.56.b:0 "“进步党的宪政主义进步纲领”"

TCW.57.t:0 "一山不容二虎"
TCW.57.d:0 "在绝对的利益之前，任何情谊都不值得怀念，议会职能失效后，没有法律能够约束赫尔曼和连恩反目成仇。作为威权主义者来说，天底下几乎不存在分一杯让所有人满意的羹，就在一夜之间，最残酷和暴力的内斗爆发了。\n\n赫尔曼的第2师团将燃烧瓶扔进办公大楼，顿时洛琛中央火光冲天，拉开火并的序幕。\n\n连恩麾下的第3师团，连同地下武装团体从黑暗中涌现，甚至笼络了部分工会提供武器弹药。\n\n赫尔曼的士兵更像是正统军，装备制式步枪和制服头盔，以及数不尽的弹药，占领着宽敞的街垒。但连恩的部下遍布大街小巷，凭借钝器、暗杀、地下水道作战，将不小心陷入黑暗的敌人抹干吃净。民众躲在家中，封紧门窗，即便街道混乱不堪，但仍然能够辨认，血流成河的现场是连恩的杰作，而火光冲天的爆炸现场是赫尔曼的回应。\n\n直到天终于蒙蒙亮，洛琛中心的人们隐隐窥见了斗争的胜负......"
TCW.57.a:0 "“赫尔曼·霍札”"
TCW.57.b:0 "“连恩·阿方索”"

TCW.58.t:0 "呐喊"
TCW.58.d:0 "他们赢了，他们赢了，”酒馆里的学生爆发出欢呼，“独裁的杂种，你们的城堡是我们的啦！”在觥筹交错之间，托莱多的街头巷尾陷入人声鼎沸中。\n\n当晚的电视台收听率创下历史新高，老一辈国民国民在收音机前的嘴角缓缓挤出轻松的笑容，而新青年们已经不见人影，警戒线被冲撞成了散乱的条带，宵禁暂且不复存在。\n\n“……大选的结果将会在两周后揭晓，但这段时间内，民主联盟将会重建议会并在大选后确保其立刻投入运作……”收音机里如是播报着。\n\n“半辈子的光阴，克里斯蒂安从他的画像里凝视着我，嗯…我想…现在摘下他的画不是犯法的事，甚至是未来政府和法律规定的义务吧。”许多家庭夫妇这样想着，在这一夜让元帅军帽下的肃容和徽章黯淡了几分。\n\n“剪彩喽，祝愿我毕业能去到新政府工作。”青年拉起被冲散的警戒横幅，在“咔嚓”声中给自己的毕业典礼划上完美的句号。"
TCW.58.a:0 "这是我忍辱负重十余年的呐喊！"
TCW.58.a.tt:0 "§C抓紧时间，议会章程还没起草完，民主有路要赶。§!"

TCW.59.t:0 "民族"
TCW.59.d:0 "“托莱多民族起源于公元纪年前……我记得没错吧老师？”\n\n“没错，那第一支托莱多人呢？”\n\n“科……维多人？”\n\n“错了，是科维斯人，最基本的问题居然都能答错，必须好好反省你自己，伸手出来!”\n\n“是……是的…我只是…哦不！”来不及把话说完，戒尺重重地砸了下来。\n\n“同学们记好，托莱多民族起源悠久，即使于其他民族交融，在近代就已经形成了密不可分的民族共同体，并且深受托莱多文化熏陶，根本不存在所谓的民族歧视与压迫……”\n\n答错提问的学生零零散散地站着，低着头沉默不语，刚才这位同学的维尔陶人护照，在泪水下看起来略显模糊。"
TCW.59.a:0 "不想挂科就得努力。"
TCW.59.a.tt:0 "§O我真想成为一个托莱多人。§!"

TCW.100.t:0 "文森特的战略定位"
TCW.100.d:0 "自独裁者之死后，即便有专人定期清扫，总统办公室还是显得死寂，没有生机。\n\n“您的助理已经确保您的工位崭新如初，而副总统正在等候，欢迎来到洛琛总统府，文森特总统。”总统府的负责人目送文森特到他的办公室。\n\n文森特长舒一口气，逐渐从胜选的喜悦中恢复理智。\n\n进入办公室，副总统大步走来同他握手，表情略显得尴尬，但瞒不住文森特。他一眼瞥见副总统身后的墙上仍挂着独裁者的肖像。\n\n“我们早就是老搭档了，何必遮遮掩掩的。前总统的画像现在就算取下来也不迟，我不会因为这点事情就破坏上任第一天的氛围。”文森特颇有微词，但仍直率地坦露心声。\n\n“总统先生，取下画像的确没有问题，问题是该换上更合适的了。”\n\n文森特猛然想起，自己一直以来都没有一张适用于正式场合的照片。\n\n“多谢你的提醒，等工作结束后，我们拍一张总统与副总统的照片吧，民主政府不应把功劳揽到一人身上。”文森特的话巧妙地化解了尴尬。\n\n“哈哈哈——文森特先生，即使您成为总统，也还是没有变呢。我现在觉得充满了干劲，相信您和我一样。那么总统先生，您执政后的究竟把自己当作什么样的角色呢？”"
TCW.100.a:0 "“改革的牧羊人。”"

TCW.101.t:0 "独裁者的画框"
TCW.101.d:0 "墙上的元帅始终保持着五十八岁时的容颜。玛尔塔踮起脚尖擦拭镀金画框，抹布掠过那双鹰隼般的眼睛时，石膏剥落的墙皮簌簌落在她发间。这是1998年内战爆发前最后一批官方制式画像，油彩在潮湿的雨季里洇出细密裂纹，让克里斯蒂安元帅的面容如同浸泡在泪水中。\n\n餐刀磕碰瓷盘的轻响惊醒了沉思的雷蒙德。这位炼钢厂会计盯着《洛琛日报》头版，新总统文森特签署法令的新闻旁，市长用红笔圈出"即日起清除公共及私人场所悬挂的前政权象征物"。十七岁的长子正把传单塞进帆布包，那些印着向日葵的纸页从拉链缺口探出嫩黄的花瓣。\n\n"市政厅广场的铜像昨天被推倒了。"妻子索菲娅忽然开口，汤匙在牛肉汤里划出暗红色的漩涡。五年前保皇派的燃烧弹照亮南郊夜空那晚，她也是这样机械地搅动着汤水。当时整条街的窗棂都在震颤，隔壁桑切斯家因为元帅画像在爆炸中倾倒，黎明时分就被宪兵队带走——那些以宪兵打着战时维稳的名义，同时收缴了青年党地下报社藏在阁楼的油印机。\n\n阿尔瓦罗抓起外套冲出门时，画框里的克里斯蒂安正在暮色中凝视这个家。十二岁的艾琳趴在地毯上画水彩，蜡笔将元帅胸前的勋章涂成彩虹色。雷蒙德想起上个月工会选举，当他颤 抖着把选票投入贴着进步党标志的票箱，后颈仿佛还残留着画像里冰冷的视线。\n\n午夜惊雷炸响时，索菲娅突然翻身坐起。借着闪电的蓝光，雷蒙德看见妻子踩着椅子扯下天鹅绒窗帘。布料撕裂的声响中，元帅的面容被掩埋在厚重的墨绿色之后。雨滴拍打窗玻璃的节奏里，他听见索菲娅轻声说："明天该买新的墙纸了。"\n\n清除令颁布第七天，艾琳踮着脚撕下最后一片金箔。剥落的墙纸上留着深褐色的方形印记，像块陈年的伤疤。阿尔瓦罗把铲下的石膏碎屑扫进印着"托莱多复兴计划"字样的牛皮纸袋，那些曾经神圣的金粉如今混在尘埃里，顺着通风管道的铁网飘向晨雾中的街道。\n\n春日的阳光穿过没有画像的墙壁，在空白的伤痕上投下菱形光斑。索菲娅哼着罢工时期流传的小调，将艾琳画的向日葵贴在霉斑位置。雷蒙德望着女儿用蜡笔给花瓣描上金边，忽然发现褪色的墙纸裂缝里，钻出一茎怯生生的绿芽。"
TCW.101.a:0 "向日葵便是新生"

TCW.102.t:0 "政局清朗"
TCW.102.d:0 "文森特推开议会大厅的橡木门，晨光斜照在珀克元帅肩章未愈的压痕上。这位曾亲手签署极右翼军官清洗令的军方代表，此刻正将佩枪锁进桌下的指纹保险柜。金属碰撞声让进步党领袖列维奇抬起头——他镜片后的目光像审计报表般扫过珀克胸前的星章。\n\n"《军事预算修正案》现在审议。"文森特敲了敲铜制议长槌。这把槌子是从军事博物馆借来的，替换了原先镶着金鹰的元帅权杖。\n\n列维奇起身时，西装翻领上的天平徽章擦过话筒："第十七条医疗船改造预算虚高百分之三十七。"他抽出的供应商报价单还带着打印机余温，"这家建材公司去年刚被查出与民族至上同盟有资金往来。"\n\n珀克元帅解开枪套的手指顿了顿。青年党秘书处的监控屏实时显示着保险柜闭锁状态，这是上月通过的《武装人员入厅管理细则》新增条款。"防辐射钢板需要特殊工艺——"\n\n"特殊到生产车间在废弃的元帅兵工厂？"无党派议员莫雷突然插话。他举起放大镜对准文件照片，"看看这个厂房标牌，字母缺口和极右翼的印刷模板完全一致。"\n\n科维斯族代表阿玛拉从后排扔出个麻布包，晒干的止血草簌簌掉落："圣河谷铁路段的岩层报告，某些人最好看看断层数据再决定要不要偷工减料。"她手指点在图纸某处，那里正是二十年前元帅部队轰炸过的古代祭坛遗址。\n\n文森特注意到珀克元帅喉结动了动。三个月前正是这位军方代表，在深夜向青年党移交了民族至上同盟的潜伏名单。此刻他军装内袋露出的怀表链上，还挂着枚被子弹击穿的进步党徽章——那是1998年内战时列维奇送给他的停战信物。\n\n"修正案第十七条重新招标。"珀克突然扯开领口，露出锁骨处的弹痕，"军方接受科维斯建材协会的资质审查。"\n\n列维奇的红钢笔在纸上划出尖啸："采购过程由进步党审计组全程监督。"\n\n"附议。"阿玛拉将狼牙印章按在修正案末尾。\n\n"通过。"文森特压下议长槌时，槌头反射的阳光正好刺中后排空置的极右翼席位——那里积了半寸厚的灰。"
TCW.102.a:0 "至此摆脱旧时代"

TCW.103.t:0 "水落石出"
TCW.103.d:0 "西南矿坑爆炸的第七小时，文森特攥着安全帽闯入救援指挥部。头盔内侧的裂痕硌疼他太阳穴。\n\n"死亡名单有三十七个重名。"青年党秘书将平板推过来，光标在"弗朗索瓦"的身份证号上跳动，"都是外包公司的幽灵工。"文森特指甲抠进安全帽裂口，塑料碎屑混着血痂刺入指缝。监控屏里，列维奇正握着矿主的手慰问家属，进步党徽章在他胸口反着冷光。\n\n科维斯族的阿玛拉踹开档案室门时，草药烟味冲散了霉味。"看看这个。"她将泛黄的施工图拍在桌上，1998年铁路工程的红色批注与当前矿道走向完全重合，"当年贪墨安全款的人，现在换了党徽坐进议会。"\n\n青年党调查组连夜突袭承包商别墅。外包人员坐在佩戴进步党徽的人身边，将账本扔进熔炉。调查员将他们抓了个正着，从账本中获悉安全款在内战时以“撤离难民”的名义进入某位军政局议员账上。\n\n议会紧急质询会上，文森特举起熔化的工帽残骸："防火材料预算被替换成易燃塑料，就像某些人的良心。"列维奇亦然有苦衷："那是独裁者时期被临时克扣了的经费，矿洞工程能维护到现在已经使奇迹了。\n\n科维斯族代表阿玛拉从后排掷出个麻布包，三百颗伪劣安全帽卡扣叮当散落。她点燃草药烟管，青烟裹着检测报告飘向直播镜头："阻燃剂含量零。"\n\n除此之外，有遇难者家属上交了被外包商威胁时的录音，矿主那句："死个把工人就当淘汰劣质保单。"回荡在议会。\n\n议会的声讨之声达到了鼎沸之势，眼见即将达到不可控制的地步。文森特感到不妙：此事的确是元帅独裁时期遗留的苦果，并且涉事议员只是无足轻重的进步党员和。\n\n“无论如何，青年党都必须为此接受国民的判罚。但司法审查认为此事与列维奇先生并无关系，而是与独裁者对国民的剥削有关，国民议会是民主制度的一环，而法制是支撑民主的核心，现在宣判结果。”总统遏制住了激进的议会，重新回归理性。\n\n审查长一锤定音后，依据《托莱多国民议会条例》，涉事议员承担刑事责任，其席位将由其他代表候补。"
TCW.103.a:0 "青年党的话语权进一步扩大。"

###新闻###
TCWNews.1.t:0 "托莱多联邦的胜利"
TCWNews.1.d:0 "联邦总统克斯里蒂安在刺杀中依靠顽强生命力幸存后，所有联邦支持者都庆幸国家的中流砥柱没有倒塌，复辟者们胆战心惊。作为富有经验的旧元帅、民主过渡政府的执政者，克里斯蒂安坚定地团结民主党派，重新开放了议会选举，高效地集结起了反攻力量，将复辟势力从南方乃至各大自治地区剿灭。\n\n联邦的胜利振奋了南巴斯蒂亚的共和主义者，许多国家纷纷发电祝贺。但国内仍有许多问题，各界人士都在期盼克里斯蒂安的改革承诺。不知过渡政府何时能完成“过渡”。"
TCWNews.1.a:0 "相信总统会给联邦带来进步"
TCWNews.1.b:0 "即使胜利，但这样的总统真的足以使人民信任吗？"

TCWNews.2.t:0 "托莱多王国的胜利"
TCWNews.2.d:0 "经过旷日持久的战争，拥护王室的王党军队凭借高涨的士气和起义军数量的优势，将联邦军队穿插围剿，一步步突破联邦军队防线，最后将联邦政府赶出洛琛，取得里程碑式的胜利。联邦政府的势力在北方被逐渐合围剿杀，再无反攻之力。\n\n托莱多弗西汀家族现任族长连凡特·让·弗西汀下令将联邦政府大楼进行改造，并举行加冕典礼，加冕为连凡特七世。目前，南巴斯蒂亚的共和主义受到了极其严重的挑战，保守与进步势力之间的冲突只会愈演愈烈。"
TCWNews.2.a:0 "重新回到了我们的臣民之上"
TCWNews.2.b:0 "多一批废弃的地图罢了"

TCWNews.3.t:0 "托莱多内战爆发"
TCWNews.3.d:0 "来自托莱多两个政权的权威消息：被共和革命放逐的王室不仅延续了血脉，并且利用了人民对独裁者的不满，在南部打响了王室复仇的第一枪；而面对南方的暴乱，联邦政府同样号召了共和主义支持者共同对抗复辟势力，同时执政者给予了民主化改革的承诺，才得以制止大规模叛变。\n\n目前，战争全面爆发，但仅有联邦政府在竭力维持战线。而南巴斯蒂亚各国仅仅只是口头上的谴责，而无实质行动，看起来南巴斯蒂亚的分裂趋势在所难免。而托莱多联邦这个由南巴各国在《克拉亚诺条约》中缝合起来的联邦，不知是否能在新的反革命浪潮中维持自身。"
TCWNews.3.a:0 "大厦将倾亦或涅槃重生？"

TCWNews.4.t:0 "克里斯蒂安大元帅去世！"
TCWNews.4.d:0 "托莱多国家新闻社报道，执掌托莱多联邦22年的克里斯蒂安大元帅于今日凌晨去世。据发言人强调，大元帅的死因为刺杀导致的后遗症。政治强人的离世带来了久违的混乱，从首都到各地方自治国都爆发了情势不一的争取民主游行。目前托莱多联邦的最高权力已经被移交给国防军元帅珀克·德拉西尔，军方已在各大城市和地方自治国实在宵禁。据悉，德拉西尔元帅在广播演讲中提到，军方将保证民主选举顺利且公平的举行，不日就将举行大选。\n\n各国对克里斯蒂安大元帅的去世评价不一，南巴各国政府已向托莱多政府表示哀悼。不过有许多民主人士与自由主义者将克里斯蒂安称为：“独裁者”与“刽子手”。总而言之，克里斯蒂安大元帅的离世对于托莱多联邦来讲将会是一个巨大的损失。"
TCWNews.4.a:0 "死得好，压迫者应有的结局！"
TCWNews.4.b:0 "民主烈士们可以安息了。"
TCWNews.4.c:0 "安息吧，你该休息了。"
TCWNews.4.dd:0 "心软的下场。"
TCWNews.4.e:0 "人类的极限不过如此。"

TCWNews.5.t:0 "托莱多拥抱民主"
TCWNews.5.d:0 "在经历残酷的内战后，托莱多的命途多舛还未结束，大元帅的离世引爆了洛琛高层内部的权力斗争。威权派借以大元帅的名义正当化建立极权政府的意图，夺权的意图甚至危及到临时政府总统本人；而临时大总统不得不与民主派捆绑起来。\n\n民主派夺得了威权派操控军政权力的证据后，开始分化威权派势力，之后兵不血刃地逮捕其首脑。尽管最后的威权主义者尝试负隅顽抗，但终究湮灭在了民主派的枪林弹雨中。\n\n托莱多群众已将投票箱围堵得水泄不通，大选结果将会如期而至。这个国家的混沌时期结束了，时事评论家对于托莱多的发展前景十分乐观。"
TCWNews.5.a:0 "南巴斯蒂亚的民主思潮还是浸透了托莱多。"

TCWNews.6.t:0 "托莱多秩序井然"
TCWNews.6.d:0 "在经历残酷的内战后，托莱多的命途多舛还未结束，大元帅的离世引爆了洛琛高层内部的权力斗争。威权派借以大元帅的名义正当化建立极权政府的意图，夺权的意图甚至危及到临时政府总统本人；而临时大总统不得不与民主派捆绑起来。\n\n威权派凭借操纵军政事务获得优势兵力，将民主派势力围困在首都。民主派和临时大总统即便到了最终关头也不屈服，但事已至此，这群自诩“义士”的人扛起沾满鲜血的步枪向宪兵防爆盾墙发起冲锋后倒下，最后尸骨无存。\n\n但洛琛的阴霾还未散去，即将到来的是更为疯狂和残忍的“决斗”，新的政府只容许一个人继承大元帅的头衔和意志......"
TCWNews.6.a:0 "独裁者的野心已将托莱多包围。"

TCWNews.7.t:0 "托莱多西南大矿难"
TCWNews.7.d:0 "12月21日，据托莱多国民电台报道，托莱多西南部山区出现国内史无前例的事故工程，由于设备老化以及组织疏漏，造成大量炸药爆炸并引发次生雪崩灾害。目前空余军事力量与消防人员几乎都参与到救灾中去，南巴斯蒂亚民间组织也自发参与到其中去。事后的灾情评估专家认定：此次灾情大多是人为因素导致的。最终此事引发了新一轮的民意沸腾，呼吁政府严惩承包方与政府负责人。"
TCWNews.7.a:0 "命途多舛的国家。"

