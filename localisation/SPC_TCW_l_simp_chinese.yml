TCW_worldunion_democrat_party:0 "进步正义党"
TCW_worldunion_democrat_party_long:0 "进步正义党\n§g起初，这个党的前身只是一个“不切实际主义大帐篷”。难民和激进主义者先后加入，为少数群体的成员被驱逐，激进主义者被逮捕。没有明确的纲领，甚至青年党为了在政坛明哲保身，拒绝了几乎一切合作。\n\n随后，正义党开始接受政治逃难者的“资助”，从营销开始，为自身积累了夯实的经济基础。国内的资本流入，企业也从中获取渠道信息，不少企业家成为了党员，并逐渐掌握党内话语权。进步党重生的同时，也致力于投资促进经济发展，因此对于元帅幕僚来说，毁灭这个派系已成妄想。\n\n洗心革面的进步党在与青年党的会晤中取得巨大成功，暂时摒弃了意识形态的差异，最终或得了与威权派在首府对垒的权力。但随着左翼人士加入，正义党员对未来的方向正在产生迷茫。§!"
TCW_liberal_republican_party:0 "托莱多联邦共和党"
TCW_liberal_republican_party_long:0 "托莱多联邦共和党"
TCW_conservative_republican_party:0 "进步青年党"
TCW_conservative_republican_party_long:0 "进步青年党\n§g1851年托莱多民主共和国建立之始，出现了青年党的前身——民主革命委员会。委员们的理想宏伟，却逃不过严峻现实的桎梏。一手对付保王党和教会，一手阻挡外部魔兽威胁，并且与南巴斯蒂亚联邦斡旋以维护国家利益。1969年南巴斯蒂亚联邦发动对外战争，随后负债高阁与信用危机迫使重工业这根支柱倒下。未及战争结束，民主派政府即刻倒台，克里斯蒂安将军发动政变夺取政权，随后任命自己为元帅，为了回归稳定不惜向宗教界和威权主义妥协。对于民主革命的成果而言，除了留下破败不堪的共和制度联邦，其余付之东流。\n\n随后民主派在国内形势稳定后进行改组，成立了“进步青年党”。新鲜的血液汲取教训并更加成熟稳重，在民间舆论上逐渐占据上风。在联合代表新工业资产阶级的“进步正义党”后，给晚年的元帅亦或总统及其官僚造成巨大冲击。§!"
TCW_authoritarian_republican_party:0 "托莱多国民党"
TCW_authoritarian_republican_party_long:0 "托莱多国民党\n§g除了在政府文件以外，没有人以会直接称呼这个“党”的全名。与其称之为“党”，不如把它看作一个大帐篷式的机构。这个机构涵盖从上至下的所有政府官员，形成了一套运行高效的治理体系，如同一座高堡矗立于洛琛首府，而高堡之上的人面对新派系的挑战，无从应对大厦将倾的事实。§!"
TCW_authoritarian_republican_party_new:0 "托莱多护国党"
TCW_authoritarian_republican_party_new_long:0 "托莱多护国党"
TCW_national_socialist_party:0 "民族至上同盟"
TCW_national_socialist_party_long:0 "民族至上同盟-工团派\n§g他们作为托莱多联邦最神秘莫测的政治团体，外界称之为“另类左翼”，只有老一辈公民见证其复杂崎岖的历程。共产主义在这片贫瘠的土地上未能结出丰硕的果实，国民的民族狂热浸透在每一寸肌肤里，梦想着重塑南巴斯蒂亚的秩序。国际主义者多次血洒这片土地，使得这片土地被冠以“革命坟场”的蔑称。但这片土地并不缺乏维护工人阶级的群体。国际共产主义者离开后，威权的左翼人士抓住了国民的狂热精神，并利用工团主义拉拢工人群体，对外保持强硬的态度。本土化的左翼威权主张获得了建制威权派的一定认可，但难以在元帅政府夺取话语权。§!"
TCW_authoritarian_nationalism_party:0 "民族至上同盟"
TCW_authoritarian_nationalism_party_long:0 "民族至上同盟-秩序派\n§g继承大元帅的衣钵，这个党同样是围绕一个人的思想来运作，这个人便是元帅的故友：赫尔曼·霍札。赫尔曼对于一个稳定的政府有着更加独到的见解，他不满足于像大元帅一样以原始的手段和权力以及短浅的政治眼光维持统治。他梦想利用魔法和机械在内的一切工具来建立一个高效和简朴的政府，以及稳定和高尚的国家，对于新兴的进步主义嗤之以鼻。§!"
