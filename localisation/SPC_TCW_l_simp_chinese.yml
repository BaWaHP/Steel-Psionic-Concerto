TCW_resettlement_of_refugees_decision_over:0 "已完成难民的安置！"
TCW_resettlement_of_refugees_decision_category:0 "安置难民"
TCW_resettlement_of_refugees_decision_category_desc:0 "自从西莉迪亚政局动乱开始，难民如潮水般从东部边境涌入，尽管民间吸纳难民取得成效，但出于文化信仰等立场差异，社会矛盾逐渐激化。国会内强硬派要求总统授权通过以铁腕著称的《特殊警务执法条例》从而镇压动乱，而温和的民主政党共同请愿完善劳动保障法规用于吸纳劳动力和人才。据安全部门不完全统计报告：已有联邦的敌对分子，包括但不限于保皇派利用此次危机，在边疆和自治州宣扬“王政”，并且数次冲突中调查发现违法持枪和禁令魔法案例显著增加。总统先生对国会论战毫无兴致，他仅仅想维护联邦的稳定，无论如何，只争朝夕的平稳航行。"
