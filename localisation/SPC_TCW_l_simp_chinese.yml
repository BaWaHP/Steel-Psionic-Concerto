###领导人###
TCW_cervantes_domingo_cristian:0 "塞万提斯·多明戈·克里斯蒂安"
TCW_cervantes_domingo_cristian_desc:0 "克里斯蒂安是个勇敢而坚定的人。至少托莱多的百姓是这么想的，他自己也是这么想的。几十年的军旅生涯让他在军中威望颇高，作为参加过伟大战争的军人家族的后人，虽然只是搜集关于那场战争的资料，但这个独特的经历就足以让他的内心深受震撼。\n\n20世纪中期，保皇派的阴谋被联邦安全理事会调查发现，克里斯蒂安作为将军亲自参与调查，尽管疯狂的保皇派再次死灰复燃，但共和理想已经深入人心，最终这次内战结束了，克里斯蒂安雷厉风行的行动发挥了中流砥柱的作用，使得他得以佩戴满身勋章退休。作为南巴斯蒂亚联邦东部地区唯一的一个原住民政权，托莱多联邦的种族问题一直是笼罩在整个国家上空的一片阴云。因为家庭传统的教育，他一直对北方蛮横的魔兽有着一丝厌恶，因为每次南巴斯蒂亚的灾难无不少了魔兽的丑恶面容。\n\n作为一个军人，一个种族主义者。克里斯蒂安眼睁睁看着托莱多一步步陷入动荡的泥潭。他不忍心让这个原住民纯度较高的国家被所谓“多元化改革”玷污，他终于坐不住了，利用自己在军队的名望和百姓的爱戴。克里斯蒂安成功逼迫懦弱的总统下台，自己宣布组建一个稳定的过渡政府。“我所做的一切都是为了托莱多。”他这样坚信着，至少他坚信着并且会一直坚定地走下去。"
TCW_levitch_sorrell:0 "列维奇·索雷尔"
TCW_national_assembly:0 "国民大议会"
TCW_arcado_vincent:0 "阿卡多·文森特"
TCW_arcado_vincent_desc:0 "得益于父亲的声望，无论尊重与否，人们都称呼他为“小文森特”，虽然秉持父亲的意志，但不像是父亲的影子。\n\n在父亲遇害前，他的志向不过是参军；父亲生前与教会产生了几乎无法弥合的分歧，青年党壮大，带来的不是尊重，而是反对派的忌惮与联合孤立。就在父亲即将击溃对手时，大元帅选择在议会表决中弃权，背叛了青年党，不久后大文森特受到刺杀，找到案件替罪者后不了了之。\n\n悲愤交加的小文森特浇灭了对元帅的幻想，辞去军队一切职务，改弦更张成为党魁，短时间内结束党内青黄不接的局面，重新将青年党团结起来。从青年党的斗争历程中，他发觉宗教是阻碍托莱多现代化的痼疾，从始至终都是青年党最大反对者，于是激进世俗化被写进党纲。尽管自由派对此颇有微词，但青年党的民族民主主义原则仍能保证绝大多数拥护。\n\n元帅早已行将就木，青年党与正义党的联合势不可当，依照文森特设计的蓝图，一个现代化的“模范共和国”未来正在熠熠生辉。"
