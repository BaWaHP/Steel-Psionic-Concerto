TCW_army_of_ambition_desc:0 "尽管国力颇微，但每当南巴斯蒂亚强权衰落时，我们的人民便会奋起反抗，并向外扩张。我们用行动证明，联邦拥有南大陆最有野心的军队与人民。"
TCW_division_of_power:0 "权力分化"
TCW_division_of_power_desc:0 "全国分为中央直辖区、3个自治区和1个共和国，分别是托莱多中央直辖区、社罗共和国、阿内托自治区、维涅马自治区、德孔波自治区。4个高度自治的区域带来了高昂的行政和经济成本，并且文化信仰不尽相同。"
TCW_civ_of_matters:0 "物质文明"
