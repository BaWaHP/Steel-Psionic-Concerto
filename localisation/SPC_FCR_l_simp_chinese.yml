###民族精神###
FCR_three_heroes:0 "三个好汉一个帮"
FCR_three_heroes_tt:0 "§R无法训练部队、解散部队或编辑部队编制。§!\n"
FCR_three_heroes_desc:0 "§R“不要试图考验友谊，但友谊总有要接受考验的一天。”§!\n\n目前的边疆骑兵团由三个较为独立的兵团组成。这三个兵团分别是斯康德鲁·阿尔瑞西斯领导的艾徳骑兵团、哈特雷斯·德斯波特领导的穿林骑兵团以及曼尼·斯特罗纳·马蒂奥达领导的曼尼骑兵团。这三个兵团的士兵早已与彼此打成一片，无论是战斗还是劫掠，三个兵团的士兵早已能够做到紧密配合。在敌人和老百姓眼里，这三个兵团之间实在没有什么隔阂。但这只是一半的真相：这三个兵团的士兵依然会优先听从所属团长的命令而非目前明面上的领袖弗拉斯·科奈的命令。由于目前弗拉斯和三位团长关系良好，更有合作对抗顿伏茨克的需要，边疆骑兵团才会如此团结。但是，这种合作还能持续多久呢？合作终止那天，兵团的命运又将何去何从？\n\n很遗憾，他们也不知道。"
FCR_new_cavalry:0 "新时代，新“骑兵”"
FCR_new_cavalry_desc:0 "别被骑兵团这个词误导了，骑兵团里并不全部都是骑兵。骑兵团确实拥有大量机动部队，而这些机动部队不仅包括骑兵，还包括摩托化部队甚至装甲部队。骑兵团久经沙场，他们已经成为了机动作战的专家，足以与更强大的对手抗衡。"
FCR_ravaged_land:0 "铁蹄蹂躏之地"
FCR_ravaged_land_desc:0 "骑兵团的士兵并不是什么纪律涣散的乌合之众，恰恰相反，他们纪律严明，经验丰富，能够坚定且高效地执行长官的命令。但这“严明的纪律”里并不包括爱护平民。他们的长官，包括骑兵团团长都很乐意让士兵对平民进行“适当”的劫掠，以此作为对他们的奖赏。很快，这片原本还算富饶的土地就陷入了萧条与混乱之中。骑兵团不在乎老百姓的死活，相应的，老百姓也不会支持他们。"
FCR_assistance_from_krayano:0 "克拉亚诺的援助"
FCR_assistance_from_krayano_desc:0 "历史上，顿伏茨克曾侵略克拉亚诺并对克拉亚诺犯下了残忍的战争罪行。因此克拉亚诺一直对顿伏茨克保有敌意。当边疆骑兵团发起对顿伏茨克的叛乱时，克拉亚诺共和国慷慨地援助了边疆骑兵团，骑兵团也乐意好好利用这些援助物资给顿伏茨克添多点麻烦。值得担忧的是，莫泽政变上台后，克拉亚诺的援助一年比一年少，边疆骑兵团不得不开始思考如何面对没有克拉亚诺援助的未来。"
FCR_bastard_peace:0 "混账和平"
FCR_bastard_peace_tt:0 "§R无法修改贸易法案、经济政策、外交姿态政策、征兵政策。§!\n"
FCR_bastard_peace_desc:0 "1973年，艾德骑兵团、曼尼骑兵团、穿林骑兵团联合组成的边疆骑兵团为了土地、权力与财富于欧文德洛地区对顿伏茨克发动了叛乱，分裂了顿伏茨克的“疆土”。最终迫于各方压力，顿伏茨克承认了欧文德洛自治辖区（也称边疆骑兵团辖区）的自治地位，辖区名义上依然需要向大公本人效忠，于是双方和谈，结束了战争。但所有人都清楚，边疆骑兵团辖区对大公的忠诚仅存在于纸上。随着辖区内反半人马思想越发激进，骑兵团团长野心愈发膨胀，顿伏茨克大公国逐渐恢复实力，这脆弱的“混账和平”终将再次被战火吞噬。"

###领导人###
FCR_fras_kona:0 "弗拉斯·科奈"
FCR_fras_kona_desc:0 "没人觉得弗拉斯是边疆骑兵团辖区的真正统治者，但也没人觉得弗拉斯是个毫无实权的提线木偶。他是这个“辖区”名义上的顿伏茨克大公国授权的总督，但所有人知道，弗拉斯和斯康德鲁团长等人一样，对半人马的顿伏茨克大公国毫无忠诚可言。在边疆骑兵团发起对顿伏茨克的反叛后，泰格赫德的半人马市长豪尔·瓦西里神秘死亡。在他死后，弗拉斯这个泰格赫德的副市长立刻加入了骑兵团的反叛事业。他能做到这个位子上是三位骑兵团团长互相妥协的产物，也是骑兵团对大公国的不算妥协的妥协——弗拉斯曾是顿伏茨克的官员。同时，这些武夫需要他这样的职业官僚治理国家并负责外交。当战争结束后，他们三人便推举他成为这个“辖区”名义上的总督，他则欣然赴任。\n\n现在，他负责着边疆骑兵团辖区的民事与外交，而他的威望与权力则是完全仰仗着骑兵团，毕竟辖区内的所有武装力量都听命于三个骑兵团团长。他对此倒也没有什么怨言，这场叛乱中骑兵团带着他捞的油水够多了。问题在于，抢到财产只是第一步，如何让它们永远属于自己才是难题。有些值得担心或庆贺的是，斯康德鲁·阿尔瑞西斯与哈特雷斯·德斯波特这两位团长也有同样的问题。"
