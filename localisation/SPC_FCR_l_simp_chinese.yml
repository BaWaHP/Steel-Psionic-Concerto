FCR_mental_disorders_desc:0 "也许是被炮火打坏了脑袋，也许是被痛苦的记忆扭曲了身心，这位指挥官已经有些精神失常了。但由于种种原因，这位指挥官依然是一名军人，暂时还能够履行他的职责。"
FCR_force_surpasses:0 "武力超群"
FCR_force_surpasses_desc:0 "该指挥官拥有着远超一般魔导步兵的个人武力。尽管这份异于常人的武力无法在现代大规模作战中左右战局，但这至少可以保护好指挥官本人并在战术层面上发挥较大的作用。"