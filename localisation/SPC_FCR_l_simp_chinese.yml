###将领###
FCR_pandanil_anderson:0 "潘达尼尔·安德森"

###内阁###
FCR_benito_aconton_advisor_desc:0 "班尼托·阿康顿原本只是个鲁萨尔联盟政府里的一个小小的会计，1988年，他查到了一些不该查的东西，甚至遭到了死亡威胁。但为了不昧良心做事，他决定坚持查下去，结果就是他差点被来历不明的杀手杀掉。由于他在自卫过程中杀了59个人，他只能一路逃到秩序混乱的边疆骑兵团辖区并成为了曼尼骑兵团的一员。幸运或不幸的是，曼尼骑兵团简直就是亡命之徒的避难所，这里的士兵要么是卑劣的亡命徒，要么是强悍的精神病，可以说，仇家和鲁萨尔警察恐怕是不会来这种地方找他的麻烦了。班尼托初到曼尼骑兵团时就受到了曼尼团长的赏识——在这个人均罪犯和精神病的部队里，他这样的战力如此强悍的文官实在可贵。而他的学历也是曼尼骑兵团里第二高的（学历最高的是曼尼团长，他有克拉亚诺国立大学的哲学和法学博士学位，但现在他的精神疾病越来越严重了）于是班尼托自然而然的得到了晋升乃至优待。在辖区里，很多兵痞找过他麻烦，都被他用武力解决了，所以在这个崇尚暴力的地方，他越来越受欢迎。然而，班尼托并不会因此变得开心——他只想平静地享受自己的人生，但自从他查到“不该查的账”的那一天起，他就注定不会有平静而体面的生活了。"
