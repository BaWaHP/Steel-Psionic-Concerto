FCR_edmund_smirnov:0 "埃德蒙·斯米尔诺夫"
FCR_edmund_smirnov_advisor_desc:0 ""
FCR_daniel_garcia:0 "丹尼尔·加西亚"
FCR_daniel_garcia_advisor_desc:0 ""
FCR_pablo_martin:0 "巴勃罗·马丁"
FCR_pablo_martin_advisor_desc:0 ""
FCR_skandru_alrisis_advisor_desc:0 "现任艾德骑兵团团长斯康德鲁·阿尔瑞西斯出生于泰格赫德的一个公务员家庭中，从小成绩优异的他很快便意识到了半人马与人类的不同：半人马在各个领域都会受到政府的优待，哪怕是在当地政府里，人类公务员与半人马公务员的待遇也大有不同。他的父亲也常常同时受到半人马上司和半人马下属的刁难，这让年幼的斯康德鲁下定决心——长大后他一定也要当半人马！\n\n当然，聪明的斯康德鲁长大后就明白了，人类是当不了半人马的，他想当的并不是半人马，而是被所有人处处优待的人。中学毕业后他进入了半人马为人类合作者开办的莱德军事学校。他学习刻苦而认真，受到了半人马教官与人类同学的认可与欢迎。他还与哈特雷斯与潘达尼尔两人成为了酒肉朋友。在几十年后，他们将一起发动对顿伏茨克的叛乱，成为有过命交情的酒肉朋友。毕业后，他便顺理成章的成为了顿伏茨克三大人类骑兵团之一的艾德骑兵团的一名军官。通过自己在军校中积累的人脉，他升迁迅速，在世界大战中也立下了赫赫战功。尽管如此，世界大战的恐怖还是让恐惧一度扭曲了他的身心，在前线的他几乎无法入眠，直到有一天，艾德骑兵团团长战死了，他立刻从对战争的恐惧中清醒过来——升迁的机会来了！他抓住了这个机会，成为了新任艾德骑兵团团长。\n\n战后，利用职务之便，他赚得了一笔又一笔不义之财。斯康德鲁知道，自己的渎职行为一定会遭到顿伏茨克方面的调查，于是他不得不审视自己到底还有什么牌可以打。最终，1973年反对顿伏茨克退出南巴斯蒂亚联邦的抗议浪潮启迪了他——要是他占据了反抗半人马这样的大义名分，谁还会在乎他贪了多少钱呢？于是他找来了穿林骑兵团团长哈特雷斯以及新任曼尼骑兵团团长曼尼·斯特罗纳·马蒂奥达。哈特雷斯认为正在进行战后裁军的顿伏茨克很快就会裁到他们这些人类合作部队头上，要是这些人类部队没了他们屁都不是，于是他决定加入斯康德鲁。而曼尼·斯特罗纳·马蒂奥达刚刚奸杀了前任曼尼骑兵团团长曼尼·达波特，完全没有拒绝的理由。于是，“起义” 开始了，结果比他们想象中的要顺利的多，不出几个月，死了几万人后，他们便为欧文德洛赢得了自治的地位。他们也成为了欧文德洛地区最成功的人。赢得了权力与土地后，他还要利用这些继续拼命敛财。他知道，联邦日益衰败是事实，但商机依然是随处可见的，他和他的骑兵团仍需奋斗。"
FCR_hartless_desport:0 "哈特雷斯·德斯波特"
FCR_hartless_desport_advisor_desc:0 "现任穿林骑兵团团长哈特雷斯·德斯波特自认是个老实人——在家里听父母的，在学校听老师的，在军校听教官的，在战场上听长官的。直到有一天，他再也不能当老实人了。1973年，顿伏茨克退出联邦，人类平民举行了示威游行。他知道，正在裁军的顿伏茨克必然会派出半人马部队残酷镇压这些平民然后顺势裁掉他们这些人类部队。于是，为了保住自己几十年来的经营，他与另外两位人类骑兵团团长一起发起了对顿伏茨克的叛乱。结果比想象中还好，不出几个月，死了几万人后，他们便为欧文德洛赢得了自治的地位。他们也成为了欧文德洛地区最成功的人。他和斯康德鲁很像，捞钱、欺压平民、镇压反对派并对他们使用酷刑……但有一点不同，他更有想象力，他更喜欢对犯人使用更有想象力的酷刑。\n\n哈特雷斯是个非常优秀的战士兼指挥官，但他也已经六十岁了，他偶尔会想象自己会有一个怎样的退休生活。但事实是像他这样的人不能有一丝懈怠，手中的权力不拼命抓紧就会溜走。没有了权力，他的财产与生命将立刻失去保障，他会被毫无想象力的酷刑夺走尊严与生命——当然，就算是富有想象力的酷刑他也不想受。"
FCR_manny_strona_matteoda_advisor_desc:0 "现任曼尼骑兵团团长曼尼·斯特罗纳·马蒂奥达生于克拉亚诺的一个工程师家庭中。从小就学习成绩优异的他顺利考上了克拉亚诺国立大学并修读法学与哲学。在此过程中他受到了民族党的影响，逐渐成为了一个人类霸权主义者。世界大战的到来让他决定暂停自己的学业，为了“人类的大陆霸权”投身于恐怖的北巴斯蒂亚战场。在战争中，他第一次充分意识到自己有着卓越的魔法天赋，通过训练与战斗，他成为了一个极其强大的战士。他在战场上身先士卒，屡立战功，一路升到了上尉。直到有一天，两发不明攻击法术正中他的脑门与胸口。经过手术后，他侥幸捡回了一条命，但大脑神经却依然遭到了不可逆的损害，他的精神状态也越来越不正常。于是他只得退伍回到学校。\n\n回到学校后，精神失常且惯用酒精与毒品镇痛的曼尼逐渐失去了他的朋友和父母，但由于他利用战争的空闲时间努力学习，他依然拿到了博士学位。1972年毕业后他参加了克拉亚诺极右翼组织民族党，却因为糟糕的精神状态不受欢迎。在一次民族党聚会中，喝醉了的他因试图当众强奸一名民族党党员而遭到警察逮捕。由于警察错误估计了眼前这个“病怏怏的饿鬼”的实力，他很快逃离了警方的掌控并一路逃到了顿伏茨克欧文德洛地区，并加入了有着“不法分子避风港”之名的曼尼骑兵团。\n\n但事实是，曼尼骑兵团只是顿伏茨克用社会败类和精神病拼凑成的用于镇压殖民地的二线治安部队，所以招揽人员标准才会“不拘一格”。曼尼来到这支部队后，很快就遭到了前任团长曼尼·达波特的刁难——他成功用残暴与个人武力将社会败类拧成了一个部队，刁难下属就是他的手段之一——团长试图当众强奸曼尼·斯特罗纳·马蒂奥达，结果却是曼尼·斯特罗纳·马蒂奥达在所有人面前杀死了团长和他的亲信并侵犯了他的尸体，同时要求在场的其他人向他效忠。而崇尚暴力与个人武力的曼尼骑兵团官兵认可了曼尼·斯特罗纳·马蒂奥达的实力并宣誓向他效忠。在成为新团长的几个小时后，另外两位团长斯康德鲁·阿尔瑞西斯与哈特雷斯·德斯波特愉快地与他组成了反叛顿伏茨克的同盟。叛乱的结果比想象中还好，不出几个月，死了几万人后，他们便为欧文德洛赢得了自治的地位。由于克拉亚诺支持他们的反叛事业，克拉亚诺警方甚至撤销了对他的通缉令。\n\n战后，曼尼·斯特罗纳·马蒂奥达没有像另外两名团长那样利用职务之便大发横财，而是看到什么抢什么，想要什么就去抢。尽管他的事业成功了，但他的精神失常依然没有被治好，他的性格愈发古怪，喜怒无常，暴力倾向也越来越严重。也许是沉迷酒精与毒品的原因，他的实力渐渐不再增强，外表也越发消瘦。不洗衣服也不洗澡的他身上散发着难以言喻的恶臭，简直就像是被雨水浸泡过的尸骸般。可以说，曼尼几乎完全疯了，但曼尼骑兵团团长之位依然非他莫属。毕竟，人以类聚，物以群分。除了他这样的疯子外，还有谁会愿意统领这个充满了疯子的曼尼骑兵团呢？"

