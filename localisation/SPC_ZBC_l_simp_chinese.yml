###民族精神###
ZBC_amusing_to_death:0 "娱乐至死"
ZBC_amusing_to_death_desc:0 "这里是最前沿、最自由的社会试验田。与位于七河联邦的总部不同，这里的资本有着相当充分而自由的流动，就连这里的空气都会在你的肺里填满远离政治的新意与活力。无数人在这里寻找新的生活与梦想，这里碰撞交织着无数人的生活、利益、财富、命运……一切都可以灵活而合法的变通，别人的可以变成自己的、集体的可以变成个人的、国家的可以变成你我的。白天它显露出的是冰冷的钢铁森林，而晚上则是霓虹下的纸醉金迷，无数人驱动着它不知疲倦地转动——被塑造的美好的生活近在眼前，留恋沉醉在这里的人再也回不到过去了。大娱乐至上的时代只一步之遥，曾经的理性、秩序、逻辑性，逐渐转变为脱离语境、肤浅、碎化，几乎一切公共话语都开始有意无意的以娱乐的方式引导。\n\n——这是最好的时代，也是最坏的时代。"
ZBC_reply_1997:0 "请回答1997"
ZBC_reply_1997_desc:0 "自1997年12月25日起，我们与集团总部及我司三垣地区失联，这极不正常。我们的物资供应已经隐隐出现缺乏保障的风险，需要尽快与总部取得联系。\n\n——您好，您拨打的用户暂时无法接通，请稍后再拨。"
ZBC_national_policy_company:0 "国策公司"
ZBC_national_policy_company_desc:0 "于联碳集团而言，七河属南巴斯蒂亚公司（ZBC）的定位始终是一级国策公司。作为由七河联邦国家资本与“个人”资本合资建立的半官方半民间性质的特许经营企业，该公司以实现集团意志、服务联邦政策为主要目的。该公司也向南巴斯蒂亚地区与归化群体发行股票。基于该公司重要的的战略定位，董事会始终高度重视该公司对该地区的重要影响，并为其业务开展提供了相当程度的便利与自主权。\n\n——当然，重视归重视……"
ZBC_zhetysu_wave:0 "七河风尚"
ZBC_zhetysu_wave_desc:0 "文学、建筑、绘画、音乐、电影……乃至生活方式，你能想到的几乎所有东西都可以是“七河制造”。这里是七河风尚的样板间，我们的影响力在你们身上每个可以看得见的地方——你的衣服、手表、球鞋全都是七河制造。我们创造、定义这样便利而舒适的现代生活，并理所当然的用我们的商品让人们归顺我们的价值观。\n\n——We all made in Zhetysu!Right?"
ZBC_blue_UZD:0 "蓝色楚元"
ZBC_blue_UZD_desc:0 "七河属南巴斯蒂亚公司（ZBC）受外交与商务委员会和武装力量部（海军部）的双重领导，参加ZBC公司的船只除执行海外贸易活动外，也须完成海军部交下的运输、作战和巡逻任务。海军部预算中的资金通常被称为“蓝色楚元”，这部分预算资金逐年高企，已经影响到了海军陆战队的装备更迭。\n\n——楚元有两种颜色，一种是蓝色，另一种也是蓝色。"

