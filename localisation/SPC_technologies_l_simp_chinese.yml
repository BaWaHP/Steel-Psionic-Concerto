melee_support:0 "近战支援部队"
melee_support_desc:0 "在前线撕开突破口的好手。"

monster_tamer:0 "驯兽师"
monster_tamer_desc:0 "没有智慧，再强大的存在也同畜生无异。"

light_titan:0 "游侠级泰坦"
light_titan_desc:0 "战场上的游侠，火力强大而无处不在的轻型机甲。"

medium_titan:0 "天图级泰坦"
medium_titan_desc:0 "战场上的勇者，泰坦部队的中坚力量。"

heavy_titan:0 "巨妖级泰坦"
heavy_titan_desc:0 "战场上的巨妖，给予敌人末日审判的重型机甲。"

caster_infantry:0 "魔导步兵"
