caster_support:0 "魔导步兵支援连"
caster_support_desc:0 "擅长使用魔法进行远程打击和战场控制，提供强大的后援支持。"

caster_recon:0 "魔导通信侦察连"
caster_recon_desc:0 "专精于魔法增强的通讯和侦察，为战场提供关键情报和通信支持。"

caster_attacker:0 "魔导攻击支援连"
caster_attacker_desc:0 "精于发动强力魔法攻击，提供战场上的关键火力支援。"

caster_engineer:0 "魔导工程技术连"
caster_engineer_desc:0 "结合魔法与工程技术，擅长建设与修复设施，同时负责装备的维护，提高战场机动和防御能力。"

caster_logistics:0 "魔导联勤保障连"
caster_logistics_desc:0 "专注于使用魔法进行后勤补给和战地医疗支持，确保部队保持战斗力。"

lust_mountain:0 "肉山"
lust_mountain_desc:0 "王的最后遗产。"

centaur:0 "半人马"
