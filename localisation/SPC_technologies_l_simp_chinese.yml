hq_caster_infantry:0 "魔导步兵总部警卫"
hq_caster_infantry_desc:0 "一个规模较小的魔导步兵营，使得总部也具备强大的作战能力。"

hq_light_titan:0 "游侠级泰坦总部警卫"
hq_light_titan_desc:0 "泰坦单位使总部单位在战场上能更安全地移动，加强作战能力，还能提供防护性。"

hq_medium_titan:0 "天图级泰坦总部警卫"
hq_medium_titan_desc:0 "泰坦单位使总部单位在战场上能更安全地移动，加强作战能力，还能提供防护性。"

hq_heavy_titan:0 "巨妖级泰坦总部警卫"
hq_heavy_titan_desc:0 "泰坦单位使总部单位在战场上能更安全地移动，加强作战能力，还能提供防护性。"

hq_melee_infantry:0 "近战步兵总部警卫"
hq_melee_infantry_desc:0 "近战步兵单位可以协助总部更快速的突破封锁。"

hq_caster_support_company:0 "魔导参谋"
hq_caster_support_company_desc:0 "一个负责管理和协助魔导部队活动的专职指挥部参谋连。"

hq_caster_attacker_company:0 "魔导战斗大队"
hq_caster_attacker_company_desc:0 "由参谋部直属的在战场上随机应变，执行特殊任务，并且成为进攻的第一先锋的部队。"

hq_titan_company:0 "泰坦参谋"
hq_titan_company_desc:0 "主要负责管理泰坦单位的协作与战斗，可以帮助部队更好的在恶劣地形下作战。"

hq_melee_infantry_company:0 "近战步兵参谋"
hq_melee_infantry_company_desc:0 "主要负责管理近战单位的协作与战斗，可以帮助部队更好的突破敌军防线。"

hq_monster_tamer_company:0 "驯兽师参谋"
hq_monster_tamer_company_desc:0 "驯兽师参谋可以协助部队更好的在特殊环境作战。"

###团支援###
field_melee_support:0 "近战突击小组"
field_melee_support_desc:0 "冲锋陷阵，无惧死亡。"

field_caster_support:0 "魔导突击小队"
field_caster_support_desc:0 "将战斗魔导大队拆分成多个小队协助战斗。"

###装备###
primitive_equipment_0:0 "原始武器"
primitive_equipment_0_short:0 "原始武器"
primitive_equipment_0_desc:0 "原始的武器装备，主要为质量层次不齐的冷兵器，近战武器为主，偶尔有装备劣质弓箭的远程部队。"
primitive_equipment_1:0 "早期远程装备"
primitive_equipment_1_short:0 "早期远程装备"
primitive_equipment_1_desc:0 "早期的远程武器装备，抛去了原始的劣质近战武器，转而使用基于火药的枪械。有从枪口装弹的旧时代火枪，但也有使用金属弹壳弹药的后膛枪。"

police_equipment:0 "镇暴装备"
police_equipment_desc:0 "镇暴装备，针对暴民设计，配备有低杀伤性武器和轻型护甲，可以在不造成巨大伤亡的情况下驱赶暴动。"
police_equipment_0:0 "基础镇暴装备"
police_equipment_0_short:0 "基础镇暴装备"
police_equipment_0_desc:0 "基础的镇暴装备，针对暴民设计，配备有低杀伤性武器和轻型护甲，可以在不造成巨大伤亡的情况下驱赶暴动。"
police_equipment_1:0 "进阶镇暴装备"
police_equipment_1_short:0 "进阶镇暴装备"
police_equipment_1_desc:0 "改良我们的防暴装备并增加训练的烈度，吸取过去的经验，我们得以生产住更加符合需求的优质装备以满足镇暴需要。"
police_equipment_2:0 "现代防暴装备"
police_equipment_2_short:0 "现代防暴装备"
police_equipment_2_desc:0 "现代化的防暴装备包括了一系列反恐装备，从应对毒品蔓延的特殊药物到针对犯罪人员的低致命武器，再到针对暴力犯罪的轻武器和一系列高级防具。"

melee_equipment:0 "近战装备"
melee_equipment_desc:0 "近战用武器，依靠魔法和现代工业在如今的战场上再焕新春。"
melee_equipment_0:0 "基础近战装备"
melee_equipment_0_short:0 "基础近战装备"
melee_equipment_0_desc:0 "经过现代工业进行了改造的近战武器，比起过去有着更稳定的质量和战斗能力，是近距离战斗的好手。"
melee_equipment_1:0 "近战武器I型"
melee_equipment_1_short:0 "近战武器I型"
melee_equipment_1_desc:0 "新生代的近战武器，使用魔法进行强化，给予了战斗人员更强大的机动性和杀伤能力，并且能针对重型装甲造成可观伤害。"

light_melee_equipment_0:0 "轻型近战武器II型"
light_melee_equipment_0_short:0 "轻型近战武器II型"
light_melee_equipment_0_desc:0 "在吸取了过去制造轻量化武器的经验后，我们得以改进出一批全新的武器型号。这类轻量级武器虽然在性能上没有太大的提升，但是生产得到了简化，并且提高了稳定性。"
heavy_melee_equipment_0:0 "重型近战武器II型"
heavy_melee_equipment_0_short:0 "重型近战武器II型"
heavy_melee_equipment_0_desc:0 "在吸取了过去制造重型武器的经验后，我们得以改进出一批全新的武器型号。这类重型武器虽然笨重且难以运输，但他们能极大提高我们部队的战斗力。"

light_melee_equipment_1:0 "轻型近战武器III型"
light_melee_equipment_1_short:0 "轻型近战武器III型"
light_melee_equipment_1_desc:0 "轻型近战武器是相对便于制作的近战武器型号，在牺牲了战斗能力和防御能力的基础上换取了更大的产量。借助现代科技的发展，该型号在保留了前代灵巧，便于制作的特性的基础上，在战斗能力和防御能力上取得了一定发展。"
heavy_melee_equipment_1:0 "重型近战武器III型"
heavy_melee_equipment_1_short:0 "重型近战武器III型"
heavy_melee_equipment_1_desc:0 "重型近战武器是相对难以制作的近战武器型号，在牺牲了便携性和产量的基础上大幅提高了战斗能力。借助现代科技的发展，该型号在其擅长的战斗方面取得了长足的发展。"

infantry_equipment:0 "步兵装备"
infantry_equipment_short:0 "步兵装备"
infantry_equipment_desc:0 "个人和部队使用的步兵武器，以及士兵所需的其他装备。"
infantry_equipment_0:0 "步兵装备I型"
infantry_equipment_0_short:0 "步兵装备I型"
infantry_equipment_0_desc:0 "个人和部队使用的步兵武器。更现代化的增加了大量的冲锋枪和反坦克步枪。"
infantry_equipment_1:0 "步兵装备II型"
infantry_equipment_1_short:0 "步兵装备II型"
infantry_equipment_1_desc:0 "个人和部队使用的步兵武器。更现代化的增加了大量的冲锋枪和反坦克步枪。经过魔法技术的强化还加装了附魔设备。"
infantry_equipment_2:0 "步兵装备III型"
infantry_equipment_2_short:0 "步兵装备III型"
infantry_equipment_2_desc:0 "个人和部队使用的步兵武器。更现代化的增加了大量的冲锋枪和反坦克步枪。经过魔法技术的强化还加装了附魔设备。在此基础上得到了全方位的改进。"
infantry_equipment_3:0 "步兵装备IV型"
infantry_equipment_3_short:0 "步兵装备IV型"
infantry_equipment_3_desc:0 "个人和部队使用的步兵武器，以及士兵所需的其他装备。更现代化的增加了大量的冲锋枪和反坦克步枪。经过魔法技术的强化还加装了附魔设备，并利用现代化的技术进一步加强。"

uniform_equipment:0 "步兵装具"
uniform_equipment_desc:0 "个人和部队所使用的装备，通常为步兵部队拥有。包括基本的军队制服，近身武器，小型护盾生成器和少量药物。"
uniform_equipment_0:0 "早期步兵装具"
uniform_equipment_0_short:0 "早期步兵装具"
uniform_equipment_0_desc:0 "个人和部队所使用的装备，通常为步兵部队拥有。原始的型号为步兵提供了基本的保护，装备如钢盔的运用可以保护士兵不被流弹伤害，但装备质量不统一，质地较差且不善于应对恶劣环境。"
defensive_uniform_equipment_0:0 "防御型步兵装具"
defensive_uniform_equipment_0_short:0 "防御型步兵装具"
defensive_uniform_equipment_0_desc:0 "防御型的步兵装具聚焦在强化装备的防御性能上，从魔力回路更加精致的护盾生成器到使用现代工业完成的钢盔等一系列装备。"
durable_uniform_equipment_0:0 "耐用型步兵装具"
durable_uniform_equipment_0_short:0 "耐用型步兵装具"
durable_uniform_equipment_0_desc:0 "耐用型的步兵装具聚焦在强化装备的耐用性上，这包括在恶劣环境下的表现和存放时间的上限，并且在生产的难度上有一定优势。"
defensive_uniform_equipment_1:0 "防御型步兵装具II"
defensive_uniform_equipment_1_short:0 "防御型步兵装具II"
defensive_uniform_equipment_1_desc:0 "防御型的步兵装具聚焦在强化装备的防御性能上，从魔力回路更加精致的护盾生成器到使用现代工业完成的钢盔等一系列装备。经过更现代化的改造后有了更强大的防御能力。"
durable_uniform_equipment_1:0 "耐用型步兵装具II"
durable_uniform_equipment_1_short:0 "耐用型步兵装具II"
durable_uniform_equipment_1_desc:0 "耐用型的步兵装具聚焦在强化装备的耐用性上，这包括在恶劣环境下的表现和存放时间的上限，并且在生产的难度上有一定优势。经过更现代化的改造后有助于步兵的突破战。"
defensive_uniform_equipment_2:0 "防御型步兵装具III"
defensive_uniform_equipment_2_short:0 "防御型步兵装具III"
defensive_uniform_equipment_2_desc:0 "防御型的步兵装具聚焦在强化装备的防御性能上，从魔力回路更加精致的护盾生成器到使用现代工业完成的钢盔等一系列装备。经过更现代化的改造后有了更强大的防御能力，在此基础上进一步得到了改进。"
durable_uniform_equipment_2:0 "耐用型步兵装具III"
durable_uniform_equipment_2_short:0 "耐用型步兵装具III"
durable_uniform_equipment_2_desc:0 "耐用型的步兵装具聚焦在强化装备的耐用性上，这包括在恶劣环境下的表现和存放时间的上限，并且在生产的难度上有一定优势。经过更现代化的改造后有助于步兵的突破战，在此基础上得到了进一步改进。"

special_forces_equipment:0 "特种部队装备"
special_forces_equipment_desc:0 "特种部队所使用的特殊装备，在常规的步兵装备上进行了特殊优化，能实现更强大的战斗能力。"
special_forces_equipment_0:0 "特种部队装备I型"
special_forces_equipment_0_short:0 "特种部队装备I型"
special_forces_equipment_0_desc:0 "早期的特种部队装备，大多为主力部队的附属编制，受限于技术支持，同普通的部队相比并没有太大的优势，仅能为部队进攻提供一定帮助。"
special_forces_equipment_1:0 "特种部队装备II型"
special_forces_equipment_1_short:0 "特种部队装备II型"
special_forces_equipment_1_desc:0 "特种部队所使用的装备，在同期步兵装备的基础上得到了改进和优化。"
special_forces_equipment_2:0 "特种部队装备III型"
special_forces_equipment_2_short:0 "特种部队装备III型"
special_forces_equipment_2_desc:0 "特种部队所使用的装备，在同期步兵装备的基础上得到了改进和优化。"
special_forces_equipment_3:0 "特种部队装备IV型"
special_forces_equipment_3_short:0 "特种部队装备IV型"
special_forces_equipment_3_desc:0 "特种部队所使用的装备，在同期步兵装备的基础上得到了改进和优化。"

light_titan_equipment:0 "游侠级泰坦"
light_titan_equipment_desc:0 "游侠级泰坦采用了更为轻量级的骨架，这使得他们可以在各种情况的战场下实现极高的机动能力，并使用高效能的泰坦武器。不过，这都是以牺牲防御能力为代价的。游侠级泰坦比一般的泰坦更为脆弱，一旦遭受敌人的集火便会受到严重伤害，在防御上很依赖其它军种的配合。"
great_war_titan_equipment_0:0 "大战机甲"
great_war_titan_equipment_0_desc:0 "伟大战争和世界大战时期所使用的机甲，老旧且效率低下，需要大量维护和后勤人员支持，在现代反装甲单位武器面前不堪一击，只有最基本的附魔装置。这些旧时代的机甲大多没有实战价值，不过他们依然象征着机械工程学的一个奇迹，并对工业发展有一定帮助。"
light_titan_equipment_0:0 "游侠级泰坦"
light_titan_equipment_0_desc:0 "游侠级泰坦采用了更为轻量级的骨架，这使得他们可以在各种情况的战场下实现极高的机动能力，并使用高效能的泰坦武器。不过，这都是以牺牲防御能力为代价的。游侠级泰坦比一般的泰坦更为脆弱，一旦遭受敌人的集火便会受到严重伤害，在防御上很依赖其它军种的配合。"
ronin_titan_equipment_0:0 "浪人型泰坦"
ronin_titan_equipment_0_desc:0 "浪人型泰坦在基础的游侠级泰坦上进一步改进了机动能力，不但装配有经过特殊附魔的大剑，还装备用使用特殊弹丸的大型霰弹枪，并且具有短距瞬间移动的能力。"
ronin_titan_equipment_1:0 "强化型浪人泰坦"
ronin_titan_equipment_1_desc:0 "强化后的浪人泰坦在原本的基础上进一步改进了机体的灵活性，在近战战斗中有着更高的优势，不但装配有经过特殊附魔的大剑，还装备用使用特殊弹丸的大型霰弹枪，并且具有短距瞬间移动的能力。"
ronin_titan_equipment_2:0 "高级浪人泰坦"
ronin_titan_equipment_2_desc:0 "现代化的浪人泰坦在原版的基础上得到了全方位的改良，无论是战斗性能，机动性能还是防御性能。它不但装配有经过特殊附魔的大剑，还装备用使用特殊弹丸的大型霰弹枪，并且具有短距瞬间移动的能力。"
northstar_titan_equipment_0:0 "北极星型泰坦"
northstar_titan_equipment_0_desc:0 "北极星型泰坦在基础的游侠级泰坦上进一步改进了输出能力，通过装备扩散性导弹和巨型附魔狙击步枪，北极星泰坦得到了极为强大的输出能力。"
northstar_titan_equipment_1:0 "强化型北极星泰坦"
northstar_titan_equipment_1_desc:0 "强化后的北极星泰坦在原版的基础上进一步改进了输出能力，通过装备扩散性导弹和巨型附魔狙击步枪，北极星泰坦得到了极为强大的输出能力。"
northstar_titan_equipment_2:0 "高级北极星泰坦"
northstar_titan_equipment_2_desc:0 "现代化的北极星泰坦在原版的基础上进一步改进了生存能力，完善了短距离的飞行系统，并通过装备扩散性导弹和巨型附魔狙击步枪，北极星泰坦得到了极为强大的输出能力。"

medium_titan_equipment:0 "天图级泰坦"
medium_titan_equipment_desc:0 "天图级泰坦采用了更为均衡的骨架，这使得他们在保全了一定程度的机动性能的基础上仍可以造成加大的伤害。同时，由于天图级泰坦的设计在常规泰坦的基础上强化了持续作战能力，它在部队中能提供更强大且可靠的推进能力。"
medium_titan_equipment_0:0 "天图级泰坦"
medium_titan_equipment_0_desc:0 "天图级泰坦采用了更为均衡的骨架，这使得他们在保全了一定程度的机动性能的基础上仍可以造成加大的伤害。同时，由于天图级泰坦的设计在常规泰坦的基础上强化了持续作战能力，它在部队中能提供更强大且可靠的推进能力。"
ion_titan_equipment_0:0 "离子型泰坦"
ion_titan_equipment_0_desc:0 "离子型泰坦在基础的天图级泰坦上进一步改进了对装甲单位的进攻能力，装备有使用魔力作为弹药库的大型发射器，并且可以释放能反弹地方攻击的特殊护盾。"
ion_titan_equipment_1:0 "强化型离子泰坦"
ion_titan_equipment_1_desc:0 "强化后的离子泰坦在原版的基础上进一步改进了对敌人火力的防御能力，装备有使用魔力作为弹药库的大型发射器，并且可以释放能反弹地方攻击的特殊护盾。"
ion_titan_equipment_2:0 "高级离子泰坦"
ion_titan_equipment_2_desc:0 "现代化的离子泰坦在原版的基础上得到了全方位的改进。装备有使用魔力作为弹药库的大型发射器，并且可以释放能反弹地方攻击的特殊护盾。"
tone_titan_equipment_0:0 "强力型泰坦"
tone_titan_equipment_0_desc:0 "强力型泰坦在基础的天图级泰坦上进一步改进了对生物单位的进攻能力，装备有可以跟踪地方单位的小型导弹和可以为队友提供保护的大型能量护罩。"
tone_titan_equipment_1:0 "强化型强力泰坦"
tone_titan_equipment_1_desc:0 "强化后的强力泰坦在原版的基础上进一步改进了对敌人火力的防御能力，装备有可以跟踪地方单位的小型导弹和可以为队友提供保护的大型能量护罩。"
tone_titan_equipment_2:0 "高级强力泰坦"
tone_titan_equipment_2_desc:0 "现代化的强力泰坦在原版的基础上得到了全方位的改进。装备有可以跟踪地方单位的小型导弹和可以为队友提供保护的大型能量护罩。"

heavy_titan_equipment:0 "巨妖级泰坦"
heavy_titan_equipment_desc:0 "巨妖级泰坦采用了更为重量级的骨架，这使得它在可以使用更为高效能武器的基础上同时实现持续性作战和高防御能力。不幸的是，这使得巨妖级泰坦在战场上移动缓慢，在进攻战时更为脆弱，因为缺乏灵活的作战能力。"
heavy_titan_equipment_0:0 "巨妖级泰坦"
heavy_titan_equipment_0_desc:0 "巨妖级泰坦采用了更为重量级的骨架，这使得它在可以使用更为高效能武器的基础上同时实现持续性作战和高防御能力。不幸的是，这使得巨妖级泰坦在战场上移动缓慢，在进攻战时更为脆弱，因为缺乏灵活的作战能力。"
scorch_titan_equipment_0:0 "烈焰型泰坦"
scorch_titan_equipment_0_desc:0 "烈焰型泰坦在基础的巨妖级泰坦上进一步改进了对生物单位的进攻能力，装备有大型铝热剂发射器，可以使用烈焰护盾同时完成对地方单位的伤害并阻挡攻击，同时可以利用铝热剂和其他魔法回路制造火墙阻挡敌人。"
scorch_titan_equipment_1:0 "强化型烈焰泰坦"
scorch_titan_equipment_1_desc:0 "强化后的烈焰泰坦在原版的基础上进一步改进了对敌方单位的的防御能力，装备有大型铝热剂发射器，可以使用烈焰护盾同时完成对地方单位的伤害并阻挡攻击，同时可以利用铝热剂和其他魔法回路制造火墙阻挡敌人。"
scorch_titan_equipment_2:0 "高级烈焰泰坦"
scorch_titan_equipment_2_desc:0 "现代化的烈焰泰坦在原版的基础上得到了全方位的改进，装备有大型铝热剂发射器，可以使用烈焰护盾同时完成对地方单位的伤害并阻挡攻击，同时可以利用铝热剂和其他魔法回路制造火墙阻挡敌人。"
legion_titan_equipment_0:0 "军团型泰坦"
legion_titan_equipment_0_desc:0 "军团型泰坦在基础的巨妖级泰坦上进一步改进了对装甲单位的进攻能力，装备有大型转轮机枪，可以切换不同弹药以应对不同类型的敌人，同时装备有在射击时自动展开的机枪护盾。"
legion_titan_equipment_1:0 "强化型军团泰坦"
legion_titan_equipment_1_desc:0 "强化后的军团泰坦在原版的基础上进一步改进了对敌方单位的防御能力，装备有大型转轮机枪，可以切换不同弹药以应对不同类型的敌人，同时装备有在射击时自动展开的机枪护盾。"
legion_titan_equipment_2:0 "高级军团泰坦"
legion_titan_equipment_2_desc:0 "现代化的军团泰坦在原版的基础上得到了全方位的改进，装备有大型转轮机枪，可以切换不同弹药以应对不同类型的敌人，同时装备有在射击时自动展开的机枪护盾。"

caster_equipment:0 "魔导师装备"
caster_equipment_desc:0 "早期的魔导师装备专注于将魔法的效果最大化，在对使用者要求高的基础上强调次数少但高杀伤性的战斗方式，对使用者有一定危害，同时可维护性较差。"
caster_equipment_0:0 "早期魔导师装备"
caster_equipment_0_desc:0 "早期的魔导师装备专注于将魔法的效果最大化，在对使用者要求高的基础上强调次数少但高杀伤性的战斗方式，对使用者有一定危害，同时可维护性较差。"
caster_equipment_1:0 "常规魔导装备I型"
caster_equipment_1_desc:0 "常规魔导师装备包括魔导步兵单位所使用的特制移动设备，附魔武器，高级魔力储藏装置，自动魔法回路等一系列武器配备。"
caster_equipment_2:0 "常规魔导装备II型"
caster_equipment_2_desc:0 "魔导师装备包括战斗魔导师所使用的特制移动设备，附魔武器，高级魔力储藏装置，自动魔法回路等一系列武器配备，升级的型号在此基础上改进了稳定性。"
caster_equipment_3:0 "常规魔导装备III型"
caster_equipment_3_desc:0 "魔导师装备包括战斗魔导师所使用的特制移动设备，附魔武器，高级魔力储藏装置，自动魔法回路等一系列武器配备，升级的型号在此基础上改进了稳定性，同时在魔力储蓄上限上得到了进一步突破。"
caster_equipment_4:0 "常规魔导装备IV型"
caster_equipment_4_desc:0 "魔导师装备包括战斗魔导师所使用的特制移动设备，附魔武器，高级魔力储藏装置，自动魔法回路等一系列武器配备，升级的型号在此基础上改进了稳定性，同时在魔力储蓄上限上得到了进一步突破，并改进了装备整体的便携性与防御能力。"

caster_recon_equipment:0 "侦察魔导装备"
caster_recon_equipment_desc:0 "由单兵携行和操作使用的侦察魔导装备，配备了长程通讯装置以及侦察用设备。"
caster_recon_equipment_0:0 "侦察魔导装备I型"
caster_recon_equipment_0_desc:0 "由单兵携行和操作使用的侦察魔导装备，配备了长程通讯装置以及侦察用设备。"
caster_recon_equipment_1:0 "侦察魔导装备I型"
caster_recon_equipment_1_desc:0 "由单兵携行和操作使用的侦察魔导装备，配备了长程通讯装置以及侦察用设备。"
caster_recon_equipment_2:0 "侦察魔导装备II型"
caster_recon_equipment_2_desc:0 "由单兵携行和操作使用的侦察魔导装备，配备了长程通讯装置以及侦察用设备。新型号采用了容量更大的魔力储藏装置，提高了信号传输稳定性。"
caster_recon_equipment_3:0 "侦察魔导装备III型"
caster_recon_equipment_3_desc:0 "由单兵携行和操作使用的侦察魔导装备，配备了长程通讯装置以及侦察用设备。新型号在上一代的基础上进行改进，在空间感知、识别探查、信息传输和协调运作等方面都得到了更进一步的发展。对魔晶矿的应用已进入了新的阶段，合理使用此装备将在战场上发挥不俗的先发优势。"
caster_recon_equipment_4:0 "侦察魔导装备IV型"
caster_recon_equipment_4_desc:0 "由单兵携行和操作使用的侦察魔导装备，配备了长程通讯装置以及侦察用设备。世界上第一种进入服役的第四代侦察魔导装备，当今世界综合性能最佳的侦察魔导装备，只有经过侦察和通讯方面的专业训练才可以发挥出它应有的作用。由于相关科技领域的复杂性和模块加工成本，魔导装备的开发和制造成本普遍较高。"

caster_attaker_equipment:0 "攻击魔导装备"
caster_attaker_equipment_desc:0 "由单兵携行和操作使用的攻击魔导装备，配备了补充火力空白的进攻型装备。"
caster_attaker_equipment_0:0 "攻击魔导装备I型"
caster_attaker_equipment_0_desc:0 "由单兵携行和操作使用的攻击魔导装备，配备了补充火力空白的进攻型装备。"
caster_attaker_equipment_1:0 "攻击魔导装备I型"
caster_attaker_equipment_1_desc:0 "由单兵携行和操作使用的攻击魔导装备，配备了补充火力空白的进攻型装备。"
caster_attaker_equipment_2:0 "攻击魔导装备II型"
caster_attaker_equipment_2_desc:0 "由单兵携行和操作使用的攻击魔导装备，配备了补充火力空白的进攻型装备。新型号采用了强度更高的材料以承载更高效的魔法回路，显著提高了威力。"
caster_attaker_equipment_3:0 "攻击魔导装备III型"
caster_attaker_equipment_3_desc:0 "由单兵携行和操作使用的攻击魔导装备，配备了补充火力空白的进攻型装备。新型号在上一代的基础上进行改进，在伤害范围、火力持续、魔力压缩和打击范围等方面都得到了更进一步的发展。对魔晶矿的应用已进入了新的阶段，合理使用此装备将在战场上发挥不俗的进攻优势。"
caster_attaker_equipment_4:0 "攻击魔导装备IV型"
caster_attaker_equipment_4_desc:0 "由单兵携行和操作使用的攻击魔导装备，配备了补充火力空白的进攻型装备。世界上第一种进入服役的第四代攻击魔导装备，当今世界综合性能最佳的攻击魔导装备，只有经过数学和火炮方面的专业训练才可以发挥出它应有的作用。由于相关科技领域的复杂性和模块加工成本，魔导装备的开发和制造成本普遍较高。"

caster_support_equipment:0 "支援魔导装备"
caster_support_equipment_desc:0 "由单兵携行和操作使用的支援魔导装备，配备了多用途的工程技术装备以及后勤装备。"
caster_support_equipment_0:0 "支援魔导装备I型"
caster_support_equipment_0_desc:0 "由单兵携行和操作使用的支援魔导装备，配备了多用途的工程技术装备以及后勤装备。"
caster_support_equipment_1:0 "支援魔导装备II型"
caster_support_equipment_1_desc:0 "由单兵携行和操作使用的支援魔导装备，配备了多用途的工程技术装备以及后勤装备。新型号采用了易于制造和保养的模块化设计，并开始向多功能化方向进展。"
caster_support_equipment_2:0 "支援魔导装备III型"
caster_support_equipment_2_desc:0 "由单兵携行和操作使用的支援魔导装备，配备了多用途的工程技术装备以及后勤装备。新型号在上一代的基础上进行改进，在战地急救、物资搬运、简易工程和维修效率等方面都得到了更进一步的发展。对魔晶矿的应用已进入了新的阶段，合理使用此装备将在战场上发挥不俗的保障优势。"
caster_support_equipment_3:0 "支援魔导装备IV型"
caster_support_equipment_3_desc:0 "由单兵携行和操作使用的支援魔导装备，配备了多用途的工程技术装备以及后勤装备。世界上第一种进入服役的第四代支援魔导装备，当今世界综合性能最佳的支援魔导装备，只有经过医疗和后勤方面或工程和维修方面的专业训练才可以发挥出它应有的作用。由于相关科技领域的复杂性和模块加工成本，魔导装备的开发和制造成本普遍较高。"

lust_mountain_equipment:0 "肉林"
lust_mountain_equipment_desc:0 "各种不明碎块和液体缠绕裹挟如电线杆、钢管、水泥石柱等柱状物所组合成的“肉棒”。当它们组合在一起时便成为了血肉森林，你不会想知道它是如何制作成的。"
lust_mountain_equipment_0:0 "肉林"
lust_mountain_equipment_0_desc:0 "各种不明碎块和液体缠绕裹挟如电线杆、钢管、水泥石柱等柱状物所组合成的“肉棒”。当它们组合在一起时便成为了血肉森林，你不会想知道它是如何制作成的。"
lust_chrysalides_0:0 "肉蛹"
lust_chrysalides_0_desc:0 "有着柔韧的保护外壳，通过母胎孵化并弹射而出，利用尾部分泌组织液及含有甲烷成分的气体进行快速移动。蛹内含有来源复杂、成分多样的丰富营养物质，可以提供必要的给养。"
meat_chrysalis_0:0 "肉山弹"
meat_chrysalis_0_desc:0 "母胎开花或肉蛹孵化时，花粉、营养物质与组织液被抛到空中，在空中急速飞行，受到阻力、张力作用，发生旋转，于冷却或半冷却状态下落地而成的弹状体。"

###科技树###

###步兵科技树###

primitive_weapons:0 "原始武器"
primitive_weapons_short:0 "原始武器"
primitive_weapons_desc:0 "原始的武器装备，主要为质量层次不齐的冷兵器，近战武器为主，偶尔有装备劣质弓箭的远程部队。"
weapons_fining_technique:0 "武器精制技术"
weapons_fining_technique_short:0 "武器精制技术"
weapons_fining_technique_desc:0 "加强我们制造武器的精度，尽管这在很大程度上不能解决冷兵器和近战武器所带来的弱势，但我们至少可以确保军人们拿到的武器质量都不会太差。"

police_training:0 "警察训练"
police_training_short:0 "警察训练"
police_training_desc:0 "随着我们国家的不断发展，社会的进步同样带来了愈发猖狂的犯罪和暴民。我们应当抛去陈旧的思想，开始训练一批愿意为国家稳定而献身的警务人员。"
suppress_equipment:0 "基础镇压装备"
suppress_equipment_short:0 "基础镇压装备"
suppress_equipment_desc:0 "为了应对暴民，我们应当专门设立部队并使用特殊的武器。专精打击暴力犯罪等刑事案件的他们更懂得如何在不伤害民众的情况下稳定国家。"
magic_of_mental_deviation:0 "心灵干涉魔法"
magic_of_mental_deviation_short:0 "心灵干涉魔法"
magic_of_mental_deviation_desc:0 "通过研究心灵干涉魔法，我们得以接触改变群众内心思想倾向的技术，这虽然在短时间内无法起到明显效果，但在长期看来会是有用之举。"
compliance_hint:0 "服从化暗示"
compliance_hint_short:0 "服从化暗示"
compliance_hint_desc:0 "利用魔法来对群众下达服从化的暗示或许没那么*道德*，但有时候这也是必需之举。减少敌人的攻击性对我们都有好处。"
anti_mob_blunt:0 "防暴钝器"
anti_mob_blunt_short:0 "防暴钝器"
anti_mob_blunt_desc:0 "通过改进我们防暴部队的非杀伤性武器，我们得以在保护群众，避免误伤的基础上提高镇压的效率。这同样能让公众对我们的部队抱有更好的态度。"
light_armor_for_police:0 "轻型护甲"
light_armor_for_police_short:0 "轻型护甲"
light_armor_for_police_desc:0 "给我们的防暴部队列装轻型护甲，可以让他们在对付暴动时占据更大的优势。更强势的防御能力不但能减少我们部队的伤亡，还可以让他们显得更具有威慑力。"
improved_police_equipment:0 "进阶防暴装备"
improved_police_equipment_short:0 "进阶防暴装备"
improved_police_equipment_desc:0 "改良我们的防暴装备并增加训练的烈度，吸取过去的经验，我们得以生产住更加符合需求的优质装备以满足镇暴需要。"
unyielding_doctrine:0 "强硬派准则"
unyielding_doctrine_short:0 "强硬派准则"
unyielding_doctrine_desc:0 "一昧的让着暴徒只会让我们的国家徒增更多敌人，面对这些搞事不嫌事大，损人害己的家伙，我们必须出重拳！"
moderate_doctrine:0 "温和化处理"
moderate_doctrine_short:0 "温和化处理"
moderate_doctrine_desc:0 "虽然暴徒大多是一群很难以理解的人，我们作为人民的守护者，单纯的使用暴力激化矛盾可能并非长远之计，使用温和的手段建立起来自人民的信任或许是更长远的选择。"
undeadly_weapons:0 "非致命化武器"
undeadly_weapons_short:0 "非致命化武器"
undeadly_weapons_desc:0 "通过发展如电击枪，橡胶弹等一系列可以起到警戒或是减弱抵抗的低致命性武器，执法人员的效率会得到提升。"
body_worn_camera:0 "执法记录仪"
body_worn_camera_short:0 "执法记录仪"
body_worn_camera_desc:0 "执法记录仪的运用可以更便于我们监督下属警察是否有在好好的履行他们的职责。这些小型监控魔法还可以起到证明罪犯罪行的效果。"
modernized_police_equipment:0 "现代防暴装备"
modernized_police_equipment_short:0 "现代防暴装备"
modernized_police_equipment_desc:0 "现代化的防暴装备包括了一系列反恐装备，从应对毒品蔓延的特殊药物到针对犯罪人员的低致命武器，再到针对暴力犯罪的轻武器和一系列高级防具。"
improved_melee_weapons:0 "精炼近战装备"
improved_melee_weapons_short:0 "精炼近战装备"
improved_melee_weapons_desc:0 "经过现代工业进行了改造的近战武器，比起过去有着更稳定的质量和战斗能力，是近距离战斗的好手。"
modernized_melee_weapons:0 "现代化近战武器"
modernized_melee_weapons_short:0 "现代化近战武器"
modernized_melee_weapons_desc:0 "在进行了近战步兵的训练后,我们如今可以吸取过去的教训,对近战步兵的训练规章进行进一步的优化,让他们不至于成为刻板印象中的'炮灰'。除此之外，我们还可以进一步借用现代工业和魔法科技来改进近战武器，让他们在战场上可以发挥战斗中更大的优势。"
melee_training:0 "近战训练"
melee_training_short:0 "近战训练"
melee_training_desc:0 "加强我们部队的近战训练，可以使他们在近距离战斗中取得更大的优势。或许我们不需要让每个人都学成功夫大师，但在我们军队中普及现代化的格斗技巧是很有必要的。"
outdoors_survive_training:0 "户外生存特训"
outdoors_survive_training_short:0 "户外生存特训"
outdoors_survive_training_desc:0 "虽然保障后勤才是一支正规军该有的样子，野外的世界总是充满了我们所无法预料到的未知。在许多特殊的战斗环境下，我们需要我们的士兵有一定的生存和自救能力，加强该方面的训练可以减少部队的损失。"
modernized_troops_training:0 "现代化部队训练流程"
modernized_troops_training_short:0 "现代化部队训练流程"
modernized_troops_training_desc:0 "改良我们军队的训练流程，我们可以在删减多余内容的同时利用新一代的经验来训练部队，这可以提高应征者转换成普通士兵的效率。"
expanding_training_scale:0 "扩大训练规模"
expanding_training_scale_short:0 "扩大训练规模"
expanding_training_scale_desc:0 "我们可以通过进一步扩大练兵的规模以确保我国能尽快扩大军队规模。"
elite_troops:0 "精锐化部队"
elite_troops_short:0 "精锐化部队"
elite_troops_desc:0 "尽管现代化的训练方式加快了我们的练兵速度，我们仍然需要保持我们部队的战斗力。在原来的基础上加强训练强度会是一个好主意。"
modern_combat_tactic:0 "现代格斗技巧"
modern_combat_tactic_short:0 "现代格斗技巧"
modern_combat_tactic_desc:0 "通过在军队中普及现代化的格斗技巧，我们可以增加士兵在战场上的存活率。"
multi_department_training:0 "跨部门训练"
multi_department_training_short:0 "跨部门训练"
multi_department_training_desc:0 "通过让我们不同军种进行联合训练，我们得以强化部队战斗经验获取的效率和组织能力。让小伙子们多熟悉熟悉未来的战友总是没坏处的。"
serious_military_discipline:0 "正规化军事纪律"
serious_military_discipline_short:0 "正规化军事纪律"
serious_military_discipline_desc:0 "没人喜欢束手束脚的活着——这是自然。然而，一个国家的军队可以被说是这个国家精神面貌的体现之一，如果我们不能约束好自家的军队并让他们表现的专业一些，我们迟早是要玩火自焚的。再说了，这也是作为一个现代化国家最应该做的事情之一，推行军事纪律可以让我们获得更多的支持。"
melee_weapons_I:0 "近战武器I型"
melee_weapons_I_short:0 "近战武器I型"
melee_weapons_I_desc:0 "新生代的近战武器，使用魔法进行强化，给予了战斗人员更强大的机动性和杀伤能力，并且能针对重型装甲造成可观伤害。"
light_melee_weapons:0 "轻量化近战武器"
light_melee_weapons_short:0 "轻量化近战武器"
light_melee_weapons_desc:0 "通过提高我们近战武器的便携性，我们可以提高近战部队的机动性，突破能力和组织能力。"
heavy_melee_weapons:0 "重型近战武器"
heavy_melee_weapons_short:0 "重型近战武器"
heavy_melee_weapons_desc:0 "重型近战武器可以提高我们部队的战斗能力，让他们在战场上所向披靡。"。"
light_melee_weapons_II:0 "轻型近战武器II型"
light_melee_weapons_II_short:0 "轻型近战武器II型"
light_melee_weapons_II_desc:0 "在吸取了过去制造轻量化武器的经验后，我们得以改进出一批全新的武器型号。这类轻量级武器虽然在性能上没有太大的提升，但是生产得到了简化，并且提高了稳定性。"
heavy_melee_weapons_II:0 "重型近战武器II型"
heavy_melee_weapons_II_short:0 "重型近战武器II型"
heavy_melee_weapons_II_desc:0 "在吸取了过去制造重型武器的经验后，我们得以改进出一批全新的武器型号。这类重型武器虽然笨重且难以运输，但他们能极大提高我们部队的战斗力。"
material_improvement:0 "材料改进"
material_improvement_short:0 "材料改进"
material_improvement_desc:0 "新时代的科技发展允许我们采用更好的材料以提高近战部队的能力。这些更加结实且稳定的材料可以被用来提高近战部队的防御能力。"
light_melee_weapons_III:0 "轻型近战武器III型"
light_melee_weapons_III_short:0 "轻型近战武器III型"
light_melee_weapons_III_desc:0 "轻型近战武器是相对便于制作的近战武器型号，在牺牲了战斗能力和防御能力的基础上换取了更大的产量。借助现代科技的发展，该型号在保留了前代灵巧，便于制作的特性的基础上，在战斗能力和防御能力上取得了一定发展。"
heavy_melee_weapons_III:0 "重型近战武器III型"
heavy_melee_weapons_III_short:0 "重型近战武器III型"
heavy_melee_weapons_III_desc:0 "重型近战武器是相对难以制作的近战武器型号，在牺牲了便携性和产量的基础上大幅提高了战斗能力。借助现代科技的发展，该型号在其擅长的战斗方面取得了长足的发展。"
harming_training:0 "杀伤训练"
harming_training_short:0 "杀伤训练"
harming_training_desc:0 "让我们的近战部队专注于对敌人造成有效伤害，这可以大幅度提高我们部队的战斗能力。"
ap_training:0 "破甲训练"
ap_training_short:0 "破甲训练"
ap_training_desc:0 "让我们的近战部队专注于对地方重型单位造成有效伤害，这可以大幅度提高我们部队的战斗能力。"
breakthrough_training:0 "突击能力强化"
breakthrough_training_short:0 "突击能力强化"
breakthrough_training_desc:0 "近战部队作为我们陆军的先锋，一直以来都承担着最为重要的突击工作。在这点上下更多功夫可以有效提高我们部队的战斗能力。"
early_infantry_weapons:0 "早期远程武器"
early_infantry_weapons_short:0 "早期远程武器"
early_infantry_weapons_desc:0 "早期的远程武器装备，抛去了原始的劣质近战武器，转而使用基于火药的枪械。有从枪口装弹的旧时代火枪，但也有使用金属弹壳弹药的后膛枪。"
infantry_weapons:0 "步兵装备I型"
infantry_weapons_short:0 "步兵装备I型"
infantry_weapons_desc:0 "个人和部队使用的步兵武器，以及士兵所需的其他装备。更现代化的增加了大量的冲锋枪和反坦克步枪。
light_infantry_weapons:0 "注重轻武器"
light_infantry_weapons_short:0 "注重轻武器"
light_infantry_weapons_desc:0 "我们可以通过加强轻武器的运用以增强我们部队在面对轻型单位时的战斗力和进攻时的突进能力。"
heavy_infantry_weapons:0 "扩大重武器使用"
heavy_infantry_weapons_short:0 "扩大重武器使用"
heavy_infantry_weapons_desc:0 "通过扩大重型武器在部队中的占比，我们可以增强军队在面对重型单位时的战斗能力和防御能力。"
infantry_weapons_II:0 "步兵装备II型"
infantry_weapons_II_short:0 "步兵装备II型"
infantry_weapons_II_desc:0 "个人和部队使用的步兵武器，以及士兵所需的其他装备。更现代化的增加了大量的冲锋枪和反坦克步枪。经过魔法技术的强化还加装了附魔设备。"
assault_elite:0 "突击专精"
assault_elite_short:0 "突击专精"
assault_elite_desc:0 "改良我们的步兵武器，让他们在进行突击战斗的时候更具优势。"
defensive_design:0 "防御型设计"
defensive_design_short:0 "防御型设计"
defensive_design_desc:0 "我们可以设计增强我们步兵武器在防守时的表现，让他们变得更加耐用。"
infantry_weapons_III:0 "步兵装备III型"
infantry_weapons_III_short:0 "步兵装备III型"
infantry_weapons_III_desc:0 "个人和部队使用的步兵武器，以及士兵所需的其他装备。更现代化的增加了大量的冲锋枪和反坦克步枪。经过魔法技术的强化还加装了附魔设备。"
modernization_improvement:0 "现代化改造"
modernization_improvement_short:0 "现代化改造"
modernization_improvement_desc:0 "通过对我们的武器进行现代化改造，我们可以提高部队的战斗能力。"
new_scopes:0 "全新瞄具"
new_scopes_short:0 "全新瞄具"
new_scopes_desc:0 "全新的瞄具可以为部队提供更多防御和对人作战的优势。"
powered_ammos:0 "强化弹药"
powered_ammos_short:0 "强化弹药"
powered_ammos_desc:0 "经过强化的弹药可以强化部队对大型器械的作战能力。"
infantry_weapons_IV:0 "步兵装备IV型"
infantry_weapons_IV_short:0 "步兵装备IV型"
infantry_weapons_IV_desc:0 "个人和部队使用的步兵武器，以及士兵所需的其他装备。更现代化的增加了大量的冲锋枪和反坦克步枪。经过魔法技术的强化还加装了附魔设备，并利用现代化的技术进一步加强。"
careful_doctrine:0 "谨慎为上"
careful_doctrine_short:0 "谨慎为上"
careful_doctrine_desc:0 "虽然这可能降低夜间部队战斗的能力，小心的作战方针总是没错的。"
aggressive_doctrine:0 "进攻优先"
aggressive_doctrine_short:0 "进攻优先"
aggressive_doctrine_desc:0 "专注于提高我们部队的夜战能力，就算这会以降低他们的防御能力为代价也在所难免。"
night_vision3:0 "夜视仪III"
night_vision3_short:0 "夜视仪III"
night_vision3_desc:0 "随着便携性与视野范围同步改善，夜视装置将供更多部队夜战使用。使用魔法进一步提高了其效果。"
early_infantry_uniforms:0 "早期步兵装具"
early_infantry_uniforms_short:0 "早期步兵装具"
early_infantry_uniforms_desc:0 "个人和部队所使用的装备，通常为步兵部队拥有。原始的型号为步兵提供了基本的保护，装备如钢盔的运用可以保护士兵不被流弹伤害，但装备质量不统一，质地较差且不善于应对恶劣环境。"
modernized_infantry_uniforms:0 "步兵装具现代化"
modernized_infantry_uniforms_short:0 "步兵装具现代化"
modernized_infantry_uniforms_desc:0 "借助现代工业的帮助，我们得以生产出更加符合部队需求（而非礼节需求）的现代化步兵装备。"
against_terrible_weather:0 "应对恶劣气候"
against_terrible_weather_short:0 "应对恶劣气候"
against_terrible_weather_desc:0 "通过改进我们的军服，发明更多不同款式以应对炎热或酷寒的战场，我们的部队可以应对更多突发情况或是战况。"
against_terrible_environment:0 "应对恶劣环境"
against_terrible_environment_short:0 "应对恶劣环境"
against_terrible_environment_desc:0 "从茂密的丛林到无尽的荒漠，我们的现代化军队应该拥有应对这一切的能力。为此，一套足够优秀的军服是是必须的。"
against_extreme_environment:0 "极端环境优化"
against_extreme_environment_short:0 "极端环境优化"
against_extreme_environment_desc:0 "针对极端恶劣环境进行优化，我们可以进一步确保部队在不同状况下的作战能力。"
against_extreme_landscape:0 "恶劣地形特化"
against_extreme_landscape_short:0 "恶劣地形特化"
against_extreme_landscape_desc:0 "在军队的作战过程中，我们不可避免的会将部队投放到不理想的环境中作战。为此，提前为不同地形中的战斗做好准备是有利于军队的发展的。"
defensive_function_imrpovement:0 "防御性能改良"
defensive_function_imrpovement_short:0 "防御性能改良"
defensive_function_imrpovement_desc:0 "通过运用工业生产的新式装备，如钢盔或者是防弹衣，我们可以提高士兵在战场上生存能力。"
defensive_uniforms:0 "防御型步兵装具"
defensive_uniforms_short:0 "防御型步兵装具"
defensive_uniforms_desc:0 "防御型的步兵装具聚焦在强化装备的防御性能上，从魔力回路更加精致的护盾生成器到使用现代工业完成的钢盔等一系列装备。"
durable_uniforms:0 "耐用型步兵装具"
durable_uniforms_short:0 "耐用型步兵装具"
durable_uniforms_desc:0 "耐用型的步兵装具聚焦在强化装备的耐用性上，这包括在恶劣环境下的表现和存放时间的上限，并且在生产的难度上有一定优势。"
automatic_healing_enchantment:0 "自动化治疗回路"
automatic_healing_enchantment_short:0 "自动化治疗回路"
automatic_healing_enchantment_desc:0 "通过在步兵装具上安装治疗回路和足够的魔力储备，我们可以在战场上为士兵提供最基础的治疗服务。尽管对于彻底治疗而言，这在很多时候都会是杯水车薪的，但这至少能让士兵们坚持到战地医院。"
defensive_uniforms_II:0 "防御型步兵装具II"
defensive_uniforms_II_short:0 "防御型步兵装具II"
defensive_uniforms_II_desc:0 "防御型的步兵装具聚焦在强化装备的防御性能上，从魔力回路更加精致的护盾生成器到使用现代工业完成的钢盔等一系列装备。经过更现代化的改造后有了更强大的防御能力。"
durable_uniforms_II:0 "耐用型步兵装具II"
durable_uniforms_II_short:0 "耐用型步兵装具II"
durable_uniforms_II_desc:0 "耐用型的步兵装具聚焦在强化装备的耐用性上，这包括在恶劣环境下的表现和存放时间的上限，并且在生产的难度上有一定优势。经过更现代化的改造后有助于步兵的突破战。"
breakthrough_improvement:0 "突击战斗改良"
breakthrough_improvement_short:0 "突击战斗改良"
breakthrough_improvement_desc:0 "随着时代的进步和科技的发展，我们不能再拘泥于‘静态防御’这样陈旧的想法。为了获取战争的胜利，部队总要完成突击任务，而在此下功夫会大有裨益。"
more_defense_improvement:0 "防御再优化"
more_defense_improvement_short:0 "防御再优化"
more_defense_improvement_desc:0 "虽然在正面战斗中，确保部队的进攻能力十分重要。可我们毕竟不能忘了设计步兵防具的初衷——保护我们的士兵。既然如此，还是优化防御能力为上策。"
attack_improvement:0 "战斗特化"
attack_improvement_short:0 "战斗特化"
attack_improvement_desc:0 "防御固然重要，可在魔法技术发达的当下，进一步强化防御能力或许显得有些没那么必要。我们可以把设计重心转向便于战斗的思路，增加部队的战斗能力。"
defensive_uniforms_III:0 "防御型步兵装具III"
defensive_uniforms_III_short:0 "防御型步兵装具III"
defensive_uniforms_III_desc:0 "防御型的步兵装具聚焦在强化装备的防御性能上，从魔力回路更加精致的护盾生成器到使用现代工业完成的钢盔等一系列装备。经过更现代化的改造后有了更强大的防御能力，在此基础上进一步得到了改进。"
durable_uniforms_III:0 "耐用型步兵装具III"
durable_uniforms_III_short:0 "耐用型步兵装具III"
durable_uniforms_III_desc:0 "耐用型的步兵装具聚焦在强化装备的耐用性上，这包括在恶劣环境下的表现和存放时间的上限，并且在生产的难度上有一定优势。经过更现代化的改造后有助于步兵的突破战，在此基础上得到了进一步改进。"
marines4:0 "海军陆战队IV"
marines4_short:0 "海军陆战队IV"
marines4_desc:0 "随着装备技术，魔法技术的不断发展，海军陆战队的战斗能力得到了进一步加强。"
tech_mountaineers4:0 "山地步兵IV"
tech_mountaineers4_short:0 "山地步兵IV"
tech_mountaineers4_desc:0 "山地步兵的作战环境往往是恶劣而缺乏补给的，我们需要进一步加强部队的纪律性。"
paratroopers4:0 "伞兵IV"
paratroopers4_short:0 "伞兵IV"
paratroopers4_desc:0 "作为前些年才出现的新型兵种，伞兵的发展已经日渐趋于成熟，我们可以总结过往经验以加强部队作战能力。"
rangers_tech4:0 "游骑兵IV"
rangers_tech4_short:0 "游骑兵IV"
rangers_tech4_desc:0 "通过密集指挥与立体机动手段，将林地作战经验推广至山地、城市与极端气候环境，打造能够独立渗透、精准打击与长时间隐蔽生存的特战部队。游骑兵将成为我军在敌后开辟突破口、瓦解敌军防线的尖刀力量。"

###支援科技树###
tech_engineers_flamethrower:0 "火焰喷射器"
tech_engineers_flamethrower_short:0 "火焰喷射器"
tech_engineers_flamethrower_desc:0 "通过为工程兵配备喷火器等重装备，他们可以在战场上为我军赢得更多优势。"
tech_engineers2_explosive_mag:0 "爆破魔法"
tech_engineers2_explosive_mag_short:0 "爆破魔法"
tech_engineers2_explosive_mag_desc:0 "爆破型的魔法不但可以协助工兵部队改变地貌以设立防御设施，还可以在一定程度上提高对应部队的战斗能力。"
tech_engineers3_tools_improvement:0 "工具改良"
tech_engineers3_tools_improvement_short:0 "工具改良"
tech_engineers3_tools_improvement_desc:0 "更加便利，耐用且有效的现代化工具可以极大地提高工兵部队的行动效率，这可以为我们未来的军事工程项目添砖加瓦。"
tech_engineers4_construction_mag:0 "搭建魔法"
tech_engineers4_construction_mag_short:0 "搭建魔法"
tech_engineers4_construction_mag_desc:0 "从使用魔法控制重物的运输，改变地形地貌到自动搭建模块化的工程项目，许多魔法都可以被运用在军事工程项目的搭建中并有效提高其效率。"
tech_engineers5:0 "现代化工兵连"
tech_engineers5_short:0 "现代化工兵连"
tech_engineers5_desc:0 "在结合了魔法和新一代科技后，新生的现代化工兵连摆脱了过去所遇见的许多毛病。如今的他们可以更有效的完成军工项目并能在一定程度上辅助前线部队的战斗。"
tech_recon_military_scopes:0 "军用望远镜"
tech_recon_military_scopes_short:0 "军用望远镜"
tech_recon_military_scopes_desc:0 "为侦察连配备更高质量的军用望远镜可以有效增加他们一次能获取的信息总量，为部队的进攻提供帮助。"
tech_recon2_heat_detection_mag:0 "热能探测魔法"
tech_recon2_heat_detection_mag_short:0 "热能探测魔法"
tech_recon2_heat_detection_mag_desc:0 "简单的热能探测魔法可以快速帮助侦查部队定位敌军位置。"
tech_recon3_invisible_mag:0 "隐身魔法"
tech_recon3_invisible_mag_short:0 "隐身魔法"
tech_recon3_invisible_mag_desc:0 "虽然危险系数依然很高，隐身魔法的运用可以帮助侦查部队潜入敌营以获取情报，在必要时也可以用作保命手段。"
tech_recon4_short_distance_flying_mag:0 "短距飞行魔法"
tech_recon4_short_distance_flying_mag_short:0 "短距飞行魔法"
tech_recon4_short_distance_flying_mag_desc:0 "小规模的飞行魔法允许侦查部队找到更好的位置以观察敌军动向或者隐藏自己身形。除此之外，飞行魔法还可作战斗用途。"
tech_recon5:0 "现代化侦查连"
tech_recon5_short:0 "现代化侦查连"
tech_recon5_desc:0 "得益于新一代科技的发展和魔法的运用，现代化的侦查部队可以在更有效的保全自身的基础上为部队提供尽可能多的信息。"
tech_maintenance_company_toolbox:0 "工具箱"
tech_maintenance_company_toolbox_short:0 "工具箱"
tech_maintenance_company_toolbox_desc:0 "为维修连提供常备的工具箱可以提高他们维护设备的效率。"
tech_maintenance_company2_storage_mag:0 "储存魔法"
tech_maintenance_company2_storage_mag_short:0 "储存魔法"
tech_maintenance_company2_storage_mag_desc:0 "储存魔法为维护人员提供的储存空间可以被用于放置大量的备件和工具以协助我们修复缴获或是受损的武器。除此之外，这还可以帮助我们储存新缴获的武器。"
tech_maintenance_company3_new_sets_of_tools:0 "新式工具"
tech_maintenance_company3_new_sets_of_tools_short:0 "新式工具"
tech_maintenance_company3_new_sets_of_tools_desc:0 "新式工具为维护部队提供了更为高效且耐用的装置来协助他们的工作。"
tech_maintenance_company4_automatic_enchantment:0 "自动化维护回路"
tech_maintenance_company4_automatic_enchantment_short:0 "自动化维护回路"
tech_maintenance_company4_automatic_enchantment_desc:0 "自动化的装备维护魔法回路可以在节约人力成本的同时提高工作效率。"
tech_maintenance_company5:0 "现代化维修连"
tech_maintenance_company5_short:0 "现代化维修连"
tech_maintenance_company5_desc:0 "现代化的维修连不但有了更为强力有效的工具的帮助，得益于军事理论的发展，他们还可以进一步同其它部队联动以提高效率，并能使用进阶魔法来代替部分工作。"
tech_monster_tamer:0 "驯兽师I型"
tech_monster_tamer_short:0 "驯兽师I型"
tech_monster_tamer_desc:0 "驯兽师可以带领经过训练或改造的强力魔兽参与战斗。魔兽的战斗方式从远程轰炸到近距离厮杀乃至自杀式袭击都有，尽管这偶尔会有一些伦理上的问题，但不可否认的是驯兽师可以为我们的部队提供极大的战斗加成。"
tech_monster_tamer_muscle_reinforcement:0 "肌肉强化药剂"
tech_monster_tamer_muscle_reinforcement_short:0 "肌肉强化药剂"
tech_monster_tamer_muscle_reinforcement_desc:0 "虽然这种结合了魔法和现代化学工业的强化药剂会极大地缩短魔兽的寿命，这却可以极大的提高他们的防御能力和战斗能力。"
tech_monster_tamer2:0 "驯兽师II型"
tech_monster_tamer2_short:0 "驯兽师II型"
tech_monster_tamer2_desc:0 "经过强化训练的驯兽师掌握了更为精确的指挥魔物的技巧，尽管短命的战斗用魔兽通常无法跟其主人建立起紧密的联系，我们得以在短时间内尽可能开发他们隐藏起来的潜力。"
tech_monster_tamer2_explosive_remould:0 "爆破改造"
tech_monster_tamer2_explosive_remould_short:0 "爆破改造"
tech_monster_tamer2_explosive_remould_desc:0 "更为先进的爆破魔法回路允许我们将魔兽的身体改造成出色的移动型炸弹，尽管这招或许没有那么“可持续”。"
tech_monster_tamer3:0 "驯兽师III型"
tech_monster_tamer3_short:0 "驯兽师III型"
tech_monster_tamer3_desc:0 "经过魔法的强化，魔兽可选的攻击方式得到了进一步丰富。魔兽出色的魔力储存能力使得他们不但有了更为强大的生命力，还可借助我们的帮助使用更为强大的魔法——尽管这对其寿命不一定有益。"
tech_monster_tamer3_commanding_mag:0 "指挥魔法"
tech_monster_tamer3_commanding_mag_short:0 "指挥魔法"
tech_monster_tamer3_commanding_mag_desc:0 "指挥魔法的运用允许单个驯兽师在不需要来回奔波的情况下同时指挥多个魔兽并获取来自它们的信息，这同样提高了计划作战的效率。"
tech_monster_tamer4:0 "驯兽师IV型"
tech_monster_tamer4_short:0 "驯兽师IV型"
tech_monster_tamer4_desc:0 "随着魔法的进一步发展，驯兽师如今可以同时更有效的指挥数量庞大的魔兽集群，这同样还减少了训练魔兽所需要的时间。"
tech_monster_tamer4_suicidal_reinforcement_mag:0 "自杀式强化魔法"
tech_monster_tamer4_suicidal_reinforcement_mag_short:0 "自杀式强化魔法"
tech_monster_tamer4_suicidal_reinforcement_mag_desc:0 "普通的强化魔法虽不能伤及身体太多，但其效果也相应的被减弱了。通过把强化魔法的烈度提高到前所未有的高度，我们可以让魔兽的战斗力在短时间内提高到恐怖的水平。"
tech_monster_tamer5:0 "现代化驯兽师"
tech_monster_tamer5_short:0 "现代化驯兽师"
tech_monster_tamer5_desc:0 "现代化的驯兽师不但有着更为强力的道具和魔法的使用权限，还懂得利用魔兽的每一丝潜力为我们而战。"
tech_field_hospital_disinfectant:0 "消毒药剂"
tech_field_hospital_disinfectant_short:0 "消毒药剂"
tech_field_hospital_disinfectant_desc:0 "现代消毒药剂的运用使得我们可以避免过去战地医院中常见的大规模的感染，有效提高部队的存活率。"
tech_field_hospital2_individual_healing_mag:0 "单体恢复魔法"
tech_field_hospital2_individual_healing_mag_short:0 "单体恢复魔法"
tech_field_hospital2_individual_healing_mag_desc:0 "小型恢复魔法的运用使得我们可以为前线士兵进行紧急抢救，这不但能减少士兵的损失，还可以维持进攻的力度。"
tech_field_hospital3_bodies_restoration:0 "义肢"
tech_field_hospital3_bodies_restoration_short:0 "义肢"
tech_field_hospital3_bodies_restoration_desc:0 "义肢的运用可以帮助我们受重伤的士兵在一定程度上获得自理的能力，假如义肢的质量够好，他们中有的甚至能重回前线。"
tech_field_hospital4_group_healing_mag:0 "群体恢复魔法"
tech_field_hospital4_group_healing_mag_short:0 "群体恢复魔法"
tech_field_hospital4_group_healing_mag_desc:0 "大型恢复魔法的运用使得我们的部队可以在一次性抢救更多人，不论是在前线还是在战地医院，这都可以大大提高治疗的效率。"
tech_field_hospital5:0 "现代化野战医院"
tech_field_hospital5_short:0 "现代化野战医院"
tech_field_hospital5_desc:0 "现代化的野战医院有了更好的器具和卫生环境，可以在更有效的援救伤兵以减少战争的损失。"
tech_logistics_company_compressed_rations:0 "压缩军粮"
tech_logistics_company_compressed_rations_short:0 "压缩军粮"
tech_logistics_company_compressed_rations_desc:0 "经过了压缩的军粮可以帮助提高部队补给所能携带的时间和总量，有利于长期战争。"
tech_logistics_company2_adding_dopes:0 "兴奋剂添加"
tech_logistics_company2_adding_dopes_short:0 "兴奋剂添加"
tech_logistics_company2_adding_dopes_desc:0 "通过在军粮中添加一定程度的兴奋剂，我们可以进一步确保军队的持续作战能力。"
tech_logistics_company3_carrying_mag:0 "搬运魔法"
tech_logistics_company3_carrying_mag_short:0 "搬运魔法"
tech_logistics_company3_carrying_mag_desc:0 "搬运类魔法可以加快部队获取补给的速度，同时，这还能帮助部队一次性携带更多补给以维持长期战斗。"
tech_logistics_company4_food_improvement:0 "食品改进"
tech_logistics_company4_food_improvement_short:0 "食品改进"
tech_logistics_company4_food_improvement_desc:0 "经过改进的食品可以为士兵提供更多的营养以供持续作战。"
tech_logistics_company5:0 "现代化后勤连"
tech_logistics_company5_short:0 "现代化后勤连"
tech_logistics_company5_desc:0 "现代化的后勤连有着更强力的道具配备以确保前线的士兵吃饱饭，基础魔法的运用也在后勤任务中起到了越来越大的效果。"
tech_signal_company_telepathy:0 "心灵感应魔法"
tech_signal_company_telepathy_short:0 "心灵感应魔法"
tech_signal_company_telepathy_desc:0 "基础的心灵感应魔法可以帮助我们的通信连在不依赖道具的情况下更快的传输信息（尽管这在距离上受到了很大限制，效率也并不高到哪里去）。"
tech_signal_company2_mobile_radio:0 "便携式无线电"
tech_signal_company2_mobile_radio_short:0 "便携式无线电"
tech_signal_company2_mobile_radio_desc:0 "便携式无线电的研发可以帮助我们的通信连更有效的传输信息，即使是在通讯设备遭到破坏的时刻也一样，提高了指挥部队的效率。"
tech_signal_company3_locate_and_communicate_mag:0 "定位&指挥魔法"
tech_signal_company3_locate_and_communicate_mag_short:0 "定位&指挥魔法"
tech_signal_company3_locate_and_communicate_mag_desc:0 "定位魔法可以帮助定位战场上的友方士兵，而指挥魔法则可以让指挥官远程指挥被定位的右方士兵，这大大提高了战场上士兵作战的精细度和战斗方式的多样性。"
tech_signal_company4_lr_ptelepathy:0 "超距感应魔法"
tech_signal_company4_lr_ptelepathy_short:0 "超距感应魔法"
tech_signal_company4_lr_ptelepathy_desc:0 "超长距离的心灵感应魔法虽然无法在短时间内传达大量清晰信息，但却可以传达许多简单的命令，无论是从总司令部到地方指挥部，还是从地方指挥部到位于前线的具体的士兵。"
tech_signal_company5:0 "现代化通信连"
tech_signal_company5_short:0 "现代化通信连"
tech_signal_company5_desc:0 "现代化的通信连在有了来自新型科技和感应类魔法的帮助下，可以更高效的传达命令以确保军队的协调性。"

###泰坦科技树###
great_war_titan:0 "大战机甲"
great_war_titan_short:0 "大战机甲"
great_war_titan_desc:0 "伟大战争和世界大战时期所使用的机甲，老旧且效率低下，需要大量维护和后勤人员支持，在现代反装甲单位武器面前不堪一击，只有最基本的附魔装置。这些旧时代的机甲大多没有实战价值，不过他们依然象征着机械工程学的一个奇迹，并对工业发展有一定帮助。"
ranger_titan:0 "游侠级泰坦"
ranger_titan_short:0 "游侠级泰坦"
ranger_titan_desc:0 "游侠级泰坦采用了更为轻量级的骨架，这使得他们可以在各种情况的战场下实现极高的机动能力，并使用高效能的泰坦武器。不过，这都是以牺牲防御能力为代价的。游侠级泰坦比一般的泰坦更为脆弱，一旦遭受敌人的集火便会受到严重伤害，在防御上很依赖其它军种的配合。"
lightweight_transformation:0 "轻量化改造"
lightweight_transformation_short:0 "轻量化改造"
lightweight_transformation_desc:0 "游侠级泰坦所采用的骨架乃是经过定制的现代化特殊骨架，其不但造价便宜，而且占地面积和质量都相比较其它几款骨架更为轻巧灵活，发扬游侠级泰坦的这一特点会极大加强它们的机动作战能力。"
ronin_titan_core:0 "浪人核心"
ronin_titan_core_short:0 "浪人核心"
ronin_titan_core_desc:0 "浪人型泰坦在基础的游侠级泰坦上进一步改进了机动能力，不但装配有经过特殊附魔的大剑，还装备用使用特殊弹丸的大型霰弹枪，并且具有短距瞬间移动的能力。"
echanted_swords:0 "附魔巨剑"
echanted_swords_short:0 "附魔巨剑"
echanted_swords_desc:0 "经过附魔的巨剑可以被机动性极强的浪人泰坦很好地利用。这些能够轻易撕碎敌军装甲部队并能抵挡一定程度攻击的钢铁巨剑会为反装甲和突击战提供很大帮助。"
echantment_destroyer:0 "魔法回路破坏"
echantment_destroyer_short:0 "魔法回路破坏"
echantment_destroyer_desc:0 "浪人泰坦配备用可以短暂瘫痪一个区域内敌人魔法使用的特殊装置，虽然这非常短暂，而且范围极其有限，但在浪人泰坦的突击作战中能起到很大作用。"
shrapnel_ejection:0 "霰弹弹射"
shrapnel_ejection_short:0 "霰弹弹射"
shrapnel_ejection_desc:0 "通过改进浪人泰坦所使用的巨型霰弹枪的弹丸，使其可以在平面上来回弹射，直到命中目标，我们可以确保虽然它无法像其它武器一样快速对多地造成伤害，但至少攻击的对象一定不会幸存。"
reinforced_ronin_core:0 "强化浪人核心"
reinforced_ronin_core_short:0 "强化浪人核心"
reinforced_ronin_core_desc:0 "强化后的浪人泰坦在原本的基础上进一步改进了机体的灵活性，在近战战斗中有着更高的优势，不但装配有经过特殊附魔的大剑，还装备用使用特殊弹丸的大型霰弹枪，并且具有短距瞬间移动的能力。"
short_range_instantaneous_movement:0 "短距瞬间移动"
short_range_instantaneous_movement_short:0 "短距瞬间移动"
short_range_instantaneous_movement_desc:0 "浪人泰坦具有在短距离内瞬间移动的能力，这归功于其装备的巨型魔法装置。这份功能可以极大地提高浪人泰坦在近距离战斗时的机动性和生存能力。"
advanced_ronin_core:0 "高级浪人核心"
advanced_ronin_core_short:0 "高级浪人核心"
advanced_ronin_core_desc:0 "现代化的浪人泰坦在原版的基础上得到了全方位的改良，无论是战斗性能，机动性能还是防御性能。它不但装配有经过特殊附魔的大剑，还装备用使用特殊弹丸的大型霰弹枪，并且具有短距瞬间移动的能力。"
northstar_titan_core:0 "北极星核心"
northstar_titan_core_short:0 "北极星核心"
northstar_titan_core_desc:0 "北极星型泰坦在基础的游侠级泰坦上进一步改进了输出能力，通过装备扩散性导弹和巨型附魔狙击步枪，北极星泰坦得到了极为强大的输出能力。"
handheld_ship_guns:0 "手持舰炮"
handheld_ship_guns_short:0 "手持舰炮"
handheld_ship_guns_desc:0 "北极星泰坦所装备的火力比肩战舰舰炮的巨型狙击步枪虽然在射速上并不理想，但在破坏性上确实一等一的高。不但可以轻松摧毁绝大多数装甲单位，还可以对敌军造成极大伤害。"
proliferation_missiles:0 "扩散导弹"
proliferation_missiles_short:0 "扩散导弹"
proliferation_missiles_desc:0 "北极星泰坦所装备的扩散性导弹虽然无法跟踪敌方部队，但却可以在命中目标后分散成多个小型炸弹，对大面积的敌人造成伤害。不幸的是，这份伤害对于敌我都十分有效。"
trip_lock_trap:0 "绊锁陷阱"
trip_lock_trap_short:0 "绊锁陷阱"
trip_lock_trap_desc:0 "北极星泰坦所装备的绊锁陷阱可以为其提供防线部署的能力，加强北极星泰坦在防御战中的作战能力。同时，绊锁陷阱还可以牵制住敌方大型装甲单位，或者困住它们以便于友军发动攻击。"
reinforced_northstar_core:0 "强化北极星核心"
reinforced_northstar_core_short:0 "强化北极星核心"
reinforced_northstar_core_desc:0 "强化后的北极星泰坦在原版的基础上进一步改进了输出能力，通过装备扩散性导弹和巨型附魔狙击步枪，北极星泰坦得到了极为强大的输出能力。"
short_range_flight_capability:0 "短距飞行能力"
short_range_flight_capability_short:0 "短距飞行能力"
short_range_flight_capability_desc:0 "北极星泰坦所装配的大型反重力魔法装置使其获得了在短时间内浮空的能力，这允许北极星泰坦从更好的角度对敌人进行破坏，在进攻战中这也能发挥很大的作用。不过，浮空的北极星泰坦会成为绝佳的靶子。"
advanced_northstar_core:0 "高级北极星核心"
advanced_northstar_core_short:0 "高级北极星核心"
advanced_northstar_core_desc:0 "现代化的北极星泰坦在原版的基础上进一步改进了生存能力，完善了短距离的飞行系统，并通过装备扩散性导弹和巨型附魔狙击步枪，北极星泰坦得到了极为强大的输出能力。"
atlas_titan:0 "天图级泰坦"
atlas_titan_short:0 "天图级泰坦"
atlas_titan_desc:0 "天图级泰坦采用了更为均衡的骨架，这使得他们在保全了一定程度的机动性能的基础上仍可以造成加大的伤害。同时，由于天图级泰坦的设计在常规泰坦的基础上强化了持续作战能力，它在部队中能提供更强大且可靠的推进能力。"
adaptive_enhancement:0 "适应性强化"
adaptive_enhancement_short:0 "适应性强化"
adaptive_enhancement_desc:0 "天图级泰坦所采用的机体虽然不像其它种类那样有自己的特色，可“稳定”本身也是一种优势。天图级泰坦的机身可以在各种地形中游刃有余的移动，并且可以承受更为强大的火力——尽管，这是以武器效能相对底下作为代价的。我们应当发挥天图级泰坦适应性强的特点，加强同其它种类部队的协作能力。"
ion_titan_core:0 "离子核心"
ion_titan_core_short:0 "离子核心"
ion_titan_core_desc:0 "离子泰坦在基础的天图级泰坦上进一步改进了对装甲单位的进攻能力，装备有使用魔力作为弹药库的大型发射器，并且可以释放能反弹地方攻击的特殊护盾。"
diffusion_magic_launcher:0 "扩散魔力发射器"
diffusion_magic_launcher_short:0 "扩散魔力发射器"
diffusion_magic_launcher_desc:0 "离子泰坦所装备的扩散型魔力发射装置虽然不像其它自动化魔法武器一样可以形成特殊的效果，但凭借着纯能量体的高效能，扩散型魔力发射器仍然成为了装甲单位的克星。"
vortex_shield:0 "漩涡护盾"
vortex_shield_short:0 "漩涡护盾"
vortex_shield_desc:0 "离子泰坦所装备的漩涡护盾虽然面积较小，无法在同一时间内抵御过多攻击，可它却具有能够将敌人的攻击无效化并反弹回去的功效，这在防守战中十分有效。"
laser_mega_cannon:0 "激光巨炮"
laser_mega_cannon_short:0 "激光巨炮"
laser_mega_cannon_desc:0 "离子泰坦所装备的激光巨炮无法对大面积的敌人造成伤害，而且需要长时间充能，不过，一旦命中目标即可造成极高的伤害，因而常常被用于对付装甲单位。"
reinforced_ion_core:0 "强化离子核心"
reinforced_ion_core_short:0 "强化离子核心"
reinforced_ion_core_desc:0 "强化后的离子泰坦在原版的基础上进一步改进了对敌人火力的防御能力，装备有使用魔力作为弹药库的大型发射器，并且可以释放能反弹地方攻击的特殊护盾。"
reinforced_magic_storation:0 "强化魔力储蓄装置"
reinforced_magic_storation_short:0 "强化魔力储蓄装置"
reinforced_magic_storation_desc:0 "离子泰坦所装备的高效能武器虽然为其提供了极强的战斗能力，却也使得离子泰坦的持续作战能力并不理想，强化魔力储蓄装置虽然无法从根本上解决问题，但至少可以缓解燃眉之急。"
advanced_ion_core:0 "高级离子核心"
advanced_ion_core_short:0 "高级离子核心"
advanced_ion_core_desc:0 "现代化的离子泰坦在原版的基础上得到了全方位的改进。装备有使用魔力作为弹药库的大型发射器，并且可以释放能反弹地方攻击的特殊护盾。"
tone_titan_core:0 "强力核心"
tone_titan_core_short:0 "强力核心"
tone_titan_core_desc:0 "强力泰坦在基础的天图级泰坦上进一步改进了对生物单位的进攻能力，装备有可以跟踪地方单位的小型导弹和可以为队友提供保护的大型能量护罩。"
small_missile_launcher:0 "小型导弹发射器"
small_missile_launcher_short:0 "小型导弹发射器"
small_missile_launcher_desc:0 "强力泰坦所装备的小型导弹发射器虽然无法对重装甲单位造成有效伤害，但对于轻装甲和普通士兵都能起到很大效果。"
tracking_missiles:0 "追踪导弹"
tracking_missiles_short:0 "追踪导弹"
tracking_missiles_desc:0 "强力泰坦所装备的追踪型导弹允许它在花一段时间校准后发射能够追踪地方目标的高效能导弹。虽然导弹本身需要时间校准，考虑到强力泰坦可以依靠攻击校准，这在战场上并不是特别困难。"
energy_shield:0 "能量护盾"
energy_shield_short:0 "能量护盾"
energy_shield_desc:0 "强力泰坦所装备的能量护盾发生器使得它具有在战场上制造单项的大型的护盾的能力。这不但可以为泰坦本身提供保护，还为周围的其它士兵提供了很大帮助。"
reinforced_tone_core:0 "强化强力核心"
reinforced_tone_core_short:0 "强化强力核心"
reinforced_tone_core_desc:0 "强化后的强力泰坦在原版的基础上进一步改进了对敌人火力的防御能力，装备有可以跟踪地方单位的小型导弹和可以为队友提供保护的大型能量护罩。"
hostile_unit_detection_system:0 "敌对单位探测系统"
hostile_unit_detection_system_short:0 "敌对单位探测系统"
hostile_unit_detection_system_desc:0 "强力泰坦所装备的敌对单位探测系统虽然依赖于发射经过了附魔的特殊导弹以探测周围敌对单位，但在实战中依然具有很强的用途。"
advanced_tone_core:0 "高级强力核心"
advanced_tone_core_short:0 "高级强力核心"
advanced_tone_core_desc:0 "现代化的强力泰坦在原版的基础上得到了全方位的改进。装备有可以跟踪地方单位的小型导弹和可以为队友提供保护的大型能量护罩。"
ogre_titan:0 "巨妖级泰坦"
ogre_titan_short:0 "巨妖级泰坦"
ogre_titan_desc:0 "巨妖级泰坦采用了更为重量级的骨架，这使得它在可以使用更为高效能武器的基础上同时实现持续性作战和高防御能力。不幸的是，这使得巨妖级泰坦在战场上移动缓慢，在进攻战时更为脆弱，因为缺乏灵活的作战能力。"
high_energy_weapons:0 "高效能武器"
high_energy_weapons_short:0 "高效能武器"
high_energy_weapons_desc:0 "巨妖级泰坦所装备的武器大多为较高效能的强力武器，虽然这会导致巨妖级泰坦的移动速度缓慢，并且在进攻战时无法发挥出装甲单位突破作战的优势，可正如其泰坦名一般，巨妖级泰坦所使用的高效能武器正如那传说中的巨型妖怪一样，横扫战场，为敌人带来死亡。"
scorch_titan_core:0 "烈焰核心"
scorch_titan_core_short:0 "烈焰核心"
scorch_titan_core_desc:0 "烈焰型泰坦在基础的巨妖级泰坦上进一步改进了对生物单位的进攻能力，装备有大型铝热剂发射器，可以使用烈焰护盾同时完成对地方单位的伤害并阻挡攻击，同时可以利用铝热剂和其他魔法回路制造火墙阻挡敌人。"
aluminum_thermite_emitter:0 "铝热剂发射器"
aluminum_thermite_emitter_short:0 "铝热剂发射器"
aluminum_thermite_emitter_desc:0 "烈焰泰坦所装备的铝热剂发射器能够对各类敌方单位造成有效伤害，不过由于铝热剂造成的效果不分敌我，这在进攻战中会起到反效果。"
aluminum_thermite_wall:0 "铝热火墙"
aluminum_thermite_wall_short:0 "铝热火墙"
aluminum_thermite_wall_desc:0 "烈焰泰坦所装备的铝热剂发射器除了直接讲火球投射到敌方单位上，还具有制造一面短时间内阻挡任何敌人前进的火墙的功能。这在实战中虽然无法对敌人造成太大伤害，但却可以有效阻拦某一方向的敌军，为友军的防线或是进攻提供帮助。"
heat_shield:0 "热能护盾"
heat_shield_short:0 "热能护盾"
heat_shield_desc:0 "烈焰泰坦所装备的热能护盾可以吸收大量来自敌方的攻击，从子弹，导弹到魔法的能量攻击都可以吸收，甚至可以在近距离战斗的情况下使用高热量的护盾直接对敌人造成伤害。"
reinforced_scorch_core:0 "强化烈焰核心"
reinforced_scorch_core_short:0 "强化烈焰核心"
reinforced_scorch_core_desc:0 "强化后的烈焰泰坦在原版的基础上进一步改进了对敌方单位的的防御能力，装备有大型铝热剂发射器，可以使用烈焰护盾同时完成对地方单位的伤害并阻挡攻击，同时可以利用铝热剂和其他魔法回路制造火墙阻挡敌人。"
flame_trap:0 "烈焰陷阱"
flame_trap_short:0 "烈焰陷阱"
flame_trap_desc:0 "烈焰泰坦装配了一种装载了易点燃气体的气体罐，该气体罐在被发射后会自动释放内部气体，而一旦气体被烈焰泰坦的铝热剂发射器所点燃，战场上就会多出一块巨大的火焰。虽然这在正面作战中用途不大，考虑到敌方单位通常不会等待气体罐砸到自己脸上，不过作为一种陷阱，烈焰泰坦可以让这种气体罐在防御战中发挥极大作用。"
advanced_scorch_core:0 "高级烈焰核心"
advanced_scorch_core_short:0 "高级烈焰核心"
advanced_scorch_core_desc:0 "现代化的烈焰泰坦在原版的基础上得到了全方位的改进，装备有大型铝热剂发射器，可以使用烈焰护盾同时完成对地方单位的伤害并阻挡攻击，同时可以利用铝热剂和其他魔法回路制造火墙阻挡敌人。"
legion_titan_core:0 "军团核心"
legion_titan_core_short:0 "军团核心"
legion_titan_core_desc:0 "军团型泰坦在基础的巨妖级泰坦上进一步改进了对装甲单位的进攻能力，装备有大型转轮机枪，可以切换不同弹药以应对不同类型的敌人，同时装备有在射击时自动展开的机枪护盾。"
giant_rotary_machine_gun:0 "巨型转轮机枪"
giant_rotary_machine_gun_short:0 "巨型转轮机枪"
giant_rotary_machine_gun_desc:0 "军团泰坦所装备的巨型转轮机枪虽然在对敌伤害上没有铝热剂发射器来的可观，但更多的子弹发射能力使得军团泰坦在进攻战中可以对敌人形成更为有效的压制能力，加强突破能力，便于其它部队进攻。"
high_performance_ammunition:0 "高效能弹药"
high_performance_ammunition_short:0 "高效能弹药"
high_performance_ammunition_desc:0 "军团泰坦所装备的巨型转轮机枪支持多种弹药类型，其中一种便是穿甲效果很好的高效能弹药，这可以加强军团泰坦对装甲单位的作战能力。"
blast_type_ammunition:0 "爆破型弹药"
blast_type_ammunition_short:0 "爆破型弹药"
blast_type_ammunition_desc:0 "军团泰坦所装备的巨型转轮机枪支持多种弹药类型，其中一种便是经过了爆破附魔的特殊弹药，这可以加强军团泰坦对生物单位的作战能力。"
reinforced_legion_core:0 "强化军团核心"
reinforced_legion_core_short:0 "强化军团核心"
reinforced_legion_core_desc:0 "强化后的军团泰坦在原版的基础上进一步改进了对敌方单位的防御能力，装备有大型转轮机枪，可以切换不同弹药以应对不同类型的敌人，同时装备有在射击时自动展开的机枪护盾。"
machinegun_shield:0 "机枪护盾"
machinegun_shield_short:0 "机枪护盾"
machinegun_shield_desc:0 "军团泰坦所装备的机枪护盾可以在军团泰坦进行攻击时为机身提供掩护，加强军团泰坦的持续作战能力和防御能力。"
advanced_legion_core:0 "高级军团核心"
advanced_legion_core_short:0 "高级军团核心"
advanced_legion_core_desc:0 "现代化的军团泰坦在原版的基础上得到了全方位的改进，装备有大型转轮机枪，可以切换不同弹药以应对不同类型的敌人，同时装备有在射击时自动展开的机枪护盾。"

###非常规战争科技树###
mp_storage_tech:0 "魔力储存技术"
mp_storage_tech_short:0 "魔力储存技术"
mp_storage_tech_desc:0 "魔力储存技术早在工业革命时期便有了端倪，尽管早期的容器大多不稳定，且无法量产。随着时代的进步，现在的技术已经可以满足大面积魔法储蓄装置生产的需要。"
early_caster_equipments:0 "基础魔导装备"
early_caster_equipments_short:0 "基础魔导装备"
early_caster_equipments_desc:0 "基础的魔导装备专注于将魔法的效果最大化，在对使用者要求高的基础上强调次数少但高杀伤性的战斗方式，对使用者有一定危害，同时可维护性较差。"
caster_weapons_1:0 "常规魔导装备I型"
caster_weapons_1_short:0 "常规魔导装备I型"
caster_weapons_1_desc:0 "常规魔导师装备包括魔导步兵单位所使用的特制移动设备，附魔武器，高级魔力储藏装置，自动魔法回路等一系列武器配备。"
all_terrain_combat_special_training:0 "全地形作战特训"
all_terrain_combat_special_training_short:0 "全地形作战特训"
all_terrain_combat_special_training_desc:0 "魔导师部队本身的特性允许他们无视多数地形带来的不便以进行战斗，针对恶劣地形进行特训可以为他们赢得更多的优势。"
caster_weapons_2:0 "魔导师装备II型"
caster_weapons_2_short:0 "魔导师装备II型"
caster_weapons_2_desc:0 "魔导师装备包括战斗魔导师所使用的特制移动设备，附魔武器，高级魔力储藏装置，自动魔法回路等一系列武器配备，升级的型号在此基础上改进了稳定性。"
enhanced_device_stability:0 "增强设备稳定性"
enhanced_device_stability_short:0 "增强设备稳定性"
enhanced_device_stability_desc:0 "许多魔导师用的设备由于我们对魔法的了解甚少而表现出极高的不稳定性，有些魔导师甚至直言穿着这些设备战斗“无异于背着滴答作响的定时炸弹”。无论是为了增加作战效率，还是提高魔导士兵的信心，改良设备的稳定性都是有必要的。"
harmonize_production_specifications:0 "统一生产规格"
harmonize_production_specifications_short:0 "统一生产规格"
harmonize_production_specifications_desc:0 "通过统一生产规格，减轻了生产线上的负担，避免了过多的重复生产操作，使生产流程更加稳定和标准化，提高了装备生产效率。"
active_mp_supply:0 "活性化魔力供给"
active_mp_supply_short:0 "活性化魔力供给"
active_mp_supply_desc:0 "许多魔导师抱怨当下魔力供给的方式过于保守，虽然安全考虑十分必要，可在短兵交接的激烈战斗中，保守的设计容易导致战局的弱势。为此，新的设计方案被提交到台面上来，通过提高魔力储蓄装置中的魔力活性，我们可以确保战斗时魔力供给的高效与高质。"
improved_mobility:0 "改良机动性"
improved_mobility_short:0 "改良机动性"
improved_mobility_desc:0 "经过改良后的魔导师装备使得士兵们可以以更加恐怖的速度翱翔天际，或是在战场上游走，这给予了他们更多进攻敌人的机会。"
caster_weapons_3:0 "魔导师装备III型"
caster_weapons_3_short:0 "魔导师装备III型"
caster_weapons_3_desc:0 "魔导师装备包括战斗魔导师所使用的特制移动设备，附魔武器，高级魔力储藏装置，自动魔法回路等一系列武器配备，升级的型号在此基础上改进了稳定性，同时在魔力储蓄上限上得到了进一步突破。"
advanced_energy_supply_facility:0 "高级供能设备"
advanced_energy_supply_facility_short:0 "高级供能设备"
advanced_energy_supply_facility_desc:0 "更高级的供能设备可以确保在战斗激烈的状况下，魔导师部队仍然可以得到充足甚至是过量的魔力补给和魔法回路运算协助，这样可以有效提高部队全方面的战斗能力。"
caster_weapons_4:0 "魔导师装备IV型"
caster_weapons_4_short:0 "魔导师装备IV型"
caster_weapons_4_desc:0 "魔导师装备包括战斗魔导师所使用的特制移动设备，附魔武器，高级魔力储藏装置，自动魔法回路等一系列武器配备，升级的型号在此基础上改进了稳定性，同时在魔力储蓄上限上得到了进一步突破，并改进了装备整体的便携性与防御能力。"
caster_recon_weapons_1:0 "侦查魔导装备I"
caster_recon_weapons_1_short:0 "侦查魔导装备I"
caster_recon_weapons_1_desc:0 "由单兵携行和操作使用的侦察魔导装备，配备了长程通讯装置以及侦察用设备。"
enhanced_endurance:0 "强化续航能力"
enhanced_endurance_short:0 "强化续航能力"
enhanced_endurance_desc:0 "通过强化魔导师单位的持续作战能力，我们可以在一定程度上弥补他们相较其它兵种的，在持续作战上的弱势。"
caster_recon_weapons_2:0 "侦查魔导装备II"
caster_recon_weapons_2_short:0 "侦查魔导装备II"
caster_recon_weapons_2_desc:0 "由单兵携行和操作使用的侦察魔导装备，配备了长程通讯装置以及侦察用设备。新型号采用了容量更大的魔力储藏装置，提高了信号传输稳定性。"
spatial_awareness_circuit:0 "空间感知回路"
spatial_awareness_circuit_short:0 "空间感知回路"
spatial_awareness_circuit_desc:0 "提升使用者和周围事物的空间关系的知觉以及对位置、方位、距离等各构成空间关系要素的觉察的特化型魔法回路。"
enhanced_recognition_magic:0 "强化识别魔法"
enhanced_recognition_magic_short:0 "强化识别魔法"
enhanced_recognition_magic_desc:0 "辅助辨析战场信息的魔导插件，强化对不同魔力反应、功率和频段的设备的探查。"
long_distance_communication_circuits:0 "长距通讯回路"
long_distance_communication_circuits_short:0 "长距通讯回路"
long_distance_communication_circuits_desc:0 "基于战场复杂魔力反应条件下发生特殊频段的通讯魔力回路，具备更远的通信范围。"
frontline_coordination_center:0 "前线协调中心"
frontline_coordination_center_short:0 "前线协调中心"
frontline_coordination_center_desc:0 "前线临时协调中心电台，作为前线与指挥部间魔力信号中枢，提供必要时跨区域调度支掇，根据现场处置需要，协调跨区域资源调度。"
caster_recon_weapons_3:0 "侦查魔导装备III"
caster_recon_weapons_3_short:0 "侦查魔导装备III"
caster_recon_weapons_3_desc:0 "由单兵携行和操作使用的侦察魔导装备，配备了长程通讯装置以及侦察用设备。新型号在上一代的基础上进行改进，在空间感知、识别探查、信息传输和协调运作等方面都得到了更进一步的发展。对魔晶矿的应用已进入了新的阶段，合理使用此装备将在战场上发挥不俗的先发优势。"
short_distance_teleportation_magic:0 "短距瞬移魔法"
short_distance_teleportation_magic_short:0 "短距瞬移魔法"
short_distance_teleportation_magic_desc:0 "从几乎重合的三维空间的两点之一穿过，将直接跨越两点间的三维空间而在同一时间出现在另外一点，这样便达到了瞬间移动的效果。将这样难以置信的超古代魔法从古代典籍破译至魔晶矿的切片上蚀刻，装载该切片装备的使用者便也可以实现极短距离的瞬移——尽管这一发明是昂贵且一次性的，并且仍具备相当多的局限性。"
caster_recon_weapons_4:0 "侦查魔导装备IV"
caster_recon_weapons_4_short:0 "侦查魔导装备IV"
caster_recon_weapons_4_desc:0 "由单兵携行和操作使用的侦察魔导装备，配备了长程通讯装置以及侦察用设备。世界上第一种进入服役的第四代侦察魔导装备，当今世界综合性能最佳的侦察魔导装备，只有经过侦察和通讯方面的专业训练才可以发挥出它应有的作用。由于相关科技领域的复杂性和模块加工成本，魔导装备的开发和制造成本普遍较高。"
caster_attaker_weapons_1:0 "攻击魔导装备I"
caster_attaker_weapons_1_short:0 "攻击魔导装备I"
caster_attaker_weapons_1_desc:0 "由单兵携行和操作使用的攻击魔导装备，配备了补充火力空白的进攻型装备。"
high_energy_destructive_magic:0 "高能破坏魔法"
high_energy_destructive_magic_short:0 "高能破坏魔法"
high_energy_destructive_magic_desc:0 "魔导师部队所能使用的高强度破坏性魔法可以在短时间内迅速摧毁地方步兵防御工事和非重型装甲单位。"
caster_attaker_weapons_2:0 "攻击魔导装备II"
caster_attaker_weapons_2_short:0 "攻击魔导装备II"
caster_attaker_weapons_2_desc:0 "由单兵携行和操作使用的攻击魔导装备，配备了补充火力空白的进攻型装备。新型号采用了强度更高的材料以承载更高效的魔法回路，显著提高了威力。"
wide_area_bombing:0 "广域轰炸"
wide_area_bombing_short:0 "广域轰炸"
wide_area_bombing_desc:0 "通过提高轰炸魔法回路的效能以及改善装备的魔力供应方式，强力的攻击魔导师们可以在战场上创造一片由大型炮击魔法笼罩的轰炸区。在强大的火力面前，任何人防工事都被认为是不堪一击的。"
sustained_fire_suppression:0 "持续火力压制"
sustained_fire_suppression_short:0 "持续火力压制"
sustained_fire_suppression_desc:0 "通过进一步改良魔力供应回路，攻击魔导师们可以在战场上提供更持久，更强力的火力支援。足以强大的火力压制能力允许我们大幅度提高对敌人造成的伤害，并且有助于在防御战中取得更大的优势。"
compressed_shells:0 "压缩炮弹"
compressed_shells_short:0 "压缩炮弹"
compressed_shells_desc:0 "随着重型装甲，魔导护盾的大面积运用，高穿透，对单性能优秀的压缩魔法回路作为大面积轰炸的替代品提出。通过改良攻击用的魔法回路，我们可以创造更加精确，且能无视敌人一切重型装甲，魔法护盾的高性能攻击方式。"
over_the_horizon_strike:0 "超视距打击"
over_the_horizon_strike_short:0 "超视距打击"
over_the_horizon_strike_desc:0 "随着观测技术，远程打击精确性的进一步提升，我们得以将超视距打击的概念运用在魔法战中。通过在远超视线可及范围外的地区发动攻击，我们既可以保证士兵们的安全，也可以打对面一个出其不意。"
caster_attaker_weapons_3:0 "攻击魔导装备III"
caster_attaker_weapons_3_short:0 "攻击魔导装备III"
caster_attaker_weapons_3_desc:0 "由单兵携行和操作使用的攻击魔导装备，配备了补充火力空白的进攻型装备。新型号在上一代的基础上进行改进，在伤害范围、火力持续、魔力压缩和打击范围等方面都得到了更进一步的发展。对魔晶矿的应用已进入了新的阶段，合理使用此装备将在战场上发挥不俗的进攻优势。"
auto_track_magic:0 "自动追踪魔法"
auto_track_magic_short:0 "自动追踪魔法"
auto_track_magic_desc:0 "连续跟踪并测量以一定速度和加速度运动的运动目标的轨迹参数，在此过程中不断修正参数，这样便可以达到箭无虚发的效果。将这样难以置信的超古代魔法从古代典籍破译至魔晶矿的切片上蚀刻，装载该切片装备的使用者便也可以实现“能拐弯的制导炮弹”——尽管这一发明是昂贵且一次性的，并且仍具备相当多的局限性。"
caster_attaker_weapons_4:0 "攻击魔导装备IV"
caster_attaker_weapons_4_short:0 "攻击魔导装备IV"
caster_attaker_weapons_4_desc:0 "由单兵携行和操作使用的攻击魔导装备，配备了补充火力空白的进攻型装备。世界上第一种进入服役的第四代攻击魔导装备，当今世界综合性能最佳的攻击魔导装备，只有经过数学和火炮方面的专业训练才可以发挥出它应有的作用。由于相关科技领域的复杂性和模块加工成本，魔导装备的开发和制造成本普遍较高。"
caster_support_weapons_1:0 "支援魔导装备I"
caster_support_weapons_1_short:0 "支援魔导装备I"
caster_support_weapons_1_desc:0 "由单兵携行和操作使用的支援魔导装备，配备了多用途的工程技术装备以及后勤装备。"
modular_design:0 "模块化设计"
modular_design_short:0 "模块化设计"
modular_design_desc:0 "将魔导师用的装备进行模块化的设计有助于维护的便捷性和装备本身的便携性，不但方便了后勤部队维持前线装备的运转，还使得装备本身的携带更加简易。"
caster_support_weapons_2:0 "支援魔导装备II"
caster_support_weapons_2_short:0 "支援魔导装备II"
caster_support_weapons_2_desc:0 "由单兵携行和操作使用的支援魔导装备，配备了多用途的工程技术装备以及后勤装备。新型号采用了易于制造和保养的模块化设计，并开始向多功能化方向进展。"
field_medical_modules:0 "野战医疗模块"
field_medical_modules_short:0 "野战医疗模块"
field_medical_modules_desc:0 "应用于野战条件下实施卫勤保障的魔导装备工具箱。通过模块化设计以具备更好的轻便性，基本功能齐全。"
logistics_handling_module:0 "后勤搬运模块"
logistics_handling_module_short:0 "后勤搬运模块"
logistics_handling_module_desc:0 "应用于搬移、升降、装卸和短距离输送物料或货物的魔导机械设备。通过模块化设计以具备更好的机动性，基本功能齐全。"
frontline_engineering_module:0 "前线工程模块"
frontline_engineering_module_short:0 "前线工程模块"
frontline_engineering_module_desc:0 "应用于渡河桥梁、路面、伪装和军用机械工程等的魔导机械设备及成套装配式工事构件。通过模块化设计以具备更好的适应性，基本功能齐全。"
equipment_repair_module:0 "装备修复模块"
equipment_repair_module_short:0 "装备修复模块"
equipment_repair_module_desc:0 "应用于部队所有装备和轻武器的日常修理、战时装备保障的魔导设备工具箱。通过模块化设计以具备更好的通用性，基本功能齐全。"
caster_support_weapons_3:0 "支援魔导装备III"
caster_support_weapons_3_short:0 "支援魔导装备III"
caster_support_weapons_3_desc:0 "由单兵携行和操作使用的支援魔导装备，配备了多用途的工程技术装备以及后勤装备。新型号在上一代的基础上进行改进，在战地急救、物资搬运、简易工程和维修效率等方面都得到了更进一步的发展。对魔晶矿的应用已进入了新的阶段，合理使用此装备将在战场上发挥不俗的保障优势。"
light_survival_module:0 "轻型生存模块"
light_survival_module_short:0 "轻型生存模块"
light_survival_module_desc:0 "伤亡无可避免，让士兵拥有第二条生命是无数人的强烈渴求。将这样难以置信的超古代魔法从古代典籍破译至魔晶矿的切片上蚀刻，装载该切片装备的使用者便也可以实现令目标对象即使身负重伤仍然可以堪堪存续并为急救争取宝贵的时间——尽管这一发明是昂贵且一次性的，并且仍具备相当多的局限性。"
caster_support_weapons_4:0 "支援魔导装备IV"
caster_support_weapons_4_short:0 "支援魔导装备IV"
caster_support_weapons_4_desc:0 "由单兵携行和操作使用的支援魔导装备，配备了多用途的工程技术装备以及后勤装备。世界上第一种进入服役的第四代支援魔导装备，当今世界综合性能最佳的支援魔导装备，只有经过医疗和后勤方面或工程和维修方面的专业训练才可以发挥出它应有的作用。由于相关科技领域的复杂性和模块加工成本，魔导装备的开发和制造成本普遍较高。"

###附魔废案###
melee_weapons_enchantment:0 "近战武器附魔"
melee_weapons_enchantment_short:0 "近战武器附魔"
melee_weapons_enchantment_desc:0 "通过给近战武器附魔，我们可以极大地增加近战单位的战斗能力和破甲能力，让他们在面对装甲部队时也不落下风。"
stabalization_enchantment:0 "稳固型魔力回路"
stabalization_enchantment_short:0 "稳固型魔力回路"
stabalization_enchantment_desc:0 "采用稳固型的魔力回路可以增加近战武器的耐用性，这有助于我们稳固防线。"
pulse_enchantment:0 "冲击型魔力回路"
pulse_enchantment_short:0 "冲击型魔力回路"
pulse_enchantment_desc:0 "采用冲击型的魔力回路可以增加近战武器在近距离战斗和高烈度战斗下的能力，增加我们部队突破敌军防线的能力。"
melee_battle_shield:0 "近战护盾"
melee_battle_shield_short:0 "近战护盾"
melee_battle_shield_desc:0 "近战护盾用于指代使用魔法生成的轻型护盾。此类护盾不能抵挡重火力的攻击或者是魔法师的针对性攻击，但在近距离战斗中往往能救士兵一命。发展该项技术可以为我们的近战步兵提供很大优势。"
weakness_location:0 "要害定位"
weakness_location_short:0 "要害定位"
weakness_location_desc:0 "通过使用自动化魔法定位敌人的薄弱处（尽管受限于技术能力，我们还无法确保定位的效果最优化），我们可以极大地提高近战步兵战斗时的能力。"
enchanted_bullets:0 "附魔型子弹"
enchanted_bullets_short:0 "附魔型子弹"
enchanted_bullets_desc:0 "通过给子弹利用特殊的魔力回路（法阵）附魔，我们可以增加步兵应对重型地方单位的能力。除此之外，经过附魔的子弹还在威力上得到了提升，我们可以实现更有效的杀伤率。附魔型子弹可以击穿敌人的魔力护盾，尽管敌方可以通过采用不同种类的魔力护盾来削弱伤害，一般而言，我们可以通过给重型武器增加附魔的强度以强行破坏地方的护盾，或者等待后勤人员完成敌方魔力回路的破解。"
ap_enchantment:0 "破甲型魔力回路"
ap_enchantment_short:0 "破甲型魔力回路"
ap_enchantment_desc:0 "破甲型魔力回路可以为我们的子弹增加更为强劲的穿深，让普通的士兵也可以实现大口径步枪才能做到的穿甲效果。"
harming_enchantment:0 "杀伤型魔力回路"
harming_enchantment_short:0 "杀伤型魔力回路"
harming_enchantment_desc:0 "杀伤型魔力回路可以提高我们子弹的威力。杀伤类的附魔从小型爆炸到毒素覆盖应有尽有，可以极大地增加子弹对敌人的杀伤性。"
aiming_asistance:0 "辅助瞄准系统"
aiming_asistance_short:0 "辅助瞄准系统"
aiming_asistance_desc:0 "使用魔法技术，我们可以为步兵装备安装类似辅助瞄准的功能，包括用魔法生成的可放大倍数的瞄准镜，高亮敌人位置和轻度的枪口位置矫正等一系列功能。"
explosive_enchantment:0 "爆破型魔力回路"
explosive_enchantment_short:0 "爆破型魔力回路"
explosive_enchantment_desc:0 "爆破型魔力回路为普通的步兵武器提供了类似榴弹的效果，该效果可以根据对应部队的喜好来切换是破甲型的还是杀伤型的。这能提高部队的战斗能力。"
recon_enchantment:0 "侦查型魔力回路"
recon_enchantment_short:0 "侦查型魔力回路"
recon_enchantment_desc:0 "侦查型魔力回路使得子弹并不只是杀人的工具。经过适当的附魔，射击出去的子弹可以'高亮'或者'染色'正在移动或者具有威胁性质的非友方目标（尽管这并不精确）。"
automatic_enchantment:0 "自适应式魔力回路"
automatic_enchantment_short:0 "自适应式魔力回路"
automatic_enchantment_desc:0 "自适应式魔力回路是一种可以让子弹根据敌方魔力回路自动判定并决定破盾方式的魔法。在过去，反魔力护盾的子弹附魔都依赖于高魔力浓度的破坏或是后勤人员对敌方魔力回路的破解，而现在，该自动魔法可以在无需魔法师手动调整的情况下破解敌军的魔力回路（尽管并不是每次都能成功，但远比手动调配高效）并实现穿甲效果。"
light_magic_shield:0 "轻型魔力护盾"
light_magic_shield_short:0 "轻型魔力护盾"
light_magic_shield_desc:0 "本世代的魔力护盾在现代科技的帮助下已经不再是魔法师的特权。经过自动魔法回路的设计，我们可以通过改造步兵装具来让我们的前线部队获得魔法护盾的加成。当然，受限于单兵携带魔力上限和装备容易损坏的客观事实，该魔力护盾不得不设计的比较简单粗暴，防御能力也没有那么高。"
light_magic_shield_enchantment:0 "轻量型魔法回路"
light_magic_shield_enchantment_short:0 "轻量型魔法回路"
light_magic_shield_enchantment_desc:0 "采用轻量型的魔力回路，我们可以保证士兵在进攻战时的优势。轻量型的魔力护盾更加便于携带而且对后勤十分友好，虽然对防御能力的提升不大。"
heavy_magic_shield_enchantment:0 "重装型魔法回路"
heavy_magic_shield_enchantment_short:0 "重装型魔法回路"
heavy_magic_shield_enchantment_desc:0 "采用重装型的魔力回路，我们可以保证士兵在防守战时的优势。重装型的魔力护盾不易携带，但是在进行阵地战时有着更大的优势，并且能提高防御能力。"
portable_magic_vessel:0 "便携式魔力容器"
portable_magic_vessel_short:0 "便携式魔力容器"
portable_magic_vessel_desc:0 "经过改进的魔力容器更适合步兵携带。这些容量更大且更轻便的魔力容器可以为步兵的魔力护盾和附魔子弹提供十分有用的帮助。"
harm_first:0 "伤害优先"
harm_first_short:0 "伤害优先"
harm_first_desc:0 "我们的魔力回路应当在接下来的发展中专注于对敌人造成更多伤害，毕竟，我们每对敌人造成多一点伤害，他们能反过来伤害我们的能力就少一点。"
body_system_destroy:0 "机体结构破坏"
body_system_destroy_short:0 "机体结构破坏"
body_system_destroy_desc:0 "无论是生物还是机械，他们都有一个共同点——那就是他们都依赖于身体来战斗。不同于看不见摸不着的亡灵，假如我们的魔法可以针对性的破坏对方的整个身体，定能起到十足的效果。然而，如此复杂的魔法回路会降低我们对魔法护甲的穿透能力以及对重型单位造成的伤害（因为这个回路暂时还不能对大型器械起到效果）。"
targeting_enchantment:0 "针对性回路"
targeting_enchantment_short:0 "针对性回路"
targeting_enchantment_desc:0 "既然机体结构破坏的魔法回路不能对大型器械造成影响，那我们从一开始就不应该去考虑这个问题。通过增强魔法回路的针对性，我们可以进一步加强对小型个体的破坏力，确保他们在中招后绝无回旋余地。"
completely_collapse:0 "全面瓦解"
completely_collapse_short:0 "全面瓦解"
completely_collapse_desc:0 "既然机体结构破坏的魔法回路不能对大型器械造成影响，那我们就更应该去想办法改进它了。通过增加魔法回路的通用性和强度，我们可以让它在面临大型器械时也能不落太大的下风。不过，这会在一定程度上削弱我们魔法对个体造成的伤害，同时，我们也无法确保魔法回路对大型器械的破坏性，顶多就是造成一定程度的破坏。"
no_survivors:0 "无人生还"
no_survivors_short:0 "无人生还"
no_survivors_desc:0 "通过继续强化我们的魔法技术，我们得以将更复杂的术式浓缩在更小的回路中。因此，我们得以扩张结构破坏魔法的范围和效果，确保敌人连同他们旁边的更多敌人一起消失的无影无踪。当然，如此极端的战术可能会在进攻时反过来对我方部队造成影响，在防守战时也可能发生类似的事情，但为了战胜敌人，这也是没有办法的。对吧？"
automatic_enchantment_reinforcement_I:0 "学习能力强化"I
automatic_enchantment_reinforcement_I_short:0 "学习能力强化I"
automatic_enchantment_reinforcement_I_desc:0 "通过增加自适应式魔力回路的复杂性，我们得以增加进一步增强其回路的复杂性，防止敌人制作反制术式或者采用更复杂的魔法护盾应对。"
automatic_enchantment_reinforcement_II:0 "学习能力强化II"
automatic_enchantment_reinforcement_II_short:0 "学习能力强化II"
automatic_enchantment_reinforcement_II_desc:0 "通过增加自适应式魔力回路的复杂性，我们得以增加进一步增强其回路的复杂性，防止敌人制作反制术式或者采用更复杂的魔法护盾应对。"
break_first:0 "破甲优先"
break_first_short:0 "破甲优先"
break_first_desc:0 "现代战争不同于以往，由钢筋铁骨打造的钢铁巨兽早已取代了石器时代的荒野魔兽或是拿着突击步枪的愣头兵。为了符合时代的潮流，我们应当专注于对装甲单位造成更多的伤害。"
enchantment_short_out:0 "短期回路屏障"
enchantment_short_out_short:0 "短期回路屏障"
enchantment_short_out_desc:0 "通过给地方造成短期的魔法回路故障，我们可以确保对方在遭受了我方攻击后有一段无法使用护盾的时间，借此，我们可以造成更多伤害。然而，这样复杂的回路必定会挤兑攻击型回路的空间，造成进攻能力下降。"
backfire_enchantment:0 "反噬魔法"
backfire_enchantment_short:0 "反噬魔法"
backfire_enchantment_desc:0 "比起处理魔法本身，解决施法者永远都是更加高效的战术。虽然绝大多数施法者都会将他们自身隐藏得很好，或者给军队列装了自动术士因而根本不需要施法者在场，我们可以利用他们同术士的距离来设计反噬魔法以对使用者造成伤害。尽管这会使得我们的短路魔法没那么有效，但总体来讲，也能有效提高我们的进攻能力。"
shortout_reinforcement:0 "短路效果强化"
shortout_reinforcement_short:0 "短路效果强化"
shortout_reinforcement_desc:0 "通过进一步强化短路魔法的效果，我们可以给部队创造更长的进攻时机。"
enchantment_destroy:0 "回路破坏"
enchantment_destroy_short:0 "回路破坏"
enchantment_destroy_desc:0 "比起简单的‘短路’，或许更为直接的‘破坏’要高效的多。通过改进我们的魔法回路，我们得以在一定程度上直接破坏敌人的魔力回路以协助进攻，当然，这样大范围的攻势是免不了要伤到自己人的..."
magic_refinement_improvement:0 "魔力精炼技术改良"
magic_refinement_improvement_short:0 "魔力精炼技术改良"
magic_refinement_improvement_desc:0 "通过改良我们魔力的精炼技术，我们得以在强化防御魔法的基础上提高单兵携带魔力的上限。"
magic_refinement_improvement_plus:0 "量大管饱"
magic_refinement_improvement_plus_short:0 "量大管饱"
magic_refinement_improvement_plus_desc:0 "专注于提高部队携带的魔力体量可以提高部队的防御能力，尽管这并不能帮助他们进一步抵御高强度的穿甲攻击。"
quality_first:0 "质量优先"
quality_first_short:0 "质量优先"
quality_first_desc:0 "专注于提高部队携带的魔力和魔力回路的质量可以提高他们面对强力魔法或者穿甲武器时的防御能力，尽管这意味着携带魔力的数量会被减少，因而导致防御能力不会上升太多。"
compound_magic_shield:0 "复合型魔法护盾"
compound_magic_shield_short:0 "复合型魔法护盾"
compound_magic_shield_desc:0 "魔法科技的进步使得我们可以研发出加倍复杂的魔法护盾。这些新型护盾可以为我们提供强大的帮助，阻挡常规破甲魔法回路的攻击。"
defensive_reinforcement_again:0 "防御能力再强化"
defensive_reinforcement_again_short:0 "防御能力再强化"
defensive_reinforcement_again_desc:0 "我们可以进一步强化魔法护盾的防御能力以确保部队的安全。"
backfire_enchantment_on_shield:0 "棘刺魔法"
backfire_enchantment_on_shield_short:0 "棘刺魔法"
backfire_enchantment_on_shield_desc:0 "我们可以在护盾上增加基础的反击措施，这样敌人在攻击的时候反而会受到伤害。"
advanced_magic_shield:0 "高级魔法护盾"
advanced_magic_shield_short:0 "高级魔法护盾"
advanced_magic_shield_desc:0 "随着魔法科技和现代工业的不断进步，我们可以研发出更加复杂但又更为耐用的高强度护盾魔法。它们将会是前线部队的好帮手。"
early_special_forces:0 "特种部队装备I型"
early_special_forces_short:0 "特种部队装备I型"
early_special_forces_desc:0 "早期的特种部队装备，大多为主力部队的附属编制，受限于技术支持，同普通的部队相比并没有太大的优势，仅能为部队进攻提供一定帮助。"
special_forces_equip_inprovement_I:0 "特种部队装备改良I"
special_forces_equip_inprovement_I_short:0 "特种部队装备改良I"
special_forces_equip_inprovement_I_desc:0 "改良我们的特种部队装备，我们可以增强特种部队在面对不同情况时的应对能力。"
special_forces_equip_inprovement_II:0 "特种部队装备改良II"
special_forces_equip_inprovement_II_short:0 "特种部队装备改良II"
special_forces_equip_inprovement_II_desc:0 "改良我们的特种部队装备，我们可以增强特种部队在面对不同情况时的应对能力。"
special_forces_equip_inprovement_III:0 "特种部队装备改良III"
special_forces_equip_inprovement_III_short:0 "特种部队装备改良III"
special_forces_equip_inprovement_III_desc:0 "改良我们的特种部队装备，我们可以增强特种部队在面对不同情况时的应对能力。"
improve_special_forces_weapons:0 "特种部队装备II型"
improve_special_forces_weapons_short:0 "特种部队装备II型"
improve_special_forces_weapons_desc:0 "特种部队所使用的装备，在同期步兵装备的基础上得到了改进和优化。"
advanced_special_forces_weapons:0 "特种部队装备III型"
advanced_special_forces_weapons_short:0 "特种部队装备III型"
advanced_special_forces_weapons_desc:0 "特种部队所使用的装备，在同期步兵装备的基础上得到了改进和优化。"
modern_special_forces_weapons:0 "特种部队装备IV型"
modern_special_forces_weapons_short:0 "特种部队装备IV型"
modern_special_forces_weapons_desc:0 "特种部队所使用的装备，在同期步兵装备的基础上得到了改进和优化。"