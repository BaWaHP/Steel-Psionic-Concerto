###政党名称###
WUN_pioneer_communism_party:0 "不存在的概念"
WUN_pioneer_communism_party_long:0 "不存在的概念\n§g七河腹地没有先锋共产主义的土壤。§!"
WUN_revolutionary_communism_party:0 "不存在的概念"
WUN_revolutionary_communism_party_long:0 "不存在的概念\n§g七河腹地没有革命共产主义的土壤。§!"
WUN_worldunion_socialist_party:0 "不存在的概念"
WUN_worldunion_socialist_party_long:0 "不存在的概念\n§g七河腹地没有社会世联主义的土壤。§!"
WUN_worldunion_democrat_party:0 "不存在的概念"
WUN_worldunion_democrat_party_long:0 "不存在的概念\n§g七河腹地没有民主世联主义的土壤。§!"
WUN_liberal_republican_party:0 "不存在的概念"
WUN_liberal_republican_party_long:0 "不存在的概念\n§g七河腹地没有自由共和主义的土壤。§!"
WUN_conservative_republican_party:0 "不存在的概念"
WUN_conservative_republican_party_long:0 "不存在的概念\n§g七河腹地没有保守共和主义的土壤。§!"
WUN_authoritarian_republican_party:0 "七河集团代理执政"
WUN_authoritarian_republican_party_long:0 "七河集团代理执政\n§g七河联邦于七河腹地设立的代理执政。§!"
WUN_national_socialist_party:0 "不存在的概念"
WUN_national_socialist_party_long:0 "不存在的概念\n§g七河腹地没有国家社会主义的土壤。§!"
WUN_authoritarian_nationalism_party:0 "至高至福的七城之王"
WUN_authoritarian_nationalism_party_long:0 "至高至福的七城之王\n§g王是一个有智慧的、精力充沛的人，具有惊人的记忆力。他对人没有说过真话，没有真正的朋友，是个精致的利己主义者。他热爱女人，有六百多名妃子；他憎恶男人，却有三千多名男宠。他是一个极坏的统帅，也是一个极好的统帅。在狂热与冷冽中，王独自登上一个山头，脱去帽子，以脸朝地，祈祷了三天三夜，说：“我非这场灾祸的挑起者；赐我力量去复仇吧。”于是他下山来，策划行动，准备战争。§!"
WUN_paternal_autocrat_party:0 "乌鲁格那赫尔与北路军"
WUN_paternal_autocrat_party_long:0 "乌鲁格那赫尔与北路军\n§g以草原上好狠斗勇之风气著称、由半人马各族部落组成的于摩北路军队和军工厂乌鲁格那赫尔构成了王的左膀右臂。在通过崇高的印记任命后，由王之长子雅霍甫·胡达·伯克担任阿奇木伯克总管一城并负责管理。乌鲁格那赫尔军工厂以乌骓王赠予的乌骓工匠为主，征役大量民夫设立，走私、破解、仿制、量产……忙碌的车间里破碎的颅骨、干涸的血迹被一层又一层新鲜的“尘土”覆盖，正是这一切勤劳与奉献才为王带来了取之不尽用之不竭的“力量”。§!"
WUN_wizard_rules_party:0 "欲望之丘"
WUN_wizard_rules_party_long:0 "欲望之丘\n§g我们的文化之所以能够创建起来，是因为我们在生存竞争的压力之下，曾经竭力放弃满足我们的原始冲动。而我们的文化之所以能够不断地被改造，也是由于历代加入社会生活的每个个体不断为公众的利益而牺牲自己本能的享乐。而其所利用的本能冲动，又尤其以性的本能最为重要。性的精力被升华了，他用转向其他较高尚的社会目标来替代了追求性的目标。但性的冲动不易控制，由此而导致的组织并不具有一定的稳固性，而参与文化事业的每个人也可能会有受性力反抗的危险。一旦性力放肆起来，回复到它原始的目标，那么社会文化就将面临最大的危机。因此社会不希望有谁指出性和社会发展的关系，敌视、否认、打压……性受到非难，它被看成是丑恶的、不道德的，甚至是危险的。\n\n把不合意的事实看成虚妄，继而找各种理由去加以反对，这是生物的本性。把不能接受的东西看成是不真实的，然后用来自情感冲动的一些逻辑的、具体的理由来驳斥事实，即使面对强有力的反驳也要坚持其偏见，这则是社会的本性。文化、社会、集体、道德……它们扭曲了我们的“本源”。性是第一生产力，所有生命应当回到生命“本源”的样子并重新演化新的形态。§!"
WUN_religious_extremism_party:0 "拜苍天"
WUN_religious_extremism_party_long:0 "拜苍天\n§g以“白色苍天”为永恒最高神的传统宗教，至高无上的权力俱是由“苍天”授予每一位在这片大地上统治的首领。在通过崇高的印记任命后，由王之次子雅霍甫·海古拉·伯克担任阿奇木伯克总管一城并负责管理。扩张是由神核准的，所以，任何拒绝投降的人，都将由于阻挠了神意而遭受最严厉的惩罚。这一团体可以在几乎不受限制的范围内任意解释法律，并有权决定一切祭祀事务。对未死之民强制改信“苍天”，对不信教者或仍泯顽不灵抱持虚伪信仰者——尤以信仰伪神“转世虞姬”者为主的顽劣群体，进行必要的“讨伐”并“物尽其用”。§!"
WUN_anarchism_party:0 "马匪"
WUN_anarchism_party_long:0 "马匪集团\n§g游走在城市边缘，驾驶非法改装车辆的半人马族非法暴力团体。作为具有黑社会性质的犯罪团体，在无视法律的同时，以根据朴素的价值观念为弱者主持正义而著称。§!"

###民族精神###
ZHE_king_behind_king:0 "王身后的王"
ZHE_king_behind_king_desc:0 "每个成功者的背后都往往隐藏着一个或多个不为人知的支持者。至高至福的于摩王陛下可以通过他熟练到近乎本能的……各种方式方法以从别人那里得到他想要的一切，比如从乌骓王身上——于摩所需的武器、装备、生产线……只要一点小小的付出，不管上至乌骓王还是下至军官下属，他都能从他们身上得到他想要的一切。他什么都可以得到，这不过是合算的买卖，美貌和身体在命运的一开始就被标好了价签，他对此深信不疑。\n\n也许不只乌骓王，即便是你，只要能付得出足够打动他的……“价钱”？\n§g注：效果会在开局一会儿后体现。§!"
ZHE_king_behind_king_tt:0 "地图外民用工厂：§Y+[?ZHE_king_behind_king_if]§!\n地图外军用工厂：§Y+[?ZHE_king_behind_king_af]§!"
WUN_detention_policy:0 "羁縻政策"
WUN_detention_policy_desc:0 ""
WUN_nomadic_society:0 "游牧社会"
WUN_nomadic_society_desc:0 "以游牧为主要生产方式，以畜牧业为基础，以部落为单位的社会组织形态。在游牧社会中，通常以被驯化的各类魔晶羊为主要放牧对象，通过移动放牧的方式利用水草资源，以获取生活资料，并保持草场可持续利用的生活方式。由于需要不断地迁徙以寻找适宜的草场和水源，因此缺乏稳定的居住地和固定的生产资料。其社会结构较为松散，族群之间的关系复杂，部落之间常常发生争斗。"
WUN_boke_system:0 "伯克制度"
WUN_boke_system_desc:0 "七河流域腹地，以“伯克”统领地方事务，具有封建领主制性质的传统政治制度。各城的伯克通常世袭，无固定名额，根据城市的大小、事务的繁简而设置。伯克们管理各地大小事务，仅需向上负责，最高等的阿奇木伯克逐级向下授予征税的权力，下级则自行确定征税办法，对各城、村摊派诛求，无所不要。伯克们通常都拥有相当数量的家仆和私财，其土地以征用无偿劳役耕种为主，同时垄断水利，囤粮居奇，私用肉刑，买卖奴隶。\n\n由于七河流域北部游牧迁徙的流动性，伯克间也常因草场和水源发生冲突。"
WUN_regional_security:0 "区域安全"
WUN_regional_security_desc:0 ""
WUN_untamed:0 "桀骜不驯"
WUN_untamed_desc:0 ""
WUN_spread_of_racist_sentiment:0 "种族主义情绪蔓延"
WUN_spread_of_racist_sentiment_desc:0 "自三十年代起，面对七河联邦的商品倾销和资本输出，传统的农牧产品和手工产品很快失去了市场，传统经济方式在瞬间便被冲击得土崩瓦解，伯克们的统治利益也受到巨大的损害。利用我们的廉价劳动力和原料，七河联邦的垄断企业们迅速成为巨兽，对我们的控制愈发加深。恶性循环下，腐朽的前乌骓王朝却只是向黑心商人（墨精灵）们一次又一次的示弱和妥协。出卖筑路权的行径最终激起了各地人民反对，半人马种族主义逐渐觉醒。四十年代开始，七河腹地起义不断，此后几经反复，屡遭镇压，但这团熊熊烈焰仍未被扑灭。如今，这团火焰掌握在王的手中，但即便是王，此刻也正被它灼烧着掌心。"
WUN_spread_of_nationalism_sentiment:0 "民族主义情绪蔓延"
WUN_spread_of_nationalism_sentiment_desc:0 "面对来自外部的威胁，一个想像的共同体——民族，成为了凝聚我们力量的趁手兵器。那些臣服于他人的民族胆小、怯懦，温顺得就像被驯化的宠物，这些丧失尊严的家伙不配与我们同一种族。作为最优秀的族群，我们理所应当的生存、繁衍和统治。一个理想的民族国家应当是这样——它的居民来自同一族群，说同一种语言，拥有同一文化和宗教，它的居民是单一而纯净的。"
WUN_Ill_fares_the_land:0 "沉疴遍地"
WUN_Ill_fares_the_land_desc:0 "东境户口空虚，皆由使命繁数，穷幽极远，无不皆至，每有一使，所属搔扰，驽困邑宰，则拱手听其渔猎，桀黠长吏，又因之重为贪残，纵有廉平，郡犹掣肘。"
WUN_way_of_the_king:0 "于摩王的为君之道"
WUN_way_of_the_king_desc:0 ""
WUN_obey_to_king:0 "拜服于王"
WUN_obey_to_king_desc:0 ""
WUN_hot_knife_with_cold_blood:0 "热刀凉血"
WUN_hot_knife_with_cold_blood_desc:0 ""
WUN_break_down:0 "崩坏"
WUN_break_down_desc:0 ""
WUN_original_desire_idea:0 "原欲"
WUN_original_desire_idea_desc:0 ""
WUN_sun_comes_down:0 "时日曷丧"
WUN_sun_comes_down_desc:0 "王不会在乎有多少人恨他——有多少人恨他，就有多少人爱他。"
WUN_sarcoma:0 "肉瘤"
WUN_sarcoma_desc:0 "肉山浅表出现不明原因的膨胀性生长的肿块，增大速度明显，可见扩张和增大增粗的静脉，因末梢神经或神经干受刺激或压迫出现狂躁症状。部分肉瘤被抛掷于地表，因血供不足而继发坏死，或因继发感染形成溃烂，多呈菜花状，伴有恶臭及血性分泌物。" 
WUN_callus:0 "肉趼"
WUN_callus_desc:0 "肉山体表长期受压迫、摩擦，出现对长期机械性摩擦的反射性保护性反应，局部发生硬而平滑的角质增厚，局部体液分泌减少，感觉迟钝。"
WUN_tissue_fluid:0 "肉汁"
WUN_tissue_fluid_desc:0 "肉山浅表出现不明原因的的组织液渗出，加快了肉山的移动速度，同时在湿润伤口环境下，细胞可直接在伤口中迁移，而加快愈合速度。部分伤口伴有脓性分泌物，较黏稠、难以挪动，伴有局部红肿、温度升高，出现腐败气味，进一步刺激了肉山的活跃性。"
WUN_granulation:0 "肉芽"
WUN_granulation_desc:0 "肉山的伤口出现由新生薄壁的毛细血管以及增生的成纤维细胞构成的幼稚阶段的纤维结缔组织，并伴有炎性细胞浸润，肉眼表现为鲜红色，颗粒状，柔软湿润，形似鲜嫩的肉芽。肉山将通过主动搔刮肉芽组织以促进伤口愈合，最终形成灰白色、质地硬、缺乏弹性的瘢痕组织，而脱落的肉芽组织在腐败前将通过释放化学物质改变和控制周围生物行为。"
WUN_mound_of_flesh:0 "肉髻"
WUN_mound_of_flesh_desc:0 "肉山顶部出现有较多沟回的肉褶，呈现饱满状态，沟回不断加深、数量不断增加，伴有脑功能强化、记忆力增强以及情绪趋于稳定的情况。肉山逐渐具有能动性、预见性、计划性及对事物有客观的反应，行为趋于有目的性、连贯性和逻辑性。"

WUN_chrysalis_dynamic_modifier:0 "母胎"
WUN_chrysalis_dynamic_modifier_desc:0 "完全依靠欲望驱动，在筑巢后不会进行任何移动、休眠或排泄的活动的肉山母胎。顶部有着类大型花朵般的结构，在积攒足够的营养后可以“开花”，在开放的同时会产生极大的热量，并一次性散布大量肉眼可见的直径大小的孢子。这些孢子在破碎后将释放大量的“种子”与甜美“芳香物质”，腐烂的气息令人陶醉其中。\n\n——它亦想努力繁衍生长，直至把这片土地变成花田为止。"

WUN_rob_hole:0 "盗洞"
WUN_rob_hole_desc:0 "据传现于摩王曾差人盗墓取财，甚至亲临现场指挥，所获皆用于弥补军饷不足。"

###领导人###
WUN_Yaqub_kuli_bek:0 "雅霍甫·胡里·伯克"
WUN_Yaqub_kuli_bek_desc:0 "雅霍甫·胡里·伯克出生于乌骓境内，自小便是个孤儿的他流落辗转于乌骓和于摩的各个城市街头，靠着拉帮结伙以抢劫偷盗为生。一次偶然的契机他被捕，审讯的半人马侍卫官看中他年轻的容颜，于是将他收为了娈童。没人在乎长久的不幸与苦难为他带来了什么，即便生活已见起色他也改变不了自己的残忍本色，夜晚他是缠绵于各个军官床榻的交际花，而背地里他仍时不时出去偷猎旅人并放血杀害——不为财宝，只为快感与温热。十数年前，七河联邦选择了放弃乌骓这块高投入低回报的烫手山芋，仅存的秩序于是也荡然无存了，整个乌骓陷入了一片混乱，多方势力加入了对乌骓王位的角逐。雅霍甫·胡里·伯克的野心也躁动起来，他将义妹献给了乌骓王的次子以换取成为一名副官的机会。几次铁腕手段的镇压和平叛让他得到赏识并节节高升，很快他就成为了拥有自己势力的一方诸侯。与此同时，与乌骓接壤的于摩多地都爆发了混乱，这让他看到了机会，他煽动于摩地区的种族和民族矛盾，利用这些不和的情绪借机进入了于摩。在统一整个七河腹地后他再也抑制不住野心，他加冕自己为大于摩王、至高至福的七城之王，并宣称所有的半人马部族都将在他荣光与带领下征服一切，直到陆地的尽头……"
WUN_ZhangMazi:0 "白马"
WUN_ZhangMazi_desc:0 ""
WUN_zidovudine:0 "齐多夫定"
WUN_zidovudine_desc:0 ""
WUN_Libido:0 "力比多"
WUN_Libido_desc:0 "诞生于母胎中的孩子，拥有着与王相仿的容颜、纯粹的性格与强烈的“爱”的冲动，祂在未成熟的条件下被唤醒了本能。一切思想与行为的根本动力在于性，至少祂是这么认为的。现在，你的眼睛疲倦了、累了、闭上你的眼睛。"

###将领###

###内阁###
WUN_yaqub_huda_bek:0 "雅霍甫·胡达·伯克"
WUN_yaqub_huda_bek_desc:0 "那时的他还只是个卖不出去的废物，人贩子像拖着牲口般拽着他穿过熙攘的街巷。非人的日子持续了不知多久，当他以为自己这辈子将横死街头时，王的出现打断了这一切。他捡起了王“随手”丢下的短刀，以野兽的心境刺向了那贩子。时至今日，胡达依然能够想起那天的鲜血留下的温存以及王的笑魇。\n\n自那以后，王成为了他的新父亲，杀戮则成为了胡达生活中的一部分。每杀死一个敌人，他的胸膛就会更暖和，而王也从不吝惜对他的称赞。胡达沐浴着、散布着王太阳般的光芒——他是从大地上升起的一轮血月，他反射着王的威仪，就连河流、湖泊也被侵染。\n\n但，乌云遮蔽了月亮。他望向天空，那朵乌云叫做海古拉——他的二弟，王正毫不掩饰地展现出对海古拉的偏爱。日东月西，这令胡达痛苦地意识到自己离太阳依然遥远，甚至不如那朵挡在身前的乌云。\n\n不要紧。他只需再建起一座直入云霄的尸山，然后爬上去，把乌云踩在脚下。"
WUN_yaqub_haighura_bek:0 "雅霍甫·海古拉·伯克"
WUN_yaqub_haighura_bek_desc:0 "王的孩子们都有着美丽的容颜，而海古拉则是众多义子中的绝色。美艳的他从不遮掩自己的欲望，无论男女贵贱、何时何地，凡他看上的都是他今宵的情人。开放的作风和传统向来是躁动与苦闷最好的调剂，这也让海古拉胡里成为了这个国家里最受欢迎者第二。普通人的支持不值一提，但王的偏爱最是让他有恃无恐。如此恩宠自然令他不再把任何兄弟放在眼里，他们不过是衬托花朵的花瓶，不喜欢的话让父王砸掉便是，总有新瓶替换他们。\n\n他是大地上的一团欲望之火，火光迎着风妖娆地跳动着，挑逗着黑夜中的蛾子向着欲望扑去，粉身碎骨。"
WUN_yaqub_ginsham_bek:0 "雅霍甫·引上·伯克"
WUN_yaqub_ginsham_bek_desc:0 "引上作为王的三子，闯祸的能力却是义子们中的第一等。赌博是他短暂人生中最大的爱好，小小年纪的他嗜赌如命。王城里的赌坊不敢怠慢，但凡长了眼睛的赌客们更是没人敢赢这位爷，但他也总是能想办法玩个尽兴——只有最刺激的赌局才能获得突破阈值的至上的快感。那些死囚和不要命的家伙被他找来，无辜者被他掳去家人孩子拽上赌桌，他要玩那些最依赖运气的、最危险的游戏，他要赌那些他们最输不起的东西，哪怕这样的结果往往是自己受伤或是对手的财产、亲人、性命，但他依旧乐此不疲——无论输赢。\n\n赌坊外的一切都与里面无关，来来往往的人将形形色色的欲望倾泻于赌桌，无数家庭的命运随着骰子跳动旋转，哭喊与狂笑都淹没在嘈杂声中。引上驰骋在这片欲望之地，至于他是欲望的骑手还是俘虏都已经不重要了，纵欲者只需遵循自己的欲望。"
WUN_lust_mountain:0 "肉山"
WUN_yunusjan_cutarai_bek:0 "玉努斯江·库达莱·伯克"
WUN_yunusjan_cutarai_bek_desc:0 "“你也是和我一样的气味。”在当年带兵出走北方部落，选择投奔南边的儿子时，库达莱构思过无数种结局，却唯独没有像现在这样的。在他带着两千余人马投奔王后，本以为自己会立马被暴君一脚踢开的库达莱，此时却惊奇地得知自己因投诚有功而被封赏，甚至做了自己儿子的副官——胡达，已经做了王的孩子。他于是迅速抓住机会结识于摩要员，上下打点，很快就在官场出了名。对一般人而言，爬到伊什罕伯克这样的要职已是天上的老爷了，但库达莱的目光并未停留在原地。人称有着一只“政治鼻子”的他善于捕捉宦海中任何微妙的气息，并凝聚着属于自己的浓烈——利用职务之便，他不断扩展自己在各级伯克和官吏们中的影响力，为登上高峰积蓄着力量。"
WUN_niyaz_kharidal_bek:0 "尼牙孜·哈尔伊达尔·伯克"
WUN_niyaz_kharidal_bek_desc:0 "“再来……一杯！”在无尽的美酒和盛宴中，沉湎于口腹之欲的哈尔伊达尔本就不多的上进心早已消磨殆尽，也正是因此，王才得以放心地将权力交给这坨低贱的肥肉，让他全权管辖王城中大小事务。如果你想找他，只要走遍王城的酒馆就一定能找到那个正在寻欢作乐的哈尔伊达尔。他无时无刻不在享乐，只有美酒佳肴才能讨他换心。那些倒了霉厨子稍有不合他的心意便会被他剁下手脚，碾碎成饲料喂给羊群，再被做成一桌好菜端上来。已经倚仗自己的地位和亲信的身份得到了太多不该得到的东西。但“伯克大人”又怎么会满足于现状呢？在他几乎被肥肉掩埋的昏黄眼珠中，究竟倒映着怎样的贪婪？或许有一天，哈尔伊达尔会因自己的欲望付出千百倍的代价，但在这一切发生前，他将继续享乐——毕竟这身后的事情，又和他有什么关系呢？"

###企业###
Urugnahel:0 "乌鲁格那赫尔"
Urugnahel_desc:0 "以乌骓王赠予的乌骓工匠为主，征役大量民夫设立的军工厂，走私、破解、仿制、量产……忙碌的车间里破碎的颅骨、干涸的血迹被一层又一层新鲜的“尘土”覆盖，正是这一切勤劳与奉献才为王带来了取之不尽用之不竭的“力量”。"
firdaws_allqbal:0 "幸福花园"
firdaws_allqbal_desc:0 "王自登基以来为修建陵寝而征役的庞大队伍，他们用脚下的尘土和像尘土一般的躯体筑造着这座最伟大的建筑——一切典雅的韵文、修辞术、寓言以及任何言辞的艺术都无法描述的伟大存在，他们将和它一道永垂历史。"

###国策###
WUN_way_of_the_king_focus:0 "于摩王的为君之道"
WUN_way_of_the_king_focus_desc:0 "“为君之道，必须先存百姓。若损百姓以奉其身，犹……”\n\n“烦死了！什么这君、什么那道，这远乡来的秃驴叨叨个没完，你当你是什么东西？死开！给老子叉出去！”\n\n“大王您消消气儿，咱们好不容易抓着一个懂登基和礼法的，您先登了大位，把面子赚足，到时候再砍他也不迟啊！”\n\n“咳……嗯……那就赶紧把他给老子……给本王弄……‘请’回来，快点！”"
WUN_way_of_the_king_focus_tt:0 "获得修正：§Y于摩王的为君之道§!，其效果为：\n稳定度：§G+10%§!\n每周稳定度：§R-0.2%§!"
WUN_wines_and_joys:0 "无酒不欢"
WUN_wines_and_joys_desc:0 "七河北部素来尚酒，而我们至高至福的七城之王、伟大的于摩王陛下更是无酒不欢。不知几时起，这种风俗或者说下对上的伦理逐渐变成了政治强制力——酒桌上的觥筹交错，“酒”的权力逻辑深入于摩人骨髓，尽显自我摧残与矮化的服从之底色。但美酒、美食、美人、“美意”岂可辜负？"
WUN_wines_and_joys_tt:0 "§Y于摩王的为君之道§!追加效果：\n生活消费品：§Y+5%§!\n主要党派每日新增支持率：§G+0.1%§!\n主要党派对稳定度的修正：§G+10%§!"
WUN_followers_survive:0 "从我者生"
WUN_followers_survive_desc:0 "“真可怜，又被她们欺负了吧。你应该清楚，只有我才是你的朋友，只有我爱你啊。为什么！为什么要害怕！你的朋友只有我一个人，我对你这么好。对不起，我不该打你，但是谁叫你是坏孩子，原谅我，我会把所有的爱给你，我真的爱你，刚才不该打你。对不起，我爱你，对不起，我爱你，对不起，我爱你，对不起，我爱你，对不起，我爱你。这张脸真可爱啊，但是它迟早会变老，我不忍心看到你变老的样子，让时间停在这一刻吧。现在死掉，你的可爱会成为永恒，求你死吧，我好残忍，原谅我，今天原谅我犯下的错误，明天会给你更多的爱。”"
WUN_followers_survive_tt:0 "§Y于摩王的为君之道§!追加效果：\n半人马民兵组织度：§G+5%§!\n半人马民兵防御：§G+5%§!"
WUN_food_for_sex:0 "食色性也"
WUN_food_for_sex_desc:0 "我们至高至福的七城之王、伟大的于摩王陛下从不掩饰对“原欲”的追求，“天体盛宴”在军中是常态，这极大的团结了我们。"
WUN_food_for_sex_tt:0 "§Y于摩王的为君之道§!追加效果：\n生活消费品：§Y+5%§!\n动员速度：§G+10%§!\n适役人口修正：§G+10%§!"
WUN_king_behind_king:0 "王身后的王"
WUN_king_behind_king_desc:0 "于摩国上上下下都知道，我们至高至福的七城之王、伟大的于摩王陛下身后还有一名王者——乌骓王。但这并不意味着于摩就是傀儡、仆从。相反，乌骓王才是那个被王操弄的对象。"
WUN_king_behind_king_tt:0 "§Y王身后的王§!追加效果：\n地图外民用工厂：§Y+1§!\n地图外军用工厂：§Y+1§!"
WUN_crazy_or_die:0 "不发狂！就灭亡！"
WUN_crazy_or_die_desc:0 "“大王心情又不好了，听这动静，只怕新来的那几个还不够折腾几宿的啊。”\n\n“就是啊，大王这都玩废了得有……六百多个了吧，真不愧是大王啊……”\n\n“什么废不废的，大王吃肉，咱们这些小的总归还能喝汤呢，嘿嘿。”\n\n“啊、对，就是就是，嘿嘿嘿嘿……”"
WUN_crazy_or_die_tt:0 "§Y于摩王的为君之道§!追加效果：\n生活消费品：§Y+5%§!\n非核心人力：§G+10%§!\n陆军训练时间：§G+10%§!"
WUN_reward_killings:0 "杀得好！重赏！"
WUN_reward_killings_desc:0 "“你做的好！做的好啊！于摩的纯净需要所有臣民的努力！你该有赏！重赏！”"
WUN_reward_killings_tt:0 "§Y于摩王的为君之道§!追加效果：\n步兵攻击：§G+5%§!\n步兵防御：§G+5%§!"
WUN_mine_all_mine:0 "我的！都是我的！"
WUN_mine_all_mine_desc:0 "“啊呀呀，大王亲临，这真是……实在是……但军爷您看咱们这小部族实在是……赶上这年景我们也是没有办法……您看这些够不够孝敬您两杯酒水……哎哟！”\n\n“少他妈跟老子废话！这点钱就想把老子给打发了！你们已经一个月没纳捐了，要么粮跟我们走，要么人跟我们走！咱们大王这次特意来一趟，总不能空着手回去吧？”"
WUN_mine_all_mine_tt:0 "§Y于摩王的为君之道§!追加效果：\n生活消费品：§Y+5%§!\n补给消耗：§G-10%§!\n补给携行：§G+48§!小时"
WUN_blessed_king:0 "至高至福的王"
WUN_blessed_king_desc:0 "每个成功者的背后都往往隐藏着一个或多个不为人知的支持者。乌骓王拥有王想要的一切，王也自有办法获得这一切，因为他是至高至福的王，他总有办法。"
WUN_im_the_sky:0 "我即是天"
WUN_im_the_sky_desc:0 "不论世俗或宗教，我们至高至福的七城之王、伟大的于摩王陛下都是至高无上的存在，一切属于王。王之命运即国家之命运，王权之灭亡即国家之灭亡，王之富有即国家之富有，所有臣民必须承担保证王的权威、财富与光荣的永延的义务。"
WUN_against_means_die:0 "逆我者死"
WUN_against_means_die_desc:0 "“我好孤独……我好难受……全都去死吧……我好痛苦……我好难过……全都去死吧……我好绝望……我好冷……全都去死吧……死吧……死吧……死吧……”"
WUN_hot_knife_cold_blood:0 "热刀凉血"
WUN_hot_knife_cold_blood_desc:0 "“你看，刀子抽出来还是温热的哦，但是你的血慢慢就会凉掉了，真可惜。你看，我的心也是凉的，还能重新暖和起来吗？”\n\n“大王！这家人墙缝里还藏了钱，太狡猾了！大王你看这……呃啊……大、大……王……”\n\n“吵死了。后面那几个，赶紧把这周围几个部族都给收拾干净。”"
WUN_roshan:0 "肉山"
WUN_roshan_desc:0 "王相信每个人都应当遵从内心的欲望，每个人心中都有一座欲望的山丘亟待登顶征服。它也可以成为埋葬你的高冢。"
WUN_hate_a_lot:0 "时日曷丧"
WUN_hate_a_lot_desc:0 "逃亡中的人们谩骂着、诅咒着、唾弃着曾经被自己亲手捧上宝座的王，憎恶着王所带来的一切，并笃定王才是所有悲剧的源头，一切肮脏的根源。但曾经将王迎来的是谁？曾匍匐在王的脚下极尽谄媚的又是谁？难道王身上承载的就没有他们的欲望吗？没有人在此刻还能回答或是思考这些问题。余下的崇拜者正虔诚而狂热的试图和一旁不甘而恐惧的人们裹挟着一起涌入那巨大而又温暖的身躯，他们和之前的人一样前仆后继，他们和之前的人一样在死亡面前渴求着为原欲献身。"
WUN_hate_a_lot_tt:0 "§Y选中时的效果：§!\n添加民族精神：§Y原欲§!，§R愿这份力量得以保佑我们§!。\n人力：§R-1000000§!\n§Y在首都添加6个肉山部队单位§!。\n§R所有国家都会把我们当成疯子！§!\n\n§Y完成后的效果：§!"
WUN_fucking_crazy:0 "§R疯子！§!"
WUN_yarlig:0 "被祝福的敕令"
WUN_yarlig_desc:0 "王的孩子们没有在这场灾厄中死去，相反他们获得了统御肉山的能力；尽管毫无血缘关系，但伟大的王仍将祂的爱与赐福传播给了他们。"

