WUN_yarlig_decision_category_desc:0 "王就和太阳一样，在祂温和的阳光里，像我这样可怜的人，才能很好的滋长繁荣！新事物的诞生建立在旧事物的死亡之上，要使一切生物继续繁衍下去，就必须同时有其他生物的死亡。每月将有5%来自已完全控制的核心省份和2.5%来自已完全控制的非核心省份的生命投入母胎的怀抱，每当母胎充盈时，我们将会获得一项祝福或母胎中诞生的新生命，已获得的祝福不会重复获得。\n\n§R【母胎当前进度】§!:[?WUN_yarlig_var|Y]/§C1000000§!\n§g当母胎进度满值时，随机获得任意一项不重复的效果，然后进度清零。§!"
