###事件###
WUN.1.t:0 "肉山"
WUN.1.d:0 "王的精神状态已经越来越失控，漫长的战争折磨着他的精神，消耗着他的心力，他的阴郁已经不是剥几个人、挖几颗眼、砍几条手就能排解。在这物资匮乏的时刻，王召集众人，举办了一场史无前例的天体盛宴，足有五万余人参与其中，这样的盛宴以后或许永远不会再有。王命令众人将酒倒满水池，将新鲜的肉条挂在树梢上，所有人享受着此刻的欢愉，仿佛忘记了战争还在继续。盛宴足足持续了十五日，这样淫靡且混乱的场合已经无法用任何已知的语言或文字去形容。在这段时间里，无数人饮下特制的烈酒，然后在激情与失神中成为“山丘”的一部分——尘土是生命的开始和结局，他们就这样筑垒起了一座欲望的“山丘”。前面的人倒下了，后面的人涌上来，踩踏着脚下满地的“尘土”、排泄物、食物碎屑、混合着的不明液体……他们就这样继续前进，他们一个接着一个，一个接着一个，一个接着一个，一个接着一个……"
WUN.1.a:0 "“还活着的人，去征服欲望吧。”"
WUN_lust_mountain_name:0 "欲望之丘"
WUN.2.t:0 "追随之人"
WUN.2.d:0 "没有人会料到今天的一切，这场史无前例的天体盛宴竟会见证一个新的灾厄的诞生。\n但王究竟做错了什么？这一切难道是王一手导致的吗？王难道没有求救过吗？当昔日的王被收做娈童的时候，可曾有人救过他吗？当王的生身父母选择将其生下时，有想过要养育他吗？当王被迫辗转于各个军官、王公的床榻，以出卖身体换取一日之生存的时候，有人说过尊重他的欲求吗？\n\n王有欲望，那些所谓的贵族难道就没有欲望了吗？那些道貌岸然的政客难道就没有欲望了吗？那些将他捧上王座的“民众”难道就不曾有过一丝欲望吗？王是对的，王是绝对正确的。残忍是欲望的代名词，快意是我们的毕生所求；再大的政客，再高贵的王室贵族也不过是欲望前的行尸走肉，一团烂泥碎肉罢了。\n\n王不过是顺应了所有人推崇的欲望，被裹挟在迷雾中失去自我——席地而坐的马驹，早已折断了后腿，只有这样才能永远安分的坐在看台上。\n所以我亲爱的王啊，请安心的睡去吧。听着那铃声，向着内心的欲望前进吧；吾等将永远追随您。\n\n我伟大的王啊——"
WUN.2.a:0 "我王永恒。"
WUN.3.t:0 "懊悔之人"
WUN.3.d:0 "“为什么？为什么？究竟是为什么？为什么事情会变成这样？我不想死！我不想变成这群恶心的肉块里的一部分！我还有那么多财产没有花出去，我的财宝，我的一切！全完了，全都完了！为什么该死的胡里要成为王？为什么没人反对他？那个娈童、贱种！他凭什么成为王？只有我才应该是王，只有我身上流着高贵的血，只有我才是天上的太阳！他凭什么……王……凭什么……”\n……\n\n“对啊，是我啊，是我给了他武器、是我给了他支持、是我将他推举上了王座，这一切都是我——我的欲望！我的暴力！我的野心！如果我没有贪图他的一切，他那该死贱女人妹妹、他那该死的身体、他那该死的一切！如果我没有……我是罪人，是欲望的走狗，是快意的奴隶……啊……啊……”\n……\n\n“原来如此、原来如此啊！胡里！你不是罪人，‘我’才是罪人啊！一面折射阳光的镜子能有什么罪过？是我……对不起……是我……原来是“我”把你变成了这样……哈哈哈……原来是‘我’……哈哈哈哈哈哈哈……都去死吧！都去死吧！死吧！”"
WUN.3.a:0 "如果这也算救赎。"
WUN.3.b:0 "如果这也算忏悔。"
WUN.4.t:0 "理性之人"
WUN.4.d:0 "“联邦国防军第一师失去联系！”\n“特别机动装甲第一师已经投入战斗！”“惠远外围据点已经失守！”\n\n前线的战报如雪花般飞到她面前，扰乱着她的心神。\n“都走吧。”指挥室中的普萘洛尔淡淡的说到。不断失去联系的部队和不断失守的消息扰乱着她的心神。话音未落，原本繁忙而又嘈杂的指挥室瞬间安静了下来，谁都不敢确定到底有没有听错那三个字。\n“都走吧。”普萘洛尔长吁了一口气又重复了一遍，然后缓缓摘下了头上的墨镜。\n\n“董事长……这里已经……”\n“不要质疑我的判断，我们是怎样高贵的种族？理性、实用、崇尚逻辑，再活过一次的人就不要再有遗憾了。现在我的理性告诉我，留在这里只有死路一条，我要求、我命令你们都给我滚，这是我最后一条命令——有一个算一个，都给我滚，能滚多远就滚多远，永远都不要回来。”人群还是死一般的寂静，终于，一个人动了，然后是另一个，然后是更多的人，直到指挥室中只剩下普萘洛尔与秘书长息斯敏。\n\n普萘洛尔向窗外看去，那巨大的肉山距离指挥室似乎只有一步之遥。她看着这座巨大的肉山，上面的人脸狰狞、欢笑、扭曲、愤怒、悲伤、恐惧、傲慢……仿佛在对她呼唤。\n“█▄▅▃▂▅█▅▄▁——”在这一瞬间，她似乎听到了一些声音，她感到不真切，但最后的理智仍让她将颤抖的息斯敏揽入怀中。息斯敏什么也不会看见，她一向被保护得很好。\n\n腥热已然充斥了鼻腔——看那温暖而盛情的山丘，我们别无选择。"
WUN.4.a:0 "“愣着干嘛，快走啊！”"
WUN.5.t:0 "重生之人"
WUN.5.d:0 "“行行好，军官老爷！别打了，这钱俺不要了，求求您别打了！”\n于摩城是一个巨大的熔炉和监牢，哭喊声与求饶声每天的不同时刻都会在于摩城内上演。这些声音共同成为了这座城市的主旋律，但和那些被王征服的地方相比，于摩城已经算是天堂一般的存在了——你至少还能在这里苟延残喘。\n依王的性格，他是不会对这些事有什么反应的，他的手下也不会——敢于劝谏的人早就死在了各种刑具上。但今天恰巧在城内散步的王来到了这个高声哭喊的年轻人面前。\n\n“大、大王……”正在施暴的军官停下了动作，声音也紧张起来。他深知自己面前的王是多么的喜怒无常，他的姐姐数月前就被掳走，自此杳无音讯，而他那当官的父亲也早就……\n“你，是不是很喜欢这么做？”王看着面前战战兢兢的年轻军官冷冷的发问。\n“属、属……属下只是喝、喝多了才……才……”\n\n话音未落，军官的右臂混着血液被抛到了半空，而后随着撕心裂肺的喊叫瘫软地落在地面。一脚踹开湿了裤子的军官，王看向在地上瑟瑟发抖的男孩——谨慎的余光瞟向这边——弱小、倒霉，但眸子里却闪烁着狠戾与阴鸷。\n\n“你，叫什么？”王蹲下来，玩味的打量着男孩。\n“大王，俺、俺是个孤儿。他们都叫俺提那内里。”男孩连忙拍拍身上的尘土跪下。\n\n“提那内里。好，起来！”王从腰间抽出把长刀扔给了男孩，男孩诚惶诚恐的接下，并立刻对王的眼神心领神会。当提那内里拖着刀来到军官面前，此时的军官早已没有了先前的傲气，磕头如捣蒜，而提那内里只是笑笑——一刀，接着一刀，再接着一刀……直到军官和一滩烂肉再也没什么分别。男孩回头冲着王露出了一个灿烂的笑容，他的声音因兴奋而颤抖：“大、大王，砍死了，他死了！”看着面前的男孩，王忍不住拍手叫好——"
WUN.5.a:0 "“走吧，跟我走吧。”"
WUN.6.t:0 "真心为您"
WUN.6.d:0 "提那内里的脑子很灵光，作为一个孤儿他知道该怎么样才能在于摩活下去。他聪明的忘记了很多事情，父母的长相？生活的希望？还是他那颗早已冰沁又麻木的心脏？那些已经失去过的东西早就不重要了，对，什么都不重要了，只要能吃上一顿饱饭——有他一碗水，有他妹妹一块馕。\n\n在街道上叫卖点小物件——被军官分文不给的强买——自己拿着连本钱都不够的几枚钱回家。这似乎成了提那内里每天的生活常态。\n“多少给点吧，老爷。不然、不然我明个可就真没活路了啊！！！”\n\n可怜的是，提那内里在脑海中想象的大声斥责军官的情景并没有出现，那些脏话到了嘴边就立刻变成了最卑微，最软弱的乞求。但即使是这样，提那内里依然做出了他人生中最激烈的反抗——他死死地抱住了军官的大腿。\n\n显而易见，提那内里收获的不是金钱，而是军官毒打他一顿的理由。在一次又一次的疼痛中，提那内里心中的勇敢只是昙花一现，麻木重新占据了他内心的高地。“行行好，军官老爷！别打了，这钱俺不要了，求求您别打了！”他又开始了求饶，驾轻就熟。他从记事起就在向所有人求饶，父母、老板、邻街的乞丐……他就是这样活下来的，他只是在做一直以来他在做的事情。可他又不禁想到，他还有个妹妹，还有个妹妹要照顾，如果自己生来就有金钱和权威……\n\n对于提那内里来说，王像奇迹般出现了。目睹了王对那名军官的处置，提那内里被深深触动了，站在权力巅峰的人是那样的从容，只要爬上去，追随在王身边，一切就都有了——我伟大的王！拯救我于水火之中的王！教会我怎样活下去的王！\n\n从这天起，提那内里狭小的世界里多出了一个人，一个他要用绝对真心去对待的人。"
WUN.6.a:0 "“王啊，我是真心为您……”"
WUN.7.t:0 "真心为你"
WUN.7.d:0 "有时候，那些看起来不可能发生的奇迹总会以一种奇怪的方式出现在人们面前，就比如突然穿上内卫装束的提那内里，从一个连饭都吃不饱的底层百姓，一夜之间变成了王身侧的近卫。阶级跃迁的实现原来如此简单，提那内里一个猛子就扎进了欲望的河流。\n\n“哥……？”妹妹不可置信的看着提那内里，她怎么也想不到素来对她关爱有加的哥哥会做出这种事，她的眼神里杂糅着不解、畏惧，“为什么？”\n“妹妹啊，不、不对！你听着，只、只要这一次，就这一次，咱们就能飞到天上去了！这可都是为了你啊！我的好妹妹，帮帮哥哥的忙，只要大王看上了你……只要……大王看上了你……你知道吗？这是天上的机会！天上的赐福！我都是为了你好！”提那内里的精神状态已经很难断言，他时而温柔，时而狠戾，时而阴鸷，时而癫狂。\n\n曾经那个温柔善良的哥哥已经死去了，变成了现在这个癫狂的疯子。她只能惊恐的看着面前的提那内里，她想反抗，想逃跑，想离他而去，但最终她还是选择了顺从——她早已失去了抵抗的勇气，现在的生活能有什么盼头？\n\n“哥……别说了，别再说了，我会听话的，我答应你……”面对带着哭腔的妹妹，提那内里感到无限的畅快，他连忙俯下身子，用粗糙的手去擦拭妹妹脸颊上的泪痕，指甲缝间的暗红混合着泪水散发出咸腥的味道，这味道让他感到一阵晕眩。他突然开始感谢上天，尽管在他十几年的生命中他曾无数次的咒骂过苍天，他甚至开始感谢那位对他拳脚相向的军官，尽管当时自己心里只觉得那家伙是该死行瘟的东西，但如果没有他，那么自己也不会与王邂逅。\n\n“我的好妹妹，别哭了，咱们的好日子……好日子还在后头呢……”"
WUN.7.a:0 "他看向妹妹，热泪盈眶。"
WUN.8.t:0 "陷落之人"
WUN.8.d:0 "天还没亮，提那内里便带着妹妹前往王宫。看着面前的宫殿，提那内里想起了第一次见到王宫的时候，那奢华的宫殿令他看一眼就再也忘不掉——凡是眼见得到的，都是层层纯金打造，凡是手碰得到的，均是温温美玉所铸。他也记得住在这里的第一晚，王的寝宫内男女或欢愉或痛苦的呻吟和王愉悦的笑声，淫靡构成了提那内里对于这座宫殿的记忆。再次来到王宫，一种难以言说的激动正不断的冲击着提那内里的神经，他的心脏跳动得愈发剧烈，呼吸愈发急促，就连肠胃都开始痉挛。\n\n殿内，王座上是被众多美人与娈童侍奉着的王。一想到自己的妹妹马上就要成为其中的一员，提那内里的心里泛起了一丝异样的情绪，但这缕情绪立刻便消失殆尽，只剩下难掩的喜悦之色。\n\n“大王，人带来了。”\n“哪个不长眼的，敢扰了老子……本王的雅兴？”王并不喜欢在玩乐的时候被打扰——即便是自己刚收的红人。王随即抽出一旁的斩马刀，一把砍向面前正在低头侍奉他的女人，那女人便张着眼睛和嘴，随着飞溅的血液与身体一齐倒了下去。一旁的其他人霎时间脸色苍白，但立刻继续重复着之前的动作——这不过是习以为常的事情。挡在身前的女人倒下后，王终于看清了来人：“你是那个……提那内里？打扰老子……本王的兴致作甚？”\n\n显然，就算是路边的傻子都知道现在王的心情很糟糕，但提那内里却显得十分胸有成竹。“大王。”提那内里抬起了头露出了他那标志性的谄媚的笑容，“请您收下我卑微的请求，让我为您献上一只女子吧！”\n“哦？快快带上来瞧瞧。”看到被勾起兴趣的王，提那内里笑得更灿烂了，他已经开始想象躺在金山上的未来了，甚至是幻想着自己也住进这座宫殿的那一天。\n“这是俺的妹妹斥多丽，素来倾慕大王威名，今天特来服侍您的！”\n“你说什么？”\n\n王震惊的神情让他还以为妹妹正对王的胃口，而那些莺莺燕燕早已四散逃命。\n“提那内里，老子再给你一次机会，你刚才说了什么？”王拖着那把还带有余温的斩马刀走到了提那内里的面前。\n“俺、俺说，这是俺妹——”\n\n提那内里突然眼前的气氛似曾相识，仿佛他自己是那个欺压人的军官，随之而来的是身后妹妹的一声惊叫。“怎么回事？”提那内里还在思考，直到他看到了自己腰以下的躯体。弥留之际，提那内里看到了撕扯着妹妹斥多丽衣服的王，他于是拖着半截身子向着那边爬去。"
WUN.8.a:0 "“王……俺……妹妹……咱们的好日子还……”"
WUN.9.t:0 "永生之人"
WUN.9.d:0 "王坐在“山丘”顶端的王座上，身边几个一丝不挂的美貌女子正侍奉着他——用杯、用瓶，是不尽兴的，温润的嘴唇是最好的盛酒器皿；胸前托举的葡萄混合着各种肮脏腥臭的味道被送入了他的嘴里，但王的思绪却早已飘到了九霄云外。恍惚间，他仿佛回到了过去，那个被人抛弃、饥寒交迫、与狗争食乃至被迫沦为他人玩物的童年。被酒精麻痹的双眼突然恢复了一丝清明。他站了起来，将那些女子推开。\n\n王看着这些年轻貌美的女子，想起了曾经被自己献给前乌骓王次子的义妹，她一定也干着和这些女人一样的事情，但王并不觉得有一丝一毫的愧疚。“她应当感谢我”胡里一边想着，一边摸出了怀里的尖刀。\n\n“你应当感谢我。”\n“那些丧良心的。”\n“我是对的，毋庸置疑。”\n“我是爱你的，这一切都是为了你好。”\n“可我也没想过事情会这样。”\n“但我明明什么也没有做错……我只是忠实于所有人的欲望……对吧？”\n\n胡里大声的吵嚷、叫嚣，脸上混合着泪水与新鲜的血水，温热的液体从脸颊一直流到脚下——巨大的血肉“山丘”仍忠实的臣服于他的脚下。看着脚下这座庞大的肉山，他仿佛听到了自己童年时一位流浪老人在路边为他敲响过的风铃声。那是他唯一真切感受过的温暖，比任何划过皮肤、喉咙与胃肠的血液都温暖。他又笑了，笑得像个孩子一样，他就这样笑着，纵身一跃而下——"
WUN.9.a:0 "我、我们，别无选择。"
WUN.10.t:0 "敞开的欲望之门"
WUN.10.d:0 "这场堕落的骚动将结束了，大地将重归于平安。欲望之门敞开着，用旧生命召唤着新生命的到来。"
WUN.10.a:0 "“你是爱我的，对吗？因为我是爱你的。”"
WUN.100.t:0 "您有新的肉团订单！"
WUN.100.d:0 "叮！您有新的肉团订单，请前往精神面板及时处理！逾期将罚没大量神经物质。"
WUN.100.a:0 "廿只肉蛹从母胎剥落，请尽情欢愉吧。"
WUN.200.t:0 "加冕仪式"
WUN.200.d:0 "“为君之道，必须先存百姓，若损百姓以奉其身，犹割股以啖腹，腹饱而身毙。若安天下，必须先正其身，未有身正而影曲，上治而下乱者……”\n\n照例，雅霍普·胡里·伯克坐在了洁白的毛毡上，左右僧侣齐诵经文，祭坛前香烟缭绕，熏得人睁不开眼。雅霍普坐的最近自然是被熏得够呛，这让他有些恼火，他不禁看向了身旁正在主持加冕仪式的兰大和尚，那人的在祭坛前的样子疯癫又滑稽：明明五官端正，脸上却不知道糊了什么脏兮兮的；走起路来摇摇晃晃，像是下一步就要跌下台——这倒不是他故意的，只是他那只太大的鞋子只能让他踢着踩；咏叹经文的声调忽高忽低，与其说是在装神弄鬼，倒不如说更像是个顽童在哼自己临时想到的曲调；手里挥着一把一直带在身上的破扇子，却换了谁都拿不动。\n\n还未登基的新王强忍着冲动——这个来自远乡的半疯和尚之所以能来主持加冕仪式，完全是因为那些知道传统加冕仪式怎么主持的于摩长老早就已经死的死，逃的逃了。既然这个路过于摩的和尚人称无所不知的兰大和尚，那就意味着他知道加冕仪式该如何主持，那么“请”这位先生来主持便是顺理成章了。但比起和尚这家伙更像一个半疯的乞丐，衣破帽破扇破鞋破，怀里还揣着个酒壶——哪有和尚还喝酒的啊！让他来，他也竟真敢笑嘻嘻的满口应下来。\n\n“啧。”仪式还未结束，新王便已经很不耐烦了，而当他看到台下的观众正露出与他截然不同的笑容时，他愈发不耐烦了。但他又不愿当场拂袖而去，于是他很快就想到了一个既不会中断加冕仪式又能打发无聊的“两全之法”。\n“大师”王笑着看向兰大和尚“在正式加冕前，应该还有一个环节吧？”\n“哟——那可就多咯，只怕是您现在可能来不及做的咧。”兰大和尚煞有介事地回道“什么娶妻啦、分封啦、赈济啦、尊老啦、罢兵啦、俭用啦、禁掠啦、大赦啦、斋戒啦……就是不知道陛下到底是想先补上哪个环节咯。和尚我哦，比较建议您先娶妻的咧，这个嘛……”\n“牺牲。”王似是完全没听见兰大和尚的话。\n“大王您这个眼神哟！这不是前面摆着的嘛，这些牲口的脑袋咧……” 兰大和尚仍是笑盈盈相对。\n“我听说两千年前，除了这些东西外，还需一项祭品。”王打断了和尚。\n“哎哟，您说的祭品，怕不是人殉哟——”兰大和尚故作惊讶，似笑非笑地看着他，手中的破扇轻轻挥动。\n“大师果然博学。”王没有否认。\n“这仪式都接近尾声的咧，这会儿找土偶假人来搞这一千多年前就没了的东西，和尚我怕是搞不了咯……”兰大和尚故作为难的样子。\n“这儿啊”至高至福的七城之王漫不经心的指向了左右人群“这里，不是到处都是人吗？”\n“噫，好！好！好！好！好……”脸上一直挂着灿烂笑容的人群突然发疯似的呼喊起来。兰大和尚仍是一副嬉皮笑脸的模样，只是眼神深邃了几分。\n\n王很自然的的摸出了腰间的英吉沙刀，就在他刚抽出来时，他感到头上被什么东西重重的砸了一下——是他的王冠，这疯和尚刚才给他“加冕”了！王转过头，用锋利的眼神看着这疯和尚，而兰大和尚只是笑笑：“既已加冕，按照这个传统哦，这种环节在仪式之后就不能进行的咧。”王无视了这些恼人的语言，一刀向那疯和尚挥去，但当小刀利落的划过和尚的脖颈，王却分明的感觉这不是人肉的手感，更像是砍在了一块木头上。那和尚的头从刀缝处断开，骨碌碌落在地上打转，身体却也没有流血，而是渐渐地变成了一块套着破布的木头。是魔法，那个和尚会使魔法！再看向那些在台下欢呼的群众，一个个身体也变作了木头——整个台下竟没有一个活人，而响亮的欢呼声却不绝于耳。\n\n事实上，登基当日的布告从未发出过，根本没几个人知道今天的加冕仪式。"
WUN.200.a:0 "让活人为暴君加冕是对活人的讽刺。"

###新闻###
WUNNews.1.t:0 "突发！七河地区爆发灾厄事件！"
WUNNews.1.d:0 "近日，七河地区传来惊天消息：第七次于摩独立战争已经演变为了一场将会席卷全大陆的灾难。整个于摩国已经化为了一个又一个巨大的血肉“山丘”。更为可怕的是这些血肉山丘们正在席卷整个七河地区，根据墨精灵科学家们的推测，这些血肉筑成的山丘最终将会席卷整个大陆，直到将这片大陆上的所有生灵都卷进这欲望的集合体里。目前七河方已经向巴斯蒂亚大陆各国发出了求援信号，但直到目前为止仍然没有任何一个国家对此事做出回应。七河联邦董事长普萘洛尔现号召七河地区及周边国家团结起来共同应对这场灾难。\n\n“真的存在这些可怖的血肉‘山丘’吗？”\n截至目前为止，相当部分政治实体仍对此持怀疑态度，更有甚者甚至认为这可能是七河地区生物实验危害扩散后自导自演的一场骗取援助的“谎言”。"
WUNNews.1.a:0 "你在开玩笑，对吧？"

