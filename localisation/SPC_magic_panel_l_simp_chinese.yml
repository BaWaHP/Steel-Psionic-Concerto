l_simp_chinese:

SPC_MP_BTN_ON:0 "§Y魔法研究§!\n尽管对于某些人而言难以接受，时代走到了今天，我们的文明早已离不开魔法。研究魔法以获取更强大的技术吧。"
MP_CLOSE:0 "将关闭魔法研究页面"

MP_title:0 "魔法研究"

MP_title_1_TXT:0 "常规魔法研究"
MP_information_1_tt:0 "在常规魔法研究中，您可以使用现有的魔法科研点数来升级魔法的研究等级。随着等级的提升，这些魔法会为您解锁更多决议，国策和科技树中的选项。每个国家的基础魔法研究点数都是100点，这个数值在整场游戏中都不会发生改变。然而，随着世界线的变动，不同的国家所获得的研究点数可以随着该国省份的魔法普及度而改变。与此同时，包括决议，民族精神，国策甚至是科技树都可以为您带来特殊修正，甚至是可以直接影响结果数值的变化。"
MP_information_1_TXT:0 "当前魔法科研点数:§Y[?magic_research_point]§!\n\n基础魔法研究点数增加:§Y[?basic_magic_research_point_monthly]§!\n全国普及度所带来的修正[?state_development_bonus_on_mp_points_for_show|Y]\n其它原因所带来的修正[?other_mp_points_count_change|Y]\n最终获得的魔法研究点数:[?final_magic_research_point_monthly|Y]"
MP_btn_1_TXT:0 "§Y打开魔法研究页面§!\n可以在这里进行常规魔法的研究。"
MP_btn_2_TXT:0 "§Y打开特殊行动页面§!\n可以在这里采取特殊行动加快研究速度。"

MP_research_add_up_txt:0 "按下这个按钮会确认加点。直接关闭页面会重置您的选择。"
MP_research_title:0 "魔法科研页面"

MP_information_research_specific:0 "在这个页面，您可以根据国家魔法科研点数来升级魔法的研究等级。不同等级的魔法科研可以解锁不同路线和程度的，在科技树中可以看到的魔法相关科技。每次升级都需要100点魔法科研点数。在您点击完加减后需要再右下角的按钮处进行确定。"

