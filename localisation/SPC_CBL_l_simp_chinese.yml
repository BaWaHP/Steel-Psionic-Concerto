###事件###
CBL.1.t:0 "崩溃之始"
CBL.1.d:0 "于是乎，混乱还是降临了。人们哭着，喊着，祈祷哽咽着，如数十年前，亦或数百年前一般，将儿子、丈夫、父亲送上战场，只不过与祖先不同的是，他们面对的并非全是穷凶极恶的异种，而是同血同源的同胞，同胞啊......\n\n联盟崩溃的预兆早有显现，只是那时的人们仍沉醉在自己的美梦之中，不愿醒来。当梦醒之时到来，人们才恍然发现现实世界早已崩塌，毋论个人想法与否，现实只会沉默的前行，直至碾碎一切妄者。\n\n现在，独属中巴人民自身的骰子已经掷下。无论喜欢与否，这的确是中巴自身的选择，只是这命运的馈赠，最后终将落到何人之手？"
CBL.1.a:0 "只有天知道"

###新闻###
CBLNews.1.t:0 "中巴斯蒂亚联盟陷入战火"
CBLNews.1.d:0 "自世界大战后，南巴斯蒂亚联邦放弃部分中巴地区所属权以来，中巴斯蒂亚联盟整体尚且维持了一个相对勉强的稳定状态，而就在近几个星期，整个中巴联盟的局势却一步步不可逆地滑向崩坏的深渊。\n\n在经历胜利城暴乱后，由中巴联盟共和党取得了中巴中央政府的领导权，而共和国驻中巴司令部率先对此质疑并不承认共和党政府的政权合法性，双方剑拔弩张的气氛紧张到兵戎相见，司令部宣称共和党为叛匪，共和党则组建了中巴独立同盟来应对磨刀霍霍的共和国司令部驻军。\n\n在此状况下，本就疏离乖戾的地方骑士团自治省则趁机宣布脱离联盟的统治，更严重的是一直被压制在群山中的山羊人，或者如他们自称的那般——山国，也对动荡的中巴蠢蠢欲动。嗅到可乘之机的中巴解放军和先锋国际也旗帜鲜明的高颂革命之名，誓要解放整个中巴。就这样，自大战后一直处在悬崖边缘的中巴联盟，就此因自身的离心力被撕扯至四分五裂。\n\n在国际上，中巴的内战对于南巴来说无异于晴空霹雳，至今南巴官方仍未对中巴局势做出回答。奥罗日亚则警惕的封锁边境线，严禁中巴难民冲进奥罗日亚境内。而无论绿洲协定还是北湖防御同盟亦或中巴防御协定，都对这庞然大物的崩溃感到心惊和惶恐，但显然他们对此毫无办法。"
CBLNews.1.a:0 "哦，天哪！"
CBLNews.1.b:0 "圣子在上！"
CBLNews.1.c:0 "意想不到的大动乱。"

CBLNews.2.t:0 "中巴陷入动荡，南巴呼吁各方冷静"
CBLNews.2.d:0 "随着胜利城的政治危机不断恶化，中巴斯蒂亚联盟已经陷入事实上的无政府状态。各地武装相互对峙，交通与行政联系濒临中断。南巴斯蒂亚方面呼吁中巴各方保持克制，立即停止调动军队，并通过谈判解决争端。\n\n然而，各方的敌意并未因此消退。如今所有人都在等待下一声枪响，而那声枪响很可能把整个中巴拖入全面内战。"
CBLNews.2.a:0 "我们必须阻止局势彻底失控。"
CBLNews.2.b:0 "和平正从中巴迅速消失。"

CBLNews.3.t:0 "山国征服中巴斯蒂亚"
CBLNews.3.d:0 "自伟大战争之后，中巴的人类与山羊人部落长期处于敌对状态。在中巴与南巴军队的围剿下，山羊人只能龟缩在北方山区——也就是所谓的“山国”——苦苦支撑。然而，中巴内战的到来使得局势逆转，山羊人自北部山区南下，打败了各路人类军阀。在击溃最后一股成建制的人类部队后，贫穷落后、却又凭借种族天赋魔法屡战屡胜的山国终于征服中巴斯蒂亚，在世人震惊的目光中宣告了最终的胜利。\n\n然而，这是一场血腥而残酷的胜利。中巴的人类居民根本不承认这个野蛮部落建立的政权，就连精灵、矮人等亚人种族也对其没有多少好感。为了稳定占领区、震慑人类残余抵抗势力，山羊人犯下了多起屠杀暴行，并将其归因为“神灵旨意”以及“对人类殖民者的正当复仇”。话虽如此，山羊人不过数十万众，而中巴人类依然有数千万人，山羊人仍在数量上处于绝对劣势。因此也有传闻称，盘角·黑手正在为了维护山羊人在中巴的统治而寻找合作者。\n\n许多观察家悲观地表示，中巴曾在伟大战争时期沦陷于魔兽铁蹄之下，今日的中巴或许会再次回到那个被异族奴役的悲惨时代。大多数国家强烈抨击了山羊人野蛮的行为，也许在未来，中巴还会像伟大战争时期那样被其他国家解放。但在今天，中巴人民的命运灰暗而血腥，巴斯蒂亚大陆的中心已被普罗大众的鲜血染红。"
CBLNews.3.a:0 "复仇当然不会让我们感到良心不安，但我们还要杀多少人才能真正安全？"
CBLNews.3.b:0 "山羊人必须为他们的野蛮行为付出代价！"
CBLNews.3.c:0 "依凭复仇与神灵之名，便可心安理得地犯下此等暴行吗？"

CBLNews.4.t:0 "中巴斯蒂亚独立同盟的胜利"
CBLNews.4.d:0 "今日，至上胜利之城再次沐浴在胜利的喜悦中。中巴独立同盟领导人齐格弗里德·厄伯格在各国记者的镜头前热情地宣告了中巴斯蒂亚独立战争的胜利，同时向世人表明，新生的、独立的中巴将会是一个各种族平等的自由国家，并承诺会在保证经济主权的基础上有序地向各国开放国境和市场，在一段过渡时期后，便会举行自由而平等的全国大选。他还向绿洲协定各成员国的援助表达了感谢。与此同时，新生的中巴正在雄心勃勃地推进着社会改革，绿洲协定各国也纷纷发来贺电。一时之间，一股前所未有的乐观主义情绪开始在中巴蔓延。\n\n然而，外国观察家们对中巴的独立毫无乐观可言，甚至有人断言中巴追求的独立与平等会像太阳一般融化他们的蜡翼。其中的原因是多方面的：中巴有着极为丰富的矿产资源——尤其是黄金这样的贵金属——却又没有强大的武装力量。没有南巴这样的大国庇佑，中巴迟早会被其他强国盯上，然后吃干抹净。而被赶走的南巴也绝不会就此作罢，可以预见的是，在南巴恢复元气后，南巴人还会以更加强大的姿态卷土重来。同时，中巴独立同盟也有诸多内部问题，有相当多的迹象表明，从政府到军队，中巴独立同盟内部本就不是铁板一块。这一成分复杂的同盟似乎注定分道扬镳，谁也不清楚齐格弗里德·厄伯格能否和平解决内部问题。中巴复杂的种族构成与民族构成也会成为新政府的麻烦：自南巴地区的移民与有着中巴本土认同的米德族人之间的矛盾愈演愈烈，人类与山羊人等非人类种族的矛盾也尚未随着内战结束而平息。总而言之，独立的中巴注定不会有一个安稳的未来。\n\n话虽如此，对现在的中巴人而言，未来还太过遥远。此时此刻，他们正忙于庆祝这来之不易的独立，并踌躇满志地试图掌握自己的命运。"
CBLNews.4.a:0 "旧时代残骸中诞生的新民族国家。"
CBLNews.4.b:0 "等着瞧吧，没有我们，他们连米德二字都写不好！"

CBLNews.5.t:0 "大陆中心升起的红旗"
CBLNews.5.d:0 "今日，一则令人震惊的消息从中巴斯蒂亚传来。先锋国际——也称第三国际、共产国际——与其盟友中巴斯蒂亚解放军击败了其他中巴军阀。在一场和平谈判后，中巴斯蒂亚解放军与先锋国际合并，使得先锋国际成功统一前中巴斯蒂亚联盟地区，在巴斯蒂亚大陆的中心升起了革命的红旗。来自各个国家、不同民族甚至不同种族的革命者们用数十种语言热情地歌颂着共产主义革命在中巴的胜利，以及对世界无产阶级革命的热切期待。\n\n先锋国际的特殊之处在于，这是一个由国际主义者掌控的先锋队共产主义政权，就连其军队中也有着大量来自多个国家的国际主义战士，人们称之为“国际纵队”。先锋国际自称为“世界无产阶级的先锋队”，正在准备通过“阶级专政”的手段对中巴社会进行全方面的社会主义改造。与此同时，对私人资本的暴力国有化与集体化正在中巴各地上演，而先锋国际声称的“世界革命”与“援助各国无产阶级”更是令中巴民众与周边国家感到不安。\n\n然而，这些流言蜚语对先锋国际而言无足轻重。这些革命者已经用漫长的流亡岁月与革命战争证明了自己革命意志的坚定。可以预见的是，他们仍会为了解放世界无产阶级的理想直面重重困难——就像他们一直以来做的那样。"
CBLNews.5.a:0 "全世界无产者，联合起来！"
CBLNews.5.b:0 "名为芙蕾施曼的幽灵在巴斯蒂亚大陆徘徊……"

CBLNews.6.t:0 "中巴斯蒂亚社会主义者的胜利"
CBLNews.6.d:0 "今日，嘹亮的军歌响彻中巴斯蒂亚。由中巴社会主义者组成的中巴斯蒂亚解放军与盟友先锋国际——也称第三国际、共产国际——击败了其他中巴军阀。在一场和平谈判后，中巴斯蒂亚解放军与先锋国际合并，中巴斯蒂亚解放军由此成功统一了前中巴斯蒂亚联盟全境。在中巴内战中，中巴斯蒂亚解放军无愧于“解放”之名，展现出了与寻常中巴武装截然不同的精神面貌，以严明的纪律与亲民的态度赢得了劳动者的敬爱。\n\n与先锋国际不同，中巴斯蒂亚解放军的领导层大都由中巴本地的社会主义者组成，因此相较先锋国际而言，中巴斯蒂亚解放军的执政纲领要更偏向于中巴斯蒂亚，对盟友倡导的“世界革命”的态度也比较微妙——赞成，但不急于求成。同时，中巴斯蒂亚解放军在意识形态方面相对暧昧，在积极推进社会改革的同时与一小部分商人实现了有限的合作，并称之为“向共产主义社会过渡的必要手段”。\n\n目前尚不清楚这一新生的社会主义政权终将走向何方，但至少在今天，中巴斯蒂亚的工人和农民对未来翘首以盼——中巴的人民终于得以统治他们的国家，而保卫新国家的，是一支前所未有的人民军队。"
CBLNews.6.a:0 "中巴斯蒂亚的工人与农民万岁！"
CBLNews.6.b:0 "对我们而言，这恐怕是最糟糕的结局……"
CBLNews.6.c:0 "让我们看看这些士兵能做些什么。"

CBLNews.7.t:0 "谦逊之国一统中巴斯蒂亚"
CBLNews.7.d:0 "当最后一支独立武装放下武器时，这场撕裂中巴斯蒂亚联盟长达数年的内战似乎终于迎来了一个出人意料的收梢。在共和国司令部的废墟与独立同盟、共产主义者相继崩解的乱局中，最后真正站立在这片焦土上的，竟是那个最不起眼的军事修会：德谬蒂克骑士团。\n\n长久以来，他们只是三大骑士团中安静的一角。德谬蒂克骑士团的修士们往往穿着朴素罩袍，与辖区农人一同收割，在礼拜堂里低声诵念那节古老的箴言——“吾住在至高至圣的所在，也与心灵痛悔、谦卑的人同居。”然而战争并不因其谦逊而绕过他们。当共和国司令部的军头们与独立同盟的民粹领袖开始将中巴斯蒂亚联盟拖入暴力分裂的泥沼时，德谬蒂克骑士团面临着比死亡更沉重的抉择：是继续恪守那近乎避世的谦卑，任由辖区在烽火中化为灰烬；还是拿起武器，以自我否定为代价去保全他们所珍视的平和日常？\n\n于是人们看到了一个矛盾的身影——最厌恶暴力的修会，成为了整个联盟中纪律最严明的军事力量之一。他们的进攻从不依赖于压倒性的火力，而是凭借着匪夷所思的战场预判与辖区民众递送的情报网，一次次绕开正面冲突，瓦解对手的意志。\n\n如今，随着敌手一一消散，德谬蒂克骑士团发现自己成为了中巴斯蒂亚联盟无可争议的执掌者。而在与其他骑士团进行谈判后，三大骑士团达成了共识，并合并为同一个国家。新政府内部的明争暗斗是显而易见的，但和平的开端总归会给人们带来无限的遐想。\n\n“谦逊不是软弱的盾牌，而是我们在染血之后必须重新寻回的路。”骑士团的声明如此写道。但质疑也自然升起：一个以“谦逊”为信条的修会，在不得不统摄整个联盟的世俗权力后，还能继续保持那中庸的平衡吗？当内战的阴影渐渐退去，人们或许将见证一个前所未有的治理实验——又或者，见证又一场理想在现实重压下的缓慢崩解。"
CBLNews.7.a:0 "“但谦卑人必承受地土，以丰盛的平安为乐。”"
CBLNews.7.a.tt:0 "——《诗章》37：11"
CBLNews.7.b:0 "奇怪的国家……"

CBLNews.8.t:0 "奥普菲尔骑士团接管中巴斯蒂亚"
CBLNews.8.d:0 "中巴斯蒂亚的战事以一种出人意料的方式落幕了。\n\n当骑士团中身披灰色斗篷的骑士们开进胜利城时，没有炮火，没有巷战，甚至连像样的抵抗都没有。守军在看见第一面灰色十字旗后便放下了武器——混战所带来的苦难是如此深厚，竟使得守军不战而降。\n\n守军迅速投降的原因，除了混战所带来的破坏之大外，还有一个重要的理由，便是奥普菲尔骑士团本身的良好声望：伟大战争结束后，魔兽退去，留下的是一片焦土和哀嚎的信徒。从那时起，奥普菲尔骑士团内部便对所谓神迹产生了怀疑。他们走进废墟，走进村庄，走进每一个饥饿者的家中。这支诞生于狂信时代的修会武装，曾高喊着“为神牺牲一切”的口号冲锋；而如今，他们放下了圣典，拿起了犁耙。\n\n有人视其为堕落，而有人称其为觉醒。\n\n但无论如何，在中巴联盟崩溃后的烂摊子下，奥普菲尔骑士团的确接管了其所留下的巨大权力真空。在一次会谈后，三大骑士团宣布和平统一，这为尚处在战争伤痛中的中巴民众带来了一丝曙光。"
CBLNews.8.a:0 "拿起犁耙，亦备好刀剑。"
CBLNews.8.b:0 "一支不再征战的军队，中巴斯蒂亚正走向黎明。"

CBLNews.9.t:0 "新十字军国统一中巴斯蒂亚"
CBLNews.9.d:0 "中巴内战的结束以一种残酷的方式降临了。\n\n最后一个反抗势力的总指挥部在烈焰中倒塌，曾经飘扬在那里的旗帜被扯下、烧毁。取而代之的是一面深红底色的铁十字——那是艾勒骑士团的战旗，也是中巴内战中从未被玷污过的胜利图腾。\n\n在指挥部被摧毁后，艾勒骑士团立即宣布接管原联盟控制下的所有地区。他们没有发表冗长的宣言，没有许诺和平与繁荣，没有谈论“黎明”或“曙光”。大团长在废墟前发布的唯一一道公开命令只有一句话：\n\n“内战结束了，圣战开始了。”\n\n这句话迅速传遍了整个中巴。有人恐惧，有人狂热，更多的人则在困惑中等待着这群骑士的下一步。但有一点是确定的：在最后抵抗地点燃烧的烟柱升起之后，中巴斯蒂亚进入了新的阶段。\n\n艾勒骑士团在与其他两个骑士团经过漫长谈判后，终于勉强达成协议，完成了和平统一。而紧接而来的便是整个联盟的军事总动员，以及向北部边境的增兵。艾勒骑士团——亦或者说是新十字军国——宣布，将未完成的十字军伟业贯彻到底，将名为荣誉的信条钉死在每个中巴人的心中。对此现状的点评则来源于大团长本人：\n\n“一把从不饮血的剑，还配称之为剑吗？”"
CBLNews.9.a:0 "“战争结束了，我们的战争开始了。”"
CBLNews.9.b:0 "这群疯子要做什么？！"

CBLNews.10.t:0 "共和国中巴司令部平定中巴叛乱"
CBLNews.10.d:0 "随着南巴大陆军打败了最后一个成建制的叛乱势力，玛格丽特·蒂·埃斯特哈希于胜利城宣告了南巴大陆军的完全胜利。然而，玛格丽特·蒂·埃斯特哈希强调，中巴会继续保持紧急状态，直到最后一个被通缉的潜逃分子被捕、中巴秩序完全恢复。同时，埃斯特哈希也作出了承诺，表明在解除紧急状态之后，中巴将迎来真正民主的选举。由于大陆军及其盟友长年对中巴人民犯下的暴行，许多民主人士对此持怀疑乃至嘲讽态度。\n\n同时，内战的阴霾似乎并没有像埃斯特哈希所宣称的那样散去。联邦西部防区和联邦东部防区在内战时期犯下的战争罪行被揭发，却至今没有收敛的迹象，人民的愤怒仍然在阴影中发酵。同时，独立分子与社会主义革命者等内战势力的残部仍在各地不断制造袭击事件。有消息人士透露，大陆军高层正在尝试与各地豪强达成新的合作关系，以求得中巴联盟旧秩序的恢复。\n\n南巴斯蒂亚方面毫无疑问地赞扬了司令部驱逐恐怖分子和捍卫联邦利益的行为，宣称后续将会给予更多支持。"
CBLNews.10.a:0 "这是民主与联邦的胜利！"
CBLNews.10.b:0 "看来旧秩序仍会延续下去。"

CBLNews.11.t:0 "迪特里希·蒂·林茨掌握中巴大局"
CBLNews.11.d:0 "共和国中巴司令部宣布平定叛乱后不久，中巴政局突遭剧变。联邦东部防区领导人迪特里希·蒂·林茨发动了一场经过周密策划的政变。玛格丽特·蒂·埃斯特哈希与联邦西部防区领导人在同日遇刺身亡，东部防区部队随即控制胜利城的交通、通信与主要政府机关。\n\n在短暂而混乱的权力交接后，原本分立的共和国中巴司令部、联邦西部防区与联邦东部防区被合并进统一的军政机构。迪特里希·蒂·林茨宣称，此举是为了终结派系争斗、恢复中巴秩序，并防止内战死灰复燃。反对者则指责他以阴谋和鲜血窃取了战争的果实。\n\n无论外界如何评价，中巴的大局如今已经掌握在迪特里希·蒂·林茨手中。"
CBLNews.11.a:0 "大局已定。"
CBLNews.11.b:0 "中巴的权力再次易手。"

CBLNews.12.t:0 "第二次中巴内战"
CBLNews.12.d:0 "共和国中巴司令部平定叛乱后建立的脆弱合作已经宣告破裂。一场围绕联邦东部防区、联邦西部防区与司令部高层的秘密阴谋意外曝光，各方随即相互指责对方企图刺杀领导人、吞并友军并独占胜利果实。\n\n胜利城的紧急谈判很快破裂，原本共同作战的部队开始封锁道路、扣押使者并争夺军火库。随着第一轮交火爆发，三方的联合指挥体系彻底崩溃，中巴斯蒂亚再一次陷入全面内战。\n\n对饱受战争折磨的中巴人民而言，短暂的和平原来不过是两次战争之间的停顿。"
CBLNews.12.a:0 "这一次，我们必须坚持到底。"
CBLNews.12.b:0 "和平只是两次战争之间的停顿。"

