###民族精神###
CBL_railway_curse:0 "大铁路的诅咒"
CBL_railway_curse_desc:0 "“我看到一列列‘铁皮’向北驶去，但北方§R从未富裕§!。我看到一列列‘铁皮’向南驶去，可南方却§R丰饶异常§!。”——中巴斯蒂亚诗人小记。\n\n毫无疑问的一点是，中巴斯蒂亚联盟拥有全巴斯蒂亚大陆上里程最长现代铁路。这点就连其宗主国，南巴斯蒂亚联邦也望尘莫及。不过这条铁路却从未施舍给普通的中巴人民§t恩惠§!。南巴斯蒂亚联邦通过这条铁路将中巴大把大把的资源运走，制成昂贵的工业品再送回中巴出售。这条横穿§L中巴§!的大铁路将他的动脉切开，从中源源不断流出的鲜血则滋润了§C南巴§!。对于中巴而言，大铁路从来不是什么致富的手段或者什么人类工程的奇迹。反而，他是中巴斯蒂亚贫困的根源，是中巴联盟永远挥之不去的§0诅咒§!。"
CBL_generation_controversy:0 "新旧之争"
CBL_generation_controversy_desc:0 "在中巴斯蒂亚联盟的土地上，一切都被划分为各种情况下的三六九等。就算是移民群体中也并不例外。§O老移民§!的先辈在付出了生命，勇气与岁月后，他们的后代得到的，却是一个明显偏袒于§6新移民§!的政策。中巴斯蒂亚联盟的主导者是南巴斯蒂亚联邦，这些老移民的后代本身就比宗主国的老爷们低一等。现在还要被这些后来者踩在脚下。这种从政治到人格上的绝对劣势，时刻刺痛着这些移民的神经。而南巴方面的公开不平等，则在中巴斯蒂亚的社会上构成了不稳定的来源之一。老移民与新移民，甚至是于南巴人的冲突也不时发酵。这是一颗极度危险的定时炸弹，如果不能缓解或者转移矛盾，那么等待我们的，§R就只能是毁灭了§!。"
CBL_army_controversy:0 "军队之争"
CBL_army_controversy_desc:0 "作为特殊时期也是特殊地区的中巴联盟来讲，自家的武装力量显得似乎有些……过犹不及了。§4联邦卫戍军§!，§3南巴大陆军§!，§2联盟政府军§!，§g地方民兵§!或者干脆直白的说就是§g地方私兵§!，四足鼎立的局势一直是中巴政府的锥心之痛。\n\n在过去，这套防卫机制能最大程度的帮助中巴度过一次次的危机：伟大战争，世界大战，以及与其他势力一次次的碰撞，都证明了这套体系的作用。但时代已然不同，现在这套体制带给本就脆弱的中巴带来的影响只有混乱：\n\n§4联邦卫戍军§!的跋扈，来自§3南巴§!的觊觎与不满，酒囊饭袋的§2政府军队§!与括囊守禄、暗流涌动的§g地方私兵§!……这些因素也许现在并无大碍，但谁又能料到§R未来如何§!呢？"
CBL_ghost_of_knights:0 "骑士团幽魂"
CBL_ghost_of_knights_desc:0 "提起骑士团，大多数人想起来的可能是荣耀，开拓，正义、无畏这些词汇以及虚无缥缈不切实际的感觉。毕竟，这种腐朽陈旧的东西早该被扫进历史的垃圾桶了。\n\n但对于中巴人民来讲，骑士团真真切切的生活在他们周围：德缪蒂克骑士团、爱勒骑士团、奥普费尔骑士团，这三个骑士团都是中巴开拓时期建立的骑士团，在伟大战争中发挥了重要的作用并一直作为行政单位保留至今。\n\n只是，如今的骑士团早已不复当年守家卫国的理想状态：§Y教廷§!早已开除他们的教籍，§2中巴政府§!也视他们为心头大患，如若不是骑士团自身超凡的武力，他们能否立足于世还要打个大大的问号，毕竟……\n\n§0弃信之人，尚可得救？§!"
CBL_clear_nomands:0 "坚壁清野"
CBL_clear_nomands_desc:0 "随着山羊人拒绝与中巴斯蒂亚政府签订《各种族友好互助条约》，南巴斯蒂亚军队与中巴斯蒂亚政府军开始对其进行全面清剿。不过山羊人的种族魔法——即死术，给负责围剿的部队带来了巨大的伤亡。出于对国防安全与军队伤亡比的考虑，中巴斯蒂亚政府对山羊人的根据地凯撒山实行了§R坚壁清野§!的政策。虽然这有效限制了山羊人的活动范围，但也导致剿灭山羊人的计划彻底落空。在政府稳定的时候，中巴斯蒂亚政府可以依靠大量的军队进行包围。但如果政府或国家陷入混乱——§R那还有什么可以围住它们呢？§!"
CBL_treature_bowl_of_rsb:0 "南巴的“聚宝盆”"
CBL_treature_bowl_of_rsb_desc:0 "作为南巴斯蒂亚联邦发展最早且最为庞大的§C殖民地§!，中巴斯蒂亚联盟每年给予南巴斯蒂亚联邦的钱财与资源可以说是源源不断。但如此庞大的财富总会伴随着许多代价：对资源不可逆的粗暴开采，对本地原住民的疯狂压榨...整个中巴斯蒂亚联盟就像是一个为南巴不断输血的§R巨大血库§!。但随着伟大战争与世界大战的影响，中巴斯蒂亚政府的掌控能力变得越来越差。当地的反抗势力与共产主义者的游击队不断袭扰着中巴斯蒂亚的各个地区。这也使得中巴每年向南巴提供的钱财开始急剧减少。但为了完成南巴的任务，中巴政府又不得不继续压榨本地原住民与扩大开采。在如此这般的恶性循环之下，中巴斯蒂亚联盟与其说是南巴的聚宝盆，还不如说是一个即将爆炸的§t炸药桶§!比较合适。"
CBL_political_chaos:0 "政治乱局"
CBL_political_chaos_desc:0 "如果要用一个词来形容中巴斯蒂亚联盟的政治，那么“§R无休止的混乱§!”一定是最适合的。自打共和革命浪潮席卷而来，跟着宗主国改变政体与意识形态的中巴斯蒂亚政局就陷入了无休止的混乱。长期把控中巴政局的两大政党：§g公民党§!与§O民主党§!，身为南巴斯蒂亚联邦的傀儡政党，非但无法为中巴提供一个稳定的政治环境；反而由于双方不断的争斗导致中巴斯蒂亚联盟的政策变化无常。而中巴斯蒂亚自己的独立政党：§C共和党§!，则被长期打压，无法执政。长期的混乱使得中巴人几乎失去了对民主的信心，周围异族与潜伏在民间的其他极端势力的不断袭击则让这些移民更加期望一个绝对稳定的政府。不过很可惜的是，现在的中巴政坛里——§R并没有他们期望的政党§!。"

###领导人###
CBL_karl_matuschka:0 "卡尔·马图施卡"
CBL_karl_matuschka_desc:0 "无论从谁的视角来看，卡尔·马图施卡都应该是含着金汤匙出生的。他的家族是中巴的伟大开拓者——圣比尔克森黄金家族。在比尔克森发现金山后，他的家族更是一跃成为当时最显赫的家族。随着家族不断与本地和南巴的贵族通婚，黄金家族被帝国皇帝赋予贵族头衔。成为了中巴斯蒂亚实际上的达官显贵。\n\n在南巴斯蒂亚帝国爆发共和革命后,黄金家族为了占有更大的利益，接受了共和军的提议，放弃了贵族头衔转而投身于革命浪潮中。可惜世事无常，黄金家族等来的不是共和联盟的天兵天将，而是从北方铺天盖地而来的魔兽浪潮。不过这时的黄金家族还尚存最初的家族理念，为了人类的勇气，宝藏以及家族的领地与财富，黄金家族选择誓死坚守金山省。不过在魔兽们庞大的数量以及强大的破坏力下，黄金家族还没来得及组织一些像样的反抗就被魔兽残杀殆尽。除了在外的族长小儿子以外，整个黄金家族和他们的财富被一同淹没在了魔兽潮下。\n\n至此，黄金家族家道中落。即使后来南巴赢得了伟大战争的胜利，黄金家族还是成为了历史上的传说。这也是为什么当联邦专员在下大平原的艾希找到卡尔时，这位酗酒的小农场主卡尔还以为专员是矮人找来阻止他打自己的婆娘的。\n\n面对着这个“英雄后裔”，专员们放弃了他们一路上想好的说辞。而是告诉卡尔，他将成为中巴斯蒂亚的领袖，而原因只是因为他可能是黄金家族唯一的后裔。感觉天上掉馅饼的卡尔立马放开了他的妻子，随即便在协议上签了字。虽然他总感觉有些不对，但他那早就被酒精灌醉的脑子也思考不了什么了。\n\n从此刻开始，那个曾经的小农场主卡尔死了。取而代之的是中巴斯蒂亚联盟的光明领袖，黄金家族的唯一后裔——卡尔·马图施卡阁下。他现在住在他一辈子也走不到头的宅邸，有上百个下人服侍他，每年可以获得他这辈子都用不完的薪水，他包养的情妇规模甚至可以和旧南巴帝国最昏庸的皇帝的情妇数量相比。\n\n而他只需要在他几乎看不懂的文件上签上他的名字，不时的出现在重要的会议上和偶尔走访一下群众就可以了。每当结束了一天“工作”的卡尔回到他的宅邸后，他总会一边享受着下人的服侍一边起开一瓶烈酒。在酒精所带来的快感中，他的脑子不断想着：可能南巴帝国皇帝的生活也不过如此吧。"

