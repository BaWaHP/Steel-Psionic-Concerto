###民族精神###
KOD_knights_of_bad_timing:0 "不合时宜的骑士团"
KOD_knights_of_bad_timing_desc:0 "顿恩骑士团的地位十分尴尬，其前身是大戈尔维亚王国驻扎在南方的卫戍部队，并没有得到王国方面的许可管理领土。然而，随着东巴大战的结束，沃姆帝国单方面以“嘉奖”为由强行为骑士团“封”了戈尔维亚王国南部的大片领土，顺带着西北远乡的一部分地区。这使得戈尔维亚一方十分不满，认为这是沃姆一方干涉他国内政的可耻行径，但他们又没办法真的把火气发到沃姆帝国那边去，结果就全到配合沃姆一方政策的骑士团头上了。\n\n§R...但谁又敢真正拒绝沃姆帝国的要求呢？§!"
KOD_empty_leader_position:0 "空悬的团长之位"
KOD_empty_leader_position_desc:0 "因为心脏疾病的缘故，前任团长基里安临时宣布辞去团长职位并返回家乡修养。完全没有事先准备的骑士团高层在短时间内陷入了混乱，没有得到有效封锁的消息如火般传遍了顿恩。许多有志向的青年骑士都跃跃欲试，希望借着顿恩骑士团“以武服人”的传统夺得高位。"
KOD_cultural_conflicts:0 "文化冲突"
KOD_cultural_conflicts_desc:0 "以顿恩河为界，我们的领土被大致分为了两个世界。一边是以戈尔维亚人为主的北方，另一边则是以麟人为主的南方。虽然北边多少有几个麟人，南边肯定也不是没有戈尔维亚定居者，东巴大战的阴影使得各地基于民族的冲突屡见不鲜。尽管没有倾覆政权的威胁，这依然严重破坏了社会的稳定。"
KOD_servant_to_two_nations:0 "两国的仆从"
KOD_servant_to_two_nations_desc:0 "骑士团虽然有了自己的领地，但名义上依然同时从属于其它两个国家：沃姆帝国和戈尔维亚王国。我们需要按照一定比例向他们定期缴纳资金，并赋予多方面的优待条款。"

###领导人###
KOD_empty_leader:0 "空悬的团长之位"
KOD_empty_leader_desc:0 "随着上一任骑士团长宣布退休，顿恩骑士团陷入了短暂的混乱。由于继任者并没有被前任团长指定，高层需要尽快决出一位候选人出来，否则不符合先前规章的挑战者会前来颠覆旧秩序。"

