###领导人###
RSC_calhoun_bell:0 "卡尔霍恩·贝尔"
RSC_calhoun_bell_desc:0 "众所周知的一点是，历史总是会把个人推到完全不属于自己的高度上。显然，卡尔霍恩就是这样的人。卡尔霍恩从来不认为自己有能力领导一场工人革命，他本身偏向空想共产主义的观点足以证明这一点，但是历史的风还是将他推到了台前。不过局势发展到今天这一步，那就只能走下去了。虽然卡尔霍恩并不支持这场革命，但他不可能辜负他的工友与抛弃左翼同盟的其他同志于不顾。\n\n作为南巴少数选择留在国内的左翼人士，卡尔霍恩在工会中很有人气。他经常为了劳动者的待遇与薪资问题发声，在整个麦恩茨市可能都找不出来第二个敢如此与本地企业叫板的人了。很快，卡尔霍恩就成了当地最知名的左翼人士，也成为了无数个劳动者心中的救世主。左翼同盟很快便找上了他，邀请他加入组织。卡尔霍恩也没推辞，加入左翼同盟可以获得更多的支持，只要能让劳动者们过上好日子就行。\n\n不过时局可没给卡尔霍恩适应的时间。在一次本来例行的游行中，军队政变的消息传来。几个秘密回国参与游行的左翼同盟成员随即决定起义。尽管卡尔霍恩认为这并不是起义的好时机，也不支持突然的暴力革命。但显然队伍中的大多数人都认同左翼同盟的想法，起义如期举行。而卡尔霍恩则被工人们推举成了起义领袖。尽管他自己并不想要这个领袖的位置。\n\n既然起义已经发生，那就只好继续下去了。卡尔霍恩不希望让工人与左翼同盟的同志失望，至少先干下去吧。卡尔霍恩想到了当年南巴工人革命的领袖，不得已，他只好学着那位领袖的样子开始行动起来——\n\n起码行动起来总比驻足观望要强不少，对吧？"

###民族精神###
RSC_let_fire_burns:0 "革命之火依旧在燃烧"
RSC_let_fire_burns_desc:0 " 1782年共和革命、1834年鲁萨尔农民战争、1878年卢瓦尔公社起义，1911年第一次公社革命、1976年第二次公社革命……先烈抛洒的鲜血实在是太多了，仇恨在我们心底里燃烧。我们对抗过国内外反动势力，我们独自撑过了失去联络的14年。现在南巴共和国的秩序在崩塌，人民的怒火在燃烧。革命的烈焰誓将这旧世界烧得一干二净，人民复仇的呼声必将响彻这片大地。"

