###民族精神###
FFH_unorganized_gov:0 "缺乏组织的政府"
FFH_unorganized_gov_desc:0 "自由联军面临着两大问题：缺乏训练的士兵以及互不通气的地方力量。前者理解起来更为简单，但处理起来十分困难，我们的军队没有时间也没有物资开展对士兵的训练，许多人对战争的了解仅仅是扣下扳机，更有甚者一辈子没见过火器，只懂拿两根锈迹斑斑的长矛捅人；造成第二个问题的主因是联军各地部队都有着自己的长官，革命党的根据地有着独立的政治机构，军事组织以及经济系统，无政府主义者以及农民起义军也是如此，别说军事上的合作，这几方派系甚至常常互相指责彼此的政策，这严重破坏了自由联军的团结。"
FFH_society_in_chaos:0 "无序的社会"
FFH_society_in_chaos_desc:0 "虽然革命党的根据地在起义前就有组织，因此受到起义后社会混乱的波及较小，但其它地区就没那么幸运了。自由联军大起义后，各地政治团体没有统一的纲领以及实践的经验，开展起的“改革运动”五花八门，成效却不见得有多少。随着一部分乡下无政府主义者以及农民叛军开展了位于农村的自治运动，少数几个城市很快陷入了饥荒。同时，碍于基础设施的破坏，多数产业都停摆了，自由联军中央派往各地的政府官员无力组织生产活动，也无法为中央的活动提供税收的支持。我们不得不靠军队在各地采取强制措施以维持联军的存续。"
FFH_for_freedom:0 "为了自由！"
FFH_for_freedom_desc:0 "姓郑的！你可曾听见人民的怒火与悲痛？我们已经受够了远乡王国那虚假的承诺！连年的战火，遭到背叛的改革以及毫无作为的政府，那些高高在上的王公贵族们从未在意过我们人民的想法，只顾着坐在社会金字塔的顶端，在觥筹交错之中过着糜烂而自在的生活！这一切必须被停止。为此，革命党，无政府主义者和农民领袖破天荒地团结在了同一面旗帜下，为了自由而战！自由联军万岁！国王去死！"

