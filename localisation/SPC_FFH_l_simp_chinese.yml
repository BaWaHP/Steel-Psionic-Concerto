###领导人###
FFH_Qiuhui:0 "秋辉"
FFH_Qiuhui_desc:0 "秋辉能在北远乡地区的革命党分部中步步高升并非没有原因。出生于一个富农家庭的他从小便在农村长大，说句难听的，农民那些耕作技巧，譬如如何让植物长得快点，或者在植物长不快的情况下糊弄政府官员的招式，他都熟得很。这也是为什么当革命党人试图在北远乡建立根据地时，他们很快便相中了这样一位“农民通”来帮助那些城市地区来的知识分子了解农村的生产活动，不同习俗间的区别以及农产品的价值等等。可以说，革命党人能成功在相对不发达的北远乡地区扎根，其背后绝对少不了秋辉和以他为首的“农民派”的推波助澜。\n\n不过，时过境迁，世界局势也在不断改变。自由联军的成立是秋辉从政历史以来最为大胆的提案，没有之一。当全远乡各地的革命活动宣告失败，难产或是停滞时，面对落后的北远乡地区，许多革命党人曾一度称之为“黑暗时代”，纷纷离开了队伍。自由联军的提议是秋辉的一次豪赌，也是北远乡革命党分部的历史性转折点。时任革命党领导人不得不接受合作的提议后，无政府主义者和农民领袖的加入极大地扩张了以秋辉为首的“农民派”的势力。加上秋辉本人同无政府主义者以及农民一方势力的关系也较好，他最终成为了自由联军当之无愧的领导人。\n\n然而，自由联军终究只是一个临时的同盟。无论秋辉本人再怎么努力地团结不同派系的观点，许多矛盾与隔阂终究无法弥补。为了实现他所期望的愿景，或许在不久的将来，又有许多人的血要为他所流。"

