###政党名称###
VLF_pioneer_communism_party:0 "乌格列维克座解放者"
VLF_pioneer_communism_party_long:0 "乌格列维克座解放者\n§g“乌格列维克座”是16世纪早期一位半人马天文学家乌格列维克发现的天体，他将其命名为乌格列维克座，以表示这是他发现的，但是乌格列维克座也是一位诡异的神秘主义学者，他对外宣称人类与半人马最开始起源于乌格列维克座，抵达地球的是第一批的先遣殖民队，因为缺少“璇能”而逐渐退化。而唯一获取璇能的方式就是使用仪器尝试重新与乌格列维克座重新获得联系，这一理论在后续得到了数量众多的城市青年信仰，以至于在现代与先锋党合流，试图用神秘主义的方式建立一个星际共产主义社会。§!"
VLF_revolutionary_communism_party:0 "至高提特兰祖国军"
VLF_revolutionary_communism_party_long:0 "至高提特兰祖国军\n§g至高祖国军实际上在各处都透露着诡异的形态，他们高呼着共产主义与社会主义，但是他们同时也支持着提特兰教会与提特兰君主制，乃至激进的民族主义观点；这让他们犹如一条九头蛇，无论是极右翼还是极左翼，亦或者理性共和军都能够和至高祖国军聊上那么两句……§!"
VLF_worldunion_socialist_party:0 "理性共和军"
VLF_worldunion_socialist_party_long:0 "理性共和军\n§g自工业革命开始，机械与理性的力量就在改造整个巴斯蒂亚，这让许多人为之而着迷，一位伟大的半人马贵族在世界大战期间在癫狂的战争中感到了理性对他的召唤，他对此感到无比的狂热，以自己的名义组建了理性共和军，但是与其说是一个派系，不如说是一个崇拜着名为理性的教团，他们崇拜着工厂的黑烟，诋毁着一切其他意识形态与宗教，而一切仅为一句格言——“无神论或者死亡”。§!"
VLF_worldunion_democrat_party:0 "泛半人马联合阵线左翼"
VLF_worldunion_democrat_party_long:0 "泛半人马联合阵线左翼\n§g近几年泛半人马民族主义兴起后，一部分半人马知识分子组建了泛半人马联合阵线来推动泛半人马民族主义党传播。然而这个操之过急的团体由于吸收了太多不同成分的人物产生了严重的分歧。表面上团结的联合阵线如今已经在事实上分成了三个部分，只要再有一些火星就可能爆发出难以想象的情况。§!"
VLF_liberal_republican_party:0 "泛半人马联合阵线中间派"
VLF_liberal_republican_party_long:0 "泛半人马联合阵线中间派\n§g近几年泛半人马民族主义兴起后，一部分半人马知识分子组建了泛半人马联合阵线来推动泛半人马民族主义党传播。然而这个操之过急的团体由于吸收了太多不同成分的人物产生了严重的分歧。表面上团结的联合阵线如今已经在事实上分成了三个部分，只要再有一些火星就可能爆发出难以想象的情况。§!"
VLF_conservative_republican_party:0 "提特兰社会运动党"
VLF_conservative_republican_party_long:0 "提特兰社会运动党\n§g社会运动党其实在大众看来是相当中间派，但是却不乏暴力的一个政党，社会运动党活动的地方大多数左派和右派都难以扎根，因为社会运动党活动区域几乎放任农民到无政府状态，使得其他人压根无法介入管理，但是对于当地政府来说，困难的是让农民怎么不冲入城内打砸抢，而不是镇压社会运动党。§!"
VLF_authoritarian_republican_party:0 "首都13号台球俱乐部"
VLF_authoritarian_republican_party_long:0 "首都13号台球俱乐部\n§g不是所有贵族都是摄政王的朋友，而现在其中大部分都是被降职或撤职的前专制公政府里的官员。摄政王还是给了他们体面，但是随着摄政王的胃口越来越大，一些尝试反击摄政王的人聚集在首都的13号台球俱乐部里，一边抽烟一边打台球的同时谈论着反击措施。§!"
VLF_national_socialist_party:0 "全能统治党"
VLF_national_socialist_party_long:0 "全能统治党-北方支部\n§g全能统治党作为知名的地下反抗组织，他们对于自治区的态度显而易见——并入本土。于是乎，北方分布就此诞生，吸引着反对摄政王的半人马青年们，为未来的变数做着准备。§!"
VLF_authoritarian_nationalism_party:0 "泛半人马联合阵线右翼"
VLF_authoritarian_nationalism_party_long:0 "泛半人马联合阵线右翼\n§g近几年泛半人马民族主义兴起后，一部分半人马知识分子组建了泛半人马联合阵线来推动泛半人马民族主义党传播。然而这个操之过急的团体由于吸收了太多不同成分的人物产生了严重的分歧。表面上团结的联合阵线如今已经在事实上分成了三个部分，只要再有一些火星就可能爆发出难以想象的情况。§!"
VLF_paternal_autocrat_party:0 "摄政王政府"
VLF_paternal_autocrat_party_long:0 "摄政王政府\n§g摄政王政府基本上由前任专制公周边的人组成，存在的意义就是维护以乌罗什家族为中心的贵族利益圈，而不在摄政王政府内的前政府人员估计现在正在某个首都的台球俱乐部打闷球呢。§!"
VLF_wizard_rules_party:0 "黑阳崇拜者"
VLF_wizard_rules_party_long:0 "黑阳崇拜者\n§g黑阳崇拜是提特兰半岛特色的一种诡异崇拜，他们歌颂黑阳王的法力强大与魔权暴政的伟业，但是在从未遭受过南方魔权统治的北方，他们很难有什么支持的人。§!"
VLF_religious_extremism_party:0 "瓦莱菲奥丽塔教区"
VLF_religious_extremism_party_long:0 "瓦莱菲奥丽塔教区\n§g瓦莱菲奥丽塔教区是一个典型的，半人马提特兰化后产生的宗教模式，浓重的半人马信仰痕迹与来自远方的独特信仰拼接，构成了当地独特的信仰，这一信仰几乎保留了南巴蒂亚的旧瑟庞教反工业化的思潮，又充斥着提特兰本土与半人马共同构成的宗教等级体系。§!"
VLF_anarchism_party:0 "叶尼塞夫"
VLF_anarchism_party_long:0 "叶尼塞夫\n§g“叶尼塞夫”是自治区内非常知名的大匪帮，他们盛行着一种古典半人马式的游牧生活，在整个自治区境内以及边界上不断劫掠富贵者与有时候绑票贵族子嗣，贵族们拿他们没有办法，而许多贫穷的半人马们则敬爱着他们。§!"

