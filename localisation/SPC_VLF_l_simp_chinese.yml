###国策###
VLF_stressing_up_pressure:0 "愈发严重的压力"
VLF_stressing_up_pressure_desc:0 "蒙特韦尔德联邦的内战导致的大量难民与乱军不断得破坏着我国的边境安全，这引发了边境贵族和内陆贵族的严重矛盾。这次危机正在割裂自治区的团结和稳定，而我们名义上的宗主国坎达德尔王国很明显帮不了我们。摄政王必须采取行动来调和两方的关系，不然后续的一切行动都无法进行。"
VLF_confession_and_punishment:0 "忏悔与惩罚"
VLF_confession_and_punishment_desc:0 "现在摄政王政府不能依靠贵族集团来解决国内问题了，而亚历山大第一时间想到的便是自他当上摄政王之后一直保持中立且沉默的教会。在前专制公政府内以极端闻名的教会如今对世俗不言一语，光是他们呆在教堂里就给人一种不寒而栗的感觉。然而现在摄政王不得不主动敲开他们的大门，希望得到这些人的帮助，也希望对最近缠绕在心中的不明之物进行忏悔。"
VLF_medal_covered_in_rust:0 "布满铁锈的勋章"
VLF_medal_covered_in_rust_desc:0 "亚历山大不得不承认现在的自治区军队已经被这群和他合作的废物贵族给养废了，如果他还想进行他之后的计划就得找一个靠谱的人来。最合适的人选无疑是曾经的战争英雄：乌布斯达什·奥布雷偌韦奇了，如果说前专制公是世界大战里曾经的瓦莱菲奥丽塔铁军的无可争议的领袖，而乌布斯达什则是无可争议的督军。前专制公的指挥打红了铁军这个称号，而没有乌布斯达什则没有铁军的基础。"
VLF_infiltrate_the_old_world:0 "潜入旧时代的圈子"
VLF_infiltrate_the_old_world_desc:0 "通过对教会和乌布斯达什的交流经验，亚历山大可以确定对于那些旧党重新利用的可能性。现在是时候抛弃这些离心离德的贵族们了，亚历山大需要的是像前铁军军官们那样需要荣誉的贵族。"
VLF_open_the_pool_club_doors:0 "打开台球俱乐部的大门"
VLF_open_the_pool_club_doors_desc:0 "首都13号台球俱乐部是有名的反对派联盟，这个时候他们再来一次偷袭肯定是无法忍受的。先一步稳住他们，给予他们在未来中稳定的位置，这个仅仅只是为了反对而反对的联盟肯定马上烟消云散。"
VLF_new_commitment:0 "新的承诺"
VLF_new_commitment_desc:0 "伊万·奥布雷偌维奇作为一个年轻贵族能成为一个反对派联盟的领袖还是证明了他的实力，同时他也是一个很单纯的人。亚历山大只需要做出向他承诺斯蒂芬·奥布雷偌维奇的统治就可以达成合作，以此便可以轻松换来他的效力。"
VLF_heal_a_wound:0 "弥合伤口"
VLF_heal_a_wound_desc:0 "像乌布斯达什那样处境的前铁军军官还有很多，从中找到突破口并非难事。瑞纳达夫·奥布雷偌维奇是乌布斯达什的密友，也是瓦莱菲奥丽塔的副官。作为曾经铁军的调和剂而更多是留念曾经铁军的辉煌，如果能通过他来说服乌布斯达什帮助亚历山大重建铁军的希望无疑更大。"
VLF_shadow_of_the_old_days:0 "旧日之影"
VLF_shadow_of_the_old_days_desc:0 "在瑞纳达夫的帮助下，一些前铁军军官对斯蒂芬开始重新产生了信心，这使他们开始支持摄政王政府。斯蒂芬向亚历山大提议建立单独的典范军来绕过费拉不堪的自治区军队，亚历山大执政这十几年来第一次破天荒般接纳了斯蒂芬的观点。亚历山大从来没有亲自见证过瓦莱菲奥丽塔的强大，这在他接纳斯蒂芬建议的时候心中莫名升起了一道嫉妒之情。"
VLF_stable_government_system:0 "稳定政府系统"
VLF_stable_government_system_desc:0 "伊万和瑞纳达夫带来的影响巩固了亚历山大政府的基本盘，而为了彻底让行政机关为亚历山大服务还得通过一些特殊手段。这最好不要让斯蒂芬·奥布雷偌维奇知道，免得让一些人利用一个孩童的善良。"
VLF_stable_government_system_tr:0 "§Y威权共和主义§!和§Y宗教极端主义§!意识形态占比合计大于§Y50%§!"
VLF_stable_government_system_tt:0 "§C政府不再动摇。§!"
VLF_our_nominal_suzerain:0 "我们名义上的宗主国"
VLF_our_nominal_suzerain_desc:0 "现在的坎达德尔王国名义上还是我们的宗主国，而他们现在只不过是那群牛头怪的傀儡罢了。他们不得不满足我们的大部分需求而防止他们薄弱的北方暴露在马加尔斯邦联下，这次向他们请求应对难民潮危机的帮助也一样。"
VLF_coordinate_willing_nobles:0 "协调愿意配合的贵族"
VLF_coordinate_willing_nobles_desc:0 "虽然一些贵族不识好歹的认为难民潮还没到他们那里就不关他们的事情，但是已经受到影响的贵族们还是愿意配合的。当然那些贵族的本质还是不会变的，中间多花些钱来填塞他们各种各样的理由还是可以接受的。"
VLF_strengthen_border_facilities:0 "加强边境设施"
VLF_strengthen_border_facilities_desc:0 "现有的老旧设施早该更新了，在难民潮进一步威胁我国稳定前得先控制肆意进入我国的难民。加强边境管制和训练岗哨让这些难民无法轻易靠近农村和城市，他们在野外能生活得怎么样就不关我们事了。"
VLF_looking_for_talent:0 "寻找难民在中的人才"
VLF_looking_for_talent_desc:0 "蒙特维尔德联邦的灾难让所有阶层都可能变成了难民，这些跑到我国的难民中还是有值得让我们利用的存在。这些人才会帮助我们解决难民问题，乃至于其他领域的问题。"
VLF_internal_solution:0 "难民问题的内部解决方案"
VLF_internal_solution_desc:0 "很明显难民中的人更懂难民的具体情况，他们提出了一个由政府支持的难民中具有权威的人物来组织难民的方案，这将配合政府逐渐解决难民的混乱状况。很明显有人通过这些难民中的人才传递了一个信息，他们可以接受安置地来与政府达成协议。最终在斯蒂芬的请求下，亚历山大认为这是可行的方案。"
VLF_internal_solution_tt:0 "§C解锁解除§!§Y难民潮危机§!§C的选项。§!"
VLF_controlled_refugees:0 "可控的难民潮"
VLF_controlled_refugees_desc:0 "随着边境管制和难民政策的落实，难民潮终于得到了应有的控制。而关于难民入籍和难民就业问题以目前亚历山大的政治资源还无法解决，等到一定条件之后难民潮终究会被解决的。"
VLF_initially_stabilize_the_country:0 "初步稳定国内"
VLF_initially_stabilize_the_country_desc:0 "难民潮危机的解决缓解了国内的紧张情绪，而现在亚历山大也不再依赖于那些没用的贵族们了。一张宏伟蓝图正在浮现在他的脑海之中，现在只需要等待一个契机的到来。"

###变量###
VLF.1.t:0 "没有意义的谈判"
VLF.1.d:0 "亚历山大·乌罗什坐在斯蒂芬·奥布雷偌伟奇旁边，感受着自己一个月以来的努力最终付之东流的结果。\n\n亚历山大以斯蒂芬的名义邀请支持本政府的各方贵族到，在首都举行关于难民问题和边境危机的最终合作谈判。尽管亚历山大和他的团队以各种方式晓之以理动之以情得劝说各方统一行动，在这特殊时期放弃以往的松散方式来应对此时自治区成立以来罕见的危机。\n\n然而没有人想独自承担代价，联盟的秘密组建而又突然破裂，共识的艰难达成却无法长久，谈判陷入漫长的反复博弈和无理取闹中。\n\n有人说应该派出军队把所有难民赶出去却不赞成在自己领地征兵，有人说应该积极去干涉蒙特韦尔德联邦却不想花钱到这方面，有人说应该先打击国内的不稳定因素却不想打击一些和自己有合作的势力。\n\n最终，一个边境贵族的冒犯惹怒了一些内陆贵族，双方就因为荣誉问题而组成了针锋相对的两个联盟。斯蒂芬尝试唤起双方对公国的认同感，希望在场的各位想起其父瓦莱菲奥丽塔·奥布雷偌维奇在世界大战上带领半人马获得的荣誉。嘈杂声中飘出来一句话：“那只不过是一个肥头大耳的老东西带着一群只会打台球的老顽固罢了”。众人先是一惊，转而互相指责是对方的人在侮辱前专制公，企图给对方扣上帽子。亚历山大猛烈地锤了一下桌子吓到了斯蒂芬，其他人也在几秒后安静了下来满怀不满地看着亚历山大。“好了，各位。在这里争吵已经没有意义了，如果想守护住自己的荣誉要么去外面用传统方式进行一场单挑，要么就解决目前的危机来证明自己，穆勒斯只会保佑勇猛之人。”众人在听了亚历山大的话后吵杂了一会后，以各种理由离开了会场。\n\n斯蒂芬向亚历山大表示感谢，而亚历山大看着斯蒂芬时感觉到一股恍惚感，他一瞬间觉得自己当初可能真的做错了。"
VLF.1.a:0 "“抱歉，斯蒂芬陛下，刚刚是我失态了。”"

VLF.2.t:0 "穆勒斯只怜悯先选之民"
VLF.2.d:0 "亚历山大依旧如往常一样独自一人来到东彭尼斯科拉殉道者大教堂，在战争烈士纪念园中前专制公的墓前默哀了之后，亚历山大回到教堂的穆勒斯无面圣像前跪下，这是这几天亚历山大摸索出来的见到教区长的唯一一个方法。\n\n让他这种显贵跪下在如今的提特兰半岛无论如何都有失身份，不过亚历山大无论是出于寻求帮助还是其他原因接受了这一点。望着圣像模糊不清的面孔，一瞬间亚历山大看到了前专制公与斯蒂芬混合后的面孔，汗水瞬间湿透了他的衣服。\n\n不远处的脚步声把他拉回现实，亚历山大依旧面对着圣像，只有这样他才能和教区长对话。只不过不同往日，教区长在他说话前先开口了“穆罗卢卡偌说“你们应当讨伐他们，穆勒斯要借你们的手来惩治他们。”，教区长的话语依旧使用《莎书》的内容，亚历山大对于这次教区长主动开口感动意外但不敢回答，因为教区长开口一般意味着他不会停下来直到他离开。“凡有气血者，都要尝死的滋味。我以祸福考验你们，你们应当以气血回应我。”亚历山大依旧沉默不语，他的膝盖开始颤抖起来。“穆勒斯以你们和他们考验你们，看谁更努力赛跑以达到目的地。”在说完这句话后，教区长默默离去了。\n\n亚历山大在13分钟后站了起来，在离开大教堂的时候看向了前专制公墓的方向，“所以你当初就立下埋葬在此的愿望是正常的。”转头望着逐渐落下的太阳。"
VLF.2.a:0 "“穆勒斯与我们同在，为了胜利与荣誉”"

VLF.3.t:0 "空余酒味飘荡"
VLF.3.d:0 "亚历山大捂着鼻子走过弥漫着廉价酒气味的过道，最终走到了一个穿着泛黄的旧式坎达德尔王国军服的人面前。那个人靠着墙半躺在地上，手中拿着的酒瓶里没剩下多少东西，而他本人则是一股半醒半睡的状态中。\n\n亚历山大咳嗽了两声对着这个人说道：“乌布斯达什？”，地上的乌布斯达什抬头看了一眼亚历山大，以一种类似于恍惚状态说道：“亚历山大？哈哈，你姐现在怎么样了？我兄弟一直自从被安排到你姐姐后刚开始还闷闷不乐呢，现在他肯定每天活得很快活吧？感谢穆勒斯，让他能有这个好结果。”亚历山大知道乌布斯达什现状是拜他所赐，而乌布斯达什也知道亚历山大能找他还能是什么事。碍于现状，亚历山大只能先配合着说：“自然的，他们现在过得很好，我姐姐现在每天沉迷于那些半人马学者的泛半人马民族理论，她上学的时候就很喜欢专研历史和文化，现在她终于有时间了。”乌布斯达什哈哈大笑，他尝试起来却失败了，索性就靠着墙坐了地上看着亚历山大的眼睛说：“是啊，世界大战摧毁了我们很多很多，但是这和战后的一切来讲都值得，现在对于不同的人来讲也一样。”\n\n亚历山大最终屈服了，他选择蹲下来平视着乌布斯达什，希望这能让他看起来平易近人一点。乌布斯达什也盯着他，两人最终在这种对峙的氛围下不知道过去了多久。乌布斯达什最终回应道：“莎书上有句话“穆勒斯喜悦他们，他们喜悦他。这便是伟大的成功。””然后把酒瓶里剩下的酒一饮而尽，便沉沉地睡了过去。\n\n亚历山大无可奈何地起来，如同他从未来过一样离开了这里。"
VLF.3.a:0 "长久的裂痕难以弥补"

