VLF_alexande_urosh:0 "亚历山大·乌罗什"
VLF_alexande_urosh_desc:0 "亚历山大·乌罗什是前任专制公斯特芬·奥布雷偌伟奇的妻子的哥哥，其家族最早可追溯至16世纪，是最早由坎达德尔四世迁运到提特兰半岛的半人马家族之一。曾经先祖在军队里获得战功而受封，由此全家改信纳卡教并改性乌罗什。\n\n亚历山大从小接受着军事训练和贵族教育，作为家族长子的他被给予了厚望，这让他充满了荣誉感和骄傲。而14岁的时候，世界大战爆发了并夺走了他的父亲。从那个时候起他开始胆怯战争，而为了继续保持自己地位却又不得不进入军官学校。万幸的是在他18岁成年之后，世界大战结束了。通过自己被授予荣誉的父亲的人脉，亚历山大开始在年轻一代中节节高升，最终混入了王国的高级圈中，在那里，他第一次接触到各种政治的思潮，他感觉时代正在舍弃他们的体制与思想，而他却无以为继，继续当着伟大的贵族，对世界的改变熟视无睹——就像是古提特兰的大理石雕塑一样。\n\n专制国成立后，亚历山大凭借自己在王国的人脉给自己博取支持，把自己的妹妹嫁给斯特芬·奥布雷偌伟奇、聚拢朋党等让他从实际上控制了自治区政府。最终在1996年，他的手下设计害死了斯特芬给亚历山大带来了最棒的新年礼物，而这个手下的人头也成为了这个礼物的附赠品让这个真相被隐藏起来。但是他并没有为此而高兴，当他真正掌控了国家他才发现了许多事情——专制国早已是千疮百孔，如同大理石的雕塑一样，脆弱而即将被毁灭。\n\n他恐惧着看着世界这精妙的齿轮，钢铁的咬齿正绞着他的身体，他的国家，他的一切，他爱的人，他恨的人。来自他无能妹夫腐烂的双手仍旧拖着他，不断地向下而去……"
