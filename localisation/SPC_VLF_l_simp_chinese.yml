###民族精神###
VLF_young_dictator:0 "年幼的专制公"
VLF_young_dictator_desc:0 "§R1978年§!，在庆祝半人马传统新年的宴会上，我们的前任专制公意外死于肥胖导致的心脏病，这让尚且1岁的斯蒂芬·奥布雷偌伟奇在他的舅舅支持下成为了我国第二任专制公。年幼的专制公如今被他的摄政王舅舅肆意操纵，而摄政王犯下的罪行反而由他承担着骂名。这让一个年幼的孩子苦不堪言，§R如今专制公早已成年而摄政王政府并没有还政于人的想法，这一定程度上成为了反对派攻击借口。§!"
VLF_harassment_from_mtv:0 "自蒙特韦尔德联盟边境来"
VLF_harassment_from_mtv_desc:0 "蒙特韦尔德联盟作为坎达德尔内战中几个军阀国家中，曾经最为繁荣的那一个，曾经无数人想要偷偷越过边界，冲入蒙特韦尔德联盟境内定居，而当1996年蒙特韦尔德联盟一连串的消息之后，这曾经的繁荣之地似乎已经变成了地狱，大批难民夹带着强盗进入中提特兰内，这让我国几乎无暇应对。"
VLF_ideological_testing_ground:0 "意识形态的大试验场"
VLF_ideological_testing_ground_desc:0 "北提特兰向来是一块丰饶且暴政不断的土地，这也孕育了当地人对于各种新思想的认同，无论是泛半人马的民族主义，还是各式各样奇怪的思潮在这一片战争之后的土地上均有一些人的赞同与支持。以至于看的一些外国人都要直呼：为什么他们没有吃饱都能想这么多？"

VLF_rise_of_pan_centaur_nationalism:0 "泛半人马民族主义兴起"
VLF_rise_of_pan_centaur_nationalism_desc:0 "近几年在提特兰半岛的半人马学者中兴起了建立共同的半人马民族意志的活动，从早期在文学、语言、历史中寻求相似之处到追求建立统一的半人马民族国家来弥补半人马与其他种族的不足之处，§R这得到了贵族们的大力支持而成为自治区教育和政治里的主流思想之一。§!"

VLF_national_dev_council:0 "国家发展委员会"
VLF_national_dev_council_desc:0 "国家发展委员会是摄政王政府下辖的由墨精灵作为顾问的负责现代化政策的委员会，直接管理各个自治区与七河的合资企业。在墨精灵顾问事实上的领导下，自治区通过20年的时间初步拥有了自己的工业和现代化基建，成为了七河中低端产业的海外主力之一。同时NDC也为自治区带来了现代化教育和七河风尚，间接推动了自治区半人马民族意识的发展。"

VLF_joint_ventures:0 "合资公司"
VLF_joint_ventures_desc:0 "七河的帮助自然还有不小代价，除了资源开采权和贸易优惠外还有合资公司的股权要求，剩下的股票也通过土地入股的方式流向贵族手中。"

VLF_cracked_crown:0 "破裂的王冠"
VLF_cracked_crown_desc:0 "贵族们之间的矛盾正在动摇国家的稳定，摄政王政府必须寻找其他势力的支持才能维持统治。"

###动态修正###
VLF_land_of_bunkers:0 "碉堡之地"
VLF_land_of_bunkers_desc:0 "艾尔巴卡斯特拉是一座古老，悠久的堡垒城市，最初提特兰帝国征服这里后，将这里作为防卫北方的堡垒。而在坎达德尔一世损失巨大攻下这里后，他将这里暂定为首都，然后才向南继续攻去，后续半人马民族的迁入更让这座城市几乎不可被摧毁——优质的兵员，深入城市构造的防御设施，无一不彰显着这座城市作为碉堡与城市的双重性。"

