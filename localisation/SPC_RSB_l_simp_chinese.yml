###领导人###
RSB_aeeton_raymond:0 "艾伊通·雷蒙"
RSB_pasti_caprivi:0 "帕斯提·卡普里维"
RSB_ortland_karasasin:0 "奥特兰·卡拉萨辛"
RSB_ortland_karasasin_desc:0 "奥特兰.卡拉萨幸，年过半百的他来自于东部大区一个传统家族的他出生于共和国的“黄金时代”，家族良好的教育让他彬彬有礼且在之后顺利地进入了政府内部，成为了一个民主党人。他与诸多那个时代的人一样喜欢共和革命时期的历史，年轻气盛的他逐渐对民主党和政府内部无聊的体制感到不快和恶心，最终使他退出了民主党也随之丢掉了自己在政府的职务。\n\n在漂泊不定中，他被家族安排成为了一名记者，在之后无意中接触到了国家公民党并深受其启发，成为了一名国家公民党成员。虽然这又导致了他被家族所排斥，但是至少并没有让他失去记者的职位。之后他凭借着在报社的便利为国家公民党做出了不是贡献，在之后他逐渐进入了党内的核心圈子。世界大战的爆发中，爱国热情让他成为了一名前线记者。在经历了中巴战线的残酷后，南部海岸突袭战的消息让他选择回到家乡。只不过，对方比他快了一步使他不得不选择暂时居住在首都。\n\n在首都沦陷时，他见证了入侵者砸碎了圣女的雕像，将繁华的首都变为人间炼狱。他心中的热情最终被冷水浇灭。战后他与其他党内元老重新把党组织起来，并在之后的党代会里推动了诸多新措施以争取选举。在吸收了左派联盟的温和派后，在他带领下竞选上了1996年届的总统。他坚信共和国将会在他带领下，成为一个能够保障公民权利的国家。"
RSB_frann_kendler:0 "弗朗恩·肯德勒"
RSB_auslander_makat:0 "奥斯兰德·马卡特"
RSB_nate_treacher_ost:0 "内特·特莱切·奥斯特"
RSB_marianne_petit:0 "玛丽安·佩蒂特"
RSB_esamund_kryavik:0 "艾萨蒙德·克里亚维克"
RSB_satranti_kestland:0 "萨特兰提·克斯特兰"
RSB_labor_union_subsector:0 "各工会总联络部"
RSB_adrian_fell:0 "阿德里安·费尔"
RSB_adrian_fell_desc:0 "老实讲，阿德里安从来没有想过共和国会有如此混乱的一天。随着政府军与首都的各方势力妥协，共和国的首都，度弗道夫正式成为了这场决定国家命运的战争的看客。度弗道夫成了中立区，但口头的中立保证并不能让这些权贵们放心。于是原本负责首都防卫工作的阿德里安，顺水推舟的成为了新成立的首都卫戍部队的指挥官。\n\n虽然就这么被推上了台前，但阿德里安始终铭记着自己身为军人的使命——服从命令。没过几日，在他的治理下，首都的混乱便彻底消失了。度弗道夫仿佛成为了混乱的共和国中唯一安宁的地方，而在其他势力的稳定还远远没有到来。\n\n虽然阿德里安十分厌恶度弗道夫的权贵，不过他是个没什么主见，也没什么野心的人。更何况，首都里有着他想保护的家人，他不能，也不可能允许这里发生什么乱子。军人以服从命令为天职，更何况国家也需要他，不是吗？\n\n他只求等到内战结束的时候，他可以平安的从这个烫手的位置上退下去。和家人们待在一起，不再为这些破事操心。有些时候，当一个什么都不懂，什么都不掺和的人反而更令人安心。毕竟——\n\n谁会为难一个老实人呢？"

