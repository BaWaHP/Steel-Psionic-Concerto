###政党名称###
RSB_pioneer_communism_party:0 "暂无"
RSB_pioneer_communism_party_long:0 "暂无"
RSB_revolutionary_communism_party:0 "革命者同盟会"
RSB_revolutionary_communism_party_long:0 "革命者同盟会\n§g革命者同盟会是艾什科尔时代残留的革命派组成的左翼革命势力联合成的政党。革命者同盟会通过去中心化领导而尽量避免被国家安全局一网打尽，这使革命派幸存了下来，但是分散的领导使革命派一直以来无法有效地对抗政府。直到“1995年革命”时党中央通过动员各地工人才结束了各地自行其是的状况。虽然名义上依旧是第三国际在南巴斯蒂亚共和国的成员，但是在“1995年革命”被镇压后，一个来自勒泰特尼安的年轻人奥斯特掌握了党内的主动权并向全党传播了自己的主张。这个举动被第三国际中央视为“乌托邦式”和“修正主义”而与奥斯特产生了分歧，不过由于革命的总目标一致，双方依旧是合作状态。§!"
RSB_worldunion_socialist_party:0 "劳动工人党"
RSB_worldunion_socialist_party_long:0 "劳动工人党\n§g劳动工人党是近几年兴起的左翼政党。在国家公民党转向社会民主主义后，一部分人因为坚持旧党纲而脱离出来组成了劳动工人党。在南巴共和国历代左翼革命失败和温和派改革不温不火的教训中，这让劳动工人党一直在革命和改革中摇摆不定。即使这样他们也在国内左翼势力重新崛起时受到不小的欢迎，这让他们进入到了一些人的视野中。在艾什科尔被弹劾下台后一直希望有一个被自己控制的政治代表，在考虑过后他插手了国家安全局对劳动工人党的调查。作为国家安区局特工的弗朗恩·肯德勒借艾什科尔之手和自己优秀的口才掌握了劳动工人党，他于是借此希望施展自己的政治理想成为一个导师。§!"
RSB_worldunion_democrat_party:0 "国家公民党"
RSB_worldunion_democrat_party_long:0 "国家公民党\n§g第二次民主化运动之后第一国际和第二国际成功被驯服，不再讨论革命的可能性，甚至宣布议会斗争胜利。一部分人自然不会成为这种所谓的胜利，这些人中的温和派便组成了早期的国家公民党，在经历了长期在野党状况后，世界大战中民主党执政失利让这种政党尝到了甜头。以老一辈左翼政党身份，国家公民党拉动了不同成分的人凑成了全国左翼联盟，战后第一届大选的胜利成为了国家公民党最辉煌的时刻。不过真自己上台的时候，国家公民党才发现自己可能更适合在台下当个批评家。最后因为革命派和保守派的矛盾，全国左翼联盟宣布解散，国家公民党也开始一蹶不振，甚至在之后被夺舍从人道社会主义转变为社会民主主义。随着国内左翼势力重新崛起，在民主党又一次面临执政危机的情况下，国家公民党以“全国最大的左翼政党“身份被民主党抬到台前。至少我们是唯一当过总统的左翼政党。§!"
RSB_liberal_republican_party:0 "南巴民主党"
RSB_liberal_republican_party_long:0 "南巴民主党\n§g南巴民主党作为第二次民主化运动的产物，本身可以说是一个大帐篷，从前革命派到保守派都在民主党内有一席之地，只是目前主要成员由于受到雷蒙集团的影响，才使民主党看上去是一个中右派政党而已。民主党在《1913年宪法》后的长期执政地位导致被经常拿来与共和党一党独大时期做比较，特别是在世界大战后一直是各党派在进行攻击时拿来作为形容词。但是实际上民主党比共和党更团结，而且执政时期大部分政策确实比共和党一党独大时期更注重国家利益。政府人员也更多喜欢的是民主党，这也为民主党在政府内争取到了许多势力愿意为他办事。§!"
RSB_conservative_republican_party:0 "南巴共和党"
RSB_conservative_republican_party_long:0 "南巴共和党\n§g共和党自建立以来，可以说除了刚开始那段时间外基本上其名声都不太好。第二次民主化运动后，经过长期的党内民主建设才让共和党摆脱了“独裁者集团”这一称号。共和党党内民主建设和卡普里维家族分裂也促使其转变为了一个受保守派青睐的政党。特别是在东部崛起后一些西部老牌企业受到威胁时，当然这并不代表共和党一直秉承保守路线，而随着“三架马车”卡普里维家族、克奥特伯家族和克斯特兰家族的衰落，共和党也开始希望能改变自己在普通人中的刻板印象而积极寻找新盟友。最终共和党选择与东部新兴政党民主同盟合作，以此换取东部企业家和七河资本的支持。随着民主同盟并入共和党，共和党如同焕发新春一样，成为了一个具有一定群众基础的政党。§!"
RSB_authoritarian_republican_party:0 "民主联盟"
RSB_authoritarian_republican_party_long:0 "民主联盟\n§g民主联盟是在东部崛起后，由一些代表东部新兴利益集团的在野党合并后的政党。作为一个新兴政党，却在不久后的国会换届中获得了不少席位使他们一时间信心膨胀，却不知道这是艾什科尔有意为之的。在四处碰壁后，民主联盟在一些接受七河资本帮助的企业搭桥下选择与七河人合作。在艾什科尔下台后民主党的制度改革计划触犯了东部利益，民主联盟因此取消和民主党的合作，转而去与民主党的老对手共和党合作。在共和党正好寻求新的合作者时双方一拍即合组成了爱国者联盟，虽然后来共和党由于西部支持者的缘故有退出的想法，但是这个政治联盟依旧没有解散。随着雷蒙集团的第二次分裂，新的当权者希望改善与东部的关系，民主党与爱国者联盟的关系开始回升，民主联盟也因此选择支持民主党扶持上来的国家公民党。§!"
RSB_national_socialist_party:0 "南巴复兴党"
RSB_national_socialist_party_long:0 "南巴复兴党\n§g复兴党是近几年兴起的东部政党，其领导人是少有的半人马族，而且是少有的较高民调支持率的政党。不同于大部分政党走精英主义路线，复兴党常与民众在一起而且设立了许多救济组织。这种群众路线让人联想到革命派，虽然复兴党早早地上了国家安全局的黑名单，但是并没有遭到进一步制裁，特别是吸引到很多少数民族加入的情况下。玛丽安·佩蒂特通过富有感染力的公开演讲获得了大量民众的支持，对联邦进行整合的主张获得了一部分权贵的支持，其民族主义路线也适合南巴的民众。最终克奥特伯家族找上了玛丽安·佩蒂特，复兴党便在有意培养下超过民主联盟成为了东部第一大党。§!"
RSB_authoritarian_nationalism_party:0 "人类曙光党"
RSB_authoritarian_nationalism_party_long:0 "人类曙光党\n§g世界大战改变了大部分南巴斯蒂亚共和国的公民，而战后流传的“背后捅刀论”认为联邦内的非人类种族和左翼人士应该为战败负责，在混合了民粹主义后便发展为了人类霸权主义。战后早期的人类霸权主义并没有什么影响力，直到东部崛起过程中引发的半人马劳动力问题导致东部本地工人开始倾向人类霸权主义，于是作为人类霸权主义最忠实的信徒—人类曙光党从一个退役军官俱乐部变成了一个拥有群众基础的东部大党。在军方内部争权夺利中萨瓦尔.米利克格看中了这个政党，准军事组织便在军方激进派的帮助下组织起来，使人类曙光党成为了东部不可小觑的力量。§!"
RSB_paternal_autocrat_party:0 "最高参谋总部"
RSB_paternal_autocrat_party_long:0 "最高参谋总部\n§g自从克斯特兰家族被督政府请来作为军事顾问后，这个家族就长期占据着最高参谋总部的大部分席位。即使第二次民主化运动后家族已经衰落，但是依靠着旧日的人脉他们依旧固守着这份“荣耀”。然而世界大战后这个家族已经衰落到不可挽回的地步，各方势力希望在最高参谋总部里安插自己的人手好控制军队。萨瓦尔.米利克洛作为萨特兰提.克斯特兰的外甥无法忍受这个状况，但是就算他与军官互助互爱协会达成合作，成为军中的“激进派”也无法改变。现任家族族长萨特兰提.克斯特兰没有自己的亲生子，依靠外戚维持着家族的荣光。他的高尚品德得来的尊重无法改变家族的多少现状，他的软弱使他放任了军中的争权夺利。他还深受药物依赖和心脏病的折磨，导致他容易被亚特里尔.阿图斯影响。只要他一死，军方内部彻底的分裂将不可避免。§!"
RSB_wizard_rules_party:0 "暂无"
RSB_wizard_rules_party_long:0 "暂无"
RSB_religious_extremism_party:0 "暂无"
RSB_religious_extremism_party_long:0 "暂无"
RSB_anarchism_party:0 "全巴斯蒂亚总工会"
RSB_anarchism_party_long:0 "全巴斯蒂亚总工会\n§g第二次民主化运动后，大部分左翼力量选择与新政府合作，甚至宣布革命或改革已经完成，而坚持革命的巴斯蒂亚革命同盟因此成为了左翼革命势力的大本营。为了更好地组织工人运动并对抗官方工会，巴斯蒂亚工会联盟就此诞生。作为巴斯蒂亚革命同盟的附属组织，同样在世界大战中因为南部海岸突袭战而迅速扩展了自己的势力。作为基层组织，巴斯蒂亚工会联盟无法像中上层那样撤离自己的大部分成员。这让他在1982-1994年的政府打压期间分裂成了两派，一派继续跟随国内“党中央”即“本土派”，另一派在反思历次革命失败后转向了无政府工团主义。全巴斯蒂亚总工会便从巴斯蒂亚工会联盟分裂出的土壤中诞生，并且由于其组织特性成为了政府最难拔除的左翼革命势力。在1994年8月爆发的反对政府改革计划的游行后，由于总工会积极参与其中的领导和左翼势力重新崛起的大背景下，组织数量迅速增长。而此时总工会大部分领导人犯了一个错误，他们带领各地分工会和民兵组织的领导人在一个地下室内召开第一次全体代表大会。结果被组织内的国家安全局特工知晓，最终被特工的炸弹炸死了大部分人，剩下的人也被赶来配合特工的警察抓进监狱中。在巴斯蒂亚革命同盟的“本土派”的帮助下，对方还慷慨地让一部分自己的工会组织参与到总工会中帮助其重新建立各工会联络。最终双方达成了同盟，总工会大部分分工会自此基本上跟“本土派”保持了友好关系。§!"

###民族精神###
RSB_maligned_government:0 "被人诟病的政府"
RSB_maligned_government_desc:0 "自打战后全国左翼联盟政府宣布与左翼革命派决裂之后，共和国政府便陷入了风波之中。政府在世界大战期间暴露出来的低效、内部的权利斗争以及腐败问题都让政府的公信力进一步下降。虽然共和国政府一直试图挽回自己的脸面，但人民的舆论和议会里不断的抨击以及左翼革命派的袭击都在消磨着政府对于共和国的掌控力。"
RSB_legacy_of_the_great_war:0 "伟大战争的遗产"
RSB_legacy_of_the_great_war_desc:0 "自伟大战争时期，南巴便宣布了联合指挥部的成立。而世界大战带给共和国的影响则进一步加快了联合指挥部的改制和换代。虽然因为经济的原因导致共和国不得不进行裁军，但南巴的军队依然保持在战备水平。同时，世界大战的记忆也迫使南巴开展军事改革与新式训练项目。虽然有传闻说这些措施真正目的是消减军队势力和打击克奥特伯家族。"
RSB_Ekuriel_case_fiasco:0 "艾库瑞尔案风波"
RSB_Ekuriel_case_fiasco_desc:0 "艾库瑞尔曾是最高参谋总部的事务官，在被国家安全局调查出来与人类至上主义组织有联系后，被军事法庭宣判10年有期徒刑并剥夺一切荣耀。但据著名民权运动者的爆料，艾库瑞尔实际上是最高参谋总部的替罪羊。致此事件开始进一步扩大化，据相关人士透漏，真正与人类至上主义组织有联系的是最高参谋之一的阿图斯。这导致各方势力围绕这个案件开始互相指责。"
RSB_zhe_rsb_friendly_treaty:0 "《南巴斯蒂亚-七河友好互助协定》"
RSB_zhe_rsb_friendly_treaty_desc:0 "世界大战带给南巴的除了殖民地的丢失就是在战争期间欠下的庞大债务。出于挽救经济的目的，在南巴共和国的带头下，联邦与七河集团签订了互助条约。该条约的目的主要为解决债务以及与七河集团展开进一步的贸易合作。来达到挽救共和国经济的最终效果。"
RSB_zhe_rsb_friendly_treaty_tt:0 "§R当七河与南巴出现局势变动时，协定将无法维持...§!"
RSB_military_overspending:0 "军队超支"
RSB_military_overspending_desc:0 "世界大战的记忆迫使共和国即便在和平时期也被迫维持了一支较为庞大的正规军并且政府内部还隐约有扩军的迹象。同时军队的各项配套设施建设也成为了共和国财政支出的大头，这使得军费处于严重超支的状态之中。除非我们能向民众证明共和国有能力保证公民的安全，否则军费对经济的影响只会越来越大。"
RSB_gov_finance_risk_dynamic_modifier:0 "政府财政超支风险"
RSB_gov_finance_risk_dynamic_modifier_desc:0 "共和国经济自从世界大战之后就开始变得一蹶不振，大战所带来的大量债务和不得不维持的庞大军事开支以及对国内公民的高福利制度都在进一步压垮战后好不容易重建的经济架构。不止政府内部对此意见颇深，就连联邦的成员国以及贸易伙伴都对共和国的经济感到担忧。经济学家不断给出的财政风险报告在向我们陈述一个事实：如果我们不能解决经济问题，那么——§t国将不国。§!"

RSB_burning_ground_outside_capital:0 "首都外燃烧的大地"
RSB_burning_ground_outside_capital_desc:0 "度弗道夫现在是稳定了，但是我们控制的其他地方依旧处于混乱中。叛乱分子成分很复杂，主要还是听信了那个半人马鬼话的人在破坏着稳定。虽然我们不得不依靠亚特里尔.阿图斯这类人帮忙镇压叛乱，但是至少他们是少有的经验丰富的人。"

RSB_financial_health_committe:0 "健康财政委员会"
