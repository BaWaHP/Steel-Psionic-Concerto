###国策###
RSB_financial_report_for_1997:0 "1997年度财务报告"
RSB_financial_report_for_1997_desc:0 "本届政府自从执政伊始就面临较为严峻的财政问题，因为政府长期坚持执行预算缩减政策，所以共和国即将走出经济问题的阴影，毫无疑问1997年的预算基本符合缩减目标，对此现状着实可喜可贺。"
RSB_convene_annual_report_meetings:0 "召开年度报告分析会议"
RSB_convene_annual_report_meetings_desc:0 "共和国的漫漫长夜已然过半，军事改革和产业革新正在有序的进行，但是庞大的外债规模以及周边地区的不安定状况极大的影响了共和国的未来，因此分析会将注重这一部分之内容，以避免共和国在黎明前功亏一篑。"
RSB_1998_financial_budget_adjust:0 "1998财务预算调整"
RSB_1998_financial_budget_adjust_desc:0 "分析会中探讨了解决眼前状况的可行方案，以去年的财务常规支出为基础进行部分修改。我们将以去年的财务支出为基础，对接下来的1998年财务预算进行部分修改，以帮助共和国的经济状况进一步转好，达成本届政府的目标。"
RSB_wheres_zhe_people:0 "七河人在哪里？"
RSB_wheres_zhe_people_desc:0 "在战后无论出于何种原因七河都为共和国的复兴做出了巨大贡献，代价则是许多优质的资产作为担保抵押了给了七河。其中最庞大的资产便是条约港和伊索丹莫妮群岛，但是以近期的情况来看，群岛公司的经营状况不佳，控制力有所松动，所以共和国需向ZBC发出邀约，进行秘密协商。"
RSB_ask_central_bastia_stabalize:0 "要求中巴稳定局势"
RSB_ask_central_bastia_stabalize_desc:0 "中巴是共和国的聚宝盆，但目前中巴的局势十分微妙——在这种情况下我们要勒令中巴政府进行军事戒严，以防止局势进一步恶化。\n\n不稳定的中巴局势将直接影响共和国从中巴获取廉价资源，以及倾销海量的工业制成品，任何破坏中巴稳定的行为都是不可接受不可容忍的。"
RSB_health_financial_committe:0 "筹建健康财政委员会"
RSB_health_financial_committe_desc:0 "通过预算后，接下来就该核算出如何节省这两成的支出，因此成立一个用来核算政府支出的财政委员会，就是势在必行的了。政府将通过这个委员会，拿出一套针对不必要财政开支的削减方案，通过该方案，将使我们的财政状况进一步明朗。"
RSB_lobby_politicians:0 "游说政客"
RSB_lobby_politicians_desc:0 "削减财政支出势必要与各部门达成共识，总统需要负责统筹协商各部门对财政支出的支持与建议。而按照南巴政府的传统，总统需要通过一些“小手段”来保证各个负责人对政府的决策保持高度的支持与赞同。"
RSB_manage_relationships:0 "打理关系"
RSB_manage_relationships_desc:0 "光靠嘴皮子是无法让所有议员心甘情愿的支持我们的政策，对于一部分顽固的官僚来说，也只有真金白银才能让他们回心转意了。但我们要知道这只是为了拯救共和国的未来所付出的微小代价，通过这一举措，我们将确保财政预算政策得以顺利通过。"
RSB_clear_the_system:0 "疏通脉络"
RSB_clear_the_system_desc:0 "以目前共和国之体制来讲，如果发生不利情况，总统的命令甚至无法及时传达要处。所以我们需要召开一场会议，来决定在这种极端情况下总统需要采取的必要措施。很明显的是，目前各部门对此的态度晦暗不明，这场会议从刚开始就注定不会那么顺利的结束。"
RSB_choose_experts:0 "挑选专家"
RSB_choose_experts_desc:0 "共和国的经济专家各有派别，他们的经济政策也不尽相同。我们需要选择一位与我们的经济改革计划相适应的专家，来主导改革。如果稍有不慎，就会使共和国的改革计划功亏一篑。"
RSB_clearify_targets:0 "明确目标"
RSB_clearify_targets_desc:0 "人选已经选定，那么接下来就是确定方向了，无论是公务员工资、公共开支、福利开支这些都无法构成大的问题，唯独军事开支是重中之重，共和国对军队待遇的削减必须放在最后才能考虑，马虎不得。"
RSB_clearify_targets_tt:0 "§C必须保住军队这张手牌！§!"
RSB_funds_allocated:0 "调拨资金"
RSB_funds_allocated_desc:0 "万事俱备，只需要给予部门所需要的资金，委员会将会立马展开工作。"
RSB_get_to_work:0 "开展工作"
RSB_get_to_work_desc:0 "人员，目标，资金相继到位，委员会高效的工作即将展开，委员会将会高效的衡量资金的使用，解救共和国于水火之中，§2天佑§!§R共和国§!。"
RSB_reinforce_central_bastia_military_fees:0 "加强中巴军费开支"
RSB_reinforce_central_bastia_military_fees_desc:0 "中巴的稳定是除了共和国自身稳定的第二要事，中巴局势的不稳定状况显然是人尽皆知的问题，那么为了避免中巴的崩溃，共和国必须提供一些援助用以稳定局势。"
RSB_maintenance_of_great_railway:0 "维护大铁路"
RSB_maintenance_of_great_railway_desc:0 "大铁路是联邦的大动脉，失去了大铁路，联邦里一半的国家都将陷入万劫不复的状况，因此对大铁路的运行状态必须维护，不仅仅能够保证联邦的经济运行。必要的时刻，军队也可以利用大铁路进行机动运载，完成快速部署。"
RSB_maintenance_of_great_railway_tt:0 "§Y$RSB_financial_health_committe$§!追加效果:\n建造速度:§G+5.00%§!"
RSB_fund_rsu_econ:0 "资助鲁萨尔经济"
RSB_fund_rsu_econ_desc:0 "鲁萨尔联盟不仅是联邦重要的成员国之一，而且还是共和国主要的贸易对象。其与共和国之间可以说是唇齿相依。如果鲁萨尔的经济完蛋了，那么共和国也不可能独善其身。因此，政府下一步必须要向鲁萨尔提供充足的资金来帮助鲁萨尔的经济拉升。"
RSB_promises_to_zhe:0 "向七河人做出承诺"
RSB_promises_to_zhe_desc:0 "共和国南部的群岛公司局势已经开始出现不稳的态势，如果群岛公司爆发内乱，将对共和国和七河人造成损失。我们打听到七河方面因为距离问题一直举棋不定，如果我们能在在这次邀约中开出一个七河人拒绝不了的理由。那么想必以此来换取七河人的支持就是探囊取物了。而这次行动唯一的变量就是共和国能从七河身上榨出多少好处了。"
RSB_increase_taxes:0 "增加税费"
RSB_increase_taxes_desc:0 "共和国政府是用来统筹人民，为人民服务的政府。因此，共和国的公民有义务在政府困难的时期帮助政府度过难关。所以百姓不能不体谅政府的难处，也不能不考虑政府的良苦用心。在这紧要关头，共和国的公民应该学会让小利而得大德。在这经济即将转好的前夜，政府不能因为妇人之仁就放弃对中小商户的税收。反而应该加大税收，以保证共和国经济的好转。至于百姓的日子会怎么样，那就苦一苦百姓，骂名让总统来担吧。"
RSB_fire_civil_servants:0 "裁剪公务员"
RSB_fire_civil_servants_desc:0 "共和国自步入近现代以来，历经几次民主党主导的政府改革之后。目前共和国的公务员系统已经变得臃肿不堪。即使是在战后进行了相当多次的公务员精简运动，但公务员的人数还是超过了政府的预期。公务员群体吃着国家的饭，享受着国家的恩情，那么为了国家暂时委屈一下自己的生活，想必也是完全可以接受的吧。"
RSB_shrink_armies:0 "缩编军队"
RSB_shrink_armies_desc:0 "强行缩编军队是一件相当危险的事情，这相当于文官政府要从那些暴脾气的武官的嘴里夺食。不过我们起码不会面对本土的军队，这一次裁军的主要目标是驻外军队。除了军官意外，驻外部队的主要组成部分都是当地人。只要我们多给那些军官发些钱，将他们从驻地调回来，再将军队控制权移交当地。这样下来，我们就可以在今年的经济报告上证明我们会省下多少钱了。"
RSB_cut_welfares:0 "减少福利"
RSB_cut_welfares_desc:0 "在国家危难的时刻，我们决不允许还有公民心安理得的享受着福利而没有尽一点责任。共和国的经济已经到了最危急的边缘，离崩溃只差一步之遥。这个时候还要求政府增加国家公共开支的公民必然不是一个爱国的好公民。对于这种只以个人得失为基准，丝毫不考虑国家这个大家庭的行为。我们要予以坚决的痛击。为了提高公民们的觉悟，政府已经决定要缩减福利支出，从而帮助公民形成爱国意识使国家走出难关。"
RSB_everything_good:0 "万事大吉？"
RSB_everything_good_desc:0 "没事了，没事了，终于没事了。"
RSB_what_are_you_doing:0 "你们在干什么？！"
RSB_what_are_you_doing_desc:0 "冷静，冷静，冷静下来，还有救一切还有救。"
RSB_provide_support:0 "提供支援"
RSB_provide_support_desc:0 "中巴面临战事，大敌当前只能给与中巴政府一部分武器和资金，以期望政府军在不久的未来能够控制局部情况，等到共和国准备好军事力量，通过绝对的武力击溃中巴的其他势力。"
RSB_money_for_import:0 "资金换进口"
RSB_money_for_import_desc:0 "政府通过少量资金和武器，从中巴政府军仍然控制的区域之中换取大量廉价资源，来缓解国内工业资源的短缺，解决燃眉之急。"
RSB_saving_export:0 "挽救出口"
RSB_saving_export_desc:0 "中巴的崩溃导致出口产品产生了巨大冗余，为了卖出这部分产品，只能降低价格出售到联邦的其他国家和东巴去，为了让他们接受这样的贸易我们只能先打点一下关系。"
RSB_saving_export_tt:0 "§Y$RSB_financial_health_committe$§!追加效果:\n生活消费品系数:§Y-4.0%§!"
RSB_safe_now:0 "安全了？"
RSB_safe_now_desc:0 "§R上天啊，别再来了。§!"
RSB_end_of_world:0 "天崩地裂"
RSB_end_of_world_desc:0 "鲁萨尔的崩溃导致了联邦毁天灭地的连锁反应，政府会采取一切可采取的措施，尽可能的挽救经济，稳定经济，稳定民情，稳定一切能稳定的，一切为了稳定。"
RSB_burning_fire:0 "熊熊烈焰"
RSB_burning_fire_desc:0 "烈焰升腾，火焰吞噬一切，联邦和共和国的崩溃就像火焰一样，所过之处寸草不生一地狼藉，联邦的局势已经岌岌可危了，常规的手段完全失去了效果。"
RSB_barely_nothing:0 "杯水车薪"
RSB_barely_nothing_desc:0 "烈焰窜向天际，目力所及处处烈火焚天，尽管采取了所有能想到的方法，过去塑造的秩序正在顷颓，所作的努力都被困难吞噬，看来这次是真的要被问题给解决了。"
RSB_end_of_our_nation:0 "国将不国"
RSB_end_of_our_nation_desc:0 "旧秩序已经崩溃，新的秩序还未产生，在旧秩序的废墟上暗流涌动，所有的势力都蠢蠢欲动，正应证了那句话§t“天下大乱，形势大好！”§!"
RSB_emergency_law:0 "应急法案"
RSB_emergency_law_desc:0 "总统的意外离世，使得局势浮动人心思变，目前由总统之弟代行总统职务，这种情况明显违背了宪法，很显然这场意外导致了很严重的信任危机，沿海受灾省份对此反应尤为强烈，部分沿海省份官员开始公开拒绝承认现任政府的合法性。"
RSB_undercurrent_is_rising:0 "暗潮涌动"
RSB_undercurrent_is_rising_desc:0 "现任总统不合法的流程加剧了共和国现在的危机，危机影响到了政府合法性，据说普莱尔茨两省还受到了牛头人和赤匪的鼓动，掀起了大规模示威游行和罢工，现任政府乱作一团且开始下达前后不一致的命令，巨大的漩涡已经形成，万物开始沉浮不定。"
RSB_mobilize_cops:0 "动员警察"
RSB_mobilize_cops_desc:0 "为了应对可能面临的共和国分裂甚至内战危机，必需动员一些辅助部队派往前线维持战线。尽管按照规章来说派警察前往前线是不符合章程的，不过我们可以将其正规化。这样就可以名正言顺的将他们派往前线。"

