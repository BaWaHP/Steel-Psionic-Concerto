RSB.1.t:0 "1998财务预算最终方案"
RSB.1.d:0 "如果要说度弗道夫哪里最灯火通明，除去各大区的酒吧和歌舞厅以外，共和国总统府绝对榜上有名。自从世界大战结束以来，每一届共和国总统几乎都在总统府奋战整夜。当财政部长将新一年的财政提案交到总统面前时，已经一晚没睡的卡拉萨辛揉了揉眼睛，在看清数字之后，又抬头狠狠瞪了一眼财政部长：“你们是说今年的预算必须再次减少，避免资金链断裂的风险吗？财政部长先生。”\n\n“是的卡拉萨辛先生”，财政部长用手帕擦了擦脸上并不存在的汗，“共和国的信用评级已经岌岌可危了，连七河人都觉得我们几乎拿不出任何担保了，不愿意以可接受的条件给我们提供贷款。”说完，财政部长又扶了扶眼镜从一旁的秘书手中接过一份报告。\n\n“那……再怎么说也不能以去年的八成预算运行国家……怎么看都很勉强。”卡拉萨辛重新带好了眼镜，看着手里的财务报告，指节无意识的反复敲在桌面上。\n\n“总统先生你想的太过悲观了。”财政部长早有准备的将报告交到总统手上，“专家们刚刚在会议上一致认为共和国只要以自有资金坚持两年，就能摆脱负债运营的状态。” “真的……？”卡拉萨辛抿住了嘴唇，有些不太相信。但是眼前的报告上面对经济的规划又是那么让人信服。\n\n“无需多言了总统先生，签字吧。政府要相信经济学家的计算。”听了财政部长的话，卡拉萨辛放下了手里的报告，略带迟疑的签下了字。"
RSB.1.a:0 "批准执行"

RSB.2.t:0 "会面"
RSB.2.d:0 "今天的度弗道夫火车总站热闹非凡。不仅有本届共和国政府的高官们在一旁准备着什么，共和国的总统卡拉萨辛更是早早就来到火车站做准备。明眼人都看得出来，本届南巴政府对这次与中巴斯蒂亚联盟总统的会面有多重视。为了体现中巴与南巴地位上的“平等”，与中巴政治上的“独立”。本届政府可谓费尽心思。\n\n然而当中巴斯蒂亚联盟的总统特快专列，缓缓驶入度夫道夫火车总站的时候，出人意料的事情发生了：列车里只有一个人哆嗦着走下了列车，原本应该到来的中巴总统马图什卡以及他的使团此时全都消失不见了。\n\n现场的记者们一下就抓住了这次事件的爆点，开始疯狂抓拍卡拉萨辛总统和只有一人到来的“中巴使团”。四周的警察与国土防卫军很快便反应过来，开始驱散记者。这起到了作用：记者们没能拍下来总统破防的时刻。\n\n“伟大的马图什卡代表团？这么大阵仗就来了你一个，连他妈的总统都没有来？”一向温和的卡拉萨辛此刻已经被愤怒冲昏了头，他大声抓起那个人的衣领，大声的咆哮着。\n\n“马图施卡先生说了，中巴的情况无需多虑，如果……”此时被总统抓住衣领的倒霉蛋已经双腿发软，从他嘴里说出来的话也越来越小声。\n\n“那个天杀的酒鬼说了什么？快他妈告诉我，亲爱的代表先生！”而从这个可怜的代表嘴里说出的话，让卡拉萨辛觉得，从总统的位置上退下来可能是最好的选择：“总统先生说如果能够得到一些资金，用来封上反对派的嘴，那就更好了。”"
RSB.2.a:0 "叫他带着他的钱滚...”"

RSB.3.t:0 "离席"
RSB.3.d:0 "在最后一批宾客向外走时，总统便疾速走向了准备离席的国防部长萨特兰提，而眼见着总统走来。萨特兰提却并未停下自己的脚步，直到被卡拉萨辛拉住臂膀，国防部长半不情愿半无奈的问道：“总统阁下有何吩咐？“\n\n“部长先生，请你理解政府的难处，我刚刚会上说的是极端情况的采取的措施，并没有冒犯国防部的意思。”总统凑近部长耳边小声解释着。萨特兰提趁总统先生不注意不动声色的将臂膀抽了回来：“是，当然总统阁下，我从来都没有这样想过，你也是为了共和国嘛毕竟。”在敷衍完总统后萨特兰提抬腿就要往门外迈。\n\n而这时总统再一次拉住了国防部长的臂膀：“请您谅解一下吧，我在台上的发言绝非我的本意，只要有机会我一定会给将士们提高待遇薪资的。”听出总统话语中流露出的一丝哀求，萨特兰提犹豫了两秒，伸出胳膊来与总统紧紧的握了握手，轻声的说了一声：“我明白了。”便率先走出了会议室，留总统一人在那不知沉思些什么。"
RSB.3.a:0 "萨特兰提掸了掸手套上的灰尘，加快了脚步"
RSB.3.tt:0 "§Y$RSB_financial_health_committe$§!追加效果:\n政治点数:§R-3.00%§!"

RSB.4.t:0 "选择"
RSB.4.d:0 "难得一个清闲的早上，卡拉萨辛倚在办公椅上作沉思状，心情不错的向窗外看去。外人看到这般状态的总统可能以为他是在思虑什么国家大事，但实际上他只是在想昨晚的那道菌菇浓汤还不错。而不合时宜的“笃——笃”声却传到了他的耳边，在微叹了口气后他朗声道：“请进。”随着“吱呀”的一声，总统的秘书带着三个形态各异的人踏入了办公室：“总统先生，我来为您介绍一下——”\n\n“这位是路德·卡普里维先生...”总统看向了这个魁梧又异常张扬的男人，而路德·卡普里维也适当的摘下帽子对着总统阁下摆出一幅笑脸。是铁路贵族世家卡普里维家的人——总统的脑海中挤出了这句话，随之两人的手便紧紧握在了一起。\n\n在两人握完手后，秘书又适当的介绍起下一个人：“这位是雷斯科里恩...”刚听到这个姓氏总统额头的青筋就一抽一抽的：鲁萨尔千年大贵族，虽然自从大革命后就基本没和原籍地有什么关联了。本着一视同仁的原则，总统强忍着头疼微笑着与面前这个精干古板的中年男子握了握手。\n\n“最后是麦西亚·赛琳教授。”总统在听到这个名字后立刻忘掉了前面的不愉快，凝视着面前这个同样在打量自己的女士：瘦高的身材配合着花白的发色一眼就带给人一种刻薄的感觉，但她身上自信的气势却又是最浓烈的。玛丽亚·佩蒂特的老师，虽然不是她的导师...总统不禁怔怔出神。直到被秘书问道：“总统先生，是时候做出抉择了。”"
RSB.4.a:0 "路德"
RSB.4.a.tt:0 "§Y$RSB_financial_health_committe$§!追加效果:\n建造速度:§G+5.00%§!"
RSB.4.b:0 "雷斯科里恩"
RSB.4.b.tt:0 "§Y$RSB_financial_health_committe$§!追加效果:\n稳定度:§G+8.00%§!"
RSB.4.c:0 "麦西亚"
RSB.4.c.tt:0 "§Y$RSB_financial_health_committe$§!追加效果:\n科研速度:§G+10.00%§!\n生活消费品系数：§Y+8.0%§!"

RSB.5.t:0 "通话"
RSB.5.d:0 "“马图什卡，你到底在耍什么幺蛾子？！”卡拉萨辛的鼻子都快被气歪了，“中巴需要稳定！不要在同一时间段一次又一次的升级事端！”在电话对面传出声音后总统怒吼的声音更大了：“什么叫尽量快？你早该安抚民众的！到这份上你还管我要援助？！”\n\n在话筒又传来几句后卡拉萨辛的情绪稳定了一点，他粗暴的喝了口桌边早已凉掉的咖啡脸上的线条又开始扭曲：“这最好是最后一次，我警告你，你现在不止是在挑战我的底线，赞助中巴政府的财团们最近也在向我反映担忧中巴的境况。”\n\n听着话筒里传来奉承的话语，卡拉萨辛脸上扭曲的线条渐渐恢复了回来，他嗤笑了一声：“得了吧，南巴还不知道你跟你的那群幕僚是什么样子？你们最好真的能掌控中巴的状态，不然的话可能就不只是我跟你打电话这么轻松了。”"
RSB.5.a:0 "“记住，没有下次了。”"

RSB.6.t:0 "谈判"
RSB.6.d:0 "“大使先生，我想这是解决群岛问题的最好方法了。”在总统府的外务室里，南巴共和国的外长正试图说服他对面沙发上的墨精灵。但对面只是淡淡的弹了一下烟灰，并没有表明什么态度。“贪得无厌的杂种。”外长暗骂了一声，又给墨精灵提出了一份议案：“总统先生吩咐过，联邦所属的战争军火库可以供贵方任意使用，贵方也可以在联邦区域内征募志愿者以介入群岛局势，只是……我们需要一些回报。”\n\n“外长先生。”沙发上的墨精灵终于开口了，“贵方的提案确实不错，但目前本土的资金颇为紧张，实在是很难下批啊。不过董事会授权我，可以提前返还一些贵方的抵押物以及提供一些实体资产。”墨精灵说着，将手中的烟头掐灭。坐起身来看着外长。\n\n看着突然有了正型的七河大使，外长不由得松了一口气，看起来群岛公司的乱局确实对七河联邦产生了影响。不然以这帮墨精灵杂种的性子，你说十句话他们能接你一句都算好的。不过，他们依然不愿意直接提供资金援助，这到底是为什么？还是上报给总统阁下，让他定夺吧。\n\n外长这么想着，随即给七河大使露出了一个微笑：“那，我这里还有总统先生提出的几份建议，希望您能够转交。”"
RSB.6.a:0 "事到如今他们还是不愿意给钱？"

RSB.7.t:0 "对价"
RSB.7.d:0 "南巴方面已经就群岛局势问题与我们举行了新的会谈。出于群岛公司丰厚的资源以及提供的免费劳动力，我们试图进一步获取南巴的支持。但天下没有免费的午餐，那些窝囊了许久的南巴高层们终于借着这次机会在我们面前硬气了一次。\n\n南巴方面表示如果想要取得他们对群岛问题进一步支持的话，我们要将十几年前割据的条约港归还于他们。而如果想获得南巴方面的全力支持，则我们还要付出比利扎自治的代价。\n\n群岛公司究极值得我们为此付出如此代价吗？还是我们可以在踢开南巴人的情况依靠自己稳住群岛局势呢？这可能需要我们仔细考虑考虑了..."
RSB.7.a:0 "没有这些南巴人我们一样能做到！"
RSB.7.b:0 "条约港他们想要就给他们吧"
RSB.7.c:0 "如果能够稳住群岛公司的局势..."

RSB.8.t:0 "关门大吉"
RSB.8.d:0 "在共和大道上的一个小面馆里，赫伯特正坐在面馆门前的椅子上看着天空。时值五月，但天气却不像往年一样温热，反而带着一丝寒意。太阳躲在云层后，散发出微弱的光芒。又是一天黄昏，又是几乎没有生意的一天。赫伯特看着加税的通知单，又看向自己身后面馆的招牌。\n\n这是他父亲开的面馆，自他有记忆起，他就在这个小面馆里。就算地方不大，但是食客们吃面的声音，母亲叫自己别乱跑的指责声，以及父亲在厨房下面条时发出的咕噜咕噜声构成了他童年的记忆。后来父亲去世，他接手了这个小面馆。虽然生意不及父亲在世时，但也算是马马虎虎。\n\n他甚至想过自己也会有个孩子，就像他一样，在这个面馆里长大，又在这个面馆里过完平淡的一生。但越来越少的顾客和政府的加税单让他逐渐力不从心。他问过那些老主顾，是他的味道做的不像父亲，还是他们已经吃腻了。但得到的结果只有一个：没钱。整条共和大道上的店铺都在亏损。在世界大战之前，这里是共和国首都最好的旅游地之一。但在世界大战之后，这里已经逐渐荒凉，往日不在了。\n\n从回忆中醒来，赫伯特最后看了一眼手中的税单。随后他默默的拉下了面馆的铁栏门。在上面贴上了一句话："
RSB.8.a:0 "旺铺转租，有意者可联系店主，联系方式....."

RSB.9.t:0 "最后的晚餐"
RSB.9.d:0 "威廉无论如何也没想到自己会被裁员。这和当初考试的时候说的不一样啊！当初明明再三保证这是一份铁饭碗，只要自己为了考上付出一点“小”代价。不过代价也确实挺小的，也就是浪费了两年多的时间加上给考官送了一份大礼罢了。对于仍然在享受着公务员福利的威廉来说，这些都是必要的牺牲。\n\n但是现在不一样了，自己被裁员了。那付出了这么多的自己就像一个傻逼一样，被共和国和高层官僚们骗的家底都不剩了。心烦意乱的威廉在回到自己的住处后，也没了往日哼着小曲做饭的心情。索性直接去外面吃一口。\n\n等威廉来到那个熟悉的面馆门前，映入眼帘的是紧闭的卷帘门和旺铺转租的告示。合计着有人比他更早失业了。“妈的，连一口饭都吃不上了吗。”威廉在心里骂道。没有办法的他只好随便找了一个路边的小摊点了一盘面条。这小摊的厨艺非常一般，面条煮的硬，酱汁也没滋味。\n\n不知为何，他越吃越觉得这盘面就像是自己一样。逐渐变得僵硬，逐渐失去了滋味...想到这的威廉将叉子狠狠的甩在桌子上，迎着老板困惑不解的目光向家里跑去——"
RSB.9.a:0 "看起来，苦日子就要来了"
RSB.9.a.tt:0 "§Y$RSB_financial_health_committe$§!追加效果:\n政治点数获得:§G+5.00%§!\n生活消费品系数：§Y-5.0%§!"

RSB.10.t:0 "遣散费"
RSB.10.d:0 "梅得斯今天很高兴。作为一个在南巴驻外军团里服役了十年的老兵，今天他终于可以回家了。上头的命令已经下来，即使他已经不是一个基层士兵，而是管理着一个小队的军官，但浓烈的思乡之情还是让他现在就立刻回到家中。对了，自己服役了十年，遣散费应该也有不少，能够补贴家用。\n\n他都看到了，他的长官，那个经常拿鞭子抽他的大帽子长官。那个从南巴来的传令官付给了他一大笔钱。还说这只是回国的薪资涨幅，具体的薪资还在后面。都说长官吃肉手下喝汤，长官吃了这么一块大肉，那他也得喝一大口汤才对。\n\n梅得斯就这样，抱着对未来的希望，对人生的展望来到了军需处。他还想过，他回到老家要开一家餐馆，对，一家餐馆。军营里的人都说他做的饭好吃...“下一位。”军需处长官的声音把他从幻想中拉了回来，他走上前去，长官拿出几张钞票递给了他，“梅得斯上士，这是你的遣散费。”\n\n什么？就这么点？这是旅费？不对，不对，就算是旅费这也太少了。他看着这几张钞票，可能也就够买一张返回南巴本土的车票。“我说，长官。这，这是，是不是，哪里弄错...”“没有弄错，这就是你的遣散费，你要不要？不要就滚蛋。”长官无情的话语彻底击溃了梅得斯。他失魂落魄的接过那几张钞票，脑中构想的未来一下子碎了一地。他幻想过荣归故里，但现实里，他马上就要像一条狗一样灰溜溜的回到自己的家乡了。"
RSB.10.a:0 "共和国社稷永昌"

RSB.11.t:0 "欲哭无泪"
RSB.11.d:0 "亚历克斯医生冷峻的划写着一张病历单，令他感到意外的是，有一个女人跳过了预约直接抱着孩子闯进了他的会诊室。这个脸色苍白的女人哆哆嗦嗦地将孩子的病症告知了亚历克斯，虽然不知她是怎么避开门卫进来的，但出于医生的职业素养他还是瞥了瞥孩子的情况：情况相对不严重，但是需要药物治疗。\n\n将情况告之女人后，亚历克斯医生继续在病历单上奋笔疾书。过了多时他才发现那个女人还像泥塑般呆立在那，一动不动。”您还有什么疑惑吗？“亚历克斯医生皱着眉问”您该去拿药了，不然的话孩子的情况会越来越严重的。“而紧接着他就看到了这个女人眼角淌出了一行浑浊的红色液体。\n\n这是典型的毛细血管爆裂，医生惊得站了起来：“这是怎么了，孩子只要吃了药就...”迎接他的是女人崩溃的大哭，他则手足无措的站在一旁不知如何。在女人抽抽嗒嗒的话语中他拼得了她的经历：这已经是她跑的第四家医院了，每一家医生都开出了这种药物，但她家微薄的薪资根本负担不起这种药物，而第二家医院的医生还颇为遗憾的告诉她，早来一个星期的话，这种药物还有政府补贴，会便宜的很多。\n\n会诊室闹出了这么大动静自然瞒不住，在门卫又推又搡的把那女人赶走后，亚历克斯医生麻木的向苦着脸的门卫表示自己不会向院长告状。他又拿起自己的病历单开始划写。\n\n......\n\n在第二天，亚历克斯医生一边吃早饭一边看着早报，看到一条新闻后手禁不住抖动了一下。"
RSB.11.a:0 "角落里报道了一名母亲因孩子病死而自杀"

RSB.12.t:0 "南巴斯蒂亚的援助"
RSB.12.d:0 "共和国的局势已不容乐观，时机稍纵即逝，一旦开战就可能面临双线作战的险境。\n\n幸好我们还有来自后方南巴斯蒂亚联邦的援助，并且南巴联邦的地位也需要我们的支持，他们不可能轻易撤回援助承诺。\n\n让我们看看这次能收获什么武器.....？"
RSB.12.a:0 "我操你妈，南巴佬！"
RSB.12.a.tt:0 "§C南巴来电：军备匮乏，竭尽诚意！§!"

RSB.50.t:0 "加急电报"
RSB.50.d:0 "QS3525 CBL 20/7 31 1700\n\nCTIDC RSB\n\n分裂势力发动起义，军警大批倒戈，镇压失败。目前局势已不可控。\n\n政府领导人失踪，政府已失去对大部分地区的控制，首都仍在控制中。\n\n请指示。\n\nCTIDC RSB 100 1100X20 1250 587"
RSB.50.a:0 "全完了。"

RSB.51.t:0 "徒劳无功"
RSB.51.d:0 "当清晨的第一缕阳光照在卡拉萨辛的脸庞上时，这位总统才发现，自己已经一夜未眠了。不过这也是没办法的事情，他要处理的事情实在是太多了。共和国的脆弱的经济就像一根尖刺一样扎在这届政府的心脏上。如果不能挽救的话，无论是他，还是他的政党都将成为南巴历史的罪人。\n\n想到这，卡拉萨辛不禁叹了口气。他站起身揉了揉因为一夜未眠而发酸的眼睛，看向中巴领导人发来的电报。电报上的内容很简单，这位领导人向他保证中巴斯蒂亚联盟不会出现任何问题。只要南巴方面的资金能够准时到账，他有十足的把握重新盘活中巴联盟的经济，进而给南巴的经济打上一剂强心针。卡拉萨辛看着这封电报，虽然他对中巴领导人的能力抱有极大的怀疑。但事到如今，他只能祈祷这位自大的领导人能够遵守他的承诺。\n\n“总统先生，您需要看看这个。”卡拉萨辛抬头看去，他的秘书正一脸严肃的拿着一封电报走过来。“念吧。”卡拉萨辛说着，一边坐回了办公椅上，开始处理起今天的政务。不过他的秘书却迟迟没有发出声音。“怎么回事？你今天嗓子不舒服？”卡拉萨辛皱着眉头看向秘书，“不...不是的，总统先生。”秘书一脸为难的说道。“算了。”卡拉萨辛叹了口气，“拿过来，我看看吧。”\n\n秘书将电报放在卡拉萨辛面前，而他只看了第一眼便“哗”的一声站了起来。他不敢置信的看着这封电报上的每一个字，生怕看错了一个。然而当他确认了每一个字都准确无误之后，他就像失去了所有的力气一样跌回了办公椅上。他努力睁大着双眼，试图保持冷静。但说出来的话语却不住的带上了颤音——"
RSB.51.a:0 "“叫，叫内阁进来”"

RSB.100.t:0 "剧变将临"
RSB.100.d:0 "卡拉辛萨看着面前情报部门递交的一份报告，面色十分难看。鲁萨尔的情况比他预想的还要糟糕：内部工人游行声势一波大过一波，反对党派们带来的压力甚至逼得现任总统采取政治贿选的方式以谋继任。\n\n而最为重要的是，情报部门负责人在报告中含糊不清的特意标记了一段内容。这段内容包含了中巴和鲁萨尔的经济交流，以及好几份鲁萨尔财政部长与各大公司私下谈判的证据。\n\n他头疼的揉了揉自己的眉头，尽管现在还看不清鲁萨尔这一团迷雾中的真相，但强烈的第六感在剧烈的警示他：\n\n不对，这一切都不对劲。\n\n趁双手按压太阳穴的空隙，卡拉辛萨仔细回想了近年鲁萨尔的经济情况和其与南巴愈发渐行渐远的外交姿态……\n\n该不会…\n\n他猛然抬眸，一个不可思议的想法在他心头久久环绕。\n\n而这时，一阵急促的电话铃声响彻办公室内，卡拉辛萨按下不安的心情抬手接起电话：\n\n“喂？什么？！鲁萨尔股市波动剧烈？市场信心彻底崩盘？？？”\n\n卡拉辛萨旋即便是一顿天旋地转，他难以置信的看着手中的电话，好像他此生从未见过如此奇异难得之物。\n\n然后电话那头的人就听到了总统阁下自任期以来从未有过的失态："
RSB.100.a:0 "“狗娘养的鲁萨尔人，他们真他妈敢提前预支分红？！”"

RSB.200.t:0 "政府士气危机"
RSB.200.d:0 "由于我们的民意调查显示我们正在逐渐变成不被欢迎的政府，这导致了政府人员对目前政策的质疑，同时我们的政治盟友乃至于党内其他人也开始在思考领导人的执政能力。如果我们不做点什么的话，这将会打击到政府内部的团结。"
RSB.200.a:0 "给予他们承诺与金钱"
RSB.200.b:0 "对此我们无能为力"

RSB.201.t:0 "民众投诉问题"
RSB.201.d:0 "由于我们政府内的分歧越来越大，这影响到了我们政府的运转，进而导致腐败和民众的投诉。这影响到了我们在民众中的形象，如果我们不能及时制止这些问题的发展，这将会为反对派提供攻击我们的理由。"
RSB.201.a:0 "发放奖励并且对部分人员进行惩罚"
RSB.201.b:0 "随他们去吧，我坚持我的立场"

RSB.500.t:0 "总统意外去世"
RSB.500.d:0 "总统意外去世"
RSB.500.a:0 "总统意外去世"

RSB.501.t:0 "冲突升级"
RSB.501.d:0 "选举、福利、失业、金融危机等成为了民族主义的温床，最终在东部发酵为了复兴党的叛乱活动。佩蒂特女士拒绝承认这次国民议会选举，认为只要二院存在就不可能让国民议会真正体现民众的意愿，随后在玛丽安施塔特宣布成立了东部国民联盟，她发誓要纠正第二次民主化运动乃至共和革命以来的错误，创造一个没有阶级仇恨、没有内部矛盾的新南巴斯蒂亚。东部的一部分驻军和地方政府已经宣布加入东部国民联盟，一切如同共和革命末期东部共和军组建第二共和国一样。"
RSB.501.a:0 "进军首都，他们疯了？"
RSB.501.b:0 "为了南巴复兴！"

RSB.502.t:0 "代理总统下台，紧急状态委员会成立"
RSB.502.d:0 ""
RSB.502.a:0 "啊，嗯，嘛"

RSB.503.t:0 "南卡普里维区政府崩溃"
RSB.503.d:0 "南卡普里维地区作为1976年第二公社起义后依旧有左翼革命派活跃的地区之一，最终在各地局势混乱的情况下爆发了又一场左翼革命。这些左翼革命者宣布他们将会为1911年第一公社和1976年第二公社的死难者报仇，南卡普里维区政府大部分人员早已逃之夭夭。在短暂的无政府状态后，南卡普里维陷入这群左翼恐怖分子手中。面对如今民族主义者更多的南巴斯蒂亚共和国，不少人对这群人的未来感到堪忧。"
RSB.503.a:0 "又一次公社起义？"
RSB.503.b:0 "公社不死，革命万岁！"

RSB.504.t:0 "弹劾"
RSB.504.d:0 "前总统的弟弟突然代理总统职务，显然党派为了其利益违背了宪法精神，公民党为了自己集团少部分人·的利益已经将这种毫无合法性的行为摆上了台面，面对这种情况自然不会是所有人都视若不见，甚至有弹劾在新总统宣职就任之前就递送到议会。新任总统就职后立即宣布国家陷入紧急情况，强行下令军队关闭议会，在命令下达后首都立即就发生了大规模的抗议，示威游行者不计其数。政府一方面武力镇压，一边调动部分军队入住度夫道夫稳定局势，同时挪用部分赈灾资金安抚首都群众。此举立即点燃全国局势，沿海省份议会对中央决议感到了出离的愤怒。南部沿海驻军的调动也导致了部分权力的真空。"
RSB.504.a:0 "朝不保夕，遑论未来"

RSB.505.t:0 "调动"
RSB.505.d:0 "“快通知南部驻军调头回去，首都的情况还能勉强，南部这些挨千刀的政客在军队刚走后就想掀起波浪。”拉孔尔政府显然没有意识到随意调动驻军会导致这样重大的事故，首都的游行声势十分的浩大，但是持续时间却没有很长，烈度完全可控。显然这是障眼法，拉孔尔虽然能够预料到这种结果，但他却不能拿首都官僚群体的性命去赌。\n\n“总统先生在军队下达调令之后，以玛丽安施塔特为核心的南部沿海城市，大学学生被全部动员起来了，数量庞大的学生被组织起来处理水灾，但由于被组织人数太多了，学生接管了城市政府，之后海岸警卫队和警察也被要求配合工作被接管了。”秘书在一旁向总统汇报，秘书憔悴的状态，让总统意识到自己也被困在总统府中多时了。“这里的学生让我们寸步难行，那里的学生却在抗灾，那个姑娘不简单。”总统看着周围几小时前才被疏通的街垒，摇了摇头继续说“很早就接到了佩蒂特在共和国学生联合会有很高的威望，虽然她在首都的组织被取缔，但自从她回到玛丽安施塔特之后，玛丽安施塔特地方政府就有意包庇她，她借此机会把整个共和国东部的学生联合会蛊惑了。现在看来她在首都也有不少支持者，有机会再敦促萨特兰提部长传下达管学生联合会的指示，并且请他来见我。”"
RSB.505.a:0 "“属下这就去办。”"

RSB.506.t:0 "摊牌"
RSB.506.d:0 "“什么你说萨瓦尔那个天杀的畜生跑到巴亚穆去了？盗用了萨特兰提的指令。这一家子没有一个好东西！”刚刚听到汇报的总统一下子跳了起来，抓起了身边的镇纸就就丢向了门口的秘书，吓的秘书迅速的躲向了一边，总统仍然觉得不解气顺手抓起了一大堆文件再次向门口丢去。“畜生，畜生！”拉孔尔沮丧的坐下，痛苦的揪起了自己的头发把头贴紧桌子。“听听他都说了什么。”“总统大人部长先生说他的军中揭不开锅军队不肯和他走。“”混蛋，这个时刻还不忘了发一笔国难财。”总统将手伸向一边，很显然这次他没有什么可丢的东西了。“总统先生，您的回复是？”"
RSB.506.a:0 "一分钱也没有，叫他滚。"
RSB.506.b:0 "最后的预算了"
RSB.506.b.tt:0 "§R（目前无效果，不要点）§!"

RSB.507.t:0 "种子"
RSB.507.d:0 "“阿德里安司令，萨特兰提那个贱货侄子仍然没有做出答复，他的军队也隔绝了玛丽安施塔特和度夫道夫，政府防务全靠你了。”拉孔尔总统微微俯下身子靠近了办公桌前的阿德里安，阿德里安点了点头又摇了摇头，“全国都有部分军队向南部违规流程向南部城市移动，目前手头军队不够，得再补充一些防守性的部队。”“那就动员全国的警察，让他们防守自己的城市。”拉孔尔提议道，“还有一件事总统先生。”“您说“拉孔尔立即给出了答复，”如果说，我是说如果说战争不可避免，请你签署总统令。由军队接管政府，政府任然由你运行但是军队得掌握资源的支配权。“说完阿德里安掏出一份文件要求总统签字，“这不合适吧，阿德里安司令。”总统后退了一步显然还想辩解，阿德里安抓住了他的胳膊。"
RSB.507.a:0 "一切因何而起，请回答我总统先生。"

RSB.508.t:0 "异样宁静"
RSB.508.d:0 "边境上阳光明媚，空气清新，鸟儿鸣叫，野兽奔走，生机勃勃，万物竞发。"
RSB.508.a:0 "总统先生，他们要来了"

RSBNews.1.t:0 "南巴斯蒂亚陷入内战！"
RSBNews.1.d:0 "紧张的对峙在南巴斯蒂亚已经持续了一段时间，但令人遗憾的是南巴政府没能有效阻止复兴党的叛乱——或者称之为东部国民联盟更为合适。双方的冲突从克制到愈演愈烈，直至真正的战争拉开了帷幕。据东部难民所称，双方已经开始激烈的争夺某些具有战略价值的城市或地点。\n\n更有力的证明则是度夫道夫方面宣布成立紧急状态委员会，并指责东部国民联盟的叛国行径，而东部国民联盟给予的回应则是进一步沉默的向度夫道夫进军。而在双方正式交火前，南卡普里维——这一直拥有浓厚革命传统的地区，在国家陷入混乱后区政府很快就进入了瘫痪状态，这使得很多左派份子趁机攫取了政府亦或地方的控制权。在双方正式交火之际，由左派份子控制的区政府正式宣布成立南卡普里公社并宣告自卫。\n\n显而易见，南巴斯蒂亚共和国已经彻底陷入战火。"
RSBNews.1.a:0 "那联邦该怎么办？"
RSBNews.1.b:0 "又一场炼狱"
RSBNews.1.c:0 "天怜吾等"

###决议###
RSB_federal_war_arsenal:0 "联邦战争军火库"
RSB_federal_war_arsenal_desc:0 "在南巴斯蒂亚这片命途多舛的土地上，经历了无数次的战争，可以说这片土地是由鲜血和钢铁浇灌的。在历次大型战役中都生产了巨量的武器设备，有些甚至保存至今。在我们需要的时候，我们可以从军火库中提取武器来武装自己。不过这些可以被称之为“老古董”的军火的实际作战能力，可能要打一个问号了。同时，长期被封存的军火也面临着缺乏维护的问题。\n\n§C伟大战争军火库：§!\n§Y步兵装备§!剩余：[?RSB.RSB_gw_arsenal_infantry_equipment|Y]    §R每周衰减：§!§Y50§!\n§Y步兵装具§!剩余：[?RSB.RSB_gw_arsenal_uniform_equipment|Y]    §R每周衰减：§!§Y50§!\n§Y火炮§!剩余：[?RSB.RSB_gw_arsenal_artillery_equipment|Y]    §R每周衰减：§!§Y50§!\n§Y游侠级泰坦§!剩余：[?RSB.RSB_gw_arsenal_titan_equipment|Y]    §R每周衰减：§!§Y10§!\n\n§C世界大战军火库：§!\n§Y步兵装备§!剩余：[?RSB.RSB_ww_arsenal_infantry_equipment|Y]    §R每周衰减：§!§Y15§!\n§Y步兵装具§!剩余：[?RSB.RSB_ww_arsenal_uniform_equipment|Y]    §R每周衰减：§!§Y15§!\n§Y火炮§!剩余：[?RSB.RSB_ww_arsenal_artillery|Y]    §R每周衰减：§!§Y10§!\n§Y反坦克炮§!剩余：[?RSB.RSB_ww_arsenal_anti_tank|Y]    §R每周衰减：§!§Y5§!\n§Y轻型坦克§!剩余：[?RSB.RSB_ww_arsenal_light_tank|Y]    §R每周衰减：§!§Y5§!\n§Y中型坦克§!剩余：[?RSB.RSB_ww_arsenal_medium_tank|Y]    §R每周衰减：§!§Y5§!\n§Y小型战斗机§!剩余：[?RSB.RSB_ww_arsenal_light_fighter|Y]    §R每周衰减：§!§Y5§!\n§Y天图级泰坦§!剩余：[?RSB.RSB_ww_arsenal_medium_titan|Y]    §R每周衰减：§!§Y5§!\n"

