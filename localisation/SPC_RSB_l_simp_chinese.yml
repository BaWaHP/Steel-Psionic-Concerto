RSB_politic_sit:0 "政治状况"
RSB_politic_sit_desc:0 "世界大战的战败和1976年第二次公社起义的失败彻底改变了自《1913年宪法》后的南巴共和国政局，通过艾库瑞尔·雷蒙的强势手腕才让中左联合政府还没有彻底倒台。随着人类至上主义的兴起和左翼革命思潮的回升，政府已经无法像之前那样控制民众。南巴共和国政府必须做点什么才可以稳定住目前混乱的政局。\n\n政府：威望：[?RSB_politic_sit_prestige] 凝聚力：[?RSB_politic_sit_unity]\n政治丑闻：[?RSB_politic_sit_scandal]\n地方政党联盟：[GET_RSB_politic_sit_local_party_trust]\n\n[GET_RSB_politic_sit_desc]"

RSB_politic_sit_desc_0:0 ""
RSB_politic_sit_desc_1:0 "首先，政府必须先确保§R威望§!不会低于50，因为威望代表的是政府在民间的受欢迎程度。其次，政府还必须确保§R凝聚力§!不会低于50，凝聚力代表政府内公务员的工作效率和各部门的协作程度，特别是执政党无法完全控制政府的情况下更加重要。同时，政府还得保证§R政治丑闻§!的数量小于5，不然反对派会借此在宣传上占据上风。\n\n最后，由于历史上南巴斯蒂亚共和国最初是由北普莱尔茨、南普莱尔茨、帕尔腾、乌勒保特、黑泽什这五个地区组成的，因此这五个区被允许组建区议会和自己的区政府，同时在国民议会里可以由区议会决定二院的人选。因此，代表着这五个地区的§R地方政党联盟§!长期占据国民议会里的四分之一的席位，政府与他们的关系如何将会影响到政府的行政，乃至于地方的经济。除非宣布国民议会制度改革或者摧毁他们，不然政府就必须和他们打好关系了。"

