###民族精神###
DMT_humble:0 "谦逊"
DMT_humble_desc:0 "“因为那至高至上、永远长存、无以言明的存在的如此说：‘我住在至高至圣的所在，也与心灵痛悔、谦卑的人同居；要使谦卑人的灵苏醒，也使痛悔人的心苏醒。”——《圣箴录》57:15\n\n作为三大骑士团里最不起眼的骑士团，德谬蒂克骑士团正如他们的信条一样谦逊。德谬蒂克骑士团的辖区是三大骑士团里最不像骑士团辖区的地方，似乎这些骑士依然坚守着不入凡世的古老信条。不过，德谬蒂克骑士团却是和辖区民众关系最好的一个骑士团。就像接触过他们的人所说的那样：他们身上的谦逊让他们看起来就是一个普通人，和他们相处起来会感到一种莫名的和谐与放松。如果说奥普菲尔骑士团在辖区内实践“服务于民”，艾勒骑士团为了荣誉将辖区当成了一个巨大的征兵营，那德谬蒂克骑士团的辖区就是最轻松和与世无争的辖区。但是内战的到来打破了这一切。为了保证辖区的安全与不被共和国司令部与独立同盟撤销，这些谦逊的骑士再次拿起了武器。只不过随着内战的激烈化与死亡人数的增加，§g骑士们还能一如既往的坚守那中庸的谦逊之道吗§!？"

