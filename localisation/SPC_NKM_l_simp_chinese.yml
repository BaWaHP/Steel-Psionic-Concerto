###事件###
NKM.1.t:0 "一地鸡毛"
NKM.1.d:0 "神乐城天守阁的最高层，空气凝滞得如同陈年的米糊。神乐宗胜背对着拉门，枯瘦的手指深深陷进紫檀木椅的扶手，指甲边缘因用力而泛白。窗外，铅灰色的云层沉沉地压着神乐湾，连海鸟都销声匿迹，只有风穿过檐角时发出呜咽般的低鸣。\n\n矮几上，文书堆积如山，像一座座随时会崩塌的小丘。最上面一份是龙之氏族的快马急报，硬质和纸的边角被粗暴地卷起，封蜡碎裂，露出里面锋芒毕露的字迹——“…联军转战异境，死伤枕藉，所耗粮秣军资，十去其七，未得寸土之利…望幕府体恤藩情，速拨补偿金二十万圆，并减免三年年贡，以安将士之心，慰亡者之灵…”字里行间透出的不再是请愿，而是冰冷的通牒。\n\n旁边是北境虎之氏族使者送来的“陈情表”，措辞恭谨，却字字诛心。奏疏的核心意思只有一个：为抵御可能来自北方的“不测”，请求幕府特许松前藩组建常备海防队，并享有除外交、铸币外的一切自治权。宗胜甚至能想象出松前家那个鹰钩鼻家老递上文书时，嘴角那抹转瞬即逝的讥诮。\n\n“砰！”\n\n一声闷响，是内室传来的。宗胜眼皮都没抬。那是他最心爱的那个从巴斯蒂亚进口的座钟，镀金的表面蒙了层薄灰，曾经清脆的报时声早已变得沙哑迟滞。今天，它彻底停了。发条似乎走到了尽头，连那苟延残喘的滴答声也消失了。室内只剩下死寂，以及他胸腔里沉重而缓慢的心跳。\n\n一名近侍几乎匍匐着进来，将一份新的文书高举过头顶，放在那“山丘”的最顶端。纸张粗糙，带着一股硝烟和血腥混合的、令人作呕的甜腻气味。是来自内陆山区的军报。\n\n“禀将军大人…三日前，革命军残部于赤石峡谷伏击了运往甲府的三千石军粮…押送旗本队…全军覆没。粮车…尽毁。”近侍的声音抖得像秋风里的枯叶。\n\n宗胜的喉结滚动了一下，没有出声。视线扫过那份军报，上面用朱砂潦草批注的“急”字，红得刺眼，像一道新鲜的伤口。他甚至懒得去想象甲府驻军因缺粮而可能爆发的哗变。坏消息太多了，多到已经麻木。\n\n然而，这麻木被下一阵隐约的声浪刺破。声音从遥远的城下町传来，起初模糊，渐渐汇聚成一股沉闷的、持续不断的嗡鸣。不是欢呼，也不是哀嚎，是数百人压抑着愤怒的低语、口号，以及脚步踏在石板路上的杂乱回响。这声音穿透了厚重的城墙和紧闭的窗棂，顽固地钻进他的耳朵。\n\n市民。那些靠着引进的纺织机器、靠着港口贸易发了点小财的町人、工匠。他们不再满足于幕府老爷们施舍的残羹冷炙。他们要求开设议会，要求废除那些阻碍他们买卖土地、阻碍他们获得更大利润的“陈规陋习”。他们的声音，此刻正汇聚成一股无法忽视的洪流，拍打着幕府摇摇欲坠的堤坝。\n\n神乐宗胜缓缓地、极其缓慢地闭上了眼睛。椅背上冰冷的雕花透过薄薄的丝绸衣料，硌着他的脊骨。鼻腔里充斥着紫檀木沉郁的香气、纸张的霉味、军报上那若有若无的血腥气，还有窗外海风带来的、挥之不去的咸腥铁锈味——那是港口里，那些耗资巨万从奥罗日亚买来、却因缺煤和缺乏合格水兵而常年趴在码头生锈的“铁甲舰”散发的气息。\n\n威严？补偿？自治？军粮？议会？\n\n这些词像无数只嗡嗡作响的毒蜂，在他疲惫不堪的脑海里疯狂冲撞。他握紧扶手的手，指节因为过度用力而失去了血色，显得更加枯槁。岛津的狮子大开口，松前的趁火打劫，革命军在山沟里的獠牙，市民在城下的声浪…还有那该死的、停摆的座钟，仿佛都在无声地嘲笑着他，嘲笑着这个坐在天守阁最高处，却连脚下的土地都在分崩离析的将军。\n\n窗外，第一滴冰冷的雨点终于砸在窗棂上，留下一个浑浊的水渍，很快被更多的雨点覆盖。雨声渐起，却盖不住城下町那持续不断的、令人心悸的嗡鸣。他依旧闭着眼，仿佛这黑暗能隔绝一切。但那些坏消息，那些要求，那些失败和背叛的气息，早已弥漫在这间象征着最高权力的房间里，无孔不入，沉重得让他几乎无法呼吸。"
NKM.1.a:0 "一地鸡毛"

