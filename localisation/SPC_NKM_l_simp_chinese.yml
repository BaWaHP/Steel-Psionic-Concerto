###民族精神###
NKM_coming_starvation:0 "迫在眉睫的饥荒"
NKM_coming_starvation_desc:0 "在过去的几十年里，由未知原因造成的农作物减产已成为了虹镜的常态。加上战争，失败的开拓，国际市场动乱等原因，虹镜一直以来都处在饥荒的边缘，不但无法实现人口的大幅度增长，或是市场的扩张，还面临着大量因小范围饥荒而造成的地方叛乱。目前看来，我们尚且可以应对这一问题。叛乱可以镇压，粮食也没真到了一口饭也吃不上的地步——然而，这并非长久之计，如果政府无法在短时间内找到应对饥荒的方法，我们将无法挺过下一场风暴。"
NKM_feudalism_everywhere:0 "封建割据"
NKM_feudalism_everywhere_desc:0 "虹镜的现代化发展具有很高的局限性，且不提我们孤身立于海洋之上，从而导致我们无法第一时间和外国进行科技交流，光是各地的封建势力就够我们吃一壶了。在过去的数个世纪里，各地封建领主自己推行独立的经济政策，导致虹镜缺乏统一的工业标准，哪怕是铁路也是一个地方一个样式。虽然工业化的浪潮在沿海的数个大城市取得了较好的成果，我们依然无法将现代文明普及到全虹镜。同时，封建领主们的自治还严重损害了中央政府的权威，各地武装领主甚至有着中央军没有的制式装备，或者采用了完全不同的训练标准，甚至借此在税赋等关键议题上跟中央政府大动干戈。为了虹镜的现代化发展，我们必须处理这一问题。"
NKM_resistance_everywhere:0 "无处不在的抵抗运动"
NKM_resistance_everywhere_desc:0 "自上一次针对政府的大规模叛乱以和谈告终，许多不认可新政府改革的革命分子选择走向虹镜各地的高山，密林，采用游击战的方式骚扰我们的政权。随着新政府改革的大力推行，各地发展虽然有了长足的进展，可各种矛盾也逐渐激化。那些不忠于虹镜的叛乱分子充实了游击队的腰包和人力，如果我们不尽早处理这一问题，他们一定会发动起义。"
NKM_internal_conflicts:0 "内部斗争"
NKM_internal_conflicts_desc:0 "虹镜现政府是在幕府被推翻后，由部分前政府成员和革新派合作构建的新政治团体。从法理的角度来讲，在有了国王的支持后，我们是当之无愧的中央政府。然而，我们的内部却斗争不断。认为政府应当更多地让君主参与政治的保皇派认为我们犯了跟幕府一样的错误，没能正确的执行国王的理念；革新派则认为我们将太多的精力浪费在了无意义的扯皮上，应该尽快推行各地改革，颠覆虹镜现有的封建体制——而这两派偶尔还能在一些话题上达成共识，比如新政府没能处理好粮食危机等等…我们可以将矛盾压制一时，可这终究不是长久之计。"
NKM_abolitionist_movement:0 "废藩运动"
NKM_abolitionist_movement_desc:0 "废藩运动是由东乡吉助和革新派政府成员提倡的，旨在降低虹镜各地封建领主的自治权，意图终结虹镜各地封建割据局面的运动，进而扩大中央政府集团的威望与权力，以便推动之后的改革。然而，改革需要代价——剥夺武装领主们的自治权势必会鼓动大量的反叛力量，同时严重破坏各地中央政府的权威，我们需要谨慎行事。"

NKM_broken_country:0 "破败之国"
NKM_broken_country_desc:0 ""

###领导人###
NKM_yoshisuke_togo:0 "东乡吉助"
NKM_yoshisuke_togo_desc:0 "当南进计划的惨败如洪水猛兽一般席卷面临饥荒的虹镜王国时，东乡一家的长子出生了。孩童的家人为他取名“吉助”，希望他能为厄运连连的东乡一家带来些许好运。然而，事与愿违，时代的洪流冲垮了东乡家，也在东乡吉助的心灵中留下了难以磨灭的记忆。事实上，东乡吉助的童年大多都在饥饿与寒冷中的度过，作为一个濒临破产的武士家庭的长子，他没花多少时间便意识到了现实的残酷。\n\n虹镜王国为何遍地饥荒？为什么当所有人都拼命，挣扎求生时，这个国家无法迎来任何程度的繁荣？为什么幕府的老爷可以高高在上地享用山珍海味，老百姓却要争抢树皮来充饥？想要知道问题答案的东乡吉助从小便努力钻研外国语言和文化，对他而言，或许，答案便存在于海洋对岸——对幼小的东乡而言，那是世界中心，科技，经济，文化和一切的中心——南巴斯蒂亚联邦。\n\n长大后，东乡吉助在亲戚的介绍下成为了家乡的一名低级官员。虽然缺乏家世的他在官场上并不受人待见，苦心钻研外国语言和文化的他便很快迎来了一生的转折点。随着世界大战爆发，作为少数懂得外国语言的翼人，东乡有幸作为代表团的一员前往巴斯蒂亚大陆对大战考察。先进的军事科技，漫天的炮火，连日运转的流水线，机械化生产的辽阔农田…来自大陆的先进科技给尚且年轻的东乡带来了无与伦比的震撼。\n\n幕府必须被推翻——东乡吉助一次又一次地告诉自己这一点。他的政治理念随着年龄的增长快速激进化，他痛恨幕府的一切：他痛恨幕府的腐败，凭什么幕府可以将百姓与国王的意愿弃之不顾，可以在金字塔顶享受世间一切的美好？他痛恨幕府的愚蠢，为什么幕府的改革从未起到效果，也从未真正地帮助到那些需要帮助的人？他痛恨幕府的傲慢，他们是全虹镜最接近国王的那一批人，可他们又同时是最不把君主的善心放在眼里的一批人。\n\n作为倒幕派的强烈支持者，东乡吉助的仕途并不顺利，可他从未反悔。在遭到幕府追捕并被流放海外后，他也从未放弃自己的政治理念。这份坚定的信仰帮助他在倒幕派势力中节节高升，在不知不觉中被塑造成“殉道者”的他很快便成为了倒幕派的领导人之一。东巴大战爆发后，东乡吉助返回虹镜并参与了起义的准备工作，在1996年的幕府妥协后，他成为了新政府的领导人。\n\n然而，情况不容乐观。当政府内部的保皇派和政府外的革命党一齐反对新政府时，他也不由得感到有些慌张。诚然，东乡吉助这一生从未觉得他名字中的“吉助”到底何时帮助过他，也从未渴求过——坚定的信念总能为自己开拓出一条道路，即便是在生活最为艰难的日子里，他也这样告诉自己。\n\n可如今，他正无比迫切地期望着好运的来临，仿佛它从未降临过一般。"

