###民族精神###
ZHE_night_short_dream_long:0 "夜短梦长：深眠"
ZHE_night_short_dream_long_desc:0 "医生在这天也成为了病人，医学无法诊断他的绝症，医术无法治疗他半分，多年来的知识、技术与经验没有带来一丝帮助。没有任何时间和机会可以得到安慰，身边的患者正一个个死去，医生在惊惧中饱受着生理与心理的煎熬，在一例例相同的症状前他只能颓唐而无助的旁观着这一切。在最后一名患者含混不清的呢喃中，他终于从幻觉深处拼凑出了世界的“真实”……如果一切还来得及，请即刻准备“手术”，术前请充分了解“病情、病史、诊断和检查结果”，并亲自作“体检”，根据具体情况，订出“手术”计划。“疑难病例”应经过“会诊讨论”，订出周密的方案，结合具体条件选择恰当的“术式”。\n\n——“这不是电视剧，这是真人真事，这是我们七河人自己演自己的故事。”"

ZHE_rise_or_fall_together_culprit:0 "一荣俱荣：祸首"
ZHE_rise_or_fall_together_culprit_desc:0 "古代七河地区前后历经了六次由北向南的半人马族大迁徙，包括少汗、摄图、狄银、青、叱拔、于摩等。该地区数千年来都为农耕民族与游牧民族所并存控制。双方长期冲突不断，游牧民族的频繁南下令该地始终没有形成稳定而统一的强大政权，直到墨精灵们的到来。1922年，第一批上岸的墨精灵元老们在亟待解决的发展方向上达成了共识——一切以墨精灵群体利益为最高准则，并用实际行动选择了股份制合作的关系。随着联邦的扩张，愈来愈多被吸纳进入的半人马族群体成为归化入籍的“墨马”以更好地进行社会生活生产管理。联邦的组建令七河地区走向统一稳定，免受外界侵扰，安定的生活令每个生命为之向往，普适价值在朴素的观念中逐渐形成，尽管这一宽泛的概念从未曾被定义。七河人、七河联邦的自信也并非一日建成，正是在大战中不但避免了直接卷入战争，更通过战争发展壮大了自己，雄辩的事实于是终结了一切道路与制度的争议——普适价值让每个墨精灵以及归化入籍的墨马都确信，我们应当保卫我们的现代生活。九城都会区最贫困的爱国者，只要一想起集团与联邦的工业和财富，也会不由自主地挺起胸膛。\n\n——“……恰恰是这种追求，如今构成了我们唯一幸存的集体目的意识。我们知道各种东西的价钱是多少，但对它们的价值几何却一无所知。”"

ZHE_Ill_fares_the_land:0 "沉疴遍地：病灶"
ZHE_Ill_fares_the_land_desc:0 "科学告诉我们，基因复制时碱基互补配对不是必然的，被配对的碱基也有选择性，有时还会受到干扰，就出现了不完全复制，也可称为错误。这种错误一方面使生物得以进化，另一方面使生物产生疾病。生命的尺度越长，积累的错误越多，于是一个不断积累错误的系统就这样积重难返，不能运作了。严格意义上讲，不会有人死于“衰老”，只会死于“伴随衰老而发生的某些疾病”。个体尚且如此，集体、社会的积弊又该如何治疗？\n\n——“沉疴遍地，病魔肆虐，财富聚集，众生危亡。”"

ZHE_made_in_zhetysu:0 "七河制造"
ZHE_made_in_zhetysu_desc:0 "七河制造——当今巴斯蒂亚大陆上认知度最高的标签之一，得益于创造性的七河式流水线把一套重复的过程拆分为若干个子过程，并令每个子过程与其他子过程并行运作的生产方式，生产工艺过程和产品的标准化被极大的促进，产品的生产效率得到极大提升，分工更为细致，产品的质量和产量也大幅度提高。这一标准化生产流程自汽车产业的生产中大获成功后，逐渐被推广到了联合碳化物集团（UCG）更多的产业中。标准化、大批量生产显著降低了生产成本，专业化分工使得最普通的体力劳动者的工作效率也能被提高到技术工人的水平之上。制成品被大量生产为标准化商品，在迎来物质丰盈的同时，前沿的学者们更加热衷于科学分析人在劳动中的机械动作，试图研究出最经济且生产效率最高的“标准操作方法”。似乎并没有人注意到——工人的时间、精力乃至身体都早已被重复的流水线作业与轰鸣的机器裹挟其中……\n\n——“我们今天生活的方式中有某种根本性的谬误。”"

ZHE_let_the_bullets_fly:0 "马匪之患"
ZHE_let_the_bullets_fly_desc:0 "游走在城市边缘，驾驶非法改装车辆的的半人马族非法暴力团体。作为具有黑社会性质的犯罪团体，在无视法律的同时，以根据朴素的价值观念为弱者主持正义而著称。白天是车匪路霸，夜晚是飞车侠盗。比起官方称呼“马匪”，匪首白马子更愿意称自己为霹雳游侠（Knight Rider）。\n\n“大姐头，你看！他们怎么把你画成这样！”\n\n“欸！越不像越安全。”\n\n通缉令：缉拿匪首白马子，生擒者奖十万楚元，献首级者奖八万楚元，协助缉拿者……其他各著名马匪，凡能生擒或献首级者，仍照前颁赏格各给……——七河地方保卫厅"

