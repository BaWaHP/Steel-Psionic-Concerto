ZHE_anarchism_party:0 "马匪集团"
ZHE_anarchism_party_long:0 "马匪集团\n§g游走在城市边缘，驾驶非法改装车辆的半人马族非法暴力团体。作为具有黑社会性质的犯罪团体，在无视法律的同时，以根据朴素的价值观念为弱者主持正义而著称。§!"

