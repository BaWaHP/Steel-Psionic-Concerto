###事件###s
ZHE.0.t:0 "于摩的命运"
ZHE.0.d:0 "多次的反叛证明，纵容于摩的任性只会为七河带来极大的不确定性。伪于摩王必须从物理上被消灭，其党羽也必须尽快严肃处理。为了防止对其他地区造成更进一步的恶劣影响，董事会已于近日商讨并已拟定出针对于摩的新的政策。"
ZHE.0.a:0 "自作孽，不可活。"

ZHE.1.t:0 "腐烂生命"
ZHE.1.d:0 "酸碱度(PH)  <6.5、二氧化碳分压(PCO2) >100mmHg、氧分压（PO2）<15mmHg……如果七河联邦是一名病人，那么这就是我对联邦当下体征的全部判断。通俗的说，它是一块连早上在市集上摆出的排骨所具备的新鲜程度都不如的烂肉。从没有人教过我严峻如氧分压<15mmHg这般情况的病人该如何拯救，也没有人告诉我这块烂肉可以跳动到现在究竟是谁的功劳。无力感麻痹了我的每一寸神经，所有的一切都早已在那场1997年的大雪中淹没了，坚持到现在的一切从一开始就是一厢情愿。忙碌、机械、消磨、麻木……这样的生活已经持续了不知多少日子，我日复一日的安慰自己和周遭“已经尽力了”，但每个人的眼神里都已经失去了活力，现在的我们和外面那群“行尸走肉”有什么区别？\n\n还活着的人，你能看到这些文字吗？读了这个的你，也在这里留下你知道的一切吧。——碘苷，一个七河生命的普通研究员"
ZHE.1.a:0 "我会拟定最后一份文件。"
ZHE.1.a.tt:0 "§R你将进入解体议程，联邦将在7个自然日后解体。§!"
ZHE.1.b.tt:0 "§R欲望将吃掉你的一切。§!"

###新闻###
ZHENews.1.t:0 "七河联邦解体"
ZHENews.1.d:0 "墨精灵在七河联邦建立了完整的国家资本主义，它发挥了强大的效能，用理性的思考，最佳的配置，在最短的时间内完成了工业化，这使得联邦在大战中独善其身并在战后跻身列强。但理性的政治、管理和资产重组从来都是血腥的，官僚化、特权、垄断……面对高速的现代化，所有人放弃了思考，乃至抛弃了国家。\n\n国家资本主义的尽头，是官僚垄断资本主义——不是胎生，不是卵生，是化生。"
ZHENews.1.a:0 "别说了，别再说了。"
ZHENews.2.t:0 "七河集团延期披露财报"
ZHENews.2.d:0 "七河联邦国家通讯社电，七河集团有限公司近日公告称，七河集团有限公司原定于1998年4月30日披露1997年年度报告和1998年第一季度财务报表，现拟延期披露。延期披露的原因为子公司的财报尚未审核定稿以及受国际市场环境影响。截至发稿前，七河集团有限公司的一系列重要子公司均尚未审核定稿1997年年度报告及1998年第一季度财务报表，集团下属子公司为公司合并报表的重要组成部分，故对公司年报的编制进度产生一定影响。对此，七河集团董事长发言称将组织推进各地方子公司加快……同时……"
ZHENews.2.a:0 "这电视怎么又坏了？"
ZHENews.3.t:0 "讣告：七河集团前董事长普萘洛尔离世"
ZHENews.3.d:0 "七河联邦国家通讯社电，七河集团前董事长普萘洛尔日前不幸离世。惠远保卫厅在其遗留的衣物背面发现了七个弹孔痕迹，目前保卫厅已排除他杀的可能。\n\n据有关刑侦专家称，虽然背后中枪自杀显得匪夷所思，但实际上这是可以做到的。向自己开枪受到胳膊角度的限制，子弹进入身体的角度会有很大的偏角，因此普萘洛尔应该是确认了偏角符合自己开枪的角度；连开七枪可能意指七河地区，这一举措可能是出于某种政治目的，且枪上没有其他人的指纹，同时也没有其他证据表明现场有其他人，所以保卫厅方作出这样的判断是合情合理的。"
ZHENews.3.a:0 "所以她真的是自杀了吗？"
ZHENews.3.b:0 "所以她真的是自杀了吗？"

###决议###
ZHE_progressive_disease_decision_category:0 "病情进展"
ZHE_progressive_disease_decision_category_desc:0 "1998年1月1日，星期四，大雪。\n\n把时间回溯至上个星期，我也依然不会相信有今天这样的事情！那天开放的那朵花根本无法理解，如此庞大的体积就连我所处的位置都可以观测得到，它开放瞬间所释放的巨大热量仿佛一枚战术武器，就连那些散落的花粉甚至也都到了几乎肉眼可见的直径！随着一股一股的热浪，腥臭瞬间爬满了整栋大楼，那些在外面的人行为也开始不太正常，他们好像活在一个自己臆想的世界——一个1997年的世界？他们竟然还用我“不该出现在这里”这种理由来袭击我，可笑，怎么会有人觉得自己活在过去？我不在无菌室里埋头做实验，难道该和去年一样失恋了在宿舍里打牌休年假吗？这难道是什么集体癔症？就连电子通讯设备也会被外面那些花粉影响吗？如果外面现在都是这样……疑问实在是太多了，我的笔尖已经颤抖的在做不规则运动……实验室眼下的储备连一天都够呛，必须得冒险出去一趟，但如果我的演技在那些变得奇怪的人面前表现得不够好……总之，这本日记我将会随身携带，并尽可能地记录我知道的一切。\n\n为防不测我写下这些文字，里面的一些推论不一定正确，但如果这本日记不幸被别的什么人捡到了——比如你，请务必要查明真相，这是我唯一的愿望。——碘苷，一个七河生命的普通研究员"

ZHE_chronic_inflammation:0 "慢性炎症"
ZHE_chronic_inflammation_desc:0 "感染者与常人行为几乎无异，但对于周遭的人、事、物的存在与逻辑具有强迫性，认为当前的社会生活、生产应处于一年前（即1997年）的同时期，并且对此高度偏执。感染者对一切不符合过去的人、事、物怀有试图“修正”的观念，且具备强攻击性，试图攻击任何不符合概念和印象中存在的情况，开始和结束都是突然的。由于一年前的今日与现在的今日在实际情况中并不总是完全一致或相似，因此也会出现感染者在晴天打伞、在雨天跑步等不符合逻辑的情况。基本排除深度催眠或群体癔症，可能为某种病毒感染。发病机制尚不清晰，疑似与“花粉”高度相关，但难以收集和检测任何血液或身体组织样本。截至目前未见感染者以外群体，考虑部分具备通风换气装置的设施内可能存在未感染者。——碘苷，一个七河生命的普通研究员\n\n——“炎症”的因素持续存在，它们持续损伤着“组织”。"

ZHE_apoptosis:0 "固缩坏死"
ZHE_apoptosis_desc:0 "如今的地铁、研究所等都作为人防设施在使用，幸存者们被分割在了各处，相互间也都几乎失去了联系。因不符合感染者认知和逻辑而发生的攻击时有发生，地上与地下相互间充斥着不信任。在幸运地安全进入最近的地铁站点，并顺利通过身份检查和安全隔离后，我被安排到一处临时的预制板隔间。在我所在的站点，管理与配给全凭运营方的自治，对外的地铁口通道戒备森严，内部各个站点的联系仍然存在，不过为了节省能源，原先的班列已经停运，只有通过定期的物资班车捎带才可以前往其他站点，并且每次的间隔也已经越来越长，组织队伍前往地面收集物资的次数也越来越多。一些人会试图徒步通过地铁隧道去往其他站点，但通常会被其他站点拒绝进入，无功而返。目前对于“花粉病”（姑且这样称呼）我们依然知之甚少，但这种东西应该是一种病毒所导致。但奇怪的是，自最初的爆发后，感染者体内的病毒似乎转向了完全依赖垂直传播。——碘苷，一个七河生命的普通研究员\n\n——部分“细胞”功能逐渐息灭，部分位置“细胞”出现大量生理性死亡。"

ZHE_acute_failure:0 "急性衰竭"
ZHE_acute_failure_desc:0 "我和一些同行们正在有限的医疗条件下尽可能地提供医疗服务，物资和淡水的问题越来越严重了，但大家都还在尽力为站点做贡献。目前对于“花粉”和感染的研究缺乏支持，较为困难。广播里说，董事会让大家减少最近外出探索的频率，地上对地下的敌意越来越深，马匪们也正在地上横行无忌，探索过程中尽量不要与他们产生冲突，或许也只有他们这些规则的破坏者能在现在的环境里像鱼入大海般自在了。一些人在大致摸清楚外面的状况后，选择了返回地上的生活。不过不是每个人都有那么好的运气和演技——像这样每天都扮演别人认知中的形象、不露出破绽的生活能维持到什么时候？用感情和喊话去感化他们已经早已被证明是痴心妄想。——碘苷，一个七河生命的普通研究员\n\n——请在去除“病因”的前提下进行综合治疗，最大限度地保护各“器官”系统功能，切断可能存在的恶性循环。"

ZHE_hypersensitivity_reaction:0 "超敏反应"
ZHE_hypersensitivity_reaction_desc:0 "我看到越来越多的感染者在重复的生活中不断积累错误，问题在不断地倍增，从难以察觉到积重难返，许多被感染者开始因为各种原因死亡。因为重复过去而勉强自己的行为导致了大量的意外事故，这些本不该逝去的生命令人痛心。我的一些墨精灵同胞开始将科学视为迷信，将虚无缥缈的东西奉为圭臬，在危机面前像动物一样只剩下遵从颤抖的原始本能。愚昧的半人马族带着他们愚昧的思想和宗教感染其他人，他们的面目让我觉得比地上的家伙更可憎。这些家伙不论是否在岗位上，都要在嘴里翻来覆去的咀嚼自己粗俗的语言，那些声音已经吵得我快要幻听了！“虞神”不过是一个落后的河神崇拜，把这种过时的愚蠢神像摆在祭台上，用宝贵的水资源洗涤、净化这种理由来试图对抗一种病毒（我们已知悉，这确是一种病毒），这样的行为简直是在追求自我毁灭。更有甚者开始编造诸如世界末日、魔兽入侵、心灵控制试验等荒谬的流言，暴力事件也开始涌现，针对董事会的信任危机越来越严重了。\n\n等等，我好像又听到了物资班列的声音……——碘苷，一个七河生命的普通研究员\n\n——请立即停用引发反应的“药物”并暂停“手术”，否则须尽快加速“手术”的结束。"

ZHE_clinical_death:0 "临床死亡"
ZHE_clinical_death_desc:0 "没有人知道这场灾难什么时候才会结束。一些设施从外部被攻破，另一些设施则从内部开始崩溃。物资一天比一天减少，配给一次比一次苛刻，乱七八糟的声音早已盖过了广播无意义的重复。我们的物质不足以支撑文明，秩序越来越脆弱，自然界弱肉强食的规则泛滥在地下凝滞的空气中，一些人为了活着甚至开始出卖一切。地上与地下，到底哪边的人才是行尸走肉？作为医疗人员，面对医疗物资的匮乏，我却只能眼睁睁地看着本可以挽救的生命逝去。治疗有何意义？医生的使命又是什么？我所生活的现实到底该如何治疗？\n\n就精神状态而言，七河联邦可能已经不存在正常人了。——碘苷，一个七河生命的普通研究员\n\n——“组织细胞”仍在利用仅存的“贮氧”进行细微的“代谢”，但为时极短。"

###杂项###
