ZHE_increased_alert_desc:0 ""
ZHE_pioneers:0 "领航者"
ZHE_pioneers_desc:0 ""
ZHE_martial_laws:0 "军事戒严"
ZHE_martial_laws_desc:0 "“有些人不愿意接受这一切的变化，那他们可以选择不去看变化。”\n——利巴韦林"
ZHE_public_opinion_control:0 "舆情管制"
ZHE_public_opinion_control_desc:0 "“有些人不愿意接受这一切的变化，那他们可以只看到想看到的变化。”\n——安乃近"
ZHE_eliminate_redundant_staff:0 "裁撤冗员"
ZHE_eliminate_redundant_staff_desc:0 "二代、三代、四代……墨精灵后代们享受着集团里的铁饭碗带来的好处，每个人都拥有分配和福利，这对于财政来说这是个惊人的负担——我们浪费了太多利润，而这些利润又滋养了太多闲人。"
ZHE_eliminate_redundant_staff_tt:0 "§Y持续时间内将会触发相关事件。§!"
ZHE_main_dominance:0 "维持主导"
ZHE_main_dominance_desc:0 "“联邦毁在我手上，我是七河的罪人。我手中微弱的热量对于重建秩序可能确实没什么意义，但是只要还有一个人信任着我，那么只要我还剩一分热，我就会用尽全力散发多少光。我会纠正这个错误，并且早已做好了牺牲的准备。”\n——普萘洛尔"
ZHE_main_dominance_tt:0 "§Y选中时的效果：§!\n添加民族精神：§Y萤烛之火§!，其效果为（威权共和主义每日新增支持率：§G+0.5%§!）。\n威权共和主义支持率变化：§G+5%§!\n\n§Y完成后的效果：§!"
ZHE_main_dominance_tt2:0 "§R若在国策结束前，§Y董事会§!派系维持§Y领导权§!，且至少§Y3§!个派系的态度是§G支持§!并无反对派系，普萘洛尔的政变将成功！§!"
ZHE_main_dominance_name:0 "七河理事会"
ZHE_main_dominance_name_long:0 "七河理事会"
ZHE_main_dominance_tag:0 "七河理事会"
ZHE_make_it_lighter:0 "淡化处理"
ZHE_make_it_lighter_desc:0 "前任董事长已经不具备任何价值，但不代表她可能会做些什么有损我们的事情。为了避免她带给我们麻烦，我们需要做点什么。人们的注意力不该在不该看的事情上，一起“必要”的事件能帮我们解决后顾之忧。"
ZHE_talk_to_the_society:0 "对话各界"
ZHE_talk_to_the_society_desc:0 "那些无效的纷争已经够惹人厌，我们需要更多的支持来度过危机，所以，坐下来谈谈吧。"
ZHE_economic_turnaround:0 "经济转轨"
ZHE_economic_turnaround_desc:0 "我们最终还是活了下来，经济已达拐点，但仍需警惕这些新生的寡头们。"
ZHE_economic_turnaround_tt:0 "§Y官僚垄断§!追加效果：\n生活消费品工厂：§Y-10%§!\n战略资源获取效率：§G+10%§!\n每日指挥点数增长系数：§G+25%§!"
ZHE_knockout_oligarchs:0 "敲打寡头"
ZHE_knockout_oligarchs_desc:0 "需要一些特殊手段来敲打他们，是时候重建被裁撤的特殊情报部门和环境观测部门了，它们是对抗寡头们的绝佳筹码。"
ZHE_im_the_oligarch:0 "我即寡头"
ZHE_im_the_oligarch_desc:0 "都给我低着头，我吃了你才有。"
ZHE_the_helmsman:0 "掌舵者"
ZHE_the_helmsman_desc:0 "以文明和历史而言，高度文明通常为上层精英所开启。普通人聚集在精英身后，而精英们聚集在一个领袖身后，未来唾手可得。"
ZHE_the_helmsman_tt:0 "§Y掌舵者§!将替换§Y官僚垄断§!，其效果为（主要意识形态每日新增支持率：§G+0.05%§!，每日政治点数消耗：§R+0.2§!，生活消费品：§Y-5%§!，建造速度：§G+5%§!）。"
ZHE_released_absorption_conditions:0 "归化条件宽松"
ZHE_released_absorption_conditions_desc:0 "归化入籍制度在一定的历史时期具备一定的作用，大厦已倾，为消弭种族分歧，放宽归化入籍的标准会是个灵活的选择。"
ZHE_mandatory_education:0 "延长教育年限"
ZHE_mandatory_education_desc:0 "大量工人失业后游荡在大街上无所事事。这当然不是他们的错，但这将严重影响社会治安。将还在学校的准工人们延长职业技能学习时限，让街上的工人们重新回到学校进修，也正符合我们需要更多掌握新技术的熟练技工的需求。"
ZHE_weaken_nationalism:0 "弱化民族概念"
ZHE_weaken_nationalism_desc:0 "我们都是有智慧的生物个体，我们现在面临同样的困难。种族主义在生死存亡前只是个苍白的笑话，无论墨精灵还是半人马，我们都需要团结一致地向前。让七河联邦再次伟大！"
ZHE_weaken_nationalism_tt:0 "§Y官僚垄断§!追加效果：\n生活消费品工厂：§Y-10%§!"
ZHE_social_secure_act_amendments:0 "社会保障法案修正"
ZHE_social_secure_act_amendments_desc:0 "人们在有声或无声的哭泣，但我们现在更需要面包、羊奶和羊酪来填饱肚子。"
ZHE_unofficial_medic:0 "非正式医疗人员"
ZHE_unofficial_medic_desc:0 "有太多的人正缺乏医疗而饱受痛苦。我们需要更多的医疗人员，哪怕他们次一些，也比没强。庆幸的是，七河并不是第一次遇到类似的情况，先驱们留下的《非正式医疗人员手册》在曾经的岁月里一直是物质匮乏地区的民众健康指导手册。"
ZHE_medical_privatization:0 "医疗私有化"
ZHE_medical_privatization_desc:0 "基于现实考虑，我们不得不开源节流以度过这次危机。不同层次的医疗将满足不同层次需求的人。这不是无情，这是现实，医疗资源总量的短缺就是现实。没有比面对问题并实际解决问题更现实的理想主义。"
ZHE_medical_complex:0 "医疗联合体"
ZHE_medical_complex_desc:0 "一个完善的分级医疗体系将极大的满足对不同人群的医疗覆盖，至少比医疗资源耗尽来的好，这未尝不是一种崇高的人文主义。"
ZHE_vocational_school_expansion:0 "职业学校扩招"
ZHE_vocational_school_expansion_desc:0 "作为延长教育时限政策的延续，通过让更多人进入学校学习，统一管理，我们将收获一批掌握新技术的技工，这既是对未来的投资，也是一种隐形的社会救济。吃住管理皆随学校，以学习的名义对他们的自尊心也有好处，家长和孩子一起学习也是个不错的观察样本。"
ZHE_privatization_of_education:0 "教育私有化"
ZHE_privatization_of_education_desc:0 "基于现实考虑，我们不得不开源节流以度过这次危机。不同层次的教育将满足不同层次需求的人，这不是自私，这是现实，教育资源总量的短缺是现实。没有比面对问题并实际解决问题更现实的理想主义。"
ZHE_dual_career_education:0 "双元制职业教育"
ZHE_dual_career_education_desc:0 "企业培训为主，企业中的实践和在职业学校中的理论教学密切结合。"
ZHE_rebuild_common_sense:0 "重塑共识"
ZHE_rebuild_common_sense_desc:0 "没有马匪的日子，才是好日子。物理的批判将让不听话的家伙们重新考量实力对比并作出合适的选择。剿灭这些秩序的破坏者是重建秩序和重塑我们弥足珍贵的共识的必由之路——我们应当保卫我们的现代生活。"
ZHE_rebuild_common_sense_tt:0 "§Y选中时的效果：§!\政治点数：§R-60§!\n稳定度：§R-10%§!\n\n§Y完成后的效果：§!\n§Y七河制造§!追加效果：\n生产效率上限：§Y+5%§!\n生产效率保持：§Y+5%§!\n生产效率增长：§Y+5%§!"
