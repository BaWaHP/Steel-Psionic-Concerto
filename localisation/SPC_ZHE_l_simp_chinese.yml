###政党名称###
ZHE_pioneer_communism_party:0 "先锋派"
ZHE_pioneer_communism_party_long:0 "先锋派\n§g不论是联碳集团还是七河联邦，科技与工业都是立身之根本，知识分子就像鱼身上依附的鳞片般必要。墨精灵的原始科研与思想积累来自过去的生灵，但对未来的发展只能依赖自己。有别于政治上暧昧摇摆的传统学术界，先锋派认为科学技术是第一生产力，私有制作为一种制度终将被淘汰，应当大力投入对所有的自然科学与社会科学的探索，追求更优化的资源配置与财富分配以期达到共产主义的终极目标，尽管这一过程中理性主义与人文主义总会产生冲突。或许他们的探索并不总是对的，但我们理应重视他们的意见。§!\n\n§R“To be or not to be，这是个问题。”§!"
ZHE_revolutionary_communism_party:0 "暂无"
ZHE_revolutionary_communism_party_long:0 "暂无"
ZHE_worldunion_socialist_party:0 "暂无"
ZHE_worldunion_socialist_party_long:0 "暂无"
ZHE_worldunion_democrat_party:0 "同心结"
ZHE_worldunion_democrat_party_long:0 "同心结\n§g同心结活动起源于大战后，马力全开的工业生产能力创造了“七河制造”这一奇迹，但背后是无数工人们的鲜血与汗水。高速的工业发展下是人文理念的缺失。罢工与示威游行使得部分墨精灵开始反思并对资本主义产生了不一样的态度——在保留私有制的同时对其进行改革使之更加公平与人性化，由福利国家政策重新分配财富以缓和社会矛盾；甚至其中也有一些人希望以渐进的改良措施来和平过渡到社会主义。凭借亲民的形象与惠及底层的举措，同心结在墨马群体中得到了相当的支持。§!\n\n§R“这些问题曾经是根本的政治问题，尽管它们不能轻易回答。我们必须再次学习提出这些问题。”§!"
ZHE_liberal_republican_party:0 "垦殖系"
ZHE_liberal_republican_party_long:0 "垦殖系\n§g垦殖系的传统由来已久，从水下第一个墨精灵踏上陆地，到如今繁盛的九城都会区，垦殖系为集团的建设立下汗马功劳，活跃在各处的商业活动。随着时间的推移，我们在各处的垦殖势力愈发壮大，利益越来越多，野心也越来越大。垦殖系推崇“自由的帝国主义”，其所控制的地方安保体系是联邦安全的重要组成部分；但其与地方的过度接触与利益捆绑也让他们深陷腐败与裙带关系，甚至养寇自重。§!\n\n§R“东食西宿，首贫首富。”§!"
ZHE_conservative_republican_party:0 "菁英会"
ZHE_conservative_republican_party_long:0 "菁英会\n§g菁英会的成员通常是第一批上岸的墨精灵元老们的直系后裔，所谓启明星的继承者们。他们往往据有头部资源，独享牲醴，并逐渐形成了自己的精英圈层。不论是外人不可轻窥的高墙重重和庭院深深，还是高调进入公众视野彰显存在，特殊地位、特殊待遇、特殊身份……从纨绔子弟到真正的菁英，“精英”文化之烙印已深深扎根。领导层的特权生活早已融入日常，变成了一种不言而喻的习惯和传统。从各个级别看，他们都享受着与众不同的待遇，这不仅仅是一种权力象征，更是七河特有的生活方式。即便远离权力中心，各个国策公司也总有他们一席之地。§!\n\n§R“宏大的英勇的感情是不自然的，臆想出来的，是谎言。但他是一个天才！”§!"
ZHE_authoritarian_republican_party:0 "董事会"
ZHE_authoritarian_republican_party_long:0 "董事会\n§g联邦董事会由墨精灵主导的七河集团各部门部长（包括董事长）组织构成，是最高权力机构。内外重大政策问题均由董事会讨论决定，制订国家政策，审核联邦预算，批准法律与条约。作为整个联邦的核心，董事会并非一个明确的派系，更类似于一个最大公约数，它如同一台理性而冷酷的政治机器，似乎没有立场。在董事会看来，经济基础决定上层建筑，没有先进生产力那么一切都将是空中楼阁。所以一切应当以发展生产力为中心，保持雁群中的首雁地位。不论怎样的变革，工业化的脚步一旦开始就不会停下。董事会是列车上的幽灵——永不到站，永不消亡，永远向前。§!\n\n§R“董事会永远站在胜利与正确的一方，但定义胜利与正确的从来不是董事会。”§!"
ZHE_national_socialist_party:0 "暂无"
ZHE_national_socialist_party_long:0 "暂无"
ZHE_authoritarian_nationalism_party:0 "暂无"
ZHE_authoritarian_nationalism_party_long:0 "暂无"
ZHE_paternal_autocrat_party:0 "铁三角"
ZHE_paternal_autocrat_party_long:0 "铁三角\n§g大战改变了世界，也改变了我们。无数的订单如雪花般洒向我们，军工企业在战争中迅速壮大，这场持久的战争令我们在其间大发横财。战争虽已落幕，但部分官员、军工企业、军事部门和科研机构已逐渐绑定成了一个错综复杂的利益共同体。军工复合体——铁三角发展至今，已然深刻影响着国家决策及社会生活，在各种看得见与看不见的地方，他们都力图参与其中。为确保军火生意的长盛不衰，军工复合体一直在制造假想敌与挑起区域争端，战争对于他们而言也不过是笔大点的生意吧。§!\n\n§R“在政府各部门中，我们必须警惕军工复合体取得不正当的影响力，不论它这样追求与否。”§!"
