ZHE_ballastless_track:0 "无砟轨道"
ZHE_ballastless_track_desc:0"采用混凝土、沥青混合料等整体基础取代散粒碎石道床的轨道结构。作为高速铁路轨道结构的探索，无砟轨道或许将开启铁路轨道结构的新时代。"
ZHE_ballastless_track_tt:0 "§Y超前规划§!追加效果：\n基础设施建造速度：§G+10%§!\n铁路建造速度：§G+10%§!\n补给中心建造速度：§G+10%§!\n政治点数：§R-5%§!"
ZHE_shallowly_swim:0 "浅涉深水"
ZHE_shallowly_swim_desc:0"集团内部的水似乎很深，即便是初步的调查我们也可能得到触目惊心的结果。"
ZHE_perfect_report:0 "“完美报告”"
ZHE_perfect_report_desc:0"至少……先把现在度过去，即便这样做有损权威。虽然集团内部的问题也不是今天才有了。私下的调查还需要继续，与会人员很快就将到齐。"
ZHE_social_experiment:0 "社会实验"
ZHE_social_experiment_desc:0"会议还在继续。垦殖系的女王——安乃近，在这次秘密会议中提出了一个各方都还算能接受的方案。先锋派方将其称为“一次大型的社会实验”并为此兴奋不已；铁三角方与同心结方也认为这将极大地满足自身诉求；菁英会方的代表没有表达任何态度，但也持默许观望。各方似乎都认为这是一个己方达成目的的机会。"
ZHE_fix_the_trouble:0 "解决苦难"
ZHE_fix_the_trouble_desc:0 ""
ZHE_songs_for_the_trouble:0 "歌颂苦难"
ZHE_songs_for_the_trouble_desc:0 "苦难是客观存在的现实，利用它，掌控它，歌颂他。"
