###民族精神###
OPH_sacrifice:0 "牺牲"
OPH_sacrifice_desc:0 "“神爱世人，而世人爱神。主的徒要爱世人，将自己献给世人，一切信主的，不至灭亡，反得永生”——《圣箴录》2：18\n\n作为三大骑士团中以牺牲为主要信条的骑士团，奥普菲尔骑士团从成立开始便一直信奉于此。他们是三大骑士团中最为狂热的信徒，在征服中巴时期打出过“为了神牺牲自己的一切”的口号。而等到伟大战争结束，看着被魔兽蹂躏后的中巴。这些信徒们动摇了。好像他们为之牺牲一切的神明好像从未垂怜过他们。从那之后奥普菲尔骑士团开始深入现实，为了中巴里那些痛苦挣扎的民众而牺牲自己。奥普菲尔骑士团辖区在某种程度上甚至比中巴首都区更受民众欢迎。比起纸醉金迷阶级固化的胜利城，奥普菲尔骑士团辖区就像圣子降世的天国一般平等仁爱。骑士团会为每一个民众解决他们的烦恼，一切的争斗与仇恨都会被调和化解。即使辖区早已被中巴政府停发资金，但骑士团硬实靠着半公社化的辖区体系得以存活下去。甚至有些芙蕾施曼支持者认为奥普菲尔骑士团正在进行某种社会主义的改造...不过这里毕竟不是天国，现实的一切苦难都在困扰着这里，而中巴内战加剧了这一点。骑士团不是神，他们没法化解所有的纷争。他们也不是无欲无求的圣人，内部要求变革以增加收入的呼声水涨船高。一切的一切在冥冥之中自有代价，但我们现在知道的只有一件事——§Y奥普菲尔骑士团会为了民众而甘愿赴死§!。"

