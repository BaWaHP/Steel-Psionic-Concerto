SE_foundation_of_our_team_btn:0 "美好的一天"
SE_foundation_of_our_team_btn_tt:0 "§C真是好极了。§!"
SE_foundation_of_our_team_title:0 "SPC制作组成立"
SE_foundation_of_our_team_desc:0 "一加一，竟然，等于二。"
SE_foundation_of_our_team_fm:0 "————弱智吧吧友"

SE_zhetysu_collapsing_btn:0 "食尽鸟飞，唯余白地"
SE_zhetysu_collapsing_btn_tt:0 ""
SE_zhetysu_collapsing_title:0 "七河联邦解体"
SE_zhetysu_collapsing_desc:0 "富贵不知乐业，贫贱难耐凄凉。可怜辜负好韶光，于国于家无望。"
SE_zhetysu_collapsing_fm:0 "————雪芹"

SE_UK_reunification_CR_btn:0 "第一炳火炬"
SE_UK_reunification_CR_btn_tt:0 ""
SE_UK_reunification_CR_title:0 "联合王国地区再统一"
SE_UK_reunification_CR_desc:0 "这场革命一旦开始便不会再停止，我们将尽我们所能地将革命传播至世界的每一个角落，终将让全世界的人们举起红旗与我们站在一起。"
SE_UK_reunification_CR_fm:0 "————阿尔勒·舍尔勒"

SE_central_bastia_civil_war_btn:0 "不知归处在何方"
SE_central_bastia_civil_war_btn_tt:0 ""
SE_central_bastia_civil_war_title:0 "中巴斯蒂亚内战"
SE_central_bastia_civil_war_desc:0 "到达此地时，我几乎完全睁不开眼:凌冽的寒风拍打着我的面庞，但我看到了，的确是看到了！那茫茫的荒野和蜿蜒的磅礴山脉！"
SE_central_bastia_civil_war_fm:0 "————比尔克森·马图施卡"

SE_disaster_original_desire_btn:0 "“█▄▅▃▂▅█▅▄▁——”"
SE_disaster_original_desire_btn_tt:0 "§t情况不妙。§!"
SE_disaster_original_desire_title:0 "灾厄——原欲"
SE_disaster_original_desire_desc:0 "那些包含在爱字里的所有本能力量，它们都必须获得施展。"
SE_disaster_original_desire_fm:0 ""

SPC_SE_second_east_bastia_war_btn:0 "风云再起"
SPC_SE_second_east_bastia_war_btn_tt:0 ""
SPC_SE_second_east_bastia_war_title:0 "第二次东巴大战"
SPC_SE_second_east_bastia_war_desc:0 "战争需要代价，我们承担了代价，换得了胜利。"
SPC_SE_second_east_bastia_war_fm:0 "————沃姆三世"

SPC_SE_farhome_reunification_sfh1_btn:0 "局势突变"
SPC_SE_farhome_reunification_sfh1_btn_tt:0 ""
SPC_SE_farhome_reunification_sfh1_title:0 "远乡国再统一"
SPC_SE_farhome_reunification_sfh1_desc:0 "当历史的浪潮翻过旧世界的堤岸时，没有人能置身事外，更不容人们迟疑不决。"
SPC_SE_farhome_reunification_sfh1_fm:0 "————周公义"

SPC_SE_farhome_reunification_sfh2_btn:0 "局势突变"
SPC_SE_farhome_reunification_sfh2_btn_tt:0 ""
SPC_SE_farhome_reunification_sfh2_title:0 "远乡国再统一"
SPC_SE_farhome_reunification_sfh2_desc:0 "君主的时代已经结束，可目前来看，直到相当遥远的未来，人民仍然需要领导。"
SPC_SE_farhome_reunification_sfh2_fm:0 "————郑钧"

SPC_SE_farhome_reunification_sfh3_btn:0 "局势突变"
SPC_SE_farhome_reunification_sfh3_btn_tt:0 ""
SPC_SE_farhome_reunification_sfh3_title:0 "远乡国再统一"
SPC_SE_farhome_reunification_sfh3_desc:0 "人们错误地解析了君主存在的意义，当他们为自己所看到的冰山一角而沾沾自喜时，领导者已看到了更远。"
SPC_SE_farhome_reunification_sfh3_fm:0 "————郑义"

SPC_SE_RSB_civil_war_btn:0 "众心难悦"
SPC_SE_RSB_civil_war_btn_tt:0 "——阿德科特二世被刺后的遗言"
SPC_SE_RSB_civil_war_title:0 "南巴共和国陷入战火"
SPC_SE_RSB_civil_war_desc:0 "这理想破碎了，化尘为砾，如若不另建一种生活，那么就得用这些砾片建立起生活来。"
SPC_SE_RSB_civil_war_fm:0 "————维拉帕米·赫尔辛基"

SPC_SE_reunification_ROT_1_btn:0 "超越苦难螺旋"
SPC_SE_reunification_ROT_1_btn_tt:0 ""
SPC_SE_reunification_ROT_1_title:0 "提特兰再统一"
SPC_SE_reunification_ROT_1_desc:0 "我们将团结起过去与现在的良知，以一种渴望完美的态度去爱自己的祖国。"
SPC_SE_reunification_ROT_1_fm:0 "————马格尼莫·伊罗莫兹"

SPC_SE_reunification_ROT_2_btn:0 "自由不曾免费"
SPC_SE_reunification_ROT_2_btn_tt:0 ""
SPC_SE_reunification_ROT_2_title:0 "提特兰再统一"
SPC_SE_reunification_ROT_2_desc:0 "国家的自由与繁荣来源于市场的自由与繁荣，而非民族主义者与懒惰工人的无理取闹。民主并不意味着向民粹主义毫无底线地让步。"
SPC_SE_reunification_ROT_2_fm:0 "————巴斯塔·伊万·安科林"

SPC_SE_reunification_IMC_1_btn:0 "父亲的诞生"
SPC_SE_reunification_IMC_1_btn_tt:0 ""
SPC_SE_reunification_IMC_1_title:0 "奥德修斯的奥德赛"
SPC_SE_reunification_IMC_1_desc:0 "从地升天，又从天而降，获得其上、其下之能力；如此可得世界的荣耀、远离黑暗蒙昧。此为万力之力，摧坚拔韧；世界即如此创造。"
SPC_SE_reunification_IMC_1_fm:0 "————《三重伟大》"

SPC_SE_reunification_SFR_1_btn:0 "红色新星"
SPC_SE_reunification_SFR_1_btn_tt:0 ""
SPC_SE_reunification_SFR_1_title:0 "远乡国再统一"
SPC_SE_reunification_SFR_1_desc:0 "千年以来，远乡的人民在这片土地上发芽生根，他们之中孕育着真正的力量，那是多少坚船利炮都无法摧毁的力量。"
SPC_SE_reunification_SFR_1_fm:0 "————赵永军"

SPC_SE_reunification_SFR_2_btn:0 "红色新星"
SPC_SE_reunification_SFR_2_btn_tt:0 ""
SPC_SE_reunification_SFR_2_title:0 "远乡国再统一"
SPC_SE_reunification_SFR_2_desc:0 "革命一旦开始，便无法轻易停止。如何避免不必要的伤亡，同时还要取得胜利，是所有人应当共同面对的难题。"
SPC_SE_reunification_SFR_2_fm:0 "————刘青兰"

SPC_SE_reunification_SFR_3_btn:0 "庶民的胜利"
SPC_SE_reunification_SFR_3_btn_tt:0 "§R他们不曾离去。§!"
SPC_SE_reunification_SFR_3_title:0 "东巴社会主义联盟成立"
SPC_SE_reunification_SFR_3_desc:0 "“从今往后，巴斯蒂亚的边界将按照劳动者的意志，而不是国王、将军或资本家的野心决定。”"
SPC_SE_reunification_SFR_3_fm:0 "————节选自《联盟成立宣言》"
