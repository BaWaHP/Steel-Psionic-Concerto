###训练法案###
no_standard_at_all:0 "毫无标准"
no_standard_at_all_desc:0 "如果部队能管好他们自己，那我们有什么理由去干涉他们训练的方式？"
basic_training:0 "基础训练"
basic_training_desc:0 "如果士兵们连枪都不会用，那他们也不配称为现代军队了。最基础的战斗训练对我国的军事力量强化是必要的。"
advanced_training:0 "常规训练"
advanced_training_desc:0 "虽然士兵作为个体的存在意义并不大，提高训练强度以确保他们在战场上的生存能力是必要的。"
reinforced_training:0 "强化训练"
reinforced_training_desc:0 "更高烈度的训练标准会使得人们对兵役望而却步，然而，这对于提高我国军队素养是必须的。"
elite_only:0 "精英部队"
elite_only_desc:0 "强大的现代化国家需要搭配一支精锐的部队，自古以来都是如此，我们也不能落了下风。"
best_of_the_best:0 "最好的小伙子们"
best_of_the_best_desc:0 "我们部队的训练水准已达世界一流水平，这对我国的军事力量大有裨益。"

