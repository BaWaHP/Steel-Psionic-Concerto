###备注很重要！###
###这里是关于政府新增法案/政策的本地化集合###

###事件###
CD.1.t:0 "工业发展度提升"
CD.1.d:0 "在今天，工业革命对文明的影响怎样夸大也不为过。工业化带来的生产力的增长惠及了社会的各个阶层。随之而来的，是整个社会翻天覆地的变革。因此，“现代化”这一学术名词应运而生，而工业化则往往与现代化被一并提及。我们甚至可以说，工业化就是社会发展的基础。而现在，我们的工业化水平迈上了一个新的台阶。从宏观层面上讲，随着生产效率的提高，“大炮与黄油”这一选择题将不再如往日那般沉重，甚至越来越不像一个选择题！从微观角度来说，工人生产单个商品的时间因为生产效率的提高大大减少。货架上的商品将越来越丰富，价格往往也会越来越便宜。综上所述，我们是时候期待一下工业化水平提高的果实到底有多甜美了！"
CD.1.a:0 "也许，明天会更好……"
CD.2.t:0 "工业发展度下降"
CD.2.d:0 "工业化带来的一切都是如此的让人迷恋，但现在，我们的工业发展水平后退了一大步！技术工人失去岗位、生产效率大幅下降、机器逐渐老化、经济下行、行业衰败、产能下降、商品匮乏……社会各个阶层都将尝到工业化水平退步的恶果。更糟糕的是，如果说工业化是社会进步的基础，那么工业化水平的退步是否会给社会的思想留下丑陋的疤痕呢？除非我们希望这个国家越来越落后，越来越贫穷，否则我们就必须想办法尽快恢复我们的工业。"
CD.2.a:0 "我开始想念以前的日子了……"

CD.3.t:0 "农业发展度提升"
CD.3.d:0 "农业乃立国之本，这是无可置疑的。人类或许能不穿羊毛衫、不用香皂、不开电灯，但绝对不可能不吃饭。而现在，农业补贴、拖拉机与化肥一同走进了乡村，我们开始探索将农业置于稳定高效的工业生产下。农民将锄头放回了仓库，市民第一次看到了大半摆满了的货架，粮食储备的稳定程度逐步上升。歌颂现代农业吧！它给予了每个人充足的粮食。歌颂现代农业吧！它将大量的劳动力从田间解放。歌颂现代农业吧！它将整个国家更紧密地团结在一起。此时此刻，无论东南西北，无论职业阶级，每个人都唱出了农业赞美诗的第一句歌词："
CD.3.a:0 "“面包万岁！”"
CD.4.t:0 "农业发展度下降"
CD.4.d:0 "一个农民工突然离开了城市，他的家人催促他回去帮忙收割小麦；一个农民拿出仓库里尘封已久的镰刀，看着收购商把拖拉机开走；化肥厂工人摸了摸越来越薄的钱包，看向空荡的超市货架……虽然谁也不愿意承认，我国的现代化农业正在走向解体。或许，这次解体起源于一笔农业补贴的“消失”；或许，这次解体起源于燃油价格的上涨；或许，这次解体是笼罩在乡村上的传统观念在作祟。无论如何，我国的现代化农业出现了急剧的倒退。现在所有人都捂紧了钱包，生怕上涨的粮价破坏他们原来的生活。我们必须要立刻阻止进一步的倒退，不然，人们很快就会愤怒地冲上街头，举起写着红字的旗帜："
CD.4.a:0 "“为了面包！”"

CD.5.t:0 "军事职业化提升"
CD.5.d:0 "是什么造就了一支强大的军队？过去的众多战争告诉了我们，战争的主体永远是人，是使用武器的士兵和指挥士兵的军官。一群大字不识、毫无经验的农民只会一哄而散，就算他们拿着的是最好的步枪；一群受过基本教育与军事教育的士兵能高效地完成任务，就算他们拿着的还是大战时的老古董。而现在，由于我们对于军事素质的着重提升，军事学院每周都能提出新的理论见解，军官们不再会轻视军纪或胡乱指挥，士兵们打枪的准头都提升了不少。有这样一支精锐的职业军队，又何愁外部的敌人呢？"
CD.5.a:0 "要是敌人来了，可不能只有猎枪！"
CD.6.t:0 "军事职业化下降"
CD.6.d:0 "敌人在哪里？政府里的老爷们说不知道，于是裁撤了军事研究经费与军饷；军官们说不知道，于是整天在军营里饮酒纵乐、“军法处置”士兵；士兵们说不知道，于是放下了枪杆子回去种地……或许我国在短期内没有一个显著的外部威胁，又或许我们只是不愿意面对，但我国这种懒散的氛围已经严重地损害了军队，将我们建设的现代化职业军队摧毁了个大半。敌人到底在哪里？不知道。但没有一个人希望头上顶着把枪的时候才恍然大悟，发觉敌人就在身边。"
CD.6.a:0 "这敌人啊，可就藏在每个国民心里。"

CD.7.t:0 "生活水平提升"
CD.7.d:0 "在谈论目标、理想、主义之前，我们首先都有着同样的想法：要活的更好。这确实是历史上每一个政府向国民许诺的，也是每一个政府都应该做的——不管是为了理想还是为了生存，但我们确实做到了这点。农民欣喜地看着比往年更盈满的粮仓，数着厚厚的钞票；工人较以往更精神充沛地下班，在酒馆里点了过去会觉得心疼的肉排；白领松开柔顺的领带，拿起从海外进口的咖啡……每个人都活的更好了，不是吗？"
CD.7.a:0 "好好干，生活会越来越甜！"
CD.8.t:0 "生活水平下降"
CD.8.d:0 "虽然这确实不是一蹴而就的，最近每个人开始觉得生活不尽人意了。不知从什么时候起，我们必须要干的更多、工作更久，才能换到比原来更少的物质。这是因为什么？是因为经济发展的滞后，还是因为进出口的受阻？是因为过于强大的垄断组织，还是因为农业生产模式的倒退？总之，每个人都能感觉到的就是，生活越来越艰难了——这对我们可不是什么好事。每个政府都向民众许诺要带来更好的生活，而我们却失败了。无论如何，我们必须要尽快开始提振生活水平了。不然，人们就要重新谈论起“理想”与“主义”了……"
CD.8.a:0 "水能载舟，亦能覆舟。"

CD.9.t:0 "自然条件提升"
CD.9.d:0 "自然就是我们所有人的衣食父母。我们呼吸的空气、饮用的水、燃烧的煤炭，这都是自然提供给我们的。正因如此，我们更需要维护好这个自然，不是吗？于是，我们设置了环保补贴、禁止高耸的烟囱、阻止过度的开垦放牧……这一切值得吗？或许在过去，人们还会质疑这一点。但现在，我国的环保事业迈上了一个新的阶梯：再无恶臭的小河，再无得肺病的孩童，再无疯狂的失控动植物！当每个人深吸一口气、享受从未如此清新的空气时，他们一定会感慨：人类与自然绝不存在什么对立关系。只有保护好大自然，才能保护好人类的未来！"
CD.9.a:0 "或许没这么宏伟，但肺病的发病率确实下降了，不是吗？"
CD.10.t:0 "自然条件下降"
CD.10.d:0 "心急如焚的工厂厂长赶走了环保官员，惦记着因为肺病送进医院的女儿；愤怒的农民在田地上挥舞草叉威吓村长，即使这片田地已几乎种不出什么；议员对环保补贴法案投下反对票，担心煤矿企业会由于矿藏枯竭停止资助……环保是一个十分抽象的话题，但回旋镖会狠狠地砸在每一个反对环保的人的头上。由于放任，我国的环保事业受到了严重的挫折，而这已经作用于我国国民的生产生活，影响了我国的各类产业。我们必须要迅速做出行动了，不然，对于环保的忽视绝对会导致我国社会问题与经济问题的全面爆发——这是每个人都不愿看到的。"
CD.10.a:0 "至少，没有人希望自己的孩子得肺病……"

CD.11.t:0 "学术氛围提升"
CD.11.d:0 "学生们都或多或少地听过那些故事，著名的科学家过着清贫的日子，使用简陋的实验器具，最终提出了一个划时代的结论。不知他们除了感慨以外是否有思考过，若是有更先进的实验环境、更好的待遇与更多的助手，这些顶尖的头脑将创造出多么伟大的成果！而现在，我们已经重视起了这个问题。从打破垄断式的学术界，到用物质手段奖励每个科研工作者，再到树立全社会对科技发展的重视与尊重，我们使出了全幅本领，试图让科研工作带动全社会的快速发展。或许现在享福的是科研工作者，但在几年之后，每个人都能从科学进步中分一杯羹。"
CD.11.a:0 "没有科学，我们不过是山洞里的原始人。"
CD.12.t:0 "学术氛围下降"
CD.12.d:0 "此时此刻，一名研究助手抱着行李茫然地站在研究所的大门前。自己究竟是为何被开除的呢？直接的原因，是弄坏了本来就紧缺的实验器具；间接的原因，或许是因为所里没钱了吧。这样的悲剧在我国各处正连续地发生，究其原因，这是我们对学术的忽视导致的。建立一个优良的学术氛围非常困难，但毁掉它却只需要一笔经费的延迟、一篇攻击科研的文章……总之，在我国学术界彻底崩溃或选择投敌前，我们必须要做些什么……"
CD.12.a:0 "不然我们就只能拿石头打火了。"

