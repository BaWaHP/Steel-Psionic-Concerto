###发展度###
###工业###
industrial_development_generic_tt:0 "\n§Y当前工业发展度点数为:[?industrial_development_amount]\n当前点数的每月增长为:[GetIndDev]\n达到200点会进入下一等级！§!"
primitive_industry:0 "原始工业"
primitive_industry_desc:0 "我们并没有什么工业可言，只不过是随手制作的工具，最原始的那种。"
handcraft_industry:0 "个体手工业"
handcraft_industry_desc:0 "我们有某些人掌握了更多的制作技巧，并将其发展为自己的专长。"
early_factory_industry:0 "工场手工业"
early_factory_industry_desc:0 "我们能够组织更多人进行工业劳动，不过依然只能大量依靠双手进行劳动。"
factory_industry:0 "机器大工业"
factory_industry_desc:0 "我们能够使用机械代替人工进行小规模生产。"
grouped_factory_industry:0 "大型工业园区"
grouped_factory_industry_desc:0 "我们拥有大量许多工厂组成的工业园区进行高效的工业生产。"
innovative_industry:0 "创新型工业"
innovative_industry_desc:0 "我们发达的工业在另一方面促进了自身的发展，不断有新的想法被提出，被实施，我们工业生产的效率也因此飞速提升。"
###农业###
agricultural_development_generic_tt:0 "\n§Y当前农业发展度点数为:[?agricultural_development_amount]\n当前点数的每月增长为:[GetArgDev]\n达到200点会进入下一等级！§!"
primitive_agriculture:0 "刀耕火种的农业"
primitive_agriculture_desc:0 "我们只能进行最原始的农业劳动。"
self_efficient_agriculture:0 "自给自足的小农经济"
self_efficient_agriculture_desc:0 "我们每个人进行的农业生产因为比较原始，只不过刚刚够自己使用罢了。"
weak_agriculture:0 "羸弱的基础农业"
weak_agriculture_desc:0 "我们拥有一定规模的农业生产，不过极其脆弱，任何外力都可能将其摧毁。"
modern_agriculture:0 "现代化农业"
modern_agriculture_desc:0 "我们的农业生产进行了相当程度的现代化，我们拥有更多的手段去干预农作物的生长和收获来保证我们的产量稳定。"
half_auto_agriculture:0 "半机械化农业"
half_auto_agriculture_desc:0 "我们开始尝试在农业生产中引入机械化技术，能够在解放人力的同时大量提升农业生产效率。"
mechanized_agriculture:0 "机械化农业"
mechanized_agriculture_desc:0 "我们的农业生产已经基本由机械接手，我们只需定下大的方向，其余所有的细枝末节都由机械来完成。"
###军队###
military_development_generic_tt:0 "\n§Y当前军队职业度点数为:[?military_development_amount]\n当前点数的每月增长为:[GetMilDev]\n达到200点会进入下一等级！§!"
primitive_army:0 "原始军队"
primitive_army_desc:0 "我们所谓的军队不过就是随便一些人拿起了武器而已。"
unorganized_army:0 "散兵游勇"
unorganized_army_desc:0 "我们的军队虽然经过了一些训练不过依然没有纪律性，只不过是一盘散沙。"
experienced_army:0 "经验式指挥与训练"
experienced_army_desc:0 "我们总结出了一些经验用于指挥与训练上，但并没有形成完整的体系，仍然处于探索阶段。"
very_experienced_army:0 "军事理论化"
very_experienced_army_desc:0 "我们的经验逐渐累积终于成为了完整的理论体系，能够为我们的部队提供一个明确的方向。"
advanced_army:0 "高级军官学院与规范训练"
advanced_army_desc:0 "我们能够通过常年的学习和经验的累积建立起学院体系，让新晋军官能够节省大部分的时间，直接接触成熟的理论。"
innovative_army:0 "创新式军事理论"
innovative_army_desc:0 "我们富有创新精神的军官能够不断地提出新的理论去为我们的部队提供更好的训练方式和作战方式。"
###民生###
living_standard_development_generic_tt:0 "\n§Y当前人民生活水平点数为:[?living_standard_development_amount]\n当前点数的每月增长为:[GetLivDev]\n达到200点会进入下一等级！§!\n\n注：§R在战争状态下，§!§Y生活水平每月自动§!§R-4。§!"
death_everywhere:0 "饿殍遍野"
death_everywhere_desc:0 "我们的民众连最基本的食物需求也无法得到满足，饿死甚至是常事。"
struggle_to_survive:0 "民生凋敝"
struggle_to_survive_desc:0 "我们的民众生活处于十分窘迫的地步，虽然不会大面积的饿死但依然求生艰难。"
hard_to_survive:0 "衣食成忧"
hard_to_survive_desc:0 "虽然民众们的生活相较稳定了下来，但依然要不断努力才能堪堪满足自己最基本的需求。"
normally_living:0 "基本温饱"
normally_living_desc:0 "至少在吃穿等基本需求上面，他们不用担心了。"
extra_living:0 "活有余裕"
extra_living_desc:0 "在满足了基本需求之外，他们还能去试着干一些自己感兴趣的东西。"
best_living:0 "高级追求"
best_living_desc:0 "我们的民众根本不用担心基本的需求，他们可以腾出大量的精力和时间去追求更高级的需求。"
###自然环境###
environment_development_generic_tt:0 "\n§Y当前自然环境水平点数为:[?environment_development_amount]\n当前点数的每月增长为:[GetEnvDev]\n达到200点会进入下一等级！§!"
hazard_zone:0 "生命禁区"
hazard_zone_desc:0 "在这里，基本没有生命能够存活，更别说居住。"
unhabitable:0 "恶劣的生存环境"
unhabitable_desc:0 "只有少数生命能够在这种地方存活，对于其他生命来说，不使用防护措施在这里行动有些危险。"
uncomfortable:0 "不适宜的生存环境"
uncomfortable_desc:0 "在这里生活虽然不至于致命，但也挺难受的。"
controlled_pollution:0 "可控范围内的污染"
controlled_pollution_desc:0 "我们能够将污染控制在一定范围内，让他的影响最小化，污染也还在那里，并没有消失。"
relatively_comfortable:0 "相对宜居"
relatively_comfortable_desc:0 "这里对于生物来说已经是相当宜居了，虽然依然存在一定程度的污染，但已经无伤大雅。"
real_natural_environment:0 "大自然本该有的样子"
real_natural_environment_desc:0 "就是它本该有的样子，没什么额外的东西。"
###学术氛围###
research_development_generic_tt:0 "\n§Y当前学术氛围点数为:[?research_development_amount]\n当前点数的每月增长为:[GetResDev]\n达到200点会进入下一等级！§!"
fuck_the_science:0 "不学无术"
fuck_the_science_desc:0 "在大多数人眼中，搞科研的不必铲粪的厉害多少。"
nobody_cares:0 "普遍忽视"
nobody_cares_desc:0 "有少部分人会去进行学习和研究，但也只是少部分，绝大部分人对此并不感兴趣。"
few_cares:0 "不被重视"
few_cares_desc:0 "虽然有很多人意识到了需要学术的重要性，但它依然不受重视。"
fake_exists:0 "学术造假"
fake_exists_desc:0 "有越来越多的人投身学术之中，但有一部分只是借此谋求利益，并没有真正推动学术发展。"
standard_research:0 "规范性学术"
standard_research_desc:0 "我们的学术界已经拥有了完善的规范性制度，学术界也越来越受到重视。"
willing_research:0 "我们终将知道，我们必须知道"
willing_research_desc:0 "对我们而言，学术研究是非常重要的事情，我们将会不断地前行探索来满足我们的好奇心，但我们的好奇心永无止境。"

###产业政策###
###环境###
ai_environment_policy:0 "ai或未完成国家专属环境政策"
ai_environment_policy_desc:0 "作为玩家应该看不到这玩意才是。不过开启了debug模式下的权限。"
EP_barely_nothing:0 "毫无规章"
EP_barely_nothing_desc:0 "我们没有余力去对环境污染进行管理，或许以后可以，但那也是以后的事情。"
EP_minimum_control:0 "最低限度的监测"
EP_minimum_control_desc:0 "我们至少会进行最低限度的监测来防止一些剧毒物质在没有处理的情况下流入自然界。"
EP_more_observation:0 "广泛监测"
EP_more_observation_desc:0 "我们将扩大监测范围和力度来对污染进行控制。"
EP_government_target:0 "政府的目标"
EP_government_target_desc:0 "控制污染已经提上议程，我们必须对其进行更详细的立法和监控来完成目标。"
EP_more_limitations:0 "更多限制与罚款"
EP_more_limitations_desc:0 "我们会对排放进行更多的限制来控制污染，并且对于不遵守法令的企业进行一定程度上的罚款来处罚他们。"
EP_maximum_punishment:0 "严重罚款"
EP_maximum_punishment_desc:0 "对于我们来说污染控制十分重要，我们将会对不合规章排放的企业进行严厉的批评和严重的罚款，对于他们来说，没什么比这个更恐怖了。"
###资源开采###
ai_resource_policy:0 "未完成国家专属资源政策"
ai_resource_policy_desc:0 "作为玩家应该看不到这玩意才是。不过开启了debug模式下的权限。"
RP_decide_themselves:0 "政府不介入"
RP_decide_themselves_desc:0 "资源开采完全交由民间组织或公司负责，我们所能获取的资源相当有限。"
RP_basic_funding:0 "资助研究"
RP_basic_funding_desc:0 "我们将会拨款对开采机构进行资助，虽然对我们获取资源有所帮助不过也仅限于此。"
RP_asisting_research:0 "协助勘测"
RP_asisting_research_desc:0 "我们将调用一部分人力物力进行协助勘测，能够帮助开采机构更快的确定战略资源产地。"
RP_locating_resource:0 "选定地点"
RP_locating_resource_desc:0 "我们将投入相当的人力物力完成全部的勘测工作，开采机构能够集中大部分力量进行资源开采。"
RP_extensive_mining:0 "广泛开采"
RP_extensive_mining_desc:0 "我们将大幅度扩大勘测范围以寻找所有可供开采的战略资源。"
RP_total_funding:0 "全面援助"
RP_total_funding_desc:0 "从勘测到开采再到运输和提炼，我们将在每一个环节上对开采进行大力援助以帮助我们获取更多的战略资源。"
###企业###
ai_industry_policy:0 "ai或未完成国家专属企业政策"
ai_industry_policy_desc:0 "作为玩家应该看不到这玩意才是。不过开启了debug模式下的权限。"
IP_nationalization:0 "国有化企业"
IP_nationalization_desc:0 "企业为国家所有，收入和开支皆由政府管理。"
IP_no_intervention:0 "无干涉"
IP_no_intervention_desc:0 "所有私人企业应该自负盈亏，和我们没有关系。"
IP_basic_funds:0 "小规模企业补助"
IP_basic_funds_desc:0 "为了帮助经济发展，我们可以对一些企业进行小规模的补助来帮助他们。"
IP_creating_business:0 "创业计划"
IP_creating_business_desc:0 "我们将调拨资金去帮助创业者进行创业，来推动企业成长和更新。"
IP_funding_proj:0 "企业投资计划"
IP_funding_proj_desc:0 "我们的经济学家会制定完备的投资计划来帮助企业运营和成长。"
IP_cutting_taxes:0 "削减企业税收"
IP_cutting_taxes_desc:0 "为了帮助企业生存和运行，我们可以削减一部分企业税。"
IP_more_business:0 "全面新兴企业补贴"
IP_more_business_desc:0 "对于代表未来的新兴企业我们会提供全面而大量的补助来帮助他们，同时促进经济发展。"
###劳工###
ai_working_policy:0 "ai或未完成国家专属劳工政策"
ai_working_policy_desc:0 "作为玩家应该看不到这玩意才是。不过开启了debug模式下的权限。"
WP_no_specific_laws:0 "毫无保障"
WP_no_specific_laws_desc:0 "工人们的待遇到底怎样是雇佣他们的人决定的，我们不该横加干预。"
WP_symbolic_laws:0 "象征性立法"
WP_symbolic_laws_desc:0 "为了劳工立法已经是我们能做的一切了，落实度如何我们没能力去干预。"
WP_basic_laws:0 "基本安全保障"
WP_basic_laws_desc:0 "无论如何我们至少应该保障劳工的人身安全，哪怕是从雇佣者的角度上来讲这也是收益更高的选择。"
WP_limited_laws:0 "最低工资和小时工作制"
WP_limited_laws_desc:0 "我们应该保障劳工至少拥有维持生活的工资和能够保证身心健康的工作时间。"
WP_better_laws:0 "违反者负刑事责任"
WP_better_laws_desc:0 "为了更彻底的保障劳工的权益，我们将劳工法写入刑法，所有违反劳工法的人都将受到严厉的惩罚。"
WP_worker_council:0 "工人理事会"
WP_worker_council_desc:0 "只有将权力交到工人手中才能使劳工权利受到更彻底的保障，为此我们将组织工人们组成工人理事会，由他们对相关事务进行定夺。"
###农业###
ai_agricultural_policy:0 "ai或未完成国家专属农业政策"
ai_agricultural_policy_desc:0 "作为玩家应该看不到这玩意才是。不过开启了debug模式下的权限。"
AP_no_funds:0 "无农业补贴"
AP_no_funds_desc:0 "盈亏自负，和我们没关系。"
AP_basic_funds:0 "基础农业补贴"
AP_basic_funds_desc:0 "农业回报周期较长，我们需要提供一些基础的补贴来帮助农民们度过最艰难的时期。"
AP_advanced_funds:0 "中等农业补贴"
AP_advanced_funds_desc:0 "我们可以提供更多的补贴来帮助农民购置种子，运输产品等进一步减轻农民的压力。"
AP_better_funds:0 "高等农业补贴"
AP_better_funds_desc:0 "我们将调拨更多资金来帮助农民，例如购置大型农业机械，修建大型养殖场等来促进农业的发展。"
AP_cutting_taxes:0 "取消农业税收"
AP_cutting_taxes_desc:0 "为了进一步减轻农民的压力，促进农业发展，我们决定取消农业税收。"
AP_endless_funds:0 "以农为本"
AP_endless_funds_desc:0 "民以食为天，一切都是依靠农民，我们必须尽全力，多方面的推动农业发展。"
###科研###
ai_research_policy:0 "ai或未完成国家专属科研政策"
ai_research_policy_desc:0 "作为玩家应该看不到这玩意才是。不过开启了debug模式下的权限。"
RP_no_funds:0 "无额外资金供应"
RP_no_funds_desc:0 "科研人员应该对自己的研究自负盈亏，我们没必要提供更多的资金。"
RP_basic_funds:0 "有限科研资金"
RP_basic_funds_desc:0 "我们需要额外提供一些资金帮助科研人员进行研究。"
RP_limited_funds:0 "基本科研资金"
RP_limited_funds_desc:0 "我们将提供足以维持科研基本运转的资金来帮助研究。"
RP_advanced_funds:0 "中等科研资金"
RP_advanced_funds_desc:0 "我们会提供更多的资金来帮助科研人员进行更大规模的研究。"
RP_even_more_funds:0 "高等科研资金"
RP_even_more_funds_desc:0 "我们将抽出相当部分的资金来帮助科研，例如建造更先进，更大规模的科研设施，以及为科学家们提供更好的待遇。"
RP_full_power_in_science:0 "全力支持"
RP_full_power_in_science_desc:0 "我们将尽全力满足科研人员们的每个需求来推动我们的科研事业。"

###国家政策###
###媒体###
ai_media_policy:0 "ai或未完成国家专属媒体政策"
ai_media_policy_desc:0 "作为玩家应该看不到这玩意才是。不过开启了debug模式下的权限。"
MP_freedom_speech:0 "言论自由"
MP_freedom_speech_desc:0 "每个人都有发表自己观点的自由，这并非是政府可以干涉的。"
MP_mixed_media:0 "受限制的言论自由"
MP_mixed_media_desc:0 "我们尊重每个人说话的自由，但底线不容侵犯，偶尔，这份自由也会受到限制。"
MP_funding_media:0 "官方媒体占主导地位"
MP_funding_media_desc:0 "我们必须保证我们的声音才是最大的，来避免民众受到误导。"
MP_only_our_voice:0 "仅限官方媒体"
MP_only_our_voice_desc:0 "让私人运营媒体是危险的，他们为了关注无所不用其极，所以我们必须排除这个危险因素。"
###福利###
ai_subsidies_policy:0 "ai或未完成国家专属福利政策"
ai_subsidies_policy_desc:0 "作为玩家应该看不到这玩意才是。不过开启了debug模式下的权限。"
SP_no_funds:0 "无补贴"
SP_no_funds_desc:0 "公民的生活应该由他们自己负责，我们不会为此出一分钱。"
SP_sybolized_funds:0 "象征性的福利补贴"
SP_sybolized_funds_desc:0 "我们会象征性的给一些补贴来安慰那些人，不过要想依靠这份补贴生活是不可能的。"
SP_basic_funds:0 "基本福利补贴"
SP_basic_funds_desc:0 "我们提供的补贴能够使一个人至少维持在最低的生活水平而不至于饿死冻死。"
SP_advanced_funds:0 "进一步的福利补贴"
SP_advanced_funds_desc:0 "我们会为公民提供除了基本补贴外的一些额外补贴，例如一定程度的医疗保障，或者购房补贴。"
SP_no_worries_for_food:0 "基本需求保障"
SP_no_worries_for_food_desc:0 "我们将会出资保证公民的全部基本需求，例如饮食，医疗，住房等。"
SP_full_scale_help:0 "全面社会保障"
SP_full_scale_help_desc:0 "我们会对公民的绝大部分需求提供保障，除基本需求外例如出行需求，以及建造更多的公共便民设施。"
###魔法###
ai_magician_policy:0 "ai或未完成国家专属魔法政策"
ai_magician_policy_desc:0 "作为玩家应该看不到这玩意才是。不过开启了debug模式下的权限。"
MP_fuck_off_the_magician:0 "全面禁止魔法使用"
MP_fuck_off_the_magician_desc:0 "魔法作为一种我们从未接触过的力量，我们不知道使用魔法会有什么代价或者后果，我们必须禁止魔法的使用以防万一。"
MP_research_only:0 "仅限学术用途"
MP_research_only_desc:0 "我们必须将魔法限制在实验室内，以保证在了解魔法的使用与本质时保证安全。"
MP_strict_control:0 "严格政府管制"
MP_strict_control_desc:0 "尽管我们开放了魔法使用，严格的管制仍会是必要的，以防意外发生。"
MP_open_for_application:0 "开放使用证书申请"
MP_open_for_application_desc:0 "在经过考试与认证个人证明能够安全稳定的控制魔法之后，我们可以对其发放使用证书许可其使用。"
MP_no_restriction:0 "无管制"
MP_no_restriction_desc:0 "我们没必要限制魔法的使用，它只是一种力量而已。"
###情报机关###
ai_secret_police_policy:0 "ai或未完成国家专属情报机关政策"
ai_secret_police_policy_desc:0 "作为玩家应该看不到这玩意才是。不过开启了debug模式下的权限。"
SPP_no_secreat_police:0 "无秘密警察"
SPP_no_secreat_police_desc:0 "我们没有能力或者意愿去组建情报机构。"
SPP_police_special_unit:0 "警察机关特殊调查局"
SPP_police_special_unit_desc:0 "我们的情报机构隶属于警察机关，虽然存在但是权力和能力相当受限。"
SPP_limited_national_dep:0 "受限的情报机构"
SPP_limited_national_dep_desc:0 "我们成立了独立的情报机构，但他依然受到其他机关的制约和限制。"
SPP_unlimited_national_dep:0 "中央情报机构"
SPP_unlimited_national_dep_desc:0 "我们成立了国家级别的情报机构，拥有了进行正常间谍和反间谍活动所需的权力和能力。"
SPP_cia_everywhere:0 "无处不在的情报机构"
SPP_cia_everywhere_desc:0 "我们的情报机构已经渗透进各个角落，随时准备对叛徒和间谍发起致命一击。"
SPP_we_are_watching_you:0 "全面监控"
SPP_we_are_watching_you_desc:0 "我们的情报机构已经在几乎所有的地方安插了自己的眼线，并努力向外扩展，这将保护我们处于敌人的渗透之外。"
###女性权利###
ai_female_policy:0 "ai或未完成国家专属女性政策"
ai_female_policy_desc:0 "作为玩家应该看不到这玩意才是。不过开启了debug模式下的权限。"
FP_traditional_place:0 "传统地位"
FP_traditional_place_desc:0 "女性就像以前一样该干什么就干什么就好，不要想着多管闲事。"
FP_calling_for_equality:0 "呼吁平等"
FP_calling_for_equality_desc:0 "我们将向民众呼吁平等对待男女，但真正的平等依旧前途漫漫。"
FP_working_euqality:0 "职场平等"
FP_working_euqality_desc:0 "我们至少可以做到在职场上男女可以受到平等的待遇。"
FP_joining_the_army:0 "女性参军"
FP_joining_the_army_desc:0 "我们将开放女性参军的渠道，让她们也可以握住武器保卫自己的家园。"
FP_joining_the_poitics:0 "男女平等"
FP_joining_the_poitics_desc:0 "男女除了生理上的差别外并没有什么其他的不同，人人生而平等。"
###教育###
ai_education_policy:0 "ai或未完成国家专属教育政策"
ai_education_policy_desc:0 "作为玩家应该看不到这玩意才是。不过开启了debug模式下的权限。"
EP_minimum_spending:0 "无义务教育"
EP_minimum_spending_desc:0 "是否进入学校接受教育是个人和家庭的选择，我们不能横加干涉。"
EP_wooden_schools:0 "政府教育拨款"
EP_wooden_schools_desc:0 "我们会调拨一部分款项来资助适龄人进入学校。"
EP_sharing_textbooks:0 "六年义务教育"
EP_sharing_textbooks_desc:0 "我们将拨款和立法保证每个适龄人至少接受六年的小学义务基础教育。"
EP_modern_textbooks:0 "九年义务教育"
EP_modern_textbooks_desc:0 "我们将拨款和立法保证每个适龄人至少接受九年的进阶义务教育。"
EP_helping_the_countryside:0 "十二年义务教育"
EP_helping_the_countryside_desc:0 "我们将拨款和立法保证每个适龄人至少接受十二年的高等中学义务教育。"
EP_university_cities:0 "高等教育义务化"
EP_university_cities_desc:0 "我们会将高等教育也列入义务教育之中，来促进人才的培养和社会整体教育水平的大幅提升。"
###种族与文化###
###特殊魔法###
SM_no_special_magic:0 "无特殊魔法"
SM_no_special_magic_desc:0 "就跟世界上绝大多数国家一样，我国在魔法的研究才刚刚迈开步子。既没有那些古老魔法国度的传承，也没有称得上道的特殊成果。"
SM_crystal_secret_code:0 "水晶秘典"
SM_crystal_secret_code_desc:0 "大公国拥有源远流长的魔法史，丰富的法术存贮和魔法使用经验甚至可以说是大公国的立国之本，我们对于生产魔法有关的一切物品有着特殊的制造技巧，但这也导致了我们与最前沿的魔法技术有些割裂，不易研发新产品。"
SM_adpative_magic:0 "环境适应魔法"
SM_adpative_magic_desc:0 "比起世界上绝大多数政权，白洋海人鱼族在适应各类环境的魔法研究上取得了长足的进步。尽管最初目的仅仅为克服人鱼无法生活在陆地上的缺陷，环境适应相关的魔法学科正逐渐成为更加广泛运用的技术。"
SM_heart_of_the_mountain:0 "大山之心"
SM_heart_of_the_mountain_desc:0 ""
SM_partial_mimicry:0 "局部拟态"
SM_partial_mimicry_desc:0 ""
SM_extreme_override:0 "极限过载"
SM_extreme_override_desc:0 "数代人的努力与牺牲，最终为安全局换来了足以将个体能力发挥到极致的魔法。通过将身体使用自动化魔法回路重组，使用极限过载技术的法师可以将自身的肉体强度，魔力交换率提高到远超肉体极限的顶峰，借此执行高烈度的战斗任务。然而，过度使用过载魔法会对身体造成不可逆损伤，重组程度过高会导致肉体破碎。"
SM_rigil_kent:0 "疾驰姿态"
SM_rigil_kent_desc:0 "展现半人马的完全姿态，上半身仍是原来的头、眼、鼻、耳、口、双臂和双手，而下半身变化为有着四条腿、长躯和马尾。拥有与巨大身躯不相称的机敏性、惊人的速度与跳跃力，力量也有所提高，前腿或后腿的踢击可以轻易挡住攻击。"
###种族###
LR_humans:0 "人类"
LR_humans_desc:0 "人类是世界上遍布最为广泛的族群。该族群身高平均在170cm上下（极小概率可能诞生巨人或侏儒），寿命在60~100年之间，体毛缺失，体格正常。人类的肤色从白色到黑色不等，根据民族，地理位置和性别的区分也会导致他们在外貌特征上产生一定的区别。人类使用的语言也从象形文字到字母文字不等。由于民族数量庞大，人类内部经常进行战争。尽管如此，人类依旧是世界上人口最多的种族。由于民族的不同，人类之间的魔法天赋也可能产生一定变化。"
LR_Subhuman:0 "亚人"
LR_Subhuman_desc:0 ""
LR_carnivorous_orcs:0 "肉食兽人"
LR_carnivorous_orcs_desc:0 ""
LR_herbivorous_orcs:0 "草食兽人"
LR_herbivorous_orcs_desc:0 ""
LR_omnivorous_orcs:0 "杂食兽人"
LR_omnivorous_orcs_desc:0 ""
LR_demons:0 "魔族"
LR_demons_desc:0 ""
LR_monsters:0 "魔兽"
LR_monsters_desc:0 ""
LR_advanced_magician:0 "高魔个体"
LR_advanced_magician_desc:0 ""
LR_intellectual_android:0 "智械"
LR_intellectual_android_desc:0 ""
LR_race_equity:0 "物种平等"
LR_race_equity_desc:0 ""
LR_naga_racism:0 "纳卡教种族主义"
LR_naga_racism_desc:0 "纳卡教种族主义是指单纯存在于提特兰地区的宗教-文化种族意识，以纳卡教教义中的种族划分人类与魔兽，而并非以南巴斯蒂亚种族划分去定义，在这一定义下，只要种族外貌近似人类的就可以是人类，并没有亚人之分，反而其他的所有种族都被归类为恶魔，遭到歧视。"
###具体人种###
SR_LingRen:0 "麟人"
SR_LingRen_desc:0 "麟人主要分布于东巴斯蒂亚一带，是远乡王国的主导民族。该名字起源于这个民族祖先所崇拜的神兽“麒麟”。是远征者后裔的他们崇尚开拓和冒险精神。他们同样追求和平，不愿挑起与他国的战争，但与此同时他们还愿意为了扩张在北巴斯蒂亚的资源领地而同他人大打出手。麟人的主要特征是黄色的皮肤，使用象形文字作为他们的主要语言。"
SR_Celydreans:0 "西莉迪亚人"
SR_Celydreans_desc:0 ""
SR_Peorians:0 "皮奥瑞亚人"
SR_Peorians_desc:0 ""
SR_Auroretians:0 "奥罗日亚人"
SR_Auroretians_desc:0 "奥罗日亚人主要分布在东巴斯蒂亚一带，是奥罗日亚联合王国的主导民族，但同时也在皮奥瑞亚共和国，西莉迪亚共和国，西莉迪亚公社以及吉拉尼亚公国中占据相当数量的人口比例。该名字起源于南巴斯蒂亚语中的“极光”一词。奥罗日亚人是南巴斯蒂亚动荡时期不得不向动迁徙的难民族群中最大的一系，由于故乡惨遭毁灭，他们选择了追求全新伟大帝国的道路，并且支持侵略性的外交政策。奥罗日亚人的主要特征的白色的皮肤，使用字母文字作为他们的语言。"
SR_Wome_people:0 "沃姆人"
SR_Wome_people_desc:0 ""
SR_Gorvians:0 "戈尔维亚人"
SR_Gorvians_desc:0 ""
SR_Sbridgens:0 "斯布里奇人"
SR_Sbridgens_desc:0 ""
SR_Virtuoso:0 "维尔陶人"
SR_Virtuoso_desc:0 "维尔陶人起源于南巴斯蒂亚东部，是当地的原住民之一。目前主要分布在上维尔陶联合公国与克拉亚诺共和国境内，是上维尔陶联合公国的主体民族。该民族以独特的服装和豪爽的性格闻名于世，由于自身人口较少，因此他们更习惯依附于强大的民族，但同时他们的体格强度是南巴斯蒂亚东部地区民族中最好的一批。维尔陶人会为了保全自身而放弃争斗，因此也被南巴地区的其他民族称作“和平的白鹰”。 "
SR_suderian:0 "苏德瑞尔人"
SR_suderian_desc:0 "苏德瑞尔人是南巴斯蒂亚上的原住民，是这片大陆的主体民族。出于上古神话和宗教因素对非人种群有较强敌意，有较强的殉道士情节，因此在抵抗和征服异族尤其是非人种族时显得勇敢善战甚至可以说是残忍。"
SR_Hongolea_Centaur:0 "宏戈利亚半人马"
SR_Hongolea_Centaur_desc:0 ""
SR_Boyesco_ethnic_mixing:0 "波伊斯科种族混居"
SR_Boyesco_ethnic_mixing_desc:0 ""
SR_ink_elves:0 "墨精灵"
SR_ink_elves_desc:0 ""
SR_rabbitman:0 "兔人"
SR_rabbitman_desc:0 "兔人是一种身形矮小，体表多毛的兽人，主要分布在瑶海正中央的汀海岛的北部平原上，繁殖能力强。"
SR_rabbitman_n_tsubitman:0 "兔人与翼兔人"
SR_rabbitman_n_tsubitman_desc:0 "相对热衷于生育的兔人和传承了暴戾文化的翼兔人互相补齐对方的不足，在汀海岛上携手共进。"
SR_wingman:0 "翼人"
SR_crystals:0 "水晶族裔"
SR_crystals_desc:0 "生活在东巴斯蒂亚一带，受阿方斯恩泽而诞生的人形魔族，特征为白皮肤与红瞳，发色多为黑与金。先天受魔力滋润的内脏使水晶族裔寿命悠长，自然寿命为200-600岁，因魔法天赋所影响而有较大的波动，生性好战，崇尚强者为尊。"
SR_wuna_centaur:0 "于摩半人马"
SR_wuna_centaur_desc:0 ""
SR_tenians:0 "特尼安人"
SR_tenians_desc:0 ""
SR_white_ocean_mermaid:0 "白洋海人鱼族"
SR_white_ocean_mermaid_desc:0 "白洋海人鱼族主要分布在东巴斯蒂亚和东巴斯蒂亚东部沿海一带。是白洋海海洋政权的主导民族。该名字起源于白洋海人鱼族所居住的名为白洋的海域。白洋海人鱼族中人鱼占据主导地位，约莫有着一半的人口。崇尚和平而非暴力的他们将经商视作发展族群的未来之路，善于加工精密器械的他们经常会和东巴斯蒂亚周边国家达成协定并加工这些国家提供的原材料。作为少数没有被战争所波及到的族群之一，白洋海人鱼族还利用援助东巴斯蒂亚诸国的时机扩大了自身的影响力。白洋海人鱼族的主要特征为雪白的皮肤和纤细的身材，他们使用一种混合了象形文字和字母文字的语言，因为受到了来自东巴斯蒂亚诸国的影响。"
SR_midans:0 "米德人"
SR_midans_desc:0 "米德人是对迁入中巴斯蒂亚的大量南巴移民和少数原住民和东巴移民各族裔（主要还是苏德瑞尔人）的蔑称，经过旷日持久的伟大战争的米德人，形成了自己的族类认同，他们反对苏德瑞尔人式的种族偏见和狂热，相比更具有包容性更加团结也更加珍爱生命。"
SR_donvoltsk_centaurs:0 "顿伏茨克半人马"
SR_donvoltsk_centaurs_desc:0 ""
SR_owenderos:0 "欧文德洛人"
SR_owenderos_desc:0 ""
SR_unharmonized_multi_ethnic_states:0 "不和谐的多民族国家"
SR_unharmonized_multi_ethnic_states_desc:0 ""
SR_teotland_people:0 "提特兰人"
SR_teotland_people_desc:0 ""
SR_confused_national_construction:0 "迷茫的民族建构"
SR_confused_national_construction_desc:0 "这便是北提特兰近代的迷茫，半人马与人类早已没有差距，他们无比相似，文化高度相同，但是在近现代民族主义的冲击下，他们面对两个祖先之时迷茫了，他们有一部分觉得应该拥抱提特兰的古老传统，另一些人则认为他们已经形成了新的民族，应该脱离出了提特兰民族，这种争论不断的继续，直到某一位领导者接纳两者之中的任何一个。"
SR_verdes:0 "维尔德人"
SR_verdes_desc:0 "维尔德人作为民族主义浪潮中的后起之秀，他们自我的的民族身份认同更加接近混血民族，而非单一的提特兰人。在伟大解放者巴博维奇的带领下维尔德人获得了第一次的独立，现在又在独立元老卢日支的带领下荣获第二次的独立。"
SR_empire_five:0 "帝国五族"
SR_empire_five_desc:0 ""
SR_race_euqality:0 "民族平等"
SR_race_euqality_desc:0 "所谓的民族优劣只不过是压迫者为了转移矛盾而创造出的东西，我们或许有差别，但绝不是差距，任何民族都是如此。"
###种族政策###
RAP_suppression:0 "压迫性法律"
RAP_suppression_desc:0 "我们的种族才是最优秀的，其他种族的生物只有被我们无条件奴役才是最好的。"
RAP_lower_suppression:0 "压制性法律"
RAP_lower_suppression_desc:0 "为了社会的的稳定，我们只能给予其他种族部分权力，让我们的种族处于最顶端。"
RAP_discrimination:0 "歧视性法律"
RAP_discrimination_desc:0 "其他种族多多少少劣于我们，有些事情只有我们能干，有些权力只有我们能享受。"
RAP_legally_equality:0 "法律性平等"
RAP_legally_equality_desc:0 "我们将立法保障种族之间的平等，不过要所有人都承认这一点还需要一段时间。"
RAP_active_promotion:0 "积极推动平权"
RAP_active_promotion_desc:0 "在我们的国家所有种族都将是平等的，我们会在方方面面去推动他，实现它。"
###宗教政策###
RLP_religious_state:0 "神权国家"
RLP_religious_state_desc:0 "我们的一切事物都是围绕着我们的宗教进行，我们的宗教领袖便是我们的领导者。"
RLP_unreligious_state:0 "无神论国家"
RLP_unreligious_state_desc:0 "神是不存在的！"
RLP_national_religion:0 "国立宗教"
RLP_national_religion_desc:0 "我们民众拥有广泛且统一的信仰，虽然不能直接干预政治，但已经成为了我们国家的一部分。"
RLP_moralism:0 "道德主义"
RLP_moralism_desc:0 "我们生存完全是为了道德，我们所做的一切也都是为了道德。道德就是我们的标杆。"
RLP_pluralismm:0 "多元主义"
RLP_pluralismm_desc:0 "我们对于宗教是包容的态度，无论一个人保有什么样的立场，我们都相信是可以共存的。"
RLP_secularism:0 "世俗主义"
RLP_secularism_desc:0 "我们只有在宗教问题严重影响到民众时才会出手干预，并且对所有宗教一视同仁，但宗教也绝对不允许干涉我们政府的运行，宗教和政治本就应该是分离的。"
###性别法律###
SXP_recessing_policy:0 "倒退的性观念法令"
SXP_recessing_policy_desc:0 "对于每一个违反基本常理的人，我们都将采取最严厉的措施来防止他们影响社会风气。"
SXP_reactionary_policy:0 "反动的性观念法令"
SXP_reactionary_policy_desc:0 "我们在法律层面上反对不正常的性观念与癖好，但我们没有精力去处理他们。"
SXP_traditional_policy:0 "传统的性观念"
SXP_traditional_policy_desc:0 "我们并不反对性少数群体，但为了社会稳定我们也不能支持他们，无视他们是我们最好的选择。"
SXP_legally_equal:0 "性观念的平等"
SXP_legally_equal_desc:0 "对我们来说所有的性观念与相关癖好都是平等的，它们值得法律上的平等对待。"
SXP_active_role:0 "积极行动"
SXP_active_role_desc:0 "我们会在各个方面去积极推动不同性观念与相关癖好的平等进程，积极改变人们的观念。"

