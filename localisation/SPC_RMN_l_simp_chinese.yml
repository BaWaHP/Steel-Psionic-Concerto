###民族精神###
RMN_knights_of_the_frontier:0 "边疆骑士团"
RMN_knights_of_the_frontier_desc:0 "罗梦骑士团的历史悠久，即便在身为外族的沃姆帝国境内也声名远扬。作为古代抵御北方异族的第一道防线，骑士团对南方诸国的发展都做出了杰出贡献，更是在北进运动时期成为了沟通南北的重要桥梁。然而，时过境迁，古老的骑士团似乎愈发地难以跟上时代的脚步，随着北巴斯蒂亚各地陷入混乱，魔兽的威胁早就不是什么大事了。慢慢地，大家似乎越来越不把这个守旧的骑士团当回事了…"
RMN_terrible_environment:0 "恶劣的自然环境"
RMN_terrible_environment_desc:0 "我们的领地自然环境十分恶劣。许多山地地形错综复杂，常规的道路难以开通，高山地区更是终年积雪，风暴不停。与此同时，魔力浓度则又是高得离谱，野生动物造成的威胁甚至可以匹敌拿着火器的一般民兵。尽管客观上这里矿业资源丰富，结果上开发难度极高，就光是勘测所用的花费就远超出一般人想象。因此，我们的工业以及技术发展速度在很大程度上极为缓慢，许多定居点也难以发展起来，这将会是十分严重的问题。"
RMN_unsustainable_development:0 "不可持续的发展"
RMN_unsustainable_development_desc:0 "随着来自南方的支援进一步减少，骑士团的发展陷入了极大的停滞。我们恶劣的自然环境使得鲜有新定居者愿意移居此地，加之南方诸国不愿进一步援助，很快骑士团就没有足够的人用了。重要的物资正一点点老化，而我们却没有能力维修他们。讽刺的是，考虑到北方魔兽入侵的危险早已式微，骑士团存在的必要慢慢成为了台面上主要的话题。不过，在那之前，恐怕我们会先因为缺乏补给而都冻死在这个鬼地方。"
RMN_tale_of_dream_lake:0 "梦之湖的传说"
RMN_tale_of_dream_lake_desc:0 "传说，在罗梦骑士团领地西北方边角，有一传说的湖泊。湖中定居着一位友好对待人类的高魔个体，传说它会实现任何通过考验，成功抵达湖前的冒险者的愿望。当然这事儿可信度欠佳，在冒险者联盟搞了几次大规模勘测行动后，大家也就把这传说当茶余饭后的笑料了。"

###领导人###
RMN_yvonne_murphy:0 "尤文·墨菲"
RMN_yvonne_murphy_desc:0 "尤文·墨菲是罗梦骑士团一位颇有名望的战士的长子，他从小便展现出了极高的战斗天赋，并且在他父亲的教育下忠于骑士团，逐渐积累声望，并在众望所归之下成为了团长。然而，同众人所期待的不同，即便是再优秀的团长，恐怕对于罗梦骑士团的衰弱也无能为力，有时候人确实胜不了天。\n\n作为罗梦骑士团很有可能的最后一位团长，尤文·墨菲可以挺起胸膛地告诉众人，他已经尽力了。北方极其恶劣的自然环境和南方毫无诚意的援助注定了他们的失败，至少，尤文本人和以他为代表的骑士团高层都对未来不抱有希望了。\n\n尽管如此，尤文本人还是希望对领地下的人民负责。只要他还活着站在北方一天，就绝不会允许任何来自混乱的北方的邪恶势力染指南方。所有的物资都会被尽可能高效地调动，无论如何，骑士团会撑到最后一刻——尽管这恐怕只是早或晚的简单选择题。\n\n或许，跟他自己一样，骑士团将消亡风雪之中，伴随着前人的牺牲，同后人的讥讽一道。"

