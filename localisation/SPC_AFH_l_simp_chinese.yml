###领导人###
AFH_Huang_Jiachen:0 "黄家成"
AFH_Huang_Jiachen_desc:0 "黄家成做梦也没想到自己会被推到今天的位置。同那些在白洋日夜灯红酒绿的权贵们不同，他只是出生在郊外的地主家的傻儿子。当然，说傻，他倒也没那么傻。他的父母足够聪明到要送他到大城市接受教育，也足够聪明到避开改革的浪潮，以及郑义的“新官三把火”。在接受了高等经济教育后，黄家成成功说服父母放弃本就不断没落的郊外的土地，同官府合作尽快兑现成新的资本，然后交给他在大城市开办新的业务——事实证明，这个选择十分明智，黄家成很快便跻身北远乡地区权贵之一。\n\n或许是相中了他的管理才能？又或者是看中了他作为商人的身份，在利益层面并不与许多权贵冲突的这一点？黄家成慢慢发觉自己被卷入了一场名为“政变”的漩涡中，受利益所诱惑的他难以自拔，最终连后路也不剩了。\n\n虽然名义上是贵族起义的领袖，黄家成的行为高度受限。许多起义政府所推行的政策，无论是在草案阶段，讨论阶段还是落实阶段，多数人都不把他的意见放在眼里。黄家成唯二有较高权限管理的便是起义政府的经济事宜和军事机关，前者主要是因为黄家成的能力优越，后者则是因为多数权贵没有管理军队的意愿（或者才能）。\n\n但是谁说傀儡没有梦想？或许他有一天会把那些试图将自己作为提线木偶的权贵们推翻，建立起属于自己的政权…"

