###民族精神###
AFH_weak_local_control:0 "地方控制力薄弱"
AFH_weak_local_control_desc:0 "我们的政府官员大多是新鲜面孔，他们缺乏在北远乡地区执政的经验。再优秀的学院也仅仅能教会他们如何管理城市人口，可北远乡广大的乡村地区成了我们的心头大患，更别说各地仍有大量革命党人，农民叛军和其它匪徒试图无视我们的管理。这使得我们在短时间内难以统筹各地的经济活动，不但工业发展受损，税务，募兵等方面也受到了严重的波及。"
AFH_support_from_aristocrats:0 "权贵支持"
AFH_support_from_aristocrats_desc:0 "郑义这些年在北远乡的统治可谓是不得人心，他非但没有改变父亲的错误，反而变本加厉，摆出一副自恃清高的样子对其他人的工作指指点点。看看他那所谓的“驾驭权贵”思想给北方带来了什么吧！遍地的匪患，民不聊生，就连权贵也过不了几天自在日子，敢问世界上哪个国家能闹出这样大的荒唐！如今，北远乡地区多数的权贵都支持我们反对郑义的战争。"
AFH_unprepared_war:0 "未经准备的战争"
AFH_unprepared_war_desc:0 "万万没想到的是，这个愚蠢的郑义居然连一群农民组织起来的叛乱都管不好！突如其来的大起义彻底打乱了我们的计划，为了防止该死的农民先我们一步夺得白洋的控制权，我们不得不提早发动了起义计划。然而，这样未经准备的战争是否可以成功，我们将不得不划上一个巨大的问号…"
AFH_prepared_attack:0 "精心准备的突袭"
AFH_prepared_attack_desc:0 "一切都如我们所计划的那样，白洋已归我手，愚蠢的郑义只得卷屁股滚蛋！不过，现在还不是放松的时候，让我们动员起提前准备好的精锐部队，向西部继续发动进攻，直到那个姓郑的神经病彻底滚出我们的故乡！"

