 ###决议###
 SPC_war_exhaustion_inwar_decisions:0 "厌战：战争期间"
 SPC_war_exhaustion_inwar_decisions_desc:0 "基于朴素的道德与正义感抑或是趋利避害的本能，我们的国民对战争都有着极大的误解。无论进攻性的还是防御性的战争，他们总是抱持置身事外、缺乏斗志的态度，这显然不利于我们与敌人的斗争。我们应当教导国民，作为自然界解决问题与纠纷的一种手段——战争是一种具有可行性的行为。没有几个人真正喜欢战场上的刀光剑影，但我们有必要告诉国民——为了保卫家乡和亲人，为了至上的荣誉，为了证明自己是顶天立地的存在，你们值得奔赴前线。通过精神激励与物质保障，后方将更好的支持我们的前线作战。\n\n我国当前的厌战度：[?war_exhaustion|%Y0]\n\n我国每周增加的厌战度：[?modifier@war_exhaustion_gain_modifier|R]\%"
 
 SPC_WE_distribute_extra_supply:0 "分发额外配给"
 SPC_WE_distribute_extra_supply_desc:0 "随着经济军事化的烈度逐渐升级，老百姓的生活成本和可获取的生活必需品都在急速恶化。将部分资源重新转移到民生领域，扩大民众的生活配给可以在很大程度上缓解我国民众的燃眉之急，确保战争的可持续性。"
 SPC_WE_disciplining_army:0 "整肃军队纪律"
 SPC_WE_disciplining_army_desc:0 "战争年代的军队同和平时期的不同，军事行动和驻扎往往会给各地民众带来不小的伤害，破坏当地的经济活动和社会秩序，造成老百姓对军队的抵触。整顿军队纪律可以确保这一情况得到改善，让枪口不再对准那些无辜之人，维持军队的作战能力。"
 SPC_WE_escalate_military_propaganda:0 "扩大军事宣传"
 SPC_WE_escalate_military_propaganda_desc:0 "许多民众缺乏足够认识全局的眼界和资源，这可怪不得他们。扩大化的军事宣传也可以调动民众的情绪，使得他们得以了解军事行动的必要性和要紧性，动员非战斗人员的情绪，让他们不再将矛头指向我们，而是真正同我方处于敌对关系的敌人。"
 SPC_WE_togetherly_suffer_propaganda:0 "同甘共苦宣传"
 SPC_WE_togetherly_suffer_propaganda_desc:0 "许多同志在面对战争所带来的苦痛选择了退避，这并非不能理解，可从结果上来说却不利于集体的发展。受苦的并非他们少数，而是全体人民。我们作为人民的政权，应当确保在危急时刻能将群众团结起来，只有万众一心，这份力量才能化作刺向敌人的利刃。为此，扩大宣传力度，鼓励人们实现同甘共苦，团结一心的意志是有必要的。"
 SPC_WE_call_for_duty_of_service:0 "呼吁为国服役"
 SPC_WE_call_for_duty_of_service_desc:0 "我们的祖国正处在为难关头，如今的征兵政策已经不足以满足保卫故乡的需求，我们必须团结一致，动员全国，建立起更大的部队，保卫每个人的家园。侵略者的炮口已经对准了我们的脑门，已经没有时间犹豫了，为祖国服役吧！"
 SPC_WE_pay_for_their_patriotism:0 "补贴爱国军工企业"
 SPC_WE_pay_for_their_patriotism_desc:0 "在大厦将倾，祖国陷入战火的危难时刻，有一批爱国的企业家挺身而出，为我国的战时军用武器制造起到了不可或缺的作用，像他们提供补贴有助于维持在当下的工业发展并增加军备产出，增加战争胜利的可能。"
 SPC_WE_purge_the_antiwars:0 "搜捕反战分子"
 SPC_WE_purge_the_antiwars_desc:0 "有些人不了解政府的难处，没有同其他人的合作意识，也不懂得去为大局而让步。对于这些令人难以理解却如蝼蚁般遍地都是的反对者，有必要派出特殊人员对他们进行“再教育”，维持我国社会的稳定，让这些非主流思想不至于影响到其它正常人，最终酿成大祸，葬送伟大的祖国。"
 SPC_WE_incite_racism_looting:0 "鼓动劫掠异族财产"
 SPC_WE_incite_racism_looting_desc:0 "有些种族或许在表面上选择向我们屈服，可那些在阴影下生存的生物随时都可能萌生造反的恶劣想法。而在这些我们的敌人之中，有些凭借着不正轨，违法乱纪且不符合社会准则的方式获取了大量本不该属于他们的财产，这很显然是不该被允许的。为此，是时候做些早该做的事了，鼓励人民们把本该属于他们的财产夺回来吧。"
 SPC_WE_gratefulness_education:0 "宣传恩泽"
 SPC_WE_gratefulness_education_desc:0 "战争所带来的破坏是惨烈而不可抵抗的，对于一般的平民老百姓而言，这往往是难以接受的。我们作为民众的领导者，在这种时候应当展现作为政府，作为这个国家统治者的“慈悲”，将美好的事物许诺给他们，甚至是将物资免费送给他们，让他们明白该听谁的——而答案也很显而易见，自然是基于恩惠的我们。"
 SPC_WE_proclaim_holywar:0 "宣告圣战"
 SPC_WE_proclaim_holywar_desc:0 "虽说战争带来的破坏是无可避免的，但取得的胜利的光辉并非不能掩盖阴影下的伤痛。宣告我们战争的神圣性可以向信徒们传递一个明确的信息：我们才是正义的一方。既然我们是正义的一方，那么为何还要反对战争呢？我们的圣战将为信徒们创造更加美好的未来，这一点就足以成为我们前进的理由了。"
 SPC_WE_leader_at_frontline:0 "御驾亲征"
 SPC_WE_leader_at_frontline_desc:0 "有些傻得不透气的混蛋因为我太久没有上前线降下神威就看不起我国的军队，这可真的是太不尊重人了。马上就收拾行囊去前线打仗，看看这帮走在地上的猴子能在我的魔法下坚持几秒。准备好墓志铭，洗干净屁股等着吧，混蛋们。"
 
 SPC_war_exhaustion_aftermath_decisions:0 "厌战：战后"
 SPC_war_exhaustion_aftermath_decisions_desc:0 "真正了解并经历过战争的幸存者往往还留存着在战时惨痛经历的记忆与创伤。幸存者们从高压的战场回到了往日平静的现实社会，但精神往往还停留在战场上，抑郁、疯狂、乃至自杀都将成为可能。没有自我认同感的他们将自己封闭在自己的世界里，国家应当进行充分的照顾，以弥补其内心的创伤，提供一系列扶助措施以使其重新融入社会。在进行慰问活动的同时，也是我们传播爱国教育的最佳时机——悲哀的幸存者们深陷刽子手的心理认知的阴霾，而幼稚的人正在渴望着战争的脚步。车轮在循环，车辆在前进。\n\n我国当前的厌战度：[?war_exhaustion|%Y0]"
 
 SPC_WE_condole_the_veterans:0 "慰问伤残老兵"
 SPC_WE_condole_the_veterans_desc:0 "许多老兵因为战争的原因而受到了严重的伤害。或许他们中有的得到了来自国家的补贴而不至于陷入要饿死的局面，可无论是来自社会的歧视，因为身体残疾而造成的就业压力，还是远离家乡而造成的隔阂，又或者是缺乏亲人照顾而造成的生活不便，都使得伤残老兵们的生活十分恶劣。举办慰问活动可以为我国政府在群众面前塑造善人的好印象，同时还能调动媒体和社会的关注，实实在在地为老兵们的生活提供改善的机会。"
 SPC_WE_encourage_art_creating:0 "鼓励文化产品创作"
 SPC_WE_encourage_art_creating_desc:0 "战争时期带来的经济军事化动员容易使得社会单一化，许多曾经繁荣的艺术和娱乐产业都没落了，我们可以重新鼓励这些产业的发展，加快社会恢复到战前的速度，给民众一些内容充实因战争而愤怒的心灵，同时提供了更多的就业岗位，丰富国内产业多样性。"
 SPC_WE_arrange_veteran_reemployment:0 "安排退役士兵再就业"
 SPC_WE_arrange_veteran_reemployment_desc:0 "许多因为战争而参军的士兵在战后失去了他们的工作。这些拿着来自政府的薄弱补贴的士兵本可以成为就业市场上充满活力的一批人，可因为战争的破坏无法充分就业，或是因为社会上存在的普遍歧视而无法正常生活，参与社会生产。安排退伍士兵的再就业可以建立起政府在这些人心中的威信力，同时可以减少社会上的失业人口，增加稳定性。"
 SPC_WE_build_more_sanatorium:0 "增设战后康复疗养院"
 SPC_WE_build_more_sanatorium_desc:0 "虽然常常不被人所认可，战争为士兵们所带来的伤痛并不比对任何一个社会群体造成的少。许多士兵由于高烈度的战斗而患上了严重的应激综合征，无法正常生活。建设对应的疗养院可以给这些士兵一个安家之处，不但能依靠减少流浪汉的数量而提供社会稳定性，还可以建立起政府大善人的形象。"
 SPC_WE_sized_honoring:0 "大规模授勋"
 SPC_WE_sized_honoring_desc:0 "绝大多数参与战斗的士兵或许不喜欢战斗本身，但他们一定不会拒绝自己作为士兵而被认可，而认可的最好方式之一便是颁布勋章。这些勋章并不会需要我们做过渡的开销，但可以极大地增加士兵们的满意程度，并且在一定程度上，可以成为战争结束的象征。"
 SPC_WE_suppress_antiwar_parade:0 "镇压反战游行"
 SPC_WE_suppress_antiwar_parade_desc:0 "有些刁民确实是有点得寸进尺了。政府和军队花了这么大心血才结束战争，他们非但不抱有感激之情，反而感到不满，指责我们的过错——但我们又何错之有？许多事情的难处他们都不理解。既然如此，那便只能采用强硬措施帮助他们“理解”了，为了我国的未来，这也是不得不做的事情。"
 
 SPC_war_exhaustion_promise_decisions:0 "厌战：做出承诺"
 SPC_war_exhaustion_promise_decisions_desc:0 "我们承诺我们将是胜利者，所以每个人都将在不久的将来获得应有的奖赏。通过一系列物质承诺，我们将极大缓解一系列社会矛盾以保障我们的战争动员。承诺有时是废纸一张，而有时则意味着深远的影响。\n\n拥有特质“承诺家”的顾问可以增加在承诺到期时让人民继续相信我们的承诺的几率。"
 
 SPC_WE_promise_relief_conscription:0 "承诺：放松征兵法案"
 SPC_WE_promise_relief_conscription_desc:0 "过于严苛的征兵法案不但会造成老百姓的反抗，还会在很大程度破坏社会生产的秩序，并且降低我军的兵员质量。进行适当的放宽政策不但可以降低社会的压力，恢复过去社会生产的秩序，还可以安抚愤怒的群众，为我国政权的稳定添砖加瓦，最后大家都能过上好日子。"
 SPC_WE_promise_relief_conscription_M1:0 "放松征兵法案"
 SPC_WE_promise_relief_conscription_M2:0 "放松征兵法案"
 SPC_WE_promise_relief_conscription_M3:0 "放松征兵法案"
 SPC_WE_promise_relief_conscription_M4:0 "放松征兵法案"
 SPC_WE_promise_relief_conscription_M5:0 "放松征兵法案"
 
 SPC_WE_promise_decrease_taxing:0 "承诺：削减税收"
 SPC_WE_promise_decrease_taxing_desc:0 "除非在有利可图的情况下，几乎没有老百姓会不喜欢更低的税收。削减税收可以极大地减少反对派对我们的怨念，并巩固支持者的信心。在恐怖的战争阴影下，这可以为民众们开辟一条康庄大道，巩固政府的威信，降低民众对战争的反感。"
 SPC_WE_promise_decrease_taxing_M1:0 "削减税收"
 SPC_WE_promise_decrease_taxing_M2:0 "削减税收"
 SPC_WE_promise_decrease_taxing_M3:0 "削减税收"
 SPC_WE_promise_decrease_taxing_M4:0 "削减税收"
 
 SPC_WE_promise_retrieve_nationalization:0 "承诺：释放国有企业"
 SPC_WE_promise_retrieve_nationalization_desc:0 "如今的我国政府没有多余的力量去管控国有化企业，强行维持更高程度的企业国有化不但没法起到正面效果，反而会引起民众的不满，或是降低市场的活性，反过来对我国造成负面影响。为此，我们可以适当地释放部分国有化企业职能，活跃市场。"
 SPC_WE_promise_retrieve_nationalization_M1:0 "释放国有企业"
 SPC_WE_promise_retrieve_nationalization_M2:0 "释放国有企业"
 SPC_WE_promise_retrieve_nationalization_M3:0 "释放国有企业"
 SPC_WE_promise_retrieve_nationalization_M4:0 "释放国有企业"
 
 SPC_WE_promise_raise_military_professionality:0 "承诺：提高军事职业度"
 SPC_WE_promise_raise_military_professionality_desc:0 "军队素养在很大程度上可以影响到民众对军队的看法。更为精锐，战斗力更强而且纪律严明的部队是大家都喜闻乐见的，而羸弱且无组织，无纪律的军队只会“赢得”各方民众的唾弃。改进军队的职业化水平可以赢得各方支持，降低军事行动对社会稳定造成的不良影响。"
 SPC_WE_promise_raise_military_professionality_M1:0 "提高军事职业度"
 SPC_WE_promise_raise_military_professionality_M2:0 "提高军事职业度"
 SPC_WE_promise_raise_military_professionality_M3:0 "提高军事职业度"
 SPC_WE_promise_raise_military_professionality_M4:0 "提高军事职业度"
 SPC_WE_promise_raise_military_professionality_M5:0 "提高军事职业度"
 
 SPC_WE_promise_stablize_livinghood:0 "承诺：稳定居民生活水平"
 SPC_WE_promise_stablize_livinghood_desc:0 "如今，有太多民众仍生活在饥荒的边界线上，距离因为高得离谱的生活成本而流落街头，曝尸荒野仅有一线之遥。政府可以下台应对这一问题，通过稳定就业市场，压制生活必需品的市场价格或是配给方针，并且降低战争的烈度，我们可以在一定程度上稳定居民的生活水平，减少反对派的数量，减缓厌战情绪的滋生。"
 SPC_WE_promise_stablize_livinghood_M1:0 "稳定居民生活水平"
 SPC_WE_promise_stablize_livinghood_M2:0 "稳定居民生活水平"
 SPC_WE_promise_stablize_livinghood_M3:0 "稳定居民生活水平"
 SPC_WE_promise_stablize_livinghood_M4:0 "稳定居民生活水平"
 
 SPC_WE_promise_secure_worker_rights:0 "承诺：保障劳工权利"
 SPC_WE_promise_secure_worker_rights_desc:0 "在国家危难之际，劳工成为了维系国家生存的重要支柱。他们为国家做出的贡献是众人有所目睹的，加上他们数量随着战争的进行并不在小，提高劳工的权益，帮助他们改善工作条件可以稳固我们的政权，减少反对派的数量。"
 SPC_WE_promise_secure_worker_rights_M1:0 "保障劳工权利"
 SPC_WE_promise_secure_worker_rights_M2:0 "保障劳工权利"
 SPC_WE_promise_secure_worker_rights_M3:0 "保障劳工权利"
 SPC_WE_promise_secure_worker_rights_M4:0 "保障劳工权利"
 
 SPC_WE_promise_increase_agriculture_funds:0 "承诺：提升农业补贴"
 SPC_WE_promise_increase_agriculture_funds_desc:0 "战争期间，由于严苛的征兵制度和对粮食的高度需求，许多田地要么是落到了无人耕种而荒废的地步，要么则因为强硬的征粮制度而受到不同程度的破坏。无论是哪种情况，对于当地的农民而言都是毁灭性的。提高农业补贴可以弥补这些悲痛，同时可以稳定粮食产量，确保我国不会爆发饥荒。"
 SPC_WE_promise_increase_agriculture_funds_M1:0 "提升农业补贴"
 SPC_WE_promise_increase_agriculture_funds_M2:0 "提升农业补贴"
 SPC_WE_promise_increase_agriculture_funds_M3:0 "提升农业补贴"
 SPC_WE_promise_increase_agriculture_funds_M4:0 "提升农业补贴"
 
 SPC_WE_promise_level_up_subsidy_funds:0 "承诺：提高福利水平"
 SPC_WE_promise_level_up_subsidy_funds_desc:0 "战争所造成的混乱是持续且严重的，一般的民众没有足够的资源，他们的生活本就脆弱，一旦遭遇重大且负面的变动，便很难回到过去的日常中去。我们可以提高国内福利的水平，许诺为民众提供更好的社会保险，这不但可以加强他们对政府的信息，还可以促进社会的稳定发展。"
 SPC_WE_promise_level_up_subsidy_funds_M1:0 "提高福利水平"
 SPC_WE_promise_level_up_subsidy_funds_M2:0 "提高福利水平"
 SPC_WE_promise_level_up_subsidy_funds_M3:0 "提高福利水平"
 SPC_WE_promise_level_up_subsidy_funds_M4:0 "提高福利水平"
 
 SPC_WE_promise_liberate_the_female:0 "承诺：解放女性"
 SPC_WE_promise_liberate_the_female_desc:0 "许多女性在战争期间成为了我国政府的坚定后援。他们有的取代了男性成为了劳工，为前线生产武器，弹药；有的则选择奔赴前线，加入支援部队，治疗伤员，或者运输补给给重要的军事行动。从许多角度来看，我们都难以否定女性对我国所做出的贡献，也无法否认他们客观上的能力和急速上升的社会地位——因此，从法律和社会的角度来鼓励女性权益的发展可以进一步提高我国的稳定程度。"
