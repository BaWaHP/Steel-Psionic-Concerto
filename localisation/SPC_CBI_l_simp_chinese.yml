###民族精神###
CBI_life_and_death:0 "死生荣辱"
CBI_life_and_death_desc:0 "对于中巴斯蒂亚的老移民们来说，自己是谁一直是一个困扰着他们的问题。自己是南巴人吗？但为什么南巴的老爷们公开的歧视他们？自己是中巴人吗？但为什么自己永远像是外来者？自己与祖辈们为了南巴的利益来到这里开疆扩土，发展经济。最后却要忍受南巴的剥削与压榨。难道我们不是同宗同源的兄弟吗？不是同一个民族的姐妹吗？可为什么我们付出一切却得不到你们哪怕表面上的平等呢？这些问题时时刻刻的刺痛着移民们的神经，中巴斯蒂亚独立主义因此而生。在联盟崩溃的如今，移民们已经不会期盼南巴的垂怜。他们只想要一个独立，平等，自由的国家——一个崭新的民族国家，一个只属于他们这些中巴斯蒂亚人的国家。§2独立大旗已起，中巴斯蒂亚的死生荣辱皆在此一役§!！"

