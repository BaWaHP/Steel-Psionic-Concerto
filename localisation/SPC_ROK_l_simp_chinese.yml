ROKNews.1.t:0 "克拉亚诺共产主义的胜利"
ROKNews.1.d:0 "据波兹人民通讯社报道，克拉亚诺的政局在短短几个月内发生了翻天覆地的变化；红旗最终席卷了克拉亚诺。被称为克拉亚诺新革命党的共产主义者们取得了自莫泽总统去世后克拉亚诺混乱政局的最终胜利，这也标志着革命的开始。\n人民阵线政府于今日上午10时宣布了克拉亚诺人民共和国的成立，首任人民共和国主席埃米·普斯卡娅在克拉亚诺总统府宣布，一个崭新的，自由的，平等的克拉亚诺成立了。宣布坚持革命与群众路线永不动摇，继续向工人与农民抛出橄榄枝。新的“工人宪法”将被推行，工人获得了梦寐以求的解放与自治的权利。\n尽管混乱还未彻底消失，经济的发展刚刚重新起步，但对无产者们的全新社会保障体系已经开始建立。人民将成为这个新国家的主人，克拉亚诺将缓慢但坚定的向未来走去。"
ROKNews.1.a:0 "我们走在大路上。"
ROKNews.1.b:0 "伟大的胜利！"
ROKNews.1.c:0 "这群激进派居然胜利了？"
ROKNews.1.dd:0 "左翼分子的谎言罢了。"
ROKNews.2.t:0 "克拉亚诺民主的凯旋"
ROKNews.2.d:0 "据波兹通讯社报道，克拉亚诺因莫泽总统去世而变得混乱的政局最终得到了稳定。民主政府通过紧急选举稳定了政局，并选举了社民党作为克拉亚诺新的执政党。据社民党发言人表示社民党将会给克拉亚诺带来新气象和新政策。\n克拉亚诺社民党作为自沃希斯基时期就成立的传统左翼政党，一直占据着克拉亚诺共和国政府的左翼生态位。现任领袖科里曼·威克利纳是一位坚定的社会主义者，他在之前就一直在为克拉亚诺的自由与独立的工会组织而奋斗。\n社民党得到了大部分工人阶级的支持，科里曼宣布将深化民主的参与度，力图通过循序渐进的改革使克拉亚诺变成一个社会正义和高福利的国度。除此之外，科里曼大力推进经济民主化，支持工人的集体谈判与罢工权的立法。看起来，在经过了200余年的考验后，民主制将在克拉亚诺走向新的未来。"
ROKNews.2.a:0 "为了面包与玫瑰！"
ROKNews.2.b:0 "改良主义的胜利。"
ROKNews.2.c:0 "温和而坚定。"
ROKNews.2.dd:0 "温和骗子的“豪言壮语”。"
ROKNews.3.t:0 "克拉亚诺民主的凯旋"
ROKNews.3.d:0 "据波兹通讯社报道，克拉亚诺因莫泽总统去世而变得混乱的政局最终得到了稳定。民主政府通过紧急选举稳定了政局，新民主党毫无疑问的保住了他的地位。事实证明，执政15年的老牌民主政党经受住了考验获得了最后的胜利。\n新民主党的新任领导人卡塔日娜·维尔纳是莫泽总统的绝对支持者，她强调知识与科技的重要性，推动知识分子的发展。同时追求传统文化向现代文化转变，保障人民的人权，法治和民主的基本权利。积极推动民主问责制和民主阵线政策的落实。\n新民主党政府延续了莫泽时代的自由市场政策，通过创建一个可控的，完美的，高效的市场经济政策，来推动经济的快速复苏；从而使克拉亚诺的经济较为快速的恢复到混乱之前的水平，新政府也宣布将继续联邦主义政策，对境内的极端主义分子展开清洗，力图使克拉亚诺变成民主的新天地。\n看起来，在经过了200余年的考验后，民主制将在克拉亚诺走向新的未来。"
ROKNews.3.a:0 "为了民主，为了自由，为了莫泽！"
ROKNews.3.b:0 "资产阶级的延续。"
ROKNews.3.c:0 "共和之完胜！"
ROKNews.3.dd:0 "自由主义的花招。"
ROKNews.4.t:0 "克拉亚诺民主的凯旋"
ROKNews.4.d:0 "据波兹通讯社报道，克拉亚诺因莫泽总统去世而变得混乱的政局最终得到了稳定。民主政府通过紧急选举稳定了政局，作为克拉亚诺最古老政党的民主党出乎意料的取得了紧急选举的胜利。这一结果可以说震惊了整个克拉亚诺的政坛，没人能够想到一个风评如此之差的政党能够取得这场选举的胜利。\n民主党的现任领导人奥辛斯基·海德曼试图复刻上一任民主党总统比纳许·海耶的执政模式，强调等级制度在社会中落实的合理性，推动社会中各阶级群众认清自己的责任与本分；鼓动上层阶级开展对贫困群众的生活保障制度。新的选举制度正在建立，其主要依据财产数量以及教育程度划分。可以确信的是大部分农民和工人将被排除在新的选举制度之外，民主党政府称这将防止极端主义的抬头。\n一个很明显的问题是已经享受过200多年普遍性民主的克拉亚诺人民难以接受精英制民主的建立，抗议不断的爆发，但军队正在镇压那些爆发抗议的地区。奥辛斯基则表示这是必要之恶，一个秩序井然的克拉亚诺正浮现在地平线之上..."
ROKNews.4.a:0 "非民众的民主？"
ROKNews.4.b:0 "秩序压倒一切。"
ROKNews.4.c:0 "他们举起了屠刀！"

