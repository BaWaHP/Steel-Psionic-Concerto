ROK.16.t:0 "未来的道路？"
ROK.16.d:0 "随着民众对政府最后的信心被陷入僵局的选举丧失殆尽，传统的温和中间派已经彻底失势。克拉亚诺的社会状况与政治局势已经开始愈发的极端，军队已经开始开赴克拉亚诺首都。可以肯定的是新革命党不会坐以待毙，已经和社民党达成合作的他们开始组建起工人自卫队和赤卫队。并且正在试图组建一个稳定的新左翼政府来控制住克拉亚诺的局势。\n然而军队与右翼并不会眼睁睁看着他们夺取政权。军队的鹰派领袖韦德诺夫斯基已经宣布社民党和新革命党完全非法化。但军队核心领袖，德高望重的沙季洛夫是著名的温和派领袖，他试图使克拉亚诺避免内战；所以暂时压制住了军队内部的反对派和右翼势力。但很明显的是，这种和平是虚假的。我们必须尽快做出选择，是支持新革命党与社民党的左翼新政府，还是支持军队“维持稳定”。"
ROK.16.a:0 "我们会和人民站在一起！"
ROK.16.b:0 "左翼的畜生们只会害了克拉亚诺！"

