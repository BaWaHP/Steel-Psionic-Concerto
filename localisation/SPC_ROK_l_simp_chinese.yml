###领导人###
ROK_stahl_wickes:0 "施塔尔·威克斯"
ROK_stahl_wickes_desc:0 "施塔尔始终在想一个问题，共产党员是什么?这个问题就像是一个心魔，一直困扰着施塔尔的内心。让他百思不得其解。\n\n1950 年出生于克拉亚诺大区一个工人家庭的施塔尔，从很小的时候就了解到这个国家底层人民生活的惨状与现实。一个朴实的想法很快便从施塔尔的脑海中显现出来他要拯救这些悲惨的人民，同时也包括自己。上完中学的施塔尔不出意外的加入了克拉亚诺新革命党的前身——克拉亚诺革命同盟。在革命同盟时期的这段经历，吸引着施塔尔不断的深入研究共产主义理论。从那时开始，施塔尔就像是着了迷一样，开始钻研理论学说。连那些同盟的老前辈也不得不承认施塔尔所表现出的积极性是让他们都感到望尘莫及的。\n\n1972年，大学毕业的施塔尔加入了克拉亚诺革命同盟所改组的克拉亚诺新革命党，负责党内意识形态与宣传工作。对于施塔尔来说，他潜心研究多年的理论与报告终于要派上用武之地了。但另一个很明显的事实是，在比纳许时代宜传共产主义理论显然是一件及其危险的行为。不出所料，施塔尔很快便因反政府罪被逮捕并判刑5年。在这5年里，施塔尔的思想开始发生了一些转变。在监狱的生活开始让他不自觉的生出了一些想法，他开始思考他是否要比这些人“先进一点”。\n\n出狱后的施塔尔从同僚的口中了解到比纳许的下台与莫泽的上位，他的同志大部分认为莫泽将带给他们解放与未来。但施塔尔不这么认为，他始终觉得莫泽的先进性还不如新革命党一半，只不过是资产阶级选出来的代言人罢了，这很快导致了党的分裂。但在看到莫泽不断对国内外保守势力的妥协后，那些曾经相信莫泽的人在失望之余又回到了新革命党。\n\n这次事件加速了施塔尔对于一件事情的认知，他开始认为他们这些先进的共产党员是高于普通群众的存在,并且拥有无可辩驳的特殊性和优越性。所以他们必将永远领导着人民，直到共产主义社会的最终到来。很快，他开始不断的强调新革命党的自律和道德的建设，以免重蹈十年前的覆辙。没过多久，他便成功笼络了一批同志。并宣布自己代表了党内的“基本民意”，成为了新革命党党主席。\n\n但随着普斯卡娅的加入，施塔尔的势力开始变得动摇。那个像是名医一样的普斯卡娅最终成为了党内多数派的代表，取代他成为了新一任新革命党党主席。但施塔尔并未因此动摇，始终活跃在一线的他也成为了先锋派的领导人。\n\n施塔尔始终坚信着一个道理：有些事只有我们才能办好，我们来了，事情也就解决了。"
ROK_emmy_puskia:0 "埃米·普斯卡娅"
ROK_emmy_puskia_desc:0 "她就像是一个永不下落的太阳，她的炙热感染着她身边所有的人。——克拉亚诺国立大学校长 扬可夫斯基·留日科夫\n\n埃米·普斯卡娅出生于1970年克拉亚诺共和国奥波莱省的一个家道中落的富农家庭。值得庆幸的是她的父母十分重视孩子的教育，也没有重男轻女的表现——这实属难得。也正因为如此，埃米·普斯卡娅得以完成她的学业考入当时国内第一的高校：克拉亚诺国立大学。\n\n在大学的时光里，除了完成学业，埃米·普斯卡娅展现了对政治超乎常人的敏感和兴趣。她开始攻读各类政治学书籍，其中就包括莫泽撰写的相关书籍。童年时期的吃苦经历以及在求学路上的所见所闻使得这个年纪轻轻的小姑娘很早的了解到这个国家底层人民的现状，并试图改变它，因此在看到莫泽在书籍中高呼“为了人民的自由，幸福而奋斗”以及“人民专政”的字眼后；她几乎立刻成为了莫泽的狂热追随者。此刻的她完全对莫泽深信不疑，她坚信这个满眼都是人民的总统一定会使这个国家走上充满光明的道路。\n\n但现实毫无疑问给了普斯卡娅重重一击，各方势力的施压和政府内部执行政策的低效率最终导致莫泽在其执政的十五年内几乎一事无成。虽然依靠着妥协勉强通过了几部法案，但被严重阉割的法案已经和其最开始的模样相距甚远。普斯卡娅第一次开始怀疑，她一直以来坚信的莫泽主义是否有哪里出现了问题。\n\n通过校内的一些渠道，普斯卡娅第一次了解到了共产主义——尤其是人民共产主义的理念。也就是这时，她理解了一件事：这就是她应该为之奋斗一生的理念，也是莫泽主义的问题所在。已经是克拉亚诺国立大学博士的她毫不犹豫的放弃了高薪厚禄，加入了克拉亚诺新革命党，这个在她看来将成为给这个国家带来最光明的未来的政党。\n\n加入了新革命党的普斯卡娅就像是一位惊世名医，她的方案让新革命党逐步摆脱了困扰着他们的问题，并一步步发展壮大。虽然这招致了一些老党员的不满，认为她的行为使得他们这些老党员看起来“游手好闲”；但毫无疑问的是埃米·普斯卡娅已经成为了党的领袖，成为了克拉亚诺共产主义的代表人物。\n\n普斯卡娅的想法很简单，她认为改良主义无法拯救这个国家于水火之中。如果想让克拉亚诺走上一条康庄大道，那么只有一条道路；一条轰轰烈烈的革命之路，而她正走在这条她亲手浇筑的道路上。\n\n人民，只有人民，一切为了人民。"
ROK_henrik_lofsky:0 "亨利克·洛夫斯基"
ROK_henrik_lofsky_desc:0 "亨利克的脑子是十分灵活和实用的，所有认识他的人都这么认为。在他出生那年，他的母亲抱着他出门。一个占卜师在看到他后高声叫着:此子必成大器!而亨利克也没有辜负占卜师的预言,长大后的亨利克考入了克拉亚诺最高级的学府。成为了一名人人羡慕的优秀学子。\n\n虽然出身于下维尔陶的一个资产阶级家庭，但大学时期的亨利克却表现的十分激进。不仅参加校内的左翼团体，还公开嘲讽时任总统比纳许的政策。这给他带来了牢狱之灾，但却让亨利克打响了他的知名度：一个不畏强权,不怕牺牲的进步学生。但这份激进也随着他服刑结束后便消散了，没人知道他在监狱里发生了什么，只知道享利克变的沉默，不再谈论政事。\n\n就当人们认为亨利克会按部就班的回到老家继承家产的时候。随着1973年的民主政变，亨利克带着他新的思想重新回到了大众的视野中。他将空想社会主义与他之前的激进经历杂糅在一起，将温和的步入社会主义当成了他的政治目标。但也许是学生时期的经历影响了他，亨利克最终选择加入了新革命党。\n\n他温和的思想很快便得到了党内右派的支持，在一些同僚的拥簇下,亨利克成为了缓则派的领导人。相比于意识形态上的问题，亨利克更关注经济与社会运作的方面，主张在现有的社会基础上进行改革。在普斯卡娅成为主席后，他的这种思想变得更加坚定，他反对党内激进的公社化，国有化政策。但同时又支持新革命党以暴力的手段获取国家的政权,最好是牢牢的掌握住社会资源。\n\n虽然亨利克的思想遭到了党内左派猛烈的抨击，指责他犯了投降主义的错误。但亨利克可不会在乎什么批评,他要实现他脑中的宏伟蓝图,他要成为他想象中的人：一个社会的大改革家，一个人民的救世主。至于那些批评?等到那时，只不过是一群原教旨分子对伟大领袖的恶意抵毁罢了。\n\n革命这种事，最好还是慢慢来。改变，可不一定就是好事。"
ROK_corriman_wickrena:0 "科里曼·威克利纳"
ROK_corriman_wickrena_desc:0 "巨人想要降临于世必要遭受苦难——这是克拉亚诺的一句谚语。科里曼的父亲里科夫斯基毫无疑问是个巨人，政治上的巨人。在莫泽发起对比纳许的反抗时，他响应莫泽的号召，带领社民党替换了时任党魁布莱克，而他因此在莫泽稳定政权后成为了社民党党魁。可能会有人说这是一步登天，但这其中的艰辛只有里科夫斯基知道。\n\n科里曼从小就十分崇拜父亲，在从政的父亲的影响下，科里曼也很快的步入了政坛。25岁时那声葬送掉他父亲的枪声至今依然回荡在他的耳边。他知道自己可能会和父亲同一个下场，但他也要实现父亲未曾完成的理想。\n\n科里曼和其他大部分社民党党员不同的是，他对于激进革命不持完全否定态度。所以他愿意同那些新革命党合作，就像他的同僚评价他说：它更像个新革命党而不是社民党。他梦想着父亲理想中的国家：人民幸福而又安居乐业全新的社会保障和医疗保障，工业蓬勃发展，农业全面机械化；每个人的脸上都洋溢着满足而喜悦的笑容。如今他成为了共和国的最高领导人，他坚信他将实现这一切，他会完成父亲的理想，即使付出再多，甚至是他的生命，他也要去做到，他一定会做到。\n\n"人民，一定要为了人民。"他将遵循着父亲的话，直到这趟旅途的终点。"
ROK_moser_heludon:0 "莫泽·赫卢东"
ROK_moser_heludon_desc:0 "毫无疑问的说，莫泽·赫卢东是个好人。在比纳许年代或许只有他是一个一心为人民考虑的高级官僚。莫泽的家族参加过共和革命，在比纳许试图修改宪法将克拉亚诺共和国变成总统共和制时，他在谋求了各个反对派的支持和南巴的默许后，成功在选举中战胜了比纳许。而他和他的新民主党毫无疑问的成为了民主阵线里各方势力都能接受的选举结果。十五年的日子说快也快，在无限制的争斗与政治斡旋后，莫泽惊恐的发现自己十五年的统治几乎没有办成任何事。但即使如此，人民依旧支持他。但他已经不支持自己了，他有时会怀疑自己继续推行民主是否是正确的决定，但有时又会看着报纸报道的那些新革命党人的运动而想起自己当年的意气风发。他明白自己时日无多了，在暮年之际，他只想安安稳稳的最后看一眼自己为之奉献一生的国家，在他死后，人民怎么办？只有天知道。"
ROK_katarzyna_werner:0 "卡塔日娜·维尔纳"
ROK_katarzyna_werner_desc:0 "卡塔日娜是个善良的人。即使她的家庭是一个不折不扣的依靠压榨工人维持奢华生活的家庭，但她依旧保持了她的善良。她的父母骂过她多少次？她早己记不清了，她唯一能够记住的只有向劳工联合会举报自己的父母后，父母那扭曲，丑陋的脸庞和那声代表着与她断绝关系的"你这个不孝女。"\n\n与父母决裂后的卡塔日娜考上了克拉亚诺最好的大学攻读政治学，并在27岁时加入了新民主党。成为了党内最年轻的成员之一。靠着极高的亲和力，她成功在党内笼络了一批支持者。相比于那些依靠金钱与权色交易建立起派系的人来说，这实在是难得。\n\n她明白现在的制度还有许多不足，人民需要更多的权利，人民应该是幸福且平等的，就像莫泽说过的那样。她的选举演讲成功打动了莫泽，将她选为了新民主党的下一任总统候选人。\n\n而现在她已经成功胜选，她会将莫泽的想法彻底的贯彻下去，就算会付出代价。"
ROK_osinski_heidemann:0 "奥辛斯基·海德曼"
ROK_osinski_heidemann_desc:0 "奥辛斯基从来不认为自己是什么好人，但他疯狂崇拜的人却是一个英雄。不知道为什么，奥辛斯基仿佛从他决心投身政治的那一天起就想要振兴民主党。\n\n现实也如他所想，已经衰落的不成样子的民主党很快便同意了他的入党申请。或许奥辛斯基真的是个政治方面的天才，在他加入后民主党奇迹般的止住了颓势。勉强保住了民主党最后的席位。\n\n但这远远不够，止住颓势只是开始。奥辛斯基想要的一直都是重新恢复全盛时期的民主党。\n\n但他究竟为了什么？为了人民？为了共和国？都不是，或许他只是为了自己。他不想要进步，他想要的只有回到过去，回到那个令他心驰神往的科沃斯基时代；也许其实是比纳许时代。政策不会因为这帮政客们互相扯皮而搁置，权力集中在精英的手里，每个人都会待在属于他们的等级中。人民都会服从上层阶级，这将是他们的荣誉。而他将会是民主党的救世主，是全克拉亚诺人民的"伟大领袖"。"
