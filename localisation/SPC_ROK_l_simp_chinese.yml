ROK_liberal_republican_party:0 "克拉亚诺新民主党"
ROK_liberal_republican_party_long:0 "克拉亚诺新民主党\n\n作为民主政变中成立的新政党，在革命领袖莫泽·赫卢东的带领下，成为了目前克拉亚诺最为强盛的政党。新民主党秉承着莫泽在革命期间所研究的莫泽主义为指导思想，力图将克拉亚诺建立为一个稳定的民主国家，但其中间派的立场在最近越来越变得难以维系。党内错综复杂的派系也开始让新民主党变得寸步难行，但新民主党试图使民众坚信：\n\n自由，平等，民主乃国之精神。\n"
ROK_conservative_republican_party:0 "克拉亚诺民主党"
ROK_conservative_republican_party_long:0 "克拉亚诺民主党\n\n作为克拉亚诺两大传统政党之一，克拉亚诺民主党在比纳许·海耶的改革下吸收了大量右翼政党，这使得民主党成为了目前政坛上最为庞大的右翼政党。但由于比纳许的专政前车在先，民主党一直没法赢得民众的支持。但这并不妨碍保守主义者将自己的选票贡献给民主党，并且民主党也不会甘心一直沦为在野党，他们正在蛰伏，等待着一个机会：\n\n秩序与荣耀终将重归民主党。\n"
