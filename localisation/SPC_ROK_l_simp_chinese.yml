ROK_social_and_cultural_committee:0 "克拉亚诺社改及文化委员会"
ROK_social_and_cultural_committee_desc:0 "克拉亚诺社改与文化委员会，全称为：克拉亚诺社会主义改造及无产阶级文化委员会。是由克拉亚诺新革命党与其重要合作伙伴——克拉亚诺左翼艺术阵线共同创立的社会主义改革机构。根据埃米·普斯卡娅的计划构想，在克拉亚诺的社会主义革命与建构阶段，社改及文化委员会将成为克拉亚诺社会主义共和国的最高权力机构。在委员会内分别由新革命党负责社会及经济方面的社会主义改造，而由左翼艺术家维拉帕米·赫尔辛基所领导的左翼艺术阵线将负责对克拉亚诺的文化进行全方位的改造。\n\n左翼艺术阵线，或者我们用它的曾用名：先锋主义艺术团。原本该团体是维拉帕米·赫尔辛基的同好小圈子。但随着克拉亚诺局势的进一步向不稳定发展，以及维拉帕米本人越来越倾向于让艺术干涉政治和其日趋强烈的左翼倾向，使得这一团体开始名声大噪。其提出的现代主义设计，构成主义艺术加之立体未来主义诗歌让整个南巴斯蒂亚艺术界为之震撼，很快便受到古典派艺术团体的打压。不过随着与新革命党建立合作，以及克拉亚诺的不流血革命成功。左翼艺术阵线已经控制了克拉亚诺的文艺界。现在，他们要开始自己的革命了。"

