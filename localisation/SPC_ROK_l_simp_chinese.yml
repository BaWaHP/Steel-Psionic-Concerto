###政党名称###
ROK_pioneer_communism_party:0 "克拉亚诺新革命党"
ROK_pioneer_communism_party_long:0 "克拉亚诺新革命党\n\n§g新革命党和大多数党派一样，党内并非团结一致。路线之争和政治斗争一刻也不曾停歇。由施塔尔·威克斯领导的先锋派反对现任党主席埃米·普斯卡娅的政策。先锋派普遍认为当前克拉亚诺人民的觉悟还没有高到可以接管政权的地步，因此作为克拉亚诺的先锋队，党有必要领导起这个国家直到人民的觉悟空前的提高。直到他们有能力接管这个国家，直到先锋队最终重新归于大众。\n\n毕竟，有些事，只有我们才能办好；我们来了，事情也就解决了。\n§!"
ROK_pioneer_communism_party_2:0 "克统共"
ROK_pioneer_communism_party_2_long:0 "克统共（先锋派）\n\n§g克统共和大多数党派一样，党内并非团结一致。路线之争和政治斗争一刻也不曾停歇。由施塔尔·威克斯领导的先锋派反对现任党主席埃米·普斯卡娅的政策。先锋派普遍认为当前克拉亚诺人民的觉悟还没有高到可以接管政权的地步，因此作为克拉亚诺的先锋队，党有必要领导起这个国家直到人民的觉悟空前的提高。直到他们有能力接管这个国家，直到先锋队最终重新归于大众。\n\n毕竟，有些事，只有我们才能办好；我们来了，事情也就解决了。\n§!"
ROK_revolutionary_communism_party:0 "克拉亚诺新革命党"
ROK_revolutionary_communism_party_long:0 "克拉亚诺新革命党\n\n§g新革命党和大多数党派一样，党内并非团结一致。路线之争和政治斗争一刻也不曾停歇。作为新革命党的主流派，埃米·普斯卡娅和她的人民派认为需要在夺权权力后，应该建立起一些机构以确保将政权逐步交还给人民。这种对待权力和政人民的态度让她毫无疑问的成为了党内最大派系的领导者——学生毕竟还是年轻且善良的。虽然党内仍然有不少人批评埃米的政策是痴人说梦，但她始终坚信自己的想法。毕竟她来自人民，也最终将回归人民。\n\n团结的人民永不败！\n§!"
ROK_revolutionary_communism_party_2:0 "克统共"
ROK_revolutionary_communism_party_2_long:0 "克统共（人民派）\n\n§g克统共和大多数党派一样，党内并非团结一致。路线之争和政治斗争一刻也不曾停歇。作为克统共的主流派，埃米·普斯卡娅和她的人民派认为需要在夺权权力后，应该建立起一些机构以确保将政权逐步交还给人民。这种对待权力和政人民的态度让她毫无疑问的成为了党内最大派系的领导者——学生毕竟还是年轻且善良的。虽然党内仍然有不少人批评埃米的政策是痴人说梦，但她始终坚信自己的想法。毕竟她来自人民，也最终将回归人民。\n\n团结的人民永不败！\n§!"
ROK_worldunion_socialist_party:0 "克拉亚诺新革命党"
ROK_worldunion_socialist_party_long:0 "克拉亚诺新革命党\n\n§g新革命党和大多数党派一样，党内并非团结一致。路线之争和政治斗争一刻也不曾停歇。亨利克·洛夫斯基和他领导的缓则派就是其中之一。作为空想社会主义的忠实拥护者，亨利克主张温和的改良主义政策，但又要与社会民主主义划清界限，这让亨利克最终选择加入了新革命党。与党内另一大派系一样，亨利克同样反对现任主席埃米·普斯卡娅的政策。但与先锋派不同的是，亨利克主要反对党内激进的公社化，国有化政策。认为应当以实用的角度去考虑这些制度。\n\n有些事情，急不得，事缓则圆嘛。\n§!"
ROK_worldunion_socialist_party_2:0 "克统共"
ROK_worldunion_socialist_party_2_long:0 "克统共（缓则派）\n\n§g克统共和大多数党派一样，党内并非团结一致。路线之争和政治斗争一刻也不曾停歇。亨利克·洛夫斯基和他领导的缓则派就是其中之一。作为空想社会主义的忠实拥护者，亨利克主张温和的改良主义政策，但又要与社会民主主义划清界限，这让亨利克最终选择加入了克统共。与党内另一大派系一样，亨利克同样反对现任主席埃米·普斯卡娅的政策。但与先锋派不同的是，亨利克主要反对党内激进的公社化，国有化政策。认为应当以实用的角度去考虑这些制度。\n\n有些事情，急不得，事缓则圆嘛。\n§!"
ROK_worldunion_democrat_party:0 "克拉亚诺社民党"
ROK_worldunion_democrat_party_long:0 "克拉亚诺社民党\n\n§g作为克拉亚诺两大传统政党之一，克拉亚诺社民党承担起了共和国的左翼生态位。同时作为一个社会民主主义政党，克拉亚诺社民党从建立之初就一直秉承着温和的社会主义政策。尽管因为在比纳许时期成为投降派的历史原因，社民党一直没能成功胜选。但他们始终坚持着他们的信条。\n\n公平！正义！自由！\n§!"
ROK_worldunion_democrat_party_2:0 "社会民主统一联盟"
ROK_worldunion_democrat_party_2_long:0 "社会民主统一联盟\n\n§g§!"
