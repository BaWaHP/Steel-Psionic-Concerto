###国策###
ROK_continued_economic_recovery_act_of_nineteen_eighty_eight:0 "继续1988经济复兴法"
ROK_continued_economic_recovery_act_of_nineteen_eighty_eight_desc:0 "虽然1988经济复兴法在第一次使用的时候并没有起到多大作用。但事到如今，我们必须赶在莫泽总统还健在的时候重新启用该法律,来尽可能的恢复我们的经济。就算这会让我们的民众感到不满。"
ROK_strengthen_trade:0 "加强贸易"
ROK_strengthen_trade_desc:0 "由于近两代政府的贸易政策，克拉亚诺自比纳许时代开始经济就基本依附于南巴共和国。或许我们应该加强与其他国家的贸易，来摆脱南巴共和国对我们经济的掌握，也能为我们孱弱的经济博得一丝回升的契机。"
ROK_revitalize_industry:0 "振兴工业"
ROK_revitalize_industry_desc:0 "如果想要振兴我们的经济，那么重新振兴克拉亚诺的工业势在必行。比纳许时代给我们留下的工业遗产正好将成为我们重新复兴经济的最好助力。希望这能够成为复兴路上最伟大的政策之一。"
ROK_try_agricultural_mechanization:0 "尝试农业机械化"
ROK_try_agricultural_mechanization_desc:0 "农业问题自近代以来就一直是克拉亚诺历代政府所面临的难题，但我们相信机械化后的农业将彻底解决这一难题。同时我们也将致力于消除城乡差别化,来彻底解决困扰克拉亚诺的农业问题。"
ROK_dealing_with_unemployment:0 "处理失业问题"
ROK_dealing_with_unemployment_desc:0 "《1988经济复兴法》遭到民众反对有着各种原因，但其中一个原因就是对企业和工厂的改革造成大量民众失业。这也是莫泽总统被迫在1991年取消该法案的重要因素之一。但假设我们能够在该法案的体系下尽可能的解决失业问题，或许能够重新赢得群众的支持。"
ROK_invest_in_public_works:0 "投资公共工程"
ROK_invest_in_public_works_desc:0 "如何来处理失业问题呢？毫无疑问，兴修基建将成为解决失业问题的有力手段之一。由政府出钱投资公共工程，雇佣失业的民众来建设这些公共工程。这样既满足了政府对于国家基础设施的建设，也解决了国内民众的失业问题。"
ROK_further_expansion_the_industry_system:0 "进一步拓展工业体系"
ROK_further_expansion_the_industry_system_desc:0 "虽然比纳许时期克拉亚诺的工业体系得到了十足的发展，但毫无疑问的是在现如今的国际局势下；先前的工业化遗产正在逐步落后于世界。我们必须扩展我们的工业体系来确保克拉亚诺不会因为一些可笑的原因落后于世界。"
ROK_invest_in_national_railways:0 "投资国家铁路"
ROK_invest_in_national_railways_desc:0 "铁路作为近代以来国家发展必不可少的基础设施，将会在我们不断的经济改革中起到重要作用。而现在我们需要做的就是投资修建和完善克拉亚诺的铁路，这说不定还会帮助我们解决一部分的失业问题。"
ROK_invest_in_krakow_university:0 "投资克拉亚诺大学"
ROK_invest_in_krakow_university_desc:0 "教育是国家的重中之重。少年强则国强，少年智则国智。我们应该继续加大对克拉亚诺大学的投资，这将会为我们源源不断的提供一代又一代优秀且富有丰富知识的青年。他们将成为未来克拉亚诺的顶梁柱，世界是我们的，也是你们的；但终究是你们的。"
ROK_invest_in_krakow_university_tt:0 "§Y克拉亚诺大区§!:\n   添加§G10%§!§Y科学普及度§!。"
ROK_strengthen_the_social_security_system:0 "加强社会保障体系"
ROK_strengthen_the_social_security_system_desc:0 "克拉亚诺共和国于1975年开始实行社会保障体系，虽然因为各种政治与经济上的问题导致克拉亚诺的社保体系一直不完善；但可以确信的是社保体系确实极大的改善了每一个克拉亚诺公民的生活水平。所以接下来对现行社保体系的加强，将成为我们新的目标。"
ROK_invest_in_higher_education:0 "投资高等教育"
ROK_invest_in_higher_education_desc:0 "克拉亚诺1985年政府规划里曾将对高等教育的投资写入规划，但由于共和国日益严重的政治混乱和各方派系的争斗一直搁置下来。现在我们是时候重新捡起这个目标，进一步发展我们的教育与科研事业。"
ROK_invest_in_higher_education_tt:0 "§Y波兹§!:\n   添加§G10%§!§Y科学普及度§!。\n§Y奥波莱§!:\n   添加§G10%§!§Y科学普及度§!。\n§Y下维尔陶§!:\n   添加§G10%§!§Y科学普及度§!。"
ROK_towards_a_new_economy:0 "走向新经济"
ROK_towards_a_new_economy_desc:0 "经过了如此多的困难与阻碍后，我们终于成功的改革了我们的经济。我们成功完成了历届克拉亚诺政府都没有办到的壮举。从现在开始，一个繁荣，幸福的克拉亚诺将会出现在国际上，将会出现在每一个克拉亚诺公民的心理。"
ROK_he_has_passed_away:0 "斯人已逝..."
ROK_he_has_passed_away_desc:0 "我们伟大的总统莫泽去世了，但国内的情况不容我们来怀念莫泽总统了。现在我们必须做出选择。"
ROK_and_here_is_free:0 "此地空余..."
ROK_and_here_is_free_desc:0 "失去了莫泽的克拉亚诺已经成为了一个巨大的不稳定炸弹，现在只留下了一地狼藉。我们必须在这个炸弹还没爆炸之前，将它稳定下来。"
ROK_emergency_election:0 "紧急选举"
ROK_emergency_election_tooltip:0 "§Y紧急选举大会§!将会召开\n若之后的选举§R陷入僵局§!，§Y$ROK_victory_for_social_democrats$§!、§Y$ROK_victory_for_new_democratic$§!、§Y$ROK_victory_for_democratic$§!这些§Y国策§!将§R永不可用！§!"
ROK_election_deadlocked:0 "选举陷入僵局"
ROK_fire_and_rose:0 "烈火与玫瑰"
ROK_fire_and_rose_desc:0 "烈火与玫瑰desc"
ROK_new_revolution:0 "新的革命"
ROK_new_revolution_desc:0 "新的革命desc"
ROK_new_revolution_tt:0 "§Y克拉亚诺人民阵线(革命共产主义)§!成为执政党。\n\n获得§Y$ROK_fire_reburn_modifier$§!，其效果为（政治点数:§R-20%§!，稳定度:§R-30%§!，战争支持度:§R-15%§!，建造速度:§R-15%§!，工厂产出:§G+5%§!，生活消费品工厂:§Y+10%§!，\n先锋共产主义新增支持度:§G+0.02§!\n革命共产主义新增支持度:§G+0.02§!\n社会世联主义新增支持度:§G+0.02§!\n民主世联主义新增支持度:§G+0.02§!）。\n\n"
ROK_choose_the_left:0 "已选择左派路线"
ROK_redistribute_the_money:0 "重新分配财富"
ROK_redistribute_the_money_desc:0 "重新分配财富desc"
ROK_redistribute_the_money_tt:0 "\n§Y$ROK_fire_reburn_modifier$§!追加效果:\n政治点数:§G+5%§!\n稳定度:§G+10%§!\n战争支持度:§G+5%§!\n建造速度:§G+5%§!\n生活消费品工厂:§Y-5%§!"
ROK_control_the_means_of_production:0 "控制生产资料"
ROK_control_the_means_of_production_desc:0 "控制生产资料desc"
ROK_control_the_means_of_production_tt:0 "\n§Y$ROK_fire_reburn_modifier$§!追加效果:\n政治点数:§G+10%§!\n稳定度:§G+10%§!\n建造速度:§G+5%§!\n工厂产出:§G+10%§!"
ROK_break_down_social_class:0 "打破社会阶级"
ROK_break_down_social_class_desc:0 "打破社会阶级desc"
ROK_purge_the_opposition:0 "清洗反对派"
ROK_purge_the_opposition_desc:0 "清洗反对派desc"
ROK_new_workers_union:0 "新的工会"
ROK_new_workers_union_desc:0 "新的工会desc"
ROK_new_workers_union_tt:0 "\n§Y$ROK_fire_reburn_modifier$§!追加效果:\n政治点数:§G+10%§!\n稳定度:§G+10%§!\n战争支持度:§G+10%§!\n建造速度:§G+10%§!\n工厂产出:§G+5%§!\n生活消费品工厂:§Y-5%§!"
ROK_purge_careerists_in_the_army:0 "清洗军队中的野心家"
ROK_purge_careerists_in_the_army_desc:0 "清洗军队中的野心家desc"
ROK_purge_careerists_in_the_army_tt:0 "§Y解锁新的将领。§!"
ROK_ensure_the_economy:0 "确保经济"
ROK_ensure_the_economy_desc:0 "确保经济desc"
ROK_revolution_win:0 "宣告革命成功"
ROK_revolution_win_desc:0 "宣告革命成功desc"
ROK_revolution_win_tt:0 "以§Y$ROK_victory_of_people$§!取代§Y$ROK_fire_reburn_modifier$§!\n效果变化:\n稳定度:§G+10%§!\n政治点数:§G+5%§!\n建造速度:§G+5%§!\n工厂产出:§G+5%§!\n生活消费品工厂:§Y-5%§!"
ROK_declare_martial_law:0 "宣布戒严"
ROK_declare_martial_law_desc:0 "新革命党与社民党的左翼政府只会进一步加深克拉亚诺目前的乱局，我们的人民需要稳定。而目前来看，前政府早已丢失民心，只有让我们忠于祖国的军队出动才能稳定局势了。克拉亚诺的人民不需要所谓的进步，也不需要解放。他们只需要稳定——至少军队是这么想的。忠臣的军队将对首都展开戒严，直到将那些左翼分子彻底清除出去。"
ROK_choose_the_right:0 "已选择右派路线"
ROK_disolve_parliament:0 "解散议会"
ROK_disolve_parliament_desc:0 "依照《1970年克拉亚诺共和宪法》来说，总统有权利宣布解散议会。虽然在1973年民主政变之后，该条款被修改。但这不妨碍军队宣布代行总统职责之后选择执行1970年宪法。再者，那些一天天只会在议会里大吵特吵的蠢货议员们早就该滚回老家了。只会翻来覆去的吵架而做不出任何决策的议会有什么作用？这样的民主是对人民的不负责。接下来只需要让军队进入议会，“请”那些议员们回家好好休息就可以了。毕竟社民党议员永久缺席的本届议会也没有存在的理由了不是？\n\n§R德谟克拉西最终向绝对的权威与武力低下了头颅。§!"
ROK_military_suppresion:0 "军事镇压"
ROK_military_suppresion_desc:0 "共和国军队自诞生那一天就被英雄科沃斯基赋予了一项神圣的使命：不惜一切代价的保证共和国的稳定。虽然这句话是被比纳许曲解过的，但这无疑是对军队目前的所作所为提供支持的最好理由。自莫泽逝世之后，各种极端分子，民众游行络绎不绝。这显然不是科沃斯基所期盼的稳定。军队要遵从科沃斯基的指示，保证共和国的“稳定”。而那些不听从军队命令，一意孤行的游行队伍，政治团体。一定不是我们的国民，而是被外国势力挑动的叛徒。军队应当对这些人进行镇压，让他们永远不能再发声。\n\n§g夜色与血色染尽了祖国，而祖国对此默不作声。§!"
ROK_loyal_to_mothernation:0 "忠于祖国"
ROK_loyal_to_mothernation_desc:0 "对于军人来说，服从命令为天职。问题在于，军人究竟要服从谁的命令？不过这个问题的答案，我们的武装总司令早已告知我们：军人都是很单纯的，他们只会为了国家的利益而战斗。我们军人的利益，或者说军队的利益都是与国家高度绑定的。如果连军队都不忠诚于国家，那么这个国家里还有谁能靠得住？接下来，就和我们一起对着祖国的旗帜宣誓忠诚吧。\n\n§g虚伪的腐烂者向我的祖国表达忠诚，然后将我的祖国拥入怀抱。§!"
ROK_limited_cop_with_dem:0 "和民主党的有限合作"
ROK_limited_cop_with_dem_desc:0 "民主党的前任总统比纳许·海耶在军队中一直拥有着较强的影响力，而且现任的民主党领袖也有意与军队达成合作。虽然军队并不想讲权力交还给文官政府，但只是做做样子还是可以的。让民主党组建一个完全听命于军队的傀儡文官政府，直到军队完成对整个国家的改造与重建。当然，军队是仁慈且人道的。对于这些文官政府的合作者，军队会给他们一个完美的结局——作为被抛弃的棋子而存在。\n\n§R谄媚者成为了祖国的领袖，而忠诚者死在了祖国的大地上。§!"
ROK_limited_cop_with_dem_tt:0 "§Y这将是文官政府的最后一次组阁，民主党领袖已经做好了解散民主党的准备。§!"
ROK_eliminate_new_rev:0 "消灭新革命党"
ROK_eliminate_new_rev_desc:0 "没有什么比新革命党这帮赤匪更令人感到恶心与恐惧了。他们举着所谓的“进步”大旗来摧毁我们的传统，他们高呼着“革命”来搅乱我们的国家。不能再让这种事情发生在我们的国家了，军队将会镇压所有的赤色分子与革命者，直到最后一丝共产主义的流毒从克拉亚诺的土地上被清除出去。具体来说就是：抓一个，杀一个，杀到血流滚滚，杀到头颅满地。\n\n§R太阳已经落山，而革命者的结局早晚会重复在国民身上。§!"
ROK_eliminate_new_rev_tt:0 "§R新革命党与社民党已被查禁。§!"
ROK_reorg_national_cops:0 "重组国家警察"
ROK_reorg_national_cops_desc:0 "如果说比纳许总统有哪一点让军队对他刮目相看且跃跃欲试的话，那么在1960年组建的国家秩序警察便是其中之一。《1960年克拉亚诺警察法》规定：国家秩序警察只听从克拉亚诺总统的直接命令，拥有法外职权。可绕过法律随时处置国家之敌。可惜如此高效且人道的警察部队在1973年民主政变之后被莫泽取缔，不得不让人痛心疾首。在国家危难时刻，军队应重新组建该部队并将他们派往国家的每一处，以保证国家的局势稳定。\n\n§R灰黑色的皮靴踩在地上，而我们的鲜血早已染红了路面。§!"
ROK_military_society:0 "社会军事化"
ROK_military_society_desc:0 "从顿伏茨克征服克拉亚诺开始，直到共和革命后克拉亚诺共和国的建立来看。我们的国民显然逐渐失去了荣耀心与战争欲。虚假的民主与罪恶的共和已经侵蚀了我们国民的内心，他们已经忘记了我们伟大的祖先是如何成为南巴斯蒂亚的雄鹰，征服整个南巴斯蒂亚东方的荣光了。在这被腐化了的国家里，只有克拉亚诺的军队还在铭记着过去的荣耀。我们必须在整个国家实行军队的清教徒政策与全面的军事化管理。只有这样，我们才能让克拉亚诺从民主的泥潭中拉出，恢复她往日的荣光。\n\n§g让我们想一想，上一个清教徒式的国家是如何自取灭亡的？§!"
ROK_expand_martial_law:0 "军事戒严扩大化"
ROK_expand_martial_law_desc:0 "即便军队第一时间采取了戒严的方式以消除这个国家的左翼威胁。但全国各地不断爆发的民众游行还是令我们头痛不已。各地的镇压次数不断攀高，这是我们不愿意看到的。我们的国民一定是被那些该死的左翼分子鼓动进而反对我们的新政府，为了消灭这些潜藏在民众中的叛乱分子，军事戒严将被进一步扩大化。授权各地军队在宵禁时间与证据确凿的情况下，对叛乱分子和不听从命令的公民开火。我们相信此举定会将我们从镇压游行的怪圈中拉出。一切为了稳定，稳定就是一切。\n\n§R枪声惊天动地，尸体布满街道。§!"
ROK_establish_new_system:0 "确立新体制"
ROK_establish_new_system_desc:0 "我们做到了！所有的不洁分子与左翼恐怖分子都被清除，军队做到了他们对国家的誓言。温和派军官已经被从军队中肃清，文官政府已经完成了他的历史使命。现在是时候该建立一个全新的体制了。一个符合我们的利益，符合我们的述求，充满未来的新政府将被确立。如此，军队的历史使命也将完成。我们心中多年的夙愿也终将实现：撕碎民主，打破共和！"

ROK_victory_for_social_democrats:0 "社民党的胜利"
ROK_victory_for_social_democrats_unlock:0 "§Y社民党§!从选举中获胜。"
ROK_victory_for_social_democrats_desc:0 "社民党已经取得了胜利，我们相信克拉亚诺会在社民党的带领下走向美好的未来。就像他们许诺过的那样。"
ROK_victory_for_new_democratic:0 "新民主党的胜利"
ROK_victory_for_new_democratic_unlock:0 "§Y新民主党§!从选举中获胜。"
ROK_victory_for_new_democratic_desc:0 "新民主党再次赢得了选举，我们必须要让民众看到我们解决问题的能力。也许暂时性的妥协可以挽救危局。"
ROK_victory_for_democratic:0 "民主党的胜利"
ROK_victory_for_democratic_unlock:0 "§Y民主党§!从选举中获胜。"
ROK_victory_for_democratic_desc:0 "民主党奇迹般地赢得了选举，我们必须要让民众看到我们解决问题的能力。对待暴动分子绝不手软，只有强硬的镇压才能拯救克拉亚诺。"
ROK_stick_to_democracy:0 "坚守民主"
ROK_stick_to_democracy_desc:0 "新民主党自莫泽创建之初就是为了保卫克拉亚诺来之不易的民主。那么在危机来临的现在，新民主党更加需要坚守莫泽的遗产。"
ROK_make_the_promise:0 "做出许诺"
ROK_make_the_promise_desc:0 "虽然新民主党取得了紧急选举的胜利，但国内局势仍然不容乐观。为了防止新革命党人煽动人民发动叛乱，我们需要向人民许诺一些改革。当然，我们会兑现它们。"
ROK_compromise_with_all_parties:0 "向各方妥协"
ROK_compromise_with_all_parties_desc:0 "现在正值全国危难之际，为了稳定局势。我们必须向各方势力暂时妥协，以换取暂时的稳定。"
ROK_worker_benefits:0 "工人福利"
ROK_worker_benefits_desc:0 "为了防止新革命党和极右分子试图依靠工人发动对民主制度的动乱。我们必须给工人发放福利。并且进一步提高工人的工作环境。让我们从极端分子手里解放工人吧！"
ROK_continue_the_democratization_process:0 "继续民主化进程"
ROK_continue_the_democratization_process_desc:0 "新民主党是民主的急先锋，是一切专制制度的敌人。正如15年前莫泽反对比纳许一样。新民主党将会把推行民主进行到底。为了人民，也为了克拉亚诺，更是为了莫泽。"
ROK_rebirth_security_act_of_nineteen_seventy_six:0 "重申1976国家安全法"
ROK_rebirth_security_act_of_nineteen_seventy_six_desc:0 "1976国家安全法是由时任总统比纳许·海耶亲自起草的国家法律之一。该法律专门用来针对国家有可能出现的一切动乱问题，该法律允许军队和武警在国家动乱时期对游行人群以及一切叛乱分子开火。现在是时候来重新启用这个法律了。"
ROK_rebirth_security_act_of_nineteen_seventy_six_tt:0 "获得§Y$ROK_security_act_of_1976_dynamic_modifier$§!，其效果为（稳定度:§G+5%§!，政治点数:§R-5%§!，适役人口修正:§R-10%§!）。"
ROK_stop_exposure:0 "制止暴乱"
ROK_stop_exposure_desc:0 "我们的首要任务就是维持国家稳定，对待一切试图在克拉亚诺引发暴乱的极端分子绝不手软！我们必须消灭这些极端分子和他们的追随者。为了克拉亚诺的稳定，Eins，zwei，drei，Feuer！"
ROK_stop_exposure_tt:0 "§Y$ROK_security_act_of_1976_dynamic_modifier$§!追加效果:\n稳定度：§G+5%§!\n适役人口修正：§G+5%§!\n工厂产出：§G+5%§!"
ROK_loyalty_to_namba:0 "对南巴的忠心"
ROK_loyalty_to_namba_desc:0 "前任民主党籍总统比纳许的联邦主义政策十分成功，这成功让民主党连续执政十五年。但是比纳许也是个蠢货，不懂得见好就收。这才失去了南巴的支持。我们绝不会再次重蹈覆辙。"
ROK_the_social_problems_are_national_problems:0 "社会问题就是国家问题"
ROK_the_social_problems_are_national_problems_desc:0 "我们应该把社会发生的问题当作国家的中心问题来就解决，我们相信那些富有人道主义的富豪和精英阶级将会把解决社会问题视为己任。一个美好的前景将在民主党的带领下成为现实。"
ROK_cooperate_with_the_military:0 "和军队保持合作"
ROK_cooperate_with_the_military_desc:0 "军队里有许多前总统比纳许的支持者，他们非常支持民主党。这对我们来说是非常有利的，所以我们应该与军队保持合作，只有这样才能在稳定住军队中的旧贵族的同时拉拢军队中的比纳许支持者为我们效力。"
ROK_cooperate_with_the_military_tt:0 "§Y$ROK_security_act_of_1976_dynamic_modifier$§!追加效果：\n政治点数：§G+10%§!\n适役人口修正：§G+10%§!\n工厂产出：§G+10%§!"
ROK_sign_the_emergency_bill:0 "签署紧急法案"
ROK_sign_the_emergency_bill_desc:0 "社民党赢得了选举，我们必须要让民众看到我们解决问题的能力。紧急法案的签署将会为我们带来解决问题的方法。"
ROK_sign_the_emergency_bill_tooltip:0 "创建情报机构§Y克拉亚诺第五局§!。"
ROK_country_life_movement:0 "乡村生活运动"
ROK_country_life_movement_desc:0 "克拉亚诺的农村环境自比纳许时代开始被逐渐边缘化，虽然在莫泽时代有所好转，但这仍然是我们需要改进的目标之一。"
ROK_solve_economic_problems:0 "解决经济问题"
ROK_solve_economic_problems_desc:0 "历届克拉亚诺政府都试图解决困扰克拉亚诺的经济问题。很显然他们几乎都失败了。社民党政府也将继续将解决经济问题作为政府的目标之一。我们的新经济政策会让克拉亚诺的经济实现腾飞。同时也能堵上议会反对派的嘴。"
ROK_guarantee_to_international:0 "对国际的保证"
ROK_guarantee_to_international_desc:0 "莫泽总统一直奉行联邦主义和共和国际主义。社民党政府也应该继续这一政策，以换取南巴共和国对我们的支持"
ROK_protect_workers_rights:0 "保障工人权益"
ROK_protect_workers_rights_desc:0 "社民党的目标之一就是保障我们工人兄弟的权益。工人们不仅是社民党的传统票仓之一，也是实现我们社会民主主义伟大设想中必不可少的一环。再苦，也不能苦了工人！"
ROK_opportunities_for_unions:0 "工会的机遇"
ROK_opportunities_for_unions_desc:0 "莫泽时代虽然不像比纳许时代一样对工会完全进行打压，但放开的程度还是有限的，现在轮到我们上台了，社民党将放开对工会的限制。"
ROK_opportunities_for_unions_tooltip:0 "\n§Y$ROK_worker_benefits_idea$§!追加效果：\n生产效率上限：§G+5.00%§!\n政治点数：§G+5.00%§!\n\n"
ROK_uphold_human_rights:0 "维护人权"
ROK_uphold_human_rights_desc:0 "我们应该把人权作为克拉亚诺新一届政府的核心议题，任何时候，人权都是必要的。也应该是必要的。"
ROK_uphold_human_rights_tooltip:0 "§Y$ROK_worker_benefits_idea$§!追加效果：\n月度人力：§G+20.00%§!\n工厂产出：§G+10.00%§!\n"
ROK_bread_and_roses:0 "面包与玫瑰！"
ROK_bread_and_roses_desc:0 "我们成功了！社民党成功的稳定了局势，一个平等，和谐，自由，繁荣的克拉亚诺近在眼前。面包会有的，玫瑰也是。"
ROK_bread_and_roses_tt:0 "§Y$ROK_worker_benefits_idea$§!追加效果：\n每月人民生活水平变化：§G+2§!\n每月农业发展水平变化：§G+2§!\n每月工业发展水平变化：§G+2§!\n\n"
ROK_reorganization_front:0 "重组阵线"
ROK_reorganization_front_desc:0 "在莫泽执政初期，社民党和新民主党组建了全国民主阵线。但在1988年，因为双方就《1988经济复兴法》的分歧，全国民主阵线解散。特殊时期，我们需要所有能获得的帮助。"
ROK_revitalize_agriculture:0 "振兴农业"
ROK_revitalize_agriculture_desc:0 "自莫泽时期开始新民主党一直力图于解决农业问题，但由于各种原因一直没能解决成功。我们将会使用一切手段来解决农业问题，尤其是在这个危急时刻，要想获得农民的支持，解决农业问题势在必行。"
ROK_smooth_sailing:0 "平稳航行"
ROK_smooth_sailing_desc:0 "我们做到了，我们成功保住了莫泽的遗产，民主将在克拉亚诺继续前进，为了民主，为了莫泽，为了人民，为了共和国！"
ROK_alleviate_the_crisis:0 "缓解危机"
ROK_alleviate_the_crisis_desc:0 "强硬的镇压不可能一直奏效，有些时候萝卜比大棒更为有效。对民众的有限让步将会缓解克拉亚诺目前所遭受的危机。"
ROK_alleviate_the_crisis_tt:0 "§Y$ROK_security_act_of_1976_dynamic_modifier$§!追加效果：\n政治点数：§G+10%§!\n稳定度：§G+10%§!\n适役人口修正：§G+5%§!\n工厂产出：§G+10%§!"
ROK_the_new_rural_system:0 "新农村体系"
ROK_the_new_rural_system_desc:0 "农业问题在比纳许总统时期爆发出来，但很明显比纳许总统并没能意识到这个问题是多么的严重。莫泽上台后虽然有心解决农业问题，但效果一直不明显。我们需要改善农村环境，加强农村的建设。一个新的政策将彻底改变克拉亚诺的农业体系，农民也会支持我们的政府。"
ROK_orderly:0 "秩序井然"
ROK_orderly_desc:0 "我们已经打光了我们手里的牌，但是我们胜利了。我们已经重新确立了克拉亚诺的稳定。极端分子已经被消灭干净，游行的人群已经化为了子弹下的亡魂。一切不稳定的因素已经消失，一个稳定的，秩序的克拉亚诺已经出现在了我们眼前。民主党万岁！克拉亚诺万岁！"
ROK_morality_equality_prosperity:0 "道德，平等，繁荣"
ROK_morality_equality_prosperity_desc:0 "克拉亚诺已经度过了最危险的时期，一个崭新的，强大的，稳定的克拉亚诺将要崛起。我们将牢记英雄科沃斯基的教导，向着道德，平等，繁荣前进！"

#康米1#
ROK_red_flag_arise:0 "红旗终招展"
ROK_red_flag_arise_desc:0 "经过一段并不轻松，甚至可以说是艰难的岁月。我们还是成功让克拉亚诺的土地升起了人民的旗帜。但是这并不是结束，而是刚刚开始。局势尚未平稳，我们接下来要做的事情还有很多。比方说，有两个主要的问题..."
ROK_red_flag_arise_tt:0 "§R打起精神吧同志，接下来该干活了！我们的事情很多，但或许，我们可以一个个处理好？§!"
ROK_watch_inside:0 "看向内部"
ROK_watch_inside_desc:0 "当你从革命胜利的喜悦中清醒过来，去查看新革命党内部的情况。那你就会感到惊叹：这个党是如何做到在这么分裂的情况下取得革命的胜利的？内部的三大派系的矛盾几乎要到达顶峰。虽然经过革命期间的妥协，人民派暂时占据了主导地位。但其余的两个派系并不打算就此放弃。施塔尔的先锋派和亨利克的缓则派已经开始向人民派领导人埃米发起了“斗争”。看起来这似乎是不可能调和的了。政治斗争的最终结果将会影响整个党的方向..."
ROK_watch_inside_tt:0 "§R同志，当现状不可维系，那就要大胆向前看了。§!"
ROK_vanguard_voice:0 "先锋之声"
ROK_vanguard_voice_desc:0 "施塔尔·威克斯的先锋派代表了新革命党内部的集权派系。他们在革命胜利之后变的愈发强大，有部分下级组织已经开始越过中央直接进行地方上的活动。先锋派致力于加强党的权威，这显然与目前新革命党奉行的放权策略相悖，不过他们依然获得了许多党员的支持。就像施塔尔说的那样，这些先锋主义者们誓要将那些落后的人们拖入崭新的21世纪。"
ROK_vanguard_voice_tt:0 "§R或许我们可以将先锋之声传遍全世界？§!"
ROK_as_people_demand:0 "依人民之诉求"
ROK_as_people_demand_desc:0 "埃米·普斯卡娅的人民派是目前党内最具影响力的派别，不过同时，他们也受到其余两派的挑战。人民派的政治目标是在确保党的总体领导下，建立一个自下而上的代表大会体制。这样的目标显然得不到大量旧革命同盟的老党员支持，不过埃米还是得到了许多改组之后的年轻党员的热烈拥护。他们将这种体制视为对人民最好的解放，通过解放人民的力量，新革命党将更好的改造这个国家。同时，新革命党也将更容易倾听人民的声音，从而获知什么才是人民心中真正在意的事情。"
ROK_as_people_demand_tt:0 "§R散是满天星，聚是一团火。§!"
ROK_back_one_step_move_forward:0 "退一步，进两步"
ROK_back_one_step_move_forward_desc:0 "缓则派的缓则两字取自古语：事缓则圆。这四个字也代表了由亨利克·洛夫斯基所领导的缓则派的作风。缓则派的成员们几乎反对一切激进的观点，这也使得他们与先锋派和人民派注定无法和解。按照他们的设想，新革命党应该通过暴力手段取得政权。但在掌握政权之后，应该采取改革而非革命的方法建设共产主义。在尽量不破坏旧有体系的前提之下，通过一系列的改革计划将克拉亚诺过渡到共产主义社会。而在此之前，新革命党将成为人民的大家长。带领人民走向新时代。"
ROK_back_one_step_move_forward_tt:0 "§R别急别急，心急吃不了热豆腐。§!"
ROK_split_from_inside:0 "貌合神离"
ROK_split_from_inside_desc:0 "我们尽了最大的努力试图弥合党内各派系的矛盾，但很可惜收效甚微。目前虽然在明面上，我们仍然保持一致。但在背地里，各方派系已经开始行动了。当妥协只能换来更进一步的妥协，当让步只能换来更大的让步，那么是时候开始选边站了。但即使党内斗争风起云涌，至少在国民与军队面前，我们仍是一股绳。没有人不希望能够和平的解决争端，没有人不希望我们像真的兄弟一样同心同体。但事实已摆在面前，箭在弦上不得不发。希望当一切结束时，这些都只是过眼云烟。"
ROK_split_from_inside_tt:0 "§R遍布党内的阴云已经开始下雨，我们需要尽快做出决断了。§!"
ROK_watch_nowadays:0 "着眼当下"
ROK_watch_nowadays_desc:0 "抛开新革命党内的斗争不谈，目前新革命党最为主要的问题就是在夺权政权之后，如何治理这个崭新的国家。在经过了比纳许40年的独裁统治以及莫泽15年的粘合板政权之后，留给新革命党的是一个彻彻底底的烂摊子：军队野心勃勃，政策反复无常，整个国家依靠着莫泽的个人威望艰难维持。如果人民阵线政府想要稳固政权，那么这个烂摊子就必须要尽快处理了。我们一定会兑现我们给予人民的诺言：一个正义，平等，强大的新国家。"
ROK_watch_nowadays_tt:0 "§R同志，看起来是我们应该兑现承诺的时候了。§!"
ROK_sweep_old_guards:0 "清查旧建制派"
ROK_sweep_old_guards_desc:0 "除开反对我们的旧军队余孽外，除了我们的社民党盟友之外的建制派们也是反对我们新政府的主要力量。他们依然试图通过集会和演讲来诋毁我们的政府，即使我们并不想对这些共和派动手，但他们的行为已经深深的影响了我们的现存秩序。以新民主党党首卡塔日娜和民主党党首奥辛斯基为首的旧建制派，以及半独立的民族党们必须被消灭。社会主义保卫局已经开始清查旧建制派的关系网，我们必须将这种不稳定的因素从社会主义新国家中清除出去。"
ROK_sweep_old_guards_tt:0 "§R面对反对派，我们绝不留情。§!"
ROK_plan_arg_dev:0 "规划农业发展"
ROK_plan_arg_dev_desc:0 "如果说新政府有什么地方和前任政府差距最大。那么农业政策绝对榜上有名。尽管经过了一定的土地改革和对农业方面的自由化，但前政府的土地兼并现象依然屡见不鲜，且对农村的过度开发也造成了严重的环境污染。新政府将着手制定新的农业体系，将土地全部交由新成立的农村委员会进行统一分配以确保农民能够获得土地。同时，对环境的保护也将提上日程。我们不会让后代们一生与钢铁水泥作伴。"
ROK_plan_arg_dev_tt:0 "§R完成我们的承诺，将土地还给人民！§!"
ROK_consolidate_union:0 "巩固阵线联盟"
ROK_consolidate_union_desc:0 "从实际情况来看，新革命党能够控制住共和国的局势，人民阵线的另一成员——社民党功不可没。虽然对于这个以改良主义为主导思想的政党，他们与新革命党的关系并不像表面上那样，是共同革命的战友，是一条绳上的蚂蚱。相反，社民党与新革命党组成的人民阵线在夺取政权之后很快便开始变得离心离德。不过得益于改良主义者们对于撕破脸皮的恐惧，与新革命党对军队的改造掌控已经初步完成。目前人民阵线依然维持着表面的和平。不过对于我们来说，阵线联盟不能解散，至少不能现在解散。所以，对阵线联盟的巩固是我们下一步的重要目标。"
ROK_consolidate_union_tt:0 "§R当我们团结在一起，一切困难我们都会战胜！§!"
ROK_all_settle_down:0 "人事皆定"
ROK_all_settle_down_desc:0 ""
ROK_toward_victory:0 "向胜利迈去？"
ROK_toward_victory_desc:0 "准备工作已经结束了。我们尽力平衡了党内即将失衡的派系势力，解决了一部分眼下需要优先解决的问题。我们已尽力做到最好。甚至于我们可以充满自信的高喊一句：我们正在向胜利前进...吗？\n\n很显然，新政府的问题依旧存在。尽管我们已经尽力平衡党内派系，但历史的大潮不可阻挡，新革命党内部分裂几乎已成定局。阵线联盟虽然依旧维持，可社民党的影响力正在不断缩小。国内反动势力仍然存在于共和国各地，目前还无法完全肃清。新一期农业法案已经下发，但在基层的推进受到了庞大的阻力。革命好像胜利了，红旗已经飘扬在克拉亚诺的上空。但革命又好像失败了，内斗，混乱，政策受阻...这些旧政府的病灶一个没少。\n\n但至少现在，我们可以在成功的盛宴里稍微休息一下了。"
ROK_toward_victory_tt:0 "§R同志，现在就让我们暂时休息一下吧。§!"
ROK_toward_victory_tt_1:0 "§R埃米主席§!当选！"

#埃米#
ROK_chairman_amy:0 "埃米主席"
ROK_chairman_amy_desc:0 "克拉亚诺统一共产党的党内斗争落下了帷幕。最终，这个在党最危难的时刻加入的年轻领袖：埃米普斯卡娅取得了胜利。这不但标志着人民派的政治方针将成为克统共的核心思想，也标志着这位年轻又充满活力的大学博士将要开启一条没有人走过的新道路。\n\n从临时主席正式变为主席的埃米承诺会将权力从党逐步交还给克拉亚诺人民。同时，她还主张以工人民主自治为核心的经济制度，力图将旧资产阶级的经济从新生的克拉亚诺中剔除。尽管她的行为一再被党内的老资历们批评为幼稚。可一旦她要是成功了，那整个克拉亚诺都将迎来一个崭新的时代。\n\n埃米主席的任期马上就要开始，她面临的问题一点也不少。但正如她在大学期间的演讲所说的那样：莫泽总统不会退缩，革命的先行者也不会退缩，她更不会退缩。旧世界，你要当心了。因为新世界就要发起进攻了！"
ROK_chairman_amy_tt:0 "§O埃米·普斯卡娅主席赢得了胜利，她将带领新生的克拉亚诺社会主义共和国走向一条全新的道路。§!"
ROK_people_have_spoken:0 "人民已经发声..."
ROK_people_have_spoken_desc:0 "埃米主席的胜利自然有她本人的努力在，但人民的呼声也取得了决定性的作用。克拉亚诺的历史很长，即使是在共和革命之后。克拉亚诺的民主历史也是南巴各国里首屈一指的。但即使这漫长的民主化历史好像是给民众带来了自由与安宁，可同时也给克拉亚诺埋下了温和的种子。从比纳许的独裁，到莫泽的被架空。克拉亚诺的人民好像一个旁观者，他们总是抱着事情很快就过去的想法，亦或是抱着总会有人站出来的想法。当莫泽的去世与建制派的四分五裂后，人民终于醒了。逐渐极端化的社会环境与困扰多年的社会问题，让他们终于意识到如果他们自己不站出来，那么就没人替他们说话了。回到现在，人民已经发出了他们的声音。埃米主席将和他们掀起一场全新的风暴！"
ROK_fight_for_yourself:0 "...为你自己而战"
ROK_fight_for_yourself_desc:0 "从某种意义上来说，克拉亚诺的群众是历代统治者们所追寻的“好百姓”。除去千年之前的异族入侵和大公严重的剥削压榨外，克拉亚诺的群众已经很久没有闹出什么乱子了。比纳许的专制独裁没能激起民众的强烈反抗，更多的人选择了顺其自然。莫泽总统被议会架空以至于政策无法推行也没能激起民众的愤慨，或许在更多人看来这是民主的必要之痛。\n\n但他们不是从来如此的，在比纳许时期也有许多人为了民主而奋战，在莫泽被架空的时候也有人愤而上街游行。那些旧建制派们似乎有些想当然了，认为克拉亚诺的群众可以把他们自己抛之脑后，只是为了国家而活。但新革命党告诉他们——不对。就像他们在宣传单上所说的那样：公民们，劳动者们，这不是为了救国，也不是为了什么宏大叙事。只是为你，为了你自己的未来。"
ROK_form_committee:0 "成立委员会"
ROK_form_committee_desc:0 "在埃米主席看来，旧时代的政治体制并不能代表人民群众的真正意愿。通过一些专业的议员来代表人民简直是最愚蠢的行为。为此，埃米主席将成立一个全新的委员会。这个全新的委员会代表将直接从人民中选出，涵盖克拉亚诺社会上的每个阶级与组织。在进行社会主义改造与过渡阶段将会由这个新委员会全面掌权，以防止人民集体的意愿被个别人否定。"
ROK_form_committee_tt:0 "§t人民将发出他们的声音。§!"
ROK_rev_move_forward:0 "让革命继续向前"
ROK_rev_move_forward_desc:0 "虽然大体上的革命已经基本结束，克拉亚诺统一共产党已经掌握了这个新国家。但还有新的问题等待着革命者解决。早在克统共刚刚上台的时候，埃米主席就发表了名为《何人胜利》的文章。文章里指出了目前新生的克拉亚诺社会主义共和国所面临的新问题。社会主义改造尚未起步，旧建制派化整为零试图潜入革命的队伍，人民依然未能完全掌握属于他们的国家。因此，革命并没有结束。甚至她才刚刚开始。埃米从来不是一个喜欢坐在象牙塔里的人。当她走上这条道路的时候，一切便已经注定。为了她心中的愿景，革命之路将继续向前。"
ROK_opposition_opponent:0 "反对派的反对者"
ROK_opposition_opponent_desc:0 "埃米在克统共党内的地位十分奇妙。身为半路才加入统一共产党的年轻党员，却凭借着出众的能力和坚定的立场成为了党内主流派系的领导者。而在这之前，埃米则以反对派的反对者而闻名于党内。在当时党内主流派系过于脱离群众，试图依靠自己发动革命而非动员群众的时候，埃米加入了党内的联合反对派。但反对派里日益庞大的右倾投降主义让埃米十分反感，他在党内大会上一边批判主流派系的同时也没有放过指责反对派。\n\n不过她这独特的作风确实吸引了许多党员，尤其是年轻党员成为她的追随者。而当埃米成为主席后的现在，她所谓“反对派的反对者”则越发倾向于字面意义。尤其是在那次谈话后，如果不能保证自己的掌握大局，又何谈为人民谋权益呢？"
ROK_new_cul_exp:0 "新文化实验场"
ROK_new_cul_exp_desc:0 "得益于左翼艺术阵线与统一共产党的同盟，以及埃米主席本人对先锋艺术文化的肯定态度。一种以社会主义为宣传目标，先锋艺术为宣传形式的艺术文化将会在克拉亚诺进行传播。不过这种形式面临的最主要问题恐怕是一般民众的理解问题。在埃米主席的授权下，左翼艺术阵线打算在全克拉亚诺地区进行广泛的艺术试验。以确保当这种全新的社会主义艺术开始传播时，民众们都能了解他们想表达什么。\n\n社会实践才检验一切的标准，新文化只有经过实验才知道会不会得到认可。"
ROK_flute_sounded_from_everywhere:0 "当笛声从各处响起"
ROK_flute_sounded_from_everywhere_desc:0 "笛子可以说是克拉亚诺的民族——洛夫特人的代表乐器。在克拉亚诺有句俗话：如果笛声响起，那么洛夫特就在身边。目前克拉亚诺境内的民族主要由洛夫特，苏德瑞尔和维尔陶构成。其中苏德瑞尔人一直处于较高的社会地位。洛夫特人则一直受到联邦压制。比纳许不在乎笛声，因为他会让笛声再也不能响起。可是他忘了，每一个洛夫特人都会吹响他们的笛子。莫泽总统也许很在乎笛声，但他没办法再让洛夫特的笛子吹响欢快的曲调。笛声已经沉默太久了，久到上一次笛声在四处响起时好像是在神话时代。笛声却又似乎一直响着，因为还有哪怕一个洛夫特人仍然活在世界上。\n\n沉寂也好，一直吹响也罢。目前摆在我们面前的只有一种情况，也只会有一种情况：笛声一直响起，在克拉亚诺的四处响起，永不磨灭。"
ROK_flute_sounded_from_everywhere_law_tt:0 "§Y民族融合法案§!将提交给委员会表决:"
ROK_dismantle_front:0 "解散阵线"
ROK_dismantle_front_desc:0 "在革命进行到现在这一步时，人民阵线已经不在适用于当前的政治形式了。一部分旧建制派以所谓民主人士，无党派人士的身份加入人民阵线。意图阻扰，破坏克拉亚诺社会主义的建设。我们必须勒令社会民主统一联盟肃清内部的蛀虫，同时我们也要将目光看向那些所谓的“独立人士”。通过解散人民阵线可以重组目前的体系任命，将那些无法确认忠心与否的独立人士换下，等到日后通过政治审查之后再重新启用。至于那些混进革命队伍的旧建制派，我们绝不留情。"
ROK_cure_people:0 "惩前毖后，治病救人"
ROK_cure_people_desc:0 "描述：即使埃米已经赢得了党内斗争的胜利。但从事实上来讲，斗争失败的两个派系依旧拥有着一定党内控制力。施塔德和亨利克虽然已经从党内高层的位置上离开，但这么多年的深耕运作还是让他们保持着一定的影响力。试图对他们两个人进行思想上的纠偏已经被证明是不可能的，但他们手下的党员却不同。对于这些走上错误道路的同志，我们要对他们进行思想上的纠偏，让他们得以认清他们的错误。已经改正的同志，我们将会允许他们继续参加革命工作。此所谓“治病救人”。\n\n但对于他们已经所犯下的错误我们也会绝不留情的进行批判。而对于那些抗拒“医治”，顽固不化的人来说，那我们也不得不将他们请出革命队伍了。此乃“惩前毖后”。"
ROK_harmony_parties:0 "和谐的政党关系"
ROK_harmony_parties_desc:0 "克拉亚诺统一共产党和社会民主统一联盟不仅是旧人民阵线的主要创建者，也是夺权刚刚开始的那段艰难岁月的见证人。虽然在革命之后社会民主统一联盟内部出现了不和谐的声音，但统一共产党和社会民主统一联盟依然保持着良好的关系。通过解散阵线和对党内错误思想的纠偏，一个和谐且稳定的新政党关系将会出现在克拉亚诺的政坛上。由克拉亚诺统一共产党进行领导，在基层和地方放权给社会民主统一联盟进行活动，这将确保克拉亚诺的政坛不会出现重大震荡。"
ROK_harmony_parties_tt:0 "§Y社会民主统一联盟将正式成为克拉亚诺统一共产党的姊妹党。§!"
ROK_time_move_forward:0 "时代，前进"
ROK_time_move_forward_desc:0 "在埃米主席与人民派全体同志的努力下，对克拉亚诺进行社会主义改革的准备工作已经全部完成。一切守旧派都将被我们抛在后面，新时代的车轮正在滚滚向前。我们尚且不知道这条全新的道路会带给克拉亚诺什么，也不知道这是否是一条能够成功的道路。但我们唯一知道的就是，时代不会等人。当她正在向前时，我们最好选择跟上她——或者说，超越她。"
ROK_time_move_forward_tt:0 "§Y新时代的车轮会碾碎一切旧时代。§!"
ROK_art_and_socialism:0 "艺术与社会主义"
ROK_art_and_socialism_desc:0 "社会主义是什么？艺术又是什么？这两个问题曾一直困扰着维拉帕米·赫尔辛基。在他还是一个画着“奇形怪状的画作”的古怪画家时，他没能理解。在他成立先锋主义艺术团只为了在古典派的屁股后面吃一点残羹剩饭时，他也没能理解。而在他读到新革命党的传单的时候，他其实还是没能理解。\n\n不过事不过三。当他以文化顾问的身份加入新革命党时，他终于还是理解了什么是社会主义：拥抱新鲜事物，踏上现代的渡轮。将那些所谓的古典大家从克拉亚诺的艺术殿堂中丢出去。他也明白了为什么他从学习绘画以来就一直在画那些“奇形怪状”的东西：那是未来，一片赤红的未来。是古典派们一辈子达不到的未来，是那些在沙龙里吟着诗，画着画的上层人士们永远理解不了的东西。\n\n当成为临时主席的埃米向他的艺术表达敬意与喜爱的时候，维拉帕米的革命生涯就此开幕。同志们，同好们，让我们向着社会主义，向着艺术的未来前进吧！"
ROK_art_and_socialism_tt:0 "§t先锋的时代已至。§!"
ROK_soul_revolution:0 "一场灵魂的革命"
ROK_soul_revolution_desc:0 "在头脑与思想之外的革命是远远不够的。尤其是对于党内相当一部分对共产主义并无信仰，只是因为时局所限被迫加入队伍的人来说。他们别说是否具有思想上的进步，连身体上的革命都是被迫而为。因此，我们迫切需要一场灵魂上，思想上的革命。那些资产阶级的思考方式与封建主义思想的残余必须被抛弃。我们要将它们丢进历史的垃圾堆。不过思想上的革命太过艰难，但无产阶级文化委员会的社会主义新艺术将会席卷革命者的脑袋。直到我们杀出一条血路，将这场革命真正的触及灵魂。"
ROK_soul_revolution_law_tt:0 "§Y推广新艺术到全党§!将提交给委员会表决:"
ROK_soul_revolution_tt:0 "§t当我们的思想冲破牢笼。§!"
ROK_end_old_era:0 "摧毁旧时代"
ROK_end_old_era_desc:0 "毫无疑问的说，克拉亚诺的人民拥有着无穷的潜力。但这种潜力大多被旧时代，也就是资本主义的所谓的道德而限制。当克拉亚诺的人民为了明天的生活而发愁时，那些虚伪的议员，脑满肠肥的高层们正一边喝着美酒，一边打破着他们所定下的“道德”。而这种情况将会在今天终结。我们将摧毁一切旧时代的枷锁。\n\n从现在开始，艺术家们不必再因为所谓的审美而限制自己。人民不用再因为所谓的“道德”而拘束自己，革命者也不必再担心旧时代的反扑。因为我们的进步将建立一个全新的道德体系，一个崭新的美德，一个伟大的属于无产阶级的新时代！"
ROK_end_old_era_tt:0 "§t让我们将新时代的飞马架起！§!"
ROK_modern_revolution:0 "现代之革命"
ROK_modern_revolution_desc:0 "在现代发动一场革命有多难？有许多革命先烈用生命为代价告诉了我们。或许在现代发动一场身体上的革命是这样，但在思想以及艺术上却从来不是。因为我们也是无产阶级的一份子，我们有权利重塑一切！那些束缚着女性的贞洁操守，我们将从你们开始！我们将把现代性打入每一位无产阶级的思想中，直到将来我们面对死亡，依旧能够笑着说出：革命死了，革命万岁！"
ROK_modern_revolution_tt:0 "§t人类本无不同。§!"
ROK_complete_perfection:0 "未来之完满"
ROK_complete_perfection_desc:0 "总有人批评我们，说我们的未来是幼稚的，不确定的，混乱无序的。可是他们错了，错的不可救药。我们的未来一直是完满的，因为这是我们亲手创建的未来。由每一个无产阶级靠自己的双手所建立，这怎么会是不完满的呢？那些以规则束缚自己的资产阶级们当然得不到完满的未来，因为他们没有创造未来，而是从我们手中夺走未来。无产阶级们，挣脱你们的锁链吧！不要被那些资产阶级的谎言遮蔽了双眼！"
ROK_complete_perfection_tt:0 "§t坚信你我的未来。§!"
ROK_wonder_of_human:0 "人类之奇迹"
ROK_wonder_of_human_desc:0 "人类是最善于创造奇迹的种族，但那些旧时代的学者们却从来看不到这点。他们荒谬的认为目前的现代世界已经与奇迹无缘。那是只存在于神话时代的事物。可是只要他们把他们那因腐朽而生锈的眼睛向后望去，他们就会发现那一个个奇迹。在魔兽的冲击下顽强抵抗的人类，即使付出几百年的光阴也从未后悔。那一个个的人类的双手，自人类出现以来就一直紧握着奇迹，人类本身就是奇迹！\n\n抛开那些腐朽的老古董吧，我们将用双手——劳动者的双手去创造一个个奇迹：新时代的建筑高耸入云，新时代的机械自行运转，新时代的童话都将变成现实！"
ROK_wonder_of_human_tt:0 "§t科学与艺术的奇迹。§!"
ROK_future_alchemist:0 "未来的炼金术士"
ROK_future_alchemist_desc:0 "自炼金术出现的那一刻起，它就被披上了不稳定的外衣。你永远无法想象将两种或以上的材料相互融合后会产生什么。所以他们怕了，他们宁愿龟缩在名为稳定的水井里也不愿意看一眼外面的“不稳定”。但是我们不会，因为我们坚信我们的变化：社会主义与先锋艺术。只要将这两种事物混合就一定能创造出我们想要的。\n\n他们称呼我们为炼金术士？那正合我们的意！我们以社会主义为主料，以艺术，科学，机械为辅料。我们将创造出未来！"
ROK_future_alchemist_law_tt:0 "§Y崭新的不稳定艺术§!将提交给委员会表决:"
ROK_future_alchemist_tt:0 "§t我们将融合出崭新的未来。§!"
ROK_rev_from_bodies:0 "从身体的革命者..."
ROK_rev_from_bodies_desc:0 "一个令人沮丧的事实是，我们的革命队伍中有不少都是因为一些现实利益才加入的。也许是因为承诺的第二次土地改革，也许是增加工资，也可能是因为可以让麻木的自己有点事做。但无论是因为何种原因，如果想让革命继续进行下去，那么这种情况就必须得到改善。左翼艺术阵线的艺术宣传，或许正好可以解决这个问题。"
ROK_rev_from_bodies_law_tt:0 "§Y加强左翼新艺术宣传§!将提交给委员会表决:"
ROK_rev_from_bodies_tt:0 "§t从现在开始改变。§!"
ROK_to_mind_revs:0 "...到思想的革命者"
ROK_to_mind_revs_desc:0 "请注意，我们要建设的新国家不只是一个社会主义的国家，她还必须成为工人，艺术家，科学家与农民的乌托邦。然而打江山容易，守江山难。为了使资本主义思想不会重回克拉亚诺，对思想的社会主义建设就显得尤为重要了。通过全新的左翼艺术，我们正在改造那些依旧停留在“身体革命”阶段的同志。当然，新思想普遍需要时间适应。这或许是个长时间的艰巨任务，但我们不会放弃。"
ROK_to_mind_revs_tt:0 "§t一切神圣的事物都消失了，唯有信仰在前进。§!"
ROK_for_you_proletarians:0 "无产者，为了你！"
ROK_for_you_proletarians_desc:0 "无论是在政治领域，社会领域还是文化领域，革命者们所进行的革命都只为了一类人：就是你，无产者！但是革命者只能将思想与进步带来一时，真正要让它们落地为安，那只能依靠本地的无产者们。我们将未来带给无产者，而无产者们则会将未来带给现实。"
ROK_for_you_proletarians_tt:0 "§t当无产者们扬起高傲的头颅。§!"
ROK_accept_pioneer_art:0 "接纳先锋艺术"
ROK_accept_pioneer_art_desc:0 "直白的讲，先锋艺术对于任何一个国家的群众来说都是超前的。克拉亚诺也不例外。即使在旧时代，克拉亚诺曾以艺术与文化之都闻名于南巴斯蒂亚。但是那是被资产阶级与封建主束之高阁的旧艺术。而在如今，新时代正向我们奔来。那些为了资产阶级的快活与封建主的统治而生的艺术该被抛弃了。以左翼艺术阵线为基点，代表着社会主义的先锋艺术将会冲破一切阻碍！而在艺术中获得重生的社会主义新人类们将会接纳这一切！"
ROK_accept_pioneer_art_tt:0 "§t日期之牛斑驳，而时代之轮继续前进。§!"
ROK_no_more_good_or_bad:0 "已无善恶"
ROK_no_more_good_or_bad_desc:0 "同志们似乎一直忽略了一件事：何为善恶？如果说是神明创造了善恶，而资产阶级们定义了它。那么这种善恶对我们的革命队伍究竟起到了什么作用？我们与那些反动派的辩论又有什么意义呢？是的，我们早就应该将资产阶级的伪道德抛之脑后了！\n\n那是他们缔造的谎言，是用来约束我们的高阁。当我们迈上革命之路的时候，我们就应该明白——革命的道德才是唯一之道德。因为只有革命才是所以无产阶级的解放者与参与者。我们要推倒一个旧世界，那就势必要创造一个新世界！革命者从来不在意公众舆论。对我们来说，有利于革命的就是道德，阻碍革命的就是伪德与罪孽！"
ROK_no_more_good_or_bad_tt:0 "§t我们不会再按照圣子的章程生活。§!"
ROK_soc_new_citizen:0 "社会主义新公民"
ROK_soc_new_citizen_desc:0 "这是一个历史性的时刻！就在今天，我们要彻底与旧时代的人类们切割。一个崭新的，社会主义的新人类将会出现！新一代的人将完全取代旧时代的人。他们将以我们的原则为唯一指导，接受我们的革命思想并将我们的创造力完全继承。他们是我们最伟大的作品，是新时代的舵手。是社会主义的战士，共产主义的建设者，人类的捍卫者！\n\n列特斯彻的哲学从我们这里开始，克拉亚诺会成为伟大的乌托邦！"
ROK_soc_new_citizen_law_tt:0 "§Y证明列特斯彻哲学§!将提交给委员会表决:"
ROK_soc_new_citizen_tt:0 "§t新人类的灵魂正与我们共鸣。§!"
ROK_dawn_of_art_god:0 "艺术之神的黎明"
ROK_dawn_of_art_god_desc:0 "我看到，我看到，\n\n我看到世界已经入睡，\n\n我看到，我看到，\n\n我看到黑暗已不耐烦。\n\n但现在我再也看不见了，\n\n不，我已经看见了，\n\n艺术的太阳已经升起，\n\n你们的思想正做着美梦，\n\n但我的思想正赤红一片！\n\n左！左！左！\n\n我们的黎明！"
ROK_dawn_of_art_god_tt:0 "§t我们的交响乐！§!"
ROK_building_in_poet:0 "诗歌中的建筑"
ROK_building_in_poet_desc:0 "追求美是每个生灵与生俱来的权力，从古至今宏伟的建筑都象征着一个国家，一个文明所取得的成就之最。而在南巴斯蒂亚，最有名的建筑莫过于神话传说中的巨塔，如今我们要做就像是歌者时代的吟游诗人传唱的那般：\n\n“将神塔重新屹立于世，”\n\n“就像那克拉亚诺一般。”\n\n“如同黄金的美好品质，”\n\n“在这个世间重新出现。”\n\n不同的是，与以往的僭主暴君炫耀功绩相比，站在人民立场上的我们将更注重实用性和对人民的生活的改善，更多，更大，更直观的构成主义美学建筑，将投用于各种公共设施和政府机构的建筑。"
ROK_building_in_poet_tt:0 "§t传说已成事实。§!"
ROK_dimensional_attack_future:0 "以立体攻入未来"
ROK_dimensional_attack_future_desc:0 "过去的艺术和建筑多服务于权贵阶层而非广大的无产阶级民众，雕栏玉砌的府邸与几步之隔的贫民窟形成醒目对比。也许民众们无法理解更深层次的艺术含义，但更加宽敞的房间和更加卫生的环境，极具冲击力的立体造型浇筑民生福祉——通透的阳光穿透简练的混凝土结构，洁净的水流在公共浴室折射彩虹，蜂巢状社区承载着孩童的笑声。当几何线条勾勒出平等的生活图景，当每个空间都浸透着对生命的尊重，这才是属于人民的革命美学宣言。"
ROK_dimensional_attack_future_tt:0 "§t立体的未来。§!"
ROK_this_is_where_world_built:0 "世界在此处构成"
ROK_this_is_where_world_built_desc:0 "“曲线属于反动派，直线才属于人民。”这句戏言来自维拉帕米·赫尔辛基。尽管作为一个笑话来讲它并不怎么严肃，但从实际意义来看的话也说明了不少事实：用更直观的构成主义艺术作品能更好的启迪和引导人民，繁杂华丽的古典主义当然可以留存在世，但未来一定且肯定是属于构成主义的。当人们在街上看到全新的海报由简练的图形组成，高耸的建筑由极具冲击力的立体结构拔地而起时，我们对人民艺术的定义和培养也将落下帷幕。去创造一切吧，无产者们！"
ROK_this_is_where_world_built_tt:0 "§t我们将创造一切！§!"
ROK_composition_supreme:0 "构成，至上！"
ROK_composition_supreme_desc:0 "构成主义包含了社会主义对人民平等的期盼，而我们的艺术家们也将证明这一点是毋庸置疑的。通过简练可靠的直线图形，构成主义将成为链接每个人的存在。无论是什么都无法阻止每个人接受这平等的美学，这包含人类深藏于心，最质朴的美学。我们将傲慢到狂妄的宣称：构成是第一神！因为，这是我们所创造的。是资产阶级们无法接近，无法评头论足的无产阶级！"
ROK_composition_supreme_tt:0 "§t艺术如战鼓般激荡。§!"
ROK_towards_future_utopia:0 "向着未来的乌托邦"
ROK_towards_future_utopia_desc:0 "终究，构成主义和人民美学教育有机结合在了一起，未来终究是属于构成主义的。神话中的巨塔和那虚伪狡诈的神子终将离我们远去，而我们也将坚定的踏出独属于我们，独属于人民的一步！怀着激荡的内心，抬起高扬的步伐，再也没有什么神仙皇帝。看！星空是如此的寂寞！即便没有那些至高的存在，我们也能编制我们自己的歌！\n\n以艺术为名，昭告天下：未来不属于你们，未来属于无产者！"
ROK_towards_future_utopia_law_tt:0 "§Y艺术之乌托邦§!将提交给委员会表决:"
ROK_towards_future_utopia_tt:0 "§t天下赤红一片，艺术是唯一神！§!"
