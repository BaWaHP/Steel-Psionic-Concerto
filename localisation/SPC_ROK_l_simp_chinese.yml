ROK_left.50.t:0 "六届新革命党党代会"
ROK_left.50.d:0 "如果你是一个新革命党的老党员的话，那么当你试图回忆什么时候光明正大的召开过党代会的时候。你就会想起，从第一届开始，新革命党党代会就是在地下召开的。像这样在首都的议事厅里如此正式的召开党代会，对于新革命党的党员们来说可是一件新奇事。\n\n埃米坐在主席台上，感到浑身不自在。她从加入党开始，就一直在各种地下集会里活动和发言。现在突然让她在这么庞大和正式的场合主持会议，她反到有点不知所措了。\n\n不过很快她便调整好了状态，站在麦克风前高声宣布：“我宣布，新革命党第六届党代会正式开始！”随着她的话音落下，台下掌声雷动。这鼓舞了埃米，她清了清嗓子开始了她的演讲：“同志们...”"
ROK_left.50.a:0 "大会胜利召开！"

ROK_left.51.t:0 "党代会上的演讲"
ROK_left.51.d:0 "“同志们，战友们。在经历了如此之多的事情后，我们终于取得了革命的成功。在几年前，或许就在昨天，我之中还有人觉得革命胜利依旧离我们很远。但事实胜于雄辩，历史的车轮滚滚向前，我们胜利了。人民和历史，将这个国家的未来交给了我，交给了党。”\n\n“在曾经，我们幻想过莫泽的新政府能够带来改变。但他失败了。我们要问，为什么我们会把一个资产阶级共和国的总统当成救命稻草？或许莫泽总统是个好人，但他绝对不是一个合格的总统。我曾经也是莫泽总统拥趸的一员。但是后来我发现，在这个被‘温和’‘人道’浸透了的国家里，软弱和妥协是不会胜利的。”\n\n“于是我加入了新革命党，直到现在，我也没有忘掉我入党时的誓言。只有革命，只有这条名为革命的炽热之路才能拯救共和国于水火之中。事实证明了我们的正确，我们要记住旧政府的教训，时刻以人民的解放为己任。在这个历史性的时刻，我们还要记住：社会主义运动是一个人民运动，而不是僵化，教条的思想烙印。我们是反对派的时候要做的事，和我们是新政府的时候要做的事情是完全不一样的。”\n\n“同志们，战友们。即使革命取得了成功，但我们要做的事情一点也不少。这些事情的难度也不会比之前简单，甚至更难。但我坚信，我们的党已经做好了准备。我们的目标就一定要实现，一定会实现！让他们去说吧，让他们去嘲笑吧。这场伟大的社会变革必然是以我们的党，我们的人民的胜利告终！共产主义万岁！人民万岁！”"
ROK_left.51.a:0 "唤起工农千百万，同心干，克拉亚诺红旗乱！"

ROK_left.52.t:0 "大会闭幕"
ROK_left.52.d:0 "经大会全体代表表决，现宣布通过以下决议：\n\n“克拉亚诺新革命党正式更名为克拉亚诺统一共产党。继续由埃米·普斯卡娅同志暂代党主席一职，直到局势稳定。”\n\n“克拉亚诺社民党正式更名为社会民主统一联盟，以协助统一共产党进行新政权的日后工作。”\n\n“全面开展新一轮土地改革，具体方案将于后续公布...”\n\n“全面巩固新人民政府的权力，确保政策得以推进。”\n\n“加强军备设施生产与全面改造共和国军队，将共和国军队从政府的打手变为人民的军队。”\n\n“新政府的外交姿态将转变为支持各国左翼人士夺取政权，以实现一个左翼的，民主的，新南巴斯蒂亚联邦。”\n\n..."
ROK_left.52.a:0 "大会胜利闭幕！"

ROK_left.53.t:0 "我们的党"
ROK_left.53.d:0 "克拉亚诺新革命党，现在应该叫克拉亚诺统一共产党。这个通过较为暴力的手段取得政权的政党，其内部却早就分裂为三大主要派系。不过出于目前一致对外的需求，这三大派系采取了搁置争议，暂时合作的态度。不过随着局势越来越稳定，派系斗争早晚会浮出水面。\n\n以埃米·普斯卡娅为首的人民派是目前克拉亚诺统共党的主流派系。其主张在革命成功之后将权力逐步下放给人民，来实现人民掌权，人民解放的目标。不过因为人民派过于激进的主张以及领导人埃米·普斯卡娅较为年轻的资历，人民派一直受到党内的其他两派的打压和批评。但是即便如此，人民派依旧掌握着党内主流地位。\n\n而将目光左转，以施塔尔·威克斯为首的先锋派，则是目前统共党正在试图夺回主导地位的派系。作为党内毫无争议的元老级老党员，施塔尔一直坚持只有在党的领导下才能实现革命的胜利。在埃米到来前，先锋派曾是党内最强大的派系。但在埃米通过她的优秀能力和新的宣传方案扩大党的队伍后，先锋派丢掉了主流派系的地位。但施塔尔对主流地位的争夺一直没有停止过。\n\n最后让我们将目光看向右边，你会发现一个看起来与世无争的派系——缓则派。这个以亨利克·洛夫斯基为首的派系代表了统共党的右翼势力。埃米的宣传方案确实扩大了党的队伍，但同时也吸纳了大量前改良主义支持者。其中的翘楚就是亨利克。他通过温和，人道的主张反对党内激进的政策，希望在维持就共和国政府的体系的情况下，将新共和国逐步过渡到社会主义。缓则派看起来与世无争，但实际上，亨利克已经通过不少手段从先锋派与人民派中吸纳成员。毫无疑问的是，亨利克有着争取主流地位的野心。\n\n时间不等人，我们现在已经到了要选边站的时候了。"
ROK_left.53.a:0 "先锋之声将重回巅峰"
ROK_left.53.a.tt:0 "我们会站在§8施塔尔§!一边。"
ROK_left.53.b:0 "人民的党为人民"
ROK_left.53.b.tt:0 "我们会站在§9埃米§!一边。"
ROK_left.53.c:0 "稳定渐进才是一切"
ROK_left.53.c.tt:0 "我们会站在§2亨利克§!一边。"

ROK_left.54.t:0 "夜晚的阳台"
ROK_left.54.d:0 "夜幕垂在远方的天际线边，克拉亚诺城也开始逐渐褪去车水马龙熙熙攘攘的景象，唯独个别几处还在热闹非凡，人声喧哗。\n\n而此时的施塔尔·威克斯在交代完今日的事宜后，一个人缓缓渡步到了落地窗边。微微犹豫后，便走到了阳台上。随后出神的望着努夫维拉宫——那是此时最热闹的地方。估计那几个年轻人的议案已经通过了，他若有所思的想着。双臂无意识的紧紧抱在一起。如果有党内的老人看到他的动作，便知道他此时的心情并不像表面那样平静。\n\n他忍不住猛吸了一口气，却发现呼出雾气比自己想象的少。是了，他了然的想着。春天马上要来了，自然没那么冷，就像现在的政治局势一样。党掌握了大局，领导着人民群众。至于其他的...他又忍不住盯着眼前缕缕的白雾：党胜利了，自然好，普斯卡娅那小姑娘纵使幼稚些，但也算是合格...只是集结在她身边的那群年轻人没有意识到，自己的所作所为在摧毁党的根基，只有无产阶级政党能够集中力量时，革命才能取得最终胜利。\n\n施塔尔把双臂抽出怀抱几秒后却又放了回去，虽然春天的脚步已经临近，但凛冽的季风却没有丝毫衰退的迹象。施塔尔站在阳台上，出神的望着正陷入黑暗却又似乎散发着光芒的城市。\n\n“真美啊...”这句话下意识的吐露而出。但紧接着他又思索了起来：不能让党组织被这群没有经验的年轻人拆解，革命的成果来之不易。目前无论是国内还是国外仍有守旧势力虎视眈眈，只有强而有力的党组织才能应对可能发生的状况。至于亨利克...想到这他又犹豫起来：洛夫斯基本人倒是个妙人，就是理念和他周围的那些人却又让人啼笑皆非。不过那群人还有亨利克震着，目前更大的问题是不能让党面临被削弱的处境，所以跟他们倒也不是没有共同话题可谈。\n\n望着伴随夜深逐渐陷入黑暗的克拉亚诺，施塔尔·威克斯暗暗下定了决心——"
ROK_left.54.a:0 "绝不能让革命功亏一篑。"

ROK_left.55.t:0 "与克里特同志的漫谈"
ROK_left.55.d:0 "“来来，您请坐。”埃米·普斯卡娅热情的招待远道而来的西莉迪亚客人克里特·罗夫斯基，而在克里斯略显拘谨的坐下后她又亲手泡上了茶。\n\n就这样，两人皆手捧一杯热茗惬意的靠在椅背上。克里斯浅尝了一口后有些感慨的说道：“说起来也是神奇，上次我来克拉亚诺城的时候，还是莫泽执政期间。当时的克拉亚诺城也算是繁华，但却没有如今的朝气勃勃。”埃米顿了一下，面露自信的笑道：“自然，新革命党跟被处处被掣肘的莫泽先生不同，我们有自信能完成前人的未竟之事。”\n\n克里特若有所思的又喝了一口茶，向面前这个年轻的过分的姑娘说道：“我在来的路上看到，城里各个社区都在紧锣密鼓的选举社区代表，这跟公社的治理方式倒是大不相同。”克里特原以为自己尖锐的问题会使得眼前的这个年轻姑娘难堪一些，但他所看到的却只有平和及笑意：“当然，因为公社和克拉亚诺所面临的境遇与困难并不相同。”说到这，她放下手中的茶杯，目光炯炯有神：“芙蕾施曼导师早就讲过不同境遇的不同斗争要通过结合实际情况来具体判断。”\n\n在又喝了一口茶后，克里斯微微颔首继续听埃米讲着：“公社在建立初期就面临各方的围剿，自然得集中力量办大事。而克拉亚诺民众则更需要社会主义来引导他们通向真正的民主，现在的权力下放也是通向直接民主的必要之途。”说到这她缓了一口气拿起茶杯喝了一口，这时克里斯则缓缓问道：“权力下放...这真的能帮助人民群众走向真正的民主吗？”说到这克里斯愣住了，他第一次在这个姑娘脸上看到了少女的羞涩，埃米带着些不好意思但有坚定的说道：“我相信历史终究是掌握在人民群众手里的，我们必须也一定要相信他们。”"
ROK_left.55.a:0 "“就像他们相信我们一般。”"

ROK_left.56.t:0 "急不得"
ROK_left.56.d:0 "“您所说的政策是完全的背叛，芙蕾施曼导师从未在著作中谈及过这种妥协！”在政策大会上，坐在对面的年轻人怒吼着，双眼像喷火一般瞪着亨利克·洛夫斯基。\n\n而亨利克则是宽容的笑笑，他早已习惯了激进派对他的敌意。在慢悠悠的起身后，亨利克用一种十分自信的神态回答道：“我懂，我懂。小同志，我明白你的意思。”他的话语带着一种让人感觉很舒服的魅力，配合着他谦和的语调逐渐平息着对方的怒火：“我知道...”他甩打着手中的公社化倡议书，“同志们深有体会旧制度对人民群众的压榨。”说到这，他的语气慢慢低了下来，刚才还窃窃私语的会场也慢慢的寂静下来。\n\n“我们作为社会主义政党嘛，自然得为人民群众考虑。谁若是叛离了群众，那就是背叛革命！”随着他提高的话音，他声音中不容置疑的气势也迸发而来：“但是，我们得承认。激进的公社化对人民群众带来的变化是好是坏，我们还不得而知。刚才那个小同志说芙蕾施曼导师说过不能妥协。但她也说过嘛，革命的理论是需要灵活变通的。”说到这，他清了清嗓子玩味的看向那个年轻人：“小同志，你看嘛。可能今天你觉得在库亚维斯大区推进公社化是对人民群众有益的，但明天，你在伦托夫大区推进公社化却可能对人民造成伤害。”他看向会场的其他人，见没人反驳便满意的点了点头，继续大声说道：“我们的党，是为了人民群众而建立的，所以我们的政策才急不得。我们在上面一拍脑子推行的政策，到了下面会变成什么样谁也不知道！”\n\n听到这，会场内一些年纪比较大的党员都赞许的点着头，而其他人也面色僵硬的开始交头接耳。亨利克则继续说道：“正因如此，我们的政策才需要慎之又慎。公社化嘛，我看，万不可急。要对人民负起责任。”此时对面的年轻人不想让己方太过弱势，挣扎着起身道：“就算如此...”\n\n但亨利克眼疾手快的将手中的倡议书拍在桌子上，没有给年轻人继续说话的机会，高声喊道：“我提议推迟，或者暂缓公社化的进程！”"
ROK_left.56.a:0 "那一夜的努夫维拉宫掌声如雷"

ROK_left.57.t:0 "聚少离多"
ROK_left.57.d:0 "“话说，我们有多久没这样轻松的聚一聚了。”埃米的办公室里，她正与另外两人喝着茶。如果这时有一个基层党员进来，他会惊呼一声：怎么施塔尔书记和亨利克代表也在！“是啊，好久没这样。我还记着你这小妮子刚入党的时候，眼睛瞪的像个铜铃。”施塔尔笑了笑回答道。“哈哈，您还记得啊，施塔尔同志。那时候好像还是您亲自接待的我。”埃米笑着摸了摸手里的茶杯，好像回想起当时发生过什么趣事。\n\n“哦呦，你们两个啊。那么久的事情还记得。不像我，入党的晚。”亨利克乐呵呵的接过了话题。“亨利克同志好像是当时转入地下之前最后一批公开入党的同志吧？”埃米用手指戳了戳脑袋，又看向施塔尔，“当时施塔尔同志让我去迎接来着，我记得亨利克同志看到我这么年轻的女性还以为自己来错了地方。”“哈哈，是啊。我是没想到这么年轻的小姑娘是我的前辈啊。”亨利克笑了笑又喝了口茶。“说的像您多老一样。”埃米放下手中的茶杯，将目光放在办公桌前的两人身上。\n\n“我们都是同志，求同存异才是我们应该做的事情吧。”埃米低下眼眸，开始搅拌起手中的咖啡。听到这的施塔尔和亨利克也放下来了手中的咖啡，将视线看向了埃米。“埃米同志，不，普斯卡娅主席。”施塔尔突然正襟危坐，“我们是同志没错，但人吗，不可能完全一致。我们对革命的追求是不一样的。”“是啊，普斯卡娅主席。”亨利克接过话茬，“我们对革命的看法不同，想法不同。最终党会向什么方向发展，还是看我们当中谁是主流。”\n\n“是吗，那就这样吧。”埃米停下了搅拌咖啡的动作，与两人对视。“施塔尔书记，亨利克代表。希望我们能够继续合作下去。”埃米说着，举起了手。而施塔尔和亨利克点了点头与埃米握过手之后便告辞了。埃米坐回椅子上，看向窗外的月亮。“或许，下次见面就是你死我活的斗争了。”"
ROK_left.57.a:0 "路线斗争凌驾于高情厚谊。"

ROK_left.58.t:0 "又是这样的一天"
ROK_left.58.d:0 "“同志们再加把劲，我们就要达成今天的目标了。”这已经是马赛利·巴尔扎克今天不知道第几次说这句话了。自打革命以来，像马赛利这样的基层党员和政治部成员就开始忙的不可开交。上头的新政要由他们来负责推向基层，一些关于入党和意识形态方面的事情，也要由他们进行第一步的确认。有些时候，马赛利真心希望自己多长了两双手和两只眼睛。这样或许就不会天天处理到深夜了。\n\n不过即使忙成这样，他心里却是开心的紧：这证明党已经掌握了全局，一场伟大的变革就要爆发了。“巴尔扎克同志，你看看，我们已经将人员的表格做好了。”一旁的党员将一份表格交给了马赛利。他拿到眼前过了一遍，“好，没什么问题。等我今晚做统一审查之后交给上级。”“好的，巴尔扎克同志也别太辛苦了。”“好。”\n\n时间不知不觉就来到了凌晨4点，等到马赛利结束了自己的工作抬起头来时。身边早已空无一人，办公室里已不复早些时候的热闹。看着指向数字4的指针，马赛利不禁笑了笑。自己又一宿没睡，妻子和孩子也有几天没有见面了。马赛利有点后悔，本来他加入统共党的事情妻子就不太赞成，自己答应会多陪陪她们也没做到。\n\n不过马赛利并不后悔，他当初选择入党的时候就已经做好了这种准备。像他这样的人，整个克拉亚诺还有成千上万呢。让思绪飘飞了一会，马赛利拿起水杯走向热水间——"
ROK_left.58.a:0 "“新的一天就要开始了”"

ROK_left.59.t:0 "与科里曼的会面"
ROK_left.59.d:0 "火车窗外的风景十分怡人，连绵不绝的农田与村庄构成了一幅乡村牧歌的画作。而车上的两人则有着完全不同的心境。科里曼看着对座的埃米，对方好像真的是来旅游的一样：眼睛就没离开过窗外的风景，手中的咖啡杯微微冒着热气。没有一点注意力分给对面的科里曼。\n\n科里曼一直在等埃米开口，但火车都过了几次隧道，也没见埃米开口。他终究是憋不住了：“普斯卡娅主席，您找我究竟是什么事？”听到科里曼的发问，埃米才把注意力从窗外的风景转移到科里曼上面。“唉，科里曼书记。我想找你这个大忙人可太难了。”埃米叹了口气，“所以真的不好意思，故意晾了你一会。”科里曼看着面前低头道歉的埃米，一时竟也没了火气：“唉，这都不重要。普斯卡娅主席，你今天找我是为了什么？”“是正事。”埃米的目光紧盯着科里曼：“大会结束之后，我发现社民联盟中有人开始不安稳了。您这个书记，要管得住手下啊。”\n\n“唉，我最近就是在因为这个忙的脚不沾地啊。”科里曼重重的叹了口气，“党内不是所有人都支持我的决定。尤其是现在，我们党的政治实权正在减少。”说到这的科里曼看了一眼埃米，“那些当年投降比纳许的老顽固们又开始叫起来了。”“我明白了您的难处。”埃米将手中的咖啡递到了科里曼手上，“但是现在正式局势最紧张的时候，我们必须保证阵线联盟得以存续。”“我们不能让我们的人民对我们感到不信任。”\n\n火车继续向前，科里曼看着埃米递过来的咖啡，最终还是接了过来。“我明白，我会尽最大的努力稳定党内情况。也请普斯卡娅主席尽早将局势稳定下来。”埃米看到了他眼中的决意，于是在微微点头致意之后走下了火车。"
ROK_left.59.a:0 "联盟存续，革命不灭"

