###民族精神###
ROK_continous_promoted_democracy:0 "继续推行民主"
ROK_continous_promoted_democracy_desc:0 "莫泽选择继续推行民主，这是他当初的承诺之一，但当议会成为了拌嘴吵架的菜市场时，人们不禁怀疑这个议会究竟能做出什么决策来。"
ROK_stabiliy_based_on_one:0 "一人维系的稳定"
ROK_stabiliy_based_on_one_desc:0 "可以这么说，民主阵线的稳定完全依靠着莫泽一人，如果莫泽去世，阵线各党派的分裂已是板上钉钉的事情。人们早已有了共识，莫泽生则国家稳定，莫泽死则国家必乱。"
ROK_about_to_die:0 "时日无多"
ROK_about_to_die_desc:0 "莫泽的身体已经是强弩之末，这点他自己清楚，人民也清楚，但他们依旧支持着他，因为他可能是这个国家里最后一个愿意望着他们并为他们感到担忧的领导人了。但社会的动荡，极端势力的抬头都预示着这个国家的生命可能也要随着领袖的生命一起终结了。"
ROK_legacy_of_industrialization:0 "工业化的遗产"
ROK_legacy_of_industrialization_desc:0 "虽然比纳许是一个恶毒，可恨的官僚与独裁者。但不得不承认，他很乐意跟上时代的浪潮。目前克拉亚诺共和国的工业几乎全部来源于比纳许时代。这些工厂虽然老旧了一些，但它们仍然是克拉亚诺工业的顶梁柱。"
ROK_army_of_ambition:0 "野心之军"
ROK_army_of_ambition_desc:0 "共和国的军队里不少都是当年比纳许的追随者，甚至还保留了一些旧公国的世袭军官们。他们之所以在先前选举保持沉默是因为他们当时并不敢违背民意和南巴政府。但在风雨飘摇的现在，很难说军队会继续保持中立，或者说...他们已经开始行动了。"
ROK_influence_from_new_revolution_party:0 "新革命党人的影响"
ROK_influence_from_new_revolution_party_desc:0 "新革命党早期是由比纳许时期的学生们所创立的社团组织：克拉亚诺革命同盟在莫泽上台后改组为政党。因为莫泽总统对政党的解禁态度和温和的意识形态，新革命党一开始专注于温和的斗争方式。但很快，他们便意识到。这种温和的斗争并不能改变这一切，莫泽总统在任尚且如此，那一旦莫泽总统下台了呢？随即，新革命党开始转向芙蕾施曼所主张的武装斗争路线，在培养了一批军事人才和开始在军队感召进步主义分子之后，便转入地下进行活动。而现在，新革命党誓要将社会主义带到克拉亚诺的大地之上。"
ROK_memory_of_donvodsk:0 "顿伏茨克的记忆"
ROK_memory_of_donvodsk_desc:0 "克拉亚诺历史上曾经被顿伏茨克侵略并奴役。这是国家的耻辱，顿伏茨克的野蛮人无情的镇压了我们克拉亚诺民族英勇的起义。伟大战争的经历也让克拉亚诺对于这些半人马没有任何好感。虽然现在我们同在一个国家，但是那些极端分子们鼓吹着民族与种族优越论，叫嚣着要让顿伏茨克付出代价..."
ROK_old_eagle:0 "曾经的南巴雄鹰"
ROK_old_eagle_desc:0 "克拉亚诺曾经是南巴最闪耀的雄鹰，从克拉亚诺到维尔陶再到托莱多。克拉亚诺的旗帜骄傲的飘扬在每一个城市的上空。可是如今的克拉亚诺更像是被南巴共和国把玩的一只麻雀罢了。我们想要复兴公国时期的荣光，至少军队里那些旧贵族的后代是这么想的。"
ROK_vancouvers_parliament:0 "更加分裂的议会"
ROK_vancouvers_parliament_desc:0 "莫泽去世了，现在的议会已经做不出任何决策了。我们只能寄希望于紧急选举能够解决问题..."
