ROK_internal_external_conflict:0 "外部革命，内部斗争"
ROK_internal_external_conflict_desc:0 "就像所有的政党一样，新革命党内部的派系斗争不仅存在，而且相当严重。虽然各派在革命时期暂且妥协，但当革命胜利的时候，这种内部的政治斗争就要搬上台面了。目前的克拉亚诺新革命党内部主要有三个派系：人民派，先锋派，缓则派。\n\n§9人民派§!：人民派是目前新革命党内部最强大的派别，由§9埃米·普斯卡娅§!领导。人民派致力于将革命之后的领导权逐步下放给§9人民§!，认为人民才是历史的重要推动者，而§9党§!反而是次要的。在完成历史任务之后，党应该逐渐解散直到人民群众可以§9完全掌控§!国家。\n\n§8先锋派§!：先锋派是以前任新革命党主席§8施塔尔·威克斯§!为核心的派系，他们代表了党内§8先锋主义者§!的声音。相比于人民派，先锋派力主加强§8党的领导§!。主张要以党为新社会建构的核心。党不仅要完成历史任务，还要继续领导§8人民群众§!。直到人民群众脱离愚昧成为§8共产主义者§!。\n\n§2缓则派§!：缓则派以旧革命同盟的§2右翼§!党员们为主要核心，目前由§2亨利克·洛夫斯基§!领导。缓则派们主张要放缓对旧社会的改造，对于激进的重建计划保持§2怀疑态度§!。他们认为太过激进的革命将会对国家造成§2极大的冲击§!，要保护人民目前所居住的“鸟巢”，使民众§2缓慢§!的接受共产主义。"

