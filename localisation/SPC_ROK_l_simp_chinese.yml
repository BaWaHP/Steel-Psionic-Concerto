rok_vote_for_worldunion_democrat_tooltip:0 "我们将给§Y社民党§!投票"
rok_vote_for_liberal_republican_tooltip:0 "我们将给§Y新民主党§!投票"
rok_vote_for_conservative_republican_tooltip:0 "我们将给§Y民主党§!投票"
ROK_VOTE_EVENT_TOOLTIP:0 "\n\n\n目前各党派的得票情况：\n\n社民党（民主世联主义）[?rok_worldunion_democrat_votes]票\n新民主党（自由共和主义）[?rok_liberal_republican_votes]票\n民主党（保守共和主义）[?rok_conservative_republican_votes]票\n\n若是5次事件后任然没有党派拿到3票及以上投票，选举将会陷入僵局！"
ROK.0.t:0 "陆军议题"
ROK.0.d:0 "在我们伟大的总统走后，军队开始有了自己的声音，旧公国的军官们和比纳许的追随者的声势也开始随之壮大，共和派与守旧派的矛盾日益显现，在此之前，都是依靠着莫泽总统的个人魅力自己民意勉强维持着和平。随着时间的流逝，军队和政治间矛盾也开始逐渐显露出来，为了避免不知名的导火索而爆发军变，也为了不让我们这么多年以来的和平与努力付之一炬，我们必须为我们的军队进行改革。\n\n社民党主张严肃的整顿军队，剔除有野心的将领，新民主党则认为可以通过较为温和的方式逐步改革军队思想；民主党则是一如既往的认为军队是立国之本，万不可动。[getRokVoteEventTooltip]"
ROK.0.a:0 "社民党——对军队进行严肃整改"
ROK.0.b:0 "新民主党——对军队实行温和改革"
ROK.0.c:0 "民主党——改变？谁想要改变？"
ROK.1.t:0 "工人问题"
ROK.1.d:0 "因为新革命党和民族党对工人的拉拢。工人群体始终是克拉亚诺国内最不稳定的一个群体。辛亏有社民党一直维持在中间，才没有让工人群体彻底倒向极端分子。对于工人问题，社民党一直坚持改善工人待遇，给工人发放福利，全面开放工会的政策，新民主党则主张对工人妥协让步，将工人从极端分子的煽动中稳定下来。民主党则认为只要军队出手镇压，一切都会变得好起来。[getRokVoteEventTooltip]"
ROK.1.a:0 "社民党取得优势！"
ROK.1.b:0 "新民主党取得优势！"
ROK.1.c:0 "民主党取得优势！"
ROK.2.t:0 "外交姿态"
ROK.2.d:0 "克拉亚诺一直以来的外交姿态都是对南巴共和国与共和国际的开放与跟随。但是面临着当下克拉亚诺的新局势，旧的外交方针显然需要一定的改变。如果当克拉亚诺度过了危机存亡的紧急关头。那么未来世界必然要有克拉亚诺的一部分。社民党希望在不改变基础方针的前提下，尽可能的建立起一个稳定的共和联盟，新民主党则认为现今的体系并无大问题；民主党则主张继续加大对南巴的开放政策，邀请南巴的资本持续入住。[getRokVoteEventTooltip]"
ROK.2.a:0 "社民党——共和联盟"
ROK.2.b:0 "新民主党——维持原样"
ROK.2.c:0 "民主党——门户开放"
ROK.3.t:0 "新革命党问题"
ROK.3.d:0 "自1983年起，突然出现的新革命党一直在破坏克拉亚诺国内的政治稳定和社会稳定。他们通过曲解莫泽总统的讲话和思想，试图把共产主义带到克拉亚诺。但这是不可能被民主政府所允许的，但对于如何处理新革命党，三个党派却有着不同的方案与看法。社民党在党魁科里曼的领导下主张可以与新革命党中的温和派进行合作，新民主党主张彻底解散新革命党，民主党则主张要求对所有与新革命党有关的人员进行清洗。[getRokVoteEventTooltip]"
ROK.3.a:0 "社民党——与温和派合作"
ROK.3.b:0 "新民主党——解散它！"
ROK.3.c:0 "民主党——开始大清洗"
ROK.4.t:0 "极端民族主义问题"
ROK.4.d:0 "克拉亚诺在历史上曾被顿伏茨克人占领和奴役，并且数次克拉亚诺的民族起义也被顿伏茨克无情的镇压了。因为这段历史原因，从建立共和制直到现在，民族极端问题一直是困扰在民主政府心中难以解决的难题。尤其是如此危机的现在，极端分子组建的民族党正在大肆渲染，我们必须解决这个问题，以防止极端民族分子反对民主政府。社民党希望通过立法来解决极端问题，新民主党则试图将民族党列为非法党派予以封禁；民主党则认为可以与民族党达成有限的合作。[getRokVoteEventTooltip]"
ROK.4.a:0 "社民党——通过立法"
ROK.4.b:0 "新民主党——查禁"
ROK.4.c:0 "民主党——或许我们可以达成合作？"
ROK.5.t:0 "选举陷入僵局"
ROK.5.d:0 "新出炉的选举结果震惊了所有人，没有任何一个政党取得这次选举的胜利。社民党提出的组建联合政府的提案也被新民主党否决。毫无疑问的是民众对于政府的信心已经随着这次选举的丑闻与僵局彻底丧失殆尽了。\n新革命党已经开始重新走上街头发动群众，并且与退出议会的社民党激进派开始合作。极右的民族党已经开始与军队接触，看来军队可能正在考虑放弃中立。民主党也宣布退出政府与议会开始频繁与军队联系。看来新民主党独立支撑的政府已经是独木难支了。"
ROK.5.a:0 "看来，民主在克拉亚诺失败了。"
ROK.5_tt:0 "随着"
ROK.6.t:0 "总统府会谈"
ROK.6.d:0 "“祝贺你科里曼，听说你被提名为社民党下一任党魁了。”莫泽坐在总理府花园的亭子里对一旁的年轻人说道。“是啊，莫泽总统。自从上次一别，我们已经有两年没见了吧。”一旁的年轻人笑着回应莫泽。莫泽喝了口茶抬头望向花园的远处，科里曼跟着望过去。围栏外一对母女正在嬉戏，女孩阳光的笑容不禁让科里曼的嘴角弯起了一点弧度。\n“我想让这种表情一直出现在我的国民脸上，无论他们是大人还是小孩。”莫泽突然转过头，对上了科里曼刚刚转过来的视线。“是啊，莫泽。”科里曼不紧不慢的回应到，“社民党会不遗余力的为了这个目标而努力。”“我已经老了”莫泽转回了头叹了一口气，“我只想再看一看，再看一看...”科里曼望着这个老人，他想起他父亲对他说的话，“一个人是不是个好的领导人，其他人说的都不算，只有人民，只有人民才说的算。”科里曼又想起这十五年来每次选举，新民主党那令人望尘莫及的得票率。良久之后，科里曼缓缓站起身向着莫泽鞠了一躬，“只有人民，莫泽总统。只有他们是不会骗人的。”科里曼扬起了他的嘴角，“我会记住我父亲的话，您的话也一样。”说完，科里曼便缓缓离开了。莫泽望着科里曼的背影，不禁笑了起来：“哈哈，这孩子——"
ROK.6.a:0 "和他父亲一样"
ROK.7.t:0 "党内选举"
ROK.7.d:0 "莫泽看着眼前忙碌的选举现场，不禁回想起当年他当年从零开始白手起家的建立起新民主党的时候，那时的他应该是忙碌的人群中的一员，应该是人群中最闪耀最忙碌的那个。对党的未来，对国家的未来都充满了希望。而现在他已经变成了一个快要老死的老头了。“时间，多么有趣啊。”莫泽这么想着，转头看向了三位党内候选人。\n一个国内资产阶级的代言人，一个军工企业的话事人，看到这莫泽低下了头冷笑了一声，这就是他的党选出来的候选人吗？莫泽想到了不久前和科里曼的谈话，他开始觉得让社民党赢得他死后的选举是个多么美好的结果。“还有第三位。”莫泽告诉自己，“说不定是个很好的人。”他抬起头，看到了一个30岁左右的年轻女人。女人正在大声诉说着自己的政治目标，莫泽听着那些陈词滥调，感觉新民主党也像那些陈词滥调一样开始腐化溃烂了。“为了人民。”女人的声音突然传来，“为了人民。”她又重复了一遍。“我所做的一切，我的所有目标，只为了这一个最终的目的，为了人民能够幸福。”\n莫泽抬起了头，他看向台上的女人，他甚至不知道女人叫什么，也不知道她说的是否是真心话，但他仿佛看见了年轻的自己。那个眼里有光，对未来充满希望的自己。“就选她了。”莫泽的话语传遍了会场的每一个角落。“可是我们还没有投票...”有人反驳到。“没必要投票了，我说的。”这位妥协了一生的人用着从来没有过的强势与专横指着台上呆呆站着的女人说到：“卡塔日娜·维尔纳——”"
ROK.7.a:0 "就决定你来当候选人与党魁了"
ROK.8.t:0 "夜间会面"
ROK.8.d:0 "民主党从什么时候开始变成现在这样的？奥辛斯基开始思考起来。明明是革命英雄科沃斯基传承下来的党派，怎么会沦落到今天这副田地？奥辛斯基一想到民主党在议会里那几乎可怜到不能再可怜的席位，他就开始头痛。或许，奥辛斯基想着，比纳许的政策是否可行？普遍性的民主真的适合克拉亚诺吗？或许克拉亚诺需要一个领袖，一个可以带领他们走向新时代的伟大领袖...\n“可以开始了么，奥辛斯基先生。”奥辛斯基回过神来，坐在他面前的民主党议员向他发问。奥辛斯基看着面前这些民主党议员微微一笑：“今天我请诸位在这里会面，是想和各位商谈民主党的未来。”奥辛斯基顿了顿继续说道，“自从海耶总统后，我们已经连续4届没有胜选了。甚至于到了今天，我们连参议院里的席位都要保不住了。”\n听到这的民主党议员们都低下了头，毫无疑问，奥辛斯基说的话句句都痛击着民主党的伤口。对于民众来说相比于被迫妥协的社民党来说，主动造成至暗十年的罪魁祸首民主党显然更加可恨，这也是为什么民主党在十五年的时间里没有一次选举胜利的*要原因——他们的名声太臭了。除了一些保皇派和保守分子以外，他们几乎已经失去了所有的选民。\n“我们是英雄传承下来的党派，我们本应该更加辉煌。而不是像现在这样浑浑噩噩的堕落下去。”奥辛斯基说到这里，他站起身看向身后墙上的比纳许画像，这是他费尽心机保留下来的。“虽然比纳许总统做了一些坏事，但这并不代表他没有可取之处。这一切都是为了克拉亚诺。”奥辛斯基回头看向那些民主党议员，张开双手高呼：“为我投票吧，因为——”"
ROK.8.a:0 "我就是民主党"
ROK.9.t:0 "克拉亚诺共和电台：516号广播"
ROK.9.d:0 "“嗨，大家好，我是你们熟悉的主持人米日哈娜·威克斯。今天我们的节目请到了一位重量级嘉宾，那就是我们下次大选的候选人之一：科里曼·威克利纳。”“大家好，我是科里曼·威克利纳。”\n“您好，威克利纳先生，大选在即请问作为候选人的您最近概况如何？”\n“哦，那可真是太忙了。从我自己到同僚们大家都在为了这次选举卯足了劲，我们希望获得胜利，堂堂正正的胜利。”\n“我们知道护国领袖莫泽总统和他的新民主党已经连任四届了，不知道威克利纳先生和社民党有没有什么竞选策略呢？”\n“竞选策略肯定是有的，那就是为了你们，为了你们，我亲爱的人民们。我们的竞选策略就是为了你们能够得到幸福。我相信我的党在开除布莱克之后已经走上了全新的道路。”\n“天哪，这真是令人感动。不知道社民党的目标都有哪些呢？”\n“我们社民党将致力于...”"
ROK.9.a:0 "嘿，我想我要投他一票"
ROK.10.t:0 "克拉亚诺共和电台：113号广播"
ROK.10.d:0 "“今天我们有幸邀请到了一位神秘嘉宾，是的，那就是民主党的新任候选人——奥辛斯基·海德曼。”\n“谢谢，谢谢，多尔德斯。很荣幸能够来到你的节目。”\n“是我谢谢您才对，感谢您接受了我的邀请。我们都知道自从前总统比纳许被审判后，民主党就几乎在媒体上消失了。”\n“你说的没错，多尔德斯。比纳许总统被审判对于民主党确实是很大的打击。”\n“啊，我们都知道大选就要开始了，奥辛斯基先生，不知道这次民主党会重整旗鼓吗？”\n“会的，多尔德斯。民主党已经重新团结起来，团结在我身边了。我会让民主党再次伟大，就像200年前的英雄科沃斯基一样。民主党将夺回属于她的一切。\n“看来您对这次大选很有信心？”\n“莫泽总统已经宣布不会再参选，新民主党和社民党确实是两个很有趣的对手，但我也想在这次大选中让克拉亚诺的民众们明白。民主党已经改变了，那个科沃斯基传承下来的伟大党派将会再一次赢得胜利，为克拉亚诺奉献一切。”\n“非常棒的发言，奥辛斯基先生。让我们休息一下，马上回来——”"
ROK.10.a:0 "我想，要不给民主党一个机会？"
ROK.11.t:0 "克拉亚诺国家电台：1号广播"
ROK.11.d:0 "“您好，这位先生。之所以和您连线是想问问您关于新民主党的看法。”\n“我很支持新民主党，我们一家都是新民主党的支持者。我觉得新民主党真的在为我饿们百姓考虑，莫泽总统是我们人民的福星啊。”\n“那么您对新民主党的新任候选人有什么看法吗？”\n“我看过她的演讲，我觉得她和莫泽总统是一类人，她眼里有我们这帮老百姓。我们的要求很简单，让我们过得好，能吃饱饭就行。克拉亚诺经历过太多了，我们需要和平和稳定。”\n“是的，先生。我想这也是我们大多数人的想法，感谢您的连线。”\n“看起来新民主党的支持率依然可观，即使在莫泽总统宣布不参选之后，依然保持了超高的民意。下面让我们来休息一下，进入下一个环节。”"
ROK.11.a:0 "看来，我还是会选新民主党"
ROK.12.t:0 "春朝漫步"
ROK.12.d:0 "卢娜今天很高兴，因为莫泽说他想出去走走。作为莫泽的护工。她很少看见莫泽如此的活跃，同时她也有点担心，担心这是这位暮年英雄的回光返照。“呀，下雨了。您还要出门吗？”卢娜看着身旁坐在床上的莫泽，微笑着问道。“嗯，帮我打个伞吧。”\n卢娜扶着莫泽漫步在总统府花园的过道上。莫泽望着天空，雨还在淅淅沥沥的下，他的目光逐渐变得深邃；仿佛想起了什么。他张了张嘴似是要说些什么，但嘴里终究没能吐出一个音节。卢娜带着他来到了总统府大门口，莫泽记得这个地方，这是他最辉煌的时候第一个来到的地方。闭上眼睛，仿佛曾经的那个自己出现在眼前，那时他和他的战友没有那些勾心斗角，没有那些来自国内和国外的压力，每个人的目光都是那么的纯粹而热烈。\n“我们真的是为了这个国家和人民。”莫泽嘴里轻吐出这句话。“您说什么，总统先生？”卢娜看着伞下的老人，轻声问道。“我做的对吗，卢娜？”“什么？”“我做的对吗？这个国家和人民真的因为我而变得更好了吗？”莫泽说着，眼眶里竟不自觉的流出热泪。“当然，总统先生。没有您的话，我现在还在贫民窟里为了一口吃的而拼命。”卢娜说着，眼泪的也不自觉的流了下来。莫泽转头望向卢娜，情绪已然崩溃,“我走了，你们该怎么办啊？该怎么办...”“别这样，总统先生。注意身体，我们回去吧。”\n卢娜强忍着泪光安抚好了情绪崩溃的莫泽，将他扶回床上。卢娜走出房间，缓缓带上门，轻声说道"
ROK.12.a:0 "“晚安，总统先生”"
