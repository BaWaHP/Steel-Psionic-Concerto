###民族精神###
QTA_each_harbors_a_secret:0 "各怀鬼胎"
QTA_each_harbors_a_secret_desc:0 "虽然青天军在表面上能够团结一致，可掌握着部分军权的各地军头以及组织内部的其它右翼分子都心怀自己的想法。许多人将青天军视作反建制的临时联盟，一旦起义战争取得胜利便可以就地解散，把枪口对准自己人也无所谓。"
QTA_imperfect_apartheid:0 "不完善的种族隔离"
QTA_imperfect_apartheid_desc:0 "青天军治理下的领土普遍存在严重的种族歧视与法律性的种族隔离，这是基于政府鼓励的成果。然而，种族歧视造成的暴力行为经常会破坏社会治安，激起其它种族反抗的同时破坏了社会秩序。同时，法律推行的种族隔离也缺乏足够的监管，不必要的伤亡往往被造成，给予了反抗者更多宣传的口舌。"
QTA_falling_rule:0 "摇摇欲坠的统治"
QTA_falling_rule_desc:0 "青天军虽然成功夺取了沿海的一片土地以维持自身的统治，可这是建立在远乡王国政局不稳定的基础之上，而非青天军本身作为一个组织取得了什么巨大的支持。虽然青天本人对此尽心尽德，但无可否认的是，青天军的纲领没有被许多人了解，大多数人只是将青天军视作一个军阀。除此之外，直接且暴力的种族主义行径造成了许多不满，破坏了社会稳定。"
QTA_total_blockade:0 "全面封锁"
QTA_total_blockade_desc:0 "虽然由于缺乏强大的武装力量，人鱼似乎更倾向于让郑钧的狗腿子们负责围剿青天军的起义，但他们依然在自己分内的领域对青天军进行了打击。来自海洋的全面封锁极大地破坏了东部沿海城镇地区的经济发展，同远乡政府军在陆地上的封锁共同形成了对青天军的完全封锁，如果不尽早打破封锁或是实现一定程度的自给自足，一场经济危机，伴随着饥荒，很快便会席卷而来。"

###领导人###
QTA_QingTian:0 "“青天”"
QTA_QingTian_desc:0 "同她所带领的快速扩张且日渐出名的组织不同，自称是“青天”的青天军领导人却很少显露出她的真面目。即使是在青天军高层内部，也鲜有人知道“青天”究竟是何许人也。有人说她是一个受尽了压迫的农民，要为老百姓讨公道；有人说她是没落的贵族，决心要谋反夺得远乡的王冠；有人说她是走火入魔的魔法研究者；还有人说她是先王郑铭的私生女，被郑钧悄悄流放了出去…无论流言蜚语如何扩散，“青天”本人似乎都没有放在心上，不过，她偶尔还是会强调自己身份并非如流言所说的那么花里胡哨。\n\n青天的过去几乎无法追溯，最早的记录中，青天曾在远乡东部沿海布道。她支持一种基于神狐的神兽崇拜，宣称神狐曾是神兽麒麟在凡间的代理者，却被不满的天朝上国所掩盖，流放至世界尽头，需要民众的力量才得以回归。如今此等大业只有可能在远离天朝上国的远乡实现。最初，人们只是将青天视作胡言乱语的疯婆子。可当青天利用自己独特的魔法展现即便是现代魔法也难以实现的奇迹时，相信她的人便增加了。在动荡的年代，许多人因远乡内的战火而流离失所，青天愿意接纳他们，并利用神迹保护，养育他们。这为青天赢得了低层百姓的支持，并成为了奠定青天军的基础。\n\n跟她共事的人称“青天”是一个公正无私的领导人，有目标且愿意听取她人建议，一旦确立了前进的方向便会采取果断的行动；支持她的百姓喜爱她坚定的反外国势力的立场，称“青天”是一位爱戴百姓的善良领导人；青天军属下的军官则称“青天”是一个对待下属冷酷却无比认真的统治者。\n\n没人知道“青天”所戴着的那副面纱下会是怎样的一个人，这些猜测就跟对她的身份的猜测一样众说纷纭。或许在未来的某一天，“青天”会摘下她所戴着的面纱，向世人展露她的真面目。没人知道那一天会在何时以怎样的形式到来，也没人知道“青天”在展露真面目的时候会采取何种行动。世人只能拭目以待，并祈祷一切安好。"

