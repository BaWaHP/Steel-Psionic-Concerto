state_development_introduction_tt:0 "使用须知：\n\n本产品是一款高精度、高效率的仪器，被广泛应用于民政领域。本操作说明书旨在帮助用户正确操作本产品，确保其正常运行，提高行政工作效率。使用产品前，请仔细阅读本使用说明书，并在阅读之后妥善保管，以便随时查阅。本产品仅限一般场所使用，操作人员应按照操作规程进行操作，遵守相关安全操作规定，确保自身和他人的安全。本产品图片和实物略有不同时，请以实物为准。本产品版权为【七河生命】所有。\n\n操作准备：\n\n本产品接通电源后，打开电源开关，等待自检完成，然后根据需求选择合适的测量模式，设置相关参数并进行校准，数据范围越精准，模拟结果准确率越高。\n\n系统将根据当前提供的数据推算当前地区普及度水平进行量化直观表现，并将当前等级初始数值设置为0。在达到当前等级满值即可进入下一等级，普及度每月结算一次。通常以下情况将会影响当地普及度发展——\n\n自然增长：\n较高水平普及度的地区将影响周边较低水平地区的普及度，较低水平普及度的地区无法提高周边较高水平地区的普及度。\n\n特殊行动：\n针对当地开展特殊行动以提高该地区的魔法/科学普及度。\n\n保修服务：\n详情请咨询当地销售及维修点以获取准确信息。"

